text = "Great — these **three classic graph problems** shaped a huge part of computer science. They’re simple to understand but very powerful. Once you see them, you’ll start recognizing their ideas everywhere in software systems.\n\n---\n\n# 1️⃣ The Shortest Path Problem\n\nThe question is simple:\n\n```text\nWhat is the shortest way to get from point A to point B?\n```\n\nExample graph:\n\n```mermaid\ngraph LR\nA --- B\nA --- C\nB --- D\nC --- D\nD --- E\n```\n\nIf you want to go from **A to E**, there are multiple routes.\n\nPossible paths:\n\n```\nA → B → D → E\nA → C → D → E\n```\n\nA shortest-path algorithm finds the **best route automatically**.\n\nThe most famous algorithm is  \nentity[\"algorithm\",\"Dijkstra's algorithm\"].\n\n---\n\n## Where This Is Used\n\nShortest-path algorithms power things like:\n\n- GPS navigation  \n- internet routing  \n- network packet delivery  \n- game AI pathfinding  \n\nFor example, routers on the internet compute routes using algorithms related to shortest-path ideas.\n\nRouting protocols like entity[\"network_protocol\",\"Open Shortest Path First\"] literally use this concept in their name.\n\n---\n\n# 2️⃣ The Traveling Salesman Problem\n\nThis one is famous because it’s **very easy to describe but extremely hard to solve perfectly**.\n\nThe question:\n\n```text\nGiven many cities,\nwhat is the shortest route that visits all of them once\nand returns to the start?\n```\n\nExample:\n\n```mermaid\ngraph LR\nA --- B\nA --- C\nB --- C\nB --- D\nC --- D\n```\n\nIf a salesman must visit:\n\n```\nA, B, C, D\n```\n\nThere are many possible routes.\n\nExample:\n\n```\nA → B → C → D → A\nA → C → B → D → A\nA → D → C → B → A\n```\n\nThe challenge is finding the **shortest one**.\n\n---\n\n## Why This Matters\n\nThis problem appears in:\n\n- delivery routing  \n- airline scheduling  \n- chip design  \n- manufacturing optimization  \n\nIt’s also one of the most famous problems in **computational complexity theory**.\n\nIt belongs to a category called:\n\n- entity[\"scientific_concept\",\"NP-hard problem\"]\n\nMeaning that as the number of nodes grows, the problem becomes **extremely difficult to solve exactly**.\n\n---\n\n# 3️⃣ The Seven Bridges Problem\n\nThis is historically the **first graph theory problem ever solved**.\n\nIt was studied by  \nentity[\"people\",\"Leonhard Euler\"] in 1736.\n\nThe city of  \nentity[\"place\",\"Königsberg\",\"historical city now Kaliningrad\"] had seven bridges connecting islands.\n\nThe question:\n\n```\nCan you walk across every bridge exactly once?\n```\n\nDiagram:\n\n```mermaid\ngraph TD\nA --- B\nA --- C\nA --- D\nB --- C\nB --- D\nC --- D\n```\n\nEuler proved something remarkable:\n\n```\nIt is impossible.\n```\n\nAnd in doing so, he invented **graph theory**.\n\n---\n\n## Euler's Insight\n\nInstead of thinking about geography, he simplified the map to:\n\n```\nland masses = nodes\nbridges = edges\n```\n\nThen he discovered rules about **how many edges connect to each node**.\n\nThat abstraction created the entire field of **graph theory**.\n\n---\n\n# Why These Problems Matter\n\nThey teach three fundamental ideas:\n\n### Connectivity\n\nCan things be connected at all?\n\nExample:\n\n```\nSeven Bridges\n```\n\n---\n\n### Optimization\n\nWhat is the **best path**?\n\nExample:\n\n```\nShortest path\n```\n\n---\n\n### Complexity\n\nSome problems grow **exponentially difficult**.\n\nExample:\n\n```\nTraveling Salesman\n```\n\n---\n\n# Why This Connects to Your Architecture Thinking\n\nWhen designing systems, you’re often solving graph problems like these.\n\nExamples:\n\nEvent systems:\n\n```\nWhich events feed which projections?\n```\n\nDependency systems:\n\n```\nWhich components depend on others?\n```\n\nKnowledge graphs:\n\n```\nWhat is the relationship between concepts?\n```\n\nDistributed systems:\n\n```\nHow do messages flow through the network?\n```\n\nAll graph problems.\n\n---\n\n# The Big Realization\n\nA lot of computer science can be summarized like this:\n\n```\nMany important problems become easier\nonce you represent them as graphs.\n```\n\nOnce information is modeled as **nodes and relationships**, powerful algorithms and visualizations become possible.\n\n---\n\nIf you'd like, the next thing I could show you is something **very relevant to what you've been designing with ATLAS**:\n\nThe concept of **property graphs**, which is the exact structure used by modern knowledge graphs and graph databases — and it's almost a perfect fit for **event models + knowledge systems like LOGOS**."

