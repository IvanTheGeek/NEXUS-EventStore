[[body.segments]]
kind = "multimodal"
text = "Of course! One of the most well-known expressions of this idea comes from Michael A. Jackson, a pioneer in software design. He said something like:\n\n\"Software design is the process of deciding what you are going to build before you build it. Coding is the translation of that design into a language the computer understands.\"\n\nThis is a perfect encapsulation of the idea: coding is a mechanical step, but the intellectual work of deciding what your system should do, and modeling it correctly, is what truly defines success."

