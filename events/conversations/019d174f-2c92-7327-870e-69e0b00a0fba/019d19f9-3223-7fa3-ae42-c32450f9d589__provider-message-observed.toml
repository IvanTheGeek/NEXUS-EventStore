text = "OK, interesting tech. License is compatible as well! This actually bring me to more the implementation side: the \"event store\" would be its own domain. The events would be stored to some api. That block then can store it how ever it wants, simplest would be toml file per event using the file system. In memory could be a way. datomic could be a way, even google drive api   or S3. It could be configured so the data is stored in multiple options also. Maybe in memory and files and datomic. Support fast read from in memory, durable with the others."

