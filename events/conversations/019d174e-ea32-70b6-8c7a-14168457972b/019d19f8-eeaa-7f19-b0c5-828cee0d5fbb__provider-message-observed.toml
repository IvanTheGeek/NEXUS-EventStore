text = "The user is asking:\n1. Are there any other WRX90 motherboard manufacturers besides ASRock and ASUS?\n2. What's the maximum number of RTX 5090s that one board could handle?\n\nFrom my searches, I found:\n- ASRock WRX90 WS EVO - 7x PCIe 5.0 x16 slots\n- ASUS Pro WS WRX90E-SAGE SE - 7x PCIe 5.0 x16 slots (6x full x16, 1x at x8 mode)\n\nThe search results mentioned Gigabyte and SuperMicro as WRX90 vendors, but I didn't find specific models. Let me search for those.\n\nFor the max RTX 5090s question, I need to consider:\n- RTX 5090 specs: 575W TDP, uses single 12V-2x6 connector (can spike to 600W)\n- Physical slot spacing - RTX 5090 Founders Edition is dual-slot\n- The article about AI motherboards mentioned that boards with 7 slots in dual-slot spacing can only fit 4 dual-slot GPUs\n- Power requirements: Each 5090 needs 575W, plus the rest of the system\n\nSo the practical limit depends on:\n1. Physical spacing (dual-slot cards need spacing)\n2. Power delivery\n3. Cooling (open-air cards vent sideways and will throttle in multi-GPU stacks)\n4. PSU capacity\n\nLet me search for more WRX90 boards and clarify the physical GPU limits."

