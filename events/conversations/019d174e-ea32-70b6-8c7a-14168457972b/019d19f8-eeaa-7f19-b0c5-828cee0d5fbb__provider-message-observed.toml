kind = "plain_text"
text = "**WRX90 Motherboard Options:**\n\nOnly 3 manufacturers currently:\n\n1. **ASRock WRX90 WS EVO** - $1,300\n   - 7x PCIe 5.0 x16 slots\n\n2. **ASUS Pro WS WRX90E-SAGE SE** - $1,300\n   - 7x PCIe 5.0 x16 slots (6 full x16, 1 at x8 mode)\n\n3. **Gigabyte MH53-G40** (server-oriented)\n   - 6x PCIe Gen5 x16 slots\n   - E-ATX form factor\n   - Pricing not readily available (likely OEM/enterprise channel)\n\n**Maximum RTX 5090s per Board:**\n\n**Physical Limit: 4 GPUs (dual-slot cards)**\n\nCritical constraint from the research: \"A board with 7 slots spaced closely together (dual-slot spacing) can only fit four dual-slot GPUs.\"\n\nRTX 5090 Founders Edition = dual-slot design. Even with 7 PCIe slots, standard spacing only allows 4 cards to physically fit.\n\n**For more than 4 GPUs, you'd need:**\n- Blower-style (reference) coolers that exhaust out the back\n- Custom single-slot liquid cooling blocks\n- These would allow 6-7 GPUs depending on the board\n\n**But cooling becomes the real problem:**\n\nConsumer open-air GPUs (like RTX 5090 FE) vent hot air sideways into the case. In multi-GPU stacks:\n- Top cards inhale exhaust from cards below\n- Severe thermal throttling and shutdowns\n- Blower cards or liquid cooling required for 3+ GPU configs\n\n**Power Requirements for 4x RTX 5090:**\n- 4x 5090s: 2,300W (575W each)\n- Threadripper PRO CPU: 350W\n- System/RAM/storage: 150-200W\n- **Total: ~2,800-3,000W**\n\nNeed dual PSUs or single 2000W+ unit. Each RTX 5090 requires its own 12V-2x6 power connector with 4x 8-pin PCIe cables.\n\n**Practical maximum: 4 RTX 5090s** with standard FE coolers on air, or up to 6-7 with custom liquid cooling."

