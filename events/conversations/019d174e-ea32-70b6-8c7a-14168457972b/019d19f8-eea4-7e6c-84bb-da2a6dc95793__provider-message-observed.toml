tects, and engineers, these processors excel in both multi-threaded and lightly threaded workflows, offering exceptional power, performance, and platform expandability built on the leading Zen 4 architecture. Fast-track creative workflows with the performance, value, and reliability of next-gen professional GPUs and high-speed storage devices.\n\nAMD Ryzen Threadripper processors support a range of advanced workstation configurations to meet the needs of cutting-edge visual work. Enhance your engineering, creative, scientific and development workfloads and avoid paying expensive cloud subscription costs, with on-device genAI like LLM and diffusion models. From conception to final production, integrate advanced AI tools into every phase of your project. Accelerate architectural workflows like editing point clouds, rendering and virtual reality. Reduce simulation and render times while the system stays productive. Tear through complex rendering and VFX workloads while increasing creative iterations. Reduce compile times and boost scientific discovery with rapid simulation and analysis. All AMD Ryzen PRO processors offer 18 months of planned software stability, 24 months of planned availability, and an enhanced platform validation process to ensure enterprise-grade quality and long-term stability.\nB&H Photo Video does not officially list any prices, as these are preorders. However, users can easily estimate the prices by selecting price ranges and checking which SKUs appear. We went through the list and came up with the following pricing. Ryzen Threadripper 9960X 4.2 GHz 24-Core: $1,600 (+7% vs. 7960X) Ryzen Threadripper 9970X 4.0 GHz 32-Core: $2,600 (+4% vs. 7970X) Ryzen Threadripper 9980X 3.2 GHz 64-Core: $5,300 (+6% vs. 7980X) Ryzen Threadripper PRO 9965WX 4.2 GHz 24-Core: $3,100 (+17% vs. 7965WX) Ryzen Threadripper PRO 9975WX 4.0 GHz 32-Core: $4,400 (+13% vs. 7975WX) Ryzen Threadripper PRO 9985WX 3.2 GHz 64-Core: $8,500 (+16% vs. 7985WX) Ryzen Threadripper PRO 999