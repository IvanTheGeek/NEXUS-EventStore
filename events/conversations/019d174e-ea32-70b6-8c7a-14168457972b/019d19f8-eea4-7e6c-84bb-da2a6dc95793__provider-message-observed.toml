n or a Patreon contribution!) AMD also announced its newest Threadripper 9000 Zen 5 CPUs, including the 9980X, 9970X, and 9960X, codenamed â€śShimada Peak.â€ť These have been upgraded with increased memory support and enhanced AVX-512 for more demanding tasks. Weâ€™ll start with the standard AMD Ryzen Threadripper 9000 CPUs. This series includes the 9980X, 9970X, and 9960X. The 9980X is a 64C/128T CPU at 3.2 GHz base clock and with 256 MB of L3 cache.\n\nAMD announced new Threadripper CPUs that include the 9980X, 9970X, 9960X along with PRO 9000 WX-series CPUs Â· AMD also revealed the 9995WX, its new AI Pro workstation GPU, which will come with 128 AI accelerators, 32GB of GDDR6 memory, up to 1531 TOPS, and a 300W TDP ... Grab a GN Tear-Down Toolkit to support our AD-FREE reviews and IN-DEPTH testing while also getting a high-quality, highly portable 10-piece toolkit that was custom designed for use with video cards for repasting and water block installation. Includes a portable roll bag, hook hangers for pegboards, a storage compartment, and instructional GPU disassembly cards. AMD just announced its RX 9060 XT GPUs (coming in two memory configurations). We already knew about these but the company just formally announced them. AMD also revealed its â€śRadeon AI Pro R9700â€ť workstation GPU, and the companyâ€™s latest Threadripper 9000 series and Threadripper PRO 9000 WX-series of CPUs.\n\nThe 9970X has 32 cores, 64 threads, a 4.0 GHz base clock, and 128 MB of L3 cache. And finally, the 9960X will come with 24 cores, 48 threads, a 4.2 GHz base clock, and also 128 MB of L3 cache. All of these CPUs will also feature an up to 5.4 GHz max boost clock, PCIe 5.0, the same sTR5 socket, and a 350W TDP. For AMDâ€™s Ryzen Threadripper PRO 9000 WX-Series: The company announced six new CPUs, which include the 9945WX, 9955WX, 9965WX, 9975WX, 9985WX, and the flagship 9995WX. Starting with the 9945WX and working our way up, these chips will come with core counts of 12, 16, 24, 32,