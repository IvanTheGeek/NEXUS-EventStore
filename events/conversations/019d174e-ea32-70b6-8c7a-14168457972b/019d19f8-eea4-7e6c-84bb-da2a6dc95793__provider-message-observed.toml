text = "The motherboard is priced at $599.99 US and will retail on the 6th of December. Follow Wccftech on Google to get more of our news coverage in your feeds. Read all comments on AMD TRX50 â€śThreadripper 7000â€ť Motherboards Official Prices Revealed: ...\n\nAMD TRX50 motherboards from ASUS, ASRock & Gigabyte have been listed with official prices & launch next month with Threadripper 7000 support. The AMD Ryzen Threadripper 7000 CPUs have been available since 21st November but it looks like users will have to wait till next month to get their hands on the latest TRX50 motherboards and even more for the higher-end WRX90 motherboards. With that said, we now have the official prices for these high-end designs which you can read about below along with how the three boards are compared to each other in terms of specifications and features. The ASUS PRO WS TRX50-SAGE WIFI Motherboard features the sTR5 (SP6 / LGA 4844) socket which supports both AMD Threadripper 7000WX & Ryzen Threadripper 7000 CPUs. The socket is powered by 36 power stages which are delivered power by two 8-pin connectors (one more is reserved for OC needs) & are cooled by a large VRM cooling solution that features several aluminum fins and a large heat-pipe array.\n\nAMD sTR5 socket supports up to 96-core CPUs: Ready for AMD Ryzen Threadripper PRO 7000 WX-Series Processors and AMD Ryzen Threadripper 7000 Series Processors. CPU and memory overclocking: Support for up to 1TB ECC R-DIMM DDR5 memory modules (1DPC) Robust power and thermal design: 36 power stages with two 8-pin power connectors for the CPU, massive VRM cooling, chipset M.2 heatsinks, and M.2 thermal pad. Ultrafast connectivity: three PCIe 5.0 x16 slots, 10 Gb & 2.5 Gb LAN ports, three M.2 slots, front and rear USB 20Gbps Type-C and SlimSAS NVMe support. Server-grade IPMI remote management: hardware and software support for ASUS IPMI expansion cards, plus ASUS Control Center Express software for real-time monitoring and management Â· Trusted stability: Validated for extensive compatibility with the latest technologies, an expansive QVL list, and tested for 24/7 operation Â· Other features of the ASUS Pro WS TRX50-SAGE WIFI motherboard include full overclocking for the AMD Ryzen Threadrippe\n\nThe CPU socket is powered by a 16+8+4 phase VRM and comes in a right-angled layout, surrounded by four DIMMs which confirms a quad-channel DDR5 array. The WRX90 platforms will adopt the 8-channel memory array. The CPU socket is powered by dual 8-pin connectors and the standard 24-pin ATX connector. ... For expansion, the motherboard features three PCIe Gen 5.0 x16 slots, four M.2 Gen5x4 slots, and a strong array of USB ports. The motherboard also features a heatsink for each of the four M.2 slots & there are also 8 SATA III ports. The whole design language is very durable in nature with silver colors & very simplistic aesthetics. The motherboard is priced at $599.99 US and will retail on the 6th of December. Follow Wccftech on Google to get more of our news coverage in your feeds. Read all comments on AMD TRX50 â€śThreadripper 7000â€ť Motherboards Official Prices Revealed: ASUS $899, ASRock $799, Gigabyte $599\n\nThe ASRock TRX50 WS motherboard comes with an impressive design that offers enthusiasts the SP6 socket with a powerful 18+3+3 phase power delivery that makes use of 110A SPS power stages. The motherboard is made up of a server-class 12-layer PCB design and the motherboard features 3 8-pin ATX connectors, 2 8-pin ATX 12V, and 2 6-pin ATX 12V connectors. All of these connectors are required to be plugged in for CPU & memory overclocking. The VRMs are cooled by two massive heatsinks which feature two fans each so that's four active fans in total on the motherboard. The heatsinks also feature extended heatpipe solutions. ... 4 SATA3, 1 Blazing M.2 (PCIe Gen5 x4), 1 Hyper M.2 (PCIe Gen4 x4), 1 MCIO (PCIe Gen5 x4), 2 SlimSAS (PCIe Gen4 x4 / 4 SATA3) 1 USB 3.2 Gen2x2 Type-C (Rear), 2 USB 3.2 Gen2 Type-C (1 Rear, 1 Front), 4 USB 3.2 Gen2 Type-A (Rear), 4 USB 3.2 Gen1 (2 Rear, 2 Front), 4 USB 2.0 (Front) ...\nAMD Ryzen Threadripper 9000 Series processors are designed for AI developers and built for enthusiasts who demand workstation-class performance in a desktop. Purpose-built to elevate productivity, with up to 64 â€śZen 5â€ť cores and 128 threads allow effortless multitaskingâ€”and up to a massive 256 MB L3 cache delivers exceptional responsiveness and acceleration for complex tasks, demanding creative workloads, and AI development. Find a Retail Partner for High End Processors in Box Â· Choose the AMD TRX50 chipset for focused, full spectrum performance with up to 80 PCIe lanes and 4-channel memory and choose the AMD WRX90 chipset for the ultimate PCIeÂ® 5.0 expandability, 8-channel memory, and enterprise class manageability and security. ... Detailed whitepapers on key topics with expert insights. Raising the Bar on Workstation Performance Redefining the Art of the Possible Â·\n\nPugetBench Adobe Premiere Pro, PugetBench Adobe After Effects, SPECviewperf 3ds Max, SPECapc Maya, Cinebench 2024 and V-Ray benchmarks to compare the performance of the AMD Ryzen Threadripper PRO 9995WX processor in a reference system configured with 8x 64GB DDR5 memory, Nvidia RTX PRO 6000 Blackwell graphics, 1TB SSD, Win 11 vs. a similarly configured BOXX workstation with the IntelÂ® XeonÂ® W9-3595X processor. Workstation manufacturers may vary configurations, yielding different results. Results may vary. SHP-10. SPECviewperf 2020 v3.1 Solidworks/Creo/CATIA/SNX, SPECapc Creo 9.1.0 (AA = On), SPECapc Solidworks 2024 (FSAA, 4K) and Keyshot Viewer 2025.1 benchmarks to compare the performance of the AMD Ryzen Threadripper PRO 9995WX processor in a reference system configured with 8x 64GB DDR5 memory, Nvidia RTX PRO 6000 Blackwell graphics, 1TB SSD, Win 11 vs.\n\nAMD Ryzenâ„˘ Threadripperâ„˘ processors are the ultimate workstation processor for artists, architects, and engineers - powering innovation from day one. ... When deadlines are non-negotiable, creators, AI developers, architects, and engineers need a desktop workstation that excels. From enterprise-class security and exceptional manageability to unlocked performance and customization, AMD Ryzenâ„˘ Threadripperâ„˘ empowers professionals and enthusiasts to get more done in less time. Save up to 27 minutes for every hour of productivity on the fastest workstation processors on the market.1 Â· Designed for artists, architects, engineers, and AI developers, AMD Ryzen Threadripper processors excel in both multi-threaded and lightly threaded workflows. Built on the latest AMD â€śZen 5â€ť architecture, these processors deliver unmatched performance and expandability.\n\nAMD Ryzen Threadripper processors, in enterprise-class PRO workstations or enthusiast-level high-end desktops, support a range of advanced configurations to meet the demands of heavy visual workloads, local AI development, and complex simulations. ... Experience more efficient workloads, enhanced creativity, and freedom from cloud costs with on-device generative AI like LLMs and diffusion models, powered by AMD Ryzen Threadripper processors. Whether you're designing a product or developing AI, Threadripper processors deliver the compute performance, memory capabilities, and platform flexibility to accelerate every phase of your projectâ€”from conception to final production. Accelerate architectural workflows like editing point clouds, rendering and virtual reality. ... Reduce simulation and render times while the system stays productive. ... Tear through complex rendering and VFX workloads while increasing creative iterations.\nThe AMD Threadripper 7960X CPU is a 24C/48T part with 1.5MB of L1 Cache, 24MB of L2, and 128MB of L3 cache. The PPT max is still 350W, alongside TDP, and itâ€™s fully unlocked. The CPU has four memory channels. For I/O options, the TRX50 HEDT platform offers a total of 92 PCIe lanes, or 88 usable. Maximally 48 of those can be PCIe Gen5. The platform also has options for ECC memory. If you haven&#x27;t been following the Threadripper news, basically these are targeted at sort of professional users; maybe not quite in the area of pro. They&#x27;ve got the WRX90 platform for that, but for HEDT, you&#x27;re still in that sort of enthusiast class entering workstation territory and that&#x27;s what we&#x27;re going to be looking at today. You can learn more about the platform and PCIe support in our writeup here. For now though, let&#x27;s get into the benchmarking. Since efficiency was such a big part of the 7980X review, weâ€™ll start with power consumption.\n\nThe AMD Threadripper 7960X CPU is a 24C/48T part with 1.5MB of L1 Cache, 24MB of L2, and 128MB of L3 cache. The PPT max is still 350W, alongside TDP, and itâ€™s fully unlocked. The CPU has four memory channels. For I/O options, the TRX50 HEDT platform offers a total of 92 PCIe lanes, or 88 usable. Maximally 48 of those can be PCIe Gen5. The platform also has options for ECC memory. If you haven't been following the Threadripper news, basically these are targeted at sort of professional users; maybe not quite in the area of pro. They've got the WRX90 platform for that, but for HEDT, you're still in that sort of enthusiast class entering workstation territory and that's what we're going to be looking at today. You can learn more about the platform and PCIe support in our writeup here. For now though, let's get into the benchmarking. Since efficiency was such a big part of the 7980X review, weâ€™ll start with power consumption.\n\nThe â€śeconomicalâ€ť HEDT Threadripper provides an interesting mix of high frequency, high core count, and robust I/O options at a relatively affordable cost. ... Grab a GN Soldering & Project Mat for a high-quality work surface with extreme heat resistance. These purchases directly fund our operation, including our build-out of the hemi-anechoic chamber for our acoustic testing! (or consider a direct donation or a Patreon contribution!) AMD didnâ€™t send its Ryzen Threadripper 7960X out to reviewers. Weâ€™ve already reviewed the 7980X and 7970X and bought this â€ścheaperâ€ť CPU for $1,500 for todayâ€™s review, and itâ€™s a 24-core, 48-thread part that sockets into the new HEDT motherboards in socket sTR5. The CPU claims a boost clock up to 5.3GHz single-core, which would make it fast for a Threadripper CPU. By HEDT standards today, where the 7970X is $2,500, the 7960X is a â€ścheapâ€ť CPU.\n\nItâ€™s still about $1,000 more expensive than a 7950X though, which itself has 16 cores. Thatâ€™s a big jump in price for an extra 8 full cores, and the boards are also a huge jump in price. Although theyâ€™re not all launched yet, it looks like several of the HEDT Threadripper motherboards will be in the $1,000+ price class. But more so than the core count increase, the more significant increase with the 7960X is in I/O capabilities. Itâ€™s an interesting balance of higher frequency, still high core count, and fuller I/O options as compared to desktop parts like the 7950X or 14900K. Editor's Note: This was originally published as a video on December 11, 2023. We are now publishing it as an article with no changes. ... This 24-core HEDT Threadripper part almost seems like the boring option and maybe that's why it wasn't sent out for review because in comparison to a 64-core or 32-core part, 24 just seems almost too close to normal but it's still a really potentially useful part because there a\n\nIn this one, the 7960X performed impressively in some tests even in spite of the heavily reduced core count. WPC_CFD is based on OpenFOAMâ€™s combustion CFD solver. The 7960X scored 13.65 points here, putting it close in performance to the 7970X and 7980X, relatively speaking. The scaling isnâ€™t that favorable for the higher core count Threadripper parts, but is favorable enough to establish a large gulf between the 7960X and the mainstream desktop parts. The Rodinia CFD solver tests scale more cleanly, with the 7980X leading the 7970X by 62%, which itself leads the 7960X by 33%, but the 7960X (and 7970X) were outperformed by the 14900K in this test, with the 7960X also outperformed by AMDâ€™s 7950X. The CalculiX testing had the 7960X at 5.12, leading the mainstream Intel part by 34%. Next up are the Spec Life Sciences & Biomedical tests. These tests look at LAMMPS, which Spec.org says â€śis a molecular dynamics simulator that consists of five tests simulating a variety of molecular propertie\nThe PC world has welcomed AMD's return to HEDT CPUs with Threadripper 7000, which competes against the company's previous Threadripper chips for the best CPUs for workstations. But that welcome might not last very long if TRX50 motherboards are as expensive as a retail listing suggests. Spotted by X (formerly Twitter) PC hardware sleuth @momomo_us, a retail listing for Asus's TRX50-Sage WiFi motherboard shows a price tag of nearly $1,100, which is more in line with workstation pricing than HEDT pricing. AMD's last HEDT CPU, Threadripper 3000, didn't have cheap motherboards, but even the highest-end models capped out at around $700, with many good models being available for $500. At over $1,000, this TRX50 board is about as expensive as workstation class WRX80E boards for Threadripper Pro 5000 WX-series CPUs while lacking workstation features like octa-channel memory.\n\nOn the other hand, it's very possible that this listing won't be representative of TRX50 motherboards as a whole or even Asus's TRX50-Sage WiFi. @momomo_us only provided a screenshot of the listing rather than a link, and it's unclear which retailer made the listing. It's certainly not a well-known store like Amazon, Newegg, or B&H Photo. ... AMD Announces Threadripper HEDT and Pro 9000-Series CPUs: 96 cores and 192 threads for Desktops and Workstations Â· The price tag itself is also strange, being exactly $1,087.96. Most motherboards, including those for HEDT and workstations, sell for average prices, like Asus's $999 Pro WS WRX80E-Sage SE. That and the fact that the motherboard isn't in stock could mean the price isn't realistic. Many retailers list PC components that haven't come out yet, and it's not unusual to see high prices that turn out to be misleading.\n\nIt would be strange for AMD to launch a $1,500 CPU that would be paired with $1,000 motherboards, so it's possible that this listing doesn't tell us the actual price of upcoming TRX50 motherboards. If true, though, Threadripper 7000 might be lucky to have even a lukewarm reception. Stay On the Cutting Edge: Get the Tom's Hardware Newsletter Â· Get Tom's Hardware's best news and in-depth reviews, straight to your inbox. ... Matthew Connatser is a freelancing writer for Tom's Hardware US. He writes articles about CPUs, GPUs, SSDs, and computers in general. ... AMD Announces Threadripper HEDT and Pro 9000-Series CPUs: 96 cores and 192 threads for Desktops and Workstations ... AMD's Threadripper 9995WX stuns in Cinebench R23 â€” new Ryzen flagship reportedly 73% faster than its predecessor Â· ASRock launches new AMD motherboards at Computex 2025 ... Microsoft follows Nvidia's lead, surpasses $4 trillion market capitalization on soaring demand for cloud services, multi-front AI endeavors Â·\n\nMore like HEHEDT.\nTR Pro, in this case, being even pricier and you&#x27;d only lose important things by using such a chip on a TRX50 board, like the octa-channel memory support. Seems that AMD is trying to pull the same branding and market positioning that Nvidia did with Titan, to justify the ever higher prices, they started to distance Titan from the GeForce brand, so much that after the Maxwell &quot;GeForce GTX Titan X&quot;, they just dropped GeForce from the name and renamed it the &quot;NVIDIA Titan&quot; for the subsequent models (X (Pascal), Xp, V, RTX), until they just did away with the brand entirely and created the x90 segment to bridge between workstation and consumer graphics, with what is essentially a badly overpriced gaming card. Here we have the same deal, AMD is seemingly distancing this segment from the Ryzen brand, until the third generation they were clearly labeled &quot;AMD Ryzen Threadripper&quot;, but now they dropped the Ryzen branding from the CPUs and all the marketing materials, boxes, etc.\n\nAt Computex last week, we got a first look at Gigabyte's new TRX50 AI TOP motherboardâ€”where TOP stands for trillions of operations per secondâ€”designed for AMD's Threadripper and Threadripper Pro CPUs. Now the company has released the full specifications of the TRX50 AI TOP and the board is packed to the brim with features. The E-ATX board is home to four PCIe x16 slots, all of which can operate in PCIe 5.0, but one can be limited to PCIe 4.0, depending on your choice of CPU. There's also four NVMe M.2 slots, with CPU dependent functionality. Other features include eight DIMM slots, but these are again CPU dependent, two 10 Gbps Ethernet interfaces via a pair of Marvell AQtion AQC113C controllers, WiFi 7 via a Qualcomm QCNCM865 module and dual audio chips, one for the rear ports and one for the front panel audio. As this is a 2024 model, USB4 is of course also part of the package, but only one of the two USB4 supports DP Alt-mode, due to there only being one DP input.\n\nTR Pro, in this case, being even pricier and you'd only lose important things by using such a chip on a TRX50 board, like the octa-channel memory support. Seems that AMD is trying to pull the same branding and market positioning that Nvidia did with Titan, to justify the ever higher prices, they started to distance Titan from the GeForce brand, so much that after the Maxwell \"GeForce GTX Titan X\", they just dropped GeForce from the name and renamed it the \"NVIDIA Titan\" for the subsequent models (X (Pascal), Xp, V, RTX), until they just did away with the brand entirely and created the x90 segment to bridge between workstation and consumer graphics, with what is essentially a badly overpriced gaming card. Here we have the same deal, AMD is seemingly distancing this segment from the Ryzen brand, until the third generation they were clearly labeled \"AMD Ryzen Threadripper\", but now they dropped the Ryzen branding from the CPUs and all the marketing materials, boxes, etc.\n\nMemory Support for DDR5 ECC Registered memory modules (RDIMM/RDIMM-3DS) 8 x DDR5 DIMM sockets supporting up to 2 TB of system memory - AMD Ryzenâ„˘ Threadripperâ„˘ PRO 7000 Processors support 8-Channel memory architecture - AMD Ryzenâ„˘ Threadripperâ„˘ 7000 Processors support Quad Channel memory architecture Support for AMD EXtended Profiles for Overclocking (AMD EXPOâ„˘) and Extreme Memory Profile (XMP) memory modules (The CPU and memory configuration may affect the supported memory types, data rate (speed), and number of DRAM modules, please refer to \"Memory Support List\" on GIGABYTE's website for more information.) Audio RealtekÂ® ALC4080 CODEC (rear panel audio) - Support for DTS:XÂ® Ultra - High Definition Audio - 2-channel RealtekÂ® ALC897 CODEC (front panel audio) LAN 2 x MarvellÂ® AQtion AQC113C 10GbE LAN chip (10 Gbps/5 Gbps/2.5 Gbps/ 1 Gbps/100 Mbps) Wireless Communication module QualcommÂ® Wi-Fi 7 QCNCM865 - 802.11a, b, g, n, ac, ax, be, supporting 2.4/5/6 GHz carrier frequency bands - BLU\n\nStorage Interface 3 x M.2 connectors (M2C_CPU/M2B_CPU/M2A_CPU), integrated in the CPU, supporting Socket 3, M key, type 2280 SSDs: - AMD Ryzenâ„˘ Threadripperâ„˘ PRO 7000 processors support PCIe 5.0 x4/x2 SSD - AMD Ryzenâ„˘ Threadripperâ„˘ 7000 Processors support PCIe 4.0 x4/x2 SSD 1 x M.2 connector (M2D_CPU), integrated in the CPU, supporting Socket 3, M key, type 2280 SSDs: - AMD Ryzenâ„˘ Threadripperâ„˘ PRO 7000 processors support PCIe 5.0 x4/x2 SSD * The M2D_CPU connector will become unavailable when using the AMD Ryzenâ„˘ Threadripperâ„˘ 7000 Processors. 4 x SATA 6Gb/s connectors RAID 0, RAID 1, and RAID 10 support for NVMe SSD storage devices RAID 0, RAID 1, and RAID 10 support for SATA storage devices Â·\nBase price of entry is ~2.3x the cost of 9950X MSRP (real world even bigger gap). The cheapest TRX50 board is ~$600 which is significantly higher than required to run the 9950X, but even pointing at a mid range X870E board is +$250.\n\nThe new wave of AMD HEDT CPUs is right around the corner.\n\nThe lineup slots into AMDâ€™s TRX50 platform, which supports 4-channel DDR5-6400 RDIMM memory and up to 80 PCIe 5.0 lanes (92 in total, with 8 PCIe 4.0 lanes). This combination gives creators access to double the memory bandwidth of mainstream desktop systems and ensures bandwidth headroom for modern GPUs and storage. Like its predecessor, overclocking remains supported out of the box. ... Performance claims from AMD are bold; the flagship 9980X is said to deliver up to 108% better performance compared to Intelâ€™s 60-core Xeon W9-3595X in compute-heavy workloads, while the 32-core 9970X offers 137% faster results against Intelâ€™s 44-core Xeon W9-3575X. AMD also highlights significant gains in real-world creator benchmarks, such as Cinebench 2024 and Adobe After Effects, as well as AI inferencing and large-model processing, areas where multi-core throughput and PCIe bandwidth are crucial.\n\nAMDâ€™s offerings are looking better by the day. None of that Intel baloney with license activation for additional CPU features. Reply ... I've said it before and I'll say it again: these are not HEDT CPUs they're just two flavors of workstation. Base price of entry is ~2.3x the cost of 9950X MSRP (real world even bigger gap). The cheapest TRX50 board is ~$600 which is significantly higher than required to run the 9950X, but even pointing at a mid range X870E board is +$250. Then there's the memory 4x 16GB DDR5-6000 CL30 RDIMMs cost ~$450 whereas 2x 32GB DDR5-6000 CL30 UDIMMs cost ~$190. All combined that's a platform cost of entry which is over 2x the cost or simply you could buy the entire desktop platform for less than the cost 