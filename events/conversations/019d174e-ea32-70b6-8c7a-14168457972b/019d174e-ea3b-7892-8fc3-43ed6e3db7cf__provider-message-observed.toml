text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"AMD Ryzen Threadripper 9000 set to launch in July, up to 26% faster than TR 7000 series - VideoCardz.com\",\"url\":\"https://videocardz.com/newz/amd-ryzen-threadripper-9000-set-to-launch-in-july-up-to-26-faster-than-tr-7000-series\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"videocardz.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=videocardz.com\",\"site_name\":\"VideoCardz\"},\"is_missing\":false,\"text\":\"Compared to the Threadripper 7000 series, performance is up by as much as 26% across many applications. ... AMD also directly compared the new chips with Intel\\u2019s Xeon W9-3595X. The results show a clear lead for AMD in all categories tested, ...\\n\\nIn terms of real-world performance, AMD is reporting major gains across a wide range of professional and creator workloads. Compared to the Threadripper 7000 series, performance is up by as much as 26% across many applications. ... AMD also directly compared the new chips with Intel\\u2019s Xeon W9-3595X. The results show a clear lead for AMD in all categories tested, including up to 145% higher performance in media and entertainment tasks, up to 118% in architecture and engineering, and up to 75% in software development and scientific computing. In AI-focused workloads, the lead is a bit narrower but still significant, with 28 to 34% higher performance depending on the test. ... The Ryzen Threadripper 9000 series will be available starting in July, although no official pricing has been confirmed. AMD has stated that workstation models will mostly appear in OEM systems at launch, while HEDT parts are expected to be sold through retail channels.\\n\\nAMD has shared full specs and performance details for its next-gen Ryzen Threadripper 9000 and PRO 9000 WX series. AMD is getting ready to launch its next generation of workstation and high-end desktop CPUs under the Ryzen Threadripper 9000 series, which includes both regular and PRO models. These new chips are based on the Zen 5 architecture and were first briefly shown during Computex, with AMD now providing full architectural details during its Advancing AI 2025 event. Threadripper has already been dominant in the HEDT and workstation space, and with this update, AMD is aiming to further increase its lead. ... Both Threadripper 9000 and PRO 9000 WX use the same sTR5 socket and are compatible with current WRX90 and TRX50 motherboards, provided users apply a BIOS update; in other words, AMD is sticking to a dual-platform approach. The TRX50-based HEDT platform supports CPUs up to 64 cores with four channels of DDR5 memory, while the WRX90 platform is designed for workstations and scal\\n\\nComments deemed to be spam or solely promotional in nature will be deleted. Discussions about politics are not allowed on this website. Sharing relevant links is permitted; avoid bypassing the link and word filters. Our team will approve links. Comments complaining about the post subject or its source will be removed. Offensive language in comments or usernames result in a ban. Direct attacks/harassment result in immediate ban. VideoCardz isn\\u2019t and was never sponsored by AMD, Intel, or NVIDIA. Users claiming otherwise will be banned. Moderators may edit/delete comments without notice. If you have any questions about the commenting policy, please let us know through the Contact Page. ... Loading comments... ... Unity and Epic Games announce partnership to bring Unity games into Fortnite, add Unreal support to Unity commerce tools ... Valve engineer who keeps decade-old Radeon GPUs alive on Linux, now pushes for AMDGPU to become the default driver ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"June 17, 2025\",\"url\":\"https://videocardz.com/newz/amd-ryzen-threadripper-9000-set-to-launch-in-july-up-to-26-faster-than-tr-7000-series\"}},{\"type\":\"knowledge\",\"title\":\"AMD Ryzen Threadripper\\u2122 Processors for Desktop Workstations\",\"url\":\"https://www.amd.com/en/products/processors/workstations/ryzen-threadripper.html\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"amd.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=amd.com\",\"site_name\":\"AMD\"},\"is_missing\":false,\"text\":\"AMD released the much-anticipated Threadripper\\u2122 PRO 7000 WX-Series with up to 96 core counts- the fastest workstation processor on the market1, built to handle high demanding workloads- from generative design and complex simulation to large-scale ...\\n\\nAMD released the much-anticipated Threadripper\\u2122 PRO 7000 WX-Series with up to 96 core counts- the fastest workstation processor on the market1, built to handle high demanding workloads- from generative design and complex simulation to large-scale software compilation and cinematic rendering. ... Ryzen Threadripper PRO 9000 WX-Series lauched \\u2014 bringing record-setting core counts, massive memory bandwidth, and next-gen platform capabilities to professional and enthusiast desktops. Whether rendering cinematic VFX, simulating real-world physics, or locally fine-tuning billion-parameter AI models , these processors are built to break bottlenecks and accelerate innovation. AMD extended its reach into professional workstations with the introduction of Threadripper PRO 3000 series workstations, building on Zen 2 architecture. These CPUs brought security, manageability, and scalability that enterprise professionals and creative studios needed.\\n\\nAMD released the much-anticipated Threadripper\\u2122 PRO 7000 WX-Series with up to 96 core counts- the fastest workstation processor on the market1, built to handle high demanding workloads- from generative design and complex simulation to large-scale software compilation and cinematic rendering. Ryzen Threadripper PRO 9000 WX-Series lauched \\u2014 bringing record-setting core counts, massive memory bandwidth, and next-gen platform capabilities to professional and enthusiast desktops. Whether rendering cinematic VFX, simulating real-world physics, or locally fine-tuning billion-parameter AI models , these processors are built to break bottlenecks and accelerate innovation. Since the initial release of AMD Threadripper over 5 years ago, MTI FILM has relied on its exceptional multi-core performance to power our Emmy\\u00AE Award-winning film restoration and video processing tools.\\n\\nAMD Ryzen\\u2122 Threadripper\\u2122 processors deliver battle-tested performance and capability to enable artists, architects, and engineers with the ability to get more done in less time.\\n\\nStefan Knerrich Rubin, Director of Post Production, Engineering \\u0026 Technology at Red Bull Media House North America ... AMD Ryzen Threadripper 9000 Series processors are designed for AI developers and built for enthusiasts who demand workstation-class performance in a desktop. Purpose-built to elevate productivity, with up to 64 \\u201CZen 5\\u201D cores and 128 threads allow effortless multitasking\\u2014and up to a massive 256 MB L3 cache delivers exceptional responsiveness and acceleration for complex tasks, demanding creative workloads, and AI development. Find a Retail Partner for High End Processors in Box \\u00B7 Choose the AMD TRX50 chipset for focused, full spectrum performance with up to 80 PCIe lanes and 4-channel memory and choose the AMD WRX90 chipset for the ultimate PCIe\\u00AE 5.0 expandability, 8-channel memory, and enterprise class manageability and security.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"2 weeks ago\",\"url\":\"https://www.amd.com/en/products/processors/workstations/ryzen-threadripper.html\"}},{\"type\":\"knowledge\",\"title\":\"AMD Ryzen Threadripper PRO 9000WX Content Creation Review | Puget Systems\",\"url\":\"https://www.pugetsystems.com/labs/articles/amd-ryzen-threadripper-pro-9000wx-content-creation-review/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"pugetsystems.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=pugetsystems.com\",\"site_name\":\"Puget Systems\"},\"is_missing\":false,\"text\":\"Mainline specifications are nearly identical, with the same core counts, cache setup, PCIe lanes, TDP, and base clock. The only top-level differences are the maximum boost clocks, which saw an increase of a few hundred megahertz at the top end, ...\\n\\nWe\\u2019re not going to get into the full details of all that that entails, but some top-level highlights are improved L1 and L2 data cache bandwidths (important for HPC workloads), support for true AVX-512 calculations, and overall higher IPC (instructions per cycle). We recommend interested readers check out Chips and Cheese\\u2019s article on the topic if they want to dive into the specifics. Much like Ryzen 9000 desktop processors, the Ryzen Threadripper PRO 9000 WX processors are drop-in compatible with existing WRX90 and TRX50 (socket sTR5) motherboards. We recommend updating the BIOS first, though, to ensure the system will boot properly. This means that we will be considering these CPUs both as a new build/platform upgrade and as a CPU-only upgrade. If you are interested in learning about the differences between the two motherboard platforms, we have an article on them. One reason you may not want to do only a CPU upgrade, however, is that the new Threadripper 9000 processors support fast\\n\\nBelow, we have listed the most relevant CPU specifications from AMD and Intel. For more information, visit Intel Ark or AMD\\u2019s Threadripper page. On the surface, the Threadripper PRO 9000WX processors appear to be an iterative improvement over the last-gen Threadripper PRO 7000WX processors. Mainline specifications are nearly identical, with the same core counts, cache setup, PCIe lanes, TDP, and base clock. The only top-level differences are the maximum boost clocks, which saw an increase of a few hundred megahertz at the top end, and the maximum supported RAM speed, which increased from 5200 to 6400 Mbps for the whole family. Of course, as we discussed briefly above, there are a lot of \\u201Cunder the hood\\u201D changes which aren\\u2019t reflected here. Alongside these comes a price bump of between about 10 and 20%. We\\u2019re not fans of these already-expensive components becoming even more expensive, but whether it is an acceptable increase depends quite a bit on how the performance shakes out.\\n\\nWe have not observed this behaviour with either the Threadripper PRO 7000 WX-Series or Threadripper PRO 9000 WX-Series, so those were tested with our standard settings: the \\u201CBalanced\\u201D plan. On the software side, we are using many of our PugetBench benchmarks, some of which were also used by AMD as part of the official AMD Ryzen Threadripper PRO 9000 WX-Series unveiling. We supplement them with several other real-world benchmarks, primarily rendering packages like Blender and V-Ray. We build computers tailor-made for your workflow. Configure a System! Get in touch with our technical consultants today. ... We choose our benchmarks to cover many workflows and tasks to provide a balanced look at the application and its hardware interactions. However, many users have more specialized workflows. Recognizing this, we like to provide individual results for benchmarks as well. If a specific area in an application comprises most of your work, examining those results will give a more accurate und\\n\\nHowever, it is also the most temperamental of the three Unreal Engine-related benchmarks we run, and so there were a few \\u201CDid not completes\\u201D in our results\\u2014specifically, from the 3565X and 9955X. Nonetheless, we see interesting results where the four 9000WX CPUs that completed were also the fastest, with even the 9965WX outperforming the 7995WX. ... Offline renderers like V-Ray and Blender are some of the best use cases for these processors. Although GPU rendering is becoming increasingly common, sometimes CPU rendering is preferred for accuracy or scalability. Unlike consumer processors, workstation-class processors like the AMD Threadripper PRO 9000WX have the power and RAM capacity to be a real alternative to GPU-based rendering for some users. They can also act as an interesting proxy for some HPC workflows. Starting with Cinebench 2024 multicore (Chart #1), we see huge generational gains from Threadripper PRO 7000WX.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"July 23, 2025\",\"url\":\"https://www.pugetsystems.com/labs/articles/amd-ryzen-threadripper-pro-9000wx-content-creation-review/\"}},{\"type\":\"knowledge\",\"title\":\"AMD Ryzen Threadripper 9000 Series: Full Specs, Benchmarks \\u0026 Use Cases\",\"url\":\"https://boxx.com/blog/hardware/amd-ryzen-threadripper-9000-series\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"boxx.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=boxx.com\",\"site_name\":\"BOXX Technologies\"},\"is_missing\":false,\"text\":\"Threadripper 9000 (TRX50 platform) scales to 64 cores / 128 threads with boost clocks up to 5.4GHz. Threadripper PRO 9000WX (WRX90 platform) extends that to 96 cores / 192 threads, 8\\u2011channel DDR5 with ECC, and up to 128 PCIe 5.0 lanes for ...\\n\\nGet full specs, benchmarks, and use cases for AMD Ryzen Threadripper 9000 Series. See how BOXX workstations boost performance for pro workloads.\\n\\nThreadripper 9000 (TRX50 platform) scales to 64 cores / 128 threads with boost clocks up to 5.4GHz. Threadripper PRO 9000WX (WRX90 platform) extends that to 96 cores / 192 threads, 8\\u2011channel DDR5 with ECC, and up to 128 PCIe 5.0 lanes for dense GPU and storage builds. Independent reviewers and AMD materials consistently show a meaningful generation\\u2011on\\u2011generation lift versus Threadripper 7000, typically around 21\\u201325% in creative and rendering tasks, with further gains in AVX\\u2011512\\u2013accelerated workloads. The result: more work done on the same schedule, or the same work done faster. Zen 5 is more than a boost in speed. Architectural refinements improve per\\u2011core performance, while higher boost ceilings and expanded L3 cache keep both lightly threaded and deeply parallel applications on pace. In practice, reviewers working through real projects and benchmark suites report a consistent gen\\u2011over\\u2011gen uplift versus Threadripper 7000, especially in media creation and rendering.\\n\\nFor independent creators and small studios, the Creativ Plus line delivers Threadripper 9000 performance tuned for everyday production tools. ... This is a solid choice for users in Maya, DaVinci Resolve, KeyShot, and Blender who want speed without the overhead. Modern VFX and finishing pipelines involve heavier sims, higher resolutions, and more iterations. Threadripper 9000\\u2019s combination of high boost clocks and many cores shortens render queues and keeps interactive work responsive. ... Independent reviewers measured a ~21\\u201325% generation\\u2011over\\u2011generation uplift in creative and rendering tasks moving from Threadripper 7000 to 9000 \\u00B7 In practice, that means more previews per day, quicker compositor feedback, and the ability to push higher quality without blowing the schedule \\u00B7 Multi\\u2011GPU T4 PRO builds also map cleanly to virtual production stages, where LED volumes, camera tracking, and real\\u2011time ray tracing need both CPU orchestration and GPU throughput \\u00B7\\n\\nZen 5-powered Threadripper 9000 \\u0026 PRO 9000WX: Deliver significant generational gains with up to 96 cores, 192 threads, 384 MB L3 cache, and PCIe 5.0 leadership for professional workloads. BOXX\\u2019s optimized workstation lineup: Includes APEXX T3, T4/T4 PRO, RAXX T3 PRO, and Creativ Plus, for needs from compact CAD systems to multi-GPU AI platforms. Verified performance benchmarks: AMD confirms leadership in Cinebench R24, V-Ray rendering, Adobe Creative Suite exports, and AI inference throughput. Industry-specific benefits: Faster VFX rendering, improved CAD responsiveness, accelerated CAE simulations, and secure, high-speed local AI training and inference. Enterprise-ready AMD PRO technologies: Provide hardware-level security, remote management, long-term platform stability, and reduced total cost of ownership. The newest AMD Ryzen\\u2122 Threadripper\\u2122 9000 and Threadripper\\u2122 PRO 9000WX processors, now available across the BOXX lineup, raise the performance ceiling again.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"August 28, 2025\",\"url\":\"https://boxx.com/blog/hardware/amd-ryzen-threadripper-9000-series\"}},{\"type\":\"knowledge\",\"title\":\"AMD Ryzen Threadripper 9000 Content Creation Review | Puget Systems\",\"url\":\"https://www.pugetsystems.com/labs/articles/amd-ryzen-threadripper-9000-content-creation-review/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"pugetsystems.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=pugetsystems.com\",\"site_name\":\"Puget Systems\"},\"is_missing\":false,\"text\":\"The Threadripper 9000 processors appear to be an iterative improvement over the last-gen Threadripper 7000 processors. Mainline specifications are nearly identical, with the same core counts, cache setup, PCIe lanes, TDP, and base clock. The only top-level differences are the maximum boost clocks, which saw an increase of a few hundred megahertz at the top end, and the maximum supported RAM speed, which increased from 5200 to 6400 Mbps for the whole family. Of course, as we discussed briefly above, there are a lot of \\u201Cunder the hood\\u201D changes that aren\\u2019t reflected here. Luckily, unlike the workstation-class Threadripper PRO 9000WX family that was released a week ago, there is no price bump for these HEDT processors. Comparing AMD\\u2019s Threadripper processors to Intel\\u00AE Xeon\\u00AE Workstation processors is difficult. AMD uses a traditional core-scaling schema with processors containing 16, 24, 32, 64, and 96.\\n\\nThe CPU still has an impact, but it is typically smaller than in some areas. The new 9000 Series does seem to improve performance a bit here as compared to a desktop processor or last-gen Threadripper, but ultimately, the GPU matters far more than any processor. Moving on to our Intraframe tests (Chart #3), the 9980X performs very well, with a 16% gen-on-gen performance increase over the 7980X. Right behind it are the 9960X and 9970X, with 17% and 7% uplifts, respectively. This is an area where the desktop parts, the 285K and 9950X3D, are relatively slow, tied for the lowest score. Our final codec-specific tests are the RAW tests (Chart #4). RAW media is typically very heavy on the CPU, and we see that represented here, with the 9980X topping the chart. There isn\\u2019t a huge difference between Threadripper 9000 and Threadripper 7000, though, with all of them being within the benchmark\\u2019s margin of error.\\n\\nMuch like the Ryzen 9000 desktop processors, the Threadripper 9000 processors are based on AMD\\u2019s Zen 5 microarchitecture. We\\u2019re not going to get into the full details of all that that entails, but some top-level highlights are improved L1 and L2 data cache bandwidths (important for HPC workloads), support for true AVX-512 calculations, and overall higher IPC (instructions per cycle). We recommend interested readers check out Chips and Cheese\\u2019s article on the topic if they want to dive into the specifics. AMD has also maintained socket compatibility with this generation of Threadripper processors, using the same sTR5 socket as Threadripper 7000. Existing TRX50 boards are fully compatible with a BIOS update. Due to this, we will consider these CPUs not only as a new build or full platform upgrade but also as drop-in replacements for an existing system.\\n\\nIf a specific area in an application comprises most of your work, examining those results will give a more accurate understanding of the performance disparities between components. Otherwise, we recommend skipping over this section and focusing on our more in-depth analysis in the following sections. ... Unreal Engine results are coming soon; we are holding off on uploading the raw results until we have further investigated the performance issues we found in this round of testing. ... In Adobe Photoshop, we see the perfect example of why we included desktop processors alongside the HEDT parts. Looking at the Overall score (Chart #1), the AMD Ryzen 9950X3D was the fastest CPU we tested and is far cheaper than any of the Threadripper processors. However, the new Threadripper 9000 CPUs are still very good. They average 20-30% performance gains over their Threadripper 7000 counterparts, with the 9960X performing particularly well, only 3% behind the 9950X3D.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"July 31, 2025\",\"url\":\"https://www.pugetsystems.com/labs/articles/amd-ryzen-threadripper-9000-content-creation-review/\"}},{\"type\":\"knowledge\",\"title\":\"New AMD Ryzen Threadripper 9000 Series and AMD Radeon AI Pro R9700 Series Details\",\"url\":\"https://www.servethehome.com/new-amd-ryzen-threadripper-9000-series-and-amd-radeon-ai-pro-r9700-series-details/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"servethehome.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=servethehome.com\",\"site_name\":\"ServeTheHome\"},\"is_missing\":false,\"text\":\"The AMD Ryzen Threadripper 9000 series and AMD Ryzen Threadripper Pro 9000 series extend AMD\\u2019s workstation lead over Intel\\u2019s solutions by updating platforms to Zen 5 with higher memory frequencies. AMD had many slides in its presentation, but here is the slide that has those key points with one other important fact: it is a same-socket (sTR5) upgrade in existing Threadripper 7000 series platforms. AMD Ryzen Threadripper 9000 Series Improvements Over The 7000 Series \\u00B7 Going back to the design objectives, we get a similar maximum core count and 350W TDP, but we get the updated AVX-512 datapath, Zen 5 generational improvements and more. Remember, the DDR5-6400 is the base speed, but we fully expect faster ECC RDIMM modules to come online for these platforms. AMD Ryzen Threadripper 9000 Series Design Objectives \\u00B7 Speaking of platforms, here is the platorm summary which should look familiar.\\n\\nThe AMD Ryzen Threadripper 9000 series is the high-end desktop (HEDT) part that only goes in the TRX50 platforms with 4-channel memory. ... For those wondering, the reason for having the TRX50 is simply to decrease the cost of motherboards. Standard server motherboards now cost well over twice what they did eight years ago and a lot of that is driven by more and faster I/O in terms of PCIe and DDR5. Fewer memory channels and PCIe lanes is a way to lower the cost of the systems by requiring the motherboards to be less complex. AMD had a bunch of other slides, but if you are very familiar with the Threadripper 7000 series, then this takes AMD\\u2019s leadership in workstation processors and increases the gap by usually 15-25% without increasing core counts. On the AMD GPU side we had new slides on the AMD Radeon Pro AI R9700. This new GPU uses RDNA 4 graphics and GDDR6 memory.\\n\\nThreadripper needs integrated graphics like AI Max\\u002B 395. Chiplet assembly to the rescue. ... Agree with that, but the AI Max\\u002B puts the AI NPU/GPU in the SOC, which makes sense since it\\u2019s highly MEM IO dependent, but doesn\\u2019t lend itself to replacing the Epyc/TR SOC. The epyc/TR SOC is chock full of pcie lanes and infinity fabric for io. I don\\u2019t think you can directly replace this with a strix halo soc without limiting mem and io which is a non-starter in the workstation market. I want to see a threadripper with on-package hbm and half the chiplets replaced with an RDNA4\\u002B GPU. Instead of getting 96C TR, you\\u2019d only get 48C (6x classic zen5 or maybe zen5c or x3d?) but you end up with 6x rdna chiplets (they don\\u2019t make these as chiplets yet) with HBM3/4 for on-die faster memory. Maybe that\\u2019s 3x 36GB hbm stacks and 3x rdna chiplets on the package?\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"June 18, 2025\",\"url\":\"https://www.servethehome.com/new-amd-ryzen-threadripper-9000-series-and-amd-radeon-ai-pro-r9700-series-details/\"}},{\"type\":\"knowledge\",\"title\":\"Designed to Deliver. Built for Breakthroughs. AMD Introduces New \\u201CZen 5\\u201D based Ryzen\\u2122 Threadripper\\u2122 PRO 9000 WX-Series Processors\",\"url\":\"https://www.amd.com/en/blogs/2025/amd-introduces-new-zen-5-based-ryzen-threadripper-pro.html\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"amd.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=amd.com\",\"site_name\":\"AMD\"},\"is_missing\":false,\"text\":\"Designed for professionals and ... comparisons with its predecessor, Threadripper PRO 7000, we see an IPC uplift of 16% across major workstation benchmarks - an...\\n\\nAnnounced a few weeks ago at Computex, the new Threadripper PRO 9000 WX-Series will be available in systems from AMD\\u2019s regional system integration partners as well as global OEMs, including Dell Technologies, HP, Lenovo and Supermicro starting July 23. DIY customers will also be able to purchase the new processors individually through AMD\\u2019s global network of channel partners. Engineered to adapt to the growing needs of AI with up to 96 \\u201CZen 5\\u201D CPU cores, enhanced AVX-512 support, 8-channel DDR5-6400 memory and uncompromising PCIe\\u00AE 5.0 connectivity for the latest high-end GPUs, this new generation of Threadripper PRO is the world\\u2019s fastest workstation processor available today1. Designed for professionals and businesses that demand top-tier performance, reliability and expandability, these processors provide unparalleled multi-core performance. In fixed-frequency comparisons with its predecessor, Threadripper PRO 7000, we see an IPC uplift of 16% across major workstation benchmarks - an\\n\\n3) PugetBench Adobe Premiere Pro, PugetBench Adobe After Effects, SPECviewperf 3ds Max, SPECapc Maya, Cinebench 2024 and V-Ray benchmarks to compare the performance of the AMD Ryzen Threadripper PRO 9995WX processor in a reference system configured with 8x 64GB DDR5 memory, Nvidia RTX PRO 6000 Blackwell graphics, 1TB SSD, Win 11 vs. a similarly configured BOXX workstation with the Intel\\u00AE Xeon\\u00AE W9-3595X processor. Workstation manufacturers may vary configurations, yielding different results. Results may vary. SHP-10. 4) Overclocking AMD processors, including without limitation, altering clock frequencies / multipliers or memory timing / voltage, to operate beyond their stock specifications will void any applicable AMD product warranty, even when such overclocking is enabled via AMD hardware and/or software. This may also void warranties offered by the system manufacturer or retailer.\\n\\nIncluded with the Threadripper PRO 9000 WX-Series processors are AMD PRO Technologies which add enterprise-level security and management features that modern businesses require. Business leaders and IT decision makers can take advantage of cutting-edge security features, robust manageability tools, and enterprise-grade stability to give fast, reliable performance in any situation. AMD Ryzen Threadripper PRO 9000 WX-Series processors \\u00B7 AMD Ryzen Threadripper PRO 9000 WX-Series processors continue to offer leadership performance in demanding professional applications and heavy multitasking workloads. With an industry-leading 96 cores and 192 threads \\u2013 the most cores of any workstation processor available today \\u2013 complex simulations, generative design, rendering, AI inference and software compilation tasks benefit hugely from this massive processing power and deliver performance levels previously unheard of in a workstation-class CPU.\\n\\nThe AMD Ryzen Threadripper PRO 9000 WX-Series processors offer a wide range of motherboard features tailored to meet the distinct needs of workstation professionals. High-End PCIe\\u00AE 5.0 GPU Support for AI and Machine Learning \\u00B7 Threadripper PRO 9000 WX-Series processors are ideal for local AI fine-tuning, inference and application development thanks to support for up to 128 PCIe 5.0 lanes which provides maximum performance for advanced set-ups with multiple GPUs and NVMe storage. Threadripper PRO-powered workstations augment your datacenter with a departmental solution which is great for a smaller group of users and can help you keeping costs under control. When running a context-based prompting inference test using DeepSeek R1 32B, we are seeing a 49% better performance of Threadripper PRO 9000 over Intel5. This impressively demonstrates how important a powerful CPU is even when AI processing is set to use the GPU.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"July 17, 2025\",\"url\":\"https://www.amd.com/en/blogs/2025/amd-introduces-new-zen-5-based-ryzen-threadripper-pro.html\"}},{\"type\":\"knowledge\",\"title\":\"AMD launches Threadripper Pro 9000 WX-series CPUs with up to 96 Zen 5 cores for $11,699 \\u2014 Shimada Peak and Radeon AI Pro R9700 arrive on July 23 | Tom\\u0027s Hardware\",\"url\":\"https://www.tomshardware.com/pc-components/cpus/amd-launches-threadripper-pro-9000-wx-series-cpus-with-up-to-96-zen-5-cores-for-usd11-699-shimada-peak-and-radeon-ai-pro-r9700-arrive-on-july-23\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"tomshardware.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=tomshardware.com\",\"site_name\":\"Tom\\u0027s Hardware\"},\"is_missing\":false,\"text\":\"The most substantial enhancement in the Ryzen Threadripper 9000 WX-series processors is rooted in their architectural design. The Shimada Peak chips incorporate AMD\\u0027s latest Zen 5 cores, which offer notable IPC (Instructions Per Cycle) improvements compared to the Zen 4 cores used in the current Ryzen Threadripper 7000 WX-series (codenamed Storm Peak) processors. From a specification perspective, Shimada Peak possesses identical base clock speeds to Storm Peak. Nonetheless, AMD has enhanced the clock speeds to reach up to 5.4 GHz, yielding a boost of approximately 100 MHz to 300 MHz depending on the SKU. The L3 cache configuration remains unaltered, comprising 64MB for 16 cores, 128MB for 24 and 32 cores, 256MB for 64 cores, and 384MB for 96 cores. The TDP also remains consistent, with all Shimada Peak processors reaching a maximum of 350W. ... The Threadripper Pro 9995WX has a SEP (Suggested Etail Price) of $11,699, which is 17% higher than the Threadripper Pro 7995WX it replaces.\\n\\nCPUs AMD\\u0027s Krackan Point APUs tipped to be arriving for desktop soon as Ryzen 9000G series \\u00B7 CPUs Retailers quietly slash prices of AMD\\u0027s and Intel\\u0027s latest EPYC and Xeon CPUs by up to 50% CPUs AMD reveals new CPU roadmap with Zen 6 slated for 2026, confirms Zen 7 for the first-time \\u00B7 SSDs Pick up a Ryzen 9 9950X3D for less than a 9800X3D in this Early Prime Day deal bundle from MSI \\u00B7 CPUs AMD mobile CPU roadmap leak claims Zen 6 arrives in 2027 ... AMD celebrates the fifth anniversary of the Ryzen Threadripper Pro with a bang. When you purchase through links on our site, we may earn an affiliate commission. Here\\u2019s how it works. ... We have added the Threadripper Pro 9945WX to the Threadripper Pro 9000 WX-series lineup. The 12-core SKU wasn\\u0027t part of AMD\\u0027s original blog post but has been listed on the company\\u0027s website. ... Gaming-optimized Ryzen 5 7500X3D spotted at UK retailer, new six-core budget CPU apparently readied for launch \\u00B7\\n\\nAMD shares the pricing and release date for the Ryzen Threadripper 9000 WX-series processors and Radeon AI Pro R9700 graphics cards for professional and workstation users.\\n\\nAMD offers two different chipsets for Shimada Peak. The TRX50 chipset, compatible with both HEDT and Pro chips, delivers four-channel support for DDR5-6400 RDIMMs, up to 1TB, and up to 80 usable PCIe 5.0 lanes. On the contrary, the WRX90 chipset only supports the Pro parts but offers eight-channel DDR5-6400 RDIMM support up to 2TB and 128 usable PCIe 5.0 lanes. The Ryzen Threadripper 9000 Pro WX-series processors and Radeon AI Pro R9700 will release on July 23. The Threadripper chips will be available individually through AMD\\u0027s global partners and from OEMs, including Dell Technologies, HP, Lenovo, and Supermicro. Meanwhile, the Radeon AI Pro R9700 will initially be available through pre-built workstation systems, while standalone graphics cards are expected to arrive in the third quarter of this year. Follow Tom\\u0027s Hardware on Google News to get our up-to-date news, analysis, and reviews in your feeds.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"July 17, 2025\",\"url\":\"https://www.tomshardware.com/pc-components/cpus/amd-launches-threadripper-pro-9000-wx-series-cpus-with-up-to-96-zen-5-cores-for-usd11-699-shimada-peak-and-radeon-ai-pro-r9700-arrive-on-july-23\"}},{\"type\":\"knowledge\",\"title\":\"AMD Threadripper PRO 9000 Series Announced - Zen 5 Workstation CPUs\",\"url\":\"https://www.exxactcorp.com/blog/news/amd-threadripper-pro-9000-series-announced\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"exxactcorp.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=exxactcorp.com\",\"site_name\":\"Exxact Corp\"},\"is_missing\":false,\"text\":\"... Powered by the Zen 5 architecture ... dynamics research. AMD reports significant improvements with a 22% increase in multi-threaded performance and 16% higher instructions per clock (IPC) efficiency....\\n\\nWe will go over the changes, improvements, and specifications for these next-generation processors. Exxact will feature the AMD Threadripper 9000 Series processors in our workstations when they become available, projected in Q3 2025. The AMD Threadripper 9000 Series processors have much in common with the last generation. The SKU stack remains unchanged with the same core counts, base clocks, TDP, and L3 cache. But the AMD Threadripper 9000 Series has a couple of minor yet impactful changes compared to the last generation AMD Threadripper 7000. ... Powered by the Zen 5 architecture first found in Ryzen 9000 and EPYC 9005, these processors deliver enhanced workstation performance for AI computation, engineering simulations, and molecular dynamics research. AMD reports significant improvements with a 22% increase in multi-threaded performance and 16% higher instructions per clock (IPC) efficiency.\\n\\nDiscover AMD\\u0027s Threadripper PRO 9000 Series processors featuring Zen 5 architecture, enhanced boost clocks, and DDR5-6400 memory support for professional workstations.\\n\\nWhile base clocks remain the same, per-core boost clocks did increase across all models by 100MHz to 300MHz. While the difference looks minimal, considering the number of cores AMD Threadripper PRO and non-PRO have, this can contribute to a big performance gain across workloads that leverage a lot of cores. Memory support has been bumped up from DDR5-5200 to DDR5-6400 for improved data transfer rates and reduced latency. This is beneficial for memory-intensive workloads like 3D rendering and scientific simulations, maximizing the potential of the AMD Threadripper 9000\\u2019s high core counts. The AMD Threadripper 9000 Series will be the choice workstation processor for accelerating high-performance computing. The combination of Zen 5 architecture improvements and faster DDR5 memory particularly shines in these compute-intensive tasks, where every percentage of performance gain can translate to significant time savings in real-world applications.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.exxactcorp.com/blog/news/amd-threadripper-pro-9000-series-announced\"}},{\"type\":\"knowledge\",\"title\":\"AMD Threadripper 9000 vs Threadripper PRO 9000WX | Puget Systems\",\"url\":\"https://www.pugetsystems.com/labs/articles/amd-threadripper-9000-vs-threadripper-pro-9000wx/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"pugetsystems.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=pugetsystems.com\",\"site_name\":\"Puget Systems\"},\"is_missing\":false,\"text\":\"For more data and insights, on the Threadripper 9000 side, we also recommend ServeTheHome\\u2018s and Techspot\\u2018s written reviews; the video-inclined may be interested in Level1Tech\\u2019s Windows and Linux reviews or TechNotice\\u2019s 9970X review. In this article, we will look at the differences between the Threadripper and Threadripper PRO product families in terms of three primary factors: ... Here are the most relevant CPU specifications from AMD. For more information, visit AMD\\u2019s Threadripper page: Besides price, little distinguishes the Threadripper and Threadripper PRO processors in terms of top-level specifications. On a per-core basis, they have the same amount of cache, base and boost clocks, memory speed support, and maximum PPT (power usage). The Threadripper PRO processor family does have more varieties of core counts and costs significantly more per-core.\\n\\nWhen we talk about a platform, we mean the combination of the motherboard features, the chipset, and the processor. We typically shorthand this into just the chipset names: TRX50 and WRX90. TRX50 is the HEDT chipset designed for Threadripper 9000, while WRX90 is the workstation chipset designed for Threadripper PRO 9000WX. Below, we\\u2019ve highlighted the major platform differences, but for more information, you can look at our TRX50 vs. WRX90 article: As you can see, WRX90 is a more capable platform than TRX50 \\u2013 but it only supports Threadripper PRO processors. TRX50 is designed for Threadripper but does also support Threadripper PRO processors, though using that combination will limit the CPU somewhat. Specifically, TRX50 boards officially only support up to 4-channel memory (although Gigabyte offers an 8-channel board in their TRX50 AI Top), 88 PCIe lanes, and lack many of the AMD PRO features.\\n\\nFor a given core count, most of the major specifications are the same between Threadripper 9000 and Threadripper PRO 9000WX; similarly, all of them are built on the same microarchitecture. The biggest distinctions come from the platform capabilities, many of which don\\u2019t traditionally have huge impacts on performance, except for memory bandwidth. However, CPUs are complicated pieces of engineering, so we still wanted to put the processors head-to-head to see if there are any significant performance differences. The big things we are looking out for here are whether the broader core-count range of the PRO processors makes them particularly well-suited for some tasks, and whether the increased memory bandwidth they offer makes a difference. As to the former, this really just means seeing if the 96-core or 16-core Threadripper PRO CPUs are particularly performant (or not).\\n\\nStarting off with media and entertainment workflows in applications like Photoshop and DaVinci Resolve, we see that there is not a lot of difference between the Threadripper PRO 9000WX and Threadripper 9000 processors. Most of the applications have a preference for either single-core or multi-core performance, but at a given core count, performance is nearly identical. None of these applications tends to be particularly memory bandwidth sensitive, so the additional memory channels add very little. Additionally, we didn\\u2019t observe that any of the applications were able to properly take advantage of the 96-core 9995WX, even for specific subtasks. Programming for that many threads is difficult, and this sort of software doesn\\u2019t typically need the boost it could give to some workflows. Overall, we think the 9960X will probably be the best CPU among them in terms of price-to-performance for most media and entertainment workflows.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"August 7, 2025\",\"url\":\"https://www.pugetsystems.com/labs/articles/amd-threadripper-9000-vs-threadripper-pro-9000wx/\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"68b0def8-338c-408b-9fc5-a74a4295170a\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

