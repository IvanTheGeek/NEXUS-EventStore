text = "**Key differences:**\n\n**Platform/Chipset:**\n- Threadripper: TRX50 chipset only\n- Threadripper PRO: WRX90 chipset (or can use TRX50 with limitations)\n\n**Memory:**\n- Threadripper: 4-channel DDR5, up to 1TB RDIMM\n- Threadripper PRO: 8-channel DDR5, up to 2TB RDIMM on WRX90\n\n**PCIe Lanes:**\n- TRX50: 88 usable PCIe 5.0/4.0 lanes\n- WRX90: 144 usable PCIe 5.0/4.0 lanes\n\n**Core Count:**\n- Threadripper: Max 64 cores (9980X)\n- Threadripper PRO: Max 96 cores (9995WX)\n\n**Compatibility quirk:**\n- Threadripper PRO CPUs work on TRX50 boards (limited to 4-channel memory)\n- Non-PRO CPUs do NOT work on WRX90 boards\n\n**PRO-specific features:**\n- AMD Shadow Stack and other enterprise security features\n- Remote management via BMC/IPMI on WRX90 boards\n\n**Cost implication:**\n- TRX50 boards: $900+\n- WRX90 boards: $1,300+\n\n**For your dual GPU setup:** TRX50 + standard Threadripper (24-64 cores) gives you full x16/x16 PCIe 5.0 with 4-channel memory. Only need PRO/WRX90 if you require 8-channel memory bandwidth or 96 cores."

