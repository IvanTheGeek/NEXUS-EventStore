text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"AMD TRX50 \\u0022Threadripper 7000\\u0022 Motherboards Official Prices Revealed: ASUS $899, ASRock $799, Gigabyte $599\",\"url\":\"https://wccftech.com/amd-trx50-threadripper-7000-motherboards-official-prices-asus-899-asrock-799-gigabyte-599/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"wccftech.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=wccftech.com\",\"site_name\":\"Wccftech\"},\"is_missing\":false,\"text\":\"The motherboard is priced at $599.99 US and will retail on the 6th of December. Follow Wccftech on Google to get more of our news coverage in your feeds. Read all comments on AMD TRX50 \\u201CThreadripper 7000\\u201D Motherboards Official Prices Revealed: ...\\n\\nAMD TRX50 motherboards from ASUS, ASRock \\u0026 Gigabyte have been listed with official prices \\u0026 launch next month with Threadripper 7000 support. The AMD Ryzen Threadripper 7000 CPUs have been available since 21st November but it looks like users will have to wait till next month to get their hands on the latest TRX50 motherboards and even more for the higher-end WRX90 motherboards. With that said, we now have the official prices for these high-end designs which you can read about below along with how the three boards are compared to each other in terms of specifications and features. The ASUS PRO WS TRX50-SAGE WIFI Motherboard features the sTR5 (SP6 / LGA 4844) socket which supports both AMD Threadripper 7000WX \\u0026 Ryzen Threadripper 7000 CPUs. The socket is powered by 36 power stages which are delivered power by two 8-pin connectors (one more is reserved for OC needs) \\u0026 are cooled by a large VRM cooling solution that features several aluminum fins and a large heat-pipe array.\\n\\nAMD sTR5 socket supports up to 96-core CPUs: Ready for AMD Ryzen Threadripper PRO 7000 WX-Series Processors and AMD Ryzen Threadripper 7000 Series Processors. CPU and memory overclocking: Support for up to 1TB ECC R-DIMM DDR5 memory modules (1DPC) Robust power and thermal design: 36 power stages with two 8-pin power connectors for the CPU, massive VRM cooling, chipset M.2 heatsinks, and M.2 thermal pad. Ultrafast connectivity: three PCIe 5.0 x16 slots, 10 Gb \\u0026 2.5 Gb LAN ports, three M.2 slots, front and rear USB 20Gbps Type-C and SlimSAS NVMe support. Server-grade IPMI remote management: hardware and software support for ASUS IPMI expansion cards, plus ASUS Control Center Express software for real-time monitoring and management \\u00B7 Trusted stability: Validated for extensive compatibility with the latest technologies, an expansive QVL list, and tested for 24/7 operation \\u00B7 Other features of the ASUS Pro WS TRX50-SAGE WIFI motherboard include full overclocking for the AMD Ryzen Threadrippe\\n\\nThe CPU socket is powered by a 16\\u002B8\\u002B4 phase VRM and comes in a right-angled layout, surrounded by four DIMMs which confirms a quad-channel DDR5 array. The WRX90 platforms will adopt the 8-channel memory array. The CPU socket is powered by dual 8-pin connectors and the standard 24-pin ATX connector. ... For expansion, the motherboard features three PCIe Gen 5.0 x16 slots, four M.2 Gen5x4 slots, and a strong array of USB ports. The motherboard also features a heatsink for each of the four M.2 slots \\u0026 there are also 8 SATA III ports. The whole design language is very durable in nature with silver colors \\u0026 very simplistic aesthetics. The motherboard is priced at $599.99 US and will retail on the 6th of December. Follow Wccftech on Google to get more of our news coverage in your feeds. Read all comments on AMD TRX50 \\u201CThreadripper 7000\\u201D Motherboards Official Prices Revealed: ASUS $899, ASRock $799, Gigabyte $599\\n\\nThe ASRock TRX50 WS motherboard comes with an impressive design that offers enthusiasts the SP6 socket with a powerful 18\\u002B3\\u002B3 phase power delivery that makes use of 110A SPS power stages. The motherboard is made up of a server-class 12-layer PCB design and the motherboard features 3 8-pin ATX connectors, 2 8-pin ATX 12V, and 2 6-pin ATX 12V connectors. All of these connectors are required to be plugged in for CPU \\u0026 memory overclocking. The VRMs are cooled by two massive heatsinks which feature two fans each so that\\u0027s four active fans in total on the motherboard. The heatsinks also feature extended heatpipe solutions. ... 4 SATA3, 1 Blazing M.2 (PCIe Gen5 x4), 1 Hyper M.2 (PCIe Gen4 x4), 1 MCIO (PCIe Gen5 x4), 2 SlimSAS (PCIe Gen4 x4 / 4 SATA3) 1 USB 3.2 Gen2x2 Type-C (Rear), 2 USB 3.2 Gen2 Type-C (1 Rear, 1 Front), 4 USB 3.2 Gen2 Type-A (Rear), 4 USB 3.2 Gen1 (2 Rear, 2 Front), 4 USB 2.0 (Front) ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"November 24, 2023\",\"url\":\"https://wccftech.com/amd-trx50-threadripper-7000-motherboards-official-prices-asus-899-asrock-799-gigabyte-599/\"}},{\"type\":\"knowledge\",\"title\":\"AMD Ryzen Threadripper\\u2122 Processors for Desktop Workstations\",\"url\":\"https://www.amd.com/en/products/processors/workstations/ryzen-threadripper.html\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"amd.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=amd.com\",\"site_name\":\"AMD\"},\"is_missing\":false,\"text\":\"AMD Ryzen Threadripper 9000 Series processors are designed for AI developers and built for enthusiasts who demand workstation-class performance in a desktop. Purpose-built to elevate productivity, with up to 64 \\u201CZen 5\\u201D cores and 128 threads allow effortless multitasking\\u2014and up to a massive 256 MB L3 cache delivers exceptional responsiveness and acceleration for complex tasks, demanding creative workloads, and AI development. Find a Retail Partner for High End Processors in Box \\u00B7 Choose the AMD TRX50 chipset for focused, full spectrum performance with up to 80 PCIe lanes and 4-channel memory and choose the AMD WRX90 chipset for the ultimate PCIe\\u00AE 5.0 expandability, 8-channel memory, and enterprise class manageability and security. ... Detailed whitepapers on key topics with expert insights. Raising the Bar on Workstation Performance Redefining the Art of the Possible \\u00B7\\n\\nPugetBench Adobe Premiere Pro, PugetBench Adobe After Effects, SPECviewperf 3ds Max, SPECapc Maya, Cinebench 2024 and V-Ray benchmarks to compare the performance of the AMD Ryzen Threadripper PRO 9995WX processor in a reference system configured with 8x 64GB DDR5 memory, Nvidia RTX PRO 6000 Blackwell graphics, 1TB SSD, Win 11 vs. a similarly configured BOXX workstation with the Intel\\u00AE Xeon\\u00AE W9-3595X processor. Workstation manufacturers may vary configurations, yielding different results. Results may vary. SHP-10. SPECviewperf 2020 v3.1 Solidworks/Creo/CATIA/SNX, SPECapc Creo 9.1.0 (AA = On), SPECapc Solidworks 2024 (FSAA, 4K) and Keyshot Viewer 2025.1 benchmarks to compare the performance of the AMD Ryzen Threadripper PRO 9995WX processor in a reference system configured with 8x 64GB DDR5 memory, Nvidia RTX PRO 6000 Blackwell graphics, 1TB SSD, Win 11 vs.\\n\\nAMD Ryzen\\u2122 Threadripper\\u2122 processors are the ultimate workstation processor for artists, architects, and engineers - powering innovation from day one. ... When deadlines are non-negotiable, creators, AI developers, architects, and engineers need a desktop workstation that excels. From enterprise-class security and exceptional manageability to unlocked performance and customization, AMD Ryzen\\u2122 Threadripper\\u2122 empowers professionals and enthusiasts to get more done in less time. Save up to 27 minutes for every hour of productivity on the fastest workstation processors on the market.1 \\u00B7 Designed for artists, architects, engineers, and AI developers, AMD Ryzen Threadripper processors excel in both multi-threaded and lightly threaded workflows. Built on the latest AMD \\u201CZen 5\\u201D architecture, these processors deliver unmatched performance and expandability.\\n\\nAMD Ryzen Threadripper processors, in enterprise-class PRO workstations or enthusiast-level high-end desktops, support a range of advanced configurations to meet the demands of heavy visual workloads, local AI development, and complex simulations. ... Experience more efficient workloads, enhanced creativity, and freedom from cloud costs with on-device generative AI like LLMs and diffusion models, powered by AMD Ryzen Threadripper processors. Whether you\\u0027re designing a product or developing AI, Threadripper processors deliver the compute performance, memory capabilities, and platform flexibility to accelerate every phase of your project\\u2014from conception to final production. Accelerate architectural workflows like editing point clouds, rendering and virtual reality. ... Reduce simulation and render times while the system stays productive. ... Tear through complex rendering and VFX workloads while increasing creative iterations.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"2 weeks ago\",\"url\":\"https://www.amd.com/en/products/processors/workstations/ryzen-threadripper.html\"}},{\"type\":\"knowledge\",\"title\":\"AMD\\u0027s \\u0022Cheap\\u0022 Threadripper HEDT CPU: 7960X 24-Core CPU Review \\u0026 Benchmarks | GamersNexus\",\"url\":\"https://gamersnexus.net/cpus/amds-cheap-threadripper-hedt-cpu-7960x-24-core-cpu-review-benchmarks\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"gamersnexus.net\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=gamersnexus.net\",\"site_name\":\"GamersNexus\"},\"is_missing\":false,\"text\":\"The AMD Threadripper 7960X CPU is a 24C/48T part with 1.5MB of L1 Cache, 24MB of L2, and 128MB of L3 cache. The PPT max is still 350W, alongside TDP, and it\\u2019s fully unlocked. The CPU has four memory channels. For I/O options, the TRX50 HEDT platform offers a total of 92 PCIe lanes, or 88 usable. Maximally 48 of those can be PCIe Gen5. The platform also has options for ECC memory. If you haven\\u0026#x27;t been following the Threadripper news, basically these are targeted at sort of professional users; maybe not quite in the area of pro. They\\u0026#x27;ve got the WRX90 platform for that, but for HEDT, you\\u0026#x27;re still in that sort of enthusiast class entering workstation territory and that\\u0026#x27;s what we\\u0026#x27;re going to be looking at today. You can learn more about the platform and PCIe support in our writeup here. For now though, let\\u0026#x27;s get into the benchmarking. Since efficiency was such a big part of the 7980X review, we\\u2019ll start with power consumption.\\n\\nThe AMD Threadripper 7960X CPU is a 24C/48T part with 1.5MB of L1 Cache, 24MB of L2, and 128MB of L3 cache. The PPT max is still 350W, alongside TDP, and it\\u2019s fully unlocked. The CPU has four memory channels. For I/O options, the TRX50 HEDT platform offers a total of 92 PCIe lanes, or 88 usable. Maximally 48 of those can be PCIe Gen5. The platform also has options for ECC memory. If you haven\\u0027t been following the Threadripper news, basically these are targeted at sort of professional users; maybe not quite in the area of pro. They\\u0027ve got the WRX90 platform for that, but for HEDT, you\\u0027re still in that sort of enthusiast class entering workstation territory and that\\u0027s what we\\u0027re going to be looking at today. You can learn more about the platform and PCIe support in our writeup here. For now though, let\\u0027s get into the benchmarking. Since efficiency was such a big part of the 7980X review, we\\u2019ll start with power consumption.\\n\\nThe \\u201Ceconomical\\u201D HEDT Threadripper provides an interesting mix of high frequency, high core count, and robust I/O options at a relatively affordable cost. ... Grab a GN Soldering \\u0026 Project Mat for a high-quality work surface with extreme heat resistance. These purchases directly fund our operation, including our build-out of the hemi-anechoic chamber for our acoustic testing! (or consider a direct donation or a Patreon contribution!) AMD didn\\u2019t send its Ryzen Threadripper 7960X out to reviewers. We\\u2019ve already reviewed the 7980X and 7970X and bought this \\u201Ccheaper\\u201D CPU for $1,500 for today\\u2019s review, and it\\u2019s a 24-core, 48-thread part that sockets into the new HEDT motherboards in socket sTR5. The CPU claims a boost clock up to 5.3GHz single-core, which would make it fast for a Threadripper CPU. By HEDT standards today, where the 7970X is $2,500, the 7960X is a \\u201Ccheap\\u201D CPU.\\n\\nIt\\u2019s still about $1,000 more expensive than a 7950X though, which itself has 16 cores. That\\u2019s a big jump in price for an extra 8 full cores, and the boards are also a huge jump in price. Although they\\u2019re not all launched yet, it looks like several of the HEDT Threadripper motherboards will be in the $1,000\\u002B price class. But more so than the core count increase, the more significant increase with the 7960X is in I/O capabilities. It\\u2019s an interesting balance of higher frequency, still high core count, and fuller I/O options as compared to desktop parts like the 7950X or 14900K. Editor\\u0027s Note: This was originally published as a video on December 11, 2023. We are now publishing it as an article with no changes. ... This 24-core HEDT Threadripper part almost seems like the boring option and maybe that\\u0027s why it wasn\\u0027t sent out for review because in comparison to a 64-core or 32-core part, 24 just seems almost too close to normal but it\\u0027s still a really potentially useful part because there a\\n\\nIn this one, the 7960X performed impressively in some tests even in spite of the heavily reduced core count. WPC_CFD is based on OpenFOAM\\u2019s combustion CFD solver. The 7960X scored 13.65 points here, putting it close in performance to the 7970X and 7980X, relatively speaking. The scaling isn\\u2019t that favorable for the higher core count Threadripper parts, but is favorable enough to establish a large gulf between the 7960X and the mainstream desktop parts. The Rodinia CFD solver tests scale more cleanly, with the 7980X leading the 7970X by 62%, which itself leads the 7960X by 33%, but the 7960X (and 7970X) were outperformed by the 14900K in this test, with the 7960X also outperformed by AMD\\u2019s 7950X. The CalculiX testing had the 7960X at 5.12, leading the mainstream Intel part by 34%. Next up are the Spec Life Sciences \\u0026 Biomedical tests. These tests look at LAMMPS, which Spec.org says \\u201Cis a molecular dynamics simulator that consists of five tests simulating a variety of molecular propertie\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://gamersnexus.net/cpus/amds-cheap-threadripper-hedt-cpu-7960x-24-core-cpu-review-benchmarks\"}},{\"type\":\"knowledge\",\"title\":\"Asus \\u0022HEDT\\u0022 TRX50 Motherboard Retails For Eye-Watering $1,100 | Tom\\u0027s Hardware\",\"url\":\"https://www.tomshardware.com/news/asus-hedt-trx50-motherboard-retails-close-to-1100-dollars\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"tomshardware.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=tomshardware.com\",\"site_name\":\"Tom\\u0027s Hardware\"},\"is_missing\":false,\"text\":\"The PC world has welcomed AMD\\u0027s return to HEDT CPUs with Threadripper 7000, which competes against the company\\u0027s previous Threadripper chips for the best CPUs for workstations. But that welcome might not last very long if TRX50 motherboards are as expensive as a retail listing suggests. Spotted by X (formerly Twitter) PC hardware sleuth @momomo_us, a retail listing for Asus\\u0027s TRX50-Sage WiFi motherboard shows a price tag of nearly $1,100, which is more in line with workstation pricing than HEDT pricing. AMD\\u0027s last HEDT CPU, Threadripper 3000, didn\\u0027t have cheap motherboards, but even the highest-end models capped out at around $700, with many good models being available for $500. At over $1,000, this TRX50 board is about as expensive as workstation class WRX80E boards for Threadripper Pro 5000 WX-series CPUs while lacking workstation features like octa-channel memory.\\n\\nOn the other hand, it\\u0027s very possible that this listing won\\u0027t be representative of TRX50 motherboards as a whole or even Asus\\u0027s TRX50-Sage WiFi. @momomo_us only provided a screenshot of the listing rather than a link, and it\\u0027s unclear which retailer made the listing. It\\u0027s certainly not a well-known store like Amazon, Newegg, or B\\u0026H Photo. ... AMD Announces Threadripper HEDT and Pro 9000-Series CPUs: 96 cores and 192 threads for Desktops and Workstations \\u00B7 The price tag itself is also strange, being exactly $1,087.96. Most motherboards, including those for HEDT and workstations, sell for average prices, like Asus\\u0027s $999 Pro WS WRX80E-Sage SE. That and the fact that the motherboard isn\\u0027t in stock could mean the price isn\\u0027t realistic. Many retailers list PC components that haven\\u0027t come out yet, and it\\u0027s not unusual to see high prices that turn out to be misleading.\\n\\nIt would be strange for AMD to launch a $1,500 CPU that would be paired with $1,000 motherboards, so it\\u0027s possible that this listing doesn\\u0027t tell us the actual price of upcoming TRX50 motherboards. If true, though, Threadripper 7000 might be lucky to have even a lukewarm reception. Stay On the Cutting Edge: Get the Tom\\u0027s Hardware Newsletter \\u00B7 Get Tom\\u0027s Hardware\\u0027s best news and in-depth reviews, straight to your inbox. ... Matthew Connatser is a freelancing writer for Tom\\u0027s Hardware US. He writes articles about CPUs, GPUs, SSDs, and computers in general. ... AMD Announces Threadripper HEDT and Pro 9000-Series CPUs: 96 cores and 192 threads for Desktops and Workstations ... AMD\\u0027s Threadripper 9995WX stuns in Cinebench R23 \\u2014 new Ryzen flagship reportedly 73% faster than its predecessor \\u00B7 ASRock launches new AMD motherboards at Computex 2025 ... Microsoft follows Nvidia\\u0027s lead, surpasses $4 trillion market capitalization on soaring demand for cloud services, multi-front AI endeavors \\u00B7\\n\\nMore like HEHEDT.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"November 11, 2023\",\"url\":\"https://www.tomshardware.com/news/asus-hedt-trx50-motherboard-retails-close-to-1100-dollars\"}},{\"type\":\"knowledge\",\"title\":\"Gigabyte Announces the TRX50 AI TOP Motherboard for AMD Threadripper | TechPowerUp\",\"url\":\"https://www.techpowerup.com/323548/gigabyte-announces-the-trx50-ai-top-motherboard-for-amd-threadripper\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"techpowerup.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=techpowerup.com\",\"site_name\":\"TechPowerUp\"},\"is_missing\":false,\"text\":\"TR Pro, in this case, being even pricier and you\\u0026#x27;d only lose important things by using such a chip on a TRX50 board, like the octa-channel memory support. Seems that AMD is trying to pull the same branding and market positioning that Nvidia did with Titan, to justify the ever higher prices, they started to distance Titan from the GeForce brand, so much that after the Maxwell \\u0026quot;GeForce GTX Titan X\\u0026quot;, they just dropped GeForce from the name and renamed it the \\u0026quot;NVIDIA Titan\\u0026quot; for the subsequent models (X (Pascal), Xp, V, RTX), until they just did away with the brand entirely and created the x90 segment to bridge between workstation and consumer graphics, with what is essentially a badly overpriced gaming card. Here we have the same deal, AMD is seemingly distancing this segment from the Ryzen brand, until the third generation they were clearly labeled \\u0026quot;AMD Ryzen Threadripper\\u0026quot;, but now they dropped the Ryzen branding from the CPUs and all the marketing materials, boxes, etc.\\n\\nAt Computex last week, we got a first look at Gigabyte\\u0027s new TRX50 AI TOP motherboard\\u2014where TOP stands for trillions of operations per second\\u2014designed for AMD\\u0027s Threadripper and Threadripper Pro CPUs. Now the company has released the full specifications of the TRX50 AI TOP and the board is packed to the brim with features. The E-ATX board is home to four PCIe x16 slots, all of which can operate in PCIe 5.0, but one can be limited to PCIe 4.0, depending on your choice of CPU. There\\u0027s also four NVMe M.2 slots, with CPU dependent functionality. Other features include eight DIMM slots, but these are again CPU dependent, two 10 Gbps Ethernet interfaces via a pair of Marvell AQtion AQC113C controllers, WiFi 7 via a Qualcomm QCNCM865 module and dual audio chips, one for the rear ports and one for the front panel audio. As this is a 2024 model, USB4 is of course also part of the package, but only one of the two USB4 supports DP Alt-mode, due to there only being one DP input.\\n\\nTR Pro, in this case, being even pricier and you\\u0027d only lose important things by using such a chip on a TRX50 board, like the octa-channel memory support. Seems that AMD is trying to pull the same branding and market positioning that Nvidia did with Titan, to justify the ever higher prices, they started to distance Titan from the GeForce brand, so much that after the Maxwell \\u0022GeForce GTX Titan X\\u0022, they just dropped GeForce from the name and renamed it the \\u0022NVIDIA Titan\\u0022 for the subsequent models (X (Pascal), Xp, V, RTX), until they just did away with the brand entirely and created the x90 segment to bridge between workstation and consumer graphics, with what is essentially a badly overpriced gaming card. Here we have the same deal, AMD is seemingly distancing this segment from the Ryzen brand, until the third generation they were clearly labeled \\u0022AMD Ryzen Threadripper\\u0022, but now they dropped the Ryzen branding from the CPUs and all the marketing materials, boxes, etc.\\n\\nMemory Support for DDR5 ECC Registered memory modules (RDIMM/RDIMM-3DS) 8 x DDR5 DIMM sockets supporting up to 2 TB of system memory - AMD Ryzen\\u2122 Threadripper\\u2122 PRO 7000 Processors support 8-Channel memory architecture - AMD Ryzen\\u2122 Threadripper\\u2122 7000 Processors support Quad Channel memory architecture Support for AMD EXtended Profiles for Overclocking (AMD EXPO\\u2122) and Extreme Memory Profile (XMP) memory modules (The CPU and memory configuration may affect the supported memory types, data rate (speed), and number of DRAM modules, please refer to \\u0022Memory Support List\\u0022 on GIGABYTE\\u0027s website for more information.) Audio Realtek\\u00AE ALC4080 CODEC (rear panel audio) - Support for DTS:X\\u00AE Ultra - High Definition Audio - 2-channel Realtek\\u00AE ALC897 CODEC (front panel audio) LAN 2 x Marvell\\u00AE AQtion AQC113C 10GbE LAN chip (10 Gbps/5 Gbps/2.5 Gbps/ 1 Gbps/100 Mbps) Wireless Communication module Qualcomm\\u00AE Wi-Fi 7 QCNCM865 - 802.11a, b, g, n, ac, ax, be, supporting 2.4/5/6 GHz carrier frequency bands - BLU\\n\\nStorage Interface 3 x M.2 connectors (M2C_CPU/M2B_CPU/M2A_CPU), integrated in the CPU, supporting Socket 3, M key, type 2280 SSDs: - AMD Ryzen\\u2122 Threadripper\\u2122 PRO 7000 processors support PCIe 5.0 x4/x2 SSD - AMD Ryzen\\u2122 Threadripper\\u2122 7000 Processors support PCIe 4.0 x4/x2 SSD 1 x M.2 connector (M2D_CPU), integrated in the CPU, supporting Socket 3, M key, type 2280 SSDs: - AMD Ryzen\\u2122 Threadripper\\u2122 PRO 7000 processors support PCIe 5.0 x4/x2 SSD * The M2D_CPU connector will become unavailable when using the AMD Ryzen\\u2122 Threadripper\\u2122 7000 Processors. 4 x SATA 6Gb/s connectors RAID 0, RAID 1, and RAID 10 support for NVMe SSD storage devices RAID 0, RAID 1, and RAID 10 support for SATA storage devices \\u00B7\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.techpowerup.com/323548/gigabyte-announces-the-trx50-ai-top-motherboard-for-amd-threadripper\"}},{\"type\":\"knowledge\",\"title\":\"Threadripper 9000 CPUs will revive the HEDT market on July 31, starting at $1,499 for 24 cores \\u2014 the flagship 64-core chip will set you back $4,999 | Tom\\u0027s Hardware\",\"url\":\"https://www.tomshardware.com/pc-components/cpus/threadripper-9000-cpus-will-revive-the-hedt-market-on-july-31-starting-at-usd1-499-for-24-cores-the-flagship-64-core-chip-will-set-you-back-usd4-999\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"tomshardware.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=tomshardware.com\",\"site_name\":\"Tom\\u0027s Hardware\"},\"is_missing\":false,\"text\":\"Base price of entry is ~2.3x the cost of 9950X MSRP (real world even bigger gap). The cheapest TRX50 board is ~$600 which is significantly higher than required to run the 9950X, but even pointing at a mid range X870E board is \\u002B$250.\\n\\nThe new wave of AMD HEDT CPUs is right around the corner.\\n\\nThe lineup slots into AMD\\u2019s TRX50 platform, which supports 4-channel DDR5-6400 RDIMM memory and up to 80 PCIe 5.0 lanes (92 in total, with 8 PCIe 4.0 lanes). This combination gives creators access to double the memory bandwidth of mainstream desktop systems and ensures bandwidth headroom for modern GPUs and storage. Like its predecessor, overclocking remains supported out of the box. ... Performance claims from AMD are bold; the flagship 9980X is said to deliver up to 108% better performance compared to Intel\\u2019s 60-core Xeon W9-3595X in compute-heavy workloads, while the 32-core 9970X offers 137% faster results against Intel\\u2019s 44-core Xeon W9-3575X. AMD also highlights significant gains in real-world creator benchmarks, such as Cinebench 2024 and Adobe After Effects, as well as AI inferencing and large-model processing, areas where multi-core throughput and PCIe bandwidth are crucial.\\n\\nAMD\\u2019s offerings are looking better by the day. None of that Intel baloney with license activation for additional CPU features. Reply ... I\\u0027ve said it before and I\\u0027ll say it again: these are not HEDT CPUs they\\u0027re just two flavors of workstation. Base price of entry is ~2.3x the cost of 9950X MSRP (real world even bigger gap). The cheapest TRX50 board is ~$600 which is significantly higher than required to run the 9950X, but even pointing at a mid range X870E board is \\u002B$250. Then there\\u0027s the memory 4x 16GB DDR5-6000 CL30 RDIMMs cost ~$450 whereas 2x 32GB DDR5-6000 CL30 UDIMMs cost ~$190. All combined that\\u0027s a platform cost of entry which is over 2x the cost or simply you could buy the entire desktop platform for less than the cost of the lowest TR CPU alone. The cost alone is off putting, but the TR CPUs will also be slower than their desktop counterparts at anything that can\\u0027t take advantage of increased memory bandwidth and/or core counts.\\n\\nthestryker said:I\\u0027ve said it before and I\\u0027ll say it again: these are not HEDT CPUs they\\u0027re just two flavors of workstation. Base price of entry is ~2.3x the cost of 9950X MSRP (real world even bigger gap). The cheapest TRX50 board is ~$600 which is significantly higher than required to run the 9950X, but even pointing at a mid range X870E board is \\u002B$250. Then there\\u0027s the memory 4x 16GB DDR5-6000 CL30 RDIMMs cost ~$450 whereas 2x 32GB DDR5-6000 CL30 UDIMMs cost ~$190. All combined that\\u0027s a platform cost of entry which is over 2x the cost or simply you could buy the entire desktop platform for less than the cost of the lowest TR CPU alone. The cost alone is off putting, but the TR CPUs will also be slower than their desktop counterparts at anything that can\\u0027t take advantage of increased memory bandwidth and/or core counts. These things combine to push TR into workstation category where it belongs.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"July 26, 2025\",\"url\":\"https://www.tomshardware.com/pc-components/cpus/threadripper-9000-cpus-will-revive-the-hedt-market-on-july-31-starting-at-usd1-499-for-24-cores-the-flagship-64-core-chip-will-set-you-back-usd4-999\"}},{\"type\":\"knowledge\",\"title\":\"AMD TRX50 motherboard prices: ASUS for $899, ASRock for $799, and GIGABYTE for $599\",\"url\":\"https://www.tweaktown.com/news/94565/amd-trx50-motherboard-prices-asus-for-899-asrock-799-and-gigabyte-599/index.html\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"tweaktown.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=tweaktown.com\",\"site_name\":\"TweakTown\"},\"is_missing\":false,\"text\":\"AMD\\u0026#x27;s new Ryzen Threadripper 7980X processor packs 64 cores and 128 threads for $4999... while TRX50 motherboards are priced between $599 and $899.\\n\\nAMD has launched its new Ryzen Threadripper 7000 and Ryzen Threadripper PRO 7000 series CPUs, with TRX50 and WRX90 motherboards now out in the wild. TRX50 motherboards are what HEDT systems will be built with, and now we have some US pricing on the ASUS, ASRock, and GIGABYTE TRX50-based boards. ... ASUS has its new PRO WS TRX50-SAGE WIFI motherboard at the higher-end of the TRX50 motherboard pricing spectrum, with a cost of $899. Under that, we\\u0027ve got the ASRock TRX50 WS motherboard for $799, and finally, the GIGABYTE TRX50 AERO D motherboard for $599. You can buy AMD\\u0027s monster new Ryzen Threadripper 7000 series CPUs already, but the motherboards won\\u0027t be launching until December. If you want the even higher-end WRX90 motherboards, then you\\u0027ll be waiting a little while longer again. The Ryzen Threadripper 7980X flagship 64-core, 128-thread CPU will cost you $4999...\\n\\nRead more: ASUS TRX50-SAGE mobo: ready for AMD Ryzen Threadripper 700