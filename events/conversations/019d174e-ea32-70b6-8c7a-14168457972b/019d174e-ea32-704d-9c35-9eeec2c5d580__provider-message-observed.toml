amd-ryzen-threadripper-9960x\"}},{\"type\":\"knowledge\",\"title\":\"AMD Ryzen Threadripper 9960X - Ryzen Threadripper 9000 Series Shimada Peak 24-Core 4.2 GHz Socket sTR5 350W None Integrated Graphics Processor - 100-000001595WOF - Newegg.com\",\"url\":\"https://www.newegg.com/amd-ryzen-threadripper-9960x-ryzen-threadripper-9000-series-shimada-peak-socket-str5-processor/p/N82E16819113916\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"newegg.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=newegg.com\",\"site_name\":\"Newegg\"},\"is_missing\":false,\"text\":\"Buy AMD Ryzen Threadripper 9960X - Ryzen Threadripper 9000 Series Shimada Peak 24-Core 4.2 GHz Socket sTR5 350W None Integrated Graphics Processor - 100-000001595WOF with fast shipping and top-rated customer service. Newegg shopping upgraded \\u2122\\n\\nBuy AMD Ryzen Threadripper 9960X - Ryzen Threadripper 9000 Series Shimada Peak 24-Core 4.2 GHz Socket sTR5 350W None Integrated Graphics Processor - 100-000001595WOF with fast shipping and top-rated customer service. Once you know, you Newegg!\\n\\nAMD RYZEN THREADRIPPER 9960X 24 CORES 48 350 SP6 152MB 5400 \\u00B7 There are no reviews yet. ... We want to ensure your holiday shopping this year is hassle-free. That\\u2019s why we\\u2019re automatically extending our return policies on almost every product! For purchases placed between November 1st, 2025 and December 31, 2025 you will have until January 31, 2026 to return your product. ... This item is covered by Newegg.com\\u0027s Extended Holiday Replacement-Only Return Policy.\\n\\nAMD Ryzen\\u2122 Threadripper\\u2122 processors deliver battle-tested performance and capability to enable artists, architects, and engineers with the ability to get more done in less time. When deadlines are non-negotiable, professional artists, architects, and engineers need a workstation that excels. AMD Ryzen\\u2122 Threadripper\\u2122 PRO processors offer a highly expandable platform with unmatched performance, enterprise-class security, and exceptional manageability. Empower your team like never before. Save up to 27 minutes for every hour of productivity on the fastest workstation processors on the market.1 \\u00B7 Designed for artists, architects, and engineers, these processors excel in both multi-threaded and lightly threaded workflows, offering exceptional power, performance, and platform expandability built on the leading Zen 4 architecture. Fast-track creative workflows with the performance, value, and reliability of next-gen professional GPUs and high-speed storage devices.\\n\\nAMD Ryzen Threadripper processors support a range of advanced workstation configurations to meet the needs of cutting-edge visual work. Enhance your engineering, creative, scientific and development workfloads and avoid paying expensive cloud subscription costs, with on-device genAI like LLM and diffusion models. From conception to final production, integrate advanced AI tools into every phase of your project. Accelerate architectural workflows like editing point clouds, rendering and virtual reality. Reduce simulation and render times while the system stays productive. Tear through complex rendering and VFX workloads while increasing creative iterations. Reduce compile times and boost scientific discovery with rapid simulation and analysis. All AMD Ryzen PRO processors offer 18 months of planned software stability, 24 months of planned availability, and an enhanced platform validation process to ensure enterprise-grade quality and long-term stability.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.newegg.com/amd-ryzen-threadripper-9960x-ryzen-threadripper-9000-series-shimada-peak-socket-str5-processor/p/N82E16819113916\"}},{\"type\":\"knowledge\",\"title\":\"AMD Ryzen Threadripper 9000 preorders start July 23, 96-core PRO 9995WX listed at $13,000 - VideoCardz.com\",\"url\":\"https://videocardz.com/newz/amd-ryzen-threadripper-9000-preorders-start-july-23-96-core-pro-9995wx-listed-at-13000\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"videocardz.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=videocardz.com\",\"site_name\":\"VideoCardz\"},\"is_missing\":false,\"text\":\"B\\u0026H Photo Video does not officially list any prices, as these are preorders. However, users can easily estimate the prices by selecting price ranges and checking which SKUs appear. We went through the list and came up with the following pricing. Ryzen Threadripper 9960X 4.2 GHz 24-Core: $1,600 (\\u002B7% vs. 7960X) Ryzen Threadripper 9970X 4.0 GHz 32-Core: $2,600 (\\u002B4% vs. 7970X) Ryzen Threadripper 9980X 3.2 GHz 64-Core: $5,300 (\\u002B6% vs. 7980X) Ryzen Threadripper PRO 9965WX 4.2 GHz 24-Core: $3,100 (\\u002B17% vs. 7965WX) Ryzen Threadripper PRO 9975WX 4.0 GHz 32-Core: $4,400 (\\u002B13% vs. 7975WX) Ryzen Threadripper PRO 9985WX 3.2 GHz 64-Core: $8,500 (\\u002B16% vs. 7985WX) Ryzen Threadripper PRO 9995WX 2.5 GHz 96-Core: $13,000 (\\u002B30% vs. 7995WX) So overall, we are looking at a 4% to 30% price increase per SKU. The cheapest variants are for the HEDT market, covering 24, 32, and 64 cores (4% to 7% increase), while the PRO series has seen a much higher price increase of 13% to 30%. The flagship 96-core SKU, which \\n\\nLarge US retailer confirms when Threadripper 9000 is hitting the shelves Looks like AMD might keep its promise to launch Zen5-based Threadripper series this month. Unofficially but very likely, AMD will lift the embargo on Threadripper 9000 series preorders on July 23. This date has been listed by B\\u0026H Photo Video, one of AMD\\u2019s retail [\\u2026]\\n\\nNaturally, these prices are not official, and we are not sure if B\\u0026H even realizes that people can view them this way. However, the 30% price increase has already appeared at other stores, so it seems we might have the full picture now. Here\\u2019s a comparison of Threadripper 9000 to 7000 series. Worth remembering that AMD did not launch the 8000 series, the Zen5 SKUs jumped right into 9000 series, just like the desktop and mobile variants did. ... Valve engineer who keeps decade-old Radeon GPUs alive on Linux, now pushes for AMDGPU to become the default driver \\u00B7 ZOTAC launches world\\u2019s smallest PC with RTX 5060 Ti desktop GPU, just 2.65 litress \\u00B7 AMD to launch gaming-oriented Ryzen AI MAX\\u002B 388 \\u0026 392 \\u201CStrix Halo\\u201D APUs with full Radeon 8060S graphics \\u00B7 AMD Ryzen 9 9950X3D2 with dual 3D-VCache and Ryzen 7 9850X3D with 5.6 GHz boost reportedly in the works \\u00B7\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"July 14, 2025\",\"url\":\"https://videocardz.com/newz/amd-ryzen-threadripper-9000-preorders-start-july-23-96-core-pro-9995wx-listed-at-13000\"}},{\"type\":\"knowledge\",\"title\":\"AMD RX 9060 XT Specs \\u0026 Price, Threadripper 9980X, 9970X, 9960X, \\u0026 R9700 GPUs | GamersNexus\",\"url\":\"https://gamersnexus.net/news-gpus-cpus/amd-rx-9060-xt-specs-price-threadripper-9980x-9970x-9960x-r9700-gpus\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"gamersnexus.net\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=gamersnexus.net\",\"site_name\":\"GamersNexus\"},\"is_missing\":false,\"text\":\"AMD\\u2019s first-party benchmarks compared it against the 8GB RTX 5060 Ti, which we think is fair since it\\u2019s a price-parity comparison. We\\u2019ll do our own benchmarking pretty soon in our review. Grab a GN15 Large Anti-Static Modmat to celebrate our 15th Anniversary and for a high-quality PC building work surface. The Modmat features useful PC building diagrams and is anti-static conductive. Purchases directly fund our work! (or consider a direct donation or a Patreon contribution!) AMD also announced its newest Threadripper 9000 Zen 5 CPUs, including the 9980X, 9970X, and 9960X, codenamed \\u201CShimada Peak.\\u201D These have been upgraded with increased memory support and enhanced AVX-512 for more demanding tasks. We\\u2019ll start with the standard AMD Ryzen Threadripper 9000 CPUs. This series includes the 9980X, 9970X, and 9960X. The 9980X is a 64C/128T CPU at 3.2 GHz base clock and with 256 MB of L3 cache.\\n\\nAMD announced new Threadripper CPUs that include the 9980X, 9970X, 9960X along with PRO 9000 WX-series CPUs \\u00B7 AMD also revealed the 9995WX, its new AI Pro workstation GPU, which will come with 128 AI accelerators, 32GB of GDDR6 memory, up to 1531 TOPS, and a 300W TDP ... Grab a GN Tear-Down Toolkit to support our AD-FREE reviews and IN-DEPTH testing while also getting a high-quality, highly portable 10-piece toolkit that was custom designed for use with video cards for repasting and water block installation. Includes a portable roll bag, hook hangers for pegboards, a storage compartment, and instructional GPU disassembly cards. AMD just announced its RX 9060 XT GPUs (coming in two memory configurations). We already knew about these but the company just formally announced them. AMD also revealed its \\u201CRadeon AI Pro R9700\\u201D workstation GPU, and the company\\u2019s latest Threadripper 9000 series and Threadripper PRO 9000 WX-series of CPUs.\\n\\nThe 9970X has 32 cores, 64 threads, a 4.0 GHz base clock, and 128 MB of L3 cache. And finally, the 9960X will come with 24 cores, 48 threads, a 4.2 GHz base clock, and also 128 MB of L3 cache. All of these CPUs will also feature an up to 5.4 GHz max boost clock, PCIe 5.0, the same sTR5 socket, and a 350W TDP. For AMD\\u2019s Ryzen Threadripper PRO 9000 WX-Series: The company announced six new CPUs, which include the 9945WX, 9955WX, 9965WX, 9975WX, 9985WX, and the flagship 9995WX. Starting with the 9945WX and working our way up, these chips will come with core counts of 12, 16, 24, 32, 64, and finally 96 cores for the 9995WX. This mirrors the existing and prior 7000 series CPU configurations just now on Zen 5. Both the PRO and non-PRO Threadripper CPUs seem to resemble the same basic specs as the 7000 series of Threadripper processors. In these spec sheets, with a higher max boost frequency for the 9000 series CPUs, but a lot of the rest is familiar.\\n\\nOne notable difference between the PRO WX and the non-PRO series of Threadrippers is that the workstation series offers \\u201CAMD PRO technologies,\\u201D which AMD describes as, \\u201Ca robust suite of enterprise-grade features including multilayered security, advanced remote manageability, and long-term platform stability.\\u201D Additionally, at least in the past, the PRO WX-series cards supported the WRX90 chipset in addition to the TRX50 chipset. AMD hasn\\u2019t announced any prices at this time, but the press-brief lists availability for July 2025, so we should be expecting to see these soon. Finally, AMD introduced its latest AI Pro workstation GPU. Intel also just announced its new Pro GPUs this past week and we already have a tear-down up of the B60. For specs, this RDNA 4 card will come with 128 AI accelerators, 32GB of GDDR6 memory, up to 1531 TOPS claimed, and a 300W TDP.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://gamersnexus.net/news-gpus-cpus/amd-rx-9060-xt-specs-price-threadripper-9980x-9970x-9960x-r9700-gpus\"}},{\"type\":\"knowledge\",\"title\":\"AMD Ryzen Threadripper 9960X CPU - Specs, Performance, Compare Prices | Pangoly\",\"url\":\"https://pangoly.com/en/product/amd-ryzen-threadripper-9960x\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"pangoly.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=pangoly.com\",\"site_name\":\"Pangoly\"},\"is_missing\":false,\"text\":\"AMD Ryzen Threadripper 9960X. Model: 100-100001595WOF, Best Price: $1,499.00, Release date: July 2025 - Ryzen Threadripper 9000 Series, Shimada Peak, sTR5, None, 4200 MHz, 5400 MHz, 350 W, 4 nm, 1 TB, 128 MB\\n\\nAMD Ryzen Threadripper 9960X \\u00B7 Product \\u00B7 Product \\u00B7 Price history \\u00B7 Check Compatibility \\u00B7 PC builds \\u00B7 Product \\u00B7 Price history \\u00B7 Check Compatibility \\u00B7 Motherboards \\u00B7 CPU Coolers \\u00B7 PC builds \\u00B7 Compare Remove Add a product review \\u00B7 (Change region) * Pangoly may earn a commission when you use one of the links to make a purchase. (Disclosure) AMD Ryzen Threadripper Processors for Desktop Workstations \\u00B7 Designed to keep its promises. Made to revolutionize innovation. AMD Ryzen Threadripper processors deliver proven performance and capabilities to empower artists, architects, and engineers to do more in less time \\u00B7 AMD Ryzen Threadripper 9000 Series processors are designed for AI developers and enthusiasts who demand workstation-worthy performance in a desktop PC \\u00B7 Compare Remove \\u00B7 Processors with Shimada Peak Core Name \\u00B7 Processors with sTR5 Socket \\u00B7\\n\\nAMD Ryzen Threadripper 9000 Series processors are designed for AI developers and enthusiasts who demand workstation-worthy performance in a desktop PC ... Components price will be taken from the selected region.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://pangoly.com/en/product/amd-ryzen-threadripper-9960x\"}},{\"type\":\"knowledge\",\"title\":\"AMD Ryzen Threadripper 9960X 24-Cores Benchmark\",\"url\":\"https://www.cpubenchmark.net/cpu.php?cpu=AMD\\u002BRyzen\\u002BThreadripper\\u002B9960X\\u002B24-Cores\\u0026id=6808\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"cpubenchmark.net\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=cpubenchmark.net\",\"site_name\":\"CPU Benchmark\"},\"is_missing\":false,\"text\":\"Benchmarks for the AMD Ryzen Threadripper 9960X 24-Cores can be found below. Release dates, price and performance comparisons are also listed when available. This is made using thousands of PerformanceTest benchmark results and is updated daily. The first graph shows the relative performance of the CPU compared to the 10 other common (single) CPUs in terms of PassMark CPU Mark. The 2nd graph shows the value for money, in terms of the CPUMark per dollar. The pricing history data shows the price for a single Processor. For multiple Processors, multiply the price shown by the number of CPUs. Is the AMD Ryzen Threadripper 9960X 24-Cores Good for Gaming? This is a newly released CPU that contains 24 Cores and 48 Threads. The AMD Ryzen Threadripper 9960X 24-Cores also has great single threaded performance that will serve well in games. Paired with a good videocard, is this CPU Good for Gaming?\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.cpubenchmark.net/cpu.php?cpu=AMD\\u002BRyzen\\u002BThreadripper\\u002B9960X\\u002B24-Cores\\u0026id=6808\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 18 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"f06e90d8-5283-43b5-a846-edafb31fe65a\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

