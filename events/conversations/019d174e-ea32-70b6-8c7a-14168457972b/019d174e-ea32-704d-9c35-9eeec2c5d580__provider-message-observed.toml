kind = "plain_text"
text = "**Cheapest realistic HEDT setup for dual x16 PCIe 5.0:**\n\n**AMD Threadripper 9000 Series (newest, just launched):**\n- CPU: Threadripper 9960X (24-core) - $1,499\n- Motherboard: GIGABYTE TRX50 AERO D - $599\n- RAM: 4x16GB DDR5-6000 ECC RDIMM - ~$450\n\n**Total platform cost: ~$2,550**\n\n**AMD Threadripper 7000 Series (previous gen, may find deals):**\n- CPU: Threadripper 7960X (24-core) - $1,500\n- Motherboard: Same TRX50 boards ($599-899)\n- RAM: Same ~$450\n\n**Key specs:**\n- TRX50 platform: 92 total PCIe lanes (88 usable), up to 48 can be PCIe Gen 5\n- Three PCIe 5.0 x16 slots - can run two GPUs at full x16 each\n- 4-channel DDR5-6400 RDIMM memory support\n\n**Compare to your current option:**\n- AM5 x8/x8 setup: ~$700-900 total (CPU+mobo+RAM)\n- TRX50 x16/x16 setup: ~$2,550 total\n\nYou're paying ~$1,650+ premium for true dual x16. Worth it for your multi-GPU LLM inference setup?"

