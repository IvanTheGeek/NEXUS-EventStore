B4\\u00AE ports (with DisplayPort\\u2122 1.4, 8K @ 60 Hz)2 \\u00D7 audio jacks3 \\u00D7 PCIe 5.0 \\u00D716 (\\u00D716) Safeslots2 \\u00D7 M.2 slots (2280, PCIe 5.0 \\u00D74 mode)1 \\u00D7 M.2 slot (2280, PCIe 4.0 \\u00D74 mode)1 \\u00D7 PCIe 4.0 \\u00D716 (\\u00D716) Safeslot \\u00B7\\n\\nThe Pro WS TRX50-SAGE WIFI A motherboard features three PCIe\\u00AE 5.0 x16 slots and one PCIe\\u00AE4.0 x16 that provide flexible system configurability and expandability. With high-powered graphics cards, it can bring enhanced performance in modelling, simulation and AI era applications. Next-gen WiFi 7 include the 6 GHz band and 4096 QAM, delivering up to 2.8X ultra-fast WiFi speeds. The revolutionary Multi-Link Operation (MLO)2 provides a more stable WiFi connection and lower latency, unlocking the realms of the unknown in gaming, streaming, and industrial IoT. Dual transceivers support the 2.4, 5 and 6 GHz bands to enable faster throughput to improve signal quality and cover greater distances. With Q-Antenna, attaching a WiFi antenna to your PC is now easy and fast. Instead of slowly rotating two fasteners until they finally lock in, they just snap into place.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.asus.com/us/motherboards-components/motherboards/workstation/pro-ws-trx50-sage-wifi-a/\"}},{\"type\":\"knowledge\",\"title\":\"TRX50 AI TOP Key Features | Motherboard - GIGABYTE Global\",\"url\":\"https://www.gigabyte.com/Motherboard/TRX50-AI-TOP\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"gigabyte.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=gigabyte.com\",\"site_name\":\"GIGABYTE\"},\"is_missing\":false,\"text\":\"Ultimate Scalability: 4*PCIe 5.0 x16 slots for Multi-GPU and 4*PCIe 5.0 x4 M.2 slots ... Blazing Fast Networks: Dual 10GbE LAN, Wi-Fi 7 with Ultra-high gain directional antenna \\u0026amp; WIFI EZ-Plug \\u00B7 PCIe UD Slot X\\uFF1APCIe 5.0 x16 slot with 10X strength ...\\n\\nUltimate S