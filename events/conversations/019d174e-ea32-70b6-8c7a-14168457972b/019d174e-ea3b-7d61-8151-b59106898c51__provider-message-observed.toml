memory - VideoCardz.com\",\"url\":\"https://videocardz.com/newz/gigabyte-launches-ai-top-500-trx50-gaming-pc-threadripper-7965wx-rtx-5090-and-768gb-ddr5-memory\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"videocardz.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=videocardz.com\",\"site_name\":\"VideoCardz\"},\"is_missing\":false,\"text\":\"Connectivity is also state-of-the-art, ... housed in a large E-ATX chassis measuring 594 x 336 x 584 mm (H x W x D). Gigabyte has not disclosed pricing yet, though this is clearly a premium product intended for a niche market of AI ...\\n\\nOne could argue that for AI workloads, a dual-GPU setup would make more sense than investing heavily in the Threadripper CPU, given the platform\\u2019s excellent multi-GPU support and abundant PCIe lanes. However, Gigabyte appears to be focusing on models that can run entirely in system memory, not just GPU memory. For this reason, the system comes with a staggering 768 GB of DDR5 R-DIMM RAM (8 x 96 GB), fully utilizing the CPU\\u2019s memory channels. Storage is also carefully selected. The system includes an AORUS Gen4 7300 2TB SSD for general use, alongside a specialized AI TOP 100E 320GB SSD, a high-endurance model designed for intensive AI workloads. The latter offers 150 times the write endurance of typical consumer SSDs, making it ideal for frequent data writes. ... The motherboard is based on the TRX50 AI TOP platform, and the CPU is cooled by an AORUS 360mm custom liquid cooler.\\n\\nThe entire setup is powered by a 1600W 80 Plus Platinum ATX 3.1 power supply, providing more than enough headroom for future upgrades. Connectivity is also state-of-the-art, including PCIe 5.0, Thunderbolt 5, dual 10 GbE Ethernet, Wi-Fi 7, and Bluetooth 5.3. The system is housed in a large E-ATX chassis measuring 594 x 336 x 584 mm (H x W x D). Gigabyte has not disclosed pricing yet, though this is clearly a premium product intended for a niche market of A