sn\\u0027t necessary. TR Pro, in this case, being even pricier and you\\u0027d only lose important things by using such a chip on a TRX50 board, like the octa-channel memory support.\\n\\nDr. DroWhich is where this gets funny: this isn\\u0027t a workstation motherboard. The TRX50 chipset is intended for the consumer-grade Threadrippers, which start at $1,500 a piece for the lowest-end model. TR Pros work with it under certain limitations because the targeted audience is so narrow due to the prices practiced that developing some sort of lock wasn\\u0027t necessary. TR Pro, in this case, being even pricier and you\\u0027d only lose important things by using such a chip on a TRX50 board, like the octa-channel memory support.\\n\\nThe board also has an internal USB 3.2 Gen 2x2 (20 Gbps) header for a case mounted USB-C port, a further six rear 5 Gbps USB Type-A ports, plus a pair of internal headers for a further four 5 Gbps USB Type-A ports. The board also has four SATA ports, a 16\\u002B8\\u002B4 power phase design, a 14-layer PCB, a debug display and the now common easy release features for the M.2 drive heatsinks and the graphics card. The TRX50 AI TOP also sports what Gigabyte calls \\u0022UC BIOS\\u0022 which has a \\u0022User-Centred intuitive UX with Quick Access function\\u0022, but there\\u0027s currently no details of how this differs from previous UEFI releases from Gigabyte. There was no word on pricing.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.techpowerup.com/323548/gigabyte-announces-the-trx50-ai-top-motherboard-for-amd-threadripper\"}},{\"type\":\"knowledge\",\"title\":\"GIGABYTE TRX50 AI TOP 1.1 AMD TRX50 Chipset sTR5 Motherboard\",\"url\":\"https://www.avadirect.com/TRX50-AI-TOP-1-1-AMD-TRX50-Chipset-sTR5-E-ATX-Motherboard-TAA-Compliant/Product/18979628\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"avadirect.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=avadirect.com\",\"s