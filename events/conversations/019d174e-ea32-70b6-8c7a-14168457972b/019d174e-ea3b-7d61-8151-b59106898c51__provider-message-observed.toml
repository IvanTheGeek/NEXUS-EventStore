text = "**For 3x RTX 5090 minimum setup:**\n\n**Option 1: Standard TRX50 (most common)**\n- CPU: Threadripper 9960X - $1,499\n- Motherboard options:\n  - ASRock TRX50 WS: 3x PCIe 5.0 slots (x16/x16/x8 config) - $799\n  - ASUS Pro WS TRX50-SAGE WIFI: 3x PCIe 5.0 x16 slots - $899\n  - GIGABYTE TRX50 AERO D: 3x PCIe 5.0 x16 slots - $599\n- RAM: 4x16GB DDR5-6000 RDIMM - ~$450\n- **Config: x16/x16/x8 (third GPU at x8)**\n- **Total: ~$2,750-3,000**\n\n**Option 2: TRX50 AI TOP (special hybrid)**\n- CPU: Threadripper 9960X - $1,499 (or PRO version for 8-channel memory)\n- Motherboard: GIGABYTE TRX50 AI TOP - 4x PCIe 5.0 x16 slots, 8-channel memory support, 2TB max - $900-960\n- RAM: Either 4x16GB (with non-PRO CPU) or 8x16GB (with PRO CPU) - $450-900\n- **Config: Likely x16/x16/x16 for 3 GPUs** (need to verify specific bifurcation)\n- **Total: ~$2,850-3,400**\n\n**Option 3: WRX90 (true workstation)**\n- CPU: Threadripper PRO 9965WX (24-core) - ~$3,100+\n- Motherboard: WRX90 - $1,300+\n- RAM: 8x16GB DDR5-6000 RDIMM - ~$900\n- Config: Full x16/x16/x16+ with 144 usable PCIe lanes\n- **Total: ~$5,300+**\n\n**Key consideration:** If using standard Threadripper (non-PRO) on TRX50 AI TOP, you lose 8-channel memory support and only get 4-channel. \n\nFor 3x 5090s, **Option 1 with x16/x16/x8 is most cost-effective**. Third GPU at x8 PCIe 5.0 = x16 PCIe 4.0 bandwidth, sufficient for most workloads."

