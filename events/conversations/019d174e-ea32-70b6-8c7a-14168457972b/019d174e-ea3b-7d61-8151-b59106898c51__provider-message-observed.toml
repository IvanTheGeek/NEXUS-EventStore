andwidth of the PCIEX16_3 slot is divided. ... Enables or disables 64-bit capable devices to be decoded in above 4 GB address space (only if your system \\u00B7 supports 64-bit PCI decoding). Set to Enabled if more than one advanced graphics card are installed and \\u00B7 their drivers are not able to be launched when entering the operating system (because of the limited 4 GB ...\\n\\nEnables or disables CPU/PCIe Spread Spectrum. ... Allows you to set the core ratio for all CPU cores or individual cores. ... Allows you to manually set the core ratio for the CPU CCD cores. This item is configurable only when CPU \\u00B7 Ratio Mode is set to Per CCX. ... Allows you to alter the clock ratio for the installed CPU. The adjustable range is dependent on the CPU \\u00B7 being installed. This item is configurable only when CPU Ratio Mode is set to All cores. ... Enables or disables the Active OC Tuner feature. ... Offers five boost levels for three targeted 90/80/70 \\u00B0C CPU temperature. One can choose the most suitable \\u00B7 thermal limit/boost level combinations to reach higher CPU frequency. Note: Workable settings/results may ... Virtualization enhanced by Virtualization Technology will allow a platform to run multiple operating systems \\u00B7 and applications in independent partitions.\\n\\nDisplays information on your M.2 NVME PCIe SSD if installed. ... Enables or disables RAID for the SATA controllers integrated in the Chipset or configures the SATA controllers ... Enables RAID for the SATA controller. ... Serial ATA features such as Native Command Queuing and hot plug. ... Allows you to determine whether to use your M.2 NVMe PCIe SSDs to configure RAID. ... Enables or disables the integrated SATA controllers. ... Enables or disable the hot plug capability for each SATA port. ... Enables or disables the integrated SATA controllers. ... Enables or disable the hot plug capability for each SATA port. ... Displays the information of the connected SATA device(s). ..