ral. ... Newegg cut $60 from the MSI X870 Gaming Plus Wifi and is now under $210.\n\nSSDs Pick up a Ryzen 9 9950X3D for less than a 9800X3D in this Early Prime Day deal bundle from MSI · CPUs AMD unleashes the power of mobile Fire Range chips on a desktop PC motherboard · Motherboards ASRock B850 Livemixer WiFi motherboard review: a budget playground for content creators · Motherboards Intel LGA 1151 motherboard spotted with a whopping 36 USB ports · PC Gaming AMD Threadripper Pro 9995WX can run 400 copies of Doom or eight instances of Crysis simultaneously ... Only eight USB ports though. When you purchase through links on our site, we may earn an affiliate commission. Here’s how it works. ... We were able to get a preview of ASRock's upcoming WRX90 WS Evo motherboard for Threadripper Pro 7000 CPUs at CES, and it's certainly a no-compromises solution. With 24 total power stages, tons of PCIe slots and lanes, and eight slots for DDR5 RAM, the WRX90 WS Evo seems more than capable of handling a 92-core Threadripper Pro 7995WX.\n\nThreadripper 7000 CPUs consume lots of energy, but not to the point where 41 or even 36 power stages are necessary. While Asus's SAGE motherboards are designed to appeal to enthusiasts, ASRock's WRX90 WS Evo is more in the vein of server hardware; for instance, it uses U.2 for half of its PCIe 5.0 SSD connections rather than M.2 exclusively. The WRX90 WS Evo has no firm release date, but we're told it should launch in early February. We weren't told any pricing info, but we can probably assume it will sell for a little less than Asus's Pro WS WRX90E-SAGE SE, which is currently on preorder for $1,299. Stay On the Cutting Edge: Get the Tom's Hardware Newsletter · Get Tom's Hardware's best news and in-depth reviews, straight to your inbox. ... Matthew Connatser is a freelancing writer for Tom's Hardware US. He writes articles about CPUs, GPUs, SSDs, and computers in general. ... Newegg cut $60 from the MSI X870 Gaming Plus Wifi and is now under 