ring, high-end workstation and even AI machine learning.\n\nAlso, I don't know if ASMedia has cranked up the chip production enough as yet, since only MSI appears to have announced an add-in card. ... TheLostSwede2. For Thunderbolt, it's an Intel spec and if anything, there should've been USB4 support, but maybe ASRock felt the boards were expensive enough as they are and have enough PCIe slots that a USB4 add-in card is the way to go.What you mean is: ASRock cheaped out. Just like every motherboard manufacturer has cheaped out on USB4/TB4 on AM5. ... Tek-Check4 and 5 fans! Why? Rear I/O looks really disappointing, without Thunderbolt option for monitors.Asrock seems to have lazy bums for engineers when it comes to VRM Cooling design, they seem to have gone down the route of slapping fans on VRMs since Z690 launch. Love them or hate them atleast Gigabyte has started with proper finned heatsinks on their motherboards.\n\nThere's no integrated graphics capabilities, so why would there be display outputs? 2. For Thunderbolt, it's an Intel spec and if anything, there should've been USB4 support, but maybe ASRock felt the boards were expensive enough as they are and have enough PCIe slots that a USB4 add-in card is the way to go.You are aware that the Gigabyte TRX50 Aero D uses a Maple Ridge (Intel JHL8540) Thunderbolt 4 controller and offers two USB4 ports, which most likely also provide TB4-capabilities since it comes with a DP-in port as well? This is similar to the older creator focused Gigabyte motherboards from the TRX40, B550, B650, X570 and X670 series that also support Thunderbolt via an add-in card with the older Titan Ridge, although not all of them have DP-in. TheLostSwedeHere's the block diagram btw.With such a new platform, it would actually be nice to include block diagrams in the original article.\n\nEspecially since this motherboard seems to be a fairly weird ASRock-typical mix of both an extreme overclocker and an OEM-style workstation board. And unless