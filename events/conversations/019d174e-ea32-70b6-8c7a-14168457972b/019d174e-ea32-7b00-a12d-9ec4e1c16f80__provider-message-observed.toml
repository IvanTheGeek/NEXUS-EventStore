text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"2 x PCI Express 5.0 x16 AMD Motherboards | Newegg.com\",\"url\":\"https://www.newegg.com/p/pl?N=100007625\\u002B601408981\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"newegg.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=newegg.com\",\"site_name\":\"Newegg\"},\"is_missing\":false,\"text\":\"(17)ASUS ProArt X870E-CREATOR WIFI AMD AM5 X870E ATX Motherboard PCIe 5.0 x16 slots with full support for next-gen GPUs, 16\\u002B2\\u002B2 power stages, DDR5, dual USB4, 10 Gb \\u0026amp; 2.5 Gb LAN, WiFi 7, four M.2 slots ...\\n\\nOpen Box ASUS ROG CROSSHAIR X870E EXTREME AMD X870E AM5 E-ATX Gaming Motherboard - 20\\u002B2\\u002B2 Power Stages, DDR5, PCIe 5.0, 5x M.2, 5G \\u0026 10G LAN, Wi-Fi 7, USB4 Type-C, 5\\u0022 LCD, AI Overclocking \\u0026 Networking ...\\n\\n(17)ASUS ProArt X870E-CREATOR WIFI AMD AM5 X870E ATX Motherboard PCIe 5.0 x16 slots with full support for next-gen GPUs, 16\\u002B2\\u002B2 power stages, DDR5, dual USB4, 10 Gb \\u0026 2.5 Gb LAN, WiFi 7, four M.2 slots ... (10)ASUS ROG CROSSHAIR X870E APEX AMD X870E AM5 ATX motherboard, Advanced AI PC-ready, 18\\u002B2\\u002B2 stages, DDR5, ROG Memory Fan, ROG DIMM.2 Card, Wi-Fi 7, 5G LAN, 3x M.2, PCIe\\u00AE 5.0, USB4\\u00AE , USB Type-C\\u00AE, AI OC ... Black Friday DealASUS ROG CROSSHAIR X870E HERO AMD X870E AM5 ATX motherboard, Advanced AI PC ready, 18\\u002B2\\u002B2 power stages, DDR5, PCIe 5.0, 5x M.2, Wi-Fi 7, USB4, AI Overclocking, Core Flex, PCIe Slot Q-Release Slim ... (11)ASUS ROG CROSSHAIR X870E EXTREME AMD X870E AM5 E-ATX Gaming Motherboard - 20\\u002B2\\u002B2 Power Stages, DDR5, PCIe 5.0, 5x M.2, 5G \\u0026 10G LAN, Wi-Fi 7, USB4 Type-C, 5\\u0022 LCD, AI Overclocking \\u0026 Networking ... Black Friday DealASUS ROG STRIX B850-A GAMING WIFI AMD AM5 B850 ATX motherboard 14\\u002B2\\u002B2 power stages, DDR5 AEMP, 2.5G LAN, WiFi 7 with Q-Antenna, 4x M.2, PCIe 5.0, USB 20\\n\\n(10)ASUS ROG STRIX B850-F GAMING WIFI AMD AM5 B850-F ATX motherboard 16\\u002B2\\u002B2 power stages, AI PC, DDR5 AEMP, WiFi 7, 4x M.2, PCIe 5.0, total support of 19 USB, 20Gbps Type-C, AI Networking II, Aura Sync ... (534)GIGABYTE X870E AORUS XTREME AI TOP AMD AM5 LGA 1718 Motherboard, E-ATX, DDR5, 4x M.2, PCIe 5.0, USB4, WIFI7, 10GbE LAN, EZ-Latch, 5-Year Warranty ... (7)ASUS Pro WS TRX50-SAGE WIFI CEB Workstation motherboard, AMD Ryzen\\u2122 Threadripper\\u2122 PRO 7000 WX-Series Processors,ECC R-DIMM DDR5, 36 power-stage, WiFi 7,PCIe 5.0 x 16, PCIe 5.0 M.2, 10 Gb and 2.5 Gb LA ... (6)GIGABYTE B850 AI TOP AMD AM5 LGA 1718 Motherboard, ATX, DDR5, 3x M.2, PCIe 5.0, USB-C, WIFI7, 10GbE LAN, EZ-Latch ... (8)GIGABYTE TRX50 AERO D sTR5 AMD TRX50 EATX Motherboard - DDR5, PCIe 5.0 M.2, PCIe 5.0, USB4 Type-C, Wi-Fi 7, Marvell 10GbE ... (523)ASUS ProArt X670E-CREATOR WIFI AMD X670 AM5 Ryzen Desktop 9000 8000 \\u0026 7000 ATX motherboard, 16\\u002B2 power stages, PCIe 5.0 ready, DDR5 support, USB4, 10 Gb \\u0026 2.5 Gb LAN, WiFi 6E, \",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.newegg.com/p/pl?N=100007625\\u002B601408981\"}},{\"type\":\"knowledge\",\"title\":\"Finding a motherboard that supports 2 GPUs at full PCIe speed for AM5 - New Builds and Planning - Linus Tech Tips\",\"url\":\"https://linustechtips.com/topic/1500047-finding-a-motherboard-that-supports-2-gpus-at-full-pcie-speed-for-am5/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"linustechtips.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=linustechtips.com\",\"site_name\":\"Linus Tech Tips\"},\"is_missing\":false,\"text\":\"Found this: https://www.msi.com/Motherboard/MPG-X670E-CARBON-WIFI/Specification. It\\u0026#x27;s the MSI MPG X670E CARBON WIFI. As far as I can tell, it supports a configuration of: x16/x0/x4, x8/x8/x4 over the 3 onboard PCIe x16 slots.\\n\\nhttps://linustechtips.com/topic/1500047-finding-a-motherboard-that-supports-2-gpus-at-full-pcie-speed-for-am5/ More sharing options... ... Sorry about that, new to the site. I also think I finally found a motherboard that suits my requirements, but would appreciate some feedback, just to make sure I\\u0027m on the right track. Found this: https://www.msi.com/Motherboard/MPG-X670E-CARBON-WIFI/Specification. It\\u0027s the MSI MPG X670E CARBON WIFI. As far as I can tell, it supports a configuration of: x16/x0/x4, x8/x8/x4 over the 3 onboard PCIe x16 slots. From the chart above, as far as I understand this motherboard should be perfectly compatible with my requirements of running 2x GPUs. Am I correct in my thinking? This motherboard only supports x8 per GPU when 2 are used. And since your GPU\\u0027s won\\u0027t support PCIe 5.0, they will run in PCIe 4.0 x8. But most GPUs have minimal performance loss when only running at x8 speeds on PCIe 4.0.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"April 11, 2023\",\"url\":\"https://linustechtips.com/topic/1500047-finding-a-motherboard-that-supports-2-gpus-at-full-pcie-speed-for-am5/\"}},{\"type\":\"knowledge\",\"title\":\"Question - Help with how to pick AM5 motherboard that wont drop GPU to x8 while multiple M.2\\u0027s are populated? | Tom\\u0027s Hardware Forum\",\"url\":\"https://forums.tomshardware.com/threads/help-with-how-to-pick-am5-motherboard-that-wont-drop-gpu-to-x8-while-multiple-m-2s-are-populated.3855115/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"tomshardware.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=tomshardware.com\",\"site_name\":\"Tom\\u0027s Hardware Forum\"},\"is_missing\":false,\"text\":\"Click to expand... With what your using you have 24 PCIE lanes that can be used from the CPU so 16 GPU 2X X4 M.2\\u0026#x27;s The chipset M.2\\u0026#x27;s are not a factor.\\n\\n(Apologies ahead of time if this is very long) I\\u0027ve never built a PC before and I\\u0027m very confused about how X670E motherboards will be utilizing PCIe lanes with a 7950x, more specifically geared toward my use case though since not many people are using more than two M.2\\u0027s. I\\u0027ll be running a more \\u0027creator\\u0027 specific build, and I\\u0027ll immediately need to populate 3 SSD slots. My current plans are a 1TB 990 Pro for Windows \\u002B apps \\u002B unsorted, 2TB SN850X for games \\u002B mods, and an Acer Predator GM7000 4TB for 3D assets \\u002B textures \\u002B video editing stuff. Maybe I\\u0027ll add another SSD down the line but that won\\u0027t be for a little while. Now I know that the 7950x has 24 PCIe lanes going to the CPU\\u0027s motherboard connections, and the other 4 of the 28 total go to the chipset. For example: If the motherboard has 2 PCIe 5.0 x16 expansion slots (only one of which is populated) and 2 out of 4 SSD slots are PCIe 5.0 x4, will populating the 5.0 x4 SSD slots with 4.0 x4 NMVe\\u0027s result in the GPU being run at x8??\\n\\nHowever, if your expectation of data usage is more typical. Just populate the drives into any M.2 slots you want that don\\u0027t conflict with the x16 GPU option. Click to expand... Thanks for the reply I appreciate it! I posted my build plan in my reply to Lutfij just now, but I\\u0027m currently planning on the Asus STRIX X670E-A Gaming Wifi, and the manual is a little plain in regards to block diagrams and suggested SSD configuring. It has 3 PCIe 5.0 slots total: 1 for GPU and 2 M.2 slots connected to the CPU. The last 2 M.2 drives connected to the chipset are PCIe 4.0 x4. It doesn\\u0027t say if any ports share bandwidth between eachother, or anything like \\u0022If M.2_1 is used, then PCIe_1 will be used at x8\\u0022. The more important thing for me is to run the GPU at max performance, and since the manual is lacking, so do you think there\\u0027d be any issues with SSD and GPU bifurcation for this specific motherboard?\\n\\nClick to expand... With what your using you have 24 PCIE lanes that can be used from the CPU so 16 GPU 2X X4 M.2\\u0027s The chipset M.2\\u0027s are not a factor.\\n\\nThe chipset has its own lanes, and in the case of X670E is connected to another chipset as well. At that point you have many devices all competing for bandwidth, but not connections, to the CPU. If you want all your drives to operate at full speed, then you would actually want to connect them to the CPU directly. 8x for the GPU, 2 4x SSDs in the other main x16 slot, and then the CPU reserved M.2 slot. However, if your expectation of data usage is more typical. Just populate the drives into any M.2 slots you want that don\\u0027t conflict with the x16 GPU option. Basically, you will have to sit down with the motherboard manual for any board you like the look of to get full details. Newegg.com also does a decent job of laying it out on their specs tab. This is the cheapest board that offers three 4x lane M.2 drives. https://pcpartpicker.com/product/fCGbt6/asrock-x670e-pro-rs-atx-am5-motherboard-x670e-pro-rs ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"September 13, 2024\",\"url\":\"https://forums.tomshardware.com/threads/help-with-how-to-pick-am5-motherboard-that-wont-drop-gpu-to-x8-while-multiple-m-2s-are-populated.3855115/\"}},{\"type\":\"knowledge\",\"title\":\"Amazon.com: ASUS ProArt X870E-CREATOR WiFi AMD AM5 X870E ATX Motherboard PCIe\\u00AE 5.0 x16 Slots with Full Support for Next-gen GPUs, 16\\u002B2\\u002B2 Power Stages, DDR5, Dual USB4\\u00AE, 10 Gb \\u0026 2.5 Gb LAN, WiFi 7, Four M.2 Slots : Electronics\",\"url\":\"https://www.amazon.com/ASUS-ProArt-X870E-CREATOR-Motherboard-Next-gen/dp/B0DF123GCV\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"amazon.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=amazon.com\",\"site_name\":\"Amazon\"},\"is_missing\":false,\"text\":\"AMD AM5 socket: Ready for AMD Ryzen ... connectivity: Dual USB4 ports, 10 Gb \\u0026amp; 2.5 Gb Ethernet, WiFi 7, PCIe 5.0 x16 slot full support for next-gen GPUs, two PCIe 5.0 and two PCIe 4.0 M.2 slots and a USB 20Gbps front panel connector ...\\n\\nAMD AM5 socket: Ready for AMD Ryzen 9000, 8000 and 7000 Series Desktop Processors \\u00B7 Robust performance: 16\\u002B2\\u002B2 teamed power stages, ProCool II power connectors, high-quality alloy chokes and durable capacitors \\u00B7 Future-proofed connectivity: Dual USB4 ports, 10 Gb \\u0026 2.5 Gb Ethernet, WiFi 7, PCIe 5.0 x16 slot full support for next-gen GPUs, two PCIe 5.0 and two PCIe 4.0 M.2 slots and a USB 20Gbps front panel connector with 30W PD/Quick Charge 4\\u002B Exclusive AI and overclocking technologies: AI Overclocking, AI Cooling and AI Networking II, Dynamic OC Switcher, and Core Flex \\u00B7 DIY-Friendly design: PCIe Slot Q-Release Slim with SafeSlot, M.2 Q-Release, M.2 Q-Slide, M.2 Q-Latch, Q-Antenna, BIOS FlashBack, Q-Connector \\u00B7 ProArt gives you more: ProArt Creator Hub with Color Management working in conjunction with Pantone\\u2019s proprietary utilities for one-stop system control and creation related settings \\u00B7\\n\\nASUS ProArt X870E-Creator WiFi empowers creators of all levels by maximizing the performance of the latest AMD Ryzen\\u2122 9000, 8000 and 7000 Series processors with 16\\u002B2\\u002B2 team power stages, DDR5 slots, PCIe\\u00AE 5.0 and lightning-fast connectivity including dual USB4\\u00AE, 10G and 2.5G Ethernet, and WiFi 7 ... Manufacturer\\u2019s warranty can be requested from customer service. Click here to make a request to customer service. Brief content visible, double tap to read full content. Full content visible, double tap to read brief content.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.amazon.com/ASUS-ProArt-X870E-CREATOR-Motherboard-Next-gen/dp/B0DF123GCV\"}},{\"type\":\"knowledge\",\"title\":\"AMD AM5 chipsets explained (X870E, X870, B850, B840 \\u0026 all the others)\",\"url\":\"https://www.digitalcitizen.life/x670e-x670-b650e-b650-chipsets/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"digitalcitizen.life\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=digitalcitizen.life\",\"site_name\":\"Digital Citizen\"},\"is_missing\":false,\"text\":\"All support PCI Express 4.0 for the processor lanes, but only some are compatible with PCI Express 5.0. Some support PCIe 5.0 for the video card and solid state drives. Others have PCIe 5.0 only for the solid state drive slot(s). Beyond that, the remaining differences between the AMD AM5 chipsets generally relate to the number of additional PCI Express lanes, their support for the USB4 standard, SuperSpeed 20 Gbps, SuperSpeed 10 Gbps, and SuperSpeed 5 Gbps USB ports. Let\\u0026#x27;s take them one by one and see exactly what they offer: The X870E is AMD\\u2019s most powerful AM5 chipset for the Ryzen 9000, 8000, and 7000 series processors. It builds upon the dual-chip design of its predecessor, the X670E, using two interconnected chiplets that communicate via four PCI Express 4.0 lanes. The X870E chipset supports 24 direct PCI Express 5.0 lanes from the processor, distributed as follows: sixteen lanes dedicated to the graphics card(s), allowing one GPU to run at x16 or two GPUs at x8 each.\\n\\nAll support PCI Express 4.0 for the processor lanes, but only some are compatible with PCI Express 5.0. Some support PCIe 5.0 for the video card and solid state drives. Others have PCIe 5.0 only for the solid state drive slot(s). Beyond that, the remaining differences between the AMD AM5 chipsets generally relate to the number of additional PCI Express lanes, their support for the USB4 standard, SuperSpeed 20 Gbps, SuperSpeed 10 Gbps, and SuperSpeed 5 Gbps USB ports. Let\\u0027s take them one by one and see exactly what they offer: The X870E is AMD\\u2019s most powerful AM5 chipset for the Ryzen 9000, 8000, and 7000 series processors. It builds upon the dual-chip design of its predecessor, the X670E, using two interconnected chiplets that communicate via four PCI Express 4.0 lanes. The X870E chipset supports 24 direct PCI Express 5.0 lanes from the processor, distributed as follows: sixteen lanes dedicated to the graphics card(s), allowing one GPU to run at x16 or two GPUs at x8 each.\\n\\nThe X870 chipset is a high-end AM5 option from AMD. While it shares some similarities with the flagship X870E chipset, the X870 takes a slightly more affordable approach. It retains PCI Express 5.0 support for graphics and storage but scales back on the total number of PCIe lanes available. Here\\u0027s how the direct processor PCIe 5.0 lanes are distributed: sixteen lanes are dedicated to the graphics card(s) via PCIe 5.0, allowing one GPU to run at x16 or two GPUs at x8 each. four lanes support a PCIe 5.0 NVMe SSD, enabling ultra-fast storage speeds. four lanes are general-purpose lanes (GPP), giving motherboard manufacturers flexibility to use them for additional features or components. The X870 chipset also includes another 12 PCIe lanes, out of which eight are PCIe 4.0 and four are PCIe 3.0 lanes for further connectivity options. Four PCIe 4.0 lanes are allocated to the mandatory USB4 ports, and the others can be used for high-speed components like Ethernet or additional NVMe SSDs, whil\\n\\nUp until the launch of the X870E, the X670E was AMD\\u2019s most powerful AM5 chipset for Ryzen processors. Under the hood, it\\u2019s a chipset made of not one but two smaller chips that communicate between themselves via four PCI Express 4.0 lanes. By design, the X670E chipset supports 24 direct processor PCI Express 5.0 lanes: sixteen lanes go to the graphics slot(s) - you can use one graphics card in x16 mode or two in x8 mode. four lanes are used for a fast NVMe solid-state drive. four lanes are general purpose lanes (GPP), meaning they are free and can be used independently as the motherboard manufacturer sees fit. Besides the direct processor PCIe 5.0 lanes, the X670E also offers twelve PCIe 4.0 lanes and eight PCIe 3.0 lanes. Manufacturers can use the PCIe 4.0 lanes to implement other fast components on their motherboards, like Ethernet, Wi-Fi, or additional NVMe (SSD) slots.\\n\\nA comparison between AMD X870E, X870, B850, and B840 Source: AMD The X870 chipset is a great choice for gamers, power users, and professionals who need high performance with the full range of PCIe 5.0 connectivity for their GPU and solid state drive, but don\\u0027t need as many PCIe lanes as the X870E chipset offers. It\\u0027s well suited for those who are focused on high-speed storage and also need the absolute latest in GPU connectivity. Pair an X870 motherboard with a higher-end processor like the AMD Ryzen 9 9900X or Ryzen 7 9700X, and you get solid gaming and productivity performance. Today, X870 motherboards are typically priced in the $200 to $450 range, making them more accessible than the top of the line X870E boards. A balanced choice like the ASUS ROG Strix X870-A Gaming WiFi offers tons of features for around $370. The B850 chipset is a new mid-range AM5 option introduced by AMD for the Ryzen 9000, 8000, and 7000 series processors.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"August 13, 2025\",\"url\":\"https://www.digitalcitizen.life/x670e-x670-b650e-b650-chipsets/\"}},{\"type\":\"knowledge\",\"title\":\"AMD Socket AM5 Chipset for Motherboards\",\"url\":\"https://www.amd.com/en/products/processors/chipsets/am5.html\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"amd.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=amd.com\",\"site_name\":\"AMD\"},\"is_missing\":false,\"text\":\"Put an AMD Socket AM5 motherboard at the heart of your rig to dominate the games and day-to-day business applications you love today and tomorrow. Be ready for fast \\u201CZen 5\\u201D performance of AMD Ryzen\\u2122 9000 Series processors, along with AMD Ryzen\\u2122 8000 and 7000 Series processors \\u2014plus whatever comes next\\u2014with fast DDR5 memory and PCIe\\u00AE 5.0 on select motherboards. Choose your chipset, start your build, and buckle up. With the AMD Ryzen 600 and 800 series chipsets, all AMD Socket AM5 motherboards are compatible with all AMD Socket AM5 processors. That means you can choose any Socket AM5 board for AMD Ryzen 7000, 8000, and 9000 compatibility. (A BIOS update may be required for Ryzen 8000 and 9000 series processors on 600 series boards.) When only the fastest will do, an AMD X870E motherboard delivers. With USB 4.0 onboard along with robust overclocking capabilities, featuring faster dual-channel DDR5 memory support, AMD EXPO\\u2122 technology and PCIe\\u00AE 5.0 support for both graphics and NVMe, you c\\n\\nFor high-performance customization, build your PC with an AMD X870 motherboard for AMD Ryzen\\u2122 9000, 8000, and 7000 Series processors. Fully overclockable, with USB 4.0 onboard, faster dual-channel DDR5 memory support, AMD EXPO\\u2122 technology and PCIe\\u00AE 5.0 support for NVMes, set yourself up for extreme gaming and creating with an X870 motherboard. The AMD B850 platform is the foundation for next-generation gaming and content creation experiences. Featuring enhanced overclocking capabilities, DDR5 memory support with AMD EXPO\\u2122 Technology, and PCIe\\u00AE 5 connectivity for NVME storage, the AMD B850 platform is ready to power your desktop for years to come. Designed to deliver the essentials for gamers and creators, the AMD B840 Platform is your entry point into modern desktop experiences, with support for DDR5 memory overclocking with AMD EXPO\\u2122 technology1, and fast I/O standards for responsive connectivity between devices.\\n\\nThe ultra-high performance AMD X670E motherboard is made for high-performance overclocking. Featuring dual-channel DDR5 memory, AMD EXPO\\u2122 technology and PCIe\\u00AE 5.0 support for both graphics and NVMe, you can play demanding games and deliver your demanding projects with the impressive performance of an AMD X670E motherboard and AMD Ryzen\\u2122 9000, 8000, and 7000 Series processors. The AMD X670 motherboard for AMD Ryzen\\u2122 9000, 8000, and 7000 Series processors is a great option for a high-end PC. With dual-channel DDR5 memory, AMD EXPO\\u2122 technology and PCIe\\u00AE 5.0 support for NVMes, you\\u2019re ready for any workload. If you are a serious gamer or creator who values overclocking features, you will want an AMD B650E motherboard. With PCIe\\u00AE 5.0 support for your NVMe drive and DDR5 support featuring AMD EXPO\\u2122 technology, AMD B650E is packed with features that help speed up your game.\\n\\nAn AMD B650 motherboard is your foundation for must-have gaming performance. Usher in the new age of overclockability, DDR5 memory, AMD EXPO\\u2122 technology, and optional PCIe\\u00AE 5.0 support for an NVMe drive with an AMD B650 motherboard. If you need essential performance, an AMD A620 / A620A / PRO600 motherboard is your perfect starting point. Fast DDR5 memory is supported with EXPO\\u2122 technology for memory overclocking on select chipsets, in an efficient low-power platform that really delivers. PRO 600 and PRO 665 are geared toward practical consumer and commercial users who need a simple, small solution. They are available through business system suppliers. Check with your manufacturer for details. *Only available through system suppliers. Check with your manufacturer for details. ... Higher memory frequencies and more aggressive settings can unlock higher and smoother frame rates in your favorite games.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"February 11, 2025\",\"url\":\"https://www.amd.com/en/products/processors/chipsets/am5.html\"}},{\"type\":\"knowledge\",\"title\":\"7 Best AMD Motherboards For Dual GPU LLM Builds (2025 Guide) - Tech Tactician\",\"url\":\"https://techtactician.com/best-amd-motherboards-for-dual-gpu-llm-builds-guide/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"techtactician.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=techtactician.com\",\"site_name\":\"Tech Tactician\"},\"is_missing\":false,\"text\":\"GPU PCIe Slots: 2x PCIe 5.0 x16 slots (x16 single or x8/x8 dual), 1x PCIe 4.0 x16 slot (max. x2) Before the X870E Creator arrived, the ProArt X670E Creator was a noteworthy motherboard for many dual-GPU workstation builders on the AM5 platform, ...\\n\\nThis allows multiple GPUs to run at full x16 lanes each. Still, for most consumer Ryzen or Intel desktop CPUs, the common maximum configuration for dual GPUs is full x8/x8 bandwidth. Every card listed below will have its effective main GPU PCIe slot lane configuration indicated underneath. Check out also: Best GPUs For Local LLMs This Year (My Top Picks) Here are all the motherboards I\\u2019ve researched and compared, along with detailed additional information on each. For some of the motherboards, I will also include the projects and builds where they have been successfully used. Why this order? The only TRX50 Threadripper-based board on the list comes first. After that come the X870E/AM5 boards which offer most of the latest features and adequate PCIe connections available, followed by the X670E generation. Lastly, an X570/AM4 motherboard is mentioned as a reliable and still budget-friendly option.\\n\\nGPU PCIe Slots: 2x PCIe 5.0 x16 slots (x16 single or x8/x8 dual), 1x PCIe 4.0 x16 slot (max. x2) Before the X870E Creator arrived, the ProArt X670E Creator was a noteworthy motherboard for many dual-GPU workstation builders on the AM5 platform, and for good reason. It offers nearly all the key benefits of its newer sibling, including almost identical storage and I/O options, as well as the crucial dual PCIe 5.0 x8/x8 slot configuration that ensures sufficient bandwidth for two GPUs. This board set the standard for what a modern high-end AM5 motherboard should be, featuring a 10Gbps LAN port, a 2.5Gbps LAN port, dual USB4 ports, and Wi-Fi 6E. It still remains a feature-rich model worth considering, especially if you can find it at a discount now that its successor is available. ... The second budget option on the list after the MSI MPG X670E Carbon.\\n\\nWhen you look at motherboard specifications, you\\u2019ll often see terms like PCIe lanes and slot configurations such as x16, x8, or x4. PCIe lanes are the individual, bidirectional data channels, each composed of two pairs of wires that connect PCIe devices like GPUs and NVMe SSDs to either the CPU or the motherboard chipset (Platform Controller Hub, PCH). The number indicated by the slot (for example, x16, x8, or x4) represents how many data transfer lanes are electrically wired to that slot, defining the data bus width available for communication. More lanes allow more data to be transmitted simultaneously, increasing the potential bandwidth. PCIe lanes can originate directly from the CPU or from the chipset. Lanes coming directly from the CPU typically have lower latency and higher bandwidth because lanes from the chipset must pass through the link between the CPU and chipset, which adds a small amount of latency and can limit bandwidth.\\n\\nFor a dual GPU LLM setup, it would be great to have a motherboard that can provide at least PCIe x8 lanes to each GPU, typically described as an \\u201Cx8/x8\\u201D configuration. This arrangement means that the CPU\\u2019s PCIe lanes, commonly 16 for mainstream desktop processors, can be split evenly between the two PCIe slots dedicated to GPUs. Many affordable or older motherboards make use of an \\u201Cx16/x4\\u201D layout, where the second GPU slot receives only 4 PCIe lanes, often routed through the chipset rather than directly from the CPU. While running a GPU with only 4 lanes usually doesn\\u2019t cause significant performance degradation for many inference tasks, it can become a potential bottleneck for bandwidth-heavy workloads such as model training and fine-tuning. Higher-end platforms like AMD Threadripper, Intel Xeon, or AMD EPYC, two of which are proposed below, often offer more PCIe lanes.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"August 25, 2025\",\"url\":\"https://techtactician.com/best-amd-motherboards-for-dual-gpu-llm-builds-guide/\"}},{\"type\":\"knowledge\",\"title\":\"Looking for Affordable Motherboard with Dual PCIe 5.0 x16 Slots for GPUs - Yo Motherboard\",\"url\":\"https://yomotherboard.com/question/looking-for-affordable-motherboard-with-dual-pcie-5-0-x16-slots-for-gpus/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"yomotherboard.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=yomotherboard.com\",\"site_name\":\"Yo Motherboard\"},\"is_missing\":false,\"text\":\"Thanks a lot! ... Unfortunately, consumer AM5 CPUs only have up to 28 PCIe lanes, meaning you won\\u0026#x27;t find a motherboard with two full x16 slots. Your best option would likely be boards with 2 x 8 slots, which are equivalent to the same bandwidth as a 4.0 x16 setup.\\n\\nI\\u0027m putting together a dual-GPU setup and need a motherboard that supports two full PCIe 5.0 x16 slots (electrical, not just physical ones). My budget is tight, so I\\u0027m after the most cost-effective option that fits these requirements. I\\u0027m hoping to find models that would work, preferably AMD. Any suggestions? Thanks a lot! ... Unfortunately, consumer AM5 CPUs only have up to 28 PCIe lanes, meaning you won\\u0027t find a motherboard with two full x16 slots. Your best option would likely be boards with 2 x 8 slots, which are equivalent to the same bandwidth as a 4.0 x16 setup. For two 5.0 x16 slots, you\\u0027d need to invest in a high-end desktop CPU and motherboard, which can get pricey. ... Honestly, you won\\u0027t find a dual x16 setup on consumer platforms. The best you might come across is two PCIe 5.0 x8 slots. AMD\\u0027s design means that out of 24 lanes dedicated to GPUs, a few are reserved for M.2 slots and USB ports.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"August 15, 2025\",\"url\":\"https://yomotherboard.com/question/looking-for-affordable-motherboard-with-dual-pcie-5-0-x16-slots-for-gpus/\"}},{\"type\":\"knowledge\",\"title\":\"Motherboard for AMD AM5 has dual PCI Express 5.0 slots - Softei.com - Global Electronics Industry News\",\"url\":\"https://softei.com/motherboard-for-amd-am5-has-dual-pci-express-5-0-slots/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"softei.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=softei.com\",\"site_name\":\"Softei\"},\"is_missing\":false,\"text\":\"A motherboard for AMD\\u2019s AM5 platform has been announced by Republic of Gamers (ROG). The Crosshair X670E Extreme has PCIe 5.0 connectivity and DDR5 RAM. Data rates are 50 per cent faster than DDR4 memory while PCIe 5.0 connectivity will give users access to the fastest next-gen SSDs and GPUs as they become available. The new PCIe standard delivers double the link speeds of PCIe 4.0 and provides users with the bandwidth to deck out the ROG Crosshair X670E Extreme with USB4 and USB 3.2 Gen 2 ports. There is also a front panel USB 3.2 Gen 2 2\\u00D72 connector with support for Quick Charge 4\\u002B. By pairing this motherboard with a case featuring a front-panel USB Type-C port, users can have access 60W charging, said ROG. There are two PCIe 5.0 x16 slots onboard and three additional slots via the ROG PCIe 5.0 M.2 card and the ROG GEN-Z.2 card, for a total of five M.2 slots, four of which support PCIe 5.0 x4 mode.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"May 24, 2022\",\"url\":\"https://softei.com/motherboard-for-amd-am5-has-dual-pci-express-5-0-slots/\"}},{\"type\":\"knowledge\",\"title\":\"AM5 Motherboards with dual x16 (x8/x8) PCIe slots - CPUs, Motherboards, and Memory - Linus Tech Tips\",\"url\":\"https://linustechtips.com/topic/1474393-am5-motherboards-with-dual-x16-x8x8-pcie-slots/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"linustechtips.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=linustechtips.com\",\"site_name\":\"Linus Tech Tips\"},\"is_missing\":false,\"text\":\"I have a friend building some research pcs with dual RTX 3090/4090 GPUs over the AM5 plataform, and have been finding that most motherboards have a layout with 1 PCIe x16 slot \\u002B 1-2 other x16 slots with only x4/x1 modes available. The only motherboard I have found that has x8/x8 is the Proart X67...\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"December 9, 2023\",\"url\":\"https://linustechtips.com/topic/1474393-am5-motherboards-with-dual-x16-x8x8-pcie-slots/\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"8afb5632-26a1-4d38-ba55-289e8a25ab9e\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

