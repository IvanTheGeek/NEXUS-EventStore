kind = "plain_text"
text = "**Short answer: No**, consumer AM5 motherboards cannot do dual x16 PCIe 5.0.\n\n**Best you can get**: x8/x8 PCIe 5.0 mode for dual GPUs on AMD AM5 consumer platforms. AM5 CPUs have 28 total PCIe lanes, with 24 lanes going to the motherboard, typically configured as 16 lanes for GPU(s), 4 for M.2 storage, and 4 for general purpose use.\n\n**Boards with dual x8/x8 PCIe 5.0** (X870E/X670E chipsets):\n- ASUS ProArt X870E-CREATOR WIFI (newest)\n- ASUS ProArt X670E-CREATOR WIFI (previous gen, still excellent)\n- ASUS ROG CROSSHAIR X870E series\n- MSI MPG X670E CARBON WIFI\n\n**For true dual x16 PCIe 5.0**, you'd need HEDT:\n- AMD Threadripper TRX50 platform which offers more PCIe lanes\n- Intel Xeon W workstation boards\n- AMD EPYC platforms\n\nGiven your 3090s/3070s setup - is x8/x8 PCIe 5.0 sufficient for your use case (which has equivalent bandwidth to x16/x16 PCIe 4.0), or do you need the full x16/x16 that requires HEDT?"

