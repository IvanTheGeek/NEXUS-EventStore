odules by about 50% to $135 and $1,194 respectively, reports Reuters, while prices of 64GB DDR5 and 96GB DDR5 ...\n\nLast week, Samsung increased the contract price for 32 GB DDR5 modules from $149 to $239 and the price of 16GB DDR5 and 128GB DDR5 modules by about 50% to $135 and $1,194 respectively, reports Reuters, while prices of 64GB DDR5 and 96GB DDR5 are reported to have gone up by more than 30%. However, there is not much hope of relief for users. DRAM capex of $53.7bn in 2025 is expected to rise about 14% to $61.3bn in 2026, but it will not be going into capacity but into process technology upgrades, higher-layer stacking, hybrid bonding and high-value products such as HBM. Micron is expected to be the most aggressive investor among DRAM suppliers, with the company’s 2026 CapEx projected at $13.5bn, up 23% y-o-y, and focusing primarily on 1-gamma node adoption and expanding TSV equipment. Hynix is expected to spend $20.5bn, up 17% y-o-y, thanks to HBM4 capacity expansion at the M15x fab.\n\nAt the end of August I bought parts for a new P.C. I paid slightly more for a DDR5 Motherboard because DDR5 RAM looked like a bargain compared to DDR4. It looks like I will be stuck with 16GB for a while. ... Good timing Duncan! ... Click to list the Digital Editions of the Electronics Weekly magazine. Then select the month to view. ... Electronics Weekly @ 65! Read our special features celebrating 65 years of Electronics Weekly and looking ahead to the future of the industry. ... Read the first ever Electronics Weekly online: 7th September 1960. We've scanned the very first edition so you can enjoy it. ... The excellent Electronics Weekly podcast, CHIIPS, is brought to you by our editor Caroline Hayes. Hear interesting insights from a range of industry figures. ... David Manners on Memory supercycle roars on: ‘Good timing Duncan!... ‘ · Duncan on Memory supercycle roars on: ‘At the end of August I bought parts for a new P.C.\n\nCopyright ©2025 Electronics Weekly |News|Products|Blogs|Jobs - Owned by Emap, Southern House, CR0 1XG (020 39532600) Terms and Conditions Privacy policy\nReuters reported on the 16th (local time) that Samsung raised November contract prices for DDR5 DRAM by up to 60%. The 32GB DDR5 RDIMM module used in servers now costs around 239 dollars, up sharply from 149 dollars in September. This rapid rise has strengthened the view that DDR5 has entered a full-scale supply-tightening phase. A key driver of the surge is the far faster-than-expected expansion of AI data-center capacity. Although the importance of HBM used in Nvidia GPUs has been widely highlighted, the equally essential role of DDR5 in AI server configurations has been largely overlooked. While GPUs handle computation, CPUs and the memory subsystem require both HBM and high-capacity DDR5. As AI companies escalate model-scale competition, server configurations have grown dramatically in size, pushing DDR5 into a structural shortage. Another constraint is the industry-wide process shift. The three major DRAM producers, Samsung, SK hynix, and Micron, are reallocating large portions of\n\nRival SK hynix is also committing 410.96 billion dollars to the Yongin cluster, focusing on HBM4, HBM4E, and 321-layer NAND, signaling that high-value memory investments are entering an overheated phase. Market leaders appear determined to maintain elevated price levels to secure investment capacity and widen the technology gap. What appears as a short-term price shock is increasingly viewed as the opening stage of a long-term strategy to reshape technology, capacity, and competitive positioning across the memory industry. ... Stefan Schneider brings a dynamic energy to The Economy’s tech desk. With a background in data science, he covers AI, blockchain, and emerging technologies with a skeptical yet open mind. His investigative pieces expose the reality behind tech hype, making him a must-read for business leaders navigating the digital landscape.\nSK Hynix 32GB DDR5 5600