text = "This week, two memory makers — G.Skill and v-color — formally announced their quad-channel memory module kits for AMD Ryzen Threadripper 7000-series processors. The new ECC-enabled RDIMM kits with AMD EXPO profiles are factory-overclocked and top at 6400 MT/s and 7200 MT/s speed bins. But apparently, there are more advanced memory modules (up to 7800 MT/s) for Threadrippers coming from more companies, according to a Gigabyte listing. In addition to G.Skill and v-color, Kingston is prepping its quad-channel 64GB and 32GB kits rated for DDR5-6000 CL32 at 1.35V and DDR5-6400 CL32 1.4V speed bins for AMD&#x27;s latest Ryzen Threadripper 7000-series platform that targets both enthusiasts with deep pockets as well as professional-grade workstations. Gigabyte lists these modules alongside its TRX50 platform, so the company primarily positions its kits for the enthusiast-grade quad-channel Ryzen Threadripper 7000 builds.\n\nThis week, two memory makers — G.Skill and v-color — formally announced their quad-channel memory module kits for AMD Ryzen Threadripper 7000-series processors. The new ECC-enabled RDIMM kits with AMD EXPO profiles are factory-overclocked and top at 6400 MT/s and 7200 MT/s speed bins. But apparently, there are more advanced memory modules (up to 7800 MT/s) for Threadrippers coming from more companies, according to a Gigabyte listing. In addition to G.Skill and v-color, Kingston is prepping its quad-channel 64GB and 32GB kits rated for DDR5-6000 CL32 at 1.35V and DDR5-6400 CL32 1.4V speed bins for AMD's latest Ryzen Threadripper 7000-series platform that targets both enthusiasts with deep pockets as well as professional-grade workstations. Gigabyte lists these modules alongside its TRX50 platform, so the company primarily positions its kits for the enthusiast-grade quad-channel Ryzen Threadripper 7000 builds.\n\nIt is noteworthy that G.Skill, which specializes in high-performance memory modules, tops its overclockable RDIMM offerings with AMD EXPO aimed at Ryzen Threadripper 7000-based systems at 6400 MT/s and equips them with label heat spreaders. By contrast, v-color goes above and beyond with 7200 MT/s, 7600 MT/s, and 7800 MT/s. To ensure that its modules do not overheat, it equips them with rather serious heat spreaders akin to those used on some server-grade RDIMMs. ... When it comes to pricing, factory-overclocked RDIMMs are certainly considerably more expensive than regular performance-enhanced memory modules. G.Skill's Zeta R5 Neo 64 GB kit costs $530, whereas the 128GB kit is priced at $1,070. Stay On the Cutting Edge: Get the Tom's Hardware Newsletter · Get Tom's Hardware's best news and in-depth reviews, straight to your inbox. ... Anton Shilov is a contributing writer at Tom’s Hardware.\n\n249.6 GB/s of bandwidth.\nNice.The cheapest V-Color kit that gets you to 1 TB (8x 128 GB DDR5-5600) costs $12k (see link in above post). If you want to go all the way to 2 TB, it&#x27;ll cost a cool $24.7k. For the 1 TB money, you could buy a RTX Pro 6000 with 96 GB of GDDR7 ...\n\nV-Color has announced its newest line of OC RDIMMs purpose-built for the Ryzen Threadripper 9000 Pro line, reaching up to 256GB on a single RDIMM. In some Pro motherboards, these kits are rated for up to 2TB total installed capacity.\n\nGiant memory kits let Threadripper Pro users chew through massive data sets in single workstations\n\nV-Color has announced its newest line of OC RDIMM DDR5 products, now offering registered DIMMs up to 256GB in capacity. Designed specifically for use with the new AMD Threadripper Pro 9000 WX-series CPU family, kits of the new RAM have been tested to support as much as 2TB of memory in a single system. V-Color's newest RAM offerings cover a wide gamut of needs and use cases for the new \"Shimada Peak\" Threadripper offerings. Capacities range from 16GB to 256GB per DIMM, with RGB models available in the 16GB to 64GB range. Top speeds of these DIMMs reach up to 8200 MT/s in smaller capacity DIMMs, while the largest RAM sticks can still reach 6400 MT/s. These high-capacity DIMMs have been thoroughly put through their paces, according to V-Color. The firm claims its new line has gone through \"rigorous validation to ensure thermal stability, signal integrity, and efficiency\" when used in high-capacity deployments of up to 2TB RAM in eight-channel topologies and 1TB in four-channel.\n\nJohn Nemesh said:So we can get up to 1TB on workstations now, but graphics cards are still shipping with 8GB on them. Nice.The cheapest V-Color kit that gets you to 1 TB (8x 128 GB DDR5-5600) costs $12k (see link in above post). If you want to go all the way to 2 TB, it'll cost a cool $24.7k. For the 1 TB money, you could buy a RTX Pro 6000 with 96 GB of GDDR7 memory, as @usertests pointed out. For just a little more than the 2 TB price, you can get a H200 PCIe card with 141 GB of HBM3E: https://networkoutlet.com/products/h200-900-21010-0040-000-nvidia-h200-nvl-tensor-core-141gb-of-hbm3e-gpu-memory-gen-5-0-pci-express-x16?variant=46805840298213It's always good to read beyond the headlines and try to find out what's the catch. Reply ... dimar said:Just for a second I through it was RDRAM..I think modern DRAM standards are utilizing pretty much all of the tricks that Rambus incorporated into its RDIMMs, and then some.\nG.Skill has introduced its first overclockable ECC memory modules, the Zeta R5 Neo, for AMD&#x27;s Ryzen Threadripper 7000-series processors. The new memory kits are available in quad-channel configurations and can be used for WRX90 and TRX50 platforms designed for workstations and high-end desktops. The Zeta R5 Neo product lineup includes two DDR5-6400 CL32-39-39-102 products: a quad-channel 64 GB kit comprising of four 16 GB R-DIMMs and a quad-channel 128 GB kit consisting of four 32 GB R-DIMM modules. For TRX50, only one kit is needed, whereas WRX90 will require two quad-channel kits. All modules support AMD&#x27;s EXPO profiles for easier setup and a simplistic heat spreader. G.Skill says that just like other high-end memory modules, its Zeta R5 Neo RDIMMs are based on cherry-picked memory ICs, so they are generally designed to be overclocked. However, nobody knows how fast can they go since it depends on many factors.\n\nThe Zeta R5 Neo DDR5-6400 RDIMMs hit the market just in time for AMD's new Threadripper 7000 CPUs\n\nG.Skill has introduced its first overclockable ECC memory modules, the Zeta R5 Neo, for AMD's Ryzen Threadripper 7000-series processors. The new memory kits are available in quad-channel configurations and can be used for WRX90 and TRX50 platforms designed for workstations and high-end desktops. The Zeta R5 Neo product lineup includes two DDR5-6400 CL32-39-39-102 products: a quad-channel 64 GB kit comprising of four 16 GB R-DIMMs and a quad-channel 128 GB kit consisting of four 32 GB R-DIMM modules. For TRX50, only one kit is needed, whereas WRX90 will require two quad-channel kits. All modules support AMD's EXPO profiles for easier setup and a simplistic heat spreader. G.Skill says that just like other high-end memory modules, its Zeta R5 Neo RDIMMs are based on cherry-picked memory ICs, so they are generally designed to be overclocked. However, nobody knows how fast can they go since it depends on many factors.\n\nToo bad these are only RDIMMs. I checked, but couldn't find G.Skill selling any DDR5-6400 ECC UDIMMs. Reply ... bit_user said:Too bad these are only RDIMMs. I checked, but couldn't find G.Skill selling any DDR5-6400 ECC UDIMMs.Nobody is selling anything but 4800 UDIMMs when it comes to ECC. On the RDIMM side there's 4800, 5600 (JEDEC and XMP), 6000, and 6400. Just a wild guess on my part, but I've been thinking ECC UDIMM demand is probably low compared to RDIMM since only desktop CPUs use it. I'd have been pretty happy if there was anything faster than 4800 (I'm not sure I'd replace what I have now though). Reply ... thestryker said:Nobody is selling anything but 4800 UDIMMs when it comes to ECC. On the RDIMM side there's 4800, 5600 (JEDEC and XMP), 6000, and 6400. Just a wild guess on my part, but I've been thinking ECC UDIMM demand is probably low compared to RDIMM since only desktop CPUs use it.\n\nbit_user said:Did you ever check the QVL for your motherboard? There's also some SK Hynix DDR5-5600 that's been qualified, but seems virtually impossible to find.Retail SK Hynix memory modules seem few and far between in NA/EU in general. Nothing other than 4800 modules even appear on their website right now. Even then I can't find any traces of the 32GB modules period.\nAlready have a Micro Center account? You automatically qualify for member pricing for free until 2027! Just sign in to see the price SIGN IN/CREATE ACCOUNT · Expert help for all your tech, no matter where it&#x27;s from ... For help getting set up, or if future issues arise, visit our Knowledge Bar technicians in store or contact our remote Tech Support services. Our professional technicians can help find the right solution for you backed by our Service Guarantee. May be returned within 30 days of purchase* Learn More ... Available for In-Store Pickup Only. ... Text to Me item - Pro 32GB (2 x 16GB) DDR5-6400 PC5-51200 CL38 Dual Channel Desktop Memory Kit CP2K16G64C38U5B - Black %&gt; ... MN - St. Louis Park (in stock) ... PA - St. Davids (in stock) ... Push performance to the next level with the blazing speed and massive bandwidth of Crucial DDR5 Pro OC Gaming Memory.\n\nAlready have a Micro Center account? You automatically qualify for member pricing for free until 2027! Just sign in to see the price SIGN IN/CREATE ACCOUNT · Expert help for all your tech, no matter where it's from ... For help getting set up, or if future issues arise, visit our Knowledge Bar technicians in store or contact our remote Tech Support services. Our professional technicians can help find the right solution for you backed by our Service Guarantee. May be returned within 30 days of purchase* Learn More ... Available for In-Store Pickup Only. ... Text to Me item - Pro 32GB (2 x 16GB) DDR5-6400 PC5-51200 CL38 Dual Channel Desktop Memory Kit CP2K16G64C38U5B - Black %> ... MN - St. Louis Park (in stock) ... PA - St. Davids (in stock) ... Push performance to the next level with the blazing speed and massive bandwidth of Crucial DDR5 Pro OC Gaming Memory.\nBuy Crucial Pro DDR5-6400 CL38 32GB Kit (16GBx2) UDIMM: OC Gaming Memory Black CP2K16G64C38U5B.\nV-Color has launched several EXPO-certified DDR5 RDIMM memory kits for AMD&#x27;s Ryzen Threadripper 7000 Pro and non-Pro platforms. The new RDIMM memory kits, which only come in an eight-DIMM configuration, will enable workstation users to push the limits on the WRX90 platform with frequencies up to DDR5-7200 and memory kit capacities up to a staggering 768 GB (8 x 96 GB). These are your typical run-of-the-mill modules without the fancy heatsinks and flashy RGB lighting. The recipe for the RDIMMs revolves around a 10-layer PCB paired with SK hynix&#x27;s DRAM chips. And as the Threadripper platforms are all one DIMM per channel (1DPC) designs, V-Color&#x27;s octo-kits are intended to populate all the memory slots on the WRX90 motherboard in one go. V-Color is offering their RDIMM kits in several capacities and frequencies, with kit capacities ranging from 128 GB (8 x 16 GB) up to 768 GB (8 x 96 GB), while clockspeeds start at DDR5-5600 and top out at DDR5-7200.\n\nThe DDR5-5600 and DDR5-6000 memory kits are the only ones rated to run at a relatively modest 1.25 V. The higher-end ones require 1.40 V due to the higher frequency and tighter memory timings. The memory timings on V-Color's RDIMM memory kits are decent, though they're far from rivaling premium DDR5 mainstream memory kits. The DDR5-5600 memory kit has 36-38-38-38-80 timings, whereas the DDR5-6000 and DDR5-6400 memory flaunts 32-39-39-102 timings. At the same time, V-Color binned the DDR5-6600 and DDR5-6800 memory kits for 34-46-46-92 and the DDR5-7000 and DDR5-7200 memory kits for 34-43-43-102 and 36-46-46-112, respectively. V-Color's RDIMM products are overclocked memory kits with a limited lifetime warranty. They come with AMD EXPO support to facilitate one-click memory overclocking. The memory kits are built specifically for the WRX90 platform but should work on Intel platforms (your mileage will vary, of course).\n\nThe 128 GB DDR5-5600 memory kit is the most affordable out of the lot, with an MSRP of $1,049.99, whereas the 192 GB counterpart sells for $1,579.99. At the other end of the spectrum, the flagship 768 GB DDR5-6000 memory kit has an hefty $4,919.99 price tag. V-Color's RDIMM memory kits are up for pre-order on the company's online store, and the vendor will ship orders on March 15. The memory kits will be available worldwide through official distribution partners on the same date. ... Please log in or sign up to comment. ... @Liu , You have a grammar error: \"The DDR5-5600 memory kit has 36-38-38-38-80 timings, whereas the DDR5-6000 and DDR5-6400 memory flaunts flaunt 32-39-39-102 timings.\" You have too many \"flaunt\"s in there. ... Sabrent Rocket nano V2 External SSD Review: Phison U18 in a Solid Offering MediaTek to Add NVIDIA G-Sync Support to Monitor Scalers, Make G-Sync Displays More Accessible Qualcomm Adds Snapdragon 7s Gen 3: Mid-Tier Snapdragon Gets Cortex-A720 Treatment ...\n\nV-Color has launched several EXPO-certified DDR5 RDIMM memory kits for AMD's Ryzen Threadripper 7000 Pro and non-Pro platforms. The new RDIMM memory kits, which only come in an eight-DIMM configuration, will enable workstation users to push the limits on the WRX90 platform with frequencies up to DDR5-7200 and memory kit capacities up to a staggering 768 GB (8 x 96 GB). These are your typical run-of-the-mill modules without the fancy heatsinks and flashy RGB lighting. The recipe for the RDIMMs revolves around a 10-layer PCB paired with SK hynix's DRAM chips. And as the Threadripper platforms are all one DIMM per channel (1DPC) designs, V-Color's octo-kits are intended to populate all the memory slots on the WRX90 motherboard in one go. V-Color is offering their RDIMM kits in several capacities and frequencies, with kit capacities ranging from 128 GB (8 x 16 GB) up to 768 GB (8 x 96 GB), while clockspeeds start at DDR5-5600 and top out at DDR5-7200.\nKingston FURY Renegade Pro DDR5 RDIMM Memory Overclockable ECC Registered DIMM · Speed Change · 4800MT/s · 5600MT/s · 6000MT/s · 6400MT/s · 6800MT/s · Total (Kit) Capacity Change · 16GB · 32GB · 64GB · 128GB · 256GB · Kit Change · Single Module · Kit of 4 · Kit of 8 · DRAM Density Change · 16Gbit · Profile Type Change · Plug N Play · Intel XMP · AMD EXPO / Intel XMP · Ask an Expert · Discount Code · Apply Clear · Entered code is invalid. Quantity · Add To Cart Buy Now Buy · Where to Buy · Buy with · Or Buy From Buy From · Share · Share with Facebook · Share with X · Share with LinkedIn · Share with Reddit · Copied Share with link · Spec Sheet · Datasheet · Compare · Kingston FURY Renegade Pro DDR5 RDIMM Memory · Buy · Kingston FURY™ Renegade Pro DDR5 RDIMM memory combines gamer-level performance with server-class memory.\n\nKingston FURY™ Renegade Pro DDR5 RDIMM memory combines gamer-level performance with server-class memory. Next-gen workstations and high-end desktop platforms need DDR5 Registered DIMMs, and Kingston FURY Renegade Pro is there to provide creators, engineers, and data scientists with the super-fast memory typically associated with gaming. Plus, the data integrity and reliability of RDIMMs and on-die ECC limit data corruption and system issues. Certified by Intel XMP 3.0 or AMD EXPO, modules are available up to 32GB, with kits of 4 or 8 up to 128GB and 256GB respectively. With over three decades of building reliable, high quality memory modules for the world’s largest data centers, Kingston proudly introduces a new line of overclockable server-class memory, Kingston FURY™ Renegade Pro DDR5 RDIMM. To meet the computing demands of next-gen Intel® or AMD workstation and high-end desktop platforms requiring the use of DDR5 Registered DIMMs, Kingston FURY Renegade Pro DDR5 RDIMM provides creat\n\nDDR5 Registered DIMMs support ECC, capable of detecting and correcting multi-bit errors. This is in addition to On-Die ECC, featured on all DDR5 DRAM components, which perform single bit error detection and correction to mitigate system lockups and data corruption. Power users can automatically get the most out of their systems with Kingston FURY Renegade Pro DDR5 RDIMM, or choose one of the built-in profiles for optimum timings, speeds, and voltage. Available in single-module capacities up to 32GB, kits of 4 up to 128GB, and kits of 8 up to 256GB. ... Having these memory modules allows for roughly 25% more memory bandwidth than standard DDR5-4800 RDIMMs. ... Maintain data integrity while pushing the limits of DDR5 performance. With double the banks and burst lengths, keep up with the demands of the latest programs and applications with improved efficiency and lower latencies.\n\nIt comes with 32GB of internal storage, expandable with a microSD card that will hold more games. But how do you pick a card? ... Learn about top games, streaming platforms, and beginner tips for game streaming. ... What are Intel Gear Modes, and how do they relate to RAM? Kingston explains. ... Learn how to upgrade your Steam Deck with Kingston’s comprehensive guide. ... What makes a Gen5 PCIe SSD different from its predecessors? Kingston explains. ... Optimize AMD Ryzen performance with DDR4 and DDR5 RAM, EXPO profiles & configurations tips. ... The ultimate RGB guide to help you get your system just how you want it. ... AEMP is a helpful tool for getting the most out of your memory modules. Kingston explains how. ... Discover the differences between PCIe Gen 3, 4, and 5 SSDs and which one is best for you. ... Having the right amount of memory is essential for smooth gaming performance.\nputting together a new thread-ripper pro build looking for suggestions for Ram. Case Silverstone RM52 CPU Threadripper pro 9985wx Motherboard Gigabyte TRX50 AI Top Ram 8x32GB 256GB 8x48GB 384GB 8x64GB 512GB Lo…\nFor further context into the DDR5-4800 vs. DDR5-6400 performance with the Threadripper 9000 series, the Threadripper 7000 series on their DDR4-800 max speed configuration remained in the comparison to provide additional insight. AMD had supplied GSKILL T5 Neo F5-6400R3239F32GQ 4 x 32GB DDR5-6400 CL32 R-DIMMs as part of the Threadripper 9000 series review kit. It was GSKILL F5-6400R3239G32GQ modules that AMD had supplied for the Threadripper 7000 series review kit albeit maxed out at DDR5-4800. With the Threadripper 9000 series working as a drop-in replacement to the TRX50 motherboards once updating the system BIOS, these benchmarks aim to help provide insight for helping to judge the benefits of also upgrading from DDR5-4800 to DDR5-6400 if you are upgrading your workstation. Similarly to help showcase some of the specific areas where the DDR5-6400 memory was helpful or not for these Threadripper 9000 series processors.\n\nLast week the Threadripper 9000 series began shipping and as shown in our launch-day Linux testing there was stunning performance with the 32-core Threadripper 9970X and 64-core Threadripper 9980X processors. Beyond the improvements thanks to the Zen 5 microarchitecture enhancements, the new Threadrippers while working as a drop-in replacement to existing TRX50 workstation motherboards now can handle DDR5-6400 R-DIMMs up from DDR5-4800 R-DIMMs with the Threadripper 7000 series. For those wondering about the gain attributed to the faster memory modules, here are benchmarks looking at the DDR5-4800 vs. DDR5-6400 real-world performance impact for AMD Ryzen Threadripper 9970X and 9980X CPUs. Complementing the benchmark data from last week in our Threadripper 9970X/9980X review that used the new DDR5-6400 R-DIMMs supplied by AMD, this article shows the performance of those Zen 5 Threadripper processors when running at DDR5-4800 using the same memory modules that were tested for the Threadri\n\nFor further context into the DDR5-4800 vs. DDR5-6400 performance with the Threadripper 9000 series, the Threadripper 7000 series on their DDR4-800 max speed configuration remained in the comparison to provide additional insight. AMD had supplied GSKILL T5 Neo F5-6400R3239F32GQ 4 x 32GB DDR5-6400 CL32 R-DIMMs as part of the Threadripper 9000 series review kit. It was GSKILL F5-6400R3239G32GQ modules that AMD had supplied for the Threadripper 7000 series review kit albeit maxed out at DDR5-4800. With the Threadripper 9000 series working as a drop-in replacement to the TRX50 motherboards once updating the system BIOS, these benchmarks aim to help provide insight for helping to judge the benefits of also upgrading from DDR5-4800 to DDR5-6400 if you are upgrading your workstation. Similarly to help showcase some of the specific areas where the DDR5-6400 memory was helpful or not for these Threadripper 9000 series processors.\nV Color TRA548G72D834Q DDR5 7200 ECC RDIMM 48GB Kit Installed 1 · One other important note is that with DDR5 memory, desktop UDIMM memory cannot be used in servers and workstations with DDR5 RIMM slots. This is a change from DDR3 and DDR4 eras. We covered this in Why DDR5 is Absolutely Necessary in Modern Servers. As a result, in the AMD Ryzen Threadripper 7000 platform, one ends up with four memory channels and four DIMM slots but up to 64 fast cores. The question then becomes how to maximize both capacity and performance in those four channels. That is exactly what V-Color has addressed with this kit. In the ASUS Pro WS TRX50 SAGE WIFI motherboard we used for our AMD Ryzen Threadripper 7980X Review, we have had great success with the automated overclocking. AMD Ryzen Threadripper 7980X In ASUS Pro WS TRX50 SAGE WIFI 2 · For some perspective, we have seen better performance on things like Cinebench from this 64 core platform than the Dell Precision Threadripper Pro platform.\n\nThis is a fun one. Today we have a review of one of the highest capacity and speed ECC DDR5 RDIMM kits on the market. After our V-Color 256GB 8x 32GB DDR5-6400 RDIMM kit mini-review, the company asked if we wanted to take a look at a kit for the AMD Ryzen Threadripper 7980X. We declined because it felt like 128GB in a 4x 32GB kit and having 64 cores/ 128 threads was a bit light on capacity. A few weeks later, V-Color said they had something better: a 4x 48GB kit for 192GB that runs at an insanely fast DDR5-7200 speed. At first, some folks on our team did not believe we had an ECC RDIMM kit rated for DDR5-7200 speeds, and at 48GB per DIMM. Here is the box with the PC5-57600 specs. You can see the 3Gx8 2Rx8 rating. V Color TRA548G72D834Q DDR5 7200 ECC RDIMM 48GB Kit 3 · The kit itself looks like a standard V-Color memory. We get a chrome heat spreader that covers the DIMM.\n\nV Color TRA548G72D834Q DDR5 7200 ECC RDIMM 48GB Kit Installed 1 · One other important note is that with DDR5 memory, desktop UDIMM memory cannot be used in servers and workstations with DDR5 RIMM slots. This is a change from DDR3 and DDR4 eras. We covered this in Why DDR5 is Absolutely Necessary in Modern Servers. As a result, in the AMD Ryzen Threadripper 7000 platform, one ends up with four memory channels and four DIMM slots but up to 64 fast cores. The question then becomes how to maximize both capacity and performance in those four channels. That is exactly what V-Color has addressed with this kit. In the ASUS Pro WS TRX50 SAGE WIFI motherboard we used for our AMD Ryzen Threadripper 7980X Review, we have had great success with the automated overclocking. AMD Ryzen Threadripper 7980X In ASUS Pro WS TRX50 SAGE WIFI 2 · For some perspective, we have seen better performance on things like Cinebench from this 64 core platform than the Dell Precision Threadripper Pro platform.\n\nV Color TRA548G72D834Q DDR5 7200 ECC RDIMM 48GB Kit Installed 3 · At some point, I think we wish V-Color had these in 4x 64GB or even 4x 128GB capacities just to add a lot more memory capacity to the platform. At the same time, this is where the non-binary 48GB memory modules pay off. The Threadripper platform is great, but the memory capacity and bandwidth are the big challenges. V-Color has a kit to address this shortcoming in the platform. We also have a short 30-second video on these modules: Was there any application or benchmark where the faster memory made a noticeable difference? What explains the slower cache speeds in the 7200MHz test with the Threadripper though? L3 performance is less than 50% than with the 6200Mhz modules? What happend to cache L1 L2 and L3 results? With higher speed of ram the speed of cache go down? Is this RAM actually available for sale?\n\nWhen we first reviewed that platform, we showed a DDR5-6200 G.Skill kit with 32GB per DIMM for only 128GB of RAM. We review mini PCs with 96GB these days, so that feels low on a big platform like this. ... We tried the DDR5-7200 setting, but we ended up with slightly better (1-2%) application performance using the ASUS automatic overclocking feature with these DIMMs. We got a bit of a FSB downclock which pushed these to DDR5-6961. Still the memory bandwidth was much higher. That is an advantage of getting high-speed DIMMs like this. Even if they are slightly down-clocked, they can offer performance gains. ... Something that was worth showing really quickly is just how much memory bandwidth this is giving. Comparing the overclocked 4-channel kit to a stock Xeon W at DDR5-4800 in 8-channel memory mode we are lower as one would expect. Stil, it is more like 10-20% lower than being half as the raw channels would indicate.\n<system>You only have 19 searches left this turn</system>"

