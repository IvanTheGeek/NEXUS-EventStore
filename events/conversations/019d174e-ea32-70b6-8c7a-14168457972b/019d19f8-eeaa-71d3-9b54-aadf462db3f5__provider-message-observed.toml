. As the next evolution in DRAM (dynamic random-access memory), DDR5 enhances data processing applications that require substantial amounts of memory bandwidth, such as machine learning, artificial intelligence and big data analytics. DDR5 offers faster speeds, immediately delivering an 85% or higher increase in performance over DDR4.\nOpen new possibilities for life experience with DDR5&#x27;s speed up to 7,200Mbps, capacities ranging from 16Gb to 32Gb, and 30% greater power efficiency than DDR4.\n\nAs of July 31, 2025, this page is no longer available. We apologize for any inconvenience. ... Our site uses cookies. We’d also like to set optional cookies to give you the best experience and provide you relevant advertising. you can choose to manage your preferences or accept all cookies. You can also read our Privacy Policy and Cookie Policy for more information. ... This site uses cookies to personalise your experience, analyse site traffic. By Clicking Accept or continuing to browse the site you are agreeing to our use of cookies. You can read our Privacy Policy and Cookie Policy for more information. ... We use cookies to improve you experience on our website and to show you experience on our website and to show you relevant advertising, manage your settings for our cookies below. ... These cookies are essential as they enable you to move around the website.\nThese supply and technical challenges come amid an already tightening market. Samsung has already raised prices on 32GB DDR5 modules to $239 from $149 in September, a 60% increase. SK Hynix reported during its October earnings call that its HBM, DRAM, and NAND capacity was sold out through 2026, while Micron raised prices 20-30% and stopped quoting some products entirely. Samsung, SK Hynix, Micron, and Nvidia did not immediately respond to requests for comment. ... Get started by entering your email address below. ... Gyana Swain is a seasoned technology journalist with over 20 years' experience covering the telecom and IT space. He is a consulting editor with VARINDIA and earlier in his career, he held editorial positions at CyberMedia, PTI, 9dot9 Media, and Dennis Publishing. A published author of two books, he combines industry insight with narrative depth.\n\nDRAM prices have already risen approximately 50% year to date and are expected to climb another 30% in Q4 2025, followed by an additional 20% in early 2026, Counterpoint Research said in its report. The firm projected that DDR5 64GB RDIMM modules, widely used in enterprise data centers, could cost twice as much by the end of 2026 as they did in early 2025. At the same time, the firm also expected DRAM output to grow by more than 20% in 2026 as manufacturers ramp production, but warned this may not be sufficient to offset AI-driven demand. Enterprise buyers can already feel the impact. Procurement teams are facing price increases for servers, PCs, and smartphones, with steeper hikes expected for systems built with next-generation memory configurations starting next year, the firm added in its report. The firm’s analysis highlighted that Nvidia’s LPDDR-based AI server platforms are creating unprecedented demand in that memory segment.\n\nThe current pricing pressure has its roots in production decisions made months ago. According to Counterpoint, the supply crunch originated at the low end of the market as Samsung, SK Hynix, and Micron redirected production toward high-bandwidth memory for AI accelerators, which commands higher margins but consumes three times the wafer capacity of standard DRAM. That shift created an unusual price inversion: DDR4 used in budget devices now trades at approximately $2.10 per gigabit, while server-grade DDR5 sells for around $1.50 per gigabit, according to the firm. This tightness is creating an opportunity for China’s CXMT, noted Shah. “DDR4 is being used in low- to mid-tier smart devices and considering bigger vendors such as Samsung and SK Hynix planned to ramp down DDR4 capacit