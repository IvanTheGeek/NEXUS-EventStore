text = "Here's a **ready-to-use, modern, clean, light-mode Event Modeling diagram template** built exactly to your specs, based on the LaundryLog slices you shared.\n\nIt uses:\n- Tailwind CSS (via CDN → no build step)\n- Horizontal scrollable columns (perfect for touch screens)\n- Collapsible sections (`<details>`) — tap anywhere to expand\n- Toggleable GWT block per column (nice big switch)\n- Small screen snapshot area (just drop your real PNGs in)\n- Two complete light-mode styles you can switch between with one click\n\nJust copy the full HTML below into a file called `laundrylog-event-model.html` and open it in any browser.\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<title>LaundryLog • Event Model</title>\n<script src=\"https://cdn.tailwindcss.com\"></script>\n<link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css\">\n<style>\n  .column { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }\n  .column:hover { transform: translateY(-4px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }\n  .screen-img { transition: transform 0.3s; }\n  .screen-img:hover { transform: scale(1.03); }\n</style>\n</head>\n<body class=\"bg-slate-50 font-sans\">\n\n<div class=\"max-w-screen-2xl mx-auto p-6\">\n  <!-- Header -->\n  <div class=\"flex items-center justify-between mb-8\">\n    <div>\n      <h1 class=\"text-4xl font-bold text-slate-800\">LaundryLog Event Model</h1>\n      <p class=\"text-slate-500\">Truck Driver Laundry Expense Flow</p>\n    </div>\n    <div class=\"flex gap-3\">\n      <button onclick=\"switchStyle(1)\" id=\"btn1\"\n              class=\"px-6 py-3 bg-emerald-600 text-white rounded-2xl font-semibold flex items-center gap-2 active:scale-95\">\n        <i class=\"fa-solid fa-palette\"></i> Style 1 (Classic)\n      </button>\n      <button onclick=\"switchStyle(2)\" id=\"btn2\"\n              class=\"px-6 py-3 bg-violet-600 text-white rounded-2xl font-semibold flex items-center gap-2 active:scale-95\">\n        <i class=\"fa-solid fa-palette\"></i> Style 2 (Modern)\n      </button>\n    </div>\n  </div>\n\n  <div id=\"diagram\" class=\"flex gap-8 overflow-x-auto pb-12 snap-x snap-mandatory scrollbar-thin scrollbar-thumb-slate-300\">\n    <!-- Columns will be injected by JS below -->\n  </div>\n</div>\n\n<script>\n// ==================== DATA ====================\nconst slices = [\n  {\n    id: 1, name: \"OpenApp\", type: \"CommandSlice\", color: \"blue\",\n    screen: { name: \"Splash Screen\", img: \"app-splash-screen.png\" },\n    command: { name: \"OpenApp\", fields: [] },\n    event: { name: \"AppOpened\", fields: [{name:\"openedAt\", type:\"datetime\"}] },\n    gwt: { name: \"OpenApp\", given: \"Unit\", when: \"OpenApp\", then: \"AppOpened\", desc: \"No prior state needed.\" }\n  },\n  {\n    id: 2, name: \"SetLocation\", type: \"CommandSlice\", color: \"blue\",\n    screen: { name: \"Get Location Screen\", img: \"get-location-screen.png\" },\n    command: { name: \"SetLocation\", fields: [{name:\"location\", type:\"string\"}] },\n    event: { name: \"LocationSet\", fields: [{name:\"location\", type:\"string\"}] },\n    gwt: { name: \"SetLocation\", given: \"AppOpened\", when: \"SetLocation\", then: \"LocationSet\", desc: \"App has been opened.\" }\n  },\n  {\n    id: 3, name: \"LogExpense\", type: \"CommandSlice\", color: \"blue\",\n    screen: { name: \"Expense Entry Screen\", img: \"expense-entry-screen.png\" },\n    command: { name: \"LogExpense\", fields: [\n      {name:\"machineType\", type:\"string\"}, {name:\"quantity\", type:\"int\"},\n      {name:\"pricePerMachine\", type:\"decimal\"}, {name:\"paymentMethod\", type:\"string\"},\n      {name:\"location\", type:\"string\"}\n    ]},\n    event: { name: \"LaundryExpenseLogged\", fields: [\n      {name:\"expenseId\", type:\"guid\"}, {name:\"machineType\", type:\"string\"},\n      {name:\"quantity\", type:\"int\"}, {name:\"pricePerMachine\", type:\"decimal\"},\n      {name:\"totalCost\", type:\"decimal\"}, {name:\"paymentMethod\", type:\"string\"},\n      {name:\"location\", type:\"string\"}, {name:\"loggedAt\", type:\"datetime\"}\n    ]},\n    gwt: { name: \"LogNewExpense\", given: \"LocationSet\", when: \"LogExpense\", then: \"LaundryExpenseLogged\", desc: \"Location must be established.\" }\n  },\n  {\n    id: 4, name: \"CurrentLocation\", type: \"ViewSlice\", color: \"emerald\",\n    screen: { name: \"No dedicated screen\", img: null },\n    view: { name: \"CurrentLocation\", fields: [{name:\"location\", type:\"string\"}] },\n    gwt: { name: \"LocationAvailable\", given: \"LocationSet\", when: null, then: \"CurrentLocation\", desc: \"Location has been set.\" }\n  },\n  {\n    id: 5, name: \"RecentExpenses\", type: \"ViewSlice\", color: \"emerald\",\n    screen: { name: \"No dedicated screen\", img: null },\n    view: { name: \"RecentExpenses\", fields: [\n      {name:\"expenses\", type:\"list\"}, {name:\"totalSpent\", type:\"decimal\"},\n      {name:\"expenseCount\", type:\"int\"}, {name:\"location\", type:\"string\"}\n    ]},\n    gwt: { name: \"RecentExpensesWithinWindow\", given: \"LaundryExpenseLogged\", when: \"loggedAt within 3 hours\", then: \"RecentExpenses\", desc: \"Last 3 hours only.\" }\n  }\n];\n\n// ==================== RENDER ====================\nfunction renderDiagram(style = 1) {\n  const diagram = document.getElementById('diagram');\n  diagram.innerHTML = '';\n\n  const viewColor = style === 1 ? 'emerald' : 'teal';\n  const changeColor = style === 1 ? 'blue' : 'violet';\n\n  slices.forEach((slice, i) => {\n    const isView = slice.type === 'ViewSlice';\n    const accent = isView ? viewColor : changeColor;\n\n    const col = document.createElement('div');\n    col.className = `column flex-shrink-0 w-96 bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200 snap-center`;\n\n    col.innerHTML = `\n      <!-- HEADER -->\n      <div class=\"px-8 py-6 bg-${accent}-600 text-white\">\n        <div class=\"flex items-center justify-between\">\n          <div>\n            <div class=\"text-xs uppercase tracking-widest opacity-75\">Slice ${slice.id}</div>\n            <div class=\"text-2xl font-semibold\">${slice.name}</div>\n          </div>\n          <div class=\"px-4 py-1 bg-white/20 rounded-2xl text-sm font-medium\">${isView ? 'STATE VIEW' : 'STATE CHANGE'}</div>\n        </div>\n      </div>\n\n      <!-- SCREEN -->\n      <div class=\"p-6 border-b border-slate-100\">\n        <div class=\"text-xs uppercase text-slate-500 mb-3 font-medium tracking-widest\">SCREEN</div>\n        <div class=\"bg-slate-100 rounded-2xl p-4 text-center\">\n          ${slice.screen.img ? \n            `<img src=\"${slice.screen.img}\" class=\"screen-img mx-auto rounded-xl shadow-md max-h-52 object-contain\" alt=\"${slice.screen.name}\">` :\n            `<div class=\"h-40 flex items-center justify-center text-slate-400 text-sm font-medium\">${slice.screen.name}</div>`\n          }\n        </div>\n      </div>\n\n      <!-- COMMAND / VIEW -->\n      <div class=\"p-6 border-b border-slate-100\">\n        <div class=\"text-xs uppercase text-slate-500 mb-3 font-medium tracking-widest\">${isView ? 'READ MODEL' : 'COMMAND'}</div>\n        <div class=\"bg-slate-50 rounded-2xl p-5 font-mono text-xs leading-relaxed\">\n          ${isView ? \n            `<div class=\"text-emerald-700 font-semibold\">${slice.view.name}</div>\n             <div class=\"mt-3 space-y-1\">` + \n            slice.view.fields.map(f => `<div><span class=\"text-violet-600\">${f.name}</span>: <span class=\"text-slate-500\">${f.type}</span></div>`).join('') + `</div>` :\n            `<div class=\"text-blue-700 font-semibold\">${slice.command.name}</div>\n             <div class=\"mt-3 space-y-1\">` + \n            slice.command.fields.map(f => `<div><span class=\"text-violet-600\">${f.name}</span>: <span class=\"text-slate-500\">${f.type}</span></div>`).join('') + `</div>`\n          }\n        </div>\n      </div>\n\n      <!-- EVENT -->\n      ${!isView ? `\n      <div class=\"p-6 border-b border-slate-100\">\n        <div class=\"text-xs uppercase text-slate-500 mb-3 font-medium tracking-widest\">EVENT</div>\n        <div class=\"bg-amber-50 border border-amber-200 rounded-2xl p-5\">\n          <div class=\"font-semibold text-amber-700\">${slice.event.name}</div>\n          <div class=\"mt-2 text-xs text-amber-600\">emitted after successful command</div>\n        </div>\n      </div>` : ''}\n\n      <!-- GWT -->\n      <div class=\"p-6 bg-slate-50\">\n        <div class=\"flex items-center justify-between mb-3\">\n          <div class=\"text-xs uppercase text-slate-500 font-medium tracking-widest\">GWT RULES</div>\n          <label class=\"relative inline-flex items-center cursor-pointer\">\n            <input type=\"checkbox\" id=\"gwt-toggle-${slice.id}\" class=\"sr-only peer\" checked>\n            <div class=\"w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500\"></div>\n          </label>\n        </div>\n\n        <div id=\"gwt-content-${slice.id}\" class=\"text-xs bg-white rounded-2xl p-5 border border-slate-100 hidden\">\n          <div class=\"grid grid-cols-3 gap-4 text-center\">\n            <div><span class=\"block text-slate-400\">GIVEN</span><span class=\"font-medium text-slate-700\">${slice.gwt.given}</span></div>\n            <div><span class=\"block text-slate-400\">WHEN</span><span class=\"font-medium text-slate-700\">${slice.gwt.when || '—'}</span></div>\n            <div><span class=\"block text-slate-400\">THEN</span><span class=\"font-medium text-emerald-600\">${slice.gwt.then}</span></div>\n          </div>\n          <div class=\"mt-4 text-slate-500 italic text-[10px]\">${slice.gwt.desc}</div>\n        </div>\n      </div>\n\n      <!-- FLOW INDICATOR -->\n      <div class=\"px-6 py-4 bg-slate-100 text-xs text-slate-400 flex items-center gap-2 border-t border-slate-200\">\n        <i class=\"fa-solid fa-arrow-left\"></i>\n        <span>← Slice ${slice.id} — ${slice.name}</span>\n      </div>\n    `;\n\n    // Toggle GWT visibility\n    setTimeout(() => {\n      const toggle = col.querySelector(`#gwt-toggle-${slice.id}`);\n      const content = col.querySelector(`#gwt-content-${slice.id}`);\n      if (toggle && content) {\n        toggle.addEventListener('change', () => {\n          content.classList.toggle('hidden', !toggle.checked);\n        });\n      }\n    }, 10);\n\n    diagram.appendChild(col);\n  });\n}\n\n// Style switcher\nfunction switchStyle(n) {\n  document.getElementById('btn1').classList.toggle('ring-4', n===1);\n  document.getElementById('btn2').classList.toggle('ring-4', n===2);\n  renderDiagram(n);\n}\n\n// Init\nrenderDiagram(1);\n</script>\n</body>\n</html>\n```\n\n**How to use**\n1. Drop your real `app-splash-screen.png`, `get-location-screen.png`, `expense-entry-screen.png` next to the HTML file.\n2. Tap any GWT switch → entire block appears/disappears.\n3. Tap any section header → expands/collapses (native `<details>` behavior if you add it later).\n4. Works beautifully on phones/tablets.\n\n**Want more styles?** Just change the `viewColor` / `changeColor` lines in the JS and add another button. Let me know if you want a dark mode variant, modal popups for screens, or export-to-PNG button. Happy modeling! 🚚🧼"

