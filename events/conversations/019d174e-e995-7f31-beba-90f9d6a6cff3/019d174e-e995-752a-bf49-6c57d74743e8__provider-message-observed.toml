41\",\"source\":\"stevensanderson\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=stevensanderson.com\",\"preview_title\":\"Exploring lighter alternatives to Electron for hosting a Blazor desktop app\"},\"end_index\":815,\"start_index\":497,\"origin_tool_name\":\"web_fetch\"},{\"url\":\"https://learn.microsoft.com/en-us/aspnet/core/blazor/hybrid/?view=aspnetcore-9.0\",\"uuid\":\"099165e1-a7e2-418c-a7dd-2f4c1d6bed38\",\"title\":\"Microsoft Learn\",\"sources\":[{\"url\":\"https://learn.microsoft.com/en-us/aspnet/core/blazor/hybrid/?view=aspnetcore-9.0\",\"uuid\":\"099165e1-a7e2-418c-a7dd-2f4c1d6bed38\",\"title\":\"ASP.NET Core Blazor Hybrid | Microsoft Learn\",\"source\":\"Microsoft Learn\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"subtitles\":null,\"content_body\":null,\"resource_type\":null}],\"metadata\":{\"type\":\"generic_metadata\",\"uuid\":\"099165e1-a7e2-418c-a7dd-2f4c1d6bed38\",\"source\":\"Microsoft Learn\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"preview_title\":\"ASP.NET Core Blazor Hybrid | Microsoft Learn\"},\"end_index\":815,\"start_index\":662,\"origin_tool_name\":\"web_search\"},{\"url\":\"https://codeology.co.nz/articles/tauri-vs-electron-2025-desktop-development.html\",\"uuid\":\"408c4180-1674-4ff9-8740-fef97e4d1a04\",\"title\":\"Codeology\",\"sources\":[{\"url\":\"https://codeology.co.nz/articles/tauri-vs-electron-2025-desktop-development.html\",\"uuid\":\"408c4180-1674-4ff9-8740-fef97e4d1a04\",\"title\":\"Tauri vs Electron: A 2025 Comparison for Desktop Development | Codeology\",\"source\":\"Codeology\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=codeology.co.nz\",\"subtitles\":null,\"content_body\":null,\"resource_type\":null}],\"metadata\":{\"type\":\"generic_metadata\",\"uuid\":\"408c4180-1674-4ff9-8740-fef97e4d1a04\",\"source\":\"Codeology\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026doma