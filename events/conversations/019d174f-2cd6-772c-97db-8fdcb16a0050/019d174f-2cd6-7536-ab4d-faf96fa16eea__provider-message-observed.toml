text = "Good question—this is where SignalR gets really practical.\n\n## 🧠 Short answer\n\nSignalR doesn’t just use one transport. It **automatically falls back through several “modes”** depending on what the client and server support.\n\n---\n\n# 🔄 SignalR transport fallback order\n\n### 1️⃣ WebSockets (best, preferred)\nimage_group{\"aspect_ratio\":\"16:9\",\"query\":[\"websocket full duplex connection diagram\",\"signalr websocket architecture client server\",\"real time websocket communication flow diagram\",\"websocket persistent connection illustration\"],\"num_per_query\":1}\n\n- Full duplex (client ↔ server at same time)\n- Persistent connection\n- Lowest latency\n\n👉 This is what you want in most cases\n\n---\n\n### 2️⃣ Server-Sent Events (SSE)\nimage_group{\"aspect_ratio\":\"16:9\",\"query\":[\"server sent events sse diagram http streaming client server\",\"sse one way communication flow diagram\",\"event stream http connection browser server\",\"sse vs websocket diagram\"],\"num_per_query\":1}\n\n- Server → client only (one-way)\n- Uses HTTP streaming\n- Still near real-time\n\n👉 SignalR simulates two-way by combining with HTTP calls\n\n---\n\n### 3️⃣ Long Polling (fallback of last resort)\nimage_group{\"aspect_ratio\":\"16:9\",\"query\":[\"long polling http diagram repeated requests client server\",\"signalr long polling flow diagram\",\"http polling loop architecture diagram\",\"long polling request response cycle illustration\"],\"num_per_query\":1}\n\n- Client repeatedly asks:\n  “Any updates?”\n- Server holds request open until data available\n\n👉 Works almost everywhere, but:\n- higher latency\n- more overhead\n\n---\n\n# ⚙️ How fallback works\n\nSignalR does this automatically:\n\n```text\nTry WebSockets\n   ↓ (if not available)\nTry Server-Sent Events\n   ↓\nTry Long Polling\n```\n\nYou don’t usually have to configure anything.\n\n---\n\n# 🧠 What determines which one is used?\n\n### Depends on:\n\n- Browser support\n- Server support\n- Network restrictions (proxies, firewalls)\n- Hosting environment\n\n---\n\n## Examples\n\n### Modern browser + normal network\n👉 WebSockets\n\n---\n\n### Corporate proxy blocking WebSockets\n👉 Falls back to SSE or Long Polling\n\n---\n\n### Very restricted environments\n👉 Long Polling\n\n---\n\n# ⚠️ WASM context (your earlier question)\n\nIn a **Blazor WASM app**:\n\n- SignalR client runs in browser\n- Uses browser networking stack\n\n👉 So:\n- WebSockets usually work\n- But fallback still applies automatically\n\n---\n\n# 🔧 Can you force a mode?\n\nYes, if needed:\n\n```csharp\n.WithUrl(\"/hub\", options =>\n{\n    options.Transports = HttpTransportType.WebSockets;\n})\n```\n\n👉 But usually you let SignalR decide\n\n---\n\n# 🧬 In your NEXUS framing\n\nThink of it like:\n\n- **SignalR = communication edge**\n- **Transport = implementation detail (lens)**\n\n```text\nEvent Stream\n     ↓\nSignalR\n     ↓\n[ WebSocket | SSE | LongPolling ]\n```\n\n👉 Same logical connection, different physical realization\n\n---\n\n# 🔥 Practical takeaway\n\n- You design for **real-time messaging**\n- SignalR guarantees **best available transport**\n\nSo your system:\n\n- behaves the same logically\n- adapts to environment automatically\n\n---\n\n# 🧾 Bottom line\n\n- ✅ WebSockets (best)\n- ✅ Server-Sent Events (fallback)\n- ✅ Long Polling (last resort)\n- 🔄 Automatic fallback handled by SignalR\n\n---\n\nIf you want next step:\n\n👉 I can show how to design your event stream so it remains **idempotent + replayable**, which makes these transport differences almost irrelevant (this is where your graph model shines)."

