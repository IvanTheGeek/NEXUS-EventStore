text = "[L1] {\"commit\":{\"sha\":\"b069d935e7de94d99591b62cba341d82ed96c8ef\",\"message\":\"def(conventions): add branch and commit naming conventions for NEXUS\",\"url\":\"https://api.github.com/repos/IvanTheGeek/NEXUS/commits/b069d935e7de94d99591b62cba341d82ed96c8ef\",\"html_url\":\"https://github.com/IvanTheGeek/NEXUS/commit/b069d935e7de94d99591b62cba341d82ed96c8ef\",\"diff\":\"@@ -0,0 +1,66 @@\\n+# Branching and Commit Conventions\\n+\\n+## Purpose\\n+\\n+Ensure that all work in the NEXUS repository is clearly categorized and traceable by type of change.\\n+\\n+---\\n+\\n+## Branch Naming\\n+\\n+Branches should reflect the type of NEXUS work being performed.\\n+\\n+### Patterns\\n+\\n+- `law/...`\\n+- `def/...`\\n+- `lens/...`\\n+- `feat/...`\\n+- `refactor/...`\\n+\\n+### Examples\\n+\\n+- `law/write-read-separation`\\n+- `def/base-ontology-reconcile`\\n+- `lens/node-lens-refinement`\\n+- `feat/graph-loader`\\n+- `refactor/context-structure`\\n+\\n+---\\n+\\n+## Commit Naming\\n+\\n+Commits should indicate the type of NEXUS change.\\n+\\n+### Format\\n+\\n+```\\n+<type>(<scope>): <description>\\n+```\\n+\\n+### Types\\n+\\n+- `law` — changes or additions to NEXUS laws\\n+- `def` — definitions, ontology, or conceptual structure\\n+- `lens` — lens additions or modifications\\n+- `feat` — new functionality or capability\\n+- `refactor` — restructuring without changing meaning\\n+\\n+### Examples\\n+\\n+- `law(write-read): enforce separation rule`\\n+- `def(core): add derivation semantics`\\n+- `lens(node): clarify node-only representation`\\n+- `feat(loader): parse ontology.toml`\\n+- `refactor(core): simplify context structure`\\n+\\n+---\\n+\\n+## Key Principle\\n+\\n+Every change should clearly communicate:\\n+\\n+- What kind of NEXUS change it is\\n+- What part of the system it affects\\n+\\n+This ensures clarity for humans, AI systems, and tooling.\",\"files\":[{\"filename\":\"nexus/definitions/branching-and-commits.md\",\"patch\":\"@@ -0,0 +1,66 @@\\n+# Branching and Commit Conventions\\n+\\n+## Purpose\\n+\\n+Ensure that all work in the NEXUS repository is clearly categorized and traceable by type of change.\\n+\\n+---\\n+\\n+## Branch Naming\\n+\\n+Branches should reflect the type of NEXUS work being performed.\\n+\\n+### Patterns\\n+\\n+- `law/...`\\n+- `def/...`\\n+- `lens/...`\\n+- `feat/...`\\n+- `refactor/...`\\n+\\n+### Examples\\n+\\n+- `law/write-read-separation`\\n+- `def/base-ontology-reconcile`\\n+- `lens/node-lens-refinement`\\n+- `feat/graph-loader`\\n+- `refactor/context-structure`\\n+\\n+---\\n+\\n+## Commit Naming\\n+\\n+Commits should indicate the type of NEXUS change.\\n+\\n+### Format\\n+\\n+```\\n+<type>(<scope>): <description>\\n+```\\n+\\n+### Types\\n+\\n+- `law` — changes or additions to NEXUS laws\\n+- `def` — definitions, ontology, or conceptual structure\\n+- `lens` — lens additions or modifications\\n+- `feat` — new functionality or capability\\n+- `refactor` — restructuring without changing meaning\\n+\\n+### Examples\\n+\\n+- `law(write-read): enforce separation rule`\\n+- `def(core): add derivation semantics`\\n+- `lens(node): clarify node-only representation`\\n+- `feat(loader): parse ontology.toml`\\n+- `refactor(core): simplify context structure`\\n+\\n+---\\n+\\n+## Key Principle\\n+\\n+Every change should clearly communicate:\\n+\\n+- What kind of NEXUS change it is\\n+- What part of the system it affects\\n+\\n+This ensures clarity for humans, AI systems, and tooling.\"}],\"repository_full_name\":\"IvanTheGeek/NEXUS\",\"comments\":null,\"author\":{\"login\":\"IvanTheGeek\",\"name\":null,\"email\":null,\"avatar_url\":\"https://avatars.githubusercontent.com/u/7623933?v=4\",\"id\":7623933},\"committer\":{\"login\":\"IvanTheGeek\",\"name\":null,\"email\":null,\"avatar_url\":\"https://avatars.githubusercontent.com/u/7623933?v=4\",\"id\":7623933},\"created_at\":\"2026-03-20T05:50:42Z\",\"display_url\":\"https://github.com/IvanTheGeek/NEXUS/commit/b069d935e7de94d99591b62cba341d82ed96c8ef\",\"display_title\":\"def(conventions): add branch and commit naming conventions for NEXUS\"},\"url\":\"https://github.com/IvanTheGeek/NEXUS/commit/b069d935e7de94d99591b62cba341d82ed96c8ef\",\"title\":\"def(conventions): add branch and commit naming conventions for NEXUS\",\"diff\":\"@@ -0,0 +1,66 @@\\n+# Branching and Commit Conventions\\n+\\n+## Purpose\\n+\\n+Ensure that all work in the NEXUS repository is clearly categorized and traceable by type of change.\\n+\\n+---\\n+\\n+## Branch Naming\\n+\\n+Branches should reflect the type of NEXUS work being performed.\\n+\\n+### Patterns\\n+\\n+- `law/...`\\n+- `def/...`\\n+- `lens/...`\\n+- `feat/...`\\n+- `refactor/...`\\n+\\n+### Examples\\n+\\n+- `law/write-read-separation`\\n+- `def/base-ontology-reconcile`\\n+- `lens/node-lens-refinement`\\n+- `feat/graph-loader`\\n+- `refactor/context-structure`\\n+\\n+---\\n+\\n+## Commit Naming\\n+\\n+Commits should indicate the type of NEXUS change.\\n+\\n+### Format\\n+\\n+```\\n+<type>(<scope>): <description>\\n+```\\n+\\n+### Types\\n+\\n+- `law` — changes or additions to NEXUS laws\\n+- `def` — definitions, ontology, or conceptual structure\\n+- `lens` — lens additions or modifications\\n+- `feat` — new functionality or capability\\n+- `refactor` — restructuring without changing meaning\\n+\\n+### Examples\\n+\\n+- `law(write-read): enforce separation rule`\\n+- `def(core): add derivation semantics`\\n+- `lens(node): clarify node-only representation`\\n+- `feat(loader): parse ontology.toml`\\n+- `refactor(core): simplify context structure`\\n+\\n+---\\n+\\n+## Key Principle\\n+\\n+Every change should clearly communicate:\\n+\\n+- What kind of NEXUS change it is\\n+- What part of the system it affects\\n+\\n+This ensures clarity for humans, AI systems, and tooling.\",\"display_url\":\"https://github.com/IvanTheGeek/NEXUS/commit/b069d935e7de94d99591b62cba341d82ed96c8ef\",\"display_title\":\"def(conventions): add branch and commit naming conventions for NEXUS\"}"

