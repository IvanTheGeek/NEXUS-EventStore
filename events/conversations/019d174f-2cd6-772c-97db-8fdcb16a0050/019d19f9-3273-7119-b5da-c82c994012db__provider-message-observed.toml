text = "Yes — exactly.\n\n**Penpot belongs in the target projection layer too.**\n\nThat is a strong sign your model is in the right place, because it means the core UI model is **not tied to runtime execution**. It can project to:\n\n- **runtime targets**\n  - Blazor\n  - Android\n  - iOS\n  - CLI\n\nand also to:\n\n- **design / artifact targets**\n  - Penpot\n  - HTML mockup\n  - docs\n  - maybe slides/spec views later\n\n## Clean stack\n\n```text\nNEXUS graph primitives\n→ NEXUS semantics\n→ Forge UI core model\n→ target projections\n   ├── Blazor\n   ├── Android\n   ├── iOS\n   ├── Penpot\n   └── other artifacts\n```\n\n## Why Penpot fits\n\nBecause Penpot is not the truth graph and not the UI semantics themselves.  \nIt is a **materialized design projection** of the model.\n\nSo if Forge UI says something like:\n\n- screen\n- region\n- list\n- detail\n- action\n- input\n- state\n- layout relationship\n\nthen:\n\n- **Blazor projection** turns that into interactive components/render tree\n- **Penpot projection** turns that into frames, components, layouts, styles, variants\n\n## Important distinction\n\nPenpot is different from Blazor in one big way:\n\n- **Blazor** is an execution target\n- **Penpot** is a design/artifact target\n\nBut both are still projections.\n\nThat means your projection layer may need subtypes like:\n\n```text\nProjection Target\n├── Runtime Target\n│   ├── Blazor\n│   ├── Android\n│   └── iOS\n└── Artifact Target\n    ├── Penpot\n    ├── HTML Preview\n    └── Documentation\n```\n\nThat feels very clean.\n\n## This also matches your transpiler thought from earlier\n\nYou were already thinking in terms of:\n\n- graph/model\n- transpiler\n- Penpot actions\n- reverse flow back into the graph\n\nThis fits perfectly:\n\n- **Forge UI core** = target-neutral semantic model\n- **Penpot adapter/transpiler** = projection target implementation\n\n## Strong architectural consequence\n\nThis means you should not define Forge UI too close to Blazor concepts like:\n\n- `RenderFragment`\n- `ComponentBase`\n- DOM events\n- HTML tags\n\nThose belong lower.\n\nForge UI core should stay at the level that **both Blazor and Penpot can understand**.\n\n## Good shared level for both Blazor and Penpot\n\nThings like:\n\n- page / screen\n- component\n- region\n- content block\n- input\n- action\n- state variant\n- layout constraints\n- visual tokens\n- semantic intent\n\nThose can feed both:\n- a running app\n- a Penpot design file\n\n## Bottom line\n\nYes — **Penpot should be a target projection layer peer to Blazor**, not something above or below it in essence.\n\nSo the stronger model is:\n\n```text\nForge UI Core\n   ↓\nProjection Targets\n   ├── Blazor\n   ├── Android\n   ├── iOS\n   └── Penpot\n```\n\nAnd that is a very good sign that Forge UI core is sitting at the right abstraction level."

