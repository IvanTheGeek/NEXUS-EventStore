text = "Perfect—this is the right level to understand what’s really happening.\n\n---\n\n# 🧠 What is a DOM event?\n\n> A **DOM event** is a signal created by the browser when something happens.\n\nExamples:\n- user clicks → `click`\n- mouse moves over element → `mouseover`\n- key pressed → `keydown`\n- input changes → `input`\n\n---\n\n# 🧱 Start from the DOM\n\nThe **DOM (Document Object Model)** is a tree of objects:\n\n```html\n<button>Click</button>\n```\n\nBecomes:\n\n```text\nButtonNode\n```\n\nEach node can:\n- hold data\n- have children\n- **emit events**\n\n---\n\n# 🔥 What “DOM fires mouseover” actually means\n\nWhen your mouse moves over an element:\n\n```text\nMouse enters element\n   ↓\nBrowser detects hit-test (cursor is over element)\n   ↓\nBrowser creates an Event object\n   ↓\nBrowser dispatches it to that element\n```\n\n👉 That’s what “fires an event” means\n\n---\n\n# 🧠 More precise definition\n\n> “Firing an event” =  \n> **creating an event object and dispatching it through the DOM tree**\n\n---\n\n# 🧱 Example: mouseover\n\nWhen you hover:\n\n```text\n1. Browser sees pointer enters element\n2. Creates MouseEvent\n3. Sends it into DOM system\n```\n\nEvent object contains:\n\n```text\ntype: \"mouseover\"\ntarget: button element\nx/y coordinates\nkeyboard state\netc\n```\n\n---\n\n# 🔄 Event propagation (VERY important)\n\nEvents don’t just hit one element—they travel.\n\nThere are **3 phases**:\n\n```text\n1. Capturing phase (top → down)\n2. Target phase (on element)\n3. Bubbling phase (bottom → up)\n```\n\n---\n\n## Example tree\n\n```text\n<body>\n  <div>\n    <button>Click</button>\n  </div>\n</body>\n```\n\n---\n\n## Click button → flow\n\n```text\nCAPTURE:\nbody → div → button\n\nTARGET:\nbutton\n\nBUBBLE:\nbutton → div → body\n```\n\n---\n\n# 🧠 Why this exists\n\nIt allows:\n\n- parent elements to react to child events\n- delegation (one handler for many elements)\n\n---\n\n# 🧱 Event listener\n\nYou attach code like:\n\n```javascript\nbutton.addEventListener(\"click\", handler)\n```\n\nNow:\n\n```text\nEvent reaches button\n   ↓\nhandler runs\n```\n\n---\n\n# 🔌 Where Blazor comes in\n\nBlazor does this for you:\n\n```text\nDOM event\n   ↓\nJS listener (installed by Blazor)\n   ↓\nBlazor runtime\n   ↓\n.NET handler (your code)\n```\n\n---\n\n# 🧬 Mapping to your F# code\n\n```fsharp\nOn.click this (fun () -> ...)\n```\n\nBecomes:\n\n```text\nDOM \"click\"\n   ↓\nBlazor JS listener\n   ↓\nEventCallback\n   ↓\nyour function runs\n```\n\n---\n\n# 🔥 Important distinction\n\n## DOM event = browser-level\n\n- created by browser\n- handled in JS normally\n\n## Blazor event = .NET-level\n\n- wrapper around DOM event\n- converted into typed callback\n\n---\n\n# 🧠 Hover example (step-by-step)\n\n```text\nMouse enters button\n   ↓\nBrowser creates MouseEvent(type=\"mouseover\")\n   ↓\nEvent dispatched to button\n   ↓\nBlazor JS listener catches it\n   ↓\nBlazor calls your .NET handler\n```\n\n---\n\n# ⚠️ Subtle but important\n\nThe DOM itself does NOT “run your code”\n\nIt only:\n\n```text\ncreates event\ndispatches event\n```\n\nCode runs only if:\n\n- a listener is attached\n\n---\n\n# 🧬 In your NEXUS terms\n\n```text\nNode (DOM element)\n   ↓\nEvent occurs\n   ↓\nSignal emitted\n   ↓\nListener (edge)\n   ↓\nHandler / Intent\n```\n\n---\n\n# 🧠 Clean mental model\n\nThink of DOM events like:\n\n> **interrupt signals from the browser**\n\n---\n\n# 🧾 Bottom line\n\n- DOM event = browser-created signal\n- “fires” = event is created and dispatched\n- travels through DOM (capture → target → bubble)\n- listeners handle it\n- Blazor converts it into .NET callbacks\n\n---\n\nIf you want next step:\n\n👉 I can show how event bubbling interacts with Blazor and how you can control it (`stopPropagation`, etc.), which becomes important for complex UIs."

