text = "I would **not** make raw `BuildRenderTree(RenderTreeBuilder builder)` your main authoring surface.\n\nBetter shape:\n\n**target BlazorŌĆÖs render tree as your backend, but put your own rendering layer on top of it.**\n\nThat is much closer to what Bolero does, and it gives you room to evolve. BoleroŌĆÖs server components inherit from `ComponentBase`, and its rendering pipeline sits on top of Blazor namespaces like `Microsoft.AspNetCore.Components.RenderTree` and `...Rendering`, rather than replacing BlazorŌĆÖs renderer. ŅłĆciteŅłéturn867115view0Ņłéturn222102search10Ņłü\n\n## Why not code against `BuildRenderTree` directly everywhere\n\nMicrosoftŌĆÖs current guidance is pretty blunt: manual `RenderTreeBuilder` logic is an advanced scenario, and incorrect manual logic can cause undefined behavior, crashes, hangs, and even security problems. They explicitly compare hand-written render tree logic to writing assembly or IL by hand. ŅłĆciteŅłéturn222102search3Ņłéturn222102search7Ņłü\n\nSo raw `BuildRenderTree` is a great **lowest-level target**, but a poor **day-to-day programming model**.\n\n## What I would recommend\n\nUse a 3-layer model:\n\n### 1. Blazor substrate\nYour components still inherit from `ComponentBase`, and your final output is a render function that feeds `RenderTreeBuilder`. That keeps you aligned with Blazor lifecycle, diffing, hosting modes, and future platform changes. ŅłĆciteŅłéturn222102search1Ņłéturn222102search10Ņłéturn222102search8Ņłü\n\n### 2. Your rendering layer\nBuild your own F# surface over that. This is where you define:\n- your node type\n- attributes/events\n- composition rules\n- component embedding\n- your graph-oriented or non-Elmish semantics\n\nThat is the strategic layer you own.\n\n### 3. Optional authoring layers\nOn top of your rendering layer, you can add:\n- an F# DSL\n- typed templates\n- higher-level page/component composition\n- your own runtime/state model\n\nThat gives you flexibility without tying your whole framework to one syntax.\n\n## Should you reuse BoleroŌĆÖs rendering layer?\n\nUsually: **use Bolero as inspiration, not as your base dependency**, unless your goal is ŌĆ£Bolero-compatible with a different runtime.ŌĆØ\n\nWhy:\n- BoleroŌĆÖs rendering layer reflects BoleroŌĆÖs own abstractions and historical choices.\n- If your goal is an evolved package, especially one shaped by your graph/truth/projection ideas, you will probably want your own node model and your own naming and composition rules.\n- Depending too directly on BoleroŌĆÖs internal rendering layer can make your framework feel like a fork in disguise.\n\nBolero clearly already has its own abstraction above Blazor. In the source, components expose `Render : 'model -> Node` and `override this.Render() = ...`, which shows there is a framework-owned node model between app code and Blazor rendering. ŅłĆciteŅłéturn867115view0Ņłü\n\nThat is the real lesson:\n**own the abstraction layer, not the substrate.**\n\n## So what is the best split?\n\nMy recommendation is:\n\n- **Do not author app UI directly in `BuildRenderTree`**\n- **Do build your framework so it compiles down to `RenderTreeBuilder`**\n- **Do not tightly couple your framework to Bolero internals**\n- **Do study BoleroŌĆÖs layering and seam placement**\n\n## Practical rule of thumb\n\nUse raw `RenderTreeBuilder` only for:\n- your framework core\n- tricky performance-critical primitives\n- interop boundaries\n- experiments to understand Blazor mechanics\n\nUse your own rendering layer for:\n- normal components\n- pages\n- reusable UI primitives\n- your future runtime integration\n\n## The architectural choice in one sentence\n\n**Program to your own node/projection model; emit Blazor render tree frames as the backend.** ŅłĆciteŅłéturn222102search3Ņłéturn222102search10Ņłéturn867115view0Ņłü\n\nThat gives you the same core advantage Bolero has, without locking yourself into BoleroŌĆÖs exact shape.\n\nA good minimal target is:\n\n```fsharp\ntype Node = RenderTreeBuilder -> unit\n```\n\nThen later you can evolve that into something richer, such as a discriminated union or graph-backed node model, while still lowering to Blazor render instructions.\n\n## My direct recommendation\n\nIf your goal is a serious framework:\n\n- **backend:** Blazor render tree\n- **core API:** your own rendering layer\n- **inspiration:** Bolero\n- **dependency on Bolero internals:** probably no\n\nIf you want, I can sketch the smallest viable F# architecture for this, with `Node`, `Attr`, `ComponentHost`, and a custom `ComponentBase` bridge."

