text = "[L1] {\"content\":\"[ontology]\\nname = \\\"NEXUS Base Ontology\\\"\\nversion = \\\"0.1.0\\\"\\ndescription = \\\"Minimal NEXUS ontology just above graph theory.\\\"\\n\\n[[categories]]\\nid = \\\"nexus.category.structure\\\"\\nlabel = \\\"Structure\\\"\\ndefinition = \\\"Defines what exists as first-class things in the graph.\\\"\\n\\n[[categories]]\\nid = \\\"nexus.category.relation\\\"\\nlabel = \\\"Relation\\\"\\ndefinition = \\\"Defines how structural elements connect.\\\"\\n\\n[[categories]]\\nid = \\\"nexus.category.meta\\\"\\nlabel = \\\"Meta\\\"\\ndefinition = \\\"Defines how structure is interpreted.\\\"\\n\\n[[categories]]\\nid = \\\"nexus.category.classification\\\"\\nlabel = \\\"Classification\\\"\\ndefinition = \\\"Defines labels used for organization and tooling.\\\"\\n\\n[[roles]]\\nid = \\\"nexus.role.interface\\\"\\nlabel = \\\"Interface\\\"\\ndefinition = \\\"A context-relative role at a boundary.\\\"\\n\\n[[roles]]\\nid = \\\"nexus.role.command\\\"\\nlabel = \\\"Command\\\"\\ndefinition = \\\"A software-lens role representing requested change.\\\"\\n\\n[[roles]]\\nid = \\\"nexus.role.event\\\"\\nlabel = \\\"Event\\\"\\ndefinition = \\\"A software-lens role representing recorded fact.\\\"\\n\\n[[roles]]\\nid = \\\"nexus.role.view\\\"\\nlabel = \\\"View\\\"\\ndefinition = \\\"A software-lens role representing a derived read artifact.\\\"\\n\\n[[roles]]\\nid = \\\"nexus.role.processor\\\"\\nlabel = \\\"Processor\\\"\\ndefinition = \\\"A role representing active processing within a context or lens.\\\"\\n\\n[[domains]]\\nid = \\\"nexus.domain.software-development\\\"\\nlabel = \\\"Software Development\\\"\\ndefinition = \\\"A coherent software-oriented meaning space.\\\"\\n\\n[[domains]]\\nid = \\\"nexus.domain.knowledge\\\"\\nlabel = \\\"Knowledge\\\"\\ndefinition = \\\"A coherent knowledge-oriented meaning space.\\\"\\n\\n[[meanings]]\\nid = \\\"nexus.meaning.software.event\\\"\\ndomain_id = \\\"nexus.domain.software-development\\\"\\nlabel = \\\"Event\\\"\\ndefinition = \\\"A recorded fact that something occurred.\\\"\\n\\n[[meanings]]\\nid = \\\"nexus.meaning.software.view\\\"\\ndomain_id = \\\"nexus.domain.software-development\\\"\\nlabel = \\\"View\\\"\\ndefinition = \\\"A derived read artifact shaped for a consumer.\\\"\\n\\n[[meanings]]\\nid = \\\"nexus.meaning.knowledge.fact\\\"\\ndomain_id = \\\"nexus.domain.knowledge\\\"\\nlabel = \\\"Fact\\\"\\ndefinition = \\\"A knowledge-domain semantic interpretation for a node.\\\"\\n\\n[[lenses]]\\nid = \\\"nexus.lens.node\\\"\\nlabel = \\\"Node Lens\\\"\\ndefinition = \\\"Reveals nodes while hiding most relation detail.\\\"\\n\\n[[lenses]]\\nid = \\\"nexus.lens.behavior\\\"\\nlabel = \\\"Behavior Lens\\\"\\ndefinition = \\\"Reveals behavior-oriented relation detail.\\\"\\n\\n[[laws]]\\nid = \\\"nexus.law.node-may-relate\\\"\\nlabel = \\\"A node may relate to other nodes.\\\"\\ncategory = \\\"Relation\\\"\\n\\n[[laws]]\\nid = \\\"nexus.law.multiple-independent-derivations\\\"\\nlabel = \\\"A node may have multiple independent derivations.\\\"\\ncategory = \\\"Relation\\\"\\n\\n[[laws]]\\nid = \\\"nexus.law.boundary-separates-contexts\\\"\\nlabel = \\\"A boundary separates contexts while allowing handoff.\\\"\\ncategory = \\\"Structure\\\"\\n\\n[[laws]]\\nid = \\\"nexus.law.lens-reveals-partial-graph\\\"\\nlabel = \\\"A lens reveals only part of the graph.\\\"\\ncategory = \\\"Meta\\\"\\n\\n[[laws]]\\nid = \\\"nexus.law.meaning-does-not-alter-structure\\\"\\nlabel = \\\"Meaning does not alter structure.\\\"\\ncategory = \\\"Meta\\\"\\n\",\"encoding\":\"utf-8\",\"sha\":\"37b0022c56052d4eea69fe4cf3ad5ef54644f787\",\"display_url\":\"https://github.com/IvanTheGeek/NEXUS/blob/main/nexus/core/ontology.toml\",\"display_title\":\"ontology.toml\"}"

