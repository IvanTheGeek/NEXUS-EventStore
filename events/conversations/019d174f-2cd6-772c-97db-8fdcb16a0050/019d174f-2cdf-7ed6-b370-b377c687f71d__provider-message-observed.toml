kind = "plain_text"
text = "[L1] {\"content\":\"# Write / Read Separation\\n\\nLawId: `nexus.law.write-read-separation`\\n\\n## Statement\\n\\nNEXUS modeling is always EITHER write side OR read side, never a combined chain.\\n\\n## Canonical node sets\\n\\n### Write side\\n- Interface\\n- Command\\n- Event\\n\\n### Read side\\n- Event\\n- View\\n- Interface\\n\\n## Anti-pattern\\n\\n- Interface -> Command -> Event -> View\\n\\n## Why this matters\\n\\nCombining write and read into one chain collapses different concerns and breaks lens separation.\\n\\n## Notes\\n\\nEvent is the shared node role between the two sides, but the sides remain distinct.\\n\",\"encoding\":\"utf-8\",\"sha\":\"0717601af938f3079fccb08b2b4fe4f5c788db0c\",\"display_url\":\"https://github.com/IvanTheGeek/NEXUS/blob/main/nexus/laws/write-read-separation.md\",\"display_title\":\"write-read-separation.md\"}"

