kind = "plain_text"
text = "[L1] {\"content\":\"namespace Nexus.Core\\n\\n/// Core NEXUS types\\n///\\n/// Structure, Relation, Meta, and Classification are explicitly separated.\\n/// Meaning must not alter structure.\\n\\n[<Struct>]\\ntype Id = Id of string\\n\\n// -----------------------------\\n// Classification\\n// -----------------------------\\n\\ntype Category =\\n    | Structure\\n    | Relation\\n    | Meta\\n    | Classification\\n\\n// Roles are lens/context dependent\\ntype Role =\\n    | Interface\\n    | Command\\n    | Event\\n    | View\\n    | Processor\\n    | Custom of string\\n\\n// -----------------------------\\n// Structure\\n// -----------------------------\\n\\ntype Node =\\n    { Id: Id\\n      Label: string option\\n      Roles: Role list }\\n\\ntype Boundary =\\n    { Id: Id\\n      Label: string option\\n      FromContext: Id option\\n      ToContext: Id option }\\n\\ntype Context =\\n    { Id: Id\\n      Label: string option\\n      Parent: Id option }\\n\\n// -----------------------------\\n// Relation\\n// -----------------------------\\n\\ntype Relation =\\n    { Id: Id\\n      Source: Id\\n      Target: Id\\n      Label: string option }\\n\\n/// Derivation = directional dependency\\n/// One node may have many independent derivations\\n\\ntype Derivation =\\n    { Id: Id\\n      Source: Id\\n      Target: Id\\n      Label: string option\\n      IsIndependent: bool }\\n\\n// -----------------------------\\n// Meta\\n// -----------------------------\\n\\ntype Lens =\\n    { Id: Id\\n      Label: string option\\n      Description: string option }\\n\\ntype Domain =\\n    { Id: Id\\n      Label: string\\n      Description: string option }\\n\\n/// Meaning assigns interpretation only\\ntype Meaning =\\n    { Id: Id\\n      DomainId: Id\\n      Label: string\\n      Description: string option }\\n\\n// -----------------------------\\n// Bindings\\n// -----------------------------\\n\\ntype NodeMeaning =\\n    { NodeId: Id\\n      MeaningId: Id }\\n\\ntype RelationMeaning =\\n    { RelationId: Id\\n      MeaningId: Id }\\n\\n// -----------------------------\\n// Graph container\\n// -----------------------------\\n\\ntype NexusGraph =\\n    { Nodes: Node list\\n      Boundaries: Boundary list\\n      Contexts: Context list\\n      Relations: Relation list\\n      Derivations: Derivation list\\n      Lenses: Lens list\\n      Domains: Domain list\\n      Meanings: Meaning list\\n      NodeMeanings: NodeMeaning list\\n      RelationMeanings: RelationMeaning list }\\n\",\"encoding\":\"utf-8\",\"sha\":\"df2b5b6723400f6ccc45421dc6dd6b75121db159\",\"display_url\":\"https://github.com/IvanTheGeek/NEXUS/blob/def/base-ontology-reconcile/src/Nexus/Core/Types.fs\",\"display_title\":\"Types.fs\"}"

