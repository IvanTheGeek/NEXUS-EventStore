text = "Great questionвЂ”this is one of those things that seems small but is actually **core to how UI events work in F# / Blazor**.\n\n---\n\n# рџ§  Short answer\n\nYou use:\n\n```fsharp\nfun () -> ...\n```\n\nbecause you need to pass a **function to run later**, not run the code immediately.\n\n---\n\n# рџ”Ґ The key idea\n\n> **Events require a function (callback), not a value**\n\n---\n\n# рџ§± What happens without it\n\n### вќЊ This is wrong\n\n```fsharp\nOn.click this (this.Update(fun m -> m + 1))\n```\n\nрџ‘‰ What happens?\n\n- `this.Update(...)` runs **immediately**\n- Its result (likely `unit`) is passed\n- Nothing happens on click\n\n---\n\n# вњ… Correct version\n\n```fsharp\nOn.click this (fun () -> this.Update(fun m -> m + 1))\n```\n\nрџ‘‰ Now:\n\n- You pass a **function**\n- Blazor calls it **when the click happens**\n\n---\n\n# рџ§  Mental model\n\n```text\nвќЊ do the thing now\nвњ… give me something to do later\n```\n\n---\n\n# вљ™пёЏ What `fun () ->` means\n\nItвЂ™s an **anonymous function with no input**:\n\n```fsharp\nfun () -> expression\n```\n\nEquivalent to:\n\n```fsharp\nlet handler () = expression\n```\n\n---\n\n# рџ§± Why no input?\n\nBecause a click event often doesnвЂ™t need data.\n\nBut if it does:\n\n```fsharp\nOn.input this (fun (e: ChangeEventArgs) ->\n    printfn \"%A\" e.Value\n)\n```\n\n---\n\n# рџ§¬ In your system\n\nThis line:\n\n```fsharp\nOn.click this (fun () -> this.Update(...))\n```\n\nis doing:\n\n```text\nUI Node\n  в””в”Ђв”Ђ Attr (event handler)\n        в””в”Ђв”Ђ function stored\n```\n\nThen later:\n\n```text\nUser clicks\n   в†“\nBlazor invokes function\n   в†“\nState updates\n   в†“\nUI rerenders\n```\n\n---\n\n# рџ”Ґ Why anonymous functions are preferred here\n\n### 1пёЏвѓЈ Inline logic\n\n```fsharp\nOn.click this (fun () -> this.Update(...))\n```\n\nvs\n\n```fsharp\nlet onClick () = this.Update(...)\nOn.click this onClick\n```\n\nрџ‘‰ Inline keeps it local and readable\n\n---\n\n### 2пёЏвѓЈ Captures state (very important)\n\n```fsharp\nfun () -> this.Update(fun m -> m + 1)\n```\n\nрџ‘‰ This function вЂњremembersвЂќ:\n\n- `this`\n- current context\n\nThis is called a **closure**\n\n---\n\n# вљ пёЏ Critical distinction\n\n## Function vs result\n\n```fsharp\nthis.Update(...)      // runs NOW\nfun () -> this.Update(...)   // runs LATER\n```\n\nThis is the whole reason\n\n---\n\n# рџ§  In your NEXUS framing\n\nThink:\n\n- **Attr(Event)** = edge\n- **fun () -> ...** = behavior attached to that edge\n\n```text\nButton\n  в””в”Ђв”Ђ OnClick\n        в””в”Ђв”Ђ Behavior (function)\n```\n\n---\n\n# рџ§ѕ Bottom line\n\n- `fun () -> ...` creates a **function to run later**\n- Events need **callbacks**, not immediate execution\n- It lets Blazor call your logic at the right time\n- It also captures context (closures)\n\n---\n\nIf you want next step:\n\nрџ‘‰ I can show how to remove `fun () ->` entirely with a more declarative event system (closer to your graph model)вЂ”this is where you can go beyond Elmish."

