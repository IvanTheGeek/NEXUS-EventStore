kind = "plain_text"
text = "I was thinking about things and I realized that Adam's core event modeling is using just nodes. One has to add a lens to see the edges. The top section of a EM diagram is really a boundary to another layer or lens that is represented by a single compressed frame so to say. The edges like trigger, Handler  are an additional layer/lens. In fact, when I abstract the storage as being where the events section is, it is a boundary too.  on the diagram lens, the GWT are the respective input or maybe edges of the Handler and the Projector Nodes at that layer."

