text = "On Windows, the cleanest setup is:\n\n1. **Install Codex**\n2. **Give it access to a specific workspace/folder**\n3. **Connect GitHub**\n4. **Use WSL when you want the best local experience**\n\nThe important catch is that Codex is generally meant to work **inside a project or workspace**, not as an unrestricted “read my entire PC” agent. OpenAI’s Windows docs recommend using the **Codex app** on Windows, and for the CLI they note that **Windows support is experimental** and that **WSL is the best Windows setup**. citeturn357304search3turn357304search2\n\n## Recommended setup on Windows\n\n### Option A: Easiest — Codex app\nOpenAI says the easiest way on Windows is the **Codex app**. It is designed for parallel threads, Git support, and project-based work. citeturn357304search3turn357304search13\n\n### Option B: IDE setup — Codex extension\nYou can also install the **Codex extension** for VS Code, Cursor, or Windsurf. In the IDE, Codex starts in **Agent mode**, which lets it read files, run commands, and write changes **in your project directory**. citeturn357304search6\n\n### Option C: Terminal setup — Codex CLI\nYou can install the CLI with npm, but OpenAI says Windows CLI support is experimental and recommends **WSL** for the best experience. citeturn357304search2turn357304search6\n\n## Best practical setup for what you want\n\nIf your goal is “let Codex work on my codebase, access GitHub, and help across projects,” do this:\n\n### 1) Install the base tools\nOpenAI’s Windows app guide recommends installing these developer tools, including GitHub CLI. citeturn357304search10\n\nIn **PowerShell as Administrator**:\n\n```powershell\nwinget install --id Git.Git\nwinget install --id OpenJS.NodeJS.LTS\nwinget install --id Python.Python.3.14\nwinget install --id GitHub.cli\n```\n\nIf you do .NET work:\n\n```powershell\nwinget install --id Microsoft.DotNet.SDK.10\n```\n\n### 2) Install WSL\nBecause OpenAI recommends WSL for the best Windows CLI experience, install it even if you also use the app. citeturn357304search2turn357304search3\n\nIn **PowerShell as Administrator**:\n\n```powershell\nwsl --install\n```\n\nThen reboot if prompted.\n\nAfter reboot, open Ubuntu and update it:\n\n```bash\nsudo apt update && sudo apt upgrade -y\n```\n\n### 3) Install Codex\nFor CLI use, install inside **WSL**:\n\n```bash\nnpm install -g @openai/codex\n```\n\nThen start it:\n\n```bash\ncodex\n```\n\nOpenAI says the CLI can be installed with npm and then you run `codex` and sign in with your ChatGPT account or API key. citeturn357304search6turn357304search5\n\nIf you prefer the desktop flow, install and use the **Codex app** instead. That is OpenAI’s recommended Windows path. citeturn357304search3turn357304search13\n\n### 4) Sign in\nOpenAI’s preferred auth method is **device code authentication**:\n\n```bash\ncodex login --device-auth\n```\n\nThat requires device code login to be enabled in your ChatGPT security settings or workspace permissions. citeturn357304search5\n\n### 5) Connect GitHub\nThere are two different GitHub paths:\n\n#### For local Codex on your machine\nInstall GitHub CLI and authenticate:\n\n```powershell\ngh auth login\n```\n\nOpenAI’s Windows Codex app docs specifically say GitHub CLI powers GitHub-specific functionality, and after installing it you should run `gh auth login`. citeturn357304search10\n\nAlso set up Git if you have not already:\n\n```powershell\ngit config --global user.name \"Your Name\"\ngit config --global user.email \"you@example.com\"\n```\n\n#### For Codex web / cloud\nOpenAI says to go to Codex and **connect your GitHub account**, which lets Codex work with code in your repositories and create pull requests from its work. citeturn357304search15turn357304search0\n\n## About “access all files on my system”\n\nThat is the part to be careful with.\n\nThe current Codex guidance is centered on:\n- the **current directory**\n- a **project folder**\n- an IDE workspace\n- connected GitHub repositories\n\nOpenAI’s quickstart explicitly describes Codex working in the **current directory** or **project directory**, not unrestricted full-disk access. citeturn357304search6\n\nSo the practical answer is:\n\n- **Do not try to point Codex at your whole C:\\ drive.**\n- Put the code/projects you want it to access in one or more dedicated folders, like:\n  - `C:\\CODE\\`\n  - `C:\\Projects\\`\n- Open Codex from that folder, or open that folder in VS Code / Codex app.\n\nExample with WSL, if your code is in Windows at `C:\\CODE\\NEXUS`, it appears in WSL roughly as:\n\n```bash\ncd /mnt/c/CODE/NEXUS\ncodex\n```\n\nThat gives Codex access to that repo/workspace without unnecessarily exposing everything else on the machine.\n\n## A solid Windows setup for you\n\nGiven what you asked, I would set it up like this:\n\n### Local coding\n- Install **WSL**\n- Install **Codex CLI** inside WSL\n- Keep your repos under `C:\\CODE\\`\n- Run Codex from the repo folder you want\n\n### GitHub\n- Run `gh auth login`\n- Also connect GitHub in **Codex web/cloud** if you want repo-level cloud tasks and PR creation\n\n### Desktop convenience\n- Install the **Codex app** for Windows for easier project switching and review\n\n## Minimal command path\n\nIf you want the shortest path, do this in order:\n\n### PowerShell\n```powershell\nwinget install --id Git.Git\nwinget install --id OpenJS.NodeJS.LTS\nwinget install --id GitHub.cli\nwsl --install\ngh auth login\n```\n\n### Inside WSL\n```bash\nnpm install -g @openai/codex\ncodex login --device-auth\ncd /mnt/c/CODE\ncodex\n```\n\n## What this will let Codex do\n\nWith that setup, Codex can typically:\n- read and edit files in the folder you launch it from\n- run commands in that workspace\n- use Git locally\n- interact with GitHub after `gh auth login`\n- work with connected GitHub repos in Codex cloud/web citeturn357304search6turn357304search10turn357304search15\n\nWhat it is **not** ideally meant for is unrestricted, silent access to every file on your Windows machine.\n\nIf you want, I can give you a **copy-paste exact setup script for Windows + WSL + GitHub** tailored to a repo folder like `C:\\CODE\\NEXUS`."

