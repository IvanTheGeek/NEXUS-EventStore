text = "Then I’d make that split explicit in the model.\n\nA clean shape would be:\n\n```text\nFnHCI\n  ├─ Core\n  ├─ Runtime\n  │   ├─ UI\n  │   │   ├─ Blazor\n  │   │   ├─ HTML\n  │   │   └─ Android\n  │   ├─ CLI\n  │   └─ API\n  ├─ Design\n  │   └─ Penpot\n  ├─ Artifact\n  │   ├─ Markdown\n  │   ├─ Spec\n  │   └─ Screenshot\n  └─ Analysis\n      ├─ Graph\n      ├─ Validation\n      └─ Metrics\n```\n\nThat gives you a very strong orthogonal separation:\n\n- **Core** = canonical interaction truth\n- **Runtime** = things that execute\n- **Design** = things humans design in\n- **Artifact** = things humans read/share/review\n- **Analysis** = things that inspect or validate the model\n\nPenpot fits best under **Design**, not Runtime.\n\nSo for naming, I’d lean toward:\n\n```text\nFnHCI.Design.Penpot\nFnHCI.Runtime.UI.Blazor\nFnHCI.Runtime.UI.HTML\nFnHCI.Runtime.UI.Android\nFnHCI.Runtime.CLI\nFnHCI.Runtime.API\n```\n\nThen your friendly public names can still be shorter:\n\n```text\nFnUI.Blazor\nFnUI.HTML\nFnUI.Android\nFnCLI\nFnAPI\n```\n\nThat lets the internal architecture stay precise while the outside branding stays simple.\n\nThe important insight is this:\n\n> Blazor and HTML answer “how does this run?”  \n> Penpot answers “how is this designed?”  \n> Markdown/spec answers “how is this communicated?”  \n> Graph/validation answers “how is this understood or checked?”\n\nThose are different axes of projection.\n\nA strong rule for the system would be:\n\n> A projection must declare both its **purpose** and its **target**.\n\nFor example:\n\n- purpose = Runtime, target = Blazor\n- purpose = Design, target = Penpot\n- purpose = Artifact, target = Markdown\n- purpose = Analysis, target = GraphViz\n\nThat is much cleaner than treating every output as just “another renderer.”\n\nIf you want, I can turn this into copyable blocks for:\n1. markdown definitions,\n2. F# discriminated unions,\n3. TOML projection metadata."

