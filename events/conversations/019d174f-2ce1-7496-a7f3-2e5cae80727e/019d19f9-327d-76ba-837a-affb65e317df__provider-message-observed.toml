text = "Put it on the **parent as children**.\n\nThat is the better default for a file format that is meant to be:\n\n- human-readable\n- easy to author\n- easy to diff in git\n- close to HTML/tree-shaped thinking\n- loaded into an in-memory graph where inverse links can be derived\n\nThe reason is that your file is not just storing raw graph facts. It is also serving as a **human authoring artifact**. For that, nesting under the parent is usually the cleanest representation.\n\n## Why parent -> children is the better file shape\n\nA structure like this:\n\n```toml\n[[node]]\nid = \"body\"\nkind = \"Artifact\"\nchildren = [\"header\", \"main\", \"footer\"]\n\n[[node]]\nid = \"header\"\nkind = \"Artifact\"\n\n[[node]]\nid = \"main\"\nkind = \"Artifact\"\n\n[[node]]\nid = \"footer\"\nkind = \"Artifact\"\n```\n\nor in an indented form:\n\n```yaml\nbody:\n  kind: Artifact\n  children:\n    - header\n    - main\n    - footer\n```\n\nhas several advantages.\n\nFirst, it matches how humans think about containment:\n\n> body contains header, main, footer\n\nSecond, it preserves **grouping and order** naturally.  \nThat matters a lot for HTML-like or document-like structures, because sibling order is meaningful.\n\nThird, it makes the parent node the obvious place where the structure is declared. You can inspect one node and immediately see what it contains.\n\nFourth, it keeps the file closer to a **tree projection**, which is easier to read and edit than scattering parent references across many child nodes.\n\n## Why child -> parent is weaker as the authoring format\n\nThis shape:\n\n```toml\n[[node]]\nid = \"header\"\nparent = \"body\"\n\n[[node]]\nid = \"main\"\nparent = \"body\"\n\n[[node]]\nid = \"footer\"\nparent = \"body\"\n```\n\nis not wrong, but it is weaker for a tree/document authoring experience.\n\nProblems:\n\n- you lose natural grouping\n- you lose explicit child ordering unless you add another field like `position`\n- the structure is more fragmented across the file\n- it is harder to visually understand the whole subtree\n\nIt works better when the graph is not strongly tree-shaped, or when children may belong to many parents, but for HTML-style containment it is not the best primary shape.\n\n## Best model\n\nThe cleanest setup is:\n\n### In the file\nUse:\n\n> **parent declares children**\n\n### In memory\nLoad that as canonical edges:\n\n> `Parent --contains--> Child`\n\nThen derive or materialize fast lookup for:\n\n> `Child --contained_by--> Parent`\n\nSo:\n\n- file shape = author-friendly\n- in-memory graph = graph-friendly\n- reverse traversal = derived convenience\n\n## Strong rule for your system\n\nFor **tree-like containment relations**, the serialization should usually be:\n\n> containment is declared by the container\n\nThat means:\n\n- HTML-like structures\n- UI layout trees\n- chapter/section/subsection\n- folder/file projections\n- menu/submenu relationships\n\nall usually read better as parent listing children.\n\n## When child -> parent might be better\n\nUse child-declares-parent only when the structure is not really a tree artifact, and the child’s classification depends more on where it belongs than on what it contains.\n\nExamples:\n\n- employee belongs to department\n- event belongs to stream\n- item belongs to category\n\nEven there, if the purpose of the file is human understanding of grouped structure, parent listing members may still be nicer.\n\n## NEXUS-style phrasing\n\nI would phrase the rule like this:\n\n> In serialized artifacts, containment should usually be declared from whole to part.  \n> In the in-memory graph, inverse navigation may be derived from the canonical containment edge.\n\nOr even tighter:\n\n> Author as parent-with-children. Load as contains edges. Derive parent links.\n\n## Recommendation\n\nFor your PAML/TOML/YAML-style ontology files:\n\n- use **children on the parent** for containment\n- treat that as the canonical serialized form\n- generate reverse parent lookup during load\n- never require both in the file unless you are validating redundancy on purpose\n\nA compact example:\n\n```toml\n[[node]]\nid = \"html\"\nkind = \"Artifact\"\nchildren = [\"head\", \"body\"]\n\n[[node]]\nid = \"head\"\nkind = \"Artifact\"\n\n[[node]]\nid = \"body\"\nkind = \"Artifact\"\nchildren = [\"header\", \"main\", \"footer\"]\n```\n\nLoader behavior:\n\n- create nodes\n- create `contains` edges from each parent to each listed child\n- build reverse index so each child can quickly find its parent\n\nThat gives you the cleanest combination of authoring clarity and graph power.\n\nIf you want, I can sketch a small NEXUS-friendly file schema showing how to represent `nodes`, `edges`, and `children` without ambiguity."

