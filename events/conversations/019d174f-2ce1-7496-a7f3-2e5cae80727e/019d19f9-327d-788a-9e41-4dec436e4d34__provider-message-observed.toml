text = "Yes вЂ” Penpot can fit, but **not as the same kind of target** as Blazor/HTML/Android.\n\nThat is the orthogonal idea.\n\n## The distinction\n\nSome targets are **runtime projections**:\n\n- Blazor\n- HTML\n- Android\n- CLI\n- API\n\nThese produce something that executes or is consumed directly.\n\nPenpot is different. It is more like a **design-authoring projection**.\n\nSo instead of grouping it with runtime targets, I would separate the world into two axes:\n\n## Axis 1: execution surfaces\n\nThese are things the user or system actually runs or uses.\n\n```text\nFnHCI\n  в”њв”Ђ UI\n  в”‚   в”њв”Ђ Blazor\n  в”‚   в”њв”Ђ HTML\n  в”‚   в””в”Ђ Android\n  в”њв”Ђ CLI\n  в””в”Ђ API\n```\n\n## Axis 2: authoring / design / analysis tools\n\nThese are tools that represent, edit, inspect, or refine the model.\n\n```text\nFnHCI\n  в”њв”Ђ Design\n  в”‚   в””в”Ђ Penpot\n  в”њв”Ђ Docs\n  в”њв”Ђ Analysis\n  в””в”Ђ Visualization\n```\n\nThat is the stronger orthogonal split.\n\n## Why Penpot is different\n\nPenpot is not primarily:\n\n- the final runtime\n- the execution engine\n- the app surface\n\nIt is a **design lens** or **design artifact projection**.\n\nSo if you put it beside Blazor and HTML, the model starts to blur two different concerns:\n\n- вЂњwhere does this run?вЂќ\n- вЂњwhere can this be designed or edited?вЂќ\n\nThose are not the same.\n\n## Better structure\n\nI would think about FnHCI having projection families like this:\n\n```text\nFnHCI\n  в”њв”Ђ Runtime\n  в”‚   в”њв”Ђ UI\n  в”‚   в”‚   в”њв”Ђ Blazor\n  в”‚   в”‚   в”њв”Ђ HTML\n  в”‚   в”‚   в””в”Ђ Android\n  в”‚   в”њв”Ђ CLI\n  в”‚   в””в”Ђ API\n  в”њв”Ђ Design\n  в”‚   в””в”Ђ Penpot\n  в”њв”Ђ Artifact\n  в”‚   в”њв”Ђ Docs\n  в”‚   в”њв”Ђ Specs\n  в”‚   в””в”Ђ Screenshots/Mockups\n  в””в”Ђ Analysis\n      в”њв”Ђ GraphViz\n      в”њв”Ђ Metrics\n      в””в”Ђ Validation\n```\n\nThat feels much cleaner.\n\n## NEXUS-style phrasing\n\nYou could say:\n\n> Penpot is not a runtime surface. It is a design lens over FnHCI, capable of projecting interaction structure into editable visual artifacts and, potentially, feeding design changes back into the canonical model.\n\nThat matches what you were already thinking with the transpiler idea.\n\n## The really strong move\n\nSeparate projections by **purpose**, not just by platform.\n\n### Purpose categories\n\n- **Runtime projection** вЂ” what executes\n- **Design projection** вЂ” what humans design in\n- **Artifact projection** вЂ” what humans read/share\n- **Analysis projection** вЂ” what helps understand/validate\n- **Code projection** вЂ” what developers edit directly\n\nThen Penpot clearly lands under:\n\n> **Design projection**\n\n## Example\n\nA login surface in FnHCI could project to:\n\n- Blazor page\n- static HTML artifact\n- Android screen\n- CLI flow\n- API contract\n- Penpot mock/design board\n- markdown spec\n- graph diagram\n\nSame truth, different purposes.\n\n## So the orthogonal idea is\n\nNot:\n\n> Penpot is another UI target\n\nBut:\n\n> Penpot is a design-space projection, orthogonal to runtime targets\n\n## Very compact model\n\n```text\nFnHCI\n  в”њв”Ђ Runtime projections\n  в”њв”Ђ Design projections\n  в”њв”Ђ Artifact projections\n  в””в”Ђ Analysis projections\n```\n\nThen:\n\n```text\nRuntime/UI/Blazor\nRuntime/UI/HTML\nRuntime/UI/Android\nDesign/Penpot\nArtifact/Markdown\nAnalysis/GraphViz\n```\n\nThat is probably the cleanest architecture you have reached so far.\n\n## My recommendation\n\nUse Penpot, but classify it as:\n\n> **FnHCI.Design.Penpot**\n\nnot:\n\n> FnUI.Penpot\n\nunless you want a marketing alias later.\n\n## Tight conclusion\n\nYes, Penpot belongs вЂ” but the better orthogonal idea is to separate **runtime surfaces** from **design lenses**. Penpot is a design projection, not just another UI runtime target.\n\nThe next strong step would be to define the projection categories explicitly as first-class types in your model."

