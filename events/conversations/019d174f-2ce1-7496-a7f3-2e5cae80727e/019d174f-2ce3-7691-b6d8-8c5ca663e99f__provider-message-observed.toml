text = "Yes. This is worth making explicit in the model.\n\n## Markdown\n\n```md\n# NEXUS Graph Separation\n\n## Core Principle\n\nThere is not one linear pipeline.\n\nThere are two distinct graphs with Event as the boundary:\n\n- **WriteGraph** — creates truth\n- **ReadGraph** — projects truth\n\n---\n\n## WriteGraph\n\nThe write side is causal and authoritative.\n\nCanonical flow:\n\n- Actor triggers Command\n- Command produces Event\n\nThe write side answers:\n\n> What happened?\n\nIt must not contain:\n- views\n- screens\n- receipts\n- projections\n- formatting concerns\n\n---\n\n## ReadGraph\n\nThe read side is derivative and non-authoritative.\n\nCanonical flow:\n\n- Event projects to Projection\n- Projection informs Interface or Actor\n\nThe read side answers:\n\n> How is what happened represented, experienced, or consumed?\n\nIt may contain:\n- UI projections\n- CLI projections\n- API projections\n- artifacts\n- analysis outputs\n- design outputs\n\nIt must not create truth.\n\n---\n\n## Boundary Law\n\nEvent is the boundary between write and read.\n\n- WriteGraph may produce Event\n- ReadGraph may consume Event\n- ReadGraph may not produce authoritative truth\n\n---\n\n## Canonical Expressions\n\n### Write\nActor ──triggers──► Command ──produces──► Event\n\n### Read\nEvent ──projects_to──► Projection\nProjection ──informs──► Interface\nInterface ──informs──► Actor\n\n---\n\n## Key Laws\n\n1. Truth is created only on the write side.\n2. The read side is entirely projection.\n3. One Event may feed many projections.\n4. Projections are replaceable; Events are authoritative.\n5. Read concerns must never be required to define write truth.\n\n---\n\n## Restaurant Example\n\n### WriteGraph\nCustomer ──triggers──► PlaceOrder\nPlaceOrder ──produces──► OrderPlaced\n\n### ReadGraph\nOrderPlaced ──projects_to──► CustomerPOSConfirmation\nOrderPlaced ──projects_to──► CashierOrderList\nOrderPlaced ──projects_to──► KitchenDisplayQueue\nOrderPlaced ──projects_to──► Receipt\nOrderPlaced ──projects_to──► KitchenTicket\n\nThe projections do not define the order.\nThey only represent it.\n```\n\n## F# types\n\n```fsharp\nnamespace Nexus.Core\n\ntype Id = Id of string\n\ntype ActorId = ActorId of string\ntype CommandId = CommandId of string\ntype EventId = EventId of string\ntype ProjectionId = ProjectionId of string\ntype InterfaceId = InterfaceId of string\n\ntype WriteNode =\n    | WriteActor of ActorId\n    | Command of CommandId\n    | Event of EventId\n\ntype ReadNode =\n    | EventSource of EventId\n    | Projection of ProjectionId\n    | Interface of InterfaceId\n    | ReadActor of ActorId\n\ntype WriteEdge =\n    | Triggers of ActorId * CommandId\n    | Produces of CommandId * EventId\n\ntype ReadEdge =\n    | ProjectsTo of EventId * ProjectionId\n    | InformsInterface of ProjectionId * InterfaceId\n    | InformsActor of InterfaceId * ActorId\n\ntype WriteGraph =\n    { Nodes : WriteNode list\n      Edges : WriteEdge list }\n\ntype ReadGraph =\n    { Nodes : ReadNode list\n      Edges : ReadEdge list }\n\ntype NexusModel =\n    { Write : WriteGraph\n      Read : ReadGraph }\n```\n\n## F# helper modules\n\n```fsharp\nnamespace Nexus.Core\n\nmodule WriteGraph =\n\n    let empty : WriteGraph =\n        { Nodes = []\n          Edges = [] }\n\n    let addActor actorId graph =\n        { graph with Nodes = WriteActor actorId :: graph.Nodes }\n\n    let addCommand commandId graph =\n        { graph with Nodes = Command commandId :: graph.Nodes }\n\n    let addEvent eventId graph =\n        { graph with Nodes = Event eventId :: graph.Nodes }\n\n    let addTriggers actorId commandId graph =\n        { graph with Edges = Triggers (actorId, commandId) :: graph.Edges }\n\n    let addProduces commandId eventId graph =\n        { graph with Edges = Produces (commandId, eventId) :: graph.Edges }\n\nmodule ReadGraph =\n\n    let empty : ReadGraph =\n        { Nodes = []\n          Edges = [] }\n\n    let addEventSource eventId graph =\n        { graph with Nodes = EventSource eventId :: graph.Nodes }\n\n    let addProjection projectionId graph =\n        { graph with Nodes = Projection projectionId :: graph.Nodes }\n\n    let addInterface interfaceId graph =\n        { graph with Nodes = Interface interfaceId :: graph.Nodes }\n\n    let addActor actorId graph =\n        { graph with Nodes = ReadActor actorId :: graph.Nodes }\n\n    let addProjectsTo eventId projectionId graph =\n        { graph with Edges = ProjectsTo (eventId, projectionId) :: graph.Edges }\n\n    let addInformsInterface projectionId interfaceId graph =\n        { graph with Edges = InformsInterface (projectionId, interfaceId) :: graph.Edges }\n\n    let addInformsActor interfaceId actorId graph =\n        { graph with Edges = InformsActor (interfaceId, actorId) :: graph.Edges }\n```\n\n## F# sample instance\n\n```fsharp\nnamespace Nexus.Examples\n\nopen Nexus.Core\n\nmodule Restaurant =\n\n    let customer = ActorId \"customer\"\n    let placeOrder = CommandId \"place-order\"\n    let orderPlaced = EventId \"order-placed\"\n\n    let customerPos = ProjectionId \"customer-pos-confirmation\"\n    let kitchenDisplay = ProjectionId \"kitchen-display-queue\"\n    let receipt = ProjectionId \"receipt\"\n    let kitchenTicket = ProjectionId \"kitchen-ticket\"\n\n    let customerScreen = InterfaceId \"customer-screen\"\n    let kitchenScreen = InterfaceId \"kitchen-screen\"\n    let receiptPrinter = InterfaceId \"receipt-printer\"\n    let kitchenPrinter = InterfaceId \"kitchen-printer\"\n\n    let writeGraph =\n        WriteGraph.empty\n        |> WriteGraph.addActor customer\n        |> WriteGraph.addCommand placeOrder\n        |> WriteGraph.addEvent orderPlaced\n        |> WriteGraph.addTriggers customer placeOrder\n        |> WriteGraph.addProduces placeOrder orderPlaced\n\n    let readGraph =\n        ReadGraph.empty\n        |> ReadGraph.addEventSource orderPlaced\n        |> ReadGraph.addProjection customerPos\n        |> ReadGraph.addProjection kitchenDisplay\n        |> ReadGraph.addProjection receipt\n        |> ReadGraph.addProjection kitchenTicket\n        |> ReadGraph.addInterface customerScreen\n        |> ReadGraph.addInterface kitchenScreen\n        |> ReadGraph.addInterface receiptPrinter\n        |> ReadGraph.addInterface kitchenPrinter\n        |> ReadGraph.addActor customer\n        |> ReadGraph.addProjectsTo orderPlaced customerPos\n        |> ReadGraph.addProjectsTo orderPlaced kitchenDisplay\n        |> ReadGraph.addProjectsTo orderPlaced receipt\n        |> ReadGraph.addProjectsTo orderPlaced kitchenTicket\n        |> ReadGraph.addInformsInterface customerPos customerScreen\n        |> ReadGraph.addInformsInterface kitchenDisplay kitchenScreen\n        |> ReadGraph.addInformsInterface receipt receiptPrinter\n        |> ReadGraph.addInformsInterface kitchenTicket kitchenPrinter\n        |> ReadGraph.addInformsActor customerScreen customer\n\n    let model =\n        { Write = writeGraph\n          Read = readGraph }\n```\n\n## TOML\n\n```toml\nversion = \"0.1\"\n\n[model]\nid = \"restaurant-order\"\n\n[write]\n\n[[write.node]]\nid = \"customer\"\nkind = \"Actor\"\n\n[[write.node]]\nid = \"place-order\"\nkind = \"Command\"\n\n[[write.node]]\nid = \"order-placed\"\nkind = \"Event\"\n\n[[write.edge]]\nfrom = \"customer\"\nrelation = \"triggers\"\nto = \"place-order\"\n\n[[write.edge]]\nfrom = \"place-order\"\nrelation = \"produces\"\nto = \"order-placed\"\n\n[read]\n\n[[read.node]]\nid = \"order-placed\"\nkind = \"EventSource\"\n\n[[read.node]]\nid = \"customer-pos-confirmation\"\nkind = \"Projection\"\n\n[[read.node]]\nid = \"kitchen-display-queue\"\nkind = \"Projection\"\n\n[[read.node]]\nid = \"receipt\"\nkind = \"Projection\"\n\n[[read.node]]\nid = \"kitchen-ticket\"\nkind = \"Projection\"\n\n[[read.node]]\nid = \"customer-screen\"\nkind = \"Interface\"\n\n[[read.node]]\nid = \"kitchen-screen\"\nkind = \"Interface\"\n\n[[read.node]]\nid = \"receipt-printer\"\nkind = \"Interface\"\n\n[[read.node]]\nid = \"kitchen-printer\"\nkind = \"Interface\"\n\n[[read.node]]\nid = \"customer\"\nkind = \"Actor\"\n\n[[read.edge]]\nfrom = \"order-placed\"\nrelation = \"projects_to\"\nto = \"customer-pos-confirmation\"\n\n[[read.edge]]\nfrom = \"order-placed\"\nrelation = \"projects_to\"\nto = \"kitchen-display-queue\"\n\n[[read.edge]]\nfrom = \"order-placed\"\nrelation = \"projects_to\"\nto = \"receipt\"\n\n[[read.edge]]\nfrom = \"order-placed\"\nrelation = \"projects_to\"\nto = \"kitchen-ticket\"\n\n[[read.edge]]\nfrom = \"customer-pos-confirmation\"\nrelation = \"informs\"\nto = \"customer-screen\"\n\n[[read.edge]]\nfrom = \"kitchen-display-queue\"\nrelation = \"informs\"\nto = \"kitchen-screen\"\n\n[[read.edge]]\nfrom = \"receipt\"\nrelation = \"informs\"\nto = \"receipt-printer\"\n\n[[read.edge]]\nfrom = \"kitchen-ticket\"\nrelation = \"informs\"\nto = \"kitchen-printer\"\n\n[[read.edge]]\nfrom = \"customer-screen\"\nrelation = \"informs\"\nto = \"customer\"\n```\n\n## Tight rule set\n\n```md\n# Separation Rules\n\n- `WriteGraph` may contain only write-side causality.\n- `ReadGraph` may contain only read-side projection.\n- `Event` is the only shared identity across the boundary.\n- `Projection` must never be required for `Command` or `Event` validity.\n- `Interface` belongs to read, never write.\n- A read model may be rebuilt, replaced, or multiplied without changing write truth.\n```\n\n## My recommendation\n\nMake these two graph types first-class in the repo immediately:\n\n```text\nWriteGraph\nReadGraph\n```\n\nnot just as documentation, but as actual code-level types. That will prevent the linear-pipeline mistake from creeping back in.\n\nThe next strongest move is to define the canonical allowed edge set for each graph, so the ontology itself enforces the separation."

