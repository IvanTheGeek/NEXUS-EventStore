kind = "plain_text"
text = "HTML, viewed as the text artifact in an `.html` file, can be described in graph terms like this:\n\nAn HTML file is **text that encodes a graph-shaped structure**.\n\nMore precisely, the parsed HTML document is usually modeled as a **rooted, ordered, labeled tree**, which is a special kind of graph.\n\nHow that maps:\n\n- **Nodes** = elements, text nodes, comments, document node\n- **Edges** = containment relationships such as “parent contains child”\n- **Root** = the document root\n- **Order** = sibling order matters, so it is not just a plain graph, but an ordered one\n- **Labels/properties** = tag names, attributes, text content\n\nExample:\n\n```html\n<html>\n  <body>\n    <h1>Hello</h1>\n    <p>World</p>\n  </body>\n</html>\n```\n\nCan be seen as:\n\n```text\nDocument\n└── html\n    └── body\n        ├── h1\n        │   └── \"Hello\"\n        └── p\n            └── \"World\"\n```\n\nIn graph language:\n\n- `Document -> html`\n- `html -> body`\n- `body -> h1`\n- `h1 -> \"Hello\"`\n- `body -> p`\n- `p -> \"World\"`\n\nSo the important distinction is:\n\n**The file itself** is a linear text artifact.  \n**What that text represents** is a hierarchical graph structure.\n\nA stronger phrasing would be:\n\n> HTML source is a serialized representation of a labeled, rooted, ordered tree.\n\nAnd since a tree is a constrained form of graph:\n\n> HTML is text whose primary purpose is to describe a document tree, which is a special case of a graph.\n\nIf you want to connect this to your NEXUS style thinking:\n\n- the `.html` file = **Artifact**\n- the parsed DOM structure = **Graph / Structure**\n- tags like `div`, `form`, `button` = **node kinds or typed nodes**\n- parent/child nesting = **relations**\n- attributes like `id`, `class`, `href` = **properties on nodes**\n- rendered UI = **a projection or lens over that structure**\n\nSo I would describe it as:\n\n> An HTML file is a text artifact that serializes a document tree. That tree is a graph-shaped structure composed of typed nodes and containment relations, which can then be interpreted by a browser into further structures and views.\n\nThe one caution is that people casually say “HTML is a graph,” but the cleaner statement is:\n\n> HTML text is not itself the graph; it is the textual encoding of a graph-structured document.\n\nIf you want, I can give you the same explanation in a tighter NEXUS-style form using **Artifact / Structure / Relation / Projection** terms."

