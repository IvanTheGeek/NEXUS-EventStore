text = "Perfect — this is a great real-world slice to lock the model in.\n\nBelow are **copyable blocks** for:\n\n1. Markdown (concept + example)\n2. F# types + sample data\n3. TOML (canonical + projections)\n\n---\n\n# 🧾 1. Markdown — Restaurant Order Example\n\n```md\n# FnHCI Example — Restaurant Order Flow\n\n## Canonical Interaction\n\nA customer places an order. The system records it and emits `OrderPlaced`.\n\nThis single interaction is projected into multiple runtime surfaces and artifacts.\n\n---\n\n## Roles\n\n- Customer\n- Cashier\n- Kitchen\n\n---\n\n## Canonical Elements\n\n- Menu\n- Order\n- OrderItem\n- Payment\n- Action: PlaceOrder\n\n---\n\n## Canonical Event\n\n- OrderPlaced\n\n---\n\n## Projections\n\n### Runtime / UI\n\n- Customer POS (kiosk/tablet)\n- Cashier POS\n- Kitchen Display\n\n### Runtime / API\n\n- Order Service Endpoint\n\n### Artifact\n\n- Receipt (customer)\n- Kitchen Ticket (printer)\n\n### Analysis\n\n- Order Metrics\n- Throughput / timing\n\n---\n\n## Key Principle\n\nA single event:\n\n> OrderPlaced\n\nmay project to:\n\n- Customer confirmation UI\n- Cashier order list\n- Kitchen ticket (print)\n- Kitchen display queue\n- Receipt artifact\n- API response\n- Analytics pipeline\n\n---\n\n## Rule\n\nInteraction is defined once in FnHCI.\n\nAll surfaces and artifacts are projections.\n```\n\n---\n\n# 🧠 2. F# — Core Types + Example\n\n```fsharp\nnamespace FnHCI.Restaurant\n\ntype Role =\n    | Customer\n    | Cashier\n    | Kitchen\n\ntype ElementKind =\n    | Menu\n    | Order\n    | OrderItem\n    | Payment\n    | Action\n\ntype Event =\n    | OrderPlaced\n    | PaymentCompleted\n\ntype Action =\n    { Id: string\n      Emits: Event }\n\ntype Element =\n    { Id: string\n      Kind: ElementKind\n      Role: Role option }\n\ntype Surface =\n    { Id: string\n      Role: Role\n      Elements: Element list\n      Actions: Action list }\n\ntype Artifact =\n    | Receipt\n    | KitchenTicket\n\ntype RuntimeUiTarget =\n    | CustomerPOS\n    | CashierPOS\n    | KitchenDisplay\n\ntype RuntimeTarget =\n    | UI of RuntimeUiTarget\n    | API\n\ntype ProjectionPurpose =\n    | Runtime\n    | Artifact\n    | Analysis\n\ntype ProjectionTarget =\n    | RuntimeTarget of RuntimeTarget\n    | ArtifactTarget of Artifact\n\ntype Projection =\n    { Id: string\n      Purpose: ProjectionPurpose\n      Target: ProjectionTarget }\n\n```\n\n---\n\n## Example Instance\n\n```fsharp\nmodule Example =\n\n    let placeOrder =\n        { Id = \"place-order\"\n          Emits = OrderPlaced }\n\n    let customerSurface =\n        { Id = \"customer-pos\"\n          Role = Customer\n          Elements =\n            [ { Id = \"menu\"; Kind = Menu; Role = Some Customer }\n              { Id = \"order\"; Kind = Order; Role = Some Customer } ]\n          Actions = [ placeOrder ] }\n\n    let projections =\n        [ { Id = \"ui-customer-pos\"\n            Purpose = Runtime\n            Target = RuntimeTarget (UI CustomerPOS) }\n\n          { Id = \"ui-kitchen-display\"\n            Purpose = Runtime\n            Target = RuntimeTarget (UI KitchenDisplay) }\n\n          { Id = \"receipt\"\n            Purpose = Artifact\n            Target = ArtifactTarget Receipt }\n\n          { Id = \"kitchen-ticket\"\n            Purpose = Artifact\n            Target = ArtifactTarget KitchenTicket } ]\n```\n\n---\n\n# 📦 3. TOML — Canonical + Projections\n\n## Canonical Interaction\n\n```toml\n[interaction]\nid = \"order-flow\"\ndescription = \"Customer places an order\"\n\n[[role]]\nname = \"Customer\"\n\n[[role]]\nname = \"Cashier\"\n\n[[role]]\nname = \"Kitchen\"\n\n[[event]]\nname = \"OrderPlaced\"\n\n[[action]]\nid = \"place-order\"\nemits = \"OrderPlaced\"\n```\n\n---\n\n## Runtime UI Surfaces\n\n```toml\n[[projection]]\nid = \"runtime-ui-customer-pos\"\npurpose = \"Runtime\"\nfamily = \"UI\"\ntarget = \"CustomerPOS\"\nrole = \"Customer\"\n\n[[projection]]\nid = \"runtime-ui-cashier-pos\"\npurpose = \"Runtime\"\nfamily = \"UI\"\ntarget = \"CashierPOS\"\nrole = \"Cashier\"\n\n[[projection]]\nid = \"runtime-ui-kitchen-display\"\npurpose = \"Runtime\"\nfamily = \"UI\"\ntarget = \"KitchenDisplay\"\nrole = \"Kitchen\"\n```\n\n---\n\n## Artifact Projections\n\n```toml\n[[projection]]\nid = \"artifact-receipt\"\npurpose = \"Artifact\"\nfamily = \"Receipt\"\ntarget = \"ThermalPrinter\"\nrole = \"Customer\"\n\n[[projection]]\nid = \"artifact-kitchen-ticket\"\npurpose = \"Artifact\"\nfamily = \"KitchenTicket\"\ntarget = \"ThermalPrinter\"\nrole = \"Kitchen\"\n```\n\n---\n\n## API Projection\n\n```toml\n[[projection]]\nid = \"runtime-api-order\"\npurpose = \"Runtime\"\nfamily = \"API\"\ntarget = \"OrderService\"\n```\n\n---\n\n## Analysis Projection\n\n```toml\n[[projection]]\nid = \"analysis-order-metrics\"\npurpose = \"Analysis\"\nfamily = \"Metrics\"\ntarget = \"OrderThroughput\"\n```\n\n---\n\n# 🔥 What this demonstrates\n\nThis is the key takeaway:\n\n> One canonical interaction → many projections across roles and purposes\n\nAnd more importantly:\n\n- POS ≠ Receipt ≠ Kitchen ticket  \n- but all come from the same truth  \n- and all can evolve independently without breaking the core\n\n---\n\n# 🧠 Final NEXUS-style statement\n\n> The order flow is not the POS screen, the receipt, or the kitchen ticket.  \n> Those are projections.  \n> The interaction itself is the source of truth.\n\n---\n\nIf you want next, the most powerful step is:\n\n👉 take this exact example and build **one real projection (HTML or Blazor)** from it\n\nThat’s where FnHCI becomes real instead of conceptual."

