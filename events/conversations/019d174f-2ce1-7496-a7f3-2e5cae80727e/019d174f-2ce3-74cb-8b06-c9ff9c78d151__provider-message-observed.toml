text = "Here are clean copyable starter blocks.\n\n## Markdown definitions\n\n```md\n# FnHCI Projection Model\n\n## Core Idea\n\nFnHCI is the canonical model of human-computer interaction.\n\nIt defines interaction truth once, then projects that truth into different outputs for different purposes.\n\nA projection must declare both:\n\n- **Purpose** — why this projection exists\n- **Target** — what it is projected into\n\n---\n\n## Projection Purposes\n\n### Runtime\nProduces something executable or directly consumable by a user or system.\n\nExamples:\n- Blazor\n- HTML\n- Android\n- CLI\n- API\n\nQuestion answered:\n> How does this run?\n\n---\n\n### Design\nProduces something intended for design authoring, layout exploration, or visual editing.\n\nExamples:\n- Penpot\n\nQuestion answered:\n> How is this designed?\n\n---\n\n### Artifact\nProduces something meant for reading, sharing, review, or documentation.\n\nExamples:\n- Markdown\n- Spec\n- Screenshot\n- PDF\n\nQuestion answered:\n> How is this communicated?\n\n---\n\n### Analysis\nProduces something meant to inspect, validate, visualize, or measure the model.\n\nExamples:\n- GraphViz\n- Validation report\n- Metrics report\n\nQuestion answered:\n> How is this understood or checked?\n\n---\n\n## Targets\n\n### Runtime Targets\n- UI.Blazor\n- UI.HTML\n- UI.Android\n- CLI\n- API\n\n### Design Targets\n- Penpot\n\n### Artifact Targets\n- Markdown\n- Spec\n- Screenshot\n\n### Analysis Targets\n- Graph\n- Validation\n- Metrics\n\n---\n\n## Naming Pattern\n\nInternal architectural naming should prefer:\n\n- `FnHCI.Runtime.UI.Blazor`\n- `FnHCI.Runtime.UI.HTML`\n- `FnHCI.Runtime.UI.Android`\n- `FnHCI.Runtime.CLI`\n- `FnHCI.Runtime.API`\n- `FnHCI.Design.Penpot`\n- `FnHCI.Artifact.Markdown`\n- `FnHCI.Analysis.Graph`\n\nFriendly public naming may use shorter aliases:\n\n- `FnUI.Blazor`\n- `FnUI.HTML`\n- `FnUI.Android`\n- `FnCLI`\n- `FnAPI`\n\n---\n\n## Rule\n\nA projection is not defined only by its output technology.\n\nA projection is the combination of:\n\n- a canonical FnHCI source\n- a declared purpose\n- a declared target\n- optional projection hints or target-specific options\n\n---\n\n## Example\n\nA login interaction in FnHCI may project to:\n\n- Runtime/UI/Blazor\n- Runtime/UI/HTML\n- Runtime/UI/Android\n- Runtime/CLI\n- Runtime/API\n- Design/Penpot\n- Artifact/Markdown\n- Analysis/Graph\n\nThese are different projections of the same canonical interaction truth.\n```\n\n## F# discriminated unions\n\n```fsharp\nnamespace FnHCI.Core\n\ntype ProjectionPurpose =\n    | Runtime\n    | Design\n    | Artifact\n    | Analysis\n\ntype RuntimeUiTarget =\n    | Blazor\n    | Html\n    | Android\n\ntype RuntimeTarget =\n    | UI of RuntimeUiTarget\n    | CLI\n    | API\n\ntype DesignTarget =\n    | Penpot\n\ntype ArtifactTarget =\n    | Markdown\n    | Spec\n    | Screenshot\n    | Pdf\n\ntype AnalysisTarget =\n    | Graph\n    | Validation\n    | Metrics\n\ntype ProjectionTarget =\n    | RuntimeTarget of RuntimeTarget\n    | DesignTarget of DesignTarget\n    | ArtifactTarget of ArtifactTarget\n    | AnalysisTarget of AnalysisTarget\n\ntype ProjectionId = ProjectionId of string\n\ntype ProjectionName = ProjectionName of string\n\ntype ProjectionHint =\n    | KeyValue of key:string * value:string\n    | Flag of string\n\ntype ProjectionDescriptor =\n    { Id: ProjectionId\n      Name: ProjectionName\n      Purpose: ProjectionPurpose\n      Target: ProjectionTarget\n      Hints: ProjectionHint list }\n\nmodule Projection =\n\n    let purposeOf (target: ProjectionTarget) =\n        match target with\n        | RuntimeTarget _ -> Runtime\n        | DesignTarget _ -> Design\n        | ArtifactTarget _ -> Artifact\n        | AnalysisTarget _ -> Analysis\n\n    let targetPath (target: ProjectionTarget) =\n        match target with\n        | RuntimeTarget (UI Blazor) -> \"Runtime.UI.Blazor\"\n        | RuntimeTarget (UI Html) -> \"Runtime.UI.HTML\"\n        | RuntimeTarget (UI Android) -> \"Runtime.UI.Android\"\n        | RuntimeTarget CLI -> \"Runtime.CLI\"\n        | RuntimeTarget API -> \"Runtime.API\"\n        | DesignTarget Penpot -> \"Design.Penpot\"\n        | ArtifactTarget Markdown -> \"Artifact.Markdown\"\n        | ArtifactTarget Spec -> \"Artifact.Spec\"\n        | ArtifactTarget Screenshot -> \"Artifact.Screenshot\"\n        | ArtifactTarget Pdf -> \"Artifact.Pdf\"\n        | AnalysisTarget Graph -> \"Analysis.Graph\"\n        | AnalysisTarget Validation -> \"Analysis.Validation\"\n        | AnalysisTarget Metrics -> \"Analysis.Metrics\"\n\n    let create id name target hints =\n        { Id = ProjectionId id\n          Name = ProjectionName name\n          Purpose = purposeOf target\n          Target = target\n          Hints = hints }\n```\n\n## F# with a slightly flatter form\n\nIf you want the target to already encode the purpose and be simpler to match on:\n\n```fsharp\nnamespace FnHCI.Core\n\ntype ProjectionTarget =\n    | RuntimeUiBlazor\n    | RuntimeUiHtml\n    | RuntimeUiAndroid\n    | RuntimeCli\n    | RuntimeApi\n    | DesignPenpot\n    | ArtifactMarkdown\n    | ArtifactSpec\n    | ArtifactScreenshot\n    | ArtifactPdf\n    | AnalysisGraph\n    | AnalysisValidation\n    | AnalysisMetrics\n\ntype ProjectionPurpose =\n    | Runtime\n    | Design\n    | Artifact\n    | Analysis\n\ntype ProjectionDescriptor =\n    { Id: string\n      Name: string\n      Purpose: ProjectionPurpose\n      Target: ProjectionTarget\n      Hints: Map<string, string> }\n\nmodule Projection =\n\n    let purposeOf =\n        function\n        | RuntimeUiBlazor\n        | RuntimeUiHtml\n        | RuntimeUiAndroid\n        | RuntimeCli\n        | RuntimeApi -> Runtime\n\n        | DesignPenpot -> Design\n\n        | ArtifactMarkdown\n        | ArtifactSpec\n        | ArtifactScreenshot\n        | ArtifactPdf -> Artifact\n\n        | AnalysisGraph\n        | AnalysisValidation\n        | AnalysisMetrics -> Analysis\n```\n\nI think the first version is better for your ontology because it preserves the orthogonal structure.\n\n## TOML projection metadata\n\nHere is a clean TOML form for describing available projections.\n\n```toml\nversion = \"0.1\"\n\n[[projection]]\nid = \"runtime-ui-blazor\"\nname = \"Blazor UI Runtime\"\npurpose = \"Runtime\"\ntarget = \"UI.Blazor\"\nhints = [\"interactive\", \"component-based\", \"render-tree\"]\n\n[[projection]]\nid = \"runtime-ui-html\"\nname = \"HTML UI Runtime\"\npurpose = \"Runtime\"\ntarget = \"UI.HTML\"\nhints = [\"static-artifact\", \"browser\", \"document-tree\"]\n\n[[projection]]\nid = \"runtime-ui-android\"\nname = \"Android UI Runtime\"\npurpose = \"Runtime\"\ntarget = \"UI.Android\"\nhints = [\"mobile\", \"native\"]\n\n[[projection]]\nid = \"runtime-cli\"\nname = \"CLI Runtime\"\npurpose = \"Runtime\"\ntarget = \"CLI\"\nhints = [\"terminal\", \"sequential-flow\"]\n\n[[projection]]\nid = \"runtime-api\"\nname = \"API Runtime\"\npurpose = \"Runtime\"\ntarget = \"API\"\nhints = [\"contract\", \"service\", \"machine-consumable\"]\n\n[[projection]]\nid = \"design-penpot\"\nname = \"Penpot Design Projection\"\npurpose = \"Design\"\ntarget = \"Penpot\"\nhints = [\"design-authoring\", \"visual-editing\"]\n\n[[projection]]\nid = \"artifact-markdown\"\nname = \"Markdown Artifact\"\npurpose = \"Artifact\"\ntarget = \"Markdown\"\nhints = [\"documentation\", \"review\", \"shareable\"]\n\n[[projection]]\nid = \"artifact-spec\"\nname = \"Specification Artifact\"\npurpose = \"Artifact\"\ntarget = \"Spec\"\nhints = [\"formal\", \"reference\"]\n\n[[projection]]\nid = \"analysis-graph\"\nname = \"Graph Analysis\"\npurpose = \"Analysis\"\ntarget = \"Graph\"\nhints = [\"visualization\", \"structure\"]\n\n[[projection]]\nid = \"analysis-validation\"\nname = \"Validation Analysis\"\npurpose = \"Analysis\"\ntarget = \"Validation\"\nhints = [\"rules\", \"checks\"]\n\n[[projection]]\nid = \"analysis-metrics\"\nname = \"Metrics Analysis\"\npurpose = \"Analysis\"\ntarget = \"Metrics\"\nhints = [\"measurement\", \"reporting\"]\n```\n\n## TOML with nested target details\n\nIf you want a stronger shape for runtime UI targets:\n\n```toml\nversion = \"0.1\"\n\n[[projection]]\nid = \"runtime-ui-blazor\"\nname = \"Blazor UI Runtime\"\npurpose = \"Runtime\"\nfamily = \"UI\"\nplatform = \"Blazor\"\nhints = [\"interactive\", \"component-based\"]\n\n[[projection]]\nid = \"runtime-ui-html\"\nname = \"HTML UI Runtime\"\npurpose = \"Runtime\"\nfamily = \"UI\"\nplatform = \"HTML\"\nhints = [\"browser\", \"static-artifact\"]\n\n[[projection]]\nid = \"runtime-ui-android\"\nname = \"Android UI Runtime\"\npurpose = \"Runtime\"\nfamily = \"UI\"\nplatform = \"Android\"\nhints = [\"mobile\", \"native\"]\n\n[[projection]]\nid = \"runtime-cli\"\nname = \"CLI Runtime\"\npurpose = \"Runtime\"\nfamily = \"CLI\"\nplatform = \"Terminal\"\nhints = [\"sequential-flow\"]\n\n[[projection]]\nid = \"design-penpot\"\nname = \"Penpot Design Projection\"\npurpose = \"Design\"\nfamily = \"Design\"\nplatform = \"Penpot\"\nhints = [\"authoring\", \"visual-editing\"]\n```\n\nThis second TOML shape may be better if you want to query by family later.\n\n## Suggested rule text for your docs\n\n```md\n## Projection Rule\n\nEvery projection must declare:\n\n- `purpose` — the reason the projection exists\n- `target` or `family/platform` — the concrete output destination\n\nThis prevents confusion between:\n- runtime outputs\n- design outputs\n- artifact outputs\n- analysis outputs\n\nExample:\n- Penpot is `Design`, not `Runtime`\n- Blazor is `Runtime/UI`\n- Markdown is `Artifact`\n- GraphViz is `Analysis`\n```\n\n## My recommendation\n\nUse this mental model:\n\n```text\nFnHCI.Core\nFnHCI.Runtime.UI.Blazor\nFnHCI.Runtime.UI.HTML\nFnHCI.Runtime.UI.Android\nFnHCI.Runtime.CLI\nFnHCI.Runtime.API\nFnHCI.Design.Penpot\nFnHCI.Artifact.Markdown\nFnHCI.Analysis.Graph\n```\n\nAnd let public-facing names stay shorter:\n\n```text\nFnUI.Blazor\nFnUI.HTML\nFnUI.Android\nFnCLI\nFnAPI\n```\n\nThe next strongest move is to define a `Surface`, `Element`, and `ProjectionDescriptor` together so the first login example can actually flow through the system."

