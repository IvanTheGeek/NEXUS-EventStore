text = "Yes — this should be explicit and enforced.\n\n## Markdown\n\n```md\n# Canonical Allowed Edge Sets\n\n## Purpose\n\nThe graph must enforce the separation between:\n\n- WriteGraph\n- ReadGraph\n\nThis is done by defining the only edge types that are valid in each graph.\n\n---\n\n## WriteGraph\n\nWriteGraph is causal and authoritative.\n\nIt answers:\n\n> What action caused what event?\n\n### Allowed node kinds\n- Actor\n- Command\n- Event\n\n### Allowed edge kinds\n- `triggers`\n- `produces`\n\n### Canonical forms\n- `Actor ──triggers──► Command`\n- `Command ──produces──► Event`\n\n### Forbidden on WriteGraph\n- `projects_to`\n- `informs`\n- `renders`\n- `displays`\n- `contains`\n- `styled_by`\n- `navigates_to`\n\nAnything related to projection, interface, display, artifact, or formatting is not allowed on the write side.\n\n---\n\n## ReadGraph\n\nReadGraph is derivative and non-authoritative.\n\nIt answers:\n\n> How is an event projected, represented, experienced, or consumed?\n\n### Allowed node kinds\n- EventSource\n- Projection\n- Interface\n- Actor\n- Artifact\n- DesignSurface\n- AnalysisSurface\n\n### Allowed edge kinds\n- `projects_to`\n- `informs`\n- `renders_to`\n- `contains`\n- `uses`\n- `targets`\n\n### Canonical forms\n- `EventSource ──projects_to──► Projection`\n- `Projection ──informs──► Interface`\n- `Interface ──informs──► Actor`\n- `Projection ──renders_to──► Artifact`\n- `Projection ──targets──► Interface`\n\n### Forbidden on ReadGraph\n- `triggers`\n- `produces`\n\nThe read side may consume events, but it may not create authoritative truth.\n\n---\n\n## Boundary Rule\n\nThe boundary between WriteGraph and ReadGraph is Event identity.\n\n### Allowed boundary crossing\n- WriteGraph `Event`\n- ReadGraph `EventSource`\n\nThese must refer to the same event identity.\n\n### Disallowed boundary crossing\n- Direct `Command -> Projection`\n- Direct `Interface -> Event`\n- Direct `Projection -> Command`\n\n---\n\n## Minimal Canonical Set\n\n### WriteGraph\n- `triggers`\n- `produces`\n\n### ReadGraph\n- `projects_to`\n- `informs`\n\nEverything else should be treated as optional extensions.\n\n---\n\n## Optional ReadGraph Extension Set\n\nThese may be useful for richer read-side modeling:\n\n- `contains`\n- `renders_to`\n- `targets`\n- `uses`\n- `navigates_to`\n- `styled_by`\n- `filters`\n- `groups`\n- `orders`\n\nThese are read concerns only.\n\n---\n\n## Law\n\nWriteGraph defines truth creation.\nReadGraph defines truth projection.\n\nNo edge kind may appear in both graphs unless explicitly declared as boundary-safe.\n```\n\n## F# canonical edge sets\n\n```fsharp\nnamespace Nexus.Core\n\ntype WriteRelation =\n    | Triggers\n    | Produces\n\ntype ReadRelation =\n    | ProjectsTo\n    | Informs\n    | RendersTo\n    | Contains\n    | Uses\n    | Targets\n    | NavigatesTo\n    | StyledBy\n    | Filters\n    | Groups\n    | Orders\n\ntype WriteNodeKind =\n    | WriteActor\n    | WriteCommand\n    | WriteEvent\n\ntype ReadNodeKind =\n    | ReadEventSource\n    | ReadProjection\n    | ReadInterface\n    | ReadActor\n    | ReadArtifact\n    | ReadDesignSurface\n    | ReadAnalysisSurface\n```\n\n## F# typed edges\n\n```fsharp\nnamespace Nexus.Core\n\ntype WriteEdge =\n    { FromId : string\n      Relation : WriteRelation\n      ToId : string }\n\ntype ReadEdge =\n    { FromId : string\n      Relation : ReadRelation\n      ToId : string }\n```\n\n## F# allowed node-pair validation\n\n```fsharp\nnamespace Nexus.Core\n\nmodule EdgeRules =\n\n    let isValidWriteEdge fromKind relation toKind =\n        match fromKind, relation, toKind with\n        | WriteActor, Triggers, WriteCommand -> true\n        | WriteCommand, Produces, WriteEvent -> true\n        | _ -> false\n\n    let isValidReadEdge fromKind relation toKind =\n        match fromKind, relation, toKind with\n        | ReadEventSource, ProjectsTo, ReadProjection -> true\n        | ReadProjection, Informs, ReadInterface -> true\n        | ReadInterface, Informs, ReadActor -> true\n        | ReadProjection, RendersTo, ReadArtifact -> true\n        | ReadProjection, Targets, ReadInterface -> true\n        | ReadProjection, Contains, ReadProjection -> true\n        | ReadInterface, Contains, ReadInterface -> true\n        | ReadProjection, Uses, ReadProjection -> true\n        | ReadProjection, NavigatesTo, ReadProjection -> true\n        | ReadProjection, StyledBy, ReadProjection -> true\n        | ReadProjection, Filters, ReadProjection -> true\n        | ReadProjection, Groups, ReadProjection -> true\n        | ReadProjection, Orders, ReadProjection -> true\n        | _ -> false\n```\n\n## F# graph validation result\n\n```fsharp\nnamespace Nexus.Core\n\ntype ValidationError =\n    | InvalidWriteEdge of fromKind:WriteNodeKind * relation:WriteRelation * toKind:WriteNodeKind\n    | InvalidReadEdge of fromKind:ReadNodeKind * relation:ReadRelation * toKind:ReadNodeKind\n    | UnknownWriteNode of string\n    | UnknownReadNode of string\n\ntype ValidationResult<'a> =\n    | Valid of 'a\n    | Invalid of ValidationError list\n```\n\n## F# stricter minimal version\n\nIf you want to keep the ontology tighter at first:\n\n```fsharp\nnamespace Nexus.Core\n\ntype WriteRelation =\n    | Triggers\n    | Produces\n\ntype ReadRelation =\n    | ProjectsTo\n    | Informs\n```\n\nand only later add extension relations.\n\nThat is probably the safest first move.\n\n## TOML relation registry\n\n```toml\nversion = \"0.1\"\n\n[relations.write]\n\nallowed = [\"triggers\", \"produces\"]\n\n[[relations.write.rule]]\nfrom = \"Actor\"\nrelation = \"triggers\"\nto = \"Command\"\n\n[[relations.write.rule]]\nfrom = \"Command\"\nrelation = \"produces\"\nto = \"Event\"\n\n[relations.read]\n\nallowed = [\"projects_to\", \"informs\", \"renders_to\", \"contains\", \"uses\", \"targets\"]\n\n[[relations.read.rule]]\nfrom = \"EventSource\"\nrelation = \"projects_to\"\nto = \"Projection\"\n\n[[relations.read.rule]]\nfrom = \"Projection\"\nrelation = \"informs\"\nto = \"Interface\"\n\n[[relations.read.rule]]\nfrom = \"Interface\"\nrelation = \"informs\"\nto = \"Actor\"\n\n[[relations.read.rule]]\nfrom = \"Projection\"\nrelation = \"renders_to\"\nto = \"Artifact\"\n\n[[relations.read.rule]]\nfrom = \"Projection\"\nrelation = \"targets\"\nto = \"Interface\"\n\n[[relations.read.rule]]\nfrom = \"Projection\"\nrelation = \"contains\"\nto = \"Projection\"\n```\n\n## TOML minimal starter registry\n\n```toml\nversion = \"0.1\"\n\n[relations.write]\nallowed = [\"triggers\", \"produces\"]\n\n[relations.read]\nallowed = [\"projects_to\", \"informs\"]\n```\n\n## Recommended progression\n\nStart with this:\n\n```text\nWriteGraph:\n- triggers\n- produces\n\nReadGraph:\n- projects_to\n- informs\n```\n\nThen only add more read-side relations when a real example forces them.\n\nThat keeps the ontology from ballooning too early.\n\n## Tight rule block\n\n```md\n# Canonical Edge Rules\n\n## WriteGraph\n- Actor -> triggers -> Command\n- Command -> produces -> Event\n\n## ReadGraph\n- EventSource -> projects_to -> Projection\n- Projection -> informs -> Interface\n- Interface -> informs -> Actor\n\n## Forbidden\n- Read relations on WriteGraph\n- Write relations on ReadGraph\n- Any direct Command -> Projection edge\n- Any direct Projection -> Event production edge\n```\n\n## My recommendation\n\nMake these first-class types now:\n\n```text\nWriteRelation\nReadRelation\nWriteNodeKind\nReadNodeKind\nEdgeRules\n```\n\nand treat everything beyond `triggers`, `produces`, `projects_to`, and `informs` as extensions.\n\nThat gives you a small hard core and a safe expansion path."

