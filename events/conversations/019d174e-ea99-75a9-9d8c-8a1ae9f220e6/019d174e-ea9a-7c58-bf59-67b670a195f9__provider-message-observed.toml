text = "{\"start_timestamp\":\"2026-03-16T00:06:26.546448Z\",\"stop_timestamp\":\"2026-03-16T00:06:26.788006Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":\"toolu_01JsvQbMutWbWfZRWXBCVfHQ\",\"name\":\"visualize:read_me\",\"input\":{\"modules\":[\"mockup\",\"art\"]},\"message\":\"read_me\",\"integration_name\":\"visualize\",\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":false}"

