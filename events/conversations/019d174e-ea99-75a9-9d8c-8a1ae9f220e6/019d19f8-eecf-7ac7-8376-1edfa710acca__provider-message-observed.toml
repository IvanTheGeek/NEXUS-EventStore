text = "Now let me create a compelling SVG browser window thumbnail. I'll design a simple, visually interesting app inside - maybe a weather widget or a task tracker or a habit tracker. Let me think about what would look good as a thumbnail.\n\nI'll create a browser window mockup with:\n- Chrome-style browser chrome (address bar, tabs, control buttons)\n- Inside: a clean, visually appealing simple app - let me go with a \"Habit Tracker\" or maybe a \"Pomodoro Timer\" or a simple \"Weather Dashboard\"\n\nActually, let me do something visually striking - a dark-themed analytics/dashboard snippet or a colorful todo app. \n\nFor a thumbnail that reads well at small sizes, I'm leaning toward a Pomodoro timer with a beautiful dark UI—circular progress ring and bold typography would really stand out. I'll set up the SVG at 800x560 to match a browser window aspect ratio, then add the browser chrome with title bar traffic lights and tab bar.\n\nNow I'm designing the SVG layout with the browser frame and the timer app inside."

