kind = "plain_text"
text = "**✅ You're absolutely right!** The bar calculation is broken. Let me trace the issue:\n\n**Current output:** `[████████████████░░░░]` = 16 filled blocks\n**Actual usage:** 42.9%\n**Correct bar:** `[████████░░░░░░░░░░░░]` = 8-9 filled blocks\n\nThe math should be:\n```\npercentage = 42.9%\nblocks_filled = int(42.9 / 5) = 8 (or 9 if rounding)\nblocks_empty = 20 - 8 = 12\n```\n\nLet me update the documentation to include the exact calculation logic:"

