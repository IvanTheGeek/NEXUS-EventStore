text = "**✅ Captured in event!** \n\nContinuation mechanism documented with:\n- Hybrid approach (MCP prompt + keyword)\n- \"continue chat\" as trigger phrase\n- SessionState events as data layer\n- Open questions for later\n\nReady for the next topic when you are!\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📊 Context Usage: [██████████░░░░░░░░░░] 92,689 / 190,000 tokens (48.8%)\n\nAllocation:\n├─ System Prompts:     ~25,000 tokens  (13.2%)\n├─ Project Knowledge:   ~7,000 tokens   (3.7%)\n├─ Conversation:       ~57,689 tokens  (30.4%)\n│  ├─ Your messages:   ~15,100 tokens\n│  ├─ My responses:    ~34,100 tokens\n│  └─ Tool calls:       ~8,489 tokens\n└─ This Response:       ~3,000 tokens   (1.6%)\n\nRemaining: 97,311 tokens (51.2%) ✓ Comfortable\n\nStatus Legend: ✓ Comfortable (0-75%) | ⚠ Moderate (75-85%) | 🔴 High (85%+)\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

