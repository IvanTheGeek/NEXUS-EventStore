text = "Nexus definition seems accurate, its everything. If we were discussing the framework, I would say it is the more artifact related items with opinionated choices for doing a project. Things like we are using F#, if desktop we are doing it with Blazor Hybrid and Bolero, using these libraries as default like fsHTTP for internet calls, and that we are event sourcing, using penpot, the forum, etc.  \n\"The abstract methodology/approach to building software?\"  & \"The abstract methodology/approach to building software?\" seem to me to be maybe a term like \"methodology\" or another term that means we are event modeling, dogfooding, using paths, doing design iteration and things like that. Maybe you have help bring this to an better explanation. keep thinking and asking questions."

