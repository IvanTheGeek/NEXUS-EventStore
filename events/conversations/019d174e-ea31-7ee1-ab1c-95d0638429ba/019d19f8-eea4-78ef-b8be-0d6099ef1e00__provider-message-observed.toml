kind = "plain_text"
text = "yes. one the issues I have been experiencing so far is that new chats are not able to continue from where a previous one was or that it does not have the basic for Nexus that I fell it should know already. I also wonder if we could make the Project Knowledge file a single file that would rarely need updated and be generic enough to load the one file in a new Project and then it reaches into Nexus to get everything it needs to bootstrap and then get the specifics it needs. I am thinking that a new Claude Project would be used for each app? I have renamed this particular project Nexus. So would my workflow be better to work on all my apps in this project, or start a fresh project for each app? \nAlso, can we make it where a new chat will be able to continue, maybe with a prompt or keyword or something and having us prepped in Nexus for the continuation, it can then find what it needs in Nexus to continue without me needing long prompts or copy paste or wasting context with the new chat trying to get up to speed?"

