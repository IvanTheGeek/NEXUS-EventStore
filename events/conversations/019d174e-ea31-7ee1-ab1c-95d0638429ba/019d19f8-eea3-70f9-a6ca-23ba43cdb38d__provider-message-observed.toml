[[body.segments]]
kind = "plain_text"
text = "yeah, a seems reasonable on that logic. \n\nALSO, if we added a unique id to the name in events it will prevent some issues that can arise. If there were two versions of Nexus mcp running, both *could* create an event with the same name. if we attach at the end, let's say, UUID type string, it would serve to ensure uniqueness and could also maybe identify the *instance* that added the event. This is somewhat related to a later issue that I know we will get to. Say co-driver and I are both doing laundry. She is adding a record for her dryer, I am entering for my dryer, we both create events that are the same, but having the unique allows the file system to know they are not overwriting each other etc."

