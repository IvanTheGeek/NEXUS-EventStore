text = "I am still reviewing the docs. I have some additional information. Adam and Martin have a podcast at https://www.youtube.com/channel/UCPXhKM1nRIFwTIxhpntSh4A\nWould you catalog each episode by getting the transcripts and incorporate into your knowledge of event modeling and sourcing? Also, slices are an important concept. They say a slice would be an independent unit. I am thinking maybe a slice would relate to a module. They also talk about done is done, and if changes are made, one replaces the slice or slices. Copying code is fine, but a big point is to reduce coupling. There is also the Given-When-Then included in a slice. There can be 0 to many in a slice. Create a new doc this time, try the event model as an HTML doc and embed the CSS in the document. The text version is not showing me what I want to see. Also, I am not interested in the arrows, they are not needed. I am trying to see an event model with slices lined up next to each other."

