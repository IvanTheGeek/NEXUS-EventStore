umenting Effects\\nComposing the Workflow from the Steps\\nAre Dependencies Part of the Design?\\n\\n\\fThe Complete Pipeline\\nLong-Running Workflows\\nWrapping Up\\nWhat’s Next\\n\\nPart III. Implementing the Model\\n8.\\n\\nUnderstanding Functions\\nFunctions, Functions, Everywhere\\nFunctions Are Things\\nTotal Functions\\nComposition\\nWrapping Up\\n\\n9.\\n\\nImplementation: Composing a Pipeline\\nWorking with Simple Types\\nUsing Function Types to Guide the Implementation\\nImplementing the Validation Step\\nImplementing the Rest of the Steps\\nComposing the Pipeline Steps Together\\nInjecting Dependencies\\nTesting Dependencies\\nThe Assembled Pipeline\\nWrapping Up\\n\\n10. Implementation: Working with Errors\\nUsing the Result Type to Make Errors Explicit\\nWorking with Domain Errors\\nChaining Result-Generating Functions\\nUsing bind and map in Our Pipeline\\nAdapting Other Kinds of Functions to the Two-Track Model\\nMaking Life Easier with Computation Expressions\\nMonads and More\\nAdding the Async Effect\\nWrapping Up\\n\\n11. Serialization\\nPersistence vs. Serialization\\nDesigning for Serialization\\nConnecting the Serialization Code to the Workflow\\nA Complete Serialization Example\\nHow to Translate Domain Types to DTOs\\n\\n\\fWrapping Up\\n\\n12. Persistence\\nPushing Persistence to the Edges\\nCommand-Query Separation\\nBounded Contexts Must Own Their Data Storage\\nWorking with Document Databases\\nWorking with Relational Databases\\nTransactions\\nWrapping Up\\n\\n13. Evolving a Design and Keeping It Clean\\nChange 1: Adding Shipping Charges\\nChange 2: Adding Support for VIP Customers\\nChange 3: Adding Support for Promotion Codes\\nChange 4: Adding a Business Hours Constraint\\nDealing with Additional Requirements Changes\\n--\\nModeling the domain\\nImplementing the model\\nEach part builds on the previous one, so it’s best if you read them in order.\\nIn the first part, Understanding the Domain, we’ll look at the ideas behind domain-driven design and the importance\\nof having a shared understanding of a domain. We’ll have a brief look at techniques that help to build this shared\\nunderstanding, such as Event Storming, and then we’ll look at decomposing a large domain into smaller components\\nthat we can implement and evolve independently.\\nTo be clear, this book is not meant to be a thorough exploration of domain-driven design. That’s a large topic that\\nmany excellent books and websites cover in detail. Instead, the goal of this book is to introduce you to domaindriven design as a partner to functional domain modeling. We will cover the most important concepts of domaindriven design, of course, but rather than diving deeply into the subject, we’ll stay at a high level and stress two\\nthings: (a) the importance of communication with domain experts and other non-technical team members and (b) the\\nvalue of a shared domain model based on real-world concepts.\\nIn the second part, Modeling the Domain, we’ll take one workflow from the domain and model it in a functional\\nway. We’ll see how the functional decomposition of a workflow differs from an object-oriented approach, and we’ll\\nlearn how to use types to capture requirements. By the end, we’ll have written concise code that does double-duty:\\nfirst as readable documentation of the domain but also as a compilable framework that the rest of the implementation\\ncan build upon.\\nIn the third part, Implementing the Model, we’ll take that same modeled workflow and implement it. In the process\\nof doing that, we’ll learn how to use common functional programming techniques such as composition, partial\\napplication, and the scary-sounding “monad.”\\nThis book is not intended to be a complete guide to functional programming. We’ll cover just what we need in order\\nto model and implement the domain, and we won’t cover more advanced techniques. Nevertheless, by the end of\\nPart III, you’ll be familiar with all the most important functional programming concepts and you’ll have acquired a\\ntoolkit of skills that you can apply to most programming situations.\\nAs sure as the sun rises, requirements will change, so in the final chapter we’ll look at some common directions in\\nwhich the domain might evolve and how our design can adapt in response.\\n\\n\\fOther Approaches to Domain Modeling\\nThis book focuses on the “mainstream” way of doing domain modeling, by defining data structures and the\\nfunctions that act on them, but other approaches might be more applicable in some situations. I’ll mention two of\\nthem here in case you want to explore them further.\\nIf the domain revolves around semistructured data, then the kinds of rigid models discussed in this book are not\\nsuitable and a better approach would be to use flexible structures such as maps (also known as dictionaries) to\\nstore key-value pairs. The Clojure community has many good practices here.\\nIf the emphasis of the domain is on combining elements together to make other elements, then it’s often useful\\nto focus on what these composition rules are (the so-called “algebra”) before focusing on the data. Domains\\nlike this are widespread, from financial contracts to graphic design tools, and the principle of “composition\\neverywhere” makes them especially suitable for being modeled with a functional approach. Unfortunately, due\\n--\\n\\fPart 1\\n\\nUnderstanding the Domain\\nIn this first part, we’ll look at the ideas behind domain-driven design and the importance of a\\nshared understanding of a domain. We’ll have a brief look at techniques that help to build\\nthis shared understanding, such as Event Storming, and then we’ll look at decomposing a\\nlarge domain into smaller components that we can implement and evolve independently.\\n\\n\\fChapter 1\\n\\nIntroducing Domain-Driven Design\\nAs a developer, you may think that your job is to write code.\\nI disagree. A developer’s job is to solve a problem through software, and coding is just one aspect of software\\ndevelopment. Good design and communication are just as important, if not more so.\\nIf you think of software development as a pipeline with an input (requirements) and an output (the final deliverable),\\nthen the “garbage in, garbage out” rule applies. If the input is bad (unclear requirements or a bad design), then no\\namount of coding can create a good output.\\nIn the first part of this book we’ll look at how to minimize the “garbage in” part by using a design approach focused\\non clear communication and shared domain knowledge: domain-driven design, or DDD.\\nIn this chapter, we’ll start by discussing the principles of DDD and by showing how they can be applied to a\\nparticular domain. DDD is a large topic, so we won’t be exploring it in detail (for more detailed information on\\nDDD, visit dddcommunity.org[9]). However, by the end of this chapter you should at least have a good idea of how\\ndomain-driven design works and how it is different from database-driven design and object-oriented design.\\nDomain-driven design is not appropriate for all software development, of course. There are many types of software\\n(systems software, games, and so on) that can be built using other approaches. However, it is particularly useful for\\nbusiness and enterprise software, where developers have to collaborate with other nontechnical teams, and that kind\\nof software will be the focus of this book.\\n\\n\\fThe Importance of a Shared Model\\nBefore attempting to solve a problem it’s important that we understand the problem correctly. Obviously, if our\\nunderstanding of the problem is incomplete or distorted, then we won’t to be able to provide a useful solution. And\\nsadly, of course, it’s the developers’ understanding, not the domain experts’ understanding, that gets released to\\nproduction!\\nSo how can we ensure that we, as developers, do understand the problem?\\nSome software development processes address this by using written specifications or requirements documents to try\\n--\\ndomain experts themselves. This in turn meant that they could communicate very effectively with the traders, due to the shared mental model, and\\nbuild exactly what their domain experts (the traders) wanted.\\n\\nSo we need to create a shared model. How can we do this? The domain-driven design community has developed\\nsome guidelines to help us here. They are as follows:\\nFocus on business events and workflows rather than data structures.\\nPartition the problem domain into smaller subdomains.\\nCreate a model of each subdomain in the solution.\\nDevelop a common language (known as the “Ubiquitous Language”) that is shared between everyone involved\\nin the project and is used everywhere in the code.\\nLet’s look at these in turn.\\n\\n\\fUnderstanding the Domain Through Business Events\\nA DDD approach to gathering requirements will emphasize building a shared understanding between developers and\\ndomain experts. But where should we start in order to develop this understanding?\\nOur first guideline says to focus on business events rather than data structures. Why is that?\\nWell, a business doesn’t just have data, it transforms it somehow. That is, you can think of a typical business\\nprocess as a series of data or document transformations. The value of the business is created in this process of\\ntransformation, so it is critically important to understand how these transformations work and how they relate to\\neach other.\\nStatic data—data that is just sitting there unused—is not contributing anything. So what causes an employee (or\\nautomated process) to start working with that data and adding value? Often it’s an outside trigger (a piece of mail\\narriving or your phone ringing), but it can also be a time-based trigger (you do something every day at 10 a.m.) or an\\nobservation (there are no more orders in the inbox to process, so do something else).\\nWhatever it is, it’s important to capture it as part of the design. We call these things Domain Events.\\nDomain Events are the starting point for almost all of the business processes we want to model. For example, “new\\norder form received” is a Domain Event that will kick off the order-taking process.\\nDomain Events are always written in the past tense—something happened—because it’s a fact that can’t be\\nchanged.\\n\\nUsing Event Storming to Discover the Domain\\nThere are a number of ways to discover events in a domain, but one that is particularly suitable for a DDD approach\\nis Event Storming, which is a collaborative process for discovering business events and their associated workflows.\\nIn Event Storming, you bring together a variety of people (who understand different parts of the domain) for a\\nfacilitated workshop. The attendees should include not just developers and domain experts but all the other\\nstakeholders who have an interest in the success of the project: as event stormers like to say, “anyone who has\\nquestions and anyone who has answers.” The workshop should be held in a room that has a lot of wall space, and the\\nwalls should be covered with paper or whiteboard material so that the participants can post sticky notes or draw on\\nthem. At the end of a successful session, the walls will be covered with hundreds of these notes.\\nDuring the workshop, people write down business events on the sticky notes and post them on the wall. Other\\npeople may respond by posting notes summarizing the business workflows that are triggered by these events. These\\nworkflows, in turn, often lead to other business events being created. In addition, the notes can often be organized\\ninto a timeline, which may well trigger further discussion in the group. The idea is to get all the attendees to\\nparticipate in posting what they know and asking questions about what they don’t know. It’s a highly interactive\\nprocess that encourages everyone to be involved. For more detail on Event Storming in practice, see the\\nEventStorming book by Alberto Brandolini,[10] the creator of this technique.\\n\\nDiscovering the Domain: An Order-Taking System\\nIn this book, we’ll take a realistic business problem—an order-taking system—and use it to explore design, domain\\nmodeling, and implementation.\\nSay that we are called in to help a small manufacturing company, Widgets Inc, to automate its order-taking\\nworkflow. Max, the manager at Widgets, explains:\\n\\n\\f“We’re a tiny company that manufactures parts for other companies: widgets, gizmos, and the like. We’ve been\\ngrowing quite fast, and our current processes are not able to keep up. Right now, everything we do is paperbased, and we’d like to computerize all that so that our staff can handle larger volumes of orders. In particular,\\nwe’d like to have a self-service website so that customers can do some tasks themselves. Things like placing an\\norder, checking order status, and so on.”\\nSounds good. So now what do we do? Where should we start?\\nThe first guideline says “focus on business events,” so let’s use an event-storming session for that. Here’s how one\\nmight start out at Widgets.\\nYou: “Someone start by posting a business event!”\\nOllie: “I’m Ollie from the order-taking department. Mostly we deal with orders and quotes coming in.”\\nYou: “What triggers this kind of work?”\\nOllie: “When we get forms sent to us by the customer in the mail.”\\nYou: “So the events would be something like ‘Order form received’ and ‘Quote form received’?”\\nOllie: “Yes. Let me put those up on the wall then.”\\nSam: “I’m Sam from the shipping department. We fulfill those orders when they’re signed off.”\\nYou: “And how do you know when to do that?”\\nSam: “When we get an order from the order-taking department.”\\nYou: “What would you call that as an event?”\\nSam: “How about ‘Order available’?”\\nOllie: “We call an order that’s completed and ready to ship a ‘Placed order.’ Can we agree on using that term\\neverywhere?”\\nSam: “So ‘Order placed’ would be the event we care about, yes?”\\nYou get the idea. After a while, we might have list of posted events like this:\\nOrder form received\\nOrder placed\\nOrder shipped\\nOrder change requested\\n\",\"stderr\":\"\"}"

