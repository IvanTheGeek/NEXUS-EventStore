kind = "plain_text"
text = "I want have the Penpot API as a separate solution/project. It would serve to be reusable by non MCP projects. It would serve as a library and provide access to each of the penpot rest api abilities. That would be FnAPI.Penpot \nThe FnMCP.Penpot project would use the FnAPI.Penpot and provide all the abilities specified at https://modelcontextprotocol.io/specification/2025-06-18 which is the latest spec. I do not want to use the MS library, I want to implement in functional programming indomatic F# influenced by Scott's ideas and other modern F# conventions. Design of the MCP should use Event Modeling keeping in context that the top level EventModel models information flow as concerned with the domain/business which in the case is the MCP"

