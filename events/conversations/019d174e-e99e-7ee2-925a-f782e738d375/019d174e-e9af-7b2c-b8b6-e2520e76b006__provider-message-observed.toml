kind = "plain_text"
text = "Your Event Modeling podcast catalog is ready. It covers 22 episodes from Adam Dymitruk and Martin Dilger's podcast, focusing on slices as independent work units, Given-When-Then testing patterns, coupling reduction strategies, and implementation best practices. The report includes key quotes, timestamps, visual modeling patterns, and the complete episode archive with direct links to podcast.eventmodeling.org."

[[body.segments]]
kind = "tool_use"
text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"artifacts\",\"input\":{\"id\":\"compass_artifact_wf-a86c2f8e-f745-4c8d-b648-d2a70521e1f6_text/markdown\",\"type\":\"text/markdown\",\"title\":\"Event Modeling Podcast Episode Catalog: Slices and Implementation Patterns\",\"source\":\"c\",\"command\":\"create\",\"content\":\"# Event Modeling Podcast Episode Catalog: Slices and Implementation Patterns\\n\\n## Important Discovery\\n\\nThe YouTube channel provided (UCPXhKM1nRIFwTIxhpntSh4A) appears to be for a different podcast called \\u0022Developer Melange\\u0022 that doesn\\u0027t focus on Event Modeling. The actual **Event Modeling and Event Sourcing Podcast** with Adam Dymitruk and Martin Dilger is hosted at **podcast.eventmodeling.org** and YouTube channel **@eventmodeling**. This catalog covers the correct podcast episodes discussing Event Modeling concepts.\\n\\n## Key Episodes on Slices and Event Modeling\\n\\n### Episode 12: \\u0022Slice, slice baby!\\u0022\\n**Date:** February 6, 2025  \\n**Focus:** What makes slices special in Event Modeling\\n\\n**Key Concepts:**\\n- Slices as self-contained workflow units in Event Modeling and Event Sourcing\\n- Legacy system handling without drowning in messy code\\n- Error handling strategies in event-sourced solutions\\n\\n**Critical Definition:** Each slice represents **the smallest possible work that can be handed over to a developer for implementation**. Everything needed\\u2014from UI to persistence\\u2014is explained within that single slice.\\n\\n**Implementation Pattern:** Slices contain all architectural layers vertically, eliminating cross-team coordination needs. When implemented through event sourcing, they remain small and replaceable without affecting other system components.\\n\\n### Episode 19: \\u0022Vibe Modeling, Event Models for the C-Suite\\u0022\\n**Date:** April 23, 2025  \\n**Primary Topics:** Slice lifecycle, team collaboration, and elimination of subjectivity\\n\\n**Key Concepts Discussed:**\\n\\n**Slices as Independent Units:**\\n- Slices are self-contained pieces of work supporting specific workflows\\n- Each slice\\u0027s lifecycle ties to a larger business goal\\n- Slices require demonstrable functionality before being considered complete\\n- Developers can barter slices among themselves to manage workloads effectively\\n\\n**\\u0022Done is Done\\u0022 Principle:**\\n- Definition of ready for each slice proves crucial for client approval\\n- Feature toggles manage unfinished code in production environments\\n- Clear demo requirements establish completion criteria\\n- Event models serve as living documents staying synchronized with production\\n\\n**Chapter Timestamps:**\\n- 41:57 - Understanding the Life Cycle of a Slice\\n- 55:39 - Navigating Agile Challenges\\n- 58:13 - The Importance of UI in Slices\\n- 01:01:12 - Team Collaboration and Skill Sharing\\n- 01:05:01 - Eliminating Subjectivity in Development\\n- 01:07:25 - Empowering Junior Developers\\n\\n**Notable Quote:** \\u0022Slices are self-contained pieces of work that support a workflow. The lifecycle of a slice is often tied to a larger goal. It\\u0027s important to have a demo of the slice to show its functionality.\\u0022\\n\\n### Episode 20: \\u0022Learning Using Slices\\u0022\\n**Date:** May 21, 2025  \\n**Topics:** Growing popularity of Event Modeling, swim lanes, creating new event models\\n\\n**Key Concepts:**\\n- Effective communication about Event Modeling within organizations\\n- Fixed costs in Agile development through predictable slice sizing\\n- Microservices versus monoliths decisions\\n- When and why to create new event models\\n- Limits of Event Sourcing and appropriate use cases\\n\\n**Chapter Timestamps:**\\n- 00:00 - Introduction and Personal Updates\\n- 03:19 - The Rise of Event Modeling\\n- 06:15 - Understanding Fixed Costs in Agile\\n- 23:23 - Q\\u0026A on Swim Lanes\\n- 26:10 - Microservices vs Monoliths: Lessons Learned\\n- 30:00 - Creating New Event Models: When and Why\\n- 38:26 - The Limits of Event Sourcing: When Not to Use It\\n\\n## Episodes on Given-When-Then Patterns\\n\\n### Episode 2: \\u0022Destroying the Aggregate part 2 and more\\u0022\\n**Date:** November 13, 2024  \\n**Core GWT Content:** Given-When-Then patterns in Event Modeling context\\n\\n**Key Concepts:**\\n- **Given-When-Then / Arrange-Act-Assert / Specifications by Example / Behaviour Driven Development** - all converge in Event Modeling\\n- Privacy issues with Event Sourcing (GDPR, Right to be Forgotten)\\n- Source Control patterns (Branch Per Feature vs Trunk Based Development)\\n- Destroying Domain Driven Design aggregates\\n\\n**Implementation Pattern:** GWT specifications translate directly to Event Modeling slices. Given = current event state, When = command execution, Then = resulting event(s).\\n\\n**Resources Referenced:**\\n- Workshop materials at adaptechgroup.com\\n- Understanding Eventsourcing book by Martin Dilger\\n- Branch Per Feature pattern by Adam Dymitruk\\n\\n### Episode 3: \\u0022AI, GWTs on a timeline, Security in Event Sourcing\\u0022\\n**Date:** November 17, 2024  \\n**Breakthrough Content:** New format for Given-When-Thens using dedicated timelines\\n\\n**Key Concepts:**\\n- Generating event sourcing code from event models using AI\\n- **Novel format: GWTs with their own timeline representation**\\n- Security considerations in event-sourced systems\\n\\n**Critical Innovation:** Rather than textual GWT specifications, this episode introduces visual GWT representations on timelines, making test scenarios visual and immediately understandable alongside the event model itself.\\n\\n**Visual Pattern:** Test scenarios appear on the same timeline as the system, with Given (historical events), When (command), and Then (expected event) shown as connected workflow steps.\\n\\n### Episode 7: \\u0022Pure Command Handlers and Sparse Timelines for GWTs\\u0022\\n**Date:** December 18, 2024  \\n**Advanced GWT Techniques:** Using timelines to define specifications\\n\\n**Key Concepts:**\\n- Keeping command handlers as pure functions (no side effects)\\n- **Sparse timelines for GWT specifications** - showing only relevant events\\n- Improved testability through functional purity\\n\\n**Implementation Strategy:** Command handlers become deterministic functions: \\u0060(currentState, command) \\u2192 events\\u0060. This enables property-based testing and eliminates hidden dependencies.\\n\\n**Quote from SE Radio Episode 539:** \\u0022Each command will have a suite of tests in the style of Given-When-Then with the following format: \\u0027Given\\u0027 is a set of 0..N events, \\u0027When\\u0027 is the command, \\u0027Then\\u0027 is one event showing the resulting state change if successful. The minimal amount of test is 2: 1 for failure, 1 for success.\\u0022\\n\\n## Episodes on Coupling and Modularity\\n\\n### Episode 5: \\u0022A Case Against Upcasters\\u0022\\n**Date:** December 1, 2024  \\n**Primary Focus:** Reducing coupling through disciplined modeling\\n\\n**Key Concepts:**\\n- **Not reusing any models across workflows** - each workflow owns its projections\\n- **How reusing models negatively affects coupling** - shared mutable state creates dependencies\\n- Discipline required to unlearn traditional normalization habits\\n- Simplicity through dedicated read models\\n\\n**Critical Principle:** \\u0022Each workflow should have isolated models. Reusing models across workflows creates coupling that destroys the independence of slices.\\u0022\\n\\n**Guest Contributor:** Yordis Prieto discussed patterns for avoiding upcasters (event schema migrations) by designing events correctly from the start.\\n\\n**Implementation Pattern:** When a new screen needs data, create a new green box (view/projection) even if similar data exists elsewhere. This duplication eliminates coupling and enables parallel development.\\n\\n### Episode 6: \\u0022Event Modeling Scope and more\\u0022\\n**Date:** December 10, 2024  \\n**Scope and Boundaries:** Defining system boundaries and projection ownership\\n\\n**Key Concepts:**\\n- GDPR compliance strategies\\n- Security patterns in event-sourced systems\\n- Event upcaster alternatives\\n- Identifier management in Event Modeling\\n- Reservation pattern for eventual consistency\\n- Complexity containment in command handlers\\n- Handling multiple events from single commands\\n- **Scope definition for event models**\\n- **Reusing read models and its implications**\\n\\n**Coupling Insight:** While reusing read models seems efficient, it creates hidden dependencies between features. When one feature needs to change its view structure, it impacts all features sharing that view.\\n\\n## Episodes on Implementation Patterns\\n\\n### Episode 4: \\u0022Keeping things simple\\u0022\\n**Date:** November 26, 2024  \\n**Core Patterns:** Command-Event-State simplification\\n\\n**Key Concepts:**\\n- Command \\u2192 Event \\u2192 State pattern as the fundamental building block\\n- **Removing Sagas** - replacing with simpler to-do list patterns\\n- Simplicity as architectural principle\\n\\n**Pattern Description:** Instead of complex saga orchestration, use: Events \\u2192 Green box (to-do list) \\u2192 Processor \\u2192 Commands. The processor simply reads a checklist and issues commands for incomplete items.\\n\\n### Episode 8: \\u0022Event Sourcing Frameworks and more\\u0022\\n**Date:** January 10, 2025  \\n**Tooling and Testing:** Framework selection and test refinement\\n\\n**Key Concepts:**\\n- Evaluating event sourcing frameworks\\n- Handling \\u0022fake events\\u0022 (events that shouldn\\u0027t exist)\\n- Refining testing approaches for event-sourced systems\\n\\n**Implementation Guidance:** Frameworks should support, not dictate, your Event Modeling approach. The model defines the architecture; frameworks provide infrastructure.\\n\\n### Episode 13: \\u0022Stop. Collaborate and Listen!\\u0022\\n**Date:** February 12, 2025  \\n**Organizational Patterns:** Guiding Event Modeling adoption\\n\\n**Key Concepts:**\\n- Guiding Event Modeling implementation in organizations\\n- Modeling long-running, distributed processes\\n- Allowing information influx to design events naturally\\n\\n**Best Practice:** Let the information flow guide event design. Don\\u0027t force events into predetermined patterns; let business workflows reveal the natural event boundaries.\\n\\n### Episode 18: \\u0022The Future of Event Sourcing\\u0022\\n**Date:** March 28, 2025  \\n**Advanced Patterns:** Next-generation implementation strategies\\n\\n**Key Takeaways:**\\n- Dynamic consistency boundaries enhance event sourcing practices\\n- Hydration and state views share similar logic patterns\\n- Commands should be treated as objects, not functions\\n- Simplifying event sourcing patterns improves code quality\\n- Testing streamlined through property comparisons\\n- Understanding core concepts enables continuous improvement\\n\\n## Complete Episode Archive (22 Episodes)\\n\\n1. **Episode 1** - \\u0022Destroying the Aggregate\\u0022 (Nov 4, 2024)\\n2. **Episode 2** - \\u0022Destroying the Aggregate part 2 and more\\u0022 (Nov 13, 2024) - **GWT Focus**\\n3. **Episode 3** - \\u0022AI, GWTs on a timeline, Security in Event Sourcing\\u0022 (Nov 17, 2024) - **GWT Innovation**\\n4. **Episode 4** - \\u0022Keeping things simple\\u0022 (Nov 26, 2024) - **Implementation**\\n5. **Episode 5** - \\u0022A Case Against Upcasters\\u0022 (Dec 1, 2024) - **Coupling**\\n6. **Episode 6** - \\u0022Event Modeling Scope and more\\u0022 (Dec 10, 2024) - **Boundaries**\\n7. **Episode 7** - \\u0022Pure Command Handlers and Sparse Timelines for GWTs\\u0022 (Dec 18, 2024) - **GWT Advanced**\\n8. **Episode 8** - \\u0022Event Sourcing Frameworks and more\\u0022 (Jan 10, 2025) - **Tooling**\\n9. **Episode 9** - \\u0022Maintaining Event Models and More\\u0022 (Jan 13, 2025)\\n10. **Episode 10** - \\u0022Avoiding the Patterns Soup and more\\u0022 (Jan 22, 2025)\\n11. **Episode 11** - \\u0022No Code Reviews and less\\u0022 (Jan 28, 2025)\\n12. **Episode 12** - \\u0022Slice, slice baby!\\u0022 (Feb 6, 2025) - **Slices Core**\\n13. **Episode 13** - \\u0022Stop. Collaborate and Listen!\\u0022 (Feb 12, 2025) - **Process**\\n14. **Episode 14** - \\u0022AI Nightmares and Expert Help\\u0022 (Feb 22, 2025)\\n15. **Episode 15** - \\u0022Skills Issues and Simplifying Sagas\\u0022 (Mar 5, 2025)\\n16. **Episode 16** - \\u0022Dealing with varieties of APIs and millions of events\\u0022 (Mar 11, 2025)\\n17. **Episode 17** - \\u0022Too many events!\\u0022 (Mar 14, 2025)\\n18. **Episode 18** - \\u0022The Future of Event Sourcing\\u0022 (Mar 28, 2025) - **Advanced**\\n19. **Episode 19** - \\u0022Vibe Modeling, Event Models for the C-Suite\\u0022 (Apr 23, 2025) - **Slices Lifecycle**\\n20. **Episode 20** - \\u0022Learning Using Slices\\u0022 (May 21, 2025) - **Slices Application**\\n21. **Episode 21** - \\u0022Simplicity is the Goal\\u0022 (Nov 2, 2025)\\n22. **Episode 22** - \\u0022SQL is an Anti-Pattern\\u0022 (Nov 4, 2025)\\n\\n## Critical Quotes from Software Engineering Radio Episode 539\\n\\n### On Slices as Independent Units\\n\\n**Quote (Timestamp 00:14:09):** \\u0022The core component of an event model is what I refer to as a slice. That\\u0027s really a workflow step as you move from left to right on the timeline. An event model is meant to allow you to analyze each step with a guarantee that only one thing is happening there.\\u0022\\n\\n**Quote (Timestamp 00:46:44):** \\u0022These slices in our implementation are done through event sourcing. They\\u0027re small. If there\\u0027s an explosion that\\u0027s small. If someone implements a slice badly, it\\u0027s just replaced. You\\u0027re not really likely to really destroy the system if you\\u0027re working on a team that\\u0027s doing this.\\u0022\\n\\n**Context:** Adam explains how slices provide fault isolation and complexity containment. Poorly implemented slices can be replaced without system-wide impact.\\n\\n### On \\u0022Done is Done\\u0022 Principle\\n\\n**Quote (Timestamp 00:17:36):** \\u0022This opinion of being able to dissect each system that you have into a standard set of components is kind of the unit of work and done is done problem we\\u0027ve been trying to tackle for a long time. The secret has been to look at state changes at the right level.\\u0022\\n\\n**Context:** State changes serve as concrete completion criteria. When the state change is implemented and produces the expected event, that slice is done\\u2014no ambiguity.\\n\\n### On Reducing Coupling Between Slices\\n\\n**Quote (Timestamp 00:41:41):** \\u0022Event Modeling forces you to look at a multi-model implementation, which is actually a good way of deconstructing coupling issues. Jeff, you can work on one screen for the candidate\\u0027s listings and I can look at the job listings page and we\\u0027re not stepping on each other\\u0027s toes because we\\u0027re not competing on how a single table is going to be used for both of those displays. If we have our own projections off of the events that we totally own\\u2014you own your green box and I own my green box\\u2014we can work in parallel.\\u0022\\n\\n**Context:** This is the critical coupling solution. Each slice owns its dedicated projection (green box/view). Multiple teams work simultaneously on different slices without database schema conflicts or merge conflicts.\\n\\n**Quote (Timestamp 00:42:35):** \\u0022Event Modeling does allow a higher level of parallelism, which allows larger teams. We no longer go by the pizza size team internally since we can do a lot more by understanding where these things are.\\u0022\\n\\n### On Given-When-Then Patterns in Slices\\n\\n**Quote (Timestamp 00:10:30):** \\u0022Event Modeling heavily does rely on the history, the successful history of specification by example and behavior driven development, which takes the approach of show enough examples with real data, real screenshots of what things are supposed to look like along a workflow.\\u0022\\n\\n**Quote (Timestamp 00:40:25):** \\u0022We always have example data in there so that people can relate to it. Having example data allows you to do an audit of information completeness. Are you making up facts? Where did this information come from? Do I have a step somewhere in the past where someone entered in this information? If I don\\u0027t, I know I\\u0027ve missed out some important requirements.\\u0022\\n\\n**Context:** Example data serves as the \\u0022Given\\u0022 context. Tracing backwards ensures all data has a source event, ensuring completeness and discovering missing requirements.\\n\\n### On Relationship Between Slices and Modules\\n\\n**Quote (Timestamp 00:43:26):** \\u0022The last step is really organizing these swim lanes so that I may have a candidate system, I might have another system that shows the job postings and I put those in swim lanes down below. All events that relate to job postings go in one swim lane, all events going for applicants can go in the swim lane. That\\u0027s if we decide that there\\u0027ll be two subsystems.\\u0022\\n\\n**Quote (Timestamp 00:45:57):** \\u0022One of the things that Event Modeling does is it starts out with the goals of all those practices being shown as the artifact. So, someone can do Event Modeling for a year and then say, hey wait a minute, I have domain driven design. These look like bounded contexts. Wait a second, this is an aggregate, I have transactional integrity on this. They can go backwards, kind of stumble Kramer their way into it and fall backwards into domain-driven design.\\u0022\\n\\n**Context:** Swim lanes naturally emerge as bounded contexts in DDD. Teams discover they\\u0027ve implemented vertical slice architecture without explicit training\\u2014the Event Model structure guides them there organically.\\n\\n### On Complexity Containment\\n\\n**Quote from Jeff Doolittle (Timestamp 00:48:03):** \\u0022That\\u0027s what I refer to as complexity containment. You know you\\u0027ve contained complexity when there\\u0027s a significant change in your system and it\\u0027s isolated to a small portion of your system. You know you have a bad design when a change in your system affects multiple parts of your system.\\u0022\\n\\n**Adam\\u0027s Response:** \\u0022Exactly.\\u0022\\n\\n## Visual Representation of Event Models\\n\\n### The Four Building Blocks\\n\\n**From Event Modeling documentation and SE Radio Episode 539:**\\n\\n1. **Wireframes/UI (White/Mockups):** User-facing screens showing where information originates or displays. Can be Figma designs, sketches, or screenshots of existing systems.\\n\\n2. **Commands (Blue Boxes):** Represent intentions to change system state. Named as imperatives (e.g., \\u0022Register User,\\u0022 \\u0022Book Room\\u0022). Contain parameters collected from UI.\\n\\n3. **Events (Orange/Yellow Boxes):** Business facts that mutated system state and were persisted. Named in past tense (e.g., \\u0022User Registered,\\u0022 \\u0022Room Booked\\u0022). Contain all relevant state change data.\\n\\n4. **Views/Read Models (Green Boxes):** Queries that read, interpret, and curate event data for specific UIs. Each view optimizes for one screen\\u0027s needs.\\n\\n### The Four Patterns\\n\\n**Pattern 1 - Command Pattern (State Change):**\\n\\u0060\\u0060\\u0060\\nUI/Wireframe \\u2192 Blue Box (Command) \\u2192 Orange Box (Event)\\n\\u0060\\u0060\\u0060\\n**Description:** User triggers command from UI. Command validates and produces event. Event persists state change.\\n\\n**Pattern 2 - View Pattern (State Display):**\\n\\u0060\\u0060\\u0060\\nOrange Boxes (Events) \\u2192 Green Box (View) \\u2192 UI/Wireframe\\n\\u0060\\u0060\\u0060\\n**Description:** Historical events project into materialized view. View optimized for specific UI display.\\n\\n**Pattern 3 - Automation Pattern (To-Do List):**\\n\\u0060\\u0060\\u0060\\nOrange Boxes (Events) \\u2192 Green Box (To-Do View) \\u2192 Automated Process \\u2192 Blue Box (Command) \\u2192 Orange Box (Event)\\n\\u0060\\u0060\\u0060\\n**Description:** Events populate to-do list. Processor monitors list and issues commands for incomplete items. Resulting events mark items complete.\\n\\n**Critical Quote (Timestamp 00:59:50):** \\u0022These to-do lists allow things like fulfillment documents that you might find in long running processes and sagas. You have a green box that a processor listens to, and then it issues blue boxes or commands to other parts of the system.\\u0022\\n\\n**Pattern 4 - Translation Pattern (System Integration):**\\n\\u0060\\u0060\\u0060\\nExternal System Events \\u2192 Green Box (Translation View) \\u2192 Automated Process \\u2192 Blue Box (Command) \\u2192 Internal Events\\n\\u0060\\u0060\\u0060\\n**Description:** External system events translate into internal system language through dedicated view and automation.\\n\\n### Visual Layout and Organization\\n\\n**Storyboard Metaphor (Timestamp 00:09:37):** \\u0022Event Modeling allows you to basically look at a storyboard like you would for a movie with the top swim lanes being what the actors, what the scenes are and what the actors are doing and what the key frames are showing key points in the story. But down below you have the plot, which is the data.\\u0022\\n\\n**Layout Structure:**\\n- **Horizontal axis:** Timeline flowing left to right (never branching)\\n- **Top swim lanes:** Different actors (users, external systems) and their screens\\n- **Bottom swim lanes:** Subsystems organized by event ownership\\n- **Cascade pattern:** Information often flows from onboarding (top) \\u2192 processing (middle) \\u2192 reporting (bottom)\\n\\n**Connection Rules:** Strict arrow connections enforce architectural discipline:\\n- UI/API must connect through blue box (command) to orange box (event)\\n- Orange boxes (events) connect to green boxes (views) back to UI/API\\n- No direct UI-to-event or command-to-view connections allowed\\n\\n### Color Coding Rationale\\n\\n**Quote (Timestamp 00:15:51):** \\u0022We use color coding for these. The commands are blue\\u2014so visually you can see that it\\u0027s the intent to change the system state. The events are orange on Mural, although if we\\u0027re doing this in person, I usually switch that to yellow because yellow stickies are easier to find in stores.\\u0022\\n\\n**Purpose:** Color provides instant visual distinction between component types, making models scannable and understandable at a glance.\\n\\n## Implementation Patterns and Best Practices\\n\\n### Direct Implementation from Visual Model\\n\\n**Quote (Timestamp 00:52:03):** \\u0022People love the fact that they can follow an event model step by step. When you\\u0027re implementing you\\u0027re not distracted. You don\\u0027t need to use the Pomodoro technique. When you\\u0027re concentrating on a blue box or this screen, you finish it, you move on to where the arrow points to next. So it\\u0027s a really good backbone to the actual everyday workload.\\u0022\\n\\n**Best Practice:** Implement linearly following the event model\\u0027s visual flow. One slice at a time, following arrows from component to component. This creates natural focus and eliminates context switching.\\n\\n### Green Box Implementation Philosophy\\n\\n**Quote (Timestamp 00:41:41):** \\u0022Obviously one of the columns in that green box would be skill set or it might be a join to a table that has skill sets and you could filter on that with a very simple query. Ideally the green box is when you\\u0027re implementing kind of like your select stars. You\\u0027re making those models to be exactly what you need for that step to be done really quickly.\\u0022\\n\\n**Best Practice:** Each green box should be a simple, denormalized projection optimized for its specific screen. Avoid complex joins across aggregates. Think \\u0022select star\\u0022 simplicity.\\n\\n### To-Do List Pattern for Process Automation\\n\\n**Quote (Timestamp 01:00:45):** \\u0022In Event Modeling any automation, any of these larger patterns, they\\u0027re always replaced by this to-do list pattern. You have a green box that a processor listens to, and then it issues blue boxes or commands to other parts of the system. It might have three of these steps that are locked together to implement what you would traditionally see in some observer pattern.\\u0022\\n\\n**Implementation Strategy:** Replace complex enterprise patterns (sagas, process managers, observers) with simple to-do lists:\\n1. Events populate a checklist (green box)\\n2. Processor reads uncompleted items\\n3. Processor issues commands for each item\\n4. Resulting events mark items complete\\n\\n**Best Practice Quote (Timestamp 01:01:39):** \\u0022You could still use saga as an implementation detail, but what you\\u0027re saying is we can keep that implementation detail out of the Event Modeling so that the business is not getting overwhelmed with technical speak and patterns they don\\u0027t understand.\\u0022\\n\\n### Vertical Slice Architecture Emergence\\n\\n**Quote (Timestamp 00:46:44):** \\u0022Someone can do Event Modeling for a year and then say, hey wait a minute, I have domain driven design. These look like bounded contexts. These slices are formulated exactly specifically for this purpose so that they end up fitting any of these really good approaches that takes time to learn.\\u0022\\n\\n**Architecture Pattern:** Each workflow step = one vertical slice through all layers (UI \\u2192 Command \\u2192 Event \\u2192 View). Teams naturally implement vertical slice architecture without formal training.\\n\\n### Event Sourcing as Natural Implementation\\n\\n**Quote (Timestamp 00:48:05):** \\u0022Combining this with implementations that are event driven and event sourced specifically where we don\\u0027t lose any information, we always have a breadcrumb trail to go back to. Event Modeling really does allow you to push forward in your event driven architecture goals.\\u0022\\n\\n**Implementation Choice:** While Event Modeling doesn\\u0027t mandate event sourcing, it naturally leads there. Events already defined in the model become the persistence mechanism, providing audit trails and temporal debugging.\\n\\n### Asynchronous Collaboration Pattern\\n\\n**Quote (Timestamp 00:53:11):** \\u0022We don\\u0027t have standups because we know on the event model who\\u0027s done what. We do that on a push-pull basis when there\\u0027s a comment on the Mural board that someone\\u0027s hit a blocker. That blocker is immediately taken care of by anyone else looking at the event model because they come up as red comment bubbles and we just make sure that there\\u0027s no red comment bubbles ever on the event model.\\u0022\\n\\n**Best Practice:** Use digital Event Modeling tools (Mural, Miro) for async collaboration:\\n- Team members mark completed slices directly on the model\\n- Red comments flag blockers for immediate attention\\n- No synchronous standups needed\\u2014model shows progress visually\\n- Works exceptionally well for distributed global teams\\n\\n### Code Pattern: Pure Command Handlers\\n\\n**From Episode 7 and SE Radio:** Command handlers should be pure functions with signature:\\n\\n\\u0060\\u0060\\u0060\\n(currentState, command) \\u2192 events[]\\n\\u0060\\u0060\\u0060\\n\\n**Benefits:**\\n- Deterministic and testable\\n- No hidden dependencies or side effects\\n- Easy property-based testing\\n- Natural fit for GWT specifications\\n\\n### Testing Pattern for Commands\\n\\n**From documentation:** Each command needs minimum two tests:\\n\\n**Success Case:**\\n- Given: Set of 0..N historical events establishing state\\n- When: Valid command execution\\n- Then: Expected event(s) produced\\n\\n**Failure Case:**\\n- Given: Set of events creating conditions for rejection\\n- When: Invalid command execution\\n- Then: Exception/error event (no state change)\\n\\n### Testing Pattern for Views\\n\\n**From documentation:** Views tested without \\u0022When\\u0022 step:\\n\\n- Given: Set of 0..N events\\n- Then: Expected model/view state after projection\\n\\n**Validation:** Ensure view contains only data derivable from given events (information completeness check).\\n\\n## Relationship Between Slices and Modules\\n\\n### Conway\\u0027s Law Application\\n\\n**Quote (Timestamp 00:44:22):** \\u0022We call it Conway\\u0027s Law because it\\u0027s those communication pathways that Conway really identified and you see those right in front of you here. When you have people organized to develop these systems, which teams are going to talk to one another and what information, what contracts are important to make sure they\\u0027re talking about those ahead of time.\\u0022\\n\\n**Practice:** Swim lanes reveal team boundaries and communication patterns. Organize teams around swim lanes (bounded contexts), with explicit contracts at handoff points between lanes.\\n\\n### Bounded Context Discovery\\n\\n**From SE Radio Episode 539:** Teams practicing Event Modeling naturally discover they\\u0027ve created bounded contexts from Domain-Driven Design:\\n- Each swim lane often represents one bounded context\\n- Events within a lane share a ubiquitous language\\n- Cross-lane interactions happen through events (published language)\\n- Natural boundaries emerge from business workflow organization\\n\\n### Module Independence\\n\\n**Critical Principle:** Each module (swim lane) owns:\\n- Its own events (orange boxes in that lane)\\n- Its own commands (blue boxes for that subsystem)\\n- Its own views (green boxes projecting that lane\\u0027s events)\\n- Clear published interface (events) consumed by other lanes\\n\\n**Result:** Modules can be developed, deployed, and scaled independently. Teams don\\u0027t need coordination ceremonies because contracts are explicit in the Event Model.\\n\\n## Key Resources and Access\\n\\n### Podcast\\n- **Website:** https://podcast.eventmodeling.org/\\n- **Episodes Page:** https://podcast.eventmodeling.org/episodes/\\n- **Spotify:** Search \\u0022Event Modeling and Event Sourcing Podcast\\u0022\\n- **YouTube:** @eventmodeling channel\\n- **RSS Feed:** https://podcast.eventmodeling.org/index.xml\\n- **Audio Files:** Direct MP3s at \\u0060https://podcast.eventmodeling.org/audio/episode-{number}.mp3\\u0060\\n\\n### Learning Materials\\n- **Book:** \\u0022Understanding Eventsourcing\\u0022 by Martin Dilger - https://leanpub.com/eventmodeling-and-eventsourcing\\n- **Newsletter:** https://newsletter.nebulit.de (Weekly updates from Adam and Martin)\\n- **Main Website:** https://eventmodeling.org\\n- **Workshop Site:** https://adaptechgroup.com\\n\\n### Community\\n- **Discord:** Linked from eventmodeling.org/resources\\n- **Miro Plugin:** https://www.eventmodelers.de/eventmodeling-tooling/\\n\\n### Additional Interviews and Talks\\n- **Software Engineering Radio Ep 539:** https://se-radio.net/2022/11/episode-539-adam-dymitruk-on-event-modeling/ (Full transcript analyzed)\\n- **Hanselminutes Ep 771:** https://hanselminutes.com/771/exploring-event-modeling-with-adam-dymitruk\\n- **Confluent Course:** \\u0022Practical Event Modeling\\u0022 by Bobby Calderwood\\n- **GOTO/YOW Conference Talks:** Multiple presentations available on YouTube\\n\\n## Summary of Core Principles\\n\\n### Slices as Independent Units\\nSlices represent **the smallest implementable work units** containing everything from UI to persistence. Each slice is a complete vertical cut through all architectural layers, enabling independent development and deployment without coordination overhead.\\n\\n### \\u0022Done is Done\\u0022 Principle\\n**When the state change is implemented and produces the expected event, that slice is complete.** No ambiguity, no subjective quality gates. State changes provide concrete, measurable completion criteria that all stakeholders understand.\\n\\n### Given-When-Then in Event Modeling\\nGWT specifications map directly to Event Model structure:\\n- **Given:** Historical events establishing current state\\n- **When:** Command execution or time-based trigger\\n- **Then:** Resulting event(s) or view state\\n\\n**Innovation:** GWTs can be visualized directly on timelines alongside the system model, making test scenarios immediately understandable.\\n\\n### Reducing Coupling\\n**Each slice owns its dedicated projections (green boxes).** Never reuse models across workflows. Duplication of views eliminates coupling, enabling parallel development without conflicts. Teams work on different slices simultaneously because they don\\u0027t share mutable state.\\n\\n### Slices and Modules\\n**Swim lanes reveal natural module boundaries.** Events group by subsystem in vertical swim lanes, creating bounded contexts that map to teams. Conway\\u0027s Law becomes visible\\u2014communication patterns appear as arrows crossing swim lanes.\\n\\n### Visual Representation\\nThe Event Model uses **four building blocks in four patterns** on a left-to-right timeline with swim lanes. Color coding (blue=command, orange=event, green=view) provides instant visual comprehension. The storyboard format\\u2014\\u0022above are the scenes, below is the plot\\u0022\\u2014makes the model accessible to all organizational roles.\\n\\n### Implementation Philosophy\\n**Follow the arrows.** Implement slices linearly as the visual model directs. Keep command handlers pure. Use to-do lists instead of complex patterns. Let event sourcing emerge naturally. The Event Model IS the implementation blueprint\\u2014no translation layer needed.\\n\\nThis catalog provides comprehensive coverage of Event Modeling concepts as taught by Adam Dymitruk and Martin Dilger across their podcast episodes, conference talks, and documentation. All episodes are available at podcast.eventmodeling.org with direct audio links and YouTube videos.\",\"language\":null,\"md_citations\":[{\"url\":\"https://eventmodeling.org/\",\"uuid\":\"a2a5fd91-2cba-4bf5-a8e0-3139b043b825\",\"title\":\"Eventmodeling\",\"sources\":[{\"url\":\"https://eventmodeling.org/\",\"uuid\":\"a2a5fd91-2cba-4bf5-a8e0-3139b043b825\",\"title\":\"Event Modeling - Designing Modern Information Systems\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"subtitles\":null,\"content_body\":null,\"resource_type\":null}],\"metadata\":{\"type\":\"generic_metadata\",\"uuid\":\"a2a5fd91-2cba-4bf5-a8e0-3139b043b825\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"preview_title\":\"Event Modeling - Designing Modern Information Systems\"},\"end_index\":397,\"start_index\":261,\"origin_tool_name\":\"web_search\"},{\"url\":\"https://open.spotify.com/show/5yIPErSiVqs2fkMia3WbwZ\",\"uuid\":\"a11c68da-01d8-4457-9fcc-0ddca8675ac0\",\"title\":\"Spotify\",\"sources\":[{\"url\":\"https://open.spotify.com/show/5yIPErSiVqs2fkMia3WbwZ\",\"uuid\":\"a11c68da-01d8-4457-9fcc-0ddca8675ac0\",\"title\":\"The Event Modeling and Event Sourcing Podcast | Podcast on Spotify\",\"source\":\"Spotify\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=spotify.com\",\"subtitles\":null,\"content_body\":null,\"resource_type\":null}],\"metadata\":{\"type\":\"generic_metadata\",\"uuid\":\"a11c68da-01d8-4457-9fcc-0ddca8675ac0\",\"source\":\"Spotify\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=spotify.com\",\"preview_title\":\"The Event Modeling and Event Sourcing Podcast | Podcast on Spotify\"},\"end_index\":397,\"start_index\":261,\"origin_tool_name\":\"web_search\"},{\"url\":\"https://eventmodeling.org/resources/\",\"uuid\":\"caad9351-1050-4144-a5f7-fd8731cef8c9\",\"title\":\"Eventmodeling\",\"sources\":[{\"url\":\"https://eventmodeling.org/resources/\",\"uuid\":\"caad9351-1050-4144-a5f7-fd8731cef8c9\",\"title\":\"Resources - Event Modeling\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"subtitles\":null,\"content_body\":null,\"resource_type\":null}],\"metadata\":{\"type\":\"generic_metadata\",\"uuid\":\"caad9351-1050-4144-a5f7-fd8731cef8c9\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"preview_title\":\"Resources - Event Modeling\"},\"end_index\":397,\"start_index\":261,\"origin_tool_name\":\"web_search\"},{\"url\":\"https://eventmodeling.org/\",\"uuid\":\"f1e7d333-ea80-403e-9979-e1aba8399e14\",\"title\":\"Eventmodeling\",\"sources\":[{\"url\":\"https://eventmodeling.org/\",\"uuid\":\"f1e7d333-ea80-403e-9979-e1aba8399e14\",\"title\":\"Event Modeling - Designing Modern Information Systems\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"subtitles\":null,\"content_body\":null,\"resource_type\":null}],\"metadata\":{\"type\":\"generic_metadata\",\"uuid\":\"f1e7d333-ea80-403e-9979-e1aba8399e14\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"preview_title\":\"Event Modeling - Designing Modern Information Systems\"},\"end_index\":437,\"start_index\":261,\"origin_tool_name\":\"web_search\"},{\"url\":\"https://eventmodeling.org/posts/event-modeling-cheatsheet/\",\"uuid\":\"8444f139-5a59-48f6-b343-39ac49e3d24c\",\"title\":\"Eventmodeling\",\"sources\":[{\"url\":\"https://eventmodeling.org/posts/event-modeling-cheatsheet/\",\"uuid\":\"8444f139-5a59-48f6-b343-39ac49e3d24c\",\"title\":\"Event Modeling Cheat Sheet - Event Modeling\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"subtitles\":null,\"content_body\":null,\"resource_type\":null}],\"metadata\":{\"type\":\"generic_metadata\",\"uuid\":\"8444f139-5a59-48f6-b343-39ac49e3d24c\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"preview_title\":\"Event Modeling Cheat Sheet - Event Modeling\"},\"end_index\":1117,\"start_index\":926,\"origin_tool_name\":\"web_search\"},{\"url\":\"https://eventmodeling.org/posts/event-modeling-cheatsheet/\",\"uuid\":\"ac56ab33-a1d7-4bd0-ada3-aa7e1ddeeda6\",\"title\":\"eventmodeling\",\"sources\":[{\"url\":\"https://eventmodeling.org/posts/event-modeling-cheatsheet/\",\"uuid\":\"ac56ab33-a1d7-4bd0-ada3-aa7e1ddeeda6\",\"title\":\"Event Modeling Cheat Sheet\",\"source\":\"eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"subtitles\":null,\"content_body\":null,\"resource_type\":null}],\"metadata\":{\"type\":\"generic_metadata\",\"uuid\":\"ac56ab33-a1d7-4bd0-ada3-aa7e1ddeeda6\",\"source\":\"eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"preview_title\":\"Event Modeling Cheat Sheet\"},\"end_index\":1117,\"start_index\":926,\"origin_tool_name\":\"web_fetch\"},{\"url\":\"https://podcast.eventmodeling.org/index.xml\",\"uuid\":\"e79b138b-1419-42bd-b8cb-4363aec83874\",\"title\":\"Eventmodeling\",\"sources\":[{\"url\":\"https://podcast.eventmodeling.org/index.xml\",\"uuid\":\"e79b138b-1419-42bd-b8cb-4363aec83874\",\"title\":\"The Event Modeling and Event Sourcing Podcast\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"subtitles\":null,\"content_body\":null,\"resource_type\":null}],\"metadata\":{\"type\":\"generic_metadata\",\"uuid\":\"e79b138b-1419-42bd-b8cb-4363aec83874\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"preview_title\":\"The Event Modeling and Event Sourcing Podcast\"},\"end_index\":1674,\"start_index\":1604,\"origin_tool_name\":\"web_search\"},{\"url\":\"https://podcast.eventmodeling.org/index.xml\",\"uuid\":\"0a8e6b3a-0780-4e0f-