\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2564\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u255D\\n        \\u25BC\\n\\u250F\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2513\\n\\u2503 Files         \\u2503\\n\\u2503 Synchronized  \\u2503\\n\\u2503\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2503\\n\\u2503 count         \\u2503\\n\\u2503 timestamp     \\u2503\\n\\u2517\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u251B\\n\\u0060\\u0060\\u0060\\n\\n## Event Flow Summary\\n\\n### Connection Lifecycle\\n\\u0060\\u0060\\u0060\\nStart \\u2192 ConnectionInitiated \\u2192 CapabilitiesNegotiated \\u2192 ConnectionActive \\u2192 ConnectionClosed\\n\\u0060\\u0060\\u0060\\n\\n### Tool Execution Flow\\n\\u0060\\u0060\\u0060\\nToolCallRequested \\u2192 [Penpot API Call] \\u2192 ToolExecuted | ErrorOccurred\\n\\u0060\\u0060\\u0060\\n\\n### Resource Access Flow\\n\\u0060\\u0060\\u0060\\nResourceRequested \\u2192 ResourceProvided | ResourceNotFound\\n\\u0060\\u0060\\u0060\\n\\n### Penpot Operation Flow\\n\\u0060\\u0060\\u0060\\nPenpotCommandReceived \\u2192 TokenValidated \\u2192 PenpotAPIcalled \\u2192 PenpotEventRecorded\\n\\u0060\\u0060\\u0060\\n\\n## Information Completeness Matrix\\n\\n| Slice Type    | Source                | Command/ReadModel     | Output               | Validation                  |\\n|---------------|----------------------|----------------------|----------------------|-----------------------------|\\n| State Change  | MCP Client           | Initialize           | ConnectionInitiated  | \\u2713 Client info present       |\\n| State Change  | MCP Client           | CallTool             | ToolExecuted         | \\u2713 Tool exists, args valid  |\\n| State Change  | Tool Handler         | CreateShape          | ShapeCreated         | \\u2713 Valid Penpot token        |\\n| State View    | Tool Registry        | (Read Model)         | Tools List           | \\u2713 All tools have schema    |\\n| State View    | Resource Registry    | (Read Model)         | Resource Content     | \\u2713 URI pattern matches       |\\n| Third Party   | Penpot API          | Authenticate         | TokenReceived        | \\u2713 Credentials valid         |\\n\\n## Aggregate Boundaries\\n\\n### Connection Aggregate\\n- Owns: Connection state, client info, capabilities\\n- Events: ConnectionInitiated, CapabilitiesNegotiated, ConnectionClosed\\n- Invariants: Only one active connection per client\\n\\n### Tool Execution Aggregate  \\n- Owns: Tool calls, execution history, results\\n- Events: ToolCallRequested, ToolExecuted, ErrorOccurred\\n- Invariants: Call IDs are unique, tools must be registered\\n\\n### Resource Aggregate\\n- Owns: Resource registry, content cache\\n- Events: ResourceRequested, ResourceProvided\\n- Invariants: Resources must have valid URIs\\n\\n### Penpot Integration Aggregate\\n- Owns: Authentication tokens, file cache\\n- Events: TokenReceived, ShapeCreated, FileUpdated\\n- Invariants: Token must be valid for operations\\n\\n## Testing Scenarios (Given/When/Then)\\n\\n### Initialize Connection\\n\\u0060\\u0060\\u0060\\nGIVEN: No active connection\\nWHEN: Initialize with client info\\nTHEN: ConnectionInitiated event with valid ID\\n\\u0060\\u0060\\u0060\\n\\n### Execute Tool\\n\\u0060\\u0060\\u0060\\nGIVEN: Active connection, registered tool \\u0022penpot.createShape\\u0022\\nWHEN: CallTool with valid shape data\\nTHEN: ToolExecuted event with new shapeId\\n\\u0060\\u0060\\u0060\\n\\n### Handle Invalid Tool\\n\\u0060\\u0060\\u0060\\nGIVEN: Active connection\\nWHEN: CallTool with unknown tool name\\nTHEN: ErrorOccurred event with ToolNotFound\\n\\u0060\\u0060\\u0060\\n\\n### Provide Resource\\n\\u0060\\u0060\\u0060\\nGIVEN: Resource \\u0022penpot://file/123\\u0022 exists\\nWHEN: GetResource request\\nTHEN: ResourceProvided event with file content\\n\\u0060\\u0060\\u0060\\n\",\"description\":\"Creating a text-based Event Model visualization showing the MCP server\\u0027s state changes and state views as an ASCII diagram\"},\"message\":\"Creating a text-based Event Model visualization showing the MCP server\\u0027s state changes and state views as an ASCII diagram\",\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":{\"type\":\"code_block\",\"language\":\"plaintext\",\"code\":\"# FnMCP.Penpot Event Model - Text Visualization\\n\\n## Event Model Overview\\n\\nThis Event Model represents the MCP (Model Context Protocol) server for Penpot as the business domain, showing how information flows through the system.\\n\\n## Timeline \\u2192\\n\\n\\u0060\\u0060\\u0060\\n\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\u2550\\n                                                          MCP CONNECTION LIFECYCLE \\u0026 OPERATIONS\\n\\u2550\\u2550\\u2550\\u255