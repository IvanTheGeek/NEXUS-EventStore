ields\\\\\\u0022\\u003E\\\\n                                productId: Guid\\u003Cbr/\\u003E\\\\n                                searchTerms: string list\\u003Cbr/\\u003E\\\\n                                tags: string list\\\\n                            \\u003C/div\\u003E\\\\n                        \\u003C/div\\u003E\\\\n                        \\\\n                        \\u003Cdiv class=\\\\\\u0022component read-model\\\\\\u0022\\u003E\\\\n                            \\u003Cdiv class=\\\\\\u0022component-label\\\\\\u0022\\u003ERead Model\\u003C/div\\u003E\\\\n                            \\u003Cdiv\\u003ESearchResults\\u003C/div\\u003E\\\\n                            \\u003Cdiv class=\\\\\\u0022component-fields\\\\\\u0022\\u003E\\\\n                                query: string\\u003Cbr/\\u003E\\\\n                                matches: Product list\\u003Cbr/\\u003E\\\\n                                count: int\\\\n                            \\u003C/div\\u003E\\\\n                        \\u003C/div\\u003E\\\\n                        \\\\n                        \\u003Cdiv class=\\\\\\u0022component screen\\\\\\u0022\\u003E\\\\n                            \\u003Cdiv class=\\\\\\u0022component-label\\\\\\u0022\\u003EScreen\\u003C/div\\u003E\\\\n                            \\u003Cdiv\\u003ESearch Results Page\\u003C/div\\u003E\\\\n                        \\u003C/div\\u003E\\\\n                    \\u003C/div\\u003E\\\\n\\\\n                    \\u003Cdiv class=\\\\\\u0022test-scenarios\\\\\\u0022\\u003E\\\\n                        \\u003Cdiv class=\\\\\\u0022test-header\\\\\\u0022\\u003EGiven / Then Scenarios\\u003C/div\\u003E\\\\n                        \\u003Cdiv class=\\\\\\u0022test-case\\\\\\u0022\\u003E\\\\n                            \\u003Cdiv class=\\\\\\u0022test-step\\\\\\u0022\\u003E\\\\n                                \\u003Cstrong\\u003EGIVEN\\u003C/strong\\u003E\\\\n                                \\u003Cdiv class=\\\\\\u0022test-items\\\\\\u0