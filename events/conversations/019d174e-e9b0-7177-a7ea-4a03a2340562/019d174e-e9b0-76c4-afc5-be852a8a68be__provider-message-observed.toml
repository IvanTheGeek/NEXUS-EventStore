text = "{\"start_timestamp\":\"2025-11-07T23:22:43.377932Z\",\"stop_timestamp\":\"2025-11-07T23:22:43.614611Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"penpot:penpot_api_info\",\"input\":{\"type\":\"EventsMap\"},\"message\":\"penpot_api_info\",\"integration_name\":\"penpot\",\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

