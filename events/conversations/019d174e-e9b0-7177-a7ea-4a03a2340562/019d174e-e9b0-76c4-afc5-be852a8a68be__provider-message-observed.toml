kind = "plain_text"
text = "I'd be happy to help you create an EventModel for Penpot! Before we dive into the implementation, let me understand your specific goals better so we can design this effectively.\n\nWhat aspects of Penpot's event system are you looking to model? Are you primarily interested in:\n- User interaction events (like shape selections, clicks, or transformations)?\n- State change events (like when layers are added, modified, or deleted)?\n- Plugin lifecycle events (initialization, activation, deactivation)?\n- Or perhaps a comprehensive model that captures all of these?\n\nAlso, what challenges did you encounter in your previous attempt? Understanding what didn't work before will help us avoid those pitfalls and design a better solution this time around.\n\nLet me first check what Penpot's current API offers for event handling to ensure we're building on the right foundation."

