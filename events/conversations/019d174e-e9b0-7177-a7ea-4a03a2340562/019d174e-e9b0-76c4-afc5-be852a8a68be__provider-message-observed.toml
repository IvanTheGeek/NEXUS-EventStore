text = "{\"start_timestamp\":\"2025-11-07T23:24:17.556129Z\",\"stop_timestamp\":\"2025-11-07T23:25:06.295386Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"create_file\",\"input\":{\"path\":\"/home/claude/PenpotEventInterop.fs\",\"file_text\":\"module FnMCP.Penpot.Events.Interop\\n\\nopen Fable.Core\\nopen Fable.Core.JsInterop\\nopen System\\n\\n// JavaScript Penpot API bindings\\n// These represent the actual JavaScript objects and functions\\n\\n[\\u003CImport(\\u0022penpot\\u0022, \\u0022penpot-plugin-api\\u0022)\\u003E]\\nlet penpot: obj = jsNative\\n\\n// Shape-related JavaScript types\\n[\\u003CAllowNullLiteral\\u003E]\\ntype IJSShape =\\n    abstract id: string\\n    abstract name: string\\n    abstract \\u0060\\u0060type\\u0060\\u0060: string\\n\\n[\\u003CAllowNullLiteral\\u003E]\\ntype IJSPage =\\n    abstract id: string\\n    abstract name: string\\n    abstract root: IJSShape option\\n\\n[\\u003CAllowNullLiteral\\u003E]\\ntype IJSFile =\\n    abstract id: string\\n    abstract name: string\\n    abstract pages: ResizeArray\\u003CIJSPage\\u003E\\n\\n// Event subscription/unsubscription\\ntype PenpotAPI =\\n    abstract on: eventType: string * callback: (obj -\\u003E unit) * ?props: obj -\\u003E obj\\n    abstract off: listenerId: obj -\\u003E unit\\n\\n// Convert JavaScript objects to F# types\\nmodule Converters =\\n    let toShape (jsShape: IJSShape) : Shape =\\n        {\\n            Id = ShapeId jsShape.id\\n            Name = jsShape.name\\n            Type = jsShape.\\u0060\\u0060type\\u0060\\u0060\\n        }\\n    \\n    let toPage (jsPage: IJSPage) : Page =\\n        {\\n            Id = PageId jsPage.id\\n            Name = jsPage.name\\n            Root = jsPage.root |\\u003E Option.map toShape\\n        }\\n    \\n    let toFile (jsFile: IJSFile) : File =\\n        {\\n            Id = FileId jsFile.id\\n            Name = jsFile.name\\n            Pages = jsFile.pages |\\u003E Seq.toList |\\u003E List.map toPage\\n        }\\n    \\n    let parseTheme (theme: string) : Theme option =\\n        match theme.ToLowerInvariant() with\\n        | \\u0022light\\u0022 -\\u003E Some Light\\n        | \\u0022dark\\u0022 -\\u003E Some Dark\\n        | _ -\\u003E None\\n\\n// Main event bridge that connects F# event model to JavaScript\\ntype PenpotEventBridge() =\\n    let mutable subscriptions: Map\\u003Cstring, obj\\u003E = Map.empty\\n    let penpotApi = penpot :?\\u003E PenpotAPI\\n    \\n    // Generic event subscription with automatic type conversion\\n    let subscribe\\u003C\\u0027JSType, \\u0027FType\\u003E \\n        (eventName: string) \\n        (converter: \\u0027JSType -\\u003E \\u0027FType) \\n        (handler: \\u0027FType -\\u003E unit)\\n        (props: obj option) =\\n        \\n        let jsCallback = fun (jsData: obj) -\\u003E\\n            try\\n                let typedData = jsData :?\\u003E \\u0027JSType\\n                let converted = converter typedData\\n                handler converted\\n            with\\n            | ex -\\u003E \\n                printfn \\u0022Error converting %s event: %s\\u0022 eventName ex.Message\\n        \\n        let listenerId = \\n            match props with\\n            | Some p -\\u003E penpotApi.on(eventName, jsCallback, p)\\n            | None -\\u003E penpotApi.on(eventName, jsCallback)\\n        \\n        subscriptions \\u003C- subscriptions.Add(eventName \\u002B \\u0022_\\u0022 \\u002B string (Guid.NewGuid()), listenerId)\\n        listenerId\\n    \\n    // Subscribe to page change events\\n    member this.OnPageChange(handler: Page -\\u003E unit) =\\n        subscribe\\u003CIJSPage, Page\\u003E \\n            \\u0022pagechange\\u0022 \\n            Converters.toPage \\n            handler \\n            None\\n    \\n    // Subscribe to file change events\\n    member this.OnFileChange(handler: File -\\u003E unit) =\\n        subscribe\\u003CIJSFile, File\\u003E\\n            \\u0022filechange\\u0022\\n            Converters.toFile\\n            handler\\n            None\\n    \\n    // Subscribe to selection change events\\n    member this.OnSelectionChange(handler: ShapeId list -\\u003E unit) =\\n        let converter (jsIds: obj) =\\n            let ids = jsIds :?\\u003E string[]\\n            ids |\\u003E Array.map ShapeId |\\u003E Array.toList\\n        \\n        subscribe\\u003Cobj, ShapeId list\\u003E\\n            \\u0022selectionchange\\u0022\\n            converter\\n            handler\\n            None\\n    \\n    // Subscribe to theme change events\\n    member this.OnThemeChange(handler: Theme -\\u003E unit) =\\n        let converter (jsTheme: obj) =\\n            let theme = jsTheme :?\\u003E string\\n            match Converters.parseTheme theme with\\n            | Some t -\\u003E t\\n            | None -\\u003E Light // Default to Light if unknown\\n        \\n        subscribe\\u003Cobj, Theme\\u003E\\n            \\u0022themechange\\u0022\\n            converter\\n            handler\\n            None\\n    \\n    // Subscribe to shape change events with specific shape monitoring\\n    member this.OnShapeChange(shapeId: ShapeId, handler: Shape -\\u003E unit) =\\n        let (ShapeId id) = shapeId\\n        let props = createObj [\\u0022shapeId\\u0022 ==\\u003E id]\\n        \\n        subscribe\\u003CIJSShape, Shape\\u003E\\n            \\u0022shapechange\\u0022\\n            Converters.toShape\\n            handler\\n            (Some props)\\n    \\n    // Subscribe to content save events\\n    member this.OnContentSave(handler: unit -\\u003E unit) =\\n        let converter (_: obj) = ()\\n        subscribe\\u003Cobj, unit\\u003E\\n            \\u0022contentsave\\u0022\\n            converter\\n            handler\\n            None\\n    \\n    // Subscribe to operation finished events\\n    member this.OnFinish(handler: string -\\u003E unit) =\\n        let converter (jsData: obj) = jsData :?\\u003E string\\n        subscribe\\u003Cobj, string\\u003E\\n            \\u0022finish\\u0022\\n            converter\\n            handler\\n            None\\n    \\n    // Subscribe to all events with unified handler\\n    member this.OnAnyEvent(handler: PenpotEvent -\\u003E unit) =\\n        // Subscribe to each event type and convert to unified event type\\n        this.OnPageChange(PageChanged \\u003E\\u003E handler) |\\u003E ignore\\n        this.OnFileChange(FileChanged \\u003E\\u003E handler) |\\u003E ignore\\n        this.OnSelectionChange(SelectionChanged \\u003E\\u003E handler) |\\u003E ignore\\n        this.OnThemeChange(ThemeChanged \\u003E\\u003E handler) |\\u003E ignore\\n        this.OnContentSave(fun () -\\u003E handler ContentSaved) |\\u003E ignore\\n        this.OnFinish(OperationFinished \\u003E\\u003E handler) |\\u003E ignore\\n    \\n    // Unsubscribe from specific event\\n    member this.Unsubscribe(listenerId: obj) =\\n        penpotApi.off(listenerId)\\n    \\n    // Unsubscribe from all events\\n    member this.UnsubscribeAll() =\\n        subscriptions\\n        |\\u003E Map.iter (fun _ listenerId -\\u003E penpotApi.off(listenerId))\\n        subscriptions \\u003C- Map.empty\\n\\n// Helper module for common event scenarios\\nmodule EventHelpers =\\n    open Browser.Dom\\n    \\n    // Debounce event handler to avoid excessive calls\\n    let debounce (milliseconds: int) (handler: \\u0027T -\\u003E unit) =\\n        let mutable timerId = None\\n        \\n        fun (arg: \\u0027T) -\\u003E\\n            timerId |\\u003E Option.iter window.clearTimeout\\n            timerId \\u003C- Some (window.setTimeout(fun () -\\u003E handler arg, milliseconds))\\n    \\n    // Throttle event handler to limit call frequency\\n    let throttle (milliseconds: int) (handler: \\u0027T -\\u003E unit) =\\n        let mutable lastCall = DateTime.MinValue\\n        \\n        fun (arg: \\u0027T) -\\u003E\\n            let now = DateTime.Now\\n            if (now - lastCall).TotalMilliseconds \\u003E= float milliseconds then\\n                lastCall \\u003C- now\\n                handler arg\\n    \\n    // Buffer events and process in batches\\n    let buffer (size: int) (handler: \\u0027T list -\\u003E unit) =\\n        let mutable buffer = []\\n        \\n        fun (item: \\u0027T) -\\u003E\\n            buffer \\u003C- item :: buffer\\n            if List.length buffer \\u003E= size then\\n                handler (List.rev buffer)\\n                buffer \\u003C- []\\n    \\n    // Create event logger for debugging\\n    let createEventLogger (prefix: string) =\\n        fun (event: PenpotEvent) -\\u003E\\n            let timestamp = DateTime.Now.ToString(\\u0022HH:mm:ss.fff\\u0022)\\n            match event with\\n            | PageChanged page -\\u003E\\n                printfn \\u0022[%s] %s: Page changed to \\u0027%s\\u0027 (ID: %A)\\u0022 timestamp prefix page.Name page.Id\\n            | SelectionChanged ids -\\u003E\\n                printfn \\u0022[%s] %s: Selection changed (%d items)\\u0022 timestamp prefix (List.length ids)\\n            | ShapeChanged shape -\\u003E\\n                printfn \\u0022[%s] %s: Shape \\u0027%s\\u0027 updated (Type: %s)\\u0022 timestamp prefix shape.Name shape.Type\\n            | ContentSaved -\\u003E\\n                printfn \\u0022[%s] %s: Content saved\\u0022 timestamp prefix\\n            | FileChanged file -\\u003E\\n                printfn \\u0022[%s] %s: File changed \\u0027%s\\u0027\\u0022 timestamp prefix file.Name\\n            | ThemeChanged theme -\\u003E\\n                printfn \\u0022[%s] %s: Theme changed to %A\\u0022 timestamp prefix theme\\n            | OperationFinished op -\\u003E\\n                printfn \\u0022[%s] %s: Operation finished: %s\\u0022 timestamp prefix op\\n\\n// Example usage showing the complete integration\\nmodule Example =\\n    // Initialize the event bridge\\n    let bridge = PenpotEventBridge()\\n    \\n    // Set up comprehensive event monitoring\\n    let setupEventMonitoring() =\\n        // Log all events\\n        let logger = EventHelpers.createEventLogger \\u0022PENPOT\\u0022\\n        bridge.OnAnyEvent(logger)\\n        \\n        // Handle specific events with business logic\\n        bridge.OnSelectionChange(fun selectedIds -\\u003E\\n            match selectedIds with\\n            | [] -\\u003E printfn \\u0022Selection cleared\\u0022\\n            | [single] -\\u003E \\n                let (ShapeId id) = single\\n                printfn \\u0022Single shape selected: %s\\u0022 id\\n            | multiple -\\u003E\\n                printfn \\u0022Multiple shapes selected: %d items\\u0022 (List.length multiple)\\n        )\\n        \\n        // Debounced shape change handler (useful for real-time updates)\\n        let debouncedShapeHandler = \\n            EventHelpers.debounce 500 (fun shape -\\u003E\\n                printfn \\u0022Processing shape update for: %s\\u0022 shape.Name\\n                // Perform expensive operations here\\n            )\\n        \\n        // Monitor specific shape if needed\\n        match bridge.OnShapeChange(ShapeId \\u0022shape-123\\u0022, debouncedShapeHandler) with\\n        | listenerId -\\u003E printfn \\u0022Monitoring shape with listener: %A\\u0022 listenerId\\n        \\n        // Batch selection changes\\n        let batchedSelectionHandler =\\n            EventHelpers.buffer 5 (fun selections -\\u003E\\n                printfn \\u0022Processing batch of %d selection changes\\u0022 (List.length selections)\\n            )\\n        \\n        bridge.OnSelectionChange(batchedSelectionHandler)\\n    \\n    // Clean up when done\\n    let cleanup() =\\n        bridge.UnsubscribeAll()\\n        printfn \\u0022All event subscriptions removed\\u0022\\n\",\"description\":\"Creating JavaScript interop module for connecting F# EventModel to Penpot\\u0027s JavaScript API\"},\"message\":\"Creating JavaScript interop module for connecting F# EventModel to Penpot\\u0027s JavaScript API\",\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":{\"type\":\"json_block\",\"json_block\":\"{\\u0022language\\u0022: \\u0022plaintext\\u0022, \\u0022code\\u0022: \\u0022module FnMCP.Penpot.Events.Interop\\\\n\\\\nopen Fable.Core\\\\nopen Fable.Core.JsInterop\\\\nopen System\\\\n\\\\n// JavaScript Penpot API bindings\\\\n// These represent the actual JavaScript objects and functions\\\\n\\\\n[\\u003CImport(\\\\\\u0022penpot\\\\\\u0022, \\\\\\u0022penpot-plugin-api\\\\\\u0022)\\u003E]\\\\nlet penpot: obj = jsNative\\\\n\\\\n// Shape-related JavaScript types\\\\n[\\u003CAllowNullLiteral\\u003E]\\\\ntype IJSShape =\\\\n    abstract id: string\\\\n    abstract name: string\\\\n    abstract \\u0060\\u0060type\\u0060\\u0060: string\\\\n\\\\n[\\u003CAllowNullLiteral\\u003E]\\\\ntype IJSPage =\\\\n    abstract id: string\\\\n    abstract name: string\\\\n    abstract root: IJSShape option\\\\n\\\\n[\\u003CAllowNullLiteral\\u003E]\\\\ntype IJSFile =\\\\n    abstract id: string\\\\n    abstract name: string\\\\n    abstract pages: ResizeArray\\u003CIJSPage\\u003E\\\\n\\\\n// Event subscription/unsubscription\\\\ntype PenpotAPI =\\\\n    abstract on: eventType: string * callback: (obj -\\u003E unit) * ?props: obj -\\u003E obj\\\\n    abstract off: listenerId: obj -\\u003E unit\\\\n\\\\n// Convert JavaScript objects to F# types\\\\nmodule Converters =\\\\n    let toShape (jsShape: IJSShape) : Shape =\\\\n        {\\\\n            Id = ShapeId jsShape.id\\\\n            Name = jsShape.name\\\\n            Type = jsShape.\\u0060\\u0060type\\u0060\\u0060\\\\n        }\\\\n    \\\\n    let toPage (jsPage: IJSPage) : Page =\\\\n        {\\\\n            Id = PageId jsPage.id\\\\n            Name = jsPage.name\\\\n            Root = jsPage.root |\\u003E Option.map toShape\\\\n        }\\\\n    \\\\n    let toFile (jsFile: IJSFile) : File =\\\\n        {\\\\n            Id = FileId jsFile.id\\\\n            Name = jsFile.name\\\\n            Pages = jsFile.pages |\\u003E Seq.toList |\\u003E List.map toPage\\\\n        }\\\\n    \\\\n    let parseTheme (theme: string) : Theme option =\\\\n        match theme.ToLowerInvariant() with\\\\n        | \\\\\\u0022light\\\\\\u0022 -\\u003E Some Light\\\\n        | \\\\\\u0022dark\\\\\\u0022 -\\u003E Some Dark\\\\n        | _ -\\u003E None\\\\n\\\\n// Main event bridge that connects F# event model to JavaScript\\\\ntype PenpotEventBridge() =\\\\n    let mutable subscriptions: Map\\u003Cstring, obj\\u003E = Map.empty\\\\n    let penpotApi = penpot :?\\u003E PenpotAPI\\\\n    \\\\n    // Generic event subscription with automatic type conversion\\\\n    let subscribe\\u003C\\u0027JSType, \\u0027FType\\u003E \\\\n        (eventName: string) \\\\n        (converter: \\u0027JSType -\\u003E \\u0027FType) \\\\n        (handler: \\u0027FType -\\u003E unit)\\\\n        (props: obj option) =\\\\n        \\\\n        let jsCallback = fun (jsData: obj) -\\u003E\\\\n            try\\\\n                let typedData = jsData :?\\u003E \\u0027JSType\\\\n                let converted = converter typedData\\\\n                handler converted\\\\n            with\\\\n            | ex -\\u003E \\\\n                printfn \\\\\\u0022Error converting %s event: %s\\\\\\u0022 eventName ex.Message\\\\n        \\\\n        let listenerId = \\\\n            match props with\\\\n            | Some p -\\u003E penpotApi.on(eventName, jsCallback, p)\\\\n            | None -\\u003E penpotApi.on(eventName, jsCallback)\\\\n        \\\\n        subscriptions \\u003C- subscriptions.Add(eventName \\u002B \\\\\\u0022_\\\\\\u0022 \\u002B string (Guid.NewGuid()), listenerId)\\\\n        listenerId\\\\n    \\\\n    // Subscribe to page change events\\\\n    member this.OnPageChange(handler: Page -\\u003E unit) =\\\\n        subscribe\\u003CIJSPage, Page\\u003E \\\\n            \\\\\\u0022pagechange\\\\\\u0022 \\\\n            Converters.toPage \\\\n            handler \\\\n            None\\\\n    \\\\n    // Subscribe to file change events\\\\n    member this.OnFileChange(handler: File -\\u003E unit) =\\\\n        subscribe\\u003CIJSFile, File\\u003E\\\\n            \\\\\\u0022filechange\\\\\\u0022\\\\n            Converters.toFile\\\\n            handler\\\\n            None\\\\n    \\\\n    // Subscribe to selection change events\\\\n    member this.OnSelectionChange(handler: ShapeId list -\\u003E unit) =\\\\n        let converter (jsIds: obj) =\\\\n            let ids = jsIds :?\\u003E string[]\\\\n            ids |\\u003E Array.map ShapeId |\\u003E Array.toList\\\\n        \\\\n        subscribe\\u003Cobj, ShapeId list\\u003E\\\\n            \\\\\\u0022selectionchange\\\\\\u0022\\\\n            converter\\\\n            handler\\\\n            None\\\\n    \\\\n    // Subscribe to theme change events\\\\n    member this.OnThemeChange(handler: Theme -\\u003E unit) =\\\\n        let converter (jsTheme: obj) =\\\\n            let theme = jsTheme :?\\u003E string\\\\n            match Converters.parseTheme theme with\\\\n            | Some t -\\u003E t\\\\n            | None -\\u003E Light // Default to Light if unknown\\\\n        \\\\n        subscribe\\u003Cobj, Theme\\u003E\\\\n            \\\\\\u0022themechange\\\\\\u0022\\\\n            converter\\\\n            handler\\\\n            None\\\\n    \\\\n    // Subscribe to shape change events with specific shape monitoring\\\\n    member this.OnShapeChange(shapeId: ShapeId, handler: Shape -\\u003E unit) =\\\\n        let (ShapeId id) = shapeId\\\\n        let props = createObj [\\\\\\u0022shapeId\\\\\\u0022 ==\\u003E id]\\\\n        \\\\n        subscribe\\u003CIJSShape, Shape\\u003E\\\\n            \\\\\\u0022shapechange\\\\\\u0022\\\\n            Converters.toShape\\\\n            handler\\\\n            (Some props)\\\\n    \\\\n    // Subscribe to content save events\\\\n    member this.OnContentSave(handler: unit -\\u003E unit) =\\\\n        let converter (_: obj) = ()\\\\n        subscribe\\u003Cobj, unit\\u003E\\\\n            \\\\\\u0022contentsave\\\\\\u0022\\\\n            converter\\\\n            handler\\\\n            None\\\\n    \\\\n    // Subscribe to operation finished events\\\\n    member this.OnFinish(handler: string -\\u003E unit) =\\\\n        let converter (jsData: obj) = jsData :?\\u003E string\\\\n        subscribe\\u003Cobj, string\\u003E\\\\n            \\\\\\u0022finish\\\\\\u0022\\\\n            converter\\\\n            handler\\\\n            None\\\\n    \\\\n    // Subscribe to all events with unified handler\\\\n    member this.OnAnyEvent(handler: PenpotEvent -\\u003E unit) =\\\\n        // Subscribe to each event type and convert to unified event type\\\\n        this.OnPageChange(PageChanged \\u003E\\u003E handler) |\\u003E ignore\\\\n        this.OnFileChange(FileChanged \\u003E\\u003E handler) |\\u003E ignore\\\\n        this.OnSelectionChange(SelectionChanged \\u003E\\u003E handler) |\\u003E ignore\\\\n        this.OnThemeChange(ThemeChanged \\u003E\\u003E handler) |\\u003E ignore\\\\n        this.OnContentSave(fun () -\\u003E handler ContentSaved) |\\u003E ignore\\\\n        this.OnFinish(OperationFinished \\u003E\\u003E handler) |\\u003E ignore\\\\n    \\\\n    // Unsubscribe from specific event\\\\n    member this.Unsubscribe(listenerId: obj) =\\\\n        penpotApi.off(listenerId)\\\\n    \\\\n    // Unsubscribe from all events\\\\n    member this.UnsubscribeAll() =\\\\n        subscriptions\\\\n        |\\u003E Map.iter (fun _ listenerId -\\u003E penpotApi.off(listenerId))\\\\n        subscriptions \\u003C- Map.empty\\\\n\\\\n// Helper module for common event scenarios\\\\nmodule EventHelpers =\\\\n    open Browser.Dom\\\\n    \\\\n    // Debounce event handler to avoid excessive calls\\\\n    let debounce (milliseconds: int) (handler: \\u0027T -\\u003E unit) =\\\\n        let mutable timerId = None\\\\n        \\\\n        fun (arg: \\u0027T) -\\u003E\\\\n            timerId |\\u003E Option.iter window.clearTimeout\\\\n            timerId \\u003C- Some (window.setTimeout(fun () -\\u003E handler arg, milliseconds))\\\\n    \\\\n    // Throttle event handler to limit call frequency\\\\n    let throttle (milliseconds: int) (handler: \\u0027T -\\u003E unit) =\\\\n        let mutable lastCall = DateTime.MinValue\\\\n        \\\\n        fun (arg: \\u0027T) -\\u003E\\\\n            let now = DateTime.Now\\\\n            if (now - lastCall).TotalMilliseconds \\u003E= float milliseconds then\\\\n                lastCall \\u003C- now\\\\n                handler arg\\\\n    \\\\n    // Buffer events and process in batches\\\\n    let buffer (size: int) (handler: \\u0027T list -\\u003E unit) =\\\\n        let mutable buffer = []\\\\n        \\\\n        fun (item: \\u0027T) -\\u003E\\\\n            buffer \\u003C- item :: buffer\\\\n            if List.length buffer \\u003E= size then\\\\n                handler (List.rev buffer)\\\\n                buffer \\u003C- []\\\\n    \\\\n    // Create event logger for debugging\\\\n    let createEventLogger (prefix: string) =\\\\n        fun (event: PenpotEvent) -\\u003E\\\\n            let timestamp = DateTime.Now.ToString(\\\\\\u0022HH:mm:ss.fff\\\\\\u0022)\\\\n            match event with\\\\n            | PageChanged page -\\u003E\\\\n                printfn \\\\\\u0022[%s] %s: Page changed to \\u0027%s\\u0027 (ID: %A)\\\\\\u0022 timestamp prefix page.Name page.Id\\\\n            | SelectionChanged ids -\\u003E\\\\n                printfn \\\\\\u0022[%s] %s: Selection changed (%d items)\\\\\\u0022 timestamp prefix (List.length ids)\\\\n            | ShapeChanged shape -\\u003E\\\\n                printfn \\\\\\u0022[%s] %s: Shape \\u0027%s\\u0027 updated (Type: %s)\\\\\\u0022 timestamp prefix shape.Name shape.Type\\\\n            | ContentSaved -\\u003E\\\\n                printfn \\\\\\u0022[%s] %s: Content saved\\\\\\u0022 timestamp prefix\\\\n            | FileChanged file -\\u003E\\\\n                printfn \\\\\\u0022[%s] %s: File changed \\u0027%s\\u0027\\\\\\u0022 timestamp prefix file.Name\\\\n            | ThemeChanged theme -\\u003E\\\\n                printfn \\\\\\u0022[%s] %s: Theme changed to %A\\\\\\u0022 timestamp prefix theme\\\\n            | OperationFinished op -\\u003E\\\\n                printfn \\\\\\u0022[%s] %s: Operation finished: %s\\\\\\u0022 timestamp prefix op\\\\n\\\\n// Example usage showing the complete integration\\\\nmodule Example =\\\\n    // Initialize the event bridge\\\\n    let bridge = PenpotEventBridge()\\\\n    \\\\n    // Set up comprehensive event monitoring\\\\n    let setupEventMonitoring() =\\\\n        // Log all events\\\\n        let logger = EventHelpers.createEventLogger \\\\\\u0022PENPOT\\\\\\u0022\\\\n        bridge.OnAnyEvent(logger)\\\\n        \\\\n        // Handle specific events with business logic\\\\n        bridge.OnSelectionChange(fun selectedIds -\\u003E\\\\n            match selectedIds with\\\\n            | [] -\\u003E printfn \\\\\\u0022Selection cleared\\\\\\u0022\\\\n            | [single] -\\u003E \\\\n                let (ShapeId id) = single\\\\n                printfn \\\\\\u0022Single shape selected: %s\\\\\\u0022 id\\\\n            | multiple -\\u003E\\\\n                printfn \\\\\\u0022Multiple shapes selected: %d items\\\\\\u0022 (List.length multiple)\\\\n        )\\\\n        \\\\n        // Debounced shape change handler (useful for real-time updates)\\\\n        let debouncedShapeHandler = \\\\n            EventHelpers.debounce 500 (fun shape -\\u003E\\\\n                printfn \\\\\\u0022Processing shape update for: %s\\\\\\u0022 shape.Name\\\\n                // Perform expensive operations here\\\\n            )\\\\n        \\\\n        // Monitor specific shape if needed\\\\n        match bridge.OnShapeChange(ShapeId \\\\\\u0022shape-123\\\\\\u0022, debouncedShapeHandler) with\\\\n        | listenerId -\\u003E printfn \\\\\\u0022Monitoring shape with listener: %A\\\\\\u0022 listenerId\\\\n        \\\\n        // Batch selection changes\\\\n        let batchedSelectionHandler =\\\\n            EventHelpers.buffer 5 (fun selections -\\u003E\\\\n                printfn \\\\\\u0022Processing batch of %d selection changes\\\\\\u0022 (List.length selections)\\\\n            )\\\\n        \\\\n        bridge.OnSelectionChange(batchedSelectionHandler)\\\\n    \\\\n    // Clean up when done\\\\n    let cleanup() =\\\\n        bridge.UnsubscribeAll()\\\\n        printfn \\\\\\u0022All event subscriptions removed\\\\\\u0022\\\\n\\u0022, \\u0022filename\\u0022: \\u0022/home/claude/PenpotEventInterop.fs\\u0022}\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

