text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"penpot:penpot_api_info\",\"content\":[{\"type\":\"text\",\"text\":\"\\u0060\\u0060\\u0060\\noff(listenerId): void\\n\\u0060\\u0060\\u0060\\n\\n* Removes an event listener for the specified event type.\\n\\n  Parameters\\n  \\u002B listenerId: symbol\\n\\n    the id returned by the \\u0060on\\u0060 method when the callback was set\\n\\n  Returns void\\n\\n  Example\\n  \\u0060\\u0060\\u0060\\n  const listenerId = penpot.on(\\u0027contentsave\\u0027, () =\\u003E console.log(\\u0022Changed\\u0022));penpot.off(listenerId);\\n  \\u0060\\u0060\\u0060\",\"uuid\":\"c787aea9-f25c-425f-b0c0-9f3dce33b41e\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":\"penpot\",\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

