dified = Set.empty; SaveCount = 0 }\\\\n\\\\n// Event stream processing for reactive programming\\\\nmodule EventStreams =\\\\n    open System.Threading.Tasks\\\\n    open FSharp.Control\\\\n    \\\\n    // Convert events to an async sequence for processing\\\\n    let createEventStream (manager: PenpotEventManager) =\\\\n        // This would integrate with your actual Penpot connection\\\\n        // Here\\u0027s a conceptual implementation\\\\n        AsyncSeq.unfoldAsync (fun state -\\u003E async {\\\\n            // Wait for next event from Penpot\\\\n            // This is where you\\u0027d integrate with the JavaScript API\\\\n            return Some(ContentSaved, state)\\\\n        }) ()\\\\n    \\\\n    // Filter and process specific event types\\\\n    let processShapeUpdates (events: AsyncSeq\\u003CPenpotEvent\\u003E) =\\\\n        events\\\\n        |\\u003E AsyncSeq.choose (function\\\\n            | ShapeChanged shape -\\u003E Some shape\\\\n            | _ -\\u003E None)\\\\n        |\\u003E AsyncSeq.iterAsync (fun shape -\\u003E async {\\\\n            printfn \\\\\\u0022Processing shape update: %A\\\\\\u0022 shape.Name\\\\n            // Perform async operations on shape updates\\\\n        })\\\\n\\\\n// Integration helpers for MCP server\\\\nmodule MCPIntegration =\\\\n    open System.Text.Json\\\\n    \\\\n    // Serialize events for MCP communication\\\\n    let serializeEvent (event: PenpotEvent) : JsonDocument =\\\\n        let json = \\\\n            match event with\\\\n            | PageChanged page -\\u003E\\\\n                JsonSerializer.Serialize({| Type = \\\\\\u0022pagechange\\\\\\u0022; Data = page |})\\\\n            | SelectionChanged ids -\\u003E\\\\n                JsonSerializer.Serialize({| Type = \\\\\\u0022selectionchange\\\\\\u0022; Data = ids |})\\\\n            | ShapeChanged shape -\\u003E\\\\n                JsonSerializer.Serialize({| Type = \\\\\\u0022shapechange\\\\\\u0022; Data = shape |})\\\\n            | Content