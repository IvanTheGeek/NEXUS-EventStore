text = "perhaps we should make Semantic Layer as NEXUS Semantic Layer so that it is clearer that this is what is meant when saying \"In NEXUS, the graph presentation is X\", we should not be losing examples. Like in event modeling, the examples really help with clarity and also is where I find when a term is not working.  Add definitions and meanings of subgraph. again, examples help. also for Artifact. | Including if something is a node or edge is helpful. | Representation\nUI Screen (UX) is bothering me. The  EM View to me is the the data needed to send to the processor or UI module that then does the screen rendering, etc.  | Each domain will naturally rename it - yes, that is resonate with me. | Representation of accounts in accounting would be the Chart of Accounts |  this notation is also helpful for understanding \"Fact ──ProjectsTo──► Representation\" | in the tables, the columns are \"Graph Theory\tSemantic Layer\tDomain\tLens\tExample\" i am thinking we should have the term column there to |Graph Theory\tSemantic Layer\tDomain\tLens\tTerm Example| these types of hints are helpful \"Projection = process, Representation = result\" and if something is who what where how and the expanded descriptions are also helpful. | verify that Slice does in fact represent a Structured subgraph and is not really a lens/lenses for working in domain information behavior with business rules. | for EM 7, perhaps showing both would be helpful by adding \"Actor ──initiates──► Command ──ResolvesTo──► Event\" and same for read side, that solidifies the mapping. | the Dual flow model (write vs read) is an important deal and the way I want NEXUS as a whole to think and work. Aligns with CQRS, but is a fantastic way  to reason about a system. | make updates, comments, show new docs for both and lets add in how it maps to F# and TOML and start seeing where the friction and misalignments are that I see currently."

