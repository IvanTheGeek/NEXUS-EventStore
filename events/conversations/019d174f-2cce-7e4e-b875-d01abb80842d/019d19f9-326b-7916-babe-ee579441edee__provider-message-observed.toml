text = "Absolutely. Here are the cleaned-up versions with **Subject / about removed from the active core** and preserved only as a possible future refinement.\n\n---\n\n# NEXUS Cross-Domain Mapping Table (v1.3)\n\n## Structure\n\n**Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples**\n\n---\n\n## Core Principles\n\n- **Resolution = process → produces Fact**\n- **Projection = process → produces Representation**\n- **Fact = result, immutable truth**\n- **Representation = projected, consumable form of Facts**\n- **Actors can be human or processor**\n- **Slice is an Event Modeling lens construct that may be represented in NEXUS as a structured subgraph**\n- **Slice is not identical to the graph-theory term subgraph**\n- **Subject / about is deferred for now to keep the active core simpler**\n\n---\n\n## Nodes (Semantic Units)\n\n### Actor (Node)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Node (Vertex) | Actor (who triggers / decides) | Software Dev | UX / EM | User / Admin / Processor | Customer, AdminUser, ShippingProcessor |\n| Node (Vertex) | Actor | Knowledge | Learning | Learner / Teacher / Reviewer | Student, Instructor, Evaluator |\n| Node (Vertex) | Actor | Accounting | Finance | Accountant / Auditor / Processor | Bookkeeper, CPA, CloseProcessor |\n\n---\n\n### Command (Node)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Node (Vertex) | Command (imperative action unit) | Software Dev | EM | Command | SubmitOrder, RefundPayment, ShipOrder |\n| Node (Vertex) | Command | Knowledge | Learning | Activity / Command | StudyLesson, PublishLesson, GradeAssessment |\n| Node (Vertex) | Command | Accounting | Finance | Entry Command / Posting Command | RecordJournalEntry, ClosePeriod, GenerateStatements |\n\n---\n\n### Fact (Node)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Node (Vertex) | Fact (result, immutable truth) | Software Dev | EM | Event | OrderPlaced, PaymentReceived, OrderShipped |\n| Node (Vertex) | Fact | Software Dev | HCI | Interaction Event | ButtonClicked, FormSubmitted, ModalClosed |\n| Node (Vertex) | Fact | Knowledge | Knowledge | Understanding / Insight / Completion | ConceptUnderstood, LessonCompleted, MisconceptionIdentified |\n| Node (Vertex) | Fact | Accounting | Finance | Journal Entry / Posted Result | JournalEntryRecorded, ExpensePosted, RevenueRecognized |\n\n---\n\n### Representation (Node)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Node (Vertex) | Representation (how truth is exposed) | Software Dev | EM | View | OrderViewData, PaymentReviewView, ShippingQueueView |\n| Node (Vertex) | Representation | Software Dev | HCI | ViewModel / UI Data / Payload | OrderScreenData, LoginFormModel, NotificationPayload |\n| Node (Vertex) | Representation | Knowledge | Teaching | Explanation / Diagram / Lesson Output | ConvergenceExplanation, NetworkDiagram, QuizReviewSheet |\n| Node (Vertex) | Representation | Accounting | Reporting | Report / Statement / View | BalanceSheet, IncomeStatement, TrialBalance |\n\n---\n\n### Artifact (Subgraph)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Subgraph | Artifact (stored structure) | Software Dev | EM | Event Model / Model File / Diagram | Order Flow Model, Checkout Event Model, Refund Timeline |\n| Subgraph | Artifact | Knowledge | Knowledge System | Notes Graph / Course Module / Reference Pack | Networking Notes Graph, OpenWrt Course Module, Convergence Reference Pack |\n| Subgraph | Artifact | Accounting | Finance | Ledger / Workbook / Reconciliation Set | General Ledger, Monthly Close Workbook, Bank Reconciliation Set |\n\n---\n\n## Edges (Processes / Relations)\n\n### Actor-driven\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Directed Edge | triggers (Actor → Command) | Software Dev | UX / EM | user or processor causes command | Customer triggers SubmitOrder, AdminUser triggers RefundPayment, ShippingProcessor triggers ShipOrder |\n| Directed Edge | triggers | Knowledge | Learning | learner or reviewer causes activity | Student triggers StudyLesson, Instructor triggers PublishLesson, Evaluator triggers GradeAssessment |\n| Directed Edge | triggers | Accounting | Finance | user or processor causes action | Bookkeeper triggers RecordJournalEntry, CPA triggers ClosePeriod, CloseProcessor triggers GenerateStatements |\n\n---\n\n### Write Side (Truth Creation)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Directed Edge | ResolvesTo (creates truth) | Software Dev | EM | Command → Event | SubmitOrder → OrderPlaced, ReceivePayment → PaymentReceived, ShipOrder → OrderShipped |\n| Directed Edge | ResolvesTo | Knowledge | Learning | Activity → Fact | StudyLesson → ConceptUnderstood, CompleteQuiz → LessonCompleted, ReviewMistake → MisconceptionIdentified |\n| Directed Edge | ResolvesTo | Accounting | Finance | Command → journal result | RecordJournalEntry → JournalEntryRecorded, PostExpense → ExpensePosted, RecognizeRevenue → RevenueRecognized |\n\n---\n\n### Read Side (Truth Exposure)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Directed Edge | ProjectsTo (exposes truth) | Software Dev | EM | Event → View | OrderPlaced → OrderViewData, PaymentReceived → PaymentReviewView, OrderReadyToShip → ShippingQueueView |\n| Directed Edge | ProjectsTo | Knowledge | Teaching | Fact → Explanation | ConceptUnderstood → ConvergenceExplanation, LessonCompleted → QuizReviewSheet, MisconceptionIdentified → ClarificationNote |\n| Directed Edge | ProjectsTo | Accounting | Reporting | Fact → report | ExpensePosted → ExpenseReport, RevenueRecognized → IncomeStatement, JournalEntryRecorded → TrialBalanceView |\n\n---\n\n### Structural / Modeling\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Directed Edge | ConvergesTo | Knowledge | Understanding | many → fewer | RawNotes → MentalModel, ForumThreads → ClarifiedDefinition, DiscordQuestions → TeachingGuide |\n| Directed Edge | ConvergesTo | Software Dev | Modeling | alternatives → chosen form | UIOptions → CheckoutFlow, NamingIdeas → CanonicalTerms, DraftSlices → EventModel |\n| Directed Edge | DivergesTo | Knowledge | Exploration | one → many | Concept → Questions, Topic → LessonIdeas, Framework → StudyPaths |\n| Directed Edge | DivergesTo | Software Dev | Design | one → many options | Requirement → UIOptions, Command → ErrorCases, Model → PossibleViews |\n\n---\n\n## Canonical Flow\n\n### Write Side\n\n```text\nActor ──triggers──► Command ──ResolvesTo──► Fact\n```\n\n### Read Side\n\n```text\nFact ──ProjectsTo──► Representation ──► Actor\n```\n\n### Processor-driven continuation\n\n```text\nFact ──ProjectsTo──► Representation ──► Processor\nProcessor ──triggers──► Command ──ResolvesTo──► Fact\n```\n\n### EM lens mapping\n\n```text\nActor ──triggers──► Command ──ResolvesTo──► Event\nEvent ──ProjectsTo──► View ──► Actor\n```\n\n---\n\n## Definitions\n\n### Actor\nSource of triggering and decision-making. Can be human or processor.\n\n### Command\nThe discrete imperative unit of doing. In Event Modeling, this is the Command. In NEXUS, it occupies the Action slot.\n\n### Fact\nAn **immutable result**: a statement of what became true.\n\n### Representation\nA projected, consumable form of Facts. It is the result, not the process.\n\n### Artifact\nA stored, bounded structure made of related nodes and edges.\n\n### Resolution\nThe process by which a Command produces a Fact.\n\n### Projection\nThe process by which Facts produce a Representation.\n\n### Subgraph\nA bounded subset of nodes and edges treated as a unit.\n\nExamples:\n- Checkout Event Model\n- Networking Course Module\n- Monthly Close Ledger Group\n\n---\n\n## Slice Clarification\n\nA **Slice** is an Event Modeling behavioral unit.\n\nIt has two primary forms.\n\n### Command Slice\n- Actor\n- Command\n- GWT\n- Event\n\nExamples:\n- Customer / SubmitOrder / GIVEN cart has items WHEN submit THEN OrderPlaced\n- Admin / RefundPayment / GIVEN payment settled WHEN refund requested THEN PaymentRefunded\n- Clerk / RecordJournalEntry / GIVEN receipt entered WHEN post THEN JournalEntryRecorded\n\n### View Slice\n- Event\n- GWT\n- View\n- Actor\n\nExamples:\n- OrderPlaced / GIVEN order placed WHEN viewed THEN OrderView / Customer\n- LessonCompleted / GIVEN lesson completed WHEN reviewed THEN LessonSummaryView / Student\n- RevenueRecognized / GIVEN posting completed WHEN report opened THEN IncomeStatementView / Accountant\n\n### Important distinction\n\nA Slice may be represented in NEXUS as a structured subgraph.  \nA Slice is **not identical** to the graph-theory concept of subgraph.\n\n---\n\n## Notes on deferred concepts\n\nThese are intentionally **not** in the active core right now:\n\n- Subject\n- about\n- explicit correlation structure\n\nReason:\n- keep implementation simpler\n- test the smaller core in real software first\n- reintroduce only if needed\n\n---\n\n# Changes in v1.3 from v1.2\n\n- removed **Subject** from active core\n- removed **about** edge from active core\n- simplified F# / TOML direction\n- kept Subject/about as deferred concepts only\n- preserved processor-as-actor model\n- kept triggers as the Actor → Command edge\n\n---\n\n# Event Modeling Convergence Doc (v0.8)\n\n## Title\n\n**Event Modeling Lens — Converged Clarification (v0.8)**\n\n---\n\n## 1. Core Principle\n\nEvent Modeling shows observable system behavior over time using example data.\n\nIt represents the flow of business-relevant facts along a timeline that captures a specific path through the system.\n\n---\n\n## 2. Explicit Mapping to NEXUS\n\n```text\nActor ──triggers──► Command ──ResolvesTo──► Event\nEvent ──ProjectsTo──► View ──► Actor\n```\n\nProcessor-driven continuation is modeled the same way:\n\n```text\nEvent ──ProjectsTo──► View ──► Processor\nProcessor ──triggers──► Command ──ResolvesTo──► Event\n```\n\n### Mapping table\n\n| Event Modeling | NEXUS |\n|---|---|\n| Actor | Actor |\n| Command | Command |\n| Event | Fact |\n| View | Representation |\n| Slice | Event Modeling lens construct |\n| Timeline | Ordered path through behavior |\n\n---\n\n## 3. Dual Flow Model\n\n### Write Side\n- Actor triggers Command\n- Command resolves to Event\n- Event is an immutable Fact\n\n### Read Side\n- Event projects to View\n- View is delivered to an Actor\n- the Actor may be a person or a processor\n\nThis means automation can be modeled through the same read/write structure, with a processor acting as the actor.\n\n---\n\n## 4. Command and Action\n\nIn Event Modeling, **Command** is the explicit term.\n\nIn NEXUS, this occupies the **Action slot**, but using **Command** as the active term keeps the model clearer right now.\n\nUseful nuance:\n\n> In Event Modeling, a Command often carries intent implicitly.  \n> In a more explicit NEXUS decomposition, Intent and Action may be separated later if needed.\n\nFor now:\n\n- EM term: **Command**\n- Active NEXUS term in the core model: **Command**\n- Broader abstraction behind that slot: **Action**\n\n---\n\n## 5. View Clarification\n\nIn Event Modeling, **View** is the correct lens term.\n\nIn NEXUS, the base abstraction is **Representation**.\n\nSo:\n\n- **Projection = process**\n- **View / Representation = result**\n\nView is:\n- data for rendering\n- data for processor consumption\n- data for API output\n\nView is **not** the rendering itself.\n\nExamples:\n- OrderPlaced → OrderViewData\n- PaymentReceived → ShippingQueueView\n- RevenueRecognized → IncomeStatementView\n\n---\n\n## 6. What Event Modeling Shows\n\n- Actors\n- Commands\n- Events\n- Views\n- Timeline\n- GWT\n- External systems\n- Screenshots / UI states\n- Processors / service roles\n\nExamples:\n- Customer submits order and sees order view\n- Shipping processor sees shipping queue view and triggers shipping command\n- Accountant posts revenue and sees income statement view\n\n---\n\n## 7. What Event Modeling Hides\n\n- Resolution logic\n- Projection logic\n- internal algorithms\n- implementation detail\n- code structure\n\nThis is why “Command → Event” is easy to misread if the lens is not explicit.\n\n---\n\n## 8. Event = Fact\n\nAn Event in EM maps to a Fact in NEXUS.\n\nA Fact is:\n- a result\n- immutable\n- a statement of what became true\n\nExamples:\n- OrderPlaced\n- PaymentReceived\n- JournalEntryRecorded\n\n---\n\n## 9. Slice Definition\n\nA Slice is an Event Modeling behavioral unit.\n\nIt has two primary forms.\n\n### Command Slice\n- Actor\n- Command\n- GWT\n- Event\n\n### View Slice\n- Event\n- GWT\n- View\n- Actor\n\nExamples:\n- Customer / SubmitOrder / GWT / OrderPlaced\n- OrderPlaced / GWT / OrderView / Customer\n- ShippingReady / GWT / ShippingQueueView / ShippingProcessor\n\n---\n\n## 10. Slice vs Subgraph\n\nA Slice may be represented in NEXUS as a structured subgraph.\n\nA Slice is **not identical** to a graph-theory subgraph.\n\nWhy this matters:\n- graph-aware developers hear “subgraph” structurally\n- EM practitioners hear “Slice” behaviorally and narratively\n- NEXUS needs room for both\n\n---\n\n## 11. Timeline Meaning\n\nThe timeline shows **a path** through the system.\n\nNot all paths.  \nNot all branches.  \nA chosen narrative using example data.\n\nExamples:\n- successful checkout\n- shipping handoff flow\n- monthly close posting flow\n\n---\n\n## 12. Example Data Matters\n\nExample data is part of the method.\n\nExamples:\n- Order-1024\n- Invoice-7001\n- Cash account\n\nIt helps reveal:\n- missing steps\n- weak terminology\n- hidden ambiguity\n- where the model does not fit real behavior\n\n---\n\n## 13. NEXUS Context\n\n- **NEXUS** = overall paradigm / ecosystem / container\n- **LOGOS** = raw input, confusion, discussion, captured material\n- **CORTEX** = reasoning, convergence, AI assistance\n- **ATLAS** = modeling studio / graph manipulation tools\n\n---\n\n## 14. Why This Matters Beyond EM\n\nThe dual-flow model is a general reasoning pattern:\n\n- write side creates truth\n- read side exposes truth\n\nThat aligns with CQRS, but is broader than CQRS.\n\nIt can be applied to:\n- software systems\n- learning systems\n- accounting systems\n- content systems\n\n---\n\n## 15. Deferred semantic refinement\n\nThe current active core intentionally does **not** include:\n\n- Subject\n- about\n- explicit correlation structure\n\nThose may be added later if real implementations show they are needed.\n\n---\n\n# Changes in v0.8 from v0.7\n\n- removed Subject/about from the active EM-aligned core\n- simplified the model to the smaller working set\n- kept processor-as-actor explicit\n- clarified Command as the active term while preserving the Action-slot idea\n\n---\n\n# F# Mapping (cleaned-up)\n\n```fsharp\nmodule NexusGraph\n\ntype NodeId = string\ntype EdgeId = string\n\ntype ActorKind =\n    | Human\n    | Processor\n    | ExternalSystem\n\ntype Actor =\n    { Id: NodeId\n      Term: string\n      Name: string\n      Kind: ActorKind }\n\ntype Command =\n    { Id: NodeId\n      Term: string\n      Name: string }\n\ntype Fact =\n    { Id: NodeId\n      Term: string\n      Name: string\n      IsImmutable: bool }\n\ntype Representation =\n    { Id: NodeId\n      Term: string\n      Name: string }\n\ntype Artifact =\n    { Id: NodeId\n      Term: string\n      Name: string }\n\ntype Node =\n    | ActorNode of Actor\n    | CommandNode of Command\n    | FactNode of Fact\n    | RepresentationNode of Representation\n    | ArtifactNode of Artifact\n\ntype Edge =\n    | Triggers of EdgeId * actorId: NodeId * commandId: NodeId\n    | ResolvesTo of EdgeId * commandId: NodeId * factId: NodeId\n    | ProjectsTo of EdgeId * factId: NodeId * representationId: NodeId\n    | ContainsNode of EdgeId * artifactId: NodeId * nodeId: NodeId\n    | ContainsEdge of EdgeId * artifactId: NodeId * containedEdgeId: EdgeId\n\ntype Graph =\n    { Nodes: Map<NodeId, Node>\n      Edges: Edge list }\n```\n\n---\n\n# TOML Mapping (cleaned-up)\n\n```toml\n[meta]\nid = \"example.order_flow\"\nname = \"Order Flow Example\"\n\n[[actors]]\nid = \"actor.customer_1\"\nterm = \"User\"\nname = \"Customer\"\nkind = \"Human\"\n\n[[commands]]\nid = \"command.submit_order\"\nterm = \"Command\"\nname = \"SubmitOrder\"\n\n[[facts]]\nid = \"fact.order_placed\"\nterm = \"Event\"\nname = \"OrderPlaced\"\nis_immutable = true\n\n[[representations]]\nid = \"repr.order_view\"\nterm = \"View\"\nname = \"OrderViewData\"\n\n[[edges]]\nid = \"edge.1\"\ntype = \"triggers\"\nfrom = \"actor.customer_1\"\nto = \"command.submit_order\"\n\n[[edges]]\nid = \"edge.2\"\ntype = \"resolves_to\"\nfrom = \"command.submit_order\"\nto = \"fact.order_placed\"\n\n[[edges]]\nid = \"edge.3\"\ntype = \"projects_to\"\nfrom = \"fact.order_placed\"\nto = \"repr.order_view\"\n```\n\n---\n\n# Current friction points still worth testing\n\n- whether **Command** should remain the active term in the core, or whether NEXUS should later return to **Action**\n- whether you eventually want an explicit **Representation → Actor** edge\n- how **Artifact** should be grouped and referenced in TOML\n- whether **Subject/about** becomes necessary once real software is built\n\nThe next strongest move is to refine the **F# and TOML with slice structures fully included**, so you can see how authoring and storage feel end-to-end."

