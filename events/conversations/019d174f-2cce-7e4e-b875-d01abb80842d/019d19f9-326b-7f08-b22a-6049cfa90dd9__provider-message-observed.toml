text = "Absolutely. Below are the updated inline docs with:\n\n- **Entity в†’ Subject**\n- added **about** edge\n- **at least 3 examples per line**\n- updated terminology carried through both artifacts\n\n---\n\n# NEXUS Cross-Domain Mapping Table (v1.1)\n\n## Structure\n\n**Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples**\n\n---\n\n## Core Principles\n\n- **Resolution = process в†’ produces Fact**\n- **Projection = process в†’ produces Representation**\n- **Fact = result, immutable truth**\n- **Representation = projected, consumable form of Facts**\n- **Subject = what Facts are about**\n- **Slice is an Event Modeling lens construct that may be represented in NEXUS as a structured subgraph**\n- **Slice is not identical to the graph-theory term subgraph**\n\n---\n\n## Nodes (Semantic Units)\n\n### Actor (Node)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Node (Vertex) | Actor (who initiates / decides) | Software Dev | UX / EM | User / Admin / Processor | Customer, AdminUser, PaymentService |\n| Node (Vertex) | Actor | Knowledge | Learning | Learner / Teacher / Reviewer | Student, Instructor, Evaluator |\n| Node (Vertex) | Actor | Accounting | Finance | Accountant / Auditor / Clerk | Bookkeeper, CPA, AP Clerk |\n\n---\n\n### Subject (Node)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Node (Vertex) | Subject (what Facts are about) | Software Dev | EM | Order / Customer / Invoice | Order-1024, Customer-88, Invoice-7001 |\n| Node (Vertex) | Subject | Software Dev | HCI | Form / Button / Screen | LoginForm, SubmitButton, OrderScreen |\n| Node (Vertex) | Subject | Knowledge | Knowledge | Concept / Topic / Skill | Convergence, Networking, OpenWrt Setup |\n| Node (Vertex) | Subject | Accounting | Finance | Account / Vendor / Ledger | Cash, Vendor-ACME, GeneralLedger |\n\n---\n\n### Fact (Node)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Node (Vertex) | Fact (result, immutable truth) | Software Dev | EM | Event | OrderPlaced, PaymentReceived, InvoiceGenerated |\n| Node (Vertex) | Fact | Software Dev | HCI | Interaction Event | ButtonClicked, FormSubmitted, ModalClosed |\n| Node (Vertex) | Fact | Knowledge | Knowledge | Understanding / Insight / Completion | ConceptUnderstood, LessonCompleted, MisconceptionIdentified |\n| Node (Vertex) | Fact | Accounting | Finance | Journal Entry / Recorded Fact | JournalEntryRecorded, BalanceAdjusted, ExpenseCaptured |\n\n---\n\n### Representation (Node)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Node (Vertex) | Representation (how truth is exposed) | Software Dev | EM | View | OrderViewData, InvoiceSummaryView, PaymentStatusView |\n| Node (Vertex) | Representation | Software Dev | HCI | ViewModel / UI Data / Payload | OrderScreenData, LoginFormModel, NotificationPayload |\n| Node (Vertex) | Representation | Knowledge | Teaching | Explanation / Diagram / Lesson Output | ConvergenceExplanation, NetworkDiagram, QuizReviewSheet |\n| Node (Vertex) | Representation | Accounting | Reporting / Structure | Report / Statement / Structure | BalanceSheet, IncomeStatement, ChartOfAccounts |\n\n---\n\n### Artifact (Subgraph)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Subgraph | Artifact (stored structure) | Software Dev | EM | Event Model / Model File / Diagram | Order Flow Model, Checkout Event Model, Refund Timeline |\n| Subgraph | Artifact | Knowledge | Knowledge System | Notes Graph / Course Module / Reference Pack | Networking Notes Graph, OpenWrt Course Module, Convergence Reference Pack |\n| Subgraph | Artifact | Accounting | Finance | Ledger / Workbook / Reconciliation Set | General Ledger, Monthly Close Workbook, Bank Reconciliation Set |\n\n---\n\n## Edges (Processes / Relations)\n\n### Actor-driven\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Directed Edge | initiates (Actor в†’ Action) | Software Dev | UX / EM | User starts command | Customer initiates SubmitOrder, AdminUser initiates RefundPayment, PaymentService initiates RetrySettlement |\n| Directed Edge | initiates | Knowledge | Learning | Learner starts activity | Student initiates StudyLesson, Instructor initiates PublishLesson, Evaluator initiates GradeAssessment |\n| Directed Edge | initiates | Accounting | Finance | User starts accounting action | Bookkeeper initiates RecordJournalEntry, CPA initiates ClosePeriod, AP Clerk initiates CaptureReceipt |\n\n---\n\n### Write Side (Truth Creation)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Directed Edge | ResolvesTo (creates truth) | Software Dev | EM | Command в†’ Event | SubmitOrder в†’ OrderPlaced, ReceivePayment в†’ PaymentReceived, GenerateInvoice в†’ InvoiceGenerated |\n| Directed Edge | ResolvesTo | Knowledge | Learning | Activity в†’ Fact | StudyLesson в†’ ConceptUnderstood, CompleteQuiz в†’ LessonCompleted, ReviewMistake в†’ MisconceptionIdentified |\n| Directed Edge | ResolvesTo | Accounting | Finance | Entry в†’ Recorded Fact | RecordJournalEntry в†’ JournalEntryRecorded, ApplyAdjustment в†’ BalanceAdjusted, CaptureExpense в†’ ExpenseCaptured |\n\n---\n\n### Subject Relation\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Directed Edge | about (Fact в†’ Subject) | Software Dev | EM | Event about aggregate / object | OrderPlaced в†’ Order-1024, PaymentReceived в†’ Invoice-7001, ButtonClicked в†’ SubmitButton |\n| Directed Edge | about | Knowledge | Knowledge | Fact about concept / topic / skill | ConceptUnderstood в†’ Convergence, LessonCompleted в†’ Networking, MisconceptionIdentified в†’ OpenWrt Setup |\n| Directed Edge | about | Accounting | Finance | Fact about account / vendor / ledger | JournalEntryRecorded в†’ Cash, ExpenseCaptured в†’ Vendor-ACME, BalanceAdjusted в†’ GeneralLedger |\n\n---\n\n### Read Side (Truth Exposure)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Directed Edge | ProjectsTo (exposes truth) | Software Dev | EM | Event в†’ View | OrderPlaced в†’ OrderViewData, InvoiceGenerated в†’ InvoiceSummaryView, PaymentReceived в†’ PaymentStatusView |\n| Directed Edge | ProjectsTo | Knowledge | Teaching | Fact в†’ Explanation | ConceptUnderstood в†’ ConvergenceExplanation, LessonCompleted в†’ QuizReviewSheet, MisconceptionIdentified в†’ ClarificationNote |\n| Directed Edge | ProjectsTo | Accounting | Reporting | Fact / structure в†’ report | BalanceAdjusted в†’ BalanceSheet, ExpenseCaptured в†’ ExpenseReport, GeneralLedger в†’ TrialBalance |\n\n---\n\n### Reactive (System-driven)\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Directed Edge | triggers (Fact в†’ Action) | Software Dev | Automation | Event reaction | PaymentReceived в†’ ShipOrder, InventoryDepleted в†’ ReorderStock, LoginFailedTooOften в†’ LockAccount |\n| Directed Edge | triggers | Knowledge | Learning Automation | Fact-driven next step | LessonCompleted в†’ UnlockNextLesson, QuizFailed в†’ AssignReview, MisconceptionIdentified в†’ RecommendExample |\n| Directed Edge | triggers | Accounting | Finance Automation | Threshold / event reaction | PeriodClosed в†’ GenerateStatements, ThresholdReached в†’ AlertController, InvoiceOverdue в†’ SendReminder |\n\n---\n\n### Structural / Modeling\n\n| Graph Theory | NEXUS Semantic Layer | Domain | Lens | Term | Examples |\n|---|---|---|---|---|---|\n| Directed Edge | ConvergesTo | Knowledge | Understanding | many в†’ fewer | RawNotes в†’ MentalModel, ForumThreads в†’ ClarifiedDefinition, DiscordQuestions в†’ TeachingGuide |\n| Directed Edge | ConvergesTo | Software Dev | Modeling | alternatives в†’ chosen form | UIOptions в†’ CheckoutFlow, NamingIdeas в†’ CanonicalTerms, DraftSlices в†’ EventModel |\n| Directed Edge | DivergesTo | Knowledge | Exploration | one в†’ many | Concept в†’ Questions, Topic в†’ LessonIdeas, Framework в†’ StudyPaths |\n| Directed Edge | DivergesTo | Software Dev | Design | one в†’ many options | Requirement в†’ UIOptions, Command в†’ ErrorCases, Model в†’ PossibleViews |\n\n---\n\n## Canonical Flow\n\n### Write Side\n\n```text\nActor в”Ђв”Ђinitiatesв”Ђв”Ђв–є Command (Action) в”Ђв”ЂResolvesToв”Ђв”Ђв–є Event (Fact)\nEvent (Fact) в”Ђв”Ђaboutв”Ђв”Ђв–є Subject\n```\n\n### Read Side\n\n```text\nEvent (Fact) в”Ђв”ЂProjectsToв”Ђв”Ђв–є View (Representation) в”Ђв”Ђв–є Actor\n```\n\n### Combined View\n\n```text\nActor в”Ђв”Ђinitiatesв”Ђв”Ђв–є Command в”Ђв”ЂResolvesToв”Ђв”Ђв–є Event в”Ђв”Ђaboutв”Ђв”Ђв–є Subject\nEvent в”Ђв”ЂProjectsToв”Ђв”Ђв–є View в”Ђв”Ђв–є Actor\n```\n\n---\n\n## Definitions\n\n### Actor\nSource of initiation and decision-making.  \nUsually outside the deterministic part of the system.\n\n### Subject\nWhat a Fact is about.\n\n### Fact\nAn **immutable result**: a statement of what became true.\n\n### Representation\nA projected, consumable form of Facts.  \nIt is the **result**, not the process.\n\n### Artifact\nA stored, bounded structure made of related nodes and edges.\n\n### Resolution\nThe process by which a Command/Action produces a Fact.\n\n### Projection\nThe process by which Facts produce a Representation.\n\n### Subgraph\nA bounded subset of nodes and edges treated as a unit.\n\nExamples:\n- Checkout Event Model\n- Networking Course Module\n- Monthly Close Ledger Group\n\n---\n\n## Slice Clarification\n\n### Recommended wording\n\nA **Slice** is an Event Modeling behavioral unit.\n\nIt has two primary forms:\n\n### Command Slice\n- Actor\n- Command\n- GWT\n- Event\n\nExamples:\n- Customer / SubmitOrder / GIVEN cart has items WHEN submit THEN OrderPlaced\n- Admin / RefundPayment / GIVEN payment settled WHEN refund requested THEN PaymentRefunded\n- Clerk / CaptureExpense / GIVEN receipt present WHEN save THEN ExpenseCaptured\n\n### View Slice\n- Event\n- GWT\n- View\n- Actor\n\nExamples:\n- OrderPlaced / GIVEN order placed WHEN viewed THEN OrderView / Customer\n- LessonCompleted / GIVEN lesson completed WHEN reviewed THEN LessonSummaryView / Student\n- BalanceAdjusted / GIVEN adjustment posted WHEN report opened THEN BalanceSheetView / Accountant\n\n### Important distinction\n\nA Slice may be represented in NEXUS as a structured subgraph.  \nA Slice is **not identical** to the graph-theory concept of subgraph.\n\nThat distinction matters because:\n\n- **subgraph** is a graph theory structure term\n- **Slice** is an Event Modeling lens term with narrative and behavioral meaning\n\n---\n\n# Changes in v1.1 from v1.0\n\n- **Entity** replaced with **Subject**\n- added **about** edge\n- increased examples to **at least 3 per row**\n- tightened Subject definition to вЂњwhat Facts are aboutвЂќ\n- kept Slice wording as вЂњmay be represented as a structured subgraphвЂќ\n- preserved Representation as NEXUS term, with View as EM lens term\n\n---\n\n# Event Modeling Convergence Doc (v0.6)\n\n## Title\n\n**Event Modeling Lens вЂ” Converged Clarification (v0.6)**\n\n---\n\n## 1. Core Principle\n\nEvent Modeling shows observable system behavior over time using example data.\n\nIt represents the flow of business-relevant facts along a timeline that captures a specific path through the system.\n\n---\n\n## 2. Explicit Mapping to NEXUS\n\n```text\nActor в”Ђв”Ђinitiatesв”Ђв”Ђв–є Command в”Ђв”ЂResolvesToв”Ђв”Ђв–є Event\nEvent в”Ђв”Ђaboutв”Ђв”Ђв–є Subject\nEvent в”Ђв”ЂProjectsToв”Ђв”Ђв–є View в”Ђв”Ђв–є Actor\n```\n\n### Mapping table\n\n| Event Modeling | NEXUS |\n|---|---|\n| Actor | Actor |\n| Command | Action |\n| Event | Fact |\n| View | Representation |\n| Slice | Event Modeling lens construct |\n| Timeline | Ordered path through behavior |\n\n---\n\n## 3. Dual Flow Model\n\n### Write Side (truth creation)\n\n- Actor initiates Command\n- Command resolves to Event\n- Event is an immutable Fact\n- Event is about a Subject\n\n### Read Side (truth exposure)\n\n- Event projects to View\n- View is delivered to an Actor\n- View is data for rendering/processing, not the UI rendering itself\n\n---\n\n## 4. View Clarification\n\nIn Event Modeling, **View** is the right lens term.\n\nIn NEXUS, the base abstraction is **Representation**.\n\nSo:\n\n- **Projection = process**\n- **View/Representation = result**\n\nExamples:\n- OrderPlaced в†’ OrderViewData\n- LessonCompleted в†’ LessonSummaryView\n- BalanceAdjusted в†’ BalanceSheetView\n\n---\n\n## 5. What Event Modeling Shows\n\n- Actors\n- Commands\n- Events\n- Views\n- Timeline\n- GWT\n- External systems\n- Screenshots / UI states\n- Processors / service roles\n\nExamples:\n- Customer submits order and sees order view\n- Student completes lesson and sees lesson summary\n- Accountant posts adjustment and sees balance sheet\n\n---\n\n## 6. What Event Modeling Hides\n\n- Resolution logic\n- Projection logic\n- internal algorithms\n- implementation detail\n- code structure\n\nThis is why вЂњCommand в†’ EventвЂќ is easy to misread if the lens is not explicit.\n\n---\n\n## 7. Event = Fact\n\nAn Event in EM maps to a Fact in NEXUS.\n\nA Fact is:\n\n- a result\n- immutable\n- a statement of what became true\n\nExamples:\n- OrderPlaced\n- PaymentReceived\n- JournalEntryRecorded\n\n---\n\n## 8. Subject\n\nA Fact is about a Subject.\n\nExamples:\n- OrderPlaced is about Order-1024\n- LessonCompleted is about Networking Basics\n- ExpenseCaptured is about Vendor-ACME\n\nThis gives a very useful semantic relation:\n\n```text\nFact в”Ђв”Ђaboutв”Ђв”Ђв–є Subject\n```\n\n---\n\n## 9. Slice Definition\n\nA Slice is an Event Modeling behavioral unit.\n\nIt has two primary forms.\n\n### Command Slice\n- Actor\n- Command\n- GWT\n- Event\n\n### View Slice\n- Event\n- GWT\n- View\n- Actor\n\nExamples:\n- Customer / SubmitOrder / GWT / OrderPlaced\n- OrderPlaced / GWT / OrderView / Customer\n- Accountant / RecordJournalEntry / GWT / JournalEntryRecorded\n\n---\n\n## 10. Slice vs Subgraph\n\nA Slice may be represented in NEXUS as a structured subgraph.\n\nA Slice is **not identical** to a graph-theory subgraph.\n\nWhy this matters:\n\n- graph-aware developers will naturally hear вЂњsubgraphвЂќ structurally\n- EM practitioners hear вЂњSliceвЂќ behaviorally and narratively\n- NEXUS needs room for both\n\n---\n\n## 11. Timeline Meaning\n\nThe timeline shows **a path** through the system.\n\nNot all paths.  \nNot all branches.  \nA chosen narrative using example data.\n\nExamples:\n- successful checkout\n- failed payment retry\n- monthly close posting flow\n\n---\n\n## 12. Example Data Matters\n\nExample data is not decoration. It is core to understanding.\n\nExamples:\n- Order-1024\n- Invoice-7001\n- Cash account\n\nIt helps reveal:\n- missing steps\n- bad terms\n- confusion in behavior\n- where the model does not yet fit reality\n\n---\n\n## 13. NEXUS Context\n\n- **NEXUS** = overall paradigm / ecosystem / container\n- **LOGOS** = raw input, confusion, discussion, captured material\n- **CORTEX** = reasoning, convergence, AI assistance\n- **ATLAS** = modeling studio / graph manipulation tools\n\n---\n\n## 14. Why This Matters Beyond EM\n\nThe dual-flow model is not only useful for Event Modeling.\n\nIt is a strong general reasoning pattern for NEXUS:\n\n- write side creates truth\n- read side exposes truth\n\nThat aligns with CQRS, but is broader than CQRS.\n\nIt is a useful way to reason about:\n- software systems\n- learning systems\n- accounting systems\n- content systems\n\n---\n\n# Changes in v0.6 from v0.5\n\n- added **Subject** terminology\n- added **about** relation\n- made **Fact immutable** explicit\n- strengthened examples throughout\n- aligned EM doc with updated NEXUS table\n- kept Slice distinction from subgraph explicit\n\n---\n\nThe next strongest move is adding the **F# and TOML mapping** updated to Subject/about so you can see where the next friction appears."

