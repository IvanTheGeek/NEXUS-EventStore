imitive**\n\n### ❌ Removed\n- State (from core table)\n\n### 🔄 Refined\n- Node = “Semantic Unit” (not just Entity)\n- Entity clarified as “what exists”\n- Event Modeling alignment:\n  - Event → Fact\n\n---\n\n# 🧩 Updated Mapping Table (v0.1)\n\nHere is your **updated artifact** (Markdown-ready for RAG / forum use):\n\n---\n\n## 🧩 NEXUS Cross-Domain Mapping Table (v0.1)\n\n```markdown\n# NEXUS Cross-Domain Mapping Table (v0.1)\n\n## Structure\n\nGraph Theory → Semantic Layer → Domain → Lens → Example\n\n---\n\n## Nodes (Semantic Units)\n\n| Graph Theory | Semantic Layer | Domain | Lens | Example |\n|--------------|----------------|--------|------|--------|\n| Node (Vertex) | Entity | Software Dev | Event Modeling | User, Order |\n| Node | Entity | Media Content | Content Lens | Article, Video |\n| Node | Entity | Learning | Knowledge Lens | Concept: \"Convergence\" |\n| Node | Entity | Accounting | Finance Lens | Account, Ledger |\n\n---\n\n| Graph Theory | Semantic Layer | Domain | Lens | Example |\n|--------------|----------------|--------|------|--------|\n| Node (Vertex) | Fact | Software Dev | Event Modeling | OrderPlaced |\n| Node | Fact | Media Content | Content Lifecycle | ArticlePublished |\n| Node | Fact | Learning | Knowledge | ConceptUnderstood |\n| Node | Fact | Accounting | Finance | BalanceRecorded |\n\n---\n\n| Graph Theory | Semantic Layer | Domain | Lens | Example |\n|--------------|----------------|--------|------|--------|\n| Node | Representation | Software Dev | Event Modeling | OrderView |\n| Node | Representation | Media Content | Delivery | Rendered Page |\n| Node | Representation | Learning | Teaching | Diagram |\n| Node | Representation | Accounting | Reporting | Balance Sheet |\n\n---\n\n| Graph Theory | Semantic Layer | Domain | Lens | Example |\n|--------------|----------------|--------|------|--------|\n| Subgraph | Artifact | Software Dev | Event Modeling | Event Model Diagram |\n| Subgraph | Artifact | Media Content | Content System |