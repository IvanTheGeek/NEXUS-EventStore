text = "`about` is most likely to show up in a **structural / semantic / graph lens**, not in Adam’s Event Modeling lens.\n\nThat is the cleanest way to think about it.\n\n# Where `about` shows up\n\n## 1. Event Modeling lens\nUsually **hidden**.\n\nEM already gets clarity from:\n\n- command names\n- event names\n- example data\n- timeline\n\nSo in EM you usually do **not** draw:\n\n`OrderPlaced ──about──► Order-1024`\n\nIt is implied.\n\n---\n\n## 2. NEXUS semantic / graph lens\nThis is where `about` becomes useful and explicit.\n\nThis lens is asking:\n\n- what does this Fact refer to?\n- what subject is this Representation built around?\n- how are facts grouped around a thing?\n\nHere `about` is strong.\n\nExamples:\n\n- `OrderPlaced ──about──► Order-1024`\n- `JournalEntryRecorded ──about──► Cash`\n- `ConceptUnderstood ──about──► Convergence`\n\n---\n\n## 3. Query / navigation lens\nAlso very useful here.\n\nIf ATLAS later lets you click a Subject and ask:\n\n- show all Facts about this Subject\n- show all Views about this Subject\n- show all slices touching this Subject\n\nthen `about` helps a lot.\n\nThis is probably one of the strongest reasons to keep it.\n\n---\n\n## 4. Knowledge / LOGOS analysis lens\nIt can help there too.\n\nExamples:\n\n- `MisconceptionIdentified ──about──► OpenWrt Setup`\n- `QuestionAsked ──about──► Event Modeling Slice`\n- `ClarificationWritten ──about──► Convergence`\n\nThat gives clustering power.\n\n---\n\n## 5. Accounting lens\nPotentially very useful.\n\nExamples:\n\n- `JournalEntryRecorded ──about──► Cash`\n- `ExpenseCaptured ──about──► Vendor-ACME`\n- `BalanceAdjusted ──about──► GeneralLedger`\n\nThough in accounting, one fact may be about multiple subjects, which actually argues in favor of keeping `about`.\n\n# Practical rule\n\nA good rule is:\n\n- **EM lens**: hide `about`\n- **NEXUS graph / semantic lens**: show `about`\n- **query / analysis lens**: use `about`\n\nSo `about` is not primarily a storytelling edge. It is a **semantic relation edge**.\n\n# How it affects TOML\n\nIt makes TOML more explicit.\n\nWithout `about`, your fact data has to carry subject references inside payload fields, and every consumer has to know how to interpret them.\n\nWith `about`, the relation is explicit as graph data.\n\n## Without `about`\n\n```toml\n[[fact]]\nid = \"order_placed\"\nterm = \"Event\"\nname = \"OrderPlaced\"\nsubject_id = \"order_1024\"\n```\n\nThis works, but the relationship is buried in the fact record.\n\n---\n\n## With `about` as an edge\n\n```toml\n[[subject]]\nid = \"order_1024\"\nterm = \"Order\"\nname = \"Order-1024\"\n\n[[fact]]\nid = \"order_placed\"\nterm = \"Event\"\nname = \"OrderPlaced\"\n\n[[edge]]\ntype = \"about\"\nfrom = \"order_placed\"\nto = \"order_1024\"\n```\n\nThis is more graph-native.\n\n## Why that is better\n\nBecause then all relations are expressed the same way:\n\n- `triggers`\n- `resolves_to`\n- `projects_to`\n- `about`\n\nThat makes traversal and tooling cleaner.\n\n## Multi-subject example\n\n```toml\n[[subject]]\nid = \"invoice_7001\"\nterm = \"Invoice\"\nname = \"Invoice-7001\"\n\n[[subject]]\nid = \"payment_455\"\nterm = \"Payment\"\nname = \"Payment-455\"\n\n[[fact]]\nid = \"payment_applied\"\nterm = \"Event\"\nname = \"PaymentApplied\"\n\n[[edge]]\ntype = \"about\"\nfrom = \"payment_applied\"\nto = \"invoice_7001\"\n\n[[edge]]\ntype = \"about\"\nfrom = \"payment_applied\"\nto = \"payment_455\"\n```\n\nThat is much cleaner than stuffing arrays into the Fact and hoping every tool interprets them the same way.\n\n# How it affects F\\#\n\nIt pushes you toward a more explicit graph model.\n\n## Option A: relation buried in Fact\nSimpler, less graph-native.\n\n```fsharp\ntype Subject =\n    { Id: string\n      Term: string\n      Name: string }\n\ntype Fact =\n    { Id: string\n      Term: string\n      Name: string\n      SubjectIds: string list }\n```\n\nThis is easy, but it mixes node content with graph relations.\n\n---\n\n## Option B: `about` as an Edge\nMore graph-native, and I think more aligned with your direction.\n\n```fsharp\ntype Actor =\n    { Id: string\n      Term: string\n      Name: string }\n\ntype Subject =\n    { Id: string\n      Term: string\n      Name: string }\n\ntype Command =\n    { Id: string\n      Term: string\n      Name: string }\n\ntype Fact =\n    { Id: string\n      Term: string\n      Name: string }\n\ntype Representation =\n    { Id: string\n      Term: string\n      Name: string }\n\ntype Node =\n    | ActorNode of Actor\n    | SubjectNode of Subject\n    | CommandNode of Command\n    | FactNode of Fact\n    | RepresentationNode of Representation\n\ntype Edge =\n    | Triggers of actorId:string * commandId:string\n    | ResolvesTo of commandId:string * factId:string\n    | About of factId:string * subjectId:string\n    | ProjectsTo of factId:string * representationId:string\n```\n\n## Why this is stronger\n\nIt means you can write generic graph functions:\n\n- get all outgoing edges from a node\n- get all subjects for a fact\n- get all facts about a subject\n- get all representations produced from facts about a subject\n\nThat is hard to do cleanly if `about` is buried inside the Fact record.\n\n# Tradeoff\n\n`about` adds complexity.\n\nYou now need:\n\n- a Subject node type\n- an About edge type\n- TOML entries for subjects and edges\n- more graph traversal logic\n\nSo the real question is not “is `about` correct?”\n\nIt is:\n\n> Is the extra semantic power worth the extra structural complexity right now?\n\n# My recommendation\n\nYes, but with this constraint:\n\n- keep `about` in **NEXUS core / graph form**\n- hide it in **EM lens**\n- make it optional in authoring when the subject is obvious, but normalize it into the graph when stored\n\nThat gives you the best of both:\n\n- simpler authoring\n- stronger stored graph\n\n# Strong practical pattern\n\n## Authoring form\nPeople might write:\n\n- `OrderPlaced`\n- example data: `Order-1024`\n\n## Normalized graph form\nCORTEX or ATLAS converts that to:\n\n- Fact: `OrderPlaced`\n- Subject: `Order-1024`\n- Edge: `about`\n\nThat feels very NEXUS-compatible.\n\n# Friction it introduces\n\nThis is where you may feel resistance in F# and TOML:\n\n## 1. Subject identity\nYou need to decide whether Subjects are:\n\n- instances like `Order-1024`\n- types like `Order`\n- both\n\nThat is a real design choice.\n\n## 2. Multi-subject facts\nSome facts naturally relate to more than one subject.\n\nThat is actually a reason to keep `about`, but it complicates authoring.\n\n## 3. EM import/export\nIf importing from EM-style artifacts, `about` often has to be inferred.\n\nSo `about` may be explicit in NEXUS storage but implicit in EM-facing docs.\n\n# Best concise answer\n\n- `about` shows up best in a **semantic graph lens**, **query lens**, or **analysis lens**\n- it usually stays **hidden in Event Modeling**\n- in TOML, it becomes an explicit `edge`\n- in F#, it becomes an explicit `About` union case or relation type\n- this makes querying, normalization, and multi-subject modeling much stronger\n\nThe next useful move is to show the same tiny example three ways: EM view, NEXUS graph, and F#/TOML, so you can feel exactly where `about` helps or feels heavy."

