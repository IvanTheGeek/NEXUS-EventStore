text = "That makes sense.\n\nI think that is a good decision **for now**.\n\n> Remove `about` from the current core model to keep the system simpler, and treat it as a possible later refinement if real software shows the need.\n\nThat is a strong convergence move because you are choosing:\n\n- lower complexity\n- faster implementation\n- evidence-driven refinement later\n\ninstead of over-committing too early.\n\n# My analysis\n\n`about` is valuable, but it adds cost in several places:\n\n- extra edge type\n- extra authoring burden\n- extra TOML rows\n- extra F# cases\n- extra decisions about Subject identity\n- more inference when importing EM-style artifacts\n\nRight now, your current core already has a lot of power with:\n\n```text\nActor ──triggers──► Command ──ResolvesTo──► Fact\nFact ──ProjectsTo──► Representation\n```\n\nThat is enough to build real things and learn from them.\n\n# Good rule\n\nA good rule here is:\n\n> **Do not add semantic density until real usage proves it pays for itself.**\n\nThat seems aligned with how you want NEXUS to evolve.\n\n# What changes now\n\n## Remove from current core\n- `about` edge\n- Subject node from current active model\n\n## Keep as deferred idea\n- Subject\n- about\n- correlation-via-subject traversal\n\nSo it is not rejected, just postponed.\n\n# Updated simplified model\n\n## Core flow\n\n```text\nActor ──triggers──► Command ──ResolvesTo──► Fact\nFact ──ProjectsTo──► Representation ──► Actor\n```\n\n## Processor continuation\n\n```text\nFact ──ProjectsTo──► Representation ──► Processor\nProcessor ──triggers──► Command ──ResolvesTo──► Fact\n```\n\n# What this means for F#\n\nYou can simplify to:\n\n- Actor\n- Command\n- Fact\n- Representation\n- Artifact\n- edges:\n  - Triggers\n  - ResolvesTo\n  - ProjectsTo\n\nThat will make the first implementation much cleaner.\n\n# What this means for TOML\n\nYou can remove:\n\n- `[[subjects]]`\n- `type = \"about\"` edges\n\nSo the files become simpler and easier to author.\n\n# What this means for docs\n\nIn the docs, I would phrase it like this:\n\n> **Subject / about is intentionally deferred from the current core model.**\n> It may be added later if real implementations show the need for explicit subject linkage, correlation, or richer traversal.\n\nThat preserves the idea without burdening the present design.\n\n# My recommendation\n\nThe next best move is:\n\n1. update the table to remove Subject and about from the active version\n2. update the EM doc accordingly\n3. update F# and TOML to the simplified core\n4. mark Subject/about as a **future candidate**\n\nThat gives you a much tighter v1 baseline.\n\nI can produce the cleaned-up versions next."

