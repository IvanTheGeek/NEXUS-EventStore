text = "PerfectвЂ”this is exactly the right move. Making the EM в†” NEXUS mapping explicit *in the canonical flow* will remove a lot of ambiguity.\n\nIвЂ™ll give you clean, **copyable blocks** so you can edit them directly.\n\n---\n\n:::writing{variant=\"standard\" id=\"10001\"}\n### 2. Canonical Flow (EM в†” NEXUS Mapping)\n\n#### Write Side (Command / Fact Creation)\n\nEM terms:\nActor в†’ Command в†’ Event\n\nNEXUS mapping:\nActor в”Ђв”Ђtriggersв”Ђв”Ђв–є Command в”Ђв”ЂResolvesToв”Ђв”Ђв–є Fact\n\nCombined:\nActor в”Ђв”Ђtriggersв”Ђв”Ђв–є Command в”Ђв”ЂResolvesToв”Ђв”Ђв–є Event (Fact)\n:::\n\n---\n\n:::writing{variant=\"standard\" id=\"10002\"}\n#### Read Side (Projection / Representation)\n\nEM terms:\nEvent в†’ View в†’ Actor\n\nNEXUS mapping:\nFact в”Ђв”ЂProjectsToв”Ђв”Ђв–є Representation в”Ђв”ЂInformsв”Ђв”Ђв–є Actor\n\nCombined:\nEvent (Fact) в”Ђв”ЂProjectsToв”Ђв”Ђв–є View (Representation) в”Ђв”ЂInformsв”Ђв”Ђв–є Actor\n:::\n\n---\n\n:::writing{variant=\"standard\" id=\"10003\"}\n#### Processor / Automation Continuation\n\nEM terms:\nEvent в†’ View в†’ Processor в†’ Command в†’ Event\n\nNEXUS mapping:\nFact в”Ђв”ЂProjectsToв”Ђв”Ђв–є Representation в”Ђв”ЂInformsв”Ђв”Ђв–є Actor (Processor)\nActor (Processor) в”Ђв”Ђtriggersв”Ђв”Ђв–є Command в”Ђв”ЂResolvesToв”Ђв”Ђв–є Fact\n\nCombined:\nEvent в”Ђв”ЂProjectsToв”Ђв”Ђв–є View в”Ђв”ЂInformsв”Ђв”Ђв–є Processor\nProcessor в”Ђв”Ђtriggersв”Ђв”Ђв–є Command в”Ђв”ЂResolvesToв”Ђв”Ђв–є Event\n:::\n\n---\n\n:::writing{variant=\"standard\" id=\"10004\"}\n#### Unified Loop\n\nEM terms:\nActor в†’ Command в†’ Event в†’ View в†’ Actor\n\nNEXUS mapping:\nActor в”Ђв”Ђtriggersв”Ђв”Ђв–є Command в”Ђв”ЂResolvesToв”Ђв”Ђв–є Fact\nFact в”Ђв”ЂProjectsToв”Ђв”Ђв–є Representation в”Ђв”ЂInformsв”Ђв”Ђв–є Actor\n\nCombined loop:\nActor\n  в”Ђв”Ђtriggersв”Ђв”Ђв–є Command\n  в”Ђв”ЂResolvesToв”Ђв”Ђв–є Event (Fact)\n  в”Ђв”ЂProjectsToв”Ђв”Ђв–є View (Representation)\n  в”Ђв”ЂInformsв”Ђв”Ђв–є Actor\n:::\n\n---\n\n:::writing{variant=\"standard\" id=\"10005\"}\n#### Notes\n\n- EM uses: Actor, Command, Event, View\n- NEXUS uses: Actor, Command, Fact, Representation\n\n- Event = Fact (immutable result)\n- View = Representation (projected data)\n\n- \"ProjectsTo\" = projection process (Fact в†’ Representation)\n- \"Informs\" = delivery/consumption (Representation в†’ Actor)\n- \"ResolvesTo\" = resolution (Command в†’ Fact)\n- \"triggers\" = initiation (Actor в†’ Command)\n\n- Processors are modeled as Actors in NEXUS\n:::\n\n---\n\nTake your time editing these.  \n\nWhen you send back your corrections, IвЂ™ll:\n\n- reconcile terminology\n- propagate changes across the full docs (table, EM doc, F#, TOML)\n- call out any semantic inconsistencies that show up\n\nThis is exactly the right place to tighten things."

