text = "So another idea I have had is that in the same why a ed course could be built up and then published, the same could be done for videos. Marc has made a number of informational and educational videos, but it has been a long while. He has stated that the time and energy effort to create the content is just not something he is motivated and can do now. So by using the same processes and methods, a video could be scoped, subject and content refined and eventually become a fully fleshed out and approved and then have automation that assembles it all together and produces the video artifact.  Then later, as updates and improvements are feed back in, a new version could then be again approved and generated. "

