text = "Replace-slice architecture seems wrong. Its more like something to mean immutable/functional or some thing like that.\n\nThat phase is also from Adam about the replace the slice. He also is against DRY and such, the whole reason to remove coupling. He often says if you have a similar slice, you copy the code when  you build it. Having shared data is coupling and that is where issues stem from. He had also made the point that the event model is implementation agnostic, that the event model does not have to match the implementation and the one would make each slice in a different Language and swap the implementation of the slice with one made in another language. That is a bit extream, and maybe if the events were stored in way all could access, say in the file system as files, that could actually work."

