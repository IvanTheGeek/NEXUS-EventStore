[[body.segments]]
kind = "plain_text"
text = "I'll create an SVG showing a simplified 2D projection of how vectors cluster in semantic space:\n\n<svg viewBox=\"0 0 800 600\" xmlns=\"http://www.w3.org/2000/svg\">\n  <!-- Background -->\n  <rect width=\"800\" height=\"600\" fill=\"#0a0e27\"/>\n  \n  <!-- Title -->\n  <text x=\"400\" y=\"30\" text-anchor=\"middle\" fill=\"#e0e0e0\" font-size=\"20\" font-weight=\"bold\">Vector Database (2D Projection)</text>\n  <text x=\"400\" y=\"50\" text-anchor=\"middle\" fill=\"#888\" font-size=\"12\">Actual space: 384 dimensions (simplified to 2D for visualization)</text>\n  \n  <!-- Grid lines -->\n  <defs>\n    <pattern id=\"grid\" width=\"50\" height=\"50\" patternUnits=\"userSpaceOnUse\">\n      <path d=\"M 50 0 L 0 0 0 50\" fill=\"none\" stroke=\"#1a1f3a\" stroke-width=\"0.5\"/>\n    </pattern>\n  </defs>\n  <rect x=\"50\" y=\"80\" width=\"700\" height=\"480\" fill=\"url(#grid)\"/>\n  \n  <!-- Axes -->\n  <line x1=\"50\" y1=\"560\" x2=\"750\" y2=\"560\" stroke=\"#333\" stroke-width=\"2\"/>\n  <line x1=\"50\" y1=\"80\" x2=\"50\" y2=\"560\" stroke=\"#333\" stroke-width=\"2\"/>\n  <text x=\"400\" y=\"590\" text-anchor=\"middle\" fill=\"#666\" font-size=\"12\">Dimension 1</text>\n  <text x=\"20\" y=\"320\" text-anchor=\"middle\" fill=\"#666\" font-size=\"12\" transform=\"rotate(-90 20 320)\">Dimension 2</text>\n  \n  <!-- Programming cluster -->\n  <circle cx=\"200\" cy=\"150\" r=\"80\" fill=\"#1e3a5f\" opacity=\"0.3\"/>\n  <circle cx=\"180\" cy=\"140\" r=\"4\" fill=\"#4a9eff\"/>\n  <text x=\"180\" y=\"130\" text-anchor=\"middle\" fill=\"#4a9eff\" font-size=\"11\">Python</text>\n  <circle cx=\"210\" cy=\"155\" r=\"4\" fill=\"#4a9eff\"/>\n  <text x=\"210\" y=\"145\" text-anchor=\"middle\" fill=\"#4a9eff\" font-size=\"11\">F#</text>\n  <circle cx=\"195\" cy=\"170\" r=\"4\" fill=\"#4a9eff\"/>\n  <text x=\"195\" y=\"185\" text-anchor=\"middle\" fill=\"#4a9eff\" font-size=\"11\">JavaScript</text>\n  <circle cx=\"220\" cy=\"135\" r=\"4\" fill=\"#4a9eff\"/>\n  <text x=\"220\" y=\"125\" text-anchor=\"middle\" fill=\"#4a9eff\" font-size=\"11\">Rust</text>\n  \n  <!-- Food cluster -->\n  <circle cx=\"600\" cy=\"200\" r=\"70\" fill=\"#3a1e1e\" opacity=\"0.3\"/>\n  <circle cx=\"580\" cy=\"190\" r=\"4\" fill=\"#ff6b6b\"/>\n  <text x=\"580\" y=\"180\" text-anchor=\"middle\" fill=\"#ff6b6b\" font-size=\"11\">Pizza</text>\n  <circle cx=\"610\" cy=\"205\" r=\"4\" fill=\"#ff6b6b\"/>\n  <text x=\"610\" y=\"220\" text-anchor=\"middle\" fill=\"#ff6b6b\" font-size=\"11\">Pasta</text>\n  <circle cx=\"595\" cy=\"220\" r=\"4\" fill=\"#ff6b6b\"/>\n  <text x=\"595\" y=\"235\" text-anchor=\"middle\" fill=\"#ff6b6b\" font-size=\"11\">Bread</text>\n  <circle cx=\"620\" cy=\"185\" r=\"4\" fill=\"#ff6b6b\"/>\n  <text x=\"620\" y=\"175\" text-anchor=\"middle\" fill=\"#ff6b6b\" font-size=\"11\">Burger</text>\n  \n  <!-- Animals cluster -->\n  <circle cx=\"150\" cy=\"420\" r=\"75\" fill=\"#1e3a1e\" opacity=\"0.3\"/>\n  <circle cx=\"140\" cy=\"410\" r=\"4\" fill=\"#66ff66\"/>\n  <text x=\"140\" y=\"400\" text-anchor=\"middle\" fill=\"#66ff66\" font-size=\"11\">Dog</text>\n  <circle cx=\"165\" cy=\"425\" r=\"4\" fill=\"#66ff66\"/>\n  <text x=\"165\" y=\"440\" text-anchor=\"middle\" fill=\"#66ff66\" font-size=\"11\">Cat</text>\n  <circle cx=\"150\" cy=\"445\" r=\"4\" fill=\"#66ff66\"/>\n  <text x=\"150\" y=\"460\" text-anchor=\"middle\" fill=\"#66ff66\" font-size=\"11\">Horse</text>\n  <circle cx=\"130\" cy=\"435\" r=\"4\" fill=\"#66ff66\"/>\n  <text x=\"115\" y=\"435\" text-anchor=\"middle\" fill=\"#66ff66\" font-size=\"11\">Wolf</text>\n  \n  <!-- Transportation cluster -->\n  <circle cx=\"500\" cy=\"450\" r=\"65\" fill=\"#3a2e1e\" opacity=\"0.3\"/>\n  <circle cx=\"490\" cy=\"440\" r=\"4\" fill=\"#ffaa44\"/>\n  <text x=\"490\" y=\"430\" text-anchor=\"middle\" fill=\"#ffaa44\" font-size=\"11\">Car</text>\n  <circle cx=\"515\" cy=\"455\" r=\"4\" fill=\"#ffaa44\"/>\n  <text x=\"515\" y=\"470\" text-anchor=\"middle\" fill=\"#ffaa44\" font-size=\"11\">Truck</text>\n  <circle cx=\"500\" cy=\"470\" r=\"4\" fill=\"#ffaa44\"/>\n  <text x=\"500\" y=\"485\" text-anchor=\"middle\" fill=\"#ffaa44\" font-size=\"11\">Bus</text>\n  <circle cx=\"485\" cy=\"460\" r=\"4\" fill=\"#ffaa44\"/>\n  <text x=\"470\" y=\"460\" text-anchor=\"middle\" fill=\"#ffaa44\" font-size=\"11\">Van</text>\n  \n  <!-- Query vector and nearest neighbors -->\n  <circle cx=\"195\" cy=\"155\" r=\"8\" fill=\"none\" stroke=\"#ff00ff\" stroke-width=\"2\"/>\n  <text x=\"195\" y=\"115\" text-anchor=\"middle\" fill=\"#ff00ff\" font-size=\"13\" font-weight=\"bold\">Query: \"coding\"</text>\n  \n  <!-- Distance lines to nearest neighbors -->\n  <line x1=\"195\" y1=\"155\" x2=\"180\" y2=\"140\" stroke=\"#ff00ff\" stroke-width=\"1\" opacity=\"0.5\" stroke-dasharray=\"3,3\"/>\n  <line x1=\"195\" y1=\"155\" x2=\"210\" y2=\"155\" stroke=\"#ff00ff\" stroke-width=\"1\" opacity=\"0.5\" stroke-dasharray=\"3,3\"/>\n  <line x1=\"195\" y1=\"155\" x2=\"220\" y2=\"135\" stroke=\"#ff00ff\" stroke-width=\"1\" opacity=\"0.5\" stroke-dasharray=\"3,3\"/>\n  \n  <!-- Legend -->\n  <rect x=\"550\" y=\"90\" width=\"220\" height=\"120\" fill=\"#151925\" stroke=\"#333\" stroke-width=\"1\" rx=\"5\"/>\n  <text x=\"660\" y=\"110\" text-anchor=\"middle\" fill=\"#e0e0e0\" font-size=\"12\" font-weight=\"bold\">How It Works:</text>\n  <circle cx=\"565\" cy=\"130\" r=\"3\" fill=\"#ff00ff\"/>\n  <text x=\"580\" y=\"134\" fill=\"#ccc\" font-size=\"11\">Query vector</text>\n  <line x1=\"565\" y1=\"148\" x2=\"585\" y2=\"148\" stroke=\"#ff00ff\" stroke-dasharray=\"3,3\"/>\n  <text x=\"590\" y=\"152\" fill=\"#ccc\" font-size=\"11\">Distance calculation</text>\n  <circle cx=\"565\" cy=\"168\" r=\"20\" fill=\"#1e3a5f\" opacity=\"0.3\"/>\n  <text x=\"590\" y=\"172\" fill=\"#ccc\" font-size=\"11\">Semantic cluster</text>\n  <text x=\"660\" y=\"195\" text-anchor=\"middle\" fill=\"#888\" font-size=\"10\">Similar meanings = close distance</text>\n</svg>\n\nThis shows:\n- **Semantic clustering**: Related concepts (programming languages, foods, animals, vehicles) cluster together\n- **Query vector**: The magenta circle showing a search for \"coding\"\n- **Nearest neighbors**: Dashed lines to the closest vectors (Python, F#, Rust)\n- **Simplified projection**: Real space is 384D, but the clustering principle is the same\n\nIn your Nexus-MCP system, when you search for \"F# error handling\", Qdrant finds the conversation vectors closest to that query in the full 384-dimensional space."

