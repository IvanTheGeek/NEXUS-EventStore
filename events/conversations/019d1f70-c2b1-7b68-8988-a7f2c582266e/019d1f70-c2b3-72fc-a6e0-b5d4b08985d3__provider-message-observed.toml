text = "Good callвАФthat PDF *does* have what we need. LetвАЩs pull this together cleanly.\n\n---\n\n# рЯП° What R-LD and R-HD actually are (from your code)\n\nFrom the definitions section:\n\n- **R-LD** = *Low Density Residential district* оИАfileciteоИВturn5file6оИБ  \n- **R-HD** = *High Density Residential district* оИАfileciteоИВturn5file6оИБ  \n\nThatвАЩs all the formal definition gives youвАФbut the real meaning comes from how the code tells you to read each district:\n\n> вАЬSee Section 1109.02 Low Density Residential (R-LD) DistrictвА¶ for a descriptionвА¶вАЭ оИАfileciteоИВturn5file8оИБ  \n\nрЯСЙ So the *actual differences* live in:\n- **Use Table (1104.03.1)** вЖТ what you can do\n- **Dimensional tables (1109.xx)** вЖТ lot size, setbacks, etc.\n\n---\n\n# рЯФН What the districts *functionally* mean in Springfield\n\nEven though the snippet doesnвАЩt show the full table, we *can infer real differences from the code itself*.\n\n---\n\n## рЯЯҐ R-LD (Low Density Residential)\n\n### Signals from the code\n- Allows animals like:\n  - horses, donkeys, etc. (with limits) оИАfileciteоИВturn5file2оИБ  \n- Larger setbacks for animal structures relative to R-LD properties оИАfileciteоИВturn5file2оИБ  \n\nрЯСЙ That tells you:\n- **Bigger lots**\n- **More suburban / semi-rural character**\n\n### Practical meaning\n- Primarily **single-family homes**\n- Lower density\n- More yard space\n- More tolerance for вАЬnon-standardвАЭ yard uses (like gardens)\n\n---\n\n## рЯЯ° R-HD (High Density Residential)\n\n### Signals from the code\n- Much tighter restrictions:\n  - fewer animals allowed оИАfileciteоИВturn5file2оИБ  \n- Same setbacks from R-HD property lines (implies closer proximity between homes)\n\nрЯСЙ That tells you:\n- **Smaller lots**\n- **More neighbors / tighter spacing**\n\n### Practical meaning\n- Can include:\n  - smaller lots\n  - possibly duplex / multi-family (check use table to confirm exact allowances)\n- More urban feel\n\n---\n\n# вЪЦпЄП The *real* difference (decoded)\n\nThis is the important part:\n\n| Concept | R-LD | R-HD |\n|--------|------|------|\n| Density intent | Low | High |\n| Lot size | Larger | Smaller |\n| Spacing | More open | More compact |\n| Typical housing | Single-family | Mix (often tighter housing) |\n| вАЬYard freedomвАЭ | Higher | Lower |\n\n---\n\n# рЯІ† The key insight (this matters for your garden)\n\nZoning districts control:\n\nрЯСЙ **Intensity of land use (how much stuff per land)**  \nNOT  \nрЯСЙ **Plant type or landscaping choices**\n\nSo whether you are:\n- R-LD вЬЕ\n- R-HD вЬЕ\n\nYour **front yard garden question barely changes**.\n\n---\n\n# рЯМ± What actually *changes for you*\n\n### If you are R-LD\n- YouвАЩre in the *most permissive residential context*\n- Front yard garden = very low risk\n\n### If you are R-HD\n- Still allowed\n- Just:\n  - keep it tidy\n  - avoid anything that looks like a structure\n  - be mindful of neighbors\n\n---\n\n# вЪ†пЄП One subtle but important clue from the code\n\nThis line:\n\n> вАЬAll non-household animals are prohibited from being located in front and side yards.вАЭ оИАfileciteоИВturn5file2оИБ  \n\nрЯСЙ Notice:\n- They explicitly regulate **animals in front yards**\n- They **do NOT regulate plants in front yards**\n\nThatвАЩs actually strong evidence that:\nвЮ°пЄП **gardening is not a restricted use in front yards**\n\n---\n\n# рЯІ≠ If you want to go deeper\n\nWe can get *very precise* if you want:\n\n- Pull **Table 1109.02 (R-LD)** and **1109.03 (R-HD)**:\n  - minimum lot size\n  - setbacks\n  - building coverage\n\n- Then map your exact plan:\n  - path + raised beds\n  - retaining edge height\n\nAnd IвАЩll tell you:\nрЯСЙ вАЬthis is 100% safeвАЭ vs вАЬthis might trigger zoning reviewвАЭ\n\nJust say рЯСН"

