text = "Yep—there **are absolutely different rules for front/side yards vs rear yards** in your code, and the animal section makes that very explicit. Let’s break it down cleanly.\n\n---\n\n# 🐓 Animal rules in Springfield (decoded)\n\nFrom your zoning code:\n\n### 🚫 1. Animals are NOT allowed in front or side yards\n\n> “All non-household animals are prohibited from being located in front and side yards.” fileciteturn5file2  \n\n👉 This is a **hard rule**.\n\n- “Non-household animals” = livestock / chickens / etc.\n- Applies to:\n  - front yard ❌\n  - side yard ❌\n- Only allowed in:\n  - **rear yard ✅**\n\n---\n\n### 📏 2. There are setback requirements for animal structures\n\n> “Structures for… animals shall be at least 200 feet from… R-LD and R-HD property lines.” fileciteturn5file2  \n\n> “Structures for fowl or small animals… not less than 100 feet…” fileciteturn5file2  \n\n👉 Meaning:\n- Coops, barns, pens must be far from neighbors\n- On most city lots → **this effectively makes animals impractical**\n\n---\n\n### 📊 3. There are density limits (animal units)\n\nThe table shows how many animals per lot size and district fileciteturn5file2  \n\n👉 Example (R-HD):\n- Very limited\n- Often effectively **0 or very small number** on typical city lots\n\n---\n\n### 🚫 4. Some animals are banned on small lots\n\n> “The following animal types are prohibited on lots less than one acre…” fileciteturn5file2  \n\nIncludes:\n- cattle\n- horses\n- pigs\n- goats, etc.\n\n👉 Most R-HD lots are **< 1 acre**, so:\n➡️ These are basically not allowed at all\n\n---\n\n# 🧠 So what does this mean in plain English?\n\nFor **R-HD (your zoning):**\n\n### 🐄 Large animals\n- ❌ Not allowed (lot too small)\n\n### 🐔 Chickens / small animals\n- ⚠️ Technically possible in code\n- BUT:\n  - must be in rear yard\n  - must meet large setbacks\n- 👉 In practice: **very hard to comply**\n\n---\n\n# 🧭 The BIG takeaway about yards (this matters a lot)\n\n## YES — the code treats yard areas differently\n\n### Front Yard\n- Must be:\n  - “open and unobstructed” (earlier section)\n- Animals:\n  - ❌ prohibited\n- Structures:\n  - heavily restricted\n\n---\n\n### Side Yard\n- Similar to front:\n  - ❌ animals prohibited\n  - used for spacing / setbacks\n\n---\n\n### Rear Yard\n- This is the **“activity zone”**\n- Where you can have:\n  - accessory uses\n  - sheds\n  - animals (if allowed)\n  - more flexibility\n\n---\n\n# 🌱 Now tie this back to your garden idea\n\nHere’s the key insight:\n\n👉 The code **explicitly restricts animals in front yards**  \n👉 It **does NOT restrict plants in front yards**\n\nThat’s not accidental.\n\n---\n\n## Why that matters\n\n- Animals = regulated use → restricted location\n- Structures = regulated → restricted location\n- Plants = **landscaping → broadly allowed**\n\n---\n\n# ⚖️ So your situation (R-HD + front yard garden)\n\n### ✔️ Allowed\n- Growing vegetables in front yard\n- Replacing lawn with food plants\n\n### ⚠️ Watch\n- Raised beds that look like structures\n- Retaining walls (your earlier plan)\n\n### ❌ Not allowed\n- Chickens in front yard\n- Any livestock in front yard\n\n---\n\n# 🧠 NEXUS-style abstraction (you’ll like this)\n\nThink of the zoning model like:\n\n```\nZone (R-HD)\n  ├─ Use rules (animals, buildings, etc.)\n  ├─ Spatial rules (front vs rear yard)\n  └─ Physical rules (structures vs vegetation)\n```\n\nYour garden lives in:\n```\nVegetation → Landscaping → loosely constrained\n```\n\nAnimals live in:\n```\nUse → tightly constrained → location-specific\n```\n\n---\n\n# 👍 If you want to push this further\n\nI can:\n- Evaluate your exact raised bed / retaining edge idea against:\n  - “structure vs landscaping” boundary\n- Or find the exact **height thresholds** that trigger zoning issues\n\nThat’s the next critical piece for your design."

