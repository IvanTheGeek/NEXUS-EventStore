text = "All papers comprising a petition shall be assembled and filed with the clerk of the city commission as one instrument, within one hundred twenty\r\ndays from the date of the first signature thereon, and when so filed the clerk shall submit the same to the city commission at its next regular meeting\r\nand provision shall be made for public hearings upon the proposed ordinance within ten (10) days from the time said petition was presented to the\r\ncity commission."

