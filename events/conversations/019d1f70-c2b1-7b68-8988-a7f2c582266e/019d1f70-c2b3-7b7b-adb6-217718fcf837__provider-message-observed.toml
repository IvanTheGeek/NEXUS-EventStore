[[body.segments]]
kind = "plain_text"
text = "At the regular city commission meeting after the expiration of said fifteen (15) day period, each remaining commissioner shall place in nomination\r\nthe name or names of persons equal to the number of existing vacancies; thereupon the city law director shall draw from said lot the name of such\r\nnominees equal in number to existing vacancies. The name first drawn shall be the commissioner for the vacancy first created; the second name for\r\nthe remaining vacancy, if any.\r\nAll such selections shall be for the terms set forth in the first paragraph of this Section 11, and all such persons shall be qualified as set forth in\r\nSection 5 hereof.\r\nIn the event there is a vacancy in the office of mayor, the assistant mayor shall thereafter become the mayor and shall serve in that capacity for the\r\nunexpired term of the mayor. The vacancy in the city commission thus created would be filled as set forth previously in this section.\r\n(Amended 5-7-02, Ord. No. 02-120, Yeas, 3,105; Nays 1,265.)\r\nSECTION 12. CREATION OF NEW DEPARTMENTS; CHANGE OF DUTIES.\r\nThe city commission by ordinance may create, change and abolish offices, departments or agencies, other than the offices, departments and\r\nagencies established by this Charter. The city commission by ordinance may assign additional functions or duties to offices, departments or agencies\r\nestablished by this Charter, but may not discontinue or assign to any other office, department or agency any function or duty assigned by this Charter\r\nto a particular office, department or agency.\r\nSECTION 13. CITY CLERK.\r\nThe city commission shall elect an officer of the city who shall have the title of city clerk, shall give notice of its meetings, shall keep the journal of\r\nits proceedings, shall authenticate by his signature and record in full, in a book kept for the purpose, all ordinances and resolutions, and shall perform\r\nsuch other duties as shall be required by this Charter or by ordinance.\r\nSECTION 14. MEETINGS OF THE CITY COMMISSION.\r\nAt eight o'clock p.m. on the second day of January following a regular municipal election, or if such day be Sunday or Monday, on the day\r\nfollowing, the city commission shall meet at the usual place for holding the meetings of the legislative body of the city, at which time the newly￾elected commissioners shall assume the duties of their office. Thereafter, the city commission shall meet at such times as may be prescribed by its\r\nrules, but not less than forty-eight (48) times in any calendar year with no meeting more than two weeks following the immediately preceding\r\nmeeting.\r\n(Amended 11-8-77, Ord. No. 77-295, Yeas 7,343; Nays 5,951.)\r\nSECTION 15. SPECIAL MEETINGS.\r\nThe mayor, any two (2) members of the city commission, or the city manager, may call special meetings of the city commission upon at least\r\ntwelve (12) hours written notice to each member, served personally or left at his usual place of residence."

[[body.segments]]
