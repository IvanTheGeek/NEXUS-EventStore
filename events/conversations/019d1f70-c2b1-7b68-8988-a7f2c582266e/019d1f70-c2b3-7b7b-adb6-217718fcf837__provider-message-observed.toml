[[body.segments]]
kind = "plain_text"
text = "SECTION 50. PETITION FOR ELECTION.\r\nThe city commission shall at once proceed to consider such petition and shall take final action thereon within thirty (30) days from the date of\r\nsubmission. If the city commission rejects the proposed ordinance, or passes it in a different form from that set forth in the petition, or fails to act\r\nfinally upon it within the time stated, the committee of the petitioners by written demand filed with clerk of the city commission not later than twenty\r\n(20) days after final action or inaction by the city commission, may require that the proposed ordinance be submitted to a vote of the electors in its\r\noriginal form, if, with or prior to such demand, a petition for such election, signed after the final action for inaction of the city commission is filed\r\nwith such clerk bearing additional signatures of five percent (5%) of the registered voters of the city at the last election, none of whom were signers\r\nof the first petition. Such clerk shall forthwith cause notice of the filing of such demand and petition to be published in some newspaper of general\r\ncirculation in the City, and shall also within five (5) days certify to the officers having control of elections the proposed ordinances, stating whether\r\nor not a special election is demanded in the petitions, the percentage of registered voters at the last municipal election who signed the two petitions in\r\nthe aggregate, and the date on which he published the notice last mentioned.\r\nSECTION 51. TIME OF HOLDING ELECTION.\r\nIf an election is to be held not more than ninety (90) days nor less than thirty (30) days after the publication of such notice by the clerk, such\r\nproposed ordinance shall be submitted to a vote of the electors at such election. If no election is to be held within the time aforesaid, the election\r\nofficers shall provide for submitting the proposed ordinance to the electors at a special election to be held no later than sixty (60) days nor earlier\r\nthan thirty (30) days after the publication of such notice, if the petition for such ordinance and the petition for such election so demand, and if the\r\nsigners of the two petitions amount in the aggregate to at least twenty-five percent (25%) of the registered voters in the municipality at the last\r\nregular municipal election. At least ten (10) days before any such election the clerk of the city commission shall cause such proposed ordinance to be\r\npublished.\r\nSECTION 52. ACCEPTED VOTING DEVICE.\r\nThe voting devices approved by the general laws of the State of Ohio used when voting upon any such proposed ordinance shall clearly state the\r\ntitle of the ordinance to be voted on, and shall provide for a vote \"For\" and \"Against\" the ordinance. If a majority of the electors voting on any such\r\nproposed ordinance shall vote in favor thereof, it shall thereupon become an ordinance of the city.\r\nSECTION 53. AMENDMENTS AND REPEALS.\r\nNo ordinance adopted by an electoral vote can be replaced or amended except by an electoral vote. But an ordinance to repeal or amend any such\r\nordinance may, by resolution of the city commission, be submitted to an electoral vote at any regular election or at any special municipal election\r\ncalled for some other purpose, provided notice of the intention so to do be published by the city commission not more than sixty (60) nor less than\r\nthirty (30) days prior to such election, in the manner required for the publication of ordinances. If an amendment is so proposed, such notice shall\r\ncontain the proposed amendment in full. Such submission shall be in the same manner, and the vote shall have the same effect, as in cases of\r\nordinances submitted to an election by popular petition. Such ordinance to be voted upon shall be published in the manner provided by Section 20\r\nhereof.\r\nARTICLE IX - REFERENDUM\r\nSECTION 54. PETITION FOR REFERENDUM.\r\nNo ordinance passed by the city commission, unless it be an emergency measure or the annual appropriation ordinance, shall go into effect until\r\nfourteen (14) days after its final passage. If, at any time within said fourteen (14) days, a petition signed by ten percent (10%) of the total number of\r\nregistered voters in the municipality at the last regular municipal election be filed with the clerk of the city commission, requesting that any such\r\nordinance be repealed or amended as stated in the petition, it shall not become operative until the steps indicated herein have been taken. Such\r\npetition shall have stated therein the names and addresses of at least five (5) electors as a committee to represent the petitioners.\r\nReferendum petitions need not contain the text of the ordinance or ordinances the repeal of which is sought, but shall contain the proposed\r\namendment, if an amendment is demanded, and shall be subject in all other respects to the requirements for petitions submitting proposed ordinances\r\nto the City Commission. Voting devices used in referendum elections shall conform in all respects to those provided for in Section 52 of this Charter.\r\n(Amended 11-8-77, Ord. No. 77-295, Yeas 7,343; Nays 5,951.)\r\nSECTION 55. PROCEEDINGS THEREUNDER.\r\nThe clerk of the city commission shall, at its next meeting, present the petition to the city commission, which shall proceed to reconsider the\r\nordinance. If, within thirty (30) days after the filing of such petition, the ordinance be not repealed or amended as requested, the city commission\r\nshall provide for submitting the proposed repeal or amendment to a vote of the electors provided a majority of the committee named in the petition to\r\nrepresent the petitioners shall, by writing filed with the clerk of the city commission within twenty (20) days after the expiration of the said thirty\r\n(30) days, so require. In so doing the city commission shall be governed by the provisions of Section 50 hereof respecting the time of submission and\r\nthe manner of voting on ordinances proposed to the city commission by petition; excepting that the question of calling a special election for such\r\npurpose shall be determined by the demand and number of signers of the petition requesting the repeal or amendment of such ordinance, which\r\nnumber shall be twenty-five percent (25%) of the registered voters in the municipality at the last regular municipal election; and excepting further\r\nthat the city commission may call, and fix the time for, a special election for such purpose, if in its judgment the public interest will be prejudiced by\r\ndelay.\r\nIf, when submitted to a vote of the electors, such repeal or amendment be approved by a majority of those voting thereon, it shall thereupon go into\r\neffect as an ordinance of the city; but, if any such amendment is clearly separable from the remainder of the ordinance and does not materially affect\r\nthe other provisions of such ordinance, all sections of the ordinance except that sought to be amended and those dependent thereon shall take effect\r\nas though no referendum of any portion of the ordinance had been demanded.\r\nSECTION 56. REFERENDUM ON INITIATED ORDINANCES; CONFLICT.\r\nOrdinances submitted to the city commission by initiative petition and passed by the city commission without change, or passed in an amended\r\nform and not required to be submitted to a vote of the electors by the committee of the petitioners, shall be subject to the referendum in the same\r\nmanner as other ordinances. If the provisions of two or more ordinances adopted or approved at the same election conflict, the ordinance receiving\r\nthe highest affirmative vote shall prevail."

[[body.segments]]
kind = "plain_text"
text = "<PARSED TEXT FOR PAGE: 13 / 637>"

[[body.segments]]
kind = "plain_text"
text = "SECTION 57. EMERGENCY MEASURES.\r\nOrdinances passed as emergency measures shall be subject to referendum in like manner as other ordinances, except that they shall go into effect at\r\nthe time indicated in such ordinances. If, when submitted to a vote of the electors, an emergency measure be not approved by a majority of those\r\nvoting thereon, it shall be considered repealed as regards any further action thereunder; but such measure so repealed shall be deemed sufficient\r\nauthority for payment in accordance with the ordinance of any expense incurred previous to the referendum vote thereon.\r\nSECTION 58. PRELIMINARY ACTION.\r\nIn case a petition be filed requiring that a measure passed by the city commission providing for an expenditure of money, a bond issue, or a public\r\nimprovement be submitted to a vote of the electors, all steps preliminary to such actual issuance of bonds, or actual execution of a contract for such\r\nimprovement, may be taken prior to the election.\r\nARTICLE X - RECALL\r\nSECTION 59. RECALL PETITION.\r\nAny or all members of the city commission may be removed from office by the electors by the following procedure:\r\nA petition for the recall of the commissioner or commissioners designated, signed by at least five hundred (500) of the electors of the city, and\r\ncontaining a statement in not more than two hundred (200) words of the grounds of the recall, shall be filed with the clerk of the city commission,\r\nwho shall forthwith notify the commissioner or commissioners sought to be removed, and he or they, within five (5) days after such notice, may file\r\nwith such clerk of the city commission a defensive statement in not exceeding two hundred (200) words. The clerk of the city commission shall at\r\nonce, upon expiration of said five (5) days, cause sufficient printed or typewritten copies of such petition, without the signatures, to be made, and to\r\neach of them he shall attach a printed or typewritten copy of such defensive statement, if one is furnished him within the time provided. The clerk of\r\nthe city commission shall cause one copy of such petition to be placed on file in the said clerk's office, and provide facilities for the public signing\r\nthe same, and shall also cause one copy to be placed in each of the several fire engine houses of the City, where the same shall be in the custody of\r\nthe officer in charge of the house, who shall provide facilities for the public signing the same. The clerk of the city commission shall immediately\r\ncause notice to be published in some newspaper of general circulation in the city of the placing of such copies of such petition.\r\nSuch copies of such petition shall remain on file in the several places designated for the period of thirty (30) days, during which time any of them\r\nmay be signed by any registered voter in the municipality, but not by agent or attorney."

[[body.segments]]
kind = "plain_text"
text = "<PARSED TEXT FOR PAGE: 14 / 637>"

[[body.segments]]
kind = "plain_text"
text = "SECTION 60. NOTICE.\r\nAt the expiration of said period of thirty (30) days, the clerk of the city commission shall assemble all of said copies in his office as one instrument\r\nand shall examine the same and ascertain and certify thereon whether the signatures thereto amount to at least fifteen percent (15%) of the registered\r\nvoters in the municipality at the last regular municipal election of the city. If such signatures do amount to such percent, he shall at once serve notice\r\nof that fact upon the commissioner or commissioners designated in the petition, and also deliver to the election authorities a copy of the original\r\npetition with his certificate as to the percentage of registered voters who signed the same, and a certificate as to the date of his last mentioned notice\r\nto the commissioner or commissioners designated in the petition.\r\nSECTION 61. RECALL ELECTION.\r\nIf the commissioner or commissioners, or any of them, designated in the petition file with the clerk of the city commission within five (5) days\r\nafter the last mentioned notice from the said clerk of the city commission his or their written resignation, the clerk of the city commission shall at\r\nonce notify the election authorities of that fact; and such resignation shall be irrevocable, and the city commission shall proceed to fill the vacancy. In\r\nthe absence of any such resignation, the election authorities shall forthwith order and fix a day for holding a recall election for the removal of those\r\nnot resigning. Any such election shall be held not less than thirty (30) nor more than sixty (60) days after the expiration of the period of five (5) days\r\nlast mentioned, and at the same time as any other general or special election held within such period; but if no such election be held within such\r\nperiod, the election authorities shall call a special recall election to be held within the period aforesaid.\r\nSECTION 62. VOTING DEVICES.\r\nThe voting devices used at such recall election shall conform to the following requirements. With respect to each person whose removal is sought,\r\nthe question shall be submitted: \"Shall (name of person) be removed from the office of city commission by recall?\" Adjacent to each such question,\r\nthere shall be clearly indicated a place for those voting in favor of the recall of the person in question and there shall also be clearly indicated a place\r\nfor those voting against the recall of the person in question.\r\nSECTION 63. FILLING OF VACANCIES.\r\nIn any such election, if a majority of the votes cast on the question of removal of any commissioner are affirmative, the person whose removal is\r\nsought shall thereupon be deemed removed from office upon the announcement of the official canvass of that election, and the vacancy caused by\r\nsuch recall shall be filled by the remainder of the city commission according to the provisions of Section 11 of this Charter."

[[body.segments]]
kind = "plain_text"
text = "<PARSED TEXT FOR PAGE: 15 / 637>"

[[body.segments]]
kind = "plain_text"
text = "If, however, an election is held for the recall of more than two (2) commissioners, candidates to succeed them for their unexpired terms shall be\r\nvoted upon at the same election, and shall be nominated without primary election, by petitions signed, dated and verified in the manner required for\r\npetitions presenting names of candidates for nomination at a primary election, and similar in form to such petitions, but signed by electors equal in\r\nnumber to at least five percent (5%) of the registered voters in the municipality at the last regular municipal election of the city, and filed with the\r\nelection authorities at least thirty (30) days prior to such recall election. But no such nominating petition shall be signed or circulated until after the\r\ntime has expired for signing the copies of the petition for the recall, and any signatures thereon antedating such time shall not be counted.\r\nSECTION 64. COUNTING THE VOTE.\r\nCandidates shall not be nominated to succeed any particular commissioner; but if only one commissioner is removed at such election, the candidate\r\nat such election receiving the highest number of votes shall be declared elected to fill the vacancy; and if more than one commissioner is removed at\r\nsuch election, such candidates equal in number to the number of commissioners removed shall be declared elected to fill the vacancies; and among\r\nthe successful candidates, those receiving the greater number of votes shall be declared elected for the longer terms. Cases of ties, and all other\r\nmatters not herein specially provided for, shall be determined by the rules governing elections generally.\r\nSECTION 65. EFFECT OF RESIGNATIONS.\r\nNo proceedings for the recall of all of the members of the city commission at the same election shall be defeated in whole or in part by the\r\nresignation of any or all of them, but upon the resignation of any of them the city commission shall have power to fill the vacancy until a successor is\r\nelected, and the proceedings for the recall and the election of successors shall continue and have the same effect as though there had been no\r\nresignation.\r\nSECTION 66. MISCELLANEOUS PROVISIONS.\r\nExcept as herein otherwise provided, no petition to recall any commissioner shall be filed within six (6) months after he takes office. No person\r\nremoved by recall shall be eligible to be elected or appointed to the city commission for a period of two (2) years after the date of such recall. The\r\nclerk of the city commission shall preserve in his office all papers comprising or connected with a petition for a recall for a period of one (1) year\r\nafter the same were filed. The method of removal herein provided is in addition to such other methods as are or may be provided by general law."

[[body.segments]]
kind = "plain_text"
text = "<PARSED TEXT FOR PAGE: 16 / 637>"

[[body.segments]]
kind = "plain_text"
text = "SECTION 67. OFFENSES RELATING TO PETITIONS.\r\nNo person shall falsely impersonate another, or purposely write his name or residence falsely, in the signing of any petition for initiative,\r\nreferendum, or recall, or forge any name thereto, or sign any such paper with knowledge that he is not a qualified elector of the municipality. No\r\nperson shall sign, or knowingly permit to be signed, any petition for recall at any place other than one of the places hereinbefore designated for the\r\nsigning of such petitions. Nor shall any person employ or pay another, or accept employment or payment, for circulating any initiative or referendum\r\npetition upon the basis of the number of signatures procured thereto. Any person violating any of the provisions of this section shall be deemed\r\nguilty of a misdemeanor and shall, upon conviction, be fined in a sum not to exceed one hundred dollars and the costs of prosecution. The foregoing\r\nprovisions shall not be held to be exclusive of, but in addition to, all laws of the State prescribing penalties for the same offenses or for other offenses\r\nrelating to the same matter.\r\nARTICLE XI - FRANCHISES\r\nSECTION 68. GRANTS LIMITED.\r\nNo grant, or renewal thereof, to construct and operate a public utility in the streets and public grounds of the city shall be made by the city\r\ncommission to any individual, company or corporation in violation of any of the limitations contained in this Charter.\r\nSECTION 69. PERIOD OF GRANTS.\r\nNo such grant shall be exclusive, nor shall it be made for a longer period than twenty (20) years. No such grant shall be renewed earlier than two\r\n(2) years prior to its expiration unless the city commission shall by vote of at least four (4) of its members first declare by ordinance its intention of\r\nconsidering a renewal thereof. All grants of the right to make extensions of any public utility shall be subject as far as practicable to the terms of the\r\noriginal grant and shall expire therewith.\r\nSECTION 70. ASSIGNMENT.\r\nNo such grant shall be leased, assigned or otherwise alienated except with the express consent of the city commission.\r\nSECTION 71. RIGHT OF PURCHASE.\r\nAll such grants shall reserve to the city the right to purchase or lease all the property of the utility used in or useful for the operation of the utility, at\r\na price either fixed in the ordinance making the grant, or to be fixed in the manner provided by such ordinance, which price shall in no event include\r\nany value for the grant. Nothing, in such ordinance, shall prevent the city from acquiring such property by condemnation proceedings or in any other\r\nlawful mode, which rights shall be in addition to those reserved in such ordinance. Upon the acquisition of such property by purchase, condemnation\r\nor otherwise, all grants shall at once terminate.\r\nSECTION 72. EXTENSION BY ANNEXATION.\r\nIt shall be provided in every such grant that upon the annexation of any territory to the city the portion of any such utility that may be located\r\nwithin such annexed territory and upon the streets, alleys or public grounds thereof, shall thereafter be subject to all the terms of the grant as though it\r\nwere an extension made thereunder."

[[body.segments]]
kind = "plain_text"
text = "<PARSED TEXT FOR PAGE: 17 / 637>"

[[body.segments]]
kind = "plain_text"
text = "SECTION 73. RIGHT OF REGULATION.\r\nAll grants shall be subject to the right of the city, whether in terms reserved or not, to control at all times the distribution of space in, over, under or\r\nacross all streets, alleys or public grounds occupied by public utility fixtures, and, when in the opinion of the city commission the public interest so\r\nrequires, such fixtures may be caused to be reconstructed, relocated, altered or discontinued; and said city shall at all times have the power to pass all\r\nregulatory ordinances affecting such utilities which in the opinion of the city commission are required in the interest of the public health, safety or\r\naccommodation.\r\nSECTION 74. FORFEITURES.\r\nIf any action shall be instituted or prosecuted directly or indirectly by the grantee of any such grant, or by its stockholders or creditors, to set aside\r\nor have declared void any of the terms of any such grant, the whole of such grant may be thereupon forfeited and annulled at the option of the city\r\ncommission to be expressed by ordinance. All such grants shall make provision for the declaration of a forfeiture by the city commission for the\r\nviolation by the grantee of any of the terms thereof.\r\nSECTION 75. ACCOUNTS AND REPORTS.\r\nEvery person or corporation operating a public utility within the city limits, whether under a grant heretofore or hereafter obtained, shall keep and\r\nmaintain at some place within the city suitable and complete books of account, showing in detail the assets, financial obligation, gross revenue, net\r\nprofits and all the operations of such utility which are usually shown by a complete system of bookkeeping.\r\nEach such person or corporation, within sixty (60) days after the end of each of its fiscal years, unless the city commission shall extend the time,\r\nshall file with the city commission a report for the preceding fiscal year showing the gross revenue, the net profits, expenses or repairs, betterments\r\nand additions, amount paid for salaries, amount paid for interest and discount, other expenses or operation, and such other information, if any, as the\r\ncity commission from time to time may prescribe. If the city commission shall prescribe the form for such reports, then such reports shall be made in\r\nthe form from time to time prescribed by such commission.\r\nIt shall be the duty of each such person or corporation to furnish the city commission such supplementary or special information about its affairs as\r\nthe commission may demand; and the commission, or its authorized representative, shall at any and all reasonable times have access to all books,\r\nrecords and papers of each and every such person or corporation, with privilege of taking copies of same or any part thereof.\r\nThe duties herein prescribed may be specifically enforced by appropriate legal proceedings; and in addition, each such person or corporation, for\r\nfailure to comply with the provisions of this section, shall be liable to The city of Springfield, Ohio, in the sum of two hundred fifty dollars per day\r\nfor each day of such failure, to be recovered in a civil action in the name of the city.\r\nThe provisions of this section do not apply to any utility extending in its operations to other communities not properly suburban to The city of\r\nSpringfield, Ohio; but the city commission by ordinance may make the same, or any part thereof, applicable to the portion of any such utility\r\noperated within the limits of the city."

[[body.segments]]
kind = "plain_text"
text = "<PARSED TEXT FOR PAGE: 18 / 637>"

[[body.segments]]
kind = "plain_text"
text = "SECTION 76. GRANTS NOT INCLUDED.\r\nRevocable permits for laying spur tracks across or along streets, alleys or public grounds, to connect a railroad with any property in need of\r\nswitching facilities, shall not be regarded as a grant within the meaning of this Charter, but may be permitted in accordance with such terms and\r\nconditions as the city commission may by ordinance prescribe. Such revocable permits shall be in writing and filed with the clerk of the city\r\ncommission.\r\nSECTION 77. GENERAL PROVISIONS.\r\nNothing in this Charter contained shall be operated in any way, except as herein specifically stated, to limit the city commission in the exercise of\r\nany of its lawful powers respecting public utilities, or to prohibit the city commission from imposing in any such grant such further restrictions and\r\nprovisions as it may deem to be in the public interest, provided only that the same are not inconsistent with the provisions of this Charter or the\r\nconstitution of the state.\r\nARTICLE XII - GENERAL PROVISIONS\r\nSECTION 78. ORDINANCES CONTINUED IN FORCE.\r\nAll ordinances and resolutions in force at the time of the taking effect of this Charter, not inconsistent with its provisions, shall continue in full\r\nforce and effect until amended or repealed.\r\nSECTION 79. CONTINUANCE OF PRESENT OFFICERS.\r\nAll persons holding office at the time this Charter is adopted, shall continue in office and in the performance of their duties until provision shall\r\nhave been otherwise made in accordance with this Charter for the performance or discontinuance of the duties of any such office. When such\r\nprovision shall have been made the term of any such officer shall expire and the office be deemed abolished. The powers which are conferred and the\r\nduties which are imposed upon any officer, board or department of the city under the laws of the state, or under any city ordinance or contract in\r\nforce at the time of the taking effect of this act shall, if such office or department is abolished by this Charter, be thereafter exercised and discharged\r\nby the commission, officer, board or department upon whom are imposed corresponding functions, powers and duties by this Charter or by any\r\nordinance or resolution of the city thereafter enacted.\r\nSECTION 80. CONTINUANCE OF CONTRACTS AND VESTED RIGHTS.\r\nAll vested rights of the city shall continue to be vested and shall not in any manner be affected by the adoption of this Charter; nor shall any right or\r\nliability, or pending suit or prosecution, either in behalf of or against the city, be in any manner affected by the adoption of this Charter, unless\r\notherwise herein expressly provided to the contrary. All contracts entered into by the city or for its benefit prior to the taking effect of this Charter\r\nshall continue in full force and effect. All public work begun prior to the taking effect of this Charter shall be continued and perfected hereunder.\r\nPublic improvements for which legislative steps shall have been taken under laws in force at the time this Charter takes effect may be carried to\r\ncompletion in accordance with the provisions of such laws."

[[body.segments]]
kind = "plain_text"
text = "<PARSED TEXT FOR PAGE: 19 / 637>"

[[body.segments]]
kind = "plain_text"
text = "SECTION 81. INVESTIGATION.\r\nThe city commission, or any committee thereof, the city manager and any advisory board appointed by the commission for such purpose, shall have\r\npower at any time to cause the affairs of any department or the conduct of any officer or employee to be investigated; and for such purpose shall have\r\npower to compel the attendance of witnesses and the production of books, papers and other evidence; and for that purpose may issue subpoenas or\r\nattachments which shall be signed by the president or chairman of the body or by the officer making the investigation, and shall be served by any\r\nofficer authorized by law to serve such process. The authority making such investigation shall also have power to cause the testimony to be given\r\nunder oath to be administered by some officer authorized by general law to administer oaths; and shall also have power to punish as for contempt any\r\nperson refusing to testify to any fact within his knowledge, or to produce any books or papers under his control, relating to the matter under\r\ninvestigation.\r\nSECTION 82. OATH OF OFFICE.\r\nAll officers before taking office shall take the oath of office prescribed by law; but the oath of office of city commissioner shall be in writing and\r\nbe filed with the clerk of the city commission and shall contain the assertion that in his candidacy for nomination and election he has not violated any\r\nprovisions of Section 5 of this Charter.\r\nSECTION 83. AMENDMENT OF CHARTER.\r\nAmendments to this Charter may be submitted to the electors of the city by a two-thirds vote of the city commission, and shall be submitted to such\r\nelectorate when a petition is filed by ten percent (10%) of the registered voters in the municipality at the last regular municipal election of the city,\r\nsetting forth any such approved amendments as received by the city commission. The ordinance providing for the submission of any such\r\namendment shall require that it be submitted to the electors of the city at the next regular municipal election if one shall occur not less than sixty (60)\r\nnor more than one hundred twenty (120) days after its passage; otherwise, it shall provide for the submission of the amendment at a special election\r\nto be called and held within the time aforesaid. Not less than thirty (30) days prior to such election the clerk of the City Commission shall mail a\r\ncopy of the proposed amendment to each elector whose name appears upon the poll or registration books at the last regular municipal or general\r\nelection. If such proposed amendment is approved by a majority of the electors voting thereon, it shall become a part of the Charter at the time fixed\r\ntherein.\r\nSECTION 84. SAVING CLAUSE.\r\nIf any section\nThe file is too long and its contents have been truncated."

