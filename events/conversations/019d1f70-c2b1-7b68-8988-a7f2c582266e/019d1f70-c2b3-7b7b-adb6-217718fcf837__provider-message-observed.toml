[[body.segments]]
kind = "plain_text"
text = "SECTION 45. MANDATORY BIDDING.\r\nIn no instance shall contracts be let for any project, improvement or purchase if bids are taken which exceed the estimate for the project,\r\nimprovement or purchase contemplated by more than ten percent of the estimate. If bids for parts of the project, improvement or purchase are taken\r\nseparately, contracts for those parts which do not exceed the estimate by more than ten percent may be let. The city's finance department shall\r\nadvertise for and solicit formal bids for projects, improvements and purchases when required to do so by Sections 735.05, 735.051, 735.052 and\r\n735.053 of the Ohio Revised Code, as presently enacted and as they may be amended from time to time by the General Assembly.\r\n(Amended 11-6-90, Ord. No. 90-429, Yeas 8,768; Nays 8,532.)\r\nSECTION 46. CONTRACTS; WHEN VOID.\r\nAll contracts, agreements or other obligations entered into, and all ordinances passed, or resolutions and orders adopted, contrary to the provisions\r\nof the preceding sections shall be void.\r\nARTICLE VII - CIVIL SERVICE\r\nSECTION 47. CIVIL SERVICE COMMISSION.\r\nThe city commission shall appoint five (5) electors of the city as civil service commissioners. Members of the civil service commission shall not\r\nhold any other public office except that of notary public. Members shall be appointed to serve for a term of three (3) years and until their successors\r\nhave been appointed and qualified. Any vacancy shall be filled by the city commission for the unexpired term. The city commission may remove any\r\nmember upon stating in writing the reasons for removal and allowing him an opportunity to be heard in his own defense. The members of the\r\nexisting civil service commission shall continue in office for their appointed terms.\r\nExcept as otherwise provided herein, the civil service commission, and all matters pertaining to civil service of The City of Springfield, Ohio,\r\nshall be governed by the general laws of the state presently in effect, or hereafter enacted, which are applicable thereto. The positions of Fire Chief,\r\nPolice Chief, and all positions within the Police division above the rank of lieutenant shall be designated as unclassified and shall serve at the\r\npleasure of the appointing authority. Unclassified shall be defined as and with the same effect as is given such term in Section 124.11 of the Ohio\r\nRevised Code.\r\n(Authorizing Ord. No. 25-215; Amended 11/4/2025, Ord. No. 25-299 Yeas: 4,323; Nays: 2,537)\r\nIn the case of promotion of any person to a rank above the rank of patrolman in the police division of the city or to a rank above the rank of\r\nfirefighter in the fire division of the city, other than a promotion or appointment to the position of chief of police or fire chief in the city, such\r\npromotion shall be made only after a person has passed a competitive promotional examination. Such examination shall include an evaluation of such\r\nfactors as education, training, capacity, and knowledge. Examinations shall consist of one or more tests in any combination. Tests shall be written and\r\noral and shall be designed to fairly test the relative capacity of the persons examined to discharge the particular duties of the position for which\r\nappointment is sought. Credit for efficiency and seniority in service shall be added to the examination grade.\r\nThe number, type and weight to be given such tests in the examination process and the relative weight to be given to efficiency and seniority in\r\nservice shall be set forth by an ordinance duly adopted by the city commission.\r\n(Amended 11-8-83, Ord. No. 83-395).\r\nIn the case of appointment of any person to the classified position of police officer in the Police Division of the City, the City Manager may\r\nappoint persons who have obtained and maintained Basic Ohio Peace Officer Certification and who are employed by another jurisdiction as a police\r\nofficer, deputy sheriff, or state highway patrol officer to such position without first administering a competitive examination. In lieu of a competitive\r\nexamination, the City Manager may assess the merit and fitness of any such applicant so qualified by review of his or her record while employed in a\r\nlaw enforcement officer. The selection procedures and selection criteria applicable to such persons appointed without taking a competitive\r\nexamination shall be as set forth by an ordinance duly adopted by the City Commission.\r\n(Enacted 11-4-97, Ord. No. 97-307, Yeas 6,030; Nays 5,630.)\r\nIn the case of lateral appointment to the classified position of Firefighter-Paramedic in the Fire-Rescue Division of the City, the City Manager may\r\nappoint individuals who have obtained and maintained State of Ohio Firefighter Level II and Paramedic certification (or can be obtained through\r\nreciprocity) and who are employed by another jurisdiction as a paid Firefighter-Paramedic, without requiring participation in a competitive civil\r\nservice examination. In lieu of such examination, the City Manager may assess the merit and fitness of any such qualified applicant through review\r\nof their professional record, certifications, and relevant experience.\r\nLateral entry candidates must undergo a thorough background investigation, polygraph examination, psychological evaluation, and oral interview.\r\nA conditional offer of employment may be extended to a lateral entry candidate, subject to a complete physical examination, which must be\r\nsuccessfully passed prior to appointment.\r\nIn addition to the required certifications, lateral entry candidates must possess a minimum of one (1) year of experience, as of the date of\r\napplication, as a paid Firefighter Level II and Paramedic within a Fire and EMS agency.\r\nThe selection procedures and criteria for such appointments shall be established by ordinance duly adopted by the City Commission.\r\n(Authorizing Ord. No. 25-215; Amended 11/4/2025, Ord. No. 25-299 Yeas: 4,323; Nays: 2,537)\r\nARTICLE VIII - INITIATIVE\r\nSECTION 48. PROPOSAL PETITION.\r\nAny proposed ordinance including an ordinance for the repeal or amendment of an ordinance then in effect may be submitted to the city\r\ncommission by petition signed by at least five percent (5%) of the total number of registered voters in the municipality at the last regular municipal\r\nelection. All petitions circulated with respect to any proposed ordinance shall be uniform in character, shall contain the proposed ordinance in full,\r\nand shall have printed or written thereon the names and addresses of at least five (5) electors who shall be officially regarded as filing the petition\r\nand shall constitute a committee of the petitioners for the purpose hereinafter named.\r\nEach signer of a petition shall sign his name, address and date. The signatures to any such petition need not all be appended to one paper, but to\r\neach such paper there shall be attached an affidavit by the circulator thereof, stating the number of signers to such part of the petition and that each\r\nsignature appended to the paper is the genuine signature of the person whose name it purports to be, and that it was made in the presence of the\r\naffiant and on the date indicated.\r\nBefore any ordinance so proposed shall be submitted to the City Commission, it shall first be approved as to its form by the city law director,\r\nwhose duty it shall be to draft such proposed ordinance in proper legal language, and to render such other service to persons desiring to propose such\r\nordinance as shall be necessary to make the same proper for consideration by the City Commission.\r\nSECTION 49. TIME OF FILING."

