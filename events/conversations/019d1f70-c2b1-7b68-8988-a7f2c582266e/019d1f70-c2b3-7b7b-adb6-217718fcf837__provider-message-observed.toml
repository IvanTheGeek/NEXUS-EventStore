g of Vacancies.\r\nSec. 64. Counting the Vote.\r\nSec. 65. Effect of Resignations.\r\nSec. 66. Miscellaneous Provisions.\r\nSec. 67. Offenses Relating to Petitions.\r\nARTICLE XI - FRANCHISES\r\nSec. 68. Grants Limited.\r\nSec. 69. Period of Grants.\r\nSec. 70. Assignment."

