[[body.segments]]
kind = "plain_text"
text = "SECTION 16. RULES OF PROCEDURE; JOURNAL.\r\nThe City Commission shall determine its own rules and order of business. All meetings of the City Commission, except executive sessions, are\r\nopen to the public. The City Commission shall keep a journal open to the public of all meetings, except executive sessions, of the City Commission.\r\n(Amended 5-8-90, Ord. No. 90-148, Yeas 7,468; Nays 2,969.)\r\nSECTION 17. ORDINANCES.\r\nIn addition to such acts of the city commission as are required by statute or by this Charter to be by ordinance, every act of the city commission\r\nestablishing a fine or other penalty or providing for the expenditure of funds or for the contracting of indebtedness shall be by ordinance. The\r\nenacting clause of all ordinances shall be: \"Be it ordained by the city commission of The City of Springfield, Ohio.\"\r\nSECTION 18. ORDINANCE ENACTMENT.\r\nEach ordinance shall be introduced in written or printed form, and shall not contain more than one subject, which shall be clearly stated in the title;\r\nbut general appropriation ordinances may contain the various subjects and acts for which moneys are to be appropriated.\r\nBefore passage, each ordinance shall be read by title only at two meetings of the commission not less than one week apart. Provided, however, that\r\nupon request by two commissioners such ordinance shall be read in its entirety. Emergency ordinances need only be read once before passage and\r\nsuch reading shall be by title only. Provided, however, that such an emergency ordinance, upon request by one commissioner, shall be read in its\r\nentirety once before passage. (Amended 11-8-77.)\r\nSECTION 19. EMERGENCY MEASURES.\r\nAll ordinances and resolutions passed by the City Commission shall be in effect fourteen (14) days from and after the date of their passage, except\r\nthe City Commission may, by an affirmative vote of four (4) of its members, pass emergency measures to take effect at the time indicated therein.\r\nAn emergency measure is an ordinance or resolution for the immediate preservation of the public peace, property, health or safety or providing for\r\nthe usual daily operation of a municipal department, in which the emergency is set forth and defined in the preamble thereto.\r\nOrdinances appropriating money may be passed as emergency measures, but no measure making a grant, renewal or extension of a franchise or\r\nother special privilege, or regulating the rate to be charged for its service by any public utility, except modification or establishment of bus or transit\r\nroutes shall ever be so passed.\r\n(Amended 11-8-77.)\r\nSECTION 20. RECORD AND PUBLICATION.\r\nAfter final passage, every ordinance and resolution shall be recorded in a book kept for that purpose, and shall be authenticated by the signatures of\r\nthe presiding officer and the city clerk."

