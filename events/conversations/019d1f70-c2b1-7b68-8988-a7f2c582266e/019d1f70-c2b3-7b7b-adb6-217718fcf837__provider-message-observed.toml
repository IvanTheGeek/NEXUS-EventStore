text = "Sec. 71. Right of Purchase.\r\nSec. 72. Extension by Annexation.\r\nSec. 73. Right of Regulation.\r\nSec. 74. Forfeitures.\r\nSec. 75. Accounts and Reports.\r\nSec. 76. Grants not Included.\r\nSec. 77. General Provisions.\r\nARTICLE XII - GENERAL PROVISIONS\r\nSec. 78. Ordinances Continued in Force.\r\nSec. 79. Continuance of Present Officers.\r\nSec. 80. Continuance of Contracts and Vested Rights.\r\nSec. 81. Investigation.\r\nSec. 82. Oath of Office.\r\nSec. 83. Amendment of Charter.\r\nSec. 84. Saving Clause.\r\nSec. 85. When Charter Takes Effect.\r\nSec. 86. General Disqualifications.\r\nSec. 87. Political Activity. (5-7-02)\r\nSec. 88. Penalties.\r\nSec. 89. Meetings. (5-8-90)\r\nSec. 90. Restriction of City Commission's Urban Renewal Powers. (Repealed 5-4-71)\r\nSec. 91. Restriction of City Commission's Fair Housing Powers. (11-7-67)\r\nSec. 92. Police and Fire Divisions. (11-3-70)\r\nSec. 93. Fire Division; Fire Protection and Emergency Services Manpower. (11-6-90)\r\nSec. 94. Fees and Assessments. (5-5-87)\r\nSec. 95. Police Division; Special Assessment for Additional Personnel. (5-8-90)\r\nSec. 96. Police Division; Special Assessment for Additional Personnel. (5-2-95)\r\nSec. 97. Police Division; Special Assessment for Additional Personnel. (5-8-01)\r\nCHARTER\r\nOF THE\r\nCITY OF SPRINGFIELD, OHIO\r\nWe, the people of the City of Springfield, Ohio, in order to obtain the benefits of local self-government, to incorporate more direct and businesslike\r\nmethods in the transaction of our municipal affairs, and otherwise to promote our common welfare, do adopt the following Charter of our City.\r\nARTICLE I - INCORPORATION; FORM OF GOVERNMENT; POWERS\r\nSECTION 1. INCORPORATION.\r\nThe inhabitants of the City of Springfield, Ohio, within the corporate limits as now established or as hereafter established in the manner provided\r\nby law, shall continue to be a body politic and corporate in perpetuity under the name of \"The City of Springfield, Ohio.\"\r\nSECTION 2. FORM OF GOVERNMENT.\r\nThe municipal government provided by this Charter shall be known as the \"city commission-manager government.\" Pursuant to its provisions and\r\nsubject only to the limitations imposed by the state constitution and by this Charter, all powers of the City shall be vested in an elective city\r\ncommission, hereinafter referred to as \"the city commission,\" which shall enact local legislation, adopt budgets, determine policies, and appoint the\r\ncity manager, law director and finance director. The city manager shall execute the laws and administer the government of the city. The powers of\r\nthis municipality shall be exercised in the manner prescribed in this Charter, or to the extent not prescribed herein, then in such manner as the\r\ncommission may by ordinance determine, and when not prescribed in this Charter or determined by the Commission, such powers shall be exercised\r\nin such manner as may now or hereafter be provided by the general laws of the State of Ohio. No member of the city commission shall directly\r\ninterfere with the conduct of any departments, except at the express direction of the commission.\r\nSECTION 3. POWERS OF THE CITY.\r\nThe municipality shall have all the powers, general or special, governmental or proprietary, that may now or hereafter lawfully be possessed or\r\nexercised by municipal corporations under the constitution and laws of the State of Ohio.\r\nARTICLE II - THE CITY COMMISSION\r\nSECTION 4. NUMBER; SELECTION; TERM.\r\nThe city commission shall have five (5) members, one of whom shall be the Mayor, who shall be separately nominated and elected as Mayor,\r\nelected from the city at-large in the manner provided in Article IV of this Charter, for a term of four (4) years or until their successors have been\r\nelected and take office as provided in Section 14 herein.\r\n(Amended 5-7-02, Ord. No. 02-120, Yeas 3,105; Nays 1,265.)\r\nSECTION 5. QUALIFICATIONS.\r\nEach member of the city commission, for at least one year prior to his (her) election shall have been and during his (her) term of office shall\r\ncontinue to be a resident of the city. He (she) shall hold no other municipal employment or elective public office. If a member of the city commission\r\nshall cease to possess any of these qualifications or shall be convicted of a crime involving moral turpitude, his (her) office shall immediately become\r\nvacant.\r\n(Amended 8-7-01, Ord. No. 01-203, Yeas 1,026; Nays 998.)\r\nSECTION 6. SALARY; BOND; PENALTY FOR ABSENCE.\r\nThe annual salary of members of the city commission shall be $2,500.00 until changed by ordinance, but no such ordinance shall affect the salary\r\nof a member of the city commission during the term for which he was elected or appointed at the time of adoption of such ordinance.\r\nEach member of the city commission shall give bond in the sum of $10,000.00 with a bonding company regularly accredited to do business in the"

[[body.segments]]
