[[body.segments]]
kind = "plain_text"
text = "At least three correct copies of every ordinance of a general or permanent nature, in the form in which it has been passed shall be made available to\r\npublic inspection in the office of the city clerk and a notice describing such ordinance in brief and general terms and stating that such ordinance is\r\navailable for personal inspection at the office of the city clerk shall be published once in a newspaper of general circulation in the city within ten (10)\r\ndays after the final passage of such ordinance.\r\n(Amended 11-8-77.)\r\nARTICLE III - THE CITY MANAGER\r\nSECTION 21. POWERS AND DUTIES.\r\nThe city commission shall appoint a city manager, who shall be the administrative head of the municipal government under the direction and\r\nsupervision of the city commission, and who shall hold office at the pleasure of the city commission, and he shall have power and shall be required\r\nto:\r\n(1) Appoint and, when necessary for the good of the service, remove all officers and employees of the city except as otherwise provided by this\r\nCharter and except as he may authorize the head of a department or office to appoint and remove subordinates in such department or\r\noffice;\r\n(2) Prepare the budget annually and submit it to the commission and be responsible for its administration after adoption;\r\n(3) Prepare and submit to the commission as of the end of the fiscal year a complete report on the finances and administrative activities of the city\r\nfor the preceding year;\r\n(4) Keep the commission advised of the financial condition and future needs of the city and make such recommendations as may seem to him\r\ndesirable;\r\n(5) Perform such other duties as may be prescribed by this Charter or required of him by the commission, not inconsistent with this Charter.\r\nSECTION 22. ABSENCE OF CITY MANAGER.\r\nDuring the temporary absence or disability, the City Manager's duties shall be assumed by an employee of the city designated by the City Manager\r\nin the City Manager's journal until such time as the City Commission by resolution otherwise provides.\r\n(Amended 11-8-77.)\r\nSECTION 23. ADMINISTRATIVE DEPARTMENTS.\r\nThere shall be a Department of Finance, Department of Law, and such other departments as may be established by ordinance. The work of each\r\ndepartment may be distributed among such divisions thereof as may be established by ordinance upon the recommendation of the city manager.\r\nPending the passage of an ordinance or ordinances distributing the work of departments under the supervision and control of the city manager among\r\nspecific divisions, thereof, the city manager may establish temporary divisions.\r\nARTICLE IV - ELECTIONS\r\nSECTION 24. TIME OF HOLDING ELECTIONS.\r\nRegular municipal elections shall be held on the first Tuesday after the first Monday in November in the odd numbered years. Primary elections\r\nshall be held at the time provided by the general election laws of the state. Any matter which, by the terms of the Charter, may be submitted to the\r\nelectors of the city at any special election may be submitted at a primary election or at a regular municipal election.\r\nSECTION 25. BALLOTS.\r\nAll elections and the voting devices used therefor as provided for in this Charter shall be without party marks or designations. The names of the\r\ncandidates to be voted upon shall be rotated as to position on the voting devices in accordance with the general laws of the State of Ohio.\r\nSECTION 26. PETITIONS FOR PLACES ON PRIMARY BALLOT.\r\nCandidates for the office of city commissioner and the office of mayor shall be nominated only by a non-partisan primary election. The name of\r\nany elector of the city shall be printed upon the primary ballot for the office of city commissioner or the office of mayor if there is filed with the\r\nelection authorities a petition in accordance with the following provisions, to-wit:\r\n(a) Such petition shall state the name and place of residence of each person whose name is presented for a place upon the ballot and that such\r\nperson is a candidate for the office of city commissioner for, or the office of mayor of, The City of Springfield, Ohio. No person may\r\nbe a candidate for the office of city commissioner and the office of mayor in the same election.\r\n(b) Such petitions shall be signed by two hundred fifty (250) electors of the municipality.\r\n(c) Such petitions shall contain a provision that each signer thereto thereby pledges himself to support and vote for the candidate or candidates\r\nwhose names are therein presented for a place upon the ballot, and each elector signing a petition shall add to his signature his place\r\nof residence, with street and number, and date of signing, and may subscribe to one nomination for each of the places to be filled and\r\nno more. All signatures shall be made with ink or indelible pencil.\r\n(d) The signatures of all the petitioners need not be appended to one paper, but to each separate paper there shall be attached an affidavit of the\r\ncirculator thereof stating the number of signers thereto, that each person signed in his presence on the date mentioned, and that the\r\nsignature is that of the person whose name it purports to be.\r\n(e) Such petitions shall not be signed by any elector more than one hundred ten (110) days prior to the day of such primary election and such\r\npetition shall be filed with the election authorities not less than ninety (90) days previous to the day of such election.\r\n(f) The number of signatures which may be filed by any one candidate shall not exceed five hundred (500) in number.\r\n(Amended 5-7-02, Ord. No. 02-120, Yeas 3,105; Nays 1,265.)\r\nSECTION 27. ACCEPTANCE.\r\nAny person whose name has been submitted for candidacy by any such petition shall file his acceptance of such candidacy with the election\r\nauthorities not later than fifty-five (55) days previous to such election; otherwise, his name shall not appear upon the ballot.\r\nSECTION 28. ELECTION.\r\nThe candidates for nomination to the office of city commissioner who shall receive the greatest vote in such primary election shall be placed on the\r\nballot at the next regular municipal election in number not to exceed twice the number of vacancies in the city commission to be filled. The"

