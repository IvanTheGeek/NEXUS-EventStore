[[body.segments]]
kind = "plain_text"
text = "candidates at the regular municipal election, equal in number to the places to be filled, who shall receive the highest number of votes at such regular\r\nmunicipal election, shall be declared elected. A tie between two or more candidates for the office of city commissioner shall be decided by lot under\r\nthe direction of the election authorities, as provided by the general election laws of the state.\r\nThe candidates for nomination to the office of mayor who shall receive the two greatest number of votes shall be placed on the ballot at the next\r\nregular municipal election. The candidate who receives the greater number of votes at such regular municipal election shall be declared elected.\r\n(Amended 5-7-02, Ord. No. 02-120, Yeas 3,105; Nays 1,265.)\r\nSECTION 29. PRIMARY.\r\nShould there be filed with the proper election authorities petitions in accordance with Section 26, and acceptance filed by the persons whose names\r\nare submitted for candidacy by any such petitions in accordance with Section 27, in number not to exceed twice the number of vacancies in the\r\ncommission to be filled in the case of the office of city commissioner or, in the case of the office mayor, only one or two of such petitions, thereupon\r\nthe non-partisan primary election, provided for in Section 26, shall automatically be dispensed with and such candidates for nomination shall become\r\nthe nominees and shall be placed on the ballot for the corresponding office at the next regular municipal election.\r\n(Amended 5-7-02, Ord. No. 02-120, Yeas 3,105; Nays 1,265.)\r\nARTICLE V - TAXATION\r\nSECTION 30. TAXATION OF INCOME.\r\nThe city may tax earned income at a rate of two and one-half (2.5) percent; during such time as earned income shall be taxed by the City at an\r\naggregate rate of not less than two and one-half (2.5) percent, not less than twenty (20) percent of any and all revenues derived from a tax on income\r\nshall be used only to provide funds for the purpose of financing capital improvements, including debt service charges on notes and bonds issued for\r\ncapital improvements, of The City of Springfield, Ohio.\r\nEarned income shall mean: (1) Net profits from a business or profession, exclusive of income from intangible personal property, and (2) Payment\r\nfor work done or services performed, including wages, salaries, commissions and other compensations.\r\nCapital improvements shall mean any property or asset with an estimated useful life of five (5) years or more, including land and interests therein,\r\nand reconstructions, enlargements, and extensions thereof having an estimated life of five (5) years or more.\r\n(Amended 11-8-83, Ord. No. 83-395.)\r\nSECTION 31. TAX LIMIT.\r\nThe total tax rate which may be levied without a vote of the people for the current operating expenses of The City of Springfield upon the tax list\r\nand duplicate of property assessed and listed for taxation according to value for the tax year 1966 and each year thereafter shall not exceed 3.27 mills\r\nper dollar of assessed valuation, provided that said 3.27 mills shall be reduced in each year by that number of mills, including fractional parts thereof,\r\nwhich are levied in the respective year by the city within the ten mill limitation imposed by Article XII, Section 2, of the Ohio Constitution, for the\r\npurpose of paying interest on and principal of obligations issued without a vote of the people.\r\nThe limitation of this section of the Charter shall not operate as a limitation upon the power of the commission to levy taxes upon such other\r\nsubjects and for such other purposes as may be lawful under the Constitution and laws of the State of Ohio, nor shall this section be deemed to be a\r\nlimitation upon the power of the commission to incur indebtedness for all lawful purposes within applicable constitutional and statutory limitations.\r\nARTICLE VI - FINANCE\r\nSECTION 32. THE ESTIMATE.\r\nThe fiscal year of the city shall begin on the first day of January. On or before the first day of November of each year, the city manager shall\r\nsubmit to the city commission an estimate of the expenditures and revenues of the city departments for the ensuing year. This estimate shall be\r\ncompiled from detailed information obtained from the several departments on uniform blanks to be furnished by the city manager. The classification\r\nof the estimate of expenditures shall be as nearly uniform as possible for the main functional divisions of all departments, and shall give in parallel\r\ncolumns the following information:\r\n(a) A detailed estimate of the expense of conducting each department as submitted by the department.\r\n(b) Expenditures for corresponding items for the last two (2) fiscal years.\r\n(c) Expenditures for corresponding items for the current fiscal year, including adjustments due to transfers between appropriations plus an\r\nestimate of expenditures necessary to complete the current fiscal year.\r\n(d) Increase or decrease of requests compared with the corresponding appropriations for the current year.\r\n(e) Such other information as is required by the city commission or that the city manager may deem advisable to submit.\r\n(f) The recommendation of the city manager as to the amounts to be appropriated with reasons therefor in such detail as the city commission may\r\ndirect.\r\nSufficient copies of such estimate shall be prepared and submitted that there may be copies on file in the office of the city clerk for inspection by\r\nthe public.\r\nSECTION 33. APPROPRIATION ORDINANCE.\r\nUpon receipt of such estimate the city commission shall prepare an appropriation ordinance, but before acting upon such ordinance the city\r\ncommission shall fix a time and place for holding a public hearing upon the tentative appropriation, and shall publish a public notice of such hearing\r\nten (10) days before the hearing date. During the ensuing year the appropriation ordinance may be revised, amended and additional appropriations\r\nmade without the necessity of a public notice or hearing.\r\nSECTION 34. TRANSFER OF FUNDS.\r\nUpon request of the city manager, the city commission may transfer any part of an unencumbered balance of an appropriation to a purpose or\r\nobject for which the appropriation for the current year has proved insufficient, or may authorize a transfer to be made between items appropriated to\r\nthe same office or department."

