[[body.segments]]
kind = "plain_text"
text = "SECTION 35. UNENCUMBERED BALANCES.\r\nAt the close of each fiscal year the unencumbered balance of each appropriation shall revert to the respective fund from which it was appropriated\r\nand shall be subject to future appropriations. Any accruing revenue of the city not appropriated as hereinbefore provided and any balances at any\r\ntime remaining after the purposes of the appropriation shall have been satisfied or abandoned, may from time to time be appropriated by the city\r\ncommission to such uses as will not conflict with any uses for which specifically such revenues accrued. No money shall be drawn from the treasury\r\nof the city, nor shall any obligation for the expenditure of money be incurred, except pursuant to the appropriations made by the city commission, but\r\nnothing in this or the preceding section shall be construed to authorize the application of revenue derived from a public utility of the city to any other\r\npurpose than that of the utility from which the same was derived.\r\nSECTION 36. PAYMENT OF CLAIMS.\r\nNo warrant for the payment of any claim shall be issued by the finance director until such claim shall have been approved by the finance director,\r\nthe head of the department for which the indebtedness was incurred, the purchasing officer and the city manager, and such officers and their sureties\r\nshall be liable to the municipality for all loss or damage sustained by the municipality by reason of the unlawful approval of any such claim. Whenever any claim shall be presented to the finance director, he shall have power to require evidence that the amount claimed is justly due and is in\r\nconformity to law and ordinance, and for that purpose he may summon before him any officer, agent or employee, or any department of the\r\nmunicipality, or any other person, and examine him upon oath or affirmation relative thereto. The chief executive officer, whatever his title, and the\r\npurchasing agent, if any, for any administrative board or commission shall comply with this section.\r\nSECTION 37. CERTIFICATION OF FUNDS.\r\nNo contract or agreement or other obligation involving the expenditure of money in excess of $100.00 shall be entered into unless the finance\r\ndirector shall first certify to the city commission or to the proper officer, as the case may be, that the money required for such contract, agreement,\r\nobligation or expenditure is in the treasury to the credit of the fund from which it is to be drawn, and not appropriated for any other purpose, and a\r\ncopy of such certificate shall be filed and immediately recorded by the finance director. The sum so certified shall not thereafter be considered\r\nunencumbered until the city is discharged from such contract, agreement or obligation. The provisions of this section shall not apply to contracts or\r\nproceedings relating to improvements any part of the cost of which is to be paid by special assessments.\r\n(Amended 11-8-77, Ord. No. 77-295, Yeas 7,343; Nays 5,951.)\r\nSECTION 38. MONEY IN THE FUND.\r\nAll monies actually in the treasury to the credit of the fund from which they are to be drawn, and all monies applicable to the payment of the\r\nobligation or appropriation involved that are anticipated to come into the treasury before the maturity of such contract, agreement or obligation from\r\ntaxes, assessments, or license fees, or from sales of services, products or by-products of any city undertaking, and moneys to be derived from lawfully\r\nauthorized bonds sold and in the process of delivery, and all moneys to be derived from grants or loans made by the United States government or the\r\nstate of Ohio or any department, division, agency, authority or unit thereof to the city, for the purpose of such certificate shall be deemed in the\r\ntreasury to the credit of the appropriate fund and shall be subject to such certification.\r\n(Amended 11-8-77, Ord. No. 77-295, Yeas 7,343; Nays 5,951.)\r\nSECTION 39. FINANCIAL REPORT.\r\nThe city commission may provide by ordinance for monthly or annual financial reports by the city manager or finance director on forms prescribed\r\nby the city commission. At the end of each year the city commission shall print an annual report, giving a detailed statement of all receipts,\r\nexpenditures and liabilities of the city; a detailed comparison of such receipts, expenditures and liabilities with those of the year preceding; and a\r\nsummary of city commission and administrative operations for the previous twelve (12) months. A copy of this report shall be furnished to any\r\ncitizens of the city who may apply therefor at the office of the clerk of the city commission.\r\nSECTION 40. ASSESSMENTS.\r\nIn levying special assessments to pay any part of the cost of any public work or improvement, the city commission shall not exceed any limitation\r\nas to the amount thereof which may be prescribed by the general laws of the state applicable to municipalities and in force at the time it is\r\ndetermined by the city commission that any such work shall be done or improvement made. The city commission may, however, by ordinance,\r\nprovide different procedures for levying special assessments other than those established by the general laws of the state.\r\nSECTION 41. IMPROVEMENTS BY DIRECT LABOR.\r\nNothing in the preceding section shall be construed to prohibit the city commission from doing any public work or making any public improvement\r\nby the direct employment of the necessary labor and the purchase of the necessary supplies and materials, with separate accounting as to each\r\nimprovement so made.\r\nSECTION 42. EXPENDITURES REQUIRING CITY COMMISSION AUTHORIZATION. When an expenditure, other than the compensation of persons employed by the city, exceeds the threshold dollar amount requiring legislative\r\nauthorization established in Section 735.05 of the Ohio Revised Code, as presently enacted and as it may be amended from time to time by the\r\nGeneral Assembly, such expenditures shall first be authorized and directed by ordinance of the city commission, and no contract involving an\r\nexpenditure in excess of such sum shall be made or awarded except upon the approval of the city commission.\r\n(Amended 11-6-90, Ord. No. 90-429, Yeas 8,768; Nays 8,532.)\r\nSECTION 43. TIME OF MAKING CONTRACTS.\r\nThe city commission shall not enter into any contract which is not to go into effect during the term for which all the members of such city\r\ncommission are elected.\r\nSECTION 44. MODIFICATION OF CONTRACTS. When it becomes necessary, in the opinion of the city manager in the prosecution of any work or improvement under contract, to make alterations\r\nor modifications in such contract, such alterations or modifications, if made, shall be of no effect until the price to be paid for the work or material, or\r\nboth, under the altered or modified contract, has been agreed upon in writing and signed by the contractor and by the city manager and approved by\r\nthe city commission."

