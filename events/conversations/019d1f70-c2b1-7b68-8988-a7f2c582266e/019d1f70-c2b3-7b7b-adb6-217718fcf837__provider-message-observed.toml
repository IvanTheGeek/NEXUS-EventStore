[[body.segments]]
kind = "plain_text"
text = "State of Ohio as surety thereon, to the approval of the finance director; and the premium of each such bond shall be paid by the city.\r\nFor each absence from a regular meeting of the commission, in excess of five (5) in any calendar year, there shall be deducted a sum equal to two\r\npercent (2%) of the annual salary of such member. Absence from five (5) consecutive regular meetings shall operate to vacate the seat of a member\r\nof the city commission unless the absence is excused by the commission by resolution setting forth such excuse and entered upon the journal.\r\nSECTION 7. PRESIDING OFFICER; MAYOR.\r\nThe mayor shall be the president of the city commission, shall preside at meetings of the city commission, shall have equal voting privileges as\r\nother members of the city commission, shall exercise ceremonial functions on behalf of the city, and shall be recognized as the head of the city\r\ngovernment by the governor for purposes of military law. The mayor shall have no regular administrative duties. The mayor shall take command of\r\nthe police, and govern the city by proclamation during times of public danger or emergency, and the mayor shall be the sole determiner of what\r\nconstitutes public danger or emergency. The term of the mayor shall be four (4) years.\r\nThe city commission shall appoint one of its members, not including the mayor, to be assistant mayor. The mayor shall have a vote on this\r\nappointment. The assistant mayor shall act as mayor during the absence or disability of the mayor. Unless otherwise provided in this Charter, the\r\nterm of office of the assistant mayor shall be two (2) years.\r\n(Amended 5-7-02, Ord. No. 02-120, Yeas 3,105; Nays 1,265.)\r\nSECTION 8. POWERS.\r\nAll powers of local self-government of the city and the determination of all matters of policy shall be vested in the city commission.\r\nSECTION 9. APPOINTMENT OF CITY MANAGER.\r\nThe city commission shall appoint an officer of the city who shall have the title of city manager and shall have the powers and perform the duties\r\nin this Charter provided. He shall be chosen solely on the basis of his executive and administrative qualifications with special reference to his actual\r\nexperience in, or his knowledge of, accepted practice in respect to the duties of his office as herein set forth. At the time of his appointment, he need\r\nnot be a resident of the city or state, but during his tenure of office he shall reside within the city.\r\nSECTION 10. REMOVAL OF CITY MANAGER.\r\nThe city commission shall appoint the city manager for an indefinite term and may remove him by a majority vote of its members. If the city\r\nmanager is removed by such vote, the city commission shall cause to be paid him forthwith any unpaid balance of his salary and his salary for the\r\nnext thirty (30) days following such removal.\r\nSECTION 11. VACANCIES IN THE OFFICES OF MAYOR OR COMMISSION.\r\nVacancies in the city commission shall be filled within thirty (30) days by vote of the majority of the remaining commission members. Such\r\nperson so chosen shall serve until the next regular municipal election occurring not less than one hundred (100) days after his selection. At such\r\nelection, a successor shall be elected to serve for the unexpired term, if any; if not, for a full term.\r\nIf more than three (3) vacancies occur at one time, the remaining commissioner, if there is one, and the members of the Civil Service Commission\r\nshall, within thirty (30) days of the creation of such vacancy, by majority vote, elect such number of persons as may be necessary to create a city\r\ncommission of two (2) members. Thereafter, the remaining vacancies shall be filled as set forth in this section.\r\nIf such vacancies are not filled within the time specified, the vacancies shall be filled by lot as follows:\r\nAt the regular city commission meeting after the expiration of said thirty (30) day period, each remaining commissioner shall place in nomination\r\nthe name of a person to fill the vacancy; thereupon the city law director shall draw from the said lot a name, and such person shall be the\r\ncommissioner to fill the vacancy first created.\r\nAfter the commissioner so selected has been duly qualified and sworn into office, the then commissioners shall fill the remaining vacancies, if any,\r\nwithin fifteen (15) days by vote of the majority of such commissioners.\r\nIf the remaining vacancies are not filled within said fifteen (15) day period, they shall be filled by lot as follows:"

[[body.segments]]
