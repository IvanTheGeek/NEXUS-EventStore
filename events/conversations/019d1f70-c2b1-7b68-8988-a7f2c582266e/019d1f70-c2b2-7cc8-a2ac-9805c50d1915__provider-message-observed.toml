text = "CODIFIED ORDINANCES\nOF THE CITY OF\nSPRINGFIELD, OHIO\nLocal legislation current through April 8, 2025\nState legislation current through June 26, 2024\n \nDISCLAIMER\n   The Codified Ordinances and other documents that appear in this Folio Infobase\nmay not reflect the most current legislation adopted by the Municipality. The\nCodified Ordinances are provided for informational purposes only and should not be\nrelied upon as the definitive authority for local legislation. Additionally, the\nformatting and pagination of the posted documents vary from the formatting and\npagination of the official copy. The official printed copy of the Codified\nOrdinances should be consulted prior to any action being taken.\n   For further information regarding the official version of any portion of the\nCodified Ordinances in this Folio Infobase, please contact the Municipality\ndirectly.\n \nCONTENTS\nCODIFIED ORDINANCES OF SPRINGFIELD, OHIO\n      \nCHARTER\n      \nPART ONE -          Administrative Code\n      \nPART THREE -       Traffic Code\n      \nPART FIVE -       General Offenses Code\n      \nPART SEVEN -       Business Regulation Code\n      \nPART NINE -       Streets, Utilities and Public Services Code\n      \nPART ELEVEN -       Zoning Code\n      \nPART TWELVE      Subdivision Regulations\n      \nPART THIRTEEN -      Building Code\n \n      \nPART FIFTEEN -       Fire Prevention Code\n \n      \nPART SEVENTEEN -   Health Code\n \n \n \n \nTHE CHARTER\n \nOF THE\nCITY OF SPRINGFIELD, OHIO\n_OLE5BF279A91B37E214154-img\nAll Amendments through June 2025\nEditor’s Notations added December 2016\n \n   EDITOR'S NOTE: The Springfield Charter was originally adopted on August 26,\n1913, and was most recently adopted on November 2, 1965. Dates appearing in\nparentheses following a section heading indicate that those provisions were\nsubsequently amended, enacted, or repealed on the date given.\n \nTABLE OF CONTENTS\n \nARTICLE I - INCORPORATION; FORM OF GOVERNMENT; POWERS\n   \nSec. 1.      Incorporation.\n   \nSec. 2.      Form of Government.\n   \nSec. 3.      Powers of the City.\n \nARTICLE II - THE CITY COMMISSION\n   \nSec. 4.      Number; Selection; Term. (5-7-02)\n   \nSec. 5.      Qualifications. (8-7-01)\n   \nSec. 6.      Salary; Bond; Penalty for Absence.\n   \nSec. 7.      Presiding Officer; Mayor. (5-7-02)\n   \nSec. 8.      Powers.\n   \nSec. 9.      Appointment of City Manager.\n   \nSec. 10.   Removal of City Manager.\n   \nSec. 11.   Vacancies in the offices of Mayor or City Commission. (5-7-02)\n   \nSec. 12.   Creation of New Departments; Change of Duties.\n   \nSec. 13.   City Clerk.\n   \nSec. 14.   Meetings of the City Commission. (11-8-77)\n   \nSec. 15.   Special Meetings.\n   \nSec. 16.   Rules of Procedure; Journal. (5-8-90)\n   \nSec. 17.   Ordinances.\n   \nSec. 18.   Ordinance Enactment. (11-8-77)\n   \nSec. 19.   Emergency Measures. (11-8-77)\n   \nSec. 20.   Record and Publication. (11-8-77)\n \nARTICLE III - THE CITY MANAGER\n   \nSec. 21.   Powers and Duties.\n   \nSec. 22.   Absence of City Manager. (11-8-77)\n   \nSec. 23.   Administrative Departments.\n \nARTICLE IV - ELECTIONS\n   \nSec. 24.   Time of Holding Elections.\n   \nSec. 25.   Ballots.\n   \nSec. 26.   Petitions for Places on Primary Ballot. (5-7-02)\n   \nSec. 27.   Acceptance.\n   \nSec. 28.   Election. (5-7-02)\n   \nSec. 29.   Primary. (5-7-02)\n \nARTICLE V - TAXATION\n   \nSec. 30.   Taxation of Income. (11-8-83)\n   \nSec. 31.   Tax Limit.\n \nARTICLE VI - FINANCE\n   \nSec. 32.   The Estimate.\n   \nSec. 33.   Appropriation Ordinance.\n   \nSec. 34.   Transfer of Funds.\n   \nSec. 35.   Unencumbered Balances.\n   \nSec. 36.   Payment of Claims.\n   \nSec. 37.   Certification of Funds. (11-8-77)\n   \nSec. 38.   Money in the Fund. (11-8-77)\n   \nSec. 39.   Financial Report.\n   \nSec. 40.   Assessments.\n   \nSec. 41.   Improvements by Direct Labor.\n   \nSec. 42.   Expenditures Requiring City Commission Authorization. (11-6-90)\n   \nSec. 43.   Time of Making Contracts.\n   \nSec. 44.   Modification of Contracts.\n   \nSec. 45.   Mandatory Bidding (11-6-90)\n   \nSec. 46.   Contracts; When Void.\n \nARTICLE VII - CIVIL SERVICE\n   \nSec. 47.   Civil Service Commission. (11-4-2025)\n \nARTICLE VIII - INITIATIVE\n   \nSec. 48.   Proposal Petition.\n   \nSec. 49.   Time of Filing.\n   \nSec. 50.   Petition for Election.\n   \nSec. 51.   Time of Holding Election.\n   \nSec. 52.   Accepted Voting Device.\n   \nSec. 53.   Amendments and Repeals.\n \nARTICLE IX - REFERENDUM\n   \nSec. 54.   Petition for Referendum. (11-8-77)\n   \nSec. 55.   Proceedings Thereunder.\n   \nSec. 56.   Referendum on Initiated Ordinances; Conflict.\n   \nSec. 57.   Emergency Measures.\n   \nSec. 58.   Preliminary Action.\n \nARTICLE X - RECALL\n   \nSec. 59.   Recall Petition.\n   \nSec. 60.   Notice.\n   \nSec. 61.   Recall Election.\n   \nSec. 62.   Voting Devices.\n   \nSec. 63.   Filling of Vacancies.\n   \nSec. 64.   Counting the Vote.\n   \nSec. 65.   Effect of Resignations.\n   \nSec. 66.   Miscellaneous Provisions.\n   \nSec. 67.   Offenses Relating to Petitions.\n \nARTICLE XI - FRANCHISES\n   \nSec. 68.   Grants Limited.\n   \nSec. 69.   Period of Grants.\n   \nSec. 70.   Assignment.\n   \nSec. 71.   Right of Purchase.\n   \nSec. 72.   Extension by Annexation.\n   \nSec. 73.   Right of Regulation.\n   \nSec. 74.   Forfeitures.\n   \nSec. 75.   Accounts and Reports.\n   \nSec. 76.   Grants not Included.\n   \nSec. 77.   General Provisions.\n \nARTICLE XII - GENERAL PROVISIONS\n   \nSec. 78.   Ordinances Continued in Force.\n   \nSec. 79.   Continuance of Present Officers.\n   \nSec. 80.   Continuance of Contracts and Vested Rights.\n   \nSec. 81.   Investigation.\n   \nSec. 82.   Oath of Office.\n   \nSec. 83.   Amendment of Charter.\n   \nSec. 84.   Saving Clause.\n   \nSec. 85.   When Charter Takes Effect.\n   \nSec. 86.   General Disqualifications.\n   \nSec. 87.   Political Activity. (5-7-02)\n   \nSec. 88.   Penalties.\n   \nSec. 89.   Meetings. (5-8-90)\n   \nSec. 90.   Restriction of City Commission's Urban Renewal Powers. (Repealed 5-\n4-71)\n   \nSec. 91.   Restriction of City Commission's Fair Housing Powers. (11-7-67)\n   \nSec. 92.   Police and Fire Divisions. (11-3-70)\n   \nSec. 93.   Fire Division; Fire Protection and Emergency Services Manpower. (11-\n6-90)\n   \nSec. 94.   Fees and Assessments. (5-5-87)\n   \nSec. 95.   Police Division; Special Assessment for Additional Personnel. (5-8-\n90)\n   \nSec. 96.    Police Division; Special Assessment for Additional Personnel. (5-2-\n95)\n   \nSec. 97.   Police Division; Special Assessment for Additional Personnel. (5-8-\n01)\n \nCHARTER\nOF THE\nCITY OF SPRINGFIELD, OHIO\n   We, the people of the City of Springfield, Ohio, in order to obtain the\nbenefits of local self-government, to incorporate more direct and businesslike\nmethods in the transaction of our municipal affairs, and otherwise to promote\nour common welfare, do adopt the following Charter of our City.\nARTICLE I - INCORPORATION; FORM OF GOVERNMENT; POWERS\n \nSECTION 1. INCORPORATION.\n   The inhabitants of the City of Springfield, Ohio, within the corporate\nlimits as now established or as hereafter established in the manner provided by\nlaw, shall continue to be a body politic and corporate in perpetuity under the\nname of \"The City of Springfield, Ohio.\"\n \nSECTION 2. FORM OF GOVERNMENT.\n   The municipal government provided by this Charter shall be known as the\n\"city commission-manager government.\" Pursuant to its provisions and subject\nonly to the limitations imposed by the state constitution and by this Charter,\nall powers of the City shall be vested in an elective city commission,\nhereinafter referred to as \"the city commission,\" which shall enact local\nlegislation, adopt budgets, determine policies, and appoint the city manager,\nlaw director and finance director. The city manager shall execute the laws and\nadminister the government of the city. The powers of this municipality shall be\nexercised in the manner prescribed in this Charter, or to the extent not\nprescribed herein, then in such manner as the commission may by ordinance\ndetermine, and when not prescribed in this Charter or determined by the\nCommission, such powers shall be exercised in such manner as may now or\nhereafter be provided by the general laws of the State of Ohio. No member of\nthe city commission shall directly interfere with the conduct of any\ndepartments, except at the express direction of the commission.\n \nSECTION 3. POWERS OF THE CITY.\n   The municipality shall have all the powers, general or special, governmental\nor proprietary, that may now or hereafter lawfully be possessed or exercised by\nmunicipal corporations under the constitution and laws of the State of Ohio.\n \n \nARTICLE II - THE CITY COMMISSION\nSECTION 4. NUMBER; SELECTION; TERM.\n   The city commission shall have five (5) members, one of whom shall be the\nMayor, who shall be separately nominated and elected as Mayor, elected from the\ncity at-large in the manner provided in\nArticle IV of this Charter, for a term of four (4) years or until their\nsuccessors have been elected and take office as provided in\nSection 14 herein.\n(Amended 5-7-02, Ord. No. 02-120, Yeas 3,105; Nays 1,265.)\n \nSECTION 5. QUALIFICATIONS.\n   Each member of the city commission, for at least one year prior to his (her)\nelection shall have been and during his (her) term of office shall continue to\nbe a resident of the city. He (she) shall hold no other municipal employment or\nelective public office. If a member of the city commission shall cease to\npossess any of these qualifications or shall be convicted of a crime involving\nmoral turpitude, his (her) office shall immediately become vacant.\n(Amended 8-7-01, Ord. No. 01-203, Yeas 1,026; Nays 998.)\n \nSECTION 6. SALARY; BOND; PENALTY FOR ABSENCE.\n   The annual salary of members of the city commission shall be $2,500.00 until\nchanged by ordinance, but no such ordinance shall affect the salary of a member\nof the city commission during the term for which he was elected or appointed at\nthe time of adoption of such ordinance.\n   Each member of the city commission shall give bond in the sum of $10,000.00\nwith a bonding company regularly accredited to do business in the State of Ohio\nas surety thereon, to the approval of the finance director; and the premium of\neach such bond shall be paid by the city.\n   For each absence from a regular meeting of the commission, in excess of five\n(5) in any calendar year, there shall be deducted a sum equal to two percent\n(2%) of the annual salary of such member. Absence from five (5) consecutive\nregular meetings shall operate to vacate the seat of a member of the city\ncommission unless the absence is excused by the commission by resolution\nsetting forth such excuse and entered upon the journal.\n \nSECTION 7. PRESIDING OFFICER; MAYOR.\n   The mayor shall be the president of the city commission, shall preside at\nmeetings of the city commission, shall have equal voting privileges as other\nmembers of the city commission, shall exercise ceremonial functions on behalf\nof the city, and shall be recognized as the head of the city government by the\ngovernor for purposes of military law. The mayor shall have no regular\nadministrative duties. The mayor shall take command of the police, and govern\nthe city by proclamation during times of public danger or emergency, and the\nmayor shall be the sole determiner of what constitutes public danger or\nemergency. The term of the mayor shall be four (4) years.\n   The city commission shall appoint one of its members, not including the\nmayor, to be assistant mayor. The mayor shall have a vote on this appointment.\nThe assistant mayor shall act as mayor during the absence or disability of the\nmayor. Unless otherwise provided in this Charter, the term of office of the\nassistant mayor shall be two (2) years.\n(Amended 5-7-02, Ord. No. 02-120, Yeas 3,105; Nays 1,265.)\n \nSECTION 8. POWERS.\n   All powers of local self-government of the city and the determination of all\nmatters of policy shall be vested in the city commission.\n \nSECTION 9. APPOINTMENT OF CITY MANAGER.\n   The city commission shall appoint an officer of the city who shall have the\ntitle of city manager and shall have the powers and perform the duties in this\nCharter provided. He shall be chosen solely on the basis of his executive and\nadministrative qualifications with special reference to his actual experience\nin, or his knowledge of, accepted practice in respect to the duties of his\noffice as herein set forth. At the time of his appointment, he need not be a\nresident of the city or state, but during his tenure of office he shall reside\nwithin the city.\n \nSECTION 10. REMOVAL OF CITY MANAGER.\n   The city commission shall appoint the city manager for an indefinite term\nand may remove him by a majority vote of its members. If the city manager is\nremoved by such vote, the city commission shall cause to be paid him forthwith\nany unpaid balance of his salary and his salary for the next thirty (30) days\nfollowing such removal.\n \nSECTION 11. VACANCIES IN THE OFFICES OF MAYOR OR COMMISSION.\n   Vacancies in the city commission shall be filled within thirty (30) days by\nvote of the majority of the remaining commission members. Such person so chosen\nshall serve until the next regular municipal election occurring not less than\none hundred (100) days after his selection. At such election, a successor shall\nbe elected to serve for the unexpired term, if any; if not, for a full term.\n   If more than three (3) vacancies occur at one time, the remaining\ncommissioner, if there is one, and the members of the Civil Service Commission\nshall, within thirty (30) days of the creation of such vacancy, by majority\nvote, elect such number of persons as may be necessary to create a city\ncommission of two (2) members. Thereafter, the remaining vacancies shall be\nfilled as set forth in this section.\n   If such vacancies are not filled within the time specified, the vacancies\nshall be filled by lot as follows:\n   At the regular city commission meeting after the expiration of said thirty\n(30) day period, each remaining commissioner shall place in nomination the name\nof a person to fill the vacancy; thereupon the city law director shall draw\nfrom the said lot a name, and such person shall be the commissioner to fill the\nvacancy first created.\n   After the commissioner so selected has been duly qualified and sworn into\noffice, the then commissioners shall fill the remaining vacancies, if any,\nwithin fifteen (15) days by vote of the majority of such commissioners.\n   If the remaining vacancies are not filled within said fifteen (15) day\nperiod, they shall be filled by lot as follows:\n   At the regular city commission meeting after the expiration of said fifteen\n(15) day period, each remaining commissioner shall place in nomination the name\nor names of persons equal to the number of existing vacancies; thereupon the\ncity law director shall draw from said lot the name of such nominees equal in\nnumber to existing vacancies. The name first drawn shall be the commissioner\nfor the vacancy first created; the second name for the remaining vacancy, if\nany.\n   All such selections shall be for the terms set forth in the first paragraph\nof this\nSection 11, and all such persons shall be qualified as set forth in\nSection 5 hereof.\n   In the event there is a vacancy in the office of mayor, the assistant mayor\nshall thereafter become the mayor and shall serve in that capacity for the\nunexpired term of the mayor. The vacancy in the city commission thus created\nwould be filled as set forth previously in this section.\n(Amended 5-7-02, Ord. No. 02-120, Yeas, 3,105; Nays 1,265.)\n \nSECTION 12. CREATION OF NEW DEPARTMENTS; CHANGE OF DUTIES.\n   The city commission by ordinance may create, change and abolish offices,\ndepartments or agencies, other than the offices, departments and agencies\nestablished by this Charter. The city commission by ordinance may assign\nadditional functions or duties to offices, departments or agencies established\nby this Charter, but may not discontinue or assign to any other office,\ndepartment or agency any function or duty assigned by this Charter to a\nparticular office, department or agency.\n \nSECTION 13. CITY CLERK.\n   The city commission shall elect an officer of the city who shall have the\ntitle of city clerk, shall give notice of its meetings, shall keep the journal\nof its proceedings, shall authenticate by his signature and record in full, in\na book kept for the purpose, all ordinances and resolutions, and shall perform\nsuch other duties as shall be required by this Charter or by ordinance.\n \nSECTION 14. MEETINGS OF THE CITY COMMISSION.\n   At eight o'clock p.m. on the second day of January following a regular\nmunicipal election, or if such day be Sunday or Monday, on the day following,\nthe city commission shall meet at the usual place for holding the meetings of\nthe legislative body of the city, at which time the newly-elected commissioners\nshall assume the duties of their office. Thereafter, the city commission shall\nmeet at such times as may be prescribed by its rules, but not less than forty-\neight (48) times in any calendar year with no meeting more than two weeks\nfollowing the immediately preceding meeting.\n(Amended 11-8-77, Ord. No. 77-295, Yeas 7,343; Nays 5,951.)\n \nSECTION 15. SPECIAL MEETINGS.\n   The mayor, any two (2) members of the city commission, or the city manager,\nmay call special meetings of the city commission upon at least twelve (12)\nhours written notice to each member, served personally or left at his usual\nplace of residence.\n \nSECTION 16. RULES OF PROCEDURE; JOURNAL.\n   The City Commission shall determine its own rules and order of business. All\nmeetings of the City Commission, except executive sessions, are open to the\npublic. The City Commission shall keep a journal open to the public of all\nmeetings, except executive sessions, of the City Commission.\n(Amended 5-8-90, Ord. No. 90-148, Yeas 7,468; Nays 2,969.)\n \nSECTION 17. ORDINANCES.\n   In addition to such acts of the city commission as are required by statute\nor by this Charter to be by ordinance, every act of the city commission\nestablishing a fine or other penalty or providing for the expenditure of funds\nor for the contracting of indebtedness shall be by ordinance. The enacting\nclause of all ordinances shall be: \"Be it ordained by the city commission of\nThe City of Springfield, Ohio.\"\n \nSECTION 18. ORDINANCE ENACTMENT.\n   Each ordinance shall be introduced in written or printed form, and shall not\ncontain more than one subject, which shall be clearly stated in the title; but\ngeneral appropriation ordinances may contain the various subjects and acts for\nwhich moneys are to be appropriated.\n   Before passage, each ordinance shall be read by title only at two meetings\nof the commission not less than one week apart. Provided, however, that upon\nrequest by two commissioners such ordinance shall be read in its entirety.\nEmergency ordinances need only be read once before passage and such reading\nshall be by title only. Provided, however, that such an emergency ordinance,\nupon request by one commissioner, shall be read in its entirety once before\npassage. (Amended 11-8-77.)\n \nSECTION 19. EMERGENCY MEASURES.\n   All ordinances and resolutions passed by the City Commission shall be in\neffect fourteen (14) days from and after the date of their passage, except the\nCity Commission may, by an affirmative vote of four (4) of its members, pass\nemergency measures to take effect at the time indicated therein.\n   An emergency measure is an ordinance or resolution for the immediate\npreservation of the public peace, property, health or safety or providing for\nthe usual daily operation of a municipal department, in which the emergency is\nset forth and defined in the preamble thereto.\n   Ordinances appropriating money may be passed as emergency measures, but no\nmeasure making a grant, renewal or extension of a franchise or other special\nprivilege, or regulating the rate to be charged for its service by any public\nutility, except modification or establishment of bus or transit routes shall\never be so passed.\n(Amended 11-8-77.)\n \nSECTION 20. RECORD AND PUBLICATION.\n   After final passage, every ordinance and resolution shall be recorded in a\nbook kept for that purpose, and shall be authenticated by the signatures of the\npresiding officer and the city clerk.\n \n   At least three correct copies of every ordinance of a general or permanent\nnature, in the form in which it has been passed shall be made available to\npublic inspection in the office of the city clerk and a notice describing such\nordinance in brief and general terms and stating that such ordinance is\navailable for personal inspection at the office of the city clerk shall be\npublished once in a newspaper of general circulation in the city within ten\n(10) days after the final passage of such ordinance.\n(Amended 11-8-77.)\n \n \nARTICLE III - THE CITY MANAGER\n \nSECTION 21. POWERS AND DUTIES.\n   The city commission shall appoint a city manager, who shall be the\nadministrative head of the municipal government under the direction and\nsupervision of the city commission, and who shall hold office at the pleasure\nof the city commission, and he shall have power and shall be required to:\n   (1)   Appoint and, when necessary for the good of the service, remove all\nofficers and employees of the city except as otherwise provided by this Charter\nand except as he may authorize the head of a department or office to appoint\nand remove subordinates in such department or office;\n   (2)   Prepare the budget annually and submit it to the commission and be\nresponsible for its administration after adoption;\n   (3)   Prepare and submit to the commission as of the end of the fiscal year\na complete report on the finances and administrative activities of the city for\nthe preceding year;\n   (4)   Keep the commission advised of the financial condition and future\nneeds of the city and make such recommendations as may seem to him desirable;\n   (5)   Perform such other duties as may be prescribed by this Charter or\nrequired of him by the commission, not inconsistent with this Charter.\n \nSECTION 22. ABSENCE OF CITY MANAGER.\n   During the temporary absence or disability, the City Manager's duties shall\nbe assumed by an employee of the city designated by the City Manager in the\nCity Manager's journal until such time as the City Commission by resolution\notherwise provides.\n(Amended 11-8-77.)\n \nSECTION 23. ADMINISTRATIVE DEPARTMENTS.\n   There shall be a Department of Finance, Department of Law, and such other\ndepartments as may be established by ordinance. The work of each department may\nbe distributed among such divisions thereof as may be established by ordinance\nupon the recommendation of the city manager. Pending the passage of an\nordinance or ordinances distributing the work of departments under the\nsupervision and control of the city manager among specific divisions, thereof,\nthe city manager may establish temporary divisions.\n \n \nARTICLE IV - ELECTIONS\n \nSECTION 24. TIME OF HOLDING ELECTIONS.\n   Regular municipal elections shall be held on the first Tuesday after the\nfirst Monday in November in the odd numbered years. Primary elections shall be\nheld at the time provided by the general election laws of the state. Any matter\nwhich, by the terms of the Charter, may be submitted to the electors of the\ncity at any special election may be submitted at a primary election or at a\nregular municipal election.\n \nSECTION 25. BALLOTS.\n   All elections and the voting devices used therefor as provided for in this\nCharter shall be without party marks or designations. The names of the\ncandidates to be voted upon shall be rotated as to position on the voting\ndevices in accordance with the general laws of the State of Ohio.\n \nSECTION 26. PETITIONS FOR PLACES ON PRIMARY BALLOT.\n   Candidates for the office of city commissioner and the office of mayor shall\nbe nominated only by a non-partisan primary election. The name of any elector\nof the city shall be printed upon the primary ballot for the office of city\ncommissioner or the office of mayor if there is filed with the election\nauthorities a petition in accordance with the following provisions, to-wit:\n   (a)   Such petition shall state the name and place of residence of each\nperson whose name is presented for a place upon the ballot and that such person\nis a candidate for the office of city commissioner for, or the office of mayor\nof, The City of Springfield, Ohio. No person may be a candidate for the office\nof city commissioner and the office of mayor in the same election.\n   (b)   Such petitions shall be signed by two hundred fifty (250) electors of\nthe municipality.\n   (c)   Such petitions shall contain a provision that each signer thereto\nthereby pledges himself to support and vote for the candidate or candidates\nwhose names are therein presented for a place upon the ballot, and each elector\nsigning a petition shall add to his signature his place of residence, with\nstreet and number, and date of signing, and may subscribe to one nomination for\neach of the places to be filled and no more. All signatures shall be made with\nink or indelible pencil.\n   (d)   The signatures of all the petitioners need not be appended to one\npaper, but to each separate paper there shall be attached an affidavit of the\ncirculator thereof stating the number of signers thereto, that each person\nsigned in his presence on the date mentioned, and that the signature is that of\nthe person whose name it purports to be.\n   (e)   Such petitions shall not be signed by any elector more than one\nhundred ten (110) days prior to the day of such primary election and such\npetition shall be filed with the election authorities not less than ninety (90)\ndays previous to the day of such election.\n   (f)   The number of signatures which may be filed by any one candidate shall\nnot exceed five hundred (500) in number.\n      (Amended 5-7-02, Ord. No. 02-120, Yeas 3,105; Nays 1,265.)\n \nSECTION 27. ACCEPTANCE.\n   Any person whose name has been submitted for candidacy by any such petition\nshall file his acceptance of such candidacy with the election authorities not\nlater than fifty-five (55) days previous to such election; otherwise, his name\nshall not appear upon the ballot.\n \nSECTION 28. ELECTION.\n   The candidates for nomination to the office of city commissioner who shall\nreceive the greatest vote in such primary election shall be placed on the\nballot at the next regular municipal election in number not to exceed twice the\nnumber of vacancies in the city commission to be filled. The candidates at the\nregular municipal election, equal in number to the places to be filled, who\nshall receive the highest number of votes at such regular municipal election,\nshall be declared elected. A tie between two or more candidates for the office\nof city commissioner shall be decided by lot under the direction of the\nelection authorities, as provided by the general election laws of the state.\n   The candidates for nomination to the office of mayor who shall receive the\ntwo greatest number of votes shall be placed on the ballot at the next regular\nmunicipal election. The candidate who receives the greater number of votes at\nsuch regular municipal election shall be declared elected.\n(Amended 5-7-02, Ord. No. 02-120, Yeas 3,105; Nays 1,265.)\n \nSECTION 29. PRIMARY.\n   Should there be filed with the proper election authorities petitions in\naccordance with\nSection 26, and acceptance filed by the persons whose names are submitted for\ncandidacy by any such petitions in accordance with\nSection 27, in number not to exceed twice the number of vacancies in the\ncommission to be filled in the case of the office of city commissioner or, in\nthe case of the office mayor, only one or two of such petitions, thereupon the\nnon-partisan primary election, provided for in\nSection 26, shall automatically be dispensed with and such candidates for\nnomination shall become the nominees and shall be placed on the ballot for the\ncorresponding office at the next regular municipal election.\n(Amended 5-7-02, Ord. No. 02-120, Yeas 3,105; Nays 1,265.)\nARTICLE V - TAXATION\n \nSECTION 30. TAXATION OF INCOME.\n   The city may tax earned income at a rate of two and one-half (2.5) percent;\nduring such time as earned income shall be taxed by the City at an aggregate\nrate of not less than two and one-half (2.5) percent, not less than twenty (20)\npercent of any and all revenues derived from a tax on income shall be used only\nto provide funds for the purpose of financing capital improvements, including\ndebt service charges on notes and bonds issued for capital improvements, of The\nCity of Springfield, Ohio.\n   Earned income shall mean: (1) Net profits from a business or profession,\nexclusive of income from intangible personal property, and (2) Payment for work\ndone or services performed, including wages, salaries, commissions and other\ncompensations.\n   Capital improvements shall mean any property or asset with an estimated\nuseful life of five (5) years or more, including land and interests therein,\nand reconstructions, enlargements, and extensions thereof having an estimated\nlife of five (5) years or more.\n(Amended 11-8-83, Ord. No. 83-395.)\n \nSECTION 31. TAX LIMIT.\n   The total tax rate which may be levied without a vote of the people for the\ncurrent operating expenses of The City of Springfield upon the tax list and\nduplicate of property assessed and listed for taxation according to value for\nthe tax year 1966 and each year thereafter shall not exceed 3.27 mills per\ndollar of assessed valuation, provided that said 3.27 mills shall be reduced in\neach year by that number of mills, including fractional parts thereof, which\nare levied in the respective year by the city within the ten mill limitation\nimposed by Article XII, Section 2, of the Ohio Constitution, for the purpose of\npaying interest on and principal of obligations issued without a vote of the\npeople.\n \n   The limitation of this section of the Charter shall not operate as a\nlimitation upon the power of the commission to levy taxes upon such other\nsubjects and for such other purposes as may be lawful under the Constitution\nand laws of the State of Ohio, nor shall this section be deemed to be a\nlimitation upon the power of the commission to incur indebtedness for all\nlawful purposes within applicable constitutional and statutory limitations.\n \n \nARTICLE VI - FINANCE\n \nSECTION 32. THE ESTIMATE.\n   The fiscal year of the city shall begin on the first day of January. On or\nbefore the first day of November of each year, the city manager shall submit to\nthe city commission an estimate of the expenditures and revenues of the city\ndepartments for the ensuing year. This estimate shall be compiled from detailed\ninformation obtained from the several departments on uniform blanks to be\nfurnished by the city manager. The classification of the estimate of\nexpenditures shall be as nearly uniform as possible for the main functional\ndivisions of all departments, and shall give in parallel columns the following\ninformation:\n   (a)   A detailed estimate of the expense of conducting each department as\nsubmitted by the department.\n   (b)   Expenditures for corresponding items for the last two (2) fiscal\nyears.\n   (c)   Expenditures for corresponding items for the current fiscal year,\nincluding adjustments due to transfers between appropriations plus an estimate\nof expenditures necessary to complete the current fiscal year.\n   (d)   Increase or decrease of requests compared with the corresponding\nappropriations for the current year.\n   (e)   Such other information as is required by the city commission or that\nthe city manager may deem advisable to submit.\n   (f)   The recommendation of the city manager as to the amounts to be\nappropriated with reasons therefor in such detail as the city commission may\ndirect.\n   Sufficient copies of such estimate shall be prepared and submitted that\nthere may be copies on file in the office of the city clerk for inspection by\nthe public.\n \nSECTION 33. APPROPRIATION ORDINANCE.\n   Upon receipt of such estimate the city commission shall prepare an\nappropriation ordinance, but before acting upon such ordinance the city\ncommission shall fix a time and place for holding a public hearing upon the\ntentative appropriation, and shall publish a public notice of such hearing ten\n(10) days before the hearing date. During the ensuing year the appropriation\nordinance may be revised, amended and additional appropriations made without\nthe necessity of a public notice or hearing.\n \nSECTION 34. TRANSFER OF FUNDS.\n   Upon request of the city manager, the city commission may transfer any part\nof an unencumbered balance of an appropriation to a purpose or object for which\nthe appropriation for the current year has proved insufficient, or may\nauthorize a transfer to be made between items appropriated to the same office\nor department.\n \nSECTION 35. UNENCUMBERED BALANCES.\n   At the close of each fiscal year the unencumbered balance of each\nappropriation shall revert to the respective fund from which it was\nappropriated and shall be subject to future appropriations. Any accruing\nrevenue of the city not appropriated as hereinbefore provided and any balances\nat any time remaining after the purposes of the appropriation shall have been\nsatisfied or abandoned, may from time to time be appropriated by the city\ncommission to such uses as will not conflict with any uses for which\nspecifically such revenues accrued. No money shall be drawn from the treasury\nof the city, nor shall any obligation for the expenditure of money be incurred,\nexcept pursuant to the appropriations made by the city commission, but nothing\nin this or the preceding section shall be construed to authorize the\napplication of revenue derived from a public utility of the city to any other\npurpose than that of the utility from which the same was derived.\n \nSECTION 36. PAYMENT OF CLAIMS.\n   No warrant for the payment of any claim shall be issued by the finance\ndirector until such claim shall have been approved by the finance director, the\nhead of the department for which the indebtedness was incurred, the purchasing\nofficer and the city manager, and such officers and their sureties shall be\nliable to the municipality for all loss or damage sustained by the municipality\nby reason of the unlawful approval of any such claim. Whenever any claim shall\nbe presented to the finance director, he shall have power to require evidence\nthat the amount claimed is justly due and is in conformity to law and\nordinance, and for that purpose he may summon before him any officer, agent or\nemployee, or any department of the municipality, or any other person, and\nexamine him upon oath or affirmation relative thereto. The chief executive\nofficer, whatever his title, and the purchasing agent, if any, for any\nadministrative board or commission shall comply with this section.\n \nSECTION 37. CERTIFICATION OF FUNDS.\n   No contract or agreement or other obligation involving the expenditure of\nmoney in excess of $100.00 shall be entered into unless the finance director\nshall first certify to the city commission or to the proper officer, as the\ncase may be, that the money required for such contract, agreement, obligation\nor expenditure is in the treasury to the credit of the fund from which it is to\nbe drawn, and not appropriated for any other purpose, and a copy of such\ncertificate shall be filed and immediately recorded by the finance director.\nThe sum so certified shall not thereafter be considered unencumbered until the\ncity is discharged from such contract, agreement or obligation. The provisions\nof this section shall not apply to contracts or proceedings relating to\nimprovements any part of the cost of which is to be paid by special\nassessments.\n(Amended 11-8-77, Ord. No. 77-295, Yeas 7,343; Nays 5,951.)\n \nSECTION 38. MONEY IN THE FUND.\n   All monies actually in the treasury to the credit of the fund from which\nthey are to be drawn, and all monies applicable to the payment of the\nobligation or appropriation involved that are anticipated to come into the\ntreasury before the maturity of such contract, agreement or obligation from\ntaxes, assessments, or license fees, or from sales of services, products or by-\nproducts of any city undertaking, and moneys to be derived from lawfully\nauthorized bonds sold and in the process of delivery, and all moneys to be\nderived from grants or loans made by the United States government or the state\nof Ohio or any department, division, agency, authority or unit thereof to the\ncity, for the purpose of such certificate shall be deemed in the treasury to\nthe credit of the appropriate fund and shall be subject to such certification.\n(Amended 11-8-77, Ord. No. 77-295, Yeas 7,343; Nays 5,951.)\n \nSECTION 39. FINANCIAL REPORT.\n   The city commission may provide by ordinance for monthly or annual financial\nreports by the city manager or finance director on forms prescribed by the city\ncommission. At the end of each year the city commission shall print an annual\nreport, giving a detailed statement of all receipts, expenditures and\nliabilities of the city; a detailed comparison of such receipts, expenditures\nand liabilities with those of the year preceding; and a summary of city\ncommission and administrative operations for the previous twelve (12) months. A\ncopy of this report shall be furnished to any citizens of the city who may\napply therefor at the office of the clerk of the city commission.\n \nSECTION 40. ASSESSMENTS.\n   In levying special assessments to pay any part of the cost of any public\nwork or improvement, the city commission shall not exceed any limitation as to\nthe amount thereof which may be prescribed by the general laws of the state\napplicable to municipalities and in force at the time it is determined by the\ncity commission that any such work shall be done or improvement made. The city\ncommission may, however, by ordinance, provide different procedures for levying\nspecial assessments other than those established by the general laws of the\nstate.\n \nSECTION 41. IMPROVEMENTS BY DIRECT LABOR.\n   Nothing in the preceding section shall be construed to prohibit the city\ncommission from doing any public work or making any public improvement by the\ndirect employment of the necessary labor and the purchase of the necessary\nsupplies and materials, with separate accounting as to each improvement so\nmade.\n \nSECTION 42. EXPENDITURES REQUIRING CITY COMMISSION AUTHORIZATION.\n   When an expenditure, other than the compensation of persons employed by the\ncity, exceeds the threshold dollar amount requiring legislative authorization\nestablished in Section 735.05 of the Ohio Revised Code, as presently enacted\nand as it may be amended from time to time by the General Assembly, such\nexpenditures shall first be authorized and directed by ordinance of the city\ncommission, and no contract involving an expenditure in excess of such sum\nshall be made or awarded except upon the approval of the city commission.\n(Amended 11-6-90, Ord. No. 90-429, Yeas 8,768; Nays 8,532.)\n \nSECTION 43. TIME OF MAKING CONTRACTS.\n   The city commission shall not enter into any contract which is not to go\ninto effect during the term for which all the members of such city commission\nare elected.\n \nSECTION 44. MODIFICATION OF CONTRACTS.\n   When it becomes necessary, in the opinion of the city manager in the\nprosecution of any work or improvement under contract, to make alterations or\nmodifications in such contract, such alterations or modifications, if made,\nshall be of no effect until the price to be paid for the work or material, or\nboth, under the altered or modified contract, has been agreed upon in writing\nand signed by the contractor and by the city manager and approved by the city\ncommission.\n \nSECTION 45. MANDATORY BIDDING.\n   In no instance shall contracts be let for any project, improvement or\npurchase if bids are taken which exceed the estimate for the project,\nimprovement or purchase contemplated by more than ten percent of the estimate.\nIf bids for parts of the project, improvement or purchase are taken separately,\ncontracts for those parts which do not exceed the estimate by more than ten\npercent may be let. The city's finance department shall advertise for and\nsolicit formal bids for projects, improvements and purchases when required to\ndo so by Sections 735.05, 735.051, 735.052 and 735.053 of the Ohio Revised\nCode, as presently enacted and as they may be amended from time to time by the\nGeneral Assembly.\n(Amended 11-6-90, Ord. No. 90-429, Yeas 8,768; Nays 8,532.)\n \nSECTION 46. CONTRACTS; WHEN VOID.\n   All contracts, agreements or other obligations entered into, and all\nordinances passed, or resolutions and orders adopted, contrary to the\nprovisions of the preceding sections shall be void.\n \n \nARTICLE VII - CIVIL SERVICE\n \nSECTION 47. CIVIL SERVICE COMMISSION.\n   The city commission shall appoint five (5) electors of the city as civil\nservice commissioners. Members of the civil service commission shall not hold\nany other public office except that of notary public. Members shall be\nappointed to serve for a term of three (3) years and until their successors\nhave been appointed and qualified. Any vacancy shall be filled by the city\ncommission for the unexpired term. The city commission may remove any member\nupon stating in writing the reasons for removal and allowing him an opportunity\nto be heard in his own defense. The members of the existing civil service\ncommission shall continue in office for their appointed terms.\n      Except as otherwise provided herein, the civil service commission, and\nall matters pertaining to civil service of The City of Springfield, Ohio, shall\nbe governed by the general laws of the state presently in effect, or hereafter\nenacted, which are applicable thereto. The positions of Fire Chief, Police\nChief, and all positions within the Police division above the rank of\nlieutenant shall be designated as unclassified and shall serve at the pleasure\nof the appointing authority. Unclassified shall be defined as and with the same\neffect as is given such term in Section 124.11 of the Ohio Revised Code.\n(Authorizing Ord. No. 25-215; Amended 11/4/2025, Ord. No. 25-299 Yeas: 4,323;\nNays: 2,537)\n      In the case of promotion of any person to a rank above the rank of\npatrolman in the police division of the city or to a rank above the rank of\nfirefighter in the fire division of the city, other than a promotion or\nappointment to the position of chief of police or fire chief in the city, such\npromotion shall be made only after a person has passed a competitive\npromotional examination. Such examination shall include an evaluation of such\nfactors as education, training, capacity, and knowledge. Examinations shall\nconsist of one or more tests in any combination. Tests shall be written and\noral and shall be designed to fairly test the relative capacity of the persons\nexamined to discharge the particular duties of the position for which\nappointment is sought. Credit for efficiency and seniority in service shall be\nadded to the examination grade.\n      The number, type and weight to be given such tests in the examination\nprocess and the relative weight to be given to efficiency and seniority in\nservice shall be set forth by an ordinance duly adopted by the city commission.\n(Amended 11-8-83, Ord. No. 83-395).\n      In the case of appointment of any person to the classified position of\npolice officer in the Police Division of the City, the City Manager may appoint\npersons who have obtained and maintained Basic Ohio Peace Officer Certification\nand who are employed by another jurisdiction as a police officer, deputy\nsheriff, or state highway patrol officer to such position without first\nadministering a competitive examination. In lieu of a competitive examination,\nthe City Manager may assess the merit and fitness of any such applicant so\nqualified by review of his or her record while employed in a law enforcement\nofficer. The selection procedures and selection criteria applicable to such\npersons appointed without taking a competitive examination shall be as set\nforth by an ordinance duly adopted by the City Commission.\n(Enacted 11-4-97, Ord. No. 97-307, Yeas 6,030; Nays 5,630.)\n   In the case of lateral appointment to the classified position of\nFirefighter-Paramedic in the Fire-Rescue Division of the City, the City Manager\nmay appoint individuals who have obtained and maintained State of Ohio\nFirefighter Level II and Paramedic certification (or can be obtained through\nreciprocity) and who are employed by another jurisdiction as a paid\nFirefighter-Paramedic, without requiring participation in a competitive civil\nservice examination. In lieu of such examination, the City Manager may assess\nthe merit and fitness of any such qualified applicant through review of their\nprofessional record, certifications, and relevant experience.\n   Lateral entry candidates must undergo a thorough background investigation,\npolygraph examination, psychological evaluation, and oral interview. A\nconditional offer of employment may be extended to a lateral entry candidate,\nsubject to a complete physical examination, which must be successfully passed\nprior to appointment.\n   In addition to the required certifications, lateral entry candidates must\npossess a minimum of one (1) year of experience, as of the date of application,\nas a paid Firefighter Level II and Paramedic within a Fire and EMS agency.\n   The selection procedures and criteria for such appointments shall be\nestablished by ordinance duly adopted by the City Commission.\n(Authorizing Ord. No. 25-215; Amended 11/4/2025, Ord. No. 25-299 Yeas: 4,323;\nNays: 2,537)\n \nARTICLE VIII - INITIATIVE\n \nSECTION 48. PROPOSAL PETITION.\n   Any proposed ordinance including an ordinance for the repeal or amendment of\nan ordinance then in effect may be submitted to the city commission by petition\nsigned by at least five percent (5%) of the total number of registered voters\nin the municipality at the last regular municipal election. All petitions\ncirculated with respect to any proposed ordinance shall be uniform in\ncharacter, shall contain the proposed ordinance in full, and shall have printed\nor written thereon the names and addresses of at least five (5) electors who\nshall be officially regarded as filing the petition and shall constitute a\ncommittee of the petitioners for the purpose hereinafter named.\n   Each signer of a petition shall sign his name, address and date. The\nsignatures to any such petition need not all be appended to one paper, but to\neach such paper there shall be attached an affidavit by the circulator thereof,\nstating the number of signers to such part of the petition and that each\nsignature appended to the paper is the genuine signature of the person whose\nname it purports to be, and that it was made in the presence of the affiant and\non the date indicated.\n   Before any ordinance so proposed shall be submitted to the City Commission,\nit shall first be approved as to its form by the city law director, whose duty\nit shall be to draft such proposed ordinance in proper legal language, and to\nrender such other service to persons desiring to propose such ordinance as\nshall be necessary to make the same proper for consideration by the City\nCommission.\n \nSECTION 49. TIME OF FILING.\n   All papers comprising a petition shall be assembled and filed with the clerk\nof the city commission as one instrument, within one hundred twenty days from\nthe date of the first signature thereon, and when so filed the clerk shall\nsubmit the same to the city commission at its next regular meeting and\nprovision shall be made for public hearings upon the proposed ordinance within\nten (10) days from the time said petition was presented to the city commission.\n \nSECTION 50. PETITION FOR ELECTION.\n   The city commission shall at once proceed to consider such petition and\nshall take final action thereon within thirty (30) days from the date of\nsubmission. If the city commission rejects the proposed ordinance, or passes it\nin a different form from that set forth in the petition, or fails to act\nfinally upon it within the time stated, the committee of the petitioners by\nwritten demand filed with clerk of the city commission not later than twenty\n(20) days after final action or inaction by the city commission, may require\nthat the proposed ordinance be submitted to a vote of the electors in its\noriginal form, if, with or prior to such demand, a petition for such election,\nsigned after the final action for inaction of the city commission is filed with\nsuch clerk bearing additional signatures of five percent (5%) of the registered\nvoters of the city at the last election, none of whom were signers of the first\npetition. Such clerk shall forthwith cause notice of the filing of such demand\nand petition to be published in some newspaper of general circulation in the\nCity, and shall also within five (5) days certify to the officers having\ncontrol of elections the proposed ordinances, stating whether or not a special\nelection is demanded in the petitions, the percentage of registered voters at\nthe last municipal election who signed the two petitions in the aggregate, and\nthe date on which he published the notice last mentioned.\n \nSECTION 51. TIME OF HOLDING ELECTION.\n   If an election is to be held not more than ninety (90) days nor less than\nthirty (30) days after the publication of such notice by the clerk, such\nproposed ordinance shall be submitted to a vote of the electors at such\nelection. If no election is to be held within the time aforesaid, the election\nofficers shall provide for submitting the proposed ordinance to the electors at\na special election to be held no later than sixty (60) days nor earlier than\nthirty (30) days after the publication of such notice, if the petition for such\nordinance and the petition for such election so demand, and if the signers of\nthe two petitions amount in the aggregate to at least twenty-five percent (25%)\nof the registered voters in the municipality at the last regular municipal\nelection. At least ten (10) days before any such election the clerk of the city\ncommission shall cause such proposed ordinance to be published.\n \nSECTION 52. ACCEPTED VOTING DEVICE.\n   The voting devices approved by the general laws of the State of Ohio used\nwhen voting upon any such proposed ordinance shall clearly state the title of\nthe ordinance to be voted on, and shall provide for a vote \"For\" and \"Against\"\nthe ordinance. If a majority of the electors voting on any such proposed\nordinance shall vote in favor thereof, it shall thereupon become an ordinance\nof the city.\n \nSECTION 53. AMENDMENTS AND REPEALS.\n   No ordinance adopted by an electoral vote can be replaced or amended except\nby an electoral vote. But an ordinance to repeal or amend any such ordinance\nmay, by resolution of the city commission, be submitted to an electoral vote at\nany regular election or at any special municipal election called for some other\npurpose, provided notice of the intention so to do be published by the city\ncommission not more than sixty (60) nor less than thirty (30) days prior to\nsuch election, in the manner required for the publication of ordinances. If an\namendment is so proposed, such notice shall contain the proposed amendment in\nfull. Such submission shall be in the same manner, and the vote shall have the\nsame effect, as in cases of ordinances submitted to an election by popular\npetition. Such ordinance to be voted upon shall be published in the manner\nprovided by\nSection 20 hereof.\n \nARTICLE IX - REFERENDUM\n \nSECTION 54. PETITION FOR REFERENDUM.\n   No ordinance passed by the city commission, unless it be an emergency\nmeasure or the annual appropriation ordinance, shall go into effect until\nfourteen (14) days after its final passage. If, at any time within said\nfourteen (14) days, a petition signed by ten percent (10%) of the total number\nof registered voters in the municipality at the last regular municipal election\nbe filed with the clerk of the city commission, requesting that any such\nordinance be repealed or amended as stated in the petition, it shall not become\noperative until the steps indicated herein have been taken. Such petition shall\nhave stated therein the names and addresses of at least five (5) electors as a\ncommittee to represent the petitioners.\n   Referendum petitions need not contain the text of the ordinance or\nordinances the repeal of which is sought, but shall contain the proposed\namendment, if an amendment is demanded, and shall be subject in all other\nrespects to the requirements for petitions submitting proposed ordinances to\nthe City Commission. Voting devices used in referendum elections shall conform\nin all respects to those provided for in\nSection 52 of this Charter.\n(Amended 11-8-77, Ord. No. 77-295, Yeas 7,343; Nays 5,951.)\n \nSECTION 55. PROCEEDINGS THEREUNDER.\n   The clerk of the city commission shall, at its next meeting, present the\npetition to the city commission, which shall proceed to reconsider the\nordinance. If, within thirty (30) days after the filing of such petition, the\nordinance be not repealed or amended as requested, the city commission shall\nprovide for submitting the proposed repeal or amendment to a vote of the\nelectors provided a majority of the committee named in the petition to\nrepresent the petitioners shall, by writing filed with the clerk of the city\ncommission within twenty (20) days after the expiration of the said thirty (30)\ndays, so require. In so doing the city commission shall be governed by the\nprovisions of\nSection 50 hereof respecting the time of submission and the manner of voting on\nordinances proposed to the city commission by petition; excepting that the\nquestion of calling a special election for such purpose shall be determined by\nthe demand and number of signers of the petition requesting the repeal or\namendment of such ordinance, which number shall be twenty-five percent (25%) of\nthe registered voters in the municipality at the last regular municipal\nelection; and excepting further that the city commission may call, and fix the\ntime for, a special election for such purpose, if in its judgment the public\ninterest will be prejudiced by delay.\n   If, when submitted to a vote of the electors, such repeal or amendment be\napproved by a majority of those voting thereon, it shall thereupon go into\neffect as an ordinance of the city; but, if any such amendment is clearly\nseparable from the remainder of the ordinance and does not materially affect\nthe other provisions of such ordinance, all sections of the ordinance except\nthat sought to be amended and those dependent thereon shall take effect as\nthough no referendum of any portion of the ordinance had been demanded.\n \nSECTION 56. REFERENDUM ON INITIATED ORDINANCES; CONFLICT.\n   Ordinances submitted to the city commission by initiative petition and\npassed by the city commission without change, or passed in an amended form and\nnot required to be submitted to a vote of the electors by the committee of the\npetitioners, shall be subject to the referendum in the same manner as other\nordinances. If the provisions of two or more ordinances adopted or approved at\nthe same election conflict, the ordinance receiving the highest affirmative\nvote shall prevail.\n \nSECTION 57. EMERGENCY MEASURES.\n   Ordinances passed as emergency measures shall be subject to referendum in\nlike manner as other ordinances, except that they shall go into effect at the\ntime indicated in such ordinances. If, when submitted to a vote of the\nelectors, an emergency measure be not approved by a majority of those voting\nthereon, it shall be considered repealed as regards any further action\nthereunder; but such measure so repealed shall be deemed sufficient authority\nfor payment in accordance with the ordinance of any expense incurred previous\nto the referendum vote thereon.\n \nSECTION 58. PRELIMINARY ACTION.\n   In case a petition be filed requiring that a measure passed by the city\ncommission providing for an expenditure of money, a bond issue, or a public\nimprovement be submitted to a vote of the electors, all steps preliminary to\nsuch actual issuance of bonds, or actual execution of a contract for such\nimprovement, may be taken prior to the election.\n \n \nARTICLE X - RECALL\n \nSECTION 59. RECALL PETITION.\n   Any or all members of the city commission may be removed from office by the\nelectors by the following procedure:\n   A petition for the recall of the commissioner or commissioners designated,\nsigned by at least five hundred (500) of the electors of the city, and\ncontaining a statement in not more than two hundred (200) words of the grounds\nof the recall, shall be filed with the clerk of the city commission, who shall\nforthwith notify the commissioner or commissioners sought to be removed, and he\nor they, within five (5) days after such notice, may file with such clerk of\nthe city commission a defensive statement in not exceeding two hundred (200)\nwords. The clerk of the city commission shall at once, upon expiration of said\nfive (5) days, cause sufficient printed or typewritten copies of such petition,\nwithout the signatures, to be made, and to each of them he shall attach a\nprinted or typewritten copy of such defensive statement, if one is furnished\nhim within the time provided. The clerk of the city commission shall cause one\ncopy of such petition to be placed on file in the said clerk's office, and\nprovide facilities for the public signing the same, and shall also cause one\ncopy to be placed in each of the several fire engine houses of the City, where\nthe same shall be in the custody of the officer in charge of the house, who\nshall provide facilities for the public signing the same. The clerk of the city\ncommission shall immediately cause notice to be published in some newspaper of\ngeneral circulation in the city of the placing of such copies of such petition.\n   Such copies of such petition shall remain on file in the several places\ndesignated for the period of thirty (30) days, during which time any of them\nmay be signed by any registered voter in the municipality, but not by agent or\nattorney.\n \nSECTION 60. NOTICE.\n   At the expiration of said period of thirty (30) days, the clerk of the city\ncommission shall assemble all of said copies in his office as one instrument\nand shall examine the same and ascertain and certify thereon whether the\nsignatures thereto amount to at least fifteen percent (15%) of the registered\nvoters in the municipality at the last regular municipal election of the city.\nIf such signatures do amount to such percent, he shall at once serve notice of\nthat fact upon the commissioner or commissioners designated in the petition,\nand also deliver to the election authorities a copy of the original petition\nwith his certificate as to the percentage of registered voters who signed the\nsame, and a certificate as to the date of his last mentioned notice to the\ncommissioner or commissioners designated in the petition.\n \nSECTION 61. RECALL ELECTION.\n   If the commissioner or commissioners, or any of them, designated in the\npetition file with the clerk of the city commission within five (5) days after\nthe last mentioned notice from the said clerk of the city commission his or\ntheir written resignation, the clerk of the city commission shall at once\nnotify the election authorities of that fact; and such resignation shall be\nirrevocable, and the city commission shall proceed to fill the vacancy. In the\nabsence of any such resignation, the election authorities shall forthwith order\nand fix a day for holding a recall election for the removal of those not\nresigning. Any such election shall be held not less than thirty (30) nor more\nthan sixty (60) days after the expiration of the period of five (5) days last\nmentioned, and at the same time as any other general or special election held\nwithin such period; but if no such election be held within such period, the\nelection authorities shall call a special recall election to be held within the\nperiod aforesaid.\n \nSECTION 62. VOTING DEVICES.\n   The voting devices used at such recall election shall conform to the\nfollowing requirements. With respect to each person whose removal is sought,\nthe question shall be submitted: \"Shall (name of person) be removed from the\noffice of city commission by recall?\" Adjacent to each such question, there\nshall be clearly indicated a place for those voting in favor of the recall of\nthe person in question and there shall also be clearly indicated a place for\nthose voting against the recall of the person in question.\n \nSECTION 63. FILLING OF VACANCIES.\n   In any such election, if a majority of the votes cast on the question of\nremoval of any commissioner are affirmative, the person whose removal is sought\nshall thereupon be deemed removed from office upon the announcement of the\nofficial canvass of that election, and the vacancy caused by such recall shall\nbe filled by the remainder of the city commission according to the provisions\nof\nSection 11 of this Charter.\n   If, however, an election is held for the recall of more than two (2)\ncommissioners, candidates to succeed them for their unexpired terms shall be\nvoted upon at the same election, and shall be nominated without primary\nelection, by petitions signed, dated and verified in the manner required for\npetitions presenting names of candidates for nomination at a primary election,\nand similar in form to such petitions, but signed by electors equal in number\nto at least five percent (5%) of the registered voters in the municipality at\nthe last regular municipal election of the city, and filed with the election\nauthorities at least thirty (30) days prior to such recall election. But no\nsuch nominating petition shall be signed or circulated until after the time has\nexpired for signing the copies of the petition for the recall, and any\nsignatures thereon antedating such time shall not be counted.\n \nSECTION 64. COUNTING THE VOTE.\n   Candidates shall not be nominated to succeed any particular commissioner;\nbut if only one commissioner is removed at such election, the candidate at such\nelection receiving the highest number of votes shall be declared elected to\nfill the vacancy; and if more than one commissioner is removed at such\nelection, such candidates equal in number to the number of commissioners\nremoved shall be declared elected to fill the vacancies; and among the\nsuccessful candidates, those receiving the greater number of votes shall be\ndeclared elected for the longer terms. Cases of ties, and all other matters not\nherein specially provided for, shall be determined by the rules governing\nelections generally.\n \nSECTION 65. EFFECT OF RESIGNATIONS.\n   No proceedings for the recall of all of the members of the city commission\nat the same election shall be defeated in whole or in part by the resignation\nof any or all of them, but upon the resignation of any of them the city\ncommission shall have power to fill the vacancy until a successor is elected,\nand the proceedings for the recall and the election of successors shall\ncontinue and have the same effect as though there had been no resignation.\n \nSECTION 66. MISCELLANEOUS PROVISIONS.\n   Except as herein otherwise provided, no petition to recall any commissioner\nshall be filed within six (6) months after he takes office. No person removed\nby recall shall be eligible to be elected or appointed to the city commission\nfor a period of two (2) years after the date of such recall. The clerk of the\ncity commission shall preserve in his office all papers comprising or connected\nwith a petition for a recall for a period of one (1) year after the same were\nfiled. The method of removal herein provided is in addition to such other\nmethods as are or may be provided by general law.\n \nSECTION 67. OFFENSES RELATING TO PETITIONS.\n   No person shall falsely impersonate another, or purposely write his name or\nresidence falsely, in the signing of any petition for initiative, referendum,\nor recall, or forge any name thereto, or sign any such paper with knowledge\nthat he is not a qualified elector of the municipality. No person shall sign,\nor knowingly permit to be signed, any petition for recall at any place other\nthan one of the places hereinbefore designated for the signing of such\npetitions. Nor shall any person employ or pay another, or accept employment or\npayment, for circulating any initiative or referendum petition upon the basis\nof the number of signatures procured thereto. Any person violating any of the\nprovisions of this section shall be deemed guilty of a misdemeanor and shall,\nupon conviction, be fined in a sum not to exceed one hundred dollars and the\ncosts of prosecution. The foregoing provisions shall not be held to be\nexclusive of, but in addition to, all laws of the State prescribing penalties\nfor the same offenses or for other offenses relating to the same matter.\n \n \nARTICLE XI - FRANCHISES\n \nSECTION 68. GRANTS LIMITED.\n   No grant, or renewal thereof, to construct and operate a public utility in\nthe streets and public grounds of the city shall be made by the city commission\nto any individual, company or corporation in violation of any of the\nlimitations contained in this Charter.\n \nSECTION 69. PERIOD OF GRANTS.\n   No such grant shall be exclusive, nor shall it be made for a longer period\nthan twenty (20) years. No such grant shall be renewed earlier than two (2)\nyears prior to its expiration unless the city commission shall by vote of at\nleast four (4) of its members first declare by ordinance its intention of\nconsidering a renewal thereof. All grants of the right to make extensions of\nany public utility shall be subject as far as practicable to the terms of the\noriginal grant and shall expire therewith.\n \nSECTION 70. ASSIGNMENT.\n   No such grant shall be leased, assigned or otherwise alienated except with\nthe express consent of the city commission.\n \nSECTION 71. RIGHT OF PURCHASE.\n   All such grants shall reserve to the city the right to purchase or lease all\nthe property of the utility used in or useful for the operation of the utility,\nat a price either fixed in the ordinance making the grant, or to be fixed in\nthe manner provided by such ordinance, which price shall in no event include\nany value for the grant. Nothing, in such ordinance, shall prevent the city\nfrom acquiring such property by condemnation proceedings or in any other lawful\nmode, which rights shall be in addition to those reserved in such ordinance.\nUpon the acquisition of such property by purchase, condemnation or otherwise,\nall grants shall at once terminate.\n \nSECTION 72. EXTENSION BY ANNEXATION.\n   It shall be provided in every such grant that upon the annexation of any\nterritory to the city the portion of any such utility that may be located\nwithin such annexed territory and upon the streets, alleys or public grounds\nthereof, shall thereafter be subject to all the terms of the grant as though it\nwere an extension made thereunder.\n \nSECTION 73. RIGHT OF REGULATION.\n   All grants shall be subject to the right of the city, whether in terms\nreserved or not, to control at all times the distribution of space in, over,\nunder or across all streets, alleys or public grounds occupied by public\nutility fixtures, and, when in the opinion of the city commission the public\ninterest so requires, such fixtures may be caused to be reconstructed,\nrelocated, altered or discontinued; and said city shall at all times have the\npower to pass all regulatory ordinances affecting such utilities which in the\nopinion of the city commission are required in the interest of the public\nhealth, safety or accommodation.\n \nSECTION 74. FORFEITURES.\n   If any action shall be instituted or prosecuted directly or indirectly by\nthe grantee of any such grant, or by its stockholders or creditors, to set\naside or have declared void any of the terms of any such grant, the whole of\nsuch grant may be thereupon forfeited and annulled at the option of the city\ncommission to be expressed by ordinance. All such grants shall make provision\nfor the declaration of a forfeiture by the city commission for the violation by\nthe grantee of any of the terms thereof.\n \nSECTION 75. ACCOUNTS AND REPORTS.\n   Every person or corporation operating a public utility within the city\nlimits, whether under a grant heretofore or hereafter obtained, shall keep and\nmaintain at some place within the city suitable and complete books of account,\nshowing in detail the assets, financial obligation, gross revenue, net profits\nand all the operations of such utility which are usually shown by a complete\nsystem of bookkeeping.\n   Each such person or corporation, within sixty (60) days after the end of\neach of its fiscal years, unless the city commission shall extend the time,\nshall file with the city commission a report for the preceding fiscal year\nshowing the gross revenue, the net profits, expenses or repairs, betterments\nand additions, amount paid for salaries, amount paid for interest and discount,\nother expenses or operation, and such other information, if any, as the city\ncommission from time to time may prescribe. If the city commission shall\nprescribe the form for such reports, then such reports shall be made in the\nform from time to time prescribed by such commission.\n   It shall be the duty of each such person or corporation to furnish the city\ncommission such supplementary or special information about its affairs as the\ncommission may demand; and the commission, or its authorized representative,\nshall at any and all reasonable times have access to all books, records and\npapers of each and every such person or corporation, with privilege of taking\ncopies of same or any part thereof.\n   The duties herein prescribed may be specifically enforced by appropriate\nlegal proceedings; and in addition, each such person or corporation, for\nfailure to comply with the provisions of this section, shall be liable to The\ncity of Springfield, Ohio, in the sum of two hundred fifty dollars per day for\neach day of such failure, to be recovered in a civil action in the name of the\ncity.\n   The provisions of this section do not apply to any utility extending in its\noperations to other communities not properly suburban to The city of\nSpringfield, Ohio; but\nThe file is too long and its contents have been truncated."

