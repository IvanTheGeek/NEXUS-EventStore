text = "# 【0†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn5file0\nMclick Target: \"5:0\"\nContent Snippet:\n(24)    Projection\n   Any part of a building such as architectural features which protrude into\nthe required yard or yards.\n      (25)    Property Line.\n         See Lot Line.\n      (26)    Property\n   A piece of real property or land.\n      (27)    Public and Institutional District\n   Those zoning districts where public and institutional land uses are the\nprimary uses. Public and Institutional zoning districts are those designated as\nP-PR, P-IE, and PDM, unless specified otherwise.\n      (28)   P-DM\n   The acronym or abbreviated form of the Downtown Medical district.\n      (29)   P-PR\n   The acronym or abbreviated form of the Parks and Recreation district.\n      (30)    P-IE\n   The acronym or abbreviated form of the Institutional and Educational\ndistrict.\n \n   (q)    Q Terms\n      (1)    Qualified Professional\n   A licensed or state/nationally registered design, building, engineering,\nconstruction, architectural, or planning professional or any person involved\nwith the development process who maintains an accredited collegiate degree in\nthe construction, development, planning, engineering, or architectural field.\n   \n   (r)    R Terms\n      (1)    Rear Lot Line\n   The lot line opposite and most distant from the front lot line.\n      (2)    Rear Yard Line\n   A line parallel to the rear lot line and as far forward from the rear lot\nline as required by this Zoning Code, extending from one side lot line to an\nopposite side yard line. See \"Rear Lot Line.\"\n      (3)    Rear Yard\n   The required area between the rear yard line and the rear lot line and\nextending from one side yard line to an opposite side yard line.\n      (4)    Recommended Tree List\n   The recommended tree list of the City of Springfield, Ohio.\n      (5)    Reconstruct\n   To rebuild a structure that has been destroyed or demolished. For purposes\nof this definition, reconstruct does not apply to the removal and replacement\nof all or part of a building or structure in the same configuration.\n      (6)    Record Plan\n   A drawing or set of drawings of an approved final subdivision prepared for\nappropriate signatures and recording in the County Recorder's office and for\ndistribution to applicable agencies.\n      (7)    Remodel/Repair\n   Any improvement to a building which is not a structural enlargement or\nreconstruction.\n      (8)    Residential District\n   Those zoning districts where commercial land uses are the primary uses.\nResidential zoning districts are those designated as R-AG, R-LD, and R-HD,\nunless specified otherwise.\n      (9)    Right-of-Way\n   A strip of land taken or dedicated for use as a public way. As a roadway, it\nnormally incorporates the curbs, tree lawns, sidewalks, lighting and drainage\nfacilities, and may include special features (required by the topography or\ntreatment) such as grade separation, landscaped areas, viaducts and bridges.\n      (10)   Road\n   A local, rural, or suburban thoroughfare of low-to-moderate vehicular speed\nand capacity.\n# 【1†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn5file1\nMclick Target: \"5:1\"\nContent Snippet:\nSee \"Rear Lot Line.\"\n      (3)    Rear Yard\n   The required area between the rear yard line and the rear lot line and\nextending from one side yard line to an opposite side yard line.\n      (4)    Recommended Tree List\n   The recommended tree list of the City of Springfield, Ohio.\n      (5)    Reconstruct\n   To rebuild a structure that has been destroyed or demolished. For purposes\nof this definition, reconstruct does not apply to the removal and replacement\nof all or part of a building or structure in the same configuration.\n      (6)    Record Plan\n   A drawing or set of drawings of an approved final subdivision prepared for\nappropriate signatures and recording in the County Recorder's office and for\ndistribution to applicable agencies.\n      (7)    Remodel/Repair\n   Any improvement to a building which is not a structural enlargement or\nreconstruction.\n      (8)    Residential District\n   Those zoning districts where commercial land uses are the primary uses.\nResidential zoning districts are those designated as R-AG, R-LD, and R-HD,\nunless specified otherwise.\n      (9)    Right-of-Way\n   A strip of land taken or dedicated for use as a public way. As a roadway, it\nnormally incorporates the curbs, tree lawns, sidewalks, lighting and drainage\nfacilities, and may include special features (required by the topography or\ntreatment) such as grade separation, landscaped areas, viaducts and bridges.\n      (10)   Road\n   A local, rural, or suburban thoroughfare of low-to-moderate vehicular speed\nand capacity.\n      (11)    Roof Line\n   The deck line of a mansard roof, the ridge of a saddle, hip, gable, gambrel,\nor ogee roof; or the highest point of the coping of a flat roof for a multi-\nfamily dwelling or a nonresidential use or the midpoint of a mansard roof; the\nmidpoint between the ridge and eaves of a saddle, hip, gable, gambrel, or ogee\nroof; or the highest point of the coping of a flat roof for a single or two\nfamily dwelling.\n      (12)    Roof\n   The outside surface attached to the top of a building.\n      (13)   R-AG\n   The acronym or abbreviated form of the Agricultural district.\n      (14)   R-LD\n   The acronym or abbreviated form of the Low Density Residential district.\n      (15)    R-HD\n   The acronym or abbreviated form of the High Density Residential district.\n \n   (s)    S Terms\n      (1)    Scenic Area\n   An area presenting a view of natural and human-made elements of the visual\nenvironment with the characteristics of offering strikingly distinct and a\npleasing and memorable visual experience.\n      (2)    Screening\n   A barrier of permanent material of sufficient height and density so that the\nobjects being screened are not visible from any point on the property line when\nviewed from the ground level.\n      (3)    Seasonal Decoration\n   A display pertaining to celebration of a holiday or commemoration of a\nhistoric event or personage, observed during a particular season of the year. A\nseasonal decoration is not a sign.\n# 【2†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn5file2\nMclick Target: \"5:2\"\nContent Snippet:\n03.1: Animal Unit Summary\n            Number of                    Number of Animal Units Allowed Per\nAnimal Type Animals Per      Lot Sizeg  Lot\n            One Animal       District i  < 1 acre 1-5 acres 5 - 10 >10 acres\n            Unit                                            acres\nCattle      1                R-AG        3*       6*        9*     12*\nHorse,\nDonkey,     1                R-LD        2        3         4      5\nMule\nPig         1                R-HD        1        2         3      4\nGoat,\nSheep,      2                C-NC        -        -         -      -\nLlama,\nAlpaca\nHoneybee    2                C-LC        -        -         -      -\nColony\nFowl\n(chicken,\nquail,      4                C-HC        -        -         -      -\nturkey,\nduck, dove,\ngeese)\n                        C-DT             -        -         -      -\nNotes                   I-LI -                    -         -      -\n* = animal units per    I-HI -                    -         -      -\nacre                    P-PR 2                    3         4      5\n- = not allowed         P-IE 2                    3         4      5\n                        P-DM -                    -         -      -\n \n      (2)    An animal unit is a calculation that assigns a number of non-\nhousehold animals in a flexible manner. For example, one animal unit may be one\npig, two honeybee colonies, or four fowls. Four animal units could be one of\nthe following possible combinations:\n         A.    4 cattle\n         B.    4 horse, donkey, mule\n         C.    4 pigs\n         D.    8 goat, sheep, llama, alpaca\n         E.    8 honeybee colonies\n         F.    16 fowl\n         G.    2 cattle and 4 goat, sheep, llama, alpaca\n         H.    1 cattle, 1 pig, and 8 fowl\n      (3)    All non-household animals shall be set back at least 20 feet from\nall property lines unless specified otherwise in this Chapter.\n      (4)    The following animal types are prohibited on lots less than one\nacre:\n         A.    Cattle;\n         B.    Horse, Donkey, Mule;\n         C.    Pig; and\n         D.    Goat, Sheep, Llama, Alpaca\n      (5)    Structures for cattle, horses, donkeys, mules, pigs, goats, sheep,\nllamas, and alpacas shall be at least 200 feet from every abutting R-LD and R-\nHD property lines.\n      (6)    Structures for fowl or small animals shall not be less than 100\nfeet from every abutting R-LD and R-HD property lines.\n      (7)    All non-household animals are prohibited from being located in\nfront and side yards.\n      (8)    Exotic animals are not permitted in Springfield, except as part of\na licensed circus or exhibition.\n# 【3†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn5file3\nMclick Target: \"5:3\"\nContent Snippet:\n129.06 COMMUNITY DEVELOPMENT BLOCK GRANT DIVISION.\n   A Community Development Block Grant (CDBG) Division of the Department of\nCommunity Development is hereby established. The CDBG Division shall\ncoordinate, monitor, and administer funding received from Community Development\nBlock Grants, and any similar programs, for the benefit of the City and\neligible recipients. It will also provide staff for the Springfield Historic\nLandmarks Commission and the Community Advisory Review Board.\n(Ord. 04-347. Passed 11-23-04.)\n \n129.07 BLIGHTED AREA DEFINED.\n   (a)   In conjunction with the expenditures of Community Development Block\nGrant funds, a \"blighted area\" shall be defined as follows: \"Blighted area\"\nmeans an area within a municipality containing a significant number of\nstructures which, by reason of dilapidation, deterioration, age or\nobsolescence, inadequate provision for ventilation, light, air, sanitation or\nopen spaces, unsafe and unsanitary conditions, or the existence of conditions\nwhich endanger lives or properties by fire or other hazards and causes, or\nwhich by reason of location in an area with inadequate street layout,\nincompatible land uses or land use relationships, overcrowding of buildings on\nthe land, excessive dwelling unit density, or other identified hazards to\nhealth and safety, are conducive to ill health, transmission of disease,\njuvenile delinquency and crime and are detrimental to the public health, morals\nand general welfare.\n \n   (b)   The Department of Community Development is hereby authorized to adopt,\npromulgate, and enforce regulations for applying the definition in subsection\n(a) hereof.\n(Ord. 04-347. Passed 11-23-04.)\n \n129.08 URBAN RENEWAL, BLIGHTED AREA DEFINED\nFor purposes of considering an area within the City of Springfield as suitable\nfor an urban renewal plan, including for the purpose of using eminent domain in\nimplementing the urban renewal plan, the term \"blighted area\" means an area\nwithin the City of Springfield containing a majority of structures that have\nbeen extensively damaged or destroyed by a major disaster, or that, by reason\nof dilapidation, deterioration, age or obsolescence, inadequate provision for\nventilation, light, air, sanitation, or open spaces, unsafe and unsanitary\nconditions or the existence of conditions which endanger lives or properties by\nfire or other hazards and causes, or that, by reason of location in an area\nwith inadequate street layout, incompatible land uses or land use\nrelationships, overcrowding of buildings on the land, excessive dwelling unit\ndensity, or other identified hazards to health and safety, are conducive to ill\nhealth, transmission of disease, juvenile delinquency and crime and are\ndetrimental to the public health, safety, morals, and general welfare.\n(Ord. 07-140. Passed 5-15-07.)\n \n \n \nCHAPTER 130\nDepartment of Engineering\n \n   This chapter has been repealed in its entirety by Ordinance No. 19-289\neffective December 24, 2019.\n \n \n \n \nCHAPTER 131\nDepartment of Human Relations, Housing, and Neighborhood Services\n \nNOTE: CHAPTER REPEALED BY ORDINANCE NO. 08-111, PASSED APRIL 8, 2008.\n \n \n \nCHAPTER 133\nDepartment of Parks, Recreation, and Facilities\n \n133.01   Department established.\n \nCROSS REFERENCES\nAuthority to establish - see CHTR.\nSec. 23\nBoard of Parks and Recreation - see ADM. Ch.\n161\n \n133.01 DEPARTMENT ESTABLISHED.\n   A Department of Parks, Recreation, and Facilities is hereby established.\n# 【4†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn5file4\nMclick Target: \"5:4\"\nContent Snippet:\n(ff)    Sexually Oriented Business\n      (1)    A Sexually Oriented Business shall comply with the regulations\nprovided in CHAPTER\n707 Sexually Oriented Businesses.\n   (gg)    Urban Farm\n      (1)    An Urban Farm shall comply with the regulations provided in\nSection\n1106.02 (m).\n      (2)    Any non-household animals provided on an Urban Farm shall comply\nwith the regulations provided in CHAPTER\n1124 - Animal Regulations.\n   \n   (hh)    Veterinarian Facility\n      (1)    Outside runs used for the treatment of animals is prohibited in\nthe C-NC district.\n      (2)    In the R-AG district, a Veterinarian Facility may treat and house\nnon-household animals.\n      (3)    In the R-AG district, a Veterinarian Facility shall be enclosed\nand screened as provided in Section\n1120.03 or fenced as provided in Section\n1120.04 (d) to restrain animals from running at large.\nCHAPTER 1107\nAccessory Uses and Features Standards\n1107.01   Purpose.\n1107.02   Approval Procedure\n1107.03   Interpretation of unidentified accessory features.\n1107.04   General standards for all accessory features.\n1107.05   Accessory feature-specific regulations.\n \n1107.01 PURPOSE.\n   This Chapter authorizes the establishment of accessory uses, buildings, and\nfunctions, collectively referred to as accessory features, that are incidental\nand customarily subordinate to principal uses. An item is \"accessory\" if it is\n\"incidental and customarily subordinate\" to a principal use and complies with\nthe standards established in this Chapter. All principal uses allowed in a\nzoning district shall be deemed to include those accessory uses, buildings, and\nfunctions typically associated with the use, unless specifically prohibited in\nthis Chapter.\n1107.02 APPROVAL PROCEDURE.\n   (a)    Generally. Any of the accessory uses identified in this Title may be\nallowed as accessory to an authorized principal use provided that:\n      (1)    The proposed accessory feature is allowed in the base district\nwhere proposed; and\n      (2)    The proposed accessory feature is consistent with the general and\nspecific standards for accessory uses in this Chapter.\n   (b)    Simultaneously with a Principal Use. Accessory features may be\nreviewed as part of review of an associated principal use. In cases where the\nprincipal use is subject to a Conditional Use Permit, an accessory feature may\nonly be authorized in accordance with an approved Conditional Use Permit.\n   (c)    Subsequent to a Principal Use\n      (1)    Unless exempted, a building permit shall be required in cases\nwhere an accessory use or building is proposed subsequent to a principal use.\n      (2)    In cases where the principal use is subject to a Conditional Use\nPermit, an accessory use may only be authorized in accordance with the\nprovisions in\nTITLE Five - Procedural Standards.\n1107.03 INTERPRETATION OF UNIDENTIFIED ACCESSORY FEATURES.\n# 【5†springfield-oh-1.pdf†file_000000006350722f9042957e1cf13a73】\nFile created at: 2026-03-21T14:00:26Z\nFile last modified at: 2026-03-21T14:00:26Z\nContent source: Source.file\nTitle: springfield-oh-1.pdf\nCitation Marker: fileciteturn5file5\nMclick Target: \"5:5\"\nContent Snippet:\nTable 1119.07.7: Window Sign Standards\r\nKey g\r\nY= sign allowed\r\nX = sign not allowed\r\nNR = sign allowed for nonresidential uses only\r\n“-“ = the standard does not apply\r\nC = sign allowed by Conditional Use Permit\r\nDefinition g\r\nWindow Sign: An on-premise sign permanently suspended or\r\nhanging from the underside of a canopy, awning, ceiling,\r\nmarquee, roof overhang, a covered porch, or walkway.\r\nDistrict g\r\nRequirement i\r\nR-AG\r\nR-LD\r\nP-PR\r\nR-IE\r\nR-HD\r\nC-NC\r\nC-LC\r\nC-HC\r\nI-LI\r\nI-HI\r\nC-DT\r\nP-DM\r\nGeneral\r\nAllowed NR NR Y Y Y\r\nPermit Required Y Y Y Y Y\r\nNumber per Window 1 1 1 No limit 1\r\nDimensions\r\nSign Area (max.)\r\n25% of\r\nwindow\r\n25% of\r\nwindow\r\n25% of\r\nwindow\r\n25% of\r\nwindow\r\n25% of\r\nwindow\r\nFeatures\r\nExternal Illumination NR NR Y Y Y\r\nInternal Illumination NR NR Y Y Y\r\nChangeable Copy X X X X X\r\nSingle-Color Digital X X X X X\r\nMulti-Color Digital X X X X X\r\n(6) Freestanding Canopy Signs\r\nA. Generally. The required standards for freestanding canopy signs shall comply with Table 1119.07.8: Freestanding Canopy Sign Standards.\r\nTable 1119.07.8: Freestanding Canopy Sign Standards\r\nKey g\r\nY= sign allowed\r\nX = sign not allowed\r\nNR = sign allowed for nonresidential uses only\r\n“-“ = the standard does not apply\r\nC = sign allowed by Conditional Use Permit\r\nDefinition g\r\nFreestanding Canopy Sign: An on-premise sign that is\r\npermanently allowed to a freestanding canopy.\n# 【6†springfield-oh-1.pdf†file_000000006350722f9042957e1cf13a73】\nFile created at: 2026-03-21T14:00:26Z\nFile last modified at: 2026-03-21T14:00:26Z\nContent source: Source.file\nTitle: springfield-oh-1.pdf\nCitation Marker: fileciteturn5file6\nMclick Target: \"5:6\"\nContent Snippet:\n(r) R Terms\r\n(1) Rear Lot Line\r\nThe lot line opposite and most distant from the front lot line.\r\n(2) Rear Yard Line\r\nA line parallel to the rear lot line and as far forward from the rear lot line as required by this Zoning Code, extending from\r\none side lot line to an opposite side yard line. See \"Rear Lot Line.\"\r\n(3) Rear Yard\r\nThe required area between the rear yard line and the rear lot line and extending from one side yard line to an opposite side\r\nyard line.\r\n(4) Recommended Tree List\r\nThe recommended tree list of the City of Springfield, Ohio.\r\n(5) Reconstruct\r\nTo rebuild a structure that has been destroyed or demolished. For purposes of this definition, reconstruct does not apply to\r\nthe removal and replacement of all or part of a building or structure in the same configuration.\r\n(6) Record Plan\r\nA drawing or set of drawings of an approved final subdivision prepared for appropriate signatures and recording in the\r\nCounty Recorder's office and for distribution to applicable agencies.\r\n(7) Remodel/Repair\r\nAny improvement to a building which is not a structural enlargement or reconstruction.\r\n(8) Residential District\r\nThose zoning districts where commercial land uses are the primary uses. Residential zoning districts are those designated as\r\nR-AG, R-LD, and R-HD, unless specified otherwise.\r\n(9) Right-of-Way\r\nA strip of land taken or dedicated for use as a public way. As a roadway, it normally incorporates the curbs, tree lawns,\r\nsidewalks, lighting and drainage facilities, and may include special features (required by the topography or treatment) such as\r\ngrade separation, landscaped areas, viaducts and bridges.\r\n(10) Road\r\nA local, rural, or suburban thoroughfare of low-to-moderate vehicular speed and capacity.\r\n(11) Roof Line\r\nThe deck line of a mansard roof, the ridge of a saddle, hip, gable, gambrel, or ogee roof; or the highest point of the coping of\r\na flat roof for a multi-family dwelling or a nonresidential use or the midpoint of a mansard roof; the midpoint between the\r\nridge and eaves of a saddle, hip, gable, gambrel, or ogee roof; or the highest point of the coping of a flat roof for a single or\r\ntwo family dwelling.\r\n(12) Roof\r\nThe outside surface attached to the top of a building.\r\n(13) R-AG\r\nThe acronym or abbreviated form of the Agricultural district.(14) R-LD\r\nThe acronym or abbreviated form of the Low Density Residential district.\r\n(15) R-HD\r\nThe acronym or abbreviated form of the High Density Residential district.\r\n(s) S Terms\r\n(1) Scenic Area\r\nAn area presenting a view of natural and human-made elements of the visual environment with the characteristics of offering\r\nstrikingly distinct and a pleasing and memorable visual experience.\r\n(2) Screening\r\nA barrier of permanent material of sufficient height and density so that the objects being screened are not visible from any\r\npoint on the property line when viewed from the ground level.\r\n(3) Seasonal Decoration\r\nA display pertaining to celebration of a holiday or commemoration of a historic event or personage, observed during a\r\nparticular season of the year. A seasonal decoration is not a sign.\r\n(4) Setback Line\r\nA line established by this Zoning Code that is parallel with and measured from the lot line and defines the limits of a yard\r\nwithin which no building or structure may be located above ground, except as may be provided by this Zoning Code. The area\r\nbetween the setback line and the lot line is referred to in this Zoning Code as the required yard.\n# 【7†springfield-oh-1.pdf†file_000000006350722f9042957e1cf13a73】\nFile created at: 2026-03-21T14:00:26Z\nFile last modified at: 2026-03-21T14:00:26Z\nContent source: Source.file\nTitle: springfield-oh-1.pdf\nCitation Marker: fileciteturn5file7\nMclick Target: \"5:7\"\nContent Snippet:\nor is used for nonprofit youth activities, the purchase of United States or Ohio flags that are donated to\r\nschools, youth groups, or other bona fide nonprofit organizations, promotion of patriotism, or disaster relief;\r\n(3) A fraternal organization that has been in continuous existence in this state for fifteen (15) years and that uses the net profit exclusively for\r\nreligious, charitable, scientific, literary, or educational purposes, or for the prevention of cruelty to children or animals, if\r\ncontributions for such use would qualify as a deductible charitable contribution under IRC 170;\r\n(4) A volunteer firefighter’s organization that uses the net profit for the purposes set forth in the definition of ”volunteer firefighter’s\r\norganization” in this section.\r\n(l) “Community action agency” has the same meaning as in Ohio R.C. 122.66.\r\n(m) “Conduct” means to back, promote, organize, manage, carry on, sponsor, or prepare for the operation of bingo or a game of chance, a scheme\r\nof chance, or a sweepstakes.\r\n(n) “Deal” means a single game of instant bingo tickets, or a single game of electronic instant bingo tickets, all with the same serial number.\r\n(o) “Distributor” means any person who purchases or obtains bingo supplies and who does either of the following:\r\n(1) Sells, offers for sale, or otherwise provides or offers to provide the bingo supplies to another person for use in this state;\r\n(2) Modifies, converts, adds to, or removes parts from the bingo supplies to further their promotion or sale for use in this state.\r\n(p) “Electronic bingo aid” means:\r\n(1) An electronic device used by a participant to monitor bingo cards or sheets purchased at the time and place of a bingo session and that does\r\nall of the following:\r\nA. It provides a means for a participant to input numbers and letters announced by a bingo caller.\r\nB. It compares the numbers and letters entered by the participant to the bingo faces previously stored in the memory of the device.\r\nC. It identifies a winning bingo pattern.\r\n(2) The term does not include any device into which a coin, currency, token, or an equivalent is inserted to activate play.\r\n(q) “Electronic instant bingo” means:\r\n(1) A form of bingo that consists of an electronic or digital representation of instant bingo in which a participant wins a prize if the participant’s\r\nelectronic instant bingo ticket contains a combination of numbers or symbols that was designated in advance as a winning\r\ncombination, and to which all of the following apply:\r\nA. Each deal has a predetermined, finite number of winning and losing tickets and a predetermined prize amount and deal structure, provided\r\nthat there may be multiple winning combinations in each deal and multiple winning tickets.\r\nB. Each electronic instant bingo ticket within a deal has a unique serial number that is not regenerated.\r\nC. Each electronic instant bingo ticket within a deal is sold for the same price.\r\nD. After a participant purchases an electronic instant bingo ticket, the combination of numbers or symbols on the ticket is revealed to the\r\nparticipant.\r\nE. The reveal of numbers or symbols on the ticket may incorporate an entertainment or bonus theme, provided that the reveal does not include\r\nspinning reels that resemble a slot machine.\r\nF. The reveal theme, if any, does not require additional consideration or award any prize other than any predetermined prize associated with\r\nthe electronic instant bingo ticket.\r\n(2) The term shall not include any of the following:\r\nA. Any game, entertainment, or bonus theme that replicates or simulates any of the following:\r\n1. The gambling games of keno, blackjack, roulette, poker, craps, other casino-style table games;\r\n2. Horse racing;\r\n3. Gambling games offered in this state on slot machines or video lottery terminals.\n# 【8†springfield-oh-1.pdf†file_000000006350722f9042957e1cf13a73】\nFile created at: 2026-03-21T14:00:26Z\nFile last modified at: 2026-03-21T14:00:26Z\nContent source: Source.file\nTitle: springfield-oh-1.pdf\nCitation Marker: fileciteturn5file8\nMclick Target: \"5:8\"\nContent Snippet:\n(2) For example, read link (Section 1109.02 Low Density Residential (R-LD) District), for a description of the R-LD district.\r\n(d) Step 4: Identify Use Allowances\r\n(1) To find what uses are allowed on the subject property, select the interactive link to the Table 1104.03.1: Use Table found in subsection (b)\r\nof the applicable zoning district.\r\n(2) Once in Table 1104.03.1: Use Table, find whether a use is permitted by-right by staff (stylized as \"P\"), permitted as a limited use by staff\r\n(stylized as \"L\"), allowed as a conditional use via approval by the Board of Zoning Appeals (stylized as \"C\"), or prohibited in\r\nthe applicable zoning district (stylized as blank).\r\n(3) All uses are listed in the first column of Table 1104.03.1: Use Table and the zoning district categories and zoning districts are listed in the\r\nfirst two rows for the next 13 columns.\r\n(4) Allowed primary and accessory and temporary uses and the relevant parking requirements are listed in the first column of Table 1104.03.1:\r\nUse Table and zoning districts are listed across the remaining table columns.\r\n(5) Table cell entries for each use indicate whether the use is allowed in the zoning district or allowed subject to specific limitations, and/or\r\nsubject to a specific review.\r\n(6) The last column of Table 1104.03.1: Use Table references the user to a particular use's applicable use-specific regulations. These regulations\r\nare contained within the CHAPTER 1106 - Use-Specific Standards of TITLE Two - Use Standards. In some cases, use\r\nlimitations reference their applicability to certain zoning districts.\r\n(e) Step 5: Review the Applicable Dimensional Standards\r\n(1) To find out the dimensional standards (setbacks, height, lot size, etc.) on the subject property, review the dimensional standards table\r\nprovided in subsection (c) of the applicable zoning district.\r\n(f) Step 6: Review the Site Development Standards\r\n(1) Review TITLE Four - Site Development Standards which includes standards that are generally applicable to all new development, regardless\r\nof the applicable zoning district.\r\n(2) These standards address parking and loading, landscaping, site lighting, signs, urban design, basic performance standards, and similar\r\nstandards to ensure development is constructed to the applicable zoning district's intent and scale.\r\n(3) For example, the Parking and Loading chapter provides different parking configurations for certain development types (i.e., residential,\r\ncommercial, etc.).\r\n(g) Step 7: Understand the Procedural Standards and Enforcement\r\n(1) Review TITLE Five - Procedural Standards to gain an understanding of all development procedures applicable to new development as\r\nrequired by this Zoning Code.\r\n(2) The Title first identifies and summarizes all the review and decision-making bodies and their respective roles pertaining to a given\r\ndevelopment procedure as established in this Zoning Code.\r\n(3) The Title then describes common steps to all development procedures (i.e., noticing requirements, provision for pre-application conference,etc.), and then describes the steps required for each type of development procedure (i.e., site plan, conditional use permit,\r\nrezonings, variances, etc.).\r\n(h) Step 8: Understand When Nonconforming Standards Apply\r\n(1) TITLE Six - Nonconforming Standards contains the rules for nonconforming and compliant uses, structures, signs, and lots.\r\n(2) If a development is nonconforming, any redevelopment or new development must adhere to the standards of this Title.\r\n(i) Step 9: Know the Enforcement Protocol\r\n(1) Finally, TITLE Seven - Enforcement Standards contains general enforcement provisions, including what constitutes a violation of the\r\nZoning Code and the associated penalties.\n# 【9†springfield-oh-1.pdf†file_000000006350722f9042957e1cf13a73】\nFile created at: 2026-03-21T14:00:26Z\nFile last modified at: 2026-03-21T14:00:26Z\nContent source: Source.file\nTitle: springfield-oh-1.pdf\nCitation Marker: fileciteturn5file9\nMclick Target: \"5:9\"\nContent Snippet:\nThe department shall foster safe and orderly development within the City; coordinate administration of the department, coordinate Community\r\nDevelopment Block Grant, Urban Development Action Grant, Economic Development Administration and similar federally-funded economic\r\ndevelopment programs and activities; supervise the planning, subdivision, and zoning responsibilities of the City; administer and enforce the\r\nbuilding, heating, electrical, housing, and property maintenance codes of the City; coordinate the City's nuisance abatement efforts; and perform such\r\nother duties as required by City Charter or ordinance.\r\n(Ord. 08-111. Passed 4-8-08.)\r\n129.02 ADMINISTRATION DIVISION.\r\nThe Administration Division of the Department of Community Development is hereby established. The Administration Division shall coordinate\r\nthe operations of the Department, work on the redevelopment of specified neighborhoods, and supervise the planning, subdivision, and zoning\r\nresponsibilities of the City. It will also provide staff for the City Planning Board and Board of Zoning Appeals.\r\n(Ord. 04-347. Passed 11-23-04.)\r\n129.03 INSPECTION SERVICES DIVISION.\r\nAn Inspection Services Division of the Department of Community Development is hereby established. The Inspection Services Division shall\r\nadminister and enforce the building, heating, and electrical codes of the City and the contractor licensing program. It will also provide staff for the\r\nBoard of Building Appeals.\r\n(Ord. 04-347. Passed 11-23-04.)\r\n129.04 CODE ENFORCEMENT DIVISION.\r\nA Code Enforcement Division of the Department of Community Development is hereby established. The Code Enforcement Division shall\r\nadminister and enforce the Housing Maintenance Code, enforce the Zoning Code, and work to abate public nuisances.\r\n(Ord. 04-347. Passed 11-23-04.)\r\n129.05 REPEALED BY ORDINANCE 08-111, PASSED 4-8-08.\r\n129.06 COMMUNITY DEVELOPMENT BLOCK GRANT DIVISION.\r\nA Community Development Block Grant (CDBG) Division of the Department of Community Development is hereby established. The CDBG\r\nDivision shall coordinate, monitor, and administer funding received from Community Development Block Grants, and any similar programs, for the\r\nbenefit of the City and eligible recipients. It will also provide staff for the Springfield Historic Landmarks Commission and the Community\r\nAdvisory Review Board.\r\n(Ord. 04-347. Passed 11-23-04.)\r\n129.07 BLIGHTED AREA DEFINED.\r\n(a) In conjunction with the expenditures of Community Development Block Grant funds, a \"blighted area\" shall be defined as follows: \"Blighted\r\narea\" means an area within a municipality containing a significant number of structures which, by reason of dilapidation, deterioration, age or\r\nobsolescence, inadequate provision for ventilation, light, air, sanitation or open spaces, unsafe and unsanitary conditions, or the existence of\r\nconditions which endanger lives or properties by fire or other hazards and causes, or which by reason of location in an area with inadequate street\r\nlayout, incompatible land uses or land use relationships, overcrowding of buildings on the land, excessive dwelling unit density, or other identified\r\nhazards to health and safety, are conducive to ill health, transmission of disease, juvenile delinquency and crime and are detrimental to the public\r\nhealth, morals and general welfare.\r\n(b) The Department of Community Development is hereby authorized to adopt, promulgate, and enforce regulations for applying the definition in\r\nsubsection (a) hereof.\r\n(Ord. 04-347. Passed 11-23-04.)\r\n129.08 URBAN RENEWAL, BLIGHTED AREA DEFINED\r\nFor purposes of considering an area within the City of Springfield as suitable for an urban renewal plan,\nVisible: 0% - 100%"

