text = "# 【0†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn1file0\nMclick Target: \"1:0\"\nContent Snippet:\nA fence (in accordance with Section\n1120.04 ) may be constructed on the property line adjacent to a side yard.\n         B.    Where a side property line divides a nonresidential district\nfrom a residential district, a minimum ten (10) foot side yard is required for\nthe nonresidential lot side adjacent to that residential district.\n      (4)    Rear Yard Regulations. Every part of a required rear yard shall be\nopen and unobstructed except for permitted accessory buildings and the ordinary\nprojections of window sills, belt courses, cornices, roof overhangs, and other\narchitectural features projecting not to exceed four feet into the required\nrear yard. A fence (in accordance with Section\n1120.04 ) may be constructed on the property line adjacent to a rear yard.\n   (c)    Lot Standards\n      (1)    Lot Area\n         A.    No lot shall be created or reduced in area, width, or depth\nbelow the minimum requirements established in\nTITLE Three - District Standards.\n         B.    A lot that was legally created prior to the adoption of this\nZoning Code may be redeveloped, but any deviations from the standards provided\nin this Zoning Code may utilize the infill standards in this Title or shall\nrequire a variance.\n         C.    The total space required for a lot is calculated by multiplying\nthe lot's depth by it's width.\n      (2)    Lot Width\n         A.    Lot width is the distance parallel to the front property line,\nmeasured at the front setback line.\n         B.    Lot width on a curving front line means the distance parallel to\nthe tangent of the front property line at the building setback line.\n         C.    The lot width and the lot frontage may have different lengths on\nan irregularly shaped lot as they are measured at different points on the lot.\n         D.    Refer to Figure 1115.03.3: Lot Width Summary to clarify lot\nwidth measurements.\nFigure 1115.03.3: Lot Width Summary\n[https://export.amlegal.com/media/4f626210a2b5a64fa74049214f88dfe0ee9c61ff/\nIMAGES/0-0-0-8808.jpg]\n      (3)    Lot Depth. Lot depth is the distance measured from the front\nproperty line to the rear property line.\n      (4)    Total Lot Building Coverage\n         A.    Total lot building coverage is the percentage of the lot that is\noccupied by the ground area of a building and its accessory buildings.\n         B.    Fences, walls, and gates are not included when calculating total\nlot building coverage.\n   (d)    Building Height\n      (1)    Maximum building height is measured as the vertical distance from\nstreet grade to (see Figure 1115.03.4: Building Height Summary):\n         A.    The top of a flat roof, including structures designed with a\ndecorative mansard roof concealing a flat roof.\n         B.    The deck line of a mansard or gambrel roof.\n         C.    The midpoint height between the eaves and the ridge in the case\nof a pitched roof.\n         D.    Any dormers that extend past the roofline cannot exceed the\nmaximum building height permitted in the district, as measured from the\nadjacent average grade, or its equivalent, to the top of the dormer.\n# 【1†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn1file1\nMclick Target: \"1:1\"\nContent Snippet:\nSuch area\nvariances include, by way of example and not of limitation, relief from a set\nback requirement, height requirement, restrictions on the bulk of buildings,\nthe extent of lot coverage or yard requirements. the Board of Zoning Appeals\nshall consider and weigh the following factors and such other factors as the\nBoard of Zoning Appeals may determine have a bearing on finding whether strict\napplication of any provision of this Springfield Zoning Code would result in\npractical difficulties which will unreasonably deprive the owner of a permitted\nuse of their property; however, no one of such factors shall control in a\ndetermination of whether such practical difficulty exists:\n         A.    The property in question cannot yield a reasonable return and\nthere can be no beneficial use of the property without the variance, the\nvariance would relieve a clearly demonstrable situation where strict\napplication of the provisions of this Zoning Code created a practical\ndifficulty that will deprive the owner of economically viable use of the land,\nas distinguished from a special privilege or convenience to the owner.\n         B.    The variance is not substantial.\n         C.    The essential character of the neighborhood will not be\nsubstantially altered or suffer a substantial detriment as a result of the\nvariance.\n         D.    The variance will not adversely affect the delivery of\ngovernmental services such as police and fire protection, water and sewer\nservices, and solid waste regulation and disposal.\n         E.    The property owner purchased the property without knowledge of\nthe zoning restrictions.\n         F.    The property owner's predicament feasibly can be obviated\nthrough some method other than granting a variance.\n         G.    The property possesses conditions involving irregular, narrow,\nshallow or steep lots, or other exceptional physical conditions and because of\nsuch exceptional physical conditions, strict application of a provision or\nprovisions of this Zoning Code would be unreasonable.\n         H.    The spirit and intent behind the zoning requirement will be\nobserved and substantial justice done by granting the variance.\n \n   (g)    Subsequent Applications. If the variance request is denied, the\napplicant shall not\nsubmit a variance request of similarity on the same property for at least six\nmonths.\n \n   (h)    Appeals. Any decision by the Board of Zoning Appeals shall be a final\nappealable order and the applicant may seek judicial review of the action in\nany court of competent jurisdiction pursuant to general law.\n \n   (i)    Scope of Approval. After a final decision on the variance is\nrendered, the applicant and any party in interest may file any further permits\nor applications, undertake construction, or establish a use consistent with\nthat decision.\n \n   (j)    Recordation. The Community Development Department shall maintain the\nvariance decision in its files, and the applicant shall maintain an original\nsigned copy of the variance decision.\n \n1130.03 APPEALS FROM LANDMARKS COMMISSION.\n   (a)    Applicability. Certificate of Appropriateness decisions made by the\nSpringfield Landmarks Commission may be appealed to the Board of Zoning\nAppeals.\n \n   (b)    Initiation. To make an appeal, the aggrieved party shall file a\nnotice of appeal within 30 days of the Springfield Landmarks Commission's final\naction.\n \n   (c)    Completeness\n      (1)    Generally, refer to Section\n1127.02 .\n      (2)    In addition to the requirements of Section\n1127.02 (c), the applicant shall provide the following information:\n         A.\n# 【2†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn1file2\nMclick Target: \"1:2\"\nContent Snippet:\nC.    All yards abutting a street are measured from the nearest edge\nof the right-of-way, or from the lot line, whichever provides the greater\nsetback.\n         D.    Required yard means that portion of any yard constituting the\nminimum area required in any zoning district, but excluding that portion of the\nyard in excess of the minimum required area.\n         E.    This Zoning Code's required lots, yards, and setbacks are\nsummarized in Figure 1115.03.1: Lots, Yards, and Setbacks Summary.\nFigure 1115.03.1: Lots, Yards, and Setbacks Summary\n[https://export.amlegal.com/media/4f626210a2b5a64fa74049214f88dfe0ee9c61ff/\nIMAGES/0-0-0-8735.jpg]\n      (2)    Front Yard Regulations\n         A.    The front yard shall be open and unobstructed. Eaves and roof\nextensions or a porch may project into the required front yard for a distance\nnot to exceed four feet (see Figure 1115.03.2: Front Yard Projection).\nFigure 1115.03.2: Front Yard Projection\n[https://export.amlegal.com/media/4f626210a2b5a64fa74049214f88dfe0ee9c61ff/\nIMAGES/0-0-0-8771.jpg]\n         B.    Where a building line has been established by an approved plat\nthat deviates from the setback that is prescribed by this Zoning Code, the\nrequired front yard shall comply with the building line established by that\nplat.\n      (3)    Side Yard Regulations\n         A.    Every part of a required side yard shall be open and\nunobstructed except for the ordinary projections of window sills, belt courses,\ncornices, and other architectural features projecting not to exceed one (1)\nfoot into the required side yard and roof eaves projecting not to exceed four\n(4) feet into the required side yard. A fence (in accordance with Section\n1120.04 ) may be constructed on the property line adjacent to a side yard.\n         B.    Where a side property line divides a nonresidential district\nfrom a residential district, a minimum ten (10) foot side yard is required for\nthe nonresidential lot side adjacent to that residential district.\n      (4)    Rear Yard Regulations. Every part of a required rear yard shall be\nopen and unobstructed except for permitted accessory buildings and the ordinary\nprojections of window sills, belt courses, cornices, roof overhangs, and other\narchitectural features projecting not to exceed four feet into the required\nrear yard. A fence (in accordance with Section\n1120.04 ) may be constructed on the property line adjacent to a rear yard.\n   (c)    Lot Standards\n      (1)    Lot Area\n         A.    No lot shall be created or reduced in area, width, or depth\nbelow the minimum requirements established in\nTITLE Three - District Standards.\n         B.    A lot that was legally created prior to the adoption of this\nZoning Code may be redeveloped, but any deviations from the standards provided\nin this Zoning Code may utilize the infill standards in this Title or shall\nrequire a variance.\n         C.    The total space required for a lot is calculated by multiplying\nthe lot's depth by it's width.\n# 【3†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn1file3\nMclick Target: \"1:3\"\nContent Snippet:\nThe City of Springfield shall prosecute any violation of these\nFloodplain Regulations in accordance with the penalties stated herein.\n \n \n \n \nCODIFIED ORDINANCES OF SPRINGFIELD\n \nPART ELEVEN - ZONING CODE\n \nNOTE: THE 2025 ZONING CODE AS ADOPTED IN ITS ENTIRETY BY ORDINANCE NO. 25-121\nON MAY 6, 2025.\n   \nTITLE ONE - Introductory Standards\nChap.\n1101.   Legal Provisions.\nChap.\n1102.   General Provisions.\nChap.\n1103.    Using the Code.\n   \nTITLE TWO - Use Standards\nChap.\n1104. General Provisions.\nChap.\n1105.    Land Use terms and Definitions.\nChap.\n1106.   Use-Specific Standards.\nChap.\n1107.   Accessory Uses and Features Standards.\n   \nTITLE THREE - District Standards\nChap.\n1108.   General Provisions.\nChap.\n1109.   Residential Districts.\nChap.\n1110.   Commercial Districts.\nChap.\n1111.   Industrial Districts.\nChap.\n1112.   Public and Institutional Districts.\nChap.\n1113.   Special Districts.\n   \nTITLE FOUR - Site Development Standards\nChap.\n1114.   General Provisions.\nChap.\n1115.   Dimensional Regulations.\nChap.\n1116.   Parking and Loading.\nChap.\n1117.   Landscaping.\nChap.\n1118.   Site Lighting.\nChap.\n1119.   Signs.\nChap.\n1120.   Screening and Fencing.\nChap.\n1121.   Waste Management.\nChap.\n1122.   Urban Design.\nChap.\n1123.   Infill.\nChap.\n1124.   Animal Regulations.\nChap.\n1125.   Performance Standards.\n   \nTITLE FIVE - Procedural Standards\nChap.\n1126.   General Provisions.\nChap.\n1127.   Common Procedures.\nChap.\n1128.   Entitlement and Pre-Development Procedures.\nChap.\n1129.   Site Development Procedures.\nChap.\n1130.   Relief Procedures.\n   \nTITLE SIX - Nonconforming Standards\n      Chap.   \n1131.   General Provisions.\n   \nTITLE SEVEN - Enforcement Standards\nChap.\n1132.   General provisions.\nChap.\n1133.   Violation Noticing.\n      Chap.   \n1134.   Penalties, Fines, and Remedies.\n   \nTITLE EIGHT - Administrative Bodies.\n      Chap.   \n1135.   General Provisions\nChap.\n1136.   Quasi-Legislative Bodies and Personnel.\nChap.\n1137.   City Administrative Bodies and Personnel.\n   \nTITLE NINE - Definitions.\nChap.\n1138.   General Provisions.\nChap.\n1139.   General Terms and Definitions.\nTITLE ONE - Introductory Standards.\nChap.\n1101.   Introductory Standards.\nChap.\n1102.   General Provisions.\nChap.\n1103.   Using the Code.\nCHAPTER 1101\nLegal Provisions\n1101.01   Title.\n1101.02   Effective date.\n1101.03   Purpose and intent.\n1101.04   Applicability.\n1101.05   Severability.\n1101.06   Conflicting Provisions.\n \n1101.01 TITLE.\n   This Part shall be known and may be cited as the \"Zoning Code of the City of\nSpringfield, Ohio\", or as the \"Zoning Code\".\n1101.02 EFFECTIVE DATE.\n# 【4†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn1file4\nMclick Target: \"1:4\"\nContent Snippet:\n(15)    Porch\n   A covered entrance to a building consisting of a platform area, with open or\npartially enclosed sides.\n      (16)    Pre-Application Conference\n   A meeting with applicable City staff Development (Planning, Engineering,\nFire, Building, etc.) that occurs before an application submittal. This term is\nabbreviated in this Zoning Code as PAC.\n      (17)    Preliminary Master Development Plan\n   A Master Development Plan proposed by the applicant and made a part of the\napplication, as required by this Zoning Code, to be submitted to the Planning\nBoard for their consideration.\n      (18)    Premises\n   A general term meaning part or all of any lot, parcel, or tract or part or\nall of any building or structure or group of buildings or structures located\nthereon.\n      (19)    Principal Building\n   A building which contains the principal use.\n      (20)    Principal Use\n   The primary use(s) of land or a structure as distinguished from an accessory\nuse, e.g., a house is a principal use in a residential area and a garage or\npool is an accessory use.\n      (21)    Private Street\n   A right-of-way or easement in private ownership, not dedicated or maintained\nas a public street, and which affords the principal means of access to two or\nmore lots or to condominium units.\n      (22)    Prohibited Sign\n   Any sign which is forbidden from being erected or displayed.\n      (23)    Projecting Sign\n   An on-premise sign permanently affixed to and projects from the wall of a\nbuilding and is generally perpendicular to the building facade.\n      (24)    Projection\n   Any part of a building such as architectural features which protrude into\nthe required yard or yards.\n      (25)    Property Line.\n         See Lot Line.\n      (26)    Property\n   A piece of real property or land.\n      (27)    Public and Institutional District\n   Those zoning districts where public and institutional land uses are the\nprimary uses. Public and Institutional zoning districts are those designated as\nP-PR, P-IE, and PDM, unless specified otherwise.\n      (28)   P-DM\n   The acronym or abbreviated form of the Downtown Medical district.\n      (29)   P-PR\n   The acronym or abbreviated form of the Parks and Recreation district.\n      (30)    P-IE\n   The acronym or abbreviated form of the Institutional and Educational\ndistrict.\n \n   (q)    Q Terms\n      (1)    Qualified Professional\n   A licensed or state/nationally registered design, building, engineering,\nconstruction, architectural, or planning professional or any person involved\nwith the development process who maintains an accredited collegiate degree in\nthe construction, development, planning, engineering, or architectural field.\n   \n   (r)    R Terms\n      (1)    Rear Lot Line\n   The lot line opposite and most distant from the front lot line.\n      (2)    Rear Yard Line\n   A line parallel to the rear lot line and as far forward from the rear lot\nline as required by this Zoning Code, extending from one side lot line to an\nopposite side yard line. See \"Rear Lot Line.\"\nVisible: 0% - 100%"

