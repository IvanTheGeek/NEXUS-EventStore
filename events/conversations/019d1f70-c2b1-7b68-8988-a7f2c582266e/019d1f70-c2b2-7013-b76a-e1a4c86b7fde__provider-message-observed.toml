text = "# 【0†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn3file0\nMclick Target: \"3:0\"\nContent Snippet:\n(2)    Loading spaces shall be designed so that vehicles shall maneuver\nentirely within the property lines of the premises and not on public right-of-\nway.\n      (3)    Unenclosed off-street loading areas shall be permanently paved on\na hard-paved surface.\n      (4)    Landscaping and screening requirements, provided in CHAPTER\n1117 - Landscaping and CHAPTER\n1120 - Screening and Fencing, apply to loading facilities and shall prevent\ndirect views of the loading facilities and their driveways from adjacent\nproperties and public right-of-way.\n   (f)    Urban Loading Standards\n      (1)    Applicability\n         A.    This Subsection applies exclusively to those properties located\nin the C-DT district.\n         B.    The regulations of Section\n1116.09 (a)-(e) do not apply to those properties located in the C-DT district.\n      (2)    Standards\n         A.    Loading may be provided in any right-of-way adjacent to the\napplicable site.\n         B.    Loading occurring in a street shall be restricted to the hours\nof 8 p.m. to 8 a.m.\n         C.    Loading in an alley may occur at any time of day.\n         D.    No delivery vehicle shall be loading/unloading products for more\nthan 30 minutes at a time.\nCHAPTER 1117\nLandscaping\n1117.01   Purpose.\n1117.02   Applicability.\n1117.03   General requirements.\n1117.04   Nonresidential standards.\n1117.05   Residential standards.\n1117.06   Urban landscaping standards.\n \n1117.01 PURPOSE.\n   The purpose of this Chapter is to preserve Springfield's character and\nintegrate and enhance new development by promoting landscape design that:\n   (a)    Reinforces the identity of the community;\n   (b)    Appropriately situates new buildings in the landscape;\n   (c)    Provides adequate vegetation for screening and buffering between land\nuses;\n   (d)    Provides tree canopies to reduce urban heat island effect;\n   (e)    Preserves the existing native trees and other physical site values\nwhere possible;\n   (f)    Reduces stormwater runoff;\n   (g)    Accounts for unique landscaping treatment in dense, urban areas;\n   (h)    Soften the visual impact of paved areas, parking lots, and adjoining\nright-of-way; and\n   (i)    Identifies climate-appropriate landscape material.\n1117.02 APPLICABILITY.\n   (a)    Generally. The Chapter applies to:\n      (1)    All development for new construction within Springfield's city\nlimits except for the exemptions listed below.\n      (2)    The following landscaping standards apply to all new\nnonresidential development and to the expansion by more than twenty-five\npercent (25%) of an existing building mass or site in any zoning district.\n   (b)    Exemptions. This Chapter does not apply to any property with a plan\nor permit that\nwas approved prior to the adoption of this Zoning Code, unless an amended plan\nor permit is required by the requirements in the submittal checklist.\n1117.03 GENERAL REQUIREMENTS.\n   (a)    Installation\n      (1)    All tree plantings required by this Chapter shall be installed\nbefore occupancy or commencement of a use.\n# 【1†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn3file1\nMclick Target: \"3:1\"\nContent Snippet:\nThe City of Springfield shall prosecute any violation of these\nFloodplain Regulations in accordance with the penalties stated herein.\n \n \n \n \nCODIFIED ORDINANCES OF SPRINGFIELD\n \nPART ELEVEN - ZONING CODE\n \nNOTE: THE 2025 ZONING CODE AS ADOPTED IN ITS ENTIRETY BY ORDINANCE NO. 25-121\nON MAY 6, 2025.\n   \nTITLE ONE - Introductory Standards\nChap.\n1101.   Legal Provisions.\nChap.\n1102.   General Provisions.\nChap.\n1103.    Using the Code.\n   \nTITLE TWO - Use Standards\nChap.\n1104. General Provisions.\nChap.\n1105.    Land Use terms and Definitions.\nChap.\n1106.   Use-Specific Standards.\nChap.\n1107.   Accessory Uses and Features Standards.\n   \nTITLE THREE - District Standards\nChap.\n1108.   General Provisions.\nChap.\n1109.   Residential Districts.\nChap.\n1110.   Commercial Districts.\nChap.\n1111.   Industrial Districts.\nChap.\n1112.   Public and Institutional Districts.\nChap.\n1113.   Special Districts.\n   \nTITLE FOUR - Site Development Standards\nChap.\n1114.   General Provisions.\nChap.\n1115.   Dimensional Regulations.\nChap.\n1116.   Parking and Loading.\nChap.\n1117.   Landscaping.\nChap.\n1118.   Site Lighting.\nChap.\n1119.   Signs.\nChap.\n1120.   Screening and Fencing.\nChap.\n1121.   Waste Management.\nChap.\n1122.   Urban Design.\nChap.\n1123.   Infill.\nChap.\n1124.   Animal Regulations.\nChap.\n1125.   Performance Standards.\n   \nTITLE FIVE - Procedural Standards\nChap.\n1126.   General Provisions.\nChap.\n1127.   Common Procedures.\nChap.\n1128.   Entitlement and Pre-Development Procedures.\nChap.\n1129.   Site Development Procedures.\nChap.\n1130.   Relief Procedures.\n   \nTITLE SIX - Nonconforming Standards\n      Chap.   \n1131.   General Provisions.\n   \nTITLE SEVEN - Enforcement Standards\nChap.\n1132.   General provisions.\nChap.\n1133.   Violation Noticing.\n      Chap.   \n1134.   Penalties, Fines, and Remedies.\n   \nTITLE EIGHT - Administrative Bodies.\n      Chap.   \n1135.   General Provisions\nChap.\n1136.   Quasi-Legislative Bodies and Personnel.\nChap.\n1137.   City Administrative Bodies and Personnel.\n   \nTITLE NINE - Definitions.\nChap.\n1138.   General Provisions.\nChap.\n1139.   General Terms and Definitions.\nTITLE ONE - Introductory Standards.\nChap.\n1101.   Introductory Standards.\nChap.\n1102.   General Provisions.\nChap.\n1103.   Using the Code.\nCHAPTER 1101\nLegal Provisions\n1101.01   Title.\n1101.02   Effective date.\n1101.03   Purpose and intent.\n1101.04   Applicability.\n1101.05   Severability.\n1101.06   Conflicting Provisions.\n \n1101.01 TITLE.\n   This Part shall be known and may be cited as the \"Zoning Code of the City of\nSpringfield, Ohio\", or as the \"Zoning Code\".\n1101.02 EFFECTIVE DATE.\n# 【2†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn3file2\nMclick Target: \"3:2\"\nContent Snippet:\nEstablishment or amendment of district shall\nfollow Title Five - Chapter\n1128.02.\n   (d)    Special Regulations\n      (1)    Dimensional and development standards for each separate Planned\nDevelopment (PD) District shall be established in the ordinance granting the\nPlanned Development (PD) District and may include but shall not be limited to\nuses, density, lot area, lot width, lot depth, yard depths and widths, building\nheight, building elevations, coverage, floor area ratio, parking, access,\nscreening, landscaping, accessory buildings, signs, lighting, management\nassociations, and other requirements as the City Commission may deem\nappropriate.\n      (2)    The Planned Development (PD) District shall conform to all other\nsections of the ordinance and this Zoning Code unless specifically exempted in\nthe granting ordinance.\nTITLE FOUR - Site Development Standards\nChap.\n1114.   General Provisions.\nChap.\n1115.   Dimensional Regulations.\nChap.\n1116.   Parking and Loading.\nChap.\n1117.   Landscaping.\nChap.\n1118.   Site Lighting.\nChap.\n1119.   Signs.\nChap.\n1120.   Screening and Fencing.\nChap.\n1121.   Waste Management.\nChap.\n1122.   Urban Design.\nChap.\n1123.   Infill.\nChap.\n1124.   Animal Regulations.\nChap.\n1125.   Performance Standards.\nCHAPTER 1114\nGeneral Provisions\n1114.01   Purpose.\n1114.02   Organization\n1114.03   Applicability.\n1114.04   General Measurement Rules.\n1114.05   Alternative Compliance.\n \n1114.01 PURPOSE.\n   This Title establishes uniform standards for the development and improvement\nof property throughout Springfield to ensure quality development that is\nconsistent with the Clark County Comprehensive Plan.\n1114.02 ORGANIZATION.\n   This Title is organized into the following chapters for each development\nstandard as summarized in Table 1114.02.1: Development Standards Overview.\nSpecific regulations and standards apply as provided in this Title.\nTable 1114.02.1: Development Standards Overview\nDevelopment Standard    Location Summary\n                        CHAPTER  Addresses the various yards, setbacks, and\nDimensional Regulations 1115 -   dimensional requirements that apply to a lot\n                                 or development\n                        CHAPTER  Provides for when parking and loading is\nParking and Loading     1116-    required and how a site manages parking and\n                                 loading accommodations\n                        CHAPTER  Regulates the necessary landscaping\nLandscaping             1117 -   requirements to improve the development\n                                 aesthetic and maintain the City's natural feel\n                        CHAPTER  Regulates site lighting to minimize light\nSite Lighting           1118 -   pollution while balancing the desire for\n# 【3†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn3file3\nMclick Target: \"3:3\"\nContent Snippet:\n(24)    Projection\n   Any part of a building such as architectural features which protrude into\nthe required yard or yards.\n      (25)    Property Line.\n         See Lot Line.\n      (26)    Property\n   A piece of real property or land.\n      (27)    Public and Institutional District\n   Those zoning districts where public and institutional land uses are the\nprimary uses. Public and Institutional zoning districts are those designated as\nP-PR, P-IE, and PDM, unless specified otherwise.\n      (28)   P-DM\n   The acronym or abbreviated form of the Downtown Medical district.\n      (29)   P-PR\n   The acronym or abbreviated form of the Parks and Recreation district.\n      (30)    P-IE\n   The acronym or abbreviated form of the Institutional and Educational\ndistrict.\n \n   (q)    Q Terms\n      (1)    Qualified Professional\n   A licensed or state/nationally registered design, building, engineering,\nconstruction, architectural, or planning professional or any person involved\nwith the development process who maintains an accredited collegiate degree in\nthe construction, development, planning, engineering, or architectural field.\n   \n   (r)    R Terms\n      (1)    Rear Lot Line\n   The lot line opposite and most distant from the front lot line.\n      (2)    Rear Yard Line\n   A line parallel to the rear lot line and as far forward from the rear lot\nline as required by this Zoning Code, extending from one side lot line to an\nopposite side yard line. See \"Rear Lot Line.\"\n      (3)    Rear Yard\n   The required area between the rear yard line and the rear lot line and\nextending from one side yard line to an opposite side yard line.\n      (4)    Recommended Tree List\n   The recommended tree list of the City of Springfield, Ohio.\n      (5)    Reconstruct\n   To rebuild a structure that has been destroyed or demolished. For purposes\nof this definition, reconstruct does not apply to the removal and replacement\nof all or part of a building or structure in the same configuration.\n      (6)    Record Plan\n   A drawing or set of drawings of an approved final subdivision prepared for\nappropriate signatures and recording in the County Recorder's office and for\ndistribution to applicable agencies.\n      (7)    Remodel/Repair\n   Any improvement to a building which is not a structural enlargement or\nreconstruction.\n      (8)    Residential District\n   Those zoning districts where commercial land uses are the primary uses.\nResidential zoning districts are those designated as R-AG, R-LD, and R-HD,\nunless specified otherwise.\n      (9)    Right-of-Way\n   A strip of land taken or dedicated for use as a public way. As a roadway, it\nnormally incorporates the curbs, tree lawns, sidewalks, lighting and drainage\nfacilities, and may include special features (required by the topography or\ntreatment) such as grade separation, landscaped areas, viaducts and bridges.\n      (10)   Road\n   A local, rural, or suburban thoroughfare of low-to-moderate vehicular speed\nand capacity.\n# 【4†springfield-oh-2.txt†file_0000000095fc722f8da5facad3bd81ab】\nFile created at: 2026-03-21T13:52:41Z\nFile last modified at: 2026-03-21T13:52:41Z\nContent source: Source.file\nTitle: springfield-oh-2.txt\nCitation Marker: fileciteturn3file4\nMclick Target: \"3:4\"\nContent Snippet:\nDevelopment in the Parks and Recreation (P-PR)\ndistrict shall follow the standards in Table 1112.01.1: Parks and Recreation\n(P-PR) District Dimensional Standards.\nTable 1112.01.1: Parks and Recreation (P-PR) District Dimensional Standards\nParks and Recreation (P-PR) District - Dimensional Standards\nLot Requirements\nA Lot Are (min.)                     N/A\nB Lot Width (min.)                   N/A\nC Lot Depth (min.)                   N/A\nD Total Lot Building Coverage (max.) N/A\nSetback Requirements\nE Front (min.)                       20 feet\nF Front (max.)                       N/A\nG Rear (min.)                        20 feet\nH Side (min.)                        20 feet\nI Corner Side Yard (min.)            20 feet\nBuilding Requirements\nJ Height (min.)                      N/A\nK Height (max.)                     