kind = "plain_text"
text = "Your comprehensive guide to creating Event Models in Penpot is ready. It covers the Event Modeling methodology fundamentals, detailed Penpot workspace setup, component creation for all four patterns (State Change, State View, Automation, Translation), swimlane and slice organization, layer hierarchy mapping to F# code, Information Completeness checking, Given/When/Then specifications, REST API integration for code generation, and complete step-by-step workflows with best practices and common pitfalls."

[[body.segments]]
kind = "tool_use"
text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"artifacts\",\"input\":{\"id\":\"compass_artifact_wf-e5003bc7-185c-469e-80c0-3c492861872f_text/markdown\",\"type\":\"text/markdown\",\"title\":\"Creating Event Models in Penpot: A Comprehensive Guide for LLMs\",\"source\":\"c\",\"command\":\"create\",\"content\":\"# Creating Event Models in Penpot: A Comprehensive Guide for LLMs\\n\\n**Penpot** is an open-source design platform that serves as an ideal canvas for Event Modeling because of its web-standard foundation, component system, and programmable REST API. This guide provides step-by-step instructions for creating Event Models that bridge design and code, particularly for F#-based implementations following vertical slice architecture.\\n\\n## Understanding the foundations\\n\\nEvent Modeling is a visual blueprint methodology created by Adam Dymitruk for designing information systems. **The model shows how information flows through a system over time, using a timeline from left to right**. The core insight: systems have just three moving pieces (wireframes/screens, commands, events/views) and four patterns (State Change, State View, Automation, Translation).\\n\\nPenpot uniquely supports Event Modeling through its component system (for reusable elements), layer hierarchy (for swimlanes and organization), frames/boards (for slice boundaries), and REST API (for extracting design data into code). The platform uses actual CSS, SVG, and HTML rather than proprietary formats, making it superior for design-to-code workflows.\\n\\n## Setting up your Penpot workspace for Event Modeling\\n\\n### Create the file structure\\n\\nStart by creating a new Penpot file within your team project. Name it descriptively (e.g., \\u0022Hotel Booking System - Event Model\\u0022). **Use pages to separate different aspects**: one page for the main Event Model timeline, additional pages for component definitions, detailed wireframes, or alternative flows.\\n\\n**Create a board for each major workflow or bounded context**. Press \\u0060B\\u0060 to activate the board tool, then click and drag. Boards serve as high-level containers - think of each board as representing one complete user journey or system boundary. Set boards to \\u0022Show in View Mode\\u0022 for presentation purposes.\\n\\n### Establish the component library\\n\\nNavigate to the Assets panel and create a component library structure. **Use the slash notation to organize components into folders**:\\n- \\u0060EventModel/Commands\\u0060 for blue command boxes\\n- \\u0060EventModel/Events\\u0060 for orange event boxes  \\n- \\u0060EventModel/ReadModels\\u0060 for green view boxes\\n- \\u0060EventModel/Wireframes\\u0060 for UI element templates\\n- \\u0060EventModel/Automations\\u0060 for gear icons and processors\\n\\n**To create a component**: Select an object or group, press \\u0060Ctrl/Cmd \\u002B K\\u0060. **To organize components**: Rename using \\u0022FOLDER/COMPONENT\\u0022 format. This creates collapsible groups in your Assets panel.\\n\\n### Define color standards\\n\\nCreate color assets for consistent use across your Event Model. Access the color picker, select \\u0022File Library\\u0022 in the libraries menu, and click \\u0022\\u002B\\u0022 to add colors:\\n\\n- **Event Orange**: \\u0060#FF9933\\u0060 or \\u0060#FFA500\\u0060 - for events (past tense facts)\\n- **Command Blue**: \\u0060#3366FF\\u0060 or \\u0060#0066CC\\u0060 - for commands (user intentions)\\n- **Read Model Green**: \\u0060#33CC99\\u0060 or \\u0060#00CC66\\u0060 - for views and queries\\n- **Wireframe White/Gray**: \\u0060#FFFFFF\\u0060 with gray stroke or \\u0060#F5F5F5\\u0060 - for screens\\n- **Automation Gray**: \\u0060#999999\\u0060 - for gear icons and processors\\n\\nName these colors clearly in your Assets panel: \\u0022EventModel/Event Orange\\u0022, \\u0022EventModel/Command Blue\\u0022, etc. Hold \\u0060Alt/Option\\u0060 and click to apply to strokes.\\n\\n## Creating Event Model component templates\\n\\n### Command component (blue boxes)\\n\\nCreate a rectangle approximately 120px \\u00D7 80px. Fill it with Command Blue. Add a text layer inside with font size 14px, bold weight. **The component should include**:\\n- Command name at top (imperative verb phrase: \\u0022Book Room\\u0022, \\u0022Cancel Booking\\u0022)\\n- Parameter list below in smaller text (10px, regular weight)\\n- Leave space for documenting data fields\\n\\nSelect both rectangle and text, press \\u0060Ctrl/Cmd \\u002B G\\u0060 to group, then \\u0060Ctrl/Cmd \\u002B K\\u0060 to create component. Name it \\u0022EventModel/Commands/Command Template\\u0022. **In the Design panel, add component annotations** documenting the structure: \\u0022Use for user intentions. Name with imperative verbs. List all parameters from UI or system state.\\u0022\\n\\n### Event component (orange boxes)\\n\\nCreate a rectangle 140px \\u00D7 80px filled with Event Orange. Add bold text for event name (past tense: \\u0022Room Booked\\u0022, \\u0022Payment Processed\\u0022). Include a second text layer for data fields in smaller font.\\n\\n**Events must contain ALL fields needed downstream**. The Information Completeness principle requires every field to have an origin and destination. Structure your event component template to accommodate:\\n- Event name (past tense)\\n- Complete data payload\\n- Timestamp (implicit)\\n- Aggregate/entity ID\\n\\nCreate the component and name it \\u0022EventModel/Events/Event Template\\u0022. Add annotations: \\u0022Use for facts that occurred. Past tense naming. Include complete data for downstream views and commands.\\u0022\\n\\n### Read Model component (green boxes)\\n\\nCreate a 120px \\u00D7 100px rectangle with Read Model Green fill. Add text for the view name and a list of fields displayed. **Read Models show accumulated information from events**.\\n\\nInclude in your template:\\n- View/query name\\n- Fields displayed to user\\n- List of events consumed (smaller text at bottom)\\n\\nCreate component \\u0022EventModel/ReadModels/ReadModel Template\\u0022 with annotations: \\u0022Use for queries and data displays. Shows information to users. Lists events consumed for building the view.\\u0022\\n\\n### Wireframe/Screen component\\n\\nCreate a larger rectangle (320px \\u00D7 240px or larger) with white fill and dark gray stroke (2px width). Add a header bar and placeholder content areas. **Wireframes show the user perspective** - where information comes from and goes to.\\n\\nThe wireframe should indicate:\\n- UI component type (form, list, detail view, dialog)\\n- Form fields or data displays\\n- Action buttons\\n- Navigation elements\\n\\nCreate component \\u0022EventModel/Wireframes/Screen Template\\u0022. Keep wireframes simple - focus on information flow rather than pixel-perfect design. The goal is understanding what users see at any point in time.\\n\\n### Automation component (gear icon)\\n\\nCreate a small gear icon or circle (40px \\u00D7 40px) filled with Automation Gray. Use the path tool or import an SVG gear icon. This represents system automations - processes that work like a user would work but run automatically.\\n\\nCreate component \\u0022EventModel/Automations/Processor\\u0022. Annotate: \\u0022Represents automated processes. Monitors TODO list view, triggers commands, marks items complete.\\u0022\\n\\n## Implementing the four Event Modeling patterns\\n\\n### Pattern 1: State Change (Command pattern)\\n\\n**Visual structure**: \\u0060[Wireframe/Trigger] \\u2192 [Command (Blue)] \\u2192 [Event(s) (Orange)]\\u0060\\n\\nThis pattern empowers users to change system state. **Create it step-by-step**:\\n\\n1. **Place wireframe component** at the top of your timeline showing the user interface\\n2. **Add command component** directly below, aligned vertically\\n3. **Add one or more event components** to the right of the command\\n4. **Draw connectors** using the path tool (press \\u0060P\\u0060): wireframe \\u2192 command \\u2192 events\\n\\n**In the wireframe**, document which fields the user enters. **In the command**, list the parameters derived from the wireframe plus any from client state (like current user ID). **In the event**, include all data that changes plus contextual information needed by downstream views.\\n\\n**Specification format**: Attach a text box with Given-When-Then scenario:\\n\\u0060\\u0060\\u0060\\nGIVEN: [Current state as events]\\nWHEN: [Command name] with [parameters]\\nTHEN: [Event name(s)] published with [data]\\n\\u0060\\u0060\\u0060\\n\\nEach State Change pattern represents one vertical slice - a complete unit of work from UI to persistence.\\n\\n### Pattern 2: State View (Read Model pattern)\\n\\n**Visual structure**: \\u0060[Event(s) (Orange)] \\u2192 [Read Model (Green)] \\u2192 [Wireframe Display]\\u0060\\n\\nThis pattern informs users about system state. **Views are passive** - they cannot reject events, only accumulate information.\\n\\n**Create it**:\\n1. **Place event components** on the timeline (these already exist from State Change patterns)\\n2. **Add read model component** to the right and below the events\\n3. **Draw connectors** from events to read model\\n4. **Link read model to wireframe** showing where data displays\\n\\n**In the read model**, list which events it consumes and what calculations or aggregations occur. A calendar view might consume \\u0022Room Booked\\u0022 and \\u0022Booking Cancelled\\u0022 events to show availability.\\n\\n**Specification format**:\\n\\u0060\\u0060\\u0060\\nGIVEN: [Events that occurred]\\nTHEN: [View name] should display [specific information]\\n\\u0060\\u0060\\u0060\\n\\nViews can be UI displays, reports, analytics dashboards, or special \\u0022TODO list\\u0022 views for automation patterns.\\n\\n### Pattern 3: Automation (Third Party Integration pattern)\\n\\n**Visual structure**: \\u0060[Events] \\u2192 [TODO List View (Green)] \\u2192 [Gear Icon] \\u2192 [Command (Blue)] \\u2192 [Event(s) (Orange)]\\u0060\\n\\nThis pattern handles outbound integration and background processing. **The key insight**: automation monitors a simple TODO list view. Each row triggers one command. The resulting event marks that row complete.\\n\\n**Create it**:\\n1. **Create a special read model** labeled \\u0022Pending [Action] TODO List\\u0022\\n2. **Place gear icon component** to the right of the TODO list\\n3. **Add command component** triggered by the automation\\n4. **Add resulting events** from the command\\n5. **Draw flow**: events \\u2192 TODO list \\u2192 gear \\u2192 command \\u2192 new events\\n\\n**Example**: After \\u0022Room Booked\\u0022 event, a \\u0022Pending Payment Processing\\u0022 TODO list appears. An automated payment processor (gear) monitors this list, triggers \\u0022Process Payment\\u0022 command, resulting in \\u0022Payment Processed\\u0022 or \\u0022Payment Failed\\u0022 events.\\n\\n**Keep automation simple**: No business logic in the processor itself. It just reads the list, makes calls, and marks items done. All business logic remains in command handlers.\\n\\n### Pattern 4: Translation\\n\\n**Visual structure**: \\u0060[External Events] \\u2192 [View] \\u2192 [Gear Icon] \\u2192 [Command] \\u2192 [Internal Events]\\u0060\\n\\nThis pattern handles inbound integration, translating external system information into domain-meaningful events. **It\\u0027s an anti-corruption layer** expressed visually without technical jargon.\\n\\n**Create it similarly to Automation**, but the source events come from an external system (mark these with pink color or a special label). The translation view interprets external data, and the command publishes events using your domain language.\\n\\n**Example**: GPS coordinates from a mobile app \\u2192 translation interprets location \\u2192 \\u0022Guest Arrived at Hotel\\u0022 or \\u0022Guest Left Hotel\\u0022 event (not raw latitude/longitude).\\n\\n**Restriction**: On the read side, translation can only consume events from ONE external system. The write side has no such limitation.\\n\\n## Organizing with swimlanes and slices\\n\\n### Horizontal swimlanes\\n\\n**Swimlanes organize your Event Model by aggregate, actor, or bounded context**. Create swimlanes by:\\n\\n1. Using boards for major boundaries (different bounded contexts)\\n2. Using frames within boards for aggregates\\n3. Visually separating with horizontal lines or background colors\\n4. Labeling each lane clearly\\n\\n**Actor-based lanes** show what each user type sees (Guest, Manager, Support Staff). **Aggregate-based lanes** group events that \\u0022change together\\u0022 - events tied to the same business entity (Booking, Room, Payment).\\n\\n**To create visual lanes**: Use the rectangle tool to create full-width background strips, lock them (\\u0060Ctrl/Cmd \\u002B Shift \\u002B L\\u0060), and arrange components on top. Or use frames (press \\u0060B\\u0060) to create bounded containers.\\n\\n### Vertical slices\\n\\n**Each pattern (Command, View, Automation, Translation) represents one slice** - the smallest deployable unit of work. Slices are the columns of your Event Model. **Critical rule: No screens above one another**. Each state change must be a separate vertical slice arranged side-by-side.\\n\\n**Organize slices**:\\n- Arrange chronologically left to right along the timeline\\n- Group related slices with subtle background colors or frames\\n- Use consistent spacing between slices (100-150px)\\n- Label slice boundaries if needed for team assignment\\n\\n**Each slice contains everything needed**: trigger/wireframe, command or view, events, specifications. Slices can be developed independently and in any order. The only coupling is the event contract - the shape and meaning of events flowing between slices.\\n\\n## Establishing layer hierarchy\\n\\nPenpot\\u0027s layer hierarchy maps to code structure, especially for F#-based implementations where each slice becomes an independent module.\\n\\n### Layer naming conventions\\n\\nUse prefixes for layer types:\\n- \\u0060screen-\\u0060 for wireframes and UI mockups\\n- \\u0060cmd-\\u0060 for command components\\n- \\u0060evt-\\u0060 for event components  \\n- \\u0060view-\\u0060 for read model components\\n- \\u0060auto-\\u0060 for automation processors\\n- \\u0060slice-\\u0060 for grouping related elements\\n\\n**Example hierarchy**:\\n\\u0060\\u0060\\u0060\\nBoard: Booking System\\n  \\u2514\\u2500 Frame: Booking Slice 1\\n      \\u251C\\u2500 screen-room-selection\\n      \\u251C\\u2500 cmd-select-room\\n      \\u251C\\u2500 evt-room-selected\\n      \\u2514\\u2500 specs-given-when-then\\n  \\u2514\\u2500 Frame: Booking Slice 2\\n      \\u251C\\u2500 screen-booking-form\\n      \\u251C\\u2500 cmd-book-room\\n      \\u251C\\u2500 evt-room-booked\\n      \\u2514\\u2500 view-booking-confirmation\\n\\u0060\\u0060\\u0060\\n\\n**Use groups** (\\u0060Ctrl/Cmd \\u002B G\\u0060) to contain related elements. This creates parent-child relationships that mirror code module dependencies.\\n\\n### F# module mapping\\n\\nFor F#-based Event Sourcing implementations, **each slice translates to an independent module**:\\n\\n- **Frame name** \\u2192 F# module name\\n- **Command components** \\u2192 discriminated union cases or record types\\n- **Event components** \\u2192 event type definitions\\n- **View components** \\u2192 query function signatures or projection types\\n- **Parent-child relationships** \\u2192 module dependencies (F# enforces bottom-up architecture)\\n\\nThe layer hierarchy you create in Penpot should reflect the intended code structure. Frames at the same level have no dependencies. Nested frames indicate module dependencies.\\n\\n## Implementing Information Completeness Check\\n\\nAfter creating your Event Model, **verify every field has an origin and destination**. This rigorous check eliminates surprises during implementation.\\n\\n**Process**:\\n\\n1. **List all UI fields** from every wireframe\\n2. **Trace each field backward** to its source:\\n   - Does it come from a command parameter?\\n   - Does it come from a view querying events?\\n   - Does it come from client state (session, authentication)?\\n3. **Verify commands have needed data**:\\n   - Can the wireframe provide all parameters?\\n   - Is any data missing?\\n4. **Verify events contain complete information**:\\n   - Do events include all fields needed by downstream views?\\n   - Do events include all context needed for audit trails?\\n5. **Verify views can be built**:\\n   - Do the events contain enough data to construct the view?\\n   - Are there any gaps in information flow?\\n\\n**Mark complete fields** with a checkmark or color indicator. **Highlight missing fields** in red. Add missing fields to events or adjust the model structure.\\n\\n**This completeness check is non-negotiable** if you want \\u0022done is done\\u0022 quality - where completed slices never need revisiting when new features are added.\\n\\n## Creating Given/When/Then specifications\\n\\nEach command and view requires specifications that serve as both documentation and test scenarios. **Create these visually on the Event Model itself** rather than in separate documents.\\n\\n### For commands (State Change pattern)\\n\\nAdd a text box near each command component:\\n\\n\\u0060\\u0060\\u0060\\nGIVEN:\\n  - [Event 1 name] with [relevant data]\\n  - [Event 2 name] with [relevant data]\\n\\nWHEN:\\n  - [Command name] \\n  - Parameters: [list with example values]\\n\\nTHEN:\\n  - [Event name] published\\n  - Data: [complete event payload with examples]\\n\\nALTERNATIVELY (if command fails):\\n  - [Failure event] published\\n  - Reason: [business rule violation]\\n\\u0060\\u0060\\u0060\\n\\n**Use realistic data examples**. Instead of \\u0022Guest ID\\u0022, use \\u0022Guest-abc-123\\u0022. Instead of \\u0022amount\\u0022, use \\u0022$250.00\\u0022. Concrete examples reveal edge cases and clarify requirements.\\n\\n### For views (State View pattern)\\n\\nAdd a text box near each read model component:\\n\\n\\u0060\\u0060\\u0060\\nGIVEN:\\n  - [Event 1] occurred at [time] with [data]\\n  - [Event 2] occurred at [time] with [data]\\n  - [Event 3] occurred at [time] with [data]\\n\\nTHEN:\\n  - [View name] displays:\\n    - Field 1: [expected value]\\n    - Field 2: [calculated value]\\n    - Field 3: [aggregated value]\\n\\u0060\\u0060\\u0060\\n\\n**For automation patterns**, specify the TODO list structure and what triggers processing:\\n\\n\\u0060\\u0060\\u0060\\nGIVEN:\\n  - TODO List View shows 3 pending items\\n  - Item 1: BookingId xyz, Status: needs-payment\\n\\nWHEN:\\n  - Automated processor runs\\n  - Triggers \\u0022Process Payment\\u0022 for BookingId xyz\\n\\nTHEN:\\n  - \\u0022Payment Processed\\u0022 event stored\\n  - Item 1 removed from TODO list\\n\\u0060\\u0060\\u0060\\n\\nThese specifications translate directly to developer unit tests and form the acceptance criteria for each slice.\\n\\n## Using Penpot\\u0027s REST API for code generation\\n\\nThe Penpot REST API enables bidirectional sync between designs and code - a key feature for maintaining Event Models as living documentation.\\n\\n### Authentication\\n\\nGenerate an access token:\\n1. Navigate to Your Account \\u2192 Access tokens\\n2. Click \\u0022Generate new token\\u0022\\n3. Enter descriptive name (\\u0022EventModel Code Sync\\u0022)\\n4. Choose expiration (180 days or Never)\\n5. Copy token immediately (shown once)\\n\\n### Extracting Event Model data\\n\\n**Key RPC endpoints**:\\n- \\u0060get-file\\u0060 - Retrieves complete file structure including all pages, components, layers\\n- \\u0060get-page\\u0060 - Retrieves specific page data\\n- \\u0060get-project\\u0060 - Retrieves project information\\n\\n**Example request**:\\n\\u0060\\u0060\\u0060bash\\ncurl -H \\u0022Authorization: Token \\u003Cyour-token\\u003E\\u0022 \\\\\\n     \\u0022https://design.penpot.app/api/rpc/command/get-file?id=\\u003Cfile-uuid\\u003E\\u0022\\n\\u0060\\u0060\\u0060\\n\\n**The response includes**:\\n- Complete layer hierarchy with parent-child relationships\\n- Component instances and their main component references\\n- Layer names, positions, colors, and properties\\n- Text content and annotations\\n- Custom data attributes\\n\\n### Parsing for code generation\\n\\n**Process for F# code generation**:\\n\\n1. **Extract file structure** via \\u0060get-file\\u0060 endpoint\\n2. **Parse JSON/Transit response** to identify:\\n   - Frames representing slices (using naming convention like \\u0060slice-\\u0060)\\n   - Command components (blue fill color or \\u0060cmd-\\u0060 prefix)\\n   - Event components (orange fill or \\u0060evt-\\u0060 prefix)\\n   - View components (green fill or \\u0060view-\\u0060 prefix)\\n3. **Extract text content** from components for type names and fields\\n4. **Map hierarchy** to module structure\\n5. **Generate F# types**:\\n   - Commands \\u2192 discriminated union or record types\\n   - Events \\u2192 event type definitions\\n   - Views \\u2192 query function signatures\\n6. **Generate test scaffolding** from Given/When/Then text boxes\\n7. **Write to .fs files** following F# bottom-up dependency order\\n\\n### Bidirectional sync\\n\\n**Design-to-Code (forward sync)**:\\n- Trigger on Penpot webhook notifications (file updated)\\n- Parse updated file structure\\n- Regenerate type definitions\\n- Preserve hand-written implementation code\\n\\n**Code-to-Design (reverse sync)**:\\n- Parse committed F# code changes\\n- Update Penpot via \\u0060update-file\\u0060 endpoint\\n- Mark completed slices with version tags\\n- Update component annotations with implementation notes\\n\\n### Version management with \\u0022done is done\\u0022\\n\\n**The principle**: Once a slice is implemented and tested, it\\u0027s marked \\u0022done\\u0022 and should not require changes when new slices are added. The only coupling is event contracts.\\n\\n**Implement in Penpot**:\\n1. **Use component variants** with State property (Draft/In Progress/Done/Locked)\\n2. **Color code**: Draft (light gray), In Progress (yellow), Done (green), Locked (dark green with lock icon)\\n3. **Lock layers** for done slices using the lock icon in Layers panel\\n4. **Use version pinning**: When a slice is done, pin that file version with name \\u0022Sprint 1 - Booking Complete\\u0022\\n5. **Webhook integration**: Done status changes trigger notifications to development tools\\n\\n**Track in layer names**: Append status to slice frames: \\u0060slice-booking-room [DONE v1.0]\\u0060\\n\\n## Step-by-step: Creating your first Event Model\\n\\n### Step 1: Define the scenario\\n\\nChoose a concrete user journey. Example: \\u0022Guest books a hotel room.\\u0022\\n\\n**Brain storming phase**: List all state-changing events (orange sticky notes):\\n- Room Searched\\n- Room Selected  \\n- Room Booked\\n- Payment Processed\\n- Confirmation Sent\\n\\nCreate event components for each, arrange randomly (no order yet).\\n\\n### Step 2: Arrange the plot\\n\\n**Organize events chronologically** left to right:\\n1. Select all event components\\n2. Align them horizontally using alignment tools\\n3. Space them 150-200px apart\\n4. Verify the sequence tells a coherent story\\n5. Add or remove events as needed\\n\\n### Step 3: Add the storyboard\\n\\n**Create wireframe components** showing user perspective:\\n1. Place wireframe components above events\\n2. Each wireframe shows what user sees at that point in time\\n3. Include: search form, room selection screen, booking form, confirmation screen\\n4. Arrange in actor-based swimlanes if multiple user types exist\\n\\n### Step 4: Identify inputs (commands)\\n\\n**Add command components** between wireframes and events:\\n1. Each user action becomes a command (blue box)\\n2. Position command between trigger (wireframe) and result (event)\\n3. Name with imperative verbs: \\u0022Search Rooms\\u0022, \\u0022Book Room\\u0022, \\u0022Process Payment\\u0022\\n4. List parameters from wireframe fields\\n5. Draw connectors: wireframe \\u2192 command \\u2192 event\\n\\n### Step 5: Identify outputs (views)\\n\\n**Add read model components** showing information display:\\n1. Identify what data users need to see to make decisions\\n2. Create green view components\\n3. Connect views to events they consume\\n4. Link views to wireframes showing data display\\n5. Document which events each view aggregates\\n\\n### Step 6: Apply Conway\\u0027s Law\\n\\n**Organize into swimlanes for team ownership**:\\n1. Group slices by aggregate or bounded context\\n2. Use frames or visual separators for each lane\\n3. Label lanes clearly (Booking, Payment, Inventory, Notification)\\n4. Ensure teams can work independently on their lanes\\n5. Event contracts are the only coupling between lanes\\n\\n### Step 7: Elaborate scenarios\\n\\n**Add Given/When/Then specifications**:\\n1. Create text boxes for each command and view\\n2. Use the specification format described earlier\\n3. Include realistic example data\\n4. Review with all stakeholders (business, UX, developers)\\n5. Refine based on questions and edge cases discovered\\n\\n### Step 8: Information Completeness Check\\n\\n**Verify all fields traced**:\\n1. List every field in every wireframe\\n2. Trace each backward to source (event, client state, user input)\\n3. Verify events contain all needed fields\\n4. Mark gaps in red\\n5. Adjust model to fill gaps\\n\\n### Step 9: Export and version\\n\\n**Pin this version**:\\n1. Click pin icon in History tab\\n2. Name it \\u0022Initial Event Model - Ready for Implementation\\u0022\\n3. Export .penpot file for backup\\n4. Share with team via Penpot link or exported file\\n\\n## Best practices and patterns\\n\\n### Visual conventions to follow\\n\\n**Timeline rules**:\\n- **Always left to right** - time progresses horizontally\\n- **No arrows between slices** - events are the contracts, not arrows\\n- **Side-by-side layout** - slices arranged horizontally, not stacked\\n- **Consistent spacing** - use grids and guides for alignment\\n\\n**Color discipline**:\\n- **Orange/yellow for events only** - no exceptions\\n- **Blue for commands only** - including automated commands\\n- **Green for read models only** - queries, views, TODO lists\\n- **White/gray for wireframes** - UI mockups and triggers\\n- Use **pink for external systems** to distinguish boundaries\\n\\n**Naming conventions**:\\n- **Events: past tense** - \\u0022Room Booked\\u0022, \\u0022Payment Failed\\u0022, \\u0022Email Sent\\u0022\\n- **Commands: imperative** - \\u0022Book Room\\u0022, \\u0022Cancel Booking\\u0022, \\u0022Send Email\\u0022\\n- **Views: descriptive nouns** - \\u0022Available Rooms Calendar\\u0022, \\u0022Booking Confirmation\\u0022, \\u0022Payment TODO List\\u0022\\n- **Be specific and business-meaningful** - avoid technical jargon\\n\\n### Component patterns\\n\\n**Main components vs instances**:\\n- **Create main components** for each Event Model element type (command, event, view)\\n- **Use instances** throughout your model\\n- **Override text content** for each specific use\\n- **Keep visual style consistent** through component updates\\n- **Group components in Assets library** by type\\n\\n**Component variants for state tracking**:\\n- Create variants for Draft/In Progress/Done states\\n- Use variant properties for status indicators\\n- Apply to entire slices via frame components\\n- Makes progress visible at a glance\\n\\n### Schema documentation\\n\\n**Document data structures directly in components**:\\n- Use text layers within event components to list fields\\n- Include data types if helpful (though Event Modeling is language-agnostic)\\n- Show example values for clarity\\n- For complex schemas, link to detailed documentation\\n\\n**Example event component content**:\\n\\u0060\\u0060\\u0060\\nRoom Booked\\n\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\nBookingId: string (uuid)\\nGuestId: string (uuid)  \\nRoomType: \\u0022Ocean View\\u0022\\nCheckIn: 2025-04-15\\nCheckOut: 2025-04-19\\nTotalPrice: 1250.00\\nBookedAt: timestamp\\n\\u0060\\u0060\\u0060\\n\\n### Handling multiple Read Models and Commands\\n\\n**When one event feeds many views**:\\n- Draw connectors from the single event to all consuming views\\n- Use layer depth to avoid visual clutter (bring key paths to front)\\n- Consider creating a dedicated \\u0022Events Layer\\u0022 and \\u0022Views Layer\\u0022 for organization\\n\\n**When commands require data from multiple views**:\\n- Create a \\u0022Supporting Views\\u0022 swimlane below main timeline\\n- Show which views provide data for command validation\\n- These are \\u0022Logic Read Models\\u0022 - they support commands rather than user displays\\n\\n**Complex command validation**:\\n- Show validation logic views separately\\n- Connect them with dotted lines (use dashed stroke style)\\n- Document in specifications which views inform validation\\n\\n### Distinguishing implementation from visualization\\n\\n**Remember two purposes**:\\n\\n1. **Visualization for understanding** - Shows information flow, user perspective, system behavior over time\\n2. **Implementation slices** - Defines units of work for developers\\n\\n**These align but aren\\u0027t identical**. The visual Event Model shows the user journey chronologically. The implementation slices might be developed in different order based on dependencies and priorities.\\n\\n**Use slice groupings and labels** to indicate implementation order separate from chronological flow. For example, use small numbered circles (1, 2, 3) to show development priority while maintaining chronological timeline.\\n\\n### Automation and integration patterns\\n\\n**Keep automations visible**:\\n- Use distinct gear icons or robot symbols\\n- Show TODO list views explicitly\\n- Document polling frequency or trigger conditions in annotations\\n- Make it clear this is system behavior, not user action\\n\\n**External system boundaries**:\\n- Use pink or distinct color for external systems\\n- Label clearly (\\u0022External: Payment Gateway\\u0022, \\u0022External: Email Service\\u0022)\\n- Show Translation pattern for inbound integration\\n- Show Automation pattern for outbound integration\\n- Document API contracts in component annotations\\n\\n### Progressive elaboration\\n\\n**Start simple, add detail progressively**:\\n\\n**Phase 1 - Brain Storm**: Just events, rough order\\n**Phase 2 - Plot**: Events in chronological sequence  \\n**Phase 3 - Story Board**: Add wireframes showing user perspective\\n**Phase 4 - Patterns**: Add commands and views to complete patterns\\n**Phase 5 - Specifications**: Given/When/Then scenarios\\n**Phase 6 - Completeness**: Trace all fields from origin to destination\\n**Phase 7 - Refinement**: Adjust based on questions and gaps\\n\\nDon\\u0027t try to perfect everything at once. Event Modeling workshops typically take 2-4 hours for initial model, then refinement over days.\\n\\n### Collaboration and feedback\\n\\n**Use Penpot\\u0027s collaboration features**:\\n- **Real-time multiplayer** - Work with team simultaneously\\n- **Comments** - Click specific components and add feedback\\n- **Version pinning** - Save milestones as you progress\\n- **Shareable links** - Send to stakeholders for review\\n- **View mode** - Present the model like a slideshow\\n\\n**Workshop facilitation**:\\n- Use a large screen or projector\\n- Have one person drive Penpot while team calls out changes\\n- Use timer for brain storming phases (limit to 10-15 minutes)\\n- Rotate who writes specifications\\n- Vote on contentious decisions rather than endless debate\\n\\n### Maintaining the Event Model\\n\\n**Living documentation principle**:\\n- Update Event Model when requirements change\\n- Sync with code changes via webhooks\\n- Review during sprint planning\\n- Use as onboarding tool for new team members\\n- Reference during bug investigation (\\u0022What events should have occurred?\\u0022)\\n\\n**Versioning strategy**:\\n- Pin versions at major milestones\\n- Use naming convention: \\u0022Sprint [N] - [Feature] Complete\\u0022\\n- Export .penpot files to version control system\\n- Tag component versions with \\u0022v1.0\\u0022, \\u0022v2.0\\u0022 when contracts change\\n\\n**Handling breaking changes**:\\n- Event shape changes require coordination across slices\\n- Use versioned events (\\u0022Room Booked v2\\u0022) during migration\\n- Show both versions temporarily on model with migration slice\\n- Lock old version when fully migrated\\n\\n## F# implementation patterns\\n\\nWhile Event Modeling is technology-agnostic, F#\\u0027s module system aligns naturally with slice-based architecture.\\n\\n### Slice to module mapping\\n\\n**Each slice becomes an F# file (module)**:\\n\\n\\u0060\\u0060\\u0060fsharp\\n// BookRoom.fs\\nmodule HotelBooking.BookRoom\\n\\n// Types extracted from Penpot components\\ntype Command = {\\n    GuestId: GuestId\\n    RoomType: RoomType\\n    CheckIn: DateTime\\n    CheckOut: DateTime\\n}\\n\\ntype Event = \\n    | RoomBooked of RoomBookedData\\n    | BookingFailed of Reason: string\\n\\ntype RoomBookedData = {\\n    BookingId: BookingId\\n    GuestId: GuestId\\n    RoomType: RoomType\\n    CheckIn: DateTime\\n    CheckOut: DateTime\\n    TotalPrice: decimal\\n    BookedAt: DateTime\\n}\\n\\n// Handler (implementation details not in Event Model)\\nlet handle (command: Command) (state: GuestState) : Event list =\\n    // Implementation\\n    []\\n\\u0060\\u0060\\u0060\\n\\n**File order follows F# bottom-up dependency**:\\n- Files lower in Penpot hierarchy compiled first\\n- Each file references only previously compiled files\\n- No circular dependencies possible\\n\\n### Component to type mapping\\n\\n**Commands \\u2192 Record types or DU cases**:\\n\\u0060\\u0060\\u0060fsharp\\ntype BookingCommands =\\n    | BookRoom of BookRoomCommand\\n    | CancelBooking of CancelBookingCommand\\n\\u0060\\u0060\\u0060\\n\\n**Events \\u2192 Discriminated unions**:\\n\\u0060\\u0060\\u0060fsharp\\ntype BookingEvents =\\n    | RoomBooked of RoomBookedEvent\\n    | BookingCancelled of BookingCancelledEvent\\n    | PaymentProcessed of PaymentProcessedEvent\\n\\u0060\\u0060\\u0060\\n\\n**Views \\u2192 Query functions**:\\n\\u0060\\u0060\\u0060fsharp\\ntype AvailableRoomsView = {\\n    RoomType: RoomType\\n    AvailableDates: DateTime list\\n    PricePerNight: decimal\\n}\\n\\nlet queryAvailableRooms \\n    (roomType: RoomType) \\n    (events: BookingEvents list) \\n    : AvailableRoomsView\\n\\u0060\\u0060\\u0060\\n\\n### Given/When/Then to tests\\n\\nSpecifications translate directly to F# property-based or example-based tests:\\n\\n\\u0060\\u0060\\u0060fsharp\\nmodule BookRoomTests\\n\\nopen Expecto\\nopen HotelBooking.BookRoom\\n\\n[\\u003CTests\\u003E]\\nlet tests =\\n    testList \\u0022Book Room Command\\u0022 [\\n        test \\u0022Successfully books available room\\u0022 {\\n            // GIVEN\\n            let state = {\\n                RegisteredGuests = [guestId]\\n                AvailableRooms = [oceanViewRoom]\\n            }\\n            \\n            // WHEN\\n            let command = { \\n                GuestId = guestId\\n                RoomType = OceanView\\n                CheckIn = date \\u00222025-04-15\\u0022\\n                CheckOut = date \\u00222025-04-19\\u0022\\n            }\\n            let events = BookRoom.handle command state\\n            \\n            // THEN\\n            match events with\\n            | [RoomBooked data] -\\u003E\\n                Expect.equal data.RoomType OceanView \\u0022Room type matches\\u0022\\n                Expect.equal data.TotalPrice 1250m \\u0022Price calculated correctly\\u0022\\n            | _ -\\u003E failtest \\u0022Expected RoomBooked event\\u0022\\n        }\\n    ]\\n\\u0060\\u0060\\u0060\\n\\n### Code generation approach\\n\\n**Generate type definitions from Penpot**, hand-write business logic:\\n\\n1. **Parse Penpot JSON** to extract component names and fields\\n2. **Generate type definitions** (records, DUs)\\n3. **Generate test scaffolding** from Given/When/Then text\\n4. **Preserve hand-written code** in handler functions\\n5. **Regenerate on model changes** without overwriting logic\\n\\nUse F# type providers or custom code generation scripts that respect special markers in code files.\\n\\n## Common pitfalls and how to avoid them\\n\\n**Pitfall: Creating too many events**\\n- **Problem**: Event explosion makes model unreadable\\n- **Solution**: Each event represents a meaningful business state change. Combine related changes into one event with multiple fields rather than many tiny events.\\n\\n**Pitfall: Commands that query**\\n- **Problem**: Mixing reads and writes in command pattern\\n- **Solution**: Commands change state (write). Views query state (read). If a command needs data, it receives it from the wireframe or supporting Logic Read Models - but the command itself doesn\\u0027t query.\\n\\n**Pitfall: Business logic in wireframes**\\n- **Problem**: Documenting validation rules or calculations in UI\\n- **Solution**: Wireframes show what users see and enter. Business rules belong in Given/When/Then specifications attached to commands.\\n\\n**Pitfall: Arrows everywhere**\\n- **Problem**: Excessive connectors create visual clutter\\n- **Solution**: Use connectors within patterns (command\\u2192event, event\\u2192view) but not between slices. Events are the contracts - their presence on the timeline shows information flow.\\n\\n**Pitfall: Skipping Information Completeness**\\n- **Problem**: Missing data discovered during implementation requires rework\\n- **Solution**: Always trace every field from origin to destination. This 30-minute check saves hours of rework later.\\n\\n**Pitfall: Vertical stacking of screens**\\n- **Problem**: Same screen appears in multiple places vertically\\n- **Solution**: Each state change is a separate slice arranged side-by-side horizontally. If the same UI appears at different points in time, show it multiple times along the timeline.\\n\\n**Pitfall: Technical implementation details in model**\\n- **Problem**: Including database schemas, APIs, frameworks in Event Model\\n- **Solution**: Event Modeling is technology-agnostic and implementation-independent. Focus on information flow and business behavior, not technical architecture.\\n\\n**Pitfall: Not versioning the model**\\n- **Problem**: Losing track of changes or unable to roll back\\n- **Solution**: Use Penpot\\u0027s version pinning religiously. Pin before major changes and at completion of each sprint or milestone.\\n\\n## Conclusion\\n\\nCreating Event Models in Penpot combines visual design thinking with rigorous systems analysis. The platform\\u0027s component system, layer hierarchy, and REST API make it uniquely suited for Event Modeling that serves as both documentation and code generation source.\\n\\n**Remember the core principles**:\\n- **Three moving pieces**: Wireframes, Commands/Events, Views\\n- **Four patterns**: State Change, State View, Automation, Translation\\n- **Information Completeness**: Every field traced from origin to destination\\n- **Slice independence**: Each slice is a complete vertical cut deployable separately\\n- **Timeline organization**: Left to right represents progression through time\\n- **Visual simplicity**: Focus on information flow, not implementation details\\n\\n**The Event Model is your system blueprint**. Invest time creating it thoroughly before coding begins. The result: predictable delivery, flat cost curves, parallel development, and the \\u0022done is done\\u0022 quality where completed work never needs revisiting when new features are added.\\n\\nPenpot\\u0027s open-source nature, web-standard foundation, and programmable API make this vision of bidirectional design-code sync achievable. Use this guide to create Event Models that bridge the gap between business vision, UX design, and technical implementation.\",\"language\":null,\"md_citations\":[{\"url\":\"https://eventmodeling.org/\",\"uuid\":\"ed08fa36-8672-47a8-9d9c-200ed73d6e96\",\"title\":\"Eventmodeling\",\"sources\":[{\"url\":\"https://eventmodeling.org/\",\"uuid\":\"ed08fa36-8672-47a8-9d9c-200ed73d6e96\",\"title\":\"Event Modeling - Designing Modern Information Systems\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"subtitles\":null,\"content_body\":null,\"resource_type\":null}],\"metadata\":{\"type\":\"generic_metadata\",\"uuid\":\"ed08fa36-8672-47a8-9d9c-200ed73d6e96\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"preview_title\":\"Event Modeling - Designing Modern Information Systems\"},\"end_index\":572,\"start_index\":464,\"origin_tool_name\":\"web_search\"},{\"url\":\"https://eventmodeling.org/about/\",\"uuid\":\"fce525e3-40bd-445f-9165-8abf408e31da\",\"title\":\"Eventmodeling\",\"sources\":[{\"url\":\"https://eventmodeling.org/about/\",\"uuid\":\"fce525e3-40bd-445f-9165-8abf408e31da\",\"title\":\"About - Event Modeling\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"subtitles\":null,\"content_body\":null,\"resource_type\":null}],\"metadata\":{\"type\":\"generic_metadata\",\"uuid\":\"fce525e3-40bd-445f-9165-8abf408e31da\",\"source\":\"Eventmodeling\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=eventmodeling.org\",\"preview_title\":\"About - Event Modeling\"},\"end_index\":572,\"start_index\":464,\"origin_tool_name\":\"web_search\"},{\"url\":\"https://eventmodeling.org/posts/what-is-event-modeling/\",\"uuid\":\"970e457d-e0e1-44e6-9055-be832ccb6281\",\"title\":\"Eventmodeling\",\"sources\":[{\"url\":\"https://eventmodeling.org/posts/what-is-event-modeling/\",\"uuid\":\"970e457d-e0e1-44e6-9055-be832ccb6