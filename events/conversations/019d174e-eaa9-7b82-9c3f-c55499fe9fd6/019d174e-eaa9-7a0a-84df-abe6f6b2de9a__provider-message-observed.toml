kind = "plain_text"
text = "This is really clean. You've surfaced the symmetry that EM diagrams hide:\n\n**Command Slice**: Actor → Command → **Handler** → Event\n**View Slice**: Event → **Projector** → View → Actor\n\nThe Handler and Projector are the same structural role — a transformation node governed by GWT rules. The diagram just renders them as invisible arrows between the colored stickies.\n\nAnd the GWT duality is the key insight. Same structure, different semantics:\n\n- **Handler GWT** = business rules (validation, state transitions)\n- **Projector GWT** = filter/shaping rules (what events, how to project)\n\nSo mapping back to your four primitives, I think you actually have a fifth element hiding in plain sight — the **Rule** node. Handler and Projector are both Rule nodes; the GWT specifications are their content. The primitives become:\n\nActor → Intent → **Rule** → Fact → **Rule** → Interpretation → Actor\n\n...which is a cycle. Every domain traversal is just walking this loop.\n\nThe thing that makes this powerful for analysis: because Rules are explicit nodes with GWT content rather than invisible edges, you can query them. \"Show me all rules that depend on this event type.\" \"What happens if this fact never occurs?\" \"Which actors are affected by this interpretation?\" — all become graph traversals.\n\nDoes Rule land as a primitive for you, or do you see Handler/Projector as edge types rather than nodes?"

