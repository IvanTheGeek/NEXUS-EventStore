text = "Got it. The ViewSlice at business level is just the data decision — no screen shown. The screen appears on the *next* CommandSlice where the actor acts on what the view told them.\n\n**ViewSlice: CheckSessionStatus**\n- Given: [AppOpened] (looks for LaundryExpenseLogged, finds none)\n- Then: SessionStatus { needsLocation: true }\n\n**Next CommandSlice: SetLocation**\n- Origin: \"Get Location Screen\" with snapshot showing location textbox filled with \"Love's #134 - Springfield, OH\"\n- Command: SetLocation { location }\n- Event: LocationSet { location }\n\nWant me to create the ViewSlice TOML first?"

