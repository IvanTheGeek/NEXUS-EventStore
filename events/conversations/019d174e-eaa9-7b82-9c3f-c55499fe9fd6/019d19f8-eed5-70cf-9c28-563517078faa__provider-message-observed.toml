[[body.segments]]
kind = "reasoning"
text = "Ivan is crystallizing a key architectural insight about how the Truth Graph works with multiple graph types, contexts, and perspectives. Let me trace through what he's saying.\n\nThe Truth Graph (NEXUS) has base primitives. Different domains/concerns project those primitives into their own naming and structure. The EM diagram is one such projection — a business process graph that's a subgraph of the full NEXUS graph.\n\nSo:\n- **NEXUS Graph** = the total truth, all primitives, all connections\n- **EM Graph** = business process subgraph, uses EM naming (Command, Event, Handler, Projector, View)\n- **App Lifecycle Graph** = technical subgraph (AppOpened, SessionStarted, etc.)\n\n\n- **UI Graph** = visual/interaction subgraph (screens, layers, interactions)\n- **UX Graph** = journey/flow subgraph (PATHs, user stories)\n\nEach is a subgraph of NEXUS, using the same five primitives but with domain-specific names. The real insight is that what you see depends on three dimensions: who's looking (perspective), what scope you're examining (context), and which subgraph you're viewing (graph type). ATLAS lets you compose across these dimensions to show different stakeholders exactly what they need to see."

[[body.segments]]
kind = "plain_text"
text = "This is the unifying insight. Let me map it:\n\n**NEXUS Graph** = everything. All facts, all connections, all contexts. The five primitives (Actor, Interaction/Signal, Intent, Fact, Interpretation) are the universal ontology.\n\n**Subgraphs** are typed projections of NEXUS, each with their own naming over the same primitives:\n\n| Subgraph Type | Intent | Fact | Interpretation | Character |\n|---|---|---|---|---|\n| Business Process (EM) | Command | Event | View | What the business cares about |\n| App Lifecycle | AppAction | AppEvent | AppState | How the software operates |\n| UI | Interaction | StateChange | Render | What the user sees/does |\n| UX/Journey | Step | Milestone | Experience | How it feels over time |\n| Infrastructure | Request | Log | Metric | How the system performs |\n\nEach is a subgraph of the same Truth Graph. AppOpened is a real Fact in NEXUS — it just belongs to the App Lifecycle subgraph, not the Business Process subgraph. It's not deleted, it's in a different typed graph.\n\nThen the triple you're seeing:\n\n**Perspective** (who) × **Context** (what scope) × **Graph Type** (which subgraph) = what ATLAS renders\n\nExamples:\n- Business × LaundryLog × EM = SetLocation → LocationSet → CurrentLocation → LogExpense → LaundryExpenseLogged → RecentExpenses\n- Developer × LaundryLog × EM + App Lifecycle = adds AppOpened, handler details, field types\n- Designer × LaundryLog × UI + UX = screens, interaction layers, PATHs with journey data\n\nAnd facets are the **encoding** of this triple on each element. `business.emd` means \"this belongs to the Business Process graph, visible in EM diagrams.\" An element tagged `app.lifecycle` would appear when that graph type is activated. Elements can belong to multiple subgraphs — LocationSet is both a business fact AND an app state fact.\n\nATLAS becomes a compositor. Activate graph types, set perspective, scope to context — it reads the facets and assembles the view. Same TOML files, same NEXUS graph, infinite compositions.\n\nDoes this change how facets should be structured in the TOML? Right now `business.emd` is flat dot notation. Should it encode the triple explicitly?"

