text = "My thoughts on facets is that just like a gem, there's a huge number of ways to turn it to see different aspects. The same would be for the combination of perspectives and contexts and graphs, each with levels. Is looking at a model diagram,toggleing each option would either add slices or remove, and levels might change the details shown for each slice. So I am wondering if we use one file for all the graphs in a slice OR use a different file for each type of graph. And for the facets, I was marking it as if viewing the event mode (business process graph) then business.emd was the business event model diagram."

