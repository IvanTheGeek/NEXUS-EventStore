text = "Yeah. Save it to memory. And then this also expands out to my Lagos concept that is Basically, the conceptual place where all of this is all of the facts are stored. So that facts that come in from anywhere like email support requests or ideas in a forum or a Discord chat. Can be processed stored as facts, processed, analyzed, brought in to guide the modeling that happens in Atlas. And then once that model is is built out enough to to be actual specifications, forge would then take those specs, and build artifacts that are the running program. Then the running program is handled by Paxis paxus, the PAXUS system, which actually runs it, gathers new data points from runtime information feeds it back to Lagos, and we start the cycle again. So it's just a continuous loop of of enhancement and refinement."

