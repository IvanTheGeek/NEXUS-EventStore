text = "The user is describing FORGE as a deterministic compiler-like system where AI assists but humans approve, and the full provenance chain is maintained through git."

[[body.segments]]
kind = "plain_text"
text = "FORGE as a compiler, not a generator. That's a critical distinction.\n\nA compiler is deterministic — same input, same output. FORGE takes the spec (TOML slices, GWT, field definitions) and transforms it into code. The transformation rules are themselves versioned, reviewable, and improvable. AI assists in building those transformation rules, but the rules once approved are fixed functions.\n\nThe provenance chain becomes:\n\n```\nSpec (git commit A) + Transformation Rules (git commit B) = Artifact (git commit C)\n```\n\nEvery artifact can be traced back to exactly which spec and which compiler version produced it. If an artifact has a bug, you know whether the spec was wrong or the transformation was wrong. Two different fixes, two different feedback paths.\n\nAnd the human review loop is where the learning happens:\n\n1. AI proposes a transformation: \"this GWT pattern maps to this F# handler pattern\"\n2. Human reviews, tweaks — \"use active patterns here instead of match, better readability\"\n3. Approved transformation becomes a rule in FORGE\n4. Next time that GWT pattern appears, FORGE applies the approved rule deterministically\n5. AI sees the preference, adjusts future proposals\n\nOver time FORGE's transformation rules embody the team's coding style, architectural preferences, and patterns. Not through AI generating code differently each time — through a growing library of **approved, deterministic transformations** that AI helped discover but humans certified.\n\nThis is fundamentally different from \"AI writes code.\" This is \"AI helps build a compiler that humans own.\" The compiler improves, the output is always traceable, and you can audit every decision.\n\nThe git commit chain tells the full story:\n\n- **Model repo**: spec changes with rationale\n- **FORGE repo**: transformation rules with review history\n- **Artifact repo**: produced code, tagged with source spec commit + FORGE rules commit\n- **Events repo**: runtime data showing how the artifact behaved\n\nAudit trail from user experience back to design decision. Complete."

