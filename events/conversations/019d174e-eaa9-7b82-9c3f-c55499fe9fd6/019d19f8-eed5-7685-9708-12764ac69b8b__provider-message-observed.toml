[[body.segments]]
kind = "reasoning"
text = "The user is thinking about what the default view should be in ATLAS. Let me think about this.\n\nThe most basic default when opening an Event Model is what Adam shows - the LCD (lowest common denominator) view:\n\n- Swimlanes (top and bottom)\n- Actor/Agent in the top lane\n- Command (blue sticky)\n- Event (orange sticky)\n- View/Read Model (green sticky)\n\nThat's the \"business behavior\" facet - what everyone sees.\n\nAdd GWT and you get the default working view.\n\nThe three dimensions they're hinting at:\n1. What type of content (business behavior, dev details, UI details)\n2. What role/audience is viewing (business stakeholder, developer, designer)\n\n\n3. What level of detail (summary, working, full)\n\nSo facets aren't just a simple list - there are multiple independent dimensions controlling what's visible, and the default view needs to balance across all three."

[[body.segments]]
kind = "plain_text"
text = "Right — facets isn't a flat list. There are dimensions to the viewing:\n\n**Dimension 1: What** — which parts of the model. Lanes, Actors, Commands, Events, Views, GWT, Handler, Projector, Fields, Snapshots, Types...\n\n**Dimension 2: Who** — the audience. Business stakeholder, developer, designer, product owner. Each has a default \"what\" configuration.\n\n**Dimension 3: Depth** — how much detail. Summary (just names), working (names + rules), full (everything including field types).\n\nThe most basic default — opening a model cold with no preferences — would be Adam's LCD diagram:\n\n- Swimlanes (top + bottom)\n- Actor/Agent\n- Command (name only)\n- Event (name only)\n\nThat's readable by anyone. Then GWT layers on as the first depth increase, still accessible to business people. That's your default working view.\n\nSo maybe `facets` on each element isn't a list of tags — it's coordinates in these dimensions:\n\n```toml\n[command]\nname = \"OpenApp\"\nfacets = { what = \"command\", depth = \"summary\" }\n```\n\nBut that might be overengineering the TOML. The rendering engine (ATLAS) could just *know* that commands are visible at summary depth for all audiences. The facet rules could live in the lens definition, not on every element.\n\nDoes the facet metadata belong on the elements, or in the lens definitions that ATLAS applies?"

