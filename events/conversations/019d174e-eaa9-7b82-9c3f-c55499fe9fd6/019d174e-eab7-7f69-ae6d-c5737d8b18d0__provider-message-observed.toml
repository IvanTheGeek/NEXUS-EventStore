text = "Four approaches, all using the LogExpense CommandSlice data:\n\n**Option A — Sticky Notes**: Closest to Adam's visual language. Vertical flow, colored notes (blue command, orange event), swimlane at top, GWT below. Workshop-friendly, recognizable to anyone who's seen an EM diagram.\n\n**Option B — Horizontal Flow**: Pipeline style matching the left-to-right timeline. Shows the transformation chain explicitly (command → handler → event). Compact. Makes the hidden handler visible inline.\n\n**Option C — Nested Blocks**: Structural outline view. Everything visible, dense, scannable. Fields inline with types. Good for spec review. This is the one that most naturally maps to \"reading the TOML\" — the HTML structure mirrors the file structure.\n\n**Option D — Card + Expandable**: Interactive. Compact summary by default, click to reveal GWT and fields. This is the one that maps best to facets — different expand sections could correspond to different facets. Business sees the card, clicks to see GWT. Dev clicks to see fields.\n\nThese aren't mutually exclusive — facets could switch between rendering styles. Business lens gets sticky notes, dev lens gets nested blocks."

