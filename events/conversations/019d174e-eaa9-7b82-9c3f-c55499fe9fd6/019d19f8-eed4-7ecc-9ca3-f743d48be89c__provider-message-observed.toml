text = "first, I am still getting friction here at \"Interaction: TapsRecordButton\". My thought is that UI is its own model, and it would then send or activate the Command like a Processor would in Adam's Diagrams. The View would feed the UI as an external input to UI, external output of the business behavior View related to the diagram. That is where that bridge idea of sort of coming in.  Rule edge seems correct to me. Flow edge is sounding like a slice. I am still open to renaming the Slice, just have not come up with something. For Command files, it needs to know what events are needed, these would be in the GWT, so really, the connection to events could be defined by them which would mean that at least one GWT would be required in the  CommandSlice TOML file (one slice per file). Like F#, we could use a UNIT type for when there is no event needed for GIVEN.  For ViewSlices, Again, would not the GWT provide the link?"

