[[body.segments]]
kind = "plain_text"
text = "Saved. The full cycle is now visible:\n\n**LOGOS** — the lake where everything flows in. Every email, support ticket, Discord message, forum post, runtime metric, bug report enters as a Fact in the Truth Graph. Human or AI processes them into Interpretations. Knowledge accumulates and refines continuously.\n\n**ATLAS** — the workbench. Takes the Truth Graph and lets you model through lenses. Business stakeholder opens the EM diagram, sees CVCV slices with GWT. Developer activates the dev facet, sees handlers and field types. Designer activates UI facets, sees screens and interaction layers. All the same graph, different animation cells visible.\n\n**FORGE** — the builder. Once ATLAS has enough specified slices with GWT rules, field contracts, and PATHS with example data, the specs are complete enough to generate. F# types from field definitions, handler signatures from GWT, test cases from PATHS, UI from Penpot designs. The spec *is* the implementation blueprint.\n\n**PAXUS** — the operator. Runs the artifact, observes it, collects runtime facts. Performance metrics, error patterns, usage analytics, support interactions — all flow back to LOGOS as new Facts. An error in production becomes a Fact that links to the slice that produced it. LOGOS now has richer understanding. ATLAS can see the gap. The loop continues.\n\nThe Truth Graph is the bloodstream connecting all four. Facts flow through the entire cycle and never get lost."

