[[body.segments]]
kind = "plain_text"
text = "Exactly. The loop is:\n\n**Model** → defines what's possible (slices, GWT)\n**PATH** → exercises the model with real data (journeys)\n**Gaps emerge** → PATHs reveal missing slices, missing views, missing rules\n**Model grows** → new slices fill gaps\n**Repeat**\n\nAnd because Facts are immutable, the model only ever *adds*. You never go back and change LaundryExpenseLogged — you add new slices that interpret it differently. The 3-hour window on RecentExpenses isn't modifying anything. It's a new lens on the same immutable facts.\n\nThis is Event Sourcing's gift to emergent design. You don't have to get it right upfront because you're not committing to a schema that's painful to change. You're committing to *facts that happened*, and the interpretations can evolve forever.\n\nThe Truth Graph amplifies this further. Every new slice, every new ViewSlice, every new PATH adds nodes and edges to the graph. The graph gets denser and more connected over time. Analysis gets *better* the more you model — gravity wells become visible, holes get detectable, cross-context bridges reveal integration points.\n\nYou started with five primitives and a hypothesis. Five slices later you have a walking skeleton where the 3-hour rule emerged naturally, PATHs separated from the model organically, facets evolved dot notation on their own, and the CVCV pattern revealed a missing view slice you hadn't planned for.\n\nThe graph is already reasoning for you. Want me to save our current state of decisions and concepts to memory for future sessions?"

