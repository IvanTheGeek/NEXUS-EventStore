kind = "plain_text"
text = "Now reads like Event Modeling:\n\n**CommandSlice**: Command → Handler (with GWT) → Event\n**ViewSlice**: Event (via GWT given) → Projector (with GWT) → View\n\nAnd the Truth Graph primitives map cleanly underneath:\n\n| Truth Graph | CommandSlice | ViewSlice |\n|---|---|---|\n| Signal | Command | View |\n| Transformation | Handler | Projector |\n| Rule | GWT | GWT |\n| Fact | Event | Event (referenced) |\n\nEM terminology on top, universal graph primitives underneath. When you build a UI context graph later, Signal/Transformation/Rule/Fact can take UI-native names instead.\n\nDoes `lane` work as-is, or should it support multiple values — like an origin that's both a role and a department?"

