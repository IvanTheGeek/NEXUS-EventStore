kind = "plain_text"
text = "Here's what to look at:\n\n**CommandSlice** (`record-expense.toml`): Actor → Intent → Fact, with Rules carrying the GWT. `given = \"Unit\"` for no prior events needed.\n\n**ViewSlice** (`view-expense-history.toml`): Fact → Interpretation → Actor, with Rules carrying the filter/shaping GWT. `given = [\"LaundryExpenseRecorded\"]` is where the cross-slice connection lives — parsing this tells the graph that ViewExpenseHistory depends on the RecordExpense slice's Fact.\n\nKey design decisions to react to:\n\n**Fields on Intent and Fact** — I put the data shape directly on the node. This means the TOML file is the single source of truth for both the graph structure *and* the data contracts. But it could be too much in one file — the graph cares about relationships, maybe field definitions belong elsewhere.\n\n**`given` as the linker** — a string `\"Unit\"` for no dependencies, an array `[\"LaundryExpenseRecorded\"]` for event dependencies. The graph builder reads all slices, finds every event name in `given` arrays, matches them to `fact.name` in other slices, and the topology emerges.\n\n**ViewSlice has no Intent** — it has Interpretation instead. The slice type determines which primitives are present.\n\nWhat's working, what's wrong?"

