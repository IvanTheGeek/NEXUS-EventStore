[[body.segments]]
kind = "plain_text"
text = "Let me lay out the options with the full ecosystem in mind. We have subgraphs across:\n\n**ATLAS**: Business Process, UI Visual, UI Interaction, UI Information, UI Structural, UI State, UX Journey, App Lifecycle...\n\n**FORGE**: Build Pipeline, Code Generation, Test Generation, Deployment...\n\n**PAXUS**: Runtime Monitoring, Error Tracking, Performance, Usage Analytics...\n\n**LOGOS**: Knowledge, Discussion, Support, Requirements...\n\nEach has its own slices, its own graph, but they all share Facts through the Truth Graph.\n\n**Option 1: Subgraph folders**\n\n```\ntruth-graph/\n  laundrylog/\n    business.emd/\n      slices/\n        SetLocation_019.../\n        LogExpense_019.../\n    ui.interaction/\n      slices/\n        ExpenseFormInteraction_019.../\n    ui.visual/\n      slices/\n        ExpenseFormLayout_019.../\n    app.lifecycle/\n      slices/\n        OpenApp_019.../\n    forge.codegen/\n      slices/\n        GenerateLogExpenseHandler_019.../\n    paxus.monitoring/\n      slices/\n        TrackExpenseLogging_019.../\n    events/\n      LocationSet/\n      LaundryExpenseLogged/\n```\n\nFacts live in a shared `events/` folder — single source of truth. Slices live under their subgraph. Graph builder reads all folders, builds each subgraph, detects bridges through shared event references.\n\nPros: clear separation, each team works in their folder. Cons: event definitions separated from the slices that produce them, could be many shallow folders.\n\n**Option 2: One model folder, subgraph is metadata**\n\n```\ntruth-graph/\n  laundrylog/\n    model/\n      SetLocation_019.../\n        SetLocation_019....toml        # graph = business.emd\n      OpenApp_019.../\n        OpenApp_019....toml            # graph = app.lifecycle\n      ExpenseFormInteraction_019.../\n        ExpenseFormInteraction_019....toml  # graph = ui.interaction\n    events/\n      LaundryExpenseLogged.toml\n      LocationSet.toml\n```\n\nEverything in one `model/` folder. The TOML declares which graph it belongs to. Graph builder sorts them. Filesystem is flat, the graph provides the structure.\n\nPros: simple filesystem, graph builder does the organizing. Cons: huge flat folder as the system grows, hard to navigate by eye.\n\n**Option 3: Ecosystem → Subgraph → Slices**\n\n```\ntruth-graph/\n  laundrylog/\n    atlas/\n      business.emd/\n        SetLocation_019.../\n        LogExpense_019.../\n      ui.interaction/\n        ExpenseFormInteraction_019.../\n      ui.visual/\n        ...\n    forge/\n      codegen/\n        GenerateLogExpenseHandler_019.../\n      tests/\n        LogExpenseTests_019.../\n    paxus/\n      monitoring/\n        TrackExpenseLogging_019.../\n      analytics/\n        ...\n    logos/\n      requirements/\n        LaundryExpenseTracking_019.../\n      support/\n        ...\n    events/\n      LocationSet.toml\n      LaundryExpenseLogged.toml\n      AppOpened.toml\n```\n\nThe four ecosystem phases are the top-level organizer. Subgraphs nest under their phase. Events remain shared at system level.\n\nPros: mirrors the LOGOS → ATLAS → FORGE → PAXUS cycle, teams know where their work lives, scales cleanly. Cons: deeper nesting, a slice might feel like it belongs in multiple phases.\n\n**Option 4: Flat files, graph is purely emergent**\n\n```\ntruth-graph/\n  laundrylog/\n    019..._SetLocation.toml\n    019..._OpenApp.toml\n    019..._ExpenseFormInteraction.toml\n    019..._GenerateLogExpenseHandler.toml\n    019..._LocationSet.event.toml\n    019..._LaundryExpenseLogged.event.toml\n```\n\nEverything flat. Events distinguished by `.event.toml`. Every file declares its graph membership internally. The filesystem is just storage — the graph builder creates all structure from content.\n\nPros: simplest possible filesystem, git diffs are clean, no folder decisions. Cons: unnavigable by humans at scale, all organization is in-memory only.\n\nMy instinct says **Option 3** is the right one. It maps to the cycle you've already defined, it gives natural boundaries for teams and tools, and the shared `events/` folder enforces the Truth Graph principle — Facts exist once, everything else references them.\n\nThe `events/` folder becomes the **backbone** of the Truth Graph. Each event TOML is a Fact definition — its fields, its identity. Slices across all subgraphs reference these shared Facts. The graph builder reads `events/` first, then walks every subgraph folder, and every `given` or `then` that references an event name links to the shared Fact node.\n\nWhich direction resonates, or is there a hybrid forming?"

