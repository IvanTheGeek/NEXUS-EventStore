[[body.segments]]
kind = "plain_text"
text = "That's the loop closing completely. One data structure — PATHs with example data — serves the entire ecosystem:\n\n**ATLAS** — modeling, visualize journeys, discover missing slices\n\n**FORGE** — test generation. Each PATH becomes a test case. GWT + example data = Given(concrete events), When(concrete command), Then(expected event with concrete fields). Edge cases are just PATHs with boundary data.\n\n**PAXUS** — runtime. The actual user session *is* a PATH. Every command, every event, timestamped, with real data. The system produces PATHs as a natural byproduct of running.\n\n**LOGOS** — support. User has a bug. They export their event log. That log *is* a PATH. Support loads it into ATLAS. The journey is visible — you can see exactly which slice, which GWT rule, which data values led to the unexpected behavior. The fix goes back into the spec, new GWT rule or new PATH as a regression test.\n\nThe cycle for a single bug:\n\n1. User hits issue → PAXUS captured the PATH (runtime events)\n2. User shares event log → LOGOS ingests it as facts\n3. Support loads PATH in ATLAS → sees the journey, finds the gap\n4. Modeler adds GWT rule or fixes spec → ATLAS updated\n5. FORGE generates new test from the user's PATH data → regression covered\n6. PAXUS deploys fix, monitors for recurrence → feeds back to LOGOS\n\nThe user's actual experience becomes a test case. Not a reproduction — the *real thing*. No \"steps to reproduce\" guessing. The event log is deterministic — replay it and you get the exact same state.\n\nAnd for edge cases — you don't have to imagine them. Real users find them. Their PATHs collect in LOGOS. Over time you have a corpus of real-world journeys that become your test suite. The test suite grows from usage, not from developer imagination."

