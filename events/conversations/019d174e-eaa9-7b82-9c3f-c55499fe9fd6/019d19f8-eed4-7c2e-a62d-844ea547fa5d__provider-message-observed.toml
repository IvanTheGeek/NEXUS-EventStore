[[body.segments]]
kind = "reasoning"
text = "The user wants to work slice by slice, one at a time. They want to figure out the first origin event and the first ViewSlice.\n\nLet me think about this. When the app opens, something needs to happen to establish the starting point. The user opens the app - that's the origin. So the first event would be something like `AppOpened` or `LaundrySessionStarted`.\n\nActually, let me think about this more carefully. The user opens the app. The system needs to check if there are previous LaundryExpenseLogged events. But wait - we need an origin event first.\n\nThe user is asking: what's the first event, and what's the first ViewSlice that reads it?\n\n\nAppOpened seems like the natural starting point - the user's action of opening the app triggers everything. A ViewSlice would then read that event along with any previously logged expenses to determine what to display. Though I'm wondering whether AppOpened is a Command that produces an event, or if the event itself is the origin point."

[[body.segments]]
kind = "plain_text"
text = "AppOpened works well. It's the true origin — the actor did something (opened the app), and the system records that fact. It's not CRUDy, it's behavioral. \"The driver opened the app at this moment.\"\n\nThe first CommandSlice would be:\n\n**CommandSlice: OpenApp**\n- Origin: TruckDriver / MobileApp\n- Command: OpenApp\n- Handler: OpenAppHandler\n- Event: AppOpened\n- GWT: Given Unit, When OpenApp, Then AppOpened\n\nSimple, no business rules, just establishing the origin fact with a timestamp.\n\nThen the first ViewSlice:\n\n**ViewSlice: CheckSessionStatus**\n- Projector reads: AppOpened + any previous LaundryExpenseLogged events\n- Applies the 3-hour rule and first-time-user check\n- View: SessionStatus (hasActiveSession, lastExpenseAt, needsLocation)\n\nThis tells the app what to show next — location entry (new/expired session) or go straight to expense logging (active session).\n\nDoes the OpenApp CommandSlice look right before I write the TOML?"

