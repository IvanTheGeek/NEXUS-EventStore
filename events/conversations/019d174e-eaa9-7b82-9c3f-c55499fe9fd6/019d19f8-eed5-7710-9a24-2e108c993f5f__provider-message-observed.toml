[[body.segments]]
kind = "reasoning"
text = "The user is deepening the architecture. Let me trace what they're saying:\n\n1. **Metagraph** — a graph of graphs. The subgraphs themselves are nodes, and bridges are the edges between them.\n\n2. **Bridges** — a single Fact (like LocationSet) exists once in the Truth Graph. When it appears in multiple subgraphs, that's not duplication — it's a bridge edge in the metagraph connecting those subgraphs.\n\n3. **UI is not one graph** — it's multiple:\n   - Visual design (how it looks) — designers\n   - Interaction (what the user does) — UX\n   - Technical UI (components, state) — devs\n   - Information architecture — structure\n\n4. **The screen snapshot** is just a reference artifact. The actual UI has its own graph with its own slices, its own signals/interactions that connect to the business process graph via Signals at the boundary.\n\n5. **Signal is the bridge primitive** — UI graph produces a Signal that crosses into the business process graph as a Command. Business process graph produces a View that crosses back as a Signal to the UI graph. So the whole system is Truth Graph as the single source of facts, with typed subgraphs for business logic, visual design, interaction, components, and lifecycle, all connected through Signal bridges at their boundaries.\n\nThe metagraph sits above this, tracking which Facts appear across multiple subgraphs—those shared references become the Bridges. A Fact lives once in the Truth Graph, and subgraph membership emerges naturally from who references it rather than being explicitly declared. The graph builder discovers these connections by analyzing cross-references and constructs the metagraph automatically."

[[body.segments]]
kind = "plain_text"
text = "This clarifies the architecture significantly.\n\n**The Truth Graph has one instance of each Fact.** LocationSet exists once. It's not \"in\" a subgraph — subgraphs *reference* it. When multiple subgraphs reference the same Fact, that Fact is a bridge. The metagraph is the graph of subgraphs, and bridge Facts are its edges.\n\nSo the layers are:\n\n**Truth Graph** — all nodes, single source of truth\n**Subgraphs** — typed views. Each has its own slices, but Facts are shared references\n**Metagraph** — the topology of subgraphs connected by bridge Facts\n\nAnd UI isn't one subgraph — it's several:\n\n- **Visual** (designers) — how it looks, styling, layout\n- **Interaction** (UX) — what the user does, flows, gestures\n- **Information** (IA) — what data appears where, hierarchy\n- **Structural** (devs) — components, state management, rendering\n- **State Representation** — your fifth UI layer from the original list\n\nEach of these is its own subgraph with its own slices. The screen snapshot in the EM business slice is just a **reference** — a pointer saying \"there's a UI here.\" The actual UI has its own graph where the real work happens.\n\nAnd **Signal** is what crosses the boundary:\n\n```\nUI Interaction Graph                 Business Process Graph\n                        \n  [user taps submit]                    \n       ↓                               \n  UI produces Signal ──── Signal ────→ Command (LogExpense)\n                                            ↓\n                                        Handler\n                                            ↓\n  UI receives Signal ←── Signal ←──── View (RecentExpenses)\n       ↓\n  [screen updates]\n```\n\nSignal is the bridge primitive. It's the only thing that crosses between subgraphs. Everything else is internal to its subgraph. This means:\n\n- The business process TOML files don't know about UI internals\n- The UI graph TOML files don't know about business rules\n- They connect through Signals at the boundary\n- Those Signal connections are the bridge edges in the metagraph\n\nThe TOML file stays as one file per slice within its subgraph. A business slice is a business file. A UI interaction slice is a UI file. They don't need to share files because the bridge is the Signal — and the graph builder detects those connections by matching Signal names across subgraphs.\n\nDoes this mean the filesystem should organize by subgraph type rather than trying to put everything in one `model/` folder?"

