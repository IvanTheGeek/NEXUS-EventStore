[[body.segments]]
kind = "reasoning"
text = "The user is pointing out that the pattern should strictly alternate C-V-C-V-C-V. Currently we have:\n\n1. OpenApp (C) → AppOpened\n2. ??? (V) → what view informs SetLocation?\n3. SetLocation (C) → LocationSet\n4. CurrentLocation (V) → reads LocationSet\n5. LogExpense (C) → LaundryExpenseLogged\n6. ??? (V) → what view follows LogExpense?\n\nSo between OpenApp and SetLocation, there needs to be a ViewSlice. That view would read AppOpened and tell the app \"you need a location.\" \n \nThe user's suggesting I start by mapping out all the commands I need, then work backwards to identify which view should precede each one—that way I can ensure the alternating pattern holds throughout."

[[body.segments]]
kind = "plain_text"
text = "Right. Commands are the skeleton, views are the connective tissue. So the chain is:\n\n1. **OpenApp** (C) → AppOpened\n2. **???** (V) → reads AppOpened → informs SetLocation\n3. **SetLocation** (C) → LocationSet\n4. **CurrentLocation** (V) → reads LocationSet → informs LogExpense\n5. **LogExpense** (C) → LaundryExpenseLogged\n6. **???** (V) → reads LaundryExpenseLogged → informs next command\n\nThe missing view at position 2 — after AppOpened, before SetLocation. At the walking skeleton business level, what does the app need to know? It just opened, and needs to determine: does the driver need to provide a location? At this level the answer is always yes (first-time user story).\n\nSo something like **AppStatus** — reads AppOpened, tells the system the app is ready and needs location input.\n\nBut that feels thin. Is it worth having at the skeleton level, or do we acknowledge the gap and fill it when we expand the model with the returning-user story (where the view actually has a decision to make)?"

