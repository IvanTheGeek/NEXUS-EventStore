[[body.segments]]
kind = "plain_text"
text = "Exactly. The \"time ordering\" from earlier is really **match priority** — same as F# pattern matching reads top to bottom and stops at the first match. The file order isn't \"this happens first in time,\" it's \"this gets checked first.\"\n\nThat's a meaningful distinction because:\n\n- **Time ordering** implies sequential execution — do step 1, then step 2\n- **Match ordering** implies evaluation priority — check rule 1, if no match check rule 2\n\nThe handler receives one command, evaluates the GWT rules in file order, first match produces the single event. The rest are never evaluated. It's literally:\n\n```fsharp\nmatch state, cmd with\n| rule1 -> event1    // checked first\n| rule2 -> event2    // checked second\n| rule3 -> event3    // catch-all last\n```\n\nSo for the TOML, the convention is: **most specific rules first, catch-all last**. Same discipline as writing F# match expressions — compiler warns you if you put a wildcard before a specific case.\n\nThis also means ViewSlice GWT doesn't have this constraint. Projector rules aren't competing matches — they're a pipeline. Multiple projector rules can *all* apply to shape the data. That's the `|>` chain. Different semantics, same syntax.\n\nWant me to update the files and add a comment clarifying match ordering for CommandSlice?"

