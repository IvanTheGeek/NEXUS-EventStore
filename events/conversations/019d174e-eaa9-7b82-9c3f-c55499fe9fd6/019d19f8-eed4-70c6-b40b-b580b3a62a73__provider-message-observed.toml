[[body.segments]]
kind = "reasoning"
text = "The user wants me to map these five terms to concrete things in LaundryLog. Let me think through each one.\n\nDomain - the broadest scope. LaundryLog's domain is truck driver expense tracking, or more specifically laundry expense tracking for IRS documentation purposes.\n\nSystem - the actual software system. LaundryLog as the application.\n\nModel - the Event Model. The set of slices that describe the behavior.\n\nContext - bounded contexts within the system. For LaundryLog it's small, but \"Expenses\" is one. Could also have \"Sessions\", \"Reporting\" etc.\n\nConstruct - this is interesting. What's the smallest building block? The slice itself? Or the individual primitives (Signal, Transformation, Fact, Rule)?\n\n\nNow I'm visualizing how these layers stack together and where each one fits within the overall structure."

[[body.segments]]
kind = "plain_text"
text = "For LaundryLog specifically:\n\n**Domain** = Truck Driver Expense Tracking. The real-world problem space. Exists whether software does or not. Drivers have expenses, the IRS requires documentation, laundromats charge money.\n\n**System** = LaundryLog. The software that addresses the domain. One domain could have multiple systems; this is the one you're building.\n\n**Model** = The Event Model. The complete set of slices that describe LaundryLog's behavior. Record, View, Modify, Remove, View Updated, View Final — the six slices together *are* the model.\n\n**Context** = Expenses. Right now LaundryLog has essentially one context because it's small. If it grew to include mileage tracking or meal expenses, those would be separate contexts within the same system, each with their own event streams.\n\n**Construct** = The Slice. It's the atomic buildable unit. A single TOML file. One CommandSlice or one ViewSlice. RecordExpense is a construct. ViewExpenseHistory is a construct.\n\nSo the hierarchy nests:\n\n```\nDomain (Truck Driver Expense Tracking)\n  └─ System (LaundryLog)\n       └─ Model (the Event Model)\n            └─ Context (Expenses)\n                 └─ Construct (RecordExpense, ViewExpenseHistory, ...)\n```\n\nDoes that mapping feel right, or are you thinking about these terms differently — maybe as graph-level concepts rather than LaundryLog-specific?"

