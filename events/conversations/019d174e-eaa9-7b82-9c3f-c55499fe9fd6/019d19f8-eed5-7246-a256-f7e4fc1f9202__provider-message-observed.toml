[[body.segments]]
kind = "plain_text"
text = "Right. UUIDv7's embedded timestamp is free metadata. For now it gives you ordering and uniqueness. But later:\n\n- **Audit trail**: when was this slice *created* in the model, decoded from the ID itself, no extra field needed\n- **Drift detection**: if a slice's ID timestamp is weeks before its GWT references a fact from a newer slice, that's a modeling sequence signal\n- **Conflict resolution**: two people model simultaneously, UUIDv7 gives natural merge ordering\n- **Verification**: the ID's timestamp should be ≤ any event data's `loggedAt` — if not, something's wrong\n\nThe key insight is it's **intrinsic** to the ID rather than a separate field that could drift. The truth is in the identifier itself. Fits the Truth Graph philosophy — even the IDs carry verifiable meaning.\n\nNo changes to the TOML needed for this. Just a property of the choice that pays dividends later when the graph builder or analysis tools want to reason about the model's own evolution.\n\nReady for the next slice? We need SetLocation to fill the hole, then the ViewSlice after LogExpense."

