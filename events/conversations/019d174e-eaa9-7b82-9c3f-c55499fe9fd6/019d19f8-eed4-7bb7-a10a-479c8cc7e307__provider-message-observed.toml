[[body.segments]]
kind = "reasoning"
text = "The user is sharing notes from Martin's (likely Martin Schimak or someone related to Event Modeling) book about GWT. Let me look at how the GWT is defined for command slices specifically.\n\nFrom the document:\n\nFor command slices:\n- Given: prior events (initial state)\n- When: the command\n- Then: the expected outcome (event or error)\n\nExamples:\n- \"Given an empty cart, when I execute the 'Add Item' command, I expect the 'Item Added' event to be stored.\"\n- \"Given there are already 3 items in the cart, when the 'Add Item' command is executed, then we expect an error\"\n\n\nThe pattern is clear: the Given establishes state through prior events, When is the command itself, and Then is either a success event or an error. What's interesting is that the condition we added to our TOML isn't actually part of Martin's formulation—the condition is implicit in the Given clause. The state derived from those events naturally determines which branch executes, so we're adding an explicit layer that Martin's approach handles implicitly."

[[body.segments]]
kind = "plain_text"
text = "Martin's pattern for command GWT is:\n\n- **Given** = prior events that establish state\n- **When** = the command\n- **Then** = resulting event **or error**\n\nThe branching comes from the Given, not a separate condition. Look at his examples:\n\n- Given **empty cart** → When AddItem → Then ItemAdded\n- Given **3 items in cart** → When AddItem → Then **error**\n\nThe state derived from the given events *is* the condition. Different given states with the same command produce different outcomes.\n\nThis means our `condition` field might be wrong. Instead, the branching is expressed by having multiple GWT rules with **different given clauses** for the same command:\n\n```toml\n[[handler.gwt]]\nname = \"RejectDuplicate\"\ngiven = [\"LaundryExpenseRecorded\"]\nwhen = \"RecordLaundryExpense\"\nthen = \"RecordExpenseRejected\"\ndescription = \"Expense already exists for these parameters\"\n\n[[handler.gwt]]\nname = \"RecordNewExpense\"\ngiven = \"Unit\"\nwhen = \"RecordLaundryExpense\"\nthen = \"LaundryExpenseRecorded\"\ndescription = \"No prior matching expense, validates and records\"\n```\n\nThe `given` tells the handler what state to hydrate. The match ordering determines priority. The condition is implicit — if you have those given events in that state, this rule matches.\n\nDrop `condition` and let `given` do the work?"

