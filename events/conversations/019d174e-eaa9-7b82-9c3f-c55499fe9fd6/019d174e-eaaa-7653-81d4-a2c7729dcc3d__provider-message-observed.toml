kind = "plain_text"
text = "Agreed. Keep it simple — `facets = [\"business\"]` means \"this belongs to the business concern.\" When we add dev, ui, or whatever else, those tags appear. ATLAS figures out what to show based on which facets are active.\n\nThe default view: everything tagged `business`. That gives you Adam's LCD diagram — lanes, actors, commands, events, GWT.\n\nLet me update the file to just use `business` consistently for now, no premature splitting:"

