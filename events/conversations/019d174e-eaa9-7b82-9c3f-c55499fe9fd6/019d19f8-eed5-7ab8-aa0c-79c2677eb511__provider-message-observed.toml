[[body.segments]]
kind = "reasoning"
text = "Ivan is raising a fundamental architectural question about how the TOML files should be organized given that the Truth Graph contains ALL the information, and different lenses/perspectives show different subsets of it.\n\nThe key insight: the same slice node in the graph has different amounts of detail depending on who's looking at it:\n\n- Business lens (Adam's EM diagram): Actor, Command, Event, GWT - the LCD\n- Dev lens: Adds handler details, field types, F# type info, implementation notes\n- UI lens: Adds screen snapshots, interaction layers, visual layout details\n- All from the SAME underlying truth\n\nSo the question is: one file with everything, or layered files per lens?\n\n\nI'm thinking about this as a graph problem where nodes have properties and lenses simply filter what's visible. The cleanest approach feels like storing everything in a single TOML file per slice—that's the source of truth—and letting the lenses act as projections that show or hide specific properties. This aligns perfectly with their ViewSlice concept where the same events get different representations depending on perspective."

[[body.segments]]
kind = "plain_text"
text = "This is the core design question. The Truth Graph is **one graph**. Lenses are projections of it — exactly like ViewSlices are projections of events.\n\nTwo approaches:\n\n**One file, all data**: The TOML contains everything — business fields, dev types, UI snapshots, handler details. Lenses are just filters that show/hide sections when rendering. The file IS the truth. Simple, no sync issues, but files get large.\n\n**Layered files**: A base file with the LCD (business perspective), then overlay files that add lens-specific data. Like CSS layers on HTML. Keeps each file focused, but you have to compose them and they could drift.\n\nThe Truth Graph philosophy argues for one file. The truth is one thing. A View/Projection hides what you don't need to see — it doesn't store different truths in different places. That's the whole point of your architecture.\n\nThe TOML sections already naturally separate concerns:\n\n```toml\n[slice]          # everyone sees this\n[command]        # business sees name, dev sees fields/types\n[handler]        # dev lens only\n[[event]]        # everyone sees name, dev sees fields\n[[handler.gwt]]  # business + dev\n[[origins]]      # business sees name, UI sees snapshot\n```\n\nThe lens doesn't need different files — it needs a **visibility rule** per section or field. \"Business lens shows: slice, command.name, event.name, gwt, origins.name. Dev lens adds: fields, handler, types. UI lens adds: snapshot.\"\n\nThat visibility mapping could itself be a TOML file — a lens definition that says what to render.\n\nOne file per slice with everything, or layered?"

