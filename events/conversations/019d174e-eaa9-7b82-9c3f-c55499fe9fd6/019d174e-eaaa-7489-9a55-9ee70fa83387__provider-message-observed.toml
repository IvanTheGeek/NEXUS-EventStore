text = "Right — walking skeleton. First-time user, only AppOpened exists.\n\n**ViewSlice: CheckExpenseHistory**\n\nGiven AppOpened, projector looks for any LaundryExpenseLogged events. Finds none. View tells the app: no previous expenses, need location.\n\n```\nGiven: [AppOpened]\nThen: ExpenseHistory (empty - no prior expenses found)\n```\n\nAt this level, the business person reads: \"App was opened, we checked for previous expenses, there aren't any.\"\n\nThat's the simplest possible ViewSlice — one event in, one view out showing empty state. The 3-hour rule doesn't even come into play yet because there's nothing to check against.\n\nDoes that capture the walking skeleton level, or even simpler?"

