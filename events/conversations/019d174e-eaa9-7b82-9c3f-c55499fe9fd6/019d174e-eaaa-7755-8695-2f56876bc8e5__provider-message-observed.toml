text = "So the full structure for OpenApp would be:\n\n```\ntruth-graph/\n  laundrylog/\n    model/\n      OpenApp_019644a1-b1a0-7000-8000-000000000100/\n        019644a1-b1a0-7000-8000-000000000100_C_OpenApp.toml\n        app-splash-screen.png\n```\n\nReady to move to the next slice — CheckSessionStatus ViewSlice. The projector needs to read AppOpened and any LaundryExpenseLogged events, apply the 3-hour rule and first-time check, and produce a SessionStatus view telling the app what to show next.\n\nWhat fields should SessionStatus carry? My thinking:\n\n- `hasActiveSession` (bool) — is there a session within 3 hours\n- `needsLocation` (bool) — does the app need to ask for location\n- `lastExpenseAt` (datetime, optional) — when was the last expense\n\nOr do you see it differently?"

