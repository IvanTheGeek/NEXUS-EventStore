text = "been playing with the idea of using a graph as a base NEXUS \"Truth Graph\" where the privatives end up applying to many domains. The primary focus is knowledge and second is Software Development which is Event Modeling based. Using TOML files, based in the file system. These would be read and the graph contained in memory, at least to start will innovating. There would be the Truth Graph that a knowledge graph would map on top of, an Event Model (expanded to make the standard diagram parts that are hidden explicit) and that has evolved into graphs for UI├─ Visual Layer├─ Interaction Layer├─ Information Layer├─ Structural Layout└─ State Representation and so on."

