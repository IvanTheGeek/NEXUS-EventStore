text = "\"So back to the TOML — maybe `then` should be a list of possible outcomes\" I feel like the proper thing here is that only one event should be put out. If there are multiple it is probably modeling too much for the slice. kind of an antipattern. but is ALL the rules are applied, and more than 1 rules matches, then what? compress the list or stop at the first match.  The condition seems like a good idea for the Handler. That is what is actually happening in the Projector side. The condition is the when."

