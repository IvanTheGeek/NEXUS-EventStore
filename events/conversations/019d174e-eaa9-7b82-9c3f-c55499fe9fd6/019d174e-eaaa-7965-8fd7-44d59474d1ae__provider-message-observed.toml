kind = "plain_text"
text = "Good. Commit that and let's move to the next slice.\n\n**ViewSlice: CheckSessionStatus**\n\nAfter AppOpened, the app needs to know what to show next. The projector reads AppOpened and any previous LaundryExpenseLogged events, determines if there's an active session (last expense within 3 hours) or if this is a first-time user (no expenses at all).\n\nThe view produces a SessionStatus that tells the app: do you need to ask for location (new/expired session) or go straight to expense logging (active session)?\n\n```\nFact (via GWT given) → Projector → View → Actor\n\nGiven: [AppOpened, LaundryExpenseLogged]\nThen: SessionStatus { hasActiveSession, needsLocation }\n```\n\nDoes that capture the next step correctly, or does the flow go differently after AppOpened?"

