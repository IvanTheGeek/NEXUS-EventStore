[[body.segments]]
kind = "plain_text"
text = "Right — the storage layer is an implementation detail. The TOML schema, the graph builder, the slice definitions, the GWT rules — none of that changes based on where the bytes live. Prove the concept with desktop first where the full stack works, then adapt the storage adapter for mobile later.\n\nThe walking skeleton is solid. Five slices, clean CVCV pattern, facets with dot notation, emergent edges from GWT given clauses, filesystem conventions locked in. The next steps when you're ready could go several directions:\n\n- **Graph builder** — F# reads the TOML files, builds the in-memory graph, validates connections, detects holes\n- **ATLAS renderer** — Bolero WASM reads the graph, renders the EM diagram with facet-based visibility\n- **Remaining slices** — expand the model (modify expense, view history, etc.)\n- **PATHs** — define the concrete first-time-user journey with example data through the walking skeleton\n\nGood place to pause. The foundation is set — pick it up whenever the opportunity opens up."

