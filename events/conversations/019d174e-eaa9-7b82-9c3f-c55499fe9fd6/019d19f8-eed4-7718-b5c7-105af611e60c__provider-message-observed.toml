[[body.segments]]
kind = "reasoning"
text = "Ivan is refining the model. Let me think about what he's saying:\n\n1. The Actor section in an EM slice shows screens/processors at the top - these are references, not full definitions\n2. The UI context (separate graph/model) handles all the internals of the screen\n3. Something from the UI dispatches to the business behavior slice\n4. That dispatch mechanism might be called a \"Signal\"\n\nSignal is interesting because:\n- It's the boundary crossing point between UI graph and behavior graph\n- It's directional - UI sends Signal to CommandSlice, ViewSlice sends Signal to UI\n- It replaces \"Interaction\" as a primitive - but it's more specific\n\n\n- In functional programming, \"signal\" carries good connotations as a message rather than a method call\n\nSo Signal acts as the bridge between UI and business behavior contexts. The screen produces a Signal that activates the CommandSlice, and the ViewSlice sends data back to the UI. I'm wondering whether Signal replaces Intent entirely or if they're distinct concepts within this architecture.\n\nLooking at how the pieces fit together: Actor is just a reference, Signal is what crosses the boundary between contexts, Intent is the command being requested, and Fact is the resulting event. Signal might actually be the Interaction primitive under a different name—the core mechanism that connects UI to business logic."

[[body.segments]]
kind = "plain_text"
text = "Signal is strong. Here's why it works better than Interaction:\n\n**Interaction** implies UI — clicks, taps, gestures. But a processor (like a CRON job or a webhook) also activates slices, and calling that an \"interaction\" feels wrong.\n\n**Signal** is context-neutral. A UI sends a Signal. A processor sends a Signal. A ViewSlice sends a Signal back to UI (here's your data). It's the **boundary-crossing primitive** — the thing that passes between contexts/graphs.\n\nAnd it cleans up the Actor section. In a CommandSlice, the Actor isn't really \"TruckDriver\" — it's a **reference** to whatever external context is sending the Signal. The slice doesn't care about the internals of that screen. It just receives:\n\n```\nSignal: RecordLaundryExpense { machineType, quantity, ... }\n```\n\nSo the CommandSlice simplifies to:\n\n```\nSignal → Intent → Rule → Fact\n```\n\nAnd the ViewSlice:\n\n```\nFact → Rule → Interpretation → Signal\n```\n\nSignal is the *in* and the *out*. It's what crosses the bridge between the business behavior graph and whatever other graph (UI, integration, processor) is on the other side.\n\nThis might also mean **Actor moves out of the slice definition entirely**. The slice doesn't own the actor — it owns a Signal contract. Who sends that Signal is defined in the UI graph or processor graph, not here.\n\nDoes Actor still belong in the slice TOML, or does it become a reference/link to the UI context?"

