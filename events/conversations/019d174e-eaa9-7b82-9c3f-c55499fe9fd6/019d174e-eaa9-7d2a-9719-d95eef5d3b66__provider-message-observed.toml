text = "using event modeling as the guide, EM hides that Command handler and the View projector, so a slice that changes state is Actor, Command, Handler, Event and a slice that does Interpretation is Event, Projector, View, Actor \nthen there are purposes for GWT that are different for each Slice.\nFor CommandSlice - RULES for Handler -  GIVEN [previous events] WHEN command THEN event  (could be multiple, but is rare, it usually means the slices are doing to much) a slice may multiple GWT which could cover error or branching\nFor ViewSlice GWT act as the RULES of filter for the Projector (changed to Projector for semetry) - GIVEN [Events] WHEN id=2 (the filter aspect to apply by the projector) THEN View which is the data delivered to the ACTOR"

