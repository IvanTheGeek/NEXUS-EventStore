kind = "plain_text"
text = "That clicks perfectly. PATHS are concrete journeys through the system — \"TruckDriver records a $3.50 washer expense at Flying J with coins.\" Each PATH carries the example data naturally because it's a specific story, not an abstract rule.\n\nSo the layers separate cleanly:\n\n- **GWT** = abstract business rules (Given these events, When this command, Then this outcome)\n- **PATHS** = concrete journeys with real data (the specific values that flow through the GWT)\n- **UX** = how those journeys feel to the actor (which maps to your UI graph layers)\n\nThe GWT tells you *what's possible*. The PATH tells you *what actually happens* with real data. The UX tells you *how it looks and feels*.\n\nLet me clean up the file — drop `condition`, keep GWT pure:"

