text = "So the picture is:\n\n**Top zone**: At least one lane, always something there. Could be actors, agents, roles, departments — it's flexible. Adam shows the originator on Command slices but hides it on View slices (since the view is just responding to events, not initiated by someone specific).\n\n**Middle zone**: The slices — commands (blue), events (yellow), views (green).\n\n**Bottom zone**: Contexts/streams/systems/departments — where the events live. Multiple possible names.\n\nLet me synthesize this into the TOML design. The key insight is that both top and bottom are flexible labeling — they provide organizational context but the actual graph primitives are in the middle.\n\n\nNow I'm going to draft the updated TOML files that capture this three-zone structure."

