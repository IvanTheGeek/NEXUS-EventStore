[[body.segments]]
kind = "reasoning"
text = "Yes, this is a great insight. The running app doesn't need to read TOML slice definitions - it IS the compiled result of those definitions. But it does need to write events. So the events repo is the only storage dependency for the running artifact."

[[body.segments]]
kind = "plain_text"
text = "Exactly. The running LaundryLog app doesn't read TOML files to know what to do — FORGE already compiled the spec into F# handlers, projections, and types. The model is baked into the artifact. It doesn't need the blueprint anymore, it *is* the blueprint made real.\n\nBut it does need to write events. The events repo is the only runtime dependency. The app's job is simple: receive commands, apply the compiled rules, commit events to storage.\n\nThis gives you clean separation of concerns at deployment:\n\n- **Model repo** → FORGE reads it, developers work in it. Never touches production.\n- **FORGE repo** → builds artifacts. CI/CD concern only.\n- **Artifact** → the compiled app. Knows nothing about TOML. Just code.\n- **Events repo** → the only thing the running artifact writes to. PAXUS manages it.\n\nAnd it means the attack surface is tiny. The production app has no access to specs, no access to transformation rules. It just processes commands and emits events. If someone compromises the running app, they can't alter the model or the compiler.\n\nIt also means you could have multiple artifacts writing to the same events repo. A mobile app and a web app, both compiled from the same spec by FORGE, both writing to the same event streams. Different manifestations, same truth."

