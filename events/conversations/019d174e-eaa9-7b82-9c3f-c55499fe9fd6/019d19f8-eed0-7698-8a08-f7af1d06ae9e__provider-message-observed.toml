[[body.segments]]
kind = "reasoning"
text = "Ivan is laying out a hierarchy of graph layers and then distilling it down to two fundamental aspects that compose into the Truth Graph. Let me think about this.\n\nThe hierarchy shows increasing specificity:\n- Domain Graph (the broadest concepts)\n- Context Graph (bounded contexts, boundaries)\n- Perspective Graph (different views/lenses)\n- Model Graph (the structural design)\n- Executable Graph (the running system - event slices)\n\nThen the synthesis: Knowledge Graph (what is) + Behavior Graph (what happens) = Truth Graph\n\nThis maps to his primitives:\n- Knowledge Graph deals with: Actor, Fact, Interpretation (the nouns, the static relationships)\n\n\n- Behavior Graph handles: Interaction, Intent, and the dynamics flowing between them (the verbs, what actually happens)\n\nSo the five primitives aren't strictly separated into one graph or the other—they're all part of the same Truth Graph, just emphasizing different aspects depending on whether you're looking at what exists or what's happening. And that hierarchy from Domain down to Executable is really just zooming in and out on the same primitives at different levels of granularity."

[[body.segments]]
kind = "plain_text"
text = "That decomposition is clean. Let me map your primitives against it.\n\n**Knowledge Graph** is the static structure — what exists, what relates to what, what means what. That's primarily **Actor, Fact, Interpretation**. The nouns. \"There is a Load. It belongs to Dispatch. Billing cares about it.\"\n\n**Behavior Graph** is the dynamic structure — what happens, what causes what, what transforms into what. That's primarily **Interaction, Intent**, and the Rules on edges. The verbs. \"Actor clicks, Intent fires, Fact is produced.\"\n\nEvery node in the Truth Graph has **both** aspects simultaneously. LoadDelivered is a Fact in the Knowledge Graph (it exists, it has relationships, it has meaning per context) and a node in the Behavior Graph (it was caused by something, it triggers something). The two graphs aren't separate stores — they're two projections of the same Truth Graph.\n\nAnd your hierarchy becomes the **resolution levels** of the same primitives:\n\n- **Domain Graph**: Actors and Facts are broad. \"Driver\", \"Delivery\"\n- **Context Graph**: Boundaries emerge. \"Dispatch::Delivery\" vs \"Billing::Delivery\"\n- **Perspective Graph**: Interpretations diverge per context\n- **Model Graph**: Interactions and Intents become concrete. Rules get defined\n- **Executable Graph**: Everything has GWT specs. Slices are complete\n\nSame five node types at every level. The graph doesn't change structure as you descend — it gains **specificity**. A Domain-level Fact refines into multiple Context-level Facts which gain Perspective-level Interpretations which get Model-level Rules which become Executable-level slices.\n\nThe TOML files could mirror this — where does a node declare which level it lives at?"

