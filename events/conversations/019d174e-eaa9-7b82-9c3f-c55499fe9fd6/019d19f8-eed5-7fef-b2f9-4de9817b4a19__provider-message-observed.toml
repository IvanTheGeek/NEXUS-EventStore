text = "The user is asking about what graph types/subgraphs might exist in the NEXUS ecosystem and how their naming would work. Let me think through this systematically based on everything we've discussed."

[[body.segments]]
kind = "plain_text"
text = "Let me think through this by domain, then naming emerges from what each graph actually captures:\n\n**Business domain** тАФ what the business cares about\n- `business.behavior` тАФ Adam's EM diagram. System behavior from business perspective. Commands, events, views, GWT.\n- `business.rules` тАФ just the GWT layer extracted. Pure rule documentation for stakeholders.\n- `business.process` тАФ the actual workflow between system touches. What the human does. BPMN-like.\n- `business.domain` тАФ bounded contexts, aggregates, entity relationships. DDD strategic design.\n\n**System domain** тАФ how the software works\n- `system.architecture` тАФ services, boundaries, deployment units, communication patterns\n- `system.data` тАФ event schemas, projections, storage decisions\n- `system.integration` тАФ APIs, signals between systems, external events (Martin's automation pattern)\n\n**App domain** тАФ the running application\n- `app.lifecycle` тАФ open, close, suspend, resume, update, error recovery\n- `app.state` тАФ state machines, transitions, what the app \"knows\" at any moment\n- `app.navigation` тАФ routes, screens, page flow\n\n**UI domain** тАФ what gets rendered\n- `ui.visual` тАФ layout, typography, color, spacing. Designer's concern.\n- `ui.interaction` тАФ clicks, gestures, inputs. What the user does physically.\n- `ui.information` тАФ what data appears where, hierarchy, content structure\n- `ui.structure` тАФ components, composition, nesting. Dev's concern.\n- `ui.state` тАФ reactive state, bindings, what drives re-renders\n\n**UX domain** тАФ how it feels\n- `ux.journey` тАФ PATHs live here. Concrete user journeys with data.\n- `ux.persona` тАФ actor definitions, contexts, goals, pain points\n- `ux.accessibility` тАФ WCAG concerns, screen reader flows, keyboard navigation\n\n**FORGE domain** тАФ building\n- `forge.codegen` тАФ spec to source code mapping\n- `forge.test` тАФ GWT to test case generation\n- `forge.build` тАФ compilation, bundling, artifact production\n\n**PAXUS domain** тАФ operating\n- `paxus.deploy` тАФ environments, rollout strategy, rollback\n- `paxus.monitor` тАФ health checks, metrics, alerting\n- `paxus.analytics` тАФ usage patterns, feature adoption\n- `paxus.incident` тАФ error tracking, diagnosis, resolution\n\n**LOGOS domain** тАФ knowing\n- `logos.requirements` тАФ captured needs, feature requests\n- `logos.discussion` тАФ forum threads, Discord, email distilled to facts\n- `logos.support` тАФ tickets, bug reports, user feedback\n- `logos.knowledge` тАФ refined understanding, decisions, rationale\n\nThe naming pattern that emerges: **`domain.concern`** with optional deeper levels like `domain.concern.detail`. Same pattern as `business.emd.gwt`.\n\nNotice how some concerns cross domains. A bug report enters through `logos.support`, links to `paxus.incident`, traces back to `business.behavior` slices, reveals a gap in `forge.test`. The bridge Facts connecting these subgraphs *are* the diagnostic path. The metagraph shows you the full picture.\n\nAlso notice тАФ not all of these need to exist on day one. They emerge as you model. Start with `business.behavior`, add subgraphs when a real need appears. The Truth Graph grows organically.\n\nDoes this naming structure feel right, or should the top-level domains be different?"

