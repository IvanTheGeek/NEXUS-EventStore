kind = "plain_text"
text = "Scott's approach — make illegal states unrepresentable. The handler decision becomes a type:\n\n```fsharp\n// Value types - constrained at creation\ntype MachineType = Washer | Dryer\ntype PaymentMethod = Coins | Card | App\ntype PositiveInt = private PositiveInt of int\ntype Money = private Money of decimal\ntype LocationName = private LocationName of string\n\n// Command - only actor's new data\ntype RecordLaundryExpense = {\n    MachineType: MachineType\n    Quantity: PositiveInt\n    PricePerMachine: Money\n    PaymentMethod: PaymentMethod\n    Location: LocationName\n}\n\n// Event\ntype LaundryExpenseRecorded = {\n    ExpenseId: ExpenseId\n    MachineType: MachineType\n    Quantity: PositiveInt\n    PricePerMachine: Money\n    TotalCost: Money\n    PaymentMethod: PaymentMethod\n    Location: LocationName\n    RecordedAt: DateTimeOffset\n}\n\n// The decision IS a discriminated union\ntype RecordExpenseDecision =\n    | Recorded of LaundryExpenseRecorded\n    | Rejected of RecordExpenseRejected\n\n// State hydrated from given events\ntype ExpenseState =\n    | NoExpenses\n    | HasExpenses of LaundryExpenseRecorded list\n\n// The handler signature - Scott's pattern\n// State -> Command -> Decision\ntype RecordExpenseHandler = \n    ExpenseState -> RecordLaundryExpense -> RecordExpenseDecision\n```\n\nThe key insight: **the branching isn't a condition on the GWT — it's cases of the Decision type**. The handler pattern matches on state and command to produce one case of the union.\n\n```fsharp\nlet handle (state: ExpenseState) (cmd: RecordLaundryExpense) : RecordExpenseDecision =\n    match state with\n    | HasExpenses existing when existing |> List.exists (isDuplicate cmd) ->\n        Rejected { Reason = \"Duplicate expense\" }\n    | _ ->\n        Recorded { \n            ExpenseId = ExpenseId.create()\n            MachineType = cmd.MachineType\n            // ...\n        }\n```\n\nSo back to the TOML — maybe `then` should be a list of possible outcomes:\n\n```toml\n[[handler.gwt]]\nname = \"RecordNewExpense\"\ngiven = \"Unit\"\nwhen = \"RecordLaundryExpense\"\nthen = [\"LaundryExpenseRecorded\", \"RecordExpenseRejected\"]\n```\n\nEach `then` value is a case of the Decision union. The graph builder sees both as possible outputs and can draw both edges. The condition logic is implementation detail — the TOML captures *what can happen*, not *how to decide*.\n\nDoes that change how you see the GWT mapping?"

