[[body.segments]]
kind = "reasoning"
text = "The user is asking a deeper question about what Adam's Event Modeling diagram actually represents. Let me think about this carefully.\n\nAdam's EM diagram shows:\n- Actors/agents at the top (who/what initiates)\n- Commands (blue stickies) - intentions to change state\n- Events (orange stickies) - facts that happened\n- Read Models/Views (green stickies) - data projections\n- Swimlanes at bottom for bounded contexts/streams\n- Timeline left to right\n- Screens/wireframes as references\n- GWT scenarios below slices\n\nIs it a business process diagram? Not exactly. A traditional business process diagram (like BPMN) shows workflow, decision points, branching, roles, and sequences. \n\nAdam's diagram is really about capturing how data flows through a system and transforms over time—what enters as commands, what gets recorded as events, and what emerges as read models. It's a behavioral specification that documents not just what happens, but the data contracts, business rules, and information flow in a way that's understandable to both technical and business stakeholders.\n\nWithin NEXUS and the Truth Graph, this EM diagram functions as a specific projection showing the behavioral subgraph through a business lens. The key difference from a traditional workflow diagram is that it's not about sequencing steps—it's about capturing state changes and the views that result from them. The timeline creates the appearance of process, but the real substance is the information architecture and how the system evolves."

[[body.segments]]
kind = "plain_text"
text = "It's a good question to sit with. A business process diagram (like BPMN) shows **workflow** — decision gates, branching paths, role handoffs, \"if this then go here.\" It's about orchestration and flow control.\n\nAdam's diagram doesn't actually show that. Look at what it really captures:\n\n- **What data enters** (commands with fields)\n- **What facts get recorded** (events with fields)\n- **What data comes out** (read models with fields)\n- **What rules govern transitions** (GWT)\n- **Information completeness** (can you trace every field's origin)\n\nThere's no branching, no decision diamonds, no \"if/else\" flow. The timeline gives the *appearance* of process, but the core is really **information flow and state change specification**. It answers \"what does the system know and when does it know it\" — not \"what steps happen in what order.\"\n\nSo in Truth Graph terms, Adam's EM diagram might be more accurately called a **Behavioral Specification Graph** or an **Information Flow Graph**. It specifies system behavior from a perspective that business people can read — but it's not modeling the business process itself. The business *process* is what the human does between slices. The diagram models what the *system* does when the human touches it.\n\nThis distinction matters for NEXUS because it means the EM subgraph type isn't `business.process` — it's something like `business.behavior` or `system.behavior.business`. It's a system behavior specification viewed through business-friendly language.\n\nDoes that reframe how you think about the other subgraph types?"

