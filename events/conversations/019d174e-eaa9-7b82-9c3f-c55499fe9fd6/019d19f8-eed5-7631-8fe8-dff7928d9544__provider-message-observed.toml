[[body.segments]]
kind = "reasoning"
text = "The animation cell analogy is perfect. Each layer is transparent except for what it draws. Stack them all and you see the complete picture. Each lens shows only certain layers.\n\nSo every element in the TOML could have a `layers` property that tags which concerns it belongs to. The GWT especially - a single GWT could have business-level description, dev-level filter logic, UI-level implications."

[[body.segments]]
kind = "plain_text"
text = "The animation cell analogy is perfect. Each cell is transparent except for what it draws. Stack them and you get the full scene. Remove a cell and the scene still makes sense, just less detail.\n\nSo `layers` becomes a property on almost everything:\n\n```toml\n[[handler.gwt]]\nid = \"019644a1-b1a0-7000-8000-000000000150\"\nname = \"OpenApp\"\ngiven = \"Unit\"\nwhen = \"OpenApp\"\nthen = \"AppOpened\"\nlayers = [\"business\"]\ndescription = \"No prior state needed. App opened.\"\n\n[[handler.gwt]]\nid = \"019644a1-b1a0-7000-8000-000000000151\"\nname = \"OpenAppValidation\"\ngiven = \"Unit\"\nwhen = \"OpenApp\"\nthen = \"AppOpened\"\nlayers = [\"dev\"]\ndescription = \"Validates device token, establishes WebSocket connection\"\n```\n\nSame slice, same GWT structure, but the business cell only shows the first one. Dev cell stacks on the second. UI cell could add another about splash screen timing.\n\nAnd on fields:\n\n```toml\n[command]\nname = \"OpenApp\"\nfields = [\n    { name = \"deviceToken\", type = \"string\", layers = [\"dev\"] },\n]\n```\n\nBusiness lens: command has no fields (just \"OpenApp\"). Dev lens: reveals the deviceToken field.\n\nThe `layers` array is the visibility tag. A lens definition says \"show everything tagged with these layers.\" Business lens = `[\"business\"]`. Full lens = all layers.\n\nDoes `layers` as the property name feel right, or is there something more precise?"

