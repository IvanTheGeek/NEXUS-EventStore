[[body.segments]]
kind = "plain_text"
text = "Martin's core points:\n\n**GWT is the real treasure of Event Modeling.** Business rules get defined directly in the model where behavior is described, not scattered across JIRA tickets and people's heads. Business stakeholders can write them themselves — they're that readable.\n\n**For Command Slices (State Changes)**, GWT follows: Given = prior events establishing state, When = the command, Then = resulting event OR error. The branching comes entirely from different Given states — \"given 3 items already in cart, when AddItem, then error\" vs \"given empty cart, when AddItem, then ItemAdded.\" No separate condition concept needed.\n\n**For View Slices (State Views)**, When is omitted entirely. It's just Given/Then — put the system in a state via events, verify the read model shows correct data. He emphasizes read models are purely conceptual data views, not implementation.\n\n**For Automations**, same Given/Then pattern as views — the processor triggers automatically so there's no explicit When. The automation reads from a view, issues a command, produces an event. He shows this as a View → Processor → Command → Event chain.\n\n**Key principles:** define as many scenarios as you need (\"don't save on them\"), use concrete example data, stack scenarios vertically below their slice, business rules are enforced at write time not read time (so no redundant checks), and the information completeness check forces you to trace data paths through the entire model.\n\nThis confirms our TOML design — `condition` should go. The handler's decision logic is expressed by having multiple GWT entries with different `given` clauses. The given events establish the state, and different states lead to different outcomes. Want me to update the file to drop `condition`?"

