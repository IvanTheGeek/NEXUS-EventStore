kind = "plain_text"
text = "Clear. The conventions:\n\n- **Folder**: `ID_SliceName/` — filesystem sorts in timeline order\n- **File**: `SliceName_ID.toml` — once inside, name matters more to the human\n- **Graph builder**: reads all `.toml` files, doesn't care about names, builds structures from content, sorts/connects via IDs and GWT references\n\nSo the ViewSlice filename should have been `CurrentLocation_019644a1-b1a0-7000-8000-000000000400.toml` not `ViewSlice_019644a1-b1a0-7000-8000-000000000200.toml`.\n\nAlso noticed the folder ID and slice ID don't match on that one — folder is `...000000000200` but the TOML inside has `id = \"...000000000400\"`. The 200 range was originally CheckSessionStatus. Want to renumber to keep it clean, or leave it since the graph builder doesn't care about folders?"

