text = "Notice the symmetry:\n\n**CommandSlice**: Signal (in) → Transformation → Fact (out)\n**ViewSlice**: Fact (in, via rules.given) → Transformation → Signal (out)\n\nKey things to react to:\n\n**`origins`** — flexible array, `kind` can be anything (actor, agent, role, department). No enforced pairing. Just references.\n\n**ViewSlice has no `[fact]` section** — the input facts are declared in the `given` field of the rules. `given = [\"LaundryExpenseRecorded\"]` is the cross-slice link. The graph builder sees that string, finds the CommandSlice that produces it, and the edge exists.\n\n**Signal does double duty** — inbound on CommandSlice (the command contract), outbound on ViewSlice (the view contract). Same primitive, direction determined by slice type.\n\n**No explicit Fact node on ViewSlice** — should there be one? A `[facts]` section listing the events this slice consumes, separate from the rules that reference them? Or is the rules.given sufficient?"

