[[body.segments]]
kind = "reasoning"
text = "Ivan is exploring graph theory for the first time and wants to reason through whether Rule should be a node vs an edge. Let me help him think through this from first principles, keeping it grounded in his existing domain knowledge (Event Modeling, NEXUS).\n\nLet me think about the key distinction: nodes vs edges in graph theory, and why it matters for his Truth Graph."

[[body.segments]]
kind = "plain_text"
text = "Good — let's reason from what you already know.\n\nIn a graph you have two things: **nodes** (the things) and **edges** (the relationships between things). The fundamental design question is always: *is this concept a thing, or a relationship between things?*\n\nHere's a simple test: **can it have properties of its own, and can multiple other things point to it?**\n\nTake the Handler in a Command Slice. It has GWT rules — that's content, properties that belong to *it*. And it sits between a Command and an Event, meaning both the Command and the Event have a relationship *to* it. If you made the Handler just an edge (Command →processes→ Event), where do the GWT rules live? They'd have to be metadata on the edge. That works, but it limits you.\n\nConsider this concrete scenario — two Commands that share the same validation logic but produce different Events. As an edge, you'd duplicate the rules on each edge. As a node, both Commands connect to the same Rule node, and you can *see* that shared dependency in the graph.\n\nSo the practical question is: **do you ever need to reference, share, query, or reason about the transformation independently from the things it connects?**\n\nFor your use cases the answer seems clearly yes — \"show me all rules that reference this event type\" is a traversal that starts at a Rule node.\n\nThat gives you five primitives:\n\n- **Actor** — who\n- **Intent** — what they want\n- **Rule** — the governing logic\n- **Fact** — what happened\n- **Interpretation** — what it means\n\nEach is a node type. Now the edges become simpler — they're mostly **flow** (this leads to that) and **reference** (this depends on that). Does that framing feel right before we go further into edge types?"

