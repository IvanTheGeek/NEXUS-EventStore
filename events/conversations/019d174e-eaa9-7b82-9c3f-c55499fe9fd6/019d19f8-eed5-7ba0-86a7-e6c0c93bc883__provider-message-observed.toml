[[body.segments]]
kind = "plain_text"
text = "Here's the situation:\n\n**PWA Updates** — yes, this works well. The browser detects updates using a byte-by-byte comparison between cached files and network resources. You publish new WASM files to static hosting, and the service worker detects the change. The standard pattern is to show a \"New version available — update now?\" prompt, and the user taps to refresh. The new service worker fetches new versions of files, caches them, and waits until the user accepts before activating. Clean and user-controlled.\n\n**Phone for LaundryLog** — here's the problem. File System Access API has 32% global support. Chrome for Android: not supported. Safari on iOS: not supported. Samsung Internet: not supported. Firefox for Android: not supported. It's desktop Chrome/Edge only. Firefox has even taken a position calling it \"harmful.\"\n\nSo the architecture splits:\n\n**Desktop (ATLAS modeling tool)** — File System Access API + isomorphic-git + WASM works perfectly. Chrome/Edge on desktop. This is where you model, where you need the full filesystem, where git matters.\n\n**Mobile (LaundryLog)** — needs a different storage strategy. Options include:\n- **Origin Private File System (OPFS)** — sandboxed filesystem that *does* work on mobile browsers, but isn't the real filesystem so no direct git\n- **IndexedDB** — storing TOML content and events as records, isomorphic-git can use a custom backend for this\n- **Hybrid** — app works with OPFS/IndexedDB locally, syncs to a git remote when connected\n\nThe mobile app could still be a PWA, still WASM, still Bolero — just the storage layer adapts. The TOML structures and graph builder don't care where the bytes come from. And syncing to a git remote gives you the same backup and history story, just not local git on the phone's filesystem.\n\nDoes this change the approach, or does LaundryLog being mobile-first push you toward the hybrid model?"

