text = "Starting from the rather indeterministic point in time (possibly while the page is still being loaded), the same windows are served by the new Service Worker. Imagine what happens if our code is dynamically loaded using code-splitting or if we employ another lazy-loading techniques. Depending on the strategies we use, we might end up not being able to serve the expected asset anymore or we serve assets in incompatible version – it has a high probability of messing things up, so it&#x27;s only suitable for the simplest apps, for example light on JS content websites. Diagram of partial Service Worker update cycle – attempt 1 · This technique is sometimes taken further by ensuring the app is never running in that half-old, half-new state. To avoid it, we may order all our opened windows (called clients in the Service Worker parlance) to refresh immediately after skipWaiting was called.\n\nMost of the Service Worker tutorials we can find on the Web focus on the initial development efforts needed to get the offline mode capabilities or performance gains for subsequent visits. And although it's definitely valuable for having a grasp on the advantages of employing this basic Progressive Web App building block, it's also extremely important to be aware that it's not enough. For production readiness, we need to make sure our Service Worker will be maintainable in the future. We need to have the update strategy in place not to cut off our users from actually getting the updates of our PWA. Service Worker is a piece of JavaScript that works as a single controller & network proxy for all the instances of our application. That means that all the browser windows share the same active Service Worker. It has a significant consequence for the lifetime of Service Worker's code.\n\nWhichever strategy of handling Service Worker updates we apply, it has its own cons and probably means the traditional trait of the ever-green Web with no need to apply updates is more or less broken. That's the unfortunate side of how Service Workers lifecycle is implemented and there's no other way than to embrace it. With Progressier, it's easier than ever. Generate PWA See plans ·\n\nMoreover, simple refreshing is not sufficient to make room for the new Service Worker to take over, even if there's only one tab of our application running. This is because browsers do not unload the earlier instance of the website immediately when we request the refresh – for some time the new instance being loaded exists simultaneously in the memory next to the previous one, being unloaded. So the number of windows served by the Service Worker doesn't fall down to zero in this case and the new Service Worker ready to be used can't take over. Hard-refresh (Control+Shift+R-kind) is sufficient (because it bypasses the Service Worker), but we can't expect our users to use it for the ordinary browsing. Not applying the Service Worker update might mean that our outdated Service Worker runs for ages and serves our users with assets from the cache that we expect to already be long-forgotten.\n\nStarting from the rather indeterministic point in time (possibly while the page is still being loaded), the same windows are served by the new Service Worker. Imagine what happens if our code is dynamically loaded using code-splitting or if we employ another lazy-loading techniques. Depending on the strategies we use, we might end up not being able to serve the expected asset anymore or we serve assets in incompatible version – it has a high probability of messing things up, so it's only suitable for the simplest apps, for example light on JS content websites. Diagram of partial Service Worker update cycle – attempt 1 · This technique is sometimes taken further by ensuring the app is never running in that half-old, half-new state. To avoid it, we may order all our opened windows (called clients in the Service Worker parlance) to refresh immediately after skipWaiting was called.\nThe browser triggers an update algorithm when your service worker or its dependencies change. The browser detects updates using a byte-by-byte comparison between the cached files and the resources coming from the network.\n\nYou have published your PWA: some users use it from the browser, others install it on their devices. When you update the app, it's important to apply best practices to avoid pitfalls. ... Assets already cached in devices. The service worker file, or its dependencies. Manifest metadata. Let's check out the best practices for each of these elements. To update data, such as that stored in IndexedDB, you can use tools such as Fetch, WebRTC, or WebSockets API. If your app supports any offline features, remember to keep the data that supports the features updated too. On compatible browsers, there are options to sync data, not only when the user opens the PWA but also in the background. These options are: Background synchronization: saves requests that failed and retries them using sync from the service worker. Web periodic background sync: syncs data periodically in the background, at specific times, allowing the app to provide updated data even if the user hasn't opened the app yet.\n\nBackground Fetch: downloads large files, even when the PWA is closed. Web push: sends a message from the server that wakes up the service worker and notifies the user. This is commonly called a 'push notification'. This API requires the user's permission. All these APIs are executed from the service worker context. They are currently available only on Chromium-based browsers, on Android, and desktop operating systems. When you use one of these APIs, you can run code in the service worker thread; for example, to download data from your server and update your IndexedDB data. Note: The Web Push API is the only API to notify the user from the background and its push message can include a small amount of data: it can carry a payload of up to around 2KB. Updating assets includes any changes to files you use to render the app's interface, such as HTML, CSS, JavaScript, and images.\n\nWhen the service worker wakes up. There is no event to listen for this moment, but the browser will execute any code in the service worker's global scope when it wakes up. In the main window context of your PWA, after the browser loaded the page, to avoid making the app load slower. When background events are triggered, such as when your PWA receives a push notification or a background sync fires. You can update your cache then and your users will have the asset's new version the next time they open the app. Warning: When checking for updates, make sure you don't interrupt the loading process and impact your app's performance. Do not wait for an update check before rendering the app as it will harm your user experience and reflect on your core web vitals. If you need to update part of your app frequently, use the stale while revalidate caching strategy.\n\nA live update means as soon as the asset is updated in the cache, your PWA replaces the asset in the current load. It is a complex task not covered in this course. Some tools that help to implement this update are livereload-js and CSS asset update CSSStyleSheet.replace() API. The browser triggers an update algorithm when your service worker or its dependencies change. The browser detects updates using a byte-by-byte comparison between the cached files and the resources coming from the network. Then the browser tries to install the new version of the service worker, and the new service worker will be in the waiting state, as described in the Service workers chapter. The new installation will run the install event for the new service worker. If you are caching assets in that event handler, assets will also be re-cached. Caution: If you delete or rename your service worker file, the browser won't remove the previously registered service worker from its clients.\nconst withSwRegistration = (WrappedComp: FC&lt;WrappedCompProps&gt;, ) =&gt; { return () =&gt; { // holds all the SW registration setup const [appUpdatePending, setAppUpdatePending] = useState(false); const location = useLocation(); // updates the state when a new update is pending. const onSWUpdate = () =&gt; { setAppUpdatePending(true); } // action for updating the service worker. const updateAction = () =&gt; { if (&#x27;serviceWorker&#x27; in navigator) { navigator.serviceWorker.ready.then((registration) =&gt; { if (registration.waiting) { // send the skip message to kick off the service worker install. registration.waiting.postMessage({type: &#x27;SKIP_WAITING&#x27;}); // add an listener to reload page when the new service worker is ready. registration.waiting.addEventListener(&#x27;statechange&#x27;, (event: Event) =&gt; { const { state = &#x27;&#x27; } = event.target as unknown as {state: string} || {}; if (state === &#x27;activated&#x27;) { window.location.reload(); } }); } }); } }; // effect added from router location to check for a new service work\n\nUpdating Progressive Web Applications with Service Workers There are some massive advantages to using progressive web application features to support a single page application. These include …\n\nThese steps sounds straight forward to implement and will involve adding some features to the application’s service worker which controls the local caching and fetching of new assets from the remote resource (over HTTP). The best way to show how this is done is by example, building a mini React PWA application and implementing the steps above. For this example the Create React App tool will give us all the boilerplate for a new PWA project complete with a service worker, all in typescript: npx create-react-app refreshing-pwa-example --template cra-template-pwa-typescript · The supporting documentation has a good breakdown of what this template includes and how the included service worker has already implemented a cache first behaviour for all the build assets. The functionality that’s missing is how to handle new versions updates of the application once the service worker is registered and caching locally for users.\n\nconst withSwRegistration = (WrappedComp: FC<WrappedCompProps>, ) => { return () => { // holds all the SW registration setup const [appUpdatePending, setAppUpdatePending] = useState(false); const location = useLocation(); // updates the state when a new update is pending. const onSWUpdate = () => { setAppUpdatePending(true); } // action for updating the service worker. const updateAction = () => { if ('serviceWorker' in navigator) { navigator.serviceWorker.ready.then((registration) => { if (registration.waiting) { // send the skip message to kick off the service worker install. registration.waiting.postMessage({type: 'SKIP_WAITING'}); // add an listener to reload page when the new service worker is ready. registration.waiting.addEventListener('statechange', (event: Event) => { const { state = '' } = event.target as unknown as {state: string} || {}; if (state === 'activated') { window.location.reload(); } }); } }); } }; // effect added from router location to check for a new service work\n\nNow the application has a new service worker waiting to be activated, it will be great to have an alert or notification presented to the user that allows them to update. To implement this, the main App component mounting can be wrapped with the extra functionality to plug into service worker actions. Updating the src/index.tsx file by adding a higher order component (wrapper) will allow the application to talk to the service worker registration, adding the functionality: New state to show when an update is available to the app. An action to perform the update and refresh the app. To help with showing new service worker updates, the Create React App template code has already given us a service worker register() method in the index.tsx file which can be extended to include a callback for update events. This allows for a component state update to be updated on service worker changes: const withSwRegistration = (WrappedComp: FC<WrappedCompProps>, ) => { return () => { // State for flagging\nIf you&#x27;re not importing any of the virtual modules provided by vite-plugin-pwa you&#x27;ll need to figure out how to configure it, it is out of the scope of this guide. As explained in Manual Updates entry in The Service Worker Lifecycle article, you can use this code to configure periodic service worker updates on your application on your main.ts or main.js: ... import { registerSW } from &#x27;virtual:pwa-register&#x27; const intervalMS = 60 * 60 * 1000 const updateSW = registerSW({ onRegistered(r) { r &amp;&amp; setInterval(() =&gt; { r.update() }, intervalMS) } }) The interval must be in milliseconds, in the example above it is configured to check the service worker every hour. ... From version 0.12.8+ we have a new option, onRegisteredSW, and onRegistered has been deprecated. If onRegisteredSW is present, onRegistered will never be called. Previous script will allow you to check if there is a new version of your application available, but you will need also to deal with some edge cases like: ...\n\nZero-config PWA Framework-agnostic for Vite and Integrations\n\nIf you're not importing any of the virtual modules provided by vite-plugin-pwa you'll need to figure out how to configure it, it is out of the scope of this guide. As explained in Manual Updates entry in The Service Worker Lifecycle article, you can use this code to configure periodic service worker updates on your application on your main.ts or main.js: ... import { registerSW } from 'virtual:pwa-register' const intervalMS = 60 * 60 * 1000 const updateSW = registerSW({ onRegistered(r) { r && setInterval(() => { r.update() }, intervalMS) } }) The interval must be in milliseconds, in the example above it is configured to check the service worker every hour. ... From version 0.12.8+ we have a new option, onRegisteredSW, and onRegistered has been deprecated. If onRegisteredSW is present, onRegistered will never be called. Previous script will allow you to check if there is a new version of your application available, but you will need also to deal with some edge cases like: ...\n\nimport { registerSW } from 'virtual:pwa-register' const intervalMS = 60 * 60 * 1000 const updateSW = registerSW({ onRegisteredSW(swUrl, r) { r && setInterval(async () => { if (r.installing || !navigator) return if (('connection' in navigator) && !navigator.onLine) return const resp = await fetch(swUrl, { cache: 'no-store', headers: { 'cache': 'no-store', 'cache-control': 'no-cache', }, }) if (resp?.status === 200) await r.update() }, intervalMS) } }) Are you an LLM? You can read better optimized documentation at /.vitepress/theme/components/HeuristicWorkboxWindow.md for this page in Markdown format ... This only applies when importing any of the virtual modules or using workbox-window module. Since workbox-window uses a time-based heuristic algorithm to handle service worker updates, if you build your service worker and register it again, if the time between last registration and the new one is less than 1 minute, then, workbox-window will handle the service worker update found event a\nIt ensures users receive the latest updates and features, while preventing outdated cached content from affecting the app&#x27;s performance. To version web assets, assign a unique identifier to each asset, such as a CSS or JavaScript file. This ensures browsers load the most recent version.\n\nBy understanding the importance of updating service workers and the mechanics of the update process, developers can ensure their PWAs remain efficient, secure, and feature-rich, providing users with the best possible experience. Versioning service workers and assets is crucial for maintaining a Progressive Web App (PWA). It ensures users receive the latest updates and features, while preventing outdated cached content from affecting the app's performance. To version web assets, assign a unique identifier to each asset, such as a CSS or JavaScript file. This ensures browsers load the most recent version. You can achieve this by: Appending a query parameter with a version number to the asset URL · Implementing a versioning system to track changes to assets · Using a service worker to cache assets with a specific version number · By versioning web assets, you can ensure users receive the latest updates and features, while preventing outdated cached content from affecting the app's perform\n\nUpdating service workers is crucial for maintaining a [@portabletext/react] Unknown block type \"span\", specify a component for it in the `components.types` prop (PWA). It ensures your app remains secure, efficient, and feature-rich, providing users with the best possible experience. ... A new service worker installation is triggered when the browser detects a byte-different version of the service worker script. This can happen when: TriggerDescriptionNavigationThe user navigates to a page within the service worker's scopeRegistrationnavigator.serviceWorker.register() is called with a URL different from the currently installed service workerScope changenavigator.serviceWorker.register() is called with the same URL as the installed service worker, but with a different scope · During the installation phase, the new service worker caches assets and prepares for activation.\n\nService workers are a crucial part of modern web applications, enabling offline capabilities and improving overall performance and user experience. They act as a middleman between web apps, the browser, and the network. Service workers are event-driven, registered against an origin and path, written in JavaScript, and can control web page/site behavior. The service worker lifecycle consists of registration, installation, activation, and updating. Updating service workers ensures apps remain secure, efficient, and feature-rich. A new service worker installation is triggered when the browser detects a byte-different version of the service worker script, such as: TriggerDescriptionNavigationUser navigates within the service worker's scopeRegistrationnavigator.serviceWorker.register() called with a different URLScope changenavigator.serviceWorker.register() called with the same URL but different scope ...\n\nBy understanding the service worker lifecycle, implementing versioning, and following best practices, you can deliver a seamless user experience and optimal app performance. The service worker lifecycle consists of several critical phases that ensure app functionality and performance. Let's break down each phase and its significance. The service worker lifecycle begins with registration, which involves checking for browser compatibility and defining the scope for control over the app. To register a service worker, you need to call the navigator.serviceWorker.register() method, passing the URL of the service worker script as an argument. Registration StepDescriptionCheck browser compatibilityEnsure the browser supports service workersDefine scopeDetermine the app pages or sites the service worker will controlRegister service workerCall navigator.serviceWorker.register() with the service worker script URL ·\nInstead, DevTools lets you simulate the background sync event. ... Open DevTools (F12). Select Application &gt; Service Workers. Type the tag name you used when registering the sync in the Sync input field.\n\nUsing a service worker, a Progressive Web App (PWA) can do work in the background, even when the user isn't using the app, and provide a better offline experience. ... An email app that lets users compose messages and send them at any time, even when offline. A news app that fetches new articles every day, for the user to read later when they open the app. A music app that lets users download songs for listening offline. All three of these use cases are possible with PWAs, by using the following APIs: ... Although these APIs have similar names, they are different in nature. ... Use the Background Sync API to allow users to continue using the app and perform actions even when they are offline. For example, an email app can let its users compose and send messages at any time. The app frontend can try to send the message right away, and if the device is offline, the service worker can catch the failed request and use the Background Sync API to defer the task until connected.\n\nTypically, the doTheWork function will send the information to the server that couldn't be sent when the user was offline. It may be useful to store this information in IndexedDB storage from the frontend so that it can later be retrieved from the service worker when doTheWork runs. For more information about the Sync event, the ServiceWorkerRegistration, and the SyncManager interface, see the Background Synchronization draft specification and the Background Synchronization API documentation. PWA Background Sync is a demo app that uses the Background Sync API to fetch information later, if the user is offline: ... PWA Background Sync API demo - live demo. ... Go to the PWA Background Sync API demo in a new window or tab. ... In the Address bar, click the App available. Install PWA Background Sync API demo () button. The Install PWA Background Sync API demo dialog opens in Edge.\n\nIn the installed PWA Background Sync API demo app, in the Comment text box, enter a comment, such as Hello again, and then click the Send button. The message that you entered appears, momentarily with the status of Sending, and then with the status of Failed❌. The Try sending again button appears within the message rectangle: Click the Try sending again button. Within the message rectangle, the status changes to Will try later🛜, and the Try sending again button goes away: If the status remains Failed❌, you can reset the service worker so that the status becomes Will try later🛜 when appropriate: In DevTools, select the Application () tool. In the navigation pane on the left, select Service workers, and then in the upper right, click Unregister. In the app window, right-click in the webpage, and then select Refresh. ... In the dedicated DevTools window, in the Network throttling dropdown list, instead of Offline, select No throttling.\n\nSwitch to the installed PWA Background Sync API demo app. ... Optionally, right-click in the webpage, and then select Refresh. The messages are removed. To test your background sync code, you don't have to go offline, then go online, and then wait for Microsoft Edge to trigger a sync event. Instead, DevTools lets you simulate the background sync event. ... Open DevTools (F12). Select Application > Service Workers. Type the tag name you used when registering the sync in the Sync input field. Select the Sync button. You can also log the background sync activity generated by your app in DevTools, as follows: Open DevTools (F12). Select Application > Background Sync. Select Start recording events. Sync registrations and dispatches appear in the event log table: The Periodic Background Sync API lets PWAs retrieve fresh content periodically, in the background, so users can immediately access it when they later open the app again.\nWhen an update to the application is deployed, the contents of the manifest change, informing the service worker that a new version of the application should be downloaded and cached.\n\nService workers augment the traditional web deployment model and empower applications to deliver a user experience with the reliability and performance on par with code that is written to run on your operating system and hardware. Adding a service worker to an Angular application is one of the steps for turning an application into a Progressive Web App (also known as a PWA). At its simplest, a service worker is a script that runs in the web browser and manages caching for an application. Service workers function as a network proxy. They intercept all outgoing HTTP requests made by the application and can choose how to respond to them. For example, they can query a local cache and deliver a cached response if one is available. Proxying isn't limited to requests made through programmatic APIs, such as fetch; it also includes resources referenced in HTML and even the initial request to index.html.\n\nUnlike the other scripts that make up an application, such as the Angular application bundle, the service worker is preserved after the user closes the tab. The next time that browser loads the application, the service worker loads first, and can intercept every request for resources to load the application. If the service worker is designed to do so, it can completely satisfy the loading of the application, without the need for the network. Even across a fast reliable network, round-trip delays can introduce significant latency when loading the application. Using a service worker to reduce dependency on the network can significantly improve the user experience. ... Angular applications, as single-page applications, are in a prime position to benefit from the advantages of service workers. Angular ships with a service worker implementation. Angular developers can take advantage of this service worker and benefit from the increased reliability and performance it provides, without needin\n\nAngular's service worker is designed to optimize the end user experience of using an application over a slow or unreliable network connection, while also minimizing the risks of serving outdated content. To achieve this, the Angular service worker follows these guidelines: Caching an application is like installing a native application. The application is cached as one unit, and all files update together. A running application continues to run with the same version of all files. It does not suddenly start receiving cached files from a newer version, which are likely incompatible. When users refresh the application, they see the latest fully cached version. New tabs load the latest cached code. Updates happen in the background, relatively quickly after changes are published. The previous version of the application is served until an update is installed and ready.\n\nThe service worker conserves bandwidth when possible. Resources are only downloaded if they've changed. To support these behaviors, the Angular service worker loads a manifest file from the server. The file, called ngsw.json (not to be confused with the web app manifest), describes the resources to cache and includes hashes of every file's contents. When an update to the application is deployed, the contents of the manifest change, informing the service worker that a new version of the application should be downloaded and cached. This manifest is generated from a CLI-generated configuration file called ngsw-config.json. Installing the Angular service worker is as straightforward as running an Angular CLI command. In addition to registering the Angular service worker with the browser, this also makes a few services available for injection which interact with the service worker and can be used to control it.\nFirstly, the browser checks to see if there has been an update to the service worker file. If there is an update available, then we show a notification on the screen, else we do nothing.\n\nIn this article, I will show you how to add a notification to your site and display it each time that there is a new version of the service worker available. You’ll also learn how to refresh the page, so that the user is up to date and has the latest version of any cached files. ... Have you ever been on a website and noticed a popup notification that suggests that there is a new version of the site available? I recently visited Google’s Inbox and noticed a notification a little like the image below. I’ve built a number of Progressive Web Apps that simply update the service worker silently for the user in the background, but I really like this approach - especially for an offline first web app. If you’ve ever tried to build a web application that is completely offline first, you’ll know how tricky it can be to make changes to the users cache when you do make updates to the site and the user has connectivity.\n\nIn this article, I'll show you how to add a notification to your site and display it each time that there is a new version of a service worker available.\n\nUsing a technique like this notification is a great way to ensure that you keep your Progressive Web App lightning fast and retain all of the magic of service worker caching, while at the same time keeping the latest version of your service worker live! If you’d like to see the full working code for this example, please head over to the repo at github.com/deanhume/pwa-update-available. There is also a live sample of this in action on the Github repo. I have to admit, it took me a while to figure all of this out, and I couldn’t have done so without the following articles. I highly recommend reading them to learn more. ... Have you ever sat down at your computer, ready to get into a flow state, and then spent the first ten minutes just arranging windows? Dragging your editor here, your browser there, nudging Slack into a corner - only to close it all two hours later, and start from scratch ·\n\nIf you aren’t familiar with the code above, I recommend checking out this article for more information - it will take you through the basics and help you understand how service worker caching fits in. At this point in time, if we fire up the web page it will look a little something like the image below. So far so good, but we have a web page that doesn’t really do a whole lot! In order to complete the pieces of the puzzle, we need to update our code so that it notifies the user when there has been a change to the service worker itself. Before we dive any deeper, let’s take a look at the basic flow that needs to take place. In the diagram above, you may notice that a number of steps need to take place before we have a finished product. Firstly, the browser checks to see if there has been an update to the service worker file. If there is an update available, then we show a notification on the screen, else we do nothing.\nfunction notifyUserAboutUpdate(worker) { const updateBanner = document.getElementById(&#x27;update-banner&#x27;); updateBanner.style.display = &#x27;block&#x27;; updateBanner.addEventListener(&#x27;click&#x27;, () =&gt; { worker.postMessage({ action: &#x27;SKIP_WAITING&#x27; }); gtag(&#x27;event&#x27;, &#x27;update_click&#x27;, { &#x27;event_category&#x27;: &#x27;Service Worker&#x27;, &#x27;event_label&#x27;: &#x27;User Clicked Update Notification&#x27; }); }); } By using analytics to track how users interact with updates, you can gain valuable insights into the effectiveness of your update strategies and make data-driven decisions to improve the update process. Another crucial aspect of handling updates in PWAs is gathering user feedback. Understanding how users feel about updates and any issues they encounter can help you refine your update process and improve user satisfaction. ... Implement an in-app feedback mechanism to collect user feedback directly.\n\nPWAs use service workers to manage updates. Service workers act as intermediaries between your web application and the network, enabling offline capabilities and handling caching. When it comes to updates, service workers play a crucial role by checking for new versions of your application files and updating the cache accordingly. The update process typically involves the following steps: the service worker fetches new versions of files, caches them, and then waits until all the current users have closed their existing sessions before activating the new version. This ensures that users do not experience any disruptions during their active sessions. Handling updates in PWAs comes with its own set of challenges. Ensuring that users always have the latest version without interrupting their experience requires a delicate balance. One common issue is the “stale while revalidate” problem, where users might see outdated content until the service worker fetches and activates the new version.\n\nHandling updates in Progressive Web Apps (PWAs) is crucial for maintaining a seamless user experience while ensuring that your app remains current and secure. By implementing effective update strategies, such as automatic updates with service workers, manual update notifications, and clear communication with users, you can keep your PWA up-to-date without disrupting the user experience. Efficient cache management through versioning and limiting storage, along with clear messaging and data preservation strategies, ensures that your PWA remains efficient and user-friendly. By following these best practices, you can provide a high-quality, reliable PWA that meets the demands of modern users. If you have any questions or need further assistance with handling updates in your PWA, feel free to reach out.\n\nfunction notifyUserAboutUpdate(worker) { const updateBanner = document.getElementById('update-banner'); updateBanner.style.display = 'block'; updateBanner.addEventListener('click', () => { worker.postMessage({ action: 'SKIP_WAITING' }); gtag('event', 'update_click', { 'event_category': 'Service Worker', 'event_label': 'User Clicked Update Notification' }); }); } By using analytics to track how users interact with updates, you can gain valuable insights into the effectiveness of your update strategies and make data-driven decisions to improve the update process. Another crucial aspect of handling updates in PWAs is gathering user feedback. Understanding how users feel about updates and any issues they encounter can help you refine your update process and improve user satisfaction. ... Implement an in-app feedback mechanism to collect user feedback directly.\n\nRefresh to update.'; updateNotification.style.position = 'fixed'; updateNotification.style.bottom = '0'; updateNotification.style.width = '100%'; updateNotification.style.backgroundColor = '#000'; updateNotification.style.color = '#fff'; updateNotification.style.textAlign = 'center'; updateNotification.style.padding = '1em'; document.body.appendChild(updateNotification); updateNotification.addEventListener('click', () => { worker.postMessage({ action: 'SKIP_WAITING' }); }); } This approach allows users to be informed about new updates and provides them with an option to refresh the app at their convenience. This method ensures that updates do not disrupt the user experience while still keeping the app up-to-date. Effective cache management is crucial to ensure that your PWA runs smoothly and efficiently. One of the best practices is to use cache versioning to prevent conflicts between old and new versions of cached files. By versioning your cache, you can ensure that users always get t\nOnce the PWA is installed on the user&#x27;s machine, the only way to inform the browser that there are updated files to be retrieved is for there to be a change in the service worker. If a change is made to any other PWA resource — if the HTML is updated, a bug is fixed in the CSS, a function ...\n\nThus far, we've written the HTML, CSS, and JavaScript for CycleTracker. We added a manifest file defining colors, icons, URL, and other app features. We have a working PWA! But it doesn't yet work offline. In this section, we will write the JavaScript required to convert our fully functional web application into a PWA that can be distributed as a standalone app and works seamlessly offline. If you haven't already done so, copy the HTML, CSS, JavaScript, and manifest JSON file. Save them to files called index.html, style.css, app.js, and cycletracker.json, respectively. In this section, we are creating sw.js, the service worker script, that will convert our Web App into a PWA. We already have one JavaScript file; the last line in the HTML file calls the app.js. This JavaScript provides all the functionality for the standard web application features.\n\nInstead of calling the sw.js file like we did the app.js file with the src attribute of <script>, we will create a relationship between the web app and its service worker by registering the service worker. At the end of this lesson, you will have a fully functional PWA; a progressively enhanced web application that is fully installable that works even when the user is offline. The service worker is what makes the application work offline while making sure the application is always up to date. To do this well, the service worker should include the following: Version number (or other identifier). List of resources to cache. Cache version name. ... Installing the cache when the app is installed. Updating itself and the other application files as needed. Removing cached files that are no longer used. We achieve these tasks by reacting to three service worker events, including the ...\n\nOnce the PWA is installed on the user's machine, the only way to inform the browser that there are updated files to be retrieved is for there to be a change in the service worker. If a change is made to any other PWA resource — if the HTML is updated, a bug is fixed in the CSS, a function is added to app.js, an image is compressed to reduce the file save, etc. — the service worker of your installed PWA will not know it needs to download updated resources. Only when the service worker is altered in any way, will the PWA know it may be time to update the cache; which is the service worker's task to initiate. While changing any character may technically suffice, a PWA best practice is to create a version number constant that gets updated sequentially to indicate an update to the file. Updating a version number (or date), provides an official edit to the service worker even if nothing else is changed in the service worker itself and provides developers with a way of identifying app version\n\nFor a good offline experience, the list of cached files should include all the resources used within the PWA's offline experience. While the manifest file may have a multitude of icons listed in various sizes, the application cache only needs to include the assets used by the app in offline mode. ... You don't need to include the various icons that are used by all the different operating systems and devices in the list. But do include any images that are used within the app, including assets to be used within any splash pages that may be visible if the app is slow to load or used in any \"you need to connect to the internet for the full experience\" type pages. Do not include the service worker file in the list of resources to be cached. Add the list of resources to be cached for the CycleTracker PWA to sw.js. We include the static resources created in other sections of this tutorial that CycleTracker needs to function when offline."

