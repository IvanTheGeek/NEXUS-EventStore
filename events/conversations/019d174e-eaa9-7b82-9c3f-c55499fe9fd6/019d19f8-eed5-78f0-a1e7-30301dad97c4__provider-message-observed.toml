kind = "plain_text"
text = "I want to explore this idea actually. The nexus graph will have its base ontology. In the event modeling as Adam describes, the diagram shows information flow through the system that the business cares about. You already stated the context. There seems to be a triple forming of a perspective within a context over a view of the total graph. EM is a business person in tracking this specific kind of expense. The em graph is a business process graph that is a subgraph of the Nexus graph. In the software domain, and in the context of LaundryLog, the nexus graph primitives are simply using a different naming. There are other graphs that apply here and ATLAS allows us to add or remove those type graphs and level depending on the perspectives desired."

