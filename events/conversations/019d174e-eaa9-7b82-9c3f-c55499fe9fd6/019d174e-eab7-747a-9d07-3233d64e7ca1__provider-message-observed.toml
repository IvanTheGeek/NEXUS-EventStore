text = "For FORGE in order to have deterministic builds, ai can help but its job is to help build the functional transformation of the spec to code, which can be human reviewed and approved to produce the artifacts. This allows code review and code tweaking or preference which feeds back to AI to learn and set coding practices. By having the storage of events on got and the build pipeline, FORGE is like a compiler and an event can be traced to the exact builder and spec used."

