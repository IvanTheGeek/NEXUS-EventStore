kind = "plain_text"
text = "This is really helpful. The structure is looser than I was making it.\n\nThe top section is a **mixed pool** of actors and agents — not paired, not structured. Customer is a human with screen wireframes. Stock Checker and Payment Processor are agents with gear icons. Kitchen and Delivery are roles/contexts. They all just sit up there and arrows flow down to whichever slices they're involved with.\n\nThe bottom section is **bounded contexts as streams** — Order Processing, Stock, Payments, Kitchen, Delivery. Each is an event stream, not an actor.\n\nSo the diagram has three zones:\n\n- **Top**: Who/what initiates (actors + agents, loosely)\n- **Middle**: The slices (commands, views, events)\n- **Bottom**: Which stream/context the events belong to\n\nFor TOML, this means the metadata shouldn't force structure that the diagram doesn't have. Something more like:\n\n```toml\n[slice]\ntype = \"CommandSlice\"\nname = \"RecordExpense\"\nstream = \"Expenses\"\n\n[metadata]\nactors = [\"TruckDriver\"]\nagents = [\"MobileApp\"]\n```\n\nSimple lists, not paired. The graph builder can link actors/agents to slices, but the slice doesn't impose hierarchy on them.\n\nThe **stream** field is interesting though — that's the bounded context. In the truth graph, that's which subgraph cluster this slice belongs to. That might matter more for graph topology than the actor metadata does.\n\nIs stream the right name, or does it map to something else in your thinking?"

