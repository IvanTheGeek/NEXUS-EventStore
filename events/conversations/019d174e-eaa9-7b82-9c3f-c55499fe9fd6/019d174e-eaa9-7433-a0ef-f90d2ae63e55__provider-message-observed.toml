text = "Let me ground this in LaundryLog's Record Expense slice.\n\n**Nodes** are the things:\n\n```\nActor:       TruckDriver\nInteraction: TapsRecordButton\nIntent:      RecordLaundryExpense\nFact:        LaundryExpenseRecorded\n```\n\n**Edges** are the relationships between those things. Here's where it gets concrete:\n\n**Flow edge** — \"this leads to that\" in sequence:\n- TruckDriver → TapsRecordButton → RecordLaundryExpense → LaundryExpenseRecorded\n- This is the causal chain. It's the order things happen.\n\n**Rule edge** — \"this transformation governs the step\":\n- RecordLaundryExpense →(rule)→ LaundryExpenseRecorded\n- The rule content: `GIVEN no prior state needed WHEN RecordLaundryExpense with machineType, quantity, price THEN emit LaundryExpenseRecorded`\n\n**Cross-slice reference** — this is where the Bridge question lives:\n- LaundryExpenseRecorded appears in the Record slice as output\n- LaundryExpenseRecorded also appears in the View Expense History slice as input\n- That's the same Fact node referenced from two different slices\n\nSo the file structure question is really: when the Record slice and the View slice both reference LaundryExpenseRecorded, where does that connection get declared? Inside each slice file? In a separate file that maps connections between slices? Both?\n\nDoes that clarify what edges are doing, or should I sketch what the actual TOML might look like for one slice?"

