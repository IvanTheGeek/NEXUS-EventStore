text = "1\t# LaundryLog - Record Expense Command Slice\n     2\t\n     3\t[slice]\n     4\ttype = \"CommandSlice\"\n     5\tname = \"RecordExpense\"\n     6\tcontext = \"Expenses\"\n     7\tdescription = \"Record a new laundry expense\"\n     8\t\n     9\t# Top zone - flexible, at least one entry\n    10\t# These are references, not definitions\n    11\t[[origins]]\n    12\tkind = \"actor\"\n    13\tname = \"TruckDriver\"\n    14\t\n    15\t[[origins]]\n    16\tkind = \"agent\"\n    17\tname = \"MobileApp\"\n    18\t\n    19\t# Inbound signal - the contract arriving at this slice\n    20\t[signal]\n    21\tname = \"RecordLaundryExpense\"\n    22\tfields = [\n    23\t    { name = \"machineType\", type = \"string\" },\n    24\t    { name = \"quantity\", type = \"int\" },\n    25\t    { name = \"pricePerMachine\", type = \"decimal\" },\n    26\t    { name = \"paymentMethod\", type = \"string\" },\n    27\t    { name = \"location\", type = \"string\" },\n    28\t]\n    29\t\n    30\t# Transformation - the hidden Handler, made explicit\n    31\t[transformation]\n    32\tname = \"RecordExpenseHandler\"\n    33\t\n    34\t[[transformation.rules]]\n    35\tname = \"RecordNewExpense\"\n    36\tgiven = \"Unit\"\n    37\twhen = \"RecordLaundryExpense\"\n    38\tthen = \"LaundryExpenseRecorded\"\n    39\tdescription = \"Validates fields, calculates totalCost\"\n    40\t\n    41\t# Outbound fact - what this slice produces\n    42\t[fact]\n    43\tname = \"LaundryExpenseRecorded\"\n    44\tfields = [\n    45\t    { name = \"expenseId\", type = \"guid\" },\n    46\t    { name = \"machineType\", type = \"string\" },\n    47\t    { name = \"quantity\", type = \"int\" },\n    48\t    { name = \"pricePerMachine\", type = \"decimal\" },\n    49\t    { name = \"totalCost\", type = \"decimal\" },\n    50\t    { name = \"paymentMethod\", type = \"string\" },\n    51\t    { name = \"location\", type = \"string\" },\n    52\t    { name = \"recordedAt\", type = \"datetime\" },\n    53\t]\n  