kind = "plain_text"
text = "Sharp question. Let's check each one against a simple test: **does it change the graph's nodes, edges, or clustering?**\n\n- **Construct** — it's the file itself. Not metadata, it *is* the graph.\n- **Context** — this one actually matters. It tells the graph builder which cluster a construct belongs to. Without it, a shared Fact between two slices could be same-cluster or cross-cluster (bridge). That distinction changes analysis. **But** — the filesystem could carry this instead of a TOML field: `slices/expenses/record-expense.toml`. The folder *is* the context.\n- **Model** — all the TOML files together. It's the directory. No graph impact.\n- **System** — a higher folder. No graph impact.\n- **Domain** — the root folder. No graph impact.\n\nSo the hierarchy becomes the **filesystem layout**, not TOML fields:\n\n```\ntruth-graph/\n  laundrylog/           # system\n    expenses/           # context\n      record-expense.toml\n      view-expense-history.toml\n      modify-expense.toml\n      remove-expense.toml\n```\n\nAnd `context` gets removed from the TOML. The path *is* the metadata. The TOML stays pure graph data — only things that produce nodes, edges, or rules.\n\nThat means `origins` is also worth questioning. Does actor/agent affect the graph, or is it purely documentation?"

