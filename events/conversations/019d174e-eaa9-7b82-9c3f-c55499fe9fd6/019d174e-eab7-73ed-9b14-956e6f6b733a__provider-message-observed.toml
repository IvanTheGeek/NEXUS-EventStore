text = "The full walking skeleton rendered in both layouts. Toggle between them at the top.\n\n**Vertical** — nested cards, each slice is a card with collapsible sections. Clean by default — you see slice name, type, origin, command/event names. Click any row to expand fields, screen refs, or GWT rules. GWT renders as its own nested card inside with colored Given/When/Then keywords and the description in italics.\n\n**Horizontal** — compact timeline, scrollable left-to-right, arrow connectors between slices. Everything visible at a glance, GWT compressed to one line. Good for overview, printing, and seeing the full flow.\n\nKey design decisions:\n- Light mode, warm off-white background\n- Color stripe at top of each card (blue = command, green = view) instead of sticky note colors\n- IBM Plex Mono/Sans for readability\n- ViewSlice shows \"Events feeding this view\" as chips — the cross-slice connections visible\n- GWT keywords colored distinctly (green Given, blue When, orange Then)\n- Collapsible sections = facet-ready. Different facets could control which sections start open/closed"

