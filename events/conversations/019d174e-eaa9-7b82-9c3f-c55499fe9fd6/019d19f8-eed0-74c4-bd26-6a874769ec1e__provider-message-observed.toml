text = "not sure, but for knowledge the idea is that LOGOS would contain and handle all facts and data conceptually. Feeds in from email, discord channels, forum discussions , runtime data from artifacts, support questions, bug  reports all become facts in the graph that can then be analyzed by human or AI and refine knowledge AND understanding AND organization. ATLAS is where that is applied to modeling of the different contexts like business behaviors (traditional Event Modeling), but also UX and PATHS through the system, UI separated into its layers/contexts and ATLAS can apply lenses depending on the user, what they want to work in and model and what context or domain they want to work in or see. building the truth graph is subgraphs and after work in several, the full graph starts to take shape. This allows analysis and holes can be found or parts generated or scaffolded because of the info from the other subgraphs"

