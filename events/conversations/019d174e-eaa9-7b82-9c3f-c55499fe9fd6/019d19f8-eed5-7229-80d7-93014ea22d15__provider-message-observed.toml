[[body.segments]]
kind = "reasoning"
text = "The user is asking whether validation rules would be a separate facet from business rules. This is a good insight - business rules are one concern (the domain logic), validation is another concern (ensuring data integrity/correctness). They're both expressed as GWT but they serve different purposes.\n\nBusiness GWT: \"Cart must have items to be submitted\" - domain logic\nValidation GWT: \"machineType must be washer or dryer\" - data correctness\n\nThese are different facets of the same slice. A business stakeholder cares about the first, a developer cares about the second. Both are expressed as GWT, both must pass, but they belong to different facets.\n\nThis is elegant - facets on GWT entries naturally separate concerns while keeping them in one file."

[[body.segments]]
kind = "plain_text"
text = "Yes. That's clean. Business rules and validation are both GWT, both must pass, but they're different concerns:\n\n**Business facet GWT**: \"Cart must have at least one item to submit\" — domain logic, stakeholders define these\n\n**Validation facet GWT**: \"machineType must be washer or dryer\" — data correctness, devs define these\n\n**UI facet GWT**: \"disable submit button when cart empty\" — presentation logic, designers define these\n\nSame structure, same semantics (all must pass), different facets. The business stakeholder sees their rules. The dev sees those plus validation. The designer sees those plus UI behavior.\n\nFor OpenApp:\n\n```toml\n[[handler.gwt]]\nname = \"OpenApp\"\ngiven = \"Unit\"\nwhen = \"OpenApp\"\nthen = \"AppOpened\"\nfacets = [\"business\"]\ndescription = \"No prior state needed. App opened.\"\n\n[[handler.gwt]]\nname = \"ValidateDeviceToken\"\ngiven = \"Unit\"\nwhen = \"OpenApp\"\nthen = \"AppOpened\"\nfacets = [\"validation\"]\ndescription = \"Device must provide valid authentication token\"\n```\n\nBusiness lens: one rule. Dev lens: both rules. Same file, same all-must-pass semantics, facets control visibility.\n\nThis also means facets aren't just about *who sees it* — they're about *what concern owns it*. That's a stronger concept. Does this change how you think about the facets we already have on the other elements?"

