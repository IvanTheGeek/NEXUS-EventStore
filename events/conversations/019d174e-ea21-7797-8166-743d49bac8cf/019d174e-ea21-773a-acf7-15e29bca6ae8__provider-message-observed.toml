text = "Done. Here's what I've prepared for Claude Code:\n\n## What Changed in MCP\n\nSSE transport (HTTP+SSE) from protocol version 2024-11-05 has been replaced by Streamable HTTP transport introduced in March 2025. The key difference:\n\n**OLD (what Nexus has):**\n- Two endpoints: `/sse/events` (GET/SSE) + `/sse/message` (POST)\n\n**NEW (what Claude Desktop expects):**\n- Single endpoint: `/mcp` handles both POST and optional GET\n\n## Files Created\n\n1. **Migration Guide** (`/home/linux/mcp-http-transport-migration.md`)\n   - Complete specification details\n   - Implementation requirements\n   - Testing procedures\n   - Backward compatibility notes\n\n2. **Code Prompt** (`/home/linux/code-prompt-http-migration.md`)\n   - Step-by-step tasks\n   - VPS access details\n   - Success criteria\n   - Testing commands\n\n3. **Status Doc** (`/home/linux/nexus-status.md`)\n   - Current state summary\n   - What's broken/working\n   - Next steps\n   - Temporary workaround config\n\n4. **Simple Prompt** (`/home/linux/START_HERE_CODE.txt`)\n   - One-liner to get Code started\n\n## For Claude Code\n\nCopy-paste this:\n```\nRead /home/linux/code-prompt-http-migration.md and migrate Nexus MCP from deprecated SSE transport to current Streamable HTTP transport. Start by examining the existing SSE implementation on the VPS.\n```\n\n## Key Changes Needed\n\n1. Create `HttpTransport.fs` with single `/mcp` endpoint\n2. Handle POST for client messages (with proper headers)\n3. Implement session management via `Mcp-Session-Id`\n4. Validate `MCP-Protocol-Version: 2025-06-18` header\n5. Update `Program.fs` routing\n6. Test and deploy\n\nYour Claude Desktop config will change to:\n```json\n{\n  \"mcpServers\": {\n    \"nexus\": {\n      \"url\": \"https://mcp.nexus.ivanthegeek.com/mcp\",\n      \"apiKey\": \"wHj6HkvbK5sf305VBuA25rIJqadW1JJB+zH/eCiFL0U=\"\n    }\n  }\n}\n```"

