text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_fetch\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Versioning - Model Context Protocol\",\"url\":\"https://spec.modelcontextprotocol.io/specification/2025-03-26/basic/transports/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"modelcontextprotocol.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=modelcontextprotocol.io\",\"site_name\":\"modelcontextprotocol\"},\"is_missing\":false,\"text\":\"YYYY-MM-DD\\n, to indicate the last date backwards incompatible changes were made.\\nRevisions\\nRevisions may be marked as:- Draft: in-progress specifications, not yet ready for consumption.\\n- Current: the current protocol version, which is ready for use and may continue to receive backwards compatible changes.\\n- Final: past, complete specifications that will not be changed.\\n[2025-06-18](/specification/2025-06-18).\\nNegotiation\\nVersion negotiation happens during[initialization](/specification/2025-06-18/basic/lifecycle#initialization). Clients and servers MAY support multiple protocol versions simultaneously, but they MUST agree on a single version to use for the session. The protocol provides appropriate error handling if version negotiation fails, allowing clients to gracefully terminate connections when they cannot find a version compatible with the server.\",\"is_citable\":true,\"prompt_context_metadata\":{\"mime_type\":\"text/html; charset=utf-8\",\"content_type\":\"html\",\"destination_url\":\"https://modelcontextprotocol.io/specification/versioning\"}}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":\"Fetched: Versioning - Model Context Protocol\",\"integration_name\":\"Web Fetch\",\"integration_icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=modelcontextprotocol.io\",\"icon_name\":null,\"display_content\":{\"type\":\"rich_link\",\"link\":{\"title\":\"Versioning - Model Context Protocol\",\"subtitles\":null,\"url\":\"https://spec.modelcontextprotocol.io/specification/2025-03-26/basic/transports/\",\"resource_type\":null,\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=modelcontextprotocol.io\",\"source\":\"modelcontextprotocol\"},\"is_trusted\":false}}"

