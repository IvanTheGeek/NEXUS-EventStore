kind = "tool_result"
text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Transports - Model Context Protocol\",\"url\":\"https://modelcontextprotocol.io/specification/2025-06-18/basic/transports\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"modelcontextprotocol.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=modelcontextprotocol.io\",\"site_name\":\"Model Context Protocol\"},\"is_missing\":false,\"text\":\"The protocol currently defines two standard transport mechanisms for client-server communication: stdio, communication over standard in and standard out \\u00B7 Streamable HTTP Clients SHOULD support stdio whenever possible.\\n\\nAccept an MCP server URL from the user, which may point to either a server using the old transport or the new transport. Attempt to POST an InitializeRequest to the server URL, with an Accept header as defined above: If it succeeds, the client can assume this is a server supporting the new Streamable HTTP transport. If it fails with an HTTP 4xx status code (e.g., 405 Method Not Allowed or 404 Not Found): Issue a GET request to the server URL, expecting that this will open an SSE stream and return an endpoint event as the first event. When the endpoint event arrives, the client can assume this is a server running the old HTTP\\u002BSSE transport, and should use that transport for all subsequent communication. Clients and servers MAY implement additional custom transport mechanisms to suit their specific needs. The protocol is transport-agnostic and can be implemented over any communication channel that supports bidirectional message exchange.\\n\\nIf present, the ID MUST be globally unique across all streams within that session\\u2014or all streams with that specific client, if session management is not in use. If the client wishes to resume after a broken connection, it SHOULD issue an HTTP GET to the MCP endpoint, and include the Last-Event-ID header to indicate the last event ID it received. The server MAY use this header to replay messages that would have been sent after the last event ID, on the stream that was disconnected, and to resume the stream from that point. The server MUST NOT replay messages that would have been delivered on a different stream. In other words, these event IDs should be assigned by servers on a per-stream basis, to act as a cursor within that particular stream. An MCP \\u201Csession\\u201D consists of logically related interactions between a client and a server, beginning with the initialization phase. To support servers which want to establish stateful sessions: A server using the Streamable HTTP transport MAY assi\\n\\nProtocol Revision: 2025-06-18 MCP uses JSON-RPC to encode messages. JSON-RPC messages MUST be UTF-8 encoded. The protocol currently defines two standard transport mechanisms for client-server communication: stdio, communication over standard in and standard out \\u00B7 Streamable HTTP Clients SHOULD support stdio whenever possible. It is also possible for clients and servers to implement custom transports in a pluggable fashion. ... The client launches the MCP server as a subprocess. The server reads JSON-RPC messages from its standard input (stdin) and sends messages to its standard output (stdout). Messages are individual JSON-RPC requests, notifications, or responses. Messages are delimited by newlines, and MUST NOT contain embedded newlines. The server MAY write UTF-8 strings to its standard error (stderr) for logging purposes. Clients MAY capture, forward, or ignore this logging.\\n\\nThe client MUST NOT write anything to the server\\u2019s stdin that is not a valid MCP message. This replaces the HTTP\\u002BSSE transport from protocol version 2024-11-05. See the backwards compatibility guide below. In the Streamable HTTP transport, the server operates as an independent process that can handle multiple client connections. This transport uses HTTP POST and GET requests. Server can optionally make use of Server-Sent Events (SSE) to stream multiple server messages. This permits basic MCP servers, as well as more feature-rich servers supporting streaming and server-to-client notifications and requests. The server MUST provide a single HTTP endpoint path (hereafter referred to as the MCP endpoint) that supports both POST and GET methods. For example, this could be a URL like https://example.com/mcp. ... Servers MUST validate the Origin header on all incoming connections to prevent DNS rebinding attacks \\u00B7\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://modelcontextprotocol.io/specification/2025-06-18/basic/transports\"}},{\"type\":\"knowledge\",\"title\":\"Transports \\u2013 Model Context Protocol Specification\",\"url\":\"https://spec.modelcontextprotocol.io/specification/2025-03-26/basic/transports/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"modelcontextprotocol.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=modelcontextprotocol.io\",\"site_name\":\"Modelcontextprotocol\"},\"is_missing\":false,\"text\":\"In the Streamable HTTP transport, the server operates as an independent process that can handle multiple client connections. This transport uses HTTP POST and GET requests. Server can optionally make use of Server-Sent Events (SSE) to stream multiple server messages.\\n\\nAccept an MCP server URL from the user, which may point to either a server using the old transport or the new transport. Attempt to POST an InitializeRequest to the server URL, with an Accept header as defined above: If it succeeds, the client can assume this is a server supporting the new Streamable HTTP transport. If it fails with an HTTP 4xx status code (e.g., 405 Method Not Allowed or 404 Not Found): Issue a GET request to the server URL, expecting that this will open an SSE stream and return an endpoint event as the first event. When the endpoint event arrives, the client can assume this is a server running the old HTTP\\u002BSSE transport, and should use that transport for all subsequent communication. Clients and servers MAY implement additional custom transport mechanisms to suit their specific needs. The protocol is transport-agnostic and can be implemented over any communication channel that supports bidirectional message exchange.\\n\\n\\u2139\\uFE0F Protocol Revision: 2025-03-26 MCP uses JSON-RPC to encode messages. JSON-RPC messages MUST be UTF-8 encoded. The protocol currently defines two standard transport mechanisms for client-server communication: stdio, communication over standard in and standard out Streamable HTTP Clients SHOULD support stdio whenever possible.\\n\\nThe client MUST NOT write anything to the server\\u2019s stdin that is not a valid MCP message. sequenceDiagram participant Client participant Server Process Client-\\u003E\\u003E\\u002BServer Process: Launch subprocess loop Message Exchange Client-\\u003E\\u003EServer Process: Write to stdin Server Process-\\u003E\\u003EClient: Write to stdout Server Process--)Client: Optional logs on stderr end Client-\\u003E\\u003EServer Process: Close stdin, terminate subprocess deactivate Server Process ... This replaces the HTTP\\u002BSSE transport from protocol version 2024-11-05. See the backwards compatibility guide below. In the Streamable HTTP transport, the server operates as an independent process that can handle multiple client connections. This transport uses HTTP POST and GET requests. Server can optionally make use of Server-Sent Events (SSE) to stream multiple server messages. This permits basic MCP servers, as well as more feature-rich servers supporting streaming and server-to-client notifications and requests.\\n\\nIf present, the ID MUST be globally unique across all streams within that session\\u2014or all streams with that specific client, if session management is not in use. If the client wishes to resume after a broken connection, it SHOULD issue an HTTP GET to the MCP endpoint, and include the Last-Event-ID header to indicate the last event ID it received. The server MAY use this header to replay messages that would have been sent after the last event ID, on the stream that was disconnected, and to resume the stream from that point. The server MUST NOT replay messages that would have been delivered on a different stream. In other words, these event IDs should be assigned by servers on a per-stream basis, to act as a cursor within that particular stream. An MCP \\u201Csession\\u201D consists of logically related interactions between a client and a server, beginning with the initialization phase. To support servers which want to establish stateful sessions: A server using the Streamable HTTP transport MAY assi\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"March 26, 2025\",\"url\":\"https://spec.modelcontextprotocol.io/specification/2025-03-26/basic/transports/\"}},{\"type\":\"knowledge\",\"title\":\"Transport \\u00B7 Cloudflare Agents docs\",\"url\":\"https://developers.cloudflare.com/agents/model-context-protocol/transport/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"cloudflare.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=cloudflare.com\",\"site_name\":\"Cloudflare\"},\"is_missing\":false,\"text\":\"The Model Context Protocol (MCP) specification defines three standard transport mechanisms \\u2197 for communication between clients and servers: stdio, communication over standard in and standard out \\u2014 designed for local MCP connections. Server-Sent Events (SSE) \\u2014 Currently supported by most remote MCP clients, but is expected to be replaced by Streamable HTTP over time. It requires two endpoints: one for sending requests, another for receiving streamed responses. Streamable HTTP \\u2014 New transport method introduced \\u2197 in March 2025. It simplifies the communication by using a single HTTP endpoint for bidirectional messaging. It is currently gaining adoption among remote MCP clients, but it is expected to become the standard transport in the future. MCP servers built with the Agents SDK can support both remote transport methods (SSE and Streamable HTTP), with the McpAgent class \\u2197 automatically handling the transport configuration.\\n\\nThe Model Context Protocol (MCP) specification defines three standard transport mechanisms for communication between clients and servers:\\n\\nIf you\\u0027re building a new MCP server or upgrading an existing one on Cloudflare, we recommend supporting both remote transport methods (SSE and Streamable HTTP) concurrently to ensure compatibility with all MCP clients. You can use the \\u0022Deploy to Cloudflare\\u0022 button to create a remote MCP server that automatically supports both SSE and Streamable HTTP transport methods. If you\\u0027re manually configuring your MCP server, here\\u0027s how to use the McpAgent class to handle both transport methods: ... If your MCP server implements authentication \\u0026 authorization using the Workers OAuth Provider \\u2197 Library, then you can configure it to support both transport methods using the apiHandlers property. ... If you\\u0027ve already built a remote MCP server using the Cloudflare Agents SDK, make the following changes to support the new Streamable HTTP transport while maintaining compatibility with remote MCP clients using SSE: Use MyMcpAgent.serveSSE(\\u0027/sse\\u0027) for the existing SSE transport.\\n\\nAdd a new path with MyMcpAgent.serve(\\u0027/mcp\\u0027) to support the new Streamable HTTP transport. If you have an MCP server with authentication/authorization using the Workers OAuth Provider, update the configuration to use the apiHandlers property, which replaces apiRoute and apiHandler. ... To use apiHandlers, update to @cloudflare/workers-oauth-provider v0.0.4 or later. With these few changes, your MCP server will support both transport methods, making it compatible with both existing and new clients. While most MCP clients have not yet adopted the new Streamable HTTP transport, you can start testing it today using mcp-remote \\u2197, an adapter that lets MCP clients that otherwise only support local connections work with remote MCP servers.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://developers.cloudflare.com/agents/model-context-protocol/transport/\"}},{\"type\":\"knowledge\",\"title\":\"Model context protocol (MCP) - OpenAI Agents SDK\",\"url\":\"https://openai.github.io/openai-agents-python/mcp/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.io\",\"site_name\":\"OpenAI\"},\"is_missing\":false,\"text\":\"If the MCP server implements the HTTP with SSE transport, instantiate MCPServerSse. Apart from the transport, the API is identical to the Streamable HTTP server. from agents import Agent, Runner from agents.model_settings import ModelSettings from agents.mcp import MCPServerSse workspace_id ...\\n\\nModel Context Protocol \\u2013 the specification and design guides. examples/mcp \\u2013 runnable stdio, SSE, and Streamable HTTP samples.\\n\\nHosted MCP also supports OpenAI connectors. Instead of specifying a server_url, supply a connector_id and an access token. The Responses API handles authentication and the hosted server exposes the connector\\u0027s tools. import os HostedMCPTool( tool_config={ \\u0022type\\u0022: \\u0022mcp\\u0022, \\u0022server_label\\u0022: \\u0022google_calendar\\u0022, \\u0022connector_id\\u0022: \\u0022connector_googlecalendar\\u0022, \\u0022authorization\\u0022: os.environ[\\u0022GOOGLE_CALENDAR_AUTHORIZATION\\u0022], \\u0022require_approval\\u0022: \\u0022never\\u0022, } ) Fully working hosted tool samples\\u2014including streaming, approvals, and connectors\\u2014live in examples/hosted_mcp. When you want to manage the network connection yourself, use MCPServerStreamableHttp. Streamable HTTP servers are ideal when you control the transport or want to run the server inside your own infrastructure while keeping latency low.\\n\\nIf the MCP server implements the HTTP with SSE transport, instantiate MCPServerSse. Apart from the transport, the API is identical to the Streamable HTTP server. from agents import Agent, Runner from agents.model_settings import ModelSettings from agents.mcp import MCPServerSse workspace_id = \\u0022demo-workspace\\u0022 async with MCPServerSse( name=\\u0022SSE Python Server\\u0022, params={ \\u0022url\\u0022: \\u0022http://localhost:8000/sse\\u0022, \\u0022headers\\u0022: {\\u0022X-Workspace\\u0022: workspace_id}, }, cache_tools_list=True, ) as server: agent = Agent( name=\\u0022Assistant\\u0022, mcp_servers=[server], model_settings=ModelSettings(tool_choice=\\u0022required\\u0022), ) result = await Runner.run(agent, \\u0022What\\u0027s the weather in Tokyo?\\u0022) print(result.final_output) For MCP servers that run as local subprocesses, use MCPServerStdio. The SDK spawns the process, keeps the pipes open, and closes them automatically when the context manager exits.\\n\\nimport asyncio from agents import Agent, HostedMCPTool, Runner async def main() -\\u003E None: agent = Agent( name=\\u0022Assistant\\u0022, tools=[ HostedMCPTool( tool_config={ \\u0022type\\u0022: \\u0022mcp\\u0022, \\u0022server_label\\u0022: \\u0022gitmcp\\u0022, \\u0022server_url\\u0022: \\u0022https://gitmcp.io/openai/codex\\u0022, \\u0022require_approval\\u0022: \\u0022never\\u0022, } ) ], ) result = await Runner.run(agent, \\u0022Which language is this repository written in?\\u0022) print(result.final_output) asyncio.run(main()) The hosted server exposes its tools automatically; you do not add it to mcp_servers. Hosted tools support streaming results in exactly the same way as function tools.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://openai.github.io/openai-agents-python/mcp/\"}},{\"type\":\"knowledge\",\"title\":\"Transports \\u2013 Model Context Protocol \\uFF08MCP\\uFF09\",\"url\":\"https://modelcontextprotocol.info/docs/concepts/transports/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"modelcontextprotocol.info\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=modelcontextprotocol.info\",\"site_name\":\"Modelcontextprotocol\"},\"is_missing\":false,\"text\":\"Any transport implementation just needs to conform to the Transport interface: ... interface Transport { // Start processing messages start(): Promise\\u0026lt;void\\u0026gt;; // Send a JSON-RPC message send(message: JSONRPCMessage): Promise\\u0026lt;void\\u0026gt;; // Close the connection close(): Promise\\u0026lt;void\\u0026gt;; // Callbacks ...\\n\\nSpecification (Latest) Architecture \\u00B7 Base Protocol \\u00B7 Messages \\u00B7 Lifecycle \\u00B7 Transports \\u00B7 Versioning \\u00B7 Utilities \\u00B7 Ping \\u00B7 Cancellation \\u00B7 Progress \\u00B7 Server Features \\u00B7 Prompts \\u00B7 Resources \\u00B7 Tools \\u00B7 Utilities \\u00B7 Completion \\u00B7 Logging \\u00B7 Pagination \\u00B7 Client Features \\u00B7 Roots \\u00B7 Sampling \\u00B7 Contributions \\u00B7 Revisions \\u00B7 2024-11-05 (Current) MCP Protocol Blog \\u00B7 Mastering MCP Tool Development: Unlocking AI Agent Potential \\u00B7 Update on the Next MCP Protocol Release \\u00B7 Chrome DevTools MCP: Giving AI Coding Assistants Eyes to See Beyond Blind Programming \\u00B7 Model Context Protocol (MCP): A New Standard for AI Application and External Data Integration \\u00B7 \\u4E00\\u6587\\u8BFB\\u61C2MCP\\u534F\\u8BAE\\uFF1A\\u5927\\u6A21\\u578BAI-Agent\\u7684USB-C\\u63A5\\u53E3 \\u00B7 About \\u00B7 More \\u00B7 Docs \\u2197 \\u00B7 Specification \\u2197 \\u00B7 About \\u00B7 Understanding Model Context Protocol (MCP) MCP Learning Path: From Zero to Hero \\u00B7\\n\\nSpecification \\u2197 \\u00B7 About \\u00B7 English \\u00B7 English \\u00B7 \\u7B80\\u4F53\\u4E2D\\u6587 \\u00B7 \\u7E41\\u9AD4\\u4E2D\\u6587 \\u00B7 \\uD55C\\uAD6D\\uC5B4 \\u00B7 Light \\u00B7 Dark \\u00B7 System \\u00B7 MCP Docs \\u00B7 Core Concepts \\u00B7 Transports \\u00B7 Transports in the Model Context Protocol (MCP) provide the foundation for communication between clients and servers. A transport handles the underlying mechanics of how messages are sent and received. MCP uses JSON-RPC 2.0 as its wire format. The transport layer is responsible for converting MCP protocol messages into JSON-RPC format for transmission and converting received JSON-RPC messages back into MCP protocol messages. There are three types of JSON-RPC messages used: { jsonrpc: \\u00222.0\\u0022, id: number | string, method: string, params?: object } { jsonrpc: \\u00222.0\\u0022, id: number | string, result?: object, error?: { code: number, message: string, data?: unknown } } { jsonrpc: \\u00222.0\\u0022, method: string, params?: object } MCP includes two standard transport implementations: The stdio transport enables communication through standard input and output streams.\\n\\nTransports in the Model Context Protocol (MCP) provide the foundation for communication between clients and servers. A transport handles the underlying mechanics of how messages are sent and received. MCP uses JSON-RPC 2.0 as its wire format. The transport layer is responsible for converting MCP protocol messages into JSON-RPC format for transmission and converting received JSON-RPC messages back into MCP protocol messages. ... { jsonrpc: \\u00222.0\\u0022, id: number | string, result?: object, error?: { code: number, message: string, data?: unknown } } { jsonrpc: \\u00222.0\\u0022, method: string, params?: object } MCP includes two standard transport implementations: The stdio transport enables communication through standard input and output streams. This is particularly useful for local integrations and command-line tools. ... SSE transport enables server-to-client streaming with HTTP POST requests for client-to-server communication.\\n\\nasync with sse_client(\\u0022http://localhost:8000/sse\\u0022) as streams: async with ClientSession(streams[0], streams[1]) as session: await session.initialize() MCP makes it easy to implement custom transports for specific needs. Any transport implementation just needs to conform to the Transport interface: ... interface Transport { // Start processing messages start(): Promise\\u003Cvoid\\u003E; // Send a JSON-RPC message send(message: JSONRPCMessage): Promise\\u003Cvoid\\u003E; // Close the connection close(): Promise\\u003Cvoid\\u003E; // Callbacks onclose?: () =\\u003E void; onerror?: (error: Error) =\\u003E void; onmessage?: (message: JSONRPCMessage) =\\u003E void; } Note that while MCP Servers are often implemented with asyncio, we recommend implementing low-level interfaces like transports with \\u0060anyio\\u0060 for wider compatibility. \\u0060\\u0060\\u0060python @contextmanager async def create_transport( read_stream: MemoryObjectReceiveStream[JSONRPCMessage | Exception], write_stream: MemoryObjectSendStream[JSONRPCMessage] ): \\u0022\\u0022\\u0022 Transport interface for MCP.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://modelcontextprotocol.info/docs/concepts/transports/\"}},{\"type\":\"knowledge\",\"title\":\"Why MCP Deprecated SSE and Went with Streamable HTTP - fka.dev\",\"url\":\"https://blog.fka.dev/blog/2025-06-06-why-mcp-deprecated-sse-and-go-with-streamable-http/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"fka.dev\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=fka.dev\",\"site_name\":\"Fka\"},\"is_missing\":false,\"text\":\"One of the most significant recent changes is the transition from Server-Sent Events (SSE) to Streamable HTTP as the preferred transport mechanism for remote MCP servers. This architectural shift, introduced in the MCP specification update on ...\\n\\nThe Model Context Protocol (MCP) has been evolving rapidly since its introduction, with each iteration improving how AI agents communicate with external services. One of the most significant recent changes is the transition from Server-Sent Events (SSE) to Streamable HTTP as the preferred transport mechanism for remote MCP servers. This architectural shift, introduced in the MCP specification update on March 26, 2025 (version 2025-03-26), represents a fundamental improvement in how AI agents interact with services. Version Note: The TypeScript SDK version 1.10.0, released on April 17, 2025, was the first to support the new Streamable HTTP transport, which supersedes the SSE transport from protocol version 2024-11-05. When remote MCP was first introduced, it relied on Server-Sent Events (SSE) as its transport layer. This approach required two separate endpoints: An SSE endpoint (/sse) that established a persistent connection for the client to receive responses \\u00B7\\n\\nAn exploration of why the Model Context Protocol is moving from Server-Sent Events (SSE) to Streamable HTTP transport, the benefits of this change, and what developers need to know for future MCP implementations.\\n\\nSome SSE implementations have compatibility challenges with newer HTTP protocols, limiting the ability to leverage performance improvements in modern web infrastructure. The one-way nature of SSE means that separate channels are needed for client-to-server communication, creating artificial separation between related operations. The current implementation of Streamable HTTP already provides feature parity with the SSE transport, but the MCP specification outlines several additional capabilities that will be implemented soon: Future versions will enable clients to resume operations exactly where they left off if a connection drops during processing. This eliminates the need to keep connections continuously open and makes MCP more resilient for long-running AI agents. Explicit cancellation mechanisms are being implemented to allow clients to cleanly terminate operations, ensuring better resource management and user experience.\\n\\nFollow the specification closely: The MCP specification is evolving rapidly, so stay up to date with changes \\u00B7 Implement proper error handling: Design your server to gracefully handle connection issues and client errors \\u00B7 Add dual support: Implement both SSE and Streamable HTTP transport options \\u00B7 Plan for migration: Consider how you\\u2019ll eventually transition to Streamable HTTP only \\u00B7 Update client libraries: Ensure your client libraries support both transport methods \\u00B7 Add Streamable HTTP support: Update your clients to use the new transport when available \\u00B7 Maintain SSE fallback: Keep SSE support for backward compatibility with existing services \\u00B7 Leverage new capabilities: Design your client to take advantage of the new features as they become available \\u00B7 The transition from SSE to Streamable HTTP represents a significant architectural improvement for the MCP ecosystem. By simplifying the connection model, enabling bidirectional communication, and laying the groundwork for advanced f\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://blog.fka.dev/blog/2025-06-06-why-mcp-deprecated-sse-and-go-with-streamable-http/\"}},{\"type\":\"knowledge\",\"title\":\"What Is the Model Context Protocol (MCP) and How It Works\",\"url\":\"https://www.descope.com/learn/post/mcp\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"descope.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=descope.com\",\"site_name\":\"Descope\"},\"is_missing\":false,\"text\":\"HTTP\\u002BSSE (Server-Sent Events): Remote connections, with HTTP for client requests and SS for server responses and streaming. ... JSON-RPC 2.0 as the underlying message standard, providing a standardized structure for requests, responses, and ...\\n\\nMCP client: Integrated within the host application to handle connections with MCP servers, translating between the host\\u2019s requirements and the Model Context Protocol. Clients are built into host applications, like the MCP client inside Claude Desktop. MCP server: Adds context and capabilities, exposing specific functions to AI apps through MCP. Each standalone server typically focuses on a specific integration point, like GitHub for repository access or a PostgreSQL for database operations. Transport layer: The communication mechanism between clients and servers. MCP supports two primary transport methods: STDIO (Standard Input/Output): Mainly local integrations where the server runs in the same environment as the client. HTTP\\u002BSSE (Server-Sent Events): Remote connections, with HTTP for client requests and SS for server responses and streaming. ... JSON-RPC 2.0 as the underlying message standard, providing a standardized structure for requests, responses, and notifications.\\n\\nLearn more about MCP, the open source protocol developed by Anthropic to provide LLMs and AI agents a standardized way to connect with external data sources and tools.\\n\\nClient ID metadata documents: This proposed change addresses a common MCP scenario in which servers and clients have no pre-existing relationship, mainly due to its reliance on two registration policies: pre-registration, and Dynamic Client Registration (DCR). Both pose significant drawbacks in execution. Client ID metadata documents could reside at specific HTTPS URLs, and OAuth clients could use these URLs as client identifiers. This would enable servers to trust previously unknown clients while retaining total control over authorization policy. While these upcoming additions will further cement MCP\\u2019s role in making AI development faster and easier, the protocol has already made a huge impact on the LLM ecosystem. Providing a common format for integrations amounts to more than speeding up the processes we already have. It has created a space where both major enterprises and individual contributors can build equally viable, increasingly valuable options to make everyone\\u2019s lives better\\n\\nFunction calling, which allows LLMs to invoke predetermined functions based on user requests, is a well-established feature of modern AI models. Sometimes referred to as \\u201Ctool use,\\u201D function calling is not mutually exclusive with MCP; the new protocol simply standardizes how this API feature works, adding context for the LLM. This is achieved by streaming tool definitions (including their capabilities, data stores, and possible prompts) to LLMs from the MCP server. Without MCP, when you use a function call directly with an LLM API, you need to: Define model-specific function schemas, which are JSON descriptions of the function, acceptable parameters, and what it returns. Implement handlers (the actual code that executes when a function is called) for those functions. Create different implementations for each model you support. ... Defining a consistent way to specify tools (functions) across any AI system.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.descope.com/learn/post/mcp\"}},{\"type\":\"knowledge\",\"title\":\"Model Context Protocol (MCP) Explained - by Nir Diamant\",\"url\":\"https://diamantai.substack.com/p/model-context-protocol-mcp-explained\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"substack.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=substack.com\",\"site_name\":\"Substack\"},\"is_missing\":false,\"text\":\"MCP is designed to be secure and flexible. Since MCP servers might have access to sensitive data or perform powerful actions, the protocol emphasizes security controls. Servers can implement access controls, and the AI host often requires user approval before executing a tool. ... STDIO Transport: The MCP server runs as a local process on the same machine as the host, and communication happens through standard input/output pipes. This mode is great for local development \\u2013 it\\u0027s simple and secure. SSE (HTTP) Transport: The MCP server runs as a web service (locally or remotely), exposing an HTTP endpoint. This mode is more flexible \\u2013 your server could be running on a different machine or cloud instance. Both transports do the same job; they just differ in how the bytes get from point A to B. Under the hood, the protocol uses structured messages (often JSON) to encode requests and responses.\\n\\nThis blog post is about something that I find incredibly powerful and transformative: the Model Context Protocol (MCP). After exploring various AI integration approaches, I\\u0027ve written this post to make MCP easy to understand for everyone. In this post, I\\u0027ll explain what MCP is and why it matters, walk through how it works, and show you how to use it in your projects. I will show you how to create your own MCP server and examples of using existing ones. Imagine you have a powerful AI assistant that can help with coding, data analysis, or customer support. Now imagine that assistant is locked in a room \\u2013 it\\u0027s smart but has no direct access to your databases, files, or tools. If you want it to use some information, you have to manually hand it over. Frustrating, right? This is the situation many LLMs have faced: they\\u0027re isolated from the vast context and tools that could make them truly useful.\\n\\nWhile solutions like RAG help with retrieving information and various agent frameworks allow for tool use, there\\u0027s a deeper problem: every integration requires custom code, special prompting, and bespoke solutions. Each new data source or tool needs its own connector, its own protocol, its own safety checks. This fragmentation creates a maintenance nightmare and makes it extremely difficult to build comprehensive AI systems that can work across multiple data sources and tools in a standardized way. Link to my GitHub repo that contains a code tutorial on MCP: Repo Link \\u00B7 Model Context Protocol (MCP) is an open standard (initially released by Anthropic in late 2024) that defines a universal way for AI models to connect with external data sources, tools, and environments. Here\\u0027s a simple analogy: MCP is like a USB-C port for AI applications. Just as USB-C provides a standard way to connect various devices (phones, laptops, cameras) to different peripherals (chargers, monitors, storage), M\\n\\nThe SDKs (in Python, TypeScript, Java, C#, etc.) make this relatively easy. You focus on hooking up to your system, and the protocol details are handled by the library. Host Servers Appropriately: For small projects or local development, running servers on your machine is easiest. For larger setups or team use, you might deploy them on a server or cloud instance. Treat them like microservices. Use MCP-Enabled AI Clients: Your AI model or agent needs to support MCP to take advantage of these servers. Claude Desktop, Cursor IDE, and frameworks like LangChain all offer MCP support. Test and Iterate: As you add MCP to your project, continually test how the AI uses the new capabilities. Sometimes the AI will cleverly utilize a tool to solve a problem; other times it might need a nudge. Model Context Protocol is a game-changer for building AI applications that are truly aware and capable within our software ecosystems.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"April 10, 2025\",\"url\":\"https://diamantai.substack.com/p/model-context-protocol-mcp-explained\"}},{\"type\":\"knowledge\",\"title\":\"Model Context Protocol (MCP): A Guide With Demo Project | DataCamp\",\"url\":\"https://www.datacamp.com/tutorial/mcp-model-context-protocol\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"datacamp.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=datacamp.com\",\"site_name\":\"DataCamp\"},\"is_missing\":false,\"text\":\"The code uses the requests library to send authenticated HTTP GET requests, fetching both general PR metadata and detailed file-level changes: The first API request retrieves high-level PR information, including its title, description, author details, timestamps, and current state. The second API request fetches details about each file changed in the PR, such as filename, modification status, the number of lines added or removed, and URLs for accessing file contents. Once the data is retrieved, the function structures and combines the PR metadata with file changes into a dictionary. The file changes are stored in a list, with each entry containing detailed information about a file. The final data structure includes the PR title, description, author, timestamps, state, total count of files changed, and a detailed breakdown of file modifications. Now that we have all the dependencies and extra functions in place, we set up our MCP server.\\n\\nLearn how to build an MCP server using Anthropic\\u0027s Model Context Protocol to connect Claude with GitHub and Notion. ... Get your team access to the full DataCamp for business platform. The Model Context Protocol (MCP) is an open standard that enables large language models to interact dynamically with external tools, databases, and APIs through a standardized interface. In this blog, I\\u2019ll guide you through building an MCP-powered PR review server that integrates with Claude Desktop. This server will: ... We will use the Model Context Protocol (MCP) to standardize communication between the server and Claude Desktop, making it modular and scalable. We keep our readers updated on the latest in AI by sending out The Median, our free Friday newsletter that breaks down the week\\u2019s key stories. Subscribe and stay sharp in just a few minutes a week: The Model Context Protocol (MCP) is an open standard developed by Anthropic to enable easy and standardized integration between AI models and extern\\n\\nScalability: MCP supports various transports like stdio, WebSockets, HTTP SSE, and UNIX sockets. The PR review system automates code analysis and documentation using Claude Desktop and Notion. ... Environment setup: Load the GitHub and Notion credentials. Server initialization: Start an MCP server to communicate with Claude Desktop. Fetching PR data: Retrieve the PR changes and metadata from GitHub. Code analysis: Claude Desktop directly analyzes code changes (no separate tool needed). Notion documentation: Save the analysis results to Notion for tracking. Before we begin, ensure you have Python 3.10\\u002B installed. Then, we set up our environment and start with installing the uv package manager. For Mac or Linux: curl -LsSf https://astral.sh/uv/install.sh | sh # Mac/Linux ... We can now create and activate a virtual environment. For Mac or Linux: ...\\n\\nThe code uses the requests library to send authenticated HTTP GET requests, fetching both general PR metadata and detailed file-level changes: The first API request retrieves high-level PR information, including its title, description, author details, timestamps, and current state. The second API request fetches details about each file changed in the PR, such as filename, modification status, the number of lines added or removed, and URLs for accessing file contents. Once the data is retrieved, the function structures and combines the PR metadata with file changes into a dictionary. The file changes are stored in a list, with each entry containing detailed information about a file. The final data structure includes the PR title, description, author, timestamps, state, total count of files changed, and a detailed breakdown of file modifications. Now that we have all the dependencies and extra functions in place, we set up our MCP server.\\n\\nIt uses the Notion API to create a new page under the specified Notion workspace. ... The run() method starts the MCP server using mcp.run(transport=\\u0022stdio\\u0022), enabling the interaction between Claude Desktop and the PR review tools. Now that we have all the code pieces in place, we run our server with the following terminal command: ... Once the server is up and running, open the Claude Desktop application, and you\\u0027ll see a plug icon (\\uD83D\\uDD0C) in the textbox. This plug indicates the presence of an MCP in the Claude environment. In the same textbox, you\\u0027ll notice a hammer-like icon (\\uD83D\\uDD28) that displays all the available MCPs, as shown below. Now, pass the link to the PR you want to analyze and Claude will do the rest of the things for you. Claude will first analyze the PR and then provide a summary and review of it. It will ask users if they want to upload the details to the Notion page.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"March 17, 2025\",\"url\":\"https://www.datacamp.com/tutorial/mcp-model-context-protocol\"}},{\"type\":\"knowledge\",\"title\":\"A practical introduction to the Model-Context-Protocol (MCP) | dida Blog\",\"url\":\"https://dida.do/blog/a-practical-introduction-to-the-model-context-protocol-mcp\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"dida.do\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=dida.do\",\"site_name\":\"dida\"},\"is_missing\":false,\"text\":\"The Model-Context-Protocol (MCP) is a standardized communication interface designed to enhance interoperability between AI language models and external servers. It establishes a structured way for language models to interact with resources, ...\\n\\nNote that our agent prompt did not directly specify which tools to use when. The agent only got the list of tools with their description and devised a successful strategy on its own. Alas there was a small hiccup in the beginning: It tried to look up a non-existent section first. But it switched to using the search tool afterwards, nicely showing how resilient to errors modern agent toolkits are. In this blog post, we have seen how the Model-Context-Protocol and its implementation offers a convenient way to provide LLM agents with relevant context information and functional abilities. Underlying this design is a rather simple but powerful idea: Splitting off tool definitions from an agentic system makes them available across multiple agents. This simplifies and enhances agentic designs tremendously: SaaS providers or internal teams wishing to improve the integration of their products with LLM agents can now expose them via MCP servers and leverage a rich ecosystem of MCP clients.\\n\\nAn older version of the spec prescribed SSE (Server-sent-events) as transport instead. At the time of writing, most SDKs still use SSE and do not support Streamable HTTP yet. After this dry overview, let\\u0027s actually implement an MCP server and see what we can do with this. We will build a server which gives our LLMs access to wikipedia as a knowledge source.\\n\\nWhile MCP provides powerful capabilities for tool integration, it\\u0027s worth noting that the security landscape around these servers is evolving quickly. As with any technology that exposes functionality to AI systems, security considerations are paramount. Anthropic recently added a recommended authentication workflow to the specification, addressing some concerns about unauthorized access. Meanwhile, security researchers continue to investigate potential vulnerabilities such as tool poisoning through prompt injection attacks.\\n\\nmcp run --transport stdio src/example_mcp_server/server.py # For sse transport # uv run --with-editable . mcp run --transport sse src/example_mcp_server/server.py \\u00B7 To check that everything works correctly, the mcp sdk also ships with a debugging frontend called \\u0022MCP Inspector\\u0022. We can start it as follows: ... Let\\u0027s integrate our newly built MCP server into an actual agentic workflow. We will use the smolagents library from Huggingface for this. # ./src/example_mcp_server/agent.py import os import sys from pathlib import Path from mcp import StdioServerParameters from smolagents import OpenAIServerModel, ToolCollection, ToolCallingAgent PROMP_TEMPLATE = \\u0022\\u0022\\u0022 You are a helpful AI assistant that answers questions based on Wikipedia information. Always cite the source of the information you provide. Add a reference section at the end of your answer.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://dida.do/blog/a-practical-introduction-to-the-model-context-protocol-mcp\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"8dcc832a-2389-46d8-a127-456be9da9c58\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

