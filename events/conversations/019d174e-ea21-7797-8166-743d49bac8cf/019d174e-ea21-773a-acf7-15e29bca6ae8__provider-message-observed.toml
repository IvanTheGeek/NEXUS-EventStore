 Return via \\u0060Mcp-Session-Id\\u0060 header\\n   - Validate on subsequent requests\\n   - 404 for expired/invalid sessions\\n\\n4. **Response handling:**\\n   - Simple JSON for most requests\\n   - SSE stream for long-running operations (optional for Phase 1)\\n   - 202 Accepted for notifications\\n\\n### Should Remove\\n\\n- Old \\u0060/sse/events\\u0060 endpoint\\n- Old \\u0060/sse/message\\u0060 endpoint\\n- Two-endpoint SSE transport code\\n\\n---\\n\\n## Documentation Created\\n\\n- **Migration Guide:** \\u0060/home/linux/mcp-http-transport-migration.md\\u0060\\n  - Complete specification details\\n  - Implementation plan\\n  - Testing procedures\\n  - Key differences summary\\n\\n- **Code Prompt:** \\u0060/home/linux/code-prompt-http-migration.md\\u0060\\n  - Task breakdown\\n  - Step-by-step instructions\\n  - VPS access details\\n  - Success criteria\\n\\n---\\n\\n## Next Steps\\n\\n1. **Claude Code:** Implement new HttpTransport.fs\\n2. **Claude Code:** Update Program.fs routing\\n3. **Claude Code:** Test with curl\\n4. **Claude Code:** Deploy to VPS\\n5. **Claude Desktop:** Test connection with updated config\\n6. **Document:** Create TechnicalDecision event with results\\n\\n---\\n\\n## Claude Desktop Config (After Migration)\\n\\n\\u0060\\u0060\\u0060json\\n{\\n  \\u0022mcpServers\\u0022: {\\n    \\u0022nexus\\u0022: {\\n      \\u0022url\\u0022: \\u0022https://mcp.nexus.ivanthegeek.com/mcp\\u0022,\\n      \\u0022apiKey\\u0022: \\u0022wHj6HkvbK5sf305VBuA25rIJqadW1JJB\\u002BzH/eCiFL0U=\\u0022\\n    }\\n  }\\n}\\n\\u0060\\u0060\\u0060\\n\\n**Note:** Change from \\u0060/sse\\u0060 to \\u0060/mcp\\u0060 endpoint.\\n\\n---\\n\\n## References\\n\\n- MCP Spec: https://modelcontextprotocol.io/specification/2025-06-18/basic/transports\\n- Why SSE deprecated: https://blog.fka.dev/blog/2025-06-06-why-mcp-deprecated-sse-and-go-with-streamable-http/\\n- VPS: 66.179.208.238 (user: linux)\\n- Project: /home/linux/FnMCP.Nexus\\n\\n---\\n\\n## Temporary Workaround\\n\