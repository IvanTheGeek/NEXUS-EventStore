This replaces the HTTP+SSE transport from protocol version 2024-11-05. See the backwards compatibility guide below. In the Streamable HTTP transport, the server operates as an independent process that can handle multiple client connections. This transport uses HTTP POST and GET requests. Server can optionally make use of Server-Sent Events (SSE) to stream multiple server messages. This permits basic MCP servers, as well as more feature-rich servers supporting streaming and server-to-client notifications and requests.\n\nIf present, the ID MUST be globally unique across all streams within that session—or all streams with that specific client, if session management is not in use. If the client wishes to resume after a broken connection, it SHOULD issue an HTTP GET to the MCP endpoint, and include the Last-Event-ID header to indicate the last event ID it received. The server MAY use this header to replay messages that would have been sent after the last event ID, on the stream that was disconnected, and to resume the stream from that point. The server MUST NOT replay messages that would have been delivered on a different stream. In other words, these event IDs should be assigned by servers on a per-stream basis, to act as a cursor within that particular stream. An MCP “session” consists of logically related interactions between a client and a server, beginning with the initialization phase. To support servers which want to establish stateful sessions: A server using the Streamable HTTP transport MAY assi\nThe Model Context Protocol (MCP) specification defines three standard transport mechanisms ↗ for communication between clients and servers: stdio, communication over standard in and standard out — designed for local MCP connections. Server-Sent Events (SSE) — Currently supported by most remote MCP clients, but is expected to be replaced by Streamable HTTP over time. It requires two endpoints: one for sending requests, another for receiving streamed responses. Streamable HTTP — New transport method introduced ↗ in March 2025. It simplifies the communication by using a single HTTP endpoint for bidirectional messaging. It is currently gaining adoption among remote MCP clients, but it is expected to become the standard transport in the future. MCP servers built with the Agents SDK can support both remote transport methods (SSE and Streamable HTTP), with the McpAgent class ↗ automatically handling the transport configuration.\n\nThe Model Context Protocol (MCP) specification defines three standard transport mechanisms for communication between clients and servers:\n\nIf you're building a new MCP server or upgrading an existing one on Cloudflare, we recommend supporting both remote transport methods (SSE and Streamable HTTP) concurrently to ensure compatibility with all MCP clients. You can use the \"Deploy to Cloudflare\" button to create a remote MCP server that automatically supports both SSE and Streamable HTTP transport methods. If you're manually configuring your MCP server, here's how to use the McpAgent class to handle both transport methods: ... If your MCP server implements authentication & authorization using the Workers OAuth Provider ↗ Library, then you can configure it to support both transport methods using the apiHandlers property. ... If you've already built a remote MCP server using the Cloudflare Agents SDK, make the following changes to support the new Streamable HTTP transport while maintaining compatibility with remote MCP clients using SSE: Use MyMcpAgent.serveSSE('/sse') for the existing SSE transport.\n\nAdd a new path with MyMcpAgent.serve('/mcp') to support the new Streamable HTTP transport. If you have an MCP server with authentication/authorization using the Workers OAuth Provider, update the configuration to use the apiHandlers property, which replaces apiRoute and apiHandler. ... To use apiHandlers, update to @cloudflare/workers-oauth-provider v0.0.4 or later. With these few changes, your MCP server will support both transport methods, making it compatible with both existing and new clients. While most MCP clients have not yet adopted the new Streamable HTTP transport, you can start testing it today using mcp-remote ↗, an adapter that lets MCP clients that otherwise only support local connections work with remote MCP servers.\nIf the MCP server implements the HTTP with SSE transport, instantiate MCPServerSse. Apart from the transport, the API is identical to the Streamable HTTP server. from agents import Agent, Runner from agents.model_settings import ModelSettings from agents.mcp import MCPServerSse workspace_id ...\n\nModel Context Protocol – the specification and design guides. examples/mcp – runnable stdio, SSE, and Streamable HTTP samples.\n\nHosted MCP also supports OpenAI connectors. Instead of specifying a server_url, supply a connector_id and an access token. The Responses API handles authentication and the hosted server exposes the connector's tools. import os HostedMCPTool( tool_config={ \"type\": \"mcp\", \"server_label\": \"google_calendar\", \"connector_id\": \"connector_googlecalendar\", \"authorization\": os.environ[\"GOOGLE_CALENDAR_AUTHORIZATION\"], \"require_approval\": \"never\", } ) Fully working hosted tool samples—including streaming, approvals, and connectors—live in examples/hosted_mcp. When you want to manage the network connection yourself, use MCPServerStreamableHttp. Streamable HTTP servers are ideal when you control the transport or want to run the server inside your own infrastructure while keeping latency low.\n\nIf the MCP server implements the HTTP with SSE transport, instantiate MCPServerSse. Apart from the transport, the API is identical to the Streamable HTTP server. from agents import Agent, Runner from agents.model_settings import ModelSettings from agents.mcp import MCPServerSse workspace_id = \"demo-workspace\" async with MCPServerSse( name=\"SSE Python Server\", params={ \"url\": \"http://localhost:8000/sse\", \"headers\": {\"X-Workspace\": workspace_id}, }, cache_tools_list=True, ) as server: agent = Agent( name=\"Assistant\", mcp_servers=[server], model_settings=ModelSettings(tool_choice=\"required\"), ) result = await Runner.run(agent, \"What's the weather in Tokyo?\") print(result.final_output) For MCP servers that run as local subprocesses, use MCPServerStdio. The SDK spawns the process, keeps the pipes open, and closes them automatically when the context manager exits.\n\nimport asyncio from agents import Agent, HostedMCPTool, Runner async def main() -> None: agent = Agent( name=\"Assistant\", tools=[ HostedMCPTool( tool_config={ \"type\": \"mcp\", \"server_label\": \"gitmcp\", \"server_url\": \"https://gitmcp.io/openai/codex\", \"require_approval\": \"never\", } ) ], ) result = await Runner.run(agent, \"Which language is this repository written in?\") print(result.final_output) asyncio.run(main()) The hosted server exposes its tools automatically; you do not add it to mcp_servers. Hosted tools support streaming results in exactly the same way as function tools.\nAny transport implementation just needs to conform to the Transport interface: ... interface Transport { // Start processing messages start(): Promise&lt;void&gt;; // Send a JSON-RPC message send(message: JSONRPCMessage): Promise&lt;void&gt;; // Close the connection close(): Promise&lt;void&gt;; // Callbacks ...\n\nSpecification (Latest) Architecture · Base Protocol · Messages · Lifecycle · Transports · Versioning · Utilities · Ping · Cancellation · Progress · Server Features · Prompts · Resources · Tools · Utilities · Completion · Logging · Pagination · Client Features · Roots · Sampling · Contributions · Revisions · 2024-11-05 (Current) MCP Protocol Blog · Mastering MCP Tool Development: Unlocking AI Agent Potential · Update on the Next MCP Protocol Release · Chrome DevTools MCP: Giving AI Coding Assistants Eyes to See Beyond Blind Programming · Model Context Protocol (MCP): A New Standard for AI Application and External Data Integration · 一文读懂MCP协议：大模型AI-Agent的USB-C接口 · About · More · Docs ↗ · Specification ↗ · About · Understanding Model Context Protocol (MCP) MCP Learning Path: From Zero to Hero ·\n\nSpecification ↗ · About · English · English · 简体中文 · 繁體中文 · 한국어 · Light · Dark · System · MCP Docs · Core Concepts · Transports · Transports in the Model Context Protocol (MCP) provide the foundation for communication between clients and servers. A transport handles the underlying mechanics of how messages are sent and received. MCP uses JSON-RPC 2.0 as its wire format. The transport layer is responsible for converting MCP protocol messages into JSON-RPC format for transmission and converting received JSON-RPC messages back into MCP protocol messages. There are three types of JSON-RPC messages used: { jsonrpc: \"2.0\", id: number | string, method: string, params?: object } { jsonrpc: \"2.0\", id: number | string, result?: object, error?: { code: number, message: string, data?: unknown } } { jsonrpc: \"2.0\", method: string, params?: object } MCP includes two standard transport implementations: The stdio transport enables communication through standard input and output streams.\n\nTransports in the Model Context Protocol (MCP) provide the foundation for communication between clients and servers. A transport handles the underlying mechanics of how messages are sent and received. MCP uses JSON-RPC 2.0 as its wire format. The transport layer is responsible for converting MCP protocol messages into JSON-RPC format for transmission and converting received JSON-RPC messages back into MCP protocol messages. ... { jsonrpc: \"2.0\", id: number | string, result?: object, error?: { code: number, message: string, data?: unknown } } { jsonrpc: \"2.0\", method: string, params?: object } MCP includes two standard transport implementations: The stdio transport enables communication through standard input and output streams. This is particularly useful for local integrations and command-line tools. ... SSE transport enables server-to-client streaming with HTTP POST requests for client-to-server communication.\n\nasync with sse_client(\"http://localhost:8000/sse\") as streams: async with ClientSession(streams[0], streams[1]) as session: await session.initialize() MCP makes it easy to implement custom transports for specific needs. Any transport implementation just needs to conform to the Transport interface: ... interface Transport { // Start processing messages start(): Promise<void>; // Send a JSON-RPC message send(message: JSONRPCMessage): Promise<void>; // Close the connection close(): Promise<void>; // Callbacks onclose?: () => void; onerror?: (error: Error) => void; onmessage?: (message: JSONRPCMessage) => void; } Note that while MCP Servers are often implemented with asyncio, we recommend implementing low-level interfaces like transports with `anyio` for wider compatibility. ```python @contextmanager async def create_transport( read_stream: MemoryObjectReceiveStream[JSONRPCMessage | Exception], write_stream: MemoryObjectSendStream[JSONRPCMessage] ): \"\"\" Transport interface for MCP.\nOne of the most significant recent changes is the transition from Server-Sent Events (SSE) to Streamable HTTP as the preferred transport mechanism for remote MCP servers. This architectural shift, introduced in the MCP specification update on ...\n\nThe Model Context Protocol (MCP) has been evolving rapidly since its introduction, with each iteration improving how AI agents communicate with external services. One of the most significant recent changes is the transition from Server-Sent Events (SSE) to Streamable HTTP as the preferred transport mechanism for remote MCP servers. This architectural shift, introduced in the MCP specification update on March 26, 2025 (version 2025-03-26), represents a fundamental improvement in how AI agents interact with services. Version Note: The TypeScript SDK version 1.10.0, released on April 17, 2025, was the first to support the new Streamable HTTP transport, which supersedes the SSE transport from protocol version 2024-11-05. When remote MCP was first introduced, it relied on Server-Sent Events (SSE) as its transport layer. This approach required two separate endpoints: An SSE endpoint (/sse) that established a persistent connection for the client to receive responses ·\n\nAn exploration of why the Model Context Protocol is moving from Server-Sent Events (SSE) to Streamable HTTP transport, the benefits of this change, and what developers need to know for future MCP implementations.\n\nSome SSE implementations have compatibility challenges with newer HTTP protocols, limiting the ability to leverage performance improvements in modern web infrastructure. The one-way nature of SSE means that separate channels are needed for client-to-server communication, creating artificial separation between related operations. The current implementation of Streamable HTTP already provides feature parity with the SSE transport, but the MCP specification outlines several additional capabilities that will be implemented soon: Future versions will enable clients to resume operations exactly where they left off if a connection drops during processing. This eliminates the need to keep connections continuously open and makes MCP more resilient for long-running AI agents. Explicit cancellation mechanisms are being implemented to allow clients to cleanly terminate operations, ensuring better resource management and user experience.\n\nFollow the specification closely: The MCP specification is evolving rapidly, so stay up to date with changes · Implement proper error handling: Design your server to gracefully handle connection issues and client errors · Add dual support: Implement both SSE and Streamable HTTP transport options · Plan for migration: Consider how you’ll eventually transition to Streamable HTTP only · Update client libraries: Ensure your client libraries support both transport methods · Add Streamable HTTP support: Update your clients to use the new transport when available · Maintain SSE fallback: Keep SSE support for backward compatibility with existing services · Leverage new capabilities: Design your client to take advantage of the new features as they become available · The transition from SSE to Streamable HTTP represents a significant architectural improvement for the MCP ecosystem. By simplifying the connection model, enabling bidirectional communication, and laying the groundwork for advanced f\nHTTP+SSE (Server-Sent Events): Remote connections, with HTTP for client requests and SS for server responses and streaming. ... JSON-RPC 2.0 as the underlying message standard, providing a standardized structure for requests, responses, and ...\n\nMCP client: Integrated within the host application to handle connections with MCP servers, translating between the host’s requirements and the Model Context Protocol. Clients are built into host applications, like the MCP client inside Claude Desktop. MCP server: Adds context and capabilities, exposing specific functions to AI apps through MCP. Each standalone server typically focuses on a specific integration point, like GitHub for repository access or a PostgreSQL for database operations. Transport layer: The communication mechanism between clients and servers. MCP supports two primary transport methods: STDIO (Standard Input/Output): Mainly local integrations where the server runs in the same environment as the client. HTTP+SSE (Server-Sent Events): Remote connections, with HTTP for client requests and SS for server responses and streaming. ... JSON-RPC 2.0 as the underlying message standard, providing a standardized structure for requests, responses, and notifications.\n\nLearn more about MCP, the open source protocol developed by Anthropic to provide LLMs and AI agents a standardized way to connect with external data sources and tools.\n\nClient ID metadata documents: This proposed change addresses a common MCP scenario in which servers and clients have no pre-existing relationship, mainly due to its reliance on two registration policies: pre-registration, and Dynamic Client Registration (DCR). Both pose significant drawbacks in execution. Client ID metadata documents could reside at specific HTTPS URLs, and OAuth clients could use these URLs as client identifiers. This would enable servers to trust previously unknown clients while retaining total control over authorization policy. While these upcoming additions will further cement MCP’s role in making AI development faster and easier, the protocol has already made a huge impact on the LLM ecosystem. Providing a common format for integrations amounts to more than speeding up the processes we already have. It has created a space where both major enterprises and individual contributors can build equally viable, increasingly valuable options to make everyone’s lives better\n\nFunction calling, which allows LLMs to invoke predetermined functions based on user requests, is a well-established feature of modern AI models. Sometimes referred to as “tool use,” function calling is not mutually exclusive with MCP; the new protocol simply standardizes how this API feature works, adding context for the LLM. This is achieved by streaming tool definitions (including their capabilities, data stores, and possible prompts) to LLMs from the MCP server. Without MCP, when you use a function call directly with an LLM API, you need to: Define model-specific function schemas, which are JSON descriptions of the function, acceptable parameters, and what it returns. Implement handlers (the actual code that executes when a function is called) for those functions. Create different implementations for each model you support. ... Defining a consistent way to specify tools (functions) across any AI system.\nMCP is designed to be secure and flexible. Since MCP servers might have access to sensitive data or perform powerful actions, the protocol emphasizes security controls. Servers can implement access controls, and the AI host often requires user approval before executing a tool. ... STDIO Transport: The MCP server runs as a local process on the same machine as the host, and communication happens through standard input/output pipes. This mode is great for local development – it's simple and secure. SSE (HTTP) Transport: The MCP server runs as a web service (locally or remotely), exposing an HTTP endpoint. This mode is more flexible – your server could be running on a different machine or cloud instance. Both transports do the same job; they just differ in how the bytes get from point A to B. Under the hood, the protocol uses structured messages (often JSON) to encode requests and responses.\n\nThis blog post is about something that I find incredibly powerful and transformative: the Model Context Protocol (MCP). After exploring various AI integration approaches, I've written this post to make MCP easy to understand for everyone. In this post, I'll explain what MCP is and why it matters, walk through how it works, and show you how to use it in your projects. I will show you how to create your own MCP server and examples of using existing ones. Imagine you have a powerful AI assistant that can help with coding, data analysis, or customer support. Now imagine that assistant is locked in a room – it's smart but has no direct access to your databases, files, or tools. If you want it to use some information, you have to manually hand it over. Frustrating, right? This is the situation many LLMs have faced: they're isolated from the vast context and tools that could make them truly useful.\n\nWhile solutions like RAG help with retrieving information and various agent frameworks allow for tool use, there's a deeper problem: every integration requires custom code, special prompting, and bespoke solutions. Each new data source or tool needs its own connector, its own protocol, its own safety checks. This fragmentation creates a maintenance nightmare and makes it extremely difficult to build comprehensive AI systems that can work across multiple data sources and tools in a standardized way. Link to my GitHub repo that contains a code tutorial on MCP: Repo Link · Model Context Protocol (MCP) is an open standard (initially released by Anthropic in late 2024) that defines a universal way for AI models to connect with external data sources, tools, and environments. Here's a simple analogy: MCP is like a USB-C port for AI applications. Just as USB-C provides a standard way to connect various devices (phones, laptops, cameras) to different peripherals (chargers, monitors, storage), M\n\nThe SDKs (in Python, TypeScript, Java, C#, etc.) make this relatively easy. You focus on hooking up to your system, and the protocol details are handled by the library. Host Servers Appropriately: For small projects or local development, running servers on your machine is easiest. For larger setups or team use, you might deploy them on a server or cloud instance. Treat them like microservices. Use MCP-Enabled AI Clients: Your AI model or agent needs to support MCP to take advantage of these servers. Claude Desktop, Cursor IDE, and frameworks like LangChain all offer MCP support. Test and Iterate: As you add MCP to your project, continually test how the AI uses the new capabilities. Sometimes the AI will cleverly utilize a tool to solve a problem; other times it might need a nudge. Model Context Protocol is a game-changer for building AI applications that are truly aware and capable within our software ecosystems.\nThe code uses the requests library to send authenticated HTTP GET requests, fetching both general PR metadata and detailed file-level changes: The first API request retrieves high-level PR information, including its title, description, author details, timestamps, and current state. The second API request fetches details about each file changed in the PR, such as filename, modification status, the number of lines