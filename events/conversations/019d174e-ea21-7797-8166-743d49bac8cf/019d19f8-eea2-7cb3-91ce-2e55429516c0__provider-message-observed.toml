text = "The protocol currently defines two standard transport mechanisms for client-server communication: stdio, communication over standard in and standard out · Streamable HTTP Clients SHOULD support stdio whenever possible.\n\nAccept an MCP server URL from the user, which may point to either a server using the old transport or the new transport. Attempt to POST an InitializeRequest to the server URL, with an Accept header as defined above: If it succeeds, the client can assume this is a server supporting the new Streamable HTTP transport. If it fails with an HTTP 4xx status code (e.g., 405 Method Not Allowed or 404 Not Found): Issue a GET request to the server URL, expecting that this will open an SSE stream and return an endpoint event as the first event. When the endpoint event arrives, the client can assume this is a server running the old HTTP+SSE transport, and should use that transport for all subsequent communication. Clients and servers MAY implement additional custom transport mechanisms to suit their specific needs. The protocol is transport-agnostic and can be implemented over any communication channel that supports bidirectional message exchange.\n\nIf present, the ID MUST be globally unique across all streams within that session—or all streams with that specific client, if session management is not in use. If the client wishes to resume after a broken connection, it SHOULD issue an HTTP GET to the MCP endpoint, and include the Last-Event-ID header to indicate the last event ID it received. The server MAY use this header to replay messages that would have been sent after the last event ID, on the stream that was disconnected, and to resume the stream from that point. The server MUST NOT replay messages that would have been delivered on a different stream. In other words, these event IDs should be assigned by servers on a per-stream basis, to act as a cursor within that particular stream. An MCP “session” consists of logically related interactions between a client and a server, beginning with the initialization phase. To support servers which want to establish stateful sessions: A server using the Streamable HTTP transport MAY assi\n\nProtocol Revision: 2025-06-18 MCP uses JSON-RPC to encode messages. JSON-RPC messages MUST be UTF-8 encoded. The protocol currently defines two standard transport mechanisms for client-server communication: stdio, communication over standard in and standard out · Streamable HTTP Clients SHOULD support stdio whenever possible. It is also possible for clients and servers to implement custom transports in a pluggable fashion. ... The client launches the MCP server as a subprocess. The server reads JSON-RPC messages from its standard input (stdin) and sends messages to its standard output (stdout). Messages are individual JSON-RPC requests, notifications, or responses. Messages are delimited by newlines, and MUST NOT contain embedded newlines. The server MAY write UTF-8 strings to its standard error (stderr) for logging purposes. Clients MAY capture, forward, or ignore this logging.\n\nThe client MUST NOT write anything to the server’s stdin that is not a valid MCP message. This replaces the HTTP+SSE transport from protocol version 2024-11-05. See the backwards compatibility guide below. In the Streamable HTTP transport, the server operates as an independent process that can handle multiple client connections. This transport uses HTTP POST and GET requests. Server can optionally make use of Server-Sent Events (SSE) to stream multiple server messages. This permits basic MCP servers, as well as more feature-rich servers supporting streaming and server-to-client notifications and requests. The server MUST provide a single HTTP endpoint path (hereafter referred to as the MCP endpoint) that supports both POST and GET methods. For example, this could be a URL like https://example.com/mcp. ... Servers MUST validate the Origin header on all incoming connections to prevent DNS rebinding attacks 