hanges (no separate tool needed). Notion documentation: Save the analysis results to Notion for tracking. Before we begin, ensure you have Python 3.10+ installed. Then, we set up our environment and start with installing the uv package manager. For Mac or Linux: curl -LsSf https://astral.sh/uv/install.sh | sh # Mac/Linux ... We can now create and activate a virtual environment. For Mac or Linux: ...\n\nThe code uses the requests library to send authenticated HTTP GET requests, fetching both general PR metadata and detailed file-level changes: The first API request retrieves high-level PR information, including its title, description, author details, timestamps, and current state. The second API request fetches details about each file changed in the PR, such as filename, modification status, the number of lines added or removed, and URLs for accessing file contents. Once the data is retrieved, the function structures and combines the PR metadata with file changes into a dictionary. The file changes are stored in a list, with each entry containing detailed information about a file. The final data structure includes the PR title, description, author, timestamps, state, total count of files changed, and a detailed breakdown of file modifications. Now that we have all the dependencies and extra functions in place, we set up our MCP server.\n\nIt uses the Notion API to create a new page under the specified Notion workspace. ... The run() method starts the MCP server using mcp.run(transport=\"stdio\"), enabling the interaction between Claude Desktop and the PR review tools. Now that we have all the code pieces in place, we run our server with the following terminal command: ... Once the server is up and running, open the Claude Desktop application, and you'll see a plug icon (🔌) in the textbox. This plug indicates the presence of an MCP in the Claude environment. In the same textbox, you'll notice a hammer-like icon (🔨) that displays all the available MCPs, as shown below.