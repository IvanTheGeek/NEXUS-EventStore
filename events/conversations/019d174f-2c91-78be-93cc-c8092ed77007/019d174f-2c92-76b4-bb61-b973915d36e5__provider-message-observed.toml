text = "\nOkay, that's quite an interesting read.\n\nI think it's doing a lot of summer, you know, a lot of information.\n\nConception, transfer, fairly good.\n\nI'm going to make some notes and edits and maybe we can come up with the next version.\n\nI'm going to make a bunch of notes and they follow.\n\nIn the introduction paragraph, I don't need the hi -\n\nAnd something like I'm going to explain my vision of an ecosystem I've named Nexus as kind of the all-encompassing something I don't know.\n\nAnd then the line and how you can get started building with it.\n\nThat is not the intent of this document that I like the last line.\n\nThe idea is that I need to also state that this is something I've been trying to noodle out and try to get documented and figure out a way.\n\nAnd it's all currently still very theoretical and very experimental and has yet to be proven.\n\nBut it's where I'm working towards.\n\n\nAnywhere that we is used should be I as this is a personal system that I am working on that hopefully can be I mean it might be it's it's welcomed to be shared I am  doing it in the open but it's it's for me\n\n\nThe TLDR probably should also highlight that it's continuous and it's as a core as a core tenant.\n\nI mean that's a core feature or ethos or what I'm not sure what the right term here is.\n\n\nThe audience, the way this is written towards the audience is a little too corporate.\n\nI'm interested in conveying it to somebody who's like the talk yard guy who's that's his baby for the last 15 years.\n\nHe's designed it. He's coded it. He's worked on it. He's gotten feedback and you know emails and the forum and is worried about security and things like that.\n\nAnd so it's not a matter of I don't want that. I don't want something like this idea to cause him any defensiveness when he reads it.\nA major component of the entire Nexus idea is the continuous feedback and data collection and data points that continually get processed, whether by human or by AI, with refinement and improvement and better understanding of what's going on.\n\nEvery help question that comes in from an end user, every forum post asking for help or asking a question is just another data point that can then be analyzed and processed and built upon to improve the entire system.\nThe idea that a slice can be individually implemented and deployed is a good concept, but the reality is that I'm going to target one language from the Spec.\n\nAnd it'll take care of everything. The main insight is that from the source Spec, a complete package can be built in F#, but it can also be built in Kotlin or another Go or another language.\nAlso, let's highlight that while AI could be used, and that's probably the way I'll be using it, to do the code generation, it could be done by a human as well.\nThe entire getting started idea is not what I'm going for here.\n\nMaybe do...\n\nThis is how I would approach a project or something and certainly do not include any time boxing like six week plan or week one, week two, something like that.\n\nIt's just progression."

