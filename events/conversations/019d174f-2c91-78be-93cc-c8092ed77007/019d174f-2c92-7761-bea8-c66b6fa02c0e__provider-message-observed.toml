text = "i feel like there is a bit of detail here that needs addresses. \"Commands → Events → Views\" is technically accurate, but not really. There are two types of slices or units. \nUI → Commands → Events\n&\nEvents → Projections→ UI\nthey are independent, and prescribed to be on the time in alternating order of COMMAND slice then PROJECTION slice. also of note is that the events feeding PROJECTIONS would not have to be the previous Command slice events. Any events already in the system and feed a projection. "

