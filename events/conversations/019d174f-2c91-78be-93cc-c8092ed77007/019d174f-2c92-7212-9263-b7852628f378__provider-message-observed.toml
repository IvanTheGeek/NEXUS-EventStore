text = "That quote captures something **very fundamental about software engineering**. A clearer way to phrase it is:\n\n> **“Coding is not the hard part. Knowing *what to code* is the hard part.”**\n\nOr even more precisely:\n\n> **“Programming is easy compared to deciding what the program should do.”**\n\nThis idea shows up repeatedly in software architecture and design discussions.\n\n---\n\n## Why Coding Isn’t Usually the Hard Part\n\nOnce the design is clear, writing the code is often fairly straightforward.\n\nExample:\n\nIf you know you need:\n\n```\nCommand: ConfigureRouter\nEvent: RouterConfigured\nProjection: RouterStatusView\n```\n\nWriting the code is mostly mechanical:\n\n- define a command\n- emit an event\n- update a projection\n- update a UI\n\nA competent developer can implement that relatively quickly.\n\n---\n\n## What’s Actually Hard\n\nThe difficult part is **discovering the correct behavior of the system**.\n\nQuestions like:\n\n- What commands should exist?\n- What events represent real business facts?\n- What information should users see?\n- What rules govern the system?\n\nThese are **design problems**, not coding problems.\n\nExample:\n\nInstead of asking:\n\n```\nHow do I code router configuration?\n```\n\nThe real questions are:\n\n```\nWhat does \"configure router\" mean?\nWhen is it valid?\nWhat information should be captured?\nWhat events represent the truth of what happened?\n```\n\n---\n\n## Why Event Modeling Fits This Insight\n\nThis is exactly why **Event Modeling** focuses on **understanding the system first**.\n\nYou start by discovering:\n\n```\nevents (facts)\ncommands (intent)\nprojections (information needed)\n```\n\nOnly after that do you write code.\n\nSo the flow becomes:\n\n```\nunderstanding → architecture → code\n```\n\nInstead of the typical mistake:\n\n```\ncode → confusion → refactor → more confusion\n```\n\n---\n\n## Another Way to State the Same Idea\n\nMany experienced developers eventually realize:\n\n> **Software development is mostly about modeling reality.**\n\nCoding is just **expressing that model in a programming language**.\n\n---\n\n## A Version That Fits Your NEXUS / ATLAS Thinking\n\nGiven the architecture you've been describing, a very fitting version of your quote might be:\n\n> **“Coding is easy once the event model is correct. The hard part is discovering the right events.”**\n\nOr even shorter:\n\n```\nUnderstanding is the hard part.\nCoding is the translation.\n```\n\n---\n\nIf you'd like, I can also show you **a famous quote from a very well-known computer scientist that expresses almost exactly the same idea** — and it connects surprisingly well to **Event Modeling and the architecture you're designing with ATLAS.**"

