kind = "plain_text"
text = "Here's what was built:\n\n**Three light mode themes** switchable via the toolbar:\n- **Studio** — crisp white, Outfit + JetBrains Mono, sharp blue/green headers\n- **Manuscript** — warm cream, Lora serif + Courier Prime, amber/deep-green headers\n- **Blueprint** — light blue-gray wash, Rajdhani + Share Tech Mono, technical feel with tighter geometry\n\n**Column structure per slice:**\n- Header: type badge (STATE CHANGE / STATE VIEW), slice number, name, description\n- **Screen** section — phone icon placeholder + filename (swap in actual image via `<img>` tag in the snapshot div)\n- **Command** / **View** sections with field lists\n- **Event** sections (command slices) / **Projector** sections (view slices)\n- **Feeding Events** bar on view slices (shows cross-slice event references)\n- **GWT block** — single toggle button for the entire GWT section, purple accent to visually distinguish it\n\n**Interaction:**\n- Each section header is a tap target (38px min-height, touch-action: manipulation)\n- Drag-to-scroll on desktop\n- Projector section defaults collapsed; everything else open\n- GWT defaults open — toggle to hide the whole block\n\nTo add real screen images, replace the `.snapshot` div's contents with a standard `<img src=\"...\">` tag."

