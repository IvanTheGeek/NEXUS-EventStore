ec-cmd-bg:      #EFF6FF;   --sec-cmd-bd:      #93C5FD;\\n  --sec-evt-bg:      #FFFBEB;   --sec-evt-bd:      #FCD34D;\\n  --sec-view-bg:     #ECFDF5;   --sec-view-bd:     #6EE7B7;\\n  --sec-proj-bg:     #F0FDFA;   --sec-proj-bd:     #5EEAD4;\\n  --sec-gwt-bg:      #FAF5FF;   --sec-gwt-bd:      #DDD6FE;\\n\\n  --gwt-accent:      #7C3AED;\\n  --gwt-given:       #4F46E5;\\n  --gwt-when:        #0284C7;\\n  --gwt-then:        #059669;\\n\\n  --radius:          8px;\\n  --col-width:       280px;\\n  --font-body:       \\u0027Outfit\\u0027, sans-serif;\\n  --font-mono:       \\u0027JetBrains Mono\\u0027, monospace;\\n  --shadow:          0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);\\n  --shadow-lg:       0 4px 12px rgba(0,0,0,0.10);\\n}\\n\\n/* \\u2500\\u2500 Theme 2: Manuscript (warm cream, editorial serif) \\u2500\\u2500 */\\n[data-theme=\\u0022manuscript\\u0022] {\\n  --bg:              #F0EAE0;\\n  --surface:         #FAF5EE;\\n  --surface-2:       #EDE4D6;\\n  --border:          #D0C4B0;\\n  --border-strong:   #BAA990;\\n\\n  --text:            #1C1410;\\n  --text-2:          #6B5340;\\n  --text-3:          #9C8268;\\n\\n  --cmd-hdr:         #8B3A0F;\\n  --cmd-hdr-text:    #FFF8F0;\\n  --view-hdr:        #064E3B;\\n  --view-hdr-text:   #F0FFF8;\\n\\n  --sec-screen-bg:   #F5EDE0;   --sec-screen-bd:   #D0C4B0;\\n  --sec-cmd-bg:      #FEF3C7;   --sec-cmd-bd:      #F59E0B;\\n  --sec-evt-bg:      #FFF7ED;   --sec-evt-bd:      #FDBA74;\\n  --sec-view-bg:     #F0FDF4;   --sec-view-bd:     #86EFAC;\\n  --sec-proj-bg:     #ECFDF5;   --sec-proj-bd:     #6EE7B7;\\n  --sec-gwt-bg:      #FDF4FF;   --sec-gwt-bd:      #D8B4FE;\\n\\n  --gwt-accent:      #7E22CE;\\n  --gwt-given:       #4338CA;\\n  --gwt-when:        #0369A1;\\n  --gwt-then:        #15803D;\\n\\n  --radius:          4px;\\n  --col-width:       280px;\\n  --font-body:       \\u0027Lora\\u0027, serif;\\n  --font-mono:       \\u0027Courier Prime\\u0027, monospace;\\n  --shadow:          0 1px 4px rgba(60,30,10,0.12);\\n  --shadow-lg:       0 4px 16px rgba(60,30,10,0.16);\\n}\\n\\n/* \\u2500\\u2500 Theme 3: Blueprint (light blue-gray, technical) \\u2500\\u2500 */\\n[data-theme=\\u0022blueprint\\u0022] {\\n  --bg:              #E8F1FB;\\n  --surface:         #F5FAFF;\\n  --surface-2:       #DAEAF7;\\n  --border:          #B8D3EC;\\n  --border-strong:   #85B3D8;\\n\\n  --text:            #0D2744;\\n  --text-2:          #2A537A;\\n  --text-3:          #6089AC;\\n\\n  --cmd-hdr:         #1440A0;\\n  --cmd-hdr-text:    #EEF5FF;\\n  --view-hdr:        #0C6B80;\\n  --view-hdr-text:   #EAFCFF;\\n\\n  --sec-screen-bg:   #EDF5FF;   --sec-screen-bd:   #B0CEEA;\\n  --sec-cmd-bg:      #EFF6FF;   --sec-cmd-bd:      #7EB8F4;\\n  --sec-evt-bg:      #FEFCE8;   --sec-evt-bd:      #FDE047;\\n  --sec-view-bg:     #ECFEFF;   --sec-view-bd:     #67E8F9;\\n  --sec-proj-bg:     #F0FDFF;   --sec-proj-bd:     #5EEAD4;\\n  --sec-gwt-bg:      #F5F0FF;   --sec-gwt-bd:      #A78BFA;\\n\\n  --gwt-accent:      #5B21B6;\\n  --gwt-given:       #3730A3;\\n  --gwt-when:        #0369A1;\\n  --gwt-then:        #065F46;\\n\\n  --radius:          2px;\\n  --col-width:       280px;\\n  --font-body:       \\u0027Rajdhani\\u0027, sans-serif;\\n  --font-mono:       \\u0027Share Tech Mono\\u0027, monospace;\\n  --shadow:          0 1px 3px rgba(10,40,80,0.10), 0 0 0 1px rgba(20,64,160,0.04);\\n  --shadow-lg:       0 4px 16px rgba(10,40,80,0.15);\\n}\\n\\n/* ================================================================\\n   RESET \\u0026 BASE\\n   ================================================================ */\\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\\n\\nbody {\\n  font-family: var(--font-body);\\n  background: var(--bg);\\n  color: var(--text);\\n  min-height: 100vh;\\n  font-size: 14px;\\n  -webkit-font-smoothing: antialiased;\\n  transition: background 0.25s ease, color 0.25s ease;\\n}\\n\\n/* ================================================================\\n   TOOLBAR\\n   ================================================================ */\\n.toolbar {\\n  position: sticky; top: 0; z-index: 200;\\n  background: var(--surface);\\n  border-bottom: 1px solid var(--border);\\n  padding: 10px 18px;\\n  display: flex; align-items: center; justify-content: space-between; gap: 12px;\\n  box-shadow: var(--shadow);\\n  flex-wrap: wrap;\\n}\\n\\n.toolbar-left {\\n  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;\\n}\\n\\n.system-name {\\n  font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--text);\\n}\\n\\n.system-badge {\\n  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em;\\n  color: var(--text-3); background: var(--surface-2);\\n  border: 1px solid var(--border); padding: 2px 8px;\\n  border-radius: calc(var(--radius) / 2);\\n}\\n\\n.legend {\\n  display: flex; gap: 10px; align-items: center;\\n}\\n.legend-item {\\n  display: flex; align-items: center; gap: 5px;\\n  font-size: 11px; color: var(--text-2);\\n}\\n.legend-dot { width: 9px; height: 9px; border-radius: 2px; }\\n.legend-dot.cmd { background: var(--cmd-hdr); }\\n.legend-dot.view { background: var(--view-hdr); }\\n\\n.theme-switcher {\\n  display: flex; gap: 3px;\\n  background: var(--surface-2); padding: 3px;\\n  border-radius: calc(var(--radius)); border: 1px solid var(--border);\\n}\\n\\n.theme-btn {\\n  font-family: var(--font-body); font-size: 12px; font-weight: 500;\\n  padding: 5px 13px; border: none;\\n  border-radius: calc(var(--radius) - 2px);\\n  background: transparent; color: var(--text-2);\\n  cursor: pointer; touch-action: manipulation;\\n  transition: all 0.15s ease;\\n  min-height: 30px;\\n}\\n.theme-btn.active {\\n  background: var(--surface); color: var(--text); box-shadow: var(--shadow);\\n}\\n.theme-btn:active { transform: scale(0.97); }\\n\\n/* ================================================================\\n   BOARD\\n   ================================================================ */\\n.board-wrapper {\\n  overflow-x: auto; padding: 20px 18px 32px;\\n  -webkit-overflow-scrolling: touch;\\n  cursor: grab;\\n}\\n.board-wrapper:active { cursor: grabbing; }\\n\\n.em-board {\\n  display: flex; gap: 10px; align-items: flex-start; min-width: max-content;\\n}\\n\\n/* ================================================================\\n   SLICE COLUMN\\n   ================================================================ */\\n.slice-col {\\n  width: var(--col-width);\\n  background: var(--surface);\\n  border-radius: var(--radius);\\n  border: 1px solid var(--border);\\n  box-shadow: var(--shadow);\\n  display: flex; flex-direction: column;\\n  overflow: hidden;\\n  transition: box-shadow 0.2s ease;\\n}\\n.slice-col:hover { box-shadow: var(--shadow-lg); }\\n\\n/* \\u2500\\u2500 Column header \\u2500\\u2500 */\\n.col-hdr {\\n  padding: 11px 14px 13px;\\n  display: flex; flex-direction: column; gap: 3px;\\n}\\n.command-slice .col-hdr { background: var(--cmd-hdr); color: var(--cmd-hdr-text); }\\n.view-slice    .col-hdr { background: var(--view-hdr); color: var(--view-hdr-text); }\\n\\n.col-hdr-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }\\n\\n.type-badge {\\n  font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.14em;\\n  font-weight: 500; text-transform: uppercase;\\n  padding: 2px 7px; border-radius: 100px;\\n  background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.88);\\n}\\n\\n.slice-num {\\n  font-family: var(--font-mono); font-size: 9px;\\n  opacity: 0.55;\\n}\\n\\n.col-name { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }\\n.col-desc { font-size: 10px; opacity: 0.72; line-height: 1.45; margin-top: 2px; }\\n\\n/* ================================================================\\n   SECTIONS  (collapsible)\\n   ================================================================ */\\n.section { border-top: 1px solid var(--border); }\\n\\n.sec-hdr {\\n  display: flex; align-items: center; justify-content: space-between;\\n  padding: 0 14px; min-height: 38px;\\n  cursor: pointer; touch-action: manipulation; user-select: none;\\n  transition: opacity 0.1s;\\n}\\n.sec-hdr:active { opacity: 0.75; }\\n\\n.sec-label {\\n  font-family: var(--font-mono); font-size: 8.5px; font-weight: 500;\\n  letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3);\\n}\\n\\n.sec-right { display: flex; align-items: center; gap: 8px; }\\n\\n.sec-construct { font-size: 11px; font-weight: 600; color: var(--text-2); }\\n\\n.chevron {\\n  font-size: 8px; color: var(--text-3);\\n  display: inline-block; transition: transform 0.2s ease; line-height: 1;\\n}\\n.section.closed .chevron { transform: rotate(-90deg); }\\n\\n.sec-body { padding: 0 14px 12px; }\\n.section.closed .sec-body { display: none; }\\n\\n/* Section accent colors */\\n.s-screen .sec-hdr, .s-screen .sec-body { background: var(--sec-screen-bg); }\\n.s-screen { border-left: 3px solid var(--sec-screen-bd); }\\n\\n.s-command .sec-hdr, .s-command .sec-body { background: var(--sec-cmd-bg); }\\n.s-command { border-left: 3px solid var(--sec-cmd-bd); }\\n\\n.s-event .sec-hdr, .s-event .sec-body { background: var(--sec-evt-bg); }\\n.s-event { border-left: 3px solid var(--sec-evt-bd); }\\n\\n.s-view .sec-hdr, .s-view .sec-body { background: var(--sec-view-bg); }\\n.s-view { border-left: 3px solid var(--sec-view-bd); }\\n\\n.s-projector .sec-hdr, .s-projector .sec-body { background: var(--sec-proj-bg); }\\n.s-projector { border-left: 3px solid var(--sec-proj-bd); }\\n\\n/* \\u2500\\u2500 Screen snapshot \\u2500\\u2500 */\\n.snapshot {\\n  border: 1.5px solid var(--border-strong);\\n  border-radius: calc(var(--radius) \\u002B 2px);\\n  background: var(--surface-2);\\n  height: 72px;\\n  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;\\n  margin-bottom: 8px; margin-top: 4px;\\n  overflow: hidden; position: relative;\\n}\\n\\n.snapshot img {\\n  width: 100%; height: 100%; object-fit: cover;\\n}\\n\\n.snapshot-icon { font-size: 18px; opacity: 0.35; }\\n.snapshot-fname { font-family: var(--font-mono); font-size: 8.5px; color: var(--text-3); text-align: center; padding: 0 8px; }\\n.snapshot-noscreen { font-family: var(--font-mono); font-size: 9px; color: var(--text-3); letter-spacing: 0.1em; }\\n\\n.screen-meta { display: flex; align-items: center; justify-content: space-between; }\\n.screen-name { font-size: 11px; font-weight: 600; color: var(--text); }\\n.swimlane { font-family: var(--font-mono); font-size: 8.5px; color: var(--text-3); background: var(--surface-2); border: 1px solid var(--border); padding: 2px 6px; border-radius: 100px; }\\n\\n/* \\u2500\\u2500 Construct \\u002B fields \\u2500\\u2500 */\\n.construct-name { font-size: 12px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; margin-bottom: 6px; padding-top: 2px; }\\n\\n.fields { display: flex; flex-direction: column; gap: 1px; }\\n\\n.field {\\n  display: flex; align-items: center;\\n  font-family: var(--font-mono); font-size: 9.5px; line-height: 1.7;\\n}\\n.f-name { color: var(--text); font-weight: 500; }\\n.f-sep  { color: var(--text-3); margin: 0 3px; }\\n.f-type { color: var(--text-2); }\\n\\n.no-fields { font-family: var(--font-mono); font-size: 9px; color: var(--text-3); font-style: italic; padding-top: 2px; }\\n\\n/* ================================================================\\n   GWT BLOCK  (single-toggle for whole block)\\n   ================================================================ */\\n.gwt-block { border-top: 1.5px solid var(--sec-gwt-bd); }\\n\\n.gwt-bar {\\n  display: flex; align-items: center; justify-content: space-between;\\n  padding: 0 14px; min-height: 40px;\\n  cursor: pointer; touch-action: manipulation; user-select: none;\\n  background: var(--sec-gwt-bg);\\n  transition: opacity 0.1s;\\n}\\n.gwt-bar:active { opacity: 0.75; }\\n\\n.gwt-bar-left { display: flex; align-items: center; gap: 8px; }\\n\\n.gwt-label {\\n  font-family: var(--font-mono); font-size: 8.5px; font-weight: 600;\\n  letter-spacing: 0.14em; text-transform: uppercase; color: var(--gwt-accent);\\n}\\n\\n.gwt-pill {\\n  font-family: var(--font-mono); font-size: 8.5px;\\n  color: var(--gwt-accent); background: rgba(124,58,237,0.08);\\n  border: 1px solid rgba(124,58,237,0.18);\\n  padding: 1px 7px; border-radius: 100px;\\n}\\n\\n.gwt-chevron {\\n  font-size: 8px; color: var(--gwt-accent);\\n  display: inline-block; transition: transform 0.2s ease;\\n}\\n.gwt-block.closed .gwt-chevron { transform: rotate(-90deg); }\\n\\n.gwt-body {\\n  background: var(--sec-gwt-bg);\\n  border-left: 3px solid var(--sec-gwt-bd);\\n  padding: 4px 14px 12px;\\n}\\n.gwt-block.closed .gwt-body { display: none; }\\n\\n.gwt-rule {\\n  background: var(--surface);\\n  border: 1px solid var(--sec-gwt-bd);\\n  border-radius: var(--radius);\\n  padding: 8px 10px 9px;\\n  margin-bottom: 6px;\\n}\\n.gwt-rule:last-child { margin-bottom: 0; }\\n\\n.gwt-rule-name {\\n  font-size: 10.5px; font-weight: 700; color: var(--gwt-accent);\\n  margin-bottom: 6px;\\n}\\n\\n.gwt-rows { display: flex; flex-direction: column; gap: 3px; }\\n\\n.gwt-row {\\n  display: flex; align-items: flex-start; gap: 6px;\\n  font-family: var(--font-mono); font-size: 9.5px; line-height: 1.5;\\n}\\n\\n.kw { font-weight: 700; min-width: 36px; padding-top: 1px; }\\n.kw-given { color: var(--gwt-given); }\\n.kw-when  { color: var(--gwt-when);  }\\n.kw-then  { color: var(--gwt-then);  }\\n.gwt-val  { color: var(--text); flex: 1; word-break: break-word; }\\n\\n.gwt-desc {\\n  font-family: var(--font-body); font-size: 9.5px; color: var(--text-2);\\n  font-style: italic; margin-top: 5px; line-height: 1.45;\\n}\\n\\n/* ================================================================\\n   FEEDING EVENTS  (view slices)\\n   ================================================================ */\\n.feeding {\\n  border-top: 1px solid var(--border);\\n  padding: 9px 14px 10px;\\n  background: var(--surface-2);\\n}\\n\\n.feeding-label {\\n  font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.12em;\\n  text-transform: uppercase; color: var(--text-3); margin-bottom: 6px;\\n}\\n\\n.feeding-tags { display: flex; flex-wrap: wrap; gap: 4px; }\\n\\n.feed-tag {\\n  font-family: var(--font-mono); font-size: 9.5px;\\n  padding: 3px 8px; border-radius: calc(var(--radius) / 2);\\n  background: var(--sec-evt-bg); border: 1px solid var(--sec-evt-bd);\\n  color: var(--text-2);\\n}\\n.feed-tag .tag-ref { color: var(--text-3); font-size: 8.5px; }\\n\\n/* ================================================================\\n   DRAG TO SCROLL\\n   ================================================================ */\\n@media (pointer: fine) {\\n  .board-wrapper { cursor: grab; }\\n  .board-wrapper.dragging { cursor: grabbing; user-select: none; }\\n}\\n\\n/* ================================================================\\n   RESPONSIVE\\n   ================================================================ */\\n@media (max-width: 600px) {\\n  .legend { display: none; }\\n  .toolbar { padding: 8px 12px; }\\n  .board-wrapper { padding: 12px 10px 24px; }\\n}\\n\\u003C/style\\u003E\\n\\u003C/head\\u003E\\n\\n\\u003Cbody data-theme=\\u0022studio\\u0022\\u003E\\n\\n\\u003C!-- ===== TOOLBAR ===== --\\u003E\\n\\u003Cheader class=\\u0022toolbar\\u0022\\u003E\\n  \\u003Cdiv class=\\u0022toolbar-left\\u0022\\u003E\\n    \\u003Cspan class=\\u0022system-name\\u0022\\u003ELaundryLog\\u003C/span\\u003E\\n    \\u003Cspan class=\\u0022system-badge\\u0022\\u003EEVENT MODEL\\u003C/span\\u003E\\n    \\u003Cdiv class=\\u0022legend\\u0022\\u003E\\n      \\u003Cdiv class=\\u0022legend-item\\u0022\\u003E\\u003Cdiv class=\\u0022legend-dot cmd\\u0022\\u003E\\u003C/div\\u003EState Change\\u003C/div\\u003E\\n      \\u003Cdiv class=\\u0022legend-item\\u0022\\u003E\\u003Cdiv class=\\u0022legend-dot view\\u0022\\u003E\\u003C/div\\u003EState View\\u003C/div\\u003E\\n    \\u003C/div\\u003E\\n  \\u003C/div\\u003E\\n  \\u003Cdiv class=\\u0022theme-switcher\\u0022\\u003E\\n    \\u003Cbutton class=\\u0022theme-btn active\\u0022 data-theme=\\u0022studio\\u0022\\u003EStudio\\u003C/button\\u003E\\n    \\u003Cbutton class=\\u0022theme-btn\\u0022 data-theme=\\u0022manuscript\\u0022\\u003EManuscript\\u003C/button\\u003E\\n    \\u003Cbutton class=\\u0022theme-btn\\u0022 data-theme=\\u0022blueprint\\u0022\\u003EBlueprint\\u003C/button\\u003E\\n  \\u003C/div\\u003E\\n\\u003C/header\\u003E\\n\\n\\u003C!-- ===== BOARD ===== --\\u003E\\n\\u003Cdiv class=\\u0022board-wrapper\\u0022 id=\\u0022boardWrapper\\u0022\\u003E\\n  \\u003Cdiv class=\\u0022em-board\\u0022 id=\\u0022board\\u0022\\u003E\\u003C/div\\u003E\\n\\u003C/div\\u003E\\n\\n\\u003Cscript\\u003E\\n/* \\u2500\\u2500 Slice data (from TOML files) \\u2500\\u2500 */\\nconst SLICES = [\\n  {\\n    id: \\u0022019644a1-b1a0-7000-8000-000000000100\\u0022,\\n    type: \\u0022CommandSlice\\u0022, name: \\u0022OpenApp\\u0022, num: 1,\\n    desc: \\u0022Truck driver opens the LaundryLog app\\u0022,\\n    origins: [{ name: \\u0022Splash Screen\\u0022, swimlane: \\u0022TruckDriver\\u0022, snapshot: \\u0022app-splash-screen.png\\u0022 }],\\n    command: { name: \\u0022OpenApp\\u0022, fields: [] },\\n    events: [{ name: \\u0022AppOpened\\u0022, fields: [{ name: \\u0022openedAt\\u0022, type: \\u0022datetime\\u0022 }] }],\\n    gwt: [{ name: \\u0022OpenApp\\u0022, given: \\u0022Unit\\u0022, when: \\u0022OpenApp\\u0022, then: \\u0022AppOpened\\u0022,\\n            desc: \\u0022No prior state needed. App opened.\\u0022 }]\\n  },\\n  {\\n    id: \\u0022019644a1-b1a0-7000-8000-000000000300\\u0022,\\n    type: \\u0022CommandSlice\\u0022, name: \\u0022SetLocation\\u0022, num: 2,\\n    desc: \\u0022Truck driver provides the laundromat location\\u0022,\\n    origins: [{ name: \\u0022Get Location Screen\\u0022, swimlane: \\u0022TruckDriver\\u0022, snapshot: \\u0022get-location-screen.png\\u0022 }],\\n    command: { name: \\u0022SetLocation\\u0022, fields: [{ name: \\u0022location\\u0022, type: \\u0022string\\u0022 }] },\\n    events: [{ name: \\u0022LocationSet\\u0022, fields: [{ name: \\u0022location\\u0022, type: \\u0022string\\u0022 }] }],\\n    gwt: [{ name: \\u0022SetLocation\\u0022, given: [\\u0022AppOpened\\u0022], when: \\u0022SetLocation\\u0022, then: \\u0022LocationSet\\u0022,\\n            desc: \\u0022App has been opened, driver provides location.\\u0022 }]\\n  },\\n  {\\n    id: \\u0022019644a1-b1a0-7000-8000-000000000400\\u0022,\\n    type: \\u0022ViewSlice\\u0022, name: \\u0022CurrentLocation\\u0022, num: 3,\\n    desc: \\u0022Provides the current laundromat location for expense entry\\u0022,\\n    origins: [{ name: \\u0022NoScreen\\u0022, swimlane: \\u0022None\\u0022 }],\\n    projector: { name: \\u0022CurrentLocationProjector\\u0022 },\\n    view: { name: \\u0022CurrentLocation\\u0022, fields: [{ name: \\u0022location\\u0022, type: \\u0022string\\u0022 }] },\\n    feedingEvents: [{ name: \\u0022LocationSet\\u0022, sliceName: \\u0022SetLocation\\u0022, sliceNum: 2 }],\\n    gwt: [{ name: \\u0022LocationAvailable\\u0022, given: [\\u0022LocationSet\\u0022], then: \\u0022CurrentLocation\\u0022,\\n            desc: \\u0022Location has been set, provide it for expense entry.\\u0022 }]\\n  },\\n  {\\n    id: \\u0022019644a1-b1a0-7000-8000-000000000500\\u0022,\\n    type: \\u0022CommandSlice\\u0022, name: \\u0022LogExpense\\u0022, num: 4,\\n    desc: \\u0022Truck driver logs a laundry expense\\u0022,\\n    origins: [{ name: \\u0022Expense Entry Screen\\u0022, swimlane: \\u0022TruckDriver\\u0022, snapshot: \\u0022expense-entry-screen.png\\u0022 }],\\n    command: {\\n      name: \\u0022LogExpense\\u0022,\\n      fields: [\\n        { name: \\u0022machineType\\u0022, type: \\u0022string\\u0022 }, { name: \\u0022quantity\\u0022, type: \\u0022int\\u0022 },\\n        { name: \\u0022pricePerMachine\\u0022, type: \\u0022decimal\\u0022 }, { name: \\u0022paymentMethod\\u0022, type: \\u0022string\\u0022 },\\n        { name: \\u0022location\\u0022, type: \\u0022string\\u0022 }\\n      ]\\n    },\\n    events: [{\\n      name: \\u0022LaundryExpenseLogged\\u0022,\\n      fields: [\\n        { name: \\u0022expenseId\\u0022, type: \\u0022guid\\u0022 }, { name: \\u0022machineType\\u0022, type: \\u0022string\\u0022 },\\n        { name: \\u0022quantity\\u0022, type: \\u0022int\\u0022 }, { name: \\u0022pricePerMachine\\u0022, type: \\u0022decimal\\u0022 },\\n        { name: \\u0022totalCost\\u0022, type: \\u0022decimal\\u0022 }, { name: \\u0022paymentMethod\\u0022, type: \\u0022string\\u0022 },\\n        { name: \\u0022location\\u0022, type: \\u0022string\\u0022 }, { name: \\u0022loggedAt\\u0022, type: \\u0022datetime\\u0022 }\\n      ]\\n    }],\\n    gwt: [{ name: \\u0022LogNewExpense\\u0022, given: [\\u0022LocationSet\\u0022], when: \\u0022LogExpense\\u0022,\\n            then: \\u0022LaundryExpenseLogged\\u0022,\\n            desc: \\u0022Location must be established. Driver logs expense details.\\u0022 }]\\n  },\\n  {\\n    id: \\u0022019644a1-b1a0-7000-8000-000000000600\\u0022,\\n    type: \\u0022ViewSlice\\u0022, name: \\u0022RecentExpenses\\u0022, num: 5,\\n    desc: \\u0022Shows recently logged laundry expenses\\u0022,\\n    origins: [{ name: \\u0022NoScreen\\u0022, swimlane: \\u0022None\\u0022 }],\\n    projector: { name: \\u0022RecentExpensesProjector\\u0022 },\\n    view: {\\n      name: \\u0022RecentExpenses\\u0022,\\n      fields: [\\n        { name: \\u0022expenses\\u0022, type: \\u0022list\\u0022 }, { name: \\u0022totalSpent\\u0022, type: \\u0022decimal\\u0022 },\\n        { name: \\u0022expenseCount\\u0022, type: \\u0022int\\u0022 }, { name: \\u0022location\\u0022, type: \\u0022string\\u0022 }\\n      ]\\n    },\\n    feedingEvents: [{ name: \\u0022LaundryExpenseLogged\\u0022, sliceName: \\u0022LogExpense\\u0022, sliceNum: 4 }],\\n    gwt: [{ name: \\u0022RecentExpensesWithinWindow\\u0022, given: [\\u0022LaundryExpenseLogged\\u0022],\\n            when: \\u0022loggedAt within 3 hours\\u0022, then: \\u0022RecentExpenses\\u0022,\\n            desc: \\u0022Shows all expenses logged within the last 3 hours.\\u0022 }]\\n  }\\n];\\n\\n/* \\u2500\\u2500 Helpers \\u2500\\u2500 */\\nconst esc = s =\\u003E String(s).replace(/\\u0026/g,\\u0027\\u0026amp;\\u0027).replace(/\\u003C/g,\\u0027\\u0026lt;\\u0027).replace(/\\u003E/g,\\u0027\\u0026gt;\\u0027);\\n\\nfunction fields(list) {\\n  if (!list || !list.length) return \\u0060\\u003Cdiv class=\\u0022no-fields\\u0022\\u003E\\u2014 no fields \\u2014\\u003C/div\\u003E\\u0060;\\n  return \\u0060\\u003Cdiv class=\\u0022fields\\u0022\\u003E${list.map(f =\\u003E\\n    \\u0060\\u003Cdiv class=\\u0022field\\u0022\\u003E\\n       \\u003Cspan class=\\u0022f-name\\u0022\\u003E${esc(f.name)}\\u003C/span\\u003E\\n       \\u003Cspan class=\\u0022f-sep\\u0022\\u003E:\\u003C/span\\u003E\\n       \\u003Cspan class=\\u0022f-type\\u0022\\u003E${esc(f.type)}\\u003C/span\\u003E\\n     \\u003C/div\\u003E\\u0060).join(\\u0027\\u0027)}\\u003C/div\\u003E\\u0060;\\n}\\n\\nfunction given(v) {\\n  return Array.isArray(v) ? esc(v.join(\\u0027, \\u0027)) : esc(v);\\n}\\n\\nfunction gwtRules(rules) {\\n  return rules.map(r =\\u003E \\u0060\\n    \\u003Cdiv class=\\u0022gwt-rule\\u0022\\u003E\\n      \\u003Cdiv class=\\u0022gwt-rule-name\\u0022\\u003E${esc(r.name)}\\u003C/div\\u003E\\n      \\u003Cdiv class=\\u0022gwt-rows\\u0022\\u003E\\n        \\u003Cdiv class=\\u0022gwt-row\\u0022\\u003E\\u003Cspan class=\\u0022kw kw-given\\u0022\\u003EGiven\\u003C/span\\u003E\\u003Cspan class=\\u0022gwt-val\\u0022\\u003E${given(r.given)}\\u003C/span\\u003E\\u003C/div\\u003E\\n        ${r.when ? \\u0060\\u003Cdiv class=\\u0022gwt-row\\u0022\\u003E\\u003Cspan class=\\u0022kw kw-when\\u0022\\u003EWhen\\u003C/span\\u003E\\u003Cspan class=\\u0022gwt-val\\u0022\\u003E${esc(r.when)}\\u003C/span\\u003E\\u003C/div\\u003E\\u0060 : \\u0027\\u0027}\\n        \\u003Cdiv class=\\u0022gwt-row\\u0022\\u003E\\u003Cspan class=\\u0022kw kw-then\\u0022\\u003EThen\\u003C/span\\u003E\\u003Cspan class=\\u0022gwt-val\\u0022\\u003E${esc(r.then)}\\u003C/span\\u003E\\u003C/div\\u003E\\n      \\u003C/div\\u003E\\n      ${r.desc ? \\u0060\\u003Cdiv class=\\u0022gwt-desc\\u0022\\u003E${esc(r.desc)}\\u003C/div\\u003E\\u0060 : \\u0027\\u0027}\\n    \\u003C/div\\u003E\\u0060).join(\\u0027\\u0027);\\n}\\n\\nfunction snapshot(origin) {\\n  if (!origin.snapshot) return \\u0060\\u003Cdiv class=\\u0022snapshot\\u0022\\u003E\\u003Cspan class=\\u0022snapshot-noscreen\\u0022\\u003ENO SCREEN\\u003C/span\\u003E\\u003C/div\\u003E\\u0060;\\n  return \\u0060\\u003Cdiv class=\\u0022snapshot\\u0022\\u003E\\n    \\u003Cspan class=\\u0022snapshot-icon\\u0022\\u003E\\uD83D\\uDCF1\\u003C/span\\u003E\\n    \\u003Cspan class=\\u0022snapshot-fname\\u0022\\u003E${esc(origin.snapshot)}\\u003C/span\\u003E\\n  \\u003C/div\\u003E\\u0060;\\n}\\n\\nfunction section(cls, label, construct, bodyHtml, startOpen = true) {\\n  return \\u0060\\n    \\u003Cdiv class=\\u0022section ${cls}${startOpen ? \\u0027\\u0027 : \\u0027 closed\\u0027}\\u0022\\u003E\\n      \\u003Cdiv class=\\u0022sec-hdr\\u0022 onclick=\\u0022toggleSec(this)\\u0022\\u003E\\n        \\u003Cspan class=\\u0022sec-label\\u0022\\u003E${label}\\u003C/span\\u003E\\n        \\u003Cdiv class=\\u0022sec-right\\u0022\\u003E\\n          \\u003Cspan class=\\u0022sec-construct\\u0022\\u003E${esc(construct)}\\u003C/span\\u003E\\n          \\u003Cspan class=\\u0022chevron\\u0022\\u003E\\u25BC\\u003C/span\\u003E\\n        \\u003C/div\\u003E\\n      \\u003C/div\\u003E\\n      \\u003Cdiv class=\\u0022sec-body\\u0022\\u003E${bodyHtml}\\u003C/div\\u003E\\n    \\u003C/div\\u003E\\u0060;\\n}\\n\\n/* \\u2500\\u2500 Column renderer \\u2500\\u2500 */\\nfunction renderCol(s) {\\n  const isCmd = s.type === \\u0027CommandSlice\\u0027;\\n  const typeClass = isCmd ? \\u0027command-slice\\u0027 : \\u0027view-slice\\u0027;\\n  const typeLabel = isCmd ? \\u0027STATE CHANGE\\u0027 : \\u0027STATE VIEW\\u0027;\\n  const origin = s.origins[0];\\n\\n  // Screen\\n  const screenBody = \\u0060\\n    ${snapshot(origin)}\\n    \\u003Cdiv class=\\u0022screen-meta\\u0022\\u003E\\n      \\u003Cspan class=\\u0022screen-name\\u0022\\u003E${esc(origin.name)}\\u003C/span\\u003E\\n      ${origin.swimlane \\u0026\\u0026 origin.swimlane !== \\u0027None\\u0027\\n        ? \\u0060\\u003Cspan class=\\u0022swimlane\\u0022\\u003E${esc(origin.swimlane)}\\u003C/span\\u003E\\u0060 : \\u0027\\u0027}\\n    \\u003C/div\\u003E\\u0060;\\n\\n  const screenSec = section(\\u0027s-screen\\u0027, \\u0027Screen\\u0027, origin.name, screenBody, true);\\n\\n  // Command / View sections\\n  let midSections = \\u0027\\u0027;\\n  if (isCmd) {\\n    const cmdBody = \\u0060\\u003Cdiv class=\\u0022construct-name\\u0022\\u003E${esc(s.command.name)}\\u003C/div\\u003E${fields(s.command.fields)}\\u0060;\\n    midSections \\u002B= section(\\u0027s-command\\u0027, \\u0027Command\\u0027, s.command.name, cmdBody, true);\\n    s.events.forEach(evt =\\u003E {\\n      const evtBody = \\u0060\\u003Cdiv class=\\u0022construct-name\\u0022\\u003E${esc(evt.name)}\\u003C/div\\u003E${fields(evt.fields)}\\u0060;\\n      midSections \\u002B= section(\\u0027s-event\\u0027, \\u0027Event\\u0027, evt.name, evtBody, true);\\n    });\\n  } else {\\n    const projBody = \\u0060\\u003Cdiv class=\\u0022construct-name\\u0022\\u003E${esc(s.projector.name)}\\u003C/div\\u003E\\u0060;\\n    midSections \\u002B= section(\\u0027s-projector\\u0027, \\u0027Projector\\u0027, s.projector.name, projBody, false);\\n    const viewBody = \\u0060\\u003Cdiv class=\\u0022construct-name\\u0022\\u003E${esc(s.view.name)}\\u003C/div\\u003E${fields(s.view.fields)}\\u0060;\\n    midSections \\u002B= section(\\u0027s-view\\u0027, \\u0027View\\u0027, s.view.name, viewBody, true);\\n  }\\n\\n  // Feeding events\\n  const feedHtml = (!isCmd \\u0026\\u0026 s.feedingEvents \\u0026\\u0026 s.feedingEvents.length)\\n    ? \\u0060\\u003Cdiv class=\\u0022feeding\\u0022\\u003E\\n         \\u003Cdiv class=\\u0022feeding-label\\u0022\\u003EEvents Feeding This View\\u003C/div\\u003E\\n         \\u003Cdiv class=\\u0022feeding-tags\\u0022\\u003E${s.feedingEvents.map(fe =\\u003E\\n           \\u0060\\u003Cdiv class=\\u0022feed-tag\\u0022\\u003E${esc(fe.name)} \\u003Cspan class=\\u0022tag-ref\\u0022\\u003E(Slice ${fe.sliceNum})\\u003C/span\\u003E\\u003C/div\\u003E\\u0060\\n         ).join(\\u0027\\u0027)}\\u003C/div\\u003E\\n       \\u003C/div\\u003E\\u0060 : \\u0027\\u0027;\\n\\n  // GWT block\\n  const gwtHtml = \\u0060\\n    \\u003Cdiv class=\\u0022gwt-block\\u0022\\u003E\\n      \\u003Cdiv class=\\u0022gwt-bar\\u0022 onclick=\\u0022toggleGWT(this)\\u0022\\u003E\\n        \\u003Cdiv class=\\u0022gwt-bar-left\\u0022\\u003E\\n          \\u003Cspan class=\\u0022gwt-label\\u0022\\u003EGWT Rules\\u003C/span\\u003E\\n          \\u003Cspan class=\\u0022gwt-pill\\u0022\\u003E${s.gwt.length} rule${s.gwt.length !== 1 ? \\u0027s\\u0027 : \\u0027\\u0027}\\u003C/span\\u003E\\n        \\u003C/div\\u003E\\n        \\u003Cspan class=\\u0022gwt-chevron\\u0022\\u003E\\u25BC\\u003C/span\\u003E\\n      \\u003C/div\\u003E\\n      \\u003Cdiv class=\\u0022gwt-body\\u0022\\u003E${gwtRules(s.gwt)}\\u003C/div\\u003E\\n    \\u003C/div\\u003E\\u0060;\\n\\n  return \\u0060\\n    \\u003Cdiv class=\\u0022slice-col ${typeClass}\\u0022\\u003E\\n      \\u003Cdiv class=\\u0022col-hdr\\u0022\\u003E\\n        \\u003Cdiv class=\\u0022col-hdr-top\\u0022\\u003E\\n          \\u003Cspan class=\\u0022type-badge\\u0022\\u003E${typeLabel}\\u003C/span\\u003E\\n          \\u003Cspan class=\\u0022slice-num\\u0022\\u003ESlice ${s.num}\\u003C/span\\u003E\\n        \\u003C/div\\u003E\\n        \\u003Cdiv class=\\u0022col-name\\u0022\\u003E${esc(s.name)}\\u003C/div\\u003E\\n        \\u003Cdiv class=\\u0022col-desc\\u0022\\u003E${esc(s.desc)}\\u003C/div\\u003E\\n      \\u003C/div\\u003E\\n      ${screenSec}\\n      ${midSections}\\n      ${feedHtml}\\n      ${gwtHtml}\\n    \\u003C/div\\u003E\\u0060;\\n}\\n\\n/* \\u2500\\u2500 Render \\u2500\\u2500 */\\ndocument.getElementById(\\u0027board\\u0027).innerHTML = SLICES.map(renderCol).join(\\u0027\\u0027);\\n\\n/* \\u2500\\u2500 Toggle section \\u2500\\u2500 */\\nfunction toggleSec(hdr) {\\n  hdr.closest(\\u0027.section\\u0027).classList.toggle(\\u0027closed\\u0027);\\n}\\n\\n/* \\u2500\\u2500 Toggle GWT block \\u2500\\u2500 */\\nfunction toggleGWT(bar) {\\n  bar.closest(\\u0027.gwt-block\\u0027).classList.toggle(\\u0027closed\\u0027);\\n}\\n\\n/* \\u2500\\u2500 Theme switching \\u2500\\u2500 */\\ndocument.querySelectorAll(\\u0027.theme-btn\\u0027).forEach(btn =\\u003E {\\n  btn.addEventListener(\\u0027click\\u0027, () =\\u003E {\\n    document.body.dataset.theme = btn.dataset.theme;\\n    document.querySelectorAll(\\u0027.theme-btn\\u0027).forEach(b =\\u003E b.classList.remove(\\u0027active\\u0027));\\n    btn.classList.add(\\u0027active\\u0027);\\n  });\\n});\\n\\n/* \\u2500\\u2500 Drag to scroll \\u2500\\u2500 */\\nconst wrapper = document.getElementById(\\u0027boardWrapper\\u0027);\\nlet isDown = false, startX, scrollLeft;\\nwrapper.addEventListener(\\u0027mousedown\\u0027, e =\\u003E {\\n  isDown = true; wrapper.classList.add(\\u0027dragging\\u0027);\\n  startX = e.pageX - wrapper.offsetLeft; scrollLeft = wrapper.scrollLeft;\\n});\\nwrapper.addEventListener(\\u0027mouseleave\\u0027, () =\\u003E { isDown = false; wrapper.classList.remove(\\u0027dragging\\u0027); });\\nwrapper.addEventListener(\\u0027mouseup\\u0027,    () =\\u003E { isDown = false; wrapper.classList.remove(\\u0027dragging\\u0027); });\\nwrapper.addEventListener(\\u0027mousemove\\u0027,  e =\\u003E {\\n  if (!isDown) return; e.preventDefault();\\n  wrapper.scrollLeft = scrollLeft - (e.pageX - wrapper.offsetLeft - startX);\\n});\\n\\u003C/script\\u003E\\n\\u003C/body\\u003E\\n\\u003C/html\\u003E\\n\"},\"message\":\"Creating the EM diagram template HTML file\",\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":\"file\",\"context\":null,\"display_content\":{\"type\":\"json_block\",\"json_block\":\"{\\u0022language\\u0022: \\u0022html\\u0022, \\u0022code\\u0022: \\u0022\\u003C!DOCTYPE html\\u003E\\\\n\\u003Chtml lang=\\\\\\u0022en\\\\\\u0022\\u003E\\\\n\\u003Chead\\u003E\\\\n\\u003Cmeta charset=\\\\\\u0022UTF-8\\\\\\u0022\\u003E\\\\n\\u003Cmeta name=\\\\\\u0022viewport\\\\\\u0022 content=\\\\\\u0022width=device-width, initial-scale=1.0, maximum-scale=1.0\\\\\\u0022\\u003E\\\\n\\u003Ctitle\\u003ELaundryLog \\\\u2014 Event Model\\u003C/title\\u003E\\\\n\\u003Clink rel=\\\\\\u0022preconnect\\\\\\u0022 href=\\\\\\u0022https://fonts.googleapis.com\\\\\\u0022\\u003E\\\\n\\u003Clink href=\\\\\\u0022https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700\\u0026family=JetBrains\\u002BMono:wght@400;500\\u0026family=Lora:ital,wght@0,500;0,600;1,400\\u0026family=Courier\\u002BPrime:ital@0;1\\u0026family=Rajdhani:wght@400;500;600;700\\u0026family=Share\\u002BTech\\u002BMono\\u0026display=swap\\\\\\u0022 rel=\\\\\\u0022stylesheet\\\\\\u0022\\u003E\\\\n\\u003Cstyle\\u003E\\\\n/* ================================================================\\\\n   THEME DEFINITIONS \\\\u2014 CSS custom properties per theme\\\\n   ================================================================ */\\\\n\\\\n/* \\\\u2500\\\\u2500 Theme 1: Studio (clean white, precision layout) \\\\u2500\\\\u2500 */\\\\n:root, [data-theme=\\\\\\u0022studio\\\\\\u0022] {\\\\n  --bg:              #F7F8FA;\\\\n  --surface:         #FFFFFF;\\\\n  --surface-2:       #F3F4F6;\\\\n  --border:          #E5E7EB;\\\\n  --border-strong:   #C9CDD6;\\\\n\\\\n  --text:            #111827;\\\\n  --text-2:          #6B7280;\\\\n  --text-3:          #9CA3AF;\\\\n\\\\n  --cmd-hdr:         #1D4ED8;\\\\n  --cmd-hdr-text:    #FFFFFF;\\\\n  --view-hdr:        #065F46;\\\\n  --view-hdr-text:   #FFFFFF;\\\\n\\\\n  --sec-screen-bg:   #F9FAFB;   --sec-screen-bd:   #E5E7EB;\\\\n  --sec-cmd-bg:      #EFF6FF;   --sec-cmd-bd:      #93C5FD;\\\\n  --sec-evt-bg:      #FFFBEB;   --sec-evt-bd:      #FCD34D;\\\\n  --sec-view-bg:     #ECFDF5;   --sec-view-bd:     #6EE7B7;\\\\n  --sec-proj-bg:     #F0FDFA;   --sec-proj-bd:     #5EEAD4;\\\\n  --sec-gwt-bg:      #FAF5FF;   --sec-gwt-bd:      #DDD6FE;\\\\n\\\\n  --gwt-accent:      #7C3AED;\\\\n  --gwt-given:       #4F46E5;\\\\n  --gwt-when:        #0284C7;\\\\n  --gwt-then:        #059669;\\\\n\\\\n  --radius:          8px;\\\\n  --col-width:       280px;\\\\n  --font-body:       \\u0027Outfit\\u0027, sans-serif;\\\\n  --font-mono:       \\u0027JetBrains Mono\\u0027, monospace;\\\\n  --shadow:          0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);\\\\n  --shadow-lg:       0 4px 12px rgba(0,0,0,0.10);\\\\n}\\\\n\\\\n/* \\\\u2500\\\\u2500 Theme 2: Manuscript (warm cream, editorial serif) \\\\u2500\\\\u2500 */\\\\n[data-theme=\\\\\\u0022manuscript\\\\\\u0022] {\\\\n  --bg:              #F0EAE0;\\\\n  --surface:         #FAF5EE;\\\\n  --surface-2:       #EDE4D6;\\\\n  --border:          #D0C4B0;\\\\n  --border-strong:   #BAA990;\\\\n\\\\n  --text:            #1C1410;\\\\n  --text-2:          #6B5340;\\\\n  --text-3:          #9C8268;\\\\n\\\\n  --cmd-hdr:         #8B3A0F;\\\\n  --cmd-hdr-text:    #FFF8F0;\\\\n  --view-hdr:        #064E3B;\\\\n  --view-hdr-text:   #F0FFF8;\\\\n\\\\n  --sec-screen-bg:   #F5EDE0;   --sec-screen-bd:   #D0C4B0;\\\\n  --sec-cmd-bg:      #FEF3C7;   --sec-cmd-bd:      #F59E0B;\\\\n  --sec-evt-bg:      #FFF7ED;   --sec-evt-bd:      #FDBA74;\\\\n  --sec-view-bg:     #F0FDF4;   --sec-view-bd:     #86EFAC;\\\\n  --sec-proj-bg:     #ECFDF5;   --sec-proj-bd:     #6EE7B7;\\\\n  --sec-gwt-bg:      #FDF4FF;   --sec-gwt-bd:      #D8B4FE;\\\\n\\\\n  --gwt-accent:      #7E22CE;\\\\n  --gwt-given:       #4338CA;\\\\n  --gwt-when:        #0369A1;\\\\n  --gwt-then:        #15803D;\\\\n\\\\n  --radius:          4px;\\\\n  --col-width:       280px;\\\\n  --font-body:       \\u0027Lora\\u0027, serif;\\\\n  --font-mono:       \\u0027Courier Prime\\u0027, monospace;\\\\n  --shadow:          0 1px 4px rgba(60,30,10,0.12);\\\\n  --shadow-lg:       0 4px 16px rgba(60,30,10,0.16);\\\\n}\\\\n\\\\n/* \\\\u2500\\\\u2500 Theme 3: Blueprint (light blue-gray, technical) \\\\u2500\\\\u2500 */\\\\n[data-theme=\\\\\\u0022blueprint\\\\\\u0022] {\\\\n  --bg:              #E8F1FB;\\\\n  --surface:         #F5FAFF;\\\\n  --surface-2:       #DAEAF7;\\\\n  --border:          #B8D3EC;\\\\n  --border-strong:   #85B3D8;\\\\n\\\\n  --text:            #0D2744;\\\\n  --text-2:          #2A537A;\\\\n  --text-3:          #6089AC;\\\\n\\\\n  --cmd-hdr:         #1440A0;\\\\n  --cmd-hdr-text:    #EEF5FF;\\\\n  --view-hdr:        #0C6B80;\\\\n  --view-hdr-text:   #EAFCFF;\\\\n\\\\n  --sec-screen-bg:   #EDF5FF;   --sec-screen-bd:   #B0CEEA;\\\\n  --sec-cmd-bg:      #EFF6FF;   --sec-cmd-bd:      #7EB8F4;\\\\n  --sec-evt-bg:      #FEFCE8;   --sec-evt-bd:      #FDE047;\\\\n  --sec-view-bg:     #ECFEFF;   --sec-view-bd:     #67E8F9;\\\\n  --sec-proj-bg:     #F0FDFF;   --sec-proj-bd:     #5EEAD4;\\\\n  --sec-gwt-bg:      #F5F0FF;   --sec-gwt-bd:      #A78BFA;\\\\n\\\\n  --gwt-accent:      #5B21B6;\\\\n  --gwt-given:       #3730A3;\\\\n  --gwt-when:        #0369A1;\\\\n  --gwt-then:        #065F46;\\\\n\\\\n  --radius:          2px;\\\\n  --col-width:       280px;\\\\n  --font-body:       \\u0027Rajdhani\\u0027, sans-serif;\\\\n  --font-mono:       \\u0027Share Tech Mono\\u0027, monospace;\\\\n  --shadow:          0 1px 3px rgba(10,40,80,0.10), 0 0 0 1px rgba(20,64,160,0.04);\\\\n  --shadow-lg:       0 4px 16px rgba(10,40,80,0.15);\\\\n}\\\\n\\\\n/* ================================================================\\\\n   RESET \\u0026 BASE\\\\n   ================================================================ */\\\\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\\\\n\\\\nbody {\\\\n  font-family: var(--font-body);\\\\n  background: var(--bg);\\\\n  color: var(--text);\\\\n  min-height: 100vh;\\\\n  font-size: 14px;\\\\n  -webkit-font-smoothing: antialiased;\\\\n  transition: background 0.25s ease, color 0.25s ease;\\\\n}\\\\n\\\\n/* ================================================================\\\\n   TOOLBAR\\\\n   ================================================================ */\\\\n.toolbar {\\\\n  position: sticky; top: 0; z-index: 200;\\\\n  background: var(--surface);\\\\n  border-bottom: 1px solid var(--border);\\\\n  padding: 10px 18px;\\\\n  display: flex; align-items: center; justify-content: space-between; gap: 12px;\\\\n  box-shadow: var(--shadow);\\\\n  flex-wrap: wrap;\\\\n}\\\\n\\\\n.toolbar-left {\\\\n  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;\\\\n}\\\\n\\\\n.system-name {\\\\n  font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--text);\\\\n}\\\\n\\\\n.system-badge {\\\\n  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em;\\\\n  color: var(--text-3); background: var(--surface-2);\\\\n  border: 1px solid var(--border); padding: 2px 8px;\\\\n  border-radius: calc(var(--radius) / 2);\\\\n}\\\\n\\\\n.legend {\\\\n  display: flex; gap: 10px; align-items: center;\\\\n}\\\\n.legend-item {\\\\n  display: flex; align-items: center; gap: 5px;\\\\n  font-size: 11px; color: var(--text-2);\\\\n}\\\\n.legend-dot { width: 9px; height: 9px; border-radius: 2px; }\\\\n.legend-dot.cmd { background: var(--cmd-hdr); }\\\\n.legend-dot.view { background: var(--view-hdr); }\\\\n\\\\n.theme-switcher {\\\\n  display: flex; gap: 3px;\\\\n  background: var(--surface-2); padding: 3px;\\\\n  border-radius: calc(var(--radius)); border: 1px solid var(--border);\\\\n}\\\\n\\\\n.theme-btn {\\\\n  font-family: var(--font-body); font-size: 12px; font-weight: 500;\\\\n  padding: 5px 13px; border: none;\\\\n  border-radius: calc(var(--radius) - 2px);\\\\n  background: transparent; color: var(--text-2);\\\\n  cursor: pointer; touch-action: manipulation;\\\\n  transition: all 0.15s ease;\\\\n  min-height: 30px;\\\\n}\\\\n.theme-btn.active {\\\\n  background: var(--surface); color: var(--text); box-shadow: var(--shadow);\\\\n}\\\\n.theme-btn:active { transform: scale(0.97); }\\\\n\\\\n/* ================================================================\\\\n   BOARD\\\\n   ================================================================ */\\\\n.board-wrapper {\\\\n  overflow-x: auto; padding: 20px 18px 32px;\\\\n  -webkit-overflow-scrolling: touch;\\\\n  cursor: grab;\\\\n}\\\\n.board-wrapper:active { cursor: grabbing; }\\\\n\\\\n.em-board {\\\\n  display: flex; gap: 10px; align-items: flex-start; min-width: max-content;\\\\n}\\\\n\\\\n/* ================================================================\\\\n   SLICE COLUMN\\\\n   ================================================================ */\\\\n.slice-col {\\\\n  width: var(--col-width);\\\\n  background: var(--surface);\\\\n  border-radius: var(--radius);\\\\n  border: 1px solid var(--border);\\\\n  box-shadow: var(--shadow);\\\\n  display: flex; flex-direction: column;\\\\n  overflow: hidden;\\\\n  transition: box-shadow 0.2s ease;\\\\n}\\\\n.slice-col:hover { box-shadow: var(--shadow-lg); }\\\\n\\\\n/* \\\\u2500\\\\u2500 Column header \\\\u2500\\\\u2500 */\\\\n.col-hdr {\\\\n  padding: 11px 14px 13px;\\\\n  display: flex; flex-direction: column; gap: 3px;\\\\n}\\\\n.command-slice .col-hdr { background: var(--cmd-hdr); color: var(--cmd-hdr-text); }\\\\n.view-slice    .col-hdr { background: var(--view-hdr); color: var(--view-hdr-text); }\\\\n\\\\n.col-hdr-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }\\\\n\\\\n.type-badge {\\\\n  font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.14em;\\\\n  font-weight: 500; text-transform: uppercase;\\\\n  padding: 2px 7px; border-radius: 100px;\\\\n  background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.88);\\\\n}\\\\n\\\\n.slice-num {\\\\n  font-family: var(--font-mono); font-size: 9px;\\\\n  opacity: 0.55;\\\\n}\\\\n\\\\n.col-name { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }\\\\n.col-desc { font-size: 10px; opacity: 0.72; line-height: 1.45; margin-top: 2px; }\\\\n\\\\n/* ================================================================\\\\n   SECTIONS  (collapsible)\\\\n   ================================================================ */\\\\n.section { border-top: 1px solid var(--border); }\\\\n\\\\n.sec-hdr {\\\\n  display: flex; align-items: center; justify-content: space-between;\\\\n  padding: 0 14px; min-height: 38px;\\\\n  cursor: pointer; touch-action: manipulation; user-select: none;\\\\n  transition: opacity 0.1s;\\\\n}\\\\n.sec-hdr:active { opacity: 0.75; }\\\\n\\\\n.sec-label {\\\\n  font-family: var(--font-mono); font-size: 8.5px; font-weight: 500;\\\\n  letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3);\\\\n}\\\\n\\\\n.sec-right { display: flex; align-items: center; gap: 8px; }\\\\n\\\\n.sec-construct { font-size: 11px; font-weight: 600; color: var(--text-2); }\\\\n\\\\n.chevron {\\\\n  font-size: 8px; color: var(--text-3);\\\\n  display: inline-block; transition: transform 0.2s ease; line-height: 1;\\\\n}\\\\n.section.closed .chevron { transform: rotate(-90deg); }\\\\n\\\\n.sec-body { padding: 0 14px 12px; }\\\\n.section.closed .sec-body { display: none; }\\\\n\\\\n/* Section accent colors */\\\\n.s-screen .sec-hdr, .s-screen .sec-body { background: var(--sec-screen-bg); }\\\\n.s-screen { border-left: 3px solid var(--sec-screen-bd); }\\\\n\\\\n.s-command .sec-hdr, .s-command .sec-body { background: var(--sec-cmd-bg); }\\\\n.s-command { border-left: 3px solid var(--sec-cmd-bd); }\\\\n\\\\n.s-event .sec-hdr, .s-event .sec-body { background: var(--sec-evt-bg); }\\\\n.s-event { border-left: 3px solid var(--sec-evt-bd); }\\\\n\\\\n.s-view .sec-hdr, .s-view .sec-body { background: var(--sec-view-bg); }\\\\n.s-view { border-left: 3px solid var(--sec-view-bd); }\\\\n\\\\n.s-projector .sec-hdr, .s-projector .sec-body { background: var(--sec-proj-bg); }\\\\n.s-projector { border-left: 3px solid var(--sec-proj-bd); }\\\\n\\\\n/* \\\\u2500\\\\u2500 Screen snapshot \\\\u2500\\\\u2500 */\\\\n.snapshot {\\\\n  border: 1.5px solid var(--border-strong);\\\\n  border-radius: calc(var(--radius) \\u002B 2px);\\\\n  background: var(--surface-2);\\\\n  height: 72px;\\\\n  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;\\\\n  margin-bottom: 8px; margin-top: 4px;\\\\n  overflow: hidden; position: relative;\\\\n}\\\\n\\\\n.snapshot img {\\\\n  width: 100%; height: 100%; object-fit: cover;\\\\n}\\\\n\\\\n.snapshot-icon { font-size: 18px; opacity: 0.35; }\\\\n.snapshot-fname { font-family: var(--font-mono); font-size: 8.5px; color: var(--text-3); text-align: center; padding: 0 8px; }\\\\n.snapshot-noscreen { font-family: var(--font-mono); font-size: 9px; color: var(--text-3); letter-spacing: 0.1em; }\\\\n\\\\n.screen-meta { display: flex; align-items: center; justify-content: space-between; }\\\\n.screen-name { font-size: 11px; font-weight: 600; color: var(--text); }\\\\n.swimlane { font-family: var(--font-mono); font-size: 8.5px; color: var(--text-3); background: var(--surface-2); border: 1px solid var(--border); padding: 2px 6px; border-radius: 100px; }\\\\n\\\\n/* \\\\u2500\\\\u2500 Construct \\u002B fields \\\\u2500\\\\u2500 */\\\\n.construct-name { font-size: 12px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; margin-bottom: 6px; padding-top: 2px; }\\\\n\\\\n.fields { display: flex; flex-direction: column; gap: 1px; }\\\\n\\\\n.field {\\\\n  display: flex; align-items: center;\\\\n  font-family: var(--font-mono); font-size: 9.5px; line-height: 1.7;\\\\n}\\\\n.f-name { color: var(--text); font-weight: 500; }\\\\n.f-sep  { color: var(--text-3); margin: 0 3px; }\\\\n.f-type { color: var(--text-2); }\\\\n\\\\n.no-fields { font-family: var(--font-mono); font-size: 9px; color: var(--text-3); font-style: italic; padding-top: 2px; }\\\\n\\\\n/* ================================================================\\\\n   GWT BLOCK  (single-toggle for whole block)\\\\n   ================================================================ */\\\\n.gwt-block { border-top: 1.5px solid var(--sec-gwt-bd); }\\\\n\\\\n.gwt-bar {\\\\n  display: flex; align-items: center; justify-content: space-between;\\\\n  padding: 0 14px; min-height: 40px;\\\\n  cursor: pointer; touch-action: manipulation; user-select: none;\\\\n  background: var(--sec-gwt-bg);\\\\n  transition: opacity 0.1s;\\\\n}\\\\n.gwt-bar:active { opacity: 0.75; }\\\\n\\\\n.gwt-bar-left { display: flex; align-items: center; gap: 8px; }\\\\n\\\\n.gwt-label {\\\\n  font-family: var(--font-mono); font-size: 8.5px; font-weight: 600;\\\\n  letter-spacing: 0.14em; text-transform: uppercase; color: var(--gwt-accent);\\\\n}\\\\n\\\\n.gwt-pill {\\\\n  font-family: var(--font-mono); font-size: 8.5px;\\\\n  color: var(--gwt-accent); background: rgba(124,58,237,0.08);\\\\n  border: 1px solid rgba(124,58,237,0.18);\\\\n  padding: 1px 7px; border-radius: 100px;\\\\n}\\\\n\\\\n.gwt-chevron {\\\\n  font-size: 8px; color: var(--gwt-accent);\\\\n  display: inline-block; transition: transform 0.2s ease;\\\\n}\\\\n.gwt-block.closed .gwt-chevron { transform: rotate(-90deg); }\\\\n\\\\n.gwt-body {\\\\n  background: var(--sec-gwt-bg);\\\\n  border-left: 3px solid var(--sec-gwt-bd);\\\\n  padding: 4px 14px 12px;\\\\n}\\\\n.gwt-block.closed .gwt-body { display: none; }\\\\n\\\\n.gwt-rule {\\\\n  background: var(--surface);\\\\n  border: 1px solid var(--sec-gwt-bd);\\\\n  border-radius: var(--radius);\\\\n  padding: 8px 10px 9px;\\\\n  margin-bottom: 6px;\\\\n}\\\\n.gwt-rule:last-child { margin-bottom: 0; }\\\\n\\\\n.gwt-rule-name {\\\\n  font-size: 10.5px; font-weight: 700; color: var(--gwt-accent);\\\\n  margin-bottom: 6px;\\\\n}\\\\n\\\\n.gwt-rows { display: flex; flex-direction: column; gap: 3px; }\\\\n\\\\n.gwt-row {\\\\n  display: flex; align-items: flex-start; gap: 6px;\\\\n  font-family: var(--font-mono); font-size: 9.5px; line-height: 1.5;\\\\n}\\\\n\\\\n.kw { font-weight: 700; min-width: 36px; padding-top: 1px; }\\\\n.kw-given { color: var(--gwt-given); }\\\\n.kw-when  { color: var(--gwt-when);  }\\\\n.kw-then  { color: var(--gwt-then);  }\\\\n.gwt-val  { color: var(--text); flex: 1; word-break: break-word; }\\\\n\\\\n.gwt-desc {\\\\n  font-family: var(--font-body); font-size: 9.5px; color: var(--text-2);\\\\n  font-style: italic; margin-top: 5px; line-height: 1.45;\\\\n}\\\\n\\\\n/* ================================================================\\\\n   FEEDING EVENTS  (view slices)\\\\n   ================================================================ */\\\\n.feeding {\\\\n  border-top: 1px solid var(--border);\\\\n  padding: 9px 14px 10px;\\\\n  background: var(--surface-2);\\\\n}\\\\n\\\\n.feeding-label {\\\\n  font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.12em;\\\\n  text-transform: uppercase; color: var(--text-3); margin-bottom: 6px;\\\\n}\\\\n\\\\n.feeding-tags { display: flex; flex-wrap: wrap; gap: 4px; }\\\\n\\\\n.feed-tag {\\\\n  font-family: var(--font-mono); font-size: 9.5px;\\\\n  padding: 3px 8px; border-radius: calc(var(--radius) / 2);\\\\n  background: var(--sec-evt-bg); border: 1px solid var(--sec-evt-bd);\\\\n  color: var(--text-2);\\\\n}\\\\n.feed-tag .tag-ref { color: var(--text-3); font-size: 8.5px; }\\\\n\\\\n/* ================================================================\\\\n   DRAG TO SCROLL\\\\n   ================================================================ */\\\\n@media (pointer: fine) {\\\\n  .board-wrapper { cursor: grab; }\\\\n  .board-wrapper.dragging { cursor: grabbing; user-select: none; }\\\\n}\\\\n\\\\n/* ================================================================\\\\n   RESPONSIVE\\\\n   ================================================================ */\\\\n@media (max-width: 600px) {\\\\n  .legend { display: none; }\\\\n  .toolbar { padding: 8px 12px; }\\\\n  .board-wrapper { padding: 12px 10px 24px; }\\\\n}\\\\n\\u003C/style\\u003E\\\\n\\u003C/head\\u003E\\\\n\\\\n\\u003Cbody data-theme=\\\\\\u0022studio\\\\\\u0022\\u003E\\\\n\\\\n\\u003C!-- ===== TOOLBAR ===== --\\u003E\\\\n\\u003Cheader class=\\\\\\u0022toolbar\\\\\\u0022\\u003E\\\\n  \\u003Cdiv class=\\\\\\u0022toolbar-left\\\\\\u0022\\u003E\\\\n    \\u003Cspan class=\\\\\\u0022system-name\\\\\\u0022\\u003ELaundryLog\\u003C/span\\u003E\\\\n    \\u003Cspan class=\\\\\\u0022system-badge\\\\\\u0022\\u003EEVENT MODEL\\u003C/span\\u003E\\\\n    \\u003Cdiv class=\\\\\\u0022legend\\\\\\u0022\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022legend-item\\\\\\u0022\\u003E\\u003Cdiv class=\\\\\\u0022legend-dot cmd\\\\\\u0022\\u003E\\u003C/div\\u003EState Change\\u003C/div\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022legend-item\\\\\\u0022\\u003E\\u003Cdiv class=\\\\\\u0022legend-dot view\\\\\\u0022\\u003E\\u003C/div\\u003EState View\\u003C/div\\u003E\\\\n    \\u003C/div\\u003E\\\\n  \\u003C/div\\u003E\\\\n  \\u003Cdiv class=\\\\\\u0022theme-switcher\\\\\\u0022\\u003E\\\\n    \\u003Cbutton class=\\\\\\u0022theme-btn active\\\\\\u0022 data-theme=\\\\\\u0022studio\\\\\\u0022\\u003EStudio\\u003C/button\\u003E\\\\n    \\u003Cbutton class=\\\\\\u0022theme-btn\\\\\\u0022 data-theme=\\\\\\u0022manuscript\\\\\\u0022\\u003EManuscript\\u003C/button\\u003E\\\\n    \\u003Cbutton class=\\\\\\u0022theme-btn\\\\\\u0022 data-theme=\\\\\\u0022blueprint\\\\\\u0022\\u003EBlueprint\\u003C/button\\u003E\\\\n  \\u003C/div\\u003E\\\\n\\u003C/header\\u003E\\\\n\\\\n\\u003C!-- ===== BOARD ===== --\\u003E\\\\n\\u003Cdiv class=\\\\\\u0022board-wrapper\\\\\\u0022 id=\\\\\\u0022boardWrapper\\\\\\u0022\\u003E\\\\n  \\u003Cdiv class=\\\\\\u0022em-board\\\\\\u0022 id=\\\\\\u0022board\\\\\\u0022\\u003E\\u003C/div\\u003E\\\\n\\u003C/div\\u003E\\\\n\\\\n\\u003Cscript\\u003E\\\\n/* \\\\u2500\\\\u2500 Slice data (from TOML files) \\\\u2500\\\\u2500 */\\\\nconst SLICES = [\\\\n  {\\\\n    id: \\\\\\u0022019644a1-b1a0-7000-8000-000000000100\\\\\\u0022,\\\\n    type: \\\\\\u0022CommandSlice\\\\\\u0022, name: \\\\\\u0022OpenApp\\\\\\u0022, num: 1,\\\\n    desc: \\\\\\u0022Truck driver opens the LaundryLog app\\\\\\u0022,\\\\n    origins: [{ name: \\\\\\u0022Splash Screen\\\\\\u0022, swimlane: \\\\\\u0022TruckDriver\\\\\\u0022, snapshot: \\\\\\u0022app-splash-screen.png\\\\\\u0022 }],\\\\n    command: { name: \\\\\\u0022OpenApp\\\\\\u0022, fields: [] },\\\\n    events: [{ name: \\\\\\u0022AppOpened\\\\\\u0022, fields: [{ name: \\\\\\u0022openedAt\\\\\\u0022, type: \\\\\\u0022datetime\\\\\\u0022 }] }],\\\\n    gwt: [{ name: \\\\\\u0022OpenApp\\\\\\u0022, given: \\\\\\u0022Unit\\\\\\u0022, when: \\\\\\u0022OpenApp\\\\\\u0022, then: \\\\\\u0022AppOpened\\\\\\u0022,\\\\n            desc: \\\\\\u0022No prior state needed. App opened.\\\\\\u0022 }]\\\\n  },\\\\n  {\\\\n    id: \\\\\\u0022019644a1-b1a0-7000-8000-000000000300\\\\\\u0022,\\\\n    type: \\\\\\u0022CommandSlice\\\\\\u0022, name: \\\\\\u0022SetLocation\\\\\\u0022, num: 2,\\\\n    desc: \\\\\\u0022Truck driver provides the laundromat location\\\\\\u0022,\\\\n    origins: [{ name: \\\\\\u0022Get Location Screen\\\\\\u0022, swimlane: \\\\\\u0022TruckDriver\\\\\\u0022, snapshot: \\\\\\u0022get-location-screen.png\\\\\\u0022 }],\\\\n    command: { name: \\\\\\u0022SetLocation\\\\\\u0022, fields: [{ name: \\\\\\u0022location\\\\\\u0022, type: \\\\\\u0022string\\\\\\u0022 }] },\\\\n    events: [{ name: \\\\\\u0022LocationSet\\\\\\u0022, fields: [{ name: \\\\\\u0022location\\\\\\u0022, type: \\\\\\u0022string\\\\\\u0022 }] }],\\\\n    gwt: [{ name: \\\\\\u0022SetLocation\\\\\\u0022, given: [\\\\\\u0022AppOpened\\\\\\u0022], when: \\\\\\u0022SetLocation\\\\\\u0022, then: \\\\\\u0022LocationSet\\\\\\u0022,\\\\n            desc: \\\\\\u0022App has been opened, driver provides location.\\\\\\u0022 }]\\\\n  },\\\\n  {\\\\n    id: \\\\\\u0022019644a1-b1a0-7000-8000-000000000400\\\\\\u0022,\\\\n    type: \\\\\\u0022ViewSlice\\\\\\u0022, name: \\\\\\u0022CurrentLocation\\\\\\u0022, num: 3,\\\\n    desc: \\\\\\u0022Provides the current laundromat location for expense entry\\\\\\u0022,\\\\n    origins: [{ name: \\\\\\u0022NoScreen\\\\\\u0022, swimlane: \\\\\\u0022None\\\\\\u0022 }],\\\\n    projector: { name: \\\\\\u0022CurrentLocationProjector\\\\\\u0022 },\\\\n    view: { name: \\\\\\u0022CurrentLocation\\\\\\u0022, fields: [{ name: \\\\\\u0022location\\\\\\u0022, type: \\\\\\u0022string\\\\\\u0022 }] },\\\\n    feedingEvents: [{ name: \\\\\\u0022LocationSet\\\\\\u0022, sliceName: \\\\\\u0022SetLocation\\\\\\u0022, sliceNum: 2 }],\\\\n    gwt: [{ name: \\\\\\u0022LocationAvailable\\\\\\u0022, given: [\\\\\\u0022LocationSet\\\\\\u0022], then: \\\\\\u0022CurrentLocation\\\\\\u0022,\\\\n            desc: \\\\\\u0022Location has been set, provide it for expense entry.\\\\\\u0022 }]\\\\n  },\\\\n  {\\\\n    id: \\\\\\u0022019644a1-b1a0-7000-8000-000000000500\\\\\\u0022,\\\\n    type: \\\\\\u0022CommandSlice\\\\\\u0022, name: \\\\\\u0022LogExpense\\\\\\u0022, num: 4,\\\\n    desc: \\\\\\u0022Truck driver logs a laundry expense\\\\\\u0022,\\\\n    origins: [{ name: \\\\\\u0022Expense Entry Screen\\\\\\u0022, swimlane: \\\\\\u0022TruckDriver\\\\\\u0022, snapshot: \\\\\\u0022expense-entry-screen.png\\\\\\u0022 }],\\\\n    command: {\\\\n      name: \\\\\\u0022LogExpense\\\\\\u0022,\\\\n      fields: [\\\\n        { name: \\\\\\u0022machineType\\\\\\u0022, type: \\\\\\u0022string\\\\\\u0022 }, { name: \\\\\\u0022quantity\\\\\\u0022, type: \\\\\\u0022int\\\\\\u0022 },\\\\n        { name: \\\\\\u0022pricePerMachine\\\\\\u0022, type: \\\\\\u0022decimal\\\\\\u0022 }, { name: \\\\\\u0022paymentMethod\\\\\\u0022, type: \\\\\\u0022string\\\\\\u0022 },\\\\n        { name: \\\\\\u0022location\\\\\\u0022, type: \\\\\\u0022string\\\\\\u0022 }\\\\n      ]\\\\n    },\\\\n    events: [{\\\\n      name: \\\\\\u0022LaundryExpenseLogged\\\\\\u0022,\\\\n      fields: [\\\\n        { name: \\\\\\u0022expenseId\\\\\\u0022, type: \\\\\\u0022guid\\\\\\u0022 }, { name: \\\\\\u0022machineType\\\\\\u0022, type: \\\\\\u0022string\\\\\\u0022 },\\\\n        { name: \\\\\\u0022quantity\\\\\\u0022, type: \\\\\\u0022int\\\\\\u0022 }, { name: \\\\\\u0022pricePerMachine\\\\\\u0022, type: \\\\\\u0022decimal\\\\\\u0022 },\\\\n        { name: \\\\\\u0022totalCost\\\\\\u0022, type: \\\\\\u0022decimal\\\\\\u0022 }, { name: \\\\\\u0022paymentMethod\\\\\\u0022, type: \\\\\\u0022string\\\\\\u0022 },\\\\n        { name: \\\\\\u0022location\\\\\\u0022, type: \\\\\\u0022string\\\\\\u0022 }, { name: \\\\\\u0022loggedAt\\\\\\u0022, type: \\\\\\u0022datetime\\\\\\u0022 }\\\\n      ]\\\\n    }],\\\\n    gwt: [{ name: \\\\\\u0022LogNewExpense\\\\\\u0022, given: [\\\\\\u0022LocationSet\\\\\\u0022], when: \\\\\\u0022LogExpense\\\\\\u0022,\\\\n            then: \\\\\\u0022LaundryExpenseLogged\\\\\\u0022,\\\\n            desc: \\\\\\u0022Location must be established. Driver logs expense details.\\\\\\u0022 }]\\\\n  },\\\\n  {\\\\n    id: \\\\\\u0022019644a1-b1a0-7000-8000-000000000600\\\\\\u0022,\\\\n    type: \\\\\\u0022ViewSlice\\\\\\u0022, name: \\\\\\u0022RecentExpenses\\\\\\u0022, num: 5,\\\\n    desc: \\\\\\u0022Shows recently logged laundry expenses\\\\\\u0022,\\\\n    origins: [{ name: \\\\\\u0022NoScreen\\\\\\u0022, swimlane: \\\\\\u0022None\\\\\\u0022 }],\\\\n    projector: { name: \\\\\\u0022RecentExpensesProjector\\\\\\u0022 },\\\\n    view: {\\\\n      name: \\\\\\u0022RecentExpenses\\\\\\u0022,\\\\n      fields: [\\\\n        { name: \\\\\\u0022expenses\\\\\\u0022, type: \\\\\\u0022list\\\\\\u0022 }, { name: \\\\\\u0022totalSpent\\\\\\u0022, type: \\\\\\u0022decimal\\\\\\u0022 },\\\\n        { name: \\\\\\u0022expenseCount\\\\\\u0022, type: \\\\\\u0022int\\\\\\u0022 }, { name: \\\\\\u0022location\\\\\\u0022, type: \\\\\\u0022string\\\\\\u0022 }\\\\n      ]\\\\n    },\\\\n    feedingEvents: [{ name: \\\\\\u0022LaundryExpenseLogged\\\\\\u0022, sliceName: \\\\\\u0022LogExpense\\\\\\u0022, sliceNum: 4 }],\\\\n    gwt: [{ name: \\\\\\u0022RecentExpensesWithinWindow\\\\\\u0022, given: [\\\\\\u0022LaundryExpenseLogged\\\\\\u0022],\\\\n            when: \\\\\\u0022loggedAt within 3 hours\\\\\\u0022, then: \\\\\\u0022RecentExpenses\\\\\\u0022,\\\\n            desc: \\\\\\u0022Shows all expenses logged within the last 3 hours.\\\\\\u0022 }]\\\\n  }\\\\n];\\\\n\\\\n/* \\\\u2500\\\\u2500 Helpers \\\\u2500\\\\u2500 */\\\\nconst esc = s =\\u003E String(s).replace(/\\u0026/g,\\u0027\\u0026amp;\\u0027).replace(/\\u003C/g,\\u0027\\u0026lt;\\u0027).replace(/\\u003E/g,\\u0027\\u0026gt;\\u0027);\\\\n\\\\nfunction fields(list) {\\\\n  if (!list || !list.length) return \\u0060\\u003Cdiv class=\\\\\\u0022no-fields\\\\\\u0022\\u003E\\\\u2014 no fields \\\\u2014\\u003C/div\\u003E\\u0060;\\\\n  return \\u0060\\u003Cdiv class=\\\\\\u0022fields\\\\\\u0022\\u003E${list.map(f =\\u003E\\\\n    \\u0060\\u003Cdiv class=\\\\\\u0022field\\\\\\u0022\\u003E\\\\n       \\u003Cspan class=\\\\\\u0022f-name\\\\\\u0022\\u003E${esc(f.name)}\\u003C/span\\u003E\\\\n       \\u003Cspan class=\\\\\\u0022f-sep\\\\\\u0022\\u003E:\\u003C/span\\u003E\\\\n       \\u003Cspan class=\\\\\\u0022f-type\\\\\\u0022\\u003E${esc(f.type)}\\u003C/span\\u003E\\\\n     \\u003C/div\\u003E\\u0060).join(\\u0027\\u0027)}\\u003C/div\\u003E\\u0060;\\\\n}\\\\n\\\\nfunction given(v) {\\\\n  return Array.isArray(v) ? esc(v.join(\\u0027, \\u0027)) : esc(v);\\\\n}\\\\n\\\\nfunction gwtRules(rules) {\\\\n  return rules.map(r =\\u003E \\u0060\\\\n    \\u003Cdiv class=\\\\\\u0022gwt-rule\\\\\\u0022\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022gwt-rule-name\\\\\\u0022\\u003E${esc(r.name)}\\u003C/div\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022gwt-rows\\\\\\u0022\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022gwt-row\\\\\\u0022\\u003E\\u003Cspan class=\\\\\\u0022kw kw-given\\\\\\u0022\\u003EGiven\\u003C/span\\u003E\\u003Cspan class=\\\\\\u0022gwt-val\\\\\\u0022\\u003E${given(r.given)}\\u003C/span\\u003E\\u003C/div\\u003E\\\\n        ${r.when ? \\u0060\\u003Cdiv class=\\\\\\u0022gwt-row\\\\\\u0022\\u003E\\u003Cspan class=\\\\\\u0022kw kw-when\\\\\\u0022\\u003EWhen\\u003C/span\\u003E\\u003Cspan class=\\\\\\u0022gwt-val\\\\\\u0022\\u003E${esc(r.when)}\\u003C/span\\u003E\\u003C/div\\u003E\\u0060 : \\u0027\\u0027}\\\\n        \\u003Cdiv class=\\\\\\u0022gwt-row\\\\\\u0022\\u003E\\u003Cspan class=\\\\\\u0022kw kw-then\\\\\\u0022\\u003EThen\\u003C/span\\u003E\\u003Cspan class=\\\\\\u0022gwt-val\\\\\\u0022\\u003E${esc(r.then)}\\u003C/span\\u003E\\u003C/div\\u003E\\\\n      \\u003C/div\\u003E\\\\n      ${r.desc ? \\u0060\\u003Cdiv class=\\\\\\u0022gwt-desc\\\\\\u0022\\u003E${esc(r.desc)}\\u003C/div\\u003E\\u0060 : \\u0027\\u0027}\\\\n    \\u003C/div\\u003E\\u0060).join(\\u0027\\u0027);\\\\n}\\\\n\\\\nfunction snapshot(origin) {\\\\n  if (!origin.snapshot) return \\u0060\\u003Cdiv class=\\\\\\u0022snapshot\\\\\\u0022\\u003E\\u003Cspan class=\\\\\\u0022snapshot-noscreen\\\\\\u0022\\u003ENO SCREEN\\u003C/span\\u003E\\u003C/div\\u003E\\u0060;\\\\n  return \\u0060\\u003Cdiv class=\\\\\\u0022snapshot\\\\\\u0022\\u003E\\\\n    \\u003Cspan class=\\\\\\u0022snapshot-icon\\\\\\u0022\\u003E\\\\ud83d\\\\udcf1\\u003C/span\\u003E\\\\n    \\u003Cspan class=\\\\\\u0022snapshot-fname\\\\\\u0022\\u003E${esc(origin.snapshot)}\\u003C/span\\u003E\\\\n  \\u003C/div\\u003E\\u0060;\\\\n}\\\\n\\\\nfunction section(cls, label, construct, bodyHtml, startOpen = true) {\\\\n  return \\u0060\\\\n    \\u003Cdiv class=\\\\\\u0022section ${cls}${startOpen ? \\u0027\\u0027 : \\u0027 closed\\u0027}\\\\\\u0022\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022sec-hdr\\\\\\u0022 onclick=\\\\\\u0022toggleSec(this)\\\\\\u0022\\u003E\\\\n        \\u003Cspan class=\\\\\\u0022sec-label\\\\\\u0022\\u003E${label}\\u003C/span\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022sec-right\\\\\\u0022\\u003E\\\\n          \\u003Cspan class=\\\\\\u0022sec-construct\\\\\\u0022\\u003E${esc(construct)}\\u003C/span\\u003E\\\\n          \\u003Cspan class=\\\\\\u0022chevron\\\\\\u0022\\u003E\\\\u25bc\\u003C/span\\u003E\\\\n        \\u003C/div\\u003E\\\\n      \\u003C/div\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022sec-body\\\\\\u0022\\u003E${bodyHtml}\\u003C/div\\u003E\\\\n    \\u003C/div\\u003E\\u0060;\\\\n}\\\\n\\\\n/* \\\\u2500\\\\u2500 Column renderer \\\\u2500\\\\u2500 */\\\\nfunction renderCol(s) {\\\\n  const isCmd = s.type === \\u0027CommandSlice\\u0027;\\\\n  const typeClass = isCmd ? \\u0027command-slice\\u0027 : \\u0027view-slice\\u0027;\\\\n  const typeLabel = isCmd ? \\u0027STATE CHANGE\\u0027 : \\u0027STATE VIEW\\u0027;\\\\n  const origin = s.origins[0];\\\\n\\\\n  // Screen\\\\n  const screenBody = \\u0060\\\\n    ${snapshot(origin)}\\\\n    \\u003Cdiv class=\\\\\\u0022screen-meta\\\\\\u0022\\u003E\\\\n      \\u003Cspan class=\\\\\\u0022screen-name\\\\\\u0022\\u003E${esc(origin.name)}\\u003C/span\\u003E\\\\n      ${origin.swimlane \\u0026\\u0026 origin.swimlane !== \\u0027None\\u0027\\\\n        ? \\u0060\\u003Cspan class=\\\\\\u0022swimlane\\\\\\u0022\\u003E${esc(origin.swimlane)}\\u003C/span\\u003E\\u0060 : \\u0027\\u0027}\\\\n    \\u003C/div\\u003E\\u0060;\\\\n\\\\n  const screenSec = section(\\u0027s-screen\\u0027, \\u0027Screen\\u0027, origin.name, screenBody, true);\\\\n\\\\n  // Command / View sections\\\\n  let midSections = \\u0027\\u0027;\\\\n  if (isCmd) {\\\\n    const cmdBody = \\u0060\\u003Cdiv class=\\\\\\u0022construct-name\\\\\\u0022\\u003E${esc(s.command.name)}\\u003C/div\\u003E${fields(s.command.fields)}\\u0060;\\\\n    midSections \\u002B= section(\\u0027s-command\\u0027, \\u0027Command\\u0027, s.command.name, cmdBody, true);\\\\n    s.events.forEach(evt =\\u003E {\\\\n      const evtBody = \\u0060\\u003Cdiv class=\\\\\\u0022construct-name\\\\\\u0022\\u003E${esc(evt.name)}\\u003C/div\\u003E${fields(evt.fields)}\\u0060;\\\\n      midSections \\u002B= section(\\u0027s-event\\u0027, \\u0027Event\\u0027, evt.name, evtBody, true);\\\\n    });\\\\n  } else {\\\\n    const projBody = \\u0060\\u003Cdiv class=\\\\\\u0022construct-name\\\\\\u0022\\u003E${esc(s.projector.name)}\\u003C/div\\u003E\\u0060;\\\\n    midSections \\u002B= section(\\u0027s-projector\\u0027, \\u0027Projector\\u0027, s.projector.name, projBody, false);\\\\n    const viewBody = \\u0060\\u003Cdiv class=\\\\\\u0022construct-name\\\\\\u0022\\u003E${esc(s.view.name)}\\u003C/div\\u003E${fields(s.view.fields)}\\u0060;\\\\n    midSections \\u002B= section(\\u0027s-view\\u0027, \\u0027View\\u0027, s.view.name, viewBody, true);\\\\n  }\\\\n\\\\n  // Feeding events\\\\n  const feedHtml = (!isCmd \\u0026\\u0026 s.feedingEvents \\u0026\\u0026 s.feedingEvents.length)\\\\n    ? \\u0060\\u003Cdiv class=\\\\\\u0022feeding\\\\\\u0022\\u003E\\\\n         \\u003Cdiv class=\\\\\\u0022feeding-label\\\\\\u0022\\u003EEvents Feeding This View\\u003C/div\\u003E\\\\n         \\u003Cdiv class=\\\\\\u0022feeding-tags\\\\\\u0022\\u003E${s.feedingEvents.map(fe =\\u003E\\\\n           \\u0060\\u003Cdiv class=\\\\\\u0022feed-tag\\\\\\u0022\\u003E${esc(fe.name)} \\u003Cspan class=\\\\\\u0022tag-ref\\\\\\u0022\\u003E(Slice ${fe.sliceNum})\\u003C/span\\u003E\\u003C/div\\u003E\\u0060\\\\n         ).join(\\u0027\\u0027)}\\u003C/div\\u003E\\\\n       \\u003C/div\\u003E\\u0060 : \\u0027\\u0027;\\\\n\\\\n  // GWT block\\\\n  const gwtHtml = \\u0060\\\\n    \\u003Cdiv class=\\\\\\u0022gwt-block\\\\\\u0022\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022gwt-bar\\\\\\u0022 onclick=\\\\\\u0022toggleGWT(this)\\\\\\u0022\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022gwt-bar-left\\\\\\u0022\\u003E\\\\n          \\u003Cspan class=\\\\\\u0022gwt-label\\\\\\u0022\\u003EGWT Rules\\u003C/span\\u003E\\\\n          \\u003Cspan class=\\\\\\u0022gwt-pill\\\\\\u0022\\u003E${s.gwt.length} rule${s.gwt.length !== 1 ? \\u0027s\\u0027 : \\u0027\\u0027}\\u003C/span\\u003E\\\\n        \\u003C/div\\u003E\\\\n        \\u003Cspan class=\\\\\\u0022gwt-chevron\\\\\\u0022\\u003E\\\\u25bc\\u003C/span\\u003E\\\\n      \\u003C/div\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022gwt-body\\\\\\u0022\\u003E${gwtRules(s.gwt)}\\u003C/div\\u003E\\\\n    \\u003C/div\\u003E\\u0060;\\\\n\\\\n  return \\u0060\\\\n    \\u003Cdiv class=\\\\\\u0022slice-col ${typeClass}\\\\\\u0022\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022col-hdr\\\\\\u0022\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022col-hdr-top\\\\\\u0022\\u003E\\\\n          \\u003Cspan class=\\\\\\u0022type-badge\\\\\\u0022\\u003E${typeLabel}\\u003C/span\\u003E\\\\n          \\u003Cspan class=\\\\\\u0022slice-num\\\\\\u0022\\u003ESlice ${s.num}\\u003C/span\\u003E\\\\n        \\u003C/div\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022col-name\\\\\\u0022\\u003E${esc(s.name)}\\u003C/div\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022col-desc\\\\\\u0022\\u003E${esc(s.desc)}\\u003C/div\\u003E\\\\n      \\u003C/div\\u003E\\\\n      ${screenSec}\\\\n      ${midSections}\\\\n      ${feedHtml}\\\\n      ${gwtHtml}\\\\n    \\u003C/div\\u003E\\u0060;\\\\n}\\\\n\\\\n/* \\\\u2500\\\\u2500 Render \\\\u2500\\\\u2500 */\\\\ndocument.getElementById(\\u0027board\\u0027).innerHTML = SLICES.map(renderCol).join(\\u0027\\u0027);\\\\n\\\\n/* \\\\u2500\\\\u2500 Toggle section \\\\u2500\\\\u2500 */\\\\nfunction toggleSec(hdr) {\\\\n  hdr.closest(\\u0027.section\\u0027).classList.toggle(\\u0027closed\\u0027);\\\\n}\\\\n\\\\n/* \\\\u2500\\\\u2500 Toggle GWT block \\\\u2500\\\\u2500 */\\\\nfunction toggleGWT(bar) {\\\\n  bar.closest(\\u0027.gwt-block\\u0027).classList.toggle(\\u0027closed\\u0027);\\\\n}\\\\n\\\\n/* \\\\u2500\\\\u2500 Theme switching \\\\u2500\\\\u2500 */\\\\ndocument.querySelectorAll(\\u0027.theme-btn\\u0027).forEach(btn =\\u003E {\\\\n  btn.addEventListener(\\u0027click\\u0027, () =\\u003E {\\\\n    document.body.dataset.theme = btn.dataset.theme;\\\\n    document.querySelectorAll(\\u0027.theme-btn\\u0027).forEach(b =\\u003E b.classList.remove(\\u0027active\\u0027));\\\\n    btn.classList.add(\\u0027active\\u0027);\\\\n  });\\\\n});\\\\n\\\\n/* \\\\u2500\\\\u2500 Drag to scroll \\\\u2500\\\\u2500 */\\\\nconst wrapper = document.getElementById(\\u0027boardWrapper\\u0027);\\\\nlet isDown = false, startX, scrollLeft;\\\\nwrapper.addEventListener(\\u0027mousedown\\u0027, e =\\u003E {\\\\n  isDown = true; wrapper.classList.add(\\u0027dragging\\u0027);\\\\n  startX = e.pageX - wrapper.offsetLeft; scrollLeft = wrapper.scrollLeft;\\\\n});\\\\nwrapper.addEventListener(\\u0027mouseleave\\u0027, () =\\u003E { isDown = false; wrapper.classList.remove(\\u0027dragging\\u0027); });\\\\nwrapper.addEventListener(\\u0027mouseup\\u0027,    () =\\u003E { isDown = false; wrapper.classList.remove(\\u0027dragging\\u0027); });\\\\nwrapper.addEventListener(\\u0027mousemove\\u0027,  e =\\u003E {\\\\n  if (!isDown) return; e.preventDefault();\\\\n  wrapper.scrollLeft = scrollLeft - (e.pageX - wrapper.offsetLeft - startX);\\\\n});\\\\n\\u003C/script\\u003E\\\\n\\u003C/body\\u003E\\\\n\\u003C/html\\u003E\\\\n\\u0022, \\u0022filename\\u0022: \\u0022/home/claude/em-diagram-template.html\\u0022}\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

