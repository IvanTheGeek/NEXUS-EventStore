text = "Got it — adopting **View Slice** and the terminology:\n\n```text\nCommands / Events / Views\n```\n\nis actually very clean and closer to how people intuitively understand the read side. It also removes the ambiguity of “projection,” which can mean both **process** and **result**.\n\nSo your behavioral primitives become:\n\n```text\nCommand Slice\nUI → Command → Event\n\nView Slice\nUI ← View ← Event\n```\n\nThat symmetry is nice.\n\n---\n\n# Updated Concept Model\n\nWith the terminology you want to keep:\n\n```text\nDomain\n  ↓\nContext\n  ↓\nConstruct\n  ↓\nEvent Model\n  ↓\nSlices\n  ├─ Command Slice\n  └─ View Slice\n```\n\nInside slices:\n\n```text\nCommand Slice\n  UI\n  Command\n  Event\n\nView Slice\n  Event\n  View\n  UI\n```\n\n---\n\n# Updated Event File Example\n\nFilename:\n\n```\n018f9c52-7e2b-7c0e-a3a2-93a7e4e3f1c1_laundry-expense-logged.toml\n```\n\n```toml\nid = \"018f9c52-7e2b-7c0e-a3a2-93a7e4e3f1c1\"\n\ntype = \"event\"\nname = \"LaundryExpenseLogged\"\nslug = \"laundry-expense-logged\"\nversion = 1\n\ndomain = \"laundry\"\ncontext = \"expense-tracking\"\nconstruct = \"laundrylog\"\n\ndescription = \"A laundry expense was recorded.\"\n```\n\n---\n\n# Example View Definition\n\nLater when defining a view node:\n\n```\nviews/\n018fa02e-b2a1-7c7a-b71e-34c6c8b091f1_laundry-expense-history.toml\n```\n\n```toml\nid = \"018fa02e-b2a1-7c7a-b71e-34c6c8b091f1\"\n\ntype = \"view\"\nname = \"LaundryExpenseHistory\"\nslug = \"laundry-expense-history\"\n\ndomain = \"laundry\"\ncontext = \"expense-tracking\"\nconstruct = \"laundrylog\"\n\ndescription = \"Displays historical laundry expenses.\"\n```\n\n---\n\n# Command Example\n\n```\ncommands/\n018fa031-9c90-7e13-8a9c-ec19c5e76a61_log-laundry-expense.toml\n```\n\n```toml\nid = \"018fa031-9c90-7e13-8a9c-ec19c5e76a61\"\n\ntype = \"command\"\nname = \"LogLaundryExpense\"\nslug = \"log-laundry-expense\"\n\ndomain = \"laundry\"\ncontext = \"expense-tracking\"\nconstruct = \"laundrylog\"\n\nemits = \"018f9c52-7e2b-7c0e-a3a2-93a7e4e3f1c1\"\n```\n\n---\n\n# Clean Filesystem Layout\n\nA simple POC layout that works well:\n\n```\nmodel/\n\nevents/\n  <uuid>_laundry-expense-logged.toml\n\ncommands/\n  <uuid>_log-laundry-expense.toml\n\nviews/\n  <uuid>_laundry-expense-history.toml\n\nslices/\n  <uuid>_log-expense-command-slice/\n  <uuid>_expense-history-view-slice/\n```\n\nSlices reference the nodes.\n\n---\n\n# Example Command Slice\n\n```\nslices/\n018fa040-3c6c-7a77-bad1-7b62fd9c2a91_log-expense-command-slice/\n```\n\n```\nui.toml\ncommand.ref\nevent.ref\n```\n\nExample reference file:\n\n```\nevent.ref\n```\n\n```\n../../events/018f9c52-7e2b-7c0e-a3a2-93a7e4e3f1c1_laundry-expense-logged.toml\n```\n\nSlices become **filesystem containers for the cells**.\n\n---\n\n# Example View Slice\n\n```\nslices/\n018fa041-8d31-7c90-9a3c-9f3c0a3b4a92_expense-history-view-slice/\n```\n\n```\nevent.ref\nview.ref\nui.toml\n```\n\n---\n\n# Why “View” Works Well\n\nUsing **View** instead of Projection aligns nicely with:\n\n```text\nCommand → writes\nEvent   → facts\nView    → reads\n```\n\nWhich is essentially **CQRS terminology**.\n\nAnd it makes slices very intuitive:\n\n```text\nCommand Slice → produces events\nView Slice    → consumes events\n```\n\n---\n\n# Nice Side Effect for the Graph\n\nYour nodes become very clear types:\n\n```text\nCommand\nEvent\nView\nUI\n```\n\nEdges:\n\n```text\nUI → Command\nCommand → Event\nEvent → View\nView → UI\n```\n\nThat structure will compile extremely cleanly into the **Truth Graph** you’ve been envisioning.\n\n---\n\nIf you'd like, the **next really important design decision** for your filesystem POC is:\n\n**Where the UI nodes live** (because they don’t behave like commands, events, or views).  \n\nThere are **three good models**, and one of them fits Event Modeling slices *much better* than the others."

