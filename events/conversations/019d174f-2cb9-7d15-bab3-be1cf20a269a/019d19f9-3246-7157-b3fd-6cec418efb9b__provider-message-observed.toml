text = "Yes — that fits perfectly with your **“UI is a snapshot”** rule. The UI file should simply **reference the image that represents the slice at modeling time**. The filesystem then holds both:\n\n- the **behavior model**\n- the **visual evidence of the UI**\n\nThis mirrors the way Event Modeling boards use screenshots or sketches.\n\n---\n\n# 1. Slice Structure\n\nExample slice:\n\n```text\nslices/\n018fa700_log-expense/\n```\n\nContents:\n\n```text\nui.toml\nui.png\ncommand.ref\nevent.ref\n```\n\nor if you want a small media folder:\n\n```text\nslices/\n018fa700_log-expense/\n   ui.toml\n   ui/\n      snapshot.png\n   command.ref\n   event.ref\n```\n\nBoth work; the second scales better later.\n\n---\n\n# 2. UI Snapshot File\n\nExample `ui.toml`:\n\n```toml\ntype = \"ui\"\n\nname = \"LogExpenseForm\"\n\ndescription = \"Snapshot of the UI used to record a laundry expense.\"\n\nimage = \"./ui/snapshot.png\"\n```\n\nThis makes the UI file **metadata about the snapshot**.\n\n---\n\n# 3. Example Slice Directory\n\n```text\nslices/\n018fa700_log-expense/\n\n   ui.toml\n   ui/\n      snapshot.png\n\n   command.ref\n   event.ref\n```\n\nWhere the behavior is:\n\n```\nUI\n ↓\nCommand\n ↓\nEvent\n```\n\n---\n\n# 4. Example References\n\n`command.ref`\n\n```\n../../commands/018fa701_log-laundry-expense.toml\n```\n\n`event.ref`\n\n```\n../../events/018fa702_laundry-expense-logged.toml\n```\n\n---\n\n# 5. Why This Works Well\n\nThis structure gives you three nice properties:\n\n### Visual traceability\n\nYou can see the UI that caused the behavior.\n\n### Git friendliness\n\nUI snapshots evolve naturally with commits.\n\n### Model clarity\n\nThe **UI is not architecture**, just **documentation of interaction**.\n\n---\n\n# 6. Future-Proofing (Optional Fields)\n\nYou might later include extra metadata:\n\n```toml\ntype = \"ui\"\n\nname = \"LogExpenseForm\"\n\nimage = \"./ui/snapshot.png\"\n\ncaptured_at = \"2026-03-12\"\n\nnotes = \"Initial prototype screen.\"\n```\n\nStill simple, but helpful for research logs.\n\n---\n\n# 7. Nice Side Effect\n\nYour slices now contain **three kinds of knowledge**:\n\n| Artifact | Purpose |\n|---|---|\n| UI snapshot | human interaction evidence |\n| command ref | intent |\n| event ref | fact |\n\nSo every slice becomes a **self-contained behavioral story cell**.\n\n---\n\n# 8. A Small Trick That Helps Later\n\nUse a consistent UI filename:\n\n```\nsnapshot.png\n```\n\nThen `ui.toml` can simply say:\n\n```toml\nimage = \"./ui/snapshot.png\"\n```\n\nTools later can easily auto-load UI previews.\n\n---\n\nIf you'd like, the next thing we can design is **the exact filesystem structure for the entire Nexus POC**, because once you add:\n\n- commands\n- events\n- slices\n- UI snapshots\n- domains / contexts / constructs\n\nthere is a **very clean directory structure** that keeps everything navigable even when the model grows large."

