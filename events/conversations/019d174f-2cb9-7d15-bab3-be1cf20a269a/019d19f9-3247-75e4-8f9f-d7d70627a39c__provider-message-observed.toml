kind = "plain_text"
text = "For your Nexus POC, the pipeline you want in F# is essentially:\n\n```\nFilesystem (truth)\n        ↓\nParse TOML files\n        ↓\nBuild in-memory graph\n        ↓\nSort slices (UUIDv7 ordering)\n        ↓\nRender HTML Event Model\n```\n\nSo the script has **three stages**:\n\n1. **Load files**\n2. **Build graph**\n3. **Render event model**\n\nBelow is a **clean F# script architecture** that does exactly that.\n\n---\n\n# 1. Domain Types (Your Truth Graph)\n\nDefine types representing the model.\n\n```fsharp\ntype Command =\n    { Id : string\n      Name : string }\n\ntype Event =\n    { Id : string\n      Name : string }\n\ntype UI =\n    { Name : string\n      Image : string }\n\ntype Slice =\n    { Id : string\n      UI : UI option\n      Command : Command option\n      Event : Event option }\n```\n\nYour **graph is really just relationships** between these.\n\n---\n\n# 2. Reading the File System\n\nBasic directory structure assumed:\n\n```\nmodel/\n   commands/\n   events/\n   slices/\n```\n\nLoader helpers:\n\n```fsharp\nopen System.IO\n\nlet readAll dir =\n    Directory.GetFiles(dir)\n```\n\nExample:\n\n```fsharp\nlet eventFiles =\n    readAll \"model/events\"\n```\n\n---\n\n# 3. Parse TOML\n\nUse a TOML library.\n\nRecommended:\n\n```\nTomlyn\n```\n\nAdd package:\n\n```\ndotnet add package Tomlyn\n```\n\nThen:\n\n```fsharp\nopen Tomlyn\nopen Tomlyn.Model\n```\n\nParse file:\n\n```fsharp\nlet parseToml file =\n    File.ReadAllText(file)\n    |> Toml.ToModel\n```\n\n---\n\n# 4. Load Events\n\n```fsharp\nlet loadEvent file =\n\n    let model = parseToml file :?> TomlTable\n\n    { Id = model[\"id\"].ToString()\n      Name = model[\"name\"].ToString() }\n```\n\nLoad all:\n\n```fsharp\nlet events =\n    readAll \"model/events\"\n    |> Array.map loadEvent\n    |> Array.map (fun e -> e.Id, e)\n    |> Map.ofArray\n```\n\nNow you have:\n\n```\nMap<EventId, Event>\n```\n\n---\n\n# 5. Load Commands\n\nSame pattern:\n\n```fsharp\nlet loadCommand file =\n\n    let model = parseToml file :?> TomlTable\n\n    { Id = model[\"id\"].ToString()\n      Name = model[\"name\"].ToString() }\n```\n\n---\n\n# 6. Load Slice\n\nSlices reference command + event.\n\n```fsharp\nlet loadSlice dir events commands =\n\n    let id =\n        Path.GetFileName(dir).Split('_')[0]\n\n    let commandRef =\n        File.ReadAllText(Path.Combine(dir,\"command.ref\")).Trim()\n\n    let eventRef =\n        File.ReadAllText(Path.Combine(dir,\"event.ref\")).Trim()\n\n    let commandFile =\n        Path.GetFileName(commandRef)\n\n    let eventFile =\n        Path.GetFileName(eventRef)\n\n    let commandId =\n        commandFile.Split('_')[0]\n\n    let eventId =\n        eventFile.Split('_')[0]\n\n    { Id = id\n      UI = None\n      Command = commands |> Map.tryFind commandId\n      Event = events |> Map.tryFind eventId }\n```\n\n---\n\n# 7. Load All Slices\n\n```fsharp\nlet slices =\n\n    Directory.GetDirectories(\"model/slices\")\n    |> Array.map (fun dir -> loadSlice dir events commands)\n    |> Array.sortBy (fun s -> s.Id)\n```\n\nBecause **UUIDv7 is time ordered**, sorting by ID = timeline.\n\n---\n\n# 8. Graph Structure\n\nYou technically now have a **graph**:\n\n```\nUI\n ↓\nCommand\n ↓\nEvent\n```\n\nBut represented as data:\n\n```\nSlice\n ├─ UI\n ├─ Command\n └─ Event\n```\n\n---\n\n# 9. Render HTML Event Model\n\nSimple renderer.\n\n```fsharp\nlet renderSlice slice =\n\n    let command =\n        slice.Command |> Option.map (fun c -> c.Name) |> Option.defaultValue \"\"\n\n    let event =\n        slice.Event |> Option.map (fun e -> e.Name) |> Option.defaultValue \"\"\n\n    $\"\"\"\n<div class=\"slice\">\n\n<div class=\"ui\">\nUI Snapshot\n</div>\n\n<div class=\"command\">\n{command}\n</div>\n\n<div class=\"event\">\n{event}\n</div>\n\n</div>\n\"\"\"\n```\n\n---\n\n# 10. Build the Board\n\n```fsharp\nlet renderBoard slices =\n\n    let sliceHtml =\n        slices\n        |> Array.map renderSlice\n        |> String.concat \"\\n\"\n\n    $\"\"\"\n<html>\n<head>\n<style>\n\n.event-model {{\ndisplay:grid;\ngrid-auto-flow:column;\ngrid-auto-columns:220px;\ngap:16px;\n}}\n\n.slice {{\ndisplay:grid;\ngrid-template-rows:120px 80px 80px;\ngap:8px;\n}}\n\n.ui {{ background:#ddeeff }}\n.command {{ background:#fff2cc }}\n.event {{ background:#ffd6d6 }}\n\n</style>\n</head>\n\n<body>\n\n<div class=\"event-model\">\n\n{sliceHtml}\n\n</div>\n\n</body>\n</html>\n\"\"\"\n```\n\n---\n\n# 11. Write Output\n\n```fsharp\nlet html = renderBoard slices\n\nFile.WriteAllText(\"event-model.html\", html)\n```\n\n---\n\n# 12. Full Pipeline\n\nYour generator becomes:\n\n```\nLoad events\nLoad commands\nLoad slices\nBuild graph\nRender HTML\n```\n\n```\nfilesystem → graph → event model\n```\n\nExactly what you want for **Nexus truth graph experiments**.\n\n---\n\n# Why This Is Actually Powerful\n\nYou now have:\n\n```\nGit\n   ↓\nFilesystem truth\n   ↓\nF# graph builder\n   ↓\nHTML event model projection\n```\n\nWhich means your **event model is literally compiled from the domain files**.\n\nThis aligns perfectly with your **Immutable Evolution** principle:\n\n```\nchange files\n↓\ncommit\n↓\nrebuild model\n↓\nnew graph\n```\n\n---\n\nIf you'd like, the **next step** that will make this POC much more Nexus-like is adding **View slices**, which introduces the **second slice type Adam uses**:\n\n```\nCommand Slice\nUI → Command → Event\n\nView Slice\nEvent → View → UI\n```\n\nThat’s where the graph really starts becoming interesting."

