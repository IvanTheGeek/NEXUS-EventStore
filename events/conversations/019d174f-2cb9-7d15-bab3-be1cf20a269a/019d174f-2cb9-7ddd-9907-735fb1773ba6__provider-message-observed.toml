text = "Using the **filesystem as the container structure** is actually a very promising direction for a Nexus proof-of-concept. Filesystems already provide things you want:\n\n- hierarchy\n- immutability through Git\n- simple addressing\n- cheap branching\n- natural storage of artifacts\n\nThe key design question becomes the one you asked:\n\n> **Where do events live?**\n\nBecause in Event Modeling (as taught by entity[\"people\",\"Adam Dymitruk\",\"event modeling creator\"]) events are the **anchors of behavior**. Everything else connects through them.\n\nBelow are a few viable patterns for a filesystem-based model.\n\n---\n\n# 1. Event-Centric Filesystem (Recommended for Nexus)\n\nEvents are the **primary nodes**, so give them first-class directories.\n\nExample:\n\n```\ntruth-graph/\n\nevents/\n  018f5e52-5e9e-7c6a-b5c2-0e0e3a3c8e21/\n      event.toml\n      projections/\n      commands/\n\nslices/\n  place-order/\n      slice.toml\n```\n\nExample event file:\n\n```toml\nid = \"018f5e52-5e9e-7c6a-b5c2-0e0e3a3c8e21\"\nname = \"OrderPlaced\"\ntype = \"event\"\n```\n\nThen commands reference the event.\n\n```toml\ntype = \"command\"\nname = \"PlaceOrder\"\n\nemits = \"018f5e52-5e9e-7c6a-b5c2-0e0e3a3c8e21\"\n```\n\nUsing **UUIDv7** is a good choice because:\n\n- sortable by time\n- globally unique\n- good Git diff characteristics\n\n---\n\n# 2. Slice-Centric Filesystem (Closer to Event Modeling Boards)\n\nEach slice is a directory.\n\n```\nslices/\n  01-place-order/\n      command.toml\n      event.toml\n\n  02-order-view/\n      projection.toml\n```\n\nExample:\n\n```\n01-place-order/\n    ui.toml\n    command.toml\n    event.toml\n```\n\nThis mirrors the visual board:\n\n```\nUI → Command → Event\n```\n\nDownside:\n\nEvents become **duplicated definitions** across slices.\n\nYou need a deduplication rule like:\n\n```\nevent.id determines identity\n```\n\n---\n\n# 3. Node-Centric Filesystem (Pure Graph Approach)\n\nEverything is a node directory.\n\n```\nnodes/\n  events/\n  commands/\n  projections/\n  ui/\n```\n\nExample:\n\n```\nnodes/events/\n  018f.../\n      node.toml\n\nnodes/commands/\n  018g.../\n      node.toml\n```\n\nEdges live in files.\n\n```\nedges/\n  018f-edge.toml\n```\n\nExample edge:\n\n```toml\nfrom = \"command-uuid\"\nto = \"event-uuid\"\ntype = \"emits\"\n```\n\nThis is the **closest representation to a graph database**.\n\n---\n\n# 4. Hybrid Model (Probably Best for a POC)\n\nCombine slices for **story flow** with events as **global nodes**.\n\n```\nmodel/\n\nevents/\n  018f-event-order-placed/\n      event.toml\n\nslices/\n  018f-slice-place-order/\n      slice.toml\n      command.toml\n\n  018f-slice-order-view/\n      slice.toml\n      projection.toml\n```\n\nSlice file references event:\n\n```toml\ntype = \"command\"\n\ncommand = \"PlaceOrder\"\nemits = \"018f-event-order-placed\"\n```\n\nNow:\n\n- slices maintain narrative order\n- events remain canonical nodes\n\n---\n\n# 5. What UUIDv7 Enables\n\nBecause UUIDv7 is **time sortable**, you can use IDs for ordering:\n\n```\n018f... slice\n0191... slice\n0195... slice\n```\n\nSo timeline reconstruction becomes trivial.\n\nThis actually fits Event Modeling's **timeline principle** nicely.\n\n---\n\n# 6. Graph Compilation\n\nYour compiler could walk the filesystem like this:\n\n```\n1 scan events/\n2 scan slices/\n3 extract nodes\n4 extract edges\n5 build graph\n```\n\nOutput:\n\n```json\n{\n \"nodes\": [...],\n \"edges\": [...]\n}\n```\n\nWhich becomes the **Truth Graph fragment**.\n\n---\n\n# 7. Interesting Filesystem Trick\n\nDirectories can represent **cells** in a slice.\n\nExample:\n\n```\nslice/\n  ui/\n  command/\n  event/\n```\n\n```\nslices/\n  place-order/\n      ui/\n          button.toml\n      command/\n          place-order.toml\n      event/\n          order-placed.ref\n```\n\nThe `.ref` file points to the canonical event.\n\n```\n../events/018f-event-order-placed\n```\n\nThis makes slices **composition containers**.\n\n---\n\n# 8. Another Alternative: Event as Folder Root\n\nFlip the model:\n\n```\nevents/\n  order-placed/\n      command/\n      projections/\n```\n\nExample:\n\n```\nevents/\n  order-placed/\n      emitted-by/\n          place-order-command\n      projections/\n          order-view\n          inventory-view\n```\n\nThis makes the graph **event-centric**, which aligns strongly with event sourcing.\n\n---\n\n# 9. My Recommendation for the POC\n\nStart with something simple:\n\n```\nmodel/\n  events/\n  slices/\n```\n\nEach slice references events by UUID.\n\nEvents are **canonical nodes**.\n\nEverything else attaches to them.\n\nThis will let you:\n\n- keep Event Modeling's **timeline thinking**\n- still compile a **graph**\n- avoid duplication problems\n\n---\n\n# 10. One More Idea Worth Considering\n\nThe filesystem itself could represent **graph edges via symlinks**.\n\nExample:\n\n```\ncommand/\n   emits -> ../events/order-placed\n```\n\nSymlinks are literally **edges**.\n\nGit supports them well.\n\nThat would make the filesystem itself behave like a **native graph structure**.\n\n---\n\nIf you want, I can also show you a **very clean directory structure for slices that mirrors Adam's board layout exactly** (commands row, events row, projections row) while still compiling directly into a graph. It works surprisingly well for POCs."

