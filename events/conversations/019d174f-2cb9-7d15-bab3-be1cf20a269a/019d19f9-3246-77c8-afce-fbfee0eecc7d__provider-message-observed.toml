text = "I am going to be working on a proof of concept for Nexus and a file based way to build the truth graph. I am experimenting with creating Adam's event model in HTML. I want to use git to record and store the progress. I am starting with the most basic EM and then will build it out, step by step. main will be the result of each progression. So I am thinking that a branch is the way to record each commit as changes are made and explored. Should the commit notes be where my reasoning and thoughts go or should it be maybe a notes directory or something"

