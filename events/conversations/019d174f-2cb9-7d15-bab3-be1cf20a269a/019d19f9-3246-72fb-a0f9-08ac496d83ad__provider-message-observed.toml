text = "What I’m referring to is something often called a **Discovery Log** or **Engineering Decision Log**. It sits **between informal discussion and formal code history**.\n\nThink of the layers like this:\n\n```\nTalkyard      → exploration and discussion\nDiscovery Log → distilled insights and decisions\nGit commits   → concrete implementation steps\n```\n\nSo instead of your Git notes becoming a long journal and Talkyard becoming a messy idea space, the **Discovery Log captures the “important realizations.”**\n\n---\n\n# The Discovery Log concept\n\nA discovery log records **moments where understanding changed**.\n\nTypical entries look like:\n\n- a realization\n- a design decision\n- an experiment result\n- a rejected approach\n- a new concept\n\nThey’re **short, structured, and permanent**.\n\n---\n\n# Example entry\n\n```\n/discoveries/0003-event-model-is-a-graph.md\n```\n\n```\nTitle: Event Models Are Graphs\nDate: 2026-03-11\nStatus: Insight\n\nObservation\nTraditional event modeling diagrams implicitly form a graph structure.\n\nEvents appear to be the primary nodes, while commands and projections\nrepresent directional edges between system actors and state transitions.\n\nImplication\nThe canonical representation of an Event Model could be a graph rather\nthan a diagram.\n\nThis supports the Nexus concept of a \"Truth Graph\".\n\nRelated\n- Talkyard discussion: /nexus/event-model-graphs\n- Commit: 9a82f1e\n```\n\n---\n\n# Why this works well\n\nOver time you build something like:\n\n```\ndiscoveries/\n\n0001-basic-event-model.md\n0002-command-vs-projection-slices.md\n0003-event-model-is-a-graph.md\n0004-truth-graph-representation.md\n0005-file-based-slice-dsl.md\n```\n\nThis becomes **the intellectual backbone of the project**.\n\nNot:\n\n- code\n- discussion\n\nBut **knowledge artifacts**.\n\n---\n\n# Why this fits Nexus extremely well\n\nYour Nexus paradigm already revolves around:\n\n**Immutable evolution of systems.**\n\nA discovery log is **immutable evolution of understanding**.\n\nYou never edit entries — you only add new ones.\n\n```\n0003 – Initial insight\n0012 – Revised understanding\n0027 – Final model\n```\n\nSo the **history of ideas** becomes visible.\n\n---\n\n# How this differs from Git commit messages\n\nCommit:\n\n```\nRefactor slice structure to support projection slices\n```\n\nDiscovery:\n\n```\nRealization that event models have two fundamental slice types:\nCommandSlice and ProjectionSlice.\n```\n\nCommits = **what changed**  \nDiscoveries = **what was learned**\n\n---\n\n# Why this becomes extremely valuable later\n\nWhen Nexus grows, you'll have:\n\n```\nPhilosophy\nArchitecture\nTools\nParadigm papers\n```\n\nWithout a discovery log, the **origin of ideas gets lost**.\n\nWith one, you can trace:\n\n```\nTruth Graph concept\n    ↓\nfirst realization\n    ↓\nfirst prototype\n    ↓\nAtlas implementation\n```\n\nThat’s incredibly powerful.\n\n---\n\n# Suggested repo structure\n\n```\nnexus-em-poc/\n\nmodel/\nnotes/\ndiscoveries/\nexperiments/\nREADME.md\n```\n\nWhere:\n\n- **model** → event model artifacts\n- **notes** → technical reasoning\n- **discoveries** → paradigm insights\n- **experiments** → prototypes\n\n---\n\n# A subtle but interesting realization\n\nWhat you’re building might eventually look like this:\n\n```\nTalkyard  → idea discussion\nGit repo  → artifact evolution\nDiscovery log → paradigm evolution\n```\n\nThat is basically a **three-layer knowledge system**.\n\nAnd interestingly…\n\nIt is very close to what **Cortex** might eventually become in Nexus.\n\n---\n\nIf you're interested, I can also show you something **surprisingly powerful for Nexus**:\n\nHow your **file-based Event Model experiment could compile into a graph automatically**, turning the repo itself into the **first primitive Truth Graph.**"

