text = "The **Actor vs Agent** distinction is subtle but important, especially when you’re building a formal model like your Nexus/Event Modeling filesystem. It helps clarify **who initiates commands** and **what executes behavior**.\n\nLet’s walk through it from general systems theory → DDD → Event Modeling → what fits your model.\n\n---\n\n# 1. Actor (External Initiator)\n\nAn **Actor** is **outside the system** and initiates interaction.\n\nTypical actors:\n\n```text\nUser\nAdministrator\nExternal System\nPayment Gateway\nIoT Device\n```\n\nActors:\n\n• trigger UI actions  \n• send commands  \n• do **not belong to the system model itself**\n\nIn Event Modeling diagrams (Adam Dymitruk), actors usually appear **outside the slices**.\n\nExample:\n\n```text\nActor → UI → Command → Event\n```\n\nExample for LaundryLog:\n\n```text\nUser → LogExpenseForm → LogLaundryExpense → LaundryExpenseLogged\n```\n\nThe **User** is an actor.\n\n---\n\n# 2. Agent (Internal Executor)\n\nAn **Agent** is **inside the system** and performs behavior.\n\nExamples:\n\n```text\nSaga\nProcess Manager\nAutomation\nScheduler\nWorkflow\n```\n\nAgents:\n\n• consume events  \n• issue commands  \n• orchestrate workflows\n\nExample:\n\n```text\nEvent → Agent → Command → Event\n```\n\nExample:\n\n```text\nLaundryExpenseLogged\n        ↓\nExpenseBudgetAgent\n        ↓\nNotifyBudgetExceeded\n```\n\nAgents are **behavior nodes inside the model**.\n\n---\n\n# 3. Key Difference\n\n| Property | Actor | Agent |\n|---|---|---|\n| Location | Outside system | Inside system |\n| Role | Initiates interaction | Executes logic |\n| Appears in slices | Before UI | Between events/commands |\n| Controlled by system | No | Yes |\n\n---\n\n# 4. How Event Modeling Treats Actors\n\nIn Adam’s Event Modeling:\n\nActors are **informational**, not structural.\n\nThey often appear like:\n\n```text\nCustomer\n   ↓\nUI\n   ↓\nCommand\n   ↓\nEvent\n```\n\nBut they **aren’t part of the event model graph itself**.\n\nThey are **context for the UI**.\n\n---\n\n# 5. Where Agents Appear in Event Modeling\n\nAgents appear in **automation slices** or **process flows**.\n\nExample:\n\n```text\nEvent → Agent → Command\n```\n\nExample:\n\n```text\nPaymentAuthorized\n      ↓\nShippingAgent\n      ↓\nShipOrder\n```\n\nAgents are **first-class behavioral components**.\n\n---\n\n# 6. How This Applies to Your Filesystem Model\n\nYour node types currently are:\n\n```text\nCommand\nEvent\nView\nUI\n```\n\nYou probably want to add:\n\n```text\nAgent\n```\n\nActors should **not be nodes in the truth graph**.\n\nInstead:\n\nActors belong to **UI metadata**.\n\nExample:\n\n```toml\nactor = \"user\"\n```\n\nExample UI file:\n\n```toml\ntype = \"ui\"\nname = \"LogExpenseForm\"\n\nactor = \"user\"\n```\n\n---\n\n# 7. Example with Agent\n\nEvent file:\n\n```toml\nname = \"LaundryExpenseLogged\"\n```\n\nAgent:\n\n```toml\nid = \"018fa3a0-b2f0-7d0c-abc1-ff231cc9c1a2\"\n\ntype = \"agent\"\nname = \"BudgetMonitor\"\nslug = \"budget-monitor\"\n```\n\nSlice:\n\n```text\nEvent → Agent → Command\n```\n\nExample slice directory:\n\n```text\nslices/\n018fa3a1_budget-check/\n\nevent.ref\nagent.ref\ncommand.ref\n```\n\n---\n\n# 8. Resulting Behavioral Graph\n\nYou end up with:\n\n```text\nActor\n   ↓\nUI\n   ↓\nCommand\n   ↓\nEvent\n   ↓\nAgent\n   ↓\nCommand\n   ↓\nEvent\n   ↓\nView\n   ↓\nUI\n```\n\nActors only exist **at the boundary**.\n\nAgents exist **inside the system**.\n\n---\n\n# 9. Why This Distinction Matters for Nexus\n\nIn the **Truth Graph idea**, nodes represent **things the system knows about**.\n\nActors are **external entities**.\n\nAgents are **system components**.\n\nSo graph nodes should likely include:\n\n```text\nCommand\nEvent\nView\nAgent\n```\n\nUI nodes might remain **slice-local**.\n\nActors remain **metadata/context**.\n\n---\n\n# 10. A Simple Rule That Works Well\n\nYou can think of it like this:\n\n```text\nActors ask for things.\nAgents make things happen.\n```\n\nExample:\n\n```text\nUser (Actor)\n   ↓\nLogLaundryExpense (Command)\n   ↓\nLaundryExpenseLogged (Event)\n   ↓\nBudgetMonitor (Agent)\n   ↓\nSendBudgetAlert (Command)\n```\n\n---\n\n# 11. One Interesting Connection to Your Graph Idea\n\nAgents are essentially **behavior edges turned into nodes**.\n\nWhich means they fit **very naturally in a graph model**.\n\nIn fact, your graph might eventually look like:\n\n```text\nCommand\nEvent\nView\nAgent\n```\n\nwith slices defining the **edges between them**.\n\n---\n\nIf you'd like, I can also show you something **Adam hinted at but rarely formalizes**:\n\nThere are actually **five slice types hiding inside Event Modeling**, and identifying them makes your filesystem design *much clearer*."

