text = "Using **1 event per file with UUIDv7 in the filename** is a very clean design for a filesystem-based truth graph. It gives you:\n\n- immutable identity\n- time ordering\n- easy Git diffs\n- canonical node storage\n\nBelow are **TOML-only examples** for the event **`LaundryExpenseLogged`** in a LaundryLog domain.\n\n---\n\n# 1. Event File Naming\n\nRecommended pattern:\n\n```\nevents/\n  018f9c2c-8a0e-7c41-bf2e-9e6a21b3f1f4-laundry-expense-logged.toml\n```\n\nStructure:\n\n```\n<uuidv7>-<event-slug>.toml\n```\n\nWhy:\n\n- UUID ensures uniqueness\n- slug makes the repo readable\n- UUID keeps chronological ordering\n\n---\n\n# 2. Event Definition File\n\nExample:\n\n```toml\nid = \"018f9c2c-8a0e-7c41-bf2e-9e6a21b3f1f4\"\ntype = \"event\"\nname = \"LaundryExpenseLogged\"\n\noccurred_at = \"2026-03-12T14:52:31Z\"\n\n[aggregate]\ntype = \"laundry-session\"\nid = \"018f9c1b-3d88-7e4d-91e2-4a9d3c2ef991\"\n\n[data]\nmachine_id = \"washer-3\"\nlocation_id = \"laundromat-17\"\namount = 4.50\ncurrency = \"USD\"\npayment_method = \"quarters\"\nnotes = \"two loads\"\n```\n\n---\n\n# 3. Minimal Event File (Graph-Oriented)\n\nIf the event file is only meant to represent **the node**, you could keep it minimal:\n\n```toml\nid = \"018f9c2c-8a0e-7c41-bf2e-9e6a21b3f1f4\"\ntype = \"event\"\nname = \"LaundryExpenseLogged\"\n```\n\nAdditional context can be attached elsewhere.\n\n---\n\n# 4. Event With Metadata Section\n\nUseful if you want **traceability to models and knowledge artifacts**.\n\n```toml\nid = \"018f9c2c-8a0e-7c41-bf2e-9e6a21b3f1f4\"\ntype = \"event\"\nname = \"LaundryExpenseLogged\"\n\n[meta]\ncreated_at = \"2026-03-12T14:52:31Z\"\nversion = 1\nsource = \"laundrylog\"\n\n[meta.knowledge]\nconcept = \"CON-0007\"\ndiscussion = \"DISC-0012\"\n```\n\n---\n\n# 5. Event With Graph Links (optional pattern)\n\nIf the event also references related nodes:\n\n```toml\nid = \"018f9c2c-8a0e-7c41-bf2e-9e6a21b3f1f4\"\ntype = \"event\"\nname = \"LaundryExpenseLogged\"\n\n[edges]\n\nemitted_by = [\n  \"018f9c2a-1c01-7c10-95a7-6e1d0bafc022\"\n]\n\nfeeds_projection = [\n  \"018f9c2d-7f33-7c9d-b1a4-82b1a1f7b7ab\"\n]\n```\n\nYour compiler would translate these into graph edges.\n\n---\n\n# 6. Directory Example\n\nExample filesystem layout for LaundryLog:\n\n```\nmodel/\n\nevents/\n  018f9c2c-8a0e-7c41-bf2e-9e6a21b3f1f4-laundry-expense-logged.toml\n\ncommands/\n  018f9c2a-1c01-7c10-95a7-6e1d0bafc022-log-laundry-expense.toml\n\nprojections/\n  018f9c2d-7f33-7c9d-b1a4-82b1a1f7b7ab-expense-ledger.toml\n\nslices/\n  018f9c29-9e9c-7d19-a9a2-3c23df5b3a6e-log-expense/\n```\n\nEach node is **one file**.\n\n---\n\n# 7. Example Command Referencing the Event\n\n```\ncommands/\n  018f9c2a-1c01-7c10-95a7-6e1d0bafc022-log-laundry-expense.toml\n```\n\n```toml\nid = \"018f9c2a-1c01-7c10-95a7-6e1d0bafc022\"\ntype = \"command\"\nname = \"LogLaundryExpense\"\n\nemits = \"018f9c2c-8a0e-7c41-bf2e-9e6a21b3f1f4\"\n```\n\n---\n\n# 8. Example Projection Referencing the Event\n\n```\nprojections/\n  018f9c2d-7f33-7c9d-b1a4-82b1a1f7b7ab-expense-ledger.toml\n```\n\n```toml\nid = \"018f9c2d-7f33-7c9d-b1a4-82b1a1f7b7ab\"\ntype = \"projection\"\nname = \"LaundryExpenseLedger\"\n\nsource_event = \"018f9c2c-8a0e-7c41-bf2e-9e6a21b3f1f4\"\n```\n\n---\n\n# 9. Why This Structure Works Well\n\nThis approach creates a **very clean graph compiler model**:\n\n```\nevents/       → event nodes\ncommands/     → command nodes\nprojections/  → projection nodes\n```\n\nEdges are determined by fields like:\n\n```\nemits\nsource_event\n```\n\nThe compiler walks the filesystem and builds the **behavior graph**.\n\n---\n\n💡 One improvement I strongly recommend for your Nexus POC:\n\nUse **UUIDv7 prefixes for *every* node type** (events, commands, projections, slices). That gives you **natural timeline ordering of the entire model**, which matches the timeline emphasis in Event Modeling.\n\nIf you'd like, I can also show a **very clean slice directory structure for LaundryLog** that mirrors the **UI → Command → Event / Event → Projection → UI rows** exactly while still compiling into a graph."

