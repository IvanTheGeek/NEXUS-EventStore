kind = "plain_text"
text = "Excellent use case - load boards are notoriously clunky. Building a better interface over a webview is totally feasible.\n\n**Questions I need to answer this well:**\n\n1. Which load board? (DAT, Truckstop.com, 123Loadboard, etc.) - affects anti-automation measures and DOM structure\n2. Desktop or mobile app? (affects webview tech choice)\n3. Key workflows you want to improve? (search/filter loads, save favorites, alerts, booking, etc.)\n4. Do they have 2FA or complex login?\n\n**General approach would be:**\n- Hidden webview handles authentication/session\n- JavaScript injection scrapes load data\n- Your F# app provides clean UI/UX over the data\n- Optionally: cache/index loads for faster filtering\n\nLet's start with #1 - which load board are you using?"

