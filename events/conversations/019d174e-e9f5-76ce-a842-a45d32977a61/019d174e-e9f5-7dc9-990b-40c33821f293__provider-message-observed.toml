kind = "plain_text"
text = "Yes, your app can both read and control web content in a webview, including external websites.\n\n**Key mechanisms:**\n\n1. **JavaScript Injection** - Execute JavaScript in the webview to read DOM content, manipulate elements, click buttons, fill forms, etc.\n\n2. **Message Passing** - Establish two-way communication between your app and the webpage:\n   - App → Webpage: Send messages/commands\n   - Webpage → App: Receive data/events (if you inject a bridge)\n\n3. **Navigation Control** - Intercept navigation, modify requests, block certain URLs\n\n4. **DOM Access** - Extract text, scrape data, read form values, monitor changes\n\n**Platform specifics vary:**\n- **WebView2** (Windows): `ExecuteScriptAsync`, `WebMessageReceived`\n- **WKWebView** (macOS/iOS): `evaluateJavaScript`, message handlers\n- **WebView** (Android): `evaluateJavascript`, JavaScript interface\n\n**External website considerations:**\n- CORS policies don't restrict you (you control the webview)\n- CSP headers may limit some injection techniques\n- Some sites actively detect/block automation\n- Legal/ethical: Check ToS for scraping restrictions\n\nAre you building something specific that needs to interact with external sites, or exploring general webview capabilities?"

