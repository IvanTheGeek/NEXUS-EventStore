kind = "plain_text"
text = "Yes, your idea can work. Here's the viability breakdown:\n\n**Technically feasible:**\n- Webview can inject JavaScript to scrape load data\n- Can intercept/trigger accept/decline actions\n- Can maintain authenticated session in background\n- F# + WebView2 (desktop) or .NET MAUI (mobile) handles this well\n\n**Potential blockers:**\n- **Anti-automation**: FedEx may detect/block automated interactions (CAPTCHAs, rate limiting, bot detection)\n- **Dynamic content**: If they use heavy JavaScript/SPA, scraping gets more complex but still doable\n- **Session management**: May need to keep webview \"alive\" to maintain login\n- **Terms of Service**: FedEx might prohibit automated access (legal risk, not technical)\n\n**Risk mitigation:**\n- Mimicking human behavior (timing, mouse movements) reduces detection\n- Keeping official app installed shows you're not bypassing anything\n- Could fall back to \"open in browser\" if automation fails\n\n**Bottom line**: Technically sound approach. Main risk is FedEx actively blocking it, but since you're a legitimate contractor (not scraping public data), you're in a stronger position. Worst case, they make it harder and you adjust.\n\nWorth prototyping to see how cooperative their site is."

