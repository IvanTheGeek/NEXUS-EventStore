text = "There is **no fixed legal clip length** like ÔÇť10 seconds,ÔÇŁ ÔÇť30 seconds,ÔÇŁ or ÔÇťunder 10%.ÔÇŁ In U.S. copyright law, whether you can legally use a movie clip depends on **how** you use it, not just **how long** it is. The U.S. Copyright Office explicitly says there are **no legal rules** allowing use of a specific number of words, notes, percentage, or similar amount, and fair use is judged case by case under the statutory factors. ţłÇciteţłéturn0search0ţłéturn0search7ţłü\n\nWhat matters most is usually this:\n- **Why youÔÇÖre using it** ÔÇö commentary, criticism, review, news reporting, teaching, parody, and scholarship are stronger fair-use contexts. ţłÇciteţłéturn0search0ţłéturn0search7ţłü\n- **How much you use** ÔÇö use only what is reasonably necessary for that purpose. Even a short clip can be infringing if it takes the ÔÇťheartÔÇŁ of the scene; a somewhat longer clip can sometimes be fair if it is justified by commentary or analysis. ţłÇciteţłéturn0search0ţłéturn0search7ţłü\n- **Whether your use substitutes for the original** ÔÇö if viewers could treat your clip as a replacement for watching or licensing the original, that hurts a fair-use argument. ţłÇciteţłéturn0search0ţłéturn0search7ţłü\n\nA practical rule is:\n- **Entertainment-only repost** of a movie scene: usually **not safe** without permission.\n- **Review/commentary** where you talk over it, analyze it, compare it, or critique it: often **more defensible** as fair use.\n- **Background/incidental capture** is a different category and may be treated differently in practice. Documentary fair-use best-practices guidance also reflects that context matters more than clip length alone. ţłÇciteţłéturn0search3ţłéturn0search21ţłü\n\nOne thing to be careful of: numbers like **ÔÇť3 minutes or 10%ÔÇŁ** come from older **educational guideline proposals**, not a universal legal safe harbor for everyone. They should not be treated as a general permission rule. ţłÇciteţłéturn0search2ţłéturn0search0ţłü\n\nSo the honest answer is: **use the shortest clip genuinely needed for your purpose, and make the new purpose obvious**. If your use is commercial, non-transformative, or mostly just republishes the best part of the movie, risk goes up.\n\nThis is general information, not legal advice. If you want, describe your exact use caseÔÇöYouTube review, documentary, meme, training material, app promo, classroom useÔÇöand IÔÇÖll tell you how risky it looks."

