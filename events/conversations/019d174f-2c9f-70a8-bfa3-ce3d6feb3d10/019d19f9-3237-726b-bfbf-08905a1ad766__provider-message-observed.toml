text = "To make the **timeline vertical (top → bottom)** while keeping the **architectural columns aligned**, the cleanest Mermaid layout is to use **top-down flow (`TB`)** and group each slice as a row. The **event stays in the center column conceptually**, with commands above it and projections below it.\n\nThis version tends to match an **event-modeling wall** most closely.\n\n```mermaid\nflowchart TB\n\n%% --- Slice 1 : Command Slice ---\nsubgraph S1[\"Slice 1 — Command\"]\ndirection LR\nUI1[\"UI\\nTap Log Laundry Expense\"]\nCMD1[\"Command\\nLogLaundryExpense\"]\nEVT1[\"Event\\nLaundryExpenseLogged\"]\nUI1 --> CMD1 --> EVT1\nend\n\n%% --- Slice 2 : Projection Slice ---\nsubgraph S2[\"Slice 2 — Projection\"]\ndirection LR\nEVT2[\"Event\\nLaundryExpenseLogged\"]\nPROJ2[\"Projection\\nExpenseHistoryProjection\"]\nUI2[\"UI\\nView Expense History\"]\nEVT2 --> PROJ2 --> UI2\nend\n\nS1 --> S2\n```\n\n### How to read it\n\n**Time flows downward**\n\n```\nSlice 1\n   ↓\nSlice 2\n   ↓\nSlice 3 (future slices)\n```\n\n**Within each slice the behavior flows horizontally**\n\nCommand slice:\n\n```\nUI → Command → Event\n```\n\nProjection slice:\n\n```\nEvent → Projection → UI\n```\n\n### Visually this forms the architecture you described\n\n```\n           UI                Behavior                 Event\n----------------------------------------------------------------\nSlice 1    Tap Expense   →   LogLaundryExpense   →   LaundryExpenseLogged\n\nSlice 2    View History  ←   ExpenseProjection   ←   LaundryExpenseLogged\n```\n\nThe **event column becomes the system hinge**.\n\n```\nCommand slices create facts\nProjection slices react to facts\n```\n\nWhich matches the event-modeling mental model popularized by  \nentity[\"people\",\"Adam Dymitruk\",\"event modeling advocate\"].\n\n### Why this layout works well\n\nIt gives you **three simultaneous views**:\n\n1. **Timeline (top → bottom)**  \n   how the system evolves\n\n2. **Slice behavior (left → right)**  \n   how a slice executes\n\n3. **Event ledger (middle column)**  \n   the system’s immutable facts\n\nThis is very close to the **accounting analogy** you mentioned:\n\n```\nCommand slice  → journal entry\nProjection slice → ledger/report\n```\n\n---\n\n💡 One interesting thing about the structure you’re building in Penpot:\n\nIf you keep adding rows, the diagram slowly turns into something like a **behavior timeline around a central event ledger**. That structure is very close to what mature event systems evolve into.\n\nIf you'd like, I can also show the **next refinement of this diagram** that many teams end up using — where the **event column is literally one vertical stream**, and slices attach to it like **ribs on a spine**. That version becomes extremely powerful when modeling 10–30 slices."

