text = "To make the diagram look **almost exactly like your Penpot 3-column layout**, you add **explicit column headers** and keep the **anchor trick** underneath.\n\nThis produces a stable **UI | Behavior | Event** grid.\n\n---\n\n# Penpot-style Mermaid Layout\n\n```mermaid\nflowchart TB\n\n%% ---- Column Headers ----\nUI_H[\"UI\"]:::header\nBEH_H[\"Behavior\"]:::header\nEVT_H[\"Event\"]:::header\n\nUI_H --- BEH_H --- EVT_H\n\n\n%% ---- Invisible column anchors ----\nUI_COL[\" \"]:::hidden\nBEH_COL[\" \"]:::hidden\nEVT_COL[\" \"]:::hidden\n\nUI_H --- UI_COL\nBEH_H --- BEH_COL\nEVT_H --- EVT_COL\n\n\n%% ----- Slice 1 -----\nsubgraph S1[\"Slice 1 — Command\"]\ndirection LR\nUI1[\"Tap Log Laundry Expense\"]:::ui\nCMD1[\"LogLaundryExpense\"]:::command\nEVT1[\"LaundryExpenseLogged\"]:::event\nUI1 --> CMD1 --> EVT1\nend\n\nUI1 -.-> UI_COL\nCMD1 -.-> BEH_COL\nEVT1 -.-> EVT_COL\n\n\n%% ----- Slice 2 -----\nsubgraph S2[\"Slice 2 — Projection\"]\ndirection RL\nUI2[\"View Expense History\"]:::ui\nPROJ2[\"ExpenseHistoryProjection\"]:::projection\nEVT2[\"LaundryExpenseLogged\"]:::event\nEVT2 --> PROJ2 --> UI2\nend\n\nUI2 -.-> UI_COL\nPROJ2 -.-> BEH_COL\nEVT2 -.-> EVT_COL\n\n\nS1 ~~~ S2\n\n\n%% ---- Styles ----\nclassDef header fill:#f5f5f5,stroke:#999,font-weight:bold;\nclassDef ui fill:#dddddd,stroke:#333;\nclassDef command fill:#cfe8ff,stroke:#333;\nclassDef projection fill:#d8f5d0,stroke:#333;\nclassDef event fill:#ffe6cc,stroke:#333;\nclassDef hidden opacity:0,stroke:none,fill:none;\n```\n\n---\n\n# Resulting structure\n\n```\nUI                     Behavior                    Event\n----------------------------------------------------------------\nTap Log Expense   →    LogLaundryExpense      →    LaundryExpenseLogged\n\nView History      ←    ExpenseHistoryProjection ←  LaundryExpenseLogged\n```\n\nSo visually it becomes a **matrix**:\n\n```\n        UI | Behavior | Event\nSlice1  →      →          →\nSlice2  ←      ←          ←\n```\n\nwhich matches the **event modeling wall pattern** taught by  \nentity[\"people\",\"Adam Dymitruk\",\"event modeling creator\"].\n\n---\n\n# Small trick that makes it cleaner\n\nUse **short labels in nodes** and put detail on second line:\n\n```\nLogLaundryExpense\n(Command)\n```\n\nMermaid keeps column widths tighter.\n\n---\n\n✅ This pattern scales nicely to **10–20 slices** while keeping columns aligned.\n\n---\n\nIf you'd like, I can also show the **next trick** that makes Mermaid diagrams **scale to 30–50 slices without drifting**, which is how some teams document full event-modeled systems. It's a surprisingly clever hack."

