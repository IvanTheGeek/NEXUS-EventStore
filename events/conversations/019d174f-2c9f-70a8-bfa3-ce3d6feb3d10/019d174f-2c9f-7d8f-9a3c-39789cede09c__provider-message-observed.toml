kind = "plain_text"
text = "That makes **LaundryExpenseLogged** an even better domain event, because it captures the **real business concept**: *money spent related to doing laundry*, regardless of whether it was a machine cycle or a supply purchase.\n\nWhat changes slightly is that the event now represents **a category of laundry-related expense**, not just machine usage.\n\nSo each event would represent something like:\n\n> \"A laundry-related expense occurred and was logged.\"\n\nExamples that would all fit the same event:\n\n- washer cycle  \n- dryer cycle  \n- bleach from vending machine  \n- single-use detergent box  \n\nThe **event stays the same**, but a field distinguishes the type of expense.\n\nConceptually:\n\n```\nCommand: LogLaundryExpense\nEvent:   LaundryExpenseLogged\n```\n\nAnd the event might contain something like:\n\n```\nexpense_type = \"washer\"\nexpense_type = \"dryer\"\nexpense_type = \"detergent\"\nexpense_type = \"bleach\"\n```\n\nor slightly more general:\n\n```\ncategory = \"machine\"\ncategory = \"supply\"\n```\n\nThat keeps the **event vocabulary small**, which is good event modeling practice.\n\nIt also strengthens the **audit story**, because the log now shows a consistent timeline of all laundry-related costs:\n\n- washer cycles  \n- dryer cycles  \n- supplies purchased on-site  \n\nAll tied to:\n\n- **timestamp**\n- **location**\n- **amount**\n\nWhich together form a believable expense record if questioned.\n\nFrom an event modeling perspective, this means your domain still has a **single primary command slice**:\n\n```\nUI → LogLaundryExpense → LaundryExpenseLogged\n```\n\nEverything else (session totals, history, grouping by location, session detection after 3 hours) can remain **projections derived from that single event stream**."

