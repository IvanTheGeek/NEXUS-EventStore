kind = "plain_text"
text = "that actually highlights another tenet of Adam's. He does not reuse slices in the sense of there is a master slice and then there are instances. If you change the master, all the instances update. Nope, we is a proponent of the least amount of coupling that makes sense. So for an event model, you can copy a slice to use somewhere else, and even if nothing needs changed to make it work, it is now its own scope. so more of a templating idea rather than reuse. He applies this in his projects to code as well. Copy the code, put in new module for that slice and adjust to that slice. It allows then that slice to be \"replaced\". That slice on \"DONE\", it is not touched in code again. If requirements change, the slice is redesigned and reimplemented. At a deeper level, the programmer that did the slice is responsible for bug fixes for free for \"life\". So in that case, the code might actually get changed and redeployed for that slice as a big fix, not a event model change. This is where F# and Scott's ideas are so appealing. Designed so that illegal states are unrepresentable idea means the code matches the spec. If the business is getting wrong states/information, the spec needs updated because it is not correct. that is how all this is tying together for my attitudes and mental model."

