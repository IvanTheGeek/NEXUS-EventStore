text = "The trick is to create **invisible column anchors** that every slice connects to.  \nMermaid then keeps those anchors vertically aligned, which keeps your **UI | Behavior | Event** columns much more stable as the diagram grows.\n\nThink of it like creating **three invisible rails** that the boxes attach to.\n\n---\n\n# Column-Anchor Trick\n\n```mermaid\nflowchart TB\n\n%% ---- Invisible column anchors ----\nUI_COL[\" \"]:::hidden\nBEH_COL[\" \"]:::hidden\nEVT_COL[\" \"]:::hidden\n\nUI_COL --- BEH_COL --- EVT_COL\n\n\n%% ----- Slice 1 : Command -----\nsubgraph S1[\"Slice 1 — Command\"]\ndirection LR\nUI1[\"UI<br>Tap Log Laundry Expense\"]:::ui\nCMD1[\"Command<br>LogLaundryExpense\"]:::command\nEVT1[\"Event<br>LaundryExpenseLogged\"]:::event\nUI1 --> CMD1 --> EVT1\nend\n\nUI1 -.-> UI_COL\nCMD1 -.-> BEH_COL\nEVT1 -.-> EVT_COL\n\n\n%% ----- Slice 2 : Projection -----\nsubgraph S2[\"Slice 2 — Projection\"]\ndirection RL\nUI2[\"UI<br>View Expense History\"]:::ui\nPROJ2[\"Projection<br>ExpenseHistoryProjection\"]:::projection\nEVT2[\"Event<br>LaundryExpenseLogged\"]:::event\nEVT2 --> PROJ2 --> UI2\nend\n\nUI2 -.-> UI_COL\nPROJ2 -.-> BEH_COL\nEVT2 -.-> EVT_COL\n\n\n%% Force rows\nS1 ~~~ S2\n\n\n%% ---- Styles ----\nclassDef ui fill:#dddddd,stroke:#333;\nclassDef command fill:#cfe8ff,stroke:#333;\nclassDef projection fill:#d8f5d0,stroke:#333;\nclassDef event fill:#ffe6cc,stroke:#333;\nclassDef hidden opacity:0,stroke:none,fill:none;\n```\n\n---\n\n# What this does\n\nThe invisible nodes:\n\n```\nUI_COL | BEH_COL | EVT_COL\n```\n\nact like **alignment guides**.\n\nEach box lightly links to its guide:\n\n```\nUI box  → UI column\nBehavior box → Behavior column\nEvent box → Event column\n```\n\nBecause every slice references the same anchors, Mermaid tries to keep them **vertically aligned**.\n\n---\n\n# The resulting structure stays stable\n\n```\n           UI                Behavior                Event\n----------------------------------------------------------------\nSlice 1    Tap Expense  →    LogLaundryExpense  →    LaundryExpenseLogged\n\nSlice 2    View History ←    ExpenseProjection  ←    LaundryExpenseLogged\n```\n\nEven when you add more slices.\n\n---\n\n# Why this matters for your diagrams\n\nWithout anchors, Mermaid will start drifting like this once you add slices:\n\n```\nUI   Behavior        Event\n   UI  Behavior   Event\n```\n\nWith anchors, the grid stays much closer to:\n\n```\nUI | Behavior | Event\nUI | Behavior | Event\nUI | Behavior | Event\n```\n\nWhich matches the **event-modeling wall layout** often used by  \nentity[\"people\",\"Adam Dymitruk\",\"event modeling advocate\"].\n\n---\n\n💡 **Interesting observation:**  \nThe structure you're building naturally becomes a **slice matrix**:\n\n```\nrows   = slices\ncolumns = responsibilities\n```\n\n```\nUI | Behavior | Event\n```\n\nThat’s actually a very powerful way to **document vertical slice architecture**.\n\n---\n\nIf you'd like, I can also show a **very small improvement that makes the diagram look almost identical to your Penpot layout** (including column headers and much tighter row spacing). It’s one of the cleanest Mermaid patterns for event modeling."

