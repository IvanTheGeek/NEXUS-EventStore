text = "When people first learn graph theory they hear the **3 primitives**:\n\n```\nNode\nEdge\nProperty\n```\n\nBut large real-world **knowledge graphs** (like the one behind entity[\"software\",\"Google Knowledge Graph\",\"semantic knowledge base used in Google Search\"]) usually introduce **two additional primitives** to make the system workable at scale.\n\nSo the practical set becomes **five primitives**.\n\n---\n\n# 1. Node — a thing\n\nA **node** represents something that exists.\n\nExamples:\n\n```\nUser\nEmail\nBugReport\nButton\nOrderPlaced\nDiscordMessage\nForumPost\n```\n\nGraphically:\n\n```\n[BugReport]\n```\n\nNodes answer:\n\n```\nWhat thing are we talking about?\n```\n\n---\n\n# 2. Edge — a relationship\n\nEdges connect nodes.\n\nExamples:\n\n```\nauthored-by\nmentions\ncaused-by\ntriggers\nproduces\ncontains\n```\n\nExample:\n\n```\nBugReport ──mentions──► CheckoutButton\n```\n\nEdges answer:\n\n```\nHow are two things related?\n```\n\n---\n\n# 3. Property — data about a thing\n\nProperties attach values to nodes or edges.\n\nExample:\n\n```\nBugReport\n  severity = high\n  created = 2026-03-16\n```\n\nor\n\n```\nEmail\n  subject = \"Checkout failure\"\n```\n\nProperties answer:\n\n```\nWhat data describes the thing?\n```\n\n---\n\n# 4. Type (or Class)\n\nLarge graphs add **types** to classify nodes.\n\nExample:\n\n```\nBugReport ──is-a──► Issue\nForumPost ──is-a──► Discussion\nOrderPlaced ──is-a──► DomainEvent\nSubmitOrder ──is-a──► Command\n```\n\nThis creates a **taxonomy**.\n\n```\nCommand\n  └─ SubmitOrder\n\nDomainEvent\n  └─ OrderPlaced\n```\n\nTypes answer:\n\n```\nWhat category does this thing belong to?\n```\n\nWithout types, the graph becomes chaotic.\n\n---\n\n# 5. Provenance (or Source)\n\nThe fifth primitive tracks **where knowledge came from**.\n\nThis is extremely important for systems like your **LOGOS concept**.\n\nExample:\n\n```\nBugReport ──reported-in──► DiscordMessage\nDiscordMessage ──authored-by──► User\n```\n\nOr:\n\n```\nCheckoutButtonFailure\n   source = email\n```\n\nProvenance answers:\n\n```\nWhere did this information originate?\n```\n\nThis allows the graph to remain **trustworthy**.\n\n---\n\n# 6. The Five Practical Primitives\n\nSo real knowledge graphs often operate with:\n\n```\nNode        → thing\nEdge        → relationship\nProperty    → data\nType        → classification\nProvenance  → source of knowledge\n```\n\nThese are enough to represent **almost anything**.\n\n---\n\n# 7. How This Fits Your LOGOS Idea\n\nLOGOS ingests information from many sources:\n\n```\nemails\ndiscord\nforum posts\nbug reports\ngit commits\ndocumentation\n```\n\nEach item becomes graph structures.\n\nExample email:\n\n```\n\"Checkout button broken\"\n```\n\nGraph representation:\n\n```\nEmail123\n   │\n   ├─ authored-by → User42\n   ├─ mentions → CheckoutButton\n   └─ describes → BugReport98\n```\n\nProvenance ensures:\n\n```\nBugReport98\n   source → Email123\n```\n\nNow the system **knows where knowledge came from**.\n\n---\n\n# 8. How This Connects to ATLAS\n\nYour **ATLAS modeling IDE** would operate on this graph.\n\nInstead of writing code directly, the designer manipulates relationships:\n\n```\nSubmitButton ──triggers──► SubmitOrder\nSubmitOrder ──produces──► OrderPlaced\nOrderPlaced ──updates──► OrderView\n```\n\nMeanwhile LOGOS might show:\n\n```\nBugReports mentioning SubmitButton\n```\n\nATLAS then improves the model.\n\n---\n\n# 9. Where Git Fits\n\nThe history in entity[\"software\",\"Git\",\"distributed version control system\"] records **versions of the graph**.\n\nSo the system evolves like:\n\n```\nGraph v1\n   │\n   ▼\nGraph v2\n   │\n   ▼\nGraph v3\n```\n\nWhich matches your **Immutable Evolution** idea perfectly.\n\n---\n\n# 10. Mapping These to Your Nexus Naming\n\nSince you liked biological analogies, one possible mapping could be:\n\n```\nNucleus   → Node (entity)\nBridge    → Edge (relationship)\nGene      → Type (classification)\nFact      → Property (data)\nSource    → Provenance (origin)\n```\n\nThis keeps the system conceptually small but extremely powerful.\n\n---\n\n✅ **Key insight**\n\nYour system becomes a **living knowledge organism**:\n\n```\nLOGOS = information ingestion and learning\nNexus Graph = canonical knowledge structure\nATLAS = modeling environment manipulating that graph\nGit = evolution history of the graph\n```\n\n---\n\nIf you'd like, the next concept that will likely **unlock your entire architecture** is understanding the difference between:\n\n```\nproperty graphs\nRDF graphs\nhypergraphs\n```\n\nbecause choosing the wrong one early can make a system like Nexus either **beautifully simple** or **painfully complicated**."

