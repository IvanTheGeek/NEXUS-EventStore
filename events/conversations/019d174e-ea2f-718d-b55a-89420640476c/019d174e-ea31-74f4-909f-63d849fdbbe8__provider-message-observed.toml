kind = "plain_text"
text = "No, RAIDZ1 and RAIDZ2 don't strictly require equal-size drives, but you'll waste space on any larger drives in ways that make using mixed sizes impractical.\n\nHere's why this happens and what it means for your planning. When you create a RAIDZ vdev (the basic unit of a ZFS pool), ZFS looks at all the drives you give it and uses the size of the smallest drive as the usable capacity for all drives in that vdev. If you put a 4TB drive and three 8TB drives into a RAIDZ1 vdev, ZFS will only use 4TB from each of the 8TB drives. The remaining 4TB on those larger drives becomes completely unusable - not just wasted like RAID where you could partition it for something else, but actually invisible to ZFS in that configuration.\n\nThis happens because of how RAIDZ stripes data across drives. Unlike RAID 5 which works at the block level and doesn't care about filesystem boundaries, RAIDZ is integrated with the filesystem and needs to treat all drives in a vdev as a cohesive unit. The stripe widths and parity calculations depend on having predictable capacity across all drives. If ZFS tried to use the full capacity of different-sized drives, the math for where data lives and how to reconstruct it during a failure would become impossibly complex.\n\nNow, here's where ZFS gives you some flexibility that traditional RAID doesn't. You can create multiple vdevs of different sizes and add them all to the same pool. So if you had some 4TB drives and some 8TB drives, you could create one RAIDZ1 vdev from the 4TB drives and a separate RAIDZ1 vdev from the 8TB drives, then combine both vdevs into one storage pool. ZFS will write data across both vdevs, automatically balancing new writes based on free space. This is actually pretty elegant because you get to use all your capacity while still maintaining redundancy within each vdev group.\n\nHowever, there's an important caveat with this multi-vdev approach. The redundancy is per-vdev, not per-pool. If you lose too many drives from any single vdev (more than one drive in RAIDZ1, more than two in RAIDZ2), you lose all the data on that entire vdev, even though your other vdevs are fine. The pool becomes degraded and you'd need to restore that data. This is different from having one large vdev where the failure domain is the entire set of drives working together.\n\nFor your situation with those powerful RTX 3090s and 3070s, I'm guessing you're thinking about storage for your GPU inference system or your various development projects. If you're buying drives specifically for a ZFS setup, getting matched sizes makes your life much simpler. You get predictable capacity, simpler failure calculations, and you don't have to think about how data is distributed across vdevs of different sizes. If you already have a mix of drives from past builds and upgrades, the multi-vdev approach lets you use everything without waste, though you'll want to think carefully about the redundancy implications.\n\nAre you planning a new storage build, or trying to make use of existing drives you already have?"

