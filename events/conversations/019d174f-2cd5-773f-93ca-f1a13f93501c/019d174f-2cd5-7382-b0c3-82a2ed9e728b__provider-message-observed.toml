text = "Yes — **you can use `--no-ff` per merge command**, no global config required 👍\n\n---\n\n# ✅ One-time usage (most common)\n\n```bash\ngit merge --no-ff feature/add-login\n```\n\n👉 This applies **only to this merge**  \n👉 Your global Git config stays unchanged\n\n---\n\n# 🧠 Think of it like this\n\n- `--no-ff` = **instruction for this specific merge operation**\n- `git config merge.ff false` = **default behavior for all merges**\n\nSo you have full control at the **command level**\n\n---\n\n# 🔄 Overriding defaults (important nuance)\n\nEven if you *did* set a global default, you can override it per command:\n\n### If global is fast-forward (default):\n```bash\ngit merge --no-ff feature\n```\n\n### If global is no-ff:\n```bash\ngit merge --ff feature\n```\n\n👉 Command-line flags **always win**\n\n---\n\n# 🧩 Practical workflow\n\nThis is actually how many people work:\n\n- Use default (fast-forward)\n- Only force merge commits when it matters:\n\n```bash\ngit merge --no-ff feature/important-change\ngit merge hotfix/quick-fix   # fast-forward is fine\n```\n\n---\n\n# 🧠 In your model terms\n\nThis gives you **selective graph preservation**:\n\n- Use `--no-ff` → preserve the path (important slice/pattern)\n- Skip it → treat as simple continuation\n\nSo you’re deciding:\n\n> “Is this worth being a first-class branch in the truth graph?”\n\n---\n\n# ✅ Bottom line\n\n✔ Yes — `--no-ff` works per command  \n✔ No need to set anything globally  \n✔ You can mix and match based on intent  \n✔ CLI flags override config  \n\n---\n\nIf you want, I can help you define a rule like:\n\n> “When does a branch deserve to be preserved as a merge node vs flattened?”\n\nThat maps *really well* to your slice/pattern hierarchy."

