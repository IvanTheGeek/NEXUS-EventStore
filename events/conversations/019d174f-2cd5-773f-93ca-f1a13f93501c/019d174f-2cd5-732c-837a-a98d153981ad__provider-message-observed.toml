text = "If `try1` was **never merged into any kept branch**, then deleting `try1` means its commits are no longer on a normal named branch.\n\nSo the rule is:\n\n> **If you want to preserve failed experiment history, it must stay reachable by some ref.**\n\nA ref can be:\n- a branch\n- a tag\n- another branch that contains those commits\n\nIf you just delete `try1` and nothing else points to it, Git may still have it for a while, but that is **not** something to rely on. Eventually garbage collection can remove it.\n\n## What to do instead\n\n### Best simple option: tag the failed experiment\nIf you want GitHub’s active branch list clean, but still keep the failed path:\n\n```bash\ngit tag archive/try1 <commit-sha>\ngit branch -d try1\ngit push origin archive/try1\ngit push origin --delete try1\n```\n\nThat keeps the history reachable, but it is no longer a branch.\n\nYou can tag the tip of `try1` directly if you are on it:\n\n```bash\ngit tag archive/try1\n```\n\n## Another good option: move it under an archive branch name\nIf you want it to remain a branch, but clearly not active:\n\n```bash\ngit branch -m try1 archive/try1\ngit push origin archive/try1\ngit push origin --delete try1\n```\n\nThat keeps it as a branch, but out of your normal working names. It may still appear in GitHub branch listings, though.\n\n## Another option: keep an experiments archive branch\nYou could merge failed experiments into a long-lived archive branch:\n\n```bash\ngit checkout experiment-archive\ngit merge --no-ff try1\n```\n\nThen delete `try1`.\n\nThis preserves the path, but now the failed experiment becomes part of `experiment-archive`.\n\n## Important distinction\n\nYour successful path:\n\n- `try2` merged into `main` with `--no-ff`\n- delete `try2` branch after merge\n- history is preserved in `main`\n\nYour failed path:\n\n- `try1` not merged into `main`\n- if deleted with no tag/other branch pointing to it, its history is not safely preserved\n\n## Practical recommendation\n\nFor your case, I would use this pattern:\n\n- active work branches: `try1`, `try2`\n- successful merge: merge `try2` into `main` with `--no-ff`, then delete `try2`\n- failed experiment: create a tag like `archive/try1` or `failed/try1`, then delete branch `try1`\n\nThat gives you:\n- a clean active branch list\n- preserved history\n- explicit meaning that `try1` was exploratory and not chosen\n\n## Example full flow\n\n```bash\ngit checkout -b try1\n# ... experiment, not good\n\ngit checkout main\ngit checkout -b try2\n# ... better result\n\ngit checkout main\ngit merge --no-ff try2\n\ngit tag archive/try1 try1\ngit branch -d try2\ngit branch -d try1\n\ngit push origin main\ngit push origin archive/try1\ngit push origin --delete try2\ngit push origin --delete try1\n```\n\nThen:\n- `main` keeps the chosen path\n- `archive/try1` keeps the rejected path\n- neither `try1` nor `try2` stays in the active branch list\n\nIn your graph terms, `try2` becomes the chosen convergence into `main`, while `try1` is preserved as an abandoned exploration path via a tag instead of an active branch."

