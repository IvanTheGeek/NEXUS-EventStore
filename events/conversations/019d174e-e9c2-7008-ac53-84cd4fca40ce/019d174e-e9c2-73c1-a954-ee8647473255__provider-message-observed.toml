kind = "tool_result"
text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":\"toolu_01Dc7RdPtzMMhWhds5CD7krd\",\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Jonathan Ashford - Near Death Experiencer and Spritual Guide\",\"url\":\"https://www.jonathanashford.com\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"jonathanashford.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=jonathanashford.com\",\"site_name\":\"Jonathan Ashford\"},\"is_missing\":false,\"text\":\"As a Near Death Experiencer, Messenger, and Spiritual Guide, I help individuals understand the profound truths of existence. Drawing on the gift of knowledge I received from the other side during my NDE, I offer guidance that nurtures ...\\n\\nAs a Near Death Experiencer, Messenger, and Spiritual Guide, I help individuals understand the profound truths of existence. Drawing on the gift of knowledge I received from the other side during my NDE, I offer guidance that nurtures self-discovery, healing, and spiritual awakening. My purpose is to empower you to experience a true personal and spiritual expansion. ... Portions of my Near Death Experience were included in the book \\u201CNear Death Experiences Demystified\\u201D by Dr. Chuck Crisco\\u2014a thoughtful and deeply moving exploration of the spiritual truths revealed through near-death experiences. ... I have noticed big changes in my life since learning and adopting a spiritual practice from Jonathan. I\\u0027m happier, calmer, I feel much more complete, and much more like myself than I have in decades. ... He has reinforced many of the things I\\u0027m always believed such as abundant life after death, that indeed, we do have guardian angels, and our departed loved ones are around us all the time.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.jonathanashford.com\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Ep 21: What Dying Taught Jonathan Ashford About Living - That Spiritual Girl Next Door\",\"url\":\"https://www.buzzsprout.com/2380693/episodes/18018369-ep-21-what-dying-taught-jonathan-ashford-about-living\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"buzzsprout.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=buzzsprout.com\",\"site_name\":\"Buzzsprout\"},\"is_missing\":false,\"text\":\"What really happens when you die ... sits down with Jonathan Ashford, a former C-level executive who flatlined for three hours after organ failure and came back completely transformed....\\n\\nWhat really happens when you die \\u2014 and how can that experience change the way you live?In this episode, Kelly sits down with Jonathan Ashford, a former C-level executive who flatlined for three hours after organ failure and came back completely transformed. His near-death experience (NDE) rewired everything \\u2014 his understanding of love, time, source energy, and what actually matters in this life.Jonathan shares what it felt like to meet the Divine, what his life review taught him, and how those lessons now guide his work as an intuitive reader and spiritual coach. He even offers simple, practical ways to connect to the \\u201Cother side\\u201D \\u2014 without, you know\\u2026 having to die first.This is one of the most insightful, moving conversations we\\u2019ve ever had on That Spiritual Girl Next Door \\u2014 full of humor, heart, and wisdom you\\u2019ll want to replay again and again.Topics include:Near-death experiences (NDEs) \\u0026 life after deathIntuitive connection, surrender, and self-loveThe Divine Feminine and the cosmi\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.buzzsprout.com/2380693/episodes/18018369-ep-21-what-dying-taught-jonathan-ashford-about-living\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Journal of Exceptional Experiences and Psychology\",\"url\":\"https://philarchive.org/archive/SELTAT-8\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"philarchive.org\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=philarchive.org\",\"site_name\":\"PhilArchive\"},\"is_missing\":false,\"text\":\"OBE/NDE like experience for the purpose of advancing personal growth of his clients. During lucid dream- ing, the experiencer is asleep but aware of the fact that he/she is dreaming. Lucid dreamers can further navi- gate ... Although different intensities of OBEs may be distressing to one degree ...\\n\\nPsychiatric Association, 1994). Based on this diagnostic category spiritual problems such as mystical experi- ences, near-death experiences (NDEs), OBEs, kundalini opening, alien encounters, etc. may for the first time \\u00B7 be officially treated as non-pathological rather than pathological problems. According to Keri (2017) spiritual experiences may be accompanied by pathological symptoms such as \\u00B7 hallucinations, odd behavior, depression and or odd thoughts. Therefore, individuals suffering from such \\u00B7 symptoms may be misdiagnosed with mental illness. According to Grof, spiritual and mystical experiences \\u00B7 have a personal growth potential. They can trigger a powerful transformation and further personal develop- ment in individuals undergoing such experiences (Grof \\u0026 Grof, 1990; Grof, 1989). Mislabeling them as patho- logical symptoms may be damaging to further spiritual development as well as psychological and physiologi- ...\\n\\nOBE/NDE like experience for the purpose of advancing personal growth of his clients. During lucid dream- ing, the experiencer is asleep but aware of the fact that he/she is dreaming. Lucid dreamers can further navi- gate ... Although different intensities of OBEs may be distressing to one degree or another, they may not nec- essarily be of pathological nature. Having an OBE does not automatically mean that experiencer suffers from a \\u00B7 psychosis. It is my belief that spiritually based OBEs may be considered profound transformational experienc- es and/or spiritual problems experienced by those who undergo spiritual emergence or its more intensive form- spiritual emergency. They may or may not have features resembling psychosis. There is a number of authors \\u00B7 implicating resemblance between paranormal experiences and pathological states such as psychosis.\\n\\nNDE/OBE related contact modality with NHI. Furthermore, The Experiencer survey showed that 1,950 or 81% of the respondents who took the Phase 1 survey experienced OBE (Hernandez et al. 2018). Vol. 6 No. 2 ... OBEs are oftentimes experienced by individuals who undergo STEs or NOTEs. In the study on NOTEs \\u00B7 and their aftereffects, Dr. Nicole Gruel describes a case of a woman whose spontaneous OBEs triggered deep \\u00B7 transformative experiences (Gruel, 2017). The process of the psychic opening of the woman culminated in a \\u00B7 period during which she was able to function in a profound altered state of consciousness for the period of ... near death experience, meditation related experience, kundalini awakening, psychic opening, visionary experi- ence, alien encounters, other spiritual problems, etc. John has experienced all spiritual experiences mentioned \\u00B7\\n\\ntherefore posits that transpersonal therapists should view OBEs as experiences with potential spiritual tran- scendence. Furthermore, De Foe (2012) suggests that since both near-death experiences (NDEs) and OBEs are \\u00B7 transformative experiences that may have a significant impact on individual\\u0027s psychological well being, expe- riencers should be encouraged to openly talk about their extraordinary experiencers within a counseling set- ... In addition, some therapists are interested in the potential healing element of the OBE and have intro- duced techniques aimed at helping a client during the therapy session to trigger an out of body like experience \\u00B7 by artificial means. The aim is to encourage spiritual as well as personal development a transformative OBE \\u00B7 may offer. However, there is little research done so far linking the therapeutic utilization of \\u0022artificial\\u0022 OBEs \\u00B7\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://philarchive.org/archive/SELTAT-8\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Aftereffects of the Near Death Experience | Psychology Today\",\"url\":\"https://www.psychologytoday.com/us/blog/understanding-grief/201803/aftereffects-the-near-death-experience\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"psychologytoday.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=psychologytoday.com\",\"site_name\":\"Psychology Today\"},\"is_missing\":false,\"text\":\"Most commonly, there is an initial out of body experience (OBE) in which the person perceives themselves floating above their body. Next, the individual often experiences going through a dark tunnel at the end of which is a bright divine light.\\n\\nSince 1975, and the publication of Raymond Moody\\u2019s book Life After Life, much of the conversation has centered on the Near Death Experience (NDE). Given the number of documented accounts from all over the world, it is hard to dismiss the reality of the experience. But is it a function of a dying brain or a spiritual experience proving there is an afterlife? What is an NDE? An NDE occurs when a person is close to death or pronounced dead. However, some people have also had these experiences and have not been close to death. Most commonly, there is an initial out of body experience (OBE) in which the person perceives themselves floating above their body. Next, the individual often experiences going through a dark tunnel at the end of which is a bright divine light. There is a reunion with loved ones who have died before and a return to the body. In Michael Shermer\\u2019s new book, Heavens on Earth, he presents all the reasons why the NDE is not a spiritual experience but hallucinations from t\\n\\nThe event is so profound that it often does alter the experiencer\\u2019s life. Perhaps the most common after-effect of an NDE is the loss of the fear of death and a strengthened belief in the afterlife. There is typically a new awareness of meaning and purpose in experiencers\\u0027 lives. A new sense of self with increased self-esteem is reported. Experiencers also show a marked change in their attitude, not only toward their own life but toward the lives of others as well. They tend to be more open, caring, and loving. However, they may also reexamine their existing relationships, ending some that are now not compatible with their new beliefs and attitudes. The experiencer and family members are often confused by this \\u201Cnew person\\u201D and adjustment problems do arise. Families can have a difficult time adjusting to the new normal. Divorce is fairly common in couples where one partner has experienced an NDE.[2] Another common side effect is that experiences can become highly intuitive and often repo\\n\\nJeff Long, M.D., founder of the NDERF (Near Death Experience Research Foundation) website states, \\u201CSome NDE researchers believe that significant physiological changes are common after NDEs. I am not observing that in my research, and neither are most other researchers. The only well-conducted study that was suggestive of a physiological aftereffect following NDE involved electrical sensitivity. This was published in the Journal of Near-Death Studies several years ago. The article stated that electrical sensitivity following NDEs was not established, only that their evidence was suggestive. There has been very little good research in the possible physiological aftereffects of NDEs.\\u201D (Personal communication.) The aftereffects of an NDE are many and complex. They impact every aspect of the experiencer\\u2019s functioning. It often takes years for individuals to incorporate these changes.\\n\\nThis can easily be changed by asking anyone who has been close to death, on awakening, if they had any unusual or strange experiences while they were unconscious. If they did and want to talk about it, it is important that one listens to what is said and respond in a nonjudgmental manner. Let them talk and ask them what the experience meant to them. According to Dr. Long, 95.6 percent of experiencers believe that what happened to them was definitely real. Indeed, they will often describe it as \\u201Crealer than real.\\u201D ... Working with a therapist can help those who have had an NDE integrate these experiences into their day-to-day life. There are many books written by those who have had this experience that they can read. Referrals to groups for experiencers are helpful to decrease their feelings of isolation from others. Online groups are also available.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.psychologytoday.com/us/blog/understanding-grief/201803/aftereffects-the-near-death-experience\",\"search_provider\":\"anthropic\",\"age\":\"March 12, 2018\"}},{\"type\":\"knowledge\",\"title\":\"HOME | BEING JOHN ASHFORD\",\"url\":\"https://www.beingjohnashford.com/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"beingjohnashford.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=beingjohnashford.com\",\"site_name\":\"BEING JOHN ASHFORD\"},\"is_missing\":false,\"text\":\"I began my spiritual journey at the of age 13, by entering Precious Blood Seminary, a sect of Catholic missionaries \\u0026quot;dedicated to creating communities of hope based on the interconnectedness of all...building community through the inclusion of the marginalized, walking in solidarity with those who suffer, and to seeking reconciliation in a divided world.\\u0026quot; ... Each month brings unique themes and messages tailored to the collective energy, making every session a fresh and enlightening experience.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.beingjohnashford.com/\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Near-Death Experiences: Neuroscience Perspectives on Near-Death Experiences - PMC\",\"url\":\"https://pmc.ncbi.nlm.nih.gov/articles/PMC6170042/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"nih.gov\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=nih.gov\",\"site_name\":\"PubMed Central\"},\"is_missing\":false,\"text\":\"Directly stimulating the temporoparietal cortex with a small electrical current evokes OBE,14, 15 arguably by disturbing the integration of visual, proprioceptive and motion senses into the coherent self. In the laboratory or operating room, the neurophysiologist can bring a patient in and out-of-body, back and forth with the flip of a switch. (See Figure 2.) ... Directly stimulating the temporoparietal cortex with a small electrical current evokes out-of-body experience. In the laboratory the neurophysiologist can bring a patient in and out-of-body, back and forth with the flip of a switch. In young healthy adults, out-of-body experience accompanies the sleep paralysis of REM intruding into waking consciousness. As important as NDE has now become, another variety of spiritual experience reigns supreme by the fact that it is always and exclusively spiritual, and consequently the most historically influential variety serving as the \\u201Croot and center\\u201D for organized religions of nearly eve\\n\\nDirectly stimulating the temporoparietal cortex with a small electrical current evokes OBE,14, 15 arguably by disturbing the integration of visual, proprioceptive and motion senses into the coherent self. In the laboratory or operating room, the neurophysiologist can bring a patient in and out-of-body, back and forth with the flip of a switch. (See Figure 2.) ... Directly stimulating the temporoparietal cortex with a small electrical current evokes out-of-body experience. In the laboratory the neurophysiologist can bring a patient in and out-of-body, back and forth with the flip of a switch. In young healthy adults, out-of-body experience accompanies the sleep paralysis of REM intruding into waking consciousness. As important as NDE has now become, another variety of spiritual experience reigns supreme by the fact that it is always and exclusively spiritual, and consequently the most historically influential variety serving as the \\u201Croot and center\\u201D for organized religions of nearly eve\\n\\nToday\\u2019s early 21st century view of these NDE starts by first training our gaze on near-death\\u2019s many overlooked scientific truths; some facts deliberately ignored and others simply neglected. So far, inundating the public with near-death topics has most served to reinforce media stereotypes rather than rooting out mistaken ideas. For half of the instances of \\u201Cnear-death\\u201D the term is a misnomer because the person does not face imminent death. An excellent but seldom cited study examined the medical records of 58 people who experience near-death.2 Twenty-eight of those had a true medical crisis, while the other 30 were not medically endangered at the time. Surprisingly, the results showed almost identical experiences in both groups. Regardless of danger, people went through a tunnel, and had similar thoughts and emotions. Sixty-eight percent of all subjects had an out-of-body experience (OBE) whether they were medically near-death or not.\\n\\nA central tenet of neuroscience holds that all human experience arises from the brain,25 akin to the Germ Theory of Disease and the Theory of Evolution in other branches of science. So far, the narratives of NDE fit securely within the framework of conventional neuroscience. Sometimes I hear that neuroscience fails to explain a part of someone\\u2019s recollection of their NDE; after allowing for selective, suggestible, reconstructed and imperfect memory as well as the difficulty of knowing when in the crisis an experience occurred, nothing about NDE, including OBE, offers objective evidence that consciousness can exist without a living brain. Extraordinary claims require extraordinary evidence and here not even the most ordinary objective data supports the bold assertion of human consciousness outside the brain. When more facts become known in \\u201Cunexplained\\u201D cases, a plausible neuroscience explanation has always been found.\\n\\nAnother frequently overlooked fact is the long established relationship between out-of-body and REM consciousness. Narcolepsy is a boundary of consciousness disorder whereby the afflicted suffer from REM frequently intruding into waking consciousness. Narcoleptics are very prone to out-of-body experience,27, 29, 30 especially during sleep paralysis. The frequency of out-of-body wanes as the narcolepsy is treated. Out-of-body also appears in lucid dreams31 \\u2013 a special expression of dreaming wherein the dreamer maintains insight while dreaming. In young healthy adults, OBE accompanies the sleep paralysis of REM intruding into waking consciousness.32 (See Table 2.) The selective temporoparietal activity that normally takes place during REM33 neatly explains the strong link between REM consciousness and OBE. REM intrusion further explains the gripping feature of out-of-body often central to the NDE narrative and common in syncope.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://pmc.ncbi.nlm.nih.gov/articles/PMC6170042/\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"40\\u002B \\u0022Jonathan Ashford\\u0022 profiles\",\"url\":\"https://linkedin.com/pub/dir/Jonathan/Ashford\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"linkedin.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=linkedin.com\",\"site_name\":\"LinkedIn\"},\"is_missing\":false,\"text\":\"1 billion members | Manage your professional identity. Build and engage with your professional network. Access knowledge, insights and opportunities.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://linkedin.com/pub/dir/Jonathan/Ashford\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Near-Death Experiences: A Beginner\\u0027s Guide \\u2014 Spiritual Energy Today\",\"url\":\"https://spiritualenergytoday.com/near-death-experiences-a-beginners-guide/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"spiritualenergytoday.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=spiritualenergytoday.com\",\"site_name\":\"Spiritualenergytoday\"},\"is_missing\":false,\"text\":\"An out-of-body experience (OBE), according to MD and radiation oncologist Kenneth Ring, is common in NDEs. But it happens in other settings too. Fainting, alcohol or drug use, and deep sleep are some of the settings where OBE can arise. ... While people may fall under the notion that NDEs are more prevalent in spiritually inclined people, many others have stories. Including physicians and non-believers. In a study with 14 blind from birth participants, nine of them reported that they experienced a highly visual NDE. This is consistent among non-blind experiencers who claim that their vision falls more in line with the supernatural. One account mentioned: \\u201CFor the first time I was able to see leaves on trees, bird\\u2019s feathers, bird\\u2019s eyes, details on telephone poles, and what was in people\\u2019s back yards. I was seeing far better than 20/20 vision.\\u201D \\u00B7\\n\\nAn out-of-body experience (OBE), according to MD and radiation oncologist Kenneth Ring, is common in NDEs. But it happens in other settings too. Fainting, alcohol or drug use, and deep sleep are some of the settings where OBE can arise. ... While people may fall under the notion that NDEs are more prevalent in spiritually inclined people, many others have stories. Including physicians and non-believers. In a study with 14 blind from birth participants, nine of them reported that they experienced a highly visual NDE. This is consistent among non-blind experiencers who claim that their vision falls more in line with the supernatural. One account mentioned: \\u201CFor the first time I was able to see leaves on trees, bird\\u2019s feathers, bird\\u2019s eyes, details on telephone poles, and what was in people\\u2019s back yards. I was seeing far better than 20/20 vision.\\u201D \\u00B7\\n\\nFor an astonishingly large amount of people, their consciousness doesn\\u2019t fade to black completely. They retain a tiny semblance of awareness, but not of the kind that\\u2019s human and complete. Instead, it\\u2019s an out-of-body experience, a near-death experience that\\u2019s spiritual, fleeting, calming, and ultimately life-changing. Let\\u2019s look through the stages of an NDE and some popular near-death experience cases. ... NDEs are profound spiritual occurrences where one teethers close to death and, through ambiguous reasons, retains memories of the experience. Typically, NDErs feel more spiritually awakened after the events. This can happen across all cultures, religions, and ages- from the elderly to children. Some studies say that the patient\\u2019s brain undergoes an approaching psychological reaction towards death. But the research still can\\u2019t explain how these people suffering from cardiac arrest were able to develop complex scenarios.\\n\\nKenneth Ring posited that an NDE falls on a five-stage continuum. These subdivisions consist of the following: ... As for the after-effects, one may experience a severe shift in their personality. Some notable characteristics include shared commonalities among survivors. These include a greater appreciation for life, less materialism, more spirituality, more compassion for others, and better intuition. There are two types of NDEs: Heavenly and Hellish Near Death Experiences. Heavenly experiences are the more common episodes patients face. Surprisingly, the NDEs experienced by people aren\\u2019t based on how good they\\u2019ve been here on earth. Saint-like people have reported experiencing Hellish NDEs, while criminals and miscreants have faced Heavenly NDEs. A comforting and mystically familiar presence starts to envelop you: it\\u2019s of tunnels and angelic light and phantasms of people past.\\n\\nTheir reports show that some people have a 20% chance of experiencing a dark NDE with a hellish theme. At the start of their spiritual consciousness, they experience what is the antipode of the heavenly near-death experience. It\\u2019s a malevolent, dark, and distressing human experience for the patient. So much so that, once they get resuscitated, they develop new adaptive patterns to process this. ... He or she changes; becomes ultra-religious to compensate for their sinful acts on Earth. Tell and convince themselves that the NDE is not real. Engage in long-term psychotherapy to process the mind and brain function. ... People who\\u2019ve experienced a near-death experience, like heart failure or cardiac arrest survivors, follow a similar pattern throughout their ordeal. While not all patients recount each part in vivid detail, there may be a chance that they\\u2019d report the following: After some time, many report a sweeping relief from the pain in their bodies \\u00B7\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://spiritualenergytoday.com/near-death-experiences-a-beginners-guide/\",\"search_provider\":\"anthropic\",\"age\":\"July 8, 2021\"}},{\"type\":\"knowledge\",\"title\":\"Out-of-body experience - Wikipedia\",\"url\":\"https://en.wikipedia.org/wiki/Out-of-body_experience\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"wikipedia.org\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=wikipedia.org\",\"site_name\":\"Wikipedia\"},\"is_missing\":false,\"text\":\"Another form of spontaneous OBE is the near-death experience (NDE). Some subjects report having had an OBE at times of severe physical trauma such as near-drownings or major surgery. Near-death experiences may include subjective impressions of being outside the physical body, sometimes visions of deceased relatives and religious figures, and transcendence of ego and spatiotemporal boundaries. The experience typically includes such factors as: a sense of being dead; a feeling of peace and painlessness; hearing of various non-physical sounds, an out-of-body experience; a tunnel experience (the sense of moving up or through a narrow passageway); encountering \\u0026quot;beings of light\\u0026quot; and a God-like figure or similar entities; being given a \\u0026quot;life review\\u0026quot;, and a reluctance to return to life. Along the same lines as an NDE, extreme physical effort during activities such as high-altitude climbing and marathon running can induce OBEs.\\n\\nAnother form of spontaneous OBE is the near-death experience (NDE). Some subjects report having had an OBE at times of severe physical trauma such as near-drownings or major surgery. Near-death experiences may include subjective impressions of being outside the physical body, sometimes visions of deceased relatives and religious figures, and transcendence of ego and spatiotemporal boundaries. The experience typically includes such factors as: a sense of being dead; a feeling of peace and painlessness; hearing of various non-physical sounds, an out-of-body experience; a tunnel experience (the sense of moving up or through a narrow passageway); encountering \\u0022beings of light\\u0022 and a God-like figure or similar entities; being given a \\u0022life review\\u0022, and a reluctance to return to life. Along the same lines as an NDE, extreme physical effort during activities such as high-altitude climbing and marathon running can induce OBEs.\\n\\nOn October 6, 2014, the results of the study were published in the journal Resuscitation. Less than 20% of cardiac arrest patients were able to be interviewed, as most of them died or were too sick even after successful resuscitation. Among those who reported a perception of awareness and completed further interviews, 46% experienced a broad range of mental recollections in relation to death that were not compatible with the commonly used term of NDEs. These included fearful and persecutory experiences. Only 9% had experiences compatible with NDEs and 2% exhibited full awareness compatible with OBEs with explicit recall of \\u0027seeing\\u0027 and \\u0027hearing\\u0027 events. One case was validated and timed using auditory stimuli during cardiac arrest. According to Caroline Watt \\u0022The one \\u0027verifiable period of conscious awareness\\u0027 that Parnia was able to report did not relate to this objective test.\\n\\nWriters in the fields of parapsychology and occultism have written that OBEs are not psychological and that a soul, spirit or subtle body can detach itself from the body and visit distant locations. Out-of-the-body experiences were known during the Victorian period in spiritualist literature as \\u0022travelling clairvoyance\\u0022. In old Indian scriptures, such a state of consciousness is also referred to as Turiya, which can be achieved by deep yogic and meditative activities, during which yogis may be liberated from the duality of mind and body, allowing them to intentionally leave the body and then return to it. The body carrying out this journey is called \\u0022Vigyan dehi\\u0022 (\\u0022Scientific body\\u0022). The psychical researcher Frederic Myers referred to the OBE as a \\u0022psychical excursion\\u0022. An early study that described alleged cases of OBE was the two-volume Phantasms of the Living, published in 1886 by the psychical researchers Edmund Gurney, Myers, and Frank Podmore.\\n\\nThey also discovered that the tennis shoe was easy to observe from outside the building and suggested that Maria may have overheard a comment about it during her three days in the hospital and then incorporated it into her OBE. They concluded \\u0022Maria\\u0027s story merely reveals the naivet\\u00E9 and the power of wishful thinking\\u0022 from OBE researchers seeking a paranormal explanation. Clark did not publish the description of the case until seven years after it happened, casting doubt on the story. Richard Wiseman has said that although the story is not evidence for anything paranormal it has been \\u0022endlessly repeated by writers who either couldn\\u0027t be bothered to check the facts, or were unwilling to present their readers with the more skeptical side of the story.\\u0022 Clark responded to the accusations made in a separate paper. Astral projection is a paranormal interpretation of out-of-body experiences that assumes the existence of one or more non-physical planes of existence and an associated body beyo\\n\\nAstral projection is often experienced as the spirit or astral body leaving the physical body to travel in the spirit world or astral plane. Early collections of OBE cases had been made by Ernesto Bozzano (Italy) and Robert Crookall (UK). Crookall approached the subject from a spiritualistic position, and collected his cases predominantly from spiritualist newspapers such as the Psychic News, which appears to have biased his results in various ways. For example, the majority of his subjects reported seeing a cord connecting the physical body and its observing counterpart; whereas Green (see below) found that less than 4% of her subjects noticed anything of this sort, and some 80% reported feeling they were a \\u0022disembodied consciousness\\u0022, with no external body at all. The first extensive scientific study of OBEs was made by Celia Green (1968). She collected written, first-hand accounts from a total of 400 subjects, recruited by means of appeals in the mainstream media, and followed up by\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://en.wikipedia.org/wiki/Out-of-body_experience\",\"search_provider\":\"anthropic\",\"age\":\"January 5, 2026\"}},{\"type\":\"knowledge\",\"title\":\"NDE \\u2013 A Spiritual Perspective Of Near Death Experiences | Confluence Media\",\"url\":\"https://confluencemedia.wordpress.com/2016/11/01/nde-near-death-experiences/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"wordpress.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=wordpress.com\",\"site_name\":\"Confluence Media\"},\"is_missing\":false,\"text\":\"Doctors who have been conducting research on NDE over the past few decades have in their studies noted that in the Out of Body Experience (OBE) state, many who have \\u2018physically\\u2019 died can, on revival, tell the doctors, nurses, operation room team and relatives exactly what they were saying or doing during the revival process from apparent death or from unconsciousness \\u2013 both conditions in which a person is not physically active enough to see or hear what is going on around them. Many actually hear the doctors announcing them dead. Many of the patients who have been revived are able to describe in great technical detail exactly what went on in the operating room while they were supposedly unconscious or dead. e.g. A 44-year old patient, while in a deep coma, later told the doctor that a particular nurse had placed his dentures on the side. The patient accurately described the revival room, those in the room, as well as describing the attitude in the room that everyone was close to giving\\n\\nA very interesting phenomenon that closely points not only to the existence of the soul and Supreme Soul but also to their form and qualities is the phenomenon of Near Death Experience (NDE) and Ou\\u2026\\n\\nThe most incredible common feature in the majority of NDE and OBE experiences, as stated by the ones who go through the experience, is a meeting with a very bright light. This light is normally a highly radiant golden-white light, a powerful spiritual being of light. Usually, the experience involves being drawn into darkness through a tunnel, at an extremely high speed, until reaching this light. This feature, without doubt, has the deepest impact upon the Near Death Experiencer (NDEr). In the medical research studies conducted, very different kinds of tunnels are described by NDErs. The commonest one is a void, a blackness: a floating, a moving, a going towards the light. The structure of the tunnel, if anything, is minimal. One person had a tunnel in the form of a great big pipe. Other people go through swirling, whirling tunnels, but they themselves do not turn; the tunnel simply turns around them, while they themselves float through it.\\n\\nA very interesting phenomenon that closely points not only to the existence of the soul and Supreme Soul but also to their form and qualities is the phenomenon of Near Death Experience (NDE) and Out Of Body Experience (OBE). A near-death experience (NDE) is the experience reported by a person who nearly died or who was medically dead and then revived or in a situation where death is likely or expected. Some of the common circumstances in which an NDE can occur are: serious illness such as cardiac arrest or brain hemorrhage; ... injury, such as from a car accident, shock, electrocution, asphyxia (condition which results from interruption of respiration due to suffocation or drowning); ... The most important feature of an NDE is that the person\\u2019s consciousness is not in his or her physical body. It might function independently of brain activity, which suggests the existence of the soul.\\n\\nDoctors who have been conducting research on NDE over the past few decades have in their studies noted that in the Out of Body Experience (OBE) state, many who have \\u2018physically\\u2019 died can, on revival, tell the doctors, nurses, operation room team and relatives exactly what they were saying or doing during the revival process from apparent death or from unconsciousness \\u2013 both conditions in which a person is not physically active enough to see or hear what is going on around them. Many actually hear the doctors announcing them dead. Many of the patients who have been revived are able to describe in great technical detail exactly what went on in the operating room while they were supposedly unconscious or dead. e.g. A 44-year old patient, while in a deep coma, later told the doctor that a particular nurse had placed his dentures on the side. The patient accurately described the revival room, those in the room, as well as describing the attitude in the room that everyone was close to giving\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://confluencemedia.wordpress.com/2016/11/01/nde-near-death-experiences/\",\"search_provider\":\"anthropic\",\"age\":\"November 1, 2016\"}}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":\"globe\",\"display_content\":null}"

