text = "Good, solid picture now. Here's what's relevant:\n\n**Darius J. Wright** — Australian OBE explorer, active primarily through YouTube, podcasts (Next Level Soul with Alex Ferrari, Guy Lawrence, Inspire Nation), and his own website at dariusjwright.com. He's been doing OBEs since childhood and developed a teachable method called **the AYDA Method**.\n\nKey cosmological claims from his OBE explorations relevant to our conversation:\n\n- **Earth as a construct** — a self-contained realm created specifically to generate experiences not available in a full divine state. Your \"exhibit\" description is accurate to his framework.\n- **The forgetting is intentional** — the veil of forgetfulness is built into the construct, obscuring soul memory deliberately.\n- **OBE = controlled NDE** — he frames them as the same state, just consciously induced rather than crisis-triggered, which is a significant methodological claim.\n- **Multiple realms** — he describes 12 realms and other races/beings operating within and beyond the construct.\n- **Unconditional acceptance on the other side** — aligns with NDE life review data from IANDS/NDERF.\n- **The construct was created from unconditional love** — not a trap or punishment, despite its difficulty.\n\nHe maps closely onto Monroe in framework but arrives independently through lived experience rather than structured research. Worth noting as a contemporary, active source.\n\nWhat's your next question?"

