text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":\"toolu_013g5LMg3ciigeeo5iyjAChf\",\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"What They\\u2019ve HIDDEN from Us! Unveiling the Realms \\u0026 Wisdom of the Ancients | Darius J. Wright - Guy Lawrence\",\"url\":\"https://www.guylawrence.com.au/unveiling-the-realms-wisdom-of-the-ancients-darius-j-wright/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"guylawrence.com.au\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=guylawrence.com.au\",\"site_name\":\"Guy Lawrence\"},\"is_missing\":false,\"text\":\"#321 In this podcast episode, Guy talked with Darius J. Wright, who shared insights on these topics including the creation and structure of the universe, realms, and the heavens. The discussion centers on profound spiritual themes such as the awakening of the soul, the nature of reality, and out-of-body experiences (OBE). They discussed the historical and biblical recognition of these constructs. Darius talked about his personal journey, his ability to control OBEs, and the process involved. They delved into concepts like the body\\u2019s limitations, the role of memories, and accessing deeper layers of existence. Darius also explained the importance of seeing the truth for oneself and how these experiences can dissolve fear and expand one\\u2019s consciousness. The conversation highlights the significance of practical experiences and encourages viewers to explore these deeper spiritual elements themselves.\\n\\n#321 In this podcast episode, Guy talked with Darius J. Wright, who shared insights on these topics including the creation and structure of the universe, realms, and the heavens. The discussion centers on profound spiritual themes such as the awakening of the soul, the nature of reality, and out-of-body experiences (OBE). They discussed the historical and biblical recognition of these constructs. Darius talked about his personal journey, his ability to control OBEs, and the process involved. They delved into concepts like the body\\u2019s limitations, the role of memories, and accessing deeper layers of existence. Darius also explained the importance of seeing the truth for oneself and how these experiences can dissolve fear and expand one\\u2019s consciousness. The conversation highlights the significance of practical experiences and encourages viewers to explore these deeper spiritual elements themselves.\\n\\nAbout Darius: Darius J Wright is a prolific OBE (Out-of-Body Experience) explorer, respected teacher, and philosopher dedicated to unraveling the truth of the unseen realms and the other side through the out-of-body state. His profound insights into the nature of reality, coupled with transformative experiences, have positioned him as a leading figure in the exploration of consciousness. Darius explores the nature of our reality and continues to map out the intricacies of both our existence and the other side through the out-of-body state. He is on a mission to show people that THE OTHER SIDE CAN BE ACCESSED AT WILL, RIGHT HERE, RIGHT NOW. His experience demonstrates, along with testimonials from those studying his method, that an OBE is a controlled NDE (Near-Death Experience), where individuals can consciously navigate the realms beyond the physical.\\n\\nAnd I appreciate you coming on and starting to share some of the insights that you\\u2019ve gained from your experiences. And I have no doubt the people listening from the pod, my regular listeners will, will have their minds clearly open and curious for everything you\\u2019ve shared today. So, um, thanks, man. Darius: Yeah. Well, hope it helps you and people that are listening. So yeah. I appreciate it. Guy: Wait. If people want to find out more about your work, mate, and you have a website, you have things we can link in the show notes anyway, is there anything you\\u2019d like us to ... Yeah. Just, just any, everything that I do. It\\u2019s just like the mission, it\\u2019s just, it\\u2019s just on my website, but, um, I\\u2019m not, I\\u2019m not really, I don\\u2019t even like necessarily promoting that. Just, just look up my name, Darius J. Wright, and find the information that you need to at that point.\\n\\nDarius: Yeah. Well, what got you into it and then what got you to sort of invite me, even on, you know, pretty much, I was curious to. Yeah, look, I\\u2019m always open to finding interesting stories and relatable guests that come on the show and people do let me know, have you checked this person out? Have you checked that person out? And I believe someone somewhere emailed me or something and tagged me in one of your videos. I\\u2019ve met Alex Ferrari once at a conversation with him on Next Level Soul, who was very helpful. to me with my YouTube channel, actually. He was very generous with his time. And through those conversations, different people come up and I caught glimpses of you talking about out of body experiences.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.guylawrence.com.au/unveiling-the-realms-wisdom-of-the-ancients-darius-j-wright/\",\"search_provider\":\"anthropic\",\"age\":\"September 4, 2024\"}},{\"type\":\"knowledge\",\"title\":\"The Man Has Out-Of-Body Experiences and Claims Every Human Can Visit the Other Side At Will | by El Creativo | Exploring Near-Death Experiences (\\u002B other consciousness concepts) | Medium\",\"url\":\"https://medium.com/the-neville-goddard-manifestation-club/the-man-has-out-of-body-experiences-and-claims-every-human-can-visit-the-other-side-at-will-1e7816eb0f00\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"medium.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=medium.com\",\"site_name\":\"Medium\"},\"is_missing\":false,\"text\":\"Darius J. Wright \\u2014 image from Life after Life NDE \\u00B7 Darius J. Wright has been traveling to the other side his whole life. As a child, he would slip out of his body without understanding what was happening. He thought everyone could do it.\\n\\nDarius J. Wright \\u2014 image from Life after Life NDE \\u00B7 Darius J. Wright has been traveling to the other side his whole life. As a child, he would slip out of his body without understanding what was happening. He thought everyone could do it. It wasn\\u2019t until he got older that Darius learned that he could control when he left his body. He could choose where to go and what to see. Most people only get the chance to see the other side during NDEs. But Darius has learned to visit whenever he wants. He calls it a controlled near-death experience. What Darius found on the other side surprised him. Many people think the spirit world is just a realm of floating ghosts. But that\\u2019s not what he experienced. It\\u2019s all the realism of physicality with no limitations. When your soul crosses over, you can still touch things. You can feel everything. Darius discovered that our physical world is contained within something much larger.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://medium.com/the-neville-goddard-manifestation-club/the-man-has-out-of-body-experiences-and-claims-every-human-can-visit-the-other-side-at-will-1e7816eb0f00\",\"search_provider\":\"anthropic\",\"age\":\"June 29, 2025\"}},{\"type\":\"knowledge\",\"title\":\"The Out of Body Experience: Accessing the Unseen Realms | Darius J. Wright\",\"url\":\"https://dariusjwright.com/the-out-of-body-experience-accessing-the-unseen-realms/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"dariusjwright.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=dariusjwright.com\",\"site_name\":\"Darius J. Wright\"},\"is_missing\":false,\"text\":\"OBE Realm Explorer Talks About THE END Of The Simulation, The Nature Of Reality \\u0026amp; More! Podcast guest 787 is Darius J. Wright, prolific OBE explorer, delving into different dimensions and unlocking the secrets of the unseen realms through the out of body state.\\n\\nDarius J Wright \\u201COBE Explorer\\u201D | The 12 Realms, Stargate Travel, Pyramids, Simulation OR Reality?Choose what suits you best:AWAKEN YOUR DORMANT ABILITIES WITH DARIUS J WRIGHT1. The AYDA Method: Is your choice for how to have an Out-of-Body Experience (OBE). This... ... OBE REVEALS: Our Simulation is ENDING; What Lies Beyond is INSANE!Choose what suits you best:AWAKEN YOUR DORMANT ABILITIES WITH DARIUS J WRIGHT1. The AYDA Method: Is your choice for how to have an Out-of-Body Experience (OBE). This practical, step-by-step guide forms... ... Darius J Wright Interview - Soul Trap, Shape of Earth, Reincarnation, OBE, Dreams, Purpose of LifeChoose what suits you best:AWAKEN YOUR DORMANT ABILITIES WITH DARIUS J WRIGHT1. The AYDA Method: Is your choice for how to have an Out-of-Body Experience (OBE). This... ... THE END Of The Simulation, The Nature Of Reality \\u0026 Future Events \\u0026 More!Choose what suits you best:AWAKEN YOUR DORMANT ABILITIES WITH DARIUS J WRIGHT1.\\n\\nThe AYDA Method: Is your choice for how to have an Out-of-Body Experience (OBE). This practical, step-by-step guide... ... Out of Body Experiences, Hidden Ancient Knowledge, Manifestation, Time Travel | Darius J. WrightChoose what suits you best:AWAKEN YOUR DORMANT ABILITIES WITH DARIUS J WRIGHT1. The AYDA Method: Is your choice for how to have an Out-of-Body Experience (OBE). This... ... Accessing The Truth Of All Things In The Out-Of-Body State - Darius J WrightChoose what suits you best:AWAKEN YOUR DORMANT ABILITIES WITH DARIUS J WRIGHT1. The AYDA Method: Is your choice for how to have an Out-of-Body Experience (OBE). This practical, step-by-step... ... Truth of the Construct Through OBE - By Darius J WrightAwaken Your Dormant Abilities with Darius J Wright The following products are designed to work together and support each other. The AYDA Method is a comprehensive and practical \\u0022how-to\\u0022 guide to help you get...\\n\\nLifelong Astral Traveler Opens Up About Awakening Your Dormant Abilities - Darius J WrightChoose what suits you best:AWAKEN YOUR DORMANT ABILITIES WITH DARIUS J WRIGHT1. The AYDA Method: Is your choice for how to have an Out-of-Body Experience (OBE). This practical,... ... Accessing the Other Side: A Successful Out-of-Body Experience Story Nathan Francis shares his success story using Darius J. Wright\\u0027s OBE Method. I also cover what sleep paralysis really is and how it serves as the gateway to the other side.... ... Breaking Down The Nature of Reality: Direct Insights From The Out of Body State Breakdown of the Constructs, Realms, and Dimensional Spaces: Dispelling Misconceptions about the Other Side. Delving into how thoughts shape reality and providing insights into navigating... ... Beyond the Physical: Awakening Dormant Abilities and Revealing the Nature of Reality ----Interviewed By Maria Estrella https://www.mariaestrellamusic.comChoose what suits you best:AWAKEN YOUR DORMANT ABI\\n\\nOBE Realm Explorer Talks About THE END Of The Simulation, The Nature Of Reality \\u0026 More! Podcast guest 787 is Darius J. Wright, prolific OBE explorer, delving into different dimensions and unlocking the secrets of the unseen realms through the out of body state.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://dariusjwright.com/the-out-of-body-experience-accessing-the-unseen-realms/\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"The AYDA METHOD | Darius J. Wright\",\"url\":\"https://dariusjwright.com/ayda-method/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"dariusjwright.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=dariusjwright.com\",\"site_name\":\"Darius J. Wright\"},\"is_missing\":false,\"text\":\"Teachings Shared by Darius J. Wright \\u00B7 This path is for those who feel called to understand the other side through direct experience. Since childhood, I have been able to step beyond the physical body and witness the realms that exist outside this construct.\\n\\nTeachings Shared by Darius J. Wright \\u00B7 This path is for those who feel called to understand the other side through direct experience. Since childhood, I have been able to step beyond the physical body and witness the realms that exist outside this construct. Through these experiences, I came to understand the spaces, movements, and living truth that the soul is not confined to form. What I share here arises from what I have seen on the other side. This path offers clarity on how the soul may move beyond the physical body with intention, awakening abilities that have always been part of who you are. It reveals how consciousness travels through the unseen realms, how events can be witnessed outside of time, and how a living soul can perceive truth far beyond physical senses. I describe the nature of the construct, the dimensional spaces woven throughout this realm, and the ways in which consciousness can observe many layers of reality at once.\\n\\nGatherings hosted by Darius J Wright are held both online and in person to share new discoveries from the out of body state, ask questions, find clarity on personal experience, share challenges and breakthroughs. The gatherings are an opportunity to delve deeper into the teachings, expand your understanding of self and reality and connect with a community of awakening souls on a shared mission \\u00B7 recordings of all past gatherings are also available unless otherwise stated on the gathering. ... This area acknowledges members who help support the mission through guidance and presence. They assist by hosting regular gatherings helping hold the space so others may reflect and grow. They guide and support, they listen and offer clarity garnered from their lived experience of practicing the teachings. They assist in keeping your focused, disciplined and aligned with your purpose and mission.\\n\\nOnce you remember who you truly are, you become heaven\\u2019s reflection here in body. If you would like Darius or one of the selected voices of this mission to share a message in a recorded conversation, such as a podcast or similar setting, you may make your request here. All sharing is offered freely as part of the mission. ... Q: Will I need anything before start I the mission A: Nothing is required. Some people choose to use things like noise canceling headphones, an eye mask, or blackout curtains if it helps them settle into their space, but this is completely optional. Q: Will I be able to access the other side right away A: This varies from person to person. Some may experience it quickly, while others may need more time and steady practice before it becomes natural. Patience is important, along with trusting your own pace and progress. Q: Is this a religious or spiritual teaching A: The direction shared by the mission and Darius J Wright\\u2019s teachings is a spiritual path grounded in \\n\\nThese insights are shared so you may understand where you truly are, why you are here, and how the soul navigates these spaces. so you can experience all this for yourself \\u00B7 This is a path of remembering. When the soul steps beyond the body in clarity, it encounters its true home and begins to understand the deeper purpose of this life, this realm, and the journey of returning to what has always been known. Everything shared here is simple, direct, and based on lived experience. Nothing is theory. Nothing is borrowed. These things are shared because I was told on the other side that awakening souls to who they truly are is part of what they call the great work. When a soul remembers the eternal aspect of itself, it awakens to everything. ... These principles \\u0026 Teachings were developed over the course of a decade of focused practice, continued exploration \\u0026 refinement.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://dariusjwright.com/ayda-method/\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"OBE Visions of Humanity\\u2019s Future with Darius J. Wright - Next Level Soul\",\"url\":\"https://nextlevelsoul.com/darius-wright/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"nextlevelsoul.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=nextlevelsoul.com\",\"site_name\":\"Next Level Soul\"},\"is_missing\":false,\"text\":\"Darius explains that the out-of-body experience is a gateway to another dimension, akin to a near-death experience but available to anyone with the courage to overcome fear. As he describes, \\u201CFear is the number one way to control your soul.\\n\\nOn today\\u2019s episode, we welcome the extraordinary Darius J. Wright, an explorer of realms beyond our physical grasp and a seeker of ancient truths. Darius\\u2019 journey is a profound dive into out-of-body experiences (OBEs) and an intricate understanding of our spiritual reality. His wisdom offers a roadmap to understanding the limitations we place on ourselves and the immense potential we have to transcend them. Darius explains that the out-of-body experience is a gateway to another dimension, akin to a near-death experience but available to anyone with the courage to overcome fear. As he describes, \\u201CFear is the number one way to control your soul. When you step beyond it, you step into your true nature as an untouchable soul.\\u201D This state, according to Darius, offers access to celestial knowledge, including memories of the past and glimpses of future potential.\\n\\nDarius J Wright 1:01 Yeah, yeah. Well, I\\u0027m, I\\u0027m happy that people enjoyed the first one, because that was talking about the importance of the out of body stuff and what it actually is. So, yeah. Alex Ferrari 1:11 Yeah. So for people who didn\\u0027t check out that first episode, can you just talk a little bit about what, what you do in out of body experiences? Because you are very unique in the space of out of body experiences in the OBE in general, what you\\u0027re able to do and what you how you do it, how long you\\u0027ve been doing it, information you\\u0027ve gotten back from those OBEs, can you explain to people a little bit about what you do with OBEs? Darius J Wright 1:36 Yeah, so I\\u0027ll just give a short recap of it. The the out of body state is no different from a near death experience. So when you leave your body, there\\u0027s a controlled process that you could do to leave your body, your soul will exit.\\n\\nAlex Ferrari 25:52 The the concept of the multiverse or parallel realities, is something that has started to hit the zeitgeist a lot in the last in the last five or 10 years in the mainstream media and so on. From your experiencing, from your experiences with OBEs, what is your take on parallel realities and the multiverse in general? Darius J Wright 26:14 Okay, so parallel realities are. They are basically when you, when you think of parallel realities, you\\u0027re accessing potentialities of time. That\\u0027s that\\u0027s essentially what\\u0027s going on now, out of my body, coming out of my body, I could see potentialities within my field of time events. And when you\\u0027re viewing those, it looks like I\\u0027m physically doing something, and someone\\u0027s physically there playing out this scenario. Now you someone could be confused and say, Oh, that\\u0027s another version of that character playing and living that scenario to its conclusion.\\n\\nI mean, because I\\u0027ve heard the the do you feel the love, this universal love that I hear so much of in near death experiences. Darius J Wright 35:45 Yes, it\\u0027s a unconditional love, but I think a better word for it is just acceptance of who I am, fully and completely without judgment, you see, and that that\\u0027s what you feel, because there\\u0027s nobody judging you on the other side for who you are, because they understand just like they understand themselves that they are. They have the full capacity to do as they will, just like you do. So why would you judge another soul? All you would be doing is condemning that soul, limiting its fullest expression of itself. So it\\u0027s more of acceptance. You are you, you feel accepted for who you are, honored for who you are, just like every other soul should be. Yes, absolutely. Alex Ferrari 36:33 So you\\u0027ve been able to get from the other side. And when you\\u0027re in you\\u0027re doing having an OBE, and you\\u0027re able to see the construct.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://nextlevelsoul.com/darius-wright/\",\"search_provider\":\"anthropic\",\"age\":\"March 12, 2025\"}},{\"type\":\"knowledge\",\"title\":\"Out-of-Body Experiences and the Nature of Reality by Darius J Wright - The Ultimate Masters\",\"url\":\"https://www.ultimatemasters.org/out-of-body-experiences-and-the-nature-of-reality-by-darius-j-wright/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"ultimatemasters.org\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=ultimatemasters.org\",\"site_name\":\"The Ultimate Masters\"},\"is_missing\":false,\"text\":\"Darius J Wright teaches techniques for achieving OBEs, encouraging individuals to directly experience these truths for themselves. His mission statement and teachings can be found on his website and YouTube channel.\\n\\nHave you ever wondered what\\u2019s really beyond our physical world? In this mind-blowing interview, Darius J Wright shares his incredible out-of-body experiences (OBEs) since childhood, revealing the secrets of our reality and what\\u2019s hidden from us. Discover how he met the being \\u201CCeleste\\u201D who showed him how time works, the nature of our \\u201Cconstruct\\u201D, and the true power of our souls. One wonders: \\u25CF The Firmament and Stargates: Is our world a closed system with a dome above?1 Are stars portals to other dimensions?23 \\u00B7 \\u25CF The Physicality of the Soul: Is your soul more real than your physical body?4 \\u00B7 \\u25CF The Illusion of Limitation: How are we being manipulated into a limited state of being?567 \\u00B7 \\u25CF Multiple Dimensions and Beings: Are there other races, including \\u201CAngels,\\u201D \\u201CGrays,\\u201D and \\u201CDragons\\u201D that are part of our world?89 \\u00B7\\n\\nDarius J Wright teaches techniques for achieving OBEs, encouraging individuals to directly experience these truths for themselves. His mission statement and teachings can be found on his website and YouTube channel. ... When I was young I had out of body experience I am very interested in Darius words of wisdom and advice is the technique tense and release Harry. ... Hello Harry, Greetings. Darious does share several techniques in https://www.youtube.com/watch?v=21Hs-XuaLTw and https://www.youtube.com/watch?v=6yb-AFBrRFM and https://www.youtube.com/watch?v=QyN8s9LL8O0 You can also get more on his website https://dariusjwright.com/ ... My son has had sleep paralysis experiences a few times which you say are similar to obe. These experiences always involve some kind of vision of something nightmarish and he gets a bit freaked out. How can I help through this or assure him to allow for a more pleasant experience?\\n\\nAn OBE is a state where your soul, which has its own physicality, detaches from the physical body. This isn\\u2019t airy-fairy; it feels hyperreal. Scientifically, our limited perception of the light spectrum (due to our limited DNA) is expanded during an OBE, allowing us to access the full field of all things, including thought forms and potential time events. OBEs can occur spontaneously during sleep paralysis, near-death experiences, or can be consciously initiated. ... This realm, or construct, was created to experience things that we don\\u2019t experience in our full divine state outside of this reality. This includes the illusion of enslavement, imprisonment, and control over the physical body, which leads to experiences like fear, stress, and suffering. 3. What is the nature of this realm? Is it a simulation? While the term \\u201Csimulation\\u201D can be used, it\\u2019s important to understand that everything originates from a source of unconditional love.\\n\\nThe terms are often used interchangeably, but \\u201Cspirit\\u201D can be thought of as accessing specific soul records, or memories from past experiences. We are all the fullest expressions of ourselves right now, but the veil of forgetfulness obscures this knowledge. Through OBEs and near-death experiences, memories can return, providing insights into our current behaviors and motivations. 6. Are there other beings and races besides humans? Yes, there are countless other races and beings, many of which have been present on Earth for a long time. These include angels, seraphim (god-like beings), and other races with various forms and levels of consciousness. Some of these races even resemble humans and have been interacting with our society, a fact which will eventually be disclosed. 7. Is there a shift happening in human consciousness? Are we on a new timeline?\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.ultimatemasters.org/out-of-body-experiences-and-the-nature-of-reality-by-darius-j-wright/\",\"search_provider\":\"anthropic\",\"age\":\"December 19, 2024\"}},{\"type\":\"knowledge\",\"title\":\"Have an OUT OF BODY Experience On Demand! Beyond an NDE--This Will Change Your Life! Darius Wright\",\"url\":\"https://podcasts.apple.com/gb/podcast/have-an-out-of-body-experience-on-demand-beyond/id1039562972?i=1000664861771\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"apple.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=apple.com\",\"site_name\":\"Apple Podcasts\"},\"is_missing\":false,\"text\":\"About Darius J. Wright Darius J Wright is a prolific OBE (Out-of-Body Experience) explorer, respected teacher, and philosopher dedicated to unraveling the truth of the unseen realms and the other side through the out-of-body state.\\n\\nYou don\\u0027t need a Near Death Experience to awaken, enlighten, or travel beyond the veil. Instead, all you need is an out of body experience, and you can have one, almost on demand! In this fascinating LIVE event, OBE expert Darius J. Wright will show you how! About Darius J. Wright Darius J Wright is a prolific OBE (Out-of-Body Experience) explorer, respected teacher, and philosopher dedicated to unraveling the truth of the unseen realms and the other side through the out-of-body state. His profound insights into the nature of reality, coupled with transformative experiences, have positioned him as a leading figure in the exploration of consciousness. Darius explores the nature of our reality and continues to map out the intricacies of both our existence and the other side through the out-of-body state. He is on a mission to show people that THE OTHER SIDE CAN BE ACCESSED AT WILL, RIGHT HERE, RIGHT NOW.\\n\\nPodcast Episode \\u00B7 Inspire Nation Show with Michael Sandler \\u00B7 09/08/2024 \\u00B7 1h 33m\\n\\nMission: My mission is to empower the realm\\u0027s consciousness to awaken to their eternal soul and remember who they are and where they come from. By doing The Great Work \\u2013 awakening people to the other side by unlocking their dormant abilities through the out-of-body state. Thank you for your gifts, contributions and support. \\u2013 Darius J. Wright \\u2013 An Embodied Soul ... Join Our YouTube Membership for behind-the-scenes access - https://www.youtube.com/channel/UCVoOM-cCEPbJ1vzlQAFQu1A/join ... Follow Michael and Jessica\\u0027s exciting journey and get even more great tools, tips, and behind-the-scenes access. Go to https://www.patreon.com/inspirenation \\u00B7 For free meditations, weekly tips, stories, and similar shows visi