kind = "plain_text"
text = "## Darius J. Wright's Teachings In Detail\n\n### The Core Premise\n\nWright's starting point is bold and specific: **you are not a human having spiritual experiences — you are a soul temporarily operating a human body.** The body is the limitation. The soul is the real, more physical reality. He actually questions whether \"out of body\" is even the right term — he prefers thinking of it as *returning to your natural state* rather than leaving something.\n\n---\n\n### What the OBE State Actually Is\n\nHe describes it as a controlled NDE — same state, consciously initiated. Once separated, the soul exists in what he calls a *hyperreal* state — more vivid, more dense, more real than physical waking life. This is consistent across virtually every NDE account in the IANDS and NDERF databases. The construct feels real to us because our DNA limits our perception of the light spectrum. OBE expands that perception to access the full field of reality.\n\n---\n\n### The Construct — His Cosmological Map\n\nWright has mapped what he's accessed through hundreds of OBEs:\n\n**The construct** contains **12 realms**, each with its own dimensional spaces created by thought forms. These realms are navigable. Fixed dimensional spaces aligned with stars serve as gateways between realms — he connects this to why ancient structures like pyramids were built in celestial alignment. This wasn't primitive religion — it was technology.\n\n**Outside the construct entirely** is what he calls *home* — the true other side. He has accessed this and describes seeing the construct from what he calls \"God's point of view\" — the entire universe construct visible as a self-contained structure among others.\n\n**Heaven**, in his framework, is specifically the **fifth dimension** — where souls experience reincarnation and create their own constructs. Not the final destination, but a staging area.\n\n---\n\n### The Veil and Suppression\n\nWright makes a pointed claim — the forgetting isn't entirely natural drift. He states that historical knowledge has been deliberately concealed and rewritten. His reasoning: if people genuinely understood the true history of who we were and what we could access, they would return to recognizing their own divinity and stop operating purely from the physical level. The suppression maintains the limitation.\n\nThis is a more assertive claim than most sources make, though it resonates with certain Gnostic and Vedic frameworks that also describe the veil as partially maintained by external forces.\n\n---\n\n### The Primary Obstacle: Fear\n\nWright is emphatic on this — **fear is the single biggest barrier**, and it operates as a functional mechanism, not just a feeling. Fear of death, fear of encountering negative beings, fear of the unknown. These don't just make the practice uncomfortable — they *literally cut off access* to higher realms. Unconditional love and freedom cannot coexist with conditions and limitations. Fear is a condition. So fear functionally prevents access to the very thing you're reaching for.\n\nHe frames this practically: as he personally confronted and moved through specific fears during OBEs, his access to deeper realms expanded directly as a result.\n\n---\n\n### Soul Records — The Akashic Connection\n\nDuring OBEs he has accessed what he calls the **Halls of Mente**, the **Cathedrals**, and the **Universal Records** — what others call the Akashic records. Your soul records contain every experience from every existence. He states this is where the *remembering* actually happens — not through intellectual study but through direct access to your own records. You don't learn who you are, you *recall* it from your own stored experience.\n\nThis is the direct experiential path to what Jonathan Ashford describes as the goal of remembering.\n\n---\n\n### No Judgment — Unconditional Love as the Fundamental Law\n\nHe states this as a logical absolute: unconditional love cannot coexist with judgment. Therefore judgment doesn't exist on the other side. The only judgment is self-judgment. Hell, if it exists, is temporary — a state you create from beliefs you cannot forgive yourself for, until self-forgiveness returns you to your natural frequency of unconditional love.\n\nThis aligns precisely with IANDS and NDERF life review data.\n\n---\n\n### Physical Health as Requirement\n\nAn often-overlooked teaching from Wright — **the body must be maintained** as the vessel that processes and integrates OBE information. He uses the analogy of outdated computer hardware trying to run modern software. A depleted or neglected nervous system limits what can be brought back and integrated from the other side. This is unusually practical advice for a spiritual teacher.\n\n---\n\n### For Your Situation Specifically\n\nWright says there are two types of people regarding the OBE entry point — those who experience sleep paralysis naturally (which is the gateway state), and those who need to work toward it. Sleep paralysis is not a malfunction or something to fear — it *is* the threshold. The soul is separating. The key is staying conscious through it rather than snapping back due to fear.\n\nHis free YouTube content is the logical starting point before committing to the paid AYDA course. The Next Level Soul interview with Alex Ferrari is among his most comprehensive publicly available conversations.\n\n---\n\nWant to go deeper on the fear aspect, the 12 realms, or something else from his framework?"

