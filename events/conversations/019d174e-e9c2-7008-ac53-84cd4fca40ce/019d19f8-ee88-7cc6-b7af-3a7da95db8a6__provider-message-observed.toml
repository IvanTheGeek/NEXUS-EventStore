[[body.segments]]
kind = "plain_text"
text = "**Near Death Experience Research Foundation** — founded by Jeffrey Long, a radiation oncologist, and his wife Jody.\n\nIt's the largest structured database of NDE accounts in the world, with thousands of submitted first-person testimonies from people across cultures, languages, and religious backgrounds. Long developed a standardized questionnaire so accounts could be compared systematically rather than just collected anecdotally.\n\nHis analysis of the data is published in his book **\"Evidence of the Afterlife\"** (2010). The cross-cultural consistency of the accounts — particularly among people who had no heartbeat or brain activity — is the core of his evidential argument.\n\nIt's a useful source in this context because it's *data aggregation* rather than a single person's experience or interpretation, which gives it a different kind of weight than individual accounts or channeled material."

