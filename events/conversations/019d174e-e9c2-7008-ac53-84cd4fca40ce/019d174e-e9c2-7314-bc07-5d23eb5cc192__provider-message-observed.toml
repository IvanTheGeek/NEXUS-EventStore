text = "{\"start_timestamp\":\"2026-02-27T08:26:38.888374Z\",\"stop_timestamp\":\"2026-02-27T08:26:39.950972Z\",\"flags\":null,\"type\":\"thinking\",\"thinking\":\"Good, I now have solid information about the AYDA method steps from both Wright\\u0027s site and a practitioner\\u0027s account. Let me compile this into a clear, practical guide.\",\"summaries\":[{\"summary\":\"Synthesized method sources into practical instructional guide.\"}],\"cut_off\":false,\"truncated\":false,\"alternative_display_type\":null}"

