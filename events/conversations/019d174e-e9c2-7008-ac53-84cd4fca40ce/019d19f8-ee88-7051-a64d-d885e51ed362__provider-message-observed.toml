[[body.segments]]
kind = "reasoning"
text = "The Monroe Institute? No, that's OBE focused. The user is likely referring to the International Association for Near-Death Studies (IANDS)."

[[body.segments]]
kind = "plain_text"
text = "**IANDS — International Association for Near-Death Studies**, founded in 1981.\n\nIt's the primary academic/research organization dedicated specifically to NDE study. Founded in part by **Kenneth Ring** (University of Connecticut) and **Raymond Moody** — the same Moody who essentially launched mainstream NDE awareness with *\"Life After Life\"* (1975).\n\nIANDS publishes the *Journal of Near-Death Studies*, the only peer-reviewed academic journal dedicated to the subject, which gives it a different standing than popular books or databases — the research goes through scholarly review.\n\nKenneth Ring's own research work, particularly his studies of **blind NDErs who could accurately describe visual details during their experience**, is considered some of the stronger evidential material to come out of that world.\n\nShould I incorporate IANDS alongside NDERF as a standard reference going forward in this conversation?"

