text = "## What to Expect — Initial Attempts\n\nThis is worth being thorough about because not knowing what's happening is the primary reason people abort at the threshold.\n\n---\n\n### Stage 1 — Body Shutdown Sensations\n\nAs the body crosses toward sleep while you maintain awareness, you'll notice a sequence of physical sensations. These are normal and signal progress:\n\n**Heaviness** — the body feels extremely dense and weighted. This is the body going into sleep paralysis, which is a natural biological function that prevents you from physically acting out dreams. It's happening every night — you just never noticed because you were unconscious.\n\n**Numbness** — connected to the heaviness. Feeling of body parts disappearing from sensation.\n\n**Tingling or vibrations** — reported almost universally across Wright, Monroe, and practitioner accounts. Can feel like electricity moving through the body, buzzing, or waves. Wright's specific binaural beats are designed to help induce this state. This is the signal you are at or near the threshold. Do not react. Just observe.\n\n---\n\n### Stage 2 — The Threshold — What Will Likely Startle You\n\nThis is where most beginners abort, purely from not knowing what was about to happen.\n\n**The sound.** Practitioner accounts consistently describe an extraordinarily loud electrical or static sound — described as louder than anything in waking life, feeling very close, sometimes like a locomotive, sometimes like banshees, sometimes like a power surge. It happens milliseconds before separation. It is the soul's electrical connection to the body in the process of separating. It sounds alarming. It is not. If you know it's coming and what it means, you can stay with it rather than snapping back in fear.\n\n**The fear spike.** Even knowing all of this, the body's biological alarm systems activate at this stage. Your logical mind knowing it's safe and your nervous system are two different things. Wright is explicit — fear is the primary mechanism that pulls you back. Knowing this in advance is your best preparation. When fear arises, observe it the same way you'd observe a thought. Don't engage it, don't fight it, don't follow it.\n\n---\n\n### Stage 3 — Separation Signals — How You Know You're Out\n\nThese are the signs you have crossed the threshold:\n\n**Floating or lifting sensation** — feeling of rising, drifting, or hovering above the bed.\n\n**Rolling sensation** — feeling that you could or are rolling sideways out of your body. This is Wright's preferred exit signal — when you feel it, roll with it intentionally.\n\n**Seeing the room from above or sideways** — visual field shifts to a perspective that isn't your physical eyes' position.\n\n**The hyperreal quality** — this is the definitive confirmation. The other side does not feel like a dream. It feels more solid, more vivid, more real than waking physical reality. Colours are more saturated. Surfaces feel genuinely hard and textured. A practitioner who used Wright's course described rolling out and hitting the floor — it felt as physically real as the floor in normal life.\n\nDreams feel foggy and malleable. The OBE state feels more real than waking. That distinction is unmistakable once experienced and is the clearest confirmation you are out.\n\n---\n\n### Immediately Upon Exit — What to Do\n\n**Look at your hands immediately.** Wright, Monroe, and essentially every OBE teacher agree on this. It grounds your awareness in the OBE state and prevents snapping back to the body. The hands in the OBE state appear physically real. One practitioner noted hers looked unusually smooth — details are noticed that wouldn't be in a dream.\n\n**Move away from the body.** Proximity to the physical body creates pull back toward it. Move through the room, go to a wall, go through it. Intention moves you in this state.\n\n**Don't get overexcited.** Strong emotion — including excitement — can snap you back. Wright teaches calm, deliberate intention. You are exploring, not reacting.\n\n---\n\n### Early Attempts — Realistic Expectations\n\nWright's own FAQ states directly that some people access it quickly, others need consistent practice before it becomes natural. The early attempts may produce only the threshold sensations without full exit — vibrations, sounds, partial sensations of lifting. These are not failures. They are confirmation the mechanism is working and the threshold is being reached. The exit itself comes with repeated familiarity of the state.\n\nThe early morning window after several hours of sleep is your highest probability window for initial success — the body returns to sleep faster, REM is deeper, and the threshold is easier to navigate consciously.\n\n---\n\n### For Your Situation Practically\n\nSleeper cab or rest stop horizontal time is your laboratory. Lie flat on your back, use headphones with OBE binaural beats from YouTube as a starting point, set the intention before you begin, and observe what happens without expectation. Treat it as data gathering. Each attempt teaches you more about your personal threshold sensations regardless of whether full exit occurs.\n\n---\n\nWant to continue into what happens once you're consistently out — the navigation and the remembering process Wright describes?"

