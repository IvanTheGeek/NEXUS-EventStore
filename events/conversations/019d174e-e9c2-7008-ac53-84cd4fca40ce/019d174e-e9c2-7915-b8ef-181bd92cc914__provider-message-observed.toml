kind = "plain_text"
text = "## Wright vs. Monroe — Comparison\n\n| | Monroe | Wright |\n|---|---|---|\n| **Background** | Audio engineer, businessman | Lifelong spontaneous OBEr from childhood |\n| **Discovery** | Accidental — happened to him unexpectedly | Natural from early age, developed consciously |\n| **Methodology** | Research institute (Monroe Institute), structured scientific approach | Personal mastery translated into teachable system |\n| **Technology** | Hemi-Sync binaural audio — engineered specifically | Binaural beats as optional tool, not core |\n| **Framework** | Focus levels — numbered states of consciousness mapped systematically | 12 realms, construct model, unconditional love as navigation principle |\n| **Goal framing** | Exploration and mapping of consciousness | Remembering — explicit soul recovery mission |\n| **Cosmology** | Earth as a learning zone, soul as energy, other intelligences encountered | Earth as construct/exhibit, intentional forgetting, multiple exhibits |\n| **Moral dimension** | Relatively neutral — explorer framing | Explicit — integrity and love as functional requirements for depth |\n| **Available to you** | Gateway Tapes freely available online, books | YouTube free, paid course |\n| **Tone** | Engineer mapping unknown territory | Someone who knows home and is showing you the way back |\n\n---\n\n### Where They Converge\n\nBoth agree on the fundamentals — mind awake body asleep as the mechanism, the reality of what's accessed being consistent and navigable, earth being one realm among many, and the soul surviving physical death not as belief but as direct verified experience.\n\n### The Key Difference\n\nMonroe was an **explorer** who built maps. Wright is a **guide** who knows the destination. Monroe's strength is evidential rigor and systematic framework. Wright's strength is the explicit purpose — he's not just teaching technique, he's teaching it *as a path home.*\n\n### For Your Logical Mind\n\nMonroe's approach may feel more credible initially because of the research institution backing, the systematic focus level mapping, and the engineering precision. The Monroe Institute has also produced research data on what happens physiologically during these states.\n\nWright may resonate more once you've accepted the framework, because his cosmological model is more specific and his purpose more explicit.\n\n### Practical Suggestion\n\nMonroe's Gateway Tapes as the technical foundation, Wright's framework as the interpretive lens. They're compatible — Monroe built the vehicle, Wright tells you where it's going and why.\n\nWant to explore Monroe's focus levels specifically, or move to another question?"

