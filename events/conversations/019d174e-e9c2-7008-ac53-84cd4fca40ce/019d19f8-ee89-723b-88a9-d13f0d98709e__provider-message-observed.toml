[[body.segments]]
kind = "plain_text"
text = "Then your starting intention is clean and simple:\n\n**During threshold:** *\"I will remain aware.\"*\n\nHold it lightly as you observe the body shutting down. Not forceful, not repeated like a chant. Just a quiet, present intention in the background of your awareness.\n\n**Upon sensing separation:** *\"I am going out\"* — then roll with whatever separation sensation you feel.\n\n**Immediately out:** Look at your hands. Then simply *\"I am exploring.\"*\n\nThat's it. Nothing more complex than that for Module 1. The entire focus is just getting out and stabilizing. Everything else comes after that is consistently achievable.\n\nOne practical addition Wright makes — set the intention *before* you lie down, not while you're trying to maintain the awareness thread at the threshold. By the time you're at the threshold your mental bandwidth is occupied with staying conscious. Pre-setting the intention means it's already loaded when you need it.\n\nReady to move on to what Wright describes happens once you're consistently accessing the other side, or do you have another question?"

