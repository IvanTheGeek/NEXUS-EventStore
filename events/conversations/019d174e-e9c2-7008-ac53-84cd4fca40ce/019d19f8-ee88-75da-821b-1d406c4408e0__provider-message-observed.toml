[[body.segments]]
kind = "reasoning"
text = "The user is referring to someone from Australia who claims to OBE at will and describes earth as an exhibit among many others. This sounds like it could be William Buhlman, but he's American. There are a few Australian OBE practitioners - it might be someone like... I'm not sure who specifically this is. Could be someone like Kurt Leland, or perhaps someone more recent on YouTube. I shouldn't guess - I should ask who this person is while acknowledging the OBE category.\n\nActually, the description of \"earth as an exhibit, self-contained with many more others\" is reminiscent of Robert Monroe's descriptions, but Monroe was American. There are Australian OBE researchers... Let me think - could be someone like Jurgen Ziewe? No, he's German/British. \n\nI'll just ask the user directly who they're referring to rather than continuing to speculate."

[[body.segments]]
kind = "plain_text"
text = "OBEs are a solid addition — they're a distinct category from NDEs in that they're *induced* rather than crisis-triggered, which means practitioners can potentially explore more systematically and repeatedly rather than having one unrepeatable event.\n\nRobert Monroe is the foundational figure there, and his \"earth as a learning zone among many\" framework fits exactly what you're describing.\n\nDo you remember the name of the Australian? I don't want to guess and attribute the \"exhibit\" framing to the wrong person — that's a specific and interesting description worth tracking accurately."

