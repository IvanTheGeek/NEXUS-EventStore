text = "This also relates to a process that I've picked up for myself, where I do research, and then analysis, refinement, and then decision. For example, when I'm gonna build a server or a computer, I will research the boards that I want and kind of place them in a list, and then look at all the features of the boards and decide, okay, what are my requirements, what do I need, and just fill that down, and then review, you know, review Amazon reviews and other reviews on Newegg or something, and kind of whittle down, okay, it's between these three boards or these two boards, and I finally get to one, and then that's the board I buy. So it's sort of that same in there with experiments and that sort of thing."

