[[body.segments]]
kind = "plain_text"
text = "Another aspect of Adam's event modeling method is that he wants, you know, in a fully fleshed out model, he wants example data. That example data could be one that is, that shows the flow through the system of a little, say, the happy path and the standard way of doing it or something. But that example data is important. So combining the ideas, I came up with the path, the path concept. And a path is specific data growing through as the example data in the events model, but it also supports implementation testing as that's the example data. There could be multiple paths. Each path might show an example of edge cases, and it also shows the flow through a particular system using a particular path. It could be a predefined path or it could be like the old choose your own adventure books. You know, each time there's a branch, there's the option to choose which path you want to go to next."

