[[body.segments]]
kind = "plain_text"
text = "Yeah, and I almost think that influence is different than reputation, possibly, depending on the context, because influence would treat all data as being valuable, but reputation would imply trust, a trust measure or a, like in a forum, you know, somebody might be promoted by reputation to a moderator of a particular area or something like that. I've always had, I mean, not always, I've kind of come to a distillation of any idea comes down to time, resources, which resources would mean, you know, include money, but not just money. So time, resources, motivation, knowledge, and ability. And that's kind of how I have to frame anything I'm working on is, what is the values of each of those on being able to do something? And the influence factor, the influence concept might actually be something that motivates me to work on something or to help somebody because they've been a big contributor back in whatever fashion."

