text = "Okay, and thinking also about Forge, I actually am now thinking that Paxus, P-A-X-I-S, might actually be a separate thing, because there could be, for example, different forges that the artifacts would then flow to Paxus, and Paxus is where it would actually handle and monitor the running of a server and the number of calls it's processing and its CPU. Now, it would probably store all of that data into logos, so that it becomes part of the knowledge and feedback, but I think that separation between Forge and the actual running of the system and that sort of aspect of things might actually be a nice clean separation."

