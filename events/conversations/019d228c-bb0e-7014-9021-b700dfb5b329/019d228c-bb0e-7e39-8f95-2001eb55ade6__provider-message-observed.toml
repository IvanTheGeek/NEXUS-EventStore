kind = "plain_text"
text = "Grok's context window—the maximum amount of text (measured in tokens, where ~4 characters = 1 token) it can process in a single interaction—varies by model variant. For the standard Grok 4, it's 256,000 tokens, while faster/expanded versions like Grok 4 Fast or 4.1 Fast push up to 2,000,000 tokens.<grok:render card_id=\"6dda37\" card_type=\"citation_card\" type=\"render_inline_citation\">\n<argument name=\"citation_id\">0</argument>\n</grok:render><grok:render card_id=\"cc6147\" card_type=\"citation_card\" type=\"render_inline_citation\">\n<argument name=\"citation_id\">1</argument>\n</grok:render><grok:render card_id=\"a32ebf\" card_type=\"citation_card\" type=\"render_inline_citation\">\n<argument name=\"citation_id\">6</argument>\n</grok:render><grok:render card_id=\"9687e2\" card_type=\"citation_card\" type=\"render_inline_citation\">\n<argument name=\"citation_id\">8</argument>\n</grok:render> That's enough for very long conversations: a 256k window handles ~150,000-200,000 words (book-length), and 2M is like processing multiple novels at once.\n\nIn practice, conversations here aren't strictly limited in length or number of turns—they can theoretically continue indefinitely as long as you keep replying. However, each response only considers a \"rolling\" context: the most recent/relevant history is prioritized, and older parts may get truncated or summarized internally if the total exceeds the window (including your query, my thinking, any tools, and the output).<grok:render card_id=\"cab2f7\" card_type=\"citation_card\" type=\"render_inline_citation\">\n<argument name=\"citation_id\">0</argument>\n</grok:render><grok:render card_id=\"79d6dd\" card_type=\"citation_card\" type=\"render_inline_citation\">\n<argument name=\"citation_id\">4</argument>\n</grok:render> We don't have an automatic \"compaction\" feature like Claude's recent update (where it condenses history to free up space), but the large window means hitting limits is rarer, especially for development-focused threads like your NEXUS work. If a convo gets massive, you can always start a new one or reference past exports (as we discussed for LOGOS import).\n\nCompared to Claude: Their 200k-1M windows (depending on tier) used to hard-stop long chats, but now compaction lets them extend further by summarizing.<grok:render card_id=\"1aa04f\" card_type=\"citation_card\" type=\"render_inline_citation\">\n<argument name=\"citation_id\">8</argument>\n</grok:render> Grok's approach is more about raw capacity upfront, which suits iterative building like your methodology refinements—our ongoing discussion here hasn't hit any walls yet. If you're pushing extremes (e.g., dumping huge codebases), the 2M variants via API would be ideal for CORTEX-like personalization."

