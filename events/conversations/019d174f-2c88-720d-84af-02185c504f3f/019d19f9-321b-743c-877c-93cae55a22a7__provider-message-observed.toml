kind = "plain_text"
text = "If **two people are first cousins**, their **children** have a specific cousin relationship as well.\n\n### Relationship\nThe **children of first cousins** are called **second cousins**.\n\n### Why?\nLet’s walk the generations:\n\n1. **Generation 1:**  \n   A pair of siblings (for example, two brothers).\n\n2. **Generation 2:**  \n   Their children are **first cousins** to each other.\n\n3. **Generation 3:**  \n   The children of those first cousins are **second cousins**.\n\n### Another way to think about it\nCousin levels correspond to the **closest shared ancestors**:\n\n| Relationship | Shared Ancestors |\n|---|---|\n| First cousins | Grandparents |\n| Second cousins | Great-grandparents |\n| Third cousins | Great-great-grandparents |\n\nSo the **children of first cousins share great-grandparents**, which makes them **second cousins**.\n\n### Small example\n- Alice and Bob are **first cousins**.\n- Alice has a child: Emma.  \n- Bob has a child: Noah.\n\n**Emma and Noah are second cousins.**\n\n---\n\nIf you want, I can also explain the tricky ones like **“first cousin once removed”**, which is where many people get confused."

