kind = "plain_text"
text = "The confusing phrase **“once removed”** describes a **difference in generations**.\n\nThink of cousin relationships as two dimensions:\n\n1. **Cousin level** → how far back the shared ancestor is  \n2. **Removed** → how many generations apart the two people are\n\n---\n\n## 1. First Cousins\nTwo people are **first cousins** when they share **grandparents**.\n\nExample:\n\n- Grandparents  \n  - Parent A  \n    - **Alice**\n  - Parent B  \n    - **Bob**\n\n**Alice and Bob = first cousins**\n\nSame generation → **no “removed.”**\n\n---\n\n## 2. First Cousin Once Removed\nNow introduce a generation difference.\n\nExample:\n\n- Grandparents  \n  - Parent A  \n    - **Alice**\n      - **Emma**\n  - Parent B  \n    - **Bob**\n\nRelationships:\n\n- **Alice ↔ Bob** = first cousins  \n- **Emma ↔ Bob** = **first cousins once removed**\n\nWhy?  \nEmma is **one generation lower** than Bob.\n\nSo:\n\n- **Emma is Bob’s first cousin once removed**\n- **Bob is Emma’s first cousin once removed**\n\n“Removed” simply counts the **generation gap**.\n\n| Generation Gap | Term |\n|---|---|\n| 1 generation | once removed |\n| 2 generations | twice removed |\n\n---\n\n## 3. Visual Example\n\n```\nGreat-Grandparents\n        │\n   Grandparents\n      /     \\\n   Parent A  Parent B\n      │        │\n    Alice     Bob     ← first cousins\n      │\n    Emma             ← Emma & Bob = first cousins once removed\n```\n\n---\n\n## 4. Quick Rule\n1. **Find the closest shared ancestors.**\n2. **Count generations to each person.**\n3. The **smaller number − 1 = cousin level**  \n4. The **difference between generations = removed**\n\n---\n\n## 5. Your Earlier Question in This System\n\n- **Children of first cousins**\n\n```\nAlice ── Bob (first cousins)\n │        │\nEmma     Noah\n```\n\nEmma and Noah are in the **same generation** and share **great-grandparents**, so they are:\n\n**Second cousins (not removed).**\n\n---\n\nIf you'd like, I can also show a **very simple trick genealogists use to instantly compute cousin relationships** without drawing a tree. It's surprisingly elegant."

