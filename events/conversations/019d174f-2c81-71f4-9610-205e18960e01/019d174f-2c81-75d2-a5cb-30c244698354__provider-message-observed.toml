text = "Great observation — what you’re seeing is actually **normal Figma structure**, and it’s one of the first little mental shifts when designing UI there. 👍\n\n### Short answer\nYes — **the text being a sibling of the rectangle is correct.**  \nYou usually **do NOT put text “inside” a rectangle** in the layer tree.\n\nInstead you build something like this:\n\n```\nFrame: LaundryLog Screen\n  Frame: Add Laundry Button\n      Rectangle: Button Background\n      Text: \"Add Load\"\n```\n\nThe **button frame** contains both elements.  \nThe rectangle is just the visual background layer.\n\n---\n\n## Why Figma does it this way\nFigma treats UI as **layers stacked visually**, not nested like HTML elements.\n\nSo:\n\n* Rectangle = visual background\n* Text = label\n* Both are layered **on top of each other**\n\nThis lets you easily:\n\n- center text\n- swap backgrounds\n- reuse components\n- animate states\n\n---\n\n## What you likely want to do next (best practice)\nInstead of only rectangles + text, wrap them in a **frame**.\n\n### Steps\n\n1️⃣ Select the rectangle and text together  \n2️⃣ Press **Ctrl + Alt + G** (or Right Click → **Frame Selection**)  \n\nNow you'll have:\n\n```\nFrame: Button\n   Rectangle\n   Text\n```\n\nRename it something like:\n\n```\nAddLoadButton\n```\n\n---\n\n## Even better (this becomes powerful later)\nTurn that into a **component**.\n\nSelect the frame → press:\n\n```\nCtrl + Alt + K\n```\n\nNow it becomes a reusable button across the file.\n\nThis becomes **very important later** when we add states like:\n\n- Idle\n- Pressed\n- Disabled\n\nWhich is **exactly aligned with your idea of \"one screen with different states.\"**\n\n---\n\n## Nexus connection (this is the cool part)\nWhat you're doing in Figma maps nicely to your thinking:\n\n| Concept | In Figma | In Nexus |\n|---|---|---|\n| UI state | Variant / Frame | Event state |\n| Button click | Interaction | Event |\n| Screen | Frame | Projection |\n| Component | Reusable unit | Slice |\n\nYou're basically building the **projection of the event model**.\n\n---\n\n## Next small step I recommend\n\nCreate **three frames**:\n\n```\nLaundryLog / Current\nLaundryLog / Add Load\nLaundryLog / Load Details\n```\n\nThese represent **UI states**.\n\nNot separate pages — just different **state projections**.\n\n---\n\nIf you'd like, I can also show you something **very powerful** for your system thinking:\n\n**How to design the Figma file so it mirrors the Event Model directly.**\n\nThat ends up becoming almost like an **EMViewer inside Figma**, which I suspect you’ll really like given what you're building with Nexus."

