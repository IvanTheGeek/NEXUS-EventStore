text = "You're absolutely right to correct that. In **basic entity[\"software_methodology\",\"Event Modeling\"] as taught by entity[\"people\",\"Adam Dymitruk\"]**, arrows *are* often drawn from past events into the projection to indicate that those events feed the read model. So the dependency **is represented**, just typically in a fairly lightweight way on the diagram.\n\nWhat you're proposing with **hover-highlighting** is actually a **much richer interaction model**, and it fits extremely well with your **EMViewer idea**.\n\nLet’s break down why.\n\n---\n\n# How Event Modeling Usually Shows This\n\nIn the standard diagram you might see something like:\n\n```\n[Event] LaundryLoadAdded\n[Event] LaundryLoadStarted\n[Event] LaundryLoadFinished\n            │\n            │\n            ▼\n      [Projection]\n      LaundryLog\n```\n\nThe arrows show:\n\n```\nthese events feed this projection\n```\n\nBut there are two limitations in static diagrams:\n\n1. **Too many arrows become messy**\n2. It’s hard to explore relationships dynamically\n\nThis is exactly where an **interactive viewer** becomes powerful.\n\n---\n\n# Your Hover Idea\n\nYou suggested something like:\n\n```\nhover projection\n→ highlight source events\n```\n\nConceptually:\n\n```\nEvents timeline\n ├ LaundryLoadAdded\n ├ LaundryLoadStarted\n ├ LaundryLoadFinished\n └ LaundryLoadRemoved\n\nProjection: LaundryLog\n```\n\nWhen hovering **LaundryLog**, the viewer could highlight:\n\n```\nLaundryLoadAdded\nLaundryLoadStarted\nLaundryLoadFinished\nLaundryLoadRemoved\n```\n\nEverything else fades.\n\nThis is very similar to how **HTML DevTools highlight DOM relationships**, which is a great analogy.\n\n---\n\n# Even Better: Bidirectional Highlighting\n\nThe really powerful version would be **bidirectional**.\n\n### Hover Projection\n\n```\nhighlight events feeding projection\n```\n\n### Hover Event\n\n```\nhighlight projections using event\n```\n\nExample:\n\nHover:\n\n```\nLaundryLoadAdded\n```\n\nThen highlight:\n\n```\nLaundryLogProjection\nActiveLoadsProjection\nUsageStatsProjection\n```\n\nThis instantly answers a critical architectural question:\n\n```\nwhat breaks if this event changes?\n```\n\nThat’s incredibly valuable for system design.\n\n---\n\n# Why This Is Actually a Big Deal\n\nOne of the hardest problems in event-sourced systems is understanding:\n\n```\nevent → projection dependencies\n```\n\nDevelopers constantly ask:\n\n```\nWhere is this event used?\n```\n\nor\n\n```\nWhat projections depend on this event?\n```\n\nYour viewer concept would make that **visually obvious**.\n\n---\n\n# The Really Interesting Nexus Angle\n\nEarlier you described EMViewer as:\n\n> a projection of the full true event\n\nYour hover idea turns the model into something like a **live dependency graph**.\n\nInstead of static documentation, the viewer becomes:\n\n```\nsystem comprehension tool\n```\n\nAlmost like:\n\n```\ngit blame\n+\narchitecture diagram\n+\nevent explorer\n```\n\n---\n\n# Why This Could Work Well With Figma (Initially)\n\nEven though Figma isn't built for this, your experiment could approximate the concept.\n\nExample approach:\n\nProjection frame:\n\n```\nProjection: LaundryLog\n```\n\nInside it include a list:\n\n```\nSource Events\nLaundryLoadAdded\nLaundryLoadStarted\nLaundryLoadFinished\nLaundryLoadRemoved\n```\n\nThat makes the relationship **explicit**, even if not interactive yet.\n\nLater an EMViewer could add:\n\n```\nhover\nhighlight\nfilter\ntrace\n```\n\n---\n\n# The Really Powerful Interaction (Future EMViewer)\n\nImagine this interaction:\n\n```\nhover projection\n```\n\nViewer highlights:\n\n```\npast events used\n```\n\nThen another option:\n\n```\nshow event replay\n```\n\nAnd you see:\n\n```\nLaundryLoadAdded\nLaundryLoadStarted\nLaundryLoadFinished\n```\n\nThen the projection state updates step by step.\n\nThis would visually show:\n\n```\nprojection = fold(events)\n```\n\nWhich is the **core concept of event sourcing**.\n\n---\n\n# One Thing I’m Curious About\n\nWhen you imagine **EMViewer**, is it closer to:\n\n**A**\n\n```\ndiagram viewer\n```\n\nsomething like an interactive Event Modeling board\n\n**B**\n\n```\nevent-stream visualizer\n```\n\nthat actually **replays events and shows projections updating**\n\nor\n\n**C**\n\n```\nsystem IDE\n```\n\nwhere you can design events, projections, and UI in one place.\n\nYour earlier comments about **canonical substrate and slices** make me suspect you're leaning toward **C**, which is a significantly more ambitious (and interesting) direction."

