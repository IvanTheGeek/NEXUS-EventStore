text = "Good idea 👍 — that will make it much faster while you’re building the skeleton.\n\nIn entity[\"company\",\"Figma\",\"design software company\"] you can just press **T (Text tool)** and paste each label.\n\nCreate one text layer for each of these **inside `state/initial`**.\n\n---\n\n### Title\n\n``` id=\"lab01\"\ntitle/LaundryLog\n```\n\n---\n\n### Location Input\n\n``` id=\"lab02\"\ninput/location\n```\n\n---\n\n### Machine Selection\n\n``` id=\"lab03\"\nselect/machine\n```\n\n---\n\n### Payment Selection\n\n``` id=\"lab04\"\nselect/payment\n```\n\n---\n\n### Quantity Input\n\n``` id=\"lab05\"\ninput/quantity\n```\n\n---\n\n### Unit Price Input\n\n``` id=\"lab06\"\ninput/unit-price\n```\n\n---\n\n### Entry Total (Derived)\n\n``` id=\"lab07\"\nderived/entry-total\n```\n\n---\n\n### Submit Button\n\n``` id=\"lab08\"\nbutton/submit[disabled]\n```\n\n---\n\n### Recent Entries List\n\n``` id=\"lab09\"\nlist/recent-entries\n```\n\n---\n\n### Session Total (Derived)\n\n``` id=\"lab10\"\nderived/session-total\n```\n\n---\n\n## What This Gives You\n\nYour frame will look something like:\n\n```\nstate/initial\n  title/LaundryLog\n  input/location\n  select/machine\n  select/payment\n  input/quantity\n  input/unit-price\n  derived/entry-total\n  button/submit[disabled]\n  list/recent-entries\n  derived/session-total\n```\n\nDon’t worry about spacing or styling yet.  \nThis is **structure, not design**.\n\n---\n\n## Small Tip That Helps Later\n\nAfter creating them, **rename the Figma layers to exactly match the text**.\n\nThis matters because when you eventually **export SVG**, the layer names often become the **SVG group IDs**.\n\nThat’s extremely useful for the Nexus pipeline you’re envisioning.\n\n---\n\nOnce you’ve pasted those in, the **next step becomes interesting**:  \nwe’ll duplicate the frame and create the **first real state transition** in the UI model.\n\nIt will take about **15 seconds** but it’s the first moment where the Nexus idea starts to show up visually."

