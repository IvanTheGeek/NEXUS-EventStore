text = "Great. Let’s do this **very deliberately** so the experiment actually proves something about Nexus instead of just recreating a UI.\n\nYour **goal for Step 1 is NOT to design the screen.**  \nYour goal is to **create a structure that represents state**.\n\nIf we do this correctly, the same structure will later map to:\n\n```\nEvent Model\n→ Paths\n→ SVG Projection\n→ Runtime\n```\n\n---\n\n# Step 1 — Create the First State Frame\n\nOpen your **LaundryLog file** in entity[\"company\",\"Figma\",\"design software company\"].\n\nThen:\n\n### 1️⃣ Create a Frame\n\nPress:\n\n```\nF\n```\n\nSelect a **phone-sized frame** (iPhone or similar is fine).\n\nRename the frame:\n\n```\nstate/initial\n```\n\nNaming matters a lot for the Nexus idea.\n\n---\n\n# Step 2 — Add the Basic Interface Skeleton\n\nInside `state/initial`, add **simple placeholders** for the main UI elements.\n\nDo **not design yet**. Just structure.\n\nAdd text labels or rectangles for:\n\n```\ntitle/LaundryLog\ninput/location\nselect/machine\nselect/payment\ninput/quantity\ninput/unit-price\nderived/entry-total\nbutton/submit\nlist/recent-entries\nderived/session-total\n```\n\nYou can literally just make rectangles + labels.\n\nExample structure:\n\n```\nstate/initial\n ├─ title/LaundryLog\n ├─ input/location\n ├─ select/machine\n ├─ select/payment\n ├─ input/quantity\n ├─ input/unit-price\n ├─ derived/entry-total\n ├─ button/submit\n ├─ list/recent-entries\n └─ derived/session-total\n```\n\n---\n\n# Step 3 — Disable the Submit Button\n\nVisually indicate that the button is **disabled**.\n\nFor example:\n\n```\nbutton/submit[disabled]\n```\n\nGrey it out.\n\nThis represents the rule:\n\n```\nLocation && Machine && Payment → Enable Submit\n```\n\nWhich is exactly the type of **state guard** Nexus cares about.\n\n---\n\n# Step 4 — Duplicate the Frame\n\nDuplicate `state/initial`:\n\n```\nCtrl/Cmd + D\n```\n\nRename the new frame:\n\n```\nstate/ready-to-submit\n```\n\nNow change **only one thing**:\n\n```\nbutton/submit[enabled]\n```\n\nThis is your **first state transition**.\n\n---\n\n# Step 5 — You Just Modeled a Path\n\nYou now have:\n\n```\nstate/initial\n      ↓\nstate/ready-to-submit\n```\n\nWhich corresponds to the event sequence:\n\n```\nLocationEntered\nMachineSelected\nPaymentSelected\n```\n\nYou didn’t just draw UI.\n\nYou **externalized state**.\n\n---\n\n# What This Proves\n\nIf this works well in Figma, it means you can use it as a **visual path modeling surface**, not just a design tool.\n\nWhich was your whole idea.\n\n---\n\n# Very Important Rule Going Forward\n\nAlways name layers like:\n\n```\ntype/name\n```\n\nExamples:\n\n```\ninput/location\nselect/machine\nevent/log-entry\nderived/session-total\nprojection/validation-tags\n```\n\nThat naming will survive **SVG export**, which is critical later.\n\n---\n\n# After You Finish Step 1\n\nTell me and we’ll do **Step 2**, which is where things start getting interesting:\n\nWe will create **component variants representing machine states** (washer vs dryer) and see if AI tools inside Figma can manipulate them.\n\nThat will test your **AI-assisted modeling idea**."

