text = "Yes — and this is important for how you structure the experiment.\n\nIn entity[\"company\",\"Figma\",\"design software company\"], a **single file can contain multiple Pages**.\n\nInside a file you get:\n\n```\nFile\n ├── Page 1\n │     ├── Frames\n │     ├── Components\n │     └── Sections\n ├── Page 2\n ├── Page 3\n```\n\nThis is true even on the **free plan**.\n\nThere’s no practical page limit for what you’re doing.\n\n---\n\n# How This Maps to Your Nexus Experiment\n\nGiven you want:\n\n- App projection (LaundryLog UI)\n- Event model visualization\n- Possibly path modeling\n- Maybe state transition diagrams\n\nYou should absolutely use **multiple Pages inside one file**.\n\nNot multiple files.\n\nBecause:\n\n- One file keeps the canonical artifact unified.\n- You can cross-reference components.\n- AI context stays within the same document.\n- Export experiments remain coherent.\n\n---\n\n# Recommended File Structure for Your Test\n\nSingle Figma File  \n→ Multiple Pages structured intentionally:\n\n### Page 1 — UI Projection (LaundryLog Surface)\nFrames representing:\n- Initial state\n- Partial state\n- Valid state\n- After log\n- With entries\n\n### Page 2 — Event Model\nVisual modeling of:\n- Commands\n- Events\n- Derived state\n- Aggregates\n- Validation rules\n\nNot pretty. Structural.\n\n### Page 3 — Path / State Transitions\n- State nodes\n- Transition arrows\n- Guards (Location && Machine && Payment)\n- Reset rules after EntryLogged\n\nThis is where it gets interesting for Nexus.\n\n---\n\n# Why This Matters\n\nIf AI can:\n\n- Modify UI components\n- Adjust event diagrams\n- Maintain naming consistency\n- Cross-reference between pages\n\nThen Figma becomes a viable **AI-assisted modeling surface**, not just a drawing tool.\n\nThat’s your bootstrap proof.\n\n---\n\n# Critical Constraint\n\nFigma does not inherently enforce semantic linkage between pages.\n\nSo your discipline must be:\n\n- Consistent naming\n- Clear layer taxonomy\n- Explicit component references\n- Treating Figma as structured text disguised as visual\n\nIf you do that, the file becomes semi-machine-readable.\n\n---\n\n# Important Architectural Insight\n\nYour Nexus idea is essentially:\n\nUI = Projection(Event Model)\n\nSo testing both in the same Figma file is correct.\n\nIf the file can hold:\n\nEvent Model (abstract)\n+\nProjection Surface (UI)\n+\nState Variants\n\nThen you've simulated your full vertical slice.\n\n---\n\nNow here’s the deeper question:\n\nWhen you draw the Event Model page…\n\nDo you want it to be:\n\nA) Traditional boxes and arrows  \nB) Visually structured but schema-aligned  \nC) Literally formatted to mirror your F#-style discriminated unions  \n\nBecause option C is where this experiment becomes very powerful."

