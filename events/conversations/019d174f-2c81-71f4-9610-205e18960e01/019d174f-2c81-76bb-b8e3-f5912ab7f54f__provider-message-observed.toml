text = "Got it — that makes perfect sense. I’ll format anything you need to **copy into Figma as separate blocks** so you can just hit the **copy icon**. 👍  \n\nLet’s redo the instructions **cleanly with that format**.\n\n---\n\n# Step 1 — Create the Main Structure Frames\n\nPress:\n\n```\nF\n```\n\nCreate **three large frames side-by-side**.\n\nRename each frame with these exact labels:\n\n```\n01 Events\n```\n\n```\n02 Projections\n```\n\n```\n03 UI Screens\n```\n\nMake each frame roughly:\n\n```\n3000 × 1500\n```\n\nYour canvas should visually look like this:\n\n```\n| 01 Events | 02 Projections | 03 UI Screens |\n```\n\n---\n\n# Step 2 — Create the First Event Object\n\nInside **01 Events**:\n\nPress:\n\n```\nR\n```\n\nCreate a rectangle roughly:\n\n```\n260 × 80\n```\n\nThen press:\n\n```\nT\n```\n\nAdd this text:\n\n```\nLaundryLoadAdded\n```\n\nPlace the text on top of the rectangle.\n\nSelect both objects and group them:\n\n```\nCtrl + Alt + G\n```\n\nRename the group:\n\n```\nEvent: LaundryLoadAdded\n```\n\n---\n\n# Step 3 — Add the Other Events\n\nDuplicate the event:\n\n```\nCtrl + D\n```\n\nChange the labels so you have these four events.\n\n```\nLaundryLoadAdded\n```\n\n```\nLaundryLoadStarted\n```\n\n```\nLaundryLoadFinished\n```\n\n```\nLaundryLoadRemoved\n```\n\nRename each group accordingly:\n\n```\nEvent: LaundryLoadAdded\n```\n\n```\nEvent: LaundryLoadStarted\n```\n\n```\nEvent: LaundryLoadFinished\n```\n\n```\nEvent: LaundryLoadRemoved\n```\n\nNow the **Events frame represents your system specification**.\n\nThis matches your earlier observation that **the event model *is* the spec**.\n\n---\n\n# Step 4 — Create the Projection\n\nGo to **02 Projections**.\n\nPress:\n\n```\nF\n```\n\nCreate a frame.\n\nRename it:\n\n```\nProjection: LaundryLog\n```\n\nMake it roughly:\n\n```\n400 × 600\n```\n\nInside that frame add this text:\n\n```\nLoads:\n```\n\n```\nLoad 1\n```\n\n```\nLoad 2\n```\n\n```\nLoad 3\n```\n\nThis frame represents the **derived system state built from events**.\n\n---\n\n# Step 5 — Draw Event → Projection Relationships\n\nPress:\n\n```\nL\n```\n\nDraw lines from these events to the projection.\n\n```\nLaundryLoadAdded\n```\n\n```\nLaundryLoadFinished\n```\n\n```\nLaundryLoadRemoved\n```\n\nAll three should visually connect to:\n\n```\nProjection: LaundryLog\n```\n\nThis visually represents:\n\n```\nevents → projection\n```\n\nWhich is the core of **event sourcing**.\n\n---\n\n# Step 6 — Create the First UI Screen\n\nGo to **03 UI Screens**.\n\nPress:\n\n```\nF\n```\n\nCreate a mobile screen sized:\n\n```\n390 × 844\n```\n\nRename the frame:\n\n```\nScreen: LaundryLog\n```\n\n---\n\nAdd the screen content.\n\nTitle text:\n\n```\nLaundry Log\n```\n\nExample list items:\n\n```\nLoad #1 – Washing\n```\n\n```\nLoad #2 – Drying\n```\n\nCreate a button.\n\nRectangle + text:\n\n```\nAdd Load\n```\n\nGroup the button elements and name the group:\n\n```\nAddLoadButton\n```\n\n---\n\n# Step 7 — Connect Projection → Screen\n\nPress:\n\n```\nL\n```\n\nDraw a line from:\n\n```\nProjection: LaundryLog\n```\n\nto\n\n```\nScreen: LaundryLog\n```\n\nNow your diagram visually expresses the system flow:\n\n```\nEvents → Projection → UI\n```\n\n---\n\n# What You Just Created\n\nYou now have a **visual system model inside Figma**:\n\n```\nEvent: LaundryLoadAdded\n        ↓\nProjection: LaundryLog\n        ↓\nScreen: LaundryLog\n```\n\nWhich aligns almost perfectly with the **Nexus concept of projection fidelity** you described earlier.\n\n---\n\n# Next Step I Recommend\n\nWe add **UI state variants**, since you mentioned the app is basically **one page with different states**.\n\nThese would be additional screens like:\n\n```\nScreen: LaundryLog / Empty\n```\n\n```\nScreen: LaundryLog / With Loads\n```\n\n```\nScreen: LaundryLog / Adding Load\n```\n\n```\nScreen: LaundryLog / Editing Load\n```\n\nThese states will directly map to **event sequences**, which is where this becomes **very powerful for Nexus**.\n\n---\n\nIf you'd like, I can also show you a **much better structural layout for the Figma file** that mirrors **Adam Dymitruk’s Event Modeling timeline** and would make Figma behave almost like an **early EMViewer / EM IDE**, which I suspect is exactly what you're aiming toward."

