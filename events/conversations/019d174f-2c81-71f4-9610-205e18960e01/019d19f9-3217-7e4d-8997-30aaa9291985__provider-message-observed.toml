text = "Good. This is now a clean framing.\n\nYou are not choosing a design tool.\n\nYou are choosing an **AI-assisted projection surface** to bootstrap Nexus path synthesis.\n\nThat’s a very different evaluation criteria.\n\nLet’s analyze this correctly.\n\n---\n\n# Your Actual Requirement Set\n\nFrom what you just said, you need Figma to:\n\n1. Let AI help draw screens\n2. Let AI help define event models visually\n3. Allow structured extraction (layers, components, naming)\n4. Export SVG (or something transformable to SVG)\n5. Let you experiment without heavy integration friction\n\nYou are *not* currently needing:\n\n- Enterprise collaboration\n- Multi-team workflows\n- Dev handoff tooling\n- Version history depth\n- Large team libraries\n\nSo the real question is:\n\n> Is the free plan enough for AI-assisted path prototyping?\n\n---\n\n# entity[\"company\",\"Figma\",\"design software company\"] Free Plan — What Actually Matters for You\n\nFor a single builder, the free plan generally includes:\n\n- 3 collaborative design files\n- Unlimited drafts\n- Basic design features (frames, components, auto layout)\n- Plugin access\n- Community file duplication\n- SVG export\n- Web editor access\n\nWhat it does *not* include:\n\n- Unlimited shared projects\n- Advanced Dev Mode\n- Advanced branching/versioning\n- Org-level libraries\n\nNow here’s the key insight:\n\nFor Nexus incubation, **drafts are enough.**\n\nYou don’t need team files.\nYou don’t need Dev Mode.\nYou don’t need branching.\n\nYou need:\n\n- One or two working files\n- Plugin access\n- Export ability\n\nThat’s all.\n\nAnd the free plan provides that.\n\n---\n\n# The AI Question (The Real Constraint)\n\nYour leverage comes from:\n\n- AI plugins inside Figma\n- MCP-style connectors\n- External AI reading Figma file structure\n\nMost AI plugins work on free plans.\n\nThe only risk area is:\n- API rate limits\n- Some paid AI plugins charging separately\n- Dev Mode restrictions\n\nBut structurally?\n\nFree tier does not block AI experimentation.\n\n---\n\n# Cost vs Architectural Risk\n\nYour real fear isn’t the subscription.\n\nIt’s:\n\n> “What if I build too much on Figma and it becomes entangled?”\n\nThat’s valid.\n\nSo the safeguard is architectural discipline:\n\n- Nexus canonical model lives outside Figma\n- Path definitions are text-first\n- Figma is projection space\n- SVG export is treated as artifact, not source\n\nIf you do that, Figma is just a temporary visual compiler.\n\n---\n\n# Brutally Honest Recommendation\n\nYes.\n\nThe free plan is absolutely sufficient to:\n\n- Prove AI-assisted path design\n- Prototype event model visualization\n- Validate your projection idea\n- Explore naming conventions and layer semantics\n- Test SVG → runtime projection flow\n\nYou would only need paid if:\n\n- You start collaborating heavily\n- You hit file limits repeatedly\n- You need Dev Mode for code sync\n- You want unlimited shared projects\n\nNone of which apply yet.\n\n---\n\n# Strategic Positioning\n\nUse Figma Free as:\n\n> Nexus Incubation Sandbox\n\nNot:\n\n> Nexus Foundation Layer\n\nOnce:\n- Path modeling stabilizes\n- SVG projection semantics are clear\n- Event model synthesis becomes reliable\n\nThen you can move to entity[\"software\",\"Penpot\",\"open source design tool\"] without emotional friction.\n\n---\n\n# Important: You Are Thinking Correctly\n\nThis line you said:\n\n> \"Using AI to help actually draw a screen or create the events model is my intention.\"\n\nThat’s the key.\n\nYou are not designing UI.\n\nYou are testing:\n\nAI ↔ Path ↔ Projection ↔ Event Loop\n\nFor that experiment, friction reduction matters more than purity.\n\n---\n\nIf you want, next we can:\n\n- Define the minimum viable Figma file structure that maps cleanly into Nexus\n- Or outline naming conventions that make SVG export deterministic\n- Or design a zero-debt migration strategy from Figma → Penpot\n\nWhich direction would reduce the most uncertainty right now?"

