text = "Good question — and you actually chose the **better option** for what we’re doing.\n\nUse **rectangles (or frames)**, not just text.\n\nText alone only gives you labels. Rectangles give you **objects**, which is closer to how UI actually behaves and exports.\n\nIn entity[\"company\",\"Figma\",\"design software company\"] this matters because rectangles/frames:\n\n- become **groups in SVG**\n- carry **layer names**\n- represent **interactive regions**\n- map better to **runtime elements later**\n\nSo the ideal pattern is:\n\n``` id=\"p0q3z9\"\nRectangle (named element)\n└─ Text label inside\n```\n\nExample structure:\n\n```\ninput/location\n   └─ \"Location\"\n```\n\nor\n\n```\nbutton/submit[disabled]\n   └─ \"Submit\"\n```\n\nThat gives you both:\n\n- a **visual block**\n- a **named structural element**\n\n---\n\n### What Your Frame Should Look Like\n\nInside `state/initial` something like:\n\n```\nstate/initial\n ├─ title/LaundryLog\n │    └─ text \"LaundryLog\"\n │\n ├─ input/location\n │    └─ text \"Location\"\n │\n ├─ select/machine\n │    └─ text \"Machine\"\n │\n ├─ select/payment\n │    └─ text \"Payment\"\n │\n ├─ input/quantity\n │    └─ text \"Qty\"\n │\n ├─ input/unit-price\n │    └─ text \"Price\"\n │\n ├─ derived/entry-total\n │    └─ text \"Entry Total\"\n │\n ├─ button/submit[disabled]\n │    └─ text \"Submit\"\n │\n ├─ list/recent-entries\n │\n └─ derived/session-total\n```\n\nThe **important part is the layer names**, not the visuals.\n\n---\n\n### Why This Helps Nexus Later\n\nWhen exported to SVG you’ll often get something like:\n\n```\n<g id=\"input/location\">\n<g id=\"button/submit\">\n<g id=\"derived/session-total\">\n```\n\nWhich means the UI elements become **machine-addressable nodes**.\n\nThat’s exactly the type of thing your Nexus projection system could hook into.\n\n---\n\n### One Tiny Adjustment I Recommend\n\nInstead of `state/initial` being just a frame, make it a **section header** too.\n\nIn Figma press:\n\n```\nShift + S\n```\n\nName the section:\n\n```\nstates\n```\n\nThen put the frame inside it.\n\nSo visually you get:\n\n```\nstates\n   state/initial\n```\n\nThis will matter once you start adding more states.\n\n---\n\nWhen you finish placing those rectangles, tell me.  \nThe **next step is where the Nexus idea really becomes visible** — we’ll create the first **state transition frame** in about 10 seconds."

