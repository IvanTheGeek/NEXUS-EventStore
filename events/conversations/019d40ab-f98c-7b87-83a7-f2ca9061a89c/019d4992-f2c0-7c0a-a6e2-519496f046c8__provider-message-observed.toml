text = "Added the new top-left brand block. `Ivan / The / Geek` now sits to the left of `NEXUS`, with the stack linking to [IvanTheGeek.com](https://ivanthegeek.com/) and `NEXUS` still linking to the docs home. The template change is in [main.html](/home/ivan/NEXUS/NEXUS-EMERGING/theme-overrides/main.html#L1), and the styling is in [light-matrix.css](/home/ivan/NEXUS/NEXUS-EMERGING/docs/assets/stylesheets/light-matrix.css#L120).\n\nIt’s live in the local preview at [http://127.0.0.1:8000/](http://127.0.0.1:8000/), and I pushed it to `main` as `21393c87e` (`Add IvanTheGeek site link to navbar`), so GitHub Pages should pick it up on the next deploy. I also checked it at both desktop and small-screen widths to make sure the new block doesn’t break the collapsed header."

