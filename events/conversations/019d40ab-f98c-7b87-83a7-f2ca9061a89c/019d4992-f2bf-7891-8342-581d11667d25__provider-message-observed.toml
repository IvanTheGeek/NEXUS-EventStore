text = "Yes. It’s wired now.\n\nThe repo has a Pages workflow in [docs-site.yml](/home/ivan/NEXUS/NEXUS-EMERGING/.github/workflows/docs-site.yml#L1) and a short runbook in [publish-docs-site.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/publish-docs-site.md#L1). I also updated the MkDocs nav in [mkdocs.yml](/home/ivan/NEXUS/NEXUS-EMERGING/mkdocs.yml#L1). The local `mkdocs build` still succeeds, so the same site you just reviewed locally is the one the workflow will publish.\n\nThe only GitHub-side step left is:\n1. Open `Settings -> Pages`\n2. Set `Source` to `GitHub Actions`\n3. Push or merge this work to `main`\n\nAfter that, the `Deploy docs site` workflow will publish the site on pushes to `main`, and GitHub will show the Pages URL in the workflow run and in Pages settings.\n\nSources: [GitHub Pages custom workflows](https://docs.github.com/en/pages/getting-started-with-github-pages/using-custom-workflows-with-github-pages), [GitHub Pages publishing source](https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site), [MkDocs deployment guide](https://www.mkdocs.org/user-guide/deploying-your-docs/)\n\nIf you want, the next step can be the custom-domain setup after the first GitHub Pages publish is live."

