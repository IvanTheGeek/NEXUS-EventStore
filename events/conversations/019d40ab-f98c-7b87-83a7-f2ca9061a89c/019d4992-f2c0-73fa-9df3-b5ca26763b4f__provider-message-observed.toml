kind = "plain_text"
text = "Yes. Since it’s Fastmail-hosted, this is just a static `index.html` edit.\n\nFastmail’s current docs say website content comes from `Files -> Websites`, and the homepage file should be lowercase `index.html`: [How to set up a website](https://www.fastmail.help/hc/en-us/articles/1500000280141). So the path is:\n\n1. Open Fastmail.\n2. Go to `Files -> Websites`.\n3. Open the website for `ivanthegeek.com`.\n4. Open the backing folder.\n5. Edit or replace `index.html`.\n\nThe exact line on the live page right now is the `cta-sublabel`. Change it to:\n\n```html\n<div class=\"cta-sublabel\">\n  Knowledge base &nbsp;·&nbsp; Notes &nbsp;·&nbsp; Projects &nbsp;·&nbsp;\n  <a href=\"https://ivanthegeek.github.io/NEXUS-EMERGING/\" rel=\"noopener\">NEXUS docs</a>\n</div>\n```\n\nTo make the link match the page style, add this in the `<style>` block:\n\n```css\n.cta-sublabel a {\n  color: var(--muted);\n  text-decoration: none;\n  border-bottom: 1px solid var(--border-strong);\n  transition: color 0.2s, border-color 0.2s;\n}\n\n.cta-sublabel a:hover {\n  color: var(--accent);\n  border-bottom-color: var(--accent2);\n}\n```\n\nIf Fastmail doesn’t give you an inline editor in that view, just download `index.html`, make those two edits, and upload it back over the old file.\n\nIf you want, I can also give you a full ready-to-upload `index.html` based on the current live page."

