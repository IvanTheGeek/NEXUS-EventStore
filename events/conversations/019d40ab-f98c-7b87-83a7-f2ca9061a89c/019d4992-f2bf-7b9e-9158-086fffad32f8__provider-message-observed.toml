text = "Yes. You still keep copyright.\n\nCreative Commons’ own guidance says CC licenses do not replace copyright; they work with it, and creators retain copyright while granting reuse permissions under stated terms. CC also recommends that marked text include a copyright notice with the author/rightsholder, year, and license link. Sources: [CC Licenses at a Glance](https://creativecommons.org/wp-content/uploads/2025/03/CC-Licenses-Flyer-for-UNESCO-Print.pdf), [About CC Licenses](https://creativecommons.org/share-your-work/cclicenses/), [Marking Text](https://wiki.creativecommons.org/wiki/Marking_Text), [CC BY-SA 4.0 deed](https://creativecommons.org/licenses/by-sa/4.0/).\n\nSo the safer/better footer is not just:\n`All content on this documentation site is licensed under CC BY-SA 4.0.`\n\nI’d recommend one of these instead:\n\n- Sole author:\n  `© 2026 IvanTheGeek. Except where otherwise noted, documentation content on this site is licensed under CC BY-SA 4.0.`\n- Shared authorship:\n  `© 2026 IvanTheGeek and contributors. Except where otherwise noted, documentation content on this site is licensed under CC BY-SA 4.0.`\n\nThat does two useful things:\n- identifies who holds the copyright / should be credited\n- leaves room for exceptions if some images, quotes, or third-party material are under different terms\n\nIf you want, I can patch the footer to the `IvanTheGeek and contributors` version now."

