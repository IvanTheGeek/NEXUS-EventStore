kind = "plain_text"
text = "Yes, they can coexist.\n\nThe cleanest model is: keep `docs/` as the shared source, then treat `MkDocs` and `fsdocs` as two different projections over that same material. That works especially well here because both tools are happy with Markdown in a `docs` folder, both handle relative `.md` links, and both support front matter. `fsdocs` explicitly supports `docs/**/*.md`, link translation, and optional API-doc generation from your F# projects, while MkDocs supports Markdown metadata/front matter and turns relative docs links into site links. In practice, that means the common doctrine/how-to/decision docs can be shared, while `fsdocs` can additionally own F#-specific reference output.\n\nThe main caveat is to keep shared pages in a “lowest common denominator” style:\n- Prefer plain Markdown plus relative links.\n- Use front matter sparingly and keep shared keys simple like `title`, `description`, `keywords`.\n- Avoid generator-specific syntax in shared pages unless we deliberately gate it to one build.\n- Treat API docs, literate `.fsx`, and heavy templating as `fsdocs`-specific.\n- Clean up links that currently escape the docs tree, since those are the first thing that gets awkward in any site generator.\n\nSo I’d think of the options like this:\n- `MkDocs` as the main knowledgebase/docs-memory site.\n- `fsdocs` as either a second projection of the same docs, or a specialist F# docs surface for `reference/` and literate content.\n- They can absolutely live side by side, and we do not need to choose “only one forever.”\n\nFor MkDocs theme options, the best places to browse are:\n- Official built-in theme docs: [Choosing Your Theme](https://www.mkdocs.org/user-guide/choosing-your-theme/)\n- Official note on third-party themes: [MkDocs home](https://www.mkdocs.org/)\n- Ranked theme/project catalog: [mkdocs/catalog](https://github.com/mkdocs/catalog)\n- Screenshot gallery of many themes: [MkDocs theme gallery](https://pawamoy.github.io/mkdocs-gallery/)\n\nA few non-Material places to look first:\n- Built-in `mkdocs` and `readthedocs`: simple and stable, documented in [Choosing Your Theme](https://www.mkdocs.org/user-guide/choosing-your-theme/)\n- `Bootswatch` collection: many different visual styles with very low effort, and you can preview the included variants here: [MkDocs Bootswatch Themes](https://mkdocs.github.io/mkdocs-bootswatch/)\n- Then the broader third-party list in [mkdocs/catalog](https://github.com/mkdocs/catalog)\n\nIf you’re not sold on Material, that’s completely reasonable. Material is popular because it’s polished, not because it’s the only good fit. For this repo, I’d probably shortlist:\n- built-in `mkdocs` if you want clean and conservative\n- `Bootswatch` if you want easy visual variety fast\n- `Windmill` or `Cinder` if you want a docs-first alternative from the catalog\n- `Material` only if you end up liking its navigation/search feel after previewing it\n\nIf you want, I can do the next useful step and prepare a concrete comparison for this repo:\n1. a minimal `mkdocs.yml` using the built-in `mkdocs` theme,\n2. a second one using one or two non-Material alternatives,\n3. a sketch of how `fsdocs` would coexist with the same `docs/` source."

