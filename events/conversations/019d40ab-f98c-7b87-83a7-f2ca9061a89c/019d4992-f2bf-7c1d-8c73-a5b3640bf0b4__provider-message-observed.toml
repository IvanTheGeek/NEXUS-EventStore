text = "Yes, it’s in now on the live preview at [http://127.0.0.1:8000/](http://127.0.0.1:8000/).\n\nI added a small site script in [code-copy.js](/home/ivan/NEXUS/NEXUS-EMERGING/docs/assets/javascripts/code-copy.js#L1), wired it through [mkdocs.yml](/home/ivan/NEXUS/NEXUS-EMERGING/mkdocs.yml#L1), and styled the button in [light-matrix.css](/home/ivan/NEXUS/NEXUS-EMERGING/docs/assets/stylesheets/light-matrix.css#L201). Each fenced code block should now show a `Copy` button in the top-right. On localhost the clipboard API should work normally; if a browser blocks it, the button falls back to a `Press Ctrl+C` hint.\n\nI also updated the preview doc in [preview-docs-site.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/preview-docs-site.md#L1) to reflect the new JS asset. I syntax-checked the script with `node --check`, and confirmed the served pages include `code-copy.js`. If you don’t see the button right away, do one hard refresh."

