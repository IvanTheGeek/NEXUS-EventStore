text = "Updated the footer on the live preview at [http://127.0.0.1:8000/](http://127.0.0.1:8000/).\n\nIt now uses the stacked layout you asked for in [main.html](/home/ivan/NEXUS/NEXUS-EMERGING/theme-overrides/main.html#L1): copyright line, the cooperation-based CC sentence, a centered CC badge, the centered `F# |> ♥` promo, the small F# Foundation notice, and then the MkDocs credit. The styling for that layout is in [light-matrix.css](/home/ivan/NEXUS/NEXUS-EMERGING/docs/assets/stylesheets/light-matrix.css#L386), and I added the official F# logo locally at [fsharp-logo.svg](/home/ivan/NEXUS/NEXUS-EMERGING/docs/assets/images/fsharp-logo.svg).\n\nFor the F# bit, I followed the Foundation’s official logo guidance: use is encouraged for activity supportive of the Foundation’s mission, and the logo should remain unchanged. Source: [F# Software Foundation logo page](https://foundation.fsharp.org/logo). This was docs-only work, so there were no code tests to add."

