text = "That page is already set correctly. `Source` is on `GitHub Actions`, so don’t click either `Configure` button.\n\nFrom here:\n\n1. Leave this page as-is.\n2. Make sure the workflow file and docs changes are pushed to `main`.\n3. Open the `Actions` tab in the repo.\n4. Look for `Deploy docs site`.\n5. If it’s there, click it and use `Run workflow` on `main`, or just let your next push trigger it automatically.\n6. Wait for both jobs to go green: `build` and `deploy`.\n7. Come back to `Settings -> Pages` and GitHub should show the published URL under workflow details.\n\nA couple of important notes:\n- Don’t choose `GitHub Pages Jekyll` or `Static HTML`. We already added a custom MkDocs workflow in [.github/workflows/docs-site.yml](/home/ivan/NEXUS/NEXUS-EMERGING/.github/workflows/docs-site.yml#L1).\n- If `Deploy docs site` does not appear in `Actions`, it means the workflow file is not on GitHub `main` yet.\n\nAfter the first successful publish, we can do the custom domain section for `ivanthegeek.com`.\n\nReferences: [GitHub Pages custom workflows](https://docs.github.com/en/pages/getting-started-with-github-pages/using-custom-workflows-with-github-pages), [GitHub Pages publishing source](https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site)\n\nIf you want, I can guide you through the `Actions` tab next, step by step."

