text = "Use this version. It pushes the page toward a more intentional “control surface” feel and makes `NEXUS` the center of gravity.\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>IvanTheGeek.com</title>\n  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n  <link href=\"https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;700&display=swap\" rel=\"stylesheet\">\n  <style>\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n    :root {\n      --bg: #e8f0e8;\n      --surface: rgba(240, 247, 240, 0.94);\n      --surface-2: rgba(245, 250, 244, 0.92);\n      --border: #a8c8a8;\n      --border-strong: #6a9e6a;\n      --accent: #1a6e1a;\n      --accent-hover: #0f4e0f;\n      --accent2: #d4870a;\n      --text: #0a1a0a;\n      --muted: #4a6e4a;\n      --shadow: 0 18px 40px rgba(18, 42, 18, 0.08);\n    }\n\n    html, body {\n      min-height: 100%;\n      background: linear-gradient(180deg, #eef5ed 0%, var(--bg) 100%);\n      color: var(--text);\n      font-family: 'Exo 2', sans-serif;\n      overflow-x: hidden;\n    }\n\n    body::before {\n      content: '';\n      position: fixed;\n      inset: 0;\n      background: repeating-linear-gradient(\n        0deg,\n        transparent,\n        transparent 3px,\n        rgba(0, 0, 0, 0.015) 3px,\n        rgba(0, 0, 0, 0.015) 4px\n      );\n      pointer-events: none;\n      z-index: 100;\n    }\n\n    .grid-bg {\n      position: fixed;\n      inset: 0;\n      background-image:\n        linear-gradient(rgba(106, 158, 106, 0.32) 1px, transparent 1px),\n        linear-gradient(90deg, rgba(106, 158, 106, 0.32) 1px, transparent 1px);\n      background-size: 58px 58px;\n      opacity: 0.45;\n      animation: gridShift 24s linear infinite;\n    }\n\n    @keyframes gridShift {\n      0% { background-position: 0 0; }\n      100% { background-position: 58px 58px; }\n    }\n\n    .orb {\n      position: fixed;\n      width: 760px;\n      height: 760px;\n      border-radius: 50%;\n      background: radial-gradient(circle, rgba(26, 110, 26, 0.08) 0%, transparent 72%);\n      top: 46%;\n      left: 50%;\n      transform: translate(-50%, -50%);\n      pointer-events: none;\n      animation: pulse 7s ease-in-out infinite;\n    }\n\n    @keyframes pulse {\n      0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }\n      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }\n    }\n\n    .corner {\n      position: fixed;\n      width: 64px;\n      height: 64px;\n      opacity: 0.42;\n    }\n\n    .corner-tl { top: 20px; left: 20px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }\n    .corner-tr { top: 20px; right: 20px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }\n    .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }\n    .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }\n\n    .container {\n      position: relative;\n      z-index: 10;\n      min-height: 100vh;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      padding: 2rem;\n    }\n\n    .panel {\n      width: min(980px, 100%);\n      background: rgba(239, 246, 238, 0.78);\n      border: 1px solid rgba(106, 158, 106, 0.42);\n      box-shadow: var(--shadow);\n      backdrop-filter: blur(6px);\n      padding: 2.1rem;\n    }\n\n    .panel-header {\n      display: flex;\n      flex-wrap: wrap;\n      justify-content: space-between;\n      gap: 1rem;\n      padding-bottom: 1rem;\n      border-bottom: 1px solid rgba(106, 158, 106, 0.28);\n    }\n\n    .identity {\n      display: flex;\n      flex-direction: column;\n      gap: 0.35rem;\n    }\n\n    .eyebrow {\n      font-family: 'Share Tech Mono', monospace;\n      font-size: 0.78rem;\n      letter-spacing: 0.22em;\n      color: var(--accent2);\n      text-transform: uppercase;\n    }\n\n    .handle {\n      font-family: 'Share Tech Mono', monospace;\n      font-size: clamp(2rem, 5vw, 3.6rem);\n      color: var(--accent);\n      letter-spacing: 0.05em;\n      text-shadow:\n        0 0 16px rgba(26, 110, 26, 0.25),\n        0 2px 8px rgba(26, 110, 26, 0.12);\n    }\n\n    .handle::after {\n      content: '_';\n      color: var(--accent2);\n      animation: blink 1.2s step-end infinite;\n    }\n\n    @keyframes blink {\n      0%, 100% { opacity: 1; }\n      50% { opacity: 0; }\n    }\n\n    .tagline {\n      font-size: 0.88rem;\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      color: var(--muted);\n    }\n\n    .status-stack {\n      display: grid;\n      gap: 0.45rem;\n      min-width: 250px;\n      font-family: 'Share Tech Mono', monospace;\n      font-size: 0.78rem;\n      color: var(--muted);\n      align-content: start;\n    }\n\n    .status-line {\n      display: flex;\n      gap: 0.6rem;\n      align-items: baseline;\n      justify-content: flex-start;\n    }\n\n    .status-label {\n      color: var(--accent2);\n      min-width: 84px;\n    }\n\n    .hero {\n      margin-top: 1.4rem;\n      display: grid;\n      gap: 1.2rem;\n    }\n\n    .hero-copy {\n      background: var(--surface);\n      border: 1px solid rgba(106, 158, 106, 0.28);\n      border-left: 3px solid var(--accent2);\n      padding: 1.15rem 1.2rem;\n      box-shadow: 0 8px 22px rgba(15, 42, 15, 0.04);\n    }\n\n    .hero-copy p {\n      color: var(--muted);\n      font-family: 'Share Tech Mono', monospace;\n      font-size: 0.84rem;\n      line-height: 1.9;\n    }\n\n    .hero-grid {\n      display: grid;\n      grid-template-columns: 1.2fr 0.9fr;\n      gap: 1rem;\n    }\n\n    .section-card {\n      background: var(--surface-2);\n      border: 1px solid rgba(106, 158, 106, 0.28);\n      box-shadow: 0 10px 24px rgba(15, 42, 15, 0.05);\n      padding: 1rem 1.1rem;\n    }\n\n    .section-title {\n      font-family: 'Share Tech Mono', monospace;\n      font-size: 0.92rem;\n      color: var(--accent);\n      letter-spacing: 0.08em;\n      text-transform: uppercase;\n      margin-bottom: 0.7rem;\n    }\n\n    .signal-list {\n      display: grid;\n      gap: 0.55rem;\n      font-family: 'Share Tech Mono', monospace;\n      font-size: 0.78rem;\n      color: var(--muted);\n    }\n\n    .signal-item {\n      display: flex;\n      gap: 0.55rem;\n      align-items: flex-start;\n    }\n\n    .signal-item::before {\n      content: \">\";\n      color: var(--accent2);\n      flex: 0 0 auto;\n    }\n\n    .cta-area {\n      display: grid;\n      gap: 0.8rem;\n    }\n\n    .cta-link {\n      display: block;\n      padding: 1.05rem 1.15rem;\n      font-family: 'Share Tech Mono', monospace;\n      font-size: 0.95rem;\n      letter-spacing: 0.06em;\n      text-decoration: none;\n      transition: transform 0.15s, box-shadow 0.2s, background 0.2s, color 0.2s;\n    }\n\n    .cta-link.primary {\n      background: var(--accent);\n      color: #fff;\n      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);\n      box-shadow: 0 4px 20px rgba(26, 110, 26, 0.26);\n    }\n\n    .cta-link.primary:hover {\n      background: var(--accent-hover);\n      transform: translateY(-2px);\n      box-shadow: 0 8px 28px rgba(26, 110, 26, 0.34);\n    }\n\n    .cta-link.secondary {\n      background: transparent;\n      color: var(--accent);\n      border: 1px solid var(--border-strong);\n      box-shadow: 0 4px 16px rgba(26, 110, 26, 0.08);\n    }\n\n    .cta-link.secondary:hover {\n      background: rgba(26, 110, 26, 0.08);\n      color: var(--accent-hover);\n      transform: translateY(-2px);\n    }\n\n    .cta-meta {\n      margin-top: 0.2rem;\n      font-family: 'Share Tech Mono', monospace;\n      font-size: 0.74rem;\n      color: var(--muted);\n      text-align: center;\n    }\n\n    .cta-meta a {\n      color: var(--muted);\n      text-decoration: none;\n      border-bottom: 1px solid var(--border-strong);\n    }\n\n    .cta-meta a:hover {\n      color: var(--accent);\n      border-bottom-color: var(--accent2);\n    }\n\n    .divider {\n      margin-top: 1.4rem;\n      height: 1px;\n      background: linear-gradient(90deg, transparent, var(--border-strong), transparent);\n    }\n\n    .footer {\n      margin-top: 1.2rem;\n      font-size: 0.72rem;\n      color: var(--muted);\n      letter-spacing: 0.15em;\n      font-family: 'Share Tech Mono', monospace;\n      text-align: center;\n      line-height: 1.8;\n    }\n\n    .footer a {\n      color: var(--muted);\n      text-decoration: none;\n      border-bottom: 1px solid var(--border-strong);\n    }\n\n    @media (max-width: 780px) {\n      .panel {\n        padding: 1.2rem;\n      }\n\n      .panel-header {\n        flex-direction: column;\n      }\n\n      .hero-grid {\n        grid-template-columns: 1fr;\n      }\n\n      .tagline {\n        line-height: 1.6;\n        letter-spacing: 0.16em;\n      }\n    }\n  </style>\n</head>\n<body>\n  <div class=\"grid-bg\"></div>\n  <div class=\"orb\"></div>\n  <div class=\"corner corner-tl\"></div>\n  <div class=\"corner corner-tr\"></div>\n  <div class=\"corner corner-bl\"></div>\n  <div class=\"corner corner-br\"></div>\n\n  <main class=\"container\">\n    <section class=\"panel\">\n      <div class=\"panel-header\">\n        <div class=\"identity\">\n          <div class=\"eyebrow\">// IvanTheGeek Control Surface</div>\n          <div class=\"handle\">IvanTheGeek</div>\n          <div class=\"tagline\">Systems Architecture &nbsp;·&nbsp; Event Sourcing &nbsp;·&nbsp; F#</div>\n        </div>\n\n        <div class=\"status-stack\">\n          <div class=\"status-line\">\n            <span class=\"status-label\">STATUS</span>\n            <span>ACTIVE</span>\n          </div>\n          <div class=\"status-line\">\n            <span class=\"status-label\">PRIMARY</span>\n            <span>NEXUS</span>\n          </div>\n          <div class=\"status-line\">\n            <span class=\"status-label\">FOCUS</span>\n            <span>Knowledge, history, systems</span>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"hero\">\n        <div class=\"hero-copy\">\n          <p>\n            NEXUS is now a real active surface, not just a side note. This site is the top-level entry point\n            into the current knowledge base, durable operating memory, event-modeling direction, and connected public discussion.\n          </p>\n        </div>\n\n        <div class=\"hero-grid\">\n          <div class=\"section-card\">\n            <div class=\"section-title\">Live Signals</div>\n            <div class=\"signal-list\">\n              <div class=\"signal-item\">NEXUS is active as a knowledge and systems foundation</div>\n              <div class=\"signal-item\">LOGOS and durable memory are core concern lines</div>\n              <div class=\"signal-item\">Public discussion continues through Talkyard</div>\n              <div class=\"signal-item\">F# and event sourcing remain strong architectural lines</div>\n            </div>\n          </div>\n\n          <div class=\"section-card\">\n            <div class=\"section-title\">Entry Points</div>\n            <div class=\"cta-area\">\n              <a class=\"cta-link primary\" href=\"https://ivanthegeek.github.io/NEXUS-EMERGING/\" rel=\"noopener\">\n                &rarr; &nbsp; NEXUS\n              </a>\n              <a class=\"cta-link secondary\" href=\"https://talkyard.ivanthegeek.com\" rel=\"noopener\">\n                &rarr; &nbsp; talkyard.ivanthegeek.com\n              </a>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"cta-meta\">\n          Knowledge base &nbsp;·&nbsp; Notes &nbsp;·&nbsp; Projects &nbsp;·&nbsp;\n          <a href=\"https://ivanthegeek.github.io/NEXUS-EMERGING/\" rel=\"noopener\">NEXUS</a>\n        </div>\n      </div>\n\n      <div class=\"divider\"></div>\n\n      <div class=\"footer\">\n        &copy; 2026 IvanTheGeek.com &nbsp;&nbsp;|&nbsp;&nbsp; ivanthegeek.com &nbsp;&nbsp;|&nbsp;&nbsp;\n        <a href=\"https://creativecommons.org/licenses/by-sa/4.0/\">CC BY-SA 4.0</a>\n      </div>\n    </section>\n  </main>\n</body>\n</html>\n```\n\nThis version changes the feel in three ways:\n- `NEXUS` is the primary destination, not a supporting link.\n- The center panel reads like an active systems surface, not a personal redirect page.\n- The language is about live architecture and working surfaces instead of “all content is elsewhere.”"

