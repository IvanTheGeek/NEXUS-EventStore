text = "Those are a different issue class.\n\nRight now there are 42 links in `docs/` that point outside the published MkDocs tree:\n- `32` into `NEXUS-EventStore`\n- `6` to the repo-root `README.md`\n- `4` into `NEXUS-Code`\n\nWhy they break on Pages: MkDocs only publishes the `docs/` tree. Anything linked with paths like `../README.md`, `../NEXUS-Code/...`, or `../NEXUS-EventStore/...` is outside the built site, so the page can render the link text but the target is not part of the deployed HTML site.\n\nA few examples:\n- [docs/collaboration-protocol.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/collaboration-protocol.md)\n- [docs/repository-concern-lines.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/repository-concern-lines.md)\n- [docs/how-to/export-codex-sessions.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/export-codex-sessions.md)\n- [docs/research/penpot/codex-mcp-retrospective.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/research/penpot/codex-mcp-retrospective.md)\n- [docs/application-domains/cheddarbooks/laundrylog/requirements.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/application-domains/cheddarbooks/laundrylog/requirements.md)\n\nMy recommendation is:\n- For repo-root `README.md` links: replace them with site-local equivalents where possible.\n- For `NEXUS-Code` links: either move the needed content into `docs/`, or link to the GitHub file URL instead of a relative filesystem path.\n- For `NEXUS-EventStore` links: treat them as source citations and convert them to GitHub permalinks, ideally pinned to a commit if you want stable historical references.\n\nSo the practical split is:\n- navigation links should stay inside the site\n- source/citation links can go out to GitHub on purpose\n\nIf you want, I can do the next cleanup pass and handle them in that order:\n1. fix the `README.md` and `NEXUS-Code` links first,\n2. then convert the `NEXUS-EventStore` citations to proper GitHub permalinks."

