text = "Adjusted the header behavior in [light-matrix.css](/home/ivan/NEXUS/NEXUS-EMERGING/docs/assets/stylesheets/light-matrix.css#L120). The fix does two things: it keeps the `Search / Previous / Next` group from wrapping awkwardly, and it collapses the whole navbar a bit earlier on laptop-ish widths so we don’t force a cramped multi-line header.\n\nIt’s live locally at [http://127.0.0.1:8000/](http://127.0.0.1:8000/), and I pushed it to `main` as `5e088b7a9` (`Tighten MkDocs navbar wrapping`), so GitHub Pages should pick it up on the next deploy. No tests were added since this was a CSS-only tweak, but I did verify it against fresh local renders at narrower and wider desktop widths."

