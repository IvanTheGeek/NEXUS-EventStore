text = "Because Nexus is currently in the initial stages and we are using LaundryLog as a dogfooding learning project, let keep it in here until we have more of our Nexus established. Same would kinda go for FnMCP.Nexus as well because we are doing such heavy dev right now. We could split out PerDiemLog as a new project as a test of the concept and process. I would also like step by step instructions for how to modify this Nexus Project and then how to transition the PerDiemLog app to its own project."

