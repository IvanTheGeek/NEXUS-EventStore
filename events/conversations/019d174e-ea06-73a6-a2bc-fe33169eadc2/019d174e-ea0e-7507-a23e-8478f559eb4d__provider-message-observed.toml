text = "{\"start_timestamp\":\"2025-11-12T01:05:42.240960Z\",\"stop_timestamp\":\"2025-11-12T01:05:46.537577Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"bash_tool\",\"input\":{\"command\":\"cat \\u003E /tmp/bar-calc-test.py \\u003C\\u003C \\u0027EOF\\u0027\\n# Bar calculation verification\\ndef calculate_bar(percentage):\\n    filled = round(percentage / 5)\\n    empty = 20 - filled\\n    return filled, empty\\n\\n# Test cases\\ntest_cases = [\\n    (48.9, 10, 10),\\n    (27.5, 6, 14),\\n    (72.7, 15, 5),\\n    (89.2, 18, 2),\\n]\\n\\nprint(\\u0022Percentage | Expected | Calculated | Match?\\u0022)\\nprint(\\u0022-\\u0022 * 50)\\nfor pct, exp_filled, exp_empty in test_cases:\\n    calc_filled, calc_empty = calculate_bar(pct)\\n    match = \\u0022\\u2713\\u0022 if (calc_filled == exp_filled and calc_empty == exp_empty) else \\u0022\\u2717\\u0022\\n    print(f\\u0022{pct:5.1f}%    | {exp_filled:2d}F {exp_empty:2d}E  | {calc_filled:2d}F {calc_empty:2d}E      | {match}\\u0022)\\nEOF\\npython3 /tmp/bar-calc-test.py\",\"description\":\"Verify the correct calculation formula\"},\"message\":\"Verify the correct calculation formula\",\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":{\"type\":\"json_block\",\"json_block\":\"{\\u0022language\\u0022: \\u0022bash\\u0022, \\u0022code\\u0022: \\u0022cat \\u003E /tmp/bar-calc-test.py \\u003C\\u003C \\u0027EOF\\u0027\\\\n# Bar calculation verification\\\\ndef calculate_bar(percentage):\\\\n    filled = round(percentage / 5)\\\\n    empty = 20 - filled\\\\n    return filled, empty\\\\n\\\\n# Test cases\\\\ntest_cases = [\\\\n    (48.9, 10, 10),\\\\n    (27.5, 6, 14),\\\\n    (72.7, 15, 5),\\\\n    (89.2, 18, 2),\\\\n]\\\\n\\\\nprint(\\\\\\u0022Percentage | Expected | Calculated | Match?\\\\\\u0022)\\\\nprint(\\\\\\u0022-\\\\\\u0022 * 50)\\\\nfor pct, exp_filled, exp_empty in test_cases:\\\\n    calc_filled, calc_empty = calculate_bar(pct)\\\\n    match = \\\\\\u0022\\\\u2713\\\\\\u0022 if (calc_filled == exp_filled and calc_empty == exp_empty) else \\\\\\u0022\\\\u2717\\\\\\u0022\\\\n    print(f\\\\\\u0022{pct:5.1f}%    | {exp_filled:2d}F {exp_empty:2d}E  | {calc_filled:2d}F {calc_empty:2d}E      | {match}\\\\\\u0022)\\\\nEOF\\\\npython3 /tmp/bar-calc-test.py\\u0022}\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

