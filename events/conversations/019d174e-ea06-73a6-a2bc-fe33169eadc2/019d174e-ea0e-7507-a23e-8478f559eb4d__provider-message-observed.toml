text = "You're absolutely right - I'm showing 16 filled blocks for 48.9%, when it should be 10 blocks. Let me fix this immediately:\n\n**Correct bar for 48.9%:**\n```\n[██████████░░░░░░░░░░] (10 filled, 10 empty)\n```\n\n**What I showed (wrong):**\n```\n[████████████████░░░░] (16 filled, 4 empty) = 80%!\n```\n\nThis is the same calculation error we fixed before. Let me update the specification to make it foolproof:"

