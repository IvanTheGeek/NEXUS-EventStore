ter-spacing: 0.12em;\\\\n      font-family: \\u0027IBM Plex Mono\\u0027, monospace;\\\\n      animation: riseIn 0.7s 0.45s ease forwards;\\\\n      opacity: 0;\\\\n      transform: translateY(16px);\\\\n    }\\\\n\\\\n    /* Corner stamps */\\\\n    .stamp {\\\\n      position: fixed;\\\\n      font-family: \\u0027IBM Plex Mono\\u0027, monospace;\\\\n      font-size: 0.6rem;\\\\n      letter-spacing: 0.15em;\\\\n      color: var(--border-strong);\\\\n      opacity: 0.5;\\\\n    }\\\\n    .stamp-tl { top: 20px; left: 24px; }\\\\n    .stamp-tr { top: 20px; right: 24px; text-align: right; }\\\\n    .stamp-bl { bottom: 20px; left: 24px; }\\\\n    .stamp-br { bottom: 20px; right: 24px; text-align: right; }\\\\n  \\u003C/style\\u003E\\\\n\\u003C/head\\u003E\\\\n\\u003Cbody\\u003E\\\\n  \\u003Cdiv class=\\\\\\u0022lines-bg\\\\\\u0022\\u003E\\u003C/div\\u003E\\\\n  \\u003Cdiv class=\\\\\\u0022margin-rule\\\\\\u0022\\u003E\\u003C/div\\u003E\\\\n\\\\n  \\u003Cspan class=\\\\\\u0022stamp stamp-tl\\\\\\u0022\\u003EITG.v1\\u003Cbr\\u003E2025\\u003C/span\\u003E\\\\n  \\u003Cspan class=\\\\\\u0022stamp stamp-tr\\\\\\u0022\\u003Eivanthegeek.com\\u003C/span\\u003E\\\\n  \\u003Cspan class=\\\\\\u0022stamp stamp-bl\\\\\\u0022\\u003ESYSTEMS\\u003Cbr\\u003EARCHITECT\\u003C/span\\u003E\\\\n  \\u003Cspan class=\\\\\\u0022stamp stamp-br\\\\\\u0022\\u003EEST.\\u003Cbr\\u003EF#/ES\\u003C/span\\u003E\\\\n\\\\n  \\u003Cmain class=\\\\\\u0022container\\\\\\u0022\\u003E\\\\n\\\\n    \\u003Cdiv class=\\\\\\u0022identity\\\\\\u0022\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022handle\\\\\\u0022\\u003EIvanTheGeek\\u003C/div\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022tagline\\\\\\u0022\\u003ESystems Architect \\u0026nbsp;\\\\u00b7\\u0026nbsp; Event Sourcing \\u0026nbsp;\\\\u00b7\\u0026nbsp; F#\\u003C/div\\u003E\\\\n    \\u003C/div\\u003E\\\\n\\\\n    \\u003Cdiv class=\\\\\\u0022status-card\\\\\\u0022\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022status-row\\\\\\u0022\\u003E\\u003Cspan class=\\\\\\u0