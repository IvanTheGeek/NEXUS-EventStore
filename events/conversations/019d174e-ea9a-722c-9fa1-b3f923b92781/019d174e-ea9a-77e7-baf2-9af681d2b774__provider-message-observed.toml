text = "Different vibe entirely — went for a technical notebook / drafting paper aesthetic rather than just inverting the dark theme. Key differences:\n\n- Warm off-white paper background with faint ruled lines and a red margin rule\n- IBM Plex Mono + Outfit pairing for that printed-document feel\n- Animated underline reveal on the handle\n- CTA button has an offset shadow (offset box-shadow in accent red) instead of a glow\n- Corner \"stamp\" labels like a technical drawing sheet\n- Status card with a solid top border instead of a glowing panel"

