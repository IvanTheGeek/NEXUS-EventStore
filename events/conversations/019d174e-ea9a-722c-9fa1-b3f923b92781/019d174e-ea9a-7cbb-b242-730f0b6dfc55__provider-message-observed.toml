text = "CC 4.0 was released in November 2013 — so it's been the current version for over a decade. The 4.0 suite was a significant update: better international compatibility (previous versions had jurisdiction-specific \"ports\", 4.0 is universal), clearer language around database rights, and streamlined terms overall. It's been stable since then with no 5.0 on the horizon that I know of.\n\nReady to update the file from your uploaded version with both the footer tweak and the CC BY-SA 4.0 link?"

