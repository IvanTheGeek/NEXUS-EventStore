[[body.segments]]
kind = "plain_text"
text = "Good changes — staying in the same tab makes sense for a landing page redirect.\n\nFor the CC license, a few questions to nail down the right one:\n\n**Which CC license fits your intent?** The main practical distinctions:\n\n- **CC BY** — others can use/adapt freely, just credit you\n- **CC BY-SA** — same, but derivatives must use the same license (copyleft)\n- **CC BY-NC** — use/adapt freely with credit, but no commercial use\n- **CC BY-NC-SA** — credit + no commercial + share-alike\n- **CC0** — public domain, no restrictions at all\n\nWhat's your instinct — are you comfortable with commercial use of your content, and do you care about share-alike?"

