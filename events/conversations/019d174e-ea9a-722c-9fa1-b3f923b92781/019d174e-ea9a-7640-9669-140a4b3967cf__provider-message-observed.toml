text = "Dark terminal/grid aesthetic — feels right for the brand. Highlights:\n\n- Animated grid background with scanlines for depth\n- Blinking cursor on the handle\n- Status panel showing active focus areas\n- Big clipped CTA button linking to `talkyard.ivanthegeek.com`\n- Corner frame decorations and a centered glow orb\n\nJust drop this `index.html` at the webroot of your domain. Let me know if you want to tweak the tagline text, colors, or any of the status panel copy."

