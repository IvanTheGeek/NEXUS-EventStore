      0 0 20px rgba(0,212,255,0.5),\\\\n        0 0 60px rgba(0,212,255,0.2);\\\\n      position: relative;\\\\n    }\\\\n\\\\n    .handle::after {\\\\n      content: \\u0027_\\u0027;\\\\n      animation: blink 1.2s step-end infinite;\\\\n      color: var(--accent2);\\\\n    }\\\\n\\\\n    @keyframes blink {\\\\n      0%, 100% { opacity: 1; }\\\\n      50% { opacity: 0; }\\\\n    }\\\\n\\\\n    .tagline {\\\\n      margin-top: 0.6rem;\\\\n      font-size: 0.85rem;\\\\n      font-weight: 300;\\\\n      letter-spacing: 0.3em;\\\\n      text-transform: uppercase;\\\\n      color: var(--muted);\\\\n    }\\\\n\\\\n    /* Status panel */\\\\n    .status-panel {\\\\n      background: var(--surface);\\\\n      border: 1px solid var(--border);\\\\n      border-left: 3px solid var(--accent2);\\\\n      padding: 1.2rem 1.8rem;\\\\n      max-width: 560px;\\\\n      width: 100%;\\\\n      font-family: \\u0027Share Tech Mono\\u0027, monospace;\\\\n      font-size: 0.8rem;\\\\n      color: var(--muted);\\\\n      line-height: 1.8;\\\\n      animation: fadeDown 0.8s 0.2s ease forwards;\\\\n      opacity: 0;\\\\n      transform: translateY(-20px);\\\\n    }\\\\n\\\\n    .status-panel .label {\\\\n      color: var(--accent2);\\\\n      margin-right: 0.5em;\\\\n    }\\\\n\\\\n    /* Big CTA */\\\\n    .cta-wrapper {\\\\n      animation: fadeUp 0.8s 0.4s ease forwards;\\\\n      opacity: 0;\\\\n      transform: translateY(20px);\\\\n      text-align: center;\\\\n    }\\\\n\\\\n    @keyframes fadeUp {\\\\n      to { opacity: 1; transform: translateY(0); }\\\\n    }\\\\n\\\\n    .cta-label {\\\\n      font-size: 0.75rem;\\\\n      letter-spacing: 0.25em;\\\\n      text-transform: uppercase;\\\\n      color: var(--muted);\\\\n      margin-bottom: 1rem;\\\\n    }\\\\n\\\\n    .cta-link {\\\\n      display: inline-block;\\\\n      position: relative;\\\\n      padding: 1.4rem 3.5rem;\\\\n      font-family: \\u0027Share Tech Mono\\u0027, monospace;\\\\n      font-size: clamp(1rem, 2.5vw, 1.3rem);\\\\n      color: var(--bg);\\\\n      background: var(--accent);\\\\n      text-decoration: none;\\\\n      letter-spacing: 0.08em;\\\\n      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);\\\\n      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;\\\\n      box-shadow: 0 0 30px rgba(0,212,255,0.3), 0 0 60px rgba(0,212,255,0.1);\\\\n    }\\\\n\\\\n    .cta-link:hover {\\\\n      background: #33ddff;\\\\n      box-shadow: 0 0 50px rgba(0,212,255,0.6), 0 0 100px rgba(0,212,255,0.2);\\\\n      transform: translateY(-2px);\\\\n    }\\\\n\\\\n    .cta-link:active {\\\\n      transform: translateY(0);\\\\n    }\\\\n\\\\n    .cta-sublabel {\\\\n      margin-top: 1rem;\\\\n      font-size: 0.78rem;\\\\n      color: var(--muted);\\\\n      font-family: \\u0027Share Tech Mono\\u0027, monospace;\\\\n    }\\\\n\\\\n    /* Divider */\\\\n    .divider {\\\\n      width: 100%;\\\\n      max-width: 560px;\\\\n      height: 1px;\\\\n      background: linear-gradient(90deg, transparent, var(--border), transparent);\\\\n    }\\\\n\\\\n    /* Footer */\\\\n    .footer {\\\\n      font-size: 0.72rem;\\\\n      color: var(--muted);\\\\n      letter-spacing: 0.15em;\\\\n      font-family: \\u0027Share Tech Mono\\u0027, monospace;\\\\n      animation: fadeUp 0.8s 0.6s ease forwards;\\\\n      opacity: 0;\\\\n      transform: translateY(20px);\\\\n    }\\\\n\\\\n    /* Corner decorations */\\\\n    .corner {\\\\n      position: fixed;\\\\n      width: 60px;\\\\n      height: 60px;\\\\n      opacity: 0.3;\\\\n    }\\\\n    .corner-tl { top: 20px; left: 20px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }\\\\n    .corner-tr { top: 20px; right: 20px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }\\\\n    .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }\\\\n    .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }\\\\n  \\u003C/style\\u003E\\\\n\\u003C/head\\u003E\\\\n\\u003Cbody\\u003E\\\\n  \\u003Cdiv class=\\\\\\u0022grid-bg\\\\\\u0022\\u003E\\u003C/div\\u003E\\\\n  \\u003Cdiv class=\\\\\\u0022orb\\\\\\u0022\\u003E\\u003C/div\\u003E\\\\n  \\u003Cdiv class=\\\\\\u0022corner corner-tl\\\\\\u0022\\u003E\\u003C/div\\u003E\\\\n  \\u003Cdiv class=\\\\\\u0022corner corner-tr\\\\\\u0022\\u003E\\u003C/div\\u003E\\\\n  \\u003Cdiv class=\\\\\\u0022corner corner-bl\\\\\\u0022\\u003E\\u003C/div\\u003E\\\\n  \\u003Cdiv class=\\\\\\u0022corner corner-br\\\\\\u0022\\u003E\\u003C/div\\u003E\\\\n\\\\n  \\u003Cmain class=\\\\\\u0022container\\\\\\u0022\\u003E\\\\n\\\\n    \\u003Cdiv class=\\\\\\u0022identity\\\\\\u0022\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022handle\\\\\\u0022\\u003EIvanTheGeek\\u003C/div\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022tagline\\\\\\u0022\\u003ESystems Architect \\u0026nbsp;\\\\u00b7\\u0026nbsp; Event Sourcing \\u0026nbsp;\\\\u00b7\\u0026nbsp; F#\\u003C/div\\u003E\\\\n    \\u003C/div\\u003E\\\\n\\\\n    \\u003Cdiv class=\\\\\\u0022status-panel\\\\\\u0022\\u003E\\\\n      \\u003Cdiv\\u003E\\u003Cspan class=\\\\\\u0022label\\\\\\u0022\\u003E\\u0026gt;\\u003C/span\\u003E STATUS: Active development in progress\\u003C/div\\u003E\\\\n      \\u003Cdiv\\u003E\\u003Cspan class=\\\\\\u0022label\\\\\\u0022\\u003E\\u0026gt;\\u003C/span\\u003E FOCUS: Event modeling, LOGOS knowledge base\\u003C/div\\u003E\\\\n      \\u003Cdiv\\u003E\\u003Cspan class=\\\\\\u0022label\\\\\\u0022\\u003E\\u0026gt;\\u003C/span\\u003E REDIRECT: All public content lives in the forum\\u003C/div\\u003E\\\\n    \\u003C/div\\u003E\\\\n\\\\n    \\u003Cdiv class=\\\\\\u0022cta-wrapper\\\\\\u0022\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022cta-label\\\\\\u0022\\u003E// The hub for everything\\u003C/div\\u003E\\\\n      \\u003Ca class=\\\\\\u0022cta-link\\\\\\u0022 href=\\\\\\u0022https://talkyard.ivanthegeek.com\\\\\\u0022 target=\\\\\\u0022_blank\\\\\\u0022 rel=\\\\\\u0022noopener\\\\\\u0022\\u003E\\\\n        \\u0026rarr; \\u0026nbsp; talkyard.ivanthegeek.com\\\\n      \\u003C/a\\u003E\\\\n      \\u003Cdiv class=\\\\\\u0022cta-sublabel\\\\\\u0022\\u003E\\\\n        Knowledge base \\u0026nbsp;\\\\u00b7\\u0026nbsp; Notes \\u0026nbsp;\\\\u00b7\\u0026nbsp; Projects \\u0026nbsp;\\\\u00b7\\u0026nbsp; NEXUS docs\\\\n      \\u003C/div\\u003E\\\\n    \\u003C/div\\u003E\\\\n\\\\n    \\u003Cdiv class=\\\\\\u0022divider\\\\\\u0022\\u003E\\u003C/div\\u003E\\\\n\\\\n    \\u003Cdiv class=\\\\\\u0022footer\\\\\\u0022\\u003E\\\\n      \\u0026copy; 2025 IvanTheGeek.com \\u0026nbsp;\\u0026nbsp;|\\u0026nbsp;\\u0026nbsp; ivanthegeek.com\\\\n    \\u003C/div\\u003E\\\\n\\\\n  \\u003C/main\\u003E\\\\n\\u003C/body\\u003E\\\\n\\u003C/html\\u003E\\\\n\\u0022, \\u0022filename\\u0022: \\u0022/mnt/user-data/outputs/index.html\\u0022}\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

