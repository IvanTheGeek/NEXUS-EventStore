[[body.segments]]
kind = "reasoning"
text = "Ivan is referring to another key Scott Wlaschin principle: avoiding \"primitive obsession\" by wrapping primitives in domain types with validation.\n\nInstead of:\n```fsharp\ntype Entry = { Price: decimal }  // Any decimal? Negative? 999999?\n```\n\nYou create validated types:\n```fsharp\ntype Price = private Price of decimal\n\nmodule Price =\n    let create (value: decimal) =\n        if value >= 0m && value <= 100m then\n            Some (Price value)\n        else\n            None\n    \n    let value (Price p) = p\n```\n\nThis ensures:\n- You can't accidentally pass a random decimal where a Price is expected\n- Validation happens at the boundary (once)\n- The rest of the system trusts the type\n- \"Parse, don't validate\" principle\n\nLet me confirm understanding and show how this applies to LaundryLog."

[[body.segments]]
kind = "plain_text"
text = "Exactly. \"Parse, don't validate.\"\n\nValidation happens once at the boundary. After that, the type guarantees correctness.\n\n```fsharp\n// Primitive obsession - bad\ntype Session = {\n    Location: string      // Empty? 500 chars? Just whitespace?\n    Quantity: int         // Negative? Zero? 9999?\n    Price: decimal        // Negative? \n}\n\n// Domain types - good\ntype Location = private Location of string\ntype Quantity = private Quantity of int\ntype Price = private Price of decimal\n\nmodule Location =\n    let create (s: string) =\n        let trimmed = s.Trim()\n        if String.IsNullOrEmpty trimmed then None\n        elif trimmed.Length > 100 then None\n        else Some (Location trimmed)\n    \n    let value (Location l) = l\n\nmodule Quantity =\n    let create (n: int) =\n        if n >= 1 && n <= 20 then Some (Quantity n)\n        else None\n    \n    let value (Quantity q) = q\n\nmodule Price =\n    let create (d: decimal) =\n        if d >= 0m && d <= 50m then Some (Price d)\n        else None\n    \n    let value (Price p) = p\n\ntype Session = {\n    Location: Location    // Guaranteed valid\n    Quantity: Quantity    // Guaranteed 1-20\n    Price: Price          // Guaranteed non-negative, reasonable\n}\n```\n\nOnce you have a `Session`, you never check validity again. The type proves it.\n\n---\n\nThis affects the bindings too:\n\n```fsharp\ntype Msg =\n    | SetLocation of Location      // Not string\n    | SetQuantity of Quantity      // Not int\n    | SetPrice of Price            // Not decimal\n```\n\nThe **view/boundary** parses raw input into domain types. The `update` function only sees valid values.\n\n```fsharp\n// At the UI boundary\nlet onLocationInput (raw: string) dispatch =\n    match Location.create raw with\n    | Some loc -> dispatch (SetLocation loc)\n    | None -> ()  // Or dispatch validation error msg\n\n// Update never sees invalid data\nlet update msg model =\n    match msg with\n    | SetLocation loc -> { model with Location = Some loc }  // loc is guaranteed valid\n```\n\n---\n\nWe're aligned. Does this change how you want to structure the bindings, or does the approach I outlined still hold with validated types at the boundaries?"

