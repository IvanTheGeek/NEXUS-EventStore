text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"14\\u00B7 Inspect designs\",\"url\":\"https://help.penpot.app/user-guide/inspect/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Press the code tab to get actual code snippets. Select an object to get ready to use code for markup (SVG and HTML) and styles (currently CSS only but more are coming). Export option is available at the bottom of the Info panel. The same export presets that have been set at the workspace will be available at the View mode inspect. New export presets can be added at the Code mode but will not persist. Read more about exporting assets.\\n\\nAt Penpot, you can inspect designs to get measures, view properties, export assets and get production-ready code. You can activate the Inspect mode both at the View mode and at the Workspace. Go to the Inspect designs at the View mode section to know how to activate inspect mode at the View mode. At the Workspace, select the Inspect tab at the right sidebar to enter inspect mode. Inspect mode provides a safer view-only mode so developers can work at the Workspace without the fear of breaking things ;) You can easily get measurements and distances between an object and other objects or board edges. ... Click on an object or select it at the layers panel. Hover over other objects to see the distances between them and the selected one. Hover over a free space on the board or the area around it to see the distances from the object to the board edges. At the Info panel you can see specifications about style and content of an object.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/user-guide/inspect/\"}},{\"type\":\"knowledge\",\"title\":\"3.08. Data Guide\",\"url\":\"https://help.penpot.app/technical-guide/developer/data-guide/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Any attribute that is not included in the export and import functions will not be exported and will be lost if reimporting the file again. \\u25BE frontend/ \\u25BE src/ \\u25BE app/ \\u25BE main/ \\u25BE ui/ \\u25BE viewer/ \\u25BE inspect/ \\u25BE attributes/ blur.cljs common.cljs fill.cljs image.cljs layout.cljs shadow.cljs stroke.cljs svg.cljs text.cljs attributes.cljs code.cljs \\u25BE util/ code_gen.cljs markup_html.cljs markup_svg.cljs style_css.cljs style_css_formats.cljs style_css_values.cljs ... For the Info tab, the attributes.cljs module and all modules under attributes/*.cljs have the components that extract the attributes to inspect each type of shape. For the Code tab, the util/code_gen.cljs module is in charge. It calls the other modules in util/ depending on the format. For HTML and CSS, there are functions that generate the code as needed from the shapes. For SVG, it simply takes the nodes from the viewer main viewport and prettily formats it.\\n\\nAny attribute that is not included in the export and import functions will not be exported and will be lost if reimporting the file again. \\u25BE frontend/ \\u25BE src/ \\u25BE app/ \\u25BE main/ \\u25BE ui/ \\u25BE viewer/ \\u25BE inspect/ \\u25BE attributes/ blur.cljs common.cljs fill.cljs image.cljs layout.cljs shadow.cljs stroke.cljs svg.cljs text.cljs attributes.cljs code.cljs \\u25BE util/ code_gen.cljs markup_html.cljs markup_svg.cljs style_css.cljs style_css_formats.cljs style_css_values.cljs \\u00B7 In the inspect panel we have two modes: For the Info tab, the attributes.cljs module and all modules under attributes/*.cljs have the components that extract the attributes to inspect each type of shape. For the Code tab, the util/code_gen.cljs module is in charge. It calls the other modules in util/ depending on the format. For HTML and CSS, there are functions that generate the code as needed from the shapes.\\n\\nAny attribute that is not included in the export and import functions will not be exported and will be lost if reimporting the file again. \\u25BE frontend/ \\u25BE src/ \\u25BE app/ \\u25BE main/ \\u25BE ui/ \\u25BE viewer/ \\u25BE inspect/ \\u25BE attributes/ blur.cljs common.cljs fill.cljs image.cljs layout.cljs shadow.cljs stroke.cljs svg.cljs text.cljs attributes.cljs code.cljs \\u25BE util/ code_gen.cljs markup_html.cljs markup_svg.cljs style_css.cljs style_css_formats.cljs style_css_values.cljs ... For the Info tab, the attributes.cljs module and all modules under attributes/*.cljs have the components that extract the attributes to inspect each type of shape. For the Code tab, the util/code_gen.cljs module is in charge. It calls the other modules in util/ depending on the format. For HTML and CSS, there are functions that generate the code as needed from the shapes. For SVG, it simply takes the nodes from the viewer main viewport and prettily formats it.\\n\\nThe data structures are one of the most complex and important parts of Penpot. It\\u0027s critical that the data integrity is always maintained throughout the whole usage, and also file exports \\u0026 imports and data model evolution. To modify the data structure (the most typical case will be to add a new attribute to the shapes), this list must be checked. This is not an exhaustive list, but all of this is important in general. We prefer that the page and shape attributes are optional. I.E. there is a default object behavior, that occurs when the attribute is not present, and its presence activates some feature (example: if there is no fill-color, the shape is not filled). When you revert to the default state, it\\u0027s better to remove the attribute than leaving it with null value. There are some process (for example import \\u0026 export) that filter out and remove all attributes that are null.\\n\\nIn objects attribute names we don\\u0027t use special symbols that are allowed by Clojure (for example ending it with ? for boolean values), because this may cause problems when exporting. \\u25BE common/ \\u25BE src/app/common/ \\u25BE files/ migrations.cljc \\u00B7 When changing the model it\\u0027s essential to take into account that the existing Penpot files must keep working without changes. If you follow the general considerations stated above, usually this is automatic, since the objects already in the database just have the default behavior, that should be the same as before the change. And the new features apply to new or edited objects. But if this is not possible, and we are talking of a breaking change, you can write a data migration. Just define a new data version and a migration script in migrations.cljc and increment file-version in common.cljc. From then on, every time a file is loaded from the database, if its version number is lower than the current version in the app, the file data will be handled to a\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/technical-guide/developer/data-guide/\"}},{\"type\":\"knowledge\",\"title\":\"07\\u00B7 Exporting objects\",\"url\":\"https://help.penpot.app/user-guide/exporting/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Export presets can be also found at the View mode with the code tab activated. You can set as many export presets as you need for the same object. Set multiple exports to get the same object in different scales and/or formats with just one click. To remove an export preset you have to select the object and then press the \\u201C-\\u201D button at the export preset you want to remove. ... Size - Options for the most common sizing scales. Suffix - Especially useful if you are exporting at different scales. File format - PNG, JPEG, WEBP, SVG, PDF. To export multiple elements you first have to select the elements you\\u0027d like to export. If the selected elements already have export settings those will be included in the export. You can also add new export settings for multiselections. You can also launch the export for a page from the main menu or using the shortcut Ctrl \\u002B Shift \\u002B E.\\n\\nExported PDF files try to leverage the capabilities of PDF vectorial format (unpixelated zoom, select \\u0026 copy texts, etc.), but cannot guarantee that 100% of SVG features will be converted perfectly to PDF. You may see differences between an object displayed inside Penpot and in the exported file. If you need an exact match, a workaround is to export the object into PNG and convert it to PDF with some of the many tools that exist for it. Currently known issue: When exporting objects with masks, the mask does not work when opening the PDF file with some open source tools (e.g. evince or inkscape). This is not Penpot\\u0027s fault, but a bug in poppler, a library used by many of the open source tools. If you open the file with an official Adobe viewer, or a tool like okular, or in a browser like Chrome or Firefox, you can see it properly.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/user-guide/exporting/\"}},{\"type\":\"knowledge\",\"title\":\"15\\u00B7 Import/export files\",\"url\":\"https://help.penpot.app/user-guide/import-export/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Learn how to import and export files in Penpot, the free, open-source design tool. Discover file formats, backups, sharing, and library management.\\n\\nThe open one. A compressed file that includes SVG and JSON. \\u2705 Allows the file to be opened by other softwares (still, for those cases export to SVG seems to be the common practice). ... \\u274C Highly inefficient in terms of memory and transfer time when exporting and importing (this is because SVG).\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/user-guide/import-export/\"}},{\"type\":\"knowledge\",\"title\":\"Exporter app\",\"url\":\"https://help.penpot.app/technical-guide/developer/architecture/exporter/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Penpot exporter app code resides under exporter/src/app path in the main repository. \\u25BE exporter/src/app/ \\u25B8 http/ \\u25B8 renderer/ \\u25B8 util/ core.cljs http.cljs browser.cljs config.cljs \\u00B7 core has the setup and run functions of the nodejs app. ...\\n\\nWhen exporting file contents to a file, we want the result to be exactly the same as the user sees in screen. To achieve this, we use a headless browser installed in the backend host, and controled via puppeteer automation. The browser loads the frontend app from the static webserver, and executes it like a normal user browser. It visits a special endpoint that renders one shape inside a file. Then, if takes a screenshot if we are exporting to a bitmap image, or extract the svg from the DOM if we want a vectorial export, and write it to a file that the user can download. Penpot exporter app code resides under exporter/src/app path in the main repository. \\u25BE exporter/src/app/ \\u25B8 http/ \\u25B8 renderer/ \\u25B8 util/ core.cljs http.cljs browser.cljs config.cljs \\u00B7 core has the setup and run functions of the nodejs app. http exposes a basic http server, with endpoints to export a shape or a file.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/technical-guide/developer/architecture/exporter/\"}},{\"type\":\"knowledge\",\"title\":\"3.10. UI Guide\",\"url\":\"https://help.penpot.app/technical-guide/developer/ui/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Component tokens, defined at component level as CSS custom properties. These are very useful when implementing variants. Examples include --button-bg-color or --toast-icon-color. These custom properties are constrained to the local scope of its component. We can leverage component tokens to easily implement variants as explained here. Please refer to the Storybook documentation for icons and other SVG assets (logos, illustrations, etc.). We use Storybook to implement and showcase the components of the Design System. The Storybook is available at the /storybook path in the URL for each environment. For instance, the one built out of our develop branch is available at hourly.penpot.dev/storybook. Use yarn watch:storybook to develop the Design System components with the help of Storybook. \\u26A0\\uFE0F WARNING: Do stop any existing Shadow CLJS and asset compilation jobs (like the ones running at tabs 0 and 1 in the devenv tmux), because watch:storybook will spawn their own.\\n\\nAdd a new \\u003Ccomponent\\u003E.cljs file within the ds/ folder tree. This contains the CLJS implementation of the component, and related code (props schemas, private components, etc.). Add a \\u003Ccomponent\\u003E.css file with the styles for the component. This is a CSS Module file, and the selectors are scoped to this component. Add a \\u003Ccomponent\\u003E.stories.jsx Storybook file (see the Storybook section below). (Optional) When available docs, add a \\u003Ccomponent\\u003E.mdx doc file (see Storybook section below). In addition to the above, you also need to specifically export the new component with a JavaScript-friendly name in frontend/src/app/main/ui/ds.cljs. ... Primary tokens, referring to raw values (i.e. pixels, hex colors, etc.) of color, sizes, borders, etc. These are implemented as Sass variables. Examples are: $mint-250, $sz-16, $br-circle, etc. Semantic tokens, used mainly for theming.\\n\\nComponent tokens, defined at component level as CSS custom properties. These are very useful when implementing variants. Examples include --button-bg-color or --toast-icon-color. These custom properties are constrained to the local scope of its component. We can leverage component tokens to easily implement variants as explained here. Please refer to the Storybook documentation for icons and other SVG assets (logos, illustrations, etc.). We use Storybook to implement and showcase the components of the Design System. The Storybook is available at the /storybook path in the URL for each environment. For instance, the one built out of our develop branch is available at hourly.penpot.dev/storybook. Use yarn watch:storybook to develop the Design System components with the help of Storybook. \\u26A0\\uFE0F WARNING: Do stop any existing Shadow CLJS and asset compilation jobs (like the ones running at tabs 0 and 1 in the devenv tmux), because watch:storybook will spawn their own.\\n\\nWhen developing UI components in Penpot, we believe it is crucial to ensure that our frontend code is semantic and follows HTML conventions. Semantic HTML helps improve the readability and accessibility of Penpot. Use appropriate HTML tags to define the structure and purpose of your content. This not only enhances the user experience but also ensures better accessibility. Whenever possible, leverage HTML semantic elements, which have been implemented by browsers and are accessible out of the box. ... Using the proper heading level. ... Also, elements should be focusable with keyboard. Pay attention to tabindex and the use of focus. If you cannot use a native element because of styling (like a \\u003Cselect\\u003E for a dropdown menu), consider either adding one that is hidden (except for assistive software) or use relevant aria roles in your custom markup. When using images as icons, they should have an aria-label, alt, or similar if they are not decorative and there\\u0027s no text around to tag the bu\\n\\nNested styles for DOM elements that are not instantiated by our component should be avoided. Otherwise, we would be leaking CSS out of the component scope, which can lead to hard-to-maintain code. \\u274C AVOID: Styling elements that don\\u2019t belong to the component \\u00B7 (mf/defc button* [{:keys [children] :rest props}] (let [props (mf/spread-props props {:class (stl/css :primary-button)})] ;; note that we are NOT instantiating a \\u003Csvg\\u003E here. [:\\u003E \\u0022button\\u0022 props children])) ;; later in code [:\\u003E button* {} [:\\u003E icon {:id \\u0022foo\\u0022}] \\u0022Lorem ipsum\\u0022] .button { // ... svg { fill: var(--icon-color); } } \\u2705 DO: Take ownership of instantiating the component we need to style \\u00B7 (mf/defc button* [{:keys [icon children class] :rest props}] (let [props (mf/spread-props props {:class (stl/css :button)})] [:\\u003E \\u0022button\\u0022 props (when icon [:\\u003E icon* {:icon-id icon :size \\u0022m\\u0022 :class (stl/css :icon)}]) [:span {:class (stl/css :label-wrapper)} children]])) ;; later in code [:\\u003E button* {:icon \\u0022foo\\u0022} \\u0022Lorem ipsum\\u0022] .button { // ..\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/technical-guide/developer/ui/\"}},{\"type\":\"knowledge\",\"title\":\"02\\u00B7 The interface\",\"url\":\"https://help.penpot.app/user-guide/the-interface/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Inspect mode: At the Inspect mode you can get design specifications such as object properties, measurements and distances. You can also get code snippets for CSS styles, HTML and SVG. More about Inspect. Interactions settings: Select whether to highlight interactions active areas on click, all the time or not at all. More about interaction settings. Zoom: Zoom options and info about their shortcuts. Edit file: Opens file edition at the design workspace. Fullscreen mode: Activate or deactivate browser fullscreen mode. Share prototype: Create shareable links of the view mode to send it to developers, other designers or stakeholders, so they can view the designs and access the code specifications regardless of being at your team or even logged at Penpot. Boards counter: Boards count and current position. Reset prototype: Goes to the first board of the prototype.\\n\\nThe Workspace is where you actually create your designs. You have an infinite canvas where you can work directly but you also have the ability to create and work inside boards that will help you to create pages and exportation units. 1) Viewport 2) Toolbar 3) Main menu 4) Pages 5) Layers 6) Rulers 7) Color palette 8) Typography palette 9) Design properties 10) Prototype mode 11) Inspect mode 12) View mode 13) Share / Invite 14) History 15) Comments 16) Zoom 17) Users 18) Assets 19) Design tokens 20) File status \\u00B7 Viewport: An infinite canvas where you can design without limits. Toolbar: This is where you\\u2019ll find all the tools to quickly and easily create different types of objects: board, rectangle, ellipse, text, graphic, path, and free drawing. Learn more about objects. Main menu: From the main menu, you can customize your workspace. Manage the visibility of grids, rulers, and panels.\\n\\nInspect mode: Use Inspect Mode to get measurements, properties, and production-ready code from your designs. It also provides a safer, view-only mode with additional improvements. Learn more about inspecting designs. View mode: The View Mode button launches a presentation of your boards. Explore more features in the View Mode guide. Share / Invite: Invite team members to give them access to this file and all team files. History: The History panel records recent changes in an open file. Use undo/redo to step through changes, and expand each entry for detailed information. Learn more about the history panel. Comments: Switch to Comments Mode to view all comments on the file and add new ones. Zoom: Options to zoom in, zoom out, or fit the canvas. Users: See how many users currently have the file open. Assets: Each file includes a default File Library where you can store reusable elements and styles, such as components, colors, and text styles.\\n\\nDesign tokens: Design tokens are the building blocks of UI elements, expressed in a format usable across design, tools, and code. They include colors, typography, spacing, shadows, and more. File status: Displays the file\\u2019s saving state, showing whether your latest changes are saved or if there\\u2019s a problem. Launch the view mode to present and share your designs, comment on them and play with the interactions set at the workspace. You also have an Inspect mode where you can get properties specifications and code snippets. More about the View mode. 1) Pages selector 2) Boards selector 3) Play mode 4) Comments mode 5) Inspect mode 6) Interactions settings 7) Zoom options 8) Edit file 9) Full screen 10) Share prototype 11) Boards counter 12) Reset prototype 13) Navigation button \\u00B7 Pages selector: Navigate through the pages of a file. Boards selector: Boards selector displays a list of the boards with thumbnails that provide a graphic overview of the file.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/user-guide/the-interface/\"}},{\"type\":\"knowledge\",\"title\":\"3.05. Frontend Guide\",\"url\":\"https://help.penpot.app/technical-guide/developer/frontend/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"The Clojurescript environment generates source maps to trace your code step by step and inspect variable values. You may also insert breakpoints from the sources tab, like when you debug javascript code. One way of locating a source file is to output a trace with (js/console.log) and then clicking in the source link that shows in the console at the right of the trace. The penpot namespace of the main application is exported, so that is accessible from javascript console in Chrome developer tools. Object names and data types are converted to javascript style. For example you can emit the event to reset zoom level by typing this at the console (there is autocompletion for help): app.main.store.emit_BANG_(app.main.data.workspace.reset_zoom); We have defined, at src/debug.cljs, a debug namespace with many functions easily accesible from devtools console.\\n\\nOur initial approach involves following the instructions of the first group of locators, \\u0022Queries accessible to everyone\\u0022. To achieve this, we inspect the accessibility tree to gather information: Having examined the accessibility tree, we identify that the button can be located by its role and name, which is our primary option: ... For selecting the \\u003Cinput\\u003E within the form, we opt for getByLabel, as it is the recommended method for locating form inputs: ... To locate the rest of the elements we continue exploring the list of queries according to the order of priority. If none of the above options match the item, we resort to getByTestId as a last resort. Assertions use Playwright\\u0027s expect method. Here are some tips for writing your assertions: Keep assertions clear and concise: Each assertion should verify a single expected behavior or outcome. Avoid combining multiple assertions into a single line, to maintain clarity and readability.\\n\\nObviously, in this mode if you make changes to the source code, you will need to repeat the build manually each time. It may be useful to use wath mode when debugging a single test, and use release mode to run all the suite. Here\\u0027s how to run the tests with a headless browser (i.e. within the terminal, no UI): With the developer environment tmux session opened, create a new tab with Ctrl \\u002B b c. ... \\uD83D\\uDCA1 TIP: By default, the tests will not run in parallel. You can set the amount of workers to run the tests with --workers. Note that, depending on your machine, this might make some tests flaky. # run in parallel with 4 workers yarn test:e2e --workers 4 \\u00B7 To access the testing UI and run the tests in a real browser, follow these steps: In a terminal in your host machine, navigate to the frontend folder, then run: ... \\u26A0\\uFE0F WARNING: It is important to be in the right folder (frontend) to launch the command above, or you may have errors trying to run the tests.\\n\\nexport class FooPage extends BasePage { setupNetworkResponses() { this.mockRPC(\\u0022lorem/ipsum\\u0022, \\u0022json-file-with-fake-response.json\\u0022); // Regexes are supported too this.mockRPC( /a\\\\-regex$/ \\u0022json-file-with-fake-response.json\\u0022 ); // ...You can also pass custom status code and override other options this.mockRPC(\\u0022something/not/found\\u0022, \\u0022json-file-with-fake-response.json\\u0022, { status: 404, }); } } \\u2757\\uFE0F IMPORTANT: The mockRPC method is meant to intercept calls to Penpot\\u0027s RPC API, and already prefixes the path you provide with /api/rpc/command/. So, if you need to intercept /api/rpc/command/get-profile you would just need to call mockRPC(\\u0022get-profile\\u0022, \\u0022json-data.json\\u0022). Any Penpot page that uses a WebSocket requires it to be intercepted and mocked. To do that, you can extend from the POM BaseWebSocketPage and call its initWebSockets() methods before each test.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/technical-guide/developer/frontend/\"}},{\"type\":\"knowledge\",\"title\":\"13\\u00B7 View mode\",\"url\":\"https://help.penpot.app/user-guide/view-mode/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Present designs and share prototypes with Penpot\\u0026#x27;s View mode! Play interactions, navigate boards, zoom, and toggle fullscreen. Try it for free!\\n\\nActivate the inspect mode by pressing its button at the top navbar. Inspect mode will not always be available in view mode shared links, this will depend on the link settings.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/user-guide/view-mode/\"}},{\"type\":\"knowledge\",\"title\":\"08\\u00B7 Flexible Layouts\",\"url\":\"https://help.penpot.app/user-guide/flexible-layouts/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Grid layout at Penpot behaves just like CSS Grid because it is actually using the CSS Grid standard. This means that you can just switch to Inspect mode, get the code and use it in real websites.\\n\\nDesigning with Flex Layout generates ready for production code. Select the flex board or its inner elements and then open the Inspect tab to obtain its properties, detailed info and raw code. A classic example that will help you create flexible buttons that grow depending on its content. Extremely useful for ordering list items. Remember to set fit height to the container so it can adapt to the number of items. Use the wrap property along with row direction to get the elements positioned in multiple lines. Grid Layout allows you to efficiently organize, align, and distribute items in 2-dimensional layouts. You can create rows and columns of elements, giving you fine-grained control over their expansion, alignment, and responsiveness to various screen sizes. It\\u0027s a powerful tool for creating responsive designs. ... Penpot\\u0027s Grid Layout is built over CSS Grid, a fairly new CSS module.\\n\\nGrid layout at Penpot behaves just like CSS Grid because it is actually using the CSS Grid standard. This means that you can just switch to Inspect mode, get the code and use it in real websites.\\n\\nThere are properties both for Grid containers and Grid items (cells, rows, cols). Those are the same properties that you can use with CSS Grid. You can read here detailed explanations about CSS Grid properties. Direction: Row, column. Align items (vertically and horizontally): Start, center, end. Justify items (vertically and horizontally): Start, center, end, space-around, space-between, stretch. Gap: Row, column. Padding: Top, right, bottom, left, vertical, horizontal. ... These are different ways to manage the element\\u0027s position that therefore have different code representation. Auto: The elements are positioned in order inside the cells so that if a new element enters the flow the rest get repositioned. This is the default behaviour. Manual: The elements are positioned in specific cells or areas. Elements inside area cells will have the css properties grid-column and grid-row.\\n\\nPenpot\\u0027s proposal tries to get as close as possible to the final output that we will see on the web. Design and development speak the same language in order to embrace web standards and improve communication between roles. At Penpot you have unique ways to create and manage adaptative layouts that have all the advantages of CSS standards. Penpot\\u0027s unique Flex Layout allows you to create flexible designs that can adapt automatically. Resize, fit, and fill content and containers without the need to do it manually. To help you learn the fundamentals of Flex Layout here\\u2019s a dedicated website where you will find a video tutorial and a playground template. Penpot\\u0027s Flex Layout is built over Flexbox, a CSS module that provides a more efficient way to lay out, align and distribute space among items in a container. There are many comprehensive explanations about Flexbox, if you are interested we recommend you to read the one at CSS Tricks.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/user-guide/flexible-layouts/\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 15 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"e2c2e368-d4d5-4416-83f8-4d26919686a3\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

