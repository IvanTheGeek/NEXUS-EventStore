text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_fetch\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Tutorial: Creating and using component variants in Penpot\",\"url\":\"https://penpot.app/blog/tutorial-creating-and-using-component-variants-in-penpot/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"penpot\"},\"is_missing\":false,\"text\":\"[Design](https://penpot.app/blog/tag/design/)\\nTutorial: Creating and using component variants in Penpot\\nComponent variants are a way to create different variations of a component. Does your component need different sizes? Colors? Levels of elevation? Variants make it easy to define these properties, and choose between them when you\\u2019re using a component in your designs.\\n![Tutorial: Creating and using component variants in Penpot](/blog/content/images/size/w1200/2025/09/how-to-variants--3-.jpg)\\nComponent variants are a way to create different variations of a component. Does your component need different sizes? Colors? Levels of elevation? Variants make it easy to define these properties, and choose between them when you\\u2019re using a component in your designs.\\n![A Basic star component in Penpot with the chosen variant using size small and color pink properties.](https://penpot.app/blog/content/images/2025/09/variant.png)\\n[Check out this primer on components and libraries](https://penpot.app/blog/tutorial-create-and-share-components-in-penpot/).\\nHow to use component variants\\nYou can find components in their dedicated section under the Assets tab. Components from the current (local) file appear at the top, with connected library components grouped by library underneath.\\n- Drag your chosen component onto the canvas. You can tell if a component has variants from the dotted diamond icon displayed over the component preview.\\n- Select the component on the canvas or from the Layers list. You can then find the component\\u2019s variants in the Design panel, listed under the component name.\\n- Pick your desired values from the variant property menus. Changing the value will update the component on the canvas.\\nWhen you change the text content inside a component, your text changes will be preserved when you switch between variants, as long as you don\\u2019t change the text layer\\u2019s name. [Read more about variants and overrides in Penpot\\u2019s user guide](https://help.penpot.app/user-guide/components/#component-use-variants).\\nYou can try out some components with variants in the [Variant examples template in the Penpot Hub](https://penpot.app/penpothub/libraries-templates/variant-examples).\\nHow to create component variants\\nIn order to create a component variant, you must first create a component.\\n![Right-clicking an avatar flex object and hovering over the Create component option in the menu.](https://penpot.app/blog/content/images/2025/09/create-component.webp)\\nCreate a component\\n- Select an object, multiple objects or a group on the canvas or in the Layers list.\\n- Right-click the selection and choose Create component from the menu or use the\\ncmd/ctrl\\n\\u002BK\\nkeyboard shortcut. - Your main component will now appear in the Assets panel, and will be indicated on the canvas and in the Layers list by a double diamond icon.\\nThe main component is the original component that is stored in the Assets library. When you use that component elsewhere in your design, it is called a component copy (or instance.) You can [override some aspects of the main component](https://help.penpot.app/user-guide/components/#component-overrides-relationships) in your component copies, like the text or the color. You can also easily reset your component copy back to match the main component by right-clicking the copy and choosing Reset overrides.\\nCreate component variants\\nAfter you have created a component, you can create variants for that component.\\n![Hovering over the Create variant option in the component menu.](https://penpot.app/blog/content/images/2025/09/create-variant-1.webp)\\n- Select your main component from the canvas or the Layers list. If you can\\u2019t find your main component on the canvas, you can locate it from the Components section in the Assets panel by right-clicking its name and choosing Show main component.\\n- From the Design panel, choose Create variant from the options menu alongside the component name.\\n[Read more about other ways to create variants](https://help.penpot.app/user-guide/components/#component-create-and-modify-variants), including using keyboard shortcuts. - A duplicate of your component will be created as a new variant, alongside the original. Each variant will share a default property named Property1. The first variant will have a value of Value 1 for Property1, and the second variant will have a value of Value 2 for Property1.\\n- Select each variant on the canvas or from the Layers list to name the property that differs across each variant, and its different options/values. For example, the variants could have a Property name of Color, with one variant using the value Yellow, and the other variant using the value Blue.\\n![An avatar component with yellow and blue variants selected on the canvas, showing the color property and yellow-comma-blue values in the components section of the design panel.](https://penpot.app/blog/content/images/2025/09/variants.webp)\\nA main component with variants will have a thick purple border around the variants on the canvas.\\nCreate variants from existing components\\nYou might already have components in your Assets library that would work perfectly as variants of the same component. You can easily turn these components into variants.\\n- Select each main component on the canvas or from the Layers list.\\n- In the Design panel, choose Create variants from existing components from the Component section.\\n- Your components will be converted into variants of one component.\\nLearn more about component variants\\nIf you\\u2019d like to see more examples of component variants in action, check out the [hands-on demo for variants](https://www.youtube.com/watch?v=TLuTQxJGv3g) or the tutorial with [5 examples of component variants](https://penpot.app/blog/tutorial-5-examples-of-component-variants/). Discover all the [advanced details on connection conditions and overrides in the Penpot User Guide on components](https://help.penpot.app/user-guide/components/).\\n[Tutorial: 5 examples of component variantsVariants add an extra level of flexibility to your components, as well as providing better documentation and making designs even more developer-friendly.](https://penpot.app/blog/tutorial-5-examples-of-component-variants/)![](https://penpot.app/blog/content/images/2025/09/Variants-in-Design-system.jpg)\\n![](https://penpot.app/blog/content/images/2025/09/Variants-in-Design-system.jpg)\\n[Tutorial: Create and share components in PenpotLearn about creating components and libraries of shared components in Penpot for your team\\u2019s design system.](https://penpot.app/blog/tutorial-create-and-share-components-in-penpot/)![](https://penpot.app/blog/content/images/2024/10/feature-image-1.webp)\\n![](https://penpot.app/blog/content/images/2024/10/feature-image-1.webp)\\n[Creating Design Systems With PenpotLet\\u2019s walk through the Penpot features you can use to create your team\\u2019s design system, from shareable libraries to generated CSS and everything in between.](https://penpot.app/blog/penpot-for-design-systems-101/)![](https://penpot.app/blog/content/images/2024/05/Feature-image-1.png)\\n![](https://penpot.app/blog/content/images/2024/05/Feature-image-1.png)\",\"is_citable\":true,\"prompt_context_metadata\":{\"mime_type\":\"text/html; charset=utf-8\",\"content_type\":\"html\",\"destination_url\":\"https://penpot.app/blog/tutorial-creating-and-using-component-variants-in-penpot\"}}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":\"Fetched: Tutorial: Creating and using component variants in Penpot\",\"integration_name\":\"Web Fetch\",\"integration_icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"icon_name\":null,\"display_content\":{\"type\":\"rich_link\",\"link\":{\"title\":\"Tutorial: Creating and using component variants in Penpot\",\"subtitles\":null,\"url\":\"https://penpot.app/blog/tutorial-creating-and-using-component-variants-in-penpot/\",\"resource_type\":null,\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"source\":\"penpot\"},\"is_trusted\":false}}"

