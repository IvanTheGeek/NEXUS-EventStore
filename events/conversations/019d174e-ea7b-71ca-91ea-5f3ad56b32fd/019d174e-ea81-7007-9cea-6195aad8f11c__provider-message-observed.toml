text = "{\"start_timestamp\":\"2025-12-01T18:54:03.748539Z\",\"stop_timestamp\":\"2025-12-01T18:54:04.244951Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"web_fetch\",\"input\":{\"url\":\"https://help.penpot.app/user-guide/flexible-layouts/\"},\"message\":\"Fetching: https://help.penpot.app/user-guide/flexible-layouts/\",\"integration_name\":\"Web Fetch\",\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

