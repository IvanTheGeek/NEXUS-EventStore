text = "{\"start_timestamp\":\"2025-12-01T18:53:56.300812Z\",\"stop_timestamp\":\"2025-12-01T18:53:57.002835Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"web_fetch\",\"input\":{\"url\":\"https://help.penpot.app/user-guide/prototyping/\"},\"message\":\"Fetching: https://help.penpot.app/user-guide/prototyping/\",\"integration_name\":\"Web Fetch\",\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

