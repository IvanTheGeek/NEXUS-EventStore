kind = "tool_result"
text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"11\\u00B7 Components\",\"url\":\"https://help.penpot.app/user-guide/components/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"... A component\\u2019s variants are organized by properties and their values. Properties define the dimensions that distinguish your variants (for example: Color, Size, State). Values are the specific options within a property (for example: ...\\n\\nTip: The first options shown to swap a component are the ones at the same level inside the assets library, so group them properly. Variants allow you to group similar components, such as buttons, icons, or toggles, into a single, customizable component. Rather than navigating through separate components for every possible state, size, or style, you can manage them all from one unified component using clearly defined properties. Imagine a single button component that can switch between primary and secondary styles, active and disabled states, and small to large sizes. Useful, right? That\\u2019s the power of Variants. Cleaner libraries Keep related designs organized in the Design viewport, Layers panel, and swap menu. Variants streamline your components into tidy, manageable sets, allowing you to retain overrides when switching between them. Faster design workflows Make it easier to find and select the right version by quickly switching between states or styles using simple property controls.\\n\\nBetter team collaboration With variants, you can match the way states are handled in code, helping designers and developers stay in sync, fostering better collaboration between design and development teams. ... A component\\u2019s variants are organized by properties and their values. Properties define the dimensions that distinguish your variants (for example: Color, Size, State). Values are the specific options within a property (for example: Primary/Secondary, Small/Large, Default/Hover/Pressed) Each variant is simply one unique combination of values across all properties (for example, Color=Primary \\u002B Size=Small \\u002B State=Hover). Variants must have at least one property, and property values should be kept consistent to make switching predictable and to preserve overrides across connected layers. You can create variants from an existing component or from another variant: From a component: Press Ctrl \\u002B K or right-click and select the menu option Create variant.\\n\\nFrom a variant: Select the variant and press Ctrl \\u002B K or right-click and select the menu option Create variant. By dragging: Drag a main component into an existing component with variants to add it as a new variant. From the Design tab (right sidebar): Select a component or a variant, open the context menu next to the component name and select the menu option Create variant. ... It appears next to the original in a dedicated variant area (by default in horizontal flex layout). Shared layers between variants are automatically connected (connection conditions) so that overrides can be preserved. Variants are named using their property values (e.g., Primary / Hover). Properties are key to defining and differentiating your variants. They appear in the Design tab when a variant or component with variants is selected. From the Design tab: When the component or one of its variants is selected, you can add a new property via a menu.\\n\\nDragging a variant outside its component turns it into an independent component instead of deleting it. If you delete the last variant, the entire component is removed. If you have a copy of a variant whose original was deleted, you can restore it: Select the variant copy, press right-click, and select the menu option Restore variant (will show if the main component still exists). Once you have created your variants, you can place a copy of a component with variants into your design and then switch between its different versions. Drag and drop a component with variants from the Assets tab onto the design viewport, just like you would with any other component. Once placed, you can then use its properties in the Design tab to switch to the desired variant. ... You\\u2019ll see its properties and values. Change one or more property values to switch to another variant.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/user-guide/components/\"}},{\"type\":\"knowledge\",\"title\":\"3.10. UI Guide\",\"url\":\"https://help.penpot.app/technical-guide/developer/ui/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"If a component has variants, we should show each one in its own story. Leverage setting base prop values in args and common rendering code in render to reuse those in the stories and avoid code duplication.\\n\\nComponent tokens, defined at component level as CSS custom properties. These are very useful when implementing variants. Examples include --button-bg-color or --toast-icon-color. These custom properties are constrained to the local scope of its component. We can leverage component tokens to easily implement variants as explained here. Please refer to the Storybook documentation for icons and other SVG assets (logos, illustrations, etc.). We use Storybook to implement and showcase the components of the Design System. The Storybook is available at the /storybook path in the URL for each environment. For instance, the one built out of our develop branch is available at hourly.penpot.dev/storybook. Use yarn watch:storybook to develop the Design System components with the help of Storybook. \\u26A0\\uFE0F WARNING: Do stop any existing Shadow CLJS and asset compilation jobs (like the ones running at tabs 0 and 1 in the devenv tmux), because watch:storybook will spawn their own.\\n\\nLearn UI development with React \\u0026 Rumext, design system implementation, and performance considerations. See Penpot\\u0027s technical guide. Free to use!\\n\\nReduce the need for one-off SASS variables by leveraging CSS custom properties in your component styles. This keeps component theming flexible and composable. For instance, this is how we handle the styles of \\u003CToast\\u003E, which have a different style depending on the level of the message (default, info, error, etc.) .toast { // common styles for all toasts // ... --toast-bg-color: var(--color-background-primary); --toast-icon-color: var(--color-foreground-secondary); // ... more variables here background-color: var(--toast-bg-color); } .toast-icon { color: var(--toast-bg-color); } .toast-info { --toast-bg-color: var(--color-background-info); --toast-icon-color: var(--color-accent-info); // ... override more variables here } .toast-error { --toast-bg-color: var(--color-background-error); --toast-icon-color: var(--color-accent-error); // ... override more variables here } // ... more variants here \\u00B7\\n\\nIf a component has variants, we should show each one in its own story. Leverage setting base prop values in args and common rendering code in render to reuse those in the stories and avoid code duplication. For instance, the stories file for the button* component looks like this: // ... export default { title: \\u0022Buttons/Button\\u0022, component: Components.Button, // These are the props of the component, and we set here default values for // all stories. args: { children: \\u0022Lorem ipsum\\u0022, disabled: false, variant: undefined, }, // ... render: ({ ...args }) =\\u003E \\u003CButton {...args} /\\u003E, }; export const Default = {}; // An important prop: \\u0060icon\\u0060 export const WithIcon = { args: { icon: \\u0022effects\\u0022, }, }; // A variant export const Primary = { args: { variant: \\u0022primary\\u0022, }, }; // Another variant export const Secondary = { args: { variant: \\u0022secondary\\u0022, }, }; // More variants here\\u2026\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/technical-guide/developer/ui/\"}},{\"type\":\"knowledge\",\"title\":\"09\\u00B7 Asset Libraries\",\"url\":\"https://help.penpot.app/user-guide/libraries/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Asset Libraries allow you to store elements and styles so that they can be easily reused. Libraries may include components, graphics, colors and typographies. Learn how to create and manage them to better organize the pieces of your designs and speed your workflow. ... Components: A component is an object or group of objects that can be reused multiple times across files (projects and teams in the future). Learn more at the components section. Colors: Create your color styles and use them on fills and strokes. Typographies: Penpot allows you to save typography styles with a set of reusable properties. You can always unlink a typography style maintaining the properties for the text layer. [Deprecated] Graphics: In Penpot versions older than 2.0, bitmap and vector images can be stored at the Graphics section. This type was deprecated in favor of components.\\n\\nThere are two ways to add components to an assets library: Main components are automatically stored in the local library at the moment of being created. Learn more about components at the components section. Clicking the \\u201C\\u002B\\u201D to launch import an image that will be added as a component. Click the \\u201C\\u002B\\u201D to launch the color picker and add a color to the library. Learn more about managing color \\u00B7 All typography styles created from the text properties (at the right sidebar) are automatically stored at the library. You can also click the \\u201C\\u002B\\u201D to create a new typography style from scratch. Tip: If you select a text layer with certain properties (font family, size, line height...) and click the \\u0022\\u002B\\u0022 at the Typographies section at the assets library (left sidebar), the created typography style will include the properties of the text layer. Press left click over any asset of the library to show the options menu.\\n\\nComponents: Rename, duplicate, delete, group. Colors: Rename, edit, delete. Typographies: Rename, edit, delete. Components: Drag the component directly from the library to the viewport. Colors: With a shape or a text selected click a color from the library to apply it as a fill. If you press Alt (or \\u2325 in macOS) while clicking, the color will be applied to the stroke. Typographies: With a text layer selected click a typography style from the library to apply it. Learn how to better view and organize your assets: You can switch between list and grid views. Grid view: With the thumbnails displayed is easier to visually identify the content of specific assets, specially components. List view: Optimized to identify the assets by their names and view more assets at the same time. Click the sort button to change the alphabetical order. Use the Search assets box to filter the assets with names that match what you write.\\n\\nYou can decide whether to show all asset types or only one of your choice (components, colors or typographies). There are two ways to create groups in a library. With slashes (/): Select an asset and rename it as follows: \\u0022FOLDER NAME/ASSET NAME\\u0022. For example, \\u0022Buttons/Alert Button\\u0022. With the \\u0022Group\\u0022 option: Select one or more assets at the library, then right click to show the menu and then select \\u0022Group\\u0022. You can ungroup the assets the same ways you can group them, via the menu option (\\u0022Ungroup\\u0022 in this case) or renaming them. One very direct way to move assets between groups at the libraries is by dragging them. Each file has its own file library which is where the assets that belong to this file are stored. You have two ways to access the file library from the file workspace: Click the assets tab icon at the left sidebar. Press Alt/\\u2325 \\u002B i. You can publish any regular file as a shared library.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/user-guide/libraries/\"}},{\"type\":\"knowledge\",\"title\":\"3.04. Common Guide\",\"url\":\"https://help.penpot.app/technical-guide/developer/common/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"(ns app.common-tests.sample-components-test (:require [app.common.test-helpers.components :as thc] [app.common.test-helpers.files :as thf] [app.common.test-helpers.shapes :as ths])) (t/deftest test-create-component (let [;; Create a file with one component f1 (-\\u0026gt; (thf/sample-file :file1) (ths/add-sample-shape :frame1 :type :frame) (ths/add-sample-shape :rect1 :type :rect :parent-label :frame1) (thc/make-component :component1 :frame1))])) Finally, there are composition helpers, to build typical structures with a single line of code.\\n\\nAlso there are functions to make some transformations, like creating a component, instantiating it or swapping a copy.\\n\\nThe Penpot variant doesn\\u0027t have any runtime checks to know if asserts are disabled. Instead, the assert calls are completely removed by the compiler/runtime, thus generating simpler and faster code in production builds. ... (require \\u0027[clojure.spec.alpha :as s] \\u0027[app.common.spec :as us]) (s/def ::number number?) (us/assert ::number 3) An assertion type that is always executed. ... This macro enables you to have assertions on production code, that generate runtime exceptions when failed (make sure you handle them appropriately). We expect all Penpot code (either in frontend, backend or common subsystems) to have unit tests, i.e. the ones that test a single unit of code, in isolation from other blocks. Currently we are quite far from that objective, but we are working to improve this. Unit tests are executed inside the development environment. We can use kaocha test runner, and we have prepared, for convenience, some aliases in deps.edn files.\\n\\n(ns app.common-tests.sample-components-test (:require [app.common.test-helpers.components :as thc] [app.common.test-helpers.files :as thf] [app.common.test-helpers.shapes :as ths])) (t/deftest test-create-component (let [;; Create a file with one component f1 (-\\u003E (thf/sample-file :file1) (ths/add-sample-shape :frame1 :type :frame) (ths/add-sample-shape :rect1 :type :rect :parent-label :frame1) (thc/make-component :component1 :frame1))])) Finally, there are composition helpers, to build typical structures with a single line of code.\\n\\n(ns app.common-tests.sample-compositions-test (:require [app.common.test-helpers.compositions :as tho] [app.common.test-helpers.files :as thf])) (t/deftest test-create-composition (let [f1 (-\\u003E (thf/sample-file :file1) (tho/add-simple-component-with-copy :component1 :main-root :main-child :copy-root))] (ctf/dump-file f1 :show-refs? true))) ;; {:main-root} [:name Frame1] # [Component :component1] ;; :main-child [:name Rect1] ;; ;; :copy-root [:name Frame1] #--\\u003E [Component :component1] :main-root ;; \\u003Cno-label\\u003E [:name Rect1] ---\\u003E :main-child \\u00B7 You can see more examples of usage by looking at the existing unit tests.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/technical-guide/developer/common/\"}},{\"type\":\"knowledge\",\"title\":\"10\\u00B7 Design Tokens\",\"url\":\"https://help.penpot.app/user-guide/design-tokens/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"You can also integrate Design Tokens with other core Penpot features, such as components and grid \\u0026amp; flex layout, plus plugins will be able to access the tokens API (coming soon) making it even more powerful. Penpot Design Tokens adhere to the Design Tokens Format Module and its definitions, a draft by the W3C DTCG. Penpot ensures compatibility across various disciplines, tools, and technologies by following the most standardized approach available for design tokens. Tokens can be exported from Penpot or integrated into other tools directly, without conversion. Additionally, the knowledge gained from using Design Tokens in Penpot remains valuable, regardless of whether you continue using Penpot or a different tool or technology. You can create reusable and semantic tokens to be referenced in your designs at the Tokens panel. In this panel, you\\u2019ll find all the available types of ...\\n\\nYou can also integrate Design Tokens with other core Penpot features, such as components and grid \\u0026 flex layout, plus plugins will be able to access the tokens API (coming soon) making it even more powerful. Penpot Design Tokens adhere to the Design Tokens Format Module and its definitions, a draft by the W3C DTCG. Penpot ensures compatibility across various disciplines, tools, and technologies by following the most standardized approach available for design tokens. Tokens can be exported from Penpot or integrated into other tools directly, without conversion. Additionally, the knowledge gained from using Design Tokens in Penpot remains valuable, regardless of whether you continue using Penpot or a different tool or technology. You can create reusable and semantic tokens to be referenced in your designs at the Tokens panel. In this panel, you\\u2019ll find all the available types of tokens in Penpot arranged alphabetically, with existing tokens being shown at the top of the list.\\n\\nDesign freedom for teams.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/user-guide/design-tokens/\"}},{\"type\":\"knowledge\",\"title\":\"08\\u00B7 Flexible Layouts\",\"url\":\"https://help.penpot.app/user-guide/flexible-layouts/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"11\\u00B7 Components \\u00B7 12\\u00B7 Prototyping \\u00B7 13\\u00B7 View mode \\u00B7 14\\u00B7 Inspect designs \\u00B7 15\\u00B7 Import/export files \\u00B7 16\\u00B7 Teams \\u00B7 17\\u00B7 Custom fonts \\u00B7 18\\u00B7 Plugins \\u00B7 Penpot\\u0026#x27;s proposal tries to get as close as possible to the final output that we will see on the web. Design and development speak the same language in order to embrace web standards and improve communication between roles. At Penpot you have unique ways to create and manage adaptative layouts that have all the advantages of CSS standards. Penpot\\u0026#x27;s unique Flex Layout allows you to create flexible designs that can adapt automatically. Resize, fit, and fill content and containers without the need to do it manually. To help you learn the fundamentals of Flex Layout here\\u2019s a dedicated website where you will find a video tutorial and a playground template. Penpot\\u0026#x27;s Flex Layout is built over Flexbox, a CSS module that provides a more efficient way to lay out, align and distribute space among items in a container.\\n\\n11\\u00B7 Components \\u00B7 12\\u00B7 Prototyping \\u00B7 13\\u00B7 View mode \\u00B7 14\\u00B7 Inspect designs \\u00B7 15\\u00B7 Import/export files \\u00B7 16\\u00B7 Teams \\u00B7 17\\u00B7 Custom fonts \\u00B7 18\\u00B7 Plugins \\u00B7 Penpot\\u0027s proposal tries to get as close as possible to the final output that we will see on the web. Design and development speak the same language in order to embrace web standards and improve communication between roles. At Penpot you have unique ways to create and manage adaptative layouts that have all the advantages of CSS standards. Penpot\\u0027s unique Flex Layout allows you to create flexible designs that can adapt automatically. Resize, fit, and fill content and containers without the need to do it manually. To help you learn the fundamentals of Flex Layout here\\u2019s a dedicated website where you will find a video tutorial and a playground template. Penpot\\u0027s Flex Layout is built over Flexbox, a CSS module that provides a more efficient way to lay out, align and distribute space among items in a container.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/user-guide/flexible-layouts/\"}},{\"type\":\"knowledge\",\"title\":\"Frontend app\",\"url\":\"https://help.penpot.app/technical-guide/developer/architecture/frontend/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"ui is the root web component. It reads the current url and mounts the needed subcomponent depending on the route. auth has the web components for the login, register, password recover, etc. screens. settings has the web components for the user profile and settings screens. dashboard has the web components for the dashboard and its subsections. workspace has the web components for the file workspace and its subsections. viewer has the web components for the viewer and its subsections. render contain special web components to render one page or one specific shape, to be used in exports. export contain basic web components that display one shape or frame, to be used from exports render or else from dashboard and viewer thumbnails and other places. shapes is the basic collection of web components that convert all types of shapes in the corresponding svg elements, without adding any extra function.\\n\\ncomponents a library of generic UI widgets, to be used as building blocks of penpot screens (text or numeric inputs, selects, forms, buttons...). users has events to login and register, fetch the user profile and update it. dashboard has events to fetch and modify teams, projects and files. fonts has some extra events to manage uploaded fonts from dashboard. workspace has a lot of events to manage the current file and do all kinds of edits and updates. comments has some extra events to manage design comments. viewer has events to fetch a file contents to display, and manage the interactive behavior and hand-off. ... Some operations are costly to make in real time, so we leave them to be executed asynchronously in a web worker. This way they don\\u0027t impact the user experience. Some of these operations are generating file thumbnails for the dashboard and maintaining some geometric indexes to speed up snap points while drawing.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/technical-guide/developer/architecture/frontend/\"}},{\"type\":\"knowledge\",\"title\":\"5. Examples and templates\",\"url\":\"https://help.penpot.app/plugins/examples-templates/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Using components is a great way to reuse objects or groups of objects, making sure everything looks the same and works well across your designs. This example shows you how to create a component, which lets you make your workflow easier by defining reusable design elements. Just a friendly reminder that it\\u0026#x27;s important to have the library permissions in the manifest.json. ... Having quick access to your go-to colors and fonts can really help you work more efficiently, letting you build a solid set of assets with minimal effort. In this example, you\\u0026#x27;ll see how to add a color to your library, so you\\u0026#x27;ll have instant access whenever you need it. The same goes for typography assets\\u2014just replace createColor with createTypography. This flexibility means your most commonly used design elements are always at your fingertips, ready to enhance your creative workflow.\\n\\nUsing components is a great way to reuse objects or groups of objects, making sure everything looks the same and works well across your designs. This example shows you how to create a component, which lets you make your workflow easier by defining reusable design elements. Just a friendly reminder that it\\u0027s important to have the library permissions in the manifest.json. ... Having quick access to your go-to colors and fonts can really help you work more efficiently, letting you build a solid set of assets with minimal effort. In this example, you\\u0027ll see how to add a color to your library, so you\\u0027ll have instant access whenever you need it. The same goes for typography assets\\u2014just replace createColor with createTypography. This flexibility means your most commonly used design elements are always at your fingertips, ready to enhance your creative workflow.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/plugins/examples-templates/\"}},{\"type\":\"knowledge\",\"title\":\"1. Getting started\",\"url\":\"https://help.penpot.app/plugins/getting-started/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"library:read: Allows reading of library-related data and assets. Grants read access to all endpoints and operations dealing with the library context. Typical use cases: accessing shared design elements and components from a library or viewing the details and properties of library assets. library:write: Allows writing or modifying library-related data and assets. Grants write access to all endpoints and operations dealing with library modifications. Typical use cases: adding new components or assets to the library or updating or removing existing library elements. comment:read: Allows reading of comment-related data. Grants read access to all endpoints and operations dealing with comments. Typical use cases: viewing comments on pages; accessing feedback or annotations provided by collaborators in the project. comment:write: Allows writing or modifying comment-related data.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/plugins/getting-started/\"}},{\"type\":\"knowledge\",\"title\":\"3.02. Data model\",\"url\":\"https://help.penpot.app/technical-guide/developer/data-model/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"The data attribute contains the Pages and the library assets in the file (Components, MediaItems, Colors and Typographies). The lists of pages and assets are modelled also as entities because they have a lot of functions and business logic. Both Pages and Components contains a tree of shapes, and share many functions and logic. So, we have modelled a Container entity, that is an abstraction that represents both a page or a component, to use it whenever we have code that fits the two. A ShapeTree represents a set of shapes that are hierarchically related: the top frame contains top-level shapes (frames and other shapes). Frames and groups may contain any non frame shape. A Shape is the most important entity of the model. Represents one of the layers of our design, and it corresponds with one SVG node, augmented with Penpot special features. We have code to render a Shape into a SVG tag, with more or less additions depending on the environment (editable in the workspace, interactive in t\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/technical-guide/developer/data-model/\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"45c11372-c7c0-42bf-b790-cef44c41fc21\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

