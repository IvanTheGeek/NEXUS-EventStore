text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"view\",\"content\":[{\"type\":\"text\",\"text\":\"Here\\u0027s the content of /mnt/user-data/outputs/penpot-conventions.md with line numbers:\\n     1\\t# Penpot Conventions \\u0026 Learnings\\n     2\\t\\n     3\\t## Overview\\n     4\\tThis document captures conventions for building LaundryLog (and future apps) in Penpot, learned through iteration.\\n     5\\t\\n     6\\t---\\n     7\\t\\n     8\\t## Layer Order\\n     9\\t- **Bottom of panel = rendered first (back)**\\n    10\\t- **Top of panel = rendered last (front)**\\n    11\\t- In code: \\u0060children[0]\\u0060 is visually on TOP, \\u0060children[n]\\u0060 is at BOTTOM\\n    12\\t- When appending children, last appended is at top of layer panel (rendered on top)\\n    13\\t\\n    14\\t---\\n    15\\t\\n    16\\t## Component Hierarchy\\n    17\\t\\n    18\\t### Current Components (as of Path 1.1)\\n    19\\t\\u0060\\u0060\\u0060\\n    20\\tComponents/\\n    21\\t\\u251C\\u2500\\u2500 Header              (375\\u00D772) - App header with title \\u002B badge\\n    22\\t\\u251C\\u2500\\u2500 Button.Option       (150\\u00D764) - Selection button, default state\\n    23\\t\\u251C\\u2500\\u2500 Button.Option.Selected (150\\u00D764) - Selection button, selected state\\n    24\\t\\u251C\\u2500\\u2500 Button.Counter      (72\\u00D772) - Orange circular \\u002B/- for quantity\\n    25\\t\\u251C\\u2500\\u2500 Button.Quarter      (72\\u00D772) - Silver coin-style \\u00B1$0.25\\n    26\\t\\u251C\\u2500\\u2500 Button.QuickFill    (80\\u00D756) - Price preset button\\n    27\\t\\u251C\\u2500\\u2500 Button.GPS          (64\\u00D756) - GPS location button\\n    28\\t\\u251C\\u2500\\u2500 Input.Text          (240\\u00D752) - Text input field\\n    29\\t\\u251C\\u2500\\u2500 Section.Title       (150\\u00D724) - Section header text\\n    30\\t\\u251C\\u2500\\u2500 Card.Entry          (320\\u00D780) - Entry card for history\\n    31\\t\\u251C\\u2500\\u2500 main-title          - Text style component\\n    32\\t\\u2514\\u2500\\u2500 title               - Text style component\\n    33\\t\\u0060\\u0060\\u0060\\n    34\\t\\n    35\\t### Component Naming Convention\\n    36\\t\\u0060\\u0060\\u0060\\n    37\\tType.Name[.Variant]\\n    38\\t\\n    39\\tExamples:\\n    40\\t  Button.Option\\n    41\\t  Button.Option.Selected\\n    42\\t  Button.Counter\\n    43\\t  Input.Text\\n    44\\t  Card.Entry\\n    45\\t  Section.Title\\n    46\\t\\u0060\\u0060\\u0060\\n    47\\t\\n    48\\t---\\n    49\\t\\n    50\\t## Screen Structure\\n    51\\t\\n    52\\t### Screen Naming for Paths\\n    53\\t\\u0060\\u0060\\u0060\\n    54\\tPath{N}.{Step}-{StateName}\\n    55\\t\\n    56\\tExamples:\\n    57\\t  Path1.1-NewSession\\n    58\\t  Path1.2-LocationEntered\\n    59\\t  Path1.3-EntryForm\\n    60\\t\\u0060\\u0060\\u0060\\n    61\\t\\n    62\\t### Standard Screen Setup\\n    63\\t\\u0060\\u0060\\u0060\\n    64\\tScreen Board (375\\u00D7667 for iPhone SE, or 375\\u00D7812 for iPhone X)\\n    65\\t\\u251C\\u2500\\u2500 fills: #f8f9fa (background)\\n    66\\t\\u251C\\u2500\\u2500 flex: column, alignItems: stretch\\n    67\\t\\u2502\\n    68\\t\\u251C\\u2500\\u2500 Header (component instance)\\n    69\\t\\u2514\\u2500\\u2500 Content sections...\\n    70\\t\\u0060\\u0060\\u0060\\n    71\\t\\n    72\\t---\\n    73\\t\\n    74\\t## Flex Layout Patterns\\n    75\\t\\n    76\\t### Vertical Stack (most sections)\\n    77\\t\\u0060\\u0060\\u0060javascript\\n    78\\tflex.dir = \\u0022column\\u0022\\n    79\\tflex.alignItems = \\u0022stretch\\u0022  // or \\u0022center\\u0022 for centered content\\n    80\\tflex.rowGap = N  // spacing between items\\n    81\\t\\u0060\\u0060\\u0060\\n    82\\t\\n    83\\t### Horizontal Row (buttons, controls)\\n    84\\t\\u0060\\u0060\\u0060javascript\\n    85\\tflex.dir = \\u0022row\\u0022\\n    86\\tflex.alignItems = \\u0022center\\u0022\\n    87\\tflex.justifyContent = \\u0022center\\u0022  // or \\u0022space-between\\u0022\\n    88\\tflex.columnGap = N  // spacing between items\\n    89\\t\\u0060\\u0060\\u0060\\n    90\\t\\n    91\\t### Padding\\n    92\\t\\u0060\\u0060\\u0060javascript\\n    93\\tflex.paddingTop = N\\n    94\\tflex.paddingRight = N\\n    95\\tflex.paddingBottom = N\\n    96\\tflex.paddingLeft = N\\n    97\\t\\u0060\\u0060\\u0060\\n    98\\t\\n    99\\t---\\n   100\\t\\n   101\\t## Text Element Naming\\n   102\\tName text elements by their content/purpose, not generic names:\\n   103\\t\\u0060\\u0060\\u0060\\n   104\\tGood:                          Bad:\\n   105\\t\\u0022Enter location...\\u0022            \\u0022Value\\u0022\\n   106\\t\\u0022Where are you doing...\\u0022       \\u0022PromptText\\u0022  \\n   107\\t\\u0022Use GPS Location\\u0022             \\u0022Label\\u0022\\n   108\\t\\u0022LaundryLog\\u0022                   \\u0022Title\\u0022\\n   109\\t\\u0060\\u0060\\u0060\\n   110\\t\\n   111\\t---\\n   112\\t\\n   113\\t## Component vs Custom Element Decision\\n   114\\t\\n   115\\t**Use component instance when:**\\n   116\\t- Element matches component exactly\\n   117\\t- Only text content changes (overrideable)\\n   118\\t- Want updates to propagate from main component\\n   119\\t\\n   120\\t**Create custom element when:**\\n   121\\t- Layout differs from component\\n   122\\t- Need different structure\\n   123\\t- One-off variation not worth a new component\\n   124\\t\\n   125\\t---\\n   126\\t\\n   127\\t## Creating Components (Code Pattern)\\n   128\\t\\n   129\\t\\u0060\\u0060\\u0060javascript\\n   130\\t// 1. Navigate to Components page\\n   131\\tconst componentsPage = penpotUtils.getPageByName(\\u0022Components\\u0022);\\n   132\\tpenpot.openPage(componentsPage);\\n   133\\t\\n   134\\t// 2. Create the board with all styling\\n   135\\tconst board = penpot.createBoard();\\n   136\\tboard.name = \\u0022Component.Name\\u0022;\\n   137\\tboard.resize(width, height);\\n   138\\tboard.borderRadius = N;\\n   139\\tboard.fills = [{ fillColor: \\u0022#hex\\u0022, fillOpacity: 1 }];\\n   140\\tboard.strokes = [{ strokeColor: \\u0022#hex\\u0022, strokeOpacity: 1, strokeWidth: N, strokeAlignment: \\u0022inner\\u0022 }];\\n   141\\t\\n   142\\t// 3. Add flex layout if needed\\n   143\\tboard.addFlexLayout();\\n   144\\tboard.flex.dir = \\u0022row\\u0022 | \\u0022column\\u0022;\\n   145\\tboard.flex.alignItems = \\u0022center\\u0022;\\n   146\\tboard.flex.justifyContent = \\u0022center\\u0022;\\n   147\\t\\n   148\\t// 4. Create and append children\\n   149\\tconst text = penpot.createText(\\u0022Label\\u0022);\\n   150\\ttext.name = \\u0022Descriptive Name\\u0022;\\n   151\\tboard.appendChild(text);\\n   152\\t\\n   153\\t// 5. Convert to component\\n   154\\tconst boardId = board.id;\\n   155\\tconst component = penpot.library.local.createComponent([board]);\\n   156\\tcomponent.name = \\u0022Component.Name\\u0022;\\n   157\\t\\n   158\\t// 6. Remove orphan original (important!)\\n   159\\tconst original = penpotUtils.findShapeById(boardId);\\n   160\\tif (original \\u0026\\u0026 !original.isComponentInstance()) {\\n   161\\t    original.remove();\\n   162\\t}\\n   163\\t\\u0060\\u0060\\u0060\\n   164\\t\\n   165\\t---\\n   166\\t\\n   167\\t## Using Component Instances (Code Pattern)\\n   168\\t\\n   169\\t\\u0060\\u0060\\u0060javascript\\n   170\\t// Get component reference\\n   171\\tconst myComp = penpot.library.local.components.find(c =\\u003E c.name === \\u0022Component.Name\\u0022);\\n   172\\t\\n   173\\t// Create instance\\n   174\\tconst instance = myComp.instance();\\n   175\\tinstance.name = \\u0022Descriptive.Instance.Name\\u0022;\\n   176\\t\\n   177\\t// Optionally resize\\n   178\\tinstance.resize(newWidth, newHeight);\\n   179\\t\\n   180\\t// Add to parent\\n   181\\tparentBoard.appendChild(instance);\\n   182\\t\\u0060\\u0060\\u0060\\n   183\\t\\n   184\\t---\\n   185\\t\\n   186\\t## Design Tokens (Colors)\\n   187\\t\\n   188\\t| Token | Hex | Usage |\\n   189\\t|-------|-----|-------|\\n   190\\t| Primary.400 | #ffcc80 | Primary orange |\\n   191\\t| Primary.500 | #ffb74d | Primary orange darker |\\n   192\\t| Primary.600 | #f57c00 | Selected text |\\n   193\\t| Selected.Background | #fff8e1 | Selected state bg |\\n   194\\t| Neutral.50 | #f8f9fa | Page background |\\n   195\\t| Neutral.100 | #e2e8f0 | Borders |\\n   196\\t| Neutral.400 | #64748b | Muted text/labels |\\n   197\\t| Neutral.600 | #475569 | Button text |\\n   198\\t| Neutral.800 | #2d3748 | Primary text |\\n   199\\t| White | #ffffff | Cards, inputs |\\n   200\\t\\n   201\\t---\\n   202\\t\\n   203\\t## Component Variants (Key Feature)\\n   204\\t\\n   205\\tPenpot now supports true component variants (as of 2024-2025).\\n   206\\t\\n   207\\t### What Variants Solve\\n   208\\tInstead of separate components for each state:\\n   209\\t- Button.Default, Button.Hover, Button.Pressed, Button.Disabled\\n   210\\t\\n   211\\tYou have ONE component with properties:\\n   212\\t- Button with State property: Default | Hover | Pressed | Disabled\\n   213\\t\\n   214\\t### Creating Variants\\n   215\\t1. Select main component\\n   216\\t2. Ctrl\\u002BK \\u2192 \\u0022Create variant\\u0022\\n   217\\t3. Variant appears in purple-bordered area\\n   218\\t4. Define properties in Design panel\\n   219\\t\\n   220\\t### Variant Properties\\n   221\\t\\u0060\\u0060\\u0060\\n   222\\tProperty: State\\n   223\\tValues: Default, Hover, Pressed, Disabled\\n   224\\t\\n   225\\tProperty: Size  \\n   226\\tValues: Small, Medium, Large\\n   227\\t\\u0060\\u0060\\u0060\\n   228\\t\\n   229\\tEach variant = unique combination of values.\\n   230\\t\\n   231\\t### Override Preservation\\n   232\\tLayers are **connected** between variants if they:\\n   233\\t- Share the same name\\n   234\\t- Are the same type\\n   235\\t- Have the same hierarchy level\\n   236\\t\\n   237\\tConnected layers preserve overrides when switching variants!\\n   238\\t\\n   239\\t### For LaundryLog Buttons\\n   240\\tInstead of Button.Option and Button.Option.Selected:\\n   241\\t\\u0060\\u0060\\u0060\\n   242\\tButton.Option (component with variants)\\n   243\\t\\u251C\\u2500\\u2500 State=Default\\n   244\\t\\u2514\\u2500\\u2500 State=Selected\\n   245\\t\\u0060\\u0060\\u0060\\n   246\\t\\n   247\\tSwitch variant by changing State property.\\n   248\\t\\n   249\\t---\\n   250\\t\\n   251\\t## Screens as Components\\n   252\\t\\n   253\\t### Rationale\\n   254\\t- Multiple paths may share same screen with slight variations\\n   255\\t- Like view functions in code: same structure, different data\\n   256\\t- Changes to base screen propagate to all paths using it\\n   257\\t\\n   258\\t### Recommended Pattern\\n   259\\t\\u0060\\u0060\\u0060\\n   260\\tScreen.NewSession          (main component - template)\\n   261\\t  \\u2514\\u2500\\u2500 Path1.1-NewSession   (instance with overrides)\\n   262\\t  \\u2514\\u2500\\u2500 Path2.1-NewSession   (instance with different sample data)\\n   263\\t\\n   264\\tScreen.EntryForm           (main component - template)\\n   265\\t  \\u2514\\u2500\\u2500 Path1.3-EntryForm    (instance)\\n   266\\t  \\u2514\\u2500\\u2500 Path1.4-WasherSelected (instance - change Button variant to Selected)\\n   267\\t\\u0060\\u0060\\u0060\\n   268\\t\\n   269\\t### Override Capabilities in Instances\\n   270\\tConfirmed overridable:\\n   271\\t- Text content (if layer name unchanged)\\n   272\\t- Component variant selection (State property)\\n   273\\t- Size (within constraints)\\n   274\\t- Position (for absolute elements)\\n   275\\t\\n   276\\tNOT overridable (requires detach):\\n   277\\t- Adding/removing children\\n   278\\t- Changing layer structure\\n   279\\t- Swapping to different component type\\n   280\\t\\n   281\\t### Best Practice\\n   282\\tUse variants for state changes (selected buttons, etc.) rather than separate components. Then path screens are instances that simply switch the variant property.\\n   283\\t\\n   284\\t---\\n   285\\t\\n   286\\t## Prototyping for Paths\\n   287\\t\\n   288\\t### Flow Setup\\n   289\\t1. Each path starts with a \\u0022flow\\u0022 (starting point)\\n   290\\t2. Name flows by path: \\u0022Path1-HappyPath\\u0022, \\u0022Path2-GPSFlow\\u0022\\n   291\\t3. Connect screens with single interaction per screen\\n   292\\t\\n   293\\t### Prototype Links\\n   294\\t- Set on individual layers, not whole boards\\n   295\\t- Can be set on component copies (instances)\\n   296\\t- Flows are selectable in View mode\\n   297\\t\\n   298\\t### For PATHS Pattern\\n   299\\tEach path screen has ONE clickable element that advances to next screen:\\n   300\\t\\u0060\\u0060\\u0060\\n   301\\tPath1.1-NewSession\\n   302\\t  \\u2514\\u2500\\u2500 Input.Location has interaction \\u2192 Path1.2-LocationEntered\\n   303\\t\\n   304\\tPath1.2-LocationEntered  \\n   305\\t  \\u2514\\u2500\\u2500 Button \\u0022Set Location\\u0022 has interaction \\u2192 Path1.3-EntryForm\\n   306\\t\\u0060\\u0060\\u0060\\n   307\\t\\n   308\\tThis documents the exact user journey with sample data visible.\\n   309\\t\\n   310\\t---\\n   311\\t\\n   312\\t## Layer Naming Best Practices\\n   313\\t\\n   314\\t### Use Descriptive Content Names\\n   315\\t\\u0060\\u0060\\u0060\\n   316\\tGood:                          Bad:\\n   317\\t\\u0022Enter location...\\u0022            \\u0022Value\\u0022\\n   318\\t\\u0022Where are you doing...\\u0022       \\u0022PromptText\\u0022  \\n   319\\t\\u0022Use GPS Location\\u0022             \\u0022Label\\u0022\\n   320\\t\\u0022LaundryLog\\u0022                   \\u0022Title\\u0022\\n   321\\t\\u0022Spark Business Card\\u0022          \\u0022Text\\u0022\\n   322\\t\\u0060\\u0060\\u0060\\n   323\\t\\n   324\\tWhy: Connected layers between variants match by NAME. Meaningful names = easier debugging.\\n   325\\t\\n   326\\t---\\n   327\\t\\n   328\\t## TODO / Completed\\n   329\\t\\n   330\\t### Completed\\n   331\\t- [x] Test screen-as-component workflow - works with variants\\n   332\\t- [x] Clarify text override capabilities - yes, if layer name unchanged\\n   333\\t- [x] Establish path naming taxonomy - Path{N}.{Step}-{StateName}\\n   334\\t\\n   335\\t### Still To Do\\n   336\\t- [ ] Document prototype link setup in detail\\n   337\\t- [ ] Define fidelity tagging approach\\n   338\\t- [ ] Create variant-based button components\\n   339\\t- [ ] Test variant switching in path instances\\n   340\\t\\n   341\\t---\\n   342\\t\\n   343\\t## Revision History\\n   344\\t- v1: Initial learnings from Path 1.1 creation\\n   345\\t- v2: Added component variants, prototype flows, layer naming best practices\\n   346\\t\",\"uuid\":\"d5dffca3-b114-4651-af2a-52a0f94abdaf\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":{\"type\":\"json_block\",\"json_block\":\"{\\u0022language\\u0022: \\u0022markdown\\u0022, \\u0022code\\u0022: \\u0022# Penpot Conventions \\u0026 Learnings\\\\n\\\\n## Overview\\\\nThis document captures conventions for building LaundryLog (and future apps) in Penpot, learned through iteration.\\\\n\\\\n---\\\\n\\\\n## Layer Order\\\\n- **Bottom of panel = rendered first (back)**\\\\n- **Top of panel = rendered last (front)**\\\\n- In code: \\u0060children[0]\\u0060 is visually on TOP, \\u0060children[n]\\u0060 is at BOTTOM\\\\n- When appending children, last appended is at top of layer panel (rendered on top)\\\\n\\\\n---\\\\n\\\\n## Component Hierarchy\\\\n\\\\n### Current Components (as of Path 1.1)\\\\n\\u0060\\u0060\\u0060\\\\nComponents/\\\\n\\\\u251c\\\\u2500\\\\u2500 Header              (375\\\\u00d772) - App header with title \\u002B badge\\\\n\\\\u251c\\\\u2500\\\\u2500 Button.Option       (150\\\\u00d764) - Selection button, default state\\\\n\\\\u251c\\\\u2500\\\\u2500 Button.Option.Selected (150\\\\u00d764) - Selection button, selected state\\\\n\\\\u251c\\\\u2500\\\\u2500 Button.Counter      (72\\\\u00d772) - Orange circular \\u002B/- for quantity\\\\n\\\\u251c\\\\u2500\\\\u2500 Button.Quarter      (72\\\\u00d772) - Silver coin-style \\\\u00b1$0.25\\\\n\\\\u251c\\\\u2500\\\\u2500 Button.QuickFill    (80\\\\u00d756) - Price preset button\\\\n\\\\u251c\\\\u2500\\\\u2500 Button.GPS          (64\\\\u00d756) - GPS location button\\\\n\\\\u251c\\\\u2500\\\\u2500 Input.Text          (240\\\\u00d752) - Text input field\\\\n\\\\u251c\\\\u2500\\\\u2500 Section.Title       (150\\\\u00d724) - Section header text\\\\n\\\\u251c\\\\u2500\\\\u2500 Card.Entry          (320\\\\u00d780) - Entry card for history\\\\n\\\\u251c\\\\u2500\\\\u2500 main-title          - Text style component\\\\n\\\\u2514\\\\u2500\\\\u2500 title               - Text style component\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Component Naming Convention\\\\n\\u0060\\u0060\\u0060\\\\nType.Name[.Variant]\\\\n\\\\nExamples:\\\\n  Button.Option\\\\n  Button.Option.Selected\\\\n  Button.Counter\\\\n  Input.Text\\\\n  Card.Entry\\\\n  Section.Title\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n## Screen Structure\\\\n\\\\n### Screen Naming for Paths\\\\n\\u0060\\u0060\\u0060\\\\nPath{N}.{Step}-{StateName}\\\\n\\\\nExamples:\\\\n  Path1.1-NewSession\\\\n  Path1.2-LocationEntered\\\\n  Path1.3-EntryForm\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Standard Screen Setup\\\\n\\u0060\\u0060\\u0060\\\\nScreen Board (375\\\\u00d7667 for iPhone SE, or 375\\\\u00d7812 for iPhone X)\\\\n\\\\u251c\\\\u2500\\\\u2500 fills: #f8f9fa (background)\\\\n\\\\u251c\\\\u2500\\\\u2500 flex: column, alignItems: stretch\\\\n\\\\u2502\\\\n\\\\u251c\\\\u2500\\\\u2500 Header (component instance)\\\\n\\\\u2514\\\\u2500\\\\u2500 Content sections...\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n## Flex Layout Patterns\\\\n\\\\n### Vertical Stack (most sections)\\\\n\\u0060\\u0060\\u0060javascript\\\\nflex.dir = \\\\\\u0022column\\\\\\u0022\\\\nflex.alignItems = \\\\\\u0022stretch\\\\\\u0022  // or \\\\\\u0022center\\\\\\u0022 for centered content\\\\nflex.rowGap = N  // spacing between items\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Horizontal Row (buttons, controls)\\\\n\\u0060\\u0060\\u0060javascript\\\\nflex.dir = \\\\\\u0022row\\\\\\u0022\\\\nflex.alignItems = \\\\\\u0022center\\\\\\u0022\\\\nflex.justifyContent = \\\\\\u0022center\\\\\\u0022  // or \\\\\\u0022space-between\\\\\\u0022\\\\nflex.columnGap = N  // spacing between items\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Padding\\\\n\\u0060\\u0060\\u0060javascript\\\\nflex.paddingTop = N\\\\nflex.paddingRight = N\\\\nflex.paddingBottom = N\\\\nflex.paddingLeft = N\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n## Text Element Naming\\\\nName text elements by their content/purpose, not generic names:\\\\n\\u0060\\u0060\\u0060\\\\nGood:                          Bad:\\\\n\\\\\\u0022Enter location...\\\\\\u0022            \\\\\\u0022Value\\\\\\u0022\\\\n\\\\\\u0022Where are you doing...\\\\\\u0022       \\\\\\u0022PromptText\\\\\\u0022  \\\\n\\\\\\u0022Use GPS Location\\\\\\u0022             \\\\\\u0022Label\\\\\\u0022\\\\n\\\\\\u0022LaundryLog\\\\\\u0022                   \\\\\\u0022Title\\\\\\u0022\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n## Component vs Custom Element Decision\\\\n\\\\n**Use component instance when:**\\\\n- Element matches component exactly\\\\n- Only text content changes (overrideable)\\\\n- Want updates to propagate from main component\\\\n\\\\n**Create custom element when:**\\\\n- Layout differs from component\\\\n- Need different structure\\\\n- One-off variation not worth a new component\\\\n\\\\n---\\\\n\\\\n## Creating Components (Code Pattern)\\\\n\\\\n\\u0060\\u0060\\u0060javascript\\\\n// 1. Navigate to Components page\\\\nconst componentsPage = penpotUtils.getPageByName(\\\\\\u0022Components\\\\\\u0022);\\\\npenpot.openPage(componentsPage);\\\\n\\\\n// 2. Create the board with all styling\\\\nconst board = penpot.createBoard();\\\\nboard.name = \\\\\\u0022Component.Name\\\\\\u0022;\\\\nboard.resize(width, height);\\\\nboard.borderRadius = N;\\\\nboard.fills = [{ fillColor: \\\\\\u0022#hex\\\\\\u0022, fillOpacity: 1 }];\\\\nboard.strokes = [{ strokeColor: \\\\\\u0022#hex\\\\\\u0022, strokeOpacity: 1, strokeWidth: N, strokeAlignment: \\\\\\u0022inner\\\\\\u0022 }];\\\\n\\\\n// 3. Add flex layout if needed\\\\nboard.addFlexLayout();\\\\nboard.flex.dir = \\\\\\u0022row\\\\\\u0022 | \\\\\\u0022column\\\\\\u0022;\\\\nboard.flex.alignItems = \\\\\\u0022center\\\\\\u0022;\\\\nboard.flex.justifyContent = \\\\\\u0022center\\\\\\u0022;\\\\n\\\\n// 4. Create and append children\\\\nconst text = penpot.createText(\\\\\\u0022Label\\\\\\u0022);\\\\ntext.name = \\\\\\u0022Descriptive Name\\\\\\u0022;\\\\nboard.appendChild(text);\\\\n\\\\n// 5. Convert to component\\\\nconst boardId = board.id;\\\\nconst component = penpot.library.local.createComponent([board]);\\\\ncomponent.name = \\\\\\u0022Component.Name\\\\\\u0022;\\\\n\\\\n// 6. Remove orphan original (important!)\\\\nconst original = penpotUtils.findShapeById(boardId);\\\\nif (original \\u0026\\u0026 !original.isComponentInstance()) {\\\\n    original.remove();\\\\n}\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n## Using Component Instances (Code Pattern)\\\\n\\\\n\\u0060\\u0060\\u0060javascript\\\\n// Get component reference\\\\nconst myComp = penpot.library.local.components.find(c =\\u003E c.name === \\\\\\u0022Component.Name\\\\\\u0022);\\\\n\\\\n// Create instance\\\\nconst instance = myComp.instance();\\\\ninstance.name = \\\\\\u0022Descriptive.Instance.Name\\\\\\u0022;\\\\n\\\\n// Optionally resize\\\\ninstance.resize(newWidth, newHeight);\\\\n\\\\n// Add to parent\\\\nparentBoard.appendChild(instance);\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n## Design Tokens (Colors)\\\\n\\\\n| Token | Hex | Usage |\\\\n|-------|-----|-------|\\\\n| Primary.400 | #ffcc80 | Primary orange |\\\\n| Primary.500 | #ffb74d | Primary orange darker |\\\\n| Primary.600 | #f57c00 | Selected text |\\\\n| Selected.Background | #fff8e1 | Selected state bg |\\\\n| Neutral.50 | #f8f9fa | Page background |\\\\n| Neutral.100 | #e2e8f0 | Borders |\\\\n| Neutral.400 | #64748b | Muted text/labels |\\\\n| Neutral.600 | #475569 | Button text |\\\\n| Neutral.800 | #2d3748 | Primary text |\\\\n| White | #ffffff | Cards, inputs |\\\\n\\\\n---\\\\n\\\\n## Component Variants (Key Feature)\\\\n\\\\nPenpot now supports true component variants (as of 2024-2025).\\\\n\\\\n### What Variants Solve\\\\nInstead of separate components for each state:\\\\n- Button.Default, Button.Hover, Button.Pressed, Button.Disabled\\\\n\\\\nYou have ONE component with properties:\\\\n- Button with State property: Default | Hover | Pressed | Disabled\\\\n\\\\n### Creating Variants\\\\n1. Select main component\\\\n2. Ctrl\\u002BK \\\\u2192 \\\\\\u0022Create variant\\\\\\u0022\\\\n3. Variant appears in purple-bordered area\\\\n4. Define properties in Design panel\\\\n\\\\n### Variant Properties\\\\n\\u0060\\u0060\\u0060\\\\nProperty: State\\\\nValues: Default, Hover, Pressed, Disabled\\\\n\\\\nProperty: Size  \\\\nValues: Small, Medium, Large\\\\n\\u0060\\u0060\\u0060\\\\n\\\\nEach variant = unique combination of values.\\\\n\\\\n### Override Preservation\\\\nLayers are **connected** between variants if they:\\\\n- Share the same name\\\\n- Are the same type\\\\n- Have the same hierarchy level\\\\n\\\\nConnected layers preserve overrides when switching variants!\\\\n\\\\n### For LaundryLog Buttons\\\\nInstead of Button.Option and Button.Option.Selected:\\\\n\\u0060\\u0060\\u0060\\\\nButton.Option (component with variants)\\\\n\\\\u251c\\\\u2500\\\\u2500 State=Default\\\\n\\\\u2514\\\\u2500\\\\u2500 State=Selected\\\\n\\u0060\\u0060\\u0060\\\\n\\\\nSwitch variant by changing State property.\\\\n\\\\n---\\\\n\\\\n## Screens as Components\\\\n\\\\n### Rationale\\\\n- Multiple paths may share same screen with slight variations\\\\n- Like view functions in code: same structure, different data\\\\n- Changes to base screen propagate to all paths using it\\\\n\\\\n### Recommended Pattern\\\\n\\u0060\\u0060\\u0060\\\\nScreen.NewSession          (main component - template)\\\\n  \\\\u2514\\\\u2500\\\\u2500 Path1.1-NewSession   (instance with overrides)\\\\n  \\\\u2514\\\\u2500\\\\u2500 Path2.1-NewSession   (instance with different sample data)\\\\n\\\\nScreen.EntryForm           (main component - template)\\\\n  \\\\u2514\\\\u2500\\\\u2500 Path1.3-EntryForm    (instance)\\\\n  \\\\u2514\\\\u2500\\\\u2500 Path1.4-WasherSelected (instance - change Button variant to Selected)\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Override Capabilities in Instances\\\\nConfirmed overridable:\\\\n- Text content (if layer name unchanged)\\\\n- Component variant selection (State property)\\\\n- Size (within constraints)\\\\n- Position (for absolute elements)\\\\n\\\\nNOT overridable (requires detach):\\\\n- Adding/removing children\\\\n- Changing layer structure\\\\n- Swapping to different component type\\\\n\\\\n### Best Practice\\\\nUse variants for state changes (selected buttons, etc.) rather than separate components. Then path screens are instances that simply switch the variant property.\\\\n\\\\n---\\\\n\\\\n## Prototyping for Paths\\\\n\\\\n### Flow Setup\\\\n1. Each path starts with a \\\\\\u0022flow\\\\\\u0022 (starting point)\\\\n2. Name flows by path: \\\\\\u0022Path1-HappyPath\\\\\\u0022, \\\\\\u0022Path2-GPSFlow\\\\\\u0022\\\\n3. Connect screens with single interaction per screen\\\\n\\\\n### Prototype Links\\\\n- Set on individual layers, not whole boards\\\\n- Can be set on component copies (instances)\\\\n- Flows are selectable in View mode\\\\n\\\\n### For PATHS Pattern\\\\nEach path screen has ONE clickable element that advances to next screen:\\\\n\\u0060\\u0060\\u0060\\\\nPath1.1-NewSession\\\\n  \\\\u2514\\\\u2500\\\\u2500 Input.Location has interaction \\\\u2192 Path1.2-LocationEntered\\\\n\\\\nPath1.2-LocationEntered  \\\\n  \\\\u2514\\\\u2500\\\\u2500 Button \\\\\\u0022Set Location\\\\\\u0022 has interaction \\\\u2192 Path1.3-EntryForm\\\\n\\u0060\\u0060\\u0060\\\\n\\\\nThis documents the exact user journey with sample data visible.\\\\n\\\\n---\\\\n\\\\n## Layer Naming Best Practices\\\\n\\\\n### Use Descriptive Content Names\\\\n\\u0060\\u0060\\u0060\\\\nGood:                          Bad:\\\\n\\\\\\u0022Enter location...\\\\\\u0022            \\\\\\u0022Value\\\\\\u0022\\\\n\\\\\\u0022Where are you doing...\\\\\\u0022       \\\\\\u0022PromptText\\\\\\u0022  \\\\n\\\\\\u0022Use GPS Location\\\\\\u0022             \\\\\\u0022Label\\\\\\u0022\\\\n\\\\\\u0022LaundryLog\\\\\\u0022                   \\\\\\u0022Title\\\\\\u0022\\\\n\\\\\\u0022Spark Business Card\\\\\\u0022          \\\\\\u0022Text\\\\\\u0022\\\\n\\u0060\\u0060\\u0060\\\\n\\\\nWhy: Connected layers between variants match by NAME. Meaningful names = easier debugging.\\\\n\\\\n---\\\\n\\\\n## TODO / Completed\\\\n\\\\n### Completed\\\\n- [x] Test screen-as-component workflow - works with variants\\\\n- [x] Clarify text override capabilities - yes, if layer name unchanged\\\\n- [x] Establish path naming taxonomy - Path{N}.{Step}-{StateName}\\\\n\\\\n### Still To Do\\\\n- [ ] Document prototype link setup in detail\\\\n- [ ] Define fidelity tagging approach\\\\n- [ ] Create variant-based button components\\\\n- [ ] Test variant switching in path instances\\\\n\\\\n---\\\\n\\\\n## Revision History\\\\n- v1: Initial learnings from Path 1.1 creation\\\\n- v2: Added component variants, prototype flows, layer naming best practices\\\\n\\u0022, \\u0022filename\\u0022: \\u0022/mnt/user-data/outputs/penpot-conventions.md\\u0022}\"}}"

