kind = "plain_text"
text = "The UI telemetry is important for different reasons than the domain events. Mainly for me as developer to do analysis and such, which a user would receive the \"Influence\". It might be that we give the user the option or just do it of storing their own exact UI events in their own private store, then do some anonymization/redaction to their data, and they have the option to send to me as their option. The other reason would be for actual support cases where they are experiencing a bug or wrong behavior, if i have their actual event log, I (or someone deep in the codebase) would be able to trace through exactly what they are doing and figure out what went wrong."

