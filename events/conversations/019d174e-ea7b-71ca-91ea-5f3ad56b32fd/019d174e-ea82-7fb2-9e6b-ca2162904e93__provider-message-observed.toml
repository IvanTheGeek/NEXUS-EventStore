text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Any update on component variants? - Ask the community - Penpot Community\",\"url\":\"https://community.penpot.app/t/any-update-on-component-variants/6558\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Hi, I am a Designer have been checking out Penpot on off for a while. Something very important in my workflow is the use of Variants. It simply is one of the most important features in a design tool. The current way to create variants in penpot doesn\\u2019t seem intutive. It\\u2019s quite confusing and it doesn\\u2019t feel like variants but seperate components just under the same component name. I think right now this is one of the main things stopping me from moving over completelty from figma. I saw some th...\\n\\nHi, I am a Designer have been checking out Penpot on off for a while. Something very important in my workflow is the use of Variants. It simply is one of the most important features in a design tool. The current way to \\u2026\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"September 15, 2024\",\"url\":\"https://community.penpot.app/t/any-update-on-component-variants/6558\"}},{\"type\":\"knowledge\",\"title\":\"Tutorial: Creating interactive prototypes with Penpot\",\"url\":\"https://penpot.app/blog/creating-interactive-prototypes-with-penpot/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Read our prorotyping tutorial on using Penpot to create interactions with helpful videos and tips to get you started\\n\\nAs UI and UX designers, we\\u2019re pretty limited by how much we can convey in static visuals. Interactive prototypes are a handy way to show exactly how our designs should behave. ... Clicking through an interactive flow is valuable when demonstrating user journeys to stakeholders, handing off designs to developers, or even doing early-stage user testing. In this tutorial, I\\u2019ll introduce you to some of the most common interactions you\\u2019ll prototype using Penpot. Penpot is brilliant for prototyping because you can work with your existing designs, whether they\\u2019re quick wireframes or high-fidelity mockups, and you don\\u2019t need to be able to code to create life-like interactions. I\\u2019ve created a Prototype examples template with all the examples from this article which is available in Penpot\\u2019s Libraries \\u0026 Templates. You can open the template in Penpot to follow along or try out the prototypes yourself.\\n\\nRead our prorotyping tutorial on using Penpot to create interactions with helpful videos and tips to get you started\\n\\nFrom the Layers panel, choose the Filter group layer on the All board, and from the Prototype panel, use the \\u002B plus icon to add an interaction. This interaction will trigger the Filter overlay whenever the viewer clicks any part of the Filter group. ... Destination: Filter overlay (board name). Relative to: Filter (self) (group name); opens the overlay in a position relative to the Filter button that triggered it, ensuring your overlay appears where the user can see it. Position: Center. Center the overlay over the Filter button. Close when clicking outside: Check; makes the overlay behave like conventional overlays that are closed when you click outside their bounds. From the Layers panel, choose the Close component layer on the Filter overlay board, and from the Prototype panel, use the \\u002B plus icon to add an interaction. This interaction will close the Filter overlay when the user clicks the close icon.\\n\\nI hope this tutorial has given you a head start prototyping with Penpot. You can download the template containing all the examples from our Libraries \\u0026 Templates collection. Do you have any questions or suggestions for future tutorials? Let us know on our Community. We\\u2019d love to hear from you. Check out our other blogs, from informative topic guides to tutorials on how to get the most out of Penpot. ... Learn how to design, present, and share wireframes with Penpot using our Wireframing Kit library to get started quickly. ... Learn how to use color and save reusable colors for your design system with Penpot\\u2019s color palette and shared libraries. ... Create CSS Flex layouts without learning how to code. This tutorial shows you how to use Penpot\\u2019s flexible layout tools using our sales dashboard UI template. ... Learn about creating components and libraries of shared components in Penpot for your team\\u2019s design system.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"July 29, 2025\",\"url\":\"https://penpot.app/blog/creating-interactive-prototypes-with-penpot/\"}},{\"type\":\"knowledge\",\"title\":\"Tutorial: Create and share components in Penpot\",\"url\":\"https://penpot.app/blog/tutorial-create-and-share-components-in-penpot/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Tutorial: Creating and using component variants in Penpot \\u00B7 Component variants are a way to create different variations of a component. Does your component need different sizes? Colors?\\n\\nCreating and using component variants. A main component is your component\\u2019s source of truth. You can create a main component by right-clicking an object or group and choosing \\u00B7 Create component or using the keyboard shortcut. ... You can identify a main component by its layer icon of two nested diamonds. Any object on the canvas can be a component unless it already contains a main component. Once you\\u2019ve created a component, you can find it in the Assets panel in the left sidebar. By default, your component will have the same name as the layer you used to create it, but you can rename the component by renaming the main component\\u2019s layer. Penpot won\\u2019t stop you from creating multiple components with the same name, so \\u00B7 consider your component names carefully if you don\\u2019t want to confuse yourself or your teammates in the future! ... You can switch between the thumbnail and list views in the Assets panel to make it easier to read longer component names.\\n\\nIf your component instance has a specific style or state you want to reuse elsewhere in your design, make it into its own reusable component variant. I could create a variant of my checkbox with a cross icon instead of a check icon. When working in a team, it\\u2019s helpful to provide documentation so your teammates understand the use cases and intention behind your component. Naming components is difficult. The number one rule is ensuring your whole team agrees on a shared language that helps everyone name new components and find existing components. Here are a few tips I\\u2019ve found that help me when naming my Penpot components: Keep the names descriptive but concise and readable. For example, avatar is more specific than round picture. Choose names based on meaning rather than visual features such as color or pixel size. If you change the visual design later, you don\\u2019t want the component name to lose relevance.\\n\\nTutorial: Creating and using component variants in Penpot \\u00B7 Component variants are a way to create different variations of a component. Does your component need different sizes? Colors? Levels of elevation? Variants make it easy to define these properties, and choose between them when you\\u2019re using a component in your designs. ... Learn how to use color and save reusable colors for your design system with Penpot\\u2019s color palette and shared libraries. ... I recently shared a css.gg icons library template in the Penpot Libraries \\u0026 Templates collection. Here\\u2019s how you can use icons from this (and other) shared libraries in Penpot. ... You\\u2019ve been sent a Penpot file or downloaded a template from the Community. This tutorial will help you find your way around. ... Create CSS Flex layouts without learning how to code. This tutorial shows you how to use Penpot\\u2019s flexible layout tools using our sales dashboard UI template.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"October 17, 2024\",\"url\":\"https://penpot.app/blog/tutorial-create-and-share-components-in-penpot/\"}},{\"type\":\"knowledge\",\"title\":\"Tutorial: 5 examples of component variants\",\"url\":\"https://penpot.app/blog/tutorial-5-examples-of-component-variants/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Variants add an extra level of flexibility to your components, as well as providing better documentation and making designs even more developer-friendly.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"October 17, 2025\",\"url\":\"https://penpot.app/blog/tutorial-5-examples-of-component-variants/\"}},{\"type\":\"knowledge\",\"title\":\"GitHub - penpot/penpot: Penpot: The open-source design tool for design and code collaboration\",\"url\":\"https://github.com/penpot/penpot\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"Contribute to Penpot\\u0026#x27;s code: Watch this video by Alejandro Alonso, CIO and developer at Penpot, where he gives us a hands-on demo of how to use Penpot\\u2019s repository and make changes in both front and back end \\u00B7 To find (almost) everything you need to know on how to contribute to Penpot, refer to the contributing guide. You can ask and answer questions, have open-ended conversations, and follow along on decisions affecting the project. ... This Source Code Form is subject to the terms of the Mozilla Public License, v.\\n\\nDesigners can create stunning designs, interactive prototypes, design systems at scale, while developers enjoy ready-to-use code and make their workflow easy and fast. And all of this with no handoff drama. Available on browser or self-hosted, Penpot works with open standards like SVG, CSS, HTML and JSON, and it\\u2019s free! The latest updates take Penpot even further. It\\u2019s the first design tool to integrate native design tokens\\u2014a single source of truth to improve efficiency and collaboration between product design and development. With the huge 2.0 release, Penpot took the platform to a whole new level. This update introduces the ground-breaking CSS Grid Layout feature, a complete UI redesign, a new Components system, and much more. For organizations that need extra service for its teams, get in touch \\u00B7 \\uD83C\\uDF87 Design, code, and Open Source meet at Penpot Fest! Be part of the 2025 edition in Madrid, Spain, on October 9-10.\\n\\nPenpot: The open-source design tool for design and code collaboration - penpot/penpot\\n\\nPenpot is the only design \\u0026 prototype platform that is deployment agnostic. You can use it in our SAAS or deploy it anywhere. Learn how to install it with Docker, Kubernetes, Elestio or other options on our website. We love the Open Source software community. Contributing is our passion and if it\\u2019s yours too, participate and improve Penpot. All your designs, code and ideas are welcome! If you need help or have any questions; if you\\u2019d like to share your experience using Penpot or get inspired; if you\\u2019d rather meet our community of developers and designers, join our Community! ... Anyone who contributes to Penpot, whether through code, in the community, or at an event, must adhere to the code of conduct and foster a positive and safe environment. Any contribution will make a difference to improve Penpot. How can you get involved? ... Give this repo a star and follow us on Social Media: Mastodon, Youtube, Instagram, Linkedin, Peertube, X and BlueSky \\u00B7\\n\\nContribute to Penpot\\u0027s code: Watch this video by Alejandro Alonso, CIO and developer at Penpot, where he gives us a hands-on demo of how to use Penpot\\u2019s repository and make changes in both front and back end \\u00B7 To find (almost) everything you need to know on how to contribute to Penpot, refer to the contributing guide. You can ask and answer questions, have open-ended conversations, and follow along on decisions affecting the project. ... This Source Code Form is subject to the terms of the Mozilla Public License, v.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/penpot/penpot\"}},{\"type\":\"knowledge\",\"title\":\"Who knows how to make variants of components in Pempot - Ask the community - Penpot Community\",\"url\":\"https://community.penpot.app/t/who-knows-how-to-make-variants-of-components-in-pempot/7044\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Hi, guys! I see that the main component is named Main, but can I make an instance of it? Just would like to know, how, it it\\u2019s even possible. Cause I\\u2019d like to create a fillable text field, and this feature will help me\\u2026\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"November 15, 2024\",\"url\":\"https://community.penpot.app/t/who-knows-how-to-make-variants-of-components-in-pempot/7044\"}},{\"type\":\"knowledge\",\"title\":\"Tutorial - Penpot Blog\",\"url\":\"https://penpot.app/blog/tag/tutorial/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Learn design system best practices, color palettes, components, responsive layouts, interactive prototypes \\u0026amp; more. ... Component variants are a way to create different variations of a component. Does your component need different sizes?\\n\\nExplore Penpot with our free tutorials! Learn design system best practices, color palettes, components, responsive layouts, interactive prototypes \\u0026 more. ... Component variants are a way to create different variations of a component. Does your component need different sizes? Colors? Levels of elevation? Variants make it easy to define these properties, and choose between them when you\\u2019re using a component in your designs. ... Design tokens are the smallest repeatable elements of your design that can be reused consistently across your Penpot projects and teams. ... If you want to create a design system using Penpot, I\\u2019ve got some tips, tricks, and best practices for you. ... Learn how to use color and save reusable colors for your design system with Penpot\\u2019s color palette and shared libraries. ... Learn about components and how to use your team\\u2019s shared components for your design system in Penpot.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://penpot.app/blog/tag/tutorial/\"}},{\"type\":\"knowledge\",\"title\":\"Tutorial: Creating and using component variants in Penpot\",\"url\":\"https://penpot.app/blog/tutorial-creating-and-using-component-variants-in-penpot/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Component variants are a way to create different variations of a component. Does your component need different sizes? Colors? Levels of elevation? Variants make it easy to define these properties, and choose between them when you\\u2019re using a ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"October 2, 2025\",\"url\":\"https://penpot.app/blog/tutorial-creating-and-using-component-variants-in-penpot/\"}},{\"type\":\"knowledge\",\"title\":\"Penpot | Learning Center\",\"url\":\"https://penpot.app/learning-center\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Watch the hands-on live demo and Q\\u0026amp;A for creating prototypes. Create flexible layouts for your designs using flex and grid layouts. ... Use our ready-made layout components. ... A live demo using CSS Flex \\u0026amp; Grid Layouts for flexible designs. ... Learn how Penpot flexible layouts make responsive design easier. ... Choose the best layout options for your design. ... Learn how to use grid layout from our template. ... Everything you need to know to start designing high fidelity UIs for apps, websites, and more. ... Learn core UI skills with our free video course. ... Learn how to create shapes and apply styles. ... Learn about Penpot\\u2019s colors and color palettes. ... Make it easier to share and reuse a pattern in your design. ... Create components that work inside any layout. ... Discover the best practices for UIs with our Sales dashboard design. ... Quickly replace design elements with realistic placeholder data.\\n\\nSee how prototyping works with our template. ... Learn about layouts with our example template. ... Discover UI best practices with our dashboard design. ... Check out Penpot\\u2019s own design system to see how it\\u2019s done. ... Explore the design tokens and jumpstart your design system. ... From the basics to the power tools, learn everything you need to do great design with Penpot. Wireframes are low-fidelity skeleton designs for fast iteration. ... A tutorial for wireframing with Penpot. ... A hands-on live demo for creating wireframes. ... Use our kit to create wireframes in minutes. ... Learn how to import files into Penpot. Interactive prototypes help us show exactly how our designs should behave. ... A tutorial for creating interactive UI prototypes with Penpot. ... Watch our demo on creating clickable prototypes in seconds. ... See how prototyping works with our example template.\\n\\nWatch the hands-on live demo and Q\\u0026A for creating prototypes. Create flexible layouts for your designs using flex and grid layouts. ... Use our ready-made layout components. ... A live demo using CSS Flex \\u0026 Grid Layouts for flexible designs. ... Learn how Penpot flexible layouts make responsive design easier. ... Choose the best layout options for your design. ... Learn how to use grid layout from our template. ... Everything you need to know to start designing high fidelity UIs for apps, websites, and more. ... Learn core UI skills with our free video course. ... Learn how to create shapes and apply styles. ... Learn about Penpot\\u2019s colors and color palettes. ... Make it easier to share and reuse a pattern in your design. ... Create components that work inside any layout. ... Discover the best practices for UIs with our Sales dashboard design. ... Quickly replace design elements with realistic placeholder data.\\n\\nLearn about Penpot\\u2019s components and variants. ... Learn how to use icons from shared llibraries. ... Quickly find and use icons from 150\\u002B open source icon sets. ... Visualize your Penpot color assets on the canvas with one click. ... Generate a hierarchy of type sizes using a modular scale. ... Create and manage your Material assets. ... Find and use tailwind styles in your design. ... Create and simulate light and dark mode color themes. Create native design tokens for your small design decisions as building blocks towards a scalable and maintainable design system ... Discover the key benefits and main uses of design tokens in under 5 minutes. ... A tutorial for creating and using design tokens with Penpot. ... A quick introduction to design tokens in Penpot. ... Dive deeper into Design Tokens, from the basics to complex use cases. ... Learn everything you can do with design tokens in Penpot.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://penpot.app/learning-center\"}},{\"type\":\"knowledge\",\"title\":\"Feature request: Component variants \\u00B7 penpot/penpot \\u00B7 Discussion #534\",\"url\":\"https://github.com/penpot/penpot/discussions/534\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"I\\u0026#x27;ve proposed a related feature that would allow users to build their own variants for interactive components, using Penpot\\u0026#x27;s existing prototyping capabilities. Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. ... We are currently evaluating Penpot vs. Figma and this feature (present in Figma as Component Variants) was the deciding factor for Figma. I was quite excited when we came across Penpot since I am a developer who values the usage of SVG and the advantages of OpenSource. However, the missing variants were pointed out by our designer to be a no-go, and I had to agree with them. Are there any plans of implementing this feature in the near future? According to Taiga, there is a Component 2.0 epic for which this feature would be a great fit.\\n\\nSorry for spamming all of these \\uD83D\\uDE05 it\\u0027s the last one for now This is one of those pretty complex but extremely useful features. It allows an user to keep many variants of the same element under just...\\n\\nI\\u0027ve proposed a related feature that would allow users to build their own variants for interactive components, using Penpot\\u0027s existing prototyping capabilities. Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. ... We are currently evaluating Penpot vs. Figma and this feature (present in Figma as Component Variants) was the deciding factor for Figma. I was quite excited when we came across Penpot since I am a developer who values the usage of SVG and the advantages of OpenSource. However, the missing variants were pointed out by our designer to be a no-go, and I had to agree with them. Are there any plans of implementing this feature in the near future? According to Taiga, there is a Component 2.0 epic for which this feature would be a great fit.\\n\\nJust posting these links here to try and maximize the network interlinking of these discussions. Penpot should probably think through a little more clearly where things like feature requests, discussions, etc take place, since right now there\\u0027s at least 3 places they could reside (forums, github discussions, github issues) Possibly 4 if we count taiga. Oh yes there\\u0027s also a taiga thing thing for this on the roadmap: ... Just noticed that the taiga story is closed and archived. Perhaps @elhombretecla can clarify. Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. ... It is two years later now. Component variants are still not there in PenPot. The Taiga story was told to be closed and archived, but I see it still open.\\n\\nFeature request: Component variants\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/penpot/penpot/discussions/534\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 18 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"a06cedbb-2ec5-491c-8257-7e07049652e0\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

