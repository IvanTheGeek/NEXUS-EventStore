 are you doing...\\u0022       \\u0022PromptText\\u0022  \\n\\u0022Use GPS Location\\u0022             \\u0022Label\\u0022\\n\\u0022LaundryLog\\u0022                   \\u0022Title\\u0022\\n\\u0022Spark Business Card\\u0022          \\u0022Text\\u0022\\n\\u0060\\u0060\\u0060\\n\\nWhy: Connected layers between variants match by NAME. Meaningful names = easier debugging.\\n\\n---\\n\\n## TODO / Completed\\n\\n### Completed\\n- [x] Test screen-as-component workflow - works with variants\\n- [x] Clarify text override capabilities - yes, if layer name unchanged\\n- [x] Establish path naming taxonomy - Path{N}.{Step}-{StateName}\\n\\n### Still To Do\\n- [ ] Document prototype link setup in detail\\n- [ ] Define fidelity tagging approach\\n- [ ] Create variant-based button components\\n- [ ] Test variant switching in path instances\\n\\n---\\n\\n## Revision History\\n- v1: Initial learnings from Path 1.1 creation\\n- v2: Added component variants, prototype flows, layer naming best practices\",\"old_str\":\"## Screens as Components (TBD)\\n\\n### Rationale\\n- Multiple paths may share same screen with slight variations\\n- Like view functions in code: same structure, different data\\n- Changes to base screen propagate to all paths using it\\n\\n### Proposed Pattern\\n\\u0060\\u0060\\u0060\\nScreen.NewSession          (main component - template)\\n  \\u2514\\u2500\\u2500 Path1.1-NewSession   (instance with overrides)\\n  \\u2514\\u2500\\u2500 Path2.1-NewSession   (instance with different sample data)\\n\\nScreen.EntryForm           (main component - template)\\n  \\u2514\\u2500\\u2500 Path1.3-EntryForm    (instance)\\n  \\u2514\\u2500\\u2500 Path1.4-WasherSelected (instance with Washer highlighted)\\n\\u0060\\u0060\\u0060\\n\\n### Open Questions\\n- How much can be overridden in instances?\\n- Should state variations (selected buttons) be separate components or overrides?\\n- Best practice for prototype links on instances vs main components?\\n\\n---\\n\\n## TODO / To Investigate\\n- [ ] Test screen-as-component workflow\\n- [ ] Document prototype link setup\\n- [ ] Clarify text override capabilities in instances\\n- [ ] Establish path naming taxonomy\\n- [ ] Define fidelity tagging approach\\n\\n---\\n\\n## Revision History\\n- v1: Initial learnings from Path 1.1 creation\",\"description\":\"Updating penpot conventions with variants and enhanced information\"},\"message\":\"Updating penpot conventions with variants and enhanced information\",\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":{\"type\":\"text\",\"text\":\"Updating penpot conventions with variants and enhanced information\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

