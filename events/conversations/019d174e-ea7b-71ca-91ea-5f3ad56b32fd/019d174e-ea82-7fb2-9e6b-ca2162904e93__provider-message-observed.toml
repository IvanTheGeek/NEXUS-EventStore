text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_fetch\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Penpot plugins API\",\"url\":\"https://penpot-plugins-api-doc.pages.dev/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"pages.dev\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=pages.dev\",\"site_name\":\"pages\"},\"is_missing\":false,\"text\":\"The @penpot/plugin-types\\npackage provides TypeScript type definitions for the Penpot Plugin API, making it easier to develop plugins for the Penpot design platform with full type safety and IDE support. It streamlines the development process by ensuring that your code is well-typed and less prone to errors.\\nTo add penpot\\u0027s plugin-types to your project, use the following command:\\nnpm install @penpot/plugin-types\\nTo ensure the typings work correctly in your project, update your tsconfig.json as follows:\\n\\u0022typeRoots\\u0022: [\\n\\u0022./node_modules/@types\\u0022,\\n\\u0022./node_modules/@penpot\\u0022\\n],\\n\\u0022types\\u0022: [\\u0022plugin-types\\u0022],\\nFor more information on how to build plugins using the Penpot PLugin API, refer to the [official documentation](https://help.penpot.app/plugins/getting-started/). You can also explore practical examples in the [samples repository](https://github.com/penpot/penpot-plugins-samples) to see real-world implementations.\",\"is_citable\":true,\"prompt_context_metadata\":{\"mime_type\":\"text/html; charset=utf-8\",\"content_type\":\"html\",\"destination_url\":\"https://penpot-plugins-api-doc.pages.dev/\"}}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":\"Fetched: Penpot plugins API\",\"integration_name\":\"Web Fetch\",\"integration_icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=pages.dev\",\"icon_name\":null,\"display_content\":{\"type\":\"rich_link\",\"link\":{\"title\":\"Penpot plugins API\",\"subtitles\":null,\"url\":\"https://penpot-plugins-api-doc.pages.dev/\",\"resource_type\":null,\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=pages.dev\",\"source\":\"pages\"},\"is_trusted\":false}}"

