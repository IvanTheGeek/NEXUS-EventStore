text = "{\"start_timestamp\":\"2025-12-01T18:56:40.249420Z\",\"stop_timestamp\":\"2025-12-01T18:58:00.991962Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"create_file\",\"input\":{\"path\":\"/home/claude/penpot-reference.md\",\"file_text\":\"# Penpot Comprehensive Reference\\n\\n## Overview\\n\\nPenpot is an open-source design and prototyping platform that uses web standards (SVG, CSS, HTML, JSON). It\\u0027s deployment-agnostic (SaaS or self-hosted) and emphasizes design-development collaboration.\\n\\n**Key Philosophy:** Design and development speak the same language. Penpot generates CSS-honest code, making design-to-code workflows more reliable.\\n\\n---\\n\\n## Core Concepts\\n\\n### Boards (formerly Frames)\\n- The primary container for designs\\n- Act as screens in prototypes\\n- Can have flex or grid layouts applied\\n- API: \\u0060penpot.createBoard()\\u0060\\n\\n### Shapes\\nAll visual elements are shapes:\\n- **Rectangle**: \\u0060penpot.createRectangle()\\u0060\\n- **Ellipse**: \\u0060penpot.createEllipse()\\u0060\\n- **Path**: \\u0060penpot.createPath()\\u0060\\n- **Text**: \\u0060penpot.createText()\\u0060\\n- **Board**: \\u0060penpot.createBoard()\\u0060 (container shape)\\n\\n### Common Shape Properties\\n\\u0060\\u0060\\u0060javascript\\nshape.name           // String identifier\\nshape.x, shape.y     // Position\\nshape.width, shape.height  // Size\\nshape.resize(w, h)   // Resize method\\nshape.fills          // Array of fill objects\\nshape.strokes        // Array of stroke objects\\nshape.borderRadius   // Corner radius (or individual corners)\\nshape.opacity        // 0-1\\nshape.hidden         // Boolean\\nshape.blocked        // Boolean\\n\\u0060\\u0060\\u0060\\n\\n---\\n\\n## Components System\\n\\n### Main Components vs Copies (Instances)\\n- **Main Component**: Source of truth, stored in Assets library\\n- **Component Copy/Instance**: Linked duplicate that inherits from main\\n- Icon: Double diamond = main component\\n\\n### Creating Components\\n\\u0060\\u0060\\u0060javascript\\n// Via API\\nconst component = penpot.library.local.createComponent([shape]);\\ncomponent.name = \\u0022Button.Primary\\u0022;\\n\\n// Via UI\\n// Select object(s) \\u2192 Ctrl\\u002BK or right-click \\u2192 \\u0022Create component\\u0022\\n\\u0060\\u0060\\u0060\\n\\n### Component Overrides\\n- Modifications made to copies that differ from main\\n- Preserved when updating main component\\n- Can be reset: right-click \\u2192 \\u0022Reset overrides\\u0022\\n- Can push to main: right-click \\u2192 \\u0022Update main component\\u0022\\n\\n### Component Naming Convention\\n\\u0060\\u0060\\u0060\\nType.Name[.Variant]\\n\\nExamples:\\n  Button.Primary\\n  Button.Secondary\\n  Input.Text\\n  Card.Entry\\n  Section.Title\\n\\u0060\\u0060\\u0060\\n\\nUse slashes for grouping: \\u0060Buttons/Primary\\u0060 creates folder structure.\\n\\n---\\n\\n## Component Variants (New in 2024-2025)\\n\\nVariants group similar components with different states/sizes/styles into one unified component using properties.\\n\\n### Variant Structure\\n- **Properties**: Dimensions that distinguish variants (Color, Size, State)\\n- **Values**: Options within a property (Primary/Secondary, Small/Large)\\n- Each variant = unique combination of property values\\n\\n### Creating Variants\\n1. Select main component\\n2. Ctrl\\u002BK or right-click \\u2192 \\u0022Create variant\\u0022\\n3. Variant appears next to original in purple-bordered area\\n4. Define properties and values in Design panel\\n\\n### Variant Properties\\n- Property name: e.g., \\u0022State\\u0022\\n- Property values: e.g., \\u0022Default\\u0022, \\u0022Hover\\u0022, \\u0022Pressed\\u0022, \\u0022Disabled\\u0022\\n- Switch variants by changing property values in Design panel\\n\\n### Combining Existing Components as Variants\\n- Select multiple components on same page\\n- Right-click \\u2192 \\u0022Combine as variants\\u0022\\n- Property names/values generated from component names\\n\\n### Override Preservation Between Variants\\nLayers are connected between variants if they:\\n- Share the same name\\n- Are the same type\\n- Have the same hierarchy level\\n\\nWhen switching variants, overrides on connected layers are preserved.\\n\\n---\\n\\n## Flexible Layouts\\n\\n### Flex Layout (CSS Flexbox)\\n\\u0060\\u0060\\u0060javascript\\nboard.addFlexLayout();\\n\\n// Properties\\nboard.flex.dir = \\u0022row\\u0022 | \\u0022column\\u0022 | \\u0022row-reverse\\u0022 | \\u0022column-reverse\\u0022;\\nboard.flex.alignItems = \\u0022start\\u0022 | \\u0022center\\u0022 | \\u0022end\\u0022 | \\u0022stretch\\u0022;\\nboard.flex.justifyContent = \\u0022start\\u0022 | \\u0022center\\u0022 | \\u0022end\\u0022 | \\u0022space-between\\u0022 | \\u0022space-around\\u0022 | \\u0022space-evenly\\u0022;\\nboard.flex.rowGap = 16;\\nboard.flex.columnGap = 8;\\nboard.flex.paddingTop = 16;\\nboard.flex.paddingRight = 16;\\nboard.flex.paddingBottom = 16;\\nboard.flex.paddingLeft = 16;\\nboard.flex.wrap = \\u0022wrap\\u0022 | \\u0022nowrap\\u0022;\\n\\u0060\\u0060\\u0060\\n\\n### Grid Layout (CSS Grid)\\n\\u0060\\u0060\\u0060javascript\\nboard.addGridLayout();\\n\\n// Properties similar to CSS Grid\\n// Direction, align/justify items, gaps, padding\\n// Rows and columns with units: FR, Auto, Pixels\\n\\u0060\\u0060\\u0060\\n\\n### Element Positioning in Layouts\\n- **Static**: Default, follows flex/grid flow\\n- **Absolute**: Removed from flow, freely positioned\\n\\n---\\n\\n## Design Tokens (W3C DTCG Format)\\n\\nDesign tokens are reusable values for colors, typography, spacing, etc.\\n\\n### Token Types\\n- **Color**: Hex, RGB, RGBA, HSL, HSLA\\n- **Dimensions**: Sizing, spacing, border-radius, stroke-width, position\\n- **Font Size**: Typography sizing\\n- **Opacity**: 0-1 or 0%-100%\\n- **Rotation**: Degrees\\n- **Border Radius**: Corner values\\n- **Stroke Width**: Border thickness\\n\\n### Creating Tokens\\n1. Open Tokens panel\\n2. Click \\u002B next to token type\\n3. Define name, value, description\\n4. Save\\n\\n### Aliases (References)\\nReference other tokens using \\u0060{token.name}\\u0060:\\n\\u0060\\u0060\\u0060\\ndimension.small = 64\\nspacing.small = {dimension.small}  // resolves to 64\\n\\u0060\\u0060\\u0060\\n\\n### Math Operations\\n\\u0060\\u0060\\u0060\\nspacing.medium = {spacing.small} * 2\\nspacing.large = {spacing.small} * {spacing.scale}\\n\\u0060\\u0060\\u0060\\n\\n### Token Sets\\nGroups of tokens that can be enabled/disabled. Use folder-style naming: \\u0060Light/Colors\\u0060, \\u0060Dark/Colors\\u0060.\\n\\n### Token Themes\\nConfigure sets for specific contexts (brand, mode, platform). Multidimensional - multiple themes can be active.\\n\\n---\\n\\n## Prototyping\\n\\n### Basic Interactions\\n1. Activate Prototype mode (right sidebar tab)\\n2. Select trigger layer\\n3. Drag connection to destination board\\n4. Configure trigger, action, animation\\n\\n### Triggers\\n- **On click**: User clicks/taps\\n- **Mouse enter**: Hover in\\n- **Mouse leave**: Hover out\\n- **After delay**: Time-based (boards only)\\n\\n### Actions\\n- **Navigate to**: Go to destination board\\n- **Open overlay**: Show board over current\\n- **Toggle overlay**: Open/close overlay\\n- **Close overlay**: Close specific overlay\\n- **Previous screen**: Go back\\n- **Open URL**: External link\\n\\n### Overlay Options\\n- Position presets or manual placement\\n- Relative to trigger element\\n- Close when clicking outside\\n- Add background overlay (20% black)\\n\\n### Animations\\n- **Dissolve**: Fade in/out\\n- **Slide**: Move in/out with direction\\n- **Push**: Push current board out\\n\\n### Flows\\nMultiple starting points for different user journeys:\\n- Auto-created when connecting unconnected board\\n- Each flow has own shareable link\\n- Select flows in View mode menu\\n\\n### Fix When Scrolling\\nFor fixed headers/navbars:\\n- Select element\\n- Check \\u0022Fix when scrolling\\u0022 in Constraints section\\n\\n---\\n\\n## Asset Libraries\\n\\n### Local Library\\nEach file has its own library with:\\n- Components\\n- Colors\\n- Typographies\\n\\n### Shared Libraries\\nPublish file as shared library for team-wide access:\\n- Main menu \\u2192 Add as Shared Library\\n- Other files can connect to use assets\\n\\n### Working with Assets\\n- **Grid view**: Visual thumbnails\\n- **List view**: Names, more items visible\\n- **Search**: Filter by name\\n- **Groups**: Use slashes in names or Group option\\n\\n---\\n\\n## Inspect Mode\\n\\n### Accessing\\n- Workspace: Inspect tab in right sidebar\\n- View mode: Inspect button in navbar\\n\\n### Features\\n- Measurements and distances between objects\\n- Object properties and specifications\\n- Production-ready code:\\n  - **CSS**: Styles\\n  - **HTML**: Markup\\n  - **SVG**: Vector code\\n\\n### Code Generation\\nFlex and Grid layouts generate actual CSS Flexbox/Grid code, usable directly in websites.\\n\\n---\\n\\n## Plugin API\\n\\n### Setup\\n\\u0060\\u0060\\u0060javascript\\n// Install types\\nnpm install @penpot/plugin-types\\n\\n// tsconfig.json\\n{\\n  \\u0022compilerOptions\\u0022: {\\n    \\u0022typeRoots\\u0022: [\\u0022./node_modules/@types\\u0022, \\u0022./node_modules/@penpot\\u0022],\\n    \\u0022types\\u0022: [\\u0022plugin-types\\u0022]\\n  }\\n}\\n\\u0060\\u0060\\u0060\\n\\n### Core Objects\\n\\u0060\\u0060\\u0060javascript\\npenpot.root              // Root shape of current page\\npenpot.currentFile       // Current file\\npenpot.currentPage       // Current page\\npenpot.viewport          // Viewport context\\npenpot.selection         // Selected shapes array\\npenpot.library.local     // Local library context\\n\\u0060\\u0060\\u0060\\n\\n### Creating Shapes\\n\\u0060\\u0060\\u0060javascript\\nconst board = penpot.createBoard();\\nconst rect = penpot.createRectangle();\\nconst ellipse = penpot.createEllipse();\\nconst text = penpot.createText(\\u0022Hello\\u0022);\\nconst path = penpot.createPath();\\n\\u0060\\u0060\\u0060\\n\\n### Shape Manipulation\\n\\u0060\\u0060\\u0060javascript\\n// Styling\\nshape.fills = [{ fillColor: \\u0022#ff0000\\u0022, fillOpacity: 1 }];\\nshape.strokes = [{ strokeColor: \\u0022#000\\u0022, strokeWidth: 2, strokeAlignment: \\u0022inner\\u0022 }];\\n\\n// Positioning\\nshape.x = 100;\\nshape.y = 100;\\nshape.resize(200, 100);\\n\\n// Hierarchy\\nparent.appendChild(child);\\nshape.remove();\\n\\u0060\\u0060\\u0060\\n\\n### Components via API\\n\\u0060\\u0060\\u0060javascript\\n// Create component\\nconst component = penpot.library.local.createComponent([board]);\\ncomponent.name = \\u0022MyComponent\\u0022;\\n\\n// Get components\\nconst components = penpot.library.local.components;\\nconst myComp = components.find(c =\\u003E c.name === \\u0022MyComponent\\u0022);\\n\\n// Create instance\\nconst instance = myComp.instance();\\nparent.appendChild(instance);\\n\\u0060\\u0060\\u0060\\n\\n### Library Assets\\n\\u0060\\u0060\\u0060javascript\\n// Colors\\npenpot.library.local.createColor(\\u0022Primary\\u0022, \\u0022#ff0000\\u0022);\\n\\n// Typography\\npenpot.library.local.createTypography(\\u0022Heading\\u0022, { \\n  fontFamily: \\u0022Inter\\u0022, \\n  fontSize: \\u002224\\u0022, \\n  fontWeight: \\u0022700\\u0022 \\n});\\n\\u0060\\u0060\\u0060\\n\\n### Events\\n\\u0060\\u0060\\u0060javascript\\nconst listenerId = penpot.on(\\u0027pagechange\\u0027, (event) =\\u003E {\\n  console.log(\\u0027Page changed\\u0027);\\n});\\n\\npenpot.off(listenerId);\\n\\u0060\\u0060\\u0060\\n\\n### Code Generation\\n\\u0060\\u0060\\u0060javascript\\nconst markup = penpot.generateMarkup(shapes, { type: \\u0027html\\u0027 });\\nconst styles = penpot.generateStyles(shapes);\\n\\u0060\\u0060\\u0060\\n\\n---\\n\\n## File Format\\n\\nPenpot uses \\u0060.penpot\\u0060 files which contain:\\n- SVG for vector data\\n- JSON for metadata, components, tokens\\n\\nFiles can be:\\n- Exported/imported as .penpot\\n- Version controlled with git\\n- Programmatically modified via API\\n\\n---\\n\\n## Best Practices\\n\\n### Component Organization\\n1. Create dedicated Components page\\n2. Group by type: Buttons/, Inputs/, Cards/\\n3. Use clear naming: Type.Name.Variant\\n4. Add annotations for documentation\\n\\n### Design System Setup\\n1. Define color tokens first\\n2. Create typography tokens\\n3. Build primitive components\\n4. Compose complex components from primitives\\n5. Use shared libraries for team access\\n\\n### Prototyping Strategy\\n1. Create all boards first\\n2. Connect navigation components\\n3. Use overlays for modals/tooltips\\n4. Define multiple flows for different journeys\\n5. Test in View mode frequently\\n\\n### Performance\\n1. Use components instead of duplicating\\n2. Group related elements\\n3. Use flex layouts for responsive design\\n4. Leverage design tokens for consistency\\n\\n---\\n\\n## Resources\\n\\n- **User Guide**: https://help.penpot.app/user-guide/\\n- **Plugin Docs**: https://help.penpot.app/plugins/\\n- **API Reference**: https://penpot-plugins-api-doc.pages.dev/\\n- **Community**: https://community.penpot.app/\\n- **Blog/Tutorials**: https://penpot.app/blog/\\n- **Learning Center**: https://penpot.app/learning-center\\n- **Samples Repository**: https://github.com/penpot/penpot-plugins-samples\\n\\n---\\n\\n## Version Notes\\n\\nThis reference reflects Penpot features as of late 2024/2025, including:\\n- Component Variants (major addition)\\n- Design Tokens (W3C DTCG format)\\n- Enhanced prototyping\\n- Plugin API improvements\\n\\nNote: \\u0060PenpotFrame\\u0060 was renamed to \\u0060Board\\u0060 in recent versions.\\n\",\"description\":\"Creating comprehensive Penpot reference document\"},\"message\":\"Creating comprehensive Penpot reference document\",\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":{\"type\":\"json_block\",\"json_block\":\"{\\u0022language\\u0022: \\u0022markdown\\u0022, \\u0022code\\u0022: \\u0022# Penpot Comprehensive Reference\\\\n\\\\n## Overview\\\\n\\\\nPenpot is an open-source design and prototyping platform that uses web standards (SVG, CSS, HTML, JSON). It\\u0027s deployment-agnostic (SaaS or self-hosted) and emphasizes design-development collaboration.\\\\n\\\\n**Key Philosophy:** Design and development speak the same language. Penpot generates CSS-honest code, making design-to-code workflows more reliable.\\\\n\\\\n---\\\\n\\\\n## Core Concepts\\\\n\\\\n### Boards (formerly Frames)\\\\n- The primary container for designs\\\\n- Act as screens in prototypes\\\\n- Can have flex or grid layouts applied\\\\n- API: \\u0060penpot.createBoard()\\u0060\\\\n\\\\n### Shapes\\\\nAll visual elements are shapes:\\\\n- **Rectangle**: \\u0060penpot.createRectangle()\\u0060\\\\n- **Ellipse**: \\u0060penpot.createEllipse()\\u0060\\\\n- **Path**: \\u0060penpot.createPath()\\u0060\\\\n- **Text**: \\u0060penpot.createText()\\u0060\\\\n- **Board**: \\u0060penpot.createBoard()\\u0060 (container shape)\\\\n\\\\n### Common Shape Properties\\\\n\\u0060\\u0060\\u0060javascript\\\\nshape.name           // String identifier\\\\nshape.x, shape.y     // Position\\\\nshape.width, shape.height  // Size\\\\nshape.resize(w, h)   // Resize method\\\\nshape.fills          // Array of fill objects\\\\nshape.strokes        // Array of stroke objects\\\\nshape.borderRadius   // Corner radius (or individual corners)\\\\nshape.opacity        // 0-1\\\\nshape.hidden         // Boolean\\\\nshape.blocked        // Boolean\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n## Components System\\\\n\\\\n### Main Components vs Copies (Instances)\\\\n- **Main Component**: Source of truth, stored in Assets library\\\\n- **Component Copy/Instance**: Linked duplicate that inherits from main\\\\n- Icon: Double diamond = main component\\\\n\\\\n### Creating Components\\\\n\\u0060\\u0060\\u0060javascript\\\\n// Via API\\\\nconst component = penpot.library.local.createComponent([shape]);\\\\ncomponent.name = \\\\\\u0022Button.Primary\\\\\\u0022;\\\\n\\\\n// Via UI\\\\n// Select object(s) \\\\u2192 Ctrl\\u002BK or right-click \\\\u2192 \\\\\\u0022Create component\\\\\\u0022\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Component Overrides\\\\n- Modifications made to copies that differ from main\\\\n- Preserved when updating main component\\\\n- Can be reset: right-click \\\\u2192 \\\\\\u0022Reset overrides\\\\\\u0022\\\\n- Can push to main: right-click \\\\u2192 \\\\\\u0022Update main component\\\\\\u0022\\\\n\\\\n### Component Naming Convention\\\\n\\u0060\\u0060\\u0060\\\\nType.Name[.Variant]\\\\n\\\\nExamples:\\\\n  Button.Primary\\\\n  Button.Secondary\\\\n  Input.Text\\\\n  Card.Entry\\\\n  Section.Title\\\\n\\u0060\\u0060\\u0060\\\\n\\\\nUse slashes for grouping: \\u0060Buttons/Primary\\u0060 creates folder structure.\\\\n\\\\n---\\\\n\\\\n## Component Variants (New in 2024-2025)\\\\n\\\\nVariants group similar components with different states/sizes/styles into one unified component using properties.\\\\n\\\\n### Variant Structure\\\\n- **Properties**: Dimensions that distinguish variants (Color, Size, State)\\\\n- **Values**: Options within a property (Primary/Secondary, Small/Large)\\\\n- Each variant = unique combination of property values\\\\n\\\\n### Creating Variants\\\\n1. Select main component\\\\n2. Ctrl\\u002BK or right-click \\\\u2192 \\\\\\u0022Create variant\\\\\\u0022\\\\n3. Variant appears next to original in purple-bordered area\\\\n4. Define properties and values in Design panel\\\\n\\\\n### Variant Properties\\\\n- Property name: e.g., \\\\\\u0022State\\\\\\u0022\\\\n- Property values: e.g., \\\\\\u0022Default\\\\\\u0022, \\\\\\u0022Hover\\\\\\u0022, \\\\\\u0022Pressed\\\\\\u0022, \\\\\\u0022Disabled\\\\\\u0022\\\\n- Switch variants by changing property values in Design panel\\\\n\\\\n### Combining Existing Components as Variants\\\\n- Select multiple components on same page\\\\n- Right-click \\\\u2192 \\\\\\u0022Combine as variants\\\\\\u0022\\\\n- Property names/values generated from component names\\\\n\\\\n### Override Preservation Between Variants\\\\nLayers are connected between variants if they:\\\\n- Share the same name\\\\n- Are the same type\\\\n- Have the same hierarchy level\\\\n\\\\nWhen switching variants, overrides on connected layers are preserved.\\\\n\\\\n---\\\\n\\\\n## Flexible Layouts\\\\n\\\\n### Flex Layout (CSS Flexbox)\\\\n\\u0060\\u0060\\u0060javascript\\\\nboard.addFlexLayout();\\\\n\\\\n// Properties\\\\nboard.flex.dir = \\\\\\u0022row\\\\\\u0022 | \\\\\\u0022column\\\\\\u0022 | \\\\\\u0022row-reverse\\\\\\u0022 | \\\\\\u0022column-reverse\\\\\\u0022;\\\\nboard.flex.alignItems = \\\\\\u0022start\\\\\\u0022 | \\\\\\u0022center\\\\\\u0022 | \\\\\\u0022end\\\\\\u0022 | \\\\\\u0022stretch\\\\\\u0022;\\\\nboard.flex.justifyContent = \\\\\\u0022start\\\\\\u0022 | \\\\\\u0022center\\\\\\u0022 | \\\\\\u0022end\\\\\\u0022 | \\\\\\u0022space-between\\\\\\u0022 | \\\\\\u0022space-around\\\\\\u0022 | \\\\\\u0022space-evenly\\\\\\u0022;\\\\nboard.flex.rowGap = 16;\\\\nboard.flex.columnGap = 8;\\\\nboard.flex.paddingTop = 16;\\\\nboard.flex.paddingRight = 16;\\\\nboard.flex.paddingBottom = 16;\\\\nboard.flex.paddingLeft = 16;\\\\nboard.flex.wrap = \\\\\\u0022wrap\\\\\\u0022 | \\\\\\u0022nowrap\\\\\\u0022;\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Grid Layout (CSS Grid)\\\\n\\u0060\\u0060\\u0060javascript\\\\nboard.addGridLayout();\\\\n\\\\n// Properties similar to CSS Grid\\\\n// Direction, align/justify items, gaps, padding\\\\n// Rows and columns with units: FR, Auto, Pixels\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Element Positioning in Layouts\\\\n- **Static**: Default, follows flex/grid flow\\\\n- **Absolute**: Removed from flow, freely positioned\\\\n\\\\n---\\\\n\\\\n## Design Tokens (W3C DTCG Format)\\\\n\\\\nDesign tokens are reusable values for colors, typography, spacing, etc.\\\\n\\\\n### Token Types\\\\n- **Color**: Hex, RGB, RGBA, HSL, HSLA\\\\n- **Dimensions**: Sizing, spacing, border-radius, stroke-width, position\\\\n- **Font Size**: Typography sizing\\\\n- **Opacity**: 0-1 or 0%-100%\\\\n- **Rotation**: Degrees\\\\n- **Border Radius**: Corner values\\\\n- **Stroke Width**: Border thickness\\\\n\\\\n### Creating Tokens\\\\n1. Open Tokens panel\\\\n2. Click \\u002B next to token type\\\\n3. Define name, value, description\\\\n4. Save\\\\n\\\\n### Aliases (References)\\\\nReference other tokens using \\u0060{token.name}\\u0060:\\\\n\\u0060\\u0060\\u0060\\\\ndimension.small = 64\\\\nspacing.small = {dimension.small}  // resolves to 64\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Math Operations\\\\n\\u0060\\u0060\\u0060\\\\nspacing.medium = {spacing.small} * 2\\\\nspacing.large = {spacing.small} * {spacing.scale}\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Token Sets\\\\nGroups of tokens that can be enabled/disabled. Use folder-style naming: \\u0060Light/Colors\\u0060, \\u0060Dark/Colors\\u0060.\\\\n\\\\n### Token Themes\\\\nConfigure sets for specific contexts (brand, mode, platform). Multidimensional - multiple themes can be active.\\\\n\\\\n---\\\\n\\\\n## Prototyping\\\\n\\\\n### Basic Interactions\\\\n1. Activate Prototype mode (right sidebar tab)\\\\n2. Select trigger layer\\\\n3. Drag connection to destination board\\\\n4. Configure trigger, action, animation\\\\n\\\\n### Triggers\\\\n- **On click**: User clicks/taps\\\\n- **Mouse enter**: Hover in\\\\n- **Mouse leave**: Hover out\\\\n- **After delay**: Time-based (boards only)\\\\n\\\\n### Actions\\\\n- **Navigate to**: Go to destination board\\\\n- **Open overlay**: Show board over current\\\\n- **Toggle overlay**: Open/close overlay\\\\n- **Close overlay**: Close specific overlay\\\\n- **Previous screen**: Go back\\\\n- **Open URL**: External link\\\\n\\\\n### Overlay Options\\\\n- Position presets or manual placement\\\\n- Relative to trigger element\\\\n- Close when clicking outside\\\\n- Add background overlay (20% black)\\\\n\\\\n### Animations\\\\n- **Dissolve**: Fade in/out\\\\n- **Slide**: Move in/out with direction\\\\n- **Push**: Push current board out\\\\n\\\\n### Flows\\\\nMultiple starting points for different user journeys:\\\\n- Auto-created when connecting unconnected board\\\\n- Each flow has own shareable link\\\\n- Select flows in View mode menu\\\\n\\\\n### Fix When Scrolling\\\\nFor fixed headers/navbars:\\\\n- Select element\\\\n- Check \\\\\\u0022Fix when scrolling\\\\\\u0022 in Constraints section\\\\n\\\\n---\\\\n\\\\n## Asset Libraries\\\\n\\\\n### Local Library\\\\nEach file has its own library with:\\\\n- Components\\\\n- Colors\\\\n- Typographies\\\\n\\\\n### Shared Libraries\\\\nPublish file as shared library for team-wide access:\\\\n- Main menu \\\\u2192 Add as Shared Library\\\\n- Other files can connect to use assets\\\\n\\\\n### Working with Assets\\\\n- **Grid view**: Visual thumbnails\\\\n- **List view**: Names, more items visible\\\\n- **Search**: Filter by name\\\\n- **Groups**: Use slashes in names or Group option\\\\n\\\\n---\\\\n\\\\n## Inspect Mode\\\\n\\\\n### Accessing\\\\n- Workspace: Inspect tab in right sidebar\\\\n- View mode: Inspect button in navbar\\\\n\\\\n### Features\\\\n- Measurements and distances between objects\\\\n- Object properties and specifications\\\\n- Production-ready code:\\\\n  - **CSS**: Styles\\\\n  - **HTML**: Markup\\\\n  - **SVG**: Vector code\\\\n\\\\n### Code Generation\\\\nFlex and Grid layouts generate actual CSS Flexbox/Grid code, usable directly in websites.\\\\n\\\\n---\\\\n\\\\n## Plugin API\\\\n\\\\n### Setup\\\\n\\u0060\\u0060\\u0060javascript\\\\n// Install types\\\\nnpm install @penpot/plugin-types\\\\n\\\\n// tsconfig.json\\\\n{\\\\n  \\\\\\u0022compilerOptions\\\\\\u0022: {\\\\n    \\\\\\u0022typeRoots\\\\\\u0022: [\\\\\\u0022./node_modules/@types\\\\\\u0022, \\\\\\u0022./node_modules/@penpot\\\\\\u0022],\\\\n    \\\\\\u0022types\\\\\\u0022: [\\\\\\u0022plugin-types\\\\\\u0022]\\\\n  }\\\\n}\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Core Objects\\\\n\\u0060\\u0060\\u0060javascript\\\\npenpot.root              // Root shape of current page\\\\npenpot.currentFile       // Current file\\\\npenpot.currentPage       // Current page\\\\npenpot.viewport          // Viewport context\\\\npenpot.selection         // Selected shapes array\\\\npenpot.library.local     // Local library context\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Creating Shapes\\\\n\\u0060\\u0060\\u0060javascript\\\\nconst board = penpot.createBoard();\\\\nconst rect = penpot.createRectangle();\\\\nconst ellipse = penpot.createEllipse();\\\\nconst text = penpot.createText(\\\\\\u0022Hello\\\\\\u0022);\\\\nconst path = penpot.createPath();\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Shape Manipulation\\\\n\\u0060\\u0060\\u0060javascript\\\\n// Styling\\\\nshape.fills = [{ fillColor: \\\\\\u0022#ff0000\\\\\\u0022, fillOpacity: 1 }];\\\\nshape.strokes = [{ strokeColor: \\\\\\u0022#000\\\\\\u0022, strokeWidth: 2, strokeAlignment: \\\\\\u0022inner\\\\\\u0022 }];\\\\n\\\\n// Positioning\\\\nshape.x = 100;\\\\nshape.y = 100;\\\\nshape.resize(200, 100);\\\\n\\\\n// Hierarchy\\\\nparent.appendChild(child);\\\\nshape.remove();\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Components via API\\\\n\\u0060\\u0060\\u0060javascript\\\\n// Create component\\\\nconst component = penpot.library.local.createComponent([board]);\\\\ncomponent.name = \\\\\\u0022MyComponent\\\\\\u0022;\\\\n\\\\n// Get components\\\\nconst components = penpot.library.local.components;\\\\nconst myComp = components.find(c =\\u003E c.name === \\\\\\u0022MyComponent\\\\\\u0022);\\\\n\\\\n// Create instance\\\\nconst instance = myComp.instance();\\\\nparent.appendChild(instance);\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Library Assets\\\\n\\u0060\\u0060\\u0060javascript\\\\n// Colors\\\\npenpot.library.local.createColor(\\\\\\u0022Primary\\\\\\u0022, \\\\\\u0022#ff0000\\\\\\u0022);\\\\n\\\\n// Typography\\\\npenpot.library.local.createTypography(\\\\\\u0022Heading\\\\\\u0022, { \\\\n  fontFamily: \\\\\\u0022Inter\\\\\\u0022, \\\\n  fontSize: \\\\\\u002224\\\\\\u0022, \\\\n  fontWeight: \\\\\\u0022700\\\\\\u0022 \\\\n});\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Events\\\\n\\u0060\\u0060\\u0060javascript\\\\nconst listenerId = penpot.on(\\u0027pagechange\\u0027, (event) =\\u003E {\\\\n  console.log(\\u0027Page changed\\u0027);\\\\n});\\\\n\\\\npenpot.off(listenerId);\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Code Generation\\\\n\\u0060\\u0060\\u0060javascript\\\\nconst markup = penpot.generateMarkup(shapes, { type: \\u0027html\\u0027 });\\\\nconst styles = penpot.generateStyles(shapes);\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n## File Format\\\\n\\\\nPenpot uses \\u0060.penpot\\u0060 files which contain:\\\\n- SVG for vector data\\\\n- JSON for metadata, components, tokens\\\\n\\\\nFiles can be:\\\\n- Exported/imported as .penpot\\\\n- Version controlled with git\\\\n- Programmatically modified via API\\\\n\\\\n---\\\\n\\\\n## Best Practices\\\\n\\\\n### Component Organization\\\\n1. Create dedicated Components page\\\\n2. Group by type: Buttons/, Inputs/, Cards/\\\\n3. Use clear naming: Type.Name.Variant\\\\n4. Add annotations for documentation\\\\n\\\\n### Design System Setup\\\\n1. Define color tokens first\\\\n2. Create typography tokens\\\\n3. Build primitive components\\\\n4. Compose complex components from primitives\\\\n5. Use shared libraries for team access\\\\n\\\\n### Prototyping Strategy\\\\n1. Create all boards first\\\\n2. Connect navigation components\\\\n3. Use overlays for modals/tooltips\\\\n4. Define multiple flows for different journeys\\\\n5. Test in View mode frequently\\\\n\\\\n### Performance\\\\n1. Use components instead of duplicating\\\\n2. Group related elements\\\\n3. Use flex layouts for responsive design\\\\n4. Leverage design tokens for consistency\\\\n\\\\n---\\\\n\\\\n## Resources\\\\n\\\\n- **User Guide**: https://help.penpot.app/user-guide/\\\\n- **Plugin Docs**: https://help.penpot.app/plugins/\\\\n- **API Reference**: https://penpot-plugins-api-doc.pages.dev/\\\\n- **Community**: https://community.penpot.app/\\\\n- **Blog/Tutorials**: https://penpot.app/blog/\\\\n- **Learning Center**: https://penpot.app/learning-center\\\\n- **Samples Repository**: https://github.com/penpot/penpot-plugins-samples\\\\n\\\\n---\\\\n\\\\n## Version Notes\\\\n\\\\nThis reference reflects Penpot features as of late 2024/2025, including:\\\\n- Component Variants (major addition)\\\\n- Design Tokens (W3C DTCG format)\\\\n- Enhanced prototyping\\\\n- Plugin API improvements\\\\n\\\\nNote: \\u0060PenpotFrame\\u0060 was renamed to \\u0060Board\\u0060 in recent versions.\\\\n\\u0022, \\u0022filename\\u0022: \\u0022/home/claude/penpot-reference.md\\u0022}\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

