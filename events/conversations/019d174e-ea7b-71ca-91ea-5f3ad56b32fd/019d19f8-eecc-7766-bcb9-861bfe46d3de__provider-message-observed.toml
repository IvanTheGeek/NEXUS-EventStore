kind = "tool_result"
text = "Here's the content of /mnt/user-data/outputs/penpot-conventions.md with line numbers:\n     1\t# Penpot Conventions & Learnings\n     2\t\n     3\t## Overview\n     4\tThis document captures conventions for building LaundryLog (and future apps) in Penpot, learned through iteration.\n     5\t\n     6\t---\n     7\t\n     8\t## Layer Order\n     9\t- **Bottom of panel = rendered first (back)**\n    10\t- **Top of panel = rendered last (front)**\n    11\t- In code: `children[0]` is visually on TOP, `children[n]` is at BOTTOM\n    12\t- When appending children, last appended is at top of layer panel (rendered on top)\n    13\t\n    14\t---\n    15\t\n    16\t## Component Hierarchy\n    17\t\n    18\t### Current Components (as of Path 1.1)\n    19\t```\n    20\tComponents/\n    21\t├── Header              (375×72) - App header with title + badge\n    22\t├── Button.Option       (variant: State = Default|Selected)\n    23\t├── Button.Counter      (variant: Action = Minus|Plus)\n    24\t├── Button.Quarter      (variant: Action = Minus|Plus)\n    25\t├── Button.QuickFill    (80×56) - Price preset button\n    26\t├── Button.GPS          (311×56) - GPS location button\n    27\t├── Input.Text          (240×52) - Text input field\n    28\t├── Section.Title       (150×24) - Section header text\n    29\t├── Card.Entry          (320×80) - Entry card for history\n    30\t├── main-title          - Text style component\n    31\t└── title               - Text style component\n    32\t```\n    33\t\n    34\t### Component Naming Convention\n    35\t```\n    36\tType.Name[.Variant]\n    37\t\n    38\tExamples:\n    39\t  Button.Option\n    40\t  Button.Option.Washer\n    41\t  Button.Counter\n    42\t  Input.Text\n    43\t  Card.Entry\n    44\t  Section.Title\n    45\t```\n    46\t\n    47\t### Naming for Code Bindings\n    48\t\n    49\tElement names in Penpot become keys in F# `Bindings.fs`. The F# compiler validates bindings reference real `Intent` and `State` types.\n    50\t\n    51\t**Interactive elements** (buttons, inputs) map to `Intent`:\n    52\t```\n    53\tPenpot Name              → F# Intent\n    54\tButton.GPS               → ClickedGPS\n    55\tButton.Option.Washer     → ClickedMachine Washer\n    56\tButton.Counter.Plus      → ClickedQuantityPlus\n    57\tInput.Location           → EnteredLocation (raw string)\n    58\t```\n    59\t\n    60\t**Display elements** (text) map to `State` fields:\n    61\t```\n    62\tPenpot Name              → F# State accessor\n    63\tText.Quantity            → state.DraftQuantity |> Quantity.value\n    64\tText.Price               → state.DraftPrice |> Price.value\n    65\tText.SessionTotal        → calculateTotal state.Entries\n    66\t```\n    67\t\n    68\t**Visibility** is controlled by `State` predicates:\n    69\t```\n    70\tPenpot Name              → F# State predicate\n    71\tSection.CardSelector     → state.ShowCardSelector\n    72\tSection.Entries          → not (List.isEmpty state.Entries)\n    73\tSection.SessionInfo      → state.CurrentSession.IsSome\n    74\t```\n    75\t\n    76\tBuild-time validation ensures Penpot names and F# bindings stay in sync.\n    77\t\n    78\t---\n    79\t\n    80\t## Screen Structure\n    81\t\n    82\t### Screen Naming for Paths\n    83\t```\n    84\tPath{N}.{Step}-{StateName}\n    85\t\n    86\tExamples:\n    87\t  Path1.1-NewSession\n    88\t  Path1.2-LocationEntered\n    89\t  Path1.3-EntryForm\n    90\t```\n    91\t\n    92\t### Standard Screen Setup\n    93\t```\n    94\tScreen Board (375×667 for iPhone SE, or 375×812 for iPhone X)\n    95\t├── fills: #f8f9fa (background)\n    96\t├── flex: column, alignItems: stretch\n    97\t│\n    98\t├── Header (component instance)\n    99\t└── Content sections...\n   100\t```\n   101\t\n   102\t---\n   103\t\n   104\t## Flex Layout Patterns\n   105\t\n   106\t### Vertical Stack (most sections)\n   107\t```javascript\n   108\tflex.dir = \"column\"\n   109\tflex.alignItems = \"stretch\"  // or \"center\" for centered content\n   110\tflex.rowGap = N  // spacing between items\n   111\t```\n   112\t\n   113\t### Horizontal Row (buttons, controls)\n   114\t```javascript\n   115\tflex.dir = \"row\"\n   116\tflex.alignItems = \"center\"\n   117\tflex.justifyContent = \"center\"  // or \"space-between\"\n   118\tflex.columnGap = N  // spacing between items\n   119\t```\n   120\t\n   121\t### Padding\n   122\t```javascript\n   123\tflex.paddingTop = N\n   124\tflex.paddingRight = N\n   125\tflex.paddingBottom = N\n   126\tflex.paddingLeft = N\n   127\t```\n   128\t\n   129\t---\n   130\t\n   131\t## Text Element Naming\n   132\tName text elements by their content/purpose, not generic names:\n   133\t```\n   134\tGood:                          Bad:\n   135\t\"Enter location...\"            \"Value\"\n   136\t\"Where are you doing...\"       \"PromptText\"  \n   137\t\"Use GPS Location\"             \"Label\"\n   138\t\"LaundryLog\"                   \"Title\"\n   139\t```\n   140\t\n   141\t---\n   142\t\n   143\t## Component vs Custom Element Decision\n   144\t\n   145\t**Use component instance when:**\n   146\t- Element matches component exactly\n   147\t- Only text content changes (overrideable)\n   148\t- Want updates to propagate from main component\n   149\t\n   150\t**Create custom element when:**\n   151\t- Layout differs from component\n   152\t- Need different structure\n   153\t- One-off variation not worth a new component\n   154\t\n   155\t---\n   156\t\n   157\t## Creating Components (Code Pattern)\n   158\t\n   159\t```javascript\n   160\t// 1. Navigate to Components page\n   161\tconst componentsPage = penpotUtils.getPageByName(\"Components\");\n   162\tpenpot.openPage(componentsPage);\n   163\t\n   164\t// 2. Create the board with all styling\n   165\tconst board = penpot.createBoard();\n   166\tboard.name = \"Component.Name\";\n   167\tboard.resize(width, height);\n   168\tboard.borderRadius = N;\n   169\tboard.fills = [{ fillColor: \"#hex\", fillOpacity: 1 }];\n   170\tboard.strokes = [{ strokeColor: \"#hex\", strokeOpacity: 1, strokeWidth: N, strokeAlignment: \"inner\" }];\n   171\t\n   172\t// 3. Add flex layout if needed\n   173\tboard.addFlexLayout();\n   174\tboard.flex.dir = \"row\" | \"column\";\n   175\tboard.flex.alignItems = \"center\";\n   176\tboard.flex.justifyContent = \"center\";\n   177\t\n   178\t// 4. Create and append children\n   179\tconst text = penpot.createText(\"Label\");\n   180\ttext.name = \"Descriptive Name\";\n   181\tboard.appendChild(text);\n   182\t\n   183\t// 5. Convert to component\n   184\tconst boardId = board.id;\n   185\tconst component = penpot.library.local.createComponent([board]);\n   186\tcomponent.name = \"Component.Name\";\n   187\t\n   188\t// 6. Remove orphan original (important!)\n   189\tconst original = penpotUtils.findShapeById(boardId);\n   190\tif (original && !original.isComponentInstance()) {\n   191\t    original.remove();\n   192\t}\n   193\t```\n   194\t\n   195\t---\n   196\t\n   197\t## Using Component Instances (Code Pattern)\n   198\t\n   199\t```javascript\n   200\t// Get component reference\n   201\tconst myComp = penpot.library.local.components.find(c => c.name === \"Component.Name\");\n   202\t\n   203\t// Create instance\n   204\tconst instance = myComp.instance();\n   205\tinstance.name = \"Descriptive.Instance.Name\";\n   206\t\n   207\t// Optionally resize\n   208\tinstance.resize(newWidth, newHeight);\n   209\t\n   210\t// Add to parent\n   211\tparentBoard.appendChild(instance);\n   212\t```\n   213\t\n   214\t---\n   215\t\n   216\t## Design Tokens (Colors)\n   217\t\n   218\t| Token | Hex | Usage |\n   219\t|-------|-----|-------|\n   220\t| Primary.400 | #ffcc80 | Primary orange |\n   221\t| Primary.500 | #ffb74d | Primary orange darker |\n   222\t| Primary.600 | #f57c00 | Selected text |\n   223\t| Selected.Background | #fff8e1 | Selected state bg |\n   224\t| Neutral.50 | #f8f9fa | Page background |\n   225\t| Neutral.100 | #e2e8f0 | Borders |\n   226\t| Neutral.400 | #64748b | Muted text/labels |\n   227\t| Neutral.600 | #475569 | Button text |\n   228\t| Neutral.800 | #2d3748 | Primary text |\n   229\t| White | #ffffff | Cards, inputs |\n   230\t\n   231\t---\n   232\t\n   233\t## Component Variants (Key Feature)\n   234\t\n   235\tPenpot now supports true component variants (as of 2024-2025).\n   236\t\n   237\t### What Variants Solve\n   238\tInstead of separate components for each state:\n   239\t- Button.Default, Button.Hover, Button.Pressed, Button.Disabled\n   240\t\n   241\tYou have ONE component with properties:\n   242\t- Button with State property: Default | Hover | Pressed | Disabled\n   243\t\n   244\t### Creating Variants\n   245\t1. Select main component\n   246\t2. Ctrl+K → \"Create variant\"\n   247\t3. Variant appears in purple-bordered area\n   248\t4. Define properties in Design panel\n   249\t\n   250\t### Variant Properties\n   251\t```\n   252\tProperty: State\n   253\tValues: Default, Hover, Pressed, Disabled\n   254\t\n   255\tProperty: Size  \n   256\tValues: Small, Medium, Large\n   257\t```\n   258\t\n   259\tEach variant = unique combination of values.\n   260\t\n   261\t### Override Preservation\n   262\tLayers are **connected** between variants if they:\n   263\t- Share the same name\n   264\t- Are the same type\n   265\t- Have the same hierarchy level\n   266\t\n   267\tConnected layers preserve overrides when switching variants!\n   268\t\n   269\t### For LaundryLog Buttons\n   270\tInstead of Button.Option and Button.Option.Selected:\n   271\t```\n   272\tButton.Option (component with variants)\n   273\t├── State=Default\n   274\t└── State=Selected\n   275\t```\n   276\t\n   277\tSwitch variant by changing State property.\n   278\t\n   279\t---\n   280\t\n   281\t## Screens as Components\n   282\t\n   283\t### Rationale\n   284\t- Multiple paths may share same screen with slight variations\n   285\t- Like view functions in code: same structure, different data\n   286\t- Changes to base screen propagate to all paths using it\n   287\t\n   288\t### Recommended Pattern\n   289\t```\n   290\tScreen.NewSession          (main component - template)\n   291\t  └── Path1.1-NewSession   (instance with overrides)\n   292\t  └── Path2.1-NewSession   (instance with different sample data)\n   293\t\n   294\tScreen.EntryForm           (main component - template)\n   295\t  └── Path1.3-EntryForm    (instance)\n   296\t  └── Path1.4-WasherSelected (instance - change Button variant to Selected)\n   297\t```\n   298\t\n   299\t### Override Capabilities in Instances\n   300\tConfirmed overridable:\n   301\t- Text content (if layer name unchanged)\n   302\t- Component variant selection (State property)\n   303\t- Size (within constraints)\n   304\t- Position (for absolute elements)\n   305\t\n   306\tNOT overridable (requires detach):\n   307\t- Adding/removing children\n   308\t- Changing layer structure\n   309\t- Swapping to different component type\n   310\t\n   311\t### Best Practice\n   312\tUse variants for state changes (selected buttons, etc.) rather than separate components. Then path screens are instances that simply switch the variant property.\n   313\t\n   314\t---\n   315\t\n   316\t## Prototyping for Paths\n   317\t\n   318\t### Flow Setup\n   319\t1. Each path starts with a \"flow\" (starting point)\n   320\t2. Name flows by path: \"Path1-HappyPath\", \"Path2-GPSFlow\"\n   321\t3. Connect screens with single interaction per screen\n   322\t\n   323\t### Prototype Links\n   324\t- Set on individual layers, not whole boards\n   325\t- Can be set on component copies (instances)\n   326\t- Flows are selectable in View mode\n   327\t\n   328\t### For PATHS Pattern\n   329\tEach path screen has ONE clickable element that advances to next screen:\n   330\t```\n   331\tPath1.1-NewSession\n   332\t  └── Input.Location has interaction → Path1.2-LocationEntered\n   333\t\n   334\tPath1.2-LocationEntered  \n   335\t  └── Button \"Set Location\" has interaction → Path1.3-EntryForm\n   336\t```\n   337\t\n   338\tThis documents the exact user journey with sample data visible.\n   339\t\n   340\t---\n   341\t\n   342\t## Layer Naming Best Practices\n   343\t\n   344\t### Use Descriptive Content Names\n   345\t```\n   346\tGood:                          Bad:\n   347\t\"Enter location...\"            \"Value\"\n   348\t\"Where are you doing...\"       \"PromptText\"  \n   349\t\"Use GPS Location\"             \"Label\"\n   350\t\"LaundryLog\"                   \"Title\"\n   351\t\"Spark Business Card\"          \"Text\"\n   352\t```\n   353\t\n   354\tWhy: Connected layers between variants match by NAME. Meaningful names = easier debugging.\n   355\t\n   356\t---\n   357\t\n   358\t## TODO / Completed\n   359\t\n   360\t### Completed\n   361\t- [x] Test screen-as-component workflow - works with variants\n   362\t- [x] Clarify text override capabilities - yes, if layer name unchanged\n   363\t- [x] Establish path naming taxonomy - Path{N}.{Step}-{StateName}\n   364\t- [x] Define naming-to-bindings mapping (Intent, State, visibility)\n   365\t- [x] Document two-system architecture (UI Machine + Whole System)\n   366\t- [x] Establish terminology (Intent, State, Command, Event, Projection)\n   367\t\n   368\t### Still To Do\n   369\t- [ ] Document prototype link setup in detail\n   370\t- [ ] Define fidelity tagging approach\n   371\t- [ ] Create variant-based button components (3 done: Option, Counter, Quarter)\n   372\t- [ ] Test variant switching in path instances\n   373\t- [ ] Build Screen.EntryForm template\n   374\t- [ ] Implement Bindings.fs with compiler-validated mappings\n   375\t- [ ] Create build-time Penpot validation script\n   376\t\n   377\t### Future\n   378\t- [ ] Multi-user session support (husband/wife sharing session)\n   379\t- [ ] Real-time sync between users via push\n   380\t\n   381\t---\n   382\t\n   383\t## Revision History\n   384\t- v1: Initial learnings from Path 1.1 creation\n   385\t- v2: Added component variants, prototype flows, layer naming best practices\n   386\t- v3: Added naming-to-bindings mapping (Intent, State, visibility)\n   387"

