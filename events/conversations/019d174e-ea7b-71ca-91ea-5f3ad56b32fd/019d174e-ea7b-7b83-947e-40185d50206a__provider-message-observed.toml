text = "I want to try my idea of the UI design in penpot and combine with using bolero for ui. To keep it simple, lets assume WebAssembly client for bolero. It needs server for hot-reload, which is fine. I would like to also try out event modeling with my added ideas for that. So, I would say the first PATH to work on is that the app will load and present a text box with a question asking \"What is your name?\" in which the user would enter their name. a button will be needed to continue which leads to a screen showing  \"Hello <name>\".  Code will be created via Claude Code, not by you. You are just helping me figure all this out so i can implement it this go around."

