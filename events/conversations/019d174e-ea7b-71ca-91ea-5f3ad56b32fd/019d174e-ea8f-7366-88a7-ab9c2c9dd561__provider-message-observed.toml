text = "Done. Updated both reference documents:\n\n**[View updated penpot-conventions.md](computer:///mnt/user-data/outputs/penpot-conventions.md)**\n\nKey additions:\n- **Page Structure** section showing Components / Screens / PATHS\n- **Creating Screen Template Components** - full step-by-step process\n- **API Gotchas** section with:\n  - `page.findShapes()` vs `penpot.root.children` (use findShapes!)\n  - Component naming timing (rename BEFORE createComponent)\n  - Component vs Instance detection\n- Updated TODO with completed items\n- Revision history v4\n\n**[View updated ivans-ecosystem-reference.md](computer:///mnt/user-data/outputs/ivans-ecosystem-reference.md)**\n\n- Updated page name from \"Screens - Design\" to \"Screens\"\n\n---\n\n## Summary of Correct Process\n\n```\n1. Rename board to COMPONENT name first (Screen.NewSession)\n2. createComponent() - inherits name from board\n3. Move main component to Screens page\n4. Create instance via component.instance()\n5. Move instance to PATHS page\n6. Rename instance to PATH name (Path1.1-NewSession)\n7. Add text label near instance for identification\n```\n\nReady to continue with Option 2 (Screen.EntryForm) when you are."

