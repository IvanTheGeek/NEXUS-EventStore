text = "{\"start_timestamp\":\"2025-12-02T01:14:28.184918Z\",\"stop_timestamp\":\"2025-12-02T01:14:48.663073Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"str_replace\",\"input\":{\"path\":\"/mnt/user-data/outputs/penpot-conventions.md\",\"new_str\":\"### Best Practice\\nUse variants for state changes (selected buttons, etc.) rather than separate components. Then path screens are instances that simply switch the variant property.\\n\\n---\\n\\n## Creating Screen Template Components (Code Pattern)\\n\\nConverting an existing board to a screen template component with instances.\\n\\n### Page Structure\\n\\u0060\\u0060\\u0060\\nPages:\\n\\u251C\\u2500\\u2500 Components     - Small reusable components (buttons, inputs, cards)\\n\\u251C\\u2500\\u2500 Screens        - Main component roots for screen templates\\n\\u2514\\u2500\\u2500 PATHS          - Instances of screen templates with path-specific data\\n\\u0060\\u0060\\u0060\\n\\n### Correct Process\\n\\n**Step 1:** Rename board BEFORE making it a component\\n\\u0060\\u0060\\u0060javascript\\n// Find the board on current page\\nconst board = page.findShapes().find(s =\\u003E s.name === \\u0022Path1.1-NewSession\\u0022 \\u0026\\u0026 s.type === \\u0027board\\u0027);\\n\\n// Rename to component name FIRST - this sets the library asset name\\nboard.name = \\u0022Screen.NewSession\\u0022;\\n\\u0060\\u0060\\u0060\\n\\n**Step 2:** Create component (converts board in-place)\\n\\u0060\\u0060\\u0060javascript\\nconst component = penpot.library.local.createComponent([board]);\\n// component.name inherits from board.name\\n\\u0060\\u0060\\u0060\\n\\n**Step 3:** Move main component to Screens page\\n\\u0060\\u0060\\u0060javascript\\n// In UI: Cut (Ctrl\\u002BX) from current page, paste (Ctrl\\u002BV) on Screens page\\n// Via API: May need to manipulate parent references (check API docs)\\n\\u0060\\u0060\\u0060\\n\\n**Step 4:** Create instance for PATHS page\\n\\u0060\\u0060\\u0060javascript\\nconst instance = component.instance();\\ninstance.name = \\u0022Path1.1-NewSession\\u0022;  // Instance name differs from component\\ninstance.x = 100;\\ninstance.y = 100;\\n\\u0060\\u0060\\u0060\\n\\n**Step 5:** Add to PATHS page\\n\\u0060\\u0060\\u0060javascript\\nconst pathsPage = penpot.currentFile.pages.find(p =\\u003E p.name === \\u0022PATHS\\u0022);\\npenpot.openPage(pathsPage);\\npenpot.root.appendChild(instance);\\n\\u0060\\u0060\\u0060\\n\\n**Step 6:** Add text label for visual identification (optional)\\n\\u0060\\u0060\\u0060javascript\\n// Instances don\\u0027t show name above board like regular boards do\\nconst label = penpot.createText(\\u0022Path1.1-NewSession\\u0022);\\nlabel.x = instance.x;\\nlabel.y = instance.y - 25;\\npenpot.root.appendChild(label);\\n\\u0060\\u0060\\u0060\\n\\n### Result\\n\\u0060\\u0060\\u0060\\nLibrary Assets:\\n\\u2514\\u2500\\u2500 Screen.NewSession (component)\\n\\nScreens page:\\n\\u2514\\u2500\\u2500 Screen.NewSession (375\\u00D7667) - main component root (isInstance: true, isRoot: true)\\n\\nPATHS page:\\n\\u251C\\u2500\\u2500 Path1.1-NewSession (text label)\\n\\u2514\\u2500\\u2500 Path1.1-NewSession (375\\u00D7667) - instance (isInstance: true, isRoot: true)\\n\\u0060\\u0060\\u0060\\n\\n### Key Points\\n- **Rename BEFORE createComponent()** - component name comes from board name at creation time\\n- **Main component goes on Screens page** - this is the editable template\\n- **Instances go on PATHS page** - these are path-specific copies\\n- **Instance names can differ** - allows \\u0022Path1.1-NewSession\\u0022 instance of \\u0022Screen.NewSession\\u0022 component\\n- **Add text labels to instances** - instances don\\u0027t display names like boards do\\n\\n---\\n\\n## API Gotchas\\n\\n### \\u0060page.findShapes()\\u0060 vs \\u0060penpot.root.children\\u0060\\n\\n**Always use \\u0060page.findShapes()\\u0060 for accurate per-page queries:**\\n\\u0060\\u0060\\u0060javascript\\n// CORRECT - accurate results for specific page\\nconst pathsPage = penpot.currentFile.pages.find(p =\\u003E p.name === \\u0022PATHS\\u0022);\\npenpot.openPage(pathsPage);\\nconst shapes = pathsPage.findShapes();\\n\\n// UNRELIABLE - may return cached/stale data across page switches\\nconst shapes = penpot.root.children;\\n\\u0060\\u0060\\u0060\\n\\n### Component vs Instance Detection\\n\\u0060\\u0060\\u0060javascript\\nconst shape = page.findShapes().find(s =\\u003E s.name === \\u0022Screen.NewSession\\u0022);\\n\\n// Check if it\\u0027s a component instance\\nconst isInstance = shape.isComponentInstance ? shape.isComponentInstance() : false;\\n\\n// Check if it\\u0027s a component root (main component, not just any instance)\\nconst isRoot = shape.isComponentRoot ? shape.isComponentRoot() : false;\\n\\n// Main component: isInstance=true, isRoot=true\\n// Regular instance: isInstance=true, isRoot=true (same!)\\n// Non-component board: isInstance=false, isRoot=false\\n\\u0060\\u0060\\u0060\\n\\n### Component Naming Timing\\n\\u0060\\u0060\\u0060javascript\\n// BAD - name may not persist\\nconst component = penpot.library.local.createComponent([board]);\\ncomponent.name = \\u0022Screen.NewSession\\u0022;  // May not stick\\n\\n// GOOD - name inherited from board\\nboard.name = \\u0022Screen.NewSession\\u0022;\\nconst component = penpot.library.local.createComponent([board]);\\n// component.name is already \\u0022Screen.NewSession\\u0022\\n\\u0060\\u0060\\u0060\\n\\n---\\n\\n## Prototyping for Paths\",\"old_str\":\"### Best Practice\\nUse variants for state changes (selected buttons, etc.) rather than separate components. Then path screens are instances that simply switch the variant property.\\n\\n---\\n\\n## Prototyping for Paths\",\"description\":\"Add new section on creating screen template components after the Screens as Components section\"},\"message\":\"Add new section on creating screen template components after the Screens as Components section\",\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":{\"type\":\"text\",\"text\":\"Add new section on creating screen template components after the Screens as Components section\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

