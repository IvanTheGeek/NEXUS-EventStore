text = "based on reviewing your processes, and what i just did manually, I think the following: When the item was made a component, it changes it in place. I think you needed to rename the board, then make it a component which sets the asset name to the main component name,  and then MOVE it to the Screens page. Then create an instance of that component on the PATHS page, and then that can be renamed. In the UI, I can create the instance by going to the assets tab, selecting/dragging the component from the assets to the page. I can also do CTRL D after selecting the main component on the Screens page (where it is now) and then moving the duplicate instance to the PATHS page. Not sure what options you have using the APIs. I have also added a text tag to the instance as the instance does not have the name above it like the board normally does. Check the penpot file and see what it looks like, then figure out how you should have done things to achieve the same state as it is now and update your ref docs."

