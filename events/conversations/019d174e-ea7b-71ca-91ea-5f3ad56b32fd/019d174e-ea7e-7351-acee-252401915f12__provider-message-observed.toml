text = "That's working. The `block-beta` diagram gives us grid control with aligned columns and rows.\n\n```mermaid\nblock-beta\n    columns 5\n    \n    space:1 slice1[\"Slice 1\"]:2 slice2[\"Slice 2\"]:2\n    \n    labelU[\"User A\"]:1 screen1[\"Name Entry Screen\"]:2 screen2[\"Greeting Screen\"]:2\n    \n    space:1 cmd1[\"Enter Name\"]:1 space:1 read1[\"User Greeting\"]:1 space:1\n    \n    labelS[\"System A\"]:1 space:1 evt1[\"Name Entered\"]:1 space:2\n    \n    style cmd1 fill:#7B9FCF,color:#000\n    style evt1 fill:#F5A623,color:#fff\n    style read1 fill:#4CAF50,color:#fff\n    style screen1 fill:#fff,stroke:#333\n    style screen2 fill:#fff,stroke:#333\n    style slice1 fill:#FFFDE7,stroke:#FDD835\n    style slice2 fill:#FFFDE7,stroke:#FDD835\n```\n\n[🎨 Edit in Mermaid Chart Playground](https://mermaidchart.com/play?utm_source=mermaid_mcp_server&utm_medium=remote_server&utm_campaign=claude#pako:eNqNksFOhDAQhl-lgeuaQBFXe8Nl680L2ZN4gDIYsgVMW02I8d1tSyHd4Bo5kGHm69e_DV8BGxsISFDzkZ1valBVOSD9sJF_9INE6fw5v-V7xYDESPKOQfxSBoUpUFwGrwTPXbx2se36y3lVAz9p4CRBoMzMtYsJgMHInqse0HFQYkKFbTqtrY33SReqG9788W_xWN8Yn1bpbYzV7eTGAio7tykW5wWyCV2YU01SQb_GdjL4VH52END4wGU-NXGw6VDbcU7C_eMDPdCdvutRkDCKIp8zZsfRNLvDycK1betz9jgOvD1kNI2ugO6mHaqHO6nEeAYSJkmyBfE_QPsfLCEpzY_7FaV5fp-kGxr_TQffP1FYzRI)\n\n---\n\n**Limitations vs your mockup:**\n- Can't do vertical bands *behind* content (slices are row headers instead)\n- No arrows connecting elements\n- Middle row (commands/read models) can't float between lanes visually\n\n**What works:**\n- Grid alignment ✓\n- Color coding (blue cmd, orange event, green read model) ✓\n- Swim lane labels ✓\n- Slice identification ✓\n- Left-to-right time flow ✓\n\nThis could serve as a workable bridge format until Penpot integration is ready. Does this structure work for documenting paths at the business fidelity level?"

