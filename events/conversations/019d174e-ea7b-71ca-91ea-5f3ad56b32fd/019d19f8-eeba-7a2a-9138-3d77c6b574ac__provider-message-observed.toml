text = "Excellent! Found it! The key findings:\n\n1. From the plugin API doc at `https://penpot-plugins-api-doc.pages.dev/interfaces/Penpot`:\n   - `generateMarkup(shapes)` - Generates markup (HTML/SVG) for given shapes\n   - `generateStyle(shapes)` - Generates styles (CSS) for given shapes\n   - `generateFontfaces(shapes)` - Generates fontfaces styles\n\nThis is exactly what we need! The plugin API has methods to programmatically generate the HTML/CSS export that we saw from the Inspect tab.\n\nLet me verify this more specifically."

