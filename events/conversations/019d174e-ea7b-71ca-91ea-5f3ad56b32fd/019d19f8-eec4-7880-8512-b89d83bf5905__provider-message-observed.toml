[[body.segments]]
kind = "plain_text"
text = "[View the conventions document](computer:///mnt/user-data/outputs/penpot-conventions.md)\n\n---\n\n## Your Thinking on Screens as Components\n\n**Yes, you're thinking correctly.** The analogy holds well:\n\n| Code Concept | Penpot Equivalent |\n|--------------|-------------------|\n| View function | Screen component (main) |\n| Function parameters | Overrideable properties (text, selection states) |\n| Function call with args | Screen instance with overrides |\n| Return value | Rendered screen in path |\n\n---\n\n## How It Would Work\n\n**Screen Component (Template):**\n```\nScreen.EntryForm (main component)\n├── Header\n├── MachineType section\n│   ├── Button.Option \"Washer\"   ← can override to selected\n│   ├── Button.Option \"Dryer\"\n│   └── Button.Option \"Supplies\"\n├── Quantity section\n├── Price section\n└── Payment section\n```\n\n**Path Instances:**\n```\nPath1.3-EntryForm (instance of Screen.EntryForm)\n  → All defaults, nothing selected\n\nPath1.4-WasherSelected (instance of Screen.EntryForm)\n  → Override: Washer button uses Button.Option.Selected styling\n  → Override: Validation shows Type ✓\n\nPath1.5-CardTapped (instance of Screen.EntryForm)\n  → Override: Washer ✓, Card ✓\n  → Override: Card selector visible\n```\n\n---\n\n## The Key Question\n\n**Can Penpot instances override enough?**\n\nFrom what I understand, component instances can override:\n- Text content ✓\n- Some properties (size, position within constraints)\n- Visibility of children (maybe?)\n\nBut swapping a child component (Button.Option → Button.Option.Selected) might require:\n- **Option A:** Nested component with variants\n- **Option B:** Both states present, toggle visibility\n- **Option C:** Detach and modify (loses component link)\n\n---\n\n## Recommended Test\n\nBuild `Screen.EntryForm` as a component, then try creating an instance and see what you can override. That will tell us the practical limits.\n\nWant me to create the base `Screen.EntryForm` component for testing, or would you prefer to build it manually and report back what works?"

