text = "---\n\n## Path 1: Happy Path - Manual Location, Single Washer Entry\n\n**Sample Data:**\n- Location: `Love's Travel Stop #801, Cordele, GA`\n- Machine: Washer\n- Quantity: 1\n- Price: $3.75\n- Payment: Card\n\n---\n\n**Screen Sequence:**\n\n```\nScreen 1.1: New Session\n┌─────────────────────────────────────────┐\n│                                         │\n│       Where are you doing               │\n│           laundry today?                │\n│                                         │\n│  ┌─────────────────────────────────┐   │\n│  │     [📍 Use GPS Location]       │   │\n│  └─────────────────────────────────┘   │\n│                                         │\n│  ┌─────────────────────────────────┐   │\n│  │     |                           │   │  ← cursor here\n│  └─────────────────────────────────┘   │\n│                                         │\n└─────────────────────────────────────────┘\n\n→ User taps text field\n```\n\n```\nScreen 1.2: Typing Location\n┌─────────────────────────────────────────┐\n│                                         │\n│       Where are you doing               │\n│           laundry today?                │\n│                                         │\n│  ┌─────────────────────────────────┐   │\n│  │ Love's Travel Stop #801, Cord|  │   │\n│  └─────────────────────────────────┘   │\n│                                         │\n│  ┌─────────────────────────────────┐   │\n│  │     [Start Session]             │   │\n│  └─────────────────────────────────┘   │\n│                                         │\n└─────────────────────────────────────────┘\n\n→ User taps \"Start Session\"\n```\n\n```\nScreen 1.3: Entry Form (fresh)\n┌─────────────────────────────────────────┐\n│ LaundryLog                          🧺  │\n├─────────────────────────────────────────┤\n│                                         │\n│  [Washer]    [Dryer]    [Supplies]     │\n│                                         │\n│            QUANTITY                     │\n│      (−)       1        (+)            │\n│                                         │\n│            UNIT PRICE                   │\n│     [−.25]  $ 3.75     [+.25]          │\n│   [$3.75] [$4.00] [$3.50]              │\n│                                         │\n│   Entry Total              $3.75        │\n│                                         │\n│  [Cash]    [Points]                     │\n│  [Card]    [App]                        │\n│                                         │\n│  [📍 Location ✗] [🌊 Type ✗] [💳 Pay ✗] │\n│                                         │\n├─────────────────────────────────────────┤\n│  📍 Love's Travel Stop #801, Cordele    │\n│  Session Total                  $0.00   │\n└─────────────────────────────────────────┘\n\n→ User taps \"Washer\"\n```\n\n```\nScreen 1.4: Washer Selected\n┌─────────────────────────────────────────┐\n│ LaundryLog                          🧺  │\n├─────────────────────────────────────────┤\n│                                         │\n│  [WASHER✓]   [Dryer]    [Supplies]     │\n│                                         │\n│  ... (rest same, validation updates)    │\n│                                         │\n│  [📍 Location ✓] [🌊 Type ✓] [💳 Pay ✗] │\n│                                         │\n└─────────────────────────────────────────┘\n\n→ User taps \"Card\"\n```\n\n```\nScreen 1.5: Ready to Submit\n┌─────────────────────────────────────────┐\n│                                         │\n│  [WASHER✓]   [Dryer]    [Supplies]     │\n│                                         │\n│            QUANTITY                     │\n│      (−)       1        (+)            │\n│                                         │\n│            UNIT PRICE                   │\n│     [−.25]  $ 3.75     [+.25]          │\n│                                         │\n│   Entry Total              $3.75        │\n│                                         │\n│  [Cash]    [Points]                     │\n│  [CARD✓]  [App]                        │\n│                                         │\n│        [LOG ENTRY]                      │\n│                                         │\n├─────────────────────────────────────────┤\n│  📍 Love's Travel Stop #801, Cordele    │\n│  Session Total                  $0.00   │\n└─────────────────────────────────────────┘\n\n→ User taps \"Log Entry\"\n```\n\n```\nScreen 1.6: Entry Logged\n┌─────────────────────────────────────────┐\n│ LaundryLog                          🧺  │\n├─────────────────────────────────────────┤\n│                                         │\n│  [Washer]    [Dryer]    [Supplies]     │  ← Reset\n│                                         │\n│      (−)       1        (+)            │  ← Reset\n│                                         │\n│     [−.25]  $ 3.75     [+.25]          │  ← Kept\n│                                         │\n│  [Cash]    [Points]                     │\n│  [CARD✓]  [App]                        │  ← Kept\n│                                         │\n│  [📍 Location ✓] [🌊 Type ✗] [💳 Pay ✓] │\n│                                         │\n├─────────────────────────────────────────┤\n│  📍 Love's Travel Stop #801, Cordele    │\n│  Session Total                  $3.75   │\n├─────────────────────────────────────────┤\n│  TODAY'S ENTRIES                        │\n│  ┌───────────────────────────────────┐ │\n│  │ $3.75                    10:32 AM │ │\n│  │ 1 Washer @ $3.75 • Card           │ │\n│  └───────────────────────────────────┘ │\n└─────────────────────────────────────────┘\n\n→ END PATH\n```\n\n---\n\n## Questions Before Building\n\n1. **Screen 1.2** - Should \"Start Session\" appear only after typing? Or always visible but disabled until location entered?\n\n2. **Default price** - Is $3.75 the right default for a fresh session (no history yet)? Or blank until user enters?\n\n3. **Location validation** - Any minimum length? Or any non-empty string is valid?"

