kind = "plain_text"
text = "Agreed. Batch on submit is simplest and most intuitive - the UI events provide context for the domain command.\n\n**The submit payload:**\n\n```fsharp\n// What crosses the Cmd boundary\ntype SubmitPayload = {\n    Command: DomainCommand           // The intent\n    UIContext: UIEvent list          // What led to this\n    SubmittedAt: DateTimeOffset\n}\n\n// Example\n{\n    Command = EnterName \"Ivan\"\n    UIContext = [\n        NameFieldFocused (t0)\n        NameTyped (\"I\", t1)\n        NameTyped (\"Iv\", t2)\n        NameTyped (\"Iva\", t3)\n        NameTyped (\"Ivan\", t4)\n        NameFieldBlurred (t5)\n        ContinueClicked (t6)\n    ]\n    SubmittedAt = t6\n}\n```\n\n**Filtering - not all UI events are worth sending:**\n\n```fsharp\ntype UIEvent =\n    | NameTyped of value: string * at: DateTimeOffset\n    | NameFieldFocused of at: DateTimeOffset\n    | NameFieldBlurred of at: DateTimeOffset\n    | ContinueClicked of at: DateTimeOffset\n    // ... etc\n\nlet isSubmittable = function\n    | NameTyped _ -> true       // Final value matters\n    | ContinueClicked _ -> true // Action taken\n    | NameFieldFocused _ -> false  // Noise\n    | NameFieldBlurred _ -> false  // Noise\n\n// Or: only send the last NameTyped, not every keystroke\nlet collapseUIEvents (events: UIEvent list) : UIEvent list =\n    events\n    |> List.filter isSubmittable\n    |> collapseConsecutiveTyped  // Keep only final value\n```\n\n**Collapsed payload (what actually gets sent):**\n\n```fsharp\n{\n    Command = EnterName \"Ivan\"\n    UIContext = [\n        NameTyped (\"Ivan\", t4)   // Just the final value\n        ContinueClicked (t6)\n    ]\n    SubmittedAt = t6\n}\n```\n\n---\n\n**The Cmd that crosses the boundary:**\n\n```fsharp\nlet update (event: UIEvent) (state: UIState) : UIState * Cmd<UIEvent> =\n    let newLog = state.EventLog @ [event]\n    let newView = applyEvent state.CurrentView event\n    \n    let cmd = \n        match event with\n        | ContinueClicked at ->\n            let payload = {\n                Command = EnterName state.CurrentView.Name\n                UIContext = collapseUIEvents newLog\n                SubmittedAt = at\n            }\n            Cmd.ofAsync \n                (submitToBackend payload)\n                (fun result -> DomainResponseReceived (result, DateTimeOffset.Now))\n        | _ -> \n            Cmd.none\n    \n    { EventLog = newLog; CurrentView = newView }, cmd\n```\n\n---\n\n**Backend receives and stores:**\n\n```fsharp\n// Domain side stores both\ntype StoredEvent =\n    | UIContextReceived of sessionId: Guid * events: UIEvent list * at: DateTimeOffset\n    | NameEntered of name: string * at: DateTimeOffset\n\n// Or keep them separate\neventStore.Append(streamId, NameEntered (\"Ivan\", t6))\nanalyticsStore.Append(sessionId, UIContextReceived (sessionId, uiEvents, t6))\n```\n\n---\n\n**Question:** Should the UI context go to the same event stream as domain events, or a separate analytics/telemetry stream?\n\n| Same stream | Separate stream |\n|-------------|-----------------|\n| Full replay shows everything | Domain stream stays clean |\n| Single timeline | Can discard UI telemetry |\n| More storage | Different retention policies |"

