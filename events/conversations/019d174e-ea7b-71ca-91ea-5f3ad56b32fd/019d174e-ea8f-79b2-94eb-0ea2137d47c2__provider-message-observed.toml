kind = "plain_text"
text = "Created two semantic tokens in the **Button** folder:\n\n| Token | Hex | Usage |\n|-------|-----|-------|\n| Button.Background.Disabled | #e2e8f0 | Disabled button bg |\n| Button.Text.Disabled | #94a3b8 | Disabled button text |\n\nYou should see them in Assets panel under \"Button\" group.\n\nNow you can create the Disabled variant for Button.Option:\n1. Select Button.Option variant group\n2. Ctrl+K → Create variant  \n3. Apply **Button.Background.Disabled** as fill\n4. Apply **Button.Text.Disabled** to label text\n5. Set variant value to \"Disabled\"\n\nAfter that, I can create Path1.2 with the \"Set Location\" button using the Disabled variant."

