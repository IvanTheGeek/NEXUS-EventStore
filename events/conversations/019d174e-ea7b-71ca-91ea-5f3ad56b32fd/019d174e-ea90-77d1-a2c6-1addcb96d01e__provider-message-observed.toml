text = "{\"start_timestamp\":\"2025-12-02T03:09:02.889144Z\",\"stop_timestamp\":\"2025-12-02T03:09:07.336032Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"penpot:execute_code\",\"input\":{\"code\":\"// Add Button.SetLocation to Screen.NewSession\\nconst screensPage = penpot.currentFile.pages.find(p =\\u003E p.name === \\u0022Screens\\u0022);\\npenpot.openPage(screensPage);\\n\\n// Get Button.Option component\\nconst buttonOption = penpot.library.local.components.find(c =\\u003E c.name === \\u0022Button.Option\\u0022);\\nif (!buttonOption) {\\n    return { error: \\u0022Button.Option not found\\u0022 };\\n}\\n\\n// Find LocationPrompt in Screen.NewSession\\nconst screenNewSession = screensPage.findShapes().find(s =\\u003E s.name === \\u0022Screen.NewSession\\u0022);\\nconst locationPrompt = screenNewSession.children.find(c =\\u003E c.name === \\u0022LocationPrompt\\u0022);\\n\\n// Get Input.Location for positioning reference\\nconst inputLocation = locationPrompt.children.find(c =\\u003E c.name === \\u0022Input.Location\\u0022);\\n\\n// Create button instance\\nconst button = buttonOption.instance();\\n\\n// Position below Input.Location with same width\\n// Input is 311 wide, button default is 150\\nbutton.resize(311, 56);  // Match GPS button width and height\\n\\n// Position: same x as input, below it with gap\\nbutton.x = inputLocation.x;\\nbutton.y = inputLocation.y \\u002B inputLocation.height \\u002B 16;  // 16px gap\\n\\n// Add to LocationPrompt\\nlocationPrompt.appendChild(button);\\n\\nreturn {\\n    added: true,\\n    buttonId: button.id,\\n    size: \\u0060${Math.round(button.width)}\\u00D7${Math.round(button.height)}\\u0060,\\n    position: \\u0060(${button.x}, ${button.y})\\u0060\\n};\\n\"},\"message\":\"execute_code\",\"integration_name\":\"penpot\",\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

