text = "---\n\n## Current State (Confirmed Problems)\n\n### Problem 1: Component name wrong\n- Component in library is named `Path1.1-NewSession` (id: `a6943d77-44ea-80d3-8007-3263cfbe369c`)\n- My rename to `Screen.NewSession` did NOT persist\n- Should be: `Screen.NewSession`\n\n### Problem 2: Screen board is MISSING\n- No screen-sized boards (375×667) exist on ANY page\n- The original Path1.1-NewSession board disappeared during component conversion\n- Component exists in library but has no visible main root on canvas\n\n### Problem 3: Component location unclear\n- I cannot find where the component's main root lives\n- The API shows the component exists, but no corresponding shape on any page\n\n### Problem 4: PATHS page only has component palette items\n- PATHS page now only contains small component instances (buttons, inputs, etc.)\n- No actual screen layout\n\n---\n\n## What Should Have Happened (Correct Process)\n\nBased on how components should work:\n\n1. **Component main should live on a design page** (Components or Screens - Design)\n2. **Instance should live on PATHS page** with name `Path1.1-NewSession`\n3. **Component in library** should be named `Screen.NewSession`\n4. **Instance name** can differ from component name (allows `Path1.1-NewSession` instance of `Screen.NewSession` component)\n\n---\n\n## My Process Errors\n\n1. **Did not verify component location after creation** - assumed it worked\n2. **Renamed component after creation but it didn't stick** - didn't verify\n3. **Used createComponent on existing board without understanding behavior** - converted in-place and may have broken something\n4. **Did not check if original board still existed** - it vanished\n5. **Made multiple rename attempts without clean verification** - created confusion\n\n---\n\nReady for you to fix in Penpot. After your changes, I'll re-check and update the reference docs with the correct process."

