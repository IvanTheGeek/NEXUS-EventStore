kind = "plain_text"
text = "Yes, now you are getting it! I think each slice with have a fidelity also. So it might be Executive level, which is basically happy path through showing the business needs. This is would be most like what Adam's Event Modeling idea would be. The top level if you will. Then additional fidelities will be selectable in the EMviewer where a user can expand the model to include the details that is user/viewer wants to see, like the UX person can see the click and selection of the screens if they want that level, a shipping clerk and see the steps and events concerning the shipping workflows and then be able to learn as a new person, or give feedback that something is not the way they do it, or needs changed or improved, etc. Technical code folks can enable details that they are in need of to review, etc. Still working out exactly the fidelities, but that is my vision. The actual EventModel will be one long line of every single item with all fidelities. The EMviewer will have all that data, but it will only show what the user wants to know and see."

