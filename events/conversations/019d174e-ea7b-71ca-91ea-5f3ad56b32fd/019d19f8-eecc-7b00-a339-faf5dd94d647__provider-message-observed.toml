text = "We hope this makes it easier for you to create your plugins! If you just want to get to the examples, you can go straight to the repository here · One of the most basic things you can do in design is create a shape. It&#x27;s really simple. In this example, we&#x27;ll show you how to make a rectangle, but you can use the same principles to make other shapes. This makes it easy for you to add different shapes to your design, which is great for building more complex elements and layouts. // just replace penpot.createRectangle(); // for one of these other options: penpot.createEllipse(); penpot.createPath(); penpot.createBoard(); ... You&#x27;ll learn how to insert text and explore a variety of styling options to customize it to your exact preferences. You&#x27;ll discover how to adjust font, size, color, and more to create visually engaging text elements. You can also apply multiple styles within a single text string by styling different sections individually, giving you even greater control over your text \n\nOften, we want to make our plugins better by adding external libraries, new features, and functionalities. Here's an example of how to use the Picsum library. It shows how you can use third-party APIs to make your plugin development better. Use this as a reference to explore how you can add external resources to your projects. ... With the ability to create an interactive prototype, you can turn your design from a static layout into a dynamic, navigable experience. This lets users interact with the design in a more seamless way and gives them a better preview of the final product. ... Ruler guides are great for aligning elements exactly where you want them. Check out how to add horizontal and vertical guides to your page or boards. This makes it easier to keep your design looking the same from one place to the next. ... Comments are a great way for designers and team members to give each other feedback on a design right away.\n\nWe hope this makes it easier for you to create your plugins! If you just want to get to the examples, you can go straight to the repository here · One of the most basic things you can do in design is create a shape. It's really simple. In this example, we'll show you how to make a rectangle, but you can use the same principles to make other shapes. This makes it easy for you to add different shapes to your design, which is great for building more complex elements and layouts. // just replace penpot.createRectangle(); // for one of these other options: penpot.createEllipse(); penpot.createPath(); penpot.createBoard(); ... You'll learn how to insert text and explore a variety of styling options to customize it to your exact preferences. You'll discover how to adjust font, size, color, and more to create visually engaging text elements. You can also apply multiple styles within a single text string by styling different sections individually, giving you even greater control over your text \n\nAs we mentioned in the Create a plugin section, we've got two great options for you to get started with your plugin. The first is a basic Typescript template with all the essential structure you'll need. The second is the same, but uses one of the most popular frameworks like Angular, Vue, or React. We've included links to the repositories below: ...\nDive into Penpot plugin development! This guide covers creating plugins from scratch or using templates, libraries, API communication, &amp; deployment.\n\nServing an application: This refers to making your application accessible over a network, typically for testing or development purposes. When using a tool like live-server, a local web server is created on your machine, which serves your application files over HTTP. Most modern frameworks offer their own methods for serving applications, and there are build tools like Vite and Webpack that can handle this process as well. You don't need to deploy your plugin just to test it. Locally serving your plugin is compatible with https://penpot.app/. However, be mindful of potential CORS (Cross-Origin Resource Sharing) issues. To avoid these, ensure your plugin includes the appropriate cross-origin headers. (Find more info about this at the Deployment step) Serving your plugin will generate a URL that looks something like http://localhost:XXXX, where XXXX represents the port number on which the plugin is served.\n\nThe plugin icon must be an image file. All image formats are valid, so you can use whichever format works best for your needs. Although there is no specific size requirement, it is recommended that the icon be 56x56 pixels in order to ensure its optimal appearance across all devices. content:read: Allows reading of content-related data. Grants read access to all endpoints and operations dealing with content. Typical use cases: viewing shapes, pages, or other design elements in a project; accessing the properties and settings of content within the application. content:write: Allows writing or modifying content-related data. Grants write access to all endpoints and operations dealing with content modifications, except those marked as read-only. Typical use cases: adding, updating, or deleting shapes and elements in a design; uploading media or other assets to the project.\n\nBy using these message-based events, any data retrieved through the Penpot API can be communicated to and from your plugin interface seamlessly. For more detailed information, refer to the Penpot Plugins API Documentation. This step is only for local serving. For a detailed guide about building and deploying you can check the documentation at Deployment · You can skip this step if working exclusively with JavaScript by simply moving plugin.js to your public/ directory. If you wish to run your plugin locally and test it live you need to make your plugin file reachable. Right now, your plugin.ts file is somewhere in the src/ folder, and you can't access it through http://localhost:XXXX/plugin.js. You can achieve this through multiple solutions, but we offer two simple ways of doing so. Of course, you can come up with your own. If you're using Vite you can simply edit the configuration file and add the build to your vite.config.ts.\n\nCreate your own app with the framework of your choice. See examples for each framework here ... There are two libraries that can help you with your plugin's development. They are @penpot/plugin-styles and @penpot/plugin-types. @penpot/plugin-styles contains styles to help build the UI for Penpot plugins. To check the styles go to Plugin styles. ... You can add the styles to your global CSS file. ... If you're using typescript, don't forget to add @penpot/plugin-types to your typings in your tsconfig.json. { \"compilerOptions\": { [...] \"typeRoots\": [\"./node_modules/@types\", \"./node_modules/@penpot\"], \"types\": [\"plugin-types\"], } } A plugin file is needed to interact with Penpot and its API. You can use either javascript or typescript and it can be placed wherever you like. It normally goes alongside the main files inside the src/ folder. We highly recommend labeling your creation as plugin.js or plugin.ts, depending upon your preferred language.\nCreate, deploy, and use the Penpot plugin API with our comprehensive documentation. Get started today and expand Penpot&#x27;s capabilities.\nGet started with Penpot Plugins: Installation, development, and deployment. Access API documentation, examples, templates, and FAQs.\n\nAccess detailed documentation on the plugins API for integration and development. Find examples and starter templates in different frameworks. Get quick answers to common questions and troubleshooting tips.\nCheck the API documentation for more details. Changes on the penpot.on and penpot.off methods. Previously you had to send the original callback to the off method in order to remove an event listener. Now, penpot.on will return an id that you can pass to the penpot.off method in order to remove the listener. Previously: penpot.on(‘pagechange’, myListener); // Register an event listener penpot.off(‘pagechange’, myListener); // Remove previously registered listener · Now: const id = penpot.on(‘pagechange’, myListener); penpot.off(id); We’ve deprecated the old behavior in favor of the new one, this means that the behavior will work in the next version, but will be removed further down the line. Change some names to better align with the names in Penpot&#x27;s UI. type frame is now board: PenpotFrame is now Board · penpot.createFrame changed to penpot.createBoard ·\n\nCheck the API documentation for more details. Changes on the penpot.on and penpot.off methods. Previously you had to send the original callback to the off method in order to remove an event listener. Now, penpot.on will return an id that you can pass to the penpot.off method in order to remove the listener. Previously: penpot.on(‘pagechange’, myListener); // Register an event listener penpot.off(‘pagechange’, myListener); // Remove previously registered listener · Now: const id = penpot.on(‘pagechange’, myListener); penpot.off(id); We’ve deprecated the old behavior in favor of the new one, this means that the behavior will work in the next version, but will be removed further down the line. Change some names to better align with the names in Penpot's UI. type frame is now board: PenpotFrame is now Board · penpot.createFrame changed to penpot.createBoard ·\n\nWe’ve redone the documentation. You can check the API here: https://penpot-plugins-api-doc.pages.dev/ New samples repository with lots of samples to use the API: https://github.com/penpot/penpot-plugins-samples · Changed types names to remove the Penpot prefix. So for example: PenpotShape becomes Shape; PenpotFile becomes File, and so on. Check the API documentation for more details. Changes on the penpot.on and penpot.off methods. Previously you had to send the original callback to the off method in order to remove an event listener. Now, penpot.on will return an id that you can pass to the penpot.off method in order to remove the listener. ... penpot.on(‘pagechange’, myListener); // Register an event listener penpot.off(‘pagechange’, myListener); // Remove previously registered listener ... We’ve deprecated the old behavior in favor of the new one, this means that the behavior will work in the next version, but will be removed further down the line.\nThis ensures that TypeScript can fully understand and work with the API. You can install the package in any project with npm install @penpot/plugin-types. You can check the details in @penpot/plugin-types package.\n\nIcon: your plugin's icon, which will be also displayed in the plugin manager modal. It'll be a tag so you can use whichever image format works better for you. It's recommended to use a 56x56 pixel icon for the best appearance on all devices. Permissions: your plugin's permissions, which allow access to different parts of the Penpot API. content:read: Allows reading of content-related data. Grants read access to all endpoints and operations dealing with content. Typical use cases: viewing shapes, pages, or other design elements in a project; accessing the properties and settings of content within the application. content:write: Allows writing or modifying content-related data. Grants write access to all endpoints and operations dealing with content modifications, except those marked as read-only. Typical use cases: adding, updating, or deleting shapes and elements in a design; uploading media or other assets to the project.\n\nThis ensures that TypeScript can fully understand and work with the API. You can install the package in any project with npm install @penpot/plugin-types. You can check the details in @penpot/plugin-types package.\n\nPenpot's plugin system allows you to add new features to the platform through independent modules called plugins. These plugins run separately from the main Penpot app, inside iframes, which are like small, isolated browser windows within the app. Plugins communicate with Penpot by sending and receiving messages through the iframe. The manifest.json file contains the basic information about the plugin. It defines the plugin's name, description, the main code file, and the permissions it requires.\n\nThe plugin.ts file is where you write code to interact with the Penpot API using TypeScript. This file is then compiled into plugin.js which is the final JavaScript code that runs the plugin. You don't write plugin.js directly; it's generated from the plugin.ts file. This is also the only file where you can use the Penpot object. Do not try to use the Penpot object in your plugin interface scripts. ... Penpot plugin samples. You may have noticed that we're using TypeScript in our plugin files, but what is it, and why? TypeScript is like JavaScript with extra rules. These rules help you catch mistakes early, before you run your code. It makes your code more reliable and easier to manage, especially in big projects. We're using TypeScript to make working with the Penpot API easier, as it provides autocompletion and instant access to documentation. However, even with TypeScript’s powerful features, you'll still need to include the @penpot/plugin-types npm package, which contains the typin\nExtend Penpot&#x27;s functionality with plugins! Install from PenpotHub or via URL. Learn to install, use, and create your own plugins.\nFind user guides, technical documentation, plugin info, FAQs, and contributing guidelines in Penpot&#x27;s help center. Join the open-source community!\n\nAll about Penpot plugins. Get quick answers to usual questions about \"why and how\" Penpot. Penpot is open source. Get involved on the community or contribute to the project. Need help? Talk to us or join our community.\nThe plugin styles library is not obligatory, although we recommend its use because it&#x27;ll help you with the dark and light theming and to maintain the Penpot look-and-feel. Absolutely! You can definitely create flows and interactions in the same elements as in the interface, like frames, shapes, and groups. Just check out the API documentation for the methods: createFlow, addInteraction, or removeInteraction. And if you need more help, you can always check out the PenpotFlow or PenpotInteraction interfaces. There are no set requirements. However, we can recommend the use of eslint or prettier, which is what we use. No, it’s completely optional, in fact, we have an example of a plugin without UI. Try the plugin using this url to install it: https://create-palette-penpot-plugin.pages.dev/assets/manifest.json or check the code here ... Take a look at the Penpot Library methods in the API documentation or this simple example.\n\nIt’s not obligatory but keep in mind that the containing modal will change colors automatically to match Penpot’s theme. Check this example on how to apply dark and light themes to your plugin. By the time being any and all plugins must be hosted independently and outside the Penpot environment. Check the documentation for a guide on how to deploy your plugin on some deployment services like Netlify or Cloudflare. No. The feature set of figma and penpot are not the same so it’s not compatible. You can make it any size since it will be automatically adjusted to 56x56 px in the plugin manager modal. Just make sure to keep it square size. The name of the plugin should be short and followed by the suffix ‘-plugins’, like ‘shape-remover-plugin’. Any framework you are familiar with would be a good choice. Our examples are in vue, angular and react.\n\nThe plugin styles library is not obligatory, although we recommend its use because it'll help you with the dark and light theming and to maintain the Penpot look-and-feel. Absolutely! You can definitely create flows and interactions in the same elements as in the interface, like frames, shapes, and groups. Just check out the API documentation for the methods: createFlow, addInteraction, or removeInteraction. And if you need more help, you can always check out the PenpotFlow or PenpotInteraction interfaces. There are no set requirements. However, we can recommend the use of eslint or prettier, which is what we use. No, it’s completely optional, in fact, we have an example of a plugin without UI. Try the plugin using this url to install it: https://create-palette-penpot-plugin.pages.dev/assets/manifest.json or check the code here ... Take a look at the Penpot Library methods in the API documentation or this simple example.\nYou can also integrate Design Tokens with other core Penpot features, such as components and grid &amp; flex layout, plus plugins will be able to access the tokens API (coming soon) making it even more powerful. Penpot Design Tokens adhere to the Design Tokens Format Module and its definitions, a draft by the W3C DTCG. Penpot ensures compatibility across various disciplines, tools, and technologies by following the most standardized approach available for design tokens. Tokens can be exported from Penpot or integrated into other tools directly, without conversion. Additionally, the knowledge gained from using Design Tokens in Penpot remains valuable, regardless of whether you continue using Penpot or a different tool or technology. You can create reusable and semantic tokens to be referenced in your designs at the Tokens panel. In this panel, you’ll find all the available types of ...\n\nYou can also integrate Design Tokens with other core Penpot features, such as components and grid & flex layout, plus plugins will be able to access the tokens API (coming soon) making it even more powerful. Penpot Design Tokens adhere to the Design Tokens Format Module and its definitions, a draft by the W3C DTCG. Penpot ensures compatibility across various disciplines, tools, and technologies by following the most standardized approach available for design tokens. Tokens can be exported from Penpot or integrated into other tools directly, without conversion. Additionally, the knowledge gained from using Design Tokens in Penpot remains valuable, regardless of whether you continue using Penpot or a different tool or technology. You can create reusable and semantic tokens to be referenced in your designs at the Tokens panel. In this panel, you’ll find all the available types of tokens in Penpot arranged alphabetically, with existing tokens being shown at the top of the list.\n\nRenaming tokens will break any references to their old names. If a token is already applied somewhere, you'll need to reapply it after renaming. This can lead to extra work, so rename with caution. We're actively working on a solution to handle this automatically, ensuring renamed tokens stay linked to their properties without additional effort. Tokens can be duplicated by right-clicking the token you wish to duplicate and selecting Duplicate token. This will create a copy of the selected token within the same set, with -copy added to its name. Tokens can be deleted by right-clicking the token you wish to delete and selecting Delete token. You can apply tokens to the properties of any object. There are two ways to apply tokens to a selection: Right-click on tokens to specify a particular property that you want to apply. Left-click on tokens to apply the assumtion.\n\nThe Number Token does not have a default property to apply to, so it can only be applied by right-clicking and selecting the specific property. Number token is especially useful as a reference in other tokens, for math equations (operands), to create scales, for example font-size scales, or grid scales. It can also be applied to Line Height –since this property works as a multiplier of the font size– or rotation property. Typography tokens can only be applied to a text layer, but not to individual elements inside a text layer. Applying a Typography Token will detach any Typography Style previously applied, and vice versa. As in other tokens, Font Family accepts references to other font family tokens. Additionally, you can specify a prioritized list of Font Family names or generic names separated by commas (,), as in CSS. Penpot will use only the first font in the list, but this helps define your font fallbacks so developers can implement them accordingly.\n\nIf the Font Family does not exist in Penpot, when you apply the token you will see a “Missing font” message in the design panel input: Font size tokens define the vertical size of glyphs/characters as an individual property. In typography, the letter spacing and line height properties are related to the font size. Font sizes are typically defined using a proportional scale. You can use math operations with references in order to create dynamic typography scales that follow a particular multiplier, like Golden Ratio. Tip: Use Number Tokens (unitless token) to create stunning typographic scales though design tokens: Font size is a dimension-type token and should be defined in px (unitless values are computed as px) for now. To follow the DTGC format, in upcoming releases, units will be mandatory and rem units will be allowed. You can use any dimension token as a reference in a font size token.\n<system>You only have 16 searches left this turn</system>"

