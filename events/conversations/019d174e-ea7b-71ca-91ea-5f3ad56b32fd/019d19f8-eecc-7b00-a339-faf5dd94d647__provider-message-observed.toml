text = "... A component’s variants are organized by properties and their values. Properties define the dimensions that distinguish your variants (for example: Color, Size, State). Values are the specific options within a property (for example: ...\n\nTip: The first options shown to swap a component are the ones at the same level inside the assets library, so group them properly. Variants allow you to group similar components, such as buttons, icons, or toggles, into a single, customizable component. Rather than navigating through separate components for every possible state, size, or style, you can manage them all from one unified component using clearly defined properties. Imagine a single button component that can switch between primary and secondary styles, active and disabled states, and small to large sizes. Useful, right? That’s the power of Variants. Cleaner libraries Keep related designs organized in the Design viewport, Layers panel, and swap menu. Variants streamline your components into tidy, manageable sets, allowing you to retain overrides when switching between them. Faster design workflows Make it easier to find and select the right version by quickly switching between states or styles using simple property controls.\n\nBetter team collaboration With variants, you can match the way states are handled in code, helping designers and developers stay in sync, fostering better collaboration between design and development teams. ... A component’s variants are organized by properties and their values. Properties define the dimensions that distinguish your variants (for example: Color, Size, State). Values are the specific options within a property (for example: Primary/Secondary, Small/Large, Default/Hover/Pressed) Each variant is simply one unique combination of values across all properties (for example, Color=Primary + Size=Small + State=Hover). Variants must have at least one property, and property values should be kept consistent to make switching predictable and to preserve overrides across connected layers. You can create variants from an existing component or from another variant: From a component: Press Ctrl + K or right-click and select the menu option Create variant.\n\nFrom a variant: Select the variant and press Ctrl + K or right-click and select the menu option Create variant. By dragging: Drag a main component into an existing component with variants to add it as a new variant. From the Design tab (right sidebar): Select a component or a variant, open the context menu next to the component name and select the menu option Create variant. ... It appears next to the original in a dedicated variant area (by default in horizontal flex layout). Shared layers between variants are automatically connected (connection conditions) so that overrides can be preserved. Variants are named using their property values (e.g., Primary / Hover). Properties are key to defining and differentiating your variants. They appear in the Design tab when a variant or component with variants is selected. From the Design tab: When the component or one of its variants is selected, you can add a new property via a menu.\n\nDragging a variant outside its component turns it into an independent component instead of deleting it. If you delete the last variant, the entire component is removed. If you have a copy of a variant whose original was deleted, you can restore it: Select the variant copy, press right-click, and select the menu option Restore variant (will show if the main component still exists). Once you have created your variants, you can place a copy of a component with variants into your design and then switch between its different versions. Drag and drop a component with variants from the Assets tab onto the design viewport, just like you would with any other component. Once placed, you can then use its properties in the Design tab to switch to the desired variant. ... You’ll see its properties and values. Change one or more property values to switch to another variant.\nIf a component has variants, we should show each one in its own story. Leverage setting base prop values in args and common rendering code in render to reuse those in the stories and avoid code duplication.\n\nComponent tokens, defined at component level as CSS custom properties. These are very useful when implementing variants. Examples include --button-bg-color or --toast-icon-color. These custom properties are constrained to the local scope of its component. We can leverage component tokens to easily implement variants as explained here. Please refer to the Storybook documentation for icons and other SVG assets (logos, illustrations, etc.). We use Storybook to implement and showcase the components of the Design System. The Storybook is available at the /storybook path in the URL for each environment. For instance, the one built out of our develop branch is available at hourly.penpot.dev/storybook. Use yarn watch:storybook to develop the Design System components with the help of Storybook. ⚠️ WARNING: Do stop any existing Shadow CLJS and asset compilation jobs (like the ones running at tabs 0 and 1 in the devenv tmux), because watch:storybook will spawn their own.\n\nLearn UI development with React & Rumext, design system implementation, and performance considerations. See Penpot's technical guide. Free to use!\n\nReduce the need for one-off SASS variables by leveraging CSS custom properties in your component styles. This keeps component theming flexible and composable. For instance, this is how we handle the styles of <Toast>, which have a different style depending on the level of the message (default, info, error, etc.) .toast { // common styles for all toasts // ... --toast-bg-color: var(--color-background-primary); --toast-icon-color: var(--color-foreground-secondary); // ... more variables here background-color: var(--toast-bg-color); } .toast-icon { color: var(--toast-bg-color); } .toast-info { --toast-bg-color: var(--color-background-info); --toast-icon-color: var(--color-accent-info); // ... override more variables here } .toast-error { --toast-bg-color: var(--color-background-error); --toast-icon-color: var(--color-accent-error); // ... override more variables here } // ... more variants here ·\n\nIf a component has variants, we should show each one in its own story. Leverage setting base prop values in args and common rendering code in render to reuse those in the stories and avoid code duplication. For instance, the stories file for the button* component looks like this: // ... export default { title: \"Buttons/Button\", component: Components.Button, // These are the props of the component, and we set here default values for // all stories. args: { children: \"Lorem ipsum\", disabled: false, variant: undefined, }, // ... render: ({ ...args }) => <Button {...args} />, }; export const Default = {}; // An important prop: `icon` export const WithIcon = { args: { icon: \"effects\", }, }; // A variant export const Primary = { args: { variant: \"primary\", }, }; // Another variant export const Secondary = { args: { variant: \"secondary\", }, }; // More variants here…\nAsset Libraries allow you to store elements and styles so that they can be easily reused. Libraries may include components, graphics, colors and typographies. Learn how to create and manage them to better organize the pieces of your designs and speed your workflow. ... Components: A component is an object or group of objects that can be reused multiple times across files (projects and teams in the future). Learn more at the components section. Colors: Create your color styles and use them on fills and strokes. Typographies: Penpot allows you to save typography styles with a set of reusable properties. You can always unlink a typography style maintaining the properties for the text layer. [Deprecated] Graphics: In Penpot versions older than 2.0, bitmap and vector images can be stored at the Graphics section. This type was deprecated in favor of components.\n\nThere are two ways to add components to an assets library: Main components are automatically stored in the local library at the moment of being created. Learn more about components at the components section. Clicking the “+” to launch import an image that will be added as a component. Click the “+” to launch the color picker and add a color to the library. Learn more about managing color · All typography styles created from the text properties (at the right sidebar) are automatically stored at the library. You can also click the “+” to create a new typography style from scratch. Tip: If you select a text layer with certain properties (font family, size, line height...) and click the \"+\" at the Typographies section at the assets library (left sidebar), the created typography style will include the properties of the text layer. Press left click over any asset of the library to show the options menu.\n\nComponents: Rename, duplicate, delete, group. Colors: Rename, edit, delete. Typographies: Rename, edit, delete. Components: Drag the component directly from the library to the viewport. Colors: With a shape or a text selected click a color from the library to apply it as a fill. If you press Alt (or ⌥ in macOS) while clicking, the color will be applied to the stroke. Typographies: With a text layer selected click a typography style from the library to apply it. Learn how to better view and organize your assets: You can switch between list and grid views. Grid view: With the thumbnails displayed is easier to visually identify the content of specific assets, specially components. List view: Optimized to identify the assets by their names and view more assets at the same time. Click the sort button to change the alphabetical order. Use the Search assets box to filter the assets with names that match what you write.\n\nYou can decide whether to show all asset types or only one of your choice (components, colors or typographies).