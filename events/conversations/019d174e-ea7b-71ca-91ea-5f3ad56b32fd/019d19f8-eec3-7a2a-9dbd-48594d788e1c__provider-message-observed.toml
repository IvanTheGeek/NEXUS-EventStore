[[body.segments]]
kind = "plain_text"
text = "Good. So the UI is truly event-sourced, not just \"event-inspired.\"\n\n**UI Machine architecture:**\n\n```fsharp\ntype UIState = {\n    EventLog: UIEvent list        // Source of truth\n    CurrentView: ViewModel        // Derived/cached projection\n}\n\nlet applyEvent (view: ViewModel) (event: UIEvent) : ViewModel =\n    match event with\n    | NameTyped (value, _) -> { view with Name = value }\n    | ScreenChanged (_, target, _) -> { view with Screen = target }\n    | DomainResponseReceived (Ok greeting, _) -> { view with Greeting = Some greeting }\n    | _ -> view\n\nlet rebuildView (events: UIEvent list) : ViewModel =\n    events |> List.fold applyEvent ViewModel.Empty\n\nlet update (event: UIEvent) (state: UIState) : UIState * Cmd<UIEvent> =\n    let newLog = state.EventLog @ [event]\n    let newView = applyEvent state.CurrentView event  // Incremental\n    // Or: rebuildView newLog  // Full rebuild\n    \n    let cmd = \n        match event with\n        | SubmissionRequested (name, _) -> \n            Cmd.ofAsync submitName name (fun r -> DomainResponseReceived (r, DateTimeOffset.Now))\n        | _ -> Cmd.none\n    \n    { EventLog = newLog; CurrentView = newView }, cmd\n```\n\n---\n\n**Event Model visualization - two fidelity options:**\n\nLet me render both:"

