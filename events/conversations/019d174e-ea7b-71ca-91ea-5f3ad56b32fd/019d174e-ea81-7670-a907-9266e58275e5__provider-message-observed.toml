C/head\\u003E\\\\n\\u003Cbody\\u003E\\\\n    \\u003Cdiv class=\\\\\\u0022header\\\\\\u0022\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022header-text\\\\\\u0022\\u003E\\\\n            \\u003Ch1\\u003E\\\\ud83e\\\\uddfa LaundryLog\\u003C/h1\\u003E\\\\n            \\u003Cp\\u003Eby CheddarBooks\\u003C/p\\u003E\\\\n        \\u003C/div\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022header-badge\\\\\\u0022\\u003E\\\\ud83e\\\\uddc0\\u003C/div\\u003E\\\\n    \\u003C/div\\u003E\\\\n\\\\n    \\u003Cdiv class=\\\\\\u0022container\\\\\\u0022\\u003E\\\\n        \\u003C!-- Location Section --\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022form-section\\\\\\u0022\\u003E\\\\n            \\u003Cdiv class=\\\\\\u0022section-title\\\\\\u0022\\u003E\\\\ud83d\\\\udccd Location\\u003C/div\\u003E\\\\n            \\u003Cdiv class=\\\\\\u0022location-section\\\\\\u0022\\u003E\\\\n                \\u003Cdiv class=\\\\\\u0022location-input\\\\\\u0022\\u003E\\\\n                    \\u003Cinput type=\\\\\\u0022text\\\\\\u0022 class=\\\\\\u0022input-field\\\\\\u0022 id=\\\\\\u0022locationField\\\\\\u0022 placeholder=\\\\\\u0022Tap \\\\ud83d\\\\udccd or enter location\\\\\\u0022 oninput=\\\\\\u0022validateForm()\\\\\\u0022\\u003E\\\\n                    \\u003Cdiv class=\\\\\\u0022location-info\\\\\\u0022\\u003EGPS will check personal \\u0026 community data\\u003C/div\\u003E\\\\n                \\u003C/div\\u003E\\\\n                \\u003Cbutton class=\\\\\\u0022btn-gps\\\\\\u0022 onclick=\\\\\\u0022getLocation()\\\\\\u0022\\u003E\\\\ud83d\\\\udccd\\u003C/button\\u003E\\\\n            \\u003C/div\\u003E\\\\n        \\u003C/div\\u003E\\\\n\\\\n        \\u003C!-- Machine Type Section (no heading) --\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022form-section\\\\\\u0022\\u003E\\\\n            \\u003Cdiv class=\\\\\\u0022button-group button-group-3\\\\\\u0022\\u003E\\\\n                \\u003Cbutton class=\\\\\\u0022btn-option\\\\\\u0022 onclick=\\\\\\u0022selectMachine(\\u0027washer\\u0027)\\\\\\u0022\\u003E\\\\ud83c\\\\udf0a\\u003Cbr\\u003EWasher\\u003C/button\\u003E\\\\n                \\u003Cbutton class=\\\\\\u0022btn-option\\\\\\u0022 onclick=\\\\\\u0022selectMachine(\\u0027dryer\\u0027)\\\\\\u0022\\u003E\\\\ud83d\\\\udd25\\u003Cbr\\u003EDryer\\u003C/button\\u003E\\\\n                \\u003Cbutton class=\\\\\\u0022btn-option\\\\\\u0022 onclick=\\\\\\u0022selectMachine(\\u0027supplies\\u0027)\\\\\\u0022\\u003E\\\\ud83e\\\\uddf4\\u003Cbr\\u003ESupplies\\u003C/button\\u003E\\\\n            \\u003C/div\\u003E\\\\n        \\u003C/div\\u003E\\\\n\\\\n        \\u003C!-- Quantity Section --\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022form-section\\\\\\u0022 id=\\\\\\u0022quantitySection\\\\\\u0022\\u003E\\\\n            \\u003Cdiv class=\\\\\\u0022quantity-section\\\\\\u0022\\u003E\\\\n                \\u003Cdiv class=\\\\\\u0022field-label\\\\\\u0022\\u003EQuantity\\u003C/div\\u003E\\\\n                \\u003Cdiv class=\\\\\\u0022quantity-controls\\\\\\u0022\\u003E\\\\n                    \\u003Cbutton class=\\\\\\u0022counter-btn\\\\\\u0022 onclick=\\\\\\u0022updateCounter(-1)\\\\\\u0022\\u003E\\\\u2212\\u003C/button\\u003E\\\\n                    \\u003Cinput type=\\\\\\u0022number\\\\\\u0022 \\\\n                           class=\\\\\\u0022counter-input\\\\\\u0022 \\\\n                           id=\\\\\\u0022quantityField\\\\\\u0022\\\\n                           value=\\\\\\u00221\\\\\\u0022 \\\\n                           min=\\\\\\u00221\\\\\\u0022\\\\n                           inputmode=\\\\\\u0022numeric\\\\\\u0022\\\\n                           onfocus=\\\\\\u0022scrollQuantityIntoView()\\\\\\u0022\\\\n                           onchange=\\\\\\u0022updateCounterFromInput()\\\\\\u0022\\u003E\\\\n                    \\u003Cbutton class=\\\\\\u0022counter-btn\\\\\\u0022 onclick=\\\\\\u0022updateCounter(1)\\\\\\u0022\\u003E\\u002B\\u003C/button\\u003E\\\\n                \\u003C/div\\u003E\\\\n            \\u003C/div\\u003E\\\\n        \\u003C/div\\