text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"penpot:penpot_api_info\",\"content\":[{\"type\":\"text\",\"text\":\"Interface Board\\n===============\\n\\nRepresents a board in Penpot.\\nThis interface extends \\u0060ShapeBase\\u0060 and includes properties and methods specific to board.\\n\\n\\u0060\\u0060\\u0060\\ninterface Board { \\n    type: \\u0022board\\u0022; \\n    clipContent: boolean; \\n    showInViewMode: boolean; \\n    grid?: GridLayout; \\n    flex?: FlexLayout; \\n    guides: Guide[]; \\n    rulerGuides: RulerGuide[]; \\n    horizontalSizing?: \\u0022auto\\u0022 | \\u0022fix\\u0022; \\n    verticalSizing?: \\u0022auto\\u0022 | \\u0022fix\\u0022; \\n    fills: Fill[]; \\n    children: Shape[]; \\n    appendChild(child: Shape): void; \\n    insertChild(index: number, child: Shape): void; \\n    addFlexLayout(): FlexLayout; \\n    addGridLayout(): GridLayout; \\n    addRulerGuide(orientation: RulerGuideOrientation, value: number): RulerGuide; \\n    removeRulerGuide(guide: RulerGuide): void; \\n    getPluginData(key: string): string; \\n    setPluginData(key: string, value: string): void; \\n    getPluginDataKeys(): string[]; \\n    getSharedPluginData(namespace: string, key: string): string; \\n    setSharedPluginData(namespace: string, key: string, value: string): void; \\n    getSharedPluginDataKeys(namespace: string): string[]; \\n    id: string; \\n    name: string; \\n    parent: null | Shape; \\n    x: number; \\n    y: number; \\n    width: number; \\n    height: number; \\n    bounds: Bounds; \\n    center: Point; \\n    blocked: boolean; \\n    hidden: boolean; \\n    visible: boolean; \\n    proportionLock: boolean; \\n    constraintsHorizontal: \\n        | \\u0022center\\u0022\\n        | \\u0022left\\u0022\\n        | \\u0022right\\u0022\\n        | \\u0022leftright\\u0022\\n        | \\u0022scale\\u0022; \\n    constraintsVertical: \\n        | \\u0022center\\u0022\\n        | \\u0022top\\u0022\\n        | \\u0022bottom\\u0022\\n        | \\u0022scale\\u0022\\n        | \\u0022topbottom\\u0022; \\n    borderRadius: number; \\n    borderRadiusTopLeft: number; \\n    borderRadiusTopRight: number; \\n    borderRadiusBottomRight: number; \\n    borderRadiusBottomLeft: number; \\n    opacity: number; \\n    blendMode: \\n        | \\u0022difference\\u0022\\n        | \\u0022normal\\u0022\\n        | \\u0022darken\\u0022\\n        | \\u0022multiply\\u0022\\n        | \\u0022color-burn\\u0022\\n        | \\u0022lighten\\u0022\\n        | \\u0022screen\\u0022\\n        | \\u0022color-dodge\\u0022\\n        | \\u0022overlay\\u0022\\n        | \\u0022soft-light\\u0022\\n        | \\u0022hard-light\\u0022\\n        | \\u0022exclusion\\u0022\\n        | \\u0022hue\\u0022\\n        | \\u0022saturation\\u0022\\n        | \\u0022color\\u0022\\n        | \\u0022luminosity\\u0022; \\n    shadows: Shadow[]; \\n    blur?: Blur; \\n    exports: Export[]; \\n    boardX: number; \\n    boardY: number; \\n    parentX: number; \\n    parentY: number; \\n    flipX: boolean; \\n    flipY: boolean; \\n    rotation: number; \\n    strokes: Stroke[]; \\n    layoutChild?: LayoutChildProperties; \\n    layoutCell?: LayoutChildProperties; \\n    isComponentInstance(): boolean; \\n    isComponentMainInstance(): boolean; \\n    isComponentCopyInstance(): boolean; \\n    isComponentRoot(): boolean; \\n    isComponentHead(): boolean; \\n    componentRefShape(): null | Shape; \\n    componentRoot(): null | Shape; \\n    componentHead(): null | Shape; \\n    component(): null | LibraryComponent; \\n    detach(): void; \\n    resize(width: number, height: number): void; \\n    rotate(angle: number, center?: null | { \\n        x: number; \\n        y: number; \\n    }): void; \\n    export(config: Export): Promise\\u003CUint8Array\\u003E; \\n    interactions: Interaction[]; \\n    addInteraction(trigger: Trigger, action: Action, delay?: number): Interaction; \\n    removeInteraction(interaction: Interaction): void; \\n    clone(): Shape; \\n    remove(): void; \\n}\\n\\u0060\\u0060\\u0060\\n\\nHierarchy (view full)\\n\\n* ShapeBase\\n  \\u002B Board\\n\\nReferenced by: CloseOverlay, CommentThread, Context, ContextTypesUtils, Flow, NavigateTo, OpenOverlay, OverlayAction, Page, Penpot, RulerGuide, Shape, ToggleOverlay\\n\\nMember details not provided (too long). Call this tool with a member name for more information.\",\"uuid\":\"433a458b-c578-4311-a333-8887849683ec\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":\"penpot\",\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

