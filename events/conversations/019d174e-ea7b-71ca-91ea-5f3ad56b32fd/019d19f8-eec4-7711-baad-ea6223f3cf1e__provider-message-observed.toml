text = "I think it will be beneficial for you to update/create reference material for you to use for 1) what we are trying to do with with LaundryLog app both specific to this app and the broader ecosystem we are trying to establish on my Event Modeling ideas, Penpot integration, PATHS, screen creation, and the other specificities of what I am trying to establish here. You doing a deep dive into Penpot on how it works, the design concepts and mentalities, and how to accomplish the goals would be fruitful. The following sites will be of particular interest, mainly related to the latest release of penpot:\nall links at https://help.penpot.app and where they go. \nall links at https://community.penpot.app/\neverything under https://penpot.app/learning-center\neverything under https://penpot.app/blog/\nany youtube or peertube videos relating to penpot\nso basically, anything that can provide help and guidance under a penpot.app domain."

