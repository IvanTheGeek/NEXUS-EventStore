text = "probably a combination of all three. I am visual, so I will probably rely heavily on the penpot version. Do ask questions at any point to help me clarify. \nSo I am thinking for the LaundryLog app, when I start a session, the location is going to be important. each of the entries, will be tied to that session and that location. I think after the location is set, that section in the UI can actually drop to the end, or near the end, of the screen, which will keep the usage sections more in view on my phone. So I am thinking that maybe when opening the app for a new session, maybe the location is the only thing to see until it is set. Thoughts?"

