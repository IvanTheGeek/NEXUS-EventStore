or: pointer;\\n            transition: all 0.2s;\\n        }\\n\\n        .mode-btn.active {\\n            background: #667eea;\\n            border-color: #667eea;\\n            color: white;\\n        }\\n\\n        .container {\\n            padding: 1rem;\\n            max-width: 600px;\\n            margin: 0 auto;\\n        }\\n\\n        \\u003C/chat\\u003E\",\"uuid\":\"d7e5e21c-bcca-4e0f-aca6-53240e802839\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":\"Relevant chats\",\"integration_name\":\"Search Past Conversations\",\"integration_icon_url\":\"https://claude.ai/images/icons/conversation_search.png\",\"icon_name\":null,\"display_content\":{\"type\":\"rich_content\",\"content\":[{\"title\":\"Bookmark manager card tag layout\",\"subtitles\":null,\"url\":\"https://claude.ai/chat/bcb019d0-542a-4bd9-951b-af6ecd8adc2f\",\"resource_type\":null,\"icon_url\":null,\"source\":null},{\"title\":\"Remix of laundry-tracker.html\",\"subtitles\":null,\"url\":\"https://claude.ai/chat/267df0f9-d5ac-4e3d-8369-376cc4f65480\",\"resource_type\":null,\"icon_url\":null,\"source\":null}]}}"

