text = "component instances have certain properties that can be changed and still be connected. I have done some cleanup and made the changes. spacing was an issue as well.  \nThis is a base from which to work. I need to create the EventModel for the app. This is where my ideas for PATHS comes in. A path will be a specific route through the app or a workflow, etc. So there will be a screen for each state the app can go through. \nIn addition, I am thinking that Nexus needs to be redesigned, using event modeling of course, but in working through the LaundryLog app, we want to learn what is needed to work on it and the EventModel with Penpot and everything else. The goal is to have easy reproducible ways to do these tasks meaning that the functionality is coded in F#. The code will be what really does the changes, and you will simply have tools and reference/lookup docs to guide you and tell you which tool to invoke with what data and then we get consistent penpot and app code processes and results. The new MCP will be based on https://github.com/modelcontextprotocol/csharp-sdk. Does all this make sense?"

