text = "Automatic Compaction: Claude Code has an auto-compact feature that triggers when the context window reaches approximately 95% capacity (or 25% remaining). This is a built-in mechanism to prevent hitting the context limit and causing the system ...\n\nCompacting is distinct from the /clear command. While /clear completely wipes out the chat history and starts a brand new conversation from scratch, /compact summarizes the conversation and preloads that summary as the new context. Use /clear when you want a completely fresh start, and /compact when you need to retain key information from a previous discussion. Auto-compacting can sometimes take a while, so manual compacting when you have time is suggested. Last modified on July 29, 2025.\n\nCompacting in Claude Code is a feature designed to manage the conversation’s context window, which is the amount of information the AI agent can process at one time. As your conversation with Claude Code grows longer and longer, more data accumulates in the context window. Since every subsequent message you send includes the entire previous context, this can lead to increasing token costs and potential degradation of response quality as the model tries to keep track of a vast amount of information. The primary purpose of compacting is to reduce token usage and prevent the context window from becoming overwhelmed. It helps maintain focus and ensures that the agent doesn’t “forget” initial instructions or deviate from the plan during long or complex tasks. When you use the /compact command, Claude Code takes your entire current conversation history and creates a summary of it.\n\nIt then starts a new chat session with this summary preloaded as the new context. This allows the agent to retain important information and key decisions from the previous conversation without having to carry forward every single message. Manual Trigger: You can manually run /compact at any time, especially when you are continually working through a problem and want a smaller, more focused context for the model. It’s recommended to do this when you finish a task to avoid unrelated tasks piling up in the same chat. Automatic Compaction: Claude Code has an auto-compact feature that triggers when the context window reaches approximately 95% capacity (or 25% remaining). This is a built-in mechanism to prevent hitting the context limit and causing the system to “break” or “go off the rails”. However, users often advise against waiting for auto-compact, as it can sometimes lead to the agent losing important context and spiraling out of control.\nFor users on paid plans with code execution enabled, Claude now automatically manages long conversations. When your conversation approaches the context window limit, Claude summarizes earlier messages to continue the conversation seamlessly.\n\nUsage limits control how much you can interact with Claude over a specific time period. Think of this as your \"conversation budget\" that determines how many messages you can send to Claude, or how long you can work with Claude Code, before needing to wait for your limit to reset. Your usage is affected by several factors, including the length and complexity of your conversations, the features you use, and which Claude model you're chatting with. Different subscription plans (Pro, Max, Team, etc.) have different usage allowances, with paid plans offering higher limits. Note that your usage of all different Claude product surfaces (claude.ai, Claude Code, Claude Desktop) counts towards the same usage limit. There isn't a way to purchase a specific plan offering unlimited usage at this time. However, there are a couple of different ways to increase your usage depending on your plan: If you’re using Claude Code with a Pro or Max plan, you can switch to pay-as-you-go usage with a separate C\n\nFor users on paid plans with code execution enabled, Claude now automatically manages long conversations. When your conversation approaches the context window limit, Claude summarizes earlier messages to continue the conversation seamlessly. This means you can have longer, more natural conversations with fewer interruptions. Your full chat history is preserved so Claude can reference it even after summarization. You may occasionally see that Claude is \"organizing its thoughts\" during long conversations—this indicates automatic context management is working. Note: Code execution must be enabled for automatic context management. Rare edge cases (such as very large first messages) may still encounter context limits. Note: Claude’s context window size is 200K tokens across all models and paid plans with one exception: Claude Sonnet 4 has a 500K context window for users on Enterprise plans.\n\nTemporarily disable non-critical tools and connectors: Disable web search, Research, and MCP connectors from your \"Search and tools\" settings when they're not needed for specific conversations. Note: Tools and connectors are token-intensive, so managing them helps both maximize your available context window and optimize your usage limits. The main distinction is that usage limits control how much you can use Claude across all your conversations, while length limits control how long any single conversation can become. Usage limits are about quantity over time, while length limits are about the depth and complexity of individual conversations. If you hit your usage limit, you'll need to wait for it to reset, upgrade your plan, or purchase extra usage (Team and Enterprise plans only).\n\nIf you hit a length limit, you can start a new conversation or use features like projects to work with larger amounts of information more efficiently.\nRelevant context Claude will need to continue effectively · After major breakthroughs or key decisions in your conversation · Before complex multi-part analysis that might push you over limits ... Start your next Claude conversation by pasting this memory log and saying: “This is our previous work on [project]. Let’s continue from where we left off.” For complex projects spanning multiple days, consider storing these memory logs in external systems like Notion, Obsidian, or Airtable for better organization and searchability. Here’s the memory log I created after that Zoho One research session: Original Problem: Evaluating alternatives to QuickBooks, Dubsado, and Mailerlite for cost savings and integration efficiency. Key Discovery: Zoho One ($45/month) can replace all three tools ($180/month combined), providing 75% cost savings while improving workflow integration.\n\nThe difference: One approach leaves you constantly rebuilding context. The other creates a sustainable system that gets smarter over time. Let me be specific about where the wheels fall off with standard Claude usage: The Expansion Problem: Good research uncovers new opportunities. When I started evaluating alternatives to QuickBooks, Dubsado, and Mailerlite, the conversation naturally expanded as we discovered Zoho One might be able to replace all three at 75% cost savings. That expansion hit message limits before we could finish the analysis. The Restart Problem: Every new Claude conversation starts at zero, forcing you to rebuild your Claude conversation memory from scratch. No memory of what you’ve already covered, what worked, what didn’t, or where you were heading next. You end up spending half your time rebuilding context instead of moving forward.\n\nThis constant context rebuilding creates what researchers call ‘extraneous cognitive load.’ It’s the mental effort spent on non-productive tasks rather than actual problem-solving. Research published in Current Directions in Psychological Science shows that reducing this cognitive burden significantly improves task performance and learning outcomes. The Complexity Problem: Complex projects require multiple Claude interactions over days or weeks. Without continuity, each session feels like starting over with a research assistant who knows nothing about your work. The Cognitive Cost of Context Switching: Every time you restart a Claude conversation, you’re not just losing information – you’re forcing your brain to reconstruct complex mental models from scratch. Cognitive load theory research demonstrates that working memory has limited capacity, and rebuilding context consumes valuable mental resources that could be used for actual analysis and decision-making.\n\nRelevant context Claude will need to continue effectively · After major breakthroughs or key decisions in your conversation · Before complex multi-part analysis that might push you over limits ... Start your next Claude conversation by pasting this memory log and saying: “This is our previous work on [project]. Let’s continue from where we left off.” For complex projects spanning multiple days, consider storing these memory logs in external systems like Notion, Obsidian, or Airtable for better organization and searchability. Here’s the memory log I created after that Zoho One research session: Original Problem: Evaluating alternatives to QuickBooks, Dubsado, and Mailerlite for cost savings and integration efficiency. Key Discovery: Zoho One ($45/month) can replace all three tools ($180/month combined), providing 75% cost savings while improving workflow integration.\n\nInclude:** - **The original problem/question and how it evolved.** - **Key insights, recommendations, and solutions we developed.** - **My working style, preferences, and communication patterns you observed.** - **Effective collaboration approaches we identified.** - **Any clarifications or corrections that changed the direction.** - **Specific project context or examples we discussed.** - **Templates, frameworks, or processes we established.** - **Next steps or follow-up areas identified.** **Structure this as a reference document that I could share with you in a future conversation to quickly re-establish our working relationship and context. Focus on practical patterns and preferences that would help future interactions be more efficient.** This prompt consistently generates logs that capture not just what we discussed, but how we worked together—which makes handoffs to new Claude conversations much smoother.\nI observe that auto-compact is Claude Code&#x27;s intelligent context window management system that automatically summarizes conversations when approaching memory limits, allowing you to continue working without interruption. When your conversation approaches the context window limit, Claude Code automatically: 1. Analyzes the conversation to identify key information worth preserving 2. Creates a concise summary of previous interactions, decisions, and code changes 3. Compacts the conversation by replacing old messages with the summary 4. Continues seamlessly with the preserved context ... Run multiple autonomous coding agents simultaneously with Verdent&#x27;s isolated Git worktrees. Each agent tackles different components while maintaining full context awareness, eliminating manual debugging bottlenecks and accelerating feature delivery. Discover Verdent AI (Free Trial) Auto-Compact (Default): Automatic summarization when approaching limits.\n\nI observe that auto-compact is Claude Code's intelligent context window management system that automatically summarizes conversations when approaching memory limits, allowing you to continue working without interruption. When your conversation approaches the context window limit, Claude Code automatically: 1. Analyzes the conversation to identify key information worth preserving 2. Creates a concise summary of previous interactions, decisions, and code changes 3. Compacts the conversation by replacing old messages with the summary 4. Continues seamlessly with the preserved context ... Run multiple autonomous coding agents simultaneously with Verdent's isolated Git worktrees. Each agent tackles different components while maintaining full context awareness, eliminating manual debugging bottlenecks and accelerating feature delivery. Discover Verdent AI (Free Trial) Auto-Compact (Default): Automatic summarization when approaching limits.\n\nManual Compact (/compact): You control when and how to summarize with specific preservation instructions · Clear (/clear): Starts a completely fresh conversation with no context preservation · MCP Server Optimization: Disable unused MCP servers to free context tokens before needing to compact (v2.0.10+) ... # Basic compact /compact # Compact with specific preservation instructions /compact only keep the names of the websites we reviewed # Compact preserving code patterns /compact preserve the coding patterns we established · You can check or change auto-compact settings in your session: ... This shows whether auto-compact is enabled and your current context usage. ... Proactive context management: Disable unused MCP servers with /mcp or @server-name disable before compacting to maximize available context · The real strategy is to manually compact at strategic times rather than letting auto-compact happen randomly.\n\nWhen auto-compact triggers automatically, it can disrupt your workflow and mess up your current setup. I use /compact at natural breakpoints when I control what gets preserved. Preventing Compaction: Before resorting to compaction, use /context to identify MCP servers consuming context space but not actively needed. Disabling unused MCP servers can free up significant context space, potentially avoiding the need to compact altogether. ... Manual compacting at strategic breakpoints prevents workflow disruption from automatic triggering. Claude's performance degrades when working memory becomes constrained during active development. ... I find it's better to manually compact at logical breakpoints rather than hitting context limits mid-task. Claude's performance degrades significantly when working memory is constrained. See Context Window Depletion for detailed strategies.\nAnthropic’s docs and announcements around long context and Sonnet 4.5 emphasize these capabilities and constraints (Context windows – Claude Docs, 2025; Claude Sonnet 4 now supports 1M tokens of context, 2025).\n\nPersistent notes or files: Agents maintain concise project briefs (e.g., NOTES.md) and re‑insert the essentials when needed. Anthropic’s engineering guidance describes compaction and note‑keeping to preserve state across sessions (Effective context engineering for AI agents, 2025). Retrieval‑augmented generation (RAG): Index your sources and pull only the most relevant chunks with dense context around each snippet; Anthropic outlines “Contextual Retrieval” to improve relevance density (Contextual Retrieval in AI Systems, 2024). Prompt caching: Cache stable background context to cut cost/latency and maintain continuity across calls (Prompt caching with Claude, 2024). Tool connectors and the Model Context Protocol (MCP): Establish secure, permissioned connections to external memory stores so agents can read/write state responsibly (Introducing the Model Context Protocol, 2024).\n\nPersistent memory is powerful, but treat it as an organizational capability with explicit consent and controls. Anthropic’s principles for safe, trustworthy agents emphasize permissioning, isolation, and auditability, which are relevant when agents retain information across tasks (Our framework for developing safe and trustworthy agents, 2025). MCP supports granular permissions for connectors, helping teams meet privacy requirements while enabling external memory (Introducing the Model Context Protocol, 2024). On provider platforms like AWS Bedrock, plan for platform behaviors such as smart context management and confirm token limits per account and region (Introducing Claude Sonnet 4.5 in Amazon Bedrock, 2025). Bigger window ≠ perfect recall: Even inside large windows, attention can wane; summarization and pinning still matter. Extended memory ≠ training: Persisted notes and retrieval support continuity, but they don’t permanently change model parameters.\n\nAnthropic’s docs and announcements around long context and Sonnet 4.5 emphasize these capabilities and constraints (Context windows – Claude Docs, 2025; Claude Sonnet 4 now supports 1M tokens of context, 2025). ... Lead with a short task brief and numbered objectives. Use headings and signposts; ask the model to quote sources or passages before analyzing. ... Break large files into logical sections; avoid dumping entire documents. Periodically summarize the conversation into a compact, actionable brief and pin key facts. ... Use RAG and contextual retrieval to insert only the most relevant snippets. ... Prune noisy history; re‑insert summaries instead of raw logs. ... Apply prompt caching for recurring context and templates. ... Confirm your plan’s token caps (200K in many paid app contexts vs. 1M with the API and beta header), rate limits, and provider behaviors.\n\nAs of 2025‑09‑30, Anthropic states that Claude Sonnet 4 and 4.5 can support very large windows in developer environments. Specifically: In app and standard paid plans, many users will see a 200K‑token context window; Anthropic’s support guidance highlights these defaults and plan‑level variations according to the 2025 Help Center article on paid plan limits (How large is the context window on paid Claude plans?). For builders using the Anthropic API, Anthropic announced 1‑million token context for Sonnet 4, with enablement details and guardrails in 2025. The announcement describes use cases like processing entire codebases and long research pipelines (Claude Sonnet 4 now supports 1M tokens of context, 2025). Claude’s docs note that Sonnet 4 and 4.5 support a 1M context window with the appropriate beta header and eligibility (Context windows – Claude Docs, 2025).\nRelevant context Claude will need to continue effectively · After major breakthroughs or key decisions in your conversation · Before complex multi-part analysis that might push you over limit