text = "The user wants to understand the actual mechanism for using SVG in Bolero before deciding on the naming/ID approach. Let me explain the options for rendering SVG in a Bolero WebAssembly app."

[[body.segments]]
kind = "plain_text"
text = "Good question - let's clarify the rendering approach first.\n\n**Two main options:**\n\n**Option 1: SVG as raw HTML**\n```fsharp\n// Load SVG string, inject into Bolero view\nlet view model dispatch =\n    div [] [\n        RawHtml svgContent  // SVG renders as-is\n    ]\n```\n- SVG becomes part of DOM\n- Can query/manipulate with JS interop\n- Need element IDs or other selectors to attach events\n\n**Option 2: SVG as image source**\n```fsharp\nimg [ attr.src \"screen.svg\" ]\n```\n- No DOM access to SVG internals\n- Can't attach events to elements inside\n- Only useful for static display\n\n---\n\nFor interactive UI, **Option 1** is required. The question then becomes: how does Bolero know where to attach event handlers?\n\n**Sub-approaches for Option 1:**\n\n| Approach | How it works |\n|----------|--------------|\n| **A. ID-based binding** | Find element by ID, attach handler via JS interop |\n| **B. Overlay HTML** | Position invisible HTML inputs/buttons over SVG using coordinates |\n| **C. Elmish component wrapping** | SVG is visual only, Bolero components handle all interaction logic |\n\n---\n\n**Question**: Are you envisioning the SVG as:\n\n1. **The actual interactive element** (click the SVG button shape) \n2. **Visual skin only** (invisible HTML elements do the real work, SVG just looks pretty)\n\nThis determines how much we need to solve the ID problem."

