text = "instead of [Start Session], use [Set Location]. It will be assumed to start a session when the app is opened and a location is set. Later, we should create a db of locations. For now, free form will be OK. We should also have a list of credit cards private to the user/users defined (like myself and my wife). We do not need to know the account numbers. We will need just an account nickname like \"Spark Business Card\". Later we will want a linking data field so when the data is exported to the yet created CheddarBooks, it will link the transactions to an account in CheddarBooks."

