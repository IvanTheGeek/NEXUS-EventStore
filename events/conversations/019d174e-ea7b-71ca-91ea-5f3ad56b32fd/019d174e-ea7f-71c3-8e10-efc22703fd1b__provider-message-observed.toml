kind = "plain_text"
text = "Good call. Let's validate end-to-end manually first.\n\n**Steps to prove the concept:**\n\n1. **Design** - Create Name Entry Screen in Penpot (board with label, text input, button)\n2. **Export** - Use Inspect tab → Export All Code (HTML)\n3. **Bolero** - Create WebAssembly client project\n4. **Load** - Inject exported HTML into Bolero view\n5. **Bind** - Attach event handlers to interactive elements\n6. **Test** - Enter name, click button, see greeting\n\n---\n\n**First: Do you already have the Name Entry Screen designed in Penpot, or do we need to design it?**\n\nIf not yet designed, the elements needed:\n\n| Element | Layer Name | Type |\n|---------|------------|------|\n| Label | `Label.Question` | Text: \"What is your name?\" |\n| Input | `Input.UserName` | Rectangle styled as input |\n| Button | `Button.Continue` | Rectangle + Text: \"Continue\" |\n\nThe naming convention question from earlier - for now, just use descriptive names like above. We'll see what survives in the HTML export and decide convention from there."

