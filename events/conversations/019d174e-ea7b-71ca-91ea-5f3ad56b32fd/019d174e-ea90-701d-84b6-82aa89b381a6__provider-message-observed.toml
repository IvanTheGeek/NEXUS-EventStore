text = "Done. **[View updated penpot-conventions.md](computer:///mnt/user-data/outputs/penpot-conventions.md)** (v7)\n\n---\n\n## Updates Made\n\n### 1. New API Gotcha: appendChild to Nested Frames\n- Documented that `appendChild()` to nested frames inside components causes `frame-id: nil` error\n- Server rejects the change and crashes WebSocket connection\n- Listed safe vs unsafe appendChild targets\n\n### 2. API vs Manual Workflow Section\nAdded clear guidance on what can be done via API vs what must be done manually:\n\n**API-safe:**\n- Create library colors/tokens\n- Convert boards to components\n- Rename components\n- Create/position instances on page root\n- Add text labels\n\n**Manual only:**\n- Design component internals\n- Add children to nested frames\n- Create variants\n- Modify component structure after creation\n\n### 3. Assets Colors vs Tokens Clarification\n- Noted that our \"tokens\" are grouped colors in Assets panel\n- Penpot has a separate Tokens feature (themes, sets) we haven't explored\n\n### 4. Updated TODO\n- Split into \"Manual in Penpot UI\" vs \"API or Either\" sections\n- Marked API gotchas documentation as complete\n\n---\n\n## Next Steps (Manual)\n\n1. **Add Disabled variant to Button.Option** (Components page)\n2. **Add Button.SetLocation to Screen.NewSession** (inside LocationPrompt, below Input.Location)\n\nOnce those are done, let me know and I can create Path1.2-LocationEntered instance via API."

