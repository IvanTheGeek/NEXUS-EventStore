text = "This is a well-designed mobile-first UI. Here's a breakdown for Penpot recreation:\n\n**Component Structure for Penpot:**\n\n```\nLaundryLog Main Screen (Board)\n├── Header\n│   ├── Header Text (title + subtitle)\n│   └── Header Badge (🧺 emoji)\n│\n├── Location Section (frame)\n│   ├── Section Title\n│   ├── Location Input (text field)\n│   └── GPS Button (📍)\n│\n├── Machine Type Section (frame)\n│   ├── Section Title\n│   └── Button Group (3-col grid)\n│       ├── Washer Button (🌊)\n│       ├── Dryer Button (🔥)\n│       └── Supplies Button (🧴)\n│\n├── Payment Section (frame)\n│   ├── Section Title\n│   └── Button Group (2x2 grid)\n│       ├── Cash (💵)\n│       ├── Points (⭐)\n│       ├── Card (💳)\n│       └── App (📱)\n│\n├── Quantity Section (frame)\n│   ├── Field Label\n│   └── Counter Controls\n│       ├── Minus Button (-)\n│       ├── Counter Input\n│       └── Plus Button (+)\n│\n├── Price Section (frame)\n│   ├── Field Label\n│   ├── Price Input Row (with +/- buttons)\n│   ├── Quick Fill Buttons ($1.50, $2.00, etc.)\n│   └── Entry Total Display\n│\n├── Submit Button (with validation tags)\n│\n├── Session Total Bar\n│\n└── Recent Entries (frame)\n    └── Entry Cards (repeatable)\n```\n\n---\n\n**Key design tokens to capture:**\n\n| Token | Value |\n|-------|-------|\n| Primary | `#ffcc80` / `#ffb74d` (orange gradient) |\n| Selected state | `#fff8e1` bg, `#ffcc80` border, `#f57c00` text |\n| Border default | `#e2e8f0` |\n| Border radius | `0.75rem` (12px) |\n| Section padding | `1.25rem` |\n| Button min-height | `64px` |\n| Counter button size | `72px` circle |\n\n---\n\n**Suggested naming for interactive elements:**\n\n| Element | Penpot Layer Name |\n|---------|-------------------|\n| Location input | `Input.Location` |\n| GPS button | `Button.GPS` |\n| Washer button | `Button.Machine.Washer` |\n| Dryer button | `Button.Machine.Dryer` |\n| Supplies button | `Button.Machine.Supplies` |\n| Cash button | `Button.Payment.Cash` |\n| Points button | `Button.Payment.Points` |\n| Card button | `Button.Payment.Card` |\n| App button | `Button.Payment.App` |\n| Quantity minus | `Button.Quantity.Minus` |\n| Quantity input | `Input.Quantity` |\n| Quantity plus | `Button.Quantity.Plus` |\n| Price input | `Input.Price` |\n| Submit button | `Button.Submit` |\n| Entry total | `Display.EntryTotal` |\n| Session total | `Display.SessionTotal` |\n\n---\n\nWant me to create an Event Model for LaundryLog while you work on the Penpot design?"

