[[body.segments]]
kind = "plain_text"
text = "That's cleaner. Progressive disclosure - don't show card options until needed.\n\n---\n\n## Updated Screen Flow (Payment Section)\n\n**Before Card tapped:**\n```\nв”Ӯ  PAYMENT                                в”Ӯ\nв”Ӯ  [Cash]    [Points]                     в”Ӯ\nв”Ӯ  [Card]    [App]                        в”Ӯ\n```\n\n**After Card tapped:**\n```\nв”Ӯ  PAYMENT                                в”Ӯ\nв”Ӯ  [Cash]    [Points]                     в”Ӯ\nв”Ӯ  [CARD вң“] [App]                        в”Ӯ\nв”Ӯ                                         в”Ӯ\nв”Ӯ  SELECT CARD                            в”Ӯ\nв”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ в”Ӯ\nв”Ӯ  в”Ӯ в—Ӣ Spark Business Card             в”Ӯ в”Ӯ\nв”Ӯ  в”Ӯ в—Ӣ Chase Freedom                   в”Ӯ в”Ӯ\nв”Ӯ  в”Ӯ + Add new card...                 в”Ӯ в”Ӯ\nв”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ в”Ӯ\n```\n\n**After specific card selected:**\n```\nв”Ӯ  PAYMENT                                в”Ӯ\nв”Ӯ  [Cash]    [Points]                     в”Ӯ\nв”Ӯ  [CARD вң“] [App]                        в”Ӯ\nв”Ӯ                                         в”Ӯ\nв”Ӯ  SELECT CARD                            в”Ӯ\nв”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ в”Ӯ\nв”Ӯ  в”Ӯ в—Ҹ Spark Business Card вң“           в”Ӯ в”Ӯ\nв”Ӯ  в”Ӯ в—Ӣ Chase Freedom                   в”Ӯ в”Ӯ\nв”Ӯ  в”Ӯ + Add new card...                 в”Ӯ в”Ӯ\nв”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ в”Ӯ\n```\n\n---\n\n## Updated Path 1 Sequence\n\n```\nScreen 1.1: New Session (location entry)\nScreen 1.2: Location typed, [Set Location] visible\nScreen 1.3: Entry form (fresh, nothing selected)\nScreen 1.4: Washer selected\nScreen 1.5: Card tapped вҶ’ Card selector appears\nScreen 1.6: Spark Business Card selected вҶ’ Ready to submit\nScreen 1.7: Entry logged, form reset\n```\n\n---\n\n## Questions\n\n1. **App payment** - Same pattern? Tap App вҶ’ show app selector with saved apps + \"Add new...\"?\n\n2. **Points** - Is this simple (no sub-selection)? Or also needs a selector (multiple loyalty programs)?\n\n3. **\"Add new card\" flow** - For this path, skip it? Or include as a branch path later?"

