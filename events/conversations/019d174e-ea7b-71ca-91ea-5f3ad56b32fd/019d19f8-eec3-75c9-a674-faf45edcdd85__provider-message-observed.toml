text = "**Download these files:**\n- [HANDOFF.md](computer:///mnt/user-data/outputs/HANDOFF.md)\n- [Name_Entry_Screen.html](computer:///mnt/user-data/outputs/Name_Entry_Screen.html)\n- [Greeting_Screen.html](computer:///mnt/user-data/outputs/Greeting_Screen.html)\n\n**Put them in:** `c:\\CODE\\penpot-bolero-poc\\`\n\n---\n\n## Prompt for Claude Code\n\n```\nCreate a Bolero WebAssembly POC in c:\\CODE\\penpot-bolero-poc\n\nRead HANDOFF.md first for full context.\n\nUse Option B (Hybrid approach) - recreate the HTML structure in F# using the Penpot CSS classes so we have full Elmish control over interactivity.\n\nSteps:\n1. Create Bolero WebAssembly project with server (for hot-reload)\n2. Extract CSS from both HTML files into wwwroot/css/penpot.css\n3. Create the Elmish model, messages, update function\n4. Build nameEntryScreen and greetingScreen views using the CSS classes from Penpot\n5. Wire up input binding and button click\n6. Test that the flow works: enter name → click Continue → see \"Hello {name}\"\n\nUse F# and Bolero CE-style HTML (v0.20+). Reference https://fsbolero.io/docs/HTML for syntax if needed.\n```"

