text = "Good thinking. Button.Quarter is used for price adjustments (−$0.25 and +$0.25). They're the same visual style, just different content.\n\n---\n\n## Button.Quarter Variants\n\n**Property:** `Action`\n**Values:** `Minus` | `Plus`\n\n| Variant | Text Display |\n|---------|--------------|\n| Action=Minus | \"−.25\" or \"−25¢\" |\n| Action=Plus | \"+.25\" or \"+25¢\" |\n\n---\n\n## Steps\n\n1. **First, create the second variant:**\n   - Select `Button.Quarter` on Components page\n   - Ctrl+K → \"Create variant\"\n   - Now you have two variants\n\n2. **Set up the property:**\n   - Select the variant area (purple border)\n   - In Design panel, rename `Property1` to `Action`\n   - First variant value: `Minus`\n   - Second variant value: `Plus`\n\n3. **Update the content:**\n   - In the `Minus` variant, set text to \"−.25\" (or \"−25¢\")\n   - In the `Plus` variant, set text to \"+.25\" (or \"+25¢\")\n\n---\n\n## Also Consider: Button.Counter\n\nSame pattern applies:\n\n**Property:** `Action`\n**Values:** `Minus` | `Plus`\n\n| Variant | Text Display |\n|---------|--------------|\n| Action=Minus | \"−\" |\n| Action=Plus | \"+\" |\n\nThese are the orange circular quantity buttons. Currently both probably show \"+\" - making them variants ensures the minus button has the correct \"−\" symbol.\n\n---\n\nDo both Button.Quarter and Button.Counter while you're at it?"

