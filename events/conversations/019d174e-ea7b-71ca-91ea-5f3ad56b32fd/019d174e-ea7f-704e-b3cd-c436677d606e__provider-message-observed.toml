text = "Makes sense - the design carries the semantic meaning. No disconnect between what the designer creates and what the code uses.\n\n**Next question**: What naming convention pattern?\n\nSome options:\n\n| Pattern | Example | Notes |\n|---------|---------|-------|\n| `type:name` | `input:userName`, `button:continue` | Simple, readable |\n| `type.name` | `input.userName`, `button.continue` | Dot notation |\n| `type--name` | `input--userName`, `button--continue` | BEM-ish |\n| `fn-type-name` | `fn-input-userName`, `fn-button-continue` | Prefixed, avoids collision |\n\nThe convention needs to:\n- Survive SVG export (becomes element ID)\n- Be parseable by Bolero\n- Be clear to designers\n\nDo you have a preference, or want to define your own pattern?"

