text = "{\"start_timestamp\":\"2025-12-02T02:25:37.752820Z\",\"stop_timestamp\":\"2025-12-02T02:25:41.223107Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"penpot:execute_code\",\"input\":{\"code\":\"\\n// Check Button.Submit in Screen.EntryForm for the disabled/enabled pattern\\nconst screensPage = penpot.currentFile.pages.find(p =\\u003E p.name === \\u0022Screens\\u0022);\\nconst entryForm = screensPage.findShapes().find(s =\\u003E s.name === \\u0022Screen.EntryForm\\u0022);\\n\\nif (!entryForm) {\\n    return { error: \\u0022Screen.EntryForm not found\\u0022 };\\n}\\n\\n// Find submit button area\\nfunction findByName(shape, targetName) {\\n    if (shape.name \\u0026\\u0026 shape.name.includes(targetName)) {\\n        return shape;\\n    }\\n    if (shape.children) {\\n        for (const child of shape.children) {\\n            const found = findByName(child, targetName);\\n            if (found) return found;\\n        }\\n    }\\n    return null;\\n}\\n\\nconst submitWrapper = findByName(entryForm, \\u0022Submit\\u0022);\\n\\nif (!submitWrapper) {\\n    return { error: \\u0022Submit not found in EntryForm\\u0022 };\\n}\\n\\n// Get descendants\\nfunction getDescendants(shape, depth = 0) {\\n    const result = [{\\n        name: shape.name,\\n        type: shape.type,\\n        depth: depth,\\n        characters: shape.characters || null,\\n        width: Math.round(shape.width),\\n        height: Math.round(shape.height)\\n    }];\\n    \\n    if (shape.children) {\\n        for (const child of shape.children) {\\n            result.push(...getDescendants(child, depth \\u002B 1));\\n        }\\n    }\\n    \\n    return result;\\n}\\n\\nreturn getDescendants(submitWrapper);\\n\"},\"message\":\"execute_code\",\"integration_name\":\"penpot\",\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

