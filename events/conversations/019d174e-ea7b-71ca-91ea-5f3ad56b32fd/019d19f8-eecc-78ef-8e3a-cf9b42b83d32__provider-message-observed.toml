kind = "plain_text"
text = "I like the F# types being the source of truth, that aligns well with Scott's ideas. That goes slightly off of Adam's ideas for Event Modeling, but I am adapting those anyway and the EventModel is validated against those types. So maybe that works. My concern is complexity and moving parts to keep track of. explain a bit more on how everything links together and what pushes to ensure everything lines up correctly? I am also concerned about how I tend to think of these software apps and how to design and improve them. Like with the LaundryLog app, I tend to think in terms of tasks or workflows and screens, and then we fill in what is missing. User centric if you will. If the F# types are the contract, is there code that be created that will point to issues without the use of AI?"

