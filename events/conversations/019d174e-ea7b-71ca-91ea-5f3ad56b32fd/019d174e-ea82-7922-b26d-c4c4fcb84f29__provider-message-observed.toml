text = "Exactly. The boundary matters.\n\n---\n\n## The Question: Who Cares?\n\nFor every piece of state, ask: **Does the System need this, or is it just UI presentation?**\n\n| Thing | System cares? | Why |\n|-------|---------------|-----|\n| Washer button highlighted | No | Presentation until submitted |\n| Price being typed | No | Draft state |\n| Form validation error | No | UI feedback |\n| Section expanded/collapsed | No | Layout preference |\n| Entry submitted | **Yes** | Business event - money tracked |\n| Session started | **Yes** | Business event - location locked |\n| GPS resolved | **Yes** | System performed lookup |\n\n---\n\n## The Boundary is Submit\n\nMost UI state is **draft** until it becomes a Command:\n\n```fsharp\n// UI accumulates draft state\ntype State = {\n    DraftMachine: MachineType option    // UI only\n    DraftQuantity: int                  // UI only\n    DraftPrice: Price option            // UI only\n    DraftPayment: PaymentMethod option  // UI only\n}\n\n// Submit packages draft into Command\n| ClickedSubmit ->\n    match buildEntry state with\n    | Ok entry -> \n        [ DraftCleared ], \n        Some (Effect.command (LogEntry entry))  // NOW System cares\n    | Error e -> \n        [ ValidationFailed e ], None\n```\n\nThe System never sees \"user selected Washer\". It sees \"Entry logged with MachineType=Washer\".\n\n---\n\n## When System Pushes to UI\n\nReverse direction - System events UI needs to react to:\n\n| System Event | UI needs to know? | Why |\n|--------------|-------------------|-----|\n| EntryLogged | Yes | Update entries list, show confirmation |\n| GPSLocationResolved | Yes | Fill location field |\n| SessionExpired | Yes | Change screen |\n| PaymentProcessed | Maybe | If showing status |\n| Another user's entry logged | No | Not this user's concern |\n\n---\n\n## Two Patterns for UI ← System\n\n**Pattern A: Subscription**\nUI subscribes to relevant System events\n\n```fsharp\n// UI receives System events it cares about\ntype ExternalInput =\n    | SystemEvent of Event\n\nlet handleExternal evt state =\n    match evt with\n    | GPSLocationResolved loc -> \n        { state with DraftLocation = Some loc }, [ LocationAutoFilled loc ]\n    | EntryLogged entry when entry.SessionId = state.SessionId ->\n        { state with Entries = entry :: state.Entries }, [ EntryConfirmed ]\n    | _ -> \n        state, []  // Ignore events we don't care about\n```\n\n**Pattern B: Query**\nUI queries System projection when needed\n\n```fsharp\n// Not event-driven, just read current state\nlet loadSession () : Effect<Command> =\n    Effect.ofAsync (fun () -> \n        let projection = System.getProjection()\n        projection.CurrentSession\n    )\n```\n\n---\n\n## The Risk You're Naming\n\nOver-coupling:\n- UI sends Command for every click → System bloated with UI concerns\n- System broadcasts every event → UI drowning in irrelevant noise\n\nUnder-coupling:\n- UI keeps state System should know → inconsistency\n- System makes decisions without UI context → bad UX\n\n---\n\n## Heuristic\n\n**UI → System (Command):**\nAsk: \"Would this appear in an audit log? Does this change business state?\"\n- Yes → Command\n- No → UI Intent only\n\n**System → UI (Event subscription):**\nAsk: \"Does this change what the user should see or can do?\"\n- Yes → UI subscribes\n- No → UI ignores\n\n---\n\nDoes that give you a useful filter for deciding what crosses the boundary?"

