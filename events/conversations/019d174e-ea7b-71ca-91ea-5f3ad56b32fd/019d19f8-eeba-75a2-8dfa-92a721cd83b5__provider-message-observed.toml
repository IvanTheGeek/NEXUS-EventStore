kind = "reasoning"
text = "The user wants to use naming conventions in Penpot to identify interactive elements. This aligns with their vision where the design IS the implementation - the designer names elements semantically and Bolero uses those names to wire up interactivity.\n\nNext I should ask about the naming convention specifics, or we could move to the actual implementation approach. Let me think about what's next in the sequence:\n\n1. ✓ Screen approach (artboards)\n2. ✓ Interactivity approach (naming convention)\n3. Naming convention specifics\n4. SVG export method\n5. Bolero project setup\n6. Wiring it up\n\nLet me ask about the naming convention."

[[body.segments]]
kind = "plain_text"
text = "Makes sense - the design carries the semantic meaning. No disconnect between what the designer creates and what the code uses.\n\n**Next question**: What naming convention pattern?\n\nSome options:\n\n| Pattern | Example | Notes |\n|---------|---------|-------|\n| `type:name` | `input:userName`, `button:continue` | Simple, readable |\n| `type.name` | `input.userName`, `button.continue` | Dot notation |\n| `type--name` | `input--userName`, `button--continue` | BEM-ish |\n| `fn-type-name` | `fn-input-userName`, `fn-button-continue` | Prefixed, avoids collision |\n\nThe convention needs to:\n- Survive SVG export (becomes element ID)\n- Be parseable by Bolero\n- Be clear to designers\n\nDo you have a preference, or want to define your own pattern?"

