 l.name,\\n    characters: l.characters,\\n    position: \\u0060(${Math.round(l.x)}, ${Math.round(l.y)})\\u0060\\n}));\\n\\nreturn summary;\\n\"},\"message\":\"execute_code\",\"integration_name\":\"penpot\",\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

