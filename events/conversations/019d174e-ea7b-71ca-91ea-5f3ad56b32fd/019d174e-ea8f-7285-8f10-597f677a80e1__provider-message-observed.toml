text = "Done. Updated **[penpot-conventions.md](computer:///mnt/user-data/outputs/penpot-conventions.md)** (v5) with:\n\n## Key Corrections Made\n\n### 1. Fixed \"Correct Process\" Section\n- Removed incorrect claim that `board.name` can be set before `createComponent()`\n- Added correct sequence: create component first, then rename via `component.name = \"...\"`\n- Emphasized **navigate to target page BEFORE calling `instance()`**\n\n### 2. Added \"Common Mistakes to Avoid\" Table\n| Mistake | Result | Prevention |\n|---------|--------|------------|\n| Call `instance()` before navigating | Unwanted instance on wrong page at (0,0) | `penpot.openPage(targetPage)` BEFORE `instance()` |\n| Try `board.name = \"...\"` | No effect (read-only) | Rename component after creation |\n| Don't position after creation | Instance stuck at (0,0) | Set x, y immediately |\n\n### 3. Added New API Gotcha: `component.instance()` Creates on Current Page\n\n### 4. Fixed \"Component Naming Timing\" Section\n- Corrected to show `board.name` is read-only\n- Corrected to show `component.name = \"...\"` DOES work\n\n### 5. Added \"Shape Name Property\" Gotcha\n- Existing shapes have read-only names\n- Only newly created shapes can have names set\n\n---\n\n## Current State (after your cleanup needed)\n\n**Library:** Screen.NewSession, Screen.EntryForm ✓\n\n**Screens page:** \n- Screen.EntryForm at (100, 100) - main component ✓\n- Screen.NewSession at (100, 1807) ✓\n- *(you mentioned deleting the duplicate at (0,0))*\n\n**PATHS page:**\n- Path1.1-NewSession at (35, 112) ✓\n- Screen.EntryForm at (460, 112) with label \"Path1.3-EntryForm\" ✓\n\nNote: The PATHS instance is still named \"Screen.EntryForm\" because `instance.name` also appears to be read-only via API. The text label provides the visual identification. You may want to rename it manually to \"Path1.3-EntryForm\" in the UI."

