Component()** - component name comes from board name at creation time\\n- **Main component goes on Screens page** - this is the editable template\\n- **Instances go on PATHS page** - these are path-specific copies\\n- **Instance names can differ** - allows \\u0022Path1.1-NewSession\\u0022 instance of \\u0022Screen.NewSession\\u0022 component\\n- **Add text labels to instances** - instances don\\u0027t display names like boards do\\n\\n---\\n\\n## API Gotchas\\n\\n### \\u0060page.findShapes()\\u0060 vs \\u0060penpot.root.children\\u0060\",\"description\":\"Update Key Points section with corrected information\"},\"message\":\"Update Key Points section with corrected information\",\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":{\"type\":\"text\",\"text\":\"Update Key Points section with corrected information\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

