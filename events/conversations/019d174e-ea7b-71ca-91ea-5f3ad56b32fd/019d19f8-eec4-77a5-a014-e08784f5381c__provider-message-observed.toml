kind = "plain_text"
text = "let me add some additional clarification. I have discussed with you before about paths. Paths (like the happy path) would use sample data and provide that sample data to use for tests, but also demonstrate how to go through the app when branching is involved. A path would be like a particular users game play through a video game, a particular session. In addition, Penpot has prototyping. My idea is to use this prototyping abilities to use as the documentation/source of the paths. So instead of many options to click on a screen, there is one that documents the specific path, with the sample data. The thought is that we want to have as many paths as needed to cover all possible edge cases, but minimal enough to do only that, if that makes sense."

