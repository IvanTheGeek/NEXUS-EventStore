[[body.segments]]
kind = "plain_text"
text = "Some notes: Storage of all DateTime should be in UTC. We can include location offset (maybe based on location) and then calculate for reports and display. 1) For the mobile data entry app, the history should only be for the current session. If the session as expired, no need to see it in this part of the app. 2) even if the same location, if the session has expired, no need to resume, just start a new session. 3) Payment method will tend to stay the same. Sometimes it changes due to technical issues or maybe for dryers, we only need to add 2 quarters to finish drying instead of a whole card transaction for 40 minutes. So it might change, but not usually. The machine cost will usually stay the same as well, so keeping the last used amount in the form would probably be the way to go."

