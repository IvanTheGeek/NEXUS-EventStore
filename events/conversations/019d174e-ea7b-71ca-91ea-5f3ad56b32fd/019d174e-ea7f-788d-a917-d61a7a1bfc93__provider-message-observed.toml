text = "Interesting! The **filenames** show:\n\n| Original | Filename Result |\n|----------|-----------------|\n| `SimpleButton` | `SimpleButton.svg` ✓ |\n| `input.userName` | `input.userName.svg` ✓ dot preserved |\n| `Input / UserName` | `Input _ UserName.svg` - slash → underscore |\n| `@input.userName` | `@input.userName.svg` ✓ @ preserved |\n| `#input-userName` | `#input-userName.svg` ✓ # preserved |\n| `bind:input:userName` | `bind_input_userName.svg` - colon → underscore |\n| `Interactive / Input / userName` | `Interactive _ Input _ userName.svg` - slashes → underscores |\n| Variants | Separate files: `VariantButton.svg`, `(1).svg`, `(2).svg` |\n\n**Transforms:**\n- `/` → `_`\n- `:` → `_`\n- `.`, `@`, `#`, `-` → preserved\n\n**Critical question**: What's *inside* the SVG files? The element `id` attributes are what Bolero needs to find interactive elements.\n\nCan you open one of the SVGs (maybe `@input.userName.svg` or `input.userName.svg`) and share the contents? We need to see if the layer names become element IDs."

