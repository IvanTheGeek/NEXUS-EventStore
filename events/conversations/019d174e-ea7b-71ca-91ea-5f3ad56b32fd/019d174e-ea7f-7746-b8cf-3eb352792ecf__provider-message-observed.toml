kind = "tool_result"
text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Claude Code Compaction | Developing with AI Tools | Steve Kinney\",\"url\":\"https://stevekinney.com/courses/ai-development/claude-code-compaction\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"stevekinney.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=stevekinney.com\",\"site_name\":\"Steve Kinney\"},\"is_missing\":false,\"text\":\"Automatic Compaction: Claude Code has an auto-compact feature that triggers when the context window reaches approximately 95% capacity (or 25% remaining). This is a built-in mechanism to prevent hitting the context limit and causing the system ...\\n\\nCompacting is distinct from the /clear command. While /clear completely wipes out the chat history and starts a brand new conversation from scratch, /compact summarizes the conversation and preloads that summary as the new context. Use /clear when you want a completely fresh start, and /compact when you need to retain key information from a previous discussion. Auto-compacting can sometimes take a while, so manual compacting when you have time is suggested. Last modified on July 29, 2025.\\n\\nCompacting in Claude Code is a feature designed to manage the conversation\\u2019s context window, which is the amount of information the AI agent can process at one time. As your conversation with Claude Code grows longer and longer, more data accumulates in the context window. Since every subsequent message you send includes the entire previous context, this can lead to increasing token costs and potential degradation of response quality as the model tries to keep track of a vast amount of information. The primary purpose of compacting is to reduce token usage and prevent the context window from becoming overwhelmed. It helps maintain focus and ensures that the agent doesn\\u2019t \\u201Cforget\\u201D initial instructions or deviate from the plan during long or complex tasks. When you use the /compact command, Claude Code takes your entire current conversation history and creates a summary of it.\\n\\nIt then starts a new chat session with this summary preloaded as the new context. This allows the agent to retain important information and key decisions from the previous conversation without having to carry forward every single message. Manual Trigger: You can manually run /compact at any time, especially when you are continually working through a problem and want a smaller, more focused context for the model. It\\u2019s recommended to do this when you finish a task to avoid unrelated tasks piling up in the same chat. Automatic Compaction: Claude Code has an auto-compact feature that triggers when the context window reaches approximately 95% capacity (or 25% remaining). This is a built-in mechanism to prevent hitting the context limit and causing the system to \\u201Cbreak\\u201D or \\u201Cgo off the rails\\u201D. However, users often advise against waiting for auto-compact, as it can sometimes lead to the agent losing important context and spiraling out of control.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://stevekinney.com/courses/ai-development/claude-code-compaction\"}},{\"type\":\"knowledge\",\"title\":\"Understanding Usage and Length Limits | Claude Help Center\",\"url\":\"https://support.claude.com/en/articles/11647753-understanding-usage-and-length-limits\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"claude.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=claude.com\",\"site_name\":\"Claude\"},\"is_missing\":false,\"text\":\"For users on paid plans with code execution enabled, Claude now automatically manages long conversations. When your conversation approaches the context window limit, Claude summarizes earlier messages to continue the conversation seamlessly.\\n\\nUsage limits control how much you can interact with Claude over a specific time period. Think of this as your \\u0022conversation budget\\u0022 that determines how many messages you can send to Claude, or how long you can work with Claude Code, before needing to wait for your limit to reset. Your usage is affected by several factors, including the length and complexity of your conversations, the features you use, and which Claude model you\\u0027re chatting with. Different subscription plans (Pro, Max, Team, etc.) have different usage allowances, with paid plans offering higher limits. Note that your usage of all different Claude product surfaces (claude.ai, Claude Code, Claude Desktop) counts towards the same usage limit. There isn\\u0027t a way to purchase a specific plan offering unlimited usage at this time. However, there are a couple of different ways to increase your usage depending on your plan: If you\\u2019re using Claude Code with a Pro or Max plan, you can switch to pay-as-you-go usage with a separate C\\n\\nFor users on paid plans with code execution enabled, Claude now automatically manages long conversations. When your conversation approaches the context window limit, Claude summarizes earlier messages to continue the conversation seamlessly. This means you can have longer, more natural conversations with fewer interruptions. Your full chat history is preserved so Claude can reference it even after summarization. You may occasionally see that Claude is \\u0022organizing its thoughts\\u0022 during long conversations\\u2014this indicates automatic context management is working. Note: Code execution must be enabled for automatic context management. Rare edge cases (such as very large first messages) may still encounter context limits. Note: Claude\\u2019s context window size is 200K tokens across all models and paid plans with one exception: Claude Sonnet 4 has a 500K context window for users on Enterprise plans.\\n\\nTemporarily disable non-critical tools and connectors: Disable web search, Research, and MCP connectors from your \\u0022Search and tools\\u0022 settings when they\\u0027re not needed for specific conversations. Note: Tools and connectors are token-intensive, so managing them helps both maximize your available context window and optimize your usage limits. The main distinction is that usage limits control how much you can use Claude across all your conversations, while length limits control how long any single conversation can become. Usage limits are about quantity over time, while length limits are about the depth and complexity of individual conversations. If you hit your usage limit, you\\u0027ll need to wait for it to reset, upgrade your plan, or purchase extra usage (Team and Enterprise plans only).\\n\\nIf you hit a length limit, you can start a new conversation or use features like projects to work with larger amounts of information more efficiently.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://support.claude.com/en/articles/11647753-understanding-usage-and-length-limits\"}},{\"type\":\"knowledge\",\"title\":\"How to Bypass Claude\\u0027s Message Limits: Complete Guide to AI Conversation Memory (2025) - Michelle Jamesina\",\"url\":\"https://michellejamesina.com/how-to-bypass-claude-message-limits/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"michellejamesina.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=michellejamesina.com\",\"site_name\":\"Michelle Jamesina\"},\"is_missing\":false,\"text\":\"Relevant context Claude will need to continue effectively \\u00B7 After major breakthroughs or key decisions in your conversation \\u00B7 Before complex multi-part analysis that might push you over limits ... Start your next Claude conversation by pasting this memory log and saying: \\u201CThis is our previous work on [project]. Let\\u2019s continue from where we left off.\\u201D For complex projects spanning multiple days, consider storing these memory logs in external systems like Notion, Obsidian, or Airtable for better organization and searchability. Here\\u2019s the memory log I created after that Zoho One research session: Original Problem: Evaluating alternatives to QuickBooks, Dubsado, and Mailerlite for cost savings and integration efficiency. Key Discovery: Zoho One ($45/month) can replace all three tools ($180/month combined), providing 75% cost savings while improving workflow integration.\\n\\nThe difference: One approach leaves you constantly rebuilding context. The other creates a sustainable system that gets smarter over time. Let me be specific about where the wheels fall off with standard Claude usage: The Expansion Problem: Good research uncovers new opportunities. When I started evaluating alternatives to QuickBooks, Dubsado, and Mailerlite, the conversation naturally expanded as we discovered Zoho One might be able to replace all three at 75% cost savings. That expansion hit message limits before we could finish the analysis. The Restart Problem: Every new Claude conversation starts at zero, forcing you to rebuild your Claude conversation memory from scratch. No memory of what you\\u2019ve already covered, what worked, what didn\\u2019t, or where you were heading next. You end up spending half your time rebuilding context instead of moving forward.\\n\\nThis constant context rebuilding creates what researchers call \\u2018extraneous cognitive load.\\u2019 It\\u2019s the mental effort spent on non-productive tasks rather than actual problem-solving. Research published in Current Directions in Psychological Science shows that reducing this cognitive burden significantly improves task performance and learning outcomes. The Complexity Problem: Complex projects require multiple Claude interactions over days or weeks. Without continuity, each session feels like starting over with a research assistant who knows nothing about your work. The Cognitive Cost of Context Switching: Every time you restart a Claude conversation, you\\u2019re not just losing information \\u2013 you\\u2019re forcing your brain to reconstruct complex mental models from scratch. Cognitive load theory research demonstrates that working memory has limited capacity, and rebuilding context consumes valuable mental resources that could be used for actual analysis and decision-making.\\n\\nRelevant context Claude will need to continue effectively \\u00B7 After major breakthroughs or key decisions in your conversation \\u00B7 Before complex multi-part analysis that might push you over limits ... Start your next Claude conversation by pasting this memory log and saying: \\u201CThis is our previous work on [project]. Let\\u2019s continue from where we left off.\\u201D For complex projects spanning multiple days, consider storing these memory logs in external systems like Notion, Obsidian, or Airtable for better organization and searchability. Here\\u2019s the memory log I created after that Zoho One research session: Original Problem: Evaluating alternatives to QuickBooks, Dubsado, and Mailerlite for cost savings and integration efficiency. Key Discovery: Zoho One ($45/month) can replace all three tools ($180/month combined), providing 75% cost savings while improving workflow integration.\\n\\nInclude:** - **The original problem/question and how it evolved.** - **Key insights, recommendations, and solutions we developed.** - **My working style, preferences, and communication patterns you observed.** - **Effective collaboration approaches we identified.** - **Any clarifications or corrections that changed the direction.** - **Specific project context or examples we discussed.** - **Templates, frameworks, or processes we established.** - **Next steps or follow-up areas identified.** **Structure this as a reference document that I could share with you in a future conversation to quickly re-establish our working relationship and context. Focus on practical patterns and preferences that would help future interactions be more efficient.** This prompt consistently generates logs that capture not just what we discussed, but how we worked together\\u2014which makes handoffs to new Claude conversations much smoother.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"June 27, 2025\",\"url\":\"https://michellejamesina.com/how-to-bypass-claude-message-limits/\"}},{\"type\":\"knowledge\",\"title\":\"what-is-claude-code-auto-compact | ClaudeLog\",\"url\":\"https://claudelog.com/faqs/what-is-claude-code-auto-compact/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"claudelog.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=claudelog.com\",\"site_name\":\"ClaudeLog\"},\"is_missing\":false,\"text\":\"I observe that auto-compact is Claude Code\\u0026#x27;s intelligent context window management system that automatically summarizes conversations when approaching memory limits, allowing you to continue working without interruption. When your conversation approaches the context window limit, Claude Code automatically: 1. Analyzes the conversation to identify key information worth preserving 2. Creates a concise summary of previous interactions, decisions, and code changes 3. Compacts the conversation by replacing old messages with the summary 4. Continues seamlessly with the preserved context ... Run multiple autonomous coding agents simultaneously with Verdent\\u0026#x27;s isolated Git worktrees. Each agent tackles different components while maintaining full context awareness, eliminating manual debugging bottlenecks and accelerating feature delivery. Discover Verdent AI (Free Trial) Auto-Compact (Default): Automatic summarization when approaching limits.\\n\\nI observe that auto-compact is Claude Code\\u0027s intelligent context window management system that automatically summarizes conversations when approaching memory limits, allowing you to continue working without interruption. When your conversation approaches the context window limit, Claude Code automatically: 1. Analyzes the conversation to identify key information worth preserving 2. Creates a concise summary of previous interactions, decisions, and code changes 3. Compacts the conversation by replacing old messages with the summary 4. Continues seamlessly with the preserved context ... Run multiple autonomous coding agents simultaneously with Verdent\\u0027s isolated Git worktrees. Each agent tackles different components while maintaining full context awareness, eliminating manual debugging bottlenecks and accelerating feature delivery. Discover Verdent AI (Free Trial) Auto-Compact (Default): Automatic summarization when approaching limits.\\n\\nManual Compact (/compact): You control when and how to summarize with specific preservation instructions \\u00B7 Clear (/clear): Starts a completely fresh conversation with no context preservation \\u00B7 MCP Server Optimization: Disable unused MCP servers to free context tokens before needing to compact (v2.0.10\\u002B) ... # Basic compact /compact # Compact with specific preservation instructions /compact only keep the names of the websites we reviewed # Compact preserving code patterns /compact preserve the coding patterns we established \\u00B7 You can check or change auto-compact settings in your session: ... This shows whether auto-compact is enabled and your current context usage. ... Proactive context management: Disable unused MCP servers with /mcp or @server-name disable before compacting to maximize available context \\u00B7 The real strategy is to manually compact at strategic times rather than letting auto-compact happen randomly.\\n\\nWhen auto-compact triggers automatically, it can disrupt your workflow and mess up your current setup. I use /compact at natural breakpoints when I control what gets preserved. Preventing Compaction: Before resorting to compaction, use /context to identify MCP servers consuming context space but not actively needed. Disabling unused MCP servers can free up significant context space, potentially avoiding the need to compact altogether. ... Manual compacting at strategic breakpoints prevents workflow disruption from automatic triggering. Claude\\u0027s performance degrades when working memory becomes constrained during active development. ... I find it\\u0027s better to manually compact at logical breakpoints rather than hitting context limits mid-task. Claude\\u0027s performance degrades significantly when working memory is constrained. See Context Window Depletion for detailed strategies.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://claudelog.com/faqs/what-is-claude-code-auto-compact/\"}},{\"type\":\"knowledge\",\"title\":\"Claude 4.5 Context Length \\u0026 Extended Memory Explained\",\"url\":\"https://skywork.ai/blog/claude-4-5-context-length-extended-memory/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"skywork.ai\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=skywork.ai\",\"site_name\":\"Skywork\"},\"is_missing\":false,\"text\":\"Anthropic\\u2019s docs and announcements around long context and Sonnet 4.5 emphasize these capabilities and constraints (Context windows \\u2013 Claude Docs, 2025; Claude Sonnet 4 now supports 1M tokens of context, 2025).\\n\\nPersistent notes or files: Agents maintain concise project briefs (e.g., NOTES.md) and re\\u2011insert the essentials when needed. Anthropic\\u2019s engineering guidance describes compaction and note\\u2011keeping to preserve state across sessions (Effective context engineering for AI agents, 2025). Retrieval\\u2011augmented generation (RAG): Index your sources and pull only the most relevant chunks with dense context around each snippet; Anthropic outlines \\u201CContextual Retrieval\\u201D to improve relevance density (Contextual Retrieval in AI Systems, 2024). Prompt caching: Cache stable background context to cut cost/latency and maintain continuity across calls (Prompt caching with Claude, 2024). Tool connectors and the Model Context Protocol (MCP): Establish secure, permissioned connections to external memory stores so agents can read/write state responsibly (Introducing the Model Context Protocol, 2024).\\n\\nPersistent memory is powerful, but treat it as an organizational capability with explicit consent and controls. Anthropic\\u2019s principles for safe, trustworthy agents emphasize permissioning, isolation, and auditability, which are relevant when agents retain information across tasks (Our framework for developing safe and trustworthy agents, 2025). MCP supports granular permissions for connectors, helping teams meet privacy requirements while enabling external memory (Introducing the Model Context Protocol, 2024). On provider platforms like AWS Bedrock, plan for platform behaviors such as smart context management and confirm token limits per account and region (Introducing Claude Sonnet 4.5 in Amazon Bedrock, 2025). Bigger window \\u2260 perfect recall: Even inside large windows, attention can wane; summarization and pinning still matter. Extended memory \\u2260 training: Persisted notes and retrieval support continuity, but they don\\u2019t permanently change model parameters.\\n\\nAnthropic\\u2019s docs and announcements around long context and Sonnet 4.5 emphasize these capabilities and constraints (Context windows \\u2013 Claude Docs, 2025; Claude Sonnet 4 now supports 1M tokens of context, 2025). ... Lead with a short task brief and numbered objectives. Use headings and signposts; ask the model to quote sources or passages before analyzing. ... Break large files into logical sections; avoid dumping entire documents. Periodically summarize the conversation into a compact, actionable brief and pin key facts. ... Use RAG and contextual retrieval to insert only the most relevant snippets. ... Prune noisy history; re\\u2011insert summaries instead of raw logs. ... Apply prompt caching for recurring context and templates. ... Confirm your plan\\u2019s token caps (200K in many paid app contexts vs. 1M with the API and beta header), rate limits, and provider behaviors.\\n\\nAs of 2025\\u201109\\u201130, Anthropic states that Claude Sonnet 4 and 4.5 can support very large windows in developer environments. Specifically: In app and standard paid plans, many users will see a 200K\\u2011token context window; Anthropic\\u2019s support guidance highlights these defaults and plan\\u2011level variations according to the 2025 Help Center article on paid plan limits (How large is the context window on paid Claude plans?). For builders using the Anthropic API, Anthropic announced 1\\u2011million token context for Sonnet 4, with enablement details and guardrails in 2025. The announcement describes use cases like processing entire codebases and long research pipelines (Claude Sonnet 4 now supports 1M tokens of context, 2025). Claude\\u2019s docs note that Sonnet 4 and 4.5 support a 1M context window with the appropriate beta header and eligibility (Context windows \\u2013 Claude Docs, 2025).\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"September 30, 2025\",\"url\":\"https://skywork.ai/blog/claude-4-5-context-length-extended-memory/\"}},{\"type\":\"knowledge\",\"title\":\"How to Bypass Claude\\u2019s Message Limits: Complete Guide to AI Conversation Memory (2025) | by Michelle Jamesina | Medium\",\"url\":\"https://michellejamesina.medium.com/how-to-bypass-claudes-message-limits-complete-guide-to-ai-conversation-memory-2025-b3d5f0685f39\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"medium.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=medium.com\",\"site_name\":\"Medium\"},\"is_missing\":false,\"text\":\"Relevant context Claude will need to continue effectively \\u00B7 After major breakthroughs or key decisions in your conversation \\u00B7 Before complex multi-part analysis that might push you over limits ... Start your next Claude conversation by pasting this memory log and saying: \\u201CThis is our previous work on [project]. Let\\u2019s continue from where we left off.\\u201D For complex projects spanning multiple days, consider storing these memory logs in external systems like Notion, Obsidian, or Airtable for better organization and searchability. Here\\u2019s the memory log I created after that Zoho One research session: Original Problem: Evaluating alternatives to QuickBooks, Dubsado, and Mailerlite for cost savings and integration efficiency. Key Discovery: Zoho One ($45/month) can replace all three tools ($180/month combined), providing 75% cost savings while improving workflow integration.\\n\\nMost people using Claude are doing it wrong. Not because they don\\u2019t understand the technology, but because they\\u2019re ignoring the most\\u2026\\n\\nThe difference: One approach leaves you constantly rebuilding context. The other creates a sustainable system that gets smarter over time. Let me be specific about where the wheels fall off with standard Claude usage: The Expansion Problem: Good research uncovers new opportunities. When I started evaluating alternatives to QuickBooks, Dubsado, and Mailerlite, the conversation naturally expanded as we discovered Zoho One might be able to replace all three at 75% cost savings. That expansion hit message limits before we could finish the analysis. The Restart Problem: Every new Claude conversation starts at zero, forcing you to rebuild your Claude conversation memory from scratch. No memory of what you\\u2019ve already covered, what worked, what didn\\u2019t, or where you were heading next. You end up spending half your time rebuilding context instead of moving forward.\\n\\nThis constant context rebuilding creates what researchers call \\u2018extraneous cognitive load.\\u2019 It\\u2019s the mental effort spent on non-productive tasks rather than actual problem-solving. Research published in Current Directions in Psychological Science shows that reducing this cognitive burden significantly improves task performance and learning outcomes. The Complexity Problem: Complex projects require multiple Claude interactions over days or weeks. Without continuity, each session feels like starting over with a research assistant who knows nothing about your work. The Cognitive Cost of Context Switching: Every time you restart a Claude conversation, you\\u2019re not just losing information \\u2014 you\\u2019re forcing your brain to reconstruct complex mental models from scratch. Cognitive load theory research demonstrates that working memory has limited capacity, and rebuilding context consumes valuable mental resources that could be used for actual analysis and decision-making.\\n\\nRelevant context Claude will need to continue effectively \\u00B7 After major breakthroughs or key decisions in your conversation \\u00B7 Before complex multi-part analysis that might push you over limits ... Start your next Claude conversation by pasting this memory log and saying: \\u201CThis is our previous work on [project]. Let\\u2019s continue from where we left off.\\u201D For complex projects spanning multiple days, consider storing these memory logs in external systems like Notion, Obsidian, or Airtable for better organization and searchability. Here\\u2019s the memory log I created after that Zoho One research session: Original Problem: Evaluating alternatives to QuickBooks, Dubsado, and Mailerlite for cost savings and integration efficiency. Key Discovery: Zoho One ($45/month) can replace all three tools ($180/month combined), providing 75% cost savings while improving workflow integration.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"August 1, 2025\",\"url\":\"https://michellejamesina.medium.com/how-to-bypass-claudes-message-limits-complete-guide-to-ai-conversation-memory-2025-b3d5f0685f39\"}},{\"type\":\"knowledge\",\"title\":\"Why Claude Forgets: Guide to Auto-Compact \\u0026 Context Windows\",\"url\":\"https://www.arsturn.com/blog/why-does-claude-forget-things-understanding-auto-compact-context-windows\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"arsturn.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=arsturn.com\",\"site_name\":\"Arsturn\"},\"is_missing\":false,\"text\":\"The \\u0026quot;Manual Compact\\u0026quot;: Summarize \\u0026amp; Restart: When you reach a good stopping point in a long conversation, or when you feel the quality starting to slip, ask Claude to summarize your key findings. Prompt it with something like: \\u0026quot;Okay, this is great. Please summarize the entire conversation we\\u0026#x27;ve had so far. Include all key decisions, the final code block we agreed on, \\u0026amp; the main points of the article outline.\\u0026quot; Then, copy that summary, open a BRAND NEW chat, \\u0026amp; paste it in as your first prompt. This is you, manually doing what Claude Code\\u0026#x27;s \\u00B7 1 /compact feature does automatically. It gives you a fresh context window loaded with only the most essential information. Front-Load Your Instructions: Put your most important instructions, rules, \\u0026amp; context right at the beginning of your prompt. Reiterate the most critical ones every few messages if the conversation is getting really long.\\n\\nYou\\u2019re 45 minutes in, the conversation history is a testament to your shared genius, \\u0026 then you ask it to refer back to a key instruction from the beginning. Claude responds with something so bafflingly unrelated you want to flip your desk. It\\u2019s like it just woke up from a nap \\u0026 has no idea who you are or what you\\u2019re talking about. You might have even seen a weird little message if you\\u2019re a developer using Claude Code: \\u0022Context left until auto-compact.\\u0022 What the heck is that? Is Claude just\\u2026 deleting parts of your conversation to save space? Here\\u2019s the thing: you\\u2019re not going crazy. This is a real, tangible thing. For developers, it\\u2019s called \\u0022auto-compacting.\\u0022 For everyone else using the regular claude.ai website, it\\u2019s a phenomenon tied to something called the \\u0022context window.\\u0022 Whatever you call it, it\\u2019s SUPER frustrating. Let\\u0027s break down what\\u2019s actually happening \\u0026 how you can get back in control.\\n\\nIf you\\u0027re using Claude Code, the command-line tool for developers, you\\u0027re dealing with a specific, named feature. Claude Code is designed for long, agentic tasks\\u2014meaning you give it a goal \\u0026 it works on it step-by-step. As this conversation grows, it eats up a LOT of \\u0022working memory.\\u0022 To prevent the AI from crashing or going completely \\u0022off the rails,\\u0022 Anthropic built in an auto-compact feature. When your conversation gets about 95% full, Claude automatically tries to summarize the earlier parts of your chat. It squishes down the history into a condensed version \\u0026 then continues the conversation. Developers can also trigger this manually by typing ... The goal is noble: save tokens (which saves money \\u0026 resources) \\u0026 keep the AI focused. The reality? Sometimes the summary is\\u2026 not great. It can miss crucial nuances, leading to the AI veering off course.\\n\\nThe \\u0022Manual Compact\\u0022: Summarize \\u0026 Restart: When you reach a good stopping point in a long conversation, or when you feel the quality starting to slip, ask Claude to summarize your key findings. Prompt it with something like: \\u0022Okay, this is great. Please summarize the entire conversation we\\u0027ve had so far. Include all key decisions, the final code block we agreed on, \\u0026 the main points of the article outline.\\u0022 Then, copy that summary, open a BRAND NEW chat, \\u0026 paste it in as your first prompt. This is you, manually doing what Claude Code\\u0027s \\u00B7 1 /compact feature does automatically. It gives you a fresh context window loaded with only the most essential information. Front-Load Your Instructions: Put your most important instructions, rules, \\u0026 context right at the beginning of your prompt. Reiterate the most critical ones every few messages if the conversation is getting really long.\\n\\n1 /compact preserve the coding patterns we established. This gives Claude a hint about what\\u0027s most important to save. ... 1 CLAUDE.md file: This is a HUGE one for developers. Claude Code can be set up to automatically pull context from a file named \\u00B7 1 CLAUDE.md in your project\\u0027s directory. This is the perfect place to put project-wide information you ALWAYS want Claude to know: core files, style guidelines, common commands, testing instructions, etc. It\\u0027s like giving Claude a permanent cheat sheet that doesn\\u0027t take up space in the main conversation\\u0027s context window. ... Streamline operations and boost productivity with AI. These strategies are great for personal use. But what if you\\u0027re a business trying to use AI for customer service or lead generation on your website? You can\\u0027t exactly tell a potential customer, \\u0022Hey, sorry our chatbot forgot your question, could you start a new chat \\u0026 paste in a summary of our conversation so far?\\u0022\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.arsturn.com/blog/why-does-claude-forget-things-understanding-auto-compact-context-windows\"}},{\"type\":\"knowledge\",\"title\":\"MAJOR BUG: Claude Code Stuck in Infinite Compaction Loop Making it Basically Useless! \\u00B7 Issue #6004 \\u00B7 anthropics/claude-code\",\"url\":\"https://github.com/anthropics/claude-code/issues/6004\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"\\u273D Compacting conversation\\u2026 (esc to interrupt) and since it is wasting so much time and cycles on compacting, this happens a lot sooner that it should: Claude usage limit reached. Your limit will reset at 12pm (America/Los_Angeles). Issue...\\n\\nRead x_strategy_test.go \\u2192 Read y_timeseries_strategy_test.go \\u2192 Read z_markov_model_strategy_test.go \\u2192 Read w_range_strategy_test.go \\u2192 Read v_flow_imbalance_strategy_test.go \\u2192 [Compaction attempt] \\u2192 [Loop restarts] ... This bug prevents completion of any complex multi-step task that triggers compaction, making Claude Code unusable for production software development tasks. Recommendation: The compaction/context management system needs urgent review. When compaction occurs, task state and progress markers must be preserved to prevent re-reading already processed files. \\uD83D\\uDC4DReact with \\uD83D\\uDC4D4arsn3152, Codewow, timkjr and zxkane\\uD83D\\uDC40React with \\uD83D\\uDC401zxkane ... area:corebugSomething isn\\u0027t workingSomething isn\\u0027t workingmemoryperf:memoryplatform:windowsIssue specifically occurs on WindowsIssue specifically occurs on Windows ...\\n\\n\\u273D Compacting conversation\\u2026 (esc to interrupt) and since it is wasting so much time and cycles on compacting, this happens a lot sooner that it should: Claude usage limit reached. Your limit will reset at 12pm (America/Los_Angeles). ... Claude Code v1.0.83 is stuck in an infinite loop attempting to \\u0022compact\\u0022 the conversation, preventing task completion and wasting computational resources. consequently, i am getting, \\u0022 Approaching Opus usage limit\\u0022 and \\u0022Approaching usage limit. resets at x pm\\u0022 a lot faster than what I am used to for the past 3 months that I have been using claude code. ... Reads the same 5 test files repeatedly: - x_strategy_test.go (746 lines) - y_timeseries_strategy_test.go (746 lines) - z_markov_model_strategy_test.go (647 lines) - w_strategy_test.go (795 lines) - v_strategy_test.go (810 lines) After reading files, attempts to \\u0022compact\\u0022 the conversation ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"August 18, 2025\",\"url\":\"https://github.com/anthropics/claude-code/issues/6004\"}},{\"type\":\"knowledge\",\"title\":\"Ultimate Guide: Fixing \\u0022Claude hit the maximum length for this conversation.\\u0022\",\"url\":\"https://limitededitionjonathan.substack.com/p/ultimate-guide-fixing-claude-hit\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"substack.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=substack.com\",\"site_name\":\"Substack\"},\"is_missing\":false,\"text\":\"But here\\u2019s the key: Do it at 70% capacity, not at 95%. ... Where to store this: Create it as an artifact. Or put it in a Project knowledge file. Or keep it in an external text file.\\n\\nAnthropic\\u2019s official statement during their 2025 infrastructure issues: \\u201CWe never reduce model quality due to demand, time of day, or server load.\\u201D \\u00B7 When things went wrong, they published detailed technical explanations with code snippets and compiler optimization flags. Radical transparency over reputation management. Even the pricing is transparent: Extended context costs 2x ($6 vs $3 per million input tokens) because it reflects real computational cost. They\\u2019re not hiding the economics. Hard limits force discipline. And discipline produces better outcomes. ... Anthropic\\u2019s take: \\u201CContext engineering has quietly become an essential developer skill for LLM pair programming.\\u201D \\u00B7 You\\u2019re developing skills that make you better at working with AI. These skills are transferable - they\\u2019ll work with any AI tool, not just Claude. ... The strategies in this guide aren\\u2019t workarounds for a limitation.\\n\\nAnthropic officially calls this \\u201Ccompaction\\u201D - taking a conversation that\\u2019s approaching the limit, summarizing it, and starting fresh with that summary. But here\\u2019s the key: Do it at 70% capacity, not at 95%. ... Where to store this: Create it as an artifact. Or put it in a Project knowledge file. Or keep it in an external text file. Wherever makes sense for your workflow. ... When you\\u2019re forced to checkpoint because you hit the limit, Claude is rushing to summarize everything and hoping it captures what matters. The summary might miss crucial context, bury important decisions, or emphasize the wrong things. When you checkpoint strategically, you control what\\u2019s preserved. You emphasize what matters. You structure it for future reference. Token efficiency: A good checkpoint might be 500-1,500 tokens. The conversation history it replaces might be 5,000-15,000 tokens.\\n\\nIn Claude Code this is built in: There\\u2019s a /compact command and checkpoint features. In the chat interface, you do it manually. But the concept is the same. The pattern Anthropic recommends: \\u201CHave Claude create a document or GitHub issue with the plan so you can reset to this spot if implementation isn\\u2019t what you want.\\u201D \\u00B7 That\\u2019s checkpointing. You\\u2019re creating an artifact of the current state so you can return to it later without needing the entire conversation history. Every word counts. Literally. Every word is a token, and tokens fill your context. ... \\u201CI was wondering if it might be possible to potentially change the styling of the button component to use a blue color instead of its current color scheme\\u201D = 50\\u002B tokens \\u00B7 That\\u2019s a 90% reduction. Same information. Massively different token cost. Anthropic\\u2019s official guidance: \\u201CGood context engineering means finding the smallest possible set of high-signal tokens that maximize the likelihood of your desired outcome.\\u201D \\u00B7\\n\\nOngoing effort: Manual compaction decisions, context monitoring, periodic cleanup, strategic conversation boundaries. ... Consistent performance. No gradual degradation. Reliable recall. Predictable behavior. High-quality outputs maintained. Benchmark evidence: In tests requiring complex reasoning (SWE-bench, GPQA), Claude often outperforms competitors, even those with much larger context windows. Professional outcomes: More reliable code generation, better spec adherence, fewer hallucinations, consistent quality across sessions. It\\u2019s not about how much you can remember - it\\u2019s about how well you can think about what you remember. Less \\u201Cwhy is Claude suddenly giving me garbage?\\u201D moments: With Claude: Clear error when limit is reached. Performance stays high until that explicit boundary. You know when to act. No mysterious quality drops. With rolling context models: Gradual degradation.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"3 weeks ago\",\"url\":\"https://limitededitionjonathan.substack.com/p/ultimate-guide-fixing-claude-hit\"}},{\"type\":\"knowledge\",\"title\":\"Managing context on the Claude Developer Platform | Claude\",\"url\":\"https://anthropic.com/news/context-management\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"anthropic.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=anthropic.com\",\"site_name\":\"Anthropic\"},\"is_missing\":false,\"text\":\"Claude Sonnet 4.5 enhances both capabilities with built-in context awareness\\u2014tracking available tokens throughout conversations to manage context more effectively. Together, these updates create a system that improves agent performance: Enable ...\\n\\nAug 25, 2025 \\u00B7 Product announcements \\u00B7 Piloting Claude for ChromePiloting Claude for Chrome \\u00B7 Piloting Claude for ChromePiloting Claude for Chrome \\u00B7 Aug 27, 2024 \\u00B7 Product announcements \\u00B7 Artifacts are now generally availableArtifacts are now generally available \\u00B7 Artifacts are now generally availableArtifacts are now generally available \\u00B7 Nov 20, 2025 \\u00B7 Product announcements \\u00B7 What\\u2019s new in Claude: Turning Claude into your thinking partnerWhat\\u2019s new in Claude: Turning Claude into your thinking partner \\u00B7 What\\u2019s new in Claude: Turning Claude into your thinking partnerWhat\\u2019s new in Claude: Turning Claude into your thinking partner \\u00B7 Sep 9, 2025 \\u00B7 Product announcements \\u00B7 Claude can now create and edit filesClaude can now create and edit files \\u00B7 Claude can now create and edit filesClaude can now create and edit files \\u00B7 See pricing \\u00B7\\n\\nContext editing automatically clears stale tool calls and results from within the context window when approaching token limits. As your agent executes tasks and accumulates tool results, context editing removes stale content while preserving the conversation flow, effectively extending how long agents can run without manual intervention. This also increases the effective model performance as Claude focuses only on relevant context. The memory tool enables Claude to store and consult information outside the context window through a file-based system. Claude can create, read, update, and delete files in a dedicated memory directory stored in your infrastructure that persists across conversations. This allows agents to build up knowledge bases over time, maintain project state across sessions, and reference previous learnings without having to keep everything in context.\\n\\nClaude Sonnet 4.5 enhances both capabilities with built-in context awareness\\u2014tracking available tokens throughout conversations to manage context more effectively. Together, these updates create a system that improves agent performance: Enable longer conversations by automatically removing stale tool results from context \\u00B7 Boost accuracy by saving critical information to memory\\u2014and bring that learning across successive agentic sessions \\u00B7 Claude Sonnet 4.5 is the best model in the world for building agents. These features unlock new possibilities for long-running agents\\u2014processing entire codebases, analyzing hundreds of documents, or maintaining extensive tool interaction histories. Context management builds on this foundation, ensuring agents can leverage this expanded capacity efficiently while still handling workflows that extend beyond any fixed limit.\\n\\nHi Claude! Could you help me develop a unique voice for an audience? If you need more information from me, ask me 1-2 key questions right away. If you think I should upload any documents that would help you do a better job, let me know. You can use the tools you have access to\\u2014 like Google Drive, web search, etc.\\u2014if they\\u2019ll help you better accomplish this task. Do not use analysis tool. Please keep your responses friendly, brief and conversational. Please execute the task as soon as you can\\u2014an artifact would be great if it makes sense. If using an artifact, consider what kind of artifact (interactive, visual, checklist, etc.) might be most helpful for this specific task. Thanks for your help! ... Hi Claude! Could you improve my writing style? If you need more information from me, ask me 1-2 key questions right away. If you think I should upload any documents that would help you do a better job, let me know.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"September 29, 2025\",\"url\":\"https://anthropic.com/news/context-management\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"e557d052-7e7e-47fb-9c83-0d75f824381c\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

