kind = "plain_text"
text = "Right. So the Screen.NewSession component needs a \"Set Location\" button that:\n- **Hidden** when `DraftLocation` is empty (Path1.1)\n- **Visible** when `DraftLocation` has text (Path1.2)\n\nFor the Penpot design, we have a choice on how to represent visibility states:\n\n1. **Component variants:** Screen.NewSession with `LocationState = Empty | Entered`\n2. **Manual per-instance:** Add button to component, manually hide in Path1.1 instance\n3. **Separate elements:** Keep Button.GPS for empty state, add Button.SetLocation for filled state, show one or the other\n\nOption 1 (variants) aligns with our earlier discussion about using variants for state changes. The variant property would map directly to the visibility predicate.\n\nShould I:\n- Add a `LocationState` variant to Screen.NewSession (Empty | Entered)\n- Empty variant: shows Button.GPS, hides Button.SetLocation\n- Entered variant: shows Button.SetLocation, hides Button.GPS (or keeps both?)\n\nOr different approach?"

