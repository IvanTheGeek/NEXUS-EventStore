text = "Good call - Penpot has established conventions:\n\n**Components:**\n- Grouping: `Buttons/Alert Button` (slash for folders)\n- Variants: `Color=Primary`, `State=Hover` (property=value)\n- Layer formula: `[property_name]=[value]`\n\n**Design Tokens:**\n- Hierarchy: `dimension.small`, `color.primary` (dot notation)\n- References: `{dimension.small}` (curly braces)\n- Sets/folders: `Light/Global` (slash)\n\n**Reserved characters:**\n- `/` → grouping/folders\n- `=` → variant properties  \n- `.` → token hierarchy\n- `{}` → token references\n\n---\n\n**Options that don't conflict:**\n\n| Pattern | Example | Rationale |\n|---------|---------|-----------|\n| `@type.name` | `@input.userName` | @ prefix = \"actionable\" |\n| `#type.name` | `#input.userName` | Hash = \"bindable\" |\n| `Interactive/type/name` | `Interactive/Input/userName` | Uses existing grouping |\n| `bind:type:name` | `bind:input:userName` | Colon separator |\n\nThe `Interactive/type/name` approach works with Penpot's component grouping - your interactive elements become a component folder, and the name hierarchy survives in SVG export.\n\n**Which feels right?** Or do you want to test what actually survives SVG export first before deciding?"

