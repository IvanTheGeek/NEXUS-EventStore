kind = "plain_text"
text = "I can see Button.Option has two variants:\n- **Default** (left): White background, gray text\n- **Selected** (right): Cream background, orange text\n\nAdding a **Disabled** variant would be a third state. This is best done manually in Penpot:\n\n**To add Disabled variant:**\n1. Select the Button.Option variant group (purple border)\n2. Ctrl+K → \"Create variant\" (or right-click → Create variant)\n3. Style the new variant:\n   - Background: Light gray (#e2e8f0 or similar)\n   - Text: Muted gray (#94a3b8)\n   - Maybe reduced opacity (0.6?)\n4. Set variant property value to \"Disabled\"\n\n**Suggested Disabled appearance:**\n| Property | Value |\n|----------|-------|\n| Fill | #e2e8f0 (Neutral.100) or #f1f5f9 |\n| Text color | #94a3b8 (muted) |\n| Border | #cbd5e1 (light gray) |\n\nAfter you add the Disabled variant, I can create Path1.2 with a Button.Option \"Set Location\" instance.\n\nWant me to wait for you to add the variant, or should we approach this differently?"

