text = "Yes, that's cleaner. Button.Option already has `State = Default | Selected`. Adding `Disabled` to that would give us:\n\n- **Default** - clickable, normal appearance\n- **Selected** - clicked/active state (orange background)\n- **Disabled** - grayed out, not clickable\n\nThen for Screen.NewSession:\n- Add Button.Option instance labeled \"Set Location\"\n- Path1.1: Disabled variant\n- Path1.2: Default variant (enabled, ready to click)\n\nLet me check current Button.Option structure:"

