[[body.segments]]
kind = "plain_text"
text = "So we have two systems that we are dealing with here. The whole system which may have UI using elmish, and the entire system that is doing everything, which a command might come from the UI machine, but might also come from external data being processed, or a decision maker like a set of code or even an AI. That top swim lane can be composed of several different \"decision makers\". In the UI machine, it can be considered it's own EventModel but also combined with the same timeline as the whole system EventModel. It's external connector would be through elmish cmd's as they would be outside the UI loop. When I have delt with elmish, I have tended to think of model as state. The msg is ambiguous to me. Maybe in the UI realm, intent or action is more appropriate. We reserve the command for when the UI is actually sending a command out to the whole system. Event is something that happened, and the UI will keep its own event log. Which it then derives state from (which state is a projection)."

