text = "**This is excellent!** The HTML export preserves layer names in multiple ways:\n\n**HTML Export Analysis:**\n\n| Source | Example | Notes |\n|--------|---------|-------|\n| CSS comments | `/* COMMAND */` | Exact original name |\n| HTML comments | `<!-- frame: COMMAND -->` | With element type |\n| CSS class | `c-o-m-m-a-n-d-2c06e1c89e64` | Slugified + UUID |\n| Text content | `<span>Name Entry Screen</span>` | For text elements |\n\n**Class name transformation:**\n- `COMMAND` → `c-o-m-m-a-n-d-` (all-caps gets letter-by-letter)\n- `Name Entry Screen` → `name-entry-` (normal kebab-case, truncated)\n\n**HTML export wins over SVG because:**\n1. Real `<div>` elements (can contain real `<input>`, `<button>`)\n2. Standard CSS/flexbox layout\n3. Layer names preserved in comments\n4. Much simpler DOM structure\n\n---\n\n**Revised approach:**\n\n```\nPenpot Board → Export HTML (Inspect tab) → Type Provider parses HTML → Typed Bolero components\n```\n\nType Provider could:\n1. Parse HTML comments to get `frame: X` and `text: X` mappings\n2. Extract class name + UUID for each element\n3. Generate typed accessors that find elements by class\n\n```fsharp\ntype NameEntryScreen = PenpotHtml<\"NameEntry.html\">\n\n// Generated:\n// NameEntryScreen.Command : HtmlElement\n// NameEntryScreen.NameEntryScreen : HtmlElement  \n// NameEntryScreen.EnterName : HtmlElement\n```\n\nDoes this direction feel right?"

