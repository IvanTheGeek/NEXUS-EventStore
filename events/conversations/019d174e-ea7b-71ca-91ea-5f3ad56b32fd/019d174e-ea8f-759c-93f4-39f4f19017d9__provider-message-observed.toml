text = "1) we should do the variants option. perhaps a button that has a disabled state. In the original concept, the submit button was disabled and showed what needed to be set in order to become active. Perhaps that same idea can be done here. In order to [Set Location] we need to have a location to set. This path is basic, in that we just enter text. future paths will allow the gps to match up to locations (a list) as well as typing in will search the list and show options as well, and we will need to offer a add new location. So I am sure we will be revisiting this. But for now, we can do just the text entry."

