kind = "plain_text"
text = "Scott Wlaschin - \"Domain Modeling Made Functional\" and F# for Fun and Profit.\n\nKey principles I'm connecting to:\n\n**\"Make illegal states unrepresentable\"**\n```fsharp\n// Bad: runtime check needed\ntype Entry = { MachineType: string }  // \"washer\"? \"Washer\"? \"wash\"?\n\n// Good: compiler enforces\ntype MachineType = Washer | Dryer | Supplies\ntype Entry = { MachineType: MachineType }\n```\n\n**\"Types are documentation\"**\nThe types ARE the spec. If someone asks \"what machines does LaundryLog support?\" - look at the type, not a wiki page.\n\n**\"If it compiles, it's correct\"**\nWhich is exactly why putting bindings in F# code matters:\n```fsharp\n// Compiler proves this references a real message\n\"Button.GPS\", Cmd Msg.UseGPSLocation\n\n// Typo? Compiler error. Removed message? Compiler error.\n```\n\n**\"The domain model is the single source of truth\"**\nNot the database schema. Not the UI. Not the API. The domain types.\n\n---\n\nIs that the alignment you mean? Or are you pointing to something more specific from Scott's work?"

