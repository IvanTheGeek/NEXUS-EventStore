text = "---\n\n## Finding: Variant Creation Not Available via Plugin API\n\nAfter researching the Penpot plugin API, I've confirmed that **variant creation is not exposed programmatically**. The API supports:\n\n- Creating components: `penpot.library.local.createComponent([shapes])`\n- Getting component instances: `component.instance()`\n- Reading component properties\n\nBut **NOT**:\n- Creating variants from existing components\n- Combining components as variants\n- Setting variant properties\n\n### Variants Can Only Be Created via UI\n\nFrom the documentation, there are two UI methods:\n\n**Method 1: Create Variant from Component**\n1. Select main component on canvas\n2. Ctrl+K or right-click → \"Create variant\"\n3. New variant appears in purple-bordered area\n4. Define properties in Design panel\n\n**Method 2: Combine Existing Components as Variants**\n1. Select both `Button.Option` and `Button.Option.Selected` on Components page\n2. Right-click → \"Combine as variants\"\n3. Property names/values generated from component names\n4. Clean up property name to \"State\" with values \"Default\", \"Selected\"\n\n---\n\n## Recommendation\n\n**Do Method 2 manually in Penpot:**\n\n1. Go to **Components** page\n2. Select both `Button.Option` AND `Button.Option.Selected` (Ctrl+click)\n3. Right-click → **\"Combine as variants\"**\n4. They'll merge into one component with variants\n5. Edit the property:\n   - Property name: `State`\n   - Values: `Default`, `Selected`\n\nThis takes about 30 seconds in the UI and gives you proper variants.\n\n---\n\n## What I CAN Help With After\n\nOnce you've combined them as variants, I can:\n- Create path screens that use the component\n- Help switch variant states in instances (if the API supports that)\n- Document the pattern for future components\n\n---\n\nWould you like to do this in the UI now? Let me know when done and I'll verify the result and we can proceed with Path 1."

