text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"11\\u00B7 Components\",\"url\":\"https://help.penpot.app/user-guide/components/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"You can create variants from an existing component or from another variant: From a component: Press Ctrl \\u002B K or right-click and select the menu option Create variant. From a variant: Select the variant and press Ctrl \\u002B K or right-click and select ...\\n\\nFrom Design tab: If conditions are met, a Combine as variants button appears on the component card. ... Components must be on the same page. Components that already have variants cannot be combined. ... A variant area is created containing all former components. Property names and values are generated from the component names. ... Drag it outside the variant area (Design viewport or Layers panel). Cut and paste it outside the variant area. The new component\\u2019s name includes the original component name and the variant\\u2019s property values.\\n\\nA key benefit of variants is the ability to preserve overrides when you switch between them. An override is a specific change you make to a component instance that diverges from its original definition (e.g., changing text content or a specific color). Layers between variants are considered connected if they: Share the same name. Are the same type. Rectangle, ellipse, paths, and boolean operations count as the same type. Have the same hierarchy level. Groups, boards, and layouts are considered equivalent. Example: If Variant 1 has a text layer named label with red color, and you change its content to Click here in an instance, then switch to Variant 2 (which also has a label text layer), the Click here content will be preserved, and Variant 2\\u2019s color will be applied. Changing any of these (e.g., renaming or grouping a layer) breaks the connection, but reverting the change will restore it.\\n\\nA component\\u2019s variants are organized by properties and their values. Properties define the dimensions that distinguish your variants (for example: Color, Size, State). Values are the specific options within a property (for example: Primary/Secondary, Small/Large, Default/Hover/Pressed) Each variant is simply one unique combination of values across all properties (for example, Color=Primary \\u002B Size=Small \\u002B State=Hover). Variants must have at least one property, and property values should be kept consistent to make switching predictable and to preserve overrides across connected layers. You can create variants from an existing component or from another variant: From a component: Press Ctrl \\u002B K or right-click and select the menu option Create variant. From a variant: Select the variant and press Ctrl \\u002B K or right-click and select the menu option Create variant.\\n\\nTip: The first options shown to swap a component are the ones at the same level inside the assets library, so group them properly. Variants allow you to group similar components, such as buttons, icons, or toggles, into a single, customizable component. Rather than navigating through separate components for every possible state, size, or style, you can manage them all from one unified component using clearly defined properties. Imagine a single button component that can switch between primary and secondary styles, active and disabled states, and small to large sizes. Useful, right? That\\u2019s the power of Variants. Cleaner libraries Keep related designs organized in the Design viewport, Layers panel, and swap menu. Variants streamline your components into tidy, manageable sets, allowing you to retain overrides when switching between them. Faster design workflows Make it easier to find and select the right version by quickly switching between states or styles using simple property controls.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/user-guide/components/\"}},{\"type\":\"knowledge\",\"title\":\"3.10. UI Guide\",\"url\":\"https://help.penpot.app/technical-guide/developer/ui/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"We can leverage component tokens to easily implement variants as explained here. Please refer to the Storybook documentation for icons and other SVG assets (logos, illustrations, etc.). We use Storybook to implement and showcase the components of the Design System. The Storybook is available at the /storybook path in the URL for each environment. For instance, the one built out of our develop branch is available at hourly.penpot.dev/storybook. Use yarn watch:storybook to develop the Design System components with the help of Storybook. \\u26A0\\uFE0F WARNING: Do stop any existing Shadow CLJS and asset compilation jobs (like the ones running at tabs 0 and 1 in the devenv tmux), because watch:storybook will spawn their own. You should add a Storybook file for each design system component you implement. This is a .jsx file located at the same place as your component file, with the same name.\\n\\nIn addition to the above, you also need to specifically export the new component with a JavaScript-friendly name in frontend/src/app/main/ui/ds.cljs. ... Primary tokens, referring to raw values (i.e. pixels, hex colors, etc.) of color, sizes, borders, etc. These are implemented as Sass variables. Examples are: $mint-250, $sz-16, $br-circle, etc. Semantic tokens, used mainly for theming. These are implemented with CSS custom properties. Depending on the theme, these semantic tokens would have different primary tokens as values. For instance, --color-accent-primary is $purple-700 when the light theme is active, but $mint-150 in the default theme. These custom properties have global scope. Component tokens, defined at component level as CSS custom properties. These are very useful when implementing variants. Examples include --button-bg-color or --toast-icon-color.\\n\\nThe UI in Penpot uses React v18 , with the help of rumext for providing Clojure bindings. See Rumext\\u0027s User Guide to learn how to create React components with Clojure. We want to hold our UI code to the same quality standards of the rest of the codebase. In practice, this means: UI components should be easy to maintain over time, especially because our design system is ever-changing. We need to apply the rules for good software design: The code should adhere to common patterns. UI components should offer an ergonomic \\u0022API\\u0022 (i.e. props). UI components should favor composability. Try to have loose coupling. Composability is a common pattern in the Web. We can see it in the standard HTML elements, which are made to be nested one inside another to craft more complex content. Standard Web components also offer slots to make composability more flexible.\\n\\nWe can leverage component tokens to easily implement variants as explained here. Please refer to the Storybook documentation for icons and other SVG assets (logos, illustrations, etc.). We use Storybook to implement and showcase the components of the Design System. The Storybook is available at the /storybook path in the URL for each environment. For instance, the one built out of our develop branch is available at hourly.penpot.dev/storybook. Use yarn watch:storybook to develop the Design System components with the help of Storybook. \\u26A0\\uFE0F WARNING: Do stop any existing Shadow CLJS and asset compilation jobs (like the ones running at tabs 0 and 1 in the devenv tmux), because watch:storybook will spawn their own. You should add a Storybook file for each design system component you implement. This is a .jsx file located at the same place as your component file, with the same name.\\n\\n.toast { // common styles for all toasts // ... --toast-bg-color: var(--color-background-primary); --toast-icon-color: var(--color-foreground-secondary); // ... more variables here background-color: var(--toast-bg-color); } .toast-icon { color: var(--toast-bg-color); } .toast-info { --toast-bg-color: var(--color-background-info); --toast-icon-color: var(--color-accent-info); // ... override more variables here } .toast-error { --toast-bg-color: var(--color-background-error); --toast-icon-color: var(--color-accent-error); // ... override more variables here } // ... more variants here \\u00B7 All UI code must be accessible. Ensure that your components are designed to be usable by people with a wide range of abilities and disabilities. When developing UI components in Penpot, we believe it is crucial to ensure that our frontend code is semantic and follows HTML conventions. Semantic HTML helps improve the readability and accessibility of Penpot. Use appropriate HTML tags to define the structur\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/technical-guide/developer/ui/\"}},{\"type\":\"knowledge\",\"title\":\"2. Create a Plugin\",\"url\":\"https://help.penpot.app/plugins/create-a-plugin/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Dive into Penpot plugin development! This guide covers creating plugins from scratch or using templates, libraries, API communication, \\u0026amp; deployment.\\n\\nTypical use cases: viewing shapes, pages, or other design elements in a project; accessing the properties and settings of content within the application. content:write: Allows writing or modifying content-related data. Grants write access to all endpoints and operations dealing with content modifications, except those marked as read-only. Typical use cases: adding, updating, or deleting shapes and elements in a design; uploading media or other assets to the project. user:read: Allows reading of user-related data. Grants read access to all endpoints and operations dealing with user data. Typical use cases: viewing user profiles and their associated information or listing active users in a particular context or project. library:read: Allows reading of library-related data and assets. Grants read access to all endpoints and operations dealing with the library context. Typical use cases: accessing shared design elements and components from a library or viewing the details and properties of\\n\\nServing an application: This refers to making your application accessible over a network, typically for testing or development purposes. When using a tool like live-server, a local web server is created on your machine, which serves your application files over HTTP. Most modern frameworks offer their own methods for serving applications, and there are build tools like Vite and Webpack that can handle this process as well. You don\\u0027t need to deploy your plugin just to test it. Locally serving your plugin is compatible with https://penpot.app/. However, be mindful of potential CORS (Cross-Origin Resource Sharing) issues. To avoid these, ensure your plugin includes the appropriate cross-origin headers. (Find more info about this at the Deployment step) Serving your plugin will generate a URL that looks something like http://localhost:XXXX, where XXXX represents the port number on which the plugin is served.\\n\\nlibrary:write: Allows writing or modifying library-related data and assets. Grants write access to all endpoints and operations dealing with library modifications. Typical use cases: adding new components or assets to the library or updating or removing existing library elements. comment:read: Allows reading of comment-related data. Grants read access to all endpoints and operations dealing with comments. Typical use cases: viewing comments on pages; accessing feedback or annotations provided by collaborators in the project. comment:write: Allows writing or modifying comment-related data. Grants write access to all endpoints and operations dealing with creating, replying, or deleting comments. Typical use cases: adding new comments to pages; deleting existing comments; replying to comments within the project\\u0027s context. allow:downloads: Allows downloading of the project file.\\n\\nFollow to the next section to understand how to bootstrap a new plugin using one of the three major JavaScript frameworks. Create your own app with the framework of your choice. See examples for each framework here ... There are two libraries that can help you with your plugin\\u0027s development. They are @penpot/plugin-styles and @penpot/plugin-types. @penpot/plugin-styles contains styles to help build the UI for Penpot plugins. To check the styles go to Plugin styles. ... You can add the styles to your global CSS file. ... If you\\u0027re using typescript, don\\u0027t forget to add @penpot/plugin-types to your typings in your tsconfig.json. { \\u0022compilerOptions\\u0022: { [...] \\u0022typeRoots\\u0022: [\\u0022./node_modules/@types\\u0022, \\u0022./node_modules/@penpot\\u0022], \\u0022types\\u0022: [\\u0022plugin-types\\u0022], } } A plugin file is needed to interact with Penpot and its API. You can use either javascript or typescript and it can be placed wherever you like.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/plugins/create-a-plugin/\"}},{\"type\":\"knowledge\",\"title\":\"3.04. Common Guide\",\"url\":\"https://help.penpot.app/technical-guide/developer/common/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"(ns app.common-tests.sample-compositions-test (:require [app.common.test-helpers.compositions :as tho] [app.common.test-helpers.files :as thf])) (t/deftest test-create-composition (let [f1 (-\\u0026gt; (thf/sample-file :file1) (tho/add-simple-component-with-copy :component1 :main-root :main-child :copy-root))] (ctf/dump-file f1 :show-refs? true))) ;; {:main-root} [:name Frame1] # [Component :component1] ;; :main-child [:name Rect1] ;; ;; :copy-root [:name Frame1] #--\\u0026gt; [Component :component1] :main-root ;; \\u0026lt;no-label\\u0026gt; [:name Rect1] ---\\u0026gt; :main-child \\u00B7 You can see more examples of usage by looking at the existing unit tests.\\n\\nAlso there are functions to make some transformations, like creating a component, instantiating it or swapping a copy. (ns app.common-tests.sample-components-test (:require [app.common.test-helpers.components :as thc] [app.common.test-helpers.files :as thf] [app.common.test-helpers.shapes :as ths])) (t/deftest test-create-component (let [;; Create a file with one component f1 (-\\u003E (thf/sample-file :file1) (ths/add-sample-shape :frame1 :type :frame) (ths/add-sample-shape :rect1 :type :rect :parent-label :frame1) (thc/make-component :component1 :frame1))])) Finally, there are composition helpers, to build typical structures with a single line of code.\\n\\nUsing the app.common.spec/assert macro. This macro is based in cojure.spec.alpha/assert macro, and it\\u0027s also ignored in a production environment. The Penpot variant doesn\\u0027t have any runtime checks to know if asserts are disabled. Instead, the assert calls are completely removed by the compiler/runtime, thus generating simpler and faster code in production builds. ... (require \\u0027[clojure.spec.alpha :as s] \\u0027[app.common.spec :as us]) (s/def ::number number?) (us/assert ::number 3) An assertion type that is always executed. ... This macro enables you to have assertions on production code, that generate runtime exceptions when failed (make sure you handle them appropriately). We expect all Penpot code (either in frontend, backend or common subsystems) to have unit tests, i.e. the ones that test a single unit of code, in isolation from other blocks. Currently we are quite far from that objective, but we are working to improve this.\\n\\n(ns app.common-tests.sample-compositions-test (:require [app.common.test-helpers.compositions :as tho] [app.common.test-helpers.files :as thf])) (t/deftest test-create-composition (let [f1 (-\\u003E (thf/sample-file :file1) (tho/add-simple-component-with-copy :component1 :main-root :main-child :copy-root))] (ctf/dump-file f1 :show-refs? true))) ;; {:main-root} [:name Frame1] # [Component :component1] ;; :main-child [:name Rect1] ;; ;; :copy-root [:name Frame1] #--\\u003E [Component :component1] :main-root ;; \\u003Cno-label\\u003E [:name Rect1] ---\\u003E :main-child \\u00B7 You can see more examples of usage by looking at the existing unit tests.\\n\\nThe configuration is made in log4j2.xml file. The Logger used for this is named \\u0022app\\u0022 (there are other loggers for other subsystems). The default configuration just outputs all traces of level debug or higher to the console standard output. There is a different log4j2-devenv for the development environment. This one outputs traces of level trace or higher to a file, and debug or higher to a zmq queue, that may be subscribed for other parts of the application for further processing. The ouput for a trace in logs/main.log uses the format \\u00B7 [\\u003Cdate time\\u003E] : \\u003Clevel\\u003E \\u003Cnamespace\\u003E - \\u003Ckey1=val1\\u003E \\u003Ckey2=val2\\u003E ... ... The zmq queue is not used in the default on premise or devenv setups, but there are a number of handlers you can use in custom instances to save errors in the database, or send them to a Sentry or similar service, for example. In the Clojurescript subservices, we use goog.log library.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/technical-guide/developer/common/\"}},{\"type\":\"knowledge\",\"title\":\"4. API\",\"url\":\"https://help.penpot.app/plugins/api/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Create, deploy, and use the Penpot plugin API with our comprehensive documentation. Get started today and expand Penpot\\u0026#x27;s capabilities.\\n\\nWe\\u0027ve got all the documentation you need for the API right here.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/plugins/api/\"}},{\"type\":\"knowledge\",\"title\":\"Plugins\",\"url\":\"https://help.penpot.app/plugins/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Get started with Penpot Plugins: Installation, development, and deployment. Access API documentation, examples, templates, and FAQs.\\n\\nAccess detailed documentation on the plugins API for integration and development. Find examples and starter templates in different frameworks. Get quick answers to common questions and troubleshooting tips.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/plugins/\"}},{\"type\":\"knowledge\",\"title\":\"1. Getting started\",\"url\":\"https://help.penpot.app/plugins/getting-started/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"This ensures that TypeScript can fully understand and work with the API. You can install the package in any project with npm install @penpot/plugin-types. You can check the details in @penpot/plugin-types package.\\n\\nTypical use cases: viewing shapes, pages, or other design elements in a project; accessing the properties and settings of content within the application. content:write: Allows writing or modifying content-related data. Grants write access to all endpoints and operations dealing with content modifications, except those marked as read-only. Typical use cases: adding, updating, or deleting shapes and elements in a design; uploading media or other assets to the project. user:read: Allows reading of user-related data. Grants read access to all endpoints and operations dealing with user data. Typical use cases: viewing user profiles and their associated information or listing active users in a particular context or project. library:read: Allows reading of library-related data and assets. Grants read access to all endpoints and operations dealing with the library context. Typical use cases: accessing shared design elements and components from a library or viewing the details and properties of\\n\\nThis ensures that TypeScript can fully understand and work with the API. You can install the package in any project with npm install @penpot/plugin-types. You can check the details in @penpot/plugin-types package.\\n\\nPenpot\\u0027s plugin system allows you to add new features to the platform through independent modules called plugins. These plugins run separately from the main Penpot app, inside iframes, which are like small, isolated browser windows within the app. Plugins communicate with Penpot by sending and receiving messages through the iframe. The manifest.json file contains the basic information about the plugin. It defines the plugin\\u0027s name, description, the main code file, and the permissions it requires.\\n\\nPlugins can be created with your favorite framework or with not framework at all. Feel free to use whatever you want because Plugins are independent from Penpot\\u0027s code and therefore you don\\u0027t need any extra knowledge. The plugins will be hosted outside Penpot, and each creator need to host theirs. Basic experience with Penpot. Basic experience with JavaScript, HTML and CSS. Node and npm (How to install Node.js). A text editor, ideally an IDE like Visual Studio Code or similar. ... Git basic knowledge. A Github account or a similar service to host and share your plugin code. TypeScript basic knowledge. Experience with any front framework (angular, react, vue...) for complex user interfaces. A hosting service of your choice for plugin\\u0027s deployment. With the plugins system enabled, you need to go to any project to open the plugin manager. You can open the plugin manager in any project via: ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/plugins/getting-started/\"}},{\"type\":\"knowledge\",\"title\":\"5. Examples and templates\",\"url\":\"https://help.penpot.app/plugins/examples-templates/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"// just replace penpot.library.local.createColor(); // for penpot.library.local.createTypography(); ... Penpot has dark and light modes, and you can easily add this to your plugin so your interface adapts to both themes. When you add theme support, your plugin will automatically sync with Penpot\\u0026#x27;s interface settings, so the user experience is consistent no matter which mode is selected. This makes your plugin look better and also ensures it stays in line with Penpot\\u0026#x27;s overall design. Just a heads-up: if you use the plugin-styles library, many elements will automatically adapt to dark or light mode without any extra effort from you. However, if you need to customize specific elements, be sure to use the selectors provided in the styles.css of the example. ... Often, we want to make our plugins better by adding external libraries, new features, and functionalities. Here\\u0026#x27;s an example of how to use the Picsum library. It shows how you can use third-party APIs to make your plugin developmen\\n\\nGrid Layout lets you create flexible designs that automatically adapt to different screen sizes and content changes. You can easily resize, fit, and fill content and containers with this feature, so you don\\u0027t have to make manual adjustments and you get a seamless, responsive design experience. ... Using components is a great way to reuse objects or groups of objects, making sure everything looks the same and works well across your designs. This example shows you how to create a component, which lets you make your workflow easier by defining reusable design elements. Just a friendly reminder that it\\u0027s important to have the library permissions in the manifest.json. ... Having quick access to your go-to colors and fonts can really help you work more efficiently, letting you build a solid set of assets with minimal effort. In this example, you\\u0027ll see how to add a color to your library, so you\\u0027ll have instant access whenever you need it.\\n\\nAs we mentioned in the Create a plugin section, we\\u0027ve got two great options for you to get started with your plugin. The first is a basic Typescript template with all the essential structure you\\u0027ll need. The second is the same, but uses one of the most popular frameworks like Angular, Vue, or React. We\\u0027ve included links to the repositories below: ...\\n\\nWe hope this makes it easier for you to create your plugins! If you just want to get to the examples, you can go straight to the repository here \\u00B7 One of the most basic things you can do in design is create a shape. It\\u0027s really simple. In this example, we\\u0027ll show you how to make a rectangle, but you can use the same principles to make other shapes. This makes it easy for you to add different shapes to your design, which is great for building more complex elements and layouts. // just replace penpot.createRectangle(); // for one of these other options: penpot.createEllipse(); penpot.createPath(); penpot.createBoard(); ... You\\u0027ll learn how to insert text and explore a variety of styling options to customize it to your exact preferences. You\\u0027ll discover how to adjust font, size, color, and more to create visually engaging text elements. You can also apply multiple styles within a single text string by styling different sections individually, giving you even greater control over your text \\n\\n// just replace penpot.library.local.createColor(); // for penpot.library.local.createTypography(); ... Penpot has dark and light modes, and you can easily add this to your plugin so your interface adapts to both themes. When you add theme support, your plugin will automatically sync with Penpot\\u0027s interface settings, so the user experience is consistent no matter which mode is selected. This makes your plugin look better and also ensures it stays in line with Penpot\\u0027s overall design. Just a heads-up: if you use the plugin-styles library, many elements will automatically adapt to dark or light mode without any extra effort from you. However, if you need to customize specific elements, be sure to use the selectors provided in the styles.css of the example. ... Often, we want to make our plugins better by adding external libraries, new features, and functionalities. Here\\u0027s an example of how to use the Picsum library. It shows how you can use third-party APIs to make your plugin developmen\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/plugins/examples-templates/\"}},{\"type\":\"knowledge\",\"title\":\"6. FAQ\",\"url\":\"https://help.penpot.app/plugins/faq/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"The plugin styles library is not obligatory, although we recommend its use because it\\u0026#x27;ll help you with the dark and light theming and to maintain the Penpot look-and-feel. Absolutely! You can definitely create flows and interactions in the same elements as in the interface, like frames, shapes, and groups. Just check out the API documentation for the methods: createFlow, addInteraction, or removeInteraction. And if you need more help, you can always check out the PenpotFlow or PenpotInteraction interfaces. There are no set requirements. However, we can recommend the use of eslint or prettier, which is what we use. No, it\\u2019s completely optional, in fact, we have an example of a plugin without UI. Try the plugin using this url to install it: https://create-palette-penpot-plugin.pages.dev/assets/manifest.json or check the code here ... Take a look at the Penpot Library methods in the API documentation or this simple example.\\n\\nIt\\u2019s not obligatory but keep in mind that the containing modal will change colors automatically to match Penpot\\u2019s theme. Check this example on how to apply dark and light themes to your plugin. By the time being any and all plugins must be hosted independently and outside the Penpot environment. Check the documentation for a guide on how to deploy your plugin on some deployment services like Netlify or Cloudflare. No. The feature set of figma and penpot are not the same so it\\u2019s not compatible. You can make it any size since it will be automatically adjusted to 56x56 px in the plugin manager modal. Just make sure to keep it square size. The name of the plugin should be short and followed by the suffix \\u2018-plugins\\u2019, like \\u2018shape-remover-plugin\\u2019. Any framework you are familiar with would be a good choice. Our examples are in vue, angular and react.\\n\\nThe plugin styles library is not obligatory, although we recommend its use because it\\u0027ll help you with the dark and light theming and to maintain the Penpot look-and-feel. Absolutely! You can definitely create flows and interactions in the same elements as in the interface, like frames, shapes, and groups. Just check out the API documentation for the methods: createFlow, addInteraction, or removeInteraction. And if you need more help, you can always check out the PenpotFlow or PenpotInteraction interfaces. There are no set requirements. However, we can recommend the use of eslint or prettier, which is what we use. No, it\\u2019s completely optional, in fact, we have an example of a plugin without UI. Try the plugin using this url to install it: https://create-palette-penpot-plugin.pages.dev/assets/manifest.json or check the code here ... Take a look at the Penpot Library methods in the API documentation or this simple example.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/plugins/faq/\"}},{\"type\":\"knowledge\",\"title\":\"18\\u00B7 Plugins\",\"url\":\"https://help.penpot.app/user-guide/plugins/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Plugins are the perfect tool to extend Penpot\\u0026#x27;s functionalities. You can install available plugins or create one that fits your needs!\\n\\nPlugins are the perfect tool to extend Penpot\\u0027s functionalities. You can install available plugins or create one that fits your needs!\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/user-guide/plugins/\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"715daa00-eacd-4857-ad36-5bd6c6cdfde8\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integratio