[[body.segments]]
kind = "plain_text"
text = "1. We might do laundry once per week in general. A session is mainly for convivence of me (or wife or whoever) the user so as to have the goal of a log of when and where the expenses happened for proof to IRS (audit). So setting the location is mainly for documentation purposes. For the app, once set, it is just to make it easier and quicker to add the individual transactions. When we do laundry, it is usually in batches of loads \"while we are doing laundry\". So a session is usually 3 or 4 hours based on the machines available and the amount of loads we need to do. So a timeout from last entry is probably the best way to define a session. Maybe 3 hours from last entry. 2. no, a session will be at one location. 3. closing and reopening will be a common occurrence during a session. 4. I think a small indication of the location down in the session details area would be a good thing."

