text = "{\"start_timestamp\":\"2025-12-01T04:10:11.648601Z\",\"stop_timestamp\":\"2025-12-01T04:10:14.780317Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"penpot:execute_code\",\"input\":{\"code\":\"\\n// Check current page and get overview of structure\\nconst pages = penpotUtils.getPages();\\nconst currentPage = penpot.currentPage;\\n\\nreturn {\\n    connected: true,\\n    pages: pages,\\n    currentPage: currentPage ? { id: currentPage.id, name: currentPage.name } : null,\\n    selection: penpot.selection.map(s =\\u003E ({ id: s.id, name: s.name, type: s.type }))\\n};\\n\"},\"message\":\"execute_code\",\"integration_name\":\"penpot\",\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

