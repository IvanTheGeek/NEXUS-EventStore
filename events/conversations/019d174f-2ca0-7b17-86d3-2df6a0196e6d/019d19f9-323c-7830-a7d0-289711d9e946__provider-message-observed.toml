text = "Below is a **text version first (your guiding format)** followed by a **Mermaid diagram** that follows the same structure.\n\nThe slices **alternate** exactly as you described:\n\n- **Command slices:** `UI → Command → Event`\n- **Projection slices:** `UI ← Projection ← Event`\n\n---\n\n# Text representation (slice naming style)\n\n```\nSlice 1 | Tap Expense → LogLaundryExpense → LaundryExpenseLogged\n\nSlice 2 | View History ← ExpenseHistoryProjection ← LaundryExpenseLogged\n\nSlice 3 | Tap Adjust Expense → AdjustLaundryExpense → LaundryExpenseAdjusted\n\nSlice 4 | View Monthly Totals ← MonthlyTotalsProjection ← LaundryExpenseAdjusted\n\nSlice 5 | Tap Delete Expense → DeleteLaundryExpense → LaundryExpenseDeleted\n\nSlice 6 | View Expense Summary ← ExpenseSummaryProjection ← LaundryExpenseDeleted\n```\n\nThis keeps your rule:\n\n```\nCommand Slice\nUI → Command → Event\n\nProjection Slice\nUI ← Projection ← Event\n```\n\n---\n\n# Mermaid version (3 commands + 3 projections)\n\n```mermaid\nflowchart TB\n\n%% ----- Slice 1 -----\nsubgraph S1[\"Slice 1\"]\ndirection LR\nUI1[\"Tap Expense\"]:::ui\nCMD1[\"LogLaundryExpense\"]:::command\nEVT1[\"LaundryExpenseLogged\"]:::event\nUI1 --> CMD1 --> EVT1\nend\n\n%% ----- Slice 2 -----\nsubgraph S2[\"Slice 2\"]\ndirection RL\nUI2[\"View History\"]:::ui\nPROJ2[\"ExpenseHistoryProjection\"]:::projection\nEVT2[\"LaundryExpenseLogged\"]:::event\nEVT2 --> PROJ2 --> UI2\nend\n\n%% ----- Slice 3 -----\nsubgraph S3[\"Slice 3\"]\ndirection LR\nUI3[\"Tap Adjust Expense\"]:::ui\nCMD3[\"AdjustLaundryExpense\"]:::command\nEVT3[\"LaundryExpenseAdjusted\"]:::event\nUI3 --> CMD3 --> EVT3\nend\n\n%% ----- Slice 4 -----\nsubgraph S4[\"Slice 4\"]\ndirection RL\nUI4[\"View Monthly Totals\"]:::ui\nPROJ4[\"MonthlyTotalsProjection\"]:::projection\nEVT4[\"LaundryExpenseAdjusted\"]:::event\nEVT4 --> PROJ4 --> UI4\nend\n\n%% ----- Slice 5 -----\nsubgraph S5[\"Slice 5\"]\ndirection LR\nUI5[\"Tap Delete Expense\"]:::ui\nCMD5[\"DeleteLaundryExpense\"]:::command\nEVT5[\"LaundryExpenseDeleted\"]:::event\nUI5 --> CMD5 --> EVT5\nend\n\n%% ----- Slice 6 -----\nsubgraph S6[\"Slice 6\"]\ndirection RL\nUI6[\"View Expense Summary\"]:::ui\nPROJ6[\"ExpenseSummaryProjection\"]:::projection\nEVT6[\"LaundryExpenseDeleted\"]:::event\nEVT6 --> PROJ6 --> UI6\nend\n\n%% Force vertical stacking\nS1 ~~~ S2\nS2 ~~~ S3\nS3 ~~~ S4\nS4 ~~~ S5\nS5 ~~~ S6\n\n\n%% Node styles\nclassDef ui fill:#dddddd,stroke:#333,stroke-width:1px;\nclassDef command fill:#cfe8ff,stroke:#333,stroke-width:1px;\nclassDef projection fill:#d8f5d0,stroke:#333,stroke-width:1px;\nclassDef event fill:#ffe6cc,stroke:#333,stroke-width:1px;\n\n%% Slice container colors\nstyle S1 fill:#eef6ff,stroke:#6aa9ff\nstyle S2 fill:#eefbe9,stroke:#7bc96f\nstyle S3 fill:#eef6ff,stroke:#6aa9ff\nstyle S4 fill:#eefbe9,stroke:#7bc96f\nstyle S5 fill:#eef6ff,stroke:#6aa9ff\nstyle S6 fill:#eefbe9,stroke:#7bc96f\n```\n\n---\n\n# What this now shows clearly\n\nYour **slice pattern** becomes obvious:\n\n```\nCommand Slice\nUI → Behavior → Event\n\nProjection Slice\nUI ← Behavior ← Event\n```\n\nAnd the slices alternate:\n\n```\nCommand\nProjection\nCommand\nProjection\nCommand\nProjection\n```\n\n---\n\n💡 One thing that becomes interesting once you see **6–10 slices like this**:\n\nThe **event names start forming a timeline of facts**, which is exactly what event modeling is trying to surface.\n\nExample emerging story:\n\n```\nLaundryExpenseLogged\nLaundryExpenseAdjusted\nLaundryExpenseDeleted\n```\n\nThis is the **domain narrative of the system**.\n\n---\n\nIf you'd like, I can also show a **very small naming trick Adam sometimes uses when naming slices** that makes the slice names themselves read like a **story of the system** rather than just numbered rows. It tends to make large boards much easier to read."

