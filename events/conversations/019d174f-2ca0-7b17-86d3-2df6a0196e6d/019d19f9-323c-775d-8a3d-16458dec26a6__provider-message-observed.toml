text = "Yes — **a .NET Polyglot Notebook (`.dib`) can absolutely run an external `.fsx` file**, and there are a few good patterns depending on how you want to structure your work. This fits very well with the **literate architecture + generated Mermaid** workflow you’re building.\n\n---\n\n# 1. The Simplest Way: `#load`\nThe normal F# scripting mechanism works inside Polyglot notebooks.\n\nIn an **F# cell**:\n\n```fsharp\n#load \"EventModel.fsx\"\n```\n\nThis loads the script and makes all functions/types available in the notebook.\n\nExample notebook cell:\n\n```fsharp\n#load \"EventModel.fsx\"\n\nlet diagram = Mermaid.render model\nprintfn \"%s\" diagram\n```\n\nYour folder might look like:\n\n```\n/notebook\n    EventModelTutorial.dib\n/model\n    EventModel.fsx\n/renderer\n    Mermaid.fsx\n```\n\nThen inside the notebook:\n\n```fsharp\n#load \"../model/EventModel.fsx\"\n#load \"../renderer/Mermaid.fsx\"\n```\n\n---\n\n# 2. A Clean Architecture for Your Project\nIf you keep expanding the event model tooling, a nice structure would be:\n\n```\nevent-model-lab/\n│\n├─ notebooks/\n│   EventModelTutorial.dib\n│\n├─ model/\n│   EventTypes.fsx\n│   Slice.fsx\n│   EventModel.fsx\n│\n├─ rendering/\n│   MermaidRenderer.fsx\n│\n└─ examples/\n    LaundryExample.fsx\n```\n\nThen your notebook loads everything:\n\n```fsharp\n#load \"../model/EventTypes.fsx\"\n#load \"../model/Slice.fsx\"\n#load \"../model/EventModel.fsx\"\n#load \"../rendering/MermaidRenderer.fsx\"\n#load \"../examples/LaundryExample.fsx\"\n```\n\nNow the notebook becomes:\n\n```\nMarkdown explanation\n↓\nF# code\n↓\nGenerated Mermaid\n↓\nRendered diagram\n```\n\nWhich is exactly the **literate modeling style** you're aiming for.\n\n---\n\n# 3. Even Better: Separate \"Model\" From \"Example\"\nYou might end up with something like:\n\n### `EventModel.fsx`\n\n```fsharp\ntype Slice =\n    { Name : string\n      UiAction : string\n      Command : string\n      Event : string\n      Projection : string option }\n\ntype EventModel =\n    { Slices : Slice list }\n```\n\n---\n\n### `MermaidRenderer.fsx`\n\n```fsharp\nmodule Mermaid\n\nlet renderSlice slice =\n    match slice.Projection with\n    | Some p ->\n        $\"{slice.UiAction} --> {slice.Command} --> {slice.Event} --> {p}\"\n    | None ->\n        $\"{slice.UiAction} --> {slice.Command} --> {slice.Event}\"\n\nlet render model =\n    model.Slices\n    |> List.map renderSlice\n    |> String.concat \"\\n\"\n    |> fun body -> $\"flowchart LR\\n{body}\"\n```\n\n---\n\n### `LaundryExample.fsx`\n\n```fsharp\nlet model =\n    { Slices =\n        [ { Name=\"Record Laundry Expense\"\n            UiAction=\"Tap Expense\"\n            Command=\"LogLaundryExpense\"\n            Event=\"LaundryExpenseLogged\"\n            Projection=None }\n\n          { Name=\"View Expense History\"\n            UiAction=\"Open Expense History\"\n            Command=\"\"\n            Event=\"LaundryExpenseLogged\"\n            Projection=Some \"ExpenseProjection\" } ] }\n```\n\n---\n\n# 4. Then the Notebook Cell\n\n```fsharp\n#load \"../model/EventModel.fsx\"\n#load \"../rendering/MermaidRenderer.fsx\"\n#load \"../examples/LaundryExample.fsx\"\n\nlet diagram = Mermaid.render model\ndiagram\n```\n\nThen the next cell:\n\n````markdown\n```mermaid\nflowchart LR\nTap Expense --> LogLaundryExpense --> LaundryExpenseLogged\nLaundryExpenseLogged --> ExpenseProjection\n```\n````\n\n---\n\n# 5. One Very Cool Notebook Trick\nYou can even generate the Mermaid block automatically:\n\n```fsharp\nlet mermaid diagram =\n    $\"```mermaid\\n{diagram}\\n```\"\n\nmermaid (Mermaid.render model)\n```\n\nNow the notebook **renders the diagram automatically**.\n\n---\n\n# 6. Why This Is a Really Good Direction\nThis gives you:\n\n| Feature | Benefit |\n|---|---|\nTyped F# model | domain correctness |\nExternal scripts | reusable architecture |\nNotebook | tutorial + exploration |\nMermaid output | visualization |\nDeterministic generation | no AI drift |\n\nSo your workflow becomes:\n\n```\nModel → F# types\n↓\nNotebook experimentation\n↓\nGenerate Mermaid\n↓\nRender diagram\n```\n\nThis is **very close to literate architecture modeling**.\n\n---\n\n# 7. One Thing to Watch Out For\nPolyglot notebooks resolve paths **relative to the notebook file**, not the working directory.\n\nSo prefer:\n\n```\n#load \"../model/EventModel.fsx\"\n```\n\ninstead of relying on current directory assumptions.\n\n---\n\n✅ **Short answer**\n\nYes. A Polyglot `.dib` notebook can run external `.fsx` files using `#load`, which makes them perfect for organizing:\n\n- event model types\n- rendering functions\n- example models\n- notebooks that generate Mermaid diagrams.\n\n---\n\nIf you'd like, I can also show you something that becomes **very powerful with your approach**:\n\nHow to build a **tiny Event Modeling DSL in F#** so slices can be written like this:\n\n```\nslice \"Record Laundry Expense\"\n    (ui \"Tap Expense\")\n    (command \"LogLaundryExpense\")\n    (event \"LaundryExpenseLogged\")\n```\n\n…and the notebook still generates the Mermaid diagram automatically."

