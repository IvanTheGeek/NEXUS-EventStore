[[body.segments]]
kind = "plain_text"
text = "It’s a small app I made to keep track of laundry when you’re on the road. Instead of trying to remember where you did laundry, how many machines you used, or how much you spent, you just log it quickly when you’re done — location, washer or dryer, how many loads, price, and how you paid. Over time it builds a simple history so you can see what you’ve spent and where you’ve done laundry before. It’s basically just a quick way to record laundry stops so you don’t have to keep it in your head."

