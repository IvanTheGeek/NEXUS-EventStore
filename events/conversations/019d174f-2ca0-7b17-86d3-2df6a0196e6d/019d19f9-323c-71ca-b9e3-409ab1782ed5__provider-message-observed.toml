text = "Yes 👍 — Mermaid **can color boxes**, and your slice layout can be adjusted exactly the way you described:\n\n- **Command slice:** left → right  \n- **Projection slice:** right → left  \n- **No vertical arrow between slices**  \n- **Colored box backgrounds by role**\n\nMermaid supports this using `classDef` styles.\n\nHere’s a clean version matching your requirements.\n\n```mermaid\nflowchart TB\n\n%% ----- Slice 1 : Command -----\nsubgraph S1[\"Slice 1 — Command\"]\ndirection LR\nUI1[\"UI<br>Tap Log Laundry Expense\"]:::ui\nCMD1[\"Command<br>LogLaundryExpense\"]:::command\nEVT1[\"Event<br>LaundryExpenseLogged\"]:::event\nUI1 --> CMD1 --> EVT1\nend\n\n%% ----- Slice 2 : Projection -----\nsubgraph S2[\"Slice 2 — Projection\"]\ndirection RL\nUI2[\"UI<br>View Expense History\"]:::ui\nPROJ2[\"Projection<br>ExpenseHistoryProjection\"]:::projection\nEVT2[\"Event<br>LaundryExpenseLogged\"]:::event\nEVT2 --> PROJ2 --> UI2\nend\n\n\n%% ----- Styles -----\nclassDef ui fill:#dddddd,stroke:#333,stroke-width:1px;\nclassDef command fill:#cfe8ff,stroke:#333,stroke-width:1px;\nclassDef projection fill:#d8f5d0,stroke:#333,stroke-width:1px;\nclassDef event fill:#ffe6cc,stroke:#333,stroke-width:1px;\n```\n\n### Color mapping you asked for\n\n| Type | Color |\n|---|---|\nUI | gray |\nCommand | light blue |\nProjection | light green |\nEvent | light orange |\n\n---\n\n### What this keeps visually consistent\n\nBecause of the `<br>` formatting:\n\n```\nUI | Behavior | Event\n```\n\ncolumns stay roughly aligned across slices.\n\nCommand slice:\n\n```\nUI → Command → Event\n```\n\nProjection slice:\n\n```\nEvent → Projection → UI\n```\n\n---\n\n### Resulting conceptual grid\n\n```\n           UI                Behavior                Event\n----------------------------------------------------------------\nSlice 1    Tap Expense  →    LogLaundryExpense  →    LaundryExpenseLogged\n\nSlice 2    View History ←    ExpenseProjection  ←    LaundryExpenseLogged\n```\n\nWhich matches exactly the **two slice types** in event modeling:\n\n```\nCommand slice  → produces event\nProjection slice ← consumes event\n```\n\n---\n\n### Small optional visual improvement\n\nIf you later add more slices, you can also add **column headers** above everything:\n\n```\nUI | Behavior | Event\n```\n\nThis tends to make the structure read instantly when diagrams get bigger.\n\n---\n\nIf you'd like, I can also show a **slightly more advanced Mermaid pattern** that makes this layout scale cleanly when you reach **10–20 slices** (which often happens quickly when modeling a system like LaundryLog)."

