text = "fileciteturn0file0\n\nYou are generating a **Mermaid flowchart diagram** that represents an **Event Modeling architecture** using **Command Slices** and **Projection Slices**.\r\n\r\nFollow these instructions **exactly**. The correctness of arrow direction is critical.\r\n\r\n---\r\n\r\n# Output Rules\r\n\r\nYour response must contain **only a Mermaid code block**.\r\n\r\nStart with:\r\n\r\n```mermaid\r\n```\r\n\r\nEnd with:\r\n\r\n```\r\n```\r\n\r\nDo **not** include explanations.\r\n\r\n---\r\n\r\n# Diagram Structure\r\n\r\nCreate a Mermaid diagram using:\r\n\r\n```\r\nflowchart TB\r\n```\r\n\r\nThe diagram contains **6 slices stacked vertically**.\r\n\r\nEach slice must be inside a **Mermaid subgraph**.\r\n\r\nUse this naming pattern:\r\n\r\n```\r\nS1\r\nS2\r\nS3\r\nS4\r\nS5\r\nS6\r\n```\r\n\r\nSlices must be vertically spaced using:\r\n\r\n```\r\nS1 ~~~ S2\r\nS2 ~~~ S3\r\nS3 ~~~ S4\r\nS4 ~~~ S5\r\nS5 ~~~ S6\r\n```\r\n\r\n---\r\n\r\n# Architectural Pattern\r\n\r\nThere are two slice types.\r\n\r\n## Command Slice\r\n\r\nStructure:\r\n\r\n```\r\nUI → Command → Event\r\n```\r\n\r\nMermaid code pattern:\r\n\r\n```\r\nUI --> Command --> Event\r\n```\r\n\r\nLayout direction:\r\n\r\n```\r\ndirection LR\r\n```\r\n\r\n---\r\n\r\n## Projection Slice\r\n\r\nStructure:\r\n\r\n```\r\nUI ← Projection ← Event\r\n```\r\n\r\nIMPORTANT:\r\n\r\nThe **actual Mermaid arrows must be written as**:\r\n\r\n```\r\nEvent --> Projection --> UI\r\n```\r\n\r\nLayout direction:\r\n\r\n```\r\ndirection RL\r\n```\r\n\r\nThis ensures the diagram visually renders as:\r\n\r\n```\r\nUI < Projection < Event\r\n```\r\n\r\n---\r\n\r\n# Visual Style\r\n\r\nNodes must look like **sticky notes**.\r\n\r\nUse these class definitions exactly:\r\n\r\n```\r\nclassDef ui fill:#dddddd,stroke:#888,stroke-width:1px,rx:6,ry:6\r\nclassDef command fill:#cfe8ff,stroke:#6aa9ff,stroke-width:1px,rx:6,ry:6\r\nclassDef projection fill:#d8f5d0,stroke:#7bc96f,stroke-width:1px,rx:6,ry:6\r\nclassDef event fill:#ffe6cc,stroke:#f0a35e,stroke-width:1px,rx:6,ry:6\r\n```\r\n\r\n---\r\n\r\n# Slice Container Colors\r\n\r\nCommand slices must use:\r\n\r\n```\r\nstyle S# fill:#f4f9ff,stroke:#6aa9ff,stroke-width:1px\r\n```\r\n\r\nProjection slices must use:\r\n\r\n```\r\nstyle S# fill:#f3fff0,stroke:#7bc96f,stroke-width:1px\r\n```\r\n\r\nReplace `#` with the slice number.\r\n\r\n---\r\n\r\n# Node Labeling Rule\r\n\r\nEach node label must contain **only the business name**.\r\n\r\nDo **not** include role labels like:\r\n\r\n```\r\nCommand:\r\nProjection:\r\nEvent:\r\nUI:\r\n```\r\n\r\nThe **color communicates the role**.\r\n\r\n---\r\n\r\n# Slice Definitions\r\n\r\n## Slice 1 — Command\r\n\r\nSubgraph title:\r\n\r\n```\r\nRecord Laundry Expense\r\n```\r\n\r\nFlow:\r\n\r\n```\r\nRecord Laundry Expense → LogLaundryExpense → LaundryExpenseLogged\r\n```\r\n\r\n---\r\n\r\n## Slice 2 — Projection\r\n\r\nSubgraph title:\r\n\r\n```\r\nView Expense History\r\n```\r\n\r\nFlow:\r\n\r\n```\r\nView Expense History ← ExpenseHistoryProjection ← LaundryExpenseLogged\r\n```\r\n\r\n(Remember: Mermaid arrows must be written Event → Projection → UI)\r\n\r\n---\r\n\r\n## Slice 3 — Command\r\n\r\nSubgraph title:\r\n\r\n```\r\nModify Laundry Expense\r\n```\r\n\r\nFlow:\r\n\r\n```\r\nModify Laundry Expense → EditLaundryExpense → LaundryExpenseEdited\r\n```\r\n\r\n---\r\n\r\n## Slice 4 — Projection\r\n\r\nSubgraph title:\r\n\r\n```\r\nView Updated Expense History\r\n```\r\n\r\nFlow:\r\n\r\n```\r\nView Updated Expense History ← ExpenseHistoryProjection ← LaundryExpenseEdited\r\n```\r\n\r\n---\r\n\r\n## Slice 5 — Command\r\n\r\nSubgraph title:\r\n\r\n```\r\nRemove Laundry Expense\r\n```\r\n\r\nFlow:\r\n\r\n```\r\nRemove Laundry Expense → DeleteLaundryExpense → LaundryExpenseDeleted\r\n```\r\n\r\n---\r\n\r\n## Slice 6 — Projection\r\n\r\nSubgraph title:\r\n\r\n```\r\nView Final Expense History\r\n```\r\n\r\nFlow:\r\n\r\n```\r\nView Final Expense History ← ExpenseHistoryProjection ← LaundryExpenseDeleted\r\n```\r\n\r\n---\r\n\r\n# Summary Rules\r\n\r\nCommand slice:\r\n\r\n```\r\nUI --> Command --> Event\r\ndirection LR\r\n```\r\n\r\nProjection slice:\r\n\r\n```\r\nEvent --> Projection --> UI\r\ndirection RL\r\n```\r\n\r\n---\r\n\r\n# Goal\r\n\r\nThe final diagram should visually resemble a **sticky-note Event Modeling board with alternating command and projection slices**."

