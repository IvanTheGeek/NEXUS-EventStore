text = "Yes — Mermaid **can style the slice containers (subgraphs)** as well as the boxes. That lets you:\n\n- remove **UI / Command / Projection / Event labels inside stickies**\n- rely on **color** instead\n- tint the **slice header box** to indicate the slice type\n\nThe trick is using **`style` on the subgraph ID**.\n\nHere’s a refined version matching what you described.\n\n```mermaid\nflowchart TB\n\n%% ----- Slice 1 : Command -----\nsubgraph S1[\"Slice 1\"]\ndirection LR\nUI1[\"Tap Log Laundry Expense\"]:::ui\nCMD1[\"LogLaundryExpense\"]:::command\nEVT1[\"LaundryExpenseLogged\"]:::event\nUI1 --> CMD1 --> EVT1\nend\n\n%% ----- Slice 2 : Projection -----\nsubgraph S2[\"Slice 2\"]\ndirection RL\nUI2[\"View Expense History\"]:::ui\nPROJ2[\"ExpenseHistoryProjection\"]:::projection\nEVT2[\"LaundryExpenseLogged\"]:::event\nEVT2 --> PROJ2 --> UI2\nend\n\n%% Force vertical stacking\nS1 ~~~ S2\n\n\n%% ----- Node Styles -----\nclassDef ui fill:#dddddd,stroke:#333,stroke-width:1px;\nclassDef command fill:#cfe8ff,stroke:#333,stroke-width:1px;\nclassDef projection fill:#d8f5d0,stroke:#333,stroke-width:1px;\nclassDef event fill:#ffe6cc,stroke:#333,stroke-width:1px;\n\n%% ----- Slice Container Styles -----\nstyle S1 fill:#eef6ff,stroke:#6aa9ff,stroke-width:1px\nstyle S2 fill:#eefbe9,stroke:#7bc96f,stroke-width:1px\n```\n\n### What changed\n\n**Stickies simplified**\n\nBefore:\n\n```\nCommand\nLogLaundryExpense\n```\n\nNow:\n\n```\nLogLaundryExpense\n```\n\nThe **color communicates the role**.\n\n---\n\n**Slice container colors**\n\n| Slice | Meaning | Color |\n|---|---|---|\nSlice 1 | Command slice | very light blue |\nSlice 2 | Projection slice | very light green |\n\n---\n\n### Resulting visual language\n\n```\nGRAY        = UI\nBLUE        = Command behavior\nGREEN       = Projection behavior\nORANGE      = Event fact\n```\n\nSlices then become **grouped behaviors**:\n\n```\n[ Light Blue Container ] = Command Slice\n[ Light Green Container ] = Projection Slice\n```\n\n---\n\n### This actually mirrors event modeling boards nicely\n\nEvent modeling boards usually encode meaning with **color first, text second**.\n\nYour refined diagram becomes closer to that:\n\n```\nUI → Command → Event\nUI ← Projection ← Event\n```\n\nwith colors acting as the **legend**.\n\n---\n\n### Small optional improvement (very nice visually)\n\nIf you want it to feel even more like sticky notes, you can add **rounded corners**:\n\n```\nrx:6, ry:6\n```\n\nto the class styles.\n\n---\n\nIf you'd like, I can also show a **final “polished” version of this diagram style** that makes the slices look **almost exactly like a miniature event-modeling board** (very clean when documenting systems with many slices)."

