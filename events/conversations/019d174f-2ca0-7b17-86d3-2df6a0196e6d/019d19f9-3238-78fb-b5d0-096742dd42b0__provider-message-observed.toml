kind = "plain_text"
text = "I am very early on and not only trying to design and build the app, but test and experiment about the NEXUS and event modeling domains and concepts. I am going to build in Penpot the first event model.  Basically as a white board tool. UI design will double over it as an added benefit. The app will be quite simple. the domain is quite simple. There will end up being several ways of approaching as a way to build the event model. This is the journey of having worked out what I want the primary screen of the app to be, we build an event model. Other ways might start with existing app, capture screen shots when state changes happen, and build what the commands,events, and projects might be, then rebuild the screen as a design in penpot, and etc. there are other workflows that can be taken to end up with the event model. \nI am going to manually build the screen in Penpot. So we need to work out what \"state\" that screen is in, as in what it look likes, and then what the command and event would be to be able to complete the vertical slice."

