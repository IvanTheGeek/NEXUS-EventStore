text = "{\"start_timestamp\":\"2026-03-10T02:27:58.982157Z\",\"stop_timestamp\":\"2026-03-10T02:28:02.587255Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":\"toolu_01V6AKCAPgJmboQbesyarVzL\",\"name\":\"eventlanes:update_spec\",\"input\":{\"id\":\"4ac7688e-79f1-436e-a7ca-b80b876530c1\",\"spec\":\"\\n# LaundryLog \\u2014 Basic Model (6 Slices)\\n\\nusr:User\\nui:Laundry Expense Screen(*screen)\\nui:Expense History View(*historyView)\\n\\n# Slice 1: Record Laundry Expense\\nUser -\\u003E *screen\\n*screen -\\u003E cmd:LogLaundryExpense(*logExpense)\\n*logExpense -\\u003E evt:LaundryExpenseLogged(*expLogged)\\n\\n# Slice 2: View Expense History\\n*expLogged -\\u003E rm:ExpenseHistoryProjection(*expHistory)\\n*expHistory -\\u003E *historyView\\n\\n# Slice 3: Modify Laundry Expense\\n*screen -\\u003E cmd:EditLaundryExpense(*editExpense)\\n*editExpense -\\u003E evt:LaundryExpenseEdited(*expEdited)\\n\\n# Slice 4: View Updated Expense History\\n*expEdited -\\u003E *expHistory\\n\\n# Slice 5: Remove Laundry Expense\\n*screen -\\u003E cmd:DeleteLaundryExpense(*deleteExpense)\\n*deleteExpense -\\u003E evt:LaundryExpenseDeleted(*expDeleted)\\n\\n# Slice 6: View Final Expense History\\n*expDeleted -\\u003E *expHistory\\n\",\"reason\":\"Basic 6-slice model from EM Data file example\"},\"message\":\"update_spec\",\"integration_name\":\"eventlanes\",\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":false}"

