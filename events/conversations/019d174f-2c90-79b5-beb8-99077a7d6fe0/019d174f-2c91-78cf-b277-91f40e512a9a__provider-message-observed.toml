text = "Yup, those are the alignments that I'm coming to, the realizations. And I'm going to be using Penpot for the event model until that functionality in the app itself of Atlas is built, just because it's better than Miro and that sort of thing. I think eventually, when Atlas is fully built out of my own, you know, my own design, my own specs, and my own build, as a standalone tool, that the event model won't be part of Penpot at all, but Penpot will still be a valuable tool because it's for the design of the screens, which is what it's intended for. The actual design of the, and the prototyping for the Paths would still be in Penpot. But the Patgs may actually end up still being just a projection of, yeah, that's probably the same idea. It'll be, it'll be a really, the source of truth will be the data file that's machine readable, and Atlas would have a viewer built in that, you know, would allow showing the paths and the progression and things like that. So absolutely. So really, Penpot is acting as a temporary tool and way to do things until Atlas can be conceived and figured out and specced. And then Penpot will be simply one design tool that could be Figma, could be Penpot. I probably won't do the Figma for, for uh the reasons you stated of open source and things, but I mean, potentially it could be."

