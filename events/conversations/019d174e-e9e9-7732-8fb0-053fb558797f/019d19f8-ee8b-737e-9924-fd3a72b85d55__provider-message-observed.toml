text = "context: When doing a laundry session, I would gather all the laundry as loads, haul them in to the facility (usually a truck stop, sometimes an actual laundromat), load the machines, and start activating them with payment. Then maybe go back to the truck, gather additional loads and haul those back in to start when the current batch is done washing. Move the wash to dryers, start those, then load the washers and start them, etc. This process might take 2 or 3 hours, sometimes longer if only one machine is available. My point is that the entire session might have many data entry times during it. All of this will happen at one location. It is usually only related to one date/day unless we cross over midnight during the process session. (session might not be the best term, just what comes to mind currently.) \nmore to come."

