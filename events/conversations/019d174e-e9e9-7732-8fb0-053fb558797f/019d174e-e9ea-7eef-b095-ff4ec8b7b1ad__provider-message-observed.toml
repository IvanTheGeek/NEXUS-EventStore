eField\\\\\\u0022\\\\n                               placeholder=\\\\\\u00220.00\\\\\\u0022 \\\\n                               inputmode=\\\\\\u0022decimal\\\\\\u0022\\\\n                               onfocus=\\\\\\u0022scrollPriceIntoView()\\\\\\u0022\\u003E\\\\n                    \\u003C/div\\u003E\\\\n                    \\u003Cbutton class=\\\\\\u0022quarter-btn\\\\\\u0022 onclick=\\\\\\u0022adjustPrice(0.25)\\\\\\u0022\\u003E\\\\n                        \\u003Cspan class=\\\\\\u0022quarter-sign\\\\\\u0022\\u003E\\u002B\\u003C/span\\u003E\\\\n                        \\u003Cspan class=\\\\\\u0022quarter-coin\\\\\\u0022\\u003E\\\\ud83e\\\\ude99\\u003C/span\\u003E\\\\n                    \\u003C/button\\u003E\\\\n                \\u003C/div\\u003E\\\\n\\\\n                \\u003Cdiv class=\\\\\\u0022quick-fill-buttons\\\\\\u0022\\u003E\\\\n                    \\u003Cbutton class=\\\\\\u0022quick-fill-btn\\\\\\u0022 onclick=\\\\\\u0022quickFillPrice(3.75)\\\\\\u0022\\u003E\\\\n                        $3.75\\\\n                        \\u003Cspan class=\\\\\\u0022quick-fill-label\\\\\\u0022\\u003ELast used\\u003C/span\\u003E\\\\n                    \\u003C/button\\u003E\\\\n                    \\u003Cbutton class=\\\\\\u0022quick-fill-btn\\\\\\u0022 onclick=\\\\\\u0022quickFillPrice(4.00)\\\\\\u0022\\u003E\\\\n                        $4.00\\\\n                        \\u003Cspan class=\\\\\\u0022quick-fill-label\\\\\\u0022\\u003EYour usual\\u003C/span\\u003E\\\\n                    \\u003C/button\\u003E\\\\n                    \\u003Cbutton class=\\\\\\u0022quick-fill-btn\\\\\\u0022 onclick=\\\\\\u0022quickFillPrice(3.50)\\\\\\u0022\\u003E\\\\n                        $3.50\\\\n                        \\u003Cspan class=\\\\\\u0022quick-fill-label\\\\\\u0022\\u003ECommunity\\u003C/span\\u003E\\\\n                    \\u003C/button\\u003E\\\\n                \\u003C/div\\u003E\\\\n            \\u003C/div\\u003E\\\\n\\\\n            \\u003Cdiv class=\\\\\\u0022entry-total\\\\\\u0022\\u003E\\\\n                \\u003Cspan class=\\\\\\u0022entry-total-label\\\\\\u0022\\u003EEntry Total\\u003C/span\\u003E\\\\n                \\u003Cspan class=\\\\\\u0022entry-total-amount\\\\\\u0022 id=\\\\\\u0022entryTotal\\\\\\u0022\\u003E$0.00\\u003C/span\\u003E\\\\n            \\u003C/div\\u003E\\\\n        \\u003C/div\\u003E\\\\n\\\\n        \\u003C!-- Payment Type Section --\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022form-section\\\\\\u0022\\u003E\\\\n            \\u003Cdiv class=\\\\\\u0022section-title\\\\\\u0022\\u003EPayment Type\\u003C/div\\u003E\\\\n            \\u003Cdiv class=\\\\\\u0022button-group button-group-4\\\\\\u0022\\u003E\\\\n                \\u003Cbutton class=\\\\\\u0022btn-option\\\\\\u0022 onclick=\\\\\\u0022selectPayment(\\u0027cash\\u0027)\\\\\\u0022\\u003E\\\\ud83d\\\\udcb5\\u003Cbr\\u003ECash\\u003C/button\\u003E\\\\n                \\u003Cbutton class=\\\\\\u0022btn-option\\\\\\u0022 onclick=\\\\\\u0022selectPayment(\\u0027points\\u0027)\\\\\\u0022\\u003E\\\\u2b50\\u003Cbr\\u003EPoints\\u003C/button\\u003E\\\\n                \\u003Cbutton class=\\\\\\u0022btn-option\\\\\\u0022 onclick=\\\\\\u0022selectPayment(\\u0027card\\u0027)\\\\\\u0022\\u003E\\\\ud83d\\\\udcb3\\u003Cbr\\u003ECard\\u003C/button\\u003E\\\\n                \\u003Cbutton class=\\\\\\u0022btn-option\\\\\\u0022 onclick=\\\\\\u0022selectPayment(\\u0027app\\u0027)\\\\\\u0022\\u003E\\\\ud83d\\\\udcf1\\u003Cbr\\u003EApp\\u003C/button\\u003E\\\\n            \\u003C/div\\u003E\\\\n        \\u003C/div\\u003E\\\\n\\\\n        \\u003Cbutton class=\\\\\\u0022submit-btn\\\\\\u0022 onclick=\\\\\\u0022logEntry()\\\\\\u0022\\u003ELog Entry\\u003C/button\\u003E\\\\n\\\\n        \\u003C!-- Session Total Bar --\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022session-total\\\\\\u0022\\u003E\\\\n            \\u003Cspan class=\\\\\\u0022session-total-label\\\\\\u0022\\u003ESession Total\\u003C/span\\u003E\\\\n            \\u003Cspan class=\\\\\\u0022session-total-amount\\\\\\u0022\\u003E$19.75\\u003C/span\\u003E\\\\n        \\u003C/div\\u003E\\\\n\\\\n        \\u003C!-- Recent Entries --\\u003E\\\\n        \\u003Cdiv class=\\\\\\u0022recent-entries\\\\\\u0022\\u003E\\\\n            \\u003Cdiv class=\\\\\\u0022entries-title\\\\\\u0022\\u003EToday\\u0027s Entries\\u003C/div\\u003E\\\\n            \\\\n            \\u003Cdiv class=\\\\\\u0022entry-card\\\\\\u0022\\u003E\\\\n                \\u003Cdiv class=\\\\\\u0022entry-header\\\\\\u0022\\u003E\\\\n                    \\u003Cdiv class=\\\\\\u0022entry-amount\\\\\\u0022\\u003E$11.25\\u003C/div\\u003E\\\\n                    \\u003Cdiv class=\\\\\\u0022entry-time\\\\\\u0022\\u003E2:34 PM\\u003C/div\\u003E\\\\n                \\u003C/div\\u003E\\\\n                \\u003Cdiv class=\\\\\\u0022entry-details\\\\\\u0022\\u003E\\\\n                    3 Washers @ $3.75 \\\\u2022 Credit Card\\\\n                \\u003C/div\\u003E\\\\n            \\u003C/div\\u003E\\\\n\\\\n            \\u003Cdiv class=\\\\\\u0022entry-card\\\\\\u0022\\u003E\\\\n                \\u003Cdiv class=\\\\\\u0022entry-header\\\\\\u0022\\u003E\\\\n                    \\u003Cdiv class=\\\\\\u0022entry-amount\\\\\\u0022\\u003E$6.00\\u003C/div\\u003E\\\\n                    \\u003Cdiv class=\\\\\\u0022entry-time\\\\\\u0022\\u003E2:38 PM\\u003C/div\\u003E\\\\n                \\u003C/div\\u003E\\\\n                \\u003Cdiv class=\\\\\\u0022entry-details\\\\\\u0022\\u003E\\\\n                    3 Dryers @ $2.00 \\\\u2022 Credit Card\\\\n                \\u003C/div\\u003E\\\\n            \\u003C/div\\u003E\\\\n\\\\n            \\u003Cdiv class=\\\\\\u0022entry-card\\\\\\u0022\\u003E\\\\n                \\u003Cdiv class=\\\\\\u0022entry-header\\\\\\u0022\\u003E\\\\n                    \\u003Cdiv class=\\\\\\u0022entry-amount\\\\\\u0022\\u003E$2.50\\u003C/div\\u003E\\\\n                    \\u003Cdiv class=\\\\\\u0022entry-time\\\\\\u0022\\u003E2:40 PM\\u003C/div\\u003E\\\\n                \\u003C/div\\u003E\\\\n                \\u003Cdiv class=\\\\\\u0022entry-details\\\\\\u0022\\u003E\\\\n                    1 Supplies @ $2.50 \\\\u2022 Cash\\\\n                \\u003C/div\\u003E\\\\n            \\u003C/div\\u003E\\\\n        \\u003C/div\\u003E\\\\n    \\u003C/div\\u003E\\\\n\\\\n    \\u003Cscript\\u003E\\\\n        let selectedMachine = null;\\\\n        let selectedPayment = null;\\\\n        let sessionTotal = 19.75;\\\\n\\\\n        function selectMachine(type) {\\\\n            selectedMachine = type;\\\\n            document.querySelectorAll(\\u0027.button-group-3 .btn-option\\u0027).forEach(btn =\\u003E {\\\\n                btn.classList.remove(\\u0027selected\\u0027);\\\\n            });\\\\n            event.target.classList.add(\\u0027selected\\u0027);\\\\n            calculateEntryTotal();\\\\n        }\\\\n\\\\n        function selectPayment(type) {\\\\n            selectedPayment = type;\\\\n            document.querySelectorAll(\\u0027.button-group-4 .btn-option\\u0027).forEach(btn =\\u003E {\\\\n                btn.classList.remove(\\u0027selected\\u0027);\\\\n            });\\\\n            event.target.classList.add(\\u0027selected\\u0027);\\\\n        }\\\\n\\\\n        function updateCounter(delta) {\\\\n            const quantityField = document.getElementById(\\u0027quantityField\\u0027);\\\\n            let currentValue = parseInt(quantityField.value) || 1;\\\\n            let newValue = Math.max(1, currentValue \\u002B delta);\\\\n            quantityField.value = newValue;\\\\n            calculateEntryTotal();\\\\n        }\\\\n\\\\n        function updateCounterFromInput() {\\\\n            const quantityField = document.getElementById(\\u0027quantityField\\u0027);\\\\n            let value = parseInt(quantityField.value) || 1;\\\\n            quantityField.value = Math.max(1, value);\\\\n            calculateEntryTotal();\\\\n        }\\\\n\\\\n        function adjustPrice(delta) {\\\\n            const priceField = document.getElementById(\\u0027priceField\\u0027);\\\\n            const currentPrice = parseFloat(priceField.value) || 0;\\\\n            const newPrice = Math.max(0, currentPrice \\u002B delta);\\\\n            priceField.value = newPrice.toFixed(2);\\\\n            calculateEntryTotal();\\\\n        }\\\\n\\\\n        function quickFillPrice(amount) {\\\\n            document.getElementById(\\u0027priceField\\u0027).value = amount.toFixed(2);\\\\n            calculateEntryTotal();\\\\n        }\\\\n\\\\n        function calculateEntryTotal() {\\\\n            const quantity = parseInt(document.getElementById(\\u0027quantityField\\u0027).value) || 1;\\\\n            const unitPrice = parseFloat(document.getElementById(\\u0027priceField\\u0027).value) || 0;\\\\n            const total = quantity * unitPrice;\\\\n            document.getElementById(\\u0027entryTotal\\u0027).textContent = \\u0027$\\u0027 \\u002B total.toFixed(2);\\\\n        }\\\\n\\\\n        function scrollQuantityIntoView() {\\\\n            // Scroll the quantity section to the top of the viewport to avoid keyboard covering it\\\\n            setTimeout(() =\\u003E {\\\\n                const quantitySection = document.getElementById(\\u0027quantitySection\\u0027);\\\\n                quantitySection.scrollIntoView({ behavior: \\u0027smooth\\u0027, block: \\u0027start\\u0027 });\\\\n            }, 300); // Small delay to allow keyboard to appear\\\\n        }\\\\n\\\\n        function scrollPriceIntoView() {\\\\n            // Scroll the price section to the top of the viewport to avoid keyboard covering it\\\\n            setTimeout(() =\\u003E {\\\\n                const priceSection = document.getElementById(\\u0027priceSection\\u0027);\\\\n                priceSection.scrollIntoView({ behavior: \\u0027smooth\\u0027, block: \\u0027start\\u0027 });\\\\n            }, 300); // Small delay to allow keyboard to appear\\\\n        }\\\\n\\\\n        function getLocation() {\\\\n            if (navigator.geolocation) {\\\\n                navigator.geolocation.getCurrentPosition(\\\\n                    (position) =\\u003E {\\\\n                        // In real app: check personal datastore, then community database\\\\n                        document.getElementById(\\u0027locationField\\u0027).value = \\u0027Pilot Travel Center, Exit 42\\u0027;\\\\n                        alert(\\u0060GPS: ${position.coords.latitude}, ${position.coords.longitude}\\\\\\\\n\\\\\\\\nIn real app: Would check personal datastore first, then community database for this location.\\u0060);\\\\n                    },\\\\n                    (error) =\\u003E {\\\\n                        alert(\\u0027Unable to get GPS location. Please enter manually.\\u0027);\\\\n                    }\\\\n                );\\\\n            } else {\\\\n                alert(\\u0027Geolocation not supported by this browser.\\u0027);\\\\n            }\\\\n        }\\\\n\\\\n        function logEntry() {\\\\n            const location = document.getElementById(\\u0027locationField\\u0027).value;\\\\n            const quantity = parseInt(document.getElementById(\\u0027quantityField\\u0027).value) || 1;\\\\n            const unitPrice = parseFloat(document.getElementById(\\u0027priceField\\u0027).value) || 0;\\\\n            \\\\n            if (!location) {\\\\n                alert(\\u0027Please enter a location\\u0027);\\\\n                return;\\\\n            }\\\\n            if (!selectedMachine) {\\\\n                alert(\\u0027Please select machine type\\u0027);\\\\n                return;\\\\n            }\\\\n            if (!selectedPayment) {\\\\n                alert(\\u0027Please select payment type\\u0027);\\\\n                return;\\\\n            }\\\\n            if (unitPrice \\u003C= 0) {\\\\n                alert(\\u0027Please enter a unit price\\u0027);\\\\n                return;\\\\n            }\\\\n\\\\n            const entryTotal = quantity * unitPrice;\\\\n            sessionTotal \\u002B= entryTotal;\\\\n            document.querySelector(\\u0027.session-total-amount\\u0027).textContent = \\u0027$\\u0027 \\u002B sessionTotal.toFixed(2);\\\\n\\\\n            // Reset for next entry (but keep location and payment type)\\\\n            document.getElementById(\\u0027quantityField\\u0027).value = \\u00271\\u0027;\\\\n            document.getElementById(\\u0027priceField\\u0027).value = \\u0027\\u0027;\\\\n            document.getElementById(\\u0027entryTotal\\u0027).textContent = \\u0027$0.00\\u0027;\\\\n            \\\\n            // Clear machine selection\\\\n            selectedMachine = null;\\\\n            document.querySelectorAll(\\u0027.button-group-3 .btn-option\\u0027).forEach(btn =\\u003E {\\\\n                btn.classList.remove(\\u0027selected\\u0027);\\\\n            });\\\\n\\\\n            alert(\\u0027Entry logged! Session total: $\\u0027 \\u002B sessionTotal.toFixed(2));\\\\n        }\\\\n\\\\n        // Listen for price field changes\\\\n        document.getElementById(\\u0027priceField\\u0027).addEventListener(\\u0027input\\u0027, calculateEntryTotal);\\\\n        document.getElementById(\\u0027quantityField\\u0027).addEventListener(\\u0027input\\u0027, calculateEntryTotal);\\\\n    \\u003C/script\\u003E\\\\n\\u003C/body\\u003E\\\\n\\u003C/html\\u003E\\u0022, \\u0022filename\\u0022: \\u0022/home/claude/laundrylog-v6.html\\u0022}\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

