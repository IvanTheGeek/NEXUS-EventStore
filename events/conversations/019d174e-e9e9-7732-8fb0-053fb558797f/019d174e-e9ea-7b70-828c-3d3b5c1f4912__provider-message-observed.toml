E\\uD83D\\uDCCD Location\\u003C/div\\u003E\\n            \\u003Cdiv class=\\u0022location-section\\u0022\\u003E\\n                \\u003Cdiv class=\\u0022location-input\\u0022\\u003E\\n                    \\u003Cinput type=\\u0022text\\u0022 class=\\u0022input-field\\u0022 id=\\u0022locationField\\u0022 placeholder=\\u0022Tap \\uD83D\\uDCCD or enter location\\u0022\\u003E\\n                    \\u003Cdiv class=\\u0022location-info\\u0022\\u003EGPS will check personal \\u0026 community data\\u003C/div\\u003E\\n                \\u003C/div\\u003E\\n                \\u003Cbutton class=\\u0022btn-gps\\u0022 onclick=\\u0022getLocation()\\u0022\\u003E\\uD83D\\uDCCD\\u003C/button\\u003E\\n            \\u003C/div\\u003E\\n        \\u003C/div\\u003E\\n\\n        \\u003C!-- Machine Type Section --\\u003E\\n        \\u003Cdiv class=\\u0022form-section\\u0022\\u003E\\n            \\u003Cdiv class=\\u0022section-title\\u0022\\u003EMachine Type\\u003C/div\\u003E\\n            \\u003Cdiv class=\\u0022button-group button-group-3\\u0022\\u003E\\n                \\u003Cbutton class=\\u0022btn-option\\u0022 onclick=\\u0022selectMachine(\\u0027washer\\u0027)\\u0022\\u003E\\uD83C\\uDF0A\\u003Cbr\\u003EWasher\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022btn-option\\u0022 onclick=\\u0022selectMachine(\\u0027dryer\\u0027)\\u0022\\u003E\\uD83D\\uDD25\\u003Cbr\\u003EDryer\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022btn-option\\u0022 onclick=\\u0022selectMachine(\\u0027supplies\\u0027)\\u0022\\u003E\\uD83E\\uDDF4\\u003Cbr\\u003ESupplies\\u003C/button\\u003E\\n            \\u003C/div\\u003E\\n        \\u003C/div\\u003E\\n\\n        \\u003C!-- Quantity Section --\\u003E\\n        \\u003Cdiv class=\\u0022form-section\\u0022\\u003E\\n            \\u003Cdiv class=\\u0022section-title\\u0022\\u003EQuantity\\u003C/div\\u003E\\n            \\u003Cdiv class=\\u0022quantity-section\\u0022\\u003E\\n                \\u003Cbutton class=\\u0022counter-btn\\u0022 onclick=\\u0022updateCounter(-1)\\u0022\\u003E\\u2212\\u003C/button\\u003E\\n                \\u003Cdiv class=\\u0022counter-value\\u0022 onclick=\\u0022openNumericPad(\\u0027quantity\\u0027)\\u0022\\u003E1\\u003C/div\\u003E\\n                \\u003Cbutton class=\\u0022counter-btn\\u0022 onclick=\\u0022updateCounter(1)\\u0022\\u003E\\u002B\\u003C/button\\u003E\\n            \\u003C/div\\u003E\\n        \\u003C/div\\u003E\\n\\n        \\u003C!-- Unit Price Section --\\u003E\\n        \\u003Cdiv class=\\u0022form-section\\u0022 id=\\u0022priceSection\\u0022\\u003E\\n            \\u003Cdiv class=\\u0022section-title\\u0022\\u003EUnit Price\\u003C/div\\u003E\\n            \\u003Cdiv class=\\u0022price-input-section\\u0022\\u003E\\n                \\u003Cdiv class=\\u0022quarter-label\\u0022\\u003EAdjust by $0.25\\u003C/div\\u003E\\n                \\u003Cdiv class=\\u0022price-main-row\\u0022\\u003E\\n                    \\u003Cbutton class=\\u0022quarter-btn\\u0022 onclick=\\u0022adjustPrice(-0.25)\\u0022\\u003E\\n                        \\u003Cspan class=\\u0022quarter-sign\\u0022\\u003E\\u2212\\u003C/span\\u003E\\n                        \\u003Cspan class=\\u0022quarter-coin\\u0022\\u003E\\uD83E\\uDE99\\u003C/span\\u003E\\n                    \\u003C/button\\u003E\\n                    \\u003Cdiv class=\\u0022price-input-wrapper\\u0022\\u003E\\n                        \\u003Cspan class=\\u0022dollar-sign\\u0022\\u003E$\\u003C/span\\u003E\\n                        \\u003Cinput type=\\u0022number\\u0022 \\n                               step=\\u00220.01\\u0022 \\n                               class=\\u0022price-input\\u0022 \\n                               id=\\u0022priceField\\u0022\\n                               placeholder=\\u00220.00\\u0022 \\n                               inputmode=\\u0022decimal\\u0022\\n                               onfocus=\\u0022scrollPriceIntoView()\\u0022\\u003E\\n                    \\u003C/div\\u003E\\n                    \\u003Cbutton class=\\u0022quarter-btn\\u0022 onclick=\\u0022adjustPrice(0.25)\\u0022\\u003E\\n                        \\u003Cspan class=\\u0022quarter-sign\\u0022\\u003E\\u002B\\u003C/span\\u003E\\n                        \\u003Cspan class=\\u0022quarter-coin\\u0022\\u003E\\uD83E\\uDE99\\u003C/span\\u003E\\n                    \\u003C/button\\u003E\\n                \\u003C/div\\u003E\\n\\n                \\u003Cdiv class=\\u0022quick-fill-buttons\\u0022\\u003E\\n                    \\u003Cbutton class=\\u0022quick-fill-btn\\u0022 onclick=\\u0022quickFillPrice(3.75)\\u0022\\u003E\\n                        $3.75\\n                        \\u003Cspan class=\\u0022quick-fill-label\\u0022\\u003ELast used\\u003C/span\\u003E\\n                    \\u003C/button\\u003E\\n                    \\u003Cbutton class=\\u0022quick-fill-btn\\u0022 onclick=\\u0022quickFillPrice(4.00)\\u0022\\u003E\\n                        $4.00\\n                        \\u003Cspan class=\\u0022quick-fill-label\\u0022\\u003EYour usual\\u003C/span\\u003E\\n                    \\u003C/button\\u003E\\n                    \\u003Cbutton class=\\u0022quick-fill-btn\\u0022 onclick=\\u0022quickFillPrice(3.50)\\u0022\\u003E\\n                        $3.50\\n                        \\u003Cspan class=\\u0022quick-fill-label\\u0022\\u003ECommunity\\u003C/span\\u003E\\n                    \\u003C/button\\u003E\\n                \\u003C/div\\u003E\\n            \\u003C/div\\u003E\\n\\n            \\u003Cdiv class=\\u0022entry-total\\u0022\\u003E\\n                \\u003Cspan class=\\u0022entry-total-label\\u0022\\u003EEntry Total\\u003C/span\\u003E\\n                \\u003Cspan class=\\u0022entry-total-amount\\u0022 id=\\u0022entryTotal\\u0022\\u003E$0.00\\u003C/span\\u003E\\n            \\u003C/div\\u003E\\n        \\u003C/div\\u003E\\n\\n        \\u003C!-- Payment Type Section --\\u003E\\n        \\u003Cdiv class=\\u0022form-section\\u0022\\u003E\\n            \\u003Cdiv class=\\u0022section-title\\u0022\\u003EPayment Type\\u003C/div\\u003E\\n            \\u003Cdiv class=\\u0022button-group button-group-4\\u0022\\u003E\\n                \\u003Cbutton class=\\u0022btn-option\\u0022 onclick=\\u0022selectPayment(\\u0027cash\\u0027)\\u0022\\u003E\\uD83D\\uDCB5\\u003Cbr\\u003ECash\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022btn-option\\u0022 onclick=\\u0022selectPayment(\\u0027points\\u0027)\\u0022\\u003E\\u2B50\\u003Cbr\\u003EPoints\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022btn-option\\u0022 onclick=\\u0022selectPayment(\\u0027card\\u0027)\\u0022\\u003E\\uD83D\\uDCB3\\u003Cbr\\u003ECard\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022btn-option\\u0022 onclick=\\u0022selectPayment(\\u0027app\\u0027)\\u0022\\u003E\\uD83D\\uDCF1\\u003Cbr\\u003EApp\\u003C/button\\u003E\\n            \\u003C/div\\u003E\\n        \\u003C/div\\u003E\\n\\n        \\u003Cbutton class=\\u0022submit-btn\\u0022 onclick=\\u0022logEntry()\\u0022\\u003ELog Entry\\u003C/button\\u003E\\n\\n        \\u003C!-- Session Total Bar --\\u003E\\n        \\u003Cdiv class=\\u0022session-total\\u0022\\u003E\\n            \\u003Cspan class=\\u0022session-total-label\\u0022\\u003ESession Total\\u003C/span\\u003E\\n            \\u003Cspan class=\\u0022session-total-amount\\u0022\\u003E$19.75\\u003C/span\\u003E\\n        \\u003C/div\\u003E\\n\\n        \\u003C!-- Recent Entries --\\u003E\\n        \\u003Cdiv class=\\u0022recent-entries\\u0022\\u003E\\n            \\u003Cdiv class=\\u0022entries-title\\u0022\\u003EToday\\u0027s Entries\\u003C/div\\u003E\\n            \\n            \\u003Cdiv class=\\u0022entry-card\\u0022\\u003E\\n                \\u003Cdiv class=\\u0022entry-header\\u0022\\u003E\\n                    \\u003Cdiv class=\\u0022entry-amount\\u0022\\u003E$11.25\\u003C/div\\u003E\\n                    \\u003Cdiv class=\\u0022entry-time\\u0022\\u003E2:34 PM\\u003C/div\\u003E\\n                \\u003C/div\\u003E\\n                \\u003Cdiv class=\\u0022entry-details\\u0022\\u003E\\n                    3 Washers @ $3.75 \\u2022 Credit Card\\n                \\u003C/div\\u003E\\n            \\u003C/div\\u003E\\n\\n            \\u003Cdiv class=\\u0022entry-card\\u0022\\u003E\\n                \\u003Cdiv class=\\u0022entry-header\\u0022\\u003E\\n                    \\u003Cdiv class=\\u0022entry-amount\\u0022\\u003E$6.00\\u003C/div\\u003E\\n                    \\u003Cdiv class=\\u0022entry-time\\u0022\\u003E2:38 PM\\u003C/div\\u003E\\n                \\u003C/div\\u003E\\n                \\u003Cdiv class=\\u0022entry-details\\u0022\\u003E\\n                    3 Dryers @ $2.00 \\u2022 Credit Card\\n                \\u003C/div\\u003E\\n            \\u003C/div\\u003E\\n\\n            \\u003Cdiv class=\\u0022entry-card\\u0022\\u003E\\n                \\u003Cdiv class=\\u0022entry-header\\u0022\\u003E\\n                    \\u003Cdiv class=\\u0022entry-amount\\u0022\\u003E$2.50\\u003C/div\\u003E\\n                    \\u003Cdiv class=\\u0022entry-time\\u0022\\u003E2:40 PM\\u003C/div\\u003E\\n                \\u003C/div\\u003E\\n                \\u003Cdiv class=\\u0022entry-details\\u0022\\u003E\\n                    1 Supplies @ $2.50 \\u2022 Cash\\n                \\u003C/div\\u003E\\n            \\u003C/div\\u003E\\n        \\u003C/div\\u003E\\n    \\u003C/div\\u003E\\n\\n    \\u003C!-- Numeric Keypad Modal (only for quantity now) --\\u003E\\n    \\u003Cdiv class=\\u0022numeric-modal\\u0022 id=\\u0022numericModal\\u0022\\u003E\\n        \\u003Cdiv class=\\u0022numeric-pad\\u0022\\u003E\\n            \\u003Cdiv class=\\u0022numeric-display\\u0022 id=\\u0022numericDisplay\\u0022\\u003E0\\u003C/div\\u003E\\n            \\u003Cdiv class=\\u0022numeric-keys\\u0022\\u003E\\n                \\u003Cbutton class=\\u0022numeric-key\\u0022 onclick=\\u0022numericInput(\\u00271\\u0027)\\u0022\\u003E1\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022numeric-key\\u0022 onclick=\\u0022numericInput(\\u00272\\u0027)\\u0022\\u003E2\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022numeric-key\\u0022 onclick=\\u0022numericInput(\\u00273\\u0027)\\u0022\\u003E3\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022numeric-key\\u0022 onclick=\\u0022numericInput(\\u00274\\u0027)\\u0022\\u003E4\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022numeric-key\\u0022 onclick=\\u0022numericInput(\\u00275\\u0027)\\u0022\\u003E5\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022numeric-key\\u0022 onclick=\\u0022numericInput(\\u00276\\u0027)\\u0022\\u003E6\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022numeric-key\\u0022 onclick=\\u0022numericInput(\\u00277\\u0027)\\u0022\\u003E7\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022numeric-key\\u0022 onclick=\\u0022numericInput(\\u00278\\u0027)\\u0022\\u003E8\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022numeric-key\\u0022 onclick=\\u0022numericInput(\\u00279\\u0027)\\u0022\\u003E9\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022numeric-key\\u0022 onclick=\\u0022numericInput(\\u00270\\u0027)\\u0022\\u003E0\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022numeric-key\\u0022 onclick=\\u0022numericInput(\\u00270\\u0027)\\u0022\\u003E0\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022numeric-key\\u0022 onclick=\\u0022numericBackspace()\\u0022\\u003E\\u232B\\u003C/button\\u003E\\n            \\u003C/div\\u003E\\n            \\u003Cdiv class=\\u0022numeric-actions\\u0022\\u003E\\n                \\u003Cbutton class=\\u0022numeric-action-btn numeric-cancel\\u0022 onclick=\\u0022closeNumericPad()\\u0022\\u003ECancel\\u003C/button\\u003E\\n                \\u003Cbutton class=\\u0022numeric-action-btn numeric-done\\u0022 onclick=\\u0022applyNumericValue()\\u0022\\u003EDone\\u003C/button\\u003E\\n            \\u003C/div\\u003E\\n        \\u003C/div\\u003E\\n    \\u003C/div\\u003E\\n\\n    \\u003Cscript\\u003E\\n        let currentMode = null; // only \\u0027quantity\\u0027 now\\n        let numericValue = \\u00270\\u0027;\\n        let selectedMachine = null;\\n        let selectedPayment = null;\\n        let counterValue = 1;\\n        let sessionTotal = 19.75;\\n\\n        function selectMachine(type) {\\n            selectedMachine = type;\\n            document.querySelectorAll(\\u0027.button-group-3 .btn-option\\u0027).forEach(btn =\\u003E {\\n                btn.classList.remove(\\u0027selected\\u0027);\\n            });\\n            event.target.classList.add(\\u0027selected\\u0027);\\n            calculateEntryTotal();\\n        }\\n\\n        function selectPayment(type) {\\n            selectedPayment = type;\\n            document.querySelectorAll(\\u0027.button-group-4 .btn-option\\u0027).forEach(btn =\\u003E {\\n                btn.classList.remove(\\u0027selected\\u0027);\\n            });\\n            event.target.classList.add(\\u0027selected\\u0027);\\n        }\\n\\n        function updateCounter(delta) {\\n            counterValue = Math.max(1, counterValue \\u002B delta);\\n            document.querySelector(\\u0027.counter-value\\u0027).textContent = counterValue;\\n            calculateEntryTotal();\\n        }\\n\\n        function adjustPrice(delta) {\\n            const priceField = document.getElementById(\\u0027priceField\\u0027);\\n            const currentPrice = parseFloat(priceField.value) || 0;\\n            const newPrice = Math.max(0, currentPrice \\u002B delta);\\n            priceField.value = newPrice.toFixed(2);\\n            calculateEntryTotal();\\n        }\\n\\n        function quickFillPrice(amount) {\\n            document.getElementById(\\u0027priceField\\u0027).value = amount.toFixed(2);\\n            calculateEntryTotal();\\n        }\\n\\n        function calculateEntryTotal() {\\n            const quantity = counterValue;\\n            const unitPrice = parseFloat(document.getElementById(\\u0027priceField\\u0027).value) || 0;\\n            const total = quantity * unitPrice;\\n            document.getElementById(\\u0027entryTotal\\u0027).textContent = \\u0027$\\u0027 \\u002B total.toFixed(2);\\n        }\\n\\n        function scrollPriceIntoView() {\\n            // Scroll the price section to the top of the viewport to avoid keyboard covering it\\n            setTimeout(() =\\u003E {\\n                const priceSection = document.getElementById(\\u0027priceSection\\u0027);\\n                priceSection.scrollIntoView({ behavior: \\u0027smooth\\u0027, block: \\u0027start\\u0027 });\\n            }, 300); // Small delay to allow keyboard to appear\\n        }\\n\\n        function openNumericPad(mode) {\\n            // Only for quantity now\\n            currentMode = \\u0027quantity\\u0027;\\n            numericValue = counterValue.toString();\\n            document.getElementById(\\u0027numericDisplay\\u0027).textContent = numericValue;\\n            document.getElementById(\\u0027numericModal\\u0027).classList.add(\\u0027visible\\u0027);\\n        }\\n\\n        function closeNumericPad() {\\n            document.getElementById(\\u0027numericModal\\u0027).classList.remove(\\u0027visible\\u0027);\\n        }\\n\\n        function numericInput(digit) {\\n            if (numericValue === \\u00270\\u0027) {\\n                numericValue = digit;\\n            } else {\\n                numericValue \\u002B= digit;\\n            }\\n            document.getElementById(\\u0027numericDisplay\\u0027).textContent = numericValue;\\n        }\\n\\n        function numericBackspace() {\\n            if (numericValue.length \\u003E 1) {\\n                numericValue = numericValue.slice(0, -1);\\n            } else {\\n                numericValue = \\u00270\\u0027;\\n            }\\n            document.getElementById(\\u0027numericDisplay\\u0027).textContent = numericValue;\\n        }\\n\\n        function applyNumericValue() {\\n            counterValue = Math.max(1, parseInt(numericValue) || 1);\\n            document.querySelector(\\u0027.counter-value\\u0027).textContent = counterValue;\\n            calculateEntryTotal();\\n            closeNumericPad();\\n        }\\n\\n        function getLocation() {\\n            if (navigator.geolocation) {\\n                navigator.geolocation.getCurrentPosition(\\n                    (position) =\\u003E {\\n                        // In real app: check personal datastore, then community database\\n                        document.getElementById(\\u0027locationField\\u0027).value = \\u0027Pilot Travel Center, Exit 42\\u0027;\\n                        alert(\\u0060GPS: ${position.coords.latitude}, ${position.coords.longitude}\\\\n\\\\nIn real app: Would check personal datastore first, then community database for this location.\\u0060);\\n                    },\\n                    (error) =\\u003E {\\n                        alert(\\u0027Unable to get GPS location. Please enter manually.\\u0027);\\n                    }\\n                );\\n            } else {\\n                alert(\\u0027Geolocation not supported by this browser.\\u0027);\\n            }\\n        }\\n\\n        function logEntry() {\\n            const location = document.getElementById(\\u0027locationField\\u0027).value;\\n            const unitPrice = parseFloat(document.getElementById(\\u0027priceField\\u0027).value) || 0;\\n            \\n            if (!location) {\\n                alert(\\u0027Please enter a location\\u0027);\\n                return;\\n            }\\n            if (!selectedMachine) {\\n                alert(\\u0027Please select machine type\\u0027);\\n                return;\\n            }\\n            if (!selectedPayment) {\\n                alert(\\u0027Please select payment type\\u0027);\\n                return;\\n            }\\n            if (unitPrice \\u003C= 0) {\\n                alert(\\u0027Please enter a unit price\\u0027);\\n                return;\\n            }\\n\\n            const entryTotal = counterValue * unitPrice;\\n            sessionTotal \\u002B= entryTotal;\\n            document.querySelector(\\u0027.session-total-amount\\u0027).textContent = \\u0027$\\u0027 \\u002B sessionTotal.toFixed(2);\\n\\n            // Reset for next entry (but keep location and payment type)\\n            counterValue = 1;\\n            document.querySelector(\\u0027.counter-value\\u0027).textContent = counterValue;\\n            document.getElementById(\\u0027priceField\\u0027).value = \\u0027\\u0027;\\n            document.getElementById(\\u0027entryTotal\\u0027).textContent = \\u0027$0.00\\u0027;\\n            \\n            // Clear machine selection\\n            selectedMachine = null;\\n            document.querySelectorAll(\\u0027.button-group-3 .btn-option\\u0027).forEach(btn =\\u003E {\\n                btn.classList.remove(\\u0027selected\\u0027);\\n            });\\n\\n            alert(\\u0027Entry logged! Session total: $\\u0027 \\u002B sessionTotal.toFixed(2));\\n        }\\n\\n        // Listen for price field changes\\n        document.getElementById(\\u0027priceField\\u0027).addEventListener(\\u0027input\\u0027, calculateEntryTotal);\\n    \\u003C/script\\u003E\\n\\u003C/body\\u003E\\n\\u003C/html\\u003E\",\"description\":\"Creating LaundryLog v5 with lighter orange colors, native keyboard for price input with auto-scroll, minus/plus indicators on quarter buttons, and removed custom numeric modal for price\"},\"message\":\"Creating LaundryLog v5 with lighter orange colors, native keyboard for price input with auto-scroll, minus/plus indicators on quarter buttons, and removed custom numeric modal for price\",\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":{\"type\":\"json_block\",\"json_block\":\"{\\u0022language\\u0022: \\u0022html\\u0022, \\u0022code\\u0022: \\u0022\\u003C!DOCTYPE html\\u003E\\\\n\\u003Chtml lang=\\\\\\u0022en\\\\\\u0022\\u003E\\\\n\\u003Chead\\u003E\\\\n    \\u003Cmeta charset=\\\\\\u0022UTF-8\\\\\\u0022\\u003E\\\\n    \\u003Cmeta name=\\\\\\u0022viewport\\\\\\u0022 content=\\\\\\u0022width=device-width, initial-scale=1.0\\\\\\u0022\\u003E\\\\n    \\u003Ctitle\\u003ELaundryLog - CheddarBooks\\u003C/title\\u003E\\\\n    \\u003Cstyle\\u003E\\\\n        * {\\\\n            margin: 0;\\\\n            padding: 0;\\\\n            box-sizing: border-box;\\\\n        }\\\\n\\\\n        body {\\\\n            font-family: -apple-system, BlinkMacSystemFont, \\u0027Segoe UI\\u0027, Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;\\\\n            background: #f8f9fa;\\\\n            color: #2d3748;\\\\n            padding-bottom: 80px;\\\\n        }\\\\n\\\\n        .header {\\\\n            background: linear-gradient(135deg, #ffb74d 0%, #ffa726 100%);\\\\n            color: white;\\\\n            padding: 1rem 1rem 1rem 1rem;\\\\n            box-shadow: 0 2px 8px rgba(0,0,0,0.15);\\\\n            display: flex;\\\\n            justify-content: space-between;\\\\n            align-items: center;\\\\n        }\\\\n\\\\n        .header-text h1 {\\\\n            font-size: 1.5rem;\\\\n            font-weight: 700;\\\\n            margin-bottom: 0.125rem;\\\\n        }\\\\n\\\\n        .header-text p {\\\\n            font-size: 0.75rem;\\\\n            opacity: 0.95;\\\\n            font-weight: 500;\\\\n        }\\\\n\\\\n        .header-badge {\\\\n            width: 48px;\\\\n            height: 48px;\\\\n            background: rgba(255, 255, 255, 0.25);\\\\n            border-radius: 12px;\\\\n            display: flex;\\\\n            align-items: center;\\\\n            justify-content: center;\\\\n            font-size: 1.5rem;\\\\n            border: 2px solid rgba(255, 255, 255, 0.3);\\\\n        }\\\\n\\\\n        .container {\\\\n            padding: 1rem;\\\\n            max-width: 600px;\\\\n            margin: 0 auto;\\\\n        }\\\\n\\\\n        .form-section {\\\\n            background: white;\\\\n     