text = "[View LaundryLog v5](computer:///mnt/user-data/outputs/laundrylog-v5.html)\n\n**Changes in v5:**\n\n✅ **Lighter orange throughout** - Changed from deep orange (#ff9800) to lighter shades (#ffb74d, #ffa726) across header, buttons, highlights, and accents\n\n✅ **Native keyboard for price** - Removed custom numeric modal for unit price input. The device's native numeric keyboard will now appear when you tap the price field\n\n✅ **Auto-scroll for keyboard** - When the price field is focused, it scrolls to the top of the viewport so the system keyboard won't cover it\n\n✅ **Clear +/− indicators** - Quarter buttons now show:\n- Left button: **−** (minus sign) above 🪙\n- Right button: **+** (plus sign) above 🪙\n\nThe custom numeric modal is now only used for the quantity field (when you tap the number). For price entry, you'll get the native mobile keyboard experience with the field staying visible above it!"

