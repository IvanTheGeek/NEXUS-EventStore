[[body.segments]]
kind = "plain_text"
text = "Maximum Freedom & Practical Capitalism:\nlets add in something where sponsorships might be a viable option too. \nIf a person wants to **gift** me personally some money, they have the option to do so. In the US, gifts person-to-person can total $19,000 for 2025. (For 2025, the IRS annual gift tax exclusion is $19,000 per recipient, meaning an individual can give up to $19,000 to any person without incurring gift tax or needing to file a gift tax return.) \nThe IRS defines a gift as \"any transfer to an individual, either directly or indirectly, where full compensation (measured in money or money's worth) is not received in return\".\nGifts would definitely contribute to Influence to me, but that is also defining that I still can choose what to do with that gift. I also do not have to count that gift in taxes anywhere. \nAs a business owner, I am always looking for deductions and how to lower my tax bill. A business can only gift $25 to an individual and deduct it. It also can NOT be cash or a gift card. It would need to be a real product."

