text = "I'd like to ask a few questions before creating the interface mockup:\n\n1. **What app are we designing for?** I don't see context about what application this is - what's the purpose and what kind of data will users be entering?\n\n2. **What type of data entry are we talking about?** (e.g., forms, quick notes, photos, measurements, time tracking, etc.)\n\n3. **What's the primary user goal?** What should be fastest/easiest to accomplish on mobile?\n\n4. **Any specific style preferences?** (minimal, colorful, professional, playful, etc.)\n\nOnce I understand what we're building, I can create a focused HTML mockup with appropriate UI patterns for your use case."

