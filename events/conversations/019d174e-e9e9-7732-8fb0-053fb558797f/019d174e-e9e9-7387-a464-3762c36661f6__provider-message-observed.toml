kind = "plain_text"
text = "User goal: easy to enter, quick logging of the needed data. an SLA is not a concern here. Convenience to the user is. I currently see 2 paths. I would start a machine, log the  cost, then start the next machine, log the cost, and do the process as I incurred the cost.  However, in discussing this with other users, another path was described as starting a batch of machines, say 4, then washing one's hands (as dirty laundry is, well, dirty) and then while waiting for the cycle, open the app, and enter the number of machines and costs all at once. \n\nFor Style: I have not established anything yet. Simple and easy is a goal, modern and pleasant. Perhaps you might generate several styles and we can iterate and refine. \n\nany other questions or concerns?"

