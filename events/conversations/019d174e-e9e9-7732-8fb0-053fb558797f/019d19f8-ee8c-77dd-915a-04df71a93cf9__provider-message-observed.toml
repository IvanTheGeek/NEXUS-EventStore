text = "Also to note, I might provide servers (cloud) to facilitate certain functionality, like in the LaundryLog app a community data store for locations. A user will always have the option to participate and use my provided service or not, they will have the ability to use the server software to self-host their own service. It might be that I would charge a price for such services, but that again will be optional to take advantage of not. All functionality will stay open and free, sometimes it is just easier to have a provided resource that is worth paying for. This might apply to those where the technical requirements are not in their skill set."

