text = "spot on. \nok, back to the UX, I feel the location should be the first/top information as everything will kinda depend on a location for a session. I like the GPS option, and it can lookup using a personal datastore for locations. The user will have the option to participate in location sharing datastore where the can use a database that can be community cultivated. The idea being that if they want to share data that they enter for locations, they can share it with others who are sharing their location data and we have a crowd-sourced participatory database. \nmore to come."

