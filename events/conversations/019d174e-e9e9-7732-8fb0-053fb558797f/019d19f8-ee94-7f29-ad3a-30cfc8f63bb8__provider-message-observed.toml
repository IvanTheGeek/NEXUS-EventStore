[[body.segments]]
kind = "reasoning"
text = "Great clarification! The quality of the mockup doesn't matter - it's about the THINKING and COMMUNICATION behind it. Hand-drawn boxes on paper with a photo are just as valuable as polished Penpot prototypes. What matters is:\n\n1. Shows what they're envisioning\n2. Arranged in order (the flow/use case)\n3. Explains what they expect\n4. Explains how it should work\n5. Explains why they need it\n\nIt's about understanding the user's need clearly so you can build the right thing. The medium doesn't matter - napkin sketches work fine if they communicate the idea effectively."

[[body.segments]]
kind = "plain_text"
text = "Perfect clarification! **The fidelity of mockups doesn't matter - it's the thinking behind them.**\n\n**What matters:**\n- **Understanding the need** - what, how, and why\n- **Flow and sequence** - chronological arrangement showing the use case\n- **Communication of intent** - making it clear what's expected\n\n**Equally valuable:**\n- ✅ Polished Penpot prototypes\n- ✅ Hand-drawn boxes on paper (photo'd and arranged)\n- ✅ Napkin sketches\n- ✅ Whiteboard photos\n\nThe goal is **building the right thing** by understanding:\n- **What** would be expected\n- **How** it should work\n- **Why** it's needed\n\nIt's about clear communication, not design skill. A simple hand-drawn flow that explains the reasoning is worth more than a beautiful prototype that's vague about the actual need.\n\nWaiting for more notes..."

