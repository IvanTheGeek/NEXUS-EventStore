kind = "plain_text"
text = "I do not have a logo for CheddarBooks yet, but I like the idea of maybe having a badge type logo on the right side of the header.\nAgain, have not got a design system or branding colors figured out for CheddarBooks yet, but I do like the \"cheese\" coloring theme idea. \"cheddar\" is a slang for money, so I am playing off that idea. I was also inspired by my nephew who has a cat named \"Cheddar\". I am thinking of an orange cartoon-ish cat being the \"mascot\"  of the Cheddar and CheddarBooks brands so hints and advice could be provided by \"CheddarCat\" and then maybe a robo-version of \"CheddarBot\" when something is more AI or automated. \nMore thoughts to follow."

