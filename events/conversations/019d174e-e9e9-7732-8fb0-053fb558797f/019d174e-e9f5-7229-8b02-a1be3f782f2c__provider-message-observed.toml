text = "Great addition! This adds important nuance to the funding model:\n\n**Funding options:**\n1. **Optional paid services** (hosting, convenience features)\n2. **Sponsorships** (companies/organizations supporting development)\n3. **Personal gifts** (direct person-to-person)\n\n**Personal gifts specifics:**\n- Up to **$19,000 in 2025** (per IRS annual gift tax exclusion) without tax implications\n- IRS definition: \"any transfer where full compensation is not received in return\"\n- **Earns influence** but with no obligation - you choose what to do with the gift\n- You don't count it as taxable income\n- It's a gift, not payment for services\n\n**Business gift limitations (for reference):**\n- Businesses can only deduct **$25 per individual**\n- Can't be cash or gift cards\n- Must be tangible products\n- (This matters for business owners looking for deductions)\n\nThis transparency about the financial mechanisms and tax implications fits perfectly with your \"building in public\" approach. You're being upfront about how funding works and what the tax advantages are.\n\nWaiting for more notes..."

