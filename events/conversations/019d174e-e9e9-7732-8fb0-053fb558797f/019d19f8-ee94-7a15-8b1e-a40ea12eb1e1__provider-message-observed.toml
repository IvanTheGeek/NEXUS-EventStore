text = "This is important tax/business structure clarification:\n\n**Business sponsorships:**\n- A business can sponsor and deduct it as **\"Advertising\" expense**\n- You accept it as advertising income (through one of your micro-businesses)\n- Both parties benefit - they get a deduction, you get income\n- Categorizing as advertising avoids sales tax complications\n- This is different from personal gifts (which aren't taxable)\n\nThis is a legitimate business arrangement that works for both parties while staying compliant with tax law."

[[body.segments]]
kind = "plain_text"
text = "Excellent clarification on the business sponsorship mechanism:\n\n**Business sponsorships work like this:**\n- Business pays for **\"Advertising\"** (legitimate tax deduction for them)\n- You receive it as **advertising income** through one of your micro-businesses (taxable to you)\n- Both parties benefit: they get deduction, you get funding\n- **Avoids sales tax** by categorizing as advertising rather than a product/service sale\n- This is different from personal gifts (which aren't taxable income to you)\n\n**So the funding mechanisms are:**\n1. **Personal gifts** - up to $19k, not taxable income, pure influence\n2. **Business sponsorships** - advertising expense (them) / advertising income (you), both parties benefit tax-wise\n3. **Paid services** - traditional fee for service (hosting, etc.)\n\nThis creates multiple legitimate paths for people/businesses to support development while staying tax compliant.\n\nWaiting for more notes..."

