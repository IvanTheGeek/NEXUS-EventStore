text = "So this Development Philosophy is really mt IvanTheGeek Development Philosophy.  CheddarBooks is a sub-brand of my Cheddar brand. CheddarBooks is specifically targeting the app I WILL create called: CheddarBooks \nThe purpose of CheddarBooks is to have a free (both as in beer and as in freedom/liberty) software system that can replace Quickbooks or Xero or any other small business orientated accounting system. Cheddar will be a suite of tools and apps incorporating CheddarBooks for business related accounting needs, and then also many apps that usually related to money and financial aspects of life for a person and/or family. So a personal financial accounting app, and many other of which a few I wrote about at https://blog.ivanthegeek.com/my-vision-for-cheddar so you can check that out also."

