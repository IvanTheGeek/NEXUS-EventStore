kind = "plain_text"
text = "Ways to earn influence: Motivation: \nactually, the listings here really belong in the other categories. My meaning for motivation is MY own motivation. What am I motivated to work on. A users Influence and the type of Influence can be a big personal motivator. \n\nalso, I want to emphasize, for example, when a feature is wanted, a user can fire a request that says \"I want to be able to do X\". This user has no history with me, no contributions of any kind, etc. Unless the idea appeals to me, it is probably being ignored. Now, if a user has been active in the forums and answering questions, their influence is greater and I might take a serious look. If a user creates some screens and narrates what they are looking for, maybe explains why they want this, and what the benefits are, much better chance of it getting incorporated. Basically, the more fleshed out a request is, the more \"Influence\" as user has, the more likely it is to be incorporated."

