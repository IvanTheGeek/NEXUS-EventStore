text = "Good question! Yes, there are potentially more effective formats:\n\n**Current approach (narrative prose):**\n- ✅ Human-readable and engaging\n- ✅ Provides context and reasoning\n- ❌ Claude has to extract principles from stories\n- ❌ Information can be buried in paragraphs\n\n**More Claude-friendly alternatives:**\n\n1. **YAML/Structured data format** - Clear key-value pairs, hierarchical, machine-readable\n2. **Decision matrix format** - \"When X, then Y\" rules for common scenarios\n3. **Hybrid approach** - Brief narrative intro + structured reference data\n\n**For your use case, a hybrid might be ideal:**\n- Keep the narrative for humans (blog posts, README files)\n- Create a structured \"Claude reference\" version with:\n  - Clear hierarchies\n  - Explicit rules and constraints\n  - Design decision trees\n  - Quick-reference principles\n\nThink of it like: the current doc is your \"mission statement\" for humans, but you could also have a \"technical specification\" version optimized for Claude to parse and apply.\n\nWould that be more useful?"

