text = "Lets converse about this before you create a new html file.\nChange `Laundry Tracker` to LaundryLog, that will be the name of the app. This app will be an individual app that integrates into my CheddarBooks ecosystem that I have yet to flesh out. CheddarBooks will be an accounting system focused on micro and small businesses with emphasis on hobbyists, solopreneurs, and entrepreneurs with no or a few employees. The header should have some indication that the app is part of the CheddarBooks ecosystem, or brought to you by, or something like that. The header can be vertically shorter. \nmore thoughts to follow."

