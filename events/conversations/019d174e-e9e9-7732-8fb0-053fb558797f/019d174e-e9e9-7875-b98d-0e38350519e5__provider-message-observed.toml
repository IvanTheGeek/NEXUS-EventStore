[[body.segments]]
kind = "plain_text"
text = "for context, the \"receipts\" is really the problem I am solving with this app. When using a washer or dryer or a vending machine (like for bleach), no receipt is provided. There is really no record for cash transactions which is why a log needs to be kept. For credit card transactions, the purchases will show up on a statement, it will either have individual machine starts as separate transactions or might pool several machine starts into one larger transaction. Many times the location shown on a statement is for the laundry providers HQ and not where the machines were used. The payment apps may or not allow details to be had, so those are difficult as well.  So that is why the reasoning for this app. \n\nmore answers to follow."

