text = "**Got it - consistent label positioning for both sections!** So we'd have:\n\n**Quantity section:**\n```\nQuantity\n[-]  1  [+]\n```\n\n**Unit Price section - but here's a question:**\nCurrently \"Adjust by $0.25\" provides helpful context about what those quarter buttons do. If we replace it with just \"Unit Price\", we lose that hint.\n\n**Options:**\n1. **Replace with \"Unit Price\"** - cleaner but less informative\n2. **\"Unit Price (±$0.25)\"** - combines both pieces of info\n3. **Two lines:**\n   ```\n   Unit Price\n   Adjust by $0.25\n   ```\n   But this doesn't really save space\n\n4. **Just remove the label entirely** - the dollar sign and quarter coins might be self-explanatory enough?\n\nWhat's your preference? Should we keep the adjustment hint or prioritize brevity?"

