[[body.segments]]
kind = "reasoning"
text = "Great clarification! So analytics are actually part of the system, but:\n1. Optional/opt-in\n2. Part of the \"influence\" system\n3. Users who share analytics earn influence points\n4. Influence affects prioritization of their requests/issues\n\nThis is a really interesting approach - it incentivizes users to help the developer while respecting their choice to opt out. It's not \"we don't track\" but rather \"tracking is optional and benefits both of us.\"\n\nI'll note this for the document update."

[[body.segments]]
kind = "plain_text"
text = "Got it! So the accurate statement is:\n\n**Analytics are opt-in and part of the influence system:**\n- Users can **choose** to send analytics\n- Sharing analytics helps you understand usage, crashes, pain points\n- In return, users earn **influence points**\n- Influence affects how you prioritize their feature requests and support issues\n\nSo it's not \"we never track\" - it's \"tracking is voluntary and mutually beneficial.\" Users who help you improve the software by sharing data get prioritized when they need help or want features.\n\nThis ties directly into your influence philosophy from the blog post - contribute in various ways (code, docs, analytics, money) to earn influence and get your needs prioritized.\n\nNoted! Continuing to wait for more feedback..."

