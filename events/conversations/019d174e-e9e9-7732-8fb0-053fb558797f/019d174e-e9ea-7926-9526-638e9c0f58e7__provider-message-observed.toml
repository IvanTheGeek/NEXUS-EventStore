kind = "plain_text"
text = "Perfect addition! This clarifies that you're not against cloud sync - you're just giving users **control over how it happens**.\n\n**Key points:**\n- Cloud/remote syncing and access ARE considered and available\n- **Option 1**: Use provided servers (convenience, may have fees)\n- **Option 2**: Self-host for complete privacy and control\n- **Option 3**: Local-only if that's what you prefer\n\nThis reinforces that privacy isn't about limiting functionality - it's about giving users agency over where their data lives and who has access.\n\nNoted! More feedback?"

