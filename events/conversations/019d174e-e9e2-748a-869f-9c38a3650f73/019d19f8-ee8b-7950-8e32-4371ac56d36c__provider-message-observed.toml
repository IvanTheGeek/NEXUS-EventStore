text = "Yes, Phi-3 will work on an RTX 5070.\n\nThe RTX 5070 has 12GB of GDDR7 VRAM, 6,144 CUDA cores, and 672 GB/s memory bandwidth.\n\n**Which Phi-3 models will work:**\n\n- **Phi-3-mini (3.8B)** - Yes, comfortably. Needs ~8-10GB with 4-bit quantization\n- **Phi-3-small (7B)** - Yes. Needs ~10-14GB depending on quantization level\n- **Phi-3-medium (14B)** - Tight fit. Would require aggressive quantization (4-bit) to fit in 12GB\n\nThe 12GB VRAM is the main constraint. For context size, you'll have more headroom with the smaller models. The CUDA cores and GDDR7 speed are sufficient for good inference performance.\n\nIf you're planning to run Phi-3-medium regularly, you'd be better served by the RTX 5070 Ti (16GB) or waiting for the rumored 5070 Super (18GB).\n\nWhich Phi-3 model are you planning to use?"

