kind = "plain_text"
text = "**Good choice - B gives you flexibility without drowning in noise.**\n\n**Next decisions for the TrainingExample system:**\n\n1. **QualityScore heuristics** - What makes an example High vs Medium vs Low?\n2. **Event schema** - What metadata do TrainingExamples need?\n3. **Scoring automation** - Which signals determine auto-scoring?\n4. **Training consumption** - How does pipeline select/weight examples?\n5. **Retraining cadence** - When/how often do you consolidate LoRA adapters?\n\n**Starting with #1 - QualityScore heuristics:**\n\nFor automatic scoring, you need signals that correlate with \"good training material.\" Here are some starting heuristics:\n\n**High quality signals:**\n- Nexus DesignNote/TechnicalDecision events (explicit reasoning)\n- Git commits with substantive messages (>100 chars) + meaningful diff\n- Conversations where you corrected Claude or refined approach\n- Code with detailed XML docs\n\n**Medium quality signals:**\n- Standard Nexus events (CrossProjectIdea)\n- Regular commits with basic messages\n- Most conversation turns\n- Standard code comments\n\n**Low quality signals:**\n- Trivial commits (formatting, typos)\n- One-word responses in conversations\n- Boilerplate code\n\n**Do these heuristics match your intuition, or would you weight things differently?**\n\nParticularly: Should all Nexus events be High by default, or does event type matter?"

