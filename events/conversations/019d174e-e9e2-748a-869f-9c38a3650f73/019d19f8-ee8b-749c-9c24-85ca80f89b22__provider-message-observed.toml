text = "The user is asking about RTX 3090 vs RTX 5070 performance as a separate question from the spark documentation.\n\nFrom the search results:\n- RTX 5070 outperforms RTX 3090 by about 9% in gaming benchmarks\n- RTX 3090 has 24GB VRAM vs RTX 5070's 12GB\n- RTX 3090: 10,496 CUDA cores, 35.58 TFLOPS, 936.2 GB/s bandwidth, 350W\n- RTX 5070: 6,144 CUDA cores, 30.87 TFLOPS, 672 GB/s bandwidth, 250W\n- RTX 5070 is more power efficient\n- For gaming, they're relatively close in performance\n- For ML/AI work, the VRAM difference is significant\n\nGiven the user's use case (running Phi-3 models), the VRAM is the most critical factor. The RTX 3090's 24GB would allow for much larger models or longer context windows compared to the 5070's 12GB.\n\nI should give a direct technical comparison since this is a straightforward spec/performance question."

