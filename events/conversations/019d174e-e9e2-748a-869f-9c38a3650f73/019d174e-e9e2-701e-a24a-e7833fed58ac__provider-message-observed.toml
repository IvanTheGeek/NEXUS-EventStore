kind = "plain_text"
text = "**Let me clarify the LoRA vs fine-tuning distinction - this is the key to understanding your options.**\n\n**Fine-tuning:**\n- Changes the actual base model weights permanently\n- Result: New model file (same size as original)\n- All previous knowledge from base model still there, but modified\n\n**LoRA adapter:**\n- Base model weights frozen (never touched)\n- Small separate file with modifications\n- At inference: Base model + adapter loaded together\n- Result: Two files (base + adapter)\n\n**Critical insight: LoRA adapters do NOT build on each other by default.**\n\nEach LoRA training starts from the frozen base model. If you train:\n- Monday: Base + adapter_v1\n- Wednesday: Base + adapter_v2 (doesn't include v1's learning)\n\n**Your options for accumulation:**\n\n**Option 1: Sequential LoRA (what you're describing)**\n- Train adapter_v1 on examples 1-50\n- **Merge v1 into base** → new_base_v1\n- Train adapter_v2 on new_base_v1 with examples 51-100\n- Merge again → new_base_v2\n- Continue...\n\n**Option 2: Full retraining each cycle**\n- Train adapter_v1 on examples 1-50\n- Train adapter_v2 on examples 1-100 (cumulative)\n- Train adapter_v3 on examples 1-150\n- Gets slower each time\n\n**Given that understanding, which approach fits what you're trying to build?**\n\nOr does this change how you're thinking about the continuous pipeline?"

