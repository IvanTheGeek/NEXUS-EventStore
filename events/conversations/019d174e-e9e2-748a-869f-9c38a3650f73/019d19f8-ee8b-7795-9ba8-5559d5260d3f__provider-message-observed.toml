[[body.segments]]
kind = "plain_text"
text = "**Phi-3 Model Comparison:**\n\n**Phi-3-mini (3.8B parameters)**\n- Context: 4K, 128K, or 256K tokens depending on variant\n- Memory: ~4GB (FP16), ~2GB (4-bit quant)\n- Use case: Fast inference, chat, simple tasks\n- Speed: Fastest of the three\n- Quality: Good for straightforward Q&A, basic reasoning\n\n**Phi-3-small (7B parameters)**\n- Context: 8K or 128K tokens\n- Memory: ~7GB (FP16), ~4GB (4-bit quant)\n- Use case: Better reasoning, more complex tasks\n- Speed: Middle ground\n- Quality: Stronger reasoning, better code generation\n\n**Phi-3-medium (14B parameters)**\n- Context: 4K or 128K tokens\n- Memory: ~14GB (FP16), ~7-8GB (4-bit quant)\n- Use case: Complex reasoning, detailed analysis\n- Speed: Slowest\n- Quality: Most capable, approaches GPT-3.5 on many benchmarks\n\n**Practical differences on RTX 5070:**\n\nWith 12GB VRAM, you can:\n- Run mini with long context (128K+) comfortably\n- Run small at 128K context with 4-bit quant\n- Run medium only at shorter context (4K-8K) with aggressive quantization\n\n**Performance sweet spot:** Phi-3-small with 4-bit quantization gives you the best balance of capability and VRAM efficiency on a 12GB card.\n\nAre you building this for production MCP server use, or experimentation?"

