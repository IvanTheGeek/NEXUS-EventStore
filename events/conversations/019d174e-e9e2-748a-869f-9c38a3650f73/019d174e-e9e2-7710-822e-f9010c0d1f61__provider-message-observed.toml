text = "**Important distinction - you're right.**\n\nThe focus isn't learning from *code artifacts* but from *decision-making and methodology artifacts*. Code is just the output of applying those principles.\n\n**Revised mental model:**\n\n**High quality (methodology/convention/preference level):**\n- How you approach event modeling\n- Why you choose certain architectural patterns\n- Design system principles you follow\n- Deployment strategy reasoning\n- Tool selection criteria (why Penpot, why Blazor Hybrid, why F#)\n\n**Medium quality (application of principles to context):**\n- Project-specific design decisions using those principles\n- Code showing conventions in practice (not the comments, the patterns)\n\n**Low quality (implementation details):**\n- Project-specific tactical choices\n- One-off solutions\n\n**So for Nexus event types specifically:**\n\nWhich events capture **methodology/convention/preference** vs **project-specific decisions**?\n\nFor example:\n- `DesignNote` - Could be either depending on scope?\n- `TechnicalDecision` - Same?\n- `CrossProjectIdea` - Methodology level by definition?\n\n**Do you have event types that explicitly distinguish \"this is how I think\" vs \"this is what I decided for project X\"?**\n\nOr does that need to be inferred from event content/metadata?"

