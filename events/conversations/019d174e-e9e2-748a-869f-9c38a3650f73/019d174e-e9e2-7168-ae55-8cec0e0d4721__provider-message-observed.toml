kind = "plain_text"
text = "Before diving into which model fits best, let me understand your approach better:\n\n**What's your current thinking on the fine-tuning strategy?**\n\nWhen you say \"continual increase its knowledge,\" are you envisioning:\n- **Periodic retraining** - Accumulate data, retrain from base model periodically with all accumulated data\n- **Incremental learning** - True continual learning where the model updates incrementally without forgetting\n- **Parameter-efficient methods** - Using LoRA/QLoRA adapters that you update and stack\n\n**And for the Nexus project specifically:**\n\nWhat kind of knowledge are you building? Is it:\n- Domain-specific terminology and patterns (e.g., F# idioms, MCP protocols)\n- Procedural knowledge (how to perform specific tasks)\n- Factual knowledge (documentation, API details)\n- Conversational style/tone\n\nThe reason I'm asking: **fine-tuning vs RAG** is a critical fork in the road here. Fine-tuning is powerful for style/reasoning patterns, but RAG might be more practical for growing factual knowledge bases. Many production systems use both - RAG for facts, fine-tuning for behavior.\n\nHave you already ruled out RAG, or is this an open question?"

