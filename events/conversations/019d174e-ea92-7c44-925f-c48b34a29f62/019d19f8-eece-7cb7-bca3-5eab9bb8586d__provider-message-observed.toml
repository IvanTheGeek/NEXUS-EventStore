[[body.segments]]
kind = "reasoning"
text = "Ivan knows this project - it was called SAFE Network before rebranding to Autonomi. He was following it closely 5 years ago. Let me acknowledge that context and pick up from there rather than re-explaining basics he already knows."

[[body.segments]]
kind = "plain_text"
text = "That context changes a lot. You already have the mental model — you watched it get built. So let me skip the foundational stuff and focus on what's *different* now and what's genuinely new.\n\n---\n\n## What Changed from SAFE Network\n\nThe biggest architectural shift: **they dropped the native token/consensus layer and punted to EVM/Arbitrum for payments.**\n\nSAFE Network spent years trying to build Safecoin as a native token with its own consensus. That was a massive source of delay. Autonomi sidestepped it entirely — storage payments are ANT tokens (ERC-20) on Arbitrum One. Pragmatic, but it means you need ETH for gas *plus* ANT for storage. That's a real UX friction point for any sovereignty-focused app.\n\nThe core storage architecture — self-encryption, content addressing, the distributed node network — that's largely what they were always building. It finally shipped.\n\n**The good news:** It's actually running. Mainnet launched. Data is being stored. That's the thing that never happened for 5 years while you were watching.\n\n---\n\n## For User Data Sovereignty Specifically\n\nThe key primitive you'd build around is the **Scratchpad + key derivation** combination.\n\nOne master key → unlimited derived child keys → each child key has its own Scratchpad address → you can organize a user's entire data life under one seed phrase, with logical separation between contexts, apps, domains.\n\nThat maps really well to the NEXUS philosophy — the user *is* the root of their own data hierarchy. Your app is just a lens over their key space.\n\n---\n\n## The Honest Tension\n\nFor NEXUS specifically — your model is rich graph structure, GWT layers, subgraph tiers. Autonomi gives you durable primitives but **zero query capability**. You'd be building your index layer on top of Scratchpads, which means:\n\n- Index lives in a Scratchpad (4MB, mutable, encrypted)\n- Content lives in Chunks (immutable, permanent)\n- The graph structure lives client-side or in GraphEntry chains\n\nThat's actually workable for a sovereignty model. But it means NEXUS graph traversal stays on the client. Whether that's acceptable depends on how you imagine NEXUS being used — single-user local-first vs. multi-user collaborative.\n\nWhat's your instinct on that? Single user owning their own graph, or multi-party collaboration as a real requirement?"

