[[body.segments]]
kind = "reasoning"
text = "The user is describing something like \"Crashplan\" or \"BackupPC\" or perhaps \"Tahoe-LAFS\" or most likely **Crashplan's friend/family backup** feature, or maybe **Symform** - a peer-to-peer backup service where you contributed storage to get storage back. There was also **Wuala** and **Bitcasa**. The most famous one fitting this description is probably **Crashplan** (which had a free friend/family tier) or **Symform** (which was explicitly contribution-based - you gave X GB, you got X GB back).\n\nSo the model is: **reciprocal storage contribution**. \n\nThe core idea here is elegant—you store my encrypted data, I store yours, no money involved, and INFLUANCE just tracks who owes what. This sidesteps the whole cryptocurrency friction problem by making the payment mechanism itself storage and bandwidth, which is exactly what systems like Tahoe-LAFS and early Storj were built around. The app they're probably thinking of is **CrashPlan** (which offered free friend backup until 2017) or **Symform** (the explicitly contribution-based one)."

[[body.segments]]
kind = "plain_text"
text = "CrashPlan had that — free tier where you backed up to a friend's machine and they backed up to yours. They killed it in 2017. Symform was similar, more explicitly contribution-based: you give X GB, you get X GB back. Both gone now.\n\nThat model **completely sidesteps the ANT/ETH problem.** There's no token at all. The \"payment\" is reciprocal storage. INFLUANCE becomes the ledger of that reciprocity — who's contributing what, whether the exchange is balanced, who's been reliable.\n\n---\n\nSo the actual model you're describing is:\n\n- Self-encrypted content-addressed chunks (Autonomi's approach, or IPFS, or Tahoe-LAFS)\n- Nodes contribute disk + bandwidth\n- INFLUANCE tracks the contribution ledger (you stored X GB-hours for the network, you're entitled to X GB-hours of storage)\n- No cryptocurrency. No gas fees. Contribution is the currency.\n\nThat's clean. And honestly more aligned with your AGPL/self-hosted values than anything involving Arbitrum.\n\n---\n\nThe hard problem this creates isn't technical though. It's **bootstrapping**. CrashPlan worked because you already trusted the person on the other end. An open network of strangers requires answering: why would someone contribute storage to back up content from people they don't know?\n\nWhat's your instinct on that — trust network first (start with known participants) and grow outward, or open from day one?"

