[[body.segments]]
kind = "plain_text"
text = "Yes. The right move is to model the network as **declared intent and observed reality**, not as vendor config text.\n\nFor your direction, I would make the base be:\n\n```text\nIntent  →  Network Record\nReality →  Network Record\n```\n\nThen routers, switches, APs, overlays, and policies become **projections and interpreters** over that record.\n\nA good NEXUS-aligned shape is this:\n\n```text\nCausality side\n  Desired change / declared topology / accepted fact\n          ↓\n        Record\n          ↑\nObserved state / telemetry / learned topology\nInterpretation side\n```\n\nSo the model should not begin with “firewall rule” or “interface config.”  \nIt should begin with a few orthogonal concepts.\n\n# Core ontology\n\nI would start with these seven roots:\n\n1. **Node**  \n   A thing in the network universe.\n\n2. **Link**  \n   A possible or actual connection between nodes.\n\n3. **Attachment**  \n   A node’s participation in a link.\n\n4. **Flow Intent**  \n   A desired movement of traffic between roles/scopes.\n\n5. **Policy**  \n   A constraint or decision rule over flows.\n\n6. **Service**  \n   A named network capability being exposed or consumed.\n\n7. **Observation**  \n   Measured or discovered reality.\n\nThat gives you a model that can drive OpenWRT, VyOS, OPNsense, Linux, or even diagrams.\n\n---\n\n# Fundamental distinction\n\nDo **not** make the primary model be this:\n\n```text\ninterface\nroute\nfirewall\ndhcp\nwireguard\n```\n\nThose are interpreter-specific implementation terms.\n\nInstead, make the core model be:\n\n```text\nwho exists\nhow they may connect\nwhat roles they play\nwhat traffic is desired\nwhat traffic is forbidden\nwhat reality is being observed\n```\n\nThen each backend maps that into config.\n\n---\n\n# Recommended layering\n\nUse four layers.\n\n## Layer 1 — Topology Record\nStatic-ish structural truth.\n\n- devices\n- uplinks\n- VLANs\n- networks\n- sites\n- WAN sources\n- ports\n- tunnels\n\n## Layer 2 — Intent Record\nWhat you want the network to do.\n\n- internet egress\n- truck-to-home access\n- neighbor backup path\n- guest isolation\n- lab routing\n- failover preference\n\n## Layer 3 — Capability Record\nWhat each interpreter can actually do.\n\n- OpenWRT supports mwan3\n- VyOS supports policy routing and BGP\n- OPNsense supports Suricata inline\n- Switch supports VLAN trunking, but not LACP\n\n## Layer 4 — Observation Record\nWhat is actually happening.\n\n- WAN1 latency\n- interface down\n- CGNAT detected\n- DHCP lease assigned\n- WireGuard peer stale\n- route convergence time\n- IDS alert\n- CPU saturation\n\nThis keeps desire separate from capability and reality.\n\n---\n\n# Suggested F# core types\n\nThis is the style I would use for the nucleus.\n\n```fsharp\nnamespace Nexus.Network\n\ntype NetworkId = NetworkId of string\ntype NodeId = NodeId of string\ntype LinkId = LinkId of string\ntype PolicyId = PolicyId of string\ntype ServiceId = ServiceId of string\ntype ObservationId = ObservationId of string\ntype InterfaceId = InterfaceId of string\ntype AddressId = AddressId of string\ntype RouteDomainId = RouteDomainId of string\ntype ZoneId = ZoneId of string\ntype ProviderId = ProviderId of string\ntype TunnelId = TunnelId of string\n\ntype IpFamily =\n    | IPv4\n    | IPv6\n\ntype AddressAssignment =\n    | Static of cidr:string\n    | Dhcp\n    | DhcpPrefixDelegation\n    | Pppoe\n    | LinkLocal\n    | Derived of source:string\n\ntype NodeKind =\n    | Router\n    | Switch\n    | AccessPoint\n    | Modem\n    | Ont\n    | Hypervisor\n    | Vm\n    | Container\n    | ClientDevice\n    | ExternalNetwork\n    | TunnelEndpoint\n    | ServiceHost\n    | Sensor\n\ntype InterfaceKind =\n    | PhysicalEthernet\n    | PhysicalSfpPlus\n    | Bridge\n    | Bond\n    | Vlan of tag:int\n    | Loopback\n    | TunnelInterface\n    | VirtualNic\n    | Wireless\n    | OobManagement\n\ntype LinkMedium =\n    | Copper\n    | Fiber\n    | Backplane\n    | VirtualSwitch\n    | Wireless80211\n    | Cellular\n    | OverlayTunnel\n    | Unknown\n\ntype ProviderKind =\n    | Fiber\n    | Cable\n    | Cellular5G\n    | Starlink\n    | NeighborTransit\n    | Internal\n\ntype ZoneKind =\n    | Wan\n    | Lan\n    | Guest\n    | Iot\n    | Lab\n    | Management\n    | Transit\n    | Dmz\n    | Overlay\n    | Custom of string\n\ntype NodeRole =\n    | Edge\n    | Core\n    | Distribution\n    | Access\n    | Client\n    | Observer\n    | Experimental\n    | Service\n    | RemoteIngress\n\ntype InterfaceRef =\n    { NodeId: NodeId\n      InterfaceId: InterfaceId }\n\ntype NetworkNode =\n    { Id: NodeId\n      Name: string\n      Kind: NodeKind\n      Roles: Set<NodeRole>\n      Site: string option\n      Tags: Set<string> }\n\ntype NetworkInterface =\n    { Id: InterfaceId\n      NodeId: NodeId\n      Name: string\n      Kind: InterfaceKind\n      MacAddress: string option\n      Mtu: int option\n      SpeedMbps: int option\n      Zone: ZoneId option\n      Enabled: bool }\n\ntype AddressBinding =\n    { Id: AddressId\n      Interface: InterfaceRef\n      Family: IpFamily\n      Assignment: AddressAssignment\n      Value: string option }\n\ntype LinkEndpoint =\n    { Interface: InterfaceRef\n      NativeVlan: int option\n      AllowedVlans: Set<int>\n      L2Only: bool }\n\ntype NetworkLink =\n    { Id: LinkId\n      Name: string\n      Medium: LinkMedium\n      Endpoints: LinkEndpoint list\n      ExpectedUp: bool }\n\ntype Provider =\n    { Id: ProviderId\n      Name: string\n      Kind: ProviderKind\n      AddressFamilies: Set<IpFamily>\n      Notes: string option }\n\ntype Zone =\n    { Id: ZoneId\n      Name: string\n      Kind: ZoneKind\n      TrustLevel: int }\n\ntype RouteIntent =\n    | DefaultEgress of zone:ZoneId * preferredProviders: ProviderId list\n    | ReachPrefix of prefix:string * viaZone:ZoneId\n    | ReachService of service:ServiceId * fromZone:ZoneId\n    | TransitBetween of fromZone:ZoneId * towardZone:ZoneId\n    | BlackholePrefix of prefix:string\n\ntype PolicyMatch =\n    { FromZones: Set<ZoneId>\n      ToZones: Set<ZoneId>\n      Sources: Set<string>\n      Destinations: Set<string>\n      Services: Set<ServiceId>\n      Protocols: Set<string> }\n\ntype PolicyDecision =\n    | Allow\n    | Deny\n    | Reject\n    | RouteViaProvider of ProviderId\n    | RouteViaTunnel of TunnelId\n    | MirrorToSensor of NodeId\n    | RateLimit of mbps:int\n    | Mark of string\n\ntype Policy =\n    { Id: PolicyId\n      Name: string\n      Match: PolicyMatch\n      Decision: PolicyDecision\n      Priority: int\n      Enabled: bool }\n\ntype ServiceDefinition =\n    { Id: ServiceId\n      Name: string\n      Protocol: string\n      Ports: int list\n      Description: string option }\n\ntype TunnelKind =\n    | WireGuard\n    | Gre\n    | Vxlan\n    | IpSec\n    | Tailscale\n    | Zerotier\n    | CustomTunnel of string\n\ntype Tunnel =\n    { Id: TunnelId\n      Name: string\n      Kind: TunnelKind\n      LocalNode: NodeId\n      RemoteNode: NodeId option\n      Zone: ZoneId option\n      Enabled: bool }\n\ntype ObservationKind =\n    | InterfaceUp\n    | InterfaceDown\n    | AddressAssigned\n    | GatewayHealthy\n    | GatewayDegraded\n    | GatewayFailed\n    | PrefixReachable\n    | PrefixUnreachable\n    | DhcpLeaseObserved\n    | WireGuardPeerHealthy\n    | WireGuardPeerStale\n    | IpsAlert\n    | RouteInstalled\n    | RouteWithdrawn\n    | ThroughputMeasured\n    | LatencyMeasured\n    | PacketLossMeasured\n    | CpuMeasured\n    | ConfigApplied\n    | ConfigRejected\n    | TopologyDiscovered\n\ntype Observation =\n    { Id: ObservationId\n      Kind: ObservationKind\n      SubjectNode: NodeId option\n      SubjectInterface: InterfaceRef option\n      SubjectLink: LinkId option\n      ValueText: string option\n      ValueNumber: decimal option\n      Unit: string option\n      TimestampUtc: System.DateTime\n      Source: string }\n\ntype NetworkModel =\n    { Nodes: NetworkNode list\n      Interfaces: NetworkInterface list\n      Addresses: AddressBinding list\n      Links: NetworkLink list\n      Providers: Provider list\n      Zones: Zone list\n      RouteIntents: RouteIntent list\n      Policies: Policy list\n      Services: ServiceDefinition list\n      Tunnels: Tunnel list\n      Observations: Observation list }\n```\n\nThat is your foundational “network as data” model.\n\n---\n\n# Why this model works\n\nBecause it separates:\n\n- **what exists** from\n- **what is desired** from\n- **what is observed** from\n- **how a given router expresses it**\n\nThat means you can swap OpenWRT for VyOS without rewriting the domain.\n\n---\n\n# The most important design rule\n\nTreat vendor/router config as a **projection artifact**, never as the source of truth.\n\nSo:\n\n```text\nNEXUS Network Model\n   ↓\nInterpreter\n   ↓\nOpenWRT UCI files\nVyOS config commands\nOPNsense API calls\nLinux netplan / nftables\nDocumentation / diagrams\n```\n\n---\n\n# Suggested domain partitions\n\nI would partition the model into these bounded areas.\n\n## 1. Physical\nHardware and attachment reality.\n\n- nodes\n- interfaces\n- links\n- media\n- speed\n- Oculink-attached NICs\n\n## 2. Logical\nConstructed networking structures.\n\n- VLANs\n- bridges\n- tunnels\n- zones\n- route domains\n\n## 3. Access\nWho may talk to what.\n\n- services\n- firewall policies\n- exposure policies\n- source roles\n- trust levels\n\n## 4. Egress\nHow traffic exits.\n\n- providers\n- priority\n- failover\n- load-balance groups\n- source-based policies\n\n## 5. Observation\nWhat’s actually happening.\n\n- health\n- measured performance\n- events\n- alerts\n- discoveries\n\n## 6. Intent-to-Artifact\nCompiler/projection layer.\n\n- OpenWRT projection\n- VyOS projection\n- OPNsense projection\n- docs/diagram projection\n\n---\n\n# Practical TOML representation\n\nHere is how I would store a simple home edge in TOML.\n\n```toml\n[network]\nid = \"home-edge\"\nname = \"Home Edge Network\"\n\n[[zones]]\nid = \"wan\"\nname = \"WAN\"\nkind = \"Wan\"\ntrust_level = 10\n\n[[zones]]\nid = \"lan\"\nname = \"LAN\"\nkind = \"Lan\"\ntrust_level = 80\n\n[[zones]]\nid = \"guest\"\nname = \"Guest\"\nkind = \"Guest\"\ntrust_level = 30\n\n[[zones]]\nid = \"lab\"\nname = \"Lab\"\nkind = \"Lab\"\ntrust_level = 50\n\n[[providers]]\nid = \"att-fiber\"\nname = \"AT&T Fiber\"\nkind = \"Fiber\"\naddress_families = [\"IPv4\", \"IPv6\"]\n\n[[nodes]]\nid = \"k12-host\"\nname = \"GMKtec K12\"\nkind = \"Hypervisor\"\nroles = [\"Edge\", \"Experimental\"]\ntags = [\"proxmox\", \"mini-pc\"]\n\n[[nodes]]\nid = \"router-core\"\nname = \"router-core\"\nkind = \"Vm\"\nroles = [\"Edge\", \"Core\"]\ntags = [\"openwrt\"]\n\n[[nodes]]\nid = \"switch-main\"\nname = \"main switch\"\nkind = \"Switch\"\nroles = [\"Distribution\"]\n\n[[interfaces]]\nid = \"k12-eno1\"\nnode_id = \"k12-host\"\nname = \"eno1\"\nkind = \"PhysicalEthernet\"\nzone = \"wan\"\nenabled = true\nspeed_mbps = 2500\n\n[[interfaces]]\nid = \"k12-eno2\"\nnode_id = \"k12-host\"\nname = \"eno2\"\nkind = \"PhysicalEthernet\"\nzone = \"lan\"\nenabled = true\nspeed_mbps = 2500\n\n[[interfaces]]\nid = \"router-wan\"\nnode_id = \"router-core\"\nname = \"eth0\"\nkind = \"VirtualNic\"\nzone = \"wan\"\nenabled = true\n\n[[interfaces]]\nid = \"router-lan\"\nnode_id = \"router-core\"\nname = \"eth1\"\nkind = \"VirtualNic\"\nzone = \"lan\"\nenabled = true\n\n[[addresses]]\nid = \"router-wan-ipv4\"\ninterface_node_id = \"router-core\"\ninterface_id = \"router-wan\"\nfamily = \"IPv4\"\nassignment = \"Dhcp\"\n\n[[addresses]]\nid = \"router-wan-ipv6\"\ninterface_node_id = \"router-core\"\ninterface_id = \"router-wan\"\nfamily = \"IPv6\"\nassignment = \"DhcpPrefixDelegation\"\n\n[[addresses]]\nid = \"router-lan-ipv4\"\ninterface_node_id = \"router-core\"\ninterface_id = \"router-lan\"\nfamily = \"IPv4\"\nassignment = \"Static\"\nvalue = \"192.168.10.1/24\"\n\n[[links]]\nid = \"wan-link\"\nname = \"ATT to router host\"\nmedium = \"Copper\"\nexpected_up = true\n\n[[links.endpoints]]\nnode_id = \"k12-host\"\ninterface_id = \"k12-eno1\"\nl2_only = false\nallowed_vlans = []\n\n[[links.endpoints]]\nnode_id = \"router-core\"\ninterface_id = \"router-wan\"\nl2_only = false\nallowed_vlans = []\n\n[[links]]\nid = \"lan-trunk\"\nname = \"router host to switch\"\nmedium = \"Copper\"\nexpected_up = true\n\n[[links.endpoints]]\nnode_id = \"k12-host\"\ninterface_id = \"k12-eno2\"\nl2_only = true\nnative_vlan = 10\nallowed_vlans = [10, 20, 30]\n\n[[links.endpoints]]\nnode_id = \"switch-main\"\ninterface_id = \"uplink1\"\nl2_only = true\nnative_vlan = 10\nallowed_vlans = [10, 20, 30]\n\n[[services]]\nid = \"dns\"\nname = \"DNS\"\nprotocol = \"udp\"\nports = [53]\n\n[[services]]\nid = \"https\"\nname = \"HTTPS\"\nprotocol = \"tcp\"\nports = [443]\n\n[[route_intents]]\nkind = \"DefaultEgress\"\nzone = \"lan\"\npreferred_providers = [\"att-fiber\"]\n\n[[policies]]\nid = \"lan-out\"\nname = \"LAN to internet\"\npriority = 100\nenabled = true\ndecision = \"Allow\"\n\n[policies.match]\nfrom_zones = [\"lan\"]\nto_zones = [\"wan\"]\nsources = []\ndestinations = []\nservices = []\nprotocols = []\n\n[[policies]]\nid = \"guest-to-lan\"\nname = \"Guest blocked from LAN\"\npriority = 50\nenabled = true\ndecision = \"Deny\"\n\n[policies.match]\nfrom_zones = [\"guest\"]\nto_zones = [\"lan\"]\nsources = []\ndestinations = []\nservices = []\nprotocols = []\n```\n\nI would likely refine the TOML shape a bit, but that shows the idea.\n\n---\n\n# Add multi-WAN without changing the ontology\n\nThat’s a good test of whether the model is sound.\n\nYou just add providers, interfaces, links, and egress intent.\n\n```toml\n[[providers]]\nid = \"starlink\"\nname = \"Starlink\"\nkind = \"Starlink\"\naddress_families = [\"IPv4\", \"IPv6\"]\n\n[[providers]]\nid = \"vz-5g\"\nname = \"Verizon 5G\"\nkind = \"Cellular5G\"\naddress_families = [\"IPv4\"]\n\n[[route_intents]]\nkind = \"DefaultEgress\"\nzone = \"lan\"\npreferred_providers = [\"att-fiber\", \"starlink\", \"vz-5g\"]\n```\n\nThen add policy decisions like:\n\n- lab traffic prefers Starlink\n- truck tunnel prefers fiber\n- guest may fail over to any healthy link\n\nThat means your route model should not be “static route only.” It should be **egress intent** first.\n\n---\n\n# Model public blocks explicitly\n\nSince you mentioned a dynamic WAN plus additional public IPv4 block and IPv6 /64, I would represent those as **allocations** and **exposure intents** rather than scattered interface settings.\n\nExample:\n\n```fsharp\ntype PrefixAllocation =\n    { ProviderId: ProviderId\n      Family: IpFamily\n      Prefix: string\n      DelegatedToNode: NodeId option\n      Purpose: string option }\n\ntype ExposureIntent =\n    | NatOutbound of fromZone:ZoneId * viaProvider:ProviderId\n    | PublishService of service:ServiceId * publicPrefix:string * targetNode:NodeId\n    | AssignPublicAddress of prefix:string * targetInterface:InterfaceRef\n    | DelegatePrefix of prefix:string * targetZone:ZoneId\n```\n\nThis is important because AT&T’s public block setup can be awkward depending on gateway mode and handoff behavior. If you model it as allocation plus exposure, you can adapt interpreter logic later.\n\n---\n\n# Observations should be first-class\n\nThis is where your system becomes powerful.\n\nDo not treat monitoring as separate from network modeling.  \nMake observed reality part of the same record.\n\nExamples:\n\n```fsharp\ntype GatewayHealth =\n    { ProviderId: ProviderId\n      LatencyMs: decimal option\n      PacketLossPct: decimal option\n      Healthy: bool\n      TimestampUtc: System.DateTime }\n\ntype FlowSample =\n    { SourceZone: ZoneId\n      DestinationZone: ZoneId\n      ServiceId: ServiceId option\n      BytesPerSecond: int64\n      TimestampUtc: System.DateTime }\n\ntype ConfigResult =\n    | Applied\n    | Rejected of string\n    | Partial of string\n```\n\nThen your engine can make decisions like:\n\n- mark Starlink degraded\n- keep truck overlay on fiber only\n- mirror lab VLAN to sensor\n- postpone router cutover if latency spikes\n\nThat is where the model stops being a static config repo and becomes a real network control record.\n\n---\n\n# Event model view\n\nIf you wanted to store this in evented form, I would make the important events look like this:\n\n## Topology events\n- NodeRegistered\n- InterfaceDeclared\n- LinkDeclared\n- ZoneDefined\n- ProviderDefined\n- TunnelDeclared\n\n## Intent events\n- EgressIntentSet\n- PolicyDeclared\n- ServicePublished\n- PrefixAllocated\n- ExposureIntentDeclared\n\n## Observation events\n- InterfaceStateObserved\n- GatewayHealthObserved\n- PrefixReachabilityObserved\n- FlowMeasured\n- IpsAlertObserved\n- ConfigApplyResultObserved\n\n## Control events\n- InterpreterAssigned\n- ProjectionGenerated\n- ConfigAppliedToTarget\n- CutoverRequested\n- CutoverCompleted\n- CutoverReverted\n\nThat maps beautifully to your immutable evolution idea.\n\n---\n\n# Replaceable router VM design\n\nThis is where your plan becomes elegant.\n\nInstead of thinking:\n\n```text\nthe router VM owns the network\n```\n\nThink:\n\n```text\nthe router VM is one active interpreter of the network record\n```\n\nSo you can have:\n\n- `router-openwrt-a`\n- `router-vyos-b`\n- `router-opnsense-c`\n\nEach projects from the same domain record into its own artifact form.\n\nThen you maintain a separate concept:\n\n```fsharp\ntype InterpreterTarget =\n    { NodeId: NodeId\n      Platform: string\n      Role: string\n      ActivePriority: int\n      CanAssumeEdge: bool }\n\ntype ActivationIntent =\n    | ActivateInterpreter of NodeId\n    | DrainInterpreter of NodeId\n    | PromoteStandby of NodeId\n    | RevertToPrevious of NodeId\n```\n\nThat gives you hard cutover support as a first-class idea in the model.\n\n---\n\n# Suggested folder structure\n\nFor NEXUS-style organization, I would structure it like this:\n\n```text\nnexus/\n  network/\n    ontology/\n      network-ontology.md\n      zones.md\n      providers.md\n    schema/\n      Types.fs\n      Topology.fs\n      Intent.fs\n      Observation.fs\n      Projection.fs\n    records/\n      home-edge/\n        topology.toml\n        intent.toml\n        observation/\n          latest.toml\n          history/\n    projections/\n      openwrt/\n      vyos/\n      opnsense/\n      diagrams/\n    interpreters/\n      openwrt/\n      vyos/\n      opnsense/\n    experiments/\n      cutover-scenarios/\n      multiwan/\n      neighbor-mesh/\n```\n\nThis keeps ontology separate from records and separate from interpreters.\n\n---\n\n# The minimum viable model for you right now\n\nTo get started without overbuilding, I would begin with only these pieces:\n\n## Required now\n- nodes\n- interfaces\n- links\n- zones\n- providers\n- services\n- route intents\n- policies\n\n## Next\n- tunnels\n- observations\n- prefix allocations\n- exposure intents\n\n## Later\n- capabilities\n- activation intents\n- compiled artifacts\n- diff and validation rules\n\n---\n\n# The simplest useful interpretation pipeline\n\n```text\nTOML intent/topology\n   ↓\nLoad into F# domain\n   ↓\nValidate\n   ↓\nResolve effective network graph\n   ↓\nCompile target-specific plan\n   ↓\nEmit:\n  - OpenWRT UCI\n  - VyOS commands\n  - OPNsense API payloads\n  - Mermaid / HTML diagrams\n  - Docs\n```\n\nThat would be the right first implementation.\n\n---\n\n# My strongest recommendation\n\nMake **Zone**, **Provider**, and **Service** the center of policy, not interfaces.\n\nWhy?\n\nBecause interfaces change.  \nVMs change.  \nNIC names change.  \nYour big box will change.\n\nBut these stay stable:\n\n- `guest`\n- `lab`\n- `wan`\n- `att-fiber`\n- `starlink`\n- `truck-overlay`\n- `dns`\n- `https`\n- `ssh`\n\nThat gives you a durable source of truth.\n\n---\n\n# A crisp NEXUS statement for this model\n\nYou could describe it like this:\n\n> The network is not modeled as device configuration.  \n> The network is modeled as a recorded topology, declared intent, and observed reality.  \n> Routers, switches, and controllers are interpreters that project this record into executable artifacts.\n\nThat is the heart of it.\n\nIf you want, next I’ll turn this into a concrete starter package with `Types.fs`, `topology.toml`, `intent.toml`, and a first OpenWRT projection shape."

