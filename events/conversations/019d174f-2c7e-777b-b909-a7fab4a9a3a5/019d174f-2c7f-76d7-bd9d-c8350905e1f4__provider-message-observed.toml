text = "fileciteturn0file0\n\nOwner Operator/Expediter Services \n\nSign On Worksheet \n\nPlease complete all the attached documents and submit through Docusign. \n\n1. Subscriber Services Agreement\n2. DriverNehicle Information Sheet\n3. Independent Contractor Insurance Program Offering\n4. Appointment of Agent\n5. W9 Form\n6. Direct Deposit Worksheet\n7. Expediter Services Website Information\n8. Required Equipment Verification\n\nNeed Help? Contact your recruiter \n\nName: ______________________ _ \n\nwww .essuccess intrucki n g.com \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\nSPECIAL OPS LOGISTICS \n\nIVAN RAINBOLT, PRESIDENT\n\nBusiness Name:\n\n\n\nSUBSCRIBER SERVICES AGREEMENT \n\n(OWNER/OPERA TOR ONLY) \n\nTHIS SUBSCRIBER SERVICES AGREEMENT (the \"Agreement\") is made and \nentered into as of ______ _, 20_ (the \"Effective Date\"), by and between \nEXPEDITER MANAGEMENT SERVICES, LLC, a Mississippi limited liability company, \n(\"Servicer\") and \n\n(\"Subscriber\"), and is made with references to the following facts and objectives: \n\nRECITALS \n\nA. Subscriber is engaged in providing carriage capacity to the transportation and\nlogistics industry (the \"Business\") as an owner/operator of its vehicles, one or more (collectively, \nthe \"Vehicles\"), under the United States Department of Transportation (the \"DOT\") permit (the \n\"DOT Permit\") evidenced on the signature page; \n\nB. Servicer is engaged in the business of providing administrative services to\nparticipants in the Business; and \n\nC. Subscriber desires to utilize the services and experience of Servicer in connection\nwith the administration of Subscriber's Business activity. \n\n(Servicer is also engaged in the businesses of providing other services, including \nfinancing of vehicles, leasing of vehicles, and the collection and auditing of logistics receivables. \nIf a Subscriber were to choose to utilize any of the other services, then Subscriber and Servicer \nmust enter into a separate form of agreement with respect to whichever of the other services \nSubscriber may choose.) \n\nNOW, THEREFORE, for good and valuable consideration, the receipt and sufficiency \nof which is hereby expressly acknowledged, the parties hereby agree as follows: \n\n1. VEHICLES. Servicer will provide to all of the Vehicles the services enumerated in this\nAgreement; provided, however, that Subscriber shall notify Servicer of all updates to\nSubscriber's fleet of Vehicles, identifying new Vehicles as they are introduced into Subscriber's\nfleet and retired or terminated Vehicles as they are removed therefrom.\n\n2. SERVICES.\n\nA. Infonnation Services. Servicer will make available to Subscriber, in the manner\ndescribed herein, certain infonnation regarding load history and freight availability with\nrespect to certain geographic areas in the United States (the \"Load Information\"). The\nLoad Information is based on information provided to Servicer by other parties operating\nwithin the Business. The Load Information will be available to Subscriber prior to or\nsubsequent to the acceptance of any load opportunity.\n\nActive Subscriber Services Agreement 2019 \n4849-11 S8-3892v I \n2902362-000003 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\nMarch 28th\n\nBusiness Name: SPECIAL OPS LOGISTICS IVAN RAINBOLT, PRESIDENT\n\n24\n\n\n\n \n\nB. Website Access. Subscriber will be able to access the Load Information through a\nsecure website operated and maintained by Servicer (the \"Website\"). The Website\ncontains a custom-built search engine that will enable Subscriber to access the Load\nInformation that Subscriber may use to decide whether or not to accept a particular load.\n\nC. 24/7 Support Line. Servicer will provide 24/7 support service to Subscriber that\nwill be accessible through a toll free telephone nwnber. Additionally, a customer service\nrepresentative will be assigned to Subscriber. This customer service representative will be\navailable to Subscriber weekly Monday through Friday (except holidays), 8 a.m. to 5\np.m., Central Standard Time.\n\nD. Fuel Card Program. Subscriber will be entitled, but is not required, to participate\nin Servicer's fuel card program pursuant to which Subscriber may purchase fuel at a\ndiscounted rate (the \"Fuel Program\"). Subscriber will be issued a Servicer fuel card. If\n\nSubscriber elects to participate in the Fuel Program, Subscriber may use the Servicer fuel\ncard to purchase fuel from suppliers identified by Servicer. Subscriber's charges will be\nlimited to Subscriber's available funds. Subscriber's charges will be paid by Servicer and\nreimbursed by Subscriber out of available Carrier Compensation, as more fully described\nherein.\n\nE. Insurance. Subscriber shall be entitled, but is not required, to participate in\nServicer's national insurance program pursuant to which Subscriber may purchase, at\ndiscounted rates, certain vehicle and liability insurance required by the Carrier Lease\nAgreement (defined herein) (the \"Insurance Program\"). If Subscriber elects to participate\nin the Insurance Program, the insurance will be purchased through designated service\nproviders, and the charges will be paid by Servicer and reimbursed by Subscriber out of\navailable Carrier Compensation as more fully described herein.\n\nF. National Tire Program. Subscriber will be entitled, but is not required, to\nparticipate in Servicer's national tire program pursuant to which Subscriber may purchase\ntires at a discounted rate (the \"Tire Program\"). If Subscriber elects to participate in the\nTire Program, the tires will be purchased through designated service providers, and the\ncharges will be paid by Servicer and reimbursed by Subscriber out of available Carrier\nCompensation as more fully described herein.\n\nG. Repairs and Maintenance. Subscriber will be entitled, but is not required, to\nparticipate in Servicer's national repair and maintenance program pursuant to which\nrepairs may be made to and maintenance performed on the Vehicles through certain\nservice providers identified by Servicer (the \"Repair Program\"). If Subscriber elects to\nparticipate in the Repair Program, Subscriber will be entitled to certain discounts offered\nthereby. If Subscriber elects to participate in the Repair Program, repair and maintenance\npurchases will be made through service providers identified by Servicer, and the charges\nwill be paid by Servicer and reimbursed by Subscriber out of available Carrier\nCompensation as more fully described herein.\n\n4849·1158-3892vl \n\n2902362-000003 \n\n2 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\n\n\n \n\n3. ADMINISTRATIVE SERVICES\n\nA. Appointment as Agent. Subscriber hereby appoints Servicer as Subscriber's\nexclusive agent for purposes of accepting and collecting receivables from\n______ (\"Carrier\") pursuant to the tenns and conditions of Carrier's fonn of\ncarrier lease agreement, a copy of which is attached hereto as Schedule 1 (the \"Carrier\nLease Agreement\"). Servicer is authorized to enter into, renew, modify, amend and\ncancel the Carrier Lease Agreement in the name of Subscriber as Servicer may deem\nappropriate or necessary or to facilitate the accepting and collecting of receivables\ngenerated thereunder. If required by the Carrier or any other third party, Subscriber and\nServicer agree to execute and deliver a separate document evidencing Servicer's\nappointment as agent for Carrier, which separate document shall be deemed to be a part\nof this Agreement.\n\nB. Subscriber Obligations. Subscriber agrees to perfonn each of its obligations\nunder the Carrier Lease Agreement and to comply with each and every tenn and\nprovision in the Carrier Lease Agreement, including, without limitation, maintaining the\nVehicles in good, safe and efficient operating condition; furnishing drivers for the\nVehicles who meet all requirements imposed by law or regulatory authority and\nSubscriber; preparing and filing all such logs, fuel receipts and other documents required\nthereby; providing the insurance coverage as required thereunder; indemnifying the\nCarrier as provided in the Carrier Lease Agreement and establishing such escrow account\nand making such other payments as more fully described in the Carrier Lease Agreement.\n\nC. Payment Administration. Servicer shall administer all payments to be made by\nthe Carrier, to the Subscriber under the Carrier Lease Agreement (\"Carrier\nCompensation\"). In the Carrier Lease Agreement, Subscriber shall direct the Carrier to\nmake all payments of Carrier Compensation directly to Servicer, after Carrier has made\nany deductions from Carrier Compensation pursuant to the tenns of the Carrier Lease\nAgreement. From the Carrier Compensation received by Servicer from Carrier, Servicer\nshall deduct the following charges and make payments, as required, on behalf of\nSubscriber directly to the Vendor or other Subscriber-designated recipient:\n\n4849-l 158-3892vl \n\n2902362-000003 \n\n(1) fuel charges\"';\n\n(2) insurance payments•;\n\n(3) tire purchases*;\n\n(4) repair and maintenance charges•;\n\n(5) loan payments owed to Servicer and/or its assignees;\n\n(6) such other charges that may be related to the Carrier Lease Agreement and\nincurred or payable by Subscriber (*all such charges under Servicer's\nprograms set forth in Section 2, or as Servicer is otherwise directed by\nSubscriber);\n\n3 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\nFedEx Custom Critical\n\n\n\n \n\n(7) amounts due to owner/operators of the Vehicles; and\n\n(8) the Service Fee (as defined below).\n\n4. COMPENSATION. In consideration for the services to be provided herein, Subscriber\nshall pay Expediter Management Services a weekly service fee equal to\n____________ (the \"Service Fee\"). In order to enable Expediter Management\nServices to offer Subscriber the discounts and services provided for in this Agreement, Carrier\nhas agreed to pay Expediter Management Services a Capacity/Availability Fee, as agreed upon\nbetween the Carrier and Expediter Management Services and detailed in a separate\nagreement/document. This payment by the Carrier enables subscribers to participate in the\nExpediter Management Services program without having to bear the majority of the costs of the\nprogram and is detailed on Subscribers settlement statement.\n\n5. TERM OF THE AGREEMENT.\n\nA. Initial Tenn. The initial tenn of this Agreement shall commence on the date\nhereof, and shall continue thereafter for a period of one (1) year, unless sooner tenninated\nas hereinafter provided (the \"Initial Term\").\n\nB. Successive Terms. Unless sooner terminated by either of the parties in accordance\nwith the provisions of this Agreement, the initial one (1) year tenn of this Agreement\nshall renew at the end of the initial term and for successive one (1) year terms thereafter\nupon verification by Subscriber.\n\nC. Termination. Either the Subscriber or Servicer may terminate this Agreement at\nany time by providing the other party at least thirty (30) days prior written notice. In the\nevent the Carrier Lease Agreement is terminated for any reason, and a new carrier lease\nagreement with either the Carrier or a new carrier is not entered into within 30 days of\nsuch tennination, this Agreement shall terminate on the date that is 30 days from the date\nthat the Carrier Lease Agreement terminates. If the Subscriber enters into a new carrier\nlease agreement within 30 days of termination, this Agreement shall continue and the\nterm \"Carrier\" shall mean the carrier that is a party to the new Carrier Lease Agreement\nand the tenn \"Carrier Lease Agreement\" shall mean the new carrier lease agreement.\n\n6. INSURANCE.\n\nA. Additional Insureds. Subscriber shall at all times maintain in effect the insurance\nrequired by the Carrier Lease Agreement. Such policy shall be issued in the name of\nSubscriber and shall name, as additional insureds*, Servicer and its members, employees,\ndirectors, officers, counsel and agents.\n\nB. Subscriber Owned Policies of Insurance. The Subscriber shall cause Servicer to\nbe named as an additional insured* on any additional or supplemental insurance policy or\npolicies that the Subscriber may obtain for the Vehicles. (* Evidence of coverage of such\nadditional insureds shall be provided by Subscriber to Servicer upon request.)\n\n4849•1158-3892vl \n\n2902362-000003 \n\n4 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\n$17.50\n\n\n\n \n\nC. Policy Management. Subscriber hereby appoints Servicer as its exclusive agent\nfor obtaining, managing and resolving any matters related to the vehicle insurance\npolicies p�chased through the Insurance Program.\n\nD. Insurance Policies. The Subscriber will furnish to Servicer copies of each and\nevery insurance policy and endorsement relating to the ownership or operation of the\nVehicles.\n\nE. Lack of Insurance. The Vehicles or any part thereof shall not be operated during\nthe term of this Agreement unless the insurance required by the Carrier Lease Agreement\nis in full force and effect, nor will it be operated in a location or in a manner which would\ncause the insurance to be suspended, impaired or canceled, or its protection to be\njeopardized.\n\nF. Impairment of Insurance. Neither Subscriber nor Servicer will take nor fail to\ntake any action that would cause the insurance set forth in this Agreement to be\nsuspended, impaired or canceled. Provided, however, that Servicer shall not be obligated\nto pay any insurance premiwn on behalf of Subscriber except from available Carrier\nCompensation.\n\n7. ASSIGNMENT.\n\nA. Assignment by Subscriber. Without Servicer's prior written consent, which\nconsent Servicer may arbitrarily withhold in Servicer's absolute discretion, Subscriber\nshall not assign, transfer, pledge, hypothecate or otherwise dispose of this Agreement or\nany interest in this Agreement.\n\nB. Assignment by Servicer. Servicer may assign this Agreement, in whole or in part,\nwithout Subscriber's prior consent, but Servicer shall give Subscriber notice of such\nassignment.\n\nC. Successors and Assigns. This Agreement shall be binding upon the permitted\nsuccessors and assigns of Servicer and Subscriber.\n\n8. CONFIDENTIALITY. The parties hereby acknowledge and agree that all information\nprovided by each party (\"Disclosing Party\") to the other party (\"Receiving Party\") in connection\nwith this Agreement and all information specifically designated by either party as -being\nconfidential (collectively, \"Confidential Information\") shall be considered the confidential and\nproprietary information of the Disclosing Party.\n\nA. Prohibition Against Unauthorized Disclosure or Use. Receiving Party shall use\nsuch Confidential Information only for the purpose of performing its duties hereunder,\nshall not use any of such Confidential Information for any other purpose and shall not\ndisclose any of such Confidential Information to any third party without the prior written\nconsent of Disclosing Party. Receiving Party shall ensure that only its employees,\nauthorized agents, or subcontractors who need to know Confidential Information will\n\n4849•11 S8-3892vl \n\n2902362-000003 \n\n5 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\n\n\n \n\nreceive such Confidential Inf onnation and shall advise all such persons that such \nConfidential lnfonnation is not to be disclosed or used except as pennitted herein. \n\nB. Exceptions. Receiving Party's obligations contained in this Section shall not\napply to (1) infonnation that is or becomes publicly known through no fault of Receiving\nParty, (2) information which Receiving Party receives from a third party authorized to\ndisclose such information without restriction, (3) information which is developed\nindependently without use of Confidential Infonnation or (4) information Receiving\n\n· Party is required to disclose by a government authority or order of a court of competent\njurisdiction; provided, however, that such disclosure is subject to all applicable\ngovernmental and judicial protection available for like material and provided further that\nReceiving Party gives Disclosing Party whatever advance notice is reasonable under the\ncircumstances that such disclosure has been required.\n\nC. Disposition. Upon Disclosing Party's demand, or upon expiration or other\ntermination of this Agreement, Receiving Party shall comply with all reasonable\ninstructions from Disclosing Party regarding the disposition of Confidential Information,\nincluding any copies or reproductions thereof.\n\nD. Back Solicitation. Subject to B above, Servicer shall not use Confidential\nInformation to solicit freight from customers of Subscriber.\n\nE. Remedies. The parties agree that any violation of the provisions of this Section\nmay cause irreparable and substantial damage and that no adequate remedy may be\navailable at law or in equity. The parties agree that they each shall be entitled to\ntemporary or permanent injunctions and other appropriate relief restraining the other\nparty from using or disclosing, in whole or in part, any Confidential Information, without\nthe necessity of showing actual damages or furnishing a bond or other security; provided,\nhowever, that nothing contained herein shall be construed as prohibiting either party from\npursuing any other legal and equitable remedies available to it, including the recovery of\ndamages.\n\n9. ATTORNEY'S FEES. In the event that any litigation, arbitration, or other proceeding is\ncommenced between the parties hereto or their personal representatives, successors or assigns\nconcerning the enforcement or interpretation of any provision of this Agreement or the rights and\nduties of any party in relation thereto, the party or parties prevailing in such litigation, arbitration\nor other proceeding shall be entitled, in addition to such other relief as may be granted, to a\nreasonable sum as and for attorneys' fees, which sum shall be determined by the Court in such\nlitigation or by a separate legal action brought for that purpose. For the purposes of'this\nparagraph, the \"prevailing party\" shall be determined in accordance with the provisions of\nMississippi law.\n\n10. WARRANTIES; INDEMNIFICATION.\n\nA. DISCLAIMER OF WARRANTIES. TO THE FULL EXTENT ALLOWED BY\nLAW, SERVICER MAKES NO WARRANTIES WHATSOEVER, EXPRESS\nOR IMPLIED, EITHER IN FACT OR BY OPERATION OF LAW,\n\n4849-I ISB-3892vl \n\n2902362-000003 \n\n6 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\n\n\n \n\nSTATUTORY OR OTHERWISE, OR ARISING FROM THE COURSE OF \nDEALING BETWEEN THE PARTIBS OR USAGE OF TRADE, INCLUDING \nWARRANTIES OF MERCHANT ABILITY, AND FITNESS FOR A \nPARTICULAR PURPOSE, ALL OF WHICH ARE EXPRESSLY \nDISCLAIMED. \n\nB. Limitation of Liability.\n\na) No Consequential Damages. In no event shall Servicer be liable to\nSubscriber or to any third party, whether in contract, tort (including\nnegligence), warranty or otherwise, for any indirect, incidental, special,\nconsequential, exemplary or punitive damages (including, without\nlimitation, loss of profits) arising out of or relating to this Agreement, even\nif it has been advised of the possibility of such damages.\n\nb) Limit on Direct Damages. In no event will Servicer's aggregate,\ncumulative liability for damages to Subscriber arising out of or relating to\nthis Agreement exceed the total amount of Service Fees paid to Servicer\nduring the term of this Agreement.\n\nC. Indemnification. Subscriber will defend, hold harmless and indemnify Servicer\nand its members, employees, directors, officers, counsel and agents from and against any\nand all damages, liability, costs and expenses (including, but not limited to, reasonable\nattorney fees) relating to any third party claim, judicial or regulatory proceeding,\ninvestigation or claim by a self-regulatory organization, state or federal agency or\ncommission, to the fullest extent permitted by law, arising out of, or in connection with,\n(a) the negligence or willful misconduct of Subscriber or (b) Subscriber's breach of this\nAgreement or the Carrier Lease Agreement.\n\nD. Vehicles Representations. Subscriber represents and warrants that the Vehicles\nare in good, safe and efficient operating condition, meet all requirements imposed by\nfederal and state laws, rules and regulations and satisfy the requirements of the Carrier\nLease Agreement.\n\nE. Conflicts of Interest. Subscriber acknowledges that Servicer owns a fleet of\ncommercial vehicles (\"Servicer Vehicles\") which it leases to independent contractor\ndrivers (\"Lessees\"). The Servicer Vehicles are leased by Lessees to other caniers in the\nBusiness. Subscriber acknowledges and accepts that it may compete with the Servicer\nVehicles and Lessees for freight and with carriers and other owner/operators who have\nentered into similar agreements with Servicer and who may pull freight from other\ncarriers.\n\n11. MISCELLANEOUS PROVISIONS.\n\nA. Schedules. All Schedules referred to are attached hereto and incorporated herein\nby this reference.\n\n4849•1158-3892vl \n\n2902362--000003 \n\n7 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\n\n\n \n\n8. Governing Law. This Agreement shall be consb'ued and interpreted in accordance\nwith the laws of the State of Mississippi.\n\nC. Notices. Any notice, demand or other communication required or permitted to be\ngiven under this Agreement shall be provided in writing and shall be deemed delivered to\na party: (i) when delivered by hand or by a nationally recognized overnight courier; or (ii)\nthree (3) days after the date of mailing if mailed by United States certified mail, return\nreceipt requested, postage prepaid, in each case to the address of such party set forth\n\nbelow. Notice may also be sent by facsimile or email and will be deemed given, as the\ncase may be, when receipt by the receiving facsimile machine has been confirmed or\nwhen the e-mail recipient has confirmed receipt of the e-mail.\n\nTo Servicer: \n\nTo Subscriber: \n\nExpediter Management Services, LLC \n5959 Pepper Chase \nSouthaven, MS 38671\n\nAttn: Jason Williams, President \nFacsimile: (662) 349-7777 \nE-mail: jwilliams@expediterservices.com\n\nE-mail:\n-----\n\nD. Independent Contractors. The relationship of Servicer and Subscriber\nestablished by this Agreement is that of independent contractors, and nothing\ncontained in this Agreement will be construed to (i) give either party the power to\ndirect and control the day-to-day activities of the other, or (ii) constitute the parties\nas partners, joint venturers, co-owners or otherwise as participants in a joint\nundertaking. All financial, tax, and other obligations associated with a party's\nbusiness are the sole responsibility of that party\n\nE. Integrated Agreement: Modification. This instrument contains the entire\nagreement of the parties and cannot be amended or modified, except by a written\nagreement, executed by each of the parties hereto.\n\nF. Captions. The captions of this Agreement are for convenience purposes only, and\nshall have no effect on its construction or interpretation.\n\nG. Singular and Plural: Gender. When required by the context of this Agreement,\nthe singular shall include the plural (and vice versa), and the masculine shall include the\nfeminine, and the impersonal pronoun \"it\" shall refer to either of the above, a\ncorporation, partnership, joint venture, or other entity, regardless of number or gender.\n\n4849-l 1S8-3892v I \n\n2902362-000003 \n\n8 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\nSPECIAL OPS LOGISTICS \n\nAddress:\n\nivan@specops.io\n\nIVAN RAINBOLT, PRESIDENT\n\n30 N GOULD ST STE 41884\n\nBusiness Name:\n\nSHERIDAN, WY 82801-6317\n\n\n\n \n\nH. Severability. The unenforceability, invalidity, or illegality of any provision shall\nnot render the other provisions unenforceable, invalid, or illegal.\n\nI. Waiver. No consent or waiver, express or implied, by either party to this\nAgreement of any breach or default by the other in the performance of any obligation\nhereunder shall be deemed or construed to be a consent to or waiver of any other breach\nor default by such party hereunder. Failure on the part of any party hereto to complain of\nany act or failure to act of the other party or to declare the other party in default\nhereunder, irrespective of how long such failure continues, shall not constitute a waiver\nof the rights of such party hereunder.\n\nJ. Further Cooperation: Execution of Docwnents. The parties hereto hereby agree to\nexecute and deliver such further instruments, agreements, contracts and documents and\nundertake such other and further acts as may be reasonably required to effectuate the\nstated and intended purposes of this Agreement, including, without limitation, the\nexecution of any' notices, reasonably required by Subscriber to file with any State's\noffice, the DOT or any other governmental office, confirming that Subscriber is the\nowner of the Vehicles and that Servicer has no ownership or other such interests in the\nVehicles.\n\nK. CQ:untemarts. This Agreement may be executed in any nwnber of counterparts,\nall of which together shall constitute one Agreement binding on the parties hereto.\n\nL. Other Activities of Servicer. Nothing herein contained shall prevent Servicer\nfrom engaging in other activities or business ventures, whether or not such other activities\nor ventures are in competition with Subscriber or the Business of Subscriber; nor shall\nthis Agreement limit or restrict the right of any director, officer, employee, or stockholder\nof Servicer or its affiliates to engage in any other business or to render services of any\nkind to any other partnership, corporation, firm, indivi