h a Carrier. \n\n2 Voluntary assignment of Operator's interest. \n\n3. Involuntary transfer of Operator's interest by operation of law.\n\nOt declaration by Company that this Rental Agreement is in default, the Vehicle shall be \nimmediately surrendered and delivered to Company, and Company may take possession of the \nVehicle wherever it may be found, with or without process of law, and for that pwpose may enter \nm the premises of Operator. 01 default, Operator and Operator's successor in interest, whether by \noperation of law or otherwise, shall have m right, title, or interest in the Vehicle rented under this \nRental Agreement, or the possession, or use of such Vehicle, and Company shall retain all deposits \nand other sums paid by Operator under this Rental Agreement with respect to the Vehicle. \n\nXII. Waiver\n\nFailure of Company in one or more instances to insist cn the performance of any of the \nterms of this Rental Agreement, or to exercise any right or privilege conferred in this Rental \nAgreement, or the waiver of any breach of any terms of this Rental Agreement shall not thereafter \nbe construed as a waiver of such terms, which shall continue in force as if ro such waiver had \noccurred. \n\nXIII. Notices\n\nAny notice, demand or other communication required or permitted to be given under this \nAgreement may be given orally and, when given orally, shall be deemed delivered when received. \n\n4840-1508-1072 v2 \n\n2902362-000003 09,1112018 \n\nPage 7 of 10 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\n\n\n \n\nAny notice, demand or other communication required or permitted to be given under this \nAgreement may be provided in writing and, if so, shall be deemed delivered to a party: (i) when \ndelivered by hand or by a nationally recognized overnight courier; or (ii) three (3) days after the \ndate of mailing if mailed by United States certified mail, return receipt requested, postage prepaia \nin each case to the address of such party set forth below. Notice may also be sent by facsimile or \nemail and will be deemed given, as the case may be, when receipt by the receiving facsimile \nmachine has been confirmed or when the e-mail recipient has confirmed receipt of the e-mail. \n\nXIV. Succession\n\nThis Rental Agreement shall be binding on and inure to the benefit of the heirs, executors \nadministrators, successors, and permitted assigns of the parties to this Rental Agreement. \n\nXV. Jurisdiction and Venue\n\nThe internal laws of the State of Tennessee without regard to conflict of law principles will \ngovern the interpretation validity and effect of this Rental Agreement without regard to the place \nof execution or the place for performance hereof. Company and Operator agree that any lawsuit \nfiled by either party arising out of or connected to this Rental Agreement shall exclusively be \nbrought in the state or federal court sitting in Shelby County, Tennessee. \n\nI \n\nXVI. Non-Disclosure Agreement\n\n1. Confidentiality. Operator acknowledges that he she has been exposed to or has had\naccess to confidential information regarding Company' business which is proprietary to Company \nor Company' affiliates, including, without limitation, Company' Operator lists or records supplier \nlists or records, information regarding independent Operators information and trade secrets of third \nparties, marketing plans or strategies, pricing policies, •financial records and, generally, the \nconfidential information of Company which gives, or may give, Company an advantage in the \nmarketplace against its competitors (all of the foregoing being herein referred to collectively as \n\"Proprietary Information\"). Operator acknowledges that the Proprietary Information constitutes a \nproprietary and exclusive interest of Company and, therefore Operator agrees that it shall hold and \nkeep confidential and not divulge to any other person any of the Proprietary Information, or use the \nsame for its own direct or indirect benefit or for the benefit of any other person other than Company \nor its affiliates. \n\n2 Remedies. Operator recognizes and affifuls that in the event of a breach of Section \nXVI of this Rental Agreement, money damages would be inadequate and Company would have no \nadequate remedy at law. Accordingly, Operator agrees that Company shall have the right, in \naddition to any other rights and remedies existing in its favor, to enforce its rights and Operator \nobligations under this Section XVI not only by an action or actions for damages, but also by an \naction or actions for specific performance, injunctive and or equitable relief, in either case without \n\n4840-1508-1072 v2 \n\n2902362-000003 09 11 2018 \nPage 8of 10 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\n\n\n \n\nproofofactual damages and without posting a bond or other security, in order to enforce or prevent \nany violations (whether anticipatory, continuing, or future) of this Rental Agreement. \n\nXVII. Miscellaneous\n\n1. Entire Agreement; Advice of Counsel. This Rental Agreement sets forth the entire\nunderstanding of the parties, and supersedes all other representations, agreements and \nunderstandings, oral or otherwise, between or among the parties with respect to the matters herein. \nNo attempted change, termination or waiver of the provisions shall be binding unless in writing and \nsigned by both parties. In entering this Rental Agreement, each of the Operator and the Company \nrepresents that it has had the opportunity to engage attorneys of its own choice to advise and explain \nthe teims of this Rental Agreement, and that those terms are fully understood and voluntarily \naccepted by both parties. \n\n2 Costs and Attorney's Fees. If any legal action or other proceeding is brought for the \nenforcement of this Rental Agreement, or because of an alleged dispute, breach, or \nmisrepresentation in connection with any provision of this Rental Agreement, the successful or \nprevailing party or parties shall be entitled to recover reasonable attorney's fees, court costs and \nexpenses (including, without limitation, all such fees, costs, and other expenses incident to appeals). \nincurred in that action or proceeding, in addition to any other relief to which such party or parties \nmay be entitled. \n\n3. Severability. If any one or more of the provTslons contained in this Rental\nAgreement shall be held invalid, illegal, or unenforceable for any reason, such invalidity, illegality \nor unenforceability shall not affect any other provision(s) of this Rental Agreement, which shall be \nconstrued as if such invalid, illegal, or unenforceable provision(s) had never been contained herein. \nIt is the intention of the parties that if any provision of the Rental Agreement is capable of two \nconstructions, one of which would render the provision void and the other which would render the \nprovision valid, then the provision shall have the meaning, which renders it valid. \n\n4. Effective Date. In consideration of continued business association by and between\nboth parties, both parties understand and agree that this Rental Agreement may, if applicable, be \neffective retroactively to the date of initial business association rather than the date it was signed. \n\n5. Counternarts. This Rental Agreement may be executed simultaneously in one (1) or\nmore counterparts, each of which shall be deemed an original, but all of which together shall \nconstitute one and the same instrument. \n\n4840-1508-1072 v2 \n\n2902362.000003 09/1112018 \n\n[Signature Page to Follow] \n\nPage 9 of to \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\n\n\n \n\nDated and signed in duplicate this____ day of _______ , 20 and effective \nas of the day of ___________ , 20 __ . \n\n4840-1508-1072 v2 \n\n2902362-000003 09/11/20!8 \n\nCOMPANV: \n\nEXPEDITER SERVICES, U..C \n\nTitle: \n\nOPERA 10R(S): \n\nOperator \n\nAddress: \n\nTelephone: \n\nOperator \n\nAddress: \n\nTelephone: \n\nPage 10 of 10 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\n24\n\n28th \n\n30 N GOULD ST    STE 41884\n\n28th March \n\nSHERIDAN, WY 82801-6317\n\n307-264-3807\n\n24March \n\nPresident\n\n\n\n \n\n1. Orientation\n\na. Signed Contract\n\nIndependent Contractor \n\nInformation Sheet \n\ni. This will be your \"PTO Commercial Vehicle Rental Agreement.\" It is included in your\n\nDocuSign packet.\nii. Read and sign via DocuSlgn. If you have any questions, please call Recruiting at\n\n877-349-9303 Option 4,\n\nb. Signed W-9\n\ni. Included in your DocuSign packet\n\nii. Sign electronically\n\nc. Completed with electronic signature, OneBeacon OIC form\n\nd. Completed with electronic signature, NITACA form\n\ne, Signed Direct Deposit form \n\nI. Included in your DocuSign packet.\n\nii. Sign electronlcally and ensure that all applicable fields are thoroughly completed to set up\n\nyour direct deposit.\niii. If you choose direct deposit, your settlement will be electronically withdrawn from our\n\naccount on the carrier specific day at midnight and will be deposited in your account the\n\nfollowing business day. You can call on the carrier specific day to get your settlement\n\ntotal. If you choose not to use direct deposit, you can call on the specified day to receive\n\nan EFS money code for your settlement. For information on \"carrier specific\" date,\n\nplease contact your Service Coordinator.\n\nf. EFS Cards\n\ni. EFS is the authorized fuel card for fueling. You can also purchase up to 1 gallon of oil and\n\nDEF with this card at time of fuel purchase.\n\nii. No one can load anything onto these cards, so if your carrier mentions loading money\n\nonto it for any reason; they cannot because they do not have access to our account.\n\niil. You must enter the truck#, pro# (from the carrier), and accurate odometer reading \n\nwhen fueling. \n\niv. Failure to enter the information correctly will result in the rejection of the transaction. If\n\nrejected, verify the correct information and retry. If you have further issues, contact\n\nyour Service Coordinator.\nv. There is a 200-gallon limit within a 24-hour period. The card will not pay for the\n\ntransaction if these limits are exceeded.\n\n2. Service Coordinator\n\na. Your truck#will determine your Service Coordinator. At this point you will receive a call\n\nfrom your Service Coordinator who will go over the Service Coordinator portion of your\n\nchecklist with you.\n\nb. Your Service Coordinator Is here to support your efforts with your chosen carrier and can\nadvise the best location for your first load. Please do not hesitate to call.\n\nPaeet(S \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\n\n\nDocuSign Envelope ID: 3E602343-74E7-4854-9D05-518470F644FF \n\nYour Service Coordinator Is a key tool that you should leverage to be as profitable as possible \nIn your Path to Ownership (PTO) Rental Program. Below are key factors to operations that \nwere Identified, but It Is up to you to decide how to operate. These are keys to Success, but \nagain It Is your decision. \n\nc. Deadhead percentage\ni. To be profitable, your deadhead percentage should be 30% or lower at the end of each\n\nmonth.\nii. Deadhead mileage Is all miles on the truck that are not listed as loaded miles.\n\n1. Miles you travel empty relocating for a better freight area\n2. Miles you travel to get to a load\n\nd. In-Service Percentage\n\nI. To be profitable, your In-service percentage should be 75% of the month.\nIi. This will average out to 3 out of 4 weeks in the month.\niii. We advise that when you are ready to take a week off that you use the 1st week in the\n\nmonth, due to it being the slowest week in the month.\n\ne. Load Acceptance Percentage\ni. Your load acceptance percentage should be around 75% for the month.\n\nII. This means that you accept at least 75% of all loads offered to you. You can be advised\nby your Service Coordinator if you are unsure if you should accept or decline a load\noffer from your carrier.\n\nf. Home Time\n\nI. When you are ready to take your home time, you should send a message to your carrier\nby QC a minimum of 7 days in advance and let them know you need a load going in the\ndirection of your home state. They will attempt to find you loads going that direction.\n\nOnce close, you can call your Service Coordinator and they can help you get the rest of\n\nthe way. If you notify your Service Coordinator when you are ready for home time, they\ncan assist in respect to the carrier.\n\nii. If you have a lo.ad going by your home, your carrier will allow you to stop if it does not\ninterfere with your pickup and delivery. You should be advised by your carrier if this\n\nscenario Is ok.\nIii. There are some months that are better for freight than others, and you may want to \n\nstay out for all or most of these months to help your revenue. \n\ng. Communication with Carrier and Expediter Services\n\ni. You must have a cell phone to stay in contact, per the carrier.\n\nIi. If you have an Issue with the carrier's dispatchers, we advise you to call your Service\n\nCoordinator and let them handle the situation. This will keep the dispatchers from being \ndirectly upset with you and leave you in good standing for loads. \n\niii. If you change or update your phone or personal information, please Inform the carrier\nand Expediter Services.\n\nh. Submitting paperwork for Pros\n\nl. You need to submit your pros to carrier upon delivery or as soon as possible to ensure\n\npayment for the settlement period.\n\nPage 215 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\n\n\n \n\nI. Settlement Payments\n\nI. Settlement Options\n\n1. Direct Deposit\n\na. It will be withdrawn from our account on the carrier specific date at midnight\n\nand deposited In your account the following business day.\n\n2. EFS\n\na. You can call on carrier specific settlement date and accounting can issue you an\n\nEFS express code for your settlement.\n\nj. Tolls\n\nI. Are the sole responsibility of the independent operator to pay unless the carrier\n\nprovides reimbursement.\n\nIi. If the carrier provides reimbursement, It Is the independent operators responsibility to \n\nunderstand what the carrier requires to be eligible for reimbursement of tolls. \n\n3. Truck Issues- Standard Operating Procedure (SOP)/ General Knowledge\n\na. After hours emergency line 5PM -SAM CST\nI. Call the regular office number (877-349-9303) and select Option 1 and you will be\n\nconnected to the on-call person.\n\nII. This line is for EMERGENCY break down. Do not call this line If you just need a question\n\nanswered. The on-call person is not in the office and cannot assist you with EFS or load\n\ninformation.\n\niii. If you do not have an emergency, select Option 2. Leave a message and we will return\n\nyour call first thing the next business morning.\n\nb. Michael Gatewood and John McAdams (Maintenance Dept - Option 3) will be your\n\nEquipment Support Services contacts to assist you with all Issues pertaining to the operation\n\nof your truck.\n\nI. Antifreeze\n1. Do not add water to the system. This degrades the effectiveness and can harm the\n\nengine. If you do not know what type to use, the red is extended life and the green\n\nIs 50/50. Make a point to check this each time you change drivers, fuel, and pre-trip\n\nor post trip.\n\nII. APU (Auxiliary Power Unit )\n\n1. When the weather Is starting to tum cold and snow Is starting to fall, the APU switch\n\nmust remain In standby mode. When you go home for time off, make sure you leave\n\nthe APU on. This will keep the batteries charged and the engine warm. Vent areas\n\nmust always remain clear, especially while using the heat function. If something is\n\nleft directly in front, It has the potential of melting the item and burning up the\n\nheater.\n\nPase 315 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\n\n\n \n\nIii. Deer \n1. Always be attentive and aware of deer, especially at night. Watch ahead and both\n\nsides of the road. If you see a deer, slow down and be ready to react. If an animal\ndoes run In front of you DO NOT SWERVE OR TRY TO AVOID IT. If you hit something,\nstop as soon as safely possible and Inspect for damage. Note the location of the\naccident. If the truck Is drivable continue to your destination and take pictures after.\nCall the office for Michael and he will send you to a location for an estimate of\nrepair.\n\nIv. Truck Stop Parking \n1. Park side by side with the trucks beside you. Do not pull all the way back when next\n\nto a larger truck. Always stay level. If they leave, they will be able to see you there. If\nyou are In the back, they may miss you. At night leave the marker lights on.\n\n2. If an accident does occur, contact the local police and call our Maintenance Dept\n(Option 3 -normal business hours / Option 2 -after hours). If the police do not\nrespond, please get a name of the person from the police that said they will not\ncome out and take an accident report. Most departments will respond. If the\naccident Is on private property, they may give you a card and make an entry to their\npolice blotter. Get as much Information as you can from the other driver - driver's\nlicense, Insurance card, tag# and company name and contact numbers. Write a\nstatement of what happened and get names and phone numbers of any witnesses.\nSend everything to Michael at our office as soon as possible. You may type this link\nInto your browser to complete a Motor Vehicle Accident report that will be sent\nelectronically to ES. https://form.jotform.com/83616309205151\n\nv. Fueling\n1. All trucks need to use Low Sulfur Diesel (LSD).\n2. Due to fuel discounts try to use Loves when possible.\n\na. other fuel stops: TA/Petro, Kwlk Trip or SAPP Bros\nb. Only use a different truck stop If you cannot find one that Is listed above.\n\nvi. Pre and Post Trip Inspections\n1. This needs to be done with each driver per DOT\n\nvii. Reefer Unit\n1. If your truck has a reefer unit, you need to run It every other day. Doing this will give\n\nyou an early warning If anything Is wrong and avoid any missed loads\nviii. Anti-gel\n\n1. Do not use Anti-gel In our units. For further Information please contact\nMaintenance Dept.\n\n4. Maintenance\n\na. PM's (preventative maintenance)\nI. All PM Services are emailed via DAWG Report directly to the email address on file. This\n\nwill update you as to when your assigned equipment Is ready for servicing.\nii. All services and minor repairs may be completed at TA/Petro or Loves.\n\nb. Tire repairs and roadside service\nI. If you need anything concerning your truck, you must call Maintenance Dept for\n\ndirection and repair.\n\nII. Miscellaneous labor is to be performed by the Independent Operator (Ex: Wipers, bulbs,\nfluid checks, tire pressure, etc.)\n\nl'�K• 415 \n\nDocuSign Envelope ID: 4AA5C173-7160-4BE8-BD0E-4D1AFE2FCEA2\n\n\n\n \n\nContact List \n\nDay time phone# 877-349-9303 and select one of the below Options: \n\nOption 1- List of Extensions \nOption 2 - Operations \nOption 3 - Maintenance \n\nWeekend/Night phone# 877-349-9303 \n\nSomeone will always pick up \n\nOption 4 - Recruiting \nOption 5 - Accounting \nOption 6 - Truck Sales \n\nOption 2, 5pm - 8am CST \n\nIn case of an emergency [break down) dial Option 1 and you will be connected to the \n\nperson on call. Should you get voicemall, leave your name and number so they can \nreturn your call. \n\nIn the event of an emergency (accident/Incident) and all Non-Emergencies dial \n\nOption 2. \n\nFax # 877-349-7778 \n\nOperations: Service Coordinators / Onboardlng \n\nPatrick Bertrand Ext 102 David Neese Ext 128 \nAlien Fisher Ext 188 Seth Reed Ext 101 \nSheniqua Hawkins Ext 130 David Withers Ext133 \nKimberly Collins Ext 131 \n\nMaintenance \n\nGreg Yarbrough Ext 110 Amanda Watson Ext 125 \n\nRecruiting \n\nKi