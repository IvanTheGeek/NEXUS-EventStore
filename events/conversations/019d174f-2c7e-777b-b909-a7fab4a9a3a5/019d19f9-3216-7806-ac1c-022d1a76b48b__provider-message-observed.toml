text = "For 1: contractor agreement. Technically yes with FedEx. While it was the same corporation that rented truck 1, truck 2, truck 1 again, there were contracts with FedEx for each one. We as drivers were reassigned. Also note that even though truck 1 was the same physical truck, its assignment of a truck number by FedEx was different each time. Each time the contract was a new truck number."

