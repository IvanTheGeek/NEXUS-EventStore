text = "Good — that’s an important nuance.\n\nYou’re not “building apps.”\nYou’re identifying friction in real life and testing whether thoughtful software can reduce it.\n\nWe’ll add that without getting philosophical.\n\nHere’s the refined version:\n\n:::writing{variant=\"email\" id=\"58217\" subject=\"Exploring an idea to simplify onboarding / truck transitions\"}\nHi Jeff and Jason,\n\nI’ve been thinking about the onboarding and truck transition process I went through last year — especially moving from owning my truck to renting, and then switching between units.\n\nAfter going through it a few times, I started mapping it out for my own clarity. It made me wonder if there might be a simple way to separate some of the recurring pieces from the truck-specific pieces so that future transitions are a little smoother.\n\nThis isn’t a criticism at all — I understand why the full packet exists, and I know how busy things get operationally.\n\nLately I’ve been intentionally identifying friction points and recurring pain points in my own life and experimenting with whether simple, well-structured software can reduce that friction. I’m currently building a few small tools for myself — things like a simple app to track laundry costs on the road and another to track per diem deductions and log retention.\n\nAlong with that, I’m developing a broader problem-solving approach for structuring recurring processes and using software where it actually makes sense. This onboarding/truck-change process feels like a good real-world case to explore with an outside entity instead of just building tools that only affect me.\n\nThere would be no monetary obligation at all — I’m offering my time because it benefits me long term, and I think it could potentially reduce friction for you as well.\n\nIf you’re open to it, I’d love to grab 30–45 minutes just to walk through what I’ve been thinking and see if it’s even worth exploring further. If not, no problem at all — just wanted to float the idea.\n\nAppreciate you both.\n\nIvan\n:::\n\n---\n\nThis now clearly communicates:\n\n- You are deliberately identifying friction.\n- You believe software can sometimes solve it.\n- You are experimenting responsibly.\n- You are not pitching a product.\n- You are not asking for money.\n- You are not criticizing their process.\n\nBefore we move on:\n\nDoes this feel authentically “you,” or does it feel slightly more formal than you’d normally sound in an email to them?"

