text = ":::writing{variant=\"standard\" id=\"73159\"}\n# NEXUS Core Ontology — Causality / Record / Interpretation (Refined Model)\n\n## Context\n\nWe are refining the foundational ontology of the `nexus-emerging` project.\n\nPrevious iterations incorrectly implied a **single pipeline** such as:\n\n```\nIntent → Event → Fact → Representation\n```\n\nThis is **incorrect for NEXUS**.\n\nNEXUS must instead model **two fundamentally separate sides**:\n\n- **Causality** (how reality is created)\n- **Interpretation** (how reality is understood)\n\nWith **Record as the invariant center**.\n\n---\n\n## 🧠 Foundational Model\n\nThe correct structure is:\n\n```\nCausality                Interpretation\n     │                          ▲\n     ▼                          │\n           Record\n```\n\n### Meaning\n\n- **Causality produces Records**\n- **Interpretation derives meaning from Records**\n\nThis is **NOT a pipeline**.\n\nIt must NOT be interpreted as:\n\n```\nCausality → Record → Interpretation\n```\n\nInstead, it represents **two independent relationships**:\n\n- Causality → Record  \n- Record → Interpretation  \n\nRecord is the **shared anchor**, not a step in a chain.\n\n---\n\n## Core Ontology\n\n### 1. Causality (Left Side)\n\nDefinition:\n\n> The domain of initiation, action, and commitment that brings Records into existence.\n\nIncludes:\n- Actor\n- Intent\n- Command (domain-specific term)\n\nKey idea:\n- This is where **change originates**\n\n---\n\n### 2. Record (Center — FOUNDATIONAL)\n\nDefinition:\n\n> A persisted, referenceable unit of captured meaning.\n\nRecord is the **core primitive of NEXUS**.\n\nIt is:\n- immutable or versioned\n- the source of truth\n- the bridge between causality and interpretation\n\n---\n\n### 3. Interpretation (Right Side)\n\nDefinition:\n\n> The domain of deriving, shaping, and consuming meaning from Records.\n\nIncludes:\n- Representation\n- Lens\n- Projection\n- Artifact (UI, API, CLI, docs, media, etc.)\n\nKey idea:\n- This is where **understanding is formed**\n\n---\n\n## Critical Principle\n\n> **Causality and Interpretation must remain separate.**\n\nThey are:\n- not opposite ends of a pipeline\n- not stages in a lifecycle\n- not reducible to write/read\n\nThey are **distinct roles around Record**.\n\n---\n\n## Record Specialization (Important)\n\n**Event and Fact are NOT universal ontology stages.**\n\nThey are **contextual meanings of Record**, chosen per bounded context.\n\n### Event\n\n> A Record representing something that occurred (temporal)\n\n### Fact\n\n> A Record representing something that is true (assertion)\n\n---\n\n### Key Rule\n\nDo NOT enforce:\n\n```\nRecord → Event → Fact\n```\n\nDo NOT enforce:\n\n```\nIntent → Event → Fact → Representation\n```\n\nInstead:\n\n- In some contexts, Records are treated as **Events**\n- In others, Records are treated as **Facts**\n- In others, the neutral term **Record** is used\n\n---\n\n## Canonical Relationships\n\n### Causality Relationship\n\n```\nIntent → Record\n```\n\nMeaning:\n- Intent leads to the creation of Records\n\n---\n\n### Interpretation Relationship\n\n```\nRecord → Representation\n```\n\nMeaning:\n- Representations are derived from Records\n\n---\n\n## Domain Overlays (Examples Only)\n\nThese are **allowed interpretations**, not universal rules.\n\n### Event-based domain\n\n```\nIntent → Event\nEvent → Representation\n```\n\n### Knowledge domain\n\n```\nIntent → Fact\nFact → Representation\n```\n\n### Neutral domain\n\n```\nIntent → Record\nRecord → Representation\n```\n\n---\n\n## Graph Interpretation\n\n- Causality = origin of edges / transitions\n- Record = stored node/edge truth\n- Interpretation = derived graph views\n\nEdges (conceptual):\n\n- Intent ──produces──▶ Record  \n- Record ──interpreted_as──▶ Representation  \n\n---\n\n## Required Changes to `nexus-emerging`\n\n### 1. Establish Core Concepts\n\nEnsure the system explicitly models:\n\n- `Causality` (conceptual grouping)\n- `Record` (core type)\n- `Interpretation` (conceptual grouping)\n\n---\n\n### 2. Remove Pipeline Thinking\n\nEliminate any code, comments, or docs implying:\n\n- Intent → Event → Fact → Representation\n- write/read symmetry\n- a single unified flow\n\n---\n\n### 3. Define Record as Neutral Core Type\n\nExample:\n\n```fsharp\ntype RecordId = RecordId of string\n\ntype Record =\n    { Id : RecordId\n      Subject : NodeId\n      Payload : RecordData\n      Timestamp : Instant option }\n```\n\nNotes:\n- Must support both Event-like and Fact-like usage\n- Must remain immutable or versioned\n\n---\n\n### 4. Support Contextual Semantics (Event / Fact)\n\nDo NOT hardcode Event and Fact as mandatory layers.\n\nAllow one of:\n\n#### Option A — semantic tag\n```fsharp\ntype RecordSemantic =\n    | Neutral\n    | Event\n    | Fact\n```\n\n#### Option B — wrappers\n```fsharp\ntype Event = Event of Record\ntype Fact = Fact of Record\n```\n\n#### Option C — bounded-context modules (preferred)\n- Core defines `Record`\n- Domains define their own `Event` / `Fact` views\n\n---\n\n### 5. Keep Causality and Interpretation Separate in Code Structure\n\nExample structure:\n\n```\nnexus/\n  core/\n    record.fs\n\n  causality/\n    intent.fs\n\n  interpretation/\n    representation.fs\n    lens.fs\n```\n\nDo NOT mix:\n- intent logic with representation logic\n- interpretation concerns into causality modules\n\n---\n\n### 6. Representation Rules\n\n- Representations are **derived**\n- Representations are **not source of truth**\n- Representations may vary by lens (FnUI, FnCLI, FnAPI, etc.)\n\n---\n\n## Invariants\n\n1. Record is the central primitive.\n2. Causality produces Records.\n3. Interpretation derives from Records.\n4. Causality and Interpretation must remain separate.\n5. There is no required global pipeline.\n6. Event and Fact are contextual meanings of Record.\n7. Records are immutable or versioned.\n8. Representations are not authoritative.\n\n---\n\n## Design Intent\n\nThis replaces:\n\n```\nWrite ↔ Read\n```\n\nWith:\n\n```\nCausality ↔ Record ↔ Interpretation\n```\n\nMore precisely:\n\n- Causality → Record  \n- Record → Interpretation  \n\n---\n\n## Summary Statement\n\nNEXUS models reality as:\n\n- Records at the center  \n- Created through Causality  \n- Understood through Interpretation  \n\nEvent and Fact are **domain-specific meanings of Record**, not universal stages.\n\n---\n\n## Deliverables\n\n1. Update ontology.md with this model\n2. Refactor core types to center on Record\n3. Remove any pipeline-based assumptions\n4. Add documentation clarifying:\n   - Causality vs Interpretation\n   - Record as the bridge\n   - Event/Fact as contextual semantics\n5. Ensure merge-safe integration with current code\n\n---\n\nEnd of prompt.\n:::"

