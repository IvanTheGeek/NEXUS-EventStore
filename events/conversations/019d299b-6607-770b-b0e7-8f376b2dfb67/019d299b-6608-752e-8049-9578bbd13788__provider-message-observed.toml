kind = "plain_text"
text = "Yes, but only partially.\n\nIn F#, XML doc comments are still attached to the symbol in source via `///` comments above the type/member, and the compiler generates the `.xml` documentation file from those comments. So the normal model is still “documentation lives in source.” citeturn549820search0turn549820search12\n\nHowever, the specific “put the big docs in a separate XML file and pull them in with `<include .../>`” approach is not currently supported by F# the way people often expect from C#/VB ecosystems. There is an open F# compiler issue from December 2025 explicitly requesting support for `<inheritdoc>` and `<include>`, and it notes that F# docs say this is not supported. citeturn549820search1\n\nSo the practical answer is:\n\n- **For compiler/IntelliSense XML docs:** generally **no**, not as a first-class supported F# feature today. citeturn549820search0turn549820search1\n- **For project documentation:** **yes**, you can keep long explanations outside the source file in Markdown/XML/README files, but that is separate from the XML documentation attached to the function/type itself. That external material won’t automatically become the symbol’s F# xmldoc unless you build your own tooling around it. This follows from the F# docs describing xmldoc as source comments processed by the compiler. citeturn549820search0\n\nA common compromise is:\n\n```fsharp\n/// <summary>\n/// Short API-facing summary.\n/// See docs/MyBigDesignDoc.md for the full rationale and examples.\n/// </summary>\ntype MyType = ...\n```\n\nThat keeps IntelliSense useful while the large narrative lives elsewhere.\n\nIf you want, I can show you the best patterns for this in an F# codebase, such as:\n1. slim `///` docs + Markdown sidecar files,\n2. generating API docs from source plus external conceptual docs,\n3. or a custom prebuild step that copies external text into source-generated xmldoc."

