text = "Yes — that makes a lot of sense.\n\nWhat you may be seeing is that **Record** can be the more universal base term, while **Event** and **Fact** are specialized meanings of record.\n\nSo instead of treating them as three separate “levels,” you can treat them as:\n\n- **Record** = the general captured unit\n- **Event** = a record of change / occurrence\n- **Fact** = a record of truth / assertion\n\nThat is a very clean move.\n\n## The shape\n\nConceptually:\n\n```text\nRecord\n├─ Event   // something happened\n└─ Fact    // something is true\n```\n\nOr even:\n\n```text\nRecord = any persisted, referenceable unit of captured meaning\n```\n\nThen:\n\n```text\nEvent = temporal record\nFact  = truth-bearing record\n```\n\n## Why this is strong\n\nBecause **record** is broader and more universal than either event or fact.\n\nIt works in:\n\n- software\n- knowledge systems\n- graph modeling\n- documents\n- media workflows\n- tutorials\n- logs\n- business processes\n\nAn event is clearly a record.  \nA fact is clearly a record.  \nA command usually is not the same kind of thing unless you also choose to capture it as a record.\n\nSo this gives you a stable base ontology.\n\n## A useful distinction\n\nYou probably want to avoid making `Event` and `Fact` simple synonyms, though.\n\nBetter:\n\n- **alias in family**\n- not **alias in meaning**\n\nBecause they differ in role.\n\n### Event\nA record that something occurred.\n\nExamples:\n- order placed\n- file imported\n- video rendered\n- lesson completed\n\n### Fact\nA record that something is true.\n\nExamples:\n- account exists\n- balance is 42\n- tutorial has 6 steps\n- asset duration is 3m12s\n\nSo both are records, but they are not interchangeable.\n\n## In your NEXUS style\n\nThis could become:\n\n```text\nActor → Intent → EventRecord → FactRecord → Representation\n```\n\nBut that may be too verbose.\n\nMore likely:\n\n```text\nIntent → Event → Fact → Representation\n```\n\nwith the understanding that:\n\n```text\nEvent : Record\nFact  : Record\n```\n\nThat gives you a clean public language and a deeper core ontology.\n\n## In F# terms\n\nYou could model it like:\n\n```fsharp\ntype RecordKind =\n    | Event\n    | Fact\n\ntype Record =\n    { Id : RecordId\n      Kind : RecordKind\n      Subject : NodeId\n      Payload : RecordData\n      Timestamp : Instant option }\n```\n\nOr more explicitly:\n\n```fsharp\ntype EventRecord =\n    { Id : RecordId\n      Subject : NodeId\n      OccurredAt : Instant\n      Data : EventData }\n\ntype FactRecord =\n    { Id : RecordId\n      Subject : NodeId\n      AssertedAt : Instant option\n      Data : FactData }\n```\n\nOr with a discriminated union:\n\n```fsharp\ntype Record =\n    | Event of EventRecord\n    | Fact of FactRecord\n```\n\nThat feels very aligned with what you’re describing.\n\n## The really important insight\n\nWhat you seem to be reaching for is:\n\n> “Event” and “Fact” are not the root ontology.  \n> “Record” is the root ontology.\n\nThat is a strong foundation, because “record” is neutral enough to survive across many domains, while “event” and “fact” can remain precise subtypes.\n\n## My recommendation\n\nUse:\n\n- **Record** as the foundational category\n- **Event** and **Fact** as distinct specializations of Record\n- do not make Event and Fact full aliases of each other\n\nSo the mental model becomes:\n\n```text\nIntent causes Event records\nEvent records establish or support Fact records\nFact records feed Representations\n```\n\nThat is very coherent.\n\nIf you want, I can help you turn this into a small F# ontology with `NodeKind`, `Record`, `RecordKind`, and edge names that fit your NEXUS vocabulary."

