text = "The **maximum upload file size** in ChatGPT depends on what you're uploading and your plan, but here are the current practical limits (as of 2026):\n\n### 📄 General file uploads (documents, PDFs, etc.)\n- **Up to ~512 MB per file**\n- Works for: PDFs, text files, code, etc.\n\n### 📊 Spreadsheets / structured data\n- **Up to ~100 MB** (practical limit for good performance)\n- Large CSVs may work above this, but analysis can slow down\n\n### 🖼️ Images\n- **Up to ~20 MB per image**\n\n### 🧠 Important practical limits\nEven if a file uploads successfully:\n- Extremely large files may **not fully process**\n- There are **token/context limits** (I may only read part of a huge file at once)\n- For best results:\n  - Keep files **under ~50–100 MB**\n  - Or **split into chunks**\n\n---\n\n### ⚡ Pro tip (very relevant to what you're building with NEXUS)\nIf you're planning to:\n- Store exports\n- Diff versions\n- Feed logs into AI (LOGOS/CORTEX)\n\n👉 Smaller, **incremental files (daily / 30-day slices)** are *much* more usable than one massive dump.\n\n---\n\nIf you want, I can help you design a **file chunking + versioning strategy** that fits your Git + NEXUS approach cleanly."

