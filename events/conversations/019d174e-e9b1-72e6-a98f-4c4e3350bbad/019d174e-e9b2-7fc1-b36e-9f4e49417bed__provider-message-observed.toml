text = "Perfect! I've fixed the bug. The issue was that when your server encountered a parsing error, it was sending an error response with `Id = None`, which violates the JSON-RPC spec. Error responses must include the request ID so the client knows which request failed.\n\n**What I changed:**\n- Added a `tryExtractId()` function that attempts to extract the ID from the raw JSON before parsing fails\n- Modified error handling to only send error responses when we have a valid ID\n- If no ID is found (notification or completely malformed), we skip the error response entirely\n\n**Next steps to test the fix:**\n\n1. **Restart Claude Desktop** completely (not just closing the window - fully quit the app)\n\n2. **Reopen Claude Desktop** and your server should now show as active (not grayed out)\n\nIf you want to verify before restarting Claude Desktop, you can test manually:\n```bash\ncd /home/linux/RiderProjects/FnMCP.IvanTheGeek/src/FnMCP.IvanTheGeek\ndotnet build\ndotnet run\n```\nThen paste this test request:\n```json\n{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2025-06-18\",\"capabilities\":{},\"clientInfo\":{\"name\":\"test\",\"version\":\"1.0\"}}}\n```\n\nYou should get a proper response without errors. Let me know if it works after restarting Claude Desktop!"

