[[body.segments]]
kind = "plain_text"
text = "These three terms are often used interchangeably but have meaningful distinctions:\n\n---\n\n**Preferences** — *who* the user is / how they like to work\n- Personal, per-user, subjective\n- Express intent or taste, not system behavior\n- Examples: dark mode, notification style, default language\n- Owner: the **user**\n\n**Settings** — *how a feature behaves* right now\n- Functional toggles or selections within an app\n- Change observable behavior, but the app still \"knows\" what they mean\n- Examples: auto-save on/off, items per page, sort order\n- Owner: the **user within a context** (app, session, account)\n\n**Config** — *how the system is assembled/deployed*\n- Structural or environmental — often set at deploy/boot time\n- The app doesn't interpret these; it depends on them to function\n- Examples: database URL, API keys, feature flags, port numbers\n- Owner: the **operator/developer**\n\n---\n\nThe useful mental test:\n\n| Question | Points to... |\n|---|---|\n| Would different users reasonably want different values? | Preference |\n| Would the same user flip this back and forth? | Setting |\n| Would changing this require a redeploy or restart? | Config |\n\n---\n\nThe lines blur in practice — feature flags are config that acts like settings, and some settings get persisted like preferences. The key is **ownership and scope**: user taste → preferences, user behavior → settings, system structure → config.\n\nAnything specific driving the question?"

