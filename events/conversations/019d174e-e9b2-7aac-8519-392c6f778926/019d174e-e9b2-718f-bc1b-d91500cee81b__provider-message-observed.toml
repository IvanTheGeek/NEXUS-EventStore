text = "I have had dedicated servers before that I rented from a data center. The provider allowed me to mine since it was dedicated hardware. I set up xmrig on the base host (this was a proxmox machine) and I set the nice to 19 which is lowest priority. This worked  OK. I feel like it could be improved and it would be good to have the miner isolated but still have all the resources that are not being used, as in all the CPU and memory it needs to max out rewards."

