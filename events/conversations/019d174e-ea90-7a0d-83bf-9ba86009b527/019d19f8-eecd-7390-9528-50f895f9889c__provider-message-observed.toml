text = "Ivan is asking about whether to store TextBody and HtmlBody as properties on the EmailReceived Fact or as separate nodes/Facts. Let me think through this."

[[body.segments]]
kind = "plain_text"
text = "Right, and the deciding factor is **how CORTEX will consume them.**\n\n**As properties on EmailReceived Fact**\n- Simple, collocated — one Fact has everything\n- Works fine if you're passing the whole email to RAG as a unit\n- HtmlBody is mostly noise for RAG — it's the same content as TextBody plus markup\n\n**As separate Fact nodes**\n- Enables independent chunking strategies per content type\n- HtmlBody could be processed differently (strip tags, extract structure, ignore)\n- TextBody becomes the RAG-indexable surface, HtmlBody becomes archival/rendering\n- Adds graph edges but also graph complexity for what is essentially derived content\n\n**My take:**\n\nTextBody and HtmlBody aren't independent facts about the world — they're two *representations* of the same content. That maps more naturally to NEXUS **perspectives/lenses** than separate Facts.\n\nWhich suggests:\n\n```\nEmailReceived (Fact)\n  └── TextBody    ← canonical content, RAG surface\n  └── HtmlBody    ← archival, rendering only\n```\n\nWith CORTEX chunking `TextBody` for Qdrant indexing — the HtmlBody just rides along in storage but isn't a first-class graph node.\n\nThe exception would be **HTML-only emails** (no TextBody) — MailKit can strip the HTML to text for you via `HtmlToTextConverter`, so you could normalize to TextBody always at ingestion time and drop HtmlBody entirely from the Fact.\n\nDoes normalizing to TextBody at ingestion boundary feel right, or do you want HtmlBody preserved for fidelity?"

