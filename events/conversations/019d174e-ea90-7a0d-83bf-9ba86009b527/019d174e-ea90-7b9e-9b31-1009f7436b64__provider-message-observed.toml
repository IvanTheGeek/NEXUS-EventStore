[[body.segments]]
kind = "plain_text"
text = "Close analogy. IMAP IDLE is a protocol extension where:\n\n- Client opens a connection and sends `IDLE` command\n- Server holds the connection open and pushes notifications (new mail, flag changes, deletions) as they happen\n- Client responds to keep the connection alive (heartbeat, typically every 29 minutes per RFC)\n- Client sends `DONE` to exit IDLE mode when it wants to issue other commands\n\nSo yes — long-lived connection with server-push, conceptually similar to a WebSocket or SSE. The difference is IMAP IDLE is half-duplex: you're either in IDLE mode *or* issuing commands, not both simultaneously.\n\n**Practical reality by provider:**\n- **Fastmail** — full IDLE support, works great\n- **Gmail** — supports IDLE but throttles/disconnects aggressively\n- **Outlook/Hotmail** — IDLE support is unreliable, polling is safer\n- **Yahoo** — similar to Outlook, polling more reliable\n\nMailKit has first-class IDLE support with the `IdleAsync` method and handles the heartbeat for you.\n\n**So the pattern for LOGOS would be:**\n- IDLE for Fastmail + capable servers → event-driven ingestion\n- Polling fallback for flaky servers → scheduled ingestion\n- Both feed the same ingestion pipeline regardless\n\nNext: **what becomes a Fact** — whole email as one Fact, or do you extract typed fields (sender, subject, body, date) as separate or structured data?"

