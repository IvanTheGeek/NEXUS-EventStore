text = "Clean rule:\n\n```fsharp\nlet textBody =\n    match msg.TextBody with\n    | null -> HtmlToTextConverter.Convert(msg.HtmlBody) // normalize only if absent\n    | text -> text\n```\n\nSo the Fact carries:\n- `TextBody` — always present (native or normalized from HTML)\n- `HtmlBody` — preserved when present, null/absent when not\n\nNext natural question: **Attachment content storage.** The `ContentHash` deduplication model works well for graph identity, but the actual bytes need to live somewhere.\n\nOptions:\n- **Inline in the Fact** (base64 / byte array) — simple, self-contained, gets large fast\n- **Forgejo LFS** — consistent with your existing git-backed storage strategy\n- **Separate blob store** (S3-compatible, local filesystem, etc.)\n- **Reference only** — store metadata Fact, content fetched on demand from source (only works if source is reliable/permanent)\n\nGiven your self-hosted infrastructure and NEXUS architecture, Forgejo LFS seems like the natural fit — keeps attachment artifacts in the same provenance system as everything else.\n\nDoes that align, or do you have a different blob storage in mind?"

