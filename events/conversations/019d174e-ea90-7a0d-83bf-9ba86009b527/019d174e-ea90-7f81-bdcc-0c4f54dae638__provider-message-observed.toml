kind = "plain_text"
text = "Good fit for LOGOS. A few questions before designing the ingestion shape — I'll give you the overview, then ask one at a time.\n\n**Questions:**\n1. Which IMAP server? (self-hosted, Gmail, something else)\n2. Ingestion trigger: IMAP IDLE (push on new mail) or scheduled polling?\n3. What becomes a Fact — whole email, or do you need to parse structure out of it (subject/body/sender → typed fields)?\n4. Attachments: ignore, store as blobs, or parse content?\n\nStarting with the most foundational one:\n\nWhich IMAP server will this connect to?"

