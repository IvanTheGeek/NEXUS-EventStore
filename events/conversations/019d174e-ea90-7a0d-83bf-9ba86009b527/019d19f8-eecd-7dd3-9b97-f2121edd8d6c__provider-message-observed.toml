text = "Exactly. `Unexpected of exn` is essentially a **modeling gap signal**.\n\nWhich fits perfectly with the NEXUS/LOGOS feedback loop:\n\n```\nUnexpected captured at runtime\n    → LOGOS ingests it as a Fact\n    → CORTEX surfaces it\n    → you investigate\n    → promote to typed DU case\n    → model is now more complete\n```\n\nThe `Unexpected` case isn't just an escape hatch — it's a **discovery mechanism**. Every time it fires, it's telling you something about the domain you didn't know yet.\n\nYou could even make this explicit in the type:\n\n```fsharp\ntype ImapError =\n    | Connection of ConnectionError\n    | Authentication of AuthError\n    | Fetch of FetchError\n    | Unexpected of exn  // modeling gap — investigate and promote\n```\n\nThe comment in the type itself becomes a team norm: `Unexpected` is never the final answer, it's always a candidate for promotion to a typed case.\n\nThis is also a good argument for **never swallowing `Unexpected` silently** — log it, surface it to LOGOS, treat it as a first-class event worth examining. A silent catch is a modeling gap you'll never know about.\n\nFits naturally with your Prime Directive too — CORTEX surfaces it, human decides whether it warrants a new DU case and approves the promotion."

