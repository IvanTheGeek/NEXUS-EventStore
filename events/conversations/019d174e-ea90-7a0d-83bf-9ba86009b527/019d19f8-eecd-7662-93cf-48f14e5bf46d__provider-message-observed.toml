[[body.segments]]
kind = "reasoning"
text = "The clear answer: there's no F#-native IMAP client, but **MailKit** is the de facto standard for .NET and works perfectly from F#. It's MIT licensed, actively maintained, RFC-compliant, and the one Microsoft itself recommends."

[[body.segments]]
kind = "plain_text"
text = "No F#-native one, but **MailKit** is the clear answer for .NET. It's the library Microsoft officially recommends in their own docs (they deprecated `SmtpClient` and point to MailKit as the replacement).\n\n**MailKit** (`NuGet: MailKit`)\n- MIT licensed, actively maintained\n- Full IMAP, POP3, SMTP\n- RFC-compliant, async APIs, cancellation tokens, SSL/TLS, OAuth2\n- Works from F# just like any .NET library\n\nQuick F# usage:\n\n```fsharp\nopen MailKit.Net.Imap\nopen MailKit.Search\nopen MimeKit\n\nuse client = new ImapClient()\nclient.Connect(\"imap.example.com\", 993, true)\nclient.Authenticate(\"user@example.com\", \"password\")\n\nclient.Inbox.Open(MailKit.FolderAccess.ReadOnly) |> ignore\nlet uids = client.Inbox.Search(SearchQuery.All)\n\nfor uid in uids do\n    let msg = client.Inbox.GetMessage(uid)\n    printfn \"Subject: %s\" msg.Subject\n\nclient.Disconnect(true)\n```\n\nThe other options (S22.Imap, Mail.dll, Rebex) are either abandoned, commercial, or less capable. MailKit is the one to use.\n\nWhat's the use case — LOGOS ingestion from an email source?"

