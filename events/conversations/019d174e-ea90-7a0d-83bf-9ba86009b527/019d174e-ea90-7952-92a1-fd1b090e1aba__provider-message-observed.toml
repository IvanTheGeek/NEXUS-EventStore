ges. Includes IMAP, EWS (Exchange Web Services), POP3 and SMTP clients; a high-level MailMessage API and a low-level MIME \\u0026 S/MIME API. This is a paid commercial product with a free 30-day trial: Trial mode: Start your free 30-day trial by generating your trial key \\u00B7 Licensed mode: Purchase the product and get your full license key \\u00B7 When the full license key is provided, NuGet.org repository can be used to retrieve versions of Rebex components covered by your support contract. Supported platforms: .NET 10 on Windows, Linux, macOS, Android, iOS/tvOS \\u00B7\\n\\nThe NuGet Team does not provide support for this client. Please contact its maintainers for support. ... Rebex.Imap is part of Rebex Mail Pack - a set of mail libraries that provide all you need for sending, receiving, encrypting, decrypting, signing, verifying, loading, saving and processing e-mail messages. Includes IMAP, EWS (Exchange Web Services), POP3 and SMTP clients; a high-level MailMessage API and a low-level MIME \\u0026 S/MIME API. This is a paid commercial product with a free 30-day trial: Trial mode: Start your free 30-day trial by generating your trial key \\u00B7 Licensed mode: Purchase the product and get your full license key \\u00B7 When the full license key is provided, NuGet.org repository can be used to retrieve versions of Rebex components covered by your support contract. Supported platforms: .NET 10 on Windows, Linux, macOS, Android, iOS/tvOS \\u00B7\\n\\nRebex.Imap is part of Rebex Mail Pack - a set of mail libraries that provide all you need for sending, receiving, encrypting, decrypting, signing, verifying, loading, saving and processing e-mail messages. Includes IMAP, EWS (Exchange Web Services), POP3 and SMTP clients; a high-level MailMessage API and a low-level MIME \\u0026 S/MIME API. This is a paid commercial product with a free 30-day trial: - Trial mode: Start your free 30-day trial by generating your trial key at https://rebex.net/support/trial-key.aspx - Licensed mode: Purchase the product at https://rebex.net/shop/ and get your full license key at https://rebex.net/protected/nuget When the full license key is provided, NuGet.org repository can be used to retrieve versions of Rebex components covered by your support contract. Supported platforms: - .NET 10 on Windows, Linux, macOS, Android, iOS/tvOS - .NET 9 on Windows, Linux, macOS, Android, iOS/tvOS - .NET 8 on Windows, Linux, macOS, Android, iOS/tvOS - .NET 7 on Windows, Linux,\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.nuget.org/packages/Rebex.Imap\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"GitHub - jstedfast/MailKit: A cross-platform .NET library for IMAP, POP3, and SMTP. \\u00B7 GitHub\",\"url\":\"https://github.com/jstedfast/MailKit\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"Supports client SSL/TLS certificates. Supports the following extensions: TOP, UIDL, EXPIRE, LOGIN-DELAY, PIPELINING, SASL, STLS, UTF8, UTF8=USER, and LANG \\u00B7 All APIs are cancellable. Async APIs are available. ... Supports all of the SASL mechanisms listed above. Supports SSL-wrapped connections via the \\u0026quot;imaps\\u0026quot; protocol. Supports client SSL/TLS certificates.\\n\\nThere\\u0027s nothing necessarily wrong with doing that, but the web is full of half-working, non-RFC-compliant IMAP implementations out there that it was finally time for a carefully designed and implemented IMAP client library to be written. For POP3, libraries such as OpenPOP.NET are actually fairly decent, although the MIME parser is far too strict - throwing exceptions any time it encounters a Content-Type or Content-Disposition parameter that it doesn\\u0027t already know about, which, if you read over the mailing-list, is a problem that OpenPOP.NET users are constantly running into. MailKit\\u0027s Pop3Client, of course, doesn\\u0027t have this problem. It also parses messages directly from the socket instead of downloading the message into a large string buffer before parsing it, so you\\u0027ll probably find that not only is MailKit faster (MailKit\\u0027s MIME parser, MimeKit, parses messages from disk 25x faster than OpenPOP.NET\\u0027s parser), but also uses far less memory.\\n\\nSupports client SSL/TLS certificates. Supports the following extensions: TOP, UIDL, EXPIRE, LOGIN-DELAY, PIPELINING, SASL, STLS, UTF8, UTF8=USER, and LANG \\u00B7 All APIs are cancellable. Async APIs are available. ... Supports all of the SASL mechanisms listed above. Supports SSL-wrapped connections via the \\u0022imaps\\u0022 protocol. Supports client SSL/TLS certificates.\\n\\nClient-side sorting and threading of messages. The main goal of this project is to provide the .NET world with robust, fully featured and RFC-compliant SMTP, POP3, and IMAP client implementations.\\n\\nMIT License Copyright (C) 2013-2026 .NET Foundation and Contributors Permission is hereby granted, free of charge, to any person obtaining a copy of this software and associated documentation files (the \\u0022Software\\u0022), to deal in the Software without restriction, including without limitation the rights to use, copy, modify, merge, publish, distribute, sublicense, and/or sell copies of the Software, and to permit persons to whom the Software is furnished to do so, subject to the following conditions: The above copyright notice and this permission notice shall be included in all copies or substantial portions of the Software. THE SOFTWARE IS PROVIDED \\u0022AS IS\\u0022, WITHOUT WARRANTY OF ANY KIND, EXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/jstedfast/MailKit\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"NuGet Gallery | Mail.dll 3.0.25338.1532\",\"url\":\"https://www.nuget.org/packages/Mail.dll/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"nuget.org\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=nuget.org\",\"site_name\":\"NuGet\"},\"is_missing\":false,\"text\":\"using(Imap imap = new Imap()) { imap.ConnectSSL(\\u0026quot;imap.server.com\\u0026quot;); // or Connect for non SSL/TLS imap.UseBestLogin(\\u0026quot;user\\u0026quot;, \\u0026quot;password\\u0026quot;); imap.SelectInbox(); List\\u0026lt;long\\u0026gt; uids = imap.Search(Flag.Unseen); foreach (long uid in uids) { var eml = imap.GetMessageByUID(uid); IMail email = new MailBuilder().CreateFromEml(eml); string subject = email.Subject; } imap.Close(); } using(Pop3 pop3 = new Pop3()) { pop3.ConnectSSL(\\u0026quot;pop3.server.com\\u0026quot;); // or Connect for non SSL/TLS pop3.UseBestLogin(\\u0026quot;user\\u0026quot;, \\u0026quot;password\\u0026quot;); List\\u0026lt;string\\u0026gt; uids = pop3.GetAll(); foreach (string uid in uids) { var eml = pop3.GetMessageByUID(uid); IMail email = new MailBuilder().CreateFromEml(eml); string subject = email.Subject; } pop3.Close(); } MailBuilder builder = new MailBuilder(); builder.From.Add(new MailBox(\\u0026quot;from@example.com\\u0026quot;)); builder.To.Add(new MailBox(\\u0026quot;to@example.com\\u0026quot;)); builder.Subject = \\u0026quot;Subject\\u0026quot;; builder.Html = @\\u0026quot;Html with an image: \\u0026lt;img src=\\u0026quot;\\u0026quot;cid:lena\\u0026quot;\\u0026quot; /\\u0026gt;\\u0026quot;; var visual = builder.AddVisual(@\\u0026quot;c:\\\\lena.jpeg\\u0026quot;); visual.C\\n\\nMail.dll is a robust, commercial-grade .NET library for working with IMAP, SMTP, POP3, and MIME protocols. It includes a powerful email and MIME parser, allowing you to send, receive, and process email messages in .NET applications. The library supports IMAP IDLE (push email), OAuth2 authentication (Gmail, Outlook), S/MIME encryption and signing, and advanced MIME parsing. It offers built-in SSL/TLS support, OAuth2 authentication, and DKIM signing and verification. Mail.dll also includes a secure MIME (S/MIME) parser for handling encrypted and digitally signed messages, along with parsers for iCal, vCard, and Outlook\\u2019s .msg file format. Additionally, it provides support for decoding winmail.dat attachments.\\n\\nIncluded target framework(s) (in package) Learn more about Target Frameworks and .NET Standard. No dependencies. No dependencies. No dependencies. No dependencies. No dependencies. System.Security.Cryptography.Algorithms (\\u003E= 4.3.1) ... This package is not used by any popular GitHub repositories. ... IMAP POP3 SMTP email mail MIME SMIME S/MIME dkim msg tnef oauth2 gmail mime-parser attachment TLS SSL\\n\\nusing(Imap imap = new Imap()) { imap.ConnectSSL(\\u0022imap.server.com\\u0022); // or Connect for non SSL/TLS imap.UseBestLogin(\\u0022user\\u0022, \\u0022password\\u0022); imap.SelectInbox(); List\\u003Clong\\u003E uids = imap.Search(Flag.Unseen); foreach (long uid in uids) { var eml = imap.GetMessageByUID(uid); IMail email = new MailBuilder().CreateFromEml(eml); string subject = email.Subject; } imap.Close(); } using(Pop3 pop3 = new Pop3()) { pop3.ConnectSSL(\\u0022pop3.server.com\\u0022); // or Connect for non SSL/TLS pop3.UseBestLogin(\\u0022user\\u0022, \\u0022password\\u0022); List\\u003Cstring\\u003E uids = pop3.GetAll(); foreach (string uid in uids) { var eml = pop3.GetMessageByUID(uid); IMail email = new MailBuilder().CreateFromEml(eml); string subject = email.Subject; } pop3.Close(); } MailBuilder builder = new MailBuilder(); builder.From.Add(new MailBox(\\u0022from@example.com\\u0022)); builder.To.Add(new MailBox(\\u0022to@example.com\\u0022)); builder.Subject = \\u0022Subject\\u0022; builder.Html = @\\u0022Html with an image: \\u003Cimg src=\\u0022\\u0022cid:lena\\u0022\\u0022 /\\u003E\\u0022; var visual = builder.AddVisual(@\\u0022c:\\\\lena.jpeg\\u0022); visual.C\\n\\n.NET 5.0 This package targets .NET 5.0. The package is compatible with this framework or higher. .NET Standard 2.0 This package targets .NET Standard 2.0. The package is compatible with this framework or higher. .NET Framework 2.0 This package targets .NET Framework 2.0. The package is compatible with this framework or higher. ... This command is intended to be used within the Package Manager Console in Visual Studio, as it uses the NuGet module\\u0027s version of Install-Package. \\u003CPackageReference Include=\\u0022Mail.dll\\u0022 Version=\\u00223.0.25338.1532\\u0022 /\\u003E ... For projects that support PackageReference, copy this XML node into the project file to reference the package. \\u003CPackageVersion Include=\\u0022Mail.dll\\u0022 Version=\\u00223.0.25338.1532\\u0022 /\\u003E ... For projects that support Central Package Management (CPM), copy this XML node into the solution Directory.Packages.props file to version the package.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.nuget.org/packages/Mail.dll/\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"GitHub - EBrown8534/FS-IMAP: An F# IMAP Server.\",\"url\":\"https://github.com/EBrown8534/FS-IMAP\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"This repository houses an F# IMAP server (or what will become an F# IMAP server), and a demo client to connect to the server. This is a set of general extensions (quite small) to the .NET TCP/IP stack, as well as a general TCP/IP Server.\\n\\nThis repository houses an F# IMAP server (or what will become an F# IMAP server), and a demo client to connect to the server. This is a set of general extensions (quite small) to the .NET TCP/IP stack, as well as a general TCP/IP Server. This is the IMAP TCP/IP Server (extension of the EBrown.Tcp.Server), as well as the basic IMAP TCP/IP stack.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/EBrown8534/FS-IMAP\",\"search_provider\":\"anthropic\"}}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":\"globe\",\"display_content\":null}"

