text = "The user is asking what MailKit offers in terms of parsed email data. Let me answer from knowledge — MailKit is well-known enough that I don't need to search."

[[body.segments]]
kind = "plain_text"
text = "MailKit parses into a `MimeMessage` object (via its companion library **MimeKit**) which gives you:\n\n**Envelope / headers**\n- `From`, `To`, `Cc`, `Bcc`, `ReplyTo` — typed `MailboxAddress` / `InternetAddressList`\n- `Subject` — string\n- `Date` — `DateTimeOffset`\n- `MessageId` — string (unique per message)\n- `InReplyTo`, `References` — for threading\n- Custom headers via `Headers` collection\n\n**Body**\n- `TextBody` — plain text, already extracted\n- `HtmlBody` — HTML version\n- `Body` — full `MimeEntity` tree if you need to walk it manually\n\n**Attachments**\n- `Attachments` — enumerable of `MimePart`\n- Each has `FileName`, `ContentType`, `ContentId`, content stream\n\n**Identity / metadata**\n- `Importance`, `Priority`, `XPriority`\n- `References` list (full thread chain)\n\n**IMAP-specific** (on `IMessageSummary` from a fetch)\n- UID, sequence number\n- Flags (`Seen`, `Answered`, `Flagged`, `Deleted`, etc.)\n- Size in bytes\n- Folder/mailbox it lives in\n\n**What this means for LOGOS:** a single `MimeMessage` already gives you a well-structured object you could map directly to a Fact with typed fields — no raw parsing needed on your end.\n\nSo: whole email as one Fact, with fields populated from what MailKit surfaces? Or do you anticipate needing to further decompose — e.g. each attachment as its own Fact, threaded replies linked by `InReplyTo`?"

