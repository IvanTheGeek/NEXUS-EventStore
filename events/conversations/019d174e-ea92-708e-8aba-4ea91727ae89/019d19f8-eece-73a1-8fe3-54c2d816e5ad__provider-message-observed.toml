text = "Hey everyone, I was wondering if there is any information on the .penpot file format. I’ve wanted to port several CC0 icon packs to a Penpot library and want to do it automatically, so it would be useful to understand ho…\n\nHey everyone, I was wondering if there is any information on the .penpot file format. I’ve wanted to port several CC0 icon packs to a Penpot library and want to do it automatically, so it would be useful to understand ho…\nUnlike other design tools, Penpot&#x27;s format is built on standard languages. The exported file is essentially a ZIP archive containing binary assets (such as bitmap and vector images) alongside a readable JSON structure.\n\nUnlike other design tools, Penpot's format is built on standard languages. The exported file is essentially a ZIP archive containing binary assets (such as bitmap and vector images) alongside a readable JSON structure. By avoiding proprietary formats, Penpot empowers users with autonomy from specific tools while enabling seamless third-party integrations. These formats can only be exported from version 2.3 or earlier versions, but can be imported to any Penpot version. There are two different deprecated Penpot file formats in which you can import/export Penpot files. A standard one and a binary one. You always have the chance to use both for any file. The fast one. Binary Penpot specific. ✅ Highly efficient in terms of memory and transfer time when exporting and importing. ... The open one. A compressed file that includes SVG and JSON. ✅ Allows the file to be opened by other softwares (still, for those cases export to SVG seems to be the common practice).\n\nLearn how to import and export files in Penpot, the free, open-source design tool. Discover file formats, backups, sharing, and library management.\n\nYou can export Penpot files to your computer and import them from your computer to your projects. Exporting files is useful for many reasons. Sometimes you want to have a backup of your files and sometimes it is useful to share Penpot files with a user that does not belong to one of your teams, or you want to have a backup of your files outside Penpot, both SaaS (design.penpot.app) or at a self-hosted instance. You can download (export) files from the workspace and from the dashboard. From the dashboard: Select the download option at the file card menu. From the workspace: Select the download option at the main menu. Select multiple files to export them at the same time. An overlay will show you the progress of the different exports. Exported files linked to shared libraries provide different ways to export their assets. Choose the one that suits you better.\n&lt;p&gt;There are two different formats in which you can import/export Penpot files. A standard one and a binary one. You always have the chance to use both for any file.&lt;/p&gt; &lt;h3&gt;Penpot file (.penpot).&lt;/h3&gt; &lt;p&gt;The fast one.\n\nWebsite and documentation about Penpot, The Open-Source design & prototyping platform - penpot/penpot-docs\n\n<p class=\"advice\">Importing files from other tools and services is among the main priorities of the Penpot team. Related features are coming soon.</p> ... <p>The import option is at the projects menu. Press “Import files” and then select one or more .penpot files to import.\n\n<p>There are two different formats in which you can import/export Penpot files. A standard one and a binary one. You always have the chance to use both for any file.</p> <h3>Penpot file (.penpot).</h3> <p>The fast one. Binary Penpot specific.</p> <ul>   <li>✅ Highly efficient in terms of memory and transfer time when exporting and importing.</li>   <li>❌ It can be opened only in Penpot.</li>   <li>❌ Not transparent, code difficult to explore.</li> </ul> <h3>Standard file (.zip).</h3> <p>The open one.\n\n<p class=\"main-paragraph\">You can export Penpot files to your computer and import them from your computer to your projects.</p> ... <p>There are two different formats in which you can import/export Penpot files. A standard one and a binary one. You always have the chance to use both for any file.</p> ...   <li>✅ Allows the file to be opened by other softwares (still, for those cases export to SVG seems to be the common practice).</li>   <li>✅ Allows some automations and integrations.</li>   <li>✅ Is a transparent, existing, open standard format.</li>   <li>❌ Highly inefficient in terms of memory and transfer time when exporting and importing (this is because SVG).</li> ... <p>Exporting files is useful for many reasons. Sometimes you want to have a backup of your files and sometimes it is useful to share Penpot files with a user that does not belong to one of your teams, or you want to have a backup of your files outside Penpot, both SaaS (design.penpot.app) or at a self-hosted instance\n... Consists on registration and authentication via email / password. It is enabled by default, but login can be disabled with the following flags: ... Added the ability to specify custom OIDC scopes.\n\nWebsite and documentation about Penpot, The Open-Source design & prototyping platform - penpot/penpot-docs\n\nVariables are initialized in the <code class=\"language-bash\">docker-compose.yaml</code> file, as explained in the · Self-hosting guide with [Elestio][1] or [Docker][2]. ... This section will list all common configuration between backend and frontend. ... <code class=\"language-bash\">PENPOT_FLAGS</code> environment variable. The envvar is a list of strings using this · format: <code class=\"language-bash\"><enable|disable>-\\<flag-name></code>. For example: ... enabled with <code class=\"language-bash\">enable-email-whitelist</code> flag. For backward compatibility, we · autoenable it when <code class=\"language-bash\">PENPOT_REGISTRATION_DOMAIN_WHITELIST</code> is set with ... You will need to change <your_domain> and <oauth_provider> according to your setup. ... Consists on registration and authentication via email / password. It is enabled by default, but login can be disabled with the following flags: ... Added the ability to specify custom OIDC scopes.\n\nThese variables are used for generate correct nginx.conf file on container startup. ... - <code class=\"language-bash\">enable-cors</code>: Enables the default cors cofiguration that allows all domains ·   (this configuration is designed only for dev purposes right now) - <code class=\"language-bash\">enable-backend-api-doc</code>: Enables the <code class=\"language-bash\">/api/doc</code>   endpoint that lists all rpc methods available on backend · - <code class=\"language-bash\">disable-email-verification</code>: Deactivates the email verification process ·    (only recommended for local or internal setups) - <code class=\"language-bash\">disable-secure-session-cookies</code>: By default, Penpot uses the ·   <code class=\"language-bash\">secure</code> flag on cookies, this flag disables it;   it is useful if you plan to serve Penpot under different ·   domain than <code class=\"language-bash\">localhost</code> without HTTPS ·\n\ntools for communicate internally with Penpot backend ... - <code class=\"language-bash\">enable-log-invitation-tokens</code>: for cases where you don't have email configured, this ... - <code class=\"language-bash\">enable-log-emails</code>: if you want to log in console send emails. This only works if smtp ... - <code class=\"language-bash\">disable-onboarding-team</code>: for disable onboarding team creation modal · - <code class=\"language-bash\">disable-onboarding-newsletter</code>: for disable onboarding newsletter modal · - <code class=\"language-bash\">disable-onboarding-questions</code>: for disable onboarding survey · - <code class=\"language-bash\">disable-onboarding</code>: for disable onboarding modal · - <code class=\"language-bash\">disable-dashboard-templates-section</code>: for hide the templates section from dashboard · - <code class=\"language-bash\">enable-webhooks</code>: for enable webhooks ·\nA s