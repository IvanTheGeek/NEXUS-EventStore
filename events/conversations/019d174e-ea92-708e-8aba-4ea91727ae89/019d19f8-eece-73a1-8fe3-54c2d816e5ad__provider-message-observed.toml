text = "Good news — there's actually more documentation than I initially indicated. Here's the accurate picture:\n\n**No formal standalone spec**, but there is official technical documentation:\n- The conceptual data model is documented in the Technical Guide's data-model section, and further discussed in the Data Guide (section 3.7).\n\n**Important format change you should know about:**\n- The old formats (binary `.penpot` and SVG+JSON `.zip`) are deprecated as of version 2.3 — they can only be *exported* from 2.3 or earlier, but can still be *imported* to any version.\n- The `.penpot` binary format is highly efficient but not transparent and difficult to explore. The `.zip` standard format is open and allows automations and integrations, but is inefficient due to SVG overhead.\n\n**Practical implication for your pipeline:** The format has already undergone at least one significant breaking change (the 2.3 deprecation), and given that no formal versioned spec exists, it's reasonable to expect ongoing drift. Building a brittle direct parser would be risky — the Technical Guide data model docs are probably your most stable anchor point.\n\nWorth checking: https://help.penpot.app/technical-guide/developer/data-guide/ — that's the closest thing to an official spec right now."

