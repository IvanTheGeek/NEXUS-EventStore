d list of domains PENPOT_REGISTRATION_DOMAIN_WHITELIST: # Backend # or a file with a domain per line PENPOT_EMAIL_DOMAIN_WHITELIST: path/to/whitelist.txt PENPOT_EMAIL_DOMAIN_BLACKLIST: path/to/blacklist.txt ... Email whitelisting should be explicitly enabled with enable-email-whitelist flag. For backward compatibility, we autoenable it when PENPOT_REGISTRATION_DOMAIN_WHITELIST is set with not-empty content.\n\nBy default, Penpot stores manually saved versions indefinitely; these can be found in the History tab and can be renamed, restored, deleted, etc. Additionally, the default behavior of on-premise instances is to not keep automatic version history. This automatic behavior can be modified and adapted to each on-premise installation with the corresponding configuration. You need to be very careful when configuring automatic versioning, as it can significantly impact the size of your database. If you configure automatic versioning, you'll need to monitor this impact; if you're unsure about this management, we recommend leaving the default settings and using manual versioning. This is how configuration looks for auto-file-snapshot · PENPOT_FLAGS: [...] enable-auto-file-snapshot # Enable automatic version saving # Backend PENPOT_AUTO_FILE_SNAPSHOT_EVERY: 5 # How many save operations trigger the auto-save-version?\n\nIf you plan to serve Penpot under different domain than `localhost` without HTTPS, you need to disable the `secure` flag on cookies, with the `disable-secure-session-cookies` flag. This is a configuration NOT recommended for production environments; as some browser APIs do not work properly under non-https environments, this unsecure configuration may limit the usage of Penpot; as an example, the clipboard does not work with HTTP. By default, smtp flag is disabled, the email will be printed to the console, which means that the emails will be shown in the stdout. Note that if you plan to invite members to a team, it is recommended that you enable SMTP as t