text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":\"toolu_018NMxcW4Fheb2rpXD3EsuKy\",\"name\":\"web_fetch\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Any updates of documentating the penpot file format?\",\"url\":\"https://community.penpot.app/t/any-updates-of-documentating-the-penpot-file-format/7358\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"penpot\"},\"is_missing\":false,\"text\":\"Any updates of documentating the penpot file format? - Ask the community - Penpot Community\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n[Penpot Community](https://community.penpot.app/)\\n\\n# [Any updates of documentating the penpot file format?](https://community.penpot.app/t/any-updates-of-documentating-the-penpot-file-format/7358)\\n\\n[Ask the community](https://community.penpot.app/c/ask-for-help-using-penpot/6)\\n\\n[TheWonderAlmighty](https://community.penpot.app/u/TheWonderAlmighty)\\n\\n\\n\\nDecember 15, 2024, 8:50pm\\n\\n1\\n\\nI found this post [from 2 years ago](https://community.penpot.app/t/penpot-file-documentation/1595) about it but there hasn\\u2019t been any update on it.\\n\\n[kailuakowboy](https://community.penpot.app/u/kailuakowboy)\\n\\n\\nFebruary 12, 2025, 4:08pm\\n\\n2\\n\\nI\\u2019m extremely new to penpot, but I was curious about this and decided to poke around. According to the [User\\u2019s Guide](https://help.penpot.app/user-guide/import-export/#penpot-formats), it sounds like the application uses a couple of iterations for a file format and the current open format is bound to the application features of the version of penpot (currently v2.3). The conceptual data model of the file data appears to be documented in the Technical Guide [here](https://help.penpot.app/technical-guide/developer/data-model/#file-data).\\n\\n[kailuakowboy](https://community.penpot.app/u/kailuakowboy)\\n\\n\\nFebruary 12, 2025, 4:10pm\\n\\n3\\n\\nFurther discussion of the penpot data structure is discussed in the [Technical Guide Section 3.7 Data Guide](https://help.penpot.app/technical-guide/developer/data-guide/).\\n\\n### Related topics\\n\\n| Topic |  | Replies | Views | Activity |\\n| --- | --- | --- | --- | --- |\\n| [Penpot file documentation](https://community.penpot.app/t/penpot-file-documentation/1595)  [Ask the community](https://community.penpot.app/c/ask-for-help-using-penpot/6) | 2 | 809 | February 7, 2023 |\\n| [Trying to export a penpot file using penpot-export and modify it in place](https://community.penpot.app/t/trying-to-export-a-penpot-file-using-penpot-export-and-modify-it-in-place/5634)  [Ask the community](https://community.penpot.app/c/ask-for-help-using-penpot/6) | 0 | 325 | June 7, 2024 |\\n| [Serializer/Deserializer for the .penpot format](https://community.penpot.app/t/serializer-deserializer-for-the-penpot-format/1429)  [Ask the community](https://community.penpot.app/c/ask-for-help-using-penpot/6) | 5 | 1404 | October 13, 2022 |\\n| [Penpot 2.4 release: Eye in the Sky \\uD83D\\uDC41\\uFE0F](https://community.penpot.app/t/penpot-2-4-release-eye-in-the-sky/7332)  [Product updates](https://community.penpot.app/c/announcements/product-updates/16) | 8 | 915 | January 21, 2025 |\\n| [Can .penpot file be checked into VCS?](https://community.penpot.app/t/can-penpot-file-be-checked-into-vcs/2491)  [Ask the community](https://community.penpot.app/c/ask-for-help-using-penpot/6) | 5 | 590 | February 8, 2023 |\\n\\n* [Home](https://community.penpot.app/)\\n* [Categories](https://community.penpot.app/categories)\\n* [Guidelines](https://community.penpot.app/guidelines)\\n* [Terms of Service](https://community.penpot.app/tos)\\n* [Privacy Policy](https://community.penpot.app/privacy)\\n\\nPowered by [Discourse](https://www.discourse.org), best viewed with JavaScript enabled\",\"is_citable\":true,\"prompt_context_metadata\":{\"content_type\":\"html\",\"mime_type\":\"text/html; charset=utf-8\",\"destination_url\":\"https://community.penpot.app/t/any-updates-of-documentating-the-penpot-file-format/7358\"}}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":\"Fetched: Any updates of documentating the penpot file format?\",\"integration_name\":\"Web Fetch\",\"integration_icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"icon_name\":\"globe\",\"display_content\":{\"type\":\"rich_link\",\"link\":{\"title\":\"Any updates of documentating the penpot file format?\",\"subtitles\":null,\"url\":\"https://community.penpot.app/t/any-updates-of-documentating-the-penpot-file-format/7358\",\"resource_type\":null,\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"source\":\"penpot\"},\"is_trusted\":false}}"

