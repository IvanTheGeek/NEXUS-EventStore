text = "There are three external access points, none of which are a clean REST/GraphQL API:\n\n**1. Backend RPC API (with Personal Access Tokens)**\nThe main one. Personal access tokens function as an alternative to login/password authentication and can be used to allow an application to access the internal Penpot API. It's an RPC-over-HTTP style — you call endpoints like `/api/rpc/command/get-file`. The API operates with both `application/json` and `application/transit+json` content types — transit is the default. Transit+JSON is a Cognitect format (Clojure ecosystem), which is parseable but not ergonomic from F#.\n\n**2. Webhooks (outbound)**\nWebhook calls are triggered by backend RPC calls labelled as WEBHOOK — they notify when events occur (file created/updated, comment added, etc.). The payload is specified as Clojure Spec predicates and documentation is auto-generated from source code.\n\n**3. Self-hosted `/api/doc` endpoint**\nThe `enable-backend-api-doc` flag enables a `/api/doc` endpoint that lists all RPC methods available on the backend. This gives you a live inventory of what's callable on your own instance.\n\n**Bottom line for your use case:**\n\nThe RPC API can do everything — read files, get pages, update files — but the transit+JSON encoding is the friction point from F#. There are F# transit libraries, but it's not zero-cost. The alternative is hitting the API with `Accept: application/json` header to get plain JSON back, which the API does support per the content negotiation note above.\n\nIs this for driving the Penpot→Bolero code generation pipeline, or something else?"

