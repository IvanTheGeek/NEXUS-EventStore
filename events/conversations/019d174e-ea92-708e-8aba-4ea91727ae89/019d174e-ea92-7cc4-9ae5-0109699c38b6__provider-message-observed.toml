text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":\"toolu_012ExufAG3pceHPHYsU4qirw\",\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"How to update a image fill via Penpot API? - Ask the community - Penpot Community\",\"url\":\"https://community.penpot.app/t/how-to-update-a-image-fill-via-penpot-api/9484\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Our workflow is: Upload a new image using the /api/rpc/command/create-file-media-object-from-url endpoint. Add the resulting image object to the file\\u2019s media section using an add-media change.\\n\\nHello Penpot community, We are automating design updates using the Penpot API and are trying to programmatically update the image fill of a rectangle shape (e.g., a \\u201Chero image\\u201D layer) in a design file. Our workflow is: Upload a new image using the /api/rpc/command/create-file-media-object-from-url endpoint. Add the resulting image object to the file\\u2019s media section using an add-media change. Update the target shape\\u2019s fills property using a mod-obj change, setting fillImage.id to the new ima...\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://community.penpot.app/t/how-to-update-a-image-fill-via-penpot-api/9484\",\"search_provider\":\"anthropic\",\"age\":\"July 29, 2025\"}},{\"type\":\"knowledge\",\"title\":\"Penpot MCP Server | MCP Servers \\u00B7 LobeHub\",\"url\":\"https://lobehub.com/mcp/zcube-penpot-mcp-server\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"lobehub.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=lobehub.com\",\"site_name\":\"LobeHub\"},\"is_missing\":false,\"text\":\"MCP server for Penpot with full manipulation capabilities - create, update, and manage designs programmatically. Requires Penpot API credentials configured via environment variables PENPOT_API_URL and PENPOT_ACCESS_TOKEN. mcppenpotdesignapi...\\n\\nMCP server for Penpot with full manipulation capabilities - create, update, and manage designs programmatically. Requires Penpot API credentials configured via environment variables PENPOT_API_URL and PENPOT_ACCESS_TOKEN. mcppenpotdesignapiautomationmodel-context-protocoldesign-toolspenpot-api ... A Model Context Protocol (MCP) server that provides browser automation capabilities using Playwright. Enables LLMs to interact with web pages through structured accessibility snapshots without vision models. Requires Node.js 18 or newer. Configuration file path can be specified via the --config option. ... MCP server for Context7 that provides up-to-date, version-specific documentation and code examples for libraries directly into your prompt. Requires Node.js \\u003E= v18.0.0 runtime. ... BlenderMCP connects Blender to Claude AI through the Model Context Protocol (MCP), allowing Claude to directly interact with and control Blender.\\n\\nThe type definitions in src/types.ts are based on Penpot\\u0027s RPC API structure and were created by analyzing the Penpot API responses and behavior. Contributions are welcome!\\n\\nThe screenshot above demonstrates how you can describe a design in natural language, and the AI assistant will create it in Penpot using the MCP server\\u0027s capabilities - handling layout, styling, components, and interactions automatically. Create \\u0026 Manage Files: Create new design files, list projects, and manage file metadata \\u00B7 Shape Operations: Create rectangles, circles, frames, paths, text, and SVG shapes \\u00B7 Modify Designs: Update shape properties, move objects, resize, rotate, and style \\u00B7 Page Management: Add, remove, and organize pages within files \\u00B7 Component System: Create and manage reusable components ... query_shapes - Query and filter shapes with criteria (like grep). Filter by type, area, color, font, text content. Select fields to return. Useful for bulk operations \\u00B7 get_shape_properties - Get detailed properties of a specific shape (colors, text, fonts, effects, etc.)\\n\\nImportant: Due to Cloudflare security restrictions on the public Penpot instance, you may need to use a self-hosted server for API access. Add enable-access-tokens to your Penpot server configuration: ... # Example with multiple flags environment: - PENPOT_FLAGS=enable-registration enable-login enable-access-tokens \\u00B7 After enabling this flag, restart your Penpot server and you\\u0027ll be able to generate access tokens from Settings \\u2192 Access Tokens. ... Add to your Claude Desktop configuration (~/Library/Application Support/Claude/claude_desktop_config.json on macOS): ... { \\u0022mcpServers\\u0022: { \\u0022penpot\\u0022: { \\u0022command\\u0022: \\u0022node\\u0022, \\u0022args\\u0022: [\\u0022/path/to/penpot-mcp-server/dist/index.js\\u0022], \\u0022env\\u0022: { \\u0022PENPOT_API_URL\\u0022: \\u0022https://design.penpot.app\\u0022, \\u0022PENPOT_ACCESS_TOKEN\\u0022: \\u0022your-access-token\\u0022 } } } } ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://lobehub.com/mcp/zcube-penpot-mcp-server\",\"search_provider\":\"anthropic\",\"age\":\"November 27, 2025\"}},{\"type\":\"knowledge\",\"title\":\"Code to Penpot (How to work with the API?) \\u00B7 penpot/penpot \\u00B7 Discussion #4180\",\"url\":\"https://github.com/penpot/penpot/discussions/4180\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"const body = { \\u0026quot;id\\u0026quot;: env[\\u0026quot;PORTFOLIO_ID\\u0026quot;], \\u0026quot;sessionId\\u0026quot;: env[\\u0026quot;PORTFOLIO_ID\\u0026quot;], \\u0026quot;revn\\u0026quot;: 0, // \\u0026quot;changes\\u0026quot;: [{\\u0026quot;type\\u0026quot;: \\u0026quot;add-page\\u0026quot; }], } const name = \\u0026#x27;updateFile\\u0026#x27; const res = await fetch(\\u0026quot;https://design.penpot.app/api/rpc/command/update-file\\u0026quot;, { \\u0026quot;method\\u0026quot;: \\u0026quot;POST\\u0026quot;, \\u0026quot;headers\\u0026quot;: { \\u0026quot;Accept\\u0026quot;: \\u0026quot;application/json\\u0026quot;, \\u0026quot;Content-Type\\u0026quot;: \\u0026quot;application/json\\u0026quot;, \\u0026quot;Authorization\\u0026quot;: \\u0060Token ${env[\\u0026quot;PENPOT_TOKEN\\u0026quot;]}\\u0060 }, \\u0026quot;body\\u0026quot;: JSON.stringify(body) }) const data = await res.json() console.log(res.status) Deno.writeTextFile(\\u0060./${name}.json\\u0060, JSON.stringify(data, null, 2)) ... Then tried to add one more params (commented on the code snippet above) which are the changes to update the file, but i keep getting this unreadable error: ... So checked the API DOC, OPENAPI JSON and the issues and discussions (only found this issue kinda relevant but it points out to this PR closed with the comment \\u0026quot;I\\u0026#x27;m going to close this PR, and open a new one with more changes\\u0026quot;...but nothing linked to keep track of how it\\u0026#x27;s going).\\n\\nI\\u0027m having trouble get the API to work. I need update the project design file from within the code of the same project... like maybe create a design system, portfolio and application designs and be able to update from penpot or from the code of the said projects (color tokens, typography and the name/structure of the object of these tokens). So far i created a repo with some color tokens, some API call\\u0027s to test the endpoints and there\\u0027s 4 endpoints i tested which are create-file, get-file, get-page and update-file. The update-file is the only I\\u0027m having an issue, but i don\\u0027t know if it\\u0027s a bug or it\\u0027s me doing something wrong or maybe it\\u0027s not the intended use for this. I\\u0027ve tried to only call with the required params to see the response and it returned OK and what i believe is the number of requests made in one session to keep track of updates as the \\u0022revn\\u0022 and the last x requests.\\n\\nContent Negotiation The penpot API by default operates indistinctly with: application/json and application/transit\\u002Bjson content types. You should specify the desired content-type on the Accept header, the transit encoding is used by default. Every Fetch call was made not including the \\u0022Accept\\u0022 or \\u0022Content-Type\\u0022 or with both or without both and didn\\u0027t change the response. SSE (Server-Sent Events) The methods marked with SSE returns a SSE formatted stream on the response body, always with status 200. The events are always encoded using application/transit\\u002Bjson encoding (for now no content negotiation is possible on methods that return SSE streams). The methods used didn\\u0027t have the SSE marking in them, but the response of the failed (400) \\u0022update-file\\u0022 requests always come in the unreadable transit format or badly json formatted (after \\u0022explain:\\u0022 it\\u0027s a transit response return in a single string).\\n\\nKinda giving up here and leaving penpot for now since for me there\\u0027s no use in using a design tool if i need to manually set some infinite tokens and do some design changes and then do it again in each repo...and redo it all again if i change something someplace, might as well do everything directly and design as i\\u0027m coding or whatever. But since could be other noobs out there with some similar problem, gonna leave this discussion as a helper to whoever need. So....any ideas/solutions would be appreciated! Beta Was this translation helpful? Give feedback. ... Sign up for free to join this conversation on GitHub. Already have an account? Sign in to comment ... There was an error while loading. Please reload this page.\\n\\nconst body = { \\u0022id\\u0022: env[\\u0022PORTFOLIO_ID\\u0022], \\u0022sessionId\\u0022: env[\\u0022PORTFOLIO_ID\\u0022], \\u0022revn\\u0022: 0, // \\u0022changes\\u0022: [{\\u0022type\\u0022: \\u0022add-page\\u0022 }], } const name = \\u0027updateFile\\u0027 const res = await fetch(\\u0022https://design.penpot.app/api/rpc/command/update-file\\u0022, { \\u0022method\\u0022: \\u0022POST\\u0022, \\u0022headers\\u0022: { \\u0022Accept\\u0022: \\u0022application/json\\u0022, \\u0022Content-Type\\u0022: \\u0022application/json\\u0022, \\u0022Authorization\\u0022: \\u0060Token ${env[\\u0022PENPOT_TOKEN\\u0022]}\\u0060 }, \\u0022body\\u0022: JSON.stringify(body) }) const data = await res.json() console.log(res.status) Deno.writeTextFile(\\u0060./${name}.json\\u0060, JSON.stringify(data, null, 2)) ... Then tried to add one more params (commented on the code snippet above) which are the changes to update the file, but i keep getting this unreadable error: ... So checked the API DOC, OPENAPI JSON and the issues and discussions (only found this issue kinda relevant but it points out to this PR closed with the comment \\u0022I\\u0027m going to close this PR, and open a new one with more changes\\u0022...but nothing linked to keep track of how it\\u0027s going).\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/penpot/penpot/discussions/4180\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"API example for modifing a text component - Ask the community - Penpot Community\",\"url\":\"https://community.penpot.app/t/api-example-for-modifing-a-text-component/8297\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Hi, I am trying to build a solutions to translate design assets in penpot. I am looking for a bit of guidance regarding the update-file call with REST API. (doc is here) I have managed to extract the content object by\\u2026\\n\\nHi, I am trying to build a solutions to translate design assets in penpot. I am looking for a bit of guidance regarding the update-file call with REST API. (doc is here) I have managed to extract the content object by\\u2026\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://community.penpot.app/t/api-example-for-modifing-a-text-component/8297\",\"search_provider\":\"anthropic\",\"age\":\"March 29, 2025\"}},{\"type\":\"knowledge\",\"title\":\"@zcubekr/penpot-mcp-server - npm\",\"url\":\"https://www.npmjs.com/package/@zcubekr/penpot-mcp-server\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"npmjs.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=npmjs.com\",\"site_name\":\"npm\"},\"is_missing\":false,\"text\":\"The screenshot above demonstrates how you can describe a design in natural language, and the AI assistant will create it in Penpot using the MCP server\\u0026#x27;s capabilities - handling layout, styling, components, and interactions automatically. Create \\u0026amp; Manage Files: Create new design files, list projects, and manage file metadata \\u00B7 Shape Operations: Create rectangles, circles, frames, paths, text, and SVG shapes \\u00B7 Modify Designs: Update shape properties, move objects, resize, rotate, and style \\u00B7 Page Management: Add, remove, and organize pages within files \\u00B7 Component System: Create and manage reusable components ... query_shapes - Query and filter shapes with criteria (like grep). Filter by type, area, color, font, text content. Select fields to return. Useful for bulk operations \\u00B7 get_shape_properties - Get detailed properties of a specific shape (colors, text, fonts, effects, etc.)\\n\\nThe type definitions in src/types.ts are based on Penpot\\u0027s RPC API structure and were created by analyzing the Penpot API responses and behavior. Contributions are welcome!\\n\\nThe screenshot above demonstrates how you can describe a design in natural language, and the AI assistant will create it in Penpot using the MCP server\\u0027s capabilities - handling layout, styling, components, and interactions automatically. Create \\u0026 Manage Files: Create new design files, list projects, and manage file metadata \\u00B7 Shape Operations: Create rectangles, circles, frames, paths, text, and SVG shapes \\u00B7 Modify Designs: Update shape properties, move objects, resize, rotate, and style \\u00B7 Page Management: Add, remove, and organize pages within files \\u00B7 Component System: Create and manage reusable components ... query_shapes - Query and filter shapes with criteria (like grep). Filter by type, area, color, font, text content. Select fields to return. Useful for bulk operations \\u00B7 get_shape_properties - Get detailed properties of a specific shape (colors, text, fonts, effects, etc.)\\n\\nPENPOT_API_URL=https://design.penpot.app PENPOT_ACCESS_TOKEN=your-access-token-here ... Important: Due to Cloudflare security restrictions on the public Penpot instance, you may need to use a self-hosted server for API access. Add enable-access-tokens to your Penpot server configuration: # docker-compose.yml or penpot-config.env environment: - PENPOT_FLAGS=...enable-access-tokens \\u00B7 If you have other flags, append enable-access-tokens to the list: # Example with multiple flags environment: - PENPOT_FLAGS=enable-registration enable-login enable-access-tokens \\u00B7 After enabling this flag, restart your Penpot server and you\\u0027ll be able to generate access tokens from Settings \\u2192 Access Tokens. ... Add to your Claude Desktop configuration (~/Library/Application Support/Claude/claude_desktop_config.json on macOS): { \\u0022mcpServers\\u0022: { \\u0022penpot\\u0022: { \\u0022command\\u0022: \\u0022node\\u0022, \\u0022args\\u0022: [\\u0022/path/to/penpot-mcp-server/dist/index.js\\u0022], \\u0022env\\u0022: { \\u0022PENPOT_API_URL\\u0022: \\u0022https://design.penpot.app\\u0022, \\u0022PENPOT_ACCESS_TOKEN\\u0022: \\u0022yo\\n\\n# Run with Docker docker run -d \\\\ --name penpot-mcp-server \\\\ -p 3000:3000 \\\\ -e TRANSPORT=http \\\\ -e PENPOT_API_URL=https://design.penpot.app \\\\ -e PENPOT_ACCESS_TOKEN=your-access-token \\\\ ghcr.io/zcube/penpot-mcp-server:latest # With custom port and self-hosted Penpot docker run -d \\\\ --name penpot-mcp-server \\\\ -p 8080:8080 \\\\ -e TRANSPORT=http \\\\ -e HTTP_PORT=8080 \\\\ -e PENPOT_API_URL=https://penpot.mycompany.com \\\\ -e PENPOT_ACCESS_TOKEN=your-access-token \\\\ ghcr.io/zcube/penpot-mcp-server:latest # View logs docker logs -f penpot-mcp-server # Stop server docker stop penpot-mcp-server docker rm penpot-mcp-server \\u00B7 # Using npm script npm run dev:http # Or with environment variable TRANSPORT=http node dist/index.js # With custom port TRANSPORT=http HTTP_PORT=8080 node dist/index.js \\u00B7 # Required export PENPOT_ACCESS_TOKEN=\\u0022your-access-token\\u0022 # Optional export PENPOT_API_URL=\\u0022https://design.penpot.app\\u0022 # Default export HTTP_PORT=\\u00223000\\u0022 # Default export HTTP_HOST=\\u00220.0.0.0\\u0022 # Default # Security opti\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.npmjs.com/package/@zcubekr/penpot-mcp-server\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Help on \\u0022invalid shape found after applying changes\\u0022 error \\u00B7 Issue #5732 \\u00B7 penpot/penpot\",\"url\":\"https://github.com/penpot/penpot/issues/5732\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"I\\u0026#x27;m building an app that has Penpot (from source) running inside of it. The app programmatically creates a new penpot file and adds an svg to the newly created file. My code is able to successfully create the file but when attempting to insert ...\\n\\nOverview I\\u0027m building an app that has Penpot (from source) running inside of it. The app programmatically creates a new penpot file and adds an svg to the newly created file. My code is able to successfully create the file but when attem...\\n\\nAnd below is the gist of my \\u201Cupdate-file\\u201D body that fails: (After that POST to /api/rpc/command/update-file, Penpot returns a 500 with the big \\u201Cinvalid shape found\\u201D schema error) { \\u0022id\\u0022: \\u00225b16e598-5edb-8033-8005-a8868825e561\\u0022, \\u0022session-id\\u0022: \\u0022f68de4c4-8ca3-4a08-ac60-20b60ecd9d86\\u0022, \\u0022revn\\u0022: 0, \\u0022vern\\u0022: 0, \\u0022changes\\u0022: [ { \\u0022type\\u0022: \\u0022add-obj\\u0022, \\u0022id\\u0022: \\u00220674c97c-43a6-441d-88fb-c50673a88ea3\\u0022, \\u0022page-id\\u0022: \\u00225b16e598-5edb-8033-8005-a8868826392a\\u0022, \\u0022frame-id\\u0022: \\u002200000000-0000-0000-0000-000000000000\\u0022, \\u0022obj\\u0022: { \\u0022id\\u0022: \\u00220674c97c-43a6-441d-88fb-c50673a88ea3\\u0022, \\u0022type\\u0022: \\u0022frame\\u0022, \\u0022name\\u0022: \\u0022Root Frame\\u0022, \\u0022page-id\\u0022: \\u00225b16e598-5edb-8033-8005-a8868826392a\\u0022, \\u0022parent-id\\u0022: \\u002200000000-0000-0000-0000-000000000000\\u0022, \\u0022frame-id\\u0022: \\u002200000000-0000-0000-0000-000000000000\\u0022, \\u0022points\\u0022: [[0, 0], [1200, 0], [1200, 800], [0, 800]], \\u0022x\\u0022: 0, \\u0022y\\u0022: 0, \\u0022width\\u0022: 1200, \\u0022height\\u0022: 800, \\u0022selrect\\u0022: { \\u0022x\\u0022: 0, \\u0022y\\u0022: 0, \\u0022width\\u0022: 1200, \\u0022height\\u0022: 800 }, \\u0022transform\\u0022: [1, 0, 0, 1, 0, 0], \\u0022transform-inverse\\u0022: [1, 0, 0, 1, 0, 0], \\u0022shapes\\u0022: [\\u0022516c04a1-8325-40a\\n\\nI\\u0027m building an app that has Penpot (from source) running inside of it. The app programmatically creates a new penpot file and adds an svg to the newly created file. My code is able to successfully create the file but when attempting to insert the svg it runs into a 500 response with \\u201Cinvalid shape found after applying changes.\\u201D \\u00B7 Is there a specific shape property, parent reference, or child reference that\\u2019s causing this shape validation to fail? Or is it something else? From the logs, I see that Penpot is complaining about my \\u201CRoot Frame\\u201D object. ... Auth is done by reusing the user\\u2019s existing Penpot session cookie. In my logs, I see the cookie like: auth-token=eyJhbGciOiJBMjU2S1ciLCJlbmMiOiJBMjU2R0NNIn0.lGCGi... My code to do this is in a route handler (route.ts) under the function: // ... async function createFileAndPasteTextInPenpot(snippetHtml: string, userCookie: string): Promise\\u003Cvoid\\u003E { // 1) create-file // 2) parse the newly created file\\u0027s ID and page ID // 3) update-file with\\n\\n[DEBUG] Attempting to create-file in Penpot at http://localhost:3449 [DEBUG] createdFileData from Penpot create-file: { \\u0027~:features\\u0027: { \\u0027~#set\\u0027: [ \\u0027layout/grid\\u0027, \\u0027fdata/pointer-map\\u0027, \\u0027fdata/objects-map\\u0027, \\u0027components/v2\\u0027, \\u0027fdata/shape-data-type\\u0027 ] }, \\u0027~:name\\u0027: \\u0027AI Created File\\u0027, \\u0027~:revn\\u0027: 0, \\u0027~:vern\\u0027: 0, \\u0027~:id\\u0027: \\u0027~u5b16e598-5edb-8033-8005-a8868825e561\\u0027, \\u0027~:is-shared\\u0027: false, \\u0027~:version\\u0027: 61, \\u0027~:project-id\\u0027: \\u0027~u5b16e598-5edb-8033-8005-a5ea9f9ce5c6\\u0027, \\u0027~:data\\u0027: { \\u0027~:pages\\u0027: [ \\u0027~u5b16e598-5edb-8033-8005-a8868826392a\\u0027 ], \\u0027~:pages-index\\u0027: { \\u0027~u5b16e598-5edb-8033-8005-a8868826392a\\u0027: [Object] }, \\u0027~:id\\u0027: \\u0027~u5b16e598-5edb-8033-8005-a8868825e561\\u0027, \\u0027~:options\\u0027: { \\u0027~:components-v2\\u0027: true } } } [DEBUG] New file ID: ~u5b16e598-5edb-8033-8005-a8868825e561 =\\u003E 5b16e598-5edb-8033-8005-a8868825e561 revn: 0 [DEBUG] Found page ID: ~u5b16e598-5edb-8033-8005-a8868826392a =\\u003E 5b16e598-5edb-8033-8005-a8868826392a [DEBUG] No root frame ID found for page.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/penpot/penpot/issues/5732\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"GitHub - zcube/penpot-mcp-server: MCP server for Penpot - Connect AI assistants to Penpot design platform via Model Context Protocol \\u00B7 GitHub\",\"url\":\"https://github.com/zcube/penpot-mcp-server\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"The screenshot above demonstrates how you can describe a design in natural language, and the AI assistant will create it in Penpot using the MCP server\\u0026#x27;s capabilities - handling layout, styling, components, and interactions automatically. Create \\u0026amp; Manage Files: Create new design files, list projects, and manage file metadata \\u00B7 Shape Operations: Create rectangles, circles, frames, paths, text, and SVG shapes \\u00B7 Modify Designs: Update shape properties, move objects, resize, rotate, and style \\u00B7 Page Management: Add, remove, and organize pages within files \\u00B7 Component System: Create and manage reusable components ... query_shapes - Query and filter shapes with criteria (like grep). Filter by type, area, color, font, text content. Select fields to return. Useful for bulk operations \\u00B7 get_shape_properties - Get detailed properties of a specific shape (colors, text, fonts, effects, etc.)\\n\\nThe type definitions in src/types.ts are based on Penpot\\u0027s RPC API structure and were created by analyzing the Penpot API responses and behavior. Contributions are welcome!\\n\\nThe screenshot above demonstrates how you can describe a design in natural language, and the AI assistant will create it in Penpot using the MCP server\\u0027s capabilities - handling layout, styling, components, and interactions automatically. Create \\u0026 Manage Files: Create new design files, list projects, and manage file metadata \\u00B7 Shape Operations: Create rectangles, circles, frames, paths, text, and SVG shapes \\u00B7 Modify Designs: Update shape properties, move objects, resize, rotate, and style \\u00B7 Page Management: Add, remove, and organize pages within files \\u00B7 Component System: Create and manage reusable components ... query_shapes - Query and filter shapes with criteria (like grep). Filter by type, area, color, font, text content. Select fields to return. Useful for bulk operations \\u00B7 get_shape_properties - Get detailed properties of a specific shape (colors, text, fonts, effects, etc.)\\n\\nPENPOT_API_URL=https://design.penpot.app PENPOT_ACCESS_TOKEN=your-access-token-here ... Important: Due to Cloudflare security restrictions on the public Penpot instance, you may need to use a self-hosted server for API access. Add enable-access-tokens to your Penpot server configuration: # docker-compose.yml or penpot-config.env environment: - PENPOT_FLAGS=...enable-access-tokens \\u00B7 If you have other flags, append enable-access-tokens to the list: # Example with multiple flags environment: - PENPOT_FLAGS=enable-registration enable-login enable-access-tokens \\u00B7 After enabling this flag, restart your Penpot server and you\\u0027ll be able to generate access tokens from Settings \\u2192 Access Tokens. ... Add to your Claude Desktop configuration (~/Library/Application Support/Claude/claude_desktop_config.json on macOS): { \\u0022mcpServers\\u0022: { \\u0022penpot\\u0022: { \\u0022command\\u0022: \\u0022node\\u0022, \\u0022args\\u0022: [\\u0022/path/to/penpot-mcp-server/dist/index.js\\u0022], \\u0022env\\u0022: { \\u0022PENPOT_API_URL\\u0022: \\u0022https://design.penpot.app\\u0022, \\u0022PENPOT_ACCESS_TOKEN\\u0022: \\u0022yo\\n\\n# Run with Docker docker run -d \\\\ --name penpot-mcp-server \\\\ -p 3000:3000 \\\\ -e TRANSPORT=http \\\\ -e PENPOT_API_URL=https://design.penpot.app \\\\ -e PENPOT_ACCESS_TOKEN=your-access-token \\\\ ghcr.io/zcube/penpot-mcp-server:latest # With custom port and self-hosted Penpot docker run -d \\\\ --name penpot-mcp-server \\\\ -p 8080:8080 \\\\ -e TRANSPORT=http \\\\ -e HTTP_PORT=8080 \\\\ -e PENPOT_API_URL=https://penpot.mycompany.com \\\\ -e PENPOT_ACCESS_TOKEN=your-access-token \\\\ ghcr.io/zcube/penpot-mcp-server:latest # View logs docker logs -f penpot-mcp-server # Stop server docker stop penpot-mcp-server docker rm penpot-mcp-server \\u00B7 # Using npm script npm run dev:http # Or with environment variable TRANSPORT=http node dist/index.js # With custom port TRANSPORT=http HTTP_PORT=8080 node dist/index.js \\u00B7 # Required export PENPOT_ACCESS_TOKEN=\\u0022your-access-token\\u0022 # Optional export PENPOT_API_URL=\\u0022https://design.penpot.app\\u0022 # Default export HTTP_PORT=\\u00223000\\u0022 # Default export HTTP_HOST=\\u00220.0.0.0\\u0022 # Default # Security opti\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/zcube/penpot-mcp-server\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Penpot MCP Server by ancrz | Glama\",\"url\":\"https://glama.ai/mcp/servers/@ancrz/penpot-mcp-server\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"glama.ai\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=glama.ai\",\"site_name\":\"Glama\"},\"is_missing\":false,\"text\":\"Enables AI agents to programmatically access self-hosted Penpot instances to read, create, modify, and export design elements through natural language. It provides 66 tools for managing projects, shapes, design tokens, and comments using a ...\\n\\nProvides full programmatic access to self-hosted Penpot instances, allowing for the creation and modification of UI components, management of design systems, and export of frames as SVG or PNG. ... Click on \\u0022Install Server\\u0022. Wait a few minutes for the server to deploy. Once ready, it will show a \\u0022Started\\u0022 state. In the chat, type @ followed by the MCP server name and your instructions, e.g., \\u0022@Penpot MCP Server Export the \\u0027Login Screen\\u0027 frame from my Dashboard project as an SVG\\u0022 That\\u0027s it! The server will respond to your query, and you can continue using it as needed. Here is a step-by-step guide with screenshots. AI-powered design tool access for self-hosted Penpot via Model Context Protocol. An MCP server that gives AI agents (like Claude Code, Cursor, or any MCP-compatible client) full programmatic access to your self-hosted Penpot instance. AI can read, create, modify, and export design elements \\u2014 from rectangles and text to full UI components \\u2014 all through natural language.\\n\\npenpot-mcp-server/ \\u251C\\u2500\\u2500 src/penpot_mcp/ \\u2502 \\u251C\\u2500\\u2500 server.py # FastMCP entry point, 66 tool registrations \\u2502 \\u251C\\u2500\\u2500 config.py # Pydantic Settings configuration \\u2502 \\u251C\\u2500\\u2500 services/ \\u2502 \\u2502 \\u251C\\u2500\\u2500 db.py # asyncpg connection pool \\u2502 \\u2502 \\u251C\\u2500\\u2500 api.py # httpx RPC API client \\u2502 \\u2502 \\u251C\\u2500\\u2500 changes.py # Penpot change operations builder \\u2502 \\u2502 \\u2514\\u2500\\u2500 transit.py # Transit\\u002BJSON decoder \\u2502 \\u251C\\u2500\\u2500 tools/ \\u2502 \\u2502 \\u251C\\u2500\\u2500 projects.py # Team \\u0026 project queries \\u2502 \\u2502 \\u251C\\u2500\\u2500 files.py # File CRUD operations \\u2502 \\u2502 \\u251C\\u2500\\u2500 shapes.py # Shape reading \\u0026 search \\u2502 \\u2502 \\u251C\\u2500\\u2500 create.py # Shape creation \\u2502 \\u2502 \\u251C\\u2500\\u2500 modify.py # Shape modification \\u2502 \\u2502 \\u251C\\u2500\\u2500 text.py # Text operations \\u2502 \\u2502 \\u251C\\u2500\\u2500 export.py # PNG/SVG export \\u2502 \\u2502 \\u251C\\u2500\\u2500 components.py # Components \\u0026 design tokens \\u2502 \\u2502 \\u251C\\u2500\\u2500 comments.py # Comments \\u0026 collaboration \\u2502 \\u2502 \\u251C\\u2500\\u2500 media.py # Media assets \\u0026 fonts \\u2502 \\u2502 \\u251C\\u2500\\u2500 database.py # Raw SQL queries \\u2502 \\u2502 \\u2514\\u2500\\u2500 advanced.py # File raw data \\u0026 revision comparison \\u2502 \\u2514\\u2500\\u2500 transformers/ \\u2502 \\u251C\\u2500\\u2500 css.py # Shape \\u2192 CSS conversion \\u2502 \\u251C\\u2500\\u2500 svg.py # Shape \\u2192 SVG conversion \\u2502 \\u2514\\u2500\\u2500 layout.py # Layout \\u2192 CSS flexbox/grid \\u251C\\u2500\\n\\ngraph TB AI[\\u0022AI Agent\\u003Cbr/\\u003E(Claude Code, Cursor, etc.)\\u0022] MCP[\\u0022penpot-mcp\\u003Cbr/\\u003EPython \\u002B FastMCP\\u003Cbr/\\u003E:8787\\u0022] PG[\\u0022PostgreSQL\\u003Cbr/\\u003Epenpot-postgres\\u003Cbr/\\u003E:5432\\u0022] BE[\\u0022Penpot Backend\\u003Cbr/\\u003Epenpot-backend\\u003Cbr/\\u003E:6060\\u0022] FE[\\u0022Penpot Frontend\\u003Cbr/\\u003Epenpot-frontend\\u003Cbr/\\u003E:8080\\u0022] EX[\\u0022Penpot Exporter\\u003Cbr/\\u003Epenpot-exporter\\u003Cbr/\\u003E:6061\\u0022] AI --\\u003E|\\u0022Streamable HTTP\\u0022| MCP MCP --\\u003E|\\u0022Direct SQL reads\\u003Cbr/\\u003E(asyncpg)\\u0022| PG MCP --\\u003E|\\u0022RPC API writes\\u003Cbr/\\u003E(httpx)\\u0022| BE MCP --\\u003E|\\u0022Export requests\\u0022| BE BE --\\u003E|\\u0022Render\\u0022| EX FE --\\u003E|\\u0022Proxy\\u0022| BE style AI fill:#7c3aed,color:#fff style MCP fill:#2563eb,color:#fff style PG fill:#16a34a,color:#fff style BE fill:#ea580c,color:#fff style FE fill:#ea580c,color:#fff style EX fill:#ea580c,color:#fff ... git clone https://github.com/ancrz/penpot-mcp-server.git cd penpot-mcp-server chmod \\u002Bx setup.sh ./setup.sh \\u00B7 The script will guide you through configuration, build the Docker image, and start the server.\\n\\nAdd the penpot-mcp service definition to your existing Penpot docker-compose.yml. See docker-compose.penpot.yml for the complete service definition to copy. ... curl -s http://localhost:8787/mcp \\\\ -H \\u0022Content-Type: application/json\\u0022 \\\\ -d \\u0027{\\u0022jsonrpc\\u0022:\\u00222.0\\u0022,\\u0022id\\u0022:1,\\u0022method\\u0022:\\u0022initialize\\u0022,\\u0022params\\u0022:{\\u0022protocolVersion\\u0022:\\u00222025-03-26\\u0022,\\u0022capabilities\\u0022:{},\\u0022clientInfo\\u0022:{\\u0022name\\u0022:\\u0022test\\u0022,\\u0022version\\u0022:\\u00221.0\\u0022}}}\\u0027 You should see a JSON response with the server capabilities. Add this to your project\\u0027s .mcp.json file (or ~/.claude.json for global access): { \\u0022mcpServers\\u0022: { \\u0022penpot\\u0022: { \\u0022type\\u0022: \\u0022streamable-http\\u0022, \\u0022url\\u0022: \\u0022http://localhost:8787/mcp\\u0022 } } } Restart Claude Code. You should see 66 tools from the penpot server listed when you run /mcp. ... The server provides 66 tools across 11 categories. See TOOLS.md for the complete reference with all parameters. All settings are via environment variables.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://glama.ai/mcp/servers/@ancrz/penpot-mcp-server\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"2. Penpot Configuration\",\"url\":\"https://help.penpot.app/technical-guide/configuration/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"enable-backend-api-doc: Enables the /api/doc endpoint that lists all rpc methods available on backend \\u00B7 disable-login-with-password: allows disable password based login form \\u00B7 enable-prepl-server: enables PREPL server, used by manage.py and other additional tools to communicate internally with Penpot backend. Check the CLI section to get more detail. ... enable-log-invitation-tokens: for cases where you don\\u0026#x27;t have email configured, this will log to console the invitation tokens. ... enable-access-tokens: enables access tokens. More detail about this configuration in access tokens section. disable-google-fonts-provider: disables the google fonts provider.\\n\\nenable-backend-api-doc: Enables the /api/doc endpoint that lists all rpc methods available on backend \\u00B7 disable-login-with-password: allows disable password based login form \\u00B7 enable-prepl-server: enables PREPL server, used by manage.py and other additional tools to communicate internally with Penpot backend. Check the CLI section to get more detail. ... enable-log-invitation-tokens: for cases where you don\\u0027t have email configured, this will log to console the invitation tokens. ... enable-access-tokens: enables access tokens. More detail about this configuration in access tokens section. disable-google-fonts-provider: disables the google fonts provider.\\n\\nIf you plan to serve Penpot under different domain than \\u0060localhost\\u0060 without HTTPS, you need to disable the \\u0060secure\\u0060 flag on cookies, with the \\u0060disable-secure-session-cookies\\u0060 flag. This is a configuration NOT recommended for production environments; as some browser APIs do not work properly under non-https environments, this unsecure configuration may limit the usage of Penpot; as an example, the clipboard does not work with HTTP. By default, smtp flag is disabled, the email will be printed to the console, which means that the emails will be shown in the stdout. Note that if you plan to invite members to a team, it is recommended that you enable SMTP as they will need to login to their account after recieving the invite link sent an in email. It is currently not possible to just add someone to a team without them accepting an invatation email. If you have an SMTP service, uncomment the appropriate settings section in docker-compose.yml and configure those environment variables.\\n\\nPENPOT_FLAGS: [...] enable-login-with-google # Backend PENPOT_GOOGLE_CLIENT_ID: \\u003Cclient-id\\u003E PENPOT_GOOGLE_CLIENT_SECRET: \\u003Cclient-secret\\u003E Check the configuration guide for Elestio or Docker. Additionally, if you are using the developer environment, you may override its values in the startup scripts, as explained in the Developer Guide. NOTE: All the examples that have value represent the default value, and the examples that do not have value are optional, and inactive or disabled by default. Penpot uses anonymous telemetries from the self-hosted instances to improve the platform experience. Consider sharing these anonymous telemetries enabling the corresponding flag: ... You can choose one of them or combine several methods, depending on your needs. By default, the email/password registration is enabled and the rest are disabled. This method of registration and authentication is enabled by default.\\n\\nPENPOT_FLAGS: [...] enable-login-with-google # Backend only: PENPOT_GOOGLE_CLIENT_ID: \\u003Cclient-id\\u003E PENPOT_GOOGLE_CLIENT_SECRET: \\u003Cclient-secret\\u003E ... PENPOT_FLAGS: [...] enable-login-with-gitlab # Backend only PENPOT_GITLAB_BASE_URI: https://gitlab.com PENPOT_GITLAB_CLIENT_ID: \\u003Cclient-id\\u003E PENPOT_GITLAB_CLIENT_SECRET: \\u003Cclient-secret\\u003E ... PENPOT_FLAGS: [...] enable-login-with-github # Backend only PENPOT_GITHUB_CLIENT_ID: \\u003Cclient-id\\u003E PENPOT_GITHUB_CLIENT_SECRET: \\u003Cclient-secret\\u003E ... Allows integrating with a generic authentication provider that implements the OIDC protocol (usually used for SSO). ... PENPOT_FLAGS: [...] enable-login-with-oidc # Backend PENPOT_OIDC_CLIENT_ID: \\u003Cclient-id\\u003E # Mainly used for auto discovery the openid endpoints PENPOT_OIDC_BASE_URI: \\u003Curi\\u003E PENPOT_OIDC_CLIENT_SECRET: \\u003Cclient-id\\u003E # Optional backend variables, used mainly if you want override; they are # autodiscovered using the standard openid-connect mechanism.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/technical-guide/configuration/\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Provide an API \\u00B7 penpot/penpot \\u00B7 Discussion #462\",\"url\":\"https://github.com/penpot/penpot/discussions/462\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"In this discussion, we can continue the discussion of the RPC API, what I asked above, including, please show examples. This issue is about the functionality of custom metadata Make functionality for adding custom metadata #1610 \\u00B7 Here I suggested thinking about whether it is possible to use NocoDB to quickly create the first version of the REST API and GraphQL API functionality for Penpot The ability to quickly create REST API and GraphQL API using special engines #1611 \\u00B7 Also, I would like to understand in more detail if you have a plan to create a plugin system? If so, do you have an understanding of how you plan to implement the plugin system, do you have an understanding of the architecture of the plugin system that you want to implement? Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page.\\n\\nHello! @niwinz \\u0417\\u0434\\u0440\\u0430\\u0432\\u0435\\u0439\\u0442\\u0435! Can you please tell me if there is any information about the implementation of API RPC in penpot? First of all, I want to get data in the Vue web application on my localhost from the penpot backend in order to display statistics on projects that the user has in penpot. Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. ... After that, I want to understand how to make an import in the SVG format in a third-party application through the API from the backend? Is it possible to read about it somewhere? It\\u0027s all complicated for me, but I want to understand :-) \\u041A\\u0430\\u0442\\u043E \\u0441\\u0438 \\u0441\\u0435 \\u0445\\u0432\\u0430\\u043D\\u0430\\u043B \\u043D\\u0430 \\u0445\\u043E\\u0440\\u043E\\u0442\\u043E, \\u0449\\u0435 \\u0433\\u043E \\u0438\\u0433\\u0440\\u0430\\u0435\\u0448 \\u0434\\u043E \\u043A\\u0440\\u0430\\u044F \\uD83D\\uDE38 \\u00B7 Beta Was this translation helpful?\\n\\nI have also mainly worked with GraphQL and REST. RPC is an unknown technology for me. It turns out a lot of new things at once, but my friends and I want to understand the project, so we will gradually do it, thanks to the fact that you find time for consultation :-) As part of our technological experiment, we would like to receive data from Penpot in some format, preferably in JSON format, in order to then convert them to other formats. User @KlausSchaefers wrote the issue here #1333 \\u00B7 It turns out we need something the same. But if now there is no possibility of issuing data in the JSON format, then it is possible in any format. I realized that the backend does not know about SVG, but knows about \\u0022structured data\\u0022. As I understand it, this is an extended JSON, which is called \\u0022transit format\\u0022. This format suits us. Tell me, please, is there an example somewhere of how you can turn to the backend and get some data from the Penpot project (I\\u0027m talking about local deployment of Penpot) \\n\\nIn this discussion, we can continue the discussion of the RPC API, what I asked above, including, please show examples. This issue is about the functionality of custom metadata Make functionality for adding custom metadata #1610 \\u00B7 Here I suggested thinking about whether it is possible to use NocoDB to quickly create the first version of the REST API and GraphQL API functionality for Penpot The ability to quickly create REST API and GraphQL API using special engines #1611 \\u00B7 Also, I would like to understand in more detail if you have a plan to create a plugin system? If so, do you have an understanding of how you plan to implement the plugin system, do you have an understanding of the architecture of the plugin system that you want to implement? Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page.\\n\\nI\\u0027ll gladly try to adapt some of my plugins for Figma to penpot. While Styler and Pagger may not be easily adaptable, Automater is a collection of scripts which will be useful on penpot as well. (advanced copy, paste, randomizer, selection, and other goodies) Ping me if you have questions regarding Figma API, and I\\u0027ll do may best to answer them. \\u270C\\uFE0F \\u00B7 Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. ... Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. ... Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/penpot/penpot/discussions/462\",\"search_provider\":\"anthropic\"}}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":\"globe\",\"display_content\":null}"

