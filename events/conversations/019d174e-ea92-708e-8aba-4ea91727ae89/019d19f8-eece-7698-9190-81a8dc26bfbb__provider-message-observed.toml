[[body.segments]]
kind = "reasoning"
text = "This is very interesting - there are already Penpot MCP servers! And one of them (ancrz/penpot-mcp-server) is specifically designed for self-hosted Penpot with 66 tools covering exactly what Ivan wants. This is highly relevant given his self-hosted infrastructure.\n\nKey findings:\n1. Yes, CLI/external access works via personal access token + RPC API over HTTP\n2. There's already a Penpot MCP server (zcube) that works with Claude Desktop - connects via personal access token\n3. There's a more powerful one (ancrz) with 66 tools that accesses both the RPC API AND direct PostgreSQL - designed for self-hosted instances specifically\n\n\n4. The ancrz server is particularly compelling for Ivan since it combines direct SQL reads with RPC writes, includes built-in CSS and SVG transformers, and bypasses any Cloudflare restrictions on the public instance. This directly enables using Penpot as the source of truth for his design-to-code workflow."

[[body.segments]]
kind = "plain_text"
text = "Yes, and there's a better path than raw API calls — **there are already Penpot MCP servers** that do exactly what you're describing. Here's the full picture:\n\n**Direct RPC access from CLI: Yes, it works**\nAny HTTP client with a personal access token can hit the RPC API. Cloudflare restrictions on the public `design.penpot.app` instance may block API access — self-hosted bypasses this entirely. Since you're already running self-hosted infrastructure, this is a non-issue for you.\n\n**Two existing Penpot MCP servers worth knowing about:**\n\n**1. `zcube/penpot-mcp-server`** (TypeScript, simpler)\nSupports shape operations (create rectangles, circles, frames, paths, text, SVG shapes), modify designs (update properties, move, resize, rotate, style), page management, and component system — all via personal access token pointed at your Penpot URL. Designed to plug directly into Claude Desktop config.\n\n**2. `ancrz/penpot-mcp-server`** (Python/FastMCP, more powerful — **this one's interesting for you**)\nProvides 66 tools across 11 categories. Notably uses a hybrid architecture: direct SQL reads via asyncpg against PostgreSQL, and RPC API writes via httpx. Has built-in Shape→CSS and Shape→SVG transformers, layout→CSS flexbox/grid conversion, and export tools for PNG/SVG.\n\nThat second one has the exact design-to-code pipeline you're envisioning built into it already — read the shape tree from Postgres directly (fast, no transit encoding issues), write back via RPC, and transform shapes to CSS/SVG.\n\n**The write story — what to know**\nWriting to Penpot externally uses an `update-file` change operations pattern — you send a list of typed changes like `add-obj`, `mod-obj` with full shape data. The shape data requires precise fields: selrect, transform, transform-inverse, points, parent-id, frame-id etc. Missing any required field gives a 500 \"invalid shape found\" error. The MCP servers abstract this complexity away.\n\n**For your specific goals:**\n\n| Goal | Feasibility |\n|---|---|\n| Read components/frames | ✅ Solid |\n| Export as SVG/PNG | ✅ Solid |\n| Read prototyping/interaction data | ✅ In the data model |\n| Write new frames/components | ✅ Works, but fiddly schema |\n| Have Claude design a screen | ✅ This is literally what the MCP demos show |\n| Penpot as source of truth → HTML/F# | ✅ The ancrz MCP has transformers for this |\n\nGiven your self-hosted setup and the existing Penpot MCP server that already targets self-hosted instances with direct DB access, the path forward looks like: wire up the `ancrz` MCP server to your Penpot Docker stack → connect to Claude Code → you have a working bidirectional design pipeline without building from scratch.\n\nWant to dig into whether the `ancrz` server's transformer output would be usable as input to your Bolero pipeline?"

