text = "1. I actually like the terse version, especially when you are presenting data. \n2. Again, I like the terse style\nnote: unless there is a huge bit of data, the expanded version would be better. \nThe terse versions feel F# like actually. \nAlso, note that for GWT, for CommandSlices there can variations. GWT, WT (meaning no events are required in order to produce the event. There might be other situations that arise, but we will deal with those when they come up. Maybe it sticks with GWT and we have an explicit Unit type Event like in F#. That seems to fit well. \nFor ViewSlices Adam used to say they were just GT, he recently added the W for GWT with the special meaning of Given [Event], WHEN \"filter\", THEN [Event] so again, maybe an explicit no filer Unit type."

