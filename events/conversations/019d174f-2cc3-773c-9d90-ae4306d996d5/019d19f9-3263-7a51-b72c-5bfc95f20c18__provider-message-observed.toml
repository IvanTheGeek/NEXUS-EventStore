kind = "plain_text"
text = "Great example. This screen is a **perfect case to apply EMUI + Nexus cells** because it has:\n\n- **signals (UI interactions)**\n- **intents (commands)**\n- **facts (state changes)**\n- **interpretations (screens/views)**\n\nLet’s walk through the slices that would exist behind this screen.\n\n---\n\n# 1. First Slice – Show Location Screen\n\nWhen the app opens, the user sees this screen.\n\nThis is an **InterpretationCell** (ViewSlice).\n\n### Event Modeling Slice\n\n```\nEvent: AppOpened\n   ↓\nView: LocationSelectionScreen\n   ↓\nAgent: User\n```\n\n### Nexus Cell\n\n```\nFact → Interpretation\n```\n\n### GWT\n\n```toml\n[[slice]]\nAgent = \"User\"\nView  = \"LocationSelectionScreen\"\n\n[[slice.GWT]]\nGiven = [\"AppOpened\"]\nThen  = \"LocationSelectionScreen\"\n```\n\n---\n\n# 2. Signal – Tap \"Use GPS Location\"\n\nUser taps the button.\n\nThat is a **Signal**, not yet an Intent.\n\n```\nSignal: TapUseGps\n```\n\nMembrane converts it to an **Intent**.\n\n```\nIntent: RequestGpsLocation\n```\n\n---\n\n# 3. Slice – Request GPS Location\n\nThis is an **IntentCell / CommandSlice**.\n\n### Event Modeling Slice\n\n```\nUser\n ↓\nRequestGpsLocation\n ↓\nGpsLocationRequested\n```\n\n### GWT\n\n```toml\n[[slice]]\nAgent  = \"User\"\nIntent = \"RequestGpsLocation\"\n\n[[slice.GWT]]\nWhen = \"RequestGpsLocation\"\nThen = [\"GpsLocationRequested\"]\n```\n\n---\n\n# 4. Processor / External System\n\nThe device GPS returns coordinates.\n\nThis is an **Agent (External System)**.\n\n```\nAgent: DeviceGPS\n```\n\nIt produces a fact.\n\n```\nFact: GpsLocationDetected\n```\n\nEvent Modeling often shows this as a **processor slice**.\n\n```\nDeviceGPS\n ↓\nDetectLocation\n ↓\nGpsLocationDetected\n```\n\n---\n\n# 5. Interpretation – Populate Location Field\n\nNow the UI reacts.\n\n```\nGpsLocationDetected\n ↓\nLocationDetectedView\n ↓\nUser\n```\n\n### GWT\n\n```toml\n[[slice]]\nAgent = \"User\"\nView  = \"LocationDetectedView\"\n\n[[slice.GWT]]\nGiven = [\"GpsLocationDetected\"]\nThen  = \"LocationDetectedView\"\n```\n\n---\n\n# 6. Manual Entry Path\n\nIf the user types a location instead.\n\nSignal:\n\n```\nSignal: EnterLocationText\n```\n\nIntent:\n\n```\nIntent: SetLocation\n```\n\nSlice:\n\n```\nUser\n ↓\nSetLocation\n ↓\nLocationSet\n```\n\n### GWT\n\n```toml\n[[slice]]\nAgent  = \"User\"\nIntent = \"SetLocation\"\n\n[[slice.GWT]]\nWhen = \"SetLocation\"\nThen = [\"LocationSet\"]\n```\n\n---\n\n# 7. Interpretation – Enable \"Set Location\" Button\n\nTyping in the box changes UI state.\n\n```\nLocationTextEntered\n ↓\nEnableSetLocationButton\n ↓\nUser\n```\n\n---\n\n# 8. Full Event Modeling Flow\n\nPutting it together:\n\n```\nAppOpened\n ↓\nLocationSelectionScreen\n\nUser taps GPS\n ↓\nRequestGpsLocation\n ↓\nGpsLocationRequested\n ↓\nGpsLocationDetected\n ↓\nLocationDetectedView\n\nOR\n\nUser enters location\n ↓\nSetLocation\n ↓\nLocationSet\n```\n\n---\n\n# 9. Nexus Cell Structure\n\nUnderneath, the cells look like this:\n\n```\nInterpretationCell\n  AppOpened → LocationSelectionScreen\n\nCommandCell\n  RequestGpsLocation → GpsLocationRequested\n\nCommandCell\n  SetLocation → LocationSet\n\nInterpretationCell\n  GpsLocationDetected → LocationDetectedView\n```\n\n---\n\n# 10. Signals (UI Layer)\n\nSignals coming from this screen:\n\n```\nTapUseGps\nEnterLocationText\nTapSetLocation\n```\n\nThese are **membrane inputs**.\n\nThey become **Intents**.\n\n---\n\n# 11. What This Means for EMUI\n\nYour UI layer becomes a set of **Signal → Intent adapters**.\n\nExample:\n\n```\nTapUseGps\n  → RequestGpsLocation\n\nTapSetLocation\n  → SetLocation\n```\n\nSo EMUI is basically the **signal layer feeding intents into the domain**.\n\n---\n\n# 12. Interesting Observation\n\nThis screen actually reveals **two separate models**:\n\n### UI Model\n\n```\nsignals\nUI state\nbutton enablement\n```\n\n### Domain Model\n\n```\nlocation selected\nlaundry expenses\n```\n\nYour **Bridge idea** fits here perfectly.\n\n```\nUI EMUI model\n   ↓ bridge\nDomain Event Model\n```\n\n---\n\n✅ If you'd like, I can also show the **full 7-slice Event Model for LaundryLog's location flow** exactly the way Adam would diagram it. It’s actually a very nice tiny example domain."

