text = "Below is a **Markdown Event Model derived from the Medium article example** (food ordering workflow) but formatted using the **canonical rules we just established**:\n\n- **Columns = slices**\n- **Rows = lanes**\n- **Header row included for Markdown processors**\n- **Command/View share one row**\n- **GWT rules included**\n- **Actor/Trigger + Context explicitly separated**\n\nThis follows the process described in the article while staying faithful to the structure of entity[\"software_methodology\",\"Event Modeling\",\"software modeling method\"] introduced by entity[\"people\",\"Adam Dymitruk\"].\n\n---\n\n# Event Model Example (Food Ordering System)\n\n```markdown\n| Lane / Slice | slice.order.submit | slice.stock.check | slice.payment.process | slice.kitchen.cook | slice.order.dispatch | slice.order.deliver |\n|---------------|-------------------|-------------------|----------------------|-------------------|---------------------|--------------------|\n| Actor / Trigger | Customer | Stock Service | Payment Processor | Kitchen Staff | Delivery Service | Delivery Driver |\n| Context | OrderScreen (UI) | StockCheck API | PaymentGateway API | KitchenDashboard | DispatchConsole | DeliveryApp |\n| Command / View | **Command:** SubmitOrder(orderId, items) | **Command:** CheckStock(orderId) | **Command:** ProcessPayment(orderId, paymentInfo) | **Command:** CookOrder(orderId) | **Command:** DispatchOrder(orderId) | **Command:** DeliverOrder(orderId) |\n| Event | **Event:** OrderSubmitted | **Event:** StockChecked | **Event:** PaymentProcessed | **Event:** OrderCooked | **Event:** OrderDispatched | **Event:** OrderDelivered |\n| GWT (rule 1) | GIVEN Customer has selected items<br>WHEN SubmitOrder(orderId, items)<br>THEN OrderSubmitted | GIVEN OrderSubmitted<br>WHEN CheckStock(orderId)<br>THEN StockChecked | GIVEN StockChecked AND stockAvailable = true<br>WHEN ProcessPayment(orderId)<br>THEN PaymentProcessed | GIVEN PaymentProcessed<br>WHEN CookOrder(orderId)<br>THEN OrderCooked | GIVEN OrderCooked<br>WHEN DispatchOrder(orderId)<br>THEN OrderDispatched | GIVEN OrderDispatched<br>WHEN DeliverOrder(orderId)<br>THEN OrderDelivered |\n```\n\n---\n\n# View Slices (Decision / Task Lists)\n\nThe article also models **views used by workers to know what to do next**.  \nThese correspond to **interpretation slices**.\n\n```markdown\n| Lane / Slice | slice.view.orders.awaiting.stock | slice.view.orders.awaiting.cook | slice.view.orders.awaiting.dispatch |\n|---------------|-----------------------------------|----------------------------------|-------------------------------------|\n| Actor / Trigger | Stock Service Operator | Kitchen Staff | Dispatch Operator |\n| Context | StockDashboard | KitchenDashboard | DispatchDashboard |\n| Command / View | **View:** OrdersAwaitingStockCheck | **View:** OrdersAwaitingCook | **View:** OrdersAwaitingDispatch |\n| Event | Reads: OrderSubmitted | Reads: PaymentProcessed | Reads: OrderCooked |\n| GWT (rule 1) | GIVEN OrderSubmitted events<br>WHEN stock not yet checked<br>THEN list orderIds awaiting stock check | GIVEN PaymentProcessed events<br>WHEN order not cooked<br>THEN list orderIds awaiting cooking | GIVEN OrderCooked events<br>WHEN order not dispatched<br>THEN list orderIds awaiting dispatch |\n```\n\n---\n\n# What this representation shows\n\nThis Markdown model now clearly shows the **two slice types**:\n\n### Command slices\n```\nAgent\n↓\nCommand\n↓\nEvent\n```\n\nExample:\n\n```\nCustomer\n↓\nSubmitOrder\n↓\nOrderSubmitted\n```\n\n---\n\n### View slices\n```\nEvent\n↓\nView\n↓\nAgent\n```\n\nExample:\n\n```\nOrderSubmitted\n↓\nOrdersAwaitingStockCheck\n↓\nStock operator\n```\n\n---\n\n# Mapping to Nexus primitives\n\nYour Nexus primitives align cleanly with the model.\n\n| Nexus | Event Modeling |\n|------|------|\nAgent | Actor / Trigger |\nIntent | Command |\nFact | Event |\nInterpretation | View |\n\nWhich produces the cycle:\n\n```\nAgent\n↓\nIntent\n↓\nFact\n↓\nInterpretation\n↓\nAgent\n```\n\n---\n\n# Why this Markdown structure works for LLMs\n\nThis format satisfies the goals you mentioned:\n\n- **Markdown parsers work** (header row included)\n- **Slices can be added incrementally**\n- **Each column is atomic**\n- **GWT rules are explicit**\n- **Actors, UI, APIs, and automation all appear in the same structure**\n\nIt also makes it easy for an AI to add a slice like:\n\n```\nslice.payment.refund\n```\n\nwithout modifying existing slices.\n\n---\n\n✅ If you'd like, the **next thing that would significantly improve your spec for LLM generation** is adding **three strict conventions** that will prevent models from generating broken slices (these are issues that appear frequently when LLMs try to extend event models)."

