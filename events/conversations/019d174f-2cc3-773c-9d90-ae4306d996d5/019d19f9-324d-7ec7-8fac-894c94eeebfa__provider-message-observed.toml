text = "User here is what would be the Actor, so User, Admin, Automation might actually be swim lanes. The UI showing in the simple table is really a representation of the screen that is triggering the Command. \nAdam's Event modeling actually hides the input events to the View and instead uses arrows from the events of the previous slices. We are ignoring that aspect. When fully developed, this can be dug into with a plus, or when the View is clicked and active, the events feeding in the other slices highlight or something. for basic table representations, it can be ignore or explained in associated text. In the automation row, for a particular slice, instead of UI it might be payment processor or be noted as \"Stripe\" as being one's payment processor. All the system cares about is that we send a request to Strip, then get back a response and process the response."

