text = "1. not starting here because this is not business information, that is app information. I am trying to model the \"business\" information flow, the business is to have documentation and totals for laundry expenses incurred on the road (or not actually, but that is secondary). So Screen is snapshot of what User(Agent) sees and Adam will highlight the fields that have data that is being feed to the Command. Not dealing with EMUI yet, that is really a different lens (not sure if the proper term is domain, context, or construct). That would come in on a bridge from the EMUI and issue the RequestGpsLocation command.   \n\nattached is a pic of what I created in Excel. The markdown table version follows and there are some rendering of that attached\n \n|PROCESSORS| | |DeviceGPS| |LocationProcessor|\r\n|:----|:----|:----|:----|:----|:----|\r\n|USER|SelectLocationScreen| | | | |\r\n| | | | | | |\r\n| |RequestGpsLocation|GPS_Requests|GetGpsLocationFromDevice|GPS_Requests|SetLocation|\r\n| | | | | | |\r\n| |GpsLocationRequested| |GpsLocationDetected| |LocationSet|\r\n| | | | | | |\r\n| | | | | | |\r\n|GWT|GIVEN|GIVEN|GIVEN|GIVEN|GIVEN|\r\n| |X|GpsLocationRequested|X|GpsLocationDetected|X|\r\n| |WHEN|WHEN|WHEN|WHEN|WHEN|\r\n| |RequestGpsLocation|X|GetGpsLocationFromDevice|time < 1 minute ago|SetLocation|\r\n| |THEN|THEN|THEN|Gps=Pilot # 123|THEN|\r\n| |GpsLocationRequested|GPS_Requests|GpsLocationDetected|THEN|LocationSet|\r\n| | | | |GPS_Requests| |\r"

