text = "You’re asking exactly the right question: **what should replace “Cell” as a Nexus primitive** so the core primitives stay clean and universal, while the **biology analogy still works as a teaching layer**.\n\nThe key constraint you already sensed:\n\n> Nexus primitives should sound **neutral and universal**, not domain-specific metaphors.\n\nSo “Cell”, “Gene”, “Protein”, “Nucleus” should probably live in the **analogy layer**, not the **core ontology**.\n\nLet’s work through this carefully.\n\n---\n\n# 1. Current Nexus Primitives\n\nRight now we have:\n\n```text\nAgent\nSignal\nIntent\nFact\nInterpretation\nCell   ← problematic\n```\n\nEverything except **Cell** is clearly **semantic** and **domain-agnostic**.\n\nCell is metaphorical.\n\n---\n\n# 2. What the “Cell” Actually Means\n\nA Cell represents:\n\n```text\na transformation rule\n```\n\nMore precisely:\n\n```text\ninput → output\n```\n\nTwo forms exist:\n\n```text\nIntent → Fact\nFact → Interpretation\n```\n\nInternally it contains rules:\n\n```text\nGWT\n```\n\nSo the **actual meaning** of Cell is:\n\n```text\na rule container\n```\n\nor\n\n```text\na transformation unit\n```\n\n---\n\n# 3. Good Candidates for the Nexus Primitive\n\nThese are the best conceptual matches.\n\n### Option A — Processor\n\n```text\nAgent\nSignal\nIntent\nFact\nInterpretation\nProcessor\n```\n\nPros\n\n- very clear in software\n- intuitive transformation\n\nCons\n\n- feels implementation-specific\n- Adam uses “Processor” to mean agent\n\n---\n\n### Option B — Node\n\n```text\nAgent\nSignal\nIntent\nFact\nInterpretation\nNode\n```\n\nPros\n\n- very graph-native\n- domain neutral\n\nCons\n\n- vague\n- doesn’t imply transformation\n\n---\n\n### Option C — Reactor ⭐ (very strong)\n\n```text\nAgent\nSignal\nIntent\nFact\nInterpretation\nReactor\n```\n\nMeaning:\n\n> something that **reacts to inputs and produces outputs**\n\nPros\n\n- extremely close to the model\n- domain neutral\n- fits reactive systems\n- works in many domains\n\nCons\n\n- unfamiliar term initially\n\n---\n\n### Option D — RuleSet\n\n```text\nAgent\nSignal\nIntent\nFact\nInterpretation\nRuleSet\n```\n\nPros\n\n- explicit\n\nCons\n\n- too narrow\n- sounds like configuration\n\n---\n\n### Option E — Transformer\n\n```text\nAgent\nSignal\nIntent\nFact\nInterpretation\nTransformer\n```\n\nPros\n\n- clear mapping concept\n\nCons\n\n- too functional-programming flavored\n\n---\n\n# 4. My Strong Recommendation\n\nUse:\n\n```text\nAgent\nSignal\nIntent\nFact\nInterpretation\nReactor\n```\n\nBecause Nexus is fundamentally a **reactive truth graph**.\n\nA reactor:\n\n```text\nreacts to inputs → produces outputs\n```\n\n---\n\n# 5. Biology Analogy Mapping\n\nNow we preserve the biology metaphor **without polluting the ontology**.\n\n| Biology | Nexus |\n|------|------|\nCell | Reactor |\nGenes | Rules (GWT) |\nNucleus | Processor |\nProtein | Fact |\nSignal molecule | Signal |\nCell response | Interpretation |\n\nSo the analogy becomes:\n\n```text\nSignal hits membrane\n↓\nReactor activates genes\n↓\nFact proteins released\n↓\nOther reactors respond\n```\n\nThis maps beautifully to your system.\n\n---\n\n# 6. Event Modeling Expanded Naming\n\nNow we map **Reactor** into software development terms.\n\n| Nexus | Event Modeling Expanded |\n|------|------|\nReactor | Command Reactor |\nReactor | View Reactor |\nIntent | Command |\nFact | Event |\nInterpretation | View |\n\n---\n\n## Command Reactor\n\nEquivalent to Event Modeling command logic.\n\n```text\nCommand\n↓\nHandler\n↓\nEvent\n```\n\n---\n\n## View Reactor\n\nEquivalent to projection.\n\n```text\nEvent\n↓\nProjector\n↓\nView\n```\n\n---\n\n# 7. Why This Works with Your Slice Definition\n\nYou want to keep **Slice** meaning:\n\n> Event Modeling diagram slice including agent and screen.\n\nSo:\n\n```text\nSlice = diagram artifact\nReactor = truth graph node\n```\n\nPerfect separation.\n\n---\n\n# 8. Full Mapping\n\n## Nexus Core\n\n```text\nAgent\nSignal\nIntent\nFact\nInterpretation\nReactor\n```\n\n---\n\n## Event Modeling Expanded\n\n```text\nCommand\nEvent\nView\nCommand Reactor\nView Reactor\nHandler\nProjector\n```\n\n---\n\n## Adam Event Modeling Lens\n\nOriginating with  \nentity[\"people\",\"Adam Dymitruk\",\"Event Modeling creator\"].\n\n```text\nCommand Slice\nView Slice\nTimeline\nScreen\nGWT tests\n```\n\n---\n\n# 9. Final Biological Teaching Layer\n\nFor documentation and teaching:\n\n| Biology | Nexus | EM Expanded |\n|------|------|------|\nCell | Reactor | Command Reactor / View Reactor |\nGenes | GWT rules | GWT tests |\nProtein | Fact | Event |\nSignal molecule | Signal | UI trigger |\nCell response | Interpretation | View |\n\n---\n\n# 10. Why This Is Clean\n\nNow the ontology layers are separated:\n\n### Nexus Ontology\n\nuniversal\n\n```text\nAgent\nSignal\nIntent\nFact\nInterpretation\nReactor\n```\n\n---\n\n### Software Development Domain\n\n```text\nCommand\nEvent\nView\nCommand Reactor\nView Reactor\n```\n\n---\n\n### Event Modeling Lens\n\n```text\nCommand Slice\nView Slice\nTimeline\nScreens\n```\n\n---\n\n# 11. One More Small Refinement\n\nYou may also want to rename **Interpretation** later to something like:\n\n```text\nRepresentation\nPerception\nView\n```\n\nBut Interpretation is still quite strong conceptually.\n\n---\n\n✅ **My recommendation**\n\nKeep the Nexus primitives as:\n\n```text\nAgent\nSignal\nIntent\nFact\nInterpretation\nReactor\n```\n\nUse biology only as **a learning metaphor**.\n\n---\n\nIf you'd like, the next thing we should do is something extremely important for Atlas:\n\nDefine the **actual graph edges** between these primitives (the canonical Nexus graph schema).  \nThat step will lock down the entire architecture and make the DSL and compilers dramatically simpler."

