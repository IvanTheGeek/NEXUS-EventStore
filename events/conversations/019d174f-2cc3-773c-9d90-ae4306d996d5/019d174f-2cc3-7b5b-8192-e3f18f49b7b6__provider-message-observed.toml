text = "Got it — and I’ve stored that preference.\n\nFrom now on when I need to show structured data or schemas I will **avoid JSON** and instead use:\n\n- **TOML** for data/config representations  \n- **F#** for typed or programmatic structures\n\nSo if something would normally look like this (JSON):\n\n```\n{\n  \"slice\": \"PlaceOrder\",\n  \"type\": \"intent\",\n  \"inputs\": [\"PlaceOrderCommand\"]\n}\n```\n\nI’ll present it like this instead.\n\n**TOML example**\n\n```toml\n[slice]\nname = \"PlaceOrder\"\ntype = \"intent\"\n\ninputs = [\"PlaceOrderCommand\"]\noutputs = [\"OrderPlaced\"]\n```\n\nor **F#**\n\n```fsharp\ntype Slice =\n    { Name : string\n      Type : SliceType\n      Inputs : string list\n      Outputs : string list }\n\nlet placeOrder =\n    { Name = \"PlaceOrder\"\n      Type = Intent\n      Inputs = [\"PlaceOrderCommand\"]\n      Outputs = [\"OrderPlaced\"] }\n```\n\nI’ll default to **TOML for DSL/specs** and **F# for structural models**, which also fits well with the work you’re doing around Nexus, Event Modeling, and potential DSLs for slices.\n\nIf you want, the next useful step would be defining a **TOML-based Slice DSL** that mirrors Adam’s Event Modeling slices but includes the Nexus anatomy (DNA/GWT, handler/projection, agent references). That could become a very natural input format for Forge."

