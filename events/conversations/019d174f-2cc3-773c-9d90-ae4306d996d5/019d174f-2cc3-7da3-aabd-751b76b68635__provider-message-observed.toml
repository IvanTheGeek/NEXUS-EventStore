text = "2.1 The Command row and View row are actually 1 row. In CommandSlices it shows a command (blue box) and for ViewSlices a View (green box). \n2.2 DNA(GWT) still seems off here. The rules, as DNA was being used by Nucleus. I was associating the Nucleus as the Handler or the Projection (is Projector as better term here?) with it being controlled by the DNA (GWT).\n3. again wondering if cell is the right term to represent a slice. \n4. Rows: Agents \\ Commands/Views \\ Events would be the better way to show this. \n9. so if we used Scott's domain modeling ideas, the Slice would be a type that is a DU which offers a type of Action OR Perception\nNo JSON! prefer TOML or F# instead of JSON. \nLets test if we can represent the EM diagram in a markdown table"

