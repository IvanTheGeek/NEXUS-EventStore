text = "search(\"This article states that Events are modeled first. I challenge that and also reference Adam's original article at https://eventmodeling.org/posts/what-is-event-modeling/ which you should ingest too. But the order of making the Event Model is really not critical or linear in steps. The idea is to get a full model. With humans involved, that is going to involve a lot of chaos. One method I have been using is the screens first, which can then be built out to be the needed views and events and commands.   \")"

