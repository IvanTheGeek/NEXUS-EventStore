kind = "plain_text"
text = "**Perfect. Here's your setup plan:**\n\n**Phase 1: Install VMware**\n1. Download VMware Workstation Pro 17.x (Broadcom - free account required)\n2. Install on Windows 11 Home host\n\n**Phase 2: Create base images**\n1. **Base Windows 11 VM:**\n   - Minimal install + updates\n   - VMware Tools\n   - Docker Desktop (if you want it in VMs)\n   - Snapshot: \"Clean Windows Base\"\n\n2. **Base Linux Mint VM:**\n   - Minimal install + updates\n   - `open-vm-tools` + `open-vm-tools-desktop`\n   - Common tools (git, build-essential, etc.)\n   - Snapshot: \"Clean Mint Base\"\n\n**Phase 3: Work pattern**\n- Full clone base → \"Test-CrazyIdea-1\"\n- Break things spectacularly\n- Nuke VM or revert to snapshot\n- Clone fresh when needed\n\n**Resource allocation for typical test VM:**\n- 6-8 cores\n- 16-24GB RAM\n- 50-100GB disk\n- Adjust per workload\n\n**Ready to start with VMware download, or need anything clarified first?**"

