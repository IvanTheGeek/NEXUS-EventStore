text = "Looking at your specs (i9-12900H with 14 cores/20 threads, 64GB RAM, RTX 3060), you have solid resources for virtualization.\n\nKey questions to clarify your needs:\n\n1. **OS strategy**: Keep Windows 11 Home, upgrade to Pro, or wipe and install Linux Mint?\n\n2. **Primary use case**: Is this laptop for on-the-road development (opportunistic), or a primary dev machine?\n\n3. **GPU needs**: Do you need GPU passthrough to VMs for any workloads?\n\n4. **Windows 11 Pro upgrade**: Willing to upgrade for Hyper-V, or prefer free alternatives?\n\nBased on your memory context preferring KVM over VirtualBox and avoiding vendor lock-in, my initial lean would be:\n- **If keeping Windows**: VMware Workstation (now free for personal use) or upgrade to Pro for Hyper-V\n- **If switching to Linux Mint**: KVM/QEMU (aligns with your existing infrastructure preferences)\n\nWhat's your OS direction for this laptop?"

