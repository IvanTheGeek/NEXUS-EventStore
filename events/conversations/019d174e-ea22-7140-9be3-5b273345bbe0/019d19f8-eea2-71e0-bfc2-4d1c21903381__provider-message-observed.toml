[[body.segments]]
kind = "reasoning"
text = "The user is asking about linked clones and whether updates to the base VM will propagate to linked clones. This is an important clarification about how VMware linked clones work.\n\nThe answer is **NO** - linked clones don't work that way. Here's how it actually works:\n\n1. When you create a linked clone from a snapshot, it creates a new delta disk that references the base snapshot's disk state\n2. The linked clone reads unchanged blocks from the parent snapshot, but writes all changes to its own delta disk\n3. If you update the base VM *after* creating the linked clone, those updates go to the base VM's active disk, NOT to the snapshot the linked clone references\n4. The linked clone continues to reference the original snapshot state - it doesn't see new changes to the base VM\n\nTo update linked clones, you'd need to:\n1. Update the base VM\n2. Create a NEW snapshot\n3. Create NEW linked clones from the new snapshot\n4. Delete old linked clones\n\nThis is definitely NOT what he wants for \"update base and have it flow through.\"\n\nFor his use case of \"test craziness and break things,\" full clones are actually better because:\n- Complete isolation\n- Can delete base without breaking clones\n- Each test VM is independent\n- More disk space, but with his setup that's not an issue\n\nI should explain this clearly and steer him toward full clones for his use case."

[[body.segments]]
kind = "plain_text"
text = "**No - linked clones don't work that way.**\n\n**How linked clones actually work:**\n1. You snapshot base VM at state X\n2. Create linked clone from snapshot X\n3. Linked clone references snapshot X's disk (read-only)\n4. All changes in linked clone go to its own delta disk\n5. **If you update base VM, linked clone still references old snapshot X** - doesn't see new changes\n\n**To \"update\" linked clones:**\n1. Update base VM\n2. Create NEW snapshot Y\n3. Create NEW linked clones from snapshot Y\n4. Delete old linked clones referencing snapshot X\n\nThis is messy and not what you want.\n\n**For your \"test craziness\" use case, Full Clones are better:**\n- Complete isolation - break one, others unaffected\n- Can delete base VM entirely, clones survive\n- Can update each clone independently\n- Only downside: uses more disk space (but you have plenty)\n\n**Disk space reality check:** With your NVMe, would 3-4 full Windows/Linux VMs (30-50GB each) be a problem? Or do you have headroom?"

