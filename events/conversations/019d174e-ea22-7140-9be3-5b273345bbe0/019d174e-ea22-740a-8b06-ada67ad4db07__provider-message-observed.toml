kind = "plain_text"
text = "**No - linked clones are frozen at the snapshot point.**\n\n**How it actually works:**\n1. Create base VM\n2. Snapshot: \"Clean Base v1\"\n3. Create linked clones → they reference \"Clean Base v1\" snapshot\n4. **Update base VM** (new software, patches, etc.)\n5. **Existing linked clones DON'T see updates** - still frozen at v1\n6. Take new snapshot: \"Clean Base v2\"\n7. Create NEW linked clones from v2, but old clones still on v1\n\n**To update linked clones, you must:**\n- Delete old linked clones\n- Create new ones from updated snapshot\n- Lose any changes in the old clones\n\n**For your \"test craziness\" workflow:**\n\n**Full Clones** are better because:\n- True independence - break one, others unaffected\n- Can update base without orphaning clones\n- Simpler mental model\n- Disk space isn't your constraint (you have modern storage)\n\n**Linked Clones** only make sense if:\n- Extreme disk space constraints\n- Short-lived test VMs you delete frequently\n- Don't plan to update base\n\n**Stick with Full Clones for your use case?**"

