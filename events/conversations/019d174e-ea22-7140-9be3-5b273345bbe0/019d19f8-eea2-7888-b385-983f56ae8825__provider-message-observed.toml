[[body.segments]]
kind = "reasoning"
text = "This is a really good question about linked clones in VMware. Let me think about how this works:\n\nIn VMware:\n- **Linked Clone**: Creates a new VM that references the parent VM's disk as a base, with only delta changes stored\n- **Snapshot-based**: Linked clones are created from a snapshot of the parent VM\n- **Key limitation**: The linked clone is tied to the snapshot at creation time, NOT the current state of the parent\n\nSo the answer is **NO** - if you update the base VM after creating linked clones, those updates do NOT flow through to the existing linked clones. The linked clones are frozen at the snapshot point.\n\n**How it actually works:**\n1. Create base VM\n2. Take snapshot \"Clean Base v1\"\n3. Create linked clones from \"Clean Base v1\" snapshot\n4. Update base VM (install new software, updates, etc.)\n5. Existing linked clones still reference \"Clean Base v1\" snapshot - they don't see the updates\n6. Take new snapshot \"Clean Base v2\"\n7. NEW linked clones can be created from \"Clean Base v2\", but old ones still on v1\n\nThis is different from some container/image systems where you can update a base and have it propagate.\n\n**Workarounds if you want to update:**\n- Create new linked clones from a new snapshot after updates\n- Delete old linked clones and recreate\n- Or just use full clones and accept the disk space cost\n\nFor Ivan's use case of \"test craziness and not mess up host\", linked clones could work if:\n- He doesn't care about updating the base after clones exist\n- He's willing to recreate clones when he wants updates\n- Disk space is a concern\n\nBut given he has a 64GB RAM machine and modern storage, full clones are probably better for true isolation."

[[body.segments]]
kind = "plain_text"
text = "**No - linked clones are frozen at the snapshot point.**\n\n**How it actually works:**\n1. Create base VM\n2. Snapshot: \"Clean Base v1\"\n3. Create linked clones → they reference \"Clean Base v1\" snapshot\n4. **Update base VM** (new software, patches, etc.)\n5. **Existing linked clones DON'T see updates** - still frozen at v1\n6. Take new snapshot: \"Clean Base v2\"\n7. Create NEW linked clones from v2, but old clones still on v1\n\n**To update linked clones, you must:**\n- Delete old linked clones\n- Create new ones from updated snapshot\n- Lose any changes in the old clones\n\n**For your \"test craziness\" workflow:**\n\n**Full Clones** are better because:\n- True independence - break one, others unaffected\n- Can update base without orphaning clones\n- Simpler mental model\n- Disk space isn't your constraint (you have modern storage)\n\n**Linked Clones** only make sense if:\n- Extreme disk space constraints\n- Short-lived test VMs you delete frequently\n- Don't plan to update base\n\n**Stick with Full Clones for your use case?**"

