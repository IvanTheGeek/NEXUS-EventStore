text = "(embedding-env) ivan@mcp1:~$ # Activate the environment\nsource ~/embedding-env/bin/activate\n# Install Flask\npip install flask gunicorn\n# Create the embedding API service\ncat > ~/embedding_api.py << 'EOF'\nfrom flask import Flask, request, jsonify\nfrom sentence_transformers import SentenceTransformer\nimport logging\napp = Flask(__name__)\nlogging.basicConfig(level=logging.INFO)\n# Load model once at startup\nprint(\"Loading embedding model...\")\nmodel = SentenceTransformer('all-MiniLM-L6-v2')\nprint(\"Model loaded!\")\n@app.route('/embed', methods=['POST'])\ndef embed():\n    data = request.get_json()\n    if not data or 'text' not in data:\n        return jsonify({'error': 'Missing text field'}), 400\n    \n    text = data['text']\n    embedding = model.encode(text).tolist()\n    \n    return jsonify({\n        'embedding': embedding,\n        'dimension': len(embedding)\n    })\n@app.route('/health', methods=['GET'])\ndef health():\n    return jsonify({'status': 'ok', 'model': 'all-MiniLM-L6-v2'})\nif __name__ == '__main__':\n    app.run(host='127.0.0.1', port=5000)\nEOF\n# Create systemd service to run it automatically\nsudo tee /etc/systemd/system/embedding-api.service > /dev/null << EOF\n[Unit]\nDescription=Embedding API Service\nAfter=network.target\n  -d '{\"text\": \"test embedding\"}'son\" \\d \\icorn -w 2 -b 127.0.0.1:5000 embedding_api:app\nCollecting flask\n  Downloading flask-3.1.2-py3-none-any.whl.metadata (3.2 kB)\nCollecting gunicorn\n  Downloading gunicorn-23.0.0-py3-none-any.whl.metadata (4.4 kB)\nCollecting blinker>=1.9.0 (from flask)\n  Downloading blinker-1.9.0-py3-none-any.whl.metadata (1.6 kB)\nCollecting click>=8.1.3 (from flask)\n  Downloading click-8.3.1-py3-none-any.whl.metadata (2.6 kB)\nCollecting itsdangerous>=2.2.0 (from flask)\n  Downloading itsdangerous-2.2.0-py3-none-any.whl.metadata (1.9 kB)\nRequirement already satisfied: jinja2>=3.1.2 in ./embedding-env/lib/python3.13/site-packages (from flask) (3.1.6)\nRequirement