kind = "plain_text"
text = "```bash\n# On VPS, in /opt/nexus-mcp\ncd /opt/nexus-mcp\n\n# Delete everything except .env and nexus-mcp\nfind . -maxdepth 1 ! -name '.' ! -name '.env' ! -name 'nexus-mcp' -exec rm -rf {} +\n\n# Verify only those two remain\nls -la\n```\n\nThis keeps `.env` and `nexus-mcp`, deletes everything else at the top level.\n\n**Token Usage:** 144,198 used / 45,802 remaining"

