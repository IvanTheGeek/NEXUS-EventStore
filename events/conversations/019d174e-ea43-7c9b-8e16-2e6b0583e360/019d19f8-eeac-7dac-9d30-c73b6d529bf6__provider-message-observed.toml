[[body.segments]]
kind = "reasoning"
text = "Good question. SSH tunnels are typically created from a local machine to a remote server. For Claude Android to use the MCP, it would need:\n\n1. Either the Android app to maintain its own SSH tunnel (unlikely - mobile apps don't typically do this)\n2. Or the MCP to be exposed via HTTP/HTTPS on the public internet\n\nSSH tunnels work great for:\n- Claude Desktop on the dev machine\n- Any machine where Ivan can establish an SSH connection\n\nBut for Claude Android, we'd need a different approach. Options:\n1. Expose MCP via HTTPS with authentication (nginx reverse proxy with SSL)\n2. Use a VPN so Android can access the VPS's internal services\n3. Use a service like ngrok/cloudflare tunnel to expose the MCP\n\nThe cleanest production solution would be nginx with HTTPS + API key authentication. Let me explain this to Ivan."

[[body.segments]]
kind = "plain_text"
text = "No, SSH tunnels won't work for Claude Android. SSH tunnels require an SSH client actively maintaining the connection, which mobile apps don't do.\n\n**For Android access, you need the MCP exposed via HTTPS on the public internet.**\n\n**Best approach: Nginx reverse proxy with SSL**\n\n```\nClaude Desktop → SSH tunnel → VPS → Nexus MCP (localhost)\nClaude Android → HTTPS → Nginx → Nexus MCP (localhost)\n```\n\n**Setup required:**\n1. Install nginx on VPS\n2. Get SSL certificate (Let's Encrypt)\n3. Configure nginx to proxy to MCP with authentication\n4. Expose on public HTTPS endpoint\n\n**Alternative (simpler but less secure):**\nExpose MCP directly on a port with firewall rules + IP whitelist\n\nDo you want to set up the nginx/HTTPS route now, or first test with Claude Desktop via SSH tunnel and add Android support later?\n\n**Token Usage:** 145,347 used / 44,653 remaining"

