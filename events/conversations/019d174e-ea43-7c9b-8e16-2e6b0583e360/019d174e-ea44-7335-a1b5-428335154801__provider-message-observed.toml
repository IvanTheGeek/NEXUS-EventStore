text = "Move the data now:\n\n```bash\n# On VPS\nmv /root/Nexus-Data /opt/nexus-mcp/\n\n# Verify structure\nls -la /opt/nexus-mcp/Nexus-Data/\n\n# Test the server\ncd /opt/nexus-mcp\n./nexus-mcp\n```\n\nShow me the output. If it starts without warnings about missing directories, we're good.\n\nThen we can:\n1. Create the systemd service to run it automatically\n2. Configure Claude Desktop to connect to it remotely\n\n**Token Usage:** 143,984 used / 46,016 remaining"

