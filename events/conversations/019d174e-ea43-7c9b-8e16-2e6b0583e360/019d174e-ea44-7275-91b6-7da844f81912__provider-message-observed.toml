text = "Good progress! It's running but looking in the wrong place for data. Create a symlink:\n\n```bash\n# On VPS - link Nexus-Data to where the server expects it\nln -s /root/Nexus-Data/context-library /opt/nexus-mcp/context-library\nln -s /root/Nexus-Data/events /opt/nexus-mcp/events\n\n# Or better - move Nexus-Data into the mcp directory\nmv /root/Nexus-Data/* /opt/nexus-mcp/\nmv /root/Nexus-Data/.git /opt/nexus-mcp/\n\n# Test again\n./nexus-mcp\n```\n\nPress Ctrl+C to stop, then show me the new output.\n\n**Token Usage:** 142,712 used / 47,288 remaining"

