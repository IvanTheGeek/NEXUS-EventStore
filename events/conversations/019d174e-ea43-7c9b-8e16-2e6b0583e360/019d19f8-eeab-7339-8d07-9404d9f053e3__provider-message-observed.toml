kind = "plain_text"
text = "`/opt` is the standard Linux location for \"optional\" third-party software. Think of it like `C:\\Program Files` on Windows.\n\n**Good structure would be:**\n\n```\n/opt/nexus-mcp/\n├── nexus-mcp (binary)\n├── .env\n└── Nexus-Data/\n    ├── .git/\n    ├── events/\n    ├── context-library/\n    └── ... other files\n```\n\nBut the binary looks for `context-library` and `events` relative to its working directory (`/opt/nexus-mcp/`).\n\n**Two options:**\n\n**Option 1: Tell the binary where data lives (if it supports env vars)**\nCheck if the code reads a data path from env. If so, add to `.env`:\n```bash\nNEXUS_DATA_PATH=/opt/nexus-mcp/Nexus-Data\n```\n\n**Option 2: Symlinks (simpler)**\n```bash\ncd /opt/nexus-mcp\nln -s Nexus-Data/context-library context-library\nln -s Nexus-Data/events events\n```\n\nWhich approach does the Nexus code support? Check if there's a configurable data path.\n\n**Token Usage:** 143,299 used / 46,701 remaining"

