[[body.segments]]
kind = "reasoning"
text = "The user is logged in as root, not as user \"ivan\". The systemd service is configured to run as user \"ivan\" but that user doesn't exist. We need to either:\n1. Create the ivan user and set up everything under that user\n2. Modify the service to run as root\n\nLet me check the systemd service status first to see what's happening."

[[body.segments]]
kind = "plain_text"
text = "Qdrant works but embedding API failed. Check the service:\n\n```bash\nsystemctl status embedding-api\n```\n\n**Issue:** The service is configured for user \"ivan\" but you're logged in as root. \n\n**Fix - Run as root:**\n\n```bash\n# Stop and disable the broken service\nsystemctl stop embedding-api\nsystemctl disable embedding-api\n\n# Recreate with root user\ncat > /etc/systemd/system/embedding-api.service << 'EOF'\n[Unit]\nDescription=Embedding API Service\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/root\nEnvironment=\"PATH=/root/embedding-env/bin\"\nExecStart=/root/embedding-env/bin/gunicorn -w 1 -b 127.0.0.1:5000 --timeout 120 embedding_api:app\nRestart=always\n\n[Install]\nWantedBy=multi-user.target\nEOF\n\n# Reload and start\nsystemctl daemon-reload\nsystemctl start embedding-api\nsystemctl enable embedding-api\nsystemctl status embedding-api\n\n# Test\ncurl -X POST http://localhost:5000/embed \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"text\": \"test embedding\"}'\n```\n\n**Token Usage:** 133,783 used / 56,217 remaining"

