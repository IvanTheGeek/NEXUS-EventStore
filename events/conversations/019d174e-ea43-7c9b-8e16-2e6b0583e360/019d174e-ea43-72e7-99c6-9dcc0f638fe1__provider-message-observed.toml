se a placeholder?\\\\n   - **Decision**: Use placeholder for now, implement embedding API in follow-up\\\\n   \\\\n2. Where should Qdrant config live?\\\\n   - **Decision**: Environment variables for now, can refactor to config file later\\\\n\\\\n3. Should search results include full conversation text or just previews?\\\\n   - **Decision**: Include preview (first 2000 chars) in payload, full text stays in Qdrant\\\\n\\\\n## Success Criteria\\\\n\\\\n\\\\u2705 QdrantClient.fs compiles and can connect to Qdrant on VPS\\\\n\\\\u2705 SemanticSearch tool is registered and callable via MCP\\\\n\\\\u2705 Tool returns formatted search results from Qdrant\\\\n\\\\u2705 SemanticSearchPerformed events are logged to event store\\\\n\\\\u2705 No compilation errors or warnings\\\\n\\\\u2705 Code follows existing project patterns and style\\\\n\\\\n## Reference Files to Study\\\\n\\\\nBefore implementing, examine these existing files to understand patterns:\\\\n- \\u0060src/FnMCP.Nexus/Tools/EventTools.fs\\u0060 - Tool implementation pattern\\\\n- \\u0060src/FnMCP.Nexus/Domain/Events.fs\\u0060 - Event type definitions\\\\n- \\u0060src/FnMCP.Nexus/Domain/EventWriter.fs\\u0060 - Event logging pattern\\\\n- \\u0060src/FnMCP.Nexus/McpServer.fs\\u0060 - Tool registration\\\\n\\\\n## Additional Context\\\\n\\\\nThis is phase 1 of a three-tier learning system:\\\\n- **Tier 1 (RAG)**: What we\\u0027re building now - retrieve relevant context\\\\n- **Tier 2 (LoRA)**: Future - track retrieval patterns, train adapters for local model\\\\n- **Tier 3 (Fine-tuning)**: Future - internalize fundamental knowledge\\\\n\\\\nThe event logging (SemanticSearchPerformed) is crucial because it captures usage patterns that will drive tier 2 promotion decisions later.\\\\n\\u0022, \\u0022filename\\u0022: \\u0022/mnt/user-data/outputs/claude-code-qdrant-integration-prompt.md\\u0022}\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

