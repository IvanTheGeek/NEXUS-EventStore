text = "Not a chroot or misconfiguration. `/tmp` as tmpfs (RAM filesystem) is intentional and common for security/performance. It's sized at 484MB which is normal.\n\nThe issue: pip downloads to `/tmp` by default. PyTorch is 900MB. Won't fit.\n\nYour main disk `/dev/vda1` has 22G free. Solution is to redirect pip to use actual disk:\n\n```bash\nexport TMPDIR=/home/ivan/tmp\nmkdir -p $TMPDIR\npip install sentence-transformers\n```\n\nOr skip PyTorch entirely and use a different embedding approach (API-based or run on your dev machine).\n\n**Token Usage:** 113,068 used / 76,932 remaining"

