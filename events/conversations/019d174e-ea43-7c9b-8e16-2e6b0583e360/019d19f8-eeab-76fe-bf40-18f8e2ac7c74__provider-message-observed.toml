[[body.segments]]
kind = "plain_text"
text = "**Step 4: Test Nexus MCP on VPS**\n\n```bash\n# SSH to VPS\nssh root@66.179.208.238\n\n# Make the binary executable\nchmod +x /opt/nexus-mcp/FnMCP.Nexus\n\n# Test it runs\ncd /opt/nexus-mcp\n./FnMCP.Nexus\n```\n\nYou should see MCP server output. Press Ctrl+C to stop it.\n\n**Step 5: Create systemd service**\n\n```bash\n# Still on VPS\ncat > /etc/systemd/system/nexus-mcp.service << 'EOF'\n[Unit]\nDescription=Nexus MCP Server\nAfter=network.target qdrant.service embedding-api.service\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/nexus-mcp\nEnvironmentFile=/opt/nexus-mcp/.env\nExecStart=/opt/nexus-mcp/FnMCP.Nexus\nRestart=always\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=multi-user.target\nEOF\n\n# Start and enable\nsystemctl daemon-reload\nsystemctl start nexus-mcp\nsystemctl enable nexus-mcp\nsystemctl status nexus-mcp\n```\n\nShow me the output from the test run.\n\n**Token Usage:** 141,865 used / 48,135 remaining"

