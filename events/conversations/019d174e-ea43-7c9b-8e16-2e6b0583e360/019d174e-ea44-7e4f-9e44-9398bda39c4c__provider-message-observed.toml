text = "**Fresh VPS Setup - Complete Instructions**\n\n**Step 1: Initial Setup (SSH to 66.179.208.238)**\n\n```bash\n# Update system\nsudo apt update && sudo apt upgrade -y\n\n# Install prerequisites\nsudo apt install -y ca-certificates curl gnupg python3 python3-pip python3-venv ufw\n```\n\n**Step 2: Install Docker**\n\n```bash\n# Add Docker's official GPG key\nsudo install -m 0755 -d /etc/apt/keyrings\ncurl -fsSL https://download.docker.com/linux/debian/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg\nsudo chmod a+r /etc/apt/keyrings/docker.gpg\n\n# Add Docker repository\necho \\\n  \"deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian \\\n  $(. /etc/os-release && echo \"$VERSION_CODENAME\") stable\" | \\\n  sudo tee /etc/apt/sources.list.d/docker.list > /dev/null\n\n# Install Docker\nsudo apt update\nsudo apt install -y docker-ce docker-ce-cli containerd.io\n```\n\n**Step 3: Set Up Qdrant**\n\n```bash\n# Create storage directory\nsudo mkdir -p /var/qdrant/storage\n\n# Generate API key\nexport QDRANT_API_KEY=$(openssl rand -base64 32)\necho \"=== SAVE THIS API KEY ===\"\necho $QDRANT_API_KEY\necho \"=========================\"\n\n# Run Qdrant\nsudo docker run -d \\\n  --name qdrant \\\n  --restart unless-stopped \\\n  -p 6333:6333 \\\n  -v /var/qdrant/storage:/qdrant/storage:z \\\n  -e QDRANT__SERVICE__API_KEY=\"$QDRANT_API_KEY\" \\\n  qdrant/qdrant:latest\n\n# Verify it's running\nsudo docker ps\ncurl http://localhost:6333/\n```\n\n**Step 4: Configure Firewall**\n\n```bash\n# Allow SSH first (important!)\nsudo ufw allow ssh\n\n# Allow Qdrant\nsudo ufw allow 6333/tcp\n\n# Enable firewall\nsudo ufw enable\nsudo ufw status\n```\n\n**Step 5: Set Up Python Environment**\n\n```bash\n# Create virtual environment\npython3 -m venv ~/embedding-env\nsource ~/embedding-env/bin/activate\n\n# Install dependencies\nexport TMPDIR=/home/ivan/tmp\nmkdir -p $TMPDIR\npip install --cache-dir /home/ivan/.cache/pip sentence-transformers flask gunicorn\n```\n\n**Step 6: Create Embedding API**\n\n```bash\ncat > ~/embedding_api.py << 'EOF'\nfrom flask import Flask, request, jsonify\nfrom sentence_transformers import SentenceTransformer\nimport logging\n\napp = Flask(__name__)\nlogging.basicConfig(level=logging.INFO)\n\nprint(\"Loading embedding model...\")\nmodel = SentenceTransformer('all-MiniLM-L6-v2')\nprint(\"Model loaded!\")\n\n@app.route('/embed', methods=['POST'])\ndef embed():\n    data = request.get_json()\n    if not data or 'text' not in data:\n        return jsonify({'error': 'Missing text field'}), 400\n    \n    text = data['text']\n    embedding = model.encode(text).tolist()\n    \n    return jsonify({\n        'embedding': embedding,\n        'dimension': len(embedding)\n    })\n\n@app.route('/health', methods=['GET'])\ndef health():\n    return jsonify({'status': 'ok', 'model': 'all-MiniLM-L6-v2'})\n\nif __name__ == '__main__':\n    app.run(host='127.0.0.1', port=5000)\nEOF\n```\n\n**Step 7: Create Systemd Service**\n\n```bash\nsudo tee /etc/systemd/system/embedding-api.service > /dev/null << EOF\n[Unit]\nDescription=Embedding API Service\nAfter=network.target\n\n[Service]\nType=simple\nUser=ivan\nWorkingDirectory=/home/ivan\nEnvironment=\"PATH=/home/ivan/embedding-env/bin\"\nExecStart=/home/ivan/embedding-env/bin/gunicorn -w 1 -b 127.0.0.1:5000 --timeout 120 embedding_api:app\nRestart=always\n\n[Install]\nWantedBy=multi-user.target\nEOF\n\n# Start service\nsudo systemctl daemon-reload\nsudo systemctl start embedding-api\nsudo systemctl enable embedding-api\nsudo systemctl status embedding-api\n```\n\n**Step 8: Test Everything**\n\n```bash\n# Test Qdrant\ncurl http://localhost:6333/\n\n# Test embedding API\ncurl -X POST http://localhost:5000/embed \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"text\": \"test embedding\"}'\n```\n\n**Step 9: Transfer and Process Conversations**\n\nOn your **local dev machine**:\n\n```bash\nscp /home/linux/Nexus-Data/data-2025-11-16-03-15-29-batch-0000/conversations.json ivan@66.179.208.238:~/\n```\n\nBack on **VPS**:\n\n```bash\nsource ~/embedding-env/bin/activate\n\ncat > ~/process_conversations.py << 'PYTHON_EOF'\nimport json\nimport requests\nfrom sentence_transformers import SentenceTransformer\n\nQDRANT_URL = \"http://localhost:6333\"\nQDRANT_API_KEY = \"PASTE_YOUR_API_KEY_HERE\"\nCOLLECTION_NAME = \"conversations\"\n\nprint(\"Loading embedding model...\")\nmodel = SentenceTransformer('all-MiniLM-L6-v2')\n\nprint(\"Loading conversations...\")\nwith open('/home/ivan/conversations.json', 'r') as f:\n    conversations = json.load(f)\n\nprint(f\"Loaded {len(conversations)} conversations\")\n\nprint(\"Creating Qdrant collection...\")\ncollection_config = {\n    \"vectors\": {\n        \"size\": 384,\n        \"distance\": \"Cosine\"\n    }\n}\n\nresponse = requests.put(\n    f\"{QDRANT_URL}/collections/{COLLECTION_NAME}\",\n    headers={\"api-key\": QDRANT_API_KEY},\n    json=collection_config\n)\nprint(f\"Collection creation: {response.status_code}\")\n\npoints = []\nfor idx, conv in enumerate(conversations):\n    text_parts = [\n        f\"Title: {conv['name']}\",\n        f\"Summary: {conv.get('summary', '')}\"\n    ]\n    \n    if 'chat_messages' in conv:\n        for msg in conv['chat_messages'][:10]:\n            sender = msg.get('sender', 'unknown')\n            text = msg.get('text', '')\n            text_parts.append(f\"{sender}: {text[:500]}\")\n    \n    full_text = \"\\n\\n\".join(text_parts)\n    \n    if idx % 10 == 0:\n        print(f\"Processing conversation {idx+1}/{len(conversations)}\")\n    \n    embedding = model.encode(full_text).tolist()\n    \n    point = {\n        \"id\": idx,\n        \"vector\": embedding,\n        \"payload\": {\n            \"uuid\": conv['uuid'],\n            \"name\": conv['name'],\n            \"summary\": conv.get('summary', ''),\n            \"created_at\": conv.get('created_at', ''),\n            \"updated_at\": conv.get('updated_at', ''),\n            \"text\": full_text[:2000]\n        }\n    }\n    points.append(point)\n\nprint(\"Uploading to Qdrant...\")\nbatch_size = 10\nfor i in range(0, len(points), batch_size):\n    batch = points[i:i+batch_size]\n    response = requests.put(\n        f\"{QDRANT_URL}/collections/{COLLECTION_NAME}/points\",\n        headers={\"api-key\": QDRANT_API_KEY},\n        json={\"points\": batch}\n    )\n    if i % 50 == 0:\n        print(f\"Uploaded {i+len(batch)}/{len(points)} points\")\n\nprint(\"Done!\")\nPYTHON_EOF\n\n# Edit to add your API key\necho \"Your API key is:\"\necho $QDRANT_API_KEY\nnano ~/process_conversations.py  # Change PASTE_YOUR_API_KEY_HERE\n\n# Run it\npython3 ~/process_conversations.py\n```\n\n**What to record:**\n- **VPS IP**: `66.179.208.238`\n- **Qdrant API Key**: (from echo $QDRANT_API_KEY above)\n- **Qdrant URL**: `http://66.179.208.238:6333`\n- **Embedding API**: `http://127.0.0.1:5000/embed` (internal only)\n\n**Token Usage:** 133,336 used / 56,664 remaining"

