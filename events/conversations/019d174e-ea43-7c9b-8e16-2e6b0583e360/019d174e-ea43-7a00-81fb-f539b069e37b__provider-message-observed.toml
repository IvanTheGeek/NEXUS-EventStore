kind = "plain_text"
text = "The issue is PyTorch (900MB) downloading to `/tmp` which is only 484MB. `/tmp` is mounted as tmpfs (RAM filesystem).\n\n**Fix: Use home directory for pip cache**\n\n```bash\nexport TMPDIR=/home/ivan/tmp\nmkdir -p $TMPDIR\n\npip install --cache-dir /home/ivan/.cache/pip sentence-transformers\n```\n\n**Alternative: Skip PyTorch entirely, use API-based approach**\n\nFor CPU-only VPS, you might prefer embedding via API instead of installing heavy PyTorch:\n\n1. Use OpenAI embeddings (requires API key)\n2. Or run embeddings on your GPU dev machine, upload vectors to Qdrant\n\nWhich approach do you prefer?\n\n**Token Usage:** 112,738 used / 77,262 remaining"

