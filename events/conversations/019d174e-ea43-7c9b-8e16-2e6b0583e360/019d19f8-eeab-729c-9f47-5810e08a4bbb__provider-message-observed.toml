[[body.segments]]
kind = "reasoning"
text = "The user is getting an \"No space left on device\" error while trying to install PyTorch (which is a dependency of sentence-transformers). The torch wheel is 899.7 MB and it's running out of space.\n\nLooking at the disk space output:\n- /dev/vda1 has 25G total, 2.2G used, 22G available\n- But the error is happening during download to /tmp or to the pip cache\n\nThe issue is likely that pip is downloading to /tmp which is mounted as tmpfs with only 484M:\n```\ntmpfs           484M     0  484M   0% /tmp\n```\n\nPyTorch is 899.7 MB, so it won't fit in the 484M /tmp.\n\nSolutions:\n1. Change pip's cache/tmp directory to /home where there's more space\n2. Use a lighter weight embedding model that doesn't require PyTorch\n3. Download PyTorch wheel directly and install from file\n4. Set TMPDIR environment variable\n\nThe cleanest solution is to set pip to use a directory with more space.\n\nActually, looking more carefully - sentence-transformers requires PyTorch which is huge. For a CPU-only VPS with limited resources, this might not be the best approach.\n\nBetter alternatives:\n1. Use OpenAI embeddings API (no local installation needed)\n2. Use a lighter embedding library like `txtai` which has smaller dependencies\n3. Increase /tmp size\n4. Use a different pip cache location\n\nI should provide the quickest solution to get past this error, which is to change where pip downloads/caches."

[[body.segments]]
kind = "plain_text"
text = "The issue is PyTorch (900MB) downloading to `/tmp` which is only 484MB. `/tmp` is mounted as tmpfs (RAM filesystem).\n\n**Fix: Use home directory for pip cache**\n\n```bash\nexport TMPDIR=/home/ivan/tmp\nmkdir -p $TMPDIR\n\npip install --cache-dir /home/ivan/.cache/pip sentence-transformers\n```\n\n**Alternative: Skip PyTorch entirely, use API-based approach**\n\nFor CPU-only VPS, you might prefer embedding via API instead of installing heavy PyTorch:\n\n1. Use OpenAI embeddings (requires API key)\n2. Or run embeddings on your GPU dev machine, upload vectors to Qdrant\n\nWhich approach do you prefer?\n\n**Token Usage:** 112,738 used / 77,262 remaining"

