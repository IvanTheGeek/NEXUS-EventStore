kind = "reasoning"
text = "The user wants exact, step-by-step instructions for setting up Qdrant on a fresh Debian 13 VPS. They're in Concise Mode, so I should be direct and clear without unnecessary explanation. Just the commands and minimal context.\n\nI need to provide:\n1. Docker installation\n2. Create storage directory\n3. Run Qdrant container with proper configuration\n4. Set up persistence (systemd service or docker restart policy)\n5. Test that it's working\n6. Firewall configuration\n\nLet me give clear, executable instructions."

[[body.segments]]
kind = "plain_text"
text = "**Install Docker**\n\n```bash\n# Update system\nsudo apt update && sudo apt upgrade -y\n\n# Install prerequisites\nsudo apt install -y ca-certificates curl gnupg\n\n# Add Docker's official GPG key\nsudo install -m 0755 -d /etc/apt/keyrings\ncurl -fsSL https://download.docker.com/linux/debian/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg\nsudo chmod a+r /etc/apt/keyrings/docker.gpg\n\n# Add Docker repository\necho \\\n  \"deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian \\\n  $(. /etc/os-release && echo \"$VERSION_CODENAME\") stable\" | \\\n  sudo tee /etc/apt/sources.list.d/docker.list > /dev/null\n\n# Install Docker\nsudo apt update\nsudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin\n\n# Verify Docker is running\nsudo systemctl status docker\n```\n\n**Set Up Qdrant**\n\n```bash\n# Create storage directory\nsudo mkdir -p /var/qdrant/storage\n\n# Generate a strong API key (save this - you'll need it for your MCP)\nexport QDRANT_API_KEY=$(openssl rand -base64 32)\necho \"Your Qdrant API Key: $QDRANT_API_KEY\"\necho \"SAVE THIS KEY - you need it to configure your MCP server\"\n\n# Run Qdrant container\nsudo docker run -d \\\n  --name qdrant \\\n  --restart unless-stopped \\\n  -p 6333:6333 \\\n  -p 6334:6334 \\\n  -v /var/qdrant/storage:/qdrant/storage:z \\\n  -e QDRANT__SERVICE__API_KEY=\"$QDRANT_API_KEY\" \\\n  qdrant/qdrant:latest\n\n# Check it's running\nsudo docker ps\nsudo docker logs qdrant\n```\n\n**Configure Firewall**\n\n```bash\n# Install ufw if not present\nsudo apt install -y ufw\n\n# Allow SSH (IMPORTANT - do this first or you'll lock yourself out)\nsudo ufw allow ssh\n\n# Allow Qdrant port from anywhere (or specify your IP: sudo ufw allow from YOUR_IP to any port 6333)\nsudo ufw allow 6333/tcp\n\n# Enable firewall\nsudo ufw enable\nsudo ufw status\n```\n\n**Test Qdrant**\n\n```bash\n# Check health endpoint (should return {\"title\":\"qdrant - vector search engine\",\"version\":\"...})\ncurl http://localhost:6333/\n\n# Test from external (replace YOUR_VPS_IP)\n# Run this from your local machine:\n# curl http://YOUR_VPS_IP:6333/\n```\n\n**What You Need to Record**\n\n1. **VPS IP Address**: `hostname -I | awk '{print $1}'`\n2. **API Key**: The value you generated above (it was echoed to terminal)\n3. **Qdrant URL for MCP**: `http://YOUR_VPS_IP:6333`\n\nThe Qdrant container will auto-restart on reboot (`--restart unless-stopped`). Data persists in `/var/qdrant/storage`.\n\n**Next Steps**\n\nOnce confirmed working, you'll configure your Nexus MCP to connect using:\n- Endpoint: `http://YOUR_VPS_IP:6333`\n- API Key: The key you generated\n\n**Token Usage:** 111,481 used / 78,519 remaining"

