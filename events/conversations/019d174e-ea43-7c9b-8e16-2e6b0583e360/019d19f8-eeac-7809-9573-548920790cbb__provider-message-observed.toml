[[body.segments]]
kind = "reasoning"
text = "The service is exiting immediately with status 0/SUCCESS, which means it's not an error but the process is finishing too quickly. This is typical of MCP servers that use stdio - they're designed to be run interactively or by a client that maintains the connection, not as a daemon.\n\nMCP servers over stdio don't run as background services - they expect to be launched by the MCP client (like Claude Desktop) which maintains the stdin/stdout connection.\n\nWe shouldn't run it as a systemd service. Instead, Claude Desktop should SSH in and launch it directly when needed."

[[body.segments]]
kind = "plain_text"
text = "The MCP server is exiting immediately because it's stdio-based, not a network daemon. It waits for JSON-RPC on stdin, which systemd doesn't provide.\n\n**MCP servers aren't meant to run as services.** They're launched by the client (Claude Desktop) when needed.\n\n**Stop the service:**\n\n```bash\nsystemctl stop nexus-mcp\nsystemctl disable nexus-mcp\n```\n\n**Configure Claude Desktop to launch it via SSH instead:**\n\nOn your **dev machine**:\n\n```bash\nnano ~/.config/Claude/claude_desktop_config.json\n```\n\nAdd or update:\n```json\n{\n  \"mcpServers\": {\n    \"nexus\": {\n      \"command\": \"ssh\",\n      \"args\": [\n        \"-i\", \"/home/linux/.ssh/id_rsa\",\n        \"root@66.179.208.238\",\n        \"cd /opt/nexus-mcp && ./nexus-mcp\"\n      ]\n    }\n  }\n}\n```\n\n**Set up SSH key auth (if not already):**\n\n```bash\n# On dev machine - generate key if needed\nssh-keygen -t rsa -b 4096\n\n# Copy to VPS\nssh-copy-id root@66.179.208.238\n\n# Test passwordless login\nssh root@66.179.208.238 \"echo success\"\n```\n\nOnce SSH keys work, restart Claude Desktop.\n\n**Token Usage:** 146,514 used / 43,486 remaining"

