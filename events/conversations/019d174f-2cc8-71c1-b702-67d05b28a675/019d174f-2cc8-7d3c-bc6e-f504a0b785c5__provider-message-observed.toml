text = "Below is the same small graph shown two ways:\n\n- **TOML** for storage / files\n- **F#** for typed structure / processing\n\nI’ll use one shared example so the relationships stay visible.\n\n---\n\n# Goal\n\nWe want to represent things like:\n\n- Domain\n- Context\n- Artifact\n- Concern\n- Lens\n- Role\n\nAnd relationships like:\n\n- Context belongs to Domain\n- Artifact belongs to Context\n- Concern applies to Artifact\n- Lens evaluates Artifact\n- Role uses Lens\n\n---\n\n# 1. TOML version\n\nA good way to think about TOML is:\n\n- each table is a node type\n- each `id` is a node\n- relationship tables are edges\n\n## Example file: `graph.toml`\n\n```toml\n[[domain]]\nid = \"hci\"\nname = \"Human-Computer Interaction\"\n\n[[context]]\nid = \"message-composition\"\nname = \"Message Composition\"\ndomain = \"hci\"\n\n[[artifact]]\nid = \"chat-input\"\nname = \"Chat Input\"\nkind = \"ui-element\"\ncontext = \"message-composition\"\n\n[[artifact]]\nid = \"send-button\"\nname = \"Send Button\"\nkind = \"ui-element\"\ncontext = \"message-composition\"\n\n[[concern]]\nid = \"accessibility\"\nname = \"Accessibility\"\n\n[[concern]]\nid = \"usability\"\nname = \"Usability\"\n\n[[lens]]\nid = \"screen-reader\"\nname = \"Screen Reader Lens\"\n\n[[lens]]\nid = \"keyboard-only\"\nname = \"Keyboard-only Lens\"\n\n[[role]]\nid = \"blind-user\"\nname = \"Blind User\"\n\n[[role]]\nid = \"power-user\"\nname = \"Power User\"\n\n# ----- relationships -----\n\n[[edge]]\ntype = \"contains\"\nfrom = \"hci\"\nto = \"message-composition\"\n\n[[edge]]\ntype = \"contains\"\nfrom = \"message-composition\"\nto = \"chat-input\"\n\n[[edge]]\ntype = \"contains\"\nfrom = \"message-composition\"\nto = \"send-button\"\n\n[[edge]]\ntype = \"applies-to\"\nfrom = \"accessibility\"\nto = \"chat-input\"\n\n[[edge]]\ntype = \"applies-to\"\nfrom = \"accessibility\"\nto = \"send-button\"\n\n[[edge]]\ntype = \"applies-to\"\nfrom = \"usability\"\nto = \"chat-input\"\n\n[[edge]]\ntype = \"applies-to\"\nfrom = \"usability\"\nto = \"send-button\"\n\n[[edge]]\ntype = \"evaluates\"\nfrom = \"screen-reader\"\nto = \"chat-input\"\n\n[[edge]]\ntype = \"evaluates\"\nfrom = \"screen-reader\"\nto = \"send-button\"\n\n[[edge]]\ntype = \"evaluates\"\nfrom = \"keyboard-only\"\nto = \"chat-input\"\n\n[[edge]]\ntype = \"evaluates\"\nfrom = \"keyboard-only\"\nto = \"send-button\"\n\n[[edge]]\ntype = \"uses\"\nfrom = \"blind-user\"\nto = \"screen-reader\"\n\n[[edge]]\ntype = \"uses\"\nfrom = \"power-user\"\nto = \"keyboard-only\"\n```\n\n---\n\n# Why this TOML shape is useful\n\nThis is intentionally simple.\n\nYou have:\n\n- **node tables**  \n  `domain`, `context`, `artifact`, `concern`, `lens`, `role`\n\n- **edge table**  \n  one generic relationship table\n\nThat means you can later add more types without redesigning everything.\n\nFor example:\n\n- `finding`\n- `evaluation`\n- `flow`\n- `state`\n- `command`\n- `event`\n\n---\n\n# What this TOML means as a graph\n\nThis:\n\n```text\nBlind User\n  -> uses -> Screen Reader Lens\n  -> evaluates -> Chat Input\n```\n\nis represented by two edges:\n\n```toml\n[[edge]]\ntype = \"uses\"\nfrom = \"blind-user\"\nto = \"screen-reader\"\n\n[[edge]]\ntype = \"evaluates\"\nfrom = \"screen-reader\"\nto = \"chat-input\"\n```\n\nAnd this:\n\n```text\nChat Input is in Message Composition, which is in HCI\n```\n\nis represented by:\n\n```toml\n[[edge]]\ntype = \"contains\"\nfrom = \"hci\"\nto = \"message-composition\"\n\n[[edge]]\ntype = \"contains\"\nfrom = \"message-composition\"\nto = \"chat-input\"\n```\n\n---\n\n# Optional TOML variation: direct references plus edges\n\nYou may prefer hybrid storage:\n\n- direct parent references for obvious containment\n- edges for everything cross-cutting\n\nThat looks like this:\n\n```toml\n[[domain]]\nid = \"hci\"\nname = \"Human-Computer Interaction\"\n\n[[context]]\nid = \"message-composition\"\nname = \"Message Composition\"\ndomain = \"hci\"\n\n[[artifact]]\nid = \"chat-input\"\nname = \"Chat Input\"\ncontext = \"message-composition\"\n\n[[concern]]\nid = \"accessibility\"\nname = \"Accessibility\"\n\n[[lens]]\nid = \"screen-reader\"\nname = \"Screen Reader Lens\"\n\n[[role]]\nid = \"blind-user\"\nname = \"Blind User\"\n\n[[edge]]\ntype = \"applies-to\"\nfrom = \"accessibility\"\nto = \"chat-input\"\n\n[[edge]]\ntype = \"evaluates\"\nfrom = \"screen-reader\"\nto = \"chat-input\"\n\n[[edge]]\ntype = \"uses\"\nfrom = \"blind-user\"\nto = \"screen-reader\"\n```\n\nThat is often a very practical compromise.\n\n---\n\n# 2. F# version\n\nNow let’s model the same thing in F#.\n\n## Basic typed graph\n\n```fsharp\ntype DomainId = DomainId of string\ntype ContextId = ContextId of string\ntype ArtifactId = ArtifactId of string\ntype ConcernId = ConcernId of string\ntype LensId = LensId of string\ntype RoleId = RoleId of string\n\ntype Domain =\n    { Id: DomainId\n      Name: string }\n\ntype Context =\n    { Id: ContextId\n      Name: string\n      Domain: DomainId }\n\ntype Artifact =\n    { Id: ArtifactId\n      Name: string\n      Kind: string\n      Context: ContextId }\n\ntype Concern =\n    { Id: ConcernId\n      Name: string }\n\ntype Lens =\n    { Id: LensId\n      Name: string }\n\ntype Role =\n    { Id: RoleId\n      Name: string }\n\ntype NodeRef =\n    | DomainRef of DomainId\n    | ContextRef of ContextId\n    | ArtifactRef of ArtifactId\n    | ConcernRef of ConcernId\n    | LensRef of LensId\n    | RoleRef of RoleId\n\ntype EdgeType =\n    | Contains\n    | AppliesTo\n    | Evaluates\n    | Uses\n\ntype Edge =\n    { Type: EdgeType\n      From: NodeRef\n      To: NodeRef }\n\ntype Graph =\n    { Domains: Domain list\n      Contexts: Context list\n      Artifacts: Artifact list\n      Concerns: Concern list\n      Lenses: Lens list\n      Roles: Role list\n      Edges: Edge list }\n```\n\n---\n\n# Example data in F#\n\n```fsharp\nlet hci =\n    { Id = DomainId \"hci\"\n      Name = \"Human-Computer Interaction\" }\n\nlet messageComposition =\n    { Id = ContextId \"message-composition\"\n      Name = \"Message Composition\"\n      Domain = hci.Id }\n\nlet chatInput =\n    { Id = ArtifactId \"chat-input\"\n      Name = \"Chat Input\"\n      Kind = \"ui-element\"\n      Context = messageComposition.Id }\n\nlet sendButton =\n    { Id = ArtifactId \"send-button\"\n      Name = \"Send Button\"\n      Kind = \"ui-element\"\n      Context = messageComposition.Id }\n\nlet accessibility =\n    { Id = ConcernId \"accessibility\"\n      Name = \"Accessibility\" }\n\nlet usability =\n    { Id = ConcernId \"usability\"\n      Name = \"Usability\" }\n\nlet screenReader =\n    { Id = LensId \"screen-reader\"\n      Name = \"Screen Reader Lens\" }\n\nlet keyboardOnly =\n    { Id = LensId \"keyboard-only\"\n      Name = \"Keyboard-only Lens\" }\n\nlet blindUser =\n    { Id = RoleId \"blind-user\"\n      Name = \"Blind User\" }\n\nlet powerUser =\n    { Id = RoleId \"power-user\"\n      Name = \"Power User\" }\n\nlet graph =\n    { Domains = [ hci ]\n      Contexts = [ messageComposition ]\n      Artifacts = [ chatInput; sendButton ]\n      Concerns = [ accessibility; usability ]\n      Lenses = [ screenReader; keyboardOnly ]\n      Roles = [ blindUser; powerUser ]\n      Edges =\n        [ { Type = Contains\n            From = DomainRef hci.Id\n            To = ContextRef messageComposition.Id }\n\n          { Type = Contains\n            From = ContextRef messageComposition.Id\n            To = ArtifactRef chatInput.Id }\n\n          { Type = Contains\n            From = ContextRef messageComposition.Id\n            To = ArtifactRef sendButton.Id }\n\n          { Type = AppliesTo\n            From = ConcernRef accessibility.Id\n            To = ArtifactRef chatInput.Id }\n\n          { Type = AppliesTo\n            From = ConcernRef accessibility.Id\n            To = ArtifactRef sendButton.Id }\n\n          { Type = AppliesTo\n            From = ConcernRef usability.Id\n            To = ArtifactRef chatInput.Id }\n\n          { Type = AppliesTo\n            From = ConcernRef usability.Id\n            To = ArtifactRef sendButton.Id }\n\n          { Type = Evaluates\n            From = LensRef screenReader.Id\n            To = ArtifactRef chatInput.Id }\n\n          { Type = Evaluates\n            From = LensRef screenReader.Id\n            To = ArtifactRef sendButton.Id }\n\n          { Type = Evaluates\n            From = LensRef keyboardOnly.Id\n            To = ArtifactRef chatInput.Id }\n\n          { Type = Evaluates\n            From = LensRef keyboardOnly.Id\n            To = ArtifactRef sendButton.Id }\n\n          { Type = Uses\n            From = RoleRef blindUser.Id\n            To = LensRef screenReader.Id }\n\n          { Type = Uses\n            From = RoleRef powerUser.Id\n            To = LensRef keyboardOnly.Id } ] }\n```\n\n---\n\n# Why this F# shape is useful\n\nThe TOML stores the graph.\n\nThe F# gives you:\n\n- type safety\n- querying\n- transformations\n- rendering into other views\n\nThat is where NEXUS starts becoming executable.\n\n---\n\n# 3. Same model, visually\n\nBoth TOML and F# above describe this:\n\n```text\nDomain: Human-Computer Interaction\n  contains Context: Message Composition\n    contains Artifact: Chat Input\n    contains Artifact: Send Button\n\nConcern: Accessibility\n  applies to Chat Input\n  applies to Send Button\n\nConcern: Usability\n  applies to Chat Input\n  applies to Send Button\n\nRole: Blind User\n  uses Lens: Screen Reader Lens\n    evaluates Chat Input\n    evaluates Send Button\n\nRole: Power User\n  uses Lens: Keyboard-only Lens\n    evaluates Chat Input\n    evaluates Send Button\n```\n\n---\n\n# 4. Querying relationships in F#\n\nHere are a few small functions that make the graph useful.\n\n## Get all edges from a node\n\n```fsharp\nlet edgesFrom nodeRef graph =\n    graph.Edges |> List.filter (fun e -> e.From = nodeRef)\n```\n\n## Get all edges to a node\n\n```fsharp\nlet edgesTo nodeRef graph =\n    graph.Edges |> List.filter (fun e -> e.To = nodeRef)\n```\n\n## Get all concerns that apply to an artifact\n\n```fsharp\nlet concernsForArtifact artifactId graph =\n    let concernIds =\n        graph.Edges\n        |> List.choose (fun e ->\n            match e.Type, e.From, e.To with\n            | AppliesTo, ConcernRef cid, ArtifactRef aid when aid = artifactId -> Some cid\n            | _ -> None)\n\n    graph.Concerns\n    |> List.filter (fun c -> concernIds |> List.contains c.Id)\n```\n\n## Get all lenses used by a role\n\n```fsharp\nlet lensesForRole roleId graph =\n    let lensIds =\n        graph.Edges\n        |> List.choose (fun e ->\n            match e.Type, e.From, e.To with\n            | Uses, RoleRef rid, LensRef lid when rid = roleId -> Some lid\n            | _ -> None)\n\n    graph.Lenses\n    |> List.filter (fun l -> lensIds |> List.contains l.Id)\n```\n\n## Get all artifacts evaluated by a lens\n\n```fsharp\nlet artifactsForLens lensId graph =\n    let artifactIds =\n        graph.Edges\n        |> List.choose (fun e ->\n            match e.Type, e.From, e.To with\n            | Evaluates, LensRef lid, ArtifactRef aid when lid = lensId -> Some aid\n            | _ -> None)\n\n    graph.Artifacts\n    |> List.filter (fun a -> artifactIds |> List.contains a.Id)\n```\n\n---\n\n# 5. A more NEXUS-like interpretation\n\nHere is the deeper pattern:\n\n## Containment relationships\nThese define structure:\n\n- Domain contains Context\n- Context contains Artifact\n\n## Cross-cutting relationships\nThese define overlays:\n\n- Concern applies-to Artifact\n- Lens evaluates Artifact\n- Role uses Lens\n\nThat means:\n\n- **structure** gives location\n- **cross-cutting edges** give meaning\n\nThis is a very important distinction.\n\n---\n\n# 6. Subgraphs\n\nNow let’s show how this becomes subgraphs.\n\n## Structural subgraph\n\n```text\nHCI\n  -> Message Composition\n    -> Chat Input\n    -> Send Button\n```\n\nThis is your containment tree-like part.\n\n## Concern subgraph\n\n```text\nAccessibility -> Chat Input\nAccessibility -> Send Button\nUsability -> Chat Input\nUsability -> Send Button\n```\n\nThis overlays the structural graph.\n\n## Evaluation subgraph\n\n```text\nBlind User -> uses -> Screen Reader Lens\nScreen Reader Lens -> evaluates -> Chat Input\nScreen Reader Lens -> evaluates -> Send Button\n```\n\nThat is another overlay.\n\nSo one artifact can sit in multiple intersecting subgraphs at once.\n\n---\n\n# 7. Why this matters\n\nTake `Chat Input`.\n\nIt is simultaneously:\n\n- inside the **Message Composition** context\n- under the **Accessibility** concern\n- evaluated by the **Screen Reader Lens**\n- relevant to the **Blind User** role\n\nThat means the artifact is a meeting point of multiple graph dimensions.\n\nThis is why a plain hierarchy is not enough.\n\n---\n\n# 8. A slightly stronger F# model\n\nIf you want more explicit graph primitives, you can unify nodes.\n\n```fsharp\ntype Node =\n    | DomainNode of Domain\n    | ContextNode of Context\n    | ArtifactNode of Artifact\n    | ConcernNode of Concern\n    | LensNode of Lens\n    | RoleNode of Role\n\ntype Graph2 =\n    { Nodes: Node list\n      Edges: Edge list }\n```\n\nThat is more graph-native.\n\nBut for learning and querying, the earlier split-record version is easier to work with.\n\n---\n\n# 9. Suggested repo shape\n\nA file-based graph could look like this:\n\n```text\nnexus/\n  domains/\n    hci.toml\n\n  contexts/\n    message-composition.toml\n\n  artifacts/\n    chat-input.toml\n    send-button.toml\n\n  concerns/\n    accessibility.toml\n    usability.toml\n\n  lenses/\n    screen-reader.toml\n    keyboard-only.toml\n\n  roles/\n    blind-user.toml\n    power-user.toml\n\n  edges/\n    containment.toml\n    concerns.toml\n    evaluation.toml\n```\n\nThat is easier to edit by hand than one giant file.\n\n---\n\n# Example split TOML files\n\n## `domains/hci.toml`\n\n```toml\nid = \"hci\"\nname = \"Human-Computer Interaction\"\n```\n\n## `contexts/message-composition.toml`\n\n```toml\nid = \"message-composition\"\nname = \"Message Composition\"\ndomain = \"hci\"\n```\n\n## `artifacts/chat-input.toml`\n\n```toml\nid = \"chat-input\"\nname = \"Chat Input\"\nkind = \"ui-element\"\ncontext = \"message-composition\"\n```\n\n## `edges/evaluation.toml`\n\n```toml\n[[edge]]\ntype = \"uses\"\nfrom = \"blind-user\"\nto = \"screen-reader\"\n\n[[edge]]\ntype = \"evaluates\"\nfrom = \"screen-reader\"\nto = \"chat-input\"\n\n[[edge]]\ntype = \"evaluates\"\nfrom = \"screen-reader\"\nto = \"send-button\"\n```\n\nThis split approach feels very close to the way you think.\n\n---\n\n# 10. Best mental bridge between TOML and F#\n\nHere is the simplest mapping:\n\n## TOML\n- good for authoring\n- good for versioning in Git\n- good for human-readable graph data\n\n## F#\n- good for loading TOML\n- good for validation\n- good for querying\n- good for generating views\n\nSo the flow is:\n\n```text\nTOML files\n  -> parse into F# types\n  -> validate graph\n  -> generate outputs\n```\n\nOutputs could later be:\n\n- event model HTML\n- reports\n- accessibility check lists\n- relationship diagrams\n- projections into other subgraphs\n\n---\n\n# 11. One more example with Event Modeling flavor\n\nHere is a tiny second example, just to show the same pattern applies outside UX.\n\n## TOML\n\n```toml\n[[context]]\nid = \"command-handling\"\nname = \"Command Handling\"\ndomain = \"software-development\"\n\n[[artifact]]\nid = \"submit-message\"\nname = \"Submit Message\"\nkind = \"command\"\ncontext = \"command-handling\"\n\n[[artifact]]\nid = \"message-submitted\"\nname = \"Message Submitted\"\nkind = \"event\"\ncontext = \"command-handling\"\n\n[[edge]]\ntype = \"produces\"\nfrom = \"submit-message\"\nto = \"message-submitted\"\n```\n\nIn that case you would extend `EdgeType` in F#:\n\n```fsharp\ntype EdgeType =\n    | Contains\n    | AppliesTo\n    | Evaluates\n    | Uses\n    | Produces\n```\n\nThat shows the system can grow naturally.\n\n---\n\n# Final takeaway\n\nThe key relationship pattern is:\n\n```text\nStructure:\nDomain -> Context -> Artifact\n\nCross-cutting:\nConcern -> Artifact\nLens -> Artifact\nRole -> Lens\n```\n\nSo:\n\n- **TOML** is a good graph storage form\n- **F#** is a good graph execution form\n\nAnd most importantly:\n\n- **containment edges** tell you where something lives\n- **overlay edges** tell you what it means, what matters, and how it is examined\n\nThe next best step is to build a tiny real example with maybe 8 to 12 files and then write the F# loader for them."

