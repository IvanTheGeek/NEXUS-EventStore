text = "Short answer: **close—but not quite.**\n\n> **Role is *who***  \n> **Lens is *how***  \n\nThey work together, but they are different primitives.\n\n---\n\n# 🔑 Clean distinction\n\n## Role\n> The **actor / viewpoint holder**\n\n- Who is interacting\n- Who is evaluating\n- Who experiences the system\n\nExamples:\n- User\n- Admin\n- Developer\n- Auditor\n- Screen reader user\n- First-time user\n- Power user\n- Mobile user\n\n👉 Role = **identity + capabilities + constraints**\n\n---\n\n## Lens\n> The **method or perspective of evaluation**\n\n- How we examine something\n- What criteria we use\n\nExamples:\n- Accessibility lens\n- Usability lens\n- Performance lens\n- Cognitive load lens\n- Error prevention lens\n\n👉 Lens = **evaluation strategy**\n\n---\n\n# 🧠 Why they feel the same\n\nBecause in real life, they often appear together:\n\n- “Screen reader user” (role)\n- “Screen reader lens” (lens)\n\nBut they are NOT identical.\n\n---\n\n# 🔥 The key relationship\n\n```text\nRole uses Lens to evaluate Artifact within Context\n```\n\n---\n\n# 🧩 Example (your ChatGPT input)\n\n## Artifact\n- Chat input box\n\n## Context\n- Message Composition\n\n---\n\n## Role\n- Blind user\n\n## Lens\n- Screen reader lens\n\n---\n\n## Evaluation\n- Can the input be discovered?\n- Is it announced properly?\n- Is focus order correct?\n\n---\n\n👉 Same artifact, different combinations:\n\n### Case 1\n- Role: Power user  \n- Lens: Efficiency lens  \n\n→ “Can I submit without leaving keyboard?”\n\n---\n\n### Case 2\n- Role: First-time user  \n- Lens: Learnability lens  \n\n→ “Is it obvious how to send a message?”\n\n---\n\n### Case 3\n- Role: Mobile user  \n- Lens: Thumb-reach lens  \n\n→ “Is the send button reachable one-handed?”\n\n---\n\n# 🧬 Important insight\n\n## A role can use multiple lenses\n\nA developer might use:\n\n- Performance lens\n- Debuggability lens\n- Maintainability lens\n\n---\n\n## A lens can be used by multiple roles\n\nAccessibility lens is used by:\n\n- Designers\n- Developers\n- QA\n- Auditors\n\n---\n\n# ⚠️ Where people go wrong\n\nThey collapse these into one:\n\n- “Accessibility” becomes a role ❌  \n- “User” becomes a lens ❌  \n\nThis leads to confusion like you’ve been feeling.\n\n---\n\n# 🧠 Clean mental model\n\n| Concept | Question it answers |\n|--------|--------------------|\n| **Role** | Who is involved? |\n| **Lens** | How are we evaluating? |\n| **Context** | Where are we working? |\n| **Artifact** | What are we looking at? |\n| **Concern** | What matters? |\n\n---\n\n# 🧩 Another way to see it\n\nThink of it like this:\n\n- Role = **camera operator**\n- Lens = **camera lens**\n- Artifact = **subject**\n- Context = **scene**\n- Concern = **what you care about capturing**\n\n---\n\n# 🚀 NEXUS-level formulation\n\nYou can model it like:\n\n```text\nRole\n  uses -> Lens\n\nLens\n  evaluates -> Artifact\n\nArtifact\n  exists_in -> Context\n\nContext\n  belongs_to -> Domain\n\nConcern\n  applies_to -> Artifact\n  applies_to -> Context\n```\n\n---\n\n# 💡 Subtle but powerful addition\n\nYou can even say:\n\n> A **Lens is often defined relative to a Role**\n\nExample:\n\n- “Beginner lens” only makes sense if the role is “beginner user”\n- “Auditor lens” tied to “auditor role”\n\nBut still:\n\n👉 Role ≠ Lens  \n👉 They are linked, not the same\n\n---\n\n# 🧠 Final compression\n\nIf you remember this, you’re good:\n\n- **Role = who is looking**\n- **Lens = how they are looking**\n\n---\n\nIf you want next step, we can:\n\n👉 Map **Role into Event Modeling slices** (Agent vs Role distinction 👀)  \n👉 Or define how Roles + Lenses generate **test cases automatically**\n\nBoth of those connect directly to what you're building with NEXUS."

