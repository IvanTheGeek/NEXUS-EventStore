[[body.segments]]
kind = "tool_result"
text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Documentation on REST Interface \\u00B7 Issue #109 \\u00B7 penpot/penpot-docs\",\"url\":\"https://github.com/penpot/penpot-docs/issues/109\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"I am trying to support Penpot in the Luisa framework (https://luisa.cloud). I was trying to reverse engineer the REST API, but for me the data structure is not clear. It\\u00B4s quite different from the JSON Figma or Sketch produce... ... I assume this is a list of key value pairs. But I would like to confirm this. Are there somewhere schema defined? ... I\\u0026#x27;m afraid the Penpot backend API is not REST. It\\u0026#x27;s a kind of RPC calls, that frontend clojure code may invoke with the same arguments and data types as a normal function call. We have just published a figma exporter plugin, that uses a Penpot library you can use from javascript. And we are documenting some parts of the data model, that hope we can publish in a few days. This is not exactly for your use case, but it may give you some clues. If you want to export data from Penpot to Luisa, perhaps you can analyze the .zip format we generate when you download a file, with annotated svg files.\\n\\nHi, I am trying to support Penpot in the Luisa framework (https://luisa.cloud). I was trying to reverse engineer the REST API, but for me the data structure is not clear. It\\u00B4s quite different from the JSON Figma or Sketch produce... I of...\\n\\nI am trying to support Penpot in the Luisa framework (https://luisa.cloud). I was trying to reverse engineer the REST API, but for me the data structure is not clear. It\\u00B4s quite different from the JSON Figma or Sketch produce... ... I assume this is a list of key value pairs. But I would like to confirm this. Are there somewhere schema defined? ... I\\u0027m afraid the Penpot backend API is not REST. It\\u0027s a kind of RPC calls, that frontend clojure code may invoke with the same arguments and data types as a normal function call. We have just published a figma exporter plugin, that uses a Penpot library you can use from javascript. And we are documenting some parts of the data model, that hope we can publish in a few days. This is not exactly for your use case, but it may give you some clues. If you want to export data from Penpot to Luisa, perhaps you can analyze the .zip format we generate when you download a file, with annotated svg files.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/penpot/penpot-docs/issues/109\"}},{\"type\":\"knowledge\",\"title\":\"4. Integration Guide - Help center - Penpot\",\"url\":\"https://help.penpot.app/technical-guide/integration/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Outbound webhooks are event calls from Penpot to other applications, that notifiy some particular event has occured (e.g. a file has been created or updated, a comment has been added, etc.). ... When you add a webhook, you specify the URL of a service you own. If the webhook is active, a POST request will be sent to the URL on any event that occurs anywhere in the team. You can specify the format of the call payload. JSON is a standard format, accepted by almost every web application. Transit is a format, that may be encapsulated inside JSON, that adds datatype information and enriches the content with semantic information. Unfortunately, we do not have any specific documentation for the webhooks yet. For the moment you can use the backend API documentation, generated automatically from source code, as a guide. All backend RPC calls labelled as WEBHOOK trigger webhook calls, if appropriate, with an equivalent payload.\\n\\nPersonal access tokens function like an alternative to our login/password authentication system and can be used to allow an application to access the internal Penpot API. Important: Treat your access tokens like passwords as they provide access to our account. In Penpot, access tokens are configured at user account level. To manage your access tokens, go to Your account \\u003E Access tokens. Press the \\u0022Generate new token\\u0022 button. Fill the name of the token. Descriptive names are recommended. Choose an expiration date. Current options are: Never, 30 days, 60 days, 90 days or 180 days. Once you\\u0027re happy with the name and the expiration date, press \\u0022Create token\\u0022. At this step you will be able to copy the token to your clipboard. You can delete tokens anytime. You\\u0027ll find the option at the menu at the right side of each token of the tokens list. Having a personal token will allow you to use it instead of your password.\\n\\ncurl -H \\u0022Authorization: Token \\u003Creplace-this-with-token\\u003E\\u0022 https://design.penpot.app/api/rpc/command/get-profile \\u00B7\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/technical-guide/integration/\"}},{\"type\":\"knowledge\",\"title\":\"Provide an API \\u00B7 penpot/penpot \\u00B7 Discussion #462\",\"url\":\"https://github.com/penpot/penpot/discussions/462\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"I have also mainly worked with GraphQL and REST. RPC is an unknown technology for me. It turns out a lot of new things at once, but my friends and I want to understand the project, so we will gradually do it, thanks to the fact that you find time for consultation :-) As part of our technological experiment, we would like to receive data from Penpot in some format, preferably in JSON format, in order to then convert them to other formats. User @KlausSchaefers wrote the issue here #1333 \\u00B7 It turns out we need something the same. But if now there is no possibility of issuing data in the JSON format, then it is possible in any format. I realized that the backend does not know about SVG, but knows about \\u0026quot;structured data\\u0026quot;. As I understand it, this is an extended JSON, which is called \\u0026quot;transit format\\u0026quot;. This format suits us. Tell me, please, is there an example somewhere of how you can turn to the backend and get some data from the Penpot project (I\\u0026#x27;m talking about local deployment of Penpot) \\n\\nI have also mainly worked with GraphQL and REST. RPC is an unknown technology for me. It turns out a lot of new things at once, but my friends and I want to understand the project, so we will gradually do it, thanks to the fact that you find time for consultation :-) As part of our technological experiment, we would like to receive data from Penpot in some format, preferably in JSON format, in order to then convert them to other formats. User @KlausSchaefers wrote the issue here #1333 \\u00B7 It turns out we need something the same. But if now there is no possibility of issuing data in the JSON format, then it is possible in any format. I realized that the backend does not know about SVG, but knows about \\u0022structured data\\u0022. As I understand it, this is an extended JSON, which is called \\u0022transit format\\u0022. This format suits us. Tell me, please, is there an example somewhere of how you can turn to the backend and get some data from the Penpot project (I\\u0027m talking about local deployment of Penpot) \\n\\nHere I suggested thinking about whether it is possible to use NocoDB to quickly create the first version of the REST API and GraphQL API functionality for Penpot The ability to quickly create REST API and GraphQL API using special engines #1611 \\u00B7 Also, I would like to understand in more detail if you have a plan to create a plugin system? If so, do you have an understanding of how you plan to implement the plugin system, do you have an understanding of the architecture of the plugin system that you want to implement? Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. ... There was an error while loading. Please reload this page. ... Something went wrong. There was an error while loading. Please reload this page.\\n\\nHello! @niwinz \\u0417\\u0434\\u0440\\u0430\\u0432\\u0435\\u0439\\u0442\\u0435! Can you please tell me if there is any information about the implementation of API RPC in penpot? First of all, I want to get data in the Vue web application on my localhost from the penpot backend in order to display statistics on projects that the user has in penpot. Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. ... After that, I want to understand how to make an import in the SVG format in a third-party application through the API from the backend? Is it possible to read about it somewhere? It\\u0027s all complicated for me, but I want to understand :-) \\u041A\\u0430\\u0442\\u043E \\u0441\\u0438 \\u0441\\u0435 \\u0445\\u0432\\u0430\\u043D\\u0430\\u043B \\u043D\\u0430 \\u0445\\u043E\\u0440\\u043E\\u0442\\u043E, \\u0449\\u0435 \\u0433\\u043E \\u0438\\u0433\\u0440\\u0430\\u0435\\u0448 \\u0434\\u043E \\u043A\\u0440\\u0430\\u044F \\uD83D\\uDE38 \\u00B7 Beta Was this translation helpful?\\n\\nI\\u0027ll gladly try to adapt some of my plugins for Figma to penpot. While Styler and Pagger may not be easily adaptable, Automater is a collection of scripts which will be useful on penpot as well. (advanced copy, paste, randomizer, selection, and other goodies) Ping me if you have questions regarding Figma API, and I\\u0027ll do may best to answer them. \\u270C\\uFE0F \\u00B7 Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. ... Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. ... Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/penpot/penpot/discussions/462\"}},{\"type\":\"knowledge\",\"title\":\"Code to Penpot (How to work with the API?) \\u00B7 penpot/penpot \\u00B7 Discussion #4180\",\"url\":\"https://github.com/penpot/penpot/discussions/4180\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"Didn\\u0026#x27;t helped much and hasn\\u0026#x27;t guide ... Negotiation The penpot API by default operates indistinctly with: application/json and application/transit\\u002Bjson content types....\\n\\nI\\u0027m having trouble get the API to work. I need update the project design file from within the code of the same project... like maybe create a design system, portfolio and application designs and be able to update from penpot or from the code of the said projects (color tokens, typography and the name/structure of the object of these tokens). So far i created a repo with some color tokens, some API call\\u0027s to test the endpoints and there\\u0027s 4 endpoints i tested which are create-file, get-file, get-page and update-file. The update-file is the only I\\u0027m having an issue, but i don\\u0027t know if it\\u0027s a bug or it\\u0027s me doing something wrong or maybe it\\u0027s not the intended use for this. I\\u0027ve tried to only call with the required params to see the response and it returned OK and what i believe is the number of requests made in one session to keep track of updates as the \\u0022revn\\u0022 and the last x requests.\\n\\nDidn\\u0027t helped much and hasn\\u0027t guide to what was really the error since looking in the OPENAPI JSON it appears correct: Even tried to understand this bit in the API DOC and tryout different things: Content Negotiation The penpot API by default operates indistinctly with: application/json and application/transit\\u002Bjson content types. You should specify the desired content-type on the Accept header, the transit encoding is used by default. Every Fetch call was made not including the \\u0022Accept\\u0022 or \\u0022Content-Type\\u0022 or with both or without both and didn\\u0027t change the response. SSE (Server-Sent Events) The methods marked with SSE returns a SSE formatted stream on the response body, always with status 200. The events are always encoded using application/transit\\u002Bjson encoding (for now no content negotiation is possible on methods that return SSE streams). The methods used didn\\u0027t have the SSE marking in them, but the response of the failed (400) \\u0022update-file\\u0022 requests always come in the unreadable tran\\n\\nCode to Penpot (How to work with the API?)\\n\\nconst body = { \\u0022id\\u0022: env[\\u0022PORTFOLIO_ID\\u0022], \\u0022sessionId\\u0022: env[\\u0022PORTFOLIO_ID\\u0022], \\u0022revn\\u0022: 0, // \\u0022changes\\u0022: [{\\u0022type\\u0022: \\u0022add-page\\u0022 }], } const name = \\u0027updateFile\\u0027 const res = await fetch(\\u0022https://design.penpot.app/api/rpc/command/update-file\\u0022, { \\u0022method\\u0022: \\u0022POST\\u0022, \\u0022headers\\u0022: { \\u0022Accept\\u0022: \\u0022application/json\\u0022, \\u0022Content-Type\\u0022: \\u0022application/json\\u0022, \\u0022Authorization\\u0022: \\u0060Token ${env[\\u0022PENPOT_TOKEN\\u0022]}\\u0060 }, \\u0022body\\u0022: JSON.stringify(body) }) const data = await res.json() console.log(res.status) Deno.writeTextFile(\\u0060./${name}.json\\u0060, JSON.stringify(data, null, 2)) ... Then tried to add one more params (commented on the code snippet above) which are the changes to update the file, but i keep getting this unreadable error: ... So checked the API DOC, OPENAPI JSON and the issues and discussions (only found this issue kinda relevant but it points out to this PR closed with the comment \\u0022I\\u0027m going to close this PR, and open a new one with more changes\\u0022...but nothing linked to keep track of how it\\u0027s going).\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/penpot/penpot/discussions/4180\"}},{\"type\":\"knowledge\",\"title\":\"3.08. Data Guide - Help center - Penpot\",\"url\":\"https://help.penpot.app/technical-guide/developer/data-guide/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"The data structures are one of the most complex and important parts of Penpot. It\\u0026#x27;s critical that the data integrity is always maintained throughout the whole usage, and also file exports \\u0026amp; imports and data model evolution. To modify the data structure (the most typical case will be to add a new attribute to the shapes), this list must be checked. This is not an exhaustive list, but all of this is important in general. We prefer that the page and shape attributes are optional. I.E. there is a default object behavior, that occurs when the attribute is not present, and its presence activates some feature (example: if there is no fill-color, the shape is not filled). When you revert to the default state, it\\u0026#x27;s better to remove the attribute than leaving it with null value. There are some process (for example import \\u0026amp; export) that filter out and remove all attributes that are null.\\n\\nThe data structures are one of the most complex and important parts of Penpot. It\\u0027s critical that the data integrity is always maintained throughout the whole usage, and also file exports \\u0026 imports and data model evolution. To modify the data structure (the most typical case will be to add a new attribute to the shapes), this list must be checked. This is not an exhaustive list, but all of this is important in general. We prefer that the page and shape attributes are optional. I.E. there is a default object behavior, that occurs when the attribute is not present, and its presence activates some feature (example: if there is no fill-color, the shape is not filled). When you revert to the default state, it\\u0027s better to remove the attribute than leaving it with null value. There are some process (for example import \\u0026 export) that filter out and remove all attributes that are null.\\n\\n\\u25BE common/ \\u25BE src/app/common/ \\u25BE files/ migrations.cljc \\u00B7 When changing the model it\\u0027s essential to take into account that the existing Penpot files must keep working without changes. If you follow the general considerations stated above, usually this is automatic, since the objects already in the database just have the default behavior, that should be the same as before the change. And the new features apply to new or edited objects. But if this is not possible, and we are talking of a breaking change, you can write a data migration. Just define a new data version and a migration script in migrations.cljc and increment file-version in common.cljc. From then on, every time a file is loaded from the database, if its version number is lower than the current version in the app, the file data will be handled to all the needed migration functions. If you later modify and save the file, it will be now updated in database.\\n\\n\\u25BE common/ \\u25BE src/app/common/ \\u25BE types/ component.cljc \\u00B7 For all shape attributes, you must take into account what happens when the attribute in a main component is changed and then the copies are synchronized. In component.cljc there is a structure sync-attrs that maps shape attributes to sync groups. When an attribute is changed in a main component, the change will be propagated to its copies. If the change occurs in a copy, the group will be marked as touched in the copy shape, and from then on, further changes in the main to this attribute, or others in the same group, will not be propagated. Any attribute that is not in this map will be ignored in synchronizations. \\u25BE frontend/ \\u25BE src/ \\u25BE app/ \\u25BE main/ \\u25BE ui/ \\u25BE shapes/ \\u25B8 text/ attrs.cljs bool.cljs circle.cljs custom_stroke.cljs embed.cljs export.cljs fill_image.cljs filters.cljs frame.cljs gradients.cljs group.cljs image.cljs mask.cljs path.cljs rect.cljs shape.cljs svg_defs.cljs svg_raw.cljs text.cljs \\u25BE worker/ \\u25BE import/ parser.cljs \\u00B7\\n\\n\\u25BE frontend/ \\u25BE src/ \\u25BE app/ \\u25BE main/ \\u25BE ui/ \\u25BE workspace/ \\u25BE sidebar/ \\u25BE options/ \\u25B8 menus/ \\u25B8 rows/ \\u25BE shapes/ bool.cljs circle.cljs frame.cljs group.cljs image.cljs multiple.cljs path.cljs rect.cljs svg_raw.cljs text.cljs \\u00B7 In shapes/*.cljs there are the components that show the edit menu of each shape type. In menus/*.cljs there are the building blocks of these menus. And in rows/*.cljs there are some pieces, for example color input and picker. When modifying the shape edit forms, you must take into account that these forms may edit several shapes at the same time, even of different types. When more than one shape is selected, the form inside multiple.cljs is used. At the top of this module, a couple of maps define what attributes may be edited and how, for each type of shape. Then, the blocks in menus/*.cljs are used, but they are not given a shape, but a values map.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/technical-guide/developer/data-guide/\"}},{\"type\":\"knowledge\",\"title\":\"feature: Better documentation on data format \\u00B7 Issue #2439 \\u00B7 penpot/penpot\",\"url\":\"https://github.com/penpot/penpot/issues/2439\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"I would like to be able to parse the REST service. Getting some SVG oder JSON object based API. ... The api output uses transit format. On the end is a valid JSON using the most optimized data stuctures with cached prop names.\\n\\nIs your feature request related to a problem? Please describe. Hi, I am trying to support Penpot in the Luisa framework (https://luisa.cloud/). I was trying to reverse engineer the REST API, but for me the data structure is not clear. It...\\n\\nI am trying to support Penpot in the Luisa framework (https://luisa.cloud/). I was trying to reverse engineer the REST API, but for me the data structure is not clear. It\\u00B4s quite different from the JSON Figma or Sketch produce... ... :y\\u0022, 113, \\u0022:hide-fill-on-export\\u0022, false, \\u0022^O\\u0022, 0, \\u0022^P\\u0022,\\u2026] I assume this is a list of key value pairs. But I would like to confirm this. Are there somewhere schema defined? I would like to be able to parse the REST service. Getting some SVG oder JSON object based API. ... The api output uses transit format. On the end is a valid JSON using the most optimized data stuctures with cached prop names. You can use a library for correctly parsing it: https://github.com/cognitect/transit-js. Also you can use the \\u0026transit_verbose=1 query parameter for more verbose/human readable transit format output \\u00B7 Sign up for free to join this conversation on GitHub.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/penpot/penpot/issues/2439\"}},{\"type\":\"knowledge\",\"title\":\"penpot-mcp \\u00B7 PyPI\",\"url\":\"https://pypi.org/project/penpot-mcp/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"pypi.org\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=pypi.org\",\"site_name\":\"PyPI\"},\"is_missing\":false,\"text\":\"PENPOT_API_URL=https://design.penpot.app/api PENPOT_USERNAME=your_penpot_username PENPOT_PASSWORD=your_penpot_password ... Use in Cursor: Once configured, you can interact with your Penpot designs directly in Cursor by asking questions like: ... penpot_mcp/ \\u251C\\u2500\\u2500 api/ # Penpot API client \\u251C\\u2500\\u2500 server/ # MCP server implementation \\u2502 \\u251C\\u2500\\u2500 mcp_server.py # Main MCP server \\u2502 \\u2514\\u2500\\u2500 client.py # Client implementation \\u251C\\u2500\\u2500 tools/ # Utility tools \\u2502 \\u251C\\u2500\\u2500 cli/ # Command-line interfaces \\u2502 \\u2514\\u2500\\u2500 penpot_tree.py # Penpot object tree visualization \\u251C\\u2500\\u2500 resources/ # Resource files and schemas \\u2514\\u2500\\u2500 utils/ # Helper utilities ...\\n\\nPenpot MCP is a revolutionary Model Context Protocol (MCP) server that bridges the gap between AI language models and Penpot, the open-source design and prototyping platform. This integration enables AI assistants like Claude (in both Claude Desktop and Cursor IDE) to understand, analyze, and interact with your design files programmatically. \\uD83E\\uDD16 AI-Native Design Analysis: Let Claude AI analyze your UI/UX designs, provide feedback, and suggest improvements \\u00B7 \\u26A1 Automated Design Workflows: Streamline repetitive design tasks with AI-powered automation \\u00B7 \\uD83D\\uDD0D Intelligent Design Search: Find design components and patterns across your projects using natural language \\u00B7 \\uD83D\\uDCCA Design System Management: Automatically document and maintain design systems with AI assistance \\u00B7 \\uD83C\\uDFA8 Cross-Platform Integration: Works with any MCP-compatible AI assistant (Claude Desktop, Cursor IDE, etc.)\\n\\nReal-time Design Access: Direct integration with Penpot\\u0027s API for live design data \\u00B7 Component Analysis: AI-powered analysis of design components and layouts \\u00B7 Export Automation: Programmatic export of design assets in multiple formats \\u00B7 Design Validation: Automated design system compliance checking \\u00B7 Command-line Utilities: Powerful CLI tools for design file analysis and validation \\u00B7 Python SDK: Comprehensive Python library for custom integrations \\u00B7 REST API: HTTP endpoints for web application integration \\u00B7 Extensible Architecture: Plugin system for custom AI workflows \\u00B7 Claude Desktop \\u0026 Cursor Integration: Native support for Claude AI assistant in both Claude Desktop and Cursor IDE \\u00B7 Design Context Sharing: Provide design context to AI models for better responses \\u00B7 Visual Component Recognition: AI can \\u0022see\\u0022 and understand design components \\u00B7\\n\\n# Generate a tree visualization of a Penpot file penpot-tree path/to/penpot_file.json # Validate a Penpot file against the schema penpot-validate path/to/penpot_file.json \\u00B7 # Start your MCP server in one terminal python -m penpot_mcp.server.mcp_server # In another terminal, use mcp-cli to monitor and interact with your server python -m mcp.cli monitor python -m penpot_mcp.server.mcp_server # Or connect to an already running server on a specific port python -m mcp.cli monitor --port 5000 \\u00B7 # Start your MCP server in one terminal python -m penpot_mcp.server.mcp_server # In another terminal, run the MCP Inspector (requires Node.js) npx @modelcontextprotocol/inspector ... The Penpot MCP server can be integrated with AI assistants using the Model Context Protocol. It supports both Claude Desktop and Cursor IDE for seamless design workflow automation.\\n\\nPENPOT_API_URL=https://design.penpot.app/api PENPOT_USERNAME=your_penpot_username PENPOT_PASSWORD=your_penpot_password ... Use in Cursor: Once configured, you can interact with your Penpot designs directly in Cursor by asking questions like: ... penpot_mcp/ \\u251C\\u2500\\u2500 api/ # Penpot API client \\u251C\\u2500\\u2500 server/ # MCP server implementation \\u2502 \\u251C\\u2500\\u2500 mcp_server.py # Main MCP server \\u2502 \\u2514\\u2500\\u2500 client.py # Client implementation \\u251C\\u2500\\u2500 tools/ # Utility tools \\u2502 \\u251C\\u2500\\u2500 cli/ # Command-line interfaces \\u2502 \\u2514\\u2500\\u2500 penpot_tree.py # Penpot object tree visualization \\u251C\\u2500\\u2500 resources/ # Resource files and schemas \\u2514\\u2500\\u2500 utils/ # Helper utilities ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://pypi.org/project/penpot-mcp/\"}},{\"type\":\"knowledge\",\"title\":\"API example for modifing a text component - Ask the community - Penpot Community\",\"url\":\"https://community.penpot.app/t/api-example-for-modifing-a-text-component/8297\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Hi, I am trying to build a solutions to translate design assets in penpot. I am looking for a bit of guidance regarding the update-file call with REST API. (doc is here) I have managed to extract the content object by analyzing the json in get-file call, so far so good. (Code here) But I have some issue figuring out how to update a text field using the API, if anyone could point me at a basic example of some usage of the update API (ideally for a text component) that would be awesome! My go...\\n\\nHi, I am trying to build a solutions to translate design assets in penpot. I am looking for a bit of guidance regarding the update-file call with REST API. (doc is here) I have managed to extract the content object by\\u2026\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"March 29, 2025\",\"url\":\"https://community.penpot.app/t/api-example-for-modifing-a-text-component/8297\"}},{\"type\":\"knowledge\",\"title\":\"Integrate your tech stack with Penpot\",\"url\":\"https://penpot.app/integrations-api\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"Get extensive access to objects and properties to enable external rendering, workflow automation, enhanced app functionality, and more. ... Use access tokens as an alternative login authentication. They can allow an app to access Penpot\\u0026#x27;s API. Outbound webhooks are event calls from Penpot to other applications. They notify that some event occurred, e.g. a file has been created or updated, a comment has been added, etc. Our plugin system brings the flexibility that devs need to create and publish their own custom extensions. ... Export your design tokens from Penpot into ready-to-use code or parseable data files. ... Integrate Penpot as a framework to build e-commerce websites. ... Find out how you can integrate your tools with Penpot on this demo video.\\n\\nGet extensive access to objects and properties to enable external rendering, workflow automation, enhanced app functionality, and more. ... Use access tokens as an alternative login authentication. They can allow an app to access Penpot\\u0027s API. Outbound webhooks are event calls from Penpot to other applications. They notify that some event occurred, e.g. a file has been created or updated, a comment has been added, etc. Our plugin system brings the flexibility that devs need to create and publish their own custom extensions. ... Export your design tokens from Penpot into ready-to-use code or parseable data files. ... Integrate Penpot as a framework to build e-commerce websites. ... Find out how you can integrate your tools with Penpot on this demo video.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://penpot.app/integrations-api\"}},{\"type\":\"knowledge\",\"title\":\"1. Getting started - Help center - Penpot\",\"url\":\"https://help.penpot.app/plugins/getting-started/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"The plugin.ts file is where you write code to interact with the Penpot API using TypeScript. This file is then compiled into plugin.js which is the final JavaScript code that runs the plugin.\\n\\nPenpot\\u0027s plugin system allows you to add new features to the platform through independent modules called plugins. These plugins run separately from the main Penpot app, inside iframes, which are like small, isolated browser windows within the app. Plugins communicate with Penpot by sending and receiving messages through the iframe. The manifest.json file contains the basic information about the plugin. It defines the plugin\\u0027s name, description, the main code file, and the permissions it requires. The structure of the manifest.json file looks like this: { \\u0022name\\u0022: \\u0022Your plugin name\\u0022, \\u0022description\\u0022: \\u0022Your plugin description\\u0022, \\u0022code\\u0022: \\u0022plugin.js\\u0022, \\u0022icon\\u0022: \\u0022Your icon\\u0022, \\u0022permissions\\u0022: [ \\u0022content:read\\u0022, \\u0022content:write\\u0022, \\u0022library:read\\u0022, \\u0022library:write\\u0022, \\u0022user:read\\u0022, \\u0022comment:read\\u0022, \\u0022comment:write\\u0022, \\u0022allow:downloads\\u0022, \\u0022allow:localstorage\\u0022 ] } Name and description: your plugin\\u0027s basic information, which will be displayed in the plugin manager modal.\\n\\nThe plugin.ts file is where you write code to interact with the Penpot API using TypeScript. This file is then compiled into plugin.js which is the final JavaScript code that runs the plugin. You don\\u0027t write plugin.js directly; it\\u0027s generated from the plugin.ts file. This is also the only file where you can use the Penpot object. Do not try to use the Penpot object in your plugin interface scripts. ... Penpot plugin samples. You may have noticed that we\\u0027re using TypeScript in our plugin files, but what is it, and why? TypeScript is like JavaScript with extra rules. These rules help you catch mistakes early, before you run your code. It makes your code more reliable and easier to manage, especially in big projects. We\\u0027re using TypeScript to make working with the Penpot API easier, as it provides autocompletion and instant access to documentation. However, even with TypeScript\\u2019s powerful features, you\\u0027ll still need to include the @penpot/plugin-types npm package, which contains the typin\\n\\nThis ensures that TypeScript can fully understand and work with the API. You can install the package in any project with npm install @penpot/plugin-types. You can check the details in @penpot/plugin-types package.\\n\\ncontent:read: Allows reading of content-related data. Grants read access to all endpoints and operations dealing with content. Typical use cases: viewing shapes, pages, or other design elements in a project; accessing the properties and settings of content within the application. content:write: Allows writing or modifying content-related data. Grants write access to all endpoints and operations dealing with content modifications, except those marked as read-only. Typical use cases: adding, updating, or deleting shapes and elements in a design; uploading media or other assets to the project. user:read: Allows reading of user-related data. Grants read access to all endpoints and operations dealing with user data. Typical use cases: viewing user profiles and their associated information or listing active users in a particular context or project. library:read: Allows reading of library-related data and assets.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://help.penpot.app/plugins/getting-started/\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 18 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"d69cf4a1-5a5d-4ea4-bc7f-77582404c533\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

