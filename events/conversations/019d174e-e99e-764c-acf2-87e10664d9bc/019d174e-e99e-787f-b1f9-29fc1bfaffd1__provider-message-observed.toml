text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"GitHub - penpot/penpot-mcp: An MCP server to enable AI agents to work with Penpot designs\",\"url\":\"https://github.com/penpot/penpot-mcp\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"The MCP server communicates with Penpot via a dedicated Penpot MCP plugin, which connects to the MCP server via WebSocket. This repository is a monorepo containing four main components: ... The core components are written in TypeScript, rendering ...\\n\\nBrowser Compatibility Starting with Chromium version 142, Google has hardened the private network access (PNA) enforcement layer. This means that newer Chromium-based browsers (Chrome, Edge, Vivaldi, Opera, Brave, etc.) will not allow Penpot to connect to a local plugin server by default. ... We are working on a solution to this issue. ... In the plugin UI, click \\u0022Connect to MCP server\\u0022. The connection status should change from \\u0022Not connected\\u0022 to \\u0022Connected to MCP server\\u0022. (Check the browser\\u0027s developer console for WebSocket connection logs. Check the MCP server terminal for WebSocket connection messages.) ... Do not close the plugin\\u0027s UI while using the MCP server, as this will close the connection. By default, the server runs on port 4401 and provides: Modern Streamable HTTP endpoint: http://localhost:4401/mcp ... These endpoints can be used directly by MCP clients that support them.\\n\\nAfter the restart, you should see the MCP server listed when clicking on the \\u0022Search and tools\\u0022 icon at the bottom of the prompt input area. To add the Penpot MCP server to a Claude Code project, issue the command \\u00B7\\n\\nclaude mcp add penpot -t http http://localhost:4401/mcp\\n\\nAn MCP server to enable AI agents to work with Penpot designs - penpot/penpot-mcp\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/penpot/penpot-mcp\"}},{\"type\":\"knowledge\",\"title\":\"GitHub - montevive/penpot-mcp: Penpot MCP server\",\"url\":\"https://github.com/montevive/penpot-mcp\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"MCP Protocol Implementation: Full compliance with Model Context Protocol standards \\u00B7 Real-time Design Access: Direct integration with Penpot\\u0026#x27;s API for live design data \\u00B7 Component Analysis: AI-powered analysis of design components and layouts \\u00B7 Export Automation: Programmatic export of design assets in multiple formats \\u00B7 Design Validation: Automated design system compliance checking \\u00B7 Command-line Utilities: Powerful CLI tools for design file analysis and validation \\u00B7 Python SDK: Comprehensive Python library for custom integrations \\u00B7 REST API: HTTP endpoints for web application integration \\u00B7 Extensible Architecture: Plugin system for custom AI workflows \\u00B7 Claude Desktop \\u0026amp; Cursor Integration: Native support for Claude AI assistant in both Claude Desktop and Cursor IDE \\u00B7 Design Context Sharing: Provide design context to AI models for better responses \\u00B7\\n\\nMCP Protocol Implementation: Full compliance with Model Context Protocol standards \\u00B7 Real-time Design Access: Direct integration with Penpot\\u0027s API for live design data \\u00B7 Component Analysis: AI-powered analysis of design components and layouts \\u00B7 Export Automation: Programmatic export of design assets in multiple formats \\u00B7 Design Validation: Automated design system compliance checking \\u00B7 Command-line Utilities: Powerful CLI tools for design file analysis and validation \\u00B7 Python SDK: Comprehensive Python library for custom integrations \\u00B7 REST API: HTTP endpoints for web application integration \\u00B7 Extensible Architecture: Plugin system for custom AI workflows \\u00B7 Claude Desktop \\u0026 Cursor Integration: Native support for Claude AI assistant in both Claude Desktop and Cursor IDE \\u00B7 Design Context Sharing: Provide design context to AI models for better responses \\u00B7\\n\\n# Install directly with uvx (when published to PyPI) uvx penpot-mcp # For local development, use uvx with local path uvx --from . penpot-mcp # Or install in a project with uv uv add penpot-mcp \\u00B7 # Clone the repository git clone https://github.com/montevive/penpot-mcp.git cd penpot-mcp # Using uv (recommended) uv sync uv run penpot-mcp # Or using traditional pip python -m venv .venv source .venv/bin/activate # On Windows: .venv\\\\Scripts\\\\activate pip install -e . Create a .env file based on env.example with your Penpot credentials: PENPOT_API_URL=https://design.penpot.app/api PENPOT_USERNAME=your_penpot_username PENPOT_PASSWORD=your_penpot_password PORT=5000 DEBUG=true \\u00B7 \\u26A0\\uFE0F CloudFlare Protection Notice: The Penpot cloud site (penpot.app) uses CloudFlare protection that may occasionally block API requests. If you encounter authentication errors or blocked requests: Open your web browser and navigate to https://design.penpot.app ...\\n\\n# Using uvx (when published to PyPI) uvx penpot-mcp # Using uvx for local development uvx --from . penpot-mcp # Using uv in a project (recommended for local development) uv run penpot-mcp # Using the entry point (if installed) penpot-mcp # Or using the module directly python -m penpot_mcp.server.mcp_server ... # Test API connection with debug output python -m penpot_mcp.api.penpot_api --debug list-projects # Get details for a specific project python -m penpot_mcp.api.penpot_api --debug get-project --id YOUR_PROJECT_ID # List files in a project python -m penpot_mcp.api.penpot_api --debug list-files --project-id YOUR_PROJECT_ID # Get file details python -m penpot_mcp.api.penpot_api --debug get-file --file-id YOUR_FILE_ID ... # Generate a tree visualization of a Penpot file penpot-tree path/to/penpot_file.json # Validate a Penpot file against the schema penpot-validate path/to/penpot_file.json \\u00B7\\n\\n# Start your MCP server in one terminal python -m penpot_mcp.server.mcp_server # In another terminal, run the MCP Inspector (requires Node.js) npx @modelcontextprotocol/inspector ... The Penpot MCP server can be integrated with AI assistants using the Model Context Protocol. It supports both Claude Desktop and Cursor IDE for seamless design workflow automation. For detailed Claude Desktop setup instructions, see CLAUDE_INTEGRATION.md.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/montevive/penpot-mcp\"}},{\"type\":\"knowledge\",\"title\":\"The Penpot MCP Server | MCP Servers \\u00B7 LobeHub\",\"url\":\"https://lobehub.com/mcp/oraios-penpot-mcp\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"lobehub.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=lobehub.com\",\"site_name\":\"LobeHub\"},\"is_missing\":false,\"text\":\"The MCP server communicates with Penpot via a dedicated Penpot MCP plugin, which connects to the MCP server via WebSocket. This repository is a monorepo containing four main components: ... The core components are written in TypeScript, rendering ...\\n\\nThis project enables LLMs to interact directly with Penpot design projects using the model context protocol (MCP), building on Penpot\\u0027s plugin API to facilitate design data retrieval, modification, and creation. This project enables LLMs to interact directly with Penpot design projects using the model context protocol (MCP), building on Penpot\\u0027s plugin API to facilitate design data retrieval, modification, and creation. The Penpot MCP server exposes tools to AI clients (LLMs), which support the retrieval of design data as well as the modification and creation of design elements. The MCP server communicates with Penpot via a dedicated Penpot MCP plugin, which connects to the MCP server via WebSocket. This repository is a monorepo containing four main components: ... The core components are written in TypeScript, rendering interactions with the Penpot Plugin API both natural and type-safe.\\n\\nAfter the restart, you should see the MCP server listed when clicking on the \\u0022Search and tools\\u0022 icon at the bottom of the prompt input area. To add the Penpot MCP server to a Claude Code project, issue the command ... A Model Context Protocol (MCP) server that provides browser automation capabilities using Playwright. Enables LLMs to interact with web pages through structured accessibility snapshots without vision models. Requires Node.js 18 or newer. Configuration file path can be specified via the --config option. ... MCP server for Context7 that provides up-to-date, version-specific documentation and code examples for libraries directly into your prompt. Requires Node.js \\u003E= v18.0.0 runtime. ... BlenderMCP connects Blender to Claude AI through the Model Context Protocol (MCP), allowing Claude to directly interact with and control Blender. This integration enables prompt assisted 3D modeling, scene creation, and manipulation.\\n\\nSince Claude Desktop natively supports only stdio transport, you will need to use a proxy like mcp-remote. Install it as described above. To add the server to Claude Desktop\\u0027s configuration, locate the configuration file (or find it via Menu / File / Settings / Developer): Windows: %APPDATA%/Claude/claude_desktop_config.json \\u00B7 macOS: ~/Library/Application Support/Claude/claude_desktop_config.json \\u00B7 Linux: ~/.config/Claude/claude_desktop_config.json \\u00B7 Add a penpot entry under mcpServers with the following content: ... { \\u0022mcpServers\\u0022: { \\u0022penpot\\u0022: { \\u0022command\\u0022: \\u0022npx\\u0022, \\u0022args\\u0022: [\\u0022-y\\u0022, \\u0022mcp-remote\\u0022, \\u0022http://localhost:4401/sse\\u0022, \\u0022--allow-http\\u0022] } } } After updating the configuration file, restart Claude Desktop completely for the changes to take effect. :warning: Be sure to fully quit the app for the changes to take effect; closing the window is not sufficient.\\n\\nMCP server for Firecrawl web scraping integration. Supports both cloud and self-hosted instances. Features include web scraping, batch processing, structured data extraction, and LLM-powered content analysis. Requires FIRECRAWL_API_KEY environment variable for API access. Optional FIRECRAWL_API_URL for self-hosted instance configuration. ... Postgres MCP Pro is an open source Model Context Protocol (MCP) server providing index tuning, explain plans, health checks, and safe SQL execution for PostgreSQL databases. Requires a PostgreSQL database connection URI configured via the DATABASE_URI environment variable. ... Magic MCP UI builder by 21st.dev. Requires an API key generated from https://21st.dev/magic/console to operate. ... This server can only run on the client\\u0027s local device, requiring installation and relying on local resources. ... Launch Self-Efficacy.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"1 week ago\",\"url\":\"https://lobehub.com/mcp/oraios-penpot-mcp\"}},{\"type\":\"knowledge\",\"title\":\"Penpot MCP server for AI agents\",\"url\":\"https://playbooks.com/mcp/montevive-penpot\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"playbooks.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=playbooks.com\",\"site_name\":\"Playbooks\"},\"is_missing\":false,\"text\":\"{ \\u0026quot;mcpServers\\u0026quot;: { \\u0026quot;penpot\\u0026quot;: { \\u0026quot;command\\u0026quot;: \\u0026quot;uvx\\u0026quot;, \\u0026quot;args\\u0026quot;: [\\u0026quot;penpot-mcp\\u0026quot;], \\u0026quot;env\\u0026quot;: { \\u0026quot;PENPOT_API_URL\\u0026quot;: \\u0026quot;https://design.penpot.app/api\\u0026quot;, \\u0026quot;PENPOT_USERNAME\\u0026quot;: \\u0026quot;your_penpot_username\\u0026quot;, \\u0026quot;PENPOT_PASSWORD\\u0026quot;: \\u0026quot;your_penpot_password\\u0026quot; } } } } ... { \\u0026quot;mcpServers\\u0026quot;: { \\u0026quot;penpot\\u0026quot;: { \\u0026quot;command\\u0026quot;: \\u0026quot;uvx\\u0026quot;, \\u0026quot;args\\u0026quot;: [\\u0026quot;penpot-mcp\\u0026quot;], \\u0026quot;env\\u0026quot;: { \\u0026quot;PENPOT_API_URL\\u0026quot;: \\u0026quot;https://design.penpot.app/api\\u0026quot;, \\u0026quot;PENPOT_USERNAME\\u0026quot;: \\u0026quot;your_penpot_username\\u0026quot;, \\u0026quot;PENPOT_PASSWORD\\u0026quot;: \\u0026quot;your_penpot_password\\u0026quot; } } } } Alternative: Use environment variables by creating a .env file: PENPOT_API_URL=https://design.penpot.app/api PENPOT_USERNAME=your_penpot_username PENPOT_PASSWORD=your_penpot_password ... claude mcp add-json \\u0026quot;penpot\\u0026quot; \\u0026#x27;{\\u0026quot;command\\u0026quot;:\\u0026quot;uvx\\u0026quot;,\\u0026quot;args\\u0026quot;:[\\u0026quot;penpot-mcp\\u0026quot;],\\u0026quot;env\\u0026quot;:{\\u0026quot;PENPOT_API_URL\\u0026quot;:\\u0026quot;https://design.penpot.app/api\\u0026quot;,\\u0026quot;PENPOT_USERNAME\\u0026quot;:\\u0026quot;your_penpot_username\\u0026quot;,\\u0026quot;PENPOT_PASSWORD\\u0026quot;:\\u0026quot;your_penpot_password\\u0026quot;}}\\u0026#x27; See the official Claude Code MCP documentation for more details.\\n\\nPenpot MCP Server enables AI-powered design workflow automation by connecting Claude AI and other LLMs to Penpot designs via Model Context Protocol. This integration allows AI assistants to understand, analyze, and interact with your design files programmatically, streamlining design tasks and enabling intelligent design analysis. ... # Install directly with uvx uvx penpot-mcp # For local development uvx --from . penpot-mcp # Or install in a project with uv uv add penpot-mcp \\u00B7 # Clone the repository git clone https://github.com/montevive/penpot-mcp.git cd penpot-mcp # Using uv (recommended) uv sync uv run penpot-mcp # Or using traditional pip python -m venv .venv source .venv/bin/activate # On Windows: .venv\\\\Scripts\\\\activate pip install -e . Create a .env file based on env.example with your Penpot credentials: PENPOT_API_URL=https://design.penpot.app/api PENPOT_USERNAME=your_penpot_username PENPOT_PASSWORD=your_penpot_password PORT=5000 DEBUG=true \\u00B7\\n\\n# Using uvx uvx penpot-mcp # Using uvx for local development uvx --from . penpot-mcp # Using uv in a project uv run penpot-mcp # Using the entry point penpot-mcp # Or using the module directly python -m penpot_mcp.server.mcp_server ... # Test API connection with debug output python -m penpot_mcp.api.penpot_api --debug list-projects # Get details for a specific project python -m penpot_mcp.api.penpot_api --debug get-project --id YOUR_PROJECT_ID # List files in a project python -m penpot_mcp.api.penpot_api --debug list-files --project-id YOUR_PROJECT_ID # Get file details python -m penpot_mcp.api.penpot_api --debug get-file --file-id YOUR_FILE_ID ... # Generate a tree visualization of a Penpot file penpot-tree path/to/penpot_file.json # Validate a Penpot file against the schema penpot-validate path/to/penpot_file.json \\u00B7 # Start your MCP server in one terminal python -m penpot_mcp.server.mcp_server # In another terminal, use mcp-cli to monitor and interact with your server python -m mcp.c\\n\\n{ \\u0022mcpServers\\u0022: { \\u0022penpot\\u0022: { \\u0022command\\u0022: \\u0022uvx\\u0022, \\u0022args\\u0022: [\\u0022penpot-mcp\\u0022], \\u0022env\\u0022: { \\u0022PENPOT_API_URL\\u0022: \\u0022https://design.penpot.app/api\\u0022, \\u0022PENPOT_USERNAME\\u0022: \\u0022your_penpot_username\\u0022, \\u0022PENPOT_PASSWORD\\u0022: \\u0022your_penpot_password\\u0022 } } } } ... { \\u0022mcpServers\\u0022: { \\u0022penpot\\u0022: { \\u0022command\\u0022: \\u0022uvx\\u0022, \\u0022args\\u0022: [\\u0022penpot-mcp\\u0022], \\u0022env\\u0022: { \\u0022PENPOT_API_URL\\u0022: \\u0022https://design.penpot.app/api\\u0022, \\u0022PENPOT_USERNAME\\u0022: \\u0022your_penpot_username\\u0022, \\u0022PENPOT_PASSWORD\\u0022: \\u0022your_penpot_password\\u0022 } } } } Alternative: Use environment variables by creating a .env file: PENPOT_API_URL=https://design.penpot.app/api PENPOT_USERNAME=your_penpot_username PENPOT_PASSWORD=your_penpot_password ... claude mcp add-json \\u0022penpot\\u0022 \\u0027{\\u0022command\\u0022:\\u0022uvx\\u0022,\\u0022args\\u0022:[\\u0022penpot-mcp\\u0022],\\u0022env\\u0022:{\\u0022PENPOT_API_URL\\u0022:\\u0022https://design.penpot.app/api\\u0022,\\u0022PENPOT_USERNAME\\u0022:\\u0022your_penpot_username\\u0022,\\u0022PENPOT_PASSWORD\\u0022:\\u0022your_penpot_password\\u0022}}\\u0027 See the official Claude Code MCP documentation for more details.\\n\\n{ \\u0022mcpServers\\u0022: { \\u0022penpot\\u0022: { \\u0022command\\u0022: \\u0022uvx\\u0022, \\u0022args\\u0022: [ \\u0022penpot-mcp\\u0022 ], \\u0022env\\u0022: { \\u0022PENPOT_API_URL\\u0022: \\u0022https://design.penpot.app/api\\u0022, \\u0022PENPOT_USERNAME\\u0022: \\u0022your_penpot_username\\u0022, \\u0022PENPOT_PASSWORD\\u0022: \\u0022your_penpot_password\\u0022 } } } } To add an MCP server to a project you can create a new .cursor/mcp.json file or add it to the existing one. This will look exactly the same as the global MCP server example above. Once the server is installed, you might need to head back to Settings \\u003E MCP and click the refresh button. The Cursor agent will then be able to see the available tools the added MCP server has available and will call them when it needs to. You can also explicitly ask the agent to use the tool by mentioning the tool name and describing what the function does. ... { \\u0022mcpServers\\u0022: { \\u0022penpot\\u0022: { \\u0022command\\u0022: \\u0022uvx\\u0022, \\u0022args\\u0022: [ \\u0022penpot-mcp\\u0022 ], \\u0022env\\u0022: { \\u0022PENPOT_API_URL\\u0022: \\u0022https://design.penpot.app/api\\u0022, \\u0022PENPOT_USERNAME\\u0022: \\u0022your_penpot_username\\u0022, \\u0022PENPOT_PASSWORD\\u0022: \\u0022your_penpot_password\\u0022 } } } } 3\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://playbooks.com/mcp/montevive-penpot\"}},{\"type\":\"knowledge\",\"title\":\"penpot/penpot-mcp | DeepWiki\",\"url\":\"https://deepwiki.com/penpot/penpot-mcp\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"deepwiki.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=deepwiki.com\",\"site_name\":\"DeepWiki\"},\"is_missing\":false,\"text\":\"System Architecture: Three-Layer Communication Model \\u00B7 Sources: README.md13-43 mcp-server/src/index.ts1-100 mcp-server/src/PenpotMcpServer.ts1-300 penpot-plugin/src/plugin.ts1-200 \\u00B7 The system operates through a request-response pattern: AI Tool Invocation: An AI client invokes an MCP tool ...\\n\\nThis document provides a high-level introduction to the Penpot MCP (Model Context Protocol) project. It covers the system\\u0027s purpose, architecture, key components, and how they interact to enable AI agents to interact with Penpot design files programmatically. ... The Penpot MCP project enables Large Language Models (LLMs) and AI agents to interact directly with Penpot design projects through the Model Context Protocol (MCP). The system provides programmatic access to Penpot\\u0027s design data, allowing AI agents to retrieve, modify, and create design elements using Penpot\\u0027s plugin API. The system consists of three primary components working together: MCP Server (mcp-server/) - Exposes MCP tools to AI clients and manages communication \\u00B7 Penpot Plugin (penpot-plugin/) - Executes operations within Penpot using the Plugin API \\u00B7 Common Types (common/) - Shared TypeScript definitions ensuring type safety \\u00B7\\n\\nSystem Architecture: Three-Layer Communication Model \\u00B7 Sources: README.md13-43 mcp-server/src/index.ts1-100 mcp-server/src/PenpotMcpServer.ts1-300 penpot-plugin/src/plugin.ts1-200 \\u00B7 The system operates through a request-response pattern: AI Tool Invocation: An AI client invokes an MCP tool (e.g., execute_code) with parameters \\u00B7 Tool Processing: The PenpotMcpServer routes the request to the appropriate Tool instance \\u00B7 Task Creation: The Tool creates a PluginTask object with task-specific parameters \\u00B7 WebSocket Transfer: The PluginBridge serializes the task and sends it via WebSocket to the plugin \\u00B7 Task Execution: The plugin\\u0027s TaskHandler executes the task using Penpot\\u0027s API \\u00B7 Response Return: Results are sent back through the WebSocket, correlated by UUID, and returned to the AI client \\u00B7 Sources: mcp-server/src/PluginBridge.ts1-200 penpot-plugin/src/plugin.ts1-200 \\u00B7\\n\\ncommon/: Contains shared TypeScript type definitions used by both server and plugin. Exports PluginTaskRequest, PluginTaskResponse, and PluginTaskResult interfaces. mcp-server/: Depends on @penpot-mcp/common and @modelcontextprotocol/sdk. Implements the MCP protocol server. penpot-plugin/: Depends on @penpot-mcp/common. Runs in the browser and uses Penpot\\u0027s Plugin API. python-scripts/: Python utilities for preparing API documentation data. Sources: common/src/types.ts1-50 mcp-server/package.json1-50 penpot-plugin/package.json1-50 \\u00B7 The PenpotMcpServer exposes multiple ports for different purposes: ... Sources: mcp-server/src/tools/1-500 mcp-server/src/tasks/1-300 penpot-plugin/src/task-handlers/1-400 \\u00B7 The PluginBridge manages bidirectional communication between server and plugin: ... Sources: mcp-server/src/PluginBridge.ts1-200 common/src/types.ts1-50 .serena/memories/project_overview.md63-68 \\u00B7\\n\\nSources: mcp-server/src/tools/ExecuteCodeTool.ts1-100 mcp-server/src/PluginBridge.ts1-200 penpot-plugin/src/plugin.ts1-200 penpot-plugin/src/task-handlers/ExecuteCodeTaskHandler.ts1-150 ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://deepwiki.com/penpot/penpot-mcp\"}},{\"type\":\"knowledge\",\"title\":\"penpot-mcp \\u00B7 PyPI\",\"url\":\"https://pypi.org/project/penpot-mcp/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"pypi.org\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=pypi.org\",\"site_name\":\"PyPI\"},\"is_missing\":false,\"text\":\"penpot_mcp/ \\u251C\\u2500\\u2500 api/ # Penpot API client \\u251C\\u2500\\u2500 server/ # MCP server implementation \\u2502 \\u251C\\u2500\\u2500 mcp_server.py # Main MCP server \\u2502 \\u2514\\u2500\\u2500 client.py # Client implementation \\u251C\\u2500\\u2500 tools/ # Utility tools \\u2502 \\u251C\\u2500\\u2500 cli/ # Command-line interfaces \\u2502 \\u2514\\u2500\\u2500 penpot_tree.py # Penpot object tree visualization \\u251C\\u2500\\u2500 resources/ # Resource files and schemas \\u2514\\u2500\\u2500 utils/ # Helper utilities ...\\n\\nMCP Protocol Implementation: Full compliance with Model Context Protocol standards \\u00B7 Real-time Design Access: Direct integration with Penpot\\u0027s API for live design data \\u00B7 Component Analysis: AI-powered analysis of design components and layouts \\u00B7 Export Automation: Programmatic export of design assets in multiple formats \\u00B7 Design Validation: Automated design system compliance checking \\u00B7 Command-line Utilities: Powerful CLI tools for design file analysis and validation \\u00B7 Python SDK: Comprehensive Python library for custom integrations \\u00B7 REST API: HTTP endpoints for web application integration \\u00B7 Extensible Architecture: Plugin system for custom AI workflows \\u00B7 Claude Desktop \\u0026 Cursor Integration: Native support for Claude AI assistant in both Claude Desktop and Cursor IDE \\u00B7 Design Context Sharing: Provide design context to AI models for better responses \\u00B7\\n\\nDetails for the file penpot_mcp-0.1.2.tar.gz. ... See more details on using hashes here. Details for the file penpot_mcp-0.1.2-py3-none-any.whl. ... See more details on using hashes here.\\n\\npenpot_mcp/ \\u251C\\u2500\\u2500 api/ # Penpot API client \\u251C\\u2500\\u2500 server/ # MCP server implementation \\u2502 \\u251C\\u2500\\u2500 mcp_server.py # Main MCP server \\u2502 \\u2514\\u2500\\u2500 client.py # Client implementation \\u251C\\u2500\\u2500 tools/ # Utility tools \\u2502 \\u251C\\u2500\\u2500 cli/ # Command-line interfaces \\u2502 \\u2514\\u2500\\u2500 penpot_tree.py # Penpot object tree visualization \\u251C\\u2500\\u2500 resources/ # Resource files and schemas \\u2514\\u2500\\u2500 utils/ # Helper utilities ...\\n\\n# Using uvx (when published to PyPI) uvx penpot-mcp # Using uvx for local development uvx --from . penpot-mcp # Using uv in a project (recommended for local development) uv run penpot-mcp # Using the entry point (if installed) penpot-mcp # Or using the module directly python -m penpot_mcp.server.mcp_server ... # Test API connection with debug output python -m penpot_mcp.api.penpot_api --debug list-projects # Get details for a specific project python -m penpot_mcp.api.penpot_api --debug get-project --id YOUR_PROJECT_ID # List files in a project python -m penpot_mcp.api.penpot_api --debug list-files --project-id YOUR_PROJECT_ID # Get file details python -m penpot_mcp.api.penpot_api --debug get-file --file-id YOUR_FILE_ID ... # Generate a tree visualization of a Penpot file penpot-tree path/to/penpot_file.json # Validate a Penpot file against the schema penpot-validate path/to/penpot_file.json \\u00B7\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://pypi.org/project/penpot-mcp/\"}},{\"type\":\"knowledge\",\"title\":\"Penpot MCP Server | Awesome MCP Servers\",\"url\":\"https://mcpservers.org/servers/montevive/penpot-mcp\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"mcpservers.org\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=mcpservers.org\",\"site_name\":\"MCP Servers\"},\"is_missing\":false,\"text\":\"MCP Protocol Implementation: Full compliance with Model Context Protocol standards \\u00B7 Real-time Design Access: Direct integration with Penpot\\u0026#x27;s API for live design data \\u00B7 Component Analysis: AI-powered analysis of design components and layouts \\u00B7 Export Automation: Programmatic export of design assets in multiple formats \\u00B7 Design Validation: Automated design system compliance checking \\u00B7 Command-line Utilities: Powerful CLI tools for design file analysis and validation \\u00B7 Python SDK: Comprehensive Python library for custom integrations \\u00B7 REST API: HTTP endpoints for web application integration \\u00B7 Extensible Architecture: Plugin system for custom AI workflows \\u00B7 Claude Desktop \\u0026amp; Cursor Integration: Native support for Claude AI assistant in both Claude Desktop and Cursor IDE \\u00B7 Design Context Sharing: Provide design context to AI models for better responses \\u00B7\\n\\nMCP Protocol Implementation: Full compliance with Model Context Protocol standards \\u00B7 Real-time Design Access: Direct integration with Penpot\\u0027s API for live design data \\u00B7 Component Analysis: AI-powered analysis of design components and layouts \\u00B7 Export Automation: Programmatic export of design assets in multiple formats \\u00B7 Design Validation: Automated design system compliance checking \\u00B7 Command-line Utilities: Powerful CLI tools for design file analysis and validation \\u00B7 Python SDK: Comprehensive Python library for custom integrations \\u00B7 REST API: HTTP endpoints for web application integration \\u00B7 Extensible Architecture: Plugin system for custom AI workflows \\u00B7 Claude Desktop \\u0026 Cursor Integration: Native support for Claude AI assistant in both Claude Desktop and Cursor IDE \\u00B7 Design Context Sharing: Provide design context to AI models for better responses \\u00B7\\n\\n# Install directly with uvx (when published to PyPI) uvx penpot-mcp # For local development, use uvx with local path uvx --from . penpot-mcp # Or install in a project with uv uv add penpot-mcp \\u00B7 # Clone the repository git clone https://github.com/montevive/penpot-mcp.git cd penpot-mcp # Using uv (recommended) uv sync uv run penpot-mcp # Or using traditional pip python -m venv .venv source .venv/bin/activate # On Windows: .venv\\\\Scripts\\\\activate pip install -e . Create a .env file based on env.example with your Penpot credentials: PENPOT_API_URL=https://design.penpot.app/api PENPOT_USERNAME=your_penpot_username PENPOT_PASSWORD=your_penpot_password PORT=5000 DEBUG=true \\u00B7 \\u26A0\\uFE0F CloudFlare Protection Notice: The Penpot cloud site (penpot.app) uses CloudFlare protection that may occasionally block API requests. If you encounter authentication errors or blocked requests: Open your web browser and navigate to https://design.penpot.app ...\\n\\n# Using uvx (when published to PyPI) uvx penpot-mcp # Using uvx for local development uvx --from . penpot-mcp # Using uv in a project (recommended for local development) uv run penpot-mcp # Using the entry point (if installed) penpot-mcp # Or using the module directly python -m penpot_mcp.server.mcp_server ... # Test API connection with debug output python -m penpot_mcp.api.penpot_api --debug list-projects # Get details for a specific project python -m penpot_mcp.api.penpot_api --debug get-project --id YOUR_PROJECT_ID # List files in a project python -m penpot_mcp.api.penpot_api --debug list-files --project-id YOUR_PROJECT_ID # Get file details python -m penpot_mcp.api.penpot_api --debug get-file --file-id YOUR_FILE_ID ... # Generate a tree visualization of a Penpot file penpot-tree path/to/penpot_file.json # Validate a Penpot file against the schema penpot-validate path/to/penpot_file.json \\u00B7\\n\\n# Start your MCP server in one terminal python -m penpot_mcp.server.mcp_server # In another terminal, run the MCP Inspector (requires Node.js) npx @modelcontextprotocol/inspector ... The Penpot MCP server can be integrated with AI assistants using the Model Context Protocol. It supports both Claude Desktop and Cursor IDE for seamless design workflow automation. For detailed Claude Desktop setup instructions, see CLAUDE_INTEGRATION.md.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://mcpservers.org/servers/montevive/penpot-mcp\"}},{\"type\":\"knowledge\",\"title\":\"Penpot\\u0027s AI whitepaper\",\"url\":\"https://penpot.app/blog/penpot-ai-whitepaper/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"penpot.app\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=penpot.app\",\"site_name\":\"Penpot\"},\"is_missing\":false,\"text\":\"One example of what an Penpot MCP server of the calibre we\\u0026#x27;re envisaging could unlock would be to make it easier to channel back production data about how your software is being used. From the simplest A/B test to more nuanced insights, this could allow an AI agent to surgically refactor bits of a design system to better accommodate it to relevant emerging scenarios. Data and heuristics encourage a bolder design process and we want our Penpot MCP server to unlock a full-duplex design-production communication. In this sense, it\\u2019s crucial that our MCP server exposes our design primitives, plugins API, declarative design options, design system capabilities, design tokens and semantic inference aids in a way that you can really speak the \\u201Cdesign\\u2019s code\\u201D. We\\u2019ll provide the most configurable MCP server we can, so that you don\\u2019t need to create one (and support you if you still ...\\n\\nOne example of what an Penpot MCP server of the calibre we\\u0027re envisaging could unlock would be to make it easier to channel back production data about how your software is being used. From the simplest A/B test to more nuanced insights, this could allow an AI agent to surgically refactor bits of a design system to better accommodate it to relevant emerging scenarios. Data and heuristics encourage a bolder design process and we want our Penpot MCP server to unlock a full-duplex design-production communication. In this sense, it\\u2019s crucial that our MCP server exposes our design primitives, plugins API, declarative design options, design system capabilities, design tokens and semantic inference aids in a way that you can really speak the \\u201Cdesign\\u2019s code\\u201D. We\\u2019ll provide the most configurable MCP server we can, so that you don\\u2019t need to create one (and support you if you still want to).\\n\\nThis piece explains some of Penpot\\u0027s relevant findings around AI and UI Design, what we\\u2019re building (and why) and what you should expect from us in the future. ... [Landed here without prior knowledge on Penpot? We are the web-based open-source design tool that bridges the gap between designers and developers] Some of our core beliefs around how design and code should work together have proven to be non-negotiable for the future of the software industry as a whole. Today, we feel we are ready to share some of our relevant findings around AI and UI Design, what we\\u2019re building (and why) and what you should expect from us in the future. Even if you are not a software builder or use Penpot on a daily basis, we hope that reading this piece will provide you with a nuanced perspective on why the vast majority of the current industry efforts (vibe coding/designing, design to no-code, prompt to prototype) are doomed to fail.\\n\\nWhat is particularly interesting is how easy MCPs seem to make your app capabilities available through this new genAI-friendly API. If you have a well-documented traditional API, you can easily build your own MCP server and let any AI agent connect to it and operate really quickly and autonomously. From the perspective of a UI Design tool, this opens up the possibility of a glorified \\u201Cdesign by command line\\u201D approach. If your API is comprehensive and well built, you could, in theory, welcome agents to be your design co-pilot (or even the pilot). If all this is true, why are we then confronted with underwhelming results? MCP servers that allow you to \\u201Cinteract\\u201D with design tools seem unable to produce cohesive and sustainable designs \\u00B7 beyond the first few iterations. The answer to this lies again in how traditional UI design tools have built their internal design structure, lacking taxonomical and semantic value, making it almost impossible for an LLM to identify meaningful patterns th\\n\\nThis approach starts with a UI design already crafted in a UI Design tool. Then, through UI Design extensions or third-party plugins we take one or many parts of the UI design and attempt to convert them into functional websites or apps that make those designs come alive with very little intervention from the designer and zero developer participation. ... Figma Sites is a good example of this archetype. Figma Sites is a product within the Figma Suite platform that allows users to design, prototype, and publish websites directly from Figma. You are supposed to use Figma just like you always do, and when you\\u2019re ready, you simply hit \\u201Cpublish\\u201D to turn your designs into a live website hosted elsewhere. In theory, Figma infuses logic into the designs for an overall seamless interaction. The fundamental limitation of this approach is that Figma, and other design tools \\u00E0-la-Figma or conceived during the 2010s, continue to define a UI design mostly using an imperative design paradigm.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"August 20, 2025\",\"url\":\"https://penpot.app/blog/penpot-ai-whitepaper/\"}},{\"type\":\"knowledge\",\"title\":\"PenPot MCP Server - Dockerized | MCP Servers \\u00B7 LobeHub\",\"url\":\"https://lobehub.com/mcp/ajeetraina-penpot-mcp-docker\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"lobehub.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=lobehub.com\",\"site_name\":\"LobeHub\"},\"is_missing\":false,\"text\":\"Containerized Deployment: Easy deployment using Docker and Docker Compose \\u00B7 Multi-Architecture Support: Works on AMD64 and ARM64 architectures \\u00B7 Production Ready: Optimized for production with health checks and monitoring \\u00B7 Auto-restart: ...\\n\\nPlugin Features \\u00B7 Related Recommendations \\u00B7 Score \\u00B7 Version History \\u00B7 Need Help?View Source CodeReport Issue \\u00B7 What can you do with this MCP Server? A containerized version of the PenPot MCP Server enabling AI-powered design workflow automation through Docker containers. Requires environment variables for Penpot credentials and API URL configured via .env file. A containerized version of the PenPot MCP Server that enables AI-powered design workflow automation through Docker containers. Containerized Deployment: Easy deployment using Docker and Docker Compose \\u00B7 Multi-Architecture Support: Works on AMD64 and ARM64 architectures \\u00B7 Production Ready: Optimized for production with health checks and monitoring \\u00B7 Auto-restart: Container automatically restarts on failures \\u00B7 Volume Persistence: Optional persistent storage for cache and data \\u00B7 Redis Integration: Optional Redis service for improved caching \\u00B7\\n\\nA containerized version of the PenPot MCP Server that enables AI-powered design workflow automation through Docker containers. Containerized Deployment: Easy deployment using Docker and Docker Compose \\u00B7 Multi-Architecture Support: Works on AMD64 and ARM64 architectures \\u00B7 Production Ready: Optimized for production with health checks and monitoring \\u00B7 Auto-restart: Container automatically restarts on failures \\u00B7 Volume Persistence: Optional persistent storage for cache and data \\u00B7 Redis Integration: Optional Redis service for improved caching \\u00B7 Security Focused: Runs with non-root user for enhanced security ... # Copy the example environment file cp .env.example .env # Edit the .env file with your Penpot credentials nano .env ... PENPOT_USERNAME=your_penpot_username PENPOT_PASSWORD=your_penpot_password PENPOT_API_URL=https://design.penpot.app/api ...\\n\\n# Check if the service is healthy curl http://localhost:5000/health # Test MCP server functionality docker-compose exec penpot-mcp penpot-client ... # Build the image docker build -t penpot-mcp:latest . # Run the container docker run -d \\\\ --name penpot-mcp-server \\\\ --restart unless-stopped \\\\ -p 5000:5000 \\\\ -e PENPOT_USERNAME=your_username \\\\ -e PENPOT_PASSWORD=your_password \\\\ -e PENPOT_API_URL=https://design.penpot.app/api \\\\ penpot-mcp:latest ... # Pull and run from Docker Hub (when available) docker run -d \\\\ --name penpot-mcp-server \\\\ --restart unless-stopped \\\\ -p 5000:5000 \\\\ --env-file .env \\\\ ajeetraina/penpot-mcp:latest \\u00B7 penpot_cache:/app/.cache - Persistent cache storage \\u00B7 redis_data:/data - Redis data persistence (if using Redis) The container includes built-in health checks that monitor: ... # Clone the original source git clone https://github.com/montevive/penpot-mcp.git source/ # Build with custom tag docker build -t penpot-mcp:dev .\\n\\n# Access container shell docker-compose exec penpot-mcp bash # View detailed logs docker-compose logs -f --tail=100 penpot-mcp # Test API connection docker-compose exec penpot-mcp python -c \\u0022import requests; print(requests.get(\\u0027http://localhost:5000/health\\u0027).json())\\u0022 ... # Start services docker-compose up -d # Stop services docker-compose down # Restart specific service docker-compose restart penpot-mcp # View resource usage docker stats penpot-mcp-server ... # Follow logs in real-time docker-compose logs -f penpot-mcp # Export logs to file docker-compose logs penpot-mcp \\u003E penpot-mcp.log # Check container health docker inspect --format=\\u0027{{.State.Health.Status}}\\u0027 penpot-mcp-server ... # Pull latest changes git pull origin main # Rebuild and restart docker-compose down docker-compose build --no-cache docker-compose up -d ... { \\u0022mcpServers\\u0022: { \\u0022penpot\\u0022: { \\u0022command\\u0022: \\u0022docker\\u0022, \\u0022args\\u0022: [\\u0022exec\\u0022, \\u0022penpot-mcp-server\\u0022, \\u0022penpot-mcp\\u0022], \\u0022env\\u0022: { \\u0022PENPOT_API_URL\\u0022: \\u0022https://design.penpot.app/api\\u0022, \\u0022\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"September 8, 2025\",\"url\":\"https://lobehub.com/mcp/ajeetraina-penpot-mcp-docker\"}},{\"type\":\"knowledge\",\"title\":\"Penpot MCP Server | Glama\",\"url\":\"https://glama.ai/mcp/servers/@montevive/penpot-mcp\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"glama.ai\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=glama.ai\",\"site_name\":\"Glama\"},\"is_missing\":false,\"text\":\"# Install directly with uvx (when published to PyPI) uvx penpot-mcp # For local development, use uvx with local path uvx --from . penpot-mcp # Or install in a project with uv uv add penpot-mcp \\u00B7 # Clone the repository git clone https://github.com/montevive/penpot-mcp.git cd penpot-mcp # Using uv (recommended) uv sync uv run penpot-mcp # Or using traditional pip python -m venv .venv source .venv/bin/activate # On Windows: .venv\\\\Scripts\\\\activate pip install -e . Create a .env file based on env.example with your Penpot credentials: PENPOT_API_URL=https://design.penpot.app/api PENPOT_USERNAME=your_penpot_username PENPOT_PASSWORD=your_penpot_password PORT=5000 DEBUG=true \\u00B7 # Using uvx (when published to PyPI) uvx penpot-mcp # Using uvx for local development uvx --from . penpot-mcp # Using uv in a project (recommended for local development) uv run penpot-mcp # Using the entry point (if installed) penpot-mcp # Or using the module directly python -m penpot_mcp.server.mcp_server ...\\n\\nBridges AI language models with Penpot design platform, enabling AI assistants to analyze, search, and interact with design files programmatically for automated design workflows. ... Provides a bridge between large language models and the Metasploit Framework, enabling AI assistants to access and control penetration testing functionality through natural language. ... A powerful AI-driven tool that helps developers create beautiful, modern UI components instantly through natural language descriptions. ... This package enables AI assistants (Claude, GPT, etc.) to work directly with Buildable projects using the Model Context Protocol (MCP). AI assistants can get project context, manage tasks and track progress (for projects created at https://bldbl.dev). ... A bridge that provides AI assistants with access to WaniKani user data and functionality, enabling them to retrieve learning progress, identify difficult items, and offer personalized Japanese language learning assistance.\\n\\nMCP Protocol Implementation: Full compliance with Model Context Protocol standards \\u00B7 Real-time Design Access: Direct integration with Penpot\\u0027s API for live design data \\u00B7 Component Analysis: AI-powered analysis of design components and layouts \\u00B7 Export Automation: Programmatic export of design assets in multiple formats \\u00B7 Design Validation: Automated design system compliance checking \\u00B7 Command-line Utilities: Powerful CLI tools for design file analysis and validation \\u00B7 Python SDK: Comprehensive Python library for custom integrations \\u00B7 REST API: HTTP endpoints for web application integration \\u00B7 Extensible Architecture: Plugin system for custom AI workflows \\u00B7 Claude Desktop \\u0026 Cursor Integration: Native support for Claude AI assistant in both Claude Desktop and Cursor IDE \\u00B7 Design Context Sharing: Provide design context to AI models for better responses \\u00B7\\n\\n# Install directly with uvx (when published to PyPI) uvx penpot-mcp # For local development, use uvx with local path uvx --from . penpot-mcp # Or install in a project with uv uv add penpot-mcp \\u00B7 # Clone the repository git clone https://github.com/montevive/penpot-mcp.git cd penpot-mcp # Using uv (recommended) uv sync uv run penpot-mcp # Or using traditional pip python -m venv .venv source .venv/bin/activate # On Windows: .venv\\\\Scripts\\\\activate pip install -e . Create a .env file based on env.example with your Penpot credentials: PENPOT_API_URL=https://design.penpot.app/api PENPOT_USERNAME=your_penpot_username PENPOT_PASSWORD=your_penpot_password PORT=5000 DEBUG=true \\u00B7 # Using uvx (when published to PyPI) uvx penpot-mcp # Using uvx for local development uvx --from . penpot-mcp # Using uv in a project (recommended for local development) uv run penpot-mcp # Using the entry point (if installed) penpot-mcp # Or using the module directly python -m penpot_mcp.server.mcp_server ...\\n\\n# Generate a tree visualization of a Penpot file penpot-tree path/to/penpot_file.json # Validate a Penpot file against the schema penpot-validate path/to/penpot_file.json \\u00B7 # Start your MCP server in one terminal python -m penpot_mcp.server.mcp_server # In another terminal, use mcp-cli to monitor and interact with your server python -m mcp.cli monitor python -m penpot_mcp.server.mcp_server # Or connect to an already running server on a specific port python -m mcp.cli monitor --port 5000 \\u00B7 # Start your MCP server in one terminal python -m penpot_mcp.server.mcp_server # In another terminal, run the MCP Inspector (requires Node.js) npx @modelcontextprotocol/inspector ... The Penpot MCP server can be integrated with AI assistants using the Model Context Protocol. It supports both Claude Desktop and Cursor IDE for seamless design workflow automation.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://glama.ai/mcp/servers/@montevive/penpot-mcp\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"612cd99f-d9e1-4d74-8e62-486cd5f97a49\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

