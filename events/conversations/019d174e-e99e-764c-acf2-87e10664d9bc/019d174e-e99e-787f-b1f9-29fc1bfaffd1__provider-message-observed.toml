kind = "plain_text"
text = "Based on the documentation, the **official Penpot MCP uses a plugin architecture for a fundamental reason: it's the only way to properly access and manipulate live Penpot designs**.\n\n## Why the Plugin Architecture?\n\nHere's the key architectural constraint:\n\n**Penpot requires using its Plugin API to interact with design data**. The MCP server cannot directly access Penpot's internal design structures - it must go through Penpot's official Plugin API, which runs inside the browser context where Penpot is open.\n\n## The Three-Layer Architecture\n\n```\nAI Client (Claude) \n    ↓ MCP Protocol\nMCP Server (Node.js, port 4401)\n    ↓ WebSocket\nPenpot Plugin (runs in browser)\n    ↓ Plugin API\nPenpot Design Data\n```\n\n## Why This Design?\n\n1. **Browser Context Requirement**: Penpot's Plugin API is designed to run within the browser where Penpot is open. The plugin has direct access to the design canvas and can execute operations using Penpot's internal APIs.\n\n2. **Live Design Interaction**: The plugin enables real-time manipulation of the actual design being viewed/edited in Penpot, not just file-based operations.\n\n3. **Type Safety & Official API**: By using the Plugin API, the integration uses Penpot's officially supported extension mechanism with proper TypeScript definitions.\n\n4. **Security Boundary**: The plugin model provides a security boundary - the MCP server doesn't have direct access to Penpot's internals; it must request operations through the plugin.\n\n## Contrast with Alternative Approaches\n\nThe alternative Python-based Penpot MCP you saw earlier (montevive/penpot-mcp) takes a different approach - it uses Penpot's REST API for authentication and file operations. However, this is limited to working with saved files and doesn't provide the real-time, in-canvas manipulation that the plugin-based approach enables.\n\nThe official Penpot MCP's plugin architecture allows AI agents to:\n- Execute code directly in the design canvas\n- Retrieve and modify elements in real-time\n- Work with the live design state, not just saved files\n\nThis is why the documentation emphasizes: **\"Do not close the plugin's UI while using the MCP server, as this will close the connection.\"** The plugin must remain open to maintain that browser-to-server bridge."

