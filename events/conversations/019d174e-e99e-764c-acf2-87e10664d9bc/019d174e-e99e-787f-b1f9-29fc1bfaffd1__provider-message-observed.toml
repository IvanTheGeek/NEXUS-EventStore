text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_fetch\",\"content\":[{\"type\":\"knowledge\",\"title\":\"GitHub - penpot/penpot-mcp\",\"url\":\"https://github.com/penpot/penpot-mcp\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"github\"},\"is_missing\":false,\"text\":\"This project enables LLMs to interact directly with Penpot design projects using the model context protocol (MCP), building on Penpot\\u0027s plugin API to facilitate design data retrieval, modification, and creation.\\nThe Penpot MCP server exposes tools to AI clients (LLMs), which support the retrieval of design data as well as the modification and creation of design elements. The MCP server communicates with Penpot via a dedicated Penpot MCP plugin, which connects to the MCP server via WebSocket.\\nThis repository is a monorepo containing four main components:\\n-\\nCommon Types (\\ncommon/\\n):- Shared TypeScript definitions for request/response protocol\\n- Ensures type safety across server and plugin components\\n-\\nPenpot MCP Server (\\nmcp-server/\\n):- Provides MCP tools to LLMs for Penpot interaction\\n- Runs a WebSocket server accepting connections from the Penpot MCP plugin\\n- Implements request/response correlation with unique task IDs\\n- Handles task timeouts and proper error reporting\\n-\\nPenpot MCP Plugin (\\npenpot-plugin/\\n):- Connects to the MCP server via WebSocket\\n- Executes tasks in Penpot using the Plugin API\\n- Sends structured responses back to the server#\\n-\\nHelper Scripts (\\npython-scripts/\\n):- Python scripts that prepare data for the MCP server (development use)\\nThe core components are written in TypeScript, rendering interactions with the Penpot Plugin API both natural and type-safe.\\nTo use the Penpot MCP server, you must\\n- run the MCP server and connect your AI client to it,\\n- run the web server providing the Penpot MCP plugin, and\\n- open the Penpot MCP plugin in Penpot and connect it to the MCP server.\\nFollow the steps below to enable the integration.\\nThe project requires [Node.js](https://nodejs.org/) (tested with v22).\\nFollowing the installation of Node.js, the tools npm\\nand npx\\nshould be\\navailable in your terminal.\\nIf it\\u0027s your first execution, install the required dependencies:\\nnpm install\\nThen build all components and start the two servers:\\nnpm run bootstrap\\nThis bootstrap command will:\\n- install dependencies for all components (\\nnpm run install:all\\n) - build all components (\\nnpm run build:all\\n) - start all components (\\nnpm run start:all\\n)\\n- Open Penpot in your browser\\n- Navigate to a design file\\n- Open the Plugins menu\\n- Load the plugin using the development URL (\\nhttp://localhost:4400/manifest.json\\nby default) - Open the plugin UI\\n- In the plugin UI, click \\u0022Connect to MCP server\\u0022.\\nThe connection status should change from \\u0022Not connected\\u0022 to \\u0022Connected to MCP server\\u0022.\\n(Check the browser\\u0027s developer console for WebSocket connection logs. Check the MCP server terminal for WebSocket connection messages.)\\n\\u26A0\\uFE0F Do not close the plugin\\u0027s UI while using the MCP server, as this will close the connection.\\nBy default, the server runs on port 4401 and provides:\\n- Modern Streamable HTTP endpoint:\\nhttp://localhost:4401/mcp\\n- Legacy SSE endpoint:\\nhttp://localhost:4401/sse\\nThese endpoints can be used directly by MCP clients that support them. Simply configure the client to the MCP server by providing the respective URL.\\nWhen using a client that only supports stdio transport,\\na proxy like mcp-remote\\nis required.\\nThe mcp-remote\\npackage can proxy stdio transport to HTTP/SSE,\\nallowing clients that support only stdio to connect to the MCP server indirectly.\\n-\\nInstall\\nmcp-remote\\nglobally if you haven\\u0027t already:npm install -g mcp-remote\\n-\\nUse\\nmcp-remote\\nto provide the launch command for your MCP client:npx -y mcp-remote http://localhost:4401/sse --allow-http\\nFor Windows and macOS, there is the official [Claude Desktop app](https://claude.ai/download), which you can use as an MCP client.\\nFor Linux, there is an [unofficial community version](https://github.com/aaddrick/claude-desktop-debian).\\nSince Claude Desktop natively supports only stdio transport, you will need to use a proxy like mcp-remote\\n.\\nInstall it as described above.\\nTo add the server to Claude Desktop\\u0027s configuration, locate the configuration file (or find it via Menu / File / Settings / Developer):\\n- Windows:\\n%APPDATA%/Claude/claude_desktop_config.json\\n- macOS:\\n~/Library/Application Support/Claude/claude_desktop_config.json\\n- Linux:\\n~/.config/Claude/claude_desktop_config.json\\nAdd a penpot\\nentry under mcpServers\\nwith the following content:\\n{\\n\\u0022mcpServers\\u0022: {\\n\\u0022penpot\\u0022: {\\n\\u0022command\\u0022: \\u0022npx\\u0022,\\n\\u0022args\\u0022: [\\u0022-y\\u0022, \\u0022mcp-remote\\u0022, \\u0022http://localhost:4401/sse\\u0022, \\u0022--allow-http\\u0022]\\n}\\n}\\n}\\nAfter updating the configuration file, restart Claude Desktop completely for the changes to take effect.\\n\\u26A0\\uFE0F Be sure to fully quit the app for the changes to take effect; closing the window is not sufficient.\\nTo fully terminate the app, choose Menu / File / Quit.\\nAfter the restart, you should see the MCP server listed when clicking on the \\u0022Search and tools\\u0022 icon at the bottom of the prompt input area.\\nTo add the Penpot MCP server to a Claude Code project, issue the command\\nclaude mcp add penpot -t http http://localhost:4401/mcp\",\"is_citable\":true,\"prompt_context_metadata\":{\"mime_type\":\"text/html; charset=utf-8\",\"content_type\":\"html\",\"destination_url\":\"https://github.com/penpot/penpot-mcp\"}}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":\"Fetched: GitHub - penpot/penpot-mcp\",\"integration_name\":\"Web Fetch\",\"integration_icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"icon_name\":null,\"display_content\":{\"type\":\"rich_link\",\"link\":{\"title\":\"GitHub - penpot/penpot-mcp\",\"subtitles\":null,\"url\":\"https://github.com/penpot/penpot-mcp\",\"resource_type\":null,\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"source\":\"github\"},\"is_trusted\":false}}"

