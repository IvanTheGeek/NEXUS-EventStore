[[body.segments]]
kind = "plain_text"
text = "Pragmatic and right — don't over-engineer a distinction that hasn't caused a problem yet.\n\n## Where This Lands for the Schema\n\n```toml\n[[projector.gwt]]\ngiven = [\"LaundryExpenseLogged\"]\nwhen = [\n    \"fold into expense list\",\n    \"filter within last 3 hours\"\n]\nthen = \"RecentExpenses\"\n\n[[projector.gwt]]\ngiven = [\"LaundryExpenseLogged\"]\nwhen = [\n    \"fold into expense list\"\n]\nthen = \"AllExpenses\"\n```\n\nClean, readable, explicit. The pipeline is visible right in the slice file.\n\n## What NEXUS Gets From This\n\n- Can diff two projectors and see exactly where their pipelines diverge\n- Shared `when` steps are detectable — candidates for named reusable transforms later\n- FORGE can map each step to an actual F# function in the generated code\n- Fully traceable: view output → pipeline steps → event source\n\n## The Evolution Path is Natural\n\nIf you later find a reason to distinguish filter vs aggregate vs reshape — those are just **step type annotations** you can add without breaking the structure:\n\n```toml\nwhen = [\n    { step = \"fold into expense list\", type = \"aggregate\" },\n    { step = \"filter within last 3 hours\", type = \"filter\" }\n]\n```\n\nString form now, structured form later if needed. Same semantics.\n\nWorth updating the NEXUS schema memory with this `when` pipeline concept?"

