[[body.segments]]
kind = "plain_text"
text = "Exactly — and it maps perfectly to standard git offline workflows:\n\n## Offline-First Git Pattern\n\n```\nOnline:   clone/pull → work → commit → push\nOffline:  (existing checkout) → work → commit → (push queued)\nReconnect: push commits → pull any remote changes → merge if needed\n```\n\nisomorphic-git handles all of this naturally because **commits are local operations** — push is the only network-dependent step.\n\n## What You Get for Free\n\n- Full commit history available offline ✅\n- Conflict detection on reconnect (merge/rebase) ✅\n- Can queue multiple commits while offline, push batch ✅\n- PWA + `persist()` makes it genuinely robust ✅\n\n## One Wrinkle to Plan For\n\n**Merge conflicts** — if NEXUS ever becomes multi-device or multi-user, two offline sessions editing the same TOML slice will conflict on push. Worth thinking about your conflict strategy early:\n\n- **UUIDv7 filenames per slice** already help (new slices rarely conflict)\n- Edits to existing slices are the risk area\n- Could enforce \"last-write-wins\" or surface conflicts in UI\n\nFor solo use on one device at a time, conflicts are essentially a non-issue.\n\n## This Also Fits NEXUS Perfectly\n\nYour TOML slices + events dir are already designed with git in mind — separate repos for model vs events, different velocity. The offline-first browser app becomes just another git client in the ecosystem, same as any local checkout would be.\n\nWant to sketch the F# service layer for this — the abstraction over isomorphic-git via IJSRuntime?"

