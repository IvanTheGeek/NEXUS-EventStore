text = "Ivan is referring to Adam Dymitruk's Event Modeling methodology where automated processors/systems are treated as actors — they just happen to be non-human actors. That's a clean resolution to the tension."

[[body.segments]]
kind = "plain_text"
text = "That resolves it cleanly. **Automation is not a subgraph — it's an Actor.**\n\n## What That Means\n\nA processor/bot/automation is just an actor that happens to be non-human. It reads events, makes decisions, issues commands. Same slice pattern as any human actor.\n\n```\nHuman actor:     User taps button → LogExpense command\nAutomation actor: 3hr timer fires → ClearSession command\n                  Network restored → TriggerSync command\n```\n\nSame mechanics. The gears icon is just visual notation for \"this actor is the system itself.\"\n\n## What This Cleans Up\n\n`automation` as a subgraph was going to be awkward because automated behaviors **do have actors** — they're just processors. Forcing them into a separate subgraph would have hidden that.\n\nKeeping automation as an actor means:\n- Slices stay uniform — command and projection, regardless of who initiates\n- Processor behavior is fully visible in the EM diagram with its own swim lane\n- NEXUS can reason about it the same way it reasons about human actors\n\n## Revised Subgraph Picture\n\nRemoves `automation` from the candidate list entirely. The tier structure tightens:\n\n```\nevent.stream                          ← mechanics\nbusiness.emd  /  app.lifecycle        ← interpretation (parallel)\nui.visual  /  ui.interaction          ← presentation\nintegration  /  audit                 ← boundary/cross-cutting\n```\n\nCleaner. Want to note this in the session document?"

