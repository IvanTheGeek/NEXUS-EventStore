[[body.segments]]
kind = "reasoning"
text = "Ivan is exploring the GWT syntax for the RecentExpenses ViewSlice projector. He's splitting the \"given\" and \"when\" into separate fields, which is an interesting design question. Let me think about this carefully.\n\nIn the established NEXUS TOML schema, GWT uses EM terms and all GWT rules must pass (validation gates, not first-match-wins). The schema has `[[projector.gwt]]` with `given`, `when`, `then` fields (implied from the EM structure).\n\nThe question is whether separating the event source (given) from the time filter (when) is meaningful and helpful.\n\nLet me think about this:\n\n\nThe separation makes sense semantically—`given` specifies which events the projector consumes, `when` applies temporal or state-based filters, and `then` defines the resulting view. This aligns with Event Modeling where projections transform events into read models, though I need to consider whether the \"within last 3 hours\" constraint fits cleanly into the EM framework or if it's more of an implementation detail.\n\nThe real tension is whether introducing a `when` field contradicts the earlier decision to handle branching through multiple `given` clauses instead of separate condition fields. Adding `when` could improve readability and clarity, but it might also create inconsistency with how the schema was originally structured. Actually in BDD/GWT for projections, \"when\" typically means \"when the projection is queried\" or \"when the view is rendered.\" The temporal filter is arguably part of the given state.\n\nBut Ivan is asking to discuss this openly, so I should engage with both the merits and concerns. This is a design conversation.\n\nThe key insight: `given` lists the event *types* the projector subscribes to, while `when` expresses the filter. This is actually a useful distinction because:\n- The projector always listens to `LaundryExpenseLogged` events\n- But the *view* only shows the last 3 hours worth\n\nSo `given` = subscription/source, `when` = filter/condition, `then` = result. That's actually cleaner than cramming it all into `given`.\n\nHowever, there's a tension with the established \"no condition field\" rule—though that constraint was really about branching logic, not temporal filters. I should explore this with Ivan and figure out whether adding temporal filters to the schema makes sense."

[[body.segments]]
kind = "plain_text"
text = "Good instinct to explore this. Let me engage with it properly.\n\n## What You're Implicitly Proposing\n\nSplitting GWT into two distinct concerns:\n\n- `given` = **what events this projector subscribes to** (the source)\n- `when` = **the filter/condition applied at query time**\n- `then` = **what the view contains**\n\nThat's actually a meaningful semantic separation.\n\n## The Tension\n\nYour established schema rule was \"GWT branching via different `given` clauses — no condition field.\" The intent there was to avoid first-match-wins logic. But `when` as a **filter** is different from `when` as a **branch selector** — different purpose entirely.\n\n## Where It Gets Interesting\n\n`given = [LaundryExpenseLogged]` answers: *what does this projector read?*\n\n`when = within last 3 hours` answers: *what subset does the view expose?*\n\nThese really are different questions. The projector might read ALL `LaundryExpenseLogged` events but the view only surfaces a filtered window. That distinction matters — especially if you later want:\n\n```toml\ngiven = [LaundryExpenseLogged]\nwhen = this calendar month\nthen = \"MonthlyExpenses view\"\n```\n\nSame source, different window, different view.\n\n## My Concern\n\n`when` is temporal here — but what about non-temporal filters? Does `when` stay clean or does it become a grab-bag?\n\nWhat's your instinct on what `when` should and shouldn't express?"

