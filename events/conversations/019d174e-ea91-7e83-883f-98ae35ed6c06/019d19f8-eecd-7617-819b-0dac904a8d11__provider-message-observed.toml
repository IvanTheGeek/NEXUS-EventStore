[[body.segments]]
kind = "plain_text"
text = "Good question to nail down before building on it.\n\n## IndexedDB Permanence: \"Durable but Evictable\"\n\n**It persists across:**\n- Page reloads ✅\n- Browser restarts ✅\n- OS reboots ✅\n\n**It does NOT survive:**\n- \"Clear site data\" / \"Clear cookies and storage\" ❌\n- Browser's automatic **storage eviction** under disk pressure ❌\n- Private/Incognito mode (cleared on session end) ❌\n- User explicitly clearing app data ❌\n\n## The Eviction Risk\n\nBrowsers classify storage into two tiers:\n\n| Tier | Behavior |\n|---|---|\n| **Best-effort** (default) | Can be auto-evicted when disk is low |\n| **Persistent** | Never auto-evicted — requires explicit user clear |\n\nTo request persistent storage:\n```javascript\nawait navigator.storage.persist(); // returns true if granted\n```\n\nBrowser may still prompt the user, and it's not guaranteed — Chrome grants it more freely for installed PWAs.\n\n## Bottom Line for Your Use Case\n\nIndexedDB is **working storage, not canonical storage**. Treat it exactly like a local git working directory — valuable, but the **remote Forgejo repo is the source of truth**.\n\nThe workflow becomes:\n- App loads → clone/pull from Forgejo into LightningFS\n- User edits TOML slices\n- Commit + push to Forgejo\n- IndexedDB is just the local checkout\n\nThat framing also neatly sidesteps the eviction problem — losing IndexedDB just means re-cloning."

