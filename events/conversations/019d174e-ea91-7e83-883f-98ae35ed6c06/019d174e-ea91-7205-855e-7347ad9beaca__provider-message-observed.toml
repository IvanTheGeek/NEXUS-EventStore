kind = "plain_text"
text = "Good use case — durable versioned storage of TOML slices/events. The approach is sound but there's one significant blocker to know about upfront before going deep.\n\n## Recommended Stack\n\n**isomorphic-git** (pure JS) + **LightningFS** (IndexedDB-backed) is the right choice over wasm-git:\n- Better maintained, well-documented\n- Works entirely in browser with `fetch`\n- LightningFS = durable (survives page reload, stored in IndexedDB)\n- Supports clone/pull/commit/push\n\n## The Real Problem: CORS\n\nPush/pull from a browser hits **CORS**. GitHub and GitLab explicitly block direct browser XHR to their git HTTP endpoints. You can't push to GitHub from a Bolero WASM app without a proxy.\n\n**Your options:**\n\n| Option | CORS | Notes |\n|---|---|---|\n| **Self-hosted Gitea/Forgejo** | Configurable ✅ | Best fit for you |\n| GitHub via CORS proxy | Proxy required | Added complexity/latency |\n| Your own thin proxy endpoint | You control it | Works but breaks \"client-only\" |\n| GitLab | Same as GitHub | Blocked by default |\n\nSince you already self-host with 1Gbit fiber, **Forgejo with CORS headers configured** is the clean answer — and it gives you full control over the repo, retention, and access.\n\n## The Basic Flow\n\n```\nLightningFS (IndexedDB)\n    ↕ isomorphic-git (JS)\n    ↕ IJSRuntime (F# ↔ JS bridge)\n    ↕ Bolero F# code\n    ↕ fetch() with CORS\n    ↕ Forgejo instance (self-hosted)\n```\n\n## Before Going Further\n\nTwo questions that will shape the design significantly:\n\n1. **Where does the app live?** Same origin as Forgejo, or different domain? (affects CORS complexity)\n2. **Auth model?** Personal token hardcoded/stored in browser, per-user login, or something else?"

