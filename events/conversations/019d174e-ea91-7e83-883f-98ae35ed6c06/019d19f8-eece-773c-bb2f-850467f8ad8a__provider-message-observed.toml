[[body.segments]]
kind = "reasoning"
text = "Ivan is asking whether the `when` pipeline steps should align with the subgraph types in NEXUS (ui.visual, app.lifecycle, business.emd, etc.), and where GWT rules for display should live.\n\nLet me think about this. The subgraphs in NEXUS are:\n- business.emd (event modeling, business behavior)\n- app.lifecycle (application state, navigation)\n- ui.visual (visual rendering, display)\n- ui.interaction (user interactions)\n\nThe projector GWT we've been discussing - where does it belong? The `given/when/then` pipeline is about data shaping. The `then` outputs to a view. The view is consumed by UI, automation, external APIs, etc.\n \nI'm seeing the core tension now: the projector that reads LaundryExpenseLogged is fundamentally a business.emd concern since it's domain behavior, but the 3-hour filter determining what users see in \"laundry mode\" feels like a ui.visual concern. The pipeline steps we designed actually span across these graph boundaries, which suggests the `when` steps might not cleanly align with individual subgraph types. The core projector logic belongs in business.emd, but display-specific `when` steps like the time filter could be tagged separately as ui.visual concerns, with the facet determining which pipeline steps actually execute. Alternatively, the entire GWT block could be facet-tagged so different facets compose different pipeline configurations—I need to think through what Ivan's really asking for and which approach keeps the model clearest."

[[body.segments]]
kind = "plain_text"
text = "Good question to ask before locking the schema down. Let me think through it with you.\n\n## The Subgraph Alignment Question\n\nYour subgraphs already have natural ownership of different concerns:\n\n- `business.emd` — domain behavior, what events mean, how they fold\n- `app.lifecycle` — application state, navigation, session context\n- `ui.visual` — what the user sees, display shaping\n- `ui.interaction` — how the user acts on what they see\n\nThe pipeline steps map pretty naturally:\n\n```\n\"fold into expense list\"      → business.emd  (domain aggregation)\n\"filter within last 3 hours\"  → ui.visual      (display convenience)\n\"sort by timestamp desc\"      → ui.visual      (presentation order)\n```\n\n## The Implication\n\nThe `when` steps aren't all the same kind of thing — they cross subgraph boundaries. Which means the pipeline itself is a **cross-subgraph composition**.\n\nSo the question becomes: does the GWT block declare which subgraph each step belongs to? Or does the **GWT block itself live in a specific subgraph** and only contain steps appropriate to that subgraph?\n\n```toml\n# Option A - steps tagged\nwhen = [\n    { step = \"fold into expense list\", subgraph = \"business.emd\" },\n    { step = \"filter within last 3 hours\", subgraph = \"ui.visual\" }\n]\n\n# Option B - separate GWT blocks per subgraph\n# business.emd GWT handles the fold\n# ui.visual GWT adds the filter on top\n```\n\nOption B feels more aligned with how facets already work as layered visibility — each subgraph adds its own GWT layer on top of the base.\n\nWhat's your instinct?"

