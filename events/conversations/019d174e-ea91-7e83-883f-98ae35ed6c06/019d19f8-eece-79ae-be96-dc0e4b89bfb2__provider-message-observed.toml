[[body.segments]]
kind = "reasoning"
text = "Ivan is clarifying the semantics of the 3-hour window in LaundryLog. It's a UI/projection concern only, not a domain concept. The events themselves are just expense entries - the session window is purely for the RecentExpenses view projection."

[[body.segments]]
kind = "plain_text"
text = "Exactly right — the 3-hour window is a **projection filter**, not a domain concept.\n\n## Clean Separation\n\n**Events (domain):** `LaundryExpenseLogged` — just facts. No session, no window, no grouping. Pure append-only log.\n\n**RecentExpenses view (projection):** Filters to \"last 3 hours\" as a convenience — surfaces what the user logged *this laundry trip* without them having to do anything.\n\n**Export/reporting:** Reads all `LaundryExpenseLogged` events, no filter. Every line item, full history.\n\n## The ViewSlice Stays Correct\n\nThe 3-hour window belongs entirely in the `RecentExpenses` projector's GWT — it's a **given clause condition**, not something baked into the events or the model structure.\n\n```toml\n[[projector.gwt]]\ngiven = \"LaundryExpenseLogged events within last 3 hours\"\nthen = \"RecentExpenses view shows those entries\"\n```\n\nIf the user wants a different window later (2 hours, \"today\", \"this trip\") — that's just a projector change. Events are untouched.\n\n## Data Export Slice\n\nWorth noting — export is its own projection reading the full event stream. No session awareness needed at all. Straightforward aggregate of all `LaundryExpenseLogged` facts.\n\nGood clarity to have before building the projector logic."

