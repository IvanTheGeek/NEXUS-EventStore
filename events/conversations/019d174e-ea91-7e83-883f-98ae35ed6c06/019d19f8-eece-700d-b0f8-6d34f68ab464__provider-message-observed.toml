[[body.segments]]
kind = "reasoning"
text = "Ivan is asking three things:\n1. CommandSlice GWT - he's not sure yet, that's fine\n2. Suggestion for app.lifecycle placement\n3. What other subgraphs might exist\n\nLet me think through these carefully.\n\n**app.lifecycle**\nThis is about application state - what screen is active, navigation, session context, whether the app is online/offline, etc. It's not domain (business.emd) and not display (ui.visual). It sits between event.stream and business.emd in some ways, or perhaps parallel to business.emd.\n\nActually - app.lifecycle might be *parallel* to business.emd, not above or below it. \n\nBoth interpret event.stream output but for different purposes: business.emd extracts domain meaning from events, while app.lifecycle tracks what those events mean for the application's operational state. Then ui.visual sits above both, potentially drawing from either.\n\n**Other subgraphs to consider:**\n- `ui.interaction` - how user acts on what they see (already mentioned in memories)\n- `app.information` - was mentioned earlier\n- `integration` or `api.external` - for external API surface\n- `automation` - for automated/background processes\n- `validation` - could be a cross-cutting concern\n- `identity` - auth/permissions\n\nI'm trying to figure out which of these actually belong as distinct subgraphs versus being concerns that live within existing ones.\n\nThe key insight is that NEXUS should work as a general system modeling framework, not just for LaundryLog. Each subgraph represents a different lens or concern that ATLAS can render—different perspectives on the same underlying facts. For app.lifecycle specifically, it's the application's own behavior graph tracking state transitions like OpenApp→AppOpened, sitting parallel to business.emd rather than nested within it, both consuming from event.stream."

[[body.segments]]
kind = "plain_text"
text = "Fair on CommandSlice — leave it open until the shape becomes obvious.\n\n## app.lifecycle Suggestion\n\nIt feels **parallel to `business.emd`**, not above or below it. Both interpret `event.stream` output, but for different purposes:\n\n```\nevent.stream   →  current state\n                    ├── business.emd    (what events mean domain-wise)\n                    └── app.lifecycle   (what events mean for app state)\n                              ↓\n                         ui.visual      (draws from either or both)\n```\n\n`app.lifecycle` owns: current screen, navigation state, online/offline status, session context. `OpenApp→AppOpened` is squarely an `app.lifecycle` concern, not a business one.\n\n---\n\n## Other Subgraph Candidates\n\n**Probably core:**\n\n| Subgraph | Concern |\n|---|---|\n| `ui.interaction` | How user acts — gestures, inputs, triggers |\n| `validation` | Rules that gate state transitions |\n| `identity` | Auth, roles, permissions |\n\n**Likely as systems grow:**\n\n| Subgraph | Concern |\n|---|---|\n| `integration` | External API surface — what shape data leaves the system |\n| `automation` | Background/scheduled behavior, no actor |\n| `audit` | Compliance, traceability, who did what when |\n\n---\n\n## The Pattern Emerging\n\nSubgraphs seem to fall into natural tiers:\n\n```\nevent.stream                          ← mechanics\nbusiness.emd  /  app.lifecycle        ← interpretation (parallel)\nui.visual  /  ui.interaction          ← presentation\nintegration  /  automation  /  audit  ← boundary/cross-cutting\n```\n\nDoes that tiering feel right, or do some of these feel misplaced to you?"

