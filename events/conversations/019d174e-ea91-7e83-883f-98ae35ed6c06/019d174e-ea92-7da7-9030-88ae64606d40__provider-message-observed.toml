text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":\"toolu_01Mr8WxbXBppkDxU9EzDeNeE\",\"name\":\"memory_user_edits\",\"content\":[{\"type\":\"text\",\"text\":\"Replaced memory #12:\\nOld: NEXUS GWT blocks are per-facet layers: each subgraph (business.emd, ui.visual, etc.) owns its own [[projector.gwt]] block with a facet field. Lower facet output feeds into higher facet\\u0027s given. Toggling a facet off excludes that layer entirely. business.emd is foundational (domain fold), ui.visual adds display shaping on top (filters, sort, window). Layering order is implicit in the given\\u2192then feed chain across blocks.\\nNew: NEXUS GWT blocks are per-facet layers: each subgraph owns its own [[projector.gwt]] block with a facet field. Layering order: event.stream (foundational, non-toggleable \\u2014 folds raw events into current state) \\u2192 business.emd (domain interpretation lens) \\u2192 ui.visual (display shaping lens). Lower facet output feeds into higher facet\\u0027s given. Toggling a facet off excludes that layer. event.stream is the only subgraph that reads raw events directly.\",\"uuid\":\"8ed7c62f-0892-462f-b7e8-312727c4a3c2\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":\"Replaced memory\",\"integration_name\":\"Memory\",\"integration_icon_url\":\"https://claude.ai/images/icons/conversation_search.png\",\"icon_name\":\"memory\",\"display_content\":{\"type\":\"rich_content\",\"content\":[{\"title\":\"Replaced memory\",\"subtitles\":[\"#12: NEXUS GWT blocks are per-facet layers: each subgraph owns its own [[projector.gwt]] block with a fac...\"],\"url\":null,\"resource_type\":null,\"icon_url\":null,\"source\":null}]}}"

