text = "Ivan is thinking about this in F# terms — Actor as a discriminated union type where Agent is one of the cases."

[[body.segments]]
kind = "plain_text"
text = "Exactly right. Clean F# modeling:\n\n```fsharp\ntype Actor =\n    | Human of HumanActor\n    | Agent of AgentActor\n    | External of ExternalActor  // integration, third-party\n```\n\n## What That Means for NEXUS\n\nActor is still **one primitive** — the DU is the representation. No new node type needed in the graph. The type tag carries the distinction.\n\n```\nActor (primitive)\n  ├── Human    — person, user, operator\n  ├── Agent    — subactor, gears, system-initiated, scoped to parent\n  └── External — integration, third-party system, bot\n```\n\n## The Graph Edge Still Matters\n\nAgent specifically has a **parent relationship** — it operates within another actor's context. Human and External don't necessarily have that.\n\nSo in TOML or graph terms:\n\n```toml\n[actor]\nid = \"...\"\ntype = \"Agent\"\nparent = \"UserActor_ID\"\n```\n\nThe `parent` field is what makes Agent semantically different — not just a label but a structural relationship.\n\n## Keeps NEXUS Tight\n\nOne primitive, typed at the representation layer. The graph builder handles `Agent` differently only in that it resolves the parent edge. Everything else — slices, commands, events — stays uniform.\n\nWorth capturing in the session doc and memory?"

