kind = "plain_text"
text = "Good — we parked it and now have enough context to resolve it.\n\n## Revisiting Agent\n\nWith Axis A established, Agent fits cleanly:\n\nAn Agent is a **Processor that operates within the scope of a specific Human actor's context** — not the system in general, but on behalf of a particular user's session or intent.\n\n```fsharp\ntype Actor =\n    | Human      // person interacting\n    | Processor  // automated, internal, system-scoped\n    | Agent      // automated, internal, user-scoped\n    | External   // outside control/model boundary\n```\n\n## The Distinction\n\n```\nProcessor  →  operates on behalf of the system\nAgent      →  operates on behalf of a specific Human actor\n```\n\nForgejo sync = **Processor** — system concern, not tied to a user.\nSessionManager clearing after 3hrs = **Agent** — scoped to the user's laundry session.\nLocation pre-fill = **Agent** — acting on behalf of the user's current context.\n\n## Back to F# — Now It Makes Sense\n\n```fsharp\ntype Actor =\n    | Human    of HumanActor\n    | Processor of ProcessorActor\n    | Agent    of AgentActor * parentId: ActorId  // parent still meaningful here\n    | External of ExternalActor\n```\n\n`parentId` on Agent is now earned — it genuinely operates within a Human actor's context, not the system at large. That's the precise thing that distinguishes it from Processor.\n\nDoes that feel right now?"

