kind = "plain_text"
text = "That seals it. Axis A is the right choice.\n\n## Why It's Clean\n\nPAXUS running Forgejo means the boundary can **migrate** — what starts as External can become Processor as you absorb it into the ecosystem. The model stays accurate because the distinction is about control, not trigger origin.\n\n```fsharp\ntype Actor =\n    | Human      // person interacting with the system\n    | Processor  // automated, internal — you own and model it\n    | External   // outside your control and model boundary\n```\n\n## The Migration Story\n\n```\nForgejo today:   External  (you use it, don't model its internals)\nForgejo in PAXUS: Processor (you run it, NEXUS can reason about it fully)\n```\n\nSame actor in the EM diagram, type tag changes as the boundary moves. No structural redesign needed.\n\n## What NEXUS Gets From This\n\n- **Processor** = NEXUS can fully reason about behavior, slices, commands, events\n- **External** = NEXUS knows the boundary, models the interface only, treats internals as opaque\n- Graph builder can flag External actors and mark their edges as **trust boundaries** — places where you don't control what comes back\n\nThat trust boundary concept might be worth noting — it has implications for validation subgraph placement.\n\nWant all of this captured in the session doc and memory?"

