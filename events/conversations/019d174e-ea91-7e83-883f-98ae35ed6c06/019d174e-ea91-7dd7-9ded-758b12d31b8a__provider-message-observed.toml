kind = "plain_text"
text = "This is a really clean model. Let me reflect it back clearly.\n\n## The Pipeline Model\n\n```\ngiven  →  [event stream seeded]\nwhen   →  |> step 1\n          |> step 2\n          |> step n\nthen   →  [view out]\n```\n\nLiterally F# pipeline semantics baked into the schema. Each `when` is a **named, ordered, composable transform step**. Left fold over events is the accumulator, each `when` shapes the running state.\n\n## What This Solves\n\n**Explicit** — every filter is a declared, visible step. Nothing hidden in UI code or facet assumptions.\n\n**Deterministic** — order matters and is fixed. Same input + same `when` pipeline = same output. Always.\n\n**Composable** — `RecentExpenses` vs full export is just a different `when` pipeline over the same `given`.\n\n```toml\n# RecentExpenses\ngiven = [LaundryExpenseLogged]\nwhen = [\"fold into expense list\", \"filter within last 3 hours\"]\nthen = \"RecentExpenses\"\n\n# Export\ngiven = [LaundryExpenseLogged]\nwhen = [\"fold into expense list\"]\nthen = \"AllExpenses\"\n```\n\n## The Interesting Implication\n\n`when` clauses become **reusable named transforms** — `\"fold into expense list\"` appears in both. NEXUS can see that, detect shared steps, and potentially warn if they diverge unintentionally.\n\n## The Question This Raises\n\nAre `when` steps **pure filters** only, or can they also **reshape/aggregate** the data? Because \"fold into expense list\" is accumulation, \"filter within 3 hours\" is filtering — those are different kinds of transforms.\n\nDoes that distinction matter to you, or is \"anything that shapes the pipe\" sufficient?"

