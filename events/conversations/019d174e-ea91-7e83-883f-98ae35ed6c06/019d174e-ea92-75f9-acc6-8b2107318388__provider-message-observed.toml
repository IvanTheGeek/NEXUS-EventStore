kind = "plain_text"
text = " Good framing. Let me lay out both axes cleanly.\n\n## Axis A: Inside/Outside System Boundary\n\n```fsharp\ntype Actor =\n    | Human      // person interacting with the system\n    | Processor  // automated, internal, system-initiated\n    | External   // outside your control/model\n```\n\n**Implications:**\n- Clear ownership boundary — if you control it, it's internal\n- External = 3rd party APIs, other services, unknown behavior\n- Processor covers all automation regardless of trigger type\n- Forgejo sync agent = Processor, Stripe webhook = External\n- NEXUS knows exactly what it can reason about fully vs partially\n\n## Axis B: Human-Initiated vs System-Initiated\n\n```fsharp\ntype Actor =\n    | Human      // person initiates\n    | Processor  // system initiates (timer, event-triggered, condition-triggered)\n    | External   // outside initiates\n```\n\n**Implications:**\n- Focuses on **who pulls the trigger** not who owns the model\n- A human-controlled external service clicking a webhook = External\n- Your own scheduled job = Processor\n- Blurs when an external system is one you also control (your own Forgejo webhooks)\n\n## The Telling Edge Case\n\nYou self-host Forgejo. You control it. Is a Forgejo webhook:\n\n- **Axis A** → Processor (you control the model)\n- **Axis B** → External (Forgejo initiates, not your system)\n\nWhich answer feels right to you?"

