[[body.segments]]
kind = "reasoning"
text = "Ivan is questioning whether `business.emd` is the right subgraph for the foundational \"fold events into current state\" concern. He's pointing out that this is really an **event stream concern** — establishing current state from the event stream — which feels more fundamental than a \"business\" concern. It's infrastructure-level, not domain-level.\n\nLet me think about this...\n\nThe fold over the event stream to produce current state is essentially the **event sourcing mechanics** — it's what produces the projection's base state. That's not really a \"business\" lens, it's more like the raw event processing layer.\n\nIvan is distinguishing between:\n1. **Event stream fold** — mechanical aggregation of events into current state (infrastructure/foundation)\n\n\n2. **Business rules/logic** — what those events *mean* in domain terms\n3. **Display shaping** — UI visual filters and transformations\n\nSo the real question is whether the mechanical event fold belongs in `business.emd` at all, or if it should live in a lower-level subgraph like `event.stream` or `app.state` that handles the raw aggregation, with `business.emd` sitting on top to interpret meaning.\n\nThe foundational layer is really just answering \"what is the current state of the event stream\" — that's pure mechanics, and business interpretation is a separate concern layered on top."

[[body.segments]]
kind = "plain_text"
text = "Sharp observation. You're identifying that the fold is **two different concerns collapsed into one**:\n\n1. **Mechanical** — reading the event stream and accumulating current state. Pure event sourcing mechanics. Infrastructure.\n2. **Business** — interpreting what that state *means* in domain terms.\n\n`business.emd` is the wrong home for the mechanical layer. It's not a business concern — it predates business interpretation.\n\n## What It Actually Is\n\nThe fold is closer to `event.stream` or `app.state` — it's establishing **what happened**, full stop. No interpretation yet. The output is raw current state.\n\n```\nevent.stream  →  fold events → current state      (mechanical, foundational)\nbusiness.emd  →  interpret current state           (domain meaning)\nui.visual     →  shape for display                 (presentation)\n```\n\n## The Implication\n\n`event.stream` becomes the truly non-toggleable foundation — because it's just the mechanics of event sourcing itself. `business.emd` becomes toggleable because it's a **lens** on top of that state, not the state itself.\n\nThat also makes `business.emd` feel more honest as a name — it really is a business interpretation layer, not a plumbing layer.\n\n## The Question\n\nDoes `event.stream` feel right as the subgraph name, or does something else capture \"establishing current state from the event log\" better?"

