[[body.segments]]
kind = "reasoning"
text = "Good. So the subgraph hierarchy is becoming clearer:\n\n- `event.stream` — foundational, non-toggleable, mechanical fold of events into current state\n- `business.emd` — domain interpretation layer on top of current state\n- `ui.visual` — display shaping on top\n- `ui.interaction` — how user acts on what they see\n- `app.lifecycle` — application state, navigation, session\n\nThis is a meaningful architectural clarification. Should update memory."

[[body.segments]]
kind = "plain_text"
text = "Good. And it's honest about what it is — the raw stream of facts becoming current state. No interpretation, no business meaning, just mechanics.\n\n## The Revised Stack\n\n```\nevent.stream  →  fold events → current state      (foundational, non-toggleable)\nbusiness.emd  →  interpret current state           (domain lens)\nui.visual     →  shape for display                 (presentation lens)\n```\n\nAnd in the TOML:\n\n```toml\n[[projector.gwt]]\nfacet = \"event.stream\"\ngiven = [\"LaundryExpenseLogged\"]\nwhen = [\"fold into current state\"]\nthen = \"ExpenseState\"\n\n[[projector.gwt]]\nfacet = \"business.emd\"\ngiven = [\"ExpenseState\"]\nwhen = [\"fold into expense list\"]\nthen = \"AllExpenses\"\n\n[[projector.gwt]]\nfacet = \"ui.visual\"\ngiven = [\"AllExpenses\"]\nwhen = [\"filter within last 3 hours\"]\nthen = \"RecentExpenses\"\n```\n\n## What This Clarifies\n\n`event.stream` is the only subgraph that talks directly to raw events. Everything above it works on **already-accumulated state**. That's a clean architectural boundary — and it means FORGE knows exactly where the event sourcing infrastructure ends and domain code begins.\n\nWant to update memory with `event.stream` as the foundational subgraph?"

