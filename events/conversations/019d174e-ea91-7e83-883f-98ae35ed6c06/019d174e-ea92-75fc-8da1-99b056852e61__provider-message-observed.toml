text = "Memory and doc updated. Added findings 10–16 covering:\n\n- `app.lifecycle` as parallel to `business.emd`\n- Subgraph tier structure\n- Automation rejected as subgraph — it's an Actor\n- Actor DU with Axis A boundary distinction\n- Agent as user-scoped Processor with `parentId`\n- External edges as trust boundaries\n- Actor type migration as boundary evolves\n\nThree open questions carried forward into the doc."

