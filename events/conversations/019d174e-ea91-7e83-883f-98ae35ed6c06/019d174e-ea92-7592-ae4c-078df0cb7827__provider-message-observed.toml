kind = "plain_text"
text = "Sharp observation. You're identifying that the fold is **two different concerns collapsed into one**:\n\n1. **Mechanical** — reading the event stream and accumulating current state. Pure event sourcing mechanics. Infrastructure.\n2. **Business** — interpreting what that state *means* in domain terms.\n\n`business.emd` is the wrong home for the mechanical layer. It's not a business concern — it predates business interpretation.\n\n## What It Actually Is\n\nThe fold is closer to `event.stream` or `app.state` — it's establishing **what happened**, full stop. No interpretation yet. The output is raw current state.\n\n```\nevent.stream  →  fold events → current state      (mechanical, foundational)\nbusiness.emd  →  interpret current state           (domain meaning)\nui.visual     →  shape for display                 (presentation)\n```\n\n## The Implication\n\n`event.stream` becomes the truly non-toggleable foundation — because it's just the mechanics of event sourcing itself. `business.emd` becomes toggleable because it's a **lens** on top of that state, not the state itself.\n\nThat also makes `business.emd` feel more honest as a name — it really is a business interpretation layer, not a plumbing layer.\n\n## The Question\n\nDoes `event.stream` feel right as the subgraph name, or does something else capture \"establishing current state from the event log\" better?"

