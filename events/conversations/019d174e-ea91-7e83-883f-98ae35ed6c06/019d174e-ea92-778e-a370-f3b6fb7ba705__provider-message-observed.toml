kind = "plain_text"
text = " Good to think through before committing it to the model.\n\n## Automation Examples\n\n**Time-triggered:**\n- Archive expenses older than 90 days\n- Send weekly summary report\n- Retry a failed push to Forgejo after reconnect\n\n**Event-triggered (no actor):**\n- When `LocationSet` → automatically pre-fill location on `LogExpense`\n- When app comes online → trigger pending git push\n- When session window expires (3hrs) → clear `RecentExpenses` view\n\n**Threshold-triggered:**\n- When monthly laundry spend exceeds $X → notify user\n- When event log reaches size limit → trigger compaction\n\n---\n\n## The Interesting Tension\n\nSome of these feel like **projector behavior** — the 3-hour window clearing is arguably `ui.visual`. The location pre-fill is arguably `app.lifecycle`.\n\nSo the question is: **is `automation` a subgraph at all, or is it just behavior that belongs to other subgraphs but has no human actor initiating it?**\n\nThe distinguishing characteristic might be:\n\n```\nActor initiates    →  belongs to its natural subgraph\nSystem initiates   →  automation?\n```\n\nBut even then — the Forgejo retry on reconnect feels like `app.lifecycle` knows about network state and triggers it. Not really a separate concern.\n\n## The Real Question\n\nIs there automation behavior in your mental model that **genuinely doesn't fit** any other subgraph? Or does every automated behavior have a natural home already?"

