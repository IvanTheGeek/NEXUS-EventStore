[[body.segments]]
kind = "reasoning"
text = "Ivan is refining the actor model — automation/processors are not just actors, they're specifically **subactors** of another actor, represented by the gears icon. So a \"processor\" or \"bot\" is an agent subactor — it operates on behalf of or within the context of a parent actor.\n\nLet me think about what this means for the model."

[[body.segments]]
kind = "plain_text"
text = "Good precision. So the hierarchy is:\n\n```\nActor\n  └── Agent (subactor)    ← gears icon, system-initiated, operates on behalf of parent actor\n```\n\n## What This Captures\n\nAn agent isn't independent — it's **subordinate to an actor's context**. The 3hr timer firing isn't a free-standing automation, it's the app acting as an agent within the user's session. The sync-on-reconnect is an agent of the app lifecycle.\n\nThat distinction matters because:\n- Agents inherit context from their parent actor\n- Their commands are traceable back to an actor's domain\n- They don't get their own swim lane — they're nested under their parent\n\n## Compared to a Standalone Actor\n\n```\nUser (Actor)\n  └── SessionManager (Agent)   ← clears session, pre-fills location\n\nSystem (Actor)  \n  └── SyncAgent (Agent)        ← handles Forgejo push/pull on reconnect\n```\n\nA bot or external integration that acts **independently** would still be a full actor. The gears specifically means \"this is a subactor operating within another actor's domain.\"\n\n## Implication for NEXUS\n\nThe Actor primitive now has a subactor relationship. Agent is not a new primitive — it's a **typed edge** between Actor nodes in the graph.\n\nDoes that feel right, or is Agent something more distinct than a typed relationship?"

