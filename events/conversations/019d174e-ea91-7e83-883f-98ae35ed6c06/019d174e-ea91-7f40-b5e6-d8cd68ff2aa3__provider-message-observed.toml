kind = "plain_text"
text = "Yes, a Bolero WASM app can load additional WASM modules. Here's the key architecture to understand:\n\n## How It Works\n\n**Browser WASM hosting model:**\n- Each WASM module gets its own **isolated linear memory** — they don't share address space\n- Multiple modules run in the same JS event loop / browser context\n- They communicate through **JavaScript as the bridge**\n\nSo Bolero (which is itself a .NET WASM module — `dotnet.wasm`) and something like `wasm-git` (libgit2 compiled via Emscripten) can coexist and both be \"loaded,\" but they can't directly call each other — JS sits between them.\n\n## The Pattern\n\n```\nF# / Bolero  →  IJSRuntime.InvokeAsync  →  JS glue code  →  wasm-git module\n```\n\nIn practice for `wasm-git`:\n1. Add the wasm-git scripts to `index.html`\n2. Write a JS helper that initializes its Emscripten Module and wraps operations\n3. Call it from F# via `IJSRuntime`\n\n## What \"wasm-git\" Are You Thinking Of?\n\nThere are a few different things this could mean:\n- **wasm-git** — libgit2 compiled to WASM (Emscripten-based, has its own virtual FS)\n- **isomorphic-git** — pure JS git (no WASM, easier interop)\n- A **git submodule** (completely different thing — just source code organization)\n- Something else?\n\nThe Emscripten-based ones have a quirk: they bring their own in-memory filesystem (MEMFS/LightningFS), so git repos live in browser memory or IndexedDB, not a real FS.\n\nWhat's your actual use case — storing model/slice files, syncing with a remote repo, something else?"

