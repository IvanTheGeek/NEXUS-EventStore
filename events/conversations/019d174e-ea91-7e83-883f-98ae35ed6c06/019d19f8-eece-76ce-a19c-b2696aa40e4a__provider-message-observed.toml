text = "Added memory #12: NEXUS GWT blocks are per-facet layers: each subgraph (business.emd, ui.visual, etc.) owns its own [[projector.gwt]] block with a facet field. Lower facet output feeds into higher facet's given. Toggling a facet off excludes that layer entirely. business.emd is foundational (domain fold), ui.visual adds display shaping on top (filters, sort, window). Layering order is implicit in the given→then feed chain across blocks."

