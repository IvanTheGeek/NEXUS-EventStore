text = "Replaced memory #12:\nOld: NEXUS GWT blocks are per-facet layers: each subgraph (business.emd, ui.visual, etc.) owns its own [[projector.gwt]] block with a facet field. Lower facet output feeds into higher facet's given. Toggling a facet off excludes that layer entirely. business.emd is foundational (domain fold), ui.visual adds display shaping on top (filters, sort, window). Layering order is implicit in the given→then feed chain across blocks.\nNew: NEXUS GWT blocks are per-facet layers: each subgraph owns its own [[projector.gwt]] block with a facet field. Layering order: event.stream (foundational, non-toggleable — folds raw events into current state) → business.emd (domain interpretation lens) → ui.visual (display shaping lens). Lower facet output feeds into higher facet's given. Toggling a facet off excludes that layer. event.stream is the only subgraph that reads raw events directly."

