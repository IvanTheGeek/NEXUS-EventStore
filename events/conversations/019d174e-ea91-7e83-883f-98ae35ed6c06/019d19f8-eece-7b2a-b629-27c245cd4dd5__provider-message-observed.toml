[[body.segments]]
kind = "reasoning"
text = "Ivan is making a really interesting observation. He's saying the filter isn't just a temporal thing — it's about **context**: who is viewing it and what facet/lens they're looking through. Let me think about this carefully.\n\nThe RecentExpenses view filtered to 3 hours is relevant to the **user in laundry mode** — that's a specific actor/context. The export view is relevant to a different actor/context (maybe an accountant, or the user in \"review mode\").\n\nSo `when` might not be the right field at all — the filter condition is really a function of **facet + actor + context**, not a standalone temporal predicate.\n\n\nThis reframes the whole problem. Instead of thinking about filters as static predicates attached to views, I should be thinking about them as context-dependent lenses that change based on who's looking and what they're trying to do."

[[body.segments]]
kind = "plain_text"
text = "That's a sharp reframe. Say more about what you mean — are you thinking the filter isn't a field in the TOML at all, but rather **emergent from which facet is rendering the view**?\n\nBecause that would mean:\n\n- `RecentExpenses` in the `ui.visual` facet (user in laundry mode) → naturally scoped to 3 hours by the facet's context\n- `RecentExpenses` in the `business.emd` facet (export/reporting) → no window, full history\n\nSame projection, same events, **different facet = different filter applied**. The TOML slice stays clean — the facet carries the \"when.\"\n\nThat would make `when` not a field you declare, but a **concern owned by the lens/facet doing the rendering**.\n\nWhich also means the 3-hour window isn't really a projector concern at all — it's a **display concern**. The projector just reads `LaundryExpenseLogged`. The UI facet decides what window to show the user.\n\n## The Question That Surfaces\n\nIf the filter lives in the facet, where is it actually *expressed*? In Penpot (as a component property)? In the Bolero view code? Or does it need to be declared somewhere in NEXUS so it's not invisible?\n\nBecause \"implicit in the facet\" risks hiding important business logic where NEXUS can't see it."

