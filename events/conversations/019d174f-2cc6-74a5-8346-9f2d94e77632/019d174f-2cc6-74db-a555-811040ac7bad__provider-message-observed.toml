kind = "plain_text"
text = "Yes — Bolero can operate in **server mode**, which essentially turns it into a classic server-rendered app that only sends HTML/CSS/JS over the wire, **no WASM downloaded to the client**. Let me explain the details carefully:\n\n---\n\n## 🔹 Bolero Modes\n\n1. **Client-side (WASM)**\n   - The default “Bolero WASM” mode.\n   - Sends the compiled WebAssembly to the browser.\n   - UI runs entirely in the browser.\n   - Server mainly handles RPC calls, data, events.\n\n2. **Server-side (Blazor Server style)**\n   - No WASM sent to the browser.\n   - Only HTML + SignalR is sent.\n   - The client receives HTML diffs and sends events back over WebSockets.\n   - All code executes on the server.\n   - Perfect if you want **no WASM footprint** on client devices.\n\n---\n\n## 🔹 How to enable “HTML only” mode\n\nIn your `Program.fs` (or `Startup.fs`):\n\n```fsharp\nopen Bolero\nopen Bolero.Html\nopen Microsoft.AspNetCore.Builder\nopen Microsoft.Extensions.DependencyInjection\n\nlet builder = WebApplication.CreateBuilder(args)\n\n// Add Bolero Server support\nbuilder.Services.AddBoleroHost()\nlet app = builder.Build()\n\n// Map your main page\napp.UseRouting()\napp.UseEndpoints(fun endpoints ->\n    endpoints.MapBoleroHub() |> ignore\n    endpoints.MapFallbackToPage(\"/_Host\") |> ignore\n)\n\napp.Run()\n```\n\n- Here, **no WebAssembly client is built or sent**.  \n- The `_Host.cshtml` page renders the initial HTML and keeps a **SignalR connection** to sync UI events.  \n\n---\n\n## 🔹 Pros vs Cons\n\n| Pros | Cons |\n|------|------|\n| No WASM download (faster initial load) | Server handles all UI logic (CPU load on server) |\n| Works in older browsers | Requires continuous SignalR connection |\n| Perfect for thin clients / low-power devices | Less offline support |\n| Can still use your Bolero UI DSL in F# | Some interactions may feel slightly less “snappy” than WASM |\n\n---\n\n💡 **Key point:**  \nIf your goal is **a pure HTML + server-side rendered experience**, then yes — switch Bolero to server mode. Your client will only get HTML diffs and event messages via SignalR; no WASM is sent at all.\n\n---\n\nIf you want, I can make a **tiny Bolero example showing a server-only setup that could handle SSH calls and stream the output to the HTML UI** — basically your truck/shower app fully HTML-based with no WASM.  \n\nDo you want me to do that?"

