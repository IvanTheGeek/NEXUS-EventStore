kind = "plain_text"
text = "What people eventually discover when trying to make an **Event Modeling DSL** is that the most natural syntax is the one that **looks like the board itself**. In other words, the DSL should read almost like the sticky notes you’d place when modeling a slice with entity[\"people\",\"Adam Dymitruk\"]’s method.\n\nInstead of thinking in nodes and edges, you describe the **story of the slice**. The compiler then converts that story into the underlying graph.\n\n---\n\n# 1. The “story DSL” idea\n\nA slice is fundamentally a **story of causality**:\n\n```\nActor issues command\nCommand produces event\nEvent updates read model\nRead model feeds UI or processor\n```\n\nSo the DSL mirrors that.\n\nExample:\n\n```toml\n[slice.start_laundry_load]\n\nactor = \"user\"\n\ncommand = \"start_laundry_load\"\n\ndecision.given = [\"machine_available\"]\ndecision.then = \"laundry_load_started\"\n\nprojection.event = \"laundry_load_started\"\nprojection.updates = \"active_loads\"\n\nview.from = \"active_loads\"\nview.name = \"machine_dashboard\"\n```\n\nThis reads almost exactly like the slice you’d describe verbally.\n\n---\n\n# 2. How this compiles to the graph\n\nThe compiler expands that into nodes and edges like:\n\n```\nUser\n  ↓\nCommand(start_laundry_load)\n  ↓ decides\nEvent(laundry_load_started)\n  ↓ projects\nProjection(update_active_loads)\n  ↓ writes\nReadModel(active_loads)\n  ↓ queried_by\nView(machine_dashboard)\n```\n\nThe author never has to think about edges.\n\n---\n\n# 3. Policies (processors) become very natural\n\nAutomation slices read very clearly.\n\nExample:\n\n```toml\n[slice.notify_user]\n\ntrigger = \"laundry_load_completed\"\n\npolicy = \"notify_user_when_complete\"\n\ncommand = \"send_completion_notification\"\n\nevent = \"completion_notification_sent\"\n```\n\nWhich compiles into:\n\n```\nEvent → Policy → Command → Event\n```\n\nThis matches the **gear automation** on the Event Model board.\n\n---\n\n# 4. Queries (Adam’s “Where” idea)\n\nIf you incorporate Adam’s recent thinking about **queries being the real “When”**, the DSL can express that.\n\nExample:\n\n```toml\n[slice.machine_dashboard]\n\nview.from = \"active_loads\"\n\nquery.where = \"machine_id = :machine_id\"\n\nconsumer = \"ui.machine_dashboard\"\n```\n\nConceptually:\n\n```\nReadModel → Query → View → UI\n```\n\n---\n\n# 5. A full example slice\n\nHere’s what a fairly complete slice might look like:\n\n```toml\n[slice.complete_laundry_load]\n\nactor = \"machine_timer\"\n\ncommand = \"complete_laundry_load\"\n\ndecision.given = [\"laundry_load_started\"]\ndecision.then = \"laundry_load_completed\"\n\nprojection.event = \"laundry_load_completed\"\nprojection.updates = \"active_loads\"\n\nview.from = \"active_loads\"\nview.name = \"machine_dashboard\"\n\nconsumer = \"ui.machine_dashboard\"\n```\n\nThis reads almost like **plain English**.\n\n---\n\n# 6. Why this style works well\n\nThis style preserves the mental model of Event Modeling:\n\n```\nActor → Command → Event → Projection → ReadModel → View\n```\n\nBut the compiler still builds the graph:\n\n```\nNodes\nEdges\nTypes\nRelationships\n```\n\nSo you get the best of both worlds:\n\n```\nHuman story\nMachine graph\n```\n\n---\n\n# 7. How slices compose\n\nIf you have many slice files:\n\n```\nslices/\n  start_laundry_load.toml\n  complete_laundry_load.toml\n  notify_user.toml\n```\n\nThe compiler merges them into the **truth graph**.\n\nExample emergent graph:\n\n```\nstart_laundry_load\n      ↓\nlaundry_load_started\n      ↓\nactive_loads\n      ↓\nmachine_dashboard\n```\n\nand\n\n```\nlaundry_load_completed\n      ↓\nnotify_user_when_complete\n      ↓\nsend_completion_notification\n```\n\nNow you have the **full system architecture**.\n\n---\n\n# 8. The surprising thing this enables\n\nOnce slices are written this way, you can automatically generate:\n\n- Event Modeling boards  \n- Mermaid diagrams  \n- architecture documentation  \n- API definitions  \n- projection skeleton code  \n\nAll from the **same slice DSL**.\n\nThe DSL becomes the **source code of the architecture**.\n\n---\n\n# 9. Why this aligns with your “truth graph” idea\n\nYour architecture stack would look like this:\n\n```\nSlice DSL (TOML)\n       ↓\nGraph compiler\n       ↓\nTruth architecture graph\n       ↓\nGenerated views\n```\n\nThose views might include:\n\n- Event Model board\n- system documentation\n- runtime wiring\n\nEverything is just **different projections of the graph**.\n\n---\n\nOne particularly interesting direction (that very few Event Modeling tools explore yet) is this:\n\nIf slices are defined in a DSL and compiled into a graph, the system can **automatically detect missing slices**—for example commands that never produce events or read models that are never consumed. This turns the architecture model into something closer to a **lintable specification of the system** rather than just documentation."

