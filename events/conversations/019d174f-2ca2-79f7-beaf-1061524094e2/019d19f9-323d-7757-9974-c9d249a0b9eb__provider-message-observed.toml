kind = "plain_text"
text = "What entity[\"people\",\"Adam Dymitruk\"] says about **expanding the timeline** is actually the key to understanding the deeper structure of Event Modeling.\n\nOnce you follow that rule — *“just keep expanding complex things into workflows”* — something interesting appears:\n\n> The entire system alternates between **state nodes** and **behavior nodes**.\n\nThis is the structural pattern hiding under the board.\n\n---\n\n# 1. The two fundamental node types\n\nAlmost everything on the board can be reduced to one of two categories.\n\n### State nodes (facts or knowledge)\n\nThese represent **what is known**.\n\nExamples:\n\n```\nEvent\nRead Model\n```\n\nThey are **data**.\n\nExamples:\n\n```\nLaundryLoadStarted\nLaundryLoadCompleted\nActiveLoads\nOrdersAwaitingShipment\n```\n\nThese are **snapshots of knowledge**.\n\n---\n\n### Behavior nodes (transformations)\n\nThese represent **logic that transforms state**.\n\nExamples:\n\n```\nCommand handler\nProjection\nProcessor\n```\n\nThey are **functions or rules**.\n\nExamples:\n\n```\nStartLaundryLoad decision\nUpdateActiveLoads projection\nSendNotification processor\n```\n\nThese transform one state into another.\n\n---\n\n# 2. The hidden alternating structure\n\nIf you expand the system fully, it becomes:\n\n```\nState → Behavior → State → Behavior → State\n```\n\nFor example:\n\n```\nCommand\n   ↓\nEvent\n   ↓\nProjection\n   ↓\nRead Model\n   ↓\nProcessor\n   ↓\nCommand\n```\n\nExpanded:\n\n```\nState (Command)\n   ↓\nBehavior (Decision)\n   ↓\nState (Event)\n   ↓\nBehavior (Projection)\n   ↓\nState (Read Model)\n   ↓\nBehavior (Processor)\n   ↓\nState (Command)\n```\n\nSo the architecture **alternates perfectly**.\n\n---\n\n# 3. Why Adam’s “timeline expansion” works\n\nWhen Adam says:\n\n> *expand complex things out into workflows*\n\nhe’s effectively telling you to **keep revealing the hidden behavior nodes**.\n\nExample compressed slice:\n\n```\nEvent → Green Box → UI\n```\n\nExpanded:\n\n```\nEvent\n  ↓\nProjection\n  ↓\nRead Model\n  ↓\nQuery/View\n  ↓\nUI\n```\n\nEach expansion reveals **more transformation steps**.\n\n---\n\n# 4. This is why the green box is a TODO list\n\nThe green box represents **knowledge of work waiting to happen**.\n\nExample:\n\n```\nOrdersAwaitingShipment\nMachinesNeedingMaintenance\nNotificationsPending\n```\n\nProcessors look at those lists.\n\n```\nRead Model\n   ↓\nProcessor\n   ↓\nCommand\n```\n\nSo the read model is basically:\n\n```\nState describing unfinished work\n```\n\n---\n\n# 5. The repeating cycle\n\nIf you follow the whole system you get a loop:\n\n```\nCommand\n   ↓\nDecision\n   ↓\nEvent\n   ↓\nProjection\n   ↓\nRead Model\n   ↓\nProcessor\n   ↓\nCommand\n```\n\nWhich repeats indefinitely.\n\nGraphically:\n\n```\nCommand → Event → Read Model → Command\n```\n\nBut with behavior nodes in between.\n\n---\n\n# 6. Why this pattern scales\n\nBecause each behavior node is **small and deterministic**.\n\nYou can reason about each step independently:\n\n| Step | Responsibility |\n|-----|---------------|\nDecision | validate commands |\nProjection | build state |\nProcessor | trigger work |\n\nEach step is **simple and isolated**.\n\n---\n\n# 7. How this connects to Adam’s timeline\n\nThe **timeline row** of events gives you the **temporal backbone** of the system.\n\n```\nEvent → Event → Event → Event\n```\n\nEverything else hangs off that timeline.\n\n```\nEvent\n   ├── Projection\n   ├── Processor\n   └── UI reaction\n```\n\nSo the board is really:\n\n```\nTime axis + reaction graph\n```\n\n---\n\n# 8. The interesting architectural insight\n\nBecause events are immutable, the system becomes:\n\n```\nHistory\n   ↓\nTransformations\n   ↓\nKnowledge\n   ↓\nActions\n```\n\nThis is why event-sourced systems feel so clean.\n\n---\n\n# 9. In the graph model you’ve been exploring\n\nYou could express the system like this:\n\nNode types:\n\n```\nState nodes\n  Event\n  ReadModel\n\nBehavior nodes\n  Decision\n  Projection\n  Processor\n```\n\nEdges:\n\n```\nState → Behavior → State\n```\n\nThat’s the entire architecture.\n\n---\n\n# 10. Why this fits perfectly with slice replacement\n\nYour **replace slices instead of mutating them** principle works well because slices are basically **small state-behavior-state chains**.\n\nExample slice:\n\n```\nEvent\n   ↓\nProjection\n   ↓\nRead Model\n```\n\nReplacing a slice just swaps that chain out.\n\nThe rest of the graph remains stable.\n\n---\n\n✅ So Adam’s “expand workflows along the timeline” idea is really guiding you to uncover this deeper structure:\n\n```\nState → Behavior → State → Behavior → State\n```\n\nThe Event Modeling board is simply a **human-friendly projection of that alternating transformation graph**.\n\n---\n\nIf you'd like, I can also show you something that tends to make Event Modeling “click” for people who think in graphs like you do:\n\n**the board can be reinterpreted as three orthogonal axes (time, causality, and knowledge)**, and once you see that, it becomes much easier to design large systems without the board getting messy."

