text = "Yes — you’re describing something entity[\"people\",\"Adam Dymitruk\"] has been refining recently, and it actually reveals something deeper about how **queries/read models differ from commands**.\n\nLet’s break the evolution down.\n\n---\n\n# 1. Original Event Modeling usage of GWT\n\nTraditionally **Given–When–Then (GWT)** is used for **command decisions**.\n\nStructure:\n\n```\nGiven  prior events / state\nWhen   command happens\nThen   event occurs\n```\n\nExample:\n\n```\nGiven  MachineAvailable\nWhen   StartLaundryLoad\nThen   LaundryLoadStarted\n```\n\nThis describes **domain decision logic**.\n\nGraphically:\n\n```\nState + Command → Event\n```\n\n---\n\n# 2. How Adam applied it to read models\n\nFor **read slices**, Adam adapted the structure.\n\nInstead of **When**, the read model is triggered by events.\n\nSo it becomes:\n\n```\nGiven events\nThen read model state\n```\n\nExample:\n\n```\nGiven\n  LaundryLoadStarted\n  LaundryLoadCompleted\nThen\n  ActiveLoads = []\n```\n\nThis describes **projection behavior**.\n\nGraphically:\n\n```\nEvents → Projection → Read Model\n```\n\n---\n\n# 3. The limitation of that form\n\nThat simplified form hides something important.\n\nRead models usually answer **queries**, which involve **filtering or selection**.\n\nExample:\n\n```\nActiveLoadsForUser(userId)\n```\n\nThe read model state might be:\n\n```\nAllActiveLoads\n```\n\nBut the UI asks for:\n\n```\nActiveLoads WHERE userId = X\n```\n\nThat filtering step wasn’t visible in the original modeling.\n\n---\n\n# 4. Adam’s newer thinking: add **Where**\n\nThe idea is that the read side might be better represented as:\n\n```\nGiven\n  events / state\n\nWhere\n  filter or query condition\n\nThen\n  result\n```\n\nExample:\n\n```\nGiven\n  ActiveLoads\n\nWhere\n  userId = 42\n\nThen\n  loads for user 42\n```\n\nNow the query logic is explicit.\n\n---\n\n# 5. This separates two concepts that were previously blurred\n\nThere are actually **two different transformations on the read side**.\n\n### Projection\n\nBuild state from events:\n\n```\nEvents → Read Model\n```\n\nExample:\n\n```\nLaundryLoadStarted → add row\nLaundryLoadCompleted → remove row\n```\n\n---\n\n### Query\n\nSelect information from the read model:\n\n```\nRead Model → Query Result\n```\n\nExample:\n\n```\nActiveLoads WHERE userId = 42\n```\n\n---\n\n# 6. So the full read pipeline becomes\n\nInstead of:\n\n```\nEvent → Read Model → UI\n```\n\nYou really have:\n\n```\nEvent → Projection → Read Model → Query → UI\n```\n\nAnd Adam’s idea is to express that query step as **Where**.\n\n---\n\n# 7. In GWTW form\n\nThe read slice becomes:\n\n```\nGiven   events → build read model\nWhere   query/filter\nThen    returned data\n```\n\nExample:\n\n```\nGiven\n  LaundryLoadStarted\n  LaundryLoadCompleted\n\nWhere\n  status = active\n  userId = 42\n\nThen\n  [Load123, Load456]\n```\n\n---\n\n# 8. Why this matters architecturally\n\nBecause it clarifies that **projections and queries are different responsibilities**.\n\n| Step | Responsibility |\n|-----|----------------|\nProjection | maintain read model |\nQuery | filter/shape data |\nView | present to UI |\n\nThis separation is very important for scaling systems.\n\n---\n\n# 9. In the graph model you’ve been exploring\n\nYour nodes would become:\n\n```\nEvent\nProjection\nReadModel\nQuery\nView\n```\n\nEdges:\n\n```\nEvent → Projection\nProjection → ReadModel\nReadModel → Query\nQuery → View\n```\n\nWhich fits perfectly with your idea that architecture is **a graph of transformations**.\n\n---\n\n# 10. The deeper insight Adam is circling\n\nCommands ask:\n\n```\nCan this happen?\n```\n\nQueries ask:\n\n```\nWhat is true?\n```\n\nThose are fundamentally different kinds of logic.\n\nGWT works naturally for commands.\n\nBut queries need the **Where clause** because they involve **selection**.\n\n---\n\n# 11. The interesting symmetry\n\nYou end up with two mirrored pipelines:\n\n### Write side\n\n```\nGiven + When → Then\nState + Command → Event\n```\n\n---\n\n### Read side\n\n```\nGiven + Where → Then\nState + Filter → Result\n```\n\nThis symmetry is actually quite elegant.\n\n---\n\n✅ So what Adam is exploring with **Where** is making the **query semantics explicit**, which were previously hidden inside the green read model box.\n\n---\n\nIf you'd like, I can also show you something really interesting about this:\n\nOnce you add **Where**, the read side of Event Modeling becomes almost identical to **relational algebra** and **Datalog-style query systems**, which connects surprisingly well with systems like entity[\"software\",\"Datomic\",\"database\"]."

