text = "Short answer: **yes, most of the time Adam’s Given–When–Then lines represent policies**, but with an important nuance.\n\nThe Given–When–Then structure in entity[\"people\",\"Adam Dymitruk\"]’s **Event Modeling** is a **behavior specification**, and in many cases that behavior is exactly what we would call a **policy** in event-driven architecture.\n\nHowever, **not every Given–When–Then is a policy**. Some represent **aggregate/domain decision logic** instead.\n\nUnderstanding that distinction will make your models much clearer.\n\n---\n\n# 1. What Given–When–Then actually describes\n\nThe structure comes from **behavior-driven development (BDD)**.\n\n```\nGiven  (existing state / prior events)\nWhen   (a command happens)\nThen   (a new event occurs)\n```\n\nExample:\n\n```\nGiven  LaundryLoadStarted\nWhen   CompleteLaundryLoad\nThen   LaundryLoadCompleted\n```\n\nThis describes **a rule about system behavior**.\n\n---\n\n# 2. What a policy is in event systems\n\nIn event-driven architecture a **policy** is typically:\n\n```\nEvent → Command\n```\n\nMeaning:\n\n> When an event occurs, the system automatically issues a command.\n\nExample:\n\n```\nLaundryLoadCompleted\n    ↓\nSendNotification\n```\n\nPolicies are sometimes called:\n\n- process managers\n- sagas\n- reactors\n- automations\n\n---\n\n# 3. Where Given–When–Then fits\n\nA Given–When–Then scenario actually describes:\n\n```\nState + Command → Event\n```\n\nGraphically:\n\n```\nEvents (Given)\n      ↓\nCommand (When)\n      ↓\nEvent (Then)\n```\n\nThat is **domain decision logic**.\n\n---\n\n# 4. The key distinction\n\nThere are two different causal patterns in event systems:\n\n### Command decision\n\n```\nState + Command → Event\n```\n\nExample:\n\n```\nGiven  MachineAvailable\nWhen   StartLaundryLoad\nThen   LaundryLoadStarted\n```\n\nThis is **domain logic**.\n\nUsually inside a **command handler / aggregate / decision function**.\n\n---\n\n### Policy automation\n\n```\nEvent → Command\n```\n\nExample:\n\n```\nLaundryLoadCompleted\n    ↓\nSendCompletionNotification\n```\n\nThis is a **policy**.\n\n---\n\n# 5. How Event Modeling mixes these visually\n\nEvent Modeling boards typically show both:\n\n```\nCommand → Event\nEvent → Policy → Command\n```\n\nBut when writing **Given–When–Then scenarios**, people often write them for **both kinds of behavior**.\n\nExample policy written in BDD form:\n\n```\nGiven LaundryLoadCompleted\nWhen  SystemProcessesEvent\nThen  NotificationSent\n```\n\nWhich hides the underlying:\n\n```\nEvent → Command → Event\n```\n\n---\n\n# 6. So the mapping looks like this\n\n| Concept | Graph Pattern |\n|------|------|\nCommand decision | State + Command → Event |\nPolicy | Event → Command |\nProjection | Event → Read Model |\n\nGiven–When–Then typically models **the first**.\n\nBut sometimes it implicitly includes the second.\n\n---\n\n# 7. In a graph model (which you’ve been exploring)\n\nThese become distinct node types:\n\n```\nCommand\nEvent\nPolicy\nProjection\n```\n\nExample:\n\n```\nStartLaundryLoad (Command)\n      │\n      ▼\nLaundryLoadStarted (Event)\n      │\n      ▼\nNotifyUserPolicy\n      │\n      ▼\nSendNotification (Command)\n      │\n      ▼\nNotificationSent (Event)\n```\n\nNow the causal structure is explicit.\n\n---\n\n# 8. Why this matters for your architecture\n\nIf you separate them cleanly you get a very nice graph:\n\n```\nCommands → Events → Policies → Commands → Events\n                   ↓\n               Projections\n                   ↓\n               Read Models\n```\n\nThis fits extremely well with your **slice / graph architecture idea**.\n\n---\n\n# 9. A good rule of thumb\n\nWhen modeling:\n\n**Ask two questions**\n\n1️⃣ *Did a human/system request something?*  \n→ **Command**\n\n2️⃣ *Did the system automatically react?*  \n→ **Policy**\n\n---\n\n# 10. My recommendation for your modeling style\n\nSince you are building a **graph-oriented architecture**, I would explicitly model policies as their own node type.\n\nExample node types:\n\n```\nCommand\nEvent\nPolicy\nProjection\nReadModel\nView\n```\n\nThat makes causal flows much easier to analyze.\n\n---\n\n✅ **Command decision**\n\n```\nCommand → Event\n```\n\n⚙️ **Policy**\n\n```\nEvent → Command\n```\n\n📊 **Projection**\n\n```\nEvent → Read Model\n```\n\n---\n\nIf you'd like, I can also show you something that tends to **blow people’s minds once they see it**:\n\nThere are actually **only three fundamental transformation types in an event-modeled system**, and everything on the board is one of those three."

