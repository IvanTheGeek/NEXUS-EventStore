[[body.segments]]
kind = "reasoning"
text = "The user is asking two things:\n1. Do the titles need updating beyond just removing the prefix?\n2. Should the topic type be changed to \"Problem\" or similar?\n\nLet me think about this.\n\nFor titles - removing \"Limitation — \" from each:\n1. `Subcategory depth is capped at one level` - works fine\n2. `Tags are a flat global list with no scoping` - works fine\n3. `Wiki edit history is not accessible` - works fine\n4. `Claude export does not include model version` - works fine\n5. `Claude export does not include project membership` - works fine\n6. `Flat top-level navigation mixes categories of different scope` - works fine\n\n\nThese all read well as plain declarative facts. No other changes needed.\n\nFor topic type - Talkyard has a \"Problem\" type that could work, but I'm uncertain whether it implies solvability within the current system. Since these limitations are really waiting for LOGOS to replace Talkyard rather than being fixable in the existing setup, marking them as \"Problem\" might send the wrong signal about whether they're actually resolvable.\n\nA wiki type might fit better since these are reference documents about known constraints, but the user has already chosen their topic types. I should ask what types are available in their instance and how the Problem type actually displays status."

[[body.segments]]
kind = "plain_text"
text = "On the titles — just strip the prefix, the rest holds up. `Wiki edit history is not accessible`, `Tags are a flat global list with no scoping`, etc. All read cleanly as declarative facts.\n\nOn topic type — good instinct, but worth thinking through what \"Problem\" actually signals in Talkyard before committing. The Problem type typically surfaces a solved/unsolved status indicator on the topic. That creates a question: what does \"solved\" mean for a Talkyard limitation?\n\nThere are two possible readings:\n\n**\"Solved\" means a workaround is in place** — then some of these are solved (#1, #2, #4 workarounds exist) and some aren't (#3 wiki history has no adequate workaround). That's actually meaningful signal.\n\n**\"Solved\" means the limitation itself is gone** — which only happens when Talkyard fixes it or LOGOS replaces it. In that frame nothing is solved yet, and the type would just show everything as open indefinitely.\n\nThe second reading is more honest to the intent — these are immutable facts about an interim platform, not tickets being worked. That pushes back toward keeping them as wiki posts, which signals \"reference record\" rather than \"open issue.\"\n\nBefore changing anything: what type did you create them as? And do you know if Talkyard's Problem type lets you set what \"solved\" means, or is it just a binary open/closed?"

