ess in other contexts. Workaround requires tag naming conventions (prefixes) rather than structural scoping.\\\\\\\\\\\\\\\\n\\\\\\\\\\\\\\\\n**Workaround:** Use tags only for genuinely cross-cutting concerns. For context-specific categorization rely on the category structure itself.\\\\\\\\\\\\\\\\n\\\\\\\\\\\\\\\\n**LOGOS Requirement Generated:** Category-scoped tags \\\\\\\\\\\\\\\\u2014 tags defined at any category level, inheriting down the hierarchy. Global tags remain available but are an explicit choice.\\\\\\\\\\\\\\\\n\\\\\\\\\\\\\\\\n---\\\\\\\\\\\\\\\\n\\\\\\\\\\\\\\\\n## Post 3 \\\\\\\\\\\\\\\\u2014 Wiki Edit History Not Visible\\\\\\\\\\\\\\\\n\\\\\\\\\\\\\\\\n**Discovered:** Edited a wiki post and attempted to view previous version.\\\\\\\\\\\\\\\\n\\\\\\\\\\\\\\\\n**Limitation:** Talkyard tracks revision numbers internally (the \\u0060currRevNr\\u0060 field increments on each edit) but provides no user-facing UI to view previous versions, compare revisions, or revert to an earlier state. Once you edit a wiki post the previous content is gone from the user\\u0027s perspective.\\\\\\\\\\\\\\\\n\\\\\\\\\\\\\\\\n**Impact:** Major gap for an event-sourced knowledge base. Editing a wiki post is a destructive operation from the user\\u0027s perspective. The history of how understanding evolved is lost. Cannot audit changes, cannot revert mistakes, cannot compare current vs previous understanding.\\\\\\\\\\\\\\\\n\\\\\\\\\\\\\\\\n**Workaround:** None adequate. Could maintain external version history manually but this defeats the purpose of integrated wiki functionality.\\\\\\\\\\\\\\\\n\\\\\\\\\\\\\\\\n**LOGOS Requirement Generated:** Full wiki revision history \\\\\\\\\\\\\\\\u2014 every edit is a viewable, diffable, revertable event. Event sourced editing at the foundation.\\\\\\\\\\\\\\\\n\\\\\\\\\\\\\\\\n---\\\\\\\\\\\\\\\\n\\\\\\\\\\\\\\\\n## Post 4 \\\\\\\\\\\\\\\\u2014 Model/Version Metadata Missing from Claude Export\\\\\\\\\\\\\\\\n\\\\\\\\\\\\\\\\n