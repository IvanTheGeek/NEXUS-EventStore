kind = "plain_text"
text = " Good — so the subcategory isn't just a reference document, it's a living space where the methodology is actively understood and evolved. That changes the framing significantly.\n\nLet me think through the vocabulary first, because the right word matters here.\n\n**Methodology** — describes a system of methods. Accurate but dry. Implies something fixed and handed down. Doesn't invite contribution or evolution.\n\n**Framework** — describes a structure that supports building. Slightly more active but still feels static. Also overloaded in software contexts.\n\n**Principles** — the foundational beliefs that drive decisions. True of NEXUS but only captures one layer — the why, not the how.\n\n**Practice** — how the methodology is actually applied. Living and active. But loses the structural/conceptual layer.\n\n**Doctrine** — a body of beliefs and principles. Has weight and intentionality. But feels rigid and closed.\n\n**Canon** — the established body of knowledge. Interesting — implies both authority and that it can grow. But has religious connotations that might not fit.\n\n**Philosophy** — the underlying thinking and worldview. Captures the why deeply but loses the how entirely.\n\n**Craft** — how the work is actually done, developed through practice. Active and human. Loses the structural documentation aspect.\n\n**Handbook** — a practical guide to how things work here. Approachable for newcomers. But implies a fixed document rather than a living space.\n\n---\n\nThe tension is between two things you need simultaneously:\n\n1. **Authoritative reference** — a newcomer can read this and understand NEXUS\n2. **Living evolution** — this is also where NEXUS gets questioned, extended, and improved\n\nThose two needs pull in different directions. A single subcategory trying to do both might need to be honest about that tension in its structure — perhaps through topic types. Wiki topics for the stable reference layer. Discussion or Idea topics for active exploration. Problem topics for identified gaps.\n\nThat framing suggests the subcategory name should reflect the living aspect, not the reference aspect — because the reference is just one kind of content within it. The name that best captures \"this is where NEXUS is understood and evolves\" might be something like:\n\n**Understanding** — where NEXUS is explained, explored, and refined. Newcomers read it to get oriented. Practitioners add to it as understanding deepens.\n\n**Foundation** — what NEXUS is built on and why. Stable enough to reference, open enough to evolve.\n\n**Core** — the essential thinking. Brief, strong, doesn't prejudge the content type.\n\n**The Work** — how things actually get done here. Very active but perhaps too vague.\n\n**Living Methodology** — honest about both aspects but wordy.\n\nWhat's your reaction to **Understanding** as the subcategory name? It does double duty — it's what a newcomer does when they arrive, and it's what the community is always deepening."

