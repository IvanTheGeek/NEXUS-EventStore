text = " Under NEXUS makes the most sense — the import pipeline is a NEXUS tool, not an app for end users. It's infrastructure that serves the framework.\n\nSomething like:\n\n```\nDEVELOPMENT\n  └── NEXUS\n        └── Chat Import Pipeline\n```\n\nOr if you want to think bigger than just Claude imports — this pipeline could eventually handle other data sources — maybe:\n\n```\nDEVELOPMENT\n  └── NEXUS\n        └── Data Import & Ingestion\n```\n\nThat leaves room for future importers — other AI chat exports, documents, notes — without renaming the category later.\n\nWhich feels right, or does something else come to mind?"

