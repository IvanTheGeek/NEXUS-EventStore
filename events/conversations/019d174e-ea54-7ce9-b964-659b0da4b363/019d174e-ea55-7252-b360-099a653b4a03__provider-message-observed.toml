[[body.segments]]
kind = "plain_text"
text = " That's a meaningful distinction. You're serving two different audiences with different intents:\n\n**App users** — just want to use LaundryLog, report a bug, wish for a feature. Don't care about the framework behind it.\n\n**Framework/methodology people** — interested in NEXUS, event modeling, the pipeline, Penpot integration, MCP server. More technical, bigger picture.\n\nA structure that serves both:\n\n```\nAPPS\n  └── LaundryLog\n  └── PerDiemLog\n  └── (future apps)\n\nNEXUS\n  └── Framework\n  └── Event Modeling\n  └── MCP Server\n  └── Penpot Integration\n  └── Event Model Viewer\n\nAI CHATS\n  └── Claude\n\n(other top level domains)\n```\n\nAPPS is friendly and approachable — a truck driver finding LaundryLog lands there without needing to understand anything about the framework.\n\nNEXUS is where the deeper methodology and infrastructure lives — someone interested in the how and why of the system goes there.\n\nThe relationship between them is real but doesn't need to be visible in the navigation structure for casual users.\n\nDoes that separation feel right, or does something feel misplaced?"

