[[body.segments]]
kind = "plain_text"
text = " Yes, it should be a wiki — it's living documentation that will evolve as the system develops.\n\nGood to know about Talkyard's workflow for future reference:\n1. Create the topic/post normally first\n2. Then convert it to a wiki after posting\n\nThat applies to all the wiki posts we've drafted — LaundryLog Start Here, the three LaundryLog topics, and now this one. The process is the same each time: post first, then find the option to convert to wiki (usually in the post's action menu).\n\nGo ahead and post it, convert to wiki, and pin it. Let me know when done and we'll figure out what's next."

