[[body.segments]]
kind = "reasoning"
text = "The user is pointing out that Talkyard isn't just an interim platform to be replaced — it's actually a reference implementation and starting point for building LOGOS. The approach is to study what Talkyard does (its behavior and capabilities), not its code, and use that as a basis for LOGOS requirements. Combined with the limitations already documented, this gives a complete picture: what Talkyard does well becomes requirements, what it can't do becomes requirements from the other direction.\n\nThis is worth updating in the Tools wiki and also adds checklist items."

[[body.segments]]
kind = "plain_text"
text = "Important distinction — and it reframes the relationship between Talkyard and LOGOS significantly. Talkyard is not just \"the thing we're stuck with until we build something better.\" It is the reference implementation. What Talkyard does well and correctly is as much a source of requirements as what it can't do.\n\nThe two-sided requirements picture:\n- **Talkyard Limitations** — what Talkyard can't do that LOGOS must\n- **Talkyard capabilities** — what Talkyard does well that LOGOS must also do, derived by studying its behavior not its code\n\nCombined they form a fairly complete functional specification for LOGOS derived from active use of the reference implementation. That's a solid foundation.\n\nHere's the replacement for the Talkyard section in the wiki:\n\n```markdown\n## Talkyard — Current LOGOS Platform and Reference Implementation\n\n**Role:** The forum platform currently running \nLOGOS and the reference implementation from \nwhich LOGOS requirements are derived.\n\nTalkyard is the platform on which LOGOS currently \nruns. It provides the forum structure, wiki topics, \ncategory hierarchy, and API that LOGOS uses today.\n\nTalkyard serves a dual purpose within NEXUS. First, \nit is the working platform — the place where LOGOS \noperates while the purpose-built platform is being \ndefined. Second, and equally important, it is the \nreference implementation for what LOGOS must be.\n\nBuilding LOGOS is not a greenfield design exercise. \nIt is closer to a principled reverse engineering — \nstudying what Talkyard does, how it behaves, what \nit enables, and deriving requirements from that \nactive use. Not from its code — from its behavior. \nWhat Talkyard does well that works for LOGOS becomes \na requirement. What Talkyard cannot do that LOGOS \nneeds becomes a requirement from the other direction.\n\nThe two sources together form a comprehensive \nfunctional specification:\n\n- **LOGOS → Talkyard Limitations** — constraints \n  and gaps that LOGOS must not have. Each \n  limitation is a permanent record of something \n  the next platform must solve.\n- **LOGOS → Requirements** — capabilities LOGOS \n  must have, sourced from both limitations and \n  from what Talkyard does correctly that must \n  be preserved and extended.\n\nTalkyard is explicitly an interim platform in the \nsense that LOGOS will eventually supersede it. But \nit is not a throwaway — it is the foundation from \nwhich LOGOS is understood and specified.\n\n*See: LOGOS → Talkyard Limitations.*\n*See: LOGOS → Requirements.*\n```\n\n---\n\n**Checklist additions:**\n\nNEXUS → Insights:\n- [ ] `Talkyard as reference implementation — reverse engineering a working system to build its successor`\n\nLOGOS → Requirements:\n- [ ] `Talkyard capability audit — systematic review of what Talkyard does well that LOGOS must preserve` — this is a meta-requirement: the process of deriving requirements from Talkyard's behavior needs to be explicit and systematic, not ad hoc\n\nLOGOS → Talkyard Limitations:\n- [ ] Consider whether the category README needs updating to reflect the dual role — limitations AND capabilities as sources of LOGOS requirements\n\nLet me know when the wiki is updated and I'll move to the next item."

