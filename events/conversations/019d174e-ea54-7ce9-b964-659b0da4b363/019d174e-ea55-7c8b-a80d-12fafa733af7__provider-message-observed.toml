kind = "plain_text"
text = " The tension is between too specific (NEXUS only) and too broad (SOFTWARE). \n\nA few options in that middle ground:\n\n1. **DEVELOPMENT** — short, clear, implies the craft not just the output\n2. **THE CRAFT** — more personal, fits your philosophy-driven approach\n3. **SOFTWARE CRAFT** — splits the difference, specific enough without being too narrow\n4. **METHODOLOGY** — accurate but dry, feels academic\n5. **FRAMEWORK** — implies NEXUS without naming it, leaves room for other methodologies\n\nMy instinct is **DEVELOPMENT** as the top level, with NEXUS as a subcategory within it alongside other development-related topics:\n\n```\nAPPS\n  └── LaundryLog\n  └── PerDiemLog\n\nDEVELOPMENT\n  └── NEXUS\n        └── Framework\n        └── MCP Server\n        └── Penpot Integration\n  └── Event Modeling\n  └── Tools & Research\n\nAI CHATS\n  └── Claude\n```\n\nEvent Modeling sits alongside NEXUS rather than inside it because it's bigger than NEXUS — it's the methodology your whole approach is built on, and others might engage with just that topic independently.\n\nDoes DEVELOPMENT feel right as the container, or does something else resonate more?"

