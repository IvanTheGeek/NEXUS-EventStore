[[body.segments]]
kind = "plain_text"
text = "Speaking to that, everything I do and build will be based on event sourcing as the source of truth. In order to document on my own terms all my numerous chats I have had with Claude  over the proceeding months and future interactions, have an event sourced record seems logical to me as well fits into my future ideas as training data for models. These chats seem to me to be that they could be fit into talkyard and use it as the event store. either as a topic with posts or even as a talkyard chat stream. Once a method and format is decided, i think doing an export of all data from claude would be possible, ran through data transformation (F# of course) and then maybe use talkyard api to import in to it. The process would need to be able to recognize already entered data and not duplicate in talkyard. What do you say about this?"

