kind = "plain_text"
text = "Good addition — it strengthens the audit case significantly because it creates corroborating evidence, not just a self-reported log.\n\nAdd this sentence to the end of that paragraph:\n\n> When payment is made by credit card — common at modern truck stop laundry machines — the card statement provides corroborating evidence that matches the log entry, date, location, and amount. A detailed log plus matching statements is a strong audit position.\n\nOr if you want it as a standalone follow-on paragraph:\n\n> When payment is by credit card, the card statement becomes corroborating evidence. The log entry and the statement match on date, location, and amount — two independent records telling the same story. That's a strong audit position, and it's one reason LaundryLog captures payment method on every entry.\n\nThe second version is better I think — it explains *why* capturing payment method matters, which connects the feature to the purpose rather than it just being another field. It also subtly tells the reader that the app was designed thoughtfully.\n\nWhich do you prefer, or want a blend of both?"

