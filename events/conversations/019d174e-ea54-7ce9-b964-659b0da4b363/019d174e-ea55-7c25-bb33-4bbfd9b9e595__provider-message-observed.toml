[[body.segments]]
kind = "plain_text"
text = "Sure. Here's a short one for the category description:\n\n> Track laundromat expenses on the road — machines, supplies, payment method, and location — for clean accounting records at tax time.\n\nAnd a longer one that includes the why:\n\n> Truck drivers spend money at laundromats regularly but tracking those expenses on the road is inconvenient, so they go unrecorded and unclaimed. LaundryLog makes it fast to log each expense at the moment it happens — machine type, quantity, price, payment method, and location — so nothing gets forgotten. The result is an accurate record ready for accounting and tax filing, turning an easy-to-skip habit into a real deduction.\n\nWant me to adjust the tone or length on either, or do those land well enough to use?"

