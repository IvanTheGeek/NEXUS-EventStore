text = "I started a list of API ideas here: https://www.talkyard.io/-379/talkyard-api-ideas · (I&#x27;m curious what the MVP will be about? Sorry if maybe I cannot implement features and API endpoints fast enough for your situation — but thanks anyway for the ideas &amp; feedback you posted :- )) Maybe this Top 5 Topics in Category / Tag X could be the Search API, but with the full text query left out. Something like: POST /-/v0/search with JSON: { searchQuery: { tagRefs: [tagX], orderBy: SortOrder.PopularFirst, limit: 5 }} ... @timmartin — I&#x27;m almost done adding an &quot;list the X most popular questions on topic X&quot; API. I realize you probably won&#x27;t use it, because you were short of time — still, it&#x27;s a good idea. And I think it was good to see how this Find-popular-topics-about-X API, can share code with the upcoming full text search API. Seems the find-popular-topics-about-X API will look like: POST /-/v0/list { listQuery: { findWhat: &#x27;Pages&#x27;, lookWhere: { inCategories: [categoryX] }, orderBy: &#x27;PopularFi\n\nI started a list of API ideas here: https://www.talkyard.io/-379/talkyard-api-ideas · (I'm curious what the MVP will be about? Sorry if maybe I cannot implement features and API endpoints fast enough for your situation — but thanks anyway for the ideas & feedback you posted :- )) Maybe this Top 5 Topics in Category / Tag X could be the Search API, but with the full text query left out. Something like: POST /-/v0/search with JSON: { searchQuery: { tagRefs: [tagX], orderBy: SortOrder.PopularFirst, limit: 5 }} ... @timmartin — I'm almost done adding an \"list the X most popular questions on topic X\" API. I realize you probably won't use it, because you were short of time — still, it's a good idea. And I think it was good to see how this Find-popular-topics-about-X API, can share code with the upcoming full text search API. Seems the find-popular-topics-about-X API will look like: POST /-/v0/list { listQuery: { findWhat: 'Pages', lookWhere: { inCategories: [categoryX] }, orderBy: 'PopularFi\n\nI started a list of API ideas here: https://www.talkyard.io/-379/talkyard-api-ideas · (I'm curious what the MVP will be about? Sorry if maybe I cannot implement features and API endpoints fast enough for your situation — but thanks anyway for the ideas & feedback you posted :- )) Maybe this Top 5 Topics in Category / Tag X could be the Search API, but with the full text query left out. Something like: POST /-/v0/search with JSON: { searchQuery: { tagRefs: [tagX], orderBy: SortOrder.PopularFirst, limit: 5 }} Reply · KajMagnus @KajMagnus · core-dev · support-team2020-04-26 21:41:49.531Z · @timmartin — I'm almost done adding an \"list the X most popular questions on topic X\" API. I realize you probably won't use it, because you were short of time — still, it's a good idea. And I think it was good to see how this Find-popular-topics-about-X API, can share code with the upcoming full text search API.\n\nRedoc looks interesting. — What API endpoints would you be interested in? (Hmm, unless I was too slow with replying :- (. Maybe then I could start with that.) the documentation category holds only a handful of pages · Yes, and I'm a bit about to start to write documentation. Just recently I implemented sub categories, so that now there can be a Documentation category, with sub categories: How To:s, Tutorials, Reference, Theory. ... Hi @KajMagnus , thanks for the reply! Honestly I don't know what I'm looking for, it was just to have a bird's eye view on what it could be possible with the API right now. I'm trying to compare various Q&A platform and pick the one that gives us the most flexibility/integration ability with our current company infrastructure. We use Google Workplace, so I was wondering about creating a Google Chat Bot for quick search and notification (something I've seen in Tettra's Slack integration).\n\nPOST /-/v0/search { searchQuery: { freetext: \"how climb trees\", lookWhere: { inCategories: [categoryX] }, orderBy: 'PopularFirst', limit: 5, } ... Hi! I am trying to use these instructions to conenct with a bubble.io instance. It has an api connector, which I have used for other integrations for SSO. However I can not seem to structure the json properly to have talkyard like the response. ... I am wondering if I could connect using postman or another way to better troubleshoot this. Or maybe I can not use the standard API connection tools in bubble.io ? I am happen to share more details, if I could get it working with Bubble there would be many people that would like to follow my integration with their systems as a lot of people are going with discourse but not terribly happy. ... I replied here, in a new topic: https://www.talkyard.io/-380/how-use-talkyard-with-bubbleio — would you like to reply there please :- ) ...\nI think the endpoint you want to use, is in fact /-/v0/upsert (which should probably get renamed to /-/v0/import). I&#x27;ll reply here later today or tomorrow, with info about the JSON format. /-/v0/upsert-simple was intended for creating new pages, and generating notifications about those new pages. But the pages you&#x27;re inserting, aren&#x27;t new. In addition to that, /-/v0/upsert-simple is now a bit deprecated, and instead there&#x27;s a new Do API at /-/do, via which one can send a bunch of things-to-do, e.g. create new pages and replies, and then Talkyard will do it and generate notifications and (once implemented) webhook events. Whilst /-/upsert won&#x27;t generate notifications or events; it just silently upserts stuff. ... Sure, no rush. Thank you for checking it out, I&#x27;ll wait to hear more about the JSON format. I&#x27;m not sure if my pages count as new or not, since they&#x27;re new here but duplicated from somewhere else.\n\nI think the endpoint you want to use, is in fact /-/v0/upsert (which should probably get renamed to /-/v0/import). I'll reply here later today or tomorrow, with info about the JSON format. /-