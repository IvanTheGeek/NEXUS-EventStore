text = "Forum software, with chat, and anonymous comments. Thoughtful discussions. Insightful comments rise to the top. Upvote ideas. Sort by votes. Question-Answers. Discuss, select an answer. Chat channels. Pretty basic features. Blog comments. Listen to your readers. How does it compare with other software? Find out here. Self-Hosting: See talkyard-prod-one Demo: https://insightful.demo.talkyard.io Discussion forum: https://forum.talkyard.io Documentation: https://docs.talkyard.io (incomplete) Development: That&#x27;s this repo! See: docs/developing-talkyard.md · Find the interesting stuff, also in big discussions. Create your own tags with values, list and sort by value. For example, a priority tag: tags:priority:desc&gt;2 is:open, here: https://forum.talkyard.io/-/search?q=tags:priority:desc&gt;2+is:open · So e.g. students can post embarassing questions. Or for anonymous feedback, etc.\n\nForum software, with chat, and anonymous comments. Thoughtful discussions. Insightful comments rise to the top. Upvote ideas. Sort by votes. Question-Answers. Discuss, select an answer. Chat channels. Pretty basic features. Blog comments. Listen to your readers. How does it compare with other software? Find out here. Self-Hosting: See talkyard-prod-one Demo: https://insightful.demo.talkyard.io Discussion forum: https://forum.talkyard.io Documentation: https://docs.talkyard.io (incomplete) Development: That's this repo! See: docs/developing-talkyard.md · Find the interesting stuff, also in big discussions. Create your own tags with values, list and sort by value. For example, a priority tag: tags:priority:desc>2 is:open, here: https://forum.talkyard.io/-/search?q=tags:priority:desc>2+is:open · So e.g. students can post embarassing questions. Or for anonymous feedback, etc.\nChanges since v0.2025.005. Full changelog: tyse-v0.2025.005-7a6728209-regular...tyse-v0.2025.007-9ef9b55d1-regular · Embedded forums part 1 of 3: Make login &amp; logout work, when Talkyard is in an &lt;iframe&gt; (embedded as a forum not &quot;just&quot; blog comments). 3f4d14d · Add Ban spammer shortcut on discussion pages, nice for blog comments. f251018 · Show chat purpose, if clicking chat title in topbar. 5141a02 · Better outgoing webhooks troubleshooting: Show error on admin API page. 889724b · Include timestamps in all log messages. 8417e22 ... Topic list jumps right when scrolling down. 79e8233. Page too wide. fb1e772 · Notification links wider than the link text. 498592f · Fix preview button issues. bfe37f7 · Show Maximize-editor btn also on smaller screens. f1df09b · Fix rename tag slug bug. 9f44388 · Don&#x27;t require page reload, when adding/removing chat members.\n\nA community discussion platform: Brings together the main features from StackOverflow, Slack, Discourse, Reddit, and Disqus blog comments. - debiki/talkyard\n\nChanges since v0.2025.005. Full changelog: tyse-v0.2025.005-7a6728209-regular...tyse-v0.2025.007-9ef9b55d1-regular · Embedded forums part 1 of 3: Make login & logout work, when Talkyard is in an <iframe> (embedded as a forum not \"just\" blog comments). 3f4d14d · Add Ban spammer shortcut on discussion pages, nice for blog comments. f251018 · Show chat purpose, if clicking chat title in topbar. 5141a02 · Better outgoing webhooks troubleshooting: Show error on admin API page. 889724b · Include timestamps in all log messages. 8417e22 ... Topic list jumps right when scrolling down. 79e8233. Page too wide. fb1e772 · Notification links wider than the link text. 498592f · Fix preview button issues. bfe37f7 · Show Maximize-editor btn also on smaller screens. f1df09b · Fix rename tag slug bug. 9f44388 · Don't require page reload, when adding/removing chat members.\n\nChanges since tyse-v0.2024.011. Full changelog: tyse-v0.2024.011-1f1c92bc5-regular...tyse-v0.2025.001-b8a91e87a-regular · Scrolling up in chats to read older messages. Finally Ty's chat channels start working more \"for real\", when at last you can scroll up and read old messages (instead of previously only the most recent 50 or so). Now talkyardSsoHow = 'RedirPage' (for blog comments Single Sign-On) disables may-compose-before-signup. Previously, this combination made the login popup window appear instead, resulting in a bad blog comments SSO user experience. On the Inspect page, sort groups in the correct order. Merge the bookmarks branch. (This is the major thing in this release.) But this feature disabled for now. Merge a cache-pages-client-side branch. This disabled too, for now. Quite nice, though, together with bookmarks, since I think that if you use bookmarks, you'll tend to jump back and forth between different bookmarked pages, and then it's annoying if you need to wait 200 ms\n\nFor example, if you're a university, and the students discuss things anonymously, but in the beginning only a few students have joined the forum. (If you can't see someone's profile, they also won't appear if you start typing a @username_mention (e2e test), unless they're in the same discussion using their real user account already.) Privacy preferences are inherited from one's trust level groups. This means that you can configure e.g. all students at once, via the All Members group. — These settings are visualized on the above-mentioned Inspect admin tab. (But the old priv prefs: may-mention-me and may-message-me, are not yet inherited from groups.) Make the \"You're anonymous\" warning / tips look less like a warning, and more like a tips. Now there's more e2e tests, so bugs less likely. One-click ban spammer button, which also deletes all the spammer's posts. Previously, you had to go to their user profile and click Suspend, which meant annoyingly many clicks. Background: More spam st\nHi Tim, I started writing docs here: https://www.talkyard.io/forum/latest/docs — right now there&#x27;s just one article, about Single Sign-On via API. There&#x27;s an create-new-topics and create-new-replies API too, and soon a search API. What could you be interested in doing, via an API? ... Thanks for the information. At the moment I&#x27;m still figuring out my design, so I don&#x27;t have a fixed idea what I need to do, I was hoping to figure out what was possible. My main interest is in providing more integration between the Q&amp;A forum and other pages of my site. So perhaps being able to embed the top 5 most popular questions on topic X within a page relating to that topic (i.e. I&#x27;d need an API that can return topics by tag, sorted by popularity or similar). I might also use the API for creating new topics, but it sounds like that&#x27;s already available. To be honest, I&#x27;m looking to get an MVP together quite quickly here so I&#x27;m not sure that this solution is going to work for me.\n\nAndrea @sanzoghenzo now there is some API docs in a new API docs category: https://www.talkyard.io/forum/latest/docs-api ·\n\nHi Tim, I started writing docs here: https://www.talkyard.io/forum/latest/docs — right now there's just one article, about Single Sign-On via API. There's an create-new-topics and create-new-replies API too, and soon a search API. What could you be interested in doing, via an API? ... Thanks for the information. At the moment I'm still figuring out my design, so I don't have a fixed idea what I need to do, I was hoping to figure out what was possible. My main interest is in providing more integration between the Q&A forum and other pages of my site. So perhaps being able to embed the top 5 most popular questions on topic X within a page relating to that topic (i.e. I'd need an API that can return topics by tag, sorted by popularity or similar). I might also use the API for creating new topics, but it sounds like that's already available. To be honest, I'm looking to get an MVP together quite quickly here so I'm not sure that this solution is going to work for me.\nSkip to main content\nThere are embedded comments, so in a way, single topics can be embedded already. Embedded comments example: https://www.kajmagnus.blog/new-embedded-comments. However, embedding a whole forum, currently doesn&#x27;t work. ... We are looking to list topics similarly to talkyard, but more tightly integrated into our own product. The bare minimum would be to list existing topics (which is currently supported via /-/list-topics), and create new topics, which as discussed below currently is difficult to do due to the session cookie. Would I be able to intercept the session cookie in any way? ... Maybe an API key is what you need? It seems to me that usually to access/manipulate a software system via an API, one gets an API key, rather than a login session cookie, and then one can do &quot;anything&quot; via that API key. (Intercepting a session cookie — hmm sounds complicated to me.)\n\nMaybe there could be documentation and sample Docker-Compose config for adding a Postgraphile Docker container and connect it to the database. People who install on-premise, can then copy-paste the sample config into the Docker-Compose file. And in that way get API access to everything in the database. ... Plus a warning about this being a bit fragile, in case the db structure changes. B.t.w. how do you use, or are thinking about using, Talkyard? On your own server, or via the SaaS hosting? ... I'm running Talkyard on Digital Ocean. With the recent offering of hosting Postgres database, I really would like to explore a set up where I can manage all components of Talkyard, Postgres, and Postgraphile as well as my website on Digital Ocean. I would like to use Talkyard for the forum as well as for discussion on blog posts. Thanks! ... Ok, thanks for explaining.\n\nThere are embedded comments, so in a way, single topics can be embedded already. Embedded comments example: https://www.kajmagnus.blog/new-embedded-comments. However, embedding a whole forum, currently doesn't work. ... We are looking to list topics similarly to talkyard, but more tightly integrated into our own product. The bare minimum would be to list existing topics (which is currently supported via /-/list-topics), and create new topics, which as discussed below currently is difficult to do due to the session cookie. Would I be able to intercept the session cookie in any way? ... Maybe an API key is what you need? It seems to me that usually to access/manipulate a software system via an API, one gets an API key, rather than a login session cookie, and then one can do \"anything\" via that API key. (Intercepting a session cookie — hmm sounds complicated to me.)\n\nWhile this would work fine for me, the security implications aren't great. One key gets loose and your entire forum is compromised. If you got a user-specific API key and this key only gave you access to that user's account, the damage is lessened. ... I can look into this now the nearest days / during the weekend and see how much work this is. List topics, create topic, + post replies. About security: Other systems I come to think about (AWS, DigitalOcean, Scaleway) have a single key that lets one do everything, as far as I remember & can see now when I had a quick look at D.I.'s and Scaleway's docs. ... Anyway I agree with you that it would be / seems safer with more granular \"smaller\" keys. I can think about if maybe it's as \"easy\" to do things in the one-key-per-user way, as in the one-single-super-key way. ... Really for me I don't mind the single API key that is set in admin settings, that's perfectly fine, so long as we can change the API key if it is ever compromised.\nInstall Talkyard on your server. Automatic software updates. Single Sign-On and API. One installation can host many communities. Create ForumFree trialDemo ForumPost test comments\n\nInstall Talkyard on your server. Automatic software updates. Single Sign-On and API. One installation can host many communities. Create ForumFree trialDemo ForumPost test comments\n\nNo need to sign up twice — user accounts in the forum, work at the blog too. Talkyard works fine also if your whole company joins the same discussion. You return to a threaded discussion the next day — and want to find new replies? Just open the sidebar, click the Recent tab. Other software — like StackOverflow, Reddit, HackerNews — require you to re-read the whole discussion from top to bottom, to find any new replies. Navigate large discussions, also on mobile: Click to jump to the parent comment and refresh your mind. Then click Back, to continue reading. See who's doing what (e.g. answering a question or impementing a feature). Create custom user groups. Grant permissions. Custom branding: Change colors and the top navigation bar to match your main website. Use Like and Unwanted votes to encourage good behavior and staying on-topic. Work in progress.\nWe want to have a chat widget and a Discord Bot, but for starters we would use it in the default ChatGPT view, just add it as a custom GPT so we can use it internally for our team, and later expand on that. ChatGPT has been releasing new products one after another, so I&#x27;m hoping they will release new tools to make those integrations easier. But our main use case is to help with the team&#x27;s documentation effort. ... I&#x27;ll have a look at this again tomorrow or on Wednesday, sorry for the delay. Thanks for the info ... Here&#x27;s a GPT (anyone with the link can view) that answers questions about Talkyard by searching this forum: ... Ty Test Bot specializes in answering questions related to the software called Talkyard. It leverages an API to access a forum dedicated to Talkyard, where it can search for, fetch, and analyze pages of questions and ideas previously posted by users.\n\nSo, incrementally \"backing up\" one's forum to the GPT's \"memory\", and also incrementally overwriting out-of-date parts of its \"memory\". (I'd suppose the \"memory\" in this case, is a vector database.) ... I have been wondering if I could store the data in a google docs online document, and share that with the GPT. That way, whenever the file is updated, the GPT can in theory resync. I use Taskade (https://www.taskade.com/) and they have some really nice customizable AI Agents, and those accept Google Docs url's as input files for the knowledge base. In other words: if you could serve it into an online document, or in a format that can be cleanly imported to a sheets (csv?), then it could become super easy to update the data. I might try that with a simple word document to store the json, just to confirm that it updates the knowledge when the document is updated.\n\nWould you want to 1) input the forum data into a vector database yourself, and thereafter connect that vector database with a GPT? Or, 2) maybe the GPT custom actions would connect directly to Talkyard's API, and build a search database for you? And you instead just need an API that lets the GPT download all public data? (I'm thinking this looks closest to what you're describing in the OP?) Or 3) you'd like to tell the GPT what API endpoints it can send search queries to, and get back a list of results and links? (that'd be /-/v0/search?q=...) ... It would be nice to get an API that returned: each article with title + body + replies+ URL's. [...] There's an API for exporting one's whole site as JSON. Maybe if this API could be restricted so only publicly visible things were exported in the JSON dump, that'd be what you needed? I'd guess the current JSON structure is not the best for consumption by a vector database.\n\nI simply provide the AI with access to files, and it learns about the things in there. This can be as simple as exporting a text file. I am currenlty using the json export from talkyard: https://forum.talkyard.io/-/export-site-json · And this works really well. The AI can answer any questions in any way I phrase it. This worked in both ChatGPT's AI builder as well as Taskade's AI builder. However, while this export works for testing purposes, it exports all the user's private data with it, which we can't use for public access AI's. Also: I have to first save it as a text file, since the AI can't access that URL on its own. So it takes a lot of manual work each time. So for my current use, a url like the site export, but without hidden categories, without forum configuration/settings, and without user personal data, would be more than enough. API access would be safer, of course, but not a deal breaker.\n\nChatGPT now allows users to train their ChatGPT with own data. This is very useful for forums and for companies that would like to train custom AI bots for many applications. Are there any plans of making an API like that available on Talkyard? ... and only including \"public\" data: no data from hidden forum categories, no user data like emails, no forum settings or any metadata. Just the content the AI needs to make smart decisions. Include info like \"best answer\", \"likes\" \"replies\" etc to help the AI weigh what content to prioritize.\nIs there documentation somewhere? I can see it has some kind of spam protection by skimming the source code, but I don&#x27;t see any docs · https://blog.codinghorror.com/the-rise-of-the-electric-scoot\nHere you can ask questions, report problems and suggest ideas. Welcome · If you wonder roughly what&#x27;s next, here&#x27;s a roughly sorted prio list: (priority values are from -1 to +10) &quot;tags:priority:desc&gt;2 is:open&quot;\nTo use non-public parts of the API, you need to generate an API secret: Go to https:// your talkyard site /-/admin/settings/features and click Enable API and save the settings. Now, the API tab appears — go there and generate an API secret · Note that this API secret is very secret — don&#x27;t ..."

