[[body.segments]]
kind = "plain_text"
text = "Good thinking on both counts.\n\n**Talkyard's tag system for organization within THE FABRIC:**\n\nSince you can't go deeper than one subcategory level, tags become the organizational layer *within* a category. In THE FABRIC you could tag topics with:\n\n- `import-pipeline` — anything related to chat import\n- `structure` — forum organization decisions\n- `talkyard-api` — API integration topics\n- `knowledge-base` — curation and retrieval topics\n- `ai-integration` — connection to PRIVATE AI\n\nTags in Talkyard are flat and universal across the forum, but filtering by tag within a category effectively creates virtual subcategories. The limitation is they aren't as visually obvious as real subcategories.\n\n**For your own forum — documenting this limitation:**\n\nThe core architectural decision your forum needs to make is **unlimited nesting depth** for categories. This is a first-class requirement, not an afterthought. Talkyard chose simplicity over depth. Your forum should explicitly support:\n\n```\nCategory\n  └── Subcategory\n        └── Sub-subcategory\n              └── (as deep as needed)\n```\n\nWith tags as an *additional* organizational dimension, not a workaround for missing depth.\n\nShould I create a wiki post capturing this as a known Talkyard limitation and a requirement for your custom forum? That fits perfectly in THE FABRIC under a `talkyard-limitations` tag."

