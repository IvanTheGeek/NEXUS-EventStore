text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":\"toolu_01Lxc3QKyCP2mpGjEYPqZN5X\",\"name\":\"web_fetch\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Talkyard API Docs\",\"url\":\"https://docs.talkyard.io/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"talkyard\"},\"is_missing\":false,\"text\":\"Talkyard API Docs\\n\\n\\n\\n\\n\\n[Skip to main content](#)\\n\\n[![Talkyard logo](/img/talkyard-logo-trans-320x320.png)\\n\\n**Talkyard**](https://www.talkyard.io)\\n\\n[Docs](#)\\n\\n* [For Business](https://www.talkyard.io)\\n* [Education](https://education.talkyard.io)\\n* [Blog comments](https://blog-comments.talkyard.io)\\n* [Blog](https://blog.talkyard.io)\\n* [About](https://www.talkyard.io/about/us)\\n\\n[For Business](https://www.talkyard.io)[Education](https://education.talkyard.io)[Blog comments](https://blog-comments.talkyard.io)[Docs](https://docs.talkyard.io)[Blog](https://blog.talkyard.io)\\n\\n[About](https://www.talkyard.io/about/us)\\n\\n* [About us](https://www.talkyard.io/about/us)\\n* [Contact](https://www.talkyard.io/about/contact)\\n* [Security](https://www.talkyard.io/about/security)\\n* [Terms](https://legal.talkyard.io)\\n* [Open source](https://www.talkyard.io/about/open-source)\\n\\n[Docs for Users](/users/)[Mods](/mods/)[Admins](/admins/)[Self-Hosting](/self-hosting/)[Concepts](/concepts/)[API](/api/v0)\\n\\nCopyright 2012\\u20132025 Magnus Lindberg\",\"is_citable\":true,\"prompt_context_metadata\":{\"content_type\":\"html\",\"mime_type\":\"text/html; charset=UTF-8\",\"destination_url\":\"https://docs.talkyard.io/\"}}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":\"Fetched: Talkyard API Docs\",\"integration_name\":\"Web Fetch\",\"integration_icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.