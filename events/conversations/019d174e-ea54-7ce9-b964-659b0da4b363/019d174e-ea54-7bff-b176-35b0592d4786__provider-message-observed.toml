kind = "tool_result"
text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":\"toolu_014nCpGCDtibatNp8gPWS5GL\",\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Is there any API documentation?\",\"url\":\"https://forum.talkyard.io/-378/is-there-any-api-documentation\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"I started a list of API ideas here: https://www.talkyard.io/-379/talkyard-api-ideas \\u00B7 (I\\u0026#x27;m curious what the MVP will be about? Sorry if maybe I cannot implement features and API endpoints fast enough for your situation \\u2014 but thanks anyway for the ideas \\u0026amp; feedback you posted :- )) Maybe this Top 5 Topics in Category / Tag X could be the Search API, but with the full text query left out. Something like: POST /-/v0/search with JSON: { searchQuery: { tagRefs: [tagX], orderBy: SortOrder.PopularFirst, limit: 5 }} ... @timmartin \\u2014 I\\u0026#x27;m almost done adding an \\u0026quot;list the X most popular questions on topic X\\u0026quot; API. I realize you probably won\\u0026#x27;t use it, because you were short of time \\u2014 still, it\\u0026#x27;s a good idea. And I think it was good to see how this Find-popular-topics-about-X API, can share code with the upcoming full text search API. Seems the find-popular-topics-about-X API will look like: POST /-/v0/list { listQuery: { findWhat: \\u0026#x27;Pages\\u0026#x27;, lookWhere: { inCategories: [categoryX] }, orderBy: \\u0026#x27;PopularFi\\n\\nI started a list of API ideas here: https://www.talkyard.io/-379/talkyard-api-ideas \\u00B7 (I\\u0027m curious what the MVP will be about? Sorry if maybe I cannot implement features and API endpoints fast enough for your situation \\u2014 but thanks anyway for the ideas \\u0026 feedback you posted :- )) Maybe this Top 5 Topics in Category / Tag X could be the Search API, but with the full text query left out. Something like: POST /-/v0/search with JSON: { searchQuery: { tagRefs: [tagX], orderBy: SortOrder.PopularFirst, limit: 5 }} ... @timmartin \\u2014 I\\u0027m almost done adding an \\u0022list the X most popular questions on topic X\\u0022 API. I realize you probably won\\u0027t use it, because you were short of time \\u2014 still, it\\u0027s a good idea. And I think it was good to see how this Find-popular-topics-about-X API, can share code with the upcoming full text search API. Seems the find-popular-topics-about-X API will look like: POST /-/v0/list { listQuery: { findWhat: \\u0027Pages\\u0027, lookWhere: { inCategories: [categoryX] }, orderBy: \\u0027PopularFi\\n\\nI started a list of API ideas here: https://www.talkyard.io/-379/talkyard-api-ideas \\u00B7 (I\\u0027m curious what the MVP will be about? Sorry if maybe I cannot implement features and API endpoints fast enough for your situation \\u2014 but thanks anyway for the ideas \\u0026 feedback you posted :- )) Maybe this Top 5 Topics in Category / Tag X could be the Search API, but with the full text query left out. Something like: POST /-/v0/search with JSON: { searchQuery: { tagRefs: [tagX], orderBy: SortOrder.PopularFirst, limit: 5 }} Reply \\u00B7 KajMagnus @KajMagnus \\u00B7 core-dev \\u00B7 support-team2020-04-26 21:41:49.531Z \\u00B7 @timmartin \\u2014 I\\u0027m almost done adding an \\u0022list the X most popular questions on topic X\\u0022 API. I realize you probably won\\u0027t use it, because you were short of time \\u2014 still, it\\u0027s a good idea. And I think it was good to see how this Find-popular-topics-about-X API, can share code with the upcoming full text search API.\\n\\nRedoc looks interesting. \\u2014 What API endpoints would you be interested in? (Hmm, unless I was too slow with replying :- (. Maybe then I could start with that.) the documentation category holds only a handful of pages \\u00B7 Yes, and I\\u0027m a bit about to start to write documentation. Just recently I implemented sub categories, so that now there can be a Documentation category, with sub categories: How To:s, Tutorials, Reference, Theory. ... Hi @KajMagnus , thanks for the reply! Honestly I don\\u0027t know what I\\u0027m looking for, it was just to have a bird\\u0027s eye view on what it could be possible with the API right now. I\\u0027m trying to compare various Q\\u0026A platform and pick the one that gives us the most flexibility/integration ability with our current company infrastructure. We use Google Workplace, so I was wondering about creating a Google Chat Bot for quick search and notification (something I\\u0027ve seen in Tettra\\u0027s Slack integration).\\n\\nPOST /-/v0/search { searchQuery: { freetext: \\u0022how climb trees\\u0022, lookWhere: { inCategories: [categoryX] }, orderBy: \\u0027PopularFirst\\u0027, limit: 5, } ... Hi! I am trying to use these instructions to conenct with a bubble.io instance. It has an api connector, which I have used for other integrations for SSO. However I can not seem to structure the json properly to have talkyard like the response. ... I am wondering if I could connect using postman or another way to better troubleshoot this. Or maybe I can not use the standard API connection tools in bubble.io ? I am happen to share more details, if I could get it working with Bubble there would be many people that would like to follow my integration with their systems as a lot of people are going with discourse but not terribly happy. ... I replied here, in a new topic: https://www.talkyard.io/-380/how-use-talkyard-with-bubbleio \\u2014 would you like to reply there please :- ) ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-378/is-there-any-api-documentation\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"How can I add topics via API?\",\"url\":\"https://forum.talkyard.io/-613/how-can-i-add-topics-via-api\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"I think the endpoint you want to use, is in fact /-/v0/upsert (which should probably get renamed to /-/v0/import). I\\u0026#x27;ll reply here later today or tomorrow, with info about the JSON format. /-/v0/upsert-simple was intended for creating new pages, and generating notifications about those new pages. But the pages you\\u0026#x27;re inserting, aren\\u0026#x27;t new. In addition to that, /-/v0/upsert-simple is now a bit deprecated, and instead there\\u0026#x27;s a new Do API at /-/do, via which one can send a bunch of things-to-do, e.g. create new pages and replies, and then Talkyard will do it and generate notifications and (once implemented) webhook events. Whilst /-/upsert won\\u0026#x27;t generate notifications or events; it just silently upserts stuff. ... Sure, no rush. Thank you for checking it out, I\\u0026#x27;ll wait to hear more about the JSON format. I\\u0026#x27;m not sure if my pages count as new or not, since they\\u0026#x27;re new here but duplicated from somewhere else.\\n\\nI think the endpoint you want to use, is in fact /-/v0/upsert (which should probably get renamed to /-/v0/import). I\\u0027ll reply here later today or tomorrow, with info about the JSON format. /-/v0/upsert-simple was intended for creating new pages, and generating notifications about those new pages. But the pages you\\u0027re inserting, aren\\u0027t new. In addition to that, /-/v0/upsert-simple is now a bit deprecated, and instead there\\u0027s a new Do API at /-/do, via which one can send a bunch of things-to-do, e.g. create new pages and replies, and then Talkyard will do it and generate notifications and (once implemented) webhook events. Whilst /-/upsert won\\u0027t generate notifications or events; it just silently upserts stuff. ... Sure, no rush. Thank you for checking it out, I\\u0027ll wait to hear more about the JSON format. I\\u0027m not sure if my pages count as new or not, since they\\u0027re new here but duplicated from somewhere else.\\n\\nI\\u0027d like to move over some posts from my existing forum via the API. I checked the documentation regarding creating pages and post replies, but couldn\\u0027t really find what I was looking for. Is this the endpoint for adding a new topic? (I wasn\\u0027t sure if Page = Topic) POST https://{hostname}.com/-/v0/upsert-simple \\u00B7 And, if so, what goes in the body? I tried this and some variations: { \\u0022extId\\u0022: \\u0022aaa\\u0022, \\u0022pageType\\u0022: 10, \\u0022categoryRef\\u0022: \\u0022extid:bbb\\u0022, \\u0022authorRef\\u0022:\\u0022username:user\\u0022, \\u0022title\\u0022: \\u0022a title\\u0022, \\u0022body\\u0022: \\u0022a body\\u0022 } That gave me an error saying \\u0022403 Forbidden Not allowed. Ask for help at The Talkyard Community [TyEM0UPSSIMPL]\\u0022. So here I am :D I don\\u0027t know if it\\u0027s because the IDs are wrong or something else. Btw I have successfully pinged the server with my authorization/basic header, so that shouldn\\u0027t be the issue. Thank you. ... The 404 Forbidden was because for those API calls to be allowed, I need to set a per site feature flag.\\n\\nHi again @ana, now I wrote docs about the JSON import file structure: How to Import Discussions to Talkyard \\u00B7 It\\u0027s more (longer) docs than what I had thought, and maybe annoyingly many small things to think about. I wonder if in the end it might actually be quicker to copy-paste pages from Reddit instead. ... Thank you for the documentation! And yeah, I already came to that conclusion myself and have been copying/pasting over important pages :) .\\n\\nYou need to assign an external ID to a category too, where the imported topics get placed. Here\\u0027s the category, in the JSON: (at the bottom of the file) https://github.com/debiki/talkyard/blob/463dc6017107704d196ac590c1e9d6aa238cb1bb/tests/e2e-wdio7/specs/dir.create-site-imp-json.2br.e2e.ts#L645 \\u00B7 And here\\u0027s how you can post the JSON to Talkyard \\u2014 namely via a to-talkyard help script: https://github.com/debiki/talkyard/blob/463dc6017107704d196ac590c1e9d6aa238cb1bb/tests/e2e-wdio7/utils/utils.ts#L65 \\u00B7 Here\\u0027s how you\\u0027d invoke it: (from the Git repo root) nodejs to-talkyard/dist/to-talkyard/src/to-talkyard.js \\\\ --talkyardJsonPatchFile=JSON_FILE \\\\ --sysbotApiSecret=SECRET \\\\ --sendTo=TALKYARD_SITE_ORIGIN \\u00B7 But first you\\u0027d need to run yarn build in to-talkyard/, so that the to-talkyard/dist/ folder gets generated. ... I\\u0027m thinking the above isn\\u0027t so user friendly.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-613/how-can-i-add-topics-via-api\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Talkyard v0.2021.23\",\"url\":\"https://forum.talkyard.io/-596/talkyard-v0202123\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"Now the API endpoints does not require any XSRF token, if the requester is not logged in. So you can search for publicly visible pages, without needing any password or XSRF token: curl https://www.talkyard.io/-/v0/search -X POST -H \\u0026#x27;Content-Type: application/json\\u0026#x27; -d \\u0026#x27;{ \\u0026quot;searchQuery\\u0026quot;: { \\u0026quot;freetext\\u0026quot;: \\u0026quot;how climb trees\\u0026quot; }, \\u0026quot;pretty\\u0026quot;: true }\\u0026#x27; But if you include any credentials (cookies, -b \\u0026#x27;aCookie=aValue\\u0026#x27; in cURL), the request will get denied (to stop XSRF). Emails translated to German (thanks Sascha Z!). (But no the email subject lines, only the text inside, sorry) Minor UX improvement: The editor \\u0026lt;/\\u0026gt; button now inserts a code block (triple backticks, \\u0060\\u0060\\u0060), because many people otherwise don\\u0026#x27;t know how that works, and if a code block doesn\\u0026#x27;t get formatted properly, it can be hard to read. And, \\u0060\\u0060\\u0060 happens works for formatting inline code too. So, just a single backtick, \\u0060, instead of \\u0060\\u0060\\u0060 for inline code, now in a way is a \\u0026quot;power user feature\\u0026quot;.\\n\\nNow the API endpoints does not require any XSRF token, if the requester is not logged in. So you can search for publicly visible pages, without needing any password or XSRF token: curl https://www.talkyard.io/-/v0/search -X POST -H \\u0027Content-Type: application/json\\u0027 -d \\u0027{ \\u0022searchQuery\\u0022: { \\u0022freetext\\u0022: \\u0022how climb trees\\u0022 }, \\u0022pretty\\u0022: true }\\u0027 But if you include any credentials (cookies, -b \\u0027aCookie=aValue\\u0027 in cURL), the request will get denied (to stop XSRF). Emails translated to German (thanks Sascha Z!). (But no the email subject lines, only the text inside, sorry) Minor UX improvement: The editor \\u003C/\\u003E button now inserts a code block (triple backticks, \\u0060\\u0060\\u0060), because many people otherwise don\\u0027t know how that works, and if a code block doesn\\u0027t get formatted properly, it can be hard to read. And, \\u0060\\u0060\\u0060 happens works for formatting inline code too. So, just a single backtick, \\u0060, instead of \\u0060\\u0060\\u0060 for inline code, now in a way is a \\u0022power user feature\\u0022.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-596/talkyard-v0202123\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Single-Sign-On and API\",\"url\":\"https://forum.talkyard.io/-121/single-sign-on-and-api\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"In any case I would just increase ... valid). ... /-/v0/login-or-signup returns json that includes the user\\u0026#x27;s ID in Talkyard, and a works-just-once link that you can redirect a user\\u0026#x27;s browser to, to make the browser \\u0026quot;become\\u0026quot; that user (that is, the browser gets a session cookie, ...\\n\\n(B.t.w. in case you have any ideas or tips about how to create auto test that verifies that the API, and also examples in the API documentation, works properly, please tell me :- ) I\\u0027ve read about API Blueprint and Swagger.) ... Hi @chrscheuer and @halo4356 and @jhkings, I just released a new version, with Single Sign-On, now including the previously missing [redirect Login and Reply etc buttons to the SSO page] feature. @halo4356 your server should auto upgrade this night, or, if you want to try the new version directly, do: sudo -i cd /opt/talkyard/ ./scripts/upgrade-if-needed.sh \\u00B7 To start using SSO, go to your-server/-/admin/settings/login (click Admin in your username menu, then Settings, then Signup and Login). Then scroll to the bottom, and fill in your Single Sign-On URL. Then follow the instructions you\\u0027ll see there \\u2014 namely go to your-server/-/sso-test and try to make SSO work. Note: I renamed one URL endpoint to /-/v0/login-with-secret instead.\\n\\nWhat about also having a Talkyard logout endpoint you can optionally POST a request to, to logout the person over at Talkyard, if s/he instead logs out directly at your main website? Maybe /-/v0/logout?externalUserId=..... (A thought: Will people realize they logout at your main website, when they logout at Talkyard? An alternative approach could be to send the person to a logout page at your main website, and then s/he can confirm that s/he wants to logout \\u0022everywhere\\u0022, and afterwards that main website sends a /-/v0/logout?externalUserId=... request to Talkyard. However, this\\u0027d be a bit weird, in the sense that if that other website is temporarily offline, one cannot logout from Talkyard :- | also, this is more complicated? Maybe better postpone.) Ok good to hear that it was ok simple to get started :- ) I see your login button now redirect to the SSO page.\\n\\nIn any case, Talkyard responds with json that includes 1) the above-mentioned one-time create-session-cookie link that you then redirect the user\\u0027s browser to, and 2) the user\\u0027s ID in Talkyard, if instead you want to do requests on behalf of that user, directly from your backend servers. Basic auth, i.e. HTTP headers. The basic auth username is the ID of the user you\\u0027re doing the request on behalft of. The API key is the basic auth password. Each user can have one or more API keys. (Having more than one active key can make sense, for a while, when rotating keys.) There\\u0027ll be magic Anyuser API keys that lets you to specify any user id. The nearest time, there\\u0027ll be only the Anyuser key, for simplicity. So, initially, you can do requests on behalf of any user, to do anything. For example, submit a request to /-/v0/login-or-signup as the sysbot user, to create a user, and then submit another request, as that new user, to create a topic.\\n\\nI agree to disable Talkyard signups while having SSO enabled is preferable since it makes the design simpler. As long as Talkyard can then redirect to our login page when a user tries to access a Talkyard page without being logged in, then it should all work beautifully. ... Ok yes that\\u0027s a good point. This: \\u0022the auth url returned by the /-/v0/login-or-signup\\u0022 can instead be a one-time-secret-key, say nnnn (instead of a complete url), which you\\u0027d include in a URL query param together with a \\u0026thenGoTo=/some/page param, when telling the browser where to go next. After getting the response from the login-or-signup API request, you\\u0027d send the browser to: I like this approach. ... Ok, maybe the OpenAuth username could be like externalSsoId=your-user-id if it\\u0027s your external id, and talkyardId=4567 if the id is for Talkyard\\u0027s database? Or maybe 2 would be user id 2 in Talkyard\\u0027s database and 2@external or 2@your-company-name could be for ids in your database?\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-121/single-sign-on-and-api\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Talkyard API?\",\"url\":\"https://forum.talkyard.io/-108/talkyard-api\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"Ahh yeah didn\\u0026#x27;t run that. In any case, an API key would be far more suitable for my use case than trying to intercept a session cookie or something. Far more reliable. ... I\\u0026#x27;d like to access the issues and be able to create a dashboard that shows the issues along with the number of user reported, maybe even a historical of count by the hour. Similar to https://downdetector.com/status/battle-net. Also, I\\u0026#x27;d like to be able to add custom fields to the issues, such as version string and location. Thank you! ... You mean the total number of open issues? Like, \\u0026quot;currently there are 123 open issues.\\u0026quot; \\u002B a graph that shows how this number changes, over time? This would then, in the simplest version, be something like an endpoint /-/v0/count-topics?isWaiting=true\\u0026amp;type=problem ? \\u002B maybe a query param: \\u0026amp;when=2018-09-25-2359 \\u00B7 (But you don\\u0026#x27;t have in mind to show, for many different issues, how many people have reported each particular issue?\\n\\nI can just add a new function with the /-/v1/ URL path prefix, and keep the old one unchanged, at /-/v0/. 2) Access control and performance. The database is multitenant (many communities in one single database), so Postgraphile would need to be carefully configured, so as not to accidentally allow access to the wrong tenants (communities). Also, if people could send arbitrary queries to the database, via Postgraphile, they could Denial-of-Service attack the database. I\\u0027m thinking that therefore Postgraphile is impossible to use, for the SaaS hosting service. However, if you run Talkyard on-premise, then, there shouldn\\u0027t be any problems with access control or DoS attacks (since it\\u0027s all your own database and contents). Also, if you disable automatic upgrades, then you could wait with upgrading, until your integrations are compatible with any database changes. Maybe there could be documentation and sample Docker-Compose config for adding a Postgraphile Docker container and connect it to \\n\\nAhh yeah didn\\u0027t run that. In any case, an API key would be far more suitable for my use case than trying to intercept a session cookie or something. Far more reliable. ... I\\u0027d like to access the issues and be able to create a dashboard that shows the issues along with the number of user reported, maybe even a historical of count by the hour. Similar to https://downdetector.com/status/battle-net. Also, I\\u0027d like to be able to add custom fields to the issues, such as version string and location. Thank you! ... You mean the total number of open issues? Like, \\u0022currently there are 123 open issues.\\u0022 \\u002B a graph that shows how this number changes, over time? This would then, in the simplest version, be something like an endpoint /-/v0/count-topics?isWaiting=true\\u0026type=problem ? \\u002B maybe a query param: \\u0026when=2018-09-25-2359 \\u00B7 (But you don\\u0027t have in mind to show, for many different issues, how many people have reported each particular issue?\\n\\nWhat API endpoints could be useful to you? What are your higher level goals, with calling them / what do you want to accomplish? ... There are 22 replies. Estimated reading time: 16 minutesSummarize Replies ... Mainly I\\u0027m interested in being able to list posts, get post information, submit posts and add comments, as well as creating users through the API. The high level goal is to use talkyard as a support forum for a product. The posts and such should be able to be viewed in that product without needing to go to the site itself. ... Is this maybe a bit like embedding different Q\\u0026A topics on different product pages? Or is there only one product page, and maybe embedding a whole forum, in an iframe directly on that product page, is similar to what you have in mind? \\u2014 Then you\\u0027d be able to list \\u0026 submit posts and comments (via the iframe ... a bit different from using the API though).\\n\\nSo, closing this. Other API endpoints can be added, upon request. (Well some things have been suggested already, ... that was like half a year ago.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-108/talkyard-api\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"API shorthand syntax\",\"url\":\"https://forum.talkyard.io/-562/api-shorthand-syntax\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"Talkyard \\u00B7 \\u8BDD\\u9898 \\u00B7 \\u65E0\\u7F51\\u7EDC\\u8FDE\\u63A5 ... this: POST /-/v0/something { field: \\u0026#x27;value\\u0026#x27;, oneTwoMany: 123, } means sending a HTTP POST request to /-/v0/something with a header Content-Type: application/json and a JSON payload: { \\u0026quot;field\\u0026quot;: \\u0026quot;value\\u0026quot;, \\u0026quot;oneTwoMany\\u0026quot;: 123 }. This: POST ...\\n\\nTalkyard \\u00B7 \\u8BDD\\u9898 \\u00B7 \\u65E0\\u7F51\\u7EDC\\u8FDE\\u63A5 \\u00B7 \\u52A0\\u5165\\u767B\\u5F55 \\u00B7 Home \\u00B7 Documentation \\u00B7 API \\u00B7 \\u4F5C\\u8005\\uFF1AKajMagnus @KajMagnus \\u00B7 core-dev \\u00B7 support-team2021-05-22 18:17:19.765Z2021-05-22 19:32:17.601Z \\u00B7 In the API docs, this: POST /-/v0/something { field: \\u0027value\\u0027, oneTwoMany: 123, } means sending a HTTP POST request to /-/v0/something with a header Content-Type: application/json and a JSON payload: { \\u0022field\\u0022: \\u0022value\\u0022, \\u0022oneTwoMany\\u0022: 123 }. This: POST /-/v0/add-turtles { turtles: Turtle[], } interface Turtle { name: St, isCute?: Bo, isKind: Bo, speedMps: Nr, } is suddenly Typescript. [] means array. St, Bo and Nr mean string, boolean and number. The question mark in isCute? means that that field is optional. The above add-turtles endpoint could thus be called like so: POST /-/v0/add-turtles { turtles: [{ name: \\u0022Bowser\\u0022, isKind: false, speedMps: 5, }, { name: \\u0022Morla\\u0022, isCute: true, \\u003C\\u2014\\u2014 optional field isKind: true, speedMps: 0, }] } \\u56DE\\u590D \\u00B7\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-562/api-shorthand-syntax\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Talkyard API authentication\",\"url\":\"https://forum.talkyard.io/-382/talkyard-api-authentication\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"curl \\\\ -X POST \\\\ -H \\u0026#x27;Content-Type: application/json\\u0026#x27; \\\\ -H \\u0026#x27;Authorization: Basic dGFsa3lhcmRJZD0yOmQ3angxMzhseHZ0ODlqbzNmeW1lY29hcnk=\\u0026#x27; \\\\ -d \\u0026#x27;{\\u0026quot;ssoId\\u0026quot;:\\u0026quot;mariasSsoId\\u0026quot;,\\u0026quot;primaryEmailAddress\\u0026quot;:\\u0026quot;e2e-test--maria@example.com\\u0026quot;,\\u0026quot;isEmailAddressVerified\\u0026quot;:true,\\u0026quot;username\\u0026quot;:\\u0026quot;maria\\u0026quot;,\\u0026quot;fullName\\u0026quot;:\\u0026quot;Maria\\u0026quot;}\\u0026#x27; \\\\ http://e2e-test-cid-0-0-now-6669.localhost/-/v0/sso-upsert-user-generate-login-secret [0-0] Now you can try: http://e2e-test-cid-0-0-now-6669.localhost/-/v0/login-with-secret?oneTimeSecret=61f99pz5cx0iecsutnbu596p4\\u0026amp;thenGoTo=/ [0-0] ... gets back a one time login secret [0-0] Got back login secret: 61f99pz5cx0iecsutnbu596p4 [0-0] ... redirects Maria to the Talkyard login-with-secret endpoint [0-0] Go: http://e2e-test-cid-0-0-now-6669.localhost/-/v0/login-with-secret?oneTimeSecret=61f99pz5cx0iecsutnbu596p4\\u0026amp;thenGoTo=/by-michael-category-a \\u00B7 This e2e test: https://github.com/debiki/talkyard/blob/b2528e29447cca2efab4b383f7145fbda408c4d3/tests/e2e/specs/sso-login-member-impl.2browsers.test.ts#L174 \\u00B7 (the e2e t\\n\\nAnd API_SECRET is the API secret you generated in the API tab. ... Tanks in advance. ... Hi Jo\\u00E3o, yes, see below, from an end-to-end test that upserst an external user into Talkyard\\u0027s databse. (Just a test, not any real secrets.) Notice the Authorization: Basic ... line. curl \\\\ -X POST \\\\ -H \\u0027Content-Type: application/json\\u0027 \\\\ -H \\u0027Authorization: Basic dGFsa3lhcmRJZD0yOmQ3angxMzhseHZ0ODlqbzNmeW1lY29hcnk=\\u0027 \\\\ -d \\u0027{\\u0022ssoId\\u0022:\\u0022mariasSsoId\\u0022,\\u0022primaryEmailAddress\\u0022:\\u0022e2e-test--maria@example.com\\u0022,\\u0022isEmailAddressVerified\\u0022:true,\\u0022username\\u0022:\\u0022maria\\u0022,\\u0022fullName\\u0022:\\u0022Maria\\u0022}\\u0027 \\\\ http://e2e-test-cid-0-0-now-6669.localhost/-/v0/sso-upsert-user-generate-login-secret [0-0] Now you can try: http://e2e-test-cid-0-0-now-6669.localhost/-/v0/login-with-secret?oneTimeSecret=61f99pz5cx0iecsutnbu596p4\\u0026thenGoTo=/ [0-0] ... gets back a one time login secret [0-0] Got back login secret: 61f99pz5cx0iecsutnbu596p4 [0-0] ... redirects Maria to the Talkyard login-with-secret endpoint [0-0] Go: http://e2e-test-cid-0-0-now-6669.loca\\n\\ncurl \\\\ -X POST \\\\ -H \\u0027Content-Type: application/json\\u0027 \\\\ -H \\u0027Authorization: Basic dGFsa3lhcmRJZD0yOmQ3angxMzhseHZ0ODlqbzNmeW1lY29hcnk=\\u0027 \\\\ -d \\u0027{\\u0022ssoId\\u0022:\\u0022mariasSsoId\\u0022,\\u0022primaryEmailAddress\\u0022:\\u0022e2e-test--maria@example.com\\u0022,\\u0022isEmailAddressVerified\\u0022:true,\\u0022username\\u0022:\\u0022maria\\u0022,\\u0022fullName\\u0022:\\u0022Maria\\u0022}\\u0027 \\\\ http://e2e-test-cid-0-0-now-6669.localhost/-/v0/sso-upsert-user-generate-login-secret [0-0] Now you can try: http://e2e-test-cid-0-0-now-6669.localhost/-/v0/login-with-secret?oneTimeSecret=61f99pz5cx0iecsutnbu596p4\\u0026thenGoTo=/ [0-0] ... gets back a one time login secret [0-0] Got back login secret: 61f99pz5cx0iecsutnbu596p4 [0-0] ... redirects Maria to the Talkyard login-with-secret endpoint [0-0] Go: http://e2e-test-cid-0-0-now-6669.localhost/-/v0/login-with-secret?oneTimeSecret=61f99pz5cx0iecsutnbu596p4\\u0026thenGoTo=/by-michael-category-a \\u00B7 This e2e test: https://github.com/debiki/talkyard/blob/b2528e29447cca2efab4b383f7145fbda408c4d3/tests/e2e/specs/sso-login-member-impl.2browsers.test.ts#L174 \\u00B7 (the e2e t\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-382/talkyard-api-authentication\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"API for ChatGPT\",\"url\":\"https://forum.talkyard.io/-792/api-for-chatgpt\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"I might try that with a simple word document to store the json, just to confirm that it updates the knowledge when the document is updated. But I\\u0026#x27;m 90% sure it works, there is even a \\u0026quot;resync\\u0026quot; button to rescan the knowledgebase. ... I\\u0026#x27;ll write a bit more later, just a quick reply: I spoke with ChatGPT a bit yesterday, and I came to think that what you (and I) want, is in fact the search API, and a fetch-the-relevant-parts-of-a-discussion API. Then, the GPT will use that API, and always have up-to-date data, and there\\u0026#x27;s no need to upload files. So, the GPT would use the /-/v0/search?q=... and /-/v0/get API endpoints, to search for and then fetch the relevant Q\\u0026amp;A pages. Instead of export-site-json. It wants an Open API specification of these endpoints, so it understands how to use them ... I\\u0026#x27;ll look into creating such a specification, and maybe tweaking the endpoints a bit so they\\u0026#x27;ll ...\\n\\nI might try that with a simple word document to store the json, just to confirm that it updates the knowledge when the document is updated. But I\\u0027m 90% sure it works, there is even a \\u0022resync\\u0022 button to rescan the knowledgebase. ... I\\u0027ll write a bit more later, just a quick reply: I spoke with ChatGPT a bit yesterday, and I came to think that what you (and I) want, is in fact the search API, and a fetch-the-relevant-parts-of-a-discussion API. Then, the GPT will use that API, and always have up-to-date data, and there\\u0027s no need to upload files. So, the GPT would use the /-/v0/search?q=... and /-/v0/get API endpoints, to search for and then fetch the relevant Q\\u0026A pages. Instead of export-site-json. It wants an Open API specification of these endpoints, so it understands how to use them ... I\\u0027ll look into creating such a specification, and maybe tweaking the endpoints a bit so they\\u0027ll be more AI friendly.\\n\\nOr, 2) maybe the GPT custom actions would connect directly to Talkyard\\u0027s API, and build a search database for you? And you instead just need an API that lets the GPT download all public data? (I\\u0027m thinking this looks closest to what you\\u0027re describing in the OP?) Or 3) you\\u0027d like to tell the GPT what API endpoints it can send search queries to, and get back a list of results and links? (that\\u0027d be /-/v0/search?q=...) ... It would be nice to get an API that returned: each article with title \\u002B body \\u002B replies\\u002B URL\\u0027s. [...] There\\u0027s an API for exporting one\\u0027s whole site as JSON. Maybe if this API could be restricted so only publicly visible things were exported in the JSON dump, that\\u0027d be what you needed? I\\u0027d guess the current JSON structure is not the best for consumption by a vector database. Maybe there could be an external tool that reshapes the JSON into [a better structure for vector databases], or there could be some Talkyard API parameter that says \\u0022Give me a JSON dump in vector-datab\\n\\nWe want to have a chat widget and a Discord Bot, but for starters we would use it in the default ChatGPT view, just add it as a custom GPT so we can use it internally for our team, and later expand on that. ChatGPT has been releasing new products one after another, so I\\u0027m hoping they will release new tools to make those integrations easier. But our main use case is to help with the team\\u0027s documentation effort. ... I\\u0027ll have a look at this again tomorrow or on Wednesday, sorry for the delay. Thanks for the info ... Here\\u0027s a GPT (anyone with the link can view) that answers questions about Talkyard by searching this forum: ... Ty Test Bot specializes in answering questions related to the software called Talkyard. It leverages an API to access a forum dedicated to Talkyard, where it can search for, fetch, and analyze pages of questions and ideas previously posted by users. When a GPT user asks a question, Ty Test Bot will run a search query through the forum\\u0027s API (that\\u0027s the \\u0022/-/v0/search\\n\\nHere\\u0027s an OpenAPI spec for a Custom Action that searches this forum: https://github.com/debiki/talkyard/blob/main/docs/api/openapi-TySeV0Search-test.json ... Hi @KajMagnus, it took me a while to find time to test all this out. I had to tinker a bit until I got it running, but now it seems to be working fine! it is a bit \\u0022dumb\\u0022 as in: it will only mention things found in the current search results, which makes sense. so to add to this, I\\u0027m gonna add an additional knowledgebase file for the bot to have an overview of things, as well as better knowledge of the forum structure and categories. but all in all, this seems to be working nicely, good job man! and as a bonus: the bot doesn\\u0027t have access to the restricted categories, which is a win for us :) I couldn\\u0027t get the API access to work for some reason, but once the forum is live we wouldn\\u0027t need that anyway :) ... Yes, I think this is a first step only. Some time later, I can look at making a get-whole-Q\\u0026A-pages endpoint working, so Cha\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-792/api-for-chatgpt\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Talkyard List API\",\"url\":\"https://forum.talkyard.io/-390/talkyard-list-api\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"There\\u0026#x27;s a search API: POST /-/v0/search for full text search, and also an API at: POST /-/v0/list for listing for example the X most popular pages in a category, or the Y most recent posts across the whole forum. This topic is about the List API \\u2014 what things do people want to list, and what ...\\n\\nYes, actually your server should have auto upgraded itself yesterday (Sat - Sun night) to the latest version (which is v0.6.68-WIP-1-c255d72 == v0.6.68-c255d72).\\n\\nThere\\u0027s a search API: POST /-/v0/search for full text search, and also an API at: POST /-/v0/list for listing for example the X most popular pages in a category, or the Y most recent posts across the whole forum. This topic is about the List API \\u2014 what things do people want to list, and what data should be included in the reply. Here\\u0027s an API request example, for listing the X most recently created pages in a category: POST /-/v0/list { listQuery: { findWhat: \\u0027Pages\\u0027, inCategories: [\\u0027extid:your_category_id\\u0027], sortOrder: \\u0027NewestFirst\\u0027, limit: number, } } ... When a new topic is created a new ticket should be created in my tracker When a comment is added to a topic a comment should be posted to an existing ticket. What information about new topics and replies would you want, in order to do that? For example, what about topic category id? Tags? (later, when re-implemented) Topic type?\\n\\nThis endpoint currently exports the whole site, so, currently, it gives you a bit too much instead. Maybe in the beginning, this doesn\\u0027t matter much, since the Talkyard site wouldn\\u0027t have that much contents, intially? Later there can be query param like: ?newerThan=2020-05-25T00:00:00 so you wouldn\\u0027t get everything. Or ?pageId=... and then you\\u0027d get that page, the replies and authors. ... { ... pages: [{ \\u0022id\\u0022: \\u00228\\u0022, \\u003C\\u2014\\u2014 unique id \\u0022pageType\\u0022: 5, \\u003C\\u2014\\u2014 question / idea / problem / discussion \\u0022categoryId\\u0022: 3, \\u0022createdAtMs\\u0022: 1590397059126, \\u0022updatedAtMs\\u0022: 1590397059126, \\u0022authorId\\u0022: 100, \\u0022frequentPosterIds\\u0022: [], ... }], categories: [{ \\u0022id\\u0022: 3, \\u0022sectionPageId\\u0022: \\u00221\\u0022, \\u0022parentId\\u0022: 1, \\u0022defaultSubCatId\\u0022: null, \\u0022name\\u0022: \\u0022Category Name\\u0022, \\u0022slug\\u0022: \\u0022category-name\\u0022, \\u0022description\\u0022: \\u0022Category description text.\\u0022, \\u0022createdAtMs\\u0022: 1590397023923, ... }], posts: [{ \\u003C\\u2014\\u2014 replies, but also page titles and page bodies (orig posts) \\u0022id\\u0022: 21, \\u003C\\u2014\\u2014 unique id \\u0022pageId\\u0022: \\u00228\\u0022, \\u0022nr\\u0022: 1, \\u003C\\u2014\\u2014 0 = page title, 1 = Original Post.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-390/talkyard-list-api\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"How to create Pages and Comments via the API\",\"url\":\"https://forum.talkyard.io/-800/how-to-create-pages-and-comments-via-the-api\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"curl -X POST SERVER_ORIGIN/-/v0/do \\\\ -H \\u0026#x27;Authorization: Basic SECRET_B64\\u0026#x27; \\\\ -H \\u0026#x27;Content-Type: application/json\\u0026#x27; \\\\ -d \\u0026#x27;{ \\u0026quot;doActions\\u0026quot;: [{ \\u0026quot;asWho\\u0026quot;: \\u0026quot;username:USERNAME\\u0026quot;, \\u0026quot;doWhat\\u0026quot;: \\u0026quot;CreatePage\\u0026quot;, \\u0026quot;doHow\\u0026quot;: { \\u0026quot;refId\\u0026quot;: \\u0026quot;YOUR_PAGE_REF_ID\\u0026quot;, \\u0026quot;pageType\\u0026quot;: \\u0026quot;Discussion\\u0026quot;, \\u0026quot;inCategory\\u0026quot;: \\u0026quot;rid:CAT_REF_ID\\u0026quot;, \\u0026quot;title\\u0026quot;: \\u0026quot;Bird vs Owl\\u0026quot;, \\u0026quot;bodySrc\\u0026quot;: \\u0026quot;The _early_ bird catches the worm, but the wise owl shops online at midnight\\u0026quot;, \\u0026quot;bodyFmt\\u0026quot;: \\u0026quot;CommonMark\\u0026quot; } }]}\\u0026#x27; ... Note that there\\u0026#x27;s an array \\u2014 in case you do many things in the same API request. This is simialr to creating pages, except that you change doWhat to CreateComment, and specify a page and a parent post, instead of a parent category. POST https://your-talkyard-site/-/v0/do { doActions: [{ asWho: \\u0026#x27;username:___\\u0026#x27;, doWhat: \\u0026#x27;CreateComment\\u0026#x27;, doHow: { refId?: \\u0026#x27;NEW_REF_ID\\u0026#x27;, parentNr: 1, // the Orig Post is nr 1 whatPage: \\u0026#x27;rid:YOUR_PAGE_REF_ID\\u0026#x27;, bodySrc: \\u0026#x27;Comment text _italic_ **bold**\\u0026#x27;, bodyFmt: \\u0026#x27;CommonMark\\u0026#x27;, } }] } Here\\u0026#x27;re Typescript declarations for the API: https\\n\\nDocumentation \\u00B7 API \\u00B7 By KajMagnus @KajMagnus \\u00B7 core-dev \\u00B7 support-team2024-04-20 03:05:00.743Z2024-04-20 03:48:12.917Z \\u00B7 You can create pages (a.k.a. topics, posts, threads) and comments via Talkyard\\u0027s Do API. First, read about the Talkyard API authentication, including about how to enable the API. And the API shorthand syntax. Then: Generate an API secret (at https:// your forum /-/admin/api). Open the forum category where you want your pages to appear (you\\u0027ll find all categories here: https:// your forum /categories). Click Edit category. Scroll to the bottom of the dialog that then opens, click External ID and type an ID of your choosing. (This field will be renamed to \\u0022Reference ID\\u0022, because you use these IDs to reference things.) Decide who (which user) should be the page author. You can use Sysbot (username sysbot) if it\\u0027s not a person. Send a POST request to /-/v0/do: POST https://your-talkyard-site/-/v0/do { doActions: [{ asWho: \\u0027USER_REF\\u0027, doWhat: \\u0027CreatePage\\u0027, doHow: { refId\\n\\ncurl -X POST SERVER_ORIGIN/-/v0/do \\\\ -H \\u0027Authorization: Basic SECRET_B64\\u0027 \\\\ -H \\u0027Content-Type: application/json\\u0027 \\\\ -d \\u0027{ \\u0022doActions\\u0022: [{ \\u0022asWho\\u0022: \\u0022username:USERNAME\\u0022, \\u0022doWhat\\u0022: \\u0022CreatePage\\u0022, \\u0022doHow\\u0022: { \\u0022refId\\u0022: \\u0022YOUR_PAGE_REF_ID\\u0022, \\u0022pageType\\u0022: \\u0022Discussion\\u0022, \\u0022inCategory\\u0022: \\u0022rid:CAT_REF_ID\\u0022, \\u0022title\\u0022: \\u0022Bird vs Owl\\u0022, \\u0022bodySrc\\u0022: \\u0022The _early_ bird catches the worm, but the wise owl shops online at midnight\\u0022, \\u0022bodyFmt\\u0022: \\u0022CommonMark\\u0022 } }]}\\u0027 ... Note that there\\u0027s an array \\u2014 in case you do many things in the same API request. This is simialr to creating pages, except that you change doWhat to CreateComment, and specify a page and a parent post, instead of a parent category. POST https://your-talkyard-site/-/v0/do { doActions: [{ asWho: \\u0027username:___\\u0027, doWhat: \\u0027CreateComment\\u0027, doHow: { refId?: \\u0027NEW_REF_ID\\u0027, parentNr: 1, // the Orig Post is nr 1 whatPage: \\u0027rid:YOUR_PAGE_REF_ID\\u0027, bodySrc: \\u0027Comment text _italic_ **bold**\\u0027, bodyFmt: \\u0027CommonMark\\u0027, } }] } Here\\u0027re Typescript declarations for the API: https\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-800/how-to-create-pages-and-comments-via-the-api\",\"search_provider\":\"anthropic\"}}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":\"globe\",\"display_content\":null}"

