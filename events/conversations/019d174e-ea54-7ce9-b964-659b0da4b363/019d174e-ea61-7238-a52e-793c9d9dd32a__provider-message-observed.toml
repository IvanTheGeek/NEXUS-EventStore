[[body.segments]]
kind = "plain_text"
text = "The Claude issues would seem to be part of the Chat Import Pipeline, which I have moved the 2 topics. This makes a bunch of topics in a single layer for this category. I think this is where the topic type would be helpful.  I have experimented and making the topic a talkyard \"Problem\" seems to be an acceptable change. It could stay a discussion, and we could have LOGOS have a bit better type here, say ISSUE or something else, but PROBLEM might work here. \nTalkyard \"PROBLEM\" type adds a status that can be New, Planned, Started, Done. It also shows a different icon in the list of all topics that for me as a human gives me a why to understand what the topic is and related to."

