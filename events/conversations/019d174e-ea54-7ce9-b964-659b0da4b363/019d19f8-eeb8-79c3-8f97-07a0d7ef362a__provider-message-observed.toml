text = "The user is reflecting on the topic type decision and noting it as a future LOGOS requirement idea. I should affirm the decision to keep them as discussions and capture the LOGOS requirement idea."

[[body.segments]]
kind = "plain_text"
text = "Discussion is the right call. These are records of observed facts, not open problems to be resolved. The Discussion type doesn't impose a status model on them, which is exactly right — they're not in a state, they just exist.\n\nThe insight about custom topic types for LOGOS is worth capturing while it's fresh. This is exactly the kind of thing that gets lost. You should add a limitation topic to the category:\n\n**Title:** `No custom topic types or type-specific workflows`\n\nThe limitation being that Talkyard offers a fixed set of topic types (Discussion, Wiki, Q&A, Problem) with no ability to define your own or attach custom workflow states to them. The LOGOS requirement it generates is the Spec type with workflow states already in the requirements doc — but also the broader requirement: any topic type can be defined with its own fields, status model, and behavior.\n\nThe concrete example you just worked through is good provenance for that topic — you wanted something between Discussion and Problem, something that says \"observed fact, immutable record\" without the solved/unsolved binary. That type doesn't exist in Talkyard. It should in LOGOS.\n\nWant to add that one now while the reasoning is fresh, or should I draft it in the same format as the others first?"

