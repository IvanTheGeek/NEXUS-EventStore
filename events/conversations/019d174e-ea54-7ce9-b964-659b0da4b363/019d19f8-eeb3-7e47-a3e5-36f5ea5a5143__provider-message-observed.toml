[[body.segments]]
kind = "plain_text"
text = "Here are all three, ready to paste:\n\n---\n\n**Topic 1: Overview & Stages**\n*Type: Wiki*\n\n> LaundryLog tracks laundromat expenses for truck drivers — machine type, quantity, price, payment method, and location — producing clean records for accounting and tax filing.\n>\n> The problem it solves is simple: expenses happen on the road, away from any system, and are easy to forget or skip logging. LaundryLog makes the entry fast enough to do it at the machine.\n>\n> **Stages**\n>\n> Stage 1 — Core entry form and local persistence. Machine type (washer/dryer/supplies), quantity, unit price, payment method (cash/points/card/app), location, session total, today's entries list.\n>\n> Stage 2 — Reporting. Accounting output by date range, exportable for tax filing.\n>\n> Stage 3 — GPS and location lookup. Check personal history first, then community database of known laundromat locations at truck stops and travel centers.\n>\n> Stage 4 — Community location pool. Shared, anonymized location data so all users benefit from collectively known stops.\n>\n> Each stage is independently useful. Real laundry trips can be logged after Stage 1.\n\n---\n\n**Topic 2: v7 Prototype Notes**\n*Type: Wiki*\n\n> The v7 prototype is a working HTML/JS single-page app that established the core UI decisions. These should be treated as tested and settled unless there's a specific reason to revisit.\n>\n> **Decisions made in v7**\n>\n> Machine type is a 3-button toggle: Washer / Dryer / Supplies. Mutually exclusive, large tap targets for use on a phone in a laundromat.\n>\n> Payment method is a 4-button toggle: Cash / Points / Card / App. Same approach.\n>\n> Quantity uses a large counter with +/- buttons plus direct input. Minimum 1.\n>\n> Price has quick-fill buttons for common amounts plus manual adjustment. Keeps common cases fast.\n>\n> Entry total (quantity × price) is calculated and displayed live before submission.\n>\n> On log entry: quantity resets to 1, machine type clears, but location and payment method are retained — you're likely doing multiple machines in the same visit with the same payment.\n>\n> Form validation is inline on the submit button — shows which fields are missing rather than a separate error message.\n>\n> Session total accumulates across entries and is shown in a sticky bar.\n>\n> Today's entries are listed below the form.\n>\n> GPS button on location field — prototype notes it should check personal history first, then community database. Location field stays editable for manual entry.\n>\n> **What v7 doesn't have**\n>\n> No persistence — entries are lost on refresh. No reporting. No real GPS lookup. These are Stage 1 and Stage 2 work.\n\n---\n\n**Topic 3: Event Model**\n*Type: Wiki*\n\n> The event model defines how LaundryLog works as an event-sourced system — what users can do, what gets recorded, and what the system shows.\n>\n> **Commands** (user intentions)\n>\n> `LogEntry` — location, machine type, quantity, unit price, payment method, timestamp\n>\n> `DeleteEntry` — entry id (correction case)\n>\n> `StartSession` — optional, may be implicit on first entry of the day\n>\n> **Events** (facts recorded)\n>\n> `EntryLogged` — all fields from LogEntry plus calculated total, session id\n>\n> `EntryDeleted` — entry id, timestamp\n>\n> **Read Models** (what the UI shows)\n>\n> Session View — current session total, entries in this session\n>\n> Day View — all entries for a given day, day total\n>\n> Report View — entries grouped by date range, totals, suitable for accounting export\n>\n> Location History — personal list of previously used locations for quick selection\n>\n> **Domain Rules**\n>\n> Total = quantity × unit price (no rounding until display)\n>\n> Quantity minimum is 1\n>\n> Price minimum is $0.00 (supplies sometimes free with payment app)\n>\n> Location is required — cannot log without it\n>\n> Machine type and payment method are required\n>\n> Deletion is a soft delete via event, not removal from history\n\n---\n\nWant any adjustments before you paste these in?"

