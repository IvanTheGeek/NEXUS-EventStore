kind = "plain_text"
text = "Just the README, no requirement topics yet. Here's the first one:\n\n**NEXUS → Requirements**\n**Title:** `Requirements can be sourced from anywhere, not only limitations`\n**Type:** Problem\n**Status:** New\n\n```markdown\nThe NEXUS methodology must not imply or prescribe that \nrequirements are only generated by discovered limitations. \nRequirements can originate from any source, and the \nmethodology must reflect that explicitly.\n\n## Why It's Needed\n\nThe early framing of the relationship between limitations \nand requirements — \"limitations lead to requirements\" — \nwas accurate as a description of one pathway but \nmisleading as a description of the whole. It implies a \nreactive model: something breaks or constrains, then a \nrequirement is written. In practice, requirements emerge \nfrom many sources that have nothing to do with limitations.\n\nThis was identified while building out the LOGOS \nRequirements subcategory. Several requirements had no \nlimitation as their source — they came from design \nprinciples, from the NEXUS methodology itself, from \nfirst-principles thinking about what LOGOS should be. \nForcing them to trace back to a limitation would have \nbeen dishonest.\n\n## The Requirement\n\nNEXUS methodology explicitly acknowledges and supports \nthe full range of requirement sources:\n\n- **Discovered limitations** — a constraint in an \n  existing tool or dependency that the new system \n  will not have\n- **Design principles** — something that must be true \n  for the system to be coherent with its own values\n- **First-principles reasoning** — something derived \n  from how the system should work, independent of \n  any existing constraint\n- **Active use insights** — something discovered by \n  using the system and finding it missing\n- **Help requests** — a user need surfaces something \n  the system doesn't handle\n- **Adjacent ideas** — something observed elsewhere \n  that should be brought in\n- **Methodology requirements** — something NEXUS \n  itself requires of any system built within it\n\nEach requirement topic records its source honestly. \nNo source is more legitimate than another. A requirement \nfrom a design principle is as valid as one from a \ndiscovered limitation.\n\n## Acceptance\n\nThe NEXUS methodology documentation explicitly describes \nthe full range of requirement sources. The Requirements \nREADME in any NEXUS-governed project reflects this. No \nrequirement topic is expected to trace back to a \nlimitation — the source field is open and honest.\n\n## Source\n\nDiscovered while building LOGOS → Requirements and \nfinding that several requirements had no limitation as \ntheir source. The methodology's implicit framing was \ncorrected through active use — which is itself an \nexample of a requirement sourced from active use insight \nrather than a limitation.\n```\n\n---\n\nNote: no external URL sources for this one — it was generated by direct insight during this conversation, which is captured in the source section. Create and let me know when done."

