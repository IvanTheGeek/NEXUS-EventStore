[[body.segments]]
kind = "plain_text"
text = "Both of those are significant and they're related — they're both about traceability of how understanding evolved.\n\n**The wiki history gap** — you already have this recorded. It's exactly `Wiki edit history is not accessible` in Talkyard Limitations, and `Event-sourced wiki editing with full revision history` is item 3 on the requirements checklist. The fact that you just experienced it firsthand while refining a requirement is good provenance to add to that limitation topic when you get to it.\n\n**Linking to AI chat discussions** — this is new and distinct. It's not just wiki history, it's the ability to reference the specific conversation where reasoning happened and a decision was made. That's a requirement of its own:\n\nThe requirement would be something like: any topic or post in LOGOS can link to an external source — including a specific Claude conversation or a point within one — and that link is treated as a first-class cross-reference, not just a URL in text. The conversation is the provenance of the decision.\n\nThis also connects back to the Chat Import Pipeline. If those conversations were imported into LOGOS, the cross-reference could be an internal link to the imported conversation rather than an external Claude URL. The pipeline isn't just about archiving — it's about making the reasoning that happened in AI conversations referenceable from within LOGOS.\n\nTwo things worth capturing:\n\n1. Add a note to the `Wiki edit history is not accessible` limitation — the concrete situation that just happened is good provenance\n2. A new LOGOS requirement: `External and internal cross-referencing of source conversations`\n\nWant to draft that requirement next, or finish working through the current checklist order and insert it?"

