[[body.segments]]
kind = "plain_text"
text = "Yes — and that's a sharp observation that actually strengthens the case for Projection.\n\nThe pattern becomes consistent and mechanistically honest across all three terms:\n\n- **Command** — describes the *mechanism* of intent. Something is commanding the system to act. Not \"Request\" or \"Input\" — Command. It carries authority and direction.\n- **Event** — describes the *mechanism* of fact. Something happened. Not \"Record\" or \"Log Entry\" — Event. It carries immutability and truth.\n- **Projection** — describes the *mechanism* of derived state. Something is projected from events. Not \"Read Model\" or \"View\" — Projection. It carries derivation and dependence on history.\n\nAll three are mechanistic. All three describe *how the thing works*, not just *what it's for*. That consistency is meaningful — it means the vocabulary of the model is internally coherent. Someone learning the terms learns the mechanics at the same time as the names.\n\nRead Model breaks that coherence — it's purpose-based, not mechanism-based. It describes what you do with it, not how it comes to exist.\n\nSo yes — Projection is the right term for NEXUS specifically, and the Command/Event/Projection triad is a cleaner, more consistent vocabulary than Command/Event/Read Model.\n\nWorth capturing this reasoning in the wiki topic itself — the terminology is a deliberate choice, not just convention."

