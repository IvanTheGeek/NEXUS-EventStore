text = "Got it. You replaced bare URLs with human-readable breadcrumb-style references:\n\n```\nLOGOS → Talkyard Limitations → Subcategory depth is capped at one level\nLOGOS → Talkyard Limitations → Flat top-level navigation mixes categories of different scope\n```\n\nThat's the pattern going forward — breadcrumb path as the link text, linked to the actual topic URL. Much more readable in context than a raw URL, and the path itself communicates where in the system the source lives.\n\nSo the format is:\n\n```\n[CATEGORY → SUBCATEGORY → Topic title](url)\n```\n\nWith additional context added inline when the relationship isn't obvious. For example, if a requirement sources from a general design discussion rather than a specific limitation, a parenthetical note after the link would clarify why it's relevant.\n\nReady for item 2 — `Category-scoped tags`. I already have the URL for the tags limitation topic from earlier: `https://talkyard.ivanthegeek.com/-59/tags-are-a-flat-global-list-with-no-scoping`\n\n---\n\n**LOGOS → Requirements**\n**Title:** `Category-scoped tags`\n**Type:** Problem\n**Status:** New\n\n```markdown\nTags in LOGOS must be definable at any level of the category hierarchy, scoping their availability to that category and its descendants.\n\n## Why It's Needed\n\nTalkyard tags are a flat global list shared across the entire forum. A tag created for one domain appears as an option everywhere. Over time the tag list becomes cluttered with context-specific tags that are meaningless outside their original context. Structural scoping is impossible — only naming conventions can reduce confusion, and they cannot enforce anything.\n\n## The Requirement\n\nA tag can be defined at the forum level (global), at a category level, or at any subcategory level. A tag defined at a given level is available within that category and all its descendants, and nowhere else unless explicitly marked global. Global tags remain available everywhere but are an explicit choice, not the default.\n\n## Acceptance\n\nAn administrator can create a tag scoped to a specific category. That tag appears as an option only within that category and its subcategories. It does not appear in unrelated categories. A separately defined global tag appears everywhere. Both can coexist.\n\n## Source\n\n- [LOGOS → Talkyard Limitations → Tags are a flat global list with no scoping](https://talkyard.ivanthegeek.com/-59/tags-are-a-flat-global-list-with-no-scoping)\n```"

