\u0027, content_keys)\\\\n\\\\n# Check a few assistant messages for any model field\\\\nfor c in data[:5]:\\\\n    for m in c[\\u0027chat_messages\\u0027]:\\\\n        if m[\\u0027sender\\u0027] == \\u0027assistant\\u0027:\\\\n            print(\\u0027Assistant msg keys:\\u0027, list(m.keys()))\\\\n            break\\\\n    break\\\\n\\\\\\u0022\\\\n\\u0022}\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

