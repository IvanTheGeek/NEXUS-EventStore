kind = "plain_text"
text = "No model or version information in the export. The message schema only has `uuid`, `text`, `content`, `sender`, `created_at`, `updated_at`, `attachments`, `files` — nothing indicating which Claude model generated the response.\n\nAnthropic doesn't include that in the export data currently. So there's no way to automatically tag responses as Sonnet vs Opus from the JSON alone.\n\nThe workaround options are limited — you could potentially infer it roughly from the `created_at` timestamp combined with knowledge of when you were using which model, but that's imprecise and would require a manual mapping of date ranges to models.\n\nWorth noting as a gap for your forum import — model version would be useful metadata for traceability, especially as training data context. Might be worth submitting as a feature request to Anthropic via feedback."

