text = "Next item — decide the fate of the old `Talkyard Limitations & Custom Forum Requirements` wiki topic that still exists in Structure & Organization.\n\nThree options:\n\n**A — Delete it.** The content has been superseded. Individual limitation topics in the new subcategory are more detailed, correctly structured, and properly cross-referenced. The old wiki is noise now.\n\n**B — Archive it.** Change the title to something like `ARCHIVED — Talkyard Limitations (original wiki)`, leave it in place as a historical record of how this was first captured before the structure evolved.\n\n**C — Leave it as-is.** Accept that it's redundant but harmless. Lower effort, slightly messier.\n\nMy recommendation is A — delete it. The individual topics are strictly better in every way. The old wiki was the first attempt at capturing this information before the proper structure existed. Its value was always in the content, and that content now lives in better form in the new subcategory. Keeping it creates confusion about which is the authoritative record.\n\nThe one argument for B over A is that it honestly reflects how the thinking evolved — the wiki existed, then the structure improved. But that provenance is already captured in the conversation history and in the event log once LOGOS is built. The wiki itself doesn't need to stay to prove the history.\n\nWhat's your call?"

