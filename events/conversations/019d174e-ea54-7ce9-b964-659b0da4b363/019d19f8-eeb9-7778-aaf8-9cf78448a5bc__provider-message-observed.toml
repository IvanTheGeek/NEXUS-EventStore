kind = "plain_text"
text = "Good clarification — so swim lanes at the event layer represent system boundaries within your own domain, not external boundaries. Multiple systems you own or build, each with their own events, but all internal in the sense that you control them. The lane shows which system owns which events.\n\nSo swim lanes serve different purposes depending on where they appear:\n\n- **UI/IO layer swim lanes** — actor/persona boundaries. Who or what is initiating or receiving. Human user, admin, API consumer, external processor, AI agent.\n- **Event layer swim lanes** — system boundaries within your controlled domain. Service A owns these events, Service B owns those events. Useful when the model spans multiple systems you're building or governing.\n\nThat's an important distinction that should be explicit in the wiki — swim lanes aren't one concept applied uniformly, they mean something different depending on which layer they're in.\n\nContinue with your next note."

