kind = "plain_text"
text = " **Short:**\n> Building a local AI system that knows you deeply — your preferences, methodology, and accumulated knowledge — trained on your own data and growing smarter through use.\n\n**Long:**\n> Most AI systems start fresh every conversation and know nothing about you. This category documents the development of a different approach — a local AI that lives on your own hardware, trained on your own forum, conversations, and decisions. It starts humble, routing questions to external AI while observing and learning. Over time it earns the ability to answer more itself, reaching out to external AI by choice rather than necessity. Private by architecture, personal by design, and continuously improving through every interaction.\n\nSame pattern as before — short for the category field, long could be the opening line of the Start Here wiki or a second pinned post. Which do you prefer for the long version?"

