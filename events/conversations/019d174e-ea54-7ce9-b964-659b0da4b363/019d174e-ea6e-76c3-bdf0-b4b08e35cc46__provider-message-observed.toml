text = "the doc is pretty hard core about the \"Human responsibility — design\". This is ultimately true, however, just as I have been doing in this chat with you, using AI as a helper in creating the design is pretty integrated, at least for me. The point of CORTEX is to be better at this assistance. the implementation really is more of a rendering, which for me is more AI or even function based. The AI that helps with design could really be a whole different AI that does the rendering. The rendering AI could be trained and tuned for F# and the patterns that I want, prescribe to, with rules on how to do certain tasks or approach doing rendering, etc."

