text = "The user wants to set up Requirements subcategories for NEXUS and CORTEX, similar to what was done for LOGOS. They need the category short description and README for each."

[[body.segments]]
kind = "plain_text"
text = "Here's everything you need for both. Create the subcategory in Talkyard admin first, then post the README and pin it.\n\n---\n\n## NEXUS → Requirements\n\n**Category Short Description:**\n> Where the NEXUS methodology gets defined — one requirement per topic, each sourced from a gap, ambiguity, or insight discovered through active use.\n\n**README Title:** `README`\n\n```markdown\nThis category is where the NEXUS methodology gets defined.\n\nEach topic here is a single requirement — a concrete, nameable thing that NEXUS as a methodology must address or specify. Requirements come from anywhere: a gap discovered when the methodology didn't have an answer, an ambiguity that forced an undocumented decision, an insight from applying NEXUS to a real project, or a pattern that needs to be made explicit.\n\n## What a Requirement Topic Contains\n\n- **What it is** — a clear statement of the methodological gap or needed definition\n- **Why it's needed** — the situation that exposed it\n- **Acceptance** — how you'd know the methodology adequately addresses it\n- **Cross-references** — links to related requirements, decisions, or project examples\n\n## What This Is Not\n\nThis is not a critique of NEXUS. It is the methodology knowing itself — surfacing the places where it is incomplete, ambiguous, or untested, and making them explicit. An undocumented decision is a hidden requirement. Recording it here makes it visible and improvable.\n\n## Topic Types\n\n**Idea** — a candidate requirement not yet fully understood. A gap has been noticed but the right answer isn't clear. Open for discussion and refinement.\n\n**Problem** — a requirement understood well enough to define. Clear statement, known source, acceptance criteria. Status model:\n\n- **New** — captured and understood, design thinking not started\n- **Planned** — approach is taking shape\n- **Started** — actively being worked out\n- **Done** — addressed in the methodology\n\nAn Idea becomes a Problem when the gap is understood well enough to define what closing it looks like.\n```\n\n---\n\n## CORTEX → Requirements\n\n**Category Short Description:**\n> Where the CORTEX personal AI system gets defined — one requirement per topic, each sourced from a capability gap, integration need, or design decision.\n\n**README Title:** `README`\n\n```markdown\nThis category is where the CORTEX personal AI system gets defined.\n\nEach topic here is a single requirement — a concrete, nameable thing that CORTEX must do or be. Requirements come from anywhere: a gap in current AI tool capability, something discovered during actual use of Claude or other AI systems, an integration need with LOGOS, a privacy or ownership concern, or a design decision about how CORTEX should grow and learn.\n\n## What a Requirement Topic Contains\n\n- **What it is** — a clear statement of the capability or behavior required\n- **Why it's needed** — the source: what gap, experience, or design principle generated it\n- **Acceptance** — how you'd know CORTEX satisfies it\n- **Cross-references** — links to related LOGOS requirements, limitations, or design discussions\n\n## What This Is Not\n\nThis is not a wishlist of AI features in general. Every requirement here is grounded in a specific need — something that the current approach (Claude API, local models, RAG) doesn't adequately address, or something that must be true for CORTEX to be genuinely personal and private rather than just another AI wrapper.\n\n## Topic Types\n\n**Idea** — a candidate requirement not yet fully understood. The need is real but the shape isn't clear yet. Open for discussion and refinement.\n\n**Problem** — a requirement understood well enough to act on. Clear statement, known source, acceptance criteria. Status model:\n\n- **New** — captured and understood, design thinking not started\n- **Planned** — approach is taking shape\n- **Started** — actively being designed or implemented\n- **Done** — satisfied in the CORTEX system\n\nAn Idea becomes a Problem when it is understood well enough to define acceptance. The maturity stages of CORTEX (RAG → LoRA → Full fine-tuning) mean some requirements are only reachable at a certain stage — noting that in the topic is useful context.\n```\n\n---\n\nBoth follow the same pattern as LOGOS → Requirements with domain-appropriate framing. The CORTEX README has one addition worth noting — the maturity stages footnote, since some requirements are stage-gated and that's worth capturing per topic when relevant."

