text = "**NEXUS category (top level)**\n**Title:** `Event Modeling as the design foundation`\n**Type:** Wiki\n\n```markdown\nEvent Modeling is the design methodology at the heart of \nNEXUS. Before any code is written, the system is modeled \nas a sequence of events. This is not optional overhead — \nit is the foundation from which everything else is built.\n\n## What Event Modeling Is\n\nEvent Modeling was created by Adam Dymetrik. It is a \nmethodology for designing software systems by mapping \nout the events that flow through them — the things that \nhappen, in the order they happen, with the commands that \ntrigger them and the read models that project from them.\n\nAn Event Model is a visual artifact — typically a \ntimeline — showing:\n\n- **Events** — immutable facts that have occurred. \n  Something happened. It is recorded permanently.\n- **Commands** — intentions that trigger events. \n  A user or system wants something to happen.\n- **Read Models** — projections from events that \n  serve the UI or other consumers. Current state \n  derived from history.\n- **UI/UX slices** — the interface elements that \n  issue commands and display read models, showing \n  the human experience of the system\n\nThe model is complete when every piece of the system \ncan be traced from a user action through a command \nto an event to a read model and back to the UI. \nNothing is left implicit.\n\n## Why NEXUS Uses Event Modeling\n\nEvent Modeling produces artifacts that are:\n\n- **Unambiguous** — the model either covers a \n  scenario or it doesn't. Gaps are visible.\n- **Implementation-ready** — the event model maps \n  directly to code. Commands become command handlers. \n  Events become event types. Read models become \n  queries. The design is the specification.\n- **AI-actionable** — a complete event model gives \n  an AI system enough context to implement correctly. \n  The design does the thinking; AI does the building.\n- **Preservable** — the model is a document that \n  lives in LOGOS, linked to the conversations that \n  produced it and the code that was built from it.\n\n## How NEXUS Extends Event Modeling\n\nNEXUS builds on Adam Dymetrik's methodology with \nseveral additions:\n\n**Paths as first-class artifacts** — a path is a \nnamed, purposeful journey through the event model \nfrom a specific user's perspective. Paths make the \nhuman experience explicit within the model rather \nthan implicit in the UI slices.\n\n**Spec topics linked to model elements** — specific \nslices of the event model become Spec topics in \nLOGOS with their own workflow states. The model \nelement and the spec are linked — the spec is not \na separate document, it is the model element made \ninto an actionable artifact.\n\n**AI as the implementation layer** — the event \nmodel is designed to be consumed by AI code \ngeneration. The completeness requirements of a \ngood event model align exactly with what AI needs \nto implement correctly.\n\n## The Tool\n\nPenpot is the current tool for creating Event Models \nwithin NEXUS — an open source, self-hostable design \ntool that produces the visual timeline artifact. \nThe model lives in Penpot; the link to it lives in \nLOGOS; the conversations that shaped it live in \nLOGOS alongside that link.\n\n## See Also\n\n- [NEXUS — Start Here](https://talkyard.ivanthegeek.com/-55/nexus-start-here-the-framework-at-the-center-of-everything) — the full framework overview\n- [The problem NEXUS solves](https://talkyard.ivanthegeek.com/-84/the-problem-nexus-solves) — why design before implementation matters\n- NEXUS → Paths as first-class artifacts\n- NEXUS → Specs and the design-before-implementation discipline\n```\n\n---\n\nNote: I used -84 for the previous wiki topic — verify before posting. Create and let me know when done."

