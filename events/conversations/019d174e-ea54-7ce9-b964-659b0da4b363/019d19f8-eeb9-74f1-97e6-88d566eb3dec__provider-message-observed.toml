kind = "plain_text"
text = "Both terms are accurate and Adam uses both. The distinction worth understanding:\n\n**Read Model** — describes the *purpose*. It exists to be read. It serves the UI or an API consumer. The name is from the CQRS pattern (Command Query Responsibility Segregation) where reads and writes are separated. It emphasizes the consumer-facing role.\n\n**Projection** — describes the *mechanism*. It is projected from events, the same way a film projector produces an image from frames on a strip. The name emphasizes how it comes to exist — as a derived view of the event history. It is never the source of truth, always a derivation.\n\nThe reason Projection resonates more is probably because it's more honest to the event sourcing philosophy. A Read Model could theoretically be stored and mutated directly — the name doesn't preclude that. A Projection cannot be — by definition it is derived. The name carries the constraint with it.\n\nIn practice within an event sourced system, every read model *is* a projection. So Projection is the more precise term for this context. Read Model is the broader CQRS term that applies whether or not you're doing full event sourcing.\n\nGiven that NEXUS is explicitly event sourced at the foundation, **Projection** is the more accurate and philosophically consistent term. It also reinforces the mental model every time someone reads it — current state is always projected from history, never stored as truth.\n\nMy recommendation: use Projection as the primary term in NEXUS documentation, with a note that Read Model is the equivalent CQRS term they'll encounter in broader literature. That way someone coming from CQRS background recognizes it, but the NEXUS-native term carries the right meaning.\n\nDoes that align with your instinct?"

