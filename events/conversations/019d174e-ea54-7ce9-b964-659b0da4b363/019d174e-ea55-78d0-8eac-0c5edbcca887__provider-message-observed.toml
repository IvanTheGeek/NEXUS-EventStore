kind = "plain_text"
text = " Good question. The forum is more of a peer to NEXUS than a child of it — it's a foundational piece of the overall system, not something NEXUS owns or contains.\n\nThe way you've described it, NEXUS is the framework/methodology, and the forum is one of several tools that the framework uses alongside Penpot, the MCP server, the local AI, etc. They're all peers serving the larger vision.\n\nSo the import pipeline is really forum infrastructure, which would put it logically under AI CHATS or alongside it rather than under NEXUS:\n\n```\nDEVELOPMENT\n  └── NEXUS\n  └── Event Modeling\n  └── Forum & Knowledge Base\n        └── Chat Import Pipeline\n        └── Structure & Organization\n```\n\nOr even simpler — since AI CHATS already exists as a top level category, the import pipeline documentation could live there since it's specifically about getting chats into the forum:\n\n```\nAI CHATS\n  └── Claude\n  └── Import Pipeline\n```\n\nThat last option is honest to what the pipeline actually does — it's about AI chats, not about NEXUS specifically.\n\nWhat feels right to you?"

