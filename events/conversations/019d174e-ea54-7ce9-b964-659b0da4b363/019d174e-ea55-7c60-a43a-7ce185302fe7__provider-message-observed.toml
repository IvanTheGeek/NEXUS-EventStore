kind = "plain_text"
text = "currently I have SOFTWARE as a top level category. I am wondering if I should add/change/modify this. There are specific apps like LaundryLog that apply. There is also things like the import that are part of the whole concept of the framework or methodology side. I have kinda named it NEXUS as being the whole system and pieces. An MCP server is part, the forum is part, using Penpot is part, the event model viewer is a part etc. Some of these are actually softwares, but I also want it easy for someone random who just wants to use an app, like LaundryLog to be able to find and contribute like a feature wish or something. So maybe a category like APPs would make sense more than Software, and have more of a software or software development as a category"

