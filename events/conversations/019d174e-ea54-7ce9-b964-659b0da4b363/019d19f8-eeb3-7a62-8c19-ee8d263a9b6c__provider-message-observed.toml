kind = "plain_text"
text = "Talkyard has a subcategory depth limit — it only supports one level of subcategories. So you can have:\n\n```\nDEVELOPMENT (top level)\n  └── THE FABRIC (subcategory)\n```\n\nBut not:\n\n```\nDEVELOPMENT (top level)\n  └── THE FABRIC (subcategory)\n        └── Chat Import Pipeline (sub-subcategory) ← not supported\n```\n\nThe workaround options:\n\n1. **Make Chat Import Pipeline a peer subcategory under DEVELOPMENT** alongside THE FABRIC rather than nested inside it\n2. **Keep it flat inside THE FABRIC** — use topic tags and a pinned index wiki post to organize topics within THE FABRIC rather than subcategories\n3. **Make THE FABRIC a top level category** — then it can have its own subcategories including Chat Import Pipeline\n\nGiven how central THE FABRIC is, option 3 actually makes architectural sense — it's arguably as important as DEVELOPMENT itself. That would give you:\n\n```\nDEVELOPMENT\n  └── NEXUS\n  └── Event Modeling\n\nTHE FABRIC\n  └── Chat Import Pipeline\n  └── Structure & Organization\n  └── Talkyard API & Integration\n```\n\nWhich direction feels right?"

