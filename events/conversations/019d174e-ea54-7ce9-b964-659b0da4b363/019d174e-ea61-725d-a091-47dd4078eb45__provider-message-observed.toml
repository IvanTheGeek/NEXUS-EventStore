text = " Checklist additions added. Here's the full current checklist state so we have one clean reference:\n\n**In progress / original list:**\n- [x] `Unlimited subcategory nesting`\n- [x] `Tag scope is configurable — global, per-category, or multi-category, each with independent inheritance`\n- [x] `Event-sourced editing with full revision history`\n- [ ] `Arbitrary post metadata`\n- [ ] `Spec topic type with Draft → Under Review → Approved → Linked to Implementation workflow`\n- [ ] `Spec-to-implementation linking`\n- [ ] `Dual audience architecture — humans and AI from the same data`\n- [ ] `Full data export — no lock-in`\n- [ ] `Arbitrary import pipeline support with full metadata preservation`\n- [ ] `Accepted as a distinct terminal status`\n- [ ] Chat Import Pipeline — category short description and README\n- [ ] Old `Talkyard Limitations & Custom Forum Requirements` wiki — decide fate\n- [ ] NEXUS Requirements — `Requirements can be sourced from anywhere, not only limitations`\n- [ ] CORTEX Requirements — first topics\n\n**Additions from this conversation:**\n- [ ] Update `Wiki edit history is not accessible` limitation — broaden to all content types, add provenance note\n- [ ] Update `Event-sourced editing with full revision history` — add time-travel section with GIT analogy\n- [ ] New LOGOS Requirement: `Event-sourced storage as the foundation — current state is always a projection`\n- [ ] New LOGOS Requirement: `Full edit history visible on all content types`\n- [ ] New LOGOS Requirement: `Cross-referencing source conversations — internal links to imported chats, external links to Claude URLs`\n- [ ] New LOGOS Requirement: `Chat import as provenance infrastructure, not just archiving`\n\n---\n\nNext up I'd suggest tackling the update to the existing `Event-sourced editing with full revision history` topic first while the time-travel reasoning is fresh, then immediately follow with the new `Event-sourced storage as the foundation` architectural requirement — the two are tightly coupled and best done together.\n\nHere's the updated full text for the existing topic:\n\n**Title:** `Event-sourced editing with full revision history`\n\n```markdown\nEvery edit to any content in LOGOS — wiki posts, discussion posts, \nproblems, ideas, questions — is an immutable event. The full history \nof every piece of content is visible, diffable, and revertable by \nany user.\n\n## Why It's Needed\n\nTalkyard tracks revision numbers internally but exposes no history \nUI of any kind. Once a post is edited, the previous content is gone \nfrom the user's perspective. This applies to all content types — \nnot just wikis. The refinement of a requirement, the evolution of a \ndesign decision, the correction of a limitation description — none \nof it is traceable after the fact.\n\nThis was experienced directly: a requirement topic was refined from \na simpler model to a richer one during discussion. The reasoning \nbehind that refinement exists only in the AI conversation where it \nhappened — not in the topic itself. With edit history, the evolution \nwould be part of the record.\n\n## The Requirement\n\nEvery save of any post or topic is an immutable timestamped event \nwith author, timestamp, and full content snapshot. Nothing is \noverwritten. Current state is always a projection from the edit \nhistory. Any user can:\n\n- View the full edit history of any post\n- Compare any two revisions\n- See who changed what and when\n- Revert to any previous state\n\nThis applies uniformly across all content types — wiki, discussion, \nproblem, idea, question, and any custom type.\n\n## Time Travel\n\nBecause current state is always a projection from events, a user \ncan navigate to any point in the history of a topic and see exactly \nwhat it looked like at that moment. Not just a diff — the full \nreconstructed state at that point in time. \n\nThis is the same capability GIT provides for code: step through \neach commit, see the full state at each point, understand not just \nwhat changed but the sequence of changes that produced the current \nstate. Applied to knowledge and requirements, it means the evolution \nof understanding is fully traceable — not just the destination but \nthe journey.\n\nThis capability is a natural consequence of the storage model, not \na bolted-on feature. See: LOGOS Requirements — Event-sourced storage \nas the foundation.\n\n## Acceptance\n\nA user edits a post. Another user opens the history view and sees \nboth the original and the edited version, with a diff, timestamp, \nand author. A third revision is made. All three are visible and \nindividually selectable. Selecting any revision shows the full \nreconstructed content at that point — not just the diff. Revert to \nrevision 1 restores that content as a new revision event — the \nrevert itself is part of the history.\n\n## Sources\n\n- [LOGOS → Talkyard Limitations → Wiki edit history is not accessible](https://talkyard.ivanthegeek.com/-60/wiki-edit-history-is-not-accessible) (note: limitation title understates scope — affects all content types)\n```\n\n---\n\nUpdate that topic, then let me know when done and I'll give you the `Event-sourced storage as the foundation` architectural requirement."

