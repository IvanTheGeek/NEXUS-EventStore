text = "The user is asking about the \"Limitation —\" prefix in topic titles and whether it's the right approach."

[[body.segments]]
kind = "plain_text"
text = "The argument for it is purely navigational — when the category contains a mix of topic types (the README, maybe future discussion topics, status updates), the prefix lets you scan the list and immediately know which topics are limitation records vs. other things.\n\nBut that argument weakens considerably given the context:\n\n**This is a dedicated subcategory.** Everything in \"Talkyard Limitations\" is by definition a limitation record. The prefix is redundant — it's like filing things in a folder called \"Invoices\" and labeling each one \"Invoice —\". The category name already carries that meaning.\n\n**Alternatives worth considering:**\n\nThe real question is what the title should *lead with* — the subject or the nature of the thing.\n\n- **Just the subject:** `Subcategory depth is capped at one level` — clean, scannable, the limitation is implicit from context\n- **Talkyard as subject:** `Talkyard: subcategory depth capped at one level` — useful if these ever appear outside the category (search results, cross-references)\n- **Impact-first:** `Cannot nest subcategories beyond one level` — frames it from the user's experience rather than the system's behavior\n- **No prefix at all, declarative statement:** `Wiki edit history is not accessible` — reads as a fact, which is exactly what it is\n\nMy honest recommendation: drop the prefix entirely and write the title as a plain declarative fact. `Tags are a flat global list with no scoping`. `Claude export does not include model version`. \n\nThe category is the context. The title should just be the thing itself."

