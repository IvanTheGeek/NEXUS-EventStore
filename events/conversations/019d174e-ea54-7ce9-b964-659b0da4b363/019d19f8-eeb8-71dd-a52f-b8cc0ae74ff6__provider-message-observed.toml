text = "Good — empty category, ready to go. I have all 6 limitations from the source docs. Here's everything drafted:\n\n---\n\n## Category Short Description\n\n> Concrete limitations discovered through active Talkyard use — each one an immutable fact, recorded as it was found.\n\n---\n\n## Pinned Topic\n\n**Title:** `README`\n\n**Content:**\n\n```markdown\nThis category is a record of facts.\n\nEach topic here documents a specific limitation of Talkyard discovered through active use. Not opinions, not complaints — observed behaviors that constrain what can be built or expressed within Talkyard's current design.\n\n## Why This Exists\n\nTalkyard is the interim platform LOGOS runs on. It is good software, deliberately kept simple by its developer. That simplicity involves tradeoffs. When those tradeoffs collide with what LOGOS needs, the collision gets recorded here.\n\nThese topics are the source events. The LOGOS Requirements subcategory is the read model projected from them. Each limitation discovered here generates one or more concrete requirements for the LOGOS software being built to replace Talkyard.\n\n## How Topics Are Structured\n\nEach limitation topic contains:\n- **What the limitation is** — precise description of the behavior\n- **How it was discovered** — the specific situation that surfaced it\n- **Impact** — what it prevents or forces\n- **Workaround** — what's being done in the meantime, if anything\n- **Status** — whether a workaround is in place, feedback submitted, etc.\n\nThe LOGOS requirement generated by the limitation lives in LOGOS → Requirements, not here. Cross-references link the two.\n\n## What This Is Not\n\nThese are not bug reports. Talkyard's limitations are deliberate design decisions made by its developer with different priorities than LOGOS has. They are recorded here without judgment — as constraints that the LOGOS software will not have.\n\n## Immutability\n\nLimitation topics are not edited once posted except to add workaround status updates. The discovery is an immutable fact. If understanding of a limitation deepens, a new topic is created or a reply is added — the original post is not rewritten.\n```\n\n---\n\n## Individual Limitation Topics\n\nHere are the 6 to create, with my evaluation notes on each:\n\n---\n\n**Topic 1**\n**Title:** `Limitation — Subcategory depth is capped at one level`\n\n```markdown\n**What the limitation is**\nTalkyard supports exactly one level of subcategories. A top-level category can have subcategories, but those subcategories cannot have their own subcategories.\n\n**How it was discovered**\nAttempting to create Chat Import Pipeline as a subcategory of LOGOS (then THE FABRIC), which was itself a subcategory of DEVELOPMENT. Talkyard silently prevented the nesting.\n\n**Impact**\nCategories that are logically children of another subcategory must be promoted to top-level. This flattens the navigation and forces unrelated things to share the same hierarchy level. LOGOS, NEXUS, and EVENT MODELING appear alongside APPS and CORTEX at the top level when they should logically nest under DEVELOPMENT.\n\n**Workaround**\nCategories that need subcategories were promoted to top-level. The DEVELOPMENT tag is applied to logically related categories to allow tag-based filtering as a substitute for structural nesting.\n\n**Status**\nWorkaround in place. Not ideal — logical hierarchy exists only in documentation and tags, not in navigation structure.\n\n**LOGOS Requirement**\nSee: LOGOS → Requirements — Unlimited subcategory nesting\n```\n\n---\n\n**Topic 2**\n**Title:** `Limitation — Tags are a flat global list with no scoping`\n\n```markdown\n**What the limitation is**\nTags in Talkyard are a single flat list shared across the entire forum. Tags cannot be restricted to a category, inherited through a category hierarchy, or namespaced by context. Every tag is available everywhere.\n\n**How it was discovered**\nPlanning tag strategy across multiple top-level categories with different concerns. Tags relevant only to LOGOS development appeared as options in APPS, CORTEX, and everywhere else.\n\n**Impact**\nThe global tag list will grow cluttered over time with context-specific tags that are meaningless outside their domain. No structural enforcement of tag relevance — only naming conventions can reduce confusion, and they cannot prevent noise.\n\n**Workaround**\nTags used only for genuinely cross-cutting concerns. Context-specific organization handled through category structure rather than tags. Naming prefixes used where needed to reduce ambiguity.\n\n**Status**\nWorkaround in place. Accepted constraint for interim use.\n\n**LOGOS Requirement**\nSee: LOGOS → Requirements — Category-scoped tags\n```\n\n---\n\n**Topic 3**\n**Title:** `Limitation — Wiki edit history is not accessible`\n\n```markdown\n**What the limitation is**\nTalkyard tracks revision numbers internally — the revision counter increments on each save — but provides no user-facing interface to view previous versions, compare revisions, or revert to an earlier state. Once a wiki post is edited, the previous content is gone from the user's perspective.\n\n**How it was discovered**\nEditing a wiki post and attempting to view what had changed. No history UI exists.\n\n**Impact**\nThis is the most significant limitation for an event-sourced knowledge base. Editing a wiki post is effectively a destructive operation. The evolution of understanding cannot be traced. Mistakes cannot be recovered. Auditing is impossible. The current state appears to have always been the state.\n\n**Workaround**\nNone adequate. The workaround would be maintaining external version history, which defeats the purpose of integrated wiki functionality. Currently accepted as a known gap.\n\n**Status**\nNo workaround. Accepted gap for interim platform use.\n\n**LOGOS Requirement**\nSee: LOGOS → Requirements — Event-sourced wiki editing with full revision history\n```\n\n---\n\n**Topic 4**\n**Title:** `Limitation — Claude export does not include model version`\n\n```markdown\n**What the limitation is**\nThe Claude conversations.json export format does not include which AI model generated each response. The export contains full content, thinking blocks, tool use, and timestamps, but the specific model (e.g. claude-opus-4, claude-sonnet-3-5) is not recorded at the conversation or message level.\n\n**How it was discovered**\nAnalysis of the Claude export file (95 conversations, ~29MB) while designing the chat import pipeline. The model field is absent from the schema.\n\n**Impact**\nImported conversations cannot be automatically tagged or filtered by model. Cannot track how output quality has changed across model versions. The historical record of AI assistance is incomplete — the tool is captured but not which version of the tool.\n\n**Workaround**\nNone from the export itself. Feedback submitted to Anthropic requesting model version be included. Date-range inference against known model release windows is possible but imprecise.\n\n**Status**\nNo workaround. Feedback submitted to Anthropic.\n\n**LOGOS Requirement**\nSee: LOGOS → Requirements — Arbitrary post metadata (model version, import provenance)\n```\n\n---\n\n**Topic 5**\n**Title:** `Limitation — Claude export does not include project membership`\n\n```markdown\n**What the limitation is**\nClaude Projects organize conversations into named groups, but the conversations.json export flattens all conversations into a single list with no indication of which project a conversation belonged to.\n\n**How it was discovered**\nAnalysis of the Claude export file. All 95 conversations appear at the same level regardless of their project context within Claude.\n\n**Impact**\nThe organizational structure that existed in Claude cannot be reconstructed from the export. Conversations intended for specific LOGOS categories cannot be automatically routed during import. Manual review and categorization required for every imported conversation.\n\n**Workaround**\nManual categorization during import pipeline processing. Topic titles and content used as heuristics, but this is imprecise and time-consuming.\n\n**Status**\nWorkaround in place (manual). Feedback submitted to Anthropic.\n\n**LOGOS Requirement**\nSee: LOGOS → Requirements — Arbitrary post metadata (project membership, organizational context)\n```\n\n---\n\n**Topic 6**\n**Title:** `Limitation — Flat top-level navigation mixes categories of different scope`\n\n```markdown\n**What the limitation is**\nA consequence of the one-level subcategory cap: categories that are logically children of DEVELOPMENT (NEXUS, EVENT MODELING, LOGOS) must live at the top level, placing them alongside categories of entirely different scope and abstraction (APPS, CORTEX, NEIGHBORNET).\n\n**How it was discovered**\nDesigning the category structure and observing that the top-level navigation was becoming a mixed list of implementation details alongside major system concepts.\n\n**Impact**\nTop-level navigation does not reflect the logical architecture of the system. A new person reading the category list cannot infer the relationships between categories. Discoverability suffers. The structure exists in documentation but not in the navigation.\n\n**Workaround**\nDEVELOPMENT tag applied to logically grouped categories. The Start Here wikis and README posts explain the relationships that the navigation cannot express.\n\n**Status**\nWorkaround in place. Accepted constraint for interim platform use.\n\n**Note**\nThis is the navigation-level consequence of Limitation #1. They share the same root cause but document different impacts — #1 is structural, this is experiential.\n\n**LOGOS Requirement**\nSee: LOGOS → Requirements — Unlimited subcategory nesting\n```\n\n---\n\n## My evaluation notes\n\nA few things I changed from the original limitations wiki format:\n\n- **Removed \"Custom Forum Requirement\" as inline content** — requirements now just cross-reference the Requirements subcategory. The requirement detail lives there, not here.\n- **Added \"Status\" field** — the original had no way to indicate whether a workaround was in place, accepted, pending feedback, etc. Useful for quick scanning.\n- **Kept \"How it was discovered\"** — this is valuable context and honest to the event-sourced intent. The discovery moment is part of the record.\n- **Topic 6** is separated from Topic 1 even though they share a root cause, because they document different things — structural constraint vs. navigational impact. The note in Topic 6 makes the relationship explicit.\n- **Dropped the numbered \"Post X\" header structure** — each topic is now self-contained. Numbering was an artifact of them being sections within a single wiki post.\n\nReady for you to start creating these. Create the README first and pin it, then the 6 limitation topics in any order."

