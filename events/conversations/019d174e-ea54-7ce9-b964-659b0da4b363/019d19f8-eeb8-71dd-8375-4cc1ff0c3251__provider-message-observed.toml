[[body.segments]]
kind = "plain_text"
text = "This actually brings to light a thought. When reviewing topics of \"Claude export does not include project membership\" & \"Claude export does not include model version\" these are not really Talkyard limitations. These are limitations of Claude discovered while trying to integrate into our concept of LOGOS (talkyard version). My mental model is requirements are where we are cataloging our \"wish list\" for what LOGOS (software) should be and handle. These Claude issues would spark requirements. Somewhere in the texts, you have that limitations lead to requirements. That is true, but that is not the only way a requirement is generated. It can be a random idea, from a help request, etc."

