kind = "plain_text"
text = "Good catch — \"Requirements\" carries strong software connotations. It implies a specification for something to be built. NEXUS is a methodology, not a piece of software, so the word doesn't quite fit what would live there.\n\nWhat would actually go in that subcategory? Things like:\n\n- Gaps in the methodology discovered through use\n- Ambiguities that forced undocumented decisions\n- Extensions to the methodology — new patterns, new artifacts\n- Places where NEXUS didn't have an answer and one was improvised\n\nSome alternative terms to consider:\n\n**Refinements** — implies the methodology is being sharpened through use. Honest to the nature of the work — not building something new, improving something existing.\n\n**Gaps** — direct and honest. This is where methodology gaps get recorded. But it's purely deficit-framed — doesn't capture positive extensions or new patterns.\n\n**Evolution** — captures that the methodology grows and changes. But it's a bit abstract and could mean anything.\n\n**Decisions** — records the undocumented decisions made when the methodology didn't have an answer. Very honest to the event-sourced intent — each topic is a decision event.\n\n**Methodology Notes** — neutral, broad. Too vague.\n\n**Extensions** — captures additions and elaborations to the methodology. Misses the gap/correction aspect.\n\n**Findings** — things discovered through active use of NEXUS. Broader than gaps, includes positive discoveries.\n\nMy instinct is **Refinements** — it's active, it implies the methodology is living and improving, and it doesn't carry software baggage. But **Decisions** is compelling if the intent is specifically to capture the moments where the methodology was silent and a choice was made.\n\nWhat resonates with your mental model of what that subcategory is actually for?"

