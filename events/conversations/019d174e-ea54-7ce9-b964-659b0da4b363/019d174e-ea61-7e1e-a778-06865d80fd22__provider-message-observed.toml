text = " The time-travel aspect is distinct enough from simple \"view history\" that it deserves its own called-out requirement rather than being folded into the previous one. It's not just seeing the history — it's being able to reconstruct and navigate state at any point in time, which implies the underlying storage model, not just a UI feature.\n\nChecklist additions:\n\n- [ ] Update `Event-sourced editing with full revision history` — add a section explicitly calling out time-travel: navigating state at any point in time, not just viewing a list of diffs. The GIT commit analogy is good provenance to include.\n- [ ] New LOGOS Requirement: `Event-sourced storage as the foundation — current state is always a projection` — this is the architectural requirement that makes time-travel possible. It's not a UI feature, it's the storage model. Without this, history viewing is bolted on. With it, time-travel, audit, reconstruction, and revert are all natural consequences.\n\n---\n\nThat second one is important because it separates the *mechanism* (event sourced storage) from the *capability* (time travel, history, revert). The mechanism requirement belongs in LOGOS Requirements as an architectural decision. The capabilities are features that fall out of it.\n\nWant me to draft the update to the existing topic and the new architectural requirement topic now, or continue down the checklist and circle back?"

