text = " SAGE-adjacent but different angles:\n\n**Wisdom/knowledge accumulation:**\n- **ORACLE** — knows deeply, consulted for answers, speaks from accumulated knowledge\n- **LORE** — accumulated knowledge and wisdom specific to one domain or person\n- **SCRIBE** — records everything, knows the history, serves the keeper\n\n**Personal knowing:**\n- **SENSEI** — learns alongside you, knows your patterns, guides from accumulated experience\n- **MENTOR** — grows with you, increasingly capable, deeply personal\n- **ATHENAE** — from Athena, goddess of wisdom and craft combined\n\n**Mind/thinking:**\n- **ANIMUS** — the animating intelligence, the mind behind the system\n- **PSYCHE** — the inner knowing, deeply personal\n- **NOUS** — ancient Greek for mind or intellect, the thinking faculty\n\n**Between SAGE and CORTEX:**\n- **ACUMEN** — sharpness of mind that develops through experience\n- **GNOSIS** — deep personal knowledge, experiential rather than academic\n- **LUMIS** — light/illumination, that which makes things clear\n\nMy instinct is **NOUS** — ancient, precise in meaning, short, unique enough to search for, and it sits perfectly between SAGE's wisdom connotation and CORTEX's intelligence connotation. Or **LORE** if you want something more accessible and immediately understood.\n\nWhat pulls you?"

