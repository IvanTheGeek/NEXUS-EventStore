text = "**NEXUS category (top level)**\n**Title:** `AI-assisted implementation`\n**Type:** Wiki\n\n```markdown\nAI is the implementation layer in NEXUS. Not a \nhelper, not a code completion tool — the layer \nresponsible for rendering approved designs into \nworking code. The human designs. AI implements.\n\n## The Division of Responsibility\n\nNEXUS draws a clear line between design and \nimplementation:\n\n**Human responsibility — design**\n- Event Modeling — the behavioral specification \n  of the system\n- Paths — the named journeys through the model \n  with concrete example data\n- Specs — the detailed slice-level descriptions \n  that make implementation unambiguous\n- Review and approval — the judgment that a spec \n  is correct and ready\n\n**AI responsibility — implementation**\n- Rendering approved specs into code\n- Generating tests from path example data\n- Producing implementations that satisfy the \n  acceptance criteria in the spec\n- Maintaining consistency across slices\n\nThe line is the approved spec. Before approval — \nhuman territory. After approval — AI territory.\n\n## Why This Division Works\n\nAI code generation fails when design and \nimplementation are entangled. When an AI is asked \nto implement something underspecified, it fills \ngaps with assumptions. Those assumptions may be \nreasonable. They may also be wrong in ways that \nare subtle and hard to detect. The resulting code \nworks but does not do what was intended — and \nthere is no spec to check it against.\n\nAn approved NEXUS spec eliminates the gap-filling \nproblem. The spec provides:\n\n- **Unambiguous inputs and outputs** — the AI \n  knows exactly what goes in and what must come \n  out\n- **Explicit rules and constraints** — the logic \n  is specified, not inferred\n- **Concrete example data** — the AI can verify \n  its output against the example cases\n- **Acceptance criteria** — the AI knows what \n  correct looks like\n\nGiven this, AI implementation is not a creative \nact — it is a rendering act. The design has done \nthe creative work. The AI renders it faithfully \ninto the target language.\n\n## Language as a Parameter\n\nBecause specs describe what a slice does rather \nthan how any particular language does it, the \ntarget language is a parameter passed to the AI \nimplementation layer — not a constraint baked \ninto the design.\n\nThe same approved spec can be rendered into:\n- F# — the current primary target in NEXUS\n- JavaScript or TypeScript\n- Haskell\n- Kotlin\n- Any language with sufficient AI training data\n\nNEXUS currently targets F# exclusively. But the \nmethodology does not require it. The spec is \nlanguage-agnostic. The AI and the target language \ndetermine the rendering.\n\nThis also means the same design can produce \nmultiple implementations simultaneously. One \nspec, two languages, two correct implementations \nfrom the same source of truth.\n\n*See: NEXUS → Language-agnostic design — one \nmodel, many implementations.*\n\n## F# and Type-Driven Design\n\nWithin NEXUS, F# is the chosen implementation \nlanguage for specific reasons that align with \nthe methodology:\n\n**Invalid states are unrepresentable** — F#'s \ntype system, used correctly, makes it impossible \nto construct values that violate business rules. \nThe constraints specified in a spec map directly \nto F# types and smart constructors that enforce \nthem at compile time.\n\n**Event sourcing is natural** — discriminated \nunions model event types cleanly. Pattern \nmatching over events is exhaustive and \ncompiler-checked. Projections as pure functions \nfrom events to state are idiomatic F#.\n\n**Functions are first class** — commands and \nprojections are functions. F# treats functions \nas first-class values. The alignment between \nthe Event Modeling concept of functions and \nF# implementation of functions is direct.\n\nThe AI implementation layer, working from an \napproved spec, produces F# that reflects \nthese properties — not just code that passes \ntests but code that uses the type system to \nmake correct states natural and incorrect \nstates impossible.\n\n## AI as a New Team Member\n\nA useful mental model for AI implementation \nwithin NEXUS: the AI is a new team member who \nhas been given a spec and asked to implement it. \nThe AI has no context beyond what the spec \nprovides — no tribal knowledge, no assumptions \nabout how things were done before, no memory of \nprevious decisions.\n\nThis is not a limitation. It is a quality check.\n\nIf the spec is sufficient for the AI to implement \ncorrectly, it is sufficient for any implementer. \nIf the AI needs additional context not in the \nspec to implement correctly, the spec is \nincomplete — and that incompleteness would have \ncaused problems for a human implementer too, \njust silently.\n\nThe AI's lack of assumed context forces specs to \nbe genuinely complete. This is one of the \nunexpected benefits of AI-assisted implementation \n— it makes specification discipline self-enforcing.\n\n## AI and the Knowledge Base\n\nAI implementation within NEXUS does not happen \nin isolation. CORTEX — the personal AI system — \nis fed from LOGOS. The conversations that shaped \na design, the limitations that drove requirements, \nthe decisions made during spec review — all of \nthis context is available to the AI when \nimplementing.\n\nThis means the AI implementation layer improves \nas the knowledge base grows. Early implementations \nare informed by the spec alone. Later \nimplementations are informed by the spec plus \naccumulated design history, past decisions, \nknown patterns, and lessons learned from previous \nimplementations.\n\n*See: CORTEX — Start Here.*\n\n## Acceptance\n\nAn AI given only an approved spec — with no other \ncontext — produces an implementation that passes \nall acceptance criteria and satisfies all example \ndata cases. The implementation uses F# types to \nmake invalid states unrepresentable where the \nspec prescribes constraints. The AI does not make \ndesign decisions — all design decisions are \nresolved in the spec before implementation begins.\n\n## See Also\n\n- [Event Modeling as the design foundation](https://talkyard.ivanthegeek.com/-85/event-modeling-as-the-design-foundation)\n- [Specs and the design-before-implementation discipline](https://talkyard.ivanthegeek.com/-91/specs-and-the-design-before-implementation-discipline)\n- [Paths as first-class artifacts](https://talkyard.ivanthegeek.com/-90/paths-as-first-class-artifacts)\n- [The problem NEXUS solves](https://talkyard.ivanthegeek.com/-84/the-problem-nexus-solves)\n- NEXUS → Language-agnostic design — one model, \n  many implementations\n- NEXUS → The knowledge accumulation principle\n```\n\n---\n\nNote: I used -84 for The problem NEXUS solves, -85 for Event Modeling, -90 for Paths, -91 for Specs — verify all before posting. Create and let me know when done."

