text = "Placement guide:\n\n**Post 6 — Talkyard Limitations**\n- Location: `THE FABRIC → Structure & Organization → Talkyard Limitations — Observed Facts` topic\n- Add as the next reply in that topic following Posts 1-5\n- Do not convert to wiki — immutable fact record\n\n**LOOM Start Here**\n- Location: `LOOM` top level category\n- Title: `LOOM — Start Here: The Machine That Weaves THE FABRIC`\n- Type: Wiki\n- Pin to top of LOOM category\n\nAlso remember to update the LOOM Requirements wiki with the Post 6 finding — add a note under the Category & Organization section that the subcategory depth limit compounds at scale, forcing top level promotion and tag workarounds, referencing Post 6.\n\nAlso worth adding a short category description for LOOM. Want me to draft that too?"

