kind = "plain_text"
text = "* UI/UX slices — the interface elements that issue commands and display read models, showing the human experience of the system > this has several issues. generically and colloquially the term UI is used to refer to this section of the event model. terms include screen also. slices is not accurate here at all. This section, which is like the top section of the event model is where decisions or variable choices are made. a command is truly a function. The projection is a function. The event is a fact. for commands or projections, that function, based on input, might have many outputs with logic built in, but it is repeatable when done correctly. The top level, UI for lack of a more accurate term can be a human deciding to click a particular button or option, could be an entry on a command line, could be a post to an API, could be an external process or processor, could be an AI even, and it also is where I see the IO happens when related to the Event Model if that makes sense. I deviate from Adam a bit on this IO perspective. I guess it means maybe more of an external comms kind of thing. > now for slices. at the core, there are really 2 types of slices. The UI level initiating a command resulting in an event (possibly multiple but that tends to be an anti-pattern). That is one type of slice. The other slice is a Projection taking event/s (does not have to be the most recent event either) which then the projection informs the UI or that level (like an external processor). Many try to have expanded slice types, but when I really study them, they can really break down to these two, but have a multi-slice pattern. This is also where the external events debate comes in and I would say that rather than having internal and external events from the bottom level (events), we have external IO that commands to the only events we use, the internal events.  there is also the concept of swim lanes. These can apply to the UI and/or the events sections. A swim lane for the UI might be one horizontal lane for generic user as the persona. another lane for an admin. another lane might be a rest API or an external processor."

