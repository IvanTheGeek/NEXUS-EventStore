[[body.segments]]
kind = "plain_text"
text = " You're right — per-post tagging IS supported in Talkyard, confirmed earlier when you found it at `https://talkyard.ivanthegeek.com/-9/sample-question`. I should not have included that as a limitation. Apologies for the error.\n\nThe actual limitation is what you just described — **tag scoping**. Tags are a flat global list with no way to:\n\n- Restrict a tag to a specific category or subcategory tree\n- Define tags that only appear as options within certain areas\n- Create tag namespaces or groups that map to the category hierarchy\n\nLet me correct the limitations document:"

[[body.segments]]
kind = "tool_use"
text = "{\"start_timestamp\":\"2026-02-28T20:16:58.603309Z\",\"stop_timestamp\":\"2026-02-28T20:17:11.662348Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":\"toolu_017JQboWvCCiV6owt2zRHogA\",\"name\":\"str_replace\",\"input\":{\"path\":\"/mnt/user-data/outputs/talkyard-limitations.md\",\"new_str\":\"## Tag Scoping \\u2014 Flat Global List\\n\\n**The Limitation**\\nTags in Talkyard are a flat global list across the entire forum. While per-post tagging IS supported (tags can be applied to individual posts within a topic), there is no way to:\\n\\n- Restrict a tag to a specific category or subcategory tree\\n- Define tags that only appear as options within certain areas\\n- Create tag namespaces or groups that map to category hierarchy\\n- Prevent a tag relevant only to one domain from appearing as an option everywhere\\n\\n**Discovered**\\nWhile planning tag strategy across multiple top level categories with very different concerns \\u2014 tags relevant to THE FABRIC appear as options in APPS and NEIGHBORNET and everywhere else.\\n\\n**Workaround Applied**\\nUse tags only for genuine cross-cutting concerns. Accept that the global tag list will grow and become noisy over time. Naming conventions (e.g. prefixing tags) can reduce confusion but do not enforce scoping.\\n\\n**Custom Forum Requirement**\\nTag scoping as a first class feature. Tags should be definable at any level of the category hierarchy and optionally inherited downward through subcategories. A tag defined at THE FABRIC level appears only within THE FABRIC and its subcategories. A truly global tag is an explicit choice, not the default. This allows different domains to maintain clean, relevant tag vocabularies without polluting a shared global namespace.\\n\\n---\\n\\n## Model/Version Metadata Missing from API\",\"old_str\":\"## Per-Post Tagging\\n\\n**The Limitation**\\nTags in Talkyard operate at the topic level only. Individual posts within a topic cannot be tagged independently.\\n\\n**Discovered**\\nWhile designing the AI chat import structure, where tagging specific exchanges within a conversation for traceability was desired.\\n\\n**Workaround Applied**\\nDirect links to specific posts using Talkyard\\u0027s post anchors (e.g. \\u0060/-43/#post-6\\u0060). Spec wikis link to exact posts where decisions originated rather than relying on tags.\\n\\n**Custom Forum Requirement**\\nPer-post tagging as a first class feature. Any individual post within a topic should be taggable independently of the topic itself, enabling fine-grained traceability to specific exchanges and decisions.\\n\\n---\\n\\n## Model/Version Metadata Missing from API\",\"description\":\"Remove incorrect per-post tagging limitation and expand tag scoping limitation\"},\"message\":\"Remove incorrect per-post tagging limitation and expand tag scoping limitation\",\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":\"edit\",\"context\":null,\"display_content\":{\"type\":\"text\",\"text\":\"Remove incorrect per-post tagging limitation and expand tag scoping limitation\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

