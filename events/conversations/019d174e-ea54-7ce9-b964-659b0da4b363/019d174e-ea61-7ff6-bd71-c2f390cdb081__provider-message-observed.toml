text = "---\n\n## Category Short Description\n\n> Where the LOGOS software gets defined — one requirement per topic, each sourced from a discovered need, limitation, or design decision.\n\n---\n\n## README\n\n**Title:** `README`\n\n```markdown\nThis category is where the LOGOS software gets defined.\n\nEach topic here is a single requirement — a concrete, nameable thing that LOGOS must do or be. Requirements come from anywhere: a Talkyard limitation that LOGOS won't have, an integration constraint discovered in practice, a design decision made during planning, an idea that surfaced mid-conversation, or a user need that no existing tool handles well.\n\n## What a Requirement Topic Contains\n\n- **What it is** — a clear statement of the capability or behavior required\n- **Why it's needed** — the source: what situation, limitation, or insight generated it\n- **Acceptance** — how you'd know it's satisfied\n- **Cross-references** — links to related limitations, other requirements, or design discussions\n\n## What This Is Not\n\nThis is not a backlog or a task list. Requirements are not assigned to sprints or estimated. They are a definition of what LOGOS is — the accumulated understanding of what the software must be. Implementation planning happens elsewhere.\n\n## Topic Type\n\nRequirements topics use the Problem type. The status model maps as follows:\n\n- **New** — captured but not yet fully understood\n- **Planned** — understood, design thinking has started\n- **Started** — actively being designed or implemented\n- **Done** — satisfied in the LOGOS software\n\nA requirement marked Done is one LOGOS has built. A requirement still New is part of what remains to be built.\n```\n\n---\n\n## First Requirement Topic\n\n**Title:** `Custom topic types with definable status workflows`\n\n**Type:** Problem\n**Status:** New\n\n```markdown\nLOGOS needs the ability to define custom topic types beyond a fixed platform set, each with its own status model, visual identity, and behavior.\n\n## Why It's Needed\n\nTalkyard offers a fixed set of topic types: Discussion, Wiki, Q&A, Problem. These cover common forum patterns but don't map cleanly onto the specific kinds of things LOGOS needs to express. Working through how to categorize Talkyard limitation records and Chat Import Pipeline issues made this concrete — what was needed was something between Discussion and Problem: an immutable observed fact with no resolution workflow. That type doesn't exist. The workaround is using Problem and accepting that the status model doesn't quite fit.\n\nThe broader pattern: every domain has its own kinds of things with their own lifecycles. A general-purpose knowledge system shouldn't force those into a fixed type set.\n\n## The Requirement\n\nTopic types in LOGOS are definable, not fixed. Each type specifies:\n\n- **Name and icon** — visual identity in topic lists\n- **Status model** — the set of valid statuses and their terminal/non-terminal nature\n- **Status labels** — named to fit the domain, not generic (e.g. `Accepted` as a terminal state distinct from `Done`)\n- **Fields** — optional additional structured fields relevant to the type\n- **Behavior** — whether the type is editable after posting, whether replies change its state, etc.\n\nThe platform ships with sensible defaults (the types Talkyard already offers, roughly) but none are hardcoded.\n\n## Acceptance\n\nA forum administrator can define a new topic type with a custom name, icon, and status workflow without code changes. Existing topics can be reclassified to the new type. Topics display their type visually in category listings.\n\n## Source\n\nDiscovered while structuring the Talkyard Limitations and Chat Import Pipeline categories — needed a topic type that conveyed \"immutable observed fact\" without implying an open/closed resolution model.\n\n## Cross-references\n\n- Related: LOGOS → Talkyard Limitations → README (explains why limitations are not Problem type)\n- Related: Chat Import Pipeline (where Problem type is used as the closest available fit)\n```"

