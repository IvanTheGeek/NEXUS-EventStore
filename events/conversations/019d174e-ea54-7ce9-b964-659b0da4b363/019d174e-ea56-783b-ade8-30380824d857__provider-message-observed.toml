text = "Updated limitations document with the wiki edit history gap added. Replace the version in Talkyard with this one.\n\nWorth noting — this limitation is significant for your use case specifically, since wiki posts are your source of truth for specs and decisions. Not being able to see what changed and when undermines the event sourcing philosophy somewhat. Definitely a first class requirement for your custom forum."

