text = "{\"start_timestamp\":\"2026-02-28T20:20:27.616366Z\",\"stop_timestamp\":\"2026-02-28T20:20:28.011554Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":\"toolu_018hBbTTBEmj5uwRUQ61gAe7\",\"name\":\"web_search\",\"input\":{\"query\":\"Talkyard \\u0022edit history\\u0022 OR \\u0022revision history\\u0022 wiki post view previous versions\"},\"message\":\"Searching the web\",\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":\"globe\",\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

