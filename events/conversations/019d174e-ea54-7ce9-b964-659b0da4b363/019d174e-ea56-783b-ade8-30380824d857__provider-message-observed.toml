text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":\"toolu_0145NJF2tfL4mUf7ztJt8LUv\",\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Talkyard JSON dumps: Posts and post numbers\",\"url\":\"https://forum.talkyard.io/-234/talkyard-json-dumps-posts-and-post-numbers\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"This approach, to let thet title, orig post, replies (and also custom CSS and Javascript in the admin area actually) all be \\u0026quot;posts\\u0026quot;, makes edit history work for all those things, I mean, old revisions are remembered and one can run diffs and see what changes were made. There\\u0026#x27;s a currRevNr field and an approvedRevNr field, and the latter tells which revision of the post that has been approved by someone \\u2014 and only the approved version of a post, should be shown to others than staff. (Usually posts are auto approved by the System user, unless the post author is new or has said too weird things in the past.) @chrscheuer The text to index, when inserting Talkyard contents into an external search engine, is in the field approvedHtmlSanitized, or approvedSource if you want the Commonmark source. \\u2014 Maybe instead of indexing the exported JSON, you could send a search query to Talkyard?\\n\\nFWIW, we\\u0027re ok with the json export format changing slightly if you need to do that for it to make sense. It\\u0027d be super if you can give a heads up if the format changes of course, but since our solution would still work, just not do updates, it\\u0027s not a big deal if we got a little downtime here and there while the format settles. To combat the issue of immediacy we might later end up either doing a webhook based approach to get immediate updating of our index (if TY supports that at the time) or cross-posting a TY search api to \\u0022fill up\\u0022 our existing results with newer posts from the current day, if we deem it necessary. But for now, it\\u0027s acceptable for us that our search results\\u0027 completeness will be delayed with up to a day. ... Thanks for the info on why you\\u0027re using the json export, interesting to read. I think this\\u0027ll work fine. The minor things that came to my mind was: 1) Non-stable JSON format, yes, however the fields you\\u0027re using are unlikely to change.\\n\\n(The only thing I can think of, would be renaming nr to postNr and id to postId.) 2) That your search database lags a bit after Talkyard, however now when I read about how you\\u0027re using the search results, seems to me this won\\u0027t matter. 3) If the site in the future grows and becomes \\u0022really large\\u0022, maybe doing daily full JSON exports could be a little bit much bandwidth. However \\u0022long before that\\u0022 I hope there\\u0027ll be ways to do incremental syncs, or webhooks like you mentioned. ... Thanks! This all sounds great. Yea I\\u0027m definitely going after something that\\u0027s quick to set up now but that won\\u0027t cause too much trouble in the long run. We\\u0027re preparing everything in containers so the components can be switched out later, so for example we\\u0027ll likely end up with Elasticsearch driving some of it eventually (like Talkyard does), but for now our internal C# full text algorithms are good enough for a quick first iteration.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-234/talkyard-json-dumps-posts-and-post-numbers\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Showing and changing blog comments discussionId and URL\",\"url\":\"https://forum.talkyard.io/-260/showing-and-changing-blog-comments-discussionid-and-url\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"@KajMagnus for those posts prior to my setting up a discussionId parameter to make their comments portable, is there a way in the Admin view I can see an ID and then retroactively apply it to those older posts? Am doing some transitioning and hate to lose those comments. I can see them in Admin but don\\u0026#x27;t see their parameters. Hope all that makes sense. Thanks as always, sir. [Edit] I changed the title from \\u0026quot;Any way to identify old discussionId ?\\u0026quot; to the current title. /KajMagnus [/Edit] ... There is not, and to me that seems like a good thing to have. I\\u0026#x27;ve previously a bit been wondering how to deal with situations like yours. There could 1) be a page that lists all embedded comments pages, where you\\u0026#x27;ll see blog post URLs and any already existing discussionIds, and where you can add and remove new ids. Or 2) I can add a view-\\u0026amp;-change discussionId setting, on each page.\\n\\nTalkyard \\u00B7 Topics \\u00B7 No internet connection \\u00B7 JoinLog In \\u00B7 Home \\u00B7 Ideas \\u00B7 By Bryce Wray @BryceWray \\u00B7 2019-09-01 17:52:22.040Z2019-09-06 06:37:45.534Z \\u00B7 @KajMagnus for those posts prior to my setting up a discussionId parameter to make their comments portable, is there a way in the Admin view I can see an ID and then retroactively apply it to those older posts? Am doing some transitioning and hate to lose those comments. I can see them in Admin but don\\u0027t see their parameters. Hope all that makes sense. Thanks as always, sir. [Edit] I changed the title from \\u0022Any way to identify old discussionId ?\\u0022 to the current title. /KajMagnus [/Edit] Reply1 Like \\u00B7 12 replies \\u00B7 Oldest first \\u00B7 KajMagnus @KajMagnus \\u00B7 core-dev \\u00B7 support-team2019-09-02 18:33:35.643Z \\u00B7 There is not, and to me that seems like a good thing to have. I\\u0027ve previously a bit been wondering how to deal with situations like yours.\\n\\n(One goes to the Admin Area | Settings | Features and enables Experimental, then clicks the Content tab that appear, and then one can edit discussion IDs and URLs. However don\\u0027t try to edit the other fields right now. \\u2014 I suggest you wait until I message you again tomorrow :- )) ... That\\u2019s fine; I\\u2019ll wait until you give the \\u201Call-clear,\\u201D so to speak. Thanks for continuing to work on this! I feared you\\u2019d had to abandon it for some reason. Since I\\u2019m not only still migrating back and forth among SSGs but also resurrecting formerly deleted posts (see https://brycewray.com/posts/2019/10/otoh), I need this more now than I did when I first asked for it. :-) ... Hi Bryce @BryceWray I noticed in the server logs that there was an error when you tried to change the \\u0022external IDs\\u0022 of some pages \\u2014 if you have time, what was the reason you tried to do this change?\\n\\n@KajMagnus for those posts prior to my setting up a discussionId parameter to make their comments portable, is there a way in the Admin view I can see an ID and then retroactively apply it to those older posts? Am doing some transitioning and hate to lose those comments. I can see them in Admin but don\\u0027t see their parameters. Hope all that makes sense. Thanks as always, sir. [Edit] I changed the title from \\u0022Any way to identify old discussionId ?\\u0022 to the current title. /KajMagnus [/Edit] ... There is not, and to me that seems like a good thing to have. I\\u0027ve previously a bit been wondering how to deal with situations like yours. There could 1) be a page that lists all embedded comments pages, where you\\u0027ll see blog post URLs and any already existing discussionIds, and where you can add and remove new ids. Or 2) I can add a view-\\u0026-change discussionId setting, on each page.\\n\\n@BryceWray Now I\\u0027ve fixed that page, i.e. https://brycewray.com/posts/2019/04/why-left-ulysses/. I added a discussion id to the Talkyard page to match the discussion id in the blog post HTML: \\u003Cdiv class=\\u0022talkyard-comments\\u0022 data-discussion-id=\\u00222019-04-why-left-ulysses\\u0022 ... And I added discussion id 2019-05-boxed-in for the Talkyard page for this blog post too: https://brycewray.com/posts/2019/05/boxed-in/ \\u2014 it has one Like, which didn\\u0027t appear until now. ... It wasn\\u0027t the External ID field that was to be updated, but instead, the Discussion ID. (Maybe I can hide the External ID field for now, hmm, or move it to the bottom of the form.) ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-260/showing-and-changing-blog-comments-discussionid-and-url\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"How to Import Discussions to Talkyard\",\"url\":\"https://forum.talkyard.io/-620/how-to-import-discussions-to-talkyard\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"posts: [{ // Another ID sequence, for posts. For example, Like votes need a post ID to refer to. id: 2000000001, // Post nr 0 is the page title. (The \\u0026quot;title post\\u0026quot;.) nr: 0, // So won\\u0026#x27;t get duplicated, if re-imported. extId: \\u0026quot;/page/peramlink:title-post\\u0026quot;, // Refers to the first pages above. pageId: \\u0026quot;2000000001\\u0026quot;, // The post type. Always 1 works fine. // (There other types too, e.g. for \\u0026quot;Meta Posts\\u0026quot; e.g. page status changes.) postType: 1, createdAt: 1549882800000, // The post author. Should be the same as the Original Post author (since this is the page title). createdById: 1, // Who composed the latest version of the post (latests edit). currRevById: 1, // You can set this to the same as createdAt. currRevStartedAt: 1549882800000, // Leave at 1. It\\u0026#x27;s a revision number, in case the post has gotten edited. // (Post edit revisions aren\\u0026#x27;t yet documented.) currRevNr: 1, // The actual text.\\n\\nposts: [{ // Another ID sequence, for posts. For example, Like votes need a post ID to refer to. id: 2000000001, // Post nr 0 is the page title. (The \\u0022title post\\u0022.) nr: 0, // So won\\u0027t get duplicated, if re-imported. extId: \\u0022/page/peramlink:title-post\\u0022, // Refers to the first pages above. pageId: \\u00222000000001\\u0022, // The post type. Always 1 works fine. // (There other types too, e.g. for \\u0022Meta Posts\\u0022 e.g. page status changes.) postType: 1, createdAt: 1549882800000, // The post author. Should be the same as the Original Post author (since this is the page title). createdById: 1, // Who composed the latest version of the post (latests edit). currRevById: 1, // You can set this to the same as createdAt. currRevStartedAt: 1549882800000, // Leave at 1. It\\u0027s a revision number, in case the post has gotten edited. // (Post edit revisions aren\\u0027t yet documented.) currRevNr: 1, // The actual text.\\n\\nReplies also need a \\u0022post number\\u0022, which is a per discussion page unique number. It\\u0027s good if you sort these by time, so older posts, get lower numbers. These numbers should start at 2 000 000 001. (Post numbers need to be unique per page only.) The Original Post, which is also a \\u0022post\\u0022, shall have post number 1. And the title shall have post number 0. These are special post numbers, so Talkyard knows where the discussion starts. Guests IDs (one-time light weight blog commenting accounts), should start at at -2 000 000 001. That is, guest accounts have negative id numbers; they aren\\u0027t \\u0022real\\u0022 accounts. For simplicity, you could probably reuse the same ID sequence for everything. Talkyard doesn\\u0027t care what the numbers are, as long as they are \\u003E= 2 000 000 001 (or \\u003C= - 2 000 000 001). If you re-generate your JSON import file some time later, maybe now it\\u0027ll include more things \\u2014 maybe your previous forum was still active and people posted new things.\\n\\nYou can set to 1. Talkyard uses this field to // know if a page should get re-rendered, and bumps it itself e.g. if a // new reply gets posted, or something gets edited. version: 1, // Unix time, milliseconds. You can set all these to the same value. createdAt: 1549882800000, updatedAt: 1549882800000, publishedAt: 1549882800000, // Refers to a category id in the \\u0060categories: [...]\\u0060 list, see below. categoryId: 2000000001, // If you\\u0027re importing embedded blog comments, Talkyard needs to know what // URL this discussion page is for. // embeddingPageUrl: \\u0022https://blog.example.com/2019/a-blog-post.html\\u0022, // (then also use: pageType: 5 \\u2014 that\\u0027s the Embedded Comments page type). // Hmm shouldn\\u0027t be needed, when importing. Talkyard could figure this out, // by looking at the Original Post. authorId: 1 }, { // Another page: id: \\u00222000000002\\u0022, // 2000000002 comes after 2000000001.\\n\\n(Which in turn replies to the Original Post, nr 1.) parentNr: 2000000001, postType: 1, createdAt: 1559880306000, createdById: -2000000003, currRevById: -2000000003, currRevStartedAt: 1559880306000, currRevNr: 1, approvedSource: \\u0022\\u003Cp\\u003EA reply to a reply.\\u003C/p\\u003E\\u0022, approvedAt: 1559880306000, approvedById: 1, approvedRevNr: 1 }, // ... more posts, for the other page, and they\\u0027d have: // pageId: \\u00222000000002\\u0022, // page two ] Lastly, Talkyard wants to know in which category to place the imported pages. Let\\u0027s say we\\u0027d like to place the imported pages in a category that already exists. Then, first you\\u0027d need to give that category an \\u0022external ID\\u0022 that we can refer to, from the JSON import file. Do that by going to the category (in your browser), click Edit Category, then, scroll down to the bottom of the dialog, and click the \\u0022External ID\\u0022 field and type, say, \\u0022imported_from_reddit\\u0022.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-620/how-to-import-discussions-to-talkyard\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Bug in Permissions?\",\"url\":\"https://forum.talkyard.io/-407/bug-in-permissions\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"There\\u0026#x27;s a permission for \\u0026quot;Edit other people\\u0026#x27;s topics\\u0026quot; and one for \\u0026quot;Edit wiki posts\\u0026quot;. In my opinion it makes sense that if someone has the \\u0026quot;Edit wiki posts\\u0026quot; he can edit ALL wikified topics, and with the \\u0026quot;Edit other people\\u0026#x27;s topics\\u0026quot; he can edit ALL topics - independently if wikified or not. This would make great sense since this would allow the author of a post to decide if he want\\u0026#x27;s others to edit his topic or not. So IMHO it SHOULD work this way - it just does not. Am I misunderstanding something? ... if someone has the \\u0026quot;Edit wiki posts\\u0026quot; he can edit ALL wikified topics [in the relevant category /Magnus] Yes that\\u0026#x27;s how it should work I think too. Sounds as if there is a bug related to this, then. I can add some end-to-end tests, to reproduce. (Probably won\\u0026#x27;t take long to fix once the tests are in place.) The problem is that Edit-wiki-posts won\\u0026#x27;t let one edit all wiki posts in that ...\\n\\nThere\\u0027s a permission for \\u0022Edit other people\\u0027s topics\\u0022 and one for \\u0022Edit wiki posts\\u0022. In my opinion it makes sense that if someone has the \\u0022Edit wiki posts\\u0022 he can edit ALL wikified topics, and with the \\u0022Edit other people\\u0027s topics\\u0022 he can edit ALL topics - independently if wikified or not. This would make great sense since this would allow the author of a post to decide if he want\\u0027s others to edit his topic or not. So IMHO it SHOULD work this way - it just does not. Am I misunderstanding something? ... if someone has the \\u0022Edit wiki posts\\u0022 he can edit ALL wikified topics [in the relevant category /Magnus] Yes that\\u0027s how it should work I think too. Sounds as if there is a bug related to this, then. I can add some end-to-end tests, to reproduce. (Probably won\\u0027t take long to fix once the tests are in place.) The problem is that Edit-wiki-posts won\\u0027t let one edit all wiki posts in that category?\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-407/bug-in-permissions\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Talkyard v0.2021.23\",\"url\":\"https://forum.talkyard.io/-596/talkyard-v0202123\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"curl https://www.talkyard.io/-/v0/search -X POST -H \\u0026#x27;Content-Type: application/json\\u0026#x27; -d \\u0026#x27;{ \\u0026quot;searchQuery\\u0026quot;: { \\u0026quot;freetext\\u0026quot;: \\u0026quot;how climb trees\\u0026quot; }, \\u0026quot;pretty\\u0026quot;: true }\\u0026#x27; But if you include any credentials (cookies, -b \\u0026#x27;aCookie=aValue\\u0026#x27; in cURL), the request will get denied (to stop XSRF). Emails translated to German (thanks Sascha Z!). (But no the email subject lines, only the text inside, sorry) Minor UX improvement: The editor \\u0026lt;/\\u0026gt; button now inserts a code block (triple backticks, \\u0060\\u0060\\u0060), because many people otherwise don\\u0026#x27;t know how that works, and if a code block doesn\\u0026#x27;t get formatted properly, it can be hard to read. And, \\u0060\\u0060\\u0060 happens works for formatting inline code too. So, just a single backtick, \\u0060, instead of \\u0060\\u0060\\u0060 for inline code, now in a way is a \\u0026quot;power user feature\\u0026quot;. Minor UX change: Category name and description now placed above topic list filter buttons.\\n\\nIdea tracking / Feature upvoting categories, check out: the Ideas category here in the forum \\u2014 when you switch to that category, the topics get sorted by popular-first, and you see how many Likes the Original Post (the actual idea) has gotten. (You\\u0027ll notice that the ideas are not strictly sorted by most-likes only, instead, it\\u0027s which ideas got the most Likes during the last month or quarter or year (there\\u0027s a dropdown so you can choose).) Other categories remain sorted by new \\u0026 recently-active pages first \\u2014 so, in the Announcements category, you\\u0027ll still find the most recent release notes first (rather than the most popular release notes). To change a category to an Upvotes category (or actually \\u0022Do-it\\u0022 votes, as these votes are called in Talkyard), go to the category, click Edit Category and tick the \\u0022Upvote ideas\\u0022 checkbox a bit down. Now the API endpoints does not require any XSRF token, if the requester is not logged in.\\n\\nThe Do API: post a bunch of actions, and an API secret, to /-/v0/do, and Talkyard will do it. Initially only for Like voting pages, and subscribing to notifications.\\n\\ncurl https://www.talkyard.io/-/v0/search -X POST -H \\u0027Content-Type: application/json\\u0027 -d \\u0027{ \\u0022searchQuery\\u0022: { \\u0022freetext\\u0022: \\u0022how climb trees\\u0022 }, \\u0022pretty\\u0022: true }\\u0027 But if you include any credentials (cookies, -b \\u0027aCookie=aValue\\u0027 in cURL), the request will get denied (to stop XSRF). Emails translated to German (thanks Sascha Z!). (But no the email subject lines, only the text inside, sorry) Minor UX improvement: The editor \\u003C/\\u003E button now inserts a code block (triple backticks, \\u0060\\u0060\\u0060), because many people otherwise don\\u0027t know how that works, and if a code block doesn\\u0027t get formatted properly, it can be hard to read. And, \\u0060\\u0060\\u0060 happens works for formatting inline code too. So, just a single backtick, \\u0060, instead of \\u0060\\u0060\\u0060 for inline code, now in a way is a \\u0022power user feature\\u0022. Minor UX change: Category name and description now placed above topic list filter buttons.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-596/talkyard-v0202123\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Improving the docs\",\"url\":\"https://forum.talkyard.io/-743/improving-the-docs\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"Hi Dashamir, Good idea (to improve the docs), this is needed I think. (There\\u0026#x27;s some installation \\u0026amp; maintenance docs as well at: https://github.com/debiki/talkyard-prod-one/tree/main/docs; I edited the orig post and inserted a link.) at least three categories are needed [...] sysadmins [...] user docs [...] developer docs ... Where\\u0026#x27;s the best place to show end user docs? I think it\\u0026#x27;s in Talkyard itself: Whenever someone looks at a dialog or UI wiget wonders \\u0026quot;what\\u0026#x27;s that?\\u0026quot; or \\u0026quot;how does this work?\\u0026quot;, then s/he can from inside Talkyard, click a [?] button to open a help dialog describing that part of Talkyard. But it\\u0026#x27;s also nice with a static website with end user docs, so one can browse and explore everything, outside of Talkyard. The above leads us to using MDX for end-user docs. (MDX = Markdown with React.js support, https://mdxjs.com). MDX help pages can be loaded by Talkyard\\u0026#x27;s web app (it uses React.js), and shown in help boxes.\\n\\nDeveloper docs. We meant different things. With dev docs, I had in mind docs for developers who want to edit Ty\\u0027s source code and develop Talkyard itself. (Which is off-topic to almost everyone.) We didn\\u0027t mean entirely different things, because I also had in mind docs for developers who want to improve Talkyard itself (or fix any bugs, maintain it, etc.) I\\u0027d place these docs in a technical section of the end user docs, maybe with a title like \\u0022API Documentation\\u0022. And yes definitely API endpoints should be documented. Probably you are right, but I would also get some opinion from any professional technical writer (I am not professional), or look at other projects, how they do it. You may be completely right about something, but it also matters what people expect, what they are used to. Hmm what do you mean with \\u0022structured\\u0022 here? There are categories and tags in Ty (not too different from most static site generators?).\\n\\nHi Dashamir, Good idea (to improve the docs), this is needed I think. (There\\u0027s some installation \\u0026 maintenance docs as well at: https://github.com/debiki/talkyard-prod-one/tree/main/docs; I edited the orig post and inserted a link.) at least three categories are needed [...] sysadmins [...] user docs [...] developer docs ... Where\\u0027s the best place to show end user docs? I think it\\u0027s in Talkyard itself: Whenever someone looks at a dialog or UI wiget wonders \\u0022what\\u0027s that?\\u0022 or \\u0022how does this work?\\u0022, then s/he can from inside Talkyard, click a [?] button to open a help dialog describing that part of Talkyard. But it\\u0027s also nice with a static website with end user docs, so one can browse and explore everything, outside of Talkyard. The above leads us to using MDX for end-user docs. (MDX = Markdown with React.js support, https://mdxjs.com). MDX help pages can be loaded by Talkyard\\u0027s web app (it uses React.js), and shown in help boxes.\\n\\nOr if the sysadmin docs are kept in the talkyard-prod-one Git repo, then that repo could be added as a Git submodule to the main docs repo. That might be simpler; then, one would always get the sysadmin docs for the correct version and installation method of Talkyard. (I\\u0027m guessing this sounds a bit confusing.) Developer docs: These are off-topic and confusing for 99.9% of everyone :- ) and I think it\\u0027s better to not include them in the static docs website. (As a bad example (or so I \\u00B7 think thought), look at the Zulip docs \\u2014 they bundle dev docs and \\u0022real\\u0022 docs together, and if one searches for something, e.g. \\u0022installation\\u0022: https://zulip.readthedocs.io/en/latest/search.html?q=installation, the top search hit is \\u0022Development environment installation\\u0022, off-topic to almost everyone. [edit] Oh I was wrong, they actually do have a separate docs website for end-user docs: https://zulip.com/help/. [/edit]) The dev docs are those you found at github.com/debiki/talkyard/tree/main/docs.\\n\\nI think people will read the dev docs via code editors like VSCode, in parallel with editing the source code, and sometimes browsing ... via GitHub? Or maybe a dedicated devdocs.talkyard.... subdomain? \\u2014 Anyway I think the dev docs are out of scope of a Google Season of Docs project. What about the docs here in this category: https://forum.talkyard.io/latest/docs \\u2014 I think that\\u0027s not the right place for the docs, because it\\u0027s hard to download them to one\\u0027s own laptop. (To do so, one would need to crawl the Ty .io forum with a web spider? That\\u0027s very not-user-friendly.) Instead, the docs should be in a Git repo, so git clone is all that needed. \\u2014 It\\u0027d be nice if the docs in such a Git repo, was still searchable from the Talkyard .io forum. There are some plans to make it possible to index an external documentation website, in Talkyard, and then, when searching for help here at forum.talkyard.io, you\\u0027ll get linked to that external docs website (instead of Talkyard discussion pages).\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-743/improving-the-docs\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Technical information\",\"url\":\"https://forum.talkyard.io/for-developers\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"Want plugins and chat bots? Maybe you\\u0026#x27;d like to post a topic in the community and write about what you want to do. (\\u0026quot;Debiki\\u0026quot;, in the URL above, is the name of the company that builds Talkyard.) A source code license is a legal text that tells people what they may do with the source code, for example, edit it, use it, give it away to others. Currently Talkyard is licensed under the GNU Affero General Public License, which means that it\\u0026#x27;s open source and that you can download Talkyard, use it, modify it and share it with others \\u2014 as long as you share alike your modifications. Please let me know if you want me to change from AGPL to GPL. React.js client side. Nginx, some Lua, Scala and Play Framework 2 server side. PostgreSQL, Redis, ElasticSearch databases. Do you want to help out with developing Talkyard?\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/for-developers\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"The Talkyard Community\",\"url\":\"https://forum.talkyard.io/latest/support\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"Here you can ask questions, report problems and suggest ideas. Welcome \\u00B7 If you wonder roughly what\\u0026#x27;s next, here\\u0026#x27;s a roughly sorted prio list: \\u0026quot;tags:priority:desc\\u0026gt;2 is:open\\u0026quot; (Priority values are from -1 to \\u002B10. Size is 1/2/3/4/... and means Hour/Hours/Day/Days/Week/Weeks/Month/Months.)\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/latest/support\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Talkyard Roadmap 2018-06-24\",\"url\":\"https://forum.talkyard.io/-85/talkyard-roadmap-2018-06-24\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"Make Problem type topics flat (not threaded) \\u2014 that\\u0026#x27;s better for step by step problem solving. Or a \\u0026quot;Progress\\u0026quot; comments sorted-by-time section that can be enabled in all topics? shown after the best-first replies to the orig post? Maybe shown by default, in Problem type topics. Trust levels: Make the Trusted, Regular and Core Member trust levels work. Make the Unwanted vote have effect (those who post [comments that the staff and core members consider Unwanted] won\\u0026#x27;t become Trusted members). Add NSFW image filter, use Google\\u0026#x27;s Vision API? Integrate with Perspective API to detect toxic comments? Optionally upvote topics directly in topic list, for those who want Reddit like communities. Optionally show text input box directly, more encouraging than having to click Reply. ... There are tags, if you\\u0026#x27;re admin (not yet for non-staff users though) \\u2014 click the \\u2630 menu button next to Reply, and then you can tag both topics and comments.\\n\\nMake Problem type topics flat (not threaded) \\u2014 that\\u0027s better for step by step problem solving. Or a \\u0022Progress\\u0022 comments sorted-by-time section that can be enabled in all topics? shown after the best-first replies to the orig post? Maybe shown by default, in Problem type topics. Trust levels: Make the Trusted, Regular and Core Member trust levels work. Make the Unwanted vote have effect (those who post [comments that the staff and core members consider Unwanted] won\\u0027t become Trusted members). Add NSFW image filter, use Google\\u0027s Vision API? Integrate with Perspective API to detect toxic comments? Optionally upvote topics directly in topic list, for those who want Reddit like communities. Optionally show text input box directly, more encouraging than having to click Reply. ... There are tags, if you\\u0027re admin (not yet for non-staff users though) \\u2014 click the \\u2630 menu button next to Reply, and then you can tag both topics and comments.\\n\\nExample, subscribing to tags \\u0026 categories: If you install on-premise, you might want to subscribe to the security tag, here in this support forum, so you get notified, if there\\u0027s topics \\u0026 discussions about security issues. And maybe a security-alert tag. Or maybe there are experts in your organization, who want to listen to tags (over at your own forum, not here) that they can answer questions about,and help out with. \\u2014 Or maybe a team wants their own category. Let\\u0027s say, the Growth Hacking team. Then others in the organization, can contact that team, by posting to their category, and they\\u0027ll be notified (assuming the growth hackers / marketing people have subscribed to the Growth Hacking category). ... I found this thread and noticed that we don\\u0027t have the abiltiy to add / remove tags Here is a screengrab. Has this feature changed? When and how are you planning to introduce tags?\\n\\nActually I spent most of yesterday reading and thinking about tags \\u2014 I\\u0027ll post a new topic about that tomorrow (and @mention you).\\n\\nEdit: This roadmap is old. There\\u0027s a new roadmap here, from 2018-11-26. Theming. User friendly way to edit colors and make one\\u0027s Talkyard site look like a part of one\\u0027s website. 2 weeks? Re-implement tags: change to ids, so can be renamed. 4 days? Subscribe to categories (and tags?). Then, can listen to conversations / questions related to to one\\u0027s own team only, if each team = 1 category. 4 days? Fix bugs people might report or that I have found, \\u0026 reduce tech debt, 1 \\u2013 3 weeks. Rich text WYSIWYG editor. Non-tech people think Markdown\\u002Bpreview is confusing. Use ProseMirror \\u2014 it can switch between Markdown\\u002Bpreview and rich-text-WYSIWYG. 2 weeks? 2-3 months? (wall clock time, not coding time) The WYSIWYG probably be made available step by step: first a simple version that doesn\\u0027t support @mentions, for example. Export site to JSON \\u002B uploaded images etc (so can migrate to one\\u0027s own server).\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-85/talkyard-roadmap-2018-06-24\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"What\\u0027s missing in Talkyard\",\"url\":\"https://forum.talkyard.io/-194/whats-missing-in-talkyard\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"talkyard.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=talkyard.io\",\"site_name\":\"Talkyard\"},\"is_missing\":false,\"text\":\"Hmm can you please explain a bit more? Do you mean ... Maybe the Review tab in the admin area, where one sees other people\\u0026#x27;s posts and can review them? And that there\\u0026#x27;re no Like votes shown there? \\u2014 If so, showing Like votes there, and Disagree votes etc, seems like possibly a good idea. Can be helpful, when reviewing, is that what you had in mind? Or you want a summary of all likes everywhere? And a graph: Num like votes, plotted against time? ... Sorry I meant the review tab - the pages that show my comments - at least on the top level one. It would be useful to see the number of likes. So I likes total. But now I think of it the like is per page not comment so may not fit with those review pages? ... Thanks for explaining. I agree with you; it\\u0026#x27;d be nice to see Like and Disagree votes etc on the review tab. (Likes are per post / comment, not per page.) ...\\n\\nHmm can you please explain a bit more? Do you mean ... Maybe the Review tab in the admin area, where one sees other people\\u0027s posts and can review them? And that there\\u0027re no Like votes shown there? \\u2014 If so, showing Like votes there, and Disagree votes etc, seems like possibly a good idea. Can be helpful, when reviewing, is that what you had in mind? Or you want a summary of all likes everywhere? And a graph: Num like votes, plotted against time? ... Sorry I meant the review tab - the pages that show my comments - at least on the top level one. It would be useful to see the number of likes. So I likes total. But now I think of it the like is per page not comment so may not fit with those review pages? ... Thanks for explaining. I agree with you; it\\u0027d be nice to see Like and Disagree votes etc on the review tab. (Likes are per post / comment, not per page.) ...\\n\\nAnd have event triggered webhooks, like when a user signs up and when a post/comment is made, I can attribute that to the user, based on their email. This helps with a centralized customer area I\\u0027m working on, where, for example a customer support request comes in, I can quickly see all activity from this person across forum, payment, email. Also enjoying the ReTool app as a centralized admin UI. With something like this, I can have a singular admin UI for most daily tasks and not need to login to each system, with it\\u0027s own login, UI, etc. (Replying by email doesn\\u0027t work for all software/SaaS) ... Maybe I can change limit = 25 to a value taken from the URL param? Like, /-/v0/feed?limit=44\\u0026offset=44 or limit=44\\u0026olderThanMs=\\u003Cunix timestamp in milliseconds\\u003E, how would that work? (\\u0026offset=... could be problematic if a new post appears, in between the API requests \\u2014 then a post could get accidentally excluded when paginating the feed.\\n\\nAbout event triggered webhooks \\u2014 maybe you could reply with some JSON describing the data you\\u0027d like to receive, when a reply gets posted? centralized customer area I\\u0027m working on \\u2014 ok, good use case. ReTool looks nice, hmm I\\u0027m wondering, maybe something I could use too. Sorry for the late reply. ... -Twitter (and other social media) embeds inside talkyard. Definitely a must for any modern forum app. -Previews of talkyard posts on Twitter, a la wordpress or discourse. Show a preview of the topic with image when posting a talkyard topic url to twitter. -Descritpive URL. A topic url that resembles the title of the topic, like wordpress or discourse. -A quick way to rebuild the app so one can change config options such as ports without having to reinstall the app. ... The Twitter link you copy pasted, how does it look? Then I can read the Twitter docs about how to fetch the correct HTML from Twitter and embed.\\n\\nAbout raw html in posts: I would love to add video previews (from loom). ... Hmm, Loom, it seems they do support oEmbed: https://github.com/loomhq/loom-embed/blob/master/src/sdk/oembed.js \\u00B7 And Wikipedia would be nice too. (What do you like about Loom, if I may ask? You use it at work I presume?) ... (Jose @wintermute replied via email, accidentally? Email replies not yet impl though :- ) so you won\\u0027t see your reply here. Anyway, here follows my reply to your reply.) Hi Jose, Loom, ok then I get it \\u2014 \\u0026 now I had a look here: https://www.loom.com/use-case/support , actually looks like something Talkyard could use itself. About Wiki software for video \\u2014 yes that\\u0027d be cool :- ) Other people could insert small extra video sections, in the original video, add voice and/or subtitles, add/change the music track, delete some parts, process the audio and remove noise.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://forum.talkyard.io/-194/whats-missing-in-talkyard\",\"search_provider\":\"anthropic\"}}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":\"globe\",\"display_content\":null}"

