text = "This approach, to let thet title, orig post, replies (and also custom CSS and Javascript in the admin area actually) all be &quot;posts&quot;, makes edit history work for all those things, I mean, old revisions are remembered and one can run diffs and see what changes were made. There&#x27;s a currRevNr field and an approvedRevNr field, and the latter tells which revision of the post that has been approved by someone — and only the approved version of a post, should be shown to others than staff. (Usually posts are auto approved by the System user, unless the post author is new or has said too weird things in the past.) @chrscheuer The text to index, when inserting Talkyard contents into an external search engine, is in the field approvedHtmlSanitized, or approvedSource if you want the Commonmark source. — Maybe instead of indexing the exported JSON, you could send a search query to Talkyard?\n\nFWIW, we're ok with the json export format changing slightly if you need to do that for it to make sense. It'd be super if you can give a heads up if the format changes of course, but since our solution would still work, just not do updates, it's not a big deal if we got a little downtime here and there while the format settles. To combat the issue of immediacy we might later end up either doing a webhook based approach to get immediate updating of our index (if TY supports that at the time) or cross-posting a TY search api to \"fill up\" our existing results with newer posts from the current day, if we deem it necessary. But for now, it's acceptable for us that our search results' completeness will be delayed with up to a day. ... Thanks for the info on why you're using the json export, interesting to read. I think this'll work fine. The minor things that came to my mind was: 1) Non-stable JSON format, yes, however the fields you're using are unlikely to change.\n\n(The only thing I can think of, would be renaming nr to postNr and id to postId.) 2) That your search database lags a bit after Talkyard, however now when I read about how you're using the search results, seems to me this won't matter. 3) If the site in the future grows and becomes \"really large\", maybe doing daily full JSON exports could be a little bit much bandwidth. However \"long before that\" I hope there'll be ways to do incremental syncs, or webhooks like you mentioned. ... Thanks! This all sounds great. Yea I'm definitely going after something that's quick to set up now but that won't cause too much trouble in the long run. We're preparing everything in containers so the components can be switched out later, so for example we'll likely end up with Elasticsearch driving some of it eventually (like Talkyard does), but for now our internal C# full text algorithms are good enough for a quick first iteration.\n@KajMagnus for those posts prior to my setting up a discussionId parameter to make their comments portable, is there a way in the Admin view I can see an ID and then retroactively apply it to those older posts? Am doing some transitioning and hate to lose those comments. I can see them in Admin but don&#x27;t see their parameters. Hope all that makes sense. Thanks as always, sir. [Edit] I changed the title from &quot;Any way to identify old discussionId ?&quot; to the current title. /KajMagnus [/Edit] ... There is not, and to me that seems like a good thing to have. I&#x27;ve previously a bit been wondering how to deal with situations like yours. There could 1) be a page that lists all embedded comments pages, where you&#x27;ll see blog post URLs and any already existing discussionIds, and where you can add and remove new ids. Or 2) I can add a view-&amp;-change discussionId setting, on each page.\n\nTalkyard · Topics · No internet connection · JoinLog In · Home · Ideas · By Bryce Wray @BryceWray · 2019-09-01 17:52:22.040Z2019-09-06 06:37:45.534Z · @KajMagnus for those posts prior to my setting up a discussionId parameter to make their comments portable, is there a way in the Admin view I can see an ID and then retroactively apply it to those older posts? Am doing some transitioning and hate to lose those comments. I can see them in Admin but don't see their parameters. Hope all that makes sense. Thanks as always, sir. [Edit] I changed the title from \"Any way to identify old discussionId ?\" to the current title. /KajMagnus [/Edit] Reply1 Like · 12 replies · Oldest first · KajMagnus @KajMagnus · core-dev · support-team2019-09-02 18:33:35.643Z · There is not, and to me that seems like a good thing to have. I've previously a bit been wondering how to deal with situations like yours.\n\n(One goes to the Admin Area | Settings | Features and enables Experimental, then clicks the Content tab that appear, and then one can edit discussion IDs and URLs. However don't try to edit the other fields right now. — I suggest you wait until I message you again tomorrow :- )) ... That’s fine; I’ll wait until you give the “all-clear,” so to speak. Thanks for continuing to work on this! I feared you’d had to abandon it for some reason. Since I’m not only still migrating back and forth among SSGs but also resurrecting formerly deleted posts (see https://brycewray.com/posts/2019/10/otoh), I need this more now than I did when I first asked for it. :-) ... Hi Bryce @BryceWray I noticed in the server logs that there was an error when you tried to change the \"external IDs\" of some pages — if you have time, what was the reason you tried to do this change?\n\n@KajMagnus for those posts prior to my setting up a discussionId parameter to make their comments portable, is there a way in the Admin view I can see an ID and then retroactively apply it to those older posts? Am doing some transitioning and hate to lose those comments. I can see them in Admin but don't see their parameters. Hope all that makes sense. Thanks as always, sir. [Edit] I changed the title from \"Any way to identify old discussionId ?\" to the current title. /KajMagnus [/Edit] ... There is not, and to me that seems like a good thing to have. I've previously a bit been wondering how to deal with situations like yours. There could 1) be a page that lists all embedded comments pages, where you'll see blog post URLs and any already existing discussionIds, and where you can add and remove new ids. Or 2) I can add a view-&-change discussionId setting, on each page.\n\n@BryceWray Now I've fixed that page, i.e. https://brycewray.com/posts/2019/04/why-left-ulysses/. I added a discussion id to the Talkyard page to match the discussion id in the blog post HTML: <div class=\"talkyard-comments\" data-discussion-id=\"2019-04-why-left-ulysses\" ... And I added discussion id 2019-05-boxed-in for the Talkyard page for this blog post too: https://brycewray.com/posts/2019/05/boxed-in/ — it has one Like, which didn't appear until now. ... It wasn't the External ID field that was to be updated, but instead, the Discussion ID. (Maybe I can hide the External ID field for now, hmm, or move it to the bottom of the form.) ...\nposts: [{ // Another ID sequence, for posts. For example, Like votes need a post ID to refer to. id: 2000000001, // Post nr 0 is the page title. (The &quot;title post&quot;.) nr: 0, // So won&#x27;t get duplicated, if re-imported. extId: &quot;/page/peramlink:title-post&quot;, // Refers to the first pages above. pageId: &quot;2000000001&quot;, // The post type. Always 1 works fine. // (There other types too, e.g. for &quot;Meta Posts&quot; e.g. page status changes.) postType: 1, createdAt: 1549882800000, // The post author. Should be the same as the Original Post author (since this is the page title). createdById: 1, // Who composed the latest version of the post (latests edit). currRevById: 1, // You can set this to the same as createdAt. currRevStartedAt: 1549882800000, // Leave at 1. It&#x27;s a revision number, in case the post has gotten edited. // (Post edit revisions aren&#x27;t yet documented.) currRevNr: 1, // The actual text.\n\nposts: [{ // Another ID sequence, for posts. For example, Like votes need a post ID to refer to. id: 2000000001, // Post nr 0 is the page title. (The \"title post\".) nr: 0, // So won't get duplicated, if re-imported. extId: \"/page/peramlink:title-post\", // Refers to the first pages above. pageId: \"2000000001\", // The post type. Always 1 works fine. // (There other types too, e.g. for \"Meta Posts\" e.g. page status changes.) postType: 1, createdAt: 1549882800000, // The post author. Should be the same as the Original Post author (since this is the page title). createdById: 1, // Who composed the latest version of the post (latests edit). currRevById: 1, // You can set this to the same as createdAt. currRevStartedAt: 1549882800000, // Leave at 1. It's a revision number, in case the post has gotten edited. // (Post edit revisions aren't yet documented.) currRevNr: 1, // The actual text.\n\nReplies also need a \"post number\", which is a per discussion page unique number. It's good if you sort these by time, so older posts, get lower numbers. These numbers should start at 2 000 000 001. (Post numbers need to be unique per page only.) The Original Post, which is also a \"post\", shall have post number 1. And the title shall have post number 0. These are special post numbers, so Talkyard knows where the discussion starts. Guests IDs (one-time light weight blog commenting accounts), should start at at -2 000 000 001. That is, guest accounts have negative id numbers; they aren't \"real\" accounts. For simplicity, you could probably reuse the same ID sequence for everything. Talkyard doesn't care what the numbers are, as long as they are >= 2 000 000 001 (or <= - 2 000 000 001). If you re-generate your JSON import file some time later, maybe now it'll include more things — maybe your previous forum was still active and people posted new things.\n\nYou can set to 1. Talkyard uses this field to // know if a page should get re-rendered, and bumps it itself e.g. if a // new reply gets posted, or something gets edited. version: 1, // Unix time, milliseconds. You can set all these to the same value. createdAt: 1549882800000, updatedAt: 1549882800000, publishedAt: 1549882800000, // Refers to a category id in the `categories: [...]` list, see below. categoryId: 2000000001, // If you're importing embedded blog comments, Talkyard needs to know what // URL this discussion page is for. // embeddingPageUrl: \"https://blog.example.com/2019/a-blog-post.html\", // (then also use: pageType: 5 — that's the Embedded Comments page type). // Hmm shouldn't be needed, when importing. Talkyard could figure this out, // by looking at the Original Post. authorId: 1 }, { // Another page: id: \"2000000002\", // 2000000002 comes after 2000000001.\n\n(Which in turn replies to the Original Post, nr 1.) parentNr: 2000000001, postType: 1, createdAt: 1559880306000, createdById: -2000000003, currRevById: -2000000003, currRevStartedAt: 1559880306000, currRevNr: 1, approvedSource: \"<p>A reply to a reply.</p>\", approvedAt: 1559880306000, approvedById: 1, approvedRevNr: 1 }, // ... more posts, for the other page, and they'd have: // pageId: \"2000000002\", // page two ] Lastly, Talkyard wants to know in which category to place the imported pages. Let's say we'd like to place the imported pages in a category that already exists. Then, first you'd need to give that category an \"external ID\" that we can refer to, from the JSON import file. Do that by going to the category (in your browser), click Edit Category, then, scroll down to the bottom of the dialog, and click the \"External ID\" field and type, say, \"imported_from_reddit\".\nThere&#x27;s a permission for &quot;Edit other people&#x27;s topics&quot; and one for &quot;Edit wiki posts&quot;. In my opinion it makes sense that if someone has the &quot;Edit wiki posts&quot; he can edit ALL wikified topics, and with the &quot;Edit other people&#x27;s topics&quot; he can edit ALL topics - independently if wikified or not. This would make great sense since this would allow the author of a post to decide if he want&#x27;s others to edit his topic or not. So IMHO it SHOULD work this way - it just does not. Am I misunderstanding something? ... if someone has the &quot;Edit wiki posts&quot; he can edit ALL wikified topics [in the relevant category /Magnus] Yes that&#x27;s how it should work I think too. Sounds as if there is a bug related to this, then. I can add some end-to-end tests, to reproduce. (Probably won&#x27;t take long to fix once the tests are in place.) The problem is that Edit-wiki-posts won&#x27;t let one edit all wiki posts in that ...\n\nThere's a permission for \"Edit other people's topics\" and one for \"Edit wiki posts\". In my opinion it makes sense that if someone has the \"Edit wiki posts\" he can edit ALL wikified topics, and with the \"Edit other people's topics\" he can edit ALL topics - independently if wikified or not. This would make great sense since this would allow the author of a post to decide if he want's others to edit his topic or not. So IMHO it SHOULD work this way - it just does not. Am I misunderstanding something? ... if someone has the \"Edit wiki posts\" he can edit ALL wikified topics [in the relevant category /Magnus] Yes that's how it should work I think too. Sounds as if there is a bug related to this, then. I can add some end-to-end tests, to reproduce. (Probably won't take long to fix once the tests are in place.) The problem is that Edit-wiki-posts won't let one edit all wiki posts in that category?\ncurl https://www.talkyard.io/-/v0/search -X POST -H &#x27;Content-Type: application/json&#x27; -d &#x27;{ &quot;searchQuery&quot;: { &quot;freetext&quot;: &quot;how climb trees&quot; }, &quot;pretty&quot;: true }&#x27; But if you include any credentials (cookies, -b &#x27;aCookie=aValue&#x27; in cURL), the request will get denied (to stop XSRF). Emails translated to German (thanks Sascha Z!). (But no the email subject lines, only the text inside, sorry) Minor UX improvement: The editor &lt;/&gt; button now inserts a code block (triple backticks, ```), because many people otherwise don&#x27;t know how that works, and if a code block doesn&#x27;t get formatted properly, it can be hard to read. And, ``` happens works for formatting inline code too. So, just a single backtick, `, instead of ``` for inline code, now in a way is a &quot;power user feature&quot;. Minor UX change: Category name and description now placed above topic list filter buttons.\n\nIdea tracking / Feature upvoting categories, check out: the Ideas category here in the forum — when you switch to that category, the topics get sorted by popular-first, and you see how many Likes the Original Post (the actual idea) has gotten. (You'll notice that the ideas are not strictly sorted by most-likes only, instead, it's which ideas got the most Likes during the last month or quarter or year (there's a dropdown so you can choose).) Other categories remain sorted by new & recently-active pages first — so, in the Announcements category, you'll still find the most recent release notes first (rather than the most popular release notes). To change a category to an Upvotes category (or actually \"Do-it\" votes, as these votes are called in Talkyard), go to the category, click Edit Category and tick the \"Upvote ideas\" checkbox a bit down. Now the API endpoints does not require any XSRF token, if the requester is not logged in.\n\nThe Do API: post a bunch of actions, and an API secret, to /-/v0/do, and Talkyard will do it. Initially only for Like voting pages, and subscribing to notifications.\n\ncurl https://www.talkyard.io/-/v0/search -X POST -H 'Content-Type: application/json' -d '{ \"searchQuery\": { \"freetext\": \"how climb trees\" }, \"pretty\": true }' But if you include any credentials (cookies, -b 'aCookie=aValue' in cURL), the request will get denied (to stop XSRF). Emails translated to German (thanks Sascha Z!). (But no the email subject lines, only the text inside, sorry) Minor UX improvement: The editor </> button now inserts a code block (triple backticks, ```), because many people otherwise don't know how that works, and if a code block doesn't get formatted properly, it can be hard to read. And, ``` happens works for formatting inline code too. So, just a single backtick, `, instead of ``` for inline code, now in a way is a \"power user feature\". Minor UX change: Category name and description now placed above topic list filter buttons.\nHi Dashamir, Good idea (to improve the docs), this is needed I think. (There&#x27;s some installation &amp; maintenance docs as well at: https://github.com/debiki/talkyard-prod-one/tree/main/docs; I edited the orig post and inserted a link.) at least three categories are needed [...] sysadmins [...] user docs [...] developer docs ... Where&#x27;s the best place to show end user docs? I think it&#x27;s in Talkyard itself: Whenever someone looks at a dialog or UI wiget wonders &quot;what&#x27;s that?&quot; or &quot;how does this work?&quot;, then s/he can from inside Talkyard, click a [?] button to open a help dialog describing that part of Talkyard. But it&#x27;s also nice with a static website with end user docs, so one can browse and explore everything, outside of Talkyard. The above leads us to using MDX for end-user docs. (MDX = Markdown with React.js support, https://mdxjs.com). MDX help pages can be loaded by Talkyard&#x27;s web app (it uses React.js), and shown in help boxes.\n\nDeveloper docs. We meant different things. With dev docs, I had in mind docs for developers who want to edit Ty's source code and develop Talkyard itself. (Which is off-topic to almost everyone.) We didn't mean entirely different things, because I also had in mind docs for developers who want to improve Talkyard itself (or fix any bugs, maintain it, etc.) I'd place these docs in a technical section of the end user docs, maybe with a title like \"API Documentation\". And yes definitely API endpoints should be documented. Probably you are right, but I would also get some opinion from any professional technical writer (I am not professional), or look at other projects, how they do it. You may be completely right about something, but it also matters what people expect, what they are used to. Hmm what do you mean with \"structured\" here? There are categories and tags in Ty (not too different from most static site generators?).\n\nHi Dashamir, Good idea (to improve the docs), this is needed I think. (There's some installation & maintenance docs as well at: https://github.com/debiki/talkyard-prod-one/tree/main/docs; I edited the orig post and inserted a link.) at least three categories are needed [...] sysadmins [...] user docs [...] developer docs ... Where's the best place to show end user docs? I think it's in Talkyard itself: Whenever someone looks at a dialog or UI wiget wonders \"what's that?\" or \"how does this work?\", then s/he can from inside Talkyard, click a [?] button to open a help dialog describing that part of Talkyard. But it's also nice with a static website with end user docs, so one can browse and explore everything, outside of Talkyard. The above leads us to using MDX for end-user docs. (MDX = Markdown with React.js support, https://mdxjs.com). MDX help pages can be loaded by Talkyard's web app (it uses React.js), and shown in help boxes.\n\nOr if the sysadmin docs are kept in the talkyard-prod-one Git repo, then that repo could be added as a Git submodule to the main docs repo. That might be simpler; then, one would always get the sysadmin docs for the correct version and installation method of Talkyard. (I'm guessing this sounds a bit confusing.) Developer docs: These are off-topic and confusing for 99.9% of everyone :- ) and I think it's better to not include them in the static docs website. (As a bad example (or so I · think thought), look at the Zulip docs — they bundle dev docs and \"real\" docs together, and if one searches for something, e.g. \"installation\": https://zulip.readthedocs.io/en/latest/search.html?q=installation, the top search hit is \"Development environment installation\", off-topic to almost everyone. [edit] Oh I was wrong, they actually do have a separate docs website for end-user docs: https://zulip.com/help/. [/edit]) The dev docs are those you found at github.com/debiki/talkyard/tree/main/docs.\n\nI think people will read the dev docs via code editors like VSCode, in parallel with editing the source code, and sometimes browsing ... via GitHub? Or maybe a dedicated devdocs.talkyard.... subdomain? — Anyway I think the dev docs are out of scope of a Google Season of Docs project. What about the docs here in this category: https://forum.talkyard.io/latest/docs — I think that's not the right place for the docs, because it's hard to download them to one's own laptop. (To do so, one would need to crawl the Ty .io forum with a web spider? That's very not-user-friendly.) Instead, the docs should be in a Git repo, so git clone is all that needed. — It'd be nice if the docs in such a Git repo, was still searchable from the Talkyard .io forum. There are some plans to make it possible to index an external documentation website, in Talkyard, and then, when searching for help here at forum.talkyard.io, you'll get linked to that external docs website (instead of Talkyard discussion pages).\nWant plugins and chat bots? Maybe you&#x27;d like to post a topic in the community and write about what you want to do. (&quot;Debiki&quot;, in the URL above, is the name of the company that builds Talkyard.) A source code license is a legal text that tells people what they may do with the source code, for example, edit it, use it, give it away to others. Currently Talkyard is licensed under the GNU Affero General Public License, which means that it&#x27;s open source and that you can download Talkyard, use it, modify it and share it with others — as long as you share alike your modifications. Please let me know if you want me to change from AGPL to GPL. React.js client side. Nginx, some Lua, Scala and Play Framework 2 server side. PostgreSQL, Redis, ElasticSearch databases. Do you want to help out with developing Talkyard?\nHere you can ask questions, report problems and suggest ideas. Welcome · If you wonder roughly what&#x27;s next, here&#x27;s a roughly sorted prio list: &quot;tags:priority:desc&gt;2 is:open&quot; (Priority values are from -1 to +10. Size is 1/2/3/4/... and means Hour/Hours/Day/Days/Week/Weeks/Month/Months.)\nMake Problem type topics flat (not threaded) — that&#x27;s better for step by step problem solving. Or a &quot;Progress&quot; comments sorted-by-time section that can be enabled in all topics? shown after the best-first replies to the orig post? Maybe shown by default, in Problem type topics. Trust levels: Make the Trusted, Regular and Core Member trust levels work. Make the Unwanted vote have effect (those who post [comments that the staff and core members consider Unwanted] won&#x27;t become Trusted members). Add NSFW image filter, use Google&#x27;s Vision API? Integrate with Perspective API to detect toxic comments? Optionally upvote topics directly in topic list, for those who want Reddit like communities. Optionally show text input box directly, more encouraging than having to click Reply. ... There are tags, if you&#x27;re admin (not yet for non-staff users though) — click the ☰ menu button next to Reply, and then you can tag both topics and comments.\n\nMake Problem type topics flat (not threaded) — that's better for step by step problem solving. Or a \"Progress\" comments sorted-by-time section that can be enabled in all topics? shown after the best-first replies to the orig post? Maybe shown by default, in Problem type topics. Trust levels: Make the Trusted, Regular and Core Member trust levels work. Make the Unwanted vote have effect (those who post [comments that the staff and core members consider Unwanted] won't become Trusted members). Add NSFW image filter, use Google's Vision API? Integrate with Perspective API to detect toxic comments? Optionally upvote topics directly in topic list, for those who want Reddit like communities. Optionally show text input box directly, more encouraging than having to click Reply. ... There are tags, if you're admin (not yet for non-staff users though) — click the ☰ menu button next to Reply, and then you can tag both topics and comments.\n\nExample, subscribing to tags & categories: If you install on-premise, you might want to subscribe to the security tag, here in this support forum, so you get notified, if there's topics & discussions about security issues. And maybe a security-alert tag. Or maybe there are experts in your organization, who want to listen to tags (over at your own forum, not here) that they can answer questions about,and help out with. — Or maybe a team wants their own category. Let's say, the Growth Hacking team. Then others in the organization, can contact that team, by posting to their category, and they'll be notified (assuming the growth hackers / marketing people have subscribed to the Growth Hacking category). ... I found this thread and noticed that we don't have the abiltiy to add / remove tags Here is a screengrab. Has this feature changed? When and how are you planning to introduce tags?\n\nActually I spent most of yesterday reading and thinking about tags — I'll post a new topic about that tomorrow (and @mention you).\n\nEdit: This roadmap is old. There's a new roadmap here, from 2018-11-26. Theming. User friendly way to edit colors and make one's Talkyard site look like a part of one's website. 2 weeks? Re-implement tags: change to ids, so can be renamed. 4 days? Subscribe to categories (and tags?). Then, can listen to conversations / questions related to to one's own team only, if each team = 1 category. 4 days? Fix bugs people might report or that I have found, & reduce tech debt, 1 – 3 weeks. Rich text WYSIWYG editor. Non-tech people think Markdown+preview is confusing. Use ProseMirror — it can switch between Markdown+preview and rich-text-WYSIWYG. 2 weeks? 2-3 months? (wall clock time, not coding time) The WYSIWYG probably be made available step by step: first a simple version that doesn't support @mentions, for example. Export site to JSON + uploaded images etc (so can migrate to one's own server).\nHmm can you please explain a bit more? Do you mean ... Maybe the Review tab in the admin area, where one sees other people&#x27;s posts and can review them? And that there&#x27;re no Like votes shown there? — If so, showing Like votes there, and Disagree votes etc, seems like possibly a good idea. Can be helpful, when reviewing, is that what you had in mind? Or you want a summary of all likes everywhere? And a graph: Num like votes, plotted against time? ... Sorry I meant the review tab - the pages that show my comments - at least on the top level one. It would be useful to see the number of likes. So I likes total. But now I think of it the like is per page not comment so may not fit with those review pages? ... Thanks for explaining. I agree with you; it&#x27;d be nice to see Like and Disagree votes etc on the review tab. (Likes are per post / comment, not per page.) ...\n\nHmm can you please explain a bit more? Do you mean ... Maybe the Review tab in the admin area, where one sees other people's posts and can review them? And that there're no Like votes shown there? — If so, showing Like votes there, and Disagree votes etc, seems like possibly a good idea. Can be helpful, when reviewing, is that what you had in mind? Or you want a summary of all likes everywhere? And a graph: Num like votes, plotted against time? ... Sorry I meant the review tab - the pages that show my comments - at least on the top level one. It would be useful to see the number of likes. So I likes total. But now I think of it the like is per page not comment so may not fit with those review pages? ... Thanks for explaining. I agree with you; it'd be nice to see Like and Disagree votes etc on the review tab. (Likes are per post / comment, not per page.) ...\n\nAnd have event triggered webhooks, like when a user signs up and when a post/comment is made, I can attribute that to the user, based on their email. This helps with a centralized customer area I'm working on, where, for example a customer support request comes in, I can quickly see all activity from this person across forum, payment, email. Also enjoying the ReTool app as a centralized admin UI. With something like this, I can have a singular admin UI for most daily tasks and not need to login to each system, with it's own login, UI, etc. (Replying by email doesn't work for all software/SaaS) ... Maybe I can change limit = 25 to a value taken from the URL param? Like, /-/v0/feed?limit=44&offset=44 or limit=44&olderThanMs=<unix timestamp in milliseconds>, how would that work? (&offset=... could be problematic if a new post appears, in between the API requests — then a post could get accidentally excluded when paginating the feed.\n\nAbout event triggered webhooks — maybe you could reply with some JSON describing the data you'd like to receive, when a reply gets posted? centralized customer area I'm working on — ok, good use case. ReTool looks nice, hmm I'm wondering, maybe something I could use too. Sorry for the late reply. ... -Twitter (and other social media) embeds inside talkyard. Definitely a must for any modern forum app. -Previews of talkyard posts on Twitter, a la wordpress or discourse. Show a preview of the topic with image when posting a talkyard topic url to twitter. -Descritpive URL. A topic url that resembles the title of the topic, like wordpress or discourse. -A quick way to rebuild the app so one can change config options such as ports without having to reinstall the app. ... The Twitter link you copy pasted, how does it look? Then I can read the Twitter docs about how to fetch the correct HTML from Twitter and embed.\n\nAbout raw html in posts: I would love to add video previews (from loom). ... Hmm, Loom, it seems they do support oEmbed: https://github.com/loomhq/loom-embed/blob/master/src/sdk/oembed.js · And Wikipedia would be nice too. (What do you like about Loom, if I may ask? You use it at work I presume?) ... (Jose @wintermute replied via email, accidentally? Email replies not yet impl though :- ) so you won't see your reply here. Anyway, here follows my reply to your reply.) Hi Jose, Loom, ok then I get it — & now I had a look here: https://www.loom.com/use-case/support , actually looks like something Talkyard could use itself. About Wiki software for video — yes that'd be cool :- ) Other people could insert small extra video sections, in the original video, add voice and/or subtitles, add/change the music track, delete some parts, process the audio and remove noise."

[[body.segments]]
kind = "reasoning"
text = "The search results show that Talkyard does track edit history internally (there's a `currRevNr` field in the data model), but I need to find out if there's a UI way to view edit history for wiki posts. The search results mention revision numbers in the JSON structure but I didn't find clear documentation about a UI for viewing edit history. Let me check the Talkyard forum directly."

[[body.segments]]
kind = "tool_use"
text = "Searching the web"

[[body.segments]]
kind = "tool_result"
text = "(prev) takes you to a diff page showing the changes between that edit and the previous revision. The most recent revision (the one on the same line as the &quot;prev&quot; you clicked on) appears below the changes, so you can see how the page was rendered. The two columns of radio buttons can be used ...\n\nA page history shows the sequence of edits made to any editable Wikipedia page, the difference between any two revisions, and a menu of special external tools. A page history is sometimes called revision history or edit history. You can view a page's history by clicking the \"View history\" tab at the top of the associated page (pictured). On the mobile version of the site, the process works differently, see § Mobile version for details. The page history contains a list of the page's previous revisions, including the date and time—in UTC by default—of each edit, the username, temporary account name, or for older edits, the IP address of the user who made the change, and an optional edit summary that briefly describes or explains the change. For example, the page history for this help page shows it was first created on September 20, 2004, and that it has been changed more than 500 times since then.\n\nTo view a specific revision, click a date. To compare an old revision with the current revision, go to the old revision, click \"cur\". To compare a revision with its predecessor, click \"prev\". To compare two specific revisions, click the left-column radio button of the older revision and the right-column radio button of the newer revision, and then click the Compare selected revisions button. To undo (revert) your own or someone else's edit, click the \"undo\" link. See Wikipedia:Undo for more information. Below is a detailed example of a page history using the default Vector 2022 skin: The edits are listed in chronological order from newest to oldest, and are displayed with each edit being their own row in the list, with each row taking up one line of text. Each entry in the edit history will show the time and date that the edit was applied, the username, temporary account name or IP address of the contributor who saved the edit, the total size of the resulting page text (in bytes), the \n\nIt displays RevisionDeleted edits. A line of links to external tools. The available tools vary between wikis. The line is made by MediaWiki:Histlegend which can be edited by administrators. These links take you to the most recent edits (latest), oldest edits (earliest) or the next or previous page of edits (newer n / older n). Note that the black text in brackets will become links, when applicable. The blue numbers list the number of edits displayed on a page—20, 50, 100, 250 or 500. A higher number increases the length of a page, but reduces the number of pages. The number you select replaces n in the links to the previous or next pages, e.g., (newer 100 / older 100). Manipulating the · limit term in the URL lets you set this number as high as 5,000. (cur) takes you to a diff page, showing the difference between that edit and the current revision.\n\nThe current revision appears below the changes, so you can see how the page is now rendered. (prev) takes you to a diff page showing the changes between that edit and the previous revision. The most recent revision (the one on the same line as the \"prev\" you clicked on) appears below the changes, so you can see how the page was rendered. The two columns of radio buttons can be used to select any two revisions on the page. The current selection is marked by a special background. The two most recent revisions are selected by default when you first view the history (that is why they appear framed and have a different background; see the area below the label 6). Let's say you want to compare the revisions corresponding to numbers 10 and 11 on the image. First, click the left radio button next to number 11. The right column of buttons will then fill as far as number 11.\n\nThe \"View history\" tab is highlighted, and \"Revision history\" is appended to the page name. Notice that you cannot make wikilinks to this extended page name. To make a link to the history page, copy the URL from the browser address bar when viewing the history page, and paste it between single square brackets (external link format) to make the link. The {{History}} template can also be used. The year and month fields allow a quick jump when the page has many revisions. After entering a year and/or selecting a month, click the \"Go\" button to the right. The \"Tag filter\" restricts the display to show only those edits that have been tagged by an edit filter. For example, \"references removed\" may be entered here. After entering a tag name, click the \"Go\" button to the right. The \"Deleted only\" checkbox is only shown to administrators and others with the deletedhistory user right.\nYou can compare two versions of a page using radio buttons. The left button links to the previous, and the right button links to the latter. Just select any versions you want, then click Compare selected revisions. This displays when edits were made, in the format and time zone selected in ...\n\nThe revision history of a page is viewed by clicking on the View history tab. One can then select any two revisions and click Compare selected revisions to view the diff. Contents of deleted revisions will not be accessible to users lacking the necessary user rights. The page shows the newest changes first, followed by older ones. To view a specific version, click its date. Click cur to compare an old version with a current one. Click prev to compare a version with its predecessor. To compare two versions, select the left button for the older version and the right button for the newer one. Afterward, click the Compare selected revisions button. A minor edit is indicated with m. Users can use the Wikiblame tool to search for revisions from a specific author, or character strings in the page of any revision. Here's what a page history looks like in the default skin.\n\nYou can compare two versions of a page using radio buttons. The left button links to the previous, and the right button links to the latter. Just select any versions you want, then click Compare selected revisions. This displays when edits were made, in the format and time zone selected in preferences for logged-in users, or configured in $wgDefaultUserOptions['date'] and $wgLocaltimezone for logged-out users. Clicking the date and time links you to the version from that moment, which may differ from the current one. This shows the contributor's username or IP address. This is the edit summary , users write into the box before submitting an edit. When an edit summary begins with a grey text and an arrow link, it means the user only edited the section mentioned in the grey text. This is added automatically when editing a section. m signifies a minor edit to a page, like fixing a spelling mistake.\n\nOn a history page list, go to any revision after the second one and click on (cur) for the latest edit. This will show you the changes between that revision edit and the most recent one. Look above the difference table to find the number of intermediate revisions. Add 2 to that number, and you'll have the total number of revisions in the history. Deleting a page is more extreme than just removing content or redirecting the page. When a page is deleted, regular users can't access its history anymore. Consequently, if content has been moved or copied with proper attribution, that attribution is lost when the original page is deleted. If someone edits a page that gets deleted, their edits won't show up in their usual User contributions list. Administrators can still see those edits and restore the deleted page if needed (see w:Wikipedia:Viewing and restoring deleted pages).\n\nSometimes, when a page is deleted, it's important to decide whether to keep its revision history. If the history should be kept: Turn the page into a redirect, or rename it to a more fitting redirect if needed. If a redirect isn't appropriate, archive the page. If the content isn't suitable for a current version or an archive, replace it with a note explaining the archive's purpose. A section of a page may be an included separate page (via a method known as Transclusion ), see Possible uses of templates . A separate edit history is provided for the section, and this transcluded page must be watched separately. See Help:Transclusion . You can change or edit an image file by uploading a new one with the same name. All versions of the image are saved, and you can see the history of changes on the image description page. Sometimes it's helpful to provide a direct link to a particular version of a page.\nClick on the date/time of the revision you want to retrieve. Then at the bottom, click edit this. That&#x27;ll give you the wikicode→Raul654 01:16, Feb 14, 2004 (UTC) No, not really. Clicking Edit this page gives me the wikicode of the current (lacking) article, not of the historical (complete) article. Thanks anyway. -Itai 03:07, 14 Feb 2004 (UTC) What you have to do is first click on Page history, then click on one of the links with the date ...\n\nThe article Abbey appears to have been cut off mid-sentence. I tracked this back to the 06:34, 31 Oct 2002 version (the previous version is all right). Ideally, I would have been able to view the source (including wiki formatting) of the 31.12.2002 version and copy it to the most recent revision. Is this possible? If not, I'll just copy the article as is, and reapply the formatting on my on. -Itai 01:13, 14 Feb 2004 (UTC) Yes there is. Click on the date/time of the revision you want to retrieve. Then at the bottom, click edit this. That'll give you the wikicode→Raul654 01:16, Feb 14, 2004 (UTC) No, not really. Clicking Edit this page gives me the wikicode of the current (lacking) article, not of the historical (complete) article. Thanks anyway. -Itai 03:07, 14 Feb 2004 (UTC) What you have to do is first click on Page history, then click on one of the links with the date (i.e.\n\nI understand the reason for the following notice on earlier page revisions, but why does it exist on the permanent links to the most recent versions? The most recent versions of pages haven't been revised, so why do they say they have? \"This version of the article has been revised. Besides normal editing, the reason for revision may have been that this version contains factual inaccuracies, vandalism, or material not compatible with the GFDL.\" ... brian0918 is working on the revision history, removing certain libellous revisions which were inadvertantly restored. I know some people have qualms about deleting history, but this is our policy and it should be carried out the same in this case as any other. Those concerned about the historical record should know that of course all the old revisions are stored in the database so in 100 years when historians want to study this incident, they can.\n\nFrom the page history, click the date/time of the last \"good\" version. Edit that page; you should see a warning that the revision is old. Type in an edit summary (\"reverting vandalism\" or such), and save the page anyway. That will \"revert\" the page back to that version. — TKD (Talk) 03:09, 23 February 2006 (UTC)[reply] I now appear to have an an \"undo\" link for the latest anonymous edit, which makes this easier, but cannot find where the feature is documented. Should something be added to the help page? —Joe Llywelyn Griffith Blakesley talk contrib 16:00, 26 January 2007 (UTC)[reply] Is there a way to link to previous revisions using Wikipedia's internal linking system (that is, without using the full URL, which produces an 'external link')? Benandorsqueaks 01:07, 28 March 2006 (UTC)[reply] I'm slightly baffled by something. The Talk page for the article List of assassinated human rights activists has absolutely no history listed from February of 2009 to May of 2017.\n\nIt's just that it would be deeply inappropriate (always) for us to keep revisions of those sort public. Please let brian do his work undisturbed. :-)--Jimbo Wales 18:24, 6 December 2005 (UTC)[reply] Thanks for the explanation. It is very startling to stumble onto a blank history. Article histories and discussion pages often shed more light on the nature of the information in the article. Being able to access that \"black box\" (in Bruno Latour's sense) is often critical to being able to trust the content -- which seems to be at the heart of the issue at hand.\n\nsomething like 21:07, Feb 13, 2004). After you click on one of those links, you'll see \"(Revision as of 19:13, Feb 13, 2004)\" at the top of the page. Then click on Edit this page and you'll see \"WARNING: You are editing an out-of-date revision of this page. If you save it, any changes made since this revision will be lost.\" at the top and the text as on any normal edit. If you save this version, you are effectively reverting to that revision. Dori | Talk 03:13, Feb 14, 2004 (UTC) Right you are. Thank you. I've been clicking on the last and cur buttons all along. I've now fixed the article. -Itai 10:37, 14 Feb 2004 (UTC) Well done! Now have a think... how could the documentation have been more helpful to you? Is there a change that you can make to one of our various help pages that would make them more easily understood by people wanting to revert for the first time?\nThe time and date of the edit are shown, expressed in the local time according to user preference setting, and which link to that specific revision. The username or IP address of the contributor appears here with links to their message wall or talk page, and contributions. This is the edit summary - the text the user wrote in the editor&#x27;s edit summary box. Some of these begin with an arrow link and grey text. This means the user has edited a specific section of the page (named in the grey text). This text is automatically added when you edit a section. A standard edit summary can still be added by the user, which appears in black text. If a page has been moved in the past, the entire edit history of the article, before and after the move, is shown. The old title becomes a redirect and loses its edit history. Edits made to deleted pages are not kept in the users&#x27; contribution pages.\n\nTo compare any two specific versions, select the left-column radio button of the older version and the right-column radio button of the newer version, and then click \"Compare selected revisions\" ... Below is an example of a page history. Note how edits are shown from newest to oldest and each edit starts on a new line showing the time and date, contributor's name or IP, edit summary, and other related information for the edit. ... The page name. (cur) - This takes you to a diff page. a page showing the difference between that edit and another version of the page. In this case the diff page is comparing the selected version and the current version. When you click \"cur\" the current revision appears below the changes, so you can see how the page looks now. (prev) - This takes you to a diff page showing the changes between that edit and the previous version.\n\nThe time and date of the edit are shown, expressed in the local time according to user preference setting, and which link to that specific revision. The username or IP address of the contributor appears here with links to their message wall or talk page, and contributions. This is the edit summary - the text the user wrote in the editor's edit summary box. Some of these begin with an arrow link and grey text. This means the user has edited a specific section of the page (named in the grey text). This text is automatically added when you edit a section. A standard edit summary can still be added by the user, which appears in black text. If a page has been moved in the past, the entire edit history of the article, before and after the move, is shown. The old title becomes a redirect and loses its edit history. Edits made to deleted pages are not kept in the users' contribution pages.\n\nFiles have histories, too — though they work a bit differently, as individual revisions can be deleted and restored fairly easily. The file history listing forms part of the file description page, which appears when you click on the file. From here, the file history can be viewed, and older versions can be deleted or restored. ... Català Deutsch Español Suomi Français Italiano 日本語 한국어 Nederlands Polski Português Русский Türkçe Українська Tiếng Việt 中文 ·\n\nHowever, the revision history is kept and can be retrieved by an administrator, who can also undelete the page. If you want to link to a specific revision of a page, click on the date for that version on the page history. The resulting URL is suitable for use as a permanent reference to this version. It is possible to use an internal wiki link for linking to specific older revisions, by using Special:PermanentLink page, for example: [[Special:PermanentLink/version id]]. You can also quickly view the latest edit made to any page by adding ?diff=cur to the end of any URL, as with foo.fandom.com/wiki/Pagename?diff=cur. ... If a page contains any time-based variables, its rendered content will use the current date/time, not the time as it was when the revision was saved. The latest versions of templates and files are used; if they have been revised, the page may look different from how it was at the time the version was saved.\nGo to the earliest page in the history and click &quot;cur&quot; on the last edit to see the difference between the last edit and the most recent one. Above the diff table, there is the number of intermediate revisions given - add 2 to that number and you have the number of revisions in the history.\n\nThis page deals with revision control. All editable pages on Wikipedia have an associated page history, which consists of the old versions of the wikitext, as well as a record of the date and time (in UTC) of every edit, the username or IP address of the user who wrote it, and their edit summary. Access the page history by clicking the \"history\" tab at the top of the page. This may also be referred to as the revision history or edit history. All changes made to the page are listed in reverse-chronological order. To view a specific version, click a date. To compare an old version with the current version, click cur. To compare a version with its predecessor, click last. To compare two specific versions, click the left-column radio button of the older version and the right-column radio button of the newer version, and then click the \"Compare selected versions\" button.\n\nThis gives the time and date of the edit, expressed in local time according to the preference setting. The date and time link to the version of that day and time. Thus the first line links to the version that was current at the time of loading this revision history, and therefore the result may differ from that of following the link on the page margin to the current version. Even if the page has not changed in the meantime, the message with id 'Revision-info' (talk) appears. The username or IP of the contributor appears here. This is the edit summary. It is the text the user wrote in the edit summary box (below the edit box). This edit summary begins with an arrow link and grey text. This means the user has only edited a section of the page (named in the grey text). This text is automatically added when you edit a section. A standard edit summary can be added by the user.\n\nGo to the earliest page in the history and click \"cur\" on the last edit to see the difference between the last edit and the most recent one. Above the diff table, there is the number of intermediate revisions given - add 2 to that number and you have the number of revisions in the history. A section of a page may be an included separate page (via a method known as transclusion), see composite pages. A separate edit history is provided for the section, and this transcluded page must be watched separately. See m:Help:A simple composite example. An \"image\" (in the broad sense of an uploaded file) can be edited, or, more generally, be replaced by a different image, by uploading a new image file with the same name. Again all versions are kept. The image history listing forms part of the image description page, which appears when clicking on the image. The image history consists of this and the old versions themselves.\n\nIt further contains URL-references to images; it is not affected by an image revision, but it is by a deletion. To produce a wikitext version not depending on templates use \"subst:\", if necessary recursively. See also Help:Downloading pages. Special:Export produces an XML-file, without the MediaWiki user interface, with the wikitext of the current and optionally all old versions of one or more specified pages, with date, time, user name, and edit summary. How it is displayed, e.g. with or without XML tags, and with or without applying new lines, depends on the browser. Some browsers show \"+\" and \"-\" links to view or hide selected parts. Alternatively the XML-source can be viewed using the \"view source\" feature of the browser, or after saving the XML file locally, with a program of choice. The feature also allows searching for a text in all versions of one or more specified pages.\nTo view a specific version, click on the &quot;V&quot;. ... an old version with the current version, go to the old version, click &#x27;on the button left button to select the old revision for compare, the newest is clicked on the right b utton by default&#x27;. two specific versions, click the left-column radio ...\n\nA '''Page history of changes''' shows the order in which changes were made to any editable page, the difference between any two versions, and a menu of check boxes for selecting change-types. A Page history of changes\" is sometimes called '''revision history''' or '''edit history'''. It is accessed by clicking the \"History\" button at the top or bottom of the page, a complete separate screen opens under the selected page and its \"page option buttons\". A '''page history''' shows the order in which changes were made to any editable page, the difference between any two versions, and a menu of check boxes for selecting only changes like Show page changes: ... Revisions per page: ( number of lines per page). A Page history of changes\" is sometimes called '''revision history''' or '''edit history'''. It is accessed by clicking the \"History\" button at the top or bottom of the page, a complete separate screen opens under the selected page and its \"page option buttons\".\n\nIf you click on the \"History\" button at the bottom of thi page you will see the starting revision number 0 ( zero) of the 2. April 2015 with the flag \"N\" and my author-id ( and no comment sorry for that). And later the changes are made to this page with tags ( \"A\" ) or source changes \"S\" ) ... All past changes to the page in question are listed in reverse-chronological order. To view a specific version, click on the \"V\". ... an old version with the current version, go to the old version, click 'on the button left button to select the old revision for compare, the newest is clicked on the right b utton by default'. two specific versions, click the left-column radio button of the older version and the right-column radio button of the newer version, ... there will be shown in an extra source window a merge fo the 2 sources with the missing/new/changed test \"underlined\" to view only the \"Source\" of such a revision number - click on the \"S\".\n\nTo undo (revert) your own or someone else's last edit, click on the \"R\" button of the selected revision. you create a ne revision of this page with a new entry in the history and the old content of the selected revision. Edits are shown from newest to oldest. Right from the selection radio buttons you will see for every revision: little flags noticing which changes are made ( New, Source only, Tags a.s.o) The 3 buttons \"V\", \"S\", \"R\" ( View, Show Source, Revert) ... Old revision version can be seen by clicking on the \"V\" of the revision line… but this is not trrue in case of used files or \"includes of other pages\" : because the images of the od version ( their\" files\") can be today changed , deleted, renamed or removed and the same situation can happen with included other pages - their version can be chaned in the meantime. Thanks to \"wikipedia\" - \"history help\" page - the content of history in Wikidot is a little be different to wikipedia, but the sense and need is the same.\nYou made an unexpected or invalid request to the NetBadge login service. Possible reasons include: · You cannot access NetBadge directly. You must first browse a web resource that sends you to NetBadge. If you continue to have problems, then please completely exit your browser and start over\nThis page on how to read an article history is intended as an aid to people who are researching with Wikipedia. Experienced Wikipedians often glean a great deal about articles from looking at the page history and following up to the individual edits that make up that history. This page describes some of these tricks of the trade. The suggestions here apply mostly to substantive articles with a number of contributors. If the page history indicates that the page is entirely or almost entirely the work of one person, you are dealing with a situation more comparable to evaluating an article on someone&#x27;s private web site. First and foremost, the page history tells you something about who has worked on the page, and allows you to examine the successive versions of the article and the differences between them. Usually by looking through the edit history, you can quickly tell who has made ...\nIn the case of the &quot;Beer&quot; article, confusion may arise because version #238028 still links to a &quot;previous version&quot; (to #197646 dated 2002-09-05 13:39:00), and so on, up to the lowest-numbered version #5012 dated 2002-02-04 22:41:54; but if you take notice, the whole block of &quot;previous versions&quot; are all dated later, not earlier, than #238028. And conversely, in the lowest numbered version #5012 (likely the first &quot;Beer&quot; revision to be imported into the database), the link to a &quot;previous version&quot; is grayed, even though there are five versions older in date than 2002-02-04 22:41:54. (Please someone correct or supplement me if I am wrong. There is no much information written about Wikipedia article revision numbers.) --HYC (talk) 00:07, 15 January 2009 (UTC) Is there any way to view page history of deleted pages? - Raziel teatime 19:05, 13 April 2009 (UTC) Some edit summaries are followed by (top).\n\nI'm aware of the fact that the complete revision history of a page can be exported so maybe some outside tool already exist to do this? Does anyone know? A related issue is how quality is assessed. To indicate the quality of the contribution made be the particular author, an extension of the above idea could be to include some statistics on the author-highlighted, old-version view of a page showing which percentage of the highlighted text is still present in the current version. I guess e.g. Wikipedia:Good articles and Wikipedia:WikiProject_Mathematics/Wikipedia_1.0 are also relevant here. How much contributions to wikipedia should count in academia compared to other works (peer reviewed research papers) is a different question. I believe this question will not be addressed seriously, however, if people are prohibited from including work on wikipedia in their list of publications for these technical reasons.\n\nI believe the page history datestamps are mostly accurate, but the revision numbers for very old versions of articles are not reliable because old articles and page histories may have been imported between different servers or computer systems as they were upgraded several times, and not have been always imported in a strict chronological sequence, resulting in discrepancies between the datestamp order and the revision number order. The earliest version of the \"Beer\" article in the page history is version #238028, dated 2001-12-13 07:48:00; versions earlier than that were probably lost or deleted. Note that the edit summary of version #238028 was addition of a Kaiser quote, but the rest of the article is still very dependent upon this book, likely its original source. Seemingly, page histories follow the order of datestamps, while \"previous version\" or \"next version\" diff links follow the order of the revision number.\n\nIn the case of the \"Beer\" article, confusion may arise because version #238028 still links to a \"previous version\" (to #197646 dated 2002-09-05 13:39:00), and so on, up to the lowest-numbered version #5012 dated 2002-02-04 22:41:54; but if you take notice, the whole block of \"previous versions\" are all dated later, not earlier, than #238028. And conversely, in the lowest numbered version #5012 (likely the first \"Beer\" revision to be imported into the database), the link to a \"previous version\" is grayed, even though there are five versions older in date than 2002-02-04 22:41:54. (Please someone correct or supplement me if I am wrong. There is no much information written about Wikipedia article revision numbers.) --HYC (talk) 00:07, 15 January 2009 (UTC) Is there any way to view page history of deleted pages? - Raziel teatime 19:05, 13 April 2009 (UTC) Some edit summaries are followed by (top).\n\nWhen I try to link to the talk page and history page of an article by cutting and pasting the title from the page and putting double square brackets around it (for example, Talk:Spork and Revision history of Spork), the link to the history page does not work. Should this help page explain how to make such a link? Guy Macon 18:20, 17 February 2011 (UTC) Yes, that method won't work - you have to copy and paste the URL from the browser address bar (and use single square brackets). I'll put in a note mentioning it.--Kotniski (talk) 08:23, 18 February 2011 (UTC) It might bear emphasising that the number of bytes, written in parentheses, is to represent the size of a particular version of the article in total. It does not quantify the differences (nor even the commonality) of previous versions (relative to the current revision). This is contrary to the misleading impression one could get by scanning over the heading that \"(xxx) = difference from current version ..\".\n\nIs it possible using MediaiWiki or an external application connected through the MediaWiki API to track the revision history of a particular section or the appearance of a certain word or phrase in the article. For example, on the \"heat pipe\" article someone has changed the section on \"Origins and research in the United States\" and left a comment the talk page as to why he attributes the invention to a different man about 20 years earlier than previously stated (which is correct). However, he has neither properly commented the changes nor signed and dated his talk page entry. I would like to see only changes to the \"Origins ...\" section and/or date the appearance of the words \"Gaugler\", \"Grover\", and \"1944\" in the article. Are there any good tools for this that would avoid doing manual comparison of each version of the article? Bdentremont (talk) 16:08, 4 September 2008 (UTC) ...\n... Enter edit mode by visiting your story page, clicking the three-dot button in the top-right corner and choosing Edit story. In edit mode, click the three-dot button in the top-right corner of the page. From the drop-menu, click Revision history.\n\nRevision history allows you to preview past versions of the post and revert to an earlier version. ... Enter edit mode by visiting your story page, clicking the three-dot button in the top-right corner and choosing Edit story. In edit mode, click the three-dot button in the top-right corner of the page. From the drop-menu, click Revision history. A reverse chronological list of changes to your draft will be available. Click on any of those saved versions to view that version. Click Restore this revision to revert back to this version of the document or cancel. Your story will now be publicly visible as that selected past version."

