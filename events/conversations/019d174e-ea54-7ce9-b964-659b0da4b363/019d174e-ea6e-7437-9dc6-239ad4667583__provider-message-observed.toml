text = "{\"start_timestamp\":\"2026-03-02T01:15:29.843674Z\",\"stop_timestamp\":\"2026-03-02T01:15:30.607884Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":\"toolu_013Q1ksEUVG8uky9bXESstT6\",\"name\":\"conversation_search\",\"input\":{\"max_results\":3,\"query\":\"EMviewer choose your own adventure path playback event model viewer\"},\"message\":\"Looking for relevant chats...\",\"integration_name\":\"Search Past Conversations\",\"integration_icon_url\":\"https://claude.ai/images/icons/conversation_search.png\",\"icon_name\":\"memory\",\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

