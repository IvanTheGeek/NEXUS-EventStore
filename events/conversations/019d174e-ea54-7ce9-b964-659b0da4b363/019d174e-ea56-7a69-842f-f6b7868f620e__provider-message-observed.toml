text = "Here's your placement guide:\n\n**1. Talkyard Limitations Topic**\n- Location: `THE FABRIC → Structure & Organization`\n- Title: `Talkyard Limitations — Observed Facts`\n- Type: Discussion (not wiki — the topic body and each reply are immutable records)\n- Body: paste `talkyard-limitations-topic-body.md`\n- Then add each limitation from `talkyard-limitations-posts.md` as a separate reply, one per limitation — Posts 1 through 5 in order\n- Do NOT convert to wiki — these are facts, not living documents\n\n**2. LOOM Requirements Wiki**\n- Location: `THE FABRIC → Structure & Organization`\n- Title: `LOOM Requirements`\n- Type: Wiki — this is the living document\n- Body: paste `loom-requirements-wiki.md`\n- Pin it alongside the limitations topic\n\n**3. After posting** — go back and add a cross-link in the old `Talkyard Limitations & Custom Forum Requirements` wiki pointing to these new topics, then consider retiring or deleting that old post since it's been superseded by this better structure.\n\nAlso worth creating a LOOM subcategory under DEVELOPMENT now that it has a name — that's where the event model will eventually live."

