[[body.segments]]
kind = "plain_text"
text = "That's a significant architectural insight that elevates Penpot from \"the tool we draw Event Models in\" to \"the source of truth for UI implementation.\"\n\nThe conventional design-to-development gap:\nDesigner creates a screen in a design tool. Developer looks at it and recreates it in code. Two sources of truth immediately — the design and the implementation. They drift from the moment the developer starts typing. Every UI change requires updating both. The design is always aspirational, never authoritative.\n\n**The Penpot SVG insight closes that gap entirely.**\n\nPenpot exports SVG. SVG is a first-class web format. If the Penpot design *is* the UI — the SVG output directly consumed by the application rather than recreated by a developer — then:\n\n- There is one source of truth: the Penpot file\n- Design changes propagate to the UI automatically\n- The developer doesn't recreate the UI, they wire behavior to it\n- The gap between design and implementation structurally cannot exist\n\nCombined with Event Modeling this becomes even more powerful:\n\n- The Event Model defines what commands the UI issues and what projections it consumes\n- Penpot defines what the UI looks like\n- AI wires the two together — binding Penpot SVG elements to commands and projections from the model\n- The human designs both the behavior (Event Model) and the appearance (Penpot)\n- AI implements the connection\n\nThis means NEXUS potentially has **two** design-as-source-of-truth artifacts:\n- **Event Model** (in Penpot) — behavioral source of truth\n- **UI screens** (in Penpot) — visual source of truth\n\nBoth live in the same tool. Both are authoritative. Neither is documentation after the fact.\n\nWorth adding to the checklist as both a NEXUS wiki topic and an Insights topic — it touches the methodology deeply enough to warrant both.\n\n**Checklist additions:**\n- [ ] NEXUS wiki: `Penpot as dual source of truth — Event Model and UI`\n- [ ] NEXUS → Insights: `Penpot SVG as live UI — closing the design-to-implementation gap`\n\nAnd a note to add to the current Event Modeling wiki in the Penpot section before you post it — want me to draft that addition now, or continue and incorporate it into the full post?"

