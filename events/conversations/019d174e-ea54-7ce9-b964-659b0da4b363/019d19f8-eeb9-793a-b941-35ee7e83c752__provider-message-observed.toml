kind = "plain_text"
text = "Add this to the **Penpot section**, replacing the current single paragraph:\n\n```markdown\n## The Tool\n\nPenpot is the current tool for creating Event Models \nwithin NEXUS — an open source, self-hostable design \ntool that produces the visual timeline artifact. \nThe model lives in Penpot; the link to it lives in \nLOGOS; the conversations that shaped it live in \nLOGOS alongside that link.\n\nPenpot has a second role within NEXUS that goes beyond \nEvent Modeling. Penpot exports SVG — a first-class web \nformat. The Penpot design of a screen can be the actual \nUI consumed by the application, not a reference for a \ndeveloper to recreate in code. This makes Penpot the \nsource of truth for both behavior and appearance:\n\n- **Event Model** (in Penpot) — the behavioral source \n  of truth. What commands the UI issues, what \n  projections it consumes.\n- **UI screens** (in Penpot) — the visual source of \n  truth. What the UI looks like, as live SVG consumed \n  directly by the application.\n\nThe conventional design-to-development gap — where a \ndesigner creates a screen and a developer recreates it \nin code, producing two sources of truth that immediately \nbegin to drift — is structurally closed. The Penpot file \nis not aspirational. It is authoritative.\n\nCombined with AI implementation, this means: the human \ndesigns behavior in the Event Model and appearance in \nPenpot screens. AI wires the two together — binding SVG \nelements to commands and projections from the model. \nThe human designs. AI implements the connection.\n\n*See: NEXUS → Insights → Penpot SVG as live UI — \nclosing the design-to-implementation gap.*\n```\n\nThat replaces the entire Penpot section. Everything above and below it stays as drafted."

