[[body.segments]]
kind = "plain_text"
text = " Given that range — software, 3D printing, open source automobile, private AI, homesteading — **DEVELOPMENT** alone starts to feel ambiguous. Is 3D printing \"development\"? Sort of. Is homesteading? Not really.\n\nBut **SOFTWARE DEVELOPMENT** is too narrow in the other direction — it excludes 3D printing and automotive work even though those involve design, iteration, and building.\n\nA few thoughts:\n\n**MAKING** — covers software, 3D printing, automotive, AI. Anything you build or create. Has a maker culture feel that fits.\n\n**BUILDING** — similar, slightly more concrete feeling.\n\n**DEVELOPMENT** — works if you mentally extend it beyond software, but might confuse visitors.\n\n**SOFTWARE DEVELOPMENT** — accurate for that domain specifically, but then 3D printing and automotive need their own peer category anyway.\n\nGiven that 3D printing, automotive, and private AI are all distinct enough to be their own top level domains, maybe the answer is just to be specific:\n\n```\nAPPS\nSOFTWARE DEVELOPMENT\n3D PRINTING\nAUTOMOTIVE\nPRIVATE AI\nHOMESTEAD\nNEIGHBORNET\nAI CHATS\n```\n\nEach domain stands on its own. No forcing things into an artificial container. Someone interested in only one area can ignore the rest entirely.\n\nDoes that feel closer to right?"

