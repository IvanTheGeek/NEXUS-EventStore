text = "Title: README\nURL: https://talkyard.ivanthegeek.com/-70/readme\nSource element: <article>\n---\nHomeNEXUSRefinementsREADMEBy @IvanTheGeek3 hours ago+ ...This category is where the NEXUS methodology gets defined. Each topic here is a single requirement — a concrete, nameable thing that NEXUS as a methodology must address or specify. Requirements come from anywhere: a gap discovered when the methodology didn't have an answer, an ambiguity that forced an undocumented decision, an insight from applying NEXUS to a real project, or a pattern that needs to be made explicit. What a Requirement Topic Contains What it is — a clear statement of the methodological gap or needed definition Why it's needed — the situation that exposed it Acceptance — how you'd know the methodology adequately addresses it Cross-references — links to related requirements, decisions, or project examples What This Is Not This is not a critique of NEXUS. It is the methodology knowing itself — surfacing the places where it is incomplete, ambiguous, or untested, and making them explicit. An undocumented decision is a hidden requirement. Recording it here makes it visible and improvable. Topic Types Idea — a candidate requirement not yet fully understood. A gap has been noticed but the right answer isn't clear. Open for discussion and refinement. Problem — a requirement understood well enough to define. Clear statement, known source, acceptance criteria. Status model: New — captured and understood, design thinking not started Planned — approach is taking shape Started — actively being worked out Done — addressed in the methodology An Idea becomes a Problem when the gap is understood well enough to define what closing it looks like. ReplyChange ...0 repliesOldest first Notifications: Every Post ProgressI@IvanTheGeekpinned this topic 3 hours ago.Reply (discussion)\nTab Context:\n- Executed on tabId: 1803358398\n- Available tabs:\n  • tabId 1803358398: \"README\" (https://talkyard.ivanthegeek.com/-