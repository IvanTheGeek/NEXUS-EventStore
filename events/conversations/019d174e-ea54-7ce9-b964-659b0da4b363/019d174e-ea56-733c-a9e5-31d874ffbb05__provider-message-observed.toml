text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":\"toolu_01WDHCovL5uFj7JpahkaREcb\",\"name\":\"create_file\",\"content\":[{\"type\":\"text\",\"text\":\"File created successfully: /mnt/user-data/outputs/chat-import-pipeline-overview.md\",\"uuid\":\"5a40c75f-1143-4f3f-84cd-7da8e66b77b3\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":\"file\",\"display_content\":{\"type\":\"text\",\"text\":\"File created successfully: /mnt/user-data/outputs/chat-import-pipeline-overview.md\"}}"

