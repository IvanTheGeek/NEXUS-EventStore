text = "Here's your placement guide:\n\n**1. Talkyard Limitations**\n- Location: `THE FABRIC → Structure & Organization`\n- Title: `Talkyard Limitations & Custom Forum Requirements`\n- Type: Wiki\n- Tags: `talkyard-limitation`, `custom-forum-requirement`\n- Pin: Yes\n\n**2. Chat Import Pipeline Overview**\n- Location: `THE FABRIC → Chat Import Pipeline`\n- Title: `Chat Import Pipeline — Overview`\n- Type: Wiki\n- Tags: `import-pipeline`\n- Pin: Yes\n\n**3. Talkyard API & Integration**\n- Location: `THE FABRIC → Talkyard API & Integration`\n- Title: `Talkyard API — Reference & Integration Guide`\n- Type: Wiki\n- Tags: `talkyard-api`\n- Pin: Yes\n\nEach one is the foundational pinned wiki for its subcategory — the first thing someone sees when landing there. Let me know when posted and we'll move to the F# pipeline design."

