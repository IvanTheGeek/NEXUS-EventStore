[[body.segments]]
kind = "plain_text"
text = "So NEXUS currently has: a Start Here wiki and a REQUIREMENTS subcategory. That's the starting point.\n\nHere's an initial structure proposal, keeping Talkyard's one-level subcategory constraint in mind:\n\n---\n\n**NEXUS subcategories:**\n\n**Methodology** — the core methodology documented as wiki topics. What NEXUS is, how it works, its artifacts (Event Model, Paths, Specs), its principles. This is the stable reference layer. Topics here are wikis, not discussions.\n\n**Refinements** — replaces REQUIREMENTS. Where gaps, ambiguities, and extensions discovered through active use get recorded. One topic per finding. This is where the methodology improves itself.\n\n**Tools** — how specific tools plug into NEXUS. Penpot for Event Modeling and visual design. F# as the implementation language. LOGOS as the knowledge system. CORTEX as the AI layer. Each tool gets a wiki topic explaining how it fits and how it's used within the methodology. Not the tools themselves — the interface between the tool and NEXUS.\n\n**Projects** — a lightweight index of projects being built under NEXUS. Each project gets a topic linking to its home category (LaundryLog in APPS, LOGOS in LOGOS, etc.). Not the project work itself — just the NEXUS-level view of what's being built and its current methodology status.\n\n---\n\nThe key distinction worth noting: **Tools** is about the *interface* between a tool and NEXUS, not the tool itself. Penpot's category (if it gets one) would live elsewhere. What lives in NEXUS → Tools is \"here's how Penpot fits into the methodology\" — which ceremonies use it, what artifacts it produces, how those artifacts connect to the next stage.\n\nDoes this shape feel right, or are there aspects of NEXUS you'd structure differently?"

