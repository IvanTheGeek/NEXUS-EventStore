[[body.segments]]
kind = "plain_text"
text = "That's a beautifully event-sourced approach to documentation itself:\n\n```\nTalkyard Limitations topic\n  └── each limitation = a post (the event/fact)\n\nCustom Forum Specs wiki\n  └── projected read model from the limitation events\n  └── links back to specific limitation posts as sources\n  └── living document that updates as new limitations discovered\n```\n\nThe limitation posts are immutable facts — something was observed, it gets recorded. The specs wiki is the current best understanding derived from those facts. New limitation discovered → new post → specs wiki updated to reflect it. Exactly how event sourcing works.\n\nOn **Requirements vs Specs** — they serve different purposes:\n\n**Requirements** — what the system must do, written from a needs perspective. \"The forum must support unlimited subcategory nesting.\" Validates against: does it do this or not?\n\n**Specs** — how the system will fulfill the requirement, more implementation-leaning. \"Categories are stored as a recursive tree structure with parent reference.\" Validates against: is this the right design?\n\nFor where you are now — before any implementation — **Requirements** is the honest term. Specs come later when you're designing how to fulfill them. Though in your framework the line blurs because Event Modeling naturally bridges both.\n\nMy suggestion: call it **Custom Forum Requirements** now, with the understanding it evolves into **Specs** as the event model gets designed.\n\nShall I draft the topic and initial posts structure for the Talkyard Limitations, plus the Requirements wiki seed?"

