[[body.segments]]
kind = "plain_text"
text = " You're right — with real subcategories now available under THE FABRIC, tags for organizational purposes are redundant. The structure does that work instead.\n\nRevised tag thinking — tags should now represent *concepts and cross-cutting concerns* rather than organizational buckets:\n\n- `talkyard-limitation` — marks known limitations for reference when building custom forum\n- `custom-forum-requirement` — requirements that emerge from limitations or needs\n- `import-pipeline` — could still be useful to tag specific posts within Chat Import Pipeline subcategory\n- `ai-integration` — cross-cutting, relevant across multiple categories\n\nSo the updated structure is:\n\n```\nTHE FABRIC (top level)\n  └── Chat Import Pipeline\n  └── Structure & Organization\n  └── Talkyard API & Integration\n```\n\nTags used sparingly for cross-cutting concerns, not for navigation.\n\n**Immediate next steps:**\n\n1. Create the Talkyard Limitations wiki post — lives in **Structure & Organization**, tagged `talkyard-limitation` and `custom-forum-requirement`\n2. Create Chat Import Pipeline overview wiki — lives in **Chat Import Pipeline**\n3. Create Talkyard API overview wiki — lives in **Talkyard API & Integration**\n\nShall I draft all three as markdown files?"

