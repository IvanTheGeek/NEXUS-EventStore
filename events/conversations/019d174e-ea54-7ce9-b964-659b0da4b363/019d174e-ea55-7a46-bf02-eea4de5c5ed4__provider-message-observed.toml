[[body.segments]]
kind = "plain_text"
text = " That makes the relationships clear and consistent. NEXUS documents the *why* and *how things connect*, while the peer categories (Event Modeling, Forum & Knowledge Base) are the deeper knowledge domains for each piece.\n\nSo the pattern is:\n\n- **NEXUS** — how the system interconnects, the methodology, the vision\n- **Event Modeling** — deep knowledge about EM independent of NEXUS\n- **Forum & Knowledge Base** — deep knowledge about the forum as a system, independent of NEXUS\n- **PRIVATE AI** — deep knowledge about the local AI system\n\nEach peer category could have a \"why this is integral to NEXUS\" wiki post that links back to NEXUS, but the detailed knowledge lives in its own space.\n\nFor Forum & Knowledge Base specifically:\n\n```\nDEVELOPMENT\n  └── NEXUS\n  └── Event Modeling\n  └── Forum & Knowledge Base\n        └── Chat Import Pipeline\n        └── Structure & Organization\n        └── Talkyard API & Integration\n```\n\nDoes Forum & Knowledge Base feel like the right name, or would something like **KNOWLEDGE SYSTEMS** or just **FORUM** be more accurate to how you think about it?"

