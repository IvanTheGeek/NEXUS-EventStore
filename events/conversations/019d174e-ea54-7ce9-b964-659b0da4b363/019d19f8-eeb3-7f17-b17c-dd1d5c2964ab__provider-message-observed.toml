[[body.segments]]
kind = "reasoning"
text = "PerDiemLog is more complex than LaundryLog — it has IRS rules, partial day calculations, month-boundary handling, report generation, and calendar views. LaundryLog is simpler.\n\nBut PerDiemLog has more documentation already done, including an event model. That's interesting for the framework.\n\nLet me think about which is better as a first framework case:\n\n- LaundryLog: simpler domain, existing HTML prototype, no event model yet\n- PerDiemLog: more complex, but event model already designed, IRS rules encode well in types, no code yet\n\nFor proving the framework, having the event model already designed for PerDiemLog is actually an advantage — you can focus on the framework mechanics rather than domain design. \n\nThe tradeoff is that PerDiemLog's complexity could obscure the framework's value, whereas LaundryLog would let me demonstrate the full workflow from domain modeling through implementation."

[[body.segments]]
kind = "plain_text"
text = "PerDiemLog is clearly more complex — IRS rules, partial days, month-boundary logic, report generation, calendar view. Significantly more domain complexity than LaundryLog.\n\nThe interesting wrinkle is that PerDiemLog already has the event model designed, which means it's further along conceptually but has zero code. LaundryLog has working HTML but no event model.\n\nFor proving the framework, the tradeoff is:\n\n**LaundryLog** — design the event model *as part of* the framework process (demonstrates the full pipeline from scratch), simpler domain means framework bugs are more obvious, existing prototype gives you a UI target to validate against.\n\n**PerDiemLog** — event model already exists (skip ahead, but miss demonstrating that step), IRS rules are a great showcase of \"hard rules encoded in types,\" but the domain complexity could make it harder to tell if problems are framework or domain.\n\n**My read:** LaundryLog is the better first case precisely because it's small enough that every piece of the framework gets exercised without domain complexity obscuring what's happening. PerDiemLog becomes a strong *second* project where the framework proves it can handle real tax rules.\n\nThe GPS/community location lookup in LaundryLog also gives you a taste of the community data pool concept without the full complexity of finance.\n\nDoes that reasoning land, or does the existing PerDiemLog documentation pull you toward starting there?"

