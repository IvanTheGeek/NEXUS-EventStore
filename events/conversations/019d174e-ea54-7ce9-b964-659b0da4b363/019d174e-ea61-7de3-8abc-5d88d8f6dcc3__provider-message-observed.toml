kind = "plain_text"
text = "On the titles — just strip the prefix, the rest holds up. `Wiki edit history is not accessible`, `Tags are a flat global list with no scoping`, etc. All read cleanly as declarative facts.\n\nOn topic type — good instinct, but worth thinking through what \"Problem\" actually signals in Talkyard before committing. The Problem type typically surfaces a solved/unsolved status indicator on the topic. That creates a question: what does \"solved\" mean for a Talkyard limitation?\n\nThere are two possible readings:\n\n**\"Solved\" means a workaround is in place** — then some of these are solved (#1, #2, #4 workarounds exist) and some aren't (#3 wiki history has no adequate workaround). That's actually meaningful signal.\n\n**\"Solved\" means the limitation itself is gone** — which only happens when Talkyard fixes it or LOGOS replaces it. In that frame nothing is solved yet, and the type would just show everything as open indefinitely.\n\nThe second reading is more honest to the intent — these are immutable facts about an interim platform, not tickets being worked. That pushes back toward keeping them as wiki posts, which signals \"reference record\" rather than \"open issue.\"\n\nBefore changing anything: what type did you create them as? And do you know if Talkyard's Problem type lets you set what \"solved\" means, or is it just a binary open/closed?"

