tpClient = new HttpClient(); var client = new ChromaClient(configOptions, httpClient); Console.WriteLine(await client.GetVersion()); var string5Collection = await client.GetOrCreateCollection(\\u0022string5\\u0022); var string5Client = new ChromaCollectionClient(string5Collection, configOptions, httpClient); await string5Client.Add([\\u0022340a36ad-c38a-406c-be38-250174aee5a4\\u0022], embeddings: [new([1f, 0.5f, 0f, -0.5f, -1f])]); var getResult = await string5Client.Get(\\u0022340a36ad-c38a-406c-be38-250174aee5a4\\u0022, include: ChromaGetInclude.Metadatas | ChromaGetInclude.Documents | ChromaGetInclude.Embeddings); Console.WriteLine($\\u0022ID: {getResult!.Id}\\u0022); var queryData = await string5Client.Query([new([1f, 0.5f, 0f, -0.5f, -1f]), new([1.5f, 0f, 2f, -1f, -1.5f])], include: ChromaQueryInclude.Metadatas | ChromaQueryInclude.Distances); foreach (var item in queryData) { foreach (var entry in item) \\n\\n.NET SDK for Chroma database\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.nuget.org/packages/ChromaDB.Client/1.0.1-ci-13073132114\"}},{\"type\":\"knowledge\",\"title\":\"ChromaClient Class (Microsoft.SemanticKernel.Connectors.Chroma) | Microsoft Learn\",\"url\":\"https://learn.microsoft.com/en-us/dotnet/api/microsoft.semantickernel.connectors.chroma.chromaclient?view=semantic-kernel-dotnet\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Learn\"},\"is_missing\":false,\"text\":\"An implementation of a client for the Chroma Vector DB. This class is used to create, delete, and get embeddings data from Chroma Vector DB instance.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://learn.microsoft.com/en-us/dotnet/api/microsoft.semantickernel.connectors.chroma.chromaclient?view=semantic-kernel-dotnet\"}},{\"type\":\"knowledge\",\"title\":\"GitHub - chroma-core/chroma: Open-source search and retrieval database for AI applications.\",\"url\":\"https://github.com/chroma-core/chroma\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"pip install chromadb # python client # for javascript, npm install chromadb! # for client-server mode, chroma run --path /chroma_db_path \\u00B7 Our hosted service, Chroma Cloud, powers serverless vector and full-text search. It\\u0026#x27;s extremely fast, cost-effective, scalable and painless. Create a DB and try it out in under 30 seconds with $5 of free credits. ... import chromadb # setup Chroma in-memory, for easy prototyping. Can add persistence easily! client = chromadb.Client() # Create collection. get_collection, get_or_create_collection, delete_collection also available! collection = client.create_collection(\\u0026quot;all-my-documents\\u0026quot;) # Add docs to the collection. Can also update and delete. Row-based API coming soon! collection.add( documents=[\\u0026quot;This is document1\\u0026quot;, \\u0026quot;This is document2\\u0026quot;], # we handle tokenization, embedding, and indexing automatically. You can skip that and add your own embeddings as well metadatas=[{\\u0026quot;source\\u0026quot;: \\u0026quot;notion\\u0026quot;}, {\\u0026quot;source\\u0026quot;: \\u0026quot;google-docs\\u0026quot;}], # filter on these!\\n\\nOpen-source search and retrieval database for AI applications. - chroma-core/chroma\\n\\npip install chromadb # python client # for javascript, npm install chromadb! # for client-server mode, chroma run --path /chroma_db_path \\u00B7 Our hosted service, Chroma Cloud, powers serverless vector and full-text search. It\\u0027s extremely fast, cost-effective, scalable and painless. Create a DB and try it out in under 30 seconds with $5 of free credits. ... import chromadb # setup Chroma in-memory, for easy prototyping. Can add persistence easily! client = chromadb.Client() # Create collection. get_collection, get_or_create_collection, delete_collection also available! collection = client.create_collection(\\u0022all-my-documents\\u0022) # Add docs to the collection. Can also update and delete. Row-based API coming soon! collection.add( documents=[\\u0022This is document1\\u0022, \\u0022This is document2\\u0022], # we handle tokenization, embedding, and indexing automatically. You can skip that and add your own embeddings as well metadatas=[{\\u0022source\\u0022: \\u0022notion\\u0022}, {\\u0022source\\u0022: \\u0022google-docs\\u0022}], # filter on these!\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/chroma-core/chroma\"}},{\"type\":\"knowledge\",\"title\":\"Chroma\",\"url\":\"https://www.trychroma.com/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"trychroma.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=trychroma.com\",\"site_name\":\"Chroma\"},\"is_missing\":false,\"text\":\"Chroma\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.trychroma.com/\"}},{\"type\":\"knowledge\",\"title\":\"GitHub - ssone95/ChromaDB.Client: ChromaDB.Client is a .NET SDK that offers a seamless connection to the Chroma database. It allows creating and managing collections, performing CRUD operations, and executing nearest neighbor search and filtering.\",\"url\":\"https://github.com/ssone95/ChromaDB.Client\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"using ChromaDB.Client; var configOptions = new ChromaConfigurationOptions(uri: \\u0026quot;http://localhost:8000/api/v1/\\u0026quot;); using var httpClient = new HttpClient(); var client = new ChromaClient(configOptions, httpClient); Console.WriteLine(await client.GetVersion()); var string5Collection = await client.GetOrCreateCollection(\\u0026quot;string5\\u0026quot;); var string5Client = new ChromaCollectionClient(string5Collection, configOptions, httpClient); await string5Client.Add([\\u0026quot;340a36ad-c38a-406c-be38-250174aee5a4\\u0026quot;], embeddings: [new([1f, 0.5f, 0f, -0.5f, -1f])]); var getResult = await string5Client.Get(\\u0026quot;340a36ad-c38a-406c-be38-250174aee5a4\\u0026quot;, include: ChromaGetInclude.Metadatas | ChromaGetInclude.Documents | ChromaGetInclude.Embeddings); Console.WriteLine($\\u0026quot;ID: {getResult!.Id}\\u0026quot;); var queryData = await string5Client.Query([new([1f, 0.5f, 0f, -0.5f, -1f]), new([1.5f, 0f, 2f, -1f, -1.5f])], include: ChromaQueryInclude.Metadatas | ChromaQueryInclude.Distances); foreach (var item in queryData) { foreach (var entry in item) \\n\\nChromaDB.Client is a .NET SDK that offers a seamless connection to the Chroma database. It allows creating and managing collections, performing CRUD operations, and executing nearest neighbor search and filtering. - ssone95/ChromaDB.Client\\n\\nusing ChromaDB.Client; var configOptions = new ChromaConfigurationOptions(uri: \\u0022http://localhost:8000/api/v1/\\u0022); using var httpClient = new HttpClient(); var client = new ChromaClient(configOptions, httpClient); Console.WriteLine(await client.GetVersion()); var string5Collection = await client.GetOrCreateCollection(\\u0022string5\\u0022); var string5Client = new ChromaCollectionClient(string5Collection, configOptions, httpClient); await string5Client.Add([\\u0022340a36ad-c38a-406c-be38-250174aee5a4\\u0022], embeddings: [new([1f, 0.5f, 0f, -0.5f, -1f])]); var getResult = await string5Client.Get(\\u0022340a36ad-c38a-406c-be38-250174aee5a4\\u0022, include: ChromaGetInclude.Metadatas | ChromaGetInclude.Documents | ChromaGetInclude.Embeddings); Console.WriteLine($\\u0022ID: {getResult!.Id}\\u0022); var queryData = await string5Client.Query([new([1f, 0.5f, 0f, -0.5f, -1f]), new([1.5f, 0f, 2f, -1f, -1.5f])], include: ChromaQueryInclude.Metadatas | ChromaQueryInclude.Distances); foreach (var item in queryData) { foreach (var entry in item) \",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/ssone95/ChromaDB.Client\"}},{\"type\":\"knowledge\",\"title\":\"chromadb - Use chroma (database) local on c# - Stack Overflow\",\"url\":\"https://stackoverflow.com/questions/78767886/use-chroma-database-local-on-c-sharp\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"stackoverflow.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=stackoverflow.com\",\"site_name\":\"Stack Overflow\"},\"is_missing\":false,\"text\":\"Find centralized, trusted content and collaborate around the technologies you use most. Learn more about Collectives ... Connect and share knowledge within a single location that is structured and easy to search. Learn more about Teams ... I want to use chroma in a c# project. I alredy did a python project that stores chroma data local using chromadb.persistenClient. I don\\u0026#x27;t want my data to be stored in an online server but rather local. I tried using multiple forms of Microsofts ChromaClient class which seems to the the only way to use chroma on c# and requires a chroma server endpoint url ... Please post your code. It tends to be rather difficult to spot issues and problems without it! ... Mind that the example connects to an endpoint on the local machine : const string endpoint = \\u0026quot;http://localhost:8000\\u0026quot;; =\\u0026gt; github.com/microsoft/semantic-kernel/tree/main/dotnet/src/\\u2026 , I would guess \\u0026quot;PersistentClient\\u0026quot; does the same under the hood, but I haven\\u0026#x27;t checked.\\n\\nFind centralized, trusted content and collaborate around the technologies you use most. Learn more about Collectives ... Connect and share knowledge within a single location that is structured and easy to search. Learn more about Teams ... I want to use chroma in a c# project. I alredy did a python project that stores chroma data local using chromadb.persistenClient. I don\\u0027t want my data to be stored in an online server but rather local. I tried using multiple forms of Microsofts ChromaClient class which seems to the the only way to use chroma on c# and requires a chroma server endpoint url ... Please post your code. It tends to be rather difficult to spot issues and problems without it! ... Mind that the example connects to an endpoint on the local machine : const string endpoint = \\u0022http://localhost:8000\\u0022; =\\u003E github.com/microsoft/semantic-kernel/tree/main/dotnet/src/\\u2026 , I would guess \\u0022PersistentClient\\u0022 does the same under the hood, but I haven\\u0027t checked.\\n\\nLangChain Chroma - load data from Vector Database \\u00B7 993 \\u00B7 Proper use of \\u0027yield return\\u0027 291 \\u00B7 Mocking HttpClient in unit tests \\u00B7 968 \\u00B7 When to use .First and when to use .FirstOrDefault with LINQ? 1159 \\u00B7 Why would you use Expression\\u003CFunc\\u003CT\\u003E\\u003E rather than Func\\u003CT\\u003E? Load 7 more related questions Show fewer related questions \\u00B7 Sorted by: Reset to default \\u00B7 Highest score (default) Trending (recent votes count more) Date modified (newest first) Date created (oldest first) Start asking to get answers \\u00B7 Find the answer to your question by asking. Ask question \\u00B7 Explore related questions \\u00B7 c# chromadb \\u00B7 See similar questions with these tags. The Overflow Blog \\u00B7 What\\u2019s new at Stack Overflow: November 2025 \\u00B7 To write secure code, be less gullible than your AI \\u00B7 Featured on Meta \\u00B7 Community Asks Sprint Announcement - October/November 2025 \\u00B7 We\\u2019re releasing our proactive anti-spam measure network-wide \\u00B7\\n\\nProbability that four integers can be partitioned into two sets of equal sum \\u00B7 Does an entire flux of neutrinos eventually get absorbed? Do I need pressure treated plywood for carport attic space flooring that will be used to store lumber? ... Book (I think part of a series) where the protagonist visits a convention (I forget what sort), and learns that it\\u0027s actually for eldritch horrors ... Crime series about a mysterious hero offering problem-solving services in exchange for future favors \\u00B7 How do you describe anything spurious, of low quality or anything fake that imitates the original? more hot questions ...\\n\\nTo subscribe to this RSS feed, copy and paste this URL into your RSS reader.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://stackoverflow.com/questions/78767886/use-chroma-database-local-on-c-sharp\"}},{\"type\":\"knowledge\",\"title\":\"Ask .NET Rocks! questions with Semantic Kernel, GPT, and Chroma DB\",\"url\":\"https://www.assemblyai.com/blog/ask-dotnetrocks-questions-semantic-kernel\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"assemblyai.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=assemblyai.com\",\"site_name\":\"AssemblyAI\"},\"is_missing\":false,\"text\":\"The transcripts will be stored in an open-source vector database, Chroma. You\\u0026#x27;ll use OpenAI\\u0026#x27;s GPT models to generate responses to your prompts, and their embeddings model to generate embeddings for the transcripts so they can be stored in the vector database. If you\\u0026#x27;re new to developing with AI, the overview above may be overwhelming. Don\\u0026#x27;t fret, we\\u0026#x27;ll walk you through the process step-by-step. .NET 8 SDK (newer and older versions will work too with small adjustments) ... Git to clone the Chroma DB repository. Docker and Docker Compose to run the Chroma DB docker-compose file. Alternatively, you can use a different vector database supported by Semantic Kernel. ... Sign up for an AssemblyAI account to get an API key for free, or sign into your AssemblyAI account, then grab your API key from the dashboard. You can find the source code for this project on GitHub.\\n\\nDevelop an application that answers questions about .NET Rocks! using Semantic Kernel, GPT models, Chroma DB, and AssemblyAI transcriptions. ... .NET Rocks! is the longest-running podcast about the .NET programming platform. It\\u0027s been around so long that the word podcast wasn\\u0027t even coined yet. In each show, Carl and Richard (the hosts) talk with an expert for an hour. Thus these shows contain a lot of valuable knowledge and insights, but it being audio, it is not easy to extract that data. In this tutorial, you\\u0027ll develop an application that can answer questions about specific .NET Rocks! episodes using AI. To build this application you\\u0027ll use a bunch of technologies: Semantic Kernel is a polyglot LLM framework by Microsoft. You\\u0027ll use Semantic Kernel\\u0027s abstractions to interact with an LLM and store the transcripts in a vector database. You\\u0027ll use AssemblyAI to transcribe the podcasts using the AssemblyAI.SemanticKernel integration.\\n\\nThe transcripts will be stored in an open-source vector database, Chroma. You\\u0027ll use OpenAI\\u0027s GPT models to generate responses to your prompts, and their embeddings model to generate embeddings for the transcripts so they can be stored in the vector database. If you\\u0027re new to developing with AI, the overview above may be overwhelming. Don\\u0027t fret, we\\u0027ll walk you through the process step-by-step. .NET 8 SDK (newer and older versions will work too with small adjustments) ... Git to clone the Chroma DB repository. Docker and Docker Compose to run the Chroma DB docker-compose file. Alternatively, you can use a different vector database supported by Semantic Kernel. ... Sign up for an AssemblyAI account to get an API key for free, or sign into your AssemblyAI account, then grab your API key from the dashboard. You can find the source code for this project on GitHub.\\n\\nOnce you have generated the embeddings for your text, you can store them in a vector database. These vector databases are optimized to store and query embeddings. You can query the database by giving it a string and ask for X amount of documents that are most similar. In this tutorial, you\\u0027re using the open-source vector database, Chroma DB. Here\\u0027s a more in-depth explanation of vector databases on our YouTube channel \\u00B7 In Semantic Kernel you don\\u0027t need to generate embeddings and interact with the vector databases directly. The ISemanticTextMemory abstraction will automatically generate the embeddings and interact with the vector database for you. To generate embeddings, Semantic Kernel will use the service you configured using .WithOpenAITextEmbeddingGeneration. To store and query the embeddings, Semantic Kernel will use the vector database (or other types of storage) that you configured using the MemoryBuilder.\\n\\nHe also became more careful about changing the design of the library to avoid breaking the API and causing headaches for users. ... In this application, we\\u0027re focusing on the happy path, but with generative AI, it\\u0027s hard to predict what the output will be, and thus errors easily surface. You can modify the prompts to get more consistent results, or validate and extract relevant information using regular expressions, or double down on AI by using another prompt to extract data from the generated results. The generative AI space is rapidly evolving and the industry as a whole is still trying to figure out how to best program against these models. You just developed an application that can answer questions about podcasts shows using the RAG pattern. If you try asking a bunch of different questions, you\\u0027ll probably notice that the response isn\\u0027t always great. In some cases, the vector database returns no documents at all because it couldn\\u0027t find anything relevant to the query.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.assemblyai.com/blog/ask-dotnetrocks-questions-semantic-kernel\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 17 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"899646cf-4292-48ec-8767-98dce09f6a10\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

