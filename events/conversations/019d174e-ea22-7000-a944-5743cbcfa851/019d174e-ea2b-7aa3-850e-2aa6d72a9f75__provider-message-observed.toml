text = "The influence is primary to me for where I focus. I will have my own motivations but those will be influenced by people with influence. Kinda the point. But its multifaceted as well using for abilities in the forum for example. Also, feedback in any app I am sharing like LaundyLog can have user options to provide feedback, I wish I could do this, I would prefer this screen had this layout, etc that feed directly in to the forum mix. They would have the ability to create concepts in penpot if so inclined and skilled. Or just create flows and paths from pictures of napkin schetchs in order to convey desires or wants or ideas. The whole system can accommodate any level of expertise, user, knowledge, wants, etc. And since I want to be as transparent as I can be, share everything I can, allow self sufficientcy with self hosting, agpl for everything possible, I am being selfish in serving my own needs and wants for software that I want to use and simultaneously allowing others to use my software or ideas to improve their own world."

