text = "All of these points are valid and in NY mind and intention. Starting out, will be me manually setting priority while we are building out and figuring out and testing. The primary function of the SLM is to provide an English interface with the smallest model possible that is usable, which is arbitrary and opinionated. Then though the process, moving from  it basically asking Claude or others on nearly everything, then training it up, then moving to the verification stage as student, becoming more masterful and ending at the only asking for consulting or for a different view of a problem. Again, the idea is to keep the interface running on the smallest hardware possible but feasible to use."

