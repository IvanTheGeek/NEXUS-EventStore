text = "So in the event modeling I am adding the concept of paths. Developers will talk about the happy path. I see paths as a specific way through the system where certain choices and results were encountered. The choose your own adventure concept. These paths become verification test scenarios. They help with the given-when-then for a slice. Also, from before, the guidance is that a slice once finished is basically not modified, it gets replaced. Code reuse is not done but rather copied. Each slice is its own independent thing with defined contracts at the boundaries."

