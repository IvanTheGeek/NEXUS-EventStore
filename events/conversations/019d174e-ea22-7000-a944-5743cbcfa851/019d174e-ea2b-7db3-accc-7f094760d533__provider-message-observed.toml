text = "telemetry: yes, opt in, user able yo see what is being shared, able to fine grain control, earns influence for providing. \nSimilar for data like redacted and/or anonymized like a sample of a bank statement from x bank or this is how the transaction data can be download. They could choose to share what the line shows on the credit card statement, how they categorized it, what their categories are, all for influence. But also as for some data where they can benefit from community data pools. If they share their categories, that can be analyzed from all sharers and a better list is available to all. Versioning of events and slices is probably the way. Also, that might coordinate with tombstoning."

