kind = "plain_text"
text = "I would to create 2 white paper type artifacts to be able to be able to post on my blog and specifically to share with Adam and martin dilger who have the event modeling vision experience and evangelism.The first with enough detail to be useful for someone reading it. The later for Adam and Martin to really give the understanding of the vision and details. I will link back to this entire chat if they want to see the event log so to speak. Both should have a tldr and then a summery to get a good idea of all the aspects. They should not be sales pitchy. They should reflect the ideals of sharing ideas and plans and mutual cooperation. Detailed enough to really grasp the whole concept. Any questions before you do it?"

