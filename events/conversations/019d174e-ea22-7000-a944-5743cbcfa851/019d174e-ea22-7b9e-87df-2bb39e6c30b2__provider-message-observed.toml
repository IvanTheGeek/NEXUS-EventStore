text = "NPUs (Neural Processing Units) are specialized processors designed to accelerate AI inference tasks, similar to how GPUs accelerate graphics but optimized specifically for neural network operations like matrix multiplications and tensor operations.\n\n**Raspberry Pi 5's AI Capabilities**\n\nThe Raspberry Pi 5 doesn't have a dedicated NPU, but it has improved AI performance through its VideoCore VII GPU, which can accelerate some AI workloads using frameworks like TensorFlow Lite. Performance is modest - suitable for simple vision tasks, basic classification, or small language models, but not for heavy AI workloads.\n\n**Affordable SBCs/Mini PCs with Better AI Acceleration**\n\nFor more serious AI inference on a budget, here are your options organized by capability level:\n\n**Entry Level ($50-150):**\nThe Coral Dev Board or Coral USB Accelerator plugs into existing hardware and provides Google's Edge TPU. This delivers excellent performance for vision models and can run MobileNet-based models at high frame rates. The limitation is it only supports TensorFlow Lite models that have been compiled for the Edge TPU.\n\n**Mid-Range ($150-400):**\nThe Orange Pi 5 Plus includes an NPU (6 TOPS) that can run RKNN models. The Khadas VIM4 has an NPU delivering 8 TOPS. The Jetson Orin Nano (around $300-500 depending on model) offers 20-40 TOPS and excellent software support through NVIDIA's ecosystem, making it particularly good for deploying models you've trained elsewhere.\n\n**Best Performance Under $500:**\nThe Jetson Orin NX gives you 70-100 TOPS and can run surprisingly capable language models locally. This connects directly to your interest in running Phi-4 locally - a Jetson Orin could actually run quantized versions of smaller models like Phi-2 or Phi-3-mini quite effectively.\n\n**Practical Considerations for Your Use Case**\n\nSince you're building AI systems with RAG and exploring local inference, the key question is what you want to run. For embedding generation in your RAG system, even a Coral accelerator could handle that efficiently. For running Phi-4 or similar models locally, you'd want at least a Jetson Orin Nano, though even that would require quantized models (4-bit or 8-bit) to be practical.\n\nThe software ecosystem matters significantly - Jetson has excellent Python support and integrates well with common AI frameworks. The other NPU-equipped boards often require more manual work to deploy models.\n\nWhat specific AI workload are you considering offloading to an NPU-equipped device? That would help narrow down the most practical option for your setup."

