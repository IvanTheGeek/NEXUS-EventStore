kind = "plain_text"
text = "We need to add this to the nexus, you do not have access to that yet, still working on that aspect. I guess when I export all Claude data, it will get ingested at that process.\n\nSo I guess my high priority is to try out and test some potential SLM and see which I want to work off of, then get an interface for it and start using it in the router type mode. \nSeems to me that it learning HOW to pull and package the most efficient AND effective context to submit to Claude is a major aspect. I mentioned before how my concept is that my interaction with that interface would be a sort of continuous moving context window and by the time something falls off the back of that, it will have been ingested and the model has access to it."

