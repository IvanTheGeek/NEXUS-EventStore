text = "There would actually be multiple types of Influence. One of those would be actual money. Individuals can gift other individuals up to $19000 in a year for 2025. Being a gift, I do not have to count for income taxes. If a solopruner wants the tax deduction, they could choose to sponser a product and it could count as advertising or some legitimate business expense. Of course that mean income to one of my micro business and counted in income tax for that corporation, but that is fine. Or official contracts for feature development. There might also be convenience options for having me provide the software a running location and resources like static IPS needed and storage space. But they can always move to their own infrastructure. Practical capitalism."

