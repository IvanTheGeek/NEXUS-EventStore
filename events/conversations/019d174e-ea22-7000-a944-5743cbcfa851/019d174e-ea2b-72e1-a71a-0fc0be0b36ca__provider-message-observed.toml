text = "And now we add in a human centric components. Feedback. And the primary way to organized it is a forum type interface.  It is where community members, friends, users can get help, ask questions, search for answers, suggest improvements, new features , ideas, plus support my influence concept. In addition, community moderation, personal moderation as in this guy is a dirt bag, I do not see you any more or if a cuss word is in a post, the user can highlight and flag or add that word to their list of words to not see. \nQuestion answer threads like stack overflow, wiki's that provide knowledge bases that are probably based on individual posts and answer mark posts, all with traceability to source if desired. Options in the EMviewer for feedback or comments flow in the the forum available for addressing by me or others. Worked through a solution and then send a prompt to ai and it builds the prototype. Just a web of carefully crafted and engineered to a level of excellence, or at least in the making"

