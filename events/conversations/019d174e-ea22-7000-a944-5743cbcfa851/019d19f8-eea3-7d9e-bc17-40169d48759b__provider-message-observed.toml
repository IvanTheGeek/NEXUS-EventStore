text = "So add in the ai being able to create screens in penpot thought the api. Also, being able to not only read the event model, but also create it. We work out a workflow in chat, you created it in penpot, that can be used to create the interactive app, in the app, I realize a missing part of the path, I add it, you can see the addition and update the penpot part, back and forth, all connected and in sync. Plus your notion of using the actual screens is spot on. Instead of using xaml like in avalonia, I am fairly certain after some experiments that the svg exports can be used in Bolero and that IS the ending ui with ux guided by the prototypes paths. Blazor hybrid and the different hosting models allow pretty much the same code base for desktop (with a Community webview for Linux since ms doesn'tsupports it directly) android and iOS and for web, most of what I do will be webassembly which could be also installed as a pwa as an option, or doing conversion to HTML is really needed for the case. The event model interaction app would also be like this."

