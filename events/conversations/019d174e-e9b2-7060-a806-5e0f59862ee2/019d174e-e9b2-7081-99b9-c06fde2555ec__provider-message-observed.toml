text = "No, I can't process videos directly. I can only handle:\n\n**Natively in chat:**\n- Images (PNG, JPG, etc.)\n- Text files (MD, TXT, HTML, CSV)\n- PDFs (as images)\n\n**Via computer tools:**\n- Documents (DOCX, PPTX, XLSX)\n- Code files\n- Other text-based formats\n\n**For videos, you'd need to:**\n- Extract key frames as images and upload those\n- Provide a transcript if it's explanatory content\n- Describe what's happening if you need my input on the content\n\nWere you thinking of sharing a demo video of your MCP server or something else?"

