kind = "tool_result"
text = "Claude Code maintains awareness of your entire project structure, can find up-to-date information from the web, and with MCP can pull from external datasources like Google Drive, Figma, and Slack.\n\nLearn about Claude Code, Anthropic’s agentic coding tool that lives in your terminal and helps you turn ideas into code faster than ever before. ... cd your-project claude You’ll be prompted to log in on first use. That’s it! Continue with Quickstart (5 mins) → · See advanced setup for installation options or troubleshooting if you hit issues. New VS Code Extension (Beta): Prefer a graphical interface? Our new VS Code extension provides an easy-to-use native IDE experience without requiring terminal familiarity. Simply install from the marketplace and start coding with Claude directly in your sidebar. Build features from descriptions: Tell Claude what you want to build in plain English. It will make a plan, write the code, and ensure it works. Debug and fix issues: Describe a bug or paste an error message. Claude Code will analyze your codebase, identify the problem, and implement a fix.\n\nNavigate any codebase: Ask anything about your team’s codebase, and get a thoughtful answer back. Claude Code maintains awareness of your entire project structure, can find up-to-date information from the web, and with MCP can pull from external datasources like Google Drive, Figma, and Slack. Automate tedious tasks: Fix fiddly lint issues, resolve merge conflicts, and write release notes. Do all this in a single command from your developer machines, or automatically in CI. Works in your terminal: Not another chat window. Not another IDE. Claude Code meets you where you already work, with the tools you already love. Takes action: Claude Code can directly edit files, run commands, and create commits. Need more? MCP lets Claude read your design docs in Google Drive, update your tickets in Jira, or use your custom developer tooling. Unix philosophy: Claude Code is composable and scriptable.\nWhile Claude knows common utilities like unix tools and gh, it won&#x27;t know about your custom bash tools without instructions: ... Claude Code functions as both an MCP server and client.\n\nIf the results of this step seem reasonable, you can have Claude create a document or a GitHub issue with its plan so that you can reset to this spot if the implementation (step 3) isn’t what you want. Ask Claude to implement its solution in code. This is also a good place to ask it to explicitly verify the reasonableness of its solution as it implements pieces of the solution. Ask Claude to commit the result and create a pull request. If relevant, this is also a good time to have Claude update any READMEs or changelogs with an explanation of what it just did. Steps #1-#2 are crucial—without them, Claude tends to jump straight to coding a solution. While sometimes that's what you want, asking Claude to research and plan first significantly improves performance for problems requiring deeper thinking upfront. This is an Anthropic-favorite workflow for changes that are easily verifiable with unit, integration, or end-to-end tests.\n\nA blog post covering tips and tricks that have proven effective for using Claude Code across various codebases, languages, and environments.\n\nClaude Code inherits your bash environment, giving it access to all your tools. While Claude knows common utilities like unix tools and gh, it won't know about your custom bash tools without instructions: ... Claude Code functions as both an MCP server and client. As a client, it can connect to any number of MCP servers to access their tools in three ways: In project config (available when running Claude Code in that directory) ... In a checked-in .mcp.json file (available to anyone working in your codebase). For example, you can add Puppeteer and Sentry servers to your .mcp.json, so that every engineer working on your repo can use these out of the box. When working with MCP, it can also be helpful to launch Claude with the --mcp-debug flag to help identify configuration issues. For repeated workflows—debugging loops, log analysis, etc.—store prompt templates in Markdown files within the .claude/commands folder.\n\nPlease analyze and fix the GitHub issue: $ARGUMENTS. Follow these steps: 1. Use `gh issue view` to get the issue details 2. Understand the problem described in the issue 3. Search the codebase for relevant files 4. Implement the necessary changes to fix the issue 5. Write and run tests to verify the fix 6. Ensure code passes linting and type checking 7. Create a descriptive commit message 8. Push and create a PR Remember to use the GitHub CLI (`gh`) for all GitHub-related tasks. ... Putting the above content into .claude/commands/fix-github-issue.md makes it available as the /project:fix-github-issue command in Claude Code. You could then for example use /project:fix-github-issue 1234 to have Claude fix issue #1234. Similarly, you can add your own personal commands to the ~/.claude/commands folder for commands you want available in all of your sessions.\nTell Claude to Do it For You – Simply tell Claude to update the documentation when you’ve finished a big feature or refactor as it has the full context of the work it just finished. You can also automate this with hooks or custom commands (more on this later). Quality and Code Standards – Embed comprehensive quality standards directly in your doc files to ensure consistent code quality. Onboarding New Team Members: New developers can get up to speed by having Claude explain the codebase · When you start a new chat with Claude, it pulls your Claude.md files into its context window. A context window is the maximum amount of text (measured in tokens) a model can consider at once when generating a response. As you chat with it, the conversation history is stored in this context window, along with any other files it reads, code it generates, and tool results.\n\nThis is the true vibe coder mode. Claude works on your code and edits files without waiting for permission. You can tell it to work on a feature and go get coffee while it’s doing that. It will still ask for permissions to run certain bash commands (like installing a package). This is for security reasons, but there’s ways to get around this if you really want to YOLO: Type /permissions to add which commands it can run without asking for permissions · Start claude with the –dangerously-skip-permissions flag to skip all permissions. I would not recommend this unless you’ve set up the advanced documentation and git workflows I describe later. Even on Auto-mode you can stop the process by hitting Esc if you think it’s going off course. The third and final mode is Plan Mode. Instead of jumping straight into code, Claude engages its extended thinking capabilities to create comprehensive strategies.\n\nTell Claude to Do it For You – Simply tell Claude to update the documentation when you’ve finished a big feature or refactor as it has the full context of the work it just finished. You can also automate this with hooks or custom commands (more on this later). Quality and Code Standards – Embed comprehensive quality standards directly in your doc files to ensure consistent code quality. Onboarding New Team Members: New developers can get up to speed by having Claude explain the codebase · When you start a new chat with Claude, it pulls your Claude.md files into its context window. A context window is the maximum amount of text (measured in tokens) a model can consider at once when generating a response. As you chat with it, the conversation history is stored in this context window, along with any other files it reads, code it generates, and tool results.\n\nNote: Anthropic recently increased Sonnet’s context window to 1 million tokens, which they will soon add to Claude Code. That’s the entire works of Shakespeare, but that doesn’t mean you shouldn’t still follow these tips to keep Claude focused. Sub-agents are an advanced way of managing context. They are specialized AI assistants with their own instructions, context windows, and tool permissions. For example, you can set up different sub-agents to review code, test code, and update documentation. ... You ↔ Main Claude (coordinator) ├── Code Reviewer (quality specialist) ├── Test Engineer (testing specialist) └── Documentation Writer (technical writing specialist) As our main Claude builds the feature, it intelligently routes requests to appropriate sub-agents based on context analysis, but you can also call agents explicitly when needed.\n\nSetting up a sub-agent is easy, Claude does it for you! Just use the /agents command, follow the instructions, and tell Claude what kind of sub-agent you need. You’ll see them show up in a new agent folder as markdown files. Feel free to edit these files. This is also a great place to add more context or documentation. For example, you can get very specific about how to run a code review in the subagent, and leave general coding standards for shared documentation. ... --- name: code-reviewer description: Comprehensive code quality and maintainability analysis tools: read, grep, diff, lint_runner --- You are an expert code reviewer: ## Review Priorities (in order): 1. **Logic errors and bugs** that could cause system failures 2. **Security vulnerabilities** and data protection issues 3. **Performance problems** that impact user experience 4. **Maintainability issues** that increase technical debt 5.\nClaude Code documentation, tutorials &amp; best practices from real-world usage. Expert insights, optimization techniques, and searchable knowledge base.\n\nFollowing the failed attempts, I iterated on the CLAUDE.md to refine it into modules of task context, rules, numbered steps and examples which lead Claude to success. This became the foundation for many of the Claude Code best practices and optimization techniques documented in this guide. When it works it is like magic! I proceeded to get it to generate various bits of functionality and some bits repeatedly to see the degree of variance in the implementations which was also fascinating (To be discussed later). I resisted temptation to start generating large projects and solely focused on trying to understand what makes Claude's buttons tick (in terms of reliability and speed) and will be sharing my personal observations and ones garnered from r/ClaudeAI · This log will help you get more value from Claude & Claude Code through practical insights and techniques.\n\nThe no.1 Claude Code community resource. Experiments, insights & mechanics by · InventorBlack, CTO at Command Stick™, Author at WearOS Central and Mod at r/ClaudeAI, home to +360k Claude enthusiasts ... Introduced in v2.0.0, Rewind lets you roll back both Claude's conversation context and code state to previous points. Activate with double escape or /rewind to undo mistakes and explore different approaches fearlessly. Learn more about Rewind · Claude is an AI assistant developed by Anthropic to serve humanity's long-term well-being. Available through web chat, desktop and mobile apps, and API, Claude offers capabilities in coding, research, writing, customer support, and AI agent development. With models like Claude Opus 4.1 and Claude Sonnet 4.5, Claude is committed to responsible AI development with a focus on safety and reliability. ... Skip the setup headaches.\n\nClaude Code is an agentic coding tool that lives in your terminal, understands your codebase, and helps you code faster through natural language commands. By integrating directly with your development environment, Claude Code streamlines your workflow without requiring additional servers or complex setup. ... Terminal Integration: Operates directly in your terminal, understanding project context and taking real actions. Multi-file Capabilities: Makes powerful, multi-file edits with understanding of your codebase and dependencies. Enterprise Integration: Seamlessly connects with Amazon Bedrock or Google Vertex AI for secure, compliant deployments. Git Workflow Management: Reads issues, writes code, runs tests, and submits PRs—all from your terminal. Extended Thinking: Handles complex architectural decisions, challenging bugs, and multi-step implementations.\n\nWhen I first experienced Claude Code, it struck me like a wrecking ball that this technology and the mechanics behind it could fundamentally change everything. Unlike the copy-paste workflows that define most AI coding tools, Claude Code introduced a completely different paradigm where you set tasks, monitor and steer progress in real-time, and review completed work rather than repeatedly manually copy-pasting information to and from the AI's environment. Now the AI's environment integrates directly with your development environment. As a practitioner in product design, invention, HCI design and as the developer of Command Stick™, I really only had one question... ... At Command Stick™ we have developed several bespoke frameworks for functionality and theming, so I thought getting Claude to develop functionality within a novel framework would be a great test!\nConsult the Claude Code reference documentation for details on feature implementation and configuration. Learn about changes and new features in Claude Code. Explore Anthropic’s educational courses and projects. See replicable code samples and implementations. Deployable applications built with our API.\nClaude Code excels at complex, multi-step research workflows: Hypothesis-Driven Research: 1. Formulate a hypothesis 2. Design an approach and select tools 3. Gather supporting evidence 4. Validate findings 5. Generate conclusions ... Selective Tool Loading: - Load only relevant tools for specific research domains - Reduce context usage and improve response times ... # Add ToolUniverse with specific tool filtering claude mcp add tooluniverse-research --scope local -- uv --directory /absolute/path/to/claude_toolu_env run tooluniverse-smcp-stdio --include-tools EuropePMC_search_articles,ChEMBL_search_similar_molecules,openalex_literature_search,search_clinical_trials # Verify the server configuration claude mcp get tooluniverse-research ·\n\nSee: Claude Code MCP documentation for advanced configuration options. For MCP scope management, see: MCP installation scopes. After saving the configuration, verify connectivity: Terminal (Claude Code CLI) - Launch in your project: ... VS Code - Restart VS Code, then open Command Palette and run: “Claude: Open Chat” - Ask: “What ToolUniverse tools are available?” - If tools don’t appear, check .claude/settings.local.json and reload window - For VS Code setup, see: Add Claude Code to your IDE · JetBrains (IntelliJ/PyCharm/etc.) - Restart IDE → open the Claude tool window - Ask: “What ToolUniverse tools are available?” - If tools don’t appear, review Tools → Claude Code → MCP Servers settings - For JetBrains setup, see: Add Claude Code to your IDE · Claude Code with ToolUniverse enables comprehensive drug discovery workflows: Target Identification: - Disease analysis and EFO ID lookup - Target discovery and validation - Literature-based target assessment ·\n\nAuthentication: For OAuth-based MCP servers, use /mcp command in Claude Code chat for secure authentication. Resources: Reference external resources with @server:protocol://path syntax in your prompts. For comprehensive documentation, see: Claude Code documentation.\n\nClaude Code excels at complex, multi-step research workflows: Hypothesis-Driven Research: 1. Formulate a hypothesis 2. Design an approach and select tools 3. Gather supporting evidence 4. Validate findings 5. Generate conclusions ... Selective Tool Loading: - Load only relevant tools for specific research domains - Reduce context usage and improve response times ... # Add ToolUniverse with specific tool filtering claude mcp add tooluniverse-research --scope local -- uv --directory /absolute/path/to/claude_toolu_env run tooluniverse-smcp-stdio --include-tools EuropePMC_search_articles,ChEMBL_search_similar_molecules,openalex_literature_search,search_clinical_trials # Verify the server configuration claude mcp get tooluniverse-research ·\n\nMCP Server Not Loading: - Verify ToolUniverse installation path and absolute paths - Check UV package manager installation - Run claude mcp list to see current servers - Check server logs with claude mcp get tooluniverse - For troubleshooting, see: Claude Code troubleshooting · No Tools Discovered: - Verify the ToolUniverse MCP server command runs locally - Check if your tool filters are too restrictive - Ensure all ToolUniverse dependencies are installed - Use claude doctor for system diagnostics · Tools Not Executing: - Provide required API keys via –env flags when adding the server - Verify network connectivity to external APIs - Check MCP output limits, see: MCP output limits · Tool Selection: Use –include-tools to load only the tools you need for better performance. Status Check: Use claude mcp list and claude mcp get <server> to inspect MCP servers.\nYou can also add custom network configuration to choose what domains Claude Code can connect to from its sandbox. For example, you can allow Claude to download npm packages over the internet so that it can run tests and validate changes. Read our engineering blog and documentation for a deep dive on Claude Code’s sandboxing approach. Claude Code on the web is available now in research preview for Pro and Max users. Visit claude.com/code to connect your first repository and start delegating tasks. Cloud-based sessions share rate limits with all other Claude Code usage. Explore our documentation to learn more. ... No items found. ... Product updates, how-tos, community spotlights, and more. Delivered monthly to your inbox. Thank you! You’re subscribed. Sorry, there was a problem with your submission, please try again later. ... See Claude Code in action—from concept to commit in one seamless workflow.\n\n