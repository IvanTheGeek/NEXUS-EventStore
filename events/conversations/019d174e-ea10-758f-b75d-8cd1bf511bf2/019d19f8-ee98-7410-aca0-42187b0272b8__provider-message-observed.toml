text = "Once I starter regularly encountering the end of chat issue and learning more about the context tokens, I wanted a solution and then each Claude chat brought ideas and improvements. This is in concert with me wanting Claude to understand and help me figure out and use my event modeling vision combined with my app ideas combined with my tech stack ideas and so on. I have this vision that has been worked on and brewing and trying for 20 years, just kept hitting walls and dead ends and along with fundamental blocks and gaps (I love tech,hench IvanTheGeek, just suck at programming and command line, much more a point and click guy). Spending hours googling to do something simple and just getting derailed. A try with  Rider with Junie a few weeks ago gave me the confidence that I can design a system now, it work correctly,completely documented, can be tested, verified, hell, I get this all working as envisioned and we will throw F* (fstar)  in the mix for formal verification! So just each step led to knowing it needs more."

