[[body.segments]]
kind = "plain_text"
text = "Good - then I can be more technical.\n\n**Quantization techniques for LLMs:**\n\n**Symmetric vs Asymmetric:**\n- Symmetric: Maps float range [-α, α] → int range [-127, 127]\n- Asymmetric: Maps float range [min, max] → int range [0, 255]\n- Most 4-bit uses asymmetric with zero-point offset\n\n**Granularity levels:**\n```\nPer-tensor:    One scale factor for entire weight matrix\nPer-channel:   One scale factor per output channel (better quality)\nPer-group:     Scale factor per N values (QLoRA default: groups of 128)\n```\n\n**QLoRA's specific approach:**\n1. Base model → 4-bit NormalFloat (NF4)\n   - Custom data type optimized for normal distribution of weights\n   - Uses lookup table instead of linear quantization\n2. LoRA adapters stay in fp16/bf16 (trainable precision)\n3. During forward pass: dequantize → compute → quantize\n4. Backward pass: only updates fp16 adapters\n\n**Unsloth's \"dynamic 4-bit quants\":**\n- Don't quantize ALL layers to 4-bit\n- Keep sensitive layers (embeddings, some attention) at 16-bit\n- Result: ~10% more VRAM but much better accuracy\n- This is why `unsloth/Phi-4-mini-instruct-bnb-4bit` outperforms naive 4-bit\n\n**Memory calculation for multi-model scenario:**\n```fsharp\n// Naive 4-bit: 3.8B × 0.5 bytes = 1.9GB per model\n// Unsloth dynamic: ~2.1GB per model\n// KV cache during inference: depends on context length\n// 3 models × 2.1GB = ~6.3GB base + KV cache overhead\n```\n\nDoes this help you decide whether to load multiple quantized models vs swapping a single one?"

