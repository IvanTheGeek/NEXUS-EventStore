text = "**Yes to both.**\n\n## Local Fine-tuning\n\nPhi-4 can be fine-tuned locally using Unsloth with LoRA/QLoRA - fits in under 15GB VRAM and is 2x faster\n\n**Popular tools:**\n- **Unsloth** (recommended): Free Google Colab notebook available, works on Tesla T4 16GB GPU\n- **Axolotl**: Full-featured framework\n- **HuggingFace PEFT library**: Direct approach\n\n**LoRA vs QLoRA:**\n- LoRA: 16-bit precision adapter training\n- QLoRA: Combines LoRA with 4-bit quantization - dramatically lowers memory usage\n\n**Example workflow** (conceptual F#):\n```fsharp\n// 1. Load base model with 4-bit quantization\n// 2. Apply LoRA configuration (rank, alpha, target modules)\n// 3. Train on your dataset\n// 4. Save adapter (~100MB) separate from base model (GBs)\n// 5. Merge or load adapter at inference time\n```\n\n## Continue Fine-tuning from Fine-tuned Model\n\n**Yes, multiple approaches:**\n\n1. **Load existing LoRA adapter and continue training:**\n   Load the LoRA adapter with `is_trainable=True` to resume training\n\n2. **Merge then fine-tune again:**\n   Use `merge_and_unload()` to merge adapter with base model, then start new fine-tune\n\n3. **Extract LoRA from merged model:**\n   Use MergeKit to extract LoRA adapters from any fine-tuned model by comparing against base model\n\n**Trade-offs:**\n- Unmerged adapters have slight inference latency; merging eliminates this but loses ability to swap adapters\n- Azure limitation doesn't apply to local approaches\n\n**Hardware requirements:**\n- Phi-4 fine-tuning with Unsloth fits on free Google Colab T4 (16GB)\n- Consumer GPUs with 12-16GB+ work\n\nWant F# code examples or setup specifics for your Linux Mint machine?"

