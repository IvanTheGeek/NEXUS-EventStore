text = "A. LoRA (Low-Rank Adaptation) adapters allow efficient fine-tuning by training only a subset of model parameters instead of the entire model. This reduces computational requirements and memory usage, making it ideal for large models like Phi-4. Q3.\n\nIntroduction to Finetuning LLMsParameter-Efficient Finetuning (PEFT)LORAQLORAusing Unslothusing Huggingface ... Intro to the LangChain EcosystemCore Components of LangChainApplications of LCEL ChainsRAG using LangChainLangGraphLangSmith · Introduction to RAG systemsEvaluation of RAG systems · Getting Started with LlamaIndexComponents of LlamaIndexAdvanced approaches for powerful RAG system · Introduction to Stable DiffusionGenerating image using Stable diffusionDiffusion modelsPrompt Engineering Concepts for Stable DiffusionMidJourneyUnderstanding Dalle 3 · Himanshu Ranjan Last Updated : 20 Feb, 2025 9 min read · Unlocking the power of domain-specific Large Language Models like Microsoft Phi-4 requires the ability to fine-tune these models for specialized tasks. Fine-tuning Phi-4 on custom datasets helps tailor the model to perform optimally in specific domains, such as customer support, medical advice, or technical documentation.\n\nLearn how to fine-tune Microsoft Phi-4 using LoRA adapters for domain-specific tasks. Understand the setup process and configuration for loading Phi-4 efficiently with 4-bit quantization. Gain proficiency in preparing datasets and transforming them for fine-tuning with Hugging Face and unsloth. Master training techniques using Hugging Face’s SFTTrainer to optimize model performance. Explore how to monitor GPU usage and save/upload fine-tuned models to Hugging Face for deployment. This article was published as a part of the Data Science Blogathon. ... Before diving into fine-tuning Phi-4, ensure you have the necessary tools and environment configured. This includes installing Python 3.8+, PyTorch with CUDA support for GPU acceleration, and the unsloth library, along with Hugging Face Transformers and Datasets for seamless dataset handling and model integration.\n\nThis code pushes a model to the Hugging Face Hub, using the LoRA method for efficient saving, and it also includes the associated tokenizer. You would need a valid Hugging Face authentication token (<your_hf_token>) to execute the action successfully. Fine-tuning Microsoft Phi-4 locally and pushing it to Hugging Face allows developers to create highly specialized models efficiently. With tools like Unsloth, LoRA Adapters, and Hugging Face, the process becomes accessible and scalable. Try it out with your dataset today! Fine-tuning Microsoft Phi-4 with LoRA adapters optimizes domain-specific performance while saving computational resources. The Unsloth library simplifies the process of integrating LoRA adapters and working with Hugging Face datasets. Efficient dataset transformation and tokenization are critical for preparing data for fine-tuning Phi-4 on custom tasks.\n\nA. LoRA (Low-Rank Adaptation) adapters allow efficient fine-tuning by training only a subset of model parameters instead of the entire model. This reduces computational requirements and memory usage, making it ideal for large models like Phi-4. Q3. Which libraries and tools are required for fine-tuning Phi-4? A. Key requirements include Python 3.8+, PyTorch with CUDA support, the unsloth library for streamlined workflows, and Hugging Face Transformers and Datasets for dataset handling and training. Q4. How do I handle datasets for fine-tuning? A. Use a dataset like FineTome-100k in ShareGPT format. Convert and standardize the dataset using unsloth utilities to ensure compatibility with Hugging Face’s multi-turn conversation template. Q5. How can I push my fine-tuned model to Hugging Face? A. Save your fine-tuned model and tokenizer locally, then use the .push_to_hub_merged() method from unsloth to upload the model and tokenizer to Hugging Face with your authentication token ...\nPhi-4 finetuning fits with Unsloth in under 15GB of VRAM! It’s also 2x faster, and default uses our dynamic 4-bit quants for superior accuracy! Inference is also natively 2x faster! Try fine-tuning Phi-4 with Unsloth in our free Google Colab Notebook here. To view the rest of our notebooks and model uploads, please visit our documentation. ... 1xWe tested using the Alpaca Dataset, a batch size of 2, gradient accumulation steps of 4, rank = 32, and applied QLoRA on all linear layers (q, k, v, o, gate, up, down). 💕 Thank you! As usual, a huge thank you to everyone for using & sharing Unsloth - we really appreciate it. 🙏 As always, be sure to join our Reddit page and Discord server for help or just to show your support! You can also follow us on Twitter and join our newsletter.\n\nWe also ported Phi-4 directly into a Llama architecture! This allows finetuning to be much more accurate since QKV are unmerged, and gate/up are also unmerged. This allows LoRA finetuning to learn separate A matrices for each. View the uploads are here. ... We uploaded 4-bit bitsandbytes pre-quantized models for 4x faster downloading, however, Unsloth's Dynamic 4-bit quant shows we mustn't quantize all layers. This results in largely increased accuracy while only using 10% more VRAM. A great example of our dynamic quants' effectiveness is through submitting our dynamic 4-bit quants to Hugging Face's OpenLLM Leaderboard. Our 4-bit dynamic quant scored nearly as high as our 16-bit version—and well above standard Bnb 4-bit and Microsoft's official 16-bit model, especially for MMLU. We uploaded our dynamic 4-bit quants which leave some layers in 16-bit here.\n\nPhi-4, Microsoft's new 14B model that performs on par with OpenAI's GPT-4o-mini is now in Unsloth! We found & fixed 4 bugs in Phi-4, greatly increasing the model’s accuracy—details below. We previously worked with Google & Hugging Face for our Gemma bug fixes and Meta with our Llama bug fixes. Unsloth makes Phi-4 finetuning 2x faster, use 70% less memory, and enables >128K context lengths which is 12x longer than Hugging Face + FA2’s 12K on a 48GB GPU. We converted Phi-4 to Llama’s architecture for better accuracy and easier use. We also uploaded fixed Phi-4 GGUFs and dynamic 4-bit quants here. Try fine-tuning via our Phi-4 (14B) Colab Notebook which fits on Google's free Tesla T4 16GB GPU. ... The Phi-4 tokenizer interestingly uses <|endoftext|> as the BOS (beginning of sentence), EOS (end of sentence) and PAD (padding) tokens. The main issue is the EOS token is wrong - it should be <|im_end|>. Otherwise, you will get <|im_end|><|endoftext|> in generations.\n\nThe padding token should be a designated pad token like in Llama (<|finetune_right_pad_id|>) or we can use an untrained token - for example we use <|dummy_87|>. Using the incorrect pad token, can result in infinite generations because the pad token get masked during the loss calculations. Thus, we must use the correct pad token to not accidentally mask out the eos token, since in this case it is the same as the pad token. The Phi-4 tokenizer always adds an assistant prompt - it should only do this if prompted by add_generation_prompt. Most LLM serving libraries expect non auto assistant additions, and this might cause issues during serving. ... Multiple reports from Redditors shows our fixes do in fact work! For example, using the Hugging Face OpenLLM Leaderboard, we see our fixes and Llama-fication of Phi-4 does better or on par with Microsoft’s official Phi-4 model!\nThis significantly reduces the number of parameters that need updating during training. QLoRA (Quantized LoRA) – Combines LoRA with 4-bit quantization of the model weights, enabling efficient fine-tuning of very large models on minimal hardware.\n\nLoRA vs. QLoRA: Which One to Use? ... If you're stuck on if fine-tuning is right for you, see here! Learn about fine-tuning misconceptions, how it compared to RAG and more: Fine-tuning an LLM customizes its behavior, deepens its domain expertise, and optimizes its performance for specific tasks. By refining a pre-trained model (e.g. Llama-3.1-8B) with specialized data, you can: Update Knowledge – Introduce new, domain-specific information that the base model didn’t originally include. Customize Behavior – Adjust the model’s tone, personality, or response style to fit specific needs or a brand voice. Optimize for Tasks – Improve accuracy and relevance on particular tasks or queries your use-case requires. Think of fine-tuning as creating a specialized expert out of a generalist model. Some debate whether to use Retrieval-Augmented Generation (RAG) instead of fine-tuning, but fine-tuning can incorporate knowledge and behaviors directly into the model in ways RAG cannot.\n\nNot at all! While full fine-tuning or pretraining can be costly, these are not necessary (pretraining is especially not necessary). In most cases, LoRA or QLoRA fine-tuning can be done for minimal cost. In fact, with Unsloth’s free notebooks for Colab or Kaggle, you can fine-tune models without spending a dime. Better yet, you can even fine-tune locally on your own device. Instead of choosing between RAG and fine-tuning, consider using both together for the best results. Combining a retrieval system with a fine-tuned model brings out the strengths of each approach. Here’s why: Task-Specific Expertise – Fine-tuning excels at specialized tasks or formats (making the model an expert in a specific area), while RAG keeps the model up-to-date with the latest external knowledge. Better Adaptability – A fine-tuned model can still give useful answers even if the retrieval component fails or returns incomplete information.\n\nWhen it comes to implementing fine-tuning, two popular techniques can dramatically cut down the compute and memory requirements: LoRA and QLoRA. Here’s a quick comparison of each: LoRA (Low-Rank Adaptation) – Fine-tunes only a small set of additional “adapter” weight matrices (in 16-bit precision), while leaving most of the original model unchanged. This significantly reduces the number of parameters that need updating during training. QLoRA (Quantized LoRA) – Combines LoRA with 4-bit quantization of the model weights, enabling efficient fine-tuning of very large models on minimal hardware. By using 4-bit precision where possible, it dramatically lowers memory usage and compute overhead. We recommend starting with QLoRA, as it’s one of the most efficient and accessible methods available. Thanks to Unsloth’s dynamic 4-bit quants, the accuracy loss compared to standard 16-bit LoRA fine-tuning is now negligible.\n\nThere’s no single “best” approach to fine-tuning - only best practices for different scenarios. It’s important to experiment with different methods and configurations to find what works best for your dataset and use case. A great starting point is QLoRA (4-bit), which offers a very cost-effective, resource-friendly way to fine-tune models without heavy computational requirements.🧠LoRA Hyperparameters Guide\nDisabling it enables LoRA 16-bit fine-tuning. You can also enable 16-bit LoRA with load_in_16bit = True · To enable full fine-tuning (FFT), set full_finetuning = True. For 8-bit fine-tuning, set load_in_8bit = True.\n\nIf you're a beginner, it is best to start with a small instruct model like Llama 3.1 (8B) and experiment from there. You'll also need to decide between QLoRA and LoRA training: LoRA: Fine-tunes small, trainable matrices in 16-bit without updating all model weights. QLoRA: Combines LoRA with 4-bit quantization to handle very large models with minimal resources. You can change the model name to whichever model you like by matching it with model's name on Hugging Face e.g. 'unsloth/llama-3.1-8b-unsloth-bnb-4bit'. We recommend starting with Instruct models, as they allow direct fine-tuning using conversational chat templates (ChatML, ShareGPT etc.) and require less data compared to Base models (which uses Alpaca, Vicuna etc). Learn more about the differences between instruct and base models here. Model names ending in unsloth-bnb-4bit indicate they are Unsloth dynamic 4-bit quants.\n\nload_in_4bit = True – Enables 4-bit quantization, reducing memory use 4× for fine-tuning. Disabling it enables LoRA 16-bit fine-tuning. You can also enable 16-bit LoRA with load_in_16bit = True · To enable full fine-tuning (FFT), set full_finetuning = True. For 8-bit fine-tuning, set load_in_8bit = True. Note: Only one training method can be set to True at a time. We recommend starting with QLoRA, as it is one of the most accessible and effective methods for training models. Our dynamic 4-bit quants, the accuracy loss for QLoRA compared to LoRA is now largely recovered. You can also do Text-to-speech (TTS), reasoning (GRPO), vision, reinforcement learning (DPO, ORPO, KTO), continued pretraining, text completion and other training methodologies with Unsloth. Read our detailed guide on choosing the right model:❓What Model Should I Use? For LLMs, datasets are collections of data that can be used to train our models.\n\nFor a complete guide on how hyperparameters affect training, see:🧠LoRA Hyperparameters Guide · We would recommend beginners to utilise our pre-made notebooks first as it's the easiest way to get started with guided steps. However, if installing locally is a must, you can install and use Unsloth via Docker or pip install unsloth - just make sure you have all the right requirements necessary. Also depending on the model and quantization you're using, you'll need enough VRAM and resources. See all the details here:🛠️Unsloth Requirements · Next, you'll need to install Unsloth. Unsloth currently only supports Windows and Linux devices. Once you install Unsloth, you can copy and paste our notebooks and use them in your own local environment. We have many installation methods:📥Install & Update · Once you have everything set, it's time to train!\n\nWe can now save the finetuned model as a small 100MB file called a LoRA adapter like below. You can instead push to the Hugging Face hub as well if you want to upload your model! Remember to get a Hugging Face token via: https://huggingface.co/settings/tokens and add your token! After saving the model, we can again use Unsloth to run the model itself! Use FastLanguageModel again to call it for inference! You've successfully fine-tuned a language model and exported it to your desired inference engine with Unsloth! To learn more about fine-tuning tips and tricks, head over to our blogs which provide tremendous and educational value: https://unsloth.ai/blog/ If you need any help on fine-tuning, you can also join our Discord server here or Reddit r/unsloth.\nBy leveraging LoRA adapters and Unsloth optimizations, we can achieve efficient training with limited resources, making the process accessible even for those with modest computational setups. Fine-tuning enables us to craft highly specialized models that align more closely with specific user needs and behaviors...\n\nI Used Microsoft’s New Phi-4 SLM with unsloth to Predict User Responses (Classification Tasks) — Finetune — Part 2 Fine-tuning a large language model (LLM) involves teaching it new skills or …\n\nThis post provided a detailed guide on using Phi-4’s analysis and synthetic features to fine-tune an LLM. By leveraging LoRA adapters and Unsloth optimizations, we can achieve efficient training with limited resources, making the process accessible even for those with modest computational setups. Fine-tuning enables us to craft highly specialized models that align more closely with specific user needs and behaviors. In the next post, we’ll go into the detail into how the fine-tuned model can be loaded and deployed as inference to accept new prompt with 2 different responses, and returns the prediction results (either Response A or Response B). Stay tuned! ...\n\nThis article is part of a series that builds on my earlier post, “How I Used Microsoft’s New Phi-4 SLM with Unsloth to Predict User Responses (Classification Tasks).” In that post, I gave a walk-through on how Phi-4 can be used to analyze why users might prefer one response over another in response to a query. This analysis serves as the basis for generating new features, which can then be used to fine-tune the Phi-4 model for more accurate prediction of user responses based on the provided queries. If you haven’t read it yet, be sure to check it out here: https://medium.com/@nurmanaz/i-used-googles-new-phi-4-slm-with-unsloth-to-predict-user-responses-classification-tasks-c37cdd88daf5 · In this follow-up, we will go into the detail on how to use the “new features” generated in the previous post to fine-tune Phi-4. Similar to the last post, we will first need to load and import the Unsloth library for an efficient fine-tuning process.\n\nOnce the dataset has prepared in Phi-4 instruction format, you can fine-tune the Phi-4 model using the prepared dataset. The following script demonstrates the process of fine-tuning using the Hugging Face Transformers library integrated with the Unsloth framework. The Trainer class will manage the optimization and training process. from transformers import Trainer, TrainingArguments ·\nLlama 3.2 models &quot;unsloth/Llama-3.2-1B-Instruct-bnb-4bit&quot;, &quot;unsloth/Llama-3.2-3B-bnb-4bit&quot;, &quot;unsloth/Llama-3.2-3B-Instruct-bnb-4bit&quot;, ] # More models at https://docs.unsloth.ai/get-started/all-our-models model, tokenizer = FastLanguageModel.from_pretrained( model_name = &quot;unsloth/Phi-4-mini-instruct-unsloth-bnb-4bit&quot;, max_seq_length = max_seq_length, load_in_4bit = load_in_4bit, # token = &quot;hf_...&quot;, # use one if using gated models like meta-llama/Llama-2-7b-hf ) model = FastLanguageModel.get_peft_model( model, r = 16, # Choose any number &gt; 0 ! Suggested 8, 16, 32, 64, 128 target_modules = [&quot;q_proj&quot;, &quot;k_proj&quot;, &quot;v_proj&quot;, &quot;o_proj&quot;, &quot;gate_proj&quot;, &quot;up_proj&quot;, &quot;down_proj&quot;,], lora_alpha = 16, lora_dropout = 0, # Supports any, but = 0 is optimized bias = &quot;none&quot;, # Supports any, but = &quot;none&quot; is optimized # [NEW] &quot;unsloth&quot; uses 30% less VRAM, fits 2x larger batch sizes!\n\nThis tutorial will guide you through the process of fine-tuning a language model using the Unsloth library. We'll use a pre-trained model and fine-tune it on a custom dataset. Before you start, ensure you have the following installed: Python 3.8 or later PyTorch Unsloth library Hugging Face transformers and datasets libraries You can install the necessary libraries using pip: ... from unsloth import FastLanguageModel import torch from datasets import Dataset, load_dataset from trl import SFTTrainer from transformers import TrainingArguments from unsloth import is_bfloat16_supported · Load a pre-trained model from the Unsloth library.\n\nLlama 3.2 models \"unsloth/Llama-3.2-1B-Instruct-bnb-4bit\", \"unsloth/Llama-3.2-3B-bnb-4bit\", \"unsloth/Llama-3.2-3B-Instruct-bnb-4bit\", ] # More models at https://docs.unsloth.ai/get-started/all-our-models model, tokenizer = FastLanguageModel.from_pretrained( model_name = \"unsloth/Phi-4-mini-instruct-unsloth-bnb-4bit\", max_seq_length = max_seq_length, load_in_4bit = load_in_4bit, # token = \"hf_...\", # use one if using gated models like meta-llama/Llama-2-7b-hf ) model = FastLanguageModel.get_peft_model( model, r = 16, # Choose any number > 0 ! Suggested 8, 16, 32, 64, 128 target_modules = [\"q_proj\", \"k_proj\", \"v_proj\", \"o_proj\", \"gate_proj\", \"up_proj\", \"down_proj\",], lora_alpha = 16, lora_dropout = 0, # Supports any, but = 0 is optimized bias = \"none\", # Supports any, but = \"none\" is optimized # [NEW] \"unsloth\" uses 30% less VRAM, fits 2x larger batch sizes!\n\nmax_seq_length = 2048 load_in_4bit = True model, tokenizer = FastLanguageModel.from_pretrained( model_name=\"unsloth/Phi-4-mini-instruct-unsloth-bnb-4bit\", max_seq_length=max_seq_length, load_in_4bit=load_in_4bit, ) Prepare the model for fine-tuning using PEFT (Parameter-Efficient Fine-Tuning): model = FastLanguageModel.get_peft_model( model, r=16, target_modules=[\"q_proj\", \"k_proj\", \"v_proj\", \"o_proj\", \"gate_proj\", \"up_proj\", \"down_proj\"], lora_alpha=16, lora_dropout=0, bias=\"none\", use_gradient_checkpointing=\"unsloth\", random_state=3407, use_rslora=False, loftq_config=None, ) Load your dataset and format it for training.\n\nmodel.save_pretrained(\"drakidol-Phi-4-lora_model\") tokenizer.save_pretrained(\"drakidol-Phi-4_model\") Test the model by generating responses to prompts: from unsloth.chat_templates import get_chat_template tokenizer = get_chat_template(tokenizer, chat_template=\"phi-4\") FastLanguageModel.for_inference(model) messages = [{\"role\": \"user\", \"content\": \"Continue the fibonnaci sequence: 1, 1, 2, 3, 5, 8,\"}] inputs = tokenizer.apply_chat_template(messages, tokenize=True, add_generation_prompt=True, return_tensors=\"pt\").to(\"cuda\") outputs = model.generate(input_ids=inputs, max_new_tokens=64, use_cache=True, temperature=1.5, min_p=0.1) tokenizer.batch_decode(outputs) from transformers import TextStreamer text_streamer = TextStreamer(tokenizer, skip_prompt=True) _ = model.generate(input_ids=inputs, streamer=text_streamer, max_new_tokens=128, use_cache=True, temperature=1.5, min_p=0.1) This tutorial provides a basic guide to fine-tuning a language model using the Unsloth library.\nThe Unsloth team has collaborated directly with developers behind models like Llama 4, Mistral, Qwen, Gemma, and Phi, often contributing bug fixes and updates that improve prompt handling, accuracy, and overall stability. ... Supports fine-tuning open-weight models like Llama, Mistral, Phi, Gemma, and more. Supports LoRA, QLoRA, full fine-tuning, and even reinforcement learning (DPO, ORPO). Highly customizable: edit chat templates, dataset formats, and training configs as needed. Compatible with inference tools like Ollama, llama.cpp, and vLLM. Runs easily on platforms like Google Colab, Kaggle, and even older consumer GPUs. If you're trying to fine-tune a model on resource-constrained setups, Unsloth is a top choice. It’s built to maximize what you can do with minimal resources. Torchtune is a PyTorch-native library for fine-tuning LLMs. It's built for users who want full control over the training pipeline without relying on high-level abstractions or opaque training frameworks.\n\nUnderstand LLM fine-tuning and different fine-tuning frameworks.\n\nFlexible training options: full fine-tuning, LoRA, QLoRA, ReLoRA, and GPTQ. Compatible with advanced techniques like xFormers, Flash Attention, ROPE scaling, Liger kernel, and sample packing. Scales from single GPU setups to multi-GPU training using FSDP or DeepSpeed. Easy to run locally with Docker or on cloud infrastructure. Axolotl is great for users who want to focus on their data and tasks instead of the details of deep learning internals. With sensible defaults, strong community support, and various integrations, it's a go-to choice for practical fine-tuning of open models. Unsloth is a fine-tuning framework designed to make training LLMs faster, lighter, and more accessible, especially on limited hardware (e.g., free Google Colab GPUs). Unsloth is deeply optimized at the kernel level. Built with a custom attention implementation in Triton, it enables 2× faster training with up to 80% less memory usage.\n\nQuantization and adapter support: 16-bit full-tuning, freeze-tuning, LoRA, and 2–8 bit QLoRA via formats like GPTQ, AWQ, HQQ, and AQLM.\nIs it possible to resume a unsloth QLora Fine tune? If so how?#591 · Copy link · devzzzero · opened · on Jun 5, 2024 · Issue body actions · Hi, I&#x27;m following the instructions on this notebook https://colab.research.google.com/drive/1XamvWYinY6FOSX9GLvnqSjjsNflxdhNc?usp=sharing Apologies for being a TRL newbie. I&#x27;ve gotten it to work on fine tuning, at least for several thousand iterations, when I ran out of memory. I managed to save the LoRA by doing · model.save_pretrained(&quot;lora_model&quot;) # Local saving tokenizer.save_pretrained(&quot;lora_model&quot;) Now, I am reloading the lora_model ... # this is probably not right! model = AutoModelForPeftCausalLM.from_pretrained( &quot;lora_model&quot;, # YOUR MODEL YOU USED FOR TRAINING load_in_4bit = load_in_4bit, ) tokenizer = AutoTokenizer.from_pretrained(&quot;lora_model&quot;) OR · model, tokenizer = FastLanguageModel.from_pretrained( model_name = &quot;lora_model&quot;, # YOUR MODEL YOU USED FOR TRAINING max_seq_length = max_seq_length, dtype = dtype, load_in_4bit = load_in_4bit,\n\nIs it possible to resume a unsloth QLora Fine tune? If so how?#591 · Copy link · devzzzero · opened · on Jun 5, 2024 · Issue body actions · Hi, I'm following the instructions on this notebook https://colab.research.google.com/drive/1XamvWYinY6FOSX9GLvnqSjjsNflxdhNc?usp=sharing Apologies for being a TRL newbie. I've gotten it to work on fine tuning, at least for several thousand iterations, when I ran out of memory. I managed to save the LoRA by doing · model.save_pretrained(\"lora_model\") # Local saving tokenizer.save_pretrained(\"lora_model\") Now, I am reloading the lora_model ... # this is probably not right! model = AutoModelForPeftCausalLM.from_pretrained( \"lora_model\", # YOUR MODEL YOU USED FOR TRAINING load_in_4bit = load_in_4bit, ) tokenizer = AutoTokenizer.from_pretrained(\"lora_model\") OR · model, tokenizer = FastLanguageModel.from_pretrained( model_name = \"lora_model\", # YOUR MODEL YOU USED FOR TRAINING max_seq_length = max_seq_length, dtype = dtype, load_in_4bit = load_in_4bit,\n\nmodel, tokenizer = FastLanguageModel.from_pretrained( model_name = \"lora_model\", # YOUR MODEL YOU USED FOR TRAINING max_seq_length = max_seq_length, dtype = dtype, load_in_4bit = load_in_4bit, ) # I want to resume training, so not setting it to inference # FastLanguageModel.for_inference(model) # Enable native 2x faster inference · Do I need to call `model = FastLanguageModel.get_peft_model(model, ...) again? (I'm guessing not) In traditional pytorch, there is a way to save the current state of the model and reload it later to resume training. Is there a similar facility in unsloth? Do I need to modify any args to SFTTrainer to resume the LoRA/PEFT training? In other words, after step 3 (assuming (3) is the right method to load up the LoRA model, a. trainer = SFTTrainer(... ) # same args as the first time b. trainer_stats = trainer.train() seems to be the right approach.\n# !pip install huggingface_hub hf_transfer import os os.environ[&quot;HF_HUB_ENABLE_HF_TRANSFER&quot;] = &quot;1&quot; from huggingface_hub import snapshot_download snapshot_download( repo_id = &quot;unsloth/Phi-4-mini-reasoning-GGUF&quot;, local_dir = &quot;unsloth/Phi-4-mini-reasoning-GGUF&quot;, allow_patterns = [&quot;*UD-Q4_K_XL*&quot;], ) Run the model in conversational mode in llama.cpp. You must use --jinja in llama.cpp to enable reasoning for the models. This is however not needed if you&#x27;re using the &#x27;mini&#x27; variant. ... ./llama.cpp/llama-cli \\ --model unsloth/Phi-4-mini-reasoning-GGUF/Phi-4-mini-reasoning-UD-Q4_K_XL.gguf \\ --threads -1 \\ --n-gpu-layers 99 \\ --prio 3 \\ --temp 0.8 \\ --top-p 0.95 \\ --jinja \\ --min_p 0.00 \\ --ctx-size 32768 \\ --seed 3407 · Phi-4 fine-tuning for the models are also now supported in Unsloth.\n\nMicrosoft's new Phi-4 reasoning models are now supported in Unsloth. The 'plus' variant performs on par with OpenAI's o1-mini, o3-mini and Sonnet 3.7. The 'plus' and standard reasoning models are 14B parameters while the 'mini' has 4B parameters. All Phi-4 reasoning uploads use our Unsloth Dynamic 2.0 methodology. ... Please ensure you use the correct chat template as the 'mini' variant has a different one. ... <|system|>Your name is Phi, an AI math expert developed by Microsoft.<|end|><|user|>How to solve 3*x^2+4*x+5=1?<|end|><|assistant|> This format is used for general conversation and instructions: ... <|im_start|>system<|im_sep|>You are Phi, a language model trained by Microsoft to help users. Your role as an assistant involves thoroughly exploring questions through a systematic thinking process before providing the final precise and accurate solutions.\n\nTo fine-tune for free on Google Colab, just change the model_name of 'unsloth/Phi-4' to 'unsloth/Phi-4-mini-reasoning' etc.\n\n# !pip install huggingface_hub hf_transfer import os os.environ[\"HF_HUB_ENABLE_HF_TRANSFER\"] = \"1\" from huggingface_hub import snapshot_download snapshot_download( repo_id = \"unsloth/Phi-4-mini-reasoning-GGUF\", local_dir = \"unsloth/Phi-4-mini-reasoning-GGUF\", allow_patterns = [\"*UD-Q4_K_XL*\"], ) Run the model in conversational mode in llama.cpp. You must use --jinja in llama.cpp to enable reasoning for the models. This is however not needed if you're using the 'mini' variant. ... ./llama.cpp/llama-cli \\ --model unsloth/Phi-4-mini-reasoning-GGUF/Phi-4-mini-reasoning-UD-Q4_K_XL.gguf \\ --threads -1 \\ --n-gpu-layers 99 \\ --prio 3 \\ --temp 0.8 \\ --top-p 0.95 \\ --jinja \\ --min_p 0.00 \\ --ctx-size 32768 \\ --seed 3407 · Phi-4 fine-tuning for the models are also now supported in Unsloth.\nQLoRA uses 4-bit precision, reducing VRAM usage by over 75%. LoRA (16-bit) is slightly more accurate and faster. According to empirical experiments and research papers like the original QLoRA paper, it&#x27;s best to apply LoRA to both attention ...\n\nOptimal lora rank. alpha, number of epochs, batch size & gradient accumulation, QLoRA vs LoRA, target modules and more! LoRA hyperparameters are adjustable parameters that control how Low-Rank Adaptation (LoRA) fine-tunes LLMs. With many options (such as learning rate and epochs) and millions of possible combinations, selecting the right values is crucial for achieving accuracy, stability, quality, and fewer hallucinations during fine-tuning. You'll learn the best practices for these parameters, based on insights from hundreds of research papers and experiments, and see how they impact the model. While we recommend using Unsloth's defaults, understanding these concepts will give you full control. The goal is to change hyperparameter numbers to increase accuracy while counteracting overfitting or underfitting. Overfitting occurs when the model memorizes the training data, harming its ability to generalize to new, unseen inputs.\n\nQLoRA: 4-bit fine-tuning. Slightly slower and marginally less accurate, but uses much less VRAM (4× less). 🦥 70B LLaMA fits in <48GB VRAM with QLoRA in Unsloth - more details here. ... Controls the number of trainable parameters in the LoRA adapter matrices. A higher rank increases model capacity but also memory usage. ... Scales the strength of the fine-tuned adjustments in relation to the rank (r). r (standard) or r * 2 (common heuristic). More details here. ... A regularization technique that randomly sets a fraction of LoRA activations to zero during training to prevent overfitting. Not that useful, so we default set it to 0. ... A regularization term that penalizes large weights to prevent overfitting and improve generalization. Don't use too large numbers! ... Gradually increases the learning rate at the start of training. ... Adjusts the learning rate dynamically during training.\n\nTypical Range: 2e-4 (0.0002) to 5e-6 (0.000005). 🟩 For normal LoRA/QLoRA Fine-tuning, we recommend 2e-4 as a starting point. 🟦 For Reinforcement Learning (DPO, GRPO etc.), we recommend 5e-6 . ⬜ For Full Fine-tuning, lower learning rates are generally more appropriate. The number of times the model sees the full training dataset. More Epochs: Can help the model learn better, but a high number can cause it to memorize the training data, hurting its performance on new tasks. Fewer Epochs: Reduces training time and can prevent overfitting, but may result in an undertrained model if the number is insufficient for the model to learn the dataset's underlying patterns. Recommended: 1-3 epochs. For most instruction-based datasets, training for more than 3 epochs offers diminishing returns and increases the risk of overfitting. LoRA uses 16-bit precision, while QLoRA is a 4-bit fine-tuning method.\n\nAccording to the rsLoRA (rank stabilized lora) paper, we should instead scale alpha by the sqrt of the rank. Other options exist, but theoretically this is the optimum. The left plot shows other ranks and their perplexities (lower is better). To enable this, set use_rslora = True in Unsloth. Our recommendation is to set the alpha to equal to the rank, or at least 2 times the rank. This means alpha/rank = 1 or 2. Use: target_modules = [\"q_proj\", \"k_proj\", \"v_proj\", \"o_proj\", \"gate_proj\", \"up_proj\", \"down_proj\",] to target both MLP and attention layers to increase accuracy. QLoRA uses 4-bit precision, reducing VRAM usage by over 75%. LoRA (16-bit) is slightly more accurate and faster. According to empirical experiments and research papers like the original QLoRA paper, it's best to apply LoRA to both attention and MLP layers. The chart shows RougeL scores (higher is better) for different target module configurations, comparing LoRA vs QLoRA.\n<system>You only have 19 searches left this turn</system>"

