[[body.segments]]
kind = "plain_text"
text = "**Quantization** = reducing numerical precision to save memory/computation\n\nBefore I explain the mechanics - do you know what data types like `float32`, `float16`, `int8` represent in terms of memory/precision? That'll help me pitch the explanation right.\n\n**Quick version for now:**\n\nNeural network weights are normally stored as 32-bit floating point numbers (`float32`):\n- 1 parameter = 4 bytes\n- 3.8B parameters × 4 bytes = **~15.2 GB**\n\n**4-bit quantization** compresses each weight to 4 bits:\n- 1 parameter = 0.5 bytes  \n- 3.8B parameters × 0.5 bytes = **~1.9 GB**\n\n**The trade-off:**\n- ✅ 8x smaller model size\n- ✅ Faster inference (less memory bandwidth)\n- ✅ Runs on consumer hardware\n- ⚠️ Slight accuracy loss (usually <2% on benchmarks)\n\n**Why it works:**\nMost weights don't need full precision - the model learns patterns that survive quantization. Techniques like QLoRA use clever tricks to minimize quality loss.\n\n**For your use case:**\n```fsharp\n// unsloth/Phi-4-mini-instruct-bnb-4bit\n// ↑ This \"bnb-4bit\" = bitsandbytes 4-bit quantization\n// Model fits in ~2.5GB instead of ~15GB\n```\n\nDoes this connect to why you were asking about multiple models - trying to fit several in limited VRAM?"

