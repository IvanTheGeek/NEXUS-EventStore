kind = "plain_text"
text = "**Modality** = type/format of data input or output\n\nIn AI/ML context:\n\n**Common modalities:**\n- **Text**: written language, code\n- **Vision/Image**: photos, diagrams, screenshots, video frames\n- **Audio/Speech**: spoken words, music, sounds\n- **Video**: temporal visual sequences\n- **Sensor data**: temperature, motion, GPS coordinates\n\n**Unimodal model**: handles one type\n- GPT-4 (text-only version) → text in, text out\n- DALL-E → text in, image out\n- Whisper → audio in, text out\n\n**Multimodal model**: handles 2+ types\n- Phi-4-multimodal → text/image/audio in, text out\n- GPT-4 with vision → text/image in, text out\n- CLIP → text/image in, embeddings out\n\n**Why it matters for your use case:**\n\nIf your MCP server needs to process:\n- Screenshots from Penpot? → Need vision modality\n- Voice commands? → Need audio modality  \n- Just text/code? → Stick with instruct variant (lighter, faster)\n\nThe term comes from psychology/neuroscience (sensory modalities: sight, hearing, touch, etc.) - borrowed by ML to describe different data channels."

