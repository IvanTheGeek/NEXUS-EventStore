kind = "plain_text"
text = "**mini-reasoning** = mini model trained specifically for **chain-of-thought reasoning**\n\n**Key characteristics:**\n\n1. **Shows its work**: Generates step-by-step reasoning before final answer\n   - Similar to OpenAI's o1/o3 models\n   - Outputs intermediate thinking steps (visible or hidden)\n\n2. **Training approach**: \n   - Trained on problems with full solution paths, not just answers\n   - Learns to break complex problems into sub-steps\n   - Better at multi-hop reasoning, proof generation\n\n3. **Performance vs size trade-off**:\n   - 3.8B params but performs like 7-8B models on math/logic\n   - Achieves this through reasoning scaffolding, not more parameters\n\n**Variant comparison:**\n\n```\nPhi-4-mini-instruct\n└─ General chat, Q&A, instructions\n└─ Fast, broad capabilities\n\nPhi-4-mini-reasoning  \n└─ Math proofs, complex logic, STEM problems\n└─ Slower (generates reasoning steps)\n└─ More accurate on multi-step problems\n\nPhi-4-mini-flash-reasoning\n└─ Same reasoning capability\n└─ Different architecture (hybrid SambaY)\n└─ 2-3x faster inference\n```\n\n**When to use reasoning variants:**\n- Need to verify logic/show work\n- Complex math/coding problems\n- Symbolic computation\n- Trade slower speed for better accuracy on hard problems\n\nFor your MCP server - would you need step-by-step reasoning visibility, or just final answers?"

