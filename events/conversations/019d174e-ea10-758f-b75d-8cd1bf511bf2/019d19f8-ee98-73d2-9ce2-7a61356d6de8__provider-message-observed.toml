ucture. Example: <|system|>You are a helpful assistant with some tools.<|tool|>[{\"name\": \"get_weather_updates\", \"description\": \"Fetches weather updates for a given city using the Rapi\n\nPhi-4-mini’s training data includes a wide variety of sources, totaling 5 trillion tokens, and is a combination of · publicly available documents filtered for quality, selected high-quality educational data, and code · newly created synthetic, “textbook-like” data for the purpose of teaching math, coding, common sense reasoning, general knowledge of the world (e.g., science, daily activities, theory of mind, etc.) high quality chat format supervised data covering various topics to reflect human preferences on different aspects such as instruct-following, truthfulness, honesty and helpfulness. Focus was placed on the quality of data that could potentially improve the reasoning ability for the model, and the publicly available documents were filtered to contain a preferred level of knowledge. As an example, the result of a game in premier league on a particular day might be good training data for frontier models, but such information was removed to leave more model capacity for reasoning\n\nMore details about data can be found in the Phi-4-mini-instruct technical report. The decontamination process involved normalizing and tokenizing the dataset, then generating and comparing n-grams between the target dataset and benchmark datasets. Samples with matching n-grams above a threshold were flagged as contaminated and removed from the dataset. A detailed contamination report was generated, summarizing the matched text, matching ratio, and filtered results for further analysis. A basic example of multi-GPUs supervised fine-tuning (SFT) with TRL and Accelerate modules is provided here. Various evaluation techniques including red teaming, adversarial conversation simulations, and multilingual safety evaluation benchmark datasets were leveraged to evaluate Phi-4 models’ propensity to produce undesirable outputs across multiple languages and risk categories.\nPhi-4 is the latest in Microsoft’s Phi series, designed for lightweight AI applications where efficiency, low latency, and privacy are crucial. The family includes several variants: Phi-4 (14B parameters): A dense decoder-only Transformer with a 16K token context length (extendable to 64K). It is optimized for reasoning in math, science, and coding. Phi-4-mini (3.8B parameters): A compact model with a 128K token context length, ideal for text-based tasks on edge devices. Phi-4-multimodal (5.6B parameters): Integrates text, vision, and speech processing using a Mixture-of-LoRAs architecture for versatile lightweight applications. Phi-4-reasoning and Phi-4-reasoning-plus (14B each): Enhanced for advanced STEM reasoning, suitable for lightweight scientific tools. Phi-4-mini-reasoning (3.8B parameters): Focused on mathematical reasoning for low-resource environments like educational apps.\n\nPhi-4’s compact design is tailored for devices with limited memory and processing power. Phi-4-mini, with just 3.8 billion parameters, achieves 1955 tokens/s throughput on Intel Xeon 6 processors, enabling real-time inference on edge devices like IoT sensors or smartphones. Its low energy consumption aligns with the demand for sustainable AI, making it ideal for battery-powered systems. Phi-4-multimodal, with 5.6 billion parameters, combines text, vision, and speech processing, a rare feat for SLMs. It achieves a 6.14% word error rate on the OpenASR leaderboard, surpassing WhisperV3 and SeamlessM4T-v2 in speech recognition. Its vision capabilities excel in chart analysis, document reasoning, and optical character recognition (OCR), while supporting multilingual text processing. This makes it perfect for lightweight applications like in-car AI or mobile apps requiring context-aware functionality.\n\nDeveloper Tools: Phi-4 facilitates rapid prototyping of AI features like chatbots or code assistants on resource-constrained platforms. ... Language Bias: Trained on 92% English data, its multilingual performance is limited, reducing its effectiveness in global lightweight applications. Factual Accuracy: Knowledge capped at June 2024 can lead to outdated or inaccurate outputs, a challenge for real-time edge applications. Instruction-Following: Some variants struggle with strict formatting, limiting their use in conversational lightweight AI. High-Risk Scenarios: Microsoft advises against using Phi-4 in critical applications (e.g., medical devices) without additional safeguards. Code Limitations: Primarily trained on Python, its performance with other languages may require manual tuning. Phi-4 competes with SLMs like Google’s Gemma (2B-27B), Meta’s Llama 3.2 (1B-3B), and OpenAI’s GPT-4o-mini: Gemma: Gemma’s 27B model is efficient, but Phi-4’s superior MATH and GPQA scores make it better\n\nEfficiency: Phi-4’s low resource requirements make it a top choice for edge and on-device applications, especially Phi-4-mini and Phi-4-multimodal. Performance: Its STEM reasoning benchmarks are unmatched among SLMs, ideal for lightweight technical tools. Versatility: The multimodal variant expands its applicability, though its English-centric training limits global use. Accessibility: Open-sourcing under the MIT License fosters innovation in lightweight AI development. Phi-4’s weaknesses in multilingual support, factual accuracy, and conversational tasks suggest it’s not universally superior. While Phi-4 has the best benchmarks for mathematical reasoning, Llama 3.2 is more practical for multilingual or general-purpose lightweight applications. Our cutting-edge GPU and AI solutions are the perfect match for running Microsoft’s Phi-4 models, delivering the performance and flexibility needed for lightweight AI applications.\nThe model belongs to the Phi-4 model family and supports 128K token context length. The model underwent an enhancement process, incorporating both supervised fine-tuning and direct preference optimization to support precise instruction adherence ...\n\nPhi-4-mini-instruct is a lightweight open model built upon synthetic data and filtered publicly available websites - with a focus on high-quality, reasoning dense data. The model belongs to the Phi-4 model family and supports 128K token context length. The model underwent an enhancement process, incorporating both supervised fine-tuning and direct preference optimization to support precise instruction adherence and robust safety measures. The model is intended for broad multilingual commercial and research use. The model provides uses for general purpose AI systems and applications which require: ... Strong reasoning (especially math and logic).\nFor speech summarization task, we train up to 30-minute audio (22.5k tokens). For other tasks, the maximum audio exposed in training is 30s (375 tokens). If we consider the 128k context length for language decoder, theoretically Phi-4-Multimodal can support a maximum 2.8 hours of audio as out ...\n\nTo unlock the instruction following capability of Phi-4-Multimodal for variety of speech and audio tasks, we continue to train the model with about 100M curated speech and audio SFT samples (after weighted up) as the speech post-training stage. Please refer to Section 3.4.2 for data details. In speech/audio post-training, the audio encoder is frozen. We update the audio projector and ... italic_L italic_o italic_R italic_A start_POSTSUBSCRIPT italic_A end_POSTSUBSCRIPT with a learning rate of 1e-4 for another 50k steps. We consider different maximum audio lengths for different tasks in post-training. For speech summarization task, we train up to 30-minute audio (22.5k tokens). For other tasks, the maximum audio exposed in training is 30s (375 tokens). If we consider the 128k context length for language decoder, theoretically Phi-4-Multimodal can support a maximum 2.8 hours of audio as out of the box inference.\n\nThe Phi-4-Mini series comprises two 