text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"microsoft/Phi-4-mini-instruct \\u00B7 Hugging Face\",\"url\":\"https://huggingface.co/microsoft/Phi-4-mini-instruct\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"huggingface.co\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=huggingface.co\",\"site_name\":\"Hugging Face\"},\"is_missing\":false,\"text\":\"The model belongs to the Phi-4 model family and supports 128K token context length. The model underwent an enhancement process, incorporating both supervised fine-tuning and direct preference optimization to support precise instruction adherence ...\\n\\nPhi-4-mini-instruct is a lightweight open model built upon synthetic data and filtered publicly available websites - with a focus on high-quality, reasoning dense data. The model belongs to the Phi-4 model family and supports 128K token context length. The model underwent an enhancement process, incorporating both supervised fine-tuning and direct preference optimization to support precise instruction adherence and robust safety measures. \\uD83D\\uDCF0 Phi-4-mini Microsoft Blog \\uD83D\\uDCD6 Phi-4-mini Technical Report \\uD83D\\uDC69\\u200D\\uD83C\\uDF73 Phi Cookbook \\uD83C\\uDFE1 Phi Portal \\uD83D\\uDDA5\\uFE0F Try It Azure, Huggingface ... The model is intended for broad multilingual commercial and research use. The model provides uses for general purpose AI systems and applications which require: ... Strong reasoning (especially math and logic). The model is designed to accelerate research on language and multimodal models, for use as a building block for generative AI powered features.\\n\\nPhi-4-mini-instruct supports a vocabulary size of up to 200064 tokens. The tokenizer files already provide placeholder tokens that can be used for downstream fine-tuning, but they can also be extended up to the model\\u0027s vocabulary size. Given the nature of the training data, the Phi-4-mini-instruct model is best suited for prompts using specific formats. Below are the two primary formats: This format is used for general conversation and instructions: \\u003C|system|\\u003EInsert System Message\\u003C|end|\\u003E\\u003C|user|\\u003EInsert User Message\\u003C|end|\\u003E\\u003C|assistant|\\u003E This format is used when the user wants the model to provide function calls based on the given tools. The user should provide the available tools in the system prompt, wrapped by \\u003C|tool|\\u003E and \\u003C|/tool|\\u003E tokens. The tools should be specified in JSON format, using a JSON dump structure. Example: \\u003C|system|\\u003EYou are a helpful assistant with some tools.\\u003C|tool|\\u003E[{\\u0022name\\u0022: \\u0022get_weather_updates\\u0022, \\u0022description\\u0022: \\u0022Fetches weather updates for a given city using the Rapi\\n\\nPhi-4-mini\\u2019s training data includes a wide variety of sources, totaling 5 trillion tokens, and is a combination of \\u00B7 publicly available documents filtered for quality, selected high-quality educational data, and code \\u00B7 newly created synthetic, \\u201Ctextbook-like\\u201D data for the purpose of teaching math, coding, common sense reasoning, general knowledge of the world (e.g., science, daily activities, theory of mind, etc.) high quality chat format supervised data covering various topics to reflect human preferences on different aspects such as instruct-following, truthfulness, honesty and helpfulness. Focus was placed on the quality of data that could potentially improve the reasoning ability for the model, and the publicly available documents were filtered to contain a preferred level of knowledge. As an example, the result of a game in premier league on a particular day might be good training data for frontier models, but such information was removed to leave more model capacity for reasoning\\n\\nMore details about data can be found in the Phi-4-mini-instruct technical report. The decontamination process involved normalizing and tokenizing the dataset, then generating and comparing n-grams between the target dataset and benchmark datasets. Samples with matching n-grams above a threshold were flagged as contaminated and removed from the dataset. A detailed contamination report was generated, summarizing the matched text, matching ratio, and filtered results for further analysis. A basic example of multi-GPUs supervised fine-tuning (SFT) with TRL and Accelerate modules is provided here. Various evaluation techniques including red teaming, adversarial conversation simulations, and multilingual safety evaluation benchmark datasets were leveraged to evaluate Phi-4 models\\u2019 propensity to produce undesirable outputs across multiple languages and risk categories.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://huggingface.co/microsoft/Phi-4-mini-instruct\"}},{\"type\":\"knowledge\",\"title\":\"Phi-4: Best Small Language Model for Lightweight AI? | HorizonIQ\",\"url\":\"https://www.horizoniq.com/blog/phi-4/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"horizoniq.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=horizoniq.com\",\"site_name\":\"HorizonIQ\"},\"is_missing\":false,\"text\":\"Phi-4 is the latest in Microsoft\\u2019s Phi series, designed for lightweight AI applications where efficiency, low latency, and privacy are crucial. The family includes several variants: Phi-4 (14B parameters): A dense decoder-only Transformer with a 16K token context length (extendable to 64K). It is optimized for reasoning in math, science, and coding. Phi-4-mini (3.8B parameters): A compact model with a 128K token context length, ideal for text-based tasks on edge devices. Phi-4-multimodal (5.6B parameters): Integrates text, vision, and speech processing using a Mixture-of-LoRAs architecture for versatile lightweight applications. Phi-4-reasoning and Phi-4-reasoning-plus (14B each): Enhanced for advanced STEM reasoning, suitable for lightweight scientific tools. Phi-4-mini-reasoning (3.8B parameters): Focused on mathematical reasoning for low-resource environments like educational apps.\\n\\nPhi-4\\u2019s compact design is tailored for devices with limited memory and processing power. Phi-4-mini, with just 3.8 billion parameters, achieves 1955 tokens/s throughput on Intel Xeon 6 processors, enabling real-time inference on edge devices like IoT sensors or smartphones. Its low energy consumption aligns with the demand for sustainable AI, making it ideal for battery-powered systems. Phi-4-multimodal, with 5.6 billion parameters, combines text, vision, and speech processing, a rare feat for SLMs. It achieves a 6.14% word error rate on the OpenASR leaderboard, surpassing WhisperV3 and SeamlessM4T-v2 in speech recognition. Its vision capabilities excel in chart analysis, document reasoning, and optical character recognition (OCR), while supporting multilingual text processing. This makes it perfect for lightweight applications like in-car AI or mobile apps requiring context-aware functionality.\\n\\nDeveloper Tools: Phi-4 facilitates rapid prototyping of AI features like chatbots or code assistants on resource-constrained platforms. ... Language Bias: Trained on 92% English data, its multilingual performance is limited, reducing its effectiveness in global lightweight applications. Factual Accuracy: Knowledge capped at June 2024 can lead to outdated or inaccurate outputs, a challenge for real-time edge applications. Instruction-Following: Some variants struggle with strict formatting, limiting their use in conversational lightweight AI. High-Risk Scenarios: Microsoft advises against using Phi-4 in critical applications (e.g., medical devices) without additional safeguards. Code Limitations: Primarily trained on Python, its performance with other languages may require manual tuning. Phi-4 competes with SLMs like Google\\u2019s Gemma (2B-27B), Meta\\u2019s Llama 3.2 (1B-3B), and OpenAI\\u2019s GPT-4o-mini: Gemma: Gemma\\u2019s 27B model is efficient, but Phi-4\\u2019s superior MATH and GPQA scores make it better\\n\\nEfficiency: Phi-4\\u2019s low resource requirements make it a top choice for edge and on-device applications, especially Phi-4-mini and Phi-4-multimodal. Performance: Its STEM reasoning benchmarks are unmatched among SLMs, ideal for lightweight technical tools. Versatility: The multimodal variant expands its applicability, though its English-centric training limits global use. Accessibility: Open-sourcing under the MIT License fosters innovation in lightweight AI development. Phi-4\\u2019s weaknesses in multilingual support, factual accuracy, and conversational tasks suggest it\\u2019s not universally superior. While Phi-4 has the best benchmarks for mathematical reasoning, Llama 3.2 is more practical for multilingual or general-purpose lightweight applications. Our cutting-edge GPU and AI solutions are the perfect match for running Microsoft\\u2019s Phi-4 models, delivering the performance and flexibility needed for lightweight AI applications.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"September 4, 2025\",\"url\":\"https://www.horizoniq.com/blog/phi-4/\"}},{\"type\":\"knowledge\",\"title\":\"phi4-mini\",\"url\":\"https://ollama.com/library/phi4-mini\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"ollama.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=ollama.com\",\"site_name\":\"Ollama\"},\"is_missing\":false,\"text\":\"The model belongs to the Phi-4 model family and supports 128K token context length. The model underwent an enhancement process, incorporating both supervised fine-tuning and direct preference optimization to support precise instruction adherence ...\\n\\nPhi-4-mini-instruct is a lightweight open model built upon synthetic data and filtered publicly available websites - with a focus on high-quality, reasoning dense data. The model belongs to the Phi-4 model family and supports 128K token context length. The model underwent an enhancement process, incorporating both supervised fine-tuning and direct preference optimization to support precise instruction adherence and robust safety measures. The model is intended for broad multilingual commercial and research use. The model provides uses for general purpose AI systems and applications which require: ... Strong reasoning (especially math and logic).\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://ollama.com/library/phi4-mini\"}},{\"type\":\"knowledge\",\"title\":\"Phi-4-Mini Technical Report: Compact yet Powerful Multimodal Language Models via Mixture-of-LoRAs\",\"url\":\"https://arxiv.org/html/2503.01743v1\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"arxiv.org\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=arxiv.org\",\"site_name\":\"arXiv\"},\"is_missing\":false,\"text\":\"For speech summarization task, we train up to 30-minute audio (22.5k tokens). For other tasks, the maximum audio exposed in training is 30s (375 tokens). If we consider the 128k context length for language decoder, theoretically Phi-4-Multimodal can support a maximum 2.8 hours of audio as out ...\\n\\nTo unlock the instruction following capability of Phi-4-Multimodal for variety of speech and audio tasks, we continue to train the model with about 100M curated speech and audio SFT samples (after weighted up) as the speech post-training stage. Please refer to Section 3.4.2 for data details. In speech/audio post-training, the audio encoder is frozen. We update the audio projector and ... italic_L italic_o italic_R italic_A start_POSTSUBSCRIPT italic_A end_POSTSUBSCRIPT with a learning rate of 1e-4 for another 50k steps. We consider different maximum audio lengths for different tasks in post-training. For speech summarization task, we train up to 30-minute audio (22.5k tokens). For other tasks, the maximum audio exposed in training is 30s (375 tokens). If we consider the 128k context length for language decoder, theoretically Phi-4-Multimodal can support a maximum 2.8 hours of audio as out of the box inference.\\n\\nThe Phi-4-Mini series comprises two state-of-the-art small models: a language model (Phi-4-Mini) and a multimodal model (Phi-4-Multimodal) that integrates language, vision, and speech/audio modalities. All Phi-4-Mini models use the tokenizer ... o200k _ base tiktoken 333https://github.com/openai/tiktoken with a vocabulary size of 200,064 intended to support multilingual and multimodal input and output more efficiently. All models are based on decoder-only Transformer [VSP\\u002B17] and support 128K context length based on LongRoPE [DZZ\\u002B24a]. Phi-4-Mini and Phi-4-Multimodal share the same language model backbone. Phi-4-Mini consist of 32 Transformer layers with hidden state size of 3,072 and tied input / output embedding which reduces the memory consumption significantly while providing much wider coverage of vocabularies compared Phi-3.5. Each Transformer block includes an attention mechanism based on Group Query Attention (GQA) [ALTdJ\\u002B23], which optimizes key and value memory (KV cache) usa\\n\\nWe introduce Phi-4-Mini and Phi-4-Multimodal, compact yet highly capable language and multimodal models. Phi-4-Mini is a 3.8-billion-parameter language model trained on high-quality web and synthetic data, significantly outperforming recent open-source models of similar size and matching the performance of models twice its size on math and coding tasks requiring complex reasoning. This achievement is driven by a carefully curated synthetic data recipe emphasizing high-quality math and coding datasets. Compared to its predecessor, Phi-3.5-Mini, Phi-4-Mini features an expanded vocabulary size of 200K tokens to better support multilingual applications, as well as group query attention for more efficient long-sequence generation. Phi-4-Multimodal is a multimodal model that integrates text, vision, and speech/audio input modalities into a single model.\\n\\nThe speech/audio inputs we used are 80-dim log-Mel filter-bank features with the frame rate of 10ms. To enable Phi-4-Multimodal speech and audio functions, we connect a pre-trained audio encoder and Phi-4-Mini through an audio adapter. In addition, LoRA is applied on the language decoder to improve the performance of speech/audio benchmarks while preserving the text capability. The introduced modules for the speech/audio modality include: ... An audio encoder, which consists 3 convolutions layers and 24 conformer blocks [GQC\\u002B20] with 1024 attention dimensions, 1536 feed-forward dimensions, and 16 attention heads. The convolution layers contribute to a sub-sampling rate of 8, and thus 80ms token rate for the language decoder. ... An audio projector, which is a 2-layer MLP that maps the 1024-dim speech features to the text embedding space of 3072 dimensions, similar to the vision projector.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"February 26, 2025\",\"url\":\"https://arxiv.org/html/2503.01743v1\"}},{\"type\":\"knowledge\",\"title\":\"All About Microsoft Phi-4 Multimodal Instruct\",\"url\":\"https://www.analyticsvidhya.com/blog/2025/02/microsoft-phi-4-multimodal/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"analyticsvidhya.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=analyticsvidhya.com\",\"site_name\":\"Analytics Vidhya\"},\"is_missing\":false,\"text\":\"Microsoft has officially expanded its Phi-4 series with the introduction of Phi-4-mini-instruct (3.8B) and Phi-4-multimodal (5.6B), complementing the previously released Phi-4 (14B) model known for its advanced reasoning capabilities. These additions significantly enhance multilingual support, reasoning, and mathematical skills, and introduce multimodal capabilities. This lightweight open multimodal model integrates text, vision, and speech processing, offering seamless interaction across different data formats. With 128K token context length and 5.6B parameters, Phi-4 Multimodal stands out as a powerful tool optimized for both on-device execution and low-latency inference. In this article, we will dig deep into Phi-4-multimodal, a state-of-the-art multimodal small language model (SLM) capable of processing text, vision, and audio inputs. We will also explore practical hands-on implementations, helping developers integrate generative AI into real-world applications.\\n\\nThe tokenizer fuses the information, preparing it for processing by the Phi-4 Mini model. The Phi-4 Mini model, enhanced with LoRA, generates text-based outputs based on multimodal context. ... The benchmarks likely assess the models\\u2019 capabilities in AI2D, ChartQA, DocVQA, and InfoVQA, which are standard datasets for evaluating multimodal models, particularly in visual question-answering (VQA) and document understanding. ... Evaluates reasoning over diagrams and images. Phi-4-multimodal-instruct (68.9) performs better than InternOmni-7B (53.9) and Gemini-2.0-Flash-Lite (62). Gemini-2.0-Flash (69.4) slightly outperforms Phi-4, while Gemini-1.5-Pro (67.7) is slightly lower. ... Focuses on interpreting charts and graphs. Phi-4-multimodal-instruct (69) outperforms all other models. The next closest competitor is InternOmni-7B (56.1), but Gemini-2.0-Flash (51.3) and Gemini-1.5-Pro (46.9) perform significantly worse.\\n\\nPhi-4 performs exceptionally well in tasks that require chart/table understanding and document reasoning, thanks to its ability to synthesize vision and audio inputs. Benchmarks indicate higher accuracy compared to other state-of-the-art multimodal models, particularly in structured data interpretation. ... Processes image inputs and converts them into a sequence of feature representations (tokens). Likely uses a pretrained vision model (e.g., CLIP, Vision Transformer). ... Reduces the number of visual tokens to improve efficiency while preserving information. ... Converts visual tokens into a format compatible with the tokenizer for further processing. ... Processes raw audio and converts it into a sequence of feature tokens. Likely based on a speech-to-text or waveform model (e.g., Wav2Vec2, Whisper). ... Maps audio embeddings into a compatible token space for integration with the language model.\\n\\nUse \\u003Csep\\u003E as a separator between the original transcript and the translation.\\u0022 prompt = f\\u0027{user_prompt}\\u003C|audio_1|\\u003E{speech_prompt}{prompt_suffix}{assistant_prompt}\\u0027 print(f\\u0027\\u003E\\u003E\\u003E Prompt\\\\n{prompt}\\u0027) # Downlowd and open audio file audio, samplerate = sf.read(io.BytesIO(urlopen(audio_url).read())) # Process with the model inputs = processor(text=prompt, audios=[(audio, samplerate)], return_tensors=\\u0027pt\\u0027).to(\\u0027cuda:0\\u0027) generate_ids = model.generate( **inputs, max_new_tokens=1000, generation_config=generation_config, ) generate_ids = generate_ids[:, inputs[\\u0027input_ids\\u0027].shape[1]:] response = processor.batch_decode( generate_ids, skip_special_tokens=True, clean_up_tokenization_spaces=False )[0] print(f\\u0027\\u003E\\u003E\\u003E Response\\\\n{response}\\u0027) ... AI-powered news reporting through real-time speech transcription. Voice-controlled virtual assistants with intelligent interaction. Real-time multilingual audio translation for global communication. ... One of the standout aspects of Phi-4-multimodal is its ability to \",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"February 27, 2025\",\"url\":\"https://www.analyticsvidhya.com/blog/2025/02/microsoft-phi-4-multimodal/\"}},{\"type\":\"knowledge\",\"title\":\"unsloth/Phi-4-mini-instruct-GGUF \\u00B7 Hugging Face\",\"url\":\"https://huggingface.co/unsloth/Phi-4-mini-instruct-GGUF\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"huggingface.co\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=huggingface.co\",\"site_name\":\"Hugging Face\"},\"is_missing\":false,\"text\":\"The model belongs to the Phi-4 model family and supports 128K token context length. The model underwent an enhancement process, incorporating both supervised fine-tuning and direct preference optimization to support precise instruction adherence ...\\n\\nPhi-4-mini-instruct is a lightweight open model built upon synthetic data and filtered publicly available websites - with a focus on high-quality, reasoning dense data. The model belongs to the Phi-4 model family and supports 128K token context length. The model underwent an enhancement process, incorporating both supervised fine-tuning and direct preference optimization to support precise instruction adherence and robust safety measures. \\uD83D\\uDCF0 Phi-4-mini Microsoft Blog \\uD83D\\uDCD6 Phi-4-mini Technical Report \\uD83D\\uDC69\\u200D\\uD83C\\uDF73 Phi Cookbook \\uD83C\\uDFE1 Phi Portal \\uD83D\\uDDA5\\uFE0F Try It Azure, Huggingface \\u00B7 Phi-4: [mini-instruct | onnx]; multimodal-instruct; The model is intended for broad multilingual commercial and research use. The model provides uses for general purpose AI systems and applications which require: ... Strong reasoning (especially math and logic). The model is designed to accelerate research on language and multimodal models, for use as a building block for generative AI powered features.\\n\\nPhi-4-mini-instruct supports a vocabulary size of up to 200064 tokens. The tokenizer files already provide placeholder tokens that can be used for downstream fine-tuning, but they can also be extended up to the model\\u0027s vocabulary size. Given the nature of the training data, the Phi-4-mini-instruct model is best suited for prompts using specific formats. Below are the two primary formats: This format is used for general conversation and instructions: \\u003C|system|\\u003EInsert System Message\\u003C|end|\\u003E\\u003C|user|\\u003EInsert User Message\\u003C|end|\\u003E\\u003C|assistant|\\u003E This format is used when the user wants the model to provide function calls based on the given tools. The user should provide the available tools in the system prompt, wrapped by \\u003C|tool|\\u003E and \\u003C|/tool|\\u003E tokens. The tools should be specified in JSON format, using a JSON dump structure. Example: \\u003C|system|\\u003EYou are a helpful assistant with some tools.\\u003C|tool|\\u003E[{\\u0022name\\u0022: \\u0022get_weather_updates\\u0022, \\u0022description\\u0022: \\u0022Fetches weather updates for a given city using the Rapi\\n\\nPhi-4-mini\\u2019s training data includes a wide variety of sources, totaling 5 trillion tokens, and is a combination of \\u00B7 publicly available documents filtered for quality, selected high-quality educational data, and code \\u00B7 newly created synthetic, \\u201Ctextbook-like\\u201D data for the purpose of teaching math, coding, common sense reasoning, general knowledge of the world (e.g., science, daily activities, theory of mind, etc.) high quality chat format supervised data covering various topics to reflect human preferences on different aspects such as instruct-following, truthfulness, honesty and helpfulness. Focus was placed on the quality of data that could potentially improve the reasoning ability for the model, and the publicly available documents were filtered to contain a preferred level of knowledge. As an example, the result of a game in premier league on a particular day might be good training data for frontier models, but such information was removed to leave more model capacity for reasoning\\n\\nMore details about data can be found in the Phi-4-mini-instruct technical report. The decontamination process involved normalizing and tokenizing the dataset, then generating and comparing n-grams between the target dataset and benchmark datasets. Samples with matching n-grams above a threshold were flagged as contaminated and removed from the dataset. A detailed contamination report was generated, summarizing the matched text, matching ratio, and filtered results for further analysis. A basic example of multi-GPUs supervised fine-tuning (SFT) with TRL and Accelerate modules is provided here. Various evaluation techniques including red teaming, adversarial conversation simulations, and multilingual safety evaluation benchmark datasets were leveraged to evaluate Phi-4 models\\u2019 propensity to produce undesirable outputs across multiple languages and risk categories.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://huggingface.co/unsloth/Phi-4-mini-instruct-GGUF\"}},{\"type\":\"knowledge\",\"title\":\"Phi-4-Mini Technical Report: Compact yet Powerful Multimodal\",\"url\":\"https://arxiv.org/pdf/2503.01743v1\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"arxiv.org\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=arxiv.org\",\"site_name\":\"arXiv\"},\"is_missing\":false,\"text\":\"For other tasks, the \\u00B7 maximum audio exposed in training is 30s (375 tokens). If we consider the 128k context length for \\u00B7 language decoder, theoretically Phi-4-Multimodal can support a maximum 2.8 hours of audio as out \\u00B7 of the box inference. It is worth noting that we have not fine tuned ...\\n\\nfollowing capability of Phi-4-Multimodal for variety of speech and audio tasks, we continue to train \\u00B7 the model with about 100M curated speech and audio SFT samples (after weighted up) as the speech \\u00B7 post-training stage. Please refer to Section 3.4.2 for data details. In speech/audio post-training, the \\u00B7 audio encoder is frozen. We update the audio projector and LoRAA with a learning rate of 1e-4 for \\u00B7 another 50k steps. We consider different maximum audio lengths for different tasks in post-training. For speech summarization task, we train up to 30-minute audio (22.5k tokens). For other tasks, the \\u00B7 maximum audio exposed in training is 30s (375 tokens). If we consider the 128k context length for \\u00B7 language decoder, theoretically Phi-4-Multimodal can support a maximum 2.8 hours of audio as out \\u00B7 of the box inference. It is worth noting that we have not fine tuned the model on such long audio data \\u00B7\\n\\nLoRAs [HSW\\u002B22], Phi-4-Multimodal extends multimodal capabilities while minimizing inter- ference between modalities. This approach enables seamless integration and ensures consistent \\u00B7 performance across tasks involving text, images, and speech/audio. 2. Remarkable Language Performance for the size: The language models achieve state-of- the-art performance in natural language understanding and generation for its size category. It \\u00B7 demonstrates exceptional reasoning and mathematical capabilities, making it well-suited for com- ... cially on multilingual speech recognition and translation tasks, and is the first open-sourced model ... 200,064 intended to support multilingual and multimodal input and output more efficiently. All models \\u00B7 are based on decoder-only Transformer [VSP\\u002B17] and support 128K context length based on LongRoPE ... Phi-4-Mini and Phi-4-Multimodal share the same language model backbone.\\n\\ncompared Phi-3.5. Each Transformer block includes an attention mechanism based on Group Query \\u00B7 Attention (GQA) [ALTdJ\\u002B23], which optimizes key and value memory (KV cache) usage for long-context \\u00B7 generation. Specifically, the model employs 24 query heads and 8 key/value heads, reducing KV cache \\u00B7 consumption to one-third of its standard size. Additionally, in the RoPE configuration [SAL\\u002B24], a \\u00B7 fractional RoPE dimension is used, ensuring that 25% of the attention head dimension remains position- agnostic. This design supports smoother handling of longer contexts. To determine the peak learning \\u00B7 rate, we follow [BBC\\u002B24] with LR\\u2217(D) = BD\\u22120.32 where B is a constant we tune for this specific model \\u00B7 and D is the total number of training tokens. We fit B by tuning across D = 12.5B,25B,37.5B,50B. ... To integrate vision as an input modality, numerous vision-language models have been developed, includ- ing the LLava series [LLWL24, LLL\\u002B24, LZG\\u002B24], QWenVL series [BBY\\u002B23, WBT\\u002B24], InternVL \\n\\nthe existing context, leading to significant performance improvements. ... covering diverse domains and difficulty levels. During sampling, we employ both rule-based and model- based rejection methods to discard incorrect generations and feed them back for resampling. Also, we \\u00B7 label correct sampled answers as preferred generations and incorrect ones as dis-preferred, and create \\u00B7 the DPO data. This data has been utilized exclusively for the experimental reasoning model and has \\u00B7 not been applied to the officially released checkpoint Phi-4-Mini. ... OCR of PDFs and realistic images, and synthesized datasets for chart comprehension. ... phase, the model\\u2019s primary focus is on predicting the next token, concentrating solely on text tokens \\u00B7 and disregarding any loss associated with image tokens. The pre-training process involves a total of \\u00B7 0.5T tokens, combining both visual and textual elements.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://arxiv.org/pdf/2503.01743v1\"}},{\"type\":\"knowledge\",\"title\":\"microsoft/Phi-3-mini-4k-instruct-gguf \\u00B7 Hugging Face\",\"url\":\"https://huggingface.co/microsoft/Phi-3-mini-4k-instruct-gguf\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"huggingface.co\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=huggingface.co\",\"site_name\":\"Hugging Face\"},\"is_missing\":false,\"text\":\"The model belongs to the Phi-3 family with the Mini version in two variants 4K and 128K which is the context length (in tokens) it can support. The model has underwent a post-training process that incorporates both supervised fine-tuning and ...\\n\\nWe\\u2019re on a journey to advance and democratize artificial intelligence through open source and open science.\\n\\nGeneration of Harmful Content: Developers should assess outputs for their context and use available safety classifiers or custom solutions appropriate for their use case. Misuse: Other forms of misuse such as fraud, spam, or malware production may be possible, and developers should ensure that their applications do not violate applicable laws and regulations. Architecture: Phi-3 Mini has 3.8B parameters and is a dense decoder-only Transformer model. The model is fine-tuned with Supervised fine-tuning (SFT) and Direct Preference Optimization (DPO) to ensure alignment with human preferences and safety guidlines. Inputs: Text. It is best suited for prompts using chat format. ... Status: This is a static model trained on an offline dataset with cutoff date October 2023. Future versions of the tuned models may be released as we improve models. Our training data includes a wide variety of sources, totaling 3.3 trillion tokens, and is a combination of \\u00B7\\n\\nWe\\u0027re not able to determine the quantization variants. ... Phi-3 family of small language and multi-modal models. Language models are available in short- and long-context lengths.\\n\\nQuality of Service: the Phi models are trained primarily on English text. Languages other than English will experience worse performance. English language varieties with less representation in the training data might experience worse performance than standard American English. Representation of Harms \\u0026 Perpetuation of Stereotypes: These models can over- or under-represent groups of people, erase representation of some groups, or reinforce demeaning or negative stereotypes. Despite safety post-training, these limitations may still be present due to differing levels of representation of different groups or prevalence of examples of negative stereotypes in training data that reflect real-world patterns and societal biases. Inappropriate or Offensive Content: these models may produce other types of inappropriate or offensive content, which may make it inappropriate to deploy for sensitive contexts without additional mitigations that are specific to the use case.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://huggingface.co/microsoft/Phi-3-mini-4k-instruct-gguf\"}},{\"type\":\"knowledge\",\"title\":\"microsoft/Phi-3-mini-128k-instruct \\u00B7 Hugging Face\",\"url\":\"https://huggingface.co/microsoft/Phi-3-mini-128k-instruct\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"huggingface.co\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=huggingface.co\",\"site_name\":\"Hugging Face\"},\"is_missing\":false,\"text\":\"The model belongs to the Phi-3 family with the Mini version in two variants 4K and 128K which is the context length (in tokens) that it can support. After initial training, the model underwent a post-training process that involved supervised ...\\n\\nThe Phi-3-Mini-128K-Instruct is a 3.8 billion-parameter, lightweight, state-of-the-art open model trained using the Phi-3 datasets. This dataset includes both synthetic data and filtered publicly available website data, with an emphasis on high-quality and reasoning-dense properties. The model belongs to the Phi-3 family with the Mini version in two variants 4K and 128K which is the context length (in tokens) that it can support. After initial training, the model underwent a post-training process that involved supervised fine-tuning and direct preference optimization to enhance its ability to follow instructions and adhere to safety measures. When evaluated against benchmarks that test common sense, language understanding, mathematics, coding, long-term context, and logical reasoning, the Phi-3 Mini-128K-Instruct demonstrated robust and state-of-the-art performance among models with fewer than 13 billion parameters.\\n\\nWe\\u2019re on a journey to advance and democratize artificial intelligence through open source and open science.\\n\\nGeneration of Harmful Content: Developers should assess outputs for their context and use available safety classifiers or custom solutions appropriate for their use case. Misuse: Other forms of misuse such as fraud, spam, or malware production may be possible, and developers should ensure that their applications do not violate applicable laws and regulations. Architecture: Phi-3 Mini-128K-Instruct has 3.8B parameters and is a dense decoder-only Transformer model. The model is fine-tuned with Supervised fine-tuning (SFT) and Direct Preference Optimization (DPO) to ensure alignment with human preferences and safety guidlines. Inputs: Text. It is best suited for prompts using chat format. ... Status: This is a static model trained on an offline dataset with cutoff date October 2023. Future versions of the tuned models may be released as we improve models. Release dates: June, 2024. Our training data includes a wide variety of sources, totaling 4.9 trillion tokens, and is a combination of \\n\\nLong Context: Phi-3 Mini-128K-Instruct supports 128K context length, therefore the model is capable of several long context tasks including long document/meeting summarization, long document QA. We take a closer look at different categories across 100 public benchmark datasets at the table below: Overall, the model with only 3.8B-param achieves a similar level of language understanding and reasoning ability as much larger models. However, it is still fundamentally limited by its size for certain tasks. The model simply does not have the capacity to store too much world knowledge, which can be seen for example with low performance on TriviaQA. However, we believe such weakness can be resolved by augmenting Phi-3-Mini with a search engine. ONNX runtime now supports Phi-3 mini models across platforms and hardware. Optimized phi-3 models are also published here in ONNX format, to run with ONNX Runtime on CPU and GPU across devices, including server platforms, Windows, Linux and Mac desktop\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://huggingface.co/microsoft/Phi-3-mini-128k-instruct\"}},{\"type\":\"knowledge\",\"title\":\"microsoft/Phi-4-multimodal-instruct \\u00B7 Hugging Face\",\"url\":\"https://huggingface.co/microsoft/Phi-4-multimodal-instruct\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"huggingface.co\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=huggingface.co\",\"site_name\":\"Hugging Face\"},\"is_missing\":false,\"text\":\"The model processes text, image, and audio inputs, generating text outputs, and comes with 128K token context length. The model underwent an enhancement process, incorporating both supervised fine-tuning, direct preference optimization and RLHF ...\\n\\nPhi-4-multimodal-instruct is a lightweight open multimodal foundation model that leverages the language, vision, and speech research and datasets used for Phi-3.5 and 4.0 models. The model processes text, image, and audio inputs, generating text outputs, and comes with 128K token context length. The model underwent an enhancement process, incorporating both supervised fine-tuning, direct preference optimization and RLHF (Reinforcement Learning from Human Feedback) to support precise instruction adherence and safety measures. The languages that each modal supports are the following: Text: Arabic, Chinese, Czech, Danish, Dutch, English, Finnish, French, German, Hebrew, Hungarian, Italian, Japanese, Korean, Norwegian, Polish, Portuguese, Russian, Spanish, Swedish, Thai, Turkish, Ukrainian ... \\uD83D\\uDCF0 Phi-4-multimodal Microsoft Blog \\uD83D\\uDCD6 Phi-4-multimodal Technical Report \\uD83C\\uDFE1 Phi Portal \\uD83D\\uDC69\\u200D\\uD83C\\uDF73 Phi Cookbook \\uD83D\\uDDA5\\uFE0F Try It on Azure, GitHub, Nvidia, Huggingface playgrounds \\uD83D\\uDCF1Huggingface Spaces Thoughts Organizer,\\n\\nPhi-4-multimodal-instruct supports a vocabulary size of up to 200064 tokens. The tokenizer files already provide placeholder tokens that can be used for downstream fine-tuning, but they can also be extended up to the model\\u0027s vocabulary size. Given the nature of the training data, the Phi-4-multimodal-instruct model is best suited for prompts using the chat format as follows: This format is used for general conversation and instructions: \\u003C|system|\\u003EYou are a helpful assistant.\\u003C|end|\\u003E\\u003C|user|\\u003EHow to explain Internet for a medieval knight?\\u003C|end|\\u003E\\u003C|assistant|\\u003E This format is used when the user wants the model to provide function calls based on the given tools. The user should provide the available tools in the system prompt, wrapped by \\u003C|tool|\\u003E and \\u003C|/tool|\\u003E tokens. The tools should be specified in JSON format, using a JSON dump structure. Example: \\u003C|system|\\u003EYou are a helpful assistant with some tools.\\u003C|tool|\\u003E[{\\u0022name\\u0022: \\u0022get_weather_updates\\u0022, \\u0022description\\u0022: \\u0022Fetches weather updates for a give\\n\\nResolution depends on the GPU memory size. Higher resolution and more images will produce more tokens, thus using more GPU memory. During training, 64 crops can be supported. If it is a square image, the resolution would be around (8448 by 8448). For multiple-images, at most 64 frames can be supported, but with more frames as input, the resolution of each frame needs to be reduced to fit in the memory. ... Any audio format that can be loaded by soundfile package should be supported. To keep the satisfactory performance, maximum audio length is suggested to be 40s. For summarization tasks, the maximum audio length is suggested to 30 mins. After obtaining the Phi-4-multimodal-instruct model checkpoints, users can use this sample code for inference.\\n\\nPhi-4-multimodal-instruct\\u0027s training data includes a wide variety of sources, totaling 5 trillion text tokens, and is a combination of \\u00B7 publicly available documents filtered for quality, selected high-quality educational data, and code \\u00B7 newly created synthetic, \\u201Ctextbook-like\\u201D data for the purpose of teaching math, coding, common sense reasoning, general knowledge of the world (e.g., science, daily activities, theory of mind, etc.) ... selected high-quality publicly available and anonymized in-house speech data with task-specific supervisions ... Focus was placed on the quality of data that could potentially improve the reasoning ability for the model, and the publicly available documents were filtered to contain a preferred level of knowledge. As an example, the result of a game in premier league on a particular day might be good training data for large foundation models, but such information was removed for the Phi-4-multimodal-instruct to leave more model capacity for reasoning fo\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://huggingface.co/microsoft/Phi-4-multimodal-instruct\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"9222694a-3eb3-403c-a305-fdfc03e57f23\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

