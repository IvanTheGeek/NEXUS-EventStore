text = "Yes. **Phi-4-mini-instruct supports 128K token context length** - significantly larger than the full-size Phi-4.\n\n**Context length comparison:**\n- Phi-4 (14B): 16K tokens (extendable to 64K)\n- Phi-4-mini-instruct (3.8B): 128K tokens\n- Phi-4-mini-flash-reasoning (3.8B): 64K tokens\n- Phi-4-mini-reasoning (3.8B): 64K tokens\n- Phi-4-multimodal (5.6B): 128K tokens\n\nAll models use LongRoPE for extended context support. The mini versions actually have **larger** context windows than the standard 14B model, making them better for long-document tasks despite fewer parameters."

