text = "Yes. Microsoft provides **Azure AI Foundry** (formerly Azure AI Studio) for fine-tuning Phi models.\n\n**Key offerings:**\n\n1. **Serverless fine-tuning**: Available for Phi-3-mini, Phi-3-medium, and Phi-4-mini-instruct models - no compute management required\n\n2. **Supported technique**: Supervised Fine-Tuning (SFT) - trains on input-output pairs for most use cases including domain specialization, task performance, and instruction-following\n\n3. **Training data format**: JSONL files with input/output examples\n\n4. **Access methods**:\n   - Azure AI Foundry portal UI\n   - REST API\n   - Python SDK\n\n**Practical workflow:**\n```fsharp\n// Conceptual F# approach (Azure SDK)\n// 1. Prepare training data (JSONL)\n// 2. Submit fine-tuning job via Azure SDK\n// 3. Deploy fine-tuned model\n// 4. Use via serverless API or ONNX export\n```\n\n**Resources:**\n- Official Phi Cookbook on GitHub has fine-tuning examples\n- Full documentation at Azure AI Foundry fine-tuning docs\n\n**Note**: You can't continue fine-tuning from an already fine-tuned model - must start from base model each time\n\nNeed specifics on data preparation format or deployment after fine-tuning?"

