text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Fine-tune Phi-3 models in Azure AI Foundry portal\",\"url\":\"https://learn.microsoft.com/en-us/azure/ai-studio/how-to/fine-tune-phi-3\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Learn\"},\"is_missing\":false,\"text\":\"This example uses a Phi-4-mini-instruct model. In this code snippet, the model ID property of the model is passed as input to the fine tuning job. This is also available as the Asset ID field in model details page in the Azure AI Foundry Model Catalog. model_name = \\u0026quot;Phi-4-mini-instruct\\u0026quot; model_to_finetune = registry_ml_client.models.get(model_name, label=\\u0026quot;latest\\u0026quot;) print( \\u0026quot;\\\\n\\\\nUsing model name: {0}, version: {1}, id: {2} for fine tuning\\u0026quot;.format( model_to_finetune.name, model_to_finetune.version, model_to_finetune.id ) ) Prepare your training and validation data to fine-tune your model. Your training and validation data consist of input and output examples for how you would like the model to perform. Make sure all your training examples follow the expected format for inference. To fine-tune models effectively, ensure a diverse dataset by maintaining data balance, including various scenarios, and periodically refining training data to align with real-world expectations.\\n\\nThe notebook employs the available Azure AI models for the chat-completion task (If you would like to use a different model than what\\u0027s used in the notebook, you can replace the model name). The notebook includes setting up prerequisites, selecting a model to fine-tune, creating training and validation datasets, configuring and submitting the fine-tuning job, and finally, creating a serverless deployment using the fine-tuned model for sample inference. Additionally, you can use this sample CLI to create a standalone fine-tuning job to enhance a model\\u0027s ability to summarize dialogues between two people using a dataset. type: finetuning name: \\u0022Phi-3-mini-4k-instruct-with-amlcompute\\u0022 experiment_name: \\u0022Phi-3-mini-4k-instruct-finetuning-experiment\\u0022 display_name: \\u0022Phi-3-mini-4k-instruct-display-name\\u0022 task: chat_completion model_provider: custom model: path: \\u0022azureml://registries/azureml/models/Phi-3-mini-4k-instruct/versions/14\\u0022 type: mlflow_model training_data: train.jsonl validation_data: \\n\\nThis example uses a Phi-4-mini-instruct model. In this code snippet, the model ID property of the model is passed as input to the fine tuning job. This is also available as the Asset ID field in model details page in the Azure AI Foundry Model Catalog. model_name = \\u0022Phi-4-mini-instruct\\u0022 model_to_finetune = registry_ml_client.models.get(model_name, label=\\u0022latest\\u0022) print( \\u0022\\\\n\\\\nUsing model name: {0}, version: {1}, id: {2} for fine tuning\\u0022.format( model_to_finetune.name, model_to_finetune.version, model_to_finetune.id ) ) Prepare your training and validation data to fine-tune your model. Your training and validation data consist of input and output examples for how you would like the model to perform. Make sure all your training examples follow the expected format for inference. To fine-tune models effectively, ensure a diverse dataset by maintaining data balance, including various scenarios, and periodically refining training data to align with real-world expectations.\\n\\nLearn how to deploy fine-tuned models by using serverless API deployments in Azure AI Foundry. This comprehensive guide shows you how to fine-tune large language models (LLMs) to your specific datasets and deploy them with serverless infrastructure, offering improved performance, cost efficiency, reduced latency, and tailored outputs. Cost efficiency: Azure AI Foundry\\u0027s fine-tuning can be more cost-effective, especially for large-scale deployments, thanks to pay-as-you-go pricing. Model variety: Azure AI Foundry\\u0027s serverless API deployment fine-tuning offers support for both proprietary and open-source models, providing users with the flexibility to select the models that best suit their needs without being restricted to a single type. Customization and control: Azure AI Foundry provides greater customization and control over the fine-tuning process, which allows users to tailor models more precisely to their specific requirements.\\n\\nThis article explains how to fine-tune models that are deployed using serverless API deployments in Azure AI Foundry. An Azure subscription with a valid payment method. Free or trial Azure subscriptions don\\u0027t work. If you don\\u0027t have an Azure subscription, create a paid Azure account to begin. Access to the Azure portal. An Azure AI Foundry project. Azure role-based access controls (Azure RBAC) are used to grant access to operations in Azure AI Foundry portal. To perform the steps in this article, your user account must be assigned the owner or contributor role for the Azure subscription. For more information on permissions, see role-based access control in Azure AI Foundry portal. Verify that your subscription is registered to the Microsoft.Network resource provider. Sign in to the Azure portal. Select the subscription you want to use. Under Settings in the sidebar menu, select Resource providers.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://learn.microsoft.com/en-us/azure/ai-studio/how-to/fine-tune-phi-3\"}},{\"type\":\"knowledge\",\"title\":\"Fine-tune models with Azure AI Foundry - Azure AI Foundry | Microsoft Learn\",\"url\":\"https://learn.microsoft.com/en-us/azure/ai-foundry/concepts/fine-tuning-overview\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Learn\"},\"is_missing\":false,\"text\":\"For detailed guidance on OpenAI fine-tuning see Fine-tune Azure OpenAI Models. Once you identify a use case, you need to select the appropriate training technique - which guides the model you select for training. We offer three training techniques to optimize your models: Supervised Fine-Tuning (SFT): Foundational technique that trains your model on input-output pairs, teaching it to produce desired responses for specific inputs. Best for: Most use cases including domain specialization, task performance, style and tone, following instructions, and language adaptation. When to use: Start here for most projects. SFT addresses the broadest number of fine-tuning scenarios and provides reliable results with clear input-output training data. Supported Models: GPT 4o, 4o-mini, 4.1, 4.1-mini, 4.1-nano; Llama 2 and Llama 3.1; Phi 4, Phi-4-mini-instruct; Mistral Nemo, Ministral-3B, Mistral Large (2411); NTT Tsuzumi-7b \\u00B7\\n\\nUse cases for vision fine-tuning include interpreting charts, graphs, and visual data; content moderation; visual quality assessment; document processing with mixed text and image; and product cataloging from photographs. This table provides an overview of the models available \\u00B7 Define your use case: Identify whether you need a highly capable general-purpose model (e.g. GPT 4.1), a smaller cost-effective model for a specific task (GPT 4.1-mini or nano), or a complex reasoning model (o4-mini). Prepare your data: Start with 50-100 high-quality examples for initial testing, scaling to 500\\u002B examples for production models. Choose your technique: Begin with Supervised Fine-Tuning (SFT) unless you have specific requirements for reasoning models / RFT. Iterate and evaluate: Fine-tuning is an iterative process\\u2014start with a baseline, measure performance, and refine your approach based on results. To find steps to fine-tuning a model in AI Foundry, see Fine-tune Models in AI Foundry, Fine-tune Az\\n\\nTo fine-tune an OpenAI model you can use an Azure OpenAI Resource, a Foundry resource or default project, or a hub/project. GPT 4.1, 4.1-mini, 4.1-nano and GPT 4o, 4omini are available in all regions with Global Training. For regional availability, see Regional Availability and Limits for Azure OpenAI Fine Tuning. See Create a project for Azure AI Foundry for instructions on creating a new project. To fine-tune a model using Managed Compute you must have a hub/project and available VM quota for training and inferencing.\\n\\nFine-tuning customizes a pretrained AI model with additional training on a specific task or dataset to improve performance, add new skills, or enhance accuracy. The result is a new, optimized GenAI model based on the provided examples. This article walks you through key concepts and decisions to make before you fine-tune, including the type of fine-tuning that\\u0027s right for your use case, and model selection criteria based on training techniques use-cases for fine-tuning and how it helps you in your GenAI journey. If you\\u0027re just getting started with fine-tuning, we recommend GPT-4.1 for complex skills like language translation, domain adaptation, or advanced code generation. For more focused tasks (such as classification, sentiment analysis, or content moderation) or when distilling knowledge from a more sophisticated model, start with GPT-4.1-mini for faster iteration and lower costs.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://learn.microsoft.com/en-us/azure/ai-foundry/concepts/fine-tuning-overview\"}},{\"type\":\"knowledge\",\"title\":\"The Developer\\u2019s Guide to Smarter Fine-tuning: Unlock custom AI for every business challenge | Azure AI Foundry Blog\",\"url\":\"https://devblogs.microsoft.com/foundry/the-developers-guide-to-smarter-fine-tuning/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft\"},\"is_missing\":false,\"text\":\"Invest in Data Quality: High-quality training data is the backbone of effective fine-tuning. The better your training data, the more effective your fine-tuned model will be. Establish a Signals Loop: Agents evolve and so should your model. Continuously evaluate model performance and retrain as needed using observed reasoning, tool use, and performance metrics to ensure alignment, safety, and accuracy. Build Fine-tuning into the Agent-building Process: Organizations can enhance the performance of pre-trained models and enable agents to meet unique business requirements without starting from scratch. Leverage Azure\\u2019s Ecosystem: Azure offers a full-stack toolkit for building and deploying fine-tuned agents. Take advantage of integrated tools, documentation, and community resources for support and innovation. Recent Azure updates have made fine-tuning more flexible, affordable, and developer-friendly, enabling teams to build agents that are not just reactive.\\n\\nMore Global Training Options: Expanded support for Azure OpenAI model fine-tuning across any of the 26 supported regions, making it easier to deploy customized models worldwide. We\\u2019ve also promoted Global Training to generally available and added support for gpt-4o and gpt-4o-mini. Developer Tier for hosting/inferencing: Experiment faster with this cost-effective way to evaluate and test fine-tuned models before scaling to production, now promoted to generally available. Key features include: Deploy fine-tuned GPT-4.1 and GPT-4.1-mini models from any training region, including Global Training. Free hosting for 24 hours per deployment. Pay per token at the same rate as Global Standard, helping you budget your testing costs. Simultaneously evaluate multiple models to choose the best candidate for production. Evaluations Enhancements: Added several new capabilities: RFT Observability (Auto-Evals), Quick Evals, and Python Grader streamlining evals and debugging during fine-tuning, now in p\\n\\nMore Granular Control: Added the ability to copy fine-tuned models across Azure regions via REST API, enabling flexible multi-region deployment and added Pause \\u0026 Resume capabilities, giving customers control to halt and resume fine-tuning jobs without losing progress. Azure AI Foundry makes it easy to begin fine-tuning advanced language models for your specific use case. Once you have your use case(s) figured out you can dive into: Data Preparation: Gather and curate high-quality, domain-specific datasets. Model Selection: Choose the right foundation model (e.g., GPT-4o, 4.1-nano). Training \\u0026 Optimization: Use advanced techniques like Direct Preference Optimization (DPO), RFT, and distillation to enhance model performance. Deployment: Seamlessly deploy fine-tuned models with automatic scaling and monitoring. Iterate and evaluate: Fine-tuning is an iterative process\\u2014start with a baseline, measure performance, and refine your approach based on results to build a reliable signals loop.\\n\\nAzure AI Foundry makes fine-tuning smarter, faster, and more accessible than ever. Whether you\\u2019re building agents that reason, tools that adapt, or workflows that scale, this is your launchpad for customizing models to solve real business challenges. Dive in to discover best practices, hands-on resources, and the latest innovations so you can build, test, and deploy specialized AI with confidence. Fine-tuning refers to customizing a pre-trained LLM with additional training on a specific task or new dataset for enhanced performance, new skills, or improved accuracy. So instead of building an AI model from scratch, you take a powerful pre-trained model and give it extra training using your own examples, and it learns your style, your needs, and your domain. Foundation models are powerful, but they\\u2019re generalists by design. When precision matters, especially in domain-specific applications, fine-tuning is the unlock.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"1 month ago\",\"url\":\"https://devblogs.microsoft.com/foundry/the-developers-guide-to-smarter-fine-tuning/\"}},{\"type\":\"knowledge\",\"title\":\"Announcing fine-tuning for customization and support for new models in Azure AI | Microsoft Azure Blog\",\"url\":\"https://azure.microsoft.com/en-us/blog/announcing-fine-tuning-for-customization-and-support-for-new-models-in-azure-ai/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Azure\"},\"is_missing\":false,\"text\":\"Azure AI is proud to offer tooling to enable customers to fine-tune models across Azure OpenAI Service, the Phi family of models, and over 1,600 models in the model catalog. Today, we\\u2019re excited to announce the general availability of fine-tuning for both GPT-4o and GPT-4o mini on Azure OpenAI Service. Following a successful preview, these models are now fully available for customers to fine-tune. We\\u2019ve also enabled fine-tuning for SLMs with the Phi-3 family of models. Whether you\\u2019re optimizing for specific industries, enhancing brand voice consistency, or improving response accuracy across different languages, GPT-4o and GPT-4o mini deliver robust solutions to meet your needs. Lionbridge, a leader in the field of translation automation, has been one of the early adopters of Azure OpenAI Service and has leveraged fine-tuning to further enhance translation accuracy.\\n\\nTo truly harness the power of generative AI, customization is key. In this blog, we share the latest customization updates on Microsoft Azure AI. Learn more.\\n\\nFrom data generation to model evaluation, and support for scaling your custom models to production workloads, Azure provides a unified platform: data generation via powerful LLMs, AI Studio Evaluation, built in safety guardrails for fine-tuned models, and more. As part of our GPT-4o and 4o-mini now generally available, we\\u2019ve recently shared an end-to-end distillation flow for retrieval augmented fine-tuning, showing how to leverage Azure AI for custom, domain-adapted models. We are hosting a webinar on October 17, 2024, to unpack the essentials and practical recipes to get started with fine-tuning. We hope you will join us to learn more. With over 1,600 models, Azure AI model catalog offers the broadest selection of models to build generative AI applications. Azure AI models are now also available through GitHub Models so developers can quickly prototype and evaluate the best model for their use case. I am excited to share new model availability, including: Phi-3.5-MoE-instruct, a Mixt\\n\\nPhi-3.5-MoE-instruct, with 16 experts and 6.6B active parameters provides multi-lingual capability, competitive performance, and robust safety measures. Phi-3.5-vision-instruct (4.2B parameters), now available through managed compute enables reasoning across multiple input images, opening up new possibilities such as detecting differences between images. Meta\\u2019s Llama 3.2 11B Vision Instruct and Llama 3.2 90B Vision Instruct. These models are Llama\\u2019s first ever multi-modal models and are available via managed compute in the Azure AI model catalog. Inferencing through serverless endpoints is coming soon. SDAIA\\u2019s ALLaM-2-7B. This new model is designed to facilitate natural language understanding in both Arabic and English. With 7 billion parameters, ALLaM-2-7B aims to serve as a critical tool for industries requiring advanced language processing capabilities.\\n\\nGeneral availability of fine-tuning for Azure OpenAI Service GPT-4o and GPT-4o mini. Availability of new models including Phi-3.5-MoE, Phi-3.5-vision through serverless endpoint, Meta\\u2019s Llama 3.2, The Saudi Data and AI Authority (SDAIA) \\u2018s ALLaM-2-7B, and updated Command R and Command R\\u002B from Cohere. New capabilities that expand on our enterprise promise including upcoming availability of Azure OpenAI Data Zones. New responsible AI features including Correction, a capability in Azure AI Content Safety\\u2019s groundedness detection feature, new evaluations to assess the quality and security of outputs, and Protected Material Detection for Code. Full Network Isolation and Private Endpoint Support for building and customizing generative AI apps in Azure AI Studio. Build your own copilot and generative AI applications ... Customization of LLMs has become an increasingly popular way for our users to gain the power of best-in-class generative AI models, combined with the unique value of proprieta\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"December 12, 2024\",\"url\":\"https://azure.microsoft.com/en-us/blog/announcing-fine-tuning-for-customization-and-support-for-new-models-in-azure-ai/\"}},{\"type\":\"knowledge\",\"title\":\"Announcing Fine Tuning for GPT-4, AI Studio Support, and API improvements for Azure OpenAI Service\",\"url\":\"https://techcommunity.microsoft.com/t5/ai-azure-ai-services-blog/announcing-fine-tuning-for-gpt-4-ai-studio-support-and-api/ba-p/4146859\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Community\"},\"is_missing\":false,\"text\":\"Beyond Azure OpenAI, Microsoft offers a range of model capabilities through the Azure AI Studio, with access to additional open and proprietary models including LLaMa, Phi, and Mistral, as well as capabilities ranging from application development ...\\n\\nBeyond Azure OpenAI, Microsoft offers a range of model capabilities through the Azure AI Studio, with access to additional open and proprietary models including LLaMa, Phi, and Mistral, as well as capabilities ranging from application development to automated evaluation and metrics. We\\u2019re launching Azure OpenAI fine tuning in AI Studio so you can fine tune your favorite Azure OpenAI models side by side with LLaMa, Phi, and more. With Azure AI Studio, fine tunable models can be identified directly from model cards or using the \\u201Cfine tuning\\u201D tool option when you\\u2019re working on a project. Select your model, upload your data, and choose your hyperparameters, and when your model is ready, deploy it for inferencing. As if all of that wasn\\u2019t enough, we\\u2019re also releasing the ability to deploy model checkpoints, measure full validation metrics during your training runs, and set the seed property of a job to ensure repeatability.\\n\\nWe love big announcements - and today is full of them! We\\u2019re announcing the public preview of GPT-4 fine tuning, along with automated evaluations assessing the potential for harmful outputs from fine-tuned models. GPT-4, along with all our other Azure OpenAI models, will be available through Azure AI Studio, so you can fine tune OSS and Azure OpenAI models in the same UI together with other Azure AI Studio capabilities. And if that wasn\\u2019t enough, we\\u2019re also releasing updates to our API to give customers more control over the fine-tuning process. In this blog, we\\u0027ll talk about: GPT-4 Fine Tuning, and a case study with NI (now part of Emerson) Automated evaluations to detect and prevent harmful content in the training and outputs of fine tuned models \\u00B7 AI Studio support for Azure OpenAI fine tuning, and ... GPT-4 is our most advanced fine tunable model yet: it outperforms GPT-35-Turbo on a variety of tasks, and thanks to its alignment training it shows improved factuality, steerability, \\n\\nWith our latest API update, in addition to creating the final fine-tuned model, we create one checkpoint at the end of each training epoch and return the last 3 checkpoints from your training run. Each checkpoint is a deployable model, which can be used for inferencing. You may want to deploy a checkpoint when your final model shows signs of overfitting (diverging accuracy between training and validation data, results that are less diverse than expected). To better understand the performance of your model\\u2014and each checkpoint\\u2014you\\u0027ll now see full validation metrics reported for each epoch in your results.csv file as well. Typically, we sample from the validation data to measure loss and accuracy, but now we will run the full validation set at each epoch to give you a better perspective on the quality of your fine tuned model, and the progress at each step.\\n\\n\\u201CWith GPT-4 fine tuning, we were able to improve our AI\\u0027s ability to understand and generate LabVIEW code, at least twice as well on internal metrics than the best prompt engineering, open-source fine-tuned models, or highly sophisticated retrieval augmentation systems we have experimented with, even those built on top of base GPT 4 Turbo. This fine-tuned model has significantly faster response times, is easier to operate, and is more cost effective when deployed at scale. We are excited at what appears to be possible with models such as GPT 4 and their ability to fine tune and layer on additional techniques.\\u201D \\u00B7 - Alejandro Barreto, Chief Software Engineer, Technology and Innovation Office, NI (now part of Emerson) One of the primary worries customers express about fine tuning is the risk of catastrophic forgetting, or unintentionally removing the built in mechanisms designed to reduce the output of harmful content.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"May 21, 2024\",\"url\":\"https://techcommunity.microsoft.com/t5/ai-azure-ai-services-blog/announcing-fine-tuning-for-gpt-4-ai-studio-support-and-api/ba-p/4146859\"}},{\"type\":\"knowledge\",\"title\":\"Phi Open Models - Small Language Models | Microsoft Azure\",\"url\":\"https://azure.microsoft.com/en-us/products/phi/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Azure\"},\"is_missing\":false,\"text\":\"Phi is available across regions where Azure AI Foundry is available. ... Yes, Phi models are available through MaaS. ... Yes, Phi models can be fine-tuned. Read more about fine-tuning Phi in the Phi Cookbook. ... Phi was originally trained and optimized for English. The more recent models have been expanded to support over 20 languages. ... The newest models were trained on offline datasets with a cutoff date of June 2024 for publicly available data. ... Phi is the Microsoft family of small language models (SLMs). These models were created to give developers tools to implement AI directly on a device without the need for cloud connectivity. Phi models are open source through the MIT License. Phi-3 was the first set of publicly available SLMs released. With the addition of new model offerings, including Phi-3.5 and Phi-4, the series is now unified under the Phi brand name.\\n\\nExplore Phi models, efficient small language models (SLMs) for generative AI applications. Learn more about Phi in Azure AI Foundry.\\n\\nExplore Phi models, efficient small language models (SLMs) for generative AI applications. Learn more about Phi in Azure AI Studio.\\n\\nDesigned to be lightweight and resource efficient, Phi models enable developers to create new tools without compromising on performance. Boost performance by fine-tuning the models with domain specific data. Generate more coherent, accurate, and contextually relevant outputs with high quality training data and increased context length. ... Full-time equivalent engineers dedicated to security initiatives at Microsoft. ... Partners with specialized security expertise. ... Compliance certifications, including over 50 specific to global regions and countries. ... Explore flexible pricing for the family of Phi models. Each model supports various pricing options to fit your needs. Phi models are available through model as a service (MaaS) with pay-as-you-go billing via inference APIs. Users can also access Phi models for free for real-time deployment through the Azure AI model catalog or Hugging Face.\\n\\nThis is the Trace Id: 4a946d47fc6abf79ad41d4cc745dc348 ... Phi models offer cost-effective, high-performance AI solutions at the edge, pushing the boundaries of generative AI. The Microsoft suite of small language models is shaping the future of AI. Get started with Azure Experiment with Phi for free ... Tailor a small language model to your organization\\u2019s specific needs with the extensive customization Phi models offer. Get accelerated response times for real-time guidance, autonomous systems, apps requiring low latency, and other critical scenarios using Phi models trained on high-quality data and built for agility. Integrate Phi models into your existing infrastructure for flexible deployment and seamless management in the cloud, at the edge, and directly on device. Phi models are developed in accordance with Microsoft AI principles: accountability, transparency, fairness, reliability and safety, privacy and security, and inclusiveness.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://azure.microsoft.com/en-us/products/phi/\"}},{\"type\":\"knowledge\",\"title\":\"What\\u0027s New in Azure AI Foundry Fine-Tuning | Build 2025\",\"url\":\"https://techcommunity.microsoft.com/blog/aiplatformblog/what%E2%80%99s-new-in-azure-ai-foundry-fine-tuning/4413873\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Community Hub\"},\"is_missing\":false,\"text\":\"With fine-grained evaluation metrics, you can identify performance gaps, validate task-specific accuracy, and fine-tune your models for the exact outcomes you need. Stored Completions: Automatically capture model outputs during evaluation, providing ...\\n\\nWith fine-grained evaluation metrics, you can identify performance gaps, validate task-specific accuracy, and fine-tune your models for the exact outcomes you need. Stored Completions: Automatically capture model outputs during evaluation, providing rich insights into real-world performance. Use this data to refine prompts, adjust training objectives, and identify edge cases \\u2013 all within the same environment. Whether you\\u2019re refining RFT with o4-mini for dynamic reasoning or scaling 4.1-nano for customer interactions, these tools ensure your models are optimized for real-world impact. Available both in Azure AI Foundry and via API, check out the docs to get started. While we at Microsoft share the same enthusiasm for OpenAI\\u2019s GPT-4.1-series of models as our customers, we understand not everyone has the bandwidth to retrain and evaluate in the few months left before the retirement of the GPT-4o series.\\n\\nOur Global Standard public preview saw record customer adoption across model versions. It\\u2019s been so well received, it\\u2019s now the default launch point for all new fine-tuned models. You can find every fine-tunable Azure OpenAI model, deployable from wherever you trained, and at a more favorable price point than our regional Standard deployments. Regional Provisioned Throughput (n\\u00E9e Provisioned Throughput Managed) now supports the full GPT-4o model family in both North Central US and Sweden Central. Do you have EU data residency needs? No longer a problem! Look for the GPT-4.1 family coming soon to Regional Provisioned Throughput. Whether you prioritize cost-efficiency or data residency, Azure AI Foundry now supports a broader range of deployment options. We\\u2019re making fine-tuning even more accessible by launching Global Training in public preview.\\n\\nSwitching to Global Training is easy\\u2014just toggle the option in the Azure AI Foundry UI or use the REST API. Stay tuned for full API support and even more regions coming shortly after //Build. Introducing the Developer Tier \\u2013 the most cost-effective way for developers and data scientists to evaluate their fine-tuned OpenAI models. ... Deploy fine-tuned GPT-4.1 and GPT-4.1-mini models from any training region, including Global Training. Free hosting for 24 hours per deployment. Pay per token at the same rate as Global Standard, helping you budget your testing costs. Simultaneously evaluate multiple models to choose the best candidate for production. Designed specifically for model testing, the Developer Tier does not come with SLAs or data residency guarantees. If those are critical, continue using Standard or Global deployments. Getting started is simple \\u2013 deploy your fine-tuned model via the Foundry UI or REST API, setting the SKU to Developer Tier.\\n\\nIf you aren\\u2019t currently using a fine-tuned GPT-4o-series model today, you can still get started. Training remains available until model retirement. These new capabilities reflect our commitment to making fine-tuning more versatile, accessible, and scalable. From RFT with o4-mini to Global Training and Developer Tier, Azure AI Foundry continues to evolve with the needs of developers and enterprises alike.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"May 16, 2025\",\"url\":\"https://techcommunity.microsoft.com/blog/aiplatformblog/what%E2%80%99s-new-in-azure-ai-foundry-fine-tuning/4413873\"}},{\"type\":\"knowledge\",\"title\":\"microsoft/phi-4 \\u00B7 Hugging Face\",\"url\":\"https://huggingface.co/microsoft/phi-4\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"huggingface.co\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=huggingface.co\",\"site_name\":\"Hugging Face\"},\"is_missing\":false,\"text\":\"phi-4 has adopted a robust safety post-training approach. This approach leverages a variety of both open-source and in-house generated synthetic datasets. The overall technique employed to do the safety alignment is a combination of SFT (Supervised Fine-Tuning) and iterative DPO (Direct Preference Optimization), including publicly available datasets focusing on helpfulness and harmlessness as well as various questions and answers targeted to multiple safety categories. Prior to release, phi-4 followed a multi-faceted evaluation approach. Quantitative evaluation was conducted with multiple open-source safety benchmarks and in-house tools utilizing adversarial conversation simulation. For qualitative safety evaluation, we collaborated with the independent AI Red Team (AIRT) at Microsoft to assess safety risks posed by phi-4 in both average and adversarial user scenarios.\\n\\nLimited Scope for Code: Majority of phi-4 training data is based in Python and uses common packages such as typing, math, random, collections, datetime, itertools. If the model generates Python scripts that utilize other packages or scripts in other languages, we strongly recommend users manually verify all API uses. Developers should apply responsible AI best practices and are responsible for ensuring that a specific use case complies with relevant laws and regulations (e.g. privacy, trade, etc.). Using safety services like Azure AI Content Safety that have advanced guardrails is highly recommended. Important areas for consideration include: Allocation: Models may not be suitable for scenarios that could have consequential impact on legal status or the allocation of resources or life opportunities (ex: housing, employment, credit, etc.) without further assessments and additional debiasing techniques.\\n\\nOur training data is an extension of the data used for Phi-3 and includes a wide variety of sources from: Publicly available documents filtered rigorously for quality, selected high-quality educational data, and code. Newly created synthetic, \\u201Ctextbook-like\\u201D data for the purpose of teaching math, coding, common sense reasoning, general knowledge of the world (science, daily activities, theory of mind, etc.). Acquired academic books and Q\\u0026A datasets. High quality chat format supervised data covering various topics to reflect human preferences on different aspects such as instruct-following, truthfulness, honesty and helpfulness. Multilingual data constitutes about 8% of our overall data. We are focusing on the quality of data that could potentially improve the reasoning ability for the model, and we filter the publicly available documents to contain the correct level of knowledge.\\n\\nQuality of Service: The model is trained primarily on English text. Languages other than English will experience worse performance. English language varieties with less representation in the training data might experience worse performance than standard American English. phi-4 is not intended to support multilingual use. Representation of Harms \\u0026 Perpetuation of Stereotypes: These models can over- or under-represent groups of people, erase representation of some groups, or reinforce demeaning or negative stereotypes. Despite safety post-training, these limitations may still be present due to differing levels of representation of different groups or prevalence of examples of negative stereotypes in training data that reflect real-world patterns and societal biases. Inappropriate or Offensive Content: These models may produce other types of inappropriate or offensive content, which may make it inappropriate to deploy for sensitive contexts without additional mitigations that are specific\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://huggingface.co/microsoft/phi-4\"}},{\"type\":\"knowledge\",\"title\":\"Announcing Phi-3 fine-tuning, new generative AI models, and other Azure AI updates to empower organizations to customize and scale AI applications | Microsoft Azure Blog\",\"url\":\"https://azure.microsoft.com/en-us/blog/announcing-phi-3-fine-tuning-new-generative-ai-models-and-other-azure-ai-updates-to-empower-organizations-to-customize-and-scale-ai-applications/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Azure\"},\"is_missing\":false,\"text\":\"A recent research paper highlighted Microsoft\\u2019s iterative \\u201Cbreak-fix\\u201D approach to improving the safety of the Phi-3 models which involved multiple rounds of testing and refinement, red teaming, and vulnerability identification. This method significantly reduced harmful content by 75% and enhanced the models\\u2019 performance on responsible AI benchmarks. With Azure AI, we\\u2019re committed to bringing the most comprehensive selection of open and frontier models and state-of-the-art tooling to help meet customers\\u2019 unique cost, latency, and design needs. Last year we launched the Azure AI model catalog where we now have the broadest selection of models with over 1,600 models from providers including AI21, Cohere, Databricks, Hugging Face, Meta, Mistral, Microsoft Research, OpenAI, Snowflake, Stability AI and others. This month we added\\u2014OpenAI\\u2019s GPT-4o mini through Azure OpenAI Service, Meta Llama 3.1 405B, and Mistral Large 2.\\n\\nBut, developing and deploying AI applications at scale requires a robust and flexible platform that can handle the complex and diverse needs of modern enterprises and allow them to create solutions grounded in their organizational data. That\\u2019s why we are excited to announce several updates to help developers quickly create customized AI solutions with greater choice and flexibility leveraging the Azure AI toolchain: Serverless fine-tuning for Phi-3-mini and Phi-3-medium models enables developers to quickly and easily customize the models for cloud and edge scenarios without having to arrange for compute. Updates to Phi-3-mini including significant improvement in core quality, instruction-following, and structured output, enabling developers to build with a more performant model without additional cost. Same day shipping earlier this month of the latest models from OpenAI (GPT-4o mini), Meta (Llama 3.1 405B), Mistral (Large 2) to Azure AI to provide customers greater choice and flexibil\\n\\nA recent research paper highlighted Microsoft\\u2019s iterative \\u201Cbreak-fix\\u201D approach to improving the safety of the Phi-3 models which involved multiple rounds of testing and refinement, red teaming, and vulnerability identification. This method significantly reduced harmful content by 75% and enhanced the models\\u2019 performance on responsible AI benchmarks. With Azure AI, we\\u2019re committed to bringing the most comprehensive selection of open and frontier models and state-of-the-art tooling to help meet customers\\u2019 unique cost, latency, and design needs. Last year we launched the Azure AI model catalog where we now have the broadest selection of models with over 1,600 models from providers including AI21, Cohere, Databricks, Hugging Face, Meta, Mistral, Microsoft Research, OpenAI, Snowflake, Stability AI and others. This month we added\\u2014OpenAI\\u2019s GPT-4o mini through Azure OpenAI Service, Meta Llama 3.1 405B, and Mistral Large 2.\\n\\nYou can try fine-tuning for Phi-3 models today in Azure AI. I am also excited to share that our Models-as-a-Service (serverless endpoint) capability in Azure AI is now generally available. Additionally, Phi-3-small is now available via a serverless endpoint so developers can quickly and easily get started with AI development without having to manage underlying infrastructure. Phi-3-vision, the multi-modal model in the Phi-3 family, was announced at Microsoft Build and is available through Azure AI model catalog. It will soon be available via a serverless endpoint as well. Phi-3-small (7B parameter) is available in two context lengths 128K and 8K whereas Phi-3-vision (4.2B parameter) has also been optimized for chart and diagram understanding and can be used to generate insights and answer questions. We are seeing great response from the community on Phi-3.\\n\\nStarting today, developers can fine-tune Phi-3-mini and Phi-3-medium with their data to build AI experiences that are more relevant to their users, safely, and economically. Given their small compute footprint, cloud and edge compatibility, Phi-3 models are well suited for fine-tuning to improve base model performance across a variety of scenarios including learning a new skill or a task (e.g. tutoring) or enhancing consistency and quality of the response (e.g. tone or style of responses in chat/Q\\u0026A). We\\u2019re already seeing adaptations of Phi-3 for new use cases. A family of powerful, small language models (SLMs) with groundbreaking performance at low cost and low latency ... Microsoft and Khan Academy are working together to help improve solutions for teachers and students across the globe. As part of the collaboration, Khan Academy uses Azure OpenAI Service to power Khanmigo for Teachers, a pilot AI-powered teaching assistant for educators across 44 countries and is experimenting with \",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"January 31, 2025\",\"url\":\"https://azure.microsoft.com/en-us/blog/announcing-phi-3-fine-tuning-new-generative-ai-models-and-other-azure-ai-updates-to-empower-organizations-to-customize-and-scale-ai-applications/\"}},{\"type\":\"knowledge\",\"title\":\"how to retrain my Azure OpenAI Finetuned model with more data? - Microsoft Q\\u0026A\",\"url\":\"https://learn.microsoft.com/en-us/answers/questions/1334689/how-to-retrain-my-azure-openai-finetuned-model-wit\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Learn\"},\"is_missing\":false,\"text\":\"Thanks for your explanation and sorry for making you confused. Currently, Azure OpenAI does not support this feature - continue fine-tuning from a fine-tuned model, like retrain. Currently, only base model can be fine-tuned.\\n\\nUsing Azure OpenAI studio, I have created a Custom model using a base model Curie. now i want to retrain it how can i do that? using Azure OpenAI studio or Rest API ... An Azure service that provides access to OpenAI\\u2019s GPT-3 models with enterprise capabilities. ... You can check with Model API to see if your model can be fine-tune - https://learn.microsoft.com/en-us/rest/api/cognitiveservices/azureopenaistable/models/list?tabs=HTTP#capabilities \\u00B7 As for now, I think only base model can be fine-tuned, so if you want to retrain your model with additional data, you may need to fine-tune the base model again. Please verify this point by the Model API, there is a boolean fine-tune in Capabilities can show if this model is fine-tunable. I hope this helps. ... @YutongTie-MSFT i understand that only base models can be finetunable as of now. But my query is, using Azure AI Studio i have fine tuned a base model (Curie) in the name of Curie-my-custom-model-001.\\n\\nAnd deployed. Then i got a endpoint (xxxxx) and key (kyxxxx). Now i want to retrain that model with some extra data how can i do that. The reason why iam asking this is i can able to see these features in OpenAi documentation but not in Azures openai documentation. Here is the link for reference - https://platform.openai.com/docs/guides/fine-tuning/continue-fine-tuning-from-a-fine-tuned-model ... Thanks for your explanation and sorry for making you confused. Currently, Azure OpenAI does not support this feature - continue fine-tuning from a fine-tuned model, like retrain. Currently, only base model can be fine-tuned. I have reached out to product team to check if this feature is on the roadmap.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://learn.microsoft.com/en-us/answers/questions/1334689/how-to-retrain-my-azure-openai-finetuned-model-wit\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"86d3421f-1c19-4746-b36c-397124e5c179\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

