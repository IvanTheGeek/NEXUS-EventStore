text = "Phi-4-mini has **3.8 billion parameters**.\n\n**Key specs:**\n- 200K vocabulary (expanded from Phi-3.5)\n- Grouped-query attention (GQA) - 24 query heads, 8 key/value heads\n- 32 Transformer layers, 3,072 hidden state size\n- 64K token context length\n\n**Model file sizes** (approximate):\n- FP16: ~7.6 GB\n- 4-bit quantized: ~2-2.5 GB\n\n**Variants:**\n- Phi-4-mini-instruct (standard)\n- Phi-4-mini-reasoning (enhanced reasoning)\n- Phi-4-mini-flash-reasoning (hybrid SambaY architecture - 10x higher throughput, 2-3x lower latency)\n\nOutperforms models twice its size on math/coding tasks, making it quite efficient for its parameter count."

