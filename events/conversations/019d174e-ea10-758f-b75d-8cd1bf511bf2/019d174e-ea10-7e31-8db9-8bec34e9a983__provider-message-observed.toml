text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"microsoft/Phi-4-mini-instruct \\u00B7 Hugging Face\",\"url\":\"https://huggingface.co/microsoft/Phi-4-mini-instruct\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"huggingface.co\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=huggingface.co\",\"site_name\":\"Hugging Face\"},\"is_missing\":false,\"text\":\"Architecture: Phi-4-mini-instruct has 3.8B parameters and is a dense decoder-only Transformer model. When compared with Phi-3.5-mini, the major changes with Phi-4-mini-instruct are 200K vocabulary, grouped-query ...\\n\\nDevelopers should follow transparency best practices and inform end-users they are interacting with an AI system. At the application level, developers can build feedback mechanisms and pipelines to ground responses in use-case specific, contextual information, a technique known as Retrieval Augmented Generation (RAG). Generation of Harmful Content: Developers should assess outputs for their context and use available safety classifiers or custom solutions appropriate for their use case. Misuse: Other forms of misuse such as fraud, spam, or malware production may be possible, and developers should ensure that their applications do not violate applicable laws and regulations. Architecture: Phi-4-mini-instruct has 3.8B parameters and is a dense decoder-only Transformer model. When compared with Phi-3.5-mini, the major changes with Phi-4-mini-instruct are 200K vocabulary, grouped-query attention, and shared input and output embedding.\\n\\nWe\\u2019re on a journey to advance and democratize artificial intelligence through open source and open science.\\n\\nTheir findings indicate that the model is resistant to jailbreak techniques across languages, but that language-specific attack prompts leveraging cultural context can cause the model to output harmful content. Another insight was that with function calling scenarios, the model could sometimes hallucinate function names or URL\\u2019s. The model may also be more susceptible to longer multi-turn jailbreak techniques across both English and non-English languages. These findings highlight the need for industry-wide investment in the development of high-quality safety evaluation datasets across multiple languages, including low resource languages, and risk areas that account for cultural nuances where those languages are spoken. ... Note that by default, the Phi-4-mini-instruct model uses flash attention, which requires certain types of GPU hardware to run.\\n\\n\\uD83D\\uDCF0 Phi-4-mini Microsoft Blog \\uD83D\\uDCD6 Phi-4-mini Technical Report \\uD83D\\uDC69\\u200D\\uD83C\\uDF73 Phi Cookbook \\uD83C\\uDFE1 Phi Portal \\uD83D\\uDDA5\\uFE0F Try It Azure, Huggingface ... The model is intended for broad multilingual commercial and research use. The model provides uses for general purpose AI systems and applications which require: ... Strong reasoning (especially math and logic). The model is designed to accelerate research on language and multimodal models, for use as a building block for generative AI powered features. The model is not specifically designed or evaluated for all downstream purposes. Developers should consider common limitations of language models, as well as performance difference across languages, as they select use cases, and evaluate and mitigate for accuracy, safety, and fairness before using within a specific downstream use case, particularly for high-risk scenarios.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://huggingface.co/microsoft/Phi-4-mini-instruct\"}},{\"type\":\"knowledge\",\"title\":\"[2503.01743] Phi-4-Mini Technical Report: Compact yet Powerful Multimodal Language Models via Mixture-of-LoRAs\",\"url\":\"https://arxiv.org/abs/2503.01743\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"arxiv.org\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=arxiv.org\",\"site_name\":\"arXiv\"},\"is_missing\":false,\"text\":\"Despite its compact 3.8-billion-parameter size, this experimental version achieves reasoning performance on par with or surpassing significantly larger models, including DeepSeek-R1-Distill-Qwen-7B and DeepSeek-R1-Distill-Llama-8B.\\n\\nWe introduce Phi-4-Mini and Phi-4-Multimodal, compact yet highly capable language and multimodal models. Phi-4-Mini is a 3.8-billion-parameter language model trained on high-quality web and synthetic data, significantly outperforming recent open-source models of similar size and matching the performance of models twice its size on math and coding tasks requiring complex reasoning. This achievement is driven by a carefully curated synthetic data recipe emphasizing high-quality math and coding datasets. Compared to its predecessor, Phi-3.5-Mini, Phi-4-Mini features an expanded vocabulary size of 200K tokens to better support multilingual applications, as well as group query attention for more efficient long-sequence generation. Phi-4-Multimodal is a multimodal model that integrates text, vision, and speech/audio input modalities into a single model.\\n\\nPhi-4-Mini is a 3.8-billion-parameter language model trained on high-quality web and synthetic data, significantly outperforming recent open-source models of similar size and matching the performance of models twice its size on math and coding tasks requiring complex reasoning. This achievement is driven by a carefully curated synthetic data recipe emphasizing high-quality math and coding datasets. Compared to its predecessor, Phi-3.5-Mini, Phi-4-Mini features an expanded vocabulary size of 200K tokens to better support multilingual applications, as well as group query attention for more efficient long-sequence generation. Phi-4-Multimodal is a multimodal model that integrates text, vision, and speech/audio input modalities into a single model. Its novel modality extension approach leverages LoRA adapters and modality-specific routers to allow multiple inference modes combining various modalities without interference.\\n\\nFor example, it now ranks first in the OpenASR leaderboard to date, although the LoRA component of the speech/audio modality has just 460 million parameters. Phi-4-Multimodal supports scenarios involving (vision \\u002B language), (vision \\u002B speech), and (speech/audio) inputs, outperforming larger vision-language and speech-language models on a wide range of tasks. Additionally, we experiment to further train Phi-4-Mini to enhance its reasoning capabilities. Despite its compact 3.8-billion-parameter size, this experimental version achieves reasoning performance on par with or surpassing significantly larger models, including DeepSeek-R1-Distill-Qwen-7B and DeepSeek-R1-Distill-Llama-8B. From: Young Jin Kim [view email] [v1] Mon, 3 Mar 2025 17:05:52 UTC (5,530 KB) [v2] Fri, 7 Mar 2025 09:05:58 UTC (5,528 KB) ... View a PDF of the paper titled Phi-4-Mini Technical Report: Compact yet Powerful Multimodal Language Models via Mixture-of-LoRAs, by Microsoft: Abdelrahman Abouelenin and 73 other autho\\n\\nAbstract page for arXiv paper 2503.01743: Phi-4-Mini Technical Report: Compact yet Powerful Multimodal Language Models via Mixture-of-LoRAs\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"March 7, 2025\",\"url\":\"https://arxiv.org/abs/2503.01743\"}},{\"type\":\"knowledge\",\"title\":\"microsoft/Phi-4-mini-flash-reasoning \\u00B7 Hugging Face\",\"url\":\"https://huggingface.co/microsoft/Phi-4-mini-flash-reasoning\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"huggingface.co\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=huggingface.co\",\"site_name\":\"Hugging Face\"},\"is_missing\":false,\"text\":\"To understand the capabilities, the 3.8B parameters Phi-4-mini-flash-reasoning model was compared with a set of models over a variety of reasoning benchmarks. We use a more accurate evaluation where Pass@1 accuracy is averaged over 64 samples ...\\n\\nTo understand the capabilities, the 3.8B parameters Phi-4-mini-flash-reasoning model was compared with a set of models over a variety of reasoning benchmarks. We use a more accurate evaluation where Pass@1 accuracy is averaged over 64 samples for AIME24/25 and 8 samples for Math500 and GPQA Diamond. A high-level overview of the model quality is as follows: Overall, the model with only 3.8B-param achieves a similar level of math and science reasoning ability as much larger models. However, it is still fundamentally limited by its size for certain tasks. The model simply does not have the capacity to store too much factual knowledge, therefore, users may experience factual incorrectness. However, it may be possible to resolve such weakness by augmenting Phi-4-mini-flash-reasoning with a search engine, particularly when using the model under RAG settings.\\n\\nWe\\u2019re on a journey to advance and democratize artificial intelligence through open source and open science.\\n\\nPhi-4-mini-flash-reasoning is designed for multi-step, logic-intensive mathematical problem-solving tasks under memory/compute constrained environments and latency bound scenarios. Some of the use cases include formal proof generation, symbolic computation, advanced word problems, and a wide range of mathematical reasoning scenarios. These models excel at maintaining context across steps, applying structured logic, and delivering accurate, reliable solutions in domains that require deep analytical thinking. This model is designed and tested for math reasoning only. It is not specifically designed or evaluated for all downstream purposes. Developers should consider common limitations of language models, as well as performance difference across languages, as they select use cases, and evaluate and mitigate for accuracy, safety, and fairness before using within a specific downstream use case, particularly for high-risk scenarios.\\n\\nArchitecture: Phi-4-mini-flash-reasoning adopts a hybrid SambaY architecture with Differential Attention, featuring 3.8 billion parameters and a 200K vocabulary. It incorporates state space models, grouped-query attention, a gated memory sharing mechanism, a shared key-value cache with a single global attention layer, and shared input-output embeddings. Inputs: Text. It is best suited for prompts using the chat format. ... Status: This is a static model trained on offline datasets with the cutoff date of February 2025 for publicly available data. ... The training data for Phi-4-mini-flash-reasoning consists exclusively of synthetic mathematical content generated by a stronger and more advanced reasoning model, Deepseek-R1. The objective is to distill knowledge from this model. This synthetic dataset comprises over one million diverse math problems spanning multiple levels of difficulty (from middle school to Ph.D.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://huggingface.co/microsoft/Phi-4-mini-flash-reasoning\"}},{\"type\":\"knowledge\",\"title\":\"Phi-4-Mini: Specifications and GPU VRAM Requirements\",\"url\":\"https://apxml.com/models/phi-4-mini\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"apxml.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=apxml.com\",\"site_name\":\"APXML\"},\"is_missing\":false,\"text\":\"Technical specifications and system GPU VRAM requirements, and details for Phi-4-Mini.\\n\\nThe intended use cases for Phi-4-Mini span general-purpose AI systems and applications that require strong reasoning in memory or compute-constrained environments, or those with latency-bound requirements. It is designed to accelerate research in language models and serve as a foundational building block for generative AI features. The model\\u0027s compact size and optimized architecture allow for deployment on edge devices, including various mobile operating systems, by leveraging tools such as Microsoft Olive and the ONNX GenAI Runtime. The Microsoft Phi-4 model family comprises small language models prioritizing efficient, high-capability reasoning. Its development emphasizes robust data quality and sophisticated synthetic data integration. This approach enables enhanced performance and on-device deployment capabilities.\\n\\nMicrosoft Phi-4-Mini is a lightweight, open model from the Phi-4 family, engineered to operate efficiently in resource-constrained environments. This model is constructed from a combination of high-quality synthetic data and filtered public web content, with a particular emphasis on data dense in reasoning. Its core architecture is a dense, decoder-only Transformer, optimized with techniques such as grouped-query attention (GQA) and LongRoPE positional encoding to enhance inference speed and manage extended context lengths. The model incorporates an expanded vocabulary of 200,064 tokens, facilitating broad multilingual support. Key advancements in Phi-4-Mini include an enhancement process that integrates supervised fine-tuning (SFT) and direct preference optimization (DPO), along with Reinforcement Learning from Human Feedback (RLHF) for robust instruction adherence and safety measures.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://apxml.com/models/phi-4-mini\"}},{\"type\":\"knowledge\",\"title\":\"Papers Explained 322: Phi 4 Mini, Phi 4 Multimodal | by Ritvik Rastogi | Medium\",\"url\":\"https://ritvik19.medium.com/papers-explained-322-phi-4-mini-phi-4-multimodal-2be1a69be78c\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"medium.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=medium.com\",\"site_name\":\"Medium\"},\"is_missing\":false,\"text\":\"Phi-4-Mini is a 3.8B parameter language model trained on high-quality web and synthetic data, significantly outperforming recent open-source models of similar size and matching the performance of models twice its size on math and coding tasks requiring complex reasoning. Phi-4-Multimodal is a multimodal model that integrates text, vision, and speech/audio input modalities into a single model. Its novel modality extension approach leverages LoRA adapters and modality-specific routers to allow multiple inference modes combining various modalities without interference. Phi-4-Multimodal supports scenarios involving (vision \\u002B language), (vision \\u002B speech), and (speech/audio) inputs, outperforming larger vision-language and speech-language models on a wide range of tasks. Phi-4-Mini and Phi-4-Multimodal share the same language model backbone. Phi-4-Mini consists of 32 Transformer layers with a hidden state size of 3,072 and tied input/output embedding which reduces the memory consumption sign\\n\\nThe image encoder and projector introduce 440M model parameters while the vision adapter LoRA_V consumes another 370M model parameters. In order to enable the model to process images with diverse resolution effectively and efficiently, a new dynamic multi-crop strategy is proposed. Specifically, given a target image, the crop number for each side is computed by dividing the original size by the crop-size, i.e. \\u2308 H/C \\u2309 \\u00D7 \\u2308 W/C \\u2309, here H, W, C are the image height, width and crop size respectively. If the total crop number is within the maximum number, i.e., 16 in the pretraining stage and 36 in SFT, the image is slightly resized to let it fit the size given by the computed image crops. Otherwise, the crop number is found by matching the best aspect ratio. The speech/audio inputs used are 80-dim log-Mel filter-bank features with the frame rate of 10ms. To enable Phi-4-Multimodal speech and audio functions, a pre-trained audio encoder and Phi-4-Mini are connected through an audio adapter.\\n\\nEach Transformer block includes an attention mechanism based on Group Query Attention (GQA) which optimizes key and value memory (KV cache) usage for long-context generation. Specifically, the model employs 24 query heads and 8 key/value heads, reducing KV cache consumption to one-third of its standard size. Additionally, in the RoPE configuration, a fractional RoPE dimension is used, ensuring that 25% of the attention head dimension remains position-agnostic. This design supports smoother handling of longer contexts. Phi-4-Mini models use the tokenizer o200k base tiktoken with a vocabulary size of 200,064 intended to support multilingual and multimodal input and output more efficiently. ... A overview of the Multimodal architecture for Phi-4-Multimodal. In order to enable modality-specific functionality, multimodal models generally require fine-tuning the base language model, which often diminishes its original language capabilities.\\n\\nFor each audio clip, the summarization queries address specific or general aspects of the conversation and vary in format, including length (number of words or sentences) and structure (summaries formatted as bullet points, JSON, or email). The weighted dataset contributes to 1M SFT examples with English speech only. Audio Understanding Data: The audio understanding data contributes to around 17 million weighted SFT examples sourced from public. The dataset is created in the form of (audio, question, answer) tuples, where \\u201Caudio\\u201D contains speech, audio, and music inputs. The question and answer pairs are generated from GPT4 based on audio transcripts and/or meta information. ... Phi-4-Mini language benchmark scores. Phi-4-Mini demonstrates strong overall performance across diverse language understanding benchmarks, often outperforming similarly sized models and matching or exceeding the performance of models twice its size.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"March 4, 2025\",\"url\":\"https://ritvik19.medium.com/papers-explained-322-phi-4-mini-phi-4-multimodal-2be1a69be78c\"}},{\"type\":\"knowledge\",\"title\":\"Welcome to the new Phi-4 models - Microsoft Phi-4-mini \\u0026 Phi-4-multimodal\",\"url\":\"https://techcommunity.microsoft.com/blog/educatordeveloperblog/welcome-to-the-new-phi-4-models---microsoft-phi-4-mini--phi-4-multimodal/4386037\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Community Hub\"},\"is_missing\":false,\"text\":\"When Phi-4 (14B) was released, its strong reasoning capabilities were a major highlight. Now, even with a reduced parameter size, both Phi-4-mini and Phi-4-multimodal retain this capability. We can test their reasoning abilities by combining them with image inputs. For example, by uploading an image, Phi-4-multimodal can generate structured project code based on both the image content and provided prompts. \\uD83D\\uDD17 Advanced Reasoning Code Sample: https://github.com/microsoft/PhiCookBook/blob/main/md/02.Application/02.Code/Phi4/GenProjectCode/README.md \\u00B7 Despite their compact size, Phi-4-mini and Phi-4-multimodal achieve performance levels comparable to some LLMs. They can be deployed on edge devices, enabling PCs, mobile devices, and IoT systems to leverage enhanced generative AI capabilities. We will continue to expand the available examples in the Phi Cookbook, aiming to make it ...\\n\\nWhen Phi-4 (14B) was released, its strong reasoning capabilities were a major highlight. Now, even with a reduced parameter size, both Phi-4-mini and Phi-4-multimodal retain this capability. We can test their reasoning abilities by combining them with image inputs. For example, by uploading an image, Phi-4-multimodal can generate structured project code based on both the image content and provided prompts. \\uD83D\\uDD17 Advanced Reasoning Code Sample: https://github.com/microsoft/PhiCookBook/blob/main/md/02.Application/02.Code/Phi4/GenProjectCode/README.md \\u00B7 Despite their compact size, Phi-4-mini and Phi-4-multimodal achieve performance levels comparable to some LLMs. They can be deployed on edge devices, enabling PCs, mobile devices, and IoT systems to leverage enhanced generative AI capabilities. We will continue to expand the available examples in the Phi Cookbook, aiming to make it your go-to guide for Phi-4.\\n\\nThese new Phi-4 mini and multimodal models are now available on Hugging Face, Azure AI Foundry Model Catalog, GitHub Models, and Ollama. Phi-4-mini brings significant enhancements in multilingual support, reasoning, and mathematics, and now, the long-awaited function calling feature is finally supported. As for Phi-4-multimodal, it is a fully multimodal model capable of vision, audio, text, multilingual understanding, strong reasoning, encoding, and more. These models can also be deployed on edge devices, enabling IoT applications to integrate generative AI even in environments with limited computing power and network access. Now, let\\u2019s dive into the new Phi-4-mini and Phi-4-multimodal together! This is a highly anticipated feature within the community. With function calling, Phi-4-mini and Phi-4-multimodal can extend their text-processing capabilities by integrating search engines, connecting various tools, and more.\\n\\nAs illustrated in the image, the model is being used to retrieve Premier League match information via Phi-4-mini, showcasing its ability to interact with external data sources seamlessly. \\uD83D\\uDD17Sample Code for function calling https://github.com/microsoft/PhiCookBook/blob/main/md/02.Application/07.FunctionCalling/Phi4/FunctionCallingBasic/README.md \\u00B7 We can deploy the quantized model on edge devices. By combining Microsoft Olive and the ONNX GenAI Runtime, we can deploy Phi-4-mini on Windows, iPhone, Android and other devices. This is an example running on an iPhone 12 Pro. Phi-4-multimodal is a fully multimodal model that supports text, visual, and voice inputs. If you\\u0027re already familiar with visual contexts, the model can even generate code directly from images, streamlining the development process. ... The integration of audio functions has given Phi-4 stronger functional support.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"February 26, 2025\",\"url\":\"https://techcommunity.microsoft.com/blog/educatordeveloperblog/welcome-to-the-new-phi-4-models---microsoft-phi-4-mini--phi-4-multimodal/4386037\"}},{\"type\":\"knowledge\",\"title\":\"Phi-4-Mini Technical Report: Compact yet Powerful Multimodal\",\"url\":\"https://arxiv.org/pdf/2503.01743v1\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"arxiv.org\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=arxiv.org\",\"site_name\":\"arXiv\"},\"is_missing\":false,\"text\":\"Additionally, we experiment to further train \\u00B7 Phi-4-Mini to enhance its reasoning capabilities.1. Despite its compact 3.8-billion-parameter size, this experimental version achieves reasoning performance on par with or surpassing significantly larger \\u00B7 models, including DeepSeek-R1-Disti...\\n\\nPhi-4-Mini and Phi-4-Multimodal share the same language model backbone. Phi-4-Mini con- sist of 32 Transformer layers with hidden state size of 3,072 and tied input / output embedding which \\u00B7 reduces the memory consumption significantly while providing much wider coverage of vocabularies \\u00B7 compared Phi-3.5. Each Transformer block includes an attention mechanism based on Group Query \\u00B7 Attention (GQA) [ALTdJ\\u002B23], which optimizes key and value memory (KV cache) usage for long-context \\u00B7 generation. Specifically, the model employs 24 query heads and 8 key/value heads, reducing KV cache \\u00B7 consumption to one-third of its standard size. Additionally, in the RoPE configuration [SAL\\u002B24], a \\u00B7 fractional RoPE dimension is used, ensuring that 25% of the attention head dimension remains position- agnostic. This design supports smoother handling of longer contexts.\\n\\nWe adopt the mixture of LoRAs design for our Phi-4-Multimodal architecture to support vari- ... Vision modality. The vision modality is implemented with an image encoder, a projector to align \\u00B7 the vision and text embeddings and a LoRA adaptor. The vision encoder is based on SigLIP-400M that \\u00B7 is finetuned with LLM2CLIP [HWY\\u002B24] on large scale image-text pairs with resolution 448 \\u00D7 448 . The \\u00B7 projector is a 2-layer MLP that maps the vision features dimension to the text embedding dimension. Extra LoRA is added on all the linear layers in the language decoder and only deployed in the supervised \\u00B7 fine tuning (SFT) stage. The image encoder and projector introduce 440M model parameters while the \\u00B7 vision adapter LoRAV consumes another 370M model parameters. In order to enable the model to process images with diverse resolution effectively and efficiently, we \\u00B7 proposed a new dynamic multi-crop strategy. Specifically, given a target image, we first compute the \\u00B7\\n\\nCompared with Phi-3.5-Mini, we improved the quality of the pre-training data from several key aspects: 1. Better data filtering: By using an enhanced quality classifier, which is trained on a larger curated \\u00B7 dataset consisting of cleaner positive and negative samples, we end up with better filtering quality \\u00B7 across multiple languages with various aspects (e.g. toxic, obscure, scientific, etc.), leading to a \\u00B7 more comprehensive and controllable filtering strategy overall. 2. Better math and coding data: For the math and coding data, we have augmented our original \\u00B7 data with a specific instruction-based math and coding data set. This enhancement has resulted \\u00B7 in effective results in math, coding and reasoning. 3. Better synthetic data: we incorporated Phi-4 synthetic data [AAB\\u002B24] into this model training ... With these techniques, we built the 5 trillion pre-training data corpus, which is larger and in higher ...\\n\\nLM response data can improve the SQQA robustness of Phi-4-Multimodal in real scenarios \\u00B7 because of more diverse spoken queries sampled from the ASR training data. The total SQA and SQAQA data contribute to 26M weighted SFT examples. 3The speech interface supports the following 8 languages: Chinese, English, French, German, Italian, Japanese, Por- ... Speech Summarization Data. The summarization training data is assembled from anonymized \\u00B7 audio recordings paired with their transcripts. The audio consists of multi-speaker conversational speech \\u00B7 that spans a range of topics. Rather than dividing the audio into shorter segments, we maintain its full \\u00B7 length up to a maximum of 30 minutes. To construct query-summary pairs for each audio clip, we use \\u00B7 GPT-4 to generate a variety of queries and their respective summaries based on the transcripts. For \\u00B7 each audio clip, the summarization queries address specific or general aspects of the conversation and \\u00B7\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://arxiv.org/pdf/2503.01743v1\"}},{\"type\":\"knowledge\",\"title\":\"phi4-mini-reasoning\",\"url\":\"https://ollama.com/library/phi4-mini-reasoning\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"ollama.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=ollama.com\",\"site_name\":\"Ollama\"},\"is_missing\":false,\"text\":\"Phi-4-mini-reasoning is comparable to OpenAI o1-mini across math benchmarks, surpassing the model\\u2019s performance during Math-500 and GPQA Diamond evaluations. As seen above, Phi-4-mini-reasoning with 3.8B parameters outperforms models of over ...\\n\\nPhi 4 mini reasoning is a lightweight open model that balances efficiency with advanced reasoning ability.\\n\\nPhi 4 mini reasoning is designed for multi-step, logic-intensive mathematical problem-solving tasks under memory/compute constrained environments and latency bound scenarios. Some of the use cases include formal proof generation, symbolic computation, advanced word problems, and a wide range of mathematical reasoning scenarios. These models excel at maintaining context across steps, applying structured logic, and delivering accurate, reliable solutions in domains that require deep analytical thinking. The graph compares the performance of various models on popular math benchmarks for long sentence generation. Phi-4-mini-reasoning outperforms its base model on long sentence generation across each evaluation, as well as larger models like OpenThinker-7B, Llama-3.2-3B-instruct, DeepSeek-R1-Distill-Qwen-7B, DeepSeek-R1-Distill-Llama-8B, and Bespoke-Stratos-7B.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://ollama.com/library/phi4-mini-reasoning\"}},{\"type\":\"knowledge\",\"title\":\"phi-4-mini-instruct Model by Microsoft | NVIDIA NIM\",\"url\":\"https://build.nvidia.com/microsoft/phi-4-mini-instruct/modelcard\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"nvidia.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=nvidia.com\",\"site_name\":\"NVIDIA\"},\"is_missing\":false,\"text\":\"Lightweight multilingual LLM powering AI applications in latency bound, memory/compute constrained environments\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://build.nvidia.com/microsoft/phi-4-mini-instruct/modelcard\"}},{\"type\":\"knowledge\",\"title\":\"Reasoning reimagined: Introducing Phi-4-mini-flash-reasoning | Microsoft Azure Blog\",\"url\":\"https://azure.microsoft.com/en-us/blog/reasoning-reimagined-introducing-phi-4-mini-flash-reasoning/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Azure\"},\"is_missing\":false,\"text\":\"Similar to its predecessor, Phi-4-mini-flash-reasoning is a 3.8 billion parameter open model optimized for advanced math reasoning. It supports a 64K token context length and is fine-tuned on high-quality synthetic data to deliver reliable, ...\\n\\nUnlock faster, efficient reasoning with Phi-4-mini-flash-reasoning\\u2014optimized for edge, mobile, and real-time applications. Microsoft is excited to unveil a new edition to the Phi model family: Phi-4-mini-flash-reasoning. Purpose-built for scenarios where compute, memory, and latency are tightly constrained, this new model is engineered to bring advanced reasoning capabilities to edge devices, mobile applications, and other resource-constrained environments. This new model follows Phi-4-mini, but is built on a new hybrid architecture, that achieves up to 10 times higher throughput and a 2 to 3 times average reduction in latency, enabling significantly faster inference without sacrificing reasoning performance. Ready to power real world solutions that demand efficiency and flexibility, Phi-4-mini-flash-reasoning is available on Azure AI Foundry, NVIDIA API Catalog, and Hugging Face today.\\n\\nThe Phi model family, including Phi-4-mini-flash-reasoning, employs a robust safety post-training strategy that integrates Supervised Fine-Tuning (SFT), Direct Preference Optimization (DPO), and Reinforcement Learning from Human Feedback (RLHF). These techniques are applied using a combination of open-source and proprietary datasets, with a strong emphasis on ensuring helpfulness, minimizing harmful outputs, and addressing a broad range of safety categories. Developers are encouraged to apply responsible AI best practices tailored to their specific use cases and cultural contexts. Read the model card to learn more about any risk and mitigation strategies. Try out the new model on Azure AI Foundry. Find code samples and more in the Phi Cookbook. Read the Phi-4-mini-flash-reasoning technical paper on Arxiv. If you have questions, sign up for the Microsoft Developer \\u201CAsk Me Anything\\u201D. Get started with Azure AI Foundry, and jump directly into Visual Studio Code.\\n\\nSimilar to its predecessor, Phi-4-mini-flash-reasoning is a 3.8 billion parameter open model optimized for advanced math reasoning. It supports a 64K token context length and is fine-tuned on high-quality synthetic data to deliver reliable, logic-intensive performance deployment. At the core of Phi-4-mini-flash-reasoning is the newly introduced decoder-hybrid-decoder architecture, SambaY, whose central innovation is the Gated Memory Unit (GMU), a simple yet effective mechanism for sharing representations between layers. The architecture includes a self-decoder that combines Mamba (a State Space Model) and Sliding Window Attention (SWA), along with a single layer of full attention. The architecture also involves a cross-decoder that interleaves expensive cross-attention layers with the new, efficient GMUs. This new architecture with GMU modules drastically improves decoding efficiency, boosts long-context retrieval performance and enables the architecture to deliver exceptional performa\\n\\nA more accurate evaluation was used where Pass@1 accuracy is averaged over 64 samples for AIME24/25 and 8 samples for Math500 and GPQA Diamond. In this graph, Phi-4-mini-flash-reasoning outperforms Phi-4-mini-reasoning and is better than models twice its size. Thanks to its reduced latency, improved throughput, and focus on math reasoning, the model is ideal for: Adaptive learning platforms, where real-time feedback loops are essential. On-device reasoning assistants, such as mobile study aids or edge-based logic agents. Interactive tutoring systems that dynamically adjust content difficulty based on a learner\\u2019s performance. Its strength in math and structured reasoning makes it especially valuable for education technology, lightweight simulations, and automated assessment tools that require reliable logic inference with fast response times. Developers are encouraged to connect with peers and Microsoft engineers through the Microsoft Developer Discord community to ask questions, share \",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"July 9, 2025\",\"url\":\"https://azure.microsoft.com/en-us/blog/reasoning-reimagined-introducing-phi-4-mini-flash-reasoning/\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"4312ad77-b441-4bc8-bb37-915a7f830f63\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

