kind = "plain_text"
text = "Yes - ONNX Runtime supports loading multiple models simultaneously.\n\n**Common patterns:**\n\n```fsharp\n// Approach 1: Multiple models in memory\nlet miniInstruct = new Model(\"phi4-mini-instruct.onnx\")\nlet miniReasoning = new Model(\"phi4-mini-reasoning.onnx\") \nlet multimodal = new Model(\"phi4-multimodal.onnx\")\n\n// Route queries to appropriate model\nmatch queryType with\n| Chat -> miniInstruct.Generate(prompt)\n| MathProblem -> miniReasoning.Generate(prompt)\n| ImageAnalysis -> multimodal.Generate(prompt, image)\n```\n\n**Approach 2: Load on demand**\n```fsharp\n// Keep only one loaded, swap as needed\nlet mutable currentModel = loadModel \"phi4-mini-instruct.onnx\"\n\n// Swap when different capability needed\ncurrentModel.Dispose()\ncurrentModel <- loadModel \"phi4-mini-reasoning.onnx\"\n```\n\n**Design question for you:**\n\nWhat's your use case driving this question?\n\n- **Multiple capabilities?** (chat + reasoning + vision) → Multiple models\n- **Fallback/comparison?** (try fast model, fallback to reasoning) → Multiple models\n- **Memory constrained?** → Single model, load on demand\n- **MCP tools routing?** (different tools use different models) → Multiple models makes sense\n\nMemory consideration: Each 3.8B model ~2-2.5GB (4-bit quantized), so 3 models = ~7.5GB VRAM/RAM.\n\nWhat problem are you trying to solve with multiple models?"

