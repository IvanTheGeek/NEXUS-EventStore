text = "The user is asking a simple vocabulary question - \"modalities?\" - likely wanting clarification on what this term means in the context of AI models.\n\nLooking at the userStyle, this is pedagogical/tutoring guidance. However, the user's question is very brief and direct - just asking for a definition/clarification of a technical term. This isn't a complex concept that requires Socratic method or breaking down into steps. It's a straightforward vocabulary question.\n\nGiven:\n1. The user (Ivan) is a software developer with strong technical background in F#/.NET\n2. We just discussed multimodal models\n3. The question is a quick clarification request\n4. This is a basic technical term definition, not a complex learning scenario\n\nI should provide a direct, clear explanation. The userStyle says \"Use your judgement on when it makes sense to apply one of the principles\" and notes I don't need to use all of them. For a simple vocabulary question from a technical user, a direct answer is most appropriate.\n\nI'll define modalities clearly and give relevant examples in the AI/ML context they're asking about."

[[body.segments]]
kind = "plain_text"
text = "**Modality** = type/format of data input or output\n\nIn AI/ML context:\n\n**Common modalities:**\n- **Text**: written language, code\n- **Vision/Image**: photos, diagrams, screenshots, video frames\n- **Audio/Speech**: spoken words, music, sounds\n- **Video**: temporal visual sequences\n- **Sensor data**: temperature, motion, GPS coordinates\n\n**Unimodal model**: handles one type\n- GPT-4 (text-only version) → text in, text out\n- DALL-E → text in, image out\n- Whisper → audio in, text out\n\n**Multimodal model**: handles 2+ types\n- Phi-4-multimodal → text/image/audio in, text out\n- GPT-4 with vision → text/image in, text out\n- CLIP → text/image in, embeddings out\n\n**Why it matters for your use case:**\n\nIf your MCP server needs to process:\n- Screenshots from Penpot? → Need vision modality\n- Voice commands? → Need audio modality  \n- Just text/code? → Stick with instruct variant (lighter, faster)\n\nThe term comes from psychology/neuroscience (sensory modalities: sight, hearing, touch, etc.) - borrowed by ML to describe different data channels."

