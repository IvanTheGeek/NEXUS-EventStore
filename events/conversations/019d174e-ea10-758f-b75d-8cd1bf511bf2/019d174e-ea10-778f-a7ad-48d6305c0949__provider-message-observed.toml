text = "**Unsloth** = optimization library for faster, more memory-efficient LLM fine-tuning\n\n**What it does:**\n- Custom CUDA kernels (written in Triton) for 2x faster training\n- 70% less VRAM usage vs standard HuggingFace + PyTorch\n- Supports LoRA, QLoRA, full fine-tuning\n- Pre-quantized models optimized for training (the `-bnb-4bit` models)\n\n**Why people use it:**\n- Fine-tune on free Google Colab (16GB T4)\n- Fine-tune larger models on consumer GPUs\n- Faster iteration during experimentation\n\n**Integration:**\n```fsharp\n// Works with standard HuggingFace ecosystem\n// Just faster/lighter underneath\n// F# can call Python libraries via Python.NET if needed\n```\n\n**Alternatives:**\n- Axolotl (more features, heavier)\n- Raw HuggingFace PEFT (standard approach, slower)\n- torchtune (PyTorch-native)\n\nCreated by Daniel Han and team - they collaborate directly with model creators (Meta, Microsoft, etc.) to fix bugs and optimize new models.\n\nDoes this fit what you needed to know?"

