text = "These are **model variant suffixes** indicating specialized training or capabilities:\n\n**instruct**\n- Base model + supervised fine-tuning for instruction-following\n- Trained to respond to prompts/commands in chat format\n- Better at: following user instructions, conversational tasks, structured outputs\n- vs base models (trained only on next-token prediction)\n\n**flash-reasoning**\n- Optimized architecture for **speed + reasoning**\n- Uses hybrid SambaY architecture (Mamba + attention layers)\n- 2-3x lower latency, 10x higher throughput than standard reasoning models\n- Specialized for: math/logic problems, proof generation, STEM tasks\n- Trade-off: narrower use case (reasoning-focused), but much faster inference\n\n**multimodal**\n- Accepts **multiple input types**: text + vision + audio/speech\n- Single unified model (not separate models stitched together)\n- Uses LoRA adapters + routers to handle different modalities\n- Outputs: text only\n- Examples: analyze images, transcribe speech, answer questions about charts\n\n**Practical implications for you:**\n\n```fsharp\n// Your use case determines which variant:\n\n// General-purpose assistant, chatbot, Q&A\nPhi4MiniInstruct  // <- Start here\n\n// Heavy math/coding reasoning on edge device\nPhi4MiniFlashReasoning  // <- Fastest for logic tasks\n\n// Need to process images/audio\nPhi4Multimodal  // <- 5.6B params (slightly larger)\n```\n\nWhich capabilities does your MCP server project need?"

