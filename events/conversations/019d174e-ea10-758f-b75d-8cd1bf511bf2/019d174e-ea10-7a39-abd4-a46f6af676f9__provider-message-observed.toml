text = "Yes. Phi-4 works in F# .NET apps via **ONNX Runtime**.\n\n**Quick integration:**\n\n1. **NuGet package**: `Microsoft.ML.OnnxRuntimeGenAI` (or `.DirectML`/`.Cuda` variants for GPU)\n\n2. **Get the model**: Download from HuggingFace - `microsoft/Phi-3-mini-4k-instruct-onnx` (Phi-4 ONNX models follow same pattern)\n\n3. **Basic F# usage** (adapted from C# examples):\n```fsharp\nopen Microsoft.ML.OnnxRuntimeGenAI\n\nlet modelPath = @\"path/to/phi-4-onnx/cpu-int4-model\"\nuse model = new Model(modelPath)\nuse tokenizer = new Tokenizer(model)\n\nlet systemPrompt = \"You are a helpful assistant.\"\n// Use model for inference\n```\n\n**Key resources:**\n- PhiCookBook on GitHub has .NET console examples with Phi-4 ONNX\n- Microsoft published official .NET Blog post with Phi-3 ONNX examples (same pattern for Phi-4)\n- Models available: CPU, DirectML (Windows), CUDA variants\n\n**Note**: ONNX Runtime GenAI packages are in preview - CUDA/DirectML support is still maturing\n\nWant F#-specific code examples, or guidance on a particular deployment scenario (CPU/GPU/edge)?"

