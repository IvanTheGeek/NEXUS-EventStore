text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"A Peek into F# 4.1 - .NET Blog\",\"url\":\"https://devblogs.microsoft.com/dotnet/a-peek-into-f-4-1/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft\"},\"is_missing\":false,\"text\":\"Later this year, we\\u2019re going to ship a new version of Microsoft\\u2019s tools for F#. This will include support for F# 4.1, featuring important incremental improvements to the language that have been developed in conjunction with F# users and contributors. Our tools will also include a cross-platform, open-source F# 4.1 compiler toolchain for .NET Framework [\\u2026]\\n\\nThe Visual F# Tools for F# 4.1 will be updated to include support for editing and compiling .NET Core and .NET Framework projects. The Visual F# Tools will also include incremental fixes and integration with the new Visual Studio installation process. Additionally, we are currently working towards support for Roslyn Workspaces in the Visual F# Tools. By using Roslyn Workspaces, the Visual F# Tools will \\u201Cplug in\\u201D to tooling innovations made in Visual Studio and be able to offer a more modern editing experience. In this blog post, we explore what we plan to ship in more detail. For followers of our primary GitHub repository these specifics will already be familiar, however we thought it useful to bring them together into a single post. This post doesn\\u2019t cover the many generic improvements to Visual Studio, .NET and Xamarin which F# aso benefits from.\\n\\nThe best way to try out F# 4.1 is to use pre-releases of the F# compiler tools for .NET Core, as described earlier in this blog post. You can also build the current Visual F# Compiler from source.. We are partnering with the F# community, including other groups at Microsoft, to ensure that F# 4.1 support is rolled out across the very wide range of tooling available for F# 4.1. ... The Xamarin team at Microsoft are actively incorporating F# 4.1 support into the F# support in Xamarin Studio. The Mono packaging team is updating the packages available to include F# 4.1. The F# community is integrating F# 4.1 support in the F# Compiler Service component, used by many editing and compilation tools. We are working with the F# community to help update the F# support in the Visual F# Power Tools and ensure it works smoothly with the next release of Visual Studio.\\n\\nThe F# community are integrating support for F# 4.1 into many other tools, include Fable, an F# to ECMAScript transpiler, and into the F# support for Emacs and Vim. Note: The timeline for this support may be Update 1 of Visual Studio \\u201C15\\u201D rather than RTM. There is no definite date at this time. The Visual F# Tools for F# 4.1 will be updated to include support for editing and compiling .NET Standard projects, in addition to .NET Framework projects. .NET Standard is the common subset of APIs between .NET Core, .NET Framework, and Mono. To learn more about the .NET Standard, read The .NET Standard Library. The Visual F# Tools will also include incremental fixes and integration with the new Visual Studio installation process. The final area for F# 4.1 is integrating the F# language service with Roslyn Workspaces. This will modernize the F# IDE experience in Visual Studio, making it comparable to C# and Visual Basic and opening the doors to future IDE innovation.\\n\\nOur compiler and scripting tools for F# 4.1 will be the first version to offer support for .NET Core. This is in addition to the existing support for .NET Framework 4.x development. When you write F# code on .NET Core today, you\\u2019re using a pre-release of F# 4.1 and this compiler toolchain. Our tools for F# will continue to fully support .NET Framework development in a backwards-compatible way. This includes compiling existing projects created with earlier versions of Visual Studio and running existing scripts using F# Interactive (fsi.exe). Support for the latest versions of the .NET Framework is being added to these tools. The Microsoft compiler tools for F# 4.1 are compatible with the .NET Standard, and thus are fully compatible with .NET Core and .NET Framework. The FSharp.Core library supports the .NET Standard, which allows you to use it for both .NET Core and .NET Framework development.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"September 30, 2021\",\"url\":\"https://devblogs.microsoft.com/dotnet/a-peek-into-f-4-1/\"}},{\"type\":\"knowledge\",\"title\":\"Phi Open Models - Small Language Models | Microsoft Azure\",\"url\":\"https://azure.microsoft.com/en-us/products/phi/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Azure\"},\"is_missing\":false,\"text\":\"Integrate Phi models into your existing infrastructure for flexible deployment and seamless management in the cloud, at the edge, and directly on device. Phi models are developed in accordance with Microsoft AI principles: accountability, transparency, fairness, ...\\n\\nThis is the Trace Id: 4a946d47fc6abf79ad41d4cc745dc348 ... Phi models offer cost-effective, high-performance AI solutions at the edge, pushing the boundaries of generative AI. The Microsoft suite of small language models is shaping the future of AI. Get started with Azure Experiment with Phi for free ... Tailor a small language model to your organization\\u2019s specific needs with the extensive customization Phi models offer. Get accelerated response times for real-time guidance, autonomous systems, apps requiring low latency, and other critical scenarios using Phi models trained on high-quality data and built for agility. Integrate Phi models into your existing infrastructure for flexible deployment and seamless management in the cloud, at the edge, and directly on device. Phi models are developed in accordance with Microsoft AI principles: accountability, transparency, fairness, reliability and safety, privacy and security, and inclusiveness.\\n\\nExplore Phi models, efficient small language models (SLMs) for generative AI applications. Learn more about Phi in Azure AI Foundry.\\n\\nExplore Phi models, efficient small language models (SLMs) for generative AI applications. Learn more about Phi in Azure AI Studio.\\n\\nBrowse prebuilt and customizable models from Azure OpenAI Service, Falcon, Stable Diffusion, Meta, and more. ... Get everything you need to develop generative AI applications and custom copilots on one platform. ... Retrieve the most relevant data using keyword, vector, and hybrid search. ... Build cutting-edge, market-ready AI applications with out-of-the-box and customizable APIs and models. ... Learn about Phi-4, the latest small language model in Phi family, that offers high quality results at a small size (14B parameters). ... Phi-Vision model joins Phi family of models. ... Highly capable and cost-effective small language models are now available. ... Learn about Phi, how it compares to large language models, and potential use cases. ... Learn how to deploy Phi. ... Learn about Phi in this special episode of the AI Show. ... Phi-4-mini and Phi-4-multimodal are the newest models in the Phi open model family.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://azure.microsoft.com/en-us/products/phi/\"}},{\"type\":\"knowledge\",\"title\":\"How to use Phi-4 family chat models with Azure AI Foundry\",\"url\":\"https://learn.microsoft.com/en-us/azure/ai-studio/how-to/deploy-models-phi-4\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Learn\"},\"is_missing\":false,\"text\":\"Inference examples for Foundry Models that support deployment to serverless APIs in Azure AI Foundry.\\n\\nHigh-performant natively multimodal models, Llama 4 Scout and Llama 4 Maverick, leverage a mixture-of-experts architecture to offer industry-leading performance in text and image understanding. The following table provides links to examples of how to use Meta Llama models. Microsoft models include various model groups such as MAI models, Phi models, healthcare AI models, and more. To see all the available Microsoft models, view the Microsoft model collection in Azure AI Foundry portal. The following table provides links to examples of how to use Microsoft models. See the Microsoft model collection in Azure AI Foundry portal. Mistral AI offers two categories of models, namely: Premium models: These include Mistral Large, Mistral Small, Mistral-OCR-2503, Mistral Medium 3 (25.05), and Ministral 3B models, and are available as serverless APIs with pay-as-you-go token-based billing.\\n\\nUpgrade to Microsoft Edge to take advantage of the latest features, security updates, and technical support. Download Microsoft Edge More info about Internet Explorer and Microsoft Edge ... Access to this page requires authorization. You can try signing in or changing directories. Access to this page requires authorization. You can try changing directories. ... The Azure AI model catalog offers a large selection of Azure AI Foundry Models from a wide range of providers. You have various options for deploying models from the model catalog. This article lists inference examples for serverless API deployments. ... Models that are in preview are marked as preview on their model cards in the model catalog. To perform inferencing with the models, some models such as Nixtla\\u0027s TimeGEN-1 and Cohere rerank require you to use custom APIs from the model providers.\\n\\nOthers support inferencing using the Model Inference API. You can find more details about individual models by reviewing their model cards in the model catalog for Azure AI Foundry portal. The Cohere family of models includes various models optimized for different use cases, including rerank, chat completions, and embeddings models. The following table provides links to examples of how to use Cohere models. To perform inferencing with Cohere rerank models, you\\u0027re required to use Cohere\\u0027s custom rerank APIs. For more information on the Cohere rerank model and its capabilities, see Cohere rerank. Queries, not to be confused with a user\\u0027s query, is a pricing meter that refers to the cost associated with the tokens used as input for inference of a Cohere Rerank model. Cohere counts a single search unit as a query with up to 100 documents to be ranked.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://learn.microsoft.com/en-us/azure/ai-studio/how-to/deploy-models-phi-4\"}},{\"type\":\"knowledge\",\"title\":\"Introducing Phi-4: Microsoft\\u2019s Newest Small Language Model Specializing in Complex Reasoning | Microsoft Community Hub\",\"url\":\"https://techcommunity.microsoft.com/blog/azure-ai-foundry-blog/introducing-phi-4-microsoft%E2%80%99s-newest-small-language-model-specializing-in-comple/4357090\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Community Hub\"},\"is_missing\":false,\"text\":\"Additionally, Phi users can use Azure AI Content Safety features such as prompt shields, protected material detection, and groundedness detection. These capabilities can be leveraged as content filters with any language model included in our model catalog and developers can integrate these capabilities into their application easily through a single API. Once in production, developers can monitor their application for quality and safety, adversarial prompt attacks, and data integrity, making timely interventions with the help of real-time alerts. ... One example of the mathematical reasoning Phi-4 is capable of is demonstrated in this problem.\\n\\nToday we are introducing Phi-4, our 14B parameter state-of-the-art small language model (SLM) that excels at complex reasoning in areas such as math, in addition to conventional language processing. Phi-4 is the latest member of our Phi family of small language models and demonstrates what\\u2019s possible as we continue to probe the boundaries of SLMs. Phi-4 is available on Azure AI Foundry and on Hugging Face. ... Phi-4 outperforms comparable and larger models on math related reasoning due to advancements throughout the processes, including the use of high-quality synthetic datasets, curation of high-quality organic data, and post-training innovations. Phi-4 continues to push the frontier of size vs quality. Phi-4 is particularly good at math problems, for example here are the benchmarks for Phi-4 on math competition problems: Phi-4 performance on math competition problems Phi-4 outperforms much larger models, including Gemini Pro 1.5, on math competition problems (https://maa.org/student-\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"January 8, 2025\",\"url\":\"https://techcommunity.microsoft.com/blog/azure-ai-foundry-blog/introducing-phi-4-microsoft%E2%80%99s-newest-small-language-model-specializing-in-comple/4357090\"}},{\"type\":\"knowledge\",\"title\":\"Microsoft\\u0027s Phi-4: Step-by-Step Tutorial With Demo Project | DataCamp\",\"url\":\"https://www.datacamp.com/tutorial/phi-4-microsoft\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"datacamp.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=datacamp.com\",\"site_name\":\"DataCamp\"},\"is_missing\":false,\"text\":\"HuggingFace Transformers library: For loading the Phi-4 model from HuggingFace. Gradio: To create a user-friendly web interface. ... Now, we have all the dependencies installed. Next, we set up the Phi-4 model. We load the Phi-4 model from HuggingFace\\u2019s Transformers library. Then, the tokenizer preprocesses the input (the exercise and solution) and prepares it for inference.\\n\\nMicrosoft recently introduced Phi-4, the latest addition to the Phi family of small language models. Because it excels in mathematics, I decided to use Phi-4 to build to build a homework checker integrated with Gradio. In this tutorial, I\\u2019ll guide you step by step through building a functional web app capable of validating solutions, correcting errors, and providing alternative approaches\\u2014just like a virtual teaching assistant! Phi-4 excels in complex reasoning tasks, particularly in mathematics, while maintaining proficiency in conventional language processing. Its key features are: Advanced reasoning capabilities: Phi-4 is trained on high-quality synthetic datasets and uses innovative post-training techniques to outperform larger models in math-related reasoning tasks. Efficiency and accessibility: With 14 billion parameters, Phi-4 offers high-quality results without extensive computational resources, making it accessible for a wider range of applications.\\n\\nExperiment with more complex problems, or integrate it into educational platforms for broader use! ... I am a Google Developers Expert in ML(Gen AI), a Kaggle 3x Expert, and a Women Techmakers Ambassador with 3\\u002B years of experience in tech. I co-founded a health-tech startup in 2020 and am pursuing a master\\u0027s in computer science at Georgia Tech, specializing in machine learning. ... Learn AI with these courses! ... 0 minLearn to create AI-powered applications with the latest AI developer tools, including the OpenAI API, Hugging Face, and LangChain. ... Learn how to use Generative AI models to create an image editor, ChatGPT-like chatbot on low resources, loan approval classifier app, automate PDF Interactions, and GPT-powered voice assistant. ... Learn about Microsoft\\u2019s Phi-3 language model, including its architecture, features, applications, installation, setup, integration, optimization, and fine-tuning.\\n\\nAvailability: Phi-4 is currently accessible through Azure AI Foundry under a Microsoft Research License Agreement (MSRLA) and Hugging Face. Phi-4 has demonstrated great performance on mathematical reasoning tasks, even surpassing larger models like Gemini Pro 1.5 in math competition problems. This makes it a good choice for applications that require advanced mathematical problem-solving capabilities. ... The app that we\\u2019re going to build with Phi-4 is an AI-powered homework checker. Here\\u2019s the workflow that the user will go through: The user submits their finished homework (both the exercise instructions and the user\\u2019s solution). If the solution is incorrect, the model will explain the correct solution with detailed steps, like a teacher. If the solution is correct, the model will confirm the solution or suggest a cleaner, more efficient alternative if the answer is messy.\\n\\nHuggingFace Transformers library: For loading the Phi-4 model from HuggingFace. Gradio: To create a user-friendly web interface. ... Now, we have all the dependencies installed. Next, we set up the Phi-4 model. We load the Phi-4 model from HuggingFace\\u2019s Transformers library. Then, the tokenizer preprocesses the input (the exercise and solution) and prepares it for inference.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"January 7, 2025\",\"url\":\"https://www.datacamp.com/tutorial/phi-4-microsoft\"}},{\"type\":\"knowledge\",\"title\":\"Empowering innovation: The next generation of the Phi family | Microsoft Azure Blog\",\"url\":\"https://azure.microsoft.com/en-us/blog/empowering-innovation-the-next-generation-of-the-phi-family/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Azure\"},\"is_missing\":false,\"text\":\"Through a standardized protocol, function calling allows the model to seamlessly integrate with structured programming interfaces. When a user makes a request, Phi-4-Mini can reason through the query, identify and call relevant functions with ...\\n\\nThrough a standardized protocol, function calling allows the model to seamlessly integrate with structured programming interfaces. When a user makes a request, Phi-4-Mini can reason through the query, identify and call relevant functions with appropriate parameters, receive the function outputs, and incorporate those results into its responses. This creates an extensible agentic-based system where the model\\u2019s capabilities can be enhanced by connecting it to external tools, application program interfaces (APIs), and data sources through well-defined function interfaces. The following example simulates a smart home control agent with Phi-4-mini. At Headwaters, we are leveraging fine-tuned SLM like Phi-4-mini on the edge to enhance operational efficiency and provide innovative solutions. Edge AI demonstrates outstanding performance even in environments with unstable network connections or in fields where confidentiality is paramount.\\n\\nPhi-4-multimodal marks a new milestone in Microsoft\\u2019s AI development as our first multimodal language model. At the core of innovation lies continuous improvement, and that starts with listening to our customers. In direct response to customer feedback, we\\u2019ve developed Phi-4-multimodal, a 5.6B parameter model, that seamlessly integrates speech, vision, and text processing into a single, unified architecture. By leveraging advanced cross-modal learning techniques, this model enables more natural and context-aware interactions, allowing devices to understand and reason across multiple input modalities simultaneously. Whether interpreting spoken language, analyzing images, or processing textual information, it delivers highly efficient, low-latency inference\\u2014all while optimizing for on-device execution and reduced computational overhead. ... Phi-4-multimodal is a single model with mixture-of-LoRAs that includes speech, vision, and language, all processed simultaneously within the same rep\\n\\nThe Phi-4-multimodal is built on a new architecture that enhances efficiency and scalability. It incorporates a larger vocabulary for improved processing, supports multilingual capabilities, and integrates language reasoning with multimodal inputs. All of this is achieved within a powerful, compact, highly efficient model that\\u2019s suited for deployment on devices and edge computing platforms. This model represents a step forward for the Phi family of models, offering enhanced performance in a small package. Whether you\\u2019re looking for advanced AI capabilities on mobile devices or edge systems, Phi-4-multimodal provides a high-capability option that\\u2019s both efficient and versatile. With its increased range of capabilities and flexibility, Phi-4-multimodal opens exciting new possibilities for app developers, businesses, and industries looking to harness the power of AI in innovative ways.\\n\\nThese models are designed to handle complex tasks efficiently, making them ideal for edge case scenarios and compute-constrained environments. Given the new capabilities Phi-4-multimodal and Phi-4-mini bring, the uses of Phi are only expanding. Phi models are being embedded into AI ecosystems and used to explore various use cases across industries. Language models are powerful reasoning engines, and integrating small language models like Phi into Windows allows us to maintain efficient compute capabilities and opens the door to a future of continuous intelligence baked in across all your apps and experiences. Copilot\\u002B PCs will build upon Phi-4-multimodal\\u2019s capabilities, delivering the power of Microsoft\\u2019s advanced SLMs without the energy drain. This integration will enhance productivity, creativity, and education-focused experiences, becoming a standard part of our developer platform.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"March 19, 2025\",\"url\":\"https://azure.microsoft.com/en-us/blog/empowering-innovation-the-next-generation-of-the-phi-family/\"}},{\"type\":\"knowledge\",\"title\":\"microsoft/phi-4 \\u00B7 Hugging Face\",\"url\":\"https://huggingface.co/microsoft/phi-4\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"huggingface.co\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=huggingface.co\",\"site_name\":\"Hugging Face\"},\"is_missing\":false,\"text\":\"Prior to release, phi-4 followed a multi-faceted evaluation approach. Quantitative evaluation was conducted with multiple open-source safety benchmarks and in-house tools utilizing adversarial conversation simulation. For qualitative safety evaluation, we collaborated with the independent AI Red Team (AIRT) at Microsoft to assess safety risks posed by phi-4 in both average and adversarial user scenarios. In the average user scenario, AIRT emulated typical single-turn and multi-turn interactions to identify potentially risky behaviors. The adversarial user scenario tested a wide range of techniques aimed at intentionally subverting the model\\u2019s safety training including jailbreaks, encoding-based attacks, multi-turn attacks, and adversarial suffix attacks. Please refer to the technical report for more details on safety alignment. To understand the capabilities, we compare phi-4 with a set of models over OpenAI\\u2019s SimpleEval benchmark.\\n\\nOur training data is an extension of the data used for Phi-3 and includes a wide variety of sources from: Publicly available documents filtered rigorously for quality, selected high-quality educational data, and code. Newly created synthetic, \\u201Ctextbook-like\\u201D data for the purpose of teaching math, coding, common sense reasoning, general knowledge of the world (science, daily activities, theory of mind, etc.). Acquired academic books and Q\\u0026A datasets. High quality chat format supervised data covering various topics to reflect human preferences on different aspects such as instruct-following, truthfulness, honesty and helpfulness. Multilingual data constitutes about 8% of our overall data. We are focusing on the quality of data that could potentially improve the reasoning ability for the model, and we filter the publicly available documents to contain the correct level of knowledge.\\n\\nWe evaluated phi-4 using OpenAI\\u2019s SimpleEval and our own internal benchmarks to understand the model\\u2019s capabilities, more specifically: MMLU: Popular aggregated dataset for multitask language understanding. MATH: Challenging competition math problems. GPQA: Complex, graduate-level science questions. DROP: Complex comprehension and reasoning. MGSM: Multi-lingual grade-school math. HumanEval: Functional code generation. SimpleQA: Factual responses. phi-4 has adopted a robust safety post-training approach. This approach leverages a variety of both open-source and in-house generated synthetic datasets. The overall technique employed to do the safety alignment is a combination of SFT (Supervised Fine-Tuning) and iterative DPO (Direct Preference Optimization), including publicly available datasets focusing on helpfulness and harmlessness as well as various questions and answers targeted to multiple safety categories.\\n\\nEnglish language varieties with less representation in the training data might experience worse performance than standard American English. phi-4 is not intended to support multilingual use. Representation of Harms \\u0026 Perpetuation of Stereotypes: These models can over- or under-represent groups of people, erase representation of some groups, or reinforce demeaning or negative stereotypes. Despite safety post-training, these limitations may still be present due to differing levels of representation of different groups or prevalence of examples of negative stereotypes in training data that reflect real-world patterns and societal biases. Inappropriate or Offensive Content: These models may produce other types of inappropriate or offensive content, which may make it inappropriate to deploy for sensitive contexts without additional mitigations that are specific to the use case.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://huggingface.co/microsoft/phi-4\"}},{\"type\":\"knowledge\",\"title\":\"Welcome to the new Phi-4 models - Microsoft Phi-4-mini \\u0026 Phi-4-multimodal\",\"url\":\"https://techcommunity.microsoft.com/blog/educatordeveloperblog/welcome-to-the-new-phi-4-models---microsoft-phi-4-mini--phi-4-multimodal/4386037\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Community Hub\"},\"is_missing\":false,\"text\":\"Phi-4-multimodal is a fully multimodal model that supports text, visual, and voice inputs. If you\\u0026#x27;re already familiar with visual contexts, the model can even generate code directly from images, streamlining the development process.\\n\\nPhi-4-mini brings significant enhancements in multilingual support, reasoning, and mathematics, and now, the long-awaited function calling feature is finally supported. As for Phi-4-multimodal, it is a fully multimodal model capable of vision, audio, text, multilingual understanding, strong reasoning, encoding, and more. These models can also be deployed on edge devices, enabling IoT applications to integrate generative AI even in environments with limited computing power and network access. Now, let\\u2019s dive into the new Phi-4-mini and Phi-4-multimodal together! This is a highly anticipated feature within the community. With function calling, Phi-4-mini and Phi-4-multimodal can extend their text-processing capabilities by integrating search engines, connecting various tools, and more. As illustrated in the image, the model is being used to retrieve Premier League match information via Phi-4-mini, showcasing its ability to interact with external data sources seamlessly.\\n\\nNow, even with a reduced parameter size, both Phi-4-mini and Phi-4-multimodal retain this capability. We can test their reasoning abilities by combining them with image inputs. For example, by uploading an image, Phi-4-multimodal can generate structured project code based on both the image content and provided prompts. \\uD83D\\uDD17 Advanced Reasoning Code Sample: https://github.com/microsoft/PhiCookBook/blob/main/md/02.Application/02.Code/Phi4/GenProjectCode/README.md \\u00B7 Despite their compact size, Phi-4-mini and Phi-4-multimodal achieve performance levels comparable to some LLMs. They can be deployed on edge devices, enabling PCs, mobile devices, and IoT systems to leverage enhanced generative AI capabilities. We will continue to expand the available examples in the Phi Cookbook, aiming to make it your go-to guide for Phi-4.\\n\\nPhi-4-multimodal is a fully multimodal model that supports text, visual, and voice inputs. If you\\u0027re already familiar with visual contexts, the model can even generate code directly from images, streamlining the development process. ... The integration of audio functions has given Phi-4 stronger functional support. The following are some examples \\u00B7 Audio Samples Extraction https://github.com/microsoft/PhiCookBook/blob/main/md/02.Application/08.Multimodel/Phi4/TechJournalist/phi_4_mm_audio_text_publish_news.ipynb \\u00B7 Voice Interaction Sample https://github.com/microsoft/PhiCookBook/blob/main/md/02.Application/05.Audio/Phi4/Siri/demo.ipynb \\u00B7 Audio translation Sample https://github.com/microsoft/PhiCookBook/blob/main/md/02.Application/05.Audio/Phi4/Translate/demo.ipynb \\u00B7 When Phi-4 (14B) was released, its strong reasoning capabilities were a major highlight.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"February 26, 2025\",\"url\":\"https://techcommunity.microsoft.com/blog/educatordeveloperblog/welcome-to-the-new-phi-4-models---microsoft-phi-4-mini--phi-4-multimodal/4386037\"}},{\"type\":\"knowledge\",\"title\":\"phi4\",\"url\":\"https://ollama.com/library/phi4\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"ollama.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=ollama.com\",\"site_name\":\"Ollama\"},\"is_missing\":false,\"text\":\"Phi-4 is a 14B parameter, state-of-the-art open model from Microsoft.\\n\\nPhi-4 is a 14B parameter, state-of-the-art open model built upon a blend of synthetic datasets, data from filtered public domain websites, and acquired academic books and Q\\u0026A datasets. The model underwent a rigorous enhancement and alignment process, incorporating both supervised fine-tuning and direct preference optimization to ensure precise instruction adherence and robust safety measures. ... The model is designed to accelerate research on language models, for use as a building block for generative AI powered features. It provides uses for general purpose AI systems and applications (primarily in English) which require: ... Latency bound scenarios. Reasoning and logic. The models are not specifically designed or evaluated for all downstream purposes, thus: Developers should consider common limitations of language models as they select use cases, and evaluate and mitigate for accuracy, safety, and fairness before using within a specific downstream use case, particularly for high-ris\\n\\nDevelopers should be aware of and adhere to applicable laws or regulations (including privacy, trade compliance laws, etc.) that are relevant to their use case, including the model\\u2019s focus on English.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://ollama.com/library/phi4\"}},{\"type\":\"knowledge\",\"title\":\"GitHub - microsoft/PhiCookBook: This is a Phi Family of SLMs book for getting started with Phi Models. Phi a family of open sourced AI models developed by Microsoft. Phi models are the most capable and cost-effective small language models (SLMs) available, outperforming models of the same size and next size up across a variety of language, reasoning, coding, and math benchmarks\",\"url\":\"https://github.com/microsoft/PhiCookBook\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"Evaluate the Fine-tuned Phi-3 / Phi-3.5 Model in Azure AI Foundry Focusing on Microsoft\\u0026#x27;s Responsible AI Principles \\u00B7 [\\uD83D\\uDCD3] Phi-3.5-mini-instruct language prediction sample (Chinese/English) ... .NET console application using Phi-4-multimodal Audio to analyze an audio file and generate transcript ... [\\uD83D\\uDCD3] Building a Retrieval-Augmented Generation (RAG) Pipeline with NVIDIA NIM Phi-3 MOE, Azure AI Search, and LlamaIndex ... (WhyPHI) Fine-Tuning PHI-3 for Multiple-Choice Question Answering: Methodology, Results, and Challenges ... You can learn how to use Microsoft Phi and how to build E2E solutions in your different hardware devices. To experience Phi for yourself, start by playing with the models and customizing Phi for your scenarios using the Azure AI Foundry Azure AI Model Catalog you can learn more at Getting Started with Azure AI Foundry \\u00B7\\n\\nThis is a Phi Family of SLMs book for getting started with Phi Models. Phi a family of open sourced AI models developed by Microsoft. Phi models are the most capable and cost-effective small language models (SLMs) available, outperforming models of the same size and next size up across a variety of language, reasoning, coding, and math benchmarks - microsoft/PhiCookBook\\n\\nPhi is a series of open source AI models developed by Microsoft. Phi is currently the most powerful and cost-effective small language model (SLM), with very good benchmarks in multi-language, reasoning, text/chat generation,coding, images, audio and other scenarios. You can deploy Phi to the cloud or to edge devices, and you can easily build generative AI applications with limited computing power. Follow these steps to get started using these resource : ...\\n\\nYou can learn how to use Microsoft Phi and how to build E2E solutions in your different hardware devices. To experience Phi for yourself, start by playing with the model and customizing Phi for your scenarios using the GitHub Model Catalog you can learn more at Getting Started with GitHub Model Catalog \\u00B7 Playground Each model has a dedicated playground to test the model. ... Microsoft is committed to helping our customers use our AI products responsibly, sharing our learnings, and building trust-based partnerships through tools like Transparency Notes and Impact Assessments. Many of these resources can be found at https://aka.ms/RAI. Microsoft\\u2019s approach to responsible AI is grounded in our AI principles of fairness, reliability and safety, privacy and security, inclusiveness, transparency, and accountability. Large-scale natural language, image, and speech models - like the ones used in this sample - can potentially behave in ways that are unfair, unreliable, or offensive, in turn cau\\n\\nThis project may contain trademarks or logos for projects, products, or services. Authorized use of Microsoft trademarks or logos is subject to and must follow Microsoft\\u0027s Trademark \\u0026 Brand Guidelines. Use of Microsoft trademarks or logos in modified versions of this project must not cause confusion or imply Microsoft sponsorship. Any use of third-party trademarks or logos are subject to those third-party\\u0027s policies.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/microsoft/PhiCookBook\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"dee1db44-6696-45b0-a4c7-f0357573a320\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

