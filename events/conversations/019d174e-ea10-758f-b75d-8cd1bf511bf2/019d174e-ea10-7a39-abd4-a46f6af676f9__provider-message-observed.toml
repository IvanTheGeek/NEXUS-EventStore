text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Using Phi-3 \\u0026 C# with ONNX for text and vision samples - .NET Blog\",\"url\":\"https://devblogs.microsoft.com/dotnet/using-phi3-csharp-with-onnx-for-text-and-vision-samples-md/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft\"},\"is_missing\":false,\"text\":\"using Microsoft.ML.OnnxRuntimeGenAI; var modelPath = @\\u0026quot;D:\\\\phi3\\\\models\\\\Phi-3-mini-4k-instruct-onnx\\\\cpu_and_mobile\\\\cpu-int4-rtn-block-32\\u0026quot;; var model = new Model(modelPath); var tokenizer = new Tokenizer(model); var systemPrompt = \\u0026quot;You are an AI assistant that helps people find information. Answer questions using a direct style. Do not share more information that the requested by the users.\\u0026quot;; // chat start Console.WriteLine(@\\u0026quot;Ask your question.\\n\\nThe Phi-3 Small Language Model (SLM) represents a groundbreaking advancement in AI, developed by Microsoft. It\\u2019s part of the Phi-3 family, which includes the most capable and cost-effective SLMs available today. These models outperform others of similar or even larger sizes across various benchmarks, including language, reasoning, coding, and math tasks. The Phi-3 models, including the Phi-3-mini, Phi-3-small, and Phi-3-medium, are designed to be instruction-tuned and optimized for ONNX Runtime, ensuring broad compatibility and high performance. ... ONNX, or Open Neural Network Exchange, is an open-source format that allows AI models to be portable and interoperable across different frameworks and hardware. It enables developers to use the same model with various tools, runtimes, and compilers, making it a cornerstone for AI development. ONNX supports a wide range of operators and offers extensibility, which is crucial for evolving AI needs.\\n\\nIt includes labs and sample projects that demonstrates the use of Phi-3 mini and Phi-3-Vision models in .NET applications. If you want to learn more, check also the Vision samples, which demonstrate the capabilities of AI in visual computing using a SLM, ONNX and C#. If you want to learn more about .NET and AI, check out our additional AI samples at Get started with .NET 8 and AI using new quickstart tutorials. ... Discussion is closed. Login to edit/delete existing comments. ... I managed to get my own Phi3 model up and running locally with C#/.NET, and opted for a DirectML/ONNX version (my preferred model image format and execution provider). This went a bit \\u0022off the grid\\u0022 from the examples which show only CPU-driven examples. For anyone else going this route, you simply have to replace the NuGet packages with the alternative ending in \\u0022.DirectML\\u0022 or \\u0022.CUDA\\u0022 or whatever provider you want to use to run it (must remove the \\u0022vanilla\\u0022 CPU versions of the packages or they will get loaded \\n\\nI managed to get my own Phi3 model up and running locally with C#/.NET, and opted for a DirectML/ONNX version (my preferred model image format and execution provider). This went a bit \\u201Coff the grid\\u201D from the examples which show only CPU-driven examples. For anyone else going this route, you simply have to replace the NuGet packages with the alternative ending in \\u201C.DirectML\\u201D or \\u201C.CUDA\\u201D or whatever provider you want to use to run it (must remove the \\u201Cvanilla\\u201D CPU versions of the packages or they will get loaded instead and you\\u2019ll get some cryptic exception messages) \\u2026 \\u00B7 The things I\\u2019m looking for more help and info on are some kind of guidelines on which packages can work together happily and how to set up a .NET training pipeline with C# using the correct NuGet packages (which ones those are precisely doesnt seem to be documented), as well as proper shape/format for training sample data to customize this thing.\\n\\nusing Microsoft.ML.OnnxRuntimeGenAI; var modelPath = @\\u0022D:\\\\phi3\\\\models\\\\Phi-3-mini-4k-instruct-onnx\\\\cpu_and_mobile\\\\cpu-int4-rtn-block-32\\u0022; var model = new Model(modelPath); var tokenizer = new Tokenizer(model); var systemPrompt = \\u0022You are an AI assistant that helps people find information. Answer questions using a direct style. Do not share more information that the requested by the users.\\u0022; // chat start Console.WriteLine(@\\u0022Ask your question.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"June 19, 2024\",\"url\":\"https://devblogs.microsoft.com/dotnet/using-phi3-csharp-with-onnx-for-text-and-vision-samples-md/\"}},{\"type\":\"knowledge\",\"title\":\"Phi-3-mini in 30 lines of C# with ONNX Runtime GenAI \\u2013 nietras \\u2013 Programming, mechanical sympathy, machine learning and .NET \\u2764.\",\"url\":\"https://nietras.com/2024/04/28/phi-3-mini-csharp-ortgenai/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"nietras.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=nietras.com\",\"site_name\":\"Nietras\"},\"is_missing\":false,\"text\":\"As part of the Phi-3 launch Microsoft has released optimized ONNX models as detailed in ONNX Runtime supports Phi-3 mini models across platforms and devices and published the models on HuggingFace \\uD83E\\uDD17 at Phi-3 Mini-4K-Instruct ONNX models for consumption in for example the ONNX Runtime GenAI. This makes it very easy to run this model locally in just a few lines of C# as I\\u2019ll show in this blog post. Install .NET 8 SDK. ... Any of these directories can be used with ONNX Runtime GenAI. It does also mean there is a large ~2GB onnx.data weights file for each of these, and that you need to have each of these present if you want to run either of them depending on available hardware. CUDA is required for the cuda models, which I\\u2019ll use here, and you need to have a compatible GPU and drivers installed. Create a new console app with dotnet new console -n OnnxRuntimeGenAiDemo and change to: ...\\n\\nGenerally ONNX runtime and GenAI packaging and modularization of these is lacking, despite the architecture and design of ONNX runtime being highly modular and extensible. Ideally you should be able to pick and choose one or multiple execution providers and run on whatever provider is available at runtime. This is what we do for our ML computer vision needs but it has required us to custom built and custom package native packages for the ONNX Runtime. This is part of the NtvLibs packages I have published on nuget and for which I created a .NET tool to create such packages. Including support for splitting large native library files across multiple nuget packages similar to how TorchSharp does this. Something I have yet to detail in a blog post. If I\\u2019ll ever find the time. It\\u2019s fairly easy to get Phi-3-mini to output garbage or loop forever. Just prompt test for example.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://nietras.com/2024/04/28/phi-3-mini-csharp-ortgenai/\"}},{\"type\":\"knowledge\",\"title\":\"Build A Generative AI App In C# With Phi-3 SLM And ONNX | Build5Nines\",\"url\":\"https://build5nines.com/build-a-generative-ai-app-in-c-with-phi-3-mini-llm-and-onnx/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"build5nines.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=build5nines.com\",\"site_name\":\"Build5Nines\"},\"is_missing\":false,\"text\":\"In the context of C#, ONNX Runtime allows developers to integrate ML models into C# apps. It also provides a .NET API that makes it easier to load and run ONNX models within .NET apps.\\n\\nThe Microsoft Phi-3 SLM (small language model) is an AI model that you can run locally or in your applications hosted almost anywhere. I\\u0027ve been exploring the\\n\\nIt\\u2019s really exciting to see how C# can be used with ONNX Runtime and Microsoft\\u2019s Phi-3 SLM model to build your own custom, generative AI application. This article shows the code for a simple console application, however, this code could be run in any .NET application. The use of ONNX Runtime will run the AI model on GPU if able, but will fall back to CPU. This means the ONNX Runtime can be used to host the Phi-3 SLM, or any other ONNX supported model, in any .NET application running on just about any device. The speed of the model will depend on the amount of compute power on the device it\\u2019s running on. Happy building your own generative AI applications! Original Article Source: Build a Generative AI App in C# with Phi-3 SLM and ONNX written by Chris Pietschmann (If you\\u0027re reading this somewhere other than Build5Nines.com, it was republished without permission.) ...\\n\\nThe Microsoft Phi-3 SLM (small language model) is an AI model that you can run locally or in your applications hosted almost anywhere. I\\u2019ve been exploring the world of hosting AI models in code lately, and this stuff is getting really interested. It turns out that among the tools to run AI models locally, there are developer tools you can use to build your own generative AI apps. I previously wrote about running Phi-3 locally using Ollama, so I thought I\\u2019d explore how to build your own Generative AI apps using Phi-3 too. This article goes through the steps to use C# and the ONNX Runtime to build your own generative AI app using Microsoft\\u2019s Phi-3 Generative AI model. Let\\u2019s build our own local, generative AI app with C# and Phi-3! ... Phi-3 is the latest version of the \\u201CPhi\\u201D SLM (small language model) from Microsoft. This new version represents a significant leap forward in the quest for smaller yet powerful language models.\\n\\nBe sure to update the code by setting the modelPath variable\\u2019s value to the full folder path to where you downloaded (or git cloned) the ONNX optimized Phi-3 model files. When running the app, you will be able to type in prompts and see the generated AI response output to the console. ... Assuming you are familiar with C# and the while loop used to continually capture user input, let\\u2019s look at a few of the key items in the code. These are the specific pieces you will need to understand when taking this code example and adapting it for your own needs. The System Prompt is used to tell the AI model the initial context to use when generating responses to the prompt. The system prompt is given to the model before the main user prompt. It is defined in this code as the systemPrompt variable: var systemPrompt = \\u0022You are a knowledgeable and friendly \\u0022 \\u002B \\u0022assistant made by Build5Nines named Jarvis.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"October 23, 2024\",\"url\":\"https://build5nines.com/build-a-generative-ai-app-in-c-with-phi-3-mini-llm-and-onnx/\"}},{\"type\":\"knowledge\",\"title\":\"Using Phi-3 \\u0026 C# with ONNX for text and vision samples\",\"url\":\"https://techcommunity.microsoft.com/blog/educatordeveloperblog/using-phi-3--c-with-onnx-for-text-and-vision-samples/4161020\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Community Hub\"},\"is_missing\":false,\"text\":\"using Microsoft.ML.OnnxRuntimeGenAI; var modelPath = @\\u0026quot;D:\\\\phi3\\\\models\\\\Phi-3-mini-4k-instruct-onnx\\\\cpu_and_mobile\\\\cpu-int4-rtn-block-32\\u0026quot;; var model = new Model(modelPath); var tokenizer = new Tokenizer(model); var systemPrompt = \\u0026quot;You are an AI assistant that helps people find information. Answer questions using a direct style. Do not share more information that the requested by the users.\\u0026quot;; // chat start Console.WriteLine(@\\u0026quot;Ask your question.\\n\\nThis is a great example of how you can leverage the power of Phi-3 and ONNX in a C# application to create an interactive AI experience. Please take a look at the other scenarios and if you have any questions, we are happy to receive your feedback!\\n\\nThe Phi-3 Small Language Model (SLM) represents a groundbreaking advancement in AI, developed by Microsoft. It\\u2019s part of the Phi-3 family, which includes the most capable and cost-effective SLMs available today. These models outperform others of similar or even larger sizes across various benchmarks, including language, reasoning, coding, and math tasks. The Phi-3 models, including the Phi-3-mini, Phi-3-small, and Phi-3-medium, are designed to be instruction-tuned and optimized for ONNX Runtime, ensuring broad compatibility and high performance. ... Phi-3 Microsoft Blog https://aka.ms/phi3blog-april Phi-3 Technical Report https://aka.ms/phi3-tech-report ... ONNX, or Open Neural Network Exchange, is an open-source format that allows AI models to be portable and interoperable across different frameworks and hardware. It enables developers to use the same model with various tools, runtimes, and compilers, making it a cornerstone for AI development.\\n\\nMicrosoft.ML.OnnxRuntime, https://github.com/microsoft/onnxruntime \\u00B7 The Phi-3 Coookbook GitHub repository contains C# labs and workshops sample projects that demonstrate the use of Phi-3 mini and Phi-3-Vision models in .NET applications. It showcases how these powerful models can be utilized for tasks like question-answering and image analysis within a .NET environment. ... Clone the repository to your local machine. Open a terminal and navigate to the desired project. In example, let\\u0027s run LabsPhi301. ... The sample project ask for a user input and replies using the local mode. ... Let\\u0027s take a look at the 1st demo application with the following code snippet is from /src/LabsPhi301/Program.cs. The main steps to use a model with ONNX are: The Phi-3 model, stored in the modelPath , is loaded into a Model object. This model is then used to create a Tokenizer which will be responsible for converting our text inputs into a format that the model can understand.\\n\\nusing Microsoft.ML.OnnxRuntimeGenAI; var modelPath = @\\u0022D:\\\\phi3\\\\models\\\\Phi-3-mini-4k-instruct-onnx\\\\cpu_and_mobile\\\\cpu-int4-rtn-block-32\\u0022; var model = new Model(modelPath); var tokenizer = new Tokenizer(model); var systemPrompt = \\u0022You are an AI assistant that helps people find information. Answer questions using a direct style. Do not share more information that the requested by the users.\\u0022; // chat start Console.WriteLine(@\\u0022Ask your question.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"June 6, 2024\",\"url\":\"https://techcommunity.microsoft.com/blog/educatordeveloperblog/using-phi-3--c-with-onnx-for-text-and-vision-samples/4161020\"}},{\"type\":\"knowledge\",\"title\":\"C# | onnxruntime\",\"url\":\"https://onnxruntime.ai/docs/get-started/with-csharp.html\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"onnxruntime.ai\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=onnxruntime.ai\",\"site_name\":\"ONNX Runtime\"},\"is_missing\":false,\"text\":\"The ONNX runtime provides a C# .NET binding for running inference on ONNX models in any of the .NET standard platforms.\\n\\nusing Microsoft.ML.OnnxRuntime.Tensors; using Microsoft.ML.OnnxRuntime; namespace Samples { class FeedModelAToModelB { static void Program() { const string modelAPath = \\u0022./modelA.onnx\\u0022; const string modelBPath = \\u0022./modelB.onnx\\u0022; using InferenceSession session1 = new InferenceSession(modelAPath); using InferenceSession session2 = new InferenceSession(modelBPath); // Illustration only float[] inputData = { 1, 2, 3, 4 }; long[] inputShape = { 1, 4 }; using var inputOrtValue = OrtValue.CreateTensorValueFromMemory(inputData, inputShape); // Create input data for session. Request all outputs in this case.\\n\\npublic static async Task\\u003CIActionResult\\u003E Run( [HttpTrigger(AuthorizationLevel.Function, \\u0022get\\u0022, \\u0022post\\u0022, Route = null)] HttpRequest req, ILogger log, ExecutionContext context) { log.LogInformation(\\u0022C# HTTP trigger function processed a request.\\u0022); string review = req.Query[\\u0022review\\u0022]; string requestBody = await new StreamReader(req.Body).ReadToEndAsync(); dynamic data = JsonConvert.DeserializeObject(requestBody); review ??= data.review; Debug.Assert(!string.IsNullOrEmpty(review), \\u0022Expecting a string with a content\\u0022); // Get path to model to create inference session. const string modelPath = \\u0022./model.onnx\\u0022; // Create an InferenceSession from the Model Path. // Creating and loading sessions are expensive per request. // They better be cached using var session = new InferenceSession(modelPath); // create input tensor (nlp example) using var inputOrtValue = OrtValue.CreateTensorWithEmptyStrings(OrtAllocator.DefaultInstance, new long[] { 1, 1 }); inputOrtValue.StringTensorSetElementAt(review, 0)\\n\\n// That result is a Sequence of Maps, and we only need the first map from there. using var outputs = session.Run(runOptions, inputs, session.OutputNames); Debug.Assert(outputs.Count \\u003E 0, \\u0022Expecting some output\\u0022); // We want the last output, which is the sequence of maps var lastOutput = outputs[outputs.Count - 1]; // Optional code to check the output type { var outputTypeInfo = lastOutput.GetTypeInfo(); Debug.Assert(outputTypeInfo.OnnxType == OnnxValueType.ONNX_TYPE_SEQUENCE, \\u0022Expecting a sequence\\u0022); var sequenceTypeInfo = outputTypeInfo.SequenceTypeInfo; Debug.Assert(sequenceTypeInfo.ElementType.OnnxType == OnnxValueType.ONNX_TYPE_MAP, \\u0022Expecting a sequence of maps\\u0022); } var elementsNum = lastOutput.GetValueCount(); Debug.Assert(elementsNum \\u003E 0, \\u0022Expecting a non empty sequence\\u0022); // Get the first map in sequence using var firstMap = lastOutput.GetValue(0, OrtAllocator.DefaultInstance); // Optional code just checking { // Maps always have two elements, keys and values // We are expectin\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://onnxruntime.ai/docs/get-started/with-csharp.html\"}},{\"type\":\"knowledge\",\"title\":\"Get started with Phi3 and other language models in your Windows app with ONNX Runtime Generative AI | Microsoft Learn\",\"url\":\"https://learn.microsoft.com/en-us/windows/ai/models/get-started-models-genai\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Learn\"},\"is_missing\":false,\"text\":\"In Visual Studio, create a new project. In the Create a new project dialog, set the language filter to \\u0026quot;C#\\u0026quot; and the project type filter to \\u0026quot;winui\\u0026quot;, then select the Blank app, Packaged (WinUI3 in Desktop) template.\\n\\nThis article walks you through creating a WinUI 3 app that uses a Phi3 model and the ONNX Runtime Generative AI library to implement a simple generative AI chat app. Large language models (LLMs) allow you to add text generation, transformation, reasoning, and translation capabilities to your app. For more information on using AI and machine learning models in your windows app, see Get started with AI on Windows. For more information about ONNX runtime and generative AI, see Generative AI with ONNX Runtime. When utilizing AI features, we recommend that you review: Developing Responsible Generative AI Applications and Features on Windows. ONNX Runtime is a cross-platform machine-learning model accelerator, with a flexible interface to integrate hardware-specific libraries. ONNX Runtime can be used with models from PyTorch, Tensorflow/Keras, TFLite, scikit-learn, and other frameworks.\\n\\nVisual Studio 2022 or later with the .NET desktop development workload. In Visual Studio, create a new project. In the Create a new project dialog, set the language filter to \\u0022C#\\u0022 and the project type filter to \\u0022winui\\u0022, then select the Blank app, Packaged (WinUI3 in Desktop) template. Name the new project \\u0022GenAIExample\\u0022. In Solution Explorer, right-click Dependencies and select Manage NuGet packages.... In the NuGet package manager, select the Browse tab. Search for \\u0022Microsoft.ML.OnnxRuntimeGenAI.DirectML\\u0022, select the latest stable version in the Version drop-down and then click Install. In Solution Explorer, right-click your project and select Add-\\u003ENew Folder. Name the new folder \\u0022Models\\u0022. For this example, we will be using the model from https://huggingface.co/microsoft/Phi-3-mini-4k-instruct-onnx/tree/main/directml/directml-int4-awq-block-128. There are several different ways to retrieve models.\\n\\nhuggingface-cli download microsoft/Phi-3-mini-4k-instruct-onnx --include directml/* --local-dir . When the operation is complete verify that the following file exists: [Project Directory]\\\\Models\\\\directml\\\\directml-int4-awq-block-128\\\\model.onnx. In Solution Explorer, expand the \\u0022directml-int4-awq-block-128\\u0022 folder and select all of the files in the folder. In the File Properties pane, set Copy to Output Directory to \\u0022Copy if newer\\u0022. For this example we will create a very simplistic UI that has a TextBox for specifying a prompt, a Button for submitting the prompt, and a TextBlock for displaying status messages and the responses from the model. Replace the default StackPanel element in MainWindow.xaml with the following XAML.\\n\\nIn MainWindow.xaml.cs, add a using directive for the Microsoft.ML.OnnxRuntimeGenAI namespace. ... Declare member variables inside the MainPage class definition for the Model and the Tokenizer. Set the location for the model files we added in the previous steps. private Model? model = null; private Tokenizer? tokenizer = null; private readonly string ModelDir = Path.Combine(AppDomain.CurrentDomain.BaseDirectory, @\\u0022Models\\\\directml\\\\directml-int4-awq-block-128\\u0022); Create a helper method to asynchronously initialize the model. This method calls the constructor for the Model class, passing in the path to the model directory. Next it creates a new Tokenizer from the model.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://learn.microsoft.com/en-us/windows/ai/models/get-started-models-genai\"}},{\"type\":\"knowledge\",\"title\":\"c# - onnx runtime without ML.NET - Stack Overflow\",\"url\":\"https://stackoverflow.com/questions/74087791/onnx-runtime-without-ml-net\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"stackoverflow.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=stackoverflow.com\",\"site_name\":\"Stack Overflow\"},\"is_missing\":false,\"text\":\"I am trying to run an ONNX inference session in c# in a system that can only run .net framework 4.8.Unfortunetely,framework 4.8 can not run ML.NET and upgrading is not an option. Are there any tricks or workaround that I can get ONNX runtime to work? I appreciate any suggestions. ... How about building the ONNX Runtime source code? You can run ONNX Runtime without relying on WinML or the .NET framework. For your information - https://onnxruntime.ai/docs/build/inferencing.html ... Sign up to request clarification or add additional context in comments. ... Find the answer to your question by asking. Ask question ... See similar questions with these tags. ... Have translations missed Paul\\u2019s syntax, making the church the fullness, instead of the Head, being all fullness of the father that fills the Church? Capturing terminal output from Debian upgrade, but \\u0060tee\\u0060 breaks ncurses dialog?\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://stackoverflow.com/questions/74087791/onnx-runtime-without-ml-net\"}},{\"type\":\"knowledge\",\"title\":\"GitHub - microsoft/PhiCookBook: This is a Phi Family of SLMs book for getting started with Phi Models. Phi a family of open sourced AI models developed by Microsoft. Phi models are the most capable and cost-effective small language models (SLMs) available, outperforming models of the same size and next size up across a variety of language, reasoning, coding, and math benchmarks\",\"url\":\"https://github.com/microsoft/PhiCookBook\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"Chat .NET Console App with Phi-4 ONNX using Sementic Kernel \\u00B7 Phi-3 / 3.5 Samples \\u00B7 Local Chatbot in the browser using Phi3, ONNX Runtime Web and WebGPU \\u00B7 OpenVino Chat \\u00B7 Multi Model - Interactive Phi-3-mini and OpenAI Whisper \\u00B7 MLFlow - Building a wrapper and using Phi-3 with MLFlow \\u00B7 Model Optimization - How to optimize Phi-3-min model for ONNX Runtime Web with Olive \\u00B7 WinUI3 App with Phi-3 mini-4k-instruct-onnx -WinUI3 Multi Model AI Powered Notes App Sample \\u00B7 Fine-tune and Integrate custom Phi-3 models with Prompt flow \\u00B7 Fine-tune and Integrate custom Phi-3 models with Prompt flow in Azure AI Foundry \\u00B7 Evaluate the Fine-tuned Phi-3 / Phi-3.5 Model in Azure AI Foundry Focusing on Microsoft\\u0026#x27;s Responsible AI Principles \\u00B7 [\\uD83D\\uDCD3] Phi-3.5-mini-instruct language prediction sample (Chinese/English) Phi-3.5-Instruct WebGPU RAG Chatbot \\u00B7 Using Windows GPU to create Prompt flow solution with Phi-3.5-Instruct ONNX \\u00B7\\n\\nChat .NET Console App with Phi-4 ONNX using Sementic Kernel \\u00B7 Phi-3 / 3.5 Samples \\u00B7 Local Chatbot in the browser using Phi3, ONNX Runtime Web and WebGPU \\u00B7 OpenVino Chat \\u00B7 Multi Model - Interactive Phi-3-mini and OpenAI Whisper \\u00B7 MLFlow - Building a wrapper and using Phi-3 with MLFlow \\u00B7 Model Optimization - How to optimize Phi-3-min model for ONNX Runtime Web with Olive \\u00B7 WinUI3 App with Phi-3 mini-4k-instruct-onnx -WinUI3 Multi Model AI Powered Notes App Sample \\u00B7 Fine-tune and Integrate custom Phi-3 models with Prompt flow \\u00B7 Fine-tune and Integrate custom Phi-3 models with Prompt flow in Azure AI Foundry \\u00B7 Evaluate the Fine-tuned Phi-3 / Phi-3.5 Model in Azure AI Foundry Focusing on Microsoft\\u0027s Responsible AI Principles \\u00B7 [\\uD83D\\uDCD3] Phi-3.5-mini-instruct language prediction sample (Chinese/English) Phi-3.5-Instruct WebGPU RAG Chatbot \\u00B7 Using Windows GPU to create Prompt flow solution with Phi-3.5-Instruct ONNX \\u00B7\\n\\nThis is a Phi Family of SLMs book for getting started with Phi Models. Phi a family of open sourced AI models developed by Microsoft. Phi models are the most capable and cost-effective small language models (SLMs) available, outperforming models of the same size and next size up across a variety of language, reasoning, coding, and math benchmarks - microsoft/PhiCookBook\\n\\n.NET console application using Phi-4-multimodal Audio to analyze an audio file and generate transcript ... [\\uD83D\\uDCD3] Building a Retrieval-Augmented Generation (RAG) Pipeline with NVIDIA NIM Phi-3 MOE, Azure AI Search, and LlamaIndex ... (WhyPHI) Fine-Tuning PHI-3 for Multiple-Choice Question Answering: Methodology, Results, and Challenges ... You can learn how to use Microsoft Phi and how to build E2E solutions in your different hardware devices. To experience Phi for yourself, start by playing with the models and customizing Phi for your scenarios using the Azure AI Foundry Azure AI Model Catalog you can learn more at Getting Started with Azure AI Foundry \\u00B7 Playground Each model has a dedicated playground to test the model Azure AI Playground. You can learn how to use Microsoft Phi and how to build E2E solutions in your different hardware devices. To experience Phi for yourself, start by playing with the model and customizing Phi for your scenarios using the GitHub Model Catalog you can lea\\n\\nPhi is a series of open source AI models developed by Microsoft. Phi is currently the most powerful and cost-effective small language model (SLM), with very good benchmarks in multi-language, reasoning, text/chat generation,coding, images, audio and other scenarios. You can deploy Phi to the cloud or to edge devices, and you can easily build generative AI applications with limited computing power. Follow these steps to get started using these resource : ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/microsoft/PhiCookBook\"}},{\"type\":\"knowledge\",\"title\":\"GitHub - aksoftware98/phi3-dotnet8: .NET 8.0 C# Console app with local host API that hosts the Microsoft Phi-3 mini model locally.\",\"url\":\"https://github.com/aksoftware98/phi3-dotnet8\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"If you run the model with Python, it will be straightforward to follow the instructions and run the model with NVIDIIA CUDA or Windows DirectML but with the .NET the ONNXRuntime packages for GenAI are still in early preview and I didn\\u0026#x27;t manage to get it to run correctly neither with CUDA nor DirectML. To not miss with the files of the model. Copy all the content from the folder: Phi-3-mini-4k-instruct-onnx/cpu-and-mobile/cpu-int4-rtn-32/ and paste them inside our solution folder that\\u0026#x27;s called Model, it can be found through the path *src/Phi3MiniHost/Model Mainly you can paste the content anywhere you want but keep in mind to copy the files with their names as they are without any changes. If you decided to put the model content in a different path related to our project, you need to mention that folder path in our Program.cs: ... (line 09) // TODO: Place the path of the model folder here: // Current directory is : src/Phi3MiniHost/Phi3MiniHost.Console/bin/Debug/net8.0/ string modelPath\\n\\nIf you run the model with Python, it will be straightforward to follow the instructions and run the model with NVIDIIA CUDA or Windows DirectML but with the .NET the ONNXRuntime packages for GenAI are still in early preview and I didn\\u0027t manage to get it to run correctly neither with CUDA nor DirectML. To not miss with the files of the model. Copy all the content from the folder: Phi-3-mini-4k-instruct-onnx/cpu-and-mobile/cpu-int4-rtn-32/ and paste them inside our solution folder that\\u0027s called Model, it can be found through the path *src/Phi3MiniHost/Model Mainly you can paste the content anywhere you want but keep in mind to copy the files with their names as they are without any changes. If you decided to put the model content in a different path related to our project, you need to mention that folder path in our Program.cs: ... (line 09) // TODO: Place the path of the model folder here: // Current directory is : src/Phi3MiniHost/Phi3MiniHost.Console/bin/Debug/net8.0/ string modelPath\\n\\nTo get started, first you need to clone the repo of the ONNX model of Phi-3-mini either the 4k or the 128k tokens . microsoft/Phi-3-mini-4k-instruct-onnx \\u00B7 Hugging Face . microsoft/Phi-3-mini-128k-instruct-onnx \\u00B7\\n\\nOptimized Phi-3 Mini models are published here in ONNX format to run with ONNX Runtime on CPU and GPU across devices, including server platforms, Windows, Linux, and Mac desktops, and mobile CPUs, with the precision best suited to each of these targets. Clone the current repo into your local machine. Inside the src folder, you will find the Phi3MiniHost folder that contains the solution. before you can run it there are more steps. By default, the ONNXRuntime GenAI packages are in preview and not all of them are available on the public NuGet feed.\\n\\nThe current version of the ONNXRuntime GenAI for .NET seems to not support some properties in the genai_config.json for the Phi-3. so open that file in your editor of favorite and do the following changes between the lines 28 to 36: ... In the Phi3MiniHost.Console project, you will find the modified file, you can copy it to the Model folder directly if you want. That\\u0027s it all!!! You will enjoy Phi-3 to the limits, as it\\u0027s so versatile, performant, local, and too powerful too. You can start developing your plugins, clients, and so on. Share with me what inventions you are working on in the Issues above \\u00B7 The code above is taken from the following onnxruntime-genai/examples/csharp at main \\u00B7\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/aksoftware98/phi3-dotnet8\"}},{\"type\":\"knowledge\",\"title\":\"Make predictions with AutoML ONNX Model in .NET - Azure Machine Learning | Microsoft Learn\",\"url\":\"https://learn.microsoft.com/en-us/azure/machine-learning/how-to-use-automl-onnx-model-dotnet?view=azureml-api-2\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Learn\"},\"is_missing\":false,\"text\":\"These packages contain the dependencies required to use an ONNX model in a .NET application. ML.NET provides an API that uses the ONNX runtime for predictions. Open the Program.cs file and add the following using directives at the top. using ...\\n\\nAccess to this page requires authorization. You can try changing directories. ... In this article, you learn how to use an Automated ML (AutoML) Open Neural Network Exchange (ONNX) model to make predictions in a C# console application with ML.NET. ML.NET is an open-source, cross-platform, machine learning framework for the .NET ecosystem that allows you to train and consume custom machine learning models using a code-first approach in C# or F#, or through low-code tooling like Model Builder and the ML.NET CLI. The framework is extensible and allows you to leverage other popular machine learning frameworks like TensorFlow and ONNX. ONNX is an open-source format for AI models. ONNX supports interoperability between frameworks. This means you can train a model in one of the many popular machine learning frameworks like PyTorch, convert it into ONNX format, and consume the ONNX model in a different framework like ML.NET.\\n\\nYour model opens. For example, the structure of the automl-model.onnx model looks like the following: Select the last node at the bottom of the graph (variable_out1 in this case) to display the model\\u0027s metadata. The inputs and outputs on the sidebar show you the model\\u0027s expected inputs, outputs, and data types. Use this information to define the input and output schema of your model. Create a new class called OnnxInput with the following properties inside the Program.cs file.\\n\\nThese packages contain the dependencies required to use an ONNX model in a .NET application. ML.NET provides an API that uses the ONNX runtime for predictions. Open the Program.cs file and add the following using directives at the top. using System.Linq; using Microsoft.ML; using Microsoft.ML.Data; using Microsoft.ML.Transforms.Onnx; A way for the console application to access the ONNX model is to add it to the build output directory. If you don\\u0027t already have a model, follow this notebook to create an example model. Add a reference to your ONNX model file in your application: Copy your ONNX model to your application\\u0027s AutoMLONNXConsoleApp root directory. Open the AutoMLONNXConsoleApp.csproj file and add the following content inside the Project node. \\u003CItemGroup\\u003E \\u003CNone Include=\\u0022automl-model.onnx\\u0022\\u003E \\u003CCopyToOutputDirectory\\u003EPreserveNewest\\u003C/CopyToOutputDirectory\\u003E \\u003C/None\\u003E \\u003C/ItemGroup\\u003E In this case, the name of the ONNX model file is automl-model.onnx.\\n\\nOpen the Program.cs file and add the following line inside the Program class. static string ONNX_MODEL_PATH = \\u0022automl-model.onnx\\u0022; Inside the Main method of your Program class, create a new instance of MLContext. ... The MLContext class is a starting point for all ML.NET operations, and initializing mlContext creates a new ML.NET environment that can be shared across the model lifecycle. It\\u0027s similar, conceptually, to DbContext in Entity Framework. A model expects the input and output data in a specific format. ML.NET allows you to define the format of your data via classes. Sometimes you might already know what that format looks like. In cases when you don\\u0027t know the data format, you can use tools like Netron to inspect the ONNX model. The model used in this sample uses data from the NYC TLC Taxi Trip dataset. A sample of the data is shown in the following table: Use a tool like Netron to inspect your model\\u0027s inputs and outputs.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://learn.microsoft.com/en-us/azure/machine-learning/how-to-use-automl-onnx-model-dotnet?view=azureml-api-2\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 18 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"6f3deed8-8c6a-4eaf-8d6f-9858a0d9bce8\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

