text = "A RAG system has three core pieces working together: **ingestion** (preparing your documents), **retrieval** (finding relevant pieces), and **generation** (using those pieces with an LLM). Let me walk you through each part so you understand how they connect.\n\n**The ingestion pipeline** is where you transform your documents into something searchable. You take each document, split it into chunks (usually 500-1000 tokens each with some overlap to preserve context), convert each chunk into a vector embedding using a model like `text-embedding-3-small` from OpenAI or `all-MiniLM-L6-v2` from Sentence Transformers, then store both the original text and its embedding in a vector database. The splitting matters because you want chunks small enough to be focused but large enough to contain meaningful information. The overlap between chunks helps prevent losing context at chunk boundaries.\n\n**The retrieval step** happens when someone asks a question. You convert their question into a vector embedding using the same model you used for the documents, then perform a similarity search in your vector database to find the most semantically similar chunks. This usually means cosine similarity or dot product between vectors. You typically retrieve the top 3-10 most relevant chunks based on your context window budget and how much information you need.\n\n**The generation phase** is where you take those retrieved chunks and send them to Claude (or another LLM) along with the user's question. You structure a prompt that includes the context chunks and instructs the model to answer based only on the provided information. This is where Claude's actual understanding and response generation happens.\n\nFor implementation in F# on your Linux system, here's what you'd practically need. For the vector database, you could use Qdrant (runs as a Docker container, has a REST API) or Milvus, or for lighter needs, SQLite with the vector search extension. For embeddings, you'd call either OpenAI's API or run a local model through something like ONNX Runtime. The HTTP calls would work well with your FsHttp library.\n\nThe architecture would look like this: your ingestion service reads documents, chunks them (you can write a simple chunking function that splits on sentence boundaries with overlap), calls the embedding API for each chunk, and stores chunk text plus embeddings in your vector DB. Your retrieval service receives a query, embeds it, searches the vector DB, and returns ranked results. Your MCP server would expose a tool that performs the query-retrieval-generation cycle, returning Claude's response based on the retrieved context.\n\nThe key insight is that RAG separates **what information exists** (the vector database) from **what information is relevant right now** (the retrieval step) from **how to use that information** (Claude's generation). This lets you work with knowledge bases far larger than any context window.\n\nDoes this give you enough to start thinking about implementation, or would you like me to dig deeper into a specific piece - like the chunking strategy, vector database options for F#, or how to structure this as an MCP tool?"

