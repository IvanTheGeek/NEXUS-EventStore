text = "**Summary of findings:**\n\n## Phi-4 ONNX Availability ✅\n\nMicrosoft has official ONNX versions of Phi-4 models available on Hugging Face, optimized for both CPU and GPU inference with int4 quantization. Available variants include:\n- Phi-4 (14B)  \n- Phi-4-mini (3.8B)\n- Phi-4-multimodal (5.6B)\n- Phi-4-reasoning variants\n\nAll can be used with ONNX Runtime GenAI via the Microsoft.ML.OnnxRuntime NuGet package for .NET.\n\n## LoRA/QLoRA Training\n\nI didn't find specific published results for Phi-4 LoRA training (model is very recent), but the general QLoRA ecosystem is mature:\n\nQLoRA can fine-tune 65B parameter models on a single 48GB GPU while preserving full 16-bit finetuning task performance. QLoRA decreases memory requirements by approximately 6GB compared to regular LoRA, though training takes longer due to quantization overhead.\n\nThe tooling (Hugging Face PEFT, bitsandbytes) supports any transformer model, so Phi-4 LoRA training should work but community recipes haven't emerged yet.\n\n## Coding Performance Comparisons\n\n**Phi-4 (14B):**\n- HumanEval score: 82.6, leading among small models\n- MATH benchmark: over 80%, outperforming GPT-4o-mini and Gemini Pro\n\n**Phi-3-mini (3.8B) vs Llama 3 8B:**\nThe benchmarks tell one story, real-world testing tells another:\n\nAccording to benchmarks, Phi-3-small and Phi-3-medium outperform Llama-3 8B on MMLU and MT-bench despite having fewer parameters.\n\nHowever, real-world testing revealed Phi-3-mini struggles with context recall and reasoning tasks where Llama 3 8B succeeds, suggesting Phi-3 may be overfitted to benchmarks. For document Q&A with large contexts, neither Phi nor Llama 3.2 3B were suitable for accuracy-critical tasks, with Claude significantly outperforming both.\n\n**Llama 3.1 8B:**\n- More balanced real-world performance\n- Huge community support and training recipes\n- More cost-effective API pricing than Phi models\n\n## My Assessment for Your Use Case:\n\n**Don't start with Phi-4 yet because:**\n1. Too new - LoRA training recipes not established\n2. 14B is larger than necessary for iteration\n3. Benchmark performance may not translate to your F#/MCP tasks\n\n**Start with Llama 3.1 8B because:**\n1. Sweet spot size (better than 3-4B, smaller than 14B)\n2. Proven LoRA/QLoRA training workflows\n3. Real-world performance > benchmark performance\n4. Your RTX 3090s handle it comfortably\n5. Massive Ollama/ONNX support\n\n**Then evaluate Phi-4 later when:**\n1. You have working baseline to compare against\n2. Community has published LoRA recipes\n3. You can A/B test coding quality on YOUR tasks\n\n**Immediate next steps:**\n\n1. Install Ollama\n2. Pull `llama3.1:8b`\n3. Test it on your actual F# and MCP questions\n4. Compare quality to Claude on same prompts\n5. Build RAG system with the winner\n\nDoes this give you enough to make a decision and start building?"

