text = "This repository hosts the optimized versions of the Phi-4 models to accelerate inference with ONNX Runtime. Optimized models are published here in ONNX format to run with ONNX Runtime on CPU and GPU across devices, including server platforms, Windows, Linux and Mac desktops, and mobile CPUs, with the precision best suited to each of these targets. Here are some of the optimized configurations we have added: ONNX model for int4 CPU: ONNX model for CPU and mobile using int4 quantization via RTN. ONNX model for int4 GPU: ONNX model for GPU using int4 quantization via RTN. You can see how to run examples with ORT GenAI here ... # Download the model directly using the Hugging Face CLI huggingface-cli download microsoft/phi-4-onnx --include cpu_and_mobile/cpu-int4-rtn-block-32-acc-level-4/* --local-dir . # Install the CPU package of ONNX Runtime GenAI pip install --pre onnxruntime-genai # Please adjust the model directory (-m) accordingly curl https://raw.githubusercontent.com/microsoft/onnx\n\nModel Description: This is a conversion of the Phi-4 model for ONNX Runtime inference. Disclaimer: Model is only an optimization of the base model, any risk associated with the model is the responsibility of the user of the model. Please verify and test for your scenarios. There may be a slight difference in output from the base model with the optimizations applied. Phi-4 is a state-of-the-art open model built upon a blend of synthetic datasets, data from filtered public domain websites, and acquired academic books and Q&A datasets. The goal of this approach was to ensure that small capable models were trained with data focused on high quality and advanced reasoning. See details at https://huggingface.co/microsoft/phi-4 ... This model isn't deployed by any Inference Provider. 🙋 Ask for provider support ... Phi-4 family of small language, multi-modal and reasoning models.\n\n# Download the model directly using the Hugging Face CLI huggingface-cli download microsoft/phi-4-onnx --include gpu/* --local-dir . # Install the CUDA package of ONNX Runtime GenAI pip install --pre onnxruntime-genai-cuda # Please adjust the model directory (-m) accordingly curl https://raw.githubusercontent.com/microsoft/onnxruntime-genai/main/examples/python/phi3-qa.py -o phi3-qa.py python phi3-qa.py -m gpu/gpu-int4-rtn-block-32 -e cuda ... # Download the model directly using the Hugging Face CLI huggingface-cli download microsoft/phi-4-onnx --include gpu/* --local-dir . # Install the DML package of ONNX Runtime GenAI onnxruntime-genai-directml # Please adjust the model directory (-m) accordingly curl https://raw.githubusercontent.com/microsoft/onnxruntime-genai/main/examples/python/phi3-qa.py -o phi3-qa.py python phi3-qa.py -m gpu/gpu-int4-rtn-block-32 -e dml ...\nThis is an ONNX version of the Phi-4 multimodal model that is quantized to int4 precision to accelerate inference with ONNX Runtime. For CPU: stay tuned or follow this tutorial to generate your own ONNX models for CPU!\n\nModel Description: This is a conversion of Phi4 multimodal model for ONNX Runtime inference. Disclaimer: Model is only an optimization of the base model, any risk associated with the model is the responsibility of the user of the model. Please verify and test for you scenarios. There may be a slight difference in output from the base model with the optimizations applied. Phi-4-multimodal-instruct is a lightweight open multimodal foundation model that leverages the language, vision, and speech research and datasets used for Phi-3.5 and 4.0 models. The model processes text, image, and audio inputs, generating text outputs, and comes with 128K token context length. The model underwent an enhancement process, incorporating both supervised fine-tuning, and direct preference optimization to support precise instruction adherence and safety measures. ... Phi-4 family of small language, multi-modal and reasoning models.\n\nThis is an ONNX version of the Phi-4 multimodal model that is quantized to int4 precision to accelerate inference with ONNX Runtime. For CPU: stay tuned or follow this tutorial to generate your own ONNX models for CPU! ... # Download the model directly using the Hugging Face CLI huggingface-cli download microsoft/Phi-4-multimodal-instruct-onnx --include gpu/* --local-dir . # Install the CUDA package of ONNX Runtime GenAI pip install --pre onnxruntime-genai-cuda # Please adjust the model directory (-m) accordingly curl https://raw.githubusercontent.com/microsoft/onnxruntime-genai/main/examples/python/phi4-mm.py -o phi4-mm.py python phi4-mm.py -m gpu/gpu-int4-rtn-block-32 -e cuda ... # Download the model directly using the Hugging Face CLI huggingface-cli download microsoft/Phi-4-multimodal-instruct-onnx --include gpu/* --local-dir . # Install the DML package of ONNX Runtime GenAI pip install --pre onnxruntime-genai-directml # Please adjust the model directory (-m) accordingly curl https\nThis repository hosts the optimized versions of the Phi-4 mini models to accelerate inference with ONNX Runtime. Optimized models are published here in ONNX format to run with ONNX Runtime on CPU and GPU across devices, including server platforms, Windows, Linux and Mac desktops, and mobile CPUs, with the precision best suited to each of these targets. Here are some of the optimized configurations we have added: ONNX model for int4 CPU: ONNX model for CPU and mobile using int4 quantization via RTN. ONNX model for int4 GPU: ONNX model for GPU using int4 quantization via RTN. You can see how to run examples with ORT GenAI here ... # Download the model directly using the Hugging Face CLI huggingface-cli download microsoft/Phi-4-mini-instruct-onnx --include cpu_and_mobile/cpu-int4-rtn-block-32-acc-level-4/* --local-dir . # Install the CPU package of ONNX Runtime GenAI pip install --pre onnxruntime-genai # Please adjust the model directory (-m) accordingly curl https://raw.githubusercontent\n\n# Download the model directly using the Hugging Face CLI huggingface-cli download microsoft/Phi-4-mini-instruct-onnx --include gpu/* --local-dir . # Install the DML package of ONNX Runtime GenAI pip install --pre onnxruntime-genai-directml # Please adjust the model directory (-m) accordingly curl https://raw.githubusercontent.com/microsoft/onnxruntime-genai/main/examples/python/phi3-qa.py -o phi3-qa.py python phi3-qa.py -m gpu/gpu-int4-rtn-block-32 -e dml ... Model Description: This is a conversion of the Phi-4 mini model for ONNX Runtime inference. Disclaimer: Model is only an optimization of the base model, any risk associated with the model is the responsibility of the user of the model. Please verify and test for your scenarios. There may be a slight difference in output from the base model with the optimizations applied. Phi-4-Mini is a lightweight open model built upon synthetic data and filtered publicly available websites - with a focus on high-quality, reasoning dense data.\nThese new Phi-4 mini and multimodal models are now available on Hugging Face, Azure AI Foundry Model Catalog, GitHub Models, and Ollama. Phi-4-mini brings significant enhancements in multilingual support, reasoning, and mathematics, and now, ...\n\nThese new Phi-4 mini and multimodal models are now available on Hugging Face, Azure AI Foundry Model Catalog, GitHub Models, and Ollama. Phi-4-mini brings significant enhancements in multilingual support, reasoning, and mathematics, and now, the long-awaited function calling feature is finally supported. As for Phi-4-multimodal, it is a fully multimodal model capable of vision, audio, text, multilingual understanding, strong reasoning, encoding, and more. These models can also be deployed on edge devices, enabling IoT applications to integrate generative AI even in environments with limited computing power and network access. Now, let’s dive into the new Phi-4-mini and Phi-4-multimodal together! This is a highly anticipated feature within the community. With function calling, Phi-4-mini and Phi-4-multimodal can extend their text-processing capabilities by integrating search engines, connecting various tools, and more.\n\nDespite their compact size, Phi-4-mini and Phi-4-multimodal achieve performance levels comparable to some LLMs. They can be deployed on edge devices, enabling PCs, mobile devices, and IoT systems to leverage enhanced generative AI capabilities. We will continue to expand the available examples in the Phi Cookbook, aiming to make it your go-to guide for Phi-4.\n\n🔗Sample Code for function calling https://github.com/microsoft/PhiCookBook/blob/main/md/02.Application/07.FunctionCalling/Phi4/FunctionCallingBasic/README.md · We can deploy the quantized model on edge devices. By combining Microsoft Olive and the ONNX GenAI Runtime, we can deploy Phi-4-mini on Windows, iPhone, Android and other devices. This is an example running on an iPhone 12 Pro. Phi-4-multimodal is a fully multimodal model that supports text, visual, and voice inputs. If you're already familiar with visual contexts, the model can even generate code directly from images, streamlining the development process. ... The integration of audio functions has given Phi-4 stronger functional support. The following are some examples · Audio Samples Extraction https://github.com/microsoft/PhiCookBook/blob/main/md/02.Application/08.Multimodel/Phi4/TechJournalist/phi_4_mm_audio_text_publish_news.ipynb ·\nPhi-4-mini-instruct is also available in Azure AI Studio · After obtaining the Phi-4-mini-instruct model checkpoints, users can use this sample code for inference.\n\nPhi-4-mini-instruct is a lightweight open model built upon synthetic data and filtered publicly available websites - with a focus on high-quality, reasoning dense data. The model belongs to the Phi-4 model family and supports 128K token context length. The model underwent an enhancement process, incorporating both supervised fine-tuning and direct preference optimization to support precise instruction adherence and robust safety measures. 📰 Phi-4-mini Microsoft Blog 📖 Phi-4-mini Technical Report 👩‍🍳 Phi Cookbook 🏡 Phi Portal 🖥️ Try It Azure, Huggingface ... The model is intended for broad multilingual commercial and research use. The model provides uses for general purpose AI systems and applications which require: ... Strong reasoning (especially math and logic). The model is designed to accelerate research on language and multimodal models, for use as a building block for generative AI powered features.\n\nPhi-4-mini-instruct is also available in Azure AI Studio · After obtaining the Phi-4-mini-instruct model checkpoints, users can use this sample code for inference.\n\nQuality of Service: The Phi models are trained primarily on English text and some additional multilingual text. Languages other than English will experience worse performance as well as performance disparities across non-English. English language varieties with less representation in the training data might experience worse performance than standard American English. Multilingual performance and safety gaps: We believe it is important to make language models more widely available across different languages, but the Phi 4 models still exhibit challenges common across multilingual releases. As with any deployment of LLMs, developers will be better positioned to test for performance or safety gaps for their linguistic and cultural context and customize the model with additional fine-tuning and appropriate safeguards. Representation of Harms & Perpetuation of Stereotypes: These models can over- or under-represent groups of people, erase representation of some groups, or reinforce demeaning\n\nMisinformation: Models may produce inaccurate information. Developers should follow transparency best practices and inform end-users they are interacting with an AI system. At the application level, developers can build feedback mechanisms and pipelines to ground responses in use-case specific, contextual information, a technique known as Retrieval Augmented Generation (RAG). Generation of Harmful Content: Developers should assess outputs for their context and use available safety classifiers or custom solutions appropriate for their use case. Misuse: Other forms of misuse such as fraud, spam, or malware production may be possible, and developers should ensure that their applications do not violate applicable laws and regulations. Architecture: Phi-4-mini-instruct has 3.8B parameters and is a dense decoder-only Transformer model. When compared with Phi-3.5-mini, the major changes with Phi-4-mini-instruct are 200K vocabulary, grouped-query attention, and shared input and output embeddin\nNote Phi-4 models in Hugging Face format · Updated Jun 11 • 32 · Updated Jun 17 • 30 • 1 · Updated Jun 17 • 36 • 1 · Automatic Speech Recognition • Updated Jun 13 • 99 • 78 · Updated 25 days ago • 142 • 38 · Updated Feb 27 33 • 18 · Note Phi-4 models in ONNX format · Text Generation • 15B • Updated May 8 • 9.48k • 159 · Note Phi-4 models in GGUF format · Paper • 2504.21318 • Published Apr 30 • 52 · Paper • 2503.01743 • Published Mar 3 • 89 · Paper • 2412.08905 • Published Dec 12, 2024 • 121 · Note Phi-4 technical reports · Upvote · 184 · +180 · Share collection · View history · Collection guide ·\nBoth Phi-4-multimodal and Phi-4-mini models are now available for developers in Azure AI Foundry, Hugging Face, and the NVIDIA API Catalog. Developers can go through the technical paper to see an outline of recommended models uses and their ...\n\nMicrosoft has unveiled two new additions to its Phi-4 family of small language models: Phi-4-multimodal, which integrates speech, vision, and text, and Phi-4-mini.\n\nIn December 2024, Microsoft introduced Phi-4, a small language model (SLM) with state-of-the-art performance in its class. Today, Microsoft is expanding the Phi-4 family with two new models: Phi-4-multimodal and Phi-4-mini. The new Phi-4-multimodal model supports speech, vision, and text simultaneously, while Phi-4-mini is 