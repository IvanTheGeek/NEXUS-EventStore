text = "As the table illustrates, Phi-3-small and Phi-3-medium outperform Llama-3 8B on both benchmarks, despite having fewer parameters. This remarkable achievement showcases the effectiveness of Microsoft&#x27;s training techniques and optimizations.\n\nComparing Meta's Llama 3 vs Microsoft Phi 3, Read the article to learn details! TRY NSFW AI (NO RESTRICTIONS) ... At the heart of Llama-3 lies a revolutionary Mixture-of-Experts (MoE) architecture, a groundbreaking approach that has propelled this compact language model to new heights of performance and efficiency. Unlike traditional dense models, Llama-3 employs a dynamic routing mechanism that intelligently directs incoming tokens to specialized neural networks, or \"experts,\" within the system. This innovative design allows Llama-3 to leverage the strengths of different expert networks, each meticulously trained to excel at specific tasks or domains. By dynamically routing tokens to the most appropriate experts, Llama-3 can deliver high-quality outputs while maintaining a relatively small parameter count compared to its larger counterparts. The MoE architecture is a departure from the conventional approach of using a single, monolithic model to handle all tasks.\n\nTo evaluate the performance of Llama-3 and Phi-3, we'll examine their scores on two widely-used benchmarks: MMLU (Multitask Metric for Longform Understanding) and MT-bench (Machine Translation Benchmark). As the table illustrates, Phi-3-small and Phi-3-medium outperform Llama-3 8B on both benchmarks, despite having fewer parameters. This remarkable achievement showcases the effectiveness of Microsoft's training techniques and optimizations. It's worth noting that Phi-3-mini, the smallest model in the series, matches the performance of larger models like Mixtral 8x7B and GPT-3.5, demonstrating the potential of compact language models when designed and trained effectively. While both Llama-3 and Phi-3 have demonstrated impressive performance, each model has its unique strengths and weaknesses: ... Efficient MoE Architecture: Llama-3's MoE architecture allows it to achieve impressive performance while maintaining a relatively small parameter count, making it more efficient and easier to d\n\nIs This the Best NSFW Roleplay LLM? (Mistral-Small-22B-ArliAI-RPMax-v1.1) 💡Want to Use the Latest Google Veo 3 to generate funny Bigfoot Vlogs? Want to Use Minimax Hailuo AI, Kling AI for Video Generation, but don't want to pay overpriced subscriptions? Want to Use Flux, Google Imagen 4, Recraft... to create Photorealistic Images in one place? Want to Use OpenAI's · 🐬 Dolphin Mistral 2.8: The Uncensored AI Powerhouse with 32K Context 🚀 · Dolphin Mistral 2.8, a state-of-the-art uncensored language model, pushes the boundaries of NLP with its expanded context window and impressive performance across various benchmarks and applications. Which Open Source LLM is Best for Code Generation? The field of code generation has seen significant advancements in recent years, with open-source models increasingly challenging their closed-source counterparts.\n\n+---------------------+ | GPT-4 | | 175B | +---------------------+ | +---------------------+ | Falcon 180B | +---------------------+ | +---------------------+ | Llama-3 65B | +---------------------+ | +---------------------+ | Phi-3 14B | +---------------------+ | +---------------------+ | Llama-3 8B | +---------------------+ | +---------------------+ | Phi-3 7B | +---------------------+ | +---------------------+ | Phi-3 3.8B | +---------------------+ As the diagram shows, Llama-3 and Phi-3 occupy a unique space in the LLM landscape, offering impressive performance while remaining relatively compact compared to behemoths like GPT-4 and Falcon 180B. The emergence of Llama-3 and Phi-3 represents a significant milestone in the development of compact and efficient language models. These models challenge the notion that larger models are inherently superior, demonstrating that with innovative architectures and advanced training techniques, compact models can achieve remarkable performance.\nWith its extensive training data (opens new window) and robust architecture, Llama-3 boasts unparalleled language comprehension (opens new window) and cognitive abilities (opens new window). Its vast token count enables nuanced understanding across various domains, setting it apart as a benchmark in AI development. ... In contrast, Phi-3-mini defies expectations with its modest 3.8 billion parameters (opens new window). This miniature marvel showcases exceptional performance levels that rival and even surpass larger models like Llama 3 8B. Despite its size, Phi-3-mini's efficiency (opens new window) and versatility make it a standout choice for diverse applications. When it comes to the foundation of AI prowess, llama-3 stands on a bedrock of 15 trillion tokens, a vast reservoir of knowledge that fuels its cognitive capabilities. In contrast, phi-3-mini operates with precision using a fraction of the tokens, showcasing efficiency in its compact design.\n\nIn the arena of AI performance metrics, the clash between llama-3 and phi-3-mini unfolds with intriguing revelations that redefine expectations and set new standards in the field. With its massive token count and robust architecture, llama-3 showcases formidable performance across various benchmarks. However, as the showdown progresses, it becomes evident that size does not always dictate success in the realm of AI. Surpassing expectations and defying conventional norms, phi-3-mini emerges as a dark horse in the competition. Despite its diminutive size in parameters compared to llama-3, phi-3-mini's performance levels soar high above expectations, setting a new benchmark for compact yet powerful AI models. Microsoft Research highlights the diverse applications of llama-3 in natural language processing tasks. The model's extensive training data enables it to excel in language comprehension, sentiment analysis, and text generation.\n\nPhi 3 embodies Microsoft Research's commitment to data quality and performance optimization (opens new window). Its architecture prioritizes efficiency without compromising on accuracy, leading to superior results across various benchmarks. According to Microsoft, the resource-efficient Phi 3 models (opens new window) are well suited for scenarios with limited computing power, where low latency (opens new window) is required, or where keeping costs down is critical. The models also make fine-tuning easier compared to larger AI models. AI technology's rapid evolution, surpassing human-level performance (opens new window), hints at a powerful and impactful future. Phi-3-vision (opens new window), the first multimodal model (opens new window) in the Phi-3 family, excels in real-world image analysis (opens new window) and question answering. While limited to English (opens new window), Phi-3-Mini's innovation lies in its curated dataset for robustness and safety.\n\nIn the realm of AI, comparisons between models spark curiosity and debate. llama-3 (opens new window) vs phi-3-mini is a showdown that has caught the attention of tech enthusiasts worldwide. The significance of llama-3 with its massive 15 trillion tokens and phi-3-mini with its compact yet powerful design sets the stage for an intriguing battle. This blog will delve into the origins, features, performance metrics, usability, and applications of these two cutting-edge models. ... In the vast landscape of AI evolution, Llama-3 emerges as a titan with its colossal 15 trillion tokens (opens new window). The journey of Llama-3 traces back through the annals of technological advancement, reflecting the culmination of years of innovation and research. ... On the other end of the spectrum lies Phi-3-mini, a compact yet formidable contender in the AI arena.\nMicrosoft released Phi-3-mini, a 3.8 billion parameter model, today without much fanfare. What is really surprising is that according to the paper, despite being a smaller model, it outperforms the recently released Llama 3 8B model.\n\nMicrosoft released Phi-3-mini, a 3.8 billion parameter model, today without much fanfare. What is really surprising is that according to the paper, despite being a smaller model, it outperforms the…\n\nMicrosoft released Phi-3-mini, a 3.8 billion parameter model, today without much fanfare. What is really surprising is that according to the paper, despite being a smaller model, it outperforms the recently released Llama 3 8B model. Note that it has less than 50% of the parameters and can potentially run on your hand held device with quantisation and other neat tricks and still outperform Llama 3 8B. Seems like Llama 3’s run of being the best small model didn’t really last long. So I decided to test this out myself, where I asked both Llama 3 and Phi-3-mini 3 different questions to make a qualitative evaluation on whether it’s really better than Llama 3 or is it the case that Phi-3 has been overfitted to perform well on the leaderboards. I’m using Phi-3-mini instruct with 4k context length and Llama 3 8B Instruct. Here is the link to the collab notebook if you want to play around with it.\n\nI presented a prompt consisting of approximately 2000 tokens, in which I inserted the sentence \"Paneer Kadhai is the dish of the day\" at a random location as a reference point. At the end of the prompt, I posed the question “What is the dish of the day?” as a means of assessing the model’s ability to recall information within a large context. As anticipated, Llama 3 8B gets the correct answer, however Phi-3-mini fails to return the answer. It returns some text from the prompt, but fails to return the answer. So this round goes to Llama 3. Now, this is a challenging problem. The models have to complete this sequence – 1,8,9,64,25,216,_. As you can observe, the sequence is that odd place numbers follow the function x2, and even place numbers follow the function x3 . Knowing this, the answer is fairly obvious that the missing number is 7*7 = 49.\n\nWhile 3 questions are not enough to determine the strength of these small but still massive models, it still gave us some indication of the model’s strength, and to be honest, I think Phi-3-mini is overfitted to the benchmark. It may have faster inferencing and can fit on your device, but if you want better results, I’ll stick to using either Mistral or Llama 3B. ... […] a couple of days have passed since Microsoft’s release of Phi-3-mini which I tested in this blog post. Now Apple has joined the race of Open Source LLMs by release a class of LLMs under the name […] ... Already have a WordPress.com account?\nPhi-1 was all about learning to code, while Phi-2 started to understand reasoning. But Phi-3 is the better version of Phi-1 and Phi-2 combined. It’s good at both coding and reasoning.\n\nWe’ve not had this where there has been some general purpose technology whose diffusion happened instantaneously everywhere. You know, our…\n\nMicrosoft’s Phi-3, a tiny AI model by industry standards, has been racking up impressive wins, including surpassing Meta’s much larger llama three model in key benchmarks. This development suggests a shift in the AI landscape where size might not be everything, so we’ll delve deeper to see what this means for the future of artificial intelligence. All about Microsoft’s Phi-3 AI model recently, Meta, the company behind Facebook, introduced a new AI model called Lama 3. This model is open source, which means that anyone can use and modify it for free. Llama 3 has shown to be very powerful, even surpassing another well known AI model called Google Gemini 1.5 Pro. This was a huge achievement for Meta, showcasing their advancement in AI technology. But now Microsoft has just introduced an even more impressive AI model named Phi-3. Despite being Microsoft’s smallest AI model to date, Phi-3 outperforms Meta’s Lama 3 on various benchmark tests used to measure the performance of AI models, comp\n\nAdditionally, apps that require natural language understanding, like note taking apps, chatbots, and email clients, can offer more advanced features and smoother performance with Phi-3 Microsoft Fi three training mode Microsoft believes that the success of Phi-3 is all thanks to the data it was trained on. Phi-1 was all about learning to code, while Phi-2 started to understand reasoning. But Phi-3 is the better version of Phi-1 and Phi-2 combined. It’s good at both coding and reasoning. Now let’s get into how Phi-3 was trained. Microsoft used a smart approach. They gathered a lot of data, but they didn’t just throw everything in. Instead, they focused on specific types of data that would help fi three learn better. They filtered out things like sports scores because, let’s be honest, that’s not helpful for coding and reasoning. Instead, they picked out data that would boost Phi three’s knowledge and thinking skills.\n\nBefore tackling bigger topics, they started with the basics and gradually moved on to more complex stuff. This helped Phi-3 learn step by step, just like how we learn new things in the Phi three family of models. The Phi-3 small model has 7 billion parameters and was trained using 4.8 trillion tokens. Despite its smaller size, it performs well in tests when compared to similar sized models, with double the parameters of Phi-3 small and Phi-3 medium. Clocking in at 14 billion parameters, this model is trained on the same massive dataset. It also shows impressive performance in benchmarks. Just like its smaller sibling, Phi-3 Mini is the star of the show. It’s smaller than the other Phi-3 models, with only 3.8 billion parameters. Despite its smaller size, it still packs a punch. It’s available on platforms like Azure, hugging face and Alami AI, making it accessible to users everywhere.\nWhen choosing between LLMs like Phi 3 and Llama 3.1, it&#x27;s important to benchmark them on your specific use cases rather than relying solely on public benchmarks. When models are in the same ballpark, the specific application makes a big difference.\n\nWhen choosing between LLMs like Phi 3 and Llama 3.1, it's important to benchmark them on your specific use cases rather than relying solely on public benchmarks. When models are in the same ballpark, the specific application makes a big difference. This guide walks you through the steps to set up a comprehensive benchmark of Llama and Phi using promptfoo + Ollama. In the end, you'll be able to create a side-by-side evaluation view that looks like this: ... Open promptfooconfig.yaml and set up the models you want to compare. We'll use the ollama:chat:phi4 and ollama:chat:llama3.3 endpoints. Start by defining the prompts you will use for testing. In this example, we're just going to pass through a single message variable: ... prompts: - '{{message}}' providers: - id: ollama:chat:phi4 config: temperature: 0.01 num_predict: 128 - id: ollama:chat:llama3.3 config: temperature: 0.01 num_predict: 128 ·\nI provided Claude with the autobiography and then the transcripts of my Phi and Llama conversations/responses about the document and asked Claude to compare them. The response was the following: Would Phi or Llama be suitable based on these results to chat accurately about large documents when accuracy is critical? ... No, based on these results, neither Phi nor Llama would be suitable for critical tasks requiring high accuracy when discussing large documents. Here’s why: ... Neither system would be reliable enough. The error rates and tendency to confabulate make them unsuitable for tasks where accuracy is crucial. ... In conclusion, while these LLMs can be useful for casual conversation or initial document exploration, they should not be relied upon for tasks requiring high accuracy without significant human oversight and verification. ... There’s a tendency to philosophize about relationships and meanings rather than clearly stating information ·\n\nSince the chatgpt moment, I’ve thought that for a virtual assitant to know me properly that I’m going to need an autobiography type…\n\nHow does LLama 3.2 3B FP8 or Phi mini 3B compare with Claude for chatting about my autobiographical document? Let’s find out. I’m using LM Studio 0.3.4 (build 5) for loading and running my LLMs on the Max with LM Studios defaults except for extending the context size to 128K. LM Studio doesn’t accept Word documents using copy/paste. I have to paste in to TextEdit and then select all, copy/paste again so LM Studio will accept it. Claude accepts Word docs with no issues. I’m not testing LLMs that don’t support 128K context windows because my base document is about 45K tokens on its own and getting bigger. I think this will be a useful benchmark for this use case but also for LongRAG. LongRAG is leveraging large context windows to provide larger global context chunks as well as prompt based snippet matches to generate responses. An LLMs ability to accurately answer questions on this context is critical or these techniques will not work.\n\nClaude absolutely hammered Phi 3B and Llama 3.2 3B, it’s not even close. The industry benchmarks made this small models look a lot better than they actually are, at least for document summaries or chatting with documents. I really want accurate responses to questions about topics in the document. Claude answers every question I ask correctly and does not mix up facts in the autobiography. Llama is second place but a distant one. Phi comes in last. Performance wise Llama and Phi are acceptable on my M2 Max with 96GB of RAM although Phi uses almost triple the RAM and is even more inaccurate than Llama. I would not be comfortable using Llama or Phi to summarize documents or extract facts based on this experience. I would use Claude 3.5 Sonnet (New) which provided a very accurate response to every question I asked it. Anyone using an LLM with a large context window containing reference documents or company reports etc would be wise to really check the answers coming back when using these s\n\nI provided Claude with the autobiography and then the transcripts of my Phi and Llama conversations/responses about the document and asked Claude to compare them. The response was the following: Would Phi or Llama be suitable based on these results to chat accurately about large documents when accuracy is critical? ... No, based on these results, neither Phi nor Llama would be suitable for critical tasks requiring high accuracy when discussing large documents. Here’s why: ... Neither system would be reliable enough. The error rates and tendency to confabulate make them unsuitable for tasks where accuracy is crucial. ... In conclusion, while these LLMs can be useful for casual conversation or initial document exploration, they should not be relied upon for tasks requiring high accuracy without significant human oversight and verification. ... There’s a tendency to philosophize about relationships and meanings rather than clearly stating information ·\nTraining Data: The dataset involves ... abilities without the sheer scale of data. Performance: Phi-3 models demonstrate a very strong performance compared to their size, outperforming much bigger models on almost every ...\n\nDespite just 3.8 billion parameters, the mini model competes with larger models like Llama 3 8B, Mistral 7B, Gemma 7B, Mixtral 8x7B, and even GPT 3.5 in some tasks. ... Model Variants: The series includes three models - phi-3-mini having 3.8 billion parameters, phi-3-small with 7 billion, and phi-3-medium at 14 billion. The mini model can run directly on smartphones, such as an iPhone 14, without internet. Architecture: All models employ a transformer decoder architecture, which supports different context lengths. Phi-3-mini can handle a standard 4K length and extends up to 128K with LongRope technology. Training Data: The dataset involves high-quality, heavily filtered web data combined with synthetic data, enhancing the model’s general knowledge and reasoning abilities without the sheer scale of data. Performance: Phi-3 models demonstrate a very strong performance compared to their size, outperforming much bigger models on almost every benchmark.\n\nYour avatar, friends list, and social connections will move with you across different virtual spaces and even across different devices like your phone or computer. The Future is Open: This move towards an open ecosystem is a significant step for the mixed reality industry. It encourages collaboration, competition, and ultimately more choices and better experiences for users like us. ... Understanding why an autonomous vehicle makes certain decisions has always been a challenge. Wayve, a leader in AI-powered driving technology, tackles this issue with their latest model, LINGO-2. It not only drives but also explains its actions in real time using natural language, providing a new level of transparency and potentially building trust in self-driving cars. Unlike its predecessor, LINGO-1, which could only comment on pre-recorded driving scenarios, LINGO-2 actively controls the car while providing commentary, making its explanations directly relevant to its real-time decisions.\n\nOgre Run: Ogre uses AI to automate the generation of reproducibility artifacts (Dockerfile, requirements, SBOM, README) enabling users to make source code work on any computer. Text within this block will maintain its original spacing when published · 🌟 Spotlight on You: Share Your AI Use Case and Get Featured! At Unwind AI, we’re all about real-world applications of AI tools. Whether you’re simplifying daily tasks, enhancing your projects, or exploring new possibilities, we want to celebrate how you use AI. Participate in just a few easy steps. Send the following on Unwind AI’s email unwindai@substack.com · Tell us about the AI tool you’re using and the problem it solves for you. Briefly outline the steps you follow. Include your Twitter and LinkedIn handles. We will feature your story in our newsletter as detailed tutorials. It’s a great way to share your insights and get recognized.\nIn-depth analysis of Llama 3.1 8B Instruct vs Phi-3.5 Mini 128K Instruct, revealing performance gaps, cost differences, and benchmarks. Choose the right model for your needs in 2025.\n\nLlama 3.1 8B Instruct is roughly 0.2x less expensive compared to Phi-3.5 Mini 128K Instruct for input tokens and roughly 0.3x less expensive for output tokens. Compare relevant benchmarks between Llama 3.1 8B Instruct and Phi-3.5 Mini 128K Instruct. Quick overview of what makes Llama 3.1 8B Instruct and Phi-3.5 Mini 128K Instruct unique. Llama 3.1 8B Instruct by Meta can use external tools and APIs, generates structured data. It can handle standard conversations with its 131.1K token context window. Very affordable at $0.02/M input and $0.03/M output tokens. Released July 23rd, 2024. Phi-3.5 Mini 128K Instruct by Microsoft can use external tools and APIs. It can handle standard conversations with its 128K token context window. Very affordable at $0.10/M input and $0.10/M output tokens. Released August 21st, 2024.\nNithin Bekal&#x27;s blog about programming - Ruby, Rails, Vim, Elixir.\nThe chart is quite incredible, the smallest (mini) Phi-3 is beating Llama-3-8B AND Mixtral on MMLU scores, BigBench and Humaneval. Again to simplify, this TINY 3.8B model, half the size of 1 Mixtral expert, beats Mixtral and newly released ...\n\nThe chart is quite incredible, the smallest (mini) Phi-3 is beating Llama-3-8B AND Mixtral on MMLU scores, BigBench and Humaneval. Again to simplify, this TINY 3.8B model, half the size of 1 Mixtral expert, beats Mixtral and newly released Llama-3-8B on most benchmark, not to mention GPT-3.5! It's honestly quite a crazy chart to look at, which raises the question, did this model train on these benchmarks? 🤔 · I still haven't seen definitive proof that the folks at Microsoft trained on any benchmarks data, I did see engagement from them and a complete denial, however we did see a few attempts at using Phi-3 and the quantized versions and the wrong end token formatting seem to be very prevalent in shaping the early opinion that this model performance is detached from it's very high scoring. Not to mention that model being new, there's confusion about how to use it, see thread from Anton Bacaj about HuggingFace potentially using the wrong end token to finish conversations.\n\nYou can give this model a try here and I have, using the same 2 questions I had for Phi and LLama and found the model not that great at logic to be honest, but it was really fast considering the total size, so inference optimization for this type of architecture is definitely geared towards Enterprise (as well as training cost, they claim it cost just under $2 million dollars to train) Not a lot of super interesting things in this corner, besides Gemini 1.5 pro (the one with 1M context window) finally appearing in the Arena and taking the amazing #2 spot (pushing Llama-3 8B to number 6 on the same day it just appeared in there lol) This is very impressive, and I gotta wonder what happened with Gemini Ultra if pro with larger context beats it outright. It's indeed very good, but not THAT good if you use it om simple logic problems and don't use the whole context length.\n\n📅 ThursdAI - April 25 - Phi-3 3.8B impresses, LLama-3 gets finetunes, longer context & ranks top 6 in the world, Snowflake's new massive MoE and other AI news this week ... Audio playback is not supported on your browser. Please upgrade. From Weights & Biases, another AI update week, insights on LLama3, Phi a tiny model that kicks ass, a HUGE dataset (45TB! 15T parameters) and more 🔥 ... Not a lot of house-keeping here, just a reminder that if you're listening or reading from Europe, our European fullyconnected.com conference is happening in May 15 in London, and you're more than welcome to join us there. I will have quite a few event updates in the upcoming show as well. Besides this, this week has been a very exciting one for smaller models, as Microsoft teased and than released Phi-3 with MIT license, a tiny model that can run on most macs with just 3.8B parameters, and is really punching above it's weights.\n\nJust on Monday, Llama-3 70B (the bigger version) took the incredible 5th place (now down to 6th) on LMSys, and more surprising, given that the Arena now has category filters (you can filter by English only, Longer chats, Coding etc) if you switch to English Only, this model shows up 2nd and was number 1 for a brief period of time.\n<system>You only have 17 searches left this turn</system>"

