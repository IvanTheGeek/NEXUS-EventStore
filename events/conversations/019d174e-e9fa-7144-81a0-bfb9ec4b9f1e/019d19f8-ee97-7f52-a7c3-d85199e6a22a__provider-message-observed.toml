text = "Phi-4 excels in benchmarks that test advanced reasoning and domain-specific capabilities. Highlights include: • Scoring over 80% in challenging benchmarks like MATH and MGSM, outperforming larger models like Google’s Gemini Pro and GPT-4o-mini. • Superior performance in mathematical reasoning tasks, a critical capability for fields such as finance, engineering and scientific research. • Impressive results in HumanEval for functional code generation, making it a strong choice for AI-assisted programming. In addition, Phi-4’s architecture and training process were designed with precision and efficiency in mind. Its 14-billion-parameter dense, decoder-only transformer model was trained on 9.8 trillion tokens of curated and synthetic datasets, including: • Publicly available documents rigorously filtered for quality. • Textbook-style synthetic data focused on math, coding and common-sense reasoning.\n\nPhi-4 demonstrates that smaller, well-designed models can achieve comparable or superior results compared with larger models.\n\nAs announced by several current and former Microsoft researchers and AI scientists today on X, Microsoft is releasing its Phi-4 model as a fully open-source project with downloadable weights on Hugging Face, the AI code-sharing community. \"We have been completely amazed by the response to [the] phi-4 release,\" wrote Microsoft AI principal research engineer Shital Shah on X. \"A lot of folks had been asking us for weight release. [A f]ew even uploaded bootlegged phi-4 weights on HuggingFace...Well, wait no more. We are releasing today [the] official phi-4 model on HuggingFace! With MIT licence (sic)!!\" Weights refer to the numerical values that specify how an AI language model, small or large, understands and outputs language and data. The model's weights are established by its training process, typically through unsupervised deep learning, during which it determines what outputs should be provided based on the inputs it receives.\n\nIts creators at Microsoft say that the safety and alignment processes, including supervised fine-tuning and direct preference optimization, ensure robust performance while addressing concerns about fairness and reliability. By making Phi-4 available on Hugging Face with its full weights and an MIT License, Microsoft is opening it up for businesses to use in their commercial operations. Developers can now incorporate the model into their projects or fine-tune it for specific applications without the need for extensive computational resources or permission from Microsoft. This move also aligns with the growing trend of open-sourcing foundational AI models to foster innovation and transparency. Unlike proprietary models, which are often limited to specific platforms or APIs, Phi-4’s open-source nature ensures broader accessibility and adaptability.\nTo understand the capabilities, we compare phi-4 with a set of models over OpenAI’s SimpleEval benchmark. At the high-level overview of the model quality on representative benchmarks. For the table below, higher numbers indicate better performance: * These scores are lower than those reported by Meta, perhaps because simple-evals has a strict formatting requirement that Llama models have particular trouble following. We use the simple-evals framework because it is reproducible, but Meta reports 77 for MATH and 88 for HumanEval on Llama-3.3-70B.\n\nWe evaluated phi-4 using OpenAI’s SimpleEval and our own internal benchmarks to understand the model’s capabilities, more specifically: MMLU: Popular aggregated dataset for multitask language understanding. MATH: Challenging competition math problems. GPQA: Complex, graduate-level science questions. DROP: Complex comprehension and reasoning. MGSM: Multi-lingual grade-school math. HumanEval: Functional code generation. SimpleQA: Factual responses. phi-4 has adopted a robust safety post-training approach. This approach leverages a variety of both open-source and in-house generated synthetic datasets. The overall technique employed to do the safety alignment is a combination of SFT (Supervised Fine-Tuning) and iterative DPO (Direct Preference Optimization), including publicly available datasets focusing on helpfulness and harmlessness as well as various questions and answers targeted to multiple safety categories.\n\nTo understand the capabilities, we compare phi-4 with a set of models over OpenAI’s SimpleEval benchmark. At the high-level overview of the model quality on representative benchmarks. For the table below, higher numbers indicate better performance: * These scores are lower than those reported by Meta, perhaps because simple-evals has a strict formatting requirement that Llama models have particular trouble following. We use the simple-evals framework because it is reproducible, but Meta reports 77 for MATH and 88 for HumanEval on Llama-3.3-70B.\n\nWe’re on a journey to advance and democratize artificial intelligence through open source and open science.\n\nLimited Scope for Code: Majority of phi-4 training data is based in Python and uses common packages such as typing, math, random, collections, datetime, itertools. If the model generates Python scripts that utilize other packages or scripts in other languages, we strongly recommend users manually verify all API uses. Developers should apply responsible AI best practices and are responsible for ensuring that a specific use case complies with relevant laws and regulations (e.g. privacy, trade, etc.). Using safety services like Azure AI Content Safety that have advanced guardrails is highly recommended. Important areas for consideration include: Allocation: Models may not be suitable for scenarios that could have consequential impact on legal status or the allocation of resources or life opportunities (ex: housing, employment, credit, etc.) without further assessments and additional debiasing techniques.\nDespite minimal changes to the phi-3 architecture, phi-4 achieves strong · performance relative to its size – especially on reasoning-focused benchmarks – due to improved data, training curriculum, and innovations in the post-training scheme. ... data quality can rival, and sometimes surpass, ...\n\norganic2 data sources, including web content, licensed books, and code repositories to extract seeds · for the synthetic data pipeline that encourage high-depth reasoning and prioritize educational · value (to the model). These seeds form the foundation of the synthetic generation pipeline. To · complement these synthetic datasets, we also filter the web for high-quality data (in terms of · knowledge and reasoning) to use directly in pretraining. 3. Post-Training: We further advance the post-training recipe in phi-4 by creating new refined · versions of SFT datasets, as well as by developing a new technique to create DPO pairs, based on ... 1These scores are lower than those reported by Meta, perhaps because simple-evals has a strict formatting requirement · that Llama models have particular trouble following. We use the simple-evals framework because it is reproducible, but · Meta reports 77 for MATH and 88 for HumanEval on Llama-3.3.\n\nTable 3: Benchmark performance of 13B models (used for ablations only) trained on data mixtures containing · no web data. The respective training tokens are either from synthetic sources, or an equal share of synthetic · data and web rewrites. All numbers are reported relative to the performance of phi-3-medium, which has seen a ... allocation of tokens coming from various sources, namely, 1) synthetic, 2) web rewrites5, 3) filtered web · (divided into reasoning and knowledge-heavy portions), 4) targeted acquisitions and organic data (e.g., academic data, books, and forums), and 5) code data. We conducted ablations using a shorter token horizon of 1T tokens to derive the data mixture. These ablations rely on our established result on the high-rank correlation of short training with longer · training, up to the over-fitting saturation threshold of data sources.\n\nmarily on organic data sources such as web content or code, phi-4 strategically incorporates synthetic · data throughout the training process. While previous models in the Phi family largely distill the · capabilities of a teacher model (specifically GPT-4), phi-4 substantially surpasses its teacher model · on STEM-focused QA capabilities, giving evidence that our data-generation and post-training tech- niques go beyond distillation. Despite minimal changes to the phi-3 architecture, phi-4 achieves strong · performance relative to its size – especially on reasoning-focused benchmarks – due to improved data, training curriculum, and innovations in the post-training scheme. ... data quality can rival, and sometimes surpass, the performance gains traditionally achieved by scaling · compute with model and dataset size. Building on the success of the Phi family [GZA+23, LBE+23, JBA+23, AAA+24], we introduce phi-4, a 14-billion parameter model that further advances performance ·\n\ncorrelation between the performance of the 7B and 14B models on different data mixtures, given a large · enough distance between the data mixtures. This allowed us to conduct the experiments at 7B scale and · transfer the findings to phi-4. Among the numerous ablations, we highlight a few that show best insights · on our data composition. Specifically, we freeze the ratio of tokens coming from targeted acquisitions · and code categories, and change the ratio of tokens for the synthetic, web, and web rewrites clusters. Table 4 summarizes the results for the hand-picked ablations, as compared with the data mixture · that was used for the final training run. A uniform allocation of tokens among the three categories is · suboptimal due to the higher quality of synthetic data and the only benchmark that shows a clear benefit · from web data is TQA.\nThe table shows the performance of several language models (LLMs) on various benchmarks. Here’s why phi-4 (14B) is the best among the small LLMs (14B parameters or less): Press enter or click to view image in full size · Popular Aggregated Benchmark (MMLU): Phi-4 scores 84.8, outperforming phi-3 , Qwen 2.5 , and GPT-4o-mini . Science (GPQA): Phi-4 achieves a 56.1 score, significantly higher than other 14B models like phi-3, Qwen 2.5 , and GPT-4o-mini · Math (MGSM and MATH): MGSM: Phi-4 scores 80.6, much better than phi-3 and comparable to Llama-2–70B . MATH: Phi-4 scores 80.4, far ahead of phi-3 and GPT-4o-mini. Code Generation (HumanEval): Phi-4 scores 82.6, leading phi-3 and Qwen 2.5 . Reasoning (DROP): Phi-4 achieves 75.5, higher than phi-3 and GPT-4o-mini. Factual Knowledge (SimpleQA): Although low, phi-4’s score of 3.0 is comparable to other small LLMs like Qwen 2.5 .\n\nThe training dataset for Phi-4 builds on the data used for Phi-3, combining rigorously filtered publicly available documents, high-quality educational data, and code. It also includes newly created synthetic, “textbook-like” data for teaching math, coding, reasoning, and general knowledge, alongside acquired academic books and Q&A datasets. Additionally, the dataset incorporates high-quality chat format data designed to reflect human preferences in areas like instruction-following, truthfulness, honesty, and helpfulness, ensuring a diverse and robust foundation for training. The table shows the performance of several language models (LLMs) on various benchmarks. Here’s why phi-4 (14B) is the best among the small LLMs (14B parameters or less): ... Phi-4 scores 84.8, outperforming phi-3 , Qwen 2.5 , and GPT-4o-mini . ... Phi-4 achieves a 56.1 score, significantly higher than other 14B models like phi-3, Qwen 2.5 , and GPT-4o-mini ...\n\nPhi-4 consistently scores higher across key categories like science, math, code generation, and reasoning, making it the best-performing small LLM in this comparison. ... import transformers import os os.environ[\"HF_TOKEN\"] = '' pipeline = transformers.pipeline( \"text-generation\", model=\"microsoft/phi-4\", model_kwargs={\"torch_dtype\": \"auto\"}, device_map=\"auto\", ) messages = [ {\"role\": \"system\", \"content\": \"You're a kid. Explain in simple terms\"}, {\"role\": \"user\", \"content\": \"How should I explain the Internet?\"}, ] outputs = pipeline(messages, max_new_tokens=128) print(outputs[0][\"generated_text\"][-1]) If you don't have enough hardware, try it on Huggingface Spaces ...\n\nAnd the 1st LLM in 2025 is released and Microsoft phi-4 is out. Hailed as the best small-sized LLM, the model looks great and significantly improves over Microsoft phi-3, the previous version of Phi. Developed by Microsoft Research: A cutting-edge open model designed by Microsoft Research. High-Quality Training Data: Trained on synthetic datasets, filtered public domain websites, and academic books/Q&A datasets. Rigorous Enhancement and Alignment: Employs supervised fine-tuning (SFT) and Direct Preference Optimization (DPO) for precise alignment and safety. Advanced Architecture: 14-billion parameter dense decoder-only Transformer model. Extended Context Length: Supports a 16K token context window, ideal for long-text processing. Efficient Training Process: Trained on 9.8 trillion tokens over 21 days using 1920 H100–80G GPUs. Versatile Input and Output Capabilities: Accepts text inputs and generates high-quality text outputs.\nHumanEval: Excelling in coding benchmarks with a score of 82.6. Additionally, Phi-4 demonstrated strong results in real-world math competitions like AMC-10/12, validating its practical utility.\n\nMicrosoft AI Introduces Phi-4: A New 14 Billion Parameter Small Language Model Specializing in Complex Reasoning\n\nPhi-4 is a model designed to balance efficiency and capability. With 14 billion parameters, it achieves strong performance while keeping computational costs reasonable. Its training emphasizes synthetic data tailored for reasoning and problem-solving, alongside carefully filtered organic datasets to maintain quality and avoid contamination. ... Synthetic Data Generation: Techniques like chain-of-thought prompting create datasets that encourage systematic reasoning. Post-Training Refinement: Pivotal token search within DPO ensures logical consistency in outputs by targeting critical decision points. Extended Context Length: The model’s context length was increased from 4K to 16K tokens during midtraining, enabling better handling of long-chain reasoning tasks. These features ensure that Phi-4 addresses practical concerns like inference cost and latency, making it well-suited for real-world applications.\n\nHome Tech News AI Paper Summary Microsoft AI Introduces Phi-4: A New 14 Billion Parameter Small Language Model... ... Large language models have made impressive strides in understanding natural language, solving programming tasks, and tackling reasoning challenges. However, their high computational costs and dependence on large-scale datasets bring their own set of problems. Many of these datasets lack the variety and depth needed for complex reasoning, while issues like data contamination can compromise evaluation accuracy. These challenges call for smaller, more efficient models that can handle advanced problem-solving without sacrificing accessibility or reliability. To address these challenges, Microsoft Research has developed Phi-4, a 14-billion parameter language model that excels in reasoning tasks while being resource-efficient. Building on the Phi model family, Phi-4 incorporates novel approaches in synthetic data generation, curriculum design, and post-training refinement.\nPhi-4-reasoning and Phi-4-reasoning-plus consistently outperform the base model · Phi-4 and demonstrate competitive performance against substantially larger and state-of-the-art models. A · more comprehensive evaluation is provided in Section 5. ∗alphabetical order, correspondences to ...\n\nthrough the same rigorous decontamination process used Phi-4 [2] for decontaminating against popular reasoning · as well as general-purpose benchmarks including many not discussed in this report. The full list of benchmarks · decontaminated against is: AIME-2024, MATH, GPQA, LiveCodeBench, Codeforces, OmniMATH, SWE-Bench · Verified, SimpleQA, DROP, AGIEval, ARC-Challenge, ARC-Easy, CommonsenseQA, GPQA, GSM8k, HellaSwag, HumanEval, MBPP, OpenBookQA, PIQA, WinoGrande, ArenaHard, MT-Bench, PhiBench. ... released after the data for Phi-4-reasoning was finalized, so that benchmark remains contamination free. We also created a diverse dataset of alignment and safety prompts sourced from [2, 39], and generate synthetic · responses to them using the same teacher model and the same pipeline as for the data synthesis of math and · coding domains. We augment the prompt with detailed safety guidelines to elicit responses that follow Microsoft’s ·\n\ncompared to point 9, which is tuned using independent exploration experiments focused on the code domain. Finally, point · 12 adds additional data for safety and Responsibe AI (RAI), which was also included in Phi-4. Training hyperparameters. We began by tuning SFT hyperparameters, focusing primarily on the learning · rate. We performed a grid search over [1e−6,2e−5], starting from the SFT learning rate of the base model Phi-4 · (1e−6) to its mid-training learning rate (3e−5). In our experiments, 1e−5 provided the best balance in terms of · reasoning performance. We found that higher learning rates result in lower training loss, but saturation and/or · degradation across various downstream evaluations. We also tested the effect of zero versus small weight decay · (1e−4) and found the differences to be within benchmark variance. Experiments 1–3 in Figure 5 illustrate the ...\n\nmath and code can be aggregated to get improvements on both math and coding benchmarks. This additive · structure remains central to the final SFT recipe when we further include alignment and general domain data. Base Model for Reasoning. We experimented with two base models for reasoning-focused SFT: Phi-4 and · Phi-4-base (mid-trained checkpoint before vanilla post-training). Both variations performed similarly on reasoning · benchmarks, while Phi-4 performed slightly better in terms of safety and alignment, as measured by the automated · measurement of Responsible AI metrics for LLMs framework [37]. We attribute this to the additional safety-focused · post-training in Phi-4, and ultimately selected it as the base for Phi-4-reasoning to preserve the benefits of prior ... With the training recipe established during the exploration stage, we scaled our approach in terms of both training ·\n\nFigure 1: Phi-4-reasoning performance across representative reasoning benchmarks spanning mathematical · (HMMT, AIME 25, OmniMath), scientific (GPQA), and coding (LiveCodeBench 8/24-1/25) domains. We · illustrate the performance gains from reasoning-focused post-training of Phi-4 via Phi-4-reasoning (SFT) and · Phi-4-reasoning-plus (SFT+RL), alongside: open-weight models from DeepSeek including DeepSeek-R1 (671B · Mixture-of-Experts) and its distilled dense variant DeepSeek-R1-Distill-Llama-70B, and OpenAI’s proprietary · frontier models o1 and o3-mini. Phi-4-reasoning and Phi-4-reasoning-plus consistently outperform the base model · Phi-4 and demonstrate competitive performance against substantially larger and state-of-the-art models. A · more comprehensive evaluation is provided in Section 5. ∗alphabetical order, correspondences to phi-research@microsoft.com ...\nPerformances of most LLMs on two ... notably the Phi, Deepseek-Chat, and WizardCoder, consistently exhibit a propensity to achieve superior rankings on the Humaneval dataset as opposed to the NCB across various scales, as shown in the Table 3....\n\nSecond, it is possible that training sets of some LLMs are over-specifiedly optimized for HumanEval-style problems. On one hand, pre-training data of certain LLMs may be contaminated. As GPT-4 [45] reported, 25% of HumanEval has been contaminated in their pre-training corpus. On the other hand, instruction fine-tuning dataset may also be polluted. For example, Phi [34] reports a considerable amount of synthetic prompts resonating to some test samples in HumanEval. In [64], the authors report leakage unidentifiable by n-gram overlap when using popular rephrasing techniques to create training sets. The performance discrepancy between HumanEval and NCB in our experiments is also an evidence of the potential contamination. In Table 4, we can observe that the coverage of hand-written test cases is almost identical to that of test cases constructed through a semi-automatic pipeline, yet the time required for the former significantly exceeds the time needed for constructing test cases via the\n\nIn contrast to the problem format in Humaneval, the majority of problems in our benchmark are composed in natural language by actual users. Consequently, there is no predetermined naming convention for functions or classes created by models. This divergence can lead to inconsistencies between the names generated by LLMs and those referenced in test cases. To address this issue of name misalignment, we present a representative test case that includes the designated function or class name and its usage within the test. We then instruct the LLMs to adhere to the naming convention specified in the provided test case when generating solutions. It is important to note that the test cases utilized for solution generation are not employed in subsequent testing phases. The details of the instruction is showed in Appendix A. The majority of the questions we collected from online services are in Chinese, which is not fair for the LLMs that are primarily designed for English.\n\nLarge language models (LLMs) have manifested strong ability to generate codes for productive activities. However, current benchmarks for code synthesis, such as HumanEval, MBPP, and DS-1000, are predominantly oriented towards introductory tasks on algorithm and data science, insufficiently satisfying challenging requirements prevalent in real-world coding. To fill this gap, we propose NaturalCodeBench (NCB), a challenging code benchmark designed to mirror the complexity and variety of scenarios in real coding tasks. NCB comprises 402 high-quality problems in Python and Java, meticulously selected from natural user queries from online coding services, covering 6 different domains. Noting the extraordinary difficulty in creating testing cases for real-world queries, we also introduce a semi-automated pipeline to enhance the efficiency of test case construction. Comparing with manual solutions, it achieves an efficiency increase of more than 4 times.\n\nSpecifically, we employ GPT-4 [45] to generate reference solutions followed by manual correction. Subsequently, GPT-4, guided by the problem descriptions and reference solutions, generates multiple test cases, which are also refined with manual correction, for each problem. Consequently, the annotators are only required to correct any errors, substantially reducing the time and manpower required. Comparative experiments reveal that our semi-automated pipeline can quadruple the construction speed of the evaluation framework, as evidenced by tests involving programming experts with or without the pipeline. Based on NCB, we conduct extensive experiments on a variety range of LLMs, encompassing 39 APIs or open models. The results indicate that although certain LLMs demonstrate comparable performance on established benchmarks like HumanEval, they exhibit significant performance disparities when evaluated using NCB.\nIt also scores higher at coding, as measured by HumanEval and HumanEval+, than any other open-weight model we benchmark against, including much larger Llama models. phi-4’s weakest benchmark scores are on SimpleQA, DROP, and IFEval. We believe for the first two that the number reported by ...\n\nWe present phi-4, a 14-billion parameter language model developed with a training recipe that is centrally focused on data quality. Unlike most language models, where pre-training is based primarily on organic data sources such as web content or code, phi-4 strategically incorporates synthetic data throughout the training process. While previous models in the Phi family largely distill the capabilities of a teacher model (specifically GPT-4), phi-4 substantially surpasses its teacher model on STEM-focused QA capabilities, giving evidence that our data-generation and post-training techniques go beyond distillation. Despite minimal changes to the phi-3 architecture, phi-4 achieves strong performance relative to its size – especially on reasoning-focused benchmarks – due to improved data, training curriculum, and innovations in the post-training scheme.\n\nCuration and Filtering of High-Quality Organic Data: We meticulously curate and filter organic222We use organic to refer to human-generated or otherwise non-synthetic data. data sources, including web content, licensed books, and code repositories to extract seeds for the synthetic data pipeline that encourage high-depth reasoning and prioritize educational value (to the model). These seeds form the foundation of the synthetic generation pipeline. To complement these synthetic datasets, we also filter the web for high-quality data (in terms of knowledge and reasoning) to use directly in pretraining. ... Post-Training: We further advance the post-training recipe in phi-4 by creating new refined versions of SFT datasets, as well as by developing a new technique to create DPO pairs, based on pivotal token search. With these innovations, the performance of phi-4 on reasoning-related tasks is comparable to or surpasses much larger models. For example, its performance on many widely used rea\n\nThese ablations rely on our established result on the high-rank correlation of short training with longer training, up to the over-fitting saturation threshold of data sources. In addition we observe a high rank correlation between the performance of the ... 14B models on different data mixtures, given a large enough distance between the data mixtures. This allowed us to conduct the experiments at ... 7B scale and transfer the findings to phi-4. Among the numerous ablations, we highlight a few that show best insights on our data composition. Specifically, we freeze the ratio of tokens coming from targeted acquisitions and code categories, and change the ratio of tokens for the synthetic, web, and web rewrites clusters. ... 75 % of training tokens to synthetic (S), filtered web (W), and web rewrite (WR) categories, while other data sources are held constant in the remaining ... 25 % token budget. All benchmark numbers are measured relative to the final data mixture used for training phi\n\nInspired by this, we further filter our high-quality non-synthetic datasets (i.e., academic, books, and code data) to separate samples above ... 70 % portion of recall tokens from the pretraining stage. To accommodate longer context, we increase the base frequency of rope position encoding to ... To effectively evaluate the long-context capability of our model, it is essential to have a comprehensive evaluation framework with practical scenarios. While synthetic benchmarks like needle-in-a-haystack and RULER are preferred for their simplicity and control, our emphasis is on a diverse range of tasks that reflect real-world applications, such as reasoning across entire documents. We report the performance of phi-4 and other models on the tasks we selected from the HELMET [35] evaluation suite in Table 6 and outline our evaluation methods below. Note that results are average across 5 runs for each categories.\nThe results show that 27.07% of the generated code samples pass the evaluation criteria when considering the top candidate (Pass@1), while 65.85% pass when considering the top five candidates (Pass@5). This performance is considered good, especially since we are using a smaller language model ...\n\nThe results show that 27.07% of the generated code samples pass the evaluation criteria when considering the top candidate (Pass@1), while 65.85% pass when considering the top five candidates (Pass@5). This performance is considered good, especially since we are using a smaller language model to generate the Python code. However, when compared to GPT-4o, which has a Pass@1 rate of 90.2%, the results appear to be lacking. Evaluating generated code... Pass@1: 27.07% Pass@5: 65.85% If you are having trouble running the above code, please check HumanEval with the DeepEval Kaggle notebook. You can also learn how to streamline your LLM evaluations with MLflow by following the Evaluating LLMs with MLflow tutorial. The HumanEval dataset is relatively simple and may only partially represent real-world programming challenges. Additionally, there are concerns about overfitting, as models might be trained on similar datasets, which could lead to improved performance on HumanEval specifically.\n\nHumanEval is a benchmark dataset developed by OpenAI that evaluates the performance of large language models (LLMs) in code generation tasks. It has become a significant tool for assessing the capabilities of AI models in understanding and generating code. In this tutorial, we will learn about HumanEval and the pass@k metric. Additionally, we will evaluate the code generation capabilities of the codeparrot-small model on 164 problems. For the HumanEval evaluation process, we will be using the Hugging Face ecosystem to load the dataset, the model, and the necessary metrics. If you’re relatively new to the world of LLMs and all they can achieve, check out our Developing Large Language Models course. ... HumanEval was developed by OpenAI as an evaluation dataset specifically designed for large language models. It serves as a reference benchmark for evaluating LLMs on code generation tasks, focusing on the models' ability to comprehend language, reason, and solve problems related to algori\n\nThe pass@k metric is particularly useful in assessing the practical performance of code generation models, as it reflects the likelihood of generating a correct solution within a limited number of attempts. The metric is widely used in competitive environments, such as leaderboards hosted by Papers with Code, where models are ranked based on their pass@k scores, including pass@10 and pass@100. HumanEval ensures that the generated code is syntactically correct and functionally effective. In this project, we will load the OpenAI HumanEval dataset and run the functional correctness evaluation on the codeparrot/codeparrot-small. We are selecting a smaller code generation model for faster evaluation time as we are going to run multiple loops: outer loop 164 (Number of problems) and inner loop 5 (number of samples generated for a single problem). We will start by installing the Evaluate Python Library by Hugging Face.\n\nHumanEval is different from traditional match-based metrics. It uses a more practical approach called 'functional correctness.' which uses the pass@k metric to evaluate the probability that at least one of the top k-generated code samples for a problem passes the unit tests. This shift from text similarity to functional correctness provides a more meaningful assessment of a model's ability to solve programming challenges. This process is similar to how developers test their code through unit testing to evaluate its correctness. We can see the mathematical formula for calculating the pass@k metric below: ... C(n-c, k): This calculates the number of ways to choose k samples from the incorrect samples (n-c). It represents the scenario where all k chosen samples are incorrect. C(n,k)/C(n−c,k): This fraction gives the probability that all k chosen samples are incorrect.\n... It scored over 80% in the MATH and MGSM tests, surpassing Google Gemini Pro and OpenAI’s GPT-4o-mini. Excellent performance in mathematical reasoning skills is important in finance, engineering, and scientific research.\n\nWelcome to the world of AI, where I present you with the latest content focused on developers and AI technology enthusiasts.\n\nPhi-4 is the latest model in Microsoft’s “Phi” series, and while it is lightweight, it has excellent performance in certain fields. In particular, it has shown accuracy that exceeds large-scale language models (LLMs) in mathematical reasoning and is attracting attention for its use in specialized tasks. Phi-4 improves accuracy through high-quality data and new post-training technology and has been released to Azure AI Foundry and Hugging Face. The model size is 14B, and if it is a 4-bit quantized model, it should run on a decent GPU. The minimum model of Meta’s Llama3.2 and Google’s Gemma2, both open models, is 1B and 2B, respectively, so this is more than one size larger. I’m not sure what Microsoft’s definition of “small” is, but in any case, it is something that can be used openly and easily. In this step-by-step guide, we will cover what Phi-4 is, What are the special features of Phi-4, how to use Phi-4 locally, and why it performs better than LLM ·\n\nNow you can easily run Phi-4 on your own machine using Ollama! It even comes with a REST API! This means that a model with performance equivalent to an LLM with around 70B parameters can be run on a portable PC, and Ollama’s REST API function can quickly set up an environment where it can be called locally from other applications and libraries. I’m looking forward to making use of this in various ways in the future. let’s compare o1 and GPT-4o and verify how much performance Phi-4 has. Next, I would like to present some applied problems and verify whether the results differ from those of the LLMs GPT-4o and o1 and whether they are simpler. The application problems to be examined are as follows: Calculate the 20th value of the following sequence: 1, 1, 2, 3, 5, 8, …. A bank offers an annual interest rate of 5%, compounded semi-annually. What is the final amount if 1 million dollars is deposited for 10 years?\n\nAll the models can give the correct answer, but Phi-4’s way of solving is good for people who don’t have a strong math background. There isn’t much difference in the time it takes to get the answer. Let’s try to solve the second question and use this prompt in your chatbot · A bank offers an annual interest rate of 5%, compounded semi-annually. What is the final amount if 1 million dollar is deposited for 10 years?\n<system>You only have 16 searches left this turn</system>"

