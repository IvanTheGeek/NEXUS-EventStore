kind = "plain_text"
text = "Would the lora adapters need to be separate domains? Is the an advantage to doing so?\nDoes Qdrant have grpc? Would access with that be better? If there dotnet grpc built in?\nPython could also be ran with python.net or ironpython,what might be the best option and what might be the easiest and most integrated to build with being a docker containers, ironpython, or python.net or other alternative setups?\nWould onnx be able to use lora?\nFrequency of fine tuning can be experience based as well as latter researched andexperimentted with. \nIn some previous research, there were several vector db options, one was rather lightweight and able to be ran as a library, that might be a way to start but also consider if ones we better features would be benefitical. \nhow would you want to decide what knowledge moves from RAG to LoRA to fine-tuning? That is a good question, it might be that we need addional agents,functions, machine learning or some combo to analyzed the data and decide what and how to include. \nAs event sourcing is helpful, I would think to capture each prompt and response as events. May as a data capture event. Then the background process can analyze and create appropriate event types, which could then be processed for rag and lora."

