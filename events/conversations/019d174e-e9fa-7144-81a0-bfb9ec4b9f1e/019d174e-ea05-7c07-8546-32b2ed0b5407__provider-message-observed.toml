text = "# Three-Tier AI Learning System: Comprehensive Implementation Plan\n\n## System Overview\n\nBuilding a personal AI system that evolves through three memory tiers:\n- **Tier 1 (RAG)**: Short-term memory via vector database retrieval\n- **Tier 2 (LoRA)**: Medium-term adaptation via Low-Rank Adaptation\n- **Tier 3 (Fine-tuning)**: Long-term internalization via full model updates\n\nThe system progresses through evolutionary phases where Phi (local model) learns from Claude until becoming the primary interface, with Claude serving as consultant for complex reasoning.\n\n## Technical Stack Decisions\n\n### Base Model\n- **Start with**: Llama 3.1 8B\n- **Rationale**: Proven LoRA workflows, real-world performance, community support\n- **Alternative to evaluate later**: Phi-4 14B (once LoRA recipes mature)\n\n### Inference Engine\n**Option A (Pure .NET path):**\n- ONNX Runtime via Microsoft.ML.OnnxRuntime NuGet package\n- LoRA adapters merged into base model, exported as separate ONNX files\n- All F# code, minimal Python dependency\n\n**Option B (Pragmatic hybrid):**\n- Ollama for inference (REST API via FsHttp)\n- LoRA adapters loaded via Ollama\n- Simpler initial setup, less .NET integration\n\n**Decision point**: Start with Ollama (faster to prototype), migrate to ONNX if .NET integration becomes important\n\n### Vector Database\n**Start with**: SQLite + sqlite-vec + FTS5\n- **Rationale**: Single file, .NET support via System.Data.SQLite, both semantic and text search\n- **Migration path**: PostgreSQL + pgvector if scale/performance demands it\n\n**Alternative considered**: LanceDB (embedded, columnar) - lacks mature .NET bindings and text search\n\n### Event Storage\n- Filesystem-based event sourcing (append-only files)\n- SQLite vector/text index as read model (rebuildable from events)\n- Events in JSONL format for easy inspection\n\n### Embeddings\n**Start with**: OpenAI text-embedding-3-small via FsHttp\n- 1536 dimensions\n- Good quality/cost ratio\n- Can migrate to local ONNX model later if needed\n\n### LoRA Training\n- Python environment (HuggingFace PEFT + bitsandbytes)\n- Dockerized for isolation\n- Triggered by F# orchestration layer\n- QLoRA (4-bit quantization) for consumer hardware compatibility\n\n---\n\n## Phase 1: Foundation & Model Validation\n\n### 1.1: Model Selection & Baseline Testing\n\n**Install and test candidates:**\n```bash\n# Ollama installation\ncurl -fsSL https://ollama.com/install.sh | sh\n\n# Pull models for comparison\nollama pull llama3.1:8b\nollama pull phi3:mini\nollama pull qwen2.5:7b\n```\n\n**Create test prompt set:**\n- F# coding questions (railway-oriented programming, type providers, computation expressions)\n- MCP architecture questions (JSON-RPC, tool definitions, server patterns)\n- Event sourcing questions (projections, aggregates, event modeling)\n- System design questions (your specific architectural patterns)\n- Casual questions (to test personality/helpfulness)\n\n**A/B comparison:**\n- Same prompts to Claude and each candidate model\n- Document response quality, accuracy, style\n- Identify which model best matches your domain\n- Select winner for RAG integration\n\n### 1.2: Event Sourcing Infrastructure\n\n**Event schema design:**\n```fsharp\ntype ConversationEvent =\n    | PromptSubmitted of {| Timestamp: DateTimeOffset; Prompt: string; Model: string; User: string |}\n    | ResponseGenerated of {| Timestamp: DateTimeOffset; Response: string; Model: string; PromptId: Guid |}\n    | UserFeedback of {| Timestamp: DateTimeOffset; Rating: int; PreferredResponse: string option; EventId: Guid |}\n    | KnowledgeExtracted of {| Timestamp: DateTimeOffset; Extract: string; Category: string; Confidence: float |}\n    | RagEntryCreated of {| Timestamp: DateTimeOffset; Content: string; EmbeddingId: Guid; Metadata: Map<string,string> |}\n    | LoraTrainingQueued of {| Timestamp: DateTimeOffset; Reason: string; DatasetSize: int |}\n```\n\n**Storage implementation:**\n- Events written to `/events/YYYY/MM/conversation_{date}.jsonl`\n- One line per event, parseable JSON\n- Immutable, append-only\n- Git-trackable for Junie guidelines compliance\n\n### 1.3: RAG Infrastructure - SQLite Setup\n\n**Schema design:**\n```sql\n-- Full-text search table\nCREATE VIRTUAL TABLE conversation_fts USING fts5(\n    event_id UNINDEXED,\n    content,\n    model,\n    timestamp UNINDEXED,\n    category\n);\n\n-- Vector search table  \nCREATE VIRTUAL TABLE conversation_vectors USING vec0(\n    event_id TEXT PRIMARY KEY,\n    embedding FLOAT[1536]\n);\n\n-- Metadata table\nCREATE TABLE conversation_metadata (\n    event_id TEXT PRIMARY KEY,\n    source_event_type TEXT,\n    timestamp DATETIME,\n    model TEXT,\n    category TEXT,\n    access_count INTEGER DEFAULT 0,\n    last_accessed DATETIME,\n    quality_score FLOAT\n);\n```\n\n**F# integration:**\n```fsharp\nmodule VectorStore =\n    open System.Data.SQLite\n    \n    let connectionString = \"Data Source=/home/claude/conversation-index.db\"\n    \n    let insertEmbedding (eventId: Guid) (content: string) (embedding: float[]) =\n        // Implementation using System.Data.SQLite\n        \n    let searchSemantic (query: float[]) (limit: int) =\n        // Vector similarity search\n        \n    let searchText (query: string) (limit: int) =\n        // FTS5 text search\n        \n    let hybridSearch (queryText: string) (queryEmbedding: float[]) (limit: int) =\n        // Combined text + semantic search\n```\n\n---\n\n## Phase 2: RAG System Implementation\n\n### 2.1: Embedding Pipeline\n\n**Event processor (background service):**\n```fsharp\ntype EmbeddingProcessor() =\n    let mutable lastProcessedPosition = 0L\n    \n    member this.ProcessNewEvents() =\n        // Read events since last checkpoint\n        let events = EventStore.readSince lastProcessedPosition\n        \n        for event in events do\n            match event with\n            | ResponseGenerated data ->\n                // Extract chunks for embedding\n                let chunks = chunkText data.Response 500 50 // 500 tokens, 50 overlap\n                \n                for chunk in chunks do\n                    // Generate embedding\n                    let embedding = generateEmbedding chunk\n                    \n                    // Store in vector DB\n                    VectorStore.insertEmbedding \n                        (Guid.NewGuid()) \n                        chunk \n                        embedding\n                        {| \n                            SourceEvent = event.Id\n                            Model = data.Model\n                            Timestamp = data.Timestamp\n                            Category = inferCategory chunk\n                        |}\n            | _ -> ()\n        \n        // Update checkpoint\n        lastProcessedPosition <- events |> List.last |> _.Position\n```\n\n**Embedding generation:**\n```fsharp\nlet generateEmbedding (text: string) : Async<float[]> =\n    async {\n        let! response = \n            http {\n                POST \"https://api.openai.com/v1/embeddings\"\n                header \"Authorization\" $\"Bearer {apiKey}\"\n                body\n                jsonSerialize {|\n                    input = text\n                    model = \"text-embedding-3-small\"\n                |}\n            }\n            |> Request.sendAsync\n            \n        let! result = Response.deserializeJsonAsync<EmbeddingResponse> response\n        return result.data.[0].embedding\n    }\n```\n\n### 2.2: Retrieval Integration\n\n**Query processing:**\n```fsharp\ntype RetrievalStrategy =\n    | SemanticOnly of int\n    | TextOnly of int\n    | Hybrid of int\n    \nlet retrieveContext (query: string) (strategy: RetrievalStrategy) : Async<string> =\n    async {\n        let! embedding = generateEmbedding query\n        \n        let results = \n            match strategy with\n            | SemanticOnly limit ->\n                VectorStore.searchSemantic embedding limit\n            | TextOnly limit ->\n                VectorStore.searchText query limit\n            | Hybrid limit ->\n                VectorStore.hybridSearch query embedding limit\n        \n        // Track access for promotion analysis\n        results |> List.iter (fun r -> \n            VectorStore.incrementAccessCount r.EventId\n        )\n        \n        // Format for model context\n        return results \n        |> List.map formatChunk\n        |> String.concat \"\\n\\n\"\n    }\n```\n\n**Model integration:**\n```fsharp\nlet queryWithRag (model: string) (userPrompt: string) : Async<string> =\n    async {\n        // Retrieve relevant context\n        let! context = retrieveContext userPrompt (Hybrid 5)\n        \n        // Construct prompt with context\n        let enhancedPrompt = $\"\"\"\nBased on the following previous conversations and knowledge:\n\n{context}\n\nUser question: {userPrompt}\n\nPlease provide a helpful response using the context above when relevant.\n\"\"\"\n        \n        // Call model (Ollama or ONNX)\n        let! response = callModel model enhancedPrompt\n        \n        // Emit events\n        emitEvent (PromptSubmitted {...})\n        emitEvent (ResponseGenerated {...})\n        \n        return response\n    }\n```\n\n---\n\n## Phase 3: A/B Testing & Data Collection\n\n### 3.1: Parallel Query Interface\n\n**Dual-model querying:**\n```fsharp\ntype ModelResponse = {\n    Model: string\n    Response: string\n    Latency: TimeSpan\n    ContextUsed: string option\n}\n\nlet queryBothModels (prompt: string) : Async<ModelResponse * ModelResponse> =\n    async {\n        let! claudeTask = \n            async {\n                let! start = Async.CancellationToken |> Async.Ignore\n                let startTime = DateTime.UtcNow\n                let! response = queryWithRag \"claude\" prompt\n                return {\n                    Model = \"claude-sonnet-4.5\"\n                    Response = response\n                    Latency = DateTime.UtcNow - startTime\n                    ContextUsed = Some \"RAG + conversation history\"\n                }\n            }\n        \n        let! llamaTask =\n            async {\n                let startTime = DateTime.UtcNow\n                let! response = queryWithRag \"llama3.1\" prompt\n                return {\n                    Model = \"llama3.1:8b\"\n                    Response = response\n                    Latency = DateTime.UtcNow - startTime\n                    ContextUsed = Some \"RAG + conversation history\"\n                }\n            }\n        \n        let! claude = claudeTask\n        let! llama = llamaTask\n        \n        return (claude, llama)\n    }\n```\n\n**User feedback collection:**\n```fsharp\ntype FeedbackUI =\n    | CLI\n    | WebInterface\n    \nlet collectFeedback (claudeResponse: ModelResponse) (llamaResponse: ModelResponse) : Async<UserFeedback> =\n    async {\n        // Display both responses\n        printfn \"=== CLAUDE RESPONSE ===\"\n        printfn \"%s\" claudeResponse.Response\n        printfn \"\\n=== LLAMA RESPONSE ===\"\n        printfn \"%s\" llamaResponse.Response\n        \n        // Collect preference\n        printfn \"\\nWhich response was better?\"\n        printfn \"1) Claude\"\n        printfn \"2) Llama\"\n        printfn \"3) Equal quality\"\n        printfn \"4) Both wrong/unhelpful\"\n        \n        let! choice = Console.ReadLine() |> Async.AwaitTask\n        \n        printfn \"Rate overall quality (1-5):\"\n        let! rating = Console.ReadLine() |> Async.AwaitTask\n        \n        return {\n            PreferredModel = parseChoice choice\n            Rating = int rating\n            Timestamp = DateTime.UtcNow\n        }\n    }\n```\n\n### 3.2: Training Data Generation\n\n**Extract training examples:**\n```fsharp\ntype TrainingExample = {\n    Instruction: string\n    Input: string option\n    Output: string\n    Metadata: Map<string, obj>\n}\n\nlet generateTrainingData (events: ConversationEvent list) : TrainingExample list =\n    events\n    |> List.choose (fun event ->\n        match event with\n        | (PromptSubmitted prompt, ResponseGenerated response, UserFeedback feedback) \n            when feedback.PreferredModel = \"claude\" && feedback.Rating >= 4 ->\n            Some {\n                Instruction = \"You are a helpful AI assistant specializing in F#, MCP development, and event sourcing.\"\n                Input = Some prompt.Prompt\n                Output = response.Response\n                Metadata = Map [\n                    (\"quality_rating\", box feedback.Rating)\n                    (\"timestamp\", box prompt.Timestamp)\n                    (\"category\", box (inferCategory prompt.Prompt))\n                ]\n            }\n        | _ -> None\n    )\n```\n\n**Format for PEFT training:**\n```fsharp\nlet formatForPEFT (examples: TrainingExample list) : string =\n    examples\n    |> List.map (fun ex ->\n        {|\n            instruction = ex.Instruction\n            input = ex.Input |> Option.defaultValue \"\"\n            output = ex.Output\n            metadata = ex.Metadata\n        |}\n        |> JsonSerializer.Serialize\n    )\n    |> String.concat \"\\n\"\n```\n\n---\n\n## Phase 4: LoRA Training Pipeline\n\n### 4.1: Docker Training Environment\n\n**Dockerfile:**\n```dockerfile\nFROM python:3.11-slim\n\nRUN pip install torch transformers peft bitsandbytes accelerate datasets\n\nWORKDIR /training\n\nCOPY train_lora.py .\nCOPY requirements.txt .\n\nENTRYPOINT [\"python\", \"train_lora.py\"]\n```\n\n**Training script (train_lora.py):**\n```python\nimport torch\nfrom transformers import AutoModelForCausalLM, AutoTokenizer, TrainingArguments\nfrom peft import LoraConfig, get_peft_model, prepare_model_for_kbit_training\nfrom trl import SFTTrainer\nimport json\n\ndef load_training_data(path):\n    with open(path) as f:\n        return [json.loads(line) for line in f]\n\ndef train_lora(\n    base_model=\"meta-llama/Llama-3.1-8B-Instruct\",\n    training_data_path=\"/data/training.jsonl\",\n    output_dir=\"/data/adapters\",\n    lora_r=64,\n    lora_alpha=128,\n    lora_dropout=0.1,\n    use_qlora=True\n):\n    # Load base model with quantization\n    if use_qlora:\n        bnb_config = BitsAndBytesConfig(\n            load_in_4bit=True,\n            bnb_4bit_compute_dtype=torch.float16,\n            bnb_4bit_use_double_quant=True,\n            bnb_4bit_quant_type=\"nf4\"\n        )\n        model = AutoModelForCausalLM.from_pretrained(\n            base_model,\n            quantization_config=bnb_config,\n            device_map=\"auto\"\n        )\n        model = prepare_model_for_kbit_training(model)\n    else:\n        model = AutoModelForCausalLM.from_pretrained(\n            base_model,\n            device_map=\"auto\"\n        )\n    \n    # LoRA configuration\n    peft_config = LoraConfig(\n        r=lora_r,\n        lora_alpha=lora_alpha,\n        lora_dropout=lora_dropout,\n        bias=\"none\",\n        task_type=\"CAUSAL_LM\",\n        target_modules=[\"q_proj\", \"k_proj\", \"v_proj\", \"o_proj\"]\n    )\n    \n    model = get_peft_model(model, peft_config)\n    \n    # Load training data\n    dataset = load_training_data(training_data_path)\n    \n    # Training arguments\n    training_args = TrainingArguments(\n        output_dir=output_dir,\n        per_device_train_batch_size=4,\n        gradient_accumulation_steps=4,\n        learning_rate=1e-5,\n        logging_steps=10,\n        save_strategy=\"epoch\"\n    )\n    \n    # Train\n    trainer = SFTTrainer(\n        model=model,\n        train_dataset=dataset,\n        args=training_args,\n        peft_config=peft_config\n    )\n    \n    trainer.train()\n    trainer.save_model(output_dir)\n\nif __name__ == \"__main__\":\n    import sys\n    train_lora()\n```\n\n### 4.2: F# Orchestration\n\n**Training trigger:**\n```fsharp\nmodule LoraTraining =\n    \n    type TrainingConfig = {\n        MinExamples: int\n        QualityThreshold: float\n        AdapterName: string\n    }\n    \n    let shouldTriggerTraining (config: TrainingConfig) : bool =\n        let recentExamples = \n            EventStore.readRecent()\n            |> generateTrainingData\n            |> List.filter (fun ex -> \n                ex.Metadata.[\"quality_rating\"] :?> int >= int config.QualityThreshold\n            )\n        \n        recentExamples.Length >= config.MinExamples\n    \n    let triggerTraining (config: TrainingConfig) : Async<Result<string, string>> =\n        async {\n            try\n                // Prepare training data\n                let examples = \n                    EventStore.readAll()\n                    |> generateTrainingData\n                let trainingData = formatForPEFT examples\n                \n                // Write to shared volume\n                let dataPath = \"/shared/training.jsonl\"\n                do! File.WriteAllTextAsync(dataPath, trainingData) |> Async.AwaitTask\n                \n                // Trigger Docker container\n                let! result = \n                    Process.Start(\"docker\", \n                        $\"run --gpus all -v /shared:/data lora-trainer\"\n                    )\n                    |> Async.AwaitTask\n                \n                if result.ExitCode = 0 then\n                    // Emit success event\n                    emitEvent (LoraTrainingCompleted {|\n                        AdapterName = config.AdapterName\n                        ExampleCount = examples.Length\n                        Timestamp = DateTime.UtcNow\n                    |})\n                    \n                    return Ok $\"Training completed: {config.AdapterName}\"\n                else\n                    return Error \"Training failed\"\n            with ex ->\n                return Error ex.Message\n        }\n```\n\n---\n\n## Phase 5: Evolutionary Phases\n\n### 5.1: Student/Teacher Phase\n\n**Phi attempts first, Claude reviews:**\n```fsharp\nlet studentTeacherQuery (prompt: string) : Async<string> =\n    async {\n        // Phi attempts answer\n        let! phiResponse = queryWithRag \"llama3.1\" prompt\n        \n        // Claude reviews and improves\n        let reviewPrompt = $\"\"\"\nThe user asked: {prompt}\n\nThe student model provided this response:\n{phiResponse}\n\nPlease review this response and either:\n1. Confirm it's good as-is\n2. Provide corrections or improvements\n3. Provide a completely new response if the student response is inadequate\n\nFormat your response as:\nEVALUATION: [good/needs_improvement/inadequate]\nFEEDBACK: [specific feedback]\nFINAL_RESPONSE: [the response to give the user]\n\"\"\"\n        \n        let! claudeReview = callClaude reviewPrompt\n        \n        // Parse review\n        let evaluation = parseEvaluation claudeReview\n        \n        // Emit training event if improvements made\n        if evaluation.NeedsImprovement then\n            emitEvent (TrainingOpportunity {|\n                StudentResponse = phiResponse\n                TeacherResponse = evaluation.FinalResponse\n                Feedback = evaluation.Feedback\n            |})\n        \n        return evaluation.FinalResponse\n    }\n```\n\n### 5.2: Mentor/Consultant Phase\n\n**Phi decides when to consult:**\n```fsharp\nlet mentorConsultantQuery (prompt: string) : Async<string> =\n    async {\n        // Phi analyzes query complexity\n        let complexityPrompt = $\"\"\"\nAnalyze this query and respond with JSON:\n{{\n  \"complexity\": \"simple|moderate|complex\",\n  \"requires_external_knowledge\": boolean,\n  \"reasoning\": \"brief explanation\"\n}}\n\nQuery: {prompt}\n\"\"\"\n        \n        let! complexityAnalysis = queryWithRag \"llama3.1\" complexityPrompt\n        let analysis = JsonSerializer.Deserialize<ComplexityAnalysis>(complexityAnalysis)\n        \n        match analysis.Complexity with\n        | \"simple\" | \"moderate\" ->\n            // Phi handles alone\n            return! queryWithRag \"llama3.1\" prompt\n            \n        | \"complex\" ->\n            // Consult Claude\n            let! phiAttempt = queryWithRag \"llama3.1\" prompt\n            let! claudeConsultation = callClaude $\"The user asked: {prompt}\\n\\nMy initial thoughts: {phiAttempt}\\n\\nCan you provide additional insights or corrections?\"\n            \n            // Phi synthesizes final response\n            let synthesisPrompt = $\"\"\"\nUser question: {prompt}\nMy analysis: {phiAttempt}\nExpert consultation: {claudeConsultation}\n\nSynthesize a final response incorporating the expert's insights.\n\"\"\"\n            return! queryWithRag \"llama3.1\" synthesisPrompt\n            \n        | _ -> return! queryWithRag \"llama3.1\" prompt\n    }\n```\n\n### 5.3: Primary Interface Phase\n\n**Phi as orchestrator:**\n```fsharp\ntype AIConsultant =\n    | Claude\n    | Gemini\n    | Perplexity\n    | SpecializedModel of string\n\nlet primaryInterfaceQuery (prompt: string) : Async<string> =\n    async {\n        // Phi analyzes and routes\n        let! routingDecision = analyzeAndRoute prompt\n        \n        match routingDecision with\n        | HandleDirectly ->\n            // Phi has internalized knowledge\n            return! queryWithLoraAdapter \"llama3.1\" \"primary\" prompt\n            \n        | ConsultExternal consultants ->\n            // Gather multiple perspectives\n            let! consultations = \n                consultants\n                |> List.map (fun consultant ->\n                    match consultant with\n                    | Claude -> callClaude prompt\n                    | Gemini -> callGemini prompt\n                    | Perplexity -> callPerplexity prompt\n                    | SpecializedModel model -> callModel model prompt\n                )\n                |> Async.Parallel\n            \n            // Phi synthesizes\n            let synthesisPrompt = $\"\"\"\nUser question: {prompt}\n\nI consulted multiple experts. Here are their responses:\n{formatConsultations consultations}\n\nSynthesize a comprehensive response that incorporates the best insights from each.\n\"\"\"\n            return! queryWithLoraAdapter \"llama3.1\" \"primary\" synthesisPrompt\n            \n        | UseSpecializedAdapter adapter ->\n            // Load domain-specific LoRA\n            return! queryWithLoraAdapter \"llama3.1\" adapter prompt\n    }\n```\n\n---\n\n## Phase 6: Knowledge Promotion System\n\n### 6.1: Promotion Analysis\n\n**Background analyzer:**\n```fsharp\ntype PromotionCandidate = {\n    Content: string\n    AccessFrequency: int\n    QualityScore: float\n    Category: string\n    FirstSeen: DateTime\n    LastAccessed: DateTime\n}\n\nlet analyzePromotionCandidates() : PromotionCandidate list =\n    query {\n        for metadata in VectorStore.getAllMetadata() do\n        where (metadata.AccessCount > 10)\n        where (metadata.QualityScore > 4.0)\n        select {\n            Content = VectorStore.getContent metadata.EventId\n            AccessFrequency = metadata.AccessCount\n            QualityScore = metadata.QualityScore\n            Category = metadata.Category\n            FirstSeen = metadata.Timestamp\n            LastAccessed = metadata.LastAccessed\n        }\n    }\n    |> Seq.toList\n    |> List.sortByDescending (fun c -> c.AccessFrequency * c.QualityScore)\n```\n\n### 6.2: Human-in-Loop Decision\n\n**Interactive promotion UI:**\n```fsharp\nlet presentPromotionOptions() : Async<unit> =\n    async {\n        let candidates = analyzePromotionCandidates()\n        \n        printfn \"\\n=== KNOWLEDGE PROMOTION CANDIDATES ===\"\n        printfn \"Based on %d recent conversations\\n\" (EventStore.count())\n        \n        for i, candidate in candidates |> List.indexed do\n            printfn \"%d) %s\" (i+1) candidate.Category\n            printfn \"   Accessed: %d times\" candidate.AccessFrequency\n            printfn \"   Quality: %.1f/5.0\" candidate.QualityScore\n            printfn \"   Preview: %s...\" (candidate.Content.Substring(0, 100))\n            printfn \"\"\n        \n        printfn \"Select candidates for LoRA training (comma-separated numbers):\"\n        printfn \"Or press Enter to skip promotion this cycle.\"\n        \n        let! selection = Console.ReadLine() |> Async.AwaitTask\n        \n        if not (String.IsNullOrWhiteSpace selection) then\n            let selected = \n                selection.Split(',')\n                |> Array.map (int >> fun i -> candidates.[i-1])\n                |> Array.toList\n            \n            printfn \"\\nYou selected %d items. Proceed with LoRA training? (y/n)\" selected.Length\n            let! confirm = Console.ReadLine() |> Async.AwaitTask\n            \n            if confirm.ToLower() = \"y\" then\n                do! triggerTraining {\n                    MinExamples = selected.Length\n                    QualityThreshold = 4.0\n                    AdapterName = $\"promoted_{DateTime.UtcNow:yyyyMMdd}\"\n                }\n                |> Async.Ignore\n    }\n```\n\n### 6.3: Automated Promotion Heuristics\n\n**Rule-based promotion:**\n```fsharp\ntype PromotionRule = \n    | AccessFrequency of threshold:int\n    | QualityScore of threshold:float\n    | RecencyWeighted of accessThreshold:int * daysOld:int\n    | CategorySpecific of category:string * accessThreshold:int\n    | Combined of PromotionRule list\n\nlet evaluatePromotionRules (candidate: PromotionCandidate) (rules: PromotionRule list) : bool =\n    rules |> List.exists (fun rule ->\n        match rule with\n        | AccessFrequency threshold ->\n            candidate.AccessFrequency >= threshold\n        | QualityScore threshold ->\n            candidate.QualityScore >= threshold\n        | RecencyWeighted (accessThreshold, daysOld) ->\n            let daysSinceFirst = (DateTime.UtcNow - candidate.FirstSeen).Days\n            daysSinceFirst >= daysOld && candidate.AccessFrequency >= accessThreshold\n        | CategorySpecific (category, accessThreshold) ->\n            candidate.Category = category && candidate.AccessFrequency >= accessThreshold\n        | Combined subrules ->\n            subrules |> List.forall (fun r -> evaluatePromotionRules candidate [r])\n    )\n\nlet autoPromotionRules = [\n    Combined [\n        AccessFrequency 20\n        QualityScore 4.5\n    ]\n    CategorySpecific (\"fsharp-patterns\", 10)\n    CategorySpecific (\"mcp-architecture\", 8)\n    RecencyWeighted (15, 30)\n]\n```\n\n---\n\n## Phase 7: Continuous Loop Implementation\n\n### 7.1: Background Services\n\n**Service orchestrator:**\n```fsharp\ntype BackgroundService =\n    | EmbeddingProcessor\n    | PromotionAnalyzer\n    | LoraTrainer\n    | MetricsCollector\n\ntype ServiceConfig = {\n    Service: BackgroundService\n    CheckInterval: TimeSpan\n    Enabled: bool\n}\n\nlet runBackgroundServices (configs: ServiceConfig list) : Async<unit> =\n    configs\n    |> List.filter (_.Enabled)\n    |> List.map (fun config ->\n        async {\n            while true do\n                match config.Service with\n                | EmbeddingProcessor ->\n                    do! EmbeddingProcessor().ProcessNewEvents()\n                | PromotionAnalyzer ->\n                    let candidates = analyzePromotionCandidates()\n                    if candidates |> List.exists (evaluatePromotionRules <| autoPromotionRules) then\n                        do! presentPromotionOptions()\n                | LoraTrainer ->\n                    if shouldTriggerTraining defaultTrainingConfig then\n                        do! triggerTraining defaultTrainingConfig |> Async.Ignore\n                | MetricsCollector ->\n                    do! collectAndEmitMetrics()\n                \n                do! Async.Sleep config.CheckInterval\n        }\n    )\n    |> Async.Parallel\n    |> Async.Ignore\n```\n\n### 7.2: Sliding Window Context Manager\n\n**Context window management:**\n```fsharp\ntype ConversationWindow = {\n    Messages: Message list\n    TokenCount: int\n    OldestMessageId: Guid\n    EmbeddingWatermark: Guid\n}\n\nlet maxContextTokens = 120_000 // Llama 3.1 context size\n\nlet updateConversationWindow (state: ConversationWindow) (newMessage: Message) : Async<ConversationWindow> =\n    async {\n        let updatedMessages = state.Messages @ [newMessage]\n        let updatedTokenCount = countTokens updatedMessages\n        \n        if updatedTokenCount > maxContextTokens then\n            // Need to drop old messages\n            let tokensToFree = updatedTokenCount - maxContextTokens\n            let toKeep, toEmbed = splitAtTokenBudget updatedMessages tokensToFree\n            \n            // Ensure dropped messages are embedded before removing from context\n            for msg in toEmbed do\n                let! embedded = VectorStore.checkIfEmbedded msg.Id\n                if not embedded then\n                    do! EmbeddingProcessor().processMessage msg\n            \n            return {\n                Messages = toKeep\n                TokenCount = countTokens toKeep\n                OldestMessageId = toKeep.Head.Id\n                EmbeddingWatermark = (List.last toEmbed).Id\n            }\n        else\n            return {\n                state with\n                    Messages = updatedMessages\n                    TokenCount = updatedTokenCount\n            }\n    }\n```\n\n---\n\n## Phase 8: Full Fine-Tuning (Long-term)\n\n### 8.1: Fine-tuning Trigger Conditions\n\n**When to fully fine-tune:**\n```fsharp\ntype FineTuningTrigger =\n    | StableLoraAge of months:int\n    | AdapterSizeThreshold of megabytes:int\n    | PerformancePlateau\n    | ManualRequest\n\nlet shouldTriggerFineTuning() : FineTuningTrigger option =\n    let adapters = listLoraAdapters()\n    \n    // Check stable adapter age\n    let stableAdapters = \n        adapters \n        |> List.filter (fun a -> \n            (DateTime.UtcNow - a.LastModified).TotalDays > 90\n        )\n    \n    if stableAdapters.Length >= 3 then\n        Some (StableLoraAge 3)\n    else\n        None\n```\n\n### 8.2: Fine-tuning Process\n\n**Full training pipeline:**\n```python\n# Full fine-tuning script (separate from LoRA)\ndef full_finetune(\n    base_model=\"meta-llama/Llama-3.1-8B\",\n    merged_lora_path=\"/models/merged\",\n    training_data_path=\"/data/consolidated_training.jsonl\",\n    output_dir=\"/models/ivan-specialized-v1\"\n):\n    # Load base model\n    model = AutoModelForCausalLM.from_pretrained(base_model)\n    \n    # Optionally initialize from merged LoRA weights\n    if merged_lora_path:\n        merge_lora_weights(model, merged_lora_path)\n    \n    # Full training (not PEFT)\n    training_args = TrainingArguments(\n        output_dir=output_dir,\n        num_train_epochs=3,\n        per_device_train_batch_size=2,\n        gradient_accumulation_steps=8,\n        learning_rate=2e-5,\n        save_strategy=\"epoch\",\n        evaluation_strategy=\"epoch\"\n    )\n    \n    trainer = Trainer(\n        model=model,\n        args=training_args,\n        train_dataset=load_dataset(training_data_path)\n    )\n    \n    trainer.train()\n    trainer.save_model(output_dir)\n```\n\n---\n\n## Success Metrics & Monitoring\n\n### Key Performance Indicators\n\n**Phase 1-2 (RAG Foundation):**\n- Retrieval precision/recall on test queries\n- Response quality vs Claude baseline\n- System latency < 2 seconds for RAG queries\n- Event capture completeness (100%)\n\n**Phase 3 (A/B Testing):**\n- Phi response quality rating trend\n- Win rate: Phi vs Claude (target: >30% initially)\n- Training example accumulation rate\n- User satisfaction scores\n\n**Phase 4-5 (LoRA & Evolution):**\n- LoRA training success rate\n- Post-LoRA quality improvement delta\n- Phi win rate after LoRA (target: >60%)\n- Consultation frequency in mentor phase (target: <30%)\n\n**Phase 6-7 (Continuous Loop):**\n- Promotion accuracy (selected items vs manually reviewed)\n- LoRA adapter stability\n- Knowledge coverage (% of queries answerable from internalized knowledge)\n- Synthesis quality when consulting external models\n\n### Monitoring Dashboard\n\n```fsharp\ntype SystemMetrics = {\n    TotalConversations: int\n    RagHitRate: float\n    AverageResponseQuality: float\n    PhiWinRate: float\n    ActiveLoraAdapters: int\n    ConsultationRate: float\n    StorageUsed: int64\n}\n\nlet collectMetrics() : SystemMetrics =\n    {\n        TotalConversations = EventStore.count()\n        RagHitRate = calculateRagHitRate()\n        AverageResponseQuality = calculateAvgQuality()\n        PhiWinRate = calculateWinRate \"llama3.1\"\n        ActiveLoraAdapters = countActiveAdapters()\n        ConsultationRate = calculateConsultationRate()\n        StorageUsed = calculateStorageUsage()\n    }\n```\n\n---\n\n## Migration & Rollback Strategies\n\n### Adapter Versioning\n\n```fsharp\ntype AdapterVersion = {\n    Name: string\n    Version: string\n    BaseModel: string\n    TrainingDate: DateTime\n    PerformanceMetrics: Map<string, float>\n    GitCommit: string option\n}\n\nlet versionAdapter (adapterPath: string) : AdapterVersion =\n    {\n        Name = Path.GetFileName adapterPath\n        Version = generateSemanticVersion()\n        BaseModel = \"llama3.1-8b\"\n        TrainingDate = DateTime.UtcNow\n        PerformanceMetrics = benchmarkAdapter adapterPath\n        GitCommit = getCurrentGitCommit()\n    }\n\nlet rollbackToAdapter (version: string) : Async<Result<unit, string>> =\n    async {\n        let adapterPath = $\"/models/adapters/{version}\"\n        if File.Exists adapterPath then\n            // Swap active adapter\n            do! setActiveAdapter adapterPath\n            return Ok ()\n        else\n            return Error $\"Adapter version {version} not found\"\n    }\n```\n\n---\n\n## Open Questions for Opus Review\n\n1. **Vector DB strategy**: SQLite+vec for simplicity vs PostgreSQL+pgvector for features vs LanceDB for performance?\n\n2. **Python integration depth**: Minimal (Docker only) vs Deeper (Python.NET for embedding generation)?\n\n3. **LoRA adapter management**: Single unified adapter vs domain-separated adapters from the start?\n\n4. **Promotion policy**: More automated (ML-based analysis) vs more manual (human selection) initially?\n\n5. **Event schema**: Current flat structure vs more normalized with aggregate roots?\n\n6. **Inference engine**: Start Ollama vs commit to ONNX Runtime for .NET integration?\n\n7. **Fine-tuning timing**: Cloud GPU rental for full fine-tuning vs wait for longer local training?\n\n8. **Testing strategy**: Unit tests for each component vs integration tests vs manual validation only?\n\n9. **Deployment**: Local development first vs containerized from start vs both paths?\n\n10. **Knowledge extraction**: Simple chunking vs semantic understanding via Claude for better chunk boundaries?\n\n---\n\n## Implementation Ordering\n\n**First:** Phase 1.1-1.3 (Model selection, events, RAG foundation)\n**Second:** Phase 2 (RAG implementation with retrieval)\n**Third:** Phase 3 (A/B testing and data collection)\n**Fourth:** Phase 4 (LoRA training pipeline)\n**Fifth:** Phases 5-6 (Evolutionary phases and promotion system)\n**Sixth:** Phase 7 (Continuous background loop)\n**Seventh:** Phase 8 (Full fine-tuning when appropriate)\n\n**Dependencies:**\n- RAG must work before A/B testing\n- A/B testing must accumulate data before LoRA\n- LoRA training must succeed before evolutionary phases\n- Evolutionary phases inform promotion policies\n- Promotion system requires background services\n- Fine-tuning is optional enhancement after LoRA proves stable\n\n---\n\nThis plan is ready for Opus review. Would appreciate feedback on architectural soundness, missing considerations, potential simplifications, and alternative approaches."

