kind = "plain_text"
text = "Project Knowledge in Claude is **not RAG** - it's actually simpler and more direct than that.\n\nHere's how it works:\n\n**Project Knowledge uses full context inclusion**, not retrieval. When you add documents to a Project (up to 100 files, 10MB each), their entire contents get loaded into the conversation's context window. There's no embedding, no vector search, no retrieval step. Everything you've uploaded is just... there, available to Claude in every message within that Project.\n\nThink of it like the difference between:\n- **Traditional RAG**: You have a massive library. When you ask a question, the system searches for relevant books, pulls out specific passages, and only shows those excerpts to the AI.\n- **Project Knowledge**: You hand Claude a folder of documents at the start of the conversation, and Claude reads all of them. The entire folder stays on Claude's desk throughout your chat.\n\nThis works because Claude has a large context window (up to 200K tokens for Claude Sonnet 4.5). So there's no need for retrieval when you can just include everything.\n\n**The practical implications:**\n\nYou get more accurate, comprehensive responses because Claude sees the full context of your documents, not just retrieved chunks that a semantic search deemed relevant. There's no risk of missing important context because the retrieval step failed to find the right passage.\n\nHowever, you're limited by context window size. If your knowledge base grows beyond what fits in the context window, you'd need to either split it across multiple projects or actually implement a RAG system.\n\nDoes this match what you were expecting, or were you wondering about something more specific about how it handles the uploaded content?"

