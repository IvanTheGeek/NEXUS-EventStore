[[body.segments]]
kind = "reasoning"
text = "The user is asking about how project knowledge works in Claude, specifically whether it's RAG or a RAG equivalent. This is a technical question about Claude's architecture and features.\n\nLet me think about what I know:\n1. Claude has Projects feature where users can add custom knowledge\n2. The user's memory mentions they explored \"architectural concepts including the technical differences between RAG (static document retrieval) and MCP (dynamic tool interactions)\"\n3. I should explain how Project Knowledge actually works\n\nFrom my understanding, Project Knowledge in Claude:\n- Allows users to upload documents (up to 100 files, each up to 10MB in size)\n- These documents get added to the context window of conversations within that project\n- This is NOT traditional RAG (Retrieval Augmented Generation) in the technical sense\n- It's more like \"full context inclusion\" rather than retrieval\n\nTraditional RAG systems:\n- Store documents in a vector database\n- Use embeddings to find relevant chunks\n- Only retrieve and include the most relevant pieces in the prompt\n- This is necessary when you have more content than fits in the context window\n\nClaude's Project Knowledge:\n- The entire content of the uploaded documents is available in the context window\n- It's more like having the full documents available for reference\n- No retrieval step - everything is already there\n- This is possible because Claude has a large context window (up to 200K tokens)\n\nSo it's actually quite different from RAG. It's more accurate to say it's \"context augmentation\" rather than \"retrieval augmented generation.\"\n\nGiven the user's preferences:\n- Be direct and efficient\n- They're familiar with technical concepts (they mentioned RAG vs MCP)\n- They want thorough explanations that build understanding\n\nI should explain this clearly, contrasting it with traditional RAG to help them understand the difference."

[[body.segments]]
kind = "plain_text"
text = "Project Knowledge in Claude is **not RAG** - it's actually simpler and more direct than that.\n\nHere's how it works:\n\n**Project Knowledge uses full context inclusion**, not retrieval. When you add documents to a Project (up to 100 files, 10MB each), their entire contents get loaded into the conversation's context window. There's no embedding, no vector search, no retrieval step. Everything you've uploaded is just... there, available to Claude in every message within that Project.\n\nThink of it like the difference between:\n- **Traditional RAG**: You have a massive library. When you ask a question, the system searches for relevant books, pulls out specific passages, and only shows those excerpts to the AI.\n- **Project Knowledge**: You hand Claude a folder of documents at the start of the conversation, and Claude reads all of them. The entire folder stays on Claude's desk throughout your chat.\n\nThis works because Claude has a large context window (up to 200K tokens for Claude Sonnet 4.5). So there's no need for retrieval when you can just include everything.\n\n**The practical implications:**\n\nYou get more accurate, comprehensive responses because Claude sees the full context of your documents, not just retrieved chunks that a semantic search deemed relevant. There's no risk of missing important context because the retrieval step failed to find the right passage.\n\nHowever, you're limited by context window size. If your knowledge base grows beyond what fits in the context window, you'd need to either split it across multiple projects or actually implement a RAG system.\n\nDoes this match what you were expecting, or were you wondering about something more specific about how it handles the uploaded content?"

