text = "Perfect! Based on your existing Claude Desktop config and the docs, here's the command:\n\n```bash\nclaude mcp add FnMCP.IvanTheGeek --scope user -- /home/linux/FnMCP.IvanTheGeek/FnMCP.IvanTheGeek\n```\n\n**Why `--scope user`?**\n- `local` (default): Only current project directory\n- `user`: All your projects (recommended for your MCP server)\n- `project`: Shared via `.mcp.json` for team collaboration\n\n**Alternative using JSON:**\n```bash\nclaude mcp add-json FnMCP.IvanTheGeek '{\"command\":\"/home/linux/FnMCP.IvanTheGeek/FnMCP.IvanTheGeek\",\"args\":[]}'\n```\n\n**Verify it worked:**\n```bash\nclaude mcp list\n```\n\nThen inside Claude Code:\n```\n/mcp\n```\n\nThis should show `FnMCP.IvanTheGeek: connected`\n\n**Note:** Since you're using the binary directly (not npx/uvx), make sure it's executable:\n```bash\nchmod +x /home/linux/FnMCP.IvanTheGeek/FnMCP.IvanTheGeek\n```\n\nWant me to verify the binary is executable first?\n\n---\n**Context:** 48K/190K tokens (25%) ████████░░░░░░░░░░░░░░░░░░░░░░░░"

