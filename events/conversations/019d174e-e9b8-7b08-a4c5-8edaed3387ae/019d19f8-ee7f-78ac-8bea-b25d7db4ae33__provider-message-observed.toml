text = "1 · Add the server that requires authentication · For example: Copy · Ask AI · claude mcp add --transport http sentry https://mcp.sentry.dev/mcp · 2 · Use the /mcp command within Claude Code · In Claude code, use the command: Copy · ...\n\nAdd MCP servers from JSON configuration · Import MCP servers from Claude Desktop · Use Claude Code as an MCP server · MCP output limits and warnings · Use MCP resources · Reference MCP resources · Use MCP prompts as slash commands · Execute MCP prompts · Enterprise MCP configuration · Setting up enterprise MCP configuration · Restricting MCP servers with allowlists and denylists · Build with Claude Code · Copy page · Learn how to connect Claude Code to your tools with the Model Context Protocol. Copy page · Claude Code can connect to hundreds of external tools and data sources through the Model Context Protocol (MCP), an open-source standard for AI-tool integrations. MCP servers give Claude Code access to your tools, databases, and APIs. With MCP servers connected, you can ask Claude Code to: Implement features from issue trackers: “Add the feature described in JIRA issue ENG-4521 and create a PR on GitHub.” ·\n\nMany cloud-based MCP servers require authentication. Claude Code supports OAuth 2.0 for secure connections. 1 · Add the server that requires authentication · For example: Copy · Ask AI · claude mcp add --transport http sentry https://mcp.sentry.dev/mcp · 2 · Use the /mcp command within Claude Code · In Claude code, use the command: Copy · Ask AI · > /mcp Then follow the steps in your browser to login. Tips: Authentication tokens are stored securely and refreshed automatically · Use “Clear authentication” in the /mcp menu to revoke access · If your browser doesn’t open automatically, copy the provided URL · OAuth authentication works with HTTP servers · If you have a JSON configuration for an MCP server, you can add it directly: 1 · Add an MCP server from JSON · Copy · Ask AI ·\n\nClaude Code can connect to hundreds of external tools and data sources through the Model Context Protocol (MCP), an open-source standard for AI-tool integrations. MCP servers give Claude Code access to your tools, databases, and APIs. With MCP servers connected, you can ask Claude Code to: Implement features from issue trackers: “Add the feature described in JIRA issue ENG-4521 and create a PR on GitHub.” · Analyze monitoring data: “Check Sentry and Statsig to check the usage of the feature described in ENG-4521.” · Query databases: “Find emails of 10 random users who used feature ENG-4521, based on our Postgres database.” · Integrate designs: “Update our standard email template based on the new Figma designs that were posted in Slack” · Automate workflows: “Create Gmail drafts inviting these 10 users to a feedback session about the new feature.” ·\n\nProject-scoped servers enable team collaboration by storing configurations in a .mcp.json file at your project’s root directory. This file is designed to be checked into version control, ensuring all team members have access to the same MCP tools and services. When you add a project-scoped server, Claude Code automatically creates or updates this file with the appropriate configuration structure. ... # Add a project-scoped server claude mcp add --transport http paypal --scope project https://mcp.paypal.com/mcp The resulting .mcp.json file follows a standardized format: ... { \"mcpServers\": { \"shared-server\": { \"command\": \"/path/to/server\", \"args\": [], \"env\": {} } } } For security reasons, Claude Code prompts for approval before using project-scoped servers from .mcp.json files. If you need to reset these approval choices, use the claude mcp reset-project-choices command.\n$&gt; code ~/Library/Application Support/Claude/claude_desktop_config.json ... { &quot;mcpServers&quot;: { &quot;github&quot;: { &quot;command&quot;: &quot;npx&quot;, &quot;args&quot;: [&quot;-y&quot;, &quot;@modelcontextprotocol/server-github&quot;], &quot;env&quot;: { &quot;GITHUB_PERSONAL_ACCESS_TOKEN&quot;: &quot;ghp_your_token_here&quot; } }, &quot;perplexity&quot;: { &quot;command&quot;: &quot;npx&quot;, &quot;args&quot;: [&quot;-y&quot;, &quot;perplexity-mcp&quot;], &quot;env&quot;: { &quot;PERPLEXITY_API_KEY&quot;: &quot;pplx_your_key_here&quot; } } } } ... &quot;github&quot;: { &quot;command&quot;: &quot;npx&quot;, &quot;args&quot;: [&quot;-y&quot;, &quot;@modelcontextprotocol/server-github&quot;], &quot;env&quot;: { &quot;GITHUB_PERSONAL_ACCESS_TOKEN&quot;: &quot;ghp_xxxxxxxxxxxx&quot; } } ... &quot;perplexity&quot;: { &quot;command&quot;: &quot;node&quot;, &quot;args&quot;: [&quot;/path/to/perplexity-mcp/build/index.js&quot;], &quot;env&quot;: { &quot;PERPLEXITY_API_KEY&quot;: &quot;pplx_xxxxxxxxxxxx&quot;, &quot;PERPLEXITY_MODEL&quot;: &quot;sonar&quot; } } ... &quot;sequential-thinking&quot;: { &quot;command&quot;: &quot;npx&quot;, &quot;args&quot;: [&quot;-y&quot;, &quot;@modelcontextprotocol/server-sequential-thinking&quot;] } ... $echo &#x27;{&quot;jsonrpc&quot;:&quot;2.0&quot;,&quot;method&quot;:&quot;initialize&quot;,&quot;params&quot;:{&quot;protocolVersion&quot;:&quot;2024-11-05&quot;},&quot;id&quot;:1}&#x27; | npx @modelcontextprotocol/server-github ...\n\nAdd MCP servers to Claude Code with the command claude mcp add github --scope user. For complex configurations, skip the CLI wizard and edit the config file directly at ~/Library/Application Support/Claude/claude_desktop_config.json. Popular servers include GitHub for PR management, Perplexity for research, Sequential Thinking for breaking down complex tasks, and Context7 for up-to-date documentation. After making changes, restart Claude Code and verify with claude mcp list. MCP servers transform Claude Code from a smart assistant into a powerful development hub. Instead of switching between terminal, browser, and IDE, you get: GitHub integration - Review PRs, manage issues, trigger CI/CD · Perplexity search - Research APIs and docs without leaving terminal · Sequential thinking - Break down complex refactoring tasks · Context7 documentation - Get real-time, version-specific library docs ·\n\nLearn how to add and configure MCP servers in Claude Code. Enable GitHub, Perplexity, and other integrations for enhanced development capabilities | MCPcat\n\n$> code ~/Library/Application Support/Claude/claude_desktop_config.json ... { \"mcpServers\": { \"github\": { \"command\": \"npx\", \"args\": [\"-y\", \"@modelcontextprotocol/server-github\"], \"env\": { \"GITHUB_PERSONAL_ACCESS_TOKEN\": \"ghp_your_token_here\" } }, \"perplexity\": { \"command\": \"npx\", \"args\": [\"-y\", \"perplexity-mcp\"], \"env\": { \"PERPLEXITY_API_KEY\": \"pplx_your_key_here\" } } } } ... \"github\": { \"command\": \"npx\", \"args\": [\"-y\", \"@modelcontextprotocol/server-github\"], \"env\": { \"GITHUB_PERSONAL_ACCESS_TOKEN\": \"ghp_xxxxxxxxxxxx\" } } ... \"perplexity\": { \"command\": \"node\", \"args\": [\"/path/to/perplexity-mcp/build/index.js\"], \"env\": { \"PERPLEXITY_API_KEY\": \"pplx_xxxxxxxxxxxx\", \"PERPLEXITY_MODEL\": \"sonar\" } } ... \"sequential-thinking\": { \"command\": \"npx\", \"args\": [\"-y\", \"@modelcontextprotocol/server-sequential-thinking\"] } ... $echo '{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\"},\"id\":1}' | npx @modelcontextprotocol/server-github ...\n\n$claude mcp add-json perplexity '{\"command\":\"npx\",\"args\":[\"-y\",\"perplexity-mcp\"],\"env\":{\"PERPLEXITY_API_KEY\":\"'$PERPLEXITY_KEY'\"}}' $claude mcp add context7 -- npx -y @upstash/context7-mcp@latest ... Then: export GITHUB_TOKEN=ghp_xxxx in your shell. ... Add server: claude mcp add [name] --scope user List servers: claude mcp list Remove server: claude mcp remove [name] Test server: claude mcp get [name] Config location: macOS: ~/Library/Application Support/Claude/claude_desktop_config.json · Windows: %APPDATA%\\Claude\\claude_desktop_config.json · Remember: Direct config editing beats CLI wizards for complex setups. Restart Claude after changes. Keep your fast intern well-equipped. Get started with Claude Code in minutes. Learn essential commands and features to boost your development workflow. Discover the most powerful MCP servers to enhance your Claude Code development workflow with specialized tools and integrations.\nSet up Claude Code and connect it to Docker MCP Toolkit. Configure the Atlassian MCP server for Jira integration. Configure the GitHub MCP server to access repository history and run git commands.\n\nLearn how to add and configure MCP servers for Claude Code using Docker MCP Toolkit.\n\nYou’re now ready to use Claude Code with MCP servers from Docker Desktop. Now that you’ve connected Claude Code to Docker MCP Toolkit, let’s see it in action with a practical example. We’ll automatically convert TODO comments in a real codebase into tracked Jira tickets — complete with git history, priority categorization, and proper linking. For this automation, we’ll orchestrate three MCP servers: Filesystem MCP – to scan your codebase and read source files · GitHub MCP – to run git blame and extract author information · Atlassian (Jira) MCP – to create and manage Jira issues · We’ll walk through enabling and configuring all three MCP servers. ... Let’s walk through it step-by-step. ... For Atlassian API authentication, the “username” is always your Atlassian account email address, which you use together with the API token for basic authentication ...\n\nThe Filesystem MCP server allows Claude Code to read files from your local system. You need to specify which directories it can access. ... Important: Only grant access to directories you’re comfortable with Claude Code reading. The Filesystem MCP server is scoped to these specific paths for security. ... Scan this codebase for all TODO and FIXME comments. For each one: 1. Extract the comment and surrounding code context (5 lines before/after) 2. Use git blame to identify who wrote it and when 3. Determine priority based on keywords: - High: \"race condition\", \"data loss\", \"security\", \"failure\", \"crash\" - Medium: \"performance\", \"slow\", \"cache\", \"optimization\" - Low: \"documentation\", \"refactor\", \"cleanup\" 4.\n\nClaude Code will orchestrate multiple MCP servers to complete this task: ... I'll scan the codebase for TODO and FIXME comments, analyze them, and create Jira issues for tracking.\nTo add this MCP server to Claude ... claude mcp add-json &quot;cursor-rules-mcp&quot; &#x27;{ &quot;command&quot;: &quot;npx&quot;, &quot;args&quot;: [&quot;-y&quot;, &quot;cursor-rules-mcp&quot;] }&#x27; See the official Claude Code MCP documentation for more details. There are two ways to add an MCP server to Cursor. The most common way is to add the server globally in the ~/.cursor/mcp.json file so that it is available in all of your projects. If you only need the server in a single project, you can add it to the project instead by creating or adding it to the .cursor/mcp.json file. To add a global MCP server go to Cursor Settings &gt; Tools &amp; Integrations and click &quot;New MCP Server&quot;....\n\nUse Claude Code as an MCP server. ... The Claude Code MCP Server enables integration with Anthropic's Claude Code capabilities through function calling for various agent frameworks, including Model Context Protocol (MCP). It provides a convenient way to leverage Claude's coding abilities programmatically, allowing AI assistants to understand, analyze, and manipulate code through a simple, secure connection. Before you can use Claude Code as an MCP server, you need to install the Claude Code CLI: ... Important: Do NOT use sudo npm install -g as this can lead to permission issues and security risks. Operating Systems: macOS 10.15+, Ubuntu 20.04+/Debian 10+, or Windows via WSL ... Claude Code does not run directly in Windows and requires WSL. If you encounter issues in WSL: OS/platform detection issues: If you receive an error during installation, WSL may be using Windows npm.\n\nThis command starts Claude Code as an MCP server that other applications can connect to, providing them with Claude's tools and capabilities. You can connect to the Claude Code MCP server from any MCP client, such as Claude Desktop. If you're using Claude Desktop, you can add the Claude Code MCP server using this configuration: { \"command\": \"claude\", \"args\": [\"mcp\", \"serve\"], \"env\": {} } The Claude Code MCP server provides access to all of Claude's built-in tools including: ... For older versions of Cursor, you may need to restart the application after adding the MCP server configuration.\n\nTo add this MCP server to Claude Code, run this command in your terminal: claude mcp add-json \"cursor-rules-mcp\" '{ \"command\": \"npx\", \"args\": [\"-y\", \"cursor-rules-mcp\"] }' See the official Claude Code MCP documentation for more details. There are two ways to add an MCP server to Cursor. The most common way is to add the server globally in the ~/.cursor/mcp.json file so that it is available in all of your projects. If you only need the server in a single project, you can add it to the project instead by creating or adding it to the .cursor/mcp.json file. To add a global MCP server go to Cursor Settings > Tools & Integrations and click \"New MCP Server\". When you click that button the ~/.cursor/mcp.json file will be opened and you can add your server like this: { \"mcpServers\": { \"cursor-rules-mcp\": { \"command\": \"npx\", \"args\": [ \"-y\", \"cursor-rules-mcp\" ] } } } To add an MCP server to a project you can create a new .cursor/mcp.json file or add it to the existing one.\nIt’s as simple as the official Sequential Thinking Server: { &quot;mcpServers&quot;: { &quot;mcp-sequentialthinking-tools&quot;: { &quot;type&quot;: &quot;stdio&quot;, &quot;command&quot;: &quot;npx&quot;, &quot;args&quot;: [&quot;-y&quot;, &quot;mcp-sequentialthinking-tools&quot;] } } } This tool is particularly useful when working ...\n\nAight! So, I’ve been using Claude Code for a bit now, and one thing that’s been bugging me is the way you’re supposed to configure MCP tools...\n\n│ │ │ │ /help for help │ │ │ │ cwd: /home/scott/repos/scottspence.com │ ╰────────────────────────────────────────────╯ ✔ Found 2 MCP servers • /mcp · To check on them use the /mcp command inside Claude Code: > /mcp ⎿ MCP Server Status ⎿ ⎿ • mcp-omnisearch: connected ⎿ • sequentialthinking-tools: connected · Editing the config file directly has several advantages: Complete visibility - I can see all my configurations at once · Easy copying and backup - Simple to share configurations across machines · Version control - I can track changes to my config over time · Quick edits - Make small changes without going through the entire wizard · Complex configurations - Support for more advanced setups that might be difficult through the CLI ·\n\nIt’s as simple as the official Sequential Thinking Server: { \"mcpServers\": { \"mcp-sequentialthinking-tools\": { \"type\": \"stdio\", \"command\": \"npx\", \"args\": [\"-y\", \"mcp-sequentialthinking-tools\"] } } } This tool is particularly useful when working on complex tasks that require multiple steps and different tools along the way. If you’ve created your own MCP tools (or are testing locally), the configuration is similar. You just need to point to the built JavaScript file: { \"mcpServers\": { \"my-custom-tool\": { \"type\": \"stdio\", \"command\": \"node\", \"args\": [\"/home/scott/mcp-tools/my-custom-tool/build/index.js\"] } } } After editing the config file, you’ll need to restart Claude Code for the changes to take effect. When it starts up, you should see the MCP tools icon indicating that your tools are available. ╭────────────────────────────────────────────╮ │ ✻ Welcome to Claude Code research preview!\n\nHere’s the actual setup I’m currently using with Claude Code (with API keys removed, of course): { \"mcpServers\": { \"mcp-omnisearch\": { \"type\": \"stdio\", \"command\": \"npx\", \"args\": [\"-y\", \"mcp-omnisearch\"], \"env\": { \"TAVILY_API_KEY\": \"\", \"BRAVE_API_KEY\": \"\", \"KAGI_API_KEY\": \"\", \"PERPLEXITY_API_KEY\": \"\", \"JINA_AI_API_KEY\": \"\" } } } } Yes, one MCP tool! This setup gives me a powerful combination of tools for searching the web, reading documentation, AI-powered responses, and content processing - all through a single MCP server. While Claude Code’s CLI wizard might be the “official” way to configure MCP tools, directly editing the config file gives me much more control and flexibility. This is especially true for anyone with more complex setups or testing locally. By taking the direct approach, I can quickly set up, modify, and maintain my MCP tool configurations without the frustration of stepping through CLI prompts.\n# File system claude mcp add filesystem -s user -- npx -y @modelcontextprotocol/server-filesystem ~/Documents ~/Projects # GitHub read -p &quot;Enter GitHub Token: &quot; github_token claude mcp add github -s user -e GITHUB_TOKEN=$github_token -- npx -y @modelcontextprotocol/server-github ...\n\n# Wrong claude mcp add fs -- npx -y @modelcontextprotocol/server-filesystem C:\\Users\\username\\Documents # Correct claude mcp add fs -- npx -y @modelcontextprotocol/server-filesystem C:/Users/username/Documents # or claude mcp add fs -- npx -y @modelcontextprotocol/server-filesystem C:\\\\Users\\\\username\\\\Documents · Permission denied · Solution: macOS/Linux: Use sudo (not recommended) or modify file permissions · Windows: Run as administrator · Best method: Install MCP servers in user directory · When encountering problems, these debugging methods can help you quickly locate issues: bash · claude --mcp-debug · In Claude Code, enter: /mcp · macOS/Linux: bash · tail -f ~/Library/Logs/Claude/mcp*.log · Windows: cmd · type \"%APPDATA%\\Claude\\logs\\mcp*.log\" bash · # Directly run server command to see if there's output npx -y @modelcontextprotocol/server-filesystem ~/Documents ·\n\n💡 Next Action: Try adding the filesystem MCP server immediately to experience the powerful functionality of Claude Code directly manipulating files!\n\n#!/bin/bash # setup-mcp.sh echo \"Configuring common MCP servers...\" # File system claude mcp add filesystem -s user -- npx -y @modelcontextprotocol/server-filesystem ~/Documents ~/Projects # GitHub read -p \"Enter GitHub Token: \" github_token claude mcp add github -s user -e GITHUB_TOKEN=$github_token -- npx -y @modelcontextprotocol/server-github # Other servers... echo \"Configuration complete!\" claude mcp list ... MCP transforms Claude Code from a simple AI assistant into a powerful development partner. After properly configuring MCP servers, your development efficiency will be significantly improved.\n\n# Add file system access (most commonly used) claude mcp add filesystem -s user -- npx -y @modelcontextprotocol/server-filesystem ~/Documents ~/Desktop # Verify if successful claude mcp list · That's it! But if you encounter errors, please continue reading the detailed guide. Claude Code provides simple command line tools to add MCP servers: ... # Basic syntax claude mcp add <name> <command> [parameters...] # Actual example: Add local file system access claude mcp add my-filesystem -- npx -y @modelcontextprotocol/server-filesystem ~/Documents # Example with environment variables claude mcp add api-server -e API_KEY=your-key-here -- /path/to/server · Many developers find CLI wizards too cumbersome, especially when you have to restart if you make a mistake. Direct configuration file editing is more efficient: ... { \"mcpServers\": { \"filesystem\": { \"type\": \"stdio\", \"command\": \"npx\", \"args\": [\"-y\", \"@modelcontextprotocol/server-filesystem\", \"/Users/username/Documents\"], \"env\": {} }, \"github\n{ &quot;mcpServers&quot;: { &quot;my-mcp-server&quot;: ... server using the Claude CLI command: Claude Code CLI Command · claude mcp add --transport http --scope local my-mcp-server https://your-mcp-server.com --env API_KEY=&quot;your-api-key-here&quot; --header ...\n\n{ \"mcpServers\": { \"my-mcp-server\": { \"command\": \"npx\", \"args\": [ \"mcp-remote\", \"https://your-mcp-server.com\", \"--header\", \"API_Key: ${API_KEY}\" ], \"env\": { \"API_KEY\": \"your-api-key-here\" } } } } For Claude Code (CLI), you can add the MCP server using the Claude CLI command: Claude Code CLI Command · claude mcp add --transport http --scope local my-mcp-server https://your-mcp-server.com --env API_KEY=\"your-api-key-here\" --header \"API_Key: ${API_KEY}\" 💡 Claude Code CLI Scope Options: --scope local (default): Available only to you in the current project · --scope project: Shared with everyone in the project via .mcp.json file · --scope user: Available to you across all projects · Note: This CLI command is for Claude Code (CLI), not Claude Desktop. For Claude Desktop, use the JSON configuration above. Before you connect Claude to your MCP server, ensure you have: Access to Claude (Claude Desktop).\n\n{ \"mcpServers\": { \"my-mcp-server\": { \"command\": \"npx\", \"args\": [ \"mcp-remote\", \"https://your-mcp-server.com\", \"--header\", \"API_Key: ${API_KEY}\" ], \"env\": { \"API_KEY\": \"your-api-key-here\" } } } } For Claude Code (CLI), you can add the MCP server using the Claude CLI command: ... claude mcp add --transport http --scope local my-mcp-server https://your-mcp-server.com --env API_KEY=\"your-api-key-here\" --header \"API_Key: ${API_KEY}\" ... Note: This CLI command is for Claude Code (CLI), not Claude Desktop. For Claude Desktop, use the JSON configuration above. Before you connect Claude to your MCP server, ensure you have: Access to Claude (Claude Desktop). ... A local MCP server generated with liblab CLI. A publicly deployed MCP server URL generated on your liblab dashboard. ... To learn more about how MCP works, visit the MCP Concept page. Use this method if your MCP server is deployed and accessible over the internet through an URL.\n\nIf you generated your MCP server using the liblab hosting service, use this option. Open Claude Desktop. In the settings, go to Developer and click Edit Config. This will open the claude_desktop_config.json file. Use the interactive configurator above to generate your configuration with proper authentication. Copy the generated JSON configuration and paste it into your claude_desktop_config.json file. For basic setups without authentication, you can use: ... { \"mcpServers\": { \"liblab\": { \"command\": \"npx\", \"args\": [ \"mcp-remote\", \"https://mcp.liblab.io/liblab\" ] } } } Save the file, close and reopen Claude Desktop to reload the configuration. Start a new chat and test your API integration. Use this method if you’re running the MCP server locally, generated from an OpenAPI spec using liblab CLI. ... If you haven’t yet generated your MCP server, follow the Generate an MCP Server with liblab CLI guide.\n\nModify claude_desktop_config.json to point to the local MCP server file path: ... { \"mcpServers\": { \"your-local-api\": { \"command\": \"node\", \"args\": [ \"<path-to-liblab-generated-mcp-server>/output/mcp/dist/index.js\" ], \"env\": { \"YOUR_API_KEY\": \"<your-api-key>\" } } } } ... Make sure to use the correct environment variable name expected by your API. Save the file and restart Claude Desktop. Open a new conversation and test the integration. To continue working with MCP and Claude, check out the following resources: ...\n... This displays the connection status of each MCP server, showing either “connected” or “failed” for each one. When you run the /mcp command inside Claude Code, you should see a status display like this: /mcp ⎿ MCP Server Status ⎿ ⎿ • server-fetch: connected ⎿ • ...\n\nMCP servers are designed to extend Claude Code’s capabilities through implicit usage. After installation, Claude should automatically detect when a query requires an MCP server’s functionality and use it appropriately. After installing MCP servers, you can verify they are registered in Claude’s configuration: ... server-time: Scope: User (available in all your projects) Type: stdio Command: uvx Args: mcp-server-time --local-timezone Australia/Sydney · You have several ways to verify your MCP servers are properly set up and connected: ... This shows registered servers but doesn’t confirm they connect successfully. ... This launches Claude with detailed MCP connection debugging information. ... This displays the connection status of each MCP server, showing either “connected” or “failed” for each one. When you run the /mcp command inside Claude Code, you should see a status display like this: /mcp ⎿ MCP Server Status ⎿ ⎿ • server-fetch: connected ⎿ • server-filesystem: connected ⎿ • serv\n\nRecently, Claude Code gained support for MCP servers, enabling integration with more specialised services like Stripe, Cloudflare, Supabase, Blender, and a whole lot more. This post demonstrates setting up some simple reference MCP servers. These servers won’t dramatically enhance Claude Code, since it already has built-in tools for filesystem, git, and web fetching. However, they serve as a gentle introduction to installing and configuring MCP servers without having to worry about overly-complex configuration. We can tackle more advanced integrations later in a future post. For more details about the Model Context Protocol, have a look at the official MCP website or the MCP servers GitHub repository. ... There are many types of MCP servers available, each providing different capabilities. You can explore available MCP servers at community directories like mcp.so and smithery.ai.\n\nWe are going to set up a few of these servers as a learning exercise. That said, Claude Code already has native capabilities for filesystem access, git operations, and basic web fetching. The real power of MCP comes when you integrate more specialised servers, which typically require API keys and more complex configuration so we’ll cover those in a future post. Setting up MCP servers with Claude Code is fairly simple: The best way to use MCP servers depends on the specific server type and your use-case. For local development, an “stdio” server will do fine. And, if you don’t want to mess with having many Docker containers running, most people will do fine with running them through uvx (for Python) or npx (for Node.js). For the purposes of this post we’ll be sticking with local and simple. To set up the reference MCP servers to run via uvx and npx, follow these steps…\n\nHow to install and configure Model Context Protocol (MCP) servers to extend Claude Code's capabilities\nOnce your authentication is configured, you can add the MCP server to Claude Code using the following command: Replace [tenant] with your tenant name. For example: If your SailPoint URL is https://acme.identitynow.com, use acme · Full URL would ...\n\nStep-by-step guide to integrate your MCP Server with Claude Code for terminal-based development workflows\n\nIf the connection is successful, you should see sailpoint-mcp listed among your active MCP servers, confirming that the setup was completed correctly. You can now ask Claude Code questions like \"What can I request access to?” or “What is the status of my access request?” or “Cancel access request XYZ” · For more information about the tools, refer to the SailPoint MCP tool documentation.\n\nOnce your authentication is configured, you can add the MCP server to Claude Code using the following command: Replace [tenant] with your tenant name. For example: If your SailPoint URL is https://acme.identitynow.com, use acme · Full URL would be: https://acme.api.identitynow.com/v2025/access-requests/mcp · claude mcp add-json sailpoint-mcp '{\"type\":\"stdio\",\"command\":\"npx\",\"args\":[\"mcp-remote@latest\",\"https://[tenant].api.cloud.sailpoint.com/v2025/access-requests/mcp\",\"--header\",\"Authorization: Bearer ${AUTH_TOKEN}\"]}' The --scope flag is an optional parameter that controls which projects or directories have access to your MCP server. For detailed information about MCP installation scopes and when to use them, see the MCP Installation Scopes documentation. ... Claude will attempt to establish a connection to all configured MCP servers. Upon successful connection, you can: ...\nThis means the server will be available only to you inside your current folder (private to you in this project). ... claude mcp add digitalocean-mcp-local \\ -e DIGITALOCEAN_API_TOKEN=YOUR_DO_API_TOKEN \\ -- npx &quot;@digitalocean/mcp&quot; ... You should see digitalocean-mcp-local listed.\n\nThe MCP server needs permission to interact with your DigitalOcean account. To do that, you’ll need a personal access token with App Platform access. ... If you haven’t already installed Claude Code, follow the instructions here to set it up. ... Let’s add the DigitalOcean MCP server using the default scope—which is local. This means the server will be available only to you inside your current folder (private to you in this project). ... claude mcp add digitalocean-mcp-local \\ -e DIGITALOCEAN_API_TOKEN=YOUR_DO_API_TOKEN \\ -- npx \"@digitalocean/mcp\" ... You should see digitalocean-mcp-local listed. ... If you don’t see it, or if something went wrong, double-check your token and make sure Claude Code is installed correctly. ... Claude will ask you to approve the tool call. Say yes, and watch it go to work. You now have Claude Code wired up to your DigitalOcean account using the MCP server.\n\nLearn how to locally set up Claude Code with the new DigitalOcean MCP Server and make it easier to deploy apps with context.\n\nLast week, we announced the new DigitalOcean MCP Server - a tool that connects Claude Desktop (or IDEs like Cursor, or Windsurf) to your DigitalOcean account so it can actually do things: deploy apps, fetch logs, restart services, and more. In this post, we’ll walk through how to set it up with Claude Code - Anthropic’s terminal-based CLI. Claude Code runs locally in your terminal and has access to your current project folder, which makes it perfect for things like deploying apps with context using MCP servers. Note: If you’re new to MCP and wondering what this all unlocks, check out our high-level intro: MCP 101: An Introduction to Model Context Protocol, and MCP Server in Python — Everything I Wish I’d Known on Day One. We’ll set up the server using the default (local) scope, verify it’s working, and run our first natural language prompt.\n\nThe video shows how to do it in Cursor, but everything you see there works exactly the same in Claude Code. The MCP server and tool calls are identical. For a complete list of tools and capabilities of the DigitalOcean MCP server, check out DigitalOcean MCP Server on GitHub. From Prompt to App in Minutes - Introducing the DigitalOcean MCP Server · MCP 101: An Introduction to Model Context Protocol · MCP Server in Python — Everything I Wish I’d Known on Day One ... Thanks for learning with the DigitalOcean Community. Check out our offerings for compute, storage, networking, and managed databases. ... Amit is a Developer Advocate at DigitalOcean 🐳, where he helps developers build and ship better apps on the cloud. Compulsive Seinfeld quoter. LEGO nerd. 🧱 AMA. ... This textbox defaults to using Markdown to format your answer. You can type !ref in this text area to quickly search our full set of tutorials, documentation & marketplace offerings and insert the link!\n<system>You only have 19 searches left this turn</system>"

