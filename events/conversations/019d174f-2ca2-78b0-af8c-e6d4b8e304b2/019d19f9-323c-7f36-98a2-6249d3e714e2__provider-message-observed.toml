text = "The error is because **Mermaid does not support arrows written as `<--|label|`**.  \nLabels can only appear **in the direction the arrow is defined**, so Mermaid expects:\n\n```\nA -->|label| B\n```\n\nnot\n\n```\nA <--|label| B\n```\n\nWhen you want the arrow to point the other way, you **reverse the node order**.\n\nSo this line:\n\n```\nEXTSYS[Payment Gateway] <--|call| SAGA\n```\n\nmust be written as:\n\n```\nSAGA -->|call| EXTSYS[Payment Gateway]\n```\n\n---\n\n## Corrected full diagram\n\n```mermaid\ngraph LR\n  UI[UI: Order screen] -->|submit| CMD[Command: PlaceOrder]\n  CMD -->|produces| EVT[Event: OrderPlaced]\n\n  EVT --> PRJ[Projection: OrdersList]\n  EVT --> SAGA[Policy: PaymentSaga]\n\n  SAGA -->|issues| CMD2[Command: ChargeCard]\n\n  EVT -->|append| ES[EventStore]\n  ES --> PRJ\n\n  EVT --> ANALYTICS[Analytics]\n\n  SAGA -->|call| EXTSYS[Payment Gateway]\n```\n\n---\n\n## Small Mermaid trick that helps a lot\n\nIf you want **bidirectional relationships**, Mermaid prefers:\n\n```\nA <-->|sync| B\n```\n\nExample:\n\n```\nUI <-->|reads| PRJ\n```\n\nBut when using **labels**, you generally need to **orient the arrow forward** and reverse the node order.\n\n---\n\nIf you want, I can also show you a **Mermaid layout trick that lets you represent event modeling columns** (commands/events/projections stacked vertically like Adam Dymitruk diagrams). That one is very useful for your **graph-based event model idea**."

