text = "Good catch. The arrow direction there is ambiguous and likely **wrong for the meaning**.\n\nIn Mermaid, this:\n\n```\nEXTSYS[Payment Gateway] <--|call| SAGA\n```\n\nmeans the arrow **points toward `EXTSYS`**, so it reads:\n\n> SAGA → calls → Payment Gateway\n\nThat is technically correct if the saga is **calling the external system**, but the syntax is easy to misread because the arrow is written backwards.\n\nA clearer way is to keep arrows flowing **left → right consistently**.\n\n### Better version\n\n```\nSAGA[Policy: PaymentSaga] -->|call| EXTSYS[Payment Gateway]\n```\n\nMeaning:\n\n```\nPaymentSaga → calls → Payment Gateway\n```\n\n### If you want to model the full interaction\n\nYou might show both directions:\n\n```\nSAGA -->|call| EXTSYS\nEXTSYS -->|response/event| EVT2[PaymentAuthorized]\nEVT2 --> PRJ\n```\n\nSo the flow becomes:\n\n1. Event occurs  \n2. Policy reacts  \n3. Policy calls external system  \n4. External system returns result  \n5. Result becomes an event\n\n### Conceptually in the graph\n\n```\nEvent → Policy/Saga → External System\nExternal System → Event\n```\n\nWhich is very consistent with your **event graph idea**.\n\n### One thing that fits your Nexus thinking\n\nExternal systems are **just nodes in the graph**, but they live **outside the domain boundary**.\n\nSo visually you could even mark them:\n\n```\nsubgraph External\n  EXTSYS[Payment Gateway]\nend\n```\n\n---\n\nIf you'd like, I can also show you something **very interesting for your work**:\n\nHow **Adam Dymitruk–style Event Modeling actually maps almost perfectly to a typed graph**, which means your idea that *“an event model is a graph”* is not just philosophical — it can literally become a **graph schema**. That opens the door to some powerful tooling."

