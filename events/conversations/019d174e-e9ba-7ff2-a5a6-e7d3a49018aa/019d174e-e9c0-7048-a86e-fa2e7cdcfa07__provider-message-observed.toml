 Data Sharing \\u0026 Analytics\\n   141\\tmodel: Opt-in only\\n   142\\thandling: Private data redacted (not just anonymized)\\n   143\\tusage:\\n   144\\t  - Development insights (helps improve software)\\n   145\\t  - Community datasets (shared resources for all)\\n   146\\tnever: Sold or used for marketing\\n   147\\t\\n   148\\tcommunity_data:\\n   149\\t  access_model: Reciprocal (use if you also contribute)\\n   150\\t  example: LaundryLog location database\\n   151\\t\\n   152\\t### Influence System\\n   153\\tframework: All contributions involve time, expertise, knowledge, money, and motivation\\n   154\\t\\n   155\\tearning_influence:\\n   156\\t  expertise:\\n   157\\t    value: Often MORE valuable than cash\\n   158\\t    examples: [Accounting, bookkeeping, legal advice, technical knowledge, tax expertise]\\n   159\\t  \\n   160\\t  knowledge:\\n   161\\t    examples: [Domain expertise in finance, taxes, business, networking]\\n   162\\t  \\n   163\\t  time:\\n   164\\t    examples: [Code contributions, documentation, helping users in forums]\\n   165\\t  \\n   166\\t  resources:\\n   167\\t    examples: [Financial gifts, sponsorships]\\n   168\\t\\n   169\\tmotivation_factor: What motivates IvanTheGeek to prioritize work\\n   170\\tinfluence_affects: Priority given to feature requests and support\\n   171\\t\\n   172\\trequest_scenarios:\\n   173\\t  low_influence:\\n   174\\t    pattern: \\u0022I want feature X\\u0022\\n   175\\t    no_history: true\\n   176\\t    effort: Minimal\\n   177\\t    outcome: Likely ignored unless personally appealing\\n   178\\t  \\n   179\\t  medium_influence:\\n   180\\t    pattern: Active forum participation\\n   181\\t    helping_others: true\\n   182\\t    earned_credit: true\\n   183\\t    outcome: Gets serious consideration\\n   184\\t  \\n   185\\t  high_influence:\\n   186\\t    pattern: Detailed feature request with mockups\\n   187\\t    includes:\\n   188\\t      - Visual mockups (hand-drawn is fine!)\\n   189\\t      - Use case explanation (the \\u0022why\\u0022)\\n   190\\t      - Expected benefits\\n   191\\t      - Chronological flow\\n   192\\t    outcome: Much higher chance of incorporation\\n   193\\t\\n   194\\tmockup_guidelines:\\n   195\\t  fidelity_matters: false\\n   196\\t  equally_valuable: [Penpot prototypes, hand-drawn sketches, napkin drawings, whiteboard photos]\\n   197\\t  what_matters: [Understanding the need, flow and sequence, clear communication]\\n   198\\t  goal: Build the right thing by understanding what, how, and why\\n   199\\t\\n   200\\t### Funding Models\\n   201\\tprinciple: Maximum freedom \\u002B practical capitalism\\n   202\\tsoftware: Always free\\n   203\\tservices: May have costs\\n   204\\t\\n   205\\tmechanisms:\\n   206\\t  paid_services:\\n   207\\t    model: Fee for convenience\\n   208\\t    examples: [Managed hosting, premium features]\\n   209\\t    payment_for: Service and convenience, not software\\n   210\\t  \\n   211\\t  business_sponsorships:\\n   212\\t    category: Advertising expense/income\\n   213\\t    business_benefit: Tax-deductible advertising expense\\n   214\\t    developer_benefit: Advertising income through micro-business\\n   215\\t    both_benefit: Avoids sales tax\\n   216\\t    influence: Significant\\n   217\\t  \\n   218\\t  personal_gifts:\\n   219\\t    limit_2025: $19000 (IRS annual gift tax exclusion)\\n   220\\t    definition: Transfer without full compensation received\\n   221\\t    tax_treatment_giver: No filing required under limit\\n   222\\t    tax_treatment_receiver: Not taxable income\\n   223\\t    influence: Yes\\n   224\\t    obligation: None (it\\u0027s a gift, developer chooses usage)\\n   225\\t\\n   226\\thosting_options:\\n   227\\t  - provided_cloud: May have fees\\n   228\\t  - self_host: Free, user runs server software\\n   229\\t  - no_cloud: All apps work locally/offline\\n   230\\t\\n   231\\t### Technical Approach\\n   232\\tprimary_language: F# (type-safe, functional, practical)\\n   233\\tflexibility: Use what works best (pragmatism over dogma)\\n   234\\t\\n   235\\tdeployment_options:\\n   236\\t  - Desktop apps\\n   237\\t  - Mobile apps\\n   238\\t  - Server deployments\\n   239\\t  - Cloud hosting\\n   240\\t\\n   241\\tdata_import:\\n   242\\t  manual_import: Free\\n   243\\t  direct_api: Free (when vendor provides)\\n   244\\t  automated_services: Optional, may use paid services (e.g., Plaid)\\n   245\\t\\n   246\\ttax_focus: US (primary need)\\n   247\\tinternational: Community can contribute\\n   248\\t\\n   249\\t## BRAND GUIDELINES\\n   250\\t\\n   251\\t### Cheddar Brand\\n   252\\ttheme: Orange/cheese colors (warm, friendly, approachable)\\n   253\\tname_meaning: Slang for money \\u002B friendly/familiar\\n   254\\ttone: Approachable, no jargon\\n   255\\t\\n   256\\tmascots:\\n   257\\t  CheddarCat:\\n   258\\t    role: Guidance and tips\\n   259\\t    style: Cartoon orange cat\\n   260\\t  \\n   261\\t  CheddarBot:\\n   262\\t    role: Automation and AI features\\n   263\\t    style: Robot version of cat\\n   264\\t\\n   265\\tcolor_palette:\\n   266\\t  primary: Muted/peachy orange (#ffcc80, #ffb74d range)\\n   267\\t  avoid: Deep/bright orange (too intense)\\n   268\\t  accent: Cheese-themed variations\\n   269\\t\\n   270\\tgoal: Make financial management feel less daunting\\n   271\\t\\n   272\\t### FnTools Brand\\n   273\\tfocus: Technical, developer-oriented\\n   274\\ttone: Professional but approachable\\n   275\\temphasis: Freedom and control\\n   276\\t\\n   277\\t## DEVELOPMENT APPROACH\\n   278\\t\\n   279\\tmethodology: Building in public\\n   280\\ttransparency: Development visible to all\\n   281\\tcommunity: Feedback and contributions welcome\\n   282\\titeration: Real-world testing, continuous refinement\\n   283\\t\\n   284\\tlearning_sharing: Development journey becomes documentation\\n   285\\t\\n   286\\tparticipation_methods:\\n   287\\t  - Use apps and provide feedback\\n   288\\t  - Contribute code\\n   289\\t  - Write documentation\\n   290\\t  - Create designs/mockups (any fidelity)\\n   291\\t  - Share expertise\\n   292\\t  - Write articles/tutorials\\n   293\\t  - Help users in forums\\n   294\\t  - Fund development (gifts/sponsorships)\\n   295\\t  - Share analytics (opt-in)\\n   296\\t  - Participate in community features\\n   297\\t\\n   298\\tparticipation_level: User decides their involvement\\n   299\\t\\n   300\\ttimeline: Long view\\n   301\\tcharacteristics: [Sustainable, incremental, patient, honest]\\n   302\\tfocus: Solving real problems, not chasing trends\\n   303\\tgrowth: Organic, driven by real use and needs\\n   304\\t\\n   305\\t## DECISION TREES\\n   306\\t\\n   307\\t### When to use mobile-first design:\\n   308\\tIF primary_use_case == \\u0022on_the_go\\u0022 THEN mobile_first\\n   309\\tIF primary_input == \\u0022touch\\u0022 THEN mobile_first\\n   310\\tIF screen_space == \\u0022limited_by_task\\u0022 THEN mobile_first\\n   311\\tELSE desktop_first OR responsive\\n   312\\t\\n   313\\t### When to offer cloud sync:\\n   314\\tALWAYS offer as option\\n   315\\tALWAYS provide self-host alternative\\n   316\\tALWAYS allow local-only usage\\n   317\\tNEVER require cloud\\n   318\\t\\n   319\\t### When to prioritize feature request:\\n   320\\tIF influence_score == \\u0022high\\u0022 AND request_detail == \\u0022thorough\\u0022 THEN high_priority\\n   321\\tIF influence_score == \\u0022medium\\u0022 AND request_detail == \\u0022good\\u0022 THEN medium_priority\\n   322\\tIF influence_score == \\u0022low\\u0022 OR request_detail == \\u0022vague\\u0022 THEN low_priority\\n   323\\tUNLESS personally_appealing == true THEN reconsider\\n   324\\t\\n   325\\t### When to charge fees:\\n   326\\tIF service == \\u0022managed_hosting\\u0022 THEN may_charge\\n   327\\tIF service == \\u0022convenience_feature\\u0022 THEN may_charge\\n   328\\tIF software_itself THEN never_charge\\n   329\\tIF self_hostable_alternative_exists THEN acceptable_to_charge_for_managed\\n   330\\t\\n   331\\t## CONSTRAINTS \\u0026 REQUIREMENTS\\n   332\\t\\n   333\\t### Must Always:\\n   334\\t- Respect user privacy\\n   335\\t- Provide local-first option\\n   336\\t- Allow data export\\n   337\\t- Use open source license\\n   338\\t- Give user control over their data\\n   339\\t- Support offline usage\\n   340\\t- Make cloud optional\\n   341\\t- Provide self-host alternative\\n   342\\t- Design for actual use case\\n   343\\t- Build in public\\n   344\\t- Document decisions\\n   345\\t\\n   346\\t### Must Never:\\n   347\\t- Sell user data\\n   348\\t- Require cloud services\\n   349\\t- Lock in users\\n   350\\t- Use deceptive UX practices\\n   351\\t- Charge for software itself\\n   352\\t- Hide costs or features\\n   353\\t- Ignore high-influence contributors\\n   354\\t- Sacrifice quality for speed\\n   355\\t- Build features that don\\u0027t solve real problems\\n   356\\t\\n   357\\t### Should Prefer:\\n   358\\t- Simple over complex\\n   359\\t- Local over cloud (but support both)\\n   360\\t- Free over paid (unless service justifies cost)\\n   361\\t- Open standards over proprietary\\n   362\\t- User control over developer control\\n   363\\t- Practical over ideological\\n   364\\t- Tested over theoretical\\n   365\\t\\n   366\\t## PROJECT-SPECIFIC NOTES\\n   367\\t\\n   368\\tQuickBooks_frustration: Paying for 4 micro businesses is unsustainable and exploitative\\n   369\\tinternet_gratitude: Benefited from free information since 1994, now giving back\\n   370\\teducation_goal: Help others learn what was hard for me to learn\\n   371\\tcommunity_value: Shared datasets help everyone when voluntarily contributed\\n   372\\tinfluence_is_fair: Contribution earns prioritization, free-riding gets ignored\\n   373\\t\\n   374\\t## USAGE NOTES FOR AI ASSISTANTS\\n   375\\t\\n   376\\tWhen working on IvanTheGeek projects:\\n   377\\t1. Check which ecosystem (Cheddar or FnTools)\\n   378\\t2. Apply relevant principles and constraints\\n   379\\t3. Consider target audience\\n   380\\t4. Follow brand guidelines\\n   381\\t5. Design for appropriate platform (mobile/desktop)\\n   382\\t6. Always provide local-first option\\n   383\\t7. Consider influence system implications\\n   384\\t8. Maintain consistency with existing apps\\n   385\\t9. Reference education resources where helpful\\n   386\\t10. Build what\\u0027s actually needed, not what\\u0027s theoretically interesting\\n   387\\t\\n   388\\tWhen uncertain: Ask for clarification rather than assume.\\n   389\\tWhen conflicting requirements: Favor user freedom and privacy.\\n   390\\tWhen designing UX: Think thumb-friendly, intuitive, no dark patterns.\\n   391\\tWhen considering features: Ask \\u0022does this solve a real problem?\\u0022\\n   392\\t\",\"uuid\":\"f7b183f6-f1d1-406f-bcc8-b00ac981e542\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":{\"type\":\"json_block\",\"json_block\":\"{\\u0022language\\u0022: \\u0022yaml\\u0022, \\u0022code\\u0022: \\u0022# IvanTheGeek Development Reference\\\\n# Structured guide for AI assistants working on IvanTheGeek projects\\\\n# Version: 1.0\\\\n\\\\n## IDENTITY\\\\ndeveloper: IvanTheGeek\\\\nphilosophy: Build what I actually need to use\\\\napproach: Open source, privacy-first, practical capitalism\\\\nbuilding_method: In public, iteratively, community-driven\\\\n\\\\n## ECOSYSTEMS\\\\n\\\\n### Cheddar (Financial \\u0026 Business Tools)\\\\npurpose: Comprehensive financial management for personal and business use\\\\ntarget_users:\\\\n  - Hobbyists with side income\\\\n  - Solopreneurs\\\\n  - Micro businesses (0-5 employees)\\\\n  - Small businesses\\\\n  - Independent contractors (truckers, freelancers)\\\\n  - Families managing household finances\\\\n  - Anyone frustrated with expensive subscription software\\\\n\\\\napps:\\\\n  CheddarBooks:\\\\n    type: Business accounting system\\\\n    competitor_to: [QuickBooks, Xero]\\\\n    target: Side hustles, micro businesses, small businesses\\\\n  \\\\n  Cheddar Money/Cash:\\\\n    type: Personal finance management\\\\n    features: [paycheck tracking, spending, net worth, budgeting]\\\\n  \\\\n  LaundryLog:\\\\n    type: Expense tracker for professional drivers\\\\n    problem_solved: No receipts for laundry machines\\\\n    design_priority: Mobile-first\\\\n  \\\\n  Cheddar Kitchen:\\\\n    type: Grocery and food inventory tracker\\\\n  \\\\n  Cheddar Shopping:\\\\n    type: Product price comparison across stores\\\\n  \\\\n  Cheddar Recipes:\\\\n    type: Recipe storage and meal planning\\\\n  \\\\n  Cheddar Menu/Restaurant:\\\\n    type: Point-of-sale system\\\\n  \\\\n  Cheddar Trade:\\\\n    type: Broker interface for stock/ETF trading\\\\n    integrates_with: Schwab API\\\\n  \\\\n  Cheddar Tax:\\\\n    type: Real-time tax calculation (US)\\\\n    scope: [Personal, Business]\\\\n  \\\\n  Cheddar Legal:\\\\n    type: Business compliance tracking\\\\n    features: [Formation docs, stock ledgers, annual reporting]\\\\n\\\\neducation:\\\\n  PersonalFinance.Exposed:\\\\n    focus: Personal finance education\\\\n  \\\\n  accounting.exposed:\\\\n    focus: Accounting and business finance education\\\\n  \\\\n  purpose: Give back (benefited from internet since 1994)\\\\n  goals: [Self-help, understanding, self-sufficiency, independence, profitability]\\\\n  integration: Linked directly from apps for contextual learning\\\\n\\\\n### FnTools (Developer \\u0026 Technical Tools)\\\\npurpose: Technical infrastructure and developer utilities\\\\ntarget_users:\\\\n  - Developers\\\\n  - System administrators\\\\n  - Network administrators\\\\n  - Technical users wanting control\\\\n\\\\ntools:\\\\n  - MCP servers\\\\n  - Email servers\\\\n  - DNS servers\\\\n  - API libraries\\\\n  - Networking tools (OpenWRT focus - making it easier to use)\\\\n  - Other technical utilities\\\\n\\\\n## CORE PRINCIPLES\\\\n\\\\n### Open Source\\\\nlicense: AGPLv3 (or as appropriate)\\\\ncost: Free (as in beer and freedom)\\\\nsource_access: Always available\\\\nmodification: User can modify as they wish\\\\nownership: User owns their copy forever\\\\n\\\\nmotivation:\\\\n  personal: Paying QuickBooks for 4 micro businesses is unsustainable\\\\n  strategic: AGPLv3 prevents big companies from creating proprietary lock-in\\\\n  goal: Create viable alternative to subscription exploitation\\\\n\\\\n### Privacy \\u0026 Data Ownership\\\\nprimary_rule: Your data belongs to you\\\\nstorage_default: Local-first (on user\\u0027s device)\\\\nexport: Always available in open formats\\\\noffline: Fully functional without internet\\\\n\\\\ncloud_sync_options:\\\\n  - provided_servers: Convenient, managed, may have fees\\\\n  - self_host: Run your own server, complete privacy, free\\\\n  - local_only: Stay entirely offline\\\\n\\\\ndecision_authority: User decides where data lives and who accesses it\\\\n\\\\n### User Experience\\\\npriority: Critical, not an afterthought\\\\ninspiration_negative: [McDonald\\u0027s app, QuickBooks] # Examples of bad UX\\\\ninspiration_positive: Framework laptops\\\\n\\\\nprinciples:\\\\n  - Intuitive interfaces respecting user intelligence\\\\n  - Design appropriate to use case (mobile-first where it makes sense)\\\\n  - Large thumb-friendly controls for mobile experiences\\\\n  - Fast and responsive\\\\n  - Pleasant to use\\\\n  - No deceptive or manipulative design practices\\\\n\\\\nmobile_first_when:\\\\n  - Primary use case is on-the-go (e.g., LaundryLog)\\\\n  - Touch interaction is primary input method\\\\n  - Screen space is limited by nature of task\\\\n\\\\ndesktop_first_when:\\\\n  - Complex data entry or analysis (e.g., CheddarBooks)\\\\n  - Multiple windows/views needed\\\\n  - Keyboard input is primary\\\\n\\\\n### Data Sharing \\u0026 Analytics\\\\nmodel: Opt-in only\\\\nhandling: Private data redacted (not just anonymized)\\\\nusage:\\\\n  - Development insights (helps improve software)\\\\n  - Community datasets (shared resources for all)\\\\nnever: Sold or used for marketing\\\\n\\\\ncommunity_data:\\\\n  access_model: Reciprocal (use if you also contribute)\\\\n  example: LaundryLog location database\\\\n\\\\n### Influence System\\\\nframework: All contributions involve time, expertise, knowledge, money, and motivation\\\\n\\\\nearning_influence:\\\\n  expertise:\\\\n    value: Often MORE valuable than cash\\\\n    examples: [Accounting, bookkeeping, legal advice, technical knowledge, tax expertise]\\\\n  \\\\n  knowledge:\\\\n    examples: [Domain expertise in finance, taxes, business, networking]\\\\n  \\\\n  time:\\\\n    examples: [Code contributions, documentation, helping users in forums]\\\\n  \\\\n  resources:\\\\n    examples: [Financial gifts, sponsorships]\\\\n\\\\nmotivation_factor: What motivates IvanTheGeek to prioritize work\\\\ninfluence_affects: Priority given to feature requests and support\\\\n\\\\nrequest_scenarios:\\\\n  low_influence:\\\\n    pattern: \\\\\\u0022I want feature X\\\\\\u0022\\\\n    no_history: true\\\\n    effort: Minimal\\\\n    outcome: Likely ignored unless personally appealing\\\\n  \\\\n  medium_influence:\\\\n    pattern: Active forum participation\\\\n    helping_others: true\\\\n    earned_credit: true\\\\n    outcome: Gets serious consideration\\\\n  \\\\n  high_influence:\\\\n    pattern: Detailed feature request with mockups\\\\n    includes:\\\\n      - Visual mockups (hand-drawn is fine!)\\\\n      - Use case explanation (the \\\\\\u0022why\\\\\\u0022)\\\\n      - Expected benefits\\\\n      - Chronological flow\\\\n    outcome: Much higher chance of incorporation\\\\n\\\\nmockup_guidelines:\\\\n  fidelity_matters: false\\\\n  equally_valuable: [Penpot prototypes, hand-drawn sketches, napkin drawings, whiteboard photos]\\\\n  what_matters: [Understanding the need, flow and sequence, clear communication]\\\\n  goal: Build the right thing by understanding what, how, and why\\\\n\\\\n### Funding Models\\\\nprinciple: Maximum freedom \\u002B practical capitalism\\\\nsoftware: Always free\\\\nservices: May have costs\\\\n\\\\nmechanisms:\\\\n  paid_services:\\\\n    model: Fee for convenience\\\\n    examples: [Managed hosting, premium features]\\\\n    payment_for: Service and convenience, not software\\\\n  \\\\n  business_sponsorships:\\\\n    category: Advertising expense/income\\\\n    business_benefit: Tax-deductible advertising expense\\\\n    developer_benefit: Advertising income through micro-business\\\\n    both_benefit: Avoids sales tax\\\\n    influence: Significant\\\\n  \\\\n  personal_gifts:\\\\n    limit_2025: $19000 (IRS annual gift tax exclusion)\\\\n    definition: Transfer without full compensation received\\\\n    tax_treatment_giver: No filing required under limit\\\\n    tax_treatment_receiver: Not taxable income\\\\n    influence: Yes\\\\n    obligation: None (it\\u0027s a gift, developer chooses usage)\\\\n\\\\nhosting_options:\\\\n  - provided_cloud: May have fees\\\\n  - self_host: Free, user runs server software\\\\n  - no_cloud: All apps work locally/offline\\\\n\\\\n### Technical Approach\\\\nprimary_language: F# (type-safe, functional, practical)\\\\nflexibility: Use what works best (pragmatism over dogma)\\\\n\\\\ndeployment_options:\\\\n  - Desktop apps\\\\n  - Mobile apps\\\\n  - Server deployments\\\\n  - Cloud hosting\\\\n\\\\ndata_import:\\\\n  manual_import: Free\\\\n  direct_api: Free (when vendor provides)\\\\n  automated_services: Optional, may use paid services (e.g., Plaid)\\\\n\\\\ntax_focus: US (primary need)\\\\ninternational: Community can contribute\\\\n\\\\n## BRAND GUIDELINES\\\\n\\\\n### Cheddar Brand\\\\ntheme: Orange/cheese colors (warm, friendly, approachable)\\\\nname_meaning: Slang for money \\u002B friendly/familiar\\\\ntone: Approachable, no jargon\\\\n\\\\nmascots:\\\\n  CheddarCat:\\\\n    role: Guidance and tips\\\\n    style: Cartoon orange cat\\\\n  \\\\n  CheddarBot:\\\\n    role: Automation and AI features\\\\n    style: Robot version of cat\\\\n\\\\ncolor_palette:\\\\n  primary: Muted/peachy orange (#ffcc80, #ffb74d range)\\\\n  avoid: Deep/bright orange (too intense)\\\\n  accent: Cheese-themed variations\\\\n\\\\ngoal: Make financial management feel less daunting\\\\n\\\\n### FnTools Brand\\\\nfocus: Technical, developer-oriented\\\\ntone: Professional but approachable\\\\nemphasis: Freedom and control\\\\n\\\\n## DEVELOPMENT APPROACH\\\\n\\\\nmethodology: Building in public\\\\ntransparency: Development visible to all\\\\ncommunity: Feedback and contributions welcome\\\\niteration: Real-world testing, continuous refinement\\\\n\\\\nlearning_sharing: Development journey becomes documentation\\\\n\\\\nparticipation_methods:\\\\n  - Use apps and provide feedback\\\\n  - Contribute code\\\\n  - Write documentation\\\\n  - Create designs/mockups (any fidelity)\\\\n  - Share expertise\\\\n  - Write articles/tutorials\\\\n  - Help users in forums\\\\n  - Fund development (gifts/sponsorships)\\\\n  - Share analytics (opt-in)\\\\n  - Participate in community features\\\\n\\\\nparticipation_level: User decides their involvement\\\\n\\\\ntimeline: Long view\\\\ncharacteristics: [Sustainable, incremental, patient, honest]\\\\nfocus: Solving real problems, not chasing trends\\\\ngrowth: Organic, driven by real use and needs\\\\n\\\\n## DECISION TREES\\\\n\\\\n### When to use mobile-first design:\\\\nIF primary_use_case == \\\\\\u0022on_the_go\\\\\\u0022 THEN mobile_first\\\\nIF primary_input == \\\\\\u0022touch\\\\\\u0022 THEN mobile_first\\\\nIF screen_space == \\\\\\u0022limited_by_task\\\\\\u0022 THEN mobile_first\\\\nELSE desktop_first OR responsive\\\\n\\\\n### When to offer cloud sync:\\\\nALWAYS offer as option\\\\nALWAYS provide self-host alternative\\\\nALWAYS allow local-only usage\\\\nNEVER require cloud\\\\n\\\\n### When to prioritize feature request:\\\\nIF influence_score == \\\\\\u0022high\\\\\\u0022 AND request_detail == \\\\\\u0022thorough\\\\\\u0022 THEN high_priority\\\\nIF influence_score == \\\\\\u0022medium\\\\\\u0022 AND request_detail == \\\\\\u0022good\\\\\\u0022 THEN medium_priority\\\\nIF influence_score == \\\\\\u0022low\\\\\\u0022 OR request_detail == \\\\\\u0022vague\\\\\\u0022 THEN low_priority\\\\nUNLESS personally_appealing == true THEN reconsider\\\\n\\\\n### When to charge fees:\\\\nIF service == \\\\\\u0022managed_hosting\\\\\\u0022 THEN may_charge\\\\nIF service == \\\\\\u0022convenience_feature\\\\\\u0022 THEN may_charge\\\\nIF software_itself THEN never_charge\\\\nIF self_hostable_alternative_exists THEN acceptable_to_charge_for_managed\\\\n\\\\n## CONSTRAINTS \\u0026 REQUIREMENTS\\\\n\\\\n### Must Always:\\\\n- Respect user privacy\\\\n- Provide local-first option\\\\n- Allow data export\\\\n- Use open source license\\\\n- Give user control over their data\\\\n- Support offline usage\\\\n- Make cloud optional\\\\n- Provide self-host alternative\\\\n- Design for actual use case\\\\n- Build in public\\\\n- Document decisions\\\\n\\\\n### Must Never:\\\\n- Sell user data\\\\n- Require cloud services\\\\n- Lock in users\\\\n- Use deceptive UX practices\\\\n- Charge for software itself\\\\n- Hide costs or features\\\\n- Ignore high-influence contributors\\\\n- Sacrifice quality for speed\\\\n- Build features that don\\u0027t solve real problems\\\\n\\\\n### Should Prefer:\\\\n- Simple over complex\\\\n- Local over cloud (but support both)\\\\n- Free over paid (unless service justifies cost)\\\\n- Open standards over proprietary\\\\n- User control over developer control\\\\n- Practical over ideological\\\\n- Tested over theoretical\\\\n\\\\n## PROJECT-SPECIFIC NOTES\\\\n\\\\nQuickBooks_frustration: Paying for 4 micro businesses is unsustainable and exploitative\\\\ninternet_gratitude: Benefited from free information since 1994, now giving back\\\\neducation_goal: Help others learn what was hard for me to learn\\\\ncommunity_value: Shared datasets help everyone when voluntarily contributed\\\\ninfluence_is_fair: Contribution earns prioritization, free-riding gets ignored\\\\n\\\\n## USAGE NOTES FOR AI ASSISTANTS\\\\n\\\\nWhen working on IvanTheGeek projects:\\\\n1. Check which ecosystem (Cheddar or FnTools)\\\\n2. Apply relevant principles and constraints\\\\n3. Consider target audience\\\\n4. Follow brand guidelines\\\\n5. Design for appropriate platform (mobile/desktop)\\\\n6. Always provide local-first option\\\\n7. Consider influence system implications\\\\n8. Maintain consistency with existing apps\\\\n9. Reference education resources where helpful\\\\n10. Build what\\u0027s actually needed, not what\\u0027s theoretically interesting\\\\n\\\\nWhen uncertain: Ask for clarification rather than assume.\\\\nWhen conflicting requirements: Favor user freedom and privacy.\\\\nWhen designing UX: Think thumb-friendly, intuitive, no dark patterns.\\\\nWhen considering features: Ask \\\\\\u0022does this solve a real problem?\\\\\\u0022\\\\n\\u0022, \\u0022filename\\u0022: \\u0022/mnt/project/ivanthegeek-reference.yaml\\u0022}\"}}"

