n git\\n    28\\t  - Build process transforms to MCP Resources\\n    29\\t  \\n    30\\t- **Phase 2 (Interim)**: Existing forum software\\n    31\\t  - Evaluating: Talkyard, Discourse, Forem\\n    32\\t  - Self-hosted with data portability\\n    33\\t  - MCP reads via API (always fresh)\\n    34\\t  \\n    35\\t- **Phase 3 (Future)**: Custom event-sourced forum\\n    36\\t  - Event log replaces git for version history\\n    37\\t  - Custom deep threading (better than existing solutions)\\n    38\\t  - Tight EMapp integration\\n    39\\t\\n    40\\t**Forum Functions:**\\n    41\\t- **Wiki/Documentation**: Source for MCP Resources, app specifications\\n    42\\t- **Community Q\\u0026A**: Support and knowledge sharing\\n    43\\t- **Feature Requests**: Integrated with influence system voting\\n    44\\t- **Path Refinement**: Community discusses and improves paths\\n    45\\t- **Event Model Validation**: Peer review and feedback\\n    46\\t- **Given-When-Then Catalog**: Organized test scenarios\\n    47\\t\\n    48\\t**Integration Points:**\\n    49\\t- MCP server reads forum content as Resources\\n    50\\t- EMapp can reference forum discussions\\n    51\\t- Penpot designs link to forum specs\\n    52\\t- GWT scenarios stored/organized in forum\\n    53\\t\\n    54\\t#### FnMCP.IvanTheGeekDevFramework\\n    55\\tThe central MCP server that provides:\\n    56\\t- **Tools**: Actions (Penpot manipulation, Event Model updates, code generation, path extraction)\\n    57\\t- **Resources**: Dynamic project state \\u002B static methodology from forum/markdown\\n    58\\t- **Prompts**: Interactive workflows for common development tasks\\n    59\\t\\n    60\\t**Content Provider Abstraction:**\\n    61\\t\\u0060\\u0060\\u0060fsharp\\n    62\\ttype IContentProvider =\\n    63\\t    abstract member GetResource: uri:string -\\u003E Async\\u003CResource\\u003E\\n    64\\t    abstract member ListResources: unit -\\u003E Async\\u003CResource list\\u003E\\n    65\\t\\n    66\\t// Phase 1: FileSystemProvider (markdown files)\\n    67\\t// Phase 2: ForumApiProvider (forum content)\\n    68\\t\\u0060\\u0060\\u0060\\n    69\\t\\n    70\\t#### FnAPI.Penpot\\n    71\\tF# library providing clean wrapper around Penpot API\\n    72\\t- Reusable by any F# project\\n    73\\t- Foundation for MCP server integration\\n    74\\t- Handles API authentication and requests\\n    75\\t- Extracts paths from Penpot prototypes\\n    76\\t\\n    77\\t#### EventModel App (EMapp)\\n    78\\tInteractive Event Model viewer and explorer with Choose Your Own Adventure navigation:\\n    79\\t\\n    80\\t**Core Capabilities:**\\n    81\\t- **Perspective Filtering**: Toggle business/technical/role-based views\\n    82\\t  - Business layer: High-level information flow\\n    83\\t  - Technical layers: Implementation, UI states, validation, error handling\\n    84\\t  - Role-based: Marketing sees detail in their area, high-level elsewhere\\n    85\\t  - Checkbox-style filtering: \\u0022Show what I want to see\\u0022\\n    86\\t\\n    87\\t- **Choose Your Own Adventure Navigation**:\\n    88\\t  - Start at any state: \\u0022User opens LaundryLog\\u0022\\n    89\\t  - See available paths: \\u0022What happens next?\\u0022\\n    90\\t  - Follow specific execution traces through system\\n    91\\t  - Branch awareness: \\u00223 other paths diverge here\\u0022\\n    92\\t  - Path history: \\u0022Your story so far\\u0022\\n    93\\t\\n    94\\t- **Dynamic Detail Control**:\\n    95\\t  - Drill down into any area for more detail\\n    96\\t  - Zoom out for high-level overview\\n    97\\t  - Each user configures their view preferences\\n    98\\t  - Like HTML checkboxes controlling layer visibility\\n    99\\t\\n   100\\t- **Path Visualization**:\\n   101\\t  - Each Penpot prototype path becomes navigable\\n   102\\t  - Shows branching decision points\\n   103\\t  - Displays example data for each path\\n   104\\t  - Links to GWT scenarios and tests\\n   105\\t\\n   106\\t- **Forum Integration** (future):\\n   107\\t  - Link to discussions about specific paths\\n   108\\t  - Reference community refinements\\n   109\\t  - Show validation feedback\\n   110\\t\\n   111\\t**Architecture Philosophy:**\\n   112\\tThe Event Model IS a state management problem:\\n   113\\t- What layers are visible = UI state\\n   114\\t- Detail level per area = UI state  \\n   115\\t- Current zoom/focus = UI state\\n   116\\t- Active filters = UI state\\n   117\\t\\n   118\\tBase Event Model exists once (like accounting facts), but views are dynamic filters (like financial/managerial/tax reporting).\\n   119\\t\\n   120\\t### Supporting Components\\n   121\\t\\n   122\\t- **FnMCP.Penpot**: Specialized MCP server for Penpot integration\\n   123\\t- **LaundryLog**: Truck driver laundry expense tracking (proving ground app)\\n   124\\t- **PerDiemLog**: DOT HOS-compliant per diem tracking (proving ground app)\\n   125\\t\\n   126\\t## Key Concepts\\n   127\\t\\n   128\\t### Paths\\n   129\\t**The organizing principle for development, testing, and documentation.**\\n   130\\t\\n   131\\tPaths are specific execution traces through the system, analogous to \\u0022Choose Your Own Adventure\\u0022 books where one story contains hundreds of possible storylines through branching choices.\\n   132\\t\\n   133\\t**What is a Path?**\\n   134\\tA path is one deterministic sequence through all the branches in a system:\\n   135\\t- **Specific inputs**: Concrete data, not abstract examples\\n   136\\t- **Specific choices**: Which branch taken at each decision point\\n   137\\t- **Specific outcomes**: Actual results from this execution\\n   138\\t\\n   139\\t**Paths vs. Happy Path:**\\n   140\\t\\u0022Happy Path\\u0022 is ONE path through the system. The framework recognizes:\\n   141\\t- **Happy paths**: Everything works as intended\\n   142\\t- **Error paths**: Things go wrong, system handles it\\n   143\\t- **Edge paths**: Unusual but valid scenarios\\n   144\\t- **Alternative paths**: Different valid choices\\n   145\\t\\n   146\\tEach path is fully specified with real example data.\\n   147\\t\\n   148\\t**Multi-Purpose Nature of Paths**\\n   149\\t\\n   150\\tPaths serve simultaneously as:\\n\",\"uuid\":\"92da22be-45f7-4aa3-b528-3c3585e7d5c8\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":{\"type\":\"json_block\",\"json_block\":\"{\\u0022language\\u0022: \\u0022markdown\\u0022, \\u0022code\\u0022: \\u0022# FnMCP.IvanTheGeekDevFramework - Current State\\\\n\\\\n**Last Updated:** 2025-11-09 (Updated with forum architecture, paths concept, and perspective filtering)\\\\n\\\\n## Vision\\\\n\\\\nA comprehensive, MCP-first development framework that enables rapid creation of privacy-focused, open-source applications. The framework centers around Event Modeling with multi-layer perspectives and perspective filtering, uses Penpot as UI source of truth, and leverages a community forum as the central content and collaboration hub. The framework is built around the concept of \\\\\\u0022paths\\\\\\u0022 - specific execution traces through systems that serve as narratives, test cases, and documentation simultaneously.\\\\n\\\\n## Core Philosophy\\\\n\\\\n- **Maximum freedom \\u002B practical capitalism**: AGPLv3 licensing with optional paid services\\\\n- **Privacy-first**: No data monetization, transparent open source\\\\n- **Build for yourself first**: Solve real problems you encounter\\\\n- **Excellent UX over poorly designed commercial alternatives**\\\\n- **Community-driven via influence system**: Contributors earn prioritization\\\\n\\\\n## Architecture Overview\\\\n\\\\n### Primary Components\\\\n\\\\n#### Forum System - The Content \\u0026 Community Hub\\\\n**The central glue connecting all framework aspects:**\\\\n\\\\n**Phased Architecture:**\\\\n- **Phase 1 (Current)**: Markdown files in \\u0060/context-library/\\u0060\\\\n  - Human-editable source of truth\\\\n  - Version controlled in git\\\\n  - Build process transforms to MCP Resources\\\\n  \\\\n- **Phase 2 (Interim)**: Existing forum software\\\\n  - Evaluating: Talkyard, Discourse, Forem\\\\n  - Self-hosted with data portability\\\\n  - MCP reads via API (always fresh)\\\\n  \\\\n- **Phase 3 (Future)**: Custom event-sourced forum\\\\n  - Event log replaces git for version history\\\\n  - Custom deep threading (better than existing solutions)\\\\n  - Tight EMapp integration\\\\n\\\\n**Forum Functions:**\\\\n- **Wiki/Documentation**: Source for MCP Resources, app specifications\\\\n- **Community Q\\u0026A**: Support and knowledge sharing\\\\n- **Feature Requests**: Integrated with influence system voting\\\\n- **Path Refinement**: Community discusses and improves paths\\\\n- **Event Model Validation**: Peer review and feedback\\\\n- **Given-When-Then Catalog**: Organized test scenarios\\\\n\\\\n**Integration Points:**\\\\n- MCP server reads forum content as Resources\\\\n- EMapp can reference forum discussions\\\\n- Penpot designs link to forum specs\\\\n- GWT scenarios stored/organized in forum\\\\n\\\\n#### FnMCP.IvanTheGeekDevFramework\\\\nThe central MCP server that provides:\\\\n- **Tools**: Actions (Penpot manipulation, Event Model updates, code generation, path extraction)\\\\n- **Resources**: Dynamic project state \\u002B static methodology from forum/markdown\\\\n- **Prompts**: Interactive workflows for common development tasks\\\\n\\\\n**Content Provider Abstraction:**\\\\n\\u0060\\u0060\\u0060fsharp\\\\ntype IContentProvider =\\\\n    abstract member GetResource: uri:string -\\u003E Async\\u003CResource\\u003E\\\\n    abstract member ListResources: unit -\\u003E Async\\u003CResource list\\u003E\\\\n\\\\n// Phase 1: FileSystemProvider (markdown files)\\\\n// Phase 2: ForumApiProvider (forum content)\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n#### FnAPI.Penpot\\\\nF# library providing clean wrapper around Penpot API\\\\n- Reusable by any F# project\\\\n- Foundation for MCP server integration\\\\n- Handles API authentication and requests\\\\n- Extracts paths from Penpot prototypes\\\\n\\\\n#### EventModel App (EMapp)\\\\nInteractive Event Model viewer and explorer with Choose Your Own Adventure navigation:\\\\n\\\\n**Core Capabilities:**\\\\n- **Perspective Filtering**: Toggle business/technical/role-based views\\\\n  - Business layer: High-level information flow\\\\n  - Technical layers: Implementation, UI states, validation, error handling\\\\n  - Role-based: Marketing sees detail in their area, high-level elsewhere\\\\n  - Checkbox-style filtering: \\\\\\u0022Show what I want to see\\\\\\u0022\\\\n\\\\n- **Choose Your Own Adventure Navigation**:\\\\n  - Start at any state: \\\\\\u0022User opens LaundryLog\\\\\\u0022\\\\n  - See available paths: \\\\\\u0022What happens next?\\\\\\u0022\\\\n  - Follow specific execution traces through system\\\\n  - Branch awareness: \\\\\\u00223 other paths diverge here\\\\\\u0022\\\\n  - Path history: \\\\\\u0022Your story so far\\\\\\u0022\\\\n\\\\n- **Dynamic Detail Control**:\\\\n  - Drill down into any area for more detail\\\\n  - Zoom out for high-level overview\\\\n  - Each user configures their view preferences\\\\n  - Like HTML checkboxes controlling layer visibility\\\\n\\\\n- **Path Visualization**:\\\\n  - Each Penpot prototype path becomes navigable\\\\n  - Shows branching decision points\\\\n  - Displays example data for each path\\\\n  - Links to GWT scenarios and tests\\\\n\\\\n- **Forum Integration** (future):\\\\n  - Link to discussions about specific paths\\\\n  - Reference community refinements\\\\n  - Show validation feedback\\\\n\\\\n**Architecture Philosophy:**\\\\nThe Event Model IS a state management problem:\\\\n- What layers are visible = UI state\\\\n- Detail level per area = UI state  \\\\n- Current zoom/focus = UI state\\\\n- Active filters = UI state\\\\n\\\\nBase Event Model exists once (like accounting facts), but views are dynamic filters (like financial/managerial/tax reporting).\\\\n\\\\n### Supporting Components\\\\n\\\\n- **FnMCP.Penpot**: Specialized MCP server for Penpot integration\\\\n- **LaundryLog**: Truck driver laundry expense tracking (proving ground app)\\\\n- **PerDiemLog**: DOT HOS-compliant per diem tracking (proving ground app)\\\\n\\\\n## Key Concepts\\\\n\\\\n### Paths\\\\n**The organizing principle for development, testing, and documentation.**\\\\n\\\\nPaths are specific execution traces through the system, analogous to \\\\\\u0022Choose Your Own Adventure\\\\\\u0022 books where one story contains hundreds of possible storylines through branching choices.\\\\n\\\\n**What is a Path?**\\\\nA path is one deterministic sequence through all the branches in a system:\\\\n- **Specific inputs**: Concrete data, not abstract examples\\\\n- **Specific choices**: Which branch taken at each decision point\\\\n- **Specific outcomes**: Actual results from this execution\\\\n\\\\n**Paths vs. Happy Path:**\\\\n\\\\\\u0022Happy Path\\\\\\u0022 is ONE path through the system. The framework recognizes:\\\\n- **Happy paths**: Everything works as intended\\\\n- **Error paths**: Things go wrong, system handles it\\\\n- **Edge paths**: Unusual but valid scenarios\\\\n- **Alternative paths**: Different valid choices\\\\n\\\\nEach path is fully specified with real example data.\\\\n\\\\n**Multi-Purpose Nature of Paths**\\\\n\\\\nPaths serve simultaneously as:\\\\n\\u0022, \\u0022filename\\u0022: \\u0022/mnt/project/ivan-dev-framework-overview.md\\u0022}\"}}"

