text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"view\",\"content\":[{\"type\":\"text\",\"text\":\"Here\\u0027s the content of /mnt/project/penpot-naming-conventions.md with line numbers:\\n     1\\t# Penpot Naming Conventions\\n     2\\t## FnMCP.IvanTheGeekDevFramework\\n     3\\t\\n     4\\t**Version:** 1.0  \\n     5\\t**Last Updated:** 2025-11-09\\n     6\\t\\n     7\\t---\\n     8\\t\\n     9\\t## Purpose\\n    10\\t\\n    11\\tClear, consistent naming in Penpot designs enables:\\n    12\\t- **Designer Productivity:** Find elements instantly in layer panel\\n    13\\t- **Code Generation:** Meaningful F# identifiers and function names\\n    14\\t- **Path Documentation:** Readable Given-When-Then scenarios\\n    15\\t- **Component Discovery:** Programmatic queries via FnMCP.Penpot\\n    16\\t- **Team Communication:** Shared understanding of design structure\\n    17\\t\\n    18\\t**Bad naming creates chaos. Good naming creates clarity.**\\n    19\\t\\n    20\\t---\\n    21\\t\\n    22\\t## Core Principles\\n    23\\t\\n    24\\t1. **Be Descriptive, Not Generic**\\n    25\\t   - \\u00E2\\u009D\\u0152 \\u0060svg-rect\\u0060, \\u0060Rectangle\\u0060, \\u0060Group 42\\u0060\\n    26\\t   - \\u00E2\\u0153\\u2026 \\u0060header\\u0060, \\u0060button / submit\\u0060, \\u0060location\\u0060\\n    27\\t\\n    28\\t2. **Use Consistent Patterns**\\n    29\\t   - Components: \\u0060type / specific\\u0060\\n    30\\t   - Screens: Purpose or state\\n    31\\t   - Sections: Semantic description\\n    32\\t\\n    33\\t3. **Think About Code Generation**\\n    34\\t   - Names become F# identifiers\\n    35\\t   - Avoid special characters (except \\u0060/\\u0060 and \\u0060-\\u0060)\\n    36\\t   - Use spaces or camelCase for readability\\n    37\\t\\n    38\\t4. **Support Programmatic Discovery**\\n    39\\t   - Prefix patterns enable finding related elements\\n    40\\t   - \\u0060button / *\\u0060 finds all buttons\\n    41\\t   - \\u0060icon / *\\u0060 finds all icons\\n    42\\t\\n    43\\t---\\n    44\\t\\n    45\\t## Naming by Element Type\\n    46\\t\\n    47\\t### \\u00F0\\u0178\\u201C\\u00B1 **Boards - Screens/States**\\n    48\\t\\n    49\\tBoards represent discrete states in the application.\\n    50\\t\\n    51\\t**Format:** Purpose-descriptive, Title Case or CamelCase\\n    52\\t\\n    53\\t**Examples:**\\n    54\\t- \\u0060Home\\u0060 - Main screen\\n    55\\t- \\u0060Loading\\u0060 - Splash/loading state\\n    56\\t- \\u0060UserProfile\\u0060 - User\\u0027s profile view\\n    57\\t- \\u0060Map overlay\\u0060 - Full-screen map\\n    58\\t- \\u0060Date picker\\u0060 - Calendar selection\\n    59\\t- \\u0060Success\\u0060 - Confirmation state\\n    60\\t- \\u0060Error - NetworkTimeout\\u0060 - Specific error state\\n    61\\t\\n    62\\t**Pattern for Variants:**\\n    63\\t- \\u0060Screen - Variant\\u0060\\n    64\\t- \\u0060ProductDetail - Desktop\\u0060\\n    65\\t- \\u0060ProductDetail - Mobile\\u0060\\n    66\\t- \\u0060Checkout - Step1\\u0060\\n    67\\t- \\u0060Checkout - Step2\\u0060\\n    68\\t\\n    69\\t**Rationale:** Screen names become Event Model state names and test scenario identifiers.\\n    70\\t\\n    71\\t---\\n    72\\t\\n    73\\t### \\u00F0\\u0178\\u017D\\u00A8 **Components - Reusable UI Elements**\\n    74\\t\\n    75\\tComponents are defined once, instantiated multiple times.\\n    76\\t\\n    77\\t**Format:** \\u0060type / specific name\\u0060\\n    78\\t\\n    79\\t**Component Types:**\\n    80\\t- \\u0060button / [name]\\u0060\\n    81\\t- \\u0060icon / [name]\\u0060\\n    82\\t- \\u0060input / [name]\\u0060\\n    83\\t- \\u0060card / [name]\\u0060\\n    84\\t- \\u0060modal / [name]\\u0060\\n    85\\t- \\u0060header / [variant]\\u0060\\n    86\\t- \\u0060notification / [type]\\u0060\\n    87\\t\\n    88\\t**Examples:**\\n    89\\t\\u0060\\u0060\\u0060\\n    90\\tbutton / submit\\n    91\\tbutton / cancel\\n    92\\tbutton / menu\\n    93\\tbutton / close\\n    94\\tbutton / coffee near me\\n    95\\tbutton / add to cart\\n    96\\t\\n    97\\ticon / heart\\n    98\\ticon / heart filled\\n    99\\ticon / pin\\n   100\\ticon / menu\\n   101\\ticon / close\\n   102\\ticon / chevron left\\n   103\\ticon / chevron right\\n   104\\ticon / check\\n   105\\ticon / calendar\\n   106\\t\\n   107\\tinput / email\\n   108\\tinput / password\\n   109\\tinput / search\\n   110\\tinput / quantity\\n   111\\t\\n   112\\tcard / product\\n   113\\tcard / location\\n   114\\tcard / user\\n   115\\t\\n   116\\tmodal / confirmation\\n   117\\tmodal / error\\n   118\\tmodal / settings\\n   119\\t\\n   120\\theader\\n   121\\theader with title\\n   122\\theader / desktop\\n   123\\theader / mobile\\n   124\\t\\n   125\\tnotification / success\\n   126\\tnotification / error\\n   127\\tnotification / info\\n   128\\t\\u0060\\u0060\\u0060\\n   129\\t\\n   130\\t**Rationale:** \\n   131\\t- Easy to find all buttons: search \\u0022button /\\u0022\\n   132\\t- Clear type \\u002B purpose structure\\n   133\\t- Translates well to code: \\u0060button_submit\\u0060, \\u0060icon_heart\\u0060\\n   134\\t\\n   135\\t---\\n   136\\t\\n   137\\t### \\u00F0\\u0178\\u201C\\u00A6 **Layout Containers**\\n   138\\t\\n   139\\tLayout sections and structural elements.\\n   140\\t\\n   141\\t**Format:** Lowercase, descriptive\\n   142\\t\\n   143\\t**Examples:**\\n   144\\t\\u0060\\u0060\\u0060\\n   145\\theader\\n   146\\tfooter\\n   147\\tsidebar\\n   148\\tnavigation\\n   149\\tgallery\\n   150\\tgrid\\n   151\\tpopular\\n   152\\ttrending\\n   153\\tfeatured\\n   154\\tcontent\\n   155\\tmain\\n   156\\taside\\n   157\\t\\u0060\\u0060\\u0060\\n   158\\t\\n   159\\t**Rationale:** Semantic HTML parallels make code generation intuitive.\\n   160\\t\\n   161\\t---\\n   162\\t\\n   163\\t### \\u00F0\\u0178\\u201D\\u00A2 **Instances - Repeated Elements**\\n   164\\t\\n   165\\tWhen using multiple instances of a component.\\n   166\\t\\n   167\\t**Format:** Semantic name describing what it represents\\n   168\\t\\n   169\\t**Examples:**\\n   170\\t\\u0060\\u0060\\u0060\\n   171\\tlocation          (multiple instances in gallery)\\n   172\\tproduct          (multiple items in list)\\n   173\\tuser             (multiple user cards)\\n   174\\tnotification     (multiple alerts)\\n   175\\treview           (multiple review cards)\\n   176\\t\\u0060\\u0060\\u0060\\n   177\\t\\n   178\\t**For unique instances:**\\n   179\\t\\u0060\\u0060\\u0060\\n   180\\tlocation / primary\\n   181\\tlocation / secondary\\n   182\\tproduct / featured\\n   183\\tuser / author\\n   184\\t\\u0060\\u0060\\u0060\\n   185\\t\\n   186\\t**Rationale:** Describes content, not just \\u0022Component Copy 3\\u0022\\n   187\\t\\n   188\\t---\\n   189\\t\\n   190\\t### \\u00E2\\u0161\\u00A1 **Interactive Elements**\\n   191\\t\\n   192\\tElements with interactions/prototypes.\\n   193\\t\\n   194\\t**Add clear action indicators to names:**\\n   195\\t\\n   196\\t**Examples:**\\n   197\\t\\u0060\\u0060\\u0060\\n   198\\tbutton / menu \\u00E2\\u2020\\u2019 Menu\\n   199\\tbutton / book now \\u00E2\\u2020\\u2019 Book\\n   200\\tlocation \\u00E2\\u2020\\u2019 ProductDetail\\n   201\\ticon / heart \\u00E2\\u2020\\u2019 Faves\\n   202\\tcard / product \\u00E2\\u2020\\u2019 ProductDetail\\n   203\\t\\u0060\\u0060\\u0060\\n   204\\t\\n   205\\t**Rationale:** Helps identify which elements have prototype connections for path extraction.\\n   206\\t\\n   207\\t---\\n   208\\t\\n   209\\t### \\u00F0\\u0178\\u017D\\u00AF **States and Variants**\\n   210\\t\\n   211\\tFor components with multiple states.\\n   212\\t\\n   213\\t**Format:** \\u0060component name / state\\u0060\\n   214\\t\\n   215\\t**Examples:**\\n   216\\t\\u0060\\u0060\\u0060\\n   217\\tbutton / submit / default\\n   218\\tbutton / submit / hover\\n   219\\tbutton / submit / pressed\\n   220\\tbutton / submit / disabled\\n   221\\t\\n   222\\tinput / email / empty\\n   223\\tinput / email / filled\\n   224\\tinput / email / error\\n   225\\tinput / email / focused\\n   226\\t\\n   227\\tcard / product / default\\n   228\\tcard / product / favorited\\n   229\\tcard / product / sold out\\n   230\\t\\u0060\\u0060\\u0060\\n   231\\t\\n   232\\t**Rationale:** Clearly shows which state variant this represents. Aligns with Penpot\\u0027s component variant system.\\n   233\\t\\n   234\\t---\\n   235\\t\\n   236\\t## Naming by Purpose\\n   237\\t\\n   238\\t### Event Model Screens\\n   239\\t\\n   240\\tWhen designing Event Model visualizations in Penpot:\\n   241\\t\\n   242\\t**Events (Orange):**\\n   243\\t- \\u0060event / [EventName]\\u0060\\n   244\\t- \\u0060event / SessionStarted\\u0060\\n   245\\t- \\u0060event / MachineEntryAdded\\u0060\\n   246\\t\\n   247\\t**Commands (Blue):**\\n   248\\t- \\u0060command / [CommandName]\\u0060\\n   249\\t- \\u0060command / StartSession\\u0060\\n   250\\t- \\u0060command / AddMachineEntry\\u0060\\n   251\\t\\n   252\\t**Views (Green):**\\n   253\\t- \\u0060view / [ViewName]\\u0060\\n   254\\t- \\u0060view / SessionSummary\\u0060\\n   255\\t- \\u0060view / MachineEntryForm\\u0060\\n   256\\t\\n   257\\t**Rationale:** Maintains Event Modeling conventions, color coding reflected in naming.\\n   258\\t\\n   259\\t---\\n   260\\t\\n   261\\t### LaundryLog Specific Examples\\n   262\\t\\n   263\\tApplying conventions to actual screens:\\n   264\\t\\n   265\\t**Screens (Boards):**\\n   266\\t\\u0060\\u0060\\u0060\\n   267\\tLaundryLog Home\\n   268\\tLocation Capture\\n   269\\tMachine Entry\\n   270\\tSession Summary\\n   271\\tHistory\\n   272\\tSettings\\n   273\\t\\u0060\\u0060\\u0060\\n   274\\t\\n   275\\t**Components:**\\n   276\\t\\u0060\\u0060\\u0060\\n   277\\tbutton / washer\\n   278\\tbutton / dryer\\n   279\\tbutton / supplies\\n   280\\tbutton / quarter\\n   281\\tbutton / add\\n   282\\tbutton / submit\\n   283\\t\\n   284\\ticon / gps\\n   285\\ticon / location pin\\n   286\\ticon / back\\n   287\\t\\n   288\\tinput / quantity\\n   289\\tinput / price\\n   290\\t\\n   291\\tcard / session entry\\n   292\\tcard / machine\\n   293\\t\\n   294\\theader / laundry log\\n   295\\t\\n   296\\tnotification / gps error\\n   297\\t\\u0060\\u0060\\u0060\\n   298\\t\\n   299\\t**Layout:**\\n   300\\t\\u0060\\u0060\\u0060\\n   301\\theader\\n   302\\tmachine type section\\n   303\\tpayment section\\n   304\\tsession total\\n   305\\tfooter\\n   306\\t\\u0060\\u0060\\u0060\\n   307\\t\\n   308\\t---\\n   309\\t\\n   310\\t## Code Generation Impact\\n   311\\t\\n   312\\t### How Names Become Code\\n   313\\t\\n   314\\t**Penpot Name** \\u00E2\\u2020\\u2019 **F# Identifier**\\n   315\\t\\n   316\\t\\u0060\\u0060\\u0060\\n   317\\tbutton / submit         \\u00E2\\u2020\\u2019 ButtonSubmit or button_submit\\n   318\\ticon / heart filled     \\u00E2\\u2020\\u2019 IconHeartFilled or icon_heart_filled\\n   319\\tinput / email          \\u00E2\\u2020\\u2019 InputEmail or input_email\\n   320\\tLocation Capture       \\u00E2\\u2020\\u2019 LocationCapture\\n   321\\tsession total          \\u00E2\\u2020\\u2019 sessionTotal or session_total\\n   322\\t\\u0060\\u0060\\u0060\\n   323\\t\\n   324\\t**Generation Rules:**\\n   325\\t- Remove spaces or convert to camelCase/snake_case\\n   326\\t- Remove special chars except underscores\\n   327\\t- Convert slashes to underscores or camelCase\\n   328\\t- Preserve semantic meaning\\n   329\\t\\n   330\\t### Component Discovery Code\\n   331\\t\\n   332\\t\\u0060\\u0060\\u0060fsharp\\n   333\\t// Find all buttons\\n   334\\tlet buttons = penpotUtils.findShapes(\\n   335\\t    fun shape -\\u003E shape.name.StartsWith(\\u0022button /\\u0022)\\n   336\\t)\\n   337\\t\\n   338\\t// Find all icons\\n   339\\tlet icons = penpotUtils.findShapes(\\n   340\\t    fun shape -\\u003E shape.name.StartsWith(\\u0022icon /\\u0022)\\n   341\\t)\\n   342\\t\\n   343\\t// Find specific component\\n   344\\tlet submitButton = penpotUtils.findShape(\\n   345\\t    fun shape -\\u003E shape.name = \\u0022button / submit\\u0022\\n   346\\t)\\n   347\\t\\n   348\\t// Find all screen states\\n   349\\tlet screens = penpotUtils.findShapes(\\n   350\\t    fun shape -\\u003E \\n   351\\t        shape.type = \\u0022board\\u0022 \\u0026\\u0026 \\n   352\\t        not (shape.name.Contains(\\u0022/\\u0022)) // Top-level boards\\n   353\\t)\\n   354\\t\\u0060\\u0060\\u0060\\n   355\\t\\n   356\\t---\\n   357\\t\\n   358\\t## Anti-Patterns to Avoid\\n   359\\t\\n   360\\t### \\u00E2\\u009D\\u0152 **Generic Auto-Generated Names**\\n   361\\t\\u0060\\u0060\\u0060\\n   362\\tsvg-rect\\n   363\\tsvg-circle\\n   364\\tGroup 42\\n   365\\tRectangle copy 3\\n   366\\tBoard\\n   367\\tEllipse\\n   368\\t\\u0060\\u0060\\u0060\\n   369\\t**Why Bad:** No semantic meaning, can\\u0027t find elements, code generation produces garbage.\\n   370\\t\\n   371\\t### \\u00E2\\u009D\\u0152 **Inconsistent Patterns**\\n   372\\t\\u0060\\u0060\\u0060\\n   373\\tbtnSubmit\\n   374\\tbutton_cancel\\n   375\\tButton / Close\\n   376\\tBUTTON_MENU\\n   377\\t\\u0060\\u0060\\u0060\\n   378\\t**Why Bad:** Can\\u0027t search effectively, breaks programmatic discovery.\\n   379\\t\\n   380\\t### \\u00E2\\u009D\\u0152 **Overly Technical Names**\\n   381\\t\\u0060\\u0060\\u0060\\n   382\\tdiv_container_flex_col\\n   383\\tbtn_primary_lg_#FF5733\\n   384\\tcomponent_v2_refactor_final\\n   385\\t\\u0060\\u0060\\u0060\\n   386\\t**Why Bad:** Designer-hostile, changes with implementation details.\\n   387\\t\\n   388\\t### \\u00E2\\u009D\\u0152 **Too Vague**\\n   389\\t\\u0060\\u0060\\u0060\\n   390\\tthing\\n   391\\tstuff\\n   392\\telement\\n   393\\tbox\\n   394\\tsection1\\n   395\\t\\u0060\\u0060\\u0060\\n   396\\t**Why Bad:** Tells you nothing about purpose or content.\\n   397\\t\\n   398\\t### \\u00E2\\u009D\\u0152 **Too Specific to Content**\\n   399\\t\\u0060\\u0060\\u0060\\n   400\\tbutton / click here now!!!\\n   401\\ttext / Call 1-800-FLOWERS\\n   402\\tlocation / Starbucks 123 Main St\\n   403\\t\\u0060\\u0060\\u0060\\n   404\\t**Why Bad:** Breaks when content changes, not reusable.\\n   405\\t\\n   406\\t---\\n   407\\t\\n   408\\t## Best Practices\\n   409\\t\\n   410\\t### \\u00E2\\u0153\\u2026 **Use Folders/Groups for Organization**\\n   411\\t\\n   412\\tGroup related components:\\n   413\\t\\u0060\\u0060\\u0060\\n   414\\t\\u00F0\\u0178\\u201C\\u0081 Buttons\\n   415\\t  \\u00E2\\u201D\\u201D\\u00E2\\u201D\\u20AC button / submit\\n   416\\t  \\u00E2\\u201D\\u201D\\u00E2\\u201D\\u20AC button / cancel\\n   417\\t  \\u00E2\\u201D\\u201D\\u00E2\\u201D\\u20AC button / menu\\n   418\\t\\n   419\\t\\u00F0\\u0178\\u201C\\u0081 Icons\\n   420\\t  \\u00E2\\u201D\\u201D\\u00E2\\u201D\\u20AC icon / heart\\n   421\\t  \\u00E2\\u201D\\u201D\\u00E2\\u201D\\u20AC icon / pin\\n   422\\t  \\u00E2\\u201D\\u201D\\u00E2\\u201D\\u20AC icon / menu\\n   423\\t\\n   424\\t\\u00F0\\u0178\\u201C\\u0081 Inputs\\n   425\\t  \\u00E2\\u201D\\u201D\\u00E2\\u201D\\u20AC input / email\\n   426\\t  \\u00E2\\u201D\\u201D\\u00E2\\u201D\\u20AC input / password\\n   427\\t\\u0060\\u0060\\u0060\\n   428\\t\\n   429\\t### \\u00E2\\u0153\\u2026 **Version Component Variants**\\n   430\\t\\n   431\\tWhen creating iterations:\\n   432\\t\\u0060\\u0060\\u0060\\n   433\\theader\\n   434\\theader / v2\\n   435\\theader / with search\\n   436\\t\\u0060\\u0060\\u0060\\n   437\\t\\n   438\\tOr use Penpot\\u0027s component variant system.\\n   439\\t\\n   440\\t### \\u00E2\\u0153\\u2026 **Document Special Cases**\\n   441\\t\\n   442\\tUse descriptions in Penpot for unusual naming:\\n   443\\t- Why this name was chosen\\n   444\\t- What states exist\\n   445\\t- Prototype connections\\n   446\\t\\n   447\\t### \\u00E2\\u0153\\u2026 **Maintain a Component Library**\\n   448\\t\\n   449\\tDedicated page: \\u0022Main components\\u0022 or \\u0022Design System\\u0022\\n   450\\t- All reusable components defined here\\n   451\\t- Instances used in prototype screens\\n   452\\t- Single source of truth\\n   453\\t\\n   454\\t---\\n   455\\t\\n   456\\t## Checklist Before Export/Handoff\\n   457\\t\\n   458\\t- [ ] All boards have meaningful names (no \\u0022Board 3\\u0022)\\n   459\\t- [ ] All components follow \\u0060type / name\\u0060 pattern\\n   460\\t- [ ] No generic names (\\u0060svg-*\\u0060, \\u0060Rectangle\\u0060, \\u0060Group\\u0060)\\n   461\\t- [ ] Layout sections have semantic names\\n   462\\t- [ ] Instances describe what they represent\\n   463\\t- [ ] Interactive elements are clearly named\\n   464\\t- [ ] Component variants use consistent pattern\\n   465\\t- [ ] Names will translate to good code identifiers\\n   466\\t- [ ] Layer panel is navigable by name alone\\n   467\\t\\n   468\\t---\\n   469\\t\\n   470\\t## Integration with Framework\\n   471\\t\\n   472\\t### For Designers:\\n   473\\t- Follow these conventions in all Penpot files\\n   474\\t- Think about how names will appear in code\\n   475\\t- Use consistent patterns within and across projects\\n   476\\t\\n   477\\t### For FnMCP.Penpot:\\n   478\\t- Parse names to discover component types\\n   479\\t- Generate F# types from board/component names\\n   480\\t- Map prototype interactions using element names\\n   481\\t- Create GWT scenarios with readable identifiers\\n   482\\t\\n   483\\t### For Event Modeling:\\n   484\\t- Screen names become state names\\n   485\\t- Component names become view/command identifiers\\n   486\\t- Maintain consistency with EM color conventions\\n   487\\t\\n   488\\t---\\n   489\\t\\n   490\\t## Evolution and Refinement\\n   491\\t\\n   492\\tThis is a living document. As we learn what works:\\n   493\\t- Add new patterns that emerge\\n   494\\t- Refine existing conventions\\n   495\\t- Document exceptions and edge cases\\n   496\\t- Update based on real project experience\\n   497\\t\\n   498\\t**Next update:** After completing LaundryLog and PerDiemLog design cycles.\\n   499\\t\\n   500\\t---\\n   501\\t\\n   502\\t## Quick Reference Card\\n   503\\t\\n   504\\t\\u0060\\u0060\\u0060\\n   505\\tBOARDS (States):     Title Case, Purpose    \\u00E2\\u2020\\u2019 \\u0022Home\\u0022, \\u0022Loading\\u0022\\n   506\\tCOMPONENTS:          type / name            \\u00E2\\u2020\\u2019 \\u0022button / submit\\u0022\\n   507\\tLAYOUT:              lowercase, semantic    \\u00E2\\u2020\\u2019 \\u0022header\\u0022, \\u0022navigation\\u0022  \\n   508\\tINSTANCES:           what they represent    \\u00E2\\u2020\\u2019 \\u0022location\\u0022, \\u0022product\\u0022\\n   509\\tVARIANTS:            name / state           \\u00E2\\u2020\\u2019 \\u0022button / hover\\u0022\\n   510\\tEVENT MODEL:         type / EventName       \\u00E2\\u2020\\u2019 \\u0022event / SessionStarted\\u0022\\n   511\\t\\n   512\\tAVOID: svg-*, Rectangle, Group, Board, generic names\\n   513\\tTHINK: Can I find this? Will code make sense? Is it descriptive?\\n   514\\t\\u0060\\u0060\\u0060\\n   515\\t\\n   516\\t---\\n   517\\t\\n   518\\t**Remember: Good naming is not optional. It\\u0027s foundational to the framework.**\\n   519\\t\",\"uuid\":\"3dc4af5b-b94c-43ae-98a3-9b924bd02664\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":{\"type\":\"json_block\",\"json_block\":\"{\\u0022language\\u0022: \\u0022markdown\\u0022, \\u0022code\\u0022: \\u0022# Penpot Naming Conventions\\\\n## FnMCP.IvanTheGeekDevFramework\\\\n\\\\n**Version:** 1.0  \\\\n**Last Updated:** 2025-11-09\\\\n\\\\n---\\\\n\\\\n## Purpose\\\\n\\\\nClear, consistent naming in Penpot designs enables:\\\\n- **Designer Productivity:** Find elements instantly in layer panel\\\\n- **Code Generation:** Meaningful F# identifiers and function names\\\\n- **Path Documentation:** Readable Given-When-Then scenarios\\\\n- **Component Discovery:** Programmatic queries via FnMCP.Penpot\\\\n- **Team Communication:** Shared understanding of design structure\\\\n\\\\n**Bad naming creates chaos. Good naming creates clarity.**\\\\n\\\\n---\\\\n\\\\n## Core Principles\\\\n\\\\n1. **Be Descriptive, Not Generic**\\\\n   - \\\\u00e2\\\\u009d\\\\u0152 \\u0060svg-rect\\u0060, \\u0060Rectangle\\u0060, \\u0060Group 42\\u0060\\\\n   - \\\\u00e2\\\\u0153\\\\u2026 \\u0060header\\u0060, \\u0060button / submit\\u0060, \\u0060location\\u0060\\\\n\\\\n2. **Use Consistent Patterns**\\\\n   - Components: \\u0060type / specific\\u0060\\\\n   - Screens: Purpose or state\\\\n   - Sections: Semantic description\\\\n\\\\n3. **Think About Code Generation**\\\\n   - Names become F# identifiers\\\\n   - Avoid special characters (except \\u0060/\\u0060 and \\u0060-\\u0060)\\\\n   - Use spaces or camelCase for readability\\\\n\\\\n4. **Support Programmatic Discovery**\\\\n   - Prefix patterns enable finding related elements\\\\n   - \\u0060button / *\\u0060 finds all buttons\\\\n   - \\u0060icon / *\\u0060 finds all icons\\\\n\\\\n---\\\\n\\\\n## Naming by Element Type\\\\n\\\\n### \\\\u00f0\\\\u0178\\\\u201c\\\\u00b1 **Boards - Screens/States**\\\\n\\\\nBoards represent discrete states in the application.\\\\n\\\\n**Format:** Purpose-descriptive, Title Case or CamelCase\\\\n\\\\n**Examples:**\\\\n- \\u0060Home\\u0060 - Main screen\\\\n- \\u0060Loading\\u0060 - Splash/loading state\\\\n- \\u0060UserProfile\\u0060 - User\\u0027s profile view\\\\n- \\u0060Map overlay\\u0060 - Full-screen map\\\\n- \\u0060Date picker\\u0060 - Calendar selection\\\\n- \\u0060Success\\u0060 - Confirmation state\\\\n- \\u0060Error - NetworkTimeout\\u0060 - Specific error state\\\\n\\\\n**Pattern for Variants:**\\\\n- \\u0060Screen - Variant\\u0060\\\\n- \\u0060ProductDetail - Desktop\\u0060\\\\n- \\u0060ProductDetail - Mobile\\u0060\\\\n- \\u0060Checkout - Step1\\u0060\\\\n- \\u0060Checkout - Step2\\u0060\\\\n\\\\n**Rationale:** Screen names become Event Model state names and test scenario identifiers.\\\\n\\\\n---\\\\n\\\\n### \\\\u00f0\\\\u0178\\\\u017d\\\\u00a8 **Components - Reusable UI Elements**\\\\n\\\\nComponents are defined once, instantiated multiple times.\\\\n\\\\n**Format:** \\u0060type / specific name\\u0060\\\\n\\\\n**Component Types:**\\\\n- \\u0060button / [name]\\u0060\\\\n- \\u0060icon / [name]\\u0060\\\\n- \\u0060input / [name]\\u0060\\\\n- \\u0060card / [name]\\u0060\\\\n- \\u0060modal / [name]\\u0060\\\\n- \\u0060header / [variant]\\u0060\\\\n- \\u0060notification / [type]\\u0060\\\\n\\\\n**Examples:**\\\\n\\u0060\\u0060\\u0060\\\\nbutton / submit\\\\nbutton / cancel\\\\nbutton / menu\\\\nbutton / close\\\\nbutton / coffee near me\\\\nbutton / add to cart\\\\n\\\\nicon / heart\\\\nicon / heart filled\\\\nicon / pin\\\\nicon / menu\\\\nicon / close\\\\nicon / chevron left\\\\nicon / chevron right\\\\nicon / check\\\\nicon / calendar\\\\n\\\\ninput / email\\\\ninput / password\\\\ninput / search\\\\ninput / quantity\\\\n\\\\ncard / product\\\\ncard / location\\\\ncard / user\\\\n\\\\nmodal / confirmation\\\\nmodal / error\\\\nmodal / settings\\\\n\\\\nheader\\\\nheader with title\\\\nheader / desktop\\\\nheader / mobile\\\\n\\\\nnotification / success\\\\nnotification / error\\\\nnotification / info\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Rationale:** \\\\n- Easy to find all buttons: search \\\\\\u0022button /\\\\\\u0022\\\\n- Clear type \\u002B purpose structure\\\\n- Translates well to code: \\u0060button_submit\\u0060, \\u0060icon_heart\\u0060\\\\n\\\\n---\\\\n\\\\n### \\\\u00f0\\\\u0178\\\\u201c\\\\u00a6 **Layout Containers**\\\\n\\\\nLayout sections and structural elements.\\\\n\\\\n**Format:** Lowercase, descriptive\\\\n\\\\n**Examples:**\\\\n\\u0060\\u0060\\u0060\\\\nheader\\\\nfooter\\\\nsidebar\\\\nnavigation\\\\ngallery\\\\ngrid\\\\npopular\\\\ntrending\\\\nfeatured\\\\ncontent\\\\nmain\\\\naside\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Rationale:** Semantic HTML parallels make code generation intuitive.\\\\n\\\\n---\\\\n\\\\n### \\\\u00f0\\\\u0178\\\\u201d\\\\u00a2 **Instances - Repeated Elements**\\\\n\\\\nWhen using multiple instances of a component.\\\\n\\\\n**Format:** Semantic name describing what it represents\\\\n\\\\n**Examples:**\\\\n\\u0060\\u0060\\u0060\\\\nlocation          (multiple instances in gallery)\\\\nproduct          (multiple items in list)\\\\nuser             (multiple user cards)\\\\nnotification     (multiple alerts)\\\\nreview           (multiple review cards)\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**For unique instances:**\\\\n\\u0060\\u0060\\u0060\\\\nlocation / primary\\\\nlocation / secondary\\\\nproduct / featured\\\\nuser / author\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Rationale:** Describes content, not just \\\\\\u0022Component Copy 3\\\\\\u0022\\\\n\\\\n---\\\\n\\\\n### \\\\u00e2\\\\u0161\\\\u00a1 **Interactive Elements**\\\\n\\\\nElements with interactions/prototypes.\\\\n\\\\n**Add clear action indicators to names:**\\\\n\\\\n**Examples:**\\\\n\\u0060\\u0060\\u0060\\\\nbutton / menu \\\\u00e2\\\\u2020\\\\u2019 Menu\\\\nbutton / book now \\\\u00e2\\\\u2020\\\\u2019 Book\\\\nlocation \\\\u00e2\\\\u2020\\\\u2019 ProductDetail\\\\nicon / heart \\\\u00e2\\\\u2020\\\\u2019 Faves\\\\ncard / product \\\\u00e2\\\\u2020\\\\u2019 ProductDetail\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Rationale:** Helps identify which elements have prototype connections for path extraction.\\\\n\\\\n---\\\\n\\\\n### \\\\u00f0\\\\u0178\\\\u017d\\\\u00af **States and Variants**\\\\n\\\\nFor components with multiple states.\\\\n\\\\n**Format:** \\u0060component name / state\\u0060\\\\n\\\\n**Examples:**\\\\n\\u0060\\u0060\\u0060\\\\nbutton / submit / default\\\\nbutton / submit / hover\\\\nbutton / submit / pressed\\\\nbutton / submit / disabled\\\\n\\\\ninput / email / empty\\\\ninput / email / filled\\\\ninput / email / error\\\\ninput / email / focused\\\\n\\\\ncard / product / default\\\\ncard / product / favorited\\\\ncard / product / sold out\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Rationale:** Clearly shows which state variant this represents. Aligns with Penpot\\u0027s component variant system.\\\\n\\\\n---\\\\n\\\\n## Naming by Purpose\\\\n\\\\n### Event Model Screens\\\\n\\\\nWhen designing Event Model visualizations in Penpot:\\\\n\\\\n**Events (Orange):**\\\\n- \\u0060event / [EventName]\\u0060\\\\n- \\u0060event / SessionStarted\\u0060\\\\n- \\u0060event / MachineEntryAdded\\u0060\\\\n\\\\n**Commands (Blue):**\\\\n- \\u0060command / [CommandName]\\u0060\\\\n- \\u0060command / StartSession\\u0060\\\\n- \\u0060command / AddMachineEntry\\u0060\\\\n\\\\n**Views (Green):**\\\\n- \\u0060view / [ViewName]\\u0060\\\\n- \\u0060view / SessionSummary\\u0060\\\\n- \\u0060view / MachineEntryForm\\u0060\\\\n\\\\n**Rationale:** Maintains Event Modeling conventions, color coding reflected in naming.\\\\n\\\\n---\\\\n\\\\n### LaundryLog Specific Examples\\\\n\\\\nApplying conventions to actual screens:\\\\n\\\\n**Screens (Boards):**\\\\n\\u0060\\u0060\\u0060\\\\nLaundryLog Home\\\\nLocation Capture\\\\nMachine Entry\\\\nSession Summary\\\\nHistory\\\\nSettings\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Components:**\\\\n\\u0060\\u0060\\u0060\\\\nbutton / washer\\\\nbutton / dryer\\\\nbutton / supplies\\\\nbutton / quarter\\\\nbutton / add\\\\nbutton / submit\\\\n\\\\nicon / gps\\\\nicon / location pin\\\\nicon / back\\\\n\\\\ninput / quantity\\\\ninput / price\\\\n\\\\ncard / session entry\\\\ncard / machine\\\\n\\\\nheader / laundry log\\\\n\\\\nnotification / gps error\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Layout:**\\\\n\\u0060\\u0060\\u0060\\\\nheader\\\\nmachine type section\\\\npayment section\\\\nsession total\\\\nfooter\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n## Code Generation Impact\\\\n\\\\n### How Names Become Code\\\\n\\\\n**Penpot Name** \\\\u00e2\\\\u2020\\\\u2019 **F# Identifier**\\\\n\\\\n\\u0060\\u0060\\u0060\\\\nbutton / submit         \\\\u00e2\\\\u2020\\\\u2019 ButtonSubmit or button_submit\\\\nicon / heart filled     \\\\u00e2\\\\u2020\\\\u2019 IconHeartFilled or icon_heart_filled\\\\ninput / email          \\\\u00e2\\\\u2020\\\\u2019 InputEmail or input_email\\\\nLocation Capture       \\\\u00e2\\\\u2020\\\\u2019 LocationCapture\\\\nsession total          \\\\u00e2\\\\u2020\\\\u2019 sessionTotal or session_total\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Generation Rules:**\\\\n- Remove spaces or convert to camelCase/snake_case\\\\n- Remove special chars except underscores\\\\n- Convert slashes to underscores or camelCase\\\\n- Preserve semantic meaning\\\\n\\\\n### Component Discovery Code\\\\n\\\\n\\u0060\\u0060\\u0060fsharp\\\\n// Find all buttons\\\\nlet buttons = penpotUtils.findShapes(\\\\n    fun shape -\\u003E shape.name.StartsWith(\\\\\\u0022button /\\\\\\u0022)\\\\n)\\\\n\\\\n// Find all icons\\\\nlet icons = penpotUtils.findShapes(\\\\n    fun shape -\\u003E shape.name.StartsWith(\\\\\\u0022icon /\\\\\\u0022)\\\\n)\\\\n\\\\n// Find specific component\\\\nlet submitButton = penpotUtils.findShape(\\\\n    fun shape -\\u003E shape.name = \\\\\\u0022button / submit\\\\\\u0022\\\\n)\\\\n\\\\n// Find all screen states\\\\nlet screens = penpotUtils.findShapes(\\\\n    fun shape -\\u003E \\\\n        shape.type = \\\\\\u0022board\\\\\\u0022 \\u0026\\u0026 \\\\n        not (shape.name.Contains(\\\\\\u0022/\\\\\\u0022)) // Top-level boards\\\\n)\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n## Anti-Patterns to Avoid\\\\n\\\\n### \\\\u00e2\\\\u009d\\\\u0152 **Generic Auto-Generated Names**\\\\n\\u0060\\u0060\\u0060\\\\nsvg-rect\\\\nsvg-circle\\\\nGroup 42\\\\nRectangle copy 3\\\\nBoard\\\\nEllipse\\\\n\\u0060\\u0060\\u0060\\\\n**Why Bad:** No semantic meaning, can\\u0027t find elements, code generation produces garbage.\\\\n\\\\n### \\\\u00e2\\\\u009d\\\\u0152 **Inconsistent Patterns**\\\\n\\u0060\\u0060\\u0060\\\\nbtnSubmit\\\\nbutton_cancel\\\\nButton / Close\\\\nBUTTON_MENU\\\\n\\u0060\\u0060\\u0060\\\\n**Why Bad:** Can\\u0027t search effectively, breaks programmatic discovery.\\\\n\\\\n### \\\\u00e2\\\\u009d\\\\u0152 **Overly Technical Names**\\\\n\\u0060\\u0060\\u0060\\\\ndiv_container_flex_col\\\\nbtn_primary_lg_#FF5733\\\\ncomponent_v2_refactor_final\\\\n\\u0060\\u0060\\u0060\\\\n**Why Bad:** Designer-hostile, changes with implementation details.\\\\n\\\\n### \\\\u00e2\\\\u009d\\\\u0152 **Too Vague**\\\\n\\u0060\\u0060\\u0060\\\\nthing\\\\nstuff\\\\nelement\\\\nbox\\\\nsection1\\\\n\\u0060\\u0060\\u0060\\\\n**Why Bad:** Tells you nothing about purpose or content.\\\\n\\\\n### \\\\u00e2\\\\u009d\\\\u0152 **Too Specific to Content**\\\\n\\u0060\\u0060\\u0060\\\\nbutton / click here now!!!\\\\ntext / Call 1-800-FLOWERS\\\\nlocation / Starbucks 123 Main St\\\\n\\u0060\\u0060\\u0060\\\\n**Why Bad:** Breaks when content changes, not reusable.\\\\n\\\\n---\\\\n\\\\n## Best Practices\\\\n\\\\n### \\\\u00e2\\\\u0153\\\\u2026 **Use Folders/Groups for Organization**\\\\n\\\\nGroup related components:\\\\n\\u0060\\u0060\\u0060\\\\n\\\\u00f0\\\\u0178\\\\u201c\\\\u0081 Buttons\\\\n  \\\\u00e2\\\\u201d\\\\u201d\\\\u00e2\\\\u201d\\\\u20ac button / submit\\\\n  \\\\u00e2\\\\u201d\\\\u201d\\\\u00e2\\\\u201d\\\\u20ac button / cancel\\\\n  \\\\u00e2\\\\u201d\\\\u201d\\\\u00e2\\\\u201d\\\\u20ac button / menu\\\\n\\\\n\\\\u00f0\\\\u0178\\\\u201c\\\\u0081 Icons\\\\n  \\\\u00e2\\\\u201d\\\\u201d\\\\u00e2\\\\u201d\\\\u20ac icon / heart\\\\n  \\\\u00e2\\\\u201d\\\\u201d\\\\u00e2\\\\u201d\\\\u20ac icon / pin\\\\n  \\\\u00e2\\\\u201d\\\\u201d\\\\u00e2\\\\u201d\\\\u20ac icon / menu\\\\n\\\\n\\\\u00f0\\\\u0178\\\\u201c\\\\u0081 Inputs\\\\n  \\\\u00e2\\\\u201d\\\\u201d\\\\u00e2\\\\u201d\\\\u20ac input / email\\\\n  \\\\u00e2\\\\u201d\\\\u201d\\\\u00e2\\\\u201d\\\\u20ac input / password\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### \\\\u00e2\\\\u0153\\\\u2026 **Version Component Variants**\\\\n\\\\nWhen creating iterations:\\\\n\\u0060\\u0060\\u0060\\\\nheader\\\\nheader / v2\\\\nheader / with search\\\\n\\u0060\\u0060\\u0060\\\\n\\\\nOr use Penpot\\u0027s component variant system.\\\\n\\\\n### \\\\u00e2\\\\u0153\\\\u2026 **Document Special Cases**\\\\n\\\\nUse descriptions in Penpot for unusual naming:\\\\n- Why this name was chosen\\\\n- What states exist\\\\n- Prototype connections\\\\n\\\\n### \\\\u00e2\\\\u0153\\\\u2026 **Maintain a Component Library**\\\\n\\\\nDedicated page: \\\\\\u0022Main components\\\\\\u0022 or \\\\\\u0022Design System\\\\\\u0022\\\\n- All reusable components defined here\\\\n- Instances used in prototype screens\\\\n- Single source of truth\\\\n\\\\n---\\\\n\\\\n## Checklist Before Export/Handoff\\\\n\\\\n- [ ] All boards have meaningful names (no \\\\\\u0022Board 3\\\\\\u0022)\\\\n- [ ] All components follow \\u0060type / name\\u0060 pattern\\\\n- [ ] No generic names (\\u0060svg-*\\u0060, \\u0060Rectangle\\u0060, \\u0060Group\\u0060)\\\\n- [ ] Layout sections have semantic names\\\\n- [ ] Instances describe what they represent\\\\n- [ ] Interactive elements are clearly named\\\\n- [ ] Component variants use consistent pattern\\\\n- [ ] Names will translate to good code identifiers\\\\n- [ ] Layer panel is navigable by name alone\\\\n\\\\n---\\\\n\\\\n## Integration with Framework\\\\n\\\\n### For Designers:\\\\n- Follow these conventions in all Penpot files\\\\n- Think about how names will appear in code\\\\n- Use consistent patterns within and across projects\\\\n\\\\n### For FnMCP.Penpot:\\\\n- Parse names to discover component types\\\\n- Generate F# types from board/component names\\\\n- Map prototype interactions using element names\\\\n- Create GWT scenarios with readable identifiers\\\\n\\\\n### For Event Modeling:\\\\n- Screen names become state names\\\\n- Component names become view/command identifiers\\\\n- Maintain consistency with EM color conventions\\\\n\\\\n---\\\\n\\\\n## Evolution and Refinement\\\\n\\\\nThis is a living document. As we learn what works:\\\\n- Add new patterns that emerge\\\\n- Refine existing conventions\\\\n- Document exceptions and edge cases\\\\n- Update based on real project experience\\\\n\\\\n**Next update:** After completing LaundryLog and PerDiemLog design cycles.\\\\n\\\\n---\\\\n\\\\n## Quick Reference Card\\\\n\\\\n\\u0060\\u0060\\u0060\\\\nBOARDS (States):     Title Case, Purpose    \\\\u00e2\\\\u2020\\\\u2019 \\\\\\u0022Home\\\\\\u0022, \\\\\\u0022Loading\\\\\\u0022\\\\nCOMPONENTS:          type / name            \\\\u00e2\\\\u2020\\\\u2019 \\\\\\u0022button / submit\\\\\\u0022\\\\nLAYOUT:              lowercase, semantic    \\\\u00e2\\\\u2020\\\\u2019 \\\\\\u0022header\\\\\\u0022, \\\\\\u0022navigation\\\\\\u0022  \\\\nINSTANCES:           what they represent    \\\\u00e2\\\\u2020\\\\u2019 \\\\\\u0022location\\\\\\u0022, \\\\\\u0022product\\\\\\u0022\\\\nVARIANTS:            name / state           \\\\u00e2\\\\u2020\\\\u2019 \\\\\\u0022button / hover\\\\\\u0022\\\\nEVENT MODEL:         type / EventName       \\\\u00e2\\\\u2020\\\\u2019 \\\\\\u0022event / SessionStarted\\\\\\u0022\\\\n\\\\nAVOID: svg-*, Rectangle, Group, Board, generic names\\\\nTHINK: Can I find this? Will code make sense? Is it descriptive?\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n**Remember: Good naming is not optional. It\\u0027s foundational to the framework.**\\\\n\\u0022, \\u0022filename\\u0022: \\u0022/mnt/project/penpot-naming-conventions.md\\u0022}\"}}"

