es cost)\n   361\t- Open standards over proprietary\n   362\t- User control over developer control\n   363\t- Practical over ideological\n   364\t- Tested over theoretical\n   365\t\n   366\t## PROJECT-SPECIFIC NOTES\n   367\t\n   368\tQuickBooks_frustration: Paying for 4 micro businesses is unsustainable and exploitative\n   369\tinternet_gratitude: Benefited from free information since 1994, now giving back\n   370\teducation_goal: Help others learn what was hard for me to learn\n   371\tcommunity_value: Shared datasets help everyone when voluntarily contributed\n   372\tinfluence_is_fair: Contribution earns prioritization, free-riding gets ignored\n   373\t\n   374\t## USAGE NOTES FOR AI ASSISTANTS\n   375\t\n   376\tWhen working on IvanTheGeek projects:\n   377\t1. Check which ecosystem (Cheddar or FnTools)\n   378\t2. Apply relevant principles and constraints\n   379\t3. Consider target audience\n   380\t4. Follow brand guidelines\n   381\t5. Design for appropriate platform (mobile/desktop)\n   382\t6. Always provide local-first option\n   383\t7. Consider influence system implications\n   384\t8. Maintain consistency with existing apps\n   385\t9. Reference education resources where helpful\n   386\t10. Build what's actually needed, not what's theoretically interesting\n   387\t\n   388\tWhen uncertain: Ask for clarification rather than assume.\n   389\tWhen conflicting requirements: Favor user freedom and privacy.\n   390\tWhen designing UX: Think thumb-friendly, intuitive, no dark patterns.\n   391\tWhen considering features: Ask \"does this solve a real problem?\"\n   392"

