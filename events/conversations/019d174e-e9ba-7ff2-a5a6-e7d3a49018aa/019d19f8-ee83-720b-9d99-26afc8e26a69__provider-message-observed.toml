users see and enter. Business rules belong in Given/When/Then specifications attached to commands.\n   784\t\n   785\t**Pitfall: Arrows everywhere**\n   786\t- **Problem**: Excessive connectors create visual clutter\n   787\t- **Solution**: Use connectors within patterns (commandâ†’event, eventâ†’view) but not between slices. Events are the contracts - their presence on the timeline shows information flow.\n   788\t\n   789\t**Pitfall: Skipping Information Completeness**\n   790\t- **Problem**: Missing data discovered during implementation requires rework\n   791\t- **Solution**: Always trace every field from origin to destination. This 30-minute check saves hours of rework later.\n   792\t\n   793\t**Pitfall: Vertical stacking of screens**\n   794\t- **Problem**: Same screen appears in multiple places vertically\n   795\t- **Solution**: Each state change is a separate slice arranged side-by-side horizontally. If the same UI appears at different points in time, show it multiple times along the timeline.\n   796\t\n   797\t**Pitfall: Technical implementation details in model**\n   798\t- **Problem**: Including database schemas, APIs, frameworks in Event Model\n   799\t- **Solution**: Event Modeling is technology-agnostic and implementation-independent. Focus on information flow and business behavior, not technical architecture.\n   800\t\n   801\t**Pitfall: Not versioning the model**\n   802\t- **Problem**: Losing track of changes or unable to roll back\n   803\t- **Solution**: Use Penpot's version pinning religiously. Pin before major changes and at completion of each sprint or milestone.\n   804\t\n   805\t## Conclusion\n   806\t\n   807\tCreating Event Models in Penpot combines visual design thinking with rigorous systems analysis. The platform's component system, layer hierarchy, and REST API make it uniquely suited for Event Modeling that serves as both documentation and code generation source.\n   808\t\n   809\t**Remember the core principles**:\n   810\t- **Three moving pieces**: Wireframes, Commands/Events, Views\n   811\t- **Four patterns**: State Change, State View, Automation, Translation\n   812\t- **Information Completeness**: Every field traced from origin to destination\n   813\t- **Slice independence**: Each slice is a complete vertical cut deployable separately\n   814\t- **Timeline organization**: Left to right represents progression through time\n   815\t- **Visual simplicity**: Focus on information flow, not implementation details\n   816\t\n   817\t**The Event Model is your system blueprint**. Invest time creating it thoroughly before coding begins. The result: predictable delivery, flat cost curves, parallel development, and the \"done is done\" quality where completed work never needs revisiting when new features are added.\n   818\t\n   819\tPenpot's open-source nature, web-standard foundation, and programmable API make this vision of bidirectional design-code sync achievable. Use this guide to create Event Models that bridge the gap between business vision, UX design, and technical implementation."

