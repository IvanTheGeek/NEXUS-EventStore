ts recent location\\\\n     c) Types in: input / location name\\\\n     d) Skips location\\\\n   \\\\u2192 Tap: button / continue\\\\n3. LaundryLog Home\\\\n   \\\\u2192 Continue with manual/selected location\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Review History Path\\\\n\\u0060\\u0060\\u0060\\\\n1. History\\\\n   \\\\u2192 User taps nav icon: History \\\\ud83d\\\\udccb\\\\n   \\\\u2192 Sees list of: card / session entry\\\\n   \\\\u2192 User taps one card\\\\n2. Session Detail (would need to be designed)\\\\n   \\\\u2192 Shows full session breakdown\\\\n   \\\\u2192 Tap: button / back\\\\n3. History\\\\n   \\\\u2192 Back to list\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n## Mobile-First Principles Applied\\\\n\\\\n\\\\u2705 **Thumb-Friendly Controls**\\\\n- Large buttons (80px height for primary actions)\\\\n- Touch targets minimum 44px\\\\n- Important buttons at bottom (easy thumb reach)\\\\n\\\\n\\\\u2705 **Minimal Typing**\\\\n- Buttons instead of text input where possible\\\\n- Recent locations reduce typing\\\\n- Pre-filled common values\\\\n\\\\n\\\\u2705 **Quick Entry Flow**\\\\n- 3 taps minimum for simple session (machine \\u002B quarters \\u002B submit)\\\\n- Always show running total\\\\n- Single-screen primary workflow\\\\n\\\\n\\\\u2705 **Clear Visual Hierarchy**\\\\n- Important info large and prominent\\\\n- Session total always visible\\\\n- Consistent button sizes by importance\\\\n\\\\n\\\\u2705 **Offline-First**\\\\n- No cloud dependency shown\\\\n- Local storage emphasized\\\\n- Manual export available\\\\n\\\\n\\\\u2705 **Error Recovery**\\\\n- Clear error messages\\\\n- Multiple recovery options\\\\n- Never block user completely\\\\n\\\\n---\\\\n\\\\n## Implementation Notes\\\\n\\\\n### Data Storage\\\\n- Local SQLite or similar\\\\n- Sessions stored immediately\\\\n- No cloud dependency\\\\n- Export to YAML for CheddarBooks\\\\n\\\\n### GPS Strategy\\\\n- Request permission on first launch\\\\n- Auto-capture when app opens at new location\