eventual consistency)\n\n### 6. **Bolero/Blazor Hybrid Specifics**\n- MVU with Elmish integration\n- Type-safe routing using DUs\n- BlazorWebView: .NET MAUI (Win/Mac/iOS/Android) + JinShil/BlazorWebView for Linux (WebKitGTK)\n- Razor Class Libraries (RCL) for shared components\n\n### 7. **Version Control Integration**\n- Git LFS for large assets, regular Git for JSON metadata\n- Middleware tracking: Git commit ↔ Penpot file ↔ F# types\n\n## Recommendation\n\n**Expand `ivan-dev-framework-overview.md`** with a new \"Technical Implementation Details\" section that captures these specifics. This:\n- Keeps everything in one authoritative document\n- Adds technical depth without fragmenting knowledge\n- Makes it easy to reference when implementing\n\nThen we can **remove** the FnMCP_Penpot document since it was based on incorrect architecture (separate MCP server).\n\n**Should I proceed with expanding the framework overview to include these technical details, then remove the outdated document?**"

