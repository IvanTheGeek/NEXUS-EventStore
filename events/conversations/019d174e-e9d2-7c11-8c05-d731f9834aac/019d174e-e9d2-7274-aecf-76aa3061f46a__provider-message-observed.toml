\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\n\\uD83D\\uDCCA Context: [\\u2588\\u2588\\u2588\\u2588\\u2588\\u2588\\u2588\\u2588\\u2591\\u2591\\u2591\\u2591\\u2591\\u2591\\u2591\\u2591\\u2591\\u2591\\u2591\\u2591] 75.2K/190K (39.6%)\\n\\nKnowledge: 15K (20%) | Conversation: 57K (76%) | Response: 3K (4%)\\nRemaining: 114.8K (60.4%) \\u2713\\n\\u0060\\u0060\\u0060\\n**Pros:** Visual \\u002B compact \\u002B breakdown  \\n**Cons:** May not render perfectly in all views\\n\\n---\\n\\n## **Option 5: Progressive Detail** (Smart)\\n\\u0060\\u0060\\u0060\\nNormal state (\\u003C 75%):\\n\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\n\\uD83D\\uDCCA Context: 75.2K used (39%) | 114.8K remaining (61%) \\u2713\\n\\nWarning state (75-85%):\\n\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\n\\u26A0\\uFE0F  Context: 152K used (80%) | 38K remaining (20%)\\n    \\n    Knowledge: 15K | Conversation: 134K | Response: 3K\\n    Consider: Starting new chat or summarizing\\n\\nCritical state (85%\\u002B):\\n\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\u2501\\n\\uD83D\\uDD34 Context: 171K used (90%) | 19K remaining (10%)\\n    \\n    Breakdown:\\n    \\u251C\\u2500 Project Knowledge: 15K (9%)\\n    \\u251C\\u2500 Conversation:     153K (89%)\\n    \\u2514\\u2500 This Response:      3K (2%)\\n    \\n    \\u26