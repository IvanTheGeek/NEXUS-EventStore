kind = "plain_text"
text = "Command: LogLaundryExpense\r\nEvent: LaundryExpenseLogged > I like the expense in it. |\nthe visit or session as I kind a refer to it is not really important to the domain/business perspective, its more a app convince. The scenario id that I have 3 loads of laundry to do. The truck stop has 2 washers and 2 drivers.  I load up 2 machines, swipe my credit card for each machine. I then open LaundryLog and set the location (advanced might used GPS to help decide where i am), that location will stay the same for the \"session\" which would basically be that a session might be 1 load of wash, 1 dryer, multiple of both, and multiple times that I need to move washer to driver, start new wash, etc. A session would kinda end if there are no new entries in the last 3 hours. Recording a new wash 3 hours after the last entries can be treated as a new session. Back to the story, in the app, after the location is set for the session, I hit wash, quantity of two, the cost per wash, and record it. An hour later, I move the two loads of wash to driers, start them, record the cost in the app, load and start my last 1 load in the washer, record that entry. Hour later, remove 2 dryer loads, move wash load to driver, start drier, open app, record dryer cost. three hours later, session \"end'. I now have the total cost of the session and with location and timings and matching transactions to credit card, i have an audit proving log of the expenses because receipts for proof are not available.  "

