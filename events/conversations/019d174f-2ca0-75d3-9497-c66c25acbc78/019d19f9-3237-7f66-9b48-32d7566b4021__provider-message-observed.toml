kind = "plain_text"
text = "Got it. That framing is actually very helpful for the design because it clarifies the **real purpose of the domain**:\n\nThe app is not really about laundry — it’s about **creating a reliable expense record for tax purposes**.\n\nThat means every design decision can be filtered through one question:\n\n**“Would this help someone prove a legitimate laundry expense if the IRS ever asked?”**\n\nFrom an event-modeling perspective, that implies a few important things:\n\n1. **The core event is an expense being recorded.**  \n   Something like:\n\n   ```\n   LaundryExpenseRecorded\n   ```\n\n2. The event should contain the **minimum audit-useful information**, such as:\n\n   ```\n   timestamp\n   location\n   amount\n   quantity (optional but useful)\n   machine_type (washer/dryer optional)\n   payment_type (optional)\n   ```\n\n3. The projections that matter most are things like:\n\n   - Total laundry expenses\n   - Expense history\n   - Possibly export/report later\n\n4. The **first vertical slice** becomes very clear:\n\n   ```\n   UI: Press \"Log Expense\"\n       ↓\n   Command: RecordLaundryExpense\n       ↓\n   Event: LaundryExpenseRecorded\n   ```\n\nWhich fits perfectly with the **simple purpose of the app**.\n\nIt also means your event model stays clean because you avoid modeling unnecessary things like machine states or laundromat systems — you’re only modeling **expense recording**.\n\nAs we continue designing slices, we can keep aligning them with the framing:\n\n> **“Create a trustworthy record of laundry expenses for tax purposes.”**\n\nThat constraint will keep the model **small, focused, and testable**, which is ideal for both the app and your **NEXUS experimentation**."

