text = "You're very close — the AI actually followed most instructions correctly. The **one thing it got wrong** is the **arrow direction in projection slices**.\n\nYour architectural rule is:\n\n```\nCommand Slice\nUI → Command → Event\n\nProjection Slice\nUI ← Projection ← Event\n```\n\nBut the generated code did this instead:\n\n```\nUI → Projection → Event\n```\n\nEven though it used `direction RL`, the **edges were still written in the wrong direction**. fileciteturn1file0\n\nThat’s why the diagram visually appears reversed.\n\n---\n\n# The Fix\n\nIn projection slices, the **edges must be written from Event → Projection → UI**.\n\nSo instead of:\n\n```mermaid\nUI2 --> PROJ2 --> EVT2\n```\n\nit must be:\n\n```mermaid\nEVT2 --> PROJ2 --> UI2\n```\n\n---\n\n# Correct Projection Slice Pattern\n\nYour projection slices should look like this:\n\n```mermaid\nsubgraph S2[\"View Expense History\"]\n  direction RL\n  EVT2[\"LaundryExpenseLogged\"]:::event --> PROJ2[\"ExpenseHistoryProjection\"]:::projection --> UI2[\"View Expense History\"]:::ui\nend\n```\n\nThis produces:\n\n```\nLaundryExpenseLogged → Projection → UI\n```\n\nbut because the layout direction is `RL`, it **renders visually as**\n\n```\nEvent → Projection → UI\n```\n\nwhich matches your model:\n\n```\nUI < Projection < Event\n```\n\n---\n\n# Corrected Full Example (first two slices)\n\n```mermaid\nflowchart TB\n\nsubgraph S1[\"Record Laundry Expense\"]\n  direction LR\n  UI1[\"Record Laundry Expense\"]:::ui --> CMD1[\"LogLaundryExpense\"]:::command --> EVT1[\"LaundryExpenseLogged\"]:::event\nend\n\nsubgraph S2[\"View Expense History\"]\n  direction RL\n  EVT2[\"LaundryExpenseLogged\"]:::event --> PROJ2[\"ExpenseHistoryProjection\"]:::projection --> UI2[\"View Expense History\"]:::ui\nend\n\nS1 ~~~ S2\n\nclassDef ui fill:#dddddd,stroke:#888,stroke-width:1px,rx:6,ry:6\nclassDef command fill:#cfe8ff,stroke:#6aa9ff,stroke-width:1px,rx:6,ry:6\nclassDef projection fill:#d8f5d0,stroke:#7bc96f,stroke-width:1px,rx:6,ry:6\nclassDef event fill:#ffe6cc,stroke:#f0a35e,stroke-width:1px,rx:6,ry:6\n\nstyle S1 fill:#f4f9ff,stroke:#6aa9ff,stroke-width:1px\nstyle S2 fill:#f3fff0,stroke:#7bc96f,stroke-width:1px\n```\n\n---\n\n# Why this mistake happens with AI\n\nMost LLMs assume:\n\n```\nUI → Logic → Result\n```\n\nThey don't realize **projection slices reverse the dependency direction**.\n\nEvent modeling is unusual because projections are **read models derived from events**, so the dependency is reversed.\n\nThis pattern comes from **Event Modeling** as described by  \nentity[\"people\",\"Adam Dymitruk\",\"event modeling advocate\"].\n\n---\n\n# If you want, I can also give you a **much more reliable prompt**\n\nThe previous prompt still leaves room for the AI to make this mistake.  \nI can give you a **stronger prompt that forces the correct projection arrows every time**.\n\nIt usually fixes this problem completely."

