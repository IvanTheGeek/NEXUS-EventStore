text = "Here is a **carefully engineered prompt** you can paste into another AI (like Claude) that has **zero context**.  \nIt explicitly describes:\n\n- the **diagram structure**\n- the **styling rules**\n- the **Mermaid syntax requirements**\n- the **slice pattern**\n- the **data from your attached file**\n\nThis ensures the AI will reproduce the **same polished Mermaid diagram style**.\n\n---\n\n# Prompt to Give Another AI\n\nYou are generating a **Mermaid flowchart diagram** that visually represents an **Event Modeling style architecture** using **command slices and projection slices**.\n\nFollow the instructions **exactly**.\n\n---\n\n# Diagram Requirements\n\nCreate a **Mermaid `flowchart TB` diagram**.\n\nThe diagram should consist of **6 slices**, stacked **vertically**.\n\nEach slice must be contained inside a **Mermaid subgraph**.\n\nSlices must alternate between:\n\n1. **Command Slice**\n2. **Projection Slice**\n\nCommand slices show:\n\n```\nUI → Command → Event\n```\n\nProjection slices show:\n\n```\nUI ← Projection ← Event\n```\n\nThe projection slice should therefore use **direction RL** so arrows visually flow toward the UI.\n\n---\n\n# Visual Style Requirements\n\nThe diagram should resemble a **sticky-note style event modeling board**.\n\n### Node types and colors\n\nUse these class definitions exactly.\n\nUI nodes:\n\n```\nclassDef ui fill:#dddddd,stroke:#888,stroke-width:1px,rx:6,ry:6;\n```\n\nCommand nodes:\n\n```\nclassDef command fill:#cfe8ff,stroke:#6aa9ff,stroke-width:1px,rx:6,ry:6;\n```\n\nProjection nodes:\n\n```\nclassDef projection fill:#d8f5d0,stroke:#7bc96f,stroke-width:1px,rx:6,ry:6;\n```\n\nEvent nodes:\n\n```\nclassDef event fill:#ffe6cc,stroke:#f0a35e,stroke-width:1px,rx:6,ry:6;\n```\n\nThese rounded rectangles simulate **sticky notes**.\n\n---\n\n### Slice container styling\n\nCommand slices must have a **light blue container**:\n\n```\nstyle S# fill:#f4f9ff,stroke:#6aa9ff,stroke-width:1px\n```\n\nProjection slices must have a **light green container**:\n\n```\nstyle S# fill:#f3fff0,stroke:#7bc96f,stroke-width:1px\n```\n\nReplace `#` with the slice number.\n\n---\n\n### Layout rule\n\nSlices must stack vertically using spacer links:\n\n```\nS1 ~~~ S2\nS2 ~~~ S3\n...\n```\n\n---\n\n# Important Modeling Rule\n\nThe boxes **must only contain the business name**, not their role.\n\nFor example:\n\nCorrect:\n\n```\nLogLaundryExpense\n```\n\nIncorrect:\n\n```\nCommand: LogLaundryExpense\n```\n\nColor communicates the role.\n\n---\n\n# Slice Data\n\nUse the following slice definitions exactly.\n\n### Slice 1 — Command\n\n```\nRecord Laundry Expense\nRecord Laundry Expense → LogLaundryExpense → LaundryExpenseLogged\n```\n\n---\n\n### Slice 2 — Projection\n\n```\nView Expense History\nView Expense History ← ExpenseHistoryProjection ← LaundryExpenseLogged\n```\n\n---\n\n### Slice 3 — Command\n\n```\nModify Laundry Expense\nModify Laundry Expense → EditLaundryExpense → LaundryExpenseEdited\n```\n\n---\n\n### Slice 4 — Projection\n\n```\nView Updated Expense History\nView Updated Expense History ← ExpenseHistoryProjection ← LaundryExpenseEdited\n```\n\n---\n\n### Slice 5 — Command\n\n```\nRemove Laundry Expense\nRemove Laundry Expense → DeleteLaundryExpense → LaundryExpenseDeleted\n```\n\n---\n\n### Slice 6 — Projection\n\n```\nView Final Expense History\nView Final Expense History ← ExpenseHistoryProjection ← LaundryExpenseDeleted\n```\n\n---\n\n# Final Requirements\n\nThe output must contain **only the Mermaid diagram code block**.\n\nStart with:\n\n```\n```mermaid\n```\n\nand end with:\n\n```\n```\n```\n\nDo not include explanations.\n\nThe final result should visually resemble an **event modeling board with alternating command and projection slices**.\n\n---\n\n✅ This prompt works well because it explicitly controls:\n\n- structure\n- layout\n- slice direction\n- styling\n- naming rules\n- container coloring\n\nso the AI reliably reproduces your **exact polished Mermaid diagram style**."

