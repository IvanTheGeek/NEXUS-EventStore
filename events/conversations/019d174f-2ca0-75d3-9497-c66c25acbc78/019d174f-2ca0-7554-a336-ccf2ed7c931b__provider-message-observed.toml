text = "fileciteturn0file1\n\n<!DOCTYPE html>\r\n<html lang=\"en\">\r\n<head>\r\n    <meta charset=\"UTF-8\">\r\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\r\n    <title>LaundryLog - CheddarBooks</title>\r\n    <style>\r\n        * {\r\n            margin: 0;\r\n            padding: 0;\r\n            box-sizing: border-box;\r\n        }\r\n\r\n        body {\r\n            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;\r\n            background: #f8f9fa;\r\n            color: #2d3748;\r\n            padding-bottom: 80px;\r\n        }\r\n\r\n        .header {\r\n            background: linear-gradient(135deg, #ffcc80 0%, #ffb74d 100%);\r\n            color: white;\r\n            padding: 1rem 1rem 1rem 1rem;\r\n            box-shadow: 0 2px 8px rgba(0,0,0,0.15);\r\n            display: flex;\r\n            justify-content: space-between;\r\n            align-items: center;\r\n        }\r\n\r\n        .header-text h1 {\r\n            font-size: 1.5rem;\r\n            font-weight: 700;\r\n            margin-bottom: 0.125rem;\r\n        }\r\n\r\n        .header-text p {\r\n            font-size: 0.75rem;\r\n            opacity: 0.95;\r\n            font-weight: 500;\r\n        }\r\n\r\n        .header-badge {\r\n            width: 48px;\r\n            height: 48px;\r\n            background: rgba(255, 255, 255, 0.25);\r\n            border-radius: 12px;\r\n            display: flex;\r\n            align-items: center;\r\n            justify-content: center;\r\n            font-size: 1.5rem;\r\n            border: 2px solid rgba(255, 255, 255, 0.3);\r\n        }\r\n\r\n        .container {\r\n            padding: 1rem;\r\n            max-width: 600px;\r\n            margin: 0 auto;\r\n        }\r\n\r\n        .form-section {\r\n            background: white;\r\n            border-radius: 0.75rem;\r\n            padding: 1.25rem;\r\n            margin-bottom: 1rem;\r\n      