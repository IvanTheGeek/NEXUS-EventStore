        <!-- Quantity Section -->\r\n        <div class=\"form-section\" id=\"quantitySection\">\r\n            <div class=\"quantity-section\">\r\n                <div class=\"field-label\">Quantity</div>\r\n                <div class=\"quantity-controls\">\r\n                    <button class=\"counter-btn\" onclick=\"updateCounter(-1)\">−</button>\r\n                    <input type=\"number\" \r\n                           class=\"counter-input\" \r\n                           id=\"quantityField\"\r\n                           value=\"1\" \r\n                           min=\"1\"\r\n                           inputmode=\"numeric\"\r\n                           onfocus=\"scrollQuantityIntoView()\"\r\n                           onchange=\"updateCounterFromInput()\">\r\n                    <button class=\"counter-btn\" onclick=\"updateCounter(1)\">+</button>\r\n                </div>\r\n            </div>\r\n        </div>\r\n\r\n        <!-- Unit Price Section -->\r\n        <div class=\"form-section\" id=\"priceSection\">\r\n            <div class=\"price-input-section\">\r\n                <div class=\"field-label\">Unit Price</div>\r\n                <div class=\"price-main-row\">\r\n                    <button class=\"quarter-btn\" onclick=\"adjustPrice(-0.25)\">\r\n                        <div class=\"quarter-content\">\r\n                            <span class=\"quarter-sign\">−</span>\r\n                            <span class=\"quarter-value\">25¢</span>\r\n                        </div>\r\n                    </button>\r\n                    <div class=\"price-input-wrapper\">\r\n                        <span class=\"dollar-sign\">$</span>\r\n                        <input type=\"number\" \r\n                               step=\"0.01\" \r\n                               class=\"price-input\" \r\n                               id=\"priceField\"\r\n                               value=\"3.00\"\r\n                               inputmode=\"decimal\"\r\n                               onfocus=\"scrollPriceIntoView()\">\r\n                    </div>\r\n                    <button class=\"quarter-btn\" onclick=\"adjustPrice(0.25)\">\r\n                        <div class=\"quarter-content\">\r\n                            <span class=\"quarter-sign\">+</span>\r\n                            <span class=\"quarter-value\">25¢</span>\r\n                        </div>\r\n                    </button>\r\n                </div>\r\n\r\n                <div class=\"quick-fill-buttons\">\r\n                    <button class=\"quick-fill-btn\" onclick=\"quickFillPrice(3.75)\">\r\n                        $3.75\r\n                        <span class=\"quick-fill-label\">Last used</span>\r\n                    </button>\r\n                    <button class=\"quick-fill-btn\" onclick=\"quickFillPrice(4.00)\">\r\n                        $4.00\r\n                        <span class=\"quick-fill-label\">Historical</span>\r\n                    </button>\r\n                    <button class=\"quick-fill-btn\" onclick=\"quickFillPrice(3.50)\">\r\n                        $3.50\r\n                        <span class=\"quick-fill-label\">Community</span>\r\n                    </button>\r\n                </div>\r\n            </div>\r\n\r\n            <div class=\"entry-total\">\r\n                <span class=\"entry-total-label\">Entry Total</span>\r\n                <span class=\"entry-total-amount\" id=\"entryTotal\">$3.00</span>\r\n            </div>\r\n        </div>\r\n\r\n        <!-- Payment Type Section (no heading) -->\r\n        <div class=\"form-section\">\r\n            <div class=\"button-group button-group-4\">\r\n                <button class=\"btn-option\" onclick=\"selectPayment('cash')\">💵<br>Cash</button>\r\n                <button class=\"btn-option\" onclick=\"selectPayment('points')\">⭐<br>Points</button>\r\n                <button class=\"btn-option\" onclick=\"selectPayment('card')\">💳<br>Card</button>\r\n                <button class=\"btn-option\" onclick=\"selectPayment('app')\">📱<br>App</button>\r\n            </div>\r\n        </div>\r\n\r\n        <button class=\"submit-btn\" id=\"submitBtn\" onclick=\"logEntry()\" disabled>\r\n            <span class=\"validation-tag invalid\">📍 Location ✗</span>\r\n            <span class=\"validation-tag invalid\">🌊 Type ✗</span>\r\n            <span class=\"validation-tag invalid\">💳 Payment ✗</span>\r\n        </button>\r\n\r\n        <!-- Session Total Bar -->\r\n        <div class=\"session-total\">\r\n            <span class=\"session-total-label\">Session Total</span>\r\n            <span class=\"session-total-amount\">$0.00</span>\r\n        </div>\r\n\r\n        <!-- Recent Entries -->\r\n        <div class=\"recent-entries\">\r\n            <div class=\"entries-title\">Today's Entries</div>\r\n            \r\n            <div class=\"entry-card\">\r\n                <div class=\"entry-header\">\r\n                    <div class=\"entry-amount\">$11.25</div>\r\n                    <div class=\"entry-time\">2:34 PM</div>\r\n                </div>\r\n                <div class=\"entry-details\">\r\n                    3 Washers @ $3.75 • Credit Card\r\n                </div>\r\n            </div>\r\n\r\n            <div class=\"entry-card\">\r\n                <div class=\"entry-header\">\r\n                    <div class=\"entry-amount\">$6.00</div>\r\n                    <div class=\"entry-time\">2:38 PM</div>\r\n                </div>\r\n                <div class=\"entry-details\">\r\n                    3 Dryers @ $2.00 • Credit Card\r\n                </div>\r\n            </div>\r\n\r\n            <div class=\"entry-card\">\r\n                <div class=\"entry-header\">\r\n                    <div class=\"entry-amount\">$2.50</div>\r\n                    <div class=\"entry-time\">2:40 PM</div>\r\n                </div>\r\n                <div class=\"entry-details\">\r\n                    1 Supplies @ $2.50 • Cash\r\n                </div>\r\n            </div>\r\n        </div>\r\n    </div>\r\n\r\n    <script>\r\n        let selectedMachine = null;\r\n        let selectedPayment = null;\r\n        let sessionTotal = 0.00;\r\n\r\n        // Initialize with default values\r\n        calculateEntryTotal();\r\n\r\n        function selectMachine(type) {\r\n            selectedMachine = type;\r\n            document.querySelectorAll('.button-group-3 .btn-option').forEach(btn => {\r\n                btn.classList.remove('selected');\r\n            });\r\n            event.target.classList.add('selected');\r\n            \r\n            // Update machine type icon in validation\r\n            const machineIcons = {\r\n                'washer': '🌊',\r\n                'dryer': '🔥',\r\n                'supplies': '🧴'\r\n            };\r\n            document.getElementById('machineValidation').innerHTML = machineIcons[type] + ' Type ✓';\r\n            \r\n            calculateEntryTotal();\r\n            validateForm();\r\n        }\r\n\r\n        function selectPayment(type) {\r\n            selectedPayment = type;\r\n            document.querySelectorAll('.button-group-4 .btn-option').forEach(btn => {\r\n                btn.classList.remove('selected');\r\n            });\r\n            event.target.classList.add('selected');\r\n            \r\n            // Update payment icon in validation\r\n            const paymentIcons = {\r\n                'cash': '💵',\r\n                'points': '⭐',\r\n                'card': '💳',\r\n                'app': '📱'\r\n            };\r\n            document.getElementById('paymentValidation').innerHTML = paymentIcons[type] + ' Payment ✓';\r\n            \r\n            validateForm();\r\n        }\r\n\r\n        function updateCounter(delta) {\r\n            const quantityField = document.getElementById('quantityField');\r\n            let currentValue = parseInt(quantityField.value) || 1;\r\n            let newValue = Math.max(1, currentValue + delta);\r\n            quantityField.value = newValue;\r\n            calculateEntryTotal();\r\n        }\r\n\r\n        function updateCounterFromInput() {\r\n            const quantityField = document.getElementById('quantityField');\r\n            let value = parseInt(quantityField.value) || 1;\r\n            quantityField.value = Math.max(1, value);\r\n            calculateEntryTotal();\r\n        }\r\n\r\n        function adjustPrice(delta) {\r\n            const priceField = document.getElementById('priceField');\r\n            const currentPrice = parseFloat(priceField.value) || 0;\r\n            const newPrice = Math.max(0, currentPrice + delta);\r\n            priceField.value = newPrice.toFixed(2);\r\n            calculateEntryTotal();\r\n        }\r\n\r\n        function quickFillPrice(amount) {\r\n            document.getElementById('priceField').value = amount.toFixed(2);\r\n            calculateEntryTotal();\r\n        }\r\n\r\n        function calculateEntryTotal() {\r\n            const quantity = parseInt(document.getElementById('quantityField').value) || 1;\r\n            const unitPrice = parseFloat(document.getElementById('priceField').value) || 0;\r\n            const total = quantity * unitPrice;\r\n            document.getElementById('entryTotal').textContent = '$' + total.toFixed(2);\r\n        }\r\n\r\n        function validateForm() {\r\n            const location = document.getElementById('locationField').value.trim();\r\n            const submitBtn = document.getElementById('submitBtn');\r\n            \r\n            const isValid = location && selectedMachine && selectedPayment;\r\n            \r\n            // Update location validation\r\n            const locationTag = document.getElementById('locationValidation');\r\n            if (location) {\r\n                locationTag.innerHTML = '📍 Location ✓';\r\n                locationTag.className = 'validation-tag valid';\r\n            } else {\r\n                locationTag.innerHTML = '📍 Location ✗';\r\n                locationTag.className = 'validation-tag invalid';\r\n            }\r\n            \r\n            // Update machine validation\r\n            const machineTag = document.getElementById('machineValidation');\r\n            if (selectedMachine) {\r\n                machineTag.className = 'validation-tag valid';\r\n            } else {\r\n                machineTag.className = 'validation-tag invalid';\r\n            }\r\n            \r\n            // Update payment validation\r\n            const paymentTag = document.getElementById('paymentValidation');\r\n            if (selectedPayment) {\r\n                paymentTag.className = 'validation-tag valid';\r\n            } else {\r\n                paymentTag.className = 'validation-tag invalid';\r\n            }\r\n            \r\n            // Enable/disable button and update content\r\n            if (isValid) {\r\n                submitBtn.disabled = false;\r\n                submitBtn.innerHTML = 'Log Entry';\r\n            } else {\r\n                submitBtn.disabled = true;\r\n                submitBtn.innerHTML = `\r\n                    <span class=\"validation-tag ${location ? 'valid' : 'invalid'}\" id=\"locationValidation\">📍 Location ${location ? '✓' : '✗'}</span>\r\n                    <span class=\"validation-tag ${selectedMachine ? 'valid' : 'invalid'}\" id=\"machineValidation\">${selectedMachine ? (selectedMachine === 'washer' ? '🌊' : selectedMachine === 'dryer' ? '🔥' : '🧴') + ' Type ✓' : '🌊 Type ✗'}</span>\r\n                    <span class=\"validation-tag ${selectedPayment ? 'valid' : 'invalid'}\" id=\"paymentValidation\">${selectedPayment ? (selectedPayment === 'cash' ? '💵' : selectedPayment === 'points' ? '⭐' : selectedPayment === 'card' ? '💳' : '📱') + ' Payment ✓' : '💳 Payment ✗'}</span>\r\n                `;\r\n            }\r\n        }\r\n\r\n        function scrollQuantityIntoView() {\r\n            setTimeout(() => {\r\n                const quantitySection = document.getElementById('quantitySection');\r\n                quantitySection.scrollIntoView({ behavior: 'smooth', block: 'start' });\r\n            }, 300);\r\n        }\r\n\r\n        function scrollPriceIntoView() {\r\n            setTimeout(() => {\r\n                const priceSection = document.getElementById('priceSection');\r\n                priceSection.scrollIntoView({ behavior: 'smooth', block: 'start' });\r\n            }, 300);\r\n        }\r\n\r\n        function getLocation() {\r\n            if (navigator.geolocation) {\r\n                navigator.geolocation.getCurrentPosition(\r\n                    (position) => {\r\n                        document.getElementById('locationField').value = 'Pilot Travel Center, Exit 42';\r\n                        validateForm();\r\n                        alert(`GPS: ${position.coords.latitude}, ${position.coords.longitude}\\n\\nIn real app: Would check personal datastore first, then community database for this location.`);\r\n                    },\r\n                    (error) => {\r\n                        alert('Unable to get GPS location. Please enter manually.');\r\n                    }\r\n                );\r\n            } else {\r\n                alert('Geolocation not supported by this browser.');\r\n            }\r\n        }\r\n\r\n        function logEntry() {\r\n            const location = document.getElementById('locationField').value;\r\n            const quantity = parseInt(document.getElementById('quantityField').value) || 1;\r\n            const unitPrice = parseFloat(document.getElementById('priceField').value) || 0;\r\n            \r\n            const entryTotal = quantity * unitPrice;\r\n            sessionTotal += entryTotal;\r\n            document.querySelector('.session-total-amount').textContent = '$' + sessionTotal.toFixed(2);\r\n\r\n            // Reset for next entry (but keep location and payment type)\r\n            document.getElementById('quantityField').value = '1';\r\n            // Keep the price prefilled from historical/last used/default\r\n            calculateEntryTotal();\r\n            \r\n            // Clear machine selection\r\n            selectedMachine = null;\r\n            document.querySelectorAll('.button-group-3 .btn-option').forEach(btn => {\r\n                btn.classList.remove('selected');\r\n            });\r\n            \r\n            validateForm();\r\n\r\n            alert('Entry logged! Session total: $' + sessionTotal.toFixed(2));\r\n        }\r\n\r\n        // Listen for field changes\r\n        document.getElementById('priceField').addEventListener('input', calculateEntryTotal);\r\n        document.getElementById('quantityField').addEventListener('input', calculateEntryTotal);\r\n        \r\n        // Initial validation state\r\n        validateForm();\r\n    </script>\r\n</body>\r\n</html>"

