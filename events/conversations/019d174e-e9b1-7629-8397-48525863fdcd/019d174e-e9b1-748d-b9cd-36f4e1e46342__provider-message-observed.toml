text = "Based on your framework documentation, **paths** are the organizing principle that ties together development, testing, and documentation. Here's how they work:\n\n## What Paths Are\n\nPaths are **specific execution traces** through your system - think \"Choose Your Own Adventure\" books where one story contains hundreds of possible storylines through branching choices.\n\nEach path is:\n- **Deterministic**: Specific inputs → specific choices → specific outcomes\n- **Concrete**: Real example data (like `count: 2, unit_price: 4.00`), not abstract placeholders\n- **Complete**: Follows one route through all decision points in the system\n\n## Types of Paths\n\nYour framework recognizes paths beyond just the \"happy path\":\n- **Happy paths**: Everything works as intended\n- **Error paths**: Things go wrong, system handles it\n- **Edge paths**: Unusual but valid scenarios\n- **Alternative paths**: Different valid choices at decision points\n\n## Multi-Purpose Nature\n\nA single path simultaneously serves as:\n\n1. **Narrative**: \"Driver stops at truck stop, does laundry, needs receipt for taxes\"\n2. **Penpot Prototype**: Each clickable flow = one path visualized\n3. **Test Case**: Path data becomes Given-When-Then scenarios with concrete fixtures\n4. **Documentation**: Shows how the system actually works with real examples\n5. **Event Model Validation**: Missing paths = missing requirements\n\n## Path Structure\n\n```yaml\npath_id: \"laundry-log-happy\"\nnarrative: \"Driver completes laundry successfully\"\nsteps:\n  - screen: \"LaundryLogHome\"\n    event: \"UserOpenedApp\"\n    branches_to: [\"EnterWashers\", \"ViewHistory\"]\n  - screen: \"EnterWashers\"  \n    event: \"UserEnteredWashCount\"\n    data: {count: 2, unit_price: 4.00}\n```\n\n## How They're Used\n\n**In Penpot**: Prototype connections define paths, which tools can extract\n**In EMapp**: Users navigate paths interactively (\"What happens next?\")\n**In Testing**: Each path becomes executable GWT scenarios\n**In Forum**: Paths are discussed, refined, and organized as GWT catalog\n\nDoes this answer your question about paths, or would you like me to dive deeper into a specific aspect (extraction from Penpot, GWT generation, storage, etc.)?"

