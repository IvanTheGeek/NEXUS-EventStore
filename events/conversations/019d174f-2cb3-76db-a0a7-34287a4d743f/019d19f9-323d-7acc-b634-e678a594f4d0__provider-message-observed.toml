text = "I've been thinking about cortex and the different layers. So one of my frustrations with, you know, ChatGPT or Claude or any of these models is that when I come up with, or when we come up with a point or, you know, a principle or a value or whatever, if I start a new chat with you, you don't, you have some memory and you have some context, but it's incomplete. It's not a fully fledged system where, hey, if I'm talking to you in this area, these are the rules that apply. These are the contexts that we've constructed. This is the context or the construct that we're working within. So I got to thinking about how there's the immediate context, which is what we're operating in right now. That's limited. So that's like human short-term memory. It's like what is in front of me right now and what am I processing? So the next step, from my understanding, would be something like a DAG that would then capture the continuous stream that we would be doing and putting it into a somewhat, well, I guess I would consider it like a notebook. If I'm working on something and I have a notebook and I'm logging and coming up with ideas and stuff, it's kind of a scratch pad or a notebook. Then after that, when things are more crystallized and more clear and that process has happened, then we start doing LORA. And then finally, if it promotes that, yeah, this is pretty fundamental, we can actually redo a retrain on the model that's being used. Am I missing other opportunities or stages or steps in any of those? And is my understanding accurate?"

