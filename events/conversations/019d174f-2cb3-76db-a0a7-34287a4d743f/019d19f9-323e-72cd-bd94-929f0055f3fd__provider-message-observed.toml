[[body.segments]]
kind = "plain_text"
text = "One of the ideas and desires that I have is that the event model basically shows behavior of the system from the business view or from the domain view. Different fidelities, different audiences, you know, the CEO may want to be like, okay, how does my company actually do what it does? A developer would be more interested in what's going on at the deeper level and have that ability to expand the view that he's looking at and see that detail. You could add those details in. UI design is kind of its own domain, while the event model does incorporate UI, it tends to be very behavior, business behavior related with just snapshots of, like, what the screen could look like, whether it's conceptual or actual screen or anywhere in between. My desire is to actually have like a UX module or view that incorporates into the model or its own model, you know, without the business drive, just the UX or UI, but essentially, how does that screen get changed from what you're seeing now to the next one? Very granular, you know, down to which button was clicked and which text was put into a field and which checkmark was selected. It doesn't really fit into Adam's view of the event model, but it coheres very well. So that would almost be another graph that would be interrelated and could be used as the source of truth."

