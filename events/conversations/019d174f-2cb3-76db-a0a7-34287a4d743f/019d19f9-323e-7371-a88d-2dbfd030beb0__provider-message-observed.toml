kind = "plain_text"
text = "Oh yeah, there's another aspect, an idea that I've had, and that is the idea of influence. So, influence is a non-tangible, non-business idea. It's more along the lines of a ranking system that integrates through everything. So, for example, if everything of sharing data is off in, if a user downloaded the app, started using it, they could choose to share their telemetry and basically the path data. Each of those data points adds, just starting out as an example, one influence point. That influence point accumulates over time if they wish to participate, because I would have to know in minimal fashion who they are so that the points could be applied to them. But those points literally influence me, and that could be foreign content, that could be answering user questions, that could be monetary gifts or even purchasing services as a business from me. But the idea is that contribution to the system is valuable, and that feedback, and that's my way of being able to quantify it."

