text = "Understanding the **three kinds of invariants** will make system modeling much clearer, especially for something like Nexus where you’re building a **truth graph of behavior**.\n\nThe reason this matters is that not all invariants are the same. They exist at different **layers of reality**.\n\n---\n\n# The Three Types of Invariants\n\nYou can think of them as:\n\n```text\nDomain Invariants\nSystem Invariants\nSecurity Invariants\n```\n\nEach protects a different aspect of the system.\n\n---\n\n# 1 — Domain Invariants\n\nThese come from **the real-world domain**.\n\nThey exist whether your software exists or not.\n\nExample from banking:\n\n```text\nYou cannot withdraw more money than you have.\n```\n\nExample from commerce:\n\n```text\nAn order cannot ship before it is paid.\n```\n\nExample from laundry service:\n\n```text\nLaundry must be washed before it can be folded.\n```\n\nThese rules are **business reality**.\n\nThey are discovered through:\n\n- domain interviews\n- observation\n- event modeling\n- business analysis\n\nThese invariants belong in the **behavior model / truth graph**.\n\n---\n\n# In Event Terms\n\nExample events:\n\n```text\nLaundryDroppedOff\nLaundryWashed\nLaundryFolded\nLaundryReadyForPickup\nLaundryPickedUp\n```\n\nDomain invariant:\n\n```text\nLaundryFolded requires LaundryWashed\n```\n\nThis must always hold true.\n\n---\n\n# 2 — System Invariants\n\nThese come from **how the system is designed**.\n\nThey aren't necessarily business rules, but they protect **system integrity**.\n\nExamples:\n\n```text\nA user must be authenticated before accessing private data.\n```\n\n```text\nAn API request must include a valid session token.\n```\n\n```text\nAn event must reference a valid entity ID.\n```\n\nThese invariants protect **the structure of the system**.\n\n---\n\n# Example in a Model\n\nEvent:\n\n```text\nOrderViewed\n```\n\nSystem invariant:\n\n```text\nUser must be authenticated\n```\n\nWithout that invariant, someone might access:\n\n```text\nhttps://site.com/orders/12345\n```\n\nAnd see another user's order.\n\n---\n\n# 3 — Security Invariants\n\nSecurity invariants are about **authority and permissions**.\n\nThey answer the question:\n\n```text\nWho is allowed to cause this event?\n```\n\nExample:\n\n```text\nOnly an admin can issue refunds.\n```\n\nEvents:\n\n```text\nRefundRequested\nRefundApproved\nRefundIssued\n```\n\nSecurity invariant:\n\n```text\nRefundIssued requires Admin role\n```\n\nWithout this rule, attackers could exploit the system.\n\n---\n\n# Another Security Example\n\nPassword changes.\n\nEvent:\n\n```text\nPasswordChanged\n```\n\nSecurity invariant:\n\n```text\nOnly the account owner can change their password\n```\n\n---\n\n# Why Separating These Matters\n\nMany systems mix all these rules together in code.\n\nBut separating them clarifies the model.\n\nExample:\n\n| Rule | Type |\n|-----|-----|\n| Order must be paid before shipping | Domain |\n| User must be logged in to view orders | System |\n| Only admins can issue refunds | Security |\n\nDifferent people care about each one.\n\n- Business analysts → domain invariants  \n- architects → system invariants  \n- security experts → security invariants  \n\n---\n\n# In Nexus Terms\n\nYour **truth graph** could eventually contain all three.\n\nFor example:\n\n```\nEvent: OrderShipped\n\nDomain Invariant:\nOrder must be paid\n\nSystem Invariant:\nOrder must exist\n\nSecurity Invariant:\nUser must have Fulfillment role\n```\n\nNow the event is completely defined.\n\n---\n\n# Where This Gets Really Powerful\n\nIf these invariants exist in the model, then:\n\n- implementations must obey them\n- paths must obey them\n- tests must obey them\n\nWhich means the system can **verify itself**.\n\nYour path concept could automatically check invariants.\n\nExample path:\n\n```\nOrderPlaced\nOrderShipped\n```\n\nThe model detects:\n\n```\nDomain invariant violated:\nOrderShipped requires OrderPaid\n```\n\nThat path becomes invalid.\n\n---\n\n# Why This Is Rare in Software\n\nMost software hides invariants inside:\n\n- random code\n- database triggers\n- validation logic\n- undocumented rules\n\nWhich makes systems fragile.\n\nIn Nexus, invariants become **explicit knowledge**.\n\n---\n\n# The Deeper Insight\n\nWhen you model a domain well, you eventually realize something interesting:\n\n**Events describe behavior.  \nInvariants describe truth.**\n\nTogether they define the system.\n\n```\nevents + invariants = system reality\n```\n\nThat aligns extremely well with your **Truth Graph idea**.\n\n---\n\n# Something Even More Interesting\n\nIf we push this idea one step further, we get something very powerful:\n\nMany complex bugs are actually **invariant violations that were never modeled**.\n\nWhich suggests a very interesting future capability for Nexus:\n\nAI could analyze a model and ask questions like:\n\n```\n\"What invariants might be missing?\"\n```\n\nAnd that becomes a **discovery engine for domain truth**.\n\n---\n\nIf you'd like, the next thing we could explore is something that sits right next to invariants in domain modeling and will probably click strongly with your thinking about Nexus:\n\n**Constraints vs invariants vs policies** — because those three are often confused, but separating them makes complex systems dramatically easier to reason about."

