[[body.segments]]
kind = "plain_text"
text = "It just occurred to me that if, like in working with the Talkyard developer, or really any open-source software, because Atlas will be open and free to use, and the idea is here, I'll coincide with free and open and can run yourself or whatever, that for Talkyard, if the developer got on board with bringing it into the model state as spec and not the code being the authoritative, but the graph, that actually would allow somebody to load in his graph or load in his model, which is the graph. They could modify the software being, and the software being the model, modify the model to follow and suit their needs, like I want to do, and then send it to Forge, build the artifact, and basically have a custom version of the software in a much easier way than trying to figure out the code, and there could even be features or whatever that could just be, you know, added in in Atlas for that model that'd be like, hey, if you want to have this extra post type, you can define it here. You know, you can use this template, drop it in, and then modify it to your needs, and boom, you have a new artifact that runs the way you want it to run and meets your needs. I got the idea from OpenWRT. They have it where you can configure your own build, and then their system builds it for you and then gives you an executable."

