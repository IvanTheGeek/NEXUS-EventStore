[[body.segments]]
kind = "reasoning"
text = "The user is pointing out something important about naming conventions. Looking at the analysis:\n\nFrom my earlier view of the LaundryLog file I loaded, I saw names like:\n- \"svg-rect\"\n- \"svg-text\" \n- \"svg-circle\"\n- \"svg-node\"\n\nThese are generic, auto-generated names from when I created SVGs.\n\nBut in the example file they just loaded, I see much more meaningful names:\n- \"Loading\", \"Home\", \"Faves\", \"Book\" (board/screen names)\n- \"button / menu\", \"button / location\", \"button / reserve\" (component names)\n- \"icon / heart\", \"icon / pin\", \"icon / close\" (icon names)\n- \"header\", \"header with title\" (layout component names)\n- \"gallery\", \"popular\", \"navigation\" (section names)\n\nThe naming convention appears to be:\n1. Descriptive, human-readable names\n2. For components: `type / specific name` format (e.g., \"button / menu\", \"icon / heart\")\n3. Boards named after their purpose/function\n4. Hierarchical - components can contain other components\n\nThis is crucial for:\n1. **Human understanding** - designers can navigate the layers panel\n2. **Code generation** - names become identifiers\n3. **Component discovery** - find things by name patterns\n4. **Documentation** - names are self-documenting\n5. **Path extraction** - meaningful names in paths make sense\n\nThe user is saying we need to establish naming conventions and ensure that when we create/generate Penpot content, we use meaningful names, not generic svg-* names."

[[body.segments]]
kind = "plain_text"
text = "**Excellent catch!** Naming is CRITICAL and I completely missed documenting that pattern.\n\n## **Naming Convention Analysis**\n\n### **What I Created (BAD):**\n```\nLaundryLog - Main Screen (group)\n  ├─ svg-rect\n  ├─ svg-text\n  ├─ svg-circle\n  └─ svg-node\n```\nGeneric, meaningless, impossible to navigate.\n\n### **What the Example Uses (GOOD):**\n```\nHome (board)\n  ├─ popular (board)\n  │   ├─ gallery (board)\n  │   │   └─ location (board) [repeated instances]\n  │   ├─ Popular right now (text)\n  │   └─ header (board)\n  │       ├─ button / menu (board)\n  │       ├─ button / coffee near me (board)\n  │       └─ logo (board)\n```\n\n### **Naming Patterns Discovered:**\n\n**1. Board/Screen Names:**\n- Purpose-based: `Loading`, `Home`, `Faves`, `Book`, `Menu`\n- State-descriptive: `Map overlay`, `Date picker`, `Success`\n\n**2. Component Names (Type / Specific):**\n- `button / menu`\n- `button / location`\n- `icon / heart`\n- `icon / pin`\n- `header with title`\n- `notification`\n\n**3. Section/Layout Names:**\n- `gallery`\n- `popular`\n- `navigation`\n- `site name / logo`\n\n**4. Semantic Instance Names:**\n- `location` (repeated for each item in gallery)\n- Named by what they represent, not generic\n\n### **Why This Matters for Framework:**\n\n**1. Layer Panel Navigation:**\n- Designer can find \"button / reserve\" instantly\n- Not hunting through \"svg-rect-347\"\n\n**2. Code Generation:**\n- `button_menu` becomes F# identifier\n- `icon_heart` becomes function name\n- Meaningful variable names\n\n**3. Path Documentation:**\n```yaml\n# GOOD\npath: Click \"button / menu\" → Navigate to \"Menu\" board\n\n# BAD  \npath: Click \"svg-circle\" → Navigate to \"Board\"\n```\n\n**4. Component Discovery:**\n```fsharp\n// Find all buttons\nlet buttons = findShapes (fun s -> s.name.StartsWith(\"button /\"))\n\n// Find all icons\nlet icons = findShapes (fun s -> s.name.StartsWith(\"icon /\"))\n```\n\n**5. Framework Convention Document Needed:**\n\n```markdown\n## Naming Conventions\n\n### Boards (Screens/States)\n- CamelCase or Title Case\n- Purpose-descriptive\n- Examples: \"Home\", \"UserProfile\", \"Loading\"\n\n### Components\n- Format: `type / specific name`\n- Examples: \"button / submit\", \"icon / close\", \"input / email\"\n\n### Layout Containers\n- Lowercase descriptive\n- Examples: \"header\", \"footer\", \"gallery\", \"navigation\"\n\n### Instances\n- Semantic names\n- What they represent: \"location\", \"product\", \"user\"\n```\n\n**Should we add this to our framework docs and create a proper naming convention guide?** This is as important as the Event Model conventions!"

