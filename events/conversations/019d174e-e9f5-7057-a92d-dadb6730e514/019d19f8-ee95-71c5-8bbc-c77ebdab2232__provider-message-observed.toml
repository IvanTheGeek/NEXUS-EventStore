**\n\nStart your new conversation with something like:\n> \"I want to build PerDiemTracker, a new app in my Cheddar ecosystem for tracking per diem expenses. Please read my development philosophy document [attach file] to understand my principles, then let's brainstorm the features and UX.\"\n\nThis way Claude will:\n- Make suggestions aligned with your philosophy\n- Ask relevant questions about the specific use case\n- Design with the right constraints in mind\n- Maintain consistency with your existing apps\n\nWant me to create a \"Project Brief Template\" you could use alongside this philosophy doc when starting new projects?\n\nHuman: no, not yet. Is there a better, more succinct way to create this that would be better for claude to understand? Do not do it, just answer the question.\n\nAssistant: Good question! Yes, there are potentially more effective formats:\n\n**Current approach (narrative prose):**\n- ✅ Human-readable and engaging\n- ✅ Provides context and reasoning\n- ❌ Claude has to extract principles from stories\n- ❌ Information can be buried in paragraphs\n\n**More Claude-friendly alternatives:**\n\n1. **YAML/Structured data format** - Clear key-value pairs, hierarchical, machine-readable\n2. **Decision matrix format** - \"When X, then Y\" rules for common scenarios\n3. **Hybrid approach** - Brief narrative intro + structured reference data\n\n**For your use case, a hybrid might be ideal:**\n- Keep the narrative for humans (blog posts, README files)\n- Create a structured \"Claude reference\" version with:\n  - Clear hierarchies\n  - Explicit rules and constraints\n  - Design decision trees\n  - Quick-reference principles\n\nThink of it like: the current doc is your \"mission statement\" for humans, but you could also have a \"technical specification\" version optimized for Claude to parse and apply.\n\nWould that be more useful?\n\nHuman: ok, good to know. We might visit that later. If I start a new chat in this current project, will this information be used in it as well?\n\nAssistant: **Short answer: Not automatically, but there are ways to make it available.</chat>"

