kind = "plain_text"
text = "What forum features are you drawn to? \n* Discourse-style threaded discussions? I like the look and feel of discourse, the community moderation aspects, the positive badging aspects. I do NOT like its approach to threading. I feel that deeply nested abilities will be needed. I am currently evaluating talkyard (at talkyard.ivanthegeek.com if you want to check it out) I am really expecting that I will need to build my own system in order to accomplish all the aspects I see this serving. \n* GitHub Discussions-style issue tracking? uhh, I will be using github as it is currently easy, but will probably move primary repository to a self-hosted one at some point, so i do not want to rely too heavy into github. I would expect my forum to handle issue tracking and discussions in-house.   \n* Stack Overflow-style Q&A with voting? yeah, I think the question - mark as answer would be helpful, especially in using these to then create knowledge bases and help etc. \n* Notion-style wiki + discussion hybrid? I am not familiar with notion."

