User\\u0027s profile view\\\\n- \\u0060Map overlay\\u0060 - Full-screen map\\\\n- \\u0060Date picker\\u0060 - Calendar selection\\\\n- \\u0060Success\\u0060 - Confirmation state\\\\n- \\u0060Error - NetworkTimeout\\u0060 - Specific error state\\\\n\\\\n**Pattern for Variants:**\\\\n- \\u0060Screen - Variant\\u0060\\\\n- \\u0060ProductDetail - Desktop\\u0060\\\\n- \\u0060ProductDetail - Mobile\\u0060\\\\n- \\u0060Checkout - Step1\\u0060\\\\n- \\u0060Checkout - Step2\\u0060\\\\n\\\\n**Rationale:** Screen names become Event Model state names and test scenario identifiers.\\\\n\\\\n---\\\\n\\\\n### \\\\ud83c\\\\udfa8 **Components - Reusable UI Elements**\\\\n\\\\nComponents are defined once, instantiated multiple times.\\\\n\\\\n**Format:** \\u0060type / specific name\\u0060\\\\n\\\\n**Component Types:**\\\\n- \\u0060button / [name]\\u0060\\\\n- \\u0060icon / [name]\\u0060\\\\n- \\u0060input / [name]\\u0060\\\\n- \\u0060card / [name]\\u0060\\\\n- \\u0060modal / [name]\\u0060\\\\n- \\u0060header / [variant]\\u0060\\\\n- \\u0060notification / [type]\\u0060\\\\n\\\\n**Examples:**\\\\n\\u0060\\u0060\\u0060\\\\nbutton / submit\\\\nbutton / cancel\\\\nbutton / menu\\\\nbutton / close\\\\nbutton / coffee near me\\\\nbutton / add to cart\\\\n\\\\nicon / heart\\\\nicon / heart filled\\\\nicon / pin\\\\nicon / menu\\\\nicon / close\\\\nicon / chevron left\\\\nicon / chevron right\\\\nicon / check\\\\nicon / calendar\\\\n\\\\ninput / email\\\\ninput / password\\\\ninput / search\\\\ninput / quantity\\\\n\\\\ncard / product\\\\ncard / location\\\\ncard / user\\\\n\\\\nmodal / confirmation\\\\nmodal / error\\\\nmodal / settings\\\\n\\\\nheader\\\\nheader with title\\\\nheader / desktop\\\\nheader / mobile\\\\n\\\\nnotification / success\\\\nnotification / error\\\\nnotification / info\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Rationale:** \\\\n- Easy to find all buttons: search \\\\\\u0022button /\\\\\\u0022\\\\n- Clear type \\u002B purpose structure\\\\n- Translates well to code: \\u0060button_submit\\u0060, \\u0060icon_heart\\u0060\\\\n\\\\n---\\\\n\\\\n### \\\\ud83d\\\\udce6 **Layout Containers**\\\\n\\\\nLayout sections and structural elements.\\\\n\\\\n**Format:** Lowercase, descriptive\\\\n\\\\n**Examples:**\\\\n\\u0060\\u0060\\u0060\\\\nheader\\\\nfooter\\\\nsidebar\\\\nnavigation\\\\ngallery\\\\ngrid\\\\npopular\\\\ntrending\\\\nfeatured\\\\ncontent\\\\nmain\\\\naside\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Rationale:** Semantic HTML parallels make code generation intuitive.\\\\n\\\\n---\\\\n\\\\n### \\\\ud83d\\\\udd22 **Instances - Repeated Elements**\\\\n\\\\nWhen using multiple instances of a component.\\\\n\\\\n**Format:** Semantic name describing what it represents\\\\n\\\\n**Examples:**\\\\n\\u0060\\u0060\\u0060\\\\nlocation          (multiple instances in gallery)\\\\nproduct          (multiple items in list)\\\\nuser             (multiple user cards)\\\\nnotification     (multiple alerts)\\\\nreview           (multiple review cards)\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**For unique instances:**\\\\n\\u0060\\u0060\\u0060\\\\nlocation / primary\\\\nlocation / secondary\\\\nproduct / featured\\\\nuser / author\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Rationale:** Describes content, not just \\\\\\u0022Component Copy 3\\\\\\u0022\\\\n\\\\n---\\\\n\\\\n### \\\\u26a1 **Interactive Elements**\\\\n\\\\nElements with interactions/prototypes.\\\\n\\\\n**Add clear action indicators to names:**\\\\n\\\\n**Examples:**\\\\n\\u0060\\u0060\\u0060\\\\nbutton / menu \\\\u2192 Menu\\\\nbutton / book now \\\\u2192 Book\\\\nlocation \\\\u2192 ProductDetail\\\\nicon / heart \\\\u2192 Faves\\\\ncard / product \\\\u2192 ProductDetail\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Rationale:** Helps identify which elements have prototype connections for path extraction.\\\\n\\\\n---\\\\n\\\\n### \\\\ud83c\\\\udfaf **States and Variants**\\\\n\\\\nFor components with multiple states.\\\\n\\\\n**Format:** \\u0060component name / state\\u0060\\\\n\\\\n**Examples:**\\\\n\\u0060\\u0060\\u0060\\\\nbutton / submit / default\\\\nbutton / submit / hover\\\\nbutton / submit / pressed\\\\nbutton / submit / disabled\\\\n\\\\ninput / email / empty\\\\ninput / email / filled\\\\ninput / email / error\\\\ninput / email / focused\\\\n\\\\ncard / product / default\\\\ncard / product / favorited\\\\ncard / product / sold out\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Rationale:** Clearly shows which state variant this represents. Aligns with Penpot\\u0027s component variant system.\\\\n\\\\n---\\\\n\\\\n## Naming by Purpose\\\\n\\\\n### Event Model Screens\\\\n\\\\nWhen designing Event Model visualizations in Penpot:\\\\n\\\\n**Events (Orange):**\\\\n- \\u0060event / [EventName]\\u0060\\\\n- \\u0060event / SessionStarted\\u0060\\\\n- \\u0060event / MachineEntryAdded\\u0060\\\\n\\\\n**Commands (Blue):**\\\\n- \\u0060command / [CommandName]\\u0060\\\\n- \\u0060command / StartSession\\u0060\\\\n- \\u0060command / AddMachineEntry\\u0060\\\\n\\\\n**Views (Green):**\\\\n- \\u0060view / [ViewName]\\u0060\\\\n- \\u0060view / SessionSummary\\u0060\\\\n- \\u0060view / MachineEntryForm\\u0060\\\\n\\\\n**Rationale:** Maintains Event Modeling conventions, color coding reflected in naming.\\\\n\\\\n---\\\\n\\\\n### LaundryLog Specific Examples\\\\n\\\\nApplying conventions to actual screens:\\\\n\\\\n**Screens (Boards):**\\\\n\\u0060\\u0060\\u0060\\\\nLaundryLog Home\\\\nLocation Capture\\\\nMachine Entry\\\\nSession Summary\\\\nHistory\\\\nSettings\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Components:**\\\\n\\u0060\\u0060\\u0060\\\\nbutton / washer\\\\nbutton / dryer\\\\nbutton / supplies\\\\nbutton / quarter\\\\nbutton / add\\\\nbutton / submit\\\\n\\\\nicon / gps\\\\nicon / location pin\\\\nicon / back\\\\n\\\\ninput / quantity\\\\ninput / price\\\\n\\\\ncard / session entry\\\\ncard / machine\\\\n\\\\nheader / laundry log\\\\n\\\\nnotification / gps error\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Layout:**\\\\n\\u0060\\u0060\\u0060\\\\nheader\\\\nmachine type section\\\\npayment section\\\\nsession total\\\\nfooter\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n## Code Generation Impact\\\\n\\\\n### How Names Become Code\\\\n\\\\n**Penpot Name** \\\\u2192 **F# Identifier**\\\\n\\\\n\\u0060\\u0060\\u0060\\\\nbutton / submit         \\\\u2192 ButtonSubmit or button_submit\\\\nicon / heart filled     \\\\u2192 IconHeartFilled or icon_heart_filled\\\\ninput / email          \\\\u2192 InputEmail or input_email\\\\nLocation Capture       \\\\u2192 LocationCapture\\\\nsession total          \\\\u2192 sessionTotal or session_total\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n**Generation Rules:**\\\\n- Remove spaces or convert to camelCase/snake_case\\\\n- Remove special chars except underscores\\\\n- Convert slashes to underscores or camelCase\\\\n- Preserve semantic meaning\\\\n\\\\n### Component Discovery Code\\\\n\\\\n\\u0060\\u0060\\u0060fsharp\\\\n// Find all buttons\\\\nlet buttons = penpotUtils.findShapes(\\\\n    fun shape -\\u003E shape.name.StartsWith(\\\\\\u0022button /\\\\\\u0022)\\\\n)\\\\n\\\\n// Find all icons\\\\nlet icons = penpotUtils.findShapes(\\\\n    fun shape -\\u003E shape.name.StartsWith(\\\\\\u0022icon /\\\\\\u0022)\\\\n)\\\\n\\\\n// Find specific component\\\\nlet submitButton = penpotUtils.findShape(\\\\n    fun shape -\\u003E shape.name = \\\\\\u0022button / submit\\\\\\u0022\\\\n)\\\\n\\\\n// Find all screen states\\\\nlet screens = penpotUtils.findShapes(\\\\n    fun shape -\\u003E \\\\n        shape.type = \\\\\\u0022board\\\\\\u0022 \\u0026\\u0026 \\\\n        not (shape.name.Contains(\\\\\\u0022/\\\\\\u0022)) // Top-level boards\\\\n)\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n## Anti-Patterns to Avoid\\\\n\\\\n### \\\\u274c **Generic Auto-Generated Names**\\\\n\\u0060\\u0060\\u0060\\\\nsvg-rect\\\\nsvg-circle\\\\nGroup 42\\\\nRectangle copy 3\\\\nBoard\\\\nEllipse\\\\n\\u0060\\u0060\\u0060\\\\n**Why Bad:** No semantic meaning, can\\u0027t find elements, code generation produces garbage.\\\\n\\\\n### \\\\u274c **Inconsistent Patterns**\\\\n\\u0060\\u0060\\u0060\\\\nbtnSubmit\\\\nbutton_cancel\\\\nButton / Close\\\\nBUTTON_MENU\\\\n\\u0060\\u0060\\u0060\\\\n**Why Bad:** Can\\u0027t search effectively, breaks programmatic discovery.\\\\n\\\\n### \\\\u274c **Overly Technical Names**\\\\n\\u0060\\u0060\\u0060\\\\ndiv_container_flex_col\\\\nbtn_primary_lg_#FF5733\\\\ncomponent_v2_refactor_final\\\\n\\u0060\\u0060\\u0060\\\\n**Why Bad:** Designer-hostile, changes with implementation details.\\\\n\\\\n### \\\\u274c **Too Vague**\\\\n\\u0060\\u0060\\u0060\\\\nthing\\\\nstuff\\\\nelement\\\\nbox\\\\nsection1\\\\n\\u0060\\u0060\\u0060\\\\n**Why Bad:** Tells you nothing about purpose or content.\\\\n\\\\n### \\\\u274c **Too Specific to Content**\\\\n\\u0060\\u0060\\u0060\\\\nbutton / click here now!!!\\\\ntext / Call 1-800-FLOWERS\\\\nlocation / Starbucks 123 Main St\\\\n\\u0060\\u0060\\u0060\\\\n**Why Bad:** Breaks when content changes, not reusable.\\\\n\\\\n---\\\\n\\\\n## Best Practices\\\\n\\\\n### \\\\u2705 **Use Folders/Groups for Organization**\\\\n\\\\nGroup related components:\\\\n\\u0060\\u0060\\u0060\\\\n\\\\ud83d\\\\udcc1 Buttons\\\\n  \\\\u2514\\\\u2500 button / submit\\\\n  \\\\u2514\\\\u2500 button / cancel\\\\n  \\\\u2514\\\\u2500 button / menu\\\\n\\\\n\\\\ud83d\\\\udcc1 Icons\\\\n  \\\\u2514\\\\u2500 icon / heart\\\\n  \\\\u2514\\\\u2500 icon / pin\\\\n  \\\\u2514\\\\u2500 icon / menu\\\\n\\\\n\\\\ud83d\\\\udcc1 Inputs\\\\n  \\\\u2514\\\\u2500 input / email\\\\n  \\\\u2514\\\\u2500 input / password\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### \\\\u2705 **Version Component Variants**\\\\n\\\\nWhen creating iterations:\\\\n\\u0060\\u0060\\u0060\\\\nheader\\\\nheader / v2\\\\nheader / with search\\\\n\\u0060\\u0060\\u0060\\\\n\\\\nOr use Penpot\\u0027s component variant system.\\\\n\\\\n### \\\\u2705 **Document Special Cases**\\\\n\\\\nUse descriptions in Penpot for unusual naming:\\\\n- Why this name was chosen\\\\n- What states exist\\\\n- Prototype connections\\\\n\\\\n### \\\\u2705 **Maintain a Component Library**\\\\n\\\\nDedicated page: \\\\\\u0022Main components\\\\\\u0022 or \\\\\\u0022Design System\\\\\\u0022\\\\n- All reusable components defined here\\\\n- Instances used in prototype screens\\\\n- Single source of truth\\\\n\\\\n---\\\\n\\\\n## Checklist Before Export/Handoff\\\\n\\\\n- [ ] All boards have meaningful names (no \\\\\\u0022Board 3\\\\\\u0022)\\\\n- [ ] All components follow \\u0060type / name\\u0060 pattern\\\\n- [ ] No generic names (\\u0060svg-*\\u0060, \\u0060Rectangle\\u0060, \\u0060Group\\u0060)\\\\n- [ ] Layout sections have semantic names\\\\n- [ ] Instances describe what they represent\\\\n- [ ] Interactive elements are clearly named\\\\n- [ ] Component variants use consistent pattern\\\\n- [ ] Names will translate to good code identifiers\\\\n- [ ] Layer panel is navigable by name alone\\\\n\\\\n---\\\\n\\\\n## Integration with Framework\\\\n\\\\n### For Designers:\\\\n- Follow these conventions in all Penpot files\\\\n- Think about how names will appear in code\\\\n- Use consistent patterns within and across projects\\\\n\\\\n### For FnMCP.Penpot:\\\\n- Parse names to discover component types\\\\n- Generate F# types from board/component names\\\\n- Map prototype interactions using element names\\\\n- Create GWT scenarios with readable identifiers\\\\n\\\\n### For Event Modeling:\\\\n- Screen names become state names\\\\n- Component names become view/command identifiers\\\\n- Maintain consistency with EM color conventions\\\\n\\\\n---\\\\n\\\\n## Evolution and Refinement\\\\n\\\\nThis is a living document. As we learn what works:\\\\n- Add new patterns that emerge\\\\n- Refine existing conventions\\\\n- Document exceptions and edge cases\\\\n- Update based on real project experience\\\\n\\\\n**Next update:** After completing LaundryLog and PerDiemLog design cycles.\\\\n\\\\n---\\\\n\\\\n## Quick Reference Card\\\\n\\\\n\\u0060\\u0060\\u0060\\\\nBOARDS (States):     Title Case, Purpose    \\\\u2192 \\\\\\u0022Home\\\\\\u0022, \\\\\\u0022Loading\\\\\\u0022\\\\nCOMPONENTS:          type / name            \\\\u2192 \\\\\\u0022button / submit\\\\\\u0022\\\\nLAYOUT:              lowercase, semantic    \\\\u2192 \\\\\\u0022header\\\\\\u0022, \\\\\\u0022navigation\\\\\\u0022  \\\\nINSTANCES:           what they represent    \\\\u2192 \\\\\\u0022location\\\\\\u0022, \\\\\\u0022product\\\\\\u0022\\\\nVARIANTS:            name / state           \\\\u2192 \\\\\\u0022button / hover\\\\\\u0022\\\\nEVENT MODEL:         type / EventName       \\\\u2192 \\\\\\u0022event / SessionStarted\\\\\\u0022\\\\n\\\\nAVOID: svg-*, Rectangle, Group, Board, generic names\\\\nTHINK: Can I find this? Will code make sense? Is it descriptive?\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n---\\\\n\\\\n**Remember: Good naming is not optional. It\\u0027s foundational to the framework.**\\\\n\\u0022, \\u0022filename\\u0022: \\u0022/mnt/user-data/outputs/penpot-naming-conventions.md\\u0022}\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

