text = "Penpot screens as SoT: I am still learning Penpot and design and design systems in general, so I struggle here a bit. My understanding is that for dynamic behavior in a system like Penpot you use a component system for the designs, then use state versions (which might be called variants now) and actually build a screen or view per state. This aligns actually very well with Event Modeling, even if it for just UI state changes the top level or default view of the event model would not show these minute UI related changes. This is where the EM app would come into play, as it could show any level of detail desired by the user looking at it. a business analyst or business expert would want to see a view of the model that is relative to them, or maybe more details in a certain area or workflow, but can hide details in most of the  rest of the model and just use the top level or default view.  validation & error states could also be sub-flows of the event model again, in the app, could be viewed or not etc. The Penpot prototyping could be used to create the flows for UI and do different paths. the paths could be accumulated into Given-When-Then (GWT) and depending on the type, used in the event model high views/business views, or used in technical views. These would end up being tests for system of both types as well."

