text = "**Choose \"Engineering\"**\n\nThis is the clear best fit because you're:\n- Building software systems and frameworks\n- Writing F# code\n- Creating MCP servers and APIs\n- Doing system architecture\n- Developing libraries and tooling\n\nWhile you also do aspects of:\n- \"Product Management\" (defining LaundryLog, PerDiemLog features)\n- \"Design\" (working with Penpot, UI/UX decisions)\n\n...your primary interaction with Claude is **engineering work** - the actual implementation, architecture, and technical problem-solving.\n\n\"Engineering\" will ensure Claude gives you technically appropriate responses for coding, system design, and development workflows."

