[[body.segments]]
kind = "reasoning"
text = "Okay, so Ivan is uncertain about whether MCP is the right tool for \"teaching\" an LLM about a domain. This is a key architectural question.\n\nLet me think about what MCP actually does:\n1. **Tools** - Functions the LLM can call (like \"create_component_in_penpot\")\n2. **Resources** - Documents/context the LLM can read (like design system guidelines)\n3. **Prompts** - Suggested prompts/templates\n\nSo MCP CAN teach through resources (documentation), but there are other ways to provide context to LLMs:\n- Project Knowledge (like this project has)\n- System prompts / custom instructions\n- Skills (like the ones available here)\n- Inline documentation in conversations\n\nIvan needs to understand:\n- What MCP is good for vs. other context delivery mechanisms\n- Whether his \"teaching\" goal is better served by MCP resources or by Project Knowledge documents\n\nI should help him understand these distinctions before we architect the MCP servers."

[[body.segments]]
kind = "plain_text"
text = "Okay, this is important - there are **multiple ways to teach an LLM**, and we need to figure out which is right for each piece:\n\n**Ways to provide context to Claude:**\n1. **MCP Resources** - Documentation that MCPs expose (I can read them when using that MCP)\n2. **Project Knowledge** - Files in your Claude Project (like the ones I see in `/mnt/project/`)\n3. **Skills** - Installable capability packages (like the ones available to me now)\n4. **Conversation context** - What you tell me directly in our chats\n\n**MCP is specifically good for**:\n- Giving me **actions** I can take (tools)\n- Providing **dynamic context** related to those actions (resources)\n- Example: FnMCP.Penpot could give me \"create_component\" tool + \"here's how components work\" resource\n\n**Project Knowledge is good for**:\n- Your personal methodologies and conventions\n- Reference material that doesn't change often\n- Things specific to YOUR projects, not generic tools\n\nBefore we architecture this, I need to understand: **Have you read the mcp-builder skill?** Should I pull that up so we can see what MCP actually is and how it works? That would inform whether your architecture makes sense."

