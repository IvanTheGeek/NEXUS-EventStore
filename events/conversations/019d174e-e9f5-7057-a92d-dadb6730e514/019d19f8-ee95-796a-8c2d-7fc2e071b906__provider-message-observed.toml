[[body.segments]]
kind = "reasoning"
text = "Ah, this is a great clarification! Ivan wants to create a reusable template/system that he can drop into new projects to give Claude (or any LLM) the context needed to work effectively on his apps. This is smart - it's like creating a \"project starter pack\" that captures his methodology, conventions, and preferences.\n\nHe wants:\n1. A set of artifacts (likely documents) that can be loaded into a new project\n2. These would contain instructions/context/methodology/conventions\n3. Optimized for working with LLMs like Claude\n4. Continuously refined so each new project gets easier\n5. More aligned with his evolving desires/approaches\n\nThis is essentially what the project knowledge documents are starting to become, but he wants to formalize and systematize this.\n\nI should acknowledge this goal clearly and then wait for him to answer my questions before diving deeper. He said \"I will get to your questions as well\" so he wants me to understand this meta-goal first."

[[body.segments]]
kind = "plain_text"
text = "Excellent! So you want to build a **reusable project template** - a standardized set of context documents that you can drop into any new Cheddar app project to immediately give Claude (or other LLMs) everything needed to work effectively in your style.\n\nThis makes a lot of sense. Each project would start with:\n- Your development methodology (Event Modeling, static-state design, etc.)\n- Your technical conventions (F#/Bolero patterns, YAML integration, etc.)\n- Your design approach (Penpot workflows, mobile-first considerations, etc.)\n- Your project philosophy (privacy-first, AGPLv3, practical capitalism, etc.)\n\nAnd you'd continuously refine these documents based on what actually works in practice, so each new app benefits from lessons learned in previous ones.\n\nThis is essentially creating your own \"development framework\" - not in code, but in **process and context**.\n\nGot it. Now I'm ready for your answers to my earlier questions - that will help me understand what should go into this template system and how to structure it."

