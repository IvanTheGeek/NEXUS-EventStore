m tracking (proving ground app)\\\\n\\\\n## Key Concepts\\\\n\\\\n### Paths\\\\nSpecific execution traces through the system, analogous to \\\\\\u0022Choose Your Own Adventure\\\\\\u0022 books:\\\\n- Each path is a deterministic sequence: specific inputs \\\\u2192 specific choices \\\\u2192 specific outcomes\\\\n- Paths explore the decision tree (happy path, error paths, edge cases)\\\\n- Example data derives from paths (not invented)\\\\n- One path = one test case with concrete, traceable data\\\\n- Penpot prototype connections map 1:1 to paths\\\\n\\\\n**Example:**\\\\n\\u0060\\u0060\\u0060yaml\\\\npath_id: \\\\\\u0022laundry-log-happy\\\\\\u0022\\\\nnarrative: \\\\\\u0022Driver completes laundry successfully\\\\\\u0022\\\\nsteps:\\\\n  - screen: \\\\\\u0022LaundryLogHome\\\\\\u0022\\\\n    event: \\\\\\u0022UserOpenedApp\\\\\\u0022\\\\n    branches_to: [\\\\\\u0022EnterWashers\\\\\\u0022, \\\\\\u0022ViewHistory\\\\\\u0022]\\\\n  - screen: \\\\\\u0022EnterWashers\\\\\\u0022  \\\\n    event: \\\\\\u0022UserEnteredWashCount\\\\\\u0022\\\\n    data: {count: 2, unit_price: 4.00}\\\\n\\u0060\\u0060\\u0060\\\\n\\\\n### Perspectives\\\\nDynamic filtered views of the Event Model:\\\\n- **Base layer**: Shared view of all domain events (business-level)\\\\n- **Detail layers**: Marketing, technical, validation, error handling, UI states\\\\n- **Role-based filtering**: Each person sees relevant detail level\\\\n- **Interactive**: Checkboxes to show/hide layers, zoom into areas\\\\n\\\\nLike accounting: one set of facts, multiple reporting views (financial, managerial, tax)\\\\n\\\\n### Multi-Layer Event Model\\\\nSingle Event Model with multiple levels of detail:\\\\n- **Business layer** (top): What events need to happen for business to function\\\\n- **Technical layers**: Implementation details, UI flows, validation, error handling\\\\n- **Not separate models**: Just different views of same unified model\\\\n- **Living document**: Can be filtered, explored, refined over time