kind = "tool_result"
text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"MCP Gateway | Docker Docs\",\"url\":\"https://docs.docker.com/ai/mcp-catalog-and-toolkit/mcp-gateway/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"docker.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=docker.com\",\"site_name\":\"Docker\"},\"is_missing\":false,\"text\":\"The MCP Gateway is Docker\\u0026#x27;s open source solution for orchestrating Model Context Protocol (MCP) servers. It acts as a centralized proxy between clients and servers, managing configuration, credentials, and access control.\\n\\nThe MCP Gateway is Docker\\u0027s open source solution for orchestrating Model Context Protocol (MCP) servers. It acts as a centralized proxy between clients and servers, managing configuration, credentials, and access control. When using MCP servers without the MCP Gateway, you need to configure applications individually for each AI application. With the MCP Gateway, you configure applications to connect to the Gateway. The Gateway then handles server lifecycle, routing, and authentication across all your servers. ... If you use Docker Desktop with MCP Toolkit enabled, the Gateway runs automatically in the background. You don\\u0027t need to start or configure it manually. This documentation is for users who want to understand how the Gateway works or run it directly for advanced use cases. ... E2B sandboxes now include direct access to the Docker MCP Catalog, giving developers access to over 200 tools and services to seamlessly build and run AI agents.\\n\\nDocker\\u0027s MCP Gateway provides secure, centralized, and scalable orchestration of AI tools through containerized MCP servers\\u2014empowering developers, operators, and security teams.\\n\\nMCP Gateway runs MCP servers in isolated Docker containers with restricted privileges, network access, and resource usage. It includes built-in logging and call-tracing capabilities to ensure full visibility and governance of AI tool activity. The MCP Gateway manages the server\\u0027s entire lifecycle. When an AI application needs to use a tool, it sends a request to the Gateway. The Gateway identifies which server handles that tool and, if the server isn\\u0027t already running, starts it as a Docker container. The Gateway then injects any required credentials, applies security restrictions, and forwards the request to the server. The server processes the request and returns the result through the Gateway back to the AI application. The MCP Gateway solves a fundamental problem: MCP servers are just programs that need to run somewhere. Running them directly on your machine means dealing with installation, dependencies, updates, and security risks.\\n\\nBy running them as containers managed by the Gateway, you get isolation, consistent environments, and centralized control. To use the MCP Gateway, you\\u0027ll need Docker Desktop with MCP Toolkit enabled. Follow the MCP Toolkit guide to enable and configure servers through the graphical interface. With MCP Toolkit enabled, you can also interact with the MCP Gateway using the CLI. The docker mcp suite of commands lets you manage servers and tools directly from your terminal. You can also manually run Gateways with custom configurations, including security restrictions, server catalogs, and more. To run an MCP Gateway manually, with customized parameters, use the docker mcp suite of commands. Browse the MCP Catalog for a server that you want to use, and copy the install command from the Manual installation section. For example, run this command in your terminal to install the duckduckgo MCP server: ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://docs.docker.com/ai/mcp-catalog-and-toolkit/mcp-gateway/\"}},{\"type\":\"knowledge\",\"title\":\"GitHub - docker/mcp-gateway: docker mcp CLI plugin / MCP Gateway\",\"url\":\"https://github.com/docker/mcp-gateway\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"The main feature of this CLI is the Docker MCP Gateway which allows easy and secure running and deployment of MCP servers. See Features for a list of all the features. The Model Context Protocol (MCP) is an open protocol that standardizes how AI applications connect to external data sources and tools. It provides a secure, controlled way for language models to access and interact with various services, databases, and APIs. Developers face criticial barriers when integrating Model Context Protocol (MCP) tools into production workflows: Managing MCP server lifecycle Each local MCP sever in the catalog runs in an isolated Docker container. npx and uvx servers are granted minimal host privileges. Providing a unified interface AI models access MCP servers through a single Gateway. Handling authentication and security Keep secrets out of environment variables using Docker Desktop\\u0027s secrets management.\\n\\ndocker mcp CLI plugin / MCP Gateway. Contribute to docker/mcp-gateway development by creating an account on GitHub.\\n\\nEach MCP client (eg VS Code, Cursor, Claude Desktop, etc.) connects to the same Gateway configuration, ensuring consistency across different clients. Enables OAuth flows for MCPs that require OAuth access token service connections. \\uD83D\\uDC33 Container-based Servers: Run MCP servers as Docker containers with proper isolation. \\uD83D\\uDD27 Server Management: List, inspect, and call MCP tools, resources and prompts from multiple servers. \\uD83D\\uDD10 Secrets Management: Secure handling of API keys and credentials via Docker Desktop. \\uD83C\\uDF10 OAuth Integration: Built-in OAuth flows for service authentication. \\uD83D\\uDCCB Server Catalog: Manage and configure multiple MCP catalogs. \\uD83D\\uDD0D Dynamic Discovery: Automatic tool, prompt, and resource discovery from running servers. \\uD83D\\uDCCA Monitoring: Built-in logging and call tracing capabilities. ... The MCP cli will already be installed on recent versions of Docker Desktop but you can build and install the latest version by following these steps: # Clone the repository git clone https://github.com/dock\\n\\nManage the catalogs available to the MCP gateway. The default catalog is available with the name \\u0027docker-mcp\\u0027. # Manage server catalogs docker mcp catalog --help # Initialize the default Docker MCP Catalog docker mcp catalog init # List available catalogs docker mcp catalog ls # Show all servers in a catalog docker mcp catalog show docker-mcp ... Start up an MCP Gateway. This can be used for one client, or to service multiple clients if using either sse or streaming transports. # Run the MCP gateway (stdio) docker mcp gateway run # Run the MCP gateway (streaming) docker mcp gateway run --port 8080 --transport streaming ... Enable and disable the set of MCP servers that will be available for default clients. The MCP gateway can be configured to expose different sets of servers and tools but enabling and disabling servers here impacts the default gateway configuration.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/docker/mcp-gateway\"}},{\"type\":\"knowledge\",\"title\":\"Running Docker MCP Gateway in a Docker container\",\"url\":\"https://www.ajeetraina.com/running-docker-mcp-gateway-in-a-docker-container/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"ajeetraina.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=ajeetraina.com\",\"site_name\":\"Ajeet Singh Raina\"},\"is_missing\":false,\"text\":\"The MCP Gateway is Docker\\u0026#x27;s solution for securely orchestrating and managing Model Context Protocol (MCP) servers locally and in production including enterprise environments.\\n\\nThe MCP Gateway is Docker\\u0027s solution for securely orchestrating and managing Model Context Protocol (MCP) servers locally and in production including enterprise environments. ... You\\u0027re a developer trying to set up a simple AI application that needs file access, database connectivity, and web search capabilities. Here\\u0027s what your terminal situation looks like: # Terminal 1: File system server npx @modelcontextprotocol/server-filesystem /project/files # Terminal 2: Database server uvx mcp-server-postgresql --connection=\\u0022postgresql://...\\u0022 # Terminal 3: Web search server docker run -p 3001:3000 mcp/web-search # Terminal 4: Custom API server node custom-mcp-server.js \\u00B7 Four different terminals. Four different startup commands. Four different ways things can break. And that\\u0027s just the beginning.\\n\\nDocker MCP Gateway isn\\u0027t just solving today\\u0027s problems - it\\u0027s laying the foundation for the AI infrastructure of tomorrow. As AI applications become more sophisticated and require access to more tools and data sources, you need a platform that can scale, secure, and manage that complexity. Stop wasting hours setting up MCP servers. The Docker MCP Catalog provides 270\\u002B enterprise-grade, containerized Model Context Protocol servers that install in seconds\\u2014no dependency hell, no environment conflicts, no cross-platform issues. How we built, trained, and deployed a dental X-ray analysis system achieving 99.5% mAP50 accuracy using YOLOv8, Docker containers, and iterative model improvement using NVIDIA Jetson AGX Thor \\u00B7\\n\\nThe gateway successfully reads its configuration from Docker\\u0027s MCP catalog, pulls and verifies the mcp/postgres image, and discovers 1 available tool (the query tool). It then starts the streaming server on port 8811 and handles an incoming request by executing the SQL query SELECT datname FROM pg_database; against the PostgreSQL database. The client successfully connects to the gateway\\u0027s streaming endpoint, sends a database query request, and receives the expected JSON response listing all databases in the PostgreSQL instance (postgres, database, template1, template0). The clean exit with code 0 confirms the entire workflow - from client request through the MCP Gateway to the PostgreSQL MCP server and back - operates seamlessly, validating that the streaming transport protocol effectively bridges AI applications with database operations. This example demonstrates how to build and deploy a custom client application that connects to the Docker MCP Gateway using the HTTP streaming protoc\\n\\nThis Docker Compose configuration demonstrates a complete MCP Gateway stack with PostgreSQL integration using streaming transport protocol. The setup consists of three interconnected services: ... The PostgreSQL service is configured with basic credentials and includes a health check that ensures the database is ready before dependent services start, using pg_isready to verify connectivity every second with a 3-second timeout and up to 10 retries. git clone https://github.com/docker/mcp-gateway cd mcp-gateway/examples/postgresql \\u00B7 services: client: build: .\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"July 12, 2025\",\"url\":\"https://www.ajeetraina.com/running-docker-mcp-gateway-in-a-docker-container/\"}},{\"type\":\"knowledge\",\"title\":\"GitHub - theNetworkChuck/docker-mcp-tutorial: Complete tutorial materials for building MCP servers with Docker - from NetworkChuck\\u0027s video\",\"url\":\"https://github.com/theNetworkChuck/docker-mcp-tutorial\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"# Start gateway with network transport docker mcp gateway run --transport sse # Access from n8n or remote clients http://YOUR_IP:8811 \\u00B7 Perfect for automation workflows and remote AI operations! Tools not appearing in Claude? Restart Claude Desktop \\u00B7 Check catalog and registry files \\u00B7 Verify Docker image built successfully \\u00B7 Authentication errors? Verify secrets: docker mcp secret list \\u00B7 Check environment variable names \\u00B7 Container not running? Check logs: docker logs [container-name] Verify Dockerfile syntax \\u00B7 Full troubleshooting guide in docs/troubleshooting.md \\u00B7 Docker Desktop \\u00B7 Model Context Protocol \\u00B7 Claude Desktop \\u00B7 Toggl API Documentation \\u00B7 Obsidian Local REST API \\u00B7 n8n Automation Tutorial \\u00B7 Docker Basics Series \\u00B7 Found a bug? Have an improvement? Contributions are welcome! Fork the repository \\u00B7 Create your feature branch \\u00B7\\n\\ndocker-mcp-tutorial/ \\u251C\\u2500\\u2500 examples/ # Complete working MCP server \\u2502 \\u2514\\u2500\\u2500 dice-roller/ # D\\u0026D dice rolling server \\u251C\\u2500\\u2500 mcp-builder-prompt/ # AI prompt to generate MCP servers \\u251C\\u2500\\u2500 quick-start/ # Get running in 5 minutes \\u251C\\u2500\\u2500 docs/ # Detailed documentation \\u2502 \\u251C\\u2500\\u2500 installation.md # Platform-specific setup \\u2502 \\u251C\\u2500\\u2500 custom-servers.md # Build your own servers \\u2502 \\u251C\\u2500\\u2500 docker-gateway.md # Gateway architecture \\u2502 \\u2514\\u2500\\u2500 troubleshooting.md # Common issues \\u0026 fixes \\u2514\\u2500\\u2500 resources/ # Links and additional resources \\u00B7 MCP Fundamentals - Understand the Model Context Protocol \\u00B7 Docker Integration - Run MCP servers in containers ... Start using with your AI! Detailed platform-specific instructions in docs/installation.md \\u00B7 Open the prompt template: mcp-builder-prompt/mcp-builder-prompt.md ... Get complete, working MCP server code!\\n\\ndocker-mcp-tutorial/ \\u251C\\u2500\\u2500 examples/ # Complete working MCP server \\u2502 \\u2514\\u2500\\u2500 dice-roller/ # D\\u0026D dice rolling server \\u251C\\u2500\\u2500 mcp-builder-prompt/ # AI prompt to generate MCP servers \\u251C\\u2500\\u2500 quick-start/ # Get running in 5 minutes \\u251C\\u2500\\u2500 docs/ # Detailed documentation \\u2502 \\u251C\\u2500\\u2500 installation.md # Platform-specific setup \\u2502 \\u251C\\u2500\\u2500 custom-servers.md # Build your own servers \\u2502 \\u251C\\u2500\\u2500 docker-gateway.md # Gateway architecture \\u2502 \\u2514\\u2500\\u2500 troubleshooting.md # Common issues \\u0026 fixes \\u2514\\u2500\\u2500 resources/ # Links and additional resources \\u00B7 MCP Fundamentals - Understand the Model Context Protocol \\u00B7 Docker Integration - Run MCP servers in containers \\u00B7 Build Custom Servers - Create your own AI tools \\u00B7 API Integration - Connect to external services \\u00B7 Security \\u0026 Secrets - Manage API keys safely \\u00B7 Remote Access - Expose servers over network \\u00B7\\n\\nComplete tutorial materials for building MCP servers with Docker - from NetworkChuck\\u0027s video - theNetworkChuck/docker-mcp-tutorial\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/theNetworkChuck/docker-mcp-tutorial\"}},{\"type\":\"knowledge\",\"title\":\"Get started with Docker MCP Toolkit\",\"url\":\"https://docs.docker.com/ai/mcp-catalog-and-toolkit/get-started/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"docker.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=docker.com\",\"site_name\":\"Docker\"},\"is_missing\":false,\"text\":\"After you\\u0026#x27;ve installed MCP servers, you can add clients to the MCP Toolkit. These clients can interact with the installed MCP servers, turning the MCP Toolkit into a gateway. In the following section, let\\u2019s add the Claude Desktop client. ... In Docker Desktop, select MCP Toolkit and select the Clients tab. Find Claude Desktop and select Connect. If Claude Desktop isn\\u0026#x27;t installed, select Download to install it, then select Connect. Restart Claude Desktop if it\\u0026#x27;s running, and it can now access all the servers in the MCP Toolkit. Open Claude Desktop and run a test by submitting the following prompt: Take a screenshot of the header element on docs.docker.com \\u00B7 Claude prompts you for permissions and shares a screenshot of the header element from the Docker documentation page. In a terminal window, run the following commands to connect the Claude Desktop client: $ docker mcp client connect claude-desktop --global \\u00B7\\n\\nThe Docker MCP Toolkit makes it easy to set up, manage, and run containerized Model Context Protocol (MCP) servers, and connect them to AI agents. It provides secure defaults and support for a growing ecosystem of LLM-based clients. This page shows you how to get started quickly with the Docker MCP Toolkit. Before you begin, make sure you meet the following requirements to get started with Docker MCP Toolkit. Download and install the latest version of Docker Desktop. Open the Docker Desktop settings and select Beta features. Select Enable Docker MCP Toolkit. Select Apply. There are multiple ways to get started with Docker MCP Toolkit. You can: The Learning center in Docker Desktop provides walkthroughs and resources to help you get started with Docker products and features. On the MCP Toolkit page, the Get started walkthrough that guides you through installing an MCP server, connecting a client, and testing your setup.\\n\\nLearn how to quickly install and use the MCP Toolkit to set up servers and clients.\\n\\nAfter you\\u0027ve installed MCP servers, you can add clients to the MCP Toolkit. These clients can interact with the installed MCP servers, turning the MCP Toolkit into a gateway. In the following section, let\\u2019s add the Claude Desktop client. ... In Docker Desktop, select MCP Toolkit and select the Clients tab. Find Claude Desktop and select Connect. If Claude Desktop isn\\u0027t installed, select Download to install it, then select Connect. Restart Claude Desktop if it\\u0027s running, and it can now access all the servers in the MCP Toolkit. Open Claude Desktop and run a test by submitting the following prompt: Take a screenshot of the header element on docs.docker.com \\u00B7 Claude prompts you for permissions and shares a screenshot of the header element from the Docker documentation page. In a terminal window, run the following commands to connect the Claude Desktop client: $ docker mcp client connect claude-desktop --global \\u00B7\\n\\nRestart Claude Desktop if it\\u0027s running, and it can now access all the servers in the MCP Toolkit. Open Claude Desktop and run a test by submitting the following prompt using the Sonnet 4 model: Take a screenshot of the header element on docs.docker.com \\u00B7\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://docs.docker.com/ai/mcp-catalog-and-toolkit/get-started/\"}},{\"type\":\"knowledge\",\"title\":\"Run MCP Servers In Seconds With Docker - DEV Community\",\"url\":\"https://dev.to/pradumnasaraf/run-mcp-servers-in-seconds-with-docker-1ik5\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"dev.to\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=dev.to\",\"site_name\":\"DEV Community\"},\"is_missing\":false,\"text\":\"Model Context Protocol (MCP) has taken the AI world by storm. It has become the de facto standard for how an AI Agent connect with tools, services, and data. As this is shaping up rapidly, working with different MCP servers, setting them up is still not an easy task, and it requires a learning curve. Docker has a track record of making developers\\u2019 lives easier to make, build and ship things faster and again it chimes in to the MCP space, bringing that same clarity, trust, and scalability. That\\u2019s exactly what Docker is doing with and introduction of Docker MCP Catalog and Docker MCP Toolkit after the Docker Model Runner (if you haven\\u2019t checked it out, here is the link). In this blog, we will first under what Docker MCP Catalog and MCP Toolkit are. Then we will see step-by-step how we can use Docker MCP Toolkit using Docker Desktop to interact with various tools using MCP Clients offered by Claude, Cursor, etc.\\n\\nIs there a way to get this running inside a docker container exposing a URL endpoint so I can connect my OpenWebUI models? I\\u0027m not a fan of the VSCode based MCP Client offerings... The catalog implementation is outstandingly good, I just want them running npt just as STDIO. I really hope someone out there can help... ... Tried the whole day today to figured it out. Did you found a way? ... Cool. I really like the idea of container and MCP server. But anyone have success in using this in VS Code with GitHub Copilot? I even tried just context7 MCP server and Copilot says found 0 tools. ... Try running docker mcp client connect vscode if you are facing any issue! ... Good spot. Here: docs.docker.com/ai/model-runner/ Comment hidden by post author - thread only accessible via permalink ... Some comments may only be visible to logged-in visitors. Sign in to view all comments.\\n\\nWith Docker MCP Toolkit, with a single click of a button from Docker Desktop, we can spin MCP servers in seconds and connect to our favourite client like Cluade, Cursor, Windsurf, Docker AI Agent, etc. The way it works is that a Gateway MCP Server is created and dynamically exposes enabled tools to compatible clients. This makes it so easy to manage all the tools in one place. Let\\u2019s now test Docker MCP Toolkit. Make sure you have the latest version of Docker Desktop. My current version is Docker Desktop (Mac) is 4.43.0 (196668). Once you open it, you will see the MCP Toolkit button on the sidebar. Initially, it was shipped as an extension; now it\\u2019s baked into the Docker Desktop itself. Now let\\u2019s install/turn on some MCP servers like curl and Wikipedia. You can search and add it. It\\u2019s that simple. It\\u2019s really handy to add and remove when needed.\\n\\nNow, let\\u2019s connect the Dockerized MCP servers to our MCP clients. I will be using Claude; you can use any according to your preference. We simply need to click on the Connect button, and it will automatically add the Docker configuration to Claude Desktop\\u0027s MCP server config claude_desktop_config.json file. The same goes for other MCP Clients. Let\\u2019s open Claude and see it. It will be Settings \\u003E Developer \\u003E MCP_DOCKER. As you can see, it\\u2019s running, which means everything is correctly configured. If we click on the Edit Config button, we can see the config and how it works. ... Let\\u2019s close the config and open the chat screen on Claude. Now, click on the Search and Tools option to see all the MCP servers, for just, it\\u2019s just one, MCP_DOCKER,, having 10 tools. If you are not seeing it, completely close down Claude and re-open it, and it will start showing up.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"June 25, 2025\",\"url\":\"https://dev.to/pradumnasaraf/run-mcp-servers-in-seconds-with-docker-1ik5\"}},{\"type\":\"knowledge\",\"title\":\"MCP Context Forge - Model Context Protocol Gateway\",\"url\":\"https://ibm.github.io/mcp-context-forge/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.io\",\"site_name\":\"IBM\"},\"is_missing\":false,\"text\":\"# Set environment variables export MCPGATEWAY_BEARER_TOKEN=$(python3 -m mcpgateway.utils.create_jwt_token --username admin@example.com --exp 10080 --secret my-test-key) export MCP_AUTH=\\u0026quot;Bearer ${MCPGATEWAY_BEARER_TOKEN}\\u0026quot; export MCP_SERVER_URL=\\u0026#x27;http://localhost:4444/servers/UUID_OF_SERVER_1/mcp\\u0026#x27; export MCP_TOOL_CALL_TIMEOUT=120 export MCP_WRAPPER_LOG_LEVEL=DEBUG # or OFF to disable logging docker run --rm -i \\\\ -e MCP_AUTH=$MCP_AUTH \\\\ -e MCP_SERVER_URL=http://host.docker.internal:4444/servers/UUID_OF_SERVER_1/mcp \\\\ -e MCP_TOOL_CALL_TIMEOUT=120 \\\\ -e MCP_WRAPPER_LOG_LEVEL=DEBUG \\\\ ghcr.io/ibm/mcp-context-forge:0.8.0 \\\\ python3 -m mcpgateway.wrapper \\u00B7 Because the wrapper speaks JSON-RPC over stdin/stdout, you can interact with it using nothing more than a terminal or pipes. # Start the MCP Gateway Wrapper export MCP_AUTH=\\u0026quot;Bearer ${MCPGATEWAY_BEARER_TOKEN}\\u0026quot; export MCP_SERVER_URL=http://localhost:4444/servers/YOUR_SERVER_UUID python3 -m mcpgateway.wrapper ... # Initialize the protocol {\\u0026quot;jsonrpc\\n\\nModel Context Protocol gateway \\u0026 proxy - unify REST, MCP, and A2A with federation, virtual servers, retries, security, and an optional admin UI. ContextForge MCP Gateway is a feature-rich gateway, proxy and MCP Registry that federates MCP and REST services - unifying discovery, auth, rate-limiting, observability, virtual servers, multi-transport protocols, and an optional Admin UI into one clean endpoint for your AI clients. It runs as a fully compliant MCP server, deployable via PyPI or Docker, and scales to multi-cluster environments on Kubernetes with Redis-backed federation and caching. ContextForge MCP Gateway is a gateway, registry, and proxy that sits in front of any Model Context Protocol (MCP) server, A2A servers or REST API-exposing a unified endpoint for all your AI clients. See the the project roadmap - which is itself evolving. ... Transport over HTTP, JSON-RPC, WebSocket, SSE (with configurable keepalive), stdio and streamable-HTTP \\u00B7\\n\\n\\uD83D\\uDD0D OpenTelemetry Observability * **Vendor-agnostic tracing** with OpenTelemetry (OTLP) protocol support * **Multiple backend support**: Phoenix (LLM-focused), Jaeger, Zipkin, Tempo, DataDog, New Relic * **Distributed tracing** across federated gateways and services * **Automatic instrumentation** of tools, prompts, resources, and gateway operations * **LLM-specific metrics**: Token usage, costs, model performance * **Zero-overhead when disabled** with graceful degradation * **Easy configuration** via environment variables Quick start with Phoenix (LLM observability): # Start Phoenix docker run -p 6006:6006 -p 4317:4317 arizephoenix/phoenix:latest # Configure gateway export OTEL_ENABLE_OBSERVABILITY=true export OTEL_TRACES_EXPORTER=otlp export OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317 # Run gateway - traces automatically sent to Phoenix mcpgateway See [Observability Documentation](https://ibm.github.io/mcp-context-forge/manage/observability/) for detailed setup with other backend\\n\\n# Set environment variables export MCPGATEWAY_BEARER_TOKEN=$(python3 -m mcpgateway.utils.create_jwt_token --username admin@example.com --exp 10080 --secret my-test-key) export MCP_AUTH=\\u0022Bearer ${MCPGATEWAY_BEARER_TOKEN}\\u0022 export MCP_SERVER_URL=\\u0027http://localhost:4444/servers/UUID_OF_SERVER_1/mcp\\u0027 export MCP_TOOL_CALL_TIMEOUT=120 export MCP_WRAPPER_LOG_LEVEL=DEBUG # or OFF to disable logging docker run --rm -i \\\\ -e MCP_AUTH=$MCP_AUTH \\\\ -e MCP_SERVER_URL=http://host.docker.internal:4444/servers/UUID_OF_SERVER_1/mcp \\\\ -e MCP_TOOL_CALL_TIMEOUT=120 \\\\ -e MCP_WRAPPER_LOG_LEVEL=DEBUG \\\\ ghcr.io/ibm/mcp-context-forge:0.8.0 \\\\ python3 -m mcpgateway.wrapper \\u00B7 Because the wrapper speaks JSON-RPC over stdin/stdout, you can interact with it using nothing more than a terminal or pipes. # Start the MCP Gateway Wrapper export MCP_AUTH=\\u0022Bearer ${MCPGATEWAY_BEARER_TOKEN}\\u0022 export MCP_SERVER_URL=http://localhost:4444/servers/YOUR_SERVER_UUID python3 -m mcpgateway.wrapper ... # Initialize the protocol {\\u0022jsonrpc\\n\\n# 1\\uFE0F\\u20E3 Isolated env \\u002B install from PyPI mkdir mcpgateway ; cd mcpgateway python3 -m venv .venv ; .\\\\.venv\\\\Scripts\\\\Activate.ps1 pip install --upgrade pip pip install mcp-contextforge-gateway # 2\\uFE0F\\u20E3 Copy and customize the configuration # Download the example environment file Invoke-WebRequest -Uri \\u0022https://raw.githubusercontent.com/IBM/mcp-context-forge/main/.env.example\\u0022 -OutFile \\u0022.env.example\\u0022 Copy-Item .env.example .env # Edit .env to customize your settings # Or set environment variables (session-only) $Env:MCPGATEWAY_UI_ENABLED = \\u0022true\\u0022 $Env:MCPGATEWAY_ADMIN_API_ENABLED = \\u0022true\\u0022 $Env:BASIC_AUTH_PASSWORD = \\u0022changeme\\u0022 # admin/changeme $Env:JWT_SECRET_KEY = \\u0022my-test-key\\u0022 $Env:PLATFORM_ADMIN_EMAIL = \\u0022admin@example.com\\u0022 $Env:PLATFORM_ADMIN_PASSWORD = \\u0022changeme\\u0022 $Env:PLATFORM_ADMIN_FULL_NAME = \\u0022Platform Administrator\\u0022 # 3\\uFE0F\\u20E3 Launch the gateway mcpgateway.exe --host 0.0.0.0 --port 4444 # Optional: background it # Start-Process -FilePath \\u0022mcpgateway.exe\\u0022 -ArgumentList \\u0022--host 0.0.0.0 --port 444\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://ibm.github.io/mcp-context-forge/\"}},{\"type\":\"knowledge\",\"title\":\"Introducing MCP Catalog and Toolkit | Docker\",\"url\":\"https://www.docker.com/blog/introducing-docker-mcp-catalog-and-toolkit/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"docker.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=docker.com\",\"site_name\":\"Docker\"},\"is_missing\":false,\"text\":\"AI agents are moving fast\\u2014from labs to real-world apps. And as they go from generating text to taking real action, the Model Context Protocol (MCP) has emerged as the de facto standard for connecting agents to tools. MCP is exciting. It\\u2019s simple, modular, and built on web-native principles. We believe it has the potential to do for agentic AI interaction what containers did for app deployment \\u2013 standardize and simplify a complex, fragmented landscape. But, that leaves us at a classic inflection point. MCP Clients and Servers hold enormous potential, but the experience isn\\u2019t production-ready \\u2013 yet. Discovery is fragmented, trust is manual, and core capabilities like security and authentication are still patched together with workarounds. To move from prototypes to production, a few things need to become non-negotiable. First, developers need a trusted, centralized hub to discover tools \\u2013 no more digging through Discord threads or Twitter replies.\\n\\nDiscover the Docker MCP Catalog and Toolkit, a new way to source, use, and scale with MCP tools.\\n\\nEmpower your agents to configure MCPs dynamically with the Docker MCP Gateway smart search and code mode tools. ... Run multimodal AI models that understand text, images, and audio with Docker Model Runner. Explore CLI and API examples, run Hugging Face models, and try a real-time webcam vision demo. ... Rigid security breeds shadow IT.\\n\\nAlongside it, the Docker MCP Toolkit brings these tools to life \\u2013 making them secure, seamless, and instantly usable on your local machine or anywhere Docker runs. With one-click launch from Docker Desktop, you can spin up MCP servers in seconds and connect them to clients like Docker AI Agent, Claude, Cursor, VS Code, Windsurf, continue.dev, and Goose \\u2013 no complex setup required. It also includes built-in credentials and OAuth management, integrated with your Docker Hub account, ensuring smooth authentication and making it easy to revoke credentials when necessary. A Gateway MCP Server dynamically exposes enabled tools to compatible clients, while the new docker mcp CLI lets you build, run, and manage them with ease. And with built-in memory, network and disk isolation, every tool runs securely by default-ready for production from day one. So what does the future look like with Docker MCP Catalog and Toolkit?\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"May 19, 2025\",\"url\":\"https://www.docker.com/blog/introducing-docker-mcp-catalog-and-toolkit/\"}},{\"type\":\"knowledge\",\"title\":\"Api-gateway MCP Server | Docker MCP Catalog\",\"url\":\"https://hub.docker.com/mcp/server/mcp-api-gateway/overview\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"docker.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=docker.com\",\"site_name\":\"Docker Hub\"},\"is_missing\":false,\"text\":\"A universal MCP (Model Context Protocol) server to integrate any API with Claude Desktop using only Docker configurations. What is an MCP Server?\\u2060 \\u00B7 Execute any API endpoint with custom parameters \\u00B7 Get information about available APIs and their endpoints \\u00B7 { \\u0026quot;mcpServers\\u0026quot;: { \\u0026quot;mcp-api-gateway\\u0026quot;: ...\\n\\nA universal MCP (Model Context Protocol) server to integrate any API with Claude Desktop using only Docker configurations. What is an MCP Server?\\u2060 \\u00B7 Execute any API endpoint with custom parameters \\u00B7 Get information about available APIs and their endpoints \\u00B7 { \\u0022mcpServers\\u0022: { \\u0022mcp-api-gateway\\u0022: { \\u0022command\\u0022: \\u0022docker\\u0022, \\u0022args\\u0022: [ \\u0022run\\u0022, \\u0022-i\\u0022, \\u0022--rm\\u0022, \\u0022-e\\u0022, \\u0022API_1_NAME\\u0022, \\u0022-e\\u0022, \\u0022API_1_SWAGGER_URL\\u0022, \\u0022-e\\u0022, \\u0022API_1_HEADER_AUTHORIZATION\\u0022, \\u0022mcp/api-gateway\\u0022 ], \\u0022env\\u0022: { \\u0022API_1_NAME\\u0022: \\u0022name\\u0022, \\u0022API_1_SWAGGER_URL\\u0022: \\u0022https://api.github.com/swagger.json\\u0022, \\u0022API_1_HEADER_AUTHORIZATION\\u0022: \\u0022token\\u0022 } } } } Copy \\u00B7 Why is it safer to run MCP Servers with Docker?\\u2060 \\u00B7 Manual installation \\u00B7 You can install the MCP server using: \\u200B \\u00B7 Installation for \\u00B7 Claude Desktop \\u00B7 Continue.dev \\u00B7 Cursor \\u00B7 Visual Studio Code \\u00B7 Gordon \\u00B7 Docker Hub official MCP server. A Model Context Protocol (MCP) server that provides web search capabilities through DuckDuckGo, with additional features for content fetching and parsing.\\n\\nA universal MCP (Model Context Protocol) server to integrate any API with Claude Desktop using only Docker configurations. ... { \\u0022mcpServers\\u0022: { \\u0022mcp-api-gateway\\u0022: { \\u0022command\\u0022: \\u0022docker\\u0022, \\u0022args\\u0022: [ \\u0022run\\u0022, \\u0022-i\\u0022, \\u0022--rm\\u0022, \\u0022-e\\u0022, \\u0022API_1_NAME\\u0022, \\u0022-e\\u0022, \\u0022API_1_SWAGGER_URL\\u0022, \\u0022-e\\u0022, \\u0022API_1_HEADER_AUTHORIZATION\\u0022, \\u0022mcp/api-gateway\\u0022 ], \\u0022env\\u0022: { \\u0022API_1_NAME\\u0022: \\u0022name\\u0022, \\u0022API_1_SWAGGER_URL\\u0022: \\u0022https://api.github.com/swagger.json\\u0022, \\u0022API_1_HEADER_AUTHORIZATION\\u0022: \\u0022token\\u0022 } } } } Copy \\u00B7 Why is it safer to run MCP Servers with Docker?\\u2060 ... Docker Hub official MCP server. A Model Context Protocol (MCP) server that provides web search capabilities through DuckDuckGo, with additional features for content fetching and parsing. Fetches a URL from the internet and extracts its contents as markdown.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://hub.docker.com/mcp/server/mcp-api-gateway/overview\"}},{\"type\":\"knowledge\",\"title\":\"How to build and deliver an MCP server for production | Docker\",\"url\":\"https://www.docker.com/blog/build-to-prod-mcp-servers-with-docker/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"docker.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=docker.com\",\"site_name\":\"Docker\"},\"is_missing\":false,\"text\":\"A much better approach is to simply use one MCP server: Docker. This MCP server acts as a gateway into a dynamic set of containerized tools. But how can tools be dynamic? A dynamic set of tools in one MCP server means that users can go somewhere to add or remove MCP tools without modifying any config. This is achieved through a simple UI in Docker Desktop to maintain a list of tools which the MCP gateway can serve out. Users gain the ability to configure their MCP clients use hundreds of Dockerized servers all by \\u201Cconnecting\\u201D to the gateway MCP server. Much like Docker Hub, Docker MCP Catalog delivers a trusted, centralized hub to discover tools for developers. And for tool authors, that same hub becomes a critical distribution channel: a way to reach new users and ensure compatibility with platforms like Claude, Cursor, OpenAI, and VS Code. Finally, in order to securely pass access tokens and other secrets around containers, we\\u2019ve developed a feature as part of Docker Desktop to manag\\n\\nIn December of 2024, we published a blog with Anthropic about their totally new spec (back then) to run tools with AI agents: the Model Context Protocol, or MCP. Since then, we\\u2019ve seen an explosion in developer appetite to build, share, and run their tools with Agentic AI \\u2013 all using MCP. We\\u2019ve seen new MCP clients pop up, and big players like Google and OpenAI committing to this standard. However, nearly immediately, early growing pains have led to friction when it comes down to actually building and using MCP tools. At the moment, we\\u2019ve hit a major bump in the road. ... Getting up and running with MCP servers is a headache for devs. The standard runtimes for MCP servers rely on a specific version of Python or NodeJS, and combining tools means managing those versions, on top of extra dependencies an MCP server may require. ... Giving an LLM direct access to run software on the host system is unacceptable to devs outside of hobbyist environments.\\n\\nLearn from Docker experts to simplify and advance your app development and management with Docker. Stay up to date on Docker events and new version announcements!\\n\\nEmpower your agents to configure MCPs dynamically with the Docker MCP Gateway smart search and code mode tools. ... Run multimodal AI models that understand text, images, and audio with Docker Model Runner. Explore CLI and API examples, run Hugging Face models, and try a real-time webcam vision demo. ... Rigid security breeds shadow IT.\\n\\nA much better approach is to simply use one MCP server: Docker. This MCP server acts as a gateway into a dynamic set of containerized tools. But how can tools be dynamic? A dynamic set of tools in one MCP server means that users can go somewhere to add or remove MCP tools without modifying any config. This is achieved through a simple UI in Docker Desktop to maintain a list of tools which the MCP gateway can serve out. Users gain the ability to configure their MCP clients use hundreds of Dockerized servers all by \\u201Cconnecting\\u201D to the gateway MCP server. Much like Docker Hub, Docker MCP Catalog delivers a trusted, centralized hub to discover tools for developers. And for tool authors, that same hub becomes a critical distribution channel: a way to reach new users and ensure compatibility with platforms like Claude, Cursor, OpenAI, and VS Code. Finally, in order to securely pass access tokens and other secrets around containers, we\\u2019ve developed a feature as part of Docker Desktop to manag\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"June 10, 2025\",\"url\":\"https://www.docker.com/blog/build-to-prod-mcp-servers-with-docker/\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"092485c4-319c-41c8-90ff-d376b257f200\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

