text = "Version control strategy: Is forum content backed to git? \n* Forum writes → git commits → MCP builds from git?\n* Or forum is the source of truth, no git involved?\nI am thinking not as far as the forum data. Maybe certain would be chosen to be but it would more likely that things generated or used as part of dev and build would be in git. If we build our own, being event sourced would basically replace the git function."

