kind = "plain_text"
text = "Exactly! **Markdown as source → MCP Resources as build output**\n\n## **The Build Pipeline**\n\n```\nEdit (human-friendly)           Build (automated)              Consume (LLM)\n─────────────────────          ───────────────────          ────────────────\ncontext-library/               FnMCP.IvanDevFramework         LLM queries MCP\n├── event-modeling.md    →     resources/                →   \"docs://event-modeling\"\n├── f-sharp-patterns.md  →     ├── event-modeling.json   →   gets optimized version\n└── penpot-conventions.md →    └── f-sharp-patterns.json →   with metadata\n```\n\n## **The Optimization Opportunities**\n\nWhen building markdown → MCP Resources, you can:\n\n1. **Add metadata** for better discovery\n   ```json\n   {\n     \"uri\": \"docs://event-modeling\",\n     \"name\": \"Event Modeling - Ivan's Approach\",\n     \"description\": \"Multi-layer event modeling with business/technical views\",\n     \"mimeType\": \"text/markdown\",\n     \"content\": \"...\",\n     \"tags\": [\"methodology\", \"architecture\", \"core\"],\n     \"lastUpdated\": \"2025-11-09\"\n   }\n   ```\n\n2. **Chunk large docs** intelligently\n   - Split by sections for token efficiency\n   - `docs://event-modeling/overview`\n   - `docs://event-modeling/layers`\n   - `docs://event-modeling/gwt-integration`\n\n3. **Cross-reference** automatically\n   - Add links between related concepts\n   - \"See also: Domain Modeling, Static State Design\"\n\n4. **Format optimization**\n   - Strip unnecessary formatting\n   - Restructure for LLM comprehension\n   - Add examples inline\n\n## **The Developer Experience**\n\n```bash\n# You edit markdown\nvim context-library/event-modeling.md\n\n# Build the MCP server\ndotnet build FnMCP.IvanDevFramework\n\n# MCP server now serves updated content\n# LLMs automatically see new version\n```\n\n## **Versioning Bonus**\n\nSince markdown is source of truth:\n- Git tracks actual changes\n- Semantic versioning for methodology updates\n- Can generate changelogs: \"What's new in IvanDevFramework v2.3?\"\n- Rollback if needed\n\n**Does this match your mental model?** The key is: humans never edit the MCP server directly - they edit markdown, and the build process makes it LLM-optimal."

