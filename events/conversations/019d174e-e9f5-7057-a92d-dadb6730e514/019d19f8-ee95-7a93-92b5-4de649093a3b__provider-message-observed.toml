[[body.segments]]
kind = "plain_text"
text = "Yes, Penpot is what designers can use to build UI. It is less mature than Figma, which is a market giant in the design space, but Penpot is free to use, open source, etc. and aligns with my philosophy and values well. My thoughts have been to remove the conversions and be able to design a screen in Penpot, and through some method and convention, have that then integrate into the build/development process and it is what ends up in the app. So the Penpot file becomes the Source of Truth (SoT) for the UI and the UX in a way. Especially if the prototyping in Penpot is able to be used to show flow and/or paths through the system. Still is all still very theoretical."

