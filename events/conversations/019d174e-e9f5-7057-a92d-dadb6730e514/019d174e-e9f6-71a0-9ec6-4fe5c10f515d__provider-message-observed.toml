text = "perspective is what I am realizing is the key here. The top most EventModel is the shared view of ALL involved in the stated domain, meaning the business. What are the events that need to happen for them to make money. or do their thing. What screenshots represent what they see and use for those events to happen. I am feeling that if the event model is a \"living\" model, additional details can be activated that then details more details as the individual specifics like departments get more nitty gritty, then add in technical flows. If this were like an html page, I can choose to add details via check boxes to see the details that are relevant to what the I want to see, and the marketing team member can see only the details they wish to see, which is high level everywhere but more detailed for their portions. Please take my comments as me talking with nativity, been following Adam since like 2018, but things just clicked for me last week, just need to get some experience doing it now and hone in my thought patterns. seems like everything always comes down to scope, hierarchy and the dreaded... STATE"

