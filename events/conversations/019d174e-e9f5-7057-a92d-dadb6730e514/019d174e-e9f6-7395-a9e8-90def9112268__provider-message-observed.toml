kind = "plain_text"
text = "Ah, important distinction! So this isn't just a \"Cheddar development framework\" - it's an **Ivan development framework** that happens to be used for:\n- Cheddar (financial apps)\n- FnTools (infrastructure/tooling)\n- Future domains you haven't even conceived yet\n\nThe framework is domain-agnostic, focusing on **how you build software** rather than **what you're building**.\n\nThis means the template needs to be:\n- General enough to apply to any project type\n- Specific enough to encode your actual workflow and preferences\n- Modular so domain-specific pieces (like \"trucking industry context\") can be added without cluttering unrelated projects\n\nGot it. I'm ready for your answers to those earlier questions whenever you want to tackle them."

