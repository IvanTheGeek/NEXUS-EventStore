text = "Have you felt annoyed by threaded discussion systems, where each reply is indented a bit to the right of the comment it replies to? And, after a few nested replies, the indentation becomes rather wide, so there&#x27;s not much space left for the comment text. Have a look at this example: (from this ...\n\nIn the cases I've seen, this approach actually solves the problem with too deep indentation. However I wonder if another problem becomes somewhat worse: Will people mistake the discussion system for being a flat discussion? And always reply to the comment at the very bottom of the page, regardless of which comment they actually want to reply to? — However, would this matter much? Perhaps one could simply let the discussion system be a hybrid between a flat and a threaded system, if that's what people choose to use it like. What do you think? Is it a good idea to avoid too-deep-indentation in the way I've done? And if you think this is really interesting, have a look at this ux.stackexchange page. ... Looks very good! In fact, you can probably remove all the arrows except those showing a split in a tree (first \"and again\" in the example). What I'm wondering however is -- is it possible to use this kind of approach to formatting of programming code?\n\nHave you felt annoyed by threaded discussion systems, where each reply is indented a bit to the right of the comment it replies to? And, after a few nested replies, the indentation becomes rather wide, so there's not much space left for the comment text. Have a look at this example: (from this website) There are some ways to approach [the problem with too wide indentation resulting in too narrow comment text]: One website, [Reddit](http://reddit.com), breaks of the discussion to a separate page, when the indentation becomes too deep. One discussion system, LiveFyre, reverts to a flat discussion when the indentation becomes too deep. See example to the right. Finally, [Hacker News](http://news.ycombinator.com) simply lets the comments get narrower and narrower, as far as I've seen. Another way to mitigate the problem is to simply avoid indenting, when possible.\nAnd when they type their question, Talkyard searches for any older topics matching the question they type. ... Yes, (with threads, you mean &quot;sub threads&quot; in a discussion topic, right? As in, if you reply to this post, then we have a sub thread, in this topic) No, by threads I meant the whole topic/page. It&#x27;s very counterintuitive that only replies to a sub-thread within a topic will get me notified whereas replies to other sub-threads or replies directly to the original question won&#x27;t give me notifications. It should be so that the default is, that every reply to a topic/page that I&#x27;ve taken part in, will give me a notification. Normal forum people expect any reply in a page to be seen by anybody participating in it. I think basically it just needs to be more like Facebook or Github so the forum is not too dissimilar and hence causing issues for people who don&#x27;t understand it.\n\nThis sounds great! Especially if we could be allowed to change the text of this to match our own forum :) ... It should be so that the default is, that every reply to a topic/page that I've taken part in, will give me a notification · Hmm ... yes that's probably a better default, for most communities & people. At the same time, imagine if, at a place like HackerNews, one got notified about all replies everywhere in the same discussion topic, after having replied to someone oneself, once — that could become frustrating (sometimes 100s of replies). But maybe one could get a notification only about the first reply in other people's sub threads (in the same topic, but where one didn't reply oneself) — and only after having clicked the link in that reply, would one get additional notifications about other people's sub threads. Then, although maybe 100s of replies, there'd be just 1 notification (until one has clicked & followed it, thereafter, more, but just 1 \"pending\" at a time).\n\nThere's a problem though with the way notifications work on structured threads, in that I'll only receive a notification if the user tags me or replies directly to one of my posts. But users tend to hit random Reply buttons so while they may intend to reply directly they often end up replying to something different. That's not a huge problem, but it does mean that I'm now missing notifications from threads I participate in. I wish there would be a way to have notifications from any thread I've participated in. That level of granularity doesn't seem to be possible now. Secondly, the other related issue here is that our users add replies to long solved/closed threads. We want to encourage users to instead open new threads as otherwise we can't use the \"solved or not solved\" status to track what we still need to work on. Could there be a way to \"half-lock\" closed threads?\n\nSo, for example, people who already participated in the thread can still contribute, but it's closed for new participants - and that any new participant who wants to reply instead gets nicely nudged towards creating a new thread instead (perhaps even automatically linking to the thread they wanted to comment on)? [Edit] Notifications discussed here instead: https://www.talkyard.io/-445/notification-settings-for-threads But the half-locked closed threads — not yet implemented. Nice idea though :- ) /KajMagnus [/Edit] ... Yes, (with threads, you mean \"sub threads\" in a discussion topic, right? As in, if you reply to this post, then we have a sub thread, in this topic) Actually, that's how the current notification levels are supposed to work — it's just that I didn't implement this yet. Here're some of the notification levels: /** Notified of @mentions and posts in one's sub threads (incl direct replies).\n\nYou'll get notified about all replies in this topic. Click to change: [ v Every post ] ... I think a setting is the way to go. For Talkyard to support sites like HackerNews (which I don't know, but just going from your description here) where there's such a thing as a sub-thread, the current system makes sense. For SoundFlow, our users don't think of it as sub-threads. They think of the whole page as one thread, and they reply in that thread where they want. Having the ability to configure the default notification setting for topics as a global admin config thingy seems like the only solution that works for both scenarios :) ... Ok, a notification settings sounds good — I've deployed a new Ty version to here at Ty .io now, with such a setting — have a look in your profile: https://www.talkyard.io/-/users/chrscheuer/preferences/notifications ·\nThe lookup [LKP:] above could be done slightly differently: Ty could look up only all ancestor comments, and include only those in the References: ... header. Instead of all comments on the same page. — That is, sub threads on the same page. I wonder what mail clients do then: different &quot;threads&quot;, but all of them starting with the same Message-ID (for the Orig Post). And Ty also sets In-Reply-To: ... to the Message-ID about the parent comment (which would also ... always? be last in the References: ... list), or the whole page&#x27;s Message-ID if it&#x27;s the Orig Post. And the subject line would, I suppose, have to include the original title of the page, even if, later on, it got renamed, because apparently Gmail groups by email subject line instead (see: https://stackoverflow.com/a/23482109). — So, for each person getting notified, maybe Ty would need to remember the original title of that email thread ?\n\nI'd love it if TalkYard would make it possible for email clients to create email threads that matched the forum threads. So if I had email notifications enabled, and there were 5 posts in topic A, and 3 posts in topic B, and 6 posts in Topic C, I'd have 14 total emails, but my email client could group them into three email threads (one thread for each topic). So in my email client, the threads would look something like this: To do this, TY would have to use subject lines that matched the forum thread and set the In-Reply-To and References email headers to tell the email client which emails are associated with which forum threads. When I'm reading TY notification emails, I'd like to follow the thread, but the current implementation makes each notification totally independent, so it creates a lot of clutter. I often see the last message in a thread where the user says their issue is resolved, but then I have to go through all the emails to find all the notifications that were associated \n\nThanks! My team is very excited. I just saw TalkYard thread two email notifications in the same thread and was delighted! ... Threaded emails are working great! It's so much easier to manage our discussions now. I have a small request for a tweak. Is it possible to use a tag other than blockquote for the reply contents? In Fastmail (perhaps in other clients too), it thinks that blockquote tags are strictly for quoting text from earlier in the thread, so it collapses them by default: ... I'll fix, I could change to a <div>, maybe indented (what do you think?). I suppose <q> tags might look odd — maybe the email client then adds quotation marks at the start and end of each paragraph (I suppose each paragraph should be wrapped in a <q>, since it's an inline element, hmm). I could experiment a bit with that. ... In a way, the text in the reply, it's not a quote, but the actual main message, so ...\n\nThe lookup [LKP:] above could be done slightly differently: Ty could look up only all ancestor comments, and include only those in the References: ... header. Instead of all comments on the same page. — That is, sub threads on the same page. I wonder what mail clients do then: different \"threads\", but all of them starting with the same Message-ID (for the Orig Post). And Ty also sets In-Reply-To: ... to the Message-ID about the parent comment (which would also ... always? be last in the References: ... list), or the whole page's Message-ID if it's the Orig Post. And the subject line would, I suppose, have to include the original title of the page, even if, later on, it got renamed, because apparently Gmail groups by email subject line instead (see: https://stackoverflow.com/a/23482109). — So, for each person getting notified, maybe Ty would need to remember the original title of that email thread ?\n\nI don't think you'd have to keep track of which messages each recipient has received. It should be sufficient for Ty to store a unique Message-ID for each message in a thread, and then whenever there's a reply, you walk up the tree of responses and add their Message-ID to the References header until you get to the root post of the thread. If a mail client has never seen some of the message IDs referenced in a References header, that should be fine. I think mail clients will just ignore the unrecognized ones. I wonder if there are security implications from generating these Message-IDs per post, or per person. If it matters if everyone who gets notified about a post, gets the same Message-ID. Or if it's somehow better, if everyone see unique Message-IDs. ... ? That doesn't strike me as a security liability, but you could try sending messages from Google Groups / Mailchimp / Topicbox and see if they generate a unique Message-ID per recipient.\nThe default notification setting for threads in which only direct replies will give a notification is causing me to miss an increasing amount of important replies from users. This is becoming quite a problem for us, since users don&#x27;t understand why we don&#x27;t reply to them. I think you mentioned it could be made possible to control this at a site-wide level. Essentially what we need is for the Notifications setting to switch to &quot;Every post&quot; on a thread that you&#x27;ve contributed to. You can then always switch it back when needed (I&#x27;m starting to do this more and more as well). By thread, I mean what you in the API call a page. ... I&#x27;ll fix, new version upcoming in two or three days (is the plan, just some testing left to do). Thereafter, when one posts one&#x27;s first reply on a page (or &quot;topic&quot; or &quot;thread&quot;), one gets subscribed to that page: notified about all new posts anywhere one the page.\nYou can directly find the most recent answers and replies: Open the sidebar, click the Recent tab, and find the most recent replies, click to scroll. (But at StackOverflow, Reddit, HackerNews etc, it&#x27;s hard to find them (since the discussions ...\n\nA community discussion platform: Brings together the main features from StackOverflow, Slack, Discourse, Reddit, and Disqus blog comments. - debiki/talkyard\nThere has been some consternation about the threading model used by Discourse, community.lsst.org’s platform, from those expecting the types of hierarchically nested reply chains that are standard on many forums. This post explains Discourse’s threading design, reasons for its design, and gives some straightforward suggestions on how to work within the design. With experience, Discourse’s threading and general view towards maintaining conversations should become natural to you. Discourse’s thre...\nNo need to sign up twice — user accounts in the forum, work at the blog too. Talkyard works fine also if your whole company joins the same discussion. You return to a threaded discussion the next day — and want to find new replies? Just open the sidebar, click the Recent tab. Other software — like StackOverflow, Reddit, HackerNews — require you to re-read the whole discussion from top to bottom, to find any new replies. Navigate large discussions, also on mobile: Click to jump to the parent comment and refresh your mind. Then click Back, to continue reading. See who's doing what (e.g. answering a question or impementing a feature). Create custom user groups. Grant permissions. Custom branding: Change colors and the top navigation bar to match your main website. Use Like and Unwanted votes to encourage good behavior and staying on-topic. Work in progress.\nIn these cases it would be nice to be able to select multiple replies as good answers. Maybe this could be an option for each forum to enable/disable as they wish? ... Yes I think this makes sense. In fact, currently I&#x27;m thinking about slightly unifying pages (a.k.a. threads) and comments, so that lots of things that works for pages, will work also for comments: A comment can, in the (distant?) future, be changed to a task, with a Doing status: Planned, Doing, Done. Or to a question, with an answer selected in the sub thread with the comment as its root. So, in your example, Talkyard could understand that &quot;We need a solution for the code&quot; is a question waiting for an answer, and it&#x27;d appear in some &quot;Waiting for an answer&quot; list, so as not to be forgotten. (Although it&#x27;s &quot;just&quot; a comment, not a page.) In this way, one can create one main page for a small project, and then add comments ...\n\nIn these cases it would be nice to be able to select multiple replies as good answers. Maybe this could be an option for each forum to enable/disable as they wish? ... Yes I think this makes sense. In fact, currently I'm thinking about slightly unifying pages (a.k.a. threads) and comments, so that lots of things that works for pages, will work also for comments: A comment can, in the (distant?) future, be changed to a task, with a Doing status: Planned, Doing, Done. Or to a question, with an answer selected in the sub thread with the comment as its root. So, in your example, Talkyard could understand that \"We need a solution for the code\" is a question waiting for an answer, and it'd appear in some \"Waiting for an answer\" list, so as not to be forgotten. (Although it's \"just\" a comment, not a page.) In this way, one can create one main page for a small project, and then add comments for a few separate tasks or questions to be done or answered, as part of that project.\nWe usually reply within three days.\nConversation threading is a feature used by many email clients, bulletin boards, newsgroups, and Internet forums in which the software aids the user by visually grouping messages with their replies. These groups are called a conversation, topic thread, or simply a thread. A discussion forum, e-mail client or news client is said to have a &quot;conversation view&quot;, &quot;threaded topics&quot; or a &quot;threaded mode&quot; if messages can be grouped in this manner. An email thread is also sometimes called an email chain. Threads can be displayed in a variety of ways. Early messaging systems (and most modern email clients) will automatically include original message text in a reply, making each individual email into its own copy of the entire thread. Software may also arrange threads of messages within lists, such as an email inbox. These arrangements can be hierarchical or nested, arranging messages close ...\n\nConversation threading is a feature used by many email clients, bulletin boards, newsgroups, and Internet forums in which the software aids the user by visually grouping messages with their replies. These groups are called a conversation, topic thread, or simply a thread. A discussion forum, e-mail client or news client is said to have a \"conversation view\", \"threaded topics\" or a \"threaded mode\" if messages can be grouped in this manner. An email thread is also sometimes called an email chain. Threads can be displayed in a variety of ways. Early messaging systems (and most modern email clients) will automatically include original message text in a reply, making each individual email into its own copy of the entire thread. Software may also arrange threads of messages within lists, such as an email inbox. These arrangements can be hierarchical or nested, arranging messages close to their replies in a tree, or they can be linear or flat, displaying all messages in chronological order re\n\nModern email clients then can use the unique message identifiers found in the RFC 822 Message-ID, In-Reply-To: and References: fields of all received email headers to locate the parent and root message in the hierarchy, reconstruct the chain of reply-to actions that created them, and display them as a discussion tree. The purpose of the References: field is to enable reconstruction of the discussion tree even if some replies in it are missing. Threaded discussions allow readers to quickly grasp the overall structure of a conversation, isolate specific points of conversations nested within the threads, and as a result, post new messages to extend discussions in any existing thread or sub-thread without time constraints. With linear threads on the other hand, once the topic shifts to a new point of discussion, users are: 1) less inclined to make posts to revisit and expand on earlier points of discussion in order to avoid fragmenting the linear conversation similar to what occurs with tu\n\nIt can be difficult to process, analyze, evaluate, synthesize, and integrate important information when viewing large lists of messages. Grouping messages by thread makes the process of reviewing large numbers of messages in context to a given discussion topic more time efficient and with less mental effort, thus making more time and mental resources available to further extend and advance discussions within each individual topic/thread. In group forums, allowing users to reply to threads will reduce the number of new posts shown in the list. Some clients allow operations on entire threads of messages. For example, the text-based newsreader nn has a \"kill\" function which automatically deletes incoming messages based on the rules set up by the user matching the message's subject or author. This can dramatically reduce the number of messages one has to manually check and delete.\n\nThread fragmentation can be particularly problematic for systems that allow users to choose different display modes (hierarchical vs. linear). Users of the hierarchical display mode will reply to older messages, confusing users of the linear display mode. The following email clients, forums, bbs, newsgroups, image/text boards, and social networks can group and display messages by thread.\n\nAccurate threading of messages requires the email software to identify messages that are replies to other messages. Some algorithms used for this purpose can be unreliable. For example, email clients that use the subject line to relate messages can be fooled by two unrelated messages that happen to have the same subject line. Modern email clients use unique identifiers in email headers to locate the parent and root message in the hierarchy. When non-compliant clients participate in discussions, they can confuse message threading as it depends on all clients respecting these optional mail standards when composing replies to messages. Messages within a thread do not always provide the user with the same options as individual messages. For example, it may not be possible to move, star, reply to, archive, or delete individual messages that are contained within a thread.\n<system>You only have 19 searches left this turn</system>"

