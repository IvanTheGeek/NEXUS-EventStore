kind = "plain_text"
text = "Excellent question! This is the **key architectural decision**. Let me break down what belongs where:\n\n## **MCP Server (FnMCP.IvanDevFramework) - ACTIONS & DYNAMIC CONTEXT**\n\n**Tools** - Things you want to DO:\n- `create_penpot_component` - Actually create components in Penpot\n- `read_penpot_design` - Fetch current design state\n- `validate_design_conventions` - Check if design follows your rules\n- `generate_bolero_code` - Convert Penpot → F# code\n- `update_event_model` - Modify the event model\n- `extract_gwt_scenarios` - Pull Given-When-Then from prototypes\n\n**Resources** - Things that CHANGE frequently:\n- Current project's Event Model (updates as you work)\n- Penpot component library for this project\n- Active design files you're working on\n- Generated code stubs\n\n**Prompts** - Workflows you invoke often:\n- \"Create new screen using static-state pattern\"\n- \"Analyze this UI for mobile thumb-friendliness\"\n- \"Generate complete feature from Event Model slice\"\n\n## **Project Knowledge - STABLE REFERENCE MATERIAL**\n\n- Your development philosophy document (rarely changes)\n- Event Modeling methodology (reference book concepts)\n- Domain Modeling Made Functional principles\n- F# / Bolero coding standards\n- Your influence system rules\n- Cheddar ecosystem architecture\n\n## **Skills - HOW-TO PROCEDURES**\n\nA skill for: \"How to Design & Build a Cheddar App\"\n- Step-by-step: Event Model → Penpot design → F# code → deployment\n- Explains your static-state design approach\n- Shows how to use FnMCP.IvanDevFramework tools in sequence\n- Includes examples and decision trees\n\n## **The Decision Rule**\n\nAsk yourself:\n\n**\"Does it CHANGE or DO something?\"** → MCP Server\n- Penpot files change\n- Event models evolve  \n- Code gets generated\n\n**\"Is it STABLE KNOWLEDGE I reference?\"** → Project Knowledge\n- Your philosophy doesn't change daily\n- EM book concepts are fixed\n- F# best practices evolve slowly\n\n**\"Is it a COMPLEX PROCEDURE to follow?\"** → Skill\n- Multi-step workflows\n- Decision trees\n- \"How do I go from idea to deployed app?\"\n\n## **For Your Situation**\n\nStart simple:\n\n**FnMCP.IvanDevFramework** = All the Penpot tools + current project resources\n**Project Knowledge** = Philosophy docs + EM/DDD books + coding standards  \n**One Skill** = \"Ivan's App Development Workflow\" (comprehensive guide)\n\nThis avoids over-complicating while keeping things organized. Does this distinction make sense?"

