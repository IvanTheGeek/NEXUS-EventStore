[[body.segments]]
kind = "reasoning"
text = "Good question about terminology. Let's think about what these screens actually are in the context of our framework:\n\n- \"Mockups\" suggests they're prototypes or representations, not final\n- But in our static-state design, each screen IS a discrete state\n- In Event Modeling, the green boxes are \"Views\" or \"Read Models\"\n- In Penpot, they'll be \"Frames\" or \"Artboards\"\n- In the path context, they're \"States\" the user passes through\n- In implementation, they'll become Bolero views\n\nWe've talked about:\n- Static-state design (each screen = one state)\n- Penpot frames mapping to application states\n- Event Model views (green boxes)\n\nSo what's the best term? Options:\n1. **Views** - EM terminology, but might confuse with \"view\" in MVC\n2. **States** - Accurate for static-state design, emphasizes discrete nature\n3. **Screens** - Simple, clear, what users see\n4. **Frames** - Penpot terminology\n5. **Mockups** - Implies temporary/prototype\n\nGiven our framework philosophy, I think \"States\" or \"Screens\" are best. \"States\" is more technically accurate to our static-state design approach. \"Screens\" is more accessible and clear.\n\nLet me ask Ivan what he thinks would work best."

[[body.segments]]
kind = "plain_text"
text = "Great question - terminology matters! Let's think about what these actually are in our framework:\n\n## **Possible Terms:**\n\n**Mockups** ❌\n- Implies temporary/prototype\n- Suggests \"we'll replace these later\"\n- Not accurate - they're the actual design\n\n**Screens** ✅\n- Simple, clear\n- What users actually see\n- Accessible language\n\n**States** ✅✅\n- Aligns with static-state design\n- Each one IS a discrete state\n- Technically accurate\n- Emphasizes Event Modeling approach\n\n**Views** ⚠️\n- Event Modeling terminology (green boxes)\n- But might confuse with MVC \"view\"\n- Could work but needs context\n\n**Frames** ⚠️\n- Penpot's terminology\n- Tool-specific\n\n## **My Recommendation:**\n\nUse **\"States\"** when discussing architecture/framework\nUse **\"Screens\"** when discussing UX/user-facing\n\nExample:\n- \"The LocationCapture **state** displays a **screen** where...\"\n- \"This **state** shows the user a **screen** with...\"\n\nOr just pick one consistently. **\"States\"** feels most aligned with your static-state design philosophy.\n\n**What feels right to you?**"

