kind = "plain_text"
text = "Ahh, see this is where I am still trying to see if I can actualize the vision in my head into an actual usable plan. Another aspect is the event modeling aspects. Event Models have primarily been done on a whiteboard, mainly Miro. Penpot could be considered a whiteboard as well. So why not use Penpot for the EventModel as well? or at least use it to visualize it and have tools to access it. The screens could go from concept (being just a pic) all the way to actual screens and pieces or components used in production. For the app screens, I feel that changes would be made in Penpot, then through a process (programmatically likely) that gets built into the app executable. For the EventModel it would also use those UI updates but also maybe build through to the EventModel tool I have envisioned. This tool would be like another app, html for my hybrid screen approach, that the EventModel could be viewed, filtered, and maybe even modified and improved with the app interactions coming back to modify they system in a feedback/2-way sync way. Again, still very theoretical. I am thinking that certain parts would have the actual code as the SoT (using the type driven design concepts) and some would be in Penpot."

