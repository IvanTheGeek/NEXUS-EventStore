kind = "tool_result"
text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Prompts - Model Context Protocol\",\"url\":\"https://modelcontextprotocol.io/specification/2025-06-18/server/prompts\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"modelcontextprotocol.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=modelcontextprotocol.io\",\"site_name\":\"Model Context Protocol\"},\"is_missing\":false,\"text\":\"All content types in prompt messages support optional annotations for metadata about audience, priority, and modification times. ... { \\u0026quot;type\\u0026quot;: \\u0026quot;text\\u0026quot;, \\u0026quot;text\\u0026quot;: \\u0026quot;The text content of the message\\u0026quot; } This is the most common content type used for natural language interactions. Image content allows including visual information in messages: ... { \\u0026quot;type\\u0026quot;: \\u0026quot;image\\u0026quot;, \\u0026quot;data\\u0026quot;: \\u0026quot;base64-encoded-image-data\\u0026quot;, \\u0026quot;mimeType\\u0026quot;: \\u0026quot;image/png\\u0026quot; } The image data MUST be base64-encoded and include a valid MIME type. This enables multi-modal interactions where visual context is important. Audio content allows including audio information in messages: ... { \\u0026quot;type\\u0026quot;: \\u0026quot;audio\\u0026quot;, \\u0026quot;data\\u0026quot;: \\u0026quot;base64-encoded-audio-data\\u0026quot;, \\u0026quot;mimeType\\u0026quot;: \\u0026quot;audio/wav\\u0026quot; } The audio data MUST be base64-encoded and include a valid MIME type. This enables multi-modal interactions where audio context is important. Embedded resources allow referencing server-side resources directly in messages: ...\\n\\nAll content types in prompt messages support optional annotations for metadata about audience, priority, and modification times. ... { \\u0022type\\u0022: \\u0022text\\u0022, \\u0022text\\u0022: \\u0022The text content of the message\\u0022 } This is the most common content type used for natural language interactions. Image content allows including visual information in messages: ... { \\u0022type\\u0022: \\u0022image\\u0022, \\u0022data\\u0022: \\u0022base64-encoded-image-data\\u0022, \\u0022mimeType\\u0022: \\u0022image/png\\u0022 } The image data MUST be base64-encoded and include a valid MIME type. This enables multi-modal interactions where visual context is important. Audio content allows including audio information in messages: ... { \\u0022type\\u0022: \\u0022audio\\u0022, \\u0022data\\u0022: \\u0022base64-encoded-audio-data\\u0022, \\u0022mimeType\\u0022: \\u0022audio/wav\\u0022 } The audio data MUST be base64-encoded and include a valid MIME type. This enables multi-modal interactions where audio context is important. Embedded resources allow referencing server-side resources directly in messages: ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://modelcontextprotocol.io/specification/2025-06-18/server/prompts\"}},{\"type\":\"knowledge\",\"title\":\"Model Context Protocol (MCP) an overview\",\"url\":\"https://www.philschmid.de/mcp-introduction\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"philschmid.de\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=philschmid.de\",\"site_name\":\"Phil Schmid\"},\"is_missing\":false,\"text\":\"Resources (Application-controlled): These are data sources that LLMs can access, similar to GET endpoints in a REST API. Resources provide data without performing significant computation, no side effects. Part of the context/request \\u00B7 Prompts (User-controlled): These are pre-defined templates to use tools or resources in the most optimal way. Selected before running inference \\u00B7 MCP operates on the client-server model described earlier. Here\\u2019s a simplified flow: Initialization: When a Host application starts it creates N MCP Clients, which exchange information about capabilities and protocol versions via a handshake. Discovery: Clients requests what capabilities (Tools, Resources, Prompts) the server offers. The Server responds with a list and descriptions. Context Provision: The Host application can now make resources and prompts available to the user or parses the tools into a LLM compatible format, e.g.\\n\\nTools (Model-controlled): Actions the AI decides to take. Resources (Application-controlled): Context provided to the AI. Prompts (User-controlled): Specific user-invoked interactions. \\u0022Open Standard\\u0022 with a Big Backer: Any \\u0022open standard\\u201D should have a spec, and MCP has a VERY good spec. The spec alone defeats a lot of contenders, who do not provide such detailed specs. Built on Proven Foundations: Instead of re-inventing everything from scratch, Anthropic adapted from Language Server Protocol (LSP), e.g. JSON-RPC 2.0 \\u00B7 Strong Initial Ecosystem \\u0026 Dogfooding: MCP didn\\u0027t launch as just a spec. Anthropic \\u0022dogfooded\\u0022 it extensively and released it with a comprehensive initial set: Client: Claude Desktop. Servers: Numerous reference implementations (filesystem, git, Slack, etc.). Tooling: MCP Inspector for testing, great documentation \\u00B7 SDKs: Python and TypeScript libraries, now Java, Kotlin C# Network Effects: The open nature fostered a community.\\n\\nOverview of the Model Context Protocol (MCP) how it works, what are MCP servers and clients, and how to use it.\\n\\nThe Model Context Protocol (MCP) is an open standard introduced by Anthropic with the goal to standardize how AI applications (chatbots, IDE assistants, or custom agents) connect with external tools, data sources, and systems. Think of it like USB for AI integrations. Before standards like USB, connecting peripherals required a mess of different ports and custom drivers. Similarly, integrating AI applications with external tools and systems is/was an \\u0022M\\u00D7N problem\\u0022. If you have M different AI applications (Chat, RAG 1, custom agents, etc.) and N different tools/systems (GitHub, Slack, Asana, databases, etc.), you might need to build M\\u00D7N different integrations. This leads to duplicated effort across teams, inconsistent implementations. MCP aims to simplify this by providing a common API and transforming this into an \\u0022M\\u002BN problem\\u0022. Tool creators build N MCP servers (one for each system), while application developers build M MCP clients (one for each AI application).\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"April 3, 2025\",\"url\":\"https://www.philschmid.de/mcp-introduction\"}},{\"type\":\"knowledge\",\"title\":\"Resources \\u2013 Model Context Protocol Specification\",\"url\":\"https://spec.modelcontextprotocol.io/specification/server/resources/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"modelcontextprotocol.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=modelcontextprotocol.io\",\"site_name\":\"Modelcontextprotocol\"},\"is_missing\":false,\"text\":\"Resources allow servers to share data that provides context to language models, such as files, database schemas, or application-specific information. Each resource is uniquely identified by a URI. Resources in MCP are designed to be application-driven, with host applications determining how ...\\n\\nPrompts \\u00B7 Resources \\u00B7 Tools \\u00B7 Utilities \\u00B7 Completion \\u00B7 Logging \\u00B7 Pagination \\u00B7 Client Features \\u00B7 Roots \\u00B7 Sampling \\u00B7 Contributions \\u00B7 Revisions \\u00B7 2024-11-05 (Current) Schema \\u2197 \\u00B7 More \\u00B7 User Guide \\u2197 \\u00B7 Python SDK \\u2197 \\u00B7 TypeScript SDK \\u2197 \\u00B7 LightDark \\u00B7 Specification \\u00B7 Server Features \\u00B7 Resources \\u00B7 \\u2139\\uFE0F \\u00B7 Protocol Revision: 2024-11-05 \\u00B7 The Model Context Protocol (MCP) provides a standardized way for servers to expose resources to clients. Resources allow servers to share data that provides context to language models, such as files, database schemas, or application-specific information. Each resource is uniquely identified by a URI. Resources in MCP are designed to be application-driven, with host applications determining how to incorporate context based on their needs. For example, applications could: Expose resources through UI elements for explicit selection, in a tree or list view \\u00B7\\n\\nThe Model Context Protocol (MCP) provides a standardized way for servers to expose resources to clients. Resources allow servers to share data that provides context to language models, such as files, database schemas, or application-specific information. Each resource is uniquely identified by a URI. Resources in MCP are designed to be application-driven, with host applications determining how to incorporate context based on their needs. ... However, implementations are free to expose resources through any interface pattern that suits their needs\\u2014the protocol itself does not mandate any specific user interaction model. Servers that support resources MUST declare the resources capability: { \\u0022capabilities\\u0022: { \\u0022resources\\u0022: { \\u0022subscribe\\u0022: true, \\u0022listChanged\\u0022: true } } } ... listChanged: whether the server will emit notifications when the list of available resources changes.\\n\\nsequenceDiagram participant Client participant Server Note over Client,Server: Resource Discovery Client-\\u003E\\u003EServer: resources/list Server--\\u003E\\u003EClient: List of resources Note over Client,Server: Resource Access Client-\\u003E\\u003EServer: resources/read Server--\\u003E\\u003EClient: Resource contents Note over Client,Server: Subscriptions Client-\\u003E\\u003EServer: resources/subscribe Server--\\u003E\\u003EClient: Subscription confirmed Note over Client,Server: Updates Server--)Client: notifications/resources/updated Client-\\u003E\\u003EServer: resources/read Server--\\u003E\\u003EClient: Updated contents ... The protocol defines several standard URI schemes. This list not exhaustive\\u2014implementations are always free to use additional, custom URI schemes. Used to represent a resource available on the web. Servers SHOULD use this scheme only when the client is able to fetch and load the resource directly from the web on its own\\u2014that is, it doesn\\u2019t need to read the resource via the MCP server.\\n\\n{ \\u0022jsonrpc\\u0022: \\u00222.0\\u0022, \\u0022method\\u0022: \\u0022notifications/resources/list_changed\\u0022 } The protocol supports optional subscriptions to resource changes. Clients can subscribe to specific resources and receive notifications when they change: ... { \\u0022jsonrpc\\u0022: \\u00222.0\\u0022, \\u0022id\\u0022: 4, \\u0022method\\u0022: \\u0022resources/subscribe\\u0022, \\u0022params\\u0022: { \\u0022uri\\u0022: \\u0022file:///project/src/main.rs\\u0022 } } ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"December 4, 2024\",\"url\":\"https://spec.modelcontextprotocol.io/specification/server/resources/\"}},{\"type\":\"knowledge\",\"title\":\"The Model Context Protocol (MCP) \\u2014 A Complete Tutorial | by Dr. Nimrita Koul | Medium\",\"url\":\"https://medium.com/@nimritakoul01/the-model-context-protocol-mcp-a-complete-tutorial-a3abe8a7f4ef\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"medium.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=medium.com\",\"site_name\":\"Medium\"},\"is_missing\":false,\"text\":\"These primitives enable rich ...24-11-05/server/ The Model Context Protocol (MCP) provides a standardized way for servers to expose prompts, resources, and tools to clients....\\n\\nBuilt on JSON-RPC, MCP provides a stateful session protocol focused on context exchange and sampling coordination between clients and servers. https://spec.modelcontextprotocol.io/specification/2024-11-05/architecture/ The host process acts as the container and coordinator: ... A host application creates and manages multiple clients, with each client having a 1:1 relationship with a particular server. MCP Clients are the AI applications or agents that want to access external systems, tools, or data sources. Examples include Anthropic\\u2019s first-party applications, Curser, Windsurf, and agents like Goose. The key characteristic of an MCP client is its MCP compatibility, meaning it is built to communicate using the standardised interfaces defined by the protocol: prompts, tools, and resources. Once an MCP client is compatible, it can connect to any MCP server with minimal or no additional work.\\n\\nIn essence, the relationship between MCP clients and servers is one of standardised interaction, where clients leverage the capabilities exposed by servers through the common language of the MCP protocol, leading to a more efficient and scalable ecosystem for building AI applications and agents. MCP Servers provide the fundamental building blocks (Prompts, Resources, Tools) for adding context to language models via MCP. These primitives enable rich interactions between clients, servers, and language models: Prompts: Pre-defined templates or instructions that guide language model interactions \\u00B7 Resources: Structured data or content that provides additional context to the model \\u00B7 Tools: Executable functions that allow models to perform actions or retrieve information \\u00B7 https://spec.modelcontextprotocol.io/specification/2024-11-05/server/ The Model Context Protocol (MCP) provides a standardized way for servers to expose prompts, resources, and tools to clients.\\n\\nThe Model Context Protocol (mCP) offers distinct benefits to Tool/API providers, end users, and enterprises as well: ... Increased Adoption: By building an MCP server once, Tool or API providers can see adoption of their services across a wide range of MCP-compatible AI applications. This eliminates the need to build individual integrations for each client application, significantly expanding their potential user base. As Mahesh put it, they can \\u201Cbuild your mCP server once and see adoption of it everywhere across all of these different AI applications\\u201D. Simplified Integration: MCP provides a standardised way to expose their tools and data to AI applications through the prompts, tools, and resources interfaces. This simplifies the process for application developers to integrate with their services, making it more likely they will be adopted. Reduced Integration Overhead: Providers no longer need to deal with the \\u201CN times M problem\\u201D of building and maintaining numerous custom integration\\n\\nAnthropic released the Model Context Protocol(MCP) in Nov. 2024.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"March 27, 2025\",\"url\":\"https://medium.com/@nimritakoul01/the-model-context-protocol-mcp-a-complete-tutorial-a3abe8a7f4ef\"}},{\"type\":\"knowledge\",\"title\":\"Prompts \\u2013 Model Context Protocol Specification\",\"url\":\"https://spec.modelcontextprotocol.io/specification/2024-11-05/server/prompts/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"modelcontextprotocol.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=modelcontextprotocol.io\",\"site_name\":\"Modelcontextprotocol\"},\"is_missing\":false,\"text\":\"sequenceDiagram participant Client participant Server Note over Client,Server: Discovery Client-\\u0026gt;\\u0026gt;Server: prompts/list Server--\\u0026gt;\\u0026gt;Client: List of prompts Note over Client,Server: Usage Client-\\u0026gt;\\u0026gt;Server: prompts/get Server--\\u0026gt;\\u0026gt;Client: Prompt content opt listChanged Note over Client,Server: Changes Server--)Client: prompts/list_changed Client-\\u0026gt;\\u0026gt;Server: prompts/list Server--\\u0026gt;\\u0026gt;Client: Updated prompts end ... This is the most common content type used for natural language interactions. Image content allows including visual information in messages: { \\u0026quot;type\\u0026quot;: \\u0026quot;image\\u0026quot;, \\u0026quot;data\\u0026quot;: \\u0026quot;base64-encoded-image-data\\u0026quot;, \\u0026quot;mimeType\\u0026quot;: \\u0026quot;image/png\\u0026quot; } The image data MUST be base64-encoded and include a valid MIME type. This enables multi-modal interactions where visual context is important. Embedded resources allow referencing server-side resources directly in messages: { \\u0026quot;type\\u0026quot;: \\u0026quot;resource\\u0026quot;, \\u0026quot;resource\\u0026quot;: { \\u0026quot;uri\\u0026quot;: \\u0026quot;resource://example\\u0026quot;, \\u0026quot;mimeType\\u0026quot;: \\u0026quot;text/plain\\u0026quot;, \\u0026quot;text\\u0026quot;: \\u0026quot;Resource content\\u0026quot; } } Resources can contain either\\n\\nThe Model Context Protocol (MCP) provides a standardized way for servers to expose prompt templates to clients. Prompts allow servers to provide structured messages and instructions for interacting with language models. Clients can discover available prompts, retrieve their contents, and provide arguments to customize them. Prompts are designed to be user-controlled, meaning they are exposed from servers to clients with the intention of the user being able to explicitly select them for use. Typically, prompts would be triggered through user-initiated commands in the user interface, which allows users to naturally discover and invoke available prompts. ... However, implementors are free to expose prompts through any interface pattern that suits their needs\\u2014the protocol itself does not mandate any specific user interaction model. Servers that support prompts MUST declare the prompts capability during initialization: { \\u0022capabilities\\u0022: { \\u0022prompts\\u0022: { \\u0022listChanged\\u0022: true } } } listChanged i\\n\\nsequenceDiagram participant Client participant Server Note over Client,Server: Discovery Client-\\u003E\\u003EServer: prompts/list Server--\\u003E\\u003EClient: List of prompts Note over Client,Server: Usage Client-\\u003E\\u003EServer: prompts/get Server--\\u003E\\u003EClient: Prompt content opt listChanged Note over Client,Server: Changes Server--)Client: prompts/list_changed Client-\\u003E\\u003EServer: prompts/list Server--\\u003E\\u003EClient: Updated prompts end ... This is the most common content type used for natural language interactions. Image content allows including visual information in messages: { \\u0022type\\u0022: \\u0022image\\u0022, \\u0022data\\u0022: \\u0022base64-encoded-image-data\\u0022, \\u0022mimeType\\u0022: \\u0022image/png\\u0022 } The image data MUST be base64-encoded and include a valid MIME type. This enables multi-modal interactions where visual context is important. Embedded resources allow referencing server-side resources directly in messages: { \\u0022type\\u0022: \\u0022resource\\u0022, \\u0022resource\\u0022: { \\u0022uri\\u0022: \\u0022resource://example\\u0022, \\u0022mimeType\\u0022: \\u0022text/plain\\u0022, \\u0022text\\u0022: \\u0022Resource content\\u0022 } } Resources can contain either\\n\\n{ \\u0022jsonrpc\\u0022: \\u00222.0\\u0022, \\u0022id\\u0022: 2, \\u0022method\\u0022: \\u0022prompts/get\\u0022, \\u0022params\\u0022: { \\u0022name\\u0022: \\u0022code_review\\u0022, \\u0022arguments\\u0022: { \\u0022code\\u0022: \\u0022def hello():\\\\n print(\\u0027world\\u0027)\\u0022 } } } ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"March 26, 2025\",\"url\":\"https://spec.modelcontextprotocol.io/specification/2024-11-05/server/prompts/\"}},{\"type\":\"knowledge\",\"title\":\"Extend your agent with Model Context Protocol - Microsoft Copilot Studio | Microsoft Learn\",\"url\":\"https://learn.microsoft.com/en-us/microsoft-copilot-studio/agent-extend-action-mcp\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"microsoft.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=microsoft.com\",\"site_name\":\"Microsoft Learn\"},\"is_missing\":false,\"text\":\"Connecting to an MCP server gives ... a language model can call to perform an action \\u00B7 Prompts: Predefined prompt templates to accomplish specific tasks ......\\n\\nExtend the capabilities of your agent by connecting to tools from a Model Context Protocol (MCP) server.\\n\\nAdd MCP server tools and resources to your agent so that your Copilot Studio agent can use them. (Optional) Publish your MCP connector to allow the connector to be used across tenants. For more information on troubleshooting MCP integration, see Troubleshooting Model Context Protocol (MCP) integration.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://learn.microsoft.com/en-us/microsoft-copilot-studio/agent-extend-action-mcp\"}},{\"type\":\"knowledge\",\"title\":\"model-context-protocol-resources/guides/mcp-server-development-guide.md at main \\u00B7 cyanheads/model-context-protocol-resources\",\"url\":\"https://github.com/cyanheads/model-context-protocol-resources/blob/main/guides/mcp-server-development-guide.md\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"Capability Control: Implement fine-grained authorization checks within tool/resource handlers if different clients or users should have different permissions based on their authenticated context (e.g., scopes granted via OAuth).\\n\\nExploring the Model Context Protocol (MCP) through practical guides, clients, and servers I\\u0027ve built while learning about this new protocol. - model-context-protocol-resources/guides/mcp-server-development-guide.md at main \\u00B7 cyanheads/model-context-protocol-resources\\n\\nProviding access to data: Fetching information from databases, APIs, filesystems, or other sources (via Resources). Exposing executable functions: Offering functionalities like API calls, code execution, calculations, or file manipulation (via Tools). Offering guided interactions: Providing pre-defined prompt templates or workflows for users (via Prompts). Connecting to external systems: Integrating with other applications, services, or platforms. ... Extensibility: Easily add new capabilities to any MCP-compatible client without modifying the client\\u0027s core code. Modularity: Develop and maintain specialized functionalities in isolated, reusable components. Interoperability: Enable different LLM applications (clients) to share and use the same servers (context sources and tools). Focus: Concentrate on building unique capabilities and integrations, leveraging the standardized protocol.\\n\\nConsider implementing subscribe for resources whose content changes frequently (see Resource Subscriptions). Crucially: Sanitize and validate URIs and parameters (especially file paths) to prevent security vulnerabilities like directory traversal. ... Validate URIs rigorously against expected patterns. Implement access control based on the URI, parameters, or authenticated user context. Ensure path validation prevents access outside designated directories or scopes. Prompts are pre-defined templates for user interactions, often surfaced as commands in the client UI. They are user-controlled. ... Definition: Defined using server.prompt(). Provide a name (often used for slash commands), description, argument schema (using Zod shape), and a handler function. Arguments: The handler receives validated arguments based on the schema. Output: The handler returns a GetPromptResult object containing messages (an array structured like LLM conversation history) to be sent to the LLM.\\n\\nCapability Control: Implement fine-grained authorization checks within tool/resource handlers if different clients or users should have different permissions based on their authenticated context (e.g., scopes granted via OAuth). ... Always validate and sanitize ALL inputs from the client (tool arguments, resource URIs, prompt arguments) using robust schemas (zod is excellent for this). Implement context-aware semantic validation beyond basic schema checks. Prevent Path Traversal: If dealing with file paths, rigorously validate and normalize paths to ensure they stay within designated boundaries. Never trust client-provided paths directly. Use path.resolve and check if the resolved path starts with the expected base directory. Prevent Injection: Sanitize inputs used in database queries (use parameterized queries/prepared statements), shell commands (avoid direct execution if possible, otherwise escape rigorously), or API calls.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/cyanheads/model-context-protocol-resources/blob/main/guides/mcp-server-development-guide.md\"}},{\"type\":\"knowledge\",\"title\":\"Model Context Protocol explained as simply as possible\",\"url\":\"https://www.seangoedecke.com/model-context-protocol/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"seangoedecke.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=seangoedecke.com\",\"site_name\":\"Sean Goedecke\"},\"is_missing\":false,\"text\":\"That piece of code is called a \\u201CMCP client\\u201D. Interestingly, MCP offers two other primitives at the same level as tools: \\u201Cprompts\\u201D and \\u201Cresources\\u201D. Unlike tools, these are not intended to be fed directly to the LLM. Prompts are like a prompt directory that your MCP server can expose. The ...\\n\\nSo that you can run some simple MCP servers locally as command-line tools (for instance, you could wrap a CLI MCP server around bc to allow your model to do precise mathematics). The general idea is that adding a new MCP server to your app is as simple as adding its URL (or command-line invocation) to your app\\u2019s list of servers. Because all servers talk the MCP protocol2, your app can have a single piece of generic code that iterates over all servers, fetches all available tools via JSON-RPC, and integrates those tools into the chosen LLM. That piece of code is called a \\u201CMCP client\\u201D. Interestingly, MCP offers two other primitives at the same level as tools: \\u201Cprompts\\u201D and \\u201Cresources\\u201D. Unlike tools, these are not intended to be fed directly to the LLM. Prompts are like a prompt directory that your MCP server can expose. The idea is that the user can pick from available prompts to use, I suppose. Resources are pointers to specific files, presumably so the application can use them for RAG \\n\\nThis might change if a popular MCP-compatible app appears that offers a good way to use prompts or resources, but right now I\\u2019d say it\\u2019s fine to just think about MCP as a way to offer a bundle of tools to your LLM. If you don\\u2019t know what LLM tools are, they\\u2019re ways to allow LLMs to decide to run a predefined block of code instead of immediately responding to the user (for instance, to search the internet first before answering a question). \\u21A9 \\u00B7 Yes, I know, the protocol protocol. \\u21A9 \\u00B7 If you liked this post, consider subscribing to email updates about my new posts, or sharing it on Hacker News. Here\\u0027s a preview of a related post that shares tags with this one. What did DeepSeek figure out about reasoning with DeepSeek-R1? The Chinese AI lab DeepSeek recently released their new reasoning model R1, which is supposedly (a) better than the current best reasoning models (OpenAI\\u2019s o1- series), and (b) was trained on a GPU cluster a fraction the size of any of the big western AI labs.\\n\\nThree months ago, Anthropic released \\u201Cthe Model Context Protocol\\u201D, or MCP. In the last few weeks, interest in it seems to have really picked up. But a lot of people (including me) have been kind of confused about what the Model Context Protocol even is. Now that I\\u2019ve read through the spec and a bunch of the example MCP servers, I think I understand. This post is my attempt at explaining it. We\\u2019re all familiar with USB. It\\u2019s a common interface that allows me to plug many different devices into my computer via the same port. MCP is a common interface that allows me to plug many different bundles of LLM tools1 into my LLM via the same software. Suppose you\\u2019re the Domino\\u2019s pizza company. You want your customers to say \\u201CGPT-4, order me a pizza\\u201D. Right now, if you want to offer that capability, you have to write some pizza-ordering code (e.g.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.seangoedecke.com/model-context-protocol/\"}},{\"type\":\"knowledge\",\"title\":\"Model Context Protocol (MCP): A comprehensive introduction for developers\",\"url\":\"https://stytch.com/blog/model-context-protocol-introduction/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"stytch.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=stytch.com\",\"site_name\":\"Stytch\"},\"is_missing\":false,\"text\":\"Two-Way Context: Unlike simple ... the model and the tool. An MCP server can provide Prompts (predefined prompt templates for certain tasks) and Resources (data context like documents) in addition ......\\n\\nAs Anthropic put it, MCP replaces fragmented integrations with a simpler, more reliable single protocol for data access. Consistency and Interoperability: MCP enforces a consistent request/response format across tools. This means your AI app doesn\\u2019t have to handle one HTTP response for Service A, another XML for Service B, etc. The model\\u2019s outputs (function calls) and the tool results are all passed in a uniform JSON structure. That consistency makes it easier to debug and scale. It also future-proofs your integration logic \\u2013 even if you switch underlying model vendors, MCP\\u2019s interface to the tools remains the same. Two-Way Context: Unlike simple API calls, MCP supports maintaining context and ongoing dialogue between the model and the tool. An MCP server can provide Prompts (predefined prompt templates for certain tasks) and Resources (data context like documents) in addition to tools.\\n\\nModel Context Protocol (MCP) is an open standard that bridges AI models with external data and services, allowing Large Language Models (LLMs) to make structured API calls in a consistent, secure way. This post will introduce MCP, explain why it\\u2019s valuable for connecting AI systems, compare it to existing approaches like ChatGPT plugins and manual API integrations, and dive into its recent support for OAuth-based authentication. We\\u2019ll also explore a bit of code to see MCP in action. MCP acts as a universal adapter between AI tools and external services, eliminating the need for custom integration code for each tool or API. Much like USB-C simplifies connectivity across diverse devices, MCP provides a uniform method for AI models to invoke external functions, retrieve data, or use predefined prompts. At its core, MCP offers one interface that connects to many different systems.\\n\\nThe MCP layer enables AI applications to securely access and interact with external data sources and tools. It serves as a bridge between large language models (LLMs) and various databases, applications, or APIs, facilitating seamless integration and functionality without the need for extensive custom coding. MCP uses a client-server architecture to achieve this. The AI-powered application (e.g. a chatbot, IDE assistant, or agent) acts as the host and runs an MCP client component, while each external integration runs as an MCP server. The server exposes capabilities (like functions, data resources, or prompt templates) over the MCP protocol, and the client connects to it to utilize those capabilities. This separation means the AI model doesn\\u2019t talk to APIs directly; instead, it goes through the MCP client/server handshake, which structures the exchange.\\n\\nMCP differs in that it\\u2019s open and universal (not tied to one provider or interface) and it supports rich two-way interactions and continuous context. Think of ChatGPT plugins as specialized tools in a closed toolbox, whereas MCP is an open-standard toolkit that any developer or AI platform can utilize. MCP\\u2019s standardized auth (especially OAuth) also means it can handle secure access to user data in a more uniform way than the plugin-by-plugin OAuth flows in ChatGPT\\u2019s system. In summary, ChatGPT plugins showed the value of standardizing API access for LLMs, but MCP takes it further by making it an open protocol and by enabling a persistent \\u201Cconversation\\u201D between AI and services. LLM Tool Frameworks (LangChain, Agentic libraries): Before MCP, many developers used frameworks like LangChain to give models tools. In these setups, you define a set of tool functions (with descriptions) and the agent\\u2019s prompting logic so the LLM can decide to use them.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://stytch.com/blog/model-context-protocol-introduction/\"}},{\"type\":\"knowledge\",\"title\":\"The Complete Guide to Model Context Protocol - MachineLearningMastery.com\",\"url\":\"https://machinelearningmastery.com/the-complete-guide-to-model-context-protocol/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"machinelearningmastery.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=machinelearningmastery.com\",\"site_name\":\"MachineLearningMastery\"},\"is_missing\":false,\"text\":\"Prompts provide reusable templates for common tasks. They encode expert knowledge and simplify complex instructions. For example, a database MCP server can offer prompts like analyze-schema, debug-slow-query, or generate-migration.\\n\\nA filesystem server might list different files as directory contents change. A database server could expose different tables depending on user permissions. This ensures the protocol adapts to real-world state. With MCP, accessing resources is straightforward. The client sends a resources/read request with the resource URI. The server returns the contents, MIME type, and relevant metadata. Tool calls follow a similar pattern. The model constructs a JSON object with the tool name and parameters. The client sends a tools/call request. The server validates, executes, and returns results. If execution fails, it returns a structured error explaining the issue. Prompts work slightly differently. To retrieve a prompt, the client calls prompts/get with the prompt name and any arguments. The server returns the expanded prompt text, which incorporates arguments and dynamic context.\\n\\nIn this article, you will learn what the Model Context Protocol is, why it exists, and how it standardizes connecting language models to external data and tools.\\n\\nEach resource includes metadata, such as MIME type, which helps hosts handle content correctly \\u2014 text/markdown is processed differently than application/json \\u2014 and descriptions provide context that helps both users and models understand the resource. Prompts provide reusable templates for common tasks. They encode expert knowledge and simplify complex instructions. For example, a database MCP server can offer prompts like analyze-schema, debug-slow-query, or generate-migration. Each prompt includes the context necessary for the task. Prompts accept arguments. An analyze-table prompt can take a table name and include schema details, indexes, foreign key relationships, and recent query patterns. Domain-specific systems benefit most from specialized prompts. A Kubernetes MCP server can offer prompts for troubleshooting cluster issues. A code review server can provide prompts aligned with team style guides.\\n\\nHosts contain or interface with language models and initiate connections to MCP servers. MCP Clients are the protocol clients created and managed by the host application. When a host wants to connect to an MCP server, it creates a client instance to handle that specific connection. A single host application can maintain multiple clients, each connecting to different servers. The client handles the protocol-level communication, managing requests and responses according to the MCP specification. MCP Servers expose specific capabilities to clients: database access, filesystem operations, API integrations, or computational tools. Servers implement the server side of the protocol, responding to client requests and providing resources, tools, and prompts. ... A single host can connect to multiple servers simultaneously through separate clients. For example, an AI assistant might maintain connections to filesystem, database, GitHub, and Slack servers concurrently.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"2 weeks ago\",\"url\":\"https://machinelearningmastery.com/the-complete-guide-to-model-context-protocol/\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"c5efea36-16bc-4240-a186-d79fecbfebb8\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

