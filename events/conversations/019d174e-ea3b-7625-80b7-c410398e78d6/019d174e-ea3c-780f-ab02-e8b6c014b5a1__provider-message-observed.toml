kind = "plain_text"
text = "Good, Debian 13 (trixie) has kernel 6.6+ with mature MPTCP.\n\n**Architecture confirmed:**\n- Truck: 4 separate WAN connections → 4 WireGuard tunnels → single MPTCP connection → aggregated bandwidth\n- House: Traditional multi-WAN routing for home users (load balance/failover between ATT/Spectrum)\n\n**Truck router design:**\n\nMini-PC with these interfaces:\n- Built-in ethernet ports (2+): one for LAN side (your truck devices), others flexible\n- GL.inet 5G router: ethernet out → truck router WAN1\n- Starlink: ethernet → truck router WAN2  \n- Verizon/T-Mobile USB-C tethering → truck router (should present as usb0/usb1 network devices)\n\n**Questions:**\n\n1. **USB-C tethering:** Android phones usually work with `usb-modeswitch` and show up as network devices. Have you tested this on Linux, or assuming it'll work? (If not tested, good to verify before committing to architecture)\n\n2. **Static IP allocation from ATT block:** Which IPs for what?\n   - 4 IPs for WireGuard servers (one per truck connection)?\n   - Or different approach?\n\n3. **Mini-PC for truck:** Which model/how many NICs? Need to know if we're adding USB ethernet adapters or PCIe NIC.\n\n4. **Failover behavior:** When truck connection drops (goes through tunnel, etc), do you want instant failover to remaining connections, or wait/retry?"

