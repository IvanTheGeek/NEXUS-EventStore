kind = "plain_text"
text = "Perfect, that simplifies it.\n\n**House router:**\n- 1 IPv4 from ATT block for WireGuard server\n- WireGuard listens on that IP\n- IPv6 /64 for future use\n\n**Truck router WAN connections:**\n- Ethernet 1: GL.inet (ATT 5G)\n- Ethernet 2: Starlink\n- USB-C 1: Verizon (tethering)\n- USB-C 2: T-Mobile (tethering)\n- WiFi: LAN side for your devices\n\n**WireGuard + MPTCP setup:**\n\nSingle WireGuard tunnel with 4 client configurations on truck:\n- Each WAN interface gets its own WireGuard client config\n- Same server endpoint (your static IP), but different source interfaces\n- MPTCP runs **inside** the WireGuard tunnel\n- When WAN drops, WireGuard on that interface dies, MPTCP drops that subflow automatically\n- When WAN returns, systemd/NetworkManager brings up WireGuard, MPTCP adds subflow back\n\n**Technical detail:** \n- WireGuard configs need `BindToDevice` or routing policy to ensure each uses correct source interface\n- `mptcpd` on both ends manages subflow creation/removal\n- May need `mptcpize` wrapper for specific applications\n\n**Question:** \nDo you want the truck router to also serve as WiFi AP for your truck devices, or just routing? (I assume yes based on \"everything connecting to it will be wifi\")"

