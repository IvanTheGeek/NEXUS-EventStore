text = "**WireGuard alternatives:**\n\n- **OpenVPN:** Slower (TCP or UDP), more overhead, but rock-solid mature\n- **IPsec (strongSwan):** Standards-based, complex config, good for interop\n- **Plain GRE/IPIP tunnels:** Fast, no encryption overhead (bad for public internet)\n\n**Recommendation:** Stick with WireGuard. It's UDP-based (handles roaming/packet loss well), fast, simple config, and mobile-friendly. For your multi-path scenario, the performance matters.\n\n---\n\n**`mptcpize` explained:**\n\nIt's a wrapper that forces specific applications to use MPTCP when they wouldn't otherwise. **You probably don't need it** for your setup because:\n- Modern kernels (6.6+) can enable MPTCP system-wide\n- Set `net.mptcp.enabled=1` in sysctl\n- All TCP connections automatically use MPTCP when both endpoints support it\n\nUse `mptcpize` only for stubborn applications or debugging.\n\n---\n\n**Adding Spectrum WAN to MPTCP:**\n\nAbsolutely yes! This gives you 5 paths total:\n\n**Setup:**\n- House runs DDNS client (ddclient, inadyn) updating DNS with current Spectrum IP\n- WireGuard server listens on both ATT static IP **and** Spectrum dynamic IP\n- Truck router has 5 WireGuard configs:\n  - 4 pointing to ATT static (one per truck WAN)\n  - 1 pointing to DDNS hostname (Spectrum)\n- MPTCP sees 5 subflow paths, uses all\n\n**Benefit:** Doubles home upload bandwidth for truck traffic (1Gbit ATT + 30Mbit Spectrum)\n\n---\n\n**Dynamic routing for home users:**\n\nFor home users → Internet (not MPTCP), you want intelligent multi-WAN:\n\n**Approach:**\n- Monitor both WANs continuously (latency, packet loss, bandwidth)\n- Adjust routing metrics in real-time\n- Use policy routing for different traffic types\n\n**Tools:**\n- **Monitoring:** `fping`, `smokeping`, custom scripts measuring latency/loss\n- **Routing:** FRR with custom weights, or bash/F# scripts updating `ip route` metrics\n- **Traffic classification:** nftables marks packets, `ip rule` routes by mark\n\n**Example logic:**\n- Video streaming → lowest latency WAN\n- Bulk downloads → highest bandwidth WAN\n- Every 10-30 seconds, measure both WANs, adjust route metrics\n\n**Question:** Would you want to write the dynamic routing logic in F#? Could be a service that monitors WANs and updates kernel routing tables."

