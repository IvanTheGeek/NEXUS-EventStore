text = "edge router for home lab/public facing. I have 1gbit (can expand to 2.5 or 5 gbit) synchronous fiber with 15 static ips from ATT. Also have spectrum with dynamic ip, 300Mbit down and 30Mbit up. I want to have the router serve as the server for vpn connections, do dynamic routing for some traffic (like home users video streaming or web browsing) over both connection based on speed and quality. I will use the vpns to come from the truck network which will be over ATT, Verizon, T-Mobile, and starlink. The truck router will keep connections over each network and then have a tier above that running mptcp to bring them all together at the house and provide me the best internet i can get from the truck."

