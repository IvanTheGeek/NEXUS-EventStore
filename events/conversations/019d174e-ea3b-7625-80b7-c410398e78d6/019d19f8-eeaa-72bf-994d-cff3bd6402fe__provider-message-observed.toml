[[body.segments]]
kind = "reasoning"
text = "Good, so Ivan has plenty of resources for the router. He's new to MPTCP but that's fine - it's complex but well-documented. He wants automatic WAN selection based on realtime metrics, and he's building both routers.\n\nThis is a sophisticated setup. Let me break down the key components and considerations:\n\n1. Hardware is more than sufficient - even a Ryzen 5 will handle multi-gigabit routing with WireGuard and MPTCP easily\n2. NICs - needs at least 3: one for each WAN (ATT, Spectrum) and one for LAN. Possibly more depending on topology.\n3. MPTCP is the complex part - need to understand how it works, kernel requirements, and configuration\n4. Auto WAN selection based on realtime metrics needs active monitoring and dynamic routing\n\nI should ask about:\n- The truck router hardware constraints (power, space, cellular modems)\n- Network topology details (how many LANs, VLANs, etc)\n- MPTCP vs other bonding approaches\n- Monitoring/alerting requirements\n\nLet me structure this to address the key architectural decisions first, then drill into specifics."

[[body.segments]]
kind = "plain_text"
text = "Excellent, plenty of headroom. Here's the architecture:\n\n**House router:**\n- Ryzen 5/7 (any modern one handles multi-gig + encryption easily)\n- 16GB RAM is overkill but cheap, do it\n- **NICs:** 3 minimum - 2x for WANs (ATT, Spectrum), 1x for LAN. If expanding ATT to 2.5/5Gbit, get appropriate NIC (Intel i225/i226 for 2.5G)\n- Run Debian 12 (bookworm) - has kernel 6.1, native MPTCP support\n\n**Key architectural questions:**\n\n1. **MPTCP caveat:** It requires **both endpoints** to support it. Your truck router terminates MPTCP subflows and sends to house. But for home users browsing/streaming, their devices don't support MPTCP. So you'd be doing:\n   - Truck ↔ House: MPTCP over WireGuard tunnels (aggregated bandwidth)\n   - Home users → Internet: Traditional multi-WAN load balancing (not MPTCP)\n   \n   Is this the intent, or were you planning something else?\n\n2. **Truck router constraints:**\n   - Power budget? (12V DC from truck, or inverter?)\n   - Space? (compact mini-PC, or full box?)\n   - How are you connecting to cellular networks? (USB modems, PCIe cards, or external modems with ethernet?)\n\n3. **Static IPs:** You have 15 from ATT. How do you want to allocate them?\n   - WireGuard servers (one per truck connection type?)\n   - Public services?\n   - NAT pool?\n\nLet me know on #1 especially - it affects the whole design."

