[[body.segments]]
kind = "plain_text"
text = "The NM page was breaking because the preview slot was invalid HTML. The renderer was wrapping a whole live screen preview inside a literal button, and those previews already contain buttons and inputs, so the browser auto-restructured the DOM. That’s why the scale was wildly off and the visible content looked like it wasn’t moving with the column shell.\n\nI fixed that in [NmPathHtmlRenderer.fs](/home/ivan/NEXUS/CheddarBooks/src/CheddarBooks.LaundryLog.UI/NmPathHtmlRenderer.fs): the preview now uses a non-button activator wrapper, a clipped preview frame, and an absolutely positioned scaled rendering. The new tracked review page is [LaundryLog_PATH1_NM_FirstLaunch_FirstEntry.html](/home/ivan/NEXUS/CheddarBooks/workspace/laundrylog/html/nm-paths/LaundryLog_PATH1_NM_FirstLaunch_FirstEntry.html), and the existing screen-path page stayed in place as fallback. I also added formal NM browser coverage in [path1-nm-path.spec.ts](/home/ivan/NEXUS/CheddarBooks/tests/browser/specs/path1-nm-path.spec.ts), plus a durable note at [html-nm-path-renderer-proving-ground.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/html-nm-path-renderer-proving-ground.md).\n\nVerification was run through the checked-in script [verify-workspace-html.sh](/home/ivan/NEXUS/CheddarBooks/scripts/laundrylog/verify-workspace-html.sh): `36` Expecto tests passed and `10` Playwright tests passed. Commits:\n- `CheddarBooks`: `90bc4c8` `model: add nm path surface and fix preview scaling`\n- `NEXUS-EMERGING`: `ac535406` `docs: record interactive preview wrapper rule`\n\nIf that NM page is already open in the browser, reload it once and review the tracked workspace copy, not `tmp/`."

