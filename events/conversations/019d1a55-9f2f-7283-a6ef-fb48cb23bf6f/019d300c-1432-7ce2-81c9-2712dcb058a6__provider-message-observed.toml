[[body.segments]]
kind = "plain_text"
text = "I’d place `Domain` between the raw graph substrate and the stricter `BoundedContext`, but I’d treat it as a semantic partition, not a viewing mechanism.\n\nA clean model is:\n\n- `ObservedHistory`\n  what NEXUS acquired and recorded\n- `GraphSubstrate`\n  nodes, edges, claims, provenance\n- `Domain`\n  what area of reality/work this part of the graph is about\n- `BoundedContext`\n  the specific language, rules, and responsibility boundary inside a domain\n- `Lens`\n  how a person or purpose looks at that graph/domain/context\n\nSo the distinction becomes:\n\n- `Domain`: “what kind of world are we in?”\n- `BoundedContext`: “what exact meanings and rules apply here?”\n- `Lens`: “how do we want to look at it right now?”\n\nExample:\n\n- `Domain`: `SoftwareDevelopment`\n- `BoundedContext`: `EventModeling`, `Requirements`, `Implementation`, `Ingestion`\n- `Lens`: `DeveloperLens`, `BusinessLens`, `UXLens`, `PersonalKnowledgeLens`\n\nOne important recommendation: don’t stamp `Domain` onto every import event right away. The canonical importer is mostly in the `NEXUS Core / Ingestion` context. Richer domains like `SoftwareDevelopment` should mostly emerge later from interpretation, graph assertions, and projections.\n\nSo for v0 I’d introduce these concepts lightly:\n\n- `DomainId`\n- `SubdomainId` optionally later\n- `BoundedContextId`\n- `LensId`\n\nAnd I’d use them like this:\n\n- canonical events:\n  mostly belong to `Ingestion`\n- graph assertions:\n  can be classified into one or more domains\n- lenses:\n  can cut across domains and bounded contexts\n\nShort version: `Domain` is broader than `BoundedContext`, and `Lens` is orthogonal to both.\n\nIf you want, I can now write the compact “NEXUS core conceptual layers” note with `Domain`, `BoundedContext`, and `Lens` all folded in cleanly."

