text = "Yes, and it’s now recorded as a NEXUS-wide default.\n\nNEXUS:\n- `main` is at `f574a127`\n- new decision: [0023-utc-for-durable-time-and-localize-in-views.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0023-utc-for-durable-time-and-localize-in-views.md)\n\nCheddarBooks was already aligned:\n- `laundrylog-event-modeling` already includes the UTC wording at `227c0d1`\n\nSo when I went to push the LaundryLog side again, Git correctly reported there was nothing new to commit because that branch was already clean and up to date.\n\nCurrent rule now is:\n- durable/model time: UTC\n- views: localize for the user\n\nNo tests were run here because this was docs/governance only."

