text = "That gives us a much cleaner direction.\n\nSo the emerging NM header grammar is now:\n\n```text\n[App Runtime] [ApplicationLifecycle] [Lifecycle] [System]     BOOT\nStep 01 · 01-app-started\nAppStarted\n```\n\nAnd the top-right slot is no longer a duplicated lens word. It becomes a true surface kind:\n- `BOOT`\n- `SCREEN`\n- `COMMAND`\n- `VIEW`\n\nI also have your second choice locked in:\n- those header pills should support a hover/click explanation box, so the page can teach/remind what each classification means instead of expecting you to remember it\n\nThe next important design choice is color semantics.\n\nRight now there are a few different things colors could mean:\n- bounded context\n- broader group/family\n- surface kind\n- AEM inner card type\n\nAnd since you explicitly want blue/green to remain the AEM `COMMAND` / `VIEW` colors, we need to make sure the outer NM shell colors don’t fight that."

