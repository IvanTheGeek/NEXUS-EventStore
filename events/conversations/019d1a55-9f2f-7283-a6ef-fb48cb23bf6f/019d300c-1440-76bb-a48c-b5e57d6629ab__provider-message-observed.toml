kind = "plain_text"
text = "My recommendation is: properties first, types at the boundaries.\n\nSo for this kind of policy data:\n- `sensitivity`\n- `sharing_scope`\n- `sanitization_status`\n- `retention_class`\n\nI would model them as explicit typed properties carried in records, not as wholly separate top-level structural types.\n\nThat is already the direction in [Policy.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/src/Nexus.Logos/Policy.fs):\n- `SensitivityId`\n- `SharingScopeId`\n- `SanitizationStatusId`\n- `RetentionClassId`\n\nThese are not loose strings.\nThey are small strong types wrapping explicit allowlisted slugs.\n\nSo the shape is:\n\n- not boolean flags like `isPublic`\n- not vague freeform metadata\n- not separate ontology structures\n- yes to strong typed properties with constrained values\n\nWhy I prefer that:\n- one item can move from `raw` to `redacted` to `approved-for-sharing`\n- one item can be `customer-confidential` now and later have a derived public-safe version\n- that is state/classification, not a different structural kind\n- it composes better than a pile of booleans\n\nWhere I *would* use distinct types:\n- command/request boundaries when invalid combinations should be impossible\n\nFor example, if we later want to make some workflows safer, we could introduce boundary types like:\n- `RestrictedLogosNote`\n- `SanitizedLogosNote`\n- `ApprovedForSharingLogosNote`\n\nBut I would only do that when a workflow really benefits from the extra compile-time constraint. Internally, the shared representation should still likely carry the typed policy properties.\n\nSo short answer:\n- not simple flags\n- primarily typed properties\n- sometimes additional boundary types where they help make invalid states unrepresentable\n\nThat fits your preference well: explicit, allowlisted, deterministic, and strong without over-fragmenting the model."

