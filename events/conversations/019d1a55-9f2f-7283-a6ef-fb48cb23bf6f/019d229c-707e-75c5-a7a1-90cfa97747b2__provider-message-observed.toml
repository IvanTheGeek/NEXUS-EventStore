text = "The FsCheck layer is in and pushed as `b7308ea7` on `codex/nexus-ingestion-foundation`.\n\nI added property-based importer invariants in [PropertyTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/PropertyTests.fs), wired them into [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Program.fs), added `Expecto.FsCheck` to [Nexus.Tests.fsproj](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj), and updated [run-tests.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/run-tests.md).\n\nThe new properties cover:\n- duplicate provider-export imports stay idempotent across repeat counts\n- legacy normalization markers cause reparses, not fake revisions\n- repeated manual artifact hydration stays idempotent\n\nVerification is green:\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj`\n- `dotnet build /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/NEXUS-Code.slnx`\n\nCurrent suite result: `10` tests passed, `0` failed, in about `5.8s`.\n\nOne small note from the tooling side: `Expecto.FsCheck 10.2.3` currently pulls in `FsCheck 2.16.5`, even though `dotnet package search` shows newer FsCheck releases exist. I stayed with the version aligned to the Expecto integration package so the stack remains cohesive."

