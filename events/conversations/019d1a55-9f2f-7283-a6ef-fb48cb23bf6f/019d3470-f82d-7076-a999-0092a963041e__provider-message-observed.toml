text = "Not in a way I’d trust as durable provenance.\n\nWhat I’m seeing in the live shape data is:\n- once something is detached or cloned into a local independent shape, Penpot does not expose a clean “this came from component X” trail that I’d want to rely on later\n- the component/root metadata in the current file is also noisy enough that it’s not a good provenance surface by itself\n\nSo the practical rule should be:\n- use live components as high on the ladder as possible\n- when we intentionally drop to a detached/local projection, we should carry the source in naming or docs ourselves if it matters later\n\nFor this slice work, that means a detached PATH row should be treated as a derived projection, not as a component instance with trustworthy back-linkage. I’m continuing with that assumption while I rebuild the row and badge semantics."

