[[body.segments]]
kind = "plain_text"
text = "No, not yet.\n\nRight now the single repo is still the right move because we are:\n- shaping the model\n- evolving the docs\n- building the code\n- validating the file layout\n\nKeeping those together is helping us move faster and keep intent aligned.\n\nI’d wait to split out a dedicated event-store repo until at least one of these becomes true:\n\n- the importer is producing real canonical history regularly\n- you want to version event data independently from code/docs\n- the event-store volume starts making the code repo awkward\n- you want different branching/lifecycle rules for code vs canonical history\n- you want automation or other tools to write to the event store without coupling to this code workspace\n\nSo my recommendation is:\n\n- keep one repo for now\n- keep the boundaries explicit in structure and docs\n- treat `NEXUS-EventStore/` as if it were already its own system\n- split it into a separate repo when real usage proves the boundary, not before\n\nThe key is that we already designed for the split. So waiting does not trap us.\n\nA good trigger point to revisit the split would be after:\n- first real ChatGPT import\n- first real Claude import\n- first dedupe/re-import pass\n- first projection rebuild\n\nOnce those work, we’ll know whether the event store wants to stand on its own."

