text = "I added the clarification in the two best places:\n\n- [docs/glossary.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/glossary.md)\n- [docs/nexus-ingestion-architecture.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/nexus-ingestion-architecture.md)\n\nWhat’s clearer now is:\n\n- `canonical` here is bounded-context-specific\n- in the current `Ingestion` / `CanonicalHistory` context it means NEXUS’s preferred normalized form for observed acquisition history\n- it is not raw provider truth\n- it is not the final NEXUS graph ontology\n- it is not universal truth across all domains, bounded contexts, and lenses\n\nI committed that as `13f3ebb` with message `Clarify canonical meaning in docs`.\n\nI did not retry a push because the CLI auth issue is still the same one from before:\n- HTTPS remote is configured correctly\n- command-line Git cannot authenticate to GitHub on this machine yet\n\nSo if you push from GitKraken, this new commit and the earlier TOML work should go up cleanly from there."

