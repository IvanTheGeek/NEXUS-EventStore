[[body.segments]]
kind = "plain_text"
text = "Yes. I think that’s exactly what we’re running into too.\n\nFiles are excellent for:\n- append-only truth\n- transparency\n- diffability\n- rebuildability\n\nFiles are not excellent for:\n- repeated slice queries\n- adjacency lookups\n- counts and joins\n- interactive exploration at scale\n\nSo the moment an event/file store becomes real, indexes stop being optional. That’s not a failure of the model. It’s a sign the model is alive.\n\nThe important part is how we frame it. For NEXUS, the safe rule is:\n\n- canonical event files remain source truth\n- indexes are derived working structures\n- projections are derived working structures\n- graph working layers are derived working structures\n- all of them must be rebuildable and versioned\n\nThat keeps us from confusing “what is true” with “what is fast.”\n\nSo yes, Adam hitting indexing pressure strongly validates the direction we’ve been taking in:\n- [nexus-graph-materialization-plan.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/nexus-graph-materialization-plan.md)\n- [0006-storage-roles-by-bounded-context.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/decisions/0006-storage-roles-by-bounded-context.md)\n\nMy current take is:\n- event files first\n- explicit derived indexes second\n- keep index formats simple and rebuildable\n- avoid inventing a fancy custom index format too early unless a plain embedded store really fails us\n\nIn other words: yes, same issue, same pressure, and I think we’re on the right track by treating indexing as a separate bounded concern instead of pretending the raw event files should do everything."

