text = "Here are concrete examples using the current `AppStarted` column.\n\nCurrent shape:\n```text\nheader:\n  Step 01 · 01-app-started                         LIFECYCLE\n  AppStarted\n\nbelow snapshot:\n  [App Runtime] [Context · ApplicationLifecycle] [Lifecycle] [System]\n```\n\nMy recommended shape:\n```text\nheader:\n  Step 01 · 01-app-started\n  [ApplicationLifecycle] [System]                 LIFECYCLE\n  AppStarted\n\nbody:\n  What Changed...\n```\n\nWhat this does:\n- `ApplicationLifecycle` stays visible as the semantic owner\n- `System` stays visible as the actor\n- `LIFECYCLE` stays as the quick “kind” marker\n- `App Runtime` mostly becomes color/tint, not another repeated pill\n- `Lifecycle` stops repeating inside the column because the page-level lens toggle already says that\n\nA fuller header variant if you want the broad family visible too:\n```text\nheader:\n  Step 01 · 01-app-started\n  [App Runtime] [ApplicationLifecycle] [System]   LIFECYCLE\n  AppStarted\n```\n\nThat is more explicit, but also busier.\n\nA lens-forward variant:\n```text\nheader:\n  Step 01 · 01-app-started\n  [ApplicationLifecycle] [Lifecycle]              LIFECYCLE\n  AppStarted\n```\n\nThat keeps the current projection visible, but it duplicates the page-level lens controls more than I’d like.\n\nAnd the cleanest/minimal variant:\n```text\nheader:\n  Step 01 · 01-app-started                         LIFECYCLE\n  AppStarted\n\nbody:\n  [ApplicationLifecycle] [System]\n```\n\nThat scans well, but it pushes the deeper meaning farther away.\n\nOn the explanation interaction: your `Hover + Click` choice makes sense to me, so I’d treat that as locked unless you want to change it later."

