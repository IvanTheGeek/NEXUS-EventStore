[[body.segments]]
kind = "plain_text"
text = "Yes. I think we should model them, and I agree the splash probably should not have the normal header.\n\nThe useful rule is:\n- model startup checkpoints when they either change the visible screen or change the route decision\n- don’t model every tiny internal mechanic\n\nSo for a fresh first launch with no data, I’d shape it like this:\n\n1. `AppLaunchRequested`\n   Screen: bare splash, no header, just brand mark/title.\n\n2. `AppStartedObserved`\n   Screen change: first checkpoint lights up.\n\n3. `RuntimeChecksRunning`\n   Screen change: second checkpoint lights up.\n\n4. `LocalStateChecked`\n   Screen change: “no known local session yet” lights up.\n\n5. `InitialRouteResolved`\n   Screen change: “route to Need Location” lights up.\n\n6. `NeedLocationShown`\n   Screen path moves to the first usable screen.\n\nThat gives us a nice split in the newer terms:\n- `ApplicationLifecycle`\n  `AppLaunchRequested`, `AppStartedObserved`\n- `RuntimeOrchestration`\n  checks, local-state read, route resolution\n- `ScreenPath`\n  splash -> need location\n- `InteractionComposition`\n  how the splash/checkpoint surface is actually rendered\n\nAnd yes, the lit-up checkpoints are good because they make startup visible instead of mysterious.\n\nMy recommendation:\n- keep the splash as one screen family with a few explicit states\n- no normal app header on it\n- checkpoints illuminate progressively\n- then transition to `Need Location`\n\nIf you want, I can make the next pass exactly that:\n- headerless splash\n- explicit startup checkpoint states\n- first-launch path updated to use them in order."

