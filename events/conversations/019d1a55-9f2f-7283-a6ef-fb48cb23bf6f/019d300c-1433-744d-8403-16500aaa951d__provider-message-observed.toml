text = "The manual artifact hydration slice is in and pushed as `17ab803` on `codex/nexus-ingestion-foundation`.\n\nThe new workflow is centered in [ManualArtifactWorkflow.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Importers/ManualArtifactWorkflow.fs), with CLI wiring in [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs) and artifact lookup/dedupe support extended in [EventStoreIndex.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Importers/EventStoreIndex.fs). It lets you capture a payload by internal `artifact_id` or by provider conversation/message plus provider artifact or filename fallback, archive the file into `NEXUS-Objects`, and append `ArtifactPayloadCaptured` only if that artifact does not already have the same content hash.\n\nHuman docs are here:\n- [capture-artifact-payload.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/capture-artifact-payload.md)\n- [docs/how-to/README.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/README.md)\n- [docs/glossary.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/glossary.md)\n\nVerification was clean: [Nexus.Cli.fsproj](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj) builds with `0` warnings and `0` errors, and I smoke-tested the command on a temp copy of the real event store. The first run appended an `artifact_payload_captured` event and archived the file; the second run skipped as a duplicate based on the same SHA-256 content hash. The branch is fully synced to GitHub."

