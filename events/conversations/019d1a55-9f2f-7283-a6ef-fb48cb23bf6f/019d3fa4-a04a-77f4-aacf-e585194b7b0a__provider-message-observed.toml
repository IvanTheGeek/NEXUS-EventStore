[[body.segments]]
kind = "plain_text"
text = "I checked the current NM slot model first. Right now all visible columns inherit the same `header / screen / primary / secondary / gwt` row heights, and because every column renders all five slots, the outer NM border stays the same height.\n\nThe good news is: making the outer NM columns shorter where the bottom is just blank is not very hard if we do it in the right way. The clean version is to keep the shared row heights, but only render trailing empty rows at the bottom when a column actually needs them. That gives shorter outer columns without giving up row alignment where content exists. The one nuance is that if a later row exists, any empty row above it still has to stay as a spacer to preserve alignment."

