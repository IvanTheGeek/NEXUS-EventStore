text = "Done. The file is now [IDs.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Domain/IDs.fs), and I updated the references in:\n\n- [Nexus.Domain.fsproj](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Domain/Nexus.Domain.fsproj)\n- [v0-module-map.md](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/docs/v0-module-map.md)\n\nI also rebuilt the project after the rename, and it still compiles cleanly under .NET 10.\n\nGit needed two tiny commits because case-only renames can leave the old tracked filename behind:\n\n- `ef74535` — `Rename Ids file to IDs`\n- `6d7edc4` — `Remove old Ids filename after IDs rename`\n\nSo the naming rule you want is now reflected in the repo. The branch is clean except for the still-untracked raw content in [NEXUS-Objects/providers](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Objects/providers) and [RawDataExports](/home/ivan/NEXUS/NEXUS-EMERGING/RawDataExports).\n\nWe can go back to the TOML work now."

