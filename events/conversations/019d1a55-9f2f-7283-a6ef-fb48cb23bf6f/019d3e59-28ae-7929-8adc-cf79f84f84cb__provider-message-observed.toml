kind = "plain_text"
text = "I found why `Detailed` feels like a no-op in the current page.\n\nRight now, from the actual renderer in [ScreenPathHtmlRenderer.fs](/home/ivan/NEXUS/CheddarBooks/src/CheddarBooks.LaundryLog.UI/ScreenPathHtmlRenderer.fs):\n\n- `Summary` hides step notes, context/lens badges, `What Changed`, surface names/notes, and the scenario panel.\n- `Standard` shows the step-level metadata, but still hides the scenario assumptions.\n- `Detailed` only differs from `Standard` by allowing the scenario assumptions to be shown inside the scenario panel.\n\nSo if the scenario panel is still collapsed, `Detailed` barely changes anything visually. Your read is correct.\n\nMy current recommendation is:\n\n- keep `path/time` as the horizontal columns\n- make `lenses` the things that turn rows or row-bands on/off\n- use `context` as the semantic owner and visual tint/background family\n- keep `actor/role` lightweight at first, probably as a badge, unless it clearly becomes a first-class row\n- keep `audience` separate from `role`\n  - `audience` = who is reading the model\n  - `role/actor` = who in the app/system is participating\n\nThe big decision we need to lock is what `Detailed` should actually mean, and whether `actor/role` stays as a badge or becomes a row sooner."

