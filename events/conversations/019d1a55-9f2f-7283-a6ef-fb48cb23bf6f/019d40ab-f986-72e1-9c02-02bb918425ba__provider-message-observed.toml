[[body.segments]]
kind = "plain_text"
text = "What I think you’re pushing toward is stronger than a styling tweak. It’s a slice-model change.\n\nRight now, `Step 01 · 01-app-started` is one NM column that mixes:\n- a linked `SCREEN` compartment\n- a lower lifecycle/runtime explanation box\n- and the title `AppStarted`\n\nBut your new rule sounds like:\n\n- every NM column should fundamentally be either:\n  - a change/intent slice\n  - or a read/interpretation slice\n- the linked `SCREEN` box can still exist, but it is supporting context, not the main semantic kind of the column\n\nUnder that rule, `AppStarted` does feel like an `event` on the change side, not a read/view.\n\nThe other important consequence is the one you already pointed at:\n- `AppStarted` may not actually be the first slice\n\nBecause something triggers it. The most obvious trigger is:\n- the user taps the app icon / opens the app\n\nSo the first few slices could become something more like:\n\n1. user launch intent / trigger\n2. `AppStarted` event\n3. splash/read state visible\n4. runtime checks in progress\n5. no local session found\n6. route resolved\n\nThat would be much closer to the AEM mental model:\n- something causes change\n- change is observed\n- resulting readable state is shown\n\nI also agree with your color read:\n- if runtime/lifecycle keeps using blue/green-ish shells, it visually collides with the old AEM/business families\n- the app-runtime side should move to a different family entirely\n\nMy recommendation there would be something like:\n- `ApplicationLifecycle` / `RuntimeOrchestration`\n  warm stone / sand / amber / graphite family\n- `ScreenPath`\n  keep an interaction family, but not the same green currently used\n- `EventModeling`\n  keep the existing AEM blue/green/orange language\n\nSo the main open product decision I see is this:\n- do you want the path to explicitly start with a user/app-launch trigger slice before `AppStarted`\n- or do you want `AppStarted` to remain the first modeled slice, with its trigger treated as implied/external\n\nThat choice changes the whole first segment of `PATH1`, not just the wording."

