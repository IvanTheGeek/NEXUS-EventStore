text = "Yes. The renderer now supports that style for longer `key = value` lines.\n\nWhat changed:\n- longer property values are split into structured key/value rows\n- long values move to an indented next line\n- short values still stay inline\n- I added a regression test so this formatting stays locked in\n\nUpdated files:\n- [SliceHtmlRenderer.fs](/home/ivan/NEXUS/CheddarBooks/src/CheddarBooks.LaundryLog.UI/SliceHtmlRenderer.fs)\n- [LaundryLogTests.fs](/home/ivan/NEXUS/CheddarBooks/tests/CheddarBooks.Tests/LaundryLogTests.fs)\n\nArtifact:\n- [LaundryLog_PATH1_CommandSlice_ViewSlice.html](/home/ivan/NEXUS/tmp/laundrylog-html-proving-ground/LaundryLog_PATH1_CommandSlice_ViewSlice.html)\n\nSo lines like these now render in the new stacked form when they’re long enough:\n```toml\nlocation_name =\n    \"Love's #123 - Springfield, OH\"\nrecorded_at_utc =\n    \"2026-03-27T13:42:00Z\"\n```\n\nVerification:\n- `dotnet build /home/ivan/NEXUS/CheddarBooks/CheddarBooks.slnx`\n- `dotnet run --project /home/ivan/NEXUS/CheddarBooks/tests/CheddarBooks.Tests/CheddarBooks.Tests.fsproj`\n- `18` tests passed\n\nCommit:\n- `a9a4d78` `model: stack long property values in path renderer`\n\nThe next nice refinement would be making the indent width token-like so we can tune it consistently across future slice renderers."

