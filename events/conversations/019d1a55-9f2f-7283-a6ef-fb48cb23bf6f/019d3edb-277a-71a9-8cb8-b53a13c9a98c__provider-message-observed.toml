kind = "plain_text"
text = "Yes. In that first `AppStarted` column, those pills are different layers of meaning, not four synonyms.\n\nRead them like this, from broadest to most specific:\n\n- `App Runtime`\n  This is the broad group/family.\n  It tells you this column belongs to the app-mechanics side of the world, not the business/AEM side and not the user-visible screen-path side.\n  In plain terms: “this is app startup/runtime territory.”\n\n- `Context · ApplicationLifecycle`\n  This is the bounded context owner.\n  It answers: “what semantic area owns the meaning of this column?”\n  Here, it means the column is specifically about the app entering a lifecycle phase, like starting up.\n  In plain terms: “the meaning here is about the app starting, resuming, suspending, etc.”\n  This matches the doctrine in [interaction-concern-lines-contexts-and-lenses.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/interaction-concern-lines-contexts-and-lenses.md).\n\n- `Lifecycle`\n  This is the lens badge.\n  It answers: “through what viewing/projection family is this column being shown?”\n  On the page, it also ties to the header lens toggle, so if you turn off `Lifecycle`, this column should disappear.\n  In plain terms: “you are currently seeing this as part of the lifecycle view.”\n  Important nuance: lens is not supposed to mean the same thing as context forever, even though right now they are still close in the current implementation.\n\n- `System`\n  This is the actor/role badge.\n  It answers: “who is doing/causing this change in the modeled flow?”\n  Here, it means the app/runtime/system is acting, not the human user.\n  In plain terms: “this happened because the app/system did something, not because the user directly entered data on this step.”\n\nSo the full reading of that metadata is basically:\n\n- broad area: `App Runtime`\n- semantic owner: `ApplicationLifecycle`\n- viewing family: `Lifecycle`\n- acting party: `System`\n\nAnd then the actual column title, `AppStarted`, is the concrete state change being modeled.\n\nThe simplest mental model is:\n\n- group = what big family this belongs to\n- context = who owns the meaning\n- lens = why/how it is being shown on this page\n- role = who is acting\n- title = what actually happened\n\nOne honest note: right now, `Lifecycle` and `ApplicationLifecycle` feel a bit redundant because the current page is still early. Conceptually they are different:\n- `ApplicationLifecycle` is the truth-owner\n- `Lifecycle` is the viewer/filter category\n\nThat distinction matters more once one lens can cut across multiple contexts or when the same context can be shown differently.\n\nIf helpful, I can next do the same breakdown for a `Runtime Checks`, `Need Location`, and `CaptureLaundryLocation` column so the contrast becomes clearer."

