text = "Yes, and that distinction matters.\n\nRight now I’m treating these as the current “latest” lines:\n\n- latest live readable `PATHS` row:\n  - `PATH1.Row.V5.Visible`\n  - this is the one based on the old `V1` lineage, because that is the only line Penpot is actually painting text for on the `PATHS` canvas\n\n- latest clean component bases:\n  - `CommandSlice.Clean.V3`\n  - `ViewSlice.Clean.V3`\n  - with supporting row parts:\n    - `SliceRow.Screen.Clean.V2`\n    - `SliceRow.Command.Clean.V2`\n    - `SliceRow.Event.Clean.V2`\n    - `SliceRow.View.Clean.V2`\n\n- latest clean path experiment on `PATHS`:\n  - `PATH1.Row.V4.Clean`\n  - but this is the one whose text exists/exports and still does not paint live\n\nSo short version:\n- `V5.Visible` is the latest practical `PATHS` row\n- `V3` is the latest clean base/component line\n\nAnd yes, your idea is good:\n- if the copies made on `Components` were fine, then moving or duplicating that lineage onto `PATHS` is exactly the right experiment\n- that would test whether the problem is:\n  - the page/context transition\n  - the rebuild method\n  - or the specific plugin-created text lineage\n\nMy current recommendation is:\n- do not move the only base components off `Components`\n- instead duplicate the latest clean bases from `Components` to `PATHS` as a controlled experiment\n\nSpecifically, the best experiment would be:\n- duplicate `Catalog.CommandSlice.Clean.V3`\n- duplicate `Catalog.ViewSlice.Clean.V3`\n- place those duplicates on `PATHS`\n- see if their text still paints there before we mutate them\n\nThat would tell us a lot very quickly.\n\nSo the answer to “which version are you using as the latest?” is:\n- for actual `PATHS` work: `PATH1.Row.V5.Visible`\n- for the clean base family: `CommandSlice.Clean.V3` / `ViewSlice.Clean.V3`\n\nIf you want, I can run that exact duplication experiment next."

