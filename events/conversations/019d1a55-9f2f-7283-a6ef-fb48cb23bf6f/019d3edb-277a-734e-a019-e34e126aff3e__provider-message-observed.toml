kind = "plain_text"
text = "That changes the shape in a useful way, and I think I understand what you’re aiming at now.\n\nYou’re saying:\n\n- for `EventModeling` columns, we should not think in terms of:\n  - outer NM shell\n  - inner AEM card\n\nInstead, the AEM slice itself should effectively be the column.\n\nSo for an AEM column:\n- the slice shell is the column shell\n- the top screen/surface area in that slice is where the app UI snapshot goes\n- the rest of the command/view/event slice structure stays the real AEM body\n\nThat matches your earlier direction much better:\n- NM is expanding AEM\n- not wrapping AEM in another shell that competes with it\n\nSo I’d restate the emerging rule like this:\n\n- non-AEM columns\n  use the broader NM shell\n- AEM columns\n  use the AEM slice shell directly, with the app UI surface occupying the top screen slot\n\nThat also means my previous “neutral outer shell around EventModeling” idea is no longer the right target.\n\nThe next structural question is where the shared NM classifications should live for AEM columns:\n- above the slice as a common NM classification row\n- or integrated into the slice header itself\n\nHere are the two shapes I think are real options:\n\nCommon row above the AEM slice:\n```text\n[Business] [EventModeling] [AEM] [User]          COMMAND\nStep 07 · 07-capture-laundry-location\nCaptureLaundryLocation\n\n[AEM slice shell with app surface in the top slot]\n```\n\nIntegrated into the AEM slice header:\n```text\n[AEM slice header area includes Business / EventModeling / AEM / User]\n[top screen slot contains app surface]\n[command/view/event slice body]\n```\n\nMy recommendation is the first one:\n- keep one common NM classification row above every column type\n- let the AEM slice remain intact below it\n- do not make AEM headers carry a special second metadata grammar unless we have to\n\nThat gives us consistency across the whole path while still letting AEM columns look like real AEM slices."

