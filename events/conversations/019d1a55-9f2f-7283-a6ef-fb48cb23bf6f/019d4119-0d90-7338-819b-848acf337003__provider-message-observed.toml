kind = "plain_text"
text = "Not exactly. For the current NM law, `Step 01-launch-app` is better understood as:\n\n- `LaunchApp` = the `COMMAND`\n- `AppStarted` = the produced `EVENT`\n- `SplashVisible` = the first resulting `VIEW`\n\nThat’s the shape currently encoded in [NmPathHtmlRenderer.fs](/home/ivan/NEXUS/CheddarBooks/src/CheddarBooks.LaundryLog.UI/NmPathHtmlRenderer.fs).\n\nMy recommendation is to keep `AppStarted` over `AppLaunched`.\n\nWhy:\n- `AppLaunched` sounds very close to the user trigger or command.\n- `AppStarted` sounds more like an observed system fact.\n- that separation is useful in this model:\n  - user intent: `LaunchApp`\n  - system fact: `AppStarted`\n  - readable result: `SplashVisible`\n\nIf we want a sharper event name than `AppStarted`, the best alternative is probably `StartupBegan`. That would make the sequence read:\n\n- `LaunchApp`\n- `StartupBegan`\n- `SplashVisible`\n\nI would rank them like this:\n\n1. `AppStarted`\n2. `StartupBegan`\n3. `AppLaunched`\n\nSo my current take is:\n- `Step 01` as a whole should stay `LaunchApp`\n- the event inside it should probably stay `AppStarted`\n- use `AppLaunched` only if you intentionally want the event to mean the launch action itself, not the system crossing into startup\n\nIf you want, I can do a naming pass next and propose the best `COMMAND / EVENT / VIEW` names for the first 8 startup slices before changing code."

