text = "I just caught one important modeling detail before coding it: fact IDs can repeat across different import slices because the same derived assertion can show up again. So the SQLite index needs a composite key of `(import_id, fact_id)`, not just `fact_id`. That keeps the working index honest to the append-only import model."

