[[body.segments]]
kind = "plain_text"
text = "Because it fits the job of the **secondary working layer** pretty well.\n\nWhat I’m trying to solve is not source truth. We already have that:\n- raw objects in [NEXUS-Objects](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Objects)\n- canonical append-only history in [NEXUS-EventStore](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore)\n\nThe pain point is the **working/query layer**:\n- fast slice lookups\n- adjacency-style queries\n- reporting without rereading thousands of TOML files\n- local, zero-service setup\n\nSQLite is attractive there because it is:\n- embedded and local\n- easy to version around without becoming “the real database”\n- good at indexed lookups, counts, joins, and slice reports\n- easy for humans and tools to inspect\n\nSo the intended role would be:\n- TOML = durable, transparent, rebuildable history\n- SQLite = disposable/materialized working index\n\nWhy not something else first?\n\n- Plain TOML-only index:\n  Too close to what is already getting expensive.\n- DuckDB:\n  Great for analytics, less ideal as the first small mutable per-import working index.\n- Full graph DB:\n  Too early and too heavyweight.\n- Custom in-memory only:\n  Fast, but not durable across sessions.\n\nSo my reasoning is: SQLite is the smallest practical step that improves the workflow without changing NEXUS truth boundaries.\n\nThat said, it is not mandatory. If you want, we can choose one of these paths instead:\n\n1. Stay file-only longer and build better catalogs/reports over TOML.\n2. Use SQLite as a local working index only.\n3. Use DuckDB instead if you want to bias toward analytical exploration.\n4. Delay all of that and first improve slice-first exports more.\n\nMy recommendation is still `2`, but only as a **cache/materialization**, never as canonical truth."

