[[body.segments]]
kind = "plain_text"
text = "What I understand now is a more precise slice law:\n\n- there are two slice types, not three\n- `EVENT` is not the slice type\n- `EVENT` is the backbone element both slice types hinge on\n\nSo the two slice forms are:\n\n- change side:\n  `TRIGGER -> COMMAND -> EVENT`\n  or sometimes\n  `SCREEN -> COMMAND -> EVENT`\n\n- read side:\n  `EVENT -> VIEW -> ACTOR`\n\nAnd the important rule for the read side is:\n- the event(s) a view consumes only need to already exist in the store\n- they do not need to be the immediately previous slice\n- multiple view slices may consume the same event\n\nThat means the visible NM shell should probably classify the whole column as either:\n- `COMMAND`\n- or `VIEW`\n\nThen `EVENT` becomes an inner block inside both slice types, not the outer classification.\n\nThat is a big but clean shift, and it feels more faithful to what you’re trying to build.\n\nThe two implementation questions that matter most now are:\n- how explicit the event consumption should be in `VIEW` slices\n- what the first launch `COMMAND` slice should actually be called"

