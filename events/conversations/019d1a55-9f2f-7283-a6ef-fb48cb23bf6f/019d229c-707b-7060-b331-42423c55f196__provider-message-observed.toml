kind = "plain_text"
text = "`origin` is just the local nickname Git gives to a remote repository. It is not special in a deep technical sense, but it is the default convention almost every Git tool expects.\n\nSo:\n\n- `origin` = “the main remote this repo was cloned from or pushes to”\n- it could be named `github`, `nexus`, or anything else\n- Git itself does not require the name `origin`\n\nBut keeping it as `origin` is usually the smart choice because:\n\n- it is the standard convention\n- tools like GitKraken, scripts, docs, and other collaborators tend to assume it\n- commands like `git push -u origin branch-name` are universally recognizable\n\nA good pattern is:\n\n- keep your primary GitHub repo as `origin`\n- add additional remotes only when needed, like:\n  - `upstream`\n  - `fork`\n  - `mirror`\n\nSo yes, you could rename it to `github`, but I would not recommend it unless you have a very strong reason. `origin` keeps friction low and helps future tools and agents work with fewer assumptions breaking."

