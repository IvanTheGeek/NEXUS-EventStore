text = "```\nStart here:\n\ndocs/foundation.md\ndocs/laundrylog/introduction.md\ndocs/laundrylog/requirements.md\n```\nlinks are not working - non-exsistant. now in other .md files. we probably need to add this to overall governance, that docs should allow click linking for use in github. \n---\n\n`LaundrySessionStarted`  this event is really a UI/UX related event if it is even an event. The idea is that the main screen will show a list of expenses for the current \"session\" where session is defined as a window where I am doing laundry, which might be 3 or 5 loads, but only have 1 or 2 machines available to use. Once there has been 3 hours since the last entry, the next time I open the app, it would be a new \"session\" with the list of previous entries not showing. really just a UX thing."

