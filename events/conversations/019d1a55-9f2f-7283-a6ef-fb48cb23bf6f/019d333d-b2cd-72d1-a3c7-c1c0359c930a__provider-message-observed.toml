text = "That direction is now durable in NEXUS `main` at `97193ff3`.\n\nI recorded it as:\n- [0024-build-our-own-event-modeling-tool-and-use-penpot-transitionally.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0024-build-our-own-event-modeling-tool-and-use-penpot-transitionally.md)\n- [event-modeling-tool-foundation.md](/tmp/nexus-merge-M7SKP3/docs/event-modeling-tool-foundation.md)\n\nI also surfaced it in the main onboarding docs so other AI and humans will see it quickly:\n- [README.md](/tmp/nexus-merge-M7SKP3/README.md)\n- [forge-foundation.md](/tmp/nexus-merge-M7SKP3/docs/forge-foundation.md)\n- [fntools-foundation.md](/tmp/nexus-merge-M7SKP3/docs/fntools-foundation.md)\n- [repository-concern-lines.md](/tmp/nexus-merge-M7SKP3/docs/repository-concern-lines.md)\n\nThe core rule now is:\n- external Event Modeling tools are reference/bridge tools, not the long-term home\n- we should build our own Event Modeling tool\n- local Penpot is a near-term canvas and integration seam through API and plugin/MCP access\n- the reusable tooling side of that work belongs in FnTools, with the doctrine and rules staying in NEXUS\n\nThis was docs-only, so I didn’t run tests."

