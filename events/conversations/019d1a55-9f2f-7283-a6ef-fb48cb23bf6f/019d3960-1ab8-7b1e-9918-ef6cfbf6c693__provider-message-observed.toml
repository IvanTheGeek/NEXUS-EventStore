text = "Mapped and recorded in NEXUS as commit `62c46531` (`docs: map browser control and playwright to interaction terms`).\n\nUpdated docs:\n- [interaction-concern-lines-contexts-and-lenses.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/interaction-concern-lines-contexts-and-lenses.md)\n- [fsharp-usage-learning-and-guidance.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/fsharp-usage-learning-and-guidance.md)\n- [0003-testing-stack-and-library-onboarding.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/decisions/0003-testing-stack-and-library-onboarding.md)\n\nShort mapping:\n\n- Direct browser control/inspection\n  Best understood as an inspection/debugging surface.\n  It mostly supports `InteractionComposition` and `ScreenPath`.\n  Good for seeing what rendered, checking layout, and exploring a path while the shape is still moving.\n\n- Playwright/Selenium-style automation\n  Best understood as a deterministic verification harness.\n  It supports:\n  - `InteractionComposition` when we need to prove the rendered surface behaves correctly\n  - `ScreenPath` when we need to prove visible state transitions\n  - `RuntimeOrchestration` when startup/routing/hydration mechanics affect what gets shown\n\nSo the practical rule is:\n\n- use direct browser inspection to understand current behavior\n- use Playwright-style automation when the behavior needs to be proven repeatably, rerun later, or used in CI\n\nLaundryLog example:\n- opening the generated HTML file and clicking around manually is direct browser inspection\n- a future scripted assertion that the path nav moves exactly one full column per click would be Playwright-style automation\n\nOne small note: [README.md](/home/ivan/NEXUS/NEXUS-EMERGING/README.md) still has separate unstaged local edits unrelated to this commit, and I left those alone. No tests were run because this was docs-only."

