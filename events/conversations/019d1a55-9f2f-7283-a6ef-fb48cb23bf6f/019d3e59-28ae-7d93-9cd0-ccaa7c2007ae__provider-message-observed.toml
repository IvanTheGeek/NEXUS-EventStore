text = "No changes yet. Here’s the model I think we just clarified.\n\n**What `Detailed` Is Doing Now**\nIn the current renderer at [ScreenPathHtmlRenderer.fs](/home/ivan/NEXUS/CheddarBooks/src/CheddarBooks.LaundryLog.UI/ScreenPathHtmlRenderer.fs), `Detailed` is barely different from `Standard`.\n\nRight now:\n- `Summary` hides step notes, context/lens badges, `What Changed`, surface names/notes, and the scenario panel.\n- `Standard` shows the step-level metadata, but hides the scenario assumptions.\n- `Detailed` only really adds the scenario assumptions inside the scenario panel.\n\nSo if that panel is still collapsed, `Detailed` feels like a no-op. Your read was correct.\n\n**What We Just Locked**\nThe shape that seems strongest now is:\n\n- `Summary + Detailed`\n  `Standard` should go away.\n- each visible column = one explicit state change\n- each column has one primary owning context\n- if two contexts change, they become two adjacent columns in time order\n- `role/actor` starts as a badge, not a row\n- `audience` exists as a concept, but comes later, not now\n\nThat gives a cleaner semantic stack:\n\n- `context`\n  who owns the meaning\n- `lens`\n  which projection is currently being shown\n- `view mode`\n  compact vs full-fidelity\n- `role/actor`\n  who in the system/app is involved\n- `audience`\n  who the model is for\n\n**So Is `Lens` Just Matching `Context` Right Now?**\nYes, mostly.\n\nIn the current path surface:\n- `ApplicationLifecycle` maps to `Lifecycle`\n- `RuntimeOrchestration` maps to `Runtime`\n- `ScreenPath` maps to `Screen Path`\n\nBut that is a temporary simplification, not the long-term meaning.\n\nLonger-term:\n- `context` should stay the owner\n- `lens` should become the projection/filter over columns\n- `view mode` should control density\n- `role/actor` should annotate the column or surface\n- `audience` should later influence defaults and emphasis\n\nSo I would explicitly treat the current 1:1 mapping as a bootstrap phase.\n\n**How I’d Relate This To The Combined Modeling Surface**\nI think your current idea now reads like this:\n\n- left-to-right is still time/path progression\n- each column is one state change\n- each column is typed by context\n- context can be shown with tint/background family\n- AEM can become another set of columns in the same path, not a separate universe\n- later, lenses choose which kinds of columns or annotations are visible\n\nThat means:\n- `RuntimeOrchestration` columns can have one color family\n- `ApplicationLifecycle` another\n- `ScreenPath` another\n- `EventModeling` columns can keep the existing AEM visual grammar\n\nAnd `role/actor` can start as a badge on the column or within the surface.\n\n**My Strong Recommendation**\nFor the next real implementation phase, I’d treat the structure as:\n\n- columns = explicit state changes in time order\n- context = column ownership + color family\n- lens = header filters/projections over the columns\n- view mode = `Summary` or `Detailed`\n- role/actor = badge first\n- audience = later\n\nThat feels coherent and much less muddy than making `context`, `lens`, and `audience` overlap.\n\nThe next useful step would be to turn this into a decision-complete implementation plan for the combined path surface before we touch the renderer."

