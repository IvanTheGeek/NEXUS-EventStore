text = "A Git worktree is an extra checked-out folder for the same repo. It lets us have different branches open at the same time without constantly doing `git switch` in one directory.\n\nHow we used it here:\n- one worktree held the active branch\n- one temporary worktree held `main`\n- temporary merge worktrees let me merge/reconcile branches without disturbing the active folder\n\nWhy it’s useful:\n- safer branch merges\n- easier conflict resolution\n- no “wait, which branch is this folder on now?”\n- isolated working directories while still sharing the same Git history and object store\n\nWhat I changed next:\n- clarified the durable policy that `main` should be the normal steady state\n- clarified that extra worktrees are temporary operating tools, not a reason to keep branches alive\n- clarified that merged branches should have both their extra worktrees and branch refs removed when they’re done\n\nUpdated docs:\n- [AGENTS.md](/home/ivan/NEXUS/NEXUS-EMERGING/AGENTS.md)\n- [docs/collaboration-protocol.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/collaboration-protocol.md)\n- [docs/decisions/0008-branch-topology-by-workstream.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/decisions/0008-branch-topology-by-workstream.md)\n\nPolicy commit:\n- `fc10f698d` `docs: clarify worktree and branch retirement policy`\n\nRemote cleanup is done too:\n- pushed `main`\n- deleted all retired remote branches\n- pruned refs\n\nCurrent repo state:\n- local branches: `main` only\n- remote branches: `origin/main` only\n- worktrees: one only\n- worktree is clean\n\nYou can verify from:\n- [repo root](/home/ivan/NEXUS/NEXUS-EMERGING)\n\nOne important next repo-hygiene issue remains:\n- [NEXUS-EventStore/graph/working/index/graph-working.sqlite](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph/working/index/graph-working.sqlite)\n\nGitHub accepted the push, but warned that file is over the recommended 50 MB size. So the next strong move is to decide whether that working SQLite index should:\n- stay tracked\n- be regenerated and ignored\n- or move to a different storage/release pattern\n\nThat’s the next thing I’d tackle."

