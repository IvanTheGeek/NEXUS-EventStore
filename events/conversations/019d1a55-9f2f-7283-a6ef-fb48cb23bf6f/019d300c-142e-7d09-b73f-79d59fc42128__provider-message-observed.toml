kind = "plain_text"
text = "Agreed, and I’d tighten it one step further:\n\n- `Slice` = Event Modeling unit of change or read\n- `Flow` = ordered sequence of slices that accomplishes something\n- `Batch` = one import-bounded contribution or materialization unit\n- `Scope` = a filtered view/export boundary\n\nSo most of what we’ve been calling “slice” in the graph/index layer is probably not a `Flow` either. It’s usually a `Batch` or a `Scope`.\n\nExamples:\n- `working graph slice` -> `working graph batch`\n- `report-working-graph-slice` -> `report-working-graph-batch`\n- `verify-working-graph-slice` -> `verify-working-graph-batch`\n- Graphviz “slice export” -> Graphviz export scope\n\nAnd then:\n- the how-to sequences are `Flows`\n- later Event Modeling work can use `Slice` in the strict sense you described\n\nMy recommendation is:\n1. add a terminology decision/glossary note now\n2. rename user-facing docs/CLI terms with backward-compatible aliases\n3. later rename internal symbols where it’s worth the churn\n\nThat keeps the language honest without breaking everything at once."

