[[body.segments]]
kind = "plain_text"
text = "You’re seeing a real duplication, not just a wording problem.\n\nIn the current NM renderer, the top-right label is a hybrid thing called `columnKindLabel`, and right now it maps like this:\n- boot surface + lifecycle context -> `LIFECYCLE`\n- boot surface otherwise -> `RUNTIME`\n- app screen surface -> `SCREEN`\n- AEM command slice -> `COMMAND`\n- AEM view slice -> `VIEW`\n\nSo in `AppStarted`:\n- top-right `LIFECYCLE`\n- pill `[Lifecycle]`\n\nare effectively pointing at the same classification family today.\n\nThat means your discomfort is correct: in the first few columns, the top-right label is not really giving a different concept than the lens pill. It only becomes clearly different in the AEM columns, where:\n- top-right `COMMAND` / `VIEW`\n- pill `[AEM]`\n\nare actually different things.\n\nI think the cleaner split is this:\n\n- the pills above `Step 01 · 01-app-started`\n  should carry the explicit classifications:\n  - `App Runtime`\n  - `ApplicationLifecycle`\n  - `Lifecycle`\n  - `System`\n\n- the top-right label should become a true surface/shell kind, not a lens-like label:\n  - `BOOT`\n  - `SCREEN`\n  - `COMMAND`\n  - `VIEW`\n\nThat way:\n\n```text\n[App Runtime] [ApplicationLifecycle] [Lifecycle] [System]     BOOT\nStep 01 · 01-app-started\nAppStarted\n```\n\nNow every piece is doing a different job:\n- `App Runtime` = broad family/group\n- `ApplicationLifecycle` = bounded context\n- `Lifecycle` = lens/view family\n- `System` = actor/role\n- `BOOT` = actual surface kind being shown in the slot\n\nThat feels much less muddy to me than keeping `LIFECYCLE` in the top-right.\n\nAnd yes, if we adopt that shape, I agree those classification pills belong above the step key line, not below the snapshot. That reads much more like “this is what this column is” before you get into the step id and title.\n\nThe main decision I think we need next is whether the top-right label should:\n- stay, but become a true surface kind like `BOOT`\n- or disappear entirely once the classification row moves to the top"

