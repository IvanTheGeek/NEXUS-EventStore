text = "I can’t change that GitHub repo setting from here.\n\nDo this on GitHub:\n\n1. Open the repo: [NEXUS-EMERGING](https://github.com/IvanTheGeek/NEXUS-EMERGING)\n2. Click `Settings`\n3. In the left sidebar, click `Branches`\n4. In `Default branch`, click the switch/edit control\n5. Change the default branch from `codex/nexus-ingestion-foundation` to `main`\n6. Confirm the change\n\nAfter that, if you want the local remote HEAD to match, run:\n\n```bash\ngit -C /home/ivan/NEXUS/NEXUS-EMERGING remote set-head origin -a\ngit -C /home/ivan/NEXUS/NEXUS-EMERGING remote show origin\n```\n\nYou should then see:\n- `HEAD branch: main`\n\nI would wait to delete `codex/nexus-ingestion-foundation` until after that setting is changed. If you want, once you’ve flipped it on GitHub, I can do the local cleanup and help create the next focused branch."

