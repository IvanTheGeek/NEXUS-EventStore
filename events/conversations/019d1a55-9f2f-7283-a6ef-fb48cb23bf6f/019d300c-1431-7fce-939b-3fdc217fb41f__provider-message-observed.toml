kind = "plain_text"
text = "Yes, exactly.\n\nTwo normal patterns are:\n\n1. Merge branch into `main`\n- branch work is accepted\n- `main` becomes the new converged baseline\n\n2. Merge `main` back into another long-lived branch\n- that branch picks up everything accepted since it diverged\n- it continues forward with the newer shared foundation\n\nSo a long-lived branch can do both over time:\n- contribute changes into `main`\n- receive newer changes back from `main`\n\nThat is how you keep multiple active concern-line branches current without losing the shape of the work.\n\nExample flow:\n1. work on `fnui-foundation`\n2. merge `fnui-foundation` into `main`\n3. continue work on `cheddarbooks-foundation`\n4. merge `main` into `cheddarbooks-foundation` so it picks up the latest FnUI changes\n5. later merge `cheddarbooks-foundation` back into `main`\n\nThat creates visible convergence points in the graph, which is what you said you wanted.\n\nA good practical rule is:\n- merge into `main` when a branch has reached a coherent checkpoint\n- merge `main` into long-lived branches whenever shared foundation changes matter to that branch\n\nSo yes, your understanding is right."

