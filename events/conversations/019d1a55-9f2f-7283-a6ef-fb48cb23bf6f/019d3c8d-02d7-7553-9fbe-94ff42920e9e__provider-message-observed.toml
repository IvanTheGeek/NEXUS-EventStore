text = "I’ve got enough now to answer this properly.\n\nMy read from the actual repo plus the official docs is:\n- `Playwright MCP` is great for interactive exploration, but it is not the formal harness.\n- the formal harness should be checked-in Playwright tests.\n- the real choice is the checked-in test stack: `JS/TS Playwright Test` vs `.NET Playwright`.\n\nThe important official .NET fact is that Playwright .NET is not tied to one runner, but the Playwright team says the easiest path is their base classes for `MSTest`, `NUnit`, `xUnit`, or `xUnit v3`. Since CheddarBooks is currently `F# + Expecto`, that makes `.NET Playwright + Expecto` a custom path, not the first-class one.\n\nSo the current options are:\n\n- `JS/TS Playwright Test`  \n  Best browser-native option. Strongest default recommendation.\n  Why:\n  - first-class Playwright runner\n  - best docs/examples/ecosystem\n  - clean browser assertions, traces, retries, screenshots\n  - natural fit for our HTML/JS-heavy workspace artifacts\n  Cost:\n  - adds a Node toolchain to the repo\n\n- `Playwright .NET in a separate browser-test project`  \n  Good if staying in .NET matters more than using the most native Playwright surface.\n  Why:\n  - keeps browser tests in the .NET family\n  - still official Playwright support\n  Cost:\n  - likely means adding `xUnit/NUnit/MSTest`, since official guidance is strongest there\n  - more split-brain than the current `Expecto` setup\n\n- `Playwright .NET driven from Expecto`  \n  Possible, but I do not recommend it as the primary path.\n  Why:\n  - keeps a single F# test runner story\n  Cost:\n  - more custom glue\n  - more maintenance\n  - weaker “known good” path than the official JS/TS runner or the official .NET base-class runners\n\n- `MCP only`  \n  Useful, but not enough.\n  Why:\n  - good for ad hoc debugging\n  Cost:\n  - not repeatable proof\n  - not CI-friendly\n  - doesn’t become durable repo behavior\n\nMy recommendation:\n- `Playwright MCP` for interactive debugging\n- `JS/TS Playwright Test` for the formal harness\n- keep `F#` owning renderer generation and deterministic artifact production\n- serve the workspace artifacts over a tiny local HTTP server during browser tests instead of relying on `file://`\n  Why:\n  - the page already has sidecar update behavior and browser JS\n  - HTTP gives a cleaner, more controllable origin for nav/lens/update tests\n\nTo make the next plan decision-complete, I need two choices from you:\n1. which durable harness stack we want\n2. how wide the first Playwright suite should be"

