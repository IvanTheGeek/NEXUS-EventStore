text = "# ==========================================\n# LaundryLog — PATH 1\n# Manual location, washer, then dryer\n# ==========================================\n\n# This spec stays focused on the first useful business path:\n# 1. manually capture location\n# 2. log a washer expense\n# 3. log a dryer expense\n# 4. show both entries in the current session view\n\n[slice: Capture Laundry Location]\nusr:User\nui:New Session Screen(*newSession)\nUser -> *newSession\n*newSession -> cmd:CaptureLaundryLocation(*captureLocation)\n*captureLocation -> evt:LaundryLocationCaptured(*locationCaptured)\n\n[slice: View Ready To Log First Expense]\n*locationCaptured -> rm:Current Laundry Session(*currentSession)\n*currentSession -> ui:Entry Form Screen(*entryForm)\n\n[slice: Log Washer Expense]\nbasic:Log Washer Expense(*logWasherAction)\n*entryForm -> *logWasherAction\n*logWasherAction -> cmd:LogLaundryExpense(*logExpense)\n*logExpense -> evt:LaundryExpenseLogged(*expenseLogged)\n\n[slice: View Washer In Current Session]\n*expenseLogged -> *currentSession\n*currentSession -> *entryForm\n\n[slice: Log Dryer Expense]\nbasic:Log Dryer Expense(*logDryerAction)\n*entryForm -> *logDryerAction\n*logDryerAction -> *logExpense\n*logExpense -> *expenseLogged\n\n[slice: View Washer And Dryer In Current Session]\n*expenseLogged -> *currentSession\n*currentSession -> *entryForm\n\n[schemas]\n*captureLocation(location_name: string, capture_method: string)\n*locationCaptured(location_name: string, capture_method: string, recorded_at_utc: string)\n\n*logExpense(location_name: string, expense_kind: string, quantity: integer, unit_price: string, payment_method: string)\n*expenseLogged(location_name: string, expense_kind: string, quantity: integer, unit_price: string, line_total: string, payment_method: string, occurred_at_utc: string, recorded_at_utc: string)\n\nrm:Current Laundry Session(active_location_name: string, active_location_capture_method: string, running_total: string, visible_entries: array, last_recorded_at_local: string)\n\n[GWT: Manual location then washer]\nGIVEN *locationCaptured(location_name: \"Love's #123 - Springfield, OH\", capture_method: \"manual-text\", recorded_at_utc: \"2026-03-27T13:42:00Z\")\nWHEN *logExpense(location_name: \"Love's #123 - Springfield, OH\", expense_kind: \"washer\", quantity: 1, unit_price: \"3.00\", payment_method: \"card\")\nTHEN *expenseLogged(location_name: \"Love's #123 - Springfield, OH\", expense_kind: \"washer\", quantity: 1, unit_price: \"3.00\", line_total: \"3.00\", payment_method: \"card\", occurred_at_utc: \"2026-03-27T13:47:00Z\", recorded_at_utc: \"2026-03-27T13:47:10Z\")\n\n[GWT: Washer then dryer in the same current session]\nGIVEN *expenseLogged(location_name: \"Love's #123 - Springfield, OH\", expense_kind: \"washer\", quantity: 1, unit_price: \"3.00\", line_total: \"3.00\", payment_method: \"card\", occurred_at_utc: \"2026-03-27T13:47:00Z\", recorded_at_utc: \"2026-03-27T13:47:10Z\")\nWHEN *logExpense(location_name: \"Love's #123 - Springfield, OH\", expense_kind: \"dryer\", quantity: 1, unit_price: \"2.50\", payment_method: \"cash\")\nTHEN *expenseLogged(location_name: \"Love's #123 - Springfield, OH\", expense_kind: \"dryer\", quantity: 1, unit_price: \"2.50\", line_total: \"2.50\", payment_method: \"cash\", occurred_at_utc: \"2026-03-27T13:58:00Z\", recorded_at_utc: \"2026-03-27T13:58:08Z\")\nAND rm:Current Laundry Session(active_location_name: \"Love's #123 - Springfield, OH\", running_total: \"5.50\")"

