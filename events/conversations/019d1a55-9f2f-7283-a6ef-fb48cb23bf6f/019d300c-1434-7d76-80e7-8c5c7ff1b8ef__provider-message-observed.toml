text = "That’s the main missing piece on the Codex side: we only have raw preservation so far, not canonical import.\n\nCurrent state:\n- Raw export/preservation exists via [export_codex_sessions.fsx](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/scripts/export_codex_sessions.fsx)\n- Human docs exist in [export-codex-sessions.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/export-codex-sessions.md)\n- It copies Codex session JSONL files into `NEXUS-Objects/providers/codex/...`\n\nWhat we do not have yet:\n- a `Codex` adapter that reads those JSONL sessions\n- canonical events/manifests written into `NEXUS-EventStore`\n- projections over imported Codex sessions\n\nI think it should fit the same architecture, just with a different intake path:\n- raw Codex session JSONL stays in `NEXUS-Objects`\n- a Codex adapter normalizes `user_message` and `agent_message`\n- we write `ProviderConversationObserved`, `ProviderMessageObserved`, and `ImportCompleted` the same way we do for ChatGPT and Claude\n\nMy recommendation:\n- make Codex log import the next implementation slice\n- treat Codex as another provider in practice, even if its source is local session logs rather than export zips\n- keep v1 narrow: import only `user_message` and `agent_message` first, and defer richer tool/runtime events until the base mapping is solid\n\nIf you want, I’d make the next command something like:\n- `import-codex-sessions`\n\nand have it read from the archived/raw Codex session files we’re already preserving."

