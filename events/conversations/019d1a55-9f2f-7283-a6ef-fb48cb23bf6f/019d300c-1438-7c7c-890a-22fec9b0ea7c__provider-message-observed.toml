text = "Next I’d recommend making the working graph index explorable without Graphviz.\n\nSpecifically:\n- `find-working-graph-nodes` by title/slug/role/provider/import\n- `report-working-graph-neighborhood --node-id <id>` to show nearby nodes, predicates, and provenance\n- optionally `report-working-graph-conversation --conversation-id <id>` as a friendlier slice view\n\nWhy this next:\n- it makes the new SQLite working layer actually useful day to day\n- it helps concept harvest for things like `FnHCI`, `LOGOS`, and later domains\n- it sets up FnHCI/UI work naturally, because the UI will need this kind of query surface anyway\n- it avoids jumping too early into analytics/vector work before the local graph workflow is legible\n\nAfter that, the likely sequence is:\n- better concept/discovery extraction from conversations\n- generalized LOGOS intake/source modeling\n- later DuckDB/vector/analytics in a separate bounded context\n\nIf you want, I’ll make the next slice be:\n- `find-working-graph-nodes`\n- `report-working-graph-neighborhood`"

