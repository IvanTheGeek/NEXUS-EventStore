kind = "plain_text"
text = "Yes. Biggest wins, in order:\n\n1. Collapse `Scenario` into an inline chip.\n   Current:\n   a whole card with label + title.\n   Better:\n   `Scenario: fresh first launch with no known local data`\n   as one compact pill on the title row.\n\n2. Put `View` and `Updates` controls on the same line as the title block.\n   Right now they live on their own header band.\n   Better:\n   left = title\n   right = controls\n   That alone saves a lot of height.\n\n3. Hide the long description by default behind a `details` toggle or an `i` button.\n   Keep the title visible, but move the explanatory paragraph into collapsible metadata.\n\n4. Merge update status into the update controls row.\n   Current:\n   `Up to date (...)` gets its own line.\n   Better:\n   small muted inline text right after `Notify Me / Auto Refresh`.\n\n5. Reduce the top eyebrow prominence.\n   `PATH1 SCREEN PATH` can be:\n   - smaller\n   - tighter\n   - or merged into the main title line\n\n6. Tighten vertical gaps.\n   The header currently has several stacked margins:\n   - title to description\n   - description to scenario\n   - scenario to controls\n   - controls to scroll rail\n   These can all come down noticeably.\n\n7. Make the header two rows max.\n   Best compact shape:\n   - Row 1: title + scenario chip + controls\n   - Row 2: scroll rail + nav buttons\n\nMy recommended direction:\n- remove the scenario card\n- move controls into the title row\n- make description collapsible\n- keep the rail as the only full-width second row\n\nThat should cut the header height a lot without losing meaning.\n\nIf you want, I can implement that compact two-row header next."

