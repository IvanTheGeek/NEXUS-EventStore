text = "Perfect. `Trim trailing empties` is the cleanest version.\n\nWhat that means in practice:\n- `SCREEN` and first detail rows still keep shared heights across the visible columns\n- a column can stop after its last meaningful row instead of always reserving blank bottom rows\n- if a later row exists, any empty row above it still stays as a spacer so semantic alignment is preserved\n\nSo:\n- `Need Location` or `Ready To Set Location` can end after their `INTERACTION` row\n- an AEM `VIEW` column that still has a `GWT` row would keep the empty middle spacer if needed, so the GWT band stays in the correct row\n\nDifficulty-wise, this is low-to-medium, not a redesign. It’s mostly:\n- change slot rendering so only trailing empty slots are omitted\n- keep shared slot-height sync\n- update browser tests so they assert shorter outer columns where appropriate\n\nOne last design choice will make the implementation cleaner: how the shortened columns should end visually once the trailing empty rows are removed."

