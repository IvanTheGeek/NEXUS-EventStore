kind = "plain_text"
text = "Yes. There are holes, but mostly in the runner/tooling experience, not the core browser API.\n\nFrom the official Playwright language docs: all languages support the core browser automation API, but the testing ecosystem differs, and they recommend using the runner they recommend for each language. For Node, that is Playwright Test; for .NET, the docs point to MSTest/NUnit/xUnit/xUnit v3 base classes rather than a single bundled runner. Sources: [Supported languages](https://playwright.dev/docs/next/languages), [Playwright intro](https://playwright.dev/docs/intro), [Playwright .NET test runners](https://playwright.dev/dotnet/docs/test-runners).\n\nSo the practical differences are:\n\n- `JS/TS Playwright Test` has the most first-class test harness.\n  It bundles the runner, retries, projects, HTML reporting, UI mode, automatic tracing, and screenshot assertions. The docs explicitly call out parallelization, HTML reporter, and automatic tracing, and screenshot assertions are runner-specific. Sources: [Playwright intro](https://playwright.dev/docs/intro), [HTML reporter](https://playwright.dev/docs/test-reporters), [PageAssertions](https://playwright.dev/docs/api/class-pageassertions), [Trace viewer](https://playwright.dev/docs/trace-viewer-intro).\n\n- `Playwright .NET` has strong core automation and web-first assertions, but the test harness is more assembled.\n  You still get locators, browser contexts, auth, mocking, codegen, tracing APIs, and async assertions. But the official path is “use our base classes with MSTest/NUnit/xUnit/xUnit v3,” not a single Playwright-native runner. Sources: [Playwright .NET test runners](https://playwright.dev/dotnet/docs/test-runners), [Assertions](https://playwright.dev/dotnet/docs/test-assertions), [Mock APIs](https://playwright.dev/dotnet/docs/mock), [Codegen](https://playwright.dev/dotnet/docs/codegen), [Isolation](https://playwright.dev/dotnet/docs/browser-contexts).\n\nThe main holes I would care about for us are:\n\n- `JS/TS` has first-class screenshot assertions; the docs say those only work with the Playwright test runner.\n  In .NET you can take screenshots, but the first-class visual-assertion flow is not the same. Sources: [PageAssertions](https://playwright.dev/docs/api/class-pageassertions), [Visual comparisons](https://playwright.dev/docs/test-snapshots), [Playwright .NET screenshots](https://playwright.dev/dotnet/docs/screenshots).\n\n- `JS/TS` has the richest out-of-the-box reporting/debug loop.\n  HTML report, UI mode, retries, and trace configuration are all centered in `playwright.config`. In .NET you can still trace, but the .NET tracing docs explicitly say the raw tracing API does not record test assertions and recommend Playwright Test config for a more complete trace. Sources: [Playwright intro](https://playwright.dev/docs/intro), [Trace viewer](https://playwright.dev/docs/next/trace-viewer), [Playwright .NET tracing](https://playwright.dev/dotnet/docs/api/class-tracing).\n\n- Component testing is surfaced as Node packages in the official docs.\n  I did not find an equivalent .NET component-testing surface in the official docs. That is not critical for the current screen-path HTML work, but it is relevant to longer-term `FnHCI` possibilities. Source: [Components (experimental)](https://playwright.dev/docs/test-components).\n\nOn `xUnit` vs `Expecto`: yes, there are absolutely areas where `xUnit` could be the better fit than `Expecto`, but that does not mean it replaces Expecto repo-wide.\n\nMy read for this repo is:\n\n- `Expecto` is still the better fit for pure F# model/renderer tests.\n  It already exists here, it’s idiomatic for the repo, and it matches the deterministic F# side well.\n\n- `xUnit` becomes attractive if we choose `Playwright .NET`.\n  Not because xUnit is philosophically better, but because Playwright .NET officially supports xUnit/NUnit/MSTest base classes directly. That means less glue, better ecosystem fit, and less custom maintenance than trying to force Playwright .NET through Expecto. Source: [Playwright .NET test runners](https://playwright.dev/dotnet/docs/test-runners).\n\nSo I would frame the realistic options like this:\n\n1. Recommended: `Expecto` stays for F# code tests, and `JS/TS Playwright Test` is added for browser tests.\n   Why this is strongest:\n   - best Playwright experience\n   - no need to drag browser testing through custom .NET glue\n   - no need to introduce xUnit just to satisfy Playwright\n   - clean concern split: F# for generation, Playwright JS/TS for browser truth\n\n2. All-.NET compromise: keep `Expecto` for code tests, add a separate `xUnit` browser-test project for `Playwright .NET`.\n   Why this is viable:\n   - stays in .NET\n   - uses the official Playwright .NET path\n   Why I rate it second:\n   - adds another .NET test framework anyway\n   - still not as first-class as Playwright Test for browser-heavy work\n\n3. Least recommended: keep only `Expecto` and drive `Playwright .NET` from custom F# test glue.\n   Why I would avoid it:\n   - too much custom harness work\n   - weaker docs/ecosystem path\n   - more maintenance for less gain\n\nFor our current LaundryLog browser surface, I would formalize the plan like this once you choose a lane:\n\n- keep `F#` generating the tracked workspace artifacts\n- test the tracked `workspace/` HTML, not `tmp/`\n- serve those files over a tiny local HTTP server during browser tests instead of relying on `file://`\n- first smoke suite should prove:\n  - nav buttons move by whole columns\n  - start/end align with the rail correctly\n  - lens toggles actually hide/show steps\n- second suite can cover:\n  - update sidecar detection\n  - refresh button / auto-refresh behavior\n\nSo the real decision is:\n\n- `JS/TS Playwright Test` alongside Expecto\n- or `Playwright .NET` with a separate xUnit browser test project alongside Expecto\n\nMy recommendation is still the first one.\n\nIf you want, I can next turn this into a decision-complete plan for both branches, or narrow it to the one you’re leaning toward."

