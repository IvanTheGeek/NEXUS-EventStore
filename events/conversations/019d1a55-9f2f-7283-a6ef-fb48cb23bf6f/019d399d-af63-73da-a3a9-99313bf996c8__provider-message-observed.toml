text = "The deeper research surface is in place and committed on the current `export-window-analysis` branch as `16754806`.\n\nMain files:\n- [codex-mcp-retrospective.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/research/penpot/codex-mcp-retrospective.md)\n- [penpot research index](/home/ivan/NEXUS/NEXUS-EMERGING/docs/research/penpot/README.md)\n- [research notes index](/home/ivan/NEXUS/NEXUS-EMERGING/docs/research/README.md)\n- [docs index](/home/ivan/NEXUS/NEXUS-EMERGING/docs/index.md)\n\nWhat it now captures:\n- why Penpot was attractive in this workflow\n- what actually worked\n- what failed or became too fragile\n- exact local Codex log references for the MCP transport error\n- durable note links for the deeper Penpot findings\n- the recommended publication split:\n  - narrow GitHub issue for concrete bugs\n  - broader forum post for the narrative\n  - this NEXUS note as the evidence-backed dossier\n- the older forum thread `[API and MCP issues]` is included as trace\n- placeholders are there for your already-posted GitHub/forum links so we can add them once you have the URLs handy\n\nI kept this strictly additive because the repo is very dirty with unrelated changes, and I did not touch those. No tests were run because this was docs-only.\n\nThe next strong move is to draft the short public forum post from this note, with one compact link out to the dossier instead of trying to stuff all the evidence into the forum itself."

