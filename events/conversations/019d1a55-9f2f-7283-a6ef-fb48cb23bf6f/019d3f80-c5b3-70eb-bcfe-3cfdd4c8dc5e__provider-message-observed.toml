text = "The NM path is realigned now around shared row slots, and the legacy screen-path artifact was left alone.\n\nReview here:\n- [LaundryLog_PATH1_NM_FirstLaunch_FirstEntry.html](/home/ivan/NEXUS/CheddarBooks/workspace/laundrylog/html/nm-paths/LaundryLog_PATH1_NM_FirstLaunch_FirstEntry.html)\n\nWhat changed:\n- every NM column now uses the same grid slot structure: `header`, `screen`, `primary`, `secondary`, `gwt`\n- row heights are synchronized across the visible columns in the browser, so `SCREEN` boxes share a row, primary detail blocks share a row, event/secondary blocks share a row, and GWT blocks share a row\n- AEM command/view content is placed directly into those shared NM slots instead of free-stacking\n- the alignment recomputes when lenses, view mode, surface mode, or viewport size change\n\nMain files:\n- [NmPathHtmlRenderer.fs](/home/ivan/NEXUS/CheddarBooks/src/CheddarBooks.LaundryLog.UI/NmPathHtmlRenderer.fs)\n- [SliceHtmlRenderer.fs](/home/ivan/NEXUS/CheddarBooks/src/CheddarBooks.LaundryLog.UI/SliceHtmlRenderer.fs)\n- [LaundryLogTests.fs](/home/ivan/NEXUS/CheddarBooks/tests/CheddarBooks.Tests/LaundryLogTests.fs)\n- [path1-nm-path.spec.ts](/home/ivan/NEXUS/CheddarBooks/tests/browser/specs/path1-nm-path.spec.ts)\n\nVerification was run through the repo script:\n- [verify-workspace-html.sh](/home/ivan/NEXUS/CheddarBooks/scripts/laundrylog/verify-workspace-html.sh)\n- `36` Expecto tests passed\n- `14` Playwright tests passed\n\nCommit:\n- `d220b99` `model: align nm path compartments by shared rows`\n\nThe next strong pass is visual tuning of the empty reserved rows so they feel intentional rather than just blank space."

