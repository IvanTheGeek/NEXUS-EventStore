text = "I think `properties` is the safest current term, but it depends on which lens we want the box to belong to.\n\nMy read:\n\n- `fields` sounds most UI/form-oriented.\n  Good if we mean input controls or editable form shape.\n  Weaker if the box is showing command/event/view content in a modeling sense.\n\n- `data` is broad, but too vague.\n  It works conversationally, but it loses meaning fast because everything on the page is ÔÇťdata.ÔÇŁ\n\n- `properties` feels most neutral across `CommandSlice`, `Event`, and `ViewSlice`.\n  It reads like: ÔÇťthese are the named values carried by this thing.ÔÇŁ\n  That matches modeling better than UI wording.\n\nSo if the badge is meant to mean:\n- ÔÇťshow me the named values for this blockÔÇŁ\nthen IÔÇÖd favor `Properties`.\n\nIf we want something a little more business/modeling-flavored, better alternatives might be:\n- `Values`\n- `Details`\n- `State`\n\nHow IÔÇÖd rank them right now:\n1. `Properties`\n2. `Details`\n3. `Values`\n4. `Fields`\n5. `Data`\n\nWhy `Details` might beat `Properties` later:\n- it is easier for non-technical people\n- it works whether the box is command, event, or view\n- it doesnÔÇÖt sound as implementation-ish\n\nWhy I still slightly favor `Properties` today:\n- it is more precise\n- it matches the `key = value` shape well\n- it fits the modeling/projection context weÔÇÖre in\n\nOn the mockup point, moving that badge/button to the left makes sense to me if we separate concerns visually:\n- left side: content-mode toggles like `Properties`\n- right side: context/lens/audience badges like `business`, `classic em`, `ui lens`\n\nThat gives the footer a clearer grammar.\n\nSo my recommendation is:\n- keep `Properties` for now\n- consider `Details` if you want slightly friendlier language\n- avoid `Data`\n- use `Fields` only when we are explicitly in a form/input lens\n\nIf you want, I can also sketch a footer grammar like:\n- left: `Properties`\n- right: `business` / `classic em` / `ui lens`\n\nThat might help us lock the pattern."

