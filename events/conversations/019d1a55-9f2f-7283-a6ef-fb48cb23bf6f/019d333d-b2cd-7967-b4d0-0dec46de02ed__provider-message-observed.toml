text = "Good news: Node 20 is not blocking us right now. The official Penpot MCP package booted successfully and exposed all three local services on your VM:\n\n- plugin server: `http://localhost:4400`\n- MCP HTTP endpoint: `http://localhost:4401/mcp`\n- WebSocket bridge: `ws://localhost:4402`\n\nSince it actually runs, I’d keep moving and only upgrade to Node 22 later if we hit a real issue or you want to align with Penpot’s tested baseline.\n\nI’m finishing the useful part now:\n- make the MCP server easy to start/stop locally\n- add the `penpot` MCP entry to Codex\n- verify the endpoint and give you the exact plugin URL to load inside Penpot"

