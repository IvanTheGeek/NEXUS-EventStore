[[body.segments]]
kind = "plain_text"
text = "ok, that is looking pretty good as a base to work from. So I fell like further refinement will come as we move to the next phase. I see that as starting to actually build out the screens per user and system update. I feel that in order to have proper app/system operation and proper UX (user experience) that each screen state should be modeled. This is a big divergance from Adam's Event Modeling (which I think I will reference as AEM from now on) so there is a lens that is `AEM`. That is basically the work we did in the event modeling UI work already. But, I want to extend this. I see the UI as kind of its own system and then has explicit exchanges with the business system. This could be modeled from the context of UI and have its own diagram. But it becomes powerfull as being part of the whole truth and can be inter-weaved. so this would be like a different type of slice that gets weaved together with the AEM Slices. So, lets start creating the screens only first and get a few in an order/row as they would follow a PATH. When we get going, create a new folder in our work area for paths, use 1 html self-contained file per path to start and we will go screen by screen with what changes on the screen. this is our trial to get a coherent visual path established. There is another lens that would be app related also. That would be like system mechanics or something of that sort, a more technical aspect. The first example that comes to mind is that we need a starting trigger, when could be a Slice that produces ann `AppStarted` type event. So when a user clicks the button on their phone, it starts up the app, maybe a splash screen is shown while it might need to download the wasm or do it pwa startup checks, then, assuming a fresh first start with no data, it will show the need location screen."

