kind = "plain_text"
text = "Yes, primarily.\n\nThe clean first optimization is on the **Codex source/export side**:\n\n- compare current Codex source files to the previous export manifest\n- always refresh `session_index.jsonl`\n- only archive changed transcript files into the new checkpoint snapshot\n- then the importer naturally only parses what is present in that sparse archive snapshot\n\nSo the first win is:\n- less copied input\n- less parsed input\n- less canonical dedupe work\n\nThat is why I called it source/export-boundary optimization.\n\nA later, deeper optimization would be inside the parser/importer:\n- detect append-only growth inside one changed transcript\n- parse only the new tail\n\nBut that is the second stage, not the first.\n\nSo your understanding is right:\n- **first optimization = input source side**\n- **later optimization = parser/import side**"

