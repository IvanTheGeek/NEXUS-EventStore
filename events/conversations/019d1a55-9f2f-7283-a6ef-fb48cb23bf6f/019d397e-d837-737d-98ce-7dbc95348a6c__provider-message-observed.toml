text = "I fixed the structural modeling issues, but one Penpot inheritance quirk is still blocking the casing fix from sticking cleanly on the live component instances.\n\nWhat did stick:\n- `Event Ref` is gone from the default classic `ViewSlice`\n- `ViewSlice` is now green-only by default\n- screen is hidden in classic `ViewSlice`\n- command and view shells are now intended to be the same visual height target\n- I pushed the visible `View` content downward so it no longer reads as “top card in the slice”\n\nFresh preview:\n![PATH1 Row V2 Clean Classic View v2](/home/ivan/NEXUS/tmp/LaundryLog_PATH1_Row_V2_Clean_ClassicView_v2.png)\n\nWhat is still wrong:\n- `COMMANDSLICE` / `VIEWSLICE` casing is still showing in the live instances\n- that is not because the model rule is unclear; it is because inherited header text on these component instances is still resisting direct mutation, even while geometry and visibility changes are taking\n\nSo the current situation is:\n- the **layout/visibility corrections** are the right direction and are taking\n- the **header text casing correction** needs one more structural pass\n\nThe cleanest next move is:\n- rebuild just the header strip cleanly inside `CommandSlice.Clean.V1` and `ViewSlice.Clean.V1`\n- then re-instantiate the PATH row instances from those corrected bases\n- rather than keep fighting inherited header text on the current lineage\n\nOn your other point, I agree with the design rule:\n- `CommandSlice` and `ViewSlice` should have a **consistent visual height**\n- the contents inside them can vary by lens\n- but the outer slice card should stay visually uniform within a path row\n\nThat should be our explicit rule going forward.\n\nSo I think the right next step is:\n1. rebuild the header strip cleanly with `CommandSlice` / `ViewSlice` casing\n2. keep equal shell height\n3. keep classic `ViewSlice` = green `View` only\n4. reproject `PATH1.Row.V2.Clean` from those corrected bases\n\nIf you want, I’ll do exactly that next."

