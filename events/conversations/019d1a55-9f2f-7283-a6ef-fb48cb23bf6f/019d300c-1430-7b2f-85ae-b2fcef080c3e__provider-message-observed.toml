text = "lets update the base readme to have a section for apps with maybe sections like CheddarBooks and Cheddar and FnTools sections. Cheddar is the over arching domain that will be for many small apps that help life in general mainly related to life orgainzation and person finance. Review all my chats and ingestion data for a list of future ideas, CheddarBooks is a \"division\" of Cheddar that focuses on mirco and small business concerns with the flagship app going to be CheddarBooks which will be a free, open, privacy concerned replacement for Xero and QuickBooks and there are other options in this space that we will investigate and document later. A replacement to QuickBooks is the big thing, I hate intuit and the costs. I have several small micro businesses that will cost $80 per when that is not feasible. I have the major income earner of the trucking business, but the bookkeeping is still not justifying the expense, especially for what QuickBooks offers me. \n\nthere is a github repo at blog.ivanrainbolt.com that is accessable from my login that you should have access to github on. Let's ingest these posts into LOGOS and add the needed adapters to the ingestion chain then use these for the above prompts."

