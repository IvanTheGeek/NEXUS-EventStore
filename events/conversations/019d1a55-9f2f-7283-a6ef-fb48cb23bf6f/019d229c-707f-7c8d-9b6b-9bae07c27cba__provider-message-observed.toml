text = "The full real-store rebuild completed successfully.\n\nBaseline:\n- `17,302` canonical event files scanned\n- `84,744` distinct graph assertions derived\n- full rebuild time: `01:29:26`\n- output written under [NEXUS-EventStore/graph/assertions](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph/assertions)\n\nI also exported the real Graphviz DOT file:\n- [nexus-graph.dot](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph/exports/nexus-graph.dot)\n- DOT shape: `8,955` nodes and `44,443` visual edges\n\nOn the “what are these edges?” question: a lot of the graph layer is not “mystery graph theory,” it’s just derived structure from our canonical history. In [Graph.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Domain/Graph.fs), the current important node-to-node relations are things like `belongs_to_conversation`, `references_artifact`, `observed_during_import`, `located_in_domain`, and `interpreted_within_context`. Many other assertions are node-to-literal facts, like `has_node_kind = message_node`, `has_semantic_role = imprint`, `has_role = assistant`, or `has_sequence_hint = 2`. Those still live as TOML graph assertions, but in the DOT export they become node labels/details rather than arrow edges.\n\nGraphviz on this machine is command-line, not a desktop app. The full DOT export is ready now, and you can use it locally or in an online viewer. Examples:\n\n```bash\nsfdp -Tsvg /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph/exports/nexus-graph.dot -o /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph/exports/nexus-graph.sfdp.svg\ndot -Tsvg /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph/exports/nexus-graph.dot -o /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph/exports/nexus-graph.dot.svg\n```\n\nI tried a full `sfdp` render and stopped it because the full graph is large enough that rendering is another heavyweight job. Practically, the next best step is sliced renders by provider, import batch, or conversation cluster. That will be much more visually useful than one giant full-graph picture.\n\nI pushed the status-emitter improvement as `e26a419e` so future rebuilds are observable. The only remaining local change is the untracked [NEXUS-EventStore/graph](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph) output from this baseline run."

