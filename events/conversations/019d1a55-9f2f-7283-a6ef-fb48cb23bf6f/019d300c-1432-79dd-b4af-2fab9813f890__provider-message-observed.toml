[[body.segments]]
kind = "plain_text"
text = "Use both, but give them different jobs.\n\nMy recommendation:\n\n- `BoundedContext` or `DomainContext`\n  answers: “what meaning boundary are we inside?”\n- `Lens`\n  answers: “how are we looking at that reality right now?”\n\nSo:\n\n- `Context` is about semantic boundary and responsibility.\n- `Lens` is about perspective, presentation, aliasing, grouping, and emphasis.\n\nThat distinction fits your influences well:\n- DDD gives us bounded context.\n- Event Modeling gives us workflow/storyboard views.\n- NEXUS gives us one underlying graph with many valid ways to look at it.\n\nIf you use only one term, things get muddy fast. “Context” gets overloaded with:\n- bounded context\n- prompt context\n- execution context\n- UI context\n- conversation context\n\nSo I’d be a little stricter in naming:\n\n- use `BoundedContext` in the domain model\n- use `Lens` in the graph/view model\n- avoid bare `Context` unless it’s truly obvious\n\nA good mental model is:\n\n- Graph substrate: what exists\n- Bounded context: what meanings/rules apply\n- Lens: how that same substrate is viewed or localized for a purpose\n\nExample:\n- same underlying nodes/claims\n- in `Ingestion` bounded context: `ProviderMessageObserved`\n- in `SoftwareDevelopment` bounded context: maybe the same material contributes to `Decision`, `Requirement`, `Slice`, `Constraint`\n- through a `DeveloperLens`: grouped by implementation concerns\n- through a `BusinessLens`: grouped by outcomes/workflows\n- through a `UXLens`: grouped by journey/interaction\n\nSo for v0 I’d introduce both conceptually, but only lightly in code:\n\n- `BoundedContextId`\n- `LensId`\n- later: `LensDefinition`, `VocabularyAlias`, `LensProjection`\n\nIf you want, next I can fold that directly into the “NEXUS core conceptual layers” note and keep it short."

