text = "That’s now explicit in NEXUS-level governance and pushed to `main`.\n\nThe new rule lives in:\n- [0021-important-discoveries-become-durable-repo-memory.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0021-important-discoveries-become-durable-repo-memory.md)\n- [collaboration-protocol.md](/tmp/nexus-merge-M7SKP3/docs/collaboration-protocol.md)\n- [README.md](/tmp/nexus-merge-M7SKP3/README.md)\n\nThe core expectation is now clear for humans, Codex, Claude, and later CORTEX:\n- important discoveries, corrections, rules, and architectural learnings should be recorded in durable repo memory\n- they should be referenced from the places where they matter\n- collaborators should not rely on chat memory alone\n\nWhile verifying that, I found and fixed a real usability bug in the new commit-checkpoint flow: `report-codex-commit-checkpoint` now resolves unique short SHAs the way you’d actually use commit IDs from GitHub. That fix is in:\n- [CommitCheckpoints.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/src/Nexus.EventStore/CommitCheckpoints.fs)\n- [CodexCommitCheckpointWorkflow.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/src/Nexus.Importers/CodexCommitCheckpointWorkflow.fs)\n- [CommitCheckpointTests.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/Nexus.Foundation.Tests/CommitCheckpointTests.fs)\n\nPushed commits on `main`:\n- `ed39e9d5` — durable-learning governance\n- `e98632b3` — short-SHA checkpoint lookup fix\n\nVerified:\n- `dotnet build /tmp/nexus-merge-M7SKP3/NEXUS-Code/NEXUS-Code.slnx`\n- `dotnet run --project /tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/Nexus.Foundation.Tests/Nexus.Foundation.Tests.fsproj`\n- `115` foundation tests passed\n\nAnd the short-SHA lookup now works against the live checkpoint for `ed39e9d5`."

