kind = "plain_text"
text = "SSH is better here.\n\nWhy:\n- it matches your current Git auth setup\n- it avoids repeated username/token prompts\n- it works cleanly with `git push` once the SSH key is configured\n- it is better for repo automation and multi-repo workflows\n\nHTTPS is fine, but in this environment it already showed friction with mixed fetch/push URLs. Since `gh auth login` also confirmed SSH and your key is already on GitHub, SSH is the cleaner default.\n\nSo my recommendation is:\n- use SSH for Git remotes\n- use `gh` for GitHub operations when helpful\n- if a repo ends up with mixed URLs, normalize both fetch and push to SSH\n\nExample:\n```bash\ngit remote set-url origin git@github.com:IvanTheGeek/FnTools.git\ngit remote set-url --push origin git@github.com:IvanTheGeek/FnTools.git\n```\n\nAnd yes, this is exactly the kind of thing I should keep surfacing explicitly when the tooling/setup matters."

