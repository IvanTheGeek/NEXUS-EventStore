text = "I captured this as a durable decision note and pushed it as `a18cf170`.\n\nThe new note is here:\n- [0006-storage-roles-by-bounded-context.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/decisions/0006-storage-roles-by-bounded-context.md)\n\nI also linked it from the materialization plan here:\n- [nexus-graph-materialization-plan.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/nexus-graph-materialization-plan.md)\n\nShort version of the comparison:\n\n- `DuckDB` is for structured analytical work: scans, aggregations, joins, exploration over derived tables.\n- A `vector DB` is for semantic similarity retrieval: embeddings, nearest-neighbor search, RAG-style recall.\n- A `graph DB` is for graph-native traversal: neighborhoods, multi-hop paths, graph-oriented query ergonomics.\n\nSo they are not substitutes for each other. The note recommends:\n- keep canonical truth in the current Git/TOML event store\n- use `SQLite` first if we add a persisted local working graph index\n- consider `DuckDB` later for analytics/LOGOS exploration\n- treat vector storage as a later retrieval context\n- defer graph DBs until graph-native traversal becomes clearly primary\n\nThat keeps the storage choices aligned to bounded contexts instead of trying to force one tool to do every job."

