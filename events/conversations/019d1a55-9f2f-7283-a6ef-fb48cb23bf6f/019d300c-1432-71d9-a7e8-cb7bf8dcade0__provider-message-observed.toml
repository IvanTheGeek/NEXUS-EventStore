[[body.segments]]
kind = "plain_text"
text = "That’s a strong place to start.\n\nIt gives us a clean progression:\n\n- `v1`: import provider zips, preserve raw inputs, normalize conversations/messages, and record artifact references even when the artifact payload is missing.\n- `v1.5`: support manual artifact hydration, where you add a file yourself and the system links it to an existing referenced artifact.\n- `v2`: explore automated capture later, once the base is trustworthy.\n\nI think the key modeling idea is this: a missing artifact is not an error in the history. It is an unresolved reference.\n\nSo for the canonical layer, an artifact can move through states like:\n\n- referenced\n- captured\n- revised\n- unresolved\n\nAnd importantly, each step is append-only. We don’t rewrite the earlier “referenced but not present” fact once the file shows up later.\n\nThat suggests a very practical first manual workflow:\n\n1. Import provider export\n2. Record any artifact references found in messages\n3. If payload is absent, mark it unresolved\n4. Later you manually place the recovered file into an intake/object-store area\n5. Run a reconcile/import command\n6. Append an `ArtifactPayloadCaptured` event linked back to the earlier reference\n\nThat keeps provenance honest and stays aligned with your larger NEXUS direction.\n\nThe one question I’d like to pin down next is this: when you manually add an artifact, what should be the primary way to match it to an existing reference?\n\n- by provider artifact ID if one exists\n- by conversation/message plus filename\n- by manual metadata you provide alongside the file\n\nMy default recommendation is: use provider artifact ID when available, otherwise fall back to conversation/message plus filename, with an optional manual metadata file for ambiguous cases."

