[[body.segments]]
kind = "plain_text"
text = "PLEASE IMPLEMENT THIS PLAN:\n# Reshape The NM Path Into True Classified Slices\n\n## Summary\nKeep the legacy screen-path artifact unchanged as fallback. Refine only the NM path so each column reads as a true NM slice built from the AEM shell idea:\n\n- whole-column classification at the top\n- one whole-column kind badge in the top-right\n- a contained `SCREEN` compartment with a small static thumbnail\n- the modeled content below that in context-native compartments\n- no checkerboard or texture language from the crude mockup\n\nThe key semantic rule is:\n- top-right kind badge = what the whole column fundamentally is\n- inner box labels = what each compartment inside the column is\n\n## Implementation Changes\n### 1. Rebuild the NM column grammar\nUpdate the NM renderer so every column follows this order:\n\n1. classification header\n2. step/key line\n3. column title\n4. optional short note\n5. top `SCREEN` compartment\n6. modeled content compartments below\n\nUse the classification header as two compact rows:\n- primary row:\n  - context group\n  - bounded context\n  - whole-column kind on the right\n- secondary row:\n  - lens\n  - actor/role when present\n\nThis means a business command column reads like:\n- `Business`\n- `EventModeling`\n- `COMMAND`\n- then `AEM`\n- then `User`\n\nDo not repeat those same classifications lower in the body.\n\n### 2. Keep the whole-column kind separate from compartment kinds\nUse the top-right badge strictly as the whole-column kind:\n\n- lifecycle/runtime startup columns: `BOOT`\n- screen-path columns: `SCREEN`\n- AEM command columns: `COMMAND`\n- AEM view columns: `VIEW`\n\nDo not let this badge duplicate the lens meaning.\n\nThe top compartment still uses `SCREEN` as its internal compartment label, because that compartment is classifying the linked app surface, not the whole column.\n\n### 3. Change the top compartment to a true static thumbnail box\nReplace the current thumbnail-mode live mini-surface with a static thumbnail representation.\n\nImplementation choice:\n- add a separate NM thumbnail renderer for linked app surfaces\n- thumbnail mode uses that static thumbnail renderer\n- full mode and click-to-expand continue to use the fuller real surface renderer\n\nThe thumbnail should:\n- be centered inside the `SCREEN` compartment\n- read as a bounded preview artifact, not a mostly-live mini-app\n- be much smaller than the current preview\n- use whitespace/neutral frame only, not checkerboard or texture\n- use human-first naming in the compartment title\n\nThe `SCREEN` compartment title should be human-first:\n- examples like `Set Location Screen`\n- technical identifiers only as secondary detail in `Detailed`\n\n### 4. Apply the stronger slice-shell grammar to all NM columns\nUse the same overall shell across all NM columns.\n\nFor non-AEM contexts:\n- `ApplicationLifecycle`\n  - top compartment: `SCREEN`\n  - lower compartment: `TRANSITION`\n- `RuntimeOrchestration`\n  - top compartment: `SCREEN`\n  - lower compartment: `ORCHESTRATION`\n- `ScreenPath`\n  - top compartment: `SCREEN`\n  - lower compartment: `INTERACTION`\n\nFor `EventModeling`:\n- keep the shared NM classification header and top `SCREEN` compartment\n- below that, render the actual AEM slice body directly\n- do not insert a competing generic NM lower box under AEM columns\n- keep AEM internals intact:\n  - command/event/view blocks\n  - GWT blocks\n  - existing AEM colors and structure\n\n### 5. Keep the visible language human-first and explicit\nUse text, not just color, to communicate meaning.\n\nVisible rules:\n- colors are cues only\n- the classification header is the explicit semantic source\n- human-facing titles lead in the `SCREEN` box\n- technical identifiers appear only as secondary detail in `Detailed`\n- scenario stays independent and starts collapsed by default\n- `Summary` and `Detailed` remain the only view modes\n\n### 6. Preserve the current interaction model\nKeep these existing behaviors:\n- lens toggles still hide/show columns by lens\n- whole-column nav still moves by logical columns\n- `Thumbnail / Full` remains page-level\n- click on the `SCREEN` compartment preview still opens the larger surface overlay\n- update controls remain unchanged except for carrying the refreshed NM artifact version\n\n## Test Plan\n### Expecto\nUpdate NM renderer invariants to prove:\n- classification rows render above the step line\n- whole-column kind stays separate from inner compartment labels\n- all columns emit a `SCREEN` top compartment\n- non-AEM columns emit the expected lower compartment labels:\n  - `TRANSITION`\n  - `ORCHESTRATION`\n  - `INTERACTION`\n- AEM columns still render the real AEM slice body below the shared header and screen compartment\n- scenario starts collapsed by default\n- the legacy screen-path artifact is unchanged\n\n### Playwright\nUpdate the NM browser suite to prove:\n- the classification header appears in the new two-row layout\n- the top-right whole-column kind remains correct\n- thumbnail mode uses a smaller, centered preview artifact inside the `SCREEN` box\n- full mode enlarges the surface presentation without breaking the slice shell\n- clicking the preview still opens the overlay\n- the scenario starts collapsed on first load and after reload\n- lens toggles and whole-column navigation still work with the new layout\n- legacy screen-path tests continue to pass unchanged\n\n## Assumptions\n- the checkerboard in the crude concept is not part of the final visual language\n- the top-right badge classifies the whole column, not the inner `SCREEN` compartment\n- all NM columns should move toward the stronger AEM-style slice shell now, not only business columns\n- the `SCREEN` compartment should be human-first and thumbnail-like\n- full live-surface rendering remains available through `Full` mode and the overlay, not as the default thumbnail surface"

