kind = "plain_text"
text = "I hit the key design wrinkle: because canonical history dedupes overlapping imports, the canonical store by itself does not remember “this already-known conversation was present again in import B.” So a true normalized snapshot compare needs a per-import snapshot artifact/materialization recorded at import time, not just additive canonical events. That’s the next useful thing to add on this branch."

