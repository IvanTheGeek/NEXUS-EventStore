text = "The split is done and pushed on `fntools-foundation` as `4aa7cdde`.\n\nThe important part for your question is: yes, the tests are now physically split in a way that will make repo extraction much easier. Instead of one big [Nexus.Tests.fsproj](/tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj), we now have:\n- [Nexus.Foundation.Tests.fsproj](/tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/Nexus.Foundation.Tests/Nexus.Foundation.Tests.fsproj)\n- [FnTools.Tests.fsproj](/tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/FnTools.Tests/FnTools.Tests.fsproj)\n- [CheddarBooks.Tests.fsproj](/tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/CheddarBooks.Tests/CheddarBooks.Tests.fsproj)\n\nI also did the first `FnTools` namespace correction pass in code:\n- [InteractionLine.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/src/Nexus.FnHCI/InteractionLine.fs)\n- [ShellModel.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/src/Nexus.FnHCI.UI/ShellModel.fs)\n- [BlazorHost.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/src/Nexus.FnHCI.UI.Blazor/BlazorHost.fs)\n\nThose now use `FnTools.FnHCI*` namespaces, while project paths still temporarily carry the older `Nexus.FnHCI` folder names. I updated the repo-boundary docs to make that explicit:\n- [0018-namespace-and-repo-boundaries-by-line.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0018-namespace-and-repo-boundaries-by-line.md)\n- [0015-fnhci-owns-the-top-interaction-namespace.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0015-fnhci-owns-the-top-interaction-namespace.md)\n- [run-tests.md](/tmp/nexus-merge-M7SKP3/docs/how-to/run-tests.md)\n\nVerification is clean:\n- `./NEXUS-Code/tests/run-all-tests.sh`\n- `107` foundation tests passed\n- `4` FnTools tests passed\n- `4` CheddarBooks tests passed\n\nSo the answer is now stronger than before: the tests are no longer just logically grouped, they are structurally separated enough to move with `NEXUS`, `FnTools`, and `CheddarBooks` when we split repos.\n\nThe next strongest move is either:\n- rename the `Nexus.FnHCI*` project folders/assembly names to match `FnTools.FnHCI*`\n- or write the actual repo extraction plan for `FnTools` and `CheddarBooks` so we can split without guesswork"

