text = "It’s currently `CSS grid`, not flexbox.\n\nRight now the strip is rendered with:\n- `display: grid`\n- `grid-auto-flow: column`\n- `grid-auto-columns: minmax(360px, 380px)`\n- `overflow-x: auto`\n\nSo the intent is already “one continuous horizontal strip that scrolls sideways,” not a wrapping row set. Grid is actually the better fit here because it gives us a stable single-row lane of equal step columns.\n\nIf you want, after the current verify finishes I can harden that contract one more notch with something like:\n- `width: max-content`\n- keep `grid-auto-flow: column`\n- no responsive behavior that ever tries to stack steps vertically\n\nThat would make the non-wrapping intent even more explicit."

