text = "The clean rebuild is live in Penpot, and it’s a much better base.\n\nPreview:\n![LaundryLog PATH1 Row V2 Clean](/home/ivan/NEXUS/tmp/LaundryLog_PATH1_Row_V2_Clean.png)\n\nWhat’s now in the live `LaundryLog` file:\n- clean row components:\n  - `SliceRow.Screen.Clean.V1`\n  - `SliceRow.Command.Clean.V1`\n  - `SliceRow.Event.Clean.V1`\n  - `SliceRow.View.Clean.V1`\n  - `SliceRow.Ref.Clean.V1`\n- clean shell components:\n  - `CommandSlice.Clean.V1`\n  - `ViewSlice.Clean.V1`\n- clean projection row:\n  - `PATH1.Row.V2.Clean`\n- token sets:\n  - `EventModel.Foundation.V1`\n  - `EventModel.Viewport.Tablet.V1`\n  - `EventModel.Viewport.Desktop.V1`\n  - `EventModel.Viewport.Wide.V1`\n\nImportant live finding:\n- the rebuilt slice family behaves better than the recovered shell lineage.\n- the reusable ladder is now explicit:\n  - row component\n  - shell component\n  - path-row instance\n\nOne Penpot quirk also became clear:\n- top-level creation and top-level reparenting follow the active page.\n- because of that, the clean component main instances still live on `PATHS`, and I created visible catalog instances on `Components` so the page split is still usable.\n- that behavior is now documented as an operational rule rather than left as a mystery.\n\nDurable repo memory is updated and committed:\n\nNEXUS:\n- [penpot-surface-comparison.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-surface-comparison.md)\n- commit: `f728f709`\n\nCheddarBooks:\n- [penpot-slice-components.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-slice-components.md)\n- [penpot-projection.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-projection.md)\n- [penpot-board-seed.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-board-seed.md)\n- [README.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/README.md)\n- commit: `b341c86`\n\nOn posting upstream: yes, I think there are two things worth sharing now.\n- First, the active-page / cross-page top-level creation behavior in the plugin path. That is concrete, reproducible, and likely useful to others.\n- Second, the token-theme behavior only if we can reproduce it one more time cleanly. My first pass hit missing `activeSets` behavior on just-created themes, so I fell back to direct set activation.\n\nI would not post the old stale slice-shell export issue yet. We now know it’s narrower and tied to a recovered component lineage, but we still do not have a clean minimal repro. That one is better to reduce first.\n\nNo code tests were run here because this was live Penpot work plus docs-only commits."

