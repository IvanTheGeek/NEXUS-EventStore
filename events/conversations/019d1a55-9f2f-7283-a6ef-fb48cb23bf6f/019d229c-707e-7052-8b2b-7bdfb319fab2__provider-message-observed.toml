text = "The next feature slice is in and pushed as `5e5ed1e0`.\n\nI added the first real graph rebuild pass in [GraphAssertions.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/GraphAssertions.fs). It derives a thin graph layer from canonical history and writes rebuildable fact files under `graph/assertions/`. The first pass currently emits node-kind facts plus core relationships and small attributes like message role, conversation title, file name, media type, and reference disposition. The new CLI command is wired in [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs), and the human guide is here: [rebuild-graph-assertions.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/rebuild-graph-assertions.md).\n\nI also added regression coverage in [GraphAssertionTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/GraphAssertionTests.fs). That test proves the rebuild writes assertions, stays deterministic across repeat runs, and produces expected message-to-conversation, message-to-artifact, role, and domain-slug facts from a real canonical import fixture. Validation is green:\n- `dotnet build /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/NEXUS-Code.slnx`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj`\n- `14` tests passed, `0` failed\n\nThe branch is clean and synced to `origin/codex/nexus-ingestion-foundation`. The new command is:\n\n```bash\ndotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- rebuild-graph-assertions\n```"

