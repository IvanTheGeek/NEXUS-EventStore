text = "PLEASE IMPLEMENT THIS PLAN:\n# Shorten NM Columns By Trimming Trailing Empty Rows\n\n## Summary\nKeep the shared NM row system, but stop forcing every outer NM column to render all bottom-empty rows. A column should end after its last meaningful row, with a natural bottom edge and normal padding.\n\nThis preserves semantic row alignment where content exists, while removing the big blank tail from shorter slices.\n\n## Key Changes\n- Keep the current shared slot model:\n  - `header`\n  - `screen`\n  - `primary`\n  - `secondary`\n  - `gwt`\n- Keep shared row-height synchronization by slot kind across visible columns.\n- Change NM column rendering so only trailing empty slots are omitted.\n  - If a column’s last real content is `primary`, do not render `secondary` or `gwt`.\n  - If a column has `gwt`, any empty `secondary` slot above it must still render as a spacer so `gwt` stays aligned.\n- Keep the outer NM container height automatic.\n  - Do not force all columns to the same total height.\n  - Let shorter columns end naturally after their last rendered slot plus normal bottom padding.\n- Apply this only to the NM path surface.\n  - Leave the legacy screen-path artifact unchanged.\n\n## Implementation Changes\n- In the NM renderer, compute the last occupied slot per column.\n- Render only slots up to that last occupied slot.\n- Keep empty spacer slots only when a lower occupied slot still exists.\n- Keep the current row-height sync script, but measure only rendered slots.\n- Do not add decorative footer caps or fades.\n  - Use the natural column ending you selected.\n\n## Test Plan\n- Expecto:\n  - NM HTML still emits the shared slot structure and slot-height variables.\n  - Columns with only `screen + primary` no longer emit trailing empty `secondary` and `gwt` slots.\n  - Columns with `gwt` but no `secondary` still emit the empty `secondary` spacer.\n  - Legacy screen-path artifact remains unchanged.\n- Playwright:\n  - Mixed columns still align by shared row type where rows exist.\n  - `Need Location`, `Ready To Set Location`, and similar shorter columns end earlier than AEM columns with lower rows.\n  - AEM `VIEW` columns with GWT keep the spacer row so the GWT band stays aligned.\n  - Existing nav, lens, and surface-mode behavior still passes.\n\n## Assumptions\n- The desired behavior is `trim trailing empties`, not collapsing interior empty rows.\n- The visual ending should be natural, with no extra footer treatment.\n- Shared row semantics matter more than maximizing shortening."

