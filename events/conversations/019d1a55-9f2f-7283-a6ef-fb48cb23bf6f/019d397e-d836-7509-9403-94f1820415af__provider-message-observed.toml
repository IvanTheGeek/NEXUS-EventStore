text = "The “language” is the **slice-card visual grammar** from `f63e1af`: a calm narrow card, strong outer border, tinted header band, small system pill, small uppercase slice-type marker, clear title/subtitle, then semantic rows that read cleanly as `Screen`, `Command`, `Event`, or `View`, with a stronger title bar over a lighter structured-data panel. It feels more like a product surface than a raw diagram.\n\nI did recreate that direction in live Penpot. The first component-driven bases are now in the `LaundryLog` file on the `Event Model` page:\n\n- `CommandSlice.Base.V2`\n- `ViewSlice.Base.V2`\n\nAnd the first visible PATH 1 instances derived from them are:\n\n- `PATH1: CommandSlice - Set Location (V2 Instance)`\n- `PATH1: ViewSlice - Ready (V2 Instance)`\n\nPreview exports:\n- ![CommandSlice V2](/home/ivan/NEXUS/tmp/penpot-path1-command-v2.png)\n- ![ViewSlice V2](/home/ivan/NEXUS/tmp/penpot-path1-view-v2.png)\n\nI also followed your correction about components: the right Penpot pattern here is **duplicate the component base, evolve the duplicate, then instantiate it back into the board**. That is now recorded in:\n- [penpot-surface-comparison.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-surface-comparison.md)\n- [penpot-projection.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-projection.md)\n\nCommits:\n- NEXUS: `12c344af` `docs: record penpot slice component workflow`\n- CheddarBooks: `7c65e35` `docs: record penpot slice component pattern`\n\nOn the MCP vs API compare: MCP/plugin was clearly the better fit for this component-driven slice work. I did attempt a real backend `update-file` mutation, but the API is much lower-level and the first live patch failed on strict shape-schema/enum handling, so that boundary is now documented rather than hand-waved.\n\nThe next strong move is to build `EventSlice.Base.V2` and a fuller `ViewSlice` with visible entry rows, then make the remaining PATH 1 cards use the same component family."

