text = "That matches what I’d expect for this workload.\n\nIt suggests we’re in a mixed CPU + filesystem regime, not a clean “throw more cores at it” regime. The rebuild is doing a lot of parsing and a lot of small-file reads/writes, so seeing the 6 vCPU sit mostly in the `80%` to `90%` band is a sign that CPU helps, but storage behavior and coordination overhead are part of the ceiling too.\n\nThat’s useful signal for later architecture work:\n- more vCPU can still help\n- but the big wins will likely come from changing the materialization flow, not just scaling cores\n\nI’m keeping the rebuild running so we get the finished timed baseline."

