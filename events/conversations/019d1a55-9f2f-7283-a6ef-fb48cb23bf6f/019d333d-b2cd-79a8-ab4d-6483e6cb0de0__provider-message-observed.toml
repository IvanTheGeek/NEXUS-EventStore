text = "Recorded at the NEXUS level.\n\n`main` now includes this at `5babba7e`:\n- [glossary.md](/tmp/nexus-merge-M7SKP3/docs/glossary.md)\n- [0010-terminology-flow-slice-batch-scope.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0010-terminology-flow-slice-batch-scope.md)\n\nThe durable Event Modeling terms are now:\n- `CommandSlice`\n- `ViewSlice`\n- `View`\n\nAnd the repo now explicitly says:\n- `CommandSlice` = the intent-side slice\n- `ViewSlice` = the business/read-side slice\n- `View` = the dataset/structure behind a `ViewSlice`\n- `read model` and `ReadSlice` are only reference/search terms, not preferred NEXUS wording\n\nSo yes, those are now NEXUS-wide durable terms for the Event Modeling lens. This was docs-only, so I didn’t run tests."

