text = "PLEASE IMPLEMENT THIS PLAN:\n## Add Formal Browser Testing For LaundryLog Paths\n\n### Summary\nAdopt a two-track testing shape:\n\n- `Expecto` remains the primary test runner for F# logic, state, renderer, and deterministic artifact generation.\n- `JS/TS Playwright Test` becomes the formal browser harness for the tracked LaundryLog workspace artifacts.\n- `Playwright .NET + Expecto` is deferred as a later research spike, not a required parallel harness, until the JS/TS path is working and we have real patterns worth re-expressing in F#.\n\nThe first browser suite should prove the current screen-path behaviors that have already produced real bugs:\n- whole-column navigation\n- start/end alignment\n- lens toggles actually hide/show steps\n\n### Implementation Changes\n- Add an isolated browser-test workspace under the repo, separate from the existing F# test project.\n  Default shape:\n  - `tests/browser/package.json`\n  - `tests/browser/playwright.config.ts`\n  - `tests/browser/specs/path1-screen-path.spec.ts`\n- Treat the tracked workspace artifact as the review and test target:\n  - `/home/ivan/NEXUS/CheddarBooks/workspace/laundrylog/html/screen-paths/LaundryLog_PATH1_AppStarted_NeedLocation_FirstEntry.html`\n- Use a tiny local HTTP server as the formal test path for browser tests.\n  Default:\n  - serve the tracked `workspace/laundrylog/html/` tree during Playwright runs\n  - use that HTTP origin for the formal nav/lens suite\n- Keep one small `file://` smoke check as a secondary compatibility check, not the main harness.\n  Purpose:\n  - confirm the artifact still opens locally as a file\n  - do not rely on `file://` for the main update-monitor or interaction suite\n- Add stable browser-facing hooks where needed if the current DOM is too presentation-driven for reliable selectors.\n  Prefer:\n  - `data-testid`\n  - stable IDs already present\n  - explicit step/lens keys\n- Do not add `xUnit` now.\n  The `.NET + Expecto` path stays deferred until the JS/TS harness is working and useful.\n\n### First Browser Suite\nCreate the first `JS/TS Playwright Test` suite around `PATH1` only.\n\nRequired scenarios:\n- `next` moves exactly one logical column, not a partial pixel drift.\n- `previous` returns one logical column.\n- `go to start` lands on the first logical column.\n- `go to end` lands on the last logical column.\n- top rail position stays synchronized with viewport position at start, intermediate, and end.\n- lens toggle: `Lifecycle` hides non-lifecycle steps.\n- lens toggle: `Runtime` hides non-runtime steps.\n- lens toggle: `Screen Path` hides non-screen-path steps.\n- combined lens states persist and visibly affect step count/layout as intended.\n\nSecondary `file://` smoke scenario:\n- open the tracked screen-path artifact directly from disk\n- verify the page loads and the basic nav controls exist\n- no deeper behavioral guarantees required in this smoke check\n\n### Test Strategy And Boundaries\n- `Expecto` continues to cover:\n  - path/state construction\n  - renderer output invariants\n  - update-sidecar generation\n  - deterministic HTML structure where browser behavior is not required\n- `Playwright Test` covers:\n  - browser scrolling\n  - sticky controls\n  - localStorage-driven toggles\n  - visibility changes after interaction\n  - DOM behavior under real browser layout\n- Defer update-monitor automation to the second Playwright phase.\n  Reason:\n  - nav + lens behavior is already enough to validate the harness and remove current uncertainty\n- Defer `Playwright .NET + Expecto` to a later research spike.\n  Initial spike, when revisited:\n  - one nav scenario\n  - one lens-toggle scenario\n  - goal is F#-idiomatic feasibility, not runner-feature parity with Playwright Test\n\n### Assumptions And Defaults\n- Human decision stands: best-fit tooling is preferred; F# remains the default, but Playwright is the better tool for browser behavior.\n- The formal browser harness is `JS/TS Playwright Test + Expecto`.\n- The repo should not introduce `xUnit` at this stage.\n- HTTP is the primary test transport; `file://` is only a secondary smoke path.\n- The tracked `workspace/` artifacts remain the authoritative browser review/test surface; `tmp/` stays scratch."

