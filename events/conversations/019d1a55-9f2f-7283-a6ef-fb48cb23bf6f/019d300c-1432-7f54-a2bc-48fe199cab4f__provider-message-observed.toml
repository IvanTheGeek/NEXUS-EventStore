[[body.segments]]
kind = "plain_text"
text = "That’s an important constraint, and it changes the model in a good way.\n\nIt means the provider export is not the full truth of provider state. It is one acquisition source. So for NEXUS, we should model:\n\n- what the export explicitly contained\n- what the export referenced but did not include\n- what we later captured from another acquisition path\n\nThat suggests a clean rule for the canonical layer:\n\n- A message can reference an artifact even if the payload is missing.\n- The missing payload should not block import.\n- Later, if we fetch that artifact separately, we append a new capture event rather than pretending it was always in the export.\n\nSo instead of treating artifacts as “present or absent,” we treat them as a lifecycle:\n\n- `ArtifactReferenced`\n- `ArtifactPayloadCaptured`\n- `ArtifactRevisionObserved` if needed\n- all linked back to provider IDs, message IDs, and acquisition source\n\nThat keeps provenance honest and fits your broader direction well, because it lets NEXUS absorb partial inputs now and become more complete over time without rewriting history.\n\nI’d add these to the planning list:\n\n1. Exports are partial provider snapshots, not guaranteed-complete provider truth.\n2. Canonical import must tolerate referenced-but-missing artifacts.\n3. Later artifact hydration/capture should append new facts, not mutate prior ones.\n4. Acquisition source needs to be explicit: export, manual capture, API capture, browser/session capture, etc.\n\nMy recommendation is that v1 should already support this conceptually, even if we do not implement the later artifact-fetch path yet. In practice that means:\n- import conversations/messages now\n- record artifact references when present\n- mark whether payload was included or missing\n- defer actual out-of-export artifact retrieval to a later phase\n\nOne useful question to pin down next: when we later add missing-artifact capture, do you picture that coming primarily from provider APIs/browser automation, or from you manually dropping recovered files into the object store for reconciliation first?"

