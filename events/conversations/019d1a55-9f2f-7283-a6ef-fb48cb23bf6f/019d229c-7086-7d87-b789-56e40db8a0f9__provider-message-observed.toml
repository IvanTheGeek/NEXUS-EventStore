text = "Added and pushed as `7885ad96`.\n\nThere is now an explicit `--output-root <path>` option for both:\n\n- `export-graphviz-dot`\n- `render-graphviz-dot`\n\nRules are explicit:\n- use `--output <path>` for a full file path\n- or use `--output-root <path>` for a directory root with the NEXUS-generated file name\n- not both\n\nExamples:\n\n```bash\ndotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- \\\n  export-graphviz-dot \\\n  --provider claude \\\n  --output-root /tmp/nexus-graph-exports\n```\n\n```bash\ndotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- \\\n  render-graphviz-dot \\\n  --input /tmp/nexus-graph-exports/nexus-graph__provider-claude.dot \\\n  --output-root /tmp/nexus-rendered\n```\n\nUpdated files:\n- [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs)\n- [GraphvizDot.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/GraphvizDot.fs)\n- [GraphvizRendering.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/GraphvizRendering.fs)\n- [export-graphviz-dot.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/export-graphviz-dot.md)\n- [render-graphviz-dot.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/render-graphviz-dot.md)\n\nValidation:\n- `dotnet build /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/NEXUS-Code.slnx`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj`\n- `36` tests passed\n\nThe only remaining local changes are still the intentionally untracked real-data event-store outputs under [NEXUS-EventStore/events](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/events), [NEXUS-EventStore/imports](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/imports), and [NEXUS-EventStore/graph](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph)."

