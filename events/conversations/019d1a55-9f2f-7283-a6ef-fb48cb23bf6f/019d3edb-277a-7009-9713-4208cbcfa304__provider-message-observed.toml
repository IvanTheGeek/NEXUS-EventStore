text = "Yes, I think thatâ€™s the healthier move.\n\n`STATE` as one universal visible box label is probably too blunt, because as you said it starts collapsing into what the AEM `VIEW` really is.\n\nSo the better rule is:\n\n- keep the **roles** stable\n- allow the **terms** to vary by context\n\nIn other words, what stays universal is not the word, but the job.\n\nI think the stable jobs are something like:\n\n- a **change-side** slice/box\n  - something is being initiated, progressed, or made to happen\n- a **state/view-side** slice/box\n  - something about the current resulting/visible state is being shown\n\nThat maps well to what youâ€™re saying:\n- two slice types:\n  - state change\n  - state view\n\nAEM already expresses that strongly:\n- `CommandSlice` lives on the change side\n- `ViewSlice` lives on the state/view side\n- `Event` sits in the change/result chain between them\n\nSo for NM, I would not force every context to literally use the word `STATE`.\n\nI would instead generalize the pattern like this:\n\n- **universal underlying roles**\n  - `change-side`\n  - `state/view-side`\n\n- **context-native visible labels**\n  - Event Modeling:\n    - `COMMAND`\n    - `EVENT`\n    - `VIEW`\n  - lifecycle/runtime:\n    - maybe `TRIGGER`, `TRANSITION`, `CHECKPOINT`, `ROUTE`, `CURRENT`\n  - screen/path:\n    - maybe `SCREEN`, `INPUT`, `DRAFT`, `VISIBLE`\n\nSo yes, different terms are fine.\nWhat matters is that they are all occupying one of the same deeper roles.\n\nThat lets us keep the broader design coherent without flattening every context into one vocabulary word that doesnâ€™t quite fit.\n\nThe key distinction Iâ€™d make is:\n\n- **doctrine/internal model**\n  - stable roles\n- **visible UI terms**\n  - context-native labels\n\nThat feels much more NEXUS-like too: preserve the deeper structure, but donâ€™t force one lensâ€™s language onto every other context.\n\nThe next important design choice is whether those universal roles should be visible in the page at all, or stay underneath the design logic while the page only shows the context-native labels."

