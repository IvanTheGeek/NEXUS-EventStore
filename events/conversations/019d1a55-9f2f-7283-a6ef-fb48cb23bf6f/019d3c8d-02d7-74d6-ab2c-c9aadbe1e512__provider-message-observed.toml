kind = "plain_text"
text = "I found the actual root cause: not a scrolling bug at all, but a JavaScript initialization bug. The page was calling `window.requestAnimationFrame(syncWidth)` before `syncWidth` had been initialized, which threw at load time and prevented the nav listeners from ever being attached. That’s why the initial lens visibility could still look right while all the nav buttons were dead. I’m patching that now and rerunning the full stack."

