text = "Yes, that makes sense, and I think it reveals a limitation of Eventlanes’ current rendering model.\n\nWhat I’m inferring from the board behavior:\n- `usr:` is being rendered as a normal node\n- not as a true swimlane header / role lane\n- so if we keep using explicit user nodes, the overview stays noisy in exactly the way you dislike\n\nSo I made a cleaner projection that treats the actor as **implicit context**, not a visible node:\n\n- [LaundryLog_path1_eventlanes_laneoriented.txt](/home/ivan/NEXUS/tmp/LaundryLog_path1_eventlanes_laneoriented.txt)\n\nThis version does:\n- `CommandSlice = UI -> Command -> Event`\n- `ViewSlice = Event -> View -> UI`\n\nAnd it carries the actor context in the slice name:\n- `CommandSlice - User Sets Location`\n- `CommandSlice - User Logs Washer`\n- `CommandSlice - User Logs Dryer`\n\nThat is not philosophically perfect, but it is probably closer to the board you want **inside this tool**.\n\nSo the rule I’d use for Eventlanes for now is:\n\n- canonical actor/role idea stays in our actual modeling language\n- Eventlanes overview projection omits visible actor nodes unless the tool can truly render them as lanes\n\nTry this file next:\n- [LaundryLog_path1_eventlanes_laneoriented.txt](/home/ivan/NEXUS/tmp/LaundryLog_path1_eventlanes_laneoriented.txt)\n\nIf that still doesn’t feel right, the next thing to do is stop trying to make Eventlanes be the SoT and instead treat it as:\n- one derived view for quick executive/path visualization\n\nThen we can shape our own Penpot/FnUI/Event Modeling surface around the real semantics."

