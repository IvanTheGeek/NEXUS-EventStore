text = "Exploration result: the cleanest seam is still `LibraryComponent.instance()`, but it does not fix the render problem by itself.\n\nWhat I proved:\n- `PATH1.Row.V6.InstanceBased` on `PATHS` is built only from real `CommandSlice.Clean.V3` and `ViewSlice.Clean.V3` library instances.\n- The stored text overrides on those instances are correct in live shape data.\n- Penpot still renders the master/default text on both the live canvas and export.\n- I also tested two likely workarounds and neither fixed it:\n  - detach the instance before editing text\n  - force a text reflow by resizing text nodes after the write\n\nScratch lab boards now on `PATHS`:\n- `PATH1.Row.V6.InstanceBased`\n- `InstanceOverrideWorkaroundLab.V1`\n- `InstanceOverrideWorkaroundLab.V2`\n\nSo the current best temporary working pattern is a hybrid:\n- keep `CommandSlice.Clean.V3` and `ViewSlice.Clean.V3` as the real reusable bases on `Components`\n- use asset instances for structure/layout\n- do not rely on plugin-driven text overrides yet\n- for readable automated path projections, keep using the visible older lineage when needed\n- for real design work, manual Penpot-side text editing is still the most plausible temporary path until upstream fixes the override rendering bug\n\nI recorded the new findings here:\n- [penpot-surface-comparison.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-surface-comparison.md)\n- [penpot-projection.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-projection.md)\n\nLatest commits:\n- NEXUS: `9f3ec41c`\n- CheddarBooks: `0ad7a26`\n\nNo code tests were run; this was live Penpot investigation plus docs."

