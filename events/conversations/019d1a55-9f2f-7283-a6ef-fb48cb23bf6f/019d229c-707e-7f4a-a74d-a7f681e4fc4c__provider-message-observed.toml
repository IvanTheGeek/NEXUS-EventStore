[[body.segments]]
kind = "plain_text"
text = "I’d keep `Nexus.Kernel` small and parallel for now.\n\nI would not migrate the existing shared IDs or ingestion types into it yet.\n\nWhy:\n- `Nexus.Domain` is still the ingestion/canonical-history center of gravity.\n- `Imprint`, `Event`, `Fact`, `Projection`, and `Role` are still actively settling semantically.\n- If we move too much too early, we risk turning the kernel into a second `Domain` project with fuzzier boundaries.\n\nMy recommendation is:\n\n1. Keep `Nexus.Kernel` as the ontology seed.\n2. Only put cross-project semantic primitives there.\n3. Do not move provider/import/event-store concerns there.\n4. Do not move `DomainId`, `BoundedContextId`, or `LensId` yet unless we decide they truly belong to every NEXUS project, not just this repo’s current graph layer.\n\nA good rule for migration is:\n- move something into `Nexus.Kernel` only when it is stable across at least two bounded contexts and clearly not ingestion-specific.\n\nSo right now, I’d keep in `Nexus.Kernel`:\n- `RoleId`\n- `RelationKindId`\n- `imprint`\n- a few core semantic relations\n\nI’d keep in `Nexus.Domain` for now:\n- canonical event IDs\n- import/provenance types\n- graph assertion types\n- `DomainId`, `BoundedContextId`, `LensId`\n\nThe next step I’d suggest is not a migration. It’s a bridge:\n- add a small semantic annotation concept so graph assertions or nodes can carry `RoleId` without changing structure\n\nThat would let us start using `imprint` in the actual model without overcommitting the whole ontology.\n\nSo the short answer is: grow `Nexus.Kernel` slowly, and make it earn its role as the base of all NEXUS projects rather than declaring it too early."

