kind = "plain_text"
text = "Then I’d lock that in as the naming direction:\n\n- canonical ingestion layer uses `Observed` language\n- later behavioral/domain layers can use richer terms like `Submitted`, `Received`, `Decided`, `Linked`, and so on\n\nSo the first canonical event family becomes:\n\n- `ProviderArtifactReceived`\n- `RawSnapshotExtracted`\n- `ProviderConversationObserved`\n- `ProviderMessageObserved`\n- `ProviderMessageRevisionObserved`\n- `ArtifactReferenced`\n- `ArtifactPayloadCaptured`\n- `ImportCompleted`\n\nThe next draft I should produce is the `v0` module and type map for those events and the supporting ID/provenance types, keeping it compact and F#-friendly. After that, if it still feels right, we can turn that into the first scaffold inside [NEXUS-Code](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code)."

