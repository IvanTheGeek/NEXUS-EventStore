text = "as another thought, being able to compare what is available as a public non-logged in user vs what i see as my registered and logged in user vs api vs admin of both etc would give is signals on what could be auto ingested for the public/shareable dataset, vs what might need human approval being what is in my logged in user data sets vs public, and same for the admin side. I plan to do this sort of thing for the Opewrt wiki and forum, and the penpot discourse forum, etc. Pulling in github issues, wikis, discussions, PRs, and whatever else is there is also on the list for future ingestion and then processing and refinement and gleening value. This also brings another dimention into this. Permission and licensing will be explicit boundries and concerns. Meaning, CC-BY-SA vs AGPL vs data usage policies of the various sites and orgaiztions will need to be adheared too. Discord has a developer contract for their API access and bots. Marc has given me API access to the onemarcfify api at discord, and I need to ensure that I respect the discord rules in using that api. all very important concerns here."

