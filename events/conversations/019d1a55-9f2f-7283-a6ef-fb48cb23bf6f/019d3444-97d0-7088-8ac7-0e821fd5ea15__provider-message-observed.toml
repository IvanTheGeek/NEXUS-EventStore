text = "Yes. The best place to post this is **not a new issue**.\n\nBest target:\n- comment on [penpot/penpot issue #8691](https://github.com/penpot/penpot/issues/8691)\n\nWhy:\n- it is already the exact issue:\n  `Plugin API: document createComponent() board-on-root requirement and cross-page reparenting limitation`\n- your new finding is a stronger, more concrete version of the same problem\n- adding evidence there is better than fragmenting it into another report\n\nGood secondary place, if you want broader plugin-dev visibility:\n- [What’s working and what’s missing in Penpot plugins?](https://community.penpot.app/t/what-s-working-and-what-s-missing-in-penpot-plugins/9785)\n\nWhy:\n- Penpot explicitly asked for plugin feedback there\n- one developer in that thread also said bug-reporting for plugin work is unclear\n\nSources:\n- [Penpot help center](https://help.penpot.app/)\n- [penpot/penpot issues](https://github.com/penpot/penpot/issues)\n- [issue #8691](https://github.com/penpot/penpot/issues/8691)\n- [plugin feedback thread](https://community.penpot.app/t/what-s-working-and-what-s-missing-in-penpot-plugins/9785)\n\nCopy/paste this into a comment on [issue #8691](https://github.com/penpot/penpot/issues/8691):\n\n```md\nI can confirm this is still a real limitation in live Plugin API work, and I hit a slightly stronger version of it while building reusable Event Modeling slice components in a local Penpot 2.14 self-hosted setup through the MCP/plugin path.\n\nWhat I observed:\n- top-level board creation and top-level reparenting followed the active page\n- if I expected a top-level board to land on or move to another page without first making that page active, it did not land where a normal tree-mutation mental model would suggest\n- in practice, I had to explicitly target the active page first, then create or reorganize top-level boards, then verify where they actually landed\n\nConcrete example:\n- I created a clean reusable component family for Event Modeling slices:\n  - row components\n  - shell components\n  - path-row instances\n- I wanted the reusable catalog surfaces on a `Components` page and the working path projection on a `PATHS` page\n- because of the active-page behavior, the component main-instance lineage stayed on the active page I was working in\n- the practical workaround was to keep catalog instances on the `Components` page while the underlying main-instance lineage remained on the active working page\n\nSo the current practical rule for automation is:\n1. switch to the target page first\n2. then create or reorganize top-level boards\n3. then verify where the shapes actually landed\n\nThis feels important to document explicitly because it is not the behavior many plugin authors or agent workflows will assume from `appendChild()` / reparenting semantics alone.\n\nIf useful, I can reduce this into a smaller reproduction script, but I wanted to confirm that the page-targeting limitation is still reproducible in current plugin-driven work.\n```\n\nIf you also want a short forum version for the community thread, use this:\n\n```md\nI hit a real Plugin API limitation that might be worth documenting more clearly.\n\nIn live plugin/MCP work, top-level board creation and top-level reparenting followed the active page. So for automation, I had to:\n1. switch to the target page first\n2. then create or reorganize top-level boards\n3. then verify where they actually landed\n\nThis came up while building reusable Event Modeling slice components across `Components` and `PATHS` pages. The closest GitHub issue I found is:\nhttps://github.com/penpot/penpot/issues/8691\n\nI added more concrete reproduction context there.\n```\n\nMy recommendation:\n- post the GitHub comment first\n- then optionally post the shorter forum note pointing to the GitHub issue"

