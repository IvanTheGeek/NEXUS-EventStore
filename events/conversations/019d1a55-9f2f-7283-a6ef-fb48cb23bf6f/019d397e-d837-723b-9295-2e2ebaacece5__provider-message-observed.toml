[[body.segments]]
kind = "plain_text"
text = "A `detached-instance` is for when you want to stop treating a thing as a live reusable component instance and start treating it as an independent local object.\n\nSo in practice:\n\nUse a normal component instance when:\n- you want it to keep inheriting changes from the base component\n- the structure stays the same\n- the styling/token intent should stay linked\n- the differences are just expected state or content differences\n- you want variants like `default`, `hover`, `disabled`, `selected`, `error`\n\nThat is the better fit for things like:\n- buttons\n- form fields\n- cards with well-defined states\n- reusable screen sections\n\nUse a detached instance when:\n- you need to break inheritance on purpose\n- you need to restructure or remove children\n- you need to insert bespoke local shapes/text that are not part of the component contract\n- you are turning the instance into a one-off projection or artifact\n- you want a frozen local copy that should no longer drift when the base component changes\n\nThat is why I used detaching in the current `PATHS` row experiment:\n- those slice cards are currently acting more like generated/spec-projection artifacts\n- not yet like clean reusable product UI components\n- and Penpot’s current text behavior is not reliable enough yet for me to trust instance-level edits there\n\nSo your instinct is right:\n- for real UI component/state work, we should avoid detaching whenever possible\n- for button states specifically, detaching is usually the wrong move\n- variants or some other explicit state model are the right direction there\n\nThe practical ladder I’d use is:\n\n1. component instance\n2. variant/stateful component\n3. detached instance\n4. fully local one-off shapes\n\nAnd we should stay as high on that ladder as we can.\n\nSo the current overlay-on-detached-shell approach is a workaround for this Penpot investigation, not the long-term desired pattern for normal app UI composition.\n\nIf you want, I can continue the lab with exactly that distinction in mind:\n- test normal instance text change\n- test detached text change\n- test whether variants/components should be the real seam for reusable state\n- and record when detaching is appropriate versus a smell"

