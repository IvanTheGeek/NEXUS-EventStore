text = "Okay, so let me be very descriptive here and try to convey what's going on.\n\nI'm using you because you can access files and do the commands that are needed.\n\n I've always had this vision.\n\nI've never had it this clear.\n\nFor the past six months, I've been working with Claude and then chatGPT on different aspects and different ideas for this whole thing that's a vision in my head.\n\nAnd that is what I'm calling Nexus.\n\nThis is a overarching paradigm concept.\n\nSimply a name that I'm giving to the system that I want to use to create apps that I want and how I want to do them. \n\nAs part of that process is where I'm at now, I'm trying to utilize all of the chats and ideas that have come out in those chats to form a coherent starting base for the system as a whole, and the system being the idea of the system as well. For me, and this is not something I'm marketing, this is not something that I'm enterprising or whatever, this is for me for using it how I want to use the system. The thing is, when I get it figured out, it's going to be very powerful and it's going to be wanted to be understood by others and they can adapt, that's fine, they can take it, they can adapt it to however they want it and do whatever they want to with it, that's part of my philosophy. So this is specific to me, but can project out into others later on. What we're doing right now is the first step in being able to take the conversations in chat with the AIs, GPT and Claude or whatever else I may end up using, to be able to try and get a way to import it into a base system that is, I'm trying to use Nexus to build Nexus, but we don't have Nexus yet, so we're filling in pieces right now. So that's what this particular aspect of the app is.\n\nsaving the raw files: in thinking about this, this really becomes the file/object storage area I have been contemplating. So i think the files will be part of the NEXUS object store. The code and such will be part of the Git repo in the way code usually is. The storage of events/facts/nodes that represnt the enitiy type graph nodes is planned to be in a got repo that is acting as the event store. \n\nSo keeping the actual zip is desired as its the input that I get. Then, we can create the working, continuing dataset, then we start processing those data points, and start producing our own facts."

