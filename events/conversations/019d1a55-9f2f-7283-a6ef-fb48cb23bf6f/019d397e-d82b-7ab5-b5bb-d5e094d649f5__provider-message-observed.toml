text = "Fixed. The top rail now reaches its own far-right end when the path is at the last logical column.\n\nWhat was wrong:\n- the rail uses stable scrollbar gutters\n- so its true scroll range is based on `offsetWidth`, not `clientWidth`\n- the viewport was already landing correctly, but the rail width was still being sized a little short\n\nUpdated:\n- [ScreenPathHtmlRenderer.fs](/home/ivan/NEXUS/CheddarBooks/src/CheddarBooks.LaundryLog.UI/ScreenPathHtmlRenderer.fs)\n- [LaundryLogTests.fs](/home/ivan/NEXUS/CheddarBooks/tests/CheddarBooks.Tests/LaundryLogTests.fs)\n- [html-screen-path-renderer-proving-ground.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/html-screen-path-renderer-proving-ground.md)\n- [fsharp-usage-learning-and-guidance.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/fsharp-usage-learning-and-guidance.md)\n\nArtifact:\n- [LaundryLog_PATH1_AppStarted_NeedLocation_FirstEntry.html](/home/ivan/NEXUS/tmp/laundrylog-screen-paths/LaundryLog_PATH1_AppStarted_NeedLocation_FirstEntry.html)\n\nVerified in a real browser:\n- rail left: `398`\n- rail max: `398`\n- viewport left: `398`\n- viewport max: `398`\n\nPreview at end:\n![PATH1 at end](/home/ivan/NEXUS/tmp/laundrylog-screen-paths/LaundryLog_PATH1_at_end.png)\n\nCommits:\n- CheddarBooks: `b41bb81` `model: align screen path rail with logical range`\n- NEXUS: `66f2aa49` `docs: record rail gutter guidance for html paths`\n\nVerification:\n- `dotnet build /home/ivan/NEXUS/CheddarBooks/CheddarBooks.slnx`\n- `dotnet run --no-build --project /home/ivan/NEXUS/CheddarBooks/tests/CheddarBooks.Tests/CheddarBooks.Tests.fsproj`\n- `31` tests passed\n\nSo yes, we can get back to the path itself now. I agree the next good move is:\n- make the splash headerless\n- explicitly mark this path as `fresh first launch with no known local data`\n- model the startup checkpoints as visible state changes before the first usable screen\n- start adding viewer/lens controls for detail level instead of baking one fixed verbosity into the page"

