[[body.segments]]
kind = "plain_text"
text = "I think this is the right time to **plan it explicitly**, but not necessarily to fully implement it yet.\n\nYour concern is the right one: we absolutely want the ability for full traceability and verification later. That is important enough that it should be named and protected now.\n\nWhat makes me say “plan now, implement when needed” is:\n\n- the architecture already supports it\n- we have not yet hit a concrete workflow that demands a polished verification mode\n- there are still other foundational pieces forming\n- if we implement too much verification UX too early, we may guess wrong about how you’ll actually want to use it\n\nSo my recommendation is:\n\n- add a decision/note now that verification is a first-class future capability\n- define the intended verification chain clearly\n- defer the actual command/runtime mode until a real slice workflow needs it\n\nThe important thing to lock in now is the rule:\n\n- indexes may accelerate access\n- indexes may not replace authoritative verification\n- any important slice flow must be able to trace back through:\n  - working index\n  - working assertions\n  - canonical events\n  - raw source refs\n  - provider artifact when needed\n\nThat preserves the capability without forcing premature tooling.\n\nSo I’d suggest the next smallest move is a short doc note, maybe:\n- `docs/decisions/0007-traceable-verification-over-derived-indexes.md`\n\nThat would give future-us a durable rule without dragging us into building the whole verification UX today."

