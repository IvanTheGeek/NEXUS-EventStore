text = "**NEXUS Ingestion Architecture v0**\n\nThis first system is the acquisition and provenance foundation for NEXUS, not the final NEXUS graph itself. The near-term job is to preserve source truth, normalize it into an append-only canonical history, and keep enough structure that we can reparse and evolve the higher layers later.\n\n**Local Boundaries**\n\nUse one workspace for now, but keep three explicit system boundaries:\n\n- `NEXUS-Code/`\n  F# importer, provider adapters, serialization, CLI, tests, later GUI/tools.\n- `NEXUS-Objects/`\n  Immutable provider zips, extracted working snapshots, attachments, audio, manually added recovered artifacts.\n- `NEXUS-EventStore/`\n  Git-backed append-only canonical events, import manifests, projections, and later graph-derived views.\n\nThat gives us clean seams now and an easy future split into separate systems.\n\n**Core Rules**\n\n- Provider exports are acquisition inputs, not absolute truth.\n- The original provider zip is preserved unchanged.\n- Extracted working files are derived convenience data.\n- Canonical history is append-only.\n- Rolling-window absence never deletes prior facts.\n- Referenced-but-missing artifacts are valid unresolved references.\n- Later manual artifact capture appends new facts; it does not rewrite history.\n- Reparse from raw source is expected and designed for.\n\n**Minimum Stable Base Types**\n\nThese are the types worth stabilizing now because they are about identity, provenance, and append-only history rather than final ontology.\n\n- `ProviderKind`\n  `ChatGpt | Claude | Other`\n- `SourceAcquisitionKind`\n  `ExportZip | ManualArtifactAdd | ApiCapture | BrowserCapture`\n- `ImportId`\n- `CanonicalEventId`\n- `ConversationId`\n- `MessageId`\n- `ArtifactId`\n- `TurnId` as optional and weakly inferred for now\n- `ProviderRef`\n  provider + provider object kind + provider IDs\n- `RawObjectRef`\n  points into `NEXUS-Objects` for zip, extracted file, attachment, or manual artifact\n- `ContentHash`\n- `ObservedAt`\n- `OccurredAt`\n- `ImportedAt`\n\n**Canonical History Layer**\n\nThis is the stable base we should build first.\n\n- `ImportManifest`\n  one record per import run with counts, source artifact, window kind, and results\n- `CanonicalEventEnvelope`\n  stable metadata like IDs, timestamps, provenance, hashes, source refs\n- `CanonicalEventBody`\n  discriminated union for event meaning\n\nInitial event kinds should stay narrow:\n\n- `ProviderArtifactReceived`\n- `RawSnapshotExtracted`\n- `ConversationDiscovered`\n- `MessageObserved`\n- `MessageRevisionObserved`\n- `ArtifactReferenced`\n- `ArtifactPayloadCaptured`\n- `ImportCompleted`\n\nThis gives us trustworthy ingestion without overcommitting the NEXUS ontology.\n\n**Thin Graph Overlay**\n\nWe should define only a minimal graph-compatible layer now, separate from canonical ingestion history.\n\n- `NodeId`\n- `NodeKind`\n- `EdgeId`\n- `EdgeKind`\n- `FactId`\n- `FactProvenance`\n- `GraphAssertion`\n  subject, predicate/edge, object or value, provenance back to canonical event IDs\n\nImportant boundary:\n- canonical events record what was observed/imported\n- graph assertions express evolving interpretation over that history\n\nThat separation lets us improve graph theory later without corrupting the raw-to-canonical foundation.\n\n**What Belongs Where**\n\nCanonical history now:\n\n- conversations\n- messages\n- imports\n- revisions\n- artifact references\n- artifact payload capture\n- provenance links to raw objects\n\nDeferred to later ontology work:\n\n- full canonical treatment of Claude `projects`, `memories`, `users`\n- full canonical treatment of all attachments/audio/documents as rich domain entities\n- cross-provider identity resolution\n- domain layers like software development knowledge\n- automated artifact capture\n- full live API capture workflow\n- final NEXUS graph semantics\n\n**Recommended v1 Position**\n\nBuild the first version around:\n- preserving provider zips\n- extracting working raw snapshots\n- importing conversations and messages\n- recording artifact references, including unresolved ones\n- supporting later manual artifact hydration\n- keeping the graph layer intentionally thin and reparsable\n\nThe next sensible step is to turn this note into a concrete `v0` workspace structure plus the first F# type definitions for the canonical layer only."

