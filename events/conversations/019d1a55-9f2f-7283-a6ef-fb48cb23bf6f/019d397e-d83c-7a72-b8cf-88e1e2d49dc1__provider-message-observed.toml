text = "I’d split it into two posts.\n\n**Recommendation**\nUse a GitHub issue for the one hard, reproducible MCP failure, and use the Penpot community forum for the broader “why we tried this, what we learned, and why we paused it” story.\n\nWhy:\n- Penpot’s GitHub Discussions page explicitly says new topics should go to the community forum because the team no longer participates there: [GitHub Discussions](https://github.com/penpot/penpot/discussions)\n- Penpot’s main repo README points broad questions/experience-sharing to the community, and bugs to GitHub issues: [penpot/penpot README](https://github.com/penpot/penpot)\n- There is already an API/MCP-oriented community thread shape there: [API and MCP issues](https://community.penpot.app/t/api-and-mcp-issues/9962)\n\nSo I’d do:\n1. GitHub issue: focused MCP transport bug\n2. Forum post: broader retrospective, motivations, what worked, what failed, and why abandoned for now\n3. Forum post links the GitHub issue\n\n**What The Forum Post Should Include**\nI’d structure it like this:\n\n1. Why I wanted Penpot in this workflow\n2. What I was trying to do with Codex + Penpot MCP\n3. What actually worked\n4. What repeatedly failed or became too fragile\n5. What deeper issues surfaced\n6. Why I abandoned Penpot for now\n7. What I switched to instead\n8. Links to the specific GitHub issue and exact logs\n\n**Motivations To Include**\nThese are the strongest local references I found:\n\n- bootstrap the event model from the design surface and potentially make it machine-readable: [019d174f-2c90-79b5-beb8-99077a7d6fe0.toml](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/projections/conversations/019d174f-2c90-79b5-beb8-99077a7d6fe0.toml#L625)\n- use Penpot for the event model until equivalent functionality existed in the app: [019d174f-2c90-79b5-beb8-99077a7d6fe0.toml](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/projections/conversations/019d174f-2c90-79b5-beb8-99077a7d6fe0.toml#L1040)\n- connect graph/model work to Penpot through a defined interface/transpiler: [019d174f-2cce-7c36-a16b-4057b71a0212.toml](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/projections/conversations/019d174f-2cce-7c36-a16b-4057b71a0212.toml#L22)\n- export Penpot design to SVG/HTML and use it in the app pipeline: [019d174e-ea7b-71ca-91ea-5f3ad56b32fd.toml](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/projections/conversations/019d174e-ea7b-71ca-91ea-5f3ad56b32fd.toml#L148)\n- represent each state as a board built from reusable components: [019d174e-ea7b-71ca-91ea-5f3ad56b32fd.toml](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/projections/conversations/019d174e-ea7b-71ca-91ea-5f3ad56b32fd.toml#L159)\n- practical design/code motivations align with Penpot’s own positioning around SVG/CSS/HTML, inspect mode, APIs, components, and tokens: [penpot/penpot README](https://github.com/penpot/penpot)\n\n**Exact Codex Log References**\nThese are the best hard references for the Penpot team to inspect first:\n\n- MCP handshake failure with “Already connected to a transport”: [rollout-2026-03-28T02-27-32-019d3320-5d98-7771-9b93-48c49ffc8715.jsonl](/home/ivan/.codex/sessions/2026/03/28/rollout-2026-03-28T02-27-32-019d3320-5d98-7771-9b93-48c49ffc8715.jsonl#L27073)\n- same session showing Codex immediately fell back to backend API docs because MCP was blocked: [rollout-2026-03-28T02-27-32-019d3320-5d98-7771-9b93-48c49ffc8715.jsonl](/home/ivan/.codex/sessions/2026/03/28/rollout-2026-03-28T02-27-32-019d3320-5d98-7771-9b93-48c49ffc8715.jsonl#L27077)\n- same session showing backend API doc probing/export surface exploration: [rollout-2026-03-28T02-27-32-019d3320-5d98-7771-9b93-48c49ffc8715.jsonl](/home/ivan/.codex/sessions/2026/03/28/rollout-2026-03-28T02-27-32-019d3320-5d98-7771-9b93-48c49ffc8715.jsonl#L25356)\n\nThe transport failure is the strongest thing to turn into a GitHub issue because it is concrete and log-backed.\n\n**Deeper Issues Worth Mentioning In The Forum Post**\nThese are better framed as “observed workflow failures / lab findings” than as one giant GitHub bug:\n\n- intended MCP architecture vs real transport limitation in practice: [penpot-live-backend-and-export.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-live-backend-and-export.md#L100)\n- instance text overrides stored but not rendered on canvas/export: [penpot-surface-comparison.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-surface-comparison.md#L228)\n- same issue from the local LaundryLog note, framed as a render-sync / override-application bug: [penpot-projection.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-projection.md#L261)\n- top-level creation/reparenting followed the active page, which made automation brittle: [penpot-surface-comparison.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-surface-comparison.md#L411)\n- token application probe throwing a Penpot-side `check error`: [penpot-projection.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-projection.md#L400)\n- Penpot had become useful research but “not reliable enough to be the primary working engine”: [html-path-renderer-proving-ground.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/html-path-renderer-proving-ground.md#L1)\n\n**Short “Why I Abandoned It For Now” Paragraph**\nI’d say something like:\n\n> I didn’t abandon Penpot because the concept was wrong. I abandoned it for now because the workflow stopped being deterministic enough for the phase I’m in. The MCP transport was fragile, plugin/API behavior diverged, live rendering of reused instances was not trustworthy, and automation kept needing tool-specific workarounds. At that point Penpot was producing more integration friction than modeling leverage, so I moved the active work to deterministic F#/HTML/CSS renderers and kept Penpot only as design/projection evidence.\n\n**What I Would Not Do**\n- I would not put transport failure, render-sync problems, token issues, and page-targeting quirks into one GitHub issue.\n- I would not present every observed Penpot pain point as equally reproducible.\n- I would keep the GitHub issue narrow and the forum post broad.\n\n**Best Concrete Next Step**\nI can draft both of these next:\n1. a tight GitHub issue for the MCP transport error\n2. a fuller forum post with the motivations, the deeper findings, and the “abandoned for now” explanation\n\nSources used:\n- [penpot/penpot README](https://github.com/penpot/penpot)\n- [Penpot GitHub Discussions](https://github.com/penpot/penpot/discussions)\n- [API and MCP issues](https://community.penpot.app/t/api-and-mcp-issues/9962)"

