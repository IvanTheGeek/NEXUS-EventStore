text = "Put it in:\n\n[RawDataExports](/home/ivan/NEXUS/NEXUS-EMERGING/RawDataExports)\n\nThat’s the intake/drop folder we’ve been using for manual imports.\n\nSo the practical flow is:\n\n1. place the provider zip in [RawDataExports](/home/ivan/NEXUS/NEXUS-EMERGING/RawDataExports)\n2. run the importer, for example:\n```bash\ndotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- import-provider-export --provider chatgpt --zip /home/ivan/NEXUS/NEXUS-EMERGING/RawDataExports/<your-file>.zip --window full\n```\n3. the importer will archive it properly into `NEXUS-Objects/providers/...`\n\nSo `RawDataExports/` is just the human intake area, not the durable storage location. The durable preserved copy ends up under `NEXUS-Objects/`."

