text = "The next slice is in and pushed as `3c1c57a0`.\n\n`export-graphviz-dot` now supports exporting one node’s immediate neighborhood from a working import slice:\n\n```bash\ndotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- \\\n  export-graphviz-dot \\\n  --working-import-id <import-id> \\\n  --working-node-id <node-id>\n```\n\nWhat changed:\n- [GraphvizDot.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/GraphvizDot.fs)\n  - added working-node neighborhood export support\n  - default file naming now includes both import and node when scoped that way\n- [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs)\n  - added `--working-node-id`\n  - enforces that it only works with `--working-import-id`\n  - CLI output now distinguishes `graph working slice neighborhood`\n- [GraphvizDotTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/GraphvizDotTests.fs)\n  - added module and CLI tests for the new neighborhood export\n- [CliHelpTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/CliHelpTests.fs)\n  - added help coverage\n- docs updated in:\n  - [export-graphviz-dot.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/export-graphviz-dot.md)\n  - [cli-commands.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/cli-commands.md)\n\nWhat it gives you:\n- you can now go from:\n  - `find-working-graph-nodes`\n  - to `report-working-graph-neighborhood`\n  - to a focused Graphviz export of that exact local neighborhood\n\nValidation is green:\n- `dotnet build /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/NEXUS-Code.slnx`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj`\n- `54` tests passed\n\nThe only local-only changes still present are the intentionally untracked real-data outputs under [NEXUS-EventStore/events](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/events), [NEXUS-EventStore/imports](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/imports), and [NEXUS-EventStore/graph](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph)."

