text = "Yes. It’s documented now so later agents should default to the right path.\n\nRule recorded:\n- Playwright MCP browser sandbox blocks `file://`\n- use local HTTP for MCP browser work, like `http://127.0.0.1/...`\n- keep `file://` only for manual review or secondary smoke checks\n\nNEXUS-wide:\n- [agent-readme.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/agent-readme.md)\n- [fsharp-usage-learning-and-guidance.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/fsharp-usage-learning-and-guidance.md)\n- commit: `694e766c` `docs: record playwright mcp local http rule`\n\nCheddarBooks local/browser docs:\n- [agent-readme.md](/home/ivan/NEXUS/CheddarBooks/docs/agent-readme.md)\n- [html-screen-path-renderer-proving-ground.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/html-screen-path-renderer-proving-ground.md)\n- [tests/browser/README.md](/home/ivan/NEXUS/CheddarBooks/tests/browser/README.md)\n- commit: `b545da7` `docs: record playwright mcp http usage`\n\nAnd yes, I verified MCP access itself earlier in this session by loading the tracked path page over local HTTP through the Playwright MCP browser.\n\nNo tests were run for these last two commits because they were docs-only."

