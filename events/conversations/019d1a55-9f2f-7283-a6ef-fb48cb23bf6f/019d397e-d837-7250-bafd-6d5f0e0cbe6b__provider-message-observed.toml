text = "Yes. `Event Ref` was my mistake here. It does not belong in the default classic `ViewSlice`.\n\nI corrected three things in the live Penpot file:\n- removed `Event Ref` from the clean default `ViewSlice`\n- made the clean default `ViewSlice` classic: green `View` only\n- tightened the `PATH1.Row.V2.Clean` child placement and brought the row/title text forward so the row reads more cleanly in the editor\n\nUpdated preview:\n![PATH1 Row V2 Clean Classic View](/home/ivan/NEXUS/tmp/LaundryLog_PATH1_Row_V2_Clean_ClassicView.png)\n\nCurrent clean `ViewSlice` direction:\n![ViewSlice Clean Classic](/home/ivan/NEXUS/tmp/ViewSlice_Clean_V1_Catalog_Classic.png)\n\nWhat changed in Penpot:\n- `ViewSlice.Clean.V1`\n  - now defaults to classic Event Modeling reading\n  - `ViewRow` is the visible row\n  - `EventRefRow` is hidden\n  - `ScreenRow` is hidden by default\n- `PATH1.Row.V2.Clean`\n  - now uses that classic `ViewSlice`\n  - path title/note and child placement were reset with parent-relative positioning\n  - text was brought forward so the row is easier to read\n\nThat modeling rule is now durable in CheddarBooks too:\n- [penpot-projection.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-projection.md)\n- [penpot-slice-components.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-slice-components.md)\n- [penpot-board-seed.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-board-seed.md)\n\nCheddarBooks commits:\n- `b341c86` `docs: record clean penpot slice component conventions`\n- `728fd4c` `docs: correct classic viewslice penpot rules`\n\nNEXUS commit from the clean-slice rebuild findings:\n- `f728f709` `docs: record clean penpot slice rebuild findings`\n\nOn what to post upstream:\n- Yes, I think the active-page targeting / cross-page top-level reparenting behavior in the plugin path is worth reporting.\n- Maybe later, the token-theme creation behavior too, but only after one more clean repro.\n- Not yet, the old stale slice-shell export issue. We still need a smaller repro before that would be a good upstream report.\n\nNo code tests were run here because this was live Penpot work plus docs-only updates."

