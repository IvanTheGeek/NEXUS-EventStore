text = "in LaundryLog introduction, I want to include the motivation and origin of the app idea. That being that as I am a truck driver and do laundry on the road often, I want that cost and deduction for when I am looking at financial reports and most importantly, as a deduction for income taxes. So in order to \"prove\" the expense in case of an audit, the IRS will accept a journal/log of the expenses. You can do a search for the IRS sources and rules, but we can fill that later if you cant find them. The main idea is that receipts are not received by me, the costs are under $75 hence they will accept the log. By having the journal that includes the amount, where, when, and then also even later (in CheddarBooks when it exists) being able to match line items on a credit card statement to a LaundryLog entry when a card is used, it provides audit defense with the IRS."

