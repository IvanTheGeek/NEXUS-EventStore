text = "It was partly explicit before, but not strong enough or startup-visible enough. Now it is NEXUS-wide.\n\nI added the rule at the foundation level in:\n- [AGENTS.md](/home/ivan/NEXUS/NEXUS-EMERGING/AGENTS.md)\n- [agent-readme.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/agent-readme.md)\n- [cortex-repo-memory-protocol.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/cortex-repo-memory-protocol.md)\n\nAnd I aligned the local CheddarBooks wording in:\n- [AGENTS.md](/home/ivan/NEXUS/CheddarBooks/AGENTS.md)\n- [agent-readme.md](/home/ivan/NEXUS/CheddarBooks/docs/agent-readme.md)\n\nThe rule is now basically:\n- when code, renderer, command behavior, or visible behavior changes, add or update tests by default\n- if a relevant test is not added or updated, say why explicitly\n- for UI/HTML/CSS/screen work, inspect the actual local source and current artifact before changing behavior\n\nCommits:\n- NEXUS-EMERGING: `fdc91129` `docs: require tests for behavior changes`\n- CheddarBooks: `7cd327b` `docs: align local testing expectations`\n\nThis was docs-only, so I didn’t run tests for these rule changes."

