text = "I’ve got the hook cause pinned down more precisely now, and it’s better than my first guess. The failing path is the shared `NEXUS-Objects/providers/codex/latest/...` destination file, not the source file in `~/.codex`. Since all the repo hooks write into the same NEXUS object store, two checkpoint runs overlapping can race on that shared destination. That fits what we just did too: the NEXUS and CheddarBooks commits were launched in parallel. I’m checking the code now for the cleanest place to serialize that shared write path."

