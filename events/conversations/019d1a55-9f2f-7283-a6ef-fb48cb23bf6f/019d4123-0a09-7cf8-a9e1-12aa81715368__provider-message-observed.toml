kind = "plain_text"
text = "Yes. The corrected startup naming, in the right frame, is:\n\n1. `Step 01-launch-app`\n   `COMMAND` slice title: `LaunchApp`\n   produced event: `AppStarted`\n\n2. `Step 02-splash-visible`\n   `VIEW` slice title: `SplashVisible`\n   `VIEW GWT` consumes `AppStarted`\n\n3. `Step 03-run-startup-checks`\n   `COMMAND` slice title: `RunStartupChecks`\n   produced event: `StartupChecksStarted`\n\n4. `Step 04-startup-checks-in-progress`\n   `VIEW` slice title: `StartupChecksInProgress`\n   `VIEW GWT` consumes `StartupChecksStarted`\n\n5. `Step 05-inspect-local-session`\n   `COMMAND` slice title: `InspectLocalSession`\n   produced event: `NoLocalSessionDetected`\n\n6. `Step 06-no-local-session`\n   `VIEW` slice title: `NoLocalSession`\n   `VIEW GWT` consumes `NoLocalSessionDetected`\n\n7. `Step 07-resolve-initial-route`\n   `COMMAND` slice title: `ResolveInitialRoute`\n   produced event: `InitialRouteResolvedToNeedLocation`\n\n8. `Step 08-need-location`\n   `VIEW` slice title: `NeedLocation`\n   `VIEW GWT` consumes `InitialRouteResolvedToNeedLocation`\n\nSo for your earlier question: I still think `AppStarted` is better than `AppLaunched`, because `AppLaunched` blurs too much with the command/trigger side.\n\nI also updated the durable guidance so later AI stops presenting this as a fake `COMMAND -> EVENT -> VIEW` chain. CheddarBooks docs are committed in `e93863c`:\n- [CheddarBooks agent guidance](/home/ivan/NEXUS/CheddarBooks/docs/agent-readme.md)\n- [NM proving-ground note](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/html-nm-path-renderer-proving-ground.md)\n- [Command/View seam note](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/command-view-primitive-seam.md)\n- [Event Modeling views note](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/views.md)\n\nI also updated the broader NEXUS docs locally:\n- [NEXUS agent guidance](/home/ivan/NEXUS/NEXUS-EMERGING/docs/agent-readme.md)\n- [interaction concern lines, contexts, and lenses](/home/ivan/NEXUS/NEXUS-EMERGING/docs/interaction-concern-lines-contexts-and-lenses.md)\n\nI did not commit the NEXUS repo changes because that worktree already has a large unrelated in-flight diff, and I didn’t want to bundle those together. No tests were run for this step because it was docs-only."

