text = "UTF-8 without BOM is usually preferred because the BOM is not needed to identify UTF-8, and it can cause avoidable friction.\n\nMain reasons:\n- UTF-8 has no byte-order problem, so the BOM adds no real encoding value.\n- Some tools treat the BOM as real content at the start of the file.\n- It can break shebang lines, parsers, config readers, or strict text formats.\n- It creates noisy diffs and inconsistent file starts.\n- Cross-platform tooling tends to behave more predictably without it.\n\nA BOM can still help in a few older Windows/editor situations where encoding auto-detection is weak, but for repo files, source code, TOML, Markdown, JSON, shell scripts, and similar text artifacts, UTF-8 without BOM is usually the safest default.\n\nSo the short rule is:\n- UTF-8 without BOM for normal repo files\n- only use BOM when a specific consumer actually requires or strongly benefits from it"

