kind = "plain_text"
text = "Yes, I think this is the right direction.\n\n**Current State**\nRight now, in the actual implementation, `lens` is mostly matching `context` 1:1:\n- `ApplicationLifecycle` -> `Lifecycle`\n- `RuntimeOrchestration` -> `Runtime`\n- `ScreenPath` -> `Screen Path`\n\nThat’s how the current `PATH1` renderer is modeled in [ScreenPathHtmlRenderer.fs](/home/ivan/NEXUS/CheddarBooks/src/CheddarBooks.LaundryLog.UI/ScreenPathHtmlRenderer.fs), and the terminology split is described in [interaction-concern-lines-contexts-and-lenses.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/interaction-concern-lines-contexts-and-lenses.md).\n\nBut that is just the current simplification. I do **not** think `lens` and `context` should stay the same thing.\n\n**Recommended Split**\nUse these as separate axes:\n\n- `Domain`\n  Broad pressure area, usually implicit at page level.\n- `Bounded Context`\n  Semantic ownership and vocabulary.\n  Examples: `ApplicationLifecycle`, `RuntimeOrchestration`, `ScreenPath`, `EventModeling`, `InteractionComposition`.\n- `Lens`\n  What projection/view we are using.\n  Examples: `AEM`, `App Runtime`, `Screen Path`, later maybe `ADM`, `Accessibility`, `Diagnostics`.\n- `View Mode`\n  Density/verbosity.\n  Current examples: `Summary`, `Standard`, `Detailed`.\n- `Audience`\n  Who the diagram/page is for.\n  Examples: `business`, `developer`, `designer`, `ops`.\n- `Actor/Role`\n  Who in the modeled system the surface/action belongs to.\n  Examples: `user`, `system`, `background`, later maybe app-specific roles.\n\nSo:\n- `context` answers: “who owns the meaning?”\n- `lens` answers: “from what perspective are we viewing it?”\n- `audience` answers: “who is this explanation optimized for?”\n- `role` answers: “who in the system/app is involved?”\n\n**How That Helps Here**\nThat means the same horizontal path can eventually show multiple rows:\n\n- `Screen Path` row\n- `Runtime` row\n- `AEM` row\n- later `ADM` row\n- maybe `Accessibility` or `Diagnostics` row\n\nAll of those can share the same columns/time order.\n\nThat fits the direction already hinted at in [html-screen-path-renderer-proving-ground.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/html-screen-path-renderer-proving-ground.md): one continuous horizontal path, with rows turning on and off by lens.\n\n**Color / Visual Grammar**\nI’d recommend:\n\n- `Context` = background tint family\n  - all `RuntimeOrchestration` cells share one tint\n  - all `ApplicationLifecycle` another\n  - all `ScreenPath` another\n  - `EventModeling` keeps the existing command/event/view colors inside its row\n- `Lens` = row visibility toggle in the header\n- `Surface kind` = EM-style border/badge treatment\n  - `SCREEN`\n  - `COMMAND`\n  - `EVENT`\n  - `VIEW`\n  - runtime/app-state surfaces can get their own family too\n- `Audience` = optional page-level toggle\n- `Actor/Role` = per-surface badge when relevant\n\n**Do We Need Audience?**\nYes, probably, but not as the first thing.\n\nI’d treat `audience` as a later page-level filter that changes:\n- which annotations show\n- how much technical detail shows\n- maybe which rows are on by default\n\nExample:\n- `business` audience might default to `AEM + Screen Path`\n- `developer` audience might default to `Runtime + Screen Path + AEM`\n- `ops` audience might emphasize runtime/diagnostics\n\n**Do We Need User Role?**\nAlso yes, but separate from `audience`.\n\nImportant distinction:\n- `audience` is the viewer of the model\n- `role` is the participant in the modeled system\n\nExample:\n- audience = `developer`\n- role in the path step = `user` or `system`\n\nSo I would not merge those.\n\n**My Recommendation**\nFor the next formal shape:\n\n1. Keep `context` and `lens` separate in doctrine.\n2. Treat the current 1:1 mapping as temporary.\n3. Add `AEM` as another lens over the same path columns.\n4. Use `context` tinting as the main cross-row color system.\n5. Add `audience` later as a page-level filter.\n6. Add `actor/role` only where the step/surface actually needs it.\n\nThe clean chain would be:\n\n- column order = path/time\n- row = lens\n- tint = bounded context\n- border/badge = surface/slice kind\n- footer/badge = actor/role or audience-specific annotation\n\nThis feels like the right next conceptual hardening. If you want, I can turn this into a durable NEXUS note plus a concrete proposed row/tint scheme for LaundryLog."

