text = "Yes, and the live watch gave us the answer.\n\nWhat I saw:\n- [penpot-mcp.log](/home/ivan/NEXUS/local-stacks/penpot-mcp/penpot-mcp.log) is where the real exception shows up.\n- The structured server log at [penpot-mcp-20260328-023720.log](/home/ivan/.npm/_npx/b3dde3ff6d9c30ca/node_modules/@penpot/mcp/packages/server/logs/penpot-mcp-20260328-023720.log) only showed normal startup plus the plugin websocket connection.\n\nWhat happened when Codex tried `penpot_proxy`:\n- Codex-side error: `handshaking with MCP server failed: connection closed: initialize response`\n- Server-side stderr immediately showed the same root bug again:\n  - `Already connected to a transport`\n\nI mapped the stack frames back to Penpot’s built server:\n- [/home/ivan/.npm/_npx/b3dde3ff6d9c30ca/node_modules/@penpot/mcp/packages/server/dist/index.js:14958](/home/ivan/.npm/_npx/b3dde3ff6d9c30ca/node_modules/@penpot/mcp/packages/server/dist/index.js#L14958) is the `/mcp` `connect(...)`\n- [/home/ivan/.npm/_npx/b3dde3ff6d9c30ca/node_modules/@penpot/mcp/packages/server/dist/index.js:14971](/home/ivan/.npm/_npx/b3dde3ff6d9c30ca/node_modules/@penpot/mcp/packages/server/dist/index.js#L14971) is the `/sse` `connect(...)`\n\nSo the important conclusion is:\n\n- option 3 is configured in [config.toml](/home/ivan/.codex/config.toml) as `penpot_proxy`\n- but it still does not work for us\n- the proxy path does not remove the underlying Penpot MCP server bug\n- the server is still reusing one `McpServer` across multiple transports\n\nOne useful extra finding:\n- the plugin websocket on `4402` is healthy and connected\n- the failure is specifically in the MCP transport layer, not the plugin UI bridge itself\n\nSo the next strongest move is no longer another config permutation. It’s to patch the installed Penpot MCP server locally so it stops sharing one `McpServer` across transport connections.\n\nNo repo files changed in this step. The only local config change still present is:\n- `penpot_proxy` in [config.toml](/home/ivan/.codex/config.toml)\n\nIf you want, I’ll patch the local Penpot MCP install next."

