[[body.segments]]
kind = "plain_text"
text = "Yes, and the investigation is now much sharper than “Penpot text is flaky.”\n\nWhat we proved:\n- plain fresh text works\n- component-derived inherited text is the unstable case\n\nConcrete lab result from the live `TextMutationLab.V1` on the `Event Model` page:\n- Case 1: component instance direct edit\n  live data changed, export still showed the original base title\n- Case 2: detached direct edit\n  live data changed, export still showed the original base title\n- Case 3: detached edit plus text-node rename\n  still exported the original base title\n- Case 4: detached shell plus overlay text\n  exported correctly\n- Plain text probe\n  exported correctly in both `png` and `svg`\n\nSo the current best reading is:\n- this is not a general text failure\n- it is a component-derived inherited-text export/render problem in this current Penpot path\n\nAnd your concern about tokens is exactly right:\n- the overlay workaround is acceptable for the current slice experiment\n- it is not the final pattern we want for real reusable component systems\n- on the current slice-title nodes, there were no token bindings, so the workaround only preserved resolved style, not a token contract\n\nThat means the current practical ladder still stands:\n1. component instance\n2. variant/stateful component\n3. detached instance\n4. overlay/local one-off text\n\nAnd we should stay as high on that ladder as possible.\n\nI recorded the findings here:\n- NEXUS: [penpot-surface-comparison.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-surface-comparison.md)\n  commit `9756451b`\n- CheddarBooks: [penpot-projection.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-projection.md)\n  commit `b18f59e`\n\nAlso, your inspect-tab instinct was useful:\n- Penpot does expose inspect-style surfaces through `generateStyle` / `generateMarkup`\n- that gives us another seam for comparing “what Penpot thinks the element is” versus what the export path renders\n\nThe next strongest experiment is:\n- build a tiny stateful component case, probably with a button or one small slice sub-part\n- compare:\n  - instance state change\n  - variant/state change\n  - detach\n  - overlay\n- and specifically test whether token bindings survive in each path\n\nThat would get us closer to the real `FnHCI` / component-system concern instead of only slice-card text."

