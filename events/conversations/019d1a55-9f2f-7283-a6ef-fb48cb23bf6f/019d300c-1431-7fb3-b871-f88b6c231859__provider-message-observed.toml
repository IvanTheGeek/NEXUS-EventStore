text = "Partially, yes.\n\nThey are already split well by concern at the file/module level:\n- [FnHCITests.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/Nexus.Tests/FnHCITests.fs)\n- [LaundryLogTests.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/Nexus.Tests/LaundryLogTests.fs)\n- [LogosTests.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/Nexus.Tests/LogosTests.fs)\n- [WorkflowTests.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/Nexus.Tests/WorkflowTests.fs)\n- and so on\n\nBut physically they are still one big test project:\n- [Nexus.Tests.fsproj](/tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj)\n\nSo the honest answer is:\n\n- logically split: yes\n- repo-ready split: mostly, but not fully yet\n\nWhat makes the later split easier:\n- tests are already grouped by concern/file\n- the runner in [Program.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/Nexus.Tests/Program.fs) already lists them explicitly\n- there is very little mystery about which tests belong to `FnTools`, `CheddarBooks`, or `NEXUS`\n\nWhat still needs doing before repo splits feel easy:\n- break the single `Nexus.Tests` project into multiple test projects\n- move shared helpers out of one central [TestHelpers.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/Nexus.Tests/TestHelpers.fs) or duplicate only the needed ones\n- trim project references so each repo’s tests only reference what that repo owns plus its dependencies\n\nRough future split would look like:\n- `NEXUS.Tests`\n  ingestion, LOGOS, EventStore, import, CLI, overlap, snapshots\n- `FnTools.Tests`\n  `FnHCI`, `FnUI`, Blazor host seam\n- `CheddarBooks.Tests`\n  LaundryLog and later PerDiemLog\n\nSo I’d call it “good shape for splitting, but not yet actually split.”\n\nThe next clean move, if you want, is for me to do that prep explicitly:\n- create separate test projects in-repo first\n- wire the existing test files into those projects\n- keep the top-level full-suite option while making repo extraction much easier later"

