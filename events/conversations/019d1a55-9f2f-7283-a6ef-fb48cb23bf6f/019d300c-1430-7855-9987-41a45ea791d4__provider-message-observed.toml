text = "The requirements doc is in and pushed on `fnui-foundation` as `1988cfe7`.\n\nMain doc:\n- [fnhci-ui-blazor-requirements.md](/tmp/nexus-merge-M7SKP3/docs/fnhci-ui-blazor-requirements.md)\n\nI also linked it from:\n- [fnui-foundation.md](/tmp/nexus-merge-M7SKP3/docs/fnui-foundation.md)\n- [fnhci-namespace-map.md](/tmp/nexus-merge-M7SKP3/docs/fnhci-namespace-map.md)\n- [README.md](/tmp/nexus-merge-M7SKP3/README.md)\n- [NEXUS-Code/README.md](/tmp/nexus-merge-M7SKP3/NEXUS-Code/README.md)\n- [repository-concern-lines.md](/tmp/nexus-merge-M7SKP3/docs/repository-concern-lines.md)\n\nIt now captures the key shape you described:\n- `FnHCI` stays the top namespace\n- `FnHCI.UI.Blazor` is the concrete Blazor runtime line\n- `FnUI` can remain the shorter package/marketing term\n- the system must support server-only, wasm-first, connected wasm, mixed web, and native-hosted shapes\n- official native-host lines are MAUI/WPF/WinForms Blazor Hybrid, while Photino/Electron stay future evaluation targets\n\nI grounded it in both the recorded chat history and current Microsoft docs:\n- [019d174f-2ce1-7496-a7f3-2e5cae80727e.toml](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/projections/conversations/019d174f-2ce1-7496-a7f3-2e5cae80727e.toml)\n- [019d174f-2cd6-772c-97db-8fdcb16a0050.toml](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/projections/conversations/019d174f-2cd6-772c-97db-8fdcb16a0050.toml)\n- [ASP.NET Core Blazor render modes](https://learn.microsoft.com/aspnet/core/blazor/components/render-modes)\n- [Windows developer FAQ: hybrid and web development](https://learn.microsoft.com/windows/apps/get-started/windows-developer-faq)\n\nThis was docs-only, so I didn’t rerun build/tests for this last batch. The next strong move is to turn the requirements into code-facing contracts for the first real views and host commands on `fnui-foundation`."

