text = "The experiment moved us forward.\n\nHere’s the current lab export:\n![ComponentStateTokenLab](/home/ivan/NEXUS/tmp/Penpot_ComponentStateTokenLab_V1.png)\n\nWhat it showed in the live `LaundryLog` Penpot file:\n- `Button.Option` instance text edits exported correctly.\n- `Button.Option` detached-instance text edits also exported correctly.\n- `Input.Text` instance and detached-instance text edits also exported correctly.\n- the overlay label workaround also exported correctly once the fresh text was given an explicit visible size.\n\nSo the slice-card problem is narrower than “all component-derived text is broken.” Right now it looks more like a problem with the recovered slice-shell text nodes, not with ordinary reusable controls in general. That reinforces the earlier rule: stay as high as possible on the ladder, and only detach when we truly need to break inheritance.\n\nOn the upstream search: I did find strong adjacent evidence, but not an exact published match yet for our current slice-shell export bug. The closest documented Penpot issues are:\n- [Problem with components override](https://community.penpot.app/t/problem-with-components-override/6067)\n- [Updating component style shouldn't require reseting text](https://community.penpot.app/t/updating-component-style-shouldnt-require-reseting-text/8480)\n- [Components Overrides](https://community.penpot.app/t/components-overrides/8800)\n- [bug: component \"broken\" after I switch variant - requires reset overrides #7931](https://github.com/penpot/penpot/issues/7931)\n- [feature: Enhance Plugin API with Component Properties #7518](https://github.com/penpot/penpot/issues/7518)\n- [bug: exporting changes the font of the content #6658](https://github.com/penpot/penpot/issues/6658)\n\nI also found a new local wrinkle: token application through the current plugin path is still not trustworthy enough to lean on. In this lab, `shape.applyToken(...)` threw a Penpot-side `check error`, and a first `token.applyToShapes(...)` probe did not give a clean inspectable binding result. So token-governed replacement text is still an open lab seam, not a solved workflow yet.\n\nDurable notes are committed:\n- NEXUS `penpot-surface-protocol`: `6dbb3b26`\n  - [penpot-surface-comparison.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-surface-comparison.md)\n- CheddarBooks `laundrylog-fnhci-primitive-map`: `fb36b32`\n  - [penpot-projection.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-projection.md)\n\nOne operational note: the NEXUS post-commit checkpoint hook aborted again during the NEXUS commit, but the commit itself succeeded. If you want, the next best move is either:\n- keep pushing the Penpot lab into a real variant/state experiment, or\n- investigate the slice-shell text structure itself now that we know normal buttons and inputs are not the core failure."

