[[body.segments]]
kind = "plain_text"
text = "PLEASE IMPLEMENT THIS PLAN:\n# Add A New NM Path Surface Beside The Existing Screen Path\n\n## Summary\nKeep the current tracked screen-path page unchanged as the fallback surface. Add a new tracked NM path page that broadens the AEM slice-shell idea into a first ATLAS/NM modeling surface.\n\nThe new NM page should:\n- use one horizontal column per explicit state change\n- keep time/path progression left-to-right\n- assign one primary bounded context to each column\n- include real AEM columns immediately\n- use the AEM slice visual grammar as the broader NM column shell\n- default the top surface slot to thumbnail mode, with both:\n  - a page-level `Thumbnail / Full` mode toggle\n  - click-to-expand for an individual thumbnail\n- use `Summary + Detailed` only\n- leave `audience` out of the UI for now\n- keep `role/actor` as a badge, not a row\n\nDo not replace the existing screen-path artifact in this phase. Add a new tracked artifact path and a new renderer so the current page remains available if the NM path needs to be backed out.\n\n## Key Changes\n### 1. Add a new NM renderer and artifact, do not replace the current screen-path page\nCreate a new renderer/module rather than overloading the current screen-path renderer.\n\nUse these new tracked surfaces:\n- `workspace/laundrylog/html/nm-paths/LaundryLog_PATH1_NM_FirstLaunch_FirstEntry.html`\n- `workspace/laundrylog/html/nm-paths/LaundryLog_PATH1_NM_FirstLaunch_FirstEntry.update.js`\n\nKeep these existing surfaces unchanged and still generated:\n- the current screen-path artifact under `workspace/laundrylog/html/screen-paths/`\n- the current AEM path artifact under `workspace/laundrylog/html/aem-paths/`\n\nAdd a new local proving-ground note for the NM renderer and update the workspace README so both the legacy screen-path page and the new NM page are visible and intentional.\n\n### 2. Model NM as a broader AEM-style column system\nAdd a new NM document model with these layers:\n\n- `ContextGroupKind`\n  - `AppRuntime`\n  - `Interaction`\n  - `Business`\n- `NmContextKind`\n  - `ApplicationLifecycle`\n  - `RuntimeOrchestration`\n  - `ScreenPath`\n  - `EventModeling`\n- `NmLensKind`\n  - `Lifecycle`\n  - `Runtime`\n  - `Screen`\n  - `AEM`\n- `NmSurfacePresentation`\n  - `Thumbnail`\n  - `Full`\n\nDefine one ordered `NmColumnState` per visible state change with:\n- `ColumnKey`\n- `ColumnTitle`\n- `ColumnNote`\n- `ChangeItems`\n- `ContextGroup`\n- `PrimaryContext`\n- `VisibleInLenses : NmLensKind list`\n- `ActorRoleBadge : string option`\n- `Surface`\n- optional technical/surface label text used in `Detailed`\n\nThe `Surface` union should support:\n- splash/runtime boot surfaces\n- app screen surfaces\n- AEM command slice cards\n- AEM view slice cards\n\nDo not add `UI` or `UX` as new bounded contexts in this phase. Treat those as future possibilities under the broader `Interaction` group until the vocabulary is more stable.\n\n### 3. Build the first unified `PATH1` with real AEM columns now\nThe first NM page should render these columns in this exact order:\n\n1. `AppStarted`\n   - group: `AppRuntime`\n   - context: `ApplicationLifecycle`\n   - lens: `Lifecycle`\n   - role badge: `System`\n   - surface: splash boot surface\n2. `Runtime Checks`\n   - group: `AppRuntime`\n   - context: `RuntimeOrchestration`\n   - lens: `Runtime`\n   - role badge: `System`\n   - surface: splash boot surface\n3. `No Local Session`\n   - group: `AppRuntime`\n   - context: `RuntimeOrchestration`\n   - lens: `Runtime`\n   - role badge: `System`\n   - surface: splash boot surface\n4. `Route Resolved`\n   - group: `AppRuntime`\n   - context: `RuntimeOrchestration`\n   - lens: `Runtime`\n   - role badge: `System`\n   - surface: splash boot surface\n5. `Need Location`\n   - group: `Interaction`\n   - context: `ScreenPath`\n   - lens: `Screen`\n   - role badge: `User`\n   - surface: awaiting-location screen\n6. `Ready To Set Location`\n   - group: `Interaction`\n   - context: `ScreenPath`\n   - lens: `Screen`\n   - role badge: `User`\n   - surface: location-entered screen\n7. `CaptureLaundryLocation`\n   - group: `Business`\n   - context: `EventModeling`\n   - lens: `AEM`\n   - role badge: `User`\n   - surface: existing command slice\n8. `CurrentLaundrySession`\n   - group: `Business`\n   - context: `EventModeling`\n   - lens: `AEM`\n   - role badge: none\n   - surface: existing view slice showing location captured and no entries\n9. `Entry Form Ready`\n   - group: `Interaction`\n   - context: `ScreenPath`\n   - lens: `Screen`\n   - role badge: `User`\n   - surface: ready-at-location screen\n10. `Washer Draft`\n    - group: `Interaction`\n    - context: `ScreenPath`\n    - lens: `Screen`\n    - role badge: `User`\n    - surface: washer draft screen\n11. `LogLaundryExpense`\n    - group: `Business`\n    - context: `EventModeling`\n    - lens: `AEM`\n    - role badge: `User`\n    - surface: existing washer command slice\n12. `CurrentLaundrySession`\n    - group: `Business`\n    - context: `EventModeling`\n    - lens: `AEM`\n    - role badge: none\n    - surface: existing view slice showing the first logged washer entry\n13. `Logged Success`\n    - group: `Interaction`\n    - context: `ScreenPath`\n    - lens: `Screen`\n    - role badge: `User`\n    - surface: logged-success screen\n\nIf multiple contexts change around the same moment, they still become separate adjacent columns in time order. Do not use compound columns in this phase.\n\n### 4. Use the AEM slice shell as the NM column shell\nThe new NM columns should visually inherit the AEM shell idea:\n- outer bordered column card\n- top surface slot\n- lower structured body\n- explicit badges/labels rather than plain stacked step docs\n\nUse the top surface slot this way:\n- default page state: `Thumbnail`\n- page-level control: `Thumbnail / Full`\n- per-column click on a thumbnail: open an expanded overlay showing the full surface\n- thumbnail mode should use a live scaled DOM preview, not generated bitmap screenshots, in this phase\n\nApply the shell by context:\n- lifecycle/runtime columns use the NM shell with boot-state content in the lower body\n- screen-path columns use the NM shell with the app screen surface in the top slot and screen-path-specific detail below\n- AEM columns use the NM shell, but the existing AEM command/view internals stay intact below the top slot\n\nFor AEM columns specifically:\n- replace the older “screen/actor/top block” idea with the current app UI surface slot\n- allow the slot to show the compact thumbnail by default\n- let full-surface mode or click-to-expand reveal the fuller app surface\n\n### 5. Define the new UI controls clearly\nHeader controls on the NM page:\n- `View`\n  - `Summary`\n  - `Detailed`\n- `Lenses`\n  - `Lifecycle`\n  - `Runtime`\n  - `Screen`\n  - `AEM`\n- `Surface`\n  - `Thumbnail`\n  - `Full`\n- `Updates`\n  - keep the existing notify/auto-refresh pattern\n\nView mode behavior:\n- `Summary`\n  - hides context-group/context/lens/role badges\n  - hides `What Changed`\n  - hides technical surface labels and notes\n  - keeps the main column title and rendered surface visible\n  - keeps scenario info available but not expanded\n- `Detailed`\n  - shows all metadata above\n  - auto-expands the scenario panel by default on first render and when switching into `Detailed`\n  - is the default working mode\n\nDo not add `Standard`.\nDo not add `audience` as a control yet.\n\n### 6. Color and labeling rules\nUse color primarily through the new group/context structure:\n\n- `AppRuntime` group\n  - one coherent runtime color family across lifecycle and runtime columns\n- `Interaction` group\n  - one coherent interaction color family across screen-path columns\n- `Business` group\n  - use the existing AEM internal command/event/view colors as the primary signal; do not bury them under a heavy new group tint\n\nUse text labels this way in `Detailed`:\n- group label\n- `Context · <bounded context>`\n- one or more lens badges\n- actor/role badge when present\n\nDo not make actor/role a row in this phase.\n\n## Tests\n### Keep the old screen-path flow intact\nDo not remove or weaken the existing browser and Expecto coverage for the current screen-path artifact. That page remains the fallback surface.\n\n### Add new NM coverage\nAdd a separate browser spec for the new NM page and new renderer invariants in Expecto.\n\nExpecto should prove:\n- the NM artifact emits `Summary + Detailed` only\n- the NM artifact emits `Lifecycle / Runtime / Screen / AEM` lens controls\n- the ordered PATH1 NM columns match the exact list above\n- the group/context metadata is emitted correctly\n- the new surface-mode control exists\n- the old screen-path artifact is still generated unchanged\n\nPlaywright should prove:\n- nav still moves by whole columns on the NM page\n- start/end and rail sync still hold\n- each lens toggle removes its matching columns from layout\n- `Summary` hides meta/change content while keeping surfaces visible\n- `Detailed` shows the full metadata and auto-reveals scenario assumptions\n- default surface mode is `Thumbnail`\n- switching to `Full` updates the column surfaces across the page\n- clicking a thumbnail opens the expanded surface overlay\n- the chosen surface mode persists across reload\n- the old screen-path page still passes its existing browser suite\n\n## Assumptions And Defaults\n- `ATLAS` is treated as the broader tool direction; `NM` is the modeling surface/page being added in this phase\n- the new tracked artifact should live under `workspace/laundrylog/html/nm-paths/`\n- the old screen-path artifact remains available and tested as fallback\n- `Interaction` is the correct higher-level group for current UI/screen concerns; do not hardcode `UI` or `UX` as bounded contexts yet\n- `audience` is deferred\n- `actor/role` starts as a badge only\n- the first NM page should use real AEM columns immediately, not placeholders"

