text = "the xml notes are being updated as well, yes? Also, I just identified a core NEXUS directive for when I am working in NEXUS projects and code, I prefer to have explicit permissive allowed rathen than a match then catchall. This is meaning in like F# pattern matching, there should not be a _ path, that means we are not determininastic. It goes along with Scotts idea that invalid states should not be able to be gotten to. For input validation, the rules should match explicitly like A-Z & a-Z and #s and a set of special characters allowed. This provides better security and a known attack surface overall. If one just has that `@` is not allowed, that means eveything else is, and that is usually not what is desired. \nwe can now move to the next step as well."

