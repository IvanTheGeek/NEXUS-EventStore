kind = "plain_text"
text = "The normalization-version safeguard is in and pushed as `d19de76` on `codex/nexus-ingestion-foundation`.\n\nThe core change is that canonical imports now stamp a `normalization_version`, and the importer treats parser-version changes differently from provider-content changes. The main logic is in [ImportWorkflow.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Importers/ImportWorkflow.fs), [EventStoreIndex.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Importers/EventStoreIndex.fs), and [CanonicalStore.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/CanonicalStore.fs). I also added the domain type in [Provenance.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Domain/Provenance.fs), updated counts/manifests in [CanonicalHistory.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Domain/CanonicalHistory.fs), and made projections able to accept later re-observations of the same message in [ConversationProjections.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/ConversationProjections.fs).\n\nThe rule is now explicit in the docs too:\n- same provider object + same normalization version + changed hash => provider revision\n- same provider object + different normalization version => new observation, not a fake revision\n\nThat is documented in [docs/nexus-ingestion-architecture.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/nexus-ingestion-architecture.md), [docs/how-to/import-provider-export.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/import-provider-export.md), [docs/glossary.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/glossary.md), and [v0-layout-and-toml.md](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/docs/v0-layout-and-toml.md).\n\nI verified it two ways:\n- same-version Claude reimport on a temp event store: `3` new events, `3646` duplicates, `0` revisions, `0` reparses\n- simulated older-normalization Claude reimport on a temp event store: `3244` new events, `405` duplicates, `0` revisions, `3241` reparse observations\n\nThe branch is clean and synced. The next sensible move is to improve the provider parsers themselves now that reparsing has a safe semantic path."

