text = "Yes, and I did that.\n\nThe live Penpot PATH 1 projection is still on the `Event Model` page, and I built a scratch HTML storyboard from slice-level SVG exports here:\n\n- [index.html](/home/ivan/NEXUS/tmp/laundrylog-path1-preview/index.html)\n\nSupporting slice exports:\n- [01-command-set-location.svg](/home/ivan/NEXUS/tmp/laundrylog-path1-preview/01-command-set-location.svg)\n- [02-view-ready.svg](/home/ivan/NEXUS/tmp/laundrylog-path1-preview/02-view-ready.svg)\n- [03-command-log-washer.svg](/home/ivan/NEXUS/tmp/laundrylog-path1-preview/03-command-log-washer.svg)\n- [04-view-washer-visible.svg](/home/ivan/NEXUS/tmp/laundrylog-path1-preview/04-view-washer-visible.svg)\n- [05-command-log-dryer.svg](/home/ivan/NEXUS/tmp/laundrylog-path1-preview/05-command-log-dryer.svg)\n- [06-view-washer-and-dryer-visible.svg](/home/ivan/NEXUS/tmp/laundrylog-path1-preview/06-view-washer-and-dryer-visible.svg)\n\nI also recorded the export guardrail durably in NEXUS on branch `penpot-surface-protocol`:\n- commit `18003fcd`\n- [penpot-live-backend-and-export.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-live-backend-and-export.md)\n- [penpot-surface-comparison.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-surface-comparison.md)\n\nThe rule now is:\n- don’t default to whole-page `export_shape`\n- prefer board/shape export for visuals\n- prefer backend `export-binfile` for full file checkpoints\n\nThis HTML preview is scratch, not committed. If it feels like the right direction, the next move is to turn it into a deterministic helper so we can regenerate the PATH preview from Penpot on demand."

