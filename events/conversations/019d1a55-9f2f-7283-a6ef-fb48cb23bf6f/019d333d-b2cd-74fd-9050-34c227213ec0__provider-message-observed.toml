text = "Yes, and it’s now a NEXUS-level default.\n\nNEXUS:\n- `main` is updated at `f574a127`\n- new decision: [0023-utc-for-durable-time-and-localize-in-views.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0023-utc-for-durable-time-and-localize-in-views.md)\n\nI also linked that rule into:\n- [collaboration-protocol.md](/tmp/nexus-merge-M7SKP3/docs/collaboration-protocol.md)\n- [repository-concern-lines.md](/tmp/nexus-merge-M7SKP3/docs/repository-concern-lines.md)\n- [README.md](/tmp/nexus-merge-M7SKP3/README.md)\n\nSo the shared rule is now:\n- durable/model time defaults to UTC\n- views localize for humans\n- local formatting should not define the stored model\n\nAnd the active LaundryLog branch now follows that too:\n- `CheddarBooks` branch `laundrylog-event-modeling` at `227c0d1`\n\nUpdated there:\n- [events.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/events.md)\n- [open-questions.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/open-questions.md)\n- [view-contracts.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/view-contracts.md)\n- [domain-model.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/domain-model.md)\n\nThis was docs-only, so I didn’t run tests."

