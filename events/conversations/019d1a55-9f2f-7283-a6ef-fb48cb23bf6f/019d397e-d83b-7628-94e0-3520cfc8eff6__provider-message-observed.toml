[[body.segments]]
kind = "plain_text"
text = "`Infrastructure` and `operations` both feel wrong for this.\n\nMy recommendation:\n\n- best broad term: `App Runtime`\n- best lens name: `App Runtime Lens`\n\nWhy:\n- covers startup\n- covers route/control flow\n- covers local state hydration\n- covers PWA/WASM checks\n- covers sync/background mechanics\n- still sits above raw hosting/infrastructure\n\nIf you want a narrower term for just startup/resume/foreground/background:\n- `Application Lifecycle`\n\nIf you want a term for the coordinating behavior between UI system and business system:\n- `Runtime Orchestration`\n- or `App Mechanics`\n\nHow I’d use them:\n- `AEM Lens`\n  business/event truth\n- `Screen Path Lens`\n  user-visible screen/state progression\n- `App Runtime Lens`\n  startup, hydration, routing, sync, background checks, app-level mechanics\n\nSo for your `AppStarted -> splash -> startup checks -> Need Location` example, I’d call that:\n- `App Runtime Lens`\n\nAnd I’d avoid:\n- `Infrastructure`\n- `Operations`\n- `Program Control`\n\nIf you want, I can update the new path doc to use `App Runtime Lens` as the formal term."

