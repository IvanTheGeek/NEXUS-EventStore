kind = "plain_text"
text = "Yes, exactly.\n\nTwo things feel clearly justified now:\n\n- a guardrail on the full rebuild command\n  - something like “this will scan all canonical events and may take a long time; continue?”\n  - or at least an explicit `--from-source` / `--full` flag so it’s a deliberate act\n- a secondary operational layer\n  - not replacing source truth\n  - but giving us a more practical working substrate for graph rebuilds, queries, and visualization over real data\n\nThat would preserve the NEXUS rule I think you’re pointing at:\n- canonical history stays authoritative\n- full rebuild from source remains possible\n- but everyday work should not always pay the full replay cost\n\nSo yes, I think we should plan for:\n- authoritative source layer\n- practical working/index layer\n- derived visualization/query layers on top\n\nThis run is giving us the evidence to justify that split instead of just theorizing it."

