text = "Yes. On current Ubuntu/Debian systems, `python` usually means “install the compatibility shim to Python 3,” not a separate `python` package.\n\nThe normal fix is:\n\n```bash\nsudo apt install python3 python-is-python3\n```\n\nWhat that does:\n- `python3` installs the interpreter\n- `python-is-python3` makes `python` resolve to `python3`\n\nYou can verify it with:\n\n```bash\npython --version\npython3 --version\nwhich python\n```\n\nI would recommend using that package rather than making your own manual symlink in `/usr/local/bin`, because the package-managed route is cleaner and less surprising later.\n\nIf you also want the common packaging tools, then this is a good setup:\n\n```bash\nsudo apt install python3 python-is-python3 python3-pip python3-venv\n```\n\nIf you want, after you install it, I can quickly confirm from the shell that `python` resolves correctly here."

