text = "The next slice is in and pushed as `ea4d0ab7`.\n\nYou now have a conversation-centric working-slice report:\n\n```bash\ndotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- \\\n  report-working-import-conversations \\\n  --import-id <import-id>\n```\n\nWhat it gives you:\n- one row per conversation node in that import-local working slice\n- conversation title or slug\n- message count for that conversation in the slice\n- distinct referenced artifact count for that conversation\n\nMain changes:\n- [GraphWorkingIndex.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/GraphWorkingIndex.fs)\n  - added `WorkingImportConversationSummary`\n  - added `WorkingImportConversationReport`\n  - added query logic for per-import conversation summaries\n- [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs)\n  - added `report-working-import-conversations`\n- tests/docs:\n  - [GraphWorkingIndexTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/GraphWorkingIndexTests.fs)\n  - [CliHelpTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/CliHelpTests.fs)\n  - [report-working-import-conversations.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/report-working-import-conversations.md)\n  - [cli-commands.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/cli-commands.md)\n  - [README.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/README.md)\n\nThis is especially useful for the export-window questions you’ve been asking, because it gives you a batch-local conversation view before you have to think in generic graph terms.\n\nValidation is green:\n- `dotnet build /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/NEXUS-Code.slnx`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj`\n- `57` tests passed\n\nThe only local-only changes still present are the intentionally untracked real-data outputs under [NEXUS-EventStore/events](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/events), [NEXUS-EventStore/imports](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/imports), and [NEXUS-EventStore/graph](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph)."

