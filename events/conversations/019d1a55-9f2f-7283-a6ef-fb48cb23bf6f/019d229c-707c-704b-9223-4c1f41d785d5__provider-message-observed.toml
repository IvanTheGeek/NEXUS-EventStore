[[body.segments]]
kind = "plain_text"
text = "Yes. That is one of the strongest reasons to put these documents in the repo.\n\nIf these notes live in the repository, then future work by me, Codex, Claude Code, or other agents can start from an explicit written foundation instead of trying to reconstruct your intent from scattered chats. In practice, repo docs become portable project memory.\n\nA good way to think about it is:\n\n- repo docs = durable shared understanding\n- app/project setup = convenient working context\n- chat history = useful background, but not the source of truth\n\nSo yes, a project in the apps can help a lot for day-to-day context, prompts, and organization. But the repo is the better long-term home for the core concepts because it is:\n- tool-agnostic\n- versioned\n- reviewable\n- available to any agent that can read the workspace\n\nThe best pattern is probably both:\n\n- use the repo for canonical docs\n- use the app project as an active workspace wrapper around those docs\n\nIf we do that, I’d suggest a small docs spine early on, something like:\n\n- `README.md`\n  what NEXUS is and what this repo is for\n- `docs/nexus-core-conceptual-layers.md`\n  the note we just drafted\n- `docs/nexus-ingestion-architecture.md`\n  raw objects, event store, code boundaries\n- `docs/glossary.md`\n  domain, bounded context, lens, artifact, fact, event, projection\n- `docs/decisions/`\n  small ADR-style decisions as we lock things in\n\nThat gives future AI collaborators a reliable on-ramp. It also helps you, because your own thinking becomes progressively externalized and versioned instead of trapped in chat threads."

