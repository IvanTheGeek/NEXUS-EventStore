text = "Full graph rebuilds now record durable rebuild manifests, and that work is pushed as `2918e89c`.\n\nThe main changes are in [GraphAssertions.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/GraphAssertions.fs), [GraphMaterialization.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/GraphMaterialization.fs), and [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs). An approved full rebuild now writes a TOML manifest under `graph/rebuilds/` with counts, timings, and approval state, and the CLI prints that manifest path along with derivation and total elapsed time. I also updated the docs in [rebuild-graph-assertions.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/rebuild-graph-assertions.md) and [cli-commands.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/cli-commands.md), and added regression coverage in [GraphAssertionTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/GraphAssertionTests.fs).\n\nVerified:\n- `dotnet build /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/NEXUS-Code.slnx`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj`\n- `26` tests passed\n\nI also smoke-tested the CLI on a temp fixture store, and it now reports a line like:\n- `Rebuild manifest: graph/rebuilds/2026-03-24T13-04-40Z__full-rebuild.toml`\n\nThe local untracked ChatGPT import data and graph output are still untouched. The next real feature step is the first incremental graph working-layer update path behind [GraphMaterialization.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/GraphMaterialization.fs)."

