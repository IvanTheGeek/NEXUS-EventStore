text = "The path nav is fixed now. After real browser measurement, the right pattern turned out to be:\n\n- measure the rendered column starts\n- compute logical left-edge targets from those real positions\n- add trailing space so the last readable target is reachable\n- drive the viewport and the top rail together with an explicit `requestAnimationFrame` animation\n\nThat replaces the old behavior where native smooth scrolling plus sync logic was collapsing the move down to a couple pixels.\n\nChanged:\n- [ScreenPathHtmlRenderer.fs](/home/ivan/NEXUS/CheddarBooks/src/CheddarBooks.LaundryLog.UI/ScreenPathHtmlRenderer.fs)\n- [LaundryLogTests.fs](/home/ivan/NEXUS/CheddarBooks/tests/CheddarBooks.Tests/LaundryLogTests.fs)\n- [html-screen-path-renderer-proving-ground.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/html-screen-path-renderer-proving-ground.md)\n- [fsharp-usage-learning-and-guidance.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/fsharp-usage-learning-and-guidance.md)\n\nArtifact:\n- [LaundryLog_PATH1_AppStarted_NeedLocation_FirstEntry.html](/home/ivan/NEXUS/tmp/laundrylog-screen-paths/LaundryLog_PATH1_AppStarted_NeedLocation_FirstEntry.html)\n\nVerified behavior:\n- `next` from the first view lands on `Need Location` as the new leftmost column\n- `start` returns to `AppStarted`\n- dragging the top rail to the same target moves the screen strip with it\n\nPreview after one `next`:\n![PATH1 after next](/home/ivan/NEXUS/tmp/laundrylog-screen-paths/LaundryLog_PATH1_after_next.png)\n\nCommits:\n- CheddarBooks: `45a2f71` `model: fix screen path column navigation`\n- NEXUS: `636a43db` `docs: record column snap guidance for html paths`\n\nVerification:\n- `dotnet build /home/ivan/NEXUS/CheddarBooks/CheddarBooks.slnx`\n- `dotnet run --no-build --project /home/ivan/NEXUS/CheddarBooks/tests/CheddarBooks.Tests/CheddarBooks.Tests.fsproj`\n- `31` tests passed\n\nThe big reusable guidance we learned is now durable: for horizontal path UIs, don’t guess from container widths alone, and don’t assume native smooth scrolling is trustworthy when two scroll surfaces must stay in sync."

