text = "I’d start with a GitHub Discussion, not an Issue.\n\nWhy:\n- I couldn’t find an explicit `CONTRIBUTING.md` rule saying “use issues” for this kind of docs feedback.\n- Their repo has Discussions enabled, and the visible categories include `Q&A` and `Ideas`, which fits “docs could be clearer here.” Source: [VerifyTests Discussions](https://github.com/orgs/VerifyTests/discussions)\n- Their issue config disables blank issues, which suggests they want issues to be a bit more structured and specific. Source: [`.github/ISSUE_TEMPLATE/config.yml`](https://github.com/VerifyTests/Verify/blob/main/.github/ISSUE_TEMPLATE/config.yml)\n- The README’s “raise an issue” wording is about unexpected package behavior during upgrades, which is more concrete than a docs/onboarding suggestion. Source: [Verify README](https://github.com/VerifyTests/Verify/blob/main/readme.md)\n\nMy recommendation:\n- Use a `Discussion` in `Ideas` if you want maintainer guidance on where/how they’d like the docs improved.\n- Use a `Discussion` in `Q&A` if you want to phrase it as “did I miss existing docs for this?”\n- Open an `Issue` only if you already have a narrowly scoped, concrete docs change they’re likely to accept as repo work.\n- Open a `PR` directly if you’re comfortable drafting the doc change and it’s small.\n\nSo the best first move is probably:\n- Discussion in `Ideas`: “Improve F#/Expecto and text snapshot encoding docs”\n\nIf you want, I can rewrite the draft as a Discussion post instead of an Issue."

