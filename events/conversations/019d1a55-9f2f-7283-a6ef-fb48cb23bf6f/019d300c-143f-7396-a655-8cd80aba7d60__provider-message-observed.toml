[[body.segments]]
kind = "plain_text"
text = "Yes. This is a first-class NEXUS concern, and I think it should become an explicit rule before we go much further.\n\nWhat we have now helps, but it is not enough:\n- raw objects are separate from derived layers\n- canonical history is separate from projections\n- overlap is explicit, not collapsed\n\nWhat is still missing is a real data-handling model.\n\nThe core rule I’d add is:\n\n- import permission is not publication permission\n\nAnd then these follow from it:\n\n- raw intake defaults to restricted, not shareable\n- `canonical` does not mean `public`\n- projections, graphs, snapshots, and embeddings can still leak sensitive data\n- redaction/anonymization must be explicit derived transforms with provenance\n- public-safe artifacts should only come from approved sanitized derivatives\n\nSo for your examples:\n\n- personal ChatGPT chats\n  should be ingestible, but marked as private/personal and excluded from shared or public outputs by policy\n- customer CheddarBooks data\n  should be quarantined as customer-confidential raw intake\n  and only redacted/anonymized derived notes or case projections should ever become shareable\n\nI’d model this orthogonally to the rest of the ontology, not mixed into truth itself. Something like:\n\n- `Sensitivity`\n  examples: `personal-private`, `customer-confidential`, `internal`, `public`\n- `SharingScope`\n  examples: `owner-only`, `case-team`, `project-team`, `public`\n- `SanitizationStatus`\n  examples: `raw`, `redacted`, `anonymized`, `approved-for-sharing`\n- `RetentionClass`\n  examples: `ephemeral`, `case-bound`, `durable`\n\nAll of those should use explicit allowlisted values, which fits your preference exactly.\n\nOne especially important point for later LOGOS/RAG work:\n- vector stores are not automatically safe\n- embeddings over sensitive text should be treated as derived sensitive artifacts too\n- public/shared retrieval should use sanitized inputs, not raw private/customer data\n\nSo my recommendation is: this should be the next architectural slice before richer customer or user intake.\n\nThe next concrete move I’d take is:\n1. add a decision note for “restricted-by-default intake and explicit publication”\n2. add a small `Nexus.Logos` policy model for sensitivity/sharing/sanitization/retention\n3. extend LOGOS intake notes to carry that policy metadata\n4. later add redaction/anonymization workflows as explicit derived steps\n\nI think that is the right boundary to lock down now."

