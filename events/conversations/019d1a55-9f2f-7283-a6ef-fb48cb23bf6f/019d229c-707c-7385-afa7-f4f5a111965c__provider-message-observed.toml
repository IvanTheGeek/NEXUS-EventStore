[[body.segments]]
kind = "plain_text"
text = "The specific fix here is to stop relying on HTTPS auth for CLI Git and switch this repo to SSH-based GitHub auth.\n\nWhy this is the right fix on this machine:\n- the remote is currently HTTPS\n- CLI Git has no credential helper configured\n- there is no `gh` login available\n- there is no SSH key set up yet\n- GitKraken can still push because it uses its own auth path, but Codex uses shell Git\n\nI wrote that up here:\n- [docs/how-to/git-auth-for-codex.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/git-auth-for-codex.md)\n\nAnd linked it from:\n- [docs/how-to/README.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/README.md)\n\nThe shortest persistent path is:\n\n1. Create an SSH key\n```bash\nmkdir -p ~/.ssh\nssh-keygen -t ed25519 -C \"ivan@nexus-emerging\" -f ~/.ssh/id_ed25519\n```\n\n2. Copy the public key\n```bash\ncat ~/.ssh/id_ed25519.pub\n```\n\n3. Add that key to GitHub under `Settings` -> `SSH and GPG keys`\n\n4. Test SSH auth\n```bash\nssh -T git@github.com\n```\n\n5. Switch this repo’s remote to SSH\n```bash\ngit remote set-url origin git@github.com:IvanTheGeek/NEXUS-EMERGING.git\n```\n\n6. Push\n```bash\ngit push -u origin codex/nexus-ingestion-foundation\n```\n\nFor reboot persistence:\n- simplest: no passphrase on the SSH key\n- more secure: use a passphrase and load it with `ssh-agent` each login\n\nThat guide is committed as `2565e39` (`Document Git auth setup for Codex`).\n\nOnce you do those machine-level steps, I’ll be able to push from Codex normally in future sessions too."

