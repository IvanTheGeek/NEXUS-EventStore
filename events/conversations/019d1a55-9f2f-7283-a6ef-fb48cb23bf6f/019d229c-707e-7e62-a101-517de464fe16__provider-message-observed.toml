text = "The CLI help pass is in and pushed as `4dc459d4`.\n\nThe main upgrade is in [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs). The CLI now supports:\n- global help with `--help`\n- command help with `help <command>`\n- command help with `<command> --help`\n- command-specific error/help output instead of always dumping one long global usage block\n\nI also added a human-facing quick reference at [cli-commands.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/cli-commands.md), and linked it from [docs/how-to/README.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/README.md), [NEXUS-Code/README.md](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/README.md), and [README.md](/home/ivan/NEXUS/NEXUS-EMERGING/README.md).\n\nValidation is clean:\n- `dotnet build /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/NEXUS-Code.slnx`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- --help`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- help import-provider-export`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- capture-artifact-payload --help`\n\nThe branch is clean and synced to `origin/codex/nexus-ingestion-foundation`.\n\nThe next good move is either CLI help tests, or back to feature work."

