kind = "plain_text"
text = "It gives us durable evidence about rebuild behavior over time instead of relying on memory, terminal scrollback, or ad hoc notes.\n\nConcretely, a rebuild metrics/manifest file would record things like:\n- when the rebuild ran\n- against which event-store root\n- how many canonical event files were scanned\n- how many graph assertions were derived\n- elapsed derivation time\n- elapsed total time\n- maybe max memory if we capture it\n- maybe which code/normalization/materializer version produced it\n\nWhy that helps:\n\n- performance tracking\n  We can compare rebuilds across dates, dataset sizes, VM settings, and code changes.\n- architectural guidance\n  It gives real evidence for whether a new materializer or storage shape is helping.\n- operational clarity\n  You can see “this store was last fully rebuilt at X, from Y source size, with Z output size.”\n- AI/human continuity\n  Future me or Claude Code can read the manifest and understand prior rebuild behavior without reconstructing it from chat.\n- safety\n  If something looks odd later, we have a durable breadcrumb trail for the derived layer.\n\nIn NEXUS terms, it becomes part of project memory about the graph-materialization process, without pretending that the metrics are source truth for the graph itself.\n\nA simple first version could write one TOML file per rebuild under something like:\n- `NEXUS-EventStore/graph/rebuilds/<timestamp>-full-rebuild.toml`\n\nExample fields:\n- `rebuilt_at`\n- `mode = \"full\"`\n- `event_store_root`\n- `canonical_event_files_scanned`\n- `graph_assertions_written`\n- `derivation_elapsed_ms`\n- `total_elapsed_ms`\n- `materializer = \"graph-assertions-v1\"`\n- `approved_by_flag = true`\n\nSo the short answer is: it gives us an observable performance and operational history for the derived graph layer, which is exactly what we need before and during the move to incremental materialization."

