text = "A Git worktree is an extra checked-out working directory for the same repository. It shares the same Git object database/history, but gives you another folder with a different branch checked out, so you can work on or merge multiple branches at once without constantly switching one directory back and forth.\n\nIn practice, we were using worktrees like this:\n- `/home/ivan/NEXUS/NEXUS-EMERGING` for the active branch\n- `/tmp/nexus-penpot-publish-AEx7XS` for `main`\n- temporary worktrees for branch merge/reconciliation\n\nThat helped with:\n- merging branches without disturbing the active workspace\n- keeping branch state isolated\n- avoiding one directory constantly changing branches underneath ongoing work\n\nAnd the policy I just encoded is: worktrees are a temporary operating tool, not a reason to keep branches alive. When the branch is merged and no longer active, remove the worktree and delete the branch.\n\nI updated the durable policy docs here:\n- [AGENTS.md](/home/ivan/NEXUS/NEXUS-EMERGING/AGENTS.md)\n- [docs/collaboration-protocol.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/collaboration-protocol.md)\n- [docs/decisions/0008-branch-topology-by-workstream.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/decisions/0008-branch-topology-by-workstream.md)\n\nThat landed as:\n- `fc10f698d` `docs: clarify worktree and branch retirement policy`\n\nRemote cleanup is done too. I pushed `main`, deleted the retired remote branches, pruned, and verified the repo is now down to:\n- local branches: `main`\n- remote branches: `origin/main`\n\nCurrent final state:\n- [NEXUS-EMERGING](/home/ivan/NEXUS/NEXUS-EMERGING) is on `main`\n- working tree is clean\n- only one local worktree remains\n- current tip: `fc10f698d`\n\nOne thing to keep in mind: when I pushed `main`, GitHub warned that [NEXUS-EventStore/graph/working/index/graph-working.sqlite](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph/working/index/graph-working.sqlite) is over the recommended 50 MB size. The push succeeded, but that file is now the obvious next repo-hygiene concern.\n\nNo tests were run for the final policy-doc and remote-cleanup step because it was docs/git administration only. The repo test suite had already passed earlier on the converged mainline before this last docs-only pass."

