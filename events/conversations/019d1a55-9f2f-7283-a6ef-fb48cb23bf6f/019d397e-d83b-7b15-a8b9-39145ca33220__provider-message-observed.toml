text = "Not by default, no.\n\nIn the current NEXUS vocabulary, I‚Äôd separate them like this:\n\n- `concern line`\n  A practical thread of work or meaning we know matters.\n  Useful before the structure is fully formalized.\n- `domain`\n  A broad area of reality/work.\n- `bounded context`\n  A specific meaning boundary with its own vocabulary and rules.\n- `lens`\n  A way of viewing or projecting the underlying reality.\n\nSo ‚Äúareas of concern‚Äù are usually closer to `concern lines` first, not automatically `contexts`.\n\nA clean rule of thumb:\n\n- if we‚Äôre saying ‚Äúthis part of the world/work matters‚Äù:\n  `domain` or `concern line`\n- if we‚Äôre saying ‚Äúthese terms and rules mean something specific here‚Äù:\n  `bounded context`\n- if we‚Äôre saying ‚Äúthis is the perspective we are looking through‚Äù:\n  `lens`\n\nFor your current LaundryLog/FnHCI thinking, I‚Äôd formalize it like this:\n\n- `FnHCI`\n  Not one bounded context by itself.\n  More like a broader concept/system area that can contain several sub-areas.\n- `Application Lifecycle`\n  Good candidate for a bounded context.\n  This is where `AppStarted`, `AppResumed`, `StartupChecksCompleted` fit.\n- `Runtime Orchestration`\n  Good candidate for a bounded context.\n  This is the coordination between UI system, app/runtime behavior, and business exchanges.\n  This feels very close to the seam `FnHCI` should cover.\n- `Screen Path`\n  Good candidate for a bounded context.\n  Ordered screen states and transitions as experienced by the user.\n- `EventModeling`\n  Existing bounded context.\n- `AEM Lens`\n  A lens over the Event Modeling bounded context.\n- `Screen Path Lens`\n  A lens over the Screen Path bounded context.\n- `App Runtime Lens`\n  A lens over Application Lifecycle + Runtime Orchestration.\n\nSo I would say:\n\n- `AppStarted` belongs to the `Application Lifecycle` bounded context.\n- ‚Äúshow splash, run startup checks, route to Need Location‚Äù belongs to `Runtime Orchestration`.\n- ‚Äúthese are the screens in order‚Äù belongs to `Screen Path`.\n- ‚Äúthese are the business commands/events/views‚Äù belongs to `EventModeling`.\n- `FnHCI` is the broader interaction/system area spanning and helping weave those.\n\nThe important distinction is:\n\n- `concern line` is an organizing thread\n- `bounded context` is a formal semantic boundary\n- `lens` is a viewpoint/projection\n\nSo:\n- not every concern line should immediately become a bounded context\n- but the ones we keep needing, naming, and giving rules to probably should\n\nMy recommendation for now:\n\n- keep saying `concern line` while we are still shaping the semantics\n- promote these to bounded contexts once we agree on their vocabulary:\n  - `ApplicationLifecycle`\n  - `RuntimeOrchestration`\n  - `ScreenPath`\n  - `EventModeling`\n- use these lenses:\n  - `AEM Lens`\n  - `Screen Path Lens`\n  - `App Runtime Lens`\n\nIf that framing feels right, the next doc update should use exactly that split rather than treating ‚Äúconcern,‚Äù ‚Äúcontext,‚Äù and ‚Äúlens‚Äù as interchangeable."

