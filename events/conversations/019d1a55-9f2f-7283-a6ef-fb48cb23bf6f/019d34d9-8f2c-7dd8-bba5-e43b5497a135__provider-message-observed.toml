text = "The durable note correction is in and both repos are clean.\n\nUpdated docs:\n- NEXUS: [penpot-surface-comparison.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-surface-comparison.md)\n- CheddarBooks: [penpot-projection.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-projection.md)\n\nCommits:\n- NEXUS: `6ef57df1` `docs: record penpot instance override render repro`\n- CheddarBooks: `0da1fce` `docs: record penpot instance override repro`\n\nThe tighter repro is now:\n- live board on `PATHS`: `PATH1.Row.V6.InstanceBased`\n- built only from `CommandSlice.Clean.V3` and `ViewSlice.Clean.V3` via `LibraryComponent.instance()`\n- stored instance text overrides are correct in live shape data\n- live canvas and export still render master/default text\n\nI did not find a clearly matching existing Penpot issue for this exact repro, so I recommend:\n- open a new GitHub bug issue\n- then post a short forum note linking to that issue\n\nUse this for GitHub:\n\n```md\nTitle: Plugin/API-created component instances keep stored text overrides, but canvas and export render master text\n\nI found a tighter repro for a component-instance text override problem in Penpot.\n\nEnvironment:\n- local self-hosted Penpot 2.14\n- Plugin API / MCP workflow\n- file contains reusable slice components used for Event Modeling projections\n\nWhat I am doing:\n- create component instances from library assets using the equivalent of dragging from the Assets panel\n- specifically, using `LibraryComponent.instance()`\n- place those instances on a working page (`PATHS`)\n- then update text on the instance to customize the slice for a specific path step\n\nExpected:\n- the instance should render the overridden text on the live canvas\n- export should also render the overridden text\n\nActual:\n- the stored instance text values are correct when inspected through the Plugin API\n- but the live Penpot canvas still renders the master/default text\n- export also renders the master/default text\n\nSo this appears to be:\n- not a failed write\n- not a missing instance link\n- but a render / override-application problem\n\nCurrent minimal repro shape:\n- `PATH1.Row.V6.InstanceBased`\n- built only from two library components:\n  - `CommandSlice.Clean.V3`\n  - `ViewSlice.Clean.V3`\n\nExamples of stored instance values that are correct:\n- `Header.Title = \"Capture Laundry Location\"`\n- `Header.Description = \"manual location entry starts the path\"`\n- `Data.Title = \"CaptureLaundryLocation\"`\n- `Data.Properties = ...LaundryLog-specific values...`\n\nBut the canvas/export still show master/default values like:\n- `myCommand`\n- `myView`\n- `description`\n- `amount = 42.50`\n\nImportant comparison:\n- this is different from a simpler earlier issue where plugin-created raw text existed but did not paint reliably\n- here, these are real connected component instances created from the library instance path\n- the override data is present, but rendering still follows the master\n\nIf helpful, I can reduce this further into a smaller reproducible file or script, but the main finding is:\ninstance text overrides are being stored, yet the canvas and export keep rendering master text.\n```\n\nUse this for the forum:\n\n```md\nI found a tighter Penpot repro that looks like a real bug, and I’m opening a GitHub issue for it.\n\nShort version:\n- create real component instances from library assets\n- update text on the instance\n- the updated text is present in the live shape data\n- but the canvas and export still render the master/default text\n\nSo this seems to be a render / override-application problem, not just a bad plugin write.\n\nI’m using this in a local Event Modeling workflow, but the issue seems more general than that.\n\nGitHub issue:\n[paste link once created]\n```\n\nIf you want, next I can help reduce `PATH1.Row.V6.InstanceBased` into the smallest possible Penpot repro so the bug report is even stronger."

