text = "I feel like we are dealing in several domains and contexts. Perhaps we should identify some broad lines and use git branches with merges so that I and others later would be able to know when work and decisions where made in. Examples, would be what is NEXUS as my concept which will relate to eveything I am working on inside my NEXUS. F# coding practises and then more context specific like we are working on ingestion, etc. Some of these are being organically figured out and will apply for example when we work on FnHCI and then FnUI specifically. Also, doc decisions and structure and architechual, etc. Lets maybe investigate and converge this idea into a plan for implimenting. The idea will be that I can bring in Claude Code or even my own CORTEX version and all AI and humans be able to understand what is fundemental, coding conventions, documentation rewquirements and goals, etc."

