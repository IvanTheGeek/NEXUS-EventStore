text = "The next slice is in and pushed as `7f4e054d`.\n\nYou can now render Graphviz output directly from the NEXUS CLI with explicit allowlists:\n\n```bash\ndotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- \\\n  render-graphviz-dot \\\n  --input /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph/exports/nexus-graph__provider-codex.dot \\\n  --engine sfdp \\\n  --format svg\n```\n\nWhat was added:\n- [GraphvizRendering.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/GraphvizRendering.fs)\n- CLI support in [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs)\n- docs in [render-graphviz-dot.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/render-graphviz-dot.md)\n- tests in [GraphvizDotTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/GraphvizDotTests.fs) and [CliHelpTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/CliHelpTests.fs)\n\nAllowed values are explicit:\n- engines: `dot`, `sfdp`\n- formats: `svg`, `png`\n\nValidation is clean:\n- `dotnet build /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/NEXUS-Code.slnx`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj`\n- `34` tests passed\n\nThe only remaining local changes are still the intentionally untracked real-data event-store outputs under [NEXUS-EventStore/events](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/events), [NEXUS-EventStore/imports](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/imports), and [NEXUS-EventStore/graph](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph)."

