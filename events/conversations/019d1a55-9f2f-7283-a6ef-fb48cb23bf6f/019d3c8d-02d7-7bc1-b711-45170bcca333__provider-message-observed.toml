text = "For the formal browser harness, we’re using `TS`, not plain `JS`.\n\nSpecifically:\n- Playwright config: [playwright.config.ts](/home/ivan/NEXUS/CheddarBooks/tests/browser/playwright.config.ts)\n- first browser spec: [path1-screen-path.spec.ts](/home/ivan/NEXUS/CheddarBooks/tests/browser/specs/path1-screen-path.spec.ts)\n- toolchain manifest includes `typescript`: [package.json](/home/ivan/NEXUS/CheddarBooks/tests/browser/package.json)\n\nBut the generated page itself still contains plain browser-side `JS` glue:\n- tracked path page: [LaundryLog_PATH1_AppStarted_NeedLocation_FirstEntry.html](/home/ivan/NEXUS/CheddarBooks/workspace/laundrylog/html/screen-paths/LaundryLog_PATH1_AppStarted_NeedLocation_FirstEntry.html)\n- update sidecar: [LaundryLog_PATH1_AppStarted_NeedLocation_FirstEntry.update.js](/home/ivan/NEXUS/CheddarBooks/workspace/laundrylog/html/screen-paths/LaundryLog_PATH1_AppStarted_NeedLocation_FirstEntry.update.js)\n\nSo the short answer is:\n- browser tests: `TypeScript`\n- page glue/runtime script: `JavaScript` generated into the HTML/sidecar"

