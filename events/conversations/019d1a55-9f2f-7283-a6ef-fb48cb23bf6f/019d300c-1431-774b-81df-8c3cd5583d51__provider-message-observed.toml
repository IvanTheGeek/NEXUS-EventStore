text = "Yes, and I’ve formalized it in the repo.\n\nNew docs on `repo-extraction-plan`:\n- [collaboration-protocol.md](/tmp/nexus-merge-M7SKP3/docs/collaboration-protocol.md)\n- [0020-converged-main-and-active-concern-line-branches.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0020-converged-main-and-active-concern-line-branches.md)\n\nWhat this now makes explicit:\n- `main` is the converged shared truth\n- multiple long-lived concern-line branches are allowed\n- accepted checkpoints merge into `main` with `--no-ff`\n- active long-lived branches should periodically merge `main` back into themselves\n- collaborators should onboard from repo docs first, not from chat memory\n\nThat’s exactly the pattern you described: several active plans at once, but with a reliable converged baseline and visible merge history.\n\nBranch status:\n- `main` is already updated through `bb87d037`\n- all previously active committed branches are already merged into `main`\n- the only branch currently ahead of `main` is `repo-extraction-plan`, which now contains:\n  - the extraction plan docs\n  - the collaboration/branch-convergence formalization\n\nSo no, there are no other branches that still need merging into `main` right now besides `repo-extraction-plan` if you want these newest planning docs converged too.\n\nThis was a docs-only batch, so I did not run tests."

