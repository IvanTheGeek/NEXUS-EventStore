[[body.segments]]
kind = "plain_text"
text = "What you just described points to the next phase very clearly: not more raw ingestion work for its own sake, but making the imported history legible and harvestable.\n\nI’d recommend this sequence:\n\n**1. Add external graph export**\nUse the rebuilt graph assertions as input to a first `DOT`/Graphviz exporter.\nThat gives you an external lens over NEXUS history so patterns can emerge without being constrained by NEXUS’s own current assumptions.\n\n**2. Add curated knowledge extraction**\nCreate a small layer for promoting things from chat history into durable project memory:\n- concept notes\n- discovery notes\n- domain seeds like `FnHCI`\n- provenance links back to conversation/message/assertion IDs\n\nThis is the piece that makes the chat logs truly usable by me and Claude Code later.\n\n**3. Treat FnHCI as the first real domain harvest**\nNot a full app yet.\nFirst make it a curated domain package:\n- `docs/domains/fnhci/...`\n- core concepts\n- terms\n- relationships\n- source conversation refs\n- maybe initial graph nodes/assertions tied to those concepts\n\n**4. Then build the visualization/UI substrate**\nThat’s where FnHCI starts informing the base UI system that later projects like LaundryLog can sit on.\n\nSo if I had to pick the single next implementation step, I’d choose:\n\n**Build a Graphviz DOT exporter over `graph/assertions/`**\n\nWhy that first:\n- it uses the graph work we just added\n- it gives you immediate visual feedback\n- it helps reveal patterns before we over-design internal NEXUS visualization\n- it creates a bridge toward FnHCI instead of delaying it\n\nAfter that, I’d do:\n- a `discoveries/` or `concepts/` curation workflow\n- then the first FnHCI domain extraction pass\n\nSo the short version is:\n\n- external graph lens first\n- curated concept extraction second\n- FnHCI domain harvest third\n- internal UI substrate after that\n\nIf you want, I can make the next slice be the Graphviz exporter and a tiny `how-to` for generating `.dot` files from the current event store."

