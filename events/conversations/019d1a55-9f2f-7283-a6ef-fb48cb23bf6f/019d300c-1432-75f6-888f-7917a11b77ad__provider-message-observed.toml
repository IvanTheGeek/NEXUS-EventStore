kind = "plain_text"
text = "Given the way you’re framing NEXUS, I’d recommend `ProviderMessageObserved` as the v0 canonical name. If you want the shorter version, `MessageObserved` is the one I’d pick.\n\nWhy that name fits best:\n\n- `MessageImported` is too tied to one acquisition path. It becomes wrong or awkward once you add live capture, manual artifact hydration, or other provider intake paths.\n- `MessageRecorded` centers your system action, not the domain fact. It sounds like “we wrote something down,” not “this was encountered from a source.”\n- `Observed` is epistemically honest. It fits partial exports, missing artifacts, later revisions, and reparsing from raw sources.\n- In DDD/Event Modeling terms, the bounded context here is ingestion/provenance. The fact is not “a conversation happened” in the pure business sense, but “a provider message was observed by NEXUS from some acquisition source.”\n\nSo I’d lean toward this tone for the first layer:\n\n- `ProviderConversationObserved`\n- `ProviderMessageObserved`\n- `ProviderMessageRevisionObserved`\n- `ArtifactReferenced`\n- `ArtifactPayloadCaptured`\n- `ImportCompleted`\n\nThen later, in a different layer, you can have more semantically loaded events like:\n\n- `PromptSubmitted`\n- `ResponseReceived`\n\nThat separation keeps the ingestion layer truthful and keeps you from smuggling later ontology decisions into the base history too early.\n\nMy recommendation: use `ProviderMessageObserved` in the canonical event union, and allow a shorter label like `message_observed` in TOML if you want the files to stay readable."

