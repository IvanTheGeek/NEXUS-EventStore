text = "The next slice is in and pushed as `72621807`.\n\nYou can now verify a working slice back to canonical events and raw object refs with:\n\n```bash\ndotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- \\\n  verify-working-graph-slice \\\n  --import-id <uuid>\n```\n\nMain pieces:\n- [GraphWorkingVerification.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/GraphWorkingVerification.fs)\n- [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs)\n- [verify-working-graph-slice.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/verify-working-graph-slice.md)\n\nWhat it checks:\n- working-slice assertions exist\n- supporting canonical event IDs still exist\n- raw object paths still exist\n- assertion provenance still points at the expected import\n\nExit behavior:\n- `0` when the slice verifies cleanly\n- `2` when the provenance chain is broken\n- `1` for command/argument errors\n\nI also added the first reusable TOML string-list reader in [TomlDocument.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/TomlDocument.fs), which the verifier uses for provenance arrays.\n\nValidation is green:\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj`\n- `44` tests passed\n\nThe only remaining local changes are still the intentionally untracked real-data outputs under [NEXUS-EventStore/events](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/events), [NEXUS-EventStore/imports](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/imports), and [NEXUS-EventStore/graph](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph)."

