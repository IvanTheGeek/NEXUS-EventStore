text = "I found the practical seam.\n\n`PATH1.Row.V5.Visible` is now on the live `PATHS` page, built from the `V1` lineage that Penpot actually paints on-canvas. `V2`/`V3`/`V4` all still have valid text data, but Penpot’s live editor is not painting that newer text path reliably.\n\nPreview from export:\n![PATH1.Row.V5.Visible](/home/ivan/NEXUS/tmp/LaundryLog_PATH1_Row_V5_Visible_v2.png)\n\nWhat I now believe is happening:\n- `V1` lineage is canvas-paintable\n- newer plugin-built text lineage is visible in shape data and export paths, but not trustworthy on the live `PATHS` canvas\n- so for now, the readable live `PATHS` board should evolve from `V1`, not from the newer clean rebuild line\n\nI also cleaned up the temporary lab board and restored the temporary `V3` title mutation.\n\nDurable notes are committed:\n- NEXUS `penpot-surface-protocol`: `5d2193e1`\n  - [penpot-surface-comparison.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-surface-comparison.md)\n- CheddarBooks `laundrylog-fnhci-primitive-map`: `1458250`\n  - [penpot-projection.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-projection.md)\n  - [penpot-board-seed.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-board-seed.md)\n\nThe next thing to check is the live Penpot page itself:\n- `PATHS`\n- board: `PATH1.Row.V5.Visible`\n\nIf that row is painting live for you, I’ll use that visible lineage as the base for the next styling pass instead of fighting `V2`/`V3`/`V4` further."

