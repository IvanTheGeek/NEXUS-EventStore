[[body.segments]]
kind = "plain_text"
text = "`Verify` helps when the thing you care about is the *output shape*, not just a few booleans.\n\nIn this repo, that matters a lot because we generate:\n- TOML event files\n- import manifests\n- projections\n\nWith ordinary assertions, you end up writing lots of small checks like:\n- this field exists\n- this value equals `codex`\n- this count is `97`\n- this path is present\n\nThat works, but it gets tedious and easy to under-check.\n\nWith `Verify`, the test says more like:\n- “render this canonical event”\n- “render this manifest”\n- “rebuild this projection”\n- “compare the whole result to the approved snapshot”\n\nIf the output changes, the test shows a diff.\n\nSo in practical terms, it is very useful for us because:\n- canonical TOML is part of the product\n- projections are part of the product\n- formatting changes can matter\n- schema drift matters\n- it gives you a readable before/after diff instead of a vague failed assertion\n\nA simple mental model:\n\n- normal assertion tests answer:\n  “is this specific fact true?”\n- Verify tests answer:\n  “does this whole generated artifact still look like the thing we intended?”\n\nFor NEXUS, that is valuable because a lot of our behavior is file-emission behavior.\n\nExample use cases here:\n- a `ProviderMessageObserved` TOML file should stay structurally consistent\n- an `ImportManifest` should include the fields and counts we expect\n- a conversation projection should still render the right title, message count, and excerpt after parser changes\n\nWhy this helps you even if you are new to testing:\n- the approved snapshot file is human-readable\n- reviewing a diff is often easier than reading lots of assertion code\n- it doubles as living documentation of expected output\n\nThe caution:\n- snapshot tests are great for generated output\n- they are not enough by themselves for logic/invariants\n- that’s why I’d pair them with ordinary tests and later some `FsCheck`\n\nSo for us:\n- `Expecto` checks behavior and rules\n- `Verify` checks emitted artifacts\n- together they give better confidence than either one alone\n\nIf you want, I can show you a tiny example of what a Verify-style test would look like for one TOML manifest in this repo."

