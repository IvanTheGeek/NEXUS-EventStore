text = "Yes, the bottom badges are now being treated as `context / lens / audience` markers, not file-ish labels.\n\nThe live board now has a new readable row on the `PATHS` page:\n- `PATH1.Row.V4.Clean`\n\nCurrent badge meaning in that row:\n- screen rows: `ui lens`\n- command rows: `business`\n- event rows: `business`\n- view rows: `classic em`\n\nPreview:\n![PATH1.Row.V4.Clean](/home/ivan/NEXUS/tmp/LaundryLog_PATH1_Row_V4_Clean.png)\n\nI also made the Penpot findings durable:\n- NEXUS: [penpot-surface-comparison.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-surface-comparison.md)\n  - commit `da7e7ccd`\n- CheddarBooks: [penpot-projection.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-projection.md)\n- CheddarBooks: [penpot-slice-components.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-slice-components.md)\n- CheddarBooks: [penpot-board-seed.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-board-seed.md)\n  - commit `da687c2`\n\nOne important practical result from the lab: after a detach/local projection step, I would not treat Penpot as preserving a trustworthy back-link to the original component source. Also, `createText(\"...\")` worked, but the created text had to be explicitly resized or the export rendered it as if it were invisible.\n\nNo code tests were run because this was live Penpot work plus docs-only commits.\n\nThe next best move is to tighten the row itself:\n- shorten or lens-hide some property text so the cards breathe better\n- replace the screenshot placeholder with a real screen thumbnail\n- then decide whether the screen-row bottom badge should stay purely lens-oriented or also encode actor visibility separately"

