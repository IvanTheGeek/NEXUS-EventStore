text = "`Fork local` means:\n\n- new chat/thread\n- same local workspace/check-out\n- same files on disk\n- safest for discussion-only follow-up or very small work that will not conflict\n\n`Fork into worktree` means:\n\n- new chat/thread\n- separate git worktree\n- separate directory and checkout\n- much safer if both threads may edit code, docs, or branches independently\n\nPractical rule:\n\n- use `fork local` for analysis, review, or side discussion in the same working copy\n- use `fork into worktree` for real parallel implementation work\n\nIf you want isolation, choose `fork into worktree`. If you just want another conversation over the same checkout, choose `fork local`."

