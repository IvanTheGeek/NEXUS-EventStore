text = "The next slice is in and pushed as `8696303e`.\n\n`export-graphviz-dot` now supports explicit traceability gating for working-slice exports:\n- `--verification <none|traceable>`\n- `--objects-root <path>`\n\nThis is wired in [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs), documented in [export-graphviz-dot.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/export-graphviz-dot.md) and [cli-commands.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/cli-commands.md), and covered by tests in [GraphvizDotTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/GraphvizDotTests.fs) and [CliHelpTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/CliHelpTests.fs).\n\nBehavior now is:\n- `--verification traceable` is only allowed with `--working-import-id`\n- if verification is clean, export proceeds and reports verified supporting events/raw objects\n- if the provenance chain is broken, the command refuses to write the DOT file and exits with code `2`\n\nExample:\n\n```bash\ndotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- \\\n  export-graphviz-dot \\\n  --event-store-root /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore \\\n  --objects-root /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Objects \\\n  --working-import-id <import-id> \\\n  --verification traceable\n```\n\nValidation is green:\n- `dotnet build /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/NEXUS-Code.slnx`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj`\n- `46` tests passed\n\nI left the real event-store outputs uncommitted, so the only local changes still present are the intentionally untracked data under [NEXUS-EventStore/events](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/events), [NEXUS-EventStore/imports](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/imports), and [NEXUS-EventStore/graph](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph)."

