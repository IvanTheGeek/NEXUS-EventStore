text = "we are using html,css,js heavy now, however, my plan is to move most of the js into F# in a bolero and emish way of dealing with ui. The js will just be the min needed for glue. That would lead me more towards expecto. What i am currently thinking is that we use `JS/TS Playwright Test` as the primary browser testing. We also setup a seperate `Playwright .NET + Expecto` project where we base the needs there as ideomatic F# ideas and build it based on what we are using in the `JS/TS Playwright Test`  that will end up giving us parody of the `JS/TS Playwright Test` system but done in the F# functinoal way. So we are not blocked using `JS/TS Playwright Test` and `Playwright .NET + Expecto` might get blocked or significally re-thought when needed."

