kind = "plain_text"
text = "`xxd` is a command-line hex dump tool.\n\nIt shows a file’s raw bytes in hexadecimal, often alongside an ASCII view. It’s useful when you want to inspect exact byte-level content rather than interpreted text.\n\nExample:\n```bash\nxxd -l 32 somefile.txt\n```\n\nThat means:\n- `-l 32` = show only the first 32 bytes\n\nWhy I used it here:\n- to check whether a generated file started with a UTF-8 BOM\n- a BOM would show up as bytes `ef bb bf`\n- after the fix, the file started with `2b 2b 2b`, which is `+++`\n\nSo `xxd` is basically a quick byte-inspection/debugging tool."

