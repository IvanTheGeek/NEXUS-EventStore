text = "Yes, I think that’s the right reading: separate visible terms for each context, not one universal visible word forced across all of them.\n\nSo the structure would be:\n\n- one deeper shared logic underneath\n- different visible labels per context on the page\n\nThe deeper shared logic stays something like:\n- change/progression side\n- state/view side\n\nBut the page itself would use context-native words.\n\nSo in practice, it could look like this.\n\n`ApplicationLifecycle` column:\n```text\n[App Runtime] [ApplicationLifecycle] [Lifecycle] [System]     BOOT\nStep 01 · 01-app-started\nAppStarted\n\n[SCREEN] Splash\n[LIFECYCLE] AppStarted\n```\n\n`RuntimeOrchestration` column:\n```text\n[App Runtime] [RuntimeOrchestration] [Runtime] [System]      BOOT\nStep 04 · 04-route-resolved\nRoute Resolved\n\n[SCREEN] Splash\n[ROUTE] Need Location resolved\n```\n\n`ScreenPath` column:\n```text\n[Interaction] [ScreenPath] [Screen] [User]                    SCREEN\nStep 06 · 06-ready-to-set-location\nReady To Set Location\n\n[SCREEN] Ready To Set Location\n[DRAFT] Location text entered\n```\n\n`EventModeling` command column:\n```text\n[Business] [EventModeling] [AEM] [User]                       COMMAND\nStep 07 · 07-capture-laundry-location\nCaptureLaundryLocation\n\n[SCREEN] Ready To Set Location\n[COMMAND] CaptureLaundryLocation\n[EVENT] LaundryLocationCaptured\n```\n\n`EventModeling` view column:\n```text\n[Business] [EventModeling] [AEM]                              VIEW\nStep 08 · 08-current-laundry-session-location\nCurrentLaundrySession\n\n[SCREEN] Entry Form Ready\n[VIEW] CurrentLaundrySession\n```\n\nSo the visible words are separate for each context:\n- lifecycle uses lifecycle-ish terms\n- runtime uses runtime-ish terms\n- screen path uses screen/draft/ready-ish terms\n- AEM keeps command/event/view terms\n\nWhat stays shared is the deeper pattern:\n- some boxes are about change/progression\n- some boxes are about resulting/visible state\n\nThat means we do not need to force a visible universal label like `STATE` everywhere.\n\nI think that’s a stronger direction.\n\nThe next thing to decide, when you want to, is the concrete label set for the non-AEM contexts:\n- what exact words should lifecycle/runtime/screen-path use inside their boxes so they feel as good and as intentional as `COMMAND`, `EVENT`, and `VIEW` do in AEM."

