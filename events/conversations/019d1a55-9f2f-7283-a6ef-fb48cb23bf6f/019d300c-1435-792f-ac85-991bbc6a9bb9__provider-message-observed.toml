text = "It aligns well with what we already have, with one important boundary: this is ontology-layer meaning, not ingestion-layer history.\n\nWhat already fits:\n- Your “Node stays structural, meaning is layered on top” matches [Graph.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Domain/Graph.fs) and [nexus-core-conceptual-layers.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/nexus-core-conceptual-layers.md). We already separated structure from `Domain`, `BoundedContext`, and `Lens`.\n- “Projection is derived, not source truth” already matches [glossary.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/glossary.md) and the projection docs.\n- “Do not overcollapse write/read into a pipeline” is also aligned with the repo direction so far.\n\nWhere I’d be careful:\n- In this repo, `Event` in [CanonicalHistory.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Domain/CanonicalHistory.fs) currently means an append-only observed-history record. Your new “Event = Imprint interpreted in a time-based domain” is a different bounded-context meaning. That is okay, but we should explicitly document the term collision.\n- We do not yet have a first-class `Role` or `Meaning` abstraction in code. So “Imprint is a role, not structure” fits conceptually, but the codebase is not modeling that directly yet.\n- I would not jump straight to a hardcoded `NodeRole = Imprint | Event | Fact | ...` union unless we’re sure those names are stable. Right now a `RoleId` or `MeaningId` slug-based abstraction is safer.\n\nSo: is it time for a new base library? My answer is “yes, internally; not yet as the base of all NEXUS projects in a final sense.”\n\nWhat I’d recommend now:\n- Create a new project inside this repo, not a separate repo yet.\n- Make it a tiny kernel, something like `Nexus.Kernel` or `Nexus.Semantics`.\n- Put only the stable concepts there:\n  - `Node`\n  - `RoleId` or `MeaningId`\n  - `DomainId`\n  - `BoundedContextId`\n  - `LensId`\n  - relations like `Derivation`, `Interpretation`, maybe `Causality`\n  - constants like `imprint`\n- Do not move importer/event-store concerns into it.\n- Do not freeze `Event`, `Fact`, `Record`, `Projection` as universal primitives yet.\n\nSo the timing is:\n- new internal kernel project: yes, probably now\n- separate reusable foundational library for all future NEXUS projects: almost, but I’d wait until this imprint model is exercised in at least two real domains, not just ingestion\n\nThe next smart move is to write this down as a repo ontology note first, then carve the minimal kernel project from that note. If you want, I can draft that ontology alignment doc and the proposed `Nexus.Kernel` surface next."

