text = "I searched the actual imported chat history, and the strongest reference is [019d174f-2ce1-7496-a7f3-2e5cae80727e.toml](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/projections/conversations/019d174f-2ce1-7496-a7f3-2e5cae80727e.toml). That thread supports exactly the correction you made:\n\n- `FnHCI` at the top, with `FnUI`, `FnCLI`, `FnAPI`, and `FnA11y` under it\n- concrete naming like `FnUI.Blazor`, `FnUI.HTML`, and `FnUI.android`\n- the explicit idea that `FnUI` may be the NuGet/marketing term over `FnHCI.UI.Blazor`\n\nSo I corrected the FnUI branch docs to match that recorded direction and pushed it as `935d13c0` on `fnui-foundation`.\n\nUpdated docs:\n- [fnhci-namespace-map.md](/tmp/nexus-merge-M7SKP3/docs/fnhci-namespace-map.md)\n- [fnui-foundation.md](/tmp/nexus-merge-M7SKP3/docs/fnui-foundation.md)\n- [0015-fnhci-owns-the-top-interaction-namespace.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0015-fnhci-owns-the-top-interaction-namespace.md)\n- [fnhci.md](/tmp/nexus-merge-M7SKP3/docs/concepts/fnhci.md)\n- [glossary.md](/tmp/nexus-merge-M7SKP3/docs/glossary.md)\n\nThe model is now:\n- `FnHCI` owns the top interaction concern and namespace\n- the Bolero-replacement line belongs under that namespace\n- `FnUI` is the narrower visual system/package line, likely over `Nexus.FnHCI.UI.Blazor`\n\nI did not run build/tests on this last step because it was docs-only.\n\nThe next strong move is to turn that map into the first code/module scaffold:\n- `Nexus.FnHCI`\n- `Nexus.FnHCI.UI`\n- `Nexus.FnHCI.UI.Blazor`"

