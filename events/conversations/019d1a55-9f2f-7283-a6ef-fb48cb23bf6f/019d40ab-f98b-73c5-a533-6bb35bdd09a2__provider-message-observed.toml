[[body.segments]]
kind = "plain_text"
text = "`Ideas` looks like the right category, and I didn’t find a visible discussion-specific template/form to obey. Their Discussions categories are `General`, `Ideas`, `Polls`, `Q&A`, and `Show and tell`, and similar “suggest docs/improve UX” posts already appear under `Ideas`. Sources: [VerifyTests Discussions](https://github.com/orgs/VerifyTests/discussions), [issue config](https://github.com/VerifyTests/Verify/blob/main/.github/ISSUE_TEMPLATE/config.yml).\n\nHere’s a discussion draft you can paste:\n\n**Category:** `Ideas`\n\n**Title**  \nImprove F# / Expecto docs and clarify text snapshot encoding conventions\n\n**Body**\n```md\n## Summary\n\nI’ve been using Verify from F# with Expecto, and I think there’s an opportunity to make that path easier to discover and understand.\n\nThe current docs are useful, and I may have missed some existing guidance, but a few things were not obvious until I dug further than I expected.\n\n## What was confusing\n\nFrom the perspective of an F# / Expecto user, it would help to have clearer guidance on:\n\n- the recommended minimal setup for Verify + Expecto\n- the expected approval/update flow in that stack\n- text snapshot file conventions\n- the fact that text snapshots are written as UTF-8 with BOM\n- whether BOM in `.verified.*` files is expected behavior or something to “fix”\n\nThis led to extra investigation just to confirm whether generated files were correct.\n\n## What would help\n\nA few documentation improvements would go a long way:\n\n- a clearer F# + Expecto setup example\n- a small end-to-end example showing:\n  - test code\n  - generated `.received.*` / `.verified.*` files\n  - the expected review/approval flow\n- a more visible note about text snapshot file conventions\n- an explicit statement that text snapshots are written as UTF-8 with BOM\n- a brief explanation of why that choice exists / what users should expect in editors and diffs\n\n## Why this matters\n\nThis would make the F# / Expecto path easier to adopt and reduce the need to inspect generated files at the byte level just to understand expected behavior.\n\nIt would also help separate:\n- intended Verify behavior\n- editor/tooling display differences\n- actual snapshot problems\n\n## Possible docs additions\n\nAny of these would help:\n\n- expand the existing README Expecto section\n- add a dedicated F# + Expecto doc page\n- add a short text snapshot file conventions doc page\n- add a small BOM / encoding troubleshooting note\n\n## Example of the clarification I was looking for\n\nSomething as simple as this would have helped:\n\n- Verify text snapshots are written as UTF-8 with BOM.\n- This is expected behavior.\n- Editors and diff tools may display this differently.\n- If you inspect the raw bytes, the BOM appears as `EF BB BF`.\n\nIf this would be welcome, I’d be happy to turn it into a more concrete docs PR proposal.\n```\n\nIf you want, I can also turn this into a shorter, more maintainer-friendly version."

