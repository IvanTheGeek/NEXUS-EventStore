text = "Yes. That’s exactly the right rule, and I’ve recorded it on `main` in commit `0119100c`.\n\nUpdated docs:\n- [collaboration-protocol.md](/tmp/nexus-merge-M7SKP3/docs/collaboration-protocol.md)\n- [run-tests.md](/tmp/nexus-merge-M7SKP3/docs/how-to/run-tests.md)\n\nThe explicit guidance now is:\n- don’t run parallel `dotnet build`/`dotnet run`/`dotnet test` against the same project path if they share `bin/` and `obj/`\n- prefer one build, then `--no-build` for parallel follow-up runs\n- if true parallelism is needed, isolate by project or worktree\n\nThat turns the MSBuild file-copy contention we saw into a durable repo rule for future AI and humans.\n\nI didn’t rerun tests for this last step because it was docs-only."

