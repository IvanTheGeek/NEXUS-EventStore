kind = "plain_text"
text = "Yes. It fits cleanly if we treat Talkyard as one platform with multiple instances and multiple acquisition paths.\n\n**Model**\nI’d model Talkyard across these separate dimensions:\n\n- platform: `talkyard`\n- instance: `talkyard.ivanthegeek.com` vs `forum.talkyard.io`\n- acquisition kind: `web-scrape` vs `api-pull`\n- auth scope: `public` vs `your-user` vs `admin`\n- underlying objects: thread, post, category, attachment\n\nThe important rule is:\n- scrape and API are separate observations of the same possible underlying discussion\n- preserve them separately first\n- reconcile them explicitly later\n\nThat matches the overlap rule we already adopted.\n\n**Flows**\nI think this becomes five distinct flows:\n\n1. Talkyard scrape capture flow\n   - preserve raw HTML, discovered links, timestamps, and extracted structured IDs\n   - record which instance and auth scope produced the capture\n\n2. Talkyard API capture flow\n   - preserve raw JSON and request metadata\n   - same instance/auth metadata\n\n3. Talkyard normalization flow\n   - normalize both scrape and API into the same canonical conversation/message style model\n   - likely `forum-thread` + `message` first\n\n4. Talkyard overlap reconciliation flow\n   - exact match first: same instance + native thread/post IDs or canonical URL\n   - fuzzy fallback later: title, time window, author handle, content similarity\n   - never silently collapse scrape into API or vice versa\n\n5. Talkyard outbound publication flow\n   - separate from ingestion\n   - same platform/instance vocabulary, different bounded context\n   - later NEXUS can publish to Discord or Talkyard without mixing “sent” with “observed”\n\n**What We Need Before Real Talkyard Intake**\nThe missing piece in our current model is a source-instance dimension. `talkyard` alone is not enough once we care about both your hosted instance and `forum.talkyard.io`.\n\nSo my recommended next implementation order is:\n\n1. Add `source_instance` or `source_authority` to LOGOS/import metadata.\n2. Add an explicit `acquisition_kind` allowlist:\n   - `web-scrape`\n   - `api-pull`\n   - maybe later `manual-export`\n3. Add a Talkyard raw-capture manifest shape.\n4. Implement scrape intake first, since it works now.\n5. Implement API intake second.\n6. Add Talkyard overlap-candidate reporting between scrape and API imports.\n7. Later add outbound/publication planning as a separate concern.\n\nMy recommendation is to do `1` and `2` next, before writing the first scraper. That keeps the architecture honest before real Talkyard data starts landing."

