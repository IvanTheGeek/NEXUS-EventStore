[[body.segments]]
kind = "plain_text"
text = "something we need to think about is that the raw data imports might contain data that should NOT be public, or might be data that the source might not WANT public. Examples would be my GPT chats might have chats that are not related to NEXUS topics. It might be a personal chat I did that has no reason to be available to NEXUS folks. Second, when we are ingesting data from users of apps, they might agree to allow their data to be shared with me, but that data might need redacted, anonomized, or somehow other way made safe to be made public. A user giving me full access to their CheddarBooks event store in order to do debugging or fix their problem, but thier actual financial and business address, etc should not be made part of the public record. Those type of concerns."

