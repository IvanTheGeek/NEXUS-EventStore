text = "Artifact projections are in and pushed as `3ec7166` on `codex/nexus-ingestion-foundation`.\n\nThe new rebuildable read model lives in [ArtifactProjections.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/ArtifactProjections.fs), with CLI wiring in [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs). It writes one file per artifact stream under [NEXUS-EventStore/projections/artifacts](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/projections/artifacts), including provider IDs, file name, reference disposition, capture count, payload-captured status, and latest captured path. A good example is [019d174f-2c81-71e3-9cec-527f951cd6cf.toml](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/projections/artifacts/019d174f-2c81-71e3-9cec-527f951cd6cf.toml).\n\nI added the rebuild command docs here:\n- [rebuild-artifact-projections.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/rebuild-artifact-projections.md)\n\nVerification was clean: [Nexus.Cli.fsproj](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj) builds with `0` warnings and `0` errors, and the real event store rebuild wrote `305` artifact projection files. Since the committed store doesn’t yet have any real manual payload captures, those projections currently show `payload_captured = false`, which is exactly what we’d expect. The branch is fully synced."

