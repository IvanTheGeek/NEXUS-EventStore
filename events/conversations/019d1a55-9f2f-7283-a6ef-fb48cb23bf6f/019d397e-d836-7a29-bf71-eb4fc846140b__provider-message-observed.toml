text = "another thought is that I feel a lot of the struggle with Event Modeling adoption is that Adam and Martin are not seperating the lenses and contexts. When a developer is looking at the event model, they are thinking about implimentation, when a UI person is looking at it, they are thinking about the components of the screen and each change of whats on the screen, etc. I know that was very had for me to grasp. Still is. That is where ATLAS comes in, the enviroment where each of those concerns and be chosen to be looked at or not. this is creating seams and I see it as being just the full model rather than an \"Event Model\". EM has is place and its lenses and contexts, but it is filtering the full true model. If I am able to model all aspects like runtime, UI, information flow, business rules, business flows, UX, target devices, etc, then when that model is built out enough and complete enough, there are the proper specs to build the code and the artifacts. Linking PATHS in penpot provides data to ingest for paths in the model. The sample data can put in there and that provides not only a human story to follow but also the example data needed for testing. The graphic designer can make designs and design systems and tokens that can build the model data and fill it in. the customer can provide feedback that shapes the model on how they wish a task was able to be completed, it fills in the model. I can point you or other AI at a github repo and we can build out the different layers of an app (like talkyard) that starts to fill in the model from various concerns. once that model is complete enough, I can have it rebuilt in F# or whatever and create my own codebase and then running artifacts as executables.  That is what I am trying to get to."

