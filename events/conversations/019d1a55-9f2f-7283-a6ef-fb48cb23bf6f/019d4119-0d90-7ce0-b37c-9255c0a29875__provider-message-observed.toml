[[body.segments]]
kind = "plain_text"
text = "You’re right. I was still flattening it into a false linear chain.\n\nAfter rereading the docs, the better reading is:\n\n- a `COMMAND` slice contains intent/change and culminates in an `EVENT`\n- a `VIEW` slice is a read/interpretation slice justified by prior event(s)\n- the `VIEW` does not have to immediately follow the event-producing command\n- multiple `VIEW` slices can consume the same prior event\n\nThat’s consistent across:\n- [command-view-primitive-seam.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/command-view-primitive-seam.md)\n- [views.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/views.md)\n- [penpot-slice-components.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-slice-components.md)\n- [html-nm-path-renderer-proving-ground.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/html-nm-path-renderer-proving-ground.md)\n\nSo for `Step 01`, I would now say:\n\n- slice title: `LaunchApp`\n- slice type: `COMMAND`\n- produced event inside that slice: probably `AppStarted`\n\nNot:\n- `LaunchApp -> AppStarted -> StartupSplash`\nas a single immediate chain\n\nBetter:\n- `Step 01-launch-app` is the command slice\n- it produces `AppStarted`\n- later view slices may consume `AppStarted` through `VIEW GWT`\n\nOn the naming itself:\n\n- `AppLaunched` still feels too close to the trigger/command side\n- `AppStarted` still feels better as the event fact\n- strongest alternative, if we want a little more precision, is `StartupBegan`\n\nSo my revised ranking for the event name inside `Step 01` is:\n\n1. `AppStarted`\n2. `StartupBegan`\n3. `AppLaunched`\n\nAnd the key distinction is:\n\n- `LaunchApp` = command\n- `AppStarted` = resulting event\n- any splash/runtime screen is a later view consumer, not the third link in one fixed triplet\n\nNo code changes yet. If you want, next I can propose the corrected names for the whole startup segment in this command/event-consumption frame instead of the old chained one."

