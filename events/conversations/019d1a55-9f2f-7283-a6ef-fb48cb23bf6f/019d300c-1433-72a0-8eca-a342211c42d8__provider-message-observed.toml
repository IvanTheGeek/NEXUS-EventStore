text = "Parser-v1 is committed and pushed as `c31a1e6` on `codex/nexus-ingestion-foundation`, and the branch is fully synced with GitHub.\n\nThe main code changes are in [Providers.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Importers/Providers.fs) and [ImporterTypes.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Importers/ImporterTypes.fs). This bumps the active normalization baseline to `provider-export-v1` and improves extraction so Claude and ChatGPT messages prefer real human-visible text over raw JSON-ish wrapper content. I also updated the wire-format/docs in [v0-layout-and-toml.md](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/docs/v0-layout-and-toml.md) and [import-provider-export.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/import-provider-export.md).\n\nI applied the new parser to the real event store and rebuilt projections. That appended reparse observations, not fake revisions:\n- Claude: `3241` reparses, `0` revisions\n- ChatGPT: `5103` reparses, `0` revisions\n\n`dotnet build` for [Nexus.Cli.fsproj](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj) is green, and the projection output is noticeably cleaner now. The next sensible step is either manual artifact hydration support or a first pass at richer projections over the cleaner canonical history."

