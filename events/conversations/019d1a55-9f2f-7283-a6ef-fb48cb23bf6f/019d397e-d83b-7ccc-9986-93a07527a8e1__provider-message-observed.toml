text = "NEXUS is updated with the new terminology slice in commit `d7f2e0abc31689aec04293553472d85f20eb81e2` (`docs: formalize interaction concern lines and lenses`).\n\nFiles added/updated:\n- [interaction-concern-lines-contexts-and-lenses.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/interaction-concern-lines-contexts-and-lenses.md)\n- [nexus-core-conceptual-layers.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/nexus-core-conceptual-layers.md)\n- [glossary.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/glossary.md)\n- [fnhci.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/concepts/fnhci.md)\n- [index.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/index.md)\n- [README.md](/home/ivan/NEXUS/NEXUS-EMERGING/README.md)\n\nThe chain I’d now use for what we’re doing is:\n\n- `FnHCI`\n  The broader interaction-system area.\n- `FnUI`\n  One projection family inside `FnHCI`.\n- `ApplicationLifecycle`\n  Where things like `AppStarted` belong.\n- `RuntimeOrchestration`\n  Where startup checks, hydration, route choice, and UI/business coordination belong.\n- `ScreenPath`\n  Where ordered user-visible states belong, like `Need Location -> Entry Form Ready -> Washer Draft -> Logged Success`.\n- `InteractionComposition`\n  Where the actual surface is built from reusable parts, tokens, layout rules, and state. Our current HTML/CSS LaundryLog screen work lives here.\n- `EventModeling`\n  Where the business commands, events, and business views belong, like `CaptureLaundryLocation`, `LaundryLocationCaptured`, `LogLaundryExpense`, `LaundryExpenseLogged`, and `CurrentLaundrySession`.\n\nAnd the lens mapping over that is:\n\n- `AEM Lens`\n  Business Event Modeling view.\n- `App Runtime Lens`\n  Lifecycle plus orchestration.\n- `Screen Path Lens`\n  Ordered visible screen flow.\n- `Interaction Composition Lens`\n  How the surface is built.\n\nSo the current LaundryLog screen work is not “the whole truth.” It is:\n- mainly `InteractionComposition`\n- ordered by `ScreenPath`\n- triggered and routed through `ApplicationLifecycle` and `RuntimeOrchestration`\n- and woven against the business truth in `EventModeling`\n\nThat exact explanation is now written into [interaction-concern-lines-contexts-and-lenses.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/interaction-concern-lines-contexts-and-lenses.md) under the chain/example sections so future agents can pick it up directly.\n\nOne small note: [README.md](/home/ivan/NEXUS/NEXUS-EMERGING/README.md) still has separate unstaged local edits below this doc-spine change, and I left those alone. No tests were run because this was docs-only."

