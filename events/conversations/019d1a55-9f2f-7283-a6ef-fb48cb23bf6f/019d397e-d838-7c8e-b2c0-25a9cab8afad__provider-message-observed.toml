[[body.segments]]
kind = "plain_text"
text = "Your screenshot confirms the stronger version of the bug.\n\nWhat we know now:\n- `LibraryComponent.instance()` is the right seam for Assets-style placement\n- the live shape data for `PATH1.Row.V6.InstanceBased` contains all the correct overrides\n- but the live canvas is still painting the master/default text\n- and the export path is also painting the master/default text\n\nSo this is now clearly **not**:\n- a missing override write\n- a bad component-instance creation path\n- or a PATHS-page-only invisible-text problem\n\nIt is now:\n- **Penpot is storing the instance text overrides, but not rendering them**\n\nI just verified the actual stored values for `PATH1.Row.V6.InstanceBased`, and they are correct. For example the first command instance is storing:\n- `Header.Title = \"Capture Laundry Location\"`\n- `Header.Description = \"manual location entry starts the path\"`\n- `Data.Title = \"CaptureLaundryLocation\"`\n- `Data.Properties = location_name ...`\n\nBut the canvas is still showing:\n- `myCommand`\n- `description`\n- `amount = 42.50`\n\nSo we’ve isolated the issue much better.\n\n**Current conclusion**\n- `instance()` is still the correct higher-on-the-ladder workflow\n- but Penpot currently has a render-sync problem for these instance text overrides in this plugin-driven path\n- that means the current blocker is not our model, it is Penpot’s rendering/override behavior\n\n**What I recommend next**\n1. Keep using `CommandSlice.Clean.V3` and `ViewSlice.Clean.V3` as the right base components.\n2. Treat `PATH1.Row.V6.InstanceBased` as the best minimal repro.\n3. We should record this durably and likely post it upstream as a new focused Penpot bug:\n   - component instance text overrides are stored in live shape data\n   - but canvas and export still render master text\n\nIf you want, I’ll do two things next:\n- write the durable repo note correction\n- draft the exact GitHub/forum bug report text for this new, much tighter repro"

