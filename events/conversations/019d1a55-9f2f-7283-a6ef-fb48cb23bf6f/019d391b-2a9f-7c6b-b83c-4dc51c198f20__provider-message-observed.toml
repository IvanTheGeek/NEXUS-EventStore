kind = "plain_text"
text = "Yes. For a thing like `AppStarted`, I would call the concern:\n\n- `Application Lifecycle`\n\nThat’s the cleanest name if the event/step is about:\n- app launched\n- resumed\n- suspended\n- hydrated\n- routed\n- ready\n- failed startup\n- offline check complete\n- sync started/finished\n\nSo I’d separate it like this:\n\n- concern line: `Application Lifecycle`\n- lens over it: `App Runtime Lens`\n\nExamples:\n- `AppStarted`\n- `StartupChecksCompleted`\n- `LocalStateHydrated`\n- `InitialRouteResolved`\n- `AppResumed`\n\nWhy this is better:\n- `AppStarted` is fundamentally lifecycle-ish\n- `runtime` is the broader lens/context\n- `infrastructure` is too low-level\n- `operations` sounds like DevOps/admin work\n- `program control` is too compiler-ish / abstract\n\nSo the neat pairing is:\n- concern: `Application Lifecycle`\n- lens: `App Runtime Lens`\n\nIf you want one single umbrella term only, I’d still choose:\n- `Application Lifecycle`\n\nbecause `AppStarted` fits that immediately and naturally."

