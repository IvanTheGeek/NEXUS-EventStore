[[body.segments]]
kind = "plain_text"
text = "`inherited text edits did not export/render reliably` i would like to investigate why this is. I have personally had some issues changing text as well. The text in the box can also be different than the text in the element tree also, which can add to confusion. Are there some tests/experiments we can perform to nail this down. My friction on this is that we will have stages of components that also may end up being tokens, and if we are replacing text boxes that have been designed as being a certain way and have tokens applied, ploping a new textbox in may not preserve the intent for that box. I am also thinking there will be intermediate stages or components where reuse is going to be happening so that the lest amount customization is needed when we are putting same data and screens that have components in different states. A button is likely yo have several states associated with it, a next screen in the next slice may only be a button state change (especially when in a UI lens enviroment)."

