text = "Yes. The Assets-tab workflow has a real API equivalent, and I had not leaned on it enough before.\n\nThe explicit call is `LibraryComponent.instance()`. That is the programmatic match for dragging a component from Assets onto a page. The `V3` slices you kept on `PATHS` are already real connected component instances, which fits what you were seeing with `Ctrl-D`.\n\nSo my current read is:\n\n- latest practical live `PATHS` row:\n  - `PATH1.Row.V5.Visible`\n  - this is still the safest readable row because it comes from the only lineage Penpot is painting reliably on the live canvas\n\n- latest clean reusable slice bases:\n  - `CommandSlice.Clean.V3`\n  - `ViewSlice.Clean.V3`\n\n- best next working seam:\n  - instantiate `V3` from the library onto `PATHS`\n  - then override instance text/layout there\n  - rather than rebuilding rows from fresh boards/text\n\nI also added live instance labs on `PATHS`:\n- `CommandSlice.Clean.V3.InstanceLab`\n- `ViewSlice.Clean.V3.InstanceLab`\n\nOne important caveat:\n- the live shape data is accepting instance text overrides\n- but the export render path is still showing master/default text in the current instance-lab test\n- so right now, `instance on canvas` looks like the right seam, while `export` is still not fully trustworthy for override verification\n\nSo yes, your instinct is right:\n- don’t move the only bases off `Components`\n- use them as assets and instantiate them onto `PATHS`\n- that keeps us higher on the ladder and closer to how Penpot itself wants this used\n\nI recorded that durably too:\n- NEXUS `d4dd068f`\n- CheddarBooks `f428021`\n\nIf you want, the next move is for me to stop working from `V5` and instead build a fresh `PATH1` row from `CommandSlice.Clean.V3` and `ViewSlice.Clean.V3` instances only."

