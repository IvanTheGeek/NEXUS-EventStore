text = "ok, so for talkyard, I have my own hosted instance at talkyard.IvanTheGeek.com which we _can_ get api access to. There is also forum.talkyard.io which is their side. I have been in chats with the Dev of talkyard about Event Modeling talkyard and contributing to his project rather than roll my own entire forum and 'compete' in the forum space. I might end up doing so, but I would rather contribute to talkyard where the Dev wants the help and makes the decision that what I want and need fit into his vision. I will simply build on top any changes needed. So the real open source idea with contruibutions. Point being, is currently, we would have to intake data from forum.talkyard.io as my user, which may not have API access. In the future, that might change, so we want to be able to scrape as me the web interface, be able to ingest via the talkyard api, and also be able to reconsile the web scrape vs api access at some point. want to plan out how this fits into our overall ingestion plan?"

