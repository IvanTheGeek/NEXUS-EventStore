text = "The first real importer slice is in, committed, and pushed as `4c65314` on `codex/nexus-ingestion-foundation`.\n\nKey pieces:\n- [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs)\n- [Nexus.Importers.fsproj](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Importers/Nexus.Importers.fsproj)\n- [ImporterTypes.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Importers/ImporterTypes.fs)\n- [Providers.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Importers/Providers.fs)\n- [EventStoreIndex.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Importers/EventStoreIndex.fs)\n- [ImportWorkflow.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Importers/ImportWorkflow.fs)\n- [import-provider-export.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/import-provider-export.md)\n\nWhat it does now:\n- archives provider zips into `NEXUS-Objects/providers/...`\n- updates stable `latest/` raw snapshots\n- parses ChatGPT and Claude `conversations.json`\n- writes canonical observed-history events into [NEXUS-EventStore/events](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/events)\n- writes import manifests into [NEXUS-EventStore/imports](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/imports)\n- dedupes by provider object identity plus canonical content hash\n- emits revision events if a known message changes\n\nVerified on your real data:\n- Claude full export: 119 conversations, 3241 messages, 286 artifact refs, 3600 new events\n- ChatGPT full export: 75 conversations, 5103 messages, 68 artifact refs, 5249 new events\n- Claude re-import test: only 3 new import-stream events, 3646 duplicates skipped, 0 revisions\n\nA couple of practical notes:\n- raw intake/object-store paths are now ignored in [.gitignore](/home/ivan/NEXUS/NEXUS-EMERGING/.gitignore)\n- the canonical event-store output is committed in this branch\n- the branch is clean and synced to GitHub\n\nThe next natural move is either dedupe/revision refinement from the real data we just imported, or adding rebuildable projections over the new canonical event store."

