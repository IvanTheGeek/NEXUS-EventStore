[[body.segments]]
kind = "plain_text"
text = "Probably not because there are **three files** specifically.\n\nMore likely it is because there is already **an active MCP transport connection** from the Penpot plugin, and this server appears to allow only one live connection at a time.\n\nThe error we got is the key clue:\n\n- `Already connected to a transport. Call close() before connecting to a new transport`\n\nThat points to:\n- one plugin session already connected\n- Codex then trying to connect as a second client\n- the server refusing the second connection\n\nSo the likely rule is:\n\n- **not** “three tabs is inherently bad”\n- **yes** “one or more open plugin instances may already be holding the single live MCP connection”\n\nIn practice:\n- if even one tab has the plugin connected, that may be enough to block me\n- three tabs just makes it more likely that at least one connection is still active\n\nWhat I also confirmed:\n- the backend API does expose live export at:\n  - [http://localhost:9001/api/main/methods/export-binfile](http://localhost:9001/api/main/methods/export-binfile)\n- but it requires auth\n- my unauthenticated probe got:\n  - `401 Unauthorized`\n\nSo right now:\n\n- MCP path is blocked by the active plugin connection\n- backend export path is real, but blocked until we use auth\n\nBest next options:\n1. Disconnect the Penpot plugin in all tabs temporarily, then I try MCP again.\n2. Create/give me a Penpot access token, and I can try backend export directly.\n3. You export manually for now, and we keep using the file as the snapshot surface.\n\nSo short answer:\n- **probably not the tabs themselves**\n- **more likely the active plugin connection in one or more tabs**"

