kind = "plain_text"
text = "Yes.\n\nThe detection/refresh behavior on the page itself has to be browser-side JavaScript, because it needs to:\n\n- poll the companion update manifest file\n- compare versions\n- show `update available`\n- remember `notify` vs `auto refresh`\n- trigger `window.location.reload()` when appropriate\n\nThe F# side’s job is:\n- generate the HTML\n- generate the companion manifest file\n- embed the small JS needed for the browser behavior\n\nSo the structure is:\n\n- `F#`\n  defines and emits the artifact\n- `HTML/CSS`\n  renders the page\n- `JavaScript`\n  handles live page behavior like polling, toggles, and refresh\n\nThat’s the right seam here."

