[[body.segments]]
kind = "plain_text"
text = "That helps a lot. I think the semantics are becoming:\n\n- new first slice:\n  a user-caused trigger/change slice\n- `AppStarted`:\n  a separate event slice\n- the current splash-visible column:\n  really a read/view/result slice, not the event itself\n\nSo if we model this honestly in AEM-style terms, the first startup run probably becomes:\n\n1. user launch trigger\n2. `AppStarted`\n3. splash/boot read state\n4. runtime-checks change\n5. runtime-checks read state\n6. no-local-session change or finding\n7. no-local-session read state\n8. route-resolved change\n9. need-location read state\n\nThat is much more rigorous than the current mixed NM columns.\n\nI also agree with your naming instinct:\n- `intent` feels too abstract here\n- `command` might work better for the first user-caused startup slice\n- and the top compartment for that first slice probably should not be `SCREEN`\n\nMy current recommendation for the first slice is:\n- whole-column classification: `COMMAND`\n- top compartment label: `TRIGGER`\n\nReason:\n- `COMMAND` says this slice is the initiating change\n- `TRIGGER` says the upper compartment is showing what caused the slice, not a resulting screen\n\nThe two decisions that now matter most are:\n- do we apply this strict change/read split only to the startup segment first, or to the whole NM path now\n- for the first launch slice, do you want `COMMAND + TRIGGER`, or a different visible pair"

