text = "The next slice is in and pushed as `a880a6f3`.\n\nYou can now rebuild the SQLite working index from existing working slices with:\n\n```bash\ndotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- \\\n  rebuild-working-graph-index\n```\n\nThat rebuild path lives in [GraphWorkingIndex.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/GraphWorkingIndex.fs), the CLI wiring is in [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs), and the runbook is here:\n- [rebuild-working-graph-index.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/rebuild-working-graph-index.md)\n\nIt makes the SQLite layer properly rebuildable from `graph/working/imports/...`, which keeps it aligned with the NEXUS rule that indexes are derived working structures, not truth. I also added coverage for both help text and the real rebuild behavior in [CliHelpTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/CliHelpTests.fs) and [GraphWorkingIndexTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/GraphWorkingIndexTests.fs).\n\nValidation is green:\n- `dotnet build /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/NEXUS-Code.slnx`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj`\n- `41` tests passed\n\nThe only remaining local changes are still the intentionally untracked real-data outputs under [NEXUS-EventStore/events](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/events), [NEXUS-EventStore/imports](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/imports), and [NEXUS-EventStore/graph](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/graph)."

