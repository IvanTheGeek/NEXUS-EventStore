kind = "plain_text"
text = "Investigated and recorded.\n\nReal finding:\n- the problem was not F# string interpolation itself\n- the real issue was using raw `dotnet fsi` in REPL mode via shell heredoc\n- under this tool/wrapper, the displayed command line can make `$\"...\"` look mangled, but that is a shell-escaped display artifact, not necessarily corrupted F# source\n- the actual bad behavior was: raw `dotnet fsi <<'EOF' ... EOF` evaluated the code, printed the value, then exited like an interactive REPL session with code `1`\n- `dotnet fsi --exec /path/to/script.fsx` ran cleanly and exited `0`\n\nSo the preferred solution is now:\n- use a `.fsx` file\n- run it with `dotnet fsi --exec`\n- if it’s recurring, prefer a checked-in helper script\n- use raw heredoc only to write the `.fsx` file, not to drive the REPL directly\n\nRecorded here:\n- NEXUS-wide: [fsharp-usage-learning-and-guidance.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/fsharp-usage-learning-and-guidance.md)\n- local CheddarBooks rule: [agent-readme.md](/home/ivan/NEXUS/CheddarBooks/docs/agent-readme.md)\n\nCommits:\n- NEXUS: `380cda39` `docs: record fsi exec guidance`\n- CheddarBooks: `9776140` `docs: prefer fsi exec for artifact generation`\n\nSo the short durable rule is:\n- the issue is usually REPL-mode invocation, not F# interpolation\n- the usual way should be `.fsx` + `dotnet fsi --exec`\n\nIf you want, the next good move is to add a checked-in helper script in CheddarBooks for regenerating the tracked workspace HTML so we stop doing ad hoc generation entirely."

