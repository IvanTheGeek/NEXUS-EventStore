kind = "plain_text"
text = "Short answer: I don’t see a clearly better *runner* for this repo than `Expecto`.\n\nThe one serious extra contender is [TUnit](https://tunit.dev/). But for this codebase, I’d still be cautious with it. Its own docs say F# projects fall back to reflection mode, and that the source-generation benefits are only available for C# projects; they even suggest a separate C# test project if you want the better performance path. That makes me think TUnit is interesting, but not the best fit for an F#-first repo like this. I’m making that recommendation as an inference from their docs, not as a hard rule. Sources: [engine modes](https://tunit.dev/docs/execution/engine-modes/), [F# assertions](https://tunit.dev/docs/assertions/fsharp/), [FsCheck integration](https://tunit.dev/docs/examples/fscheck/).\n\nWhat I think is more promising than swapping runners is improving the *testing stack*:\n- [FsCheck](https://fscheck.github.io/FsCheck/QuickStart.html) for properties and invariants. This feels especially right for parsing, dedupe, revision/reparse behavior, and projection rebuild rules.\n- [Verify](https://github.com/VerifyTests/Verify) for golden/snapshot testing of TOML events, manifests, and projections. Verify explicitly supports [Expecto](https://github.com/VerifyTests/Verify#expecto) and says its snapshot file support works for [C#, VB, and F# projects](https://github.com/VerifyTests/Verify).\n- [Expecto](https://github.com/haf/expecto) remains the best F#-native runner here because of tests-as-values, FsCheck support, and its overall style.\n\nSo my recommendation is:\n- `Expecto` as the runner\n- `FsCheck` for property tests\n- `Verify` for golden-file tests\n\nIf you want, next I can scaffold that exact stack and add the first few tests:\n- one parser fixture test\n- one dedupe/reimport test\n- one reparse-vs-revision test\n- one TOML golden test"

