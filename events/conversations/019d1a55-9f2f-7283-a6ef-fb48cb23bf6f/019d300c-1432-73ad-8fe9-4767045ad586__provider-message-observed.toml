text = "The `v0` F# domain scaffold is in place and committed as `493e6d6` on `codex/nexus-ingestion-foundation`.\n\nThe key pieces are here:\n\n- [NEXUS-Code/docs/v0-module-map.md](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/docs/v0-module-map.md)\n- [NEXUS-Code/src/Nexus.Domain/Nexus.Domain.fsproj](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Domain/Nexus.Domain.fsproj)\n- [NEXUS-Code/src/Nexus.Domain/Ids.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Domain/Ids.fs)\n- [NEXUS-Code/src/Nexus.Domain/Provenance.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Domain/Provenance.fs)\n- [NEXUS-Code/src/Nexus.Domain/CanonicalHistory.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Domain/CanonicalHistory.fs)\n- [NEXUS-Code/src/Nexus.Domain/Graph.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Domain/Graph.fs)\n\nWhat’s there now is strictly the model surface:\n- stable IDs\n- provenance and acquisition types\n- canonical observed-history events\n- import manifest shape\n- thin graph-compatible types\n\nI did not implement importer behavior yet, and I could not compile-check the project because the `dotnet` SDK is still not available in this shell. `RawDataExports/` also remains untracked on purpose.\n\nThe next best step is to define the persistent wire format: TOML schema and file layout for canonical events and import manifests in `NEXUS-EventStore`, using these types as the source model."

