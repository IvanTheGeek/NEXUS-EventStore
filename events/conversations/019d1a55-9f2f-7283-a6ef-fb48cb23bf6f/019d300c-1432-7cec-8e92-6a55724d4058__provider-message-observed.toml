text = "know that I am heavily influenced by Scott Wlaschin and all his talks and website and book Domain Modeling made Functional, hence the F#. Also by literate programming, living documentation (concept and book) and by Adam Adam Dymitruk and Martin Dilger Event Modeling as how to describe business software. DDD concepts (not data structures) also weave in, but usually not explicitly.  Grag Young and CQRS and event sourcing play big influences as well. \n\nYour plans seem on track. What  would you suggest for the `do you want the first canonical unit to be called MessageObserved, or do you want a more neutral name like MessageRecorded or MessageImported? That name will set the tone for the rest of the model.` question at this point?"

