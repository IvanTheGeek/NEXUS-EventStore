[[body.segments]]
kind = "plain_text"
text = "Yes, and I think there are two separate things here that we should keep distinct.\n\n`Design tokens` are very relevant to us now. Penpot’s current docs say they’re first-class, follow the W3C DTCG draft format, and can be imported/exported as JSON/ZIP token sets. That makes them a strong interchange surface between Penpot and code, especially for colors, spacing, typography, radius, shadows, and similar visual values. Sources:\n- [Penpot Design Tokens docs](https://help.penpot.app/user-guide/design-tokens/)\n- [Penpot design tokens blog post](https://penpot.app/blog/design-tokens-with-penpot/)\n\nFor NEXUS/FnHCI, I’d place tokens like this:\n- business/path semantics\n- `FnHCI` interaction primitives\n- design tokens as the visual-value source of truth\n- Penpot boards/components/prototypes as the visual working surface\n- runtime projections like Blazor/HTML/Android/iOS\n\nSo tokens should not own business meaning, but they probably should become the shared visual contract between Penpot and `FnUI`.\n\n`Web Components` are a different layer. That’s a browser/runtime concept, not the same thing as Penpot components. Web Components are custom elements plus Shadow DOM/templates, i.e. a way to package reusable browser widgets. Sources:\n- [MDN Web Components](https://developer.mozilla.org/en-US/docs/Web/Web_Components)\n- [WHATWG custom elements](https://html.spec.whatwg.org/dev/custom-elements.html)\n\nSo for us, web components would be relevant as:\n- one possible web runtime target for `FnUI`\n- a packaging seam for reusable browser-side controls\n- maybe a design-system/demo surface\n\nBut they should not be the main abstraction owner either. If we use them, they should sit beside Blazor/HTML as another projection target, not above `FnHCI`.\n\nAnd yes, a couple small `.penpot` files would help a lot. The best pair would be:\n- one minimal file that mainly demonstrates token sets/themes\n- one small file with a button component, variants, tokens applied, and a prototype link\n\nThat would let us inspect the actual archive structure and start defining a real Penpot-to-`FnHCI` token/component mapping instead of guessing.\n\nIf you grab those, I can inspect them next and turn the findings into durable notes plus a first concrete mapping proposal."

