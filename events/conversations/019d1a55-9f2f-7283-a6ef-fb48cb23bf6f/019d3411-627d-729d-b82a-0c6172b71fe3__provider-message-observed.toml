text = "Yes. We now have a much better answer on both parts.\n\n**Checkpoint Hook**\nCause:\n- the failure was a race on the shared Codex checkpoint destination under [NEXUS-Objects/providers/codex/latest](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Objects/providers/codex/latest), not a problem with `~/.codex` itself.\n- two repos could commit at nearly the same time, and both hooks were writing into the same shared object-store roots.\n\nFix:\n- I added a shared gate so checkpoint capture serializes before touching the shared roots:\n  - [SharedFileGate.fs](/home/ivan/NEXUS/NEXUS-EMERGING-main/NEXUS-Code/src/Nexus.Importers/SharedFileGate.fs)\n  - [CodexCommitCheckpointWorkflow.fs](/home/ivan/NEXUS/NEXUS-EMERGING-main/NEXUS-Code/src/Nexus.Importers/CodexCommitCheckpointWorkflow.fs)\n- verified with build, tests, and two real parallel forced captures against shared roots.\n- landed in NEXUS commit `bee0afc1`.\n\n**Slice-Shell Text Issue**\nWhat we now know:\n- ordinary component text is fine.\n- the bad behavior is narrower and belongs to the recovered slice-shell lineage, not to Penpot components in general.\n\nWhat the lab showed:\n- `Button.Option` instance and detached text edits exported correctly.\n- `Input.Text` instance and detached text edits exported correctly.\n- fresh mini-shell components built from scratch also exported edited instance text correctly, even with nested rows, rounded borders, and shadows.\n- the stale export problem stays tied to the recovered `CommandSlice.Base.V2` style shell.\n\nWhy this matters:\n- the likely problem is internal lineage/state in that recovered shell, not “nested rows”, “rounded corners”, or “all inherited text”.\n- that means the better direction is to rebuild the slice-shell family cleanly from the visual language you like, rather than keep layering workarounds on the old shell.\n\nLatest durable notes:\n- NEXUS: [penpot-surface-comparison.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-surface-comparison.md)\n- CheddarBooks: [penpot-projection.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-projection.md)\n\nLatest commits:\n- NEXUS: `cd012483` `docs: record mini shell lab findings`\n- CheddarBooks: `bcd7f9f` `docs: record clean shell penpot direction`\n\nYour hosted slice page is useful inspiration too:\n- [Slice.html](https://em1.ivanthegeek.com/wwwroot/Slice.html)\n\nBest next move:\n- rebuild `CommandSlice` and `ViewSlice` cleanly in Penpot from the `f63e1af` / hosted-slice visual language, using the fresh mini-shell pattern instead of the recovered shell lineage."

