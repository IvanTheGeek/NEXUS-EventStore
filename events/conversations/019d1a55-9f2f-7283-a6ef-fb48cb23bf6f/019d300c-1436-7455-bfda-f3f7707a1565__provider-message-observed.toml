text = "A clearer picture from the sample graph:\n\n- Some assertions are true node-to-node relationships:\n  - `belongs_to_conversation`\n  - `references_artifact`\n  - `observed_during_import`\n  - `located_in_domain`\n  - `interpreted_within_context`\n- Many others are node-to-literal facts, which still live as graph assertions in storage:\n  - `has_node_kind = \"artifact_node\"`\n  - `has_semantic_role = \"imprint\"`\n  - `has_sequence_hint = 2`\n  - `has_title = \"...\"`\n\nSo “a lot of edges” currently means “a lot of graph assertions,” not all of which become visual arrows. The DOT exporter only turns node-to-node assertions into arrows; literal assertions become node labels/details."

