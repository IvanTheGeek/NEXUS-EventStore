text = "I captured that as a durable decision and pushed it as `6a6d0e11`.\n\nThe new note is here:\n- [0007-traceable-verification-over-derived-indexes.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/decisions/0007-traceable-verification-over-derived-indexes.md)\n\nI also reinforced the same rule in:\n- [nexus-ingestion-architecture.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/nexus-ingestion-architecture.md)\n\nSo now the repo explicitly says:\n- derived indexes and projections are allowed to accelerate work\n- they must not become the authority\n- important flows must remain traceable through:\n  - working index\n  - working assertions\n  - canonical events\n  - raw refs\n  - provider artifact when needed\n\nThat gives us the full-traceability requirement without forcing the full verification UX too early."

