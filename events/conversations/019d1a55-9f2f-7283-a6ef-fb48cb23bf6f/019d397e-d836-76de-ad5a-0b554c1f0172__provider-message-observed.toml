text = "oh wow, that is actually really nice! so really, the PATHs were planned to be laid out on the PATHS page, so each path would be its own row. We can enhance with descriptions and such or even notes added to the page near the path. I also was wanting to have screenshots of the app pages in the screen location. We also need to consider when we might have multiple Actor lanes and what changes. We should also figure out what design tokens would be in check and make the board/screen adaptable to differnt viewing devices. I am currently thinking that the event modeling aspect is not important for phone but maybe tablet and desktop would definatly be targets. Also, there are people on laptops, like I am now, that have more traditional screen sizes like 1980x1090 or whatever, but then there are those that have huge wide screens on their desk, and they might like being able to have an extended width view of their event model and path."

