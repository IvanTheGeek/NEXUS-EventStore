kind = "plain_text"
text = "Yes, usually.\n\nIf the repo remote is SSH, like:\n\n```bash\ngit@github.com:IvanTheGeek/FnTools.git\n```\n\nthen Git will use your local SSH setup automatically:\n- your private key in `~/.ssh`\n- your SSH agent if one is running\n- or direct key access if configured\n\nSince `gh auth login` already confirmed:\n- your SSH key exists\n- that key is on your GitHub account\n\nthat means Git operations over SSH should usually “just work” without asking for username/password.\n\nWhat can still matter:\n- the remote must actually be set to SSH, not HTTPS\n- the SSH agent/session has to be usable\n- GitHub has to accept the specific key being offered\n\nA quick check is:\n\n```bash\nssh -T git@github.com\n```\n\nIf that succeeds, SSH Git auth is basically in good shape.\n\nSo short answer:\n- yes, that is the goal\n- and in your setup it should generally auto-auth for us over SSH\n- but only when the remote URL is SSH and not mixed with HTTPS"

