text = "posted on issue 8691. also in the forum.  \nThe PATHS page version is still missing text somehow. \ni think I still like some of the ideas from `/home/ivan/NEXUS/tmp/em1-slice-surface/EM1_Slice_f63e1af_ReadModel_Row_Refined.html` specifically, the `CommandSlice` and `ViewSlice` back to uppercase but with a space so `COMMAND SLICE` and `VIEW SLICE`\n- the event is still crowded on the bottom edge by slice frame on the `COMMAND SLICE`\n- The top left pill of the slice should be the app name and the pill should adjust to the text, and be centered vertically and horizontaly\n- image included for ref and ideas, SCREEN, VIEW, COMMAND, EVENT should be the top right badge of the block | the header left title should not be there. \n- For the screen blocks: there SHOULD be a title on the block top left, which is the text of the screen. It should also have the badge of the Role/Actor \n- the properties area is intended to be visable or not, again will depend on user/audence and lenses, but it should be prepared to be not visable. \n- The badges at the bottom is important, it will be related who that box is for - like the lens or role that is allowed to see it."

