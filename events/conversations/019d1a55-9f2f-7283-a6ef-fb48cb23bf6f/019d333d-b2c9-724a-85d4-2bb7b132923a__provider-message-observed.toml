text = "The notes are in and pushed on `laundrylog-foundation` as `056d7a59`.\n\nNew docs:\n- [0016-markdown-first-public-content-with-talkyard-discussion.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0016-markdown-first-public-content-with-talkyard-discussion.md)\n- [public-content-publishing-and-talkyard-comments.md](/tmp/nexus-merge-M7SKP3/docs/public-content-publishing-and-talkyard-comments.md)\n\nI also linked the architecture note into the main doc spine here:\n- [README.md](/tmp/nexus-merge-M7SKP3/README.md)\n- [repository-concern-lines.md](/tmp/nexus-merge-M7SKP3/docs/repository-concern-lines.md)\n\nThe key shape now captured is:\n- Markdown in the repo is the canonical public statement\n- static publishing is the delivery layer\n- Talkyard is the discussion/comment layer around that content\n- published pages and discussion threads stay linked but distinct\n- public-safe and rights-safe checks happen before publication\n- Talkyard feedback can later be ingested back into NEXUS as its own LOGOS stream\n\nI didn’t rerun build/tests because this was docs-only."

