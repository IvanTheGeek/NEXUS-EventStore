text = "Yes, exactly: a long-lived branch can merge into `main`, keep going, and merge again later.\n\nThat is now written down on branch `branch-governance-tightening`, pushed as `110a78ef`.\n\nUpdated docs:\n- [0020-converged-main-and-active-concern-line-branches.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0020-converged-main-and-active-concern-line-branches.md)\n- [collaboration-protocol.md](/tmp/nexus-merge-M7SKP3/docs/collaboration-protocol.md)\n- [README.md](/tmp/nexus-merge-M7SKP3/README.md)\n\nThe tightened rule is:\n\n- short-lived branch:\n  - one coherent piece of work\n  - merge into `main`\n  - delete when the next step should sensibly start fresh from `main`\n\n- long-lived concern-line branch:\n  - ongoing line like `fntools-foundation`\n  - may merge checkpoints into `main` multiple times\n  - may also receive merges from `main`\n  - keep it alive while that line still needs its own cadence\n\nDelete a branch when:\n- its history is already preserved by merges into `main`\n- it no longer needs to evolve separately\n- the next work in that area should just start from `main`\n- there is no active reason to keep its own roadmap/integration line\n\nKeep it when:\n- the concern line is still actively evolving\n- more checkpoints are expected\n- it is acting as the integration branch for related sub-branches\n\nI also made the governance stricter about `main`:\n- direct commits to `main` should be rare\n- normal follow-up work should happen on a branch\n\nSo the answer is: yes, repeated merge-back from the same long-lived branch is normal here. The real decision point is not “has it merged once?” but “does this concern line still need independent evolution?”"

