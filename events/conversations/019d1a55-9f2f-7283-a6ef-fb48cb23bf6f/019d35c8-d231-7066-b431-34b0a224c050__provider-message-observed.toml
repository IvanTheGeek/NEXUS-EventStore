text = "Here’s the footer grammar I’d use.\n\n```text\n[ Properties ]                                [ business ]\n[ Properties ]                              [ classic em ]\n[ Properties ]                                 [ ui lens ]\n```\n\nSo the rule is:\n\n- left side: content toggle\n  - `Properties`\n  - later maybe `Details` if we want softer language\n\n- right side: lens/context/audience badge\n  - `business`\n  - `classic em`\n  - `ui lens`\n\nThat gives the footer two clear jobs:\n- left answers: “what can I reveal here?”\n- right answers: “from what lens/context is this block being shown?”\n\nApplied to the current slice blocks:\n\n```text\nCommand block footer:\n[ Properties ]                                [ business ]\n\nEvent block footer:\n[ Properties ]                                [ business ]\n\nView block footer:\n[ Properties ]                              [ classic em ]\n\nScreen block footer:\n[ Properties ]                                 [ ui lens ]\n```\n\nIf we later need actor/role too, I would not mix it into the same right badge immediately. I’d either:\n- keep actor up in the block badges, or\n- add a second right-side badge only when that lens is active\n\nSo my recommendation is still:\n- label: `Properties`\n- footer grammar: left toggle, right lens/context badge\n\nIf you want, I can apply that exact footer pattern to the HTML renderer next."

