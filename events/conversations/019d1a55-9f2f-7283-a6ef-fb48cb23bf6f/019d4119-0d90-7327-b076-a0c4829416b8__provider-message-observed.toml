text = "My best first-pass naming set is:\n\n- `LaunchApp` -> `AppStarted` -> `StartupSplash`\n- `RunStartupChecks` -> `StartupChecksStarted` -> `StartupChecksInProgress`\n- `InspectLocalSession` -> `NoLocalSessionDetected` -> `NoLocalSession`\n- `ResolveInitialRoute` -> `InitialRouteResolvedToNeedLocation` -> `NeedLocation`\n\nWhy I like that shape:\n\n- `COMMAND` should read like an imperative action: `LaunchApp`\n- `EVENT` should read like a past-tense fact: `AppStarted`\n- `VIEW` should read like a readable/interpreted state: `StartupSplash`\n\nSo for your specific question: `AppStarted` is better than `AppLaunched`.\n\nReason:\n- `AppLaunched` feels too close to the trigger/command itself\n- `AppStarted` feels more like the observed system fact that the command produced\n\nIf you want a stronger alternative to `AppStarted`, I’d consider:\n- `StartupBegan`\n\nThat would make the trio:\n- `LaunchApp`\n- `StartupBegan`\n- `StartupSplash`\n\nMy ranking for the first event is:\n1. `AppStarted`\n2. `StartupBegan`\n3. `AppLaunched`\n\nAnd on whether this is truly the first slice: for the current modeled boundary, yes. If we later want to model the pre-app world, we could insert an earlier external trigger like `SelectLaundryLogIcon`, but I would not do that yet.\n\nCurrent active spot for this in code is:\n- [NmPathHtmlRenderer.fs](/home/ivan/NEXUS/CheddarBooks/src/CheddarBooks.LaundryLog.UI/NmPathHtmlRenderer.fs)\n\nIf you want, next I can do the same naming pass for the whole 18-slice NM path before we rename anything."

