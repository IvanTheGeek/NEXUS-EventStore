text = "check out `https://concepts.em.ivanthegeek.com/Event%20Model%20-%20Slice-Based%20Visualization%202.html` which was some inspiration for the event model I am going for. the virtical ordering is incorrect, but I kinda like the look and feel of that page. I was also working on nexus and event modeling in the EM-1 repo on github. I had tried to upgrade to dotnet9 and dotnet10 which is where all the issues with bolero came to light. Check the chat histories, you will find where I decided to create FnHCI instead of try to fix bolero. It is appearing that some graph model work was also done in EM-1, not that we need to use it, but it might be helpful to analyse and keep links to. The is a file in tmp  `Event-Modeling-Experiment-localhost.mhtml` that is also inspiration on look and feel, but still not correct on ordering or slices. but again, using as inspiration."

