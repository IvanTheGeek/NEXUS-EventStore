kind = "plain_text"
text = "I think your instinct is right, with one refinement:\n\nUse **properties to describe**, and **types to permit**.\n\nThat rule helps a lot.\n\nFor NEXUS:\n\n- `sensitivity`, `sharing_scope`, `sanitization_status`, `retention_class`\n  are good as typed properties\n- but “may this be published/shared/exported/indexed into public-facing retrieval?”\n  is strong enough to deserve a distinct type at the boundary\n\nSo I would not choose one or the other globally. I’d use both, for different jobs.\n\nA practical rule of thumb:\n\n- make it a **property** when it is descriptive classification\n- make it a **type** when it changes what operations are allowed\n- definitely make it a **type** when a mistake has serious consequences\n\nFor your safe-data concern, I would treat this as a capability boundary:\n\n- raw restricted intake can exist\n- sanitized derived material can exist\n- public-shareable material should be a different type, obtainable only through an explicit approved path\n\nSo something like this conceptually:\n\n```fsharp\ntype HandlingPolicy =\n    { Sensitivity: SensitivityId\n      SharingScope: SharingScopeId\n      SanitizationStatus: SanitizationStatusId\n      RetentionClass: RetentionClassId }\n\ntype IntakeNote =\n    private\n        { Content: IntakeContent\n          Policy: HandlingPolicy }\n\ntype SanitizedNote =\n    private\n        { Content: SanitizedContent\n          Policy: HandlingPolicy }\n\ntype ApprovedForSharingNote =\n    private ApprovedForSharingNote of SanitizedNote\n```\n\nThen the important thing is not the shapes alone, but the constructors:\n\n- you can ingest into `IntakeNote`\n- you can derive `SanitizedNote` only through explicit sanitization functions\n- you can derive `ApprovedForSharingNote` only through an approval function that checks the policy and required evidence\n\nThat gives you both:\n- rich classification on the data\n- compile-time gating on dangerous actions\n\nSo my recommendation for NEXUS is:\n\n1. Keep the policy dimensions as strong typed properties.\n2. Add stronger boundary types for high-risk transitions.\n3. Make public/export/share operations require the stronger type, not just a property check.\n4. Keep constructors private and expose only explicit promotion functions.\n\nThe key mental model is:\n\n- **properties say what something is**\n- **types say what may be done with it**\n\nFor your domain, “public-safe” feels much more like the second one.\n\nSo yes: if “safe for public use” really matters, I would absolutely enforce that with an actual F# type, not just a flag or property check scattered around the code."

