text = "We’ve got a much sharper shape now:\n\n- `Summary + Detailed`\n- each visible column = one explicit state change\n- each column has one primary owning context\n- if two contexts change, they become adjacent columns in time order\n- `role/actor` starts as a badge, not a row\n\nThat also gives a clean answer to your earlier question:\n\n- right now `lens` is mostly mirroring `context`\n- in the stronger shape, it won’t\n- a lens becomes a way of selecting or interpreting columns, not the same thing as ownership\n\nExample:\n- a column owned by `RuntimeOrchestration` could appear in an `App Runtime` lens\n- a column owned by `EventModeling` could appear in an `AEM` lens\n- a screen surface may be shown in a `UI` audience or `Detailed` view without changing its owning context\n\nThe main remaining fork I see is whether `audience` should become a first-class control now, or wait until the combined path surface is richer."

