[[body.segments]]
kind = "plain_text"
text = "PLEASE IMPLEMENT THIS PLAN:\n# Make NM The Only Active Path Surface With Universal COMMAND / VIEW Slices\n\n## Summary\nTreat `NM` as the only active path/modeling surface. Keep the old screen-path HTML only as a frozen archived artifact and stop maintaining it as a renderer/test contract.\n\nRefactor the whole current `PATH1 NM` so every slice follows one universal law:\n\n- `COMMAND` slices model change\n- `VIEW` slices model read / interpretation\n- `EVENT` is the backbone element inside the model, not a slice type\n\nVisible labels must use all caps consistently:\n- `COMMAND`\n- `EVENT`\n- `VIEW`\n- `COMMAND GWT`\n- `VIEW GWT`\n\n## Key Changes\n### 1. Freeze the legacy screen-path\n- Keep the tracked old screen-path HTML artifact as an archived fallback reference.\n- Stop maintaining its renderer behavior, browser behavior, or test contract.\n- Update local docs so `NM` is the primary review surface and the old screen-path is explicitly frozen.\n- Update helper scripts so active refresh/verify flows target NM only; the frozen legacy artifact is not regenerated.\n\n### 2. Replace the current NM slice model\nChange the whole-column classification axis to only:\n- `COMMAND`\n- `VIEW`\n\nRemove the current non-business whole-column kinds as primary slice types:\n- `BOOT`\n- `SCREEN`\n- `TRANSITION`\n- `ORCHESTRATION`\n- `INTERACTION`\n\nThose move into:\n- top attachment labels\n- context/lens metadata\n- or inner block labels where still needed\n\nUse these two slice structures across the full current NM path:\n\n- `COMMAND` slice\n  - optional top attachment: `TRIGGER`, `RUNTIME`, `SCREEN`, or none\n  - `COMMAND` block\n  - `EVENT` block\n  - visible `COMMAND GWT`\n\n- `VIEW` slice\n  - optional top attachment: `SCREEN`, `RUNTIME`, or none\n  - `VIEW` block\n  - visible `VIEW GWT`\n  - no main `EVENT` block\n  - actor stays hybrid metadata for now\n\n### 3. Rebuild the whole PATH1 NM sequence\nRefactor the current path into this ordered slice chain:\n\n1. `Step 01-launch-app`\n   - slice type: `COMMAND`\n   - attachment: `TRIGGER`\n   - context: `ApplicationLifecycle`\n   - actor: `User`\n   - command: `LaunchApp`\n   - event: `AppStarted`\n\n2. `Step 02-splash-visible`\n   - slice type: `VIEW`\n   - attachment: `SCREEN`\n   - context: `ApplicationLifecycle`\n   - view: `SplashVisible`\n   - `VIEW GWT` depends on `AppStarted`\n\n3. `Step 03-run-startup-checks`\n   - slice type: `COMMAND`\n   - attachment: `RUNTIME`\n   - context: `RuntimeOrchestration`\n   - actor: `System`\n   - command: `RunStartupChecks`\n   - event: `RuntimeChecksStarted`\n\n4. `Step 04-runtime-checks-view`\n   - slice type: `VIEW`\n   - attachment: `SCREEN`\n   - context: `RuntimeOrchestration`\n   - view: `RuntimeChecksVisible`\n\n5. `Step 05-inspect-local-session`\n   - slice type: `COMMAND`\n   - attachment: `RUNTIME`\n   - context: `RuntimeOrchestration`\n   - actor: `System`\n   - command: `InspectLocalSession`\n   - event: `NoLocalSessionDetected`\n\n6. `Step 06-no-local-session-view`\n   - slice type: `VIEW`\n   - attachment: `SCREEN`\n   - context: `RuntimeOrchestration`\n   - view: `NoLocalSessionVisible`\n\n7. `Step 07-resolve-initial-route`\n   - slice type: `COMMAND`\n   - attachment: `RUNTIME`\n   - context: `RuntimeOrchestration`\n   - actor: `System`\n   - command: `ResolveInitialRoute`\n   - event: `InitialRouteResolvedToNeedLocation`\n\n8. `Step 08-need-location`\n   - slice type: `VIEW`\n   - attachment: `SCREEN`\n   - context: `ScreenPath`\n   - view: `NeedLocation`\n\n9. `Step 09-enter-location-text`\n   - slice type: `COMMAND`\n   - attachment: `SCREEN`\n   - context: `ScreenPath`\n   - actor: `User`\n   - command: `EnterLocationText`\n   - event: `LocationTextEntered`\n\n10. `Step 10-ready-to-set-location`\n    - slice type: `VIEW`\n    - attachment: `SCREEN`\n    - context: `ScreenPath`\n    - view: `ReadyToSetLocation`\n\n11. `Step 11-capture-laundry-location`\n    - slice type: `COMMAND`\n    - attachment: `SCREEN`\n    - context: `EventModeling`\n    - actor: `User`\n    - command: `CaptureLaundryLocation`\n    - event: `LaundryLocationCaptured`\n\n12. `Step 12-current-laundry-session-location`\n    - slice type: `VIEW`\n    - optional attachment: `SCREEN`\n    - context: `EventModeling`\n    - view: `CurrentLaundrySession`\n\n13. `Step 13-entry-form-ready`\n    - slice type: `VIEW`\n    - attachment: `SCREEN`\n    - context: `ScreenPath`\n    - view: `EntryFormReady`\n\n14. `Step 14-select-washer`\n    - slice type: `COMMAND`\n    - attachment: `SCREEN`\n    - context: `ScreenPath`\n    - actor: `User`\n    - command: `SelectWasher`\n    - event: `WasherSelected`\n\n15. `Step 15-washer-draft`\n    - slice type: `VIEW`\n    - attachment: `SCREEN`\n    - context: `ScreenPath`\n    - view: `WasherDraft`\n\n16. `Step 16-log-laundry-expense`\n    - slice type: `COMMAND`\n    - attachment: `SCREEN`\n    - context: `EventModeling`\n    - actor: `User`\n    - command: `LogLaundryExpense`\n    - event: `LaundryExpenseLogged`\n\n17. `Step 17-current-laundry-session-washer`\n    - slice type: `VIEW`\n    - optional attachment: `SCREEN`\n    - context: `EventModeling`\n    - view: `CurrentLaundrySession`\n\n18. `Step 18-logged-success`\n    - slice type: `VIEW`\n    - attachment: `SCREEN`\n    - context: `ScreenPath`\n    - view: `LoggedSuccess`\n\nImportant fanout rule:\n- `Step 12` and `Step 13` both consume `LaundryLocationCaptured`\n- `Step 17` and `Step 18` both consume `LaundryExpenseLogged`\n\n### 4. Update visible NM grammar\n- Whole-column badge shows only `COMMAND` or `VIEW`.\n- Top attachment label shows `TRIGGER`, `RUNTIME`, `SCREEN`, or nothing.\n- `EVENT` appears only inside `COMMAND` slices.\n- `VIEW` slices always show `VIEW GWT`, which names the prior event dependency.\n- `COMMAND` slices always show `COMMAND GWT`.\n- All visible GWT labels use all caps:\n  - `COMMAND GWT`\n  - `VIEW GWT`\n- Keep actor in the current hybrid position near the attachment area when relevant.\n- Keep context/lens/group metadata explicit, but secondary to the universal slice law.\n\n### 5. Keep context as the primary color family\n- `App Runtime`: warm stone / sand / slate / amber\n- `Interaction`: a distinct non-business family\n- `Business`: preserve established AEM blue / orange / green internals\n\nColor represents context family first, not slice type.\n\n## Interfaces / Types\nUpdate the NM renderer model to support:\n- `NmSliceType = Command | View`\n- `NmAttachmentKind = Trigger | Runtime | Screen | None`\n- command-slice state with `COMMAND`, `EVENT`, and `COMMAND GWT`\n- view-slice state with `VIEW` and `VIEW GWT`\n- explicit event fanout, where multiple `VIEW` slices can depend on the same prior event\n\nArchive the old screen-path flow rather than keeping it as an active renderer contract.\n\n## Test Plan\n### Expecto\n- prove the NM path now uses only `COMMAND` and `VIEW`\n- prove the path order is the 18-slice sequence above\n- prove step labels use `Step 01-launch-app` format\n- prove `COMMAND` slices always emit `COMMAND`, `EVENT`, and `COMMAND GWT`\n- prove `VIEW` slices always emit `VIEW` and `VIEW GWT`\n- prove `VIEW` slices do not emit a main `EVENT` block\n- prove top attachments render correctly as `TRIGGER`, `RUNTIME`, `SCREEN`, or none\n- prove business AEM inner styling remains intact\n- stop requiring behavioral invariants for the frozen legacy screen-path artifact\n\n### Playwright\n- prove the NM path begins with `LaunchApp`\n- prove `AppStarted` appears inside the first `COMMAND` slice as the event\n- prove `COMMAND` and `VIEW` are the only whole-column classifications\n- prove `COMMAND GWT` and `VIEW GWT` are always visible\n- prove event fanout works across business and interaction views\n- prove attachments and popovers explain the new slice law correctly\n- keep nav, alignment, and popover behavior working on NM\n- do not require active browser coverage for the frozen legacy screen-path artifact\n\n## Assumptions\n- `NM` is now the only active path surface\n- the old screen-path artifact remains tracked but frozen\n- `LaunchApp` is the first command name for now\n- `RUNTIME` is the top attachment for system-driven command slices\n- `COMMAND GWT` and `VIEW GWT` are always visible by default across NM\n- actor remains hybrid because future role/actor lanes are still expected\n- terminology remains open to refinement as more friction emerges"

