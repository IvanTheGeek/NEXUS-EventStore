text = "Yes.\n\nThere is a newer prerelease on npm:\n- `@penpot/mcp@2.15.0-rc.1.116`\n- published March 25, 2026\n\nAnd this looks like the right one for us. I inspected its source and it changes the server to create a fresh `McpServer` per session/connection, which is exactly the bug we were tripping over in `2.14.0`.\n\nI already switched your local Penpot MCP runner to the RC in:\n- [start.sh](/home/ivan/NEXUS/local-stacks/penpot-mcp/start.sh)\n\nI also verified the important part:\n- `mcp-remote-client http://localhost:4401/sse --allow-http --transport sse-only` now connects successfully against the RC server\n\nThen I normalized Codex to use the working bridge path here:\n- [config.toml](/home/ivan/.codex/config.toml)\n\nYour `penpot` server is now:\n- `npx -y mcp-remote http://localhost:4401/sse --allow-http --transport sse-only --debug`\n\nSo the next step is simple:\n- restart Codex one more time\n\nAfter that, `penpot` should come up through the proxy against the fixed RC server. No repo files were changed, so there are no git commits from this step."

