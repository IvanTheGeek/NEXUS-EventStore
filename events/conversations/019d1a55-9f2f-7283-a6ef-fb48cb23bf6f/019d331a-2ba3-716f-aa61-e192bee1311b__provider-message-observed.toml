kind = "plain_text"
text = "In Penpot, do this while logged into your local account:\n\n1. Open your profile/settings.\n2. Go to the section for `Access Tokens`.\n3. Create a new token.\n4. Give it a name like `Codex local API`.\n5. Copy the token value when Penpot shows it.\n\nThen send me the token here, and I can use it for the local backend API.\n\nHow I’ll use it:\n- HTTP header:\n```text\nAuthorization: Token <your-token>\n```\n\nWhat I can then try:\n- inspect live file/project metadata\n- export the current Penpot file through the backend\n- see whether we can automate snapshot export instead of manual export\n\nTwo small notes:\n- Penpot usually only shows the token once, so copy it when it is created.\n- Since this is your local instance, this is a local-power token. If you want, after we prove the workflow, you can revoke it and create a narrower-lived replacement later."

