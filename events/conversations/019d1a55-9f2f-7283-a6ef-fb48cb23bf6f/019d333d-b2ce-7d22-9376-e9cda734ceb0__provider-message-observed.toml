text = "You are working on two local git repositories owned by IvanTheGeek:\n\n1. NEXUS-EMERGING\n2. CheddarBooks\n\nYour job is to make documentation changes that establish a practical “CORTEX repo memory protocol” across both repos, aligned with the existing philosophy already present in the repos.\n\nImportant context you must honor:\n- The repo is treated as shared operating memory for humans and AI agents.\n- There must be a distinction between:\n  - scratch working memory\n  - durable project memory\n  - canonical append-only history\n  - derived views / projections\n- NEXUS philosophy strongly prefers durable learnings in repo docs instead of leaving them only in chat.\n- Canonical history should not be rewritten to simplify the story; corrections should be additive.\n- The user strongly dislikes JSON. Do not introduce JSON for structure examples. Prefer plain markdown, and if any structured example is needed, use TOML-shaped thinking or plain bullets instead.\n- Keep terminology aligned with the existing repo direction:\n  - NEXUS is the foundation workspace\n  - LOGOS is the knowledge / historical substrate direction\n  - CORTEX is the AI / agent coordination direction\n  - CheddarBooks is an extracted concrete application line\n  - LaundryLog is the first concrete tool app in CheddarBooks\n- Do not invent a giant new bureaucracy. Make the docs practical, lightweight, and compatible with current repo reality.\n- Do not rewrite unrelated docs.\n- Be conservative, focused, and high-signal.\n\nYou should inspect the current repo contents before changing anything so that links and wording fit what is already there.\n\n==================================================\nOVERALL GOAL\n==================================================\n\nImplement a first-pass “CORTEX Repo Memory Protocol” by adding the missing doc surfaces and lightly wiring them into the existing documentation spine.\n\nThe goal is:\n- make both repos easier for Codex / Claude / ChatGPT / future CORTEX agents to orient quickly\n- formalize repo-as-memory instead of leaving it implicit\n- preserve the distinction between scratch, durable docs, canonical history, and derived views\n- keep the changes small, clean, and ready to commit now\n\n==================================================\nREPOS AND EXPECTED INTENT\n==================================================\n\nNEXUS-EMERGING should act as:\n- the meta-memory / doctrine / architecture / ingestion / protocol repo\n\nCheddarBooks should act as:\n- the application-line local memory repo\n- the proving ground for how the protocol works in a concrete extracted repo\n\n==================================================\nCHANGES TO MAKE\n==================================================\n\nWork in BOTH repositories.\n\n------------------------------------------\nA. IN NEXUS-EMERGING\n------------------------------------------\n\nCreate these files if they do not already exist:\n\n1. docs/cortex-repo-memory-protocol.md\n2. docs/agent-readme.md\n3. docs/current-focus.md\n4. docs/index.md\n5. docs/context-packs/README.md\n6. docs/session-handoffs/README.md\n\nAlso update README.md minimally so that the new protocol and agent entry surfaces are discoverable from the existing “Documentation Spine” / project memory area.\n\nIf there is already a docs index or similar file, integrate rather than duplicate.\n\nContent expectations:\n\n1. docs/cortex-repo-memory-protocol.md\nCreate a durable protocol doc that explains:\n- purpose: repo as shared operating memory for humans and AI agents\n- the four memory layers:\n  - scratch\n  - durable project memory\n  - canonical historical record\n  - derived views\n- simple rules for where information belongs\n- startup protocol for an agent:\n  - read README.md\n  - then docs/agent-readme.md\n  - then docs/current-focus.md\n  - then relevant glossary / decisions / feature docs\n- completion protocol for an agent:\n  - if terminology changed, update glossary/docs\n  - if architecture/behavior changed, update durable docs\n  - if discovery matters later, record it durably\n  - if only scratch, leave it in scratch\n  - if canonical history is affected, append rather than rewrite\n- mutation discipline consistent with immutable evolution\n- cross-repo continuity idea when a repo is extracted from another\n- anti-patterns such as:\n  - critical decisions only in chat\n  - mixing scratch and doctrine invisibly\n  - mutating canonical history to fit the latest interpretation\n  - letting generated summaries become authoritative without traceability\n- short operating mantra at the end\n\nWrite it in practical markdown, not abstract manifesto language.\n\n2. docs/agent-readme.md\nCreate an AI-first orientation doc for this repo.\nIt should include:\n- purpose of the file\n- mission of NEXUS-EMERGING in a concise way\n- current role of the repo\n- where to read next\n- memory rules\n- contribution expectations\n- how to distinguish scratch vs durable docs vs canonical history\n\nIt should point people toward existing high-value docs already present in the repo.\n\n3. docs/current-focus.md\nCreate a concise current-focus doc for NEXUS-EMERGING.\nIt should reflect current known direction from the repo itself:\n- ingestion foundation\n- preserve provider artifacts\n- normalize into canonical append-only history\n- preserve provenance for reparsing\n- avoid forcing final ontology too early\n- support multiple concern lines from the foundation\n- make CORTEX-readable repo memory explicit\n\nUse sections like:\n- Active Work\n- Current Truths\n- Open Questions\n- Next Likely Actions\n- Read Next\n\nDo not overclaim things that are not yet implemented.\n\n4. docs/index.md\nCreate a documentation map that helps both humans and AI agents.\nIt should group:\n- core foundation docs\n- app/domain docs\n- decisions\n- how-to docs\n- protocol/operating docs\n- glossary/concepts\n- new agent surfaces\n\nKeep it short and navigable.\n\n5. docs/context-packs/README.md\nCreate a short explainer for what a context pack is in this repo.\nIt should explain that context packs are read-optimized bundles for a specific task, concern line, or agent startup context, and that they are views, not ultimate source truth.\n\n6. docs/session-handoffs/README.md\nCreate a short explainer for session handoffs.\nIt should explain that handoffs are small, operational continuity notes between sessions/agents and are not durable doctrine by default.\nInclude a small markdown template in the file.\n\n7. README.md\nUpdate minimally.\nDo not rewrite the whole README.\nJust add a small section or bullets in the documentation/project-memory area so the new agent-facing docs are visible:\n- docs/cortex-repo-memory-protocol.md\n- docs/agent-readme.md\n- docs/current-focus.md\n- docs/index.md\n- docs/context-packs/\n- docs/session-handoffs/\n\n------------------------------------------\nB. IN CHEDDARBOOKS\n------------------------------------------\n\nCreate these files if they do not already exist:\n\n1. docs/agent-readme.md\n2. docs/current-focus.md\n3. docs/session-handoffs/README.md\n4. docs/context-packs/README.md\n5. docs/context-packs/laundrylog-context-pack.md\n\nAlso update README.md minimally so these become discoverable.\n\nContent expectations:\n\n1. docs/agent-readme.md\nCreate an AI-first entry surface for CheddarBooks.\nIt should explain:\n- this repo is the extracted concrete application line for CheddarBooks\n- it begins with LaundryLog\n- this repo should carry its own local durable memory, not rely on chat memory\n- upstream conceptual roots may exist in NEXUS-EMERGING, but this repo must still be understandable locally\n- where to read next:\n  - docs/foundation.md\n  - docs/laundrylog/introduction.md\n  - docs/laundrylog/requirements.md\n  - README.md\n  - bootstrap-source.toml\n- memory rules for this repo:\n  - scratch notes vs durable docs\n  - local app docs vs upstream NEXUS doctrine\n  - when to record discoveries durably\n\n2. docs/current-focus.md\nCreate a concise current-focus doc for CheddarBooks.\nIt should reflect current repo reality:\n- extracted repo\n- beginning with LaundryLog\n- preserve bootstrap provenance\n- clarify local foundation\n- build app-line memory surfaces\n- support future AI agent continuity\n- keep docs, code, and tests aligned\n\nUse sections like:\n- Active Work\n- Current Truths\n- Open Questions\n- Next Likely Actions\n- Read Next\n\n3. docs/session-handoffs/README.md\nCreate a short handoff explainer similar to NEXUS-EMERGING but localized to this app repo.\n\n4. docs/context-packs/README.md\nCreate a short explanation of context packs for this repo.\n\n5. docs/context-packs/laundrylog-context-pack.md\nCreate a first concrete context pack for LaundryLog.\nIt should be a read-optimized startup bundle for an AI agent or human contributor.\nInclude:\n- mission\n- current role of LaundryLog in the repo\n- key docs to read\n- current known boundaries\n- known constraints\n- open questions\n- next likely work areas\n\nKeep it practical and aligned with the docs already present.\nDo not invent implementation details that are not documented.\n\n6. README.md\nUpdate minimally so the new agent surfaces are discoverable.\nDo not rewrite the full README.\nAdd a small “Agent / Repo Memory Surfaces” or similarly named section with links to:\n- docs/agent-readme.md\n- docs/current-focus.md\n- docs/context-packs/laundrylog-context-pack.md\n- docs/session-handoffs/\n\n==================================================\nSTYLE AND WRITING RULES\n==================================================\n\n- Write clear markdown.\n- Be concrete, not fluffy.\n- Match the tone of the existing repos: serious, foundational, practical.\n- Keep docs short enough to be usable, but complete enough to guide future agents.\n- Do not add fake dates, fake implementation status, or fake claims.\n- Avoid generic AI hype wording.\n- Avoid JSON.\n- Avoid giant tables unless clearly useful.\n- Prefer bullet lists and simple headings.\n- Preserve compatibility with future evolution.\n\n==================================================\nLINKING RULES\n==================================================\n\n- Use relative markdown links where appropriate.\n- Check actual existing file names before linking.\n- If a referenced file or folder does not exist, do not create fake links casually; either create the needed file as part of this task or omit the link.\n- Keep the docs locally navigable.\n\n==================================================\nGIT AND COMMIT EXPECTATIONS\n==================================================\n\nMake sensible atomic commits, not one giant vague commit if avoidable.\n\nPreferred commit structure:\n\nFor NEXUS-EMERGING:\n1. Commit for adding the protocol and agent surfaces\n   Suggested message:\n   docs: add CORTEX repo memory protocol and agent entry surfaces\n\n2. If README wiring is separate and meaningful, either include in the same commit or a second small commit\n   Suggested message:\n   docs: surface repo memory entrypoints in readme\n\nFor CheddarBooks:\n3. Commit for adding agent surfaces and LaundryLog context pack\n   Suggested message:\n   docs: add agent memory surfaces and laundrylog context pack\n\n4. If README wiring is separate and meaningful, either include in the same commit or a second small commit\n   Suggested message:\n   docs: surface agent entrypoints in readme\n\nYou may combine the README updates with the main commit in each repo if that is cleaner.\n\n==================================================\nWORKFLOW\n==================================================\n\nDo this workflow:\n\n1. Inspect both repos and current doc structure.\n2. Create/update the docs listed above.\n3. Sanity check links and wording.\n4. Show a concise summary of what changed in each repo.\n5. Make the git commits in each repo.\n\nIf there are any minor ambiguities, resolve them conservatively without stopping.\nDo not ask me follow-up questions unless something is truly blocking.\n\n==================================================\nOUTPUT EXPECTATION\n==================================================\n\nAt the end, report:\n- files created/updated in NEXUS-EMERGING\n- commit hash(es) for NEXUS-EMERGING\n- files created/updated in CheddarBooks\n- commit hash(es) for CheddarBooks\n- any small assumptions you made\n\nNow proceed."

