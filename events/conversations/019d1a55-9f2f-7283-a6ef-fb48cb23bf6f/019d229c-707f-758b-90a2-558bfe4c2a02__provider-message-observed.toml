text = "Yes, absolutely. This run is valuable because it gives us the honest baseline, but I would not keep this exact flow as the long-term practical shape.\n\nWhat it’s showing us is that the current rebuild path is:\n\n- scan every canonical event file\n- parse everything\n- derive everything in memory\n- only then write `graph/assertions/`\n\nThat is correct, but it’s not a practical steady-state flow once the store grows.\n\nThe likely planning targets after this baseline are:\n\n- separate correctness from convenience\n  - keep “full rebuild from source truth” as the gold-standard path\n  - add faster operational paths for day-to-day use\n- introduce phase-aware reporting permanently\n  - scan counts\n  - derivation counts\n  - write counts\n  - elapsed time\n- reduce memory pressure\n  - likely derive/write in chunks instead of holding the whole graph in memory first\n- consider incremental rebuild options\n  - rebuild only from imports after a known cutoff\n  - or rebuild projections/assertions per stream/provider/import batch\n- think about whether TOML-per-fact remains right for this layer at scale\n  - correct and inspectable, yes\n  - but we may want a second, more operationally efficient representation later without losing TOML as the durable readable form\n\nSo yes, we should plan that change. I’d just prefer to base the redesign on the real numbers from this full run instead of guessing too early."

