text = "`v7` is now the primary mobile surface in the renderer, not just a styling reference.\n\nWhat changed:\n- the main screen proving ground now leads with `Screen.EntryForm - Washer Draft` as the hero app surface\n- the other screens render as supporting state variants below it\n- that rule is now enforced in code and recorded durably in [html-screen-renderer-proving-ground.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/html-screen-renderer-proving-ground.md)\n\nKey files:\n- [ScreenHtmlRenderer.fs](/home/ivan/NEXUS/CheddarBooks/src/CheddarBooks.LaundryLog.UI/ScreenHtmlRenderer.fs)\n- [LaundryLogTests.fs](/home/ivan/NEXUS/CheddarBooks/tests/CheddarBooks.Tests/LaundryLogTests.fs)\n- [html-screen-renderer-proving-ground.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/html-screen-renderer-proving-ground.md)\n\nFresh artifact:\n- [LaundryLog_ScreenComponents.html](/home/ivan/NEXUS/tmp/laundrylog-screen-proving-ground/LaundryLog_ScreenComponents.html)\n- ![LaundryLog screens](/home/ivan/NEXUS/tmp/laundrylog-screen-proving-ground/LaundryLog_ScreenComponents.png)\n\nVerification:\n- `dotnet build /home/ivan/NEXUS/CheddarBooks/CheddarBooks.slnx`\n- `dotnet run --no-build --project /home/ivan/NEXUS/CheddarBooks/tests/CheddarBooks.Tests/CheddarBooks.Tests.fsproj`\n- `24` tests passed\n\nCommit:\n- `c5aa22f` `model: make v7 screen the primary laundrylog surface`\n\nThe next good move is to tune the hero screen against `v7` more literally now that the page composition itself is finally correct."

