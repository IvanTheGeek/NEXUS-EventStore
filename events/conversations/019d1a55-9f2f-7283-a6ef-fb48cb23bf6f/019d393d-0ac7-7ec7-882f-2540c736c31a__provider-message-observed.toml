text = "The screen-path page is rebuilt as an app-style viewport now.\n\nWhat changed:\n- the top horizontal rail now controls the screen viewport itself\n- browser-level horizontal and vertical scrollbars are hidden\n- the header and top controls stay fixed\n- the path rows scroll inside an internal stage\n- left/right buttons move the visible screen columns by one step at a time\n\nUpdated file:\n- [LaundryLog_PATH1_AppStarted_NeedLocation_FirstEntry.html](/home/ivan/NEXUS/tmp/laundrylog-screen-paths/LaundryLog_PATH1_AppStarted_NeedLocation_FirstEntry.html)\n\nCode/docs:\n- [ScreenPathHtmlRenderer.fs](/home/ivan/NEXUS/CheddarBooks/src/CheddarBooks.LaundryLog.UI/ScreenPathHtmlRenderer.fs)\n- [LaundryLogTests.fs](/home/ivan/NEXUS/CheddarBooks/tests/CheddarBooks.Tests/LaundryLogTests.fs)\n- [html-screen-path-renderer-proving-ground.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/html-screen-path-renderer-proving-ground.md)\n\nCommit:\n- `fb66b86` `model: turn screen path into app-style viewport`\n\nVerification:\n- `dotnet build /home/ivan/NEXUS/CheddarBooks/CheddarBooks.slnx`\n- `dotnet run --no-build --project /home/ivan/NEXUS/CheddarBooks/tests/CheddarBooks.Tests/CheddarBooks.Tests.fsproj`\n- `31` tests passed\n\nThis also matches the longer-term direction better: one continuous horizontal path, with the page structure ready to grow into shared row bands as more lenses like `ADM` become visible. If the file is already open in the browser, reload it so the rewritten viewport behavior is picked up."

