text = "a COMMAND -> EVENT is a slice type with possible TRIGGER -> COMMAND -> EVENT OR SCREEN -> COMMAND -> EVENT, which it might be that TRIGGER is something else, but we can start with this and see if we need it added. The other slice type is that it cane be EVENT -> VIEW -> ACTOR (where that can be screen/user, processor, or something else) So the event is not a slice type. its the backbone that everything hinges off, and remember the only rules for a view is that the event(s) it consumes must have happened before and be in the store, it does not need to immediatly preceed the view AND multiple views can consume the same event."

