text = "A `runbook` is a practical step-by-step operating guide.\n\nIn this repo context, when I say `runbook`, I mean a human-facing doc that explains:\n- what a command/workflow is for\n- when to use it\n- the exact command to run\n- important options\n- expected outcome\n- related follow-up steps\n\nSo files in [docs/how-to](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to) are basically runbooks.\n\nIt is more operational than conceptual:\n- architecture doc = explains ideas and boundaries\n- glossary = explains terms\n- decision/ADR = explains why we chose something\n- runbook/how-to = explains how to actually do the thing\n\nThe word comes from operations/SRE/admin culture, where a “runbook” is the document you follow to perform a task reliably. In NEXUS, I’ve been using it in that same spirit: repeatable human instructions for tools and workflows."

