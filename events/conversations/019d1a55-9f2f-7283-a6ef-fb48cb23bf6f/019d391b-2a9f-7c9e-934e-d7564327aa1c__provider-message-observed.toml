[[body.segments]]
kind = "plain_text"
text = "Yes, I think that’s right: this is very much where `FnHCI` should live.\n\nThe clean distinction is:\n\n- `Application Lifecycle`\n  Events/states about the app existing and changing lifecycle phase.\n  Examples: `AppStarted`, `AppResumed`, `AppSuspended`, `StartupChecksCompleted`.\n\n- `App Runtime`\n  The broader running system concern.\n  Includes lifecycle, but also:\n  - route resolution\n  - local state hydration\n  - sync checks\n  - UI/business coordination\n  - error/retry behavior\n  - screen-state transitions driven by app mechanics\n\nSo:\n\n- `Application Lifecycle` is a subset of `App Runtime`.\n- `App Runtime Lens` is the broader lens.\n- `AppStarted` belongs most naturally to `Application Lifecycle`.\n\nFor the coordinating behavior between UI and business, I’d name that area something like:\n\n- `Runtime Orchestration`\n- or `Interaction Orchestration`\n\nAnd that’s the part I’d expect `FnHCI` to own most directly.\n\nA clean stack would be:\n\n- `AEM Lens`\n  business events, commands, views\n- `Screen Path Lens`\n  user-visible screen states in order\n- `App Runtime Lens`\n  lifecycle + runtime mechanics + orchestration\n- `FnHCI`\n  the coordination/interactions layer that helps weave UI system behavior with business-system exchanges\n\nSo in practice:\n\n- `AppStarted` -> `Application Lifecycle`\n- `show splash while startup checks run` -> `App Runtime`\n- `route to Need Location` -> `Runtime Orchestration` / `FnHCI`\n- `user sets location, business command fires` -> crosses from `FnHCI` into `AEM`\n\nIf you want one simple rule:\n- use `Application Lifecycle` for things like `AppStarted`\n- use `App Runtime` for the broader concern line\n- use `FnHCI` for the orchestration seam inside that broader runtime concern\n\nIf you want, I can update the new path-lens doc to use exactly that vocabulary next."

