kind = "plain_text"
text = "Added the normalized import-snapshot layer and pushed it on `codex/feature/export-window-analysis` as commit `01bfee9b`.\n\nThe important change is that provider imports now write a per-import normalized snapshot under [NEXUS-EventStore/snapshots/imports](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore/snapshots/imports) from the parsed payload before canonical dedupe. That means we no longer have to infer snapshot behavior from additive canonical events or batch-local working slices. The new comparison command is:\n\n```bash\ndotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- \\\n  compare-import-snapshots \\\n  --base-import-id <uuid> \\\n  --current-import-id <uuid>\n```\n\nMain pieces are in [ImportSnapshots.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/ImportSnapshots.fs), [ImportWorkflow.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Importers/ImportWorkflow.fs), and [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs). The human guide is [compare-import-snapshots.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/compare-import-snapshots.md). Yes, the new public APIs have source xmldoc in the repo convention style.\n\nValidation is clean:\n- `dotnet build /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/NEXUS-Code.slnx`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj`\n- `64` tests passed\n\nOne important note: older real imports in your current event store predate this snapshot layer, so `compare-import-snapshots` is immediately useful for new imports going forward, but older imports will need a backfill/rebuild path if you want this same comparison on historical imports. The only local-only changes still sitting outside Git are the untracked real event-store data under [NEXUS-EventStore](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-EventStore)."

