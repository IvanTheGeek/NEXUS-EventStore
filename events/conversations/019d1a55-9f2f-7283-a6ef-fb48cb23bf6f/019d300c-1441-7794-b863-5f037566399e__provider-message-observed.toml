kind = "plain_text"
text = "The next step is done on `logos-intake-foundation` and pushed as `eaff2cbd`.\n\nThis slice makes the LOGOS boundary materially safer, not just better labeled. Manual LOGOS intake notes now persist `source_instance`, `access_context`, `acquisition_kind`, `rights_policy`, and optional `attribution_reference` from entry time in [IntakeNotes.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/src/Nexus.Logos/IntakeNotes.fs) and [Policy.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/src/Nexus.Logos/Policy.fs). The `public-safe` boundary in [Pools.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/src/Nexus.Logos/Pools.fs) now requires both public-safe handling and rights that actually allow public distribution, with attribution required when the rights policy demands it. Derived sanitized notes carry rights forward in [SanitizedNotes.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/src/Nexus.Logos/SanitizedNotes.fs), and public export in [PublicExports.fs](/tmp/nexus-merge-M7SKP3/NEXUS-Code/src/Nexus.Logos/PublicExports.fs) now writes attribution obligations into the export manifest instead of leaving that to memory.\n\nThat means your concern is now modeled correctly:\n- `personal-training-only` can stay useful in private flows while being blocked from public-safe export\n- `cc-by` / `cc-by-sa` can cross the public boundary only if attribution is carried with them\n- later GUI/help/about surfaces have a concrete manifest to read from instead of ad hoc notes\n\nI also added the decision at [0013-access-context-and-rights-aware-intake.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0013-access-context-and-rights-aware-intake.md), updated [0012-pool-based-handling-boundaries.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0012-pool-based-handling-boundaries.md), and refreshed the glossary/runbooks/README to match. Validation is green:\n- `dotnet build /tmp/nexus-merge-M7SKP3/NEXUS-Code/NEXUS-Code.slnx`\n- `dotnet run --project /tmp/nexus-merge-M7SKP3/NEXUS-Code/tests/Nexus.Tests/Nexus.Tests.fsproj`\n- `104` tests passed\n\nNext strongest move is the first real Talkyard acquisition flow, using this new model from the start:\n- explicit `source_instance` for `talkyard.ivanthegeek.com` vs `forum.talkyard.io`\n- explicit `access_context` for anonymous vs registered vs admin\n- explicit `acquisition_kind` for `web-scrape` vs `api-pull`\n- later reconciliation between scrape and API observations"

