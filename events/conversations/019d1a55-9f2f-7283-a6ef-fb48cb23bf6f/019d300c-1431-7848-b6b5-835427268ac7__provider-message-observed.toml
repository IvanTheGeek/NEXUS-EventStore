kind = "plain_text"
text = "Yes, that rule now lives at the NEXUS level.\n\nI cherry-picked it onto `main` and pushed it as `1ee17e03`, so it is no longer just on the `fntools-repo-bootstrap` branch. The repo-level references are:\n- [README.md](/tmp/nexus-merge-M7SKP3/README.md)\n- [collaboration-protocol.md](/tmp/nexus-merge-M7SKP3/docs/collaboration-protocol.md)\n\nFor `gh`, since LMDE 7 is Debian-based, the official Debian install path is the right one. Run:\n\n```bash\n(type -p wget >/dev/null || (sudo apt update && sudo apt install wget -y)) \\\n  && sudo mkdir -p -m 755 /etc/apt/keyrings \\\n  && out=$(mktemp) && wget -nv -O\"$out\" https://cli.github.com/packages/githubcli-archive-keyring.gpg \\\n  && cat \"$out\" | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \\\n  && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \\\n  && sudo mkdir -p -m 755 /etc/apt/sources.list.d \\\n  && echo \"deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main\" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \\\n  && sudo apt update \\\n  && sudo apt install gh -y\n```\n\nThen authenticate:\n\n```bash\ngh auth login\n```\n\nAfter that, useful checks are:\n\n```bash\ngh auth status\ngh repo view IvanTheGeek/FnTools --web\n```\n\nSources:\n- [GitHub CLI Linux install docs](https://github.com/cli/cli/blob/trunk/docs/install_linux.md)\n- [GitHub CLI quickstart](https://docs.github.com/en/github-cli/github-cli/quickstart)\n\nSince you already pushed `FnTools` to GitHub, the next clean move is for me to wire the local repo at [FnTools](/home/ivan/NEXUS/FnTools) to its `origin` remote and then start the same real bootstrap path for `CheddarBooks`."

