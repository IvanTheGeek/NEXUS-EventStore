text = "The first external graph-visualization path is in and pushed as `f3ff3eee` on `codex/nexus-ingestion-foundation`.\n\nThe main pieces are [GraphvizDot.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/GraphvizDot.fs), the new CLI wiring in [Program.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Program.fs), the how-to at [export-graphviz-dot.md](/home/ivan/NEXUS/NEXUS-EMERGING/docs/how-to/export-graphviz-dot.md), and regression coverage in [GraphvizDotTests.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/tests/Nexus.Tests/GraphvizDotTests.fs). I also cleaned up the graph layer in [GraphAssertions.fs](/home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.EventStore/GraphAssertions.fs) so import nodes no longer point to themselves with `observed_during_import`, which makes the DOT output much cleaner.\n\nValidation is green: `dotnet build /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/NEXUS-Code.slnx` succeeded, and the test suite passed `18/18`. The CLI flow also works end to end on a smoke store. The sample DOT file is at [/tmp/nexus-graphviz-smoke-z3xH7j/graph/exports/nexus-graph.dot](/tmp/nexus-graphviz-smoke-z3xH7j/graph/exports/nexus-graph.dot).\n\nUse it with:\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- export-graphviz-dot`\n- `dotnet run --project /home/ivan/NEXUS/NEXUS-EMERGING/NEXUS-Code/src/Nexus.Cli/Nexus.Cli.fsproj -- help export-graphviz-dot`\n\nOne note: a full real-store `rebuild-graph-assertions` is currently CPU-heavy and did not finish quickly, so the feature is done, but performance on the larger store is the next obvious refinement."

