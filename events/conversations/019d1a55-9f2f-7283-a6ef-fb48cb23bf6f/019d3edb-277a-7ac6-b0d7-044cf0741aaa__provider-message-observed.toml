text = "That choice makes sense.\n\nSo the emerging rule becomes:\n\n- outer NM shell color = bounded context cue\n- explicit header pills = the real meaning\n- inner AEM command/view colors stay authoritative for AEM card type\n\nThat gives a clean split:\n\n- `ApplicationLifecycle`\n  one outer shell color family\n- `RuntimeOrchestration`\n  a different outer shell color family\n- `ScreenPath`\n  a different outer shell color family\n- `EventModeling`\n  needs special handling, because the inner AEM cards already carry strong command/view/event colors\n\nMy recommendation for `EventModeling` is:\n- keep the outer shell more neutral/subtle\n- let the inner AEM blue/green/orange do the real work\n- still label the context explicitly in the header pills\n\nReason:\n- otherwise the outer column color and the inner command/view/event colors will compete\n- and AEM already has an established color grammar you’ve been tuning\n\nSo I’d currently shape it like:\n- `ApplicationLifecycle` outer shell: distinct lifecycle color\n- `RuntimeOrchestration` outer shell: distinct runtime color\n- `ScreenPath` outer shell: distinct screen-path color\n- `EventModeling` outer shell: quieter business/slate shell, with inner AEM colors preserved\n\nIf that feels right, the next refinement point is whether you want the explanatory popup to be:\n- a small glossary-like reminder for each header pill\n- or a slightly richer panel that explains “why this column has this classification” in context of the current column"

