[[body.segments]]
kind = "plain_text"
text = "That also fits the picture.\n\nA gradual CPU drop with still-low I/O and low RAM pressure usually points to the workload becoming less “embarrassingly parallel” over time, not to the VM starving. A few likely contributors are:\n- more coordination and bookkeeping in the later derivation/write path\n- more small-file metadata work that doesn’t saturate storage throughput but still serializes parts of the flow\n- GC / allocation shape changing as the in-memory assertion set grows\n- parts of the rebuild simply not parallelized enough to keep 6 vCPU equally busy end to end\n\nSo the signal is still the same: the current architecture is benefiting from more CPU, but it is not shaped to scale linearly with more cores. That’s exactly the kind of evidence we wanted from this rerun. I’m keeping the rebuild going to get the final timing and counts."

