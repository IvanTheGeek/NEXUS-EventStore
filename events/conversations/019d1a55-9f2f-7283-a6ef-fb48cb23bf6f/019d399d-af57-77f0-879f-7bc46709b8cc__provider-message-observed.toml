[[body.segments]]
kind = "plain_text"
text = "`not “F# instead of Playwright”` we can document the following NEXUS wide: I am not opposed to using tools and languages when they fit the job and are best in that area of concern, i.e. playwright for browser interaction testing, expecto for code testing. I am simply defaulting to F# and its paradigm and usage for correctness and deterministic benefits. When we hit blocks where working around the issues or stopping us from progression, then we either change (like change to playwright language or script or whatever it uses, OR use a python library becasue it is already done), build on top of it (e.i. create an F# wrapper for `Verify` instead of rebuild Verify, OR use blazor and build on top) or replace (i.e. FnHCI.Blazor as replacement of Bolero because of the issues found investigating Bolero). I am all for using existing tools i.e. Talkyard and consitributing back to them, build on top of and add value that way or replace with our own or even swap out when a better alternative is found."

