text = "That’s now hard-copy in NEXUS and merged to `main` at `7b8a1776`.\n\nNew durable records:\n- [0022-functionalize-repeatable-work-into-deterministic-surfaces.md](/tmp/nexus-merge-M7SKP3/docs/decisions/0022-functionalize-repeatable-work-into-deterministic-surfaces.md)\n- [forge-foundation.md](/tmp/nexus-merge-M7SKP3/docs/forge-foundation.md)\n\nI also linked and reinforced it in:\n- [collaboration-protocol.md](/tmp/nexus-merge-M7SKP3/docs/collaboration-protocol.md)\n- [repository-concern-lines.md](/tmp/nexus-merge-M7SKP3/docs/repository-concern-lines.md)\n- [README.md](/tmp/nexus-merge-M7SKP3/README.md)\n\nSo the repo now explicitly says:\n- important repeated work should move from AI-assisted discovery into deterministic, reviewable surfaces\n- those surfaces can be functions, commands, scripts, workflows, schemas, or compiler-like behavior\n- this is a core FORGE direction\n- the goal is to reduce dependence on the capabilities of any one AI and give future humans/AI the same inspectable tools\n\nThis was docs-only, so I didn’t run tests."

