[[body.segments]]
kind = "plain_text"
text = "Yes. That’s a very strong direction, and it suggests a clearer model than “one dataset with flags.”\n\nI’d think of this as **multiple derived pools with different trust/permission levels**.\n\nSomething like:\n\n- `raw pool`\n  preserved intake, maximal provenance, may contain anything\n- `personal/private pool`\n  still rich and useful, allowed to retain sensitive detail for the owner/operator\n- `sanitized/public pool`\n  explicitly derived, redacted/anonymized/approved, safe for broader sharing and public-facing retrieval\n\nThat fits your workflow much better because the key distinction is not just classification, but **which pool a thing is allowed to enter**.\n\nSo in F# terms, I’d lean toward:\n\n- policy properties still exist on items\n- but pool membership and allowed operations become typed boundaries\n\nConceptually:\n\n- `RawItem`\n- `PrivateItem`\n- `PublicSafeItem`\n\nAnd promotion between them is explicit:\n\n- `RawItem -> PrivateItem` maybe straightforward or policy-gated\n- `RawItem/PrivateItem -> PublicSafeItem` only through explicit sanitization + approval\n\nThat gives you a few benefits:\n\n- safer by construction\n  public workflows can require `PublicSafeItem`\n- clearer mental model\n  “which pool is this in?” is easier than remembering lots of property combinations\n- easier future storage separation\n  each pool could later have different stores, indexes, vector DBs, or sharing rules\n- better support for different goals\n  personal use, customer support, internal learning, public corpus, RAG, etc.\n\nSo I’d refine the earlier rule to this:\n\n- use **properties** for handling metadata\n- use **types/pools** for permission and allowed downstream usage\n\nThat means:\n- policy remains visible and auditable\n- but public-facing pipelines do not trust policy alone\n- they only accept items that have been explicitly promoted into the right pool/type\n\nFor example, later:\n- public embeddings should only be built from `PublicSafeItem`\n- internal/private retrieval could use `PrivateItem`\n- provenance/debugging might still reach back to `RawItem`\n\nI think that is probably closer to what you want than a single universal note/item type.\n\nSo my recommendation is:\n1. keep the current policy model\n2. add a decision note about pool-based handling\n3. next introduce a small `Nexus.Logos.Pools` or equivalent model\n4. make future public/export workflows depend on the `PublicSafe` boundary type, not raw policy inspection alone\n\nThis is one of those places where stronger types really do earn their keep."

