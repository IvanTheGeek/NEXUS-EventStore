kind = "plain_text"
text = "Yes, that makes sense, and that is exactly why `ScreenComposition` should probably not be too visual-name-specific forever.\n\nIf we stop at only “screen,” we bias too hard toward graphical UI.\n\nWhat you’re pointing at is a broader thing like:\n\n- one composition model\n- many human-facing projections\n\nThat includes:\n- graphical screens\n- terminal/console app surfaces\n- text UIs\n- CLI workflows that still feel app-like\n- web/API contract surfaces in some cases\n\nSo I’d refine the terminology like this:\n\n- `ScreenComposition`\n  maybe too narrow if we know terminal/text app surfaces matter\n\nBetter broader candidate:\n- `InteractionComposition`\n\nThat gives us:\n\n- `ScreenComposition`\n  as one sub-area under it\n- terminal/text surfaces\n  as another\n- maybe API/contract interaction surfaces\n  as another\n\nThen `FnHCI` becomes even clearer:\n- `FnHCI` is the larger interaction system area\n- `InteractionComposition` is one important bounded context under it\n- renderers/projectors target:\n  - HTML/CSS screen\n  - Android native\n  - iOS native\n  - terminal/text app\n  - CLI-guided workflow\n  - maybe API-contract projection\n\nSo I’d now lean toward this structure:\n\n- `EventModeling`\n- `ApplicationLifecycle`\n- `RuntimeOrchestration`\n- `ScreenPath`\n- `InteractionComposition`\n\nAnd inside `InteractionComposition`:\n- graphical screen composition\n- terminal/text composition\n- maybe contract/API interaction composition\n\nThat feels more future-proof.\n\nThen your Claude Code Terminal example fits naturally:\n- not a “screen” in the mobile sense\n- but clearly an interaction surface\n- so it belongs under `InteractionComposition`\n\nMy recommendation:\n- use `InteractionComposition` as the broader bounded context\n- treat `ScreenComposition` as one sub-area or lens within it\n\nSo the current HTML/CSS work is:\n- a graphical projection from `InteractionComposition`\n\nIf you want, the next doc update should use that stronger term instead of locking us into `ScreenComposition` too early."

