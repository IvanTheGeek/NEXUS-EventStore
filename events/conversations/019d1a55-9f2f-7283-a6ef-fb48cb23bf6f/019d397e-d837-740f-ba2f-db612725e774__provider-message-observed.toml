text = "`PATH1.Row.V1` is now live on the `PATHS` page in the `LaundryLog` Penpot file. It’s a first readable row lens: title, short note, then alternating `CommandSlice` / `ViewSlice` cards for manual location, washer, and dryer.\n\nPreview:\n![PATH 1 row](/home/ivan/NEXUS/tmp/LaundryLog_PATH1_Row_V1_overlay.png)\n\nCurrent shape:\n- row board: `PATH1.Row.V1`\n- location: live `PATHS` page\n- screen slots: still screenshot-like placeholders, not full embedded screen thumbnails yet\n- actor model: single-actor for now\n- layout: clearly desktop/tablet oriented\n\nImportant Penpot finding:\n- duplicated slice shells worked well\n- inherited text edits did not export/render reliably\n- the reliable current pattern is: keep the detached component shell, hide inherited text nodes, and overlay fresh local text for card-specific content\n\nI recorded that durably in:\n- NEXUS `penpot-surface-protocol`: `9d7fba8f`\n- CheddarBooks `laundrylog-fnhci-primitive-map`: `fb4f2b1`\n\nRelevant docs:\n- [penpot-surface-comparison.md](/home/ivan/NEXUS/NEXUS-EMERGING-main/docs/penpot-surface-comparison.md)\n- [penpot-projection.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-projection.md)\n- [penpot-board-seed.md](/home/ivan/NEXUS/CheddarBooks/docs/laundrylog/event-modeling/penpot-board-seed.md)\n\nNo tests were run because this was live Penpot work plus docs-only commits.\n\nThe next strongest move is to upgrade the screen slot from placeholder to actual screen thumbnail, then decide whether `PATH1.Row.V1` should move upward on the page and become the canonical first row instead of just the first proof."

