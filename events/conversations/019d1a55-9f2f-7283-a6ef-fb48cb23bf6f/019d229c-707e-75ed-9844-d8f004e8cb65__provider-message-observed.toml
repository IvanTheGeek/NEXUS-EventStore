text = "Yes. The XML doc minimum I’d recommend is:\n\n1. Document every public type and every public member with `<summary>`.\n2. Add `<param>` for every parameter, `<typeparam>` for every generic parameter, and `<returns>` when the return meaning isn’t trivial.\n3. Add `<remarks>` for behavioral semantics that are not obvious from the signature:\n   defaults, side effects, async/parallel behavior, cancellation, idempotence, ordering, exceptions, and “when to use this vs the other overload.”\n4. Use `<inheritdoc>` on inherited/implemented members so the generated XML file is complete for consumers.\n5. Add `<example>` on the real entry points, not everywhere.\n6. Add `<see>` / `<seealso>` links across related API families.\n\nFor AI specifically, the real minimum that would have reduced our Expecto/FsCheck friction is this:\n\n- A module/type summary that says what area the API is for.\n- A summary on the primary entry points.\n- A short example on the primary entry points.\n- Docs on config records and their fields.\n- Docs on public values/functions that act as defaults or entry handles, like `defaultConfig`.\n- Cross-links between sibling functions like `testProperty`, `testPropertyWithConfig`, focused/ignored variants, and config types.\n\nThe key point is: XML docs should not try to replace the README. They should answer “what does this API do, what do these parameters mean, what behavior matters, and what related API should I look at next?”\n\nSo I’d use this rule:\n\n- README/docs explain the model and workflow.\n- XML docs explain exact API intent and semantics.\n- Examples bridge the two.\n\nIf you want a sharper “AI-usable minimum,” I’d phrase it as:\n\n- `<summary>`: purpose, not name repetition\n- `<param>`: semantic role, not type restatement\n- `<returns>`: what the caller gets back conceptually\n- `<remarks>`: defaults, side effects, ordering, cancellation, idempotence, relationship to sibling APIs\n- `<example>`: one happy-path snippet for each entry-point API\n- `<seealso>`: point to the next likely API\n\nOne subtle but important addition for F# libraries:\n- document public module values, record fields, DU cases, and builder/config helpers just as carefully as methods\n- otherwise the generated XML can still leave gaps exactly where F# users and AI agents need guidance\n\nMicrosoft’s guidance supports the baseline here: document all public types and public members, use `<summary>` at bare minimum, and use tags like `<param>`, `<returns>`, `<typeparam>`, and explicit `<inheritdoc>` for distributed libraries. Sources: [Recommended XML tags](https://learn.microsoft.com/en-us/dotnet/csharp/language-reference/xmldoc/recommended-tags).\n\nI couldn’t load the specific shared ChatGPT page you linked, so I based this on our Expecto issue and the official XML-doc guidance rather than that exact conversation’s text. If you want, I can turn this into a short repo decision/checklist next."

