text = "#!/bin/bash\nset -e  # Exit on any error\n\necho \"=========================================\"\necho \"FnMCP.IvanTheGeek Fix & Deploy Script\"\necho \"=========================================\"\necho \"\"\n\n# Paths\nSOURCE_DIR=\"/home/linux/RiderProjects/FnMCP.IvanTheGeek\"\nPROGRAM_FILE=\"$SOURCE_DIR/src/FnMCP.IvanTheGeek/Program.fs\"\nDEPLOY_DIR=\"/home/linux/FnMCP.IvanTheGeek\"\nBINARY_NAME=\"FnMCP.IvanTheGeek\"\n\necho \"Step 1: Fixing Program.fs path logic...\"\necho \"  File: $PROGRAM_FILE\"\n\n# Create a backup\ncp \"$PROGRAM_FILE\" \"$PROGRAM_FILE.backup\"\necho \"  ✓ Backup created: $PROGRAM_FILE.backup\"\n\n# Fix the path logic using sed\nsed -i 's/__SOURCE_DIRECTORY__/AppContext.BaseDirectory/g' \"$PROGRAM_FILE\"\nsed -i 's/Path.GetDirectoryName(Path.GetDirectoryName(\\(.*\\)))/Path.GetDirectoryName(\\1)/g' \"$PROGRAM_FILE\"\nsed -i 's/in project root/relative to binary location/g' \"$PROGRAM_FILE\"\n\necho \"  ✓ Path logic fixed\"\necho \"\"\n\necho \"Step 2: Building single-file binary...\"\ncd \"$SOURCE_DIR\"\n\n# Build as single-file binary for Linux\ndotnet publish src/FnMCP.IvanTheGeek/FnMCP.IvanTheGeek.fsproj \\\n    -c Release \\\n    -r linux-x64 \\\n    --self-contained false \\\n    -p:PublishSingleFile=true \\\n    -o \"$SOURCE_DIR/bin/publish\"\n\necho \"  ✓ Build complete\"\necho \"\"\n\necho \"Step 3: Deploying to $DEPLOY_DIR...\"\n\n# Create deploy directory if it doesn't exist\nmkdir -p \"$DEPLOY_DIR\"\n\n# Copy the binary\ncp \"$SOURCE_DIR/bin/publish/$BINARY_NAME\" \"$DEPLOY_DIR/\"\nchmod +x \"$DEPLOY_DIR/$BINARY_NAME\"\n\necho \"  ✓ Binary copied and made executable\"\necho \"\"\n\necho \"Step 4: Setting up context-library...\"\n\n# Create context-library structure\nmkdir -p \"$DEPLOY_DIR/context-library/framework\"\nmkdir -p \"$DEPLOY_DIR/context-library/apps/laundrylog\"\nmkdir -p \"$DEPLOY_DIR/context-library/test\"\n\necho \"  ✓ Context library structure created\"\necho \"\"\n\necho \"Step 5: Verifying setup...\"\necho \"  Binary location: $DEPLOY_DIR/$BINARY_NAME\"\necho \"  Context library:  $DEPLOY_DIR/context-library/\"\necho \"\"\n\nif [ -f \"$DEPLOY_DIR/$BINARY_NAME\" ]; then\n    echo \"  ✓ Binary exists\"\n    ls -lh \"$DEPLOY_DIR/$BINARY_NAME\"\nelse\n    echo \"  ✗ Binary NOT found!\"\n    exit 1\nfi\n\nif [ -d \"$DEPLOY_DIR/context-library\" ]; then\n    echo \"  ✓ Context library exists\"\n    ls -la \"$DEPLOY_DIR/context-library/\"\nelse\n    echo \"  ✗ Context library NOT found!\"\n    exit 1\nfi\n\necho \"\"\necho \"=========================================\"\necho \"✓ Deployment complete!\"\necho \"=========================================\"\necho \"\"\necho \"Next steps:\"\necho \"1. Restart Claude Desktop to reload the MCP server\"\necho \"2. Test by asking Claude to update documentation\"\necho \"3. Files should now go to: $DEPLOY_DIR/context-library/\"\necho \"\"\necho \"To restore original Program.fs if needed:\"\necho \"  cp $PROGRAM_FILE.backup $PROGRAM_FILE\"\necho \"\""

