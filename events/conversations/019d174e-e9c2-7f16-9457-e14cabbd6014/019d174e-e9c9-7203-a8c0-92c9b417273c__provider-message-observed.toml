\\u0022\\n\\n# Create deploy directory if it doesn\\u0027t exist\\nmkdir -p \\u0022$DEPLOY_DIR\\u0022\\n\\n# Copy the binary\\ncp \\u0022$SOURCE_DIR/bin/publish/$BINARY_NAME\\u0022 \\u0022$DEPLOY_DIR/\\u0022\\nchmod \\u002Bx \\u0022$DEPLOY_DIR/$BINARY_NAME\\u0022\\n\\necho \\u0022  \\u2713 Binary copied and made executable\\u0022\\necho \\u0022\\u0022\\n\\necho \\u0022Step 4: Setting up context-library...\\u0022\\n\\n# Create context-library structure\\nmkdir -p \\u0022$DEPLOY_DIR/context-library/framework\\u0022\\nmkdir -p \\u0022$DEPLOY_DIR/context-library/apps/laundrylog\\u0022\\nmkdir -p \\u0022$DEPLOY_DIR/context-library/test\\u0022\\n\\necho \\u0022  \\u2713 Context library structure created\\u0022\\necho \\u0022\\u0022\\n\\necho \\u0022Step 5: Verifying setup...\\u0022\\necho \\u0022  Binary location: $DEPLOY_DIR/$BINARY_NAME\\u0022\\necho \\u0022  Context library:  $DEPLOY_DIR/context-library/\\u0022\\necho \\u0022\\u0022\\n\\nif [ -f \\u0022$DEPLOY_DIR/$BINARY_NAME\\u0022 ]; then\\n    echo \\u0022  \\u2713 Binary exists\\u0022\\n    ls -lh \\u0022$DEPLOY_DIR/$BINARY_NAME\\u0022\\nelse\\n    echo \\u0022  \\u2717 Binary NOT found!\\u0022\\n    exit 1\\nfi\\n\\nif [ -d \\u0022$DEPLOY_DIR/context-library\\u0022 ]; then\\n    echo \\u0022  \\u2713 Context library exists\\u0022\\n    ls -la \\u0022$DEPLOY_DIR/context-library/\\u0022\\nelse\\n    echo \\u0022  \\u2717 Context library NOT found!\\u0022\\n    exit 1\\nfi\\n\\necho \\u0022\\u0022\\necho \\u0022=========================================\\u0022\\necho \\u0022\\u2713 Deployment complete!\\u0022\\necho \\u0022=========================================\\u0022\\necho \\u0022\\u0022\\necho \\u0022Next steps:\\u0022\\necho \\u00221. Restart Claude Desktop to reload the MCP server\\u0022\\necho \\u00222. Test by asking Claude to update documentation\\u0022\\necho \\u00223. Files should now go to: $DEPLOY_DIR/context-library/\\u0022\\necho \\u0022\\u0022\\necho \\u0022To restore original Program.fs if needed:\