text = "That shows the Filesystem MCP server is working, but I need to check if the FnMCP.IvanTheGeek server is accessible. The filesystem server appears to be a different one (allowing access to /home/linux).\n\nLet me check what files might be available. Actually, I should try to look for the context-library files that would be served by the FnMCP.IvanTheGeek server. But I'm not sure how to access MCP resources directly.\n\nLooking at the tools available, I don't see a direct way to list MCP resources. The filesystem tools are from a different MCP server.\n\nI should ask Ivan how to verify the FnMCP.IvanTheGeek server is connected. The filesystem MCP server is clearly working (different server), but I need to understand how to access the resources from his new server."

