tent from source docs\\\\n2. **Rewrite** in focused, modular way (not copy-paste)\\\\n3. **Size check:** Verify KB target (use token estimate if needed)\\\\n4. **Write** using MCP \\u0060update_documentation\\u0060 tool\\\\n5. **Confirm** success before moving to next file\\\\n\\\\n### Quality Guidelines\\\\n\\\\n**Modularity:**\\\\n- Each file should stand alone\\\\n- Cross-reference other files when needed: \\\\\\u0022See framework/event-modeling-approach.md for details\\\\\\u0022\\\\n- No duplicated content (DRY principle)\\\\n\\\\n**Clarity:**\\\\n- Write for future Claude conversations to read\\\\n- Assume reader has Quick Start context only\\\\n- Include examples where helpful\\\\n- Use markdown effectively (headers, lists, code blocks)\\\\n\\\\n**Conciseness:**\\\\n- Respect target file sizes\\\\n- Every sentence earns its place\\\\n- Cut fluff, keep substance\\\\n- Use bullet points for lists of facts\\\\n\\\\n### Progressive Disclosure\\\\n\\\\n**Quick Start files:** Answer \\\\\\u0022what\\\\\\u0022 and \\\\\\u0022why\\\\\\u0022 at high level  \\\\n**Framework files:** Answer \\\\\\u0022how\\\\\\u0022 with methodology details  \\\\n**App files:** Answer \\\\\\u0022specifically what\\\\\\u0022 for each application  \\\\n**Technical files:** Answer \\\\\\u0022implementation how\\\\\\u0022 with code patterns\\\\n\\\\n---\\\\n\\\\n## Work Process\\\\n\\\\n### Start Here\\\\n\\\\n1. **Begin with Quick Start files** - These are most important\\\\n2. **Show me each file** as you create it (first 20 lines preview)\\\\n3. **Wait for confirmation** before proceeding to next file\\\\n4. **Track progress:** Tell me which files are complete\\\\n\\\\n### After Quick Start Complete\\\\n\\\\n5. **I\\u0027ll update Project Knowledge** with Quick Start files\\\\n6. **Test token savings** in a new chat\\\\n7. **Continue with framework files** if Quick Start works well\\\\n\\\\n### Throughout Process\\\\n\\\\n- **Ask questions** if source material is unclear\\\\n- **Suggest i