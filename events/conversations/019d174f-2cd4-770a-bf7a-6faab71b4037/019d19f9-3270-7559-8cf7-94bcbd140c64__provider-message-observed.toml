text = "Yes — I think **now is the right time to add a library**, and I would make it a **separate F# class library** for the NEXUS core.\n\nMy recommendation is:\n\n```text\nEM-1.sln\n  /src\n    /EM1.App          // Bolero app\n    /Nexus.Core       // domain model, types, pure functions\n```\n\nAnd maybe later, only if it becomes necessary:\n\n```text\n    /Nexus.Lenses     // projections, view shaping, interpretation logic\n    /Nexus.Persistence // file/git/storage concerns\n```\n\nBut I would **not** start with too many projects. Start with just:\n\n- **EM1.App**\n- **Nexus.Core**\n\n## Why I think that is the right move\n\nBecause what you are describing is a real separation of concerns:\n\n### Bolero app\nThis is the shell, interaction layer, and experimental UI surface.\n\nIt should handle:\n- pages\n- components\n- templates\n- user interaction\n- converting domain results into visual state\n\n### Nexus.Core\nThis should hold the things you want to remain true even if Bolero disappeared tomorrow.\n\nIt should hold:\n- core types\n- invariants\n- relationships\n- domain functions\n- rules for valid construction\n- rules for transformation\n\nThat is exactly where the Scott Wlaschin influence belongs.\n\n## Why not leave it inside the Bolero app?\n\nYou *can*, but it tends to create drift.\n\nWhen the domain model lives inside the app project, it becomes easy to accidentally let UI concerns leak inward:\n\n- stringly typed fields\n- temporary hacks\n- view-specific naming\n- mutable convenience state\n- Bolero or browser concepts influencing the core\n\nOnce that happens, the “truth graph” stops being the truth and starts becoming “whatever the current app needed.”\n\nThat is the opposite of what you want.\n\n## Why a library helps your NEXUS idea\n\nYour core insight is:\n\n> the graph is the truth, everything else is a lens\n\nIf that is true, then the core graph model should be able to exist **independently of any one lens**.\n\nSo the core should not belong to:\n- Bolero\n- HTML templates\n- a specific Event Modeling screen\n- a specific visualization\n\nIt should stand on its own.\n\nThat is the strongest argument for the library.\n\n## What should go in `Nexus.Core`\n\nI would put in there only things that are stable and foundational:\n\n### 1. Primitive types\nThings like:\n- IDs\n- names\n- labels\n- edge kinds\n- node kinds\n- timestamps or ordering concepts\n- bounded value objects\n\n### 2. Core graph/domain types\nNot a UI graph. Not a rendered graph.\n\nThe actual model of truth:\n- node\n- relationship\n- fact\n- intent\n- lens reference\n- slice reference\n- path reference\n\n### 3. Construction functions\nSmart constructors and validation:\n- create valid node\n- create valid edge\n- connect things only in legal ways\n- prevent invalid combinations\n\n### 4. Pure transformation functions\nThings like:\n- add fact\n- derive path\n- build projection input\n- classify relationship\n- evolve graph immutably\n\n## What should **not** go in `Nexus.Core`\n\nI would keep these out:\n\n- Bolero components\n- HTML template fragments\n- CSS classes\n- display ordering for the UI\n- screen-specific view models\n- browser concerns\n- serialization choices that are only for one consumer\n\nThose belong outside.\n\n## What I think your slice HTML means architecturally\n\nYour CommandSlice and ViewSlice HTML templates are valuable, but I would treat them as:\n\n> **UI artifacts that render interpretations of the core**\n\nNot the core itself.\n\nSo:\n\n- the **core** should know what a Command Slice *is conceptually*\n- the **Bolero app** should know how to *display* one\n\nThat distinction matters a lot.\n\n## The main caution\n\nI do **not** think you should create a giant generic “utility library.”\n\nIt should be very intentional:\n- not “shared helpers”\n- not “misc”\n- not “common”\n\nIt should be the **domain core**.\n\nThat means if something goes into `Nexus.Core`, you should be able to ask:\n\n> “Would this still matter if I rewrote the UI, storage, and tooling?”\n\nIf yes, it belongs there.\n\nIf no, it probably does not.\n\n## My recommendation on naming\n\nI would call it:\n\n- `Nexus.Core`\n\nThat feels right for what you’re doing.\n\nIf later you want stronger distinction, you could evolve toward:\n\n- `Nexus.Primitives`\n- `Nexus.Core`\n- `Nexus.Lenses`\n\nBut right now that is probably too split.\n\n## How I would structure the first pass\n\nInside `Nexus.Core`, I would start with a small set of files like:\n\n```text\nNexus.Core\n  PrimitiveTypes.fs\n  GraphTypes.fs\n  Invariants.fs\n  GraphFunctions.fs\n  SliceTypes.fs\n  LensTypes.fs\n```\n\nVery small, very deliberate.\n\n## Philosophically\n\nI think you are at the point where the project needs to stop being “Bolero app first” and become:\n\n> **NEXUS core first, Bolero host second**\n\nThat does not reduce the value of the Bolero app. It clarifies its role.\n\nThe app becomes:\n- a workbench\n- a studio\n- a lens host\n- a renderer\n\nBut not the source of truth.\n\n## My direct answer\n\nSo yes:\n**add a class library now** for the NEXUS core.\n\nBut keep it tight:\n- one new library\n- pure domain focus\n- no UI leakage\n- model the invariants first\n- let the Bolero app reference it\n\nThat is the cleanest foundation for what you are trying to build.\n\nNext, I think we should define the **smallest possible first version of `Nexus.Core`**: the first 5–10 types, and what absolutely must be impossible to represent."

