text = "I am planning to bring in all resources and can about event modeling in one place and networking routers from OneMarcFifty. Both have websites which can be linked, videos, and both primarily operate in discord. This will be into LOGOS(Talkyard). I am thinking that a connector can be used with discord to bring in the channels there. Maybe make it two way so if a user were connected in talkyard, if they replied in LOGOS, it would then post in discord too. The reasons are so that a copy of the data is under my control hence will not disappear. This can be used for my a model enhancements, searchable, and also can be used to abstract the knowledge. Both discords have a lot of great insight and knowledge, it is just hard to distill and search. As these are processed and a body of docs emerge, they could form the bases of a learning system that might be an external system with this traceability a and store as the source. A digital learning system where the user can complete a course or module and dig deeper as they like to, sort of like 100,200,300, etc level classes in university. But of course free and open. Feedback from learners and be done and feeds in to LOGOS for continuous improvement."

