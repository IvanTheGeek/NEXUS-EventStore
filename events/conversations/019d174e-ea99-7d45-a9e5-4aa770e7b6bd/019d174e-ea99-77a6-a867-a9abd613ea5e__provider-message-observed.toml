text = "## Lens\n\nA lens is a deliberately chosen analytical filter you apply to examine something. It's a *tool* you pick up, not a position you occupy.\n\n- *Examples:* Applying an \"event sourcing lens\" to evaluate a new technology. A \"driver experience lens\" vs. a \"compliance lens\" on the same UI decision. An economic lens, a security lens, a domain lens.\n- *Scope:* Analytical — operates on any level from construct up to paradigm\n- *Key trait:* You can apply multiple lenses sequentially to the same thing. You can't hold two paradigms simultaneously. Lenses are composable and switchable on demand. They're conscious and deliberate where paradigm is largely not.\n- *Relation to existing terms:* Paradigm is the water you swim in. Perspective is where you stand. A lens is something you pick up and look *through*. A perspective shapes what you *notice*; a lens determines what you *analyze for*.\n\n**The triad:** Paradigm → Perspective → Lens is a progression from *unconscious worldview* to *positional viewpoint* to *deliberate analytical tool*.\n\n---\n\n## Suggested Additions\n\nHere are candidates worth considering, grouped by what gap they fill:\n\n---\n\n### Fills a gap in the abstraction stack\n\n**Model** — a composed representation of reality, built from constructs, used for reasoning about a domain or system. A construct is a single named thing; a model is an *arrangement* of constructs that represents how things relate.\n\n- *Examples:* The LaundryLog event model, a domain model in DDD, a mental model a driver has of how expenses work\n- *Gap it fills:* Right now there's nothing between *construct* (single concept) and *system* (functioning whole). A model is the intermediate — it's how you *think about* the system before or alongside building it.\n- *Key distinction:* A system *runs*; a model *represents*. You can have an incorrect model of a correct system.\n\n**Layer** — a level of abstraction within a system, where components at the same layer share concerns and interact primarily with adjacent layers.\n\n- *Examples:* UI layer, domain layer, infrastructure layer, transport layer. In NEXUS: the event capture layer vs. the projection layer vs. the RAG/retrieval layer.\n- *Gap it fills:* System tells you the boundary; layer tells you the internal structure. Without \"layer,\" you have to say \"the part of the system that does X\" every time.\n\n---\n\n### Makes implicit things explicit\n\n**Assumption** — an unstated or stated belief that underlies reasoning, design, or communication. Assumptions are what break things when wrong and are invisible when right.\n\n- *Examples:* \"Drivers will record expenses immediately\" (LaundryLog UX assumption). \"The event stream is the source of truth\" (paradigmatic assumption). \"The audience knows what a deduction is.\"\n- *Gap it fills:* None of the existing terms captures *the thing you're taking for granted*. Surfacing assumptions is critical in design, consulting, and cross-paradigm communication.\n- *Key trait:* Assumptions live underneath every other term. Every model has assumptions. Every framing has assumptions. Naming them is a separate act.\n\n**Constraint** — a rule or condition that limits valid states, behaviors, or decisions within a system or domain.\n\n- *Examples:* \"A session must have at least one machine record.\" \"IRS requires a receipt for expenses over $75.\" \"An event cannot be mutated after appending.\"\n- *Gap it fills:* Distinguishes *what's possible* from *what's allowed*. A system defines capability; constraints define validity within that capability.\n\n---\n\n### Sharpens the agency dimension\n\n**Intent** — the goal or purpose driving an Actor's action, distinct from the action itself. Intent is what an Actor is *trying to accomplish*, which may differ from what they actually do or what the system records.\n\n- *Examples:* The driver's intent is \"document this expense for taxes\" — the action is tapping a button. An agent's intent is \"minimize missed deductions.\" These are different from the commands issued.\n- *Gap it fills:* Actor and Agent describe *who* acts and *how autonomously*. Intent describes *why* — the motivational layer. Especially important when designing for humans, because misaligned intent and system design is where UX fails.\n\n---\n\n### Clarifies communication structure\n\n**Vocabulary** — the canonical set of constructs defined for a domain or system, with agreed-upon meanings. The language you commit to using consistently.\n\n- *Examples:* \"In LaundryLog, we say Session not Trip, Machine not Washer, Record not Log.\" NEXUS has a vocabulary: Slice, Projection, Path, Spec.\n- *Gap it fills:* Construct is a single defined concept. Vocabulary is the *collection* and the *commitment* — the act of saying \"these are our words.\" Without a shared vocabulary, people use constructs inconsistently across contexts.\n- *Note:* Eric Evans calls this \"ubiquitous language\" in DDD — same idea, less jargon.\n\n**Interface** — the defined point of interaction between two systems, components, actors, or layers. An interface specifies *what* can be exchanged and *how*, without exposing internals.\n\n- *Examples:* The UI is the interface between the system and the Actor. An API is an interface between systems. The Command is the interface between an Actor and the domain layer in event sourcing.\n- *Gap it fills:* System has a boundary; Interface defines what crosses that boundary and how. Boundary says \"here's the edge.\" Interface says \"here's the door, here's how it opens.\"\n\n---\n\n## Suggested Priority\n\nIf you're adding selectively, the highest-leverage ones are:\n\n1. **Model** — fills the construct→system gap; you reference this constantly already\n2. **Assumption** — makes invisible things visible; critical for consulting and AI collaboration\n3. **Vocabulary** — names the act of committing to constructs; essential for NEXUS/LOGOS\n4. **Intent** — separates *why* from *what*; important when designing for human Actors\n5. **Interface** — names the crossing point; you're already implicitly using this everywhere\n\n**Layer** and **Constraint** are useful but slightly more domain-specific to software architecture, so lower priority unless this framework is primarily for technical communication.\n\n---\n\n## Current Full Map\n\n```\nABSTRACTION STACK\n─────────────────────────────────────────\nParadigm       unconscious foundational worldview\n  Domain       territory of knowledge and practice\n    System     bounded, designed arrangement of components\n      Model    composed representation built from constructs\n        Layer  level of abstraction within a system\n          Context   active situational instance\n            Construct  named unit you reason with\n\nAGENCY DIMENSION\n─────────────────────────────────────────\nRole       defined function within a system\nActor      entity exercising agency\n  Agent    autonomous Actor with goals and a principal\nIntent     the why driving an Actor's action\n\nANALYTICAL TOOLS\n─────────────────────────────────────────\nLens         deliberate analytical filter (picked up, applied, set down)\nAssumption   unstated belief underlying any of the above\nConstraint   rule limiting valid states or behaviors\nVocabulary   committed set of constructs for a domain/system\nInterface    defined crossing point between systems/layers/actors\n\nCOMMUNICATION CHAIN\n─────────────────────────────────────────\nPerspective  how you see from where you stand\nFraming      how you package what you see\nAudience     who receives it\n```"

