text = "{\"start_timestamp\":\"2026-03-14T18:40:07.782589Z\",\"stop_timestamp\":\"2026-03-14T18:40:44.931423Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":\"toolu_01X3y6BvHiFUo4w6vSAgP3bm\",\"name\":\"create_file\",\"input\":{\"description\":\"Creating vocabulary reference markdown\",\"path\":\"/mnt/user-data/outputs/vocabulary-map.md\",\"file_text\":\"# Vocabulary Map\\n\\nA reference vocabulary for precise communication across design, architecture, and consulting work.\\nEach term is defined, scoped, and distinguished from its neighbors.\\n\\n---\\n\\n## Abstraction Stack\\n\\n| Term | Level | Definition |\\n|---|---|---|\\n| **Paradigm** | Foundational | Unconscious worldview that shapes what questions are askable and what counts as a valid answer. You operate *from inside* a paradigm, rarely choosing it consciously. |\\n| **Domain** | Territory | A bounded field of knowledge and practice with its own vocabulary, rules, and patterns. Defines what problems *exist*. |\\n| **Layer** | Structure | A stacked level of concern within a domain or system. In systems: architectural separation. In domains: organic levels of the field itself. |\\n| **System** | Designed | A bounded, designed arrangement of components with defined inputs, outputs, and emergent behavior. Has a boundary; what\\u0027s inside interacts by design. |\\n| **Model** | Representational | A composed representation of reality built from constructs. How you *think about* a system. A system *runs*; a model *represents*. You can have an incorrect model of a correct system. |\\n| **Context** | Situational | The active circumstances you\\u0027re currently operating in \\u2014 the *where* and *what*. A narrowing of domain to a specific live situation. |\\n| **Session** | Temporal | A bounded period of focused activity \\u2014 the *when* and *how long*. The active time-bounded slice of a Context. A Context can outlast many Sessions. |\\n| **Construct** | Conceptual | A deliberately defined, named concept built to carve reality at a useful joint. The atomic unit of a vocabulary. |\\n\\n---\\n\\n## Agency Dimension\\n\\n| Term | Definition |\\n|---|---|\\n| **Role** | A defined function within a system carrying responsibilities, permissions, and expected behaviors. Structural \\u2014 the function, not the person. |\\n| **Actor** | Any entity that initiates action within a system. Exercises a Role operationally. Every Agent is an Actor; not every Actor is an Agent. |\\n| **Agent** | An autonomous or semi-autonomous Actor operating toward goals on behalf of a principal. Has a principal relationship, goals, and autonomy over *how* to act. |\\n\\n---\\n\\n## Human Causal Chain\\n\\nThe full chain from deep persistent drive to recorded outcome.\\n\\n\\u0060\\u0060\\u0060\\nMotivation \\u2192 Goal \\u2192 Intent \\u2192 Action \\u2192 Event\\n                \\u2191\\n           spans Sessions\\n\\u0060\\u0060\\u0060\\n\\n| Term | The question it answers | Definition |\\n|---|---|---|\\n| **Motivation** | *Why (deep)?* | Persistent underlying force or need. Doesn\\u0027t complete \\u2014 it\\u0027s a condition. Generates Goals over time. |\\n| **Goal** | *What outcome?* | A defined, specific outcome spanning multiple Sessions. Completes or fails. Bridges Motivation to Intent. |\\n| **Intent** | *Why (now)?* | The specific, situational purpose driving a particular Action. Fleeting \\u2014 lives for one action. Generated by a Goal. |\\n| **Action** | *What was done?* | The discrete unit of doing. Between Intent and recorded outcome. Can fail without producing an Event. |\\n| **Event** | *What was recorded?* | Proof that an Action completed. Immutable. The source of truth in an event-sourced system. |\\n\\n---\\n\\n## Mechanical Causal Chain\\n\\nThe chain for system-initiated and automated processes \\u2014 no Motivation, no Intent.\\n\\n\\u0060\\u0060\\u0060\\nTrigger \\u2192 Action \\u2192 Event\\n\\u0060\\u0060\\u0060\\n\\n| Term | The question it answers | Definition |\\n|---|---|---|\\n| **Trigger** | *What caused it?* | A condition, signal, or event that initiates an Action mechanically or conditionally. No Intent required. |\\n| **Action** | *What was done?* | Same as the human chain \\u2014 the discrete unit of doing. |\\n| **Event** | *What was recorded?* | Same as the human chain \\u2014 immutable proof of completion. |\\n\\n\\u003E **Note:** Action and Event appear in both chains. The chains diverge only at their origin \\u2014\\n\\u003E human actions originate in Motivation; mechanical actions originate in Triggers.\\n\\n---\\n\\n## The Two Chains Side by Side\\n\\n\\u0060\\u0060\\u0060\\nHuman:     Motivation \\u2192 Goal \\u2192 Intent \\u2192 Action \\u2192 Event\\nMechanical:                    Trigger \\u2192 Action \\u2192 Event\\n\\u0060\\u0060\\u0060\\n\\nWhen designing for Actors, design for Motivation.\\nWhen designing for Agents and automations, design for Trigger conditions.\\nTreating human users like trigger-response machines is a root cause of bad UX.\\n\\n---\\n\\n## Structural Rules\\n\\n| Term | Definition | Distinction |\\n|---|---|---|\\n| **Constraint** | A rule limiting valid states or actions. Gates entry \\u2014 a pre-condition. | You violate a constraint by *attempting* a forbidden action. |\\n| **Invariant** | A condition that must always hold regardless of what actions occur. Perpetual integrity. | An invariant violation means the system is in a *broken state* \\u2014 not just that something was attempted. |\\n\\n---\\n\\n## Analytical Tools\\n\\n| Term | Definition |\\n|---|---|\\n| **Lens** | A deliberately chosen analytical filter applied to examine something. Composable, switchable, conscious. You can apply multiple lenses to the same thing sequentially. |\\n| **Assumption** | An unstated or stated belief underlying reasoning, design, or communication. Invisible when right; breaks things when wrong. Lives underneath every other term. |\\n\\n\\u003E **The triad:** Paradigm \\u2192 Perspective \\u2192 Lens\\n\\u003E \\u2014 from *unconscious worldview* to *positional viewpoint* to *deliberate analytical tool*.\\n\\n---\\n\\n## Language\\n\\n| Term | Definition |\\n|---|---|\\n| **Vocabulary** | The committed set of constructs for a domain or system, with agreed-upon meanings. Not just a dictionary \\u2014 the act of committing to consistent use. |\\n| **Interface** | The defined crossing point between two systems, components, actors, or layers. Specifies what can be exchanged and how, without exposing internals. Boundary says \\u0022here\\u0027s the edge\\u0022; Interface says \\u0022here\\u0027s the door.\\u0022 |\\n\\n---\\n\\n## Communication Chain\\n\\n\\u0060\\u0060\\u0060\\nPerspective \\u2192 Framing \\u2192 Audience\\n\\u0060\\u0060\\u0060\\n\\n| Term | Definition |\\n|---|---|\\n| **Perspective** | How you see from where you stand. Shaped by Role and Paradigm. Can be unconscious. |\\n| **Framing** | The deliberate act of structuring how something is presented to shape how it\\u0027s received. The bridge between Perspective and Audience. Framing doesn\\u0027t change the underlying construct \\u2014 it changes what gets foregrounded. |\\n| **Audience** | The specific people who will receive, use, or be affected by the output. Shapes form and language, not underlying content. |\\n\\n---\\n\\n## Quick Reference: Adjacent Term Distinctions\\n\\n| If you\\u0027re reaching for... | Make sure it isn\\u0027t... | Distinction |\\n|---|---|---|\\n| Paradigm | Perspective | Paradigm is unconscious worldview; Perspective is a positional viewpoint you can name |\\n| Perspective | Lens | Perspective is where you stand; Lens is what you deliberately pick up to analyze with |\\n| Domain | System | Domain is territory; System is a designed structure operating within it |\\n| System | Model | System runs; Model represents |\\n| Context | Session | Context is where/what; Session is when/how long |\\n| Construct | Vocabulary | Construct is one named concept; Vocabulary is the committed collection |\\n| Constraint | Invariant | Constraint gates entry; Invariant defines perpetual integrity |\\n| Role | Actor | Role is structural function; Actor is the entity exercising that function |\\n| Actor | Agent | Actor initiates; Agent initiates *autonomously toward goals* |\\n| Motivation | Intent | Motivation persists; Intent is situational and fleeting |\\n| Goal | Intent | Goal spans Sessions and completes; Intent lives for one action |\\n| Trigger | Intent | Trigger is mechanical cause; Intent is purposeful human cause |\\n| Framing | Perspective | Perspective is how you see; Framing is how you package it for an audience |\\n| Interface | Boundary | Boundary defines the edge; Interface defines what crosses it and how |\\n\\n---\\n\\n*This vocabulary is itself an instance of what it describes \\u2014\\na committed set of constructs for precise communication across design, architecture, and consulting work.*\\n\"},\"message\":\"Creating vocabulary reference markdown\",\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":\"file\",\"context\":null,\"display_content\":{\"type\":\"json_block\",\"json_block\":\"{\\u0022language\\u0022: \\u0022markdown\\u0022, \\u0022code\\u0022: \\u0022# Vocabulary Map\\\\n\\\\nA reference vocabulary for precise communication across design, architecture, and consulting work.\\\\nEach term is defined, scoped, and distinguished from its neighbors.\\\\n\\\\n---\\\\n\\\\n## Abstraction Stack\\\\n\\\\n| Term | Level | Definition |\\\\n|---|---|---|\\\\n| **Paradigm** | Foundational | Unconscious worldview that shapes what questions are askable and what counts as a valid answer. You operate *from inside* a paradigm, rarely choosing it consciously. |\\\\n| **Domain** | Territory | A bounded field of knowledge and practice with its own vocabulary, rules, and patterns. Defines what problems *exist*. |\\\\n| **Layer** | Structure | A stacked level of concern within a domain or system. In systems: architect