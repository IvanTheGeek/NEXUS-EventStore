[[body.segments]]
kind = "reasoning"
text = "The user wants to add \"motivation\" to the vocabulary. Let me think about where it fits precisely relative to Intent, Trigger, Action, and the Agency dimension.\n\nMotivation vs Intent: Intent is the goal - what you're trying to accomplish. Motivation is the *why behind the why* - the deeper driving force. Intent is more specific and proximate; motivation is more fundamental and persistent.\n\nLet me think carefully about this placement and definition."

[[body.segments]]
kind = "plain_text"
text = "**Motivation** — the underlying force or need that generates Intent. Where Intent is specific and proximate (\"I want to record this expense\"), Motivation is persistent and fundamental (\"I don't want to lose money I'm owed at tax time\").\n\n- *Examples:* A driver's motivation is financial security and compliance peace of mind — that generates the intent to document every laundry run. An Agent's motivation is encoded in its goal function. A consultant's motivation shapes which problems they even notice.\n- *Scope:* Deeper than Intent — often stable across many contexts and sessions\n- *Key distinction:* Motivation persists. Intent is situational. The same Motivation generates many Intents over time. If you only capture Intent, you lose the *why behind the why* — and that's where design goes wrong. Features that serve the stated Intent but frustrate the underlying Motivation fail in use.\n- *Relation to existing terms:* Motivation → Intent → Action → Event is now the complete human causal chain, paralleling Trigger → Action → Event on the mechanical side.\n\n---\n\n## Updated Agency Dimension\n\n```\nAGENCY DIMENSION\n─────────────────────────────────────────\nRole         defined function within a system\nActor        entity exercising agency\n  Agent      autonomous Actor with goals and a principal\nMotivation   persistent underlying force generating intent\nIntent       specific goal driving a particular action\n```\n\n---\n\n## The Two Causal Chains Now Sit Cleanly Side by Side\n\n```\nCAUSAL CHAINS\n─────────────────────────────────────────\nHuman:     Motivation → Intent → Action → Event\nMechanical:              Trigger → Action → Event\n```\n\nThis is a meaningful distinction. Human-initiated actions have a motivational depth that mechanical triggers don't. When designing for Actors, you design for Motivation. When designing for Agents and automations, you design for Trigger conditions. Getting these confused — treating human users like trigger-response machines — is a root cause of bad UX."

