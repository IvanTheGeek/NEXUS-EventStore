text = "**Methodology** — a structured, principled approach to doing work within a domain or paradigm. The *how we work* — organized methods, practices, and heuristics committed to as a way of operating. A methodology guides thinking and process without necessarily providing concrete tools.\n\n- *Examples:* NEXUS (your structured approach to event-sourced system design), Event Modeling (Adam Dymetrik's methodology), DDD, Agile, scientific method\n- *Key trait:* A methodology is followed and practiced — you internalize it. It shapes how you decompose problems, what questions you ask first, what artifacts you produce. It sits between Paradigm and Framework: a Paradigm says *what is real*; a Methodology says *how to work with what is real*.\n- *Distinction from Paradigm:* A paradigm is largely unconscious and foundational. A methodology is a deliberate commitment. Two people can share a paradigm (event sourcing) and follow different methodologies (Event Modeling vs. CQRS-heavy approaches). One paradigm can spawn many methodologies.\n\n---\n\n**Framework** — a reusable, concrete structure of components, conventions, and constraints within which you build. More prescriptive than a methodology — it provides the scaffold, the extension points, and the rules of engagement. You build *within* a framework; you follow a *methodology*.\n\n- *Examples:* F# Bolero (WebAssembly framework), Talkyard (forum framework), React, ASP.NET Core, EventLanes as a tooling framework\n- *Key trait:* A framework inverts control — it calls your code, you fill in the pieces it designates. It embodies decisions so you don't remake them. A framework is opinionated; it crystallizes choices from a methodology or paradigm into reusable structure.\n- *Distinction from System:* A framework is general and reusable — it exists to be built upon. A System is specific — it's what you built. LaundryLog is a System built within the Bolero framework using the NEXUS methodology.\n- *Distinction from Model:* A model represents reality for reasoning. A framework provides structure for building.\n\n---\n\n## Where They Sit\n\n```\nParadigm      ← worldview\n  Methodology ← principled approach to working within that worldview\n    Framework ← concrete reusable scaffold embodying methodology decisions\n      System  ← specific thing built within a framework\n        Model ← representation of that system for reasoning\n```\n\nThe chain reads cleanly: Event sourcing is a **Paradigm**. Event Modeling is a **Methodology** within that paradigm. EventLanes is a **Framework** that implements Event Modeling tooling. LaundryLog is a **System** built using it. The LaundryLog event model is a **Model** of that system.\n\n---\n\n## Updated Full Map\n\n```\nABSTRACTION STACK\n─────────────────────────────────────────\nParadigm       unconscious foundational worldview\n  Domain       territory of knowledge and practice\n    Layer      stacked level of concern (in domain or system)\n  Methodology  principled approach to working within a paradigm\n    Framework  reusable scaffold embodying methodology decisions\n      System   bounded, designed arrangement of components\n        Model  composed representation built from constructs\n          Context   situational circumstances (where/what)\n            Session   temporal container (when/how long)\n              Construct  named unit you reason with\n\nAGENCY DIMENSION\n─────────────────────────────────────────\nRole         defined function within a system\nActor        entity exercising agency\n  Agent      autonomous Actor with goals and a principal\n\nHUMAN CAUSAL CHAIN\n─────────────────────────────────────────\nMotivation   persistent underlying force\n  Goal       defined outcome spanning multiple sessions\n    Intent   specific goal driving a particular action\n      Action     discrete unit of doing\n        Event    recorded proof an action completed\n\nMECHANICAL CAUSAL CHAIN\n─────────────────────────────────────────\nTrigger    condition or signal that initiates\n  Action   discrete unit of doing\n    Event  recorded proof an action completed\n\nSTRUCTURAL RULES\n─────────────────────────────────────────\nConstraint   limits valid states or actions (pre-condition)\nInvariant    condition that must always hold (perpetual integrity)\n\nANALYTICAL TOOLS\n─────────────────────────────────────────\nLens         deliberate analytical filter\nAssumption   unstated belief underlying any of the above\n\nLANGUAGE\n─────────────────────────────────────────\nVocabulary   committed set of constructs for a domain/system\nInterface    defined crossing point between systems/layers/actors\n\nCOMMUNICATION CHAIN\n─────────────────────────────────────────\nPerspective  how you see from where you stand\nFraming      how you package what you see\nAudience     who receives it\n```\n\nShould I update the markdown file with these additions including the distinctions table entries for Methodology vs Framework, Framework vs System, and Methodology vs Paradigm?"

