kind = "plain_text"
text = "These four slot into different places in the existing framework — some clarify distinctions that were fuzzy before, some add new dimensions entirely.\n\n---\n\n## The Four New Terms\n\n**Framing** — the deliberate act of structuring how something is presented to shape how it's received. Where *perspective* is where you stand, framing is what you do with that view when communicating it outward. Framing is active and intentional; perspective can be unconscious.\n\n- *Examples:* Presenting LaundryLog as \"IRS documentation tool\" vs. \"expense tracker\" vs. \"money-saving habit tracker\" — same product, different frame. Describing event sourcing as \"audit trail built in\" vs. \"immutable log architecture\" — same paradigm, different audience framing.\n- *Scope:* Communicative layer — framing operates on content before it reaches an audience\n- *Key trait:* Framing doesn't change the underlying construct or reality — it changes what gets foregrounded and what recedes. You can frame the same thing in incompatible ways simultaneously for different audiences.\n- *Relation to existing terms:* Framing is the bridge between **perspective** and **audience**. You see from a perspective; you frame for an audience.\n\n---\n\n**System** — a bounded set of interacting components with defined inputs, outputs, and emergent behavior. A system is something you can draw a boundary around and observe functioning as a unit. It exists within a domain but is more architectural — it's a *designed thing*, not just a territory.\n\n- *Examples:* LaundryLog (the app as a whole), the NEXUS event-sourcing knowledge system, the trucking dispatch + driver + broker ecosystem, the IRS documentation compliance system\n- *Scope:* Architectural — larger than a construct, smaller than or coextensive with a domain\n- *Key trait:* Systems have boundaries, and the boundary matters. What's inside interacts by design; what's outside is environment. A system can span multiple domains, or many systems can coexist within one domain.\n- *Relation to existing terms:* A **domain** is the territory of knowledge. A **system** is a structured arrangement of **constructs** and behaviors that operates *within* a domain to accomplish something. A **context** is a specific active instance of that system in operation.\n\n---\n\n**Actor** — any entity that initiates action within a system. Actors are the *agents of cause* — they trigger things, make decisions, and produce events. Can be human or machine.\n\n- *Examples:* In LaundryLog, the driver recording an expense is an Actor. In event sourcing generally, an Actor issues Commands. In a dispatch system, the broker, driver, and automated routing engine are all Actors.\n- *Scope:* System-level — an Actor is always defined relative to a system\n- *Key trait:* Actor is about **agency** — the capacity to initiate. It's more dynamic than Role (which defines function) and less specific than Agent (which implies autonomy and goal-directedness). Every Agent is an Actor; not every Actor is an Agent.\n- *Relation to existing terms:* A **Role** is the function defined by the system. An **Actor** is the entity *exercising* that role by taking action. The Role is structural; the Actor is operational. A person occupies a Role; they act as an Actor.\n\n---\n\n**Agent** — an autonomous or semi-autonomous Actor that operates on behalf of a principal toward goals, perceiving its environment and deciding its own actions. Agency implies goal-directedness and some degree of independence.\n\n- *Examples:* An AI assistant operating on a user's behalf, a background process that monitors events and fires compensating commands, a software daemon that autonomously manages infrastructure, a human consultant acting on behalf of a client company\n- *Scope:* Spans system and context — an Agent is always embedded in a system but operates across contexts\n- *Key trait:* Agents have **principal relationships** (they act *for* someone), **goals** (not just reactions), and **autonomy** (they decide how to act, not just whether to act). This is what distinguishes them from plain Actors. An automated button-click is an Actor; a system that monitors logs and decides when and how to respond is an Agent.\n- *Relation to existing terms:* Agent is a specialization of Actor. The distinction matters especially in AI and event-sourced systems: an Actor issues a command; an Agent decides *which* command to issue and *when*, based on observed state and goals.\n\n---\n\n## Integrated Picture\n\n**Abstraction levels (vertical):**\n```\nParadigm          ← foundational worldview\n  Domain          ← territory of knowledge/practice\n    System        ← bounded, designed arrangement of components\n      Context     ← active situational instance within the system\n        Construct ← named unit you reason with\n```\n\n**Human/agency dimension (orthogonal):**\n```\nRole        ← defined function within a system\nActor       ← entity exercising agency (human or machine)\n  Agent     ← autonomous Actor with goals and a principal\nPerspective ← how you see from where you stand\nFraming     ← how you package what you see for an audience\nAudience    ← who receives the output\n```\n\n---\n\n## How the New Terms Sharpen the Old Ones\n\n| Before | Now clearer because... |\n|---|---|\n| Role vs. Perspective | Role is structural (function); Perspective is experiential (viewpoint); Actor is operational (the one doing) |\n| Perspective vs. Audience | Framing is now the explicit bridge — you see from a perspective, you frame for an audience |\n| Domain vs. Context | System sits between them — Domain is territory, System is designed structure within it, Context is live instance |\n| Actor confusion | Actor/Agent split: Actor = initiates action; Agent = initiates action *autonomously* toward goals on behalf of a principal |\n\n---\n\n## Extended LaundryLog Example\n\n| Term | Instance |\n|---|---|\n| Paradigm | Event sourcing — all state is derived from events |\n| Domain | Trucking / IRS expense documentation |\n| System | LaundryLog — bounded app with event model, UI, projections |\n| Context | Driver at a TA Travel Center, mid-laundry run, recording expenses |\n| Construct | `LaundrySession`, `MachineUsed`, `ExpenseRecorded` |\n| Actor | The driver (issues `RecordExpense` command) |\n| Agent | A future automation that detects a stopped truck near a laundry and prompts a new session |\n| Role | Expense Recorder (driver-facing function in the system) |\n| Perspective | Driver: \"I spent money.\" IRS: \"Prove it was business-related.\" |\n| Framing | Marketing frame: \"Never lose a deduction again.\" Technical frame: \"Append-only expense event stream.\" |\n| Audience | Non-technical OTR truck drivers who distrust complexity |\n\n---\n\nThe sharpest distinction in this expanded set: **Role → Actor → Agent** is a progression from *definition* to *action* to *autonomous action*. And **Perspective → Framing → Audience** is the communication chain from *how you see* to *how you shape* to *who receives*."

