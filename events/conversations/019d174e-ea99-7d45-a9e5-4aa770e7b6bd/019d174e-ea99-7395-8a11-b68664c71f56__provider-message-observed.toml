text = "## Action, Trigger, Invariant\n\n**Yes, all three are applicable** — and they slot in precisely.\n\n---\n\n**Action** — the discrete unit of doing. The concrete thing that happens between Intent and recorded outcome. Not the motivation, not the result — the act itself.\n\n- *Examples:* Tapping \"Record Expense,\" submitting a command, a system writing to the event store\n- *Key distinction:* Intent is *why*, Action is *what*, Event is *what was recorded*. These three are often collapsed into one word and shouldn't be. An action can fail and produce no event. An event proves an action completed.\n- *Maps to Event Modeling:* The Command lane is the formalized expression of an Action.\n\n**Trigger** — the condition, signal, or event that initiates an Action or activates a process. Trigger is the *when* and *what causes it* — separating cause from act.\n\n- *Examples:* A timer fires → triggers a projection rebuild. A driver enters a geofenced zone → triggers a session prompt. An event is appended → triggers a downstream process. In Event Modeling, the \"automation trigger\" swim lane is literally this concept.\n- *Key distinction:* An Actor initiates via Intent. A Trigger initiates mechanically or conditionally — no Intent required. Agents often respond to Triggers rather than direct commands.\n- *Relation:* Trigger → Action → Event is a clean causal chain within a system.\n\n**Invariant** — a condition that must *always* hold, regardless of what actions occur. Stronger than a Constraint.\n\n- *Examples:* \"Session total must always equal sum of its machine costs.\" \"An appended event cannot be removed.\" \"A command slice must always emit at least one event on success.\"\n- *Key distinction from Constraint:* A constraint limits what's *allowed* (pre-condition). An invariant defines what must *remain true* at all times (perpetual condition). Constraints gate entry; invariants define integrity. You can violate a constraint by attempting a forbidden action. An invariant violation means the system is in a *broken state*.\n- *Relation:* Invariants are what Aggregates in DDD protect. In event sourcing, they're what your command handlers enforce before appending.\n\n---\n\n## On Your Meta-Observation\n\nYes — you are literally performing the definition of **vocabulary** right now. You're taking loosely-used terms that overlap and collide in everyday technical conversation and establishing:\n\n- Precise definitions (what each *is*)\n- Scope (where it applies)\n- Boundaries (how it differs from adjacent terms)\n- A commitment to use them consistently\n\nThat's exactly what a vocabulary does. The goal isn't a dictionary — it's a shared operating language so that when you say \"invariant\" in a design session, nobody reaches for \"constraint\" and vice versa.\n\n---\n\n## Can Domains Have Layers?\n\n**Yes — and this reveals that \"layer\" is more general than the system level.**\n\nThe way it was defined — *a level of abstraction within a system* — was too narrow. Layer applies anywhere there are distinguishable levels of concern that stack.\n\nDomains absolutely have layers:\n\n- *Healthcare domain:* Clinical practice → Hospital administration → Insurance/billing → Regulatory compliance. Each layer has its own constructs, actors, and rules. They interact but don't collapse.\n- *Trucking domain:* Driver operations → Fleet management → Broker/load board ecosystem → Regulatory (FMCSA, IRS). A driver lives mostly in the first layer but is constrained by all four.\n- *Software domain:* Application behavior → Runtime/platform → Infrastructure → Hardware.\n\n**What changes at domain level vs. system level:**\n\nAt the *system* level, layers are about architectural separation — concerns are separated so they can change independently. You enforce layer boundaries in code.\n\nAt the *domain* level, layers are more organic — they emerge from the structure of the field itself. You don't enforce them so much as *recognize* them when reasoning or designing.\n\n**The implication for the vocabulary:**\n\nLayer needs a slightly broader definition: *a level of abstraction or concern that stacks with others at the same scope — applicable within systems architecturally, and within domains conceptually.*\n\n---\n\n## Updated Abstraction Stack\n\n```\nABSTRACTION STACK\n─────────────────────────────────────────\nParadigm       unconscious foundational worldview\n  Domain       territory of knowledge and practice\n    [layers]   stacked levels of concern within the domain\n    System     bounded, designed arrangement of components\n      Model    composed representation built from constructs\n        Layer  level of abstraction within a system or domain\n          Context   active situational instance\n            Construct  named unit you reason with\n\nAGENCY DIMENSION\n─────────────────────────────────────────\nRole       defined function within a system\nActor      entity exercising agency\n  Agent    autonomous Actor with goals and a principal\nIntent     the why driving an Actor's action\n\nCAUSAL CHAIN\n─────────────────────────────────────────\nTrigger    condition or signal that initiates\nAction     discrete unit of doing\n  Event    recorded proof an action completed\n\nSTRUCTURAL RULES\n─────────────────────────────────────────\nConstraint   limits valid states or actions (pre-condition)\nInvariant    condition that must always hold (perpetual integrity)\n\nANALYTICAL TOOLS\n─────────────────────────────────────────\nLens         deliberate analytical filter\nAssumption   unstated belief underlying any of the above\n\nLANGUAGE\n─────────────────────────────────────────\nVocabulary   committed set of constructs for a domain/system\nInterface    defined crossing point between systems/layers/actors\n\nCOMMUNICATION CHAIN\n─────────────────────────────────────────\nPerspective  how you see from where you stand\nFraming      how you package what you see\nAudience     who receives it\n```\n\nThe **Causal Chain** group is new and worth highlighting — Trigger → Action → Event is a complete unit of causation that maps directly onto Event Modeling's swim lanes. You were already using all three implicitly; naming the chain makes it a first-class tool."

