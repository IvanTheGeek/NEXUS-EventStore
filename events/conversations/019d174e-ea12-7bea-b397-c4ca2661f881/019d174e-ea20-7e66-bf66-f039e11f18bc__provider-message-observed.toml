text = "**You're absolutely right - CrossProjectIdea is the wrong fit.**\n\n## The Mismatch\n\n**CrossProjectIdea was designed for:**\n- \"I discovered X in LaundryLog that would help PerDiem\"\n- Moving patterns/components between different apps\n- Source → Target relationship\n\n**What we actually need:**\n- Ideas for Nexus itself (filesystem MCP, VPS deployment)\n- Ideas specific to one project (LaundryLog feature ideas)\n- General exploration items\n- Future work backlog\n\n## Proposed: New Event Type\n\n**Option A: `FutureWork`**\n```yaml\ntype: FutureWork\nproject: fnmcp-nexus  # or core, laundrylog, perdiem\npriority: important   # consider, important, critical\nstatus: pending       # pending, exploring, implemented, rejected\nscope: infrastructure # or feature, improvement, research\n```\n\n**Option B: `ExplorationIdea`**\n```yaml\ntype: ExplorationIdea\nproject: fnmcp-nexus\npriority: important\nstatus: pending\ncategory: tooling     # or architecture, feature, performance\n```\n\n**Option C: Keep simpler - just use existing types**\n- `TechnicalDecision` with status=\"proposed\" for technical ideas\n- `FrameworkInsight` with \"Future:\" prefix for Nexus ideas\n- `DesignNote` for feature ideas\n\n## Questions\n\n1. **Do we need a new event type, or can we use existing ones with conventions?**\n2. **Should ideas be captured as events at all, or separate artifacts (like a backlog.md)?**\n3. **What fields matter: priority, status, scope/category, anything else?**\n\nWhat's your instinct?\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📊 Context Usage: [████████████████░░░░] 123,230 / 190,000 tokens (64.9%)\n\nAllocation:\n├─ System Prompts: ~30,000 tokens (15.8%)\n├─ Project Knowledge: ~510 tokens (0.3%)\n├─ Conversation: ~89,490 tokens (47.1%)\n│  ├─ Your messages: ~2,230 tokens\n│  ├─ My responses: ~35,580 tokens\n│  └─ Tool calls: ~51,680 tokens\n└─ This Response: ~3,200 tokens (1.7%)\n\nRemaining: 66,770 tokens (35.1%) ✓ Comfortable\n\nStatus Legend: ✓ Comfortable (0-75%) | ⚠ Moderate (75-85%) | 🔴 High (85%+)\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

