pe\":\"DesignNote\",\"title\":\"ExplorationIdea: Custom Filesystem MCP for Nexus Operations\",\"project\":\"fnmcp-nexus\",\"summary\":\"Build custom filesystem MCP optimized for Nexus workflows to eliminate token waste on retries and path confusion.\"},\"message\":\"create_event\",\"integration_name\":\"Nexus\",\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

