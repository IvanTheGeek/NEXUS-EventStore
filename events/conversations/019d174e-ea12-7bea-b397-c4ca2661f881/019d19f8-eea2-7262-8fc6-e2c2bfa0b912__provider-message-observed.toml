kind = "plain_text"
text = "using the existing tools to access the file system seems to be continually causing you issues over many chats, which seems to end up spending a lot of tokens as you figure out things and retry and retry. Eventually, we will get where the active MCP will be remote on a VPS where it has stable internet addressing and plenty of storage. That will also facilitate Claude Android being able to be used (it can use remote MCP). So future plans will be to design and implement these features and considerations. So maybe we need to build our own MCP focused on running locally that provides the file system manipulation/access and other tools that we find useful where we are not happy with the options others are providing and we are using (like the current file system access tool). Perhaps we should create a \"ideas to explore\" list/system so that in the future, these ideas can be worked on."

