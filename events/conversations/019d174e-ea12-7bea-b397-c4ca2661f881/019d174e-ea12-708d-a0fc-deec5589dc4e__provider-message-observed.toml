text = "**Done.** Created `perdiem-bootstrap.md` in the context-library.\n\nFile is at: `/home/linux/RiderProjects/FnMCP.IvanTheGeek/context-library/perdiem-bootstrap.md`\n\n**Ready to upload to PerDiemLog Project Knowledge.**\n\nThe file includes:\n- ✓ Project scope and status\n- ✓ Continuation prompts\n- ✓ PerDiem-specific file paths\n- ✓ **Token calculation formula + verification examples**\n- ✓ Context management explanation\n- ✓ Event sourcing location\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📊 Context Usage: [███████░░░░░░░░░░░░░] 69,834 / 190,000 tokens (36.8%)\n\nAllocation:\n├─ System Prompts: ~30,000 tokens (15.8%)\n├─ Project Knowledge: ~510 tokens (0.3%)\n├─ Conversation: ~36,734 tokens (19.3%)\n│  ├─ Your messages: ~1,200 tokens\n│  ├─ My responses: ~11,560 tokens\n│  └─ Tool calls: ~23,974 tokens\n└─ This Response: ~2,590 tokens (1.4%)\n\nRemaining: 120,166 tokens (63.2%) ✓ Comfortable\n\nStatus Legend: ✓ Comfortable (0-75%) | ⚠ Moderate (75-85%) | 🔴 High (85%+)\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

