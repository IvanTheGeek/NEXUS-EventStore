ll || true\\ncp \\u0022$SOURCE/perdiem-bootstrap.md\\u0022 \\u0022$DEST/bootstrap/\\u0022 2\\u003E/dev/null || true\\n\\n# Copy NEW event structure only (Phase 3\\u002B)\\necho \\u0022Copying events (new structure only)...\\u0022\\ncp -r \\u0022$SOURCE/nexus/events/core\\u0022 \\u0022$DEST/events/\\u0022 2\\u003E/dev/null || true\\ncp -r \\u0022$SOURCE/nexus/events/fnmcp-nexus\\u0022 \\u0022$DEST/events/\\u0022 2\\u003E/dev/null || true\\ncp -r \\u0022$SOURCE/nexus/events/laundrylog\\u0022 \\u0022$DEST/events/\\u0022 2\\u003E/dev/null || true\\ncp -r \\u0022$SOURCE/nexus/events/perdiem\\u0022 \\u0022$DEST/events/\\u0022 2\\u003E/dev/null || true\\n\\n# Note: Skipping old event structure (domain/, learning/, system/ at nexus/events/ root)\\necho \\u0022  \\u26A0 Skipped legacy event structure (pre-Phase 3)\\u0022\\n\\n# Copy projections\\necho \\u0022Copying projections...\\u0022\\ncp -r \\u0022$SOURCE/nexus/projections/\\u0022* \\u0022$DEST/projections/\\u0022 2\\u003E/dev/null || true\\n\\necho \\u0022\\u0022\\necho \\u0022===================================\\u0022\\necho \\u0022Migration Complete!\\u0022\\necho \\u0022===================================\\u0022\\necho \\u0022\\u0022\\necho \\u0022Skipped items (legacy/duplicates):\\u0022\\necho \\u0022  - Old event structure (nexus/events/domain, learning, system)\\u0022\\necho \\u0022  - Root-level framework-overview.md (duplicate)\\u0022\\necho \\u0022  - test/ directory\\u0022\\necho \\u0022\\u0022\\necho \\u0022Next steps:\\u0022\\necho \\u00221. Review new structure: ls -la $DEST\\u0022\\necho \\u00222. Update MCP config (see instructions file)\\u0022\\necho \\u00223. Restart Claude Desktop\\u0022\\necho \\u00224. Test MCP access\\u0022\\necho \\u00225. Delete old context-library when confirmed\\u0022\\n\",\"description\":\"Creating migration script for user to run\"},\"message\":\"Creating migration script for user to run\",\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"context\"