kind = "plain_text"
text = "For Node.js on Windows, here are the key differences:\n\n**Docker advantages:**\n- **Isolation** - Dependencies don't pollute Windows system, easier to clean up\n- **Consistency** - Same container works across dev machines and servers\n- **Version switching** - Multiple Node versions via different images, no nvm complications\n- **WSL2 performance** - If using WSL2 backend, performance is reasonable\n\n**Native binary advantages:**\n- **Performance** - Direct execution, no virtualization overhead (especially file I/O)\n- **Simplicity** - No Docker Desktop, fewer moving parts\n- **Native tooling** - Better integration with Windows IDEs, debuggers\n- **Resource usage** - Lower overhead, no Docker Desktop memory footprint\n\n**Docker disadvantages on Windows specifically:**\n- File system performance hit (especially on older Docker Desktop versions)\n- Docker Desktop licensing for commercial use\n- WSL2 adds complexity\n- Volume mounting can be slower than native\n\nFor production deployment, Docker makes more sense for consistency. For local development on Windows, native binary is usually faster and simpler unless you need strict environment parity.\n\nIs this for a specific project scenario, or general architectural planning?"

