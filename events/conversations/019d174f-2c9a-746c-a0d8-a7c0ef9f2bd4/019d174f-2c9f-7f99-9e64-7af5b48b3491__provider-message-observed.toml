text = "Here’s a **short, clear description** that fits well in a Discord thread:\n\n:::writing{variant=\"chat_message\" id=\"dl001\"}\nI would love this actually! My GitHub is @IvanTheGeek. I’m working through a first small project to practice the full Event Modeling workflow from idea → model → app → feedback.  \n\nThe domain is **LaundryLog** — a tiny expense-tracking app specifically for logging laundry costs. The scope is intentionally small: record a laundry expense, edit or delete it, and view the history. The goal isn’t the app itself but using a simple domain to work through commands, events, and projections end-to-end.\n:::\n\nIf you want something **even tighter (very Discord-style)**:\n\n:::writing{variant=\"chat_message\" id=\"dl002\"}\nI would love this actually! My GitHub is @IvanTheGeek. I’m working through a small Event Modeling practice project called **LaundryLog** — a tiny app for logging laundry expenses (record, edit, delete, view history). The idea is to use a very small domain so I can go through the full process from event model → working app → feedback.\n:::\n\nIf you'd like, I can also give you a **slightly more “Event Modeling native” version** that tends to resonate strongly with people in those communities."

