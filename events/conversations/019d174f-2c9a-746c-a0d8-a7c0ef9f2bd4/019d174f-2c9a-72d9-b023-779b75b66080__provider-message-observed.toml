text = "You’re now touching one of the **central design questions in event-sourced systems**: *what happens when the event shape changes*. And the instinct you’re expressing — applying **immutability thinking to events** — is very much the direction most experienced practitioners converge on.\n\nThere are basically **three strategies**, and each has different coupling implications.\n\n---\n\n## 1. Version field inside the event (most traditional)\n\nExample:\n\n```toml\nevent = \"LaundryExpenseLogged\"\nversion = 2\ntimestamp = \"2026-03-08T20:12:00Z\"\n\nexpense_type = \"washer\"\nquantity = 2\nunit_cost = 3.50\nlocation = \"Pilot Travel Center\"\n\npayment_method = \"card\"\n```\n\nOlder events might be:\n\n```toml\nversion = 1\n```\n\n### Pros\n\n- Same event name\n- Easier migrations sometimes\n- Smaller event vocabulary\n\n### Cons\n\nProjections must do things like:\n\n```fsharp\nmatch event.version with\n| 1 -> ...\n| 2 -> ...\n```\n\nWhich introduces **temporal coupling inside the code**.\n\nAdam and Greg Young both tend to **avoid this when possible**.\n\n---\n\n## 2. New event type (immutable events philosophy)\n\nInstead of modifying the event, you create a **new event name**.\n\nExample evolution:\n\n``` id=\"bbx4al\"\nLaundryExpenseLogged\n```\n\nbecomes:\n\n``` id=\"b5ysf4\"\nLaundryExpenseLoggedV2\n```\n\nor sometimes more explicitly:\n\n``` id=\"u64tqg\"\nLaundryExpenseLoggedWithPaymentMethod\n```\n\n### Pros\n\n- Events remain **immutable historical facts**\n- Old projections keep working\n- New projections can use the richer event\n- No version branching logic\n\n### Cons\n\nProjections may need to handle **multiple event types**.\n\nExample:\n\n```fsharp\nmatch event with\n| LaundryExpenseLogged e -> ...\n| LaundryExpenseLoggedV2 e -> ...\n```\n\nBut this is actually **very natural in F#** because of discriminated unions.\n\n---\n\n## 3. Upcasting (a hybrid approach)\n\nThe event store keeps old events exactly as they were, but **converts them when read**.\n\nConceptually:\n\n```\nOldEvent → Upcaster → NewEventShape\n```\n\nExample:\n\n```\nLaundryExpenseLogged (v1)\n↓\nUpcast\n↓\nLaundryExpenseLogged (v2)\n```\n\nProjections then only see the **latest shape**.\n\n### Pros\n\n- Keeps projections simple\n- Events still immutable in storage\n\n### Cons\n\nYou introduce **a transformation layer** that must be maintained forever.\n\n---\n\n## How Adam’s philosophy usually leans\n\nAdam generally favors **option 2**:\n\n> **New event instead of modifying the old one.**\n\nBecause it preserves the **append-only nature of the system** and keeps historical facts intact.\n\nThat aligns with his slice philosophy:\n\n``` id=\"ysc9ac\"\nold slice = untouched\nnew slice = new behavior\n```\n\n---\n\n## How this aligns with your NEXUS thinking\n\nYour idea:\n\n```\nbehavior = versioned module\n```\n\nmaps nicely to:\n\n```\nevents = immutable historical modules\n```\n\nSo instead of:\n\n```\nevent version++\n```\n\nyou get:\n\n```\nnew event type\n```\n\nWhich is basically **event replacement via addition**, not mutation.\n\n---\n\n## Why F# makes this elegant\n\nIf your events are modeled like this:\n\n```fsharp\ntype LaundryEvent =\n    | LaundryExpenseLogged of ExpenseV1\n    | LaundryExpenseLoggedV2 of ExpenseV2\n```\n\nProjections naturally handle evolution:\n\n```fsharp\nmatch event with\n| LaundryExpenseLogged e -> ...\n| LaundryExpenseLoggedV2 e -> ...\n```\n\nNo fragile version numbers.\n\n---\n\n## A subtle principle many event-sourced systems follow\n\nEvents should change **rarely**.\n\nIf you find yourself versioning events often, it usually means:\n\n```\nthe event was modeling the system\ninstead of the business fact\n```\n\nBusiness facts tend to be stable.\n\nExample:\n\n```\nLaundryExpenseLogged\n```\n\nis unlikely to change much.\n\nFields might evolve, but the **concept itself** remains stable.\n\n---\n\n## My recommendation for your system\n\nGiven your goals (NEXUS experimentation + F# + event modeling):\n\nPrefer:\n\n```\nNew event type when structure changes\n```\n\nNot:\n\n```\nversion field\n```\n\nIt keeps everything aligned with:\n\n- immutable thinking\n- slice replacement\n- append-only architecture\n\n---\n\n## One interesting observation about your design\n\nLaundryLog might **never need event versioning**.\n\nBecause the event concept is already very general:\n\n```\nLaundryExpenseLogged\n```\n\nYou can add optional fields without breaking the meaning.\n\nFor example:\n\n```\nlocation\nmachine_type\nquantity\nunit_cost\nnotes\n```\n\nThose additions don't change the **business fact**.\n\n---\n\n## One deeper question that will influence how often events change\n\nRight now your event likely contains **UI-shaped fields**:\n\n```\nquantity\nunit_cost\nmachine_type\n```\n\nBut another approach is to shape the event around **the accounting fact**:\n\n```\nexpense_amount\ncategory\n```\n\nWhich is much more stable.\n\nThat design choice can dramatically reduce **event churn over time**."

