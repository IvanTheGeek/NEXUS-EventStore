text = "This is a **great design question**, and you're right: this is exactly the kind of place where Scott Wlaschin’s thinking about **types as domain modeling tools** becomes useful.\n\nThe short version is:\n\n- **Use a parameter when the behavior is the same**\n- **Use different types when the behavior is different**\n\nThat principle fits both **functional design** and **event modeling** very well.\n\n---\n\n## Option A — Parameter (most common)\n\nOne command with a parameter describing the expense.\n\nConceptually:\n\n```\nLogLaundryExpense(expenseType)\n```\n\nWhere the type might be:\n\n```\ntype LaundryExpenseType =\n    | Washer\n    | Dryer\n    | Supplies\n```\n\nThen the command becomes something like:\n\n```\ntype LogLaundryExpense =\n    { ExpenseType : LaundryExpenseType\n      Quantity : int\n      UnitCost : Money\n      Location : Location\n      Timestamp : Instant }\n```\n\n### Why this works well\n\nBecause the **business behavior is identical**.\n\nEvery case does the same thing:\n\n```\nlog expense\n→ produce event\n→ add to totals\n```\n\nSo from a domain perspective:\n\n```\nWasher\nDryer\nSupplies\n```\n\nare just **categories of the same concept**.\n\nThis aligns with Scott’s idea of **making illegal states unrepresentable** because:\n\n```\nLaundryExpenseType\n```\n\nprevents invalid categories.\n\n---\n\n## Option B — Separate commands\n\n```\nLogWasherExpense\nLogDryerExpense\nLogSupplyExpense\n```\n\nThis becomes attractive when **behavior diverges**.\n\nFor example if:\n\n- washers always require **quantity**\n- supplies always require **item description**\n- dryers might allow **duration**\n\nThen the commands might look like:\n\n```\nLogWasherExpense\n  quantity\n  unitCost\n\nLogSupplyExpense\n  item\n  price\n```\n\nNow the **data shapes differ**, which is where separate types become valuable.\n\n---\n\n## How Scott Wlaschin usually frames this\n\nA helpful heuristic he often implies:\n\n> If you find yourself writing `if type = X then ...`  \n> you probably need different types.\n\nIf your logic looks like this:\n\n```\nmatch expenseType with\n| Washer -> ...\n| Dryer -> ...\n| Supplies -> ...\n```\n\nand all branches do basically the same thing, then **a parameter is correct**.\n\n---\n\n## Event modeling perspective\n\nEvent modeling also prefers **fewer event types** unless the domain really demands otherwise.\n\nSo this is very natural:\n\n```\nCommand\nLogLaundryExpense\n```\n\n```\nEvent\nLaundryExpenseLogged\n```\n\nWith:\n\n```\nexpense_type = washer | dryer | supplies\n```\n\n---\n\n## Another important domain signal\n\nYour **UI design already answered the question**.\n\nYou said the screen has buttons:\n\n```\nwasher\ndryer\nsupplies\n```\n\nThose are **category selectors**, not different workflows.\n\nThat strongly suggests:\n\n```\nLaundryExpenseType\n```\n\nnot separate commands.\n\n---\n\n## Where F# shines here\n\nF# lets you encode this elegantly:\n\n```\ntype LaundryExpenseType =\n    | Washer\n    | Dryer\n    | Supplies\n```\n\nWhich gives you:\n\n- strong domain modeling\n- no invalid values\n- simple command structure\n- easy extension later\n\nFor example you could later add:\n\n```\n| OtherLaundryExpense\n```\n\nwithout redesigning the event model.\n\n---\n\n## My recommendation for your current design\n\nUse **one command** with a **typed parameter**:\n\n```\nCommand\nLogLaundryExpense\n```\n\n```\nEvent\nLaundryExpenseLogged\n```\n\n```\nExpenseType =\n  Washer\n  Dryer\n  Supplies\n```\n\nThis keeps the **event model small**, which is very desirable.\n\n---\n\n## One interesting subtlety for your domain\n\nThere *might* be one reason to eventually split **Supplies**.\n\nBecause supplies might have:\n\n```\nitemName\n```\n\nwhile machines do not.\n\nExample:\n\n```\nBleach\nDetergent\n```\n\nBut you don't need to solve that yet.\n\nScott often recommends:\n\n> Start simple and introduce types **when the domain demands them**.\n\n---\n\n## One thing I think you'll enjoy about where your design is heading\n\nRight now your domain is naturally forming what functional programmers love:\n\n**A tiny algebra of events**\n\n```\nLaundryExpenseLogged\n```\n\nwith a small set of valid states.\n\nThat's exactly the kind of domain where **F# + event sourcing becomes very elegant**.\n\n---\n\nIf you'd like, we can also explore a **very Scott Wlaschin–style domain model** for this app, because this problem is actually a perfect example of his **\"modeling the domain with types\"** approach."

