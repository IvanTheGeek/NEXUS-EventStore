text = "This is a good constraint. Starting **extremely small** is exactly how Event Modeling is supposed to work. One slice. One behavior. One event. Then grow.\n\nAlso your interpretation — **“a sequence diagram rotated on its side”** — is actually a very good way to prototype event models with Mermaid.\n\nYour columns:\n\n```\nUI | Command / Projection | Event\n```\n\nAnd each **horizontal row = a Slice**.\n\nSo the first slice should answer a very simple question:\n\n> *What happens when the app opens for the very first time?*\n\nThere are two important rules here:\n\n1. **Commands change system state**\n2. **Projections shape read state**\n\nOpening the app does **not** change domain state.  \nIt just **reads state**.\n\nTherefore:\n\n**The first slice is a Projection Slice, not a Command Slice.**\n\nBut since you asked for the **first Command slice**, we should go one step further and find the **first user action that actually changes state**.\n\nFor a brand new install, the first meaningful action is likely something like:\n\n> user logs their **first laundry entry**\n\nHowever, we usually still emit an initialization event first so projections have something to anchor to.\n\n---\n\n# Slice 0 (Projection) — App Opens\n\nThis establishes UI state.\n\n```\nUI: App Opened\nProjection: LoadSessionView\nEvent: (none)\n```\n\nIt simply returns:\n\n```\nSessionTotal = 0\nRecentEntries = []\nDraftEntry = empty\n```\n\nNo event because nothing changed.\n\n---\n\n# Slice 1 (First Command Slice)\n\nNow we introduce the **first actual system change**.\n\nThe minimal command is:\n\n```\nCreateFirstLaundryEntry\n```\n\nBut we only issue that **after the user fills the form**.\n\nSo the command is effectively:\n\n```\nRecordLaundryEntry\n```\n\nThe resulting event:\n\n```\nLaundryEntryRecorded\n```\n\n---\n\n# Minimal Command\n\nTOML structure (high level)\n\n```toml\ncommand = \"RecordLaundryEntry\"\n\nlocation = \"Pilot Travel Center\"\nmachine = \"washer\""

