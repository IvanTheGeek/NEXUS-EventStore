text = "Below is a **clear textual example** first (following the naming rule you defined), then a **Mermaid diagram** implementing **3 commands and 3 projections alternating**.\n\n---\n\n# Textual Representation\n\nFollowing your naming style:\n\n```\nSlice 1 | Tap Expense → LogLaundryExpense → LaundryExpenseLogged\n\nSlice 2 | View History ← ExpenseHistoryProjection ← LaundryExpenseLogged\n\nSlice 3 | Tap Delete Expense → DeleteLaundryExpense → LaundryExpenseDeleted\n\nSlice 4 | View History ← ExpenseHistoryProjection ← LaundryExpenseDeleted\n\nSlice 5 | Tap Update Expense → UpdateLaundryExpense → LaundryExpenseUpdated\n\nSlice 6 | View History ← ExpenseHistoryProjection ← LaundryExpenseUpdated\n```\n\nNotice the **alternating flow**:\n\n```\nCommand Slice\nUI → Command → Event\n\nProjection Slice\nUI ← Projection ← Event\n```\n\n---\n\n# Mermaid Diagram (3 Commands + 3 Projections)\n\n```mermaid\nflowchart TB\n\n%% -------- Slice 1 --------\nsubgraph S1[\"Slice 1\"]\ndirection LR\nUI1[\"Tap Expense\"]:::ui\nCMD1[\"LogLaundryExpense\"]:::command\nEVT1[\"LaundryExpenseLogged\"]:::event\nUI1 --> CMD1 --> EVT1\nend\n\n%% -------- Slice 2 --------\nsubgraph S2[\"Slice 2\"]\ndirection RL\nUI2[\"View History\"]:::ui\nPROJ2[\"ExpenseHistoryProjection\"]:::projection\nEVT1b[\"LaundryExpenseLogged\"]:::event\nEVT1b --> PROJ2 --> UI2\nend\n\n%% -------- Slice 3 --------\nsubgraph S3[\"Slice 3\"]\ndirection LR\nUI3[\"Tap Delete Expense\"]:::ui\nCMD3[\"DeleteLaundryExpense\"]:::command\nEVT3[\"LaundryExpenseDeleted\"]:::event\nUI3 --> CMD3 --> EVT3\nend\n\n%% -------- Slice 4 --------\nsubgraph S4[\"Slice 4\"]\ndirection RL\nUI4[\"View History\"]:::ui\nPROJ4[\"ExpenseHistoryProjection\"]:::projection\nEVT3b[\"LaundryExpenseDeleted\"]:::event\nEVT3b --> PROJ4 --> UI4\nend\n\n%% -------- Slice 5 --------\nsubgraph S5[\"Slice 5\"]\ndirection LR\nUI5[\"Tap Update Expense\"]:::ui\nCMD5[\"UpdateLaundryExpense\"]:::command\nEVT5[\"LaundryExpenseUpdated\"]:::event\nUI5 --> CMD5 --> EVT5\nend\n\n%% -------- Slice 6 --------\nsubgraph S6[\"Slice 6\"]\ndirection RL\nUI6[\"View History\"]:::ui\nPROJ6[\"ExpenseHistoryProjection\"]:::projection\nEVT5b[\"LaundryExpenseUpdated\"]:::event\nEVT5b --> PROJ6 --> UI6\nend\n\n%% Vertical stacking\nS1 ~~~ S2\nS2 ~~~ S3\nS3 ~~~ S4\nS4 ~~~ S5\nS5 ~~~ S6\n\n\n%% ----- Node Styles -----\nclassDef ui fill:#dddddd,stroke:#333,stroke-width:1px;\nclassDef command fill:#cfe8ff,stroke:#333,stroke-width:1px;\nclassDef projection fill:#d8f5d0,stroke:#333,stroke-width:1px;\nclassDef event fill:#ffe6cc,stroke:#333,stroke-width:1px;\n\n%% ----- Slice Styles -----\nstyle S1 fill:#eef6ff,stroke:#6aa9ff\nstyle S2 fill:#eefbe9,stroke:#7bc96f\nstyle S3 fill:#eef6ff,stroke:#6aa9ff\nstyle S4 fill:#eefbe9,stroke:#7bc96f\nstyle S5 fill:#eef6ff,stroke:#6aa9ff\nstyle S6 fill:#eefbe9,stroke:#7bc96f\n```\n\n---\n\n# Visual Pattern This Produces\n\n```\n[Command Slice]\nUI → Command → Event\n\n[Projection Slice]\nUI ← Projection ← Event\n\n[Command Slice]\nUI → Command → Event\n\n[Projection Slice]\nUI ← Projection ← Event\n\n[Command Slice]\nUI → Command → Event\n\n[Projection Slice]\nUI ← Projection ← Event\n```\n\nThis mirrors **Event Modeling’s alternating behavior pattern**, while staying consistent with the **slice naming rule you defined**.\n\n---\n\nIf you'd like, I can also show a **much cleaner pattern used in large systems** where the **same projection box is reused across slices instead of duplicated** — which makes diagrams with **20–40 slices far easier to read.**"

