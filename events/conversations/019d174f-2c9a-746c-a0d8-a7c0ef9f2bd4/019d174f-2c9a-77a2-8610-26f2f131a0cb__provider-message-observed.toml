kind = "plain_text"
text = "That’s a very healthy takeaway, and you’re already thinking about it the right way: **the event should reflect the business fact, not the UI**, but sometimes the UI fields *are already close enough to the business fact*, especially in a small domain like this.\n\nFor **LaundryLog**, the business fact really is something like:\n\n> A laundry-related expense occurred and was logged at a certain time and place.\n\nYour UI fields (washer/dryer/supplies, quantity, unit cost) are simply **the natural way a driver remembers and records that expense**, so they’re perfectly reasonable to include in the event.\n\nIn other words, this is acceptable:\n\n```toml\nevent = \"LaundryExpenseLogged\"\ntimestamp = \"2026-03-08T20:12:00Z\"\n\nexpense_type = \"washer\"\nquantity = 2\nunit_cost = 3.50\nlocation = \"Pilot Travel Center\"\n```\n\nbecause those values still describe the **real-world expense event**, not just UI mechanics.\n\nWhere your accounting insight becomes important later is when the **domain abstraction changes**. In an accounting system the business fact is usually closer to:\n\n```\nExpenseRecorded\namount\ncategory\nvendor\ntimestamp\n```\n\nThe washer/dryer detail would just be **how that expense was incurred**, not the accounting fact itself.\n\nSo you end up with two different “views of reality”:\n\nLaundry domain view:\n\n```\nLaundryExpenseLogged\nmachine_type\nquantity\nunit_cost\n```\n\nAccounting domain view:\n\n```\nExpenseRecorded\namount\ncategory\nvendor\n```\n\nBoth are correct — they just belong to **different bounded contexts**.\n\nThat’s why your instinct to **keep LaundryLog simple and UI-aligned** is good. You’re not prematurely forcing an accounting abstraction onto a tool whose job is simply to **produce a believable audit log**.\n\nWhat’s interesting is that the way you’re structuring things (events, projections, immutable slices) means that later, if you build an accounting system, it could simply **consume the LaundryLog events and project them into accounting entries** without changing LaundryLog itself."

