text = "Yes — what happened is a **Mermaid layout side-effect**.  \nWhen both subgraphs are independent and there is **no connection between them**, the layout engine may place them **side-by-side instead of stacked**.\n\nTo force **rows (top → bottom)** while still keeping **no logical arrow**, you add an **invisible link** between the slices. Mermaid will use it only for layout.\n\nHere is the corrected version.\n\n```mermaid\nflowchart TB\n\n%% ----- Slice 1 : Command -----\nsubgraph S1[\"Slice 1 — Command\"]\ndirection LR\nUI1[\"UI<br>Tap Log Laundry Expense\"]:::ui\nCMD1[\"Command<br>LogLaundryExpense\"]:::command\nEVT1[\"Event<br>LaundryExpenseLogged\"]:::event\nUI1 --> CMD1 --> EVT1\nend\n\n%% ----- Slice 2 : Projection -----\nsubgraph S2[\"Slice 2 — Projection\"]\ndirection RL\nUI2[\"UI<br>View Expense History\"]:::ui\nPROJ2[\"Projection<br>ExpenseHistoryProjection\"]:::projection\nEVT2[\"Event<br>LaundryExpenseLogged\"]:::event\nEVT2 --> PROJ2 --> UI2\nend\n\n%% Invisible layout link (forces rows)\nS1 ~~~ S2\n\n\n%% ----- Styles -----\nclassDef ui fill:#dddddd,stroke:#333,stroke-width:1px;\nclassDef command fill:#cfe8ff,stroke:#333,stroke-width:1px;\nclassDef projection fill:#d8f5d0,stroke:#333,stroke-width:1px;\nclassDef event fill:#ffe6cc,stroke:#333,stroke-width:1px;\n```\n\n### Key trick\n\n```\nS1 ~~~ S2\n```\n\n`~~~` is a **layout-only link**:\n\n- it **forces vertical stacking**\n- it **draws no arrow**\n- it **preserves your slice independence**\n\n---\n\n### Resulting structure\n\n```\nSlice 1 — Command\nUI → Command → Event\n\nSlice 2 — Projection\nEvent → Projection → UI\n```\n\nwith colors:\n\n```\nUI         = gray\nCommand    = light blue\nProjection = light green\nEvent      = light orange\n```\n\n---\n\n### Why this works well for your slice model\n\nYou now have a **clean slice grid**:\n\n```\n           UI                Behavior                Event\n----------------------------------------------------------------\nSlice 1    Tap Expense  →    LogLaundryExpense  →    LaundryExpenseLogged\n\nSlice 2    View History ←    ExpenseProjection  ←    LaundryExpenseLogged\n```\n\nThis is actually a very nice **textual representation of an event-modeling board** like the ones popularized by  \nentity[\"people\",\"Adam Dymitruk\",\"event modeling advocate\"].\n\n---\n\n💡 If you'd like, I can also show one **very small refinement** that will make the **columns stay aligned much better as you add more slices** (it uses “column anchor nodes”). It makes Mermaid diagrams scale a lot better once you reach ~10 slices."

