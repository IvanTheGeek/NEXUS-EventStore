text = "Your test files are actually very good. The main improvement needed is making the **prompt reusable for any number of slices** instead of being hard-coded to six. Right now the instructions lock the AI into S1–S6 and fixed slice descriptions. fileciteturn2file0  \n\nBelow is a **reusable prompt template** that works with **any number of slices** and enforces **entity[\"people\",\"Adam Dymitruk\"]-style user intent naming for the UI node**.\n\n---\n\n# Reusable Event Modeling → Mermaid Prompt\n\nYou can reuse this with **3 slices, 20 slices, etc.**\n\n:::writing{variant=\"standard\" id=\"evt01\"}\nYou are generating a **Mermaid flowchart diagram** representing an **Event Modeling architecture**.\n\nFollow these rules exactly.\n\nYour output must contain **only a Mermaid code block**.\n\nStart with:\n\n```mermaid\n```\n\nEnd with:\n\n```\n```\n\nDo not include explanations.\n\n---\n\n# Diagram Root\n\nUse:\n\nflowchart TB\n\nSlices are stacked vertically.\n\n---\n\n# Slice Types\n\nThere are two slice types.\n\n## Command Slice\n\nStructure:\n\nUserIntent → Command → Event\n\nMermaid:\n\nUI --> Command --> Event\n\nDirection:\n\ndirection LR\n\nThe **UI label must be written as a user intent** (how a user describes the action), following guidance from Adam Dymitruk.\n\nExamples:\n\nRecord Laundry Expense  \nCreate Account  \nSubmit Order  \nRegister Device  \n\n---\n\n## Projection Slice\n\nStructure:\n\nUserView ← Projection ← Event\n\nMermaid arrows must be written:\n\nEvent --> Projection --> UI\n\nDirection:\n\ndirection RL\n\nThis renders visually as:\n\nUI < Projection < Event\n\n---\n\n# Input Format\n\nYou will receive slices in this text format:\n\nSlice Name  \nNarrative Line\n\nExample:\n\nRecord Laundry Expense  \nRecord Laundry Expense → LogLaundryExpense → LaundryExpenseLogged\n\nView Expense History  \nView Expense History ← ExpenseHistoryProjection ← LaundryExpenseLogged\n\n---\n\n# Slice Processing Rules\n\n1. Process slices **in order from top to bottom**.\n2. Number slices sequentially:\n\nS1  \nS2  \nS3  \nS4  \n...\n\n3. Each slice must be inside a Mermaid subgraph.\n\nExample:\n\nsubgraph S1[\"Record Laundry Expense\"]\n\n4. Determine slice type from arrow direction in the narrative line.\n\nIf narrative uses:\n\n→ → →  \n\nthen it is a **Command Slice**.\n\nIf narrative uses:\n\n← ← ←  \n\nthen it is a **Projection Slice**.\n\n---\n\n# Node Creation\n\nCommand Slice nodes:\n\nUI node = user intent  \nCommand node = command name  \nEvent node = event name  \n\nProjection Slice nodes:\n\nEvent node = event name  \nProjection node = projection name  \nUI node = user view name\n\n---\n\n# Sticky Note Styling\n\nUse these classes exactly.\n\nclassDef ui fill:#dddddd,stroke:#888,stroke-width:1px,rx:6,ry:6  \nclassDef command fill:#cfe8ff,stroke:#6aa9ff,stroke-width:1px,rx:6,ry:6  \nclassDef projection fill:#d8f5d0,stroke:#7bc96f,stroke-width:1px,rx:6,ry:6  \nclassDef event fill:#ffe6cc,stroke:#f0a35e,stroke-width:1px,rx:6,ry:6\n\n---\n\n# Slice Background Color\n\nCommand slice:\n\nstyle S# fill:#f4f9ff,stroke:#6aa9ff,stroke-width:1px\n\nProjection slice:\n\nstyle S# fill:#f3fff0,stroke:#7bc96f,stroke-width:1px\n\nReplace # with slice number.\n\n---\n\n# Vertical Spacing\n\nAdd spacing between slices:\n\nS1 ~~~ S2  \nS2 ~~~ S3  \nS3 ~~~ S4  \n\nContinue for all slices.\n\n---\n\n# Labeling Rule\n\nNode labels must contain **only the business name**.\n\nDo not include:\n\nUI:  \nCommand:  \nEvent:  \nProjection:\n\nColors communicate the role.\n\n---\n\n# Goal\n\nThe final diagram must visually resemble a **sticky-note Event Modeling board with alternating command and projection slices**.\n:::\n\n---\n\n# Example Input (Your Current Model)\n\nThis works perfectly with the prompt above. fileciteturn2file2\n\n```\nRecord Laundry Expense\nRecord Laundry Expense → LogLaundryExpense → LaundryExpenseLogged\n\nView Expense History\nView Expense History ← ExpenseHistoryProjection ← LaundryExpenseLogged\n\nModify Laundry Expense\nModify Laundry Expense → EditLaundryExpense → LaundryExpenseEdited\n\nRemove Laundry Expense\nRemove Laundry Expense → DeleteLaundryExpense → LaundryExpenseDeleted\n```\n\n---\n\n# Why this version is better\n\nYour earlier prompt hard-coded:\n\n- S1–S6\n- slice descriptions\n- node IDs\n\nThis version instead:\n\n✔ parses slices dynamically  \n✔ works with **any slice count**  \n✔ preserves **event modeling narrative format**  \n✔ forces **user intent UI wording**  \n✔ maintains **correct arrow direction**  \n\n---\n\n# One small improvement I strongly recommend\n\nIn your generated code you created **duplicate event nodes** for the same event. fileciteturn2file1  \n\nExample:\n\n```\nEVT1[\"LaundryExpenseLogged\"]\nEVT2[\"LaundryExpenseLogged\"]\n```\n\nIn real Event Modeling diagrams those are **the same event**.\n\nA more advanced version of the prompt can **reuse event nodes across slices**, which makes the diagram closer to a real event model.\n\n---\n\nIf you'd like, I can also show you a **much more powerful version of this prompt** that automatically:\n\n• keeps **events aligned vertically**  \n• keeps **UI / Command / Projection columns perfectly aligned**  \n• scales to **50+ slices like a real Event Modeling board**\n\nThat trick makes Mermaid behave **almost exactly like a physical Event Modeling wall**, which would probably fit your **NEXUS “facts → projections” architecture thinking extremely well."

