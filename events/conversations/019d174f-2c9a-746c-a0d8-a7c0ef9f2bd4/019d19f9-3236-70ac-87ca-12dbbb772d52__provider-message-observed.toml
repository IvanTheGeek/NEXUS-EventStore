text = "That actually fits very cleanly with the event we arrived at.\n\nThose three things are not different events — they’re just **types of the same expense**. So the event model stays simple and the UI maps directly to the domain.\n\nConceptually the UI is choosing the **expense type**.\n\n```\nwasher\ndryer\nsupplies\n```\n\nSo the slice remains:\n\n```\nUI                | Command             | Event\n-------------------------------------------------------\nTap washer/dryer  | LogLaundryExpense   | LaundryExpenseLogged\nTap supplies\n```\n\nThe UI selection simply becomes a field in the event.\n\nExample event (TOML):\n\n```toml\nevent = \"LaundryExpenseLogged\"\ntimestamp = \"2026-03-08T19:04:00Z\"\n\nlocation = \"Pilot Travel Center\"\n\nexpense_type = \"washer\"\nquantity = 2\nunit_cost = 3.50\ntotal_cost = 7.00\n```\n\nAnother example:\n\n```toml\nevent = \"LaundryExpenseLogged\"\ntimestamp = \"2026-03-08T20:12:00Z\"\n\nlocation = \"Pilot Travel Center\"\n\nexpense_type = \"supplies\"\nitem = \"bleach vending\"\nquantity = 1\nunit_cost = 2.00\ntotal_cost = 2.00\n```\n\nThe important part for event modeling is that the **business meaning does not change**:\n\n> A laundry-related expense was logged.\n\nThe washer/dryer/supplies buttons are simply **ways the user categorizes the expense**.\n\nThis keeps the domain very small:\n\n```\nCommand: LogLaundryExpense\nEvent:   LaundryExpenseLogged\n```\n\nAnd then projections can easily answer things like:\n\n- total spent this session\n- washer vs dryer costs\n- supply costs\n- total deductible amount\n\nAll from the **same event stream**.\n\nOne subtle thing your UI design already did correctly (even if unintentionally) is that **washer / dryer / supplies are mutually exclusive choices**. That maps perfectly to a single `expense_type` field in the event.\n\nIf you'd like, the next interesting step for the event model would be defining the **minimal event fields required for an IRS-defensible log**, which is actually a really good constraint for designing the event structure."

