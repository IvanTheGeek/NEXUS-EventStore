text = "not using JSON at all, I do not like it. We will use TOML when that make sense. This is rather high level and basic, just to get something started to work on. Adam has stated at event modeling can be sort of looked at as a sequence diagram on its side. Seeing your mermaid diagram, we might be able to modify it and its normal usage to fit more in line with event modeling and my version of it. \nAs such, columns of UI, Command/Projections, Events would serve our needs. The node in the \"Command/Projections\" column would be either a command or a Projection, depending on if its a Command Slice that changes system state, or a Projection Slice that produces a state of a particular shape. A Slice would actually be horizontal in this Mermaid sequence diagram. \nIf we limited scope to a first Command slice, what would be the Command and Event where the UI is in the initial app opened state as the first time using the app and no initial data or previous entries recorded."

