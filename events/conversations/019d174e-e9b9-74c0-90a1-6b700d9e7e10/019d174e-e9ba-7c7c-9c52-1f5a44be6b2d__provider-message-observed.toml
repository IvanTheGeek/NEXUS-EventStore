text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"Filesystem:search_files\",\"content\":[{\"type\":\"text\",\"text\":\"/home/linux/.local/share/Trash/files/context-library/apps/laundrylog\\n/home/linux/Documents/MCP-Complete-Phase2-Ready-2024-11-10-2/laundrylog-design-spec.md\\n/home/linux/FnMCP.IvanTheGeek/context-library/apps/laundrylog\\n/home/linux/RiderProjects/FnMCP.IvanTheGeek/context-library/apps/laundrylog\\n/home/linux/RiderProjects/FnMCP.IvanTheGeek/context-library/nexus/events/laundrylog\\n/home/linux/RiderProjects/FnMCP.IvanTheGeek/context-library/nexus/events/laundrylog/domain/active/2025-11/2025-11-11T22-51-09Z_TechnicalDecision_Phase_3_Test_-_LaundryLog_f1245e77.md\\n/home/linux/RiderProjects/FnMCP.IvanTheGeek/src/context-library/apps/laundrylog\",\"uuid\":\"82fe5b40-9413-4daa-9c23-688c5e539e9c\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":\"Filesystem\",\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

