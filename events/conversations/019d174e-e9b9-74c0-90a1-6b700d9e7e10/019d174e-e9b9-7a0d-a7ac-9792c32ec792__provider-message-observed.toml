text = "{\"start_timestamp\":\"2025-11-12T03:27:08.507894Z\",\"stop_timestamp\":\"2025-11-12T03:27:09.257612Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"Filesystem:read_multiple_files\",\"input\":{\"paths\":[\"/home/linux/RiderProjects/FnMCP.IvanTheGeek/context-library/apps/perdiem/data-model.md\",\"/home/linux/RiderProjects/FnMCP.IvanTheGeek/context-library/apps/perdiem/design-spec.md\"]},\"message\":\"read_multiple_files\",\"integration_name\":\"Filesystem\",\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

