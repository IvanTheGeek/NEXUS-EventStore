text = "Being a truck driver, I have lots of time to think while driving. If I am able to record a thought in the notes app, having it provide the text transcription is a huge benefit and time saver for when I am stopped and can open the laptop. Driving and sleeping so I can drive leaves very precious time for actual computer time, which is my preference. A AI app that allowed voice input and would read the response to me would allow opportunity when driving to reason and explore. "

