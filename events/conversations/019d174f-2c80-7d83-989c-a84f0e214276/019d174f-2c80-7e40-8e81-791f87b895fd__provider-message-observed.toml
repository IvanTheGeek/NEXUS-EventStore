text = "Good — this is the right kind of test.\n\nSince:\n\n- Voicemail **does** use the mic on your entity[\"product\",\"AirPods Pro\",\"apple wireless earbuds\"]  \n- But entity[\"software\",\"ChatGPT\",\"openai assistant\"] and entity[\"software\",\"Notely\",\"note-taking app\"] don’t reliably switch  \n- On your entity[\"product\",\"Pixel 9\",\"google smartphone\"]  \n\nWe’re isolating whether Android is defaulting back to the phone mic when not in call context.\n\n---\n\n## How To Confirm Without Covering the Phone Mic\n\nHere’s a cleaner method than physically covering the mic:\n\n1. Put the phone down somewhere a few feet away (passenger seat or dash).\n2. Turn your head away from the phone.\n3. Speak very softly directly into one AirPod.\n4. Then speak softly toward the phone instead.\n\nIf:\n- Soft speech into the AirPod works but not toward the phone → AirPod mic is active.\n- Soft speech toward the phone works but AirPod doesn’t → phone mic is active.\n- Both work equally → likely phone mic with noise suppression.\n\nTruck cabin noise makes this a strong test because proximity matters a lot.\n\n---\n\n## Based on Everything So Far\n\nBecause voicemail used the AirPods mic, we know:\n\n✔ HFP works  \n✔ Bluetooth routing works  \n✔ Hardware works  \n\nSo if this test shows the phone mic is being used, the issue is:\n\n> The app is not requesting the Bluetooth SCO audio channel.\n\nThat’s an app behavior issue — not a Pixel problem.\n\n---\n\n## Important Question\n\nWhen you’re in ChatGPT voice mode:\n\n- Does the audio quality drop slightly (typical of HFP call quality)?\n- Or does it sound like full media-quality audio?\n\nIf it sounds full-quality, Android likely never switched to the call profile — meaning the mic stayed on the phone.\n\n---\n\nRun this proximity test and tell me what you observe.\n\nWe’re very close to a definitive conclusion."

