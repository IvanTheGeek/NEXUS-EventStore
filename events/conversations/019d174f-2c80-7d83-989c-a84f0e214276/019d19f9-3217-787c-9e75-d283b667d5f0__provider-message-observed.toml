text = "Excellent. That result is very important.\n\nIf voicemail hears you clearly through the **entity[\"product\",\"AirPods Pro\",\"apple wireless earbuds\"]**, then:\n\n✅ HFP (Headset Profile) is working  \n✅ The earbud mic hardware is fine  \n✅ The **entity[\"product\",\"Pixel 9\",\"google smartphone\"]** Bluetooth routing is capable  \n❌ The issue is app-level audio source selection  \n\nThat narrows this down cleanly.\n\n---\n\n# What’s Actually Happening\n\nDuring a phone call, Android forces:\n```\nVOICE_COMMUNICATION (Bluetooth SCO / HFP)\n```\n\nBut when you use:\n- entity[\"software\",\"ChatGPT\",\"openai assistant\"]  \n- entity[\"software\",\"Notely\",\"note-taking app\"]  \n\nThey may be requesting:\n```\nMIC (default media input)\n```\n\nWhen that happens, Android often:\n- Keeps audio output on Bluetooth\n- But keeps mic input on the phone\n\nThis is extremely common with AirPods on Android.\n\n---\n\n# Quick Experiment (Very Revealing)\n\nDo this exactly:\n\n1. Start a phone call (voicemail again is fine).\n2. While the call is still active, open ChatGPT.\n3. Start voice mode in ChatGPT.\n4. End the phone call.\n5. Immediately speak and see if it now uses the AirPods mic.\n\nSometimes Android “sticks” in HFP mode after a call and third-party apps inherit it temporarily.\n\nIf that works, we’ve confirmed it’s purely an audio-source request issue.\n\n---\n\n# Why This Happens\n\nApple optimizes AirPods for:\n- iOS call routing\n- Clear call profiles\n\nAndroid treats them more generically.\n\nUnless the app explicitly requests:\n```\nVOICE_COMMUNICATION\n```\nAndroid may not switch to the Bluetooth mic.\n\nSome apps do.\nSome don’t.\nIt’s inconsistent.\n\n---\n\n# Your Situation Now\n\nSystem level: ✅  \nHardware: ✅  \nBluetooth profile: ✅  \nApp behavior: ⚠️  \n\nThat’s actually good news.\n\n---\n\n# Realistic Options\n\n### Option A — Accept minor friction\nUse the “start call → open app” trick if it works reliably.\n\n### Option B — Try Google Voice Typing inside Notely\nIf you use the system voice typing keyboard instead of the app’s internal recorder, it often routes correctly.\n\n### Option C — Use an Android-native headset\nAirPods work, but they’re not optimized for Android voice routing.\n\n### Option D — Dedicated AI voice workflow\nIf ChatGPT voice works reliably after the call trick, that may be your driving cognition layer.\n\n---\n\n# Important Question\n\nWhen you used ChatGPT voice:\nDid it read responses back through the AirPods correctly?\n\nBecause if output is stable but input routing is inconsistent, we can optimize around that.\n\n---\n\nYou’ve already done the hardest diagnostic step.  \nNow we just refine the architecture."

