kind = "plain_text"
text = "Yes — on Android, the ChatGPT app can use the microphone from your wired or Bluetooth earbuds **if Android routes the audio input to them**.\n\nHere’s how it works:\n\n### 🎧 Wired Earbuds (3.5mm or USB-C)\n- If the earbuds have a built-in mic, Android usually **automatically switches input** to that mic when plugged in.\n- ChatGPT will then use whatever mic Android designates as the active input device.\n\n### 🎧 Bluetooth Earbuds (AirPods, Pixel Buds, etc.)\n- When connected, Android typically switches both **audio output and mic input** to the earbuds.\n- ChatGPT uses the system’s active mic — so if the Bluetooth headset mic is active, that’s what it uses.\n\n---\n\n## 🔍 How to Confirm It’s Using the Earbud Mic\n\n1. Connect your earbuds.\n2. Start voice input in ChatGPT.\n3. Cover your phone’s built-in mic and speak into the earbud mic.\n4. If it still hears you clearly, it’s using the earbuds.\n\nYou can also check:\n**Settings → Connected devices → [Your earbuds] → Device details**\nMake sure “Calls” or “Audio input” is enabled.\n\n---\n\n## ⚠️ Important Android Behavior\nOn Android, apps don’t usually choose the mic directly — the **OS decides the active input device**. ChatGPT just uses whatever Android provides.\n\nIf you’re using a Pixel 8 Pro (like your device metadata suggests), Bluetooth routing is generally reliable — but wired USB-C adapters can sometimes default back to the phone mic if they’re low quality.\n\n---\n\nIf you want, tell me:\n- Wired or Bluetooth?\n- What earbuds model?\n- Is it not switching like you expect?\n\nI can help you debug it step-by-step."

