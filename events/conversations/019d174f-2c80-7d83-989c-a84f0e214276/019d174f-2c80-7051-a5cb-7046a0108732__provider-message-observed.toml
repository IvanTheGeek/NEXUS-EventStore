text = "Thanks — got it. Since tapping the device entry doesn’t show a “Phone calls” toggle, we’ll proceed with a short, practical checklist that isolates whether the issue is the headset, the phone, or Android routing. I’ll keep it ordered so you can run tests quickly in the truck.\n\nEntities: entity[\"product\",\"Pixel 9\",\"google smartphone\"], entity[\"product\",\"AirPods Pro\",\"apple wireless earbuds\"], entity[\"software\",\"Android\",\"google mobile operating system\"], entity[\"software\",\"Notely\",\"note-taking app\"], entity[\"software\",\"ChatGPT\",\"openai assistant\"].\n\n---\n\n## Quick, ordered troubleshooting (do these steps in order)\n\n1. **Phone-call sanity check (fast and decisive)**  \n   - Place a 10–15 second phone call to a friend or voicemail. While on the call, **cover the phone mic** and speak into your AirPods.  \n   - If the caller hears you clearly → HFP (headset mic) works at system level. If they don’t → HFP isn’t engaging and we handle that next.\n\n2. **Test a Google/OS voice path**  \n   - Try **Google Assistant** or **Voice typing** (or Google Recorder). If Assistant hears you via the AirPods, Android is routing voice apps to the headset. If Assistant still uses the phone mic, it’s a system routing problem.\n\n3. **Forget + reset + re-pair (most reliable fix)**  \n   - On the Pixel: Settings → Connected devices → Previously connected devices → *Forget* the AirPods entry.  \n   - Reset the AirPods Pro: put them in case, open lid, press-and-hold the setup button on the case until the status light flashes amber then white.  \n   - Re-pair them to the Pixel and **re-run step 1 (call test)**.\n\n4. **Reboot the phone & toggle BT**  \n   - After re-pairing, reboot the Pixel and test again. Simple reboots often clear profile-state bugs.\n\n5. **Firmware factor (AirPods)**  \n   - AirPods firmware updates normally require an Apple device. If you have temporary access to an iPhone, connect the AirPods to it and let them update firmware, then retry on the Pixel. Outdated AirPod firmware on Android can cause odd HFP behavior.\n\n6. **If calls use AirPods but apps don’t (app routing issue)**  \n   - Check mic permission for **entity[\"software\",\"Notely\",\"note-taking app\"]** and **entity[\"software\",\"ChatGPT\",\"openai assistant\"]**: Settings → Apps → [app] → Permissions → Microphone = Allowed.  \n   - Test Voice Typing / Recorder again. Some apps need to request VOICE_COMMUNICATION input — if system apps use headset but third-party apps don’t, it’s an app-level behavior.\n\n7. **If HFP never works (even in normal calls)**  \n   - Try the AirPods with another phone (any phone) to confirm the AirPods mic hardware is OK.  \n   - If they also fail on another phone, AirPods hardware/firmware is suspect. If they work on another phone but not on the Pixel, it's a Pixel/Android routing issue.\n\n8. **Workarounds if Android + AirPods remain flaky**\n   - Use a wired USB-C headset (reliable mic routing).  \n   - Use a dedicated Android-first Bluetooth headset (Jabra/Plantronics style) if you want robust HFP in-cab.  \n   - Third-party apps that force routing (e.g., older apps like “SoundAbout”) exist but are hit-or-miss; use with caution.\n\n---\n\n## Short summary of likely outcomes\n- If **call test works** but **Notely/ChatGPT don’t** → app-level routing/permissions (fixable).  \n- If **call test fails** → pairing/firmware or Pixel Bluetooth profile issue (forget+reset AirPods → re-pair, update firmware).  \n- If **AirPods work on another phone but not the Pixel** → Pixel-side Bluetooth state problem (reboot, re-pair, last-resort factory Bluetooth reset).\n\n---\n\nTry steps **1 → 3 → 4** first (call test, then forget/reset/re-pair, then reboot). No need to do the firmware step unless those don’t help.\n\nTell me the result of the **call test** and whether resetting & re-pairing changed anything — I’ll give the exact next step based on that."

