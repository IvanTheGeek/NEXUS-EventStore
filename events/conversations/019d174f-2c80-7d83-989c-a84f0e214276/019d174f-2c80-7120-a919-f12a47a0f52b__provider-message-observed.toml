text = "Ah — **GrapheneOS changes things.** That’s an important detail.\n\nBecause entity[\"software\",\"GrapheneOS\",\"android-based privacy os\"] tightens permissions and hardware routing compared to stock Android, mic behavior can differ — especially with Bluetooth.\n\nLet’s break this down properly.\n\n---\n\n# 🎧 Why Your Notepad App May Not Use the Earbud Mic\n\nOn Android (including GrapheneOS), there are **two different audio paths**:\n\n1. **Media audio (A2DP)** → high-quality audio output only  \n2. **Call audio (HFP/HSP profile)** → lower quality, but includes microphone input  \n\nFor Bluetooth earbuds to provide mic input, the device must switch into the **HFP (Headset Profile)** mode.\n\nMany transcription apps:\n- Don’t explicitly request the “voice communication” audio source\n- Or GrapheneOS may restrict auto-switching for privacy reasons\n- So Android stays in media mode → phone mic stays active\n\n---\n\n# 🔍 Step 1 — Check Bluetooth Profile\n\nGo to:\n\n**Settings → Connected devices → Your Earbuds**\n\nMake sure:\n- ✅ “Phone calls” is enabled  \n- ✅ “Media audio” is enabled  \n\nIf “Phone calls” is off, Android will not use the earbud mic.\n\n---\n\n# 🔍 Step 2 — Check App Permissions (GrapheneOS-Specific)\n\nGrapheneOS adds additional toggles:\n\nGo to:\n**Settings → Apps → [Your Notepad App] → Permissions**\n\nCheck:\n- Microphone permission granted\n- No special mic restrictions enabled\n- No sensor toggle blocking microphone\n\nAlso check:\n**Privacy → Microphone access**\nMake sure the global mic toggle isn’t interfering.\n\n---\n\n# 🚗 Why This Matters When Driving\n\nWhen driving, you need:\n- Earbud mic active\n- Stable HFP profile\n- App requesting `VOICE_COMMUNICATION` or `VOICE_RECOGNITION` input source\n\nSome apps default to:\n```\nMediaRecorder.AudioSource.MIC\n```\nWhich may not trigger Bluetooth mic routing properly.\n\nBetter apps use:\n```\nVOICE_RECOGNITION\n```\nor\n```\nVOICE_COMMUNICATION\n```\n\n---\n\n# 🧠 Important: GrapheneOS Is Stricter\n\nGrapheneOS:\n- Does not auto-grant some audio routing privileges\n- May require the app to be explicitly allowed background mic use\n- Can behave differently if you're using sandboxed Google Play\n\nAre you:\n- Using sandboxed Google Play?\n- Or fully de-Googled?\n\nThat changes the speech recognition backend and routing behavior.\n\n---\n\n# 🔧 Workarounds That Often Fix It\n\n### Option 1 — Initiate a \"Call Context\"\nStart any app that uses call audio (even briefly), then switch to your notes app. This can force Bluetooth into HFP mode.\n\n### Option 2 — Use a Voice Recorder App First\nIf a recorder app successfully uses the earbud mic, keep it active in background and switch to notes.\n\n### Option 3 — Test With ChatGPT Voice\nIf ChatGPT voice input correctly uses the earbud mic, then the issue is app-specific, not system-level.\n\n---\n\n# 🎯 Most Likely Cause\n\nGiven your description:\n> “It transcribes well but won’t use the earbud mic.”\n\nThis strongly suggests:\n- Bluetooth connected\n- Media audio active\n- HFP not triggered\n- App not requesting voice communication mode\n\n---\n\nIf you tell me:\n- Wired or Bluetooth?\n- Earbud model?\n- Which notepad app?\n- Sandboxed Play installed or not?\n\nI can give you a more surgical fix.\n\nAnd honestly — using this while driving for structured prompt capture is actually a very solid workflow design move."

