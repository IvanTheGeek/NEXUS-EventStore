text = "Thanks — that screenshot + your test result makes the situation clear: your **entity[\"product\",\"AirPods Pro\",\"apple wireless earbuds\"]** mic is *not* being used by Notely or **entity[\"software\",\"ChatGPT\",\"openai assistant\"]**. That points to a Bluetooth audio routing / HFP issue on the phone (not a transcription bug in the apps). Below are immediate, ordered steps to diagnose and work around it on your **entity[\"product\",\"Pixel 9\",\"google smartphone\"]**.\n\nQuick checklist (run these in order)\n\n1. Confirm the system sees HFP (phone-call) enabled  \n   - Settings → Connected devices → *Your AirPods Pro* → tap device → make sure **Phone calls** is **ON** (and Media audio ON).  \n   - If that toggle is off, the phone will keep using its internal mic.\n\n2. Test HFP with a real phone call (fast and decisive)  \n   - Place a normal phone call (voicemail or a friend). While on the call, cover the phone’s mic and speak into an AirPod.  \n   - If the other side hears you clearly, HFP is working at the system level. If they don’t, HFP never engaged.\n\n3. If HFP works during calls but *not* in apps (Notely / ChatGPT): app vs routing issue  \n   - This means Android switches to AirPod mic for calls but is **not** switching for those apps. Two quick checks:  \n     • Settings → Apps → Notely → Permissions → Microphone: **Allowed**. Do the same for ChatGPT.  \n     • Try Google Assistant / Voice Typing (or Google Recorder). If Assistant uses the earbud mic, system routing works for voice apps — if not, system routing is inconsistent.\n\n4. If HFP *never* works (even during calls): repair/reset  \n   - Forget AirPods in Bluetooth settings → reboot Pixel → re-pair them.  \n   - Reset AirPods Pro (press and hold setup button until LED flashes) then re-pair.  \n   - Re-test the phone-call check above.\n\n5. Firmware and interoperability notes  \n   - AirPods firmware updates usually require an Apple device. Older firmware can behave oddly on Android. If possible, temporarily update AirPods via an iPhone to latest firmware, then retest on Pixel.\n\n6. Developer / force options (only if comfortable)  \n   - Some apps historically force Bluetooth SCO/HFP (e.g., older apps like “SoundAbout”); these are hit-or-miss and may be out of date. Use with caution.  \n   - There isn’t a simple Android user toggle to forcibly route microphone for non-call apps other than the app requesting voice-communication audio — that’s why calls are the reliable test.\n\n7. Reliable workarounds if Android+AirPods remain flaky\n   - Use a dedicated Android-friendly Bluetooth headset (Jabra/Plantronics are rock-solid for HFP).  \n   - Use a wired USB-C headset with a mic — these almost always route the mic correctly.  \n   - Use the phone call trick: briefly start a call (puts HFP on), then switch to your app — sometimes forces the profile.\n\n8. Final checks for Notely / ChatGPT specifically\n   - Make sure Notely isn’t using its own built-in recorder with a hard-coded input (rare but possible).  \n   - In ChatGPT voice mode, ensure the app has mic permission + background mic access if it runs while you’re driving.\n\nWhat to try next (one short run you can do now)\n- Forget device → reboot Pixel → re-pair AirPods → place a call and confirm the AirPod mic works during the call.  \n- If the call test succeeds, open ChatGPT and immediately test voice mode (cover phone mic to verify). Report whether ChatGPT now uses the AirPod mic.\n\nIf that still fails, tell me which of these tests **did** or **did not** work (call test, Assistant test, re-pair), and I’ll give the exact next move (firmware update steps, recommended headsets, or an app-level workaround)."

