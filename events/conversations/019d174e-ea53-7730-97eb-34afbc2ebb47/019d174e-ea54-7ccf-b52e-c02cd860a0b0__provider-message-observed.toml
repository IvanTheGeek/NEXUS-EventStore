text = "WebSocket is also failing - it connects but closes immediately. The issue is **authentication**: The `/ws` endpoint requires the Bearer token, but `mcp-remote` doesn't support WebSocket auth headers.\n\n**Let's use the SSH tunnel approach** - this will work immediately:\n\n```json\n{\n  \"globalShortcut\": \"\",\n  \"preferences\": {\n    \"menuBarEnabled\": false\n  },\n  \"mcpServers\": {\n    \"nexus-vps\": {\n      \"command\": \"ssh\",\n      \"args\": [\n        \"root@66.179.208.238\",\n        \"docker\", \"exec\", \"-i\", \"nexus-mcp\", \"./FnMCP.Nexus\", \"/data/event-store\"\n      ]\n    }\n  }\n}\n```\n\nThis:\n1. SSH's to your VPS\n2. Runs the MCP server in stdio mode inside the Docker container\n3. No authentication needed (SSH handles security)\n4. Will definitely work!\n\nUpdate the config, restart Claude Desktop, and it should connect successfully. Show me the logs after restart!\n\n---\n\n**Token Usage:**\n- Last response: ~256 tokens\n- Session total: 106,654 tokens used\n- Remaining: 83,346 tokens (43.9% available)"

