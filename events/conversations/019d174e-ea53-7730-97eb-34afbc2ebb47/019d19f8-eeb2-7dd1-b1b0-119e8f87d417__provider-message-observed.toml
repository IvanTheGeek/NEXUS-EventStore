text = "Perfect! Image loaded on VPS. Now let's deploy it:\n\n## Step 4: Create docker-compose.yml on VPS\n\n```bash\ncd /srv/nexus\n\n# Create docker-compose.yml\nsudo tee docker-compose.nexus-mcp.yml > /dev/null <<'EOF'\nversion: '3.8'\n\nservices:\n  nexus-mcp:\n    image: nexus-mcp:latest\n    container_name: nexus-mcp\n    restart: unless-stopped\n    ports:\n      - \"18080:18080\"\n    environment:\n      - NEXUS_TRANSPORT=http\n      - NEXUS_MCP_PORT=18080\n      - CONTEXT_LIBRARY_PATH=/data/event-store\n      - QDRANT_URL=http://qdrant:6333\n      - QDRANT_API_KEY=${QDRANT_API_KEY}\n      - EMBEDDING_API_URL=http://embedding:5000/embed\n    volumes:\n      - /var/lib/nexus/event-store:/data/event-store:ro\n    networks:\n      - nexus-network\n\nnetworks:\n  nexus-network:\n    external: true\nEOF\n\n# Verify\ncat docker-compose.nexus-mcp.yml\n```\n\nRun this and let me know when it's created.\n\n---\n\n**Token Usage:**\n- Last response: ~282 tokens\n- Session total: 78,456 tokens used\n- Remaining: 111,544 tokens (58.7% available)"

