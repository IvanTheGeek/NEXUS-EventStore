text = "Need to override the entrypoint since it's looking for wrong filename:\n\n```bash\nssh root@66.179.208.238 << 'EOF'\n# Extract binary with correct entrypoint override\ndocker run --rm --entrypoint /bin/sh -v /tmp:/output nexus-mcp:latest -c \"cp /app/FnMCP.Nexus /output/\"\n\n# Now run it in stdio mode to generate key\necho '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"test\",\"version\":\"1.0\"}}}\n{\"jsonrpc\":\"2.0\",\"id\":2,\"method\":\"tools/call\",\"params\":{\"name\":\"generate_api_key\",\"arguments\":{\"scope\":\"full_access\",\"description\":\"VPS deployment key\"}}}' | /tmp/FnMCP.Nexus /var/lib/nexus/event-store\nEOF\n```\n\nRun this - it overrides the entrypoint to use /bin/sh, then copies the binary correctly.\n\n---\n\n**Token Usage:**\n- Last response: ~204 tokens\n- Session total: 82,258 tokens used\n- Remaining: 107,742 tokens (56.7% available)"

