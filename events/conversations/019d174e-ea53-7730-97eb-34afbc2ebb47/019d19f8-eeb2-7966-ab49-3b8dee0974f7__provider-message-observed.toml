text = "Perfect! Now here's the prompt for Claude Code:\n\n```\nMCP Resource Visibility Bug - PRIORITY FIX\n\nProject: /home/linux/FnMCP.Nexus\n\nPROBLEM: SSH stdio connection to VPS works, Claude Desktop shows nexus-vps as connected, but NO resources are visible in Claude Desktop.\n\nRead this first: /home/linux/Nexus-Data/quick-start/code-mcp-fixes-needed.md\n\nPRIMARY TASK: Fix stdio resource visibility\n\nDebug steps:\n1. Test resources/list manually:\n   echo '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"test\",\"version\":\"1.0\"}}}\n{\"jsonrpc\":\"2.0\",\"id\":2,\"method\":\"resources/list\"}' | ssh root@66.179.208.238 \"docker exec -i -e NEXUS_TRANSPORT=stdio nexus-mcp ./FnMCP.Nexus /data/event-store\"\n\n2. Check what resources/list returns - should list all .md files in /data/event-store\n\n3. Review FileSystemProvider.fs - verify ListResources() works correctly\n\n4. Check McpServer.fs - verify HandleListResources() is called and returns resources\n\n5. Add debug logging if needed to see what's happening\n\n6. Fix whatever is preventing resources from appearing in Claude Desktop\n\nExpected result: Claude Desktop should see all markdown files from VPS event store as MCP resources that can be read.\n\nShow me what you find and what needs to be fixed!\n```\n\nGive this to Claude Code now. This is the blocker for everything else!\n\n---\n\n**Token Usage:**\n- Last response: ~337 tokens\n- Session total: 125,174 tokens used\n- Remaining: 64,826 tokens (34.1% available)"

