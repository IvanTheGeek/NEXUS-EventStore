text = "Excellent! Auth is working perfectly. Now let's generate a real API key and test the full SSE connection:\n\n## Step 8: Generate API Key\n\n```bash\n# Generate API key via stdio (SSH access)\ndocker exec -i nexus-mcp ./FnMCP.Nexus /data/event-store <<'EOF'\n{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"test\",\"version\":\"1.0\"}}}\n{\"jsonrpc\":\"2.0\",\"id\":2,\"method\":\"tools/call\",\"params\":{\"name\":\"generate_api_key\",\"arguments\":{\"scope\":\"full_access\",\"description\":\"Test key for Phase 4 deployment\"}}}\nEOF\n```\n\nThis will generate an API key. Copy the key from the output, then test:\n\n```bash\n# Replace YOUR_API_KEY with the key from above\ncurl -H \"Authorization: Bearer YOUR_API_KEY\" --max-time 3 https://mcp.nexus.ivanthegeek.com/sse/events\n```\n\nRun the generate command and show me the key!\n\n---\n\n**Token Usage:**\n- Last response: ~251 tokens\n- Session total: 81,342 tokens used\n- Remaining: 108,658 tokens (57.2% available)"

