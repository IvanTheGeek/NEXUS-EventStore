kind = "plain_text"
text = "Great idea! Let's create a standard prompt that works across all Claude clients. Here's my plan:\n\n## The Workflow\n\n1. **Set Status**: You tell Claude to update the project status\n2. **Store**: Claude uses `update_documentation` tool (MCP) to write to `project-status.md`\n3. **Get Status**: Any Claude reads it via MCP resources (no tool needed - just a resource read)\n\n## Standard Prompts\n\n**To Update Status (any Claude client):**\n```\nUpdate Nexus project status:\n- Phase: [current phase]\n- Last completed: [what just finished]\n- What works: [key working features]\n- Next up: [immediate next steps]\n- Blocked by: [any blockers, or \"none\"]\n```\n\n**To Check Status (any Claude client):**\n```\nRead quick-start/project-status.md and summarize where we are.\n```\n\n**Quick Check (shortest version):**\n```\nStatus check\n```\n\nLet me create a helper document and update the project-status with a template:"

