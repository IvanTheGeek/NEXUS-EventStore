text = "The entrypoint is looking for `./nexus` but it's not there. Let's override the entrypoint to see what's in /app:\n\n```bash\n# Override entrypoint to check contents\ndocker run --rm --entrypoint /bin/sh nexus-mcp:latest -c \"ls -la /app\"\n\n# Also check the entire filesystem\ndocker run --rm --entrypoint /bin/sh nexus-mcp:latest -c \"find / -name 'nexus*' -o -name '*.dll' 2>/dev/null | head -20\"\n```\n\nThis will show us what files are actually in the container and where they are.\n\n---\n\n**Token Usage:**\n- Last response: ~137 tokens\n- Session total: 79,033 tokens used\n- Remaining: 110,967 tokens (58.4% available)"

