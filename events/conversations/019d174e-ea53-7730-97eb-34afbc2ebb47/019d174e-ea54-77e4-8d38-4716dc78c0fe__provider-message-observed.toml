text = "Yes! Here's the prompt for Claude Code:\n\n```\nBuild a local single-file binary of FnMCP.Nexus for testing.\n\nProject location: /home/linux/FnMCP.Nexus\n\nTasks:\n1. Clean previous builds: dotnet clean\n2. Build single-file self-contained binary:\n   dotnet publish src/FnMCP.Nexus/FnMCP.Nexus.fsproj \\\n     -c Release \\\n     -r linux-x64 \\\n     --self-contained true \\\n     -p:PublishSingleFile=true \\\n     -o ./bin/local\n\n3. Make it executable: chmod +x ./bin/local/FnMCP.Nexus\n\n4. Test it works:\n   echo '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"test\",\"version\":\"1.0\"}}}' | ./bin/local/FnMCP.Nexus /home/linux/Nexus-Data\n\n5. Show me the binary location and size\n\nThis will give us a local binary to generate API keys in stdio mode.\n```\n\nGive this to Claude Code now!\n\n---\n\n**Token Usage:**\n- Last response: ~288 tokens\n- Session total: 82,767 tokens used\n- Remaining: 107,233 tokens (56.4% available)"

