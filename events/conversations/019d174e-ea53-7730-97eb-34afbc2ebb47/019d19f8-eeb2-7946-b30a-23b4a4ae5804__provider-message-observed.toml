[[body.segments]]
kind = "plain_text"
text = "Here's how to install Docker on your Linux Mint machine:\n\n```bash\n# Update package index\nsudo apt update\n\n# Install prerequisites\nsudo apt install -y apt-transport-https ca-certificates curl software-properties-common\n\n# Add Docker's official GPG key\ncurl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg\n\n# Add Docker repository (Linux Mint is based on Ubuntu)\necho \"deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable\" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null\n\n# Note: If that fails, try this instead (uses Ubuntu version instead of Mint version)\n# echo \"deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu jammy stable\" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null\n\n# Update package index again\nsudo apt update\n\n# Install Docker\nsudo apt install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin\n\n# Add your user to docker group (so you don't need sudo)\nsudo usermod -aG docker $USER\n\n# Start and enable Docker\nsudo systemctl start docker\nsudo systemctl enable docker\n\n# Verify installation\ndocker --version\ndocker compose version\n```\n\n**After installation, you'll need to log out and back in** (or reboot) for the group membership to take effect.\n\nTest it works:\n```bash\ndocker run hello-world\n```\n\nReady to proceed once Docker is installed?\n\n---\n\n**Token Usage:**\n- Last response: ~370 tokens\n- Session total: 71,603 tokens used\n- Remaining: 118,397 tokens (62.3% available)"

