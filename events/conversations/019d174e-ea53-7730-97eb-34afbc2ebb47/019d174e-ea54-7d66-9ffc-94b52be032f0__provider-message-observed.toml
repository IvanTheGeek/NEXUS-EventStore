text = "The request is hanging (SSE keeps connection open). Let's test with a timeout and verbose output:\n\n```bash\n# Test with timeout to see headers\ncurl -v --max-time 2 https://mcp.nexus.ivanthegeek.com/sse/events 2>&1 | head -30\n```\n\nThis will show us if auth is working. If it's streaming events without requiring auth, we have a problem. Show me the output.\n\n---\n\n**Token Usage:**\n- Last response: ~102 tokens\n- Session total: 79,995 tokens used\n- Remaining: 110,005 tokens (57.9% available)"

