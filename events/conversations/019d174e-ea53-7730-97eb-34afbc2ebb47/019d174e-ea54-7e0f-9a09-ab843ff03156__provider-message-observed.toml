text = "**Found the issue!** Claude Desktop **only supports stdio**, not direct SSE connections. We need to use `mcp-remote` as a bridge.\n\nHere's the corrected config:\n\n```json\n{\n  \"globalShortcut\": \"\",\n  \"preferences\": {\n    \"menuBarEnabled\": false\n  },\n  \"mcpServers\": {\n    \"nexus-vps\": {\n      \"command\": \"npx\",\n      \"args\": [\n        \"mcp-remote\",\n        \"https://mcp.nexus.ivanthegeek.com/sse/events\",\n        \"--transport\",\n        \"sse-only\",\n        \"--header\",\n        \"Authorization: Bearer wHj6HkvbK5sf305VBuA25rIJqadW1JJB+zH/eCiFL0U=\"\n      ]\n    }\n  }\n}\n```\n\n**Steps:**\n\n1. Make sure Node.js is installed (check: `node --version`)\n2. Update the config file with the above\n3. Restart Claude Desktop completely\n4. The `mcp-remote` package will auto-install via npx\n\nTry this and let me know if nexus-vps shows up!\n\n---\n\n**Token Usage:**\n- Last response: ~272 tokens\n- Session total: 103,651 tokens used\n- Remaining: 86,349 tokens (45.4% available)"

