text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"Hugging Face:hf_doc_search\",\"content\":[{\"type\":\"text\",\"text\":\"# Documentation Library Search Results for \\u0022Claude Desktop MCP server configuration SSE transport\\u0022\\n\\nFound 2 results\\n## Results for Product: gradio (2 results)\\n\\n\\n### Results from [Mcp - Using Docs Mcp Guide](https://gradio.app/guides/using-docs-mcp)\\n\\nFor clients that support SSE (e.g. Cursor, Windsurf, Cline), simply add the following configuration to your MCP config:\\n\\u0060\\u0060\\u0060json\\n{\\n  \\u0022mcpServers\\u0022: {\\n    \\u0022gradio\\u0022: {\\n      \\u0022url\\u0022: \\u0022https://gradio-docs-mcp.hf.space/gradio_api/mcp/sse\\u0022\\n    }\\n  }\\n}\\n\\u0060\\u0060\\u0060\\nWe\\u0027ve included step-by-step instructions for Cursor below, but you can consult the docs for Windsurf [here](https://docs.windsurf.com/windsurf/mcp), and Cline [here](https://docs.cline.bot/mcp-servers/configuring-mcp-servers) which are similar to set up. \\nCursor \\n1. Make sure you\\u0027re using the latest version of Cursor, and go to Cursor \\u003E Settings \\u003E Cursor Settings \\u003E MCP \\n2. Click on \\u0027\\u002B Add new global MCP server\\u0027 \\n3. Copy paste this json into the file that opens and then save it. \\n\\u0060\\u0060\\u0060json\\n{\\n  \\u0022mcpServers\\u0022: {\\n    \\u0022gradio\\u0022: {\\n      \\u0022url\\u0022: \\u0022https://gradio-docs-mcp.hf.space/gradio_api/mcp/sse\\u0022\\n    }\\n  }\\n}\\n\\u0060\\u0060\\u0060\\n4. That\\u0027s it! You should see the tools load and the status go green in the settings page. You may have to click the refresh icon or wait a few seconds. \\n![](https://huggingface.co/datasets/huggingface/documentation-images/resolve/main/gradio-guides/cursor-mcp.png)\\nClaude Desktop\\n1. Since Claude Desktop only supports stdio, you will need to [install Node.js](https://nodejs.org/en/download/) to get this to work. \\n2. Make sure you\\u0027re using the latest version of Claude Desktop, and go to Claude \\u003E Settings \\u003E Developer \\u003E Edit Config \\n3. Open the file with your favorite editor and copy paste this json, then save the file. \\n\\u0060\\u0060\\u0060json\\n{\\n  \\u0022mcpServers\\u0022: {\\n    \\u0022gradio\\u0022: {\\n      \\u0022command\\u0022: \\u0022npx\\u0022,\\n      \\u0022args\\u0022: [\\n        \\u0022mcp-remote\\u0022,\\n        \\u0022https://gradio-docs-mcp.hf.space/gradio_api/mcp/sse\\u0022,\\n        \\u0022--transport\\u0022,\\n        \\u0022sse-only\\u0022\\n      ]\\n    }\\n  }\\n}\\n\\u0060\\u0060\\u0060\\n4. Quit and re-open Claude Desktop, and you should be good to go. You should see it loaded in the Search and Tools icon or on the developer settings page. \\n![](https://huggingface.co/datasets/huggingface/documentation-images/resolve/main/gradio-guides/claude-deskt\\n\\n### Results from [Mcp - Building Mcp Server With Gradio Guide](https://gradio.app/guides/building-mcp-server-with-gradio)\\n\\n= 3\\n    while divisor * divisor  1:\\n        factors.append(n_int)\\n    return factors\\n\\u0060\\u0060\\u0060\\n**3. Ensure that your MCP Client Supports SSE**\\nSome MCP Clients, notably [Claude Desktop](https://claude.ai/download), do not yet support SSE-based MCP Servers. In those cases, you can use a tool such as [mcp-remote](https://github.com/geelen/mcp-remote). First install [Node.js](https://nodejs.org/en/download/). Then, add the following to your own MCP Client config:\\n\\u0060\\u0060\\u0060\\n{\\n  \\u0022mcpServers\\u0022: {\\n    \\u0022gradio\\u0022: {\\n      \\u0022command\\u0022: \\u0022npx\\u0022,\\n      \\u0022args\\u0022: [\\n        \\u0022mcp-remote\\u0022,\\n        \\u0022http://your-server:port/gradio_api/mcp/sse\\u0022\\n      ]\\n    }\\n  }\\n}\\n\\u0060\\u0060\\u0060\\n**4. Restart your MCP Client and MCP Server**\\nSome MCP Clients require you to restart them every time you update the MCP configuration. Other times, if the connection between the MCP Client and servers breaks, you might need to restart the MCP server. If all else fails, try restarting both your MCP Client and MCP Servers!\\n---\\n\\nUse the \\u0022hf_doc_fetch\\u0022 tool to fetch a document from the library.\",\"uuid\":\"c6d50358-1375-4330-81dc-b7aa19f97c94\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":\"Hugging Face\",\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":{\"type\":\"text\",\"text\":\"# Documentation Library Search Results for \\u0022Claude Desktop MCP server configuration SSE transport\\u0022\\n\\nFound 2 results\\n## Results for Product: gradio (2 results)\\n\\n\\n### Results from [Mcp - Using Docs Mcp Guide](https://gradio.app/guides/using-docs-mcp)\\n\\nFor clients that support SSE (e.g. Cursor, Windsurf, Cline), simply add the following configuration to your MCP config:\\n\\u0060\\u0060\\u0060json\\n{\\n  \\u0022mcpServers\\u0022: {\\n    \\u0022gradio\\u0022: {\\n      \\u0022url\\u0022: \\u0022https://gradio-docs-mcp.hf.space/gradio_api/mcp/sse\\u0022\\n    }\\n  }\\n}\\n\\u0060\\u0060\\u0060\\nWe\\u0027ve included step-by-step instructions for Cursor below, but you can consult the docs for Windsurf [here](https://docs.windsurf.com/windsurf/mcp), and Cline [here](https://docs.cline.bot/mcp-servers/configuring-mcp-servers) which are similar to set up. \\nCursor \\n1. Make sure you\\u0027re using the latest version of Cursor, and go to Cursor \\u003E Settings \\u003E Cursor Settings \\u003E MCP \\n2. Click on \\u0027\\u002B Add new global MCP server\\u0027 \\n3. Copy paste this json into the file that opens and then save it. \\n\\u0060\\u0060\\u0060json\\n{\\n  \\u0022mcpServers\\u0022: {\\n    \\u0022gradio\\u0022: {\\n      \\u0022url\\u0022: \\u0022https://gradio-docs-mcp.hf.space/gradio_api/mcp/sse\\u0022\\n    }\\n  }\\n}\\n\\u0060\\u0060\\u0060\\n4. That\\u0027s it! You 