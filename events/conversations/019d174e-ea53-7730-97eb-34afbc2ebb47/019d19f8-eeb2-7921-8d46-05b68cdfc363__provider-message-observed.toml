text = "Done! Here's your universal Nexus prompt system:\n\n## 📋 Copy/Paste These (Save Somewhere Handy)\n\n**To check status:**\n```\nStatus check\n```\n\n**To update status:**\n```\nUpdate Nexus project status:\n- Phase: [your phase]\n- Last completed: [what finished]\n- What works: [working features]\n- Next up: [next tasks]\n- Blocked by: [blockers or \"none\"]\n```\n\n## How It Works\n\n1. **You update** → Claude uses MCP tool to write `project-status.md`\n2. **Any Claude reads** → Direct MCP resource access (no tools needed)\n3. **Everyone synced** → Desktop, Web, Android, Code all see same status\n\n## Test It Right Now\n\nTry saying: **\"Status check\"**\n\nI'll read the current status via MCP and show you it works!\n\n---\n\n**Files Created:**\n- `quick-start/update-status-template.md` - Instructions for Claude on parsing your updates\n- `quick-start/starter-prompts.md` - Quick reference guide (updated)\n\n**Token Usage:**\n- Last response: ~1,638 tokens\n- Session total: 60,204 tokens used\n- Remaining: 129,796 tokens (68.3% available)"

