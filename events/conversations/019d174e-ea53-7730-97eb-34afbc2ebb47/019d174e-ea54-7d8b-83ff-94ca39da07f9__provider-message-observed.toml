text = "Great! Now create the .env file with your Qdrant API key:\n\n## Step 5: Create .env File\n\n```bash\n# Create .env file (replace with your actual Qdrant API key)\nsudo tee .env > /dev/null <<'EOF'\nQDRANT_API_KEY=TlM1P0zLVQRxRhVN+SQ4lP/LepR46La1RSWSe5N2zCs=\nEOF\n\n# Verify (should show the key)\ncat .env\n```\n\n## Step 6: Start the Container\n\n```bash\ndocker compose -f docker-compose.nexus-mcp.yml up -d\n\n# Check that it started\ndocker ps | grep nexus-mcp\n\n# Watch the logs\ndocker logs nexus-mcp -f\n```\n\nLook for messages like:\n- `[FnMCP.Nexus] Transport: HTTP`\n- `[HttpServer] Starting HTTP server on port 18080`\n- `Now listening on: http://0.0.0.0:18080`\n\nPress Ctrl+C to stop watching logs once you see it's running.\n\nWhat do you see in the logs?\n\n---\n\n**Token Usage:**\n- Last response: ~248 tokens\n- Session total: 78,704 tokens used\n- Remaining: 111,296 tokens (58.6% available)"

