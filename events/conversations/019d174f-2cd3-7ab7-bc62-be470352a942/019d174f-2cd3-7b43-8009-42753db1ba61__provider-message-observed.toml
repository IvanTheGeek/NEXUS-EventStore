text = "Yes — **as a product concept, that is coherent**. The strongest version of your idea is:\n\n> **one personal messaging UI**\n> with\n> **multiple transports underneath**\n> and\n> **a per-contact / per-message routing choice**\n\nThat is a real architecture, not just a wish.\n\nThe main split is this:\n\n## What is solid in your design\n\n### 1. Unified conversation view\nYou can absolutely model “Bob” as one contact in your app, while the underlying messages come from different transports:\n\n- SMS\n- Signal/Molly\n- SimpleX\n\nThen show a merged timeline ordered by time, with each message tagged by transport. That part is conceptually straightforward.\n\n### 2. Per-contact defaults and per-message override\nAlso solid:\n\n- default route for Bob = Signal\n- fallback = SMS\n- optional manual override on a single message = SimpleX\n\nThat is basically a routing policy engine for messaging.\n\n### 3. Android SMS integration\nOn GrapheneOS/Android, replacing the SMS client with your own app is realistic because Android allows a default SMS app model. So your app can own that layer in a first-class way.\n\n### 4. SimpleX via a remote mailbox-style agent\nThis is also coherent as an overlay you control. It is **not how SimpleX is natively designed**, but it is a reasonable system you could build on top of it. SimpleX officially supports self-hosted SMP relay servers, and it also explicitly supports using your own servers while still talking to people on preset or other SimpleX servers. citeturn251973search0turn251973search12\n\n---\n\n## Where the design becomes hard\n\nThe hardest part is **Signal**.\n\nSignal still requires a phone number to register, even though usernames now let people connect without exposing that number in normal use. Signal’s own docs are explicit that you still need a phone number to sign up, and that linked devices are managed off the primary phone account. citeturn656298view0turn656298view1\n\nMolly is a Signal-compatible Android fork, and its docs say it can be used either with a separate registered number or as a linked device for the same Signal account. Molly also has MollySocket for privacy-friendly push delivery, but that is about notifications, not replacing Signal’s network or turning Signal into a federated system. citeturn675921search0turn675921search2turn675921search4\n\nSo the clean version is:\n\n- **SMS:** under your control on Android\n- **SimpleX:** under your control as an overlay or remote-agent system\n- **Signal/Molly:** only partly under your control, because you are still living inside Signal’s account and server model\n\nThat is the architectural asymmetry.\n\n---\n\n## The key truth\n\nYour app would not be “three equal backends.”\n\nIt would be more like:\n\n- **SMS** = native transport your app can own\n- **SimpleX** = open network your app can extend\n- **Signal/Molly** = external ecosystem your app can integrate with only as far as Signal’s model permits\n\nThat matters because it affects what you can really ship.\n\n---\n\n## So is your idea valid?\n\nYes. I would phrase it this way:\n\n### Your app is a **messaging orchestration client**\nnot a single messaging protocol.\n\nIts core model is:\n\n- **Person**\n- **Conversation**\n- **Endpoint(s)**\n- **Transport capability**\n- **Routing policy**\n- **Message event**\n\nThat is actually a very strong NEXUS-style graph.\n\nFor example:\n\n- Bob\n  - has SMS endpoint\n  - has Signal endpoint\n  - has SimpleX endpoint\n- preferred route = Signal\n- allowed fallback = SMS\n- no-video-over-SMS rule\n- local-only preference for some SimpleX chats\n\nThat is a clean model.\n\n---\n\n## What I would call the layers\n\n### 1. Identity layer\nWho is Bob across systems?\n\nThis is your reconciliation layer:\n- Bob’s phone number\n- Bob’s Signal identity\n- Bob’s SimpleX contact link\n\n### 2. Capability layer\nWhat is possible right now?\n\n- SMS available\n- Signal available\n- SimpleX available\n- attachments allowed?\n- large file allowed?\n- online/offline?\n- local relay reachable?\n\n### 3. Policy layer\nWhat should happen by default?\n\n- prefer Signal for Bob\n- prefer SimpleX for Alice\n- use SMS when encrypted transports unavailable\n- send large video via Signal, not SMS\n\n### 4. Projection layer\nWhat the human sees:\n\n- one merged timeline\n- visible source badges\n- maybe filters by transport\n- maybe a “send via” picker beside compose\n\nThat is the right decomposition.\n\n---\n\n## The one big design warning\n\nA merged thread can be incredibly useful, but it can also become confusing unless the UI makes the transport explicit.\n\nIf Bob gets:\n\n- one message by SMS\n- next by Signal\n- next by SimpleX\n\nyou need the thread to show that clearly, because those are not the same security, delivery, or identity guarantees.\n\nSo your timeline should probably display each message with a compact source marker like:\n\n- SMS\n- Signal\n- SimpleX\n\nand maybe also show security status or delivery semantics.\n\n---\n\n## What current products say about your approach\n\nSignal is clear that it offers large-file messaging and multi-device linking, but it remains a centralized Signal network account tied to phone-number registration. citeturn656298view2turn656298view0turn656298view1\n\nSimpleX is clear that self-hosting relays is supported, but seamless same-profile multi-device is intentionally limited. Their docs say linking mobile and desktop is supported, but full same-profile use across multiple devices is treated as a security tradeoff, and their current linked mode is more constrained than what you want. citeturn251973search1turn251973search3turn251973search4\n\nSo your design is basically:\n\n> take Signal’s UX strengths,\n> take Android’s SMS ownership,\n> take SimpleX’s open network properties,\n> then unify them in your own graph and UI.\n\nThat is a legitimate product direction.\n\n---\n\n## My honest assessment\n\n**Architecturally:** strong.  \n**As a personal or niche Android-first project:** very plausible.  \n**As a polished mainstream product:** hard, mostly because of Signal integration and identity reconciliation.\n\nThe strongest first version would be:\n\n1. Android app owns SMS\n2. Android app has native SimpleX-backed mailbox/hub support\n3. Signal/Molly is initially modeled as a companion-integrated channel rather than a fully controlled backend\n4. Unified thread view with explicit transport badges\n5. Per-contact defaults and per-message override\n\nThat would already be valuable.\n\nThe core idea is sound: **people do not think in transports; they think in conversations**. Your app would treat transports as implementation detail plus policy.\n\nIf you want, I’ll turn this into a clean NEXUS graph model with nodes, edges, policies, and projections."

