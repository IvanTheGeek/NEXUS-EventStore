[[body.segments]]
kind = "plain_text"
text = "The simplex android app is rather resource hungry (at least it was). I tried to get a friend to use it and she said it was just draining her battery. So i went back to signal, but it still has the centralization for the phone number. Even the username still requires a phone number to sign up. My attractions to signal is that it allows sending large files like videos, all part of the client. the  phone number and no federation is what is unattractive. Example: my 10 year old niece has a amazon fire tablet. She has the Facebook messenger for kids, but I rarely use Facebook or messenger. Signal used to incorporate SMS along with signal messages, using signal when it was an option between 2 parties. They removed that, and it made me very sad. My thought is that the way Molly (signal remapped) allows the primary account, but I use it from laptop, desktop, and 2 phones. all have the same messages once linked. SimpleX is attractive because I can setup my own relay or relays and be a part of the network. I was thinking that it would keep messages local to my relays but ok with it going out, it was more a resilience idea. If my own relays are available, then even with no outside internet, messages could still be exchanged within those I need to communicate with. having a server that IS the client to simplex and then my own comms between  my devices and that server instance is ok with me. Expanded idea would be to have an app that handled SMS, signal and this simplex and it would allow a combined view as a user and be able to select the type of message. It  would solve that issue with niece as she dows not need a phone number, which she does not have."

