kind = "plain_text"
text = "Your Penpot mastery guide for Event Model visualizations is ready. It covers the layer stacking system, solving parent-background obscuring issues, building reusable components with variants, choosing between boards and groups, establishing design systems with shared libraries, handling text sizing to prevent overflow, using the Plugin API for programmatic creation, and implementing Event Model slice components with step-by-step patterns."

[[body.segments]]
kind = "tool_use"
text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_use\",\"id\":null,\"name\":\"artifacts\",\"input\":{\"id\":\"compass_artifact_wf-2567f570-86ca-44ed-85e2-f012b8a3304f_text/markdown\",\"type\":\"text/markdown\",\"title\":\"Mastering Penpot for Event Model Visualizations: Layer Management and Component Design\",\"source\":\"c\",\"command\":\"create\",\"content\":\"# Mastering Penpot for Event Model Visualizations\\n\\n**Penpot\\u0027s layer system uses a bottom-to-top stacking model where elements higher in the layer panel appear on top visually, but the critical challenge for programmatic creation is ensuring parent containers don\\u0027t obscure their children\\u2014which requires careful structuring using background layers at the bottom of the stack, absolute positioning with z-index in Flex/Grid layouts, or separate background containers.** Components inherit properties from main components while allowing selective overrides, with variants enabling state switching that preserves text content when layer names match exactly. Boards serve as primary containers with clipping and layout capabilities, while groups provide lightweight organization without overhead. Text elements should use auto-height sizing mode in reusable components to prevent overflow issues. The Plugin API requires calling \\u0060appendChild()\\u0060 after creating each element to establish proper parent-child relationships, which is the most common source of rendering failures.\\n\\n## Understanding Penpot\\u0027s rendering architecture\\n\\nPenpot implements a fundamental bottom-to-top layer stacking model directly mapped from the Layers panel to visual rendering. **Layers higher in the panel list appear visually on top in the viewport**, creating an intuitive hierarchy where the panel order directly controls z-order. You can reorder layers by dragging them in the panel or using \\u0060Ctrl/\\u2318 \\u002B Up/Down\\u0060 arrows, with each adjustment immediately affecting visual stacking.\\n\\nThe platform introduces CSS z-index functionality specifically within Flex Layout and Grid Layout contexts, providing explicit control over overlapping elements while maintaining the underlying layer hierarchy. This creates an important distinction: **layers control design-time visual stacking in Penpot\\u0027s interface, while z-index controls runtime browser rendering behavior**\\u2014and these don\\u0027t always match due to CSS properties like transform, opacity, and filter creating new stacking contexts that override layer order. For reliable stacking in final output, particularly for modals, tooltips, and overlays, use z-index settings with high values like 500-1000 for overlays and 200-400 for dropdowns.\\n\\nEvery object in Penpot\\u0027s viewport is a layer\\u2014rectangles, ellipses, boards, or text boxes that build your design. **Boards act as high-level containers for content organization**, capable of containing other boards in nested structures, with first-level boards shown by default in View mode acting as screens or pages. Content clipping is optional per board, visually cutting off content that extends beyond boundaries when enabled, which proves essential for creating bounded components and maintaining design constraints.\\n\\n## Solving the parent background obscuring children challenge\\n\\nThe fundamental nesting challenge in Penpot centers on parent container backgrounds obscuring their children if not structured properly. **The most reliable solution uses background layers as siblings at the bottom of the layer stack within containers**, ensuring content elements placed above the background in the stack render on top. When creating a card component, place the background rectangle at the lowest position in the layer stack, then add content layers above it\\u2014this guarantees content renders on top because Penpot processes layers from bottom to top.\\n\\nFor more complex scenarios requiring absolute positioning, **create separate containers for background and content**. The outer container holds a background container (with fill or image) and a content container (with transparent background), using positioning or layouts to overlay them. The content container must have no fill to prevent obscuring its own children. This pattern provides maximum flexibility for complex interactions while maintaining visual layering integrity.\\n\\nFlex and Grid layouts enable the most sophisticated approach through z-index control. **Apply Flex or Grid Layout to the parent container, set background elements to absolute positioning with z-index: 1 or lower, and assign content elements z-index: 2 or higher**. Absolute positioned elements in Flex layouts are excluded from the flex flow, allowing them to sit behind static content without interfering with layout calculations. This pattern works exceptionally well for button components where a background shape sits behind centered text and icons in the flex flow.\\n\\nThe \\u0022Fix layer when scrolling\\u0022 option (sticky positioning) raises layers to the top of the stacking order, which caused reported community issues where background layers suddenly occluded content when Inspect mode activated in View mode. Only use sticky positioning for headers or navigation that should genuinely stay on top, never for static background effects. **Always preview designs in View mode to catch stacking issues before finalizing**, as the rendering context differs from design mode due to CSS stacking contexts.\\n\\n## Building reusable components with proper inheritance\\n\\nPenpot\\u0027s component system mirrors front-end component architecture with main components defining the source of truth and instances inheriting properties while allowing selective overrides. **Main components display a double diamond icon (\\u2B25\\u2B25) in the Layers panel, while instances show a single diamond (\\u2B25)**, making it easy to identify component relationships at a glance. Creating a component is straightforward\\u2014select any object or group, press \\u0060Ctrl/\\u2318 \\u002B K\\u0060, and it automatically appears in the Assets panel under the Local library section.\\n\\nThe inheritance model allows **main component changes to propagate automatically to all linked instances unless specific properties have been overridden** in individual instances. Overrides can include visual properties (fill colors, stroke styles, text content, shadows), layout properties (position, size, rotation, constraints), and even nested component swaps. The power lies in maintaining synchronization with the main component for most properties while customizing specific aspects per instance.\\n\\nComponent variants group related components with property-based switching, enabling designers to define properties like Color (Primary/Secondary), Size (S/M/L), and State (Default/Hover/Pressed/Disabled). **Variants preserve overrides when switching between states if three conditions are met**: layers share the same name, same type (rectangle, ellipse, text), and same hierarchy level. For a button variant where the text layer is consistently named \\u0022label\\u0022 across all variants, changing text content to \\u0022Submit\\u0022 in one variant maintains that content when switching to another variant while applying the new variant\\u0027s color and style properties.\\n\\nCreating variants from existing components requires selecting the main component, pressing \\u0060Ctrl/\\u2318 \\u002B K\\u0060 (or right-clicking for \\u0022Create variant\\u0022), which generates a variant area with purple border where variants arrange in Flex layout by default. **Name variants using the formula Property1=Value1 / Property2=Value2**, either through the Design panel dropdowns or directly in the Layers panel. Penpot automatically parses this naming structure into interactive properties, enabling quick switching in component instances through dropdown selections.\\n\\nThe override management system includes \\u0022Reset overrides\\u0022 (\\u0060Ctrl/\\u2318 \\u002B Shift \\u002B R\\u0060) to return instances to main component state, and \\u0022Update main from instance\\u0022 to push instance changes back to the main component\\u2014triggering update notifications if the main exists in a shared library. **When resetting overrides, be aware that currently ALL properties including Flex/Grid element sizing reset**, which is documented behavior that may affect responsive layouts.\\n\\n## Choosing between boards and groups strategically\\n\\nBoards and groups serve distinct purposes in Penpot\\u0027s organizational hierarchy, with boards functioning as high-level container layers designed for content organization and layout, while groups provide lightweight bundling for collective manipulation. **The critical technical difference centers on capabilities**: boards support content clipping, View mode visibility control, export as separate units, prototype connections, board-specific guides, Flex/Grid layouts, and establish their own coordinate systems\\u2014while groups offer none of these features but excel at simple organization, boolean operations, and maintaining minimal overhead.\\n\\n**When you apply Flex or Grid layout to any element, Penpot automatically converts or wraps it into a board** with layout properties. This conversion applies differently based on the target: boards receive layout properties directly, groups convert to boards with layout, and single layers get wrapped in a new board with layout where the original becomes a child. This automatic behavior makes boards essential for any responsive design using modern layout systems.\\n\\nContent clipping fundamentally distinguishes the two container types. Boards offer optional clipping via checkbox in the design panel\\u2014when enabled, any content extending beyond board boundaries gets visually clipped, proving essential for card-style elements, modals, or constrained designs. **Groups have no clipping capability whatsoever**, with content always visible regardless of bounds. The workaround involves using masking for clipping effects, though this applies to the entire group content rather than being a container property.\\n\\nThe recommended pattern for complex designs combines both strategically: **use boards for structure, layout, and boundaries, while using groups for organization within boards**. A card component would use a board as the root with Flex layout to control structure, contain groups for organizing icons plus labels or image plus caption combinations, and house individual design primitives as elements. This hybrid approach balances the capabilities boards provide for layout control against the lightweight performance groups offer for simple bundling.\\n\\nFor nested structures, boards within boards are fully supported and powerful, enabling patterns like modal boards inside main screen boards, card boards within dashboard boards, or header/footer boards inside page boards. **Each nested board maintains an independent coordinate system and can apply different layout types**, with nested boards hidden in View mode by default though configurable per board. Groups within groups similarly provide standard practice for icon components (multiple shape groups within icon group), complex illustrations (nested groupings for body parts), or organizational hierarchy creating folder-like structures in the layers panel.\\n\\n## Establishing design systems with shared libraries\\n\\nPenpot implements native W3C DTCG standard-compliant design tokens without requiring plugins, making it the first design tool with this capability built-in. Design tokens act as a single source of truth for design decisions, supporting color (hex, RGB, HSL), dimensions (size, spacing, radius, stroke width), sizing (width/height), spacing (gaps, padding, margins), border radius, opacity, rotation, stroke width, and font size. **Tokens support aliases using curly braces** like \\u0060{spacing.small}\\u0060 and mathematical operations like \\u0060{spacing.small} * 2\\u0060 for calculated values.\\n\\nToken sets organize tokens into logical groups with CSS-like cascade behavior where later sets override earlier ones. **Use folder names with slashes** like \\u0060Light/Global\\u0060 or \\u0060Light/Colors\\u0060 to create hierarchical organization, with the ability to enable or disable entire sets as needed. Themes provide multidimensional switching where multiple themes can be active simultaneously through theme groups categorizing as Mode (Light/Dark), Brand (A/B/C), or Platform (Web/App), with only one theme per group active at any time.\\n\\nAsset libraries form the organizational backbone of design systems, with each file having its own local library automatically storing main components when created. **Publish files as shared libraries** through File menu \\u2192 \\u0022Add as shared library\\u0022 or from the Libraries panel, making the file library available to your team. Other files connect to shared libraries through the Assets tab \\u2192 Libraries button, with the library appearing in the Assets panel under its name for easy drag-and-drop usage. Library updates trigger notifications in connected files, showing what changed and offering update or dismiss options.\\n\\n**Organize components using slash notation** in names like \\u0060Buttons/Primary/Large\\u0060 to create hierarchical structures in the Assets panel, or select multiple components and right-click \\u2192 \\u0022Group\\u0022 to bundle them together. This organizational strategy scales effectively for large design systems by keeping related components together and enabling quick filtering through the search functionality. The best practice involves creating separate libraries for different areas\\u2014colors library, typography library, icons library, components library\\u2014rather than one massive file, which improves organization, performance, and maintenance.\\n\\nTypography styles capture font family, size, weight, line height, letter spacing, text case, alignment, sizing mode, vertical alignment, decoration, and direction in a single reusable asset. Create typography styles from existing text by selecting the layer and clicking the \\u002B icon in the Typography section of the Design panel, or create from scratch in the Assets panel. **Name typography styles semantically** like \\u0022Heading/H1\\u0022, \\u0022Body/Regular\\u0022, \\u0022UI/Button\\u0022 rather than using font attributes, enabling consistent application across designs and team-wide understanding of purpose.\\n\\n## Handling text in components without overflow disasters\\n\\nText elements in Penpot support three sizing modes that fundamentally affect component behavior: **auto-height (width fixed, height grows with content), auto-width (height fixed, width grows with content), and fixed size (both dimensions locked)**. Auto-height proves most reliable for reusable components, particularly labels, buttons, and cards with variable text, as it prevents text overflow issues by expanding vertically to accommodate content. Fixed size should only be used when text length is guaranteed controlled, as content can overflow or be cut off with no visual indication.\\n\\nThe golden rule for text in components states: **use auto-height for variable text**. A button component with auto-height text where width is fixed or constrained by min/max values adapts seamlessly whether displaying \\u0022OK\\u0022 or \\u0022Submit Application\\u0022, while a button with fixed-height text causes overflow with long content. This sizing mode selection must happen before creating component variants, as it affects override behavior and responsiveness across all instances.\\n\\nLayer naming determines override preservation between component variants, making consistency critical for text elements. **All button variants must have text layers with identical names** like \\u0022label\\u0022 to enable switching variants while preserving text content overrides. If Variant A has a text layer named \\u0022label\\u0022 and Variant B has \\u0022buttonText\\u0022, switching between variants loses text content\\u2014requiring users to re-enter custom text every time they change states, which destroys usability.\\n\\nTypography styles should be applied rather than setting individual text properties, as styles update globally when changed and maintain consistency across all instances. **Overriding individual text properties like font or size in a component instance creates an override that blocks that instance from receiving future main component updates** to those properties. This creates maintenance nightmares where some instances update with design system changes while others remain locked to their overridden values, leading to inconsistency drift over time.\\n\\nText content overrides are always preserved when switching between component variants if connection conditions are met (same name, type, hierarchy), but color and styling properties update to match the new variant. **A button showing \\u0022Submit\\u0022 in blue (Primary variant) maintains \\u0022Submit\\u0022 text when switched to gray (Secondary variant), with only the color changing**. This behavior enables designers to customize text content per instance while maintaining design system control over visual properties.\\n\\nThe auto-height sizing mode must accommodate internationalization considerations, particularly text expansion in different languages. German requires approximately 30% additional space compared to English, Romance languages need about 20% more, and CJK languages prefer shorter line lengths. **Design components with flexible height from the start** rather than retrofitting later when localization requirements emerge, as changing sizing mode after creating variants breaks existing instances.\\n\\n## Programmatic creation with the Plugin API\\n\\nPenpot provides a Plugin API for programmatic element creation, running plugins in isolated iframes with message-based communication via the global \\u0060penpot\\u0060 object. **The API requires explicit permission declarations in manifest.json**, particularly \\u0060content:write\\u0060 for creating, modifying, or deleting shapes\\u2014methods return null if permissions are insufficient with no visible error message, causing silent failures that perplex developers.\\n\\nThe creation pattern follows a strict sequence: create the container first, create child elements second, set properties third, and **call appendChild() to establish parent-child relationships fourth**. This appendChild() call represents the most common source of rendering failures in programmatic creation\\u2014shapes created without being added to a parent may render incorrectly or not appear at all. The parent must exist before children are added, requiring top-down hierarchy construction.\\n\\n\\u0060\\u0060\\u0060javascript\\n// Correct creation pattern\\nconst board = penpot.createBoard();\\nboard.name = \\u0022Event Model\\u0022;\\nboard.width = 800;\\nboard.height = 600;\\n\\nconst slice = penpot.createRectangle();\\nslice.name = \\u0022Time Slice\\u0022;\\nslice.fills = [{fillColor: \\u0022#7EFFF5\\u0022}];\\nslice.borderRadius = 8;\\n\\n// CRITICAL: Establish parent-child relationship\\nboard.appendChild(slice);\\n\\u0060\\u0060\\u0060\\n\\nProperty setting must occur after creation but ideally before appendChild() when possible. For text elements specifically, **set properties in sequence: growType first (sizing behavior), then font properties (family, size, weight), then styling properties (fills, strokes)**. This ordering prevents property conflicts and ensures text renders correctly with proper dimensions.\\n\\nThe data model prefers omitting optional attributes rather than setting them to null, as attributes set to null may be filtered out during export/import operations. **Simply don\\u0027t set the fills property if you want no fill behavior** rather than explicitly setting \\u0060fills = null\\u0060. This approach maintains data integrity and prevents unexpected behavior during file operations.\\n\\nElements require proper parent-child relationships established through appendChild() to render correctly. **All shapes must be added to a parent container, typically a board**, before they appear properly in the viewport. Creating shapes without adding them to the hierarchy leaves them in limbo\\u2014technically created but not visually rendered or properly positioned in the layer panel. The validation system checks for these orphaned elements and may reject files with broken referential integrity.\\n\\nZ-index property application requires understanding stacking contexts created by CSS properties. Within Flex or Grid layouts, explicitly set z-index values rather than relying solely on layer panel order for predictable results. **Background elements should use absolute positioning with z-index: 1 or lower, while content elements use z-index: 2 or higher**, ensuring backgrounds sit behind content regardless of creation order or layer panel position.\\n\\n## Common pitfalls destroying rendering and usability\\n\\n**The most prevalent mistake involves not calling appendChild() to establish parent-child relationships**, leaving elements created but not properly connected to the document hierarchy. This manifests as elements that technically exist in the API but don\\u0027t appear in the viewport or layer panel, causing developers to believe creation failed when the issue is actually missing hierarchy connection. Every element must be added to a parent container through appendChild() or it remains orphaned.\\n\\nCreating children before parents exist represents another critical ordering error that causes undefined reference errors or null pointer exceptions. **The parent must be created and stored in a variable before any children are created and added to it**\\u2014attempting to add children to a not-yet-existing parent fails silently or throws errors depending on the execution context.\\n\\nSetting properties before element creation obviously fails, but **setting properties in the wrong order can also cause issues**, particularly for text elements where growType must be set before other dimensions to ensure proper sizing calculations. Typography properties should follow in sequence: font family, then font size, then styling properties like fills and strokes. This ordering matches the rendering engine\\u0027s property application sequence.\\n\\nMissing content:write permission causes completely silent failures where creation methods return null with no error message, no console warning, and no visual indication. **Always include content:write in manifest.json permissions array** and verify the permission was granted during plugin initialization. The Plugin API\\u0027s message-based architecture means permission checks happen server-side, requiring proper manifest configuration before any operations succeed.\\n\\nUsing fixed-size text in reusable components creates overflow disasters when text content exceeds the locked dimensions. **Fixed size mode cuts off text with no visual indication that content was truncated**, leaving users confused about why their text disappears. Auto-height mode prevents this entire class of problems by allowing text layers to expand vertically to accommodate any content length.\\n\\nLayer naming inconsistency between component variants breaks override preservation, particularly for text content. If one variant names its text layer \\u0022label\\u0022 while another uses \\u0022buttonText\\u0022, **switching between variants loses all text content overrides** because the layers aren\\u0027t recognized as connected despite being the same type and hierarchy level. Maintaining identical layer names across all variants ensures seamless state switching with preserved customizations.\\n\\nThe \\u0022Fix layer when scrolling\\u0022 sticky positioning option raises affected layers to the top of the stacking order, which causes backgrounds to suddenly obscure content when View mode or Inspect mode activates. **Use sticky positioning exclusively for headers and navigation that should remain on top**\\u2014never for background layers or static effects. Test all designs in View mode before finalization to catch these stacking context issues.\\n\\nBoards offer content clipping while groups don\\u0027t\\u2014assuming groups have clipping capability leads to designs where content unexpectedly extends beyond intended boundaries. **To clip content, use a board with clipping enabled rather than a group**, or apply masking as a workaround for group-based structures. This fundamental difference affects layout predictability and export results.\\n\\n## Implementing Event Model slice components\\n\\nFor Event Model visualizations requiring reusable slice components, **structure each slice as a board component with Flex column layout** serving as the root container. This board defines boundaries, enables clipping of overflow content, provides coordinate space for positioning, and supports responsive behavior through layout properties. Set the board dimensions to match your time slice width requirements, typically fixed width with auto or flexible height depending on whether slices must align.\\n\\nCreate the background layer as the first child at the bottom of the layer stack, using either a rectangle with gradient fills to show time progression, or a path for custom slice shapes. **Set this background as absolute positioned with z-index: 1 within the Flex layout context**, ensuring it sits behind all content elements without interfering with the flex flow calculations. This pattern allows events and labels to stack naturally in the flex column while the background provides visual context.\\n\\nBuild content structure as the second child, either as a nested board with Flex layout for complex event lists, or as groups for simpler event markers. Event items within slices should use **auto-height text layers named consistently** like \\u0022eventLabel\\u0022 across all variant states, enabling state switching (Normal/Highlighted/Selected) while preserving the actual event text content. Position these elements using static positioning so they participate in the flex flow, with gaps between items controlled by the container\\u0027s gap property.\\n\\nCreate component variants for different slice states\\u2014Normal, Active, Past, Future\\u2014using property naming like \\u0060State=Normal\\u0060, \\u0060State=Active\\u0060. **Ensure all variants maintain identical layer names and hierarchy** to preserve event text content when switching states. The Active state might use brighter colors and stronger shadows, Past state might use reduced opacity, and Future state might use subtle styling, but all variants must have the same text layer named \\u0022eventLabel\\u0022 at the same hierarchy level.\\n\\nFor programmatic creation, follow this sequence: create the board container and set its layout properties, create the background rectangle and set its absolute positioning with low z-index, create the content board or group for event items, create individual event text elements with auto-height sizing, then establish hierarchy through appendChild() calls working from parent to children. **Validate each creation step returns non-null before proceeding** to catch permission or API errors early.\\n\\nConfigure slice component properties to support override flexibility\\u2014text content should be easily customizable per instance, while colors and typography should inherit from design tokens and shared typography styles. **Add component annotations documenting maximum event count per slice, recommended text length limits, and state switching behavior** to guide other designers using these components in their Event Model mockups.\\n\\nApply constraints to child elements within slices to define resize behavior when the parent slice dimensions change. Events stacked vertically should use **top constraint for the first item, top constraint for middle items, and bottom constraint for the last item**, or use Flex layout\\u0027s built-in stretch and distribution properties to handle dynamic content gracefully. This ensures slices render correctly across different viewport sizes and time scale adjustments.\\n\\nTest slice components with extreme content scenarios: empty slices with no events, slices with single events, slices with maximum event counts, and slices with very long event labels. **Auto-height text prevents overflow disasters**, but verify that container constraints prevent slices from expanding infinitely and breaking the overall timeline layout. Set maximum height constraints on the content board if necessary.\\n\\nOrganize slice components in the Assets library using slash notation like \\u0060EventModel/Slices/Normal\\u0060, \\u0060EventModel/Slices/Highlighted\\u0060, or convert to variants with \\u0060State=Normal / State=Highlighted\\u0060. **Share the slice component library across your team** by publishing it as a shared library, enabling consistent Event Model visualizations across all project files with automatic updates when slice designs evolve.\",\"language\":null,\"md_citations\":[{\"url\":\"https://github.com/penpot/penpot-docs/blob/main/user-guide/layer-basics/index.njk\",\"uuid\":\"be920114-77b7-4c11-8415-33e0de33e3b9\",\"title\":\"GitHub\",\"sources\":[{\"url\":\"https://github.com/penpot/penpot-docs/blob/main/user-guide/layer-basics/index.njk\",\"uuid\":\"be920114-77b7-4c11-8415-33e0de33e3b9\",\"title\":\"penpot-docs/user-guide/layer-basics/index.njk at main \\u00B7 penpot/penpot-docs\",\"source\":\"GitHub\",\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"subtitles\":null,\"content_body\":null,\"resource_type\":null}],\"metadata\":{\"type\":\"generic_metadata\