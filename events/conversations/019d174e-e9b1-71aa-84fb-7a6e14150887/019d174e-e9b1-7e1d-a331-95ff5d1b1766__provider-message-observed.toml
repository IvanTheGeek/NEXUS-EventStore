 \\u002213\\u0022;\\n    nameText.fontWeight = \\u0022500\\u0022;\\n    nameText.fills = [{ fillColor: \\u0022#2c3e50\\u0022 }];\\n    nameText.x = x \\u002B 12;\\n    nameText.y = y \\u002B 28;\\n    parent.appendChild(nameText);\\n    \\n    // Add fields\\n    if (fields) {\\n        const fieldsText = penpot.createText(fields);\\n        fieldsText.fontFamily = \\u0022Monaco\\u0022;\\n        fieldsText.fontSize = \\u00229\\u0022;\\n        fieldsText.fills = [{ fillColor: \\u0022#6c757d\\u0022 }];\\n        fieldsText.x = x \\u002B 12;\\n        fieldsText.y = y \\u002B 48;\\n        parent.appendChild(fieldsText);\\n    }\\n    \\n    return component;\\n}\\n\\n// Now populate the existing slices with components\\nconst slice1X = 130;\\nconst slice1ContentY = 380;\\n\\n// Slice 1: Browse Products components\\naddComponent(\\u0022event\\u0022, \\u0022ProductListed\\u0022, \\u0022productId | name | price\\u0022, slice1X \\u002B 15, slice1ContentY, mainBoard);\\naddComponent(\\u0022readModel\\u0022, \\u0022ProductCatalog\\u0022, \\u0022products: list\\u0022, slice1X \\u002B 15, slice1ContentY \\u002B 85, mainBoard);\\naddComponent(\\u0022screen\\u0022, \\u0022Product Listing Page\\u0022, null, slice1X \\u002B 15, slice1ContentY \\u002B 170, mainBoard);\\n\\n// Slice 2: Search Products components  \\nconst slice2X = 540;\\nconst slice2ContentY = 380;\\n\\naddComponent(\\u0022event\\u0022, \\u0022ProductIndexed\\u0022, \\u0022searchTerms | tags\\u0022, slice2X \\u002B 15, slice2ContentY, mainBoard);\\naddComponent(\\u0022readModel\\u0022, \\u0022SearchResults\\u0022, \\u0022matches: list\\u0022, slice2X \\u002B 15, slice2ContentY \\u002B 85, mainBoard);\\naddComponent(\\u0022screen\\u0022, \\u0022Search Results Page\\u0022, null, slice2X \\u002B 15, slice2ContentY \\u002B 170, mainBoard);\\n\\n// Now let\\u0027s add the Shopping Cart Workflow\\nconst workflow2Y = 920;\\n\\n// Create Shopping Cart workflow header\\nconst workflow2Header = penpot.createRectangle();\\nworkflow2Header.name = \\u0022Shopping Cart Header\\u0022;\\nworkflow2Header.resize(1900, 50);\\nworkflow2Header.x = 100;\\nworkflow2Header.y = workflow2Y;\\nworkflow2Header.fills = [{ fillColor: \\u0022#2c3e50\\u0022 }];\\nworkflow2Header.borderRadius = 8;\\nmainBoard.appendChild(workflow2Header);\\n\\nconst workflow2Title = penpot.createText(\\u0022Shopping Cart Workflow\\u0022);\\nworkflow2Title.fontFamily = \\u0022Work Sans\\u0022;\\nworkflow2Title.fontSize = \\u002220\\u0022;\\nworkflow2Title.fontWeight = \\u0022600\\u0022;\\nworkflow2Title.fills = [{ fillColor: \\u0022#ffffff\\u0022 }];\\nworkflow2Title.x = 130;\\nworkflow2Title.y = workflow2Y \\u002B 15;\\nmainBoard.appendChild(workflow2Title);\\n\\n// Workflow 2 container\\nconst workflow2Container = penpot.createRectangle();\\nworkflow2Container.resize(1900, 650);\\nworkflow2Container.x = 100;\\nworkflow2Container.y = workflow2Y \\u002B 50;\\nworkflow2Container.fills = [{ fillColor: \\u0022#f8f9fa\\u0022 }];\\nworkflow2Container.borderRadius = 8;\\nworkflow2Container.borderRadiusTopLeft = 0;\\nworkflow2Container.borderRadiusTopRight = 0;\\nmainBoard.appendChild(workflow2Container);\\n\\n// Helper to create State Change slice structure\\nfunction createStateChangeSlice(name, x, y, parent) {\\n    // Slice container\\n    const container = penpot.createRectangle();\\n    container.name = name \\u002B \\u0022 Container\\u0022;\\n    container.resize(380, 550);\\n    container.x = x;\\n    container.y = y;\\n    container.fills = [{ fillColor: \\u0022#ffffff\\u0022 }];\\n    container.strokes = [{\\n        strokeColor: \\u0022#dee2e6\\u0022,\\n        strokeWidth: 2,\\n        strokeStyle: \\u0022solid\\u0022,\\n        strokeAlignment: \\u0022inner\\u0022\\n    }];\\n    container.borderRadius = 12;\\n    container.shadows = [{\\n        color: { color: \\u0022#000000\\u0022, opacity: 0.1 },\\n        offsetX: 0,\\n        offsetY: 4,\\n        blur: 6\\n    }];\\n    parent.appendChild(container);\\n    \\n