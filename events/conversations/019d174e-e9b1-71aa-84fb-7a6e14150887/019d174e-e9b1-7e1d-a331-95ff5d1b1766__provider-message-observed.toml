onents (Screen -\\u003E Command -\\u003E Event pattern)\\naddComponent(\\u0022screen\\u0022, \\u0022Product Detail Page\\u0022, null, 145, slice3.contentY, mainBoard);\\naddComponent(\\u0022command\\u0022, \\u0022AddItemToCart\\u0022, \\u0022cartId | productId | qty\\u0022, 145, slice3.contentY \\u002B 85, mainBoard);\\naddComponent(\\u0022event\\u0022, \\u0022ItemAddedToCart\\u0022, \\u0022cartId | productId | qty | price\\u0022, 145, slice3.contentY \\u002B 170, mainBoard);\\n\\n// Create View Cart slice (State View)\\nconst slice4X = 540;\\nconst slice4Y = workflow2Y \\u002B 80;\\n\\n// Create the View Cart slice container\\nconst viewCartContainer = penpot.createRectangle();\\nviewCartContainer.resize(380, 550);\\nviewCartContainer.x = slice4X;\\nviewCartContainer.y = slice4Y;\\nviewCartContainer.fills = [{ fillColor: \\u0022#ffffff\\u0022 }];\\nviewCartContainer.strokes = [{\\n    strokeColor: \\u0022#dee2e6\\u0022,\\n    strokeWidth: 2,\\n    strokeStyle: \\u0022solid\\u0022,\\n    strokeAlignment: \\u0022inner\\u0022\\n}];\\nviewCartContainer.borderRadius = 12;\\nmainBoard.appendChild(viewCartContainer);\\n\\n// Header for View Cart\\nconst viewCartHeader = penpot.createRectangle();\\nviewCartHeader.resize(380, 60);\\nviewCartHeader.x = slice4X;\\nviewCartHeader.y = slice4Y;\\nviewCartHeader.fills = [{ fillColor: \\u0022#f8f9fa\\u0022 }];\\nviewCartHeader.borderRadius = 12;\\nviewCartHeader.borderRadiusBottomLeft = 0;\\nviewCartHeader.borderRadiusBottomRight = 0;\\nmainBoard.appendChild(viewCartHeader);\\n\\nconst viewCartType = penpot.createText(\\u0022State View\\u0022);\\nviewCartType.fontFamily = \\u0022Work Sans\\u0022;\\nviewCartType.fontSize = \\u002212\\u0022;\\nviewCartType.fills = [{ fillColor: \\u0022#6c757d\\u0022 }];\\nviewCartType.x = slice4X \\u002B 15;\\nviewCartType.y = slice4Y \\u002B 15;\\nmainBoard.appendChild(viewCartType);\\n\\nconst viewCartName = penpot.createText(\\u0022View Cart\\u0022);\\nviewCartName.fontFamily = \\u0022Work Sans\\