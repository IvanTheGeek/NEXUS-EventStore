text = "a few preferences. I am not really concerned with the established translation and Third Party Integration patterns. We will explore those later when it makes sense to do so.\n\nI am currently leaning towards the penpot not being the source of truth so much, more focusing on the relevant code files  as being the source of truth more in line with the type driven design ideas. So not all code would be \"locked\" as SoT, just the ones that define the important domain/business information flows. \n\nWhile DDD (Domain Driven Design) IS being used in concept, Reference to DDD is not preferred. I am also not interested in \"Aggregates\" in any way. \nok, got a few issues."

