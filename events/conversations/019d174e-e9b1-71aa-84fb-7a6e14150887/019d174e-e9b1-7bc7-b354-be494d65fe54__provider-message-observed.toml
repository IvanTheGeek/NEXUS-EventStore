nt3Fields = penpot.createText(\\u0022cartId: Guid | productId: Guid | quantity: int | price: decimal\\u0022);\\nevent3Fields.fontFamily = \\u0022JetBrains Mono\\u0022;\\nevent3Fields.fontSize = \\u002210\\u0022;\\nevent3Fields.fontWeight = \\u0022400\\u0022;\\nevent3Fields.fills = [{ fillColor: \\u0022#6c757d\\u0022, fillOpacity: 1 }];\\nevent3Fields.x = slice3X \\u002B 25;\\nevent3Fields.y = componentStartY \\u002B 185;\\nmainBoard.appendChild(event3Fields);\\n\\n// Test scenarios for State Change (Given/When/Then)\\nconst test3Bg = penpot.createRectangle();\\ntest3Bg.resize(370, 110);\\ntest3Bg.x = slice3X \\u002B 15;\\ntest3Bg.y = componentStartY \\u002B 220;\\ntest3Bg.fills = [{ fillColor: colors.testBg, fillOpacity: 1 }];\\ntest3Bg.borderRadius = 8;\\ntest3Bg.strokes = [{\\n    strokeColor: colors.testBorder,\\n    strokeWidth: 1,\\n    strokeStyle: \\u0022solid\\u0022,\\n    strokeAlignment: \\u0022inner\\u0022,\\n    strokeOpacity: 1\\n}];\\nmainBoard.appendChild(test3Bg);\\n\\nconst test3Header = penpot.createText(\\u0022Given / When / Then Scenarios\\u0022);\\ntest3Header.fontFamily = \\u0022Work Sans\\u0022;\\ntest3Header.fontSize = \\u002212\\u0022;\\ntest3Header.fontWeight = \\u0022600\\u0022;\\ntest3Header.fills = [{ fillColor: \\u0022#856404\\u0022, fillOpacity: 1 }];\\ntest3Header.x = slice3X \\u002B 25;\\ntest3Header.y = componentStartY \\u002B 230;\\nmainBoard.appendChild(test3Header);\\n\\nconst test3Given = penpot.createText(\\u0022GIVEN: CartCreated cartId1\\u0022);\\ntest3Given.fontFamily = \\u0022JetBrains Mono\\u0022;\\ntest3Given.fontSize = \\u002210\\u0022;\\ntest3Given.fills = [{ fillColor: \\u0022#6c757d\\u0022, fillOpacity: 1 }];\\ntest3Given.x = slice3X \\u002B 25;\\ntest3Given.y = componentStartY \\u002B 250;\\nmainBoard.appendChild(test3Given);\\n\\nconst test3When = penpot.createText(\\u0022WHEN: AddItemToCart cartId1 prod1 2 29.99\\u0022);\\ntest3When.fontFamily = \\u0022JetBrains Mono\\u0022;\\ntest3When.fontSize = \\u002210\\u0022;