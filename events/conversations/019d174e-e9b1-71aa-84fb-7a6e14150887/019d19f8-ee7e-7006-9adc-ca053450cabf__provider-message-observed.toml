kind = "plain_text"
text = "Correct, the event model in general should not be implementation language dependent. One event model could be referenced and have multiple implementations in different programming languages or even technologies. So I could have an EventModel of a system that is in typescript or Haskell and use the EventModel to implement in F#. \nOK, as far as Penpot. I think you need some additional information on how it works. Lets have you do deep research on how the Penpot interface works and also deep learn on how design system work and especially how they relate to Penpot.  The resources at https://help.penpot.app/user-guide/ should help a bunch for Penpot specifics. \nFrom my understanding, the issues seeing the shapes is related to ordering.  On the second screenshot, I hide the layer of `Product Workflow` and boxes show up.  \nI think your previous attempt would have worked if the order of the layers were reversed. \nAlso, like how html nests tags, nesting in Penpot is usually done to the point of being able to create a group or component using groups and frames. So like an event will probably be a generic component, reused many times as instances with the text changed to represent the event name. \nAsk any questions, and do the deep dive to understand Penpot usage better."

