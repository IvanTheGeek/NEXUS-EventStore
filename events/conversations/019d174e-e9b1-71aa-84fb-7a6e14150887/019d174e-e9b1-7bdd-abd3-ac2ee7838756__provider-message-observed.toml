ce2Header.borderRadiusBottomLeft = 0;\\nslice2Header.borderRadiusBottomRight = 0;\\nboard.appendChild(slice2Header);\\n\\n// Screen component (gray) - comes first in State Change\\nconst screen2 = penpot.createRectangle();\\nscreen2.name = \\u0022Product Detail Screen\\u0022;\\nscreen2.resize(350, 50);\\nscreen2.x = 595;\\nscreen2.y = 310;\\nscreen2.fills = [{ fillColor: \\u0022#e9ecef\\u0022, fillOpacity: 1 }];\\nscreen2.borderRadius = 6;\\nboard.appendChild(screen2);\\n\\n// Command component (blue)\\nconst command2 = penpot.createRectangle();\\ncommand2.name = \\u0022AddItemToCart Command\\u0022;\\ncommand2.resize(350, 50);\\ncommand2.x = 595;\\ncommand2.y = 370;\\ncommand2.fills = [{ fillColor: \\u0022#a7c7e7\\u0022, fillOpacity: 1 }];\\ncommand2.borderRadius = 6;\\nboard.appendChild(command2);\\n\\n// Event component (orange)\\nconst event2 = penpot.createRectangle();\\nevent2.name = \\u0022ItemAddedToCart Event\\u0022;\\nevent2.resize(350, 50);\\nevent2.x = 595;\\nevent2.y = 430;\\nevent2.fills = [{ fillColor: \\u0022#ffb07c\\u0022, fillOpacity: 1 }];\\nevent2.borderRadius = 6;\\nboard.appendChild(event2);\\n\\n// Test scenarios (Given/When/Then for State Change)\\nconst test2 = penpot.createRectangle();\\ntest2.name = \\u0022Given/When/Then Test Scenarios\\u0022;\\ntest2.resize(350, 70);\\ntest2.x = 595;\\ntest2.y = 490;\\ntest2.fills = [{ fillColor: \\u0022#fff9e6\\u0022, fillOpacity: 1 }];\\ntest2.borderRadius = 6;\\ntest2.strokes = [{\\n    strokeColor: \\u0022#ffd43b\\u0022,\\n    strokeWidth: 1,\\n    strokeStyle: \\u0022solid\\u0022,\\n    strokeAlignment: \\u0022inner\\u0022,\\n    strokeOpacity: 1\\n}];\\nboard.appendChild(test2);\\n\\n// Module indicator\\nconst module2 = penpot.createRectangle();\\nmodule2.name = \\u0022Module: ShoppingCart.AddItem\\u0022;\\nmodule2.resize(350, 25);\\nmodule2.x = 595;\\nmodule2.y = 570;\\nmodule2.fills = [{ fillColor: \\u0022#dbe4ff\\u0022, fillOpacity: 1 }];\\nmodule2.borderRadius = 4;\\nboard.appendChild(module2);\\n\\n// Add a legend to explain the color coding\\nconst legend = penpot.createRectangle();\\nlegend.name = \\u0022Legend Container\\u0022;\\nlegend.resize(400, 180);\\nlegend.x = 1000;\\nlegend.y = 250;\\nlegend.fills = [{ fillColor: \\u0022#ffffff\\u0022, fillOpacity: 1 }];\\nlegend.borderRadius = 8;\\nlegend.strokes = [{\\n    strokeColor: \\u0022#dee2e6\\u0022,\\n    strokeWidth: 1,\\n    strokeStyle: \\u0022solid\\u0022,\\n    strokeAlignment: \\u0022inner\\u0022,\\n    strokeOpacity: 1\\n}];\\nboard.appendChild(legend);\\n\\n// Legend items\\nconst legendEvent = penpot.createRectangle();\\nlegendEvent.resize(30, 30);\\nlegendEvent.x = 1020;\\nlegendEvent.y = 270;\\nlegendEvent.fills = [{ fillColor: \\u0022#ffb07c\\u0022, fillOpacity: 1 }];\\nlegendEvent.borderRadius = 4;\\nboard.appendChild(legendEvent);\\n\\nconst legendCommand = penpot.createRectangle();\\nlegendCommand.resize(30, 30);\\nlegendCommand.x = 1020;\\nlegendCommand.y = 310;\\nlegendCommand.fills = [{ fillColor: \\u0022#a7c7e7\\u0022, fillOpacity: 1 }];\\nlegendCommand.borderRadius = 4;\\nboard.appendChild(legendCommand);\\n\\nconst legendReadModel = penpot.createRectangle();\\nlegendReadModel.resize(30, 30);\\nlegendReadModel.x = 1020;\\nlegendReadModel.y = 350;\\nlegendReadModel.fills = [{ fillColor: \\u0022#b8e7b1\\u0022, fillOpacity: 1 }];\\nlegendReadModel.borderRadius = 4;\\nboard.appendChild(legendReadModel);\\n\\nconst legendTest = penpot.createRectangle();\\nlegendTest.resize(30, 30);\\nlegendTest.x = 1020;\\nlegendTest.y = 390;\\nlegendTest.fills = [{ fillColor: \\u0022#fff9e6\\u0022, fillOpacity: 1 }];\\nlegendTest.borderRadius = 4;\\nboard.appendChild(legendTest);\\n\\nreturn {\\n    message: \\u0022Created working Event Model visualization using shapes only\\u0022,\\n    boardId: board.id,\\n    slicesCreated: [\\n        \\u0022Browse Products (State View pattern)\\u0022,\\n        \\u0022Add to Cart (State Change pattern)\\u0022\\n    ],\\n    components: {\\n        stateView: \\u