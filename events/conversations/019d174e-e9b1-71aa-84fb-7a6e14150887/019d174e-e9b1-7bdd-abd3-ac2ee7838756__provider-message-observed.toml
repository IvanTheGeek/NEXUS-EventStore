;\\nslice1.name = \\u0022Slice: Browse Products\\u0022;\\nslice1.resize(380, 360);\\nslice1.x = 180;\\nslice1.y = 250;\\nslice1.fills = [{ fillColor: \\u0022#ffffff\\u0022, fillOpacity: 1 }];\\nslice1.borderRadius = 12;\\nslice1.strokes = [{\\n    strokeColor: \\u0022#adb5bd\\u0022,\\n    strokeWidth: 2,\\n    strokeStyle: \\u0022solid\\u0022,\\n    strokeAlignment: \\u0022inner\\u0022,\\n    strokeOpacity: 1\\n}];\\nslice1.shadows = [{\\n    color: { color: \\u0022#000000\\u0022, opacity: 0.08 },\\n    offsetX: 0,\\n    offsetY: 2,\\n    blur: 8,\\n    spread: 0,\\n    hidden: false\\n}];\\nboard.appendChild(slice1);\\n\\n// Slice header to indicate type\\nconst slice1Header = penpot.createRectangle();\\nslice1Header.name = \\u0022State View Header\\u0022;\\nslice1Header.resize(380, 40);\\nslice1Header.x = 180;\\nslice1Header.y = 250;\\nslice1Header.fills = [{ fillColor: \\u0022#e8f4f8\\u0022, fillOpacity: 1 }];\\nslice1Header.borderRadius = 12;\\nslice1Header.borderRadiusBottomLeft = 0;\\nslice1Header.borderRadiusBottomRight = 0;\\nboard.appendChild(slice1Header);\\n\\n// Event component (orange)\\nconst event1 = penpot.createRectangle();\\nevent1.name = \\u0022ProductListed Event\\u0022;\\nevent1.resize(350, 50);\\nevent1.x = 195;\\nevent1.y = 310;\\nevent1.fills = [{ fillColor: \\u0022#ffb07c\\u0022, fillOpacity: 1 }];\\nevent1.borderRadius = 6;\\nboard.appendChild(event1);\\n\\n// Read Model component (green)\\nconst readModel1 = penpot.createRectangle();\\nreadModel1.name = \\u0022ProductCatalog Read Model\\u0022;\\nreadModel1.resize(350, 50);\\nreadModel1.x = 195;\\nreadModel1.y = 370;\\nreadModel1.fills = [{ fillColor: \\u0022#b8e7b1\\u0022, fillOpacity: 1 }];\\nreadModel1.borderRadius = 6;\\nboard.appendChild(readModel1);\\n\\n// Screen component (gray)\\nconst screen1 = penpot.createRectangle();\\nscreen1.name = \\u0022Product Listing Screen\\u0022;\\nscreen1.resize(350, 50);\\nscreen1.x = 195;\\nscreen1.y = 430;\\nscreen1.fills = [{ fillColor: \\u0022#e9e