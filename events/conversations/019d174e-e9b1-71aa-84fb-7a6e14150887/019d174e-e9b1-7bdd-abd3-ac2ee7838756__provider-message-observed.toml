ard.appendChild(testRect);\\n\\nreturn {\\n    message: \\u0022Diagnostic test performed\\u0022,\\n    textShapesFound: textShapes.length,\\n    textDiagnostics: textDiagnostics,\\n    testShapesCreated: {\\n        text: testText.id,\\n        rectangle: testRect.id\\n    },\\n    recommendation: \\u0022If the red rectangle appears but text doesn\\u0027t, we have a text rendering issue\\u0022\\n};\\n\"},\"message\":\"execute_code\",\"integration_name\":\"penpot\",\"integration_icon_url\":null,\"icon_name\":null,\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

