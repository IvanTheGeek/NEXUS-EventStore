                       \\u003Cdiv class=\\u0022component-fields\\u0022\\u003E\\n                                productId: Guid\\u003Cbr/\\u003E\\n                                name: string\\u003Cbr/\\u003E\\n                                price: decimal\\u003Cbr/\\u003E\\n                                category: string\\n                            \\u003C/div\\u003E\\n                        \\u003C/div\\u003E\\n                        \\n                        \\u003Cdiv class=\\u0022component read-model\\u0022\\u003E\\n                            \\u003Cdiv class=\\u0022component-label\\u0022\\u003ERead Model\\u003C/div\\u003E\\n                            \\u003Cdiv\\u003EProductCatalog\\u003C/div\\u003E\\n                            \\u003Cdiv class=\\u0022component-fields\\u0022\\u003E\\n                                products: Product list\\u003Cbr/\\u003E\\n                                categories: string list\\n                            \\u003C/div\\u003E\\n                        \\u003C/div\\u003E\\n                        \\n                        \\u003Cdiv class=\\u0022component screen\\u0022\\u003E\\n                            \\u003Cdiv class=\\u0022component-label\\u0022\\u003EScreen\\u003C/div\\u003E\\n                            \\u003Cdiv\\u003EProduct Listing Page\\u003C/div\\u003E\\n                        \\u003C/div\\u003E\\n                    \\u003C/div\\u003E\\n\\n                    \\u003Cdiv class=\\u0022test-scenarios\\u0022\\u003E\\n                        \\u003Cdiv class=\\u0022test-header\\u0022\\u003EGiven / Then Scenarios\\u003C/div\\u003E\\n                        \\u003Cdiv class=\\u0022test-case\\u0022\\u003E\\n                            \\u003Cdiv class=\\u0022test-step\\u0022\\u003E\\n                                \\u003Cstrong\\u003EGIVEN\\u003C/strong\\u003E\\n                                \\u003Cdiv class=\\u0022test-items\\u0022\\u003E\\n                                    ProductListed \\u0022Laptop\\