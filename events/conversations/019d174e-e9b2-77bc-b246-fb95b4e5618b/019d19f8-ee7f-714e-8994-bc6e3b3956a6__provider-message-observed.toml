\n    Error: obj option\n}\n\ntype JsonRpcError = {\n    Code: int\n    Message: string\n    Data: obj option\n}\n\n// Error codes as per JSON-RPC 2.0 and MCP spec\nmodule ErrorCodes =\n    let ParseError = -32700\n    let InvalidRequest = -32600\n    let MethodNotFound = -32601\n    let InvalidParams = -32602\n    let InternalError = -32603"

