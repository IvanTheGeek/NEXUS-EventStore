text = "i am being so particular about this because it is at the heart of Adam's Event Modeling. \n1. could also as whole loop be expressed \nAgent\r\n  ↓\r\nCommand\r\n  ↓\r\nEvent\r\n  ↓\n\rEvent\r\n  ↓\n\rView \n  ↓\r\nAgent\n\nbecause of the separation of the slices in points 2 & 3\nthe Event can be interpreted by many different View Slices. \nin 2. when you show this:\nCommand\r\n  ↓\r\nHandler\r\n  ↓\r\nEvent\n\nit causes friction because the slice is more like \nAgent\r\n  ↓\nTrigger/Signal\n  ↓\nCommand \n  ↓\r\nHandler\r\n  ↓\r\nEvent\n\nSame with 3. \nEvent\r\n  ↓\r\nProjection\r\n  ↓\r\nView  \n↓\r\nAgent\n\nagent is part of the slice. That Agent might be considered it own system as a UI frontend is its own system but still part of the slice, at least the representation of that system is in the Slice. For UI, it is usually a screen snapshot, for a processor or bot, just an icon. The Slice also ends up with the GWT in the very bottom section after the Events Row. Adam alot of times will even hide the Events and the Agent rows of the diagram for the ViewSlice and the next  CommandSlice will show the UI with the fields being used as input to the Command.   \n7. this might be where I am feeling pain, we are working in multiple modes, one for the EM diagram, the implimentation and the graph.\n8. Processors (agents) live outside the slices. > this causes friction to me. Yes they do, but they are represented in the EM diagram in the slice, same for events. \n12. this is also where the IntentCell and InterpretationCell ideas where getting formed instead of slice as a way to frame the Slice, but it might not work because the Agent and Event are in the slice or cell, but we have also talked that they are cells in themselves, so maybe cell=slice is not the right analogy. "

