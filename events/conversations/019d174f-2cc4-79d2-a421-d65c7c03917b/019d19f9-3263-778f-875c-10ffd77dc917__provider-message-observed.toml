text = "MVU has proven that functional UI CAN work. The model of MVU has always thrown me. I am considering that either renaming Elmish or building a new Event Modeling based   UI engine might work. So we have UI which would be the screen which is the Html or maybe at two levels, the Html code side and the running screen level. User action say then causes a Command. There would be a handler for that command, that produces event. An abstraction called storage stores that event. Storage can decide or be configured so that in the browser, it stores in memory, maybe local storage, maybe the DB in the browser, maybe one, or multiple, or all, etc. That pushes a projection which a View creates the data needed for the screen which renders the Html. So my EM Extended type of loop. Sort of renaming and refitting how Elmish works. If the running UI in the browser needs to update the business, it would be like the cmd in Elmish, which in EMUI would be like an external system or processor. Explore with me"

