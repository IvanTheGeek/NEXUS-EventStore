[[body.segments]]
kind = "plain_text"
text = "Use all chat histories, even outside the project. \nAs Bolero will be used for the GUI, the \"webview\" part will just be rendering the html and providing the user events like clicks and mouse moves. Razor is not planned to be used. In the way that Blazor Hybrid uses dotnet directly, is there a browser that would provide just enough to support my intended GUI methods and still be relativity small. Electron bundles the browser inside it which yields consistent rendering on each platform. I am wondering if that could be done in a way that is still small package sizes as one file, but work for linux, mac, windows, iOS and Android. \nAsk questions if needed."

