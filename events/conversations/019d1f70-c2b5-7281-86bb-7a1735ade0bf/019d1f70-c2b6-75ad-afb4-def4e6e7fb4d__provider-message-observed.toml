kind = "plain_text"
text = "Perfect — that clarifies it.\n\n`/usr/local/bin/codex` is the **CLI**, not the desktop app:\n\n```bash\n/usr/local/bin/codex -> ../lib/node_modules/@openai/codex/bin/codex.js\n```\n\nSo for the start menu, we need the **GUI app’s actual launcher file** inside your rebuilt `~/codex-desktop-linux/` folder.\n\nAlso, for the tutorial angle:\n\n- `which codex` = “what command will run if I type `codex`?”\n- `ls -l /usr/local/bin/codex` = “show me what that file really is, with details”\n- the `->` means “this is a symlink pointing to another file”\n\nNext step only: let’s find the GUI executable inside your rebuilt app folder.\n\nRun:\n\n```bash\nfind ~/codex-desktop-linux -maxdepth 3 \\( -type f -o -type l \\) -executable | sort\n```\n\nPaste the output."

