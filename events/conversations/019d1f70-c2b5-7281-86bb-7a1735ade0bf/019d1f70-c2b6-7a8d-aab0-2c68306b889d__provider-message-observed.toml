text = "Perfect — that confirms it.\n\n## What you have\n\n`/usr/local/bin/codex` is the **CLI launcher**, not a desktop app:\n\n```bash\n/usr/local/bin/codex -> ../lib/node_modules/@openai/codex/bin/codex.js\n```\n\nThat means:\n- typing `codex` in terminal runs the command-line tool\n- it will **not** make a start-menu entry by itself\n- your start-menu entry needs to point to the **GUI app** inside `~/codex-desktop-linux/`\n\nAlso, for the tutorial side:\n\n### What `ls -l` means\n`ls` = list files  \n`-l` = “long format,” which shows details like permissions, owner, size, and where a symlink points.\n\nSo:\n\n```bash\nls -l /usr/local/bin/codex\n```\n\nwas basically asking:\n\n> “Show me what this `codex` thing really is.”\n\nAnd it showed it is a symbolic link to a JavaScript launcher.\n\n---\n\n## Next step only\n\nWe need to find the actual executable file inside your rebuilt desktop app.\n\nRun this:\n\n```bash\nfind ~/codex-desktop-linux -maxdepth 3 -type f \\( -perm -111 -o -name \"*.AppImage\" -o -name \"*.sh\" \\) | sort\n```\n\n### What this does\n- `find` = search for files/folders\n- `-maxdepth 3` = don’t search too deeply\n- `-type f` = only files\n- `-perm -111` = files marked executable\n- `-o -name \"*.AppImage\"` = or AppImage files\n- `-o -name \"*.sh\"` = or shell scripts\n- `sort` = sort the results so they’re easier to read\n\nPaste the output, and then we’ll pick the correct file for the launcher."

