text = "Nice — that’s the clean setup done right 👍\n\nNow let’s do **startup**, the *correct Cinnamon way* (don’t rely on `.desktop` hacks like before).\n\n---\n\n# ✅ Step 1 — Use Cinnamon’s Startup Apps (best way)\n\nRun:\n\n```bash\ncinnamon-session-properties\n```\n\n---\n\n# ✅ Step 2 — Add new startup entry\n\nClick **Add**\n\nFill in:\n\n- **Name:**  \n  ```\n  JetBrains Toolbox\n  ```\n\n- **Command:**  \n  ```\n  /home/ivan/.local/bin/jetbrains-toolbox\n  ```\n\n- **Comment (optional):**  \n  ```\n  JetBrains Toolbox launcher\n  ```\n\nClick **Add**\n\n---\n\n# 🧠 Why this is better (important)\n\nYou *could* use:\n```ini\nX-GNOME-Autostart-enabled=true\n```\n\n…but:\n- It’s inconsistent across environments\n- Cinnamon sometimes ignores it or behaves weirdly\n- The GUI tool guarantees it’s registered correctly\n\n---\n\n# ⚠️ Optional (recommended): Add a delay\n\nToolbox sometimes behaves better if it starts **after the desktop settles**\n\nIn the Startup Apps window:\n- Select your entry\n- Click **Edit**\n- Add a delay of:\n  ```\n  10 seconds\n  ```\n\n---\n\n# ✅ Step 3 — Test it\n\nYou can test without rebooting:\n\n```bash\nkillall jetbrains-toolbox\n```\n\nThen run:\n\n```bash\ncinnamon-session-quit --logout --no-prompt\n```\n\nLog back in and confirm it auto-starts.\n\n---\n\n# 🧠 Bonus (fits your NEXUS thinking)\n\nYou now have:\n\n- **Immutable install location**\n- **Stable command (`~/.local/bin/...`)**\n- **External startup orchestration (not embedded config)**\n\nThat separation is exactly:\n```\nArtifact (binary)\nInterface (launcher)\nOrchestration (startup system)\n```\n\nClean boundaries 👍\n\n---\n\nIf you want next level:\n- auto-start minimized to tray  \n- manage startup via dotfiles / git  \n- or make this part of a full dev environment bootstrap  \n\nJust say 👍"

