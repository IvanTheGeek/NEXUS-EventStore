text = "That explains it.\n\nYour only `jetbrains-toolbox` binary is here:\n\n```bash\n/home/ivan/.local/share/Trash/files/jetbrains-toolbox-3.4.0.77112/bin/jetbrains-toolbox\n```\n\nSo the app is effectively in your **Trash**, not installed in a stable location. After reboot or cleanup, Cinnamon won’t reliably keep that launcher working.\n\n## What happened\n\nYou likely extracted Toolbox, ran it, then later moved or deleted that extracted folder. Your `.desktop` file still points at the old location or a location that never existed, and the only remaining copy is now in Trash.\n\n## Fix it cleanly\n\n### 1. Restore or re-extract Toolbox to a permanent location\n\nI’d use:\n\n```bash\nmkdir -p ~/.local/share/JetBrains\nmv ~/.local/share/Trash/files/jetbrains-toolbox-3.4.0.77112 ~/.local/share/JetBrains/Toolbox\n```\n\nThen verify:\n\n```bash\n~/.local/share/JetBrains/Toolbox/bin/jetbrains-toolbox\n```\n\nIf that launches, good.\n\n## 2. Put the launcher in the right place\n\nCreate or edit:\n\n```bash\n~/.local/share/applications/jetbrains-toolbox.desktop\n```\n\nUse this:\n\n```ini\n[Desktop Entry]\nVersion=1.0\nType=Application\nName=JetBrains Toolbox\nExec=/home/ivan/.local/share/JetBrains/Toolbox/bin/jetbrains-toolbox\nIcon=/home/ivan/.local/share/JetBrains/Toolbox/bin/toolbox.svg\nCategories=Development;\nTerminal=false\nStartupWMClass=jetbrains-toolbox\nStartupNotify=false\n```\n\n## 3. Make sure the desktop file is executable\n\n```bash\nchmod +x ~/.local/share/applications/jetbrains-toolbox.desktop\n```\n\n## 4. Refresh the menu\n\n```bash\nupdate-desktop-database ~/.local/share/applications\n```\n\nThen log out and back in, or restart Cinnamon.\n\n## About `%u`\n\n`%u` means “pass one URL or file argument to the program.” Toolbox does not need that for normal launching, so leave it out.\n\n## One thing to double-check\n\nAfter moving it, confirm the icon file actually exists:\n\n```bash\nls ~/.local/share/JetBrains/Toolbox/bin/\n```\n\nIf `toolbox.svg` is not there, use the full path to whatever icon file does exist, or temporarily remove the `Icon=` line to test menu visibility.\n\n## Small correction to my earlier path advice\n\nIn your case, the folder already contains:\n\n```bash\njetbrains-toolbox-3.4.0.77112/bin/jetbrains-toolbox\n```\n\nand when you move it to `~/.local/share/JetBrains/Toolbox`, the binary becomes:\n\n```bash\n~/.local/share/JetBrains/Toolbox/bin/jetbrains-toolbox\n```\n\nSo this is actually fine once the folder is moved intact.\n\nIf you paste the output of:\n\n```bash\nls -R ~/.local/share/JetBrains/Toolbox | head -50\n```\n\nI can sanity-check the exact final `.desktop` file."

