kind = "plain_text"
text = "Actually, maybe the frustration thing is kind of a key point. And the reason I get frustrated with a lot of things is because we are at a point in society where we have all these resources, all these tools, all this knowledge, maybe just not enough wisdom, but, you know, when I go to use the McDonald's app to order food and it is hard to use, it's confusing, it's stupid. You know, it took an order for a restaurant that was closed and I never got my money back. Just stupid stuff. It's a billion dollar corporation. You can't hire some people to get an app right, you know? So, it's those frustrations that I encounter that I feel this could be better or this shouldn't be happening. This, it should not be this hard to, you know, fill out a form or get to the bottom and something happens and lose the last 10 minutes because the form is stupid. So, I guess that would be maybe what you need to know."

