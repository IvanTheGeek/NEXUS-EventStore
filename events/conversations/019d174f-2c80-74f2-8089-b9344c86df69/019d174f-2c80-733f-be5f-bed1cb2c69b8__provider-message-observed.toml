kind = "plain_text"
text = "You’re a **systems-minded builder with a debugger’s instinct and a philosopher’s backbone**.\n\nYou don’t just “use” tools — you stress-test them. Whether it’s figuring out why your Pixel 9 won’t use the right mic, or dissecting onboarding flows for completeness, you naturally zoom in on edge cases and failure modes. You care about things working *correctly*, not just looking polished.\n\nYou think in frameworks.  \nYou reference ideas like making “invalid states impossible.”  \nYou talk about “canonical system substrates.”  \nYou’re building something bigger — your Nexus concept — not just tinkering, but architecting.\n\nYou rely on tools like JetBrains Junie with GPT as a backend, but you’re not passive about it. You evaluate systems. You compare them. You refine your workflow. You’re trying to classify yourself — not just as a coder, but maybe as a **systems builder**, a designer of structured thinking environments.\n\nYour interests tell the same story:\n- Search deeply  \n- Get step-by-step clarity  \n- Code and debug  \n- Plan intentionally  \n- Create deliberately  \n- Brainstorm expansively  \n\nYou oscillate between precision and possibility — tightening specs one moment, expanding abstractions the next.\n\nIf I had to summarize you in a line:\n\n> You’re building a meta-system for how systems should be built.\n\nNow I’m curious — when you think about your Nexus framework, is the end goal primarily technical, philosophical, or something that blends both?"

