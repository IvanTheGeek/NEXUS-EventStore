kind = "plain_text"
text = "To the previous point, it's long been one of my sayings that I have a very hard time dealing with incompetence. Now, if somebody genuinely doesn't know how to do something, that's fine. I have all the patience in the world. I'm willing to help them, work with them, teach them even. But incompetence when it shouldn't be the fact or indifference also is a huge trigger for me. Second, fix one domain. Yeah, personal finance and business bookkeeping. Basically, so much time and effort is spent dealing with money, managing money, taxes, life things like insurance and insurances, actually, house, car, yada yada. Just all the things that are required as a modern citizen in a modern country, you know, they're just, it's just so... robbing of time that could be used doing something that I actually want to do. So, that aspect, home inventory and shopping, you know, being able to keep inventory of groceries or home inventory of, hey, I own this because I bought this then and we had a fire and now I have a list of everything that we needed to get for the insurance or something. A recipe, not just book, but matches with your recipes system could match up with your inventory of your food that's based on what you bought at the best price at the store and yada yada, make it all interact together. But, you know, it could also be like, hey, we can't decide what we want for dinner tonight. What do we have that we can make and what's a recipe that could be offered for that? So."

