text = "First, to answer a previous question, yes, if I could only focus on this and make enough money, it would all depend on the money. If I made enough money to replace driving a truck, I would do it in a heartbeat. Second question, become fluent at writing F-sharp systems manually. No, I have, I can read F-sharp just fine. I can follow it. I understand the concepts. I have read and followed Scott Voschlin since 2010, his many of his videos and conference talks and his book, Domain Modeling Made Functional, you know, really convinced me of F-sharp and the type, the statically typed system and the strength of that and modeling with that idea. But as far as worrying about actually coding, no, I'm more interested in what needs to be built or what can be built, the problems it solves, and the interface and experience of doing that, the weather, well, and then how that program executes, like, you know, one code base can handle the web, the app, the whatever else ways that it's gonna run, the desktop."

