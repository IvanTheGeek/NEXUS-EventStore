text = "That event sourcing can work as the default and primary storage method in large systems. And as far as event modeling, having a method to create and design software, because while I'm not really a coder or a developer, I mean, I've tried since 2010 to be able to code F-sharp, and yeah, I can do it a little bit, but doing anything more than a page of code or, you know, a file of code has taken me so long because I get bogged down in actually doing the coding and figuring out what needs the commands are and all that kind of stuff, that it's just a waste of time. That's when I did a little quote-unquote vibe coding is when I realized that if I can provide a correct enough instruction set to the AI, it can do the code. So that's when the focus really turned to what are we building and what does it need to do, and simply making sure that what comes out the other end is what it's supposed to do."

