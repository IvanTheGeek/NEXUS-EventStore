text = "I'd be happy to help you continue building your plan for FnMCP.Penpot! To make sure I provide the most useful research, let me clarify a couple of things:\n\n1. **What specific aspects of the plan** do you need help with? For example:\n   - Architecture and design patterns for the integration?\n   - Implementation approach and tooling?\n   - Workflow for keeping Penpot designs in sync with code?\n   - Event modeling methodology and best practices?\n\n2. **Are you following a specific Event Modeling methodology** (like Adam Dymitruk's Event Modeling), or are you developing your own approach?\n\n3. **What's your primary technology stack** for the apps that will consume this library? (I'll check your GitHub repo, but knowing this upfront helps)\n\nOnce you clarify these points, I'll dive deep into researching your existing work, relevant Event Modeling patterns, Penpot integration strategies, and help you build out a comprehensive plan!"

