text = "Use the work I have completed so far at https://github.com/IvanTheGeek/FnMCP.Penpot to help be continue building a plan. Use the links and extend the research to help me figure out my plans. The primary goal is to be able to use penpot for the Source of Truth (SoT) for app GUIs but also as the EventModels. Secondary is to create my base event Repository that will be a library used in many apps and solutions. The event modeling context will also be reused to guide other apps and solutions."

