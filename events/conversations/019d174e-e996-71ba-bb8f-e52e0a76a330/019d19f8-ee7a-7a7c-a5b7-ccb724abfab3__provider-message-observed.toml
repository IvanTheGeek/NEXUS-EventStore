[[body.segments]]
kind = "reasoning"
text = "The user is asking about a \"research option\" but hasn't provided much context. They might be referring to:\n1. The Advanced Research feature in Claude (the product I'm in)\n2. A research option in some other tool or application\n3. Something else entirely\n\nGiven that they're asking me in Claude's chat interface, they're most likely asking about a feature in this product. Let me check if there's information about an \"Advanced Research\" or \"research\" feature in my instructions.\n\nLooking at my instructions, I see this in the search_instructions section:\n\n\"For queries requiring even more extensive research (e.g. complete reports with 100+ sources), provide the best answer possible using under 20 tool calls, then suggest that the user use Advanced Research by clicking the research button to do 10+ minutes of even deeper research on the query.\"\n\nSo there is indeed an \"Advanced Research\" feature that users can access by clicking a research button. It appears to be for more extensive research that would require 100+ sources and can run for 10+ minutes.\n\nHowever, I don't have detailed information about this feature in my instructions beyond that brief mention. According to my general_claude_info section, if I don't have explicit information about product features, I should encourage the person to check the Anthropic website or point them to support.claude.com for product questions.\n\nLet me provide a helpful response about what I know and direct them to where they can get more information."

[[body.segments]]
kind = "plain_text"
text = "I don't have detailed information about the Research feature in my current documentation. However, I can tell you that there appears to be an Advanced Research option available in Claude that allows for more extensive, in-depth research on complex topics - it can run for 10+ minutes and gather information from many more sources than a standard conversation response.\n\nFor specific details about how the Research feature works, what it can do, and how to use it, I'd recommend:\n\n1. Checking the Anthropic support site at **https://support.claude.com** \n2. Looking for a \"research button\" or similar option in the Claude interface you're using\n\nIs there a specific research task you're trying to accomplish? I might be able to help directly, or at least point you in the right direction!"

