kind = "plain_text"
text = "1. The visual representation of the model would be in penpot. There would be something that links each box to a specific F# type using the type driven development idea. For Human documentation I am thinking a forum type software. Would handle comments but also upgrade to a wiki that would be the spec for the item, with the type being the concrete. A product owner (me) could create the model in penpot directly using its visual tools. Update details in the forum area or in the code. The link would be bidirectional. Comments in pebpot could be linked into the forum as well and sources like discord. AI would be able to take ideas or workflows and create EventModels in penpot. I see EventModels in likeness to how accounting works: there are facts (domain events) that are the truth. Then there are ways to view that truth like financial accounting reports, tax accounting, inventory accounting, etc. Different views and transformations depending on the need. EventModels could be a similar where there are different views of the model, the depth and details depends on the user the needs they are using it for. \n2. Bidirectional\n3. Both, allows ai to read, manipulate and add to event models, GUI designs, etc."

