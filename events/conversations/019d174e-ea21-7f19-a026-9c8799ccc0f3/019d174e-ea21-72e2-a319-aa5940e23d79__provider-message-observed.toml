kind = "plain_text"
text = "The browser in memory needs every event. The events ARE how state for the ui is established. I am bringing the elmish model into this and trying to event modeling it. The state/model it uses would be actually a projection from the events. This provides time travel and the actual history of events that happened in the ui. I see it as from the screen, the command would actual not be a programming artifact but the real world action of \"user clicks button\" produces the button clicked event. That is real, recordable and in the event store, that pushes to the read model which trigger what Adam calls the automation/processor. The processor then knows that this button should trigger let's say a business command of \"purchase a dryer session\" which creates a expense made event with the details of a dryer purchase at $3 at location."

