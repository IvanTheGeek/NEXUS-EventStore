[[body.segments]]
kind = "reasoning"
text = "Right, Ivan is pulling me back to the core purpose. I got carried away with the diagnostic capabilities, but he's clarifying the primary use case first: the EM Viewer is for **planning and design** - viewing and interacting with the event model itself as a design artifact.\n\nThe diagnostic capabilities with user event streams is a \"spark for future iterations\" - not the initial focus.\n\nSo the viewer is:\n- Visualizing the event model (slices, swimlanes, events, commands, read models, processors)\n- Allowing different perspectives/filters (business layer, UI layer, implementation details)\n- Interactive design/planning tool\n- Keeping everything in sync as the design evolves\n\nThis is the core tool for building event models, not (yet) for debugging production issues."

[[body.segments]]
kind = "plain_text"
text = "Right, refocusing - the EM Viewer is primarily a **design tool** for building and understanding the event model, not a production debugging tool (though that capability is a future possibility).\n\n**Core purpose: Planning & Design**\n- Visualize the event model (slices, swimlanes, events, commands, read models, processors)\n- Toggle perspectives/filters to see different detail levels\n- Interactive editing of the model\n- Keep the model in sync with actual implementation\n\n**Key questions for the planning/design focus:**\n\n1. **Editing capabilities** - Can users modify the EM through the viewer (add events, rearrange slices, add processors), or is it read-only visualization of the actual implementation?\n\n2. **Sync direction** - Does the viewer:\n   - Generate from code (code is source of truth)?\n   - Drive code generation (model is source of truth)?\n   - Bidirectional sync?\n\n3. **Collaboration** - Multiple people viewing/editing the same model simultaneously? Or is it single-user focused initially?\n\n4. **Export/sharing** - Can you export static views (PDF, images) for stakeholder presentations, or is it always live/interactive?\n\nWhat's the source of truth - the event model definition or the implementation?"

