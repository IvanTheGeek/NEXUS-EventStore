text = "These ui processors should be fairly straight forward functions. My thoughts are that the ui itself is its own system and has its own event model. I think in elmish this would be like what it calls a command. For elmish a command is used for interaction outside the ui loop. But, if desired, in the event model viewer app, what is glossed over as the ui could be expanded into the view from the business layer/level and the event model expanded to include the ui model details desired. Because of the whole integration of my ecosystem, all aspects end up in one huge event model in one timeline."

