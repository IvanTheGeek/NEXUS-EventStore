kind = "plain_text"
text = "The events will be captured, it just depends on where. There will be an event store in the browser, even if just in memory for the session. Deciding if local storage or the db might be used as well for a bit more longer term option.Having it also store a copy in the \"server\" side may depend on who is running the server. If it is my own, I can have the stream stream server side as well no problem. If it someone else, I think this is where the opt in to sharing comes in. I deviate from Adam and Martin here. The whole event model will show the implantation, just that there will be the perspectives and filters that group or gloss over aspects, but those will be able to be toggled on. That is how I see it."

