[[body.segments]]
kind = "plain_text"
text = "\"living documentation and knowledge sharing system\" I had been thinking that the viewer was just a way to see and interact with the eventmodel  and a way to keep everything in sync. But your MCP integration adds a whole new dimension. If a user (or me for that matter) made MY own event history, it could be used to figure out what exactly happened to get me in the state I am at. So a user could choose to trust me with their exact history, the viewer bases on their data, and then tracing though to exactly the bug they are asking for help with could be determined why and how it got there. That should be a spark for future iterations."

