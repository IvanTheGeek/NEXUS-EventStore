[[body.segments]]
kind = "reasoning"
text = "That makes sense. The default would be the business-focused view (traditional EM), but then:\n\n1. Users can set preferences for what detail levels they want to see\n2. Users can choose specific filters they want active by default\n3. Option to resume from where they left off in their last session\n\nThis is treating the Event Model viewer itself as a stateful application with user preferences. Which, in Ivan's world, probably means:\n\n- Preferences are events themselves\n- \"UserSetDefaultFilter\", \"UserToggledUIDetail\", etc.\n- The viewer's own state is an event-sourced projection\n\nLet me focus on understanding:\n- How these preferences work\n- How the domain default is determined\n- Whether there are suggested/preset views for different roles/purposes"

[[body.segments]]
kind = "plain_text"
text = "That's a sensible UX approach - start with the business-focused view (what stakeholders need to see) but let power users customize and persist their viewing preferences.\n\n**Preference system implications:**\n\n1. **Domain defaults** - Set per bounded context/system. The \"Laundry\" domain might default to hiding UI details, while the \"EventModelViewer\" domain (self-hosted) might default to showing everything.\n\n2. **User preference persistence** - Stored where? Local storage? As events in the user's preference stream? Could be another opt-in to sync across devices if server-side.\n\n3. **Session resume** - \"Open where I left off\" means persisting:\n   - Active filters\n   - Expanded/collapsed sections\n   - Timeline position/zoom level\n   - Selected event for inspection\n\n**Role-based presets?**\n\nAre you thinking about having preset views like:\n- **Stakeholder view** - Business events only, glossed implementation\n- **Developer view** - Full detail, all layers\n- **QA view** - Focus on command→event validation\n- **Support view** - User actions + business outcomes, hide middleware\n\nOr is it purely free-form user customization?\n\nAnd presumably the viewer's own state/preferences would be event-sourced as well, right? \"UserToggledUILayer\", \"UserSetDefaultView\", etc.?"

