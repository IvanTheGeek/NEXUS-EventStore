kind = "plain_text"
text = "Git branches are lightweight pointers to commits. Here's how they work:\n\n**Core Mechanics**\n\nA branch is just a reference (stored in `.git/refs/heads/`) pointing to a specific commit SHA. When you create a branch, git creates a new pointer - it doesn't copy any files or commits.\n\n```fsharp\n// Conceptually:\ntype Branch = { Name: string; CommitSHA: string }\ntype HEAD = BranchRef of string | DetachedCommit of string\n```\n\n**HEAD** is a special pointer indicating your current position. Usually it points to a branch (which points to a commit), but can point directly to a commit (detached HEAD state).\n\n**Operations**\n\n- `git branch feature` - creates pointer named \"feature\" at current commit\n- `git checkout feature` - moves HEAD to point to \"feature\" branch\n- `git commit` - creates new commit, updates the branch pointer to new commit, parent is previous commit\n- `git merge` - creates commit with two parents, integrates histories\n\n**The Graph Structure**\n\nCommits form a directed acyclic graph (DAG). Each commit has:\n- Unique SHA\n- Parent commit(s) - zero for initial, one for normal, two+ for merges\n- Snapshot of entire project state\n- Metadata (author, message, timestamp)\n\nBranches don't contain commits - they just reference them. Multiple branches can point to the same commit. When you delete a branch, you're just removing the pointer; commits remain until garbage collected (if unreachable).\n\n**Divergence & Merging**\n\nWhen branches diverge:\n```\nA---B---C (main)\n     \\\n      D---E (feature)\n```\n\nMerging creates a commit with both C and E as parents, combining the changes.\n\nIs there a specific aspect of branching you're working with or trying to understand better?"

