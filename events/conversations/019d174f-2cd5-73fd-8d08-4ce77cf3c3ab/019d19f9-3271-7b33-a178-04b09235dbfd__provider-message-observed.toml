text = "Use this as your reusable prompt:\n\n```text\nArchive this chat to GitHub.\n\nRepository: IvanTheGeek/LOGOS-ChatGPT\nBranch: chat\nFormat: TOML\n\nCreate a new file for this archive.\nUse a timestamp-based file path.\n\nInclude only metadata that is actually available in the current chat context.\nDo not invent or guess metadata.\n\nInclude:\n- timestamp\n- repository\n- branch\n- source = \"ChatGPT\"\n- archive_mode = \"manual\"\n- user-provided title\n- user-provided tags\n- summary of the chat\n- limitations section\n- all chat turns currently available in context, in order\n\nFor metadata that is not actually available, explicitly mark it as unavailable in the file:\n- official_chat_id\n- official_chat_title\n- exact_api_payload\n- exact_token_usage\n- hidden_chain_of_thought\n\nUse this TOML structure:\n\n[meta]\ntimestamp = \"<timestamp>\"\nrepository = \"IvanTheGeek/LOGOS-ChatGPT\"\nbranch = \"chat\"\nsource = \"ChatGPT\"\narchive_mode = \"manual\"\ntitle = \"<title>\"\ntags = [\"<tag1>\", \"<tag2>\"]\n\n[availability]\nofficial_chat_id = false\nofficial_chat_title = false\nexact_api_payload = false\nexact_token_usage = false\nhidden_chain_of_thought = false\n\n[summary]\ntext = \"<summary>\"\n\n[limitations]\ntext = \"<what this archive does and does not include>\"\n\n[[turns]]\nrole = \"user\"\ncontent = \"\"\"...\"\"\"\n\n[[turns]]\nrole = \"assistant\"\ncontent = \"\"\"...\"\"\"\n\nTitle: <put title here>\nTags: [<put tags here>]\n```\n\nAnd here is a shorter everyday version:\n\n```text\nArchive this chat to GitHub in IvanTheGeek/LOGOS-ChatGPT on branch chat as a new TOML file.\n\nTitle: <title>\nTags: [<tag1>, <tag2>]\n\nInclude all chat turns currently available in context in order, plus summary, limitations, and only metadata that is actually available. Mark unavailable metadata explicitly as false.\n```\n\nOne refinement I would make for you: add your own manual chat title every time. That gives you something stable and searchable even though the official ChatGPT chat title is not reliably exposed."

