text = "# Read the uploaded mhtml file and try to extract visible text / title\r\npath = \"/mnt/data/NEXUS-Start-Here-The-Framework-at-the-Center-of-Everything-talkyard.ivanthegeek.com.mhtml\"\r\nimport os, re, html, sys\r\nprint(\"exists:\", os.path.exists(path), \"size:\", os.path.getsize(path) if os.path.exists(path) else None)\r\nwith open(path, \"rb\") as f:\r\n    data = f.read()\r\n\r\n# Try to decode as utf-8 with errors replaced\r\ntext = None\r\nfor enc in (\"utf-8\",\"latin-1\",\"cp1252\"):\r\n    try:\r\n        text = data.decode(enc)\r\n        # if contains typical mhtml header, break\r\n        if \"MIME-Version\" in text or \"Content-Type\" in text[:1000]:\r\n            break\r\n    except Exception as e:\r\n        continue\r\n\r\nif text is None:\r\n    text = data.decode(\"utf-8\", errors=\"replace\")\r\n\r\n# Try to extract the main HTML part: look for \"<html\" to \"</html>\"\r\nm = re.search(r\"(<html[\\s\\S]*?</html>)\", text, re.IGNORECASE)\r\nhtml_part = m.group(1) if m else text\r\n# Remove MIME headers if present at top\r\n# Extract title if present\r\ntitle_match = re.search(r\"<title[^>]*>(.*?)</title>\", html_part, re.IGNORECASE | re.DOTALL)\r\ntitle = html.unescape(title_match.group(1).strip()) if title_match else None\r\n\r\n# Extract visible text by stripping tags\r\ndef strip_tags(s):\r\n    s = re.sub(r\"(?s)<script.*?>.*?</script>\", \"\", s, flags=re.IGNORECASE)\r\n    s = re.sub(r\"(?s)<style.*?>.*?</style>\", \"\", s, flags=re.IGNORECASE)\r\n    s = re.sub(r\"<[^>]+>\", \"\", s)\r\n    s = re.sub(r\"\\s+\", \" \", s)\r\n    return s.strip()\r\n\r\nvisible_text = strip_tags(html_part)[:8000]  # limit\r\nlen_text = len(visible_text)\r\nprint(\"title:\", title)\r\nprint(\"visible text length:\", len_text)\r\nvisible_text[:1000]"

