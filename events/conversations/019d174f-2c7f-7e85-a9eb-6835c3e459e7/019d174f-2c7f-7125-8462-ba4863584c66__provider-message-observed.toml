text = "Short answer: **No, I can’t directly perform actions on external websites for you.**  \n\nI can’t:\n- Log into accounts  \n- Click buttons or submit forms  \n- Post on forums or social media  \n- Interact with live websites on your behalf  \n\n---\n\n### What I *can* do for you\n\nIf you're crafting a forum post, I can:\n\n- Write the full post in the exact format required  \n- Optimize it for engagement or SEO  \n- Match the tone of a specific community  \n- Structure it for technical, legal, or casual forums  \n- Create follow-up replies to anticipated responses  \n- Help you respond to comments after you post  \n\nIf you tell me:\n- The forum platform (e.g., Reddit-style, legal forum, trucking forum, etc.)\n- The audience\n- The goal (informational, persuasive, defensive, networking, etc.)\n- Any character limits or formatting rules  \n\nI can draft something that’s ready to copy-paste.\n\n---\n\nIf you want, tell me the forum and the objective, and we’ll craft something strategic instead of just a generic post."

