text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_fetch\",\"content\":[{\"type\":\"knowledge\",\"title\":\"\",\"url\":\"https://springfieldohio.gov/download/5349/?tmstv=1763167233\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"springfieldohio.gov\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=springfieldohio.gov\",\"site_name\":\"springfieldohio\"},\"is_missing\":false,\"text\":\"2025\\r\\nRhys Wilson\\r\\nZoneCo\\r\\n3/5/2025\\r\\nSpringfield Zoning Code\\nSpringfield Zoning Code\\r\\nFINAL DRAFT \\u2013 March 5, 2025\\r\\nTITLE One - Introductory Standards ...................................................................................................... 4\\r\\nCHAPTER 1101 - Legal Provisions ...................................................................................................... 4\\r\\nCHAPTER 1102 - General Provisions.................................................................................................. 5\\r\\nCHAPTER 1103 - Using the Code........................................................................................................ 6\\r\\nTITLE Two - Use Standards...................................................................................................................... 9\\r\\nCHAPTER 1104 - General Provisions.................................................................................................. 9\\r\\nCHAPTER 1105 - Land Use Terms and Definitions ........................................................................ 20\\r\\nCHAPTER 1106 - Use-Specific Standards......................................................................................... 38\\r\\nCHAPTER 1107 - Accessory Uses and Features Standards ........................................................... 56\\r\\nTITLE Three - District Standards ........................................................................................................... 72\\r\\nCHAPTER 1108 - General Provisions................................................................................................ 72\\r\\nCHAPTER 1109 - Residential Districts.............................................................................................. 76\\r\\nCHAPTER 1110 - Commercial Districts ............................................................................................ 81\\r\\nCHAPTER 1111 - Industrial Districts ................................................................................................ 87\\r\\nCHAPTER 1112 - Public and Institutional Districts ........................................................................ 90\\r\\nCHAPTER 1113 - Special Districts ..................................................................................................... 94\\r\\nTITLE Four - Site Development Standards .......................................................................................... 96\\r\\nCHAPTER 1114 - General Provisions................................................................................................ 96\\r\\nCHAPTER 1115 - Dimensional Regulations..................................................................................... 98\\r\\nCHAPTER 1116 - Parking and Loading.......................................................................................... 105\\r\\nCHAPTER 1117 - Landscaping......................................................................................................... 120\\r\\nCHAPTER 1118 - Site Lighting......................................................................................................... 129\\r\\nCHAPTER 1119 - Signs...................................................................................................................... 132\\r\\nCHAPTER 1120 - Screening and Fencing ....................................................................................... 168\\r\\nCHAPTER 1121 - Waste Management ............................................................................................ 176\\r\\nCHAPTER 1122 - Urban Design....................................................................................................... 177\\r\\nCHAPTER 1123 - Infill....................................................................................................................... 186\\r\\nCHAPTER 1124 - Animal Regulations ............................................................................................ 190\\nCHAPTER 1125 - Performance Standards ...................................................................................... 193\\r\\nTITLE Five - Procedural Standards ..................................................................................................... 197\\r\\nCHAPTER 1126 - General Provisions.............................................................................................. 197\\r\\nCHAPTER 1127 - Common Procedures .......................................................................................... 199\\r\\nCHAPTER 1128 - Entitlement and Pre-Development Procedures .............................................. 207\\r\\nCHAPTER 1129 - Site Development Procedures ........................................................................... 222\\r\\nCHAPTER 1130 - Relief Procedures ................................................................................................ 257\\r\\nTITLE Six - Nonconforming Standards............................................................................................... 269\\r\\nCHAPTER 1131 - General Provisions.............................................................................................. 269\\r\\nTITLE Seven - Enforcement Standards ............................................................................................... 274\\r\\nCHAPTER 1132 - General Provisions.............................................................................................. 274\\r\\nCHAPTER 1133 - Violation Noticing and Citation Tags .............................................................. 275\\r\\nCHAPTER 1134 - Penalties, Fines, and Remedies ......................................................................... 276\\r\\nTITLE Eight - Administrative Bodies .................................................................................................. 278\\r\\nCHAPTER 1135 - General Provisions.............................................................................................. 278\\r\\nCHAPTER 1136 - Quasi-Legislative Bodies and Personnel ......................................................... 278\\r\\nCHAPTER 1137 - City Administrative Bodies and Personnel..................................................... 278\\r\\nTITLE Nine - Definitions....................................................................................................................... 279\\r\\nCHAPTER 1138 - General Provisions.............................................................................................. 279\\r\\nCHAPTER 1139 - General Terms and Definitions ......................................................................... 279\\nTITLE ONE - INTRODUCTORY STANDARDS\\r\\nCHAPTER 1101 - Legal Provisions\\r\\n1101.01 Title \\r\\nThis Part shall be known and may be cited as the \\u201CZoning Code of the City of Springfield, \\r\\nOhio\\u201D, or as the \\u201CZoning Code\\u201D. \\r\\n1101.02 Effective Date\\r\\nThis Zoning Code shall become effective on Date1 2025.\\r\\n1101.03 Purpose and Intent\\r\\nThis Zoning Code is being enacted for the following reasons:\\r\\n(a) To promote and protect the public health, safety, comfort, and welfare of the residents of \\r\\nthe City of Springfield;\\r\\n(b) To protect the property rights of all individuals by assuring the compatibility of uses \\r\\nand practices within districts;\\r\\n(c) To facilitate the provision of public utilities and public services;\\r\\n(d) To provide for mixed use corridors and promote walkability; \\r\\n(e) To promote and enhance existing neighborhoods;\\r\\n(f) To produce affordably priced housing; \\r\\n(g) Lower barriers to development and redevelopment;\\r\\n(h) To promote safe streets where all modes are welcomed and safe; and\\r\\n(i) To achieve the goals of the City of Springfield\\u0027s Charter, the Ohio Revised Code, or \\r\\nunder common law rulings.\\r\\n1101.04 Applicability\\r\\n(a) Interpreted as Minimum Requirements. In their interpretation and application, the \\r\\nprovisions of this Zoning Code shall be held to be minimum requirements (unless a \\r\\nmaximum standard is established).\\r\\n1 Placeholder for effective date.\\n(b) Compliance Required. No building, structure, or land shall hereafter be used or \\r\\noccupied, and no building or structure or part thereof shall hereafter be erected, \\r\\nconstructed, reconstructed, moved, or altered, except in conformity with all of the \\r\\nregulations herein specified for the district in which it is located.\\r\\n1101.05 Severability\\r\\nShould any article, section, or provision of this Zoning Code be declared by a court of \\r\\ncompetent jurisdiction to be unconstitutional or invalid, such decision shall not affect the \\r\\nvalidity of this Zoning Code as a whole, or any part this Zoning Code other than the part so \\r\\ndeclared to be unconstitutional or invalid.\\r\\n1101.06 Conflicting Provisions\\r\\n(a) Repeal and Effect of Repeal. All Zoning Resolutions, maps, or parts thereof in conflict \\r\\nwith the provisions of this Zoning Code are hereby repealed. Except as expressly \\r\\nprovided in this Zoning Code, such repeal shall not affect or impair any act done, \\r\\noffense committed or right accrued, or liability, penalty, forfeiture, or punishment \\r\\nincurred prior to the time such repeal takes effect; the same may be enjoyed, asserted, \\r\\nenforced, prosecuted, or inflicted, as fully and to the same extent as if such repeal had \\r\\nnot been affected. \\r\\n(b) Conflict with State or Federal Regulations. If the provisions of this Zoning Code are \\r\\ninconsistent with those of the state or federal government, the more restrictive provision \\r\\nwill control, to the extent permitted by law.\\r\\n(c) Conflict with other City Regulations. If the provisions of this Zoning Code are \\r\\ninconsistent with one another, or if they conflict with provisions found in other adopted \\r\\nordinances, regulations of the City, or any proffers or conditions of approval, the more \\r\\nrestrictive provision will control unless otherwise expressly stated. \\r\\n(d) Conflict with Private Agreements and Covenants. This Zoning Code is not intended to \\r\\ninterfere with, abrogate, or annul any easement, covenant, deed restriction, or other \\r\\nagreement between private parties. The City does not enforce private covenants.\\r\\nCHAPTER 1102 - General Provisions \\r\\n1102.01 Rules of Interpretation\\r\\n(a) All references in this Zoning Code to other regulations or manuals refer to the most \\r\\ncurrent version and citation for those regulations or manuals, unless expressly indicated \\r\\notherwise. When the referenced regulations or documents have been repealed and not \\r\\nreplaced by other regulations or manuals, requirements within this Zoning Code for \\r\\ncompliance are no longer in effect.\\n(b) Illustrations, diagrams, and flowcharts are included in this Zoning Code to illustrate the \\r\\nintent and requirements of the text. In the case of a conflict between the text and any \\r\\nillustration, diagram, or flowchart, the text controls.\\r\\n(c) Section headings are provided for ease of use and organization and shall not be \\r\\ninterpreted as regulatory.\\r\\nCHAPTER 1103 - Using the Code\\r\\n1103.01 Overview\\r\\nThe following Section describes how information and regulations of this Zoning Code are \\r\\npresented. They provide a guide to the naming convention for zoning districts and a step-by \\r\\nstep guide for how to navigate and find information in the Zoning Code.\\r\\n1103.02 Using the Code\\r\\n(a) Step 1: Determine the Zoning District\\r\\n(1) Obtain the subject property\\u2019s zoning from the Official Zoning Map hosted on the \\r\\nCity\\u2019s website. \\r\\n(2) Take note of the zoning of properties abutting the subject property. \\r\\n(b) Step 2: Find the Development Context \\r\\n(1) Zoning districts are organized and grouped into district categories according to\\r\\ndevelopment context in the Zoning Code. \\r\\n(2) The first letter of the zoning district naming convention indicates the applicable \\r\\ndistrict category (development context). \\r\\n(3) The two letters following the hyphen in the zoning district naming convention \\r\\nindicate the summarizing characteristics, nature, or overarching development \\r\\npattern of the zoning district.\\r\\n(4) For example, if the subject property is zoned R-LD, the first letter, \\u201CR\\u201D in the zoning\\r\\ndistrict naming convention indicates the applicable development context \\u2013 in this \\r\\ncase, the Residential district category. The two letters following the hyphen, \\u201CLD\\u201D in \\r\\nthe zoning district naming convention indicates the overarching development \\r\\npattern \\u2013 in this case, low density residential development. \\r\\n(c) Step 3: Understand the Zoning District\\r\\n(1) Gain further understanding of the subject property\\u2019s applicable zoning by reviewing \\r\\nthe zoning district purpose statement found in TITLE Three - District Standards. \\n(2) For example, read link (Section 1109.02 Low Density Residential (R-LD) District), for \\r\\na description of the R-LD district. \\r\\n(d) Step 4: Identify Use Allowances \\r\\n(1) To find what uses are allowed on the subject property, select the interactive link to\\r\\nthe Table 1104.03.1: Use Table found in subsection (b) of the applicable zoning \\r\\ndistrict. \\r\\n(2) Once in Table 1104.03.1: Use Table, find whether a use is permitted by-right by staff\\r\\n(stylized as \\u201CP\\u201D), permitted as a limited use by staff (stylized as \\u201CL\\u201D), allowed as a \\r\\nconditional use via approval by the Board of Zoning Appeals (stylized as \\u201CC\\u201D), or \\r\\nprohibited in the applicable zoning district (stylized as blank). \\r\\n(3) All uses are listed in the first column of Table 1104.03.1: Use Table and the zoning \\r\\ndistrict categories and zoning districts are listed in the first two rows for the next 13 \\r\\ncolumns. \\r\\n(4) Allowed primary and accessory and temporary uses and the relevant parking \\r\\nrequirements are listed in the first column of Table 1104.03.1: Use Table and zoning\\r\\ndistricts are listed across the remaining table columns. \\r\\n(5) Table cell entries for each use indicate whether the use is allowed in the zoning\\r\\ndistrict or allowed subject to specific limitations, and/or subject to a specific review. \\r\\n(6) The last column of Table 1104.03.1: Use Table references the user to a particular \\r\\nuse\\u2019s applicable use-specific regulations. These regulations are contained within the \\r\\nCHAPTER 1106 - Use-Specific Standards of TITLE Two - Use Standards. In some \\r\\ncases, use limitations reference their applicability to certain zoning districts. \\r\\n(e) Step 5: Review the Applicable Dimensional Standards\\r\\n(1) To find out the dimensional standards (setbacks, height, lot size, etc.) on the subject \\r\\nproperty, review the dimensional standards table provided in subsection (c) of the \\r\\napplicable zoning district. \\r\\n(f) Step 6: Review the Site Development Standards\\r\\n(1) Review TITLE Four - Site Development Standards which includes standards that are \\r\\ngenerally applicable to all new development, regardless of the applicable zoning \\r\\ndistrict. \\r\\n(2) These standards address parking and loading, landscaping, site lighting, signs, \\r\\nurban design, basic performance standards, and similar standards to ensure \\r\\ndevelopment is constructed to the applicable zoning district\\u2019s intent and scale. \\r\\n(3) For example, the Parking and Loading chapter provides different parking \\r\\nconfigurations for certain development types (i.e., residential, commercial, etc.). \\n(g) Step 7: Understand the Procedural Standards and Enforcement\\r\\n(1) Review TITLE Five - Procedural Standards to gain an understanding of all \\r\\ndevelopment procedures applicable to new development as required by this Zoning \\r\\nCode. \\r\\n(2) The Title first identifies and summarizes all the review and decision-making bodies \\r\\nand their respective roles pertaining to a given development procedure as \\r\\nestablished in this Zoning Code. \\r\\n(3) The Title then describes common steps to all development procedures (i.e., noticing\\r\\nrequirements, provision for pre-application conference, etc.), and then describes the \\r\\nsteps required for each type of development procedure (i.e., site plan, conditional \\r\\nuse permit, rezonings, variances, etc.). \\r\\n(h) Step 8: Understand When Nonconforming Standards Apply\\r\\n(1) TITLE Six - Nonconforming Standards contains the rules for nonconforming and \\r\\ncompliant uses, structures, signs, and lots. \\r\\n(2) If a development is nonconforming, any redevelopment or new development must \\r\\nadhere to the standards of this Title.\\r\\n(i) Step 9: Know the Enforcement Protocol \\r\\n(1) Finally, TITLE Seven - Enforcement Standards contains general enforcement \\r\\nprovisions, including what constitutes a violation of the Zoning Code and the \\r\\nassociated penalties.\\r\\n(j) Step 10: Clarify any Uncertainty with the Definition Title\\r\\n(1) If there are any terms or phrases that are unclear, consult TITLE Nine - Definitions. \\nTITLE TWO - USE STANDARDS\\r\\nCHAPTER 1104 - General Provisions\\r\\n1104.01 Purpose and Applicability \\r\\nTable 1104.03.1: Use Table lists the uses permitted within all zoning districts. All uses are \\r\\ndefined in CHAPTER 1105 - Land Use Terms and Definitions. Approval of a use listed in this \\r\\nTitle, and compliance with the applicable use-specific standards for that use, authorizes that use \\r\\nonly. Development or use of a property for any other use not specifically allowed in this Title \\r\\nand approved under the appropriate process is prohibited.\\r\\n1104.02 Organization\\r\\nThe uses allowed in each of the zoning districts established in Table 1104.03.1: Use Table are \\r\\ndefined as follows:\\r\\n(a) Table Symbology. Table 1104.03.1: Use Table is arranged according to the following \\r\\nsymbols established in Table 1104.02.1: Use Table Symbology. \\r\\nTable 1104.02.1: Use Table Symbology\\r\\nSymbol Meaning Description\\r\\nP Permitted by-Right\\r\\nA \\u201CP\\u201D in a district column indicates that a use is \\r\\npermitted by right by staff. These uses are subject \\r\\nto all other applicable regulations of this Zoning \\r\\nCode.\\r\\nL Permitted as a Limited \\r\\nUse\\r\\nAn \\u201CL\\u201D in a district column indicates that a use is \\r\\npermitted by right by staff as a limited use, if it \\r\\nmeets the applicable use-specific standards. These \\r\\nuses are subject to all other applicable regulations \\r\\nof this Zoning Code.\\r\\nC Permitted as a Conditional \\r\\nUse\\r\\nA \\u201CC\\u201D in a district column indicates that a use \\r\\nrequires a conditional use permit subject to the \\r\\ndiscretion of the Board of Zoning Appeals. In \\r\\naddition to the conditions provided by the Board \\r\\nof Zoning Appeals, these uses may have applicable \\r\\nuse-specific standards provided in Chapter Use\\u0002Specific Standards, Accessory Uses, and \\r\\nTemporary Uses. All conditional uses are subject to \\r\\nall other applicable regulations of this Zoning \\r\\nCode. \\r\\nProhibited A blank cell in a district column indicates\\r\\nthat a use is prohibited in the district.\\nSymbol Meaning Description\\r\\n-- Not Required\\r\\nA \\u201C--\\u201D in a district column indicates that a\\r\\nminimum parking ratio is not required for a\\r\\nparticular use.\\r\\n(b) Standards Column. The \\u0022Standards\\u0022 column provides a reference to associated \\r\\nstandards for certain uses allowed by right and for conditional uses. Where a blank \\r\\nspace is in the column, there is no associated standard. Where there is information in the \\r\\ncolumn, there are associated standards. \\r\\n(c) Unlisted Uses. If a proposed use is not specifically listed in Table 1104.03.1: Use Table, \\r\\nthe Community Development Director shall determine whether the use is allowed or not \\r\\nallowed. This determination shall be based upon the similarity in nature and character \\r\\nto one or more uses that are listed in Table 1104.03.1: Use Table. \\r\\n(1) In making this determination, the Community Development Director may consider \\r\\nwhether the use has similar visual, traffic, environmental, parking, employment, and \\r\\nother impacts as an expressly listed use.\\r\\n(2) The Community Development Director may also refer to empirical studies or \\r\\ngenerally accepted planning or engineering sources (e.g., American Planning \\r\\nAssociation\\u2019s publication, \\u201CA Planner\\u2019s Dictionary\\u201D) in making this determination.\\r\\n(3) Unauthorized if Prohibited\\r\\nA. If the Community Development Director determines that a proposed use does \\r\\nnot fit within a given use type and is not functionally the same as an allowed, \\r\\naccessory, conditional, or temporary use, then the use is a prohibited use.\\r\\nB. The Community Development Director\\u2019s determination may be appealed \\r\\npursuant to Section 1130.04 . \\n1104.03 Use Table\\r\\nThe following uses may be permitted by-right, as a limited use, or by conditional use permit within the districts indicated as \\r\\nprovided in Table 1104.03.1: Use Table. In addition to these allowances, use-specific standards (CHAPTER 1106 - Use-Specific \\r\\nStandards) may apply.\\r\\nTable 1104.03.1: Use Table\\r\\nKey: \\r\\nP = By-Right \\r\\nAllowance \\r\\nL = Limited Use \\r\\nAllowance\\r\\nC = Conditional \\r\\nUse Allowance\\r\\nN/A = Not \\r\\nApplicable \\r\\nResidential Commercial Industrial Public and \\r\\nInstitutional\\r\\nMax. \\r\\nParking \\r\\nRatio\\r\\nUse\\u0002Specific \\r\\nStandards \\r\\nR-AG R-LD R-HD C-NC C-LC C-HC C-DT I-LI I-HI P-PR P-IE P-DM\\r\\nUse C E\\r\\nResidential Uses\\r\\nAdult Family \\r\\nHome C C C 5:1,000 sf 1106.01 (a)\\r\\nAdult Group Home C C C 5:1,000 sf 1106.01 (b)\\r\\nChildren\\u2019s \\r\\nResidential Center C C C C C 5:1,000 sf 1106.01 (c)\\r\\nConventional \\r\\nApartment P P P C\\r\\n2:1 BRU \\u002B\\r\\n3:2 BRU \\u002B\\r\\n4:3 BRU\\r\\nCottage Court C C C 2:DU 1106.01 (d)\\r\\nCourtyard \\r\\nApartment P L L C\\r\\n2:1 BRU \\u002B\\r\\n3:2 BRU \\u002B\\r\\n4:3 BRU\\r\\n1106.01 (e)\\r\\nEducational \\r\\nHousing P 5:1,000 sf\\nKey: \\r\\nP = By-Right \\r\\nAllowance \\r\\nL = Limited Use \\r\\nAllowance\\r\\nC = Conditional \\r\\nUse Allowance\\r\\nN/A = Not \\r\\nApplicable \\r\\nResidential Commercial Industrial Public and \\r\\nInstitutional\\r\\nMax. \\r\\nParking \\r\\nRatio\\r\\nUse\\u0002Specific \\r\\nStandards \\r\\nR-AG R-LD R-HD C-NC C-LC C-HC\\r\\nC-DT\\r\\nI-LI I-HI P-PR P-IE P-DM\\r\\nUse C E\\r\\nEmergency Shelter C C C C C 6:1,000 sf 1106.01 (f)\\r\\nFoster Home C C C 5:1,000 sf 1106.01 (g)\\r\\nFour-Unit Dwelling L L L 4:DU 1106.01 (h)\\r\\nGroup Home for \\r\\nChildren C C 5:1,000 sf 1106.01 (i)\\r\\nHalfway House \\r\\nFacility C C C 5:1,000 sf 1106.01 (j)\\r\\nHome for the \\r\\nAging P P 6:1,000 sf 1106.01 (k)\\r\\nLive-Work \\r\\nDwelling L L L L 4:1,000 sf 1106.01 (l)\\r\\nMain Street Mixed \\r\\nUse Building L L L L C C 8:1,000 sf 1106.01 (m)\\r\\nMulti-Unit \\r\\nDwelling L L L C 4:DU 1106.01 (n)\\r\\nNursing Home P P P C P 6:1,000 sf 1106.01 (o)\\r\\nOne-Unit Dwelling P P P N/