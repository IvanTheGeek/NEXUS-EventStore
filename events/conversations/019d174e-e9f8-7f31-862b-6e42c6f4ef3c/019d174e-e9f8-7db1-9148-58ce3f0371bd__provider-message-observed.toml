ufacturing\\r\\nC P P 3:1,000 sf\\r\\nMajor Utilities and \\r\\nPublic Service \\r\\nFacility\\r\\nP C C C C C C C P P C P C N/A 1106.02 (t)\\r\\nMicrobrewery C L P P P L P 8:1,000 sf 1106.02 (u)\\r\\nMicrodistillery C C P P P L P 8:1,000 sf 1106.02 (v)\\r\\nMineral Extraction C C N/A 1106.02 (w)\\r\\nMinor Utilities and \\r\\nPublic Service \\r\\nFacility\\r\\nC C C C N/A 1106.02 (x)\\r\\nNight Club C C C 10:1,000 \\r\\nsf\\r\\nOutdoor \\r\\nCommercial \\r\\nAmusement\\r\\nC C 50:acre 1106.02 (y)\\r\\nParking Facility C P C C C C N/A\\r\\nPassive \\r\\nPark/Recreational \\r\\nFacilities\\r\\nP P P P P P N/A\\r\\nPawnbroker L L 5:1,000 sf 1106.02 (z)\\nKey: \\r\\nP = By-Right \\r\\nAllowance \\r\\nL = Limited Use \\r\\nAllowance\\r\\nC = Conditional \\r\\nUse Allowance\\r\\nN/A = Not \\r\\nApplicable \\r\\nResidential Commercial Industrial Public and \\r\\nInstitutional\\r\\nMax. \\r\\nParking \\r\\nRatio\\r\\nUse\\u0002Specific \\r\\nStandards \\r\\nR-AG R-LD R-HD C-NC C-LC C-HC\\r\\nC-DT\\r\\nI-LI I-HI P-PR P-IE P-DM\\r\\nUse C E\\r\\nPersonal Services P P P P P 5:1,000 sf\\r\\nProfessional Office P P P P P P P 4:1,000 sf\\r\\nReligious Land Use L L L L P P P P P 8:1,000 sf 1106.02 (aa)\\r\\nRestaurant L P P L L P 10:1,000 \\r\\nsf 1106.02 (bb)\\r\\nRetail Store L P P P P P 8:1,000 sf 1106.02 (cc)\\r\\nSalvage Yard L N/A 1106.02 (dd)\\r\\nSelf-Storage Facility C L P C N/A 1106.02 (ee)\\r\\nSexually Oriented \\r\\nBusiness C C 8:1,000 sf 1106.02 (ff)\\r\\nSolid Waste \\r\\nTransfer Station C N/A\\r\\nTechnical School C P P P P P 6:1,000 sf\\r\\nTransportation \\r\\nFacility P C C P C C C N/A\\r\\nUrban Farm C C C C C C C C C N/A 1106.02 (gg)\\r\\nVeterinarian \\r\\nFacility C L P P P 4:1,000 sf 1106.02 (hh)\\r\\nWarehouse P P 2:1,000 sf\\r\\nWholesale and \\r\\nDistribution P P 2:1,000 sf\\r\\nAccessory and Temporary Uses\\nKey: \\r\\nP = By-Right \\r\\nAllowance \\r\\nL = Limited Use \\r\\nAllowance\\r\\nC = Conditional \\r\\nUse Allowance\\r\\nN/A = Not \\r\\nApplicable \\r\\nResidential Commercial Industrial Public and \\r\\nInstitutional\\r\\nMax. \\r\\nParking \\r\\nRatio\\r\\nUse\\u0002Specific \\r\\nStandards \\r\\nR-AG R-LD R-HD C-NC C-LC C-HC\\r\\nC-DT\\r\\nI-LI I-HI P-PR P-IE P-DM\\r\\nUse C E\\r\\nAccessory Building L L L P P P P P P P P N/A 1107.04 \\r\\nAccessory \\r\\nDwelling Unit L L 1/DU 1107.05 (a)\\r\\nAlternative Energy \\r\\nSystem L L L L L L L L L L L L L N/A 1107.05 (b)\\r\\nATM L P P L L P N/A 1107.05 (c)\\r\\nCargo Containers C C N/A 1107.05 (d)\\r\\nCharitable \\r\\nDonation Container L L L L L L L L L L N/A 1107.05 (e)\\r\\nDrive-Thru Facility L L L N/A 1107.05 (f)\\r\\nFueling and \\r\\nCharging Services C C C C C L C C C C C C C N/A 1107.05 (g)\\r\\nGarage or Yard \\r\\nSales L L L\\r\\nHome Occupation L L L L L N/A 1107.05 (h)\\r\\nMobile Food \\r\\nService C C C C C C C C C C\\r\\nOutdoor Dining L L L N/A 1107.05 (i)\\r\\nOutdoor Storage C L L P C C N/A 1107.05 (j)\\r\\nPersonal \\r\\nSwimming Pool P P P P N/A\\r\\nPrivate Kennel C C N/A\\nKey: \\r\\nP = By-Right \\r\\nAllowance \\r\\nL = Limited Use \\r\\nAllowance\\r\\nC = Conditional \\r\\nUse Allowance\\r\\nN/A = Not \\r\\nApplicable \\r\\nResidential Commercial Industrial Public and \\r\\nInstitutional\\r\\nMax. \\r\\nParking \\r\\nRatio\\r\\nUse\\u0002Specific \\r\\nStandards \\r\\nR-AG R-LD R-HD C-NC C-LC C-HC\\r\\nC-DT\\r\\nI-LI I-HI P-PR P-IE P-DM\\r\\nUse C E\\r\\nPrivate Utility C C C C C C C C C C C C C N/A\\r\\nType A Family \\r\\nChild Care Home C C C C N/A\\r\\nType B Family \\r\\nChild Care Home C C C C N/A\\r\\nVertiport L L C C L L C L L N/A 1107.05 (k)\\r\\nWalk-Up Window L L L L L N/A 1107.05 (l)\\nCHAPTER 1105 - Land Use Terms and Definitions\\r\\n1105.01 Residential Uses\\r\\n(a) A Uses\\r\\n(1) Adult Family Home\\r\\nA residence or facility that provides accommodations to three (3) to five (5) unrelated \\r\\nadults and provides supervision and personal care services to at least three (3) of \\r\\nthose adults, and is licensed according to the provisions of Chapter 3722 of the Ohio \\r\\nRevised Code.\\r\\n(2) Adult Group Home\\r\\nA residence or facility that provides accommodations to six (6) to 16 unrelated adults \\r\\nand provides supervision and personal care services to at least three (3) of the \\r\\nunrelated adults, and is licensed according to the provisions of Chapter 3722 of the \\r\\nOhio Revised Code.\\r\\n(b) B Uses (Reserved)\\r\\n(c) C Uses\\r\\n(1) Children\\u2019s Residential Center\\r\\nA use as defined in Ohio Admin. Code 5101:2-1-01(B)(71), as amended.\\r\\n(2) Conventional Apartment\\r\\nA residential building or group of buildings arranged, intended, and designed to be \\r\\noccupied by twelve or more households living independently of each other, and \\r\\neach including its own separate kitchen and bathroom accommodations.\\r\\n(3) Cottage Court\\r\\nA group of small, detached one- and two-unit dwellings located on one lot arranged \\r\\naround a shared court visible from the street.\\r\\n(4) Courtyard Apartment\\r\\nA medium-to-large sized detached dwelling arranged, intended, and designed to be \\r\\noccupied by twelve or more households living independently of each other, and \\r\\neach including its own separate kitchen and bathroom accommodations, oriented \\r\\naround a courtyard or series of courtyards.\\r\\n(d) D Uses (Reserved) \\r\\n(e) E Uses\\r\\n(1) Educational Housing\\nZoning Code Page 21\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 21\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nA building or group of buildings in which housing is provided for individual \\r\\nstudents and faculty under the general supervision or regulation of an accredited \\r\\ncollege or university and as distinguished from an apartment, hotel, motel, or \\r\\nrooming house. Educational Housing may include facilities such as a commissary, \\r\\nsnack bar, lounge, and study area, dining halls, and accessory kitchen, recreation \\r\\nfacilities, and laundry, provided that these facilities are for the benefit and use of the \\r\\noccupants and their guests and not open to the general public. Examples of \\r\\nEducational Housing include but are not limited to Fraternity/Sorority Homes, \\r\\nDormitories, Faculty Flats, and the like.\\r\\n(2) Emergency Shelter \\r\\nThose uses as defined in Ohio Admin. Code 5101:2-1-01(B)(114-115), as amended.\\r\\n(f) F Uses\\r\\n(1) Foster Home \\r\\nA use as defined in Ohio R.C. Ch. 5103.02(D), as amended.\\r\\n(2) Four-Unit Dwelling \\r\\nA detached dwelling arranged, intended or designed to consist of four dwelling \\r\\nunits on one lot.\\r\\n(g) G Uses\\r\\n(1) Group Home for Children \\r\\nA use as defined in Ohio Admin. Code 5101:2-1-01(B)(138-139), as amended.\\r\\n(h) H Uses\\r\\n(1) Halfway House Facility \\r\\nA use as defined in Ohio R.C. Ch. 5120.102(D), as amended.\\r\\n(2) Home for the Aging \\r\\nA use as defined in Ohio R.C. Ch. 3721.01(A)(8), as amended.\\r\\n(i) I Uses (Reserved)\\r\\n(j) J Uses (Reserved)\\r\\n(k) K Uses (Reserved)\\r\\n(l) L Uses (Reserved)\\r\\n(1) Live-Work Dwelling \\r\\nA dwelling unit that is also used for work purposes, provided that the \\u0022work\\u0022 \\r\\ncomponent is restricted to limited intensity such as a professional office, artist\\u0027s \\nZoning Code Page 22\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 22\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nworkshop, studio, or other similar uses, is located on the street level, and the \\r\\nresidential unit is occupied by the owner or manager of the \\u0022live\\u0022 component. The \\r\\n\\u0022live\\u0022 component may be located on the street level (behind the work component) or \\r\\nany other level of the building.\\r\\n(m)M Uses\\r\\n(1) Main Street Mixed Use Building\\r\\nA small-to-medium-sized, low-to-mid-rise building with two or more different uses \\r\\nsuch as residential, office, retail, public, or entertainment uses. No residential use \\r\\nshall be allowed on the ground floor of a Main Street Mixed-Use Building. Example \\r\\nfloor space configurations include but are not limited to:\\r\\n\\u2022 Ground floor retail, restaurant, or office storefronts with second floor \\r\\napartment lofts;\\r\\n\\u2022 A three-floor building with retail on the ground floor, office on the second \\r\\nfloor, and apartment/condo units on the third floor.\\r\\n(2) Multi-Unit Dwelling\\r\\nA detached dwelling arranged, intended or designed to consist of five (5) to twelve \\r\\n(12) dwelling units on one lot.\\r\\n(n) N Uses\\r\\n(1) Nursing Home\\r\\nA use as defined in Ohio R.C. Ch. 3721.01(A)(6) and Ohio Admin. Code 3701-16-\\r\\n01(W), as amended.\\r\\n(o) O Uses\\r\\n(1) One-Unit Dwelling\\r\\nA detached dwelling arranged, intended or designed to consist of one dwelling unit \\r\\non one lot.\\r\\n(p) P Uses (Reserved)\\r\\n(q) Q Uses (Reserved)\\r\\n(r) R Uses\\r\\n(1) Recovery Housing Residence\\r\\nA use as defined in Ohio R.C. Ch. 5119.01(A)(17), as amended.\\r\\n(2) Residential Care Facility\\r\\nA use as defined in Ohio R.C. Ch. 3721.01(A)(7), Ohio R.C. Ch. 5119.34, Ohio Admin. \\r\\nCode 3701-16-01(II), and Ohio Admin. Code 5101:2-1-01(280), as amended.\\nZoning Code Page 23\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 23\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(3) Residential Facility\\r\\nA use as defined in Ohio R.C. Ch. 5119.34(B), as amended.\\r\\n(s) S Uses (Reserved)\\r\\n(t) T Uses\\r\\n(1) Three-Unit Dwelling\\r\\nA detached dwelling arranged, intended or designed to consist of three dwelling \\r\\nunits on one lot.\\r\\n(2) Tiny Home\\r\\nA detached dwelling arranged, intended, or designed to consist of one dwelling unit \\r\\non one lot which is less than 400 hundred square feet and affixed to a permanent \\r\\nfoundation. \\r\\n(3) Townhome\\r\\nA dwelling that is part of a structure containing three or more dwelling units, each \\r\\ndesigned and constructed for occupancy by one household, with each dwelling unit \\r\\nattached by a common wall to another, in which each dwelling unit is located on \\r\\nindividual lots.\\r\\n(4) Transitional Housing\\r\\nA use as defined in Ohio Admin. Code 122:6-1-01(F), as amended.\\r\\n(5) Two-Unit Dwelling\\r\\nA detached dwelling arranged, intended or designed to consist of two dwelling units \\r\\non one lot.\\r\\n(u) U Uses (Reserved)\\r\\n(v) V Uses\\r\\n(1) Vertical Mixed Use Building\\r\\nA medium-to-large-sized, mid-to-high-rise building with two or more different uses \\r\\nsuch as residential, office, retail, public, or entertainment uses. No residential use \\r\\nshall be allowed on the ground floor of a Vertical Mixed-Use Building. Example floor \\r\\nspace configurations include but are not limited to:\\r\\n\\u2022 Ground floor retail, restaurant, or office storefronts with upper floor \\r\\napartment lofts;\\r\\n\\u2022 A five-floor building with retail and restaurants on the ground floor, office on \\r\\nthe second floor, hotel accommodations and apartment/condo units on the \\r\\nthird and fourth floors, and a restaurant and bar on the fifth floor.\\nZoning Code Page 24\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 24\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(w)W Uses (Reserved)\\r\\n(x) X Uses (Reserved)\\r\\n(y) Y Uses (Reserved)\\r\\n(z) Z Uses (Reserved)\\r\\n1105.02 Nonresidential Uses\\r\\n(a) A Uses\\r\\n(1) Adult Day Care \\r\\nA licensed facility for the daytime care of an adult. This term includes any provided \\r\\nAdult day services (ADS) as defined by Ohio Admin. Code 173-39-02.1, as amended.\\r\\n(2) Active Park/Recreational Facilities \\r\\nIndoor or outdoor recreational pursuits typically available to the public, that involve \\r\\ncooperative or team activity, including those activities that occur on ball fields, sport \\r\\ncourts, skateparks, ice rinks, and the like.\\r\\n(3) Agricultural Operations \\r\\nThe use of land for growing forages and sod crops; grains and seed crops; \\r\\nvegetables; trees and forest products; fruits, including grapes, nuts, and berries; \\r\\nnursery, floral, ornamental, and greenhouse products; or lands devoted to a soil \\r\\nconservation or forestry management program. Agricultural Operations also engage \\r\\nin the keeping, pasturing, and feeding of livestock for the sale of livestock or \\r\\nlivestock products. An Agricultural Operations is assessed by the County Auditor at \\r\\n\\u0022current agricultural use value.\\u0022 \\r\\n(4) Agritainment \\r\\nEvents and activities that allow for recreation, entertainment, and tourism that is in \\r\\nconjunction with on-going agricultural activities on-site (examples include, but are \\r\\nnot limited to corn mazes, hayrides, wedding venues, rodeos, and petting zoos). \\r\\n(5) Artisanal Manufacturing \\r\\nThe manufacturing and production of goods by an artisan or craftsperson done by \\r\\nhand or small machinery, located within a building or indoor tenant space. This use \\r\\ntypically includes but is not limited to jewelry, metalwork, cabinetry, woodworking, \\r\\nstained glass, textiles, ceramics, or handmade food products for off-site \\r\\nconsumption.\\r\\n(6) Assembly Hall \\nZoning Code Page 25\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 25\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nA building(s) or portion of a building in which facilities are provided for small to \\r\\nlarge gatherings and events for civic, educational, political, religious, cultural, or \\r\\nsocial purposes. Events that typically occur within an Assembly Hall are weddings, \\r\\nconferences, concerts, exhibitions, parties, live musical/acting performances, and the \\r\\nlike. An Assembly Hall may be supported by ancillary uses that provide food and \\r\\ndrink to those attending events. \\r\\n(7) Automotive Repair\\r\\nA building, place, or facility that offers mechanical and body work on motor vehicles \\r\\nincluding straightening of body parts, body repairs, battery rebuilding, painting, \\r\\nwelding, short term storage of automobiles not in operating condition, outdoor \\r\\nsimilar work on motor vehicles that may involve noise, glare, fumes, smoke, or \\r\\nsimilar impacts.\\r\\n(8) Automotive Sales and Rental\\r\\nA building(s) and any associated open areas other than a street or required \\r\\nautomobile parking space used for the display or sale of new or used automobiles, \\r\\nmotorcycles, ATVs, recreational vehicles, light trucks, and trailers, to be displayed \\r\\nand sold on the premises, and where minor repair work and maintenance is done for \\r\\nthose vehicles. This use does not allow for the storage of wrecked automobiles or the \\r\\ndismantling of automobiles or the storage of automobile parts or junk on the \\r\\npremises.\\r\\n(9) Automotive Service\\r\\nA building, structure, or land use for the limited repair and maintenance of \\r\\nautomobiles, motorcycles, trucks, trailers, or similar vehicles include, but not limited \\r\\nto, muffler repair and replacement, oil change and lubrication, tire service and sales, \\r\\ninstallation of accessories, or diagnostic services. Automotive Service work does not \\r\\ninvolve significant noise, glare, fumes, smoke, or similar impacts. Any repair, \\r\\nmaintenance, or service activity more extensive than provided in the Automotive \\r\\nService use, shall constitute as an Automotive Repair use and be regulated as such.\\r\\n(10) Automotive Wash\\r\\nA facility, whether automatic, semi-automatic or manual, for washing automobiles, \\r\\nmotorcycles, ATVs, recreational vehicles, light trucks, trailers, and the like.\\r\\n(b) B Uses\\r\\n(1) Bar\\r\\nAn establishment providing or dispensing, for on-site consumption, alcoholic \\r\\nbeverages, including but not limited to any fermented malt beverage, malt beverage, \\r\\nspecial malt, vinous, spirituous liquors, and those drinks specified in Ohio R.C. Ch. \\nZoning Code Page 26\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 26\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n4301.01(14), as amended. The sale of hot food products may be included as an \\r\\nancillary use to the beverages provided on-site.\\r\\n(2) Bed and Breakfast \\r\\nAn owner-occupied property, other than a hotel, which offers lodging for paying \\r\\nguests and which serves meals to these guests and which contains one or more guest \\r\\nbedrooms and where facilities for food preparation are not provided in the \\r\\nindividual guest bedrooms.\\r\\n(3) Brewery \\r\\nA facility for the brewing of beer and ale for sale on the premises, as well as for off\\u0002site sales and distribution, which produces more than 10,000 barrels annually and \\r\\nmay include a restaurant, bar, tasting, or retail space. The brewing operation \\r\\nprocesses the ingredients to make beer and ale by mashing, cooking, and fermenting. \\r\\nThe brewing operation does not include the production of any other alcoholic \\r\\nbeverages.\\r\\n(c) C Uses\\r\\n(1) Cannabis Growing/Processing \\r\\nA facility operated by an organization or business that is licensed by the State of \\r\\nOhio to either extract constituent chemicals or compounds to produce cannabis \\r\\nconcentrate or incorporate cannabis or cannabis concentrate into a product \\r\\nformulation to produce a cannabis product.\\r\\n(2) Cemetery \\r\\nA place for interment of human or animal remains or cremated remains, including a \\r\\nburial park for earth interments, a mausoleum for vault or crypt interments, a \\r\\ncolumbarium for cinerary interments, or a combination thereof.\\r\\n(3) Check-Cashing Business \\r\\nA use as defined in Ohio R.C. Ch. 1315.21(B), as amended.\\r\\n(4) Child Care Center \\r\\nA use as defined in Ohio Admin. Code 5101:2-1-01(B)(63), as amended. This term \\r\\nincludes nursery schools, preschools, and other similar uses. \\r\\n(5) Clinic \\r\\nAn establishment where human patients are not hospitalized overnight and \\r\\nexamined and are treated by or under the care and supervision of doctors, dentists, \\r\\nor other medical practitioners.\\r\\n(6) Club \\nZoning Code Page 27\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 27\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nA use as defined in Ohio R.C. Ch. 4301.01(13), as amended.\\r\\n(7) College/University \\r\\nA privately-owned or publicly-owned institution providing full-time or part-time \\r\\neducation beyond the high school level, including any on-campus lodging rooms, \\r\\nhousing for students or faculty, athletic facilities, food halls, medical services, and \\r\\nthe like. \\r\\n(8) Communication Facility \\r\\nTowers, antennas, equipment, equipment buildings and other facilities used in the \\r\\nprovision of wireless communication services, small cellular telecommunication \\r\\nservices, and the like.\\r\\n(9) Community Center \\r\\nA place, structure, area or other facility that is open to the public, under the \\r\\njurisdiction of a public or nonprofit agency, and is used for community recreation, \\r\\neducation and service activities. A community center may include, but is not limited \\r\\nto, the following uses: auditorium, multipurpose room, gymnasium, meeting space, \\r\\nopen space, playground, playing courts, playing field, and swimming pool. \\r\\n(10) Community Garden \\r\\nA use that provides land or space for people to grow plants for non-commercial \\r\\npurposes, such as beautification, education, recreation, or harvest for personal \\r\\nconsumption, and is managed by a specific person, group, association, or entity \\r\\nresponsible for maintenance and operations. Examples of those who can manage \\r\\ninclude but are not limited to school/religious groups, homeowners\\u0027 associations, \\r\\nrotary club, etc.\\r\\n(11) Crematory \\r\\nA building or portion of a building where human remains and deceased animals are \\r\\ncremated in cremation retorts. \\r\\n(d) D Uses \\r\\n(1) Distillery \\r\\nA facility for distilling spirits and liquor, including wine, for sale and distribution \\r\\non-premises or off-site, that produces more than 50,000 proof gallons annually, and \\r\\nincluding restaurant/bar space, tasting space, or retail space.\\r\\n(e) E Uses\\r\\n(1) Educational Institution \\nZoning Code Page 28\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 28\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nA public or private educational facility offering instruction at the elementary, junior, \\r\\nor senior high school levels in the branches of learning and study required to be \\r\\ntaught in the schools of Ohio. Educational facilities may include but are not limited\\r\\nto ancillary uses such as playgrounds, ball fields, temporary classroom buildings, \\r\\ngyms, auditoriums, and amphitheaters.\\r\\n(f) F Uses\\r\\n(1) Financial Institution \\r\\nAn establishment where the primary occupation is financial services such as \\r\\nbanking, savings, and loans. It does not include financial services that typically occur \\r\\nin an office or storefront, such as investment companies, loan companies, credit and \\r\\nmortgage, insurance services, or brokerage firms), which are classified under \\r\\n\\u0022Professional Office,\\u0022 below.\\r\\n(2) Flex Warehouse \\r\\nA building or portion thereof used for the housing of where building and \\r\\nconstruction trade services are provided to the public. This use shall include, but is \\r\\nnot limited to, contractor offices, including landscaper\\u0027s showrooms, construction \\r\\nsupplies and storage including plumbing, heating, air conditioning, and building \\r\\nequipment, materials, sales, and other uses similar in nature and impact.\\r\\n(3) Funeral Services \\r\\nA building or part thereof used for human funeral services, that may include space \\r\\nfor the embalming and other services used in the preparation of the dead for burial; \\r\\nthe storage of caskets, funeral urns, funeral vehicles, and other related supplies; \\r\\nfacilities for cremation, chapels, and other related uses.\\r\\n(g) G Uses\\r\\n(1) Ghost Kitchen \\r\\nA place or facility for preparing, cooking, baking, and selling of food products on the \\r\\npremises for off-premise consumption. Accessory office and waiting spaces shall be \\r\\nincidental to the primary use. \\r\\n(2) Government Use \\r\\nA building or land used and controlled exclusively for governmental or public \\r\\npurposes by any department or branch of government including city, state, county, \\r\\nfederal, or other recognized public entity. Such use may include, but is not limited \\r\\nto, city offices, public works, libraries, post offices, training facilities, fire stations, \\r\\npolice storefronts, and other similar uses.\\r\\n(3) Greenhouse/Nursery \\nZoning Code Page 29\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 29\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nA place where plants, including flowers, shrubs, trees, and sometimes seeds, are \\r\\ngrown and sold. This use does not include the growing and selling of marijuana. \\r\\n(h) H Uses\\r\\n(1) Hospital \\r\\nA facility providing physical or mental health services, inpatient or overnight \\r\\naccommodations, and medical or surgical care for the sick or injured. Such a facility \\r\\nmay include Clinics.\\r\\n(2) Hotel \\r\\nA use as defined in Ohio R.C. Ch. 3731.01(A), as amended.\\r\\n(i) I Uses\\r\\n(1) Indoor Commercial Amusement \\r\\nA place where entertainment activities occur completely within an enclosed \\r\\nstructure for a fee, including but not limited to theaters, bowling alleys, arcades, \\r\\nskating rinks, escape rooms, pool halls, video and pinball parlors. An Indoor \\r\\nCommercial Amusement may include but are not limited to ancillary uses such as \\r\\nfood and beverage sales and giftshops that are designed and intended primarily for \\r\\nthe use of patrons.\\r\\n(2) Intensive-Impact Industrial and Manufacturing \\r\\nThe manufacturing, processing, and storing of paper, chemicals, plastics, rubber, \\r\\ncosmetics, drugs, nonmetallic mineral products (such as concrete and concrete \\r\\nproducts, glass), primary metals, acetylene, cement, lime, gypsum or plaster-of Paris, \\r\\nchlorine, corrosive acid or fertilizer, insecticides, disinfectants, poisons, explosives, \\r\\npaint, lacquer, varnish, petroleum products, coal products, plastic and synthetic \\r\\nresins, electrical equipment, appliances, batteries, and machinery. This use also \\r\\nincludes the heaviest and most intensive facilities which warrants additional review \\r\\nby the City such as: asphalt and concrete mixing plants, smelting, animal \\r\\nslaughtering, oil refining, and magazine contained explosives facilities. \\r\\n(j) J Uses (Reserved)\\r\\n(k) K Uses\\r\\n(1) Kennel \\r\\nA facility licensed to house dogs, cats, or other household pets or where grooming, \\r\\nbreeding, boarding or training or selling of animals is conducted as business. This \\r\\nuse includes pet resorts/hotels, pet adoption centers, dog training centers, animal \\r\\nrescue shelters and sanctuaries.\\nZoning Code Page 30\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 30\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(l) L Uses\\r\\n(1) Laboratory \\r\\nA building or part thereof in which are located facilities for scientific research, \\r\\ninvestigation, testing, or experimentation, but not facilities for the manufacture or \\r\\nsale of products except as incidental to the main purpose of the laboratory.\\r\\n(2) Limited-Impact Industrial and Manufacturing \\r\\nThe manufacturing of products, from extracted, raw, recycled or secondary \\r\\nmaterials, including bulk storage and handling of those products and materials, or \\r\\ncrushing, treating, washing, and/or processing of materials. This includes similar \\r\\nestablishments, and businesses of a similar and no more objectionable character. It \\r\\nalso includes incidental finishing and storage. Goods or products manufactured or \\r\\nprocessed on-site may be sold at retail or wholesale on or off the premises. This does \\r\\nnot include any activity listed under Intensive-Impact Industrial and Manufacturing. \\r\\nExamples of Limited-Impact Industrial and Manufacturing include the manufacture \\r\\nor production of the following goods or products: apparel (including clothing, shoes, \\r\\ndressmaking); boats and transportation equipment; brooms; caskets; communication \\r\\nor computation equipment; dairy products; die-cut paperboard and cardboard; \\r\\ndrugs, medicines, pharmaceutical; electrical equipment or machinery; farm \\r\\nmachinery; fasteners and buttons; feed and grain; food/baking (including coffee \\r\\nroasting, creameries, ice cream, ice, frozen food, confectionery, and beverage); fruit \\r\\nand vegetable processing, canning and storage; gaskets; glass products made of \\r\\npurchased glass; household appliances; industrial controls; leather and allied \\r\\nproducts; lithographic and printing processes (including printing plants as defined \\r\\nbelow); mattresses; medical equipment and supplies; medicines; mill work and \\r\\nsimilar woodwork; mobile homes; musical instruments; novelties; office supplies; \\r\\noptical goods; photographic equipment; prefabricated and modular housing and \\r\\ncomponents; printing and print supplies (including printing plants); 3-D printing, \\r\\nradio and TV receiving sets; sanitary paper products; scientific and precision \\r\\ninstruments; service industry machines; signs; textiles (including dyeing, laundry \\r\\nbags, canvas products, dry goods, hosiery, millinery); tobacco products; toys, \\r\\nsporting and athletic goods; and watches and clocks. \\r\\n(m)M Uses\\r\\n(1) Major Utilities and Public Service Facility \\r\\nInfrastructure services that typically have substantial visual or operational impacts \\r\\non nearby areas. Typical uses include but are not limited to water and wastewater \\r\\ntreatment facilities, high-voltage electric substations, utility-scale power generation \\r\\nfacilities (including wind, solar and other renewable and nonrenewable energy \\nZoning Code Page 31\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 31\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nsources), sanitary landfills and utility-scale water storage facilities, such as water \\r\\ntowers and reservoirs. \\r\\n(2) Microbrewery \\r\\nAn establishment where beer and malt beverages are made on the premises and \\r\\noffered for consumption on site, offered for sale directly to customers (including \\r\\nfilling growlers), sold to licensed wholesalers to distribute the beer to retailers. Ohio \\r\\nState Law establishes an annual production limit of 10,000 barrels for \\r\\nmicrobreweries.\\r\\n(3) Microdistillery \\r\\nAn establishment where distilling of spirits and liquor are made on premises, and \\r\\noffered for consumption on site, offered for sale directly to customers, sold to \\r\\nlicensed wholesalers for distribution. Ohio State Law establishes an annual \\r\\nproduction limit of 50,000 proof gallons for microdistilleries.\\r\\n(4) Mineral Extraction \\r\\nThe extraction or quarrying of coal, ores, stone, minerals, top soil or aggregate \\r\\nresources from the ground. Examples include quarrying or dredging for sand, gravel \\r\\nor other aggregate materials; mining and top soil extraction. This also includes \\r\\ncrushing, washing and grading coal, ore, stone, sand, gravel, minerals, topsoil or \\r\\naggregate resources and manufacture of Portland cement.\\r\\n(5) Minor Utilities and Public Service Facility \\r\\nInfrastructure services that need to be located in or close to the area where the \\r\\nservice is provided. Minor utilities and public service facilities generally do not have \\r\\nregular employees at the site and typically have few if any impacts on surrounding \\r\\nareas. Typical uses include water and sewer pump stations; gas regulating stations; \\r\\nunderground electric distribution substations; electric transformers; water \\r\\nconveyance systems; stormwater facilities and conveyance systems; telephone \\r\\nswitching equipment and emergency communication warning/broadcast facilities. \\r\\n(n) N Uses\\r\\n(1) Night Club \\r\\nA use as defined in Ohio R.C. Ch. 4301.01(14), as amended.\\r\\n(o) O Uses\\r\\n(1) Outdoor Commercial Amusement \\r\\nA place where entertainment activities occur outdoors for a fee, including but not \\r\\nlimited to miniature golf, batting cages, water slides, driving ranges, theme parks, \\r\\ndrive-in theaters, and go cart tracks. An Outdoor Commercial Amusement may \\nZoning Code Page 32\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 32\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\ninclude but are not limited to ancillary uses such as food and beverage sales and \\r\\ngiftshops that are designed and intended primarily for the use of patrons.\\r\\n(p) P Uses\\r\\n(1) Parking Facility \\r\\nAn area reserved or used for parking or storage of motor vehicles, hauling trailers or \\r\\nboats on premises on which there is no principal building. Alternatively, the use may \\r\\nutilize a structure used specifically for the parking or storage of motor vehicles. A \\r\\nParking Facility includes those parking arrangements that are surface-level, above\\u0002grade, and below-grade structure.\\r\\n(2) Passive Park/Recreational Facilities \\r\\nParks and recreational pursuits, such as interpretive programs and trail systems that \\r\\ntake advantage of geological, biological, or scenic resources located within the city \\r\\nlimits.\\r\\n(3) Pawnbroker \\r\\nA use as defined in Ohio R.C. Ch. 4727.01, as amended.\\r\\n(4) Personal Services \\r\\nEstablishments that are primarily engaged in providing services generally involving \\r\\nthe care of the person or person\\u2019s possessions. Personal services may include, but are \\r\\nnot limited to, laundry and dry-cleaning services, barber shops, beauty salons, music\\r\\nschools, informational and instructional services, tanning salons, and portrait \\r\\nstudios.\\r\\n(5) Professional Office \\r\\nA use or structure where business or professional activities are conducted or \\r\\nbusiness or professional services are made available to the public, including, but not \\r\\nlimited to, tax preparation, accounting, architecture, legal services, medical \\r\\nprofessionals, dental laboratories, psychological counseling, real estate and securities \\r\\nbrokering, and professional consulting services.\\r\\n(q) Q Uses (Reserved)\\r\\n(r) R Uses\\r\\n(1) Religious Land Use \\r\\nA structure, group of structures, or lands intended for regular gatherings of people \\r\\nto attend, participate in or conduct religious services and other related activities and \\r\\nassociated accessory uses. Associated accessory uses may include religious \\r\\ninstruction classrooms, church offices, counseling programs, private school, youth \\nZoning Code Page 33\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 33\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nprograms, parking, child and adult day care facilities, summer camps, recreational \\r\\nfacilities, caretaker\\u2019s quarters, food bank, thrift shop, sale of religious items, and \\r\\ncemeteries.\\r\\n(2) Restaurant \\r\\nAn establishment where food and drink are prepared, sold to customers, and may be \\r\\nconsumed on the premises. A restaurant may include the incidental sales and service \\r\\nof alcoholic beverages for on-site consumption. Such uses include but are not limited \\r\\nto cafes, coffee shops, delicatessen, sit-down dining, and fast food.\\r\\n(3) Retail Store \\r\\nA building(s) or facility(ies) in which the sale of goods, products, or merchandise is \\r\\nsold directly to the consumer. Typical uses include but are not limited to clothing \\r\\nstores, department stores, electronic and appliance stores, bike shops, bookstores, \\r\\nhobby shops, jewelry stores, furniture stores, pet supply stores, shoe stores, antique \\r\\nshops, secondhand stores, record shops, CBD/smoke shops, sporting goods stores, \\r\\nvariety stores, musical instrument stores, medical supply sales, office supplies, \\r\\nconvenience stores, and beauty supply shops. Cannabis dispensaries are excluded \\r\\nfrom this definition.\\r\\n(s) S Uses\\r\\n(1) Salvage Yard \\r\\nA use as defined in 739.01(c) of the Code of Ordinances.\\r\\n(2) Self-Storage Facility \\r\\nA building or group of buildings consisting of individual, self-contained spaces that \\r\\nare leased or owned for the storage of business goods, household goods, or \\r\\ncontractor supplies.\\r\\n(3) Sexually Oriented Business \\r\\nThose uses defined in 707.02 of the Code of Ordinances, as amended.\\r\\n(4) Solid Waste Transfer Station \\r\\nA building or facility that is used or intended to be used primarily for the purpose of \\r\\ntransferring solid wastes that are generated off the facility\\u2019s premises from vehicles \\r\\nor containers into other vehicles or containers for transportation to a solid waste \\r\\ndisposal facility. The operation is totally enclosed within a building. \\r\\n(t) T Uses\\r\\n(1) Technical School \\nZoning Code Page 34\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 34\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nAn institution in an enclosed building that focus on teaching the skills needed to \\r\\nperform a particular job, technical trade, or professional skill. Examples include \\r\\nschools of cosmetology, modeling academies, computer training facilities, vocational \\r\\nschools, administrative business training facilities and similar uses.\\r\\n(2) Transportation Facility \\r\\nAny structure or transit facility that is primarily used, as part of a transit system, for \\r\\nthe purpose of loading, unloading, or transferring passengers or accommodating the \\r\\nmovement of passengers from one mode of transportation to another.\\r\\n(u) U Uses\\r\\n(1) Urban Farm \\r\\nAny land or indoor facility that cultivate flowers, fruits, and vegetables and sells \\r\\nthose products for commercial purposes. Ancillary uses that support the operation \\r\\nsuch as washing, packaging, and storing facilities are included. This use is less \\r\\nintensive than the Agricultural Operations use. Any agricultural activity more \\r\\nextensive than provided in the Urban Farm use, shall constitute as an Agricultural \\r\\nOperations use and be regulated as such.\\r\\n(v) V Uses\\r\\n(1) Veterinarian Facility \\r\\nA facility where animals or pets are given medical or surgical treatment and are \\r\\ncared for during the time of such treatment. This use may include an accessory \\r\\nkennel that is limited to short-term boarding incidental to the veterinarian facility.\\r\\n(w)W Uses\\r\\n(1) Warehouse \\r\\nAn enclosed storage facility which is used to store goods or parts, or for any part of \\r\\nthe shipping process. This use includes cross-dock facilities.\\r\\n(2) Wholesale and Distribution \\r\\nA facility or area for the storage of goods, and the sale of goods to other firms for \\r\\nresale, including activities involving significant storage and movement of products \\r\\nor equipment. This use does not involve manufacturing or production. Examples \\r\\ninclude but are not limited to: carting, cold storage, distribution facilities, dry goods \\r\\nwholesale, express crating, hauling, feed locker plants, fulfillment centers that \\r\\ncombine storage with call centers, hardware storage, merchant wholesalers (such as \\r\\nrestaurant supply sales), warehouse or produce/fruit/food storage and wholesale \\r\\nstructures, wholesale sale of paper supplies, shoes, sporting goods, professional and \\r\\ncommercial equipment and supplies, and otherwise preparing goods for \\nZoning Code Page 35\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 35\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\ntransportation. Distribution means the intake of goods and merchandise, \\r\\nindividually or in bulk, the short-term holding or storage of such goods or \\r\\nmerchandise, and/or the breaking up into lots or parcels and subsequent shipment \\r\\noff-site of such goods and merchandise. Distribution may be provided to an entity \\r\\nwith an identity of interest with the facility or to businesses and individuals \\r\\nunrelated to the distributor. The term distribution also includes a transshipment \\r\\nfacility for the temporary holding, storage and shipment of goods or vehicles.\\r\\n(x) X Uses (Reserved)\\r\\n(y) Y Uses (Reserved)\\r\\n(z) Z Uses (Reserved)\\r\\n1105.03 Accessory and Temporary Uses\\r\\n(a) A Uses\\r\\n(1) Accessory Building \\r\\nA subordinate building, located on the same lot as the primary building, the use of \\r\\nwhich is clearly incidental to and customarily found in connection with the primary \\r\\nbuilding or use of the property. Such uses include but are not limited to equipment \\r\\nstorage sheds, personal workshop space, and the like. \\r\\n(2) Accessory Dwelling Unit \\r\\nAn attached or detached additional dwelling unit associated with a principal \\r\\nresidence on the same lot or parcel of that principal residence. This use includes \\r\\nthose uses commonly referenced as carriage houses, granny flats, servant\\u0027s quarters, \\r\\ngarage apartments, guard residences, and the like.\\r\\n(3) Alternative Energy System \\r\\nAny wind or solar driven devices and equipment (whether roof, ground mounted, \\r\\nor tower mounted) used for the purpose of providing electrical power to a privately \\r\\nowned lot or parcel. These systems are accessory in function, are not of an industrial \\r\\nor large-scale, and are reserved exclusively for private or personal use. \\r\\n(4) ATM \\r\\nAn automated device that performs banking or financial functions at a location \\r\\nremote from the controlling financial institution.\\r\\n(b) B Uses (Reserved)\\r\\n(c) C Uses\\r\\n(1) Cargo Containers \\nZoning Code Page 36\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 36\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nA standardized, reusable weatherproof fully enclosed box-like structure constructed \\r\\nwith doors, originally designed for the shipment or storage of freight or other goods, \\r\\nand commonly designed for or is capable of being mounted on a railroad car or \\r\\nchassis for movement by truck or ship.\\r\\n(2) Charitable Donation Container\\r\\nAn accessory structure where clothes, goods, products, and other items are placed \\r\\nfor donation and are subsequently delivered to a charitable organization for public \\r\\nconsumption.\\r\\n(d) D Uses\\r\\n(1) Drive-Thru Facility \\r\\nAny associated facilities related to a building opening, including windows, doors, or \\r\\nmechanical devices, through which occupants of a motor vehicle receive or obtain a \\r\\nproduct, food, or service.\\r\\n(e) E Uses (Reserved)\\r\\n(f) F Uses (Reserved)\\r\\n(1) Fueling and Charging Services \\r\\nFacilities and equipment arranged, designed, used, or intended to be used for the \\r\\nprimary purpose of dispensing gasoline, oil, diesel fuel, and electricity at retail direct \\r\\nto on-premises vehicles. Such services include fueling pumps, charging stations, and \\r\\nthe like. This use does not include charging stations situated on residential \\r\\nproperties since those facilities are for the property owner\\u0027s or tenants\\u0027 personal use.\\r\\n(g) G Uses\\r\\n(1) Garage or Yard Sales \\r\\nGeneral sales, open to the public, conducted from or on a residential lot or in any \\r\\nresidential district for the purpose of disposing of personal lot or other lot, including \\r\\nbut not limited to, all sales entitled \\u0022garage, \\u0022 \\u0022lawn, \\u0022 \\u0022estate,\\u0022 \\u0022yard,\\u0022 \\u0022attic\\u201D, \\u201Ctag\\u201D \\r\\nor \\u0022rummage sale.\\u0022\\r\\n(h) H Uses \\r\\n(1) Home Occupation \\r\\nAn occupation, profession, or business activity for financial gain or profit which \\r\\nresults in a product or service and is conducted in whole or in part in a dwelling unit \\r\\nand is subordinate to the residential use of the property.\\r\\n(i) I Uses (Reserved)\\r\\n(j) J Uses (Reserved)\\nZoning Code Page 37\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 37\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(k) K Uses (Reserved)\\r\\n(l) L Uses (Reserved)\\r\\n(m)M Uses (Reserved)\\r\\n(1) Mobile Food Service \\r\\nA commercial operation that utilizes a licensed, motorized vehicle (food truck) or \\r\\nconcession trailer for the sale of cooked or prepared food and beverage items that are \\r\\nsold to the general public for on-site or off-site consumption.\\r\\n(n) N Uses (Reserved)\\r\\n(o) O Uses\\r\\n(1) Outdoor Dining \\r\\nAn accessory dining space reserved for customers and patrons at a restaurant, \\r\\nbrewery/distillery, hotel, or mixed-use building.\\r\\n(2) Outdoor Storage \\r\\nThe keeping of any goods, materials, merchandise, or vehicles outside of a structure \\r\\nor building for more than 48 consecutive hours. Outdoor storage shall not include \\r\\nvehicles, tool rental establishments, greenhouses, or other uses where the sale of the \\r\\nmerchandise is the primary use of the property.\\r\\n(p) P Uses\\r\\n(1) Personal Swimming Pool \\r\\nA swimming pool on private property for the use of the property owner, including \\r\\nfamily and guests. \\r\\n(2) Private Kennel \\r\\nThe use of a residence or private property to partake in Hobby Breeder activities.\\r\\n(3) Private Utility \\r\\nThose utilities provided by a contractor or franchise on private property for personal \\r\\nuse.\\r\\n(q) Q Uses (Reserved)\\r\\n(r) R Uses (Reserved)\\r\\n(s) S Uses (Reserved)\\r\\n(t) T Uses\\r\\n(1) Type A Family Child Care Home \\nZoning Code Page 38\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 38\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nA use as defined in Ohio R.C. Ch. 5104.01(UU), as amended.\\r\\n(2) Type B Family Child Care Home \\r\\nA use as defined in Ohio R.C. Ch. 5104.01(VV), as amended.\\r\\n(u) U Uses (Reserved)\\r\\n(v) V Uses\\r\\n(1) Vertiport \\r\\nAn area of land, structural surface, building, or structure with one or more \\r\\ndesignated drone staging areas for use by small unmanned aircraft systems (sUAS) \\r\\nunder 55 pounds total take-off weight or as defined in Section 44801 of Title 49, \\r\\nUnited States Code, as amended, whichever is the lesser, to distribute commercial \\r\\ngoods by air. This includes any appurtenant areas used or intended for use for \\r\\nunmanned aircraft system buildings, structures, and other facilities.\\r\\n(w)W Uses\\r\\n(1) Walk-Up Window \\r\\nAny associated facilities related to a building opening, including windows, doors, or \\r\\nmechanical devices, through which customers and patrons on foot receive or obtain \\r\\na product, food, or service.\\r\\n(x) X Uses (Reserved)\\r\\n(y) Y Uses (Reserved)\\r\\n(z) Z Uses (Reserved)\\r\\nCHAPTER 1106 - Use-Specific Standards\\r\\n1106.01 Residential Uses\\r\\n(a) Adult Family Home\\r\\n(1) An Adult Family Home shall meet all local, county, state, and federal rules, \\r\\nregulations, and ordinances pertaining to the use. \\r\\n(b) Adult Group Home\\r\\n(1) An Adult Group Home shall meet all local, county, state, and federal rules, \\r\\nregulations, and ordinances pertaining to the use. \\r\\n(c) Children\\u2019s Residential Center\\r\\n(1) A Children\\u2019s Residential Center shall meet all local, county, state, and federal rules, \\r\\nregulations, and ordinances pertaining to the use\\nZoning Code Page 39\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 39\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(d) Cottage Court\\r\\nFigure 1106.01.1: Cottage Court Layout\\r\\n(1) Figure 1106.01.1: Cottage Court Layout shows an example of a Cottage Court layout.\\r\\n(2) The minimum total lot area required for a Cottage Court is the cumulative area \\r\\nrequired for each dwelling type provided within the development.\\r\\n(3) Where a dwelling fronts on the common open space, it is considered to meet the \\r\\nrequirement for frontage on a public or private street.\\r\\n(4) The zoning district standards apply to each individual dwelling type within the \\r\\nCottage Court with the following exceptions:\\r\\nA. The maximum building height is limited to 35 feet for all dwellings.\\r\\nB. For dwellings that front the common open space, the minimum front setback \\r\\nrequired is ten feet as measured from the common open space.\\r\\nC. For dwellings that front the common open space, the required minimum rear \\r\\nand side setbacks is five feet.\\r\\n(5) For any dwelling abutting a public or private street, an entrance to the dwelling \\r\\nmust face the street. \\r\\n(6) For any dwelling that fronts the common open space, the front fa\\u00E7ade of the\\r\\ndwelling shall be oriented to the common open space.\\r\\n(7) Common open space shall be provided and shall meet the following standards:\\nZoning Code Page 40\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 40\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nA. The minimum area of the common open space is 500 square feet per dwelling.\\r\\nB. At least 50% of the centrally located common open space shall have a minimum \\r\\nwidth of 40 feet.\\r\\nC. Of the required amount of common open space, 75% shall be centrally located.\\r\\nD. All common open space shall be accessible to all residents.\\r\\nE. Yards for dwellings are not counted toward the required amount of common \\r\\nopen space. However, such yards may be in addition to the required amount of \\r\\ncommon open space. \\r\\n(e) Courtyard Apartment\\r\\n(1) Common open space shall be provided for a Courtyard Apartment development. \\r\\n(2) A Courtyard Apartment shall be designed where the prominent feature of the \\r\\ndevelopment is the common open space.\\r\\n(3) For each dwelling unit provided, 100 square feet of common open space shall be \\r\\nprovided.\\r\\n(4) The required common open space: \\r\\nA. May be hardscaped up to 50%.\\r\\nB. Shall provide outdoor furniture, amenities, and similar items for the use of \\r\\nresidents. \\r\\n(f) Emergency Shelter \\r\\n(1) An Emergency Shelter shall meet all local, county, state, and federal rules, \\r\\nregulations, and ordinances pertaining to the use. \\r\\n(g) Foster Home\\r\\n(1) A Foster Home shall meet all local, county, state, and federal rules, regulations, and \\r\\nordinances pertaining to the use. \\r\\n(h) Four-Unit Dwelling\\r\\n(1) A Four-Unit Dwelling may be designed as a stacked, side-by-side, or multi-side \\r\\ndwelling.\\r\\n(2) Where possible, a Four-Unit Dwelling shall provide rear-entry parking.\\r\\n(3) A Three-Unit Dwelling shall comply with the requirements of Section 1106.01 (w)(2). \\r\\n(i) Group Home for Children\\r\\n(1) A Group Home for Children shall meet all local, county, state, and federal rules, \\r\\nregulations, and ordinances pertaining to the use. \\nZoning Code Page 41\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 41\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(j) Halfway House Facility\\r\\n(1) A Halfway House Facility shall meet all local, county, state, and federal rules, \\r\\nregulations, and ordinances pertaining to the use.\\r\\n(k) Home for the Aging\\r\\n(1) A Home for the Aging shall meet all local, county, state, and federal rules, \\r\\nregulations, and ordinances pertaining to the use.\\r\\n(l) Live-Work Dwelling\\r\\nFigure 1106.01.2: Live-Work Dwellings\\r\\n(1) The \\u201Clive\\u201D component may be located on the street level (behind the work \\r\\ncomponent) or any other level of the building. Figure 1106.01.2: Live-Work \\r\\nDwellings shows an example of Live-Work Dwellings where parking is provided in \\r\\nthe rear. \\r\\n(2) The residential unit shall be occupied by the business owner or manager.\\r\\n(m)Main Street Mixed Use Building \\r\\n(1) The first floor shall be reserved for nonresidential uses. \\r\\n(2) The residential use shall not exceed 75% of the total Mixed-Use Building square \\r\\nfootage.\\r\\n(3) All on-site parking shall be located at the rear of the site. \\r\\n(n) Multi-Unit Dwelling\\nZoning Code Page 42\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 42\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nFigure 1106.01.3: Multi-Unit Dwelling\\r\\n(1) A Multi-Unit Dwelling may be designed as a stacked or multi-sided dwelling.\\r\\n(2) A Multi-Unit Dwelling shall be designed to where no more than four dwelling units \\r\\nare provided side-by-side on any one story of the dwelling.\\r\\n(3) A Multi-Unit Dwelling shall comply with the requirements of Section 1106.01 (w)(2).\\r\\n(4) Figure 1106.01.3: Multi-Unit Dwelling shows an example of a Multi-Unit Dwelling \\r\\nwhere rear-entry parking is provided.\\r\\n(o) Nursing Home\\r\\n(1) A Nursing Home shall meet all local, county, state, and federal rules, regulations, \\r\\nand ordinances pertaining to the use. \\r\\n(p) One-Unit Dwelling\\r\\n(1) Zero Lot Line Development \\nZoning Code Page 43\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 43\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nFigure 1106.01.4: Zero Lot Line Development\\r\\nA. The dwelling may be constructed with a zero side yard on one side, and a side \\r\\nyard of not less than 10 feet extending the full depth of the lot on the other side. \\r\\nB. The dwelling may be placed on the \\u201Czero\\u201D side yard line (see the dwelling\\r\\nplacement as provided in Figure 1106.01.4: Zero Lot Line Development). \\r\\nC. In all cases, there shall be at least a 10-foot side yard on corner lots where \\r\\nadjacent to a street right-of-way or alley. \\r\\nD. Under no circumstances shall the separation between two zero lot line dwellings, \\r\\nor between a zero lot line dwelling and any other type of principal building on \\r\\nan adjacent lot, be less than 10 feet wall-to-wall.\\r\\n(q) Recovery Housing Residence\\r\\n(1) A Recovery Housing Residence shall meet all local, county, state, and federal rules, \\r\\nregulations, and ordinances pertaining to the use. \\r\\n(r) Residential Care Facility\\r\\n(1) A Residential Care Facility shall meet all local, county, state, and federal rules, \\r\\nregulations, and ordinances pertaining to the use. \\r\\n(s) Residential Facility\\r\\n(1) A Residential Facility shall meet all local, county, state, and federal rules, \\r\\nregulations, and ordinances pertaining to the use. \\r\\n(t) Three-Unit Dwelling\\nZoning Code Page 44\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 44\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(1) A Three-Unit Dwelling may be designed as a stacked, side-by-side, or multi-side \\r\\ndwelling.\\r\\n(2) A Three-Unit Dwelling shall comply with the requirements of Section 1106.01 (w)(2).\\r\\n(u) Tiny Home\\r\\n(1) A Tiny Home shall meet the applicable zoning district\\u2019s dimensional requirements. \\r\\n(2) A Tiny Home shall be securely fixed to a permanent foundation. \\r\\n(3) A Tiny Home shall connect to water, wastewater, and electric utilities (including \\r\\nconnection to the electrical grid). \\r\\n(4) All final plans and construction details for a Tiny Home shall be signed and sealed \\r\\nby a registered engineering professional and they shall comply with Appendix Q in \\r\\nthe most recently adopted version of International Residential Code.\\r\\n(v) Townhome\\r\\nFigure 1106.01.5: Townhomes\\r\\n(1) No Townhome row shall exceed eight (8) units. \\r\\n(2) At the end of a Townhome row, a five-foot minimum side yard setback shall be \\r\\nprovided. \\r\\n(3) Where possible, Townhomes shall provide rear-entry parking. \\r\\n(4) All parking shall be on the public right-of-way or shall provide rear entry parking \\r\\ngarages where alley access exists.\\nZoning Code Page 45\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 45\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(5) Figure 1106.01.5: Townhomes shows an example of a Townhome row where rear\\u0002entry parking is provided.\\r\\n(w)Transitional Housing\\r\\n(1) Transitional Housing shall meet all local, county, state, and federal rules, \\r\\nregulations, and ordinances pertaining to the use. \\r\\n(x) Two-Unit Dwelling\\r\\nFigure 1106.01.6: Two-Unit Dwelling\\r\\n(1) A Two-Unit Dwelling may be designed as a stacked, side-by-side, or multi-sided \\r\\ndwelling.\\r\\n(2) Each front ground floor fa\\u00E7ade entrance shall be accompanied by a: \\r\\nA. Stoop with an area of at least 50 square feet;\\r\\nB. Porch with an area of at least 75 square feet; or\\r\\nC. A recessed or projecting entry at least three feet deep with a structural covering \\r\\n(canopy, awning, etc.)\\r\\n(3) Figure 1106.01.6: Two-Unit Dwelling shows an example of a side-by-side Two-Unit \\r\\nDwelling where rear-entry parking is provided.\\r\\n(y) Vertical Mixed Use Building\\r\\n(1) The first floor shall be primarily used for nonresidential uses. \\nZoning Code Page 46\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 46\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(2) The first floor may incorporate residential uses but shall be limited to 25% of the \\r\\nsquare footage on the first floor. \\r\\n(3) The residential use shall not exceed 75% of the total Mixed Use Building square \\r\\nfootage.\\r\\n(4) All on-site parking shall be located at the rear of the site with the exception that no \\r\\nmore than 25% of the on-site parking may be allowed in front of the site. \\r\\n(5) Parking in the front of the site is prohibited in the C-DT district. \\r\\n(6) Nonresidential uses are allowed on the top floor of a Vertical Mixed Use Building. \\r\\n1106.02 Nonresidential Uses \\r\\n(a) Active Park/Recreational Facilities \\r\\n(1) All site lighting for the purposes of illuminating Active Park/Recreational Facilities \\r\\nor any accessory use shall terminate at 11:00 p.m. Lighting for walls, security \\r\\nmeasures, sconces, and parking facilities are excluded from this requirement.\\r\\n(2) Noise generated by Active Park/Recreational Facilities shall not exceed 40 dBA at \\r\\nany residential property line between the hours of 11:00 p.m. and 8:00 a.m.\\r\\n(b) Agritainment\\r\\n(1) Noise shall not exceed 70 decibels at the property boundaries. \\r\\n(2) An Agritainment use shall provide sanitary and waste services for participants and \\r\\nspectators. \\r\\n(3) An Agritainment use shall provide paved emergency medical services and fire lanes \\r\\nas part of the facility\\u2019s operations. \\r\\n(4) The fire lane shall be at least 28 feet wide.\\r\\n(c) Assembly Hall\\r\\n(1) In the C-NC district the maximum building footprint of an Assembly Hall on a lot is \\r\\n10,000 square feet. \\r\\n(d) Automotive Repair\\r\\n(1) All Automotive Body Repair activities shall take place within a building, and in no \\r\\ninstance shall activities occur in the open, outside of that building unless located in \\r\\nthe I-LI or I-HI districts.\\r\\n(2) On-site overnight vehicle keeping is prohibited unless vehicles are stored inside a \\r\\nbuilding or fully screened as provided in Section 1120.03 . \\r\\n(e) Automotive Sales and Rental\\nZoning Code Page 47\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 47\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(1) An Automotive Sales or Rental use shall not be located within 300 feet of any other \\r\\nAutomotive Sales or Rental use.\\r\\n(2) No more than 50% of the total building floor area may be used for related accessory \\r\\nuses such as retail sales, repair and service, and washing.\\r\\n(3) Inventory spaces shall not count toward the maximum parking requirements.\\r\\n(f) Automotive Service\\r\\n(1) An Automotive Service use shall be located 150 feet from any residential district.\\r\\n(2) All Automotive Service activities shall take place within a building, and in no \\r\\ninstance shall activities occur in the open, outside of that building unless located in \\r\\nthe I-LI or I-HI districts.\\r\\n(3) On-site overnight vehicle keeping is prohibited.\\r\\n(g) Automotive Wash\\r\\n(1) An Automotive Wash shall be located 150 feet from any residential district.\\r\\n(2) An Automotive Wash shall be closed for business between midnight and 6:00 a.m.\\r\\n(3) Automotive Wash activities located in the C-LC district shall occur within a \\r\\ncompletely enclosed structure. \\r\\n(h) Bar \\r\\n(1) A Bar shall be located 150 feet from religious land uses and schools. \\r\\n(i) Bed and Breakfast\\r\\n(1) A Bed and Breakfast shall be subordinate to the principal use of the lot which must \\r\\nbe a dwelling. \\r\\n(2) A Bed and Breakfast shall be owner-occupied and managed at all times.\\r\\n(3) The maximum number of rented bedrooms/guestrooms is five.\\r\\n(4) Rented bedrooms/guestrooms shall only be used by transient visitors and travelers \\r\\nand rented on a nightly, weekend, or weekly basis.\\r\\n(5) No cooking facilities are allowed in any of the bedrooms/guestrooms.\\r\\n(6) A Bed and Breakfast shall meet all of the minimum requirements of the City-County \\r\\nHealth Department and shall conform in all respects to the requirements of the fire \\r\\ncode, building code, electrical code, and plumbing code.\\r\\n(7) A Bed and Breakfast is responsible for the collection of the required City hotel/motel \\r\\ntax.\\nZoning Code Page 48\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 48\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(8) All City-County Health Officers, Building Inspectors, the Fire Marshal and their \\r\\nassistants, and other code enforcement officials of the City shall have the right to go \\r\\non any premises of a Bed and Breakfast during normal business hours for the \\r\\npurpose of verifying compliance with this subsection and all other applicable \\r\\nordinances of the City.\\r\\n(j) Cemetery \\r\\n(1) A Cemetery shall have a minimum site area of 20 acres.\\r\\n(2) All buildings, structures, gravestones, and other structures associated with a \\r\\nCemetery shall be located at least 100 feet from all lot lines abutting a residential \\r\\nzoning district.\\r\\n(3) A Cemetery may be located adjacent to a residential district or use if situated at the \\r\\nterminus of a residential block. In this instance, screening shall be provided as \\r\\nrequired in Section 1120.03 . \\r\\n(4) A Cemetery in concert with Funeral Services shall comply with the regulations \\r\\nprovided in 1106.02 (p). \\r\\n(k) Communication Facility \\r\\n(1) The base and all related facilities and structures of the proposed wireless \\r\\ntelecommunications facilities will be effectively screened from view.\\r\\n(2) All utilities at the site shall be installed underground and in compliance with all \\r\\nlaws, ordinances, rules and regulations of the City, including specifically, but not \\r\\nlimited to, the National Electrical Safety Code and the National Electrical Code \\r\\nwhere appropriate. \\r\\n(3) Access roads, turn-around space and parking have been provided to assure \\r\\nadequate emergency and service access.\\r\\n(4) Maximum use of existing roads, whether public or private, shall be made to the \\r\\nextent practicable.\\r\\n(5) Road construction shall minimize ground disturbance and the cutting of vegetation.\\r\\n(6) Road grades shall closely follow natural contours to assure minimal visual \\r\\ndisturbance and reduce soil erosion.\\r\\n(7) Any new tower to be constructed on the site shall be no higher than necessary, and \\r\\nin no case, higher than 190 above existing grade.\\r\\n(8) Wireless telecommunications facilities shall not be artificially lighted or marked, \\r\\nexcept as required by law.\\nZoning Code Page 49\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 49\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(9) Towers shall be galvanized and painted with a rust-preventive paint of a non\\u0002contrasting gray or similar color to harmonize with the surroundings and shall be \\r\\nmaintained in accordance with the requirements of this chapter.\\r\\n(10) All wireless telecommunications facilities and antennas shall be fenced or otherwise \\r\\nsecured in a manner that prevents unauthorized access. Specifically:\\r\\nA. All antennas, towers and other supporting structures, including guy wires, shall \\r\\nbe made inaccessible to individuals and constructed or shielded in such a \\r\\nmanner that they cannot be climbed or collided with; and\\r\\nB. Transmitters and telecommunications control points shall be installed in such a \\r\\nmanner that they are readily accessible only to persons authorized to operate or \\r\\nservice them.\\r\\n(11) Wireless telecommunications facilities shall contain a sign no larger than four \\r\\nsquare feet located near the base of the tower in order to provide adequate \\r\\nnotification to persons in the immediate area of the presence of an antenna that has \\r\\ntransmission capabilities and shall contain the name(s) of the owner(s) and \\r\\noperator(s) of the antenna(s), as well as emergency phone number(s). The sign shall \\r\\nbe on the equipment shelter or cabinet of the applicant and be visible from the access \\r\\npoint of the site and must identify the equipment owner of the shelter or cabinet. The \\r\\nsign shall not be lighted, unless lighting is required by applicable law, rule or \\r\\nregulation. No other signage, including advertising, shall be permitted.\\r\\n(12) All proposed towers and any other proposed wireless telecommunications facility \\r\\nstructures shall be set back from any residential property line a minimum of a \\r\\ndistance equal to the height of the proposed tower or wireless telecommunications \\r\\nfacility structure plus 50% of the height of the tower or structure.\\r\\n(13) All proposed towers and any other proposed wireless telecommunications facility \\r\\nstructures shall be set back from any nonresidential property line a minimum of a \\r\\ndistance equal to the height of the proposed tower or wireless telecommunications \\r\\nfacility structure plus 25% of the height of the tower or structure.\\r\\n(l) Community Center\\r\\n(1) A Community Center shall be located with access to an arterial street or on a street \\r\\npavement wider than 30 feet.\\r\\n(2) The following dimensional requirements shall be applicable only to the construction \\r\\nof a new building:\\r\\nA. Minimum lot area: 40,000 square feet.\\nZoning Code Page 50\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 50\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nB. Minimum yards: 2.25 feet of horizontal distance shall be provided for each one \\r\\nfoot of building height measured between the nearest point of any lot line and \\r\\nthe nearest point from which the height is measured.\\r\\n(m)Community Garden\\r\\n(1) Activities and structures may include greenhouses, hoop houses, cold frames, sheds, \\r\\nwater capture facilities, or other small structures for the keeping of tools and \\r\\nequipment, composting, and needs for the Community Garden. \\r\\n(2) Structures are subject to the requirements of the applicable zoning district.\\r\\n(3) Community Garden activities shall be managed to prevent infestation of insects and \\r\\nother pests.\\r\\n(4) A Community Garden shall be free of rank weeds. \\r\\n(5) Composting practices provided on-site shall not include the burning of materials. \\r\\n(n) Educational Institution \\r\\n(1) An Educational Institution shall not be located mid-block in between two residential \\r\\ndistricts or uses.\\r\\n(2) An Educational Institution may be located adjacent to a residential district or use if \\r\\nsituated at the terminus of a residential block. In this instance, screening shall be \\r\\nprovided as required in Section 1120.03 . \\r\\n(o) Financial Institution \\r\\n(1) In the C-DT district: \\r\\nA. A Financial Institution with Drive-Thru Facilities is prohibited.\\r\\nB. An ATM is allowed but shall only be provided in such a manner that it is only \\r\\naccessible to pedestrians. \\r\\n(p) Funeral Services\\r\\n(1) A Funeral Services site shall have a minimum frontage of 120 feet and a minimum \\r\\nlot area of 40,000 square feet.\\r\\n(2) Funeral Services shall be located at least 100 feet from any residential district or use.\\r\\n(3) Funeral Services including cremation or embalming shall be constructed, installed, \\r\\noperated, and maintained in accordance with all manufacturer\\u2019s specifications and \\r\\nall applicable federal, state, and local permits. City inspectors shall have the right to \\r\\nenter and inspect the operations to determine compliance with this provision.\\r\\n(q) Hospital \\nZoning Code Page 51\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 51\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(1) A conditional use permit is required for any associated flight facilities necessary to \\r\\nthe Hospital\\u2019s operations.\\r\\n(r) Indoor Commercial Amusement \\r\\n(1) No ancillary or accessory activities associated with an Indoor Commercial \\r\\nAmusement shall be provided outside. Such activities shall cause an Indoor \\r\\nCommercial Amusement use to be classified as an Outdoor Commercial \\r\\nAmusement. \\r\\n(2) In the C-NC district, the maximum building footprint of an Indoor Commercial \\r\\nAmusement on a lot is 10,000 square feet.\\r\\n(s) Kennel\\r\\n(1) A Kennel shall comply with the following requirements: \\r\\nA. A minimum lot area of 20,000 square foot shall be provided. \\r\\nB. The following setbacks apply: \\r\\ni. Front: 50 feet\\r\\nii. Side: 40 feet\\r\\niii. Rear: 50 feet\\r\\nC. All structures shall be located at least 200 feet from a Residential district.\\r\\nD. Outside runs used for animals are prohibited, and all services shall be provided \\r\\nwithin a fully enclosed building.\\r\\n(2) In the C-NC district, the maximum building footprint of a Kennel on a lot is 10,000 \\r\\nsquare feet.\\r\\n(t) Major Utilities and Public Service Facility \\r\\n(1) Site Standards for Facilities\\r\\nA. Utility substations shall be located at least 100 feet from a Residential district \\r\\nboundary.\\r\\nB. The site shall access an arterial street or on a street pavement wider than 30 feet.\\r\\nC. All proposed uses and facilities located within 100 feet of a Residential district \\r\\nshall be contained within buildings or structures.\\r\\nD. A landscaped berm at least five feet in height shall be required in all yards \\r\\nabutting a Residential district or street.\\r\\n(2) Location of Utility Lines\\nZoning Code Page 52\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 52\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nA. Such use shall not endanger the health and safety of residents or workers in the \\r\\narea.\\r\\nB. The location of the use shall provide for minimal visual impact and shall not \\r\\nimpair the use of surrounding properties.\\r\\nC. The alignment of the use shall follow the topography to minimize any effects to \\r\\nthe terrain.\\r\\nD. There shall be minimal vegetative clearance for soil erosion control.\\r\\n(u) Microbrewery \\r\\n(1) A Microbrewery shall comply with the brewing regulations as provided in State \\r\\nLaw. \\r\\n(2) A Microbrewery includes on-site consumption as a principal or ancillary use.\\r\\n(3) A Microbrewery may include other ancillary uses like food and retail sales, tasting \\r\\nevents, or private parties.\\r\\n(4) A Microbrewery shall utilize best management practices and available technology to \\r\\nminimize potential adverse odors associated with the use.\\r\\n(5) In the C-NC district and C-DT-E subdistrict: \\r\\nA. The maximum building footprint of a Microbrewery on a lot is 10,000 square feet.\\r\\nB. A Microbrewery shall be located 150 feet from religious land uses and schools.\\r\\nC. No outdoor storage is permitted, including parking and storage of vehicles \\r\\nassociated with the business.\\r\\n(v) Microdistillery\\r\\n(1) A Microdistillery shall comply with the distilling regulations as provided in State \\r\\nLaw. \\r\\n(2) A Microdistillery shall comply with the regulations provided in Section 1106.02 (u). \\r\\n(w)Mineral Extraction\\r\\nMineral Extraction is subject to the following specific requirements:\\r\\n(1) A license to operate shall be obtained from the Department of Natural Resources \\r\\n(DNR). Failure to maintain said license shall constitute abandonment.\\r\\n(2) An application for such operation shall set forth the following information (compare \\r\\nto DNR requirements):\\r\\nA. Name of the owner or owners of land from which removal is to be made.\\r\\nB. Name of the applicant making request for such a permit.\\nZoning Code Page 53\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 53\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nC. Name of the person or corporation conducting the actual removal operation.\\r\\nD. Location, description and size of the area from which the removal is to be made.\\r\\nE. Type of resources or materials to be removed.\\r\\nF. Proposed method of removal and whether or not blasting or other use of \\r\\nexplosives will be required.\\r\\nG. Description of equipment to be used.\\r\\nH. Anticipated ending date for extraction and the method of rehabilitation and \\r\\nreclamation of the area.\\r\\nI. The means that will be used to prevent the deposition of mud and debris from \\r\\ntrucks on public streets and highways.\\r\\nJ. The means of controlling fugitive dust from the extraction.\\r\\nK. Certification that all state and federal regulations can and will be met.\\r\\n(3) Mineral Extraction shall not occur within 1,000 feet of a Residential District.\\r\\n(4) Mineral Extraction shall not occur within 100 feet of abutting property or a street.\\r\\n(5) The banks of an extraction site less than five feet deep, shall be sloped at a grade of \\r\\nnot less than three feet horizontal to one foot vertical, and such banks shall be \\r\\nsurfaced with at least six inches of suitable soil and seeded with a vegetative cover to \\r\\nprevent erosion.\\r\\n(6) Whenever the floor of an extraction site is more than five feet below the grade of the \\r\\nsite\\u0027s perimeter or the site contains more than three feet of water, the site shall be \\r\\ncompletely enclosed by a barrier consisting of a fence on not less than a six foot high \\r\\nmound of earth planted with suitable dense planting or other suitable material \\r\\nsufficient in either case to prevent persons from entering the site. Such mound shall \\r\\nbe located at least 25 feet from any street, road, highway or boundary of the quarry \\r\\nproperty.\\r\\n(7) All quarrying, blasting, drilling or mining shall be carried out in a manner and on \\r\\nsuch scale as to minimize dust, noise and vibrations and to prevent adversely \\r\\naffecting the surrounding properties. A blasting permit shall be obtained from the \\r\\nSpringfield Fire Division for all blasting that is done.\\r\\n(x) Minor Utilities and Public Service Facility \\r\\n(1) Minor Utilities and Public Service Facility shall comply with the regulations \\r\\nprovided in Section 1106.02 (t). \\r\\n(y) Outdoor Commercial Amusement \\nZoning Code Page 54\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 54\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(1) An Outdoor Commercial Amusement use shall be located 500 feet from any \\r\\nresidential district or use. \\r\\n(z) Pawnbroker\\r\\n(1) A Pawnbroker shall meet all local, county, state, and federal rules, regulations, and \\r\\nordinances pertaining to the use. \\r\\n(2) A Pawnbroker shall comply with the regulations provided in CHAPTER 743 \\r\\nPawnbrokers. \\r\\n(3) A Pawnbroker shall be located at least 1,000 feet from another Pawnbroker. \\r\\n(aa) Religious Land Use\\r\\n(1) A Religious Land Use shall be located with access to an arterial street or on a street \\r\\npavement wider than 30 feet.\\r\\n(2) The following dimensional requirements shall be applicable only to the construction \\r\\nof a new building:\\r\\nA. Minimum lot area: 40,000 square feet.\\r\\nB. Minimum yards: 2.25 feet of horizontal distance shall be provided for each one \\r\\nfoot of building height measured between the nearest point of any lot line and \\r\\nthe nearest point from which the height is measured. \\r\\n(bb) Restaurant \\r\\n(1) In the C-NC district the maximum building footprint of a Restaurant on a lot is \\r\\n10,000 square feet.\\r\\n(2) In the C-NC district a Restaurant with Drive-Thru Facilities is prohibited if the \\r\\nRestaurant will abut a residential district or use. \\r\\n(3) In the C-DT district a Restaurant with Drive-Thru Facilities is prohibited.\\r\\n(cc)Retail Store\\r\\n(1) In the C-NC district the maximum building footprint of a Retail Store on a lot is \\r\\n10,000 square feet.\\r\\n(dd) Salvage Yard\\r\\n(1) A Salvage Yard shall meet all local, county, and state rules, regulations, and \\r\\nordinances pertaining to the use. \\r\\n(2) A Salvage Yard shall comply with the regulations provided in CHAPTER 739 \\r\\nSalvage Yard Operators. \\r\\n(3) A Salvage Yard shall be located at least 1,000 feet from a residential district.\\nZoning Code Page 55\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 55\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(4) Any outdoor storage shall be conducted entirely within an enclosed fence, wall or \\r\\nother solid screen as provided in Section 1120.03 . \\r\\n(5) Solid gates shall be provided at driveway areas. \\r\\n(6) Such enclosures shall be constructed on or inside the front, side and rear lot lines and \\r\\nshall be constructed in such a manner that no outdoor storage or salvage operations \\r\\nshall be visible from an adjacent property, street or highway. \\r\\n(7) Storage, either temporary or permanent, between such fence or wall and any \\r\\nproperty line is expressly prohibited. \\r\\n(8) Junk or salvage materials shall not form part of the fence, be piled higher than the \\r\\nheight of the fence, nor be placed against the fence.\\r\\n(9) For fire protection, an unobstructed firebreak eight feet in width shall be maintained \\r\\naround the entire Salvage Yard.\\r\\n(10) The storage of rags, paper and similar combustible waste shall not be closer than 100 \\r\\nfeet to any property line, unless enclosed in a masonry building of not less than four\\u0002hour fire resistive construction.\\r\\n(ee) Self-Storage Facility \\r\\n(1) A Self-Storage Facility shall be secured so that access is limited to tenants (or \\r\\nowners) and fire, police, or emergency service officials. \\r\\n(2) A Self-Storage Facility shall provide adequate drive aisles between all buildings for \\r\\nvehicle circulation and fire and emergency access. \\r\\n(3) A Self-Storage Facility unit shall not be used for the storage of explosives, \\r\\nammunition, or hazardous or flammable materials. \\r\\n(4) Self-Storage Facility units shall be used solely for the purpose of storage of goods \\r\\nand possessions and shall not be used for the operation of a business, hobby, band \\r\\nrehearsal, or any type of activity not related to the storage of personal property of \\r\\nthe owner or tenant of the unit. \\r\\n(5) Outdoor storage may be allowed in approved on-site areas for vehicles and \\r\\nrecreational equipment if they are covered by an awning or canopy structure.\\r\\n(6) The Self-Storage Facility may include accessory on-site offices and living quarters. \\r\\n(7) These accessory spaces shall not exceed more than 3,000 square feet. \\r\\n(ff) Sexually Oriented Business \\r\\n(1) A Sexually Oriented Business shall comply with the regulations provided in \\r\\nCHAPTER 707 Sexually Oriented Businesses. \\r\\n(gg) Urban Farm\\nZoning Code Page 56\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 56\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(1) An Urban Farm shall comply with the regulations provided in Section 1106.02 (m). \\r\\n(2) Any non-household animals provided on an Urban Farm shall comply with the \\r\\nregulations provided in CHAPTER 1124 - Animal Regulations. \\r\\n(hh) Veterinarian Facility \\r\\n(1) Outside runs used for the treatment of animals is prohibited in the C-NC district. \\r\\n(2) In the R-AG district, a Veterinarian Facility may treat and house non-household \\r\\nanimals. \\r\\n(3) In the R-AG district, a Veterinarian Facility shall be enclosed and screened as \\r\\nprovided in Section 1120.03 or fenced as provided in Section 1120.04 (d) to restrain \\r\\nanimals from running at large. \\r\\nCHAPTER 1107 - Accessory Uses and Features Standards\\r\\n1107.01 Purpose\\r\\nThis Chapter authorizes the establishment of accessory uses, buildings, and functions, \\r\\ncollectively referred to as accessory features, that are incidental and customarily subordinate to \\r\\nprincipal uses. An item is \\u201Caccessory\\u201D if it is \\u201Cincidental and customarily subordinate\\u201D to a \\r\\nprincipal use and complies with the standards established in this Chapter. All principal uses \\r\\nallowed in a zoning district shall be deemed to include those accessory uses, buildings, and \\r\\nfunctions typically associated with the use, unless specifically prohibited in this Chapter.\\r\\n1107.02 Approval Procedure\\r\\n(a) Generally. Any of the accessory uses identified in this Title may be allowed as accessory \\r\\nto an authorized principal use provided that:\\r\\n(1) The proposed accessory feature is allowed in the base district where proposed; and\\r\\n(2) The proposed accessory feature is consistent with the general and specific standards \\r\\nfor accessory uses in this Chapter.\\r\\n(b) Simultaneously with a Principal Use. Accessory features may be reviewed as part of \\r\\nreview of an associated principal use. In cases where the principal use is subject to a \\r\\nConditional Use Permit, an accessory feature may only be authorized in accordance with \\r\\nan approved Conditional Use Permit.\\r\\n(c) Subsequent to a Principal Use\\r\\n(1) Unless exempted, a building permit shall be required in cases where an accessory \\r\\nuse or building is proposed subsequent to a principal use.\\nZoning Code Page 57\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 57\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(2) In cases where the principal use is subject to a Conditional Use Permit, an accessory \\r\\nuse may only be authorized in accordance with the provisions in TITLE Five -\\r\\nProcedural Standards. \\r\\n1107.03 Interpretation of Unidentified Accessory Features\\r\\nThe Community Development Director shall evaluate applications for accessory features that \\r\\nare not identified in this Chapter on a case-by-case basis, based on the following standards:\\r\\n(a) The definition of \\u0022accessory feature\\u0022 in TITLE Nine -Definitions, and the general \\r\\naccessory feature standards and limitations established in this Chapter;\\r\\n(b) The purpose and intent of the base districts in which the accessory feature is located;\\r\\n(c) Potential adverse effects the accessory feature may have on other lots, compared with \\r\\nother uses permitted in the district; and\\r\\n(d) The compatibility of the accessory feature with other uses permitted in the district.\\r\\n1107.04 General Standards for all Accessory Features\\r\\nAll accessory features shall be subject to the general standards in this Chapter, as well as any \\r\\napplicable supplemental standards in this Section and all standards applicable to the associated \\r\\nprincipal use.\\r\\n(a) Size. All accessory features shall:\\r\\n(1) Be clearly subordinate in area, extent, and purpose to the principal use or structure;\\r\\n(2) Not violate the bulk, density, parking, landscaping, or open space standards of this \\r\\nZoning Code when taken together with the principal use or structure; and\\r\\n(3) The floor area of any detached accessory building shall not exceed 50% of the floor \\r\\narea of the principal structure. The total combined floor area of all buildings shall not \\r\\nexceed the maximum lot coverage for the zoning district in which it is located.\\r\\n(b) Function. All accessory features shall directly serve the principal use or building, and be \\r\\naccessory and clearly incidental to the principal use or building.\\r\\n(c) Timing. Accessory features shall not be constructed or established prior to the start of \\r\\nconstruction of the principal use or building. An accessory feature shall not be used until \\r\\nthe construction of the principal building is complete.\\r\\n(d) Height. Accessory features shall be limited to a maximum height of 15 feet unless \\r\\nexempted from the height requirements in this Zoning Code.\\r\\n(e) Location\\r\\n(1) Accessory features shall be located on the same lot as the principal use or building.\\nZoning Code Page 58\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 58\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(2) Accessory features shall not be located within platted or recorded easements.\\r\\n(3) Accessory buildings shall be set back at least five feet from any side and 10 feet from \\r\\nany rear property line.\\r\\n(4) Accessory buildings shall be set back at least five feet from the principal use or \\r\\nbuilding on all sides.\\r\\n(5) A detached accessory building in a residence district closer to the front line than 80 \\r\\nfeet shall be no closer to any of its side lot lines than ten feet. On a corner lot whose \\r\\nrear line is the side line of a lot in a residence district, no accessory building shall be \\r\\nplaced closer than ten feet to such rear line, nor closer than 20 feet to the street line \\r\\non the side of the lot.\\r\\n(f) Miscellaneous. Any accessory building attached to a main building, except by a \\r\\nbreezeway or roofed passageway with open or latticed sides, shall comply in all respects \\r\\nwith the requirements for main buildings.\\r\\n1107.05 Accessory Feature-Specific Regulations\\r\\n(a) Accessory Dwelling Unit \\r\\n(1) Only one Accessory Dwelling Unit is allowed on a lot.\\r\\n(2) An Accessory Dwelling Unit shall comply with the required setbacks and height \\r\\nrequirements of the zoning district in which the unit is located.\\r\\n(3) An Accessory Dwelling Unit must not exceed the height of the principal dwelling.\\r\\n(4) An Accessory Dwelling Unit must connect utilities to those of the principal dwelling.\\r\\n(5) The property owner must occupy the principal dwelling or Accessory Dwelling Unit \\r\\nas the owner\\u0027s permanent residence.\\r\\n(6) An Accessory Dwelling Unit may be constructed in forms provided in Figure \\r\\n1107.05.1: ADU Types. \\nZoning Code Page 59\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 59\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nFigure 1107.05.1: ADU Types\\r\\n(7) An Accessory Dwelling Unit must comply with the requirements established in \\r\\nTable 1107.05.1: ADU Specifications. \\r\\nTable 1107.05.1: ADU Specifications\\r\\nPrincipal Use on \\r\\nLot \\uF0E2\\r\\nADU Type Allowed \\uF0E2\\r\\nMin. Lot Size Max. ADU \\r\\nDetached Size\\r\\nAttached\\r\\nTo Principal \\r\\nDwelling\\r\\nAbove Detached \\r\\nParking \\r\\nStructure\\r\\nOne-Unit \\r\\nDwelling Yes Yes Yes 6,000 square feet\\r\\n1,200 square \\r\\nfeet\\r\\nTwo-Unit \\r\\nDwelling Yes Yes Yes 10,000 square feet\\r\\n1,000 square \\r\\nfeet\\r\\nTownhome No No Yes 5,000 square \\r\\nfeet 800 square feet\\r\\nThree-Unit \\r\\nDwelling Yes No Yes 12,000 square feet 900 square feet\\r\\nFour-Unit \\r\\nDwelling Yes No Yes 14,000 square feet 850 square feet\\r\\nMulti-Unit \\r\\nDwelling Yes No Yes 18,000 square feet 800 square feet\\r\\n(8) An ADU shall be architecturally consistent with the principal dwelling by having \\r\\nsimilar:\\r\\nA. Shape and style of exterior doors and windows;\\r\\nB. Building materials;\\r\\nC. Paint color(s); and\\r\\nD. Roof style.\\nZoning Code Page 60\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 60\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(9) A Detached Accessory Dwelling Unit shall only be located in the rear of a lot.\\r\\n(b) Alternative Energy System\\r\\n(1) Solar Panels\\r\\nA. General Requirements\\r\\ni. A solar panel may be building-mounted or freestanding.\\r\\nii. Solar panels must be placed so that concentrated solar radiation or glare is \\r\\nnot directed onto nearby properties or roadways.\\r\\nB. Building-Mounted Systems\\r\\ni. A building-mounted system may be mounted on the roof or wall of a \\r\\nprincipal building or accessory structure (see Figure 1107.05.2: Building \\r\\nMounted Systems). \\r\\nii. On pitched roof buildings, the maximum height a roof-mounted solar panel \\r\\nmay rise is 18 inches.\\r\\niii. On flat roofed buildings up to 40 feet in height, the roof-mounted solar panel \\r\\nsystem is limited to a maximum height of six feet above the surface of the \\r\\nroof. \\r\\niv. On flat roofed buildings over 40 feet in height, the roof-mounted solar panel \\r\\nsystem is limited to 15 feet above the height of such structure. \\r\\nv. Roof-mounted solar energy systems are excluded from the calculation of \\r\\nbuilding height.\\r\\nvi. Wall-mounted solar panels may project up to four feet from a building fa\\u00E7ade \\r\\nand shall be integrated into the structure as an architectural feature (see \\r\\nFigure 1107.05.2: Building Mounted Systems). \\nZoning Code Page 61\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 61\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nFigure 1107.05.2: Building Mounted Systems\\r\\nC. Freestanding Systems\\r\\ni. A freestanding system is prohibited in the front yard. \\r\\nii. The maximum height of a freestanding system is ten feet in residential \\r\\ndistricts (see Figure 1107.05.3: Freestanding Systems).\\r\\nFigure 1107.05.3: Freestanding Systems\\r\\nD. Co-Location\\r\\ni. Solar panels may be co-located on existing structures such as wireless \\r\\ncommunication towers and light poles.\\nZoning Code Page 62\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 62\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nii. Solar panels may be co-located on the roof of accessory structures such as \\r\\npergolas and parking lot shade structures, and may serve as the roof as such \\r\\nstructures.\\r\\n(2) Wind Turbines\\r\\nA. Wind turbines may be designed as either vertical or horizontal axis turbines, or \\r\\ndesigns that combine elements of the different types of turbines.\\r\\nB. Wind turbines are subject to the following height restrictions:\\r\\ni. The maximum height of any ground-mounted wind turbine is the maximum \\r\\nheight allowed in the district or 35 feet, whichever is less (see Figure \\r\\n1107.05.4: Ground-Mounted Wind Turbine Specifications). A taller height \\r\\nmay be allowed by a conditional use permit.\\r\\nFigure 1107.05.4: Ground-Mounted Wind Turbine Specifications\\r\\nii. The maximum height of any wind turbine mounted upon a structure is 15 \\r\\nfeet above the height of such structure (see Figure 1107.05.5: Structure\\u0002Mounted Wind Turbine Specifications).\\nZoning Code Page 63\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 63\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nFigure 1107.05.5: Structure-Mounted Wind Turbine Specifications\\r\\niii. Maximum height is the total height of the turbine system as measured from \\r\\nthe base of the tower to the top. For vertical axis turbines, the maximum \\r\\nvertical height of the turbine blades is measured as the length of a prop at \\r\\nmaximum vertical rotation.\\r\\niv. No portion of exposed turbine blades (vertical access wind turbine) may be \\r\\nwithin 20 feet of the ground. Unexposed turbine blades (horizontal access \\r\\nwind turbine) may be within ten feet of the ground (see Figure 1107.05.4: \\r\\nGround-Mounted Wind Turbine Specifications).\\r\\nC. Ground-mounted wind turbines are permitted only in the rear yard. The tower \\r\\nmust be set back from all lot lines equal to the height of the system. No principal \\r\\nbuildings may be located within this area.\\r\\nD. All wind turbines must be equipped with manual (electronic or mechanical) and \\r\\nautomatic over speed controls to limit the blade rotation speed to within the \\r\\ndesign limits of the wind energy system.\\r\\n(c) ATM\\r\\n(1) An ATM may be provided as a standalone item or attached to a building.\\r\\n(2) An ATM attached to a building shall be located on the front or side fa\\u00E7ade of a \\r\\nbuilding to which it is attached.\\r\\n(3) Any standalone ATM providing drive-thru facilities shall satisfy the requirements \\r\\nprovided in Section 1107.05 (f).\\r\\n(d) Cargo Containers \\r\\n(1) Cargo containers shall not be used as the primary use of a property.\\nZoning Code Page 64\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 64\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(2) Cargo containers 120 square feet or smaller in size may be used as temporary \\r\\nstructures in nonresidential districts but shall not be placed in any required front or \\r\\nside yard setbacks.\\r\\n(3) Cargo containers exceeding 120 square feet are allowed in residential districts only if \\r\\nin active use for the storage of construction materials for ongoing permitted \\r\\nconstruction, or for a maximum period of seven consecutive days in association with \\r\\nthe relocation of the contents of a residential structure.\\r\\n(4) Cargo containers exceeding 120 square feet:\\r\\nA. Shall only be located in the rear yard and outside of any required setback.\\r\\nB. Shall not be placed in any required parking area.\\r\\nC. The combined area of the containers shall not exceed the floor area of the \\r\\npermanent structures on the property.\\r\\nD. The stacking of cargo containers is prohibited in all districts except for industrial \\r\\ndistricts.\\r\\nE. Screening shall be provided and comply with the requirements in Section \\r\\n1120.03. \\r\\n(5) Cargo containers exceeding 120 square feet in industrial districts may be stacked two \\r\\nhigh.\\r\\n(e) Charitable Donation Containers\\r\\n(1) Charitable donation containers shall only be allowed in nonresidential districts \\r\\nsubject to issuance of a Zoning Certificate. \\r\\n(2) Charitable donation containers shall be subject to all applicable setback requirements \\r\\nof the zoning district within which it is located.\\r\\n(3) No more than one charitable donation containers shall be permitted at one time on a \\r\\ngiven lot, combined lot, development site, or complex.\\r\\n(4) A charitable donation container shall not exceed 78 inches in height \\u2013 as measured \\r\\nfrom grade level, 60 inches in width, or 60 inches in depth.\\r\\n(5) Charitable donation containers shall not be permitted on a vacant lot, on a lot that \\r\\ncontains a vacant primary building, or on a lot that contains a primary building of \\r\\nwhich a majority of the building is vacant.\\r\\n(f) Drive-Thru Facility \\nZoning Code Page 65\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 65\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nFigure 1107.05.6: Drive-Thru Facility Standards\\r\\n(1) Any development providing a Drive-Thru Facility shall meet the requirements \\r\\nprovided in Table 1107.05.2: Drive-Thru Facility Stacking Standards. Figure \\r\\n1107.05.6: Drive-Thru Facility Standards is an example of a single Drive-Thru Facility \\r\\nwith one point of order and one service window.\\nZoning Code Page 66\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 66\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nTable 1107.05.2: Drive-Thru Facility Stacking Standards\\r\\nUse Requirement\\r\\nRestaurant \\r\\n\\u2022 3 stacking \\r\\nspaces to \\r\\neach point \\r\\nof order; \\r\\n\\u2022 3 stacking \\r\\nspaces \\r\\nbetween \\r\\nthe point \\r\\nof order\\r\\nand the \\r\\nfirst \\r\\nservice \\r\\nwindow \\r\\n(including \\r\\nthe \\r\\nposition at \\r\\nthe first \\r\\nservice \\r\\nwindow); \\r\\nand\\r\\n\\u2022 (If \\r\\napplicable) \\r\\n2 stacking \\r\\nspaces \\r\\nbetween \\r\\nthe first \\r\\nservice \\r\\nwindow \\r\\nand the \\r\\nsecond \\r\\nservice \\r\\nwindow \\r\\n(including \\r\\nthe \\r\\nposition at \\r\\nthe second \\r\\nservice \\r\\nwindow)\\r\\nAll other \\r\\nUses\\r\\n\\u2022 3 stacking \\r\\nspaces, \\r\\nincluding \\r\\nthe \\r\\nposition at \\r\\nthe service \\r\\nwindow\\nZoning Code Page 67\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\nZoning Code Page 67\\r\\nSpringfield, OH FINAL DRAFT - March 5, 2025\\r\\n(2) A stacking space is at least nine feet wide by 18 feet long, exclusive of access \\r\\ndriveways and parking aisles.\\r\\n(3) Stacking lanes shall be clearly marked and shall not interfere with on-site or off-site \\r\\ntraffic circulation.\\r\\n(4) For any Drive-Thru Facility associated with a Restaurant, stacking lanes shall be \\r\\naccompanied with an abutting 10-foot-wide bypass lane.\\r\\n(5) Stacking areas shall not be located between the front building line and the public \\r\\nstreet upon which the building fronts.\\r\\n(g) Fueling and Charging Services\\r\\n(1) Fueling and Charging Services shall not be located within 100 feet of any residential \\r\\ndistrict.\\r\\n(2) At the four corners of a street intersection, Fueling and Charging Services shall be \\r\\nrestricted to two of the four corner lots to prevent the proliferation of Fueling and \\r\\nCharging Services on all four lots. \\r\\n(3) Fueling and Charging Services may include fuel pumps, fuel pump islands, electric \\r\\nvehicle charging facilities and equipment, freestanding canopies, liquid storage \\r\\ntanks, and other associated items with fueling and charging, but shall meet the \\r\\nrequirements of this Subsection.\\r\\n(4) Any fuel pump island or other structure shall meet the zoning district\\u2019s applicable \\r\\nminimum setbacks.\\r\\n(5) All fuels shall be transferred from underground storage tanks by means of approved \\r\\ndispensing units located at least 15 feet from all property lines. All dispensers shall \\r\\nbe protected from vehicle damage by rigidly mounting them in a concrete platform \\r\\nof at least six inches in height extending a minimum of 12 \",\"is_citable\":true,\"prompt_context_metadata\":{\"mime_type\":\"application/pdf\",\"content_type\":\"html\",\"destination_url\":\"https://springfieldohio.gov/download/5349/?tmstv=1763167233\"}}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":\"Fetched: https://springfieldohio.gov/download/5349/?tmstv=1763167233\",\"integration_name\":\"Web Fetch\",\"integration_icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=springfieldohio.gov\",\"icon_name\":null,\"display_content\":{\"type\":\"rich_link\",\"link\":{\"title\":\"https://springfieldohio.gov/download/5349/?tmstv=1763167233\",\"subtitles\":null,\"url\":\"https://springfieldohio.gov/download/5349/?tmstv=1763167233\",\"resource_type\":null,\"icon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=springfieldohio.gov\",\"source\":\"springfieldohio\"},\"is_trusted\":false}}"

