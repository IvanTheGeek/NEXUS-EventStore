u00A0B.\\u00A0\\u00A0\\u00A0Additional Standards\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i.\\u00A0\\u00A0\\u00A0There is no maximum incidental sign allowance.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The sum of the incidental sign area on a lot or building\\nshall not exceed those established in Table 1119.07.9: General Incidental Sign\\nStandards.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Design and Installation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0An attached incidental sign shall affix flush against the\\nwall of the building in which it is located.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0A freestanding incidental sign shall have an enclosed base\\nand be securely and firmly embedded in the ground.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Incidental signs constructed in conjunction with a\\nfreestanding sign shall be consistent with the building elements and materials\\nof those established on the same lot and within the development.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Speaker Boards\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Generally. The required standards for speaker boards shall\\ncomply with Table 1119.07.10: Speaker Board Standards.\\nTable 1119.07.10: Speaker Board Standards\\n                            Y= sign allowed\\n                            X = sign not allowed\\nKey g                       NR = sign allowed for nonresidential uses only\\n                            \\u201C-\\u201C = the standard does not apply\\n                            C = sign allowed by Conditional Use Permit\\n                            Speaker Board: A professionally constructed and\\n                            installed sign made of a durable, weather-resistant\\n                            product such as metal or high-density plastic and\\nDefinition g                may include a two-way speaker system for ordering\\n                            from a vehicle in a drive thru lane provided the\\n                            volume of the speaker does not exceed ambient noise\\n                            conditions as measured at the property line.\\n                            R-AG                C-HC\\nDistrict g                  R-LD R-HD  C-LC     I-LI C-DT\\nRequirement i               P-PR C-NC           I-HI P-DM\\n                            R-IE\\nGeneral\\nAllowed                     X    NR    Y        X    X\\nPermit Required             -    NR    Y        -    -\\nNumber per Lot              -    2     No limit -    -\\nDimensions\\nSign Area (max. per sign)   -    25 sf 40 sf    -    -\\nSign Area (cumulative max.) -    50 sf 120 sf   -    -\\nSign Height (max.)          -    6 ft  8 ft     -    -\\nDistance/Setback\\nFrom Front Property Line    -    25 ft 50 ft    -    -\\n(min.)\\nFrom Adjacent Property      -    15 ft 25 ft    -    -\\nLines (min.)\\nFrom a Residential District -    50 ft 100 ft   -    -\\n(min.)\\nFeatures\\nExternal Illumination       -    NR    Y        -    -\\nInternal Illumination       -    NR    Y        -    -\\nChangeable Copy             -    NR    Y        -    -\\nSign Color Digital          -    NR    Y        -    -\\nMulti-Color Digital         -    X     C        -    -\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Design and Installation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0A speaker board shall provide no more than three feet and no\\nless than 18 inches of horizontal separation from the curb or edge of the\\ndriveway the speaker board faces.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Speaker boards shall provide a minimum landscaped area of\\ntwo square feet per one square foot of sign area abutting the sign base.\\n1119.08 OFF-PREMISE SIGNS\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Off-premise signs are classified into three sign types:\\nbillboards, bench billboards, and subdivision entry signs. This Section\\nprovides regulations for each off-premise sign type.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0An off-premise sign is considered an accessory use that requires\\nconditional use permit approval.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0No conditional use permit shall be granted if an off-premise sign\\nis proposed to be erected on a lot without a building or use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0An off-premise sign shall be permitted in addition to the on-\\npremise signs permitted on a lot.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Off-premise signs which otherwise comply with every other\\napplicable provision of this Chapter shall be specifically permitted upon\\nproperties abutting any route within the City designated by the federal or\\nstate governments, or National Road Ohio Scenic Byway Advisory Group, or any\\nlike organization, as a \\u0022Scenic Byway.\\u0022\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Billboards\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally. The required standards for billboards shall comply with\\nTable 1119.08.1: Billboard Standards.\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-10326.jpg]\\nTable 1119.08.1: Billboard Standards\\n                          Y= sign allowed\\n                          X = sign not allowed\\nKey g                     NR = sign allowed for nonresidential uses only\\n                          \\u201C-\\u201C = the standard does not apply\\n                          C = sign allowed by Conditional Use Permit\\n                          Billboard: A permanent off-premise freestanding sign\\n                          or sign structure upon which a message is placed on a\\n                          poster or panel and mounted on a pole or metal\\nDefinition g              structure typically with a monopole structure\\n                          constructed with tubular steel support, tubular steel\\n                          framing, and a single display panel with a concrete\\n                          foundation.\\n                          R-AG               C-HC\\nDistrict g                R-LD R-HD C-LC     I-LI     C-DT\\nRequirement i             P-PR C-NC          I-HI     P-DM\\n                          R-IE\\nGeneral\\nAllowed                   X    X    C        C        X\\nPermit Required           -    -    Y        Y        -\\nNumber per Lot            -    -    1        1        -\\nDimensions\\nSign Area (max.)          -    -    500 sf   500 sf   -\\nSign Height (max.)        -    -    35 ft    35 ft    -\\nDistance/Setback\\nFrom Front Property Line  -    -    10 ft    10 ft    -\\n(min.)\\nFrom Adjacent Property    -    -    10 ft    10 ft    -\\nLines (min.)\\nFrom Another Billboard    -    -    1,000 ft 1,000 ft -\\n(min.)\\nFrom a Residential        -    -    200 ft   200 ft   -\\nDistrict (min.)\\nFeatures\\nExternal Illumination     -    -    C        C        -\\nInternal Illumination     --   -    C        C        -\\nChangeable Copy           -    -    C        C        -\\nSingle-Color Digital      -    -    C        C        -\\nMulti-Color Digital       -    -    C        C        -\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Additional Standards\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A billboard shall not be located within 200 feet of a:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Public parking area;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Educational institution;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Religious land use;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0Cemetery; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0Government use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0A billboard shall not exceed the height prescribed in Table\\nabove the height of the nearest street grade.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Design and Installation. A billboard is not classified as a pole\\nsign.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Bench Billboards\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Design\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The length of the bench billboard shall not exceed six feet or\\n72 inches.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The height of the bench billboard shall not exceed three and one\\nhalf feet or 42 inches from the ground.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Bench billboards shall not weigh more than 250 pounds.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Seats. Seat boards shall consist of two inch by six inch boards\\nof metal, composite, or wood construction cut to appropriate lengths and\\nsufficiently protected against weatherization.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Copy Face. The back of the bench upon which sign copy may be\\nattached may not exceed twelve square feet and is to be constructed of metal\\nand/or a minimum one-half inch plywood. Exterior grade paint must be used for\\nany painted surfaces.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0Support Legs. Support legs and required armrests are to be\\nconstructed of concrete and/or metal.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0G. \\u00A0\\u00A0\\u00A0Armrests. Armrests shall be required on all bench billboards\\nexceeding 36 inches in length and shall be placed in the center and ends of the\\nbench. Armrests are to be constructed of metal, concrete, or wood.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0H. \\u00A0\\u00A0\\u00A0The bench billboard must be placed on a continuous permanent\\ndust-free surface of sufficient size and composition to maintain the stability\\nof the bench billboard. Bench billboards shall rest completely within the\\nfootprint of the surface.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0I. \\u00A0\\u00A0\\u00A0Bench billboards not firmly attached to the ground shall be\\nconstructed so as to be able to withstand a wind pressure of not less than 80\\nmiles per hour without falling over or blowing away.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A property owner may allow a bench billboard to be placed on\\nprivate property subject to the following limitations:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A sign permit is required for each bench billboard.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0No bench billboard is permitted to be located within the public\\nrights-of-way; except when the owner of the bench billboard has entered into a\\ncontract with the City for placement of bench billboards upon public rights-of-\\nway.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Bench billboards to be placed on private property may be\\npermitted only for those locations meeting the criteria for off-premises signs\\nset forth in this Section.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Bench billboards shall be placed to not interfere with or\\nobstruct the dear vision of pedestrians and motorists to detract approaching\\ntraffic at intersections; nor impede the ability of pedestrians to travel along\\npublic rights-of-way.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0All benches shall be maintained in accordance with the City\\u0027s\\nProperty Maintenance Code. Any bench billboard which has fallen into such a\\nstate of disrepair or has suffered such damage and wear to be not in compliance\\nwith the City\\u0027s Property Maintenance Code or is otherwise dangerous to use\\nshall be promptly and without delay removed or repaired.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Bench billboards shall be removed promptly and without delay from\\nlocations when the sign permit for the bench billboard expires and no\\nimmediately succeeding permit is obtained.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Bench billboards may be located within the public rights-of-way\\nonly when the owner of the bench billboard has entered into a contract with the\\nCity authorizing placement of the bench billboard upon public rights-of-ways.\\nAnd when such location meets the following requirements:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Bench billboards shall be placed on locations meeting the\\ncriteria for off-premise signs set forth in this Section.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Bench billboards shall be placed to not interfere with or\\nobstruct the clear vision of pedestrians and motorists to detect approaching\\ntraffic at intersections; nor impede the ability of pedestrians to travel along\\npublic rights-of-way.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0No bench billboard shall contribute to visual clutter or create\\na dangerous distraction or obstruction for pedestrians and motorists.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Subdivision Entry Sign\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally. The required standards for subdivision entry signs\\nshall comply with Table 1119.08.2: Subdivision Entry Sign Standards.\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-10386.jpg]\\nTable 1119.08.2: Subdivision Entry Sign Standards\\n                          Y= sign allowed\\n                          X = sign not allowed\\nKey g                     NR = sign allowed for nonresidential uses only\\n                          \\u201C-\\u201C = the standard does not apply\\n                          C = sign allowed by Conditional Use Permit\\n                          Subdivision Entry Sign: A permanent off-premise\\nDefinition g              freestanding sign of the monument sign variety\\n                          located at the entry of a platted subdivision from a\\n                          local, collector, or arterial street.\\n                          R-AG              C-HC\\nDistrict g                R-LD  R-HD  C-LC  I-LI  C-DT\\nRequirement i             P-PR  C-NC        I-HI  P-DM\\n                          R-IE\\nGeneral\\nAllowed                   Y     Y     Y     Y     X\\nPermit Required           Y     Y     Y     Y     -\\nDimensions\\nSign Area (max.)          50 sf 50 sf 75 sf 75 sf -\\nSign Height (max.)        6 ft  8 ft  8 ft  8 ft  -\\nDistance/Setback\\nFrom Front Property Line  5 ft  5 ft  10 ft 10 ft -\\n(min.)\\nFrom Adjacent Property    5 ft  5 ft  10 ft 10 ft -\\nLines (min.)\\nFeatures\\nExternal Illumination     Y     Y     Y     Y     -\\nInternal Illumination     Y     Y     Y     Y     -\\nChangeable Copy           X     X     X     X     -\\nSingle-Color Digital      X     X     X     X     -\\nMulti-Color Digital       X     X     X     X     -\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Design and Installation. Two (2) subdivision entry signs may be\\nlocated at the intersection of a local, collector, or arterial street and an\\nentry street or private driveway into a subdivision. The signs shall be\\nconfigured as follows:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Two (2) signs with one (1) sign face each located on opposite\\nsides of the entry street or private driveway;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0One (1) sign with two (2) faces located within a landscaped area\\ndividing two (2) one-way entry streets or private driveways; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0One (1) sign located on one (1) side of the entry street or\\nprivate driveway.\\n1119.09 TEMPORARY SIGNS.\\n\\u00A0\\u00A0\\u00A0The Community Development Director may issue Temporary Sign Permits, subject\\nto the following limitations:\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0No temporary sign shall be permitted if displaying the sign will be\\ninjurious to or contrary to the purposes to be accomplished by this Chapter.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0If the temporary sign is not firmly attached to the ground or to a\\nbuilding, the temporary sign shall be constructed to be able to withstand a\\nwind pressure of not less than 80 miles per hour without falling over or\\nblowing away.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0No sign shall be displayed for more than 30 consecutive days.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0No more than six Temporary Sign Permits shall be issued to any one\\noccupied unit within any one calendar year.\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0No more than one Temporary Sign permit shall be issued to any one\\noccupied unit for display of a temporary sign during any one time.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0No more than one temporary sign shall be displayed for every 100\\nlinear feet of frontage in a nonresidential development.\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Signs shall not be located closer than 10 feet from the property line\\nor lease line for the address separating such address from the adjacent\\naddress.\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Additional signage or exceptions to these regulations may be\\nrequested through a conditional use permit application to the Board of Zoning\\nAppeals.\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0A minimum time period of 14 consecutive days in which no temporary\\nsignage is displayed must elapse between the removal and placement of any\\nsubsequent temporary signage.\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Temporary signs must be removed upon expiration of the temporary sign\\npermit.\\n\\u00A0\\u00A0\\u00A0(k) \\u00A0\\u00A0\\u00A0Expired and non-permitted temporary signs are to be defined and\\ntreated as \\u0027rubbish\\u0027 pursuant to Chapter\\n1323 of Part 13 of the Codified Ordinances of Springfield, Ohio, for the\\npurposes of removal by the City.\\nCHAPTER 1120\\nScreening and Fencing\\n1120.01\\u00A0\\u00A0\\u00A0Purpose.\\n1120.02\\u00A0\\u00A0\\u00A0Applicability.\\n1120.03\\u00A0\\u00A0\\u00A0Screening standards.\\n1120.04\\u00A0\\u00A0\\u00A0Fencing standards.\\n\\u00A0\\n1120.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0The purposes of this Chapter are to:\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Minimize conflicts between potentially incompatible land uses and\\ndevelopment on abutting property;\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Ensure that screens and fences are attractive and in character with\\nthe community;\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Maintain fences by recognizing their use to create privacy; and\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Distinguish screens and fences from each other by clearly defining\\nthe two terms and applying specific standards to each term.\\n1120.02 APPLICABILITY.\\n\\u00A0\\u00A0\\u00A0This Chapter applies to all development within the Springfield city limits.\\nThis Chapter does not apply to residential development unless otherwise\\nspecified.\\n1120.03 SCREENING STANDARDS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Screening Summary\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Screening shall meet the standards and apply as provided in Table\\n1120.03.1: Screening Summary and Section\\n1120.03(b).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Screening composition shall consist of one or a combination of the\\nfollowing screen types as provided in Table 1120.03.1: Screening Summary unless\\nspecified elsewhere in this Zoning Code.\\nTable 1120.03.1: Screening Summary\\n                                        Applicable     Screen Type   Height\\nScreen Type Composition                 Screening      Allowed       Min. Max.\\n                                        Scenario\\n            An evergreen\\n            planting\\n            screen of\\n            pyramidal                   Nonresidential\\n            arbor vitae                 Development in\\n            with                        a\\n            plantings                   Nonresidential\\nA           being at                    District       A, B, C, D, E 6 ft 8 ft\\n            least three                 abutting a\\n            (3) feet                    Residential\\n            high, spaced                District\\n            four (4) feet\\n            on center at\\n            time of\\n            planting\\n            A solid\\n            opaque wall\\n            comprised of                Development in\\n            masonry                     a Residential\\n            (brick,                     District\\nB           stone, etc.),               abutting a     A, C, E       6 ft 8 ft\\n            concrete                    Residential\\n            block, or                   District\\n            precast\\n            concrete\\n            panels\\n            A wrought-\\n            iron or\\n            tubular steel\\n            fence with\\n            masonry\\n            columns at 20               Around Waste\\nC           feet on                     Enclosures     A, B, E       6 ft 10 ft\\n            center with a               (see Section)\\n            mix of shrubs\\n            and trees\\n            located\\n            between\\n            masonry\\n            columns\\n            An earthen\\n            berm at least\\n            twenty (20)\\n            feet wide\\n            with a\\n            maximum slope\\n            height\\nD           exceeding at                Outdoor        A, B, C, D, E 6 ft 10 ft\\n            least six (6)               Storage\\n            feet covered\\n            with grass,\\n            shrubs, and\\n            trees planted\\n            at the base\\n            between\\n            slopes\\n            Alternate\\n            equivalent\\n            screening\\n            composition\\n            that provides\\n            an\\n            exceptional\\n            screening\\n            aesthetic,\\n            meets sound\\n            structural\\nE           practices and               Loading Areas  A, B, C, D, E 8 ft 10 ft\\n            engineering\\n            design\\n            criteria, and\\n            meets the\\n            intent and\\n            function of\\n            this Chapter\\n            at the\\n            discretion of\\n            the Planning\\n            Board\\n                          Parking Row\\n                          abutting and\\n                          facing ROW or                A, B          3 ft 6 ft\\n                          Residential\\n                          District\\n                          HVAC and\\n                          Mechanical    A, B, C                      3 ft 6 ft\\n                          Equipment\\n                          Other\\n                          Required      A, B, C, D, E                6 ft 8 ft\\n                          Screening\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Figure 1120.03.1: Examples of Screening Types shows examples of\\nsome of the screening types.\\nFigure 1120.03.1: Examples of Screening Types\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-10447.jpg]\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Screening Specifications\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Applicable required screening shall be provided along the\\nproperty lines of the subject property unless otherwise specified.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Screening comprised of masonry, concrete, or metal shall not be\\nerected or placed that would interfere with the installation or maintenance of\\nany public utility line, service, or drainage way within a dedicated easement\\nunless approved by the Community Development Director.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0For screening using any vegetation or plant material provided at\\nthe time of installation shall be a minimum of three (3) feet tall measured\\nfrom the natural grade. Vegetation or plant material provided shall reach a\\nmaturity height of at least six (6) feet one (1) year after installation.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Screening shall not conflict with the sight visibility triangle\\nrequirements of Section\\n1115.03 (e).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Before certificate of occupancy issuance, all approved screening\\nmust be in place.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0All screening shall be permanently and continually maintained in\\na neat and orderly manner as a condition of use. The certificate of occupancy\\nmay be revoked by the Community Development Director for failure to adequately\\nmaintain such screening.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0G. \\u00A0\\u00A0\\u00A0Screening may be waived by the Community Development Director\\nwhere the view is or will be blocked by a change in grade or by natural or\\nhuman-made features to the same degree as would be provided by screening which\\nmeets the requirements of this Chapter.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Screening within Residential Contexts\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Any required screening provided by a more intensive use abutting\\na residential use or district shall be permanently and adequately maintained by\\nthe more intensive use\\u0027 s property owner.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0If there is existing screening or fence along a residential\\nproperty line and a nonresidential use is proposed, the required screening\\nshall be a living plant screen that complies with this Section and is deemed\\nacceptable by the Community Development Director. However, this requirement may\\nbe waived if a 5-foot minimum space between two screens and fences are provided\\nfor maintenance access. The intent of these requirements is to eliminate\\nscreening situations where two screening walls or fences directly abut each\\nother.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Screening shall not be erected, placed, or planted beyond the\\nfront building line of any permitted building in a residential district, either\\non a comer lot or interior lot, unless otherwise allowed by the Board of Zoning\\nAppeals through a variance request.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Where a nonresidential use abuts a residential lot or use, the\\nside and rear property lines abutting that residential lot or use shall be\\nsuitably screened by the nonresidential use so as to obscure the view from the\\nresidential lot, use, or district to the nonresidential use to a height not\\nless than six feet (see the blue dashed line in Figure 1120.03.2: Required\\nScreening Abutting a Residential Lot/Use).\\nFigure 1120.03.2: Required Screening Abutting a Residential Lot/Use\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-10532.bmp]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Where an apartment development abuts a residential use or\\ndistrict, the side and rear property lines of that apartment development shall\\nbe screened from view of adjacent dwelling(s) (see the blue dashed line in\\nFigure 1120.03.3: Required Apartment Screening Abutting a Residential Lot/Use).\\nFigure 1120.03.3: Required Apartment Screening Abutting a Residential Lot/Use\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-10618.bmp]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0Screening requirements are not required for educational\\ninstitutions, active and passive park/recreational facilities, or religious\\nland uses, except where a parking lot or active outdoor intensive use area\\n(such as a playground) is adjacent to a residential lot or dwelling.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Screening for HV AC and Mechanical Equipment\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Ground mechanical and heating and air conditioning equipment in\\nnonresidential and multi-family uses shall be screened from view from the\\npublic right-of-way and from adjacent residential property.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Roof-mounted mechanical units shall be screened from view at a\\npoint of four feet above the property line with a parapet wall, mansard roof,\\nor alternative architectural element.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The height of the screening device shall be equal to or greater\\nthan the height of the mechanical unit provided that the device shall not\\nextend more than six feet above the roof on a one- or two-story building or\\nmore than twelve feet above the roof on a building of three or more stories.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0A mechanical unit that is taller than the maximum permitted\\nheight of the screening feature shall be set back from the screen three feet\\nplus one foot for each foot exceeding the height of the screen.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Screening for mechanical units shall apply to new building\\nconstruction only.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Screening for Parking\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Where a parking area is provided within 50 feet on the same side\\nof the street as a lot in a Residential district, the lot shall be screened\\nfrom view of that portion of the parking area within 50 feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Where a parking area is provided on a lot within 150 feet across\\nthe street from an Residential district, the lot shall be screened from view of\\nthat portion of the parking area within 150 feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Wherever a parking lot or driveway adjoins a residential\\ndistrict, such parking lot or driveway shall be separated and screened from the\\nresidential district pursuant to this Section.\\n1120.04 FENCING STANDARDS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Fences are not required for any property within Springfield city\\nlimits.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0No fences exceeding three (3) feet in height shall be allowed in\\nthe required front yard in any residential district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0No fence is allowed in the required right-of-way.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4)\\u00A0\\u00A0\\u00A0No fence shall conflict with the sight visibility triangle\\nrequirements of Section\\n1115.03 (e).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Every fenced enclosure constructed under the provisions of this\\nSection shall have at least one gate in its perimeter.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0All fences constructed under the provisions of this Section shall\\nbe maintained to comply with the requirements of this Section at all times. The\\nCommunity Development Director may order the repair or removal of a fence if it\\nis more than 10% damaged or leaning 20 degrees from vertical. Fences shall be\\nrepaired in compliance with the provisions of this Section.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Corner Lots\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0On all comer lots in residential districts that have opposing rear\\nlot lines, fences may be constructed not to exceed six feet in height along the\\nside and rear lot lines, as indicated in Figure 1120.04.1: 6-Foot Fence Height\\nLimit.\\nFigure 1120.04.1: 6-Foot Fence Height Limit\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-10680.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0On all residential district comer lots where the rear lot line is\\nopposed to a side lot line across an alley from that side lot line, no fence\\nexceeding three feet in height shall be constructed upon or within the side\\nyard that is next to the street at a distance from the side building line\\ngreater than the minimum side yard requirement, as indicated in Figure\\n1120.04.2: Fence Near Alley.\\nFigure 1120.04.2: Fence Near Alley\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-10743.jpg]\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Design Requirements\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The minimum fence height is six feet from natural grade with a\\nmaximum height of eight feet, unless otherwise specified.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Treated lumber shall be used, attached with galvanized screws to\\ngalvanized poles installed in two feet of premixed concrete.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Security Fencing. Except in the R-AG district, barbed wire and\\nelectric fences are subject to the following requirements.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Barbed wire shall consist of twisted wires with barbs on each wire\\na minimum distance of four inches apart. Concertina wire shall be prohibited.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Except for the enclosure of agricultural operations, barbed wire\\nfences shall be permitted only in the R-AG district, provided that the bottom\\nstrand of barbed wire shall not be less than six feet above grade.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Barbed wire may be placed on gate arms and fences and screens at\\nleast eight feet above natural grade in industrial districts.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0An electric fence for the enclosure of agricultural operations\\nshall not carry a charge greater than 25 milliamperes nor a pulsating current\\nlonger than one-tenth (1/10) second in a one second cycle. All electric fence\\ncharges shall carry the seal of an approved testing laboratory.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Barbed wire and electric fences shall be prohibited within five\\nfeet of a public sidewalk or within five feet of a street right-of-way line\\nwhere a public sidewalk does not now exist.\\nCHAPTER 1121\\nWaste Management\\n1121.01\\u00A0\\u00A0\\u00A0Purpose.\\n1121.02\\u00A0\\u00A0\\u00A0Applicability.\\n1121.03\\u00A0\\u00A0\\u00A0Standards.\\n1121.04\\u00A0\\u00A0\\u00A0Alternative compliance.\\n\\u00A0\\n1121.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0The purpose of this Chapter is to provide adequate provisions for on-site\\nwaste disposal and collection while promoting sightly development.\\n1121.02 APPLICABILITY.\\n\\u00A0\\u00A0\\u00A0This Chapter applies to all nonresidential development within Springfield\\ncity limits. This Chapter does not apply to residential development unless\\notherwise specified.\\n1121.03 STANDARDS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally. Waste facilities within the R-HD, C-NC, C-LC, C-HC, I-LI,\\nI-HI, P-PR, P-IE, and P-DM districts shall comply with the minimum standards\\nbelow.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Waste facilities require waste enclosures and shall meet the\\nrequirements established in Section\\n1120.03.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Waste enclosure screening materials shall be as provided in\\nSection\\n1120.03 with the additional allowance of the use of metal or wood. Screening\\nmaterials shall be of the colors provided on the exterior walls of the main\\nbuilding.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0All waste enclosures shall be fully screened on all sides except\\nfor the side where the waste facility is accessed.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0A solid metal gate is required, and when open, shall not encroach\\ninto any fire lane.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0No solid metal gate shall exceed 10 feet in height.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Gates shall remain closed except when in use for access.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0One waste enclosure is required on every lot unless a double waste\\nenclosure is provided on an adjacent lot and access is mutually agreed upon by\\nthe two lot owners.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Waste facilities shall not be located in front of the main\\nbuilding unless no other option is available as determined by the Community\\nDevelopment Director.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Design. Waste facilities within the R-HD, C-NC, C-LC, C-HC, I-LI, I-\\nHI, P-PR, P-IE, and P-DM districts shall comply with the design specifications\\nbelow.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Required waste enclosures shall have a minimum inside dimension of\\n12 feet by 12 feet with a waste enclosure gate opening of not less than 12 feet\\nin width.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A turnaround area shall be provided of sufficient length to allow\\nthe collection truck to exit without backing onto a public right-of-way.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Urban Waste Management Solutions. Within the C-NC and C-DT districts,\\nCity contractor approved rolling carts and wheeled dumpsters may be used to\\nmeet this Chapter\\u0027s requirements.\\n1121.04 ALTERNATIVE COMPLIANCE.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0The Community Development Director may approve the following\\nmodifications in this Chapter by the alternative compliance process:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Reducing the 40-foot straight backing requirement by 10 feet; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Expanding the allowance of City-contractor approved rolling carts\\nand wheeled dumpsters to properties other than those in the C-NC and C-DT\\ndistricts.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Any modification seeking greater relief than provided above requires\\na variance.\\nCHAPTER 1122\\nUrban Design\\n1122.01\\u00A0\\u00A0\\u00A0Purpose.\\n1122.02\\u00A0\\u00A0\\u00A0Applicability.\\n1122.03\\u00A0\\u00A0\\u00A0Standards.\\n\\u00A0\\n1122.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0The purposes of this Chapter are to:\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Establish minimum standards for the appearance of development and\\ncorresponding architectural design and site elements that enhance property\\nvalues, reflecting the interest of the City\\u0027s general welfare;\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Promote aesthetically appealing development in Downtown Springfield;\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Encourage the design of a developed environment that is built to\\nhuman scale; and\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Ensure buildings are compatible with its surrounding area and\\ncontributes to the unique character of Downtown Springfield.\\n1122.02 APPLICABILITY.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0This Chapter applies to development located in the C-DT district.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0This Chapter does not apply to development located in other\\ndistricts.\\n1122.03 STANDARDS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Building Entrances\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Building facades facing public streets shall incorporate a main\\nentrance door on the street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Building entrances may include doors to individual shops or\\nbusinesses, lobby entrances, entrances to pedestrian-oriented plazas, or\\ncourtyard entrances to a cluster of shops or businesses.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Blank Wall Area\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Blank wall area means any portion of the exterior fac;ade of the\\nbuilding that does not include a substantial material change; such as windows\\nor doors, or one of the expression tools included in this Section or one of the\\nbuilding elements included in this Section.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Substantial material change means a change between exterior\\nbuilding materials such as wood, metal, glass, brick, architectural block,\\nstone or stucco. Substantial material change should occur at an inside comer,\\nwhere feasible. Paint color is not a substantial material change.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Purpose\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The blank wall area regulations are intended to prevent large,\\nmonotonous expanses of undifferentiated building mass; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The level of architectural detail should be most intense at the\\nstreet level, where it is within view of the pedestrians on the sidewalk.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0General Requirements\\nFigure 1122.03.1: Blank Wall Area Summary\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-10807.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The blank wall area standard applies to any portion of an\\nexterior facade.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Blank wall area applies in both a vertical and horizontal\\ndirection.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Blank wall area applies to both ground and upper stories.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Figure 1122.03.1: Blank Wall Area Summary summarizes the blank\\nwall area requirements.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Expression Elements\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Purpose. The standards in this section are intended to ensure that\\nexpression tools utilized to satisfy the blank wall area standards are of\\nsufficient size and design to meet the intent of the blank wall area\\nrequirement.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0General Requirements\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0In addition to the requirements of Section\\n1122.03 (b), the following standards must be met:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0For primary building facades greater than 120 feet in length,\\na minimum of three expression elements must be applied. One vertical expression\\nelement and one (1) horizontal expression element (from Table 1122.03.1:\\nExpression Element Standards) must be used. The third expression element may be\\nselected from either the vertical or horizontal expression elements lists.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0For primary building facades 120 feet or less in length, a\\nminimum of two expression elements must be applied. One vertical expression\\nelement and one horizontal expression element (from Table 1122.03.1: Expression\\nElement Standards) must be used.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The standards in Table 1122.03.1: Expression Element Standards\\nare intended to ensure that the vertical and horizontal expression elements\\nutilized to satisfy the blank wall area standards are of sufficient size and\\ndesign to meet the intent of the blank wall area requirement.\\nTable 1122.03.1: Expression Element Standards\\nExpression Element i                                                             Graphic i\\nVertical Expression Elements\\nVertical Expression Line: A vertical expression line created by molding.\\nReuirements\\n\\u2219  A vertical expression line with a minimum size of at least 4 inches in depth[https://export.amlegal.com/media/\\nand 1 ft in width                                                                1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u2219  The vertical expression line must occur at a minimum interval of every 60 ftIMAGES/0-0-0-10894.bmp]\\nacross the building frontage and shall reflect historic facade widths\\nWall Notch: A front fa\\u00E7ade setback providing vertical articulation to a building fa\\u00E7ade\\nReuirements                                                                      [https://export.amlegal.com/media/\\n\\u2219  Each wall notch must provide a front facade setback of a minimum depth of 4 1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nft and length of 8 ft                                                            IMAGES/0-0-0-10982.bmp]\\n\\u2219  Wall notches shall be spaced to reflect historic facade width\\nWall Offset: An offset in fa\\u00E7ade wall into different modules\\nReuirements                                                                      [https://export.amlegal.com/media/\\n\\u2219  Facade module must have a minimum 10 ft offset from an adjacent module      1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u2219  The wall offset shall be located such that it relates to historic facade    IMAGES/0-0-0-11071.bmp]\\nwidths\\nHorizontal Expression Elements\\nHorizontal Expression Line: A horizontal expression line created by molding\\nReuirements\\n\\u2219  A horizontal expression line must be a minimum of 4 inches in depth and 1 ft\\nin height                                                                        [https://export.amlegal.com/media/\\n\\u2219  Incorporate horizontal expression lines at heights that align with          1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\ntraditional elements of historic buildings such as awnings, transoms, and        IMAGES/0-0-0-11161.bmp]\\ncornices\\n\\u2219  The maximum length of a horizontal expression line can run without changing\\nheight is 120 ft\\nCornice: A cornice detail providing a horizontal articulation\\nReuirements\\n\\u2219  The cornice detail must be at least 18 inches in height                     [https://export.amlegal.com/media/\\n\\u2219 The cornice detail must be at least 6 inches deep                            1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u2219  The cornice detail must extend the entire width of the facade               IMAGES/0-0-0-11252.bmp]\\n\\u2219  The cornice detail shall vary in height at widths that reflect historic\\nfacade modules\\nVaried Parapet Height: A change in the height of the parapet along the length of the building\\nReuirements\\n\\u2219  The parapet offset shall be a minimum of 2 ft in height from the adjacent\\nparapet\\n\\u2219 The parapet offset shall occur at a minimum interval of every 60 ft across th[https://export.amlegal.com/media/\\nbuilding frontage, and shall reflect historic precedent                          1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u2219 On the sections of the building that incorporate this horizontal expression  IMAGES/0-0-0-11344.bmp]\\nelement, the awning/canopy height shall also be raised a minimum of 2 ft in\\nheight from the adjacent awning/canopy heights to reflect the change in this\\nfacade module\\nAwning/Canopy: A wall mounted, cantilevered structure providing shade and cover from the\\nweather for a sidewalk\\nReuirements\\n\\u2219  An awning/canopy must be a minimum of 7 ft clear height above the sidewalk  [https://export.amlegal.com/media/\\nand must have a minimum depth of 5 ft                                            1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u2219  An awning/canopy may extend into a primary or side street setback           IMAGES/0-0-0-11437.bmp]\\n\\u2219 An awning/canopy may encroach up to 6 ft into the public right-of-way but must\\nbe at least 2 ft inside the curb line or edge of pavement, whichever is greater\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Building Elements\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Purpose. The standards in this Subsection along with Table\\n1121.03.1: Expression Element Standards are intended to ensure that building\\nelements are of sufficient size and design to meet the intent of the\\nrequirements in Section\\n1121.03 (b).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Building elements that do not encroach into a required setback and\\nthat are not being used to satisfy the blank wall area requirements do not need\\nto comply with the general requirements in this section.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Right-of-Way Encroachment. A building element may encroach into\\nthe right-of-way in accordance with the standards of this Chapter.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Building Element Typology. The building elements established in\\nTable 1122.03.2: Building Element Typology Standards shall be provided.\\nTable 1122.03.2: Building Element Typology Standards\\nExpression Element i                                                             Graphic i\\nVertical Expression Elements\\nFront Portch: A raised structure attached to a building that forms a covered entrance to a doorway\\nReuirements\\n\\u2219  A front porch must be at least 6 ft deep (excluding the steps and any porch\\nposts)\\n\\u2219  A front porch shall have a minimum of 50 square feet\\n\\u2219  Front porch posts which flank the front door, entry, or access point to the [https://export.amlegal.com/media/\\nunit shall be separated a minimum of 5 ft                                        1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u2219  A front porch must be contiguous with a width not less than 45% of the      IMAGES/0-0-0-11531.bmp]\\nbuilding facade\\n\\u2219 A front porch must be roofed and may be screened but cannot be fully enclosed\\n\\u2219 A front porch may extend up to 9 ft, including the steps, into a required\\nfront setback, provided that such extension is at least 2 ft from the vertical\\nplane of any lot line\\nStoop: An exterior stair and landing for ground floor residential where the first story is elevated to\\nprovide privacy for the windows\\nReuirements\\n\\u2219  A stoop must be no more than 6 ft deep (not including the steps) and 6 ft\\nwide                                                                             [https://export.amlegal.com/media/\\n\\u2219 A stoop may be covered but cannot be fully enclosed                          1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u2219 A stoop may extend up to 6 ft, including the steops, into a required setback,IMAGES/0-0-0-11626.bmp]\\nprovided that such extension is at least 2 ft from the vertical plane of any lot\\nline\\n\\u2219 A stoop may not encroach into the public right-of-way\\nBalcony: A platform projecting from the wall of an upper-story of a building with a railing\\nalong its outer edge, often with access from a door or window\\nReuirements\\n\\u2219  A balcony may be covered but cannot be fully enclosed                       [https://export.amlegal.com/media/\\n\\u2219 A balcony must have a clear height above the sidewalk of at least 9 ft       1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u2219 A balcony may extend into a primary or side street setback                   IMAGES/0-0-0-11722.bmp]\\n\\u2219 A balcony may encroach up to 2 ft into the public right-of-way\\nForecourt: An open area at grade, or within 30 inches of grade, that serves as an open space, plaza or outdoor dining\\narea. A forecourt is designed for pedestrian activity that is often related to the operation of the business(es) with\\nentrances that open into the forecourt and windows that look into\\nthe forecourt.\\nReuirements\\n\\u2219  A forecourt must be no more than one-third of the length of the building\\nface, and in no case longer than 50 ft in width\\n\\u2219 A forecourt must be no less than 10 ft in depth                              [https://export.amlegal.com/media/\\n\\u2219 The depth of the forecourt should not exceed the general width               1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u2219 A maximum of one forecourt is permitted per lot                              IMAGES/0-0-0-11819.bmp]\\n\\u2219 A forecourt meeting the above requirements is considered part of the building\\n\\u2219 The forecourt shall include a landscaping feature (such as planters) and\\nfeatures that encourage pedestrian activity (such as benches or tables)\\nGallery: A covered passage extending along the outside wall of a building supported by arches or\\ncolumns that is open on 3 sides\\nReuirements\\n\\u2219  A gallery must have a clear depth from the support columns to the building\\u0027s\\nfacade of at least 8 ft and a clear height above the sidewalk of at least 9 ft   [https://export.amlegal.com/media/\\n\\u2219 A gallery must be contiguous and extend over at least 75% of the width of the1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nbuilding facade                                                                  IMAGES/0-0-0-11917.bmp]\\n\\u2219 A gallery may extend into a primary or side street setback\\n\\u2219 A gallery may encroach up 9 ft into the public right-of-way but must be at\\nleast 2 ft inside the curb line or edge of pavement, whichever is greater\\nAwning/Canopy: A wall mounted, cantilevered structure providing shade and cover from the\\nweather for a sidewalk\\nReuirements\\n\\u2219  An awning/canopy must be a minimum of 7 ft clear height above the sidewalk  [https://export.amlegal.com/media/\\nand must have a minimum depth of 5 ft                                            1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u2219 An awning/canopy may extend into a primary or side street setback            IMAGES/0-0-0-12016.bmp]\\n\\u2219 An awning/canopy may encroach up to 6 ft into the public right-of-way but must\\nbe at least 2 ft inside the curb line or edge of pavement, whichever is greater\\nRooftop Deck: An outdoor area located on the roof of a building, although it is not necessarily located on the highest\\nroof plane. For instance, it could be located on the roof of the third story, where the fourth and fifth stories of the\\nbuilding are stepped back from the front fa\\u00E7ade. A rooftop deck exists where an applicant chooses to utilize this outdoor\\nspace.\\nReuirements\\n\\u2219  The rooftop deck must be enclosed by a railing or partial wall. The railing\\nof a rooftop deck must be set back from the street-facing walls of the floor     [https://export.amlegal.com/media/\\nbeneath it by a minimum of 4 ft                                                  1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u2219 A rooftop garden must be set back from the building frontage at least 10 ft, IMAGES/0-0-0-12116.bmp]\\nand a green roof must be set back from the building frontage at least 5 ft and\\nhave a low profile so as not to be seen from the public realm\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Transparency\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Purpose. Transparency requirements are intended to lend visual\\ninterest to street facing building facades for both pedestrians and building\\noccupants and minimize blank wall areas. These requirements aim to ensure sight\\nlines from the sidewalk to the goods and services provided inside the property.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0General Requirements\\nFigure 1122.03.2: Transparency Summary\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-12181.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The minimum percentage of windows and doors that must cover a\\nground story facade is measured between 0 and 12 feet above the adjacent\\nsidewalk.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The minimum percentage of windows that must cover upper story\\nfacades is measured between the top of the floor plate of the upper story and\\nthe bottom of the ceiling structure (see Figure 1122.03.2: Transparency\\nSummary).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Windows shall not be made opaque by non-operable window\\ntreatments (for example curtains, blinds or shades within the conditioned space\\nare considered operable, whereas stationary shades such as \\u0022faux roman\\u0022 shades\\nthat do not move are considered non-operable).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Glass shall be considered transparent where it has a\\ntransparency higher than 60% and external reflectance of less than 15%. Clear\\nglazing must have a visible transmittance rate of 0.5 or greater to count\\ntowards the transparency requirement.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0For all residential uses, at least 30% of each building facade\\nfacing public streets shall be transparent window glass or open.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0For nonresidential uses, at least 60% of each building facade\\nfacing public streets shall be transparent window glass or open.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Building Materials\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Hard surfaced building materials are required for all\\nnonresidential uses.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Acceptable building materials include:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Masonry;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Parged block;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Glass block; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Plaster/stucco.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Building materials used on building walls and roofs shall not be\\nmore than 30% highly reflective glass, such as tempered or mirrored glass.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Highly tinted glass or glass tinted in unnatural colors or with a\\nhighly reflective finish shall be avoided.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Building materials may artificially simulate natural materials\\nthat they are not.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0The following building materials for nonresidential uses shall be\\nprohibited on visible facades from public streets:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Corrugated metal panels;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Siding; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Wood used as a finish material.\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Parking\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Parking must be provided in rear of building as provided in\\nSection\\n1116.06.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In locations where a rear yard fronts a street or is visible\\nwithin 150 feet of a street, all parking must be screened as provided in\\nSection\\n1120.03 .\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Off-Street parking is not required for individual uses.\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Outdoor Lighting\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Ornamental or decorative lights mounted with brackets shall be\\nprovided when attached to the building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Outdoor lighting and site furniture shall be architecturally\\nintegrated with the building\\u0027s style, material, and color.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) Down lighting shall be used to reinforce circulation corridors.\\nCHAPTER 1123\\nInfill\\n1123.01\\u00A0\\u00A0\\u00A0Purpose.\\n1123.02\\u00A0\\u00A0\\u00A0Applicability.\\n1123.03\\u00A0\\u00A0\\u00A0Standards.\\n1123.04\\u00A0\\u00A0\\u00A0Alternative compliance.\\n\\u00A0\\n1123.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0The purpose of this Chapter is to accommodate and encourage compatible\\ndevelopment in existing developed areas, while reinforcing the established\\ncharacter of those areas and mitigating adverse impacts on adjacent properties.\\n1123.02 APPLICABILITY.\\n\\u00A0\\u00A0\\u00A0This Chapter applies to all development and redevelopment within Springfield\\ncity limits unless otherwise specified.\\n1123.03 STANDARDS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Infill development shall share a similar height to surrounding\\nbuildings.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Infill development shall reflect the architectural styles on\\neither side along the block face.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The relationship between height, width, material, and style of\\nexisting facades shall be respected.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Infill development shall have consistent setbacks with the\\nbuildings on it\\u0027s block face.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Generally, infill development lots shall meet the required\\nminimums of the zoning district in which it is located, except specified\\notherwise in this Chapter.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Setbacks\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The front setback for infill development shall be determined by\\nassessing the as-built setbacks on the block face (see Figure 1123.03.1: Infill\\nDevelopment Setback Range), or the applicable zoning district\\u0027s requirement,\\nwhichever is least restrictive for redevelopment.\\nFigure 1123.03.1: Infill Development Setback Range\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-12247.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Infill development may be placed anywhere between the smallest and\\nlargest front setbacks on the block face (see Figure 1123.03.1: Infill\\nDevelopment Setback Range).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0All other setbacks shall meet the zoning district\\u0027s dimensional\\nstandards unless specified otherwise in this Chapter.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Architectural Requirements\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Infill development shall use similar building materials as\\nassessed by the as-built developments on the block face.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Color shades shall be used to facilitate blending infill\\ndevelopment into the block face. The color shades of building materials shall\\ndraw from the range of color shades that already exist on the block or in the\\nadjacent neighborhood. If no specified range can be determined, then infill\\ndevelopment shall utilize earth tones.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The use of high-intensity colors, metallic colors, or fluorescent\\ncolors is prohibited.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Building Height\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The building height for infill development shall be determined by\\nassessing the as built building heights on the block face (see Figure\\n1123.03.2: Infill Development Building Height), or the applicable zoning\\ndistrict\\u0027s requirement, whichever is least restrictive for redevelopment.\\nFigure 1123.03.2: Infill Development Building Height\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-12314.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The building height for infill development may be placed anywhere\\nbetween the shortest and tallest building height on the block face (see Figure\\n1123.03.2: Infill Development Building Height).\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Glare. Building materials and windows shall not create excessive\\nglare nor create a significant adverse impact on the adjacent property owners,\\nneighborhood, or community in terms of vehicular and pedestrian safety and\\nenjoyment of views.\\n1123.04 ALTERNATIVE COMPLIANCE.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Dimensional requirements may be further modified as provided by this\\nSection.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0In instances where redevelopment of a vacant lot is impractical or\\nwill otherwise\\nprevent the future development of the lot because of the applicable zoning\\ndistrict\\u0027s requirements, the following requirements may be modified and\\napproved by the Community Development Director as provided in Table 1123.04.1:\\nInfill Dimensional Modifications by the alternative compliance process\\nspecified in Section\\n1129.01.\\nTable 1123.04.1: Infill Dimensional Modifications\\n\\u00A0\\nRequirement                         Modification\\nMinimum Lot Area                    A 20% decrease to the applicable zoning\\n                                    district requirement\\nMinimum Lot Width                   A 15% decrease to the applicable zoning\\n                                    district requirement\\nMaximum Total Lot Building Coverage A 10% increase to the applicable zoning\\n                                    district requirement\\nMinimum Front Setback               A 20% decrease to the applicable zoning\\n                                    district requirement\\nMinimum Rear Setback                A 20% decrease to the applicable zoning\\n                                    district requirement\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0These modifications may be in addition to the setback averaging\\nmethod provided in Section\\n1123.03.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Any modification seeking greater relief than provided in Section\\n1123.03 and Table  1123.04.1: Infill Dimensional Modifications, requires a\\nvariance.\\n\\u00A0\\n\\u00A0\\n\\u00A0\\nCHAPTER 1124\\nAnimal Regulations\\n1124.01\\u00A0\\u00A0\\u00A0Purpose.\\n1124.02\\u00A0\\u00A0\\u00A0Applicability.\\n1124.03\\u00A0\\u00A0\\u00A0Standards.\\n\\u00A0\\n1124.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0The purpose of this Chapter is to regulate the allowance, conditions, and\\nlocation of nonhousehold animals on lots.\\n1124.02 APPLICABILITY.\\n\\u00A0\\u00A0\\u00A0This Chapter applies to all development within Springfield city limits where\\nnon-household animals are to be provided on a property.\\n1124.03 STANDARDS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Non-household animals shall follow the requirements provided in\\nTable 1124.03.1: Animal Unit Summary. A property shall not exceed the maximum\\nanimal unit requirements provided in Table 1124.03.1: Animal Unit Summary.\\nTable 1124.03.1: Animal Unit Summary\\n            Number of                    Number of Animal Units Allowed Per\\nAnimal Type Animals Per      Lot Sizeg\\u00A0 Lot\\n            One Animal       District i  \\u003C 1 acre 1-5 acres 5 - 10 \\u003E10 acres\\n            Unit                                            acres\\nCattle      1                R-AG        3*       6*        9*     12*\\nHorse,\\nDonkey,     1                R-LD        2        3         4      5\\nMule\\nPig         1                R-HD        1        2         3      4\\nGoat,\\nSheep,      2                C-NC        -        -         -      -\\nLlama,\\nAlpaca\\nHoneybee    2                C-LC        -        -         -      -\\nColony\\nFowl\\n(chicken,\\nquail,      4                C-HC        -        -         -      -\\nturkey,\\nduck, dove,\\ngeese)\\n                        C-DT             -        -         -      -\\nNotes                   I-LI -                    -         -      -\\n* = animal units per    I-HI -                    -         -      -\\nacre                    P-PR 2                    3         4      5\\n- = not allowed         P-IE 2                    3         4      5\\n                        P-DM -                    -         -      -\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0An animal unit is a calculation that assigns a number of non-\\nhousehold animals in a flexible manner. For example, one animal unit may be one\\npig, two honeybee colonies, or four fowls. Four animal units could be one of\\nthe following possible combinations:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A04 cattle\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A04 horse, donkey, mule\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A04 pigs\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A08 goat, sheep, llama, alpaca\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A08 honeybee colonies\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A016 fowl\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0G. \\u00A0\\u00A0\\u00A02 cattle and 4 goat, sheep, llama, alpaca\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0H. \\u00A0\\u00A0\\u00A01 cattle, 1 pig, and 8 fowl\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0All non-household animals shall be set back at least 20 feet from\\nall property lines unless specified otherwise in this Chapter.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0The following animal types are prohibited on lots less than one\\nacre:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Cattle;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Horse, Donkey, Mule;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Pig; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Goat, Sheep, Llama, Alpaca\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Structures for cattle, horses, donkeys, mules, pigs, goats, sheep,\\nllamas, and alpacas shall be at least 200 feet from every abutting R-LD and R-\\nHD property lines.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Structures for fowl or small animals shall not be less than 100\\nfeet from every abutting R-LD and R-HD property lines.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0All non-household animals are prohibited from being located in\\nfront and side yards.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Exotic animals are not permitted in Springfield, except as part of\\na licensed circus or exhibition.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Animal-Specific Regulations\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Honeybee Colony\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0All Honeybee colonies shall be registered with the Ohio\\nDepartment of Agriculture and shall comply with all requirements set forth in\\nORC Chapter\\n909.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Honeybee colonies shall be enclosed as required below:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0A minimum six foot tall flyway barrier around the Honeybee\\ncolonies shall be provided;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The flyway barrier shall consist of a solid wall, fence,\\ndense vegetation, or combination of the three; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0The flyway barrier shall extend 10 feet beyond the hive in\\neach direction along the ground.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Fowl\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Lots Less than One Acre. The following requirements apply on\\nlots less than one acre:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Fowl shall be sheltered in a coop and shall not be allowed\\ninside a dwelling.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0A coop shall provide at least four square feet of space per\\nfowl.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Coops shall be located at least five feet from any side\\nproperty line and at least ten feet from any rear property line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0Coops shall be located at least 30 feet from any dwelling\\nunit located on an adjacent lot.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0Fowl shall be kept within a coop from 6 p.m. to 6 a.m. During\\nthe other hours of the day, fowl shall have access to an unpaved outdoor\\nroaming area of at least eight square feet per fowl.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vi. \\u00A0\\u00A0\\u00A0Fowl or their coops or enclosures shall not be allowed front\\nof the rear wall of the primary structure.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vii. \\u00A0\\u00A0\\u00A0Coops shall be kept clean so as to prevent pests,\\ninfestations, and noxious odors.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0viii.\\u00A0\\u00A0\\u00A0 Coops shall be designed, built, and maintained to prevent\\naccess by predators.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ix. \\u00A0\\u00A0\\u00A0Water and food shall be always provided on-site and\\naccessible.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0x. \\u00A0\\u00A0\\u00A0Any electrical or heat sources shall comply with the City\\nBuilding Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0xi. \\u00A0\\u00A0\\u00A0The outdoor slaughter of fowl is prohibited.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Roosters\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Roosters are prohibited on all R-LD and R-HD properties and\\nthose lots less than one acre.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0A rooster shall be kept at least 100 feet from any dwelling\\nor building on adjacent properties.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii.\\u00A0\\u00A0\\u00A0In districts where roosters are allowed, for every eight\\nfowl, one rooster is permitted.\\nCHAPTER 1125\\nPerformance Standards\\n1125.01\\u00A0\\u00A0\\u00A0Purpose.\\n1125.02\\u00A0\\u00A0\\u00A0Applicability.\\n1125.03\\u00A0\\u00A0\\u00A0Standards.\\n\\u00A0\\n\\u00A0\\n\\u00A0\\n1125.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0The purpose of this Chapter is to establish regulations that protect the\\npublic from the potential negative effects of certain development by regulating\\nthe transmission of noise, vibration, odor, and harmful substances and\\nemissions.\\n1125.02 APPLICABILITY.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0New Uses. Any commercial or industrial use established after the\\neffective date of this Zoning Code shall comply with the minimum performance\\nstandards contained in this Chapter.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Existing Uses. Existing lawfully conforming or nonconforming\\ncommercial and industrial uses which are not in compliance with the performance\\nstandards of this Zoning Code are exempt from the requirements of this Chapter.\\nHowever, a use that does not comply with the standards shall not be increased\\nin the degree of noncompliance. Such uses shall be permitted to be enlarged or\\naltered provided that the\\nenlargement or alteration complies with these performance standards.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Certification. When necessary, the Community Development Director may\\nrequire the applicant certify by a registered professional engineer or other\\nqualified person, at the expense of the applicant, that the performance\\nstandards for a proposed use can be met.\\n1125.03 STANDARDS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally. All uses shall conform to the standards of the Ohio\\nEnvironmental Protection Agency regarding glare, heat, exterior light, liquid\\nor solid wastes, vibrations, and noise and the regulations provided below.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Smoke. The emission of smoke from any operation or activity shall not\\nexceed a density or equivalent opacity permitted below. For the purpose of\\ngrading the density or equivalent opacity of smoke, the Ringelmann Chart as\\npublished by the United States Bureau of Mines shall be used.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0In Commercial districts, the emission beyond lot lines of smoke\\ndarker in shade than Ringelmann No. 1 from any chimney, stack, vent, opening or\\ncombustion process shall be prohibited.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In Industrial districts, the emission of smoke darker in shade\\nthan Ringelmann No. 2 from any chimney, stack, vent, opening or combustion\\nprocess beyond district boundary lines shall be prohibited, except that the\\nemission of smoke of a shade not to exceed Ringelmann No. 3 is permitted for\\nnot more than three minutes total in any one eight-hour period when starting or\\ncleaning a fire.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Particulate Matter. No person shall operate or cause to be operated\\nany furnace or combustion device for the burning of coal or other natural or\\nsynthetic fuels without using approved equipment, methods, or devices to reduce\\nthe quantity of gasborne or airborne solids or fumes emitted into the open air\\nexceeding a rate permitted below at the temperature of 500 degrees Fahrenheit.\\nFor the purpose of determining the adequacy of such devices, these conditions\\nshall apply when the percentage of excess air in the stack does not exceed 50%\\nat full load. The foregoing requirement shall be measured by the A.S.M.E. Test\\nCode for dust-separating apparatus. All other forms of dust, dirt and lye ash\\nshall be completely eliminated insofar as escape or emission into the open air\\nis concerned.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0In Commercial districts, the emission of particulate matter\\nsuspended in air shall not exceed 0.35 grains (.0023 ounces) per standard cubic\\nfoot (70 degrees F. and 14.7 psia) of air during any one-hour period or a total\\nfrom all vents and stacks of one-half (\\u00BD) pound per acre of lot area during any\\none hour period.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In Industrial districts, the emission of particulate matter\\nsuspended in air shall not exceed 0.35 grains (.0023 ounces) per standard cubic\\nfoot (70 degrees F. and 14.7 psia) of air during a one-hour period for a total\\nfrom all vents and stacks of three pounds per hour per acre of lot area during\\nany one hour period.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Toxic Matter. The release of airborne toxic matter from any operation\\nor activity shall not exceed the fractional quantities permitted below of the\\nThreshold Limit Values adopted by the American Conference of Governmental\\nIndustrial Hygienists. If a toxic substance is not listed, verification that\\nthe proposed level of toxic matter will be safe and not detrimental to the\\npublic health or injurious to plant and animal life shall be required. The\\nmeasurement of toxic matter shall be on the average of any 24-hour sampling\\nperiod.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0In Commercial districts, the release beyond lot lines of airborne\\ntoxic matter shall not exceed one-eighth (1/8th) of the Threshold Limit Values.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In Industrial districts, the release beyond district boundary\\nlines of airborne toxic matter shall not exceed one-eighth (1/8th) of the\\nThreshold Limit Values.\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Odor. The emission of offensive odorous matter from an operation or\\nactivity shall not exceed the odor threshold concentration defined in the\\nAmerican Society for Testing and Material Method D1391-57 \\u0022Standard Method for\\nMeasurement of Odor in Atmosphere (Dilution Method)\\u0022 as the level which will\\njust evoke a response in the human olfactory system when measured as follows:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0In Commercial districts, when measured five feet above ground\\nlevel, odorous matter shall not exceed the odor threshold concentration beyond\\nlot lines.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In Industrial districts, when measured five feet above ground\\nlevel, odorous matter shall not exceed the odor threshold concentration beyond\\ndistrict boundary lines.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Vibration. Earthborne vibrations from any operation or activity shall\\nnot exceed the\\ndisplacement values below. Vibration displacement shall be measured with an\\ninstrument capable of simultaneously measuring in three mutually perpendicular\\ndirections. The maximum vector resultant shall be less than the vibration\\ndisplacement permitted as determined by the calculations provided in Table\\n1125.03.1: Vibration Calculations.\\n\\u00A0\\n                                  Constant K by Type of Vibration\\nFormula                           District and                       \\u003C8 pulses\\n                                  Place of     Continuous Impulsive1 per 24-hr\\n                                  Measurement                        period\\n        D =                       Commercial\\n        displacement              Districts:   0.003      0.006      0.015\\n        in inches                 at lot lines\\n        K = constant Industrial\\n        given        Districts:\\n        (subsequent  at district               0.030      0.60       0.160\\n        columns)     boundary\\nD = K/f              lines\\nwhere:  f =\\n        frequency of At\\n        the          Residential\\n        vibration    Districts,                                      0.015\\n        transmitted  recreational              0.003      0.006      boundary\\n        through the  area, or                                        lines\\n        ground in    educational\\n        cycles per   institution\\n        second\\nNotes   1 = at least 1 second rest between pulses which do not exceed 1 second\\n        duration\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Glare. Glare or light from any operation and all lighting for parking\\nareas or for the external illumination of buildings or grounds shall be\\ndirected or located in such a manner that all direct or indirect illumination\\nshall not exceed .35 footcandles at a Residential district boundary and the\\nsource of light shall not be visible within a Residential district or within a\\nlot of a conforming residential use in a Commercial district.\\nTITLE FIVE - Procedural Standards\\nChap.\\n1126.\\u00A0\\u00A0\\u00A0General Provisions.\\nChap.\\n1127.\\u00A0\\u00A0\\u00A0Common Procedures.\\nChap.\\n1128.\\u00A0\\u00A0\\u00A0Entitlement and Pre-Development Procedures.\\nChap.\\n1129.\\u00A0\\u00A0\\u00A0Site Development Procedures.\\nChap.\\n1130.\\u00A0\\u00A0\\u00A0Relief Procedures.\\nCHAPTER 1126\\nGeneral Provisions\\n1126.01\\u00A0\\u00A0\\u00A0Purpose.\\n1126.02\\u00A0\\u00A0\\u00A0Applicability.\\n1126.03\\u00A0\\u00A0\\u00A0Procedural Steps.\\n1126.04\\u00A0\\u00A0\\u00A0Approval Summary\\n1126.05\\u00A0\\u00A0\\u00A0Annexation\\n\\u00A0\\n\\u00A0\\n1126.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0The purposes of this Title are to:\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Establish the appropriate workflows associated with each land\\ndevelopment process;\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Ensure that processes comply with state law;\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Assign decision-making authority, completeness review, and deadlines\\nto ensure that the processes are efficient and fair to applicants; and\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0For discretionary or legislative decisions, provide notice and an\\nopportunity to be heard by persons affected by the application.\\n1126.02 APPLICABILITY.\\n\\u00A0\\u00A0\\u00A0This Title establishes rules and procedures for specific land use decisions\\nunder the jurisdiction of the City Commission, Planning Board, Board of Zoning\\nAppeals, Springfield Landmarks Commission, and City Staff (where applicable).\\n1126.03 PROCEDURAL STEPS.\\n\\u00A0\\u00A0\\u00A0This Title establishes rules for procedures, such as notices and public\\nmeetings/hearings. It then describes the process for specific land use\\ndecisions. The procedures have a common workflow using a list of basic steps.\\nEach step is summarized with an overview description as reflected in Table\\n1126.03.1: Procedural Steps.\\nTable 1126.03.1: Procedural Steps\\nStep                    Overview\\nApplicability           This is the type of development or situation that is\\n                        subject to the process.\\nInitiation              This is how the applicant begins the process, including\\n                        which department or official receives the application.\\nCompleteness            This is how the City determines that the application\\n                        has sufficient information to be processed.\\n                        This describes the type of notice, how it is provided,\\nNotice and Hearings     and the conditions of any applicable required public\\n                        meetings/hearings.\\n                        This states who reviews, recommends, and approves the\\nAction                  application and the type of proceeding that leads to\\n                        the decision.\\n                        These are any standards that apply to the application.\\nApproval Criteria       All applications are subject to the regulations of this\\n                        Zoning Code.\\n                        If an application is denied, some processes have a\\nSubsequent Applications waiting period before that type of application can be\\n                        resubmitted for the property.\\n                        This provides a way to review an application that is\\nAppeals                 denied or that has conditions that the applicant\\n                        disagrees with.\\n                        This indicates what activity the application\\nScope of Approval       authorizes. For example, some approvals send the\\n                        applicant to the next step in the overall process,\\n                        while others authorize construction or use.\\nRecordation             This states how the formal approval decision is\\n                        maintained.\\n\\u00A0\\n1126.04 APPROVAL SUMMARY.\\n\\u00A0\\u00A0\\u00A0Table 1126.04.1: Authority Table summarizes the major review procedures for\\nland use applications and development activity in Springfield city limits and\\nwho acts on those applications. Not all procedures addressed in this Title are\\nsummarized in Table 1126.04.1: Authority Table (see subsequent sections of this\\nTitle for additional details on each procedure).\\nTable 1126.04.1: Authority Table\\nKey:\\nX = Not Required\\nY= Required\\n- = Not Applicable\\nR= Review and Recommend\\nD= Decision (a decision includes the\\nreview of the application)             Approval Authorities\\nA = Appeal Decision\\nPAC = Pre-Application Conference\\nCDD = Community Development Director\\nPB = Planning Board\\nCC =City Commission\\nBZA = Board of Zoning Appeals\\nSLC = Springfield Landmarks Commission\\n                 Required?\\nApplication      PAC Notice Public     CDD PD1 BZA CC SLC\\n                            Hearing\\nEntitlement Procedures\\nAmendment (Text  X   Y      Y          R   R   -   D  -\\nor Map/Rezoning)\\nPlanned\\nDevelopment      Y   Y      Y          R   R   -   D  -\\nZoning/Rezoning\\nSite Development Procedures\\nConditional Use  X   Y      Y          R   -   D   -  -\\nPermit\\nZoning           X   X      X          D   -   -   -  -\\nCertificate\\nSite Plan        X   X      X          D   -   -   -  -\\nParking Lot      X   X      X          D   -   -   -  -\\nPermit\\nCommunication\\nFacility/Tower   X   Y      Y          R   -   D   -  -\\nPermit\\nCertificate of   X   X      X          R   -   -   -  D\\nAppropriateness2\\nHome Occupation  X   X      X          D   -   -   -  -\\nPermit\\nRelief Procedures\\nAlternative      X   X      X          D   -   -   -  -\\nCompliance\\nVariance         X   Y      Y          R   -   D   -  -\\nAppeals from\\nLandmarks        X   Y      Y          -   -   D   -  -\\nCommission\\nAppeals from\\nAdministrative   X   Y      Y          -   -   D   -  -\\nDecision\\n                 1 In certain instances, CEDA (the regional planning board)\\n                 may serve in the capacity as the Planning Board for\\n                 application. Fore more clarity on CEDA\\u2019s role in the\\nNotes            development process, refer to the Codified Ordinances.\\n                 2 The Community Development Director and Springfield Marks\\n                 Commission both can decide a certificate of appropriateness\\n                 application. See Section\\n                 1129.05 for clarity.\\n\\u00A0\\n1126.05 ANNEXATION.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Where land previously zoned by another jurisdiction is annexed to the\\ncity, such land shall be zoned in the same zoning district as land that is\\nalready within the City and immediately adjacent to the land to be annexed.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0If the land immediately adjacent to the land to be annexed consists\\nof more than one zoning district, the land to be annexed shall be zoned in the\\nsame zoning district that the majority of the land adjacent to it is located\\nin.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Land not zoned by another jurisdiction prior to annexation shall be\\nclassified in the same manner into whichever district most closely conforms to\\nthe existing use of the annexed area or in accordance with Chapter\\n1103. Building permits shall be issued only after the City has assigned the\\nland a permanent zoning classification.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0In all cases, the appropriate permanent zoning districts for any land\\nto be annexed shall be assigned by the City Commission and the Zoning Map shall\\nbe amended accordingly.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Upon annexation of land to the city, the provisions of S.C.O Chapter\\n971, Floodplain Regulations, shall also become effective for such land.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0The City Commission shall hold a public hearing regarding annexation\\napplication prior to the acceptance of annexation. The City Clerk shall cause\\nnotice of the public hearing to be made pursuant to the previsions of O.R.C. as\\npresently enacted or as it may be amended. Notice shall be made by the City\\nClerk as required by O.R.C. or as amended.\\n\\u00A0\\n\\u00A0\\n\\u00A0\\n\\u00A0\\nCHAPTER 1127\\nCommon Procedures\\n1127.01\\u00A0\\u00A0\\u00A0Pre-Application.\\n1127.02\\u00A0\\u00A0\\u00A0Submitting Applications.\\n1127.03\\u00A0\\u00A0\\u00A0Noticing and public hearings.\\n1127.04\\u00A0\\u00A0\\u00A0Administrative review.\\n1127.05\\u00A0\\u00A0\\u00A0Action and decisions.\\n1127.06\\u00A0\\u00A0\\u00A0Application withdrawal.\\n1127.07\\u00A0\\u00A0\\u00A0Scope of approval.\\n1127.08\\u00A0\\u00A0\\u00A0Post-decision revisions.\\n1127.09\\u00A0\\u00A0\\u00A0Appeals.\\n\\u00A0\\n1127.01 PRE-APPLICATION.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability. These requirements apply to any application if the\\napplicant elects to request a pre-application conference with the City.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. Before submitting an application subject to this Title,\\nthe applicant may request a meeting with the Community Development Department\\nconcerning the plans and data as specified in this Zoning Code.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Purpose of Meeting. The purpose of the meeting is to assist an\\napplicant prior to the submittal of an application, to coordinate the technical\\naspects of development, inform the applicant about potential planning and\\ndevelopment issues, and to prepare the City for upcoming development proposals.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Scheduling. Any applicants wishing to discuss a development proposal\\nwith the Community Development Department shall schedule a meeting at least\\nfive (5) business days prior to the meeting.\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Pre-Application Conference (PAC)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The pre-application conference shall include the following:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A discussion of technical studies, plans and other information\\ndeemed relevant to the specific application request;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Discussion of the anticipated level of citizen interest;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0A discussion of the general project consistency with this Zoning\\nCode and the Clark County Comprehensive Plan.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The applicant shall provide a brief overview of the project,\\nincluding proposed location, uses, densities, project layout, and design\\nfeatures.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The Community Development Department will provide information and\\ncomments at the pre-application conference but will not take formal action on\\nthe application. In addition to provision of verbal information, the Community\\nDevelopment Department may provide a pre-application conference checklist.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0The applicant\\u0027s and Community Development Department\\u0027s comments\\nare for purposes of information, but are not binding on either the City or the\\napplicant.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Documentation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0During the meeting, the Community Development Department may\\nreview and complete an informational checklist, based on the scope of the\\napplication.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The Community Development Department will record in writing and\\nprovide the applicant any pertinent information concerning the project scope,\\nas described by the applicant, as well as verbal guidance provided by City\\nstaff.\\n1127.02 SUBMITTING APPLICATIONS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0General Requirements. Applications filed under this Zoning Code must\\ninclude the information as required per the application forms provided by the\\nCommunity Development Department as hosted on the City of Springfield, Ohio\\nOfficial Website. All applications shall be made on forms prepared by the\\nCommunity Development Department.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Required Fees\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The City Commission may establish fees for all applications\\nrequired in this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The following application fees shall be provided as required in\\nTable 1127.02.1: Base Application Fees. Fees may be refunded as determined by\\nthe City Commission.\\nTable 1127.02.1: Base Application Fees\\n\\u00A0\\nApplication                 Fee\\n                            1 to 3 - Unit Dwellings All other Uses/ Development\\n                                                    Types\\nAmendment\\nCondition Use Permit\\nVariance                    $57.00                  $285.00\\nAppeals from Landmarks\\nCommission\\nAmendment Rezoning          $285.00\\nZoning Certificate\\nHome Occupation\\nAppeals from Administrative $25.00\\nDecision\\nAlternative Compliance\\nCommunication Facility/     -                       See\\nTower Permit                                        1129.06(c)(50\\nParking Lot Permit          -                       $150.00 \\u002B 1 per parking\\n                                                    space\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Review for Completeness\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The Community Development Department will not process incomplete\\napplications.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0An application is not complete until all required items are\\nsubmitted per the application forms provided by the Community Development\\nDepartment as hosted on the City of Springfield, Ohio Official Website.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Any required plans part of an application submittal, unless\\notherwise specified, shall be prepared by a qualified professional.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0All required plans part of an application submittal, unless\\notherwise specified, shall be drawn at a scale at least 20 feet to the inch.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0When applications are submitted, the Community Development\\nDepartment will review them for completeness.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0The time period to process an application does not commence until\\nthe Community Development Department determines that the application is\\nproperly submitted and the applicant has corrected any deficiencies in the\\napplication.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Review for completeness of application forms is solely to\\ndetermine whether information required for submission with the application is\\nsufficient to allow further processing.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0The Community Development Department will determine whether the\\napplication is complete and will transmit the determination to the applicant.\\nIf the Community Springfield, Development Department determines that the\\napplication is not complete, the Community Development Department will specify\\nthose parts of the application that are incomplete and will indicate how they\\ncan be made complete, including a list and description of the information\\nneeded to complete the application. No approval authority is obligated to\\nfurther review the application until the required information is corrected.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0An approval authority may provide submittal deadlines for\\nmaterials required in support of any application provided for on the City of\\nSpringfield, Ohio Official Website. Compliance with those deadlines is required\\nto proceed with the application.\\n\\u00A0\\n1127.03 NOTICING AND PUBLIC HEARINGS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Purpose\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The purpose of noticing is to provide a fair and consistent\\nmethod to notify the community about proposed development in which the\\ncommunity may provide input on a particular proposed development at a public\\nhearing.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The purpose of a public hearing is to allow the applicant and\\nall other interested parties a reasonable and fair opportunity to be heard, to\\npresent evidence relevant to the application, and to rebut evidence presented\\nby others.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Rules of Procedure. The City Commission, Planning Board, and Board\\nof Zoning Appeals may adopt rules of procedure for public meetings and\\nhearings.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0City Commission. After the recommendations and report of the Planning\\nBoard have been filed, the City Commission shall before enacting any proposed\\namendment, hold a public hearing on the proposed amendment, giving notice of\\nthe time and place of the hearing, which notice shall be published in a\\nnewspaper having a general circulation in the city at least 30 days before the\\npublic hearing.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Planning Board. The Planning Board shall before acting on any\\nproposed application, hold a public hearing on the proposed application, giving\\nnotice of the time and place of the hearing, which notice shall be published at\\nleast 10 days before the public hearing.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Board of Zoning Appeals\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0When an application or appeal has been filed in proper form and\\nwith the required data, the Secretary of the Board shall immediately place such\\napplication or appeal upon the calendar for hearing and cause notices stating\\nthe time, place and object of the hearing to be served personally or by mail at\\nleast 10 days, excluding Saturday, Sundays and holidays, prior to the day of\\nsuch hearing, upon the applicant or the appellant, and to such persons as the\\nBoard of Zoning Appeals may specify in its rules and regulations which notices,\\nif by mail, shall be sent to the last known address of the respective property\\nowners.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The Board of Zoning Appeals shall also publish notice of such\\nhearing in a newspaper of general circulation in Clark County at least seven\\ndays prior to the public hearing.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Any party may appear at such hearings in person or by authorized\\nagent.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Upon the day for hearing any application or appeal, the Board of\\nZoning Appeals may adjourn the hearing to permit additional information to be\\nsecured, or to cause such further notice as it deems proper to be served upon\\nsuch other property owners as it decides may logically be concerned with such\\napplication or appeal. In the case of an adjourned hearing, persons previously\\nnotified and persons already heard need not be notified of the time of\\nresumption of such hearing unless the Board of Zoning Appeals so decides.\\n\\u00A0\\n1127.04 ADMINISTRATIVE REVIEW.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Review by Other Departments, Divisions, and Entities. The Community\\nDevelopment Department staff may forward copies of the application to various\\nlocal, regional (the Regional Planning Commission), state and federal entities\\nand departments for their review and comment. The Community Development\\nDepartment may ask the reviewers to respond in writing or attend an application\\nreview meeting with the Community Development Department.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0City Staff Review. City staff shall review the application and\\nsupporting information. This may occur in a meeting with the applicant and\\nrepresentatives of other entities or departments. After reviewing the\\ninformation, the Community Development Director shall prepare a report\\nsummarizing the information for the approval authorities and providing a\\nrecommendation for action and any proposed conditions. The applicant or other\\ninterested parties may obtain a copy of the staff report from the department\\nbefore the meeting at which the application is scheduled to be presented.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Staff Report. If an individual section of this Title delegates to\\nstaff the authority to\\napprove, approve with conditions/modify, or deny/disapprove an application, the\\nstaff report may include a written decision to that effect.\\n1127.05 ACTION AND DECISIONS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Action. Approval authorities shall hold regularly scheduled public\\nmeetings and hearings to receive and review public input on items required by\\nthis Zoning Code. Recommendations and decisions shall be rendered in a timely\\nmanner, based upon the specific requirements of the following:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Conformance with these regulations, the Clark County\\nComprehensive Plan, and other adopted plans, design guidelines and policies;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Recommendations of staff and approval authorities;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Input of reviewing agencies and departments;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Public comment and testimony received at the hearing; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Effects of the proposal on the neighborhood, area, and\\ncommunity-at-large.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Authority to Condition Development Approvals\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0After review of the application, other pertinent information or\\ndocuments, and any evidence made part of the public record, approval\\nauthorities may impose conditions that are reasonably necessary to assure\\ncompliance with applicable general or specific standards expressed in these\\nregulations.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The Community Development Director shall include a copy of the\\nconditions with the record of decision.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The applicant shall be notified of any conditions imposed on the\\napplication.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0City Staff. City staff decisions shall be rendered in a timely\\nmanner, based upon the specific requirements of the following:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Conformance with this Zoning Code, the Clark County Comprehensive\\nPlan, and other adopted plans, design guidelines and policies; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Input of reviewing agencies and departments.\\n1127.06 APPLICATION WITHDRAWAL.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally. An application may be withdrawn at any time prior to\\nformal consideration by an approval authority.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0No Public Meeting/Hearing Required. If no public meeting/hearing is\\nrequired, the applicant shall give notice of the withdrawal to the Community\\nDevelopment Director at the earliest possible time.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Public Meeting/Hearing Required. If a public meeting/hearing is\\nrequired, an applicant may request a withdrawal from the Community Development\\nDirector at any time prior to the opening of the meeting. Once the public\\nmeeting/hearing is opened, the approval authority shall decide whether to\\napprove the request and may instead act on the application.\\n1127.07 SCOPE OF APPROVAL.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally. The approval authority may take any action on the\\napplication that is consistent with the notice given (if applicable), including\\napproval of the application, conditional approval of the application, or denial\\nof the application.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Revisions. The approval authority may allow revisions to the\\napplication if the effect of the revision is to reduce the density or intensity\\nof the original application, reduce the impact of the development, or reduce\\nthe amount of land involved from that indicated in the notices of the hearing.\\nThe approval authority may not permit a greater amount of development, a more\\nintensive use, a larger area of land than indicated in the original\\napplication, or a greater variance than was indicated in the notice.\\n1127.08 POST-DECISION REVISIONS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Minor Revisions\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The Community Development Director may approve minor revisions to\\nthe terms of an approved application. \\u0022Minor revisions\\u0022 are those that are\\nnecessary in light of technical considerations discovered after the decision on\\nthe application, and that do not substantively change the character of the\\napproval. Minor revisions include but are not limited to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0An increase in gross floor area not exceeding 35%;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Substitution of landscape materials if the proposed materials\\nare of a similar shape, size, and type;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Location of trees; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Changes to building materials, parking lot design, screening\\nelements, building location, or similar elements of site or building design,\\nthat would improve the site or are needed because of circumstances not foreseen\\nat the time of application approval.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Minor revisions must be authorized in writing.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Minor revisions are subject to appeal to the Board of Zoning\\nAppeals. On appeal, no further action will be taken to process the application,\\nand/or issued permits are stayed pending the Board of Zoning Appeal\\u0027s\\ndetermination.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Major Revisions\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A major revision is any revision that the Community Development\\nDirector determines exceeds the conditions of a minor revision.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A major revision is approved by the original approval authority\\nand is required in accordance with the procedures established for the original\\nconsideration of the application.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0In making a major revision determination, the Community\\nDevelopment Director may seek a recommendation from any approval authority\\ninvolved in the original application process.\\n1127.09 APPEALS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Any decision may be appealed.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Any party aggrieved by a decision may seek judicial review in any\\ncourt of competent jurisdiction pursuant to general law.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Certain decisions may be appealed to a specific approval authority\\nas established in CHAPTER\\n1130 - Relief Procedures.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Stay of Proceedings. An appeal shall stay all proceedings in\\nfurtherance of the action appealed from, unless the Community Development\\nDirector certifies to the Board of Zoning Appeals, after notice of appeal shall\\nhave been filed, that by reason of facts stated in the certificate, a stay\\nwould, in their opinion, cause imminent peril to life or property. In such\\ncase, proceedings shall not be stayed otherwise than by a restraining order\\nwhich may, on due cause shown, be granted by the Board of Zoning Appeals after\\nnotice to the Community Development Director, or by judicial proceedings.\\nCHAPTER 1128\\nEntitlement and Pre-Development Procedures\\n1128.01\\u00A0\\u00A0\\u00A0Amendment (Text or Map/Rezoning).\\n1128.02\\u00A0\\u00A0\\u00A0Planned Development Zoning/Rezoning.\\n\\u00A0\\n1128.01 AMENDMENT (TEXT OR MAP/REZONING).\\n\\u00A0\\nFigure 1128.01.1: Amendment Flowchart\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability. This Section applies to amend or change the regulations of this\\nZoning Code. This includes the regulations and boundaries or classification of property\\ncontained within this Zoning Code or a change to the Zoning Map (rezoning).\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. An amendment may be initiated by:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0City Commission on its own motion;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Planning Board recommendation;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Community Development Department; or                                 [https://export.amlegal.com/media/\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0On petition by a resident or their authorized agent.                 1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u00A0                                                                                         IMAGES/0-0-0-12382.jpg]\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally, refer to Section\\n1127.02 .\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In addition to the requirements provided in Section\\n1127.02 (c), the following items shall be provided for any amendment to the Zoning Map:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A plot plan of the petitioned property and all other properties within 200\\nfeet of the lands;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The names and addresses of all property owners of the petitioned\\nproperty and those within 200 feet of any part of the petitioned property;\\nhowever, when 10 or more contiguous properties are joined in one petition by\\nmotion of the City Commission or instigation by the Planning Board, the names\\nand addresses of those of the petitioned properties and those within 200 feet\\nneed not be;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0A written statement setting forth the reasons for amending the\\nZoning Map as petitioned; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Any other documentation as necessary to process the proposed\\nZoning Map amendment.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Noticing shall be provided twice, once for each public meeting,\\nand shall comply with Section\\n1127.03 and state law, as applicable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A City Commission public hearing is required which shall comply\\nwith Section\\n1127.03.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Community Development Director Review and Recommendation. The\\nCommunity Development Director shall review the amendment and provide a\\nrecommendation to the Planning Board to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Approve the amendment;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Deny the amendment; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Approve the amendment with modifications.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Planning Board Review and Recommendation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Generally. The Planning Board shall review the amendment and\\nsubmit a recommendation and report to City Commission to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Approve the amendment;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Deny the amendment; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii.\\u00A0\\u00A0\\u00A0Approve the amendment with modifications.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Timing\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The Planning Board\\u0027s recommendation and report shall be\\nprovided within 45 days of the applications filing date to the City Commission.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0If the Planning Board does not submit a report within 45\\ndays of the filing date of the application, it shall be considered to have\\nsubmitted a report approving the proposed amendment.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0An applicant may waive this time limitation in writing.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0City Commission Decision. The City Commission shall consider the\\namendment at a public hearing after a report and recommendation has been\\nprovided by the Planning Board. After the public hearing is closed, the City\\nCommission shall, by ordinance:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Approve the amendment;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Deny the amendment; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Approve the amendment with modifications.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Approval Criteria. An amendment to this Zoning Code or the Zoning Map\\nis a legislative decision subject to the City Commission\\u0027s discretion. The City\\nCommission may approve the amendment if it:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Is consistent with the Clark County Comprehensive Plan, long-range\\nplanning policies, or other strategic goals of the City; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Promotes and protects public health, safety, and general welfare.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications. Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals. Refer to Section\\n1127.09.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Scope of Approval. The approval of an amendment does not authorize\\nthe development of land; however, an amendment may facilitate other Zoning Code\\napplications, permits, or actions that are consistent with the standards and\\nrequirements of this Zoning Code.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation. The amendment shall be codified and published as part of\\nthe Springfield Codified Ordinances by the City Clerk.\\n1128.02 PLANNED DEVELOPMENT ZONING/REZONING.\\n\\u00A0\\nFigure 1128.02.1: PD Zoning/Rezoning Flowchart\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Lands Eligible for Inclusion in a PD District\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A PD district shall be comprised only of contiguous lands forming a\\nsingle, cohesive area to be developed as a unit, either at one time or in phases. No\\nPD district may surround an island of land not included as part of the PD district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0No PD district shall be established unless all owners of f[https://export.amlegal.com/media/\\nestates in the lands included within the proposed PD district have given their       1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nconsent, in writing, to the establishment of the proposed PD district and to their   IMAGES/0-0-0-12451.jpg]\\nlands being made subject to the PD Ordinance to be adopted by the City Commission\\nand to the terms of the Master Development Plan related thereto and unless all such\\nowners have provided all legally binding instruments the City Commission finds are\\nnecessary to the enforcement of long term obligations imposed under the said PD\\nOrdinance and Master Development Plan.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. A Planned Development Zoning/Rezoning Flowchart Zoning/\\nRezoning may be initiated on petition by the owner or authorized agent of the\\nsubject property.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally, refer to Section\\n1127.02.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Pre-application Conference\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Prior to the submission of an application for the establishment\\nof a PD district, the applicant (along with such consultants and professional\\nadvisors as the applicant chooses to attend) shall meet with the Community\\nDevelopment Director (along with such other City staff members which the\\nCommunity Development Director deems appropriate) for the purpose of assisting\\nthe applicant in submitting a complete and compliant application for\\nconsideration by the Planning Board. Upon receiving a request for a pre-\\napplication conference from a prospective applicant, the Community Development\\nDirector shall schedule a pre-application conference at City Hall to be held\\nwithin 25 days of the prospective applicant\\u0027s request for a pre-application\\nconference. The prospective applicant may request, in writing, that the pre-\\napplication conference be scheduled for a later date. The applicant shall have\\nprepared and shall have delivered to the Community Development Director at\\nleast six copies of the following data at least five days prior to the\\nscheduled pre-application conference date:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0A sketch plan of the proposed PD district;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0A statement:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0a. \\u00A0\\u00A0\\u00A0Of the total number of acres in the proposed PD district;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0b. \\u00A0\\u00A0\\u00A0Of the number and type of structures and lots;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0c. \\u00A0\\u00A0\\u00A0Of the number of acres to be occupied by each type of use\\nin the proposed PD district;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0d. \\u00A0\\u00A0\\u00A0Explaining the objectives of the proposed Planned\\nDevelopment and the uses to be included within the proposed PD district; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Any known:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0a. \\u00A0\\u00A0\\u00A0Deviations from subdivision regulations to be sought; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0b. \\u00A0\\u00A0\\u00A0Plans for private utilities, amenities, and roadways.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0Notwithstanding the foregoing, the applicant may, at the applicant\\u0027s\\noption, submit a complete draft PD district application in lieu of the above\\nmentioned items.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0If the applicant fails to submit the above mentioned data to the\\nCommunity Development Director at least five days prior to the scheduled pre-\\napplication conference, the Community Development Director shall reschedule a\\npreapplication conference for a date after the above mentioned data has been\\ndelivered to the Community Development Director, but no later than thirty days\\nafter the above mentioned data has been delivered to the Community Development\\nDirector.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0After the initial pre-application conference, the Community\\nDevelopment Director may schedule such additional pre-application conferences\\nas the Community Development Director finds to be necessary to enable the\\napplicant to submit a complete and compliant application for consideration by\\nthe Planning Board.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The applicant seeking to have land rezoned as a PD district shall\\nsubmit to the Community Development Director six copies of a PD Rezoning\\nApplication which shall include the following:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0An opinion of an Ohio-licensed attorney, which is addressed to\\nThe City of Springfield, Ohio and upon which the City may rely, containing a\\ngood and sufficient legal description of the lands which are the subject of the\\napplication and stating all owners of freehold estates in such lands. If one or\\nmore applicants is a holder of a contractual right to become an owner of a\\nfreehold estate in such lands, then the application shall also include a true\\ncopy of the document establishing such contractual right and an opinion of an\\nOhio-licensed attorney, which is addressed to The City of Springfield, Ohio and\\nupon which the City may rely, verifying that the said document is legally\\nbinding on the parties thereto in accordance with the terms of such document.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0A Preliminary Master Development Plan which shall include the\\nfollowing exhibits:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0A statement of objectives describing the proposed Planned\\nDevelopment\\u0027s:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0a. \\u00A0\\u00A0\\u00A0General purpose;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0b. \\u00A0\\u00A0\\u00A0General character;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0c. \\u00A0\\u00A0\\u00A0Permitted and prohibited uses; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0d. \\u00A0\\u00A0\\u00A0Rationale supporting the assumptions and choices made by\\nthe applicant.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0A vicinity map drawn to a scale to show an area of no less\\nthan 1,000 feet surrounding the proposed PD district ( a larger area may be\\nrequired if the Planning Board determines that information on a larger vicinity\\nis needed to properly review the application) showing the location of the\\nproposed Planned Development in relation to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0a. \\u00A0\\u00A0\\u00A0Existing streets and thoroughfares, showing the location\\nand size of all existing utilities facilities, including drainage, water,\\nsewer, electrical, and fire hydrants;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0b. \\u00A0\\u00A0\\u00A0Existing public and private facilities, including but not\\nlimited to, schools, recreation areas, public utility facilities, stormwater\\ndetention facilities and police and fire stations;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0c. \\u00A0\\u00A0\\u00A0Existing zoning and existing land uses on the proposed PD\\ndistrict site and on surrounding areas; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0d. \\u00A0\\u00A0\\u00A0Existing easements on the proposed PD district site;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0A boundary survey plat map and good and sufficient legal\\ndescription of the lands which are the subject of the application (such legal\\ndescription being compliant with the requirements of the Clark County, Ohio\\nCounty Engineer for conveying interests in real estate).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0A topographic survey using the most recent United States\\nGeological Service topographic survey if more detailed topographic information\\nis not available.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0A site analysis map drawn to the same scale as the\\nPreliminary Master Development Plan plat map, described below, which shall\\nindicate flood prone areas, areas with slopes greater than five percent (5%),\\nareas of soils which are marginally suited for development purposes and a tree\\nsurvey (including tree cover, existing vegetation and other natural areas of\\nsignificance as indicated in an accompanying Natural Area Inventory prepared by\\nan ecologist or similarly trained environmental specialist).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vi. \\u00A0\\u00A0\\u00A0A Preliminary Master Development Plan plot plan drawn to a\\nscale suitable to clearly depict the following characteristics of the proposed\\nPD district (the scale for the vicinity map being a minimum standard):\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0a. \\u00A0\\u00A0\\u00A0Proposed land uses within the proposed PD district and\\ntheir location;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0b. \\u00A0\\u00A0\\u00A0Proposed lot sizes within the proposed PD district,\\nindicated either by lot lines drawn in their proposed location or a statement\\non the face of the Preliminary Master Development Plan concerning proposed lot\\nsizes, including minimum lot sizes;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0c. \\u00A0\\u00A0\\u00A0Proposed setbacks defining the distance buildings will be\\nset back from:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A01. \\u00A0\\u00A0\\u00A0Property lines surrounding the proposed PD district;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A02. \\u00A0\\u00A0\\u00A0Proposed and existing streets and alleys, identified as\\neither public or private;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A03. \\u00A0\\u00A0\\u00A0Other proposed buildings;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A04. \\u00A0\\u00A0\\u00A0The center line of ditches, streams, creeks and the\\nhigh water line of lakes and ponds;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A05. \\u00A0\\u00A0\\u00A0Lot lines within the proposed PD district; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A06. \\u00A0\\u00A0\\u00A0Other human-made or natural features which would be\\naffected by building encroachment.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0d. \\u00A0\\u00A0\\u00A0Proposed maximum height of buildings within the proposed\\nPD district;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0e. \\u00A0\\u00A0\\u00A0Proposed common open spaces, the intended purposes and\\nuses of such common open spaces, their location and size and the parameters\\nlimiting use of such common open spaces;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0f. \\u00A0\\u00A0\\u00A0Arterial and collector streets and thoroughfares, if any,\\nand point(s) of connection for access roads to the Planned Development;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0g. \\u00A0\\u00A0\\u00A0Local access streets and interior circulation roadways,\\npaths and trails, public and private, vehicular and pedestrian, within the\\nproposed PD district;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0h. \\u00A0\\u00A0\\u00A0Proposed common outdoor storage areas, their location and\\nsize and the parameters limiting use of such common storage areas;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Proposed lot lines within the proposed PD district;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0j. \\u00A0\\u00A0\\u00A0Proposed buffers and their location, design and a\\nmaintenance plan; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0k. \\u00A0\\u00A0\\u00A0Undeveloped areas.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vii. \\u00A0\\u00A0\\u00A0A table showing proposed acreage for each category of land\\nuse within the proposed PD district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0viii. \\u00A0\\u00A0\\u00A0A table showing gross density and net residential,\\ncommercial, office, and industrial acreage.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ix. \\u00A0\\u00A0\\u00A0A statement concerning proposed floor area ratios (percent\\nof lot in relation to building floor area) and the maximum building and\\nimpervious surface coverage expressed as a percent of the front yard, rear\\nyard, and total site area for residential and nonresidential uses within the\\nproposed PD district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0x. \\u00A0\\u00A0\\u00A0A proposed utility service plan pertaining to sanitary\\nsewers, storm drainage, potable water supply, street lighting, energy supply,\\ntelecommunications and data transmission showing general locations of major\\nwater and sewer lines, lift stations, and indicating whether gravity or forced\\nsystems are planned as well as locations of other major utility infrastructure.\\nUtility infrastructure shall be identified as either public or private.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0xi. \\u00A0\\u00A0\\u00A0A proposed sign plan identifying the location, size and type\\nof signs to be placed on the Planned Development.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0xii. \\u00A0\\u00A0\\u00A0A description of each development stage of the proposed\\nPlanned Development, if the proposed PD district is to be developed in phases.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0xiii. \\u00A0\\u00A0\\u00A0A proposed construction/development schedule for the\\nPlanned Development and each phase thereof.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0xiv. \\u00A0\\u00A0\\u00A0Proposed deed and easement documents for public\\ninfrastructure within the PD district and proposed easement documents for\\nproposed common areas, ingress and egress rights-of-way for lots within the\\nproposed PD district and such other conveyance documents necessary to establish\\npermanent rights needed by owners and occupants of the proposed Planned\\nDevelopment.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0xv. \\u00A0\\u00A0\\u00A0Proposed land covenants necessary to provide for permanent\\nprotection of rights of land owners within the proposed PD district, to provide\\nfor long term enforcement of conditions intended to protect the interests of\\nland owners in neighboring areas and to provide for permanent protection of\\nland features and characteristics of the proposed Planned Development.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0xvi. \\u00A0\\u00A0\\u00A0A draft proposed PD Ordinance in a format prescribed by the\\nCommunity Development Director and approved by the Law Director.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0xvii. \\u00A0\\u00A0\\u00A0Proposed financial assurances and security or other\\nmechanisms necessary to effectively ensure completion of public improvements,\\ncompletion of construction of Planned Development phases, long term maintenance\\nof common areas and other amenities in the proposed Planned Development, long\\nterm maintenance and preservation of Planned Development features intended to\\nmitigate adverse effects on neighboring areas and areas within the proposed\\nPlanned Development and preservation of the attributes of the proposed Planned\\nDevelopment necessary to integration of the uses permitted therein accomplish\\nthe purposes of this Chapter as pertaining to the proposed Planned Development.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0At any time during the application review process, the Planning\\nBoard may require the applicant to supplement its application to provide such\\nadditional data as the Planning Board may require to evaluate the character and\\nimpact of the proposed PD district.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Noticing shall be provided twice, once for each public meeting,\\nand shall comply with Section\\n1127.03 and state law, as applicable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A City Commission public hearing is required which shall comply\\nwith Section\\n1127.03.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0When an application to establish a PD district is in good order,\\ncomplete and compliant with the requirements of this Section, it shall be\\nsubmitted to the Planning Board. An applicant may waive, in writing, the 45 day\\ndeadline for consideration of a zoning amendment petition by the Planning\\nBoard.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0After the Planning Board\\u0027s due consideration of an application for\\nestablishment of a PD district, the Planning Board shall prepare and submit to\\nthe City Commission a written report of its findings which form the basis of\\nthe Planning Board\\u0027s recommendation and shall make its recommendation on such\\napplication to the City Commission by:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Recommending adoption of the PD district to which the applicant\\nhas consented, in writing as required in this Chapter, and tendering to the\\nCity Commission a PD Ordinance to establish the PD district; or B. Forwarding\\nto the City Commission a PD Ordinance to establish the PD district to which the\\napplicant has consented, in writing as required in this Chapter, but\\nrecommending that the PD district proposed in the forwarded PD Ordinance not be\\nestablished.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0In the event the City Commission considers a PD Ordinance which is\\nmaterially different from the PD Ordinance recommended by the Planning Board,\\nthe applicant must consent, in writing, to such modified PD Ordinance (as\\nrequired in this Chapter) and the considered PD Ordinance shall be adopted only\\nby the affirmative vote of at least four members of the City Commission.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Approval Criteria\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0This section is intended to provide guidance to the City staff in\\nassisting applicants wishing to petition for establishment of a PD district and\\nto provide guidance to the Planning Board in its consideration of and\\nadjustment of a Preliminary Master Development Plan and in designing a PD\\nOrdinance to be recommended to the City Commission, if a PD district is to be\\nrecommended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The Planning Board shall consider the following matters in\\nreviewing and adjusting a Master Development Plan and designing a PD Ordinance\\nto be recommended to the City Commission:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Whether the proposed PD district meets the qualifications of\\nthis Section.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0What permitted uses are appropriate for the proposed PD\\ndistrict;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Compliance with stormwater regulations;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Conformance to density policies established by the Clark County\\nComprehensive Plan or by the City Commission;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0The location and sizing of buildings so as to provide adequate\\nlight and ventilation to protect the health of the occupants and users of the\\nPlanned Development;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0The location and sizing of buildings so as to provide necessary\\naccess for fire apparatus and other emergency vehicles;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0G. \\u00A0\\u00A0\\u00A0The location and sizing of buildings so as to provide a\\nreasonable degree of privacy for residents and occupants of the Planned\\nDevelopment;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0H. \\u00A0\\u00A0\\u00A0Establishing appropriate setback and yard requirements for the\\nproposed Planned Development;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0I. \\u00A0\\u00A0\\u00A0Ingress and egress for the proposed Planned Development from and\\nto public thoroughfares and traffic circulation within the proposed PD district\\nand avoidance of overburdening existing public thoroughfares;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0J. \\u00A0\\u00A0\\u00A0Establishing appropriate open space for recreation and to\\nestablish an attractive environment that is beneficial to the public health,\\nsafety and welfare;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0K. \\u00A0\\u00A0\\u00A0Determine whether appropriate land will be dedicated to public\\nuse for public roadways, public utilities, public recreation facilities and\\npublic parks;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0L. \\u00A0\\u00A0\\u00A0The location and sizing of public utilities within the proposed\\nPD district to ensure adequate service within the proposed PD district and to\\navoid overburdening existing public utilities;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0M. \\u00A0\\u00A0\\u00A0The use of and design of buffers within and on the boundary of\\nthe proposed PD district to separate uses and to mitigate substantially adverse\\neffects on property within the proposed PD district and on property in\\nneighboring areas and compliance of buffers with CHAPTER\\n1117 - Landscaping and CHAPTER\\n1120 - Screening and Fencing of this Zoning Code;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0N. \\u00A0\\u00A0\\u00A0The provision of adequate parking, the location of parking\\nfacilities and whether off-street parking should be permitted which deviates\\nfrom the requirements of CHAPTER\\n1116 - Parking and Loading of this Zoning Code;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0O. \\u00A0\\u00A0\\u00A0The grouping of buildings and the variety and design of building\\ntypes;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0P. \\u00A0\\u00A0\\u00A0The compatibility of land uses within the proposed PD district\\nand the compatibility of land uses permitted in the proposed PD district with\\nlawful land uses existing in neighboring areas;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0Q. \\u00A0\\u00A0\\u00A0The impact of land uses within the proposed PD district on\\nenvironmental features of the proposed PD district which are to be preserved\\nand on environmental features in neighboring areas;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0R. \\u00A0\\u00A0\\u00A0The need for limitation on land uses within the proposed PD\\ndistrict in furtherance of the purposes of this Chapter and the compatibility\\nof land uses within the proposed PD district and with land uses in neighboring\\narea;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0S. \\u00A0\\u00A0\\u00A0The form of ownership interests intended for the Planned\\nDevelopment;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0T. \\u00A0\\u00A0\\u00A0Access to public transportation systems;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0U. \\u00A0\\u00A0\\u00A0The location and design of landscaping within the proposed PD\\ndistrict and compliance with the Zoning Code;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0V. \\u00A0\\u00A0\\u00A0The location and design of signs within the proposed PD district\\nand compliance with the Zoning Code;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0W. \\u00A0\\u00A0\\u00A0The appropriate size for subdivision lots within the proposed PD\\ndistrict for the various uses permitted within the proposed PD district;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0X. \\u00A0\\u00A0\\u00A0Every lot within the proposed PD district is required to have\\naccess to a public thoroughfare either directly or by means of a private road;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0Y. \\u00A0\\u00A0\\u00A0Streets within the proposed PD district, public or private, are\\nrequired to conform to the minimum requirements of Part Twelve of the Codified\\nOrdinances and to the specifications for public roadway structures adopted by\\nthe City Engineer, whether the roadway is public or private, but alleys may\\ndeviated from the minimum requirements of Part Twelve of the Codified\\nOrdinances if the City Fire Chief determines that such deviation will not\\nprevent access to abutting properties by fire apparatus;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0Z. \\u00A0\\u00A0\\u00A0How is development of the proposed PD district to be completed\\nin progressive phases and whether the proposed schedule development of the PD\\ndistrict is practical and will accomplish build out of phases of the Planned\\nDevelopment within a reasonable time;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0AA. \\u00A0\\u00A0\\u00A0What land covenants, easements, other interests in real estate\\nand financial assurances and security are necessary to ensure completion of\\npublic improvements, completion of construction of the Planned Development\\nphases, long term maintenance of common areas and other amenities in the\\nPlanned Development, long term maintenance and preservation of Planned\\nDevelopment features intended to mitigate adverse effects on neighboring areas\\nand areas within the Planned Development and preservation of the attributes of\\nthe Planned Development necessary to integration of the uses permitted in the\\nproposed PD district;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0BB.\\u00A0\\u00A0\\u00A0What precautions are to be taken to preserve environmental\\nattributes of the proposed PD district which are to be retained and on\\nenvironmental features in neighboring areas;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0CC. \\u00A0\\u00A0\\u00A0What standards should the PD Ordinance contain to govern\\nexercise of Planning Board discretion in administering the PD Ordinance and\\napproving modifications to the Master Development Plan over time; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0DD. \\u00A0\\u00A0\\u00A0What uses should be specifically prohibited within the proposed\\nPD district.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0This Subsection applies if:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The applicant withdraws a Planned Development Zoning/Rezoning\\napplication after notice of hearing is published; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The City Commission denies a Planned Development Zoning/Rezoning\\napplication.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0If the above requirements apply, the applicant shall not submit a\\nPlanned Development Zoning/Rezoning application for the same zoning district\\nrequest on the same property for at least six months.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The above waiting period begins with either the date of withdrawal\\nof the prior application before the Planning Board or City Commission or the\\ndate of the City Commission\\u0027s denial of the prior application.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals. Not applicable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(i)\\u00A0\\u00A0\\u00A0Scope of Approval\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0An approval letter shall be issued certifying the PD zoning\\nrequest is compliant with the conditions of this Zoning Code which may permit\\nthe applicant to apply for other permits and plans.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The Planning Board shall administer each PD Ordinance in\\naccordance with the standards for such administration established in the PD\\nOrdinance and shall administer such PD Ordinance in a manner consistent with\\naccomplishing the purposes of this Chapter set forth in Section\\n1113.01. Administration of a PD Ordinance may include modification of the\\nMaster Development Plan; provided such modification is in compliance with the\\nstandards for administration established in the PD Ordinance and is consistent\\nwith accomplishing the purposes of this Chapter set forth in Section\\n1113.01.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Property owners seeking a modification of the Master Development\\nPlan governing their land may file a written request for modification with the\\nPlanning Board describing the modification requested and providing all data\\nneeded by the Planning Board to determine whether such requested modification\\ncan be approved under the standards established in the PD Ordinance governing\\nsuch land.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The Planning Board shall consider a request for modification\\nonly when all owners of freehold estates in the subject land have joined in\\nmaking the request.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The Planning Board may require that a request be supplemented\\nwith such additional data as the Planning Board determines is necessary to\\ndetermine whether a requested modification should be granted.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0The Planning Board shall grant the requested modification if the\\nPlanning Board is able to find that the requested modification is in compliance\\nwith the standards for administration established in the PD Ordinance and is\\nconsistent with accomplishing the purposes of this Chapter set forth in Section\\n1113.01.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0If all or a portion of a Planned Development is rezoned, the\\nPlanning Board shall direct the Community Development Director to submit an\\naffidavit to the Clark County, Ohio County Recorder giving notice to the public\\nthat the relevant portion of the Planned Development is no longer subject to\\nthe PD Ordinance. The affidavit shall be in a form approved by the Law\\nDirector.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0The Board of Zoning Appeals shall perform the functions delegated\\nto it pertaining to a PD district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0No building permit shall be issued for any construction within a\\nPD district until after the applicant has achieved full and complete compliance\\nwith the requirements of this Section, as specified in the PD Ordinance.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0After adoption of a PD Ordinance by the City Commission, the land\\nowners within the PD district shall record with the Clark County, Ohio County\\nRecorder an affidavit notifying the public that the lands described in the PD\\nOrdinance have been made subject to the PD Ordinance. The affidavit shall be in\\na form approved by the Law Director.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0After adoption of a PD Ordinance by the City Commission, the land\\nowners within the PD district shall also record with the Clark County, Ohio\\nCounty Recorder such other deeds, easements declarations of land covenants and\\nsuch other conveyances of interests in real property as the PD Ordinance\\nrequires.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0After adoption of a PD Ordinance by the City Commission, the\\napplicant shall deliver to the City proof acceptable to the City Manager and\\nLaw Director that such financial assurances, security and other mechanisms as\\nare required under the PD Ordinance are in place, properly funded and\\nenforceable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0If a Planned Development or a phase of a Planned Development is\\nnot under substantial construction within 24 months after the commencement date\\nfor the relevant portion of the Planned Development, as specified in the\\nDevelopment Schedule adopted in the PD Ordinance; then, upon a determination by\\nthe City Commission that the PD Ordinance shall not be amended to allow an\\nextension of time to commence substantial construction of the relevant portion\\nof the Planned Development, the Planning Board shall proceed to consider\\nwhether such lands included in the portion of the Planned Development may be\\nrezoned and shall make its recommendation to the City Commission.\\nCHAPTER 1129\\nSite Development Procedures\\n1129.01\\u00A0\\u00A0\\u00A0Zoning certificate.\\n1129.02\\u00A0\\u00A0\\u00A0Conditional use permit.\\n1129.03\\u00A0\\u00A0\\u00A0Site plan.\\n1129.04\\u00A0\\u00A0\\u00A0Parking lot permit.\\n1129.05\\u00A0\\u00A0\\u00A0Certificate of appropriateness.\\n1129.06\\u00A0\\u00A0\\u00A0Communication facility/tower permit.\\n1129.07\\u00A0\\u00A0\\u00A0Home occupation permit.\\n\\u00A0\\n1129.01 ZONING CERTIFICATE.\\n\\u00A0\\nFigure 1129.01.1: Zoning Certificate Flowchart\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0No land or structure shall be used or converted nor a building permit\\nissued for the construction of a building or structure until a zoning certificate has\\nbeen issued by the Community Development Director.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Failure to obtain a zoning certificate is a Zoning Code violation.\\n\\u00A0\\u00A0\\u00A0                                                                                   [https://export.amlegal.com/media/\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. The applicant shall submit a zoning certificate application t1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nCommunity Development Director once all required permits and applications are approved.  IMAGES/0-0-0-12521.jpg]\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally, refer to Section\\n1127.02 .\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2)\\u00A0\\u00A0\\u00A0In addition to the requirements provided in Section\\n1127.02 ( c), the following items shall be provided:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Name, address and phone number of the applicant;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Legal description of the property;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Existing and proposed uses of the property; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Zoning district of the proposed use.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s). Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action. Within five working days after a receipt of a zoning\\ncertificate application, the Community Development Director shall review and\\nact to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Approve the zoning certificate; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Disapprove the zoning certificate.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Approval Criteria. The Community Development Director shall approve\\nthe zoning\\ncertificate application if it complies with:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0All applicable requirements and provisions of this Zoning Code;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0All applicable requirements of the Codified Ordinances, including\\nthe Building Code and Fire Code; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Any conditions of any currently applicable and unexpired rezoning,\\nconditional use permit, development plan, variance, or appeal decisions that\\napply to the property. If any of these prior approvals have expired, the\\napplicant must obtain a new approval before applying for a zoning certificate.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications. Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals. Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Scope of Approval\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0An approval letter shall be issued certifying the zoning\\ncertificate is compliant with the conditions of this Zoning Code which may\\npermit the applicant to apply for other permits and plans.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0A zoning certificate authorizes the use of land and occupancy of\\na building or structure as shown in the approved application.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0A zoning certificate shall remain in effect as long as the use\\nof such building or land is in full conformity with the provisions of this\\nZoning Code and with any conditions upon which such certificate was issued.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0A temporary zoning certificate may be issued when a delay in the\\nplanting of trees is warranted, or a delay in the paving of parking and\\nstacking spaces, driveways or aisles is warranted.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Revocation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A use shall be established on the basis of the application and\\nplans approved with a zoning certificate by the Community Development Director.\\nAny use established contrary to that authorized shall be deemed a violation of\\nthis Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The Community Development Director may issue a revocation notice\\nto revoke a zoning certificate that was issued contrary to the code based upon\\nfalse information or misrepresentation in the application.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Written notice of such revocation shall be given to the person\\nholding the zoning certificate together with notice that further work, as\\ndescribed in the canceled zoning certificate, shall not proceed unless and\\nuntil a new zoning certificate has been obtained or an extension granted.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Expiration\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0If the work described in any zoning certificate has not been\\ncompleted within the time specified, the zoning certificate shall expire.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The zoning certificate shall be revoked by the Community\\nDevelopment Director according to the procedures prescribed in Section\\n1129.01(i)(2).\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The Community Development Department shall maintain a record of\\nall zoning certificates, and copies shall be furnished upon request to any\\nperson.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0When plans are required, one copy of the plans shall be returned\\nto the applicant after the Community Development Director has marked such copy\\neither as approved or disapproved and so attested by signing the copy. One copy\\nof the plans, similarly marked, shall be retained by the Community Development\\nDirector.\\n1129.02 CONDITIONAL USE PERMIT.\\n\\u00A0\\nFigure 1129.02.1: Conditional Use Permit Flowchart\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability. This Section applies to any application for approval of:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A use designated as a conditional use in Table 1104.03.1: Use Table;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Any person who desires to replace a lawful nonconforming use with another\\nnonconforming use; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Any other unique development activity requiring action by the Board of\\nZoning Appeals during initial review as determined by the Community Development         [https://export.amlegal.com/media/\\nDirector.                                                                               1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u00A0                                                                                      IMAGES/0-0-0-12592.jpg]\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. A conditional use permit may be initiated by the owner or\\napplicant of the subject property.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally, refer to Section\\n1127.02.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0An applicant shall specify the section of this Zoning Code under\\nwhich the conditional use permit is sought and may suggest, in a draft\\nconditional use permit, such proposed conditions as the applicant believes are\\nnecessary and sufficient to warrant issuances of the conditional use permit\\napplied for.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The application shall include such evidence as is necessary and\\nsufficient to demonstrate that issuance of the applied for conditional use\\npermit is warranted when the standards identified in this Section are applied.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0A conditional use permit application shall include the following:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A site and development plan at an appropriate scale showing:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Proposed placement of structures on the subject property;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Provisions for ingress and egress;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii.\\u00A0\\u00A0\\u00A0Off-street parking and off-street loading areas;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0Refuse and service areas; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0Required yards and other open spaces;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Plans showing proposed locations for utility connections;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Plans for proposed screening and buffering, if any, with\\nreference as to type, dimensions, and character;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0The type, dimensions, and character of any proposed:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Landscaping;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Signs; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii.\\u00A0\\u00A0\\u00A0 Site lighting; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0If applicable, compliance with any additional regulations\\nrequired for a particular conditional use as provided in\\nTITLE Three -Use Standards.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Noticing shall comply with Section\\n1127.03 and state law, as applicable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A public hearing is required and shall comply with Section\\n1127.03 .\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Community Development Director Review and Recommendation. The\\nCommunity Development Director shall review the conditional use permit and\\nprovide a recommendation to the Board of Zoning Appeals to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Approve the conditional use permit;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Deny the conditional use permit; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Approve the conditional use permit with conditions or\\nmodifications.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Board of Zoning Appeals Decision. The Board of Zoning Appeals\\nshall consider the conditional use permit at a public hearing after a\\nrecommendation has been provided by the Community Development Director. After\\nthe hearing is closed, the Board of Zoning Appeals shall act to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Approve the conditional use permit;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Deny the conditional use permit; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Approve the conditional use permit with conditions or\\nmodifications.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Approval Criteria\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Decision to Approve\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Generally. The Board of Zoning Appeals shall review the facts\\nand circumstances of the conditional use permit application and shall approve a\\nconditional use permit only if the applicant demonstrates that the proposed\\nconditional use:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Would not be hazardous, harmful, noxious, offensive or a\\nnuisance to the surrounding neighborhood by reason of noise, smoke, odor,\\nvibration, dust and dirt, cinders, noxious gases, glare and heat, fire and\\nsafety hazards, sewage wastes and pollution, transportation and traffic,\\naesthetic and psychological effects.\\n\\u00A0\\nNote: The Board of Zoning Appeals may use and give recognition to those\\nperformance standards which are available in model codes or ordinances, or have\\nbeen developed by planning, manufacturing, health, architectural and\\nengineering organizations, and can be applied to the proposed use, to assist it\\nin reaching a fair and objective decision;\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii.\\u00A0\\u00A0\\u00A0Is in fact a conditional use as established under the\\nprovisions of this Zoning Code as eligible to be permitted in the district\\ninvolved;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Will be harmonious with and in accordance with the general\\nobjectives, or with any specific objective of this Zoning Code;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0Will be designed, constructed, operated and maintained as to\\nbe harmonious and appropriate in appearance with the existing or intended\\ncharacter of the general vicinity and that the use will not change the\\nessential character of the same area;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0Will be served adequately by essential public facilities and\\nservices such as highways, streets, police and fire protection, drainage\\nstructures, refuse disposal, water and sewer, and schools, or that the persons\\nor agencies responsible for the establishment of the proposed use shall be able\\nto provide adequately any such services;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vi. \\u00A0\\u00A0\\u00A0Will not create excessive additional requirements at public\\ncost for public facilities and services and will not be detrimental to the\\neconomic welfare of the community;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vii.\\u00A0\\u00A0\\u00A0Will have ingress and egress for the subject property which\\nshall be so designed as not to create an interference with traffic on\\nsurrounding public thoroughfares and which shall not be detrimental to\\nvehicular and pedestrian safety and convenience, traffic flow and control, and\\naccess in case of fire or catastrophe.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0viii. \\u00A0\\u00A0\\u00A0Will locate off-street parking, loading areas, refuse\\ndeposit locations, service areas, utility connection facilities, signs and site\\nlighting so as not be detrimental to vehicular and pedestrian safety and\\nconvenience, traffic flow and control, and access in case of fire or\\ncatastrophe and so as not to result in detrimental economic, noise, glare or\\nodor effects on adjoining properties and properties generally in the district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Compatibility. In considering the compatibility of the proposed\\nconditional use with all adjacent uses and structures, the Board of Zoning\\nAppeals shall consider:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The existing land use pattern;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The impact of the proposed conditional use upon the load on\\npublic facilities such as schools, utilities, and streets;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Changed or changing conditions which find the proposed use\\nto be advantageous to the community and the neighborhood;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0The impact of the proposed use upon living conditions in the\\nneighborhood;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0The impact of proposed use upon traffic congestion and public\\nsafety matters;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vi. \\u00A0\\u00A0\\u00A0The impact of the proposed use upon stormwater drainage;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vii. \\u00A0\\u00A0\\u00A0The impact of the proposed use upon light and air to\\nadjacent areas;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0viii. \\u00A0\\u00A0\\u00A0The impact of the proposed use upon property values in the\\nadjacent area;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ix. \\u00A0\\u00A0\\u00A0The impact of the proposed use upon the improvement or\\ndevelopment of adjacent property in accordance with existing regulations; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0x. \\u00A0\\u00A0\\u00A0The impact of the proposed use with regard to the scale of\\nneeds of the neighborhood or the community.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Upon Authorization\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Upon authorizing a conditional use, the Board of Zoning\\nAppeals shall impose such requirements and conditions with respect to location,\\nconstruction, maintenance and operation, in addition to those expressly\\nstipulated in this Zoning Code for the particular conditional use, as the Board\\nof Zoning Appeals may deem necessary for the protection of adjacent properties\\nand the public interest in furtherance of the purpose of this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The Board of Zoning Appeals shall issue written findings of\\nfact and its written determination that the standards specified in this\\nSection, when applied to the conditional use permit applied for, warrant\\nissuance of the conditional use permit.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Decision to Deny\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0If the Board of Zoning Appeals is unable to find adequate\\nevidence showing that the proposed conditional use is warranted when the\\nstandards specified in this Section are applied, then no conditional use permit\\nshall be issued.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0In denying a conditional use permit, the Board shall issue\\nwritten findings of fact and its written determination that the standards\\nspecified in this Section when applied to the conditional use permit applied\\nfor do not warrant conditional use permit approval.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications. The applicant shall not file a subsequent\\napplication for a conditional use permit for a particular parcel of property,\\nor part thereof, until the expiration of 12 calendar months from the denial\\ndecision date of the initial conditional use permit applied for; unless the\\nBoard of Zoning Appeals specifically waives the waiting period based upon a\\ndetermination that either:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0That the new application proposes a conditional use materially\\ndifferent from the initial conditional use which was denied;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0That not waiving the waiting period will impose a substantial\\nhardship on the applicant resulting from the applicant\\u0027s mistake or\\ninadvertence; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0That newly discovered matters warrant waiving the waiting period.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals. Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Scope of Approval\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally. The approval of a conditional use permit does not\\nauthorize the development of land. A conditional use permit allows the\\napplicant to initiate other Zoning Code applications (i.e., building permit,\\nzoning certificate, sign permit, etc.).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Violations. Any conditional use permit is in violation of this\\nZoning Code and shall be suspended or revoked if:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A court having jurisdiction or a jury find the holder of the\\nconditional use permit guilty of a violation or if a holder of a conditional\\nuse permit pleads guilty of violating.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Any requirement or term or condition of the conditional use\\npermit or has not conformed, at any time, with any or all of the requirements\\nor terms or conditions as set out in the conditional use permit as approved by\\nthe Board of Zoning Appeals.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The activity authorized by the conditional use permit commences\\nprior to the institution of all conditions imposed by the conditional use\\npermit.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0The use for which the conditional use permit was authorized does\\nnot commence within six months of the effective date of the conditional use\\npermit. The Community Development Director may grant an extension of up to six\\nmonths for good cause shown, upon petition of the conditional use permit\\nholder.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0The use for which the conditional use permit is authorized is\\ndiscontinued for six consecutive months.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Notification. If the use discontinues or fails to commence as\\nstipulated in this Zoning Code, the Community Development Director will issue\\nwritten notification to the property owner. Ten days after issuance of this\\nnotice, the Community Development Director shall issue the permit holder\\nwritten notification of the conditional use permit\\u0027s official revocation and\\nremoval.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The certified decision of the conditional use permit application\\nshall be recorded at the expense of the applicant with the Board of Zoning\\nAppeals.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A certified copy of the decision shall be maintained by the\\nCommunity Development Department.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The applicant shall retain a copy of the decision from the\\nCommunity Development Department.\\n1129.03 SITE PLAN.\\n\\u00A0\\nFigure 1129.03.1: Site Plan Flowchart\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally. Site plan approval is required for all development except one unit\\ndwellings, two-unit dwellings, three-unit dwellings, four-unit dwellings, and for all      [https://export.amlegal.com/media/\\ninstances that meet the following thresholds:                                              1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0New construction or expansion of an existing building or structuIMAGES/0-0-0-12664.jpg]\\nincreases the existing floor area by 35%; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0New construction or expansion of parking lots that increase the existing\\nimpervious area by 35%.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Deviations Prohibited. A site plan shall not authorize deviation\\nfrom any applicable development standards normally required by the existing\\nunderlying zoning, including, but not limited to signs, landscaping, parking,\\nor dimensional requirements.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Waiver of Site Plan. The Community Development Director may waive\\nthe requirement to prepare a site plan based on site characteristics and the\\nnature of the proposed changes being suitable for field verification or\\nintegration with a building permit.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Exceeding the Required Thresholds. Any site plan that exceeds the\\nthresholds provided in this Section shall apply for a variance and shall follow\\nthe requirements provided in Section\\n1130.02.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. The applicant shall submit a site plan application to the\\nCommunity Development Director.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally. Generally, refer to Section\\n1127.02.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Other Plans. In addition to the requirements of above, the\\nfollowing plans and items shall be provided to make a complete site plan\\nsubmittal:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Plot Plan. The plot plan shall show:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The proposed location of all structures identified by type,\\nsize, height and use;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The assignment of all lands subdivided; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0The location of all structures within 200 feet of\\nproperties adjoining the proposed development.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Plat and Topography Map. The plat and topography map shall show\\nthe proposed development area\\u0027s:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Property lines;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Easements;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Street rights of way;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0Topographic contours; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0Landscape features.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Circulation Plan. The circulation plan shall show:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Analysis of the traffic impacts of the proposed use;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0On-site vehicular and pedestrian circulation patterns,\\nincluding cross lot access;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0The location and dimensions of proposed driveways and\\nwalkways (points of egress and ingress); and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0The locations and arrangement of parking spaces and loading\\nfacilities.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Architectural Plan (in the C-DT district only). These documents\\nshall include plans and designs for all structures and other such other\\ninformation to explain the purpose, appearance, materials, and construction.\\nMore specifically, the architectural plan shall show:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0All proposed exterior building materials and their\\ncorresponding colors;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The design and specifications of all buildings and\\nstructures;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0The proposed fenestration all buildings and structures; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0The floor plan of all buildings and structures.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Landscape Plan. The landscape plan shall show:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0All proposed and required landscaping;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The landscape treatment;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii.\\u00A0\\u00A0\\u00A0Plazas, parks and other landscape features and amenities;\\nand\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0The proposed grading and drainage plan.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0Lighting Plan. The lighting plan shall show:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0All proposed site lighting locations; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The design and specifications of all proposed site lighting.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0G. \\u00A0\\u00A0\\u00A0Other Items. Any other information needed to address the\\nproposed development\\u0027s impacts as determined and required by the Community\\nDevelopment Director.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s). Not applicable.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Community Development Director Review and Decision. The Community\\nDevelopment Director shall review the site plan and shall act to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Approve the site plan;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Deny the site plan;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Approve the site plan with conditions; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Refer the site plan to the Planning Board for its review and\\nfinal action.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Authorization to Impose Conditions\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Generally. The Community Development Director may impose\\nconditions necessary to maintain the integrity of the City\\u0027s zoning districts,\\nto ensure the proposed use is consistent with the Comprehensive Plan, conforms\\nwith this Zoning Code, is appropriate to its location and compatible with\\nneighboring uses, and does not cause undue traffic congestion or significant\\ndeterioration of the environment.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Conditions Supplementary. All requirements imposed by a site\\nplan are in addition to and supplement this Zoning Code\\u0027s requirements.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Authorized Conditions. Authorized conditions include, but are\\nnot limited to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Site Plan Features. Limitations or requirements regarding the\\narea, setbacks, open space, landscaping, buffering, lighting, fencing, signage,\\noff-street parking, and similar site plan features of the proposal.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Operations. Limitations or requirements regarding the\\nproposed use\\u0027s operating characteristics, duration, or any similar feature of\\nthe proposed use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Duration. If the Community Development Director or Planning\\nBoard limits the duration of a site plan, a six month grace period, starting\\nfrom the final approval date, is afforded to the applicant in addition to the\\ntime period stipulated in the site plan conditions.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Approval Criteria\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally. The site of the proposed use or any associated\\nimprovements is not in violation of any local, state, or federal law (other\\nthan a zoning violation).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The use and site plan for the proposed use conforms, at a\\nminimum, with all applicable provisions of this Zoning Code for the existing\\nunderlying zoning designation, including but not limited to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Site Development Standards. All parking, landscaping,\\nsignage, lighting, improvement, and dimensional regulations as required in\\nTITLE Four - Site Development Standards.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Zoning District Standards. The purpose of the zoning\\ndistrict in which the proposed use is to be located and any dimensional\\nstandards applicable to the particular proposed use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Use-Specific Standards. All use-specific standards\\napplicable to the proposed use as required in\\nTITLE Two - Use Standards.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Site plans are only authorized for the proposed use(s).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Suitability. The characteristics of the proposed site are suitable\\nfor the proposed use considering the size, shape, location, topography, and\\nlocation of improvements and natural features.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Timeliness. The proposed use or development is timely, considering\\nthe adequacy of transportation systems, public facilities, and services,\\nexisting or planned for the area affected by the proposed use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Compatibility to Surrounding Area. The proposed use will not alter\\nthe character of the surrounding area in a manner that substantially limits,\\nimpairs, or precludes the use of surrounding properties for the principal uses\\nlisted as allowable by the underlying zoning district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Comprehensive Plan. The proposed use satisfies any applicable\\ngoals and policies of the Comprehensive Plan that apply to the proposed use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Use Appropriate and Compatible. The use is appropriate to its\\nproposed location and compatible with the character of neighboring uses, or\\nenhances the mixture of complementary uses and activities in the immediate\\nvicinity.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Traffic. The use shall not cause undue traffic congestion,\\ndangerous traffic conditions or incompatible service delivery, parking, or\\nloading problems. Necessary mitigating measures shall be proposed by the\\napplicant.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Nuisance. The operating characteristics of the use do not create a\\nnuisance and the impacts of the use on surrounding properties are minimized\\nwith respect to noise, odors, vibrations, glare, and any other similar\\nconditions.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Environment. The use shall not cause significant deterioration to\\nwater resources, wetlands, wildlife habitat, scenic characteristics, or other\\nnatural features. As applicable, the proposed use shall mitigate its adverse\\nimpacts on the environment.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications. Not applicable.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals. A site plan decision may be appealed to the Board of Zoning\\nAppeals as provided in Section\\n1130.04.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Scope of Approval\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0An approval letter shall be issued certifying the site plan is\\ncompliant with the conditions of this Zoning Code which may permit the\\napplicant to apply for other permits and plans.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0After the site plan is approved, the process of obtaining a\\nbuilding permit or certificate of occupancy consistent with any conditions of\\nsite plan approval may commence.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Site Plan Revisions\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Generally. Any revision to an approved site plan, other than\\nthose that qualify as minor pursuant to this Subsection, require amendment of\\nthe approved or existing site plan. Revisions to an approved site plan shall\\nonly be authorized by the Community Development Director pursuant to the\\nprocedures established in this Subsection, and subject to appeal as provided in\\nSection\\n1130.04.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Minor Revisions to an Approved Site Plan\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The Community Development Director may approve minor\\nrevisions to a previously approved site plan without notice or a public\\nhearing. A minor revision is one that becomes necessary during the use\\u0027s actual\\nimplementation, which could not be reasonably anticipated during its review,\\nand that does not significantly change the original approval granted.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0A minor revision includes:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0a. \\u00A0\\u00A0\\u00A0Building revisions/expansions that do not increase the\\nheight of a building or building area more than 35%;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0b. \\u00A0\\u00A0\\u00A0Changes in the number of parking spaces (adding, removing,\\nor relocating twenty (20) parking spaces or less), provided that parking\\nrequirements are met;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0c. \\u00A0\\u00A0\\u00A0Adjustments to waste facilities;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0d. \\u00A0\\u00A0\\u00A0Minor revisions to approved elevations; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0e. \\u00A0\\u00A0\\u00A0Substitution of similar plant materials on an approved\\nlandscape plan.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Major Revisions to an Approved Site Plan\\u00A0\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0A change outside the scope of minor revisions or to any of\\nthe following site plan requirements below is not considered minor:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0a. \\u00A0\\u00A0\\u00A0Use -Those activities allowed on site by the site plan.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0b. \\u00A0\\u00A0\\u00A0Operational Characteristics - The gross limitations or\\nrequirements regarding the proposed use\\u0027 s operating characteristics.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0c. \\u00A0\\u00A0\\u00A0Site Plan Features - The gross limitations or requirements\\nregarding the area, setbacks, open spaces, landscaping, buffering, lighting,\\nfencing, signage, or the off-street parking of the proposal.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0d. \\u00A0\\u00A0\\u00A0Duration - Requirements governing the duration of the\\npermit.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0e. \\u00A0\\u00A0\\u00A0Permit Holder - Requirements regarding the person or\\nentity to whom the permit is issued.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Major Revisions initiate a new site plan submittal subject\\nto the standards of this Section and those provided in Section\\n1127.08.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Revocation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Criteria. An approved site plan is considered in violation of\\nthis Zoning Code and shall be revoked if a court of law finds the use in\\nviolation of any of the following conditions:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The use established on site does not conform, at any time,\\nwith any or all approved permit condition(s) and or any local, state, or\\nfederal law.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The activity authorized by the site plan commences prior to\\nthe institution of all conditions imposed by the site plan.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Discontinuance of the approved use for at least six\\nconsecutive months.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0The approved use does not commence within six months of the\\nfinal approval date.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Revocation Procedures. If the Community Development Director\\u0027s\\ninspection reveals noncompliance with this Zoning Code, site plan revocation\\nprocedures shall commence as follows:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The Community Development Director shall, upon discovery of\\nsite plan noncompliance, issue a written warning, granting a grace period of at\\nleast 30 calendar days. During this time, the use may be brought into\\ncompliance with the current approved site plan for that location.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii.\\u00A0\\u00A0\\u00A0If noncompliance persists after the conclusion of the warning\\ngrace period, a Community Development Director shall issue written citation.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0If the citation results in a guilty verdict, the site plan\\nis considered revoked.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0The Community Development Director shall issue the permit\\nholder written notification of the site plan\\u0027s official revocation.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0In the event of discontinuance or failure to commence as\\nstipulated above, Community Development Director shall issue written\\nnotification to the applicant. Ten calendar days after issuance of Community\\nDevelopment Director notification of discontinuance or failure to commence, the\\nCommunity Development Director shall then issue the permit holder written\\nnotification of the site plan\\u0027s official revocation.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation. The applicant and Community Development Director shall\\nmaintain a copy of the approved site plan.\\n1129.04 PARKING LOT PERMIT.\\n\\u00A0\\nFigure 1129.04.1: Parking Lot Permit Flowchart\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability. The construction of new or modified parking lot areas,\\nexcept those associated with new development projects, requires approval of a parking\\nlot permit.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. A parking lot permit shall be initiated by the owner or\\napplicant of the subject property.                                                    [https://export.amlegal.com/media/\\n\\u00A0                                                                                    1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness.                                                         IMAGES/0-0-0-12737.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally, refer to Section\\n1127.02.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In addition to the requirements provided in Section\\n1127.02 (c), the following items shall be provided:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Proof of Ownership or Ownership Affidavit;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Site Plan that includes the number of parking spaces with\\nlandscaping and drive/aisle area to scale;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Stormwater Management Plan and Report (Includes Stormwater\\nCalculations (Refer to Chapter 961 of the Springfield Codified Ordinances);\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Stormwater Pollution Prevention Plan (SWPPP) required for sites\\nthat disturb one acre or more;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Notice of Intent (NOI) from Ohio EPA for sites that disturb one\\n(1) acre or more; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0Application fee as required in Table 1126.02.1: Base Application\\nFees. (Additional review fees apply if more than one (1) acre of land is\\ndisturbed - see Chapter\\n961)\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s). Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action. The Community Development Director shall review the parking\\nlot permit application and act to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Approve the parking lot permit;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Deny the parking lot permit; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Refer the parking lot permit decision to the Board of Zoning\\nAppeals.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Approval Criteria. The Community Development Director shall approve\\nthe parking lot permit application if it complies with:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0All applicable requirements of this Zoning Code;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0All applicable requirements of the Code of Ordinances, including\\nthe Building Code and Fire Code; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Any conditions of any currently applicable and unexpired rezoning,\\nconditional use permit, development plan, variance, or appeal decisions that\\napply to the property. If any of these prior approvals have expired, the\\napplicant must obtain a new approval before applying for a parking lot permit\\napplication.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications. Not applicable.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals. A parking lot permit decision by the Community Development\\nDirector may be appealed to the Board of Zoning Appeals as provided in Section\\n1130.04.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Scope of Approval\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A parking lot permit authorizes construction or expansion of a\\nparking area as shown in the approved permit.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0A parking lot permit does not authorize the occupancy of a\\nbuilding or structure.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0A parking lot permit shall remain in effect as long as\\ndevelopment is in full conformity with the provisions of this Zoning Code and\\nwith any conditions upon which the parking lot permit was issued. Upon the\\nservice of notice of any violation of such provisions or conditions, the\\nparking lot permit shall become null and void, and a new parking lot permit\\nshall be required for any further use of the parking area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Construction Timing\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Upon approval of the parking lot permit application the owner/\\ndeveloper has (12) months to complete the construction of a parking area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The owner/developer shall notify the Community Development\\nDirector of the completion of construction activities.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0At that time the Community Development Director and the City\\nEngineer will inspect the lot and determine whether it conforms to the approved\\nplans.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0If the parking area construction has been approved, the\\nCommunity Development Director will issue a certificate of completion to the\\nowner/developer of the parking area.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation. The Community Development Department and applicant shall\\nmaintain a copy of the parking lot permit decision.\\n1129.05 CERTIFICATE OF APPROPRIATENESS.\\n\\u00A0\\nFigure 1129.05.1: Certificate of Appropriateness Flowchart\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability. It shall be unlawful for any person to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Carry out or allow any construction, reconstruction, alteration,\\nrestoration, rehabilitation, installation, or relocation of any portion of or any\\nexterior feature of any contributing property in a designated historic district, or of\\nany landmark or heritage property, or of any state or federally designated historic    [https://export.amlegal.com/media/\\nresource; or                                                                           1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Construct or install any new structure within a designated historIMAGES/0-0-0-12811.jpg]\\ndistrict or in a designated historic landmark or heritage property, or in any state or\\nfederally designated historic resource, until after an application for a certificate\\nof appropriateness of such work has been approved by the Springfield Landmarks\\nCommission.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0Additionally, a building or demolition permit may not be granted\\ncontributing property within a historic district or in a designated historic\\nlandmark or heritage property, unless the Springfield Landmarks Commission\\nissues a certificate of appropriateness. Neither shall anyone carry out or\\nallow any material change in the light fixtures, signs, sidewalks, fences,\\nsteps, paving, or other exterior elements visible from any street, which\\naffects the appearance and cohesiveness of any contributing property in a\\ndesignated historic district, or of any landmark or heritage property, or of\\nany state or federally designated historic resource, unless the Springfield\\nLandmarks Commission issues a certificate of appropriateness.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A certificate of appropriateness shall be required prior to\\nbeginning any work in any historic resource, excluding work claimed to be\\nordinary repair or maintenance. No building permit shall be issued for property\\nthat requires a certificate of appropriateness unless and until the Community\\nDevelopment Director certifies to the Building Official that such a certificate\\nof appropriateness has been granted, advising as to any conditions attached to\\nsuch a certificate.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0A review of the plans or proposed work shall be undertaken by\\nthe Community Development Director for submission of a recommendation to the\\nSpringfield Landmarks Commission, or by the Springfield Landmarks Commission\\ndirectly, after the property owner files a completed application.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Decisions of the Springfield Landmarks Commission and by the\\nCommunity Development Director shall be in writing and shall state the findings\\nof the Springfield Landmarks Commission.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0A certificate of appropriateness shall be valid for 12 months\\nand shall expire thereafter.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0An applicant may resubmit an application for a certificate of\\nappropriateness after 12 months from the date of a denial decision.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0Certificates of appropriateness may be issued for distinct and\\nseparate phases of an ongoing project.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. A certificate of appropriateness shall be initiated by\\nthe owner or applicant of the subject property.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness. Generally, refer to Section\\n1127.02.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s). Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A certificate of appropriateness may be approved by either the\\nCommunity Development Director or the Springfield Landmarks Commission.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0A certificate of appropriateness involving ordinary repairs,\\ndemolition alterations or additions may be approved by the Community\\nDevelopment Director.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0A certificate of appropriateness involving significant repairs,\\ndemolition alterations or additions shall be approved by the Springfield\\nLandmarks Commission.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Community Development Director Review and Decision. If the\\nCommunity Development Director, guided by the adopted design guidelines, and\\nwhere applicable, criteria established by the Secretary of the Interior,\\ndetermines that the application involves ordinary repair or maintenance,\\nchange, restoration, color or removal of any exterior architectural feature of\\na historic resource which does not involve significant change in the\\narchitectural or historic value, style, general design or appearance, shall\\nreview the certificate of appropriateness and shall act to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Approve the certificate of appropriateness;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Deny the certificate of appropriateness; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Approve the certificate of appropriateness with conditions.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Springfield Landmarks Commission Review and Decision\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Recommendation from the Community Development Director. If the\\nCommunity Development Director determines that the application involves a\\nrepair, demolition alteration, addition, change, restoration, or removal of an\\nexternal architectural feature of a historic resource which involves a\\nsignificant change in the architectural or historic value, style, general\\ndesign, or appearance or for any other reason does not desire to act under the\\nsubsection above and is within a historic district or is a designated landmark\\nor heritage property, the Community Development Director shall provide a\\nrecommendation to the Springfield Landmarks Commission to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Approve the certificate of appropriateness;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Deny the certificate of appropriateness; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Approve the certificate of appropriateness with conditions.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Springfield Landmarks Commission Decision\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The Springfield Landmarks Commission shall conduct a public\\nhearing on the certificate of appropriateness application and shall render its\\ndecision after the hearing is closed.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii.\\u00A0\\u00A0\\u00A0The Springfield Landmarks Commission shall:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0a. \\u00A0\\u00A0\\u00A0Approve the certificate of appropriateness;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0b. \\u00A0\\u00A0\\u00A0Deny the certificate of appropriateness; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0c. \\u00A0\\u00A0\\u00A0Approve the certificate of appropriateness with\\nconditions.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Approval Criteria. In determining the recommendation and action on an\\napplication for a certificate of appropriateness, the Community Development\\nDirector and the Springfield Landmarks Commission shall review and decide the\\nappropriateness of the proposed repair, demolition alterations or additions,\\nand its compliance with:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Any applicable City of Springfield Design Guidelines for\\ndesignated local landmark and heritage properties;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The Secretary of the Interior\\u0027s Standards for Treatment of\\nHistoric Properties and Guidelines for Preservation, Rehabilitation and\\nReconstruction; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The applicant\\u0027s conformity with any revisions, stipulations or\\nrequirements as the Springfield Landmarks Commission finds appropriate.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications. Not applicable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A certificate of appropriateness decision by the Community\\nDevelopment Director may be appealed to the Springfield Landmarks Commission\\npursuant to this Section.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A certificate of appropriateness decision by the Springfield\\nLandmarks Commission may be appealed to the Board of Zoning Appeals as provided\\nin Section\\n1130.03.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Scope of Approval. No building permit applications shall be accepted\\nnor shall any\\npermit be issued, and no work shall be performed until after approval of a\\ncertificate of appropriateness, and not until five business days have elapsed\\nfrom its transmission to the Building Official, with any advice as to\\nconditions which may have been attached to the certificate of appropriateness.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation. The Community Development Department and applicant shall\\nmaintain a copy of the certificate of appropriateness decision.\\n1129.06 COMMUNICATION FACILITY/TOWER PERMIT.\\n\\u00A0\\nFigure 1129.06.1: Communication Facility/Tower Permit\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0No wireless telecommunications facility shall be constructed within the\\nCity unless and until a communication facility/tower permit shall have been issued\\nauthorizing such construction unless the City Manager or designee has issued a\\nwritten determination that the proposed Wireless Telecommunications Facility has no\\nappreciable impact.                                                                   [https://export.amlegal.com/media/\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Any wireless communication facility lawfully constructed within 1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nprior to the adoption of this Zoning Code, is a nonconforming use, unless and until a IMAGES/0-0-0-12886.jpg]\\ncommunication facility/tower permit shall have been issued with respect to such\\nwireless communication facility.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0A communication facility/ tower permit application shall not be required\\nfor location of a Wireless Telecommunication facility in the City\\u0027s rights of way.\\nSuch facilities must conform to the City\\u0027s ordinances rules and procedures governing\\nthe rights of way.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A communication facility/tower permit application may be initiated\\nby the owner or applicant of the subject property.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A communication facility/tower permit application shall be\\nsubmitted to the Community Development Department on such forms as the City\\nManager shall prescribe.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A communication facility/tower permit application shall be\\nsigned on behalf of the applicant by the person preparing the same and with\\nknowledge of the contents and representations made therein and attesting to the\\ntruth and completeness of the information. The landowner, if different than the\\napplicant, shall also sign the application. At the discretion of the City, any\\nfalse or misleading statement in the application may result in denial of the\\napplication without further consideration or opportunity for correction.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0A communication facility/tower permit application not meeting\\nthe requirements stated in this Section or that are otherwise incomplete may be\\nrejected by the City.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Contents. A communication facility/tower permit application shall\\ncontain the following:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Conditional Use Permit Application;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Co-location of a wireless telecommunications facility on\\nexisting structure including:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Documentation that demonstrates the need for the wireless\\ntelecommunications facility to provide service primarily and essentially within\\nthe City. Such documentation shall include propagation studies of the proposed\\nsite and all adjoining planned, proposed, in-service or existing sites;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0A plot plan shall indicate all building and land uses within\\ntwo hundred (200) feet of the proposed facility. Aerial photos and renderings\\nmay augment the plot plan.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0The location of the nearest residential structure;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0The location, size and height of all proposed and existing\\nantennae and all appurtenant structures;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0The number, type and design of the tower(s) and antenna(s)\\nproposed and the basis for the calculations of the tower\\u0027s capacity to\\naccommodate multiple users. The applicant shall list the location of every\\ntower, building, or structure within a reasonably proximity that could support\\nthe proposed antenna;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vi. \\u00A0\\u00A0\\u00A0A description of the proposed antenna(s) and all related\\nfixtures, structures, appurtenances and apparatus, including height above pre-\\nexisting grade, materials, color and lighting;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vii.\\u00A0\\u00A0\\u00A0A \\u0022Zone of Visibility Map\\u0022 which shall be provided in order\\nto determine locations from which the antenna may be seen;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0viii. \\u00A0\\u00A0\\u00A0Pictorial representations of \\u0027\\u0027before\\u0022 and \\u0022after\\u0022 views\\nfrom key viewpoints both inside and outside of the City, as may be appropriate,\\nincluding but not limited to state highways and other major roads; state and\\nlocal parks; other public lands; historic districts; preserves and historic\\nsites normally open to the public; and from any other location where the site\\nis visible to a large number of visitors, travelers or residents. Guidance will\\nbe provided concerning the appropriate key sites at a pre-application\\nconference, if requested by the applicant.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Telecommunications Structures. An applicant for a new\\ntelecommunication structure shall also submit,\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The type, locations and dimensions of all proposed and\\nexisting landscaping, and fencing;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0A comprehensive report inventorying existing towers and\\nother suitable structures within four miles of the location of any proposed new\\ntower, unless the applicant can show that some other distance is more\\nreasonable;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii.\\u00A0\\u00A0\\u00A0The make, model and manufacturer of the tower and antenna\\n(s);\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0An assessment of the visual impact of the tower base, guy\\nwires and accessory buildings from abutting and adjacent properties and streets\\nas relates to the need or appropriateness of screening.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0Proof of the availability of the insurance required and the\\nremoval bond required.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0If applicant petitions recognition of no appreciable impact,\\nthen a statement of no appreciable impact shall be submitted to the City\\nManager.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Technical Certification data according below.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0Statement of demonstration of necessity according to conditions\\nset forth below.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Technical Certifications. A communication facility/tower permit\\napplication shall contain, the following, each certified by an engineer or\\nother qualified professional as appropriate to that item:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A topographic and geomorphologic study and analysis taking into\\naccount the subsurface and substrata, and the proposed drainage plan, assuring\\nthe stability of the proposed wireless telecommunications facilities on the\\nproposed site.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The frequency, modulation and class of service of radio or other\\ntransmitting equipment;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The actual intended transmission and the maximum effective\\nradiated power of the antenna(s);\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0The direction of maximum lobes and associated radiation of the\\nantenna(s);\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Certification that the NIER levels at the proposed site are\\nwithin the threshold levels adopted by the FCC;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0Certification that the proposed antenna(s) will not cause\\ninterference with other telecommunications devices; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0G. \\u00A0\\u00A0\\u00A0A copy of the FCC license applicable for the intended use of the\\nwireless telecommunications facilities.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Required Demonstrations. The application shall contain\\ndemonstrations that the granting of the application will further the objectives\\nstated in this Section. Such demonstrations shall include:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A demonstration the need for the wireless telecommunications\\nfacility to provide service primarily and essentially within the City. Such\\ndemonstration shall include propagation studies of the proposed site and all\\nadjoining planned, proposed, in-service or existing sites.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0In the case of a new tower, a demonstration that the proposed\\nfacility has been sited and designed so as to employ the least visually and\\nphysically intrusive means that are not commercially impracticable under the\\nfacts and circumstances. Such report must include evidence that fair and\\nthorough consideration was given to the following:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Sharing an existing tower or other facility with another\\nprovider;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Locating the facility atop or within an existing structure;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Locating the facility upon publicly owned land;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0Making any new tower accessible to co-location of additional\\nantennas of other providers;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0Locating the facility so as to minimize the impact upon the\\nfollowing types of Zoning Districts in the following order:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0a. \\u00A0\\u00A0\\u00A0Historical Districts;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0b. \\u00A0\\u00A0\\u00A0Residential Districts;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0c. \\u00A0\\u00A0\\u00A0Commercial Districts;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0d. \\u00A0\\u00A0\\u00A0Industrial Districts;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vi. \\u00A0\\u00A0\\u00A0Minimizing the height of towers and other structures; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vii. \\u00A0\\u00A0\\u00A0Employing camouflage or other stealth technology.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0A demonstration of the ability of any proposed new tower to\\naccommodate future demand for at least five additional commercial applications,\\nsuch as future co-locations, without causing interference. This requirement may\\nbe waived, provided that the applicant demonstrates that the provisions of\\nfuture shared usage of the tower is not technologically feasible, is\\ncommercially impracticable or creates an unnecessary and unreasonable burden,\\nbased upon:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The foreseeable number of FCC licenses available for the\\narea; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The kind of wireless telecommunications facilities site and\\nstructure proposed.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Agreements between providers limiting or prohibiting co-location\\nshall not be accepted as a valid basis for a claim of commercial\\nimpracticability or hardship. An assertion that the proposed site is the only\\nsite under option or lease shall not be accepted as a valid basis for a claim\\nof commercial impracticability or hardship.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0If after review of the \\u0022Zone of Visibility Map\\u0022 submitted, the\\nCity determines that the proposed facility is likely to have adverse visual or\\naesthetic impact, the City may require the applicant to perform a balloon test\\nat the applicant\\u0027s expense, described as follows:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The applicant shall arrange to fly, or raise upon a temporary\\nmast, a minimum of a three foot in diameter brightly colored balloon at the\\nmaximum height of the proposed new tower.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The dates, (including a second date, in case of poor\\nvisibility on the initial date) times and location of this balloon test shall\\nbe advertised by the applicant 7 and 14 days in advance of the first test date\\nin a newspaper with a general circulation in the City.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0The applicant shall inform the City, in writing, of the\\ndates and times of the test, at least 14 days in advance.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0The balloon shall be flown for at least four consecutive\\nhours sometime between 7:00 a.m. and 4:00 p.m. on the dates chosen. The primary\\ndate shall be on a weekend, but in case of poor weather on the initial date,\\nthe secondary date may be on a weekday.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Fees and Deposit\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0At the time that a person submits an application for a\\nconditional use permit for a new tower, such person shall pay a non-refundable\\napplication fee of $5,000.00 to the City. If the application is for a\\nconditional use permit for co-locating on an existing tower or other suitable\\nstructure, where no increase in height of the tower or structure is required,\\nthe non-refundable fee shall be $2,000.00. At the time that a person submits an\\napplication for a determination of no appreciable impact, such person shall pay\\na non-refundable fee of $1,000.00 to the City.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0No application fee is required in order to rectify a conditional\\nuse permit for wireless telecommunications facilities, unless there has been a\\nvisible modification of the wireless telecommunications facility since the date\\nof the issuance of the existing conditional use permit for which the conditions\\nof the conditional use permit have not previously been modified. In the case of\\nany modification, the fees provided in this Section shall apply.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0In addition to the non-refundable application fee set forth in\\nthis Section, as required, an applicant shall deposit with the City funds\\nsufficient to reimburse the City for all reasonable costs of consultant and\\nexpert evaluation and consultation to the City in connection with the review of\\nany application, including the construction and modification of the site, once\\npermitted. The initial deposit shall be $8,500.00. The placement of the\\n$8,500.00 with the City shall precede the pre-application conference. The City\\nwill maintain a separate escrow account for all such funds. The City\\u0027s\\nconsultants/experts shall invoice the City for services in reviewing the\\napplication, including the construction and modification of the site, once\\npermitted. If at any time during the process this escrow account has a balance\\nless than $2,500.00, the applicant shall immediately, upon notification by the\\nCity, replenish the escrow account so that it has a balance of at least\\n$5,000.00. Such additional escrow funds shall be deposited with the City before\\nany further action or consideration is taken on the application. If the amount\\nheld in escrow by the City is more than the amount of the actual invoicing at\\nthe conclusion of the project, the remaining balance shall be promptly refunded\\nto the applicant.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s). Noticing and hearing requirements shall follow\\nthose prescribed in Section\\n1127.03.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Community Development Director Review.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Administrative Letter of Determination. The Community\\nDevelopment Director shall review the communication facility/tower permit and\\nact to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Approve an administrative letter of determination for the\\ncommunication facility/tower permit;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Deny an administrative letter of determination for the\\ncommunication facility/tower permit; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Approve an administrative letter of determination for the\\ncommunication facility/tower permit with conditions or modifications.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Recommendation. If an administrative letter of determination for\\na communication facility/tower permit is denied, does not apply, or if the\\ncommunication facility/tower permit is for a new facility, the Community\\nDevelopment Director shall review the communication facility/tower permit and\\nprovide a recommendation to the Board of Zoning Appeals to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Approve the communication facility/tower permit;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Deny the communication facility/tower permit; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Approve the communication facility/tower permit with\\nconditions or modifications.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Board of Zoning Appeals Decision. The Board of Zoning Appeals\\nshall consider the communication facility/tower permit at a public hearing\\nafter a recommendation has been provided by the Community Development Director.\\nAfter the hearing is closed, the Board of Zoning Appeals shall act to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Approve the communication facility/tower permit;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Deny the communication facility/tower permit; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Approve the communication facility/tower permit with conditions\\nor modifications.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(f)\\u00A0\\u00A0\\u00A0Approval Criteria\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Decision to Approve. A communication facility/tower permit shall\\nbe approved when:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0All of the following criteria is met (subsections i - iv below):\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0It is reasonably determined that approval of the\\ncommunication facility/tower permit will serve the objectives set forth in this\\nSection;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0It is reasonably determined that the applicant has clearly\\nand convincingly demonstrated the matters required by this Section;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0The application shows compliance with the standards set\\nforth in this Section; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0The application demonstrates compliance with other\\napplicable provisions of the Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Or, if the communication facility/tower permit application is\\nfor the modification of an existing tower or base station that does not\\nsubstantially change the physical dimensions of the tower or base station and\\ninvolves a collocation of new transmission equipment or removal of transmission\\nequipment or replacement of transmission equipment, then a communication\\nfacility/tower permit shall be granted for the collocation, removal, or\\nreplacement.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications. Not applicable.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals. Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Scope of Approval\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Effect of Approved Communication Facility/Tower Permit. An\\napproved permit shall entitle the permit holder to construct a wireless\\ntelecommunication facility upon the issuance of a building permit obtained from\\nthe Building Official, and to operate the facility for a period of five years\\nfrom the date of issuance, subject to compliance with the provisions below.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Continuing Obligations of Permit Holder. The permit holder shall:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Maintain the facility in continuous operation. \\u0022Continuous\\noperation\\u0022 means that the facility has not been inactive for a period in excess\\nof 60 consecutive calendar days, unless such inactivity has been caused by a\\nsupernatural event, or force majuere, and repair or reconstruction has\\ncommenced within such 60 day period;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Operate and maintain the facility in accordance with the terms\\nof the application, and any applicable license issued by the FCC;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Maintain in full force and effect the liability and other\\ninsurance required under the terms of this Section;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Negotiate in good faith for the shared use of any tower by other\\nwireless service providers in the future, and shall:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Respond within 60 days to a request for information from a\\npotential shared use applicant;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Allow shared use of the new tower if another\\ntelecommunications provider agrees in writing to pay reasonable charges. The\\ncharges may include, but are not limited to a pro rata share of the cost of\\nsite selection, planning, project administration, land costs, site design,\\nconstruction and maintenance financing, return on equity less depreciation, and\\nall of the costs of adapting the tower or equipment to accommodate a shared\\nuser without causing electromagnetic interference.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Failure to abide by the conditions outlined above may be grounds\\nfor revocation of the communication facility/tower permit for the facility.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Required Insurance\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A permit holder shall secure and at all times maintain public\\nliability insurance for personal injuries, death and property damage, and\\numbrella insurance coverage, for the duration of the communication facility/\\ntower permit in amounts as set forth below:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Commercial General Liability covering personal injuries,\\ndeath and property damage: $1,000,000 per occurrence; $2,000,000 aggregate;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The Commercial General Liability insurance policy shall\\nspecifically include the City and its officers, boards, employees, committee\\nmembers, attorneys, agents and consultants as additional named insureds.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The insurance policies shall be issued by an agent or\\nrepresentative of an insurance company licensed to do business in the State and\\nwith a Best\\u0027s rating of at least A.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0The insurance policies shall contain an endorsement obligating\\nthe insurance company to furnish the City with at least 30 days prior written\\nnotice in advance of the cancellation of the insurance.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Renewal or replacement policies or certificates shall be\\ndelivered to the City at least 15 days before the expiration of the insurance\\nthat such policies are to renew or replace.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0Before construction is initiated, but in no case later than 15\\ndays after the granting of the communication facility/tower permit, the permit\\nholder shall deliver to the City a copy of each of the policies or certificates\\nrepresenting the insurance in the required amounts.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Facility Removal. The City may require that a telecommunication\\nfacility be removed upon the occurrence of any of the following events:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The facility was not constructed in accordance with any\\napplicable permit;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The facility has deteriorated from lack of maintenance or other\\ncause so that it has become a danger to public safety;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C.\\u00A0\\u00A0\\u00A0More than 90 days have elapsed since the expiration of the\\nfacility\\u0027s communication facility/tower permit and no application for renewal\\nis pending;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0The facility has been inactive for a period of at least 90\\nconsecutive calendar days; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0The permit holder has not fulfilled the holder\\u0027s continuing\\nobligations of this Section.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Assurance of Removal\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0In order to assure the prompt removal of a wireless\\ncommunication facility when required by the City, the City shall require the\\npermit holder to maintain in full force and effect a removal bond. A removal\\nbond shall:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Be written by a surety company authorized to do business in\\nthe State;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Be in an amount sufficient to pay the cost of removal of the\\nfacility, and not less than $75,000;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Provide that upon written notice from the City Manager to\\nthe surety company and the holder that the City has caused the removal of the\\nfacility, the surety shall pay to the order of the City the City\\u0027s cost of\\nremoval of the facility, up to and including the maximum amount of the bond.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0If the bond required is unavailable or insufficient to pay the\\nCity\\u0027s cost of removal, the City may issue an assessment in the amount of its\\nremoval costs against the parcel or parcels of real estate upon which the\\nfacility was located, in accordance with law.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The certified decision of the communication facility/tower permit\\napplication shall be recorded at the expense of the applicant with the Board of\\nZoning Appeals.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A certified copy of the decision shall be maintained by the\\nCommunity Development Department.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The applicant shall retain a copy of the decision from the\\nCommunity Development Department.\\n1129.07 HOME OCCUPATION PERMIT.\\n\\u00A0\\nFigure 1129.07.1: Home Occupation Permit Flowchart\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability. The allowance of a home occupation as designated in Table\\n1110.03.1: Use Table, requires approval of a home occupation permit.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. A home occupation permit shall be initiated by the owner or\\napplicant of the subject property.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness. Refer to Section                                       [https://export.amlegal.com/media/\\n1127.02.                                                                             1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u00A0                                                                                   IMAGES/0-0-0-12962.jpg]\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s). Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action. The Community Development Director shall review the home\\noccupation permit application and act to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Approve the home occupation permit; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Deny the home occupation permit.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Approval Criteria. The Community Development Director shall approve\\nthe home occupation permit application if it complies with:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0All applicable requirements of this Zoning Code;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0All applicable requirements of the Code of Ordinances, including\\nthe Building Code and Fire Code; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Any conditions of any currently applicable and unexpired rezoning,\\nconditional use permit, development plan, variance, or appeal decisions that\\napply to the property. If any of these prior approvals have expired, the\\napplicant must obtain a new approval before applying for a home occupation\\npermit application.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications. Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals. A home occupation permit denial decision by the Community\\nDevelopment Director may be appealed to the Board of Zoning Appeals as provided\\nin Section\\n1130.04.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Scope of Approval. A home occupation permit authorizes the approved\\nbusiness within a residential use.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation. The Community Development Department and applicant shall\\nmaintain a copy of the home occupation permit decision.\\nCHAPTER 1130\\nRelief Procedures\\n1130.01\\u00A0\\u00A0\\u00A0Alternative compliance.\\n1130.02\\u00A0\\u00A0\\u00A0Variance.\\n1130.03\\u00A0\\u00A0\\u00A0Appeals from Landmarks Commission.\\n1130.04\\u00A0\\u00A0\\u00A0Appeals from administrative decision.\\n1130.05\\u00A0\\u00A0\\u00A0Zoning code/map interpretation.\\n\\u00A0\\n1130.01 ALTERNATIVE COMPLIANCE.\\n\\u00A0\\nFigure 1130.01.1: Alternative Compliance Flowchart\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability Alternative Compliance\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0This Section establishes provisions for alternative compliance associated\\nwith the review and approval of a development plan, including improvements to existing    \\u00A0[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nstructures or site features.                                                              IMAGES/0-0-0-13118_9075x6480.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The purpose of alternative compliance is to ensure that:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A proposed development complies with the purpose and intent of this Zoning\\nCode;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0A proposed project meets requirements that are appropriate for\\nlots or sites and site-specific development challenges by applying a flexible\\napproval procedure. A development may be interpreted to include redevelopment\\nof lots or sites with existing improvements and encumbrances that may pose\\nunique challenges to complying with the requirements of this Zoning Code; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0To allow for different standards that are in agreement with the\\nClark County Comprehensive Plan and that produce a substantially equivalent\\neffect as the requirements of this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The applicable zoning district standards for a project shall not\\nbe reduced or varied using the alternative compliance process unless the\\nstandard is specifically cited as qualifying for alternative compliance in this\\nZoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Alternative compliance may be considered for the following\\nstandards:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Required zoning district setbacks may be modified by 10%;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Required maximum building and structure heights may be modified\\nby 10%;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Required maximum sign dimensions, including but not limited to\\nheight, area, and setbacks may be modified by 20%; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0The placement, arrangement, and substitution of required\\nlandscaping may be modified, including but not limited to plant materials,\\nplant size, and planting space along street frontage.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Any alternative compliance request that exceeds the thresholds\\nprovided in this Section shall be considered a variance request and shall\\nfollow the requirements provided in Section\\n1130.02.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. A request for alternative compliance, as specifically\\ncited within this Zoning Code, may be submitted for review and approval along\\nwith the plan for a project, or along with the project\\u0027s initial application\\n(as applicable for the project).\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally, refer to Section\\n1127.02 .\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Additionally, alternative compliance requests must be clearly\\ndelineated graphically or in narrative format, as appropriate, on the plan (or\\non the project\\u0027s initial application), including a reference to the specific\\nsection within this Zoning Code that allows consideration of an alternative\\ncompliance standard provided in\\nTITLE Four - Site Development Standards.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s). Not Applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action. The Community Development Director shall review the project\\nsite plan\\u0027s\\nalternative compliance request and shall act to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Approve the alternative compliance request; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Deny the alternative compliance request.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Approval Criteria. The Community Development Director shall approve\\nan alternative compliance request only if:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The alternative compliance request is consistent with the\\nrecommendations and policies of the Clark County Comprehensive Plan;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The alternative compliance request does not reduce a standard\\nunless it is, to the greatest extent practical, equally mitigated or improved\\nby increasing the standards of other requirements; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The alternative compliance request does not modify the land uses\\nallowed in the zoning district in which the subject property is located, or to\\nadd a land use not normally allowed in the zoning district.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications. Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals. An alternative compliance denial decision by the Community\\nDevelopment\\nDirector may be appealed to the Board of Zoning Appeals as provided in Section\\n1130.04.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Scope of Approval\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0An approval letter shall be issued certifying the approved\\nalternative compliance is compliant with the conditions of this Zoning Code\\nwhich may permit the applicant to apply for other permits and plans.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0After the alternative compliance request is approved, the\\nCommunity Development Director may apply the approval to a pending plan review.\\nOnce the alternative compliance request and the plan are approved, a building\\npermit or certificate of occupancy consistent with any conditions of the\\nalternative compliance and plan approval may be issued.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation. The applicant and the Community Development Director\\nshall maintain a copy of the alternative compliance decision.\\n1130.02 VARIANCE.\\n\\u00A0\\nFigure 1130.02.1: Variance Flowchart\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The Board of Zoning Appeals may authorize, in specific cases due to\\nhardship, a variance from the terms of this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Any person who deems their property to suffer such physical limitations\\nof size, shape, slopes of ground or other physical conditions as to require a variance\\nof the regulations of this Zoning Code in order to enable them to make reasonable use\\nof their property.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. An application for a variance shall be submitted to the    [https://export.amlegal.com/media/\\nCommunity Development Director by the applicant.                                       1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n\\u00A0                                                                                     IMAGES/0-0-0-13197.jpg]\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness. Generally, refer to Section\\n1127.02.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Noticing shall comply with Section\\n1127.03 and state law, as applicable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A public hearing is required and shall comply with Section\\n1127.03.\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The Board of Zoning Appeals shall conduct a public meeting on the\\nvariance and shall render its decision after the meeting is closed.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The Board of Zoning Appeals may, in whole or in part:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Approve the variance; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Deny the variance.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Approval Criteria\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0No variance from the strict application of any provision of this\\nSpringfield Zoning Code which permits the use of land which is prescribed or\\nwhich will result in a use of land in an manner inconsistent with the basic\\ncharacter of the district in which such land is located, shall be granted by\\nthe Board of Zoning Appeals unless it finds that strict application of this\\nSpringfield Zoning Code would result in unnecessary hardship. The Board of\\nZoning Appeals shall find unnecessary hardship only when all the following\\nfacts and conditions exist:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The land in question cannot yield a reasonable return if used\\nonly for a purpose allowed in the district. To establish the inability of land\\nto yield a reasonable return, the owner must demonstrate factually, by dollars\\nand cents proof, an inability to realize a reasonable return under existing\\npermissible uses in the district. An owner does not suffer hardship sufficient\\nto warrant the granting of a variance simply because the land would be more\\nvaluable or yield more profits if the variance were granted. The requisite\\ndegree of hardship exists only when the only permissible uses are not\\neconomically feasible and strict application of the provisions or the\\nSpringfield Zoning Code deprive the owner of economically viable use of the\\nland.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The plight of the owner is due to unique circumstances and not\\nto other general conditions in the neighborhood which may reflect the\\nunreasonableness of the Springfield Zoning Code itself.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The use to be authorized by the variance will not alter the\\nessential character of the neighborhood.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0No variance from the strict application of any provision of this\\nSpringfield Zoning Code that does not involve the use of land which is\\nprescribed or which will result in a use of land in a manner inconsistent with\\nthe basic character of the district in which such land is located shall be\\ngranted by the board unless it finds that strict application of this\\nSpringfield Zoning Code would result in practical difficulties which will\\nunreasonably deprive the owner of a permitted use of his property. Such area\\nvariances include, by way of example and not of limitation, relief from a set\\nback requirement, height requirement, restrictions on the bulk of buildings,\\nthe extent of lot coverage or yard requirements. the Board of Zoning Appeals\\nshall consider and weigh the following factors and such other factors as the\\nBoard of Zoning Appeals may determine have a bearing on finding whether strict\\napplication of any provision of this Springfield Zoning Code would result in\\npractical difficulties which will unreasonably deprive the owner of a permitted\\nuse of their property; however, no one of such factors shall control in a\\ndetermination of whether such practical difficulty exists:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The property in question cannot yield a reasonable return and\\nthere can be no beneficial use of the property without the variance, the\\nvariance would relieve a clearly demonstrable situation where strict\\napplication of the provisions of this Zoning Code created a practical\\ndifficulty that will deprive the owner of economically viable use of the land,\\nas distinguished from a special privilege or convenience to the owner.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The variance is not substantial.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The essential character of the neighborhood will not be\\nsubstantially altered or suffer a substantial detriment as a result of the\\nvariance.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0The variance will not adversely affect the delivery of\\ngovernmental services such as police and fire protection, water and sewer\\nservices, and solid waste regulation and disposal.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0The property owner purchased the property without knowledge of\\nthe zoning restrictions.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0The property owner\\u0027s predicament feasibly can be obviated\\nthrough some method other than granting a variance.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0G. \\u00A0\\u00A0\\u00A0The property possesses conditions involving irregular, narrow,\\nshallow or steep lots, or other exceptional physical conditions and because of\\nsuch exceptional physical conditions, strict application of a provision or\\nprovisions of this Zoning Code would be unreasonable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0H. \\u00A0\\u00A0\\u00A0The spirit and intent behind the zoning requirement will be\\nobserved and substantial justice done by granting the variance.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications. If the variance request is denied, the\\napplicant shall not\\nsubmit a variance request of similarity on the same property for at least six\\nmonths.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals. Any decision by the Board of Zoning Appeals shall be a final\\nappealable order and the applicant may seek judicial review of the action in\\nany court of competent jurisdiction pursuant to general law.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Scope of Approval. After a final decision on the variance is\\nrendered, the applicant and any party in interest may file any further permits\\nor applications, undertake construction, or establish a use consistent with\\nthat decision.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation. The Community Development Department shall maintain the\\nvariance decision in its files, and the applicant shall maintain an original\\nsigned copy of the variance decision.\\n\\u00A0\\n1130.03 APPEALS FROM LANDMARKS COMMISSION.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability. Certificate of Appropriateness decisions made by the\\nSpringfield Landmarks Commission may be appealed to the Board of Zoning\\nAppeals.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. To make an appeal, the aggrieved party shall file a\\nnotice of appeal within 30 days of the Springfield Landmarks Commission\\u0027s final\\naction.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally, refer to Section\\n1127.02 .\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In addition to the requirements of Section\\n1127.02 (c), the applicant shall provide the following information:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Summary of any reasons provided by the Springfield Landmarks\\nCommission concerning the decision made in the case;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Reasons the applicant of the appeal contends that the\\nSpringfield Landmarks Commission erred in its decision;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Reasons the applicant of the appeal believes that the public\\nhealth, safety, welfare, and morals would be better served if the Springfield\\nLandmarks Commission\\u0027s action were reversed; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Any new and pertinent information bearing on the case which may\\nnot have been available or have been overlooked by the Springfield Landmarks\\nCommission or which may have come to light following the meeting at which the\\nSpringfield Landmarks Commission made its decision.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Noticing shall comply with S Section\\n1127.03 and state law, as applicable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A public hearing is required and shall comply with Section\\n1127.03 .\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action. The Board of Zoning Appeals shall act to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Reverse the Springfield Landmarks Commission\\u0027s decision; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Affirm the Springfield Landmarks Commission\\u0027s decision.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Approval Criteria. The Board of Zoning Appeals shall review all\\nappeals to determine the reasonableness of the decision(s) made by the\\nSpringfield Landmarks Commission considering the following criteria for\\napplications for Certificates of Appropriateness:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The application fully complies with the purpose set forth in the\\nCodified Ordinances for the Springfield Landmarks Commission;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The application meets the Secretary of the Interior\\u0027s Standards\\nfor Rehabilitation and the specific design guideline requirements in the\\nCodified Ordinances;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The application meets the general standards for review as outlined\\nin this Section and in the Codified Ordinances.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications. Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals. Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Scope of Approval. Depending on the appeal decision, the applicant\\nmay apply for any permits or approvals required for development, as provided in\\nthis Zoning Code.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation. The Community Development Department shall maintain the\\ndecision in its files, and the applicant shall maintain an original signed copy\\nof the decision.\\n\\u00A0\\n1130.04 APPEALS FROM ADMINISTRATIVE DECISION.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability. Decisions made by the Community Development Director\\nor any other City staff personnel may be appealed to the Board of Zoning\\nAppeals.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. To make an appeal, the aggrieved party shall file a\\nnotice of appeal within 30 days of the Community Development Director\\u0027s final\\naction.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally, refer to Section\\n1127.02 .\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In addition to the requirements of Section\\n1127.02 (c), the applicant shall provide the following information:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Summary of any reasons provided by the Community Development\\nDirector concerning the decision made in the case;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Reasons the applicant of the appeal contends that the Community\\nDevelopment Director erred in its decision;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Reasons the applicant of the appeal believes that the public\\nhealth, safety, welfare, and morals would be better served if the Community\\nDevelopment Director\\u0027s action were reversed; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Any new and pertinent information bearing on the case which may\\nnot have been available or have been overlooked by the Community Development\\nDirector or which may have come to light following the meeting at which the\\nCommunity Development Director made its decision.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Noticing shall comply with Section\\n1127.03 and state law, as applicable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A public hearing is required and shall comply with Section\\n1127.03.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action. The Board of Zoning Appeals shall act to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Reverse the Community Development Director\\u0027s decision; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Affirm the Community Development Director\\u0027s decision.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Approval Criteria\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The applicant bears the burden of proof to demonstrate to the\\nBoard of Zoning Appeals that the items provided below have led to error in\\njudgment by the Community Development Director.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The Board of Zoning Appeals shall consider the evidence submitted\\nby the applicant, the report and decision of the Community Development Director\\nand, where the property is located within the City\\u0027s corporate limits, any\\nrecommendations from City staff, and the following, as applicable:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Consistency with the Comprehensive Plan,\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Adverse impacts on neighboring properties, and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Health, safety, and welfare of the City.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0If new information is placed before the Board of Zoning Appeals\\nthat, in the opinion of the Board of Zoning Appeals, would affect the Community\\nDevelopment Director\\u0027s decision, the Board of Zoning Appeals may refer the case\\nback to the Community Development Director for further study, including the new\\ninformation, and recertification.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications. Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals. Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Scope of Approval\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0An approval letter shall be issued certifying the appeal decision\\nis compliant with the conditions of this Zoning Code which may permit the\\napplicant to apply for other permits and plans.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Depending on the appeal decision, the applicant may apply for any\\npermits or approvals required for development, as provided in this Zoning Code.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation. The Community Development Department shall maintain the\\ndecision in its files, and the applicant shall maintain an original signed copy\\nof the decision.\\n\\u00A0\\n1130.05 ZONING CODE/MAP INTERPRETATION.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability. The Board of Zoning Appeals may decide any question\\ninvolving the interpretation of the Zoning Code text or map, as follows:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0In case there is question as to the intended meaning of any\\nprovision of the Zoning Code text, the Board of Zoning Appeals may interpret\\nits meaning as it applies to a particular property. Before reaching a decision\\nin response to any request, the Board of Zoning Appeals shall obtain the\\nopinion of the City Law Director.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Where the street or lot layout actually on the ground, or as\\nrecorded differs from the street and lot lines as shown on the Zoning Map, the\\nBoard of Zoning Appeals, after notice of public hearing to the owners of the\\nproperty, shall interpret the Zoning Map in such a way as to carry out the\\nintent and purpose of this Zoning Code for the particular section or district\\nin question. In case of any question as to the location of any boundary line\\nbetween districts, an application for interpretation of the Zoning Map may be\\nmade to the Board of Zoning Appeals and a determination shall be made by such\\nBoard of Zoning Appeals by following the procedure established in this Title.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Where a specific use is proposed that is not listed or provided\\nfor in this Zoning Code, The Board of Zoning Appeals may make a determination\\nthat the proposed use is substantially similar to a specific use that is listed\\nor provided for in the Zoning Code. If the Board of Zoning Appeals finds that a\\nuse is substantially similar to a specific use listed in this Zoning Code, the\\nsubstantially similar use is deemed to be a substantially similar permitted use\\nin those districts where the specific use is a permitted use, and a\\nsubstantially similar conditional use in those districts where the specific use\\nis a conditionally permitted use. In formulating a determination that a\\nproposed use is a substantially similar use, the Board of Zoning Appeals shall\\ninclude in its written findings the reasoning upon which the decision is based.\\nThe following standards shall be considered by the Board when making a\\ndetermination that a use is substantially similar to a permitted or a\\nconditional use within a specific district:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The compatibility of the proposed use with the general use\\nclassification system as specified in this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The nature, predominant characteristics, and intensity of the\\nproposed use in relation to those uses specified by this Zoning Code as being\\npermitted, or in the case of a conditional use, conditionally permitted in that\\ndistrict.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The size, dimensional requirements, parking requirements,\\ntraffic generation potential, and other regulatory considerations normally\\nassociated with uses as specified in this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Should a use be determined to be substantially similar to a\\nspecific permitted or conditionally permitted use provided for in this Zoning\\nCode, it shall then be permitted in the same manner and under the same\\nconditions and procedures as the use is permitted to which it has been found to\\nbe substantially similar. The Community Development Director shall maintain, as\\na public record, a listing of all uses which have been determined to be\\nsubstantially similar. For each such use the record shall include the use as\\nlisted in the Zoning Code, the use unlisted in the Zoning Code about which the\\ndetermination of substantial similarity was made, and the dates of any actions\\nthereupon by the Board of Zoning Appeals. This record shall also contain the\\nsame information for all uses which have been determined not to be\\nsubstantially similar. The Community Development Director shall consult this\\nrecord in the process of issuing zoning permits.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Initiation. An interpretation request shall be submitted by a\\nproperty owner or applicant to the Community Development Director for the Board\\nof Zoning Appeals review and determination.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Completeness. Generally, refer to Section\\n1127.02.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Notice and Hearing(s)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Noticing shall comply with Section\\n1127.03 and state law, as applicable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A public hearing is required and shall comply with Section\\n1127.03.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Action. The Board of Zoning Appeals may, in its discretion, take any\\nof the following actions:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Review and evaluate the request;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Consult with City staff or the Planning Board;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Render an opinion; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Provide an interpretation in writing.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Approval Criteria. The Board of Zoning Appeals shall consider this\\nZoning Code, the Zoning Map, the Comprehensive Plan, and any other relevant\\ninformation to make a final interpretation decision.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Subsequent Applications. Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Appeals. Not applicable.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Scope of Approval. Depending on the interpretation decision, an\\napplicant may apply for any permits or approvals required for development, as\\nprovided in this Zoning Code.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Recordation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The certified interpretation decision shall be recorded with the\\nBoard of Zoning Appeals.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A certified copy of the interpretation decision shall be\\nmaintained by the Community Development Department.\\nTITLE SIX - Nonconforming Standards\\nChap.\\u00A0\\u00A0\\u00A0\\n1131.\\u00A0\\u00A0\\u00A0General Provisions.\\nCHAPTER 1131\\nGeneral Provisions\\n1131.01\\u00A0\\u00A0\\u00A0Classification and effect of nonconforming status.\\n1131.02\\u00A0\\u00A0\\u00A0Determination and effect of abandonment or destruction.\\n1131.03\\u00A0\\u00A0\\u00A0Repair and maintenance.\\n1131.04\\u00A0\\u00A0\\u00A0Restrictions on alterations.\\n1131.05\\u00A0\\u00A0\\u00A0Accessory buildings, features, and uses.\\n1131.06\\u00A0\\u00A0\\u00A0New residential construction on nonconforming lots.\\n1131.07\\u00A0\\u00A0\\u00A0Restrictions on alterations of lots and signs.\\n1131.08\\u00A0\\u00A0\\u00A0Determination and loss of sign legal nonconformity.\\n1131.01 CLASSIFICATION AND EFFECT OF NONCONFORMING STATUS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Classification of Nonconformities. Lots, uses of lands, structures,\\nsigns, or combinations thereof may exist which were lawfully established prior\\nto the effective date or amendment of this Zoning Code, but that do not comply\\nwith the effective terms of this Zoning Code. Such legally established lots,\\nuses of lands, structures, and signs shall be considered as nonconformities.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Burden of Proof on Property Owner. The burden of establishing that\\nany use or building is lawfully nonconforming under the provisions of this\\nZoning Code shall, in all cases, be upon the owner of such nonconformity and\\nnot upon the City of Springfield.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Effect of Nonconforming Status. Legally established nonconformities\\nshall be permitted to remain in place and continue their use, as applicable,\\nbut are prohibited from being altered, moved, extended, expanded, or replaced\\nwithout the approval of the Board of Zoning Appeals, except where otherwise\\nspecifically provided for in this Zoning Code.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0New Nonconformities Restricted. Nonconforming uses and buildings\\nshall not be replaced with any other prohibited uses or buildings without the\\napproval of the Board of Zoning Appeals, except where otherwise specifically\\nprovided for in this Zoning Code.\\n\\u00A0\\n1131.02 DETERMINATION AND EFFECT OF ABANDONMENT OR  DESTRUCTION.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Effect of Abandonment or Vacancy. If any nonconforming building,\\nfeature, or use is abandoned, vacated, or voluntarily discontinued for 2 years\\nor more, any future uses or any future alterations to such nonconformity shall\\nbe in conformity with all applicable standards of this Zoning Code, including\\nthe applicable zoning district.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Restoration Following Damage or Destruction. Nothing in this Zoning\\nCode shall prevent the restoration of a nonconforming building, feature, or use\\nthat is destroyed or damaged, provided:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0That the extent of the damage or destruction is less than 60% of\\nthe reproduction value;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0That the property owner(s) shall file with the Community\\nDevelopment Director a notice of intention to continue the nonconformity within\\n6 months of such damage or destruction; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0That the restoration or construction is commenced within one year\\nof the date that such notice is given to the Community Development Director.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Failure to Provide Notice Following Damage or Destruction. If a\\nnotice of intention to continue a damaged or destroyed nonconformity is not\\nprovided to the Community Development Director within 6 months of such damage\\nor destruction, the nonconformity shall be deemed abandoned and shall not be\\nrestored except in compliance with this Zoning Code.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Exception to Restoration Limit. The Board of Zoning Appeals may\\nreview and decide upon the restoration of a nonconforming use damaged by fire,\\nexplosion, or Supernatural Event to the extent of more than 60% of its\\nreproduction value.\\n\\u00A0\\n1131.03 REPAIR AND MAINTENANCE.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Ordinary Repairs Allowed. On any nonconforming structure or portion\\nof a structure containing a nonconforming use, work may be done on ordinary\\nrepairs, or on repair or replacement of walls, fixtures, wiring, or plumbing,\\nprovided that the footprint and height of the structure as it existed, when it\\nbecame nonconforming, shall not be increased.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Major Repairs Allowed with Limitations. Nothing within this Zoning\\nCode shall be deemed to prevent the strengthening or restoring to safe\\ncondition of any building, or part thereof, declared to be unsafe by any\\nofficial charged with protecting the public safety, upon order of such\\nofficial. Where appropriate, a building permit for such activities shall be\\nrequired.\\n\\u00A0\\n1131.04 RESTRICTIONS ON ALTERATIONS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Required Yards and Setbacks. Nonconforming buildings, features, and\\nuses shall not be altered in a manner that reduces provided yards or setbacks\\nbelow minimum requirements.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Alterations to Nonconforming Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Nonconforming uses shall not be enlarged, increased, or extended\\nto occupy a greater area of land than was occupied at the effective date of\\nadoption or amendment of this Zoning Code. The Board of Zoning Appeals shall\\nonly grant such alteration to a nonconforming use upon finding that the manner\\nof increase or improvement in the useable area of the nonconforming use will\\nhave minimal adverse impact upon adjacent properties and permitted land uses in\\nthe surrounding neighborhood; or upon finding that the increase or improvement\\ncan be made compatible with the adjacent properties and the uses in the\\nsurrounding neighborhood upon compliance with specified conditions.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Nonconforming uses may be extended throughout any parts of an\\nassociated building that were arranged or designed for such use at the time of\\nadoption or amendment of this Zoning Code. No such use shall be extended to\\noccupy any land outside such building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Any structure or structure and land in combination in or on which\\na nonconforming use is replaced with a conforming use shall thereafter conform\\nto the applicable regulations of this Zoning Code. The prior nonconforming use\\nmay not be resumed.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Nonconforming uses that are altered shall be required to meet all\\nsetbacks of the applicable zoning district.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Substitution of Nonconforming Uses. If no structural alterations are\\nmade, any nonconforming use of a structure or of a structure and land in\\ncombination may, upon appeal to the Board of Zoning Appeals, be changed to\\nanother nonconforming use provided that the Board shall find that the proposed\\nuse is equally appropriate or more appropriate to the district than the\\nexisting nonconforming use. In permitting such a change, the Board of Zoning\\nAppeals may require appropriate conditions and safeguards in accord with other\\nprovisions of this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Alterations to Nonconforming and Associated Buildings. Buildings that\\nare associated with a nonconforming use shall not be enlarged, extended,\\nconstructed, reconstructed, moved, or structurally altered except in changing\\nthe use of the structure to an allowed use, except as authorized by the Board\\nof Zoning Appeals.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0New Construction Prohibited. Construction of new buildings associated\\nwith nonconforming uses of land shall be prohibited.\\n\\u00A0\\n1131.05 ACCESSORY BUILDINGS, FEATURES, AND USES.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability. Accessory buildings, features, and uses that were\\nlegally established prior to the effective date of this Zoning Code which do\\nnot comply with applicable setback or coverage requirements shall still be\\nconsidered in compliance with this Zoning Code.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Compliance for New Modifications. Any modifications of existing\\naccessory buildings, features, and uses proposed after the effective date of\\nthis Zoning Code shall only be permitted in compliance with all applicable\\nstandards of this Zoning Code.\\n\\u00A0\\n1131.06 NEW RESIDENTIAL CONSTRUCTION ON NONCONFORMING LOTS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Construction Allowed. Within a zoning district where one-unit or two-\\nunit dwellings are permitted, a one-unit or two-unit dwelling and any allowed\\naccessory buildings and features may be erected on a nonconforming single lot\\nof record that is in separate ownership from any abutting lots, even where such\\nlot does not meet minimum applicable lot area or lot width standards.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Minimum Required Dimensional Standards. Construction of dwellings on\\na nonconforming lot shall meet all applicable yard and setback standards,\\nexcept where the infill development standards are utilized, or a variance has\\nbeen approved.\\n\\u00A0\\n1131.07 RESTRICTIONS ON ALTERATIONS OF LOTS AND SIGNS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Alterations to Lot Area and Width. Nonconforming lots shall not be\\nsubdivided or otherwise altered in a manner that reduces the provided lot area\\nor lot width below the prescribed minimum requirements.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Alterations to Signs. The replacement or upgrading of defective parts\\nof a nonconforming sign may not result in increasing the degree of\\nnonconformity of such sign.\\n\\u00A0\\n1131.08 DETERMINATION AND LOSS OF SIGN LEGAL NONCONFORMITY.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Determination of Legal Nonconformity. All signs legally existing\\nbefore the effective date of the amendment of this resolution may be continued,\\neven though such sign may not conform with the provisions (excluding safety,\\nmaintenance, and repair) of this resolution, provided, such signs are properly\\nmaintained and do not endanger the public health, safety, or general welfare.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Loss of Legal Nonconforming Status. A legal nonconforming sign will\\nlose its designation of legal nonconformity if:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The sign is relocated;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The sign is replaced;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The structure or size of the sign is altered in any way except\\ntowards compliance with this Zoning Code - exempting general maintenance,\\nchangeable marquees, or face and copy changes; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0The sign is on a lot that discontinues active operation for a\\nperiod of two or more years.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Maintenance and Repair of Nonconforming Signs\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Legal nonconforming signs are subject to all requirements of this\\nZoning Code regarding safety, maintenance, and repair. However, if the sign\\nsuffers damage to an extent greater than 60% of the estimated replacement\\nvalue, unless such damage was caused by vandalism, a Supernatural Event, or\\nother causes outside the influence of the owner or user, the sign shall be\\nreplaced with a sign that complies with this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The Community Development Director shall be authorized to\\ndetermine whether a legal nonconforming sign is properly maintained and does\\nnot endanger the public or constitute a nuisance.\\nTITLE SEVEN - Enforcement Standards\\nChap.\\n1132.\\u00A0\\u00A0\\u00A0General provisions.\\nChap.\\n1133.\\u00A0\\u00A0\\u00A0Violation Noticing.\\nChap.\\u00A0\\u00A0\\u00A0\\n1134.\\u00A0\\u00A0\\u00A0Penalties, Fines, and Remedies.\\nCHAPTER 1132\\nGeneral Provisions\\n1132.01\\u00A0\\u00A0\\u00A0Enforcement responsibility.\\n1132.02\\u00A0\\u00A0\\u00A0Generally.\\n1132.03\\u00A0\\u00A0\\u00A0Complaints regarding violations.\\n1132.04\\u00A0\\u00A0\\u00A0Entry and inspection of property.\\n\\u00A0\\n1132.01 ENFORCEMENT RESPONSIBILITY.\\n\\u00A0\\u00A0\\u00A0The Community Development Director holds primary responsibility for\\nenforcing all provisions of this Zoning Code. Other officers of the City,\\ndesignated by the City Manager, share responsibility for enforcing provisions\\nof this Zoning Code.\\n\\u00A0\\n1132.02 GENERALLY.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0General Unlawful Activity. Any building erected, constructed,\\naltered, enlarged, converted, moved or used contrary to any of the provisions\\nof this Zoning Code, and any use of any land or building which is conducted,\\noperated or maintained contrary to any of the provisions of this Zoning Code\\nshall be unlawful.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Specific Violations. Any of the following violates this Zoning Code\\nand are subject to the penalties and enforcement protocol as provided in this\\nTitle.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Buildings or Structures. To erect, construct, reconstruct, alter,\\nrepair, convert, or maintain a building or structure in a manner inconsistent\\nwith the requirements of this Zoning Code or a condition of approval.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Use of Land. To use any land or premises in a manner inconsistent\\nwith the requirements of this Zoning Code or a condition of approval.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Establish Use, Structure, or Sign Without Permit or Approval. To\\nestablish or place any use, structure, or sign upon land that is subject to\\nthis Zoning Code without all of the approvals required by this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Development Without Permit or Approval. To engage in any\\ndevelopment, construction, remodeling, or other activity of any nature upon\\nland that is subject to this Zoning Code without all of the approvals required\\nby this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Development, Use, or Sign Inconsistent with Permit. To engage in\\nany development, use, construction, remodeling, or other activity of any nature\\nin any way inconsistent with the terms and conditions of any permit, approval,\\ncertificate, or other form of authorization required to engage in those\\nactivities.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Development, Use, or Sign Inconsistent with Conditions of\\nApproval. To violate, by act or omission, any term, condition, or qualification\\nplaced by an approval authority upon any permit or other form of authorization.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Development or Sign Inconsistent with this Zoning Code. To erect,\\nconstruct, reconstruct, remodel, alter, maintain, move, or use any building,\\nstructure, or sign, or to engage in development in violation of any zoning,\\nsign, or other regulation of this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Making Lots or Setbacks Nonconforming. To reduce or diminish any\\nlot area so that the lot size, setbacks, or open spaces are smaller than\\nrequired by this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Increasing Intensity or Density of Use. To increase the intensity\\nor density of use of any land or structure, except in accordance with the\\nprocedural requirements and substantive standards of this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0Removing or Defacing Required Notice. To remove, deface, obscure,\\nor otherwise interfere with any notice required by this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Failure to Remove Signs. To fail to remove any sign installed,\\ncreated, erected, or maintained in violation of this Zoning Code or for which\\nthe sign permit expired.\\n\\u00A0\\n1132.03 COMPLAINTS REGARDING VIOLATIONS.\\n\\u00A0\\u00A0\\u00A0Whenever a violation of this Zoning Code occurs or is alleged to have\\noccurred, any person may file a complaint. Such complaint stating fully the\\ncauses and basis thereof shall be filed with the Community Development\\nDirector. The Community Development Director shall properly record such\\ncomplaint, investigate such complaint, and take action as provided by this\\nTitle.\\n\\u00A0\\n1132.04 ENTRY AND INSPECTION OF PROPERTY.\\n\\u00A0\\u00A0\\u00A0The Community Development Director is authorized to make inspections of\\nproperties and structures for the purpose of enforcing the provisions of this\\nZoning Code. Prior to seeking entry to any property or structure for such\\nexamination or survey, the Community Development Director shall attempt to\\nobtain the permission of the owner or occupant to inspect the property or\\nstructure. If such permission is denied or cannot be obtained, the Community\\nDevelopment Director shall request the assistance of the City Law Director in\\nsecuring a valid search warrant prior to entry.\\n\\u00A0\\n\\u00A0\\n\\u00A0\\nCHAPTER 1133\\nViolation Noticing\\n1133.01\\u00A0\\u00A0\\u00A0Notice of violation.\\n\\u00A0\\n1133.01 NOTICE OF VIOLATION.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Whenever the Community Development Director determines that there is\\na violation of any provision of this Zoning Code, a warning shall be issued and\\nshall serve as a notice of the violation. Such notice shall:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Be in writing;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Identify the violation;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Include a reference to the sections of this Zoning Code being\\nviolated;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0State the time by which the violation shall be corrected; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0State the corrective action.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Service of notice of violation shall be as follows:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0By personal delivery to the person or persons responsible, or by\\nleaving the notice at the usual place of residence of the owner with a person\\nof suitable age and discretion;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0By certified mail deposited in the United State Post Office\\naddressed to the person or persons responsible at a last known address;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0If a certified mail envelope is returned with endorsement showing\\nthat the envelope is unclaimed, then service shall be sent by ordinary mail,\\nand the mailing shall be evidenced by a certificate of mailing. Service shall\\nbe deemed complete when the fact of mailing is entered of record, provided the\\nordinary mail envelope is not returned by the postal authorities with an\\nendorsement showing failure of delivery; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0By posting a copy of the notice form in a conspicuous place on the\\npremises found in violation.\\nCHAPTER 1134\\nPenalties, Fines, and Remedies\\n1134.01\\u00A0\\u00A0\\u00A0Penalties and fines.\\n1134.02\\u00A0\\u00A0\\u00A0Remedies.\\n\\u00A0\\n1134.01 PENALTIES AND FINES.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0It shall be unlawful to erect, establish, locate, construct,\\nreconstruct, enlarge, change, convert, move, repair, maintain or structurally\\nalter any building, structure or land in violation of any provisions of this\\nZoning Code or any subsequent amendment.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Any person who violates this Zoning Code or fails to comply with any\\nof its requirements shall upon conviction be guilty of a minor misdemeanor and\\nbe fined according to CHAPTER\\n1324 of the Codified Ordinances.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Each day such violation continues after receipt of a violation notice\\nshall be considered a separate offense.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0The owner or tenant of any building, structure, premises or part\\nthereof, and any architect, builder, contractor, agent or other person who\\ncommits, participates in, assists in or maintains such violation may each be\\nfound guilty of a separate offense and suffer the penalties provided in this\\nTitle.\\n\\u00A0\\n1134.02 REMEDIES.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Nothing in this Zoning Code shall be deemed to abolish, impair or\\nprevent other additional remedies as provided by law.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0In the event of a violation of any provision or requirement of this\\nZoning Code, or in the case of an imminent threat of such a violation, the City\\nLaw Director, may, in addition to other recourses provided by law, institute\\nmandamus, injunction, abatement or other appropriate actions to prevent,\\nremove, enjoin or terminate such violation.\\nTITLE EIGHT - Administrative Bodies.\\nChap.\\u00A0\\u00A0\\u00A0\\n1135.\\u00A0\\u00A0\\u00A0General Provisions\\nChap.\\n1136.\\u00A0\\u00A0\\u00A0Quasi-Legislative Bodies and Personnel.\\nChap.\\n1137.\\u00A0\\u00A0\\u00A0City Administrative Bodies and Personnel.\\nCHAPTER 1135\\nGeneral Provisions\\n1135.01\\u00A0\\u00A0\\u00A0Generally.\\n\\u00A0\\n1135.01 GENERALLY.\\n\\u00A0\\u00A0\\u00A0This Title introduces and establishes recommending and approval authorities,\\ndescribes their composition, and summarizes their authority.\\nCHAPTER 1136\\nQuasi-Legislative Bodies and Personnel\\n1136.01\\u00A0\\u00A0\\u00A0City Commission.\\n1136.02\\u00A0\\u00A0\\u00A0Planning Board.\\n1136.03\\u00A0\\u00A0\\u00A0Regional Planning Board (CEDA).\\n1136.04\\u00A0\\u00A0\\u00A0Board of Zoning Appeals.\\n1136.05\\u00A0\\u00A0\\u00A0Springfield Landmarks Commission.\\n\\u00A0\\n1136.01 CITY COMMISSION.\\n\\u00A0\\u00A0\\u00A0See CHAPTER\\n111 of the Codified Ordinances.\\n1136.02 PLANNING BOARD.\\n\\u00A0\\u00A0\\u00A0See CHAPTER\\n157 of the Codified Ordinances.\\n1136.03 REGIONAL PLANNING BOARD (CEDA).\\n\\u00A0\\u00A0\\u00A0See CHAPTER\\n157 of the Codified Ordinances.\\n1136.04 BOARD OF ZONING APPEALS.\\n\\u00A0\\u00A0\\u00A0This Section is reserved2.\\n( 2 This section will reference the Board of Zoning Appeals chapter in the\\nCodified Ordinances.)\\n1136.05 SPRINGFIELD LANDMARKS COMMISSION.\\n\\u00A0\\u00A0\\u00A0This Section is reserved.\\nCHAPTER 1137\\nCity Administrative Bodies and Personnel\\n1137.01\\u00A0\\u00A0\\u00A0Department of Community Development.\\n1137.02\\u00A0\\u00A0\\u00A0Community Development Director.\\n\\u00A0\\n1137.01 DEPARTMENT OF COMMUNITY DEVELOPMENT.\\n\\u00A0\\u00A0\\u00A0See CHAPTER\\n129 of the Codified Ordinances.\\n1137.02 COMMUNITY DEVELOPMENT DIRECTOR.\\n\\u00A0\\u00A0\\u00A0See CHAPTER\\n129 of the Codified Ordinances.\\nTITLE NINE - Definitions.\\nChap.\\n1138.\\u00A0\\u00A0\\u00A0General Provisions.\\nChap.\\n1139.\\u00A0\\u00A0\\u00A0General Terms and Definitions.\\nCHAPTER 1138\\nGeneral Provisions\\n1138.01\\u00A0\\u00A0\\u00A0General interpretation meanings.\\n1138.02\\u00A0\\u00A0\\u00A0Words and terms not expressly defined.\\n\\u00A0\\n1138.01 GENERAL INTERPRETATION MEANINGS.\\n\\u00A0\\u00A0\\u00A0For the purpose of this Zoning Code, certain terms, words, and graphics are\\ninterpreted or defined as follows:\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Words used in the present tense include the future tense.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0The singular includes the plural.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0The word \\u0022person\\u0022 includes a corporation, trust, individual, or group\\nof individuals.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0The terms \\u0022shall\\u0022 and \\u0022must\\u0022 are always mandatory.\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0The term \\u0022may\\u0022 is discretionary.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0A reference to an official includes a designee of that official.\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0When the calculation of a number for a required standard results in a\\nfraction, that fraction is rounded up to the next whole number.\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0When this Zoning Code requires a distance or spacing buffer from a\\nproperty, lot, use, or other specified item (i.e., a use separation, sign\\nspacing, etc.), the distance shall be measured extending from the subject\\nproperty lot lines as indicated in Figure3.\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0All text in this Zoning Code is regulatory.\\n\\u00A0\\n( 3 Graphic to be provided.)\\n\\u00A0\\n1138.02 WORDS AND TERMS NOT EXPRESSLY DEFINED.\\n\\u00A0\\u00A0\\u00A0Words and terms not expressly defined in this Zoning Code are to be\\nconstrued according to the normally accepted meaning of those words or terms.\\nWhere no definition appears, then according to their customary usage in the\\npractice of planning and engineering shall be used, as determined by the\\nCommunity Development Director.\\nCHAPTER 1139\\nGeneral Terms and Definitions\\n1139.01\\u00A0\\u00A0\\u00A0General definitions.\\n\\u00A0\\n\\u00A0\\n1139.01 GENERAL DEFINITIONS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0A Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Abandoned Sign\\n\\u00A0\\u00A0\\u00A0Any sign that remains in place more than 365 days after its associated use\\nceases operations or any sign that is not maintained in accordance with this\\nZoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Abandonment\\n\\u00A0\\u00A0\\u00A0The voluntary cessation of a use or activity but excluding short-term\\ninterruptions to a use or activity during periods of remodeling, maintenance,\\nimprovements, vacation, seasonal closure, active listing of the property for a\\nchange in ownership or leasehold interests, or other similar interruptions.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Abut/Abutting\\n\\u00A0\\u00A0\\u00A0Contiguous; having a boundary, wall or property line in common.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Access\\n\\u00A0\\u00A0\\u00A0The place, means, or way by which pedestrians or vehicles have ingress and\\negress to a lot, structure or parking area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Accessory Building\\n\\u00A0\\u00A0\\u00A0A building or structure that is subordinate in use, area, extent, and\\npurpose to a principal structure or a principal use located on the same lot,\\nexcept as otherwise provided by this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Accessory Use\\n\\u00A0\\u00A0\\u00A0A use that is subordinate in use, area, extent, and purpose to a principal\\nstructure or a principal use located on the same lot, except as otherwise\\nprovided by this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Addition\\n\\u00A0\\u00A0\\u00A0Extension of a building or structure or increase in floor area or height of\\na building or structure.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Adjacent\\n\\u00A0\\u00A0\\u00A0To be next to or adjoining.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Aisle\\n\\u00A0\\u00A0\\u00A0A surface which is connected directly to a parking or loading space and\\ndesigned to permit ingress or egress of a vehicle to or from the parking or\\nloading space. (In no case can an aisle be a drive)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0Alley\\n\\u00A0\\u00A0\\u00A0Any public or private way whose primary function is to furnish secondary\\naccess to the side or rear of a lot having its principal access to a street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Alteration\\n\\u00A0\\u00A0\\u00A0A change in the appearance, character, construction, or use of a building or\\nstructure.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0Alternative Compliance\\n\\u00A0\\u00A0\\u00A0A modification of the strict terms of the relevant regulations through other\\npreapproved standards provided in this Zoning Code and applied at the\\ndiscretion of City staff, acting in an official and authorized capacity.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(13) \\u00A0\\u00A0\\u00A0Animated Sign\\n\\u00A0\\u00A0\\u00A0Any sign depicting movement or the illusion of movement through features\\nsuch as, but not limited to, flashing lights, digital displays, moving parts,\\nor visual effects created by mechanical, electrical, or digital means.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(14)\\u00A0\\u00A0\\u00A0Appeal\\n\\u00A0\\u00A0\\u00A0An application to a higher administrative body or court for a decision to be\\nmodified, reversed, or otherwise altered.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(15) \\u00A0\\u00A0\\u00A0Applicant\\n\\u00A0\\u00A0\\u00A0An individual or corporation, including any individual or corporation\\ncontracted or employed by such individual or corporation, who files a formal\\napplication with any governmental body.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(16) \\u00A0\\u00A0\\u00A0Architectural Detailing\\n\\u00A0\\u00A0\\u00A0Any construction appertaining to but not being an integral part of the\\nbuilding, structure, or sign and consisting of landscaping or structural\\nfeatures that embellish the site in general. Architectural detailing includes,\\nbut is not limited to, aesthetic embellishments such as flower plantings, wood\\ncarving, wrought or cast iron ornamentation, stone or brick ornamentation, or\\nmetal work decoration.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(17)\\u00A0\\u00A0\\u00A0Arterial Street\\n\\u00A0\\u00A0\\u00A0A street whose principal function is to provide for through traffic and is\\ndesigned to carry large volumes of traffic.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(18) \\u00A0\\u00A0\\u00A0Attached Awning/Canopy Sign\\n\\u00A0\\u00A0\\u00A0An on-premise sign permanently painted, printed, attached, or otherwise\\napplied to any facet of the covering or frame structure of an awning or\\nattached structural canopy.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(19) \\u00A0\\u00A0\\u00A0Attached Building\\n\\u00A0\\u00A0\\u00A0A building attached to another building by a common wall, such wall being a\\nsolid wall with or without windows and doors, and/or a common roof with a\\ncommon horizontal dimension of eight (8) feet or more.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(20) \\u00A0\\u00A0\\u00A0Authorized Agent\\n\\u00A0\\u00A0\\u00A0The individual or corporation who represents the property owner, resident,\\nor applicant and has the legal authority to make decisions on their behalf.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(21)\\u00A0\\u00A0\\u00A0Awning\\n\\u00A0\\u00A0\\u00A0A sheet of canvas or similar material connected to a frame and projected\\nfrom the exterior of a building for the purpose of redirecting rays of\\nsunshine, protecting pedestrians from the natural elements, or increasing the\\naesthetic appearance of such building.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0B Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Balcony\\n\\u00A0\\u00A0\\u00A0A covered or uncovered platform area projecting from the wall of a building,\\nenclosed by a railing, accessible from above grade, and not attached to the\\nground.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Belt Course\\n\\u00A0\\u00A0\\u00A0A horizontal, continuous row of stones, bricks, or similar architectural\\nmaterials designed to visually separate floors from the exterior of a building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Bench Billboard\\n\\u00A0\\u00A0\\u00A0An off-premise sign on which poster panels, bulletins, and/or copy are\\nmounted and which is designed to function and appear like a bench for seating.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Billboard\\n\\u00A0\\u00A0\\u00A0A permanent off-premise freestanding sign or sign structure upon which a\\nmessage is placed on a poster or panel and mounted on a pole or metal structure\\ntypically with a monopole structure constructed with tubular steel support,\\ntubular steel framing, and a single display panel with a concrete foundation.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Block Face\\n\\u00A0\\u00A0\\u00A0The collective facades of all buildings on one side of one block.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Board of Zoning Appeals\\n\\u00A0\\u00A0\\u00A0The City of Springfield\\u0027s appointed Board of Zoning Appeal responsible for\\nmaking recommendations and decisions as provided in this Zoning Code, as\\namended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7)\\u00A0\\u00A0\\u00A0Boundary\\n\\u00A0\\u00A0\\u00A0A line marking the limits of an area and dividing one area from another.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Buffer\\n\\u00A0\\u00A0\\u00A0Any area between parcels, lots, or different zoning districts set aside to\\nmitigate the visual, light, or noise effects of one parcel, lot, or zoning\\ndistrict on an adjacent parcel, lot, or zoning district. May be an earthen berm\\nor any natural material like trees or shrubs or otherwise mandated by this\\ndocument or the various jurisdictions.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Build\\n\\u00A0\\u00A0\\u00A0To construct, assemble, erect, convert, structurally enlarge, or reconstruct\\na building or structure.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0Buildable area\\n\\u00A0\\u00A0\\u00A0The area of a lot remaining after the minimum yard requirements of the\\nZoning Code have been deducted.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Building Area\\n\\u00A0\\u00A0\\u00A0The area of a building within its largest outside dimensions computed on a\\nhorizontal plane at the first floor level, exclusive of open porches,\\nbreezeways, terraces, and exterior stairways.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0Building Height\\n\\u00A0\\u00A0\\u00A0The vertical distance from the established grade to the roof line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(13) \\u00A0\\u00A0\\u00A0Building Line\\n\\u00A0\\u00A0\\u00A0A line extending parallel to the lot line from the part of the building\\nnearest to the lot line and defining the front, side, and rear yard. The\\nbuilding line may or may not coincide with the lot line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(14) \\u00A0\\u00A0\\u00A0Building\\n\\u00A0\\u00A0\\u00A0A combination of materials to form a structure having a roof that is safe\\nand stable and designed or intended for the support, enclosure, shelter or\\nprotection of persons, animals, or property. A building does not include a\\ntent, trailer, trailer coach, or mobile home. Although one part of a structure\\nmay be separated from another part by a \\u0022Fire Wall,\\u0022 as defined by the Ohio\\nBasic Building Code, both parts constitute one building as do structures which\\nare joined together by structural members.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0C Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Canopy\\n\\u00A0\\u00A0\\u00A0An overhead roof or structure over which a fabric or metal covering is\\nattached for the purpose of redirecting rays of sunshine, protecting\\npedestrians from the natural elements, or increasing the aesthetic appearance\\nof such building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0CEDA Planning Board\\n\\u00A0\\u00A0\\u00A0A regional planning board established by exercise of the City Planning\\nBoard\\u0027s powers for a territory within the corporate boundaries of the\\nSpringfield governed by a Cooperative Economic Development Agreement entered\\ninto pursuant to Section 701.07 of the Ohio revised Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Certificate of Appropriateness\\n\\u00A0\\u00A0\\u00A0An official certification allowing the construction of a new structure or\\nthe reconstruction, alteration, restoration, installation, or relocation of any\\nportion of an existing structure on a property within a designated historic\\ndistrict and granted in accordance of this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Certificate of Occupancy\\n\\u00A0\\u00A0\\u00A0An official certification that a premise, use, building, or structure\\ncomplies with the provisions of this Zoning Code and such other ordinances as\\nmay be applicable. Such a certificate is granted upon completion of new\\nconstruction or for alterations or additions to existing structures.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0City Clerk\\n\\u00A0\\u00A0\\u00A0The City Clerk of the City of Springfield, Ohio.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0City Commission\\n\\u00A0\\u00A0\\u00A0The duly elected governing body of the City of Springfield, Ohio.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0City Engineer\\n\\u00A0\\u00A0\\u00A0The person hired or designated by the City Manager to supervise or oversee\\nthe engineering matters in the City of Springfield, Ohio, and to exercise the\\nauthority of the City Engineer. This term includes the City Engineer\\u0027s\\ndesignee.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0City Planning Board\\n\\u00A0\\u00A0\\u00A0The City of Springfield\\u0027s appointed Planning Board.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Collector Street\\n\\u00A0\\u00A0\\u00A0A street whose principal function is for carrying traffic from local streets\\nto arterial streets.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0Commercial District\\n\\u00A0\\u00A0\\u00A0Those zoning districts where commercial land uses are the primary uses.\\nCommercial zoning districts are those designated as C-NC, C-LC, C-HC, and C-DT,\\nunless specified otherwise.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11)\\u00A0\\u00A0\\u00A0Common Open Space\\n\\u00A0\\u00A0\\u00A0Common open space is an area of land, an area of water, or a combination of\\nland and water which is for the benefit of or open to use by multiple tenants,\\noccupants, or the public.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0Community Development Department\\n\\u00A0\\u00A0\\u00A0The City governmental department responsible for overseeing development in\\nSpringfield, Ohio.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(13) \\u00A0\\u00A0\\u00A0Community Development Director\\n\\u00A0\\u00A0\\u00A0The person hired or designated by the City Manager to supervise or oversee\\nthe City\\u0027s Community Development Department, and to exercise the authority of\\nthe Community Development Director. This term includes the Community\\nDevelopment Director\\u0027s designee.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(14) \\u00A0\\u00A0\\u00A0Compatibility\\n\\u00A0\\u00A0\\u00A0The ability of land a use to coexist with surrounding land uses in a stable\\nfashion over time such that none of the uses are subjected to substantially\\nadverse effects which outweigh the benefits to the community derived from the\\nuses being permitted to exist in proximity to each other and which will not\\nresult in an existing lawful use becoming impractical as a result of its\\nproximity to the proposed new use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(15) \\u00A0\\u00A0\\u00A0Conditional Use\\n\\u00A0\\u00A0\\u00A0A principal or accessory use which is allowable when the provisions are met\\nand when the facts and conditions specified elsewhere in this Code, as those\\nupon which the exception is permitted, are found to exist by the Board of\\nZoning Appeals.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(16) \\u00A0\\u00A0\\u00A0Coniferous Tree\\n\\u00A0\\u00A0\\u00A0Any tree bearing needle-shaped or scalelike leaves, including forms with\\ntrue cones such as pines.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(17) \\u00A0\\u00A0\\u00A0Conversion\\n\\u00A0\\u00A0\\u00A0Any change of one principal use to another principal use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(18) \\u00A0\\u00A0\\u00A0Cornice\\n\\u00A0\\u00A0\\u00A0An ornamental molding attached to the top of a wall where the wall and roof\\nconnect.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(19) \\u00A0\\u00A0\\u00A0Covenant\\n\\u00A0\\u00A0\\u00A0A legally binding written promise or pledge to do or not to do a particular\\nact.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(20) \\u00A0\\u00A0\\u00A0Cross Access\\n\\u00A0\\u00A0\\u00A0A service drive providing vehicular access between two or more contiguous\\nsites so the driver need not enter the public street system.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(21) \\u00A0\\u00A0\\u00A0Curb\\n\\u00A0\\u00A0\\u00A0The lateral boundary - raised or otherwise - of a roadway intended for\\nvehicular use, whether or not the public right-of-way continues laterally.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(22) \\u00A0\\u00A0\\u00A0C-NC\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the Neighborhood Commercial district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(23) \\u00A0\\u00A0\\u00A0C-LC\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the Local Commercial district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(24) \\u00A0\\u00A0\\u00A0C-HC\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the Heavy Commercial district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(25) \\u00A0\\u00A0\\u00A0C-DT\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the Downtown district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(26)\\u00A0\\u00A0\\u00A0C-DT-C\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the Downtown Core subdistrict.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(27) \\u00A0\\u00A0\\u00A0C-DT-E\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the Downtown Edge subdistrict.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0D Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Deck\\n\\u00A0\\u00A0\\u00A0An uncovered platform area projecting from the wall of a building,\\naccessible at or from above grade, and attached to the ground.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Deed Restriction\\n\\u00A0\\u00A0\\u00A0A legal restriction on the use of property contained in the deed to the\\nproperty.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Deed\\n\\u00A0\\u00A0\\u00A0A legal document certifying the transfer, and any conditions attached\\nthereof, of ownership of property.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Development Standards\\n\\u00A0\\u00A0\\u00A0Standards controlling the size of structures and the relationships of\\nstructures and uses to each other and to open spaces and lot lines. Development\\nstandards include but are not limited to regulations controlling maximum\\nheight, minimum lot area, minimum lot frontage, minimum size of yards and\\nsetbacks, maximum lot coverage, and maximum density.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Development\\n\\u00A0\\u00A0\\u00A0Any human-made changes to improved or unimproved property, including but not\\nlimited to construction, reconstruction, extraction, dredging, filling,\\ngrading, paving, excavating, drilling operations, or the storage of equipment\\nand materials.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Developmentally Disabled\\n\\u00A0\\u00A0\\u00A0A person certified by a medical doctor as having a physical or mental\\nimpairment which is expected to be of long-continued and indefinite duration,\\nsubstantially impedes the ability to live independently, and is of a nature\\nthat the ability to live independently could be improved by more suitable\\nhousing conditions. Such disabilities are attributable to but not limited to a\\nphysical impairment; mental retardation, cerebral palsy, epilepsy, autism, or\\nanother similar neurological condition; dyslexia resulting from an above\\ndisability; or a mental or nervous disorder which disability originates before\\nsuch individual attains age 18. Developmentally disabled does not include\\ncurrent, illegal use of or addiction to a controlled substance as defined in\\nSection 102 of the Controlled Substances Act (21 u.s.c. 802).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Discontinuance\\n\\u00A0\\u00A0\\u00A0The cessation of a nonconforming use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0District\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0See Zoning District.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Double Frontage Lot\\n\\u00A0\\u00A0\\u00A0A lot having frontage on two parallel or approximately parallel streets.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0Driveway\\n\\u00A0\\u00A0\\u00A0A surface designed to provide vehicular access to a parking area or to a\\nloading space(s). A driveway is also the means for providing access to a garage\\nor off-street parking for dwellings and residences. A driveway, as\\ndistinguished from an aisle, usually provides access to a parking area from\\nanother parking area or from a street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Dwelling Unit\\n\\u00A0\\u00A0\\u00A0Any habitable room or group of adjoining habitable rooms within a dwelling\\nand forming a single unit with facilities which are used or intended to be used\\nfor living, sleeping, sanitation, cooking, and eating of meals.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0Dwelling\\n\\u00A0\\u00A0\\u00A0A building which is wholly or partially used or intended to be used for\\nresidential occupancy by a person for 30 or more consecutive days. A tent,\\nrecreational vehicle, motel, or hotel is not considered a dwelling.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0E Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Earth Berm\\n\\u00A0\\u00A0\\u00A0A low, usually linear mound of earth covered with grass or other landscape\\nmaterials used to define, screen, protect, and/or enhance the appearance of a\\nparticular space or area of land.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Easement\\n\\u00A0\\u00A0\\u00A0A right given by the owner of land to another person for specific limited\\nuse of that land, such as but not limited to allowing access to another\\nproperty or for utilities.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Eaves\\n\\u00A0\\u00A0\\u00A0Any part of a roof that overhangs a wall.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Elevation\\n\\u00A0\\u00A0\\u00A0The height above a specified grade.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Enclosed\\n\\u00A0\\u00A0\\u00A0Surrounded by walls and/or fences. See \\u0022Unenclosed Structure.\\u0022\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Enclosure\\n\\u00A0\\u00A0\\u00A0An area surrounded by fencing, screening, walls, or other protective\\nstructures.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Enlargement/Expansion.\\n\\u00A0\\u00A0\\u00A0An increase in the volume of a building, an increase in the area of land or\\nbuilding occupied by a use, or an increase in the number of occupants or\\ndwelling units.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Evergreen\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0See \\u0022Deciduous.\\u0022\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Excavation\\n\\u00A0\\u00A0\\u00A0The act or process of forming a cavity by cutting, digging, or scooping.\\nExcavation does not include activities associated with agricultural uses.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0External Illumination\\n\\u00A0\\u00A0\\u00A0A light source that illuminates an object\\u0027s exterior surface from a\\ndistance.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Extraction\\n\\u00A0\\u00A0\\u00A0The withdrawal of natural resources such as but not limited to sand, gravel,\\nor top soil as a business venture. Extraction does not include activities\\nassociated with an agricultural use or with the process of grading a lot\\npreparatory to the construction of a building.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0F Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Facade\\n\\u00A0\\u00A0\\u00A0The exterior face of a building that fronts a public street, public right-\\nof-way, or open space.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Fence\\n\\u00A0\\u00A0\\u00A0A permanent barrier that is not classified as screening, but offers privacy\\nbetween uses. Fences are typically located on residential lots between two\\nresidential uses.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Final Plan\\n\\u00A0\\u00A0\\u00A0A completed and full set of plans, drawings, data, and any and all other\\nmaterials needed to evaluate and review a subdivision\\u0027s conformance with local\\nsubdivision regulations and which follow the approved preliminary plan as well\\nas conformance with other applicable regulations.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Flag\\n\\u00A0\\u00A0\\u00A0A flat piece of cloth or similar material having one end of the cloth\\nattached to a staff either directly or by a rope and all other ends free-\\nflowing under natural conditions.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Floor Area\\n\\u00A0\\u00A0\\u00A0The total area of all floors of a building or portion thereof measured to\\nthe outside surface of exterior walls or the centerline of walls to separate\\nuses or attached buildings. It does not include garages, porches, balconies,\\nand other appurtenances. Space in the basement and all other space is included\\nas floor area if used for a principal or accessory use permitted in the zoning\\ndistrict in which the building is located.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Flyway Barrier\\n\\u00A0\\u00A0\\u00A0A fence or wall used to force bees to fly upward when leaving the hive for\\nthe purpose of limiting contact with people.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Footcandle\\n\\u00A0\\u00A0\\u00A0A unit of illuminance measurement. One lumen per square foot, unit of\\nilluminance.\\n\\u00A0\\u00A0\\u00A0It is the luminous flux per unit area in the Imperial system.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Freestanding Canopy Sign\\n\\u00A0\\u00A0\\u00A0An on-premise sign that is permanently affixed to a freestanding canopy.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Freestanding Sign\\n\\u00A0\\u00A0\\u00A0A sign anchored directly to the ground or supported by one or more posts,\\ncolumns, or other vertical structures. All freestanding signs are classified as\\neither Monument Signs or Pole Signs.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0Front Lot Line\\n\\u00A0\\u00A0\\u00A0A lot line separating the lot from the street. On comer lots, the front lot\\nline is the shortest lot line abutting a street, except that if the lot is\\nsquare or almost square (has dimensions between the ratios 3:2 and 3:3), then\\nthe front lot line may be along either street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Front Yard Line\\n\\u00A0\\u00A0\\u00A0A line parallel to the front lot line and as far forward from the front lot\\nline as required by this Code, extending from one side lot line to an opposite\\nside yard line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0Front Yard\\n\\u00A0\\u00A0\\u00A0The required area between the front yard line and the street right-of-way\\nline and extending across the entire lot. In the case of a double frontage lot,\\nthe front yard is along the local street and the rear yard is along the\\narterial street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(13) \\u00A0\\u00A0\\u00A0Frontage\\n\\u00A0\\u00A0\\u00A0The distance along a street line from one intersecting street to another, or\\nfrom one intersecting street to the end of a dead-end street or cul-de-sac.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0G Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0General Incidental Sign\\n\\u00A0\\u00A0\\u00A0A permanent on-premise sign that is freestanding or attached to a building\\nthat is in addition to the primary freestanding and attached sign types for the\\nproperty, and that has a height and scale that is clearly subordinate to the\\nprimary sign types allowed for the property. Examples of general incidental\\nsigns include menu boards, flags, occupant directories, property or tenant\\nidentification names or numbers, wayfinding signs, directional signs, and signs\\nwarning the public against trespassing or danger from animals. The list of\\nexamples is not exhaustive and is provided to clarify the regulations and does\\nnot limit the content of general incidental signs.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Grade\\n\\u00A0\\u00A0\\u00A0The top surface elevation of lawns, walks, driveways, or other improved\\nsurfaces after completion of construction, grading, and landscaping. For the\\npurpose of determining height of a building, the grade is the average level of\\nthe perimeter of the exterior walls of the building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Ground Area\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0See \\u0022Floor Area.\\u0022\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Ground Floor/First Floor. The lower-most floor of a building in\\nwhich the floor is at or above the grade.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0H Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Hazardous Sign\\n\\u00A0\\u00A0\\u00A0A sign which, because of its construction or state of disrepair, may fall or\\ncause injury to passersby, as determined by the Springfield Inspection Services\\nDivision, including a sign which because of its location, color, illumination,\\nor animation interferes with, obstructs the view of, or is confused with any\\nauthorized traffic sign, signal, or device or interferes with, misleads, or\\nconfuses traffic.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Hearing\\n\\u00A0\\u00A0\\u00A0A formal proceeding before an administrative body or court.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Hedge\\n\\u00A0\\u00A0\\u00A0A boundary formed by a row of closely planted shrubs or bushes.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Height\\n\\u00A0\\u00A0\\u00A0The vertical distance from a specified point to the existing grade directly\\nbelow the specified point.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0High-Rise\\n\\u00A0\\u00A0\\u00A0A building with more than five stories entirely above grade.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Highway\\n\\u00A0\\u00A0\\u00A0A rural and suburban thoroughfare with high vehicular speeds and capacities.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Homeowner\\u0027s Association\\n\\u00A0\\u00A0\\u00A0A private association, partnership, LLC, or any legal entity of homeowners\\nestablished by a developer with local government approval, whose purpose it is\\nto own, operate, and maintain various common properties, including but not\\nlimited to open space, private streets, and recreation facilities.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(i)\\u00A0\\u00A0\\u00A0I Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Illuminated Sign\\n\\u00A0\\u00A0\\u00A0A sign in which a source of light other than sunlight is used to make the\\nmessage readable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Illumination\\n\\u00A0\\u00A0\\u00A0The use of a lighting source to increase visibility in a given area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Incidental Sign\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Industrial District\\n\\u00A0\\u00A0\\u00A0Those zoning districts where industrial land uses are the primary uses.\\nIndustrial zoning districts are those designated as I-LI and I-HI, unless\\nspecified otherwise.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Infill Development\\n\\u00A0\\u00A0\\u00A0The redevelopment of an existing built-out site or property.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Interior Lot\\n\\u00A0\\u00A0\\u00A0A lot other than a comer lot or double frontage lot and bounded by a street\\non only one side.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Internal Illumination\\n\\u00A0\\u00A0\\u00A0A light source that illuminates an object\\u0027s exterior surface from within the\\nsign.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0I-LI\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the Light Industrial district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0I-HI\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the Heavy Industrial district.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0J Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Junk\\n\\u00A0\\u00A0\\u00A0Those materials and products of older scrap copper; brass; rope; rags;\\nbatteries; paper; trash; rubber; debris; waste; junked, dismantled, scrapped or\\nwrecked motor vehicle or associated parts; iron; steel; or other old or scrap\\nmaterials.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(k) \\u00A0\\u00A0\\u00A0K Terms (Reserved)\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(I) \\u00A0\\u00A0\\u00A0L Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Landscaping\\n\\u00A0\\u00A0\\u00A0Any of the following or combination thereof: materials such as but not\\nlimited to grass, hardy ground covers, shrubs, vines, hedges, and trees; and\\nnon-living durable material commonly utilized in landscaping, such as but not\\nlimited to rocks, pebbles, sand, and other earth materials, but not including\\npaving as a principal design element.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Large Deciduous Tree\\n\\u00A0\\u00A0\\u00A0A deciduous tree classified as a large tree under this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Light Fixture\\n\\u00A0\\u00A0\\u00A0An assembly that houses any light bulb, lamp or lamps, or LED(s), including\\nbut not requiring housing; mounting brackets or pole sockets; a lamp holder; a\\nballast; a driver; a reflector or mirror; and a refractor or lens.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Limited Access Highway\\n\\u00A0\\u00A0\\u00A0A public freeway or expressway designed for through traffic and to which\\nabutting properties have no legal right to direct access.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Livestock\\n\\u00A0\\u00A0\\u00A0See \\u0022non-household animal\\u0022.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Local Street\\n\\u00A0\\u00A0\\u00A0A street used primarily for access to abutting property.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Lot Area\\n\\u00A0\\u00A0\\u00A0The total area within the lot lines of a lot excluding any area located\\nwithin a public or private street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Lot Depth\\n\\u00A0\\u00A0\\u00A0The horizontal distance between the midpoint of the front lot line and the\\nmidpoint of the rear lot line measured at a right angle to the front lot line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Lot Frontage\\n\\u00A0\\u00A0\\u00A0The continuous width of a lot measured along the front lot line, the front\\nor rear lot line of a double frontage lot, or of a front or side lot line of a\\ncomer lot. The frontage is measured parallel to the centerline of the street(s)\\nand never constitutes the end width of a dead end street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0Lot Line\\n\\u00A0\\u00A0\\u00A0A line oriented in terms of stable points of reference which establish one\\nboundary of a lot.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11)\\u00A0\\u00A0\\u00A0Lot of Record\\n\\u00A0\\u00A0\\u00A0A lot which is part of a subdivision or a parcel of land which is described\\nby metes and bounds, the map and/or description of which have been recorded in\\nthe office of the County Recorder or County Auditor.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12)\\u00A0\\u00A0\\u00A0Lot Width\\n\\u00A0\\u00A0\\u00A0The distance parallel to the front property line, measured at the front\\nsetback line. Lot width on a curving front property line means the distance\\nparallel to the tangent of the front property line at the building setback\\nline. The lot width and the lot frontage may have different lengths on an\\nirregularly shaped lot as they are measured at different points on the lot.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(13) \\u00A0\\u00A0\\u00A0Lot\\n\\u00A0\\u00A0\\u00A0A lot of record or a lot that is leased which is occupied or intended to be\\noccupied by a principal building or use and an accessory building or use and is\\nof sufficient size to meet the minimum requirements for a principal use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(14) \\u00A0\\u00A0\\u00A0Low-Rise\\n\\u00A0\\u00A0\\u00A0A building with a total of three or less stories entirely above grade.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(m) \\u00A0\\u00A0\\u00A0M Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Major Revisions\\n\\u00A0\\u00A0\\u00A0Those revisions to an approved plan or permit that exceed the thresholds\\nrequired to be considered minor revisions.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Marquee\\n\\u00A0\\u00A0\\u00A0Any permanent roof-like structure projecting beyond a building or extending\\nalong and projecting beyond the wall of a building for the purpose of\\nredirecting rays of sunshine, protecting pedestrians from the natural elements,\\nor increasing the aesthetic appearance of such building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Master Development Plan\\n\\u00A0\\u00A0\\u00A0A comprehensive document outlining a future planned development, including\\nbut not limited to maps, drawings, narrative, tables, and other information\\nabout the proposed use of specific land and/or water.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Medium Deciduous Tree\\n\\u00A0\\u00A0\\u00A0A deciduous tree classified as a medium tree under this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Mid-Rise\\n\\u00A0\\u00A0\\u00A0A building with a total of three to five stories entirely above grade.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Minor Revisions\\n\\u00A0\\u00A0\\u00A0Those revisions to an approved plan or permit that are necessary in light of\\ntechnical considerations discovered after the decision on the application, and\\nthat do not substantively change the character of the approval.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Mixed Use\\n\\u00A0\\u00A0\\u00A0The blending of residential, commercial, cultural, institutional, and/ or\\nindustrial uses together in one building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Monument Sign\\n\\u00A0\\u00A0\\u00A0An on-premise, permanent freestanding sign mounted or appearing to be\\nmounted directly in the ground or on a footer in the ground.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(n) \\u00A0\\u00A0\\u00A0N Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Native Plants/Species\\n\\u00A0\\u00A0\\u00A0Any plant species listed as a native plant in the State of Ohio by the Ohio\\nDepartment of Natural Resources.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Nonconforming Building/Structure\\n\\u00A0\\u00A0\\u00A0A building or structure or portion thereof that was lawful at the time of\\nits establishment but that does not now conform to the provisions of this\\nZoning Code relative to height, yards, or building coverage for the zoning\\ndistrict in which it is located by reason of the adoption of this Zoning Code,\\nas amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Nonconforming Lot\\n\\u00A0\\u00A0\\u00A0A lot that was lawful at the time of its establishment but does not now\\nconform to the provisions of this Zoning Code relative to lot frontage, width\\nor area for the district in which it is located by reason of the adoption of\\nthis Zoning Code, as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Nonconforming Sign\\n\\u00A0\\u00A0\\u00A0A sign, other than a prohibited sign, that does not comply with the\\nregulations of the sign district in which it is located by reason of these or\\nany other regulations adopted after the erection of the sign.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Nonconforming Use\\n\\u00A0\\u00A0\\u00A0Any use that was lawful at the time of its establishment but that is not now\\nallowed within the zoning district in which it is located or any way in which\\nland or a building is used that is not in compliance with the provisions of\\nthis Zoning Code by reason of the adoption of this Zoning Code, as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Non-Household Animal\\n\\u00A0\\u00A0\\u00A0Any animal that is not a common domesticated household pet that needs\\nadequate space, air, and facilities for safekeeping. Non-household animals\\ninclude cows, horses, poultry, bees, sheep, goats, alpacas, llamas, pigs, and\\nthe like. A nonhousehold animal does not include exotic animals (big game cats,\\nelephants, rhinos, and other large mammals, alligators, crocodiles, venomous or\\npoisonous reptiles). Exotic animals are prohibited unless specified otherwise.\\nCommon domesticated household pets include dogs, cats, fish, and parrots.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Nonresidential District\\n\\u00A0\\u00A0\\u00A0Those zoning districts designated as C-NC, C-LC, C-HC, C-DT, I-LI, I-HI, P-\\nPR, P-IE, and P-DM unless specified otherwise.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Notice\\n\\u00A0\\u00A0\\u00A0Any legally required public notification for a certain development\\napplication as required by this Zoning Code.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(o) \\u00A0\\u00A0\\u00A0O Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Off Premises Sign\\n\\u00A0\\u00A0\\u00A0A sign which directs attention to an off-site use or to products or services\\nsold elsewhere.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Off-Street Loading Space\\n\\u00A0\\u00A0\\u00A0An area logically and conveniently located and designed for bulk pickups and\\ndeliveries, scaled to the delivery vehicles expected to be used, and accessible\\nto such vehicles when off-street parking spaces are occupied.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Open Space\\n\\u00A0\\u00A0\\u00A0Any portion of a lot substantially open to the sky. The area may include\\nnatural environmental features, patios, water areas, swimming pools, tennis\\ncourts, and other recreational areas and facilities. Streets, parking areas,\\nstructures for habitation, and the like are not included.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Owner\\n\\u00A0\\u00A0\\u00A0Any person who, alone or jointly or severally with others, has legal title\\nto any land or structure, with or without accompanying actual possession\\nthereof; has charge, care or control of any land or structure as owner or agent\\nof the owner; or serves as executor, administrator, conservator, trustee, or\\nguardian of the estate of the owner. Any person representing the actual owner\\nshall be bound to comply with the provision of this Zoning Code and of rules\\nand regulations adopted pursuant thereto, to the same extent as if they were\\nthe owner.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(p) \\u00A0\\u00A0\\u00A0P Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Parcel\\n\\u00A0\\u00A0\\u00A0A unit of land as designated by the Clark County Auditor.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Parking Area\\n\\u00A0\\u00A0\\u00A0An off-street facility providing vehicular parking spaces, along with\\nadequate aisles and tree islands, for the parking of more than four motor\\nvehicles.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Parking Lot Permit\\n\\u00A0\\u00A0\\u00A0An official certification authorizing the owner of a lot to construct a new\\ncommercial parking area on a designated lot.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Parking Row\\n\\u00A0\\u00A0\\u00A0A group of parking spaces that are parallel and adjacent to each other.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Parking Space\\n\\u00A0\\u00A0\\u00A0An area exclusive of driveways, aisles, and tree islands intended for off-\\nstreet vehicular parking. Such space is not intended for the storage or display\\nof motor vehicles.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Performance Standard\\n\\u00A0\\u00A0\\u00A0A minimum requirement or maximum allowable limit on the effects or\\ncharacteristics of a use, written in the form of regulatory language.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Permitted/Allowed Sign\\n\\u00A0\\u00A0\\u00A0A sign which is allowed in the zoning district in which it is located\\nsubject to compliance with the standards of this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Permitted/Allowed Use\\n\\u00A0\\u00A0\\u00A0A principal use which is allowed in the zoning district in which it is\\nlisted subject to compliance with the dimensional requirements and special\\nrequirements (if any) of the zoning district in which it is listed and general\\nrequirements of this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Person\\n\\u00A0\\u00A0\\u00A0Any individual or group of individuals, corporation, partnership,\\nassociation, or any entity, including state and local governments and agencies.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0Planned Development\\n\\u00A0\\u00A0\\u00A0A type of development which is planned to integrate residential, commercial,\\nindustrial, or any other land use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Planning Board\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0See the \\u0022City Planning Board\\u0022.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0Planter Boxes\\n\\u00A0\\u00A0\\u00A0The element of the public frontage, which accommodates street trees or other\\nplants whether continuous or individual.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(13) \\u00A0\\u00A0\\u00A0Planting Area\\n\\u00A0\\u00A0\\u00A0An unpaved pervious area used or intended to be used for the placement of a\\ntree or other plant materials.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(14) \\u00A0\\u00A0\\u00A0Pole Sign\\n\\u00A0\\u00A0\\u00A0An on-premise, permanent freestanding sign mounted directly in the ground by\\na pole(s) or columnal support structure(s) providing open-air between the base\\nof the sign and the ground.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(15) \\u00A0\\u00A0\\u00A0Porch\\n\\u00A0\\u00A0\\u00A0A covered entrance to a building consisting of a platform area, with open or\\npartially enclosed sides.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(16) \\u00A0\\u00A0\\u00A0Pre-Application Conference\\n\\u00A0\\u00A0\\u00A0A meeting with applicable City staff Development (Planning, Engineering,\\nFire, Building, etc.) that occurs before an application submittal. This term is\\nabbreviated in this Zoning Code as PAC.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(17) \\u00A0\\u00A0\\u00A0Preliminary Master Development Plan\\n\\u00A0\\u00A0\\u00A0A Master Development Plan proposed by the applicant and made a part of the\\napplication, as required by this Zoning Code, to be submitted to the Planning\\nBoard for their consideration.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(18) \\u00A0\\u00A0\\u00A0Premises\\n\\u00A0\\u00A0\\u00A0A general term meaning part or all of any lot, parcel, or tract or part or\\nall of any building or structure or group of buildings or structures located\\nthereon.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(19) \\u00A0\\u00A0\\u00A0Principal Building\\n\\u00A0\\u00A0\\u00A0A building which contains the principal use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(20) \\u00A0\\u00A0\\u00A0Principal Use\\n\\u00A0\\u00A0\\u00A0The primary use(s) of land or a structure as distinguished from an accessory\\nuse, e.g., a house is a principal use in a residential area and a garage or\\npool is an accessory use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(21) \\u00A0\\u00A0\\u00A0Private Street\\n\\u00A0\\u00A0\\u00A0A right-of-way or easement in private ownership, not dedicated or maintained\\nas a public street, and which affords the principal means of access to two or\\nmore lots or to condominium units.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(22) \\u00A0\\u00A0\\u00A0Prohibited Sign\\n\\u00A0\\u00A0\\u00A0Any sign which is forbidden from being erected or displayed.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(23) \\u00A0\\u00A0\\u00A0Projecting Sign\\n\\u00A0\\u00A0\\u00A0An on-premise sign permanently affixed to and projects from the wall of a\\nbuilding and is generally perpendicular to the building facade.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(24) \\u00A0\\u00A0\\u00A0Projection\\n\\u00A0\\u00A0\\u00A0Any part of a building such as architectural features which protrude into\\nthe required yard or yards.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(25) \\u00A0\\u00A0\\u00A0Property Line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0See Lot Line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(26) \\u00A0\\u00A0\\u00A0Property\\n\\u00A0\\u00A0\\u00A0A piece of real property or land.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(27) \\u00A0\\u00A0\\u00A0Public and Institutional District\\n\\u00A0\\u00A0\\u00A0Those zoning districts where public and institutional land uses are the\\nprimary uses. Public and Institutional zoning districts are those designated as\\nP-PR, P-IE, and PDM, unless specified otherwise.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(28)\\u00A0\\u00A0\\u00A0P-DM\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the Downtown Medical district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(29)\\u00A0\\u00A0\\u00A0P-PR\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the Parks and Recreation district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(30) \\u00A0\\u00A0\\u00A0P-IE\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the Institutional and Educational\\ndistrict.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(q) \\u00A0\\u00A0\\u00A0Q Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Qualified Professional\\n\\u00A0\\u00A0\\u00A0A licensed or state/nationally registered design, building, engineering,\\nconstruction, architectural, or planning professional or any person involved\\nwith the development process who maintains an accredited collegiate degree in\\nthe construction, development, planning, engineering, or architectural field.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(r) \\u00A0\\u00A0\\u00A0R Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Rear Lot Line\\n\\u00A0\\u00A0\\u00A0The lot line opposite and most distant from the front lot line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Rear Yard Line\\n\\u00A0\\u00A0\\u00A0A line parallel to the rear lot line and as far forward from the rear lot\\nline as required by this Zoning Code, extending from one side lot line to an\\nopposite side yard line. See \\u0022Rear Lot Line.\\u0022\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Rear Yard\\n\\u00A0\\u00A0\\u00A0The required area between the rear yard line and the rear lot line and\\nextending from one side yard line to an opposite side yard line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Recommended Tree List\\n\\u00A0\\u00A0\\u00A0The recommended tree list of the City of Springfield, Ohio.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Reconstruct\\n\\u00A0\\u00A0\\u00A0To rebuild a structure that has been destroyed or demolished. For purposes\\nof this definition, reconstruct does not apply to the removal and replacement\\nof all or part of a building or structure in the same configuration.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Record Plan\\n\\u00A0\\u00A0\\u00A0A drawing or set of drawings of an approved final subdivision prepared for\\nappropriate signatures and recording in the County Recorder\\u0027s office and for\\ndistribution to applicable agencies.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Remodel/Repair\\n\\u00A0\\u00A0\\u00A0Any improvement to a building which is not a structural enlargement or\\nreconstruction.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Residential District\\n\\u00A0\\u00A0\\u00A0Those zoning districts where commercial land uses are the primary uses.\\nResidential zoning districts are those designated as R-AG, R-LD, and R-HD,\\nunless specified otherwise.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Right-of-Way\\n\\u00A0\\u00A0\\u00A0A strip of land taken or dedicated for use as a public way. As a roadway, it\\nnormally incorporates the curbs, tree lawns, sidewalks, lighting and drainage\\nfacilities, and may include special features (required by the topography or\\ntreatment) such as grade separation, landscaped areas, viaducts and bridges.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10)\\u00A0\\u00A0\\u00A0Road\\n\\u00A0\\u00A0\\u00A0A local, rural, or suburban thoroughfare of low-to-moderate vehicular speed\\nand capacity.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Roof Line\\n\\u00A0\\u00A0\\u00A0The deck line of a mansard roof, the ridge of a saddle, hip, gable, gambrel,\\nor ogee roof; or the highest point of the coping of a flat roof for a multi-\\nfamily dwelling or a nonresidential use or the midpoint of a mansard roof; the\\nmidpoint between the ridge and eaves of a saddle, hip, gable, gambrel, or ogee\\nroof; or the highest point of the coping of a flat roof for a single or two\\nfamily dwelling.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0Roof\\n\\u00A0\\u00A0\\u00A0The outside surface attached to the top of a building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(13)\\u00A0\\u00A0\\u00A0R-AG\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the Agricultural district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(14)\\u00A0\\u00A0\\u00A0R-LD\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the Low Density Residential district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(15) \\u00A0\\u00A0\\u00A0R-HD\\n\\u00A0\\u00A0\\u00A0The acronym or abbreviated form of the High Density Residential district.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(s) \\u00A0\\u00A0\\u00A0S Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Scenic Area\\n\\u00A0\\u00A0\\u00A0An area presenting a view of natural and human-made elements of the visual\\nenvironment with the characteristics of offering strikingly distinct and a\\npleasing and memorable visual experience.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Screening\\n\\u00A0\\u00A0\\u00A0A barrier of permanent material of sufficient height and density so that the\\nobjects being screened are not visible from any point on the property line when\\nviewed from the ground level.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Seasonal Decoration\\n\\u00A0\\u00A0\\u00A0A display pertaining to celebration of a holiday or commemoration of a\\nhistoric event or personage, observed during a particular season of the year. A\\nseasonal decoration is not a sign.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Setback Line\\n\\u00A0\\u00A0\\u00A0A line established by this Zoning Code that is parallel with and measured\\nfrom the lot line and defines the limits of a yard within which no building or\\nstructure may be located above ground, except as may be provided by this Zoning\\nCode. The area between the setback line and the lot line is referred to in this\\nZoning Code as the required yard.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Setback\\n\\u00A0\\u00A0\\u00A0A line, generally parallel with and measured from the property line,\\ndefining the limits of a yard in which no building, other than accessory\\nbuildings nor structure may be located above ground, except as may be provided\\nin this Zoning Code. See \\u0022Yard\\u0022 for additional clarity.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Side Lot Line\\n\\u00A0\\u00A0\\u00A0Any lot line which meets the end of a front lot line and any lot line which\\nis not a front lot line or rear lot line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Side Yard Line\\n\\u00A0\\u00A0\\u00A0A line parallel to the side lot line and as far from the side lot line as\\nrequired by this Zoning Code, extending from the front yard line to the rear\\nyard line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Side Yard\\n\\u00A0\\u00A0\\u00A0The required area (yard) between the primary building and the adjacent side\\nproperty line, and extending entirely from a front yard to the rear yard.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Sidewalk\\n\\u00A0\\u00A0\\u00A0That portion of the street right-of-way outside the vehicular traveled\\nsurface which is improved for the use of pedestrian traffic.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0Sight Visibility Triangle\\n\\u00A0\\u00A0\\u00A0The triangular-shaped area at the intersection of two points that must be\\nkept clear to ensure visibility for pedestrians and motorists at the\\nintersection.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Sign Face\\n\\u00A0\\u00A0\\u00A0The surface of the sign upon which is affixed reading material, letters,\\nnumerals, pictorial representations, emblems, trademarks, inscriptions and/or\\npatterns.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0Sign Permit\\n\\u00A0\\u00A0\\u00A0An official certification authorizing an individual or corporation to erect,\\nalter, or relocate a sign.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(13) \\u00A0\\u00A0\\u00A0Sign\\n\\u00A0\\u00A0\\u00A0A visual display of an object or device that includes elements such as\\ncolors, lights, motion, symbols, images, icons, shapes, letters, numerals,\\nfigures, characters, or combines any of those elements, that is intended to\\ncommunicate, advertise, identify, announce, direct, inform, or attract\\nattention and that is visible from a public right-of-way. The term \\u0022sign\\u0022\\nincludes a structure used to support or display a sign. The term \\u0022Sign\\u0022 does\\nnot include public art, sculptured landscaping, seasonal decorations,\\ndirectional symbols on paved surfaces or messages painted on or otherwise\\npermanently attached to the body of a motor vehicle or a trailer designed to\\ntransport freight.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(14) \\u00A0\\u00A0\\u00A0Small Deciduous Tree\\n\\u00A0\\u00A0\\u00A0A deciduous tree classified as a small tree under Chapter 1117 of this\\nZoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(15) \\u00A0\\u00A0\\u00A0Speaker Board\\n\\u00A0\\u00A0\\u00A0A professionally constructed and installed sign made of a durable, weather-\\nresistant product such as metal or high-density plastic and may include a two-\\nway speaker system for ordering from a vehicle in a drive thru lane provided\\nthe volume of the speaker does not exceed ambient noise conditions as measured\\nat the property line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(16) \\u00A0\\u00A0\\u00A0Special Vehicle\\n\\u00A0\\u00A0\\u00A0A vehicle more than seven and one-half feet in height or more than 20 feet\\nin length which is or may be transported or drawn upon a highway, street, or\\nbody of water. Such vehicles include but are not limited to a truck, trailer,\\ntractor, wagon, or watercraft exceeding these dimensions. Such vehicles do not\\ninclude temporary construction trailers when associated with an active\\nconstruction project on the premises.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(17) \\u00A0\\u00A0\\u00A0Springfield Landmarks Commission\\n\\u00A0\\u00A0\\u00A0The City of Springfield\\u0027s appointed Landmarks Commission responsible for\\nmaking recommendations and decisions as provided in this Zoning Code, as\\namended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(18) \\u00A0\\u00A0\\u00A0Stacking Lane\\n\\u00A0\\u00A0\\u00A0A 9-foot-wide lane containing multiple stacking spaces.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(19) \\u00A0\\u00A0\\u00A0Stacking Space\\n\\u00A0\\u00A0\\u00A0An asphalt, concrete or similar permanent dust free surface which is\\ndesigned to accommodate a motor vehicle waiting for entry to an automobile and\\ntruck oriented use, which is located in such a way that a parking space or\\naccess to a parking space is not obstructed, and which is at least nine feet in\\nwidth and 19 feet in length.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(20) \\u00A0\\u00A0\\u00A0Stoop\\n\\u00A0\\u00A0\\u00A0A roofless structure extending from the public right-of-way to an elevated\\nentryway or ground floor of an associated building or structure.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(21) \\u00A0\\u00A0\\u00A0Storage Area\\n\\u00A0\\u00A0\\u00A0A space used for the incidental storage of items related to the principal\\nuse of a building or structure.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(22) \\u00A0\\u00A0\\u00A0Story\\n\\u00A0\\u00A0\\u00A0The habitable portion of building included between the upper surface of any\\nfloor and the upper surface of the floor next above, except that the topmost\\nstory shall be that portion of a building included between the upper surface of\\nthe topmost floor and the ceiling or roof above. If the finished floor level\\ndirectly above a usable or unused under-floor space is more than six feet above\\ngrade as defined herein for more than 50% of the total perimeter or is more\\nthan 12 feet above grade as defined herein at any point, such usable or unused\\nunder-floor space shall be considered as a story.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(23)\\u00A0\\u00A0\\u00A0Street Grade\\n\\u00A0\\u00A0\\u00A0The elevation of a public roadway established by construction or usage and\\nmeasured at the centerline of the roadway.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(24) \\u00A0\\u00A0\\u00A0Street\\n\\u00A0\\u00A0\\u00A0A way that is open to the public for use of vehicular traffic as a matter of\\nright, and has a driving surface which either meets the City\\u0027s specifications\\nor is acceptable to the City Engineer for vehicular traffic. A street may exist\\nas a public street if it is owned or controlled by the City or as a private\\nstreet if it is owned and maintained by persons other than the City. This\\ndefinition includes the term avenue, boulevard, circle, drive, highway, lane,\\nparkway, road, thoroughfare, or any other similar term.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(25) \\u00A0\\u00A0\\u00A0Structural Enlargement\\n\\u00A0\\u00A0\\u00A0Any change in the configuration of the exterior walls, foundation or the\\nroof of a building which results in an increase in the area, height or volume\\nof the building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(26) \\u00A0\\u00A0\\u00A0Structure\\n\\u00A0\\u00A0\\u00A0Anything constructed or erected, the use of which requires location on the\\nground or attachment to something having a location on the ground.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(27) \\u00A0\\u00A0\\u00A0Subdivision Entry Sign\\n\\u00A0\\u00A0\\u00A0A permanent off-premise freestanding sign of the monument sign variety\\nlocated at the entry of a platted subdivision from a local, collector, or\\narterial street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(28) \\u00A0\\u00A0\\u00A0Substantial Construction\\n\\u00A0\\u00A0\\u00A0Substantial construction is achieved at the point in development when all\\nrequired permits necessary to build a Planned Development phase have been\\nobtained and actual construction of public improvements, or stormwater\\nmanagement systems on the Planned Development phase is either complete or in\\nactive progress.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(29) \\u00A0\\u00A0\\u00A0Supernatural Event\\n\\u00A0\\u00A0\\u00A0A severe, unanticipated, or uncontrollable natural event for which no human\\nis responsible including but not limited to earthquakes, tornadoes, blizzards,\\nwindstorms, wild fires, and the like.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(30) \\u00A0\\u00A0\\u00A0Suspended Sign\\n\\u00A0\\u00A0\\u00A0A sign suspended from the underside of a canopy, awning, ceiling, marquee,\\nroof overhang, a covered porch, or walkway.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(t) \\u00A0\\u00A0\\u00A0T Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Temporary Sign Permit\\n\\u00A0\\u00A0\\u00A0An official certification authorizing an individual or corporation to erect,\\nalter, or relocate a temporary sign.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Temporary Sign\\n\\u00A0\\u00A0\\u00A0A sign not permanently affixed to the ground or a building and not intended\\nfor display in perpetuity. Banners, portable signs, trailer signs, and other\\nsimilar nonpermanent signs are regulated as temporary signs.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Temporary Structure/Building\\n\\u00A0\\u00A0\\u00A0Any building or structure which is placed on a lot without a permanent\\nfoundation for a limited time.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Temporary Use\\n\\u00A0\\u00A0\\u00A0A use granted on a discretionary, conditional, and temporary basis which\\nauthorizes a land use in a zoning district for up to 180 calendar days in which\\nthat use is not normally permitted. All requirements of a Temporary Use are in\\naddition to and supplement Zoning Code requirements.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Total Lot Building Coverage\\n\\u00A0\\u00A0\\u00A0The percentage of the lot area covered by the total building area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Tract\\n\\u00A0\\u00A0\\u00A0A lot, usually intended for subdivision or agricultural use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Traffic Island\\n\\u00A0\\u00A0\\u00A0A raised area located in a public street and separating opposing or\\nconflicting streams of traffic.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Type A Screening\\n\\u00A0\\u00A0\\u00A0An evergreen planting screen of pyramidal arbor vitae with plantings being\\nat least three feet high, spaced four feet on center at the time of planting.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Type B Screening\\n\\u00A0\\u00A0\\u00A0A solid opaque wall comprised of masonry (brick, stone, etc.), concrete\\nblock, or precast concrete panels.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0Type C Screening\\n\\u00A0\\u00A0\\u00A0A wrought-iron or tubular steel fence with masonry columns at 20 feet on\\ncenter with a mix of shrubs and trees located between masonry columns.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Type D Screening\\n\\u00A0\\u00A0\\u00A0An earthen berm at least 20 feet wide with a maximum slope height exceeding\\nat least six feet and covered with grass, shrubs, and trees planted at the base\\nbetween slopes.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0Type E Screening\\n\\u00A0\\u00A0\\u00A0An alternate screening composition equivalent to Type A Screening, Type B\\nScreening, Type C Screening, and Type D Screening that provides an exceptional\\nscreening aesthetic, meets sound structural practices and engineering design\\ncriteria, and meets the intent and function of this Chapter at the discretion\\nof the Planning Board.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(u) \\u00A0\\u00A0\\u00A0U Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Undeveloped Area\\n\\u00A0\\u00A0\\u00A0The area within a planned development where agriculture or recreation uses\\nin open areas may be continued.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Use\\n\\u00A0\\u00A0\\u00A0The purpose for which land or a building or structure is designed, arranged,\\nintended, or maintained or for which it is or may be used or occupied. This\\ndefinition does not alter or affect the definition of nonconforming use.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(v) \\u00A0\\u00A0\\u00A0V Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Variance\\n\\u00A0\\u00A0\\u00A0A modification of the strict terms of the relevant regulations where such\\nmodification will not be contrary to the public interest and where owing to\\nconditions peculiar to the property and not the result of the action of the\\napplicant, a literal enforcement of the regulations would result in\\n\\u0022unnecessary and undue hardship\\u0022 or a \\u0022practical difficulty.\\u0022 The authority to\\ngrant variances is vested in the Board of Zoning Appeals.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Vehicle Storage Area\\n\\u00A0\\u00A0\\u00A0A space used for storage of a special vehicle and at least equal in size to\\nthe outer perimeter of the special vehicle.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(w)\\u00A0\\u00A0\\u00A0W Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Walkway\\n\\u00A0\\u00A0\\u00A0A public way that is at least three (3) feet or more in width for pedestrian\\nuse, whether within a street or not. See \\u0022Sidewalk.\\u0022\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Wall\\n\\u00A0\\u00A0\\u00A0A continuous vertical structure enclosing or dividing an area of land or\\nsupporting a building or structure.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Wall Sign\\n\\u00A0\\u00A0\\u00A0An on-premise sign permanently affixed on an exterior building wall.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Window Sign\\n\\u00A0\\u00A0\\u00A0An on-premise sign permanently affixed to a window.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(x) \\u00A0\\u00A0\\u00A0X Terms (Reserved)\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(y) \\u00A0\\u00A0\\u00A0Y Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Yard\\n\\u00A0\\u00A0\\u00A0An area on a lot required to be unoccupied by structures above grade except\\nfor projections and the specific minor uses or structures allowed in such area\\nunder the provisions of this Zoning Code. A yard extends from the grade upward.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(z) \\u00A0\\u00A0\\u00A0Z Terms\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Zero Lot Line Dwelling/Development\\n\\u00A0\\u00A0\\u00A0Any dwelling or development with one or more building walls located on a lot\\nline that is not on a street or alley right-of-way line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Zoning Certificate\\n\\u00A0\\u00A0\\u00A0A document issued by the Community Development Director which indicates that\\nthe proposed use of land meets the requirements of this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Zoning District\\n\\u00A0\\u00A0\\u00A0A portion of the territory of the City within which certain uniform\\nregulations and requirements or various regulatory combinations apply under the\\nprovisions of this Zoning Code, as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Zoning Map\\n\\u00A0\\u00A0\\u00A0The map delineating the boundaries of zoning districts which, along with the\\nzoning text, comprises the Zoning Code.\\n\\u00A0\\n\\u00A0\\n\\u00A0\\n\\u00A0\\nCODIFIED ORDINANCES OF SPRINGFIELD\\n\",\"filename\":\"/mnt/user-data/uploads/springfield-oh-1.txt\"}}"

