                                      (g)\\nGarage or Yard Sales     L  L  L\\nHome Occupation          L  L  L     L          L                      N/A     1107.05\\n                                                                               (h)\\nMobile Food Service            C     C  C  C  C C C        C  C  C\\nOutdoor Dining                       L        L L                      N/A     1107.05\\n                                                                               (i)\\nOutdoor Storage                         C  L      L  P     C  C        N/A     1107.05\\n                                                                               (j)\\nPersonal Swimming Pool   P  P  P        P                              N/A\\nPrivate Kennel           C  C                                          N/A\\nPrivate Utility          C  C  C     C  C  C  C C C  C     C  C  C     N/A\\nType A Family Child Care C  C  C                              C        N/A\\nHome\\nType B Family Child Care C  C  C                              C        N/A\\nHome\\nVertiport                               L  L  C C L  L     C  L  L     N/A     1107.05\\n                                                                               (k)\\nWalk-Up Window                       L  L  L  L L                      N/A     1107.05\\n                                                                               (l)\\n\\u00A0\\nCHAPTER 1105\\nLand Use Terms and Definitions\\n1105.01\\u00A0\\u00A0\\u00A0Residential uses.\\n1105.02\\u00A0\\u00A0\\u00A0Nonresidential uses.\\n1105.03\\u00A0\\u00A0\\u00A0Accessory and temporary uses.\\n\\u00A0\\n1105.01 RESIDENTIAL USES.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0A Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Adult Family Home\\n\\u00A0\\u00A0\\u00A0A residence or facility that provides accommodations to three (3) to five\\n(5) unrelated adults and provides supervision and personal care services to at\\nleast three (3) of those adults, and is licensed according to the provisions of\\nChapter 3722 of the Ohio Revised Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Adult Group Home\\n\\u00A0\\u00A0\\u00A0A residence or facility that provides accommodations to six (6) to 16\\nunrelated adults and provides supervision and personal care services to at\\nleast three (3) of the unrelated adults, and is licensed according to the\\nprovisions of Chapter 3722 of the Ohio Revised Code.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0B Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0C Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Children\\u0027s Residential Center\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio Admin. Code 5101:2-1-01(B)(71), as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Conventional Apartment\\n\\u00A0\\u00A0\\u00A0A residential building or group of buildings arranged, intended, and\\ndesigned to be occupied by twelve or more households living independently of\\neach other, and each including its own separate kitchen and bathroom\\naccommodations.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Cottage Court\\n\\u00A0\\u00A0\\u00A0A group of small, detached one- and two-unit dwellings located on one lot\\narranged around a shared court visible from the street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Courtyard Apartment\\n\\u00A0\\u00A0\\u00A0A medium-to-large sized detached dwelling arranged, intended, and designed\\nto be occupied by twelve or more households living independently of each other,\\nand each including its own separate kitchen and bathroom accommodations,\\noriented around a courtyard or series of courtyards.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0D Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0E Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Educational Housing\\n\\u00A0\\u00A0\\u00A0A building or group of buildings in which housing is provided for individual\\nstudents and faculty under the general supervision or regulation of an\\naccredited college or university and as distinguished from an apartment, hotel,\\nmotel, or rooming house. Educational Housing may include facilities such as a\\ncommissary, snack bar, lounge, and study area, dining halls, and accessory\\nkitchen, recreation facilities, and laundry, provided that these facilities are\\nfor the benefit and use of the occupants and their guests and not open to the\\ngeneral public. Examples of Educational Housing include but are not limited to\\nFraternity/Sorority Homes, Dormitories, Faculty Flats, and the like.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Emergency Shelter\\n\\u00A0\\u00A0\\u00A0Those uses as defined in Ohio Admin. Code 5101:2-1-01(8)(114-115), as\\namended.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0F Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Foster Home\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio RC. Ch. 5103.02(D), as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Four-Unit Dwelling\\n\\u00A0\\u00A0\\u00A0A detached dwelling arranged, intended or designed to consist of four\\ndwelling units on one lot.\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0G Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Group Home for Children\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio Admin. Code 5101:2-1-01(B)(138-139), as amended.\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0H Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Halfway House Facility\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A use as defined in Ohio RC. Ch. 5120.102(D), as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Home for the Aging\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio RC. Ch. 3721.01(A)(S), as amended.\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0I Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0J Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(k) \\u00A0\\u00A0\\u00A0K Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(l) \\u00A0\\u00A0\\u00A0L Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Live-Work Dwelling\\n\\u00A0\\u00A0\\u00A0A dwelling unit that is also used for work purposes, provided that the\\n\\u0022work\\u0022 component is restricted to limited intensity such as a professional\\noffice, artist\\u0027s workshop, studio, or other similar uses, is located on the\\nstreet level, and the residential unit is occupied by the owner or manager of\\nthe \\u0022live\\u0022 component. The \\u0022live\\u0022 component may be located on the street level\\n(behind the work component) or any other level of the building.\\n\\u00A0\\u00A0\\u00A0(m)\\u00A0\\u00A0\\u00A0M Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Main Street Mixed Use Building\\n\\u00A0\\u00A0\\u00A0A small-to-medium-sized, low-to-mid-rise building with two or more different\\nuses such as residential, office, retail, public, or entertainment uses. No\\nresidential use shall be allowed on the ground floor of a Main Street Mixed-Use\\nBuilding. Example floor space configurations include but are not limited to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u2022\\u00A0\\u00A0\\u00A0Ground floor retail, restaurant, or office storefronts with second\\nfloor apartment lofts;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u2022\\u00A0\\u00A0\\u00A0A three-floor building with retail on the ground floor, office on\\nthe second floor, and apartment/condo units on the third floor.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Multi-Unit Dwelling\\n\\u00A0\\u00A0\\u00A0A detached dwelling arranged, intended or designed to consist of five (5) to\\ntwelve (12) dwelling units on one lot.\\n\\u00A0\\u00A0\\u00A0(n) \\u00A0\\u00A0\\u00A0N Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Nursing Home\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio RC. Ch. 3721.01(A)(6) and Ohio Admin. Code 3701-16-\\n01(W) as amended.\\n\\u00A0\\u00A0\\u00A0(o) \\u00A0\\u00A0\\u00A0O Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0One-Unit Dwelling\\n\\u00A0\\u00A0\\u00A0A detached dwelling arranged, intended or designed to consist of one\\ndwelling unit on one lot.\\n\\u00A0\\u00A0\\u00A0(p) \\u00A0\\u00A0\\u00A0P Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(q)\\u00A0\\u00A0\\u00A0Q Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(r) \\u00A0\\u00A0\\u00A0R Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Recovery Housing Residence\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A use as defined in Ohio RC. Ch. 5119.01(A)(17), as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Residential Care Facility\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio RC. Ch. 3721.01(A)(7), Ohio RC. Ch. 5119.34, Ohio\\nAdmin. Code 3701-16-01(II), and Ohio Admin. Code 5101:2-1-01(280), as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Residential Facility\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio R.C. Ch. 5119.34(8), as amended.\\n\\u00A0\\u00A0\\u00A0(s) \\u00A0\\u00A0\\u00A0S Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(t) \\u00A0\\u00A0\\u00A0T Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Three-Unit Dwelling\\n\\u00A0\\u00A0\\u00A0A detached dwelling arranged, intended or designed to consist of three\\ndwelling units on one lot.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Tiny Home\\n\\u00A0\\u00A0\\u00A0A detached dwelling arranged, intended, or designed to consist of one\\ndwelling unit on one lot which is less than 400 hundred square feet and affixed\\nto a permanent foundation.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Town home\\n\\u00A0\\u00A0\\u00A0A dwelling that is part of a structure containing three or more dwelling\\nunits, each designed and constructed for occupancy by one household, with each\\ndwelling unit attached by a common wall to another, in which each dwelling unit\\nis located on individual lots.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Transitional Housing\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio Admin. Code 122:6-1-01(F), as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Two-Unit Dwelling\\n\\u00A0\\u00A0\\u00A0A detached dwelling arranged, intended or designed to consist of two\\ndwelling units on one lot.\\n\\u00A0\\u00A0\\u00A0(u) \\u00A0\\u00A0\\u00A0U Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(v) \\u00A0\\u00A0\\u00A0V Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Vertical Mixed Use Building\\n\\u00A0\\u00A0\\u00A0A medium-to-large-sized, mid-to-high-rise building with two or more\\ndifferent uses such as residential, office, retail, public, or entertainment\\nuses. No residential use shall be allowed on the ground floor of a Vertical\\nMixed-Use Building. Example floor space configurations include but are not\\nlimited to:\\n\\u00A0\\u00A0\\u00A0\\u2022\\u00A0\\u00A0\\u00A0Ground floor retail, restaurant, or office storefronts with upper floor\\napartment lofts;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u2022\\u00A0\\u00A0\\u00A0A five-floor building with retail and restaurants on the ground\\nfloor, office on the second floor, hotel accommodations and apartment/condo\\nunits on the third and fourth floors, and a restaurant and bar on the fifth\\nfloor.\\n\\u00A0\\u00A0\\u00A0(w) \\u00A0\\u00A0\\u00A0W Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(x) \\u00A0\\u00A0\\u00A0X Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(y) \\u00A0\\u00A0\\u00A0Y Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(z) \\u00A0\\u00A0\\u00A0Z Uses (Reserved)\\n1105.02 NONRESIDENTIAL USES.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0A Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Adult Day Care\\n\\u00A0\\u00A0\\u00A0A licensed facility for the daytime care of an adult. This term includes any\\nprovided Adult day services (ADS) as defined by Ohio Admin. Code 173-39-02.1,\\nas amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Active Park/Recreational Facilities\\n\\u00A0\\u00A0\\u00A0Indoor or outdoor recreational pursuits typically available to the public,\\nthat involve cooperative or team activity, including those activities that\\noccur on ball fields, sport courts, skateparks, ice rinks, and the like.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Agricultural Operations\\n\\u00A0\\u00A0\\u00A0The use of land for growing forages and sod crops; grains and seed crops;\\nvegetables; trees and forest products; fruits, including grapes, nuts, and\\nberries; nursery, floral, ornamental, and greenhouse products; or lands devoted\\nto a soil conservation or forestry management program. Agricultural Operations\\nalso engage in the keeping, pasturing, and feeding of livestock for the sale of\\nlivestock or livestock products. An Agricultural Operations is assessed by the\\nCounty Auditor at \\u0022current agricultural use value.\\u0022\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Agritainment\\n\\u00A0\\u00A0\\u00A0Events and activities that allow for recreation, entertainment, and tourism\\nthat is in conjunction with on-going agricultural activities on-site (examples\\ninclude, but are not limited to com mazes, hayrides, wedding venues, rodeos,\\nand petting zoos).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Artisanal Manufacturing\\n\\u00A0\\u00A0\\u00A0The manufacturing and production of goods by an artisan or craftsperson done\\nby hand or small machinery, located within a building or indoor tenant space.\\nThis use typically includes but is not limited to jewelry, metalwork,\\ncabinetry, woodworking, stained glass, textiles, ceramics, or handmade food\\nproducts for off-site consumption.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Assembly Hall\\n\\u00A0\\u00A0\\u00A0A building(s) or portion of a building in which facilities are provided for\\nsmall to large gatherings and events for civic, educational, political,\\nreligious, cultural, or social purposes. Events that typically occur within an\\nAssembly Hall are weddings, conferences, concerts, exhibitions, parties, live\\nmusical/acting performances, and the like. An Assembly Hall may be supported by\\nancillary uses that provide food and drink to those attending events.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Automotive Repair\\n\\u00A0\\u00A0\\u00A0A building, place, or facility that offers mechanical and body work on motor\\nvehicles including straightening of body parts, body repairs, battery\\nrebuilding, painting, welding, short term storage of automobiles not in\\noperating condition, outdoor similar work on motor vehicles that may involve\\nnoise, glare, fumes, smoke, or similar impacts.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Automotive Sales and Rental\\n\\u00A0\\u00A0\\u00A0A building(s) and any associated open areas other than a street or required\\nautomobile parking space used for the display or sale of new or used\\nautomobiles, motorcycles, ATVs, recreational vehicles, light trucks, and\\ntrailers, to be displayed and sold on the premises, and where minor repair work\\nand maintenance is done for those vehicles. This use does not allow for the\\nstorage of wrecked automobiles or the dismantling of automobiles or the storage\\nof automobile parts or junk on the premises.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Automotive Service\\n\\u00A0\\u00A0\\u00A0A building, structure, or land use for the limited repair and maintenance of\\nautomobiles, motorcycles, trucks, trailers, or similar vehicles include, but\\nnot limited to, muffler repair and replacement, oil change and lubrication,\\ntire service and sales, installation of accessories, or diagnostic services.\\nAutomotive Service work does not involve significant noise, glare, fumes,\\nsmoke, or similar impacts. Any repair, maintenance, or service activity more\\nextensive than provided in the Automotive Service use, shall constitute as an\\nAutomotive Repair use and be regulated as such.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0Automotive Wash\\n\\u00A0\\u00A0\\u00A0A facility, whether automatic, semi-automatic or manual, for washing\\nautomobiles, motorcycles, A TVs, recreational vehicles, light trucks, trailers,\\nand the like.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0B Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Bar\\n\\u00A0\\u00A0\\u00A0An establishment providing or dispensing, for on-site consumption, alcoholic\\nbeverages, including but not limited to any fermented malt beverage, malt\\nbeverage, special malt, vinous, spirituous liquors, and those drinks specified\\nin Ohio R.C. Ch. 4301.01(14), as amended. The sale of hot food products may be\\nincluded as an ancillary use to the beverages provided on-site.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Bed and Breakfast\\n\\u00A0\\u00A0\\u00A0An owner-occupied property, other than a hotel, which offers lodging for\\npaying guests and which serves meals to these guests and which contains one or\\nmore guest bedrooms and where facilities for food preparation are not provided\\nin the individual guest bedrooms.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Brewery\\n\\u00A0\\u00A0\\u00A0A facility for the brewing of beer and ale for sale on the premises, as well\\nas for offsite sales and distribution, which produces more than 10,000 barrels\\nannually and may include a restaurant, bar, tasting, or retail space. The\\nbrewing operation processes the ingredients to make beer and ale by mashing,\\ncooking, and fermenting. The brewing operation does not include the production\\nof any other alcoholic beverages.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0C Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Cannabis Growing/Processing\\n\\u00A0\\u00A0\\u00A0A facility operated by an organization or business that is licensed by the\\nState of Ohio to either extract constituent chemicals or compounds to produce\\ncannabis concentrate or incorporate cannabis or cannabis concentrate into a\\nproduct formulation to produce a cannabis product.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Cemetery\\n\\u00A0\\u00A0\\u00A0A place for interment of human or animal remains or cremated remains,\\nincluding a burial park for earth interments, a mausoleum for vault or crypt\\ninterments, a columbarium for cinerary interments, or a combination thereof.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Check-Cashing Business\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio R.C. Ch. 1315.21B, as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Child Care Center\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio Admin. Code 5101:2-1-01(B)(63), as amended. This\\nterm includes nursery schools, preschools, and other similar uses.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Clinic\\n\\u00A0\\u00A0\\u00A0An establishment where human patients are not hospitalized overnight and\\nexamined and are treated by or under the care and supervision of doctors,\\ndentists, or other medical practitioners.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Club\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio R.C. Ch. 4301 .01(13), as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0College/University\\n\\u00A0\\u00A0\\u00A0A privately-owned or publicly-owned institution providing full-time or part-\\ntime education beyond the high school level, including any on-campus lodging\\nrooms, housing for students or faculty, athletic facilities, food halls,\\nmedical services, and the like.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Communication Facility\\n\\u00A0\\u00A0\\u00A0Towers, antennas, equipment, equipment buildings and other facilities used\\nin the provision of wireless communication services, small cellular\\ntelecommunication services, and the like.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Community Center\\n\\u00A0\\u00A0\\u00A0A place, structure, area or other facility that is open to the public, under\\nthe jurisdiction of a public or nonprofit agency, and is used for community\\nrecreation, education and service activities. A community center may include,\\nbut is not limited to, the following uses: auditorium, multipurpose room,\\ngymnasium, meeting space, open space, playground, playing courts, playing\\nfield, and swimming pool.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10)\\u00A0\\u00A0\\u00A0Community Garden\\n\\u00A0\\u00A0\\u00A0A use that provides land or space for people to grow plants for non-\\ncommercial purposes, such as beautification, education, recreation, or harvest\\nfor personal consumption, and is managed by a specific person, group,\\nassociation, or entity responsible for maintenance and operations. Examples of\\nthose who can manage include but are not limited to school/religious groups,\\nhomeowners\\u0027 associations, rotary club, etc.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Crematory\\n\\u00A0\\u00A0\\u00A0A building or portion of a building where human remains and deceased animals\\nare cremated in cremation retorts.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0D Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Distillery\\n\\u00A0\\u00A0\\u00A0A facility for distilling spirits and liquor, including wine, for sale and\\ndistribution on-premises or off-site, that produces more than 50,000 proof\\ngallons annually, and including restaurant/bar space, tasting space, or retail\\nspace.\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0E Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Educational Institution\\n\\u00A0\\u00A0\\u00A0A public or private educational facility offering instruction at the\\nelementary, junior, or senior high school levels in the branches of learning\\nand study required to be taught in the schools of Ohio. Educational facilities\\nmay include but are not limited to ancillary uses such as playgrounds, ball\\nfields, temporary classroom buildings, gyms, auditoriums, and amphitheaters.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0F Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Financial Institution\\n\\u00A0\\u00A0\\u00A0An establishment where the primary occupation is financial services such as\\nbanking, savings, and loans. It does not include financial services that\\ntypically occur in an office or storefront, such as investment companies, loan\\ncompanies, credit and mortgage, insurance services, or brokerage firms), which\\nare classified under \\u0022Professional Office,\\u0022 below.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Flex Warehouse\\n\\u00A0\\u00A0\\u00A0A building or portion thereof used for the housing of where building and\\nconstruction trade services are provided to the public. This use shall include,\\nbut is not limited to, contractor offices, including landscaper\\u0027s showrooms,\\nconstruction supplies and storage including plumbing, heating, air\\nconditioning, and building equipment, materials, sales, and other uses similar\\nin nature and impact.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Funeral Services\\n\\u00A0\\u00A0\\u00A0A building or part thereof used for human funeral services, that may include\\nspace for the embalming and other services used in the preparation of the dead\\nfor burial; the storage of caskets, funeral urns, funeral vehicles, and other\\nrelated supplies; facilities for cremation, chapels, and other related uses.\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0G Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Ghost Kitchen\\n\\u00A0\\u00A0\\u00A0A place or facility for preparing, cooking, baking, and selling of food\\nproducts on the premises for off-premise consumption. Accessory office and\\nwaiting spaces shall be incidental to the primary use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Government Use\\n\\u00A0\\u00A0\\u00A0A building or land used and controlled exclusively for governmental or\\npublic purposes by any department or branch of government including city,\\nstate, county, federal, or other recognized public entity. Such use may\\ninclude, but is not limited to, city offices, public works, libraries, post\\noffices, training facilities, fire stations, police storefronts, and other\\nsimilar uses.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Greenhouse/Nursery\\n\\u00A0\\u00A0\\u00A0A place where plants, including flowers, shrubs, trees, and sometimes seeds,\\nare grown and sold. This use does not include the growing and selling of\\nmarijuana.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0H Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Hospital\\n\\u00A0\\u00A0\\u00A0A facility providing physical or mental health services, inpatient or\\novernight accommodations, and medical or surgical care for the sick or injured.\\nSuch a facility may include Clinics.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Hotel\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio R.C. Ch. 3731.01(A), as amended.\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0I Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Indoor Commercial Amusement\\n\\u00A0\\u00A0\\u00A0A place where entertainment activities occur completely within an enclosed\\nstructure for a fee, including but not limited to theaters, bowling alleys,\\narcades, skating rinks, escape rooms, pool halls, video and pinball parlors. An\\nIndoor Commercial Amusement may include but are not limited to ancillary uses\\nsuch as food and beverage sales and giftshops that are designed and intended\\nprimarily for the use of patrons.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Intensive-Impact Industrial and Manufacturing\\n\\u00A0\\u00A0\\u00A0The manufacturing, processing, and storing of paper, chemicals, plastics,\\nrubber, cosmetics, drugs, nonmetallic mineral products (such as concrete and\\nconcrete products, glass), primary metals, acetylene, cement, lime, gypsum or\\nplaster-of Paris, chlorine, corrosive acid or fertilizer, insecticides,\\ndisinfectants, poisons, explosives, paint, lacquer, varnish, petroleum\\nproducts, coal products, plastic and synthetic resins, electrical equipment,\\nappliances, batteries, and machinery. This use also includes the heaviest and\\nmost intensive facilities which warrants additional review by the City such as:\\nasphalt and concrete mixing plants, smelting, animal slaughtering, oil\\nrefining, and magazine contained explosives facilities.\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0J Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(k) \\u00A0\\u00A0\\u00A0K Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Kennel\\n\\u00A0\\u00A0\\u00A0A facility licensed to house dogs, cats, or other household pets or where\\ngrooming, breeding, boarding or training or selling of animals is conducted as\\nbusiness. This use includes pet resorts/hotels, pet adoption centers, dog\\ntraining centers, animal rescue shelters and sanctuaries.\\n\\u00A0\\u00A0\\u00A0(l) \\u00A0\\u00A0\\u00A0L Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Laboratory\\n\\u00A0\\u00A0\\u00A0A building or part thereof in which are located facilities for scientific\\nresearch, investigation, testing, or experimentation, but not facilities for\\nthe manufacture or sale of products except as incidental to the main purpose of\\nthe laboratory.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Limited-Impact Industrial and Manufacturing\\n\\u00A0\\u00A0\\u00A0The manufacturing of products, from extracted, raw, recycled or secondary\\nmaterials, including bulk storage and handling of those products and materials,\\nor crushing, treating, washing, and/or processing of materials. This includes\\nsimilar establishments, and businesses of a similar and no more objectionable\\ncharacter. It also includes incidental finishing and storage. Goods or products\\nmanufactured or processed on-site may be sold at retail or wholesale on or off\\nthe premises. This does not include any activity listed under Intensive-Impact\\nIndustrial and Manufacturing. Examples of Limited-Impact Industrial and\\nManufacturing include the manufacture or production of the following goods or\\nproducts: apparel (including clothing, shoes, dressmaking); boats and\\ntransportation equipment; brooms; caskets; communication or computation\\nequipment; dairy products; die-cut paperboard and cardboard; drugs, medicines,\\npharmaceutical; electrical equipment or machinery; farm machinery; fasteners\\nand buttons; feed and grain; food/baking (including coffee roasting,\\ncreameries, ice cream, ice, frozen food, confectionery, and beverage); fruit\\nand vegetable processing, canning and storage; gaskets; glass products made of\\npurchased glass; household appliances; industrial controls; leather and allied\\nproducts; lithographic and printing processes (including printing plants as\\ndefined below); mattresses; medical equipment and supplies; medicines; mill\\nwork and similar woodwork; mobile homes; musical instruments; novelties; office\\nsupplies; optical goods; photographic equipment; prefabricated and modular\\nhousing and components; printing and print supplies (including printing\\nplants); 3-D printing, radio and TV receiving sets; sanitary paper products;\\nscientific and precision instruments; service industry machines; signs;\\ntextiles (including dyeing, laundry bags, canvas products, dry goods, hosiery,\\nmillinery); tobacco products; toys, sporting and athletic goods; and watches\\nand clocks.\\n\\u00A0\\u00A0\\u00A0(m)\\u00A0\\u00A0\\u00A0M Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Major Utilities and Public Service Facility\\n\\u00A0\\u00A0\\u00A0Infrastructure services that typically have substantial visual or\\noperational impacts on nearby areas. Typical uses include but are not limited\\nto water and wastewater treatment facilities, high-voltage electric\\nsubstations, utility-scale power generation facilities (including wind, solar\\nand other renewable and nonrenewable energy sources), sanitary landfills and\\nutility-scale water storage facilities, such as water towers and reservoirs.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Microbrewery\\n\\u00A0\\u00A0\\u00A0An establishment where beer and malt beverages are made on the premises and\\noffered for consumption on site, offered for sale directly to customers\\n(including filling growlers), sold to licensed wholesalers to distribute the\\nbeer to retailers. Ohio State Law establishes an annual production limit of\\n10,000 barrels for microbreweries.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Microdistillery\\n\\u00A0\\u00A0\\u00A0An establishment where distilling of spirits and liquor are made on\\npremises, and offered for consumption on site, offered for sale directly to\\ncustomers, sold to licensed wholesalers for distribution. Ohio State Law\\nestablishes an annual production limit of 50,000 proof gallons for\\nmicrodistilleries.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Mineral Extraction\\n\\u00A0\\u00A0\\u00A0The extraction or quarrying of coal, ores, stone, minerals, top soil or\\naggregate resources from the ground. Examples include quarrying or dredging for\\nsand, gravel or other aggregate materials; mining and top soil extraction. This\\nalso includes crushing, washing and grading coal, ore, stone, sand, gravel,\\nminerals, topsoil or aggregate resources and manufacture of Portland cement.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Minor Utilities and Public Service Facility\\n\\u00A0\\u00A0\\u00A0Infrastructure services that need to be located in or close to the area\\nwhere the service is provided. Minor utilities and public service facilities\\ngenerally do not have regular employees at the site and typically have few if\\nany impacts on surrounding areas. Typical uses include water and sewer pump\\nstations; gas regulating stations; underground electric distribution\\nsubstations; electric transformers; water conveyance systems; stormwater\\nfacilities and conveyance systems; telephone switching equipment and emergency\\ncommunication warning/broadcast facilities.\\n\\u00A0\\u00A0\\u00A0(n) \\u00A0\\u00A0\\u00A0N Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Night Club\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio R.C. Ch. 4301 .0104), as amended.\\n\\u00A0\\u00A0\\u00A0(o) \\u00A0\\u00A0\\u00A0O Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Outdoor Commercial Amusement\\n\\u00A0\\u00A0\\u00A0A place where entertainment activities occur outdoors for a fee, including\\nbut not limited to miniature golf, batting cages, water slides, driving ranges,\\ntheme parks, drive-in theaters, and go cart tracks. An Outdoor Commercial\\nAmusement may include but are not limited to ancillary uses such as food and\\nbeverage sales and giftshops that are designed and intended primarily for the\\nuse of patrons.\\n\\u00A0\\u00A0\\u00A0(p) \\u00A0\\u00A0\\u00A0P Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Parking Facility\\n\\u00A0\\u00A0\\u00A0An area reserved or used for parking or storage of motor vehicles, hauling\\ntrailers or boats on premises on which there is no principal building.\\nAlternatively, the use may utilize a structure used specifically for the\\nparking or storage of motor vehicles. A Parking Facility includes those parking\\narrangements that are surface-level, above grade, and below-grade structure.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Passive Park/Recreational Facilities\\n\\u00A0\\u00A0\\u00A0Parks and recreational pursuits, such as interpretive programs and trail\\nsystems that take advantage of geological, biological, or scenic resources\\nlocated within the city limits.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Pawnbroker\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio R.C. Ch. 4727.01, as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Personal Services\\n\\u00A0\\u00A0\\u00A0Establishments that are primarily engaged in providing services generally\\ninvolving the care of the person or person\\u0027s possessions. Personal services may\\ninclude, but are not limited to, laundry and dry-cleaning services, barber\\nshops, beauty salons, music schools, informational and instructional services,\\ntanning salons, and portrait studios.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Professional Office\\n\\u00A0\\u00A0\\u00A0A use or structure where business or professional activities are conducted\\nor business or professional services are made available to the public,\\nincluding, but not limited to, tax preparation, accounting, architecture, legal\\nservices, medical professionals, dental laboratories, psychological counseling,\\nreal estate and securities brokering, and professional consulting services.\\n\\u00A0\\u00A0\\u00A0(q) \\u00A0\\u00A0\\u00A0Q Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(r) \\u00A0\\u00A0\\u00A0R Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Religious Land Use\\n\\u00A0\\u00A0\\u00A0A structure, group of structures, or lands intended for regular gatherings\\nof people to attend, participate in or conduct religious services and other\\nrelated activities and associated accessory uses. Associated accessory uses may\\ninclude religious instruction classrooms, church offices, counseling programs,\\nprivate school, youth programs, parking, child and adult day care facilities,\\nsummer camps, recreational facilities, caretaker\\u0027s quarters, food bank, thrift\\nshop, sale of religious items, and cemeteries.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Restaurant\\n\\u00A0\\u00A0\\u00A0An establishment where food and drink are prepared, sold to customers, and\\nmay be consumed on the premises. A restaurant may include the incidental sales\\nand service of alcoholic beverages for on-site consumption. Such uses include\\nbut are not limited to cafes, coffee shops, delicatessen, sit-down dining, and\\nfast food.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Retail Store\\n\\u00A0\\u00A0\\u00A0A building(s) or facility(ies) in which the sale of goods, products, or\\nmerchandise is sold directly to the consumer. Typical uses include but are not\\nlimited to clothing stores, department stores, electronic and appliance stores,\\nbike shops, bookstores, hobby shops, jewelry stores, furniture stores, pet\\nsupply stores, shoe stores, antique shops, secondhand stores, record shops,\\nCBD/smoke shops, sporting goods stores, variety stores, musical instrument\\nstores, medical supply sales, office supplies, convenience stores, and beauty\\nsupply shops. Cannabis dispensaries are excluded from this definition.\\n\\u00A0\\u00A0\\u00A0(s) \\u00A0\\u00A0\\u00A0S Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Salvage Yard\\n\\u00A0\\u00A0\\u00A0A use as defined in\\n739.01(c) of the Code of Ordinances.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Self-Storage Facility\\n\\u00A0\\u00A0\\u00A0A building or group of buildings consisting of individual, self-contained\\nspaces that are leased or owned for the storage of business goods, household\\ngoods, or contractor supplies.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Sexually Oriented Business\\n\\u00A0\\u00A0\\u00A0Those uses defined in\\n707.02 of the Code of Ordinances, as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Solid Waste Transfer Station\\n\\u00A0\\u00A0\\u00A0A building or facility that is used or intended to be used primarily for the\\npurpose of transferring solid wastes that are generated off the facility\\u0027s\\npremises from vehicles or containers into other vehicles or containers for\\ntransportation to a solid waste disposal facility. The operation is totally\\nenclosed within a building.\\n\\u00A0\\u00A0\\u00A0(t) \\u00A0\\u00A0\\u00A0T Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Technical School\\n\\u00A0\\u00A0\\u00A0An institution in an enclosed building that focus on teaching the skills\\nneeded to perform a particular job, technical trade, or professional skill.\\nExamples include schools of cosmetology, modeling academies, computer training\\nfacilities, vocational schools, administrative business training facilities and\\nsimilar uses.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Transportation Facility\\n\\u00A0\\u00A0\\u00A0Any structure or transit facility that is primarily used, as part of a\\ntransit system, for the purpose of loading, unloading, or transferring\\npassengers or accommodating the movement of passengers from one mode of\\ntransportation to another.\\n\\u00A0\\u00A0\\u00A0(u) \\u00A0\\u00A0\\u00A0U Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Urban Farm\\n\\u00A0\\u00A0\\u00A0Any land or indoor facility that cultivate flowers, fruits, and vegetables\\nand sells those products for commercial purposes. Ancillary uses that support\\nthe operation such as washing, packaging, and storing facilities are included.\\nThis use is less intensive than the Agricultural Operations use. Any\\nagricultural activity more extensive than provided in the Urban Farm use, shall\\nconstitute as an Agricultural Operations use and be regulated as such.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(v) \\u00A0\\u00A0\\u00A0V Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Veterinarian Facility\\n\\u00A0\\u00A0\\u00A0A facility where animals or pets are given medical or surgical treatment and\\nare cared for during the time of such treatment. This use may include an\\naccessory kennel that is limited to short-term boarding incidental to the\\nveterinarian facility.\\n\\u00A0\\u00A0\\u00A0(w)\\u00A0\\u00A0\\u00A0W Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Warehouse\\n\\u00A0\\u00A0\\u00A0An enclosed storage facility which is used to store goods or parts, or for\\nany part of the shipping process. This use includes cross-dock facilities.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Wholesale and Distribution\\n\\u00A0\\u00A0\\u00A0A facility or area for the storage of goods, and the sale of goods to other\\nfirms for resale, including activities involving significant storage and\\nmovement of products or equipment. This use does not involve manufacturing or\\nproduction. Examples include but are not limited to: carting, cold storage,\\ndistribution facilities, dry goods wholesale, express crating, hauling, feed\\nlocker plants, fulfillment centers that combine storage with call centers,\\nhardware storage, merchant wholesalers (such as restaurant supply sales),\\nwarehouse or produce/fruit/food storage and wholesale structures, wholesale\\nsale of paper supplies, shoes, sporting goods, professional and commercial\\nequipment and supplies, and otherwise preparing goods for transportation.\\nDistribution means the intake of goods and merchandise, individually or in\\nbulk, the short-term holding or storage of such goods or merchandise, and/or\\nthe breaking up into lots or parcels and subsequent shipment off-site of such\\ngoods and merchandise. Distribution may be provided to an entity with an\\nidentity of interest with the facility or to businesses and individuals\\nunrelated to the distributor. The term distribution also includes a\\ntransshipment facility for the temporary holding, storage and shipment of goods\\nor vehicles.\\n\\u00A0\\u00A0\\u00A0(x) \\u00A0\\u00A0\\u00A0X Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(y) \\u00A0\\u00A0\\u00A0Y Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(z) \\u00A0\\u00A0\\u00A0Z Uses (Reserved)\\n1105.03 ACCESSORY AND TEMPORARY USES.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0A Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Accessory Building\\n\\u00A0\\u00A0\\u00A0A subordinate building, located on the same lot as the primary building, the\\nuse of which is clearly incidental to and customarily found in connection with\\nthe primary building or use of the property. Such uses include but are not\\nlimited to equipment storage sheds, personal workshop space, and the like.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Accessory Dwelling Unit\\n\\u00A0\\u00A0\\u00A0An attached or detached additional dwelling unit associated with a principal\\nresidence on the same lot or parcel of that principal residence. This use\\nincludes those uses commonly referenced as carriage houses, granny flats,\\nservant\\u0027s quarters, garage apartments, guard residences, and the like.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Alternative Energy System\\n\\u00A0\\u00A0\\u00A0Any wind or solar driven devices and equipment (whether roof, ground\\nmounted, or tower mounted) used for the purpose of providing electrical power\\nto a privately owned lot or parcel. These systems are accessory in function,\\nare not of an industrial or large-scale, and are reserved exclusively for\\nprivate or personal use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0ATM\\n\\u00A0\\u00A0\\u00A0An automated device that performs banking or financial functions at a\\nlocation remote from the controlling financial institution.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0B Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0C Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Cargo Containers\\n\\u00A0\\u00A0\\u00A0A standardized, reusable weatherproof fully enclosed box-like structure\\nconstructed with doors, originally designed for the shipment or storage of\\nfreight or other goods, and commonly designed for or is capable of being\\nmounted on a railroad car or chassis for movement by truck or ship.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Charitable Donation Container\\n\\u00A0\\u00A0\\u00A0An accessory structure where clothes, goods, products, and other items are\\nplaced for donation and are subsequently delivered to a charitable organization\\nfor public consumption.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0D Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Drive-Thru Facility\\n\\u00A0\\u00A0\\u00A0Any associated facilities related to a building opening, including windows,\\ndoors, or mechanical devices, through which occupants of a motor vehicle\\nreceive or obtain a product, food, or service.\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0E Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0F Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Fueling and Charging Services\\n\\u00A0\\u00A0\\u00A0Facilities and equipment arranged, designed, used, or intended to be used\\nfor the primary purpose of dispensing gasoline, oil, diesel fuel, and\\nelectricity at retail direct to on-premises vehicles. Such services include\\nfueling pumps, charging stations, and the like. This use does not include\\ncharging stations situated on residential properties since those facilities are\\nfor the property owner\\u0027s or tenants\\u0027 personal use.\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0G Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Garage or Yard Sales\\n\\u00A0\\u00A0\\u00A0General sales, open to the public, conducted from or on a residential lot or\\nin any residential district for the purpose of disposing of personal lot or\\nother lot, including but not limited to, all sales entitled \\u0022garage,\\u0022 \\u0022lawn,\\u0022\\n\\u0022estate,\\u0022 \\u0022yard,\\u0022 \\u0022attic\\u0022, \\u0022tag\\u0022 or \\u0022rummage sale.\\u0022\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0H Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Home Occupation\\n\\u00A0\\u00A0\\u00A0An occupation, profession, or business activity for financial gain or profit\\nwhich results in a product or service and is conducted in whole or in part in a\\ndwelling unit and is subordinate to the residential use of the property.\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0I Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0J Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(k) \\u00A0\\u00A0\\u00A0K Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(l) \\u00A0\\u00A0\\u00A0L Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(m)\\u00A0\\u00A0\\u00A0M Uses\\u00A0\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Mobile Food Service\\n\\u00A0\\u00A0\\u00A0A commercial operation that utilizes a licensed, motorized vehicle (food\\ntruck) or concession trailer for the sale of cooked or prepared food and\\nbeverage items that are sold to the general public for on-site or off-site\\nconsumption.\\n\\u00A0\\u00A0\\u00A0(n) \\u00A0\\u00A0\\u00A0N Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(o) \\u00A0\\u00A0\\u00A0O Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Outdoor Dining\\n\\u00A0\\u00A0\\u00A0An accessory dining space reserved for customers and patrons at a\\nrestaurant, brewery/distillery, hotel, or mixed-use building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Outdoor Storage\\n\\u00A0\\u00A0\\u00A0The keeping of any goods, materials, merchandise, or vehicles outside of a\\nstructure or building for more than 48 consecutive hours. Outdoor storage shall\\nnot include vehicles, tool rental establishments, greenhouses, or other uses\\nwhere the sale of the merchandise is the primary use of the property.\\n\\u00A0\\u00A0\\u00A0(p) \\u00A0\\u00A0\\u00A0P Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Personal Swimming Pool\\n\\u00A0\\u00A0\\u00A0A swimming pool on private property for the use of the property owner,\\nincluding family and guests.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Private Kennel\\n\\u00A0\\u00A0\\u00A0The use of a residence or private property to partake in Hobby Breeder\\nactivities.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Private Utility\\n\\u00A0\\u00A0\\u00A0Those utilities provided by a contractor or franchise on private property\\nfor personal use.\\n\\u00A0\\u00A0\\u00A0(q) \\u00A0\\u00A0\\u00A0Q Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(r) \\u00A0\\u00A0\\u00A0R Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(s) \\u00A0\\u00A0\\u00A0S Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(t) \\u00A0\\u00A0\\u00A0T Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Type A Family Child Care Home\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio R.C. Ch. 5104.01(UU), as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Type B Family Child Care Home\\n\\u00A0\\u00A0\\u00A0A use as defined in Ohio R.C. Ch. 5104.01(VV), as amended.\\n\\u00A0\\u00A0\\u00A0(u) \\u00A0\\u00A0\\u00A0U Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(v) \\u00A0\\u00A0\\u00A0V Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Vertiport\\n\\u00A0\\u00A0\\u00A0An area of land, structural surface, building, or structure with one or more\\ndesignated drone staging areas for use by small unmanned aircraft systems\\n(sUAS) under 55 pounds total take-off weight or as defined in Section 44801 of\\nTitle 49, United States Code, as amended, whichever is the lesser, to\\ndistribute commercial goods by air. This includes any appurtenant areas used or\\nintended for use for unmanned aircraft system buildings, structures, and other\\nfacilities.\\n\\u00A0\\u00A0\\u00A0(w)\\u00A0\\u00A0\\u00A0W Uses\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Walk-Up Window\\n\\u00A0\\u00A0\\u00A0Any associated facilities related to a building opening, including windows,\\ndoors, or mechanical devices, through which customers and patrons on foot\\nreceive or obtain a product, food, or service.\\n\\u00A0\\u00A0\\u00A0(x) \\u00A0\\u00A0\\u00A0X Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(y) \\u00A0\\u00A0\\u00A0Y Uses (Reserved)\\n\\u00A0\\u00A0\\u00A0(z) \\u00A0\\u00A0\\u00A0Z Uses (Reserved)\\nCHAPTER 1106\\nUse-Specific Standards\\n1106.01\\u00A0\\u00A0\\u00A0Residential uses.\\n1106.02\\u00A0\\u00A0\\u00A0Nonresidential uses.\\n\\u00A0\\n1106.01 RESIDENTIAL USES.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Adult Family Home\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0An Adult Family Home shall meet all local, county, state, and\\nfederal rules, regulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Adult Group Home\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0An Adult Group Home shall meet all local, county, state, and\\nfederal rules, regulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Children\\u0027s Residential Center\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Children\\u0027s Residential Center shall meet all local, county,\\nstate, and federal rules, regulations, and ordinances pertaining to the use\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Cottage Court\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8184.jpg]\\nFigure 1106.01.1: Cottage Court Layout\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Figure 1106.01.1: Cottage Court Layout shows an example of a\\nCottage Court layout.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The minimum total lot area required for a Cottage Court is the\\ncumulative area required for each dwelling type provided within the\\ndevelopment.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Where a dwelling fronts on the common open space, it is considered\\nto meet the requirement for frontage on a public or private street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0The zoning district standards apply to each individual dwelling\\ntype within the Cottage Court with the following exceptions:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The maximum building height is limited to 35 feet for all\\ndwellings.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0For dwellings that front the common open space, the minimum\\nfront setback required is ten feet as measured from the common open space.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0For dwellings that front the common open space, the required\\nminimum rear and side setbacks is five feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0For any dwelling abutting a public or private street, an entrance\\nto the dwelling must face the street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0For any dwelling that fronts the common open space, the front\\nfacade of the dwelling shall be oriented to the common open space.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Common open space shall be provided and shall meet the following\\nstandards:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The minimum area of the common open space is 500 square feet per\\ndwelling.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0At least 50% of the centrally located common open space shall\\nhave a minimum width of 40 feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Of the required amount of common open space, 75% shall be\\ncentrally located.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0All common open space shall be accessible to all residents.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Yards for dwellings are not counted toward the required amount\\nof common open space. However, such yards may be in addition to the required\\namount of common open space.\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Courtyard Apartment\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Common open space shall be provided for a Courtyard Apartment\\ndevelopment.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A Courtyard Apartment shall be designed where the prominent\\nfeature of the development is the common open space.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0For each dwelling unit provided, 100 square feet of common open\\nspace shall be provided.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0The required common open space:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0May be hardscaped up to 50%.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Shall provide outdoor furniture, amenities, and similar items\\nfor the use of residents.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Emergency Shelter\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0An Emergency Shelter shall meet all local, county, state, and\\nfederal rules, regulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Foster Home\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Foster Home shall meet all local, county, state, and federal\\nrules, regulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Four-Unit Dwelling\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Four-Unit Dwelling may be designed as a stacked, side-by-side,\\nor multi-side dwelling.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Where possible, a Four-Unit Dwelling shall provide rear-entry\\nparking.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0A Three-Unit Dwelling shall comply with the requirements of\\nSection\\n1106.01 (w)(2).\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Group Home for Children\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Group Home for Children shall meet all local, county, state, and\\nfederal rules, regulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Halfway House Facility\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Halfway House Facility shall meet all local, county, state, and\\nfederal rules, regulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0(k) \\u00A0\\u00A0\\u00A0Home for the Aging\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Home for the Aging shall meet all local, county, state, and\\nfederal rules, regulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Live-Work Dwelling\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8198.jpg]\\nFigure 1106.01.2: Live-Work Dwellings\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Figure 1106.01.2: Live-Work Dwellings shows an example of Live-\\nWork Dwellings, as defined in Section\\n1105.01(l)(1), where parking is provided in the rear.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The residential unit shall be occupied by the business owner or\\nmanager.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3)\\u00A0\\u00A0\\u00A0The work component shall be on street level.\\n\\u00A0\\u00A0\\u00A0(m)\\u00A0\\u00A0\\u00A0Main Street Mixed Use Building\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The first floor shall be reserved for nonresidential uses.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The residential use shall not exceed 75% of the total Mixed-Use\\nBuilding square footage.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0All on-site parking shall be located at the rear of the site.\\n\\u00A0\\u00A0\\u00A0(n) \\u00A0\\u00A0\\u00A0Multi-Unit Dwelling\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8213.jpg]\\nFigure 1106.01.3: Multi-Unit Dwelling\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Multi-Unit Dwelling may be designed as a stacked or multi-sided\\ndwelling.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A Multi-Unit Dwelling shall be designed to where no more than four\\ndwelling units are provided side-by-side on any one story of the dwelling.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0A Multi-Unit Dwelling shall comply with the requirements of\\nSection\\n1106.01 (w)(2).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Figure 1106.01.3: Multi-Unit Dwelling shows an example of a Multi-\\nUnit Dwelling where rear-entry parking is provided.\\n\\u00A0\\u00A0\\u00A0(o) \\u00A0\\u00A0\\u00A0Nursing Home\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Nursing Home shall meet all local, county, state, and federal\\nrules, regulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0(p) \\u00A0\\u00A0\\u00A0Zero Lot Line Development\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8229.jpg]\\nFigure 1106.01.4: Zero Lot Line Development\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The dwelling may be constructed with a zero side yard on one\\nside, and a side yard of not less than 10 feet extending the full depth of the\\nlot on the other side.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The dwelling may be placed on the \\u0022zero\\u0022 side yard line (see the\\ndwelling placement as provided in Figure 1106.01.4: Zero Lot Line Development).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0In all cases, there shall be at least a 10-foot side yard on\\ncorner lots where adjacent to a street right-of-way or alley.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Under no circumstances shall the separation between two zero lot\\nline dwellings, or between a zero lot line dwelling and any other type of\\nprincipal building on an adjacent lot, be less than 10 feet wall-to-wall.\\n\\u00A0\\u00A0\\u00A0(q) \\u00A0\\u00A0\\u00A0Recovery Housing Residence\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Recovery Housing Residence shall meet all local, county, state,\\nand federal rules, regulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0(r) \\u00A0\\u00A0\\u00A0Residential Care Facility\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Residential Care Facility shall meet all local, county, state,\\nand federal rules, regulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0(s) \\u00A0\\u00A0\\u00A0Residential Facility\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Residential Facility shall meet all local, county, state, and\\nfederal rules, regulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0(t) \\u00A0\\u00A0\\u00A0Three-Unit Dwelling\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Three-Unit Dwelling may be designed as a stacked, side-by-side,\\nor multi-side dwelling.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A Three-Unit Dwelling shall comply with the requirements of\\nSection\\n1106.01 (w)(2).\\n\\u00A0\\u00A0\\u00A0(u) \\u00A0\\u00A0\\u00A0Tiny Home\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Tiny Home shall meet the applicable zoning district\\u0027s\\ndimensional requirements.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A Tiny Home shall be securely fixed to a permanent foundation.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0A Tiny Home shall connect to water, wastewater, and electric\\nutilities (including connection to the electrical grid).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0A copy of all final plans and construction details shall be\\nsubmitted as a part of conditional use permit application.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5)\\u00A0\\u00A0\\u00A0All final plans and construction details for a Tiny Home shall be\\nsigned and sealed by a registered engineering or design professional and they\\nshall comply with the most recently adopted version of International\\nResidential Code.\\n\\u00A0\\u00A0\\u00A0(v) \\u00A0\\u00A0\\u00A0Town home\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8246.jpg]\\nFigure 1106.01.5: Townhomes\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0No Town home row shall exceed eight (8) units.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0At the end of a Town home row, a five-foot minimum side yard\\nsetback shall be provided.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Where possible, Townhomes shall provide rear-entry parking.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0All parking shall be on the public right-of-way or shall provide\\nrear entry parking garages where alley access exists.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Figure 1106.01.5: Townhomes shows an example of a Town home row\\nwhere rear entry parking is provided.\\n\\u00A0\\u00A0\\u00A0(w)\\u00A0\\u00A0\\u00A0Transitional Housing\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Transitional Housing shall meet all local, county, state, and\\nfederal rules, regulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0(x) \\u00A0\\u00A0\\u00A0Two-Unit Dwelling\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8264.jpg]\\nFigure 1106.01.6: Two-Unit Dwelling\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Two-Unit Dwelling may be designed as a stacked, side-by-side, or\\nmulti-sided dwelling.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Each front ground floor facade entrance shall be accompanied by a:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Stoop with an area of at least 50 square feet;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Porch with an area of at least 75 square feet; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0A recessed or projecting entry at least three feet deep with a\\nstructural covering (canopy, awning, etc.)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Figure 1106.01.6: Two-Unit Dwelling shows an example of a side-by-\\nside Two-Unit Dwelling where rear-entry parking is provided.\\n\\u00A0\\u00A0\\u00A0(y) \\u00A0\\u00A0\\u00A0Vertical Mixed Use Building\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The first floor shall be primarily used for nonresidential uses.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The first floor may incorporate residential uses but shall be\\nlimited to 25% of the square footage on the first floor.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The residential use shall not exceed 75% of the total Mixed Use\\nBuilding square footage.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0All on-site parking shall be located at the rear of the site with\\nthe exception that no more than 25% of the on-site parking may be allowed in\\nfront of the site.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Parking in the front of the site is prohibited in the C-DT\\ndistrict.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Nonresidential uses are allowed on the top floor of a Vertical\\nMixed Use Building.\\n1106.02 NONRESIDENTIAL USES.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Active Park/Recreational Facilities\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0All site lighting for the purposes of illuminating Active Park/\\nRecreational Facilities or any accessory use shall terminate at 11:00 p.m.\\nLighting for walls, security measures, sconces, and parking facilities are\\nexcluded from this requirement.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Noise generated by Active Park/Recreational Facilities shall not\\nexceed 40 dBA at any residential property line between the hours of 11:00 p.m.\\nand 8:00 a.m.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Agritainment\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Noise shall not exceed 70 decibels at the property boundaries.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0An Agritainment use shall provide sanitary and waste services for\\nparticipants and spectators.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0An Agritainment use shall provide paved emergency medical services\\nand fire lanes as part of the facility\\u0027s operations.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0The fire lane shall be at least 28 feet wide.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Assembly Hall\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0In the C-NC district the maximum building footprint of an Assembly\\nHall on a lot is 10,000 square feet.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Automotive Repair\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0All Automotive Body Repair activities shall take place within a\\nbuilding, and in no instance shall activities occur in the open, outside of\\nthat building unless located in the I-LI or 1-Hl districts.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0On-site overnight vehicle keeping is prohibited unless vehicles\\nare stored inside a building or fully screened as provided in Section\\n1120.03.\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Automotive Sales and Rental\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0An Automotive Sales or Rental use shall not be located within 300\\nfeet of any other Automotive Sales or Rental use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0No more than fifty percent (50%) of the total building floor area\\nmay be used for related accessory uses such as retail sales, repair and\\nservice, and washing.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Inventory spaces shall not count toward the maximum parking\\nrequirements.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Automotive Service\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0An Automotive Service use shall be located 150 feet from any\\nresidential district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0All Automotive Service activities shall take place within a\\nbuilding, and in no instance shall activities occur in the open, outside of\\nthat building unless located in the I-LI or I-HI districts.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0On-site overnight vehicle keeping is prohibited.\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Automotive Wash\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0An Automotive Wash shall be located 150 feet from any residential\\ndistrict.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0An Automotive Wash shall be closed for business between midnight\\nand 6:00 a.m.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Automotive Wash activities located in the C-LC district shall\\noccur within a completely enclosed structure.\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Bar\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Bar shall be located 150 feet from religious land uses and\\nschools.\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Bed and Breakfast\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Bed and Breakfast shall be subordinate to the principal use of\\nthe lot which must be a dwelling.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A Bed and Breakfast shall be owner-occupied and managed at all\\ntimes.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The maximum number of rented bedrooms/guestrooms is five.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Rented bedrooms/guestrooms shall only be used by transient\\nvisitors and travelers and rented on a nightly, weekend, or weekly basis.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0No cooking facilities are allowed in any of the bedrooms/\\nguestrooms.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0A Bed and Breakfast shall meet all of the minimum requirements of\\nthe City-County Health Department and shall conform in all respects to the\\nrequirements of the fire code, building code, electrical code, and plumbing\\ncode.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0A Bed and Breakfast is responsible for the collection of the\\nrequired City hotel/motel tax.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0All City-County Health Officers, Building Inspectors, the Fire\\nMarshal and their assistants, and other code enforcement officials of the City\\nshall have the right to go on any premises of a Bed and Breakfast during normal\\nbusiness hours for the purpose of verifying compliance with this subsection and\\nall other applicable ordinances of the City.\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Cemetery\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Cemetery shall have a minimum site area of 20 acres.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0All buildings, structures, gravestones, and other structures\\nassociated with a Cemetery shall be located at least 100 feet from all lot\\nlines abutting a residential zoning district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0A Cemetery may be located adjacent to a residential district or\\nuse if situated at the terminus of a residential block. In this instance,\\nscreening shall be provided as required in Section\\n1120.03 .\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0A Cemetery in concert with Funeral Services shall comply with the\\nregulations provided in\\n1106.02 (p).\\n\\u00A0\\u00A0\\u00A0(k) \\u00A0\\u00A0\\u00A0Communication Facility\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The base and all related facilities and structures of the proposed\\nwireless telecommunications facilities will be effectively screened from view.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0All utilities at the site shall be installed underground and in\\ncompliance with all laws, ordinances, rules and regulations of the City,\\nincluding specifically, but not limited to, the National Electrical Safety Code\\nand the National Electrical Code where appropriate.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Access roads, turn-around space and parking have been provided to\\nassure adequate emergency and service access.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Maximum use of existing roads, whether public or private, shall be\\nmade to the extent practicable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Road construction shall minimize ground disturbance and the\\ncutting of vegetation.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Road grades shall closely follow natural contours to assure\\nminimal visual disturbance and reduce soil erosion.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Any new tower to be constructed on the site shall be no higher\\nthan necessary, and in no case, higher than 190 above existing grade.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Wireless telecommunications facilities shall not be artificially\\nlighted or marked, except as required by law.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Towers shall be galvanized and painted with a rust-preventive\\npaint of a noncontrasting gray or similar color to harmonize with the\\nsurroundings and shall be maintained in accordance with the requirements of\\nthis chapter.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0All wireless telecommunications facilities and antennas shall be\\nfenced or otherwise secured in a manner that prevents unauthorized access.\\nSpecifically:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0All antennas, towers and other supporting structures, including\\nguy wires, shall be made inaccessible to individuals and constructed or\\nshielded in such a manner that they cannot be climbed or collided with; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Transmitters and telecommunications control points shall be\\ninstalled in such a manner that they are readily accessible only to persons\\nauthorized to operate or service them.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Wireless telecommunications facilities shall contain a sign no\\nlarger than four square feet located near the base of the tower in order to\\nprovide adequate notification to persons in the immediate area of the presence\\nof an antenna that has transmission capabilities and shall contain the name(s)\\nof the owner(s) and operator(s) of the antenna(s), as well as emergency phone\\nnumber(s). The sign shall be on the equipment shelter or cabinet of the\\napplicant and be visible from the access point of the site and must identify\\nthe equipment owner of the shelter or cabinet. The sign shall not be lighted,\\nunless lighting is required by applicable law, rule or regulation. No other\\nsignage, including advertising, shall be permitted.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0All proposed towers and any other proposed wireless\\ntelecommunications facility structures shall be set back from any residential\\nproperty line a minimum of a distance equal to the height of the proposed tower\\nor wireless telecommunications facility structure plus 50% of the height of the\\ntower or structure.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(13) \\u00A0\\u00A0\\u00A0All proposed towers and any other proposed wireless\\ntelecommunications facility structures shall be set back from any\\nnonresidential property line a minimum of a distance equal to the height of the\\nproposed tower or wireless telecommunications facility structure plus 25% of\\nthe height of the tower or structure.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(l) \\u00A0\\u00A0\\u00A0Community Center\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Community Center shall be located with access to an arterial\\nstreet or on a street pavement wider than 30 feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The following dimensional requirements shall be applicable only to\\nthe construction of a new building:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Minimum lot area: 40,000 square feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Minimum yards: 2.25 feet of horizontal distance shall be\\nprovided for each one foot of building height measured between the nearest\\npoint of any lot line and the nearest point from which the height is measured.\\n\\u00A0\\u00A0\\u00A0(m)\\u00A0\\u00A0\\u00A0Community Garden\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Activities and structures may include greenhouses, hoop houses,\\ncold frames, sheds, water capture facilities, or other small structures for the\\nkeeping of tools and equipment, composting, and needs for the Community Garden.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Structures are subject to the requirements of the applicable\\nzoning district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Community Garden activities shall be managed to prevent\\ninfestation of insects and other pests.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0A Community Garden shall be free of rank weeds.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Composting practices provided on-site shall not include the\\nburning of materials.\\n\\u00A0\\u00A0\\u00A0(n) \\u00A0\\u00A0\\u00A0Educational Institution\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0An Educational Institution shall not be located mid-block in\\nbetween two residential districts or uses.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0An Educational Institution may be located adjacent to a\\nresidential district or use if situated at the terminus of a residential block.\\nIn this instance, screening shall be provided as required in Section\\n1120.03.\\n\\u00A0\\u00A0\\u00A0(o) \\u00A0\\u00A0\\u00A0Financial Institution\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0In the C-DT district:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A Financial Institution with Drive-Thru Facilities is\\nprohibited.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0An A TM is allowed but shall only be provided in such a manner\\nthat it is only accessible to pedestrians.\\n\\u00A0\\u00A0\\u00A0(p) \\u00A0\\u00A0\\u00A0Funeral Services\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Funeral Services site shall have a minimum frontage of 120 feet\\nand a minimum lot area of 40,000 square feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Funeral Services shall be located at least 100 feet from any\\nresidential district or use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Funeral Services including cremation or embalming shall be\\nconstructed, installed, operated, and maintained in accordance with all\\nmanufacturer\\u0027s specifications and all applicable federal, state, and local\\npermits. City inspectors shall have the right to enter and inspect the\\noperations to determine compliance with this provision.\\n\\u00A0\\u00A0\\u00A0(q) \\u00A0\\u00A0\\u00A0Hospital\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A conditional use permit is required for any associated flight\\nfacilities necessary to the Hospital\\u0027s operations.\\n\\u00A0\\u00A0\\u00A0(r) \\u00A0\\u00A0\\u00A0Indoor Commercial Amusement\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0No ancillary or accessory activities associated with an Indoor\\nCommercial Amusement shall be provided outside. Such activities shall cause an\\nIndoor Commercial Amusement use to be classified as an Outdoor Commercial\\nAmusement.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In the C-NC district, the maximum building footprint of an Indoor\\nCommercial Amusement on a lot is 10,000 square feet.\\n\\u00A0\\u00A0\\u00A0(s) \\u00A0\\u00A0\\u00A0Kennel\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Kennel shall comply with the following requirements:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0A minimum lot area of 20,000 square foot shall be provided.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The following setbacks apply:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Front: 50 feet\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Side: 40 feet\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Rear: 50 feet\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0All structures shall be located at least 200 feet from a\\nResidential district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Outside runs used for animals are prohibited, and all services\\nshall be provided within a fully enclosed building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In the C-NC district, the maximum building footprint of a Kennel\\non a lot is 10,000 square feet.\\n\\u00A0\\u00A0\\u00A0(t) \\u00A0\\u00A0\\u00A0Major Utilities and Public Service Facility\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Site Standards for Facilities\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Utility substations shall be located at least 100 feet from a\\nResidential district boundary.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The site shall access an arterial street or on a street pavement\\nwider than 30 feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0All proposed uses and facilities located within 100 feet of a\\nResidential district shall be contained within buildings or structures.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0A landscaped berm at least five feet in height shall be required\\nin all yards abutting a Residential district or street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Location of Utility Lines\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Such use shall not endanger the health and safety of residents\\nor workers in the area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The location of the use shall provide for minimal visual impact\\nand shall not impair the use of surrounding properties.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The alignment of the use shall follow the topography to minimize\\nany effects to the terrain.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0There shall be minimal vegetative clearance for soil erosion\\ncontrol.\\n\\u00A0\\u00A0\\u00A0(u) \\u00A0\\u00A0\\u00A0Microbrewery\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Microbrewery shall comply with the brewing regulations as\\nprovided in State Law.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A Microbrewery includes on-site consumption as a principal or\\nancillary use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0A Microbrewery may include other ancillary uses like food and\\nretail sales, tasting events, or private parties.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0A Microbrewery shall utilize best management practices and\\navailable technology to minimize potential adverse odors associated with the\\nuse.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0In the C-NC district and C-DT-E sub district:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The maximum building footprint of a Microbrewery on a lot is\\n10,000 square feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0A Microbrewery shall be located 150 feet from religious land\\nuses and schools.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0No outdoor storage is permitted, including parking and storage\\nof vehicles associated with the business.\\n\\u00A0\\u00A0\\u00A0(v) \\u00A0\\u00A0\\u00A0Micro Distillery\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Micro Distillery shall comply with the distilling regulations as\\nprovided in State Law.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A Micro Distillery shall comply with the regulations provided in\\nSection\\n1106.02 (u).\\n\\u00A0\\u00A0\\u00A0(w) \\u00A0\\u00A0\\u00A0Mineral Extraction\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0Mineral Extraction is subject to the following specific requirements:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A license to operate shall be obtained from the Department of\\nNatural Resources (DNR). Failure to maintain said license shall constitute\\nabandonment.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0An application for such operation shall set forth the following\\ninformation (compare to DNR requirements):\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Name of the owner or owners of land from which removal is to be\\nmade.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Name of the applicant making request for such a permit.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Name of the person or corporation conducting the actual removal\\noperation.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Location, description and size of the area from which the\\nremoval is to be made.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Type of resources or materials to be removed.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0Proposed method of removal and whether or not blasting or other\\nuse of explosives will be required.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0G. \\u00A0\\u00A0\\u00A0Description of equipment to be used.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0H. \\u00A0\\u00A0\\u00A0Anticipated ending date for extraction and the method of\\nrehabilitation and reclamation of the area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0I. \\u00A0\\u00A0\\u00A0The means that will be used to prevent the deposition of mud and\\ndebris from trucks on public streets and highways.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0J. \\u00A0\\u00A0\\u00A0The means of controlling fugitive dust from the extraction.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0K. \\u00A0\\u00A0\\u00A0Certification that all state and federal regulations can and\\nwill be met.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Mineral Extraction shall not occur within 1,000 feet of a\\nResidential District.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Mineral Extraction shall not occur within 100 feet of abutting\\nproperty or a street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0The banks of an extraction site less than five feet deep, shall be\\nsloped at a grade of not less than three feet horizontal to one foot vertical,\\nand such banks shall be surfaced with at least six inches of suitable soil and\\nseeded with a vegetative cover to prevent erosion.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Whenever the floor of an extraction site is more than five feet\\nbelow the grade of the site\\u0027s perimeter or the site contains more than three\\nfeet of water, the site shall be completely enclosed by a barrier consisting of\\na fence on not less than a six foot high mound of earth planted with suitable\\ndense planting or other suitable material sufficient in either case to prevent\\npersons from entering the site. Such mound shall be located at least 25 feet\\nfrom any street, road, highway or boundary of the quarry property.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0All quarrying, blasting, drilling or mining shall be carried out\\nin a manner and on such scale as to minimize dust, noise and vibrations and to\\nprevent adversely affecting the surrounding properties. A blasting permit shall\\nbe obtained from the Springfield Fire Division for all blasting that is done.\\n\\u00A0\\u00A0\\u00A0(x) \\u00A0\\u00A0\\u00A0Minor Utilities and Public Service Facility\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Minor Utilities and Public Service Facility shall comply with the\\nregulations provided in Section\\n1106.02 (t).\\n\\u00A0\\u00A0\\u00A0(y) \\u00A0\\u00A0\\u00A0Outdoor Commercial Amusement\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0An Outdoor Commercial Amusement use shall be located 500 feet from\\nany residential district or use.\\n\\u00A0\\u00A0\\u00A0(z) \\u00A0\\u00A0\\u00A0Pawnbroker\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Pawnbroker shall meet all local, county, state, and federal\\nrules, regulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A Pawnbroker shall comply with the regulations provided in Chapter\\n743 Pawnbrokers.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0A Pawnbroker shall be located at least 1,000 feet from another\\nPawnbroker.\\n\\u00A0\\u00A0\\u00A0(aa) \\u00A0\\u00A0\\u00A0Religious Land Use\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Religious Land Use shall be located with access to an arterial\\nstreet or on a street pavement wider than 30 feet, and follow dimensional\\nrequirements of applicable zoning district.\\n\\u00A0\\u00A0\\u00A0(bb) \\u00A0\\u00A0\\u00A0Restaurant\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0In the C-NC district the maximum building footprint of a\\nRestaurant on a lot is 10,000 square feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In the C-NC district a Restaurant with Drive-Thru Facilities is\\nprohibited if the Restaurant will abut a residential district or use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0In the C-DT district a Restaurant with Drive-Thru Facilities is\\nprohibited.\\n\\u00A0\\u00A0\\u00A0(cc)\\u00A0\\u00A0\\u00A0Retail Store\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0In the C-NC district the maximum building footprint of a Retail\\nStore on a lot is 10,000 square feet.\\n\\u00A0\\u00A0\\u00A0(dd)\\u00A0\\u00A0\\u00A0Salvage Yard\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Salvage Yard shall meet all local, county, and state rules,\\nregulations, and ordinances pertaining to the use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A Salvage Yard shall comply with the regulations provided in\\nCHAPTER\\n739 Salvage Yard Operators.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0A Salvage Yard shall be located at least 1,000 feet from a\\nresidential district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Any outdoor storage shall be conducted entirely within an enclosed\\nfence, wall or other solid screen as provided in Section\\n1120.03 .\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Solid gates shall be provided at driveway areas.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Such enclosures shall be constructed on or inside the front, side\\nand rear lot lines and shall be constructed in such a manner that no outdoor\\nstorage or salvage operations shall be visible from an adjacent property,\\nstreet or highway.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Storage, either temporary or permanent, between such fence or wall\\nand any property line is expressly prohibited.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Junk or salvage materials shall not form part of the fence, be\\npiled higher than the height of the fence, nor be placed against the fence.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0For fire protection, an unobstructed firebreak eight feet in width\\nshall be maintained around the entire Salvage Yard.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0The storage of rags, paper and similar combustible waste shall\\nnot be closer than 100 feet to any property line, unless enclosed in a masonry\\nbuilding of not less than four-hour fire resistive construction.\\n\\u00A0\\u00A0\\u00A0(ee) \\u00A0\\u00A0\\u00A0Self-Storage Facility\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Self-Storage Facility shall be secured so that access is limited\\nto tenants (or owners) and fire, police, or emergency service officials.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A Self-Storage Facility shall provide adequate drive aisles\\nbetween all buildings for vehicle circulation and fire and emergency access.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0A Self-Storage Facility unit shall not be used for the storage of\\nexplosives, ammunition, or hazardous or flammable materials.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Self-Storage Facility units shall be used solely for the purpose\\nof storage of goods and possessions and shall not be used for the operation of\\na business, hobby, band rehearsal, or any type of activity not related to the\\nstorage of personal property of the owner or tenant of the unit.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Outdoor storage may be allowed in approved on-site areas for\\nvehicles and recreational equipment.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0The Self-Storage Facility may include accessory on-site offices\\nand living quarters.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0These accessory spaces shall not exceed more than 3,000 square\\nfeet.\\n\\u00A0\\u00A0\\u00A0(ff) \\u00A0\\u00A0\\u00A0Sexually Oriented Business\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Sexually Oriented Business shall comply with the regulations\\nprovided in CHAPTER\\n707 Sexually Oriented Businesses.\\n\\u00A0\\u00A0\\u00A0(gg) \\u00A0\\u00A0\\u00A0Urban Farm\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0An Urban Farm shall comply with the regulations provided in\\nSection\\n1106.02 (m).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Any non-household animals provided on an Urban Farm shall comply\\nwith the regulations provided in CHAPTER\\n1124 - Animal Regulations.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(hh) \\u00A0\\u00A0\\u00A0Veterinarian Facility\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Outside runs used for the treatment of animals is prohibited in\\nthe C-NC district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In the R-AG district, a Veterinarian Facility may treat and house\\nnon-household animals.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0In the R-AG district, a Veterinarian Facility shall be enclosed\\nand screened as provided in Section\\n1120.03 or fenced as provided in Section\\n1120.04 (d) to restrain animals from running at large.\\nCHAPTER 1107\\nAccessory Uses and Features Standards\\n1107.01\\u00A0\\u00A0\\u00A0Purpose.\\n1107.02\\u00A0\\u00A0\\u00A0Approval Procedure\\n1107.03\\u00A0\\u00A0\\u00A0Interpretation of unidentified accessory features.\\n1107.04\\u00A0\\u00A0\\u00A0General standards for all accessory features.\\n1107.05\\u00A0\\u00A0\\u00A0Accessory feature-specific regulations.\\n\\u00A0\\n1107.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0This Chapter authorizes the establishment of accessory uses, buildings, and\\nfunctions, collectively referred to as accessory features, that are incidental\\nand customarily subordinate to principal uses. An item is \\u0022accessory\\u0022 if it is\\n\\u0022incidental and customarily subordinate\\u0022 to a principal use and complies with\\nthe standards established in this Chapter. All principal uses allowed in a\\nzoning district shall be deemed to include those accessory uses, buildings, and\\nfunctions typically associated with the use, unless specifically prohibited in\\nthis Chapter.\\n1107.02 APPROVAL PROCEDURE.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally. Any of the accessory uses identified in this Title may be\\nallowed as accessory to an authorized principal use provided that:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The proposed accessory feature is allowed in the base district\\nwhere proposed; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The proposed accessory feature is consistent with the general and\\nspecific standards for accessory uses in this Chapter.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Simultaneously with a Principal Use. Accessory features may be\\nreviewed as part of review of an associated principal use. In cases where the\\nprincipal use is subject to a Conditional Use Permit, an accessory feature may\\nonly be authorized in accordance with an approved Conditional Use Permit.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Subsequent to a Principal Use\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Unless exempted, a building permit shall be required in cases\\nwhere an accessory use or building is proposed subsequent to a principal use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In cases where the principal use is subject to a Conditional Use\\nPermit, an accessory use may only be authorized in accordance with the\\nprovisions in\\nTITLE Five - Procedural Standards.\\n1107.03 INTERPRETATION OF UNIDENTIFIED ACCESSORY FEATURES.\\n\\u00A0\\u00A0\\u00A0The Community Development Director shall evaluate applications for accessory\\nfeatures that are not identified in this Chapter on a case-by-case basis, based\\non the following standards:\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0The definition of \\u0022accessory feature\\u0022 in\\nTITLE Nine - Definitions, and the general accessory feature standards and\\nlimitations established in this Chapter;\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0The purpose and intent of the base districts in which the accessory\\nfeature is located;\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Potential adverse effects the accessory feature may have on other\\nlots, compared with other uses permitted in the district; and\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0The compatibility of the accessory feature with other uses permitted\\nin the district.\\n1107.04 GENERAL STANDARDS FOR ALL ACCESSORY FEATURES.\\n\\u00A0\\u00A0\\u00A0All accessory features shall be subject to the general standards in this\\nChapter, as well as any applicable supplemental standards in this Section and\\nall standards applicable to the associated principal use.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Size. All accessory features shall:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Be clearly subordinate in area, extent, and purpose to the\\nprincipal use or structure;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Not violate the bulk, density, parking, landscaping, or open space\\nstandards of this Zoning Code when taken together with the principal use or\\nstructure; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The floor area of any detached accessory building shall not exceed\\n50% of the floor area of the principal structure. The total combined floor area\\nof all buildings shall not exceed the maximum lot coverage for the zoning\\ndistrict in which it is located.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Function. All accessory features shall directly serve the principal\\nuse or building, and be accessory and clearly incidental to the principal use\\nor building.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Timing. Accessory features shall not be constructed or established\\nprior to the start of construction of the principal use or building. An\\naccessory feature shall not be used until the construction of the principal\\nbuilding is complete.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Height. Accessory features shall be limited to a maximum height of 15\\nfeet unless exempted from the height requirements in this Zoning Code.\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Location\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Accessory features shall be located on the same lot as the\\nprincipal use or building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Accessory features shall not be located within platted or recorded\\neasements.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Accessory buildings shall be set back at least five feet from any\\nside and 10 feet from any rear property line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Accessory buildings shall be set back at least five feet from the\\nprincipal use or building on all sides.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0A detached accessory building in a residence district closer to\\nthe front line than 80 feet shall be no closer to any of its side lot lines\\nthan ten feet. On a corner lot whose rear line is the side line of a lot in a\\nresidence district, no accessory building shall be placed closer than ten feet\\nto such rear line, nor closer than 20 feet to the street line on the side of\\nthe lot.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Miscellaneous. Any accessory building attached to a main building,\\nexcept by a breezeway or roofed passageway with open or latticed sides, shall\\ncomply in all respects with the requirements for main buildings.\\n1107.05 ACCESSORY FEATURE-SPECIFIC REGULATIONS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Accessory Dwelling Unit\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Only one Accessory Dwelling Unit is allowed on a lot.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0An Accessory Dwelling Unit shall comply with the required setbacks\\nand height requirements of the zoning district in which the unit is located.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0An Accessory Dwelling Unit must not exceed the height of the\\nprincipal dwelling.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0An Accessory Dwelling Unit must connect utilities to those of the\\nprincipal dwelling.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0The property owner must occupy the principal dwelling or Accessory\\nDwelling Unit as the owner\\u0027s permanent residence.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0An Accessory Dwelling Unit may be constructed in forms provided in\\nFigure 1107.05.1: ADU Types.\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8283.jpg]\\nFigure 1107.05.1: ADU Types\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0An Accessory Dwelling Unit must comply with the requirements\\nestablished in Table 1107.05.1: ADU Specifications.\\nTable 1107.05.1: ADU Specifications\\n                                                   ADU Type Allowed [https://\\n                                                   export.amlegal.com/media/\\nPrincipal Use on Lot                               1a44955505f9f3430318cb187ecfe0a931a8fdfMin.   Max.\\n[https://export.amlegal.com/media/                 IMAGES/0-0-0-13808.bmp]                Lot    ADU\\n1a44955505f9f3430318cb187ecfe0a931a8fdfd/          Attached                               Size   Size\\nIMAGES/0-0-0-13703.bmp]                            To        Above Detached Parking\\n                                          Detached Principal Structure\\n                                                   Dwelling\\n                                                                                          6,000  1,200\\nOne-Unit Dwelling                         Yes      Yes       Yes                          square square\\n                                                                                          feet   feet\\n                                                                                          10,000 1,000\\nTwo-Unit Dwelling                         Yes      Yes       Yes                          square square\\n                                                                                          feet   feet\\n                                                                                          5,000  800\\nTown home                                 No       No        Yes                          square square\\n                                                                                          feet   feet\\n                                                                                          12,000 900\\nThree-Unit Dwelling                       Yes      No        Yes                          square square\\n                                                                                          feet   feet\\n                                                                                          14,000 850\\nFour-Unit Dwelling                        Yes      No        Yes                          square square\\n                                                                                          feet   feet\\n                                                                                          18,000 800\\nMulti-Unit Dwelling                       Yes      No        Yes                          square square\\n                                                                                          feet   feet\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0An ADU shall be architecturally consistent with the principal\\ndwelling by having similar:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Shape and style of exterior doors and windows;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Building materials;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Paint color(s); and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Roof style.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0A Detached Accessory Dwelling Unit shall only be located in the\\nrear of a lot.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Alternative Energy System\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Solar Panels\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. General Requirements\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. A solar panel may be building-mounted or freestanding.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Solar panels must be placed so that concentrated solar\\nradiation or glare is not directed onto nearby properties or roadways.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Building-Mounted Systems\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0A building-mounted system may be mounted on the roof or wall\\nof a principal building or accessory structure (see Figure 1107.05.2: Building\\nMounted Systems).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0On pitched roof buildings, the maximum height a roof-mounted\\nsolar panel may rise is 18 inches.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0On flat roofed buildings up to 40 feet in height, the roof-\\nmounted solar panel system is limited to a maximum height of six feet above the\\nsurface of the roof.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0On flat roofed buildings over 40 feet in height, the roof-\\nmounted solar panel system is limited to 15 feet above the height of such\\nstructure.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0Roof-mounted solar energy systems are excluded from the\\ncalculation of building height.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vi. \\u00A0\\u00A0\\u00A0Wall-mounted solar panels may project up to four feet from a\\nbuilding facade and shall be integrated into the structure as an architectural\\nfeature (see Figure 1107.05.2: Building Mounted Systems).\\nFigure 1107.05.2: Building Mounted Systems\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8303.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Freestanding Systems\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0A freestanding system is prohibited in the front yard.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii.\\u00A0\\u00A0\\u00A0The maximum height of a freestanding system is ten feet in\\nresidential districts (see Figure 1107.05.3: Freestanding Systems).\\nFigure 1107.05.3: Freestanding Systems\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8324.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Co-Location\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Solar panels may be co-located on existing structures such as\\nwireless communication towers and light poles.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Solar panels may be co-located on the roof of accessory\\nstructures such as pergolas and parking lot shade structures, and may serve as\\nthe roof as such structures.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Wind Turbines\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Wind turbines may be designed as either vertical or horizontal\\naxis turbines, or designs that combine elements of the different types of\\nturbines.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Wind turbines are subject to the following height restrictions:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The maximum height of any ground-mounted wind turbine is the\\nmaximum height allowed in the district or 35 feet, whichever is less (see\\nFigure 1107.05.4: Ground-Mounted Wind Turbine Specifications). A taller height\\nmay be allowed by a conditional use permit.\\nFigure 1107.05.4: Ground-Mounted Wind Turbine Specifications\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8346.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii.\\u00A0\\u00A0\\u00A0The maximum height of any wind turbine mounted upon a\\nstructure is 15 feet above the height of such structure (see Figure 1107.05.5:\\nStructure-Mounted Wind Turbine Specifications).\\nFigure 1107.05.5: Structure-Mounted Wind Turbine Specifications\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8369.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Maximum height is the total height of the turbine system as\\nmeasured from the base of the tower to the top. For vertical axis turbines, the\\nmaximum vertical height of the turbine blades is measured as the length of a\\nprop at maximum vertical rotation.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0No portion of exposed turbine blades (vertical access wind\\nturbine) may be within 20 feet of the ground. Unexposed turbine blades\\n(horizontal access wind turbine) may be within ten feet of the ground (see\\nFigure 1107.05.4: Ground-Mounted Wind Turbine Specifications).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Ground-mounted wind turbines are permitted only in the rear\\nyard. The tower must be set back from all lot lines equal to the height of the\\nsystem. No principal buildings may be located within this area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0All wind turbines must be equipped with manual (electronic or\\nmechanical) and automatic over speed controls to limit the blade rotation speed\\nto within the design limits of the wind energy system.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0ATM\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0An A TM may be provided as a standalone item or attached to a\\nbuilding.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0An A TM attached to a building shall be located on the front or\\nside facade of a building to which it is attached.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Any standalone ATM providing drive-thru facilities shall satisfy\\nthe requirements provided in Section\\n1107.05(f).\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Cargo Containers\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Cargo containers shall not be used as the primary use of a\\nproperty.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Cargo containers 120 square feet or smaller in size may be used as\\ntemporary structures in nonresidential districts but shall not be placed in any\\nrequired front or side yard setbacks.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Cargo containers exceeding 120 square feet are allowed in\\nresidential districts only if in active use for the storage of construction\\nmaterials for ongoing permitted construction, or for a maximum period of seven\\nconsecutive days in association with the relocation of the contents of a\\nresidential structure.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Cargo containers exceeding 120 square feet:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Shall only be located in the rear yard and outside of any\\nrequired setback.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Shall not be placed in any required parking area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The combined area of the containers shall not exceed the floor\\narea of the permanent structures on the property.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0The stacking of cargo containers is prohibited in all districts\\nexcept for industrial districts.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Screening shall be provided and comply with the requirements in\\nSection\\n1120.03.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Cargo containers exceeding 120 square feet in industrial districts\\nmay be stacked two high.\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Charitable Donation Containers\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Charitable donation containers shall only be allowed in\\nnonresidential districts subject to issuance of a Zoning Certificate.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Charitable donation containers shall be subject to all applicable\\nsetback requirements of the zoning district within which it is located.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0No more than one charitable donation containers shall be permitted\\nat one time on a given lot, combined lot, development site, or complex.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0A charitable donation container shall not exceed 78 inches in\\nheight - as measured from grade level, 60 inches in width, or 60 inches in\\ndepth.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Charitable donation containers shall not be permitted on a vacant\\nlot, on a lot that contains a vacant primary building, or on a lot that\\ncontains a primary building of which a majority of the building is vacant.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Drive-Thru Facility\\nFigure 1107.05.6: Drive-Thru Facility Standards\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8393.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Any development providing a Drive-Thru Facility shall meet the\\nrequirements provided in Table 1107.05.2: Drive-Thru Facility Stacking\\nStandards. Figure 1107.05.6: Drive-Thru Facility Standards is an example of a\\nsingle Drive-Thru Facility with one point of order and one service window.\\nTable 1107.05.2: Drive-Thru Facility Stacking Standards\\n\\u00A0\\nUse        Requirement\\n           \\u2022 3 stacking spaces to each point of order;\\n           \\u2022 3 stacking spaces between the point of order and the first service window\\nRestaurant (including the position at the first service window): and\\n           \\u2022 (If applicable) 2 stacking spaces between the first service window and the\\n           second service window (including the position at the second service window)\\nAll other  \\u2022 3 stacking spaces, including the position at the service window\\nUses\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A stacking space is at least nine feet wide by 18 feet long,\\nexclusive of access driveways and parking aisles.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Stacking lanes shall be clearly marked and shall not interfere\\nwith on-site or off-site traffic circulation.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0For any Drive-Thru Facility associated with a Restaurant, stacking\\nlanes shall be accompanied with an abutting 10-foot-wide bypass lane.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Stacking areas shall not be located between the front building\\nline and the public street upon which the building fronts.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Fueling and Charging Services\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Fueling and Charging Services shall not be located within 100 feet\\nof any residential district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0At the four comers of a street intersection, Fueling and Charging\\nServices shall be restricted to two of the four comer lots to prevent the\\nproliferation of Fueling and Charging Services on all four lots.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Fueling and Charging Services may include fuel pumps, fuel pump\\nislands, electric vehicle charging facilities and equipment, freestanding\\ncanopies, liquid storage tanks, and other associated items with fueling and\\ncharging, but shall meet the requirements of this Subsection.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Any fuel pump island or other structure shall meet the zoning\\ndistrict\\u0027s applicable minimum setbacks.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0All fuels shall be transferred from underground storage tanks by\\nmeans of approved dispensing units located at least 15 feet from all property\\nlines. All dispensers shall be protected from vehicle damage by rigidly\\nmounting them in a concrete platform of at least six inches in height extending\\na minimum of 12 inches beyond the dispenser in all directions. When adequate\\nprotection is not provided by the concrete platform alone, additional\\nsafeguards shall be provided by a pipe bollard or guard rails.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Underground tanks for the storage of flammable or combustible\\nliquids shall be located at least five feet from any wall, foundation, or\\nproperty line. The top of the flammable liquid tanks shall be below the lowest\\nfloor elevation of any building within 20 feet of the tanks.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0All freestanding canopies shall be constructed with a minimum\\nvertical clearance of 15 feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0All freestanding canopies shall be set back at least 15 feet from\\nall property lines.\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Home Occupation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Home Occupation shall be operated solely within the dwelling\\nunit or an accessory building to the dwelling unit.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0One person not a resident of the premises may be employed to\\nassist in the Home Occupation.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Nothing in these provisions shall prevent persons who do not\\nreside on the premises from assisting in those aspects of a Home Occupation\\nthat are off-premises.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0A Home Occupation that occupies more than 10% of the floor area of\\na dwelling unit is subject to the provisions of the Ohio Basic Building Code.\\nFloor area shall be construed as that area of a dwelling unit bounded by the\\nexterior walls or fire walls of the dwelling unit (refer to the Ohio Basic\\nBuilding Code, as regulated in Chapter\\n1303 of Part 13--Building Code of the Codified Ordinances of Springfield).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0There shall be no external alteration of the residential\\nappearance of a dwelling. However, an entrance which provides direct access to\\nthe Home Occupation may be constructed in a wall of the dwelling that does not\\nface a street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0There shall be no direct selling or leasing of stocks of\\nmerchandise, supplies or products on premises. A person may pick up an order\\nmade by prior arrangements.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0There shall be no disturbance such as noise, vibration, electrical\\ninterference, smoke, dust, odor, heat or glare beyond the lot lines or beyond\\nthe confines of the dwelling unit.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0There shall be no outdoor display visible from outside the\\ndwelling.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0There shall be no toxic; explosive; flammable; combustible;\\ncorrosive; etiologic; or radioactive materials, used or stored on the premises,\\nexcept that which is generally used for domestic purposes.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0No more than two persons may avail themselves of the services\\nprovided by a Home Occupation at any one time. However, classes for generalized\\nor specialized private instruction for more than two but not more than 10\\nindividuals may be permitted if authorized as a conditional use by the Board of\\nZoning Appeals.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0The following uses and activities shall be prohibited:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Ambulance service;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Animal service, including a veterinarian establishment; animal\\ngrooming business; kennel; or establishment for the boarding of animals;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Appliance repair shop for large appliances such as but not\\nlimited to clothes washers and dryers; cooking ranges; refrigerators and\\nfreezers; and dishwashers;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Barber shop;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Beauty parlor, including a manicurist and cosmetologist;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0Limousine service involving more than two limousines;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0G. \\u00A0\\u00A0\\u00A0Machine shop;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0H. \\u00A0\\u00A0\\u00A0Office of a person in a healing profession;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0I. \\u00A0\\u00A0\\u00A0Painting of vehicles, trailers, or boats;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0J. \\u00A0\\u00A0\\u00A0Tattoo parlor;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0K. \\u00A0\\u00A0\\u00A0Vehicle and motorized equipment repair, including parts sales or\\ndetailing; vehicle washing; and large and small engine repair; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0L. \\u00A0\\u00A0\\u00A0Welding shop.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0A zoning certificate shall be obtained from the Community\\nDevelopment Director prior to establishing a Home Occupation. A Home Occupation\\nshall, on occasion, be subject to inspection to determine compliance with these\\nprovisions.\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Outdoor Dining\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Outdoor Dining shall be designated on an approved plan.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Outdoor Dining shall not exceed 75% of the principal building\\u0027s\\ngross floor area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Any seating must be of metal, natural stone, concrete, or brick.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0If the seating is not firmly attached to the ground or to a\\nbuilding, the seating shall be constructed so as to be able to withstand a wind\\npressure of not less than 80 miles per hour without falling over or blowing\\naway.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Seating placed in the right-of-way must of de minimis impact, and\\nbe placed so as allow a minimum unobstructed right-of-way clearance of four\\nfeet.\\n\\u00A0\\u00A0\\u00A0(j) \\u00A0\\u00A0\\u00A0Outdoor Storage\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Outdoor Storage shall be designated on an approved plan.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Outdoor Storage shall not be placed:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Within any required setbacks.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Within parking spaces, fire lanes, easements, maneuvering\\naisles, or loading areas.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0On the roof of any structure.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0To exceed the required screening height.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0At the front of any principal building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Outdoor Storage is limited to five percent of the total lot area\\nor 20% of the principal building\\u0027s gross floor area, whichever is more\\nrestrictive unless located in an Industrial district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Outdoor Storage shall be screened pursuant to Section\\n1120.03.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Outdoor Storage items shall be stored on a paved surface, and\\nassociated access and maneuvering driveways shall be constructed of a paved\\nsurface.\\n\\u00A0\\u00A0\\u00A0(k) \\u00A0\\u00A0\\u00A0Vertiport\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Vertiport shall meet all local, county, state, and federal\\nrules, regulations, and ordinances pertaining to the use, including design\\nstandards required by the FAA\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A Vertiport shall be designated and shown on an approved plan.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The Vertiport shall not be placed (see Figure 1112.05.7: Ground-\\nBased Vertiports):\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Within any required building setbacks;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Within fire lanes, easements, maneuvering aisles, customer pick-\\nup lanes, or required loading and parking spaces;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0In the front yard; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0So as to obstruct visibility or interfere with pedestrian or\\nvehicle circulation.\\nFigure 1107.05.7: Ground-Based Vertiports\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8418.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0The Vertiport is limited to 20% of the total lot area. This\\nrequirement does not apply to a Vertiport located on the roof of a building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0When located at grade in the C-LC, C-HC, P-PR, P-IE, and P-DM\\ndistricts, any goods, materials, containers, trailers, or other equipment shall\\nbe screened as required in Section\\n1120.03. Landing pads are exempt from this screening requirement.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0When a Vertiport is located on the roof of a building (see Figure\\n1107.05.8: Rooftop Vertiport):\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Any roof-mounted mechanical equipment, excluding landing pads,\\nis subject to the screening requirements provided in Section\\n1120.03; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Any additional structure, parapet wall, screening, safety\\nrailing, or other appurtenance associated with the Vertiport is subject to the\\nmaximum height requirement of the district, except a single mast up to 10 feet\\nin height for a windsock may exceed the maximum height requirement.\\nFigure 1107.05.8: Rooftop Vertiport\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8444.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0A Vertiport shall not be located within 150 feet of a residential\\ndistrict.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Parking is not required for a Vertiport.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(l) \\u00A0\\u00A0\\u00A0Walk-Up Window\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A Walk-Up Window shall be located on the front or side fa\\u003C;ade to\\nthe building to which it is attached.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A Walk-Up Window may include a temporary or permanent seating/\\nwaiting area.\\nTITLE THREE - District Standards\\nChap.\\n1108.\\u00A0\\u00A0\\u00A0General Provisions.\\nChap.\\n1109.\\u00A0\\u00A0\\u00A0Residential Districts.\\nChap.\\n1110.\\u00A0\\u00A0\\u00A0Commercial Districts.\\nChap.\\n1111.\\u00A0\\u00A0\\u00A0Industrial Districts.\\nChap.\\n1112.\\u00A0\\u00A0\\u00A0Public and Institutional Districts.\\nChap.\\n1113.\\u00A0\\u00A0\\u00A0Special Districts.\\nCHAPTER 1108\\nGeneral Provisions\\n1108.01\\u00A0\\u00A0\\u00A0Generally.\\n1108.02\\u00A0\\u00A0\\u00A0Zoning districts established.\\n\\u00A0\\n1108.01 GENERALLY.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0The use, erection, construction, reconstruction, relocation, or\\nalteration of any building, structure, or land shall comply with the\\nregulations of this Title for the zoning district in which the building,\\nstructure, or land is located.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Any use, erection, construction, reconstruction, relocation, or\\nalteration of any building, structure, or land shall comply with the City\\u0027s\\nflood plain regulations as provided in Chapter\\n971 of the Codified Ordinances.\\n1108.02 ZONING DISTRICTS ESTABLISHED.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally. The City is geographically divided into 12 zoning\\ndistricts, established in Table 1108.02.1: Comprehensive Plan-Zoning\\nConversion.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Zoning districts capture the major development categories,\\nincluding residential and nonresidential uses and development activities. Each\\nzoning district includes permitted uses and dimensional standards.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Some zoning districts have sub districts that provide additional\\nregulations to encourage the preferred development outcomes in each sub\\ndistrict.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Comprehensive Plan Congruency and Zoning Conversion. See Table\\n1108.02.1: Comprehensive Plan-Zoning Conversion to show how the former zoning\\ndistricts have been converted into the new zoning districts. Additionally,\\nTable 1108.02.1:\\nComprehensive Plan-Zoning Conversion shows the new zoning districts\\u0027\\nrelationship to the Clark County Comprehensive Plan.\\nTable 1108.02.1: Comprehensive Plan-Zoning Conversion\\nKey: Y = Zoning District\\nintends to accommodate the\\ndevelopment patterns provided  Residential                    Commerce                    Employment/Institutional\\nin a given future land use\\ncategory\\n\\u0022 - \\u0022 = Not Applicable\\nComprehensive Plan Future Land\\nUse Plan Category [https://\\nexport.amlegal.com/media/                                                           Mixed         Park\\n1a44955505f9f3430318cb187ecfe0aRural/  dSuburban Traditional  Village Down- Com-    Use   Employ- and     Indus- Insti-\\nIMAGES/0-0-0-8453.gif]         Agri-    Living   Neighborhood Center  town  mercial Low   ment    Recrea- trial  tutional\\nPrevious                       cultural Low High Low High             Core  Center  High  Center  tion           Campus\\nDistrict Applicable\\ni        District i\\n\\nResidential Districts\\nA        R-AG                  Y        - -      - -          -       -     -       - -   -       Y       -      -\\nRR-1\\nRS-5     R-LD                  -        Y --     Y -          -       -     -       - -   -       Y       -      -\\nRS-8\\nRFBH\\nRM-12    HHD                   -        - Y      - Y          -       -     -       - Y   -       Y       -      -\\nRM-20\\nRM-44\\nRM-44A\\nCommercial Districts\\nCN-1     C-NC                  -        - -      - -          Y       -     -       Y -   -       -       -      -\\nCN-2\\nCO-1     C-LC                  -        - -      - -          -       -     Y       - -   -       -       -      -\\nCC-2\\nCI-1\\nCH-1     C-HC                  -        - -      - -          -       -     Y       - -   -       -       Y      -\\nCC-2A\\nRDP\\nCB-10    C-DT                  -        - -      - -          Y       Y     -       Y Y   -       -       -      -\\nIndustrial Districts\\nM-1      I-LI                  -        - -      - -          -       -     -       - -   Y       -       Y      -\\nM-2      I-HI                  -        - -      - -          -       -     -       - -   -       -       Y      -\\nPublic and Institutional Districts\\nG        P-PR                  -        - -      - -          -       -     -       - -   -       Y       -      -\\nG        P-IE                  -        - -      - -          -       -     -       - -   -       -       -      Y\\nEC-1\\nDMC      P-DM                  -        - -      - -          -       -     -       - -   Y       -       -      Y\\nSpecial Districts\\nPD       S-PD                  Y        Y Y      Y Y          Y       Y     Y       Y Y   Y       Y       Y      Y\\nCHAPTER 1109\\nResidential Districts\\n1109.01\\u00A0\\u00A0\\u00A0\\u00A0Agriculture (R-AG) District\\n1109.02\\u00A0\\u00A0\\u00A0Low Density Residential (R-LD) District.\\n1109.03\\u00A0\\u00A0\\u00A0High Density Residential (R-HD) District.\\n\\u00A0\\n1109.01 AGRICULTURAL (R-AG) DISTRICT.\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8479.jpg]\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Purpose. The Agriculture (R-AG) district preserves large tracts of\\nundeveloped land for agricultural pursuits and provides open space or intended\\nmanaged growth areas in which agricultural uses of land continue until\\nmunicipal services are provided for intensified development. This district\\nprotects agricultural areas from the encroachment of urban and suburban\\ndevelopment. This district accommodates the characteristics of the Rural/\\nAgricultural and Park and Recreation character areas as envisioned in the Clark\\nCounty Comprehensive Plan.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Uses. Use allowances in the Agriculture (R-AG) district shall comply\\nwith those provided in Table 1104.03.1: Use Table.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Dimensional Standards. Development in the Agriculture (R-AG) district\\nshall follow the standards in Table 1109.01.1: Agriculture (R-AG) District\\nDimensional Standards.\\nTable 1109.01.1: Agriculture (R-AG) District Dimensional Standards\\nAgriculture (R-AG) District - Dimensional Standards\\nLot Requirements\\nA Lot Area (min.)                    8 acres\\nB Lot Width (min.)                   300 feet\\nC Lot Depth (min.)                   50 feet\\nD Total Lot Building Coverage (max.) N/A\\nSetback Requirements\\nE Front (min.)                       5 feet\\nF Front (max.)                       N/A\\nG Rear (min.)                        20 feet\\nAgriculture (R-AG) District - Dimensional Standards\\nH Side (min.)             5 feet\\nI Corner Side Yard (min.) 5 feet\\nBuilding Requirements\\nJ Height (min.)           N/A\\nK Heights (max.)          35 feet\\nL Transparency            N/A\\nApplicable Site Development Standards\\n\\u00A0\\n                                \\u2022 CHAPTER\\n\\u2022 CHAPTER                     1120 - Screening and\\n1115 - Dimensional              Fencing\\nRegulations Parking and Loading \\u2022 CHAPTER\\n\\u2022 CHAPTER                     1121 - Waste Management\\n1116 - Parking and Loading      \\u2022 CHAPTER\\n\\u2022 CHAPTER                     1122 - Urban Design\\n1117 - Landscaping              \\u2022 CHAPTER\\n\\u2022 CHAPTER                     1123 - Infill\\n1118 - Site Lighting            \\u2022 CHAPTER\\n\\u2022 CHAPTER                     1124 - Animal Regulations\\n1119 - Signs                    \\u2022 CHAPTER\\n                                1125 - Performance\\n                                Standards\\n1109.02 LOW DENSITY RESIDENTIAL (R-LD) DISTRICT.\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8507.jpg]\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Purpose. The Low Density Residential (R-LD) district primarily\\naccommodates low density residential development supported by parks, open\\nspace, cultural, and educational amenities. This district accounts for the\\ncharacteristics of the Suburban Living, Low Intensity, Traditional\\nNeighborhood, Low Intensity, and Park and Recreation character areas as\\nenvisioned in the Clark County Comprehensive Plan.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Uses. Use allowances in the Low Density Residential (R-LD) district\\nshall comply with those provided in Table 1104.03.1: Use Table.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Dimensional Standards. Development in the Low Density Residential (R-\\nLD) district shall follow the standards in Table 1109.02.1: Low Density\\nResidential (R-LD) District Dimensional Standards.\\nTable 1109.02.1: Low Density Residential (R-LD) District Dimensional Standards\\nLow Density Residential (R-LD) District - Dimensional Standards\\nUse/Development Type g One-Unit Dwelling Town home         Two- Unit Dwelling\\nLot Requirement\\nA Lot area (min.)      5,000 square feet 4,000 square feet 6,000 square feet\\nB Lot Width (min.)     35 feet           20 feet           45 feet\\nC Lot Depth (min.)     Not to exceed 4 times the width\\nD Total Lot Building   50%               60%               60%\\n  Coverage (max.)\\nSetback Requirements\\nE Front (min.)         20 feet           15 feet           20 feet\\nF Front (max.)         N/A               N/A               N/A\\nG Rear (min.)          10 feet           10 feet           10 feet\\nH Side (min.)          5 feet            N/A               5 feet\\nI Corner Side Yard     20 feet           15 feet           20 feet\\n  (min.)\\nBuilding Requirements\\nJ Height (min.)        N/A               N/A               N/A\\nK Height (max.)        35 feet           35 feet           35 feet\\nL Transparency         N/A               N/A               N/A\\nApplicable Site Development Standards\\n\\u2022 CHAPTER            \\u2022 CHAPTER\\n1115 - Dimensional     1120 - Screening and Fencing\\nRegulation             \\u2022 CHAPTER\\n\\u2022 CHAPTER            1121 - Waste Management\\n1116- Parking and      \\u2022 CHAPTER\\nLoading                1122 - Urban Design\\n\\u2022 CHAPTER            \\u2022 CHAPTER\\n1117 - Landscaping     1123 - Infill\\n\\u2022 CHAPTER            \\u2022 CHAPTER\\n1118 - Site Lighting   1124 - Animal Regulations\\n\\u2022 CHAPTER            \\u2022 CHAPTER\\n1119 - Signs           1125 - Performance Standards\\n\\u00A0\\n1109.03 HIGH DENSITY RESIDENTIAL (R-HD) DISTRICT.\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8536.jpg]\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Purpose. The High Density Residential (R-HD) district provides for\\nmedium-to-high density residential development with a diversified range of\\nhousing choices. This district encourages \\u0022Missing Middle Housing\\u0022 (MMH) and\\nmulti-family residential uses at appropriate scales, serving as a transition\\nbetween low-density residential areas and nonresidential nodes. The range of\\nhousing products provided in this district should be appropriately situated\\nensuring development is of scale with surrounding residential areas. Medium-\\ndensity residences are preferable along local and collector streets supported\\nby parks, open space, cultural, and educational amenities, while higher density\\nresidences are more suitable along arterial streets within close proximity to\\nnonresidential nodes and activity areas. This district accommodates the\\ncharacteristics of the Suburban Living, High Intensity, Traditional\\nNeighborhood, High Intensity, and Mixed Use, Low Intensity, and Mixed Use, High\\nIntensity character areas as envisioned in the Clark County Comprehensive Plan.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Uses. Use allowances in the High Density Residential (R-HD) district\\nshall comply with those provided in Table 1104.03.1: Use Table.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Dimensional Standards. Development in the High Density Residential\\n(R-HD) district shall follow the standards in Table 1109.03.1: High Density\\nResidential (R-HD) District Dimensional Standards.\\nTable 1109.03.1: High Density Residential (R-HD) District Dimensional Standards\\nHigh Density Residential (R-HD) District - Dimensional Standards\\nUse/           One \\u0026 Two-                Three \\u0026 Four Multi-Unit\\nDevelopment    Unit         Town home    - Unit       Dwellings   Apartments\\nType g         Dwellings                 Dwellings\\nLot Requirements\\nA Lot Area     4,000 square 3,000 square 8,000 square 10,000      15,000 square\\n  (min.)       feet         feet         feet         square feet feet\\nB Lot Width    35 feet      20 feet      45 feet      50 feet     60 feet\\n  (min.)\\nC Lot Depth    N/A\\n  (min.)\\n  Total Lot\\nD Building     60%          80%          70%          70%         80%\\n  Coverage\\n  (max.)\\nSetback Requirements\\nE Front (min.) 15 feet      15 feet      15 feet      15 feet     15 feet\\nF Front (max.) N/A          N/A          N/A          N/A         N/A\\nG Rear (min.)  10 feet      10 feet      10 feet      10 feet     10 feet\\nH Side (min.)  5 feet       N/A          5 feet       5 feet      10 feet\\nI Corner side  15 feet      15 feet      15 feet      15 feet     15 feet\\n  Yard (min.)\\nBuilding Requirements\\nJ Height       N/A          N/A          N/A          N/A         N/A\\n  (min.)\\nK Height       35 feet      35 feet      35 feet      35 feet     45 feet\\n  (max.)\\nL Transparency N/A          N/A          N/A          N/A         N/A\\nApplicable Site Development Standards\\n                                         \\u2022 CHAPTER\\n\\u2022 CHAPTER -                            1120 - Screening and Fencing\\n1115 - Dimensional Regulation            \\u2022 CHAPTER\\n\\u2022 CHAPTER                              1121 - Waste Management\\n1116- Parking and Loading                \\u2022 CHAPTER\\n\\u2022 CHAPTER                              1123 - Infill\\n1117 - Landscaping                       \\u2022 CHAPTER\\n\\u2022 CHAPTER                              1122 Urban Design\\n1118 - Site Lighting                     \\u2022 CHAPTER\\n\\u2022 CHAPTER                              1124 - Animal Regulations\\n1119 - Signs                             \\u2022 CHAPTER\\n                                         1125 - Performance Standards\\n\\u00A0\\nCHAPTER 1110\\nCommercial Districts\\n1110.01\\u00A0\\u00A0\\u00A0Neighborhood Commercial (C-NC) District.\\n1110.02\\u00A0\\u00A0\\u00A0Light Commercial Corridor (C-LC) District.\\n1110.03\\u00A0\\u00A0\\u00A0Heavy Commercial Corridor (C-HC) District.\\n1110.04\\u00A0\\u00A0\\u00A0Downtown (C-DT) District.\\n\\u00A0\\n1110.01 NEIGHBORHOOD COMMERCIAL (C-NC) DISTRICT.\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8597.jpg]\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Purpose. The Neighborhood Commercial (C-NC) district provides\\npedestrian-oriented and neighborhood-scale development offering small-scale\\nretail, service, office, and entertainment needs of nearby residential\\nneighborhoods. Stores, offices, and other businesses in this district should\\ngenerally accommodate most of the neighborhood residents within walking\\ndistance or short vehicular commute. Large-scale development and high-intensity\\nuses are not appropriate, whereas small-scale retail, service, and restaurant\\nestablishments are preferable in this district. The C-NC district may serve as\\na mixed-use transitional area between the C-DT district and lower density\\nresidential areas in a development pattern often found along town main streets\\nand in neighborhood commercial areas of older cities. This district\\naccommodates the characteristics of the Village Center and Mixed Use, Low\\nIntensity character areas as envisioned in the Clark County Comprehensive Plan.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Uses. Use allowances in the Neighborhood Commercial (C-NC) district\\nshall comply with those provided in Table 1104.03.1: Use Table.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Dimensional Standards. Development in the Neighborhood Commercial (C-\\nNC)\\ndistrict shall follow the standards in Table 1110.01.1: Neighborhood Commercial\\n(C-NC) District Dimensional Standards.\\nTable 1110.01.1: Neighborhood Commercial (C-NC) District Dimensional Standards\\nNeighborhood Commercial (C-NC) District - Dimensional Standards\\nLot Requirements\\nA Lot Area (min.)                    N/A\\nB Lot Width (min.)                   N/A\\nC Total Building Coverage (max.)     N/A\\nD Total Lot Building Coverage (max.) N/A\\nSetback Requirements\\nE Front (min.)                       20 feet\\nF Front (max.)                       N/A\\nG Rear (min.)                        N/A\\nH Side (min.)                        N/A\\nI Corner Side Yard (min.)            20 feet\\nBuilding Requirements\\nJ Height (min.)                      15 feet\\nK Height (max.)                      35 feet\\nL Transparency                       N/A\\nApplicable Site Development Standards\\n                                     \\u2022 CHAPTER\\n\\u2022 CHAPTER -                        1120 - Screening and Fencing\\n1115 - Dimensional Regulation        \\u2022 CHAPTER\\n\\u2022 CHAPTER                          1121 - Waste Management\\n1116- Parking and Loading            \\u2022 CHAPTER\\n\\u2022 CHAPTER                          1122 - Urban Design\\n1117 - Landscaping                   \\u2022 CHAPTER\\n\\u2022 CHAPTER                          1123 - Infill\\n1118 - Site Lighting                 \\u2022 CHAPTER\\n\\u2022 CHAPTER                          1124 - Animal Regulations\\n1119 - Signs                         \\u2022 CHAPTER\\n                                     1125 - Performance Standards\\n1110.02 LIGHT COMMERCIAL CORRIDOR (C-LC) DISTRICT.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Purpose. The Light Commercial Corridor (C-LC) district encourages a\\nvariety of low-to moderate intensity commercial development along high-volume\\ncorridors which serve residents and visitors on a local to citywide scale.\\nDevelopment in this district mostly gravitates towards those reliant on\\nvehicular travel, although some pedestrian-oriented development patterns may be\\nsuitable on occasion. This district accommodates the characteristics of the\\nCommercial Center character area as envisioned in the Clark County\\nComprehensive Plan.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Uses. Use allowances in the Light Commercial Corridor (C-LC) district\\nshall comply with those provided in Table 1104.03.1: Use Table.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Dimensional Standards. Development in the Light Commercial Corridor\\n(C-LC) district shall follow the standards in Table 1110.02.1: Light Commercial\\nCorridor (C-LC) District Dimensional Standards.\\nTable 1110.02.1: Light Commercial Corridor (C-LC) District Dimensional\\nStandards\\nLight Commercial Corridor (C-LC) District - Dimensional Standards\\nLot Requirements\\nA Lot Area (min.)                    N/A\\nB Lot Width (min.)                   N/A\\nC Total Depth (min.)                 N/A\\nD Total Lot Building Coverage (max.) N/A\\nSetback Requirements\\nE Front (min.)                       0 feet\\nF Front (max.)                       20\\nG Rear (min.)                        10 feet\\nH Side (min.)                        N/A\\nI Corner Side Yard (min.)            20 feet\\nBuilding Requirements\\nJ Height (min.)                      15 feet\\nK Height (max.)                      45 feet\\nL Transparency                       N/A\\nApplicable Site Development Standards\\n                                     \\u2022 CHAPTER\\n\\u2022 CHAPTER -                        1120 - Screening and Fencing\\n1115 Dimensional Regulation          \\u2022 CHAPTER\\n\\u2022 CHAPTER                          1121 - Waste Management\\n1116 - Parking and Loading           \\u2022 CHAPTER\\n\\u2022 CHAPTER                          1122 - Urban Design\\n1117 - Landscaping                   \\u2022 CHAPTER\\n\\u2022 CHAPTER                          1123 - Infill\\n1118 - Site Lighting                 \\u2022 CHAPTER\\n\\u2022 CHAPTER                          1124 - Animal Regulations\\n1119 - Signs                         \\u2022 CHAPTER\\n                                     1125 - Performance Standards\\n\\u00A0\\n1110.03 HEAVY COMMERCIAL CORRIDOR (C-HC) DISTRICT.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Purpose. The Heavy Commercial Corridor (C-HC) district provides a\\nvariety of moderate-to-high intensity commercial development along high-volume\\ncorridors which serve residents and visitors on a citywide to regional scale.\\nDevelopment in this district is reliant on those traveling by vehicle. Uses and\\nbusinesses whose operations are intensive and extensive characterized by\\noutdoor display, storage, and/or sale of merchandise, may be suitable for this\\ndistrict. This district accommodates the characteristics of the Commercial\\nCenter and Industrial character areas as envisioned in the Clark County\\nComprehensive Plan.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Uses. Use allowances in the Heavy Commercial Corridor (C-HC) district\\nshall comply with those provided in Table 1104.03.1: Use Table.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Dimensional Standards. Development in the Heavy Commercial Corridor\\n(C-HC) district shall follow the standards in Table 1110.03.1: Heavy Commercial\\nCorridor (CHC) District Dimensional Standards.\\nTable 1110.02.1: Heavy Commercial Corridor (C-HC) District Dimensional\\nStandards\\nHeavy Commercial Corridor (C-HC) District - Dimensional Standards\\nLot Requirements\\nA Lot Area (min.)                    N/A\\nB Lot Width (min.)                   N/A\\nC Total Depth (min.)                 N/A\\nD Total Lot Building Coverage (max.) N/A\\nSetback Requirements\\nE Front (min.)                       20 feet\\nF Front (max.)                       N/A\\nG Rear (min.)                        10 feet\\nH Side (min.)                        5\\nI Corner Side Yard (min.)            20 feet\\nBuilding Requirements\\nJ Height (min.)                      15 feet\\nK Height (max.)                      45 feet\\nL Transparency                       N/A\\nApplicable Site Development Standards\\n                                     \\u2022 CHAPTER\\n\\u2022 CHAPTER -                        1120 - Screening and Fencing\\n1115 Dimensional Regulation          \\u2022 CHAPTER\\n\\u2022 CHAPTER                          1121 - Waste Management\\n1116 - Parking and Loading           \\u2022 CHAPTER\\n\\u2022 CHAPTER                          1122 - Urban Design\\n1117 - Landscaping                   \\u2022 CHAPTER\\n\\u2022 CHAPTER                          1123 - Infill\\n1118 - Site Lighting                 \\u2022 CHAPTER\\n\\u2022 CHAPTER                          1124 - Animal Regulations\\n1119 - Signs                         \\u2022 CHAPTER\\n                                     1125 - Performance Standards\\n\\u00A0\\n1110.04 DOWNTOWN (C-DT) DISTRICT.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Purpose. The Downtown (C-DT) district promotes high intensity,\\ncompact, pedestrian oriented development focused on providing a mix of\\ncommercial, institutional, and\\nresidential uses within the City\\u0027s core (Downtown) and nearby areas.\\nDevelopment and redevelopment within this district should be versatile enough\\nto reduce building vacancies and abandoned lots, while increasing the\\navailability of open spaces, plazas, and amenities. This district comprises of\\ntwo mapped sub districts - Core and Edge - which have specific use allowances\\nand development regulations to ensure the preferred development outcomes. These\\ntwo sub districts have their own purposes, but generally these sub districts\\nshould:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Facilitate pedestrian-oriented, mixed-use, urban infill\\nredevelopment, providing shopping, employment, housing, and business and\\npersonal services;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Promote an efficient, compact, and walkable development pattern\\nthat encourages pedestrian activity while reducing reliance on automobiles;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Allow development flexibility in land use and site design;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Effectively regulate downtown and its surrounding areas to create\\nattractive and functional development outcomes as envisioned in the Downtown\\nCore and Village enter character areas of the Clark County Comprehensive Plan;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Revitalize the historic downtown and its surrounding areas while\\npreserving Springfield\\u0027s history and heritage; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Enhance the significance of the City\\u0027s authentic core to\\nresidents, tourists, and visitors and serve as a support and stimulus to\\nbusiness and industry.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Establishment of Sub districts. To achieve an appropriate location of\\nuses, form, and\\nscale within the C-DT district, the district shall be classified into the\\nfollowing sub districts:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Core. The Core (C-DT-C) sub district preserves and enhances the\\nexisting buildings along main thoroughfares and those properties contained\\nwithin the sub district and identified on the Zoning Map. Additionally,\\ncompatible infill and redevelopment of the area is preferred within this sub\\ndistrict. This sub district emphasizes pedestrian focused and mixed-use\\ndevelopment requiring new buildings and additions to existing buildings to be\\nconsistent with the historical form and architectural traditions of the area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Edge. The Edge (C-DT-E) sub district promotes compatible infill\\nand redevelopment of the area immediately surrounding the Core (C-DT-C) sub\\ndistrict by providing a range of low-to-moderate intensity nonresidential\\ndevelopment and varying residential transitions between the Core (C-DT-C) sub\\ndistrict and the adjacent surrounding neighborhoods. This sub district\\nemphasizes small-to-medium scale development consistent with the immediate\\nsurrounding area within the sub district.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Uses. Use allowances in the Downtown (C-DT) district shall comply\\nwith those\\nprovided in Table 1104.03.1: Use Table.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Dimensional Standards. Development in the Downtown (C-DT) district\\nshall follow the standards in Table 1110.04.1: Downtown (C-DT) District\\nDimensional Standards.\\nTable 1110.04.1: Downtown (C-DT) District Dimensional Standards\\nDowntown (C-DT) District - Dimensional Standards\\n                                     Sub District\\n                                     Core (C) Edge (E)\\nLot Requirements\\nA Lot Area (min.)                    N/A      N/A\\nB Lot Width (min.)                   N/A      N/A\\nC Lot Depth (min.)                   N/A      N/A\\nD Total Lot Building Coverage (max.) N/A      N/A\\nDowntown (C-DT) District - Dimensional Standards\\nSetback Requirements\\nE Front (min.)                       0 feet   5 feet\\nF Front (max.)                       5 feet   15 feet\\nG Rear (min.)                        0 feet   0 feet\\nH Side (min.)                        0 feet   0 feet\\nI Corner Side Yard (min.)            0 feet   5 feet\\nBuilding Requirements\\nJ Height (min.)                      30 feet  30 feet\\nK Height (max.)                      65 feet  45 feet\\nL Transparency                       Yes      Yes\\nApplicable Site Development Standards\\n\\u00A0\\n                            \\u2022 CHAPTER\\n\\u2022 CHAPTER -               1120 - Screening and Fencing\\n1115 Dimensional Regulation \\u2022 CHAPTER\\n\\u2022 CHAPTER                 1122 - Urban Design\\n1116 - Parking and Loading  \\u2022 CHAPTER\\n\\u2022 CHAPTER                 1121 - Waste Management\\n1117 - Landscaping          \\u2022 CHAPTER\\n\\u2022 CHAPTER                 1123 - Infill\\n1118 - Site Lighting        \\u2022 CHAPTER\\n\\u2022 CHAPTER                 1124 - Animal Regulations\\n1119 - Signs                \\u2022 CHAPTER\\n                            1125 - Performance Standards\\n\\u00A0\\n\\u00A0\\n\\u00A0\\n\\u00A0\\nCHAPTER 1111\\nIndustrial Districts\\n1111.01\\u00A0\\u00A0\\u00A0Light Industrial (I-LD) District.\\n1111.02\\u00A0\\u00A0\\u00A0Heavy Industrial (I-HI) District.\\n\\u00A0\\n1111.01 LIGHT INDUSTRIAL (I-LI) DISTRICT.\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8629.jpg]\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Purpose. The Light Industrial (I-LI) district provides for an\\nassortment of research facilities, employment parks, and low-intensity\\nmanufacturing and industrial uses that are clean, quiet, and free of hazardous\\nor objectionable elements such as noise, odor, dust, smoke, or glare. This\\ndistrict serves as a transition between heavy industrial uses and other less\\nintensive commercial activity and residential uses. Access to this district\\nshould be directly from an arterial or collector street and not through a\\nresidential district. This district accommodates the characteristics of the\\nIndustrial and Employment Center character areas as envisioned in the Clark\\nCounty Comprehensive Plan.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Uses. Use allowances in the Light Industrial (I-LI) district shall\\ncomply with those\\nprovided in Table 1104.03.1: Use Table.\\n\\u00A0\\u00A0\\u00A0(c)\\u00A0\\u00A0\\u00A0Dimensional Standards. Development in the Light Industrial (I-LI)\\ndistrict shall follow the standards in Table 1111.01.1: Light Industrial (I-LI)\\nDistrict Dimensional Standards.\\nTable 1111.01.1: Light Industrial (I-LI) District Dimensional Standards\\nLight Industrial (I-LI) District - Dimensional Standards\\nLot Requirements\\nA Lot Area (min.)                    20,000 square feet\\nB Lot Width (min.)                   100 feet\\nC Lot Depth (min.)                   N/A\\nD Total Lot Building Coverage (max.) N/A\\nSetback Requirements\\nE Front (min.)                       20 feet\\nLight Industrial (I-LI) District - Dimensional Standards\\nF Front (Max.)                       N/A\\nG Rear (min.)                        20 feet\\nH Side (min.)                        20 feet\\nI Corner Side Yard (min.)            20 feet\\nBuilding Requirements\\nJ Height (min.)                      15 feet\\nK Height (max.)                      45 feet\\nL Transparency                       No\\nApplicable Site Development Standards\\n\\u00A0\\n                              \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1120 - Screening and Fencing\\n1115 - Dimensional Regulation \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1121 - Waste Management\\n1116 - Parking and Loading    \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1122 - Urban Design\\n1117 - Landscaping            \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1123 - Infill\\n1118 - Site Lighting          \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1124 - Animal Regulations\\n1119 - Signs                  \\u2022 CHAPTER\\n                              1125 - Performance Standards\\n\\u00A0\\n1111.02 HEAVY INDUSTRIAL (I-HI) DISTRICT.\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8662.jpg]\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Purpose. The Heavy Industrial (I-HI) district provides areas for\\nmanufacturing, processing, assembling, storing, testing, and industrial uses\\nthat are extensive and intensive in character, and require large sites, open\\nstorage and service areas, extensive services and facilities, and access to\\nmajor transportation networks. Development in this district is sometimes\\nincompatible with less intensive uses because of traffic, noise, vibration,\\ndust, glare, or emissions, and are intrusive to commercial activity and\\nresidential areas. Access to this district should be directly from an arterial\\nor collector street and not through a residential district. This district\\naccommodates the characteristics of the Industrial character area as envisioned\\nin the Clark County Comprehensive Plan.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Uses. Use allowances in the Heavy Industrial (I-HI) district shall\\ncomply with those provided in Table 1104.03.1: Use Table.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Dimensional Standards. Development in the Heavy Industrial (I-HI)\\ndistrict shall follow the standards in Table 1111.02.1: Heavy Industrial (I-HI)\\nDistrict Dimensional Standards.\\nTable 1111.02.1: Heavy Industrial (I-HI) District Dimensional Standards\\nHeavy Industrial (I-HI) District - Dimensional Standards\\nLot Requirements\\nA Lot Area (min.)                    1 acre\\nB Lot Width (min.)                   200 feet\\nC Lot Depth (min.)                   N/A\\nD Total Lot Building Coverage (max.) N/A\\nSetback Requirements\\nE Front (min.)                       100 feet\\nF Front (Max.)                       N/A\\nG Rear (min.)                        20 feet\\nH Side (min.)                        20 feet\\nI Corner Side Yard (min.)            100 feet\\nBuilding Requirements\\nJ Height (min.)                      15 feet\\nK Height (max.)                      85 feet\\nL Transparency                       No\\nApplicable Site Development Standards\\n\\u00A0\\n                              \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1120 - Screening and Fencing\\n1115 - Dimensional Regulation \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1121 - Waste Management\\n1116 - Parking and Loading    \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1122 - Urban Design\\n1117 - Landscaping            \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1123 - Infill\\n1118 - Site Lighting          \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1124 - Animal Regulations\\n1119 - Signs                  \\u2022 CHAPTER\\n                              1125 - Performance Standards\\n\\u00A0\\n\\u00A0\\nCHAPTER 1112\\nPublic and Institutional Districts\\n1112.01\\u00A0\\u00A0\\u00A0Parks and Recreation (P-PR) District.\\n1112.02\\u00A0\\u00A0\\u00A0Institutional and Education (P-IE) District.\\n1112.03\\u00A0\\u00A0\\u00A0Downtown Medical Campus (P-DM) District.\\n\\u00A0\\n1112.01 PARKS AND RECREATION (P-PR) DISTRICT.\\n\\u00A0\\u00A0\\u00A0(a) Purpose. The Parks and Recreation (P-PR) district provides and maintains\\nland for open space and for essential public service. This district\\naccommodates the characteristics of the Park and Recreation character area as\\nenvisioned in the Clark County Comprehensive Plan.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Uses. Use allowances in the Parks and Recreation (P-PR) district\\nshall comply with those provided in Table 1104.03.1: Use Table.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Dimensional Standards. Development in the Parks and Recreation (P-PR)\\ndistrict shall follow the standards in Table 1112.01.1: Parks and Recreation\\n(P-PR) District Dimensional Standards.\\nTable 1112.01.1: Parks and Recreation (P-PR) District Dimensional Standards\\nParks and Recreation (P-PR) District - Dimensional Standards\\nLot Requirements\\nA Lot Are (min.)                     N/A\\nB Lot Width (min.)                   N/A\\nC Lot Depth (min.)                   N/A\\nD Total Lot Building Coverage (max.) N/A\\nSetback Requirements\\nE Front (min.)                       20 feet\\nF Front (max.)                       N/A\\nG Rear (min.)                        20 feet\\nH Side (min.)                        20 feet\\nI Corner Side Yard (min.)            20 feet\\nBuilding Requirements\\nJ Height (min.)                      N/A\\nK Height (max.)                      45 feet\\nL Transparency                       No\\nApplicable Site Development Standards\\n\\u00A0\\n                              \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1120 - Screening and Fencing\\n1115 - Dimensional Regulation \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1121 - Waste Management\\n1116 - Parking and Loading    \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1122 - Urban Design\\n1117 - Landscaping            \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1123 - Infill\\n1118 - Site Lighting          \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1124 - Animal Regulations\\n1119 - Signs                  \\u2022 CHAPTER\\n                              1125 - Performance Standards\\n\\u00A0\\n1112.02 INSTITUTIONAL AND EDUCATIONAL (P-IE) DISTRICT.\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8698.jpg]\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Purpose. The Institutional and Educational (P-IE) district provides\\nappropriate areas for the development of educational, religious, and\\ngovernmental facilities. This district accommodates the characteristics of the\\nInstitutional Campus character area as envisioned in the Clark County\\nComprehensive Plan.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Uses. Use allowances in the Institutional and Educational (P-IE)\\ndistrict shall comply with those provided in Table 1104.03.1: Use Table.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Dimensional Standards. Development in the Institutional and\\nEducational (P-IE) district shall follow the standards in Table 1112.02.1:\\nInstitutional and Educational (P-IE) District Dimensional Standards.\\nTable 1112.02.1: Institutional and Educational (P-IE) District Dimensional\\nStandards\\nInstitutional and Educational (P-IE) District - Dimensional Standards\\nLot Requirements\\nA Lot Are (min.)                     N/A\\nB Lot Width (min.)                   N/A\\nC Lot Depth (min.)                   N/A\\nD Total Lot Building Coverage (max.) N/A\\nSetback Requirements\\nE Front (min.)                       20 feet\\nF Front (max.)                       N/A\\nG Rear (min.)                        20 feet\\nH Side (min.)                        20 feet\\nI Corner Side Yard (min.)            20 feet\\nBuilding Requirements\\nJ Height (min.)                      N/A\\nK Height (max.)                      45 feet\\nL Transparency                       No\\nApplicable Site Development Standards\\n\\u00A0\\n                              \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1120 - Screening and Fencing\\n1115 - Dimensional Regulation \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1121 - Waste Management\\n1116 - Parking and Loading    \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1122 Urban Design\\n1117 - Landscaping            \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1123 - Infill\\n1118 - Site Lighting          \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1124 - Animal Regulations\\n1119 - Signs                  \\u2022 CHAPTER\\n                              1125 - Performance Standards\\n\\u00A0\\n1112.03 DOWNTOWN MEDICAL CAMPUS (P-DM) DISTRICT.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Purpose. The Downtown Medical Campus (P-DM) district provides\\ncentralized medical and institutional facilities and services for Springfield\\nresidents and Clark County citizens. This district may be supported by uses and\\namenities that provide convenience services and goods for patients, employees,\\nand visitors. This district accommodates the characteristics of the\\nInstitutional Campus and Employment Center character areas as envisioned in the\\nClark County Comprehensive Plan.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Uses. Use allowances in the Downtown Medical Campus (P-DM) district\\nshall comply with those provided in Table 1104.03.1: Use Table.\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Dimensional Standards. Development in the Downtown Medical Campus (P-\\nDM) district shall follow the standards in Table 1112.03.1: Downtown Medical\\nCampus (PDM) District Dimensional Standards.\\nTable 1112.03.1: Downtown Medical Campus (P-DM) District Dimensional Standards\\nDowntown Medical Campus (P-DM) District - Dimensional Standards\\nLot Requirements\\nA Lot Area (min.)                    N/A\\nB Lot Width (min.)                   N/A\\nC Lot Depth (min.)                   N/A\\nD Total Lot Building Coverage (max.) N/A\\nSetback Requirements\\nE Front (min.)                       5 feet\\nF Front (max.)                       N/A\\nG Rear (min.)                        0 feet\\nH Side (min.)                        0 feet\\nI Corner Side Yard (min.)            5 feet\\nBuilding Requirements\\nJ Height (min.)                      15 feet\\nK Height (max.)                      65 feet\\nL Transparency                       No\\nApplicable Site Development Standards\\n\\u00A0\\n                              \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1120 - Screening and Fencing\\n1115 - Dimensional Regulation \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1121 - Waste Management\\n1116 - Parking and Loading    \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1122 - Urban Design\\n1117 - Landscaping            \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1123 - Infill\\n1118 - Site Lighting          \\u2022 CHAPTER\\n\\u2022 CHAPTER                   1124 - Animal Regulations\\n1119 - Signs                  \\u2022 CHAPTER\\n                              1125 - Performance Standards\\nCHAPTER 1113\\nSpecial Districts\\n1113.01\\u00A0\\u00A0\\u00A0Planed Development (S-PD) District.\\n\\u00A0\\n1113.01 PLANNED DEVELOPMENT (S-PD) DISTRICT.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Purpose. The purpose of the Planned Development (S-PD) district is to\\nprovide for zoning and subdivision regulation of Planned Developments to allow\\nmore flexible design of single use residential, commercial, or industrial uses\\ndevelopments as well as allow modem integrated developments of mixed\\nresidential, commercial, industrial, recreational, or agricultural uses, with\\nsuch Planned Developments regulated so as to be in substantial conformity with\\nthe Clark County Comprehensive Plan adopted by the City, with the City\\u0027s\\nThoroughfare Plan, and with the purposes established in this Section, and so as\\nto not have substantially adverse effects on neighboring areas which outweigh\\nthe benefits to the community derived from the Planned Development. In\\naddition, the regulation of Planned Developments under this Section is intended\\nto further the following purposes:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0To provide flexibility in architectural design, placement, and\\nclustering of buildings, use of open space, provision of traffic circulation\\nfacilities and parking, and related site development considerations;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0To provide for the preservation and best use of existing landscape\\nfeatures and environment characteristics through development sensitive to and\\nprotective of the natural features of the PD district and the surrounding area\\nin a harmonious fashion;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0To promote efficient land use with smaller networks of utilities\\nand streets;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0To provide a more flexible zoning mechanism to facilitate\\nredeveloping older residential areas and to encourage infill development;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0To enable the creation of a more desirable environment than would\\nbe possible through the application of the regulations in the City\\u0027s\\nconventional zoning districts;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0To provide a comprehensive planning process and an integrated body\\nof regulation for zoning and subdivision control of each Planned Development;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0To provide for more usable and suitably located recreation\\nfacilities, open spaces, and other public, private, and common amenities than\\nwould otherwise be provided under conventional land use development regulation;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0To combine and coordinate architectural styles, building forms,\\nand building relationships within Planned Developments;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0To provide for appropriate land covenants, easements, and\\nfinancial assurances and securities to ensure completion of public\\nimprovements, completion of construction of Planned Development phases, long\\nterm maintenance of common areas and other amenities in Planned Developments,\\nlong term maintenance and preservation of Planned Development features intended\\nto mitigate adverse effects on neighboring areas and areas within the Planned\\nDevelopment and preservation of the attributes of the Planned Development\\nnecessary to integration of the uses permitted therein;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0To provide for the integration of diverse uses in a manner that\\nwill allow the uses to complement each other and that will promote convenience\\nof access to various uses by the community within and near the Planned\\nDevelopment;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11)\\u00A0\\u00A0\\u00A0To provide aesthetically pleasing development which will foster a\\nlivable environment in the Springfield community and which will promote the\\npublic welfare;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0To provide a flexibility in zoning and subdivision regulation\\nthat will incentivize developers to opt for pursuing a planned development\\nsubject to more comprehensive municipal regulation, even though the developer\\nmay incur increased early development costs associated with undertaking the PD\\ndistrict planning process.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Uses. Uses for each separate Planned Development (PD) District shall\\nbe established in the ordinance granting the Planned Development (PD) District.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Dimensional Standards. A Planned Development (PD) District requires a\\nminimum of 5 contiguous acres. Establishment or amendment of district shall\\nfollow Title Five - Chapter\\n1128.02.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Special Regulations\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Dimensional and development standards for each separate Planned\\nDevelopment (PD) District shall be established in the ordinance granting the\\nPlanned Development (PD) District and may include but shall not be limited to\\nuses, density, lot area, lot width, lot depth, yard depths and widths, building\\nheight, building elevations, coverage, floor area ratio, parking, access,\\nscreening, landscaping, accessory buildings, signs, lighting, management\\nassociations, and other requirements as the City Commission may deem\\nappropriate.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The Planned Development (PD) District shall conform to all other\\nsections of the ordinance and this Zoning Code unless specifically exempted in\\nthe granting ordinance.\\nTITLE FOUR - Site Development Standards\\nChap.\\n1114.\\u00A0\\u00A0\\u00A0General Provisions.\\nChap.\\n1115.\\u00A0\\u00A0\\u00A0Dimensional Regulations.\\nChap.\\n1116.\\u00A0\\u00A0\\u00A0Parking and Loading.\\nChap.\\n1117.\\u00A0\\u00A0\\u00A0Landscaping.\\nChap.\\n1118.\\u00A0\\u00A0\\u00A0Site Lighting.\\nChap.\\n1119.\\u00A0\\u00A0\\u00A0Signs.\\nChap.\\n1120.\\u00A0\\u00A0\\u00A0Screening and Fencing.\\nChap.\\n1121.\\u00A0\\u00A0\\u00A0Waste Management.\\nChap.\\n1122.\\u00A0\\u00A0\\u00A0Urban Design.\\nChap.\\n1123.\\u00A0\\u00A0\\u00A0Infill.\\nChap.\\n1124.\\u00A0\\u00A0\\u00A0Animal Regulations.\\nChap.\\n1125.\\u00A0\\u00A0\\u00A0Performance Standards.\\nCHAPTER 1114\\nGeneral Provisions\\n1114.01\\u00A0\\u00A0\\u00A0Purpose.\\n1114.02\\u00A0\\u00A0\\u00A0Organization\\n1114.03\\u00A0\\u00A0\\u00A0Applicability.\\n1114.04\\u00A0\\u00A0\\u00A0General Measurement Rules.\\n1114.05\\u00A0\\u00A0\\u00A0Alternative Compliance.\\n\\u00A0\\n1114.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0This Title establishes uniform standards for the development and improvement\\nof property throughout Springfield to ensure quality development that is\\nconsistent with the Clark County Comprehensive Plan.\\n1114.02 ORGANIZATION.\\n\\u00A0\\u00A0\\u00A0This Title is organized into the following chapters for each development\\nstandard as summarized in Table 1114.02.1: Development Standards Overview.\\nSpecific regulations and standards apply as provided in this Title.\\nTable 1114.02.1: Development Standards Overview\\nDevelopment Standard    Location Summary\\n                        CHAPTER  Addresses the various yards, setbacks, and\\nDimensional Regulations 1115 -   dimensional requirements that apply to a lot\\n                                 or development\\n                        CHAPTER  Provides for when parking and loading is\\nParking and Loading     1116-    required and how a site manages parking and\\n                                 loading accommodations\\n                        CHAPTER  Regulates the necessary landscaping\\nLandscaping             1117 -   requirements to improve the development\\n                                 aesthetic and maintain the City\\u0027s natural feel\\n                        CHAPTER  Regulates site lighting to minimize light\\nSite Lighting           1118 -   pollution while balancing the desire for\\n                                 safely lit properties\\n                        CHAPTER  Regulates the various sign types and\\nSigns                   1119 -   prescribes allowances based on zoning\\n                                 districts\\n                                 Provides regulations where more intensive\\n                        CHAPTER  development needs to buffer from less\\nScreening and Fencing   1120 -   intensive development. It also accounts for\\n                                 those instances where fencing may be applied\\n                                 to protect privacy\\n                                 Provides requirements for on-site waste\\nWaste Management        CHAPTER  management facilities to improve the\\n                        1121-    development aesthetic and mitigate potential\\n                                 nuisance complaints\\n                        CHAPTER  Provides a set of design requirements to\\nUrban Design            1122 -   retain and produce attractive Downtown\\n                                 development\\nInfill                  CHAPTER  Addresses instances where redevelopment is to\\n                        1123 -   occur on previously developed lots\\n                        CHAPTER  Provides flexible regulations that accounts\\nAnimal Regulations      1124 -   for the safekeeping of various non-household\\n                                 animals on a lot\\n                        CHAPTER  Mitigates a development\\u0027s potential to create\\nPerformance Standards   1125 -   public nuisances (smoke, odor, dust, noise,\\n                                 etc.)\\n\\u00A0\\n1114.03 APPLICABILITY.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0This Title applies to all new development, expansions, and\\nredevelopment within the city limits of Springfield unless otherwise specified.\\nEach chapter in this Title establishes when a particular standard applies.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Each application for a development plan, site plan, zoning\\ncertificate, building permit, certificate of occupancy, conditional use permit,\\nor other application shall include information as to the location, dimensions,\\nand provision of the applicable standards provided in this Title.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Any development located within the flood plain shall comply with the\\nCity\\u0027s flood plain regulations as provided in CHAPTER\\n1329 of the Codified Ordinances.\\n1114.04 GENERAL MEASUREMENT RULES.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Standards for Rounding\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0When a measurement results in a fractional number, any fraction\\nless than one-half shall be rounded down to the next whole number. Any fraction\\nof one-half or greater shall be rounded up to the next higher whole number.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0When a calculation or measurement results in a fractional\\npercentage, any percentage ending between .0 and .5 shall be rounded down to\\nthe next lower whole number. Any percentage ending in .5 or greater shall be\\nrounded up to the next higher whole number.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Distance Measurements. Unless otherwise expressly stated, all\\ndistances specified in this Zoning Code are to be measured as the length of an\\nimaginary straight line joining those points.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Separation Measurements. Where a minimum separation is required or\\nprovided between a given use or lot and a separate use, lot, or district, such\\nseparation shall be measured as the shortest distance between the lot line\\nassociated with the given use or lot and the nearest point of the separate lot\\nor district, as required, without regard to intervening buildings.\\n1114.05 ALTERNATIVE COMPLIANCE.\\n\\u00A0\\u00A0\\u00A0Any development may inquire about alternative compliance to allow for\\ndevelopment flexibility. Alternative compliance requests shall follow the\\nrequirements provided in Section\\n1130.01.\\nCHAPTER 1115\\nDimensional Regulations\\n1115.01\\u00A0\\u00A0\\u00A0Purpose.\\n1115.02\\u00A0\\u00A0\\u00A0Applicability.\\n1115.03\\u00A0\\u00A0\\u00A0Standards.\\n\\u00A0\\n1115.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0The purpose of this Chapter is to establish clear guidelines for measuring\\nand applying required lots, yards, setbacks, height, and other dimensional\\nfeatures.\\n1115.02 APPLICABILITY.\\n\\u00A0\\u00A0\\u00A0This Chapter applies to any lot, yard, setback, or height required by this\\nZoning Code within Springfield city limits.\\n1115.03 STANDARDS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Number of Buildings per Lot\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Residential Uses. Only one principal building for one-unit, two-\\nunit, three-unit, four-unit, or multi-unit dwellings with permitted accessory\\nbuildings is allowed on a lot, unless specified otherwise in this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Nonresidential and All Other Uses. Where a lot is used for\\ntownhomes, courtyard and conventional apartments, nonresidential uses, or a\\ncombination of those uses, more than one principal building may be located upon\\nthe lot, but only when conforming to all applicable requirements to those uses\\nand the zoning district in which it is located, unless specified otherwise in\\nthis Zoning Code.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Yards and Setbacks\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Every part of a required yard shall be unoccupied and\\nunobstructed by any portion of a structure from the ground upward, except as\\nprovided below.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0In measuring a setback, the shortest distance between a lot line\\nand the building applies.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0All yards abutting a street are measured from the nearest edge\\nof the right-of-way, or from the lot line, whichever provides the greater\\nsetback.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Required yard means that portion of any yard constituting the\\nminimum area required in any zoning district, but excluding that portion of the\\nyard in excess of the minimum required area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0This Zoning Code\\u0027s required lots, yards, and setbacks are\\nsummarized in Figure 1115.03.1: Lots, Yards, and Setbacks Summary.\\nFigure 1115.03.1: Lots, Yards, and Setbacks Summary\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8735.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Front Yard Regulations\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The front yard shall be open and unobstructed. Eaves and roof\\nextensions or a porch may project into the required front yard for a distance\\nnot to exceed four feet (see Figure 1115.03.2: Front Yard Projection).\\nFigure 1115.03.2: Front Yard Projection\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8771.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Where a building line has been established by an approved plat\\nthat deviates from the setback that is prescribed by this Zoning Code, the\\nrequired front yard shall comply with the building line established by that\\nplat.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Side Yard Regulations\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Every part of a required side yard shall be open and\\nunobstructed except for the ordinary projections of window sills, belt courses,\\ncornices, and other architectural features projecting not to exceed one (1)\\nfoot into the required side yard and roof eaves projecting not to exceed four\\n(4) feet into the required side yard. A fence (in accordance with Section\\n1120.04 ) may be constructed on the property line adjacent to a side yard.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Where a side property line divides a nonresidential district\\nfrom a residential district, a minimum ten (10) foot side yard is required for\\nthe nonresidential lot side adjacent to that residential district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Rear Yard Regulations. Every part of a required rear yard shall be\\nopen and unobstructed except for permitted accessory buildings and the ordinary\\nprojections of window sills, belt courses, cornices, roof overhangs, and other\\narchitectural features projecting not to exceed four feet into the required\\nrear yard. A fence (in accordance with Section\\n1120.04 ) may be constructed on the property line adjacent to a rear yard.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Lot Standards\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Lot Area\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0No lot shall be created or reduced in area, width, or depth\\nbelow the minimum requirements established in\\nTITLE Three - District Standards.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0A lot that was legally created prior to the adoption of this\\nZoning Code may be redeveloped, but any deviations from the standards provided\\nin this Zoning Code may utilize the infill standards in this Title or shall\\nrequire a variance.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The total space required for a lot is calculated by multiplying\\nthe lot\\u0027s depth by it\\u0027s width.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Lot Width\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Lot width is the distance parallel to the front property line,\\nmeasured at the front setback line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Lot width on a curving front line means the distance parallel to\\nthe tangent of the front property line at the building setback line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The lot width and the lot frontage may have different lengths on\\nan irregularly shaped lot as they are measured at different points on the lot.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Refer to Figure 1115.03.3: Lot Width Summary to clarify lot\\nwidth measurements.\\nFigure 1115.03.3: Lot Width Summary\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8808.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Lot Depth. Lot depth is the distance measured from the front\\nproperty line to the rear property line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Total Lot Building Coverage\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Total lot building coverage is the percentage of the lot that is\\noccupied by the ground area of a building and its accessory buildings.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Fences, walls, and gates are not included when calculating total\\nlot building coverage.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Building Height\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Maximum building height is measured as the vertical distance from\\nstreet grade to (see Figure 1115.03.4: Building Height Summary):\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The top of a flat roof, including structures designed with a\\ndecorative mansard roof concealing a flat roof.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The deck line of a mansard or gambrel roof.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The midpoint height between the eaves and the ridge in the case\\nof a pitched roof.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Any dormers that extend past the roofline cannot exceed the\\nmaximum building height permitted in the district, as measured from the\\nadjacent average grade, or its equivalent, to the top of the dormer.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0For the purposes of building height measurement, roof types are\\ndefined as follows:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Flat Roof. A roof that is not pitched and where the surface of\\nthe roof is generally parallel to the ground. A mono-pitched roof, also called\\na shed roof, is a single sloping roof surface, and is also considered a flat\\nroof.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Mansard or Gambrel Roof. A two-sided roof with two slopes on\\neach side. The upper slope is positioned at a shallow angle, while the lower\\nslope is steep. A gambrel roof has vertical gable ends, while a mansard roof is\\nhipped at the four comers of the building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Pitched Roof. A gable or hip roof having a slope or pitch of at\\nleast one foot rise for each four feet of horizontal distance in the direction\\nof the slope or pitch of the roof. A hipped roof is sloped in two pairs of\\ndirections compared to the one pair of direction for a gable roof.\\nFigure 1115.03.4: Building Height Summary\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8846.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Exempt Buildings from Maximum Height Requirements\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Public and semipublic or public service buildings, when\\npermitted in a district, may be erected to a height not to exceed 60 feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Churches, temples, mosques, and similar places of religious\\nassembly may be erected to a height not to exceed 75 feet if the building is\\nset back from each lot line at least one foot for each foot of additional\\nbuilding height above the height limit otherwise provided in the district in\\nwhich the building is built.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Exempt Elements from Maximum Height Requirements. Except as\\nspecifically stated in other parts of this Zoning Code, no building shall be\\nerected, converted, enlarged, reconstructed, or structurally altered to exceed\\nthe maximum allowed height hereinafter established for the district in which\\nthe building is located, except that the following elements may be constructed\\nabove such height limits:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Penthouse or roof buildings for the housing of elevators,\\nstairways, tanks, ventilating fans, or similar equipment required to operate\\nand maintain the building;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Fire or parapet walls;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Skylights, towers, steeples, and stage/screen lofts;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Flag poles, chimneys, and smokestacks;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Radio and television aerials;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0Water tanks and similar structures.\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Sight Visibility\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0These provisions apply to all new development or proposed\\nexpansions into the sight visibility triangle. However, these provisions do not\\napply to or otherwise interfere with:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The placement and maintenance of traffic control devices\\nunder governmental authority and control and public utilities;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Existing screening and fencing requirements; and iii.\\nExisting and future City, state, and federal regulations.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Obstructions are prohibited at elevations 2.5 feet above the\\naverage street grade within the sight visibility triangle. Prohibited\\nobstructions include any fence, wall, screen, billboard, sign, structure,\\nlandscaping, or any other object.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0At intersections where streets do not intersect at or near right\\nangles, the Community Development Director shall have the authority to increase\\nthe minimum sight distances required above as they deem necessary to provide\\nsafety for both vehicular and pedestrian traffic.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Street Intersections. At intersections where streets intersect at\\nor near right angles, the sight visibility triangle shall be the area formed by\\nextending the two curb lines from their point of intersection 20 feet along the\\ncurb and connecting these points with an imaginary line, creating a triangle\\n(see label A in Figure 1115.03.5: Sight Visibility Triangles).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Street and Alley Intersections. At intersections where a street\\nand alley intersect at or near right angles, the sight visibility triangle\\nshall be the area formed by extending the street curb and alley lines from\\ntheir point of intersection 10 feet along the curb and alley line, connecting\\nthese points with an imaginary line, creating a triangle (see label Bin Figure\\n1115.03.5: Sight Visibility Triangles).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Street and Driveway Intersections. At intersections where a street\\nand driveway intersect at or near right angles, the sight visibility triangle\\nshall be the area formed by extending the point of the driveway\\u0027s entry 10 feet\\nalong the street\\u0027s curb and driveway entry point, connecting these points with\\nan imaginary line, creating a triangle (see label C in Figure 1115.03.5: Sight\\nVisibility Triangles).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Alley Intersections. At intersections where alleys intersect at or\\nnear right angles, the sight visibility triangle shall be the area formed by\\nextending the two alley lines from their point of intersection 10 feet along\\nthe alley lines, connecting these points with an imaginary line, creating a\\ntriangle (see label Din Figure 1115.03.5: Sight Visibility Triangles).\\nFigure 1115.03.5: Sight Visibility Triangles\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8885.jpg]\\nCHAPTER 1116\\nParking and Loading\\n1116.01\\u00A0\\u00A0\\u00A0Purpose.\\n1116.02\\u00A0\\u00A0\\u00A0Applicability.\\n1116.03\\u00A0\\u00A0\\u00A0General requirements.\\n1116.04\\u00A0\\u00A0\\u00A0Parking measurements.\\n1116.05\\u00A0\\u00A0\\u00A0Adjustments and reductions to required parking.\\n1116.06\\u00A0\\u00A0\\u00A0Parking design.\\n1116.07\\u00A0\\u00A0\\u00A0Bicycle parking.\\n1116.08\\u00A0\\u00A0\\u00A0Special vehicle parking.\\n1116.09\\u00A0\\u00A0\\u00A0Loading.\\n\\u00A0\\n1116.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0The purposes of this Chapter are to:\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Ensure that adequate off-street parking is provided for new land uses\\nand changes in use;\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Minimize the negative environmental and development design impacts\\nthat can result from excessive parking, driveways, and drive aisles within\\nparking areas;\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Establish standards and regulations for safe and well-designed\\nparking and vehicle circulation areas that minimize conflicts between\\npedestrians and vehicles within parking areas and surrounding land uses;\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Regulate off-street parking and specify the requirements for\\nresidential off-street parking as they pertain to the appearance and the\\nhealth, safety, and welfare of the City;\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Offer flexible means of minimizing the amount of area devoted to\\nvehicle parking by allowing reductions in the number of required spaces in\\ncontext-sensitive locations;\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Ensure compliance with provisions of the Americans with Disabilities\\nAct (ADA);\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Minimize the visual impact of off-street parking areas; and\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Ensure that adequate off-street bicycle parking facilities are\\nprovided in walkable areas and promote parking that offers safe and attractive\\npedestrian routes.\\n1116.02 APPLICABILITY.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Any new building, structure, use, redeveloped site, or enlarged or\\nexpanded existing building or use, must meet this Chapter\\u0027s requirements.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Developments that require permanent parking may provide parking\\nspaces in a structure or on a hard-paved surface area.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0When a change in intensity of use of any building, structure, or area\\nmay allow for an increase in on-site parking, any increment of additional\\nrequired parking shall comply with the maximum parking ratios provided in\\naccordance with this Chapter unless an adjustment is permitted in Section\\n1116.05.\\n1116.03\\u00A0\\u00A0\\u00A0\\u00A0GENERAL REQUIREMENTS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Compliance Required\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0ADA Compliance. All ADA parking spaces and related ADA\\naccessibility features are required to be installed in accordance with the\\ncurrent edition of the ADA Standards for Accessible Design (the \\u0022ADA\\nStandards\\u0022) as published by the Department of Justice. Where discrepancies\\nexist between this Zoning Code and the ADA Standards, the ADA Standards shall\\napply. All required parking shall meet the ADA Standards.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0No building shall be erected and no existing building shall be\\nmoved onto another lot unless the requirements for off-street parking and off\\nstreet loading spaces are fulfilled. No existing building shall be altered or\\nadded to and no change shall be made in the use of a building or premises that\\nwill increase the number of parking spaces needed for the occupants, employees,\\npatrons, client, or guests, by exceeding the maximum parking ratios as provided\\nin this Chapter.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Any required parking spaces for a building or use that are\\nprovided on adjacent land, where such arrangement is permitted under this\\nZoning Code, shall be allocated to the exclusive use of such building or\\npremises during its normal hours of activity or operation and the right to such\\nexclusive use shall be officially recorded as a limitation upon such adjacent\\nland, such limitation to continue in effect as long as the requirement under\\nthis Zoning Code exists.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Maximum Parking Ratios. Required parking shall be provided within the\\nmaximum off-street parking ratios as established in Table 1104.03.1: Use Table.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Increased Maximum Parking. No existing or proposed parking shall be\\nincreased unless otherwise specified in this Chapter. Increases in parking\\nspaces may be permitted by the Board of Zoning Appeals if:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The need is clearly demonstrated to the satisfaction of the Board\\nof Zoning Appeals; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The probabilities of future changes in occupancy or attendance and\\nthe effects of parking and loading are mitigated.\\n1116.04 PARKING MEASUREMENTS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Fraction of a Space. When the calculation of the number of\\nrequired parking spaces results in a requirement of a fractional space, the\\nclosest whole number applies. If the fractional amount is less than one half\\n(\\u00BD), the next lowest whole number applies.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Square Footage (Floor Area). The gross building square footage.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Parking Specific Metrics. Table 1116.04.1: Interpretation of Parking\\nMetrics summarizes the various parking metrics used to determine required\\nparking.\\nTable 1116.04.1: Interpretation of Parking Metrics\\nMetric    Example  Interpretation\\nSquare\\nfootage   1:1,000  1 parking space for each 1,000 square feet of the building\\u2019s floor area\\n(Floor    SF       (excluding bathrooms)\\nArea)\\nDwelling  1:DU     1 parking space for each dwelling unit\\nUnit\\n          0.5:\\nBedroom   1 BRU \\u002B  0.5 parking spaces for each single bedroom apartment unit plus 1.5 parking\\nUnit      1.5:     spaces for each two bedroom apartment unit\\n          2 BRU\\nBedroom   1 \\u002B\\n(s)/      (0.75)   1 parking space plus the umber of parking spaces from calculating 0.75\\nGuestroom bedrooms times all bedrooms\\n(s)\\nAcres     1:       1 parking space for every 5 acres\\n          5 acres\\nSite      5: site  5 parking spaces for the entire site\\nBay       1: bay   1 parking space for every bay\\nPump      1:       1 parking space for every 2 pumps\\n          2 pumps\\n\\u00A0\\n1116.05 ADJUSTMENTS AND REDUCTIONS TO REQUIRED PARKING.\\n\\u00A0\\u00A0\\u00A0The following situations may count towards the maximum parking requirements:\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Availability of Public Parking\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0If a supply of public parking exists within the maximum walking\\ndistance, as specified below, and is sufficient to meet the demands of a use,\\nthen up to 50% of the public spaces provided may count towards the proposed\\nuse\\u0027 s maximum parking requirement.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The maximum walking distance is five hundred (500) feet from the\\nproposed use.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0On-street Parking\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0On-street parking consists of parking spaces located within the\\npublic right-of-way.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Each parking space that is in a public right-of-way abutting the\\nlot may count as a required parking space for the purpose of meeting the\\nrequirements in Table 1104.03.1: Use Table.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Each parking space must be on a hard-paved area abutting or within\\nthe public right-of-way. If it is in a public right-of-way, then it shall not\\nprohibit or limit access for emergency service vehicles as required by the Fire\\nMarshal.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Shared Parking. For any development containing a mix of uses or where\\nan off-site parking agreement is proposed, and where individual uses operate or\\nhave a parking demand at different peak periods, a shared parking arrangement\\nmay be permitted and count towards the allowed maximum parking requirements.\\n1116.06 PARKING DESIGN.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally. All parking and stacking spaces, driveways, and aisles\\nshall be constructed of:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Asphalt;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Concrete;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Brick/Block (Permeable) Pavers;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Grass Pavers/Porous Pavement; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Pervious Concrete.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Location\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0All required parking spaces shall be located on the same lot as\\nthe principal building, structure, or use; however, required parking spaces may\\nbe located on an adjacent lot not further than 1,500 feet from the subject\\nproperty boundary. Such off site parking arrangement may be approved by the\\nPlanning Board and shall be recorded against the land of both the subject lot\\nand lot providing the required parking spaces.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Where off-street parking (on-site parking) is required, parking\\nmay be located as provided in Table 1116.06.1: District-Specific On-Site\\nParking Location.\\nTable 1116.06.1: District-Specific On-Site Parking Location\\n\\u00A0\\n         Residential       Commercial            Industrial Public and\\nOn-Site                                                     Institutional\\nLocation R- AG R- LD R- HD C-NC C- LC C- HC C-DT I-LI I- HI P- PR P- IE P- DM\\n                                            C E\\nFront    T     T     T     T    T     T     X X  T    T     T     T     T\\nRear     T     T     T     T    T     T     T T  T    T     T     T     T\\nSide     T     T     T     T    T     T     T T  T    T     T     T     T\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Where parking is provided within a principal building, any parking\\nlocated at the first story of the building shall be located behind the floor\\narea measuring at least thirty (30) feet in depth along the street line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Where parking in the rear of a nonresidential lot or development\\nis provided, parking shall be completely obscured from street view except where\\na parking garage is provided. A parking garage may extend above the roofline of\\nthe building in which it is attached. Figure 1116.06.1: Nonresidential Rear\\nParking shows examples of rear surface parking (left graphic) and garage\\nparking (right graphic).\\nFigure 1116.06.1: Nonresidential Rear Parking\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-8966.jpg]\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Configuration\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Nonresidential Development Parking\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Construction\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0All areas, spaces, driveways, and aisles associated with\\nparking shall be configured as provided in Table 1116.06.2: Parking Area\\nConfiguration.\\nTable 1116.06.2: Parking Area Configuration\\nParking Angle g                          90 o 60 o 45 o 30 o 0 \\u00A0o\\nRequirement (ft) i\\nWidth Parallel to Aisle                  9    11.4 12.7 17.6 24\\nLength at 90                             18   20   19   15.5 9\\nMinimum One-Way Aisle Width              24   18   13   12   14\\nMinimum Two-Way Aisle Width              24   22   22   22   22\\nModule Width Parallel to:\\nSingle Row Parking                       42   38   32   27.5 23\\nDouble Row Parking                       60   58   51   43   32\\nDouble Row Parking with Single Interlock N/A  56   47.5 39.6 N/A\\nDouble Row Parking with Double Interlock N/A  54   43.5 36.2 N/A\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0All parking spaces shall be connected to an aisle, which\\nshall have the minimum width indicated in Table 1116.06.2: Parking Area\\nConfiguration.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0When different parking space configurations abut the same\\naisle, the greatest aisle width shown in Table 1116.06.2: Parking Area\\nConfiguration shall be provided.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0Parking spaces shall be designed to permit ingress and\\negress of a vehicle to and from a parking space without moving any other\\nvehicle occupying a parking space except for residential uses.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0No parking area shall be so designed in such a manner that\\nexiting a parking space would require backing into a street or alley.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vi. \\u00A0\\u00A0\\u00A0Parking areas with spaces along lot lines and alleys shall\\nbe provided with car stops or curbing so no part of a parked vehicle can extend\\nbeyond a lot line or into an alley.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vii. \\u00A0\\u00A0\\u00A0In parking areas, all parking and stacking spaces,\\ndriveways and aisles shall be pitched or curbed and drained in such a manner as\\nto prevent the flow of excess water from such areas onto adjoining property or\\ninto streets and alleys which do not have adequate drainage facilities. The\\nadequacy of drainage facilities as well as compliance with the stormwater\\nregulations of CHAPTER\\n961 of the Codified Ordinances of Springfield, Ohio, shall be determined by the\\nCity Engineer.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0viii. \\u00A0\\u00A0\\u00A0In all parking areas, parking spaces shall be visibly\\ndelineated on the surface by painted or marked stripes.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ix. \\u00A0\\u00A0\\u00A0If two or more parking areas are connected by a driveway,\\nthe parking areas shall be designed so that an aisle connected to more than 12\\nparking spaces is not used as a drive-in providing access to another parking\\narea.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0x. \\u00A0\\u00A0\\u00A0When the number of parking spaces provided exceeds 50, the\\ndeveloper shall permanently retain onsite the first quarter (1/4) inch of every\\nstorm event.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Landscaping and Screening\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Landscaping and screening may apply for certain parking\\narrangements.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0When required landscaping applies, it shall comply with\\nthose requirements provided in Section.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0When required screening applies, it shall comply with those\\nrequirements provided in Section\\n1120.03.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Other Standards. Any required off-street parking area other than\\nfor dwellings shall comply with the following conditions:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The driveways and parking spaces are smoothly graded on a\\nhard-paved surface and adequately drained;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Surface waters are not permitted to discharge over or onto\\npublic sidewalks or roadways or onto other premises;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Any associated lighting is directed away from adjacent\\nresidential areas and so arranged to prevent light pollution; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0Any parking areas using lighting may be lit one hour before\\nand after the development\\u0027s operational hours.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Residential Parking\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Construction\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Residential parking may be constructed and configured as\\nprovided in Table 1116.06.3: Residential Parking Configurations.\\nTable 1116.06.3: Residential Parking Configurations\\n\\u00A0\\nParking     Requirements                                                                    Graphic\\nStyle\\n            \\u2219  Garage is attached to the primary structure and where the garage doors are\\n            oriented to the street\\n            \\u2219  In no case shall the garage be the front-most protrusion of the front facade\\n            of the house\\n            \\u2219  The garage may be flush with the front facade of teh house or a covered    [https://export.amlegal.com/media/\\nFlush       front porch                                                                     1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n            \\u2219  The total width of the garage door (including any center column between twoIMAGES/0-0-0-9046.bmp]\\n            garage doors) shall not exceed more than 55% of the width of the facade in\\n            which the garage is placed\\n            \\u2219  A single garage door shall not exceed 16 ft in width. If two garage doors\\n            are proposed, each garage door shall not exceed 8 ft in width\\n            \\u2219  Garage doors are oriented toward the street                                [https://export.amlegal.com/media/\\nRecessed    \\u2219  Garage doors must be positioned at least 20 ft behind the front wall plane 1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n            of the house                                                                    IMAGES/0-0-0-9127.bmp]\\n            \\u2219  There is no restriction on garage door width\\n            \\u2219  Garage doors are oriented perpendicular to the front wall plane            [https://export.amlegal.com/media/\\nSide-Loaded \\u2219  Any wall of the garage must be located at least 3 ft behind the front wall 1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\n            plane of the house                                                              IMAGES/0-0-0-9209.bmp]\\nDetached                                                                                    [https://export.amlegal.com/media/\\nResidential \\u2219  Garage is placed entirely to the rear of the house                         1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nGarage                                                                                      IMAGES/0-0-0-9292.bmp]\\n            \\u2219  Garage is placed entirely to the rear of the house and is alley-accessed\\n            \\u2219 Garage doors must face the alley                                            [https://export.amlegal.com/media/\\nRear/Alley- \\u2219  The garage must either be located 4 ft from the alley right-of-way or be a 1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nLoaded      minimum of 20 ft from the alley right-of-way                                    IMAGES/0-0-0-9376.bmp]\\n            \\u2219  Where parking spaces are located between the garage and the alley, the\\n            garage must be located at least 20 ft from teh alley right-of-way\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Residential parking may be designed so that a vehicle may\\nback into a public street or alley to obtain ingress or egress.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0For one-, two-, three- and four-unit dwellings on lot\\nwidths greater than 75 feet, multiple points of access are allowed when the\\nfollowing conditions are met:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0a. \\u00A0\\u00A0\\u00A0On lots with a residential garage:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A01. \\u00A0\\u00A0\\u00A0The driveway leading to a residential garage, not to\\nexceed the maximum width allowed, except for flares adequate to access the\\ngarage (see Figure 1116.06.2: Connectors and Circular Driveways).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A02. \\u00A0\\u00A0\\u00A0A connector driveway may extend from a circular\\ndriveway to beyond the front wall of the structure. Connector driveways must\\ncomply with driveway width requirements.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0b. \\u00A0\\u00A0\\u00A0On lots without a residential garage:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A01. \\u00A0\\u00A0\\u00A0No driveway, other than a Circular driveway, may be\\nconstructed in the area between the front wall of the principal structure and\\nthe front property line (see Figure 1116.06.2: Connectors and Circular\\nDriveways).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A02. \\u00A0\\u00A0\\u00A0A connector driveway may extend from a circular\\ndriveway to beyond the front wall of the principal dwelling. Connector\\ndriveways must comply with driveway width requirements.\\nFigure 1116. 06.2: Conne ctors and Circul ar Drive ways\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-9417.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0c. \\u00A0\\u00A0\\u00A0Driveways and parking spaces can be provided as a two-track\\n\\u0022Hollywood\\u0022 design with a width of 18 inches per wheel track. Tire base of\\nvehicles parked or stored on Hollywood drive must be accommodated by the two-\\ntrack design.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Additional Location Requirements. Parking spaces, stacking\\nspaces, aisles and driveways shall be located as follows:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0a. \\u00A0\\u00A0\\u00A0Off-Street parking and stacking spaces, aisles, and\\ndriveways shall be located on the same lot as the use served except as provided\\nin Section\\n1116.05.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0b. \\u00A0\\u00A0\\u00A0Driveways and aisles in all Residential districts and in\\nall other districts abutting a Residential district, shall not be located\\ncloser than three feet to a lot line except for single-family dwellings\\n(including zero lot line and townhouse units) and duplexes.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0c. \\u00A0\\u00A0\\u00A0A parking area shall not be located closer than five feet\\nto a lot with a single-family residence or duplex in other Residential\\ndistricts.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Front Yard\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0a. \\u00A0\\u00A0\\u00A0No parking or storage space in a Residential district and\\nin the Commercial and Industrial districts within 50 feet of a Residential\\ndistrict along the same frontage shall be permitted within a front yard.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0b. \\u00A0\\u00A0\\u00A0For detached single-family dwellings in the Residential\\ndistricts, two of the required parking spaces may be provided within a front\\nyard on a regularly constructed driveway, provided not less than 50% of the\\nfront yard shall remain in open space free of impervious surface.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0c. \\u00A0\\u00A0\\u00A0For zero lot line dwellings, duplexes, and family care\\nfacilities, only two of the required parking spaces may be provided within the\\nfront yard on a regularly constructed driveway, provided not less than 50% of\\nthe front yard shall remain in open space free of impervious surface.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Rear Yard. Parking and stacking spaces, driveways and\\naisles may be located within a rear yard.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Access and Driveway Design\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Generally. These regulations are applicable in zoning districts\\nwithout access and driveway requirements specific to the zoning district. If\\nthe district specifically requires access and driveway design, those\\nrequirements control. The City Engineer may develop and implement policies\\nnecessary to control the design and construction of driveways that are\\nconsistent with this Zoning Code.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The number of driveways on a given street or access easement is\\nbased on the following:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0All development shall meet the requirements provided in Table\\n1116.06.4: Maximum Number of Driveways unless specified otherwise.\\nTable 1116.06.4: Maximum Number of Driveways\\n\\u00A0\\nLot Frontage   Max. Number of Driveways\\n\\u003C 150 feet     1 For single- family dwellings with lot frontages greater than\\n               75\\u0027, a circular driveway is allowed\\n150 - 450 feet 2\\n451-600 feet   3\\n601-750 feet   4\\n\\u003C750 feet      Determined by City Engineer\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The City Engineer may impose other access and driveway\\nrequirements as necessary based on specific site conditions.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0The minimum distance between a driveway and the intersecting\\nstreet is described in Table 1116.06.5: Driveway-Street Spacing. Figure\\n1116.06.3: Driveway-Street Spacing Graphic shows an example of driveway spacing\\nin relation to an intersecting streets.\\nTable 1116.06.5: Driveway-Street Spacing\\n\\u00A0\\nClassification of Intersecting Street Classification of Street to be Accessed\\n                                      Arterial Collector Local\\nArterial                              200 ft   150 ft    100 ft\\nCollector                             150 ft   100 ft    50 ft\\nLocal                                 100 ft   50 ft     50 ft\\nTable 1116.06.3: Driveway-Street Spacing Graphic\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-9459.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0If the required distance cannot be met due to lot size or\\nother constraint as verified by the City Engineer, the driveway shall be\\nlocated as far as possible from the intersecting street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0All driveways in a development must be separated by a\\nminimum distance equal to the width of the wider driveway.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0No curb cut may encroach on the frontage of adjacent\\nproperty without the written consent of the owner for such encroachment, except\\nwhere a joint use driveway with the adjacent property is established at the\\nrequest of both owners.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Cross Access\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Cross access shall be provided for all development with two\\nor more abutting lots that front a street except for one-, two-, three-, and\\nfour-unit dwelling developments as depicted in Figure 1116.06.4: Cross Access,\\nsubject to the following standards.\\nFigure 1116.06.4: Cross Access\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-9502.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Cross access may be provided at the front or at the back of\\na group of lots, depending on the anticipated amount of pedestrian activity for\\nthe development.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Driveway spacing shall comply with Section\\n1116.06 (c)(3).\\n1116.07 BICYCLE PARKING.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Bicycle parking is required for certain uses in the R-HD, C-NC, C-\\nLC, C-DT, P-PR, PIE, and P-DM zoning districts to encourage the use of bicycles\\nby providing secure and convenient places to park bicycles.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Required bicycle parking is designed so people of all ages and\\nabilities can access bicycle parking and securely lock their bicycle without\\ninconvenience.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Bicycle spaces are measured as the ability for a facility to store\\none bicycle. One bicycle space equals one stored bicycle.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0A bicycle parking facility shall not obstruct pedestrian traffic\\nor interfere with the use of the pedestrian area.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Required Minimums. When a development provides more than 10 on-site\\nparking spaces, minimum bicycle parking requirements shall comply with those\\nprovided in Table 1116.07.1: Minimum Bicycle Parking Ratios.\\nTable 1116.07.1: Minimum Bicycle Parking Ratios\\nDevelopment/Use                         Ratio\\nCourtyard Apartment                     1 bicycle spaces per 20 units\\nConventional Apartment                  1 bicycle spaces per 15 units\\nMixed Use Building (Main Street Mixed\\nUse Building and Vertical Mixed Use     1 bicycle space per 500 square feet\\nBuilding)\\nBar                                     1 bicycle space per 1,000 square feet\\nBrewpub                                 1 bicycle space per 1,000 square feet\\nRestaurant                              1 bicycle space per 500 square feet\\nActive and Passive Park/Recreational    2 bicycle spaces per 20,000 square feet\\nFacilities                              of lot area\\nAny nonresidential building larger than 1 bicycle space per 5,000 square feet\\n10,000 square feet\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Bicycle Facilities\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally. A bicycle facility shall:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Allow a bicycle frame and one wheel to be locked to the rack\\nwith a high-security lock;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Allow a bicycle to be securely held with its frame supported in\\nat least one place;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Be durable and securely anchored to the ground, pavement, or\\nbuilding;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Have a locking surface thin enough to allow standard u-locks to\\nbe used, but thick enough so the rack cannot be cut with bolt cutters; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Not include any elements, impediments, or features within the\\ninterior space.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Installation. A bicycle facility shall be:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Available to the public;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Located in a convenient, well-lit area that is clearly visible\\nto both a visitor to the building and a person who is on the sidewalk that\\naccess the building\\u0027s primary entrance; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Within 150 feet of:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0The primary entrance of each building, and closer than the\\nnearest vehicle parking space; or\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0At least one primary entrance of a building with multiple\\nentrances; unless an alternative location during the site plan process is\\napproved; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Outfitted to where a bicycle can be safely and securely locked.\\n1116.08 SPECIAL VEHICLE PARKING.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Special vehicles in the R-AG district may be stored on a well-\\nmaintained gravel pad in the rear yard that is a minimum of five feet from side\\nand rear yard property lines.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Except for the purpose of making local deliveries, no special vehicle\\ndesigned for the shipment of detonable materials and explosives; flammable/\\ncombustible solids, liquids or gasses; nor hazardous materials as defined by\\nthe Ohio Department of Transportation shall be parked or stored on any lot in a\\nResidential district.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Special vehicles used for commercial purposes shall not be stored in\\nany Residential district.\\n1116.09 LOADING.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Ratios. Every nonresidential development which requires the loading\\nor unloading of goods, supplies, or materials in its daily operation shall\\nprovide at least one off-street loading space for every 10,000 square feet of\\ngross floor area, so located as to avoid backing vehicles into or out of public\\nstreets to serve the premises.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Location. A loading space is:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Located within the same development as the building or use served;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Prohibited from encroaching into a sidewalk, street, or public\\nright-of-way;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Prohibited from being located between the front building line and\\nthe front property line;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Located to the rear or side of buildings and is visually\\nunobtrusive;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Setback a minimum distance of 100 feet from any adjacent\\nresidential zoning district or use unless completely enclosed by building\\nwalls, a uniformly solid wall, or any combination of the two;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Set back a minimum distance of 40 feet from any public street,\\nnearest point of intersection on any two streets or highway, or front property\\nline; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Oriented away from the street frontage.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Dimensions\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Unless otherwise specified, all off-street loading spaces shall\\nhave a minimum dimension of 12 feet by 35 feet and an overhead clearance of 15\\nfeet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0In no case shall required off-street loading spaces encroach upon\\noff-street parking spaces required by this Chapter, or on public right-of-way.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Maneuvering\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The size of delivery vehicles intending to serve the site\\ndetermines maneuvering area size.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Each maneuvering area for loading spaces must not conflict with\\nparking spaces or with the maneuvering areas for spaces.\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Design\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Each loading space must minimize conflicts with other vehicular,\\nbicycle, and pedestrian traffic.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Loading spaces shall be designed so that vehicles shall maneuver\\nentirely within the property lines of the premises and not on public right-of-\\nway.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Unenclosed off-street loading areas shall be permanently paved on\\na hard-paved surface.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Landscaping and screening requirements, provided in CHAPTER\\n1117 - Landscaping and CHAPTER\\n1120 - Screening and Fencing, apply to loading facilities and shall prevent\\ndirect views of the loading facilities and their driveways from adjacent\\nproperties and public right-of-way.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Urban Loading Standards\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Applicability\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0This Subsection applies exclusively to those properties located\\nin the C-DT district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0The regulations of Section\\n1116.09 (a)-(e) do not apply to those properties located in the C-DT district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Standards\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Loading may be provided in any right-of-way adjacent to the\\napplicable site.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Loading occurring in a street shall be restricted to the hours\\nof 8 p.m. to 8 a.m.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Loading in an alley may occur at any time of day.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0No delivery vehicle shall be loading/unloading products for more\\nthan 30 minutes at a time.\\nCHAPTER 1117\\nLandscaping\\n1117.01\\u00A0\\u00A0\\u00A0Purpose.\\n1117.02\\u00A0\\u00A0\\u00A0Applicability.\\n1117.03\\u00A0\\u00A0\\u00A0General requirements.\\n1117.04\\u00A0\\u00A0\\u00A0Nonresidential standards.\\n1117.05\\u00A0\\u00A0\\u00A0Residential standards.\\n1117.06\\u00A0\\u00A0\\u00A0Urban landscaping standards.\\n\\u00A0\\n1117.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0The purpose of this Chapter is to preserve Springfield\\u0027s character and\\nintegrate and enhance new development by promoting landscape design that:\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Reinforces the identity of the community;\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Appropriately situates new buildings in the landscape;\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Provides adequate vegetation for screening and buffering between land\\nuses;\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Provides tree canopies to reduce urban heat island effect;\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Preserves the existing native trees and other physical site values\\nwhere possible;\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Reduces stormwater runoff;\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Accounts for unique landscaping treatment in dense, urban areas;\\n\\u00A0\\u00A0\\u00A0(h) \\u00A0\\u00A0\\u00A0Soften the visual impact of paved areas, parking lots, and adjoining\\nright-of-way; and\\n\\u00A0\\u00A0\\u00A0(i) \\u00A0\\u00A0\\u00A0Identifies climate-appropriate landscape material.\\n1117.02 APPLICABILITY.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally. The Chapter applies to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0All development for new construction within Springfield\\u0027s city\\nlimits except for the exemptions listed below.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The following landscaping standards apply to all new\\nnonresidential development and to the expansion by more than twenty-five\\npercent (25%) of an existing building mass or site in any zoning district.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Exemptions. This Chapter does not apply to any property with a plan\\nor permit that\\nwas approved prior to the adoption of this Zoning Code, unless an amended plan\\nor permit is required by the requirements in the submittal checklist.\\n1117.03 GENERAL REQUIREMENTS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Installation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0All tree plantings required by this Chapter shall be installed\\nbefore occupancy or commencement of a use.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0If because of weather conditions the plantings cannot be installed\\nbefore occupancy or commencement of a use, the Community Development Director\\nmay issue a temporary zoning certificate and grant a delay of tree installation\\nuntil the seasonal calendar dates of March 15 or September 1, whichever occurs\\nfirst.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Tree installation shall then occur within 60 days after the\\ncalendar date.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Maintenance\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0It shall be the responsibility of the owner of a lot to maintain\\nand replace, if necessary, trees required by these provisions after their\\nplanting.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Any trees on the public right-of-way or on private property that\\noverhang the public right-of-way shall be maintained according to the\\nprovisions of Chapter\\n907 of the Codified Ordinances, as amended.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0All plantings shall be properly weeded, mulched, and kept free of\\ntrash and other unsightly material.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Recommended Plant Species\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The varieties and sizes of trees permitted by this code for the\\nuse indicated are specified in the list of Recommended Trees for Springfield,\\nOhio, (as provided by the City Forestry Division.).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Trees not included on the list may be used to fulfill the\\nrequirements of this chapter upon approval of the City Forestry Division.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Any development requiring more than four trees shall use at least\\ntwo or more species of trees with no more than 50% being one particular tree\\nspecies.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Planting Sizes. The following specifications shall be met at the time\\nof planting as provided in Table 1117.03.1: Planting Sizes.\\nTable 1117.03.1: Planting Sizes\\n\\u00A0\\n           Height\\nTree Type  at       Minimum Requirements at Time of Planting\\n           Maturity\\nLarge\\nDeciduous  \\u003C 45     \\u2022 Minimum trunk diameter of two (2) inches when measured six (6) inches above\\nTree       feet     established grade and show the growth capabilities, branch information and\\n(Large              crown balance that is indigenous to the particular variety\\nTree)\\nMedium\\nDeciduous  30 - 45\\nTree       feet\\n(Medium             \\u2022 Single stem\\nTree)               \\u2022 Minimum trunk diameter of two (2) inches when measured six (6) inches above\\nSmall               established grade and show the growth capabilities, branch information and\\nDeciduous  20 - 30  crown balance that is indigenous to the particular variety\\nTree       fee\\n(Medium\\nTree)\\n                    \\u2022 Minimum height of five (5) feet when measured from the planted level to the\\n                    top of the tree\\nConiferous --       \\u2022 This height may be reduced to three (3) feet when it is required to be used\\nTree                for screening purposes.\\n                    \\u2022 The needle color and branching habits shall be normal for the species and the\\n                    appearance shall be indicative of previous care in pruning and development\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Measurements and Calculations\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The required distance for the location of a tree shall mean the\\ndistance to the center of the trunk.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Where fractional numbers of trees result, the number of trees\\nrequired shall be rounded to the closest whole number. If the fractional amount\\nis one half (\\u00BD), the next lowest whole number shall be applied.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Existing trees may be used to satisfy the requirements of the tree\\nregulations, provided they meet the minimum size requirements for trees at\\ninitial planting and they are an approved tree per the list of Recommended\\nTrees for Springfield, Ohio, or are approved by the City Forestry Division.\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Locational Requirements\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0No tree shall be planted within 10 feet of a utility pole.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0At street intersections within the right-of-way or within eight\\n(8) feet of the right-of-way, trees shall not be located within 70 feet of the\\nintersection of curb lines (or pavement edge where curbs do not exist) along\\narterial streets, within 50 feet along collector streets, or within 30 feet\\nalong local streets. In instances where two different types of streets\\nintersect, the location of the tree shall be determined by the type of street\\nadjacent to the proposed tree. (City Engineer is to calculate distances.)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Trees shall be located a minimum of four (4) feet from the edge of\\nplanting area or right-of-way line.\\n\\u00A0\\u00A0\\u00A0(g) \\u00A0\\u00A0\\u00A0Tree Placement within Street Rights-of-Way\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0A tree planting permit shall be obtained from the City Forestry\\nDivision for new developments, placement and species of trees in street rights-\\nof-way as provided on construction drawings.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0No trees shall be planted where the width of the area between a\\ncurb and a sidewalk is less than four (4) feet. If no sidewalk exists, the\\nwidth between a curb and a right-of-way line shall be at least nine (9) feet.\\nTrees shall not be located within two (2) feet of a street curb or edge of\\npavement where a curb does not exist, within two (2) feet of a sidewalk, nor\\nwithin six (6) feet of a right-of-way line where a sidewalk does not exist.\\n(City Engineer is to determine how close a tree should be to the street\\npavement where a curb does not exist.)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0At the intersection of a street and a drive or at the intersection\\nof a street and an alley, trees shall not be located within 15 feet of the edge\\nof the drive or the right-of-way line of the alley.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Large and medium trees shall not be spaced closer than 30 feet\\napart nor closer than 14 feet of a building. Small trees shall not be spaced\\ncloser than 16 feet apart nor closer than eight (8) feet of a building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Trees shall be placed to avoid interference with the construction,\\nmaintenance and operation of public and private utilities and services above or\\nbelow ground as determined by the utility companies and the City Engineer.\\n\\u00A0\\u00A0\\u00A0\\n1117.04 NONRESIDENTIAL STANDARDS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally. Nonresidential development shall comply with the\\nlandscaping requirements provided in this Section and plant required\\nlandscaping accordingly before obtaining a certificate of occupancy.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Requirements\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Trees shall be placed to avoid interference with the\\nconstruction, maintenance and operation of public and private utilities and\\nservices above or below ground as determined by the utility companies and the\\nCity Engineer.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Any large and medium trees provided on-site shall not be spaced\\ncloser than 30 feet apart.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Any large and medium trees provided on-site shall not be spaced\\ncloser than 14 feet of a building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Any small trees provided on-site shall not be spaced closer than\\n16 feet apart.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Any small trees provided on-site shall not be spaced closer than\\n8 feet of a building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Required Plants in Front Yards (Adjacent to Street Rights-of-Way)\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Large trees shall be planted at a minimum ratio of one tree for\\nevery 40 feet of lot frontage.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Large trees shall be planted adjacent to street rights-of-way.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Required Plants in Rear and Side Yards\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Large, medium, or small trees shall be planted at a minimum\\nratio of one tree for every 80 feet of the yard\\u0027s length.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0This requirement may be substituted by landscaping in rear and\\nside yards that provide a continuous mix of coniferous trees mixed with small\\ntrees spaced every 50 feet of the yard\\u0027s length.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Trees shall not be spaced closer than 15 feet from an abutting\\nside and rear property lines.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Required Landscaping in Parking Lots\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Applicability\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0This Subsection applies to all on-site surface parking areas\\nwith more than 10 parking spaces. For purposes of this Subsection, multiple\\nplatted lots contained on a single site and any separate parking areas\\nconnected with drive aisles are considered a single parking area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0At least 1 medium or large tree must be planted in each\\nsurface parking area with 10 spaces or less.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0All surface parking areas of any size within any district\\nwith frontage on any portion of a street right-of-of way (not including an\\nalley) must be screened along the street edge as provided in Section\\n1120.03.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Trees utilized in parking areas shall be designated on the\\nconstruction drawings.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The varieties and sizes of trees permitted are specified in\\nthe list of Recommended Trees for Springfield, Ohio (as provided by the City\\nForestry Division). Trees not included on the list may be used to fulfill the\\nrequirements of this Chapter upon approval of the City Forestry Division.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0All trees shall be placed within planting areas of pervious\\nmaterial suitable for tree growth and separated from parking spaces, driveways\\nand aisles by a continuous curb or barrier a minimum of five inches in height\\nor a depressed planting area engineered to accept and infiltrate stormwater and\\nseparated from parking spaces, driveways and aisles by a cut curb or other\\npractice that will deter traffic from entering the planting area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0Trees shall be located so a parking space is not more than\\n50 feet from a tree.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0Tree planting areas shall have a minimum area of 120 square\\nfeet for each small tree and 160 square feet for each medium and large tree.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vi. \\u00A0\\u00A0\\u00A0All depressed area designs shall be detailed in the\\nconstruction drawings and be approved by the City Engineer.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vii. \\u00A0\\u00A0\\u00A0Figure 1117.04.1: Parking Lot Landscaping summarizes the\\nrequirements provided below of this Subsection.\\nFigure 1117.04.1: Parking Lot Landscaping\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-9546.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Perimeter Islands\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0A landscape perimeter island shall be provided along primary\\ninternal access drives.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0A landscaped perimeter island shall be a minimum of five\\nfeet wide, landscaped with shrubs installed at a rate of 30 shrubs per 100\\nlinear feet that under typical conditions can be expected to reach a height and\\nspread of three feet within three years of planting. All shrubs shall be a\\nminimum of 18 inches tall when planted. In lieu of planting a hedge, a wall at\\nleast three feet in height may be installed.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0A perimeter island may also serve as the location for a\\nsidewalk connecting the use and the street. In such case, the sidewalk shall be\\na minimum of six feet wide and the remaining planting area shall be no less\\nthan five feet wide.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0Interior Islands\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0A landscaped interior island shall be provided for every 10\\nparking spaces. Interior islands shall be distributed evenly throughout the\\nparking area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0An interior island shall be a minimum of eight feet in width\\nand be a minimum of 300 square feet in area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0All parking rows shall terminate with a landscaped interior\\nterminal island.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0No more than 30 parking spaces shall be located between\\nterminal islands.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0Interior islands may be consolidated, or intervals may be\\nexpanded to preserve existing trees.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Median Islands\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0A landscape median island shall be provided between every six\\nsingle parking rows.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0A landscape median island must be a minimum of six feet\\nwide.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0A median island may also serve as the location for a\\nsidewalk connecting parking and the use served by the parking area. The\\nsidewalk shall be a minimum of five feet wide. If trees or shrubs are planted\\nin the median, the median width shall be expanded by at least five feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0Median islands may be consolidated, or intervals may be\\nexpanded to preserve existing trees.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0Tree Coverage\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Each interior island (and terminal interior island) shall\\ninclude at least one medium or large tree.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0In no case shall there be less than one medium or large tree\\nfor every 4,000 square feet of parking area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0G. \\u00A0\\u00A0\\u00A0Landscape Border\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0When a parking area is provided within 20 feet of any street,\\na landscape border not less than four feet in width is required between the\\nparking area and the street.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The landscape border may be broken for necessary walkways,\\ndriveways, and sight distance areas.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Such landscaping shall contain a combination of trees (40\\nfeet on center) and shrubs (4 feet on center) making at least a three feet high\\nvisual barrier during the summer months, at plant maturity.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0A wall or fence can be placed in the landscape border strip\\n(see Section\\n1120.03 ), as can a berm.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0Shrubs, hedges, and other landscape-screening materials\\n(except trees) cannot exceed four feet in height.\\n1117.05 RESIDENTIAL STANDARDS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally. Applicants are required to plant the amount established in\\nTable 1117.05.1: Residential Planting Requirements per lot prior to obtaining a\\ncertificate of occupancy.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Requirements\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Trees selected from the tree list in this Section shall be planted\\non all residential lots.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0At least one of the trees must be placed in the front yard of the\\nlot.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0For all residential properties, common areas, and open space lots,\\napplicants are required to plant one tree per 40 linear feet of street\\nfrontage. Trees may be grouped or clustered to facilitate site design.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0The following minimum standards apply as established in Table\\n1117.05.1:\\n\\u00A0\\u00A0\\u00A0Residential Planting Requirements. An applicant shall choose one of three\\nplanting options. An applicant may plant the required large trees, medium\\ntrees, small trees, or an alternative combination of the three tree types\\nspecified in Table 1117.05.1: Residential Planting Requirements.\\nTable 1117.05.1: Residential Planting Requirements\\n\\u00A0\\nTree Type g       Large 1 Medium 1 Small 2 Alternative\\nZoning District i                          Combination (Large/Medium/Small)\\n                                           0/7/10\\nR-AG              2       5        8       8/0/0\\n                                           1/6/9\\n                                           0/0/3\\nR-LD              0       1        2       1/0/1\\n                                           0/2/1\\nR-HD              0       1        1       0/0/2\\n                                           1/0/0\\n                  1 = Large and medium trees shall not be located closer than\\nNotes             14 feet to a dwelling or building\\n                  2 = Small trees shall not be located closer than 8 feet to a\\n                  dwelling or building\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Existing trees with a minimum trunk diameter of six (6) inches\\nmeasured six (6) inches above established grade may be substituted for new\\ntrees at the ratio of one (1) existing tree for every two (2) new trees.\\n1117.06 URBAN LANDSCAPING STANDARDS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Applicability\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0This section applies exclusively to those properties located in\\nthe C-DT district. (2) The regulations of Sections\\n1117.04 and\\n1117.05 do not apply to those properties located in the C-DT district.\\n\\u00A0\\u00A0\\u00A0\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Standards\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Trees shall not be required along the frontage of a property.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0The front yard may be paved to match the pavement of the public\\nfrontage.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Planter boxes and hanging plants is required for development in\\nthe C-DT district unless providing a small tree for every 50 feet of linear\\nfeet along the frontage of a property.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Planter boxes shall be bottomless, flow-through boxes with native\\nplants, placed next to buildings and designed to capture runoff.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Planter boxes may be placed in courtyards or adjacent sidewalks\\nwith runoff sent to them via French drains or hidden pipes.\\nCHAPTER 1118\\nSite Lighting\\n1118.01\\u00A0\\u00A0\\u00A0Purpose.\\n1118.02\\u00A0\\u00A0\\u00A0Applicability.\\n1118.03\\u00A0\\u00A0\\u00A0Standards.\\n\\u00A0\\n1118.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0The purposes of this Chapter are to:\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Allow the use of site lighting for night-time safety, utility,\\nsecurity, productivity, enjoyment, and commerce;\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Minimize adverse off-site impacts of lighting;\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Curtail light pollution, reduce skyglow, and improve the nighttime\\nenvironment for astronomy;\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Help protect the natural environment from the adverse effects of\\nnight lighting from gas or electric sources;\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Conserve energy and resources to the greatest extent possible; and\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Encourage site lighting that is functional, aesthetically pleasing,\\nand complementary to the architectural style of buildings or settings.\\n1118.02 APPLICABILITY.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally. This Chapter applies to all site lighting within\\nSpringfield city limits. All site lighting installed after the effective date\\nof this Zoning Code shall comply with this Chapter.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Exemptions. The following are exempt from the regulations in this\\nChapter unless noted otherwise:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Public street lighting, providing that new street lighting shall\\nbe approved by the Service Department;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Temporary holiday displays;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Emergency/warning lights; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0City-owned facilities, provided these uses meet the following\\nstandards:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The luminaire angle from a lighting source that illuminates a\\nrecreational use may exceed an angle of zero degrees only to the extent\\nnecessary for lighting the use, provided that the luminaire is shielded to\\nminimize spillover to surrounding properties;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Maximum permitted illumination at the property line for a\\nrecreational use shall be two footcandles; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Site lighting for a recreational use shall be extinguished\\nwithin an hour of the event\\u0027s end.\\n1118.03 STANDARDS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0The direct or reflected light from any light fixture shall not\\ncreate a traffic hazard to operators of motor vehicles on public streets or to\\noperators of aircraft, and no colored lights may be used in such a way as to be\\nconfused or construed as street traffic or air traffic control devices.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0No blinking, flashing, or fluttering lights, or other illuminated\\ndevice that has a changing light intensity, brightness, or color, is permitted\\nin any zoning district.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0The Community Development Director may require modifications to\\nany site lighting fixture after installation upon finding that the lighting, as\\ninstalled, does not comply with these standards.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Lighting Design\\nFigure 1118.03.1: Acceptable Light Fixtures\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-9591.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0All site lighting shall meet the functional security needs of the\\nproposed land use without adversely affecting surrounding properties and the\\nnatural environment.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0All new and replacement lighting fixtures shall be full cutoff and\\ndowncast, except those light sources less than five hundred (500) lumens for\\nindividual light fixtures, one hundred fifty (150) lumens for individual lights\\nin a light string (e.g., patio lights), and three thousand (3,000) Kelvin in\\ncolor temperature are not required to be full cutoff and downcast. For examples\\nof cutoff and downcast light fixtures, refer to Figure 1118.03.1: Acceptable\\nLight Fixtures.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Light sources shall be concealed or shielded to minimize the\\npotential for glare and light pollution.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Lights that shine outward and create direct glare are prohibited.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0The amount of light trespass projected onto a residential use from\\nanother property shall not exceed 0.1 footcandles at the property line.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Lighting shall be distributed evenly to minimize extremes in\\nluminance levels.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Light types of limited spectral emission, such as low-pressure\\nsodium or mercury vapor lights, are prohibited in all areas.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Energy efficient lighting shall be used to the maximum extent\\npracticable.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Light sources in residential zoning districts shall not exceed\\nthree thousand (3,000) Kelvin in color temperature.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0Light sources in nonresidential zoning districts shall not exceed\\nfive thousand (5,000) Kelvin in color temperature.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Light fixtures used to illuminate flags, statues, or any other\\nobjects shall minimize glare beyond the illuminated object.\\nCHAPTER 1119\\nSigns\\n1119.01\\u00A0\\u00A0\\u00A0Purpose.\\n1119.02\\u00A0\\u00A0\\u00A0Applicability.\\n1119.03\\u00A0\\u00A0\\u00A0Prohibited and exempt signs.\\n1119.04\\u00A0\\u00A0\\u00A0General requirements.\\n1119.05\\u00A0\\u00A0\\u00A0Sign features.\\n1119.06\\u00A0\\u00A0\\u00A0Sign types.\\n1119.07\\u00A0\\u00A0\\u00A0On-premise signs.\\n1119.08\\u00A0\\u00A0\\u00A0Off-premise signs.\\n1119.09\\u00A0\\u00A0\\u00A0Temporary signs.\\n\\u00A0\\n1119.01 PURPOSE.\\n\\u00A0\\u00A0\\u00A0The purpose of this Chapter is to regulate signs of all types (permanent and\\ntemporary) in a manner that:\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Protects constitutional rights to free speech by providing ample\\nopportunities for expression through signs, while avoiding content-based\\ndistinctions, and providing clear approval standards;\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Protects public health and safety by:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Minimizing visual traffic hazards, distractions and obstructions\\nfor motorists, cyclists, and pedestrians, or signs causing confusion by virtue\\nof visual similarity to traffic control signs;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Reducing hazards caused by collapse, fire, collision, decay, or\\nabandonment;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Not obstructing firefighting or police surveillance; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Encouraging the upgrading, updating, or removal of signs that are\\npoorly maintained, or do not conform to this Chapter, and preventing signs that\\nare potentially dangerous due to structural deficiencies and disrepair.\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Enhances the appearance and economic value of the landscape, by\\nproviding that signs:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Do not create a nuisance to persons using the public rights-of-\\nway;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Do not constitute a nuisance to occupancy of adjacent and\\ncontiguous property by their brightness, size, height, or movement; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Are not detrimental to land or property values.\\n\\u00A0\\u00A0\\u00A0(d) \\u00A0\\u00A0\\u00A0Promotes the community\\u0027s appearance, character, quality, and business\\nclimate by encouraging signs that are attractive and functional for their\\nintended purpose, and that are in scale and harmony with the development site\\nand building(s) and with surrounding areas;\\n\\u00A0\\u00A0\\u00A0(e) \\u00A0\\u00A0\\u00A0Reduces and prevents visual clutter or potential deterioration of the\\ncommunity\\u0027s appearance and attractiveness; and\\n\\u00A0\\u00A0\\u00A0(f) \\u00A0\\u00A0\\u00A0Implements the goals and policies of the City\\u0027s adopted planning\\npolicies by establishing uniform standards and procedures to regulate the size,\\ntype, number, design, placement, illumination, timeframe for display, and\\nmaintenance of signs.\\n1119.02 APPLICABILITY.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0This Chapter applies everywhere within the Springfield city\\nlimits, except as specifically stated otherwise in this Chapter.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0This Chapter does not prohibit signs required by state or federal\\nlaw and does not authorize signs that state or federal law prohibits.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0A person shall not erect, operate, display, or otherwise use any\\nsign that this Chapter prohibits.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0A person shall not erect, operate, display, or otherwise use any\\nsign at a time, place, or manner that this Chapter prohibits.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Message Neutrality\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Content Neutrality. Despite any other provision of this Chapter,\\nno sign is subject to any limitation based on the content of its message.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Substitution Allowed. Any sign authorized in this Chapter may\\ncontain any noncommercial copy or messages instead of a commercial or another\\nnoncommercial message.\\n1119.03 PROHIBITED AND EXEMPT SIGNS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Prohibited Signs. Signs may not be located in front of the building\\nsetback line, and, unless expressly permitted, the following types of signs are\\nprohibited to the extent such signs are:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Flimsy or non-weatherproof signs, including, but not limited to,\\nsigns made of cloth or paper or insecurely mounted;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Portable, flashing, moving or revolving signs;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Searchlights, balloons, or sound attraction devices;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Signs containing wording or color combinations similar to traffic\\ncontrol signs or devices that are therefore unsafe in that they are likely to\\nconfuse motorists and pedestrians;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Back lit translucent signs integrated into or framed by any\\nawning, canopy, marquee, or mansard; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Signs, or portions of structures, awnings or fascia, neon or neon\\ntype or laser signs.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Exempt Signs. The following signs and related objects are generally\\nallowed to be\\nerected and publicly displayed at any location within the Springfield city\\nlimits, except as otherwise specifically proscribed within this Section, and a\\ncity-issued sign permit is not required to erect and display any of the\\nfollowing signs unless specifically set forth in this Section. This Section\\nshall not apply to:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Any signs and signals properly authorized by law, signs authorized\\nby statute or a state agency, and other traffic signals, public warnings, or\\nlegal notices provided that such objects are installed in a location and in a\\nmanner and condition required by federal or state statute, a state agency, or a\\nCity ordinance or authorized authority.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Nonconforming signs.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0Existing billboards.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0Signs required by governmental bodies or agencies having proper\\njurisdiction for a public purpose by law, statute, or ordinance. This also\\nincludes any signs the City Commission decides by ordinance or resolution to\\nerect within its city limits or any real property that it may own or control.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0Signs on vehicles, trailers, or equipment are exempted only to the\\nextent such signs are incidental to the primary use of the vehicle, trailer, or\\nequipment, provided that the vehicle, trailer, or equipment is in good\\nmechanical repair and is not left in one place for more than 72 hours without\\nbeing moved.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Signs erected by the City that direct vehicular or pedestrian\\ntraffic, which may display arrows, words, or other symbols to indicate\\ndirections of facilities.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Address numerals and other similar information required to be\\nmaintained by law or governmental order, rule, or regulation, provided that the\\nsize of the sign may not exceed the requirements of such law, order, rule, or\\nregulation.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Signs contained within a walled, fenced, or secured property or\\narea.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0Signs that are interior facing and not visible from public right-\\nof-way.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10) \\u00A0\\u00A0\\u00A0Signs erected by governmental bodies or agencies serving the\\npublic, that are less than 32 square feet in area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0Decorations, lights, pennants, and similar devices on public\\nproperty with permission and under the supervision of the City.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0Seasonal lights and decorations customarily displayed during\\nfederally, state, or local recognized holidays.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(13) \\u00A0\\u00A0\\u00A0Burglar/security alarms and signs that are less than eight square\\nfeet in area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(14) \\u00A0\\u00A0\\u00A0Signs in plaza or public space structures located in the City\\u0027s\\nright-of-way, that are installed and maintained by the City or a contractor\\nauthorized by the City.\\n1119.04 GENERAL REQUIREMENTS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Design and Installation\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0All signs shall be maintained in good condition at all times.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0No sign shall be located within a sight visibility triangle as\\nprovided in Section\\n1115.03 (e) unless specified otherwise.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0No sign shall violate zoning district dimensional standard, unless\\nspecified otherwise.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0No sign shall impair any motorist\\u0027s view of pedestrian or\\nvehicular traffic.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0No sign shall be related or connected in any way to sound\\nattraction devices unless specified otherwise.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Any electrical service provided to a freestanding sign shall be\\nunderground.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0All signs shall be erected and maintained so as to be safe and\\nsecure so as not to fall or cause danger to person or property nor to rot or\\ndeteriorate or be blown down by reason of weather and shall be subject to\\napplicable regulations contained or incorporated in the Code of Ordinances.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0All freestanding sign shall be placed in concrete bases or\\nfootings.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(9) \\u00A0\\u00A0\\u00A0All freestanding signs shall be landscaped around the base of the\\nsign in an area equal to three feet for each square foot of sign and base area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(10)\\u00A0\\u00A0\\u00A0All attached signs shall affix flush against the wall of the\\nbuilding, canopy, or awning, or as flush as possible while allowing the plane\\nof the face of the sign to remain perpendicular to the ground.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(11) \\u00A0\\u00A0\\u00A0All on-premise signs shall maintain a vertical clearance as\\nprovided in Section\\n1119.07 when projecting over a right-of-way, sidewalk, walkway, or driveway,\\nunless specified otherwise (see Figure 1119.04.1: Sign Vertical Clearance).\\n\\u00A0\\u00A0\\u00A0\\nFigure 1119.04.1: Sign Vertical Clearance\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-9637.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(12) \\u00A0\\u00A0\\u00A0Wherever a development is under one ownership or operated as a\\nunit with a single development, signs shall be relatively consistent and\\nsimilar in appearance and location (either on the building or on awning but not\\nboth), size, type, and style, and architectural scale.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Measurements\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Sign Area\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Sign area is measured in square feet (\\u0022sf\\u0022) and calculated as\\nthe width multiplied by the height of a single rectangle that contains all sign\\nelements, including decorative embellishments, and any internally illuminated\\nor backlit panel, fabric, or similar material not approved as an architectural\\nelement of the building.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Sign area includes cabinets, background panels, or colors that\\nare part of the sign installation and not part of the building architecture or\\nthe sign support.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Sign area measurements are as follows:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Only one side of a multi-faced sign is considered when\\ndetermining the sign area, if the faces are equal in size, the interior angle\\nformed by the faces is less than 45 degrees, and the two faces are not more\\nthan 18 inches apart.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Where two faces of a multi-faced sign are not equal in size,\\nbut the interior angle formed by the faces is less than 45 degrees and the two\\nfaces are no more than 18 inches apart, the larger sign face is used to\\ncalculate sign area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0When the interior angle formed by the faces of a multi-\\nfaced sign is greater than 45 degrees, or the faces are greater than 18 inches\\napart, all sides of the sign are considered in calculating sign area.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0For irregularly shaped signs, the sign area is calculated as\\nthe sum of the boundaries that completely contain all sign elements.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0The calculation of sign area for a single sign includes all\\nrelated sign elements on the same facade or structure. Sign elements are\\nrelated if they are all constructed in a similar manner and are located less\\nthan five feet apart.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0Additionally, to be considered a single sign, the facade on which the\\nelements of the sign are mounted can be offset by up to five feet.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vi. \\u00A0\\u00A0\\u00A0Where two or more signs are allowed on a facade, the\\nseparate sign area rectangles for each sign are added together to determine the\\ntotal amount of sign area on that building facade.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0vii. \\u00A0\\u00A0\\u00A0Area limits control the sign area per face for a sign with\\ntwo faces. viii. Where sign area is required as a percentage, the sign area is\\na continuous portion of a building facade exclusive of doors and windows,\\nconsisting of a plane surface.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Sign Height\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The sum of the height of the sign base and sign face as measured\\nfrom the ground immediately adjacent to the highest point of the sign,\\nincluding any cabinets, trim, or attachments.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Height limits include the combined height of the sign face and\\nmonument base.\\n1119.05 SIGN FEATURES.\\n\\u00A0\\u00A0\\u00A0Signs may incorporate the following features established below; however,\\nthese features shall only be allowed as established in the tables in Sections\\n1119.07 and\\n1119.08 .\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Changeable Copy\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Generally. Permanent signs may incorporate changeable copy as the\\ntables in Sections\\n1119.07 and\\n1119.08 . Figure 1119.05.1: Changeable Copy Examples shows examples of signs\\nthat incorporate changeable copies.\\nFigure 1119.05.1: Changeable Copy Examples\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-9684.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Standards. Changeable copies may be illuminated if the dimensions\\nand standards allow illumination for the sign type in that zoning district.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Illumination\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Signs may be internally or externally illuminated as provided in\\nthis Chapter and in those instances where permitted according to the tables in\\nSections\\n1119.07 and\\n1119.08.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Figure 1119.05.2: Illumination Examples shows examples of signs\\nthat incorporate illumination.\\nFigure 1119.05.2: Illumination Examples\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-9732.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(3) \\u00A0\\u00A0\\u00A0All types of artificial light sources used to illuminate a sign\\nface which are not shaded or concealed so that the light will not interfere\\nwith the vision of motorists or shine directly on residential property in any\\nresidential district, and illumination which flashes or simulates movement,\\nshall be prohibited.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(4) \\u00A0\\u00A0\\u00A0No sign may be of such intensity or brilliance as to impair the\\nvision of a motorist or to otherwise interfere with the motorist\\u0027s operation of\\na vehicle.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(5) \\u00A0\\u00A0\\u00A0No sign may be of such intensity or brilliance that it interferes\\nwith the effectiveness of an official traffic sign, device or signal.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(6) \\u00A0\\u00A0\\u00A0Illuminated signs shall be equipped with a mechanism that\\nautomatically adjusts the brightness to maintain compliance with the\\nillumination standards of this Chapter.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(7) \\u00A0\\u00A0\\u00A0Illuminated signs shall be equipped with a means to immediately\\nturn off the display or lighting if it malfunctions or poses a threat to public\\nsafety. The owner of these signs must immediately turn off the sign or lighting\\nwhen ordered to do so by the City if the sign cannot be immediately adjusted to\\ncomply with the illuminated sign standards set forth in this Chapter or it\\notherwise poses a threat to public safety.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(8) \\u00A0\\u00A0\\u00A0Illuminated signs must adhere to the following standards listed in\\nTable 1119.05.1: Sign Illuminance Standards.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Generally. Maximum Luminance Standards are measured in\\nfootcandles.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Daytime Standards. During the time between the First Sunday in\\nNovember through the Second Sunday in March the standard daytime hours are 7:30\\na.m. until 6 p.m. During the time between the Second Sunday in March through\\nthe First Sunday in November the standard daytime hours are 6 a.m. until 7:30\\np.m. (Times based on information provided by the Astronomical Application\\nDepartment of the U.S. Naval Observatory).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0Nighttime Standards. During the time between the First Sunday in\\nNovember through the Second Sunday in March the standard nighttime hours are 6\\np.m. until 7:30 a.m. During the time between the Second Sunday in March through\\nthe First Sunday in November the standard nighttime hours are 7:30 p.m. until 6\\na.m. (Times based on information provided by the Astronomical Application\\nDepartment of the U.S. Naval Observatory).\\nTable 1119.05.1: Sign Illuminance Standards\\nZoning District Maximum Footcandles\\n                Day    Night\\nR-AG\\nR-LD            28.8   2.787\\nP-PR\\nP-IE\\nR-HD            55.74  18.58\\nC-NC\\nC-LC            74.32* 18.58\\nC-HC\\nI-LI            92.9*  46.45**\\nI-HI\\nC-DT            92.9*  46.45**\\nP-DM\\nNotes           *= (55.74 in inclement weather, such as fog, rain, or snow)\\n                **= (18.58 in inclement weather, such as fog, rain, or snow)\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Digital Dynamic Display Sign Operational Regulations. Figure\\n1119.05.3: Digital Dynamic Displays shows examples of signs that incorporate\\ndigital dynamic displays.\\nFigure 1119.05.3: Digital Dynamic Displays\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-9781.jpg]\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Digital Dynamic Display Sign (Single Color). A digital dynamic\\ndisplay (single color) sign shall operate with the following standards:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Shall comply with the sign tables in Sections\\n1119.07 and\\n1119.08.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0These signs shall be operated so that the sign message remains\\nconstant for a period of at least 15 seconds before changing to another sign\\nmessage.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0These signs shall not have continual motion.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0The images and messages displayed must be static, and the\\ntransition from one static display to another must be instantaneous without any\\nspecial effects.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0There shall be no left and right flow of messages;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0No up and down scrolling or otherwise;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0No moving or flashing of images displayed on the sign; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0No cross fade with simultaneous dissolve and appearance of\\nsign messages.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Each sign shall be operated in conformance with the illumination\\nstandards in Section\\n1119.05(b).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0A digital dynamic display single color sign shall use automatic\\nlevel controls to reduce light levels at night and under cloudy and other\\ndarkened conditions, in accordance with the following:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0A digital dynamic display sign shall have installed equipment\\nthat will automatically adjust luminance based on time of day in order to be\\ncompliant with this Chapter.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0These signs shall be equipped with a means to immediately\\nturn off the display or lighting if it malfunctions or poses a threat to public\\nsafety, such as fails or ceases to operate in its usual or normal programmed\\nmanner, causing motion, movement, flashing or any similar effects.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Signs shall be immediately turned off when ordered to do so\\nby the City when the City has determined that the sign does not comply with the\\nillumination standards set forth in this Chapter or it otherwise poses a threat\\nto public safety, if the sign cannot be immediately adjusted to comply with the\\nillumination standards set forth in this Chapter and cease to pose a threat to\\npublic safety. A malfunctioning sign or a sign not in compliance with these\\noperational standards shall remain turned off until it is restored to operate\\nin conformity to the requirements of this Chapter.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Digital Dynamic Display Sign (Multi-Color). A digital dynamic\\ndisplay multi-color sign shall operate with the following standards:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0All of the standards provided in Section\\n1119.05(c)(l)A-E.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Image transition timing requirements shall comply with Table\\n1119.05.2: Transition Standards.\\nTable 1119.05.2: Transition Standards\\n\\u00A0\\nZoning District Transition Time\\nR-AG\\nR-LD            Not applicable\\nP-PR\\nP-IE\\nR-HD\\nC-NC\\nC-LC\\nC-HC            15 seconds\\nC-DT\\nI-LI\\nI-HI\\nP-DM\\n                All signs shall be operated so that the sign message remains\\nNotes           static for a period of the assigned time before changing to\\n                another sign message\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0A digital dynamic display multi-color sign shall use automatic\\nlevel controls to reduce light levels at night and under cloudy and other\\ndarkened conditions as required in Section\\n1119.05 (c)(l)F.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0The following standards apply:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Longitudinal Location. A digital dynamic display multi-color\\nsign shall not be erected in locations that already place high demands upon\\ndriver attention, such as intersections, interchange entry and exit points,\\nchannelization features, close proximity to traffic control devices (including\\nofficial route markings and directional signing), highway structures (bridges,\\nviaducts, overpasses), and other roadway features which require a high level of\\nattention to the driving task (by way of example, sharp curves, land drops,\\n\\u0022weaving\\u0022 areas, areas of reduced sight distance).\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Spacing and Density. This Subsection refers to the number of\\ndigital dynamic display signs that are located within a specified linear\\ndistance adjacent to the roadside areas, and how these signs affect highway\\ntraffic safety and successful delivery of informational messages to motorists.\\nAn approaching driver shall not be able to see two or more digital dynamic\\ndisplay multi-color signs within their field of view at the same time. Each\\nzoning district may have a different potential detection distance that defines\\nthe distance of a driver\\u0027s field of vision. Table 1119.05.3: Detection Distance\\nRequirements the lists the applicable detection distance for each zoning\\ndistrict.\\nTable 1119.05.3: Detection Distance Requirements\\n\\u00A0\\nZoning District Detection Distance\\nR-AG\\nR-LD            400 feet \\u002B\\nP-PR\\nP-IE\\nR-HD            800 feet \\u002B\\nC-NC\\nC-LC            1,000 feet \\u002B\\nC-HC\\nI-LI            1,000 feet \\u002B\\nI-HI\\nC-DT            300 feet \\u002B\\nP-DM\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Lateral Location. In determining conditions to impose on\\nthe distance that digital dynamic display multi-color signs are set back from\\nthe highway, measured in distance from the edge of the main traveled way or the\\nangle of a digital dynamic display multi-color sign on which the messages are\\ndisplayed relative to the line of sight of motorists on the adjacent highway.\\nDigital dynamic display multi-color signs shall be located and angled so as to\\nreduce the need for a driver to turn their head to read them as they.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0Interaction with Traffic Signs. Digital dynamic display\\nmulti-color signs shall be located so as not to be detrimentally affect the\\neffectiveness of official traffic control devices. Digital dynamic display\\nmulti-color signs shall not be erected in locations that distract drivers from\\nor prevent drivers from seeing traffic control information (i.e. road markings,\\ntraffic signs and traffic signals) in roadway settings where drivers must make\\ndecision and take actions.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0v. \\u00A0\\u00A0\\u00A0Compatibility with Ambient Environment. Digital dynamic\\ndisplay multicolor signs shall not be located where they will create a harsh\\nvisual contrast with the ambient environment where they will not be harmonious\\nand appropriate in appearance with the existing or intended character of the\\ngeneral vicinity or where they will change the essential character of the area.\\n1119.06 SIGN TYPES.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Purpose\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0This Chapter establishes the required standards for signs\\naccording to the following sign classification system as provided in Table\\n1119.06.1: Sign Classification Summary.\\nTable 1119.06.1: Sign Classification Summary\\n                 Applicable i                           Previous i\\nSign Category    Sign Subcategory   Sign Type           Sign Type\\n                                                        Foundation Monument\\n                                    Monument            Sign Monolith Monument\\n                 Freestanding Signs                     Sign\\n                                    Pole Sign           Traditional Monument\\n                                                        Sign\\n                                    Wall Sign           Fascia Sign\\n                                    Attached Awning/    Awning Sign Canopy\\n                                    Canopy Sign         Sign\\nOn-Premise Signs Attached Signs     Projecting Sign     Projecting Sign\\n                                    Hanging Sign\\n                                    Window Sign         Window Sign\\n                                    Freestanding Canopy\\n                                    Sign\\n                                    General Incidental  Directional Sign Flag\\n                 Incidental Signs   Sign                Integral Sign Swinging\\n                                                        Sign\\n                                    Speaker Board\\n                                    Billboard           Billboard\\nOff-Premise Signs1                  Subdivision Entry   Development Sign\\n                                    Sign3\\n                                    Bench Billboard     Bench Billboard\\n                                                        Temporary Signs\\n                                                        Construction Sign\\n                                                        Real Estate Sign\\nTemporary Signs                     Temporary Signs     Yard Sale Sign\\n                                                        Portable Sign\\n                                                        Trailer Sign\\n                                                        Banner\\n                                                        Balloon\\n                 1 Off-Premise signs are treated as accessory uses and require\\n                 a conditional use permit as approved by the BZA.\\nNotes            2 Digital dynamic displays are sign features which may\\n                 subject to conditional use permit review by the BZA.\\n                 3 Subdivision Entry Signs are to be treated as permitted\\n                 accessory uses not requiring conditional use permit.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0This classification system provides flexibility for persons,\\nbusinesses, and entities who display signs, avoids sign distinctions that\\ndepend on a sign\\u0027s message, supports the communities\\u0027 aesthetic goals, and\\navoids potential traffic hazards and clutter.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Signs Allowed by District. Signs are generally allowed by zoning\\ndistrict as provided in Table 1119.06.2: Sign Type Allowance Summary. For more\\nspecific allowances and standards for a given sign type, refer to Sections\\n1119.07\\u00A0\\n1119.08 and\\n1119.09. Sign requirements as stated by this Chapter are applicable to any land\\nzoned Planned Development District (S-PD). Establishment or amendment of\\nrequirements shall follow Chapter\\n1128.02 and Chapter\\n1113.01.\\nTable 1119.06.2: Sign Type Allowance Summary\\n                            Y= sign allowed\\n                            X = sign not allowed\\nKey g                       NR = sign allowed for nonresidential uses only\\n                            \\u201C-\\u201C = the standard does not apply\\n                            C = sign allowed by Conditional Use Permit\\n                            R-AG           C-HC\\nDistrict g                  R-LD R-HD C-LC I-LI C-DT Code Location\\nRequirement i               P-PR C-NC      I-HI P-DM\\n                            P-IE\\nOn-Premise Signs (see Section 1119.07)\\nFreestanding Signs\\nMonument Sign               NR   NR   Y    Y    Y    Section\\n                                                     1119.07(b)(1)\\nPole Sign                   X    NR   Y    Y    Y    Section\\n                                                     1119.07(b)(2)\\nAttached Signs\\nWall Sign                   NR   NR   Y    Y    Y    Section\\n                                                     1119.07(c)(1)\\nAttached Awning/Canopy Sign NR   NR   Y    Y    Y    Section\\n                                                     1119.07(c)(2)\\nProjecting Sign             NR   NR   Y    Y    Y    Section\\n                                                     1119.07(c)(3)\\nHanging Sign                NR   NR   Y    Y    Y    Section\\n                                                     1119.07(c)(4)\\nWindow Sign                 NR   NR   Y    Y    Y    Section\\n                                                     1119.07(c)(5)\\nFreestanding Canopy Sign         NR   Y    Y    X    Section\\n                                                     1119.07(c)(6)\\nIncidental Signs\\nGeneral Incidental Signs    NR   NR   Y    Y    Y    Section\\n                                                     1119.07(d)(1)\\nSpeaker Board               X    NR   Y    X    X    Section\\n                                                     1119.07(d)(2)\\nOff-Premise Signs (See Section 1119.08)\\nBillboard                   X    X    C    C    X    Section\\n                                                     1119.08(b)\\nBench Billboard             -    -    -    -    -    Section\\n                                                     1119.08(c)\\nSubdivision Entry Sign      Y    Y    Y    Y    X    Section\\n                                                     1119.08(d)\\nTemporary Signs                                      Section\\n                                                     1119.09\\n\\u00A0\\n\\u00A0\\u00A0\\u00A0(c) \\u00A0\\u00A0\\u00A0Generally. This Chapter establishes standards for individual sign\\ntypes. Sections and subsections on each sign type address the following\\nstandards:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Images or graphics that illustrate the sign type; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0A table summarizing the applicable sign standards, including:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0The sign type definition;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0If the sign type is allowed in the designated zoning districts\\nin the tables in Sections\\n1119.07 and\\n1119.08;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0C. \\u00A0\\u00A0\\u00A0If a sign permit is required;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0D. \\u00A0\\u00A0\\u00A0The maximum number of signs of each type;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0E. \\u00A0\\u00A0\\u00A0Maximum sign dimensions, including:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Sign area;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Sign height;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Sign setbacks; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iv. \\u00A0\\u00A0\\u00A0Other requirements.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0F. \\u00A0\\u00A0\\u00A0If the following sign features provided in Section\\n1119.05 are allowed or prohibited:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Illumination features;\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0Changeable copies; and\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Digital dynamic display.\\n\\u00A0\\u00A0\\u00A0\\n1119.07 ON-PREMISE SIGNS.\\n\\u00A0\\u00A0\\u00A0(a) \\u00A0\\u00A0\\u00A0Generally. On-premise signs are classified into three sign\\nsubcategories: freestanding signs, attached signs, and incidental signs. This\\nSection provides regulations for each\\nsign subcategory.\\n\\u00A0\\u00A0\\u00A0(b) \\u00A0\\u00A0\\u00A0Freestanding Signs. Freestanding signs are classified into one of the\\nfollowing sign types: monument signs or pole signs. Their associated\\nregulations are established in this Subsection. A lot may have one freestanding\\nsign, but not multiple unless specified elsewhere in this Subsection.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(1) \\u00A0\\u00A0\\u00A0Monument Signs\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Generally. The required standards for monument signs shall\\ncomply with Table 1119.07.1: Monument Sign Standards.\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-9831.jpg]\\nTable 1119.07.1: Monument Sign Standards\\n                          Y= sign allowed\\n                          X = sign not allowed\\nKey g                     NR = sign allowed for nonresidential uses only\\n                          \\u201C-\\u201C = the standard does not apply\\n                          C = sign allowed by Conditional Use Permit\\n                          Monument Sign: An on-premises, permanent freestanding\\nDefinition g              sign mounted or appearing to be mounted directly in\\n                          the ground or on a footer in the ground.\\n                          R-AG               C-HC\\nDistrict g                R-LD  R-HD  C-LC   I-LI   C-DT\\nRequirement i             P-PR  C-NC         I-HI   P-DM\\n                          P-IE\\nGeneral\\nAllowed                   NR    NR    Y      Y      Y\\nPermit Required           Y     Y     Y      Y      Y\\nNumber per Lot            1     1     1      1      1\\nDimensions\\nSign Area (max.)          50 sf 50 sf 150 sf 400 sf 50 sf\\nSign Height (max.)        6 ft  10 ft 15 ft  15 ft  10 ft\\nDistance/Setback\\nFrom Front Property Line  5 ft  5 ft  10 ft  10 ft  5 ft\\n(min.)\\nFrom Adjacent Property    5 ft  5 ft  10 ft  10 ft  5 ft\\nLines (min.)\\nFrom Another Freestanding 50 ft 50 ft 50 ft  50 ft  50 ft\\nSign (min.)\\nFeatures\\nExternal Illumination     NR    NR    Y      -      Y\\nInternal Illumination     NR    NR    Y      -      Y\\nChangeable Copy           NR    NR    Y      -      Y\\nSingle-Color Digital      NR    NR    Y      -      Y\\nMulti-Color Digital       X     X     C      C      C\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0B. \\u00A0\\u00A0\\u00A0Bonuses and Special Allowances. The following bonuses apply:\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0i. \\u00A0\\u00A0\\u00A0Additional five square feet for masonry construction\\nmaterials for base or framing 50% masonry minimum.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0ii. \\u00A0\\u00A0\\u00A0The maximum sign area for a monument sign on a lot with\\nmultiple tenants may be increased by 25%.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0iii. \\u00A0\\u00A0\\u00A0Any lot with multiple tenants may have up to three monument\\nsigns if each of those signs are 25% percent less than the applicable maximum\\nsign area allowance.\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0(2) \\u00A0\\u00A0\\u00A0Pole Signs\\n\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0\\u00A0A. \\u00A0\\u00A0\\u00A0Generally. The required standards for pole signs shall comply\\nwith Table 1119.07.2: Pole Sign Standards.\\n[https://export.amlegal.com/media/1a44955505f9f3430318cb187ecfe0a931a8fdfd/\\nIMAGES/0-0-0-9882.jpg]\\nTable 1119.07.2: Pole Sign Standards\\n             Y= sign allowed\\n             X = sign not allowed\\nKey g        NR = sign allowed for nonresidential uses only\\n             \\u201C-\\u201C = the standard does not apply\\n             C = sign allowed by Conditional Use Permit\\n             Pole Sign: \\u00A0An on-premise, permanent freestanding sign mounted\\nDefinition g directly in the ground by a pole(s) or columnal support structure\\n             (s) providing open-air between the base of the sign and the\\n             ground.\\n             R-\\n             AG\\nDistrict g   R- R-      C-HC\\nRequirement  LD HD C-LC I-LI C-DT\\ni            P- C-      I-HI P-DM\\n             PR NC\\n             P-\\n             IE\\nGeneral\\nAllowed      X  NR Y    Y    X\\nPermit       -  Y  Y    Y    -\\nRequired\\nNumber per   -  1  1    1    -\\nLot\\nDimensions\\nSign Area    -  75 150  150  -\\n(max.)          sf sf   sf\\nSign Height  -  20 35   35   -\\n(max.)          ft ft   ft\\nDistance/Setback\\nFrom Front      5  10   10\\nProperty     -  ft ft   ft   -\\nLine (min.)\\nFrom\\nAdjacent