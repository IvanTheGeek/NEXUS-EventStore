text = "Yes — exactly.\n\nWith **ZFS storage in Proxmox**, a VM disk does **not have to be “a file in a folder”**. On a ZFS-backed Proxmox storage, VM disks are typically created as **ZFS volumes (zvols)**, which are block devices managed by ZFS rather than ordinary qcow2/raw files sitting in a directory. Proxmox’s own docs describe ZFS storage as using ZFS datasets for VM images and containers, and Proxmox staff also note that VM disk images on ZFS are volume datasets rather than normal files. citeturn311018search4turn311018search15\n\nSo the model is more like this:\n\n```text\nUSB HDD pool (RAIDZ1 ZFS)\n    ├─ zvols for VM virtual disks\n    ├─ datasets for file/data storage\n    └─ maybe separate datasets for experiments\n```\n\nThat is why I was nudging you toward **“let Proxmox own the pool”** first. It gives you more freedom, not less.\n\n## The distinction that matters\n\nThere are really **two different kinds of storage use** here:\n\n### 1. Block storage for VMs\nThis is where Proxmox creates a virtual hard disk for a VM.\n\nOn ZFS storage, that VM disk is usually a **zvol**. To the VM, it just looks like a normal virtual disk. citeturn311018search4turn311018search15\n\n### 2. Filesystem storage for “other stuff”\nThis is where you want general-purpose space for:\n- dumps\n- backups\n- experiments\n- maybe shares\n- maybe media\n- maybe import/export staging\n\nThat usually means **a ZFS dataset** mounted on the Proxmox host, and then either:\n- used directly on the host,\n- shared over SMB/NFS,\n- bind-mounted into an LXC,\n- or exposed to a VM through a network share. Proxmox forum guidance notes that direct bind-mounting works for LXCs, while VMs typically consume such host datasets through network sharing instead. citeturn311018search8\n\n## So for your case\n\nWhat you probably want is:\n\n```text\nNVMe mirror\n  -> Proxmox OS\n  -> hot VM storage\n\nUSB RAIDZ1 pool\n  -> vm-bulk      (zvol-backed VM disks)\n  -> files        (dataset for general storage)\n  -> lab          (dataset for experiments)\n  -> backupdump   (maybe, depending on storage type choice)\n```\n\n## Important Proxmox storage nuance\n\nA **ZFS storage entry** in Proxmox is mainly for **VM images** and **container rootdirs**. It is not the flexible “store everything here” type by itself. Proxmox’s storage docs say different storage types support different content types, and Proxmox staff have specifically stated that ZFS storage in PVE supports VM and container images, but not backups as a native ZFS storage content type. By contrast, **Directory storage** is file-level storage and can hold things like virtual disk images, templates, ISOs, and backup files. citeturn311018search1turn311018search12turn311018search9\n\nThat means the practical pattern is often:\n\n- **Add the pool as ZFS storage** for VM disks\n- **Also create one or more datasets on that same pool**\n- Mount those datasets somewhere like `/tank/files` or `/tank/backup`\n- Add those mounted paths to Proxmox as **Directory** storage when you want normal file storage behavior\n\n## That gives you both worlds\n\nSo yes, you can absolutely have the same physical RAIDZ1 pool serve multiple purposes:\n\n### A. Proxmox-managed VM disks\nExample:\n- `usbpool` added as `zfspool` storage\n- VM disk created there\n- Proxmox makes a zvol for the VM\n\n### B. General file storage\nExample:\n- `zfs create usbpool/files`\n- mount at `/usbpool/files`\n- add `/usbpool/files` to Proxmox as a **Directory** storage if you want backups/ISOs/templates there\n\n### C. Experiments\nExample:\n- `zfs create usbpool/lab`\n- test SMB/NFS\n- test Nextcloud\n- test LXC bind mounts\n- test snapshot/send/receive workflows\n\n## The clean mental model\n\nThink of it like this:\n\n```text\nPool\n  ├─ block projections   -> VM disks (zvols)\n  └─ file projections    -> datasets/directories/shares\n```\n\nSo you were not wrong — you just had **“virtual disk in storage”** pictured as a file-backed model. With ZFS-backed Proxmox storage, it’s often **block-backed by ZFS directly**, which is better for this use. citeturn311018search4turn311018search15\n\n## My recommendation for your layout\n\nI’d do this:\n\n```text\nrpool            = NVMe mirror for Proxmox + hot VMs\nbulkpool         = USB RAIDZ1 HDD pool\n\nbulkpool/vm      = VM bulk storage\nbulkpool/files   = general storage\nbulkpool/iso     = optional ISO/templates\nbulkpool/backup  = backup dumps\nbulkpool/lab     = experiments\n```\n\nThen in Proxmox:\n\n- add `bulkpool` as **ZFS storage** for VM images\n- add `/bulkpool/backup` as **Directory storage** for backups\n- add `/bulkpool/iso` as **Directory storage** for ISOs/templates\n- use `/bulkpool/files` however you want: shares, Nextcloud data, scratch, imports\n\nThat gives you the flexibility you said you want.\n\nOne caution: because your HDD pool is in a **USB enclosure**, I would still treat it as **bulk/cold/lab storage**, not the place for your most critical always-on VM workloads. ZFS on USB can work, but a USB hiccup is much uglier than a direct-attached SATA/SAS hiccup. That’s an engineering judgment on my part more than something I’m citing from the docs.\n\nI can lay out the exact Proxmox storage design next, including what should be `zfspool` versus `directory`, in a concrete example with dataset names and what each one should hold."

