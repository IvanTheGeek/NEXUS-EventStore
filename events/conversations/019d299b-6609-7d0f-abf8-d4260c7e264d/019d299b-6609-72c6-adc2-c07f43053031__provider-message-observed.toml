text = "as part of my new homelab network, I am setting up a box that will have proxmox and allow be to run tests and experiments and do some light hosting. I have a \n```WAVLINK 4-Bay Hard Drive Enclosure for 3.5\" and 2.5'' SATA HDD/SSD Featuring 10Gbps USB-C 3.2, Max 88TB Capacity, Built-in Temp-Controlled Cooling Fans, 4K HDMI Stunning Video Output, Aluminum Shell\n```\nand 4 \n```\nToshiba N300 PRO 12TB Large-Sized Business NAS (up to 24 bays) 3.5-Inch Internal Hard Drive - Up to 300 TB/year Workload Rate CMR SATA 6 GB/s 7200 RPM 512 MB Cache - HDWG51CXZSTB\n```\nI need to have a local cloud drive like google drive  or dropbox to dump all my data in, but need to have accessible from outside the home when on the truck. I have static IPs, so that is not an issue. I am not sure which storage software to use on it or how yet."

