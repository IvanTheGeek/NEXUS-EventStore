text = "[View your bookmark manager](computer:///mnt/user-data/outputs/bookmark-manager.html)\n\nThis standalone HTML file includes:\n- Full bookmark manager with add/edit/delete\n- Search and category filtering\n- localStorage persistence (saves in your browser)\n- Export/Import functionality to backup and restore bookmarks\n- Works offline once downloaded\n- Mobile-responsive design\n\nDownload it, save it anywhere on your device, and open it in any browser. Your bookmarks will persist in that browser's storage."

