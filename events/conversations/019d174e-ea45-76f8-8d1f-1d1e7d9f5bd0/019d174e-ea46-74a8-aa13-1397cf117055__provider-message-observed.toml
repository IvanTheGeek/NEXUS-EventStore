text = "Based on your screenshots, I can see you have other artifacts that work (the jsx files in your list). The issue is that my HTML artifacts aren't rendering or saving properly on your Android app.\n\nLet me try React instead, since you already have working .jsx artifacts in your list:\n\nimport React, { useState, useEffect } from 'react';\nimport { Plus, Trash2, ExternalLink, Search, Tag } from 'lucide-react';\n\nexport default function BookmarkManager() {\n  const [bookmarks, setBookmarks] = useState([]);\n  const [newBookmark, setNewBookmark] = useState({ url: '', title: '', category: '', description: '' });\n  const [searchTerm, setSearchTerm] = useState('');\n  const [filterCategory, setFilterCategory] = useState('');\n\n  useEffect(() => {\n    const saved = localStorage.getItem('bookmarks');\n    if (saved) {\n      setBookmarks(JSON.parse(saved));\n    } else {\n      setBookmarks([{\n        id: 1,\n        url: 'https://github.com/spiral-project/ihatemoney',\n        title: 'IHateMoney - GitHub',\n        category: 'Tools',\n        description: 'Shared expense management'\n      }]);\n    }\n  }, []);\n\n  useEffect(() => {\n    if (bookmarks.length > 0) {\n      localStorage.setItem('bookmarks', JSON.stringify(bookmarks));\n    }\n  }, [bookmarks]);\n\n  const categories = [...new Set(bookmarks.map(b => b.category).filter(Boolean))];\n\n  const addBookmark = () => {\n    if (!newBookmark.url || !newBookmark.title) return;\n    setBookmarks([...bookmarks, { ...newBookmark, id: Date.now() }]);\n    setNewBookmark({ url: '', title: '', category: '', description: '' });\n  };\n\n  const deleteBookmark = (id) => {\n    if (window.confirm('Delete this bookmark?')) {\n      setBookmarks(bookmarks.filter(b => b.id !== id));\n    }\n  };\n\n  const filteredBookmarks = bookmarks.filter(bookmark => {\n    const matchesSearch = searchTerm === '' || \n      bookmark.title.toLowerCase().includes(searchTerm.toLowerCase()) ||\n      bookmark.url.toLowerCase().includes(searchTerm.toLowerCase()) ||\n      bookmark.description?.toLowerCase().includes(searchTerm.toLowerCase());\n    const matchesCategory = filterCategory === '' || bookmark.category === filterCategory;\n    return matchesSearch && matchesCategory;\n  });\n\n  return (\n    <div className=\"min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-4\">\n      <div className=\"max-w-6xl mx-auto\">\n        <div className=\"bg-slate-800 rounded-lg shadow-xl p-4 mb-4 border border-slate-700\">\n          <h1 className=\"text-2xl font-bold text-white mb-2\">Bookmark Manager</h1>\n          <p className=\"text-slate-400\">Track websites you've saved for a reason</p>\n        </div>\n\n        <div className=\"bg-slate-800 rounded-lg shadow-xl p-4 mb-4 border border-slate-700\">\n          <h2 className=\"text-lg font-semibold text-white mb-4 flex items-center gap-2\">\n            <Plus className=\"w-5 h-5\" />\n            Add Bookmark\n          </h2>\n          <div className=\"space-y-3\">\n            <div>\n              <label className=\"block text-sm font-medium text-slate-300 mb-2\">URL *</label>\n              <input type=\"url\" value={newBookmark.url} onChange={(e) => setNewBookmark({ ...newBookmark, url: e.target.value })} placeholder=\"https://example.com\" className=\"w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500\" />\n            </div>\n            <div>\n              <label className=\"block text-sm font-medium text-slate-300 mb-2\">Title *</label>\n              <input type=\"text\" value={newBookmark.title} onChange={(e) => setNewBookmark({ ...newBookmark, title: e.target.value })} placeholder=\"Website name\" className=\"w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500\" />\n            </div>\n            <div>\n              <label className=\"block text-sm font-medium text-slate-300 mb-2\">Category</label>\n              <input type=\"text\" value={newBookmark.category} onChange={(e) => setNewBookmark({ ...newBookmark, category: e.target.value })} placeholder=\"e.g., Tools, Docs\" className=\"w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500\" />\n            </div>\n            <div>\n              <label className=\"block text-sm font-medium text-slate-300 mb-2\">Description</label>\n              <input type=\"text\" value={newBookmark.description} onChange={(e) => setNewBookmark({ ...newBookmark, description: e.target.value })} placeholder=\"Why you saved this\" className=\"w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500\" />\n            </div>\n            <button onClick={addBookmark} disabled={!newBookmark.url || !newBookmark.title} className=\"px-6 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-600 text-white rounded-lg font-medium flex items-center gap-2\">\n              <Plus className=\"w-4 h-4\" />\n              Add Bookmark\n            </button>\n          </div>\n        </div>\n\n        <div className=\"bg-slate-800 rounded-lg shadow-xl p-4 mb-4 border border-slate-700\">\n          <div className=\"space-y-3\">\n            <div className=\"relative\">\n              <Search className=\"absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-slate-400\" />\n              <input type=\"text\" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} placeholder=\"Search bookmarks...\" className=\"w-full pl-10 pr-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500\" />\n            </div>\n            <div className=\"relative\">\n              <Tag className=\"absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-slate-400\" />\n              <select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)} className=\"w-full pl-10 pr-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500\">\n                <option value=\"\">All Categories</option>\n                {categories.map(cat => (<option key={cat} value={cat}>{cat}</option>))}\n              </select>\n            </div>\n          </div>\n        </div>\n\n        <div className=\"space-y-3\">\n          {filteredBookmarks.length === 0 ? (\n            <div className=\"bg-slate-800 rounded-lg shadow-xl p-8 border border-slate-700 text-center\">\n              <p className=\"text-slate-400\">No bookmarks found</p>\n            </div>\n          ) : (\n            filteredBookmarks.map(bookmark => (\n              <div key={bookmark.id} className=\"bg-slate-800 rounded-lg shadow-xl p-4 border border-slate-700\">\n                <div className=\"flex items-start justify-between gap-3\">\n                  <div className=\"flex-1 min-w-0\">\n                    <div className=\"flex flex-wrap items-center gap-2 mb-2\">\n                      <h3 className=\"text-base font-semibold text-white break-words\">{bookmark.title}</h3>\n                      {bookmark.category && (<span className=\"px-2 py-1 bg-blue-900/50 text-blue-300 text-xs rounded-full\">{bookmark.category}</span>)}\n                    </div>\n                    <a href={bookmark.url} target=\"_blank\" rel=\"noopener noreferrer\" className=\"text-blue-400 text-sm break-all mb-2 flex items-center gap-1\">\n                      <span className=\"break-all\">{bookmark.url}</span>\n                      <ExternalLink className=\"w-3 h-3 flex-shrink-0\" />\n                    </a>\n                    {bookmark.description && (<p className=\"text-slate-400 text-sm\">{bookmark.description}</p>)}\n                  </div>\n                  <button onClick={() => deleteBookmark(bookmark.id)} className=\"p-2 text-red-400 hover:bg-red-900/20 rounded-lg flex-shrink-0\">\n                    <Trash2 className=\"w-5 h-5\" />\n                  </button>\n                </div>\n              </div>\n            ))\n          )}\n        </div>\n\n        <div className=\"mt-4 bg-slate-800 rounded-lg shadow-xl p-4 border border-slate-700\">\n          <p className=\"text-slate-400 text-sm text-center\">\n            {filteredBookmarks.length} of {bookmarks.length} bookmarks\n            {filterCategory && ` in ${filterCategory}`}\n            {searchTerm && ` matching \"${searchTerm}\"`}\n          </p>\n        </div>\n      </div>\n    </div>\n  );\n}\n\nThis should now appear in your artifacts list and render properly on Android."

