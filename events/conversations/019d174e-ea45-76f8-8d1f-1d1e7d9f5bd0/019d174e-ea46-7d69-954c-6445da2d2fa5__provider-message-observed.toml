text = "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Bookmark Manager</title>\n    <script src=\"https://cdn.tailwindcss.com\"></script>\n    <style>\n        body { margin: 0; padding: 0; }\n    </style>\n</head>\n<body class=\"bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen\">\n    <div id=\"app\" class=\"p-4 md:p-6\">\n        <div class=\"max-w-6xl mx-auto\">\n            <div class=\"bg-slate-800 rounded-lg shadow-xl p-4 md:p-6 mb-4 border border-slate-700\">\n                <h1 class=\"text-2xl md:text-3xl font-bold text-white mb-2\">Bookmark Manager</h1>\n                <p class=\"text-slate-400\">Track websites you've saved for a reason</p>\n            </div>\n\n            <div class=\"bg-slate-800 rounded-lg shadow-xl p-4 md:p-6 mb-4 border border-slate-700\">\n                <h2 class=\"text-lg md:text-xl font-semibold text-white mb-4\">➕ Add Bookmark</h2>\n                <div class=\"space-y-4\">\n                    <div>\n                        <label class=\"block text-sm font-medium text-slate-300 mb-2\">URL *</label>\n                        <input type=\"url\" id=\"url\" placeholder=\"https://example.com\" \n                            class=\"w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500\">\n                    </div>\n                    <div>\n                        <label class=\"block text-sm font-medium text-slate-300 mb-2\">Title *</label>\n                        <input type=\"text\" id=\"title\" placeholder=\"Website name\"\n                            class=\"w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500\">\n                    </div>\n                    <div>\n                        <label class=\"block text-sm font-medium text-slate-300 mb-2\">Category</label>\n                        <input type=\"text\" id=\"category\" placeholder=\"e.g., Tools, Docs, References\"\n                            class=\"w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500\">\n                    </div>\n                    <div>\n                        <label class=\"block text-sm font-medium text-slate-300 mb-2\">Description</label>\n                        <input type=\"text\" id=\"description\" placeholder=\"Why you saved this\"\n                            class=\"w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500\">\n                    </div>\n                    <button onclick=\"addBookmark()\" \n                        class=\"px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors\">\n                        ➕ Add Bookmark\n                    </button>\n                </div>\n            </div>\n\n            <div class=\"bg-slate-800 rounded-lg shadow-xl p-4 md:p-6 mb-4 border border-slate-700\">\n                <div class=\"space-y-4\">\n                    <input type=\"text\" id=\"search\" placeholder=\"🔍 Search bookmarks...\" onkeyup=\"filterBookmarks()\"\n                        class=\"w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500\">\n                    <select id=\"categoryFilter\" onchange=\"filterBookmarks()\"\n                        class=\"w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500\">\n                        <option value=\"\">All Categories</option>\n                    </select>\n                </div>\n            </div>\n\n            <div id=\"bookmarksList\" class=\"space-y-3\"></div>\n\n            <div class=\"mt-4 bg-slate-800 rounded-lg shadow-xl p-4 border border-slate-700\">\n                <p id=\"stats\" class=\"text-slate-400 text-sm text-center\"></p>\n            </div>\n\n            <div class=\"mt-4 bg-slate-800 rounded-lg shadow-xl p-4 border border-slate-700\">\n                <div class=\"flex flex-wrap gap-3 justify-center\">\n                    <button onclick=\"exportBookmarks()\" \n                        class=\"px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition-colors text-sm\">\n                        📥 Export Bookmarks\n                    </button>\n                    <label class=\"px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-medium transition-colors text-sm cursor-pointer\">\n                        📤 Import Bookmarks\n                        <input type=\"file\" id=\"importFile\" accept=\".json\" onchange=\"importBookmarks()\" class=\"hidden\">\n                    </label>\n                </div>\n            </div>\n        </div>\n    </div>\n\n    <script>\n        let bookmarks = [];\n\n        function saveBookmarks() {\n            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));\n        }\n\n        function loadBookmarks() {\n            const saved = localStorage.getItem('bookmarks');\n            if (saved) {\n                bookmarks = JSON.parse(saved);\n            } else {\n                bookmarks = [\n                    {\n                        id: 1,\n                        url: 'https://github.com/spiral-project/ihatemoney',\n                        title: 'IHateMoney - GitHub',\n                        category: 'References',\n                        description: 'Reference on expense sharing'\n                    },\n                    {\n                        id: 2,\n                        url: 'https://www.manager.io/',\n                        title: 'Manager.io',\n                        category: 'Money > Business Accounting Software',\n                        description: 'Software option for business finances, alternative to QuickBooks'\n                    },\n                    {\n                        id: 3,\n                        url: 'https://www.dividend.com/',\n                        title: 'Dividend.com',\n                        category: 'Money > Investing',\n                        description: 'Search stocks and ETFs, view dividend information'\n                    }\n                ];\n                saveBookmarks();\n            }\n            updateCategoryFilter();\n            renderBookmarks();\n        }\n\n        function addBookmark() {\n            const url = document.getElementById('url').value.trim();\n            const title = document.getElementById('title').value.trim();\n            const category = document.getElementById('category').value.trim();\n            const description = document.getElementById('description').value.trim();\n\n            if (!url || !title) {\n                alert('URL and Title are required');\n                return;\n            }\n\n            bookmarks.push({\n                id: Date.now(),\n                url, title, category, description\n            });\n\n            document.getElementById('url').value = '';\n            document.getElementById('title').value = '';\n            document.getElementById('category').value = '';\n            document.getElementById('description').value = '';\n\n            saveBookmarks();\n            updateCategoryFilter();\n            renderBookmarks();\n        }\n\n        function deleteBookmark(id) {\n            if (confirm('Delete this bookmark?')) {\n                bookmarks = bookmarks.filter(b => b.id !== id);\n                saveBookmarks();\n                updateCategoryFilter();\n                renderBookmarks();\n            }\n        }\n\n        function updateCategoryFilter() {\n            const categories = [...new Set(bookmarks.map(b => b.category).filter(Boolean))];\n            const select = document.getElementById('categoryFilter');\n            const currentValue = select.value;\n            select.innerHTML = '<option value=\"\">All Categories</option>';\n            categories.forEach(cat => {\n                const option = document.createElement('option');\n                option.value = cat;\n                option.textContent = cat;\n                select.appendChild(option);\n            });\n            select.value = currentValue;\n        }\n\n        function filterBookmarks() {\n            renderBookmarks();\n        }\n\n        function renderBookmarks() {\n            const search = document.getElementById('search').value.toLowerCase();\n            const categoryFilter = document.getElementById('categoryFilter').value;\n\n            const filtered = bookmarks.filter(b => {\n                const matchesSearch = !search || \n                    b.title.toLowerCase().includes(search) ||\n                    b.url.toLowerCase().includes(search) ||\n                    (b.description && b.description.toLowerCase().includes(search));\n                const matchesCategory = !categoryFilter || b.category === categoryFilter;\n                return matchesSearch && matchesCategory;\n            });\n\n            const list = document.getElementById('bookmarksList');\n            if (filtered.length === 0) {\n                list.innerHTML = '<div class=\"bg-slate-800 rounded-lg shadow-xl p-8 border border-slate-700 text-center\"><p class=\"text-slate-400 text-lg\">No bookmarks found</p></div>';\n            } else {\n                list.innerHTML = filtered.map(b => `\n                    <div class=\"bg-slate-800 rounded-lg shadow-xl p-4 md:p-6 border border-slate-700\">\n                        <div class=\"flex items-start justify-between gap-3\">\n                            <div class=\"flex-1 min-w-0\">\n                                <div class=\"flex flex-wrap items-center gap-2 mb-2\">\n                                    <h3 class=\"text-base md:text-lg font-semibold text-white break-words\">${escapeHtml(b.title)}</h3>\n                                    ${b.category ? `<span class=\"px-2 py-1 bg-blue-900/50 text-blue-300 text-xs font-medium rounded-full\">${escapeHtml(b.category)}</span>` : ''}\n                                </div>\n                                <a href=\"${escapeHtml(b.url)}\" target=\"_blank\" class=\"text-blue-400 hover:text-blue-300 text-sm break-all mb-2 inline-block\">\n                                    ${escapeHtml(b.url)} 🔗\n                                </a>\n                                ${b.description ? `<p class=\"text-slate-400 text-sm\">${escapeHtml(b.description)}</p>` : ''}\n                            </div>\n                            <button onclick=\"deleteBookmark(${b.id})\" \n                                class=\"p-2 text-red-400 hover:text-red-300 hover:bg-red-900/20 rounded-lg transition-colors flex-shrink-0\">\n                                🗑️\n                            </button>\n                        </div>\n                    </div>\n                `).join('');\n            }\n\n            document.getElementById('stats').textContent = \n                `${filtered.length} of ${bookmarks.length} bookmarks` +\n                (categoryFilter ? ` in ${categoryFilter}` : '') +\n                (search ? ` matching \"${search}\"` : '');\n        }\n\n        function escapeHtml(text) {\n            const div = document.createElement('div');\n            div.textContent = text;\n            return div.innerHTML;\n        }\n\n        function exportBookmarks() {\n            const dataStr = JSON.stringify(bookmarks, null, 2);\n            const dataBlob = new Blob([dataStr], { type: 'application/json' });\n            const url = URL.createObjectURL(dataBlob);\n            const link = document.createElement('a');\n            link.href = url;\n            link.download = 'bookmarks-' + new Date().toISOString().split('T')[0] + '.json';\n            document.body.appendChild(link);\n            link.click();\n            document.body.removeChild(link);\n            URL.revokeObjectURL(url);\n        }\n\n        function importBookmarks() {\n            const file = document.getElementById('importFile').files[0];\n            if (!file) return;\n\n            const reader = new FileReader();\n            reader.onload = function(e) {\n                try {\n                    const imported = JSON.parse(e.target.result);\n                    if (Array.isArray(imported)) {\n                        if (confirm(`Import ${imported.length} bookmarks? This will add to your existing bookmarks.`)) {\n                            bookmarks = [...bookmarks, ...imported];\n                            saveBookmarks();\n                            updateCategoryFilter();\n                            renderBookmarks();\n                        }\n                    } else {\n                        alert('Invalid bookmark file format');\n                    }\n                } catch (error) {\n                    alert('Error reading file: ' + error.message);\n                }\n                document.getElementById('importFile').value = '';\n            };\n            reader.readAsText(file);\n        }\n\n        loadBookmarks();\n    </script>\n</body>\n</html>\n\n---\n**Current prompt tokens:** 167  \n**Current response tokens:** 2,372  \n**Total tokens used in chat:** 73,335  \n**Tokens remaining:** 116,665"

