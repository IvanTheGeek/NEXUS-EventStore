kind = "plain_text"
text = "2. Processors as Actors: \"executes deterministically\" this actually could be deterministic, a pure function, etc. The nuance is the level of fidelity being looked at. \n1. External Systems as Actors: the definition might need to be expanded for the swimlane because external to the current domain and system being looked at is where I see this. Adam and Martin say that the events can be the communication. then you have to deal with internal and external events, etc. So if you have external events, that is basically an API. So i make my rules as events at the bottom are for this system. If external, they flow through a projection ready for export at the top. Incoming external events hit a record command and then flow through processors to produce domain events of value.  \nIf you analyze the event modeling pictures, you see that then the events feed into the projection and finally to the top for viewing or processing. it becomes a visual sine wave sort of flow."

