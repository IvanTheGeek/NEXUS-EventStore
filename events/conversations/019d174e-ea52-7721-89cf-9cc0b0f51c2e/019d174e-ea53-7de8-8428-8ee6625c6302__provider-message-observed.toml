kind = "plain_text"
text = "**Exactly!** The F# runner becomes a pure execution engine - data drives everything.\n\n## Architecture\n\n```\ntests/\n  technology-decisions.yaml\n  f-sharp-questions.yaml\n  event-modeling.yaml\n  architecture-choices.yaml\n  <- add new file here, runner picks it up automatically\n\ndotnet run --project ModelEval\n  ↓ discovers all *.yaml in tests/\n  ↓ loads test definitions\n  ↓ runs against configured models\n  ↓ logs to Nexus\n```\n\n## Runner Logic\n\n```fsharp\n[<EntryPoint>]\nlet main argv =\n    let testDir = \"./tests\"\n    let models = loadModelsConfig() // from config file\n    \n    // Discover all test suites\n    let testFiles = \n        Directory.GetFiles(testDir, \"*.yaml\")\n        |> Array.toList\n    \n    printfn \"Discovered %d test suites:\" testFiles.Length\n    testFiles |> List.iter (fun f -> printfn \"  - %s\" (Path.GetFileName f))\n    \n    // Load and validate\n    let testSuites =\n        testFiles\n        |> List.map loadAndValidateTestSuite\n        |> List.choose id // skip invalid files\n    \n    printfn \"\\nLoaded %d valid test cases total\\n\" \n        (testSuites |> List.sumBy (fun s -> s.tests.Length))\n    \n    // Run everything\n    let runId = runEvaluation models testSuites\n    \n    printfn \"\\nRun complete. Analyze with:\"\n    printfn \"  dotnet run -- analyze %s\" (runId.ToString())\n    \n    0\n```\n\n## YAML Schema (flexible)\n\n```yaml\n# tests/technology-decisions.yaml\nsuite_name: \"Technology Decision Evaluation\"\ncategory: technology_decision\ndescription: \"Tests ability to make technical choices with rationale\"\n\ntests:\n  - name: \"Database vector extension\"\n    query: \"Should we use Qdrant or pgvector?\"\n    context:\n      - \"Using PostgreSQL for event store\"\n      - \"Docker infrastructure available\"\n      - \"Preference: minimize dependencies\"\n    methodology_rules: |\n      - Technology decisions require rationale\n      - Consider existing infrastructure\n      - Favor simplicity when capabilities similar\n    expected_output:\n      has_reasoning: true\n      has_confidence: true\n      suggests_event_type: true\n      min_reasoning_points: 2\n\n  - name: \"Message queue selection\"\n    query: \"RabbitMQ or Kafka for event distribution?\"\n    context:\n      - \"Event-sourced architecture\"\n      - \"~1000 events/day volume\"\n      - \"Single producer, 3 consumers\"\n    methodology_rules: |\n      - Match solution to scale requirements\n      - Consider operational complexity\n    expected_output:\n      has_reasoning: true\n      has_confidence: true\n```\n\n```yaml\n# tests/f-sharp-questions.yaml\nsuite_name: \"F# Technical Questions\"\ncategory: technical_question\ndescription: \"Tests F# domain expertise and code explanation\"\n\ntests:\n  - name: \"Task vs Async explanation\"\n    query: \"Explain difference between Task and Async in F#\"\n    context:\n      - \"User: Experienced F# developer\"\n      - \"Technical depth: High\"\n    methodology_rules: |\n      - Use F# terminology\n      - Include code examples\n      - Explain practical implications\n    expected_output:\n      has_reasoning: false  # direct answer appropriate\n      has_code_examples: true\n      technical_accuracy: true\n\n  - name: \"Computation expression usage\"\n    query: \"When should I use computation expressions vs regular functions?\"\n    context:\n      - \"User: Intermediate F#\"\n    expected_output:\n      has_examples: true\n      has_trade_offs: true\n```\n\n## Adding New Test Suites\n\n**Someone (even non-developer) can:**\n\n```bash\n# Create new file\ntouch tests/event-modeling-basics.yaml\n\n# Edit with any text editor\ncat > tests/event-modeling-basics.yaml << 'EOF'\nsuite_name: \"Event Modeling Fundamentals\"\ncategory: methodology\ndescription: \"Tests understanding of event modeling concepts\"\n\ntests:\n  - name: \"Event immutability\"\n    query: \"Can I edit an event after it's been stored?\"\n    context:\n      - \"User: New to event sourcing\"\n    methodology_rules: |\n      - Events are immutable facts\n      - Corrections done via compensating events\n    expected_output:\n      has_reasoning: true\n      correct_answer: \"no\"\n      explains_compensating_events: true\nEOF\n\n# Run evaluations - picks up new file automatically\ndotnet run\n```\n\n**No code changes. No rebuild.**\n\n## Configuration File for Models\n\n```yaml\n# config/models.yaml\nmodels:\n  - name: phi-3-mini-4k\n    ollama_model: phi3:3.8b-mini-4k-instruct-q4_K_M\n    quantization: Q4_K_M\n    expected_vram_gb: 4\n    \n  - name: phi-3-mini-128k\n    ollama_model: phi3:3.8b-mini-128k-instruct-q4_K_M\n    quantization: Q4_K_M\n    expected_vram_gb: 4\n    \n  - name: llama-3.2-3b\n    ollama_model: llama3.2:3b-instruct-q4_K_M\n    quantization: Q4_K_M\n    expected_vram_gb: 3\n    \n  - name: qwen-2.5-3b\n    ollama_model: qwen2.5:3b-instruct-q4_K_M\n    quantization: Q4_K_M\n    expected_vram_gb: 3\n```\n\nAdd new model → edit YAML → run again.\n\n## What Makes a Good Test Suite\n\nEach YAML file should focus on **one capability dimension:**\n\n**Suggested initial suites:**\n\n```\ntests/\n  technology-decisions.yaml    # Can it make tech choices?\n  f-sharp-expertise.yaml       # Does it know F#?\n  event-modeling.yaml          # Understands methodology?\n  reasoning-quality.yaml       # Multi-step logic?\n  context-usage.yaml           # Uses provided context?\n  format-compliance.yaml       # Follows output structure?\n  edge-cases.yaml              # Handles ambiguity?\n```\n\n## Benefits for Discovery\n\n**After running, you get Nexus events showing:**\n- Model A: Great at F# (95% accuracy), weak at reasoning (60%)\n- Model B: Strong reasoning (85%), struggles with format (70%)\n- Model C: Best context usage (90%), slower inference\n\n**Informs decisions:**\n- \"Phi-3 best for quick F# questions\"\n- \"Qwen better for complex decisions\"\n- \"Llama best format compliance\"\n\nOr discover: \"Actually, Phi-3 handles everything well enough - use it for simplicity\"\n\n## Iteration Workflow\n\n```bash\n# Week 1: Initial eval\ndotnet run\n# Discover: Models struggle with event modeling\n\n# Add focused test suite\nvi tests/event-modeling-detailed.yaml\n# Add 20 more event modeling scenarios\n\n# Re-run just that suite\ndotnet run --suite event-modeling-detailed.yaml\n\n# Compare results across runs\ndotnet run -- compare run-abc run-def --focus event-modeling\n```\n\n**All data-driven. F# tool never changes.**\n\nWant to sketch the initial test suites to start with? Which capabilities matter most for your use case?"

