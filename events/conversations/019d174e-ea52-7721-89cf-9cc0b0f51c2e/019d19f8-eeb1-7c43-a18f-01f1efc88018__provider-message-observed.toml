text = "so \"Design (Penpot) ↓ paths/wireframes\" Penpot serves to have the wireframes, but also initial concepts, and then progresses through the entire process to BE the design itself and the bases for the UI implimentations through the SVG exports. It also serves as the event model, at least the visual aspect of it. It might be that a link is needed between penpot and some metadatabase of sorts that has or links specific details that are not practical to store in penpot. That might be a function of the forum. Then there is Scotts idea that the types ARE the design, so certain types might be marked as being specs as well."

