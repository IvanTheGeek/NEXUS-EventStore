text = "Perfect! Now I see the actual Event Modeling notation from Adam Dymitruk. Looking at the blueprint image:\n\n**Top Row (Actors/UIs):**\n- Manager and Guest (left side - actors)\n- Various UI screens/wireframes throughout\n- Checkout Processor and Payment Processor (automation actors with gear icons)\n- Time arrow pointing right\n\n**Middle Row (Commands/Projections - alternating):**\n- Blue boxes = Commands (Register, Add Room, Book Room, etc.)\n- Yellow/Green boxes = Projections/Views (Room Availability, Cleaning Schedule, Sales Roster, etc.)\n\n**Bottom Row (Events):**\n- Orange boxes = Events (Registered, Room Added, Room Booked, etc.)\n- Multiple horizontal lanes: Inventory, Auth, Payment, GPS\n\n**Key observations:**\n1. Horizontal slices (columns) alternate: State Change, View, State Change, View\n2. Events in bottom row connect horizontally (shown by the user's ASCII)\n3. The \"External State Input\" and \"External State Output\" sections at bottom show the boundary pattern\n4. Multiple event lanes (Inventory, Auth, Payment, GPS) - different aggregates/contexts\n\nThe user's corrected ASCII shows:\n- Events connect horizontally with underscores\n- State change slices go DOWN (actor → command → event)\n- View slices go UP (event → projection → actor)\n- The wave pattern is created by these ups and downs\n\nThis is exactly what Ivan was explaining - the events form a horizontal timeline at the bottom, and the flow direction alternates creating the sine wave visual."

