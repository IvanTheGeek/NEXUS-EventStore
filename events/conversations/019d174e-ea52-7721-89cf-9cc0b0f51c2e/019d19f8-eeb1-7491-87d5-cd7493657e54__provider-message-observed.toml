ike Apple does, to get away with fleecing their customers? ... Does anyone still care about mGPU? The tech never lived up to its initial promises (anyone remembers \"don't get rid of your old video card, just install a new one on the side and enjoy\"?) and support was always spotty.\n\nDuxCrodoes anyone doubt that there will be RTX 3080 Ti?RTX 3080 Super or Ti with 20GB GDDR6X Also: www.techpowerup.com/forums/threads/lenovo-equips-legion-t7-with-geforce-rtx-3070-ti-16gb-gddr6.271674/ ... DuxCroBtw. does anyone doubt that there will be RTX 3080 Ti?There's certainly room for them, but their existence depends heavily on how RDNA2 turns out. ... DuxCroIf you buy RTX 3090 for gaming, something is wrong with you. I don't care if you are rich. It just means you are a fool with too much money. It's a card for professional use and you would be better off just buying RTX 3080, watercooling it and OC-ing the shit out of it. Btw. does anyone doubt that there will be RTX 3080 Ti?It's a gaming card. Professionals use Quadros (or rarely Titans) because of the certified drivers that make a 1060-equivalent Quadro P2000 over 7x faster than a 2080 Ti in professional use cases: ...\nThe NVIDIA® GeForce RTX™ 5090 is the most powerful GeForce GPU ever made, bringing game-changing capabilities to gamers and creators. Tackle the most advanced models and most challenging creative workloads with unprecedented AI horsepower. Game with full ray tracing and the lowest latency. The GeForce RTX 5090 is powered by the NVIDIA Blackwell architecture and equipped with 32 GB of super-fast GDDR7 memory, so you can do it all. ... 4K, Max Settings, DLSS Super Resolution and DLSS Ray Reconstruction on 40 and 50 Series; Frame Gen on 40 Series. Multi Frame Gen (4X Mode) on 50 Series. Horizon Forbidden West supports DLSS 3. RTX. It’s On. RTX is the most advanced platform for full ray tracing and neural rendering technologies that are revolutionizing the ways we play and create. Over 700 games and applications use RTX to deliver realistic graphics and incredibly fast performance with cutting-edge AI features like DLSS Multi Frame Generation.\n\n3x PCIe 8-pin cables from power supply to included RTX 5090 Power Connector Adapter. Graphics card supports 3x or 4x PCIe 8-pin cables. Power Compatibility Option 2. 1x 450W or greater PCIe Gen 5 power cable from power supply · Three unused expansion slots. Reserving clearance around the graphics card equivalent to an unused expansion slot will typically improve airflow. Clearance: Must have space for 12\" (304mm) x 5.4\" (137mm) x 3-slot card (61mm).\n\nGeForce RTX 5090, 4K, RT Overdrive, Max Settings, DLSS with Multi Frame Generation (4X Mode), Ray Reconstruction, Super Resolution (Performance Mode) ... The NVIDIA Blackwell architecture unlocks the game-changing realism of full ray tracing. Experience cinematic quality visuals at unprecedented speed powered by GeForce RTX 50 Series with fourth-gen RT Cores and breakthrough neural rendering technologies accelerated with fifth-gen Tensor Cores. ... Reflex technologies optimize the graphics pipeline for ultimate responsiveness, providing faster target acquisition, quicker reaction times, and improved aim precision in competitive games. Reflex 2 introduces Frame Warp (coming soon!), which further reduces latency based on the game’s latest mouse input. ... Upgrade to advanced AI with NVIDIA GeForce RTX™ GPUs and accelerate your gaming, creating, productivity, and development.\n\nNVIDIA Studio is your creative advantage. GeForce RTX 50 Series GPUs unlock transformative performance in video editing, 3D rendering, and graphic design. Experience RTX accelerations in top creative apps, world-class NVIDIA Studio drivers engineered and continually updated to provide maximum stability, and a suite of exclusive tools that harness the power of RTX for AI-assisted creative workflows. ... Take your livestreams, voice chats, and video calls to the next level with AI-enhanced voice and video. Remove distracting background noise, customize your background, and more at the touch of a button. ... RTX Video Super Resolution and HDR uses AI to transform your videos in Chrome, Edge, or Firefox—automatically sharpening details and wiping out compression artifacts. Enjoy stunning clarity in up to 4K. ... RTX Remix allows modders to easily capture game assets, enhance materials with AI tools, and create stunning RTX remasters with ray tracing and DLSS.\nNVIDIA® GeForce RTX™ 5090 · ... HDMI 2.1b) Yes x 3 (Native DisplayPort 2.1b) HDCP Support Yes (2.3) Maximum Display Support · 4 · NVlink/ Crossfire Support · No · Accessories · 1 x Speedsetup Manual 1 x TUF Graphics Card Holder 1 x TUF Velcro Hook &amp; Loop 1 x TUF ...\n\nNVIDIA® GeForce RTX™ 5090 · AI Performance · 3352 TOPs · Bus Standard · PCI Express 5.0 · OpenGL · OpenGL®4.6 · Video Memory · 32GB GDDR7 · Engine Clock · OC mode: 2437 MHz Default mode: 2407 MHz(Boost clock) CUDA Core · 21760 · Memory Speed · 28 Gbps · Memory Interface · 512-bit · Resolution · Digital Max Resolution 7680 x 4320 · Interface · Yes x 2 (Native HDMI 2.1b) Yes x 3 (Native DisplayPort 2.1b) HDCP Support Yes (2.3) Maximum Display Support · 4 · NVlink/ Crossfire Support · No · Accessories · 1 x Speedsetup Manual 1 x TUF Graphics Card Holder 1 x TUF Velcro Hook & Loop 1 x TUF Magnet 1 x TUF Gaming Certificate 1 x Thank You Card 1 x Adapter Cable (1 to 4)​ · Software · ASUS GPU Tweak III & MuseTree & GeForce Game Ready Driver & Studio Driver: please download all software from the support site. Dimensions · 348 x 146 x 72 mm 13.7 x 5.7 x 2.8 inch ·\n\nASUS GPU Tweak III & MuseTree & GeForce Game Ready Driver & Studio Driver: please download all software from the support site. ... * Our wattage recommendation is based on a fully overclocked GPU and CPU system configuration. For a more tailored suggestion, please use the “Choose By Wattage” feature on our PSU product page: https://rog.asus.com/event/PSU/ASUS-Power-Supply-Units/index.html * All