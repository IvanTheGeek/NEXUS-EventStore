kind = "plain_text"
text = "**Tokens are subword chunks** - neither full words nor single letters.\n\n## Practical Examples\n\n**Short common words = 1 token:**\n- \"the\" = 1 token\n- \"is\" = 1 token\n- \"cat\" = 1 token\n\n**Longer/uncommon words = multiple tokens:**\n- \"understand\" = 2 tokens (\"under\" + \"stand\")\n- \"methodology\" = 3-4 tokens\n- \"FnMarina\" = 2-3 tokens (uncommon word)\n\n**Technical/domain terms:**\n- \"EventSourcing\" = 2-3 tokens\n- \"IvanTheGeek\" = 3-4 tokens\n- \"Nexus\" = 1 token (common word)\n\n## Rough Conversion\n\n**English text average:**\n- 1 token ≈ 0.75 words\n- 1 token ≈ 4 characters\n- 100 tokens ≈ 75 words ≈ 1-2 paragraphs\n\n**Your use case (structured events):**\n```yaml\nevent_type: DecisionCaptured  # ~5 tokens\ntimestamp: 2025-11-19T...     # ~8 tokens\ndescription: \"Created...\"     # ~10-15 tokens per sentence\n```\nA typical Nexus event might be 50-200 tokens.\n\n## Why It Matters for Performance\n\nWhen I said \"50 tokens/sec\" on RTX 3070:\n- That's ~37 words/second\n- ~150 characters/second\n- A short paragraph in 2-3 seconds\n\n**Your decision logging context:**\n- User submits event capture form\n- Model generates 100-200 token response (validation, suggestions, cross-references)\n- Takes 2-4 seconds on desktop GPU\n- Perfectly acceptable latency\n\n## Token Counting Impact\n\n**Context window (Phi-3-mini: 4K tokens):**\n- ≈ 3,000 words\n- ≈ 6-8 pages single-spaced text\n- Enough for: current event + last 20-50 past events + conversation\n\nThis is why you need RAG or summarization for long event histories - can't fit entire project history in context.\n\nDoes this change your thinking on model sizing or response expectations?"

