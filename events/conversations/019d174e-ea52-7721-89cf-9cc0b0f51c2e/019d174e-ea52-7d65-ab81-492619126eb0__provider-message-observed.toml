[[body.segments]]
kind = "plain_text"
text = "## Training from Scratch vs Fine-Tuning\n\n**Creating (Pre-training) a Model:**\n- Requires massive compute (thousands of GPUs for months)\n- Needs enormous datasets (trillions of tokens)\n- Costs millions to billions of dollars\n- Learns language fundamentals, world knowledge, reasoning from scratch\n- Results in a base model with general capabilities\n\n**Fine-Tuning a Model:**\n- Uses consumer/small business hardware (single GPU to dozens)\n- Needs domain-specific datasets (thousands to millions of examples)\n- Costs hundreds to thousands of dollars\n- Adapts existing knowledge to specific tasks/styles/domains\n- Preserves base capabilities while specializing behavior\n\n**Technical Differences:**\n\n*Pre-training:*\n- Self-supervised learning on raw text (predict next token)\n- All weights trained from random initialization\n- Creates the foundational knowledge base\n\n*Fine-tuning:*\n- Supervised learning on task-specific data (input → desired output)\n- Updates some/all weights of pre-trained model\n- Methods range from full fine-tuning to parameter-efficient (LoRA, adapters)\n\n**Practical Reality:**\n\nAlmost no one trains from scratch anymore except major labs (OpenAI, Anthropic, Meta, Google). The compute barrier is prohibitive - even a relatively small 7B parameter model requires significant infrastructure for pre-training.\n\nFor your three-tier system design (RAG → LoRA → Full Fine-tuning), you're correctly identifying the progression of how deeply you can embed methodology:\n- RAG: No model changes, context injection\n- LoRA: Lightweight adaptation (~1-2% of parameters)\n- Full fine-tuning: Complete specialization (all parameters)\n\nIs there a specific aspect you're evaluating for your Nexus/methodology internalization plans?"

