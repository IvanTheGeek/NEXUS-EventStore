text = "**Exactly!** That's a powerful insight.\n\n## Your F# Layer Controls Everything\n\n```fsharp\nlet buildPrompt userId query =\n    // 1. User preferences (from Nexus/LoRA metadata)\n    let preferences = nexus.GetUserPreferences(userId)\n    \n    // 2. Methodology rules (always consistent)\n    let methodologyRules = \"\"\"\nEvent Modeling Principles:\n- Events are immutable facts\n- Paths represent user journeys\n- Decisions require rationale\n- Follow Junie guidelines for documentation\n\"\"\"\n    \n    // 3. Output format instructions\n    let outputFormat = \"\"\"\nOutput format:\n1. Reasoning: Brief analysis (2-3 bullet points)\n2. Confidence: low/medium/high\n3. Response: Your answer\n4. Suggested event type: DecisionCaptured/QuestionAsked/etc\n\"\"\"\n    \n    // 4. Retrieved context (RAG)\n    let relevantContext = nexus.SearchEvents(query)\n    \n    // 5. Construct final prompt\n    $\"\"\"\n{methodologyRules}\n\nUser preferences:\n- Communication style: {preferences.style}\n- Technical depth: {preferences.depth}\n- Preferred formats: {preferences.formats}\n\nRelevant past decisions:\n{relevantContext}\n\n{outputFormat}\n\nUser query: {query}\n\"\"\"\n```\n\n## Why This Is Powerful\n\n**Model doesn't need to \"remember\" rules** - you inject them every time:\n- ✅ Consistent across all requests\n- ✅ Easy to update (change F# code, not retrain model)\n- ✅ User-specific customization\n- ✅ A/B testable (different users get different rules)\n\n**Fine-tuning focuses on domain expertise only:**\n- Event sourcing patterns\n- Technical reasoning quality\n- F# idioms\n- Architecture principles\n\n**NOT:**\n- User preferences (injected via prompt)\n- Output formats (injected via prompt)\n- Methodology rules (injected via prompt)\n\n## Preferences vs Fine-tuning vs LoRA\n\n**Via Prompt Injection (your F# layer):**\n- Communication style\n- Output format preferences\n- Active methodology version\n- Project-specific rules\n\n**Via Fine-tuning (permanent model knowledge):**\n- Event modeling fundamentals\n- Common decision patterns\n- Technical domain knowledge\n- Reasoning quality\n\n**Via LoRA (per-user adaptation):**\n- Writing style nuance\n- Domain-specific jargon\n- Frequent pattern shortcuts\n- Personal context compression\n\n## Dynamic Rule Evolution\n\nSince F# controls prompts, you can:\n\n```fsharp\ntype MethodologyVersion = V1 | V2 | V3\n\nlet getMethodologyRules version =\n    match version with\n    | V1 -> \"Original Junie guidelines...\"\n    | V2 -> \"Updated with path-first approach...\"\n    | V3 -> \"Latest with Penpot integration...\"\n\nlet buildPrompt userId query =\n    let userVersion = nexus.GetUserMethodologyVersion(userId)\n    let rules = getMethodologyRules(userVersion)\n    // ... rest of prompt\n```\n\nDifferent users can be on different methodology versions **without retraining**.\n\n## For Model Evaluation\n\nThis means your test suite should evaluate:\n\n**Given perfect instructions, how well does model:**\n- Follow structured output formats?\n- Apply provided rules correctly?\n- Reason with given context?\n- Match requested style/depth?\n\n**Not:**\n- Does model remember rules? (F# provides them)\n- Does model know preferences? (F# injects them)\n\n## Test Suite Structure (with reasoning)\n\n```fsharp\ntype TestCase = {\n    Name: string\n    Query: string\n    ProvidedContext: string list\n    MethodologyRules: string\n    ExpectedOutputFormat: string\n    UserPreferences: UserPrefs\n}\n\ntype TestResult = {\n    ModelName: string\n    Reasoning: string\n    Confidence: string\n    Response: string\n    SuggestedEventType: string\n    // Evaluation metrics\n    FollowedFormat: bool\n    AppliedRules: bool\n    UsedContext: bool\n    ReasoningQuality: Score\n    ResponseQuality: Score\n    InferenceTimeMs: int\n}\n```\n\nEach test provides complete instructions, measures how well model follows them.\n\n## Example Test Case\n\n```fsharp\nlet testCase1 = {\n    Name = \"Simple technology decision\"\n    Query = \"Should we use Qdrant or pgvector?\"\n    \n    ProvidedContext = [\n        \"Past decision: Chose PostgreSQL for event store\"\n        \"Preference: Minimize service dependencies\"\n    ]\n    \n    MethodologyRules = \"\"\"\n    - Technology decisions require rationale\n    - Consider past decisions for consistency\n    - Favor simplicity over features\n    \"\"\"\n    \n    ExpectedOutputFormat = \"\"\"\n    1. Reasoning: (bullet points)\n    2. Confidence: low/medium/high\n    3. Response: (recommendation)\n    4. Event type: DecisionCaptured\n    \"\"\"\n    \n    UserPreferences = {\n        Style = Direct\n        TechnicalDepth = High\n        IncludeCrossReferences = true\n    }\n}\n```\n\nYou run this against Phi-3, Llama, Qwen, etc., compare results.\n\nReady to design the full test suite schema and evaluation criteria?"

