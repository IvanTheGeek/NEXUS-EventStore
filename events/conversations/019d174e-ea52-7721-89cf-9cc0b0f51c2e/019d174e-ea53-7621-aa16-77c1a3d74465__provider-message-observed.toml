kind = "plain_text"
text = "**No, not directly** - the small model (Phi-3, Llama, etc.) running via standard inference has no native MCP support.\n\n## Why Not\n\n**MCP requires:**\n- Protocol implementation (JSON-RPC, stdio/SSE transport)\n- Tool discovery and invocation logic\n- Session management\n- Built into the **runtime**, not the model\n\n**Claude Desktop has:** MCP client built-in by Anthropic\n\n**Standard inference tools (llama.cpp, transformers, vLLM) have:** No MCP support\n\n## But You CAN Build It\n\n**Option 1: Your Server as MCP Proxy**\n\n```fsharp\n// Your inference server wraps the model\nlet handleUserQuery query =\n    // Model outputs structured tool request\n    let modelOutput = phi3.Generate(query)\n    \n    // Parse tool calls from model output\n    match parseToolCall(modelOutput) with\n    | Some toolCall ->\n        // YOUR code calls Nexus MCP\n        let result = nexusMCP.Invoke(toolCall)\n        // Feed result back to model\n        phi3.Generate(query, previousOutput, result)\n    | None -> \n        modelOutput\n```\n\nYour server becomes the MCP-aware layer that the model talks through.\n\n**Option 2: Function-Calling Models**\n\nSome models trained specifically for this:\n- **Llama 3.1+ (8B, 70B):** Native function calling\n- **Qwen 2.5 (7B, 14B):** Strong tool use\n- **Phi-3.5 (3.8B):** Has tool calling capability\n\nThese output structured JSON tool requests:\n```json\n{\n  \"tool\": \"nexus_search_events\",\n  \"parameters\": {\n    \"query\": \"database decisions\",\n    \"limit\": 10\n  }\n}\n```\n\nYour code:\n1. Parses this JSON\n2. Calls Nexus MCP with those parameters\n3. Returns results to model\n4. Model generates final response\n\n## Comparison to Claude Desktop\n\n**Claude Desktop:**\n```\nUser → Claude Desktop → MCP Server (direct)\n```\n\n**Your Architecture:**\n```\nUser → Mobile UI → Your Server → Small Model\n                                    ↓ (outputs tool request)\n                  Your Server → Nexus MCP\n                                    ↓\n                  Your Server → Small Model (with results)\n                                    ↓\n      Mobile UI ← Your Server ← Final response\n```\n\nYour server orchestrates; model doesn't \"know\" about MCP.\n\n## For Model Evaluation\n\nThis affects your test criteria:\n\n**Must evaluate:**\n- Can model generate valid tool call requests?\n- Does it reason appropriately with tool results?\n- Quality of function-calling syntax (if supported)\n\n**Models with native function calling (Llama 3.1, Qwen 2.5) score better** for your architecture.\n\n## Bottom Line\n\nSmall model won't have MCP like Claude Desktop does. **You're building the bridge.** The model just needs to:\n1. Output structured requests for tools\n2. Process results when provided\n3. Generate quality responses\n\nYour F# server handles all actual MCP communication.\n\nDoes this change which models you want to evaluate? Function-calling capability becomes important."

