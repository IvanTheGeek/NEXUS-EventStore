his is automatic, since the objects already in the database just have the default behavior, that should be the same as before the change. And the new features apply to new or edited objects. But if this is not possible, and we are talking of a breaking change, you can write a data migration. Just define a new data version and a migration script in migrations.cljc and increment file-version in common.cljc. From then on, every time a file is loaded from the database, if its version number is lower than the current version in the app, the file data will be handled to all the needed migration functions. If you later modify and save the file, it will be now updated in database.\n\nThe data structures are one of the most complex and important parts of Penpot. It's critical that the data integrity is always maintained throughout the whole usage, and also file exports & imports and data model evolution. To modify the data structure (the most typical case will be to add a new attribute to the shapes), this list must be checked. This is not an exhaustive list, but all of this is important in general. We prefer that the page and shape attributes are optional. I.E. there is a default object behavior, that occurs when the attribute is not present, and its presence activates some feature (example: if there is no fill-color, the shape is not filled). When you revert to the default state, it's better to remove the attribute than leaving it with null value. There are some process (for example import & export) that filter out and remove all attributes that are null.\n\nIt receives a SVG node (possibly with children) and converts it into a Penpot shape object. There are auxiliary functions to read and convert each group of attributes, from the node properties or the metadata (with the get-meta function). Any attribute that is not included in the export and import functions will not be exported and will be lost if reimporting the file again. ▾ frontend/ ▾ src/ ▾ app/ ▾ main/ ▾ ui/ ▾ vi