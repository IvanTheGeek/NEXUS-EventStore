text = "**Yes!** Penpot has an RPC-style API that can access file data.\n\n## Penpot API Capabilities\n\nPenpot provides an RPC API accessible with personal access tokens for authentication. The API includes endpoints like `/api/rpc/command/get-file` for retrieving file data.\n\n**Example API call:**\n```bash\ncurl -H \"Authorization: Token <your-token>\" \\\n  https://design.penpot.app/api/rpc/command/get-file \\\n  -d '{\"id\": \"file-uuid\"}'\n```\n\n## Data Format\n\nThe API uses Transit format, which may be encapsulated inside JSON and adds datatype information with semantic content. Content negotiation allows both `application/json` and `application/transit+json` content types, with transit encoding used by default.\n\n## This Changes Your Architecture Options\n\n**Option C: Live API Integration (NEW)**\n\n```fsharp\n// Nexus viewer loads directly from Penpot API\nlet loadEventModel fileId =\n    // Authenticate\n    let token = getAccessToken()\n    \n    // Fetch file data from Penpot API\n    let fileData = \n        Http.post \"https://design.penpot.app/api/rpc/command/get-file\"\n        |> withHeader \"Authorization\" $\"Token {token}\"\n        |> withJson {| id = fileId |}\n        |> send\n        |> parseTransitJson\n    \n    // Parse file structure\n    let pages = fileData.pages\n    let shapes = pages |> List.collect (fun p -> p.objects)\n    \n    // Find event model elements\n    let projections = \n        shapes \n        |> List.filter (fun s -> s.name.StartsWith(\"proj-\"))\n    \n    let events =\n        shapes\n        |> List.filter (fun s -> s.name.StartsWith(\"event-\"))\n    \n    // Render + add interactivity\n    renderEventModel shapes\n```\n\n**Pros:**\n- ✅ No export step - always live\n- ✅ Changes in Penpot immediately available\n- ✅ Full semantic data (layers, names, comments, types)\n- ✅ Can build collaborative viewer (multiple users see same design)\n- ✅ Could even allow editing from viewer (update-file endpoint exists)\n\n**Cons:**\n- ❌ Requires authentication\n- ❌ Depends on Penpot server availability\n- ❌ Transit format parsing needed\n- ❌ Network latency\n- ❌ Penpot cloud has CloudFlare protection (may block requests)\n\n## Hybrid Architecture (Best of All Worlds)\n\n**Combine all approaches:**\n\n```fsharp\ntype EventModelSource =\n    | PenpotAPI of fileId: string * token: string\n    | PenpotZip of filePath: string\n    | SVGExport of svgPath: string * metadataPath: string\n\nlet loadEventModel source =\n    match source with\n    | PenpotAPI (fileId, token) ->\n        // Live API - always fresh\n        fetchFromPenpotAPI fileId token\n        \n    | PenpotZip filePath ->\n        // Offline capable - full semantics\n        parsePenpotZip filePath\n        \n    | SVGExport (svgPath, metaPath) ->\n        // Fast render - lightweight\n        loadSvgWithMetadata svgPath metaPath\n```\n\n## For Nexus Event Model Viewer\n\n**Three deployment modes:**\n\n**1. Development Mode (Live API):**\n```fsharp\n// Designer working in Penpot\n// Viewer auto-refreshes from API\n// See changes immediately\nnexus-viewer --source api --file-id abc-123 --watch\n```\n\n**2. Review Mode (API Snapshot):**\n```fsharp\n// Fetch from API once\n// Cache locally\n// Fast loading, no auth needed after first fetch\nnexus-viewer --source api --file-id abc-123 --cache\n```\n\n**3. Production Mode (SVG Export):**\n```fsharp\n// Exported SVG + metadata\n// Embedded in docs/presentations\n// No Penpot dependency\nnexus-viewer --source svg --file event-model.svg\n```\n\n## Clara Event Modeling Workflow\n\n**With API access:**\n\n```\n1. Designer models Clara in Penpot\n   - Designs workflows\n   - Names elements with conventions\n   - Adds comments as GWT specs\n\n2. Nexus viewer connects via API\n   - Loads file structure live\n   - Parses element names/comments\n   - Extracts metadata automatically\n\n3. Developer reviews in viewer\n   - Interactive exploration\n   - GWT specs shown from comments\n   - Can suggest changes\n\n4. Changes pushed to Penpot\n   - Designer updates in Penpot\n   - Viewer refreshes automatically\n   - Collaboration loop closes\n\n5. Export for documentation\n   - Final approved version\n   - Export SVG for embedding\n   - Generate code from metadata\n```\n\n## Practical Implementation\n\n**Start simple, add complexity:**\n\n**Phase 1: SVG Export (MVP)**\n- Works immediately\n- No API complexity\n- Validate concept\n\n**Phase 2: Add ZIP Parsing**\n- Richer metadata\n- Layer structure\n- Comments as specs\n\n**Phase 3: Add API Integration**\n- Live updates\n- Collaborative features\n- No manual exports\n\n**Each phase adds capability without breaking previous approach.**\n\n## Someone Already Built Penpot MCP\n\nThere's a Model Context Protocol server for Penpot that provides programmatic access to design data with API integration.\n\nThis could be interesting for your Nexus MCP integration - you could have Nexus communicate with Penpot via MCP!\n\n**Vision: Nexus ↔ Penpot via MCP**\n```\nClaude Desktop\n    ↓ (MCP)\nNexus Server\n    ↓ (MCP) \nPenpot Server\n    \n# Claude could ask Nexus to fetch/update event models from Penpot\n# All via MCP protocol\n```\n\nWould you want the viewer to use live API access, or stick with static exports?\n\n---\n**Tokens this response:** ~1,450  \n**Total conversation:** ~104,250  \n**Remaining:** ~85,750"

