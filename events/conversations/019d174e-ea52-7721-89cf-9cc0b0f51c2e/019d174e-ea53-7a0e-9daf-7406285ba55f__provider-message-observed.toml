kind = "plain_text"
text = "**Perfect approach** - fits your event sourcing mindset perfectly.\n\n## Architecture\n\n```\nTest Suite (YAML/F# data) \n    ↓\nF# Console Runner\n    ↓\nRun each test case × each model\n    ↓\nLog to Nexus as events\n    ↓\nAnalysis tool reads events\n    ↓\nComparison reports\n```\n\n## Test Suite Definition\n\n```yaml\n# tests/technology-decisions.yaml\n- name: \"Database vector extension choice\"\n  category: technology_decision\n  query: \"Should we use Qdrant or pgvector?\"\n  context:\n    - \"Past: Chose PostgreSQL for event store\"\n    - \"Preference: Minimize dependencies\"\n  methodology_rules: |\n    - Technology decisions require rationale\n    - Consider past decisions\n    - Favor simplicity\n  expected_elements:\n    - reasoning_present: true\n    - confidence_score: true\n    - event_type_suggested: true\n    - cross_references: true\n\n- name: \"F# async pattern question\"\n  category: technical_question\n  query: \"Explain task vs async in F#\"\n  context:\n    - \"User: Experienced F# developer\"\n  methodology_rules: |\n    - Technical depth: High\n    - Use F# terminology\n  expected_elements:\n    - code_examples: true\n    - practical_guidance: true\n```\n\n## F# Console Runner\n\n```fsharp\ntype ModelConfig = {\n    Name: string\n    OllamaModel: string\n    Quantization: string\n    ExpectedVRAM: int\n}\n\ntype TestRun = {\n    RunId: Guid\n    Timestamp: DateTime\n    Models: ModelConfig list\n    TestSuites: string list\n}\n\nlet runEvaluation models testSuites =\n    let runId = Guid.NewGuid()\n    let timestamp = DateTime.UtcNow\n    \n    printfn \"Starting evaluation run: %A\" runId\n    printfn \"Models: %d, Test cases: %d\" models.Length (countTests testSuites)\n    \n    // Log run start to Nexus\n    nexus.LogEvent {\n        EventType = \"ModelEvaluationRunStarted\"\n        RunId = runId\n        Timestamp = timestamp\n        Models = models\n        TestCount = countTests testSuites\n    }\n    \n    // Run each model against each test\n    for model in models do\n        printfn \"\\n=== Testing %s ===\" model.Name\n        \n        for suite in testSuites do\n            let tests = loadTestSuite suite\n            \n            for test in tests do\n                printfn \"  Running: %s\" test.name\n                \n                let result = runSingleTest model test runId\n                \n                // Log to Nexus immediately\n                nexus.LogEvent {\n                    EventType = \"ModelTestCompleted\"\n                    RunId = runId\n                    ModelName = model.Name\n                    TestName = test.name\n                    Result = result\n                    Timestamp = DateTime.UtcNow\n                }\n                \n    printfn \"\\nEvaluation complete. Run ID: %A\" runId\n    runId\n\nlet runSingleTest model test runId =\n    let startTime = DateTime.UtcNow\n    \n    // Build prompt\n    let prompt = buildPrompt test\n    \n    // Call Ollama\n    let response = ollama.Generate(model.OllamaModel, prompt)\n    \n    let endTime = DateTime.UtcNow\n    let durationMs = (endTime - startTime).TotalMilliseconds\n    \n    {\n        Query = test.query\n        Prompt = prompt // Full prompt for debugging\n        Response = response\n        Reasoning = parseReasoning response\n        Confidence = parseConfidence response\n        SuggestedEventType = parseEventType response\n        InferenceTimeMs = int durationMs\n        TokenCount = estimateTokens response\n    }\n```\n\n## Nexus Event Schema\n\n```yaml\n# Event: ModelTestCompleted\nevent_type: ModelTestCompleted\ntimestamp: 2025-11-19T10:30:00Z\nrun_id: \"abc-123-def\"\nmodel:\n  name: \"phi-3-mini-4k\"\n  quantization: \"Q4_K_M\"\n  vram_used: 4.2\ntest:\n  name: \"Database vector extension choice\"\n  category: \"technology_decision\"\nquery: \"Should we use Qdrant or pgvector?\"\nprompt: |\n  [full constructed prompt]\nresponse: |\n  Reasoning:\n  - PostgreSQL already in use for event store\n  - pgvector reduces service dependencies\n  - Qdrant offers better performance but adds complexity\n  \n  Confidence: high\n  \n  Response: Recommend pgvector for simplicity...\n  \n  Event type: DecisionCaptured\nparsed:\n  reasoning_present: true\n  confidence: \"high\"\n  suggested_event_type: \"DecisionCaptured\"\nmetrics:\n  inference_time_ms: 1250\n  token_count: 187\n  vram_peak_gb: 4.2\n```\n\n## Analysis Tool\n\n```fsharp\n// Separate program or command\nlet analyzeRun runId =\n    // Fetch all events for this run\n    let events = \n        nexus.SearchEvents($\"run_id:{runId} AND event_type:ModelTestCompleted\")\n    \n    // Group by model\n    let byModel = \n        events \n        |> List.groupBy (fun e -> e.model.name)\n    \n    // Calculate metrics per model\n    let modelScores =\n        byModel\n        |> List.map (fun (modelName, results) ->\n            {\n                ModelName = modelName\n                TotalTests = results.Length\n                AvgInferenceTime = avgInferenceTime results\n                ReasoningQuality = scoreReasoning results\n                FormatCompliance = scoreFormatCompliance results\n                ContextUsage = scoreContextUsage results\n                OverallScore = calculateOverallScore results\n            })\n    \n    // Generate comparison report\n    generateReport modelScores runId\n\nlet generateReport scores runId =\n    // Could output markdown, HTML, or create Nexus document\n    let markdown = $\"\"\"\n# Model Evaluation Report\nRun ID: {runId}\nDate: {DateTime.UtcNow}\n\n## Overall Rankings\n\n| Model | Score | Inference | Reasoning | Format | Context |\n|-------|-------|-----------|-----------|--------|---------|\n{scores |> formatTableRows}\n\n## Detailed Analysis\n\n### Phi-3-mini-4k\n- Strengths: Fast inference, good format compliance\n- Weaknesses: Weaker reasoning on complex queries\n- Recommendation: Good for simple decision logging\n\n[... detailed breakdowns ...]\n\n## Recommendations\n\nBased on testing, recommend: [model name]\nRationale: [reasoning]\n\"\"\"\n    \n    // Save report as Nexus event\n    nexus.LogEvent {\n        EventType = \"ModelEvaluationReportGenerated\"\n        RunId = runId\n        Report = markdown\n        TopModel = scores |> List.maxBy (fun s -> s.OverallScore)\n    }\n    \n    // Also write to file\n    File.WriteAllText($\"reports/eval-{runId}.md\", markdown)\n    \n    markdown\n```\n\n## Usage\n\n```bash\n# Run evaluation\ndotnet run --project ModelEval -- run \\\n    --models phi3-mini,llama3.2,qwen2.5 \\\n    --suites tests/*.yaml\n\n# Output:\n# Starting evaluation run: abc-123-def\n# Models: 3, Test cases: 15\n# \n# === Testing phi-3-mini-4k ===\n#   Running: Database vector extension choice\n#   Running: F# async pattern question\n#   ...\n# \n# Evaluation complete. Run ID: abc-123-def\n\n# Analyze results\ndotnet run --project ModelEval -- analyze abc-123-def\n\n# Output:\n# Generating report for run: abc-123-def\n# Report saved to: reports/eval-abc-123-def.md\n# \n# Top model: qwen2.5-3b (score: 8.7/10)\n```\n\n## Benefits of This Approach\n\n**Event sourcing:**\n- ✅ Complete audit trail\n- ✅ Can re-analyze without re-running\n- ✅ Compare across runs over time\n- ✅ Track model improvements after fine-tuning\n\n**Iterative refinement:**\n- Add test cases without rerunning all\n- Run subsets during development\n- Compare new models against historical baselines\n\n**Shareable:**\n- Test suites in YAML → easy to share/version\n- Events in Nexus → queryable\n- Reports in markdown → readable\n\n**Practical:**\n- Console app → easy to automate\n- Runs locally → no API costs during eval\n- Logged to Nexus → fits your architecture\n\nWant me to sketch out the scoring logic for reasoning quality and format compliance?"

