text = "The top swimlane is where any actors would be. I would consider an AI like Claude to be in this lane. its kind of where either external access is gained or received and also where true \"decisions\" or choices are made. \nThe swimlane directly under the top (still not sure what to call this conglomerate) is the lane that has either a command in a state change slice, or a projection/read model for a view slice. \nThe bottom swimlane is where the event is in a state change slice. the goal is to produce one event. That might need to be processed and produce another event, and so on, the idea to expand out the information flow in context of the domain being modeled. The workflows, which could have hierarchies involved, connect slices together, so workflow A might have 12 slices. Workflow A is also chained to workflow B in which both together are workflow 1 (again, naming needs to visited and worked on)."

