kind = "tool_result"
text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":null,\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"RTX 5090 Nvlink - Hardware Hub - Level1Techs Forums\",\"url\":\"https://forum.level1techs.com/t/rtx-5090-nvlink/226161\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"level1techs.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=level1techs.com\",\"site_name\":\"Level1Techs\"},\"is_missing\":false,\"text\":\"Anyone has tried RTX 5090 ?, is they can do NVLink ? I think its maybe great for DL training to have two with NVLink if any\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"February 18, 2025\",\"url\":\"https://forum.level1techs.com/t/rtx-5090-nvlink/226161\"}},{\"type\":\"knowledge\",\"title\":\"Blender \\u0026 NVIDIA GeForce RTX 5090: Complete User Guide\",\"url\":\"https://yelzkizi.org/blender-and-nvidia-geforce-rtx-5090/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"yelzkizi.org\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=yelzkizi.org\",\"site_name\":\"Yelzkizi\"},\"is_missing\":false,\"text\":\"Case Size: The reference 5090 FE is ~304 mm long (dual-slot). The 304 mm dual-slot card needs space. Ensure case and motherboard compatibility. Adequate airflow is crucial. This prevents overheating issues. Operating System: Windows 10/11 or a supported Linux distro with the latest NVIDIA drivers. Use Windows 10/11 or Linux with updated drivers. CUDA 12.0\\u002B supports GPU computing. This ensures OS compatibility. Blender runs smoothly. CPU \\u0026 RAM: While the GPU does the rendering heavy lifting, pair it with a strong CPU (e.g. Ryzen 9, Intel i9) to feed data quickly, especially for CPU-based tasks (simulation, physics). A strong CPU like Ryzen 9 or i9 is ideal. At least 16\\u201332 GB RAM is needed. This supports complex scenes. It prevents bottlenecks. NVLink: The RTX 5090 does not support NVLink/SLI bridging. NVLink is unsupported on the 5090. Multi-GPU setups use separate selection.\\n\\nCUDA/OptiX Settings: For Cycles, select OptiX (preferred) or CUDA. Choose OptiX for Cycles rendering. It leverages RTX and Tensor cores. Adjust GPU memory if needed. This maximizes rendering performance. Update Blender (if necessary): Use Blender 3.6 or newer to ensure compatibility with the latest GPUs. Use Blender 3.6\\u002B for 5090 support. Updates ensure hardware compatibility. Incremental patches add features. This prevents compatibility issues. Optional Settings: In Preferences, under System, you can also enable OptiX Prime (for NVLink multi-GPU, though NVLink is not on 5090). OptiX Prime is irrelevant without NVLink. Enable multi-GPU for additional cards. Settings are in Preferences. This supports future setups. Test a Render: Load a GPU-heavy scene and switch the render engine to Cycles (GPU). Test a GPU-heavy scene in Cycles. Confirm the 5090 is rendering.\\n\\nSLI/NVLink: Remember that NVLink is not supported, so don\\u2019t try to bridge cards. NVLink is unsupported on the 5090. Use separate GPUs in Blender. Memory isn\\u2019t shared. This limits multi-GPU setups. Firmware Updates: Some reviewers noted early production cards might need BIOS/firmware updates for stability. Check for BIOS/firmware updates. Early cards may need them. Visit manufacturer sites for patches. This ensures GPU stability. If you encounter any issues (artifacts, crashes), first update drivers and Blender. NVIDIA and Blender forums offer solutions for persistent problems, ensuring smooth operation. The RTX 5090\\u2019s 5th-gen Tensor cores (~3352 AI-TOPs) boost Blender\\u2019s AI-driven features significantly. The OptiX AI denoiser runs faster, reducing noise in renders and viewports efficiently. Future AI tools, like texture generation or procedural modeling, will leverage the 5090\\u2019s high AI performance for quick execution.\\n\\nCan I use multiple RTX 5090 GPUs for even faster rendering? Yes. Blender\\u2019s Cycles can use multiple GPUs in parallel (via OptiX/CUDA multi-device). Simply enable each 5090 in Blender\\u2019s Preferences under System. However, the RTX 5090 does not support NVLink/SLI, so each GPU\\u2019s memory is separate. You can still get near-linear speedup with two cards, but you won\\u2019t share textures between them. When and where can I buy the RTX 5090? The RTX 5090 launched on January 30, 2025. You can buy it from NVIDIA\\u2019s official website and major retailers (e.g. Amazon, Newegg, Best Buy, Micro Center) once available. NVIDIA\\u2019s own product page will list purchase options. Also look for partner AIB cards (ASUS, Gigabyte, etc.) on those sites. Check for official listings to avoid scalpers, and ensure you buy from authorized sellers. Is the RTX 5090 officially released yet?\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"May 7, 2025\",\"url\":\"https://yelzkizi.org/blender-and-nvidia-geforce-rtx-5090/\"}},{\"type\":\"knowledge\",\"title\":\"5090 Upgrade? - New Builds and Planning - Linus Tech Tips\",\"url\":\"https://linustechtips.com/topic/1596043-5090-upgrade/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"linustechtips.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=linustechtips.com\",\"site_name\":\"Linus Tech Tips\"},\"is_missing\":false,\"text\":\"Hey there guys. I was wondering if i should upgrade to a 5090 from a 3090 Ti or get a second 3090 Ti and use NVLink for 48GB of VRAM. My primary use is for rendering in Blender.\\n\\nFire Hazard Build with 9950X3D and 5090FE \\u00B7 Androlium \\u00B7 8 hours ago Posted in New Builds and Planning \\u00B7 2 \\u00B7 Suggestions \\u00B7 Pranam \\u00B7 9 hours ago Posted in Laptops and Pre-Built Systems \\u00B7 4 \\u00B7 Join our Discord server \\u00B7 Get LTT merch \\u00B7 Support us on Floatplane \\u00B7 Support the forum \\u00B7 play_circle_filled \\u00B7 Watch Now \\u00B7 More Videos \\u00B7 Discuss \\u00B7 play_circle_filled \\u00B7 Watch Now \\u00B7 More Videos \\u00B7 play_circle_filled \\u00B7 Watch Now \\u00B7 More Videos \\u00B7 \\u00D7 \\u00B7 Sign Up \\u00B7 Existing user? Sign In \\u00B7 Recent Topics \\u00B7 Search \\u00B7 Forums \\u00B7 Community Standards \\u00B7 All Activity \\u00B7 Back \\u00B7 Status Updates \\u00B7 Recent Topics \\u00B7 Blogs \\u00B7 Gallery \\u00B7 Events \\u00B7 Downloads \\u00B7 Online Users \\u00B7\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"April 27, 2025\",\"url\":\"https://linustechtips.com/topic/1596043-5090-upgrade/\"}},{\"type\":\"knowledge\",\"title\":\"NVLink High-Speed GPU Interconnect | NVIDIA Quadro\",\"url\":\"https://www.nvidia.com/en-us/products/workstations/nvlink-bridges/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"nvidia.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=nvidia.com\",\"site_name\":\"NVIDIA\"},\"is_missing\":false,\"text\":\"Securely run the most demanding workloads in a virtualized environment with NVLink support in NVIDIA RTX Virtual Workstation software (RTX vWS). ... Talk with an NVIDIA design and visualization partner or shop the NVIDIA store. ... Talk to an NVIDIA product specialist about your professional needs.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.nvidia.com/en-us/products/workstations/nvlink-bridges/\"}},{\"type\":\"knowledge\",\"title\":\"ZT-B50900J-10P-RETAIL - Retail - Zotac Gaming Geforce RTX 5090 Solid OC Edition GPU 32GB 21760 Cuda Cores Memory Interface 512 BIT Gddr7 PCI-E 5.0 X16 ( 3 ) Three Displayports DP ( 1 ) ONE Hdmi Graphics Processing Unit Video Card Nvidia Blackwell Architecture Triple FAN Triple Slot Dimensions 13 Inch X 5.4 IN X 2.7 Inch Includes X1 16P TO 4x8pin PWR CBL Adpt PN: 246-10498-0000h / Spectra Link Cable / GPU Support Stand ( UPC 810012085380 / EAN JAN 8886307700001 )\",\"url\":\"https://www.itcreations.com/product/151575\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"itcreations.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=itcreations.com\",\"site_name\":\"IT Creations\"},\"is_missing\":false,\"text\":\"CONTENT KIT INCLUDES: ( 1 ) ONE ZOTAC NVIDIA GEFORCE RTX 5090 GPU ( 1 ) ONE 16P TO 4X8PIN PWR CBL ADPT / ( 1 ) ONE SPECTRA LINK CABLE / ( 1 ) ONE GPU SUPPORT STAND \\u00B7 ENGINE SPECS: ENGINE ARCHITECTURE: NVIDIA BLACKWELL \\u00B7 CUDA CORES: 21760 \\u00B7 TENSORE CORES: 680 \\u00B7 RT CORES: 170 \\u00B7 GPU CLOCK: 2017 MHZ \\u00B7 BOOST CLOCK: 2422 MHZ \\u00B7 PROCESS SIZE: 5NM \\u00B7 TRANSISTORS: 92.2 BILLION \\u00B7 DIE SIZE: 750 MM SQUARE \\u00B7 MEMORY: MEMORY CONFIGURATION: 32GB \\u00B7 MEMORY INTERFACE: GDDR7 \\u00B7 MEMORY INTERFACE WIDTH: 512 BIT \\u00B7 MEMORY BANDWIDTH: 1.79 TB/S \\u00B7 MEMORY CLOCK: 28 GB/S \\u00B7 SUPPORT: BUS SUPPORT: PCI-E 5.0 \\u00B7 PHYSICAL BUS INTERFACE: PCI-E 5.0 X16 \\u00B7 NVLINK SUPPORT: NOT SUPPORTED \\u00B7 OPERATING SYSTEM: MICROSOFT WINDOWS 11 64 BIT / MICROSOFT WINDOWS 10 64 BIT ( V1809 NOVEMBER 2018 OR LATER ) / LINUX 64 BIT \\u00B7 DISPLAY SUPPORT: MULTI MONITOR: YES, UP TO 4 DISPLAYS \\u00B7 DISPLAY RESOLUTION: 8K AT 165HZ WITH DSC OR 4K AT 480HZ \\u00B7\\n\\nCONTENT KIT INCLUDES: ( 1 ) ONE ZOTAC NVIDIA GEFORCE RTX 5090 GPU ( 1 ) ONE 16P TO 4X8PIN PWR CBL ADPT / ( 1 ) ONE SPECTRA LINK CABLE / ( 1 ) ONE GPU SUPPORT STAND ... OPERATING SYSTEM: MICROSOFT WINDOWS 11 64 BIT / MICROSOFT WINDOWS 10 64 BIT ( V1809 NOVEMBER 2018 OR LATER ) / LINUX 64 BIT ... POWER CONNECTORS: ( 1 ) ONE 16 PIN POWER CONNECTOR ( 12P\\u002B4P ) ( 1 ) ONE 6 PIN SPECTRA LINK CONNECTOR ... MEMORY SPACE: SYSTEM MEMORY GREATER THAN OR EQUAL TO GPU MEMORY / TWICE THE GPU MEMORY OR HIGHER RECOMMENDED ... If you know what you want but can\\u0027t find the exact configuration you\\u0027re looking for, have one of our knowledgeable sales staff contact you. Give us a list of the components you would like to incorporate into the system, and the quantities, if more than one.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.itcreations.com/product/151575\"}},{\"type\":\"knowledge\",\"title\":\"NVIDIA Reserves NVLink Support For The RTX 3090 | TechPowerUp\",\"url\":\"https://www.techpowerup.com/271710/nvidia-reserves-nvlink-support-for-the-rtx-3090\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"techpowerup.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=techpowerup.com\",\"site_name\":\"TechPowerUp\"},\"is_missing\":false,\"text\":\"Jan 3rd 2025 NVIDIA GeForce RTX 5090 Features 575 W TDP, RTX 5080 Carries 360 W TDP (217) ... They are really worried that we can use the card for machine learning, I guess. I really hope AMD could do something about the situation. ... SandboThey are really worried that we can use the card for machine learning, I guess. I really hope AMD could do something about the situation.yes, Huang can\\u2019t sleep at night because he\\u2019s afraid someone will use 3080 or god forbid 3070 for professional machine learning activities. Don\\u2019t be ridiculous. ... Sli is dead and gone. It\\u0026#x27;s been dead since pascal. I really do miss SLI and been running sli since gtx 285 whas the big deal. But gtx 1080 TI whas the first card ever I ran as single card config. ... Well, multi-GPU is dead because it absolutely makes zero sense for both NVIDIA and AMD. Not only it requires a huge effort in driver and hardware support for a huge variety of games and applications, they have the financial incentive for its disappearance.\\n\\nNVIDIA has issued another major blow to multi-GPU gaming with their recent RTX 30 series announcement. The only card to support NVLink SLI in this latest generation will be the RTX 3090 and will require a new NVLink bridge which costs 79 USD. NVIDIA reserved NVLink support for the RTX 2070 Super, RTX 2080 Super, RTX 2080, and RTX 2080 Ti in their Turing range of graphics cards. The AMD CrossFire multi-GPU solution has also become irrelevant after support for it was dropped with RDNA. Developer support for the feature has also declined due to the high cost of implementation, small user base, and often poor performance improvements. With the NVIDIA RTX 3090 set to retail for 1499 USD, the cost of a multi-GPU setup will exceed 3079 USD reserving the feature for only the wealthiest of gamers.\\n\\nJan 3rd 2025 NVIDIA GeForce RTX 5090 Features 575 W TDP, RTX 5080 Carries 360 W TDP (217) ... They are really worried that we can use the card for machine learning, I guess. I really hope AMD could do something about the situation. ... SandboThey are really worried that we can use the card for machine learning, I guess. I really hope AMD could do something about the situation.yes, Huang can\\u2019t sleep at night because he\\u2019s afraid someone will use 3080 or god forbid 3070 for professional machine learning activities. Don\\u2019t be ridiculous. ... Sli is dead and gone. It\\u0027s been dead since pascal. I really do miss SLI and been running sli since gtx 285 whas the big deal. But gtx 1080 TI whas the first card ever I ran as single card config. ... Well, multi-GPU is dead because it absolutely makes zero sense for both NVIDIA and AMD. Not only it requires a huge effort in driver and hardware support for a huge variety of games and applications, they have the financial incentive for its disappearance.\\n\\nIf you buy RTX 3090 for gaming, something is wrong with you. I don\\u0027t care if you are rich. It just means you are a fool with too much money. It\\u0027s a card for professional use and you would be better off just buying RTX 3080, watercooling it and OC-ing the shit out of it. Btw. does anyone doubt that there will be RTX 3080 Ti? ... Absolutely understandable. Paying double the price for marginal performance improvements, possible vram limitations and poor compatibility never made any sense imo. Besides, if this new generation delivers what it promises, no one will need a second gpu anyway. ... Nvidia is approaching Apple-tier ridiculous pricing. But do they have the brainwashed, cult-like following, like Apple does, to get away with fleecing their customers? ... Does anyone still care about mGPU? The tech never lived up to its initial promises (anyone remembers \\u0022don\\u0027t get rid of your old video card, just install a new one on the side and enjoy\\u0022?) and support was always spotty.\\n\\nDuxCrodoes anyone doubt that there will be RTX 3080 Ti?RTX 3080 Super or Ti with 20GB GDDR6X Also: www.techpowerup.com/forums/threads/lenovo-equips-legion-t7-with-geforce-rtx-3070-ti-16gb-gddr6.271674/ ... DuxCroBtw. does anyone doubt that there will be RTX 3080 Ti?There\\u0027s certainly room for them, but their existence depends heavily on how RDNA2 turns out. ... DuxCroIf you buy RTX 3090 for gaming, something is wrong with you. I don\\u0027t care if you are rich. It just means you are a fool with too much money. It\\u0027s a card for professional use and you would be better off just buying RTX 3080, watercooling it and OC-ing the shit out of it. Btw. does anyone doubt that there will be RTX 3080 Ti?It\\u0027s a gaming card. Professionals use Quadros (or rarely Titans) because of the certified drivers that make a 1060-equivalent Quadro P2000 over 7x faster than a 2080 Ti in professional use cases: ...\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.techpowerup.com/271710/nvidia-reserves-nvlink-support-for-the-rtx-3090\"}},{\"type\":\"knowledge\",\"title\":\"GeForce RTX 5090 Graphics Cards | NVIDIA\",\"url\":\"https://www.nvidia.com/en-us/geforce/graphics-cards/50-series/rtx-5090/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"nvidia.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=nvidia.com\",\"site_name\":\"NVIDIA\"},\"is_missing\":false,\"text\":\"The NVIDIA\\u00AE GeForce RTX\\u2122 5090 is the most powerful GeForce GPU ever made, bringing game-changing capabilities to gamers and creators. Tackle the most advanced models and most challenging creative workloads with unprecedented AI horsepower. Game with full ray tracing and the lowest latency. The GeForce RTX 5090 is powered by the NVIDIA Blackwell architecture and equipped with 32 GB of super-fast GDDR7 memory, so you can do it all. ... 4K, Max Settings, DLSS Super Resolution and DLSS Ray Reconstruction on 40 and 50 Series; Frame Gen on 40 Series. Multi Frame Gen (4X Mode) on 50 Series. Horizon Forbidden West supports DLSS 3. RTX. It\\u2019s On. RTX is the most advanced platform for full ray tracing and neural rendering technologies that are revolutionizing the ways we play and create. Over 700 games and applications use RTX to deliver realistic graphics and incredibly fast performance with cutting-edge AI features like DLSS Multi Frame Generation.\\n\\n3x PCIe 8-pin cables from power supply to included RTX 5090 Power Connector Adapter. Graphics card supports 3x or 4x PCIe 8-pin cables. Power Compatibility Option 2. 1x 450W or greater PCIe Gen 5 power cable from power supply \\u00B7 Three unused expansion slots. Reserving clearance around the graphics card equivalent to an unused expansion slot will typically improve airflow. Clearance: Must have space for 12\\u0022 (304mm) x 5.4\\u0022 (137mm) x 3-slot card (61mm).\\n\\nGeForce RTX 5090, 4K, RT Overdrive, Max Settings, DLSS with Multi Frame Generation (4X Mode), Ray Reconstruction, Super Resolution (Performance Mode) ... The NVIDIA Blackwell architecture unlocks the game-changing realism of full ray tracing. Experience cinematic quality visuals at unprecedented speed powered by GeForce RTX 50 Series with fourth-gen RT Cores and breakthrough neural rendering technologies accelerated with fifth-gen Tensor Cores. ... Reflex technologies optimize the graphics pipeline for ultimate responsiveness, providing faster target acquisition, quicker reaction times, and improved aim precision in competitive games. Reflex 2 introduces Frame Warp (coming soon!), which further reduces latency based on the game\\u2019s latest mouse input. ... Upgrade to advanced AI with NVIDIA GeForce RTX\\u2122 GPUs and accelerate your gaming, creating, productivity, and development.\\n\\nNVIDIA Studio is your creative advantage. GeForce RTX 50 Series GPUs unlock transformative performance in video editing, 3D rendering, and graphic design. Experience RTX accelerations in top creative apps, world-class NVIDIA Studio drivers engineered and continually updated to provide maximum stability, and a suite of exclusive tools that harness the power of RTX for AI-assisted creative workflows. ... Take your livestreams, voice chats, and video calls to the next level with AI-enhanced voice and video. Remove distracting background noise, customize your background, and more at the touch of a button. ... RTX Video Super Resolution and HDR uses AI to transform your videos in Chrome, Edge, or Firefox\\u2014automatically sharpening details and wiping out compression artifacts. Enjoy stunning clarity in up to 4K. ... RTX Remix allows modders to easily capture game assets, enhance materials with AI tools, and create stunning RTX remasters with ray tracing and DLSS.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.nvidia.com/en-us/geforce/graphics-cards/50-series/rtx-5090/\"}},{\"type\":\"knowledge\",\"title\":\"ASUS TUF Gaming GeForce RTX\\u2122 5090 32GB GDDR7 - Tech Specs\",\"url\":\"https://www.asus.com/motherboards-components/graphics-cards/tuf-gaming/tuf-rtx5090-32g-gaming/techspec/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"asus.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=asus.com\",\"site_name\":\"ASUS\"},\"is_missing\":false,\"text\":\"NVIDIA\\u00AE GeForce RTX\\u2122 5090 \\u00B7 ... HDMI 2.1b) Yes x 3 (Native DisplayPort 2.1b) HDCP Support Yes (2.3) Maximum Display Support \\u00B7 4 \\u00B7 NVlink/ Crossfire Support \\u00B7 No \\u00B7 Accessories \\u00B7 1 x Speedsetup Manual 1 x TUF Graphics Card Holder 1 x TUF Velcro Hook \\u0026amp; Loop 1 x TUF ...\\n\\nNVIDIA\\u00AE GeForce RTX\\u2122 5090 \\u00B7 AI Performance \\u00B7 3352 TOPs \\u00B7 Bus Standard \\u00B7 PCI Express 5.0 \\u00B7 OpenGL \\u00B7 OpenGL\\u00AE4.6 \\u00B7 Video Memory \\u00B7 32GB GDDR7 \\u00B7 Engine Clock \\u00B7 OC mode: 2437 MHz Default mode: 2407 MHz(Boost clock) CUDA Core \\u00B7 21760 \\u00B7 Memory Speed \\u00B7 28 Gbps \\u00B7 Memory Interface \\u00B7 512-bit \\u00B7 Resolution \\u00B7 Digital Max Resolution 7680 x 4320 \\u00B7 Interface \\u00B7 Yes x 2 (Native HDMI 2.1b) Yes x 3 (Native DisplayPort 2.1b) HDCP Support Yes (2.3) Maximum Display Support \\u00B7 4 \\u00B7 NVlink/ Crossfire Support \\u00B7 No \\u00B7 Accessories \\u00B7 1 x Speedsetup Manual 1 x TUF Graphics Card Holder 1 x TUF Velcro Hook \\u0026 Loop 1 x TUF Magnet 1 x TUF Gaming Certificate 1 x Thank You Card 1 x Adapter Cable (1 to 4)\\u200B \\u00B7 Software \\u00B7 ASUS GPU Tweak III \\u0026 MuseTree \\u0026 GeForce Game Ready Driver \\u0026 Studio Driver: please download all software from the support site. Dimensions \\u00B7 348 x 146 x 72 mm 13.7 x 5.7 x 2.8 inch \\u00B7\\n\\nASUS GPU Tweak III \\u0026 MuseTree \\u0026 GeForce Game Ready Driver \\u0026 Studio Driver: please download all software from the support site. ... * Our wattage recommendation is based on a fully overclocked GPU and CPU system configuration. For a more tailored suggestion, please use the \\u201CChoose By Wattage\\u201D feature on our PSU product page: https://rog.asus.com/event/PSU/ASUS-Power-Supply-Units/index.html * All specifications are subject to change without notice. Please check with your supplier for exact offers. Products may not be available in all markets. If you do not use the latest and current specifications of ASUS products, you shall be liable for all loss and damage claimed by third party to ASUS based on false advertising or any other issues caused from using false specifications of ASUS products. * Maximum Display Support is specifically applied to simultaneous display situation.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.asus.com/motherboards-components/graphics-cards/tuf-gaming/tuf-rtx5090-32g-gaming/techspec/\"}},{\"type\":\"knowledge\",\"title\":\"NVIDIA NVLink Bridge Compatibility Chart | Puget Systems\",\"url\":\"https://www.pugetsystems.com/labs/articles/nvidia-nvlink-bridge-compatibility-chart-1330/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"pugetsystems.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=pugetsystems.com\",\"site_name\":\"Puget Systems\"},\"is_missing\":false,\"text\":\"Several Quadro video cards support NVLink, along with some of the new GeForce RTX 20-series cards and the Titan RTX. NVLink bridges are available with Quadro or GeForce branding in various sizes.\\n\\nUsing NVLink requires a physical bridge between two identical NVIDIA graphics cards, but several models of bridges have been sold with different branding. Which versions work with which GeForce, Titan, and Quadro graphics cards?\\n\\nHowever, NVLink requires a physical bridge between the cards in order to enable these capabilities \\u2013 and NVIDIA isn\\u0027t transparent as to which models of the NVLink bridge will work with which video cards. Several Quadro video cards support NVLink, along with some of the new GeForce RTX 20-series cards and the Titan RTX. NVLink bridges are available with Quadro or GeForce branding in various sizes. If you have already set up a system with NVLink, you can find instructions for enabling and testing it on another article. Reminder: Even if NVLink is enabled and functioning, it depends on software support to provide any practical benefit. Check with the developers of your application(s) to see if they have implemented or plan to add NVLink support. Here is a chart of all the NVLink compatible video cards, as of publishing time, along with the various NVLink bridges that are available: For the combinations indicated as \\u0022Works\\u0022, we specified whether we have actually tested it or it is just ass\\n\\nThe good news here is that, if you are using hardware from the RTX generation \\u2013 except for the Quadro RTX 5000 \\u2013 it looks like you can use a GeForce, Titan, or Quadro branded bridge without needing to worry about compatibility. That is particularly helpful since they come in different sizes: 2- and 3-slot for Quadro and 3- and 4-slot for GeForce / Titan. I\\u0027m not sure why NVIDIA didn\\u0027t just make 2-, 3-, and 4-slot solutions that were brand agnostic\\u2026 but at least there don\\u0027t seem to be any weird limitations on which bridges work with which cards. They are also all the same price, as of publishing time, if purchased directly from NVIDIA. The older GP100 and GV100 are a different story, and if you are using those you should just stick with the paired bridges built for each model, respectively. Reminder: Even if NVLink is enabled and functioning, it depends on software support to provide any practical benefit.\\n\\nFor example, the Quadro 6000 RTX NVLink Bridge is clearly designed to work on the Quadro RTX 6000, as well as the upcoming 8000 \\u2013 but we only have RTX 6000s in-house to test currently. Likewise, the RTX 5000 has its own bridge designed for its smaller NVLink connector \\u2013 so it should work, by design. \\u0022Should Work\\u0022 indications are used where we believe the combination will work based on other testing we have done, but we don\\u0027t have samples on hand to verify for sure. \\u0022Does Not Work\\u0022 should be self explanatory. The main takeaways from our testing are as follows: The older Quadro GP100 cards were equipped with the first generation of NVLink, and had less bandwidth per link than newer models. As such, the Quadro GP100 bridges do not work with newer cards. The Quadro GV100 cards use the second generation of NVLink, and like the GP100 have two NVLink connectors per card.\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"January 15, 2019\",\"url\":\"https://www.pugetsystems.com/labs/articles/nvidia-nvlink-bridge-compatibility-chart-1330/\"}},{\"type\":\"knowledge\",\"title\":\"Nvidia To Support NVLink Only for RTX 3090 | Tom\\u0027s Hardware\",\"url\":\"https://www.tomshardware.com/news/nvidia-to-support-nvlink-only-for-rtx-3090\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"tomshardware.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=tomshardware.com\",\"site_name\":\"Tom\\u0027s Hardware\"},\"is_missing\":false,\"text\":\"PC Gaming Official Borderlands 4 GPU setting recommendations peg 4K performance with the RTX 5090 at 60 FPS, with DLSS and frame generation enabled \\u00B7 PC Gaming As expected, Nvidia\\u0027s $3,999 mini AI supercomputer is terrible for gaming \\u00B7 GPUs Nvidia Rubin CPX die shot allegedly reveals ROPs, raster units, and display pipes \\u2014 forming the potential foundation for the RTX 6090 \\u00B7 Cloud Gaming Nvidia upgrades GeForce Now gaming with RTX 5080 power ... When you purchase through links on our site, we may earn an affiliate commission. Here\\u2019s how it works. It\\u0027s no secret that Nvidia SLI is basically dead for games and graphics cards. While Nvidia supported NVLink on the RTX 2070 Super, 2080 Super, and RTX 2080 Ti, it was never really worth it from a performance perspective in gaming due to underwhelming scaling. Now, with the RTX 30-series cards based on the Ampere architecture, Nvidia is dropping NVLink on all cards but the top-tier GeForce RTX 3090.\\n\\nRTX 5090 blower GPU sells for $5,999 at U.S. retailer \\u2014 dual-slot design converts Blackwell gaming flagship into an AI workhorse \\u00B7 Early RTX 5090D V2 benchmarks suggest that maybe 384-bit memory is just fine after all \\u00B7 The RTX 3070 is supposed to be faster than the RTX 2080 Ti, and the RTX 3080 is double the RTX 2080 performance. Plenty of games already run into CPU bottlenecks at 1080p, and with even faster graphics cards coming, 1440p will be in a similar state on Nvidia\\u0027s top two GPUs. Doubling down on the RTX 3080 would probably only yield a 25% boost in performance, and that\\u0027s still only in games that support multi-GPU. How many demanding games of the past two years have even bothered with multi-GPU support? None of the ray tracing enabled games have done so, and even games that have SLI profiles (e.g., Star Wars: Jedi Fallen Order) had questionable results.\\n\\nRTX 5090 blower GPU sells for $5,999 at U.S. retailer \\u2014 dual-slot design converts Blackwell gaming flagship into an AI workhorse \\u00B7 Nvidia\\u2019s unreleased RTX Titan Ada almost shipped with a monster dual 12VHPWR to 6x 8-pin adapter \\u00B7 \\u2018Never in your life buy a 5090 Founders Edition\\u2019 \\u2014 repair tech slams Nvidia\\u2019s flagship GPU design \\u00B7 Noctua says Nvidia doesn\\u0027t have enough dies to make big, brown, RTX 5090 \\u00B7 Nvidia\\u0027s next-gen AI chip could double the price of H20 if China export is approved ... OpenAI\\u2019s colossal AI data center targets would consume as much electricity as entire nation of India \\u00B7 Tape keeps kicking, \\u0027breakthrough\\u0027 40TB native spec announced \\u00B7 Banned Russian antivirus maker Kaspersky rolls out new products \\u00B7 Intel stomps down 30 bugs including privilege escalation vulnerabilities \\u00B7 Top Microsoft exec\\u0027s boast about Windows \\u0027evolving into an agentic OS\\u0027 provokes furious backlash over AI \\u00B7\\n\\nNvidia\\u0027s 30-series GPUs are so powerful, we doubt anyone will miss multi-GPU\",\"is_citable\":true,\"prompt_context_metadata\":{\"age\":\"September 3, 2020\",\"url\":\"https://www.tomshardware.com/news/nvidia-to-support-nvlink-only-for-rtx-3090\"}},{\"type\":\"text\",\"text\":\"\\u003Csystem\\u003EYou only have 19 searches left this turn\\u003C/system\\u003E\\n\\n\",\"uuid\":\"5546586b-0382-4ae0-996b-0733b869e0ea\"}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":null,\"display_content\":null}"

