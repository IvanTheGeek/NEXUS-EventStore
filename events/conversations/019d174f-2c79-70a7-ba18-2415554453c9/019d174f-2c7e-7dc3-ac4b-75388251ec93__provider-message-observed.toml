text = "fileciteturn0file0\n\nResidential Lease Agreement\n\nParties and Premises\n\nThis Residential Lease Agreement (“Agreement”) is made on [Date] between [Landlord Name] (“Landlord”)\nand [Tenant Name] (“Tenant”). Landlord leases to Tenant the premises located at [Property Address] (the\n“Premises”) under the terms of this Agreement.\n\nTerm of Lease\n\nThe lease term begins on  [Start Date] and ends on  [End Date] (“Lease Term”), unless terminated earlier\npursuant to this  Agreement.  Unless either party gives at  least  [30 days] written notice of  non-renewal\nbefore the end of the Lease Term, the tenancy may continue on a month-to-month basis under the same\nterms.\n\nRent\n\nTenant shall pay monthly rent of $[Rent Amount], due on the [Due Date] of each month (e.g., the 1st day\nof each month). Rent shall be paid to [Landlord Name] at [Payment Address or Method] or as directed by\nLandlord. If rent is not received by the due date, it will be considered late and may be subject to a late fee as\nallowed by law.\n\nSecurity Deposit\n\nTenant  shall  pay  a  security  deposit  of  $[Security  Deposit  Amount] to  Landlord  upon  signing  this\nAgreement. The security deposit will be held by Landlord in accordance with applicable law and will secure\nTenant’s performance of this Lease. Within [X] days after Tenant vacates the Premises and returns all keys,\nLandlord shall return the security deposit to Tenant, minus any lawful deductions for unpaid rent or for\nrepairing damage beyond normal wear and tear, along with an itemized statement of any deductions.\n\nUtilities\n\nTenant: Responsible for arranging and paying all utility services for the Premises, including [list of\nTenant-responsible utilities, e.g., electricity, gas, water, trash, internet], unless otherwise\nagreed in writing. \nLandlord: Responsible for [list of any utilities or services Landlord will pay/provide; if none,\nwrite \"none\"]. (Landlord is not liable for interruptions in service beyond their control.)\n\n• \n\n• \n\n1\n\nhttps://chatgpt.com/?utm_src=deep-research-pdf\nhttps://chatgpt.com/?utm_src=deep-research-pdf\n\n\nQuiet Hours\n\nTenant shall refrain from creating excessive noise or disturbances between  10:00 PM and 8:00 AM daily.\nDuring these quiet hours, no loud music, parties, or other disruptive activities are permitted that would\ndisturb neighbors’ peace and quiet. A violation of this Quiet Hours clause constitutes a material breach of\nthis Agreement.\n\nUse and Occupancy\n\nTenant shall use the Premises solely as a private residence and not for any commercial or illegal purpose.\nOccupancy is limited to [Tenant Name] and [Authorized Occupant Names and/or number of occupants].\nTenant shall  not permit any other person to reside in the Premises or sublet/assign this Lease without\nLandlord’s prior written consent.\n\nMaintenance and Repairs\n\nTenant Responsibilities: Tenant shall keep the Premises clean, sanitary, and in good condition.\nTenant must promptly notify Landlord of any maintenance or repair needs. Tenant is responsible for\nminor upkeep (such as replacing light bulbs or batteries) and for any damage to the Premises\ncaused by Tenant or Tenant’s guests beyond normal wear and tear. \nLandlord Responsibilities: Landlord shall maintain the structure and major building systems (e.g.,\nplumbing, electrical, heating) of the Premises in good repair. Landlord is responsible for repairs not\ncaused by Tenant’s misuse or negligence and shall comply with all applicable health and safety laws\nto keep the Premises habitable.\n\nLandlord’s Entry\n\nLandlord may enter the Premises at reasonable times to inspect, make necessary repairs or improvements,\nor show the Premises to prospective tenants or buyers. Except in an emergency, Landlord shall give Tenant\nat least [24 hours] advance notice before entering the Premises, or such notice as required by law.\n\nTermination\n\nThis Lease will terminate on [End Date] unless renewed or extended in writing. Either party may terminate\nthis Lease at the end of the Lease Term (or during any month-to-month continuation) by providing at least\n[30 days] written notice to the other party. Early termination before the end of the Lease Term may occur by\nmutual written agreement of both parties; additionally, if Tenant fails to pay rent or violates any material\nterm of this Agreement, Landlord may terminate the Lease in accordance with law and pursue eviction if\nnecessary.  Upon  termination  or  expiration  of  the  Lease,  Tenant  shall  vacate  the  Premises,  remove  all\npersonal belongings, and return all  keys to Landlord, leaving the Premises in good and clean condition\n(ordinary wear and tear excepted).\n\n• \n\n• \n\n2\n\n\n\nSignatures\n\nLandlord (Signature): _____ Date: _\nTenant (Signature): ____ Date: ___ \n\n3\n\n\n\tResidential Lease Agreement\n\tParties and Premises\n\tTerm of Lease\n\tRent\n\tSecurity Deposit\n\tUtilities\n\tQuiet Hours\n\tUse and Occupancy\n\tMaintenance and Repairs\n\tLandlord’s Entry\n\tTermination\n\tSignatures"

