text = "yes. like the sample. I think it helps to see when the trip is covering days in the previous month and next month, just with different looks so a report reader sees that the days have trip on the viewable calendar. For the row based views, since the view is not showing days outside the current month, the only thing needed would be to show if the trip is extending into the month on the first rather than starting that day, and the same for the last day of the month, does it end on that day or extend into the next month."

