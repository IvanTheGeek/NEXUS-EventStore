text = "1. CheddarBooks is not created yet, so a bit unknown. But I figure a yaml (I prefer yaml over json) file that can be exported and then imported in CheddarBooks, or maybe a rest api or something would be an option to upload data from the PerDiemLog app to the CheddarBooks. I do not think it will need to hit Cheddar.Tax as it kinda needs to flow through CheddarBooks. CheddarBooks would feed it to Cheddar.Tax\n2.  we can go over  specific interface ideas next if you like"

