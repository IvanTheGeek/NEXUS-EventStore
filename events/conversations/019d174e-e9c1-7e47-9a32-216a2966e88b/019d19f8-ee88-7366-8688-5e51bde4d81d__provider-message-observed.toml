text = "a trip must be at least two days, as the rules would be that you can leave on one day or return on one day, and it is a minimum of 2 days out. If you leave and return on the same day, it would not count for per diem (using the HOS transportation rules). The max days a trip could be is 364 as the rules say to count transportation per diem you must actually have a home (can be a house, apartment, or whatever) because you must be duplicating expenses. Therefore, you must be at home at sometime during the year. looking at the data you used for trips, it is not accounting for when a trip crosses the month boundary.  like in the sample, a trip starts before the 1st of the current month, and 1 ends after the last day of the month. The trip list needs to account for this. So it is helpful to know how long the whole trip is, and then which and what types of days contained in that trip are actually contained in the current month."

