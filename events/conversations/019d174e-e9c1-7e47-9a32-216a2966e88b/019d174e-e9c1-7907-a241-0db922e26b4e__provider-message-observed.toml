text = "Noted:\n- **Partial days (start/end) need clearer visual distinction** from full days\n- **Current approach:** Just lighter green isn't clear enough\n- **Better approach:** Show partial days as **3/4 filled** graphically\n  - Start day: 3/4 filled with empty/open portion indicating it's a start\n  - End day: 3/4 filled with empty/open portion indicating it's an end\n  - Visual curve/shape to show the proportion\n- **Like your concept** but more explicit about the 75% partial calculation\n\nWaiting for more notes..."

