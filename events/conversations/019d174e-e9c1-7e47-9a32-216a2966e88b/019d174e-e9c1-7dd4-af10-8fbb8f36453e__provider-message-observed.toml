text = "actually, Phase 2 will not do those things. The logging system in use has a website where drivers can login and download their logs in pdf form. we should be able to automate that process, and keep local (and/or cloud) copies in our possession. parsing of the logs might be a phase 3 focus, we will see.    Integration with actual HOS/ELD will never be in scope. \nAlso note that the report I uploaded is rather crude and a concept idea. The report we generate should be much more polished and have a more modern look and feel, like the LaundryLog."

