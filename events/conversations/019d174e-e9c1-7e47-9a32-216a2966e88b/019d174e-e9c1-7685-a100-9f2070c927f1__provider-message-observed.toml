text = "1. This is actually both. The actual report and such will be most helpful in a desktop setting. This should probably be formatted as a US letter size paper. Phase 1 will just be able to print the report (which could be actual printing of paper or print to pdf). Phase 2 or 3 might be where the report is made into a PDF by the software, then offered as a download file.  data entry can be on the desktop (especially if entering historical trips like at onboarding), but mobile interface will probably be used for data entry for day-to-day. I can expand on that if you want.  I have specific ideas on the interface, which will be very similar to the report for desktop, and a stacked version for the mobile."

