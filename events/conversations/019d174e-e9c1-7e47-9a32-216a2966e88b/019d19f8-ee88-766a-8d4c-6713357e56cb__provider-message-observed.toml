text = "This is really important information about the business rules:\n\n1. **Minimum trip length:** 2 days (can't leave and return same day)\n2. **Maximum trip length:** 364 days (must be home at some point during the year to maintain a tax home)\n3. **Trips can span months** - this is critical for the display and calculations\n\nLooking at the sample PDF:\n- Trip 1: 03-19-23 to 04-05-23 (18 days total) - starts in March, ends in April\n  - For April report: shows \"1 partial, 4 full\" = 5 days in April (April 1-5, with April 1 being a continuation so... wait, let me re-read)\n  - Actually looking at the calendar, April 1 is green and shows $69 (full day)\n  - April 5 shows $51.75 (partial - end day)\n  - So in April: Days 1-4 are full ($69 each), Day 5 is partial ($51.75)\n  - That matches \"1 partial, 4 full\" but that's only for the days IN April from this trip\n\n- Trip 2: 04-12-23 to 04-14-23 (3 days) - fully contained in April\n  - April 12 is partial (start) $51.75\n  - April 13 is full $69\n  - April 14 is partial (end) $51.75\n  - That's \"2 partial, 1 full\"\n\n- Trip 3: 04-19-23 to 05-19-03 (wait, that's 05-19-03 which seems like a typo for 05-19-23)\n  - Assuming 05-19-23\n  - Starts April 19, ends May 19\n  - In April: April 19-30 = 12 days\n  - April 19 is partial (start) $51.75\n  - April 20-30 are full days (11 days)\n  - That's \"1 partial, 11 full\"\n\nThe trip display requires a comprehensive breakdown, capturing the nuanced details of multi-month travel. It needs to precisely track partial and full days, showing the exact financial impact across different months while maintaining a clear, comprehensive view of the entire trip duration.\n\nI'll focus on distinguishing between partial and full days within the current month's calendar view, ensuring travelers understand their exact trip coverage and associated costs."

