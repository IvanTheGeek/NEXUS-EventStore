kind = "plain_text"
text = "for the desktop, the way that report looks would be the same way the interface looks. the calendar would be the primary way to enter data. click a specific day, and then be able to click another day to create the trip. 1st click being the start, 2nd click being the ending date. If there are trips already in the system, when clicking a start date, only valid dates that can complete the trip would be available, so up until the day before the start of the next trip in the system. \nfor mobile, the calendar would be full width with the 7 days wide. the buttons might be a bit small, but I am willing to try it based on the 7 days being inline width wise. \nthen the trip list section under that, then the summary/calc section under that. \nthere is an idea for an alternative for the calendar in mobile where each day would be a row, and then the trip overlap graphics would go vertical across the rows."

