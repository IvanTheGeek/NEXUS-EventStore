kind = "plain_text"
text = "Got it - this is filling a **gap**, not replacing something:\n\n- Drivers currently have no good way to track/calculate/document their per diem\n- PerDiemTracker creates the documentation and calculations\n- Outputs:\n  - Reports for IRS audit defense\n  - Data feed into CheddarBooks for accounting entries\n  - Exports for other purposes (tax prep, accountant sharing, etc.)\n\nSo it's bridging the gap between \"I drove these days (proven by HOS logs)\" and \"here's my calculated per diem deduction properly documented.\"\n\nStill waiting for answers 3, 4, and 5..."

