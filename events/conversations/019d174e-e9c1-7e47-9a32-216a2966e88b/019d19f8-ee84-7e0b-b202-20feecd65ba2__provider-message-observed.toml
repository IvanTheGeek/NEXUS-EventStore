[[body.segments]]
kind = "reasoning"
text = "So the problem being solved is:\n- Currently, there's NO good system for this - drivers are either not tracking it properly or doing it manually in spreadsheets\n- The output needs to be:\n  1. Documentation for IRS audits (backed by HOS logs they already have)\n  2. Data that feeds into CheddarBooks for accounting\n  3. Exportable reports for various needs\n\nThis is filling a gap that doesn't really have a solution right now. It's not replacing something bad, it's creating something that doesn't exist."

[[body.segments]]
kind = "plain_text"
text = "Got it - this is filling a **gap**, not replacing something:\n\n- Drivers currently have no good way to track/calculate/document their per diem\n- PerDiemTracker creates the documentation and calculations\n- Outputs:\n  - Reports for IRS audit defense\n  - Data feed into CheddarBooks for accounting entries\n  - Exports for other purposes (tax prep, accountant sharing, etc.)\n\nSo it's bridging the gap between \"I drove these days (proven by HOS logs)\" and \"here's my calculated per diem deduction properly documented.\"\n\nStill waiting for answers 3, 4, and 5..."

