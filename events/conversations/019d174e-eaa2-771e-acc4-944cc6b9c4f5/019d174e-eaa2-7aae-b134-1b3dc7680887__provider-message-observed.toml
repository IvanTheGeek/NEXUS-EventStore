text = "Validates clean. Three root causes fixed:\n\n**Filters removed** — Penpot's SVG importer was causing filtered rects to create a compositing layer that buried sibling text elements beneath them. That's why \"LaundryLog\" and \"Record Expense\" were invisible — the text was rendering *behind* the filtered orange rect. No filters needed; the white-card-on-gray-bg gives natural depth anyway.\n\n**Location** — Split into two separate `<text>` elements at the same `y=\"112\"`: gray \"LOCATION:\" at x=28, then green \"Love's #123 | Springfield, OH\" at x=105 (right after where \"LOCATION:\" ends at ~14px font width).\n\n**Text y positions** — Removed all `dominant-baseline=\"central/ideographic\"` usage and computed explicit baseline y values for every element. The submit button \"Record Expense\" is now at y=882 inside a rect from y=841 to y=905."

