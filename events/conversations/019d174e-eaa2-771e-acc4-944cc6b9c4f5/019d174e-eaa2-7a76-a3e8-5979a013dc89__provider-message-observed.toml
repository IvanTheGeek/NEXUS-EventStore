specify sourcesanspro with a sans-serif fallback to ensure consistency across different display contexts.\\n\\nWriting the final SVG...\\n\\nActually, I\\u0027m checking the payment section card dimensions. The card spans from y=751 to y=915 with a height of 164, containing two rows of payment options positioned at specific intervals with proper spacing between them.\\n\\nNow I\\u0027m verifying my shifted coordinates match up correctly\\u2014the card should start at y=675 with the same 164 height, placing the two rows at their new positions with consistent 12-pixel gaps. Before I write out the SVG, I need to reconsider how text baseline positioning works within these card elements to make sure everything aligns properly. I need to structure the LOCATION label with \\u0022LOCATION: \\u0022 in gray and the actual location value in green, using tspans to keep them separate. For the styling, I\\u0027ll use font-weight=\\u0022600\\u0022 for the green value to make it more readable, keeping the label itself at regular weight. I should also handle the ampersand character properly in the SVG text.\\n\\nWriting SVG code... Writing SVG layout... Writing SVG code... Writing the header and location sections... Building the machine type selector... Building the SVG layout... Writing the interactive counter and product details section... Building the price display... Writing the reference price boxes... Building the SVG layout... Building the payment method cards... Writing the submit button and session total... Finishing the SVG layout...\\n\\nNow I\\u0027m verifying the spacing between sections\\u2014the payment card ends at y=839 with proper padding, and the submit button section starts right after at y=849 with its own 10px top padding, so everything aligns correctly. I want to double-check how the tspan element handles the location text when the x attribute isn\\u0027t specified. where the previous tspan ended. But I should set x only on the parent text element or the first