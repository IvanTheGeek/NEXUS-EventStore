need to replace it with a full filter chain using `feGaussianBlur` and `feOffset` instead.\n\nWriting corrected SVG... Writing SVG filter code...\n\nActually, I'm realizing the cleanest approach is to use CSS drop-shadow instead of wrestling with SVG filter definitions across different element sizes—it's well-supported and avoids the complexity of managing multiple filter IDs and coordinate systems.\n\nLet me apply drop-shadow styles directly to the cards and button, and switch to a generic sans-serif fallback for text rendering since Penpot uses a modern browser engine anyway.\n\nNow I'm working through the text positioning more carefully—I need to set explicit y coordinates for each text element rather than relying on dominant-baseline, and I'm calculating the proper vertical offsets based on font size to ensure everything aligns correctly. Looking back at the original SVG, I'll stick with those established y-positions for the header text since they're already working. For the location and machine type cards, I'm calculating the baseline positions based on the container heights and font sizes to keep everything vertically centered within their respective sections.\n\nNow I'm working through the quantity card layout—positioning the minus and plus buttons at the circle centers with adjusted baselines, and placing the \"2\" number at y=350 to match the visual weight of the original. Moving on to the unit price card positioning next. Calculating text positioning for the payment section buttons and submit button, working through baseline offsets for the emoji and label text in each row, then figuring out the vertical alignment for the \"Record Expense\" button text. I'm realizing Penpot might not support CSS filters on SVG elements since it uses its own renderer with native SVG filter syntax instead, so I should switch to the full SVG filter approach with `filterUnits=\"userSpaceOnUse\"` to handle different element sizes properly.\n\nDefining the shadow filter... I see