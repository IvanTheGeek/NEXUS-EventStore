e elements. Writing SVG filter primitives... I'm realizing I can actually mix the coordinate systems—use `objectBoundingBox` for the filter region dimensions but keep `primitiveUnits` at its default `userSpaceOnUse` so the offset and blur values stay in pixels. That's what the original Penpot SVGs are doing, which means the filter region fractions and the pixel-based primitive values work together.\n\nLet me verify the math: for a 343px wide card, -7% gives about -24px of space, and with a 1.5px standard deviation creating roughly 4.5px of shadow spread, there's definitely enough room. The filter region is sized correctly, so the issue might just be that the `%` syntax isn't being parsed properly.\n\nI think the real culprit is that Penpot might not support the `feDropShadow` shorthand—it's a newer SVG primitive. I should replace it with the full filter chain instead. I'll also expand the filter bounds to be more generous and define separate filters for different shadow sizes. Let me check the screenshot again to see what's actually rendering.\n\nLooking at what's visible: the basket emoji is there without an orange background, the CheddarBooks text shows up, the location info displays in green (the tspan worked but there's no space after \"LOCATION:\"), the washer button is orange with its label, and I can see the quantity controls, unit price section, reference chips, and payment buttons with cash selected. The session total and today's entries are visible, but the submit button appears to be missing or rendering as blank white in that area where it should be.\n\nDigging deeper, I think the issue is that elements with the `feDropShadow` filter aren't rendering in Penpot's SVG import—the header's orange background and the submit button's orange rectangle both have that filter applied and aren't showing up. The cards with the smaller shadow filter seem to be rendering, though possibly without the filter effect itself. Let me investigate whether Penpot is stripping out these filters entirely or if there's something else going on. Penpot ignores unknown filter references and just renders the element without the filter. So cards show (just without shadow), but for the header and button which are full-width elements in a stacking context, the white background of the page covers them somehow?\n\nNo that doesn't make sense either. The header rect is at y=0, z-order first, then cards on top. If all filters were ignored, the header orange rect would still show.\n\nUNLESS - Penpot's SVG import has a bug where elements that reference invalid/unsupported filters become invisible? That would explain why the header orange rect (filter=shadow-lg) and submit button (filter=shadow-lg) are invisible, while the cards (filter=shadow-sm) might be visible but unstyled... \n\nBut wait, shadow-sm also uses feDropShadow which also shouldn't be supported. So why are cards visible but not the header and button?\n\nMaybe when feDropShadow is unsupported, the filter result becomes transparent and makes the element invisible, but that doesn't explain why shadow-sm cards are still showing. I'm wondering if the percentage values in the filter primitives could be the culprit—if Penpot doesn't handle percentage-based dimensions properly, it might be treating them as invalid and causing different rendering behavior between shadow-sm and shadow-lg.\n\nLet me try a different approach entirely: skip SVG filters altogether and use CSS drop-shadow instead, which Penpot should support since it runs in a browser engine.\n\nWriting SVG with CSS filters... I'm realizing the user's cards are actually rendering in the screenshot, so the problem might not be about the filter syntax at all—maybe the header and button elements are being hidden for a different reason. Let me reconsider what's actually causing the visibility issue.\n\nThe filter region for shadow-lg with `y=\"-60%\"` is enormous, and Penpot might be clipping the output differently than expected. Or perhaps th