kind = "plain_text"
text = "Looking at the screenshot, the two root causes are:\n1. `feDropShadow` shorthand isn't supported in Penpot — elements using that filter go invisible\n2. `rgba()` in `fill`/`stroke` attributes isn't valid SVG — must use separate `fill-opacity`/`stroke-opacity`\n\nFix: replace all `feDropShadow` with the full primitive chain Penpot uses, fix opacity attributes, apply filters to `<g>` wrappers only."

