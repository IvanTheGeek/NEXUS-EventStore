[[body.segments]]
kind = "reasoning"
text = "The user has uploaded an image showing an American Megatrends BIOS screen with a message about a new CPU being installed and fTPM/PSP NV corruption or structure change. They're asking what this means after flashing the BIOS.\n\nLet me analyze what I see in the image:\n- American Megatrends BIOS Version 2.20.1271, BIOS Date: 10/28/2025 Ver: F67\n- Message: \"New CPU installed, fTPM/PSP NV corrupted or fTPM/PSP NV structure changed.\"\n- Two options:\n  - Press Y to reset fTPM. If you have BitLocker or encryption enabled, the system will not boot without a recovery key\n  - Press N to keep previous fTPM record and continue system boot. fTPM will NOT enable in new CPU, you can swap back to the old CPU to recover TPM related keys and data.\n\nThis is a common message that appears after a BIOS update on AMD systems. The fTPM (firmware Trusted Platform Module) is stored in non-volatile memory on the motherboard/CPU, and BIOS updates can change the structure or cause the system to think it's corrupted.\n\nThe user needs to understand:\n1. What fTPM is\n2. Why this happened\n3. What each option means\n4. What they should choose based on their situation\n\nGiven the user's preferences to be direct and efficient, I should explain this clearly without unnecessary preamble."

[[body.segments]]
kind = "plain_text"
text = "Your BIOS update changed the fTPM (firmware Trusted Platform Module) structure. This is normal after BIOS flashing on AMD systems.\n\n**What happened:**\nThe motherboard's secure storage area (fTPM) either got reset or its format changed during the BIOS update.\n\n**Your options:**\n\n**Press Y** - Resets the fTPM to start fresh\n- Choose this if you DON'T have BitLocker/encryption enabled\n- Safe choice for most users\n- System boots normally with new fTPM\n\n**Press N** - Keeps old fTPM data but disables it\n- Choose this if you HAVE BitLocker enabled and need to retrieve your recovery key first\n- Allows system to boot but fTPM stays disabled\n- Lets you access Windows to get BitLocker keys before resetting\n\n**What you should do:**\n\nDo you have BitLocker or drive encryption enabled? If you're not sure, or if this is a personal desktop without encryption, press **Y** and continue.\n\nIf you definitely have BitLocker enabled and don't have your recovery key handy, press **N** first, boot into Windows, retrieve your recovery key, then come back and reset the fTPM later."

