[[body.segments]]
kind = "plain_text"
text = "All right, another app idea. I had some questions about zoning and putting a garden in my front yard, which is what led to this. And I came across a website called zoneonomics.com, Z-O-N-E-O-M-I-C-S.com. And of course, they're a business trying to make money, but an open source usable version could be that the system has uploaded, or a user, you know, a zoning department, for example, could upload their codified thing, their codified their codes and their rules. And then that could be an AI agent that is familiar with their materials and knows how to answer zoning questions. And so anybody could ask it a simple question and it could do it, and then refer you to the lines of the code that is affecting that answer. And kind of make it organically grown and able to be whatever. And then all the questions that were asked, it could be reviewed. And if it doesn't know or needs improvement, the zoning inspector could actually access their side and make updates and then feed it back into the system to keep learning to make it more accurate."

