text = "ivan-dev-framework-overview.md\n# FnMCP.IvanTheGeekDevFramework - Current State\n\n**Last Updated:** 2025-11-09 (Updated with LaundryLog mobile-first design principles and v7 completion)\n\n## Vision\n\nA comprehensive, MCP-first development framework that enables rapid creation of privacy-focused, open-source applications. The framework centers around Event Modeling with multi-layer perspectives and perspective filtering, uses Penpot as UI source of truth, and leverages a community forum as the central content and collaboration hub. The framework is built around the concept of \"paths\" - specific execution traces through systems that serve as narratives, test cases, and documentation simultaneously.\n\n## Core Philosophy\n\n- **Maximum freedom + practical capitalism**: AGPLv3 licensing with optional paid services\n- **Privacy-first**: No data monetization, transparent open source\n- **Build for yourself first**: Solve real problems you encounter\n- **Excellent UX over poorly designed commercial alternatives**\n- **Community-driven via influence system**: Contributors earn prioritization\n\n## Architecture Overview\n\n### Primary Components\n\n#### Forum System - The Content & Community Hub\n**The central glue connecting all framework aspects:**\n\n**Phased Architecture:**\n- **Phase 1 (Current)**: Markdown files in `/context-library/`\n  - Human-editable source of truth\n  - Version controlled in git\n  - Build process transforms to MCP Resources\n  \n- **Phase 2 (Interim)**: Existing forum software\n  - Evaluating: Talkyard, Discourse, Forem\n  - Self-hosted with data portability\n  - MCP reads via API (always fresh)\n  \n- **Phase 3 (Future)**: Custom event-sourced forum\n  - Event log replaces git for version history\n  - Custom deep threading (better than existing solutions)\n  - Tight EMapp integration\n\n**Forum Functions:**\n- **Wiki/Documentation**: Source for MCP Resources, app specifications\n- **Community Q&A**: Support and knowledge sharing\n- **Feature Requests**: Integrated with influence system voting\n- **Path Refinement**: Community discusses and improves paths\n- **Event Model Validation**: Peer review and feedback\n- **Given-When-Then Catalog**: Organized test scenarios\n\n**Integration Points:**\n- MCP server reads forum content as Resources\n- EMapp can reference forum discussions\n- Penpot designs link to forum specs\n- GWT scenarios stored/organized in forum\n\n#### FnMCP.IvanTheGeekDevFramework\nThe central MCP server that provides:\n- **Tools**: Actions (Penpot manipulation, Event Model updates, code generation, path extraction)\n- **Resources**: Dynamic project state + static methodology from forum/markdown\n- **Prompts**: Interactive workflows for common development tasks\n\n**Content Provider Abstraction:**\n```fsharp\ntype IContentProvider =\n    abstract mem\nivan-dev-framework-overview.md\n**Update Project Knowledge**\n   - Replace old overview with this updated version\n   - Confirm all reference docs are current\n   - Test that new chats can access framework context\n\n2. **Create Context Library Structure**\n   ```\n   context-library/\n   Ã¢â€Å“Ã¢â€â‚¬Ã¢â€â‚¬ philosophy/\n   Ã¢â€â€š   Ã¢â€Å“Ã¢â€â‚¬Ã¢â€â‚¬ development-philosophy.md\n   Ã¢â€â€š   Ã¢â€Å“Ã¢â€â‚¬Ã¢â€â‚¬ cheddar-ecosystem.md\n   Ã¢â€â€š   Ã¢â€â€Ã¢â€â‚¬Ã¢â€â‚¬ influence-system.md\n   Ã¢â€Å“Ã¢â€â‚¬Ã¢â€â‚¬ methodology/\n   Ã¢â€â€š   Ã¢â€Å“Ã¢â€â‚¬Ã¢â€â‚¬ event-modeling-approach.md\n   Ã¢â€â€š   Ã¢â€Å“Ã¢â€â‚¬Ã¢â€â‚¬ domain-modeling-patterns.md\n   Ã¢â€â€š   Ã¢â€Å“Ã¢â€â‚¬Ã¢â€â‚¬ static-state-design.md\n   Ã¢â€â€š   Ã¢â€â€Ã¢â€â‚¬Ã¢â€â‚¬ paths-and-gwt.md\n   Ã¢â€â€Ã¢â€â‚¬Ã¢â€â‚¬ technical/\n       Ã¢â€Å“Ã¢â€â‚¬Ã¢â€â‚¬ f-sharp-conventions.md\n       Ã¢â€Å“Ã¢â€â‚¬Ã¢â€â‚¬ bolero-patterns.md\n       Ã¢â€Å“Ã¢â€â‚¬Ã¢â€â‚¬ penpot-integration.md\n       Ã¢â€â€Ã¢â€â‚¬Ã¢â€â‚¬ mcp-architecture.md\n   ```\n\n3. **Begin FnMCP.IvanTheGeekDevFramework F# Project**\n   - Create solution structure\n   - Implement IContentProvider interface\n   - Build FileSystemProvider (Phase 1)\n   - Create basic MCP server skeleton\n   - Define initial Tools, Resources, Prompts\n\n4. **Continue LaundryLog/PerDiemLog Design**\n   - Refine mockups in Penpot\n   - Define paths through each app\n   - Extract GWT scenarios\n   - Use as proving ground for framework\n\n### Short Term (Next Few Weeks)\n\n5. **Forum Evaluation**\n   - Continue testing Talkyard\n   - Install and evaluate Discourse\n   - Test Forem if needed\n   - Document pros/cons of each\n\n6. **FnAPI.Penpot Foundation**\n   - Research Penpot API capabilities\n   - Test prototype connection extraction\n   - Build basic API wrapper in F#\n   - Validate path extraction feasibility\n\n7. **EMapp Prototype**\n   - Build simple HTML/Bolero prototype\n   - Test perspective filtering UI\n   - Implement Choose Your Own Adventure navigation\n   - Connect to sample Event Model data\n\n### Medium Term (Months)\n\n8. **Forum Selection and Setup**\n   - Choose interim forum solution\n   - Self-host and configure\n   - Migrate initial content from markdown\n   - Set up API integration with MCP\n\n9. **Complete MCP Server**\n   - Implement all planned tools\n   - Add comprehensive resources\n   - Create useful prompts\n   - Package for distribution\n\n10. **Production Apps**\n    - Complete LaundryLog Phase 1\n    - Complete PerDiemLog Phase 1\n    - Deploy to users\n    - Gather feedback for framework refinement\n\n### Long Term (Future)\n\n11. **Custom Forum Development**\n    - Decision point on custom build\n    - Event sourcing architecture\n    - Deep threading implementation\n    - Tight EMapp integration\n\n12. **Framework Maturity**\n    - Refine based on real usage\n    - Document patterns and anti-patterns\n    - Build community around framework\n    - Enable others to use for their projects\n\n---\n\n**Note**: This is a living document.\nivan-dev-framework-overview.md\n**Production Apps**\n    - Complete LaundryLog Phase 1\n    - Complete PerDiemLog Phase 1\n    - Deploy to users\n    - Gather feedback for framework refinement\n\n### Long Term (Future)\n\n11. **Custom Forum Development**\n    - Decision point on custom build\n    - Event sourcing architecture\n    - Deep threading implementation\n    - Tight EMapp integration\n\n12. **Framework Maturity**\n    - Refine based on real usage\n    - Document patterns and anti-patterns\n    - Build community around framework\n    - Enable others to use for their projects\n\n---\n\n**Note**: This is a living document. As the framework evolves and patterns emerge, update this overview to reflect current understanding and practices.\n\n**Major Updates:**\n- **2025-11-09 (evening)**: Added Context Management Strategy section detailing two-tier architecture, MCP implementation patterns, context monitoring, and migration strategy. Updated Technical Feasibility Questions to reflect F# decision for MCP server. Updated Next Steps priorities.\n- **2025-11-09 (afternoon)**: Added Mobile-First Design Principles section based on LaundryLog v1-v7 learnings, updated LaundryLog status to reflect v7 completion\n- **2025-11-09 (morning)**: Added forum architecture, paths concept, perspective filtering, EMapp details, Choose Your Own Adventure navigation, content provider abstraction, and comprehensive next steps\n- **2025-11-10 (early morning)**: âœ… COMPLETED FnMCP.IvanTheGeek MCP server. Implemented in F# with update_documentation tool, deployed to production, verified working with Claude Desktop. Resolved path resolution issues (__SOURCE_DIRECTORY__ vs AppContext.BaseDirectory), deployment workflow established. Ready for Phase 2: populating context-library. See mcp-implementation-notes.md for complete details.\nivan-dev-framework-overview.md\nLoading comprehensive documentation consumes significant tokens upfront, reducing space for actual work. Current Project Knowledge approach loads ~15K tokens at conversation start, leaving ~175K for conversation.\n\n### The Solution: MCP-Optimized Documentation Structure\n\n**Two-Tier Knowledge Architecture:**\n\n#### **Tier 1: Quick Start** (Always in Project Knowledge)\nMinimal essential context loaded in every chat:\n- Framework overview (2KB) - Philosophy and architecture\n- Current app summary (3KB) - What you're working on now\n- Naming conventions (2KB) - Penpot/F# standards\n- **Total: ~7KB = 1,750 tokens (88% reduction)**\n\nBenefits:\n- 13K tokens saved per chat\n- 7x more room for conversation\n- Still provides essential context\n\n#### **Tier 2: Detailed Resources** (MCP On-Demand)\nComprehensive documentation fetched only when needed:\n\n**Framework Methodology:**\n- mobile-first-principles.md (4KB)\n- event-modeling-approach.md (4KB)\n- static-state-design.md (3KB)\n- paths-and-gwt.md (4KB)\n\n**App-Specific Detail:**\n- design-v7-spec.md (6KB)\n- design-evolution.md (10KB)\n- event-model.md (5KB)\n- data-model.md (4KB)\n- user-flows.md (4KB)\n- design-rationale.md (8KB)\n- implementation-notes.md (5KB)\n\n### MCP Implementation Pattern\n\n**Read-on-Request (Recommended):**\n```fsharp\ntype FileSystemProvider(rootPath: string) =\n    interface IContentProvider with\n        member _.GetResource(uri) = async {\n            let filePath = Path.Combine(rootPath, uri.Replace(\"://\", \"/\"))\n            let! content = File.ReadAllTextAsync(filePath) |> Async.AwaitTask\n            return {\n                Uri = uri\n                MimeType = \"text/markdown\"\n                Text = content\n            }\n        }\n```\n\n**Behavior:**\n- Edit markdown file â†’ Save\n- Claude requests resource â†’ MCP reads fresh file\n- **No restart needed, always up-to-date** âœ“\n\n**Benefits:**\n- Simple implementation\n- Always correct\n- Perfect for development workflow\n- Markdown files are tiny (microsecond reads)\n\n### Context Monitoring\n\n**Display at End of Every Response:**\n```\nâ”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”\nðŸ“Š Context Usage: [â–ˆâ–ˆâ–ˆâ–ˆâ–ˆâ–ˆâ–ˆâ–ˆâ–‘â–‘â–‘â–‘â–‘â–‘â–‘â–‘â–‘â–‘â–‘â–‘] 85,000 / 190,000 tokens (44.7%)\n\nAllocation:\nâ”œâ”€ System Prompts:     ~5,000 tokens  (2.6%)\nâ”œâ”€ Project Knowledge:  ~7,000 tokens  (3.7%)  â† Reduced from 15K\nâ”‚  â”œâ”€ Quick Start files only\nâ”œâ”€ Conversation:      ~70,000 tokens (36.8%)\nâ”‚  â”œâ”€ Your messages:\nivan-dev-framework-overview.md\nFirst Design Principles\nLessons learned from LaundryLog v1-v7 iterations for creating excellent mobile experiences:\n\n**Touch Target Sizing:**\n- **Minimum**: 72px Ã— 72px for all interactive elements\n- **Primary actions**: 108px diameter circles (quantity adjustments)\n- **Secondary actions**: 84px diameter circles (price adjustments)\n- **Full-width buttons**: 343px Ã— 72px (submission/completion)\n- **Thumb zones**: Bottom 40% = easy reach, middle 40% = comfortable, top 20% = stretch\n\n**Button Spacing:**\n- **Minimum gap**: 8px between targets (prevents mis-taps)\n- **Typical gap**: 12-16px\n- **Section gaps**: 20-24px\n\n**Thumb-Friendly Layout:**\n- Primary interactions in bottom/middle of screen\n- Avoid requiring precision taps\n- Design for one-handed operation\n- Consider damp/dirty hands scenario\n\n**Minimal Typing:**\n- Buttons over text input (95% of interactions)\n- Numeric keyboard only when necessary\n- Quick-select options for common values\n- Auto-scroll when keyboard appears\n\n**Smart Defaults & Quick-Fill:**\nPriority-based suggestions that learn from usage:\n1. **Last used** (current session)\n2. **Historical** (personal data at this location/context)\n3. **Community** (crowd-sourced fallback)\n4. **System default** (reasonable starting point)\n\n**Sticky Preferences:**\n- Remember selections within session\n- Payment type rarely changes\n- Reduce repetitive tapping\n- Easy to change when needed\n\n**Visual Validation:**\n- Proactive validation (prevent errors, don't just report them)\n- Visual indicators (pills/tags) showing missing requirements\n- Disabled states obvious (50% opacity, grayed)\n- Enable button only when all requirements met\n\n**Color Considerations:**\n- Avoid eye strain with muted palettes\n- Orange as accent, not primary fill (#FFB366 vs #FF9800)\n- High contrast text (4.5:1 minimum)\n- Color not sole indicator (use icons + text)\n\n**Realistic Controls:**\n- Quarter buttons look like silver coins\n- Machine type buttons have clear icons\n- Payment buttons have recognizable symbols\n- Entry total calculation always visible\n\n### Narratives and GWT\nRealistic user journeys that drive development:\n- Narratives = concrete stories (not abstract flows)\n- Example: \"Driver stops at truck stop, does laundry, needs receipt for taxes\"\n- Each narrative Ã¢â€ â€™ Given-When-Then scenarios\n- GWT scenarios Ã¢â€ â€™ acceptance tests\n- GWT scenarios Ã¢â€ â€™ documentation/examples\n- Penpot prototype paths visualize narratives\n\n## Data Flow\n\n### Phase 1 (Current - Markdown Files)\n```\nEdit markdown files (human-friendly)\n    Ã¢â€ â€œ\nBuild process (automated)\n    Ã¢â€ â€œ (transforms, adds metadata, chunks if needed)\nMCP Resources (LLM-optimized)\n    Ã¢â€ â€œ\nFnMCP.IvanTheGeekDevFramework\n    Ã¢â€ â€œ (exposes via MCP protocol)\nLLMs consume (Claude, Junie, etc.)"

