text = "You’re **very close**, but there’s an important distinction that will keep your model clean.\n\nA **projection is not like a command handler**.  \nThey are **symmetrical mechanisms on opposite sides of the event**.\n\nThink of the event as the center.\n\n```\nCommand Handler → Event → Projection\n```\n\nSo they mirror each other.\n\n---\n\n# The two hidden implementations\n\nEvent Modeling intentionally hides two implementation details to keep diagrams readable.\n\n### 1. Command Handler (write side)\n\nThis is what actually executes a command and produces an event.\n\n```\nCommand\n   ↓\nCommand Handler\n   ↓\nEvent\n```\n\nExample:\n\n```\nShipOrder\n   ↓\nShipOrderHandler\n   ↓\nOrderShipped\n```\n\nThe handler contains the rules and validation.\n\n---\n\n### 2. Projection (read side)\n\nThis consumes events and produces views.\n\n```\nEvent\n   ↓\nProjection\n   ↓\nView\n```\n\nExample:\n\n```\nOrderShipped\n   ↓\nOrderStatusProjection\n   ↓\nOrdersAwaitingDeliveryView\n```\n\n---\n\n# Why both are hidden in Event Modeling\n\nIn diagrams (as taught by **entity[\"people\",\"Adam Dymitruk\"]**), the focus is **behavior discovery**, not software structure.\n\nSo the implementation boxes disappear.\n\nInstead the diagram shows:\n\n```\nCommand → Event → View\n```\n\nBut underneath it is really:\n\n```\nCommand\n   ↓\nCommand Handler\n   ↓\nEvent\n   ↓\nProjection\n   ↓\nView\n```\n\n---\n\n# A helpful symmetry\n\nOnce you see it, the structure is very elegant.\n\n```\nIntent Side (Write)\nCommand → Handler → Event\n\nInterpretation Side (Read)\nEvent → Projection → View\n```\n\nBoth sides have **an implementation step that is hidden**.\n\n---\n\n# Why projection often feels confusing\n\nBecause in Event Modeling it behaves like **a query**, not like business logic.\n\nProjection usually does things like:\n\n```\nfilter events\ngroup events\naggregate values\nderive status\n```\n\nExample:\n\n```\nGIVEN OrderPlaced\nWHEN shipped=false\nTHEN OrdersAwaitingShipment\n```\n\nThat’s projection logic.\n\n---\n\n# Where the decision logic actually lives\n\nDecision logic lives in two places:\n\n### 1. Command handler\n\n```\ncan this command happen?\n```\n\nExample:\n\n```\ncannot ship an order twice\n```\n\n### 2. Processor / Bot\n\n```\nshould we issue a command automatically?\n```\n\nExample:\n\n```\nif payment confirmed → create shipment\n```\n\n---\n\n# So the real loop is\n\n```\nActor\n  ↓\nCommand\n  ↓\nCommand Handler\n  ↓\nEvent\n  ↓\nProjection\n  ↓\nView\n  ↓\nActor / Bot\n```\n\nTwo hidden implementations:\n\n```\nHandler\nProjection\n```\n\n---\n\n# In Nexus terminology\n\nYour abstraction might look like:\n\n```\nIntent → Fact → Interpretation\n```\n\nWhere:\n\n```\nCommand Handler = Intent execution\nProjection = Interpretation mechanism\n```\n\nSo the hidden layer is simply **mechanisms that transform between primitives**.\n\n---\n\n# The important conceptual boundary\n\nThe reason Event Modeling keeps projections simple is this rule:\n\n```\nEvents are facts\nProjections interpret facts\n```\n\nThey should **never change the facts**, only derive meaning from them.\n\n---\n\n# The mental shortcut\n\nA very useful way to remember it:\n\n```\nCommand Handler → produces facts\nProjection → interprets facts\n```\n\nTwo different responsibilities.\n\n---\n\nIf you're building **EM Extended**, one of the most powerful things you might do is make these **two hidden mechanisms explicit cell types**, which would give you something like:\n\n```\nCommand Cell\nHandler\nEvent Cell\nProjection\nView Cell\n```\n\nThat starts to resemble a **biological metabolism loop**, which actually fits surprisingly well with your **Nexus organism metaphor**."

