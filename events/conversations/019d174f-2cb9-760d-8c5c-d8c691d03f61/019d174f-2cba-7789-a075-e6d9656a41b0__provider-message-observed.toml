text = "There are several things to work though in this reponse. 1. I would challenge that View\n\nView is the UI representation of a read model.\nis what is being implied. I propose the View that is being referenced is the actual data that is handed to the View. This is off from what other frameworks usually call the View being the rendered web page (or at least the html code for the page) for example, but in Event Modeling, it is usually presented as the data that would be handed to the UI to create the screen. Like a data structure that has all the data needed to plug in to the html and make the resultant screen show what we want.  "

