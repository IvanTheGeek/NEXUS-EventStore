text = "The Agent is an addition. In fact, in Event Modeling, the Agent is simply called the UI, but really is Agent. The swimlane in the top section of the diagram is the Actor. For learning and simple diagrams, its all one row/swimlane, but then is usually expanded into multiple swimlanes. \n> Interpretation\n      ├ Projection\n      ├ Evaluation\nThis is still giving me issues: The terms Read Model, Projection, View, are used rather interchangeably in EM. I know there are subtle differences and contexts just I am not getting them yet. There is also the concept of the \"Given-Then\" for Read Model Slices (previously I was calling them projection slices. Adam also mixes in that these are TODO lists.  Recently, he has been toying with adding in the WHEN which makes them GWT but in the WHEN is the filter property. \nI have no problem building on Event Modeling to my own EM Extended version, just trying to define what is in Adam's in order to represent his version as well. I feel like there is implicit ideas in his that I may want to make explicit in my EMExt version and also we are trying to establish the Nexus Universal aspect as well."

