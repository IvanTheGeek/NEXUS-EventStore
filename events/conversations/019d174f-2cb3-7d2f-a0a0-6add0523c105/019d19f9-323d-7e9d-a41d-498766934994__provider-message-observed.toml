kind = "plain_text"
text = "Another avenue I have thought about. If I had an app, say CheddarBooks that was an accounting app (think QuickBooks or Zero replacement). A person is fully able to do everything themselves. There might be some that want to outsource their bookkeeping and have a \"pro\" verify their categorization and source verification and such. What might be called the busy work. My company could offer that as a service. I might charge the customer per item in some fashion, as it will get more automated as data points are feed back in. I could have people that do the manual part as contractors that as they do the work, they are paid per review or task. This keeps high volume customers paying their appropriate share, but more importantly, low volume costs are minimal. I could create a certification and learning part for the contractors that as they learn and certify understanding they might be able to  be contracted by me and then start earning money. The nice thing about this is that that can choose when to work, how much, etc. I pay only for performed work. Those systems would be based off of knowledge gained and refined in LOGOS and can be just one projection of that for those specific domains."

