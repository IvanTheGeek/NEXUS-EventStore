text = "Mainly just confusion on why json, which I really just don't like to deal with and look at, all the curly brackets, which is a big plus on why I like F# among many others. When trying to setup my own store, almost all docker use the yaml, so trying to add a package to the store was like, well, I have a yaml, it needs to be json, what the heck do I do. At the time, I actually did do some talking with the devs and did a few minor doc changes that now is a little bit clearer for newbies."

