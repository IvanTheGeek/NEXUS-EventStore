0\\\\\\u0022\\u003EYour curated collection of valuable websites\\u003C/p\\u003E\\\\n            \\u003C/div\\u003E\\\\n\\\\n            \\u003C!-- Add Form --\\u003E\\\\n            \\u003Cdiv class=\\\\\\u0022bg-white/90 backdrop-blur-lg rounded-2xl shadow-xl p-6 mb-6 border border-teal-200\\\\\\u0022\\u003E\\\\n                \\u003Ch2 class=\\\\\\u0022text-xl font-semibold text-teal-900 mb-4\\\\\\u0022\\u003EAdd Bookmark\\u003C/h2\\u003E\\\\n                \\u003Cdiv class=\\\\\\u0022grid grid-cols-1 md:grid-cols-2 gap-4\\\\\\u0022\\u003E\\\\n                    \\u003Cdiv\\u003E\\\\n                        \\u003Clabel class=\\\\\\u0022block text-sm font-medium text-teal-800 mb-2\\\\\\u0022\\u003EURL *\\u003C/label\\u003E\\\\n                        \\u003Cinput type=\\\\\\u0022url\\\\\\u0022 id=\\\\\\u0022url\\\\\\u0022 placeholder=\\\\\\u0022https://example.com\\\\\\u0022 \\\\n                            class=\\\\\\u0022w-full px-4 py-2 bg-white border border-teal-300 rounded-lg text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-teal-500\\\\\\u0022\\u003E\\\\n                    \\u003C/div\\u003E\\\\n                    \\u003Cdiv\\u003E\\\\n                        \\u003Clabel class=\\\\\\u0022block text-sm font-medium text-teal-800 mb-2\\\\\\u0022\\u003ETitle *\\u003C/label\\u003E\\\\n                        \\u003Cinput type=\\\\\\u0022text\\\\\\u0022 id=\\\\\\u0022title\\\\\\u0022 placeholder=\\\\\\u0022Website name\\\\\\u0022\\\\n                            class=\\\\\\u0022w-full px-4 py-2 bg-white border border-teal-300 rounded-lg text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-teal-500\\\\\\u0022\\u003E\\\\n                    \\u003C/div\\u003E\\\\n                    \\u003Cdiv\\u003E\\\\n                        \\u003Clabel class=\\\\\\u0022block text-sm font-medium text-teal-800 mb-2\\\\\\u0022\\u003ECategory Path (e.g., Money\\u003EInvesting)\\u003C/label\\u003E\\\\n                        \\u003Cinput type=\\\\\\u0022text\\\\\\u0022 id=\\\\\\u0022category\\\\\\u0022 placeholder=\\\\\\u0022Category\\u003ESubcategory\\\\\\u0022\\\\n                            class=\\\\\\u0022w-full px-4 py-2 bg-white border border-teal-300 rounded-lg text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-teal-500\\\\\\u0022\\u003E\\\\n                    \\u003C/div\\u003E\\\\n                    \\u003Cdiv\\u003E\\\\n                        \\u003Clabel class=\\\\\\u0022block text-sm font-medium text-teal-800 mb-2\\\\\\u0022\\u003EDescription\\u003C/label\\u003E\\\\n                        \\u003Cinput type=\\\\\\u0022text\\\\\\u0022 id=\\\\\\u0022description\\\\\\u0022 placeholder=\\\\\\u0022Brief description\\\\\\u0022\\\\n                            class=\\\\\\u0022w-full px-4 py-2 bg-white border border-teal-300 rounded-lg text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-teal-500\\\\\\u0022\\u003E\\\\n                    \\u003C/div\\u003E\\\\n                \\u003C/div\\u003E\\\\n                \\u003Cbutton onclick=\\\\\\u0022addBookmark()\\\\\\u0022 \\\\n                    class=\\\\\\u0022mt-4 px-6 py-2 bg-teal-600 text-white font-medium rounded-lg hover:bg-teal-700 transition-colors\\\\\\u0022\\u003E\\\\n                    Add Bookmark\\\\n                \\u003C/button\\u003E\\\\n            \\u003C/div\\u003E\\\\n\\\\n            \\u003C!-- Search and Filter --\\u003E\\\\n            \\u003Cdiv class=\\\\\\u0022bg-white/90 backdrop-blur-lg rounded-2xl shadow-xl p-6 mb-6 border border-teal-200\\\\\\u0022\\u003E\\\\n                \\u003Cdiv class=\\\\\\u0022flex gap-4 mb-4\\\\\\u0022\\u003E\\\\n                    \\u003Cinput type=\\\\\\u0022text\\\\\\u0022 id=\\\\\\u0022search\\\\\\u0022 placeholder=\\\\\\u0022Search bookmarks...\\\\\\u0022 onkeyup=\\\\\\u0022filterBookmarks()\\\\\\u0022\\\\n                        class=\\\\\\u0022flex-1 px-4 py-2 bg-white border border-teal-300 rounded-lg text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-teal-500\\\\\\u0022\\u003E\\\\n                    \\u003Cselect id=\\\\\\u0022categoryFilter\\\\\\u0022 onchange=\\\\\\u0022filterBookmarks()\\\\\\u0022\\\\n                        class=\\\\\\u0022px-4 py-2 bg-white border border-teal-300 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-teal-500\\\\\\u0022\\u003E\\\\n                        \\u003Coption value=\\\\\\u0022\\\\\\u0022\\u003EAll Categories\\u003C/option\\u003E\\\\n                    \\u003C/select\\u003E\\\\n                \\u003C/div\\u003E\\\\n            \\u003C/div\\u003E\\\\n\\\\n            \\u003C!-- Bookmarks Grid --\\u003E\\\\n            \\u003Cdiv id=\\\\\\u0022bookmarks\\\\\\u0022 class=\\\\\\u0022grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4\\\\\\u0022\\u003E\\u003C/div\\u003E\\\\n        \\u003C/div\\u003E\\\\n    \\u003C/div\\u003E\\\\n\\\\n    \\u003Cscript\\u003E\\\\n        let bookmarks = [];\\\\n\\\\n        // Initialize with sample data including new YieldMax bookmark\\\\n        const defaultBookmarks = [\\\\n            {\\\\n                id: 1,\\\\n                url: \\u0027https://github.com/spiral-project/ihatemoney\\u0027,\\\\n                title: \\u0027IHateMoney\\u0027,\\\\n                category: \\u0027Money\\u003EReferences\\u0027,\\\\n                description: \\u0027Shared expense management tool\\u0027\\\\n            },\\\\n            {\\\\n                id: 2,\\\\n                url: \\u0027https://www.manager.io\\u0027,\\\\n                title: \\u0027Manager.io\\u0027,\\\\n                category: \\u0027Money\\u003ESoftware\\u003EBusiness Accounting\\u0027,\\\\n                description: \\u0027Free accounting software for small businesses\\u0027\\\\n            },\\\\n            {\\\\n                id: 3,\\\\n                url: \\u0027https://www.dividend.com\\u0027,\\\\n                title: \\u0027Dividend.com\\u0027,\\\\n                category: \\u0027Money\\u003EInvesting\\u0027,\\\\n                description: \\u0027Dividend investing resources and tools\\u0027\\\\n            },\\\\n            {\\\\n                id: 4,\\\\n                url: \\u0027https://www.yieldmaxetfs.com/our-etfs/\\u0027,\\\\n                title: \\u0027YieldMax ETFs\\u0027,\\\\n                category: \\u0027Money\\u003EInvesting\\u0027,\\\\n                description: \\u0027High yield ETF options and strategies\\u0027\\\\n            }\\\\n        ];\\\\n\\\\n        function loadBookmarks() {\\\\n            const saved = localStorage.getItem(\\u0027bookmarks\\u0027);\\\\n            if (saved) {\\\\n                bookmarks = JSON.parse(saved);\\\\n            } else {\\\\n                bookmarks = defaultBookmarks;\\\\n                saveBookmarks();\\\\n            }\\\\n            updateCategoryFilter();\\\\n            renderBookmarks();\\\\n        }\\\\n\\\\n        function saveBookmarks() {\\\\n            localStorage.setItem(\\u0027bookmarks\\u0027, JSON.stringify(bookmarks));\\\\n        }\\\\n\\\\n        function addBookmark() {\\\\n            const url = document.getElementById(\\u0027url\\u0027).value;\\\\n            const title = document.getElementById(\\u0027title\\u0027).value;\\\\n            const category = document.getElementById(\\u0027category\\u0027).value;\\\\n            const description = document.getElementById(\\u0027description\\u0027).value;\\\\n\\\\n            if (!url || !title) {\\\\n                alert(\\u0027Please provide both URL and Title\\u0027);\\\\n                return;\\\\n            }\\\\n\\\\n            const newBookmark = {\\\\n                id: Date.now(),\\\\n                url,\\\\n                title,\\\\n                category,\\\\n                description\\\\n            };\\\\n\\\\n            bookmarks.push(newBookmark);\\\\n            saveBookmarks();\\\\n            updateCategoryFilter();\\\\n            renderBookmarks();\\\\n\\\\n            // Clear form\\\\n            document.getElementById(\\u0027url\\u0027).value = \\u0027\\u0027;\\\\n            document.getElementById(\\u0027title\\u0027).value = \\u0027\\u0027;\\\\n            document.getElementById(\\u0027category\\u0027).value = \\u0027\\u0027;\\\\n            document.getElementById(\\u0027description\\u0027).value = \\u0027\\u0027;\\\\n        }\\\\n\\\\n        function deleteBookmark(id) {\\\\n            bookmarks = bookmarks.filter(b =\\u003E b.id !== id);\\\\n            saveBookmarks();\\\\n            updateCategoryFilter();\\\\n            renderBookmarks();\\\\n        }\\\\n\\\\n        function updateCategoryFilter() {\\\\n            const select = document.getElementById(\\u0027categoryFilter\\u0027);\\\\n            const categories = [...new Set(bookmarks.map(b =\\u003E b.category).filter(Boolean))];\\\\n            \\\\n            select.innerHTML = \\u0027\\u003Coption value=\\\\\\u0022\\\\\\u0022\\u003EAll Categories\\u003C/option\\u003E\\u0027;\\\\n            categories.forEach(cat =\\u003E {\\\\n                select.innerHTML \\u002B= \\u0060\\u003Coption value=\\\\\\u0022${cat}\\\\\\u0022\\u003E${cat}\\u003C/option\\u003E\\u0060;\\\\n            });\\\\n        }\\\\n\\\\n        function createNestedTag(categoryPath) {\\\\n            if (!categoryPath) return \\u0027\\u0027;\\\\n            \\\\n            const levels = categoryPath.split(\\u0027\\u003E\\u0027).map(s =\\u003E s.trim());\\\\n            \\\\n            if (levels.length === 1) {\\\\n                return \\u0060\\\\n                    \\u003Cdiv class=\\\\\\u0022tag-stack tag-level-1\\\\\\u0022\\u003E\\\\n                        \\u003Cdiv class=\\\\\\u0022tag-text\\\\\\u0022\\u003E${levels[0]}\\u003C/div\\u003E\\\\n                    \\u003C/div\\u003E\\\\n                \\u0060;\\\\n            } else if (levels.length === 2) {\\\\n                return \\u0060\\\\n                    \\u003Cdiv class=\\\\\\u0022tag-stack tag-level-1\\\\\\u0022\\u003E\\\\n                        \\u003Cdiv class=\\\\\\u0022tag-text\\\\\\u0022\\u003E${levels[0]}\\u003C/div\\u003E\\\\n                        \\u003Cdiv class=\\\\\\u0022tag-level-3\\\\\\u0022\\u003E\\\\n                            \\u003Cdiv class=\\\\\\u0022tag-text\\\\\\u0022\\u003E${levels[1]}\\u003C/div\\u003E\\\\n                        \\u003C/div\\u003E\\\\n                    \\u003C/div\\u003E\\\\n                \\u0060;\\\\n            } else if (levels.length \\u003E= 3) {\\\\n                return \\u0060\\\\n                    \\u003Cdiv class=\\\\\\u0022tag-stack tag-level-1\\\\\\u0022\\u003E\\\\n                        \\u003Cdiv class=\\\\\\u0022tag-text\\\\\\u0022\\u003E${levels[0]}\\u003C/div\\u003E\\\\n                        \\u003Cdiv class=\\\\\\u0022tag-level-2\\\\\\u0022\\u003E\\\\n                            \\u003Cdiv class=\\\\\\u0022tag-text\\\\\\u0022\\u003E${levels[1]}\\u003C/div\\u003E\\\\n                            \\u003Cdiv class=\\\\\\u0022tag-level-3\\\\\\u0022\\u003E\\\\n                                \\u003Cdiv class=\\\\\\u0022tag-text\\\\\\u0022\\u003E${levels.slice(2).join(\\u0027 \\u0027)}\\u003C/div\\u003E\\\\n                            \\u003C/div\\u003E\\\\n                        \\u003C/div\\u003E\\\\n                    \\u003C/div\\u003E\\\\n                \\u0060;\\\\n            }\\\\n        }\\\\n\\\\n        function renderBookmarks() {\\\\n            const container = document.getElementById(\\u0027bookmarks\\u0027);\\\\n            const search = document.getElementById(\\u0027search\\u0027).value.toLowerCase();\\\\n            const categoryFilter = document.getElementById(\\u0027categoryFilter\\u0027).value;\\\\n\\\\n            const filtered = bookmarks.filter(bookmark =\\u003E {\\\\n                const matchesSearch = !search || \\\\n                    bookmark.title.toLowerCase().includes(search) ||\\\\n                    bookmark.url.toLowerCase().includes(search) ||\\\\n                    (bookmark.description \\u0026\\u0026 bookmark.description.toLowerCase().includes(search));\\\\n                \\\\n                const matchesCategory = !categoryFilter || bookmark.category === categoryFilter;\\\\n                \\\\n                return matchesSearch \\u0026\\u0026 matchesCategory;\\\\n            });\\\\n\\\\n            container.innerHTML = filtered.map(bookmark =\\u003E \\u0060\\\\n                \\u003Cdiv class=\\\\\\u0022bg-white/90 backdrop-blur-lg rounded-xl shadow-lg p-5 border border-teal-200 hover:shadow-xl transition-shadow\\\\\\u0022\\u003E\\\\n                    ${bookmark.category ? \\u0060\\\\n                        \\u003Cdiv class=\\\\\\u0022card-tag-container\\\\\\u0022\\u003E\\\\n                            ${createNestedTag(bookmark.category)}\\\\n                        \\u003C/div\\u003E\\\\n                    \\u0060 : \\u0027\\u0027}\\\\n                    \\u003Ch3 class=\\\\\\u0022text-lg font-semibold text-gray-900 mb-2\\\\\\u0022\\u003E${bookmark.title}\\u003C/h3\\u003E\\\\n                    \\u003Ca href=\\\\\\u0022${bookmark.url}\\\\\\u0022 target=\\\\\\u0022_blank\\\\\\u0022 \\\\n                        class=\\\\\\u0022text-teal-600 hover:text-teal-700 text-sm break-all block mb-2\\\\\\u0022\\u003E\\\\n                        ${bookmark.url}\\\\n                    \\u003C/a\\u003E\\\\n                    ${bookmark.description ? \\u0060\\\\n                        \\u003Cp class=\\\\\\u0022text-gray-600 text-sm mb-3\\\\\\u0022\\u003E${bookmark.description}\\u003C/p\\u003E\\\\n                    \\u0060 : \\u0027\\u0027}\\\\n                    \\u003Cbutton onclick=\\\\\\u0022deleteBookmark(${bookmark.id})\\\\\\u0022 \\\\n                        class=\\\\\\u0022px-3 py-1 bg-red-500 text-white text-sm rounded hover:bg-red-600 transition-colors\\\\\\u0022\\u003E\\\\n                        Delete\\\\n                    \\u003C/button\\u003E\\\\n                \\u003C/div\\u003E\\\\n            \\u0060).join(\\u0027\\u0027);\\\\n        }\\\\n\\\\n        function filterBookmarks() {\\\\n            renderBookmarks();\\\\n        }\\\\n\\\\n        // Load on startup\\\\n        loadBookmarks();\\\\n    \\u003C/script\\u003E\\\\n\\u003C/body\\u003E\\\\n\\u003C/html\\u003E\\u0022, \\u0022filename\\u0022: \\u0022/mnt/user-data/outputs/bookmark-manager-nested-tags.html\\u0022}\"},\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

