text = "Yes. The main CSS feature is `transform`, especially:\n\n- `perspective(...)`\n- `rotateX(...)`\n- `rotateY(...)`\n- `skew(...)`\n- sometimes `matrix3d(...)`\n\nThat kind of tilted, pseudo-3D look is commonly done by putting a normal flat element inside a container with perspective, then rotating it.\n\nExample:\n\n```html\n<div class=\"scene\">\n  <div class=\"panel\">\n    <h2>Document</h2>\n    <label>Name <input /></label>\n    <label>Address <input /></label>\n    <div class=\"buttons\">\n      <button>OK</button>\n      <button>Cancel</button>\n    </div>\n  </div>\n</div>\n```\n\n```css\nbody {\n  background: black;\n  padding: 40px;\n}\n\n.scene {\n  perspective: 1000px;\n  display: inline-block;\n}\n\n.panel {\n  width: 500px;\n  padding: 30px;\n  background: #6b4f66;\n  border: 4px solid #1f2547;\n  border-radius: 20px;\n  transform:\n    rotateX(18deg)\n    rotateY(-12deg)\n    skewX(-4deg);\n  transform-origin: center center;\n  box-shadow: 0 20px 40px rgba(0,0,0,0.5);\n}\n```\n\nThat gives you the basic “receding into space” look.\n\nFor an existing HTML element  \nYes, you can apply this directly to a `div`, form, card, mockup, screenshot wrapper, or even an iframe-like container.\n\nFor an image or screenshot  \nAlso yes. You can apply the same transform to an `img`.\n\n```css\nimg.tilted {\n  transform: perspective(1000px) rotateX(20deg) rotateY(-10deg);\n  transform-origin: center;\n}\n```\n\nExample:\n\n```html\n<img class=\"tilted\" src=\"ui.png\" alt=\"UI screenshot\">\n```\n\nImportant limitation  \nCSS can visually transform the whole element, but it does not truly redraw the internal geometry like a real 3D renderer. So:\n\n- for simple perspective mockups, CSS works well\n- for very exact perspective warping, especially matching a specific trapezoid shape, it gets harder\n- `matrix3d()` can do more precise distortion, but it is much less human-friendly\n\nIf you want the effect on a static picture only, another option is:\n\n- CSS transforms for live browser display\n- SVG filters / transforms for more control\n- Canvas/WebGL for precise warping\n- image editors like Photoshop, GIMP, Photopea for one-off perspective distortion\n\nA very practical pattern is:\n\n```html\n<div class=\"frame\">\n  <img src=\"screenshot.png\" alt=\"\">\n</div>\n```\n\n```css\n.frame {\n  perspective: 1200px;\n}\n\n.frame img {\n  display: block;\n  width: 100%;\n  max-width: 700px;\n  transform: rotateX(20deg) rotateY(-18deg);\n  border-radius: 16px;\n  box-shadow: 0 30px 60px rgba(0,0,0,.45);\n}\n```\n\nIf you want, I can make you a single HTML file demo where you can paste in any image and adjust the perspective with sliders."

