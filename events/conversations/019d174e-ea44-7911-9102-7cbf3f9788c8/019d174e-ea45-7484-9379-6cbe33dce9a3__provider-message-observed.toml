text = "what is your suggestion. some considerations are that the files in particular may have sensitive info  that I would not want to have public. So far, I am ok with what is public, but there will be things like the schwab api details that will need to not be public due the agreements I made to gain access to the schwab developer site and api usage. There will be copyrighted materials that I am allowed to use, like Scott's book, but I can not redistribute to others. There will also end up being financial docs uploaded and such. These might need to stay completely private or they might need to be redacted so that the personal info is scrubbed but the doc can be used for the public benefit. I am thinking of credit card statements for example. We can learn what a Capital One credit card statement has in it, what the data looks like etc, but my personal address and account numebr and such will need to be scrubbed/redacted. So we need to consider these things into the plan as we build out and implement."

