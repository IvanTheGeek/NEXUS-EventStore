text = "ok, so i think we have the Nexus-MCP being accessed by ssh on the remote machine. After some consults in other chats, Caddy reverse proxy seems to be the way to go. There is another chat that discussed file storage needs. which again, came to Caddy being the choice and using docker for everything in the FnMarina idea in the future. So I need some guidance and instructions on how to do caddy on the vps, and then we need to plan to get open internet access to the MCP server with some sort of security. please access as many recent chats as needed to be brought up to speed and also use the MCP connected to gain context needed. Also, for every response, at the end, show me token usage and remaining so I can watch the window."

