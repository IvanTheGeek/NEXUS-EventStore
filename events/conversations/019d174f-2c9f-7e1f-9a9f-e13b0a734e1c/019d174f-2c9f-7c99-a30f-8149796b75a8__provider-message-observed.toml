text = "What you’re circling around is something entity[\"people\",\"Adam Dymitruk\",\"event modeling practitioner\"] emphasizes when teaching **Event Modeling**: the **first model should prove the pipeline, not model the whole system**.\n\nPeople often try to model *all behavior* immediately (editing forms, validation, etc.). Adam’s approach is different.\n\nYou start with the **simplest possible end-to-end slice** that proves:\n\n```\nUser action → Command → Event → Projection → UI change\n```\n\nOnce that works, everything else is just **adding more slices**.\n\n---\n\n# The “Perfect First Event Model” Pattern\n\nThe pattern has **three slices**, in this order:\n\n```\n1️⃣ Projection slice (read existing events)\n2️⃣ Command slice (create new event)\n3️⃣ Projection slice (show the result)\n```\n\nThis creates a **complete loop**.\n\nEven when the system has **zero events initially**, this structure still works.\n\n---\n\n# Step 1 — Initial Projection Slice\n\nStart with **what the screen shows when the app opens**.\n\nRemember: in event sourcing, the UI never reads a database table directly.\n\nInstead it reads a **projection built from events**.\n\nYour first projection slice therefore looks like:\n\n```\nUI                        | Projection                | Event\n----------------------------------------------------------------\nShow session totals       | SessionTotalsProjection   | LaundryEntryLogged\nShow recent entries       | RecentEntriesProjection   | LaundryEntryLogged\n```\n\nImportant detail:\n\nAt first launch there are **no events**, so the projections produce:\n\n```\nSession total = $0\nRecent entries = []\n```\n\nNothing special needs to happen.\n\nEmpty event stream → empty projections.\n\nThat’s the **initial state of the system**.\n\n---\n\n# Step 2 — First Command Slice\n\nNow you add the first thing that **changes system state**.\n\nThe user fills out the form and presses **Log Entry**.\n\nSo the command slice is:\n\n```\nUI                     | Command                  | Event\n----------------------------------------------------------------\nPress Log Entry        | SubmitLaundryEntry       | LaundryEntryLogged\n```\n\nThe command represents **intent**:\n\n```\nSubmitLaundryEntry\n```\n\nThe event represents a **fact**:\n\n```\nLaundryEntryLogged\n```\n\nEvents always describe something that **already happened**.\n\n---\n\n# Step 3 — Projection Reacts to Event\n\nNow the projection slices react to that event.\n\n```\nUI                        | Projection                | Event\n----------------------------------------------------------------\nUpdate session total      | SessionTotalsProjection   | LaundryEntryLogged\nUpdate recent entries     | RecentEntriesProjection   | LaundryEntryLogged\n```\n\nAfter replaying the event:\n\n```\nSession total = $11.25\nRecent entries = [entry]\n```\n\nThe UI updates automatically.\n\n---\n\n# Visually (sideways timeline)\n\nAdam often says:\n\n> Event Modeling is basically a sequence diagram turned sideways.\n\nYour column layout fits perfectly.\n\n```\nUI                    | Command / Projection          | Event\n--------------------------------------------------------------------\nShow totals           | SessionTotalsProjection       | LaundryEntryLogged\n\n\nPress Log Entry       | SubmitLaundryEntry            | LaundryEntryLogged\n\n\nUpdate totals         | SessionTotalsProjection       | LaundryEntryLogged\nShow recent entry     | RecentEntriesProjection       | LaundryEntryLogged\n```\n\nEach **horizontal row = slice**.\n\n---\n\n# What this proves architecturally\n\nIf these three slices work, you have proven:\n\n```\nUI → Command → Event → Event Store → Projection → UI\n```\n\nThat’s the entire event-sourced architecture.\n\nEverything else is just **more slices**.\n\n---\n\n# Why this pattern is powerful\n\nMost people model systems like this:\n\n```\nEdit field\nValidate field\nSave draft\nConfirm entry\nSubmit entry\nUpdate totals\nUpdate analytics\nUpdate history\n```\n\nThat explodes into **dozens of events**.\n\nAdam’s pattern instead starts with the **single event that matters**:\n\n```\nLaundryEntryLogged\n```\n\nThen later you can add slices like:\n\n```\nLocationSuggested\nLocationConfirmed\nPriceAdjusted\nEntryCorrected\nEntryDeleted\n```\n\nBut those are **refinements**, not the core.\n\n---\n\n# How this fits your NEXUS idea\n\nYour principle:\n\n> replace slices instead of mutating them\n\nfits beautifully with Event Modeling.\n\nInstead of rewriting models, you simply **replace a slice**.\n\nExample:\n\nOriginal slice:\n\n```\nSubmitLaundryEntry → LaundryEntryLogged\n```\n\nLater you realize location should be validated.\n\nReplace the slice with:\n\n```\nSubmitLaundryEntry → LocationValidated → LaundryEntryLogged\n```\n\nThe rest of the model remains untouched.\n\n---\n\n# What your **very first Penpot event model board** should contain\n\nLiterally just this:\n\n```\nUI | Command/Projection | Event\n```\n\nRow 1\n\n```\nShow totals | SessionTotalsProjection | LaundryEntryLogged\n```\n\nRow 2\n\n```\nPress Log Entry | SubmitLaundryEntry | LaundryEntryLogged\n```\n\nRow 3\n\n```\nUpdate totals | SessionTotalsProjection | LaundryEntryLogged\n```\n\nThat’s enough to implement the entire vertical slice.\n\n---\n\n# The subtle insight Adam teaches\n\nThe event model is **not the implementation**.\n\nIt’s a **communication artifact**.\n\nDevelopers then decide:\n\n```\nHow commands are handled\nHow events are stored\nHow projections are built\n```\n\nBut the model stays stable.\n\n---\n\n# One thing I think you'll find interesting for NEXUS\n\nYour idea of **Slices as horizontal units** is actually very close to what Adam calls:\n\n```\nWalking Skeleton Slices\n```\n\nSmall, complete vertical functionality.\n\nYour model is basically turning that into a **formal architecture unit**.\n\nWhich is a very interesting direction.\n\n---\n\nIf you'd like, I can also show you something that will likely **click with your NEXUS concept immediately**:\n\n**Why Event Modeling diagrams secretly describe a graph, not a timeline — and why that makes generating code (like F#) from them possible.**"

