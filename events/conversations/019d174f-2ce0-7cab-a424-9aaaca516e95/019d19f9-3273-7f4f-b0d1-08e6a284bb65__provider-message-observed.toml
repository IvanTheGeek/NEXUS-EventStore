text = "Here is a **single copy-pasteable F# file** you can drop into a Blazor project as a starting point.\n\n```fsharp\nnamespace ForgeUi\n\nopen System\nopen Microsoft.AspNetCore.Components\nopen Microsoft.AspNetCore.Components.Rendering\nopen Microsoft.AspNetCore.Components.Web\n\n// =========================\n// Core model\n// =========================\n\ntype Attr =\n    | Attribute of name: string * value: obj\n    | EventHandler of name: string * callback: obj\n    | Key of value: obj\n\ntype Node =\n    | Empty\n    | Text of string\n    | Fragment of Node list\n    | Element of tag: string * attrs: Attr list * children: Node list\n    | Component of compType: Type * attrs: Attr list\n\n[<RequireQualifiedAccess>]\nmodule Attr =\n    let create (name: string) (value: 'T) : Attr =\n        Attribute(name, box value)\n\n    let key (value: 'T) : Attr =\n        Key(box value)\n\n    let callback0 (receiver: obj) (name: string) (fn: unit -> unit) : Attr =\n        let cb = EventCallback.Factory.Create(receiver, Action(fn))\n        EventHandler(name, box cb)\n\n    let callback<'T when 'T :> EventArgs>\n        (receiver: obj)\n        (name: string)\n        (fn: 'T -> unit)\n        : Attr =\n        let cb = EventCallback.Factory.Create<'T>(receiver, Action<'T>(fn))\n        EventHandler(name, box cb)\n\n[<RequireQualifiedAccess>]\nmodule Node =\n    let empty = Empty\n    let text (value: string) = Text value\n    let fragment (nodes: Node list) = Fragment nodes\n    let el (tag: string) (attrs: Attr list) (children: Node list) = Element(tag, attrs, children)\n\n    let comp<'T when 'T :> IComponent> (attrs: Attr list) =\n        Component(typeof<'T>, attrs)\n\n\n// =========================\n// HTML helpers\n// =========================\n\n[<AutoOpen>]\nmodule Html =\n    let text s = Node.text s\n\n    let div attrs children = Node.el \"div\" attrs children\n    let span attrs children = Node.el \"span\" attrs children\n    let h1 attrs children = Node.el \"h1\" attrs children\n    let h2 attrs children = Node.el \"h2\" attrs children\n    let p attrs children = Node.el \"p\" attrs children\n    let button attrs children = Node.el \"button\" attrs children\n    let section attrs children = Node.el \"section\" attrs children\n    let ul attrs children = Node.el \"ul\" attrs children\n    let li attrs children = Node.el \"li\" attrs children\n    let input attrs = Node.el \"input\" attrs []\n\n[<RequireQualifiedAccess>]\nmodule Props =\n    let className v = Attr.create \"class\" v\n    let id v = Attr.create \"id\" v\n    let value v = Attr.create \"value\" v\n    let placeholder v = Attr.create \"placeholder\" v\n    let style v = Attr.create \"style\" v\n    let type' v = Attr.create \"type\" v\n    let disabled v = Attr.create \"disabled\" v\n\n[<RequireQualifiedAccess>]\nmodule On =\n    let click (receiver: obj) (fn: unit -> unit) =\n        Attr.callback0 receiver \"onclick\" fn\n\n    let input (receiver: obj) (fn: ChangeEventArgs -> unit) =\n        Attr.callback<ChangeEventArgs> receiver \"oninput\" fn\n\n    let change (receiver: obj) (fn: ChangeEventArgs -> unit) =\n        Attr.callback<ChangeEventArgs> receiver \"onchange\" fn\n\n\n// =========================\n// Lowering to Blazor\n// =========================\n\nmodule private Render =\n\n    let rec private addAttrs (builder: RenderTreeBuilder) (seqNo: byref<int>) (attrs: Attr list) =\n        for attr in attrs do\n            match attr with\n            | Attribute(name, value) ->\n                builder.AddAttribute(seqNo, name, value)\n                seqNo <- seqNo + 1\n\n            | EventHandler(name, callback) ->\n                builder.AddAttribute(seqNo, name, callback)\n                seqNo <- seqNo + 1\n\n            | Key value ->\n                builder.SetKey(value)\n\n    let rec renderNode (builder: RenderTreeBuilder) (seqNo: byref<int>) (node: Node) =\n        match node with\n        | Empty ->\n            ()\n\n        | Text value ->\n            builder.AddContent(seqNo, value)\n            seqNo <- seqNo + 1\n\n        | Fragment nodes ->\n            for child in nodes do\n                renderNode builder &seqNo child\n\n        | Element(tag, attrs, children) ->\n            builder.OpenElement(seqNo, tag)\n            seqNo <- seqNo + 1\n\n            addAttrs builder &seqNo attrs\n\n            for child in children do\n                renderNode builder &seqNo child\n\n            builder.CloseElement()\n\n        | Component(compType, attrs) ->\n            builder.OpenComponent(seqNo, compType)\n            seqNo <- seqNo + 1\n\n            addAttrs builder &seqNo attrs\n\n            builder.CloseComponent()\n\n\n// =========================\n// Base component types\n// =========================\n\n[<AbstractClass>]\ntype ForgeComponent() =\n    inherit ComponentBase()\n\n    abstract member View : unit -> Node\n\n    override this.BuildRenderTree(builder: RenderTreeBuilder) =\n        let mutable seqNo = 0\n        let node = this.View()\n        Render.renderNode builder &seqNo node\n\n[<AbstractClass>]\ntype ForgeStateComponent<'Model>() =\n    inherit ForgeComponent()\n\n    let mutable modelOpt : 'Model option = None\n\n    abstract member Init : unit -> 'Model\n    abstract member Render : 'Model -> Node\n\n    member this.Model\n        with get() =\n            match modelOpt with\n            | Some m -> m\n            | None ->\n                let m = this.Init()\n                modelOpt <- Some m\n                m\n        and set value =\n            modelOpt <- Some value\n\n    member this.SetModel(value: 'Model) =\n        this.Model <- value\n        this.InvokeAsync(fun () -> this.StateHasChanged()) |> ignore\n\n    member this.Update(fn: 'Model -> 'Model) =\n        this.SetModel(fn this.Model)\n\n    override this.View() =\n        this.Render(this.Model)\n\n\n// =========================\n// Example reusable component\n// =========================\n\ntype Panel() =\n    inherit ForgeComponent()\n\n    [<Parameter>]\n    member val Title = \"\" with get, set\n\n    [<Parameter>]\n    member val Content = Node.empty with get, set\n\n    override this.View() =\n        section\n            [ Props.className \"forge-panel\"; Props.style \"padding:1rem;border:1px solid #ccc;border-radius:8px;margin-bottom:1rem;\" ]\n            [\n                h2 [ Props.style \"margin-top:0;\" ] [ text this.Title ]\n                this.Content\n            ]\n\n\n// =========================\n// Example page component\n// =========================\n\n[<Route(\"/forge-counter\")>]\ntype CounterPage() =\n    inherit ForgeStateComponent<int>()\n\n    override _.Init() = 0\n\n    override this.Render(count: int) =\n        div\n            [ Props.className \"forge-page\"; Props.style \"font-family:sans-serif;max-width:720px;margin:2rem auto;padding:1rem;\" ]\n            [\n                h1 [] [ text \"Forge Counter\" ]\n\n                Node.comp<Panel>\n                    [\n                        Attr.create \"Title\" \"Status\"\n                        Attr.create \"Content\" (\n                            p [] [ text $\"Current count: {count}\" ]\n                        )\n                    ]\n\n                div [ Props.style \"display:flex;gap:0.5rem;align-items:center;\" ]\n                    [\n                        button\n                            [\n                                Props.className \"btn\"\n                                Props.style \"padding:0.5rem 0.75rem;cursor:pointer;\"\n                                On.click this (fun () -> this.Update(fun m -> m + 1))\n                            ]\n                            [ text \"Increment\" ]\n\n                        button\n                            [\n                                Props.className \"btn\"\n                                Props.style \"padding:0.5rem 0.75rem;cursor:pointer;\"\n                                On.click this (fun () -> this.Update(fun m -> m - 1))\n                            ]\n                            [ text \"Decrement\" ]\n\n                        button\n                            [\n                                Props.className \"btn\"\n                                Props.style \"padding:0.5rem 0.75rem;cursor:pointer;\"\n                                On.click this (fun () -> this.SetModel 0)\n                            ]\n                            [ text \"Reset\" ]\n                    ]\n\n                Node.comp<Panel>\n                    [\n                        Attr.create \"Title\" \"Notes\"\n                        Attr.create \"Content\" (\n                            ul []\n                                [\n                                    li [] [ text \"This page is a normal Blazor component.\" ]\n                                    li [] [ text \"Your UI is authored as Node values.\" ]\n                                    li [] [ text \"Those Nodes lower into Blazor's RenderTreeBuilder.\" ]\n                                ]\n                        )\n                    ]\n            ]\n```\n\nA few notes so it works cleanly:\n\nPut this file in your Blazor F# project, for example as `ForgeUi.fs`.\n\nMake sure the file is included in the project file before anything that depends on it.\n\nThen browse to:\n\n```text\n/forge-counter\n```\n\nWhat this gives you:\n\n- your own `Node` abstraction\n- your own `Attr` abstraction\n- your own HTML helper layer\n- a `ForgeComponent` bridge into Blazor\n- a reusable child component\n- a routed page component\n\nThe important architectural point is that app code never touches `RenderTreeBuilder` directly. Only your framework layer does.\n\nThe next strong move would be to split this into four files:\n`Core.fs`, `Html.fs`, `Components.fs`, and `Demo.fs`, then add a first-class component parameter builder so `Node.comp<Panel>` becomes less stringly typed."

