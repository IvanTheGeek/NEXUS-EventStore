text = "Good questionтАФthis is where SignalR gets really practical.\n\n## ЁЯза Short answer\n\nSignalR doesnтАЩt just use one transport. It **automatically falls back through several тАЬmodesтАЭ** depending on what the client and server support.\n\n---\n\n# ЁЯФД SignalR transport fallback order\n\n### 1я╕ПтГг WebSockets (best, preferred)\nюИАimage_groupюИВ{\"aspect_ratio\":\"16:9\",\"query\":[\"websocket full duplex connection diagram\",\"signalr websocket architecture client server\",\"real time websocket communication flow diagram\",\"websocket persistent connection illustration\"],\"num_per_query\":1}юИБ\n\n- Full duplex (client тЖФ server at same time)\n- Persistent connection\n- Lowest latency\n\nЁЯСЙ This is what you want in most cases\n\n---\n\n### 2я╕ПтГг Server-Sent Events (SSE)\nюИАimage_groupюИВ{\"aspect_ratio\":\"16:9\",\"query\":[\"server sent events sse diagram http streaming client server\",\"sse one way communication flow diagram\",\"event stream http connection browser server\",\"sse vs websocket diagram\"],\"num_per_query\":1}юИБ\n\n- Server тЖТ client only (one-way)\n- Uses HTTP streaming\n- Still near real-time\n\nЁЯСЙ SignalR simulates two-way by combining with HTTP calls\n\n---\n\n### 3я╕ПтГг Long Polling (fallback of last resort)\nюИАimage_groupюИВ{\"aspect_ratio\":\"16:9\",\"query\":[\"long polling http diagram repeated requests client server\",\"signalr long polling flow diagram\",\"http polling loop architecture diagram\",\"long polling request response cycle illustration\"],\"num_per_query\":1}юИБ\n\n- Client repeatedly asks:\n  тАЬAny updates?тАЭ\n- Server holds request open until data available\n\nЁЯСЙ Works almost everywhere, but:\n- higher latency\n- more overhead\n\n---\n\n# тЪЩя╕П How fallback works\n\nSignalR does this automatically:\n\n```text\nTry WebSockets\n   тЖУ (if not available)\nTry Server-Sent Events\n   тЖУ\nTry Long Polling\n```\n\nYou donтАЩt usually have to configure anything.\n\n---\n\n# ЁЯза What determines which one is used?\n\n### Depends on:\n\n- Browser support\n- Server support\n- Network restrictions (proxies, firewalls)\n- Hosting environment\n\n---\n\n## Examples\n\n### Modern browser + normal network\nЁЯСЙ WebSockets\n\n---\n\n### Corporate proxy blocking WebSockets\nЁЯСЙ Falls back to SSE or Long Polling\n\n---\n\n### Very restricted environments\nЁЯСЙ Long Polling\n\n---\n\n# тЪая╕П WASM context (your earlier question)\n\nIn a **Blazor WASM app**:\n\n- SignalR client runs in browser\n- Uses browser networking stack\n\nЁЯСЙ So:\n- WebSockets usually work\n- But fallback still applies automatically\n\n---\n\n# ЁЯФз Can you force a mode?\n\nYes, if needed:\n\n```csharp\n.WithUrl(\"/hub\", options =>\n{\n    options.Transports = HttpTransportType.WebSockets;\n})\n```\n\nЁЯСЙ But usually you let SignalR decide\n\n---\n\n# ЁЯзм In your NEXUS framing\n\nThink of it like:\n\n- **SignalR = communication edge**\n- **Transport = implementation detail (lens)**\n\n```text\nEvent Stream\n     тЖУ\nSignalR\n     тЖУ\n[ WebSocket | SSE | LongPolling ]\n```\n\nЁЯСЙ Same logical connection, different physical realization\n\n---\n\n# ЁЯФе Practical takeaway\n\n- You design for **real-time messaging**\n- SignalR guarantees **best available transport**\n\nSo your system:\n\n- behaves the same logically\n- adapts to environment automatically\n\n---\n\n# ЁЯз╛ Bottom line\n\n- тЬЕ WebSockets (best)\n- тЬЕ Server-Sent Events (fallback)\n- тЬЕ Long Polling (last resort)\n- ЁЯФД Automatic fallback handled by SignalR\n\n---\n\nIf you want next step:\n\nЁЯСЙ I can show how to design your event stream so it remains **idempotent + replayable**, which makes these transport differences almost irrelevant (this is where your graph model shines)."

