text = "Here’s a **line-by-line reconciliation checklist for `Core.fs`** so you can compare it against `Types.fs` safely.\n\nUse this as a review pass, top to bottom, before deleting or moving anything.\n\n---\n\n# Core.fs reconciliation checklist\n\n## Goal\n\nMake `Core.fs`:\n\n- small\n- stable\n- foundational\n- unlikely to churn\n\nMove anything else into:\n\n- `Types.fs`\n- `Loader.fs`\n- `Validation.fs`\n\n---\n\n# What should usually remain in `Core.fs`\n\nKeep these **if already present and clean**:\n\n```text\n- namespace Nexus.Core\n- shared Id type\n- tiny stable helper modules for Id or common primitives\n- very small top-level aliases or re-exports\n- possibly Category, if you want it globally central\n- possibly a very small NexusGraph shell, if Core.fs already owns that role\n```\n\n---\n\n# What should usually move out of `Core.fs`\n\nMove these to `Types.fs` if they are in `Core.fs`:\n\n```text\n- Node\n- Boundary\n- Context\n- Relation\n- Derivation\n- Lens\n- Domain\n- Meaning\n- NodeMeaning\n- RelationMeaning\n- Membership\n- LensSelection\n```\n\nMove these to `Loader.fs`:\n\n```text\n- File IO\n- TOML reading\n- parsing\n- normalization from text/files\n```\n\nMove these to `Validation.fs`:\n\n```text\n- duplicate ID checks\n- structural rules\n- validation logic\n- write/read separation checks\n```\n\n---\n\n# Pass 1: file header and namespace\n\n## Check 1\nDoes `Core.fs` begin with something like:\n\n```fsharp\nnamespace Nexus.Core\n```\n\n### Keep\nYes, keep that.\n\n### Action\nNo change unless namespace is inconsistent.\n\n---\n\n# Pass 2: primitive identity\n\n## Check 2\nDoes `Core.fs` define `Id` or another root identifier type?\n\nExample:\n\n```fsharp\ntype Id = Id of string\n```\n\n### Keep\nUsually yes.\n\n### Reason\nThis is foundational and stable.\n\n### Action\nIf `Types.fs` also defines `Id`, choose **one** canonical definition only.\n\n**Recommendation:** keep `Id` in `Core.fs`, remove duplicate from `Types.fs`.\n\n---\n\n# Pass 3: tiny primitives vs ontology payload\n\n## Check 3\nDoes `Core.fs` define very small, universal primitives only?\n\nExamples:\n- `Id`\n- maybe `Category`\n- maybe `Kind`\n\n### Keep\nProbably yes, if the definitions are settled.\n\n### Action\nIf they are still changing a lot, move them to `Types.fs`.\n\n---\n\n# Pass 4: ontology records\n\nFor each of the following, ask:\n\n> Is this stable enough to be foundational, or is it still part of the evolving ontology payload?\n\n## Check 4A\n`Node`\n\n### Recommendation\nMove to `Types.fs`\n\n---\n\n## Check 4B\n`Boundary`\n\n### Recommendation\nMove to `Types.fs`\n\n---\n\n## Check 4C\n`Context`\n\n### Recommendation\nMove to `Types.fs`\n\n---\n\n## Check 4D\n`Relation`\n\n### Recommendation\nMove to `Types.fs`\n\n---\n\n## Check 4E\n`Derivation`\n\n### Recommendation\nMove to `Types.fs`\n\n---\n\n## Check 4F\n`Lens`\n\n### Recommendation\nMove to `Types.fs`\n\n---\n\n## Check 4G\n`Domain`\n\n### Recommendation\nMove to `Types.fs`\n\n---\n\n## Check 4H\n`Meaning`\n\n### Recommendation\nMove to `Types.fs`\n\n---\n\n## Check 4I\nbinding/helper records like:\n- `NodeMeaning`\n- `RelationMeaning`\n- `Membership`\n- `LensSelection`\n\n### Recommendation\nMove to `Types.fs`\n\n---\n\n# Pass 5: graph container\n\n## Check 5\nDoes `Core.fs` define a big wrapper like:\n\n```fsharp\ntype NexusGraph = ...\n```\n\n### Decision rule\n\nKeep it in `Core.fs` only if:\n- `Core.fs` is intended to be the stable entry point\n- the type is already widely referenced\n- you want `Core.fs` to expose the root graph shape\n\nOtherwise:\n- move it to `Types.fs`\n\n### My recommendation\nIf `NexusGraph` is already there and referenced, it can stay.  \nIf not, keep it in `Types.fs` for now.\n\n---\n\n# Pass 6: helper functions\n\n## Check 6\nDoes `Core.fs` include helper functions?\n\nSplit them by type.\n\n### Keep in `Core.fs`\nOnly tiny, stable helpers:\n\n```text\n- Id creation\n- Id formatting\n- trivial primitive helpers\n```\n\n### Move out\nAnything like:\n\n```text\n- graph construction helpers\n- ontology defaults\n- role assignment helpers\n- projection helpers\n- loader helpers\n- validation helpers\n```\n\nThose are too change-prone.\n\n---\n\n# Pass 7: loader logic\n\n## Check 7\nDoes `Core.fs` do any of this?\n\n```text\n- read files\n- parse TOML\n- transform raw text into records\n- normalize loaded values\n```\n\n### Action\nMove all of it to `Loader.fs`\n\n### Reason\nThat is executable infrastructure, not core ontology surface.\n\n---\n\n# Pass 8: validation logic\n\n## Check 8\nDoes `Core.fs` do any of this?\n\n```text\n- ensure unique IDs\n- validate category constraints\n- enforce write/read separation\n- check illegal combinations\n```\n\n### Action\nMove all of it to `Validation.fs`\n\n---\n\n# Pass 9: examples or hard-coded sample data\n\n## Check 9\nDoes `Core.fs` include:\n- example nodes\n- sample graphs\n- demo values\n- testing data\n\n### Action\nMove out.\n\nPut examples in:\n- `nexus/examples/`\n- or test project files later\n\nDo not keep examples in `Core.fs`.\n\n---\n\n# Pass 10: comments and semantics\n\n## Check 10\nAre the comments in `Core.fs` doing one of these?\n\n### Good comments\n- explain why a primitive exists\n- explain why this file stays small\n- explain authoritative role of `nexus/`\n\n### Bad comments\n- huge ontology essays\n- duplicate documentation from `ontology.md`\n- temporary thought process\n\n### Action\nKeep `Core.fs` comments short and architectural.\n\nPush long-form explanation into markdown.\n\n---\n\n# Recommended final shape for Core.fs\n\nThis is the shape I recommend you aim for.\n\n```fsharp\nnamespace Nexus.Core\n\n[<Struct>]\ntype Id = Id of string\n\ntype Category =\n    | Structure\n    | Relation\n    | Meta\n    | Classification\n\nmodule Id =\n    let value (Id x) = x\n    let create x = Id x\n```\n\nOptionally also:\n\n```fsharp\ntype NexusGraph = NexusGraph of unit\n```\n\nif you truly want `Core.fs` to own the root symbolic entry point, but not necessary.\n\nThat’s it.  \nSmall. Stable. Foundational.\n\n---\n\n# Recommended final shape for Types.fs\n\n`Types.fs` should absorb the ontology payload:\n\n```text\n- Kind\n- Role\n- Node\n- Boundary\n- Context\n- Relation\n- Derivation\n- Lens\n- Domain\n- Meaning\n- NodeMeaning\n- RelationMeaning\n- Membership\n- LensSelection\n- NexusGraph (if not in Core.fs)\n```\n\n---\n\n# Decision matrix\n\nUse this rule for every item you see in `Core.fs`.\n\n## Keep in Core.fs if all are true\n\n```text\n- foundational\n- tiny\n- stable\n- likely used everywhere\n- unlikely to change with ontology evolution\n```\n\n## Move out if any are true\n\n```text\n- still being shaped\n- tied to file loading\n- tied to validation\n- tied to examples\n- tied to projections\n- tied to a specific lens\n- likely to churn as understanding improves\n```\n\n---\n\n# Safe refactor sequence\n\nDo this in order.\n\n## Step 1\nOpen `Core.fs` and mark each block with one of:\n\n```text\nKEEP\nMOVE_TO_TYPES\nMOVE_TO_LOADER\nMOVE_TO_VALIDATION\nDELETE_OR_ARCHIVE\n```\n\n---\n\n## Step 2\nDo **not** edit behavior yet. Just classify.\n\n---\n\n## Step 3\nMove blocks one category at a time.\n\nRecommended order:\n\n1. loader code\n2. validation code\n3. sample/example code\n4. ontology records\n5. final primitive cleanup\n\n---\n\n## Step 4\nBuild after each move.\n\n---\n\n## Step 5\nOnly after all moves, shrink comments and clean names.\n\n---\n\n# Manual reconciliation worksheet\n\nCopy this into a scratch note while reviewing `Core.fs`.\n\n```md\n# Core.fs Reconciliation\n\n## KEEP\n- [ ]\n- [ ]\n- [ ]\n\n## MOVE_TO_TYPES\n- [ ]\n- [ ]\n- [ ]\n\n## MOVE_TO_LOADER\n- [ ]\n- [ ]\n- [ ]\n\n## MOVE_TO_VALIDATION\n- [ ]\n- [ ]\n- [ ]\n\n## DELETE_OR_ARCHIVE\n- [ ]\n- [ ]\n- [ ]\n```\n\n---\n\n# Strong recommendation for your exact situation\n\nBecause `Core.fs` already exists from earlier work:\n\n**do not try to perfect it in one pass.**\n\nUse two commits:\n\n### Commit 1\n```text\nfeat(core): add Types.fs, Loader.fs, and Validation.fs scaffolding\n```\n\n### Commit 2\n```text\nrefactor(core): thin Core.fs and move evolving ontology details to dedicated files\n```\n\nThat keeps the transition understandable.\n\n---\n\n# Best commit body for the refactor\n\n```text\nrefactor(core): thin Core.fs and move evolving ontology details to dedicated files\n\nWhy:\nCore.fs had started to mix foundational primitives with evolving ontology payload and infrastructure concerns.\n\nWhat changed:\n- kept only stable core primitives in Core.fs\n- moved ontology records to Types.fs\n- moved file loading to Loader.fs\n- moved validation logic to Validation.fs\n\nWhat stayed authoritative:\nCanonical ontology remains under /nexus/core.\n\nImpact:\nClarifies Core.fs as a stable surface and reduces merge risk.\n```\n\n---\n\n# Branching strategy aligned with NEXUS\n\n## Recommended branch model\n\nKeep it simple for now.\n\n### Permanent branch\n```text\nmain\n```\n\nThat’s enough right now.\n\n### Short-lived working branches\nUse:\n\n```text\n<kind>/<scope>-<purpose>\n```\n\nExamples:\n\n```text\ndocs/core-ontology-bootstrap\nlaw/write-read-separation\ndef/interface-definition\nlens/node-vs-behavior\nfeat/core-loader\nrefactor/core-fs-split\nsite/nexus-docs-bootstrap\ntool/toml-validation\n```\n\n---\n\n## Recommended branch kinds\n\nUse these:\n\n```text\ndocs\nlaw\ndef\nlens\nfeat\nrefactor\nfix\nsite\ntool\nexample\n```\n\nThese are better than generic branching names because they match your ontology work.\n\n---\n\n# Commit conventions aligned with NEXUS\n\n## Format\n\n```text\n<kind>(<scope>): <summary>\n```\n\nExamples:\n\n```text\ndocs(core): add base ontology explanation\nlaw(write-read): define separation as hard invariant\ndef(interface): clarify boundary role in software lens\nlens(node): describe node-only structural view\nfeat(loader): add initial ontology TOML reader\nrefactor(core): thin Core.fs and move ontology records to Types.fs\nfix(ids): correct stable law identifiers\nsite(nexus): add docs projection starter files\n```\n\n---\n\n## Meaning of kinds\n\n### `law`\nUse when changing an invariant or rule.\n\n### `def`\nUse when defining or revising a concept meaning.\n\n### `lens`\nUse when changing how a lens is described or modeled.\n\n### `docs`\nUse for explanatory markdown and READMEs.\n\n### `feat`\nUse for new executable capability.\n\n### `refactor`\nUse for code movement or reshaping without changing intended behavior.\n\n### `fix`\nUse for corrections.\n\n### `site`\nUse for website projection or publishing concerns.\n\n### `tool`\nUse for utilities and pipelines.\n\n### `example`\nUse for worked examples.\n\n---\n\n# PR / merge rule\n\nOnce you settle into this flow, use this rule:\n\n```text\nNo direct ontology-shaping changes to main.\nUse a branch, then merge intentionally.\n```\n\nEven if you are the only one touching it right now, that will keep history cleaner.\n\n---\n\n# Recommended immediate next branch and commits\n\n## Branch\n```text\nrefactor/core-fs-split\n```\n\n## Commits\n```text\ndocs(repo): add NEXUS repo orientation and folder responsibilities\ndocs(core): add ontology, laws, definitions, IDs, and lens starter files\nfeat(core): add Types.fs, Loader.fs, and Validation.fs scaffolding\nrefactor(core): thin Core.fs and move evolving ontology details to dedicated files\n```\n\n---\n\n# Bottom line\n\n## Core.fs should be:\n- tiny\n- stable\n- foundational\n- boring\n\n## Types.fs should be:\n- rich\n- expressive\n- ontology-shaped\n- more willing to evolve\n\n## Branches should reflect NEXUS work:\n- `law/...`\n- `def/...`\n- `lens/...`\n- `feat/...`\n- `refactor/...`\n\n## Commits should say what kind of NEXUS change happened:\n- `law(scope): ...`\n- `def(scope): ...`\n- `lens(scope): ...`\n- `refactor(scope): ...`\n\nIf you paste your current `Core.fs`, I’ll do a **direct reconciliation pass** and mark each line/block as KEEP, MOVE, or DELETE."

