ink_69bbf1b0ef208191aa12eab47518e25b/label_pr = (_: {\nrepository_full_name: string,\npr_number: number,\nlabel: string,\n}) => any;\n// List all organizations the authenticated user has installed this GitHub App on.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/list_installations = () => any;\n// List all accounts that the user has installed our GitHub app on.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/list_installed_accounts = () => any;\n// List changed filenames for a PR across all paginated file-list pages.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/list_pr_changed_filenames = (_: {\nrepo_full_name: string,\npr_number: number,\n}) => any;\n// Return the most recent GitHub issues the user can access.\n// `top_k` is the final result limit. The connector transparently paginates\n// GitHub's issues API until that limit is reached or no more pages exist.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/list_recent_issues = (_: {\ntop_k?: number, // default: 20\n}) => any;\n// List repositories accessible to the authenticated user.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/list_repositories = (_: {\npage_size?: number, // default: 20\npage_offset?: number, // default: 0\ninclude_search_index_status?: boolean, // default: False\n}) => any;\n// List repositories accessible to the authenticated user filtered by affiliation.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/list_repositories_by_affiliation = (_: {\naffiliation: string,\npage_size?: number, // default: 100\npage_offset?: number, // default: 0\n}) => any;\n// List repositories accessible to the authenticated user.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/list_repositories_by_installation = (_: {\ninstallation_id: number,\npage_size?: number, // default: 20\npage_offset?: number, // default: 0\n}) => any;\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/list_user_org_memberships = () => any;\n// List organizations the authenticated user is a member of.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/list_user_orgs = () => any;\n// Remove a reaction from an issue comment.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/remove_reaction_from_issue_comment = (_: {\nrepo_full_name: string,\ncomment_id: number,\nreaction_id: number,\n}) => any;\n// Remove a reaction from a GitHub pull request.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/remove_reaction_from_pr = (_: {\nrepo_full_name: string,\npr_number: number,\nreaction_id: number,\n}) => any;\n// Remove a reaction from a pull request review comment.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/remove_reaction_from_pr_review_comment = (_: {\nrepo_full_name: string,\ncomment_id: number,\nreaction_id: number,\n}) => any;\n// Reply to an inline review comment on a PR (Files changed thread).\n// comment_id must be the ID of the thread’s top-level inline review comment (replies-to-replies are not supported by the API)\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/reply_to_review_comment = (_: {\nrepo_full_name: string,\npr_number: number,\ncomment_id: number,\ncomment: string,\n}) => any;\n// Search files within a specific GitHub repository.\n// Provide a plain string query, avoid GitHub query flags such as ``is:pr``.\n// Include keywords that match file names, functions, or error messages.\n// ``repository_name`` or ``org`` can narrow the search scope. Example:\n// ``query=\"tokenizer bug\" repository_name=\"tiktoken\"``.\n// ``topn`` is the number of results to return.\n// No results are returned if the query is empty.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/search = (_: {\nquery: string,\ntopn?: number, // default: 20\nrepository_name?: string | string[] | null,\norg?: string | null,\n}) => any;\n// Search GitHub branches within a repository.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/search_branches = (_: {\nowner: string,\nrepo_name: string,\nquery: string,\npage_size?: number, // default: 20\ncursor?: string | null,\n}) => any;\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/search_commits = (_: {\nquery: string,\nrepo?: string | string[] | null,\norg?: string | null,\ntopn?: number, // default: 20\nsort?: any | null,\norder?: any | null,\n}) => any;\n// Search for a repository (not a file) by name or description. To search for a file, use `search`.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/search_installed_repositories_streaming = (_: {\nquery: string,\nlimit?: number, // default: 10\nnext_token?: string | null,\noption_enrich_code_search_index_availability?: boolean, // default: True\noption_enrich_code_search_index_request_concurrency_limit?: number, // default: 10\n}) => any;\n// Search repositories within the user's installations using GitHub search.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/search_installed_repositories_v2 = (_: {\nquery: string,\nlimit?: number, // default: 10\ninstallation_ids?: string[] | null,\npage?: number, // default: 1\ninclude_search_index_status?: boolean, // default: False\n}) => any;\n// Search GitHub issues.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/search_issues = (_: {\nquery: string,\nrepo: string | string[],\ntopn?: number, // default: 20\nsort?: any | null,\norder?: any | null,\n}) => any;\n// Search GitHub pull requests.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/search_prs = (_: {\nquery: string,\nrepo?: string | string[] | null,\norg?: string | null,\ntopn?: number, // default: 20\nsort?: any | null,\norder?: any | null,\n}) => any;\n// Search for a repository (not a file) by name or description. To search for a file, use `search`.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/search_repositories = (_: {\nquery: string,\nper_page?: number | null,\npage?: number, // default: 1\norg?: string | null,\ntopn?: number | null,\n}) => any;\n// Update a top-level PR Conversation comment (Issue comment).\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/update_issue_comment = (_: {\nrepo_full_name