text = "{\"finite\": true}\n// Create a top-level PR Conversation comment (Issue comment).\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/add_comment_to_issue = (_: {\nrepo_full_name: string,\npr_number: number,\ncomment: string,\n}) => any;\n// Add a reaction to an issue comment.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/add_reaction_to_issue_comment = (_: {\nrepo_full_name: string,\ncomment_id: number,\nreaction: string,\n}) => any;\n// Add a reaction to a GitHub pull request.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/add_reaction_to_pr = (_: {\nrepo_full_name: string,\npr_number: number,\nreaction: string,\n}) => any;\n// Add a reaction to a pull request review comment.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/add_reaction_to_pr_review_comment = (_: {\nrepo_full_name: string,\ncomment_id: number,\nreaction: string,\n}) => any;\n// Add a review to a GitHub pull request. review is required for REQUEST_CHANGES and COMMENT events.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/add_review_to_pr = (_: {\nrepo_full_name: string,\npr_number: number,\nreview: string | null,\naction: any | null,\nfile_comments: any[],\ncommit_id?: string | null,\n}) => any;\n// Check if a GitHub repository has been set up.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/check_repo_initialized = (_: {\nrepo_id: number,\n}) => any;\n// Compare two commits/refs and return per-file stats plus compare metadata.\n// This is a thin wrapper around `GithubPlugin.compare_commits` to provide a stable,\n// compact response shape to connector consumers.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/compare_commits = (_: {\nrepo_full_name: string,\nbase: string,\nhead: string,\n}) => any;\n// Create a blob in the repository and return its SHA.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/create_blob = (_: {\nrepository_full_name: string,\ncontent: string,\n// One of utf-8 or base64. Default is utf-8.\nencoding?: \"utf-8\" | \"base64\", // default: utf-8\n}) => any;\n// Create a new branch in the given repository from base_branch.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/create_branch = (_: {\nrepository_full_name: string,\nbranch_name: string,\nsha: string,\n}) => any;\n// Create a commit pointing to tree_sha with parent parent_sha.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/create_commit = (_: {\nrepository_full_name: string,\nmessage: string,\ntree_sha: string,\nparent_sha: string,\n}) => any;\n// Create a new file in the repository via the contents API.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/create_file = (_: {\nrepository_full_name: string,\npath: string,\ncontent: string,\nmessage: string,\nbranch?: string | null,\n}) => any;\n// Open a pull request in the repository.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/create_pull_request = (_: {\nrepository_full_name: string,\ntitle: string,\nbody: string,\nhead_branch: string,\nbase_branch: string,\ndraft?: boolean, // default: False\n}) => any;\n// Create a tree object in the repository from the given elements.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/create_tree = (_: {\nrepository_full_name: string,\ntree_elements: object[],\nbase_tree_sha?: string | null,\n}) => any;\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/download_user_content = (_: {\nurl: string,\n}) => any;\n// Enable auto-merge for a pull request.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/enable_auto_merge = (_: {\nrepository_full_name: string,\npr_number: number,\n}) => any;\n// Fetch a file from GitHub by URL.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/fetch = (_: {\nurl: string,\n}) => any;\n// Fetch blob content by SHA from the given repository.\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/fetch_blob = (_: {\nrepository_full_name: string,\nblob_sha: string,\n}) => any;\ntype /GitHub/link_69bbf1b0ef208191aa12eab47518e25b/fetch_commit = (_: {\nrepo_full_name: string,\ncommit_sha: string,\n}) => any;\n// Fetch