text = "import os, textwrap, json, pathlib, shutil\n\nbase = pathlib.Path(\"/mnt/data/NEXUS\")\nbase.mkdir(parents=True, exist_ok=True)\n\n# Create scaffold rooted at /mnt/data/NEXUS to mirror the user's requested C:\\CODE\\NEXUS\\\npaths = [\n    \"README.md\",\n    \"nexus/README.md\",\n    \"nexus/core/README.md\",\n    \"nexus/core/ontology.md\",\n    \"nexus/core/ontology.toml\",\n    \"nexus/core/ids.md\",\n    \"nexus/definitions/README.md\",\n    \"nexus/definitions/interface.md\",\n    \"nexus/definitions/command.md\",\n    \"nexus/definitions/event.md\",\n    \"nexus/definitions/view.md\",\n    \"nexus/laws/README.md\",\n    \"nexus/laws/write-read-separation.md\",\n    \"nexus/lenses/README.md\",\n    \"nexus/lenses/node-lens.md\",\n    \"nexus/lenses/behavior-lens.md\",\n    \"nexus/examples/README.md\",\n    \"nexus/examples/order-processing.md\",\n    \"src/Nexus/README.md\",\n    \"src/Nexus/Core/Types.fs\",\n    \"src/Nexus/Core/Loader.fs\",\n    \"src/Nexus/Core/Validation.fs\",\n]\nfor rel in paths:\n    p = base / rel\n    p.parent.mkdir(parents=True, exist_ok=True)\n\nfiles = {}\n\nfiles[\"README.md\"] = \"\"\"# NEXUS\n\nThis repository contains the current Git-based source of truth for the foundational NEXUS ontology and the executable code that works with it.\n\n## Repository map\n\n- `nexus/` — canonical knowledge content: ontology, laws, definitions, lenses, and examples\n- `src/` — F# code that loads, validates, transforms, and projects canonical NEXUS content\n- `site/` — website projection target, if and when you add it\n- `tools/` — utilities and pipelines, if and when you add them later\n\n## Source of truth rule\n\nCanonical content lives under `nexus/`.\n\nCode under `src/` works with canonical content but is not itself the ontology source of truth.\n\nGenerated or projected outputs must not silently replace canonical content.\n\n## Start here\n\n1. `nexus/core/ontology.md`\n2. `nexus/laws/write-read-separation.md`\n3. `nexus/core/ontology.toml`\n4. `src/Nexus/Core/Types.fs`\n\n## NEXUS system roles\n\n- `LOGOS` — persisted knowledge and fact record\n- `ATLAS` — studio for humans to shape and finalize graphs/specs\n- `FORGE` — projection / build / materialization engine\n- `CORTEX` — AI support layer that helps across all aspects of NEXUS\n\n### Hard rule\n\nAccepted outputs from ATLAS must be persisted into LOGOS.\n\"\"\"\n\nfiles[\"nexus/README.md\"] = \"\"\"# nexus/\n\nThis folder contains canonical NEXUS knowledge content.\n\nIt is intended to hold the human-readable and machine-loadable definitions that describe the current ontology, laws, lenses, and examples.\n\n## Subfolders\n\n- `core/` — base ontology and IDs\n- `definitions/` — canonical concept definitions\n- `laws/` — invariant rules and constraints\n- `lenses/` — descriptions of modeling lenses\n- `examples/` — worked examples\n\n## Rule\n\nContent here is canonical unless explicitly marked as generated or experimental.\n\n## Why this folder exists\n\nThis repo separates:\n\n- `nexus/` = what the system means\n- `src/` = code that works with that meaning\n\nThat separation keeps the source of truth clear.\n\"\"\"\n\nfiles[\"nexus/core/README.md\"] = \"\"\"# nexus/core/\n\nThis folder defines the base NEXUS ontology.\n\n## Purpose\n\nTo hold the minimal canonical definitions that sit just above graph theory.\n\n## Canonical files\n\n- `ontology.md` — human and LLM-readable ontology explanation\n- `ontology.toml` — machine-loadable ontology representation\n- `ids.md` — stable concept IDs and naming guidance\n\n## Notes\n\nThis folder is intentionally small and conservative.\n\nChanges here should be rare and deliberate because they affect the whole system.\n\n## Core separation\n\nNEXUS separates:\n- structure\n- relation\n- meta\n- classification\n\nThis keeps mental models clear and prevents meaning from being confused with structure.\n\"\"\"\n\nfiles[\"nexus/core/ontology.md\"] = \"\"\"# NEXUS Base Ontology\n\nNodeId: `nexus.core.ontology`\n\n## Purpose\n\nNEXUS is a graph-centered ontology that stays only slightly above graph theory.\n\nIt separates:\n\n- Structure — what exists\n- Relation — how structure connects\n- Meta — how structure is interpreted\n- Classification — labels that help keep mental models clear\n\nThis separation is important because structure and meaning are not the same.\n\n---\n\n## Core categories\n\n### Structure\n\nStructure defines what exists as first-class things in the graph.\n\n#### Node\nCategory: Structure  \nNodeId: `nexus.node`\n\nA distinct thing in the graph.\n\nSemantics:\n- A node is an identifiable unit.\n- A node has no required meaning by itself.\n- Meaning is assigned later through meta-layer interpretation.\n\nExamples:\n- a software command node\n- a biological signal node\n- a knowledge fact node\n- a UI view node\n\n#### Boundary\nCategory: Structure  \nNodeId: `nexus.boundary`\n\nA structural point or region where one context hands off to another.\n\nSemantics:\n- A boundary separates contexts while allowing handoff.\n- A boundary may be represented as a node or as a region depending on lens.\n- Storage, API surfaces, and interfaces are often boundary realizations in domain-specific lenses.\n\nExamples:\n- event store boundary\n- API boundary\n- UI boundary\n- file system boundary\n\n#### Context\nCategory: Structure  \nNodeId: `nexus.context`\n\nA bounded region of the graph where a subset of nodes and relations operate together under a specific scope.\n\nSemantics:\n- Context is structural, not merely semantic.\n- Context answers: what belongs together here?\n- Context may contain nodes, relations, and boundaries.\n\nExamples:\n- Order Processing context\n- Shipping context\n- Knowledge Capture context\n- Cell Signaling context\n\n---\n\n### Relation\n\nRelation defines how structural things connect.\n\n#### Relation\nCategory: Relation  \nNodeId: `nexus.relation`\n\nA connection between nodes.\n\nSemantics:\n- Relation is the generic edge type.\n- Domain-specific edges refine Relation.\n- Relation alone does not imply derivation or causation.\n\nExamples:\n- relates_to\n- connected_to\n- associated_with\n\n#### Derivation\nCategory: Relation  \nNodeId: `nexus.derivation`\n\nA specialized relation where one node is formed from, based on, or depends on another node.\n\nSemantics:\n- Derivation is directional.\n- Derivation is the primitive behind projection, transformation, and downstream shaping.\n- A node may have multiple independent derivations.\n\nExamples:\n- a read model derived from an event\n- a report derived from source facts\n- a summary derived from a document\n\nLaw:\n- A node may have multiple independent derivations.\n\n---\n\n### Meta\n\nMeta defines how structure is interpreted.\n\n#### Lens\nCategory: Meta  \nNodeId: `nexus.lens`\n\nA selective view over the graph that reveals only some nodes, relations, or categories.\n\nSemantics:\n- A lens does not change the graph.\n- A lens changes visibility, emphasis, or interpretation.\n- Different lenses may reveal different aspects of the same underlying graph.\n\nExamples:\n- node lens\n- edge lens\n- timeline lens\n- runtime lens\n- storage lens\n\n#### Domain\nCategory: Meta  \nNodeId: `nexus.domain`\n\nA coherent space of meaning applied to graph structure.\n\nSemantics:\n- Domain is not structure.\n- Domain defines vocabulary and interpretation.\n- The same graph structure may be interpreted differently in different domains.\n\nExamples:\n- Software Development\n- Knowledge\n- Biology\n- Logistics\n- Communication\n\n#### Meaning\nCategory: Meta  \nNodeId: `nexus.meaning`\n\nA specific semantic interpretation assigned to a structural element within a domain.\n\nSemantics:\n- Meaning is not structure.\n- Meaning maps a structural element to a role or interpretation.\n- The same node may have different meanings in different domains or lenses.\n\nExamples:\n- node interpreted as Event in Software Development\n- node interpreted as Fact in Knowledge\n- node interpreted as Signal in Biology\n\n---\n\n### Classification\n\nClassification helps organize structure without changing the graph itself.\n\n#### Category\nCategory: Classification  \nNodeId: `nexus.category`\n\nA high-level grouping used to keep mental models straight.\n\nExamples:\n- Structure\n- Relation\n- Meta\n- Classification\n\n#### Kind\nCategory: Classification  \nNodeId: `nexus.kind`\n\nA category label used to classify a structural or meta element.\n\nSemantics:\n- Kind does not change structure.\n- Kind is useful for validation, tooling, and readability.\n\n#### Role\nCategory: Classification  \nNodeId: `nexus.role`\n\nA contextual classification of how an element is functioning in a specific lens or context.\n\nSemantics:\n- Role is lens-relative or context-relative.\n- Role is not necessarily permanent.\n- The same node may take different roles in different lenses.\n\nExamples:\n- Interface\n- Command\n- Event\n- View\n- Processor\n\n---\n\n## Minimal NEXUS laws\n\n### Law 1\nNodeId: `nexus.law.node-may-relate`\n\nA node may relate to other nodes.\n\n### Law 2\nNodeId: `nexus.law.multiple-independent-derivations`\n\nA node may have multiple independent derivations.\n\n### Law 3\nNodeId: `nexus.law.boundary-separates-contexts`\n\nA boundary separates contexts while allowing handoff.\n\n### Law 4\nNodeId: `nexus.law.lens-reveals-partial-graph`\n\nA lens reveals only part of the graph.\n\n### Law 5\nNodeId: `nexus.law.meaning-does-not-alter-structure`\n\nMeaning does not alter structure.\n\n---\n\n## Event Modeling and software lens notes\n\nAt the software / Event Modeling layer, the canonical node sets are:\n\n### Write side\n- Interface\n- Command\n- Event\n\n### Read side\n- Event\n- View\n- Interface\n\nHard rule:\nNEXUS modeling is always EITHER write side OR read side, never a combined chain.\n\nAnti-pattern:\n- Interface -> Command -> Event -> View\n\nCorrect:\n- Write side: Interface, Command, Event\n- Read side: Event, View, Interface\n\n---\n\n## Event Modeling placement\n\nEvent Modeling is better understood as a coordinated set of lenses, not a domain.\n\nExamples:\n- Node lens\n- Behavior lens\n- Timeline lens\n- Example data lens\n\"\"\"\n\nfiles[\"nexus/core/ontology.toml\"] = \"\"\"[ontology]\nname = \"NEXUS Base Ontology\"\nversion = \"0.1.0\"\ndescription = \"Minimal NEXUS ontology just above graph theory.\"\n\n[[categories]]\nid = \"nexus.category.structure\"\nlabel = \"Structure\"\ndefinition = \"Defines what exists as first-class things in the graph.\"\n\n[[categories]]\nid = \"nexus.category.relation\"\nlabel = \"Relation\"\ndefinition = \"Defines how structural elements connect.\"\n\n[[categories]]\nid = \"nexus.category.meta\"\nlabel = \"Meta\"\ndefinition = \"Defines how structure is interpreted.\"\n\n[[categories]]\nid = \"nexus.category.classification\"\nlabel = \"Classification\"\ndefinition = \"Defines labels used for organization and tooling.\"\n\n[[roles]]\nid = \"nexus.role.interface\"\nlabel = \"Interface\"\ndefinition = \"A context-relative role at a boundary.\"\n\n[[roles]]\nid = \"nexus.role.command\"\nlabel = \"Command\"\ndefinition = \"A software-lens role representing requested change.\"\n\n[[roles]]\nid = \"nexus.role.event\"\nlabel = \"Event\"\ndefinition = \"A software-lens role representing recorded fact.\"\n\n[[roles]]\nid = \"nexus.role.view\"\nlabel = \"View\"\ndefinition = \"A software-lens role representing a derived read artifact.\"\n\n[[roles]]\nid = \"nexus.role.processor\"\nlabel = \"Processor\"\ndefinition = \"A role representing active processing within a context or lens.\"\n\n[[domains]]\nid = \"nexus.domain.software-development\"\nlabel = \"Software Development\"\ndefinition = \"A coherent software-oriented meaning space.\"\n\n[[domains]]\nid = \"nexus.domain.knowledge\"\nlabel = \"Knowledge\"\ndefinition = \"A coherent knowledge-oriented meaning space.\"\n\n[[meanings]]\nid = \"nexus.meaning.software.event\"\ndomain_id = \"nexus.domain.software-development\"\nlabel = \"Event\"\ndefinition = \"A recorded fact that something occurred.\"\n\n[[meanings]]\nid = \"nexus.meaning.software.view\"\ndomain_id = \"nexus.domain.software-development\"\nlabel = \"View\"\ndefinition = \"A derived read artifact shaped for a consumer.\"\n\n[[meanings]]\nid = \"nexus.meaning.knowledge.fact\"\ndomain_id = \"nexus.domain.knowledge\"\nlabel = \"Fact\"\ndefinition = \"A knowledge-domain semantic interpretation for a node.\"\n\n[[lenses]]\nid = \"nexus.lens.node\"\nlabel = \"Node Lens\"\ndefinition = \"Reveals nodes while hiding most relation detail.\"\n\n[[lenses]]\nid = \"nexus.lens.behavior\"\nlabel = \"Behavior Lens\"\ndefinition = \"Reveals behavior-oriented relation detail.\"\n\n[[laws]]\nid = \"nexus.law.node-may-relate\"\nlabel = \"A node may relate to other nodes.\"\ncategory = \"Relation\"\n\n[[laws]]\nid = \"nexus.law.multiple-independent-derivations\"\nlabel = \"A node may have multiple independent derivations.\"\ncategory = \"Relation\"\n\n[[laws]]\nid = \"nexus.law.boundary-separates-contexts\"\nlabel = \"A boundary separates contexts while allowing handoff.\"\ncategory = \"Structure\"\n\n[[laws]]\nid = \"nexus.law.lens-reveals-partial-graph\"\nlabel = \"A lens reveals only part of the graph.\"\ncategory = \"Meta\"\n\n[[laws]]\nid = \"nexus.law.meaning-does-not-alter-structure\"\nlabel = \"Meaning does not alter structure.\"\ncategory = \"Meta\"\n\"\"\"\n\nfiles[\"nexus/core/ids.md\"] = \"\"\"# Stable IDs\n\nThis file records stable IDs for foundational NEXUS concepts.\n\n## Why this file exists\n\nStable IDs make it easier to:\n\n- link canonical docs\n- generate site URLs\n- attach forum discussions\n- build tooling without fragile string matching\n\n## Core IDs\n\n- `nexus.node`\n- `nexus.boundary`\n- `nexus.context`\n- `nexus.relation`\n- `nexus.derivation`\n- `nexus.lens`\n- `nexus.domain`\n- `nexus.meaning`\n- `nexus.category`\n- `nexus.kind`\n- `nexus.role`\n\n## Law IDs\n\n- `nexus.law.node-may-relate`\n- `nexus.law.multiple-independent-derivations`\n- `nexus.law.boundary-separates-contexts`\n- `nexus.law.lens-reveals-partial-graph`\n- `nexus.law.meaning-does-not-alter-structure`\n\n## Guidance\n\n- Prefer stable lowercase dot-separated IDs.\n- Avoid renaming IDs once public.\n- Human-readable labels may change; IDs should not.\n\"\"\"\n\nfiles[\"nexus/definitions/README.md\"] = \"\"\"# nexus/definitions/\n\nThis folder contains canonical concept definitions.\n\nUse one file per concept where possible.\n\n## Purpose\n\nDefinitions are human-readable canonical references for terms that appear in lenses, laws, examples, and tooling.\n\n## Rule\n\nDefinitions here are canonical prose, not generated summaries.\n\"\"\"\n\nfor name, label, body in [\n    (\"interface.md\",\"Interface\",\"A boundary-oriented concept that participates in either the write side or the read side depending on lens.\\n\\nIn the software / Event Modeling lens:\\n- Write side node set: Interface, Command, Event\\n- Read side node set: Event, View, Interface\"),\n    (\"command.md\",\"Command\",\"A software-lens role for requested change.\\n\\nCommands belong to the write side only.\"),\n    (\"event.md\",\"Event\",\"A software-lens role representing a recorded fact.\\n\\nEvent is the shared node role between write and read sides.\"),\n    (\"view.md\",\"View\",\"A software-lens role representing a derived read artifact shaped for a consumer.\\n\\nViews belong to the read side only.\")\n]:\n    files[f\"nexus/definitions/{name}\"] = f\"# {label}\\n\\n{body}\\n\"\n\nfiles[\"nexus/laws/README.md\"] = \"\"\"# nexus/laws/\n\nThis folder contains invariant rules and guardrails.\n\n## Purpose\n\nLaws are stronger than examples and stronger than preferences.\n\nThey exist to stop drift.\n\"\"\"\n\nfiles[\"nexus/laws/write-read-separation.md\"] = \"\"\"# Write / Read Separation\n\nLawId: `nexus.law.write-read-separation`\n\n## Statement\n\nNEXUS modeling is always EITHER write side OR read side, never a combined chain.\n\n## Canonical node sets\n\n### Write side\n- Interface\n- Command\n- Event\n\n### Read side\n- Event\n- View\n- Interface\n\n## Anti-pattern\n\n- Interface -> Command -> Event -> View\n\n## Why this matters\n\nCombining write and read into one chain collapses different concerns and breaks lens separation.\n\n## Notes\n\nEvent is the shared node role between the two sides, but the sides remain distinct.\n\"\"\"\n\nfiles[\"nexus/lenses/README.md\"] = \"\"\"# nexus/lenses/\n\nThis folder describes modeling lenses.\n\n## Purpose\n\nA lens reveals part of the graph without changing the graph.\n\nDifferent lenses emphasize different things:\n- nodes\n- relations\n- time\n- data\n- runtime mechanics\n\"\"\"\n\nfiles[\"nexus/lenses/node-lens.md\"] = \"\"\"# Node Lens\n\nThe node lens emphasizes node sets while suppressing or compressing relation detail.\n\n## Example\n\nSoftware / Event Modeling node sets:\n\n### Write side\n- Interface\n- Command\n- Event\n\n### Read side\n- Event\n- View\n- Interface\n\n## Notes\n\nThis lens is especially useful when you want structural clarity without runtime detail.\n\"\"\"\n\nfiles[\"nexus/lenses/behavior-lens.md\"] = \"\"\"# Behavior Lens\n\nThe behavior lens reveals relation-oriented behavior, such as handler logic, projector logic, or GIVEN/WHEN/THEN forms in software-oriented modeling.\n\n## Notes\n\nThis lens is not the same as the node lens.\n\nThe node lens shows participants.\nThe behavior lens shows what happens between or around those participants.\n\"\"\"\n\nfiles[\"nexus/examples/README.md\"] = \"\"\"# nexus/examples/\n\nThis folder contains worked examples.\n\nExamples are useful for explanation, but they are not laws.\n\"\"\"\n\nfiles[\"nexus/examples/order-processing.md\"] = \"\"\"# Order Processing Example\n\nThis example shows how software-specific meanings sit on top of the NEXUS base layer.\n\n## Write side node set\n- Interface\n- Command\n- Event\n\nExample:\n- Interface: Checkout Form\n- Command: PlaceOrder\n- Event: OrderPlaced\n\n## Read side node set\n- Event\n- View\n- Interface\n\nExample:\n- Event: OrderPlaced\n- View: OrderStatusView\n- Interface: Customer Web Page\n\n## Important\n\nThis does NOT imply a single combined chain.\n\"\"\"\n\nfiles[\"src/Nexus/README.md\"] = \"\"\"# src/Nexus/\n\nThis folder contains executable F# code for working with canonical NEXUS content.\n\n## Important distinction\n\nThe ontology source of truth lives under `/nexus/`.\n\nCode in this folder loads, validates, transforms, and projects that content.\nIt should not silently redefine canonical ontology terms in a way that diverges from `/nexus/`.\n\n## Typical contents\n\n- loaders\n- validators\n- graph models\n- projection helpers\n\"\"\"\n\nfiles[\"src/Nexus/Core/Types.fs\"] = \"\"\"namespace Nexus.Core\n\n/// These types are the executable in-memory representation of canonical NEXUS content.\n/// They work with the ontology under /nexus/core/ but do not replace it.\n///\n/// Core.fs already existed earlier in the conversation, so this file is intentionally\n/// separate and conservative.\n\n[<Struct>]\ntype Id = Id of string\n\n// =========================\n// Classification\n// =========================\n\ntype Category =\n    | Structure\n    | Relation\n    | Meta\n    | Classification\n\ntype Kind =\n    | NodeKind\n    | BoundaryKind\n    | ContextKind\n    | RelationKind\n    | DerivationKind\n    | LensKind\n    | DomainKind\n    | MeaningKind\n    | RoleKind\n\ntype Role =\n    | InterfaceRole\n    | CommandRole\n    | EventRole\n    | ViewRole\n    | ProcessorRole\n    | CustomRole of string\n\n// =========================\n// Structure\n// =========================\n\ntype Node =\n    { Id: Id\n      Label: string option\n      Roles: Role list }\n\ntype Boundary =\n    { Id: Id\n      Label: string option\n      FromContext: Id option\n      ToContext: Id option }\n\ntype Context =\n    { Id: Id\n      Label: string option\n      ParentContext: Id option }\n\n// =========================\n// Relation\n// =========================\n\ntype Relation =\n    { Id: Id\n      Source: Id\n      Target: Id\n      Label: string option }\n\ntype Derivation =\n    { Id: Id\n      Source: Id\n      Target: Id\n      Label: string option\n      IsIndependent: bool }\n\n// =========================\n// Meta\n// =========================\n\ntype Lens =\n    { Id: Id\n      Label: string option\n      Description: string option }\n\ntype Domain =\n    { Id: Id\n      Label: string\n      Description: string option }\n\ntype Meaning =\n    { Id: Id\n      DomainId: Id\n      Label: string\n      Description: string option }\n\n// =========================\n// Bindings / Interpretation\n// =========================\n\ntype NodeMeaning =\n    { NodeId: Id\n      MeaningId: Id }\n\ntype RelationMeaning =\n    { RelationId: Id\n      MeaningId: Id }\n\ntype Membership =\n    | NodeInContext of NodeId: Id * ContextId: Id\n    | RelationInContext of RelationId: Id * ContextId: Id\n    | BoundaryInContext of BoundaryId: Id * ContextId: Id\n    | DerivationInContext of DerivationId: Id * ContextId: Id\n\ntype LensSelection =\n    { LensId: Id\n      IncludedNodeIds: Id list\n      IncludedRelationIds: Id list\n      IncludedBoundaryIds: Id list\n      IncludedContextIds: Id list }\n\ntype NexusGraph =\n    { Nodes: Node list\n      Boundaries: Boundary list\n      Contexts: Context list\n      Relations: Relation list\n      Derivations: Derivation list\n      Lenses: Lens list\n      Domains: Domain list\n      Meanings: Meaning list\n      NodeMeanings: NodeMeaning list\n      RelationMeanings: RelationMeaning list\n      Memberships: Membership list\n      LensSelections: LensSelection list }\n\nmodule Laws =\n\n    let nodeMayRelateToOtherNodes = true\n    let nodeMayHaveMultipleIndependentDerivations = true\n    let boundarySeparatesContextsWithHandoff = true\n    let lensRevealsOnlyPartOfTheGraph = true\n    let meaningDoesNotAlterStructure = true\n\"\"\"\n\nfiles[\"src/Nexus/Core/Loader.fs\"] = \"\"\"namespace Nexus.Core\n\nopen System\nopen System.IO\n\n/// Minimal starting loader.\n///\n/// This file is intentionally small. It gives you a stable place to grow\n/// TOML loading logic without overcommitting too early.\n///\n/// Current behavior:\n/// - reads the ontology TOML as text\n/// - leaves parsing/normalization as the next step\n///\n/// Why keep this separate?\n/// - /nexus/core/ontology.toml is canonical content\n/// - this loader works with canonical content\n/// - this code is not itself the source of truth\n\nmodule Loader =\n\n    let readOntologyToml (path: string) : string =\n        if String.IsNullOrWhiteSpace path then\n            invalidArg (nameof path) \"Path must not be empty.\"\n\n        if not (File.Exists path) then\n            invalidArg (nameof path) $\"Ontology TOML file not found: {path}\"\n\n        File.ReadAllText path\n\n    let loadPlaceholder (path: string) : string =\n        readOntologyToml path\n\"\"\"\n\nfiles[\"src/Nexus/Core/Validation.fs\"] = \"\"\"namespace Nexus.Core\n\n/// Minimal validation hooks for NEXUS content.\n///\n/// This starts small on purpose.\n/// The goal is to create a clear place for validation logic without forcing\n/// all rules to be executable immediately.\n\nmodule Validation =\n\n    let ensureUniqueIds<'a> (getId: 'a -> string) (items: 'a list) =\n        let ids = items |> List.map getId\n        let dupes =\n            ids\n            |> List.countBy id\n            |> List.filter (fun (_, count) -> count > 1)\n\n        if not dupes.IsEmpty then\n            let message =\n                dupes\n                |> List.map fst\n                |> String.concat \", \"\n            Error $\"Duplicate IDs found: {message}\"\n        else\n            Ok ()\n\"\"\"\n\n# Write files\nfor rel, content in files.items():\n    path = base / rel\n    path.write_text(content, encoding=\"utf-8\")\n\n# Zip for user download\nzip_path = shutil.make_archive(\"/mnt/data/NEXUS_scaffold\", \"zip\", base)\n\nprint(f\"Created scaffold at {base}\")\nprint(f\"Created zip at {zip_path}\")\n"

