text = "Yes — that is the correction.\n\nThe problem is **not** just the labels.  \nIt is that I kept implying a **single chained flow** in a lens where you are explicitly modeling **separate node sets / paths**.\n\nYour corrected shape is:\n\n```text\nInterface\nCommand\nEvent\n\nOR\n\nEvent\nView\nInterface\n```\n\nNot:\n\n```text\nInterface → Command → Event → View\n```\n\nbecause that falsely collapses:\n\n- the **write/change side**\n- and the **read/view side**\n\ninto one linked sequence.\n\n## The corrected framing\n\nIn this lens, you have **nodes only**.\n\nSo you are identifying the relevant participants for each side:\n\n### Write side node set\n```text\nInterface\nCommand\nEvent\n```\n\n### Read side node set\n```text\nEvent\nView\nInterface\n```\n\nThat is much closer to what you are saying.\n\nThe relationships may exist in another lens, but **this lens is not the place where they are materialized**.\n\n## Why `Interface` is better here\n\nYes, `Interface` sounds stronger than `Actor` for this lens.\n\nBecause in this lens you are not trying to emphasize:\n- who initiated from a human/business perspective\n- or what runtime machinery is active\n\nYou are emphasizing:\n\n> what is at the boundary for this system shape\n\nSo `Interface` works as the node representing the boundary participant for that implementation context.\n\nExamples:\n\n- **Blazor UI** lens may have a `BlazorInterface`\n- **CLI** lens may have a `ConsoleInterface`\n- **API** lens may have an `ApiInterface`\n\nThat fits your statement that a CLI would have different nodes.\n\n## This also fits your “different dimension” point\n\nYou are saying something very important:\n\n> In another lens, the edges themselves are materialized and become modelable things, even nodes.\n\nYes. That means:\n\n- this lens = **boundary node lens**\n- another lens = **runtime/materialized interaction lens**\n\nSo in this node-only lens:\n- you list `Interface`, `Command`, `Event`, `View`\n- but you do **not** materialize the mechanism between them\n\nIn a Blazor/browser lens, you may materialize things like:\n- DOM event\n- event callback\n- dispatcher\n- renderer\n- render tree\n- browser host\n\nand those may themselves be nodes in that lens.\n\nThat is a different dimension, exactly as you said.\n\n## So the ontology here is more like\n\n### Canonical software interaction nodes\n```text\nInterface\nCommand\nEvent\nView\n```\n\nThen each implementation lens maps those differently.\n\n### Blazor/browser lens\nCould materialize nodes such as:\n```text\nDOMEvent\nBlazorHandler\nRenderTree\nBrowserHost\n```\n\n### CLI lens\nCould materialize nodes such as:\n```text\nConsoleInput\nCommandParser\nTerminalView\nStdOut\n```\n\nSo yes: **the concrete nodes differ by interface technology and by lens**.\n\n## Best compact statement\n\nYou could define it like this:\n\n> In this lens, I am modeling boundary-oriented nodes only.  \n> Write side: `Interface`, `Command`, `Event`.  \n> Read side: `Event`, `View`, `Interface`.  \n> These are not shown as one continuous linked chain.  \n> The materialized mechanics and edges belong to a different lens.\n\nThat feels precise.\n\n## Even tighter\n\n```text\nWRITE NODES\nInterface\nCommand\nEvent\n\nREAD NODES\nEvent\nView\nInterface\n```\n\nAnd then:\n\n> Blazor, CLI, API, browser, etc. each provide different concrete Interface-side nodes in their own implementation lenses.\n\n## The key distinction\n\nYou are separating:\n\n### Canonical node roles\n- Interface\n- Command\n- Event\n- View\n\nfrom\n\n### Materialized implementation mechanics\n- browser events\n- Blazor callbacks\n- console input parsing\n- API transport\n- rendering pipeline\n\nThat is the right split.\n\n## Bottom line\n\nYes — `Interface` is likely the better term in this lens.\n\nAnd yes — the right shape is:\n\n```text\nInterface, Command, Event\n```\n\nor\n\n```text\nEvent, View, Interface\n```\n\nas **node sets**, not one chained line.\n\nAnd yes — in another lens, the mechanics and even the edges can be materialized as first-class modeled things."

