text = "Short answer: **Yes—but not in the way you’re probably imagining.**\n\nYou *can* use both **NuGet (PackageReference)** and **Paket** in the same repo, but **not for the same project at the same time**. You have to choose **one dependency manager per project**.\n\n---\n\n## 🧱 The rule (important)\n\n👉 A single `.fsproj` / `.csproj`:\n- ❌ cannot be managed by both Paket *and* PackageReference simultaneously  \n- ✅ must use **one source of truth for dependencies**\n\n---\n\n## 🧭 What *is* possible\n\n### ✅ Option 1 — Mixed solution (very common in legacy setups)\n\nYou can have:\n\n```\nSolution\n├── App.fsproj          → uses PackageReference (NuGet)\n├── Domain.fsproj       → uses Paket\n├── Infrastructure.fsproj → uses Paket\n```\n\n👉 This works because:\n- Paket ultimately *generates* references that MSBuild understands\n- Everything compiles down through MSBuild anyway\n\n---\n\n### ✅ Option 2 — Gradual migration\n\nThis is one of the main real-world uses:\n\n- Old system → Paket\n- New projects → NuGet\n- Slowly convert over time\n\n👉 This is probably the **most practical use case today**\n\n---\n\n### ⚙️ Option 3 — Paket as a “driver” for everything\n\nPaket can actually:\n- Manage dependencies\n- Then **inject them into project files**\n\nSo technically:\n- You’re still “using NuGet under the hood”\n- But Paket is controlling resolution\n\n👉 In this case:\n> Paket becomes the *graph authority*, NuGet becomes the *transport layer*\n\n---\n\n## ❌ What you *cannot* do\n\n### 🚫 “Switch at runtime” or dynamically choose\n\nYou cannot:\n- Decide at build time: “use Paket or NuGet”\n- Toggle between them per build\n- Have both resolving dependencies simultaneously\n\nBecause:\n- Dependency resolution happens **before build**\n- It must produce a **single consistent graph**\n\n---\n\n## 🧠 NEXUS-style interpretation (this is where it clicks)\n\nThink of it like:\n\n### Dependency Graph = Truth Graph\n\nYou need **exactly one authority**:\n\n- **NuGet**\n  - Implicit graph\n  - Resolution = hidden process\n\n- **Paket**\n  - Explicit graph\n  - Resolution = modeled + locked\n\n---\n\n### Why you can’t mix per project\n\nBecause you'd get:\n\n```\nGraph A (NuGet resolution)\nGraph B (Paket resolution)\n\n→ conflict: which graph is truth?\n```\n\nThat violates your core idea:\n\n> ❗ “There must be one truth graph”\n\n---\n\n## 🔥 Best practice (2026 reality)\n\n- New projects → **Use NuGet**\n- Existing Paket repo → **Keep or migrate gradually**\n- Don’t start hybrid complexity unless you *have a reason*\n\n---\n\n## 🧾 Clean mental model\n\n- **Per project:** one dependency graph authority\n- **Per solution:** can mix (with discipline)\n- **Per build:** must resolve to one graph\n\n---\n\nIf you want, I can show:\n👉 How Paket internally maps to MSBuild (it’s basically a projection step, very NEXUS-like)  \n👉 Or how to migrate a Paket repo to NuGet without breaking determinism"

