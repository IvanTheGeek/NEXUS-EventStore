text = "Custom connectors using remote MCP are available on Claude and Claude Desktop for users on free, Pro, Max, Team, and Enterprise plans. Free users are limited to one custom connector. This feature is currently in beta. In addition to directory connectors, you can add custom connectors: Navigate to Customize &gt; Connectors. Click the “+” button next to Connectors. ... Enter the connector&#x27;s name and URL. Enter advanced settings (OAuth Client ID and secret) if desired. Click “Add,” then follow the same connection process as directory connectors. Important: Custom connectors allow you to connect Claude to services that haven&#x27;t been verified by Anthropic. Only connect to servers from trusted organizations and review authentication permissions carefully. For more information, see Get started with custom connectors using remote MCP. All data transfers are encrypted.\n\nCustom connectors using remote MCP are available on Claude and Claude Desktop for users on free, Pro, Max, Team, and Enterprise plans. Free users are limited to one custom connector. This feature is currently in beta. In addition to directory connectors, you can add custom connectors: Navigate to Customize > Connectors. Click the “+” button next to Connectors. ... Enter the connector's name and URL. Enter advanced settings (OAuth Client ID and secret) if desired. Click “Add,” then follow the same connection process as directory connectors. Important: Custom connectors allow you to connect Claude to services that haven't been verified by Anthropic. Only connect to servers from trusted organizations and review authentication permissions carefully. For more information, see Get started with custom connectors using remote MCP. All data transfers are encrypted.\n\nConnectors let Claude access your apps and services, retrieve your data, and take actions within connected services. For example, you can connect Claude to Linear to create issues, to Slack to send messages, or to Google Drive to search your files. Connectors work across Claude, Claude Desktop, Claude Code, and the API (via the MCP Connector). You can find available connectors in the Connectors Directory, where each connector has a page detailing its use cases, read/write capabilities, and availability. You can also add custom connectors or connect to any service that supports MCP. You can browse the Connectors Directory on Claude and Claude Desktop. It isn't possible to browse the directory on Claude for iOS or Android at this time. ... Click the \"+\" button in the lower left corner of your chat, or type \"/\" to open the menu. ... Click the “+” button next to Connectors.\nAs of July, Claude for iOS and Android also support remote MCP servers! Users can use tools, prompts, and resources from remote servers that they’ve already added via claude.ai.\n\nAs of July, Claude for iOS and Android also support remote MCP servers! Users can use tools, prompts, and resources from remote servers that they’ve already added via claude.ai. Users cannot add new servers directly from Claude Mobile. Claude supports both SSE- and Streamable HTTP-based remote servers, although support for SSE may be deprecated in the coming months. Claude supports both authless and OAuth-based remote servers. ... Claude supports the 3/26 auth spec and (as of July) the 6/18 auth spec. Claude supports Dynamic Client Registration (DCR). OAuth servers can signal to Claude that a DCR client has been deleted and that Claude should re-register the client by returning an HTTP 401 with an error of invalid_client from the token endpoint, as described in RFC 6749. As of July, users are also able to specify a custom client ID and client secret when configuring a server that doesn’t support DCR.\n\nSee the MCP documentation for more details on using inspector and for other tips on how to debug and troubleshoot your server. In addition, other solutions like Cloudflare’s AI Playground allow you to test remote MCP server functionality.\n\nCustom connectors using remote MCP are available on Claude and Claude Desktop for users on Pro, Max, Team, and Enterprise plans. To get started with remote servers, start with the following resources: The auth spec, especially details on the auth flow for third-party services. The remote server examples in the TypeScript and Python SDKs. The client and server auth implementations in the TypeScript and Python SDKs. The official MCP roadmap and draft spec’s changelog for details on how the protocol will evolve. Other resources (like this) may also be helpful to learn about considerations when building, deploying, and troubleshooting remote servers. In addition, some solutions like Cloudflare provide remote MCP server hosting with built-in autoscaling, OAuth token management, and deployment. Remote MCP servers are supported on Claude and Claude Desktop for Pro, Max, Team, and Enterprise plans.\n\nClaude’s OAuth callback URL is https://claude.ai/api/mcp/auth_callback and its OAuth client name is Claude. This callback URL may change to https://claude.com/api/mcp/auth_callback in the future – if you choose to allowlist MCP client callback URLs, please allowlist this callback URL as well to ensure that your server continues to work with Claude. Claude supports token expiry and refresh – servers should support this functionality in order to provide the best experience for users. See here for the IP addresses used by Claude for inbound and outbound connections to MCP servers. Server developers wishing to disallow non-Claude MCP Clients can whitelist these IP addresses, Claude’s OAuth callback URL, and/or Claude’s OAuth client name. Claude supports tools, prompts, and resources. Claude supports text- and image-based tool results. Claude supports text- and binary- based resources.\nOpen Claude in your browser and navigate to the settings page. You can access this by clicking on your profile icon and selecting “Settings” from the dropdown menu. Once in settings, locate and click on the “Connectors” section in the ...\n\nLearn how to connect Claude to remote MCP servers and extend its capabilities with internet-hosted tools and data sources ... Remote MCP servers extend AI applications’ capabilities beyond your local environment, providing access to internet-hosted tools, services, and data sources. By connecting to remote MCP servers, you transform AI assistants from helpful tools into informed teammates capable of handling complex, multi-step projects with real-time access to external resources. Many clients now support remote MCP servers, enabling a wide range of integration possibilities. This guide demonstrates how to connect to remote MCP servers using Claude as an example, one of the many clients that support MCP. While we focus on Claude’s implementation through Custom Connectors, the concepts apply broadly to other MCP-compatible clients. Remote MCP servers function similarly to local MCP servers but are hosted on the internet rather than your local machine.\n\nThey expose tools, prompts, and resources that Claude can use to perform tasks on your behalf. These servers can integrate with various services such as project management tools, documentation systems, code repositories, and any other API-enabled service. The key advantage of remote MCP servers is their accessibility. Unlike local servers that require installation and configuration on each device, remote servers are available from any MCP client with an internet connection. This makes them ideal for web-based AI applications, integrations that emphasize ease of use, and services that require server-side processing or authentication. Custom Connectors serve as the bridge between Claude and remote MCP servers. They allow you to connect Claude directly to the tools and data sources that matter most to your workflows, enabling Claude to operate within your favorite software and draw insights from the complete context of your external tools.\n\nNow that you’ve connected Claude to a remote MCP server, you can explore its capabilities in your conversations. Try using the connected tools to automate tasks, access external data, or integrate with your existing workflows. Create custom remote MCP servers to integrate with proprietary tools and services · Browse our collection of official and community-created MCP servers · Learn how to connect Claude Desktop to local MCP servers for direct system access · Dive deeper into how MCP works and its architecture Remote MCP servers unlock powerful possibilities for extending Claude’s capabilities.\n\nOpen Claude in your browser and navigate to the settings page. You can access this by clicking on your profile icon and selecting “Settings” from the dropdown menu. Once in settings, locate and click on the “Connectors” section in the sidebar.This will display your currently configured connectors and provide options to add new ones. ... In the Connectors section, scroll to the bottom where you’ll find the “Add custom connector” button. Click this button to begin the connection process. A dialog will appear prompting you to enter the remote MCP server URL. This URL should be provided by the server developer or administrator. Enter the complete URL, ensuring it includes the proper protocol (https://) and any necessary path components. After entering the URL, click “Add” to proceed with the connection. ... Most remote MCP servers require authentication to ensure secure access to their resources.\nIn Zapier MCP, use the Connect tab to Copy URL (your server’s URL). In Claude, go to Settings → Integrations → Add more. Name your server and paste the integration URL. Accept the security notice and click Add.\n\nLearn how to connect Claude AI to remote MCP servers like Atlassian and Zapier. This hands-on guide covers secure integration, automated workflows, and reliable API testing with Apidog for robust AI-powered automation across your favorite tools. ... Unlock powerful AI-driven automation by connecting Anthropic’s Claude AI to remote Model Context Protocol (MCP) servers. This hands-on guide walks API developers, backend engineers, and technical leads through secure integration with Atlassian, Zapier, and custom APIs—empowering Claude to orchestrate workflows, trigger tools, and access live data across your stack. ... Remote MCP servers let Claude AI act as more than just a conversational agent. By integrating with a remote MCP server, Claude can: Dynamically discover and invoke APIs, tools, and data resources · Automate tasks (e.g., create Jira tickets, update spreadsheets) Enrich chat experiences with real-time data and actions ·\n\nOnce accepted, you’ll receive a server URL like https://mcp.atlassian.com/v1. Paste this URL into the “Server URL” field and click Save. Claude will trigger an OAuth login to Atlassian. Sign in with your Jira/Confluence Cloud account. Review and approve requested permissions (Claude only accesses what you allow). After approval, you’ll return to Claude with the integration enabled. In Claude’s chat, click connect under “search and tools”. Try: \"Create a Jira ticket in my project 'DEV-TEAM' titled 'Fix login bug'.\" Claude uses the MCP server to create the ticket and confirms success. If it fails, double-check your beta status and permissions. Result: Claude can now manage Jira issues or summarize Confluence pages—directly from chat. Zapier’s MCP integration brings access to 7,000+ apps into Claude’s workflow. Here’s how to set it up: Log in to Zapier and navigate to the MCP dashboard.\n\nIn Zapier MCP, use the Connect tab to Copy URL (your server’s URL). In Claude, go to Settings → Integrations → Add more. Name your server and paste the integration URL. Accept the security notice and click Add. Start a new conversation in Claude. Click the search and tools icon. Find your MCP tool, click Connect, and approve permissions. Use toggles to enable/disable Claude’s access to specific actions. In Claude’s chat, try: \"Pull the latest prospect info from HubSpot for my meeting with Sarah at 3 PM.\" Claude fetches live HubSpot data via Zapier MCP and responds. If not, double-check app permissions. Result: Claude can automate tasks across CRM, calendars, project tools, and more—right from your chat interface. When exposing your own APIs for Claude to access via MCP, reliable testing and validation are crucial. ... With Apidog, you ensure that any API endpoints you expose via MCP behave as expected—so Claude (or any client) gets consistent, error-free responses.\n\nQ3. Which Claude plans support MCP connectors? Max, Team, and Enterprise plans support remote MCP integrations. Q4. What protocols are supported? SSE and Streamable HTTP. Q5. Can I add multiple MCP servers? Yes—add multiple entries in the mcp_servers array when using the Messages API. Connecting Claude AI to remote MCP servers transforms your AI from a Q&A bot into an automation powerhouse. By integrating with Atlassian, Zapier, or your own APIs, Claude can orchestrate real workflows, manage projects, and access live data—securely and at scale. For teams building custom MCP endpoints, Apidog is a proven tool for API test automation and contract validation—ensuring every integration is robust, reliable, and production-ready. ... Why Connect Claude AI to a Remote MCP Server?Getting Started: Environment SetupPrerequisitesStep-by-Step: Integrate Claude AI with Atlassian’s Remote MCP Server1.\nIf Claude.ai/Claude Mobile → remote MCP server (not local stdio) If remote MCP → OAuth 2.1 authentication (not process isolation) If OAuth 2.1 → Dynamic Client Registration (mobile can’t pre-configure) If public HTTP → Cloud Run deployment (not local machine) If Cloud Run → MCP Spec 2025–06–18 (latest with HTTP support) Each requirement builds on the previous. You can’t skip steps. The architecture becomes: ... Phase 2 Execution Architecture: Remote MCP server on Google Cloud Run with OAuth 2.1 authentication enabling Claude.ai and Claude Mobile voice access to government forms · The diagram shows the component architecture — WHAT exists in the remote stack. But deploying these components requires satisfying specific requirements that don’t exist in local MCP. The table reveals exactly what changes across eight architectural layers: The table reveals a stark reality: remote deployment transforms every aspect of MCP architecture.\n\nThe Missing MCP Playbook: Deploying Custom Agents on Claude.ai and Claude Mobile Part 2: OAuth 2.1, Dynamic Client Registration, MCP Spec 2025–06–18, Auth0, and Google Cloud Run In Part 1, I …\n\nImplement this layering in your middleware, not just for MCP compliance but as reusable pattern for any agent protocol integration. ... HEAD request — Claude sends HEAD to / for protocol discovery. View HEAD endpoint implementation → · initialize method — Claude POSTs to / with initialize method WITHOUT OAuth token. View initialize implementation → · notifications/initialized — Claude POSTs to / with notifications/initialized for session validation only. View notifications/initialized implementation → · tools/list method — Claude POSTs to / with tools/list WITH OAuth token for full validation. View tools/list implementation → · tools/call method — Claude POSTs to / with tools/call for each tool execution WITH OAuth token. View tools/call implementation → · You must implement HEAD endpoint returning MCP-Protocol-Version: 2025-06-18 header, root path / endpoint (not /sse or custom paths—Claude assumes root), selective authentication middleware, session management with Mcp-Session-Id head\n\nPart 2 (this post) revealed the infrastructure reality — what it actually takes to deploy custom MCP servers that successfully integrate with Claude.ai and Claude Mobile. The OAuth 2.1 handshake with Dynamic Client Registration. The MCP Specification 2025–06–18 requirements. The selective authentication pattern. The Google Cloud Run deployment architecture. And why getting any part wrong means silent failures with little helpful error feedback. Use this as your guide. When you’re ready to deploy your own custom MCP server, reference this working example. The patterns, configurations, and architecture decisions documented here solve the integration challenges that most MCP tutorials never address. ... George Vetticaden builds multi-agent AI systems and writes about practical patterns in enterprise AI. Previously served as VP of Agents at Sema4.ai, where he led development of agent building tools and document intelligence solutions.\n\nIf Claude.ai/Claude Mobile → remote MCP server (not local stdio) If remote MCP → OAuth 2.1 authentication (not process isolation) If OAuth 2.1 → Dynamic Client Registration (mobile can’t pre-configure) If public HTTP → Cloud Run deployment (not local machine) If Cloud Run → MCP Spec 2025–06–18 (latest with HTTP support) Each requirement builds on the previous. You can’t skip steps. The architecture becomes: ... Phase 2 Execution Architecture: Remote MCP server on Google Cloud Run with OAuth 2.1 authentication enabling Claude.ai and Claude Mobile voice access to government forms · The diagram shows the component architecture — WHAT exists in the remote stack. But deploying these components requires satisfying specific requirements that don’t exist in local MCP. The table reveals exactly what changes across eight architectural layers: The table reveals a stark reality: remote deployment transforms every aspect of MCP architecture.\nOthers, however, emphasized the importance of Claude Code gaining support for streamable HTTP as an alternative to stdio for connecting to MCP servers. According to Robert Matsukoa, former head of product engineering at Tripadvisor and currently CTO at Fractional, this is not just a convenient upgrade, but one that &quot;alters the economics of AI tool integration&quot;: Remote servers eliminate infrastructure costs previously required for local MCP deployments. Teams no longer need to provision servers, manage updates, or handle scaling for MCP services. However, Matsukoa notes that using MCP servers typically increases costs by 25-30% due to the larger contexts pulled from external sources and that remote MCPs, by making this task easier, can actually compound those costs. So, careful consideration is required as to where it makes sense: MCP&#x27;s advantages emerge in scenarios requiring deep contextual integration: multi-repository debugging sessions, legacy system analysis requiring historical c\n\nLearn what's next in AI and software, from teams already doing it. Early Bird ends March 10. InfoQ Homepage News Claude Code Gains Support for Remote MCP Servers over Streamable HTTP ... Feed your curiosity. Help 550k+ global senior developers each month stay ahead.Get in touch ... Anthropic has recently introduced support for connecting to remote MCP servers in Claude Code, allowing developers to integrate external tools and resources without manual local server setup. The new capability enables developers to easily extract context from their existing tools, including security services, project management systems, and knowledge bases. For example, a developer can use the Sentry MCP server to get a list of errors and issues in their project, check whether fixes are available, and apply them using Claude, all within a unified workflow. Additional integration examples include pulling data from APIs, accessing remote documentation, working with cloud services, collaborating on shared team\n\nOthers, however, emphasized the importance of Claude Code gaining support for streamable HTTP as an alternative to stdio for connecting to MCP servers. According to Robert Matsukoa, former head of product engineering at Tripadvisor and currently CTO at Fractional, this is not just a convenient upgrade, but one that \"alters the economics of AI tool integration\": Remote servers eliminate infrastructure costs previously required for local MCP deployments. Teams no longer need to provision servers, manage updates, or handle scaling for MCP services. However, Matsukoa notes that using MCP servers typically increases costs by 25-30% due to the larger contexts pulled from external sources and that remote MCPs, by making this task easier, can actually compound those costs. So, careful consideration is required as to where it makes sense: MCP's advantages emerge in scenarios requiring deep contextual integration: multi-repository debugging sessions, legacy system analysis requiring historical c\n\nBefore Claude Code natively supported a remote MCP server, developers had to set up a local MCP server to integrate it with their existing toolchain. Remote MCP servers offer a lower maintenance alternative to local servers: just add the vendor’s URL to Claude Code—no manual setup required. Vendors handle updates, scaling, and availability, so you can focus on building instead of managing server infrastructure. For authentication, Claude Code supports OAuth 2.0 over HTTP or SSE, allowing developers to authenticate directly through the terminal without needing to provide an API key. For example, here's how you can connect Claude Code to GitHub MCP: $ claude mcp add --transport sse github-server https://api.github.com/mcp >/mcp · The /mcp command, executed within Claude Code, opens an interactive menu that provides the option to authenticate using OAuth.\n\nQCon San Francisco (Nov 16-20): What's next in AI? What's next in software? Learn from the teams already doing it. Register Now ... Unlock the full InfoQ experience by logging in! Stay updated with your favorite authors and topics, engage with content, and download exclusive resources. Log In ... Stay updated on topics and peers that matter to youReceive instant alerts on the latest insights and trends. Quickly access free resources for continuous learningMinibooks, videos with transcripts, and training materials. Save articles and read at anytimeBookmark articles to read whenever youre ready. ... Join Luca Mezzalira for this 5-week online cohort. Master socio-technical architecture leadership. Register Interest. ... Learn what works in AI, architecture, data, security & FinTech. Early Bird ends March 10. ... Learn how leading engineering teams run AI in production—reliably, securely, and at scale.\nAdd your connector&#x27;s remote MCP server URL. Optionally, click “Advanced settings” to specify an OAuth Client ID and OAuth Client Secret for your server. Finish configuring your connector by clicking &quot;Add.&quot;\n\nThe Model Context Protocol (MCP) is an open standard, created by Anthropic, for AI applications to connect to tools and data. Previously, MCP servers only ran locally (i.e. on a user's laptop). Now, developers can build and host remote MCP servers that communicate with AI apps over the internet. Remote MCP servers give models access to internet-hosted tools and data, transforming Claude into an informed teammate that can independently handle complex, multi-step projects tailored to your needs. Note: While anyone can build and host connectors using remote MCP, only Owners can add them to Team and Enterprise plans. Once a connector has been added to a Team or Enterprise organization, users individually connect to and enable that connector. This ensures that Claude can only access tools and data that the individual user has access to. ... Before members of Team and Enterprise plans can configure custom connectors, an Owner or Primary Owner needs to follow these initial steps to add a cust\n\nCustom connectors using remote MCP are available on Claude and Claude Desktop for users on free, Pro, Max, Team, and Enterprise plans. Free users are limited to one custom connector. This feature is currently in beta. Custom connectors let you connect Claude directly to the tools and data sources that matter most to your workflows. This enables Claude to operate within your favorite software and draw insights from the complete context of your external tools. ... Connect Claude to existing remote MCP servers. Build your own remote MCP servers to connect with any tool. ⚠️ Security and Privacy with Custom Connectors (beta) Be aware that custom connectors allow you to connect Claude to services that have not been verified by Anthropic, and allow Claude to access and take action in these services. For more guidance, review the Security and privacy considerations section below.\n\nAdd your connector's remote MCP server URL. Optionally, click “Advanced settings” to specify an OAuth Client ID and OAuth Client Secret for your server. Finish configuring your connector by clicking \"Add.\" ... Navigate to Settings > Connectors. Locate the \"Connectors\" section. Find the custom connector your Owner added in the list (it will have a \"Custom\" label). Click \"Connect\" to authenticate and start using the connector with Claude. If you are using an individual Pro or Max plan, follow these steps to add a custom connector: Navigate to Settings > Connectors. Locate the \"Connectors\" section. Click \"Add custom connector\" at the bottom of the section. Add your connector's remote MCP server URL. Optionally, click “Advanced settings” to specify an OAuth Client ID and OAuth Client Secret for your server. Finish configuring your connector by clicking \"Add.\"\n\nTo learn about building connectors to use with Claude, see Building custom connectors via remote MCP servers. Custom connectors allow you to connect Claude to arbitrary services that have not been verified by Anthropic. When you connect Claude to external services, you're granting it the ability to access and potentially modify data within those services based on your permissions. It’s important to make sure you’re only connecting to remote MCP servers that you trust and that you’re aware of Claude’s interactions with web connectors. When you add a custom connector to Claude, you'll typically go through an OAuth authentication process to securely sign in to the application and grant specific permissions. This allows Claude to interact with the application on your behalf, without Claude ever seeing your actual password. You can revoke these permissions at any time by disconnecting the connector in Claude's settings or the third-party service's security settings.\nNote that you won’t have central control or visibility into interactions between Claude and the integrated service. Navigate to Settings &gt; Integrations. For Enterprise or Team plans, go to the Organization integrations tab.\n\nIntegrating Claude Desktop with an MCP server—whether local, remote, or SaaS-hosted—takes just a few steps, but can have varying degrees of complexity. Using tools like Natoma can help streamline the process and ensure that security controls are covered. The result is a significantly enhanced contextual experience, making your interactions with Claude more powerful and personalized. Claude more powerful and personalized. Discovering MCP Servers with Natoma + CrowdStrike: Securing the Next Layer of AI Integration · Natoma’s platform is now integrated with the AI-powered CrowdStrike Falcon® platform to bring MCP server discovery and security insights into one unified view. ... See how MCP enables enterprises to configure connections in 15-30 minutes, allowing them to launch 50+ AI tools in 90 days. ... Scaling AI across your enterprise requires organizational transformation, not just technology deployment.\n\nNatoma’s platform is now integrated with the AI-powered CrowdStrike Falcon® platform to bring MCP server discovery and security insights into one unified view. ... See how MCP enables enterprises to configure connections in 15-30 minutes, allowing them to launch 50+ AI tools in 90 days. ... Natoma is enterprise-ready, battle-tested, and ready to help you skip the heavy lifting when implementing AI into your organization. ... Natoma is enterprise-ready, battle-tested, and ready to help you skip the heavy lifting when implementing AI into your organization. ... Natoma is enterprise-ready, battle-te