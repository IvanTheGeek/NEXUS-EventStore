text = "Here are exact instructions for Claude Desktop on Linux Mint.\n\n---\n\n## Prerequisites\n\nYou need Node.js installed. Check if you have it:\n```bash\nnode --version\n```\nIf not installed:\n```bash\nsudo apt install nodejs npm\n```\n\n---\n\n## Step 1 — Find the config file\n\n```bash\n~/.config/Claude/claude_desktop_config.json\n```\n\nOpen it in any editor:\n```bash\nnano ~/.config/Claude/claude_desktop_config.json\n```\n\n---\n\n## Step 2 — Add the EventLanes entry\n\nIf the file is empty or new, paste this entire thing:\n```json\n{\n  \"mcpServers\": {\n    \"eventlanes\": {\n      \"command\": \"npx\",\n      \"args\": [\n        \"mcp-remote@latest\",\n        \"https://eventlanes.app/mcp\",\n        \"--header\",\n        \"Authorization: Bearer 123c61dc6cc497d15daedcbb1f024d2089091933767ba871974eaf13b750a646\"\n      ]\n    }\n  }\n}\n```\n\nIf the file already has other MCP servers in it, add just the `\"eventlanes\": { ... }` block inside the existing `\"mcpServers\"` object.\n\n---\n\n## Step 3 — Restart Claude Desktop\n\nFully quit and relaunch. Then open a new chat — you should see EventLanes appear in the tools/connectors area.\n\n---\n\n**Why `mcp-remote` instead of direct?**\n\nClaude Desktop's `claude_desktop_config.json` doesn't support custom headers directly. `mcp-remote` is a small bridge package (run on-the-fly via `npx`, nothing to install permanently) that handles the HTTP transport and injects the header for you."

