text = "Claude Code supports environment variable expansion in .mcp.json files, allowing teams to share configurations while maintaining flexibility for machine-specific paths and sensitive values like API keys. Supported syntax: ${VAR} - Expands to the value of environment variable VAR · ${VAR:-default} - Expands to VAR if set, otherwise uses default Expansion locations: Environment variables can be expanded in: ... { &quot;mcpServers&quot;: { &quot;api-server&quot;: { &quot;type&quot;: &quot;http&quot;, &quot;url&quot;: &quot;${API_BASE_URL:-https://api.example.com}/mcp&quot;, &quot;headers&quot;: { &quot;Authorization&quot;: &quot;Bearer ${API_KEY}&quot; } } } } If a required environment variable is not set and has no default value, Claude Code will fail to parse the config. ... claude mcp add --transport stdio db -- npx -y @bytebase/dbhub \\ --dsn &quot;postgresql://readonly:[email protected]:5432/analytics&quot; ... Many cloud-based MCP servers require authentication.\n\nClaude Code supports environment variable expansion in .mcp.json files, allowing teams to share configurations while maintaining flexibility for machine-specific paths and sensitive values like API keys. Supported syntax: ${VAR} - Expands to the value of environment variable VAR · ${VAR:-default} - Expands to VAR if set, otherwise uses default Expansion locations: Environment variables can be expanded in: ... { \"mcpServers\": { \"api-server\": { \"type\": \"http\", \"url\": \"${API_BASE_URL:-https://api.example.com}/mcp\", \"headers\": { \"Authorization\": \"Bearer ${API_KEY}\" } } } } If a required environment variable is not set and has no default value, Claude Code will fail to parse the config. ... claude mcp add --transport stdio db -- npx -y @bytebase/dbhub \\ --dsn \"postgresql://readonly:[email protected]:5432/analytics\" ... Many cloud-based MCP servers require authentication.\n\nproject: Shared with everyone in the project via .mcp.json file · user: Available to you across all projects (was called global in older versions) Set environment variables with --env flags (for example, --env KEY=value) Configure MCP server startup timeout using the MCP_TIMEOUT environment variable (for example, MCP_TIMEOUT=10000 claude sets a 10-second timeout) Claude Code will display a warning when MCP tool output exceeds 10,000 tokens. To increase this limit, set the MAX_MCP_OUTPUT_TOKENS environment variable (for example, MAX_MCP_OUTPUT_TOKENS=50000) Use /mcp to authenticate with remote servers that require OAuth 2.0 authentication · Windows Users: On native Windows (not WSL), local MCP servers that use npx require the cmd /c wrapper to ensure proper execution. ... # This creates command=\"cmd\" which Windows can execute claude mcp add --transport stdio my-server -- cmd /c npx -y @some/package ·\n\nResources can contain any type of content that the MCP server provides (text, JSON, structured data, etc.) When you have many MCP servers configured, tool definitions can consume a significant portion of your context window. MCP Tool Search solves this by dynamically loading tools on-demand instead of preloading all of them. Claude Code automatically enables Tool Search when your MCP tool descriptions would consume more than 10% of the context window. You can adjust this threshold or disable tool search entirely. When triggered: MCP tools are deferred rather than loaded into context upfront · Claude uses a search tool to discover relevant MCP tools when needed · Only the tools Claude actually needs are loaded into context · MCP tools continue to work exactly as before from your perspective · If you’re building an MCP server, the server instructions field becomes more useful with Tool Search enabled.\n\nThese flags only apply to HTTP and SSE transports. They have no effect on stdio servers · Use claude mcp get <name> to verify that OAuth credentials are configured for a server · If your MCP server returns errors on the standard OAuth metadata endpoint (/.well-known/oauth-authorization-server) but exposes a working OIDC endpoint, you can tell Claude Code to fetch OAuth metadata directly from a URL you specify, bypassing the standard discovery chain. Set authServerMetadataUrl in the oauth object of your server’s config in .mcp.json: ... { \"mcpServers\": { \"my-server\": { \"type\": \"http\", \"url\": \"https://mcp.example.com/mcp\", \"oauth\": { \"authServerMetadataUrl\": \"https://auth.example.com/.well-known/openid-configuration\" } } } } The URL must use https://. This option requires Claude Code v2.1.64 or later. If you have a JSON configuration for an MCP server, you can add it directly: ...\nclaude_desktop_config.json · { &quot;mcpServers&quot;: { &quot;my-mcp-server&quot;: { &quot;command&quot;: &quot;npx&quot;, &quot;args&quot;: [ &quot;mcp-remote&quot;, &quot;https://your-mcp-server.com&quot;, &quot;--header&quot;, &quot;API_Key: ${API_KEY}&quot; ], &quot;env&quot;: { &quot;API_KEY&quot;: &quot;your-api-key-here&quot; } } } } For Claude Code (CLI), you can add the MCP server using the Claude CLI command: Claude Code CLI Command · claude mcp add --transport http --scope local my-mcp-server https://your-mcp-server.com --env API_KEY=&quot;your-api-key-here&quot; --header &quot;API_Key: ${API_KEY}&quot; 💡 Claude Code CLI Scope Options: --scope local (default): Available only to you in the current project · --scope project: Shared with everyone in the project via .mcp.json file · --scope user: Available to you across all projects · Note: This CLI command is for Claude Code (CLI), not Claude Desktop. For Claude Desktop, use the JSON configuration above. Before you connect Claude to your MCP server, ensure you have: Access to Claude (Claude Desktop).\n\nclaude_desktop_config.json · { \"mcpServers\": { \"my-mcp-server\": { \"command\": \"npx\", \"args\": [ \"mcp-remote\", \"https://your-mcp-server.com\", \"--header\", \"API_Key: ${API_KEY}\" ], \"env\": { \"API_KEY\": \"your-api-key-here\" } } } } For Claude Code (CLI), you can add the MCP server using the Claude CLI command: Claude Code CLI Command · claude mcp add --transport http --scope local my-mcp-server https://your-mcp-server.com --env API_KEY=\"your-api-key-here\" --header \"API_Key: ${API_KEY}\" 💡 Claude Code CLI Scope Options: --scope local (default): Available only to you in the current project · --scope project: Shared with everyone in the project via .mcp.json file · --scope user: Available to you across all projects · Note: This CLI command is for Claude Code (CLI), not Claude Desktop. For Claude Desktop, use the JSON configuration above. Before you connect Claude to your MCP server, ensure you have: Access to Claude (Claude Desktop).\n\nclaude mcp add --transport http --scope local my-mcp-server https://your-mcp-server.com --env API_KEY=\"your-api-key-here\" --header \"API_Key: ${API_KEY}\" ... Note: This CLI command is for Claude Code (CLI), not Claude Desktop. For Claude Desktop, use the JSON configuration above. Before you connect Claude to your MCP server, ensure you have: Access to Claude (Claude Desktop). ... A local MCP server generated with liblab CLI. A publicly deployed MCP server URL generated on your liblab dashboard. ... To learn more about how MCP works, visit the MCP Concept page. Use this method if your MCP server is deployed and accessible over the internet through an URL. If you generated your MCP server using the liblab hosting service, use this option. Open Claude Desktop. In the settings, go to Developer and click Edit Config. This will open the claude_desktop_config.json file.\n\nUse the interactive configurator above to generate your configuration with proper authentication. Copy the generated JSON configuration and paste it into your claude_desktop_config.json file. For basic setups without authentication, you can use: ... { \"mcpServers\": { \"liblab\": { \"command\": \"npx\", \"args\": [ \"mcp-remote\", \"https://mcp.liblab.io/liblab\" ] } } } Save the file, close and reopen Claude Desktop to reload the configuration. Start a new chat and test your API integration. Use this method if you’re running the MCP server locally, generated from an OpenAPI spec using liblab CLI. ... If you haven’t yet generated your MCP server, follow the Generate an MCP Server with liblab CLI guide. After generating the server using the liblab CLI, navigate to the output folder and run the setup script: ... Open Claude Desktop and go to Settings > Developer > Edit Config.\n\nModify claude_desktop_config.json to point to the local MCP server file path: ... { \"mcpServers\": { \"your-local-api\": { \"command\": \"node\", \"args\": [ \"<path-to-liblab-generated-mcp-server>/output/mcp/dist/index.js\" ], \"env\": { \"YOUR_API_KEY\": \"<your-api-key>\" } } } } ... Make sure to use the correct environment variable name expected by your API. Save the file and restart Claude Desktop. Open a new conversation and test the integration. To continue working with MCP and Claude, check out the following resources: ...\nTo configure remote MCP servers for use in Claude Desktop, add them via Settings &gt; Connectors. Claude Desktop will not connect to remote servers that are configured directly via claude_desktop_config.json.\n\nTo configure remote MCP servers for use in Claude Desktop, add them via Settings > Connectors. Claude Desktop will not connect to remote servers that are configured directly via claude_desktop_config.json. As of July, Claude for iOS and Android also support remote MCP servers! Users can use tools, prompts, and resources from remote servers that they’ve already added via claude.ai. Users cannot add new servers directly from Claude Mobile. Claude supports both SSE- and Streamable HTTP-based remote servers, although support for SSE may be deprecated in the coming months. Claude supports both authless and OAuth-based remote servers. ... Claude supports the 3/26 auth spec and (as of July) the 6/18 auth spec. Claude supports Dynamic Client Registration (DCR). OAuth servers can signal to Claude that a DCR client has been deleted and that Claude should re-register the client by returning an HTTP 401 with an error of invalid_client from the token endpoint, as described in RFC 6749.\n\nCustom connectors using remote MCP are available on Claude and Claude Desktop for users on Pro, Max, Team, and Enterprise plans. To get started with remote servers, start with the following resources: The auth spec, especially details on the auth flow for third-party services. The remote server examples in the TypeScript and Python SDKs. The client and server auth implementations in the TypeScript and Python SDKs. The official MCP roadmap and draft spec’s changelog for details on how the protocol will evolve. Other resources (like this) may also be helpful to learn about considerations when building, deploying, and troubleshooting remote servers. In addition, some solutions like Cloudflare provide remote MCP server hosting with built-in autoscaling, OAuth token management, and deployment. Remote MCP servers are supported on Claude and Claude Desktop for Pro, Max, Team, and Enterprise plans.\n\nIn addition, other solutions like Cloudflare’s AI Playground allow you to test remote MCP server functionality.\n\nwhich tools, prompts, resources, and other MCP features your server exposes. See the MCP documentation for more details on using inspector and for other tips on how to debug and troubleshoot your server.\nThis configuration is done through a JSON file that tells Claude Desktop which servers to run and how to connect to them. ... Start by accessing the Claude Desktop settings. Click on the Claude menu in your system’s menu bar (not the settings ...\n\nLearn how to extend Claude Desktop with local MCP servers to enable file system access and other powerful integrations ... Model Context Protocol (MCP) servers extend AI applications’ capabilities by providing secure, controlled access to local resources and tools. Many clients support MCP, enabling diverse integration possibilities across different platforms and applications. This guide demonstrates how to connect to local MCP servers using Claude Desktop as an example, one of the many clients that support MCP. While we focus on Claude Desktop’s implementation, the concepts apply broadly to other MCP-compatible clients. By the end of this tutorial, Claude will be able to interact with files on your computer, create new documents, organize folders, and search through your file system—all with your explicit permission for each action. Before starting this tutorial, ensure you have the following installed on your system: Download and install Claude Desktop for your operating system.\n\nMCP servers are programs that run on your computer and provide specific capabilities to Claude Desktop through a standardized protocol. Each server exposes tools that Claude can use to perform actions, with your approval. The Filesystem Server we’ll install provides tools for: ... Searching for files by name or content All actions require your explicit approval before execution, ensuring you maintain full control over what Claude can access and modify. The process involves configuring Claude Desktop to automatically start the Filesystem Server whenever you launch the application. This configuration is done through a JSON file that tells Claude Desktop which servers to run and how to connect to them. ... Start by accessing the Claude Desktop settings. Click on the Claude menu in your system’s menu bar (not the settings within the Claude window itself) and select “Settings…”On macOS, this appears in the top menu bar: This opens the Claude Desktop configuration window, which is separate f\n\nAfter saving the configuration file, completely quit Claude Desktop and restart it. The application needs to restart to load the new configuration and start the MCP server.Upon successful restart, you’ll see an MCP server indicator in the bottom-right corner of the conversation input box: Click on this indicator to view the available tools provided by the Filesystem Server: If the server indicator doesn’t appear, refer to the Troubleshooting section for debugging steps. With the Filesystem Server connected, Claude can now interact with your file system. Try these example requests to explore the capabilities: “Can you write a poem and save it to my desktop?” - Claude will compose a poem and create a new text file on your desktop · “What work-related files are in my downloads folder?” - Claude will scan your downloads and identify work-related documents ·\n\nLearn how to connect Claude to remote MCP servers for cloud-based tools and services · Dive deeper into how MCP works and its architecture\nWithout a way to configure headers in the MCP client config, authentication becomes hard to implement. Feature Request: Add support in claude_desktop_config.json for passing custom headers (e.g., Authorization, Session-Id, User-Id). ... { &quot;mcpServers&quot;: { &quot;Tejas-mcp-server&quot;: { &quot;command&quot;: &quot;C:\\\\nylim\\\\mcp_project\\\\venv\\\\Scripts\\\\python.exe&quot;, &quot;args&quot;: [ &quot;C:\\\\nylim\\\\mcp_project\\\\mcp_server.py&quot; ], &quot;headers&quot;: { &quot;Authorization&quot;: &quot;Bearer &lt;TOKEN&gt;&quot;, &quot;User-Id&quot;: &quot;12345&quot; } } } } ... Enables secure authentication between MCP client and server. Makes MCP more production-ready for enterprise and multi-user use cases. ... authRelated to authentication (Bearer, JWT, OAuth, WorkOS) for client or server.Related to authentication (Bearer, JWT, OAuth, WorkOS) for client or server.clientRelated to the FastMCP client SDK or client-side functionality.Related to the FastMCP client SDK or client-side functionality.enhancementImprovement to existing functionality.\n\nEnhancement Currently, the MCP client configuration (claude_desktop_config.json) only specifies which MCP server to run and how to connect to it. { \"mcpServers\": { \"jigar-mcp-server\": { \"command\": \"C:\\\\nylim\\\\mcp_project\\\\venv\\\\Scripts\\\\...\n\nEnhancement Currently, the MCP client configuration (claude_desktop_config.json) only specifies which MCP server to run and how to connect to it. { \"mcpServers\": { \"jigar-mcp-server&...\n\nWithout a way to configure headers in the MCP client config, authentication becomes hard to implement. Feature Request: Add support in claude_desktop_config.json for passing custom headers (e.g., Authorization, Session-Id, User-Id). ... { \"mcpServers\": { \"Tejas-mcp-server\": { \"command\": \"C:\\\\nylim\\\\mcp_project\\\\venv\\\\Scripts\\\\python.exe\", \"args\": [ \"C:\\\\nylim\\\\mcp_project\\\\mcp_server.py\" ], \"headers\": { \"Authorization\": \"Bearer <TOKEN>\", \"User-Id\": \"12345\" } } } } ... Enables secure authentication between MCP client and server. Makes MCP more production-ready for enterprise and multi-user use cases. ... authRelated to authentication (Bearer, JWT, OAuth, WorkOS) for client or server.Related to authentication (Bearer, JWT, OAuth, WorkOS) for client or server.clientRelated to the FastMCP client SDK or client-side functionality.Related to the FastMCP client SDK or client-side functionality.enhancementImprovement to existing functionality.\nFor Netdata v2.7.2+ with HTTP/SSE support. mcp-remote wraps remote transports in a stdio session Claude can launch (https://modelcontextprotocol.io/docs/develop/connect-local-servers). Edit claude_desktop_config.json as above. { &quot;mcpServers&quot;: { &quot;netdata&quot;: { &quot;command&quot;: &quot;npx&quot;, &quot;args&quot;: [ &quot;mcp-remote@latest&quot;, &quot;--http&quot;, &quot;http://YOUR_NETDATA_IP:19999/mcp&quot;, &quot;--allow-http&quot;, &quot;--header&quot;, &quot;Authorization: Bearer NETDATA_MCP_API_KEY&quot; ] } } } For SSE transport instead of HTTP: { &quot;mcpServers&quot;: { &quot;netdata&quot;: { &quot;command&quot;: &quot;npx&quot;, &quot;args&quot;: [ &quot;mcp-remote@latest&quot;, &quot;--sse&quot;, &quot;http://YOUR_NETDATA_IP:19999/mcp&quot;, &quot;--allow-http&quot;, &quot;--header&quot;, &quot;Authorization: Bearer NETDATA_MCP_API_KEY&quot; ] } } } Replace in all examples: /usr/sbin/nd-mcp - With your actual nd-mcp path (nd-mcp method only) YOUR_NETDATA_IP - IP address or hostname of your Netdata Agent/Parent · NETDATA_MCP_API_KEY - Your Netdata MCP API key ·\n\nFor Netdata v2.7.2+ with HTTP/SSE support. mcp-remote wraps remote transports in a stdio session Claude can launch (https://modelcontextprotocol.io/docs/develop/connect-local-servers). Edit claude_desktop_config.json as above. { \"mcpServers\": { \"netdata\": { \"command\": \"npx\", \"args\": [ \"mcp-remote@latest\", \"--http\", \"http://YOUR_NETDATA_IP:19999/mcp\", \"--allow-http\", \"--header\", \"Authorization: Bearer NETDATA_MCP_API_KEY\" ] } } } For SSE transport instead of HTTP: { \"mcpServers\": { \"netdata\": { \"command\": \"npx\", \"args\": [ \"mcp-remote@latest\", \"--sse\", \"http://YOUR_NETDATA_IP:19999/mcp\", \"--allow-http\", \"--header\", \"Authorization: Bearer NETDATA_MCP_API_KEY\" ] } } } Replace in all examples: /usr/sbin/nd-mcp - With your actual nd-mcp path (nd-mcp method only) YOUR_NETDATA_IP - IP address or hostname of your Netdata Agent/Parent · NETDATA_MCP_API_KEY - Your Netdata MCP API key ·\n\nFor Netdata v2.7.2+ with HTTP/SSE support. mcp-remote wraps remote transports in a stdio session Claude can launch (https://modelcontextprotocol.io/docs/develop/connect-local-servers). Edit claude_desktop_config.json as above. { \"mcpServers\": { \"netdata\": { \"command\": \"npx\", \"args\": [ \"mcp-remote@latest\", \"--http\", \"http://YOUR_NETDATA_IP:19999/mcp\", \"--allow-http\", \"--header\", \"Authorization: Bearer NETDATA_MCP_API_KEY\" ] } } } ... { \"mcpServers\": { \"netdata\": { \"command\": \"npx\", \"args\": [ \"mcp-remote@latest\", \"--sse\", \"http://YOUR_NETDATA_IP:19999/mcp\", \"--allow-http\", \"--header\", \"Authorization: Bearer NETDATA_MCP_API_KEY\" ] } } } ... ND_MCP_BEARER_TOKEN - Export this environment variable with your API key before launching Claude Desktop (nd-mcp method only) Click the \"Search and tools\" button (below the prompt) You should see \"netdata\" listed among available tools ·\n\nv2.6.0 - v2.7.1: Only WebSocket transport available, requires nd-mcp bridge · v2.7.2+: Can use npx mcp-remote bridge for HTTP/SSE support ... Netdata MCP API key loaded into the environment (recommended) - export it before launching Claude Desktop to avoid exposing it in config files: export ND_MCP_BEARER_TOKEN=\"$(cat /var/lib/netdata/mcp_dev_preview_api_key)\" Each Netdata Agent or Parent has its own unique API key for MCP - Find your Netdata MCP API key ... Claude Desktop supports MCP servers through two methods: Custom Connectors for remote servers (recommended), and traditional JSON configuration (manual). Connect to your entire Netdata Cloud infrastructure through a single endpoint — no local Netdata setup or firewall changes needed. ... { \"mcpServers\": { \"netdata-cloud\": { \"command\": \"npx\", \"args\": [ \"mcp-remote@latest\", \"https://app.netdata.cloud/api/v1/mcp\", \"--header\", \"Authorization: Bearer YOUR_NETDATA_CLOUD_API_TOKEN\" ] } } } Replace YOUR_NETDATA_CLOUD_API_TOKEN with your Ne\n\nFor local bridges, add multiple configurations in claude_desktop_config.json and enable/disable as needed: { \"mcpServers\": { \"netdata-production\": { \"command\": \"/usr/sbin/nd-mcp\", \"args\": [\"ws://prod-parent:19999/mcp\"] }, \"netdata-staging\": { \"command\": \"/usr/sbin/nd-mcp\", \"args\": [\"ws://stage-parent:19999/mcp\"] } } } Use the toggle switch in settings to enable only one at a time. ℹ️ Set ND_MCP_BEARER_TOKEN to the appropriate key before switching between environments to avoid storing secrets in the configuration file. Connect to your main Netdata Parent that has visibility across all environments. ... Do you have any feedback for this page?\nThe server must be publicly exposed through HTTP (supports both Streamable HTTP and SSE transports). Local STDIO servers cannot be connected directly. The MCP connector is currently not supported on Amazon Bedrock and Google Vertex. ... curl https://api.anthropic.com/v1/messages \\ -H &quot;Content-Type: application/json&quot; \\ -H &quot;X-API-Key: $ANTHROPIC_API_KEY&quot; \\ -H &quot;anthropic-version: 2023-06-01&quot; \\ -H &quot;anthropic-beta: mcp-client-2025-11-20&quot; \\ -d &#x27;{ &quot;model&quot;: &quot;claude-opus-4-6&quot;, &quot;max_tokens&quot;: 1000, &quot;messages&quot;: [{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: &quot;What tools do you have available?&quot;}], &quot;mcp_servers&quot;: [ { &quot;type&quot;: &quot;url&quot;, &quot;url&quot;: &quot;https://example-server.modelcontextprotocol.io/sse&quot;, &quot;name&quot;: &quot;example-mcp&quot;, &quot;authorization_token&quot;: &quot;YOUR_TOKEN&quot; } ], &quot;tools&quot;: [ { &quot;type&quot;: &quot;mcp_toolset&quot;, &quot;mcp_server_name&quot;: &quot;example-mcp&quot; } ] }&#x27; Each MCP server in the mcp_servers array defines the connection details: { &quot;type&quot;: &quot;url&quot;, &quot;url&quot;: &quot;https://example-server.modelcontextprotocol.io/sse&quot;, &quot;name&quot;: &quot;example-mcp&quot;, &quot;authorization_tok\n\nFor MCP servers that require OAuth authentication, you'll need to obtain an access token. The MCP connector beta supports passing an authorization_token parameter in the MCP server definition. API consumers are expected to handle the OAuth flow and obtain the access token prior to making the API call, as well as refreshing the token as needed. The MCP inspector can guide you through the process of obtaining an access token for testing purposes. Run the inspector with the following command. You need Node.js installed on your machine. ... In the sidebar on the left, for \"Transport type\", select either \"SSE\" or \"Streamable HTTP\". Enter the URL of the MCP server. In the right area, click on the \"Open Auth Settings\" button after \"Need to configure authentication?\". Click \"Quick OAuth Flow\" and authorize on the OAuth screen. Follow the steps in the \"OAuth Flow Progress\" section of the inspector and click \"Continue\" until you reach \"Authentication complete\".\n\nThe server must be publicly exposed through HTTP (supports both Streamable HTTP and SSE transports). Local STDIO servers cannot be connected directly. The MCP connector is currently not supported on Amazon Bedrock and Google Vertex. ... curl https://api.anthropic.com/v1/messages \\ -H \"Content-Type: application/json\" \\ -H \"X-API-Key: $ANTHROPIC_API_KEY\" \\ -H \"anthropic-version: 2023-06-01\" \\ -H \"anthropic-beta: mcp-client-2025-11-20\" \\ -d '{ \"model\": \"claude-opus-4-6\", \"max_tokens\": 1000, \"messages\": [{\"role\": \"user\", \"content\": \"What tools do you have available?\"}], \"mcp_servers\": [ { \"type\": \"url\", \"url\": \"https://example-server.modelcontextprotocol.io/sse\", \"name\": \"example-mcp\", \"authorization_token\": \"YOUR_TOKEN\" } ], \"tools\": [ { \"type\": \"mcp_toolset\", \"mcp_server_name\": \"example-mcp\" } ] }' Each MCP server in the mcp_servers array defines the connection details: { \"type\": \"url\", \"url\": \"https://example-server.modelcontextprotocol.io/sse\", \"name\": \"example-mcp\", \"authorization_tok\n\nFor detailed explanations of the OAuth flow, refer to the Authorization section in the MCP specification. If you manage your own MCP client connection (for example, with local stdio servers, MCP prompts, or MCP resources), the TypeScript SDK provides helper functions that convert between MCP types and Claude API types. This eliminates manual conversion code when using the MCP SDK alongside the Anthropic SDK. These helpers are currently available in the TypeScript SDK only. Use the mcp_servers API parameter when you have remote servers accessible via URL and only need tool support. If you're using the Agent SDK, MCP connections are managed automatically. Use the client-side helpers when you need local servers, prompts, resources, or more control over the connection with the base SDK.\n\nClaude's Model Context Protocol (MCP) connector feature enables you to connect to remote MCP servers directly from the Messages API without a separate MCP client. Current version: This feature requires the beta header: \"anthropic-beta\": \"mcp-client-2025-11-20\" The previous version (mcp-client-2025-04-04) is deprecated. See the deprecated version documentation below. This feature is in beta and is not eligible for Zero Data Retention (ZDR). Beta features are excluded from ZDR. Direct API integration: Connect to MCP servers without implementing an MCP client · Tool calling support: Access MCP tools through the Messages API · Flexible tool configuration: Enable all tools, allowlist specific tools, or denylist unwanted tools · Per-tool configuration: Configure individual tools with custom settings · OAuth authentication: Support for OAuth Bearer tokens for authenticated servers ·\nRun the following command in the terminal (not in Claude Code CLI): claude mcp add-json github &#x27;{&quot;type&quot;:&quot;http&quot;,&quot;url&quot;:&quot;https://api.githubcopilot.com/mcp&quot;,&quot;headers&quot;:{&quot;Authorization&quot;:&quot;Bearer YOUR_GITHUB_PAT&quot;}}&#x27; ... claude mcp add-json github ...\n\nIf that happens, use the legacy claude mcp add --transport http ... command format below. Run the following command in the terminal (not in Claude Code CLI): claude mcp add-json github '{\"type\":\"http\",\"url\":\"https://api.githubcopilot.com/mcp\",\"headers\":{\"Authorization\":\"Bearer YOUR_GITHUB_PAT\"}}' With an environment variable: claude mcp add-json github '{\"type\":\"http\",\"url\":\"https://api.githubcopilot.com/mcp\",\"headers\":{\"Authorization\":\"Bearer '\"$(grep GITHUB_PAT .env | cut -d '=' -f2)\"'\"}}' About the --scope flag (optional): Use this to specify where the configuration is stored: local (default): Available only to you in the current project (was called project in older versions) project: Shared with everyone in the project via .mcp.json file · user: Available to you across all projects (was called global in older versions) Example: Add --scope user to the end of the command to make it available across all projects.\n\nIf that happens, use the legacy claude mcp add --transport http ... command format below. Run the following command in the terminal (not in Claude Code CLI): claude mcp add-json github '{\"type\":\"http\",\"url\":\"https://api.githubcopilot.com/mcp\",\"headers\":{\"Authorization\":\"Bearer YOUR_GITHUB_PAT\"}}' ... claude mcp add-json github '{\"type\":\"http\",\"url\":\"https://api.githubcopilot.com/mcp\",\"headers\":{\"Authorization\":\"Bearer '\"$(grep GITHUB_PAT .env | cut -d '=' -f2)\"'\"}}' About the --scope flag (optional): Use this to specify where the configuration is stored: local (default): Available only to you in the current project (was called project in older versions) project: Shared with everyone in the project via .mcp.json file · user: Available to you across all projects (was called global in older versions) Example: Add --scope user to the end of the command to make it available across all projects.\n\nclaude mcp add-json github '{\"command\": \"github-mcp-server\", \"args\": [\"stdio\"], \"env\": {\"GITHUB_PERSONAL_ACCESS_TOKEN\": \"YOUR_GITHUB_PAT\"}}' ... claude mcp add --transport http github https://api.githubcopilot.com/mcp -H \"Authorization: Bearer YOUR_GITHUB_PAT\" ...\n\n$pat = \"YOUR_GITHUB_PAT\" claude mcp add github --transport http https://api.githubcopilot.com/mcp/ -H \"Authorization: Bearer $pat\" ⚠️ Note: Some users have reported compatibility issues with Claude Desktop and Docker-based MCP servers. We're investigating. If you experience issues, try using another MCP host, while we look into it! ... Note: Claude Desktop supports MCP servers that are both local (stdio) and remote (\"connectors\"). Remote servers can generally be added via Settings → Connectors → \"Add custom connector\". However, the GitHub remote MCP server requires OAuth authentication through a registered GitHub App (or OAuth App), which is not currently supported. Use the local Docker setup instead. macOS: ~/Library/Application Support/Claude/claude_desktop_config.json · Windows: %APPDATA%\\Claude\\claude_desktop_config.json · Linux: ~/.config/Claude/claude_desktop_config.json ·\nThis will create or open the config file at one of the following paths: macOS: `~/Library/Application Support/Claude/claude_desktop_config.json` Windows: `%APPDATA%\\\\Claude\\\\claude_desktop_config.json` Add or modify your configuration as shown ...\n\nClaude may block localhost URLs depending on CORS policies. Use ngrok or a Cloudflare Tunnel for HTTPS tunneling. Ensure your MCP server responds with valid JSON in the correct schema. Use the MCP Inspector for debugging. Integrating Claude Desktop with an MCP server—whether local, remote, or SaaS-hosted—takes just a few steps, but can have varying degrees of complexity. Using tools like Natoma can help streamline the process and ensure that security controls are covered. The result is a significantly enhanced contextual experience, making your interactions with Claude more powerful and personalized. Claude more powerful and personalized. Discovering MCP Servers with Natoma + CrowdStrike: Securing the Next Layer of AI Integration · Natoma’s platform is now integrated with the AI-powered CrowdStrike Falcon® platform to bring MCP server discovery and security insights into one unified view.\n\nClaude Desktop supports the following types of MCP servers: Local Stdio: Runs on your machine and streams responses via standard input/output (stdio). Streamable HTTP: The server operates as an independent process that can handle multiple client connections · Open the Claude Desktop App. Click Developer in the left-hand sidebar. Click Edit Config. This will create or open the config file at one of the following paths: macOS: `~/Library/Application Support/Claude/claude_desktop_config.json` Windows: `%APPDATA%\\\\Claude\\\\claude_desktop_config.json` Add or modify your configuration as shown in the examples below. Claude Desktop requires an MCP-compliant server that can respond to context queries. You have three setup options: Ideal for development, testing, and debugging. Install Docker. Ensure Docker is running. If you encounter issues pulling the image, try running `docker logout ghcr.io` to refresh your credentials.\n\nThe easiest option—no setup required. Note that you won’t have central control or visibility into interactions between Claude and the integrated service. Navigate to Settings > Integrations. For Enterprise or Team plans, go to the Organization integrations tab. Click Add integration. ... Click Add, then Connect to authenticate. Install Node and npm. Install the `mcp-remote` package. { \"mcpServers\": { \"asana\": { \"command\": \"npx\", \"args\": [\"mcp-remote\", \"https://mcp.asana.com/sse\"] } } } ... Recommended for teams and production use. This setup offers: ... You can deploy your MCP server using a platform like Natoma. Connect apps from the registry, and retrieve the configuration · or Streamable HTTP endpoint, and paste it into Claude Desktop. ... Ask Claude a question that requires context from recent activity. Claude will send a background request to the MCP server, which returns structured context.\nThis will take you to the Claude Desktop config file in your filesystem claude_desktop_config.json. Open this file in your preferred editor. Copy and paste the following snippet. Replace [tenant] with your tenant name. For example: If your SailPoint URL is https://acme.identitynow.com, use acme · Full URL would be: https://acme.api.identitynow.com/v2025/access-requests/mcp · Replace your_auth_token_here with your authorization token · { &quot;mcpServers&quot;: { &quot;SailPoint MCP&quot;: { &quot;command&quot;: &quot;npx&quot;, &quot;args&quot;: [ &quot;mcp-remote@latest&quot;, &quot;https://[tenant].api.cloud.sailpoint.com/v2025/access-requests/mcp&quot;, &quot;--debug&quot;, &quot;--header&quot;, &quot;Authorization: Bearer ${AUTH_TOKEN}&quot; ], &quot;env&quot;: { &quot;AUTH_TOKEN&quot;: &quot;your_auth_token_here&quot; } } } } ... Select the Tools icon at the bottom of the new chat UI. You will see SailPoint MCP among the tools listed: ... You can now ask Claude questions like &quot;What can I request access to?” or “What is the status of my access request?” or “Cancel access request XYZ” ·\n\nStep-by-step guide to integrate SailPoint MCP Server with Claude Desktop\n\nThis will take you to the Claude Desktop config file in your filesystem claude_desktop_config.json. Open this file in your preferred editor. Copy and paste the following snippet. Replace [tenant] with your tenant name. For example: If your SailPoint URL is https://acme.identitynow.com, use acme · Full URL would be: https://acme.api.identitynow.com/v2025/access-requests/mcp · Replace your_auth_token_here with your authorization token · { \"mcpServers\": { \"SailPoint MCP\": { \"command\": \"npx\", \"args\": [ \"mcp-remote@latest\", \"https://[tenant].api.cloud.sailpoint.com/v2025/access-requests/mcp\", \"--debug\", \"--header\", \"Authorization: Bearer ${AUTH_TOKEN}\" ], \"env\": { \"AUTH_TOKEN\": \"your_auth_token_here\" } } } } ... Select the Tools icon at the bottom of the new chat UI. You will see SailPoint MCP among the tools listed: ... You can now ask Claude questions like \"What can I request access to?” or “What is the status of my access request?” or “Cancel access request XYZ” ·"

