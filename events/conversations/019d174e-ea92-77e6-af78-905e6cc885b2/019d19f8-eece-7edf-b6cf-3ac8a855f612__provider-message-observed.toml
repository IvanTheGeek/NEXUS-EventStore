[[body.segments]]
kind = "reasoning"
text = "The user is on Windows with Claude Desktop. The config path on Windows is `%APPDATA%\\Claude\\claude_desktop_config.json`. The issue is likely that `npx` needs to be called differently on Windows - it needs `cmd /c npx` wrapper, or the path needs to be specified differently.\n\nLet me ask what they see in the logs first, or give them troubleshooting steps.\n\nActually, let me just give them the Windows-specific fix. On Windows, `npx` needs the `cmd /c` wrapper in Claude Desktop config."

[[body.segments]]
kind = "plain_text"
text = "Windows needs a slightly different config — `npx` requires a `cmd /c` wrapper to work in Claude Desktop.\n\n**Step 1 — Open the config file**\n\nPress `Win + R`, type `%APPDATA%\\Claude` and hit Enter. Open `claude_desktop_config.json` in Notepad.\n\n**Step 2 — Replace the eventlanes entry with this:**\n\n```json\n{\n  \"mcpServers\": {\n    \"eventlanes\": {\n      \"command\": \"cmd\",\n      \"args\": [\n        \"/c\",\n        \"npx\",\n        \"mcp-remote@latest\",\n        \"https://eventlanes.app/mcp\",\n        \"--header\",\n        \"Authorization: Bearer 123c61dc6cc497d15daedcbb1f024d2089091933767ba871974eaf13b750a646\"\n      ]\n    }\n  }\n}\n```\n\n**Step 3 — Save, fully quit Claude Desktop, relaunch**\n\n---\n\nIf it still fails, check the logs to see the actual error. The log file is at:\n```\n%APPDATA%\\Claude\\logs\\mcp-server-eventlanes.log\n```\n\nPaste whatever's in there and I can diagnose further."

