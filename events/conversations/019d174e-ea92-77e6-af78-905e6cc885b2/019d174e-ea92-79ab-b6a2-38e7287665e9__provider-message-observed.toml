kind = "plain_text"
text = "Yes, but not with that command — that's Claude Code (CLI) syntax. For the web version, you do it through the UI. Here's how:\n\n**Settings → Connectors → \"Add custom connector\"**\n\nEnter the URL: `https://eventlanes.app/mcp`\n\nThe catch: the web UI supports OAuth auth (Client ID + Secret via \"Advanced settings\"), but **not arbitrary `Authorization: Bearer` headers** directly. The CLI's `--header` flag doesn't have a web equivalent.\n\nSo your options:\n\n1. **Check if EventLanes supports OAuth** — if so, use the OAuth Client ID/Secret fields in Advanced Settings\n2. **Use Claude Desktop instead** — it supports the same `claude mcp add` syntax and arbitrary headers via `~/.config/claude/claude_desktop_config.json`\n3. **Use Claude Code** — that command works exactly as written if you have it installed\n\nAre you trying to get this working in the web UI specifically, or would Claude Desktop or Code work for your use case?"

