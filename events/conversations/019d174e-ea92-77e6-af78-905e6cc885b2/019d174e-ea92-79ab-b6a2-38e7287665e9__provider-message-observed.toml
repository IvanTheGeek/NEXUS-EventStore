kind = "tool_result"
text = "{\"start_timestamp\":null,\"stop_timestamp\":null,\"flags\":null,\"type\":\"tool_result\",\"tool_use_id\":\"toolu_01YMNb4Y4F1xN7eDwD9jkLLo\",\"name\":\"web_search\",\"content\":[{\"type\":\"knowledge\",\"title\":\"Pre-built web connectors using remote MCP\",\"url\":\"https://support.claude.com/en/articles/11176164-pre-built-web-connectors-using-remote-mcp\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"claude.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=claude.com\",\"site_name\":\"Claude\"},\"is_missing\":false,\"text\":\"Custom connectors using remote MCP are available on Claude and Claude Desktop for users on free, Pro, Max, Team, and Enterprise plans. Free users are limited to one custom connector. This feature is currently in beta. In addition to directory connectors, you can add custom connectors: Navigate to Customize \\u0026gt; Connectors. Click the \\u201C\\u002B\\u201D button next to Connectors. ... Enter the connector\\u0026#x27;s name and URL. Enter advanced settings (OAuth Client ID and secret) if desired. Click \\u201CAdd,\\u201D then follow the same connection process as directory connectors. Important: Custom connectors allow you to connect Claude to services that haven\\u0026#x27;t been verified by Anthropic. Only connect to servers from trusted organizations and review authentication permissions carefully. For more information, see Get started with custom connectors using remote MCP. All data transfers are encrypted.\\n\\nCustom connectors using remote MCP are available on Claude and Claude Desktop for users on free, Pro, Max, Team, and Enterprise plans. Free users are limited to one custom connector. This feature is currently in beta. In addition to directory connectors, you can add custom connectors: Navigate to Customize \\u003E Connectors. Click the \\u201C\\u002B\\u201D button next to Connectors. ... Enter the connector\\u0027s name and URL. Enter advanced settings (OAuth Client ID and secret) if desired. Click \\u201CAdd,\\u201D then follow the same connection process as directory connectors. Important: Custom connectors allow you to connect Claude to services that haven\\u0027t been verified by Anthropic. Only connect to servers from trusted organizations and review authentication permissions carefully. For more information, see Get started with custom connectors using remote MCP. All data transfers are encrypted.\\n\\nConnectors let Claude access your apps and services, retrieve your data, and take actions within connected services. For example, you can connect Claude to Linear to create issues, to Slack to send messages, or to Google Drive to search your files. Connectors work across Claude, Claude Desktop, Claude Code, and the API (via the MCP Connector). You can find available connectors in the Connectors Directory, where each connector has a page detailing its use cases, read/write capabilities, and availability. You can also add custom connectors or connect to any service that supports MCP. You can browse the Connectors Directory on Claude and Claude Desktop. It isn\\u0027t possible to browse the directory on Claude for iOS or Android at this time. ... Click the \\u0022\\u002B\\u0022 button in the lower left corner of your chat, or type \\u0022/\\u0022 to open the menu. ... Click the \\u201C\\u002B\\u201D button next to Connectors.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://support.claude.com/en/articles/11176164-pre-built-web-connectors-using-remote-mcp\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Building custom connectors via remote MCP servers | Claude Help Center\",\"url\":\"https://support.claude.com/en/articles/11503834-building-custom-connectors-via-remote-mcp-servers\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"claude.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=claude.com\",\"site_name\":\"Claude\"},\"is_missing\":false,\"text\":\"As of July, Claude for iOS and Android also support remote MCP servers! Users can use tools, prompts, and resources from remote servers that they\\u2019ve already added via claude.ai.\\n\\nAs of July, Claude for iOS and Android also support remote MCP servers! Users can use tools, prompts, and resources from remote servers that they\\u2019ve already added via claude.ai. Users cannot add new servers directly from Claude Mobile. Claude supports both SSE- and Streamable HTTP-based remote servers, although support for SSE may be deprecated in the coming months. Claude supports both authless and OAuth-based remote servers. ... Claude supports the 3/26 auth spec and (as of July) the 6/18 auth spec. Claude supports Dynamic Client Registration (DCR). OAuth servers can signal to Claude that a DCR client has been deleted and that Claude should re-register the client by returning an HTTP 401 with an error of invalid_client from the token endpoint, as described in RFC 6749. As of July, users are also able to specify a custom client ID and client secret when configuring a server that doesn\\u2019t support DCR.\\n\\nSee the MCP documentation for more details on using inspector and for other tips on how to debug and troubleshoot your server. In addition, other solutions like Cloudflare\\u2019s AI Playground allow you to test remote MCP server functionality.\\n\\nCustom connectors using remote MCP are available on Claude and Claude Desktop for users on Pro, Max, Team, and Enterprise plans. To get started with remote servers, start with the following resources: The auth spec, especially details on the auth flow for third-party services. The remote server examples in the TypeScript and Python SDKs. The client and server auth implementations in the TypeScript and Python SDKs. The official MCP roadmap and draft spec\\u2019s changelog for details on how the protocol will evolve. Other resources (like this) may also be helpful to learn about considerations when building, deploying, and troubleshooting remote servers. In addition, some solutions like Cloudflare provide remote MCP server hosting with built-in autoscaling, OAuth token management, and deployment. Remote MCP servers are supported on Claude and Claude Desktop for Pro, Max, Team, and Enterprise plans.\\n\\nClaude\\u2019s OAuth callback URL is https://claude.ai/api/mcp/auth_callback and its OAuth client name is Claude. This callback URL may change to https://claude.com/api/mcp/auth_callback in the future \\u2013 if you choose to allowlist MCP client callback URLs, please allowlist this callback URL as well to ensure that your server continues to work with Claude. Claude supports token expiry and refresh \\u2013 servers should support this functionality in order to provide the best experience for users. See here for the IP addresses used by Claude for inbound and outbound connections to MCP servers. Server developers wishing to disallow non-Claude MCP Clients can whitelist these IP addresses, Claude\\u2019s OAuth callback URL, and/or Claude\\u2019s OAuth client name. Claude supports tools, prompts, and resources. Claude supports text- and image-based tool results. Claude supports text- and binary- based resources.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://support.claude.com/en/articles/11503834-building-custom-connectors-via-remote-mcp-servers\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Connect to remote MCP Servers - Model Context Protocol\",\"url\":\"https://modelcontextprotocol.io/docs/develop/connect-remote-servers\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"modelcontextprotocol.io\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=modelcontextprotocol.io\",\"site_name\":\"Model Context Protocol\"},\"is_missing\":false,\"text\":\"Open Claude in your browser and navigate to the settings page. You can access this by clicking on your profile icon and selecting \\u201CSettings\\u201D from the dropdown menu. Once in settings, locate and click on the \\u201CConnectors\\u201D section in the ...\\n\\nLearn how to connect Claude to remote MCP servers and extend its capabilities with internet-hosted tools and data sources ... Remote MCP servers extend AI applications\\u2019 capabilities beyond your local environment, providing access to internet-hosted tools, services, and data sources. By connecting to remote MCP servers, you transform AI assistants from helpful tools into informed teammates capable of handling complex, multi-step projects with real-time access to external resources. Many clients now support remote MCP servers, enabling a wide range of integration possibilities. This guide demonstrates how to connect to remote MCP servers using Claude as an example, one of the many clients that support MCP. While we focus on Claude\\u2019s implementation through Custom Connectors, the concepts apply broadly to other MCP-compatible clients. Remote MCP servers function similarly to local MCP servers but are hosted on the internet rather than your local machine.\\n\\nThey expose tools, prompts, and resources that Claude can use to perform tasks on your behalf. These servers can integrate with various services such as project management tools, documentation systems, code repositories, and any other API-enabled service. The key advantage of remote MCP servers is their accessibility. Unlike local servers that require installation and configuration on each device, remote servers are available from any MCP client with an internet connection. This makes them ideal for web-based AI applications, integrations that emphasize ease of use, and services that require server-side processing or authentication. Custom Connectors serve as the bridge between Claude and remote MCP servers. They allow you to connect Claude directly to the tools and data sources that matter most to your workflows, enabling Claude to operate within your favorite software and draw insights from the complete context of your external tools.\\n\\nNow that you\\u2019ve connected Claude to a remote MCP server, you can explore its capabilities in your conversations. Try using the connected tools to automate tasks, access external data, or integrate with your existing workflows. Create custom remote MCP servers to integrate with proprietary tools and services \\u00B7 Browse our collection of official and community-created MCP servers \\u00B7 Learn how to connect Claude Desktop to local MCP servers for direct system access \\u00B7 Dive deeper into how MCP works and its architecture Remote MCP servers unlock powerful possibilities for extending Claude\\u2019s capabilities.\\n\\nOpen Claude in your browser and navigate to the settings page. You can access this by clicking on your profile icon and selecting \\u201CSettings\\u201D from the dropdown menu. Once in settings, locate and click on the \\u201CConnectors\\u201D section in the sidebar.This will display your currently configured connectors and provide options to add new ones. ... In the Connectors section, scroll to the bottom where you\\u2019ll find the \\u201CAdd custom connector\\u201D button. Click this button to begin the connection process. A dialog will appear prompting you to enter the remote MCP server URL. This URL should be provided by the server developer or administrator. Enter the complete URL, ensuring it includes the proper protocol (https://) and any necessary path components. After entering the URL, click \\u201CAdd\\u201D to proceed with the connection. ... Most remote MCP servers require authentication to ensure secure access to their resources.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://modelcontextprotocol.io/docs/develop/connect-remote-servers\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"How to Connect Claude AI to Remote MCP Servers (Zapier, Atlassian, APIs)\",\"url\":\"https://apidog.com/blog/claude-ai-remote-mcp-server/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"apidog.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=apidog.com\",\"site_name\":\"Apidog\"},\"is_missing\":false,\"text\":\"In Zapier MCP, use the Connect tab to Copy URL (your server\\u2019s URL). In Claude, go to Settings \\u2192 Integrations \\u2192 Add more. Name your server and paste the integration URL. Accept the security notice and click Add.\\n\\nLearn how to connect Claude AI to remote MCP servers like Atlassian and Zapier. This hands-on guide covers secure integration, automated workflows, and reliable API testing with Apidog for robust AI-powered automation across your favorite tools. ... Unlock powerful AI-driven automation by connecting Anthropic\\u2019s Claude AI to remote Model Context Protocol (MCP) servers. This hands-on guide walks API developers, backend engineers, and technical leads through secure integration with Atlassian, Zapier, and custom APIs\\u2014empowering Claude to orchestrate workflows, trigger tools, and access live data across your stack. ... Remote MCP servers let Claude AI act as more than just a conversational agent. By integrating with a remote MCP server, Claude can: Dynamically discover and invoke APIs, tools, and data resources \\u00B7 Automate tasks (e.g., create Jira tickets, update spreadsheets) Enrich chat experiences with real-time data and actions \\u00B7\\n\\nOnce accepted, you\\u2019ll receive a server URL like https://mcp.atlassian.com/v1. Paste this URL into the \\u201CServer URL\\u201D field and click Save. Claude will trigger an OAuth login to Atlassian. Sign in with your Jira/Confluence Cloud account. Review and approve requested permissions (Claude only accesses what you allow). After approval, you\\u2019ll return to Claude with the integration enabled. In Claude\\u2019s chat, click connect under \\u201Csearch and tools\\u201D. Try: \\u0022Create a Jira ticket in my project \\u0027DEV-TEAM\\u0027 titled \\u0027Fix login bug\\u0027.\\u0022 Claude uses the MCP server to create the ticket and confirms success. If it fails, double-check your beta status and permissions. Result: Claude can now manage Jira issues or summarize Confluence pages\\u2014directly from chat. Zapier\\u2019s MCP integration brings access to 7,000\\u002B apps into Claude\\u2019s workflow. Here\\u2019s how to set it up: Log in to Zapier and navigate to the MCP dashboard.\\n\\nIn Zapier MCP, use the Connect tab to Copy URL (your server\\u2019s URL). In Claude, go to Settings \\u2192 Integrations \\u2192 Add more. Name your server and paste the integration URL. Accept the security notice and click Add. Start a new conversation in Claude. Click the search and tools icon. Find your MCP tool, click Connect, and approve permissions. Use toggles to enable/disable Claude\\u2019s access to specific actions. In Claude\\u2019s chat, try: \\u0022Pull the latest prospect info from HubSpot for my meeting with Sarah at 3 PM.\\u0022 Claude fetches live HubSpot data via Zapier MCP and responds. If not, double-check app permissions. Result: Claude can automate tasks across CRM, calendars, project tools, and more\\u2014right from your chat interface. When exposing your own APIs for Claude to access via MCP, reliable testing and validation are crucial. ... With Apidog, you ensure that any API endpoints you expose via MCP behave as expected\\u2014so Claude (or any client) gets consistent, error-free responses.\\n\\nQ3. Which Claude plans support MCP connectors? Max, Team, and Enterprise plans support remote MCP integrations. Q4. What protocols are supported? SSE and Streamable HTTP. Q5. Can I add multiple MCP servers? Yes\\u2014add multiple entries in the mcp_servers array when using the Messages API. Connecting Claude AI to remote MCP servers transforms your AI from a Q\\u0026A bot into an automation powerhouse. By integrating with Atlassian, Zapier, or your own APIs, Claude can orchestrate real workflows, manage projects, and access live data\\u2014securely and at scale. For teams building custom MCP endpoints, Apidog is a proven tool for API test automation and contract validation\\u2014ensuring every integration is robust, reliable, and production-ready. ... Why Connect Claude AI to a Remote MCP Server?Getting Started: Environment SetupPrerequisitesStep-by-Step: Integrate Claude AI with Atlassian\\u2019s Remote MCP Server1.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://apidog.com/blog/claude-ai-remote-mcp-server/\",\"search_provider\":\"anthropic\",\"age\":\"May 6, 2025\"}},{\"type\":\"knowledge\",\"title\":\"The Missing MCP Playbook: Deploying Custom Agents on Claude.ai and Claude Mobile | by George Vetticaden | Medium\",\"url\":\"https://medium.com/@george.vetticaden/the-missing-mcp-playbook-deploying-custom-agents-on-claude-ai-and-claude-mobile-05274f60a970\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"medium.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=medium.com\",\"site_name\":\"Medium\"},\"is_missing\":false,\"text\":\"If Claude.ai/Claude Mobile \\u2192 remote MCP server (not local stdio) If remote MCP \\u2192 OAuth 2.1 authentication (not process isolation) If OAuth 2.1 \\u2192 Dynamic Client Registration (mobile can\\u2019t pre-configure) If public HTTP \\u2192 Cloud Run deployment (not local machine) If Cloud Run \\u2192 MCP Spec 2025\\u201306\\u201318 (latest with HTTP support) Each requirement builds on the previous. You can\\u2019t skip steps. The architecture becomes: ... Phase 2 Execution Architecture: Remote MCP server on Google Cloud Run with OAuth 2.1 authentication enabling Claude.ai and Claude Mobile voice access to government forms \\u00B7 The diagram shows the component architecture \\u2014 WHAT exists in the remote stack. But deploying these components requires satisfying specific requirements that don\\u2019t exist in local MCP. The table reveals exactly what changes across eight architectural layers: The table reveals a stark reality: remote deployment transforms every aspect of MCP architecture.\\n\\nThe Missing MCP Playbook: Deploying Custom Agents on Claude.ai and Claude Mobile Part 2: OAuth 2.1, Dynamic Client Registration, MCP Spec 2025\\u201306\\u201318, Auth0, and Google Cloud Run In Part 1, I \\u2026\\n\\nImplement this layering in your middleware, not just for MCP compliance but as reusable pattern for any agent protocol integration. ... HEAD request \\u2014 Claude sends HEAD to / for protocol discovery. View HEAD endpoint implementation \\u2192 \\u00B7 initialize method \\u2014 Claude POSTs to / with initialize method WITHOUT OAuth token. View initialize implementation \\u2192 \\u00B7 notifications/initialized \\u2014 Claude POSTs to / with notifications/initialized for session validation only. View notifications/initialized implementation \\u2192 \\u00B7 tools/list method \\u2014 Claude POSTs to / with tools/list WITH OAuth token for full validation. View tools/list implementation \\u2192 \\u00B7 tools/call method \\u2014 Claude POSTs to / with tools/call for each tool execution WITH OAuth token. View tools/call implementation \\u2192 \\u00B7 You must implement HEAD endpoint returning MCP-Protocol-Version: 2025-06-18 header, root path / endpoint (not /sse or custom paths\\u2014Claude assumes root), selective authentication middleware, session management with Mcp-Session-Id head\\n\\nPart 2 (this post) revealed the infrastructure reality \\u2014 what it actually takes to deploy custom MCP servers that successfully integrate with Claude.ai and Claude Mobile. The OAuth 2.1 handshake with Dynamic Client Registration. The MCP Specification 2025\\u201306\\u201318 requirements. The selective authentication pattern. The Google Cloud Run deployment architecture. And why getting any part wrong means silent failures with little helpful error feedback. Use this as your guide. When you\\u2019re ready to deploy your own custom MCP server, reference this working example. The patterns, configurations, and architecture decisions documented here solve the integration challenges that most MCP tutorials never address. ... George Vetticaden builds multi-agent AI systems and writes about practical patterns in enterprise AI. Previously served as VP of Agents at Sema4.ai, where he led development of agent building tools and document intelligence solutions.\\n\\nIf Claude.ai/Claude Mobile \\u2192 remote MCP server (not local stdio) If remote MCP \\u2192 OAuth 2.1 authentication (not process isolation) If OAuth 2.1 \\u2192 Dynamic Client Registration (mobile can\\u2019t pre-configure) If public HTTP \\u2192 Cloud Run deployment (not local machine) If Cloud Run \\u2192 MCP Spec 2025\\u201306\\u201318 (latest with HTTP support) Each requirement builds on the previous. You can\\u2019t skip steps. The architecture becomes: ... Phase 2 Execution Architecture: Remote MCP server on Google Cloud Run with OAuth 2.1 authentication enabling Claude.ai and Claude Mobile voice access to government forms \\u00B7 The diagram shows the component architecture \\u2014 WHAT exists in the remote stack. But deploying these components requires satisfying specific requirements that don\\u2019t exist in local MCP. The table reveals exactly what changes across eight architectural layers: The table reveals a stark reality: remote deployment transforms every aspect of MCP architecture.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://medium.com/@george.vetticaden/the-missing-mcp-playbook-deploying-custom-agents-on-claude-ai-and-claude-mobile-05274f60a970\",\"search_provider\":\"anthropic\",\"age\":\"November 4, 2025\"}},{\"type\":\"knowledge\",\"title\":\"Claude Code Gains Support for Remote MCP Servers over Streamable HTTP - InfoQ\",\"url\":\"https://www.infoq.com/news/2025/06/anthropic-claude-remote-mcp/\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"infoq.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=infoq.com\",\"site_name\":\"InfoQ\"},\"is_missing\":false,\"text\":\"Others, however, emphasized the importance of Claude Code gaining support for streamable HTTP as an alternative to stdio for connecting to MCP servers. According to Robert Matsukoa, former head of product engineering at Tripadvisor and currently CTO at Fractional, this is not just a convenient upgrade, but one that \\u0026quot;alters the economics of AI tool integration\\u0026quot;: Remote servers eliminate infrastructure costs previously required for local MCP deployments. Teams no longer need to provision servers, manage updates, or handle scaling for MCP services. However, Matsukoa notes that using MCP servers typically increases costs by 25-30% due to the larger contexts pulled from external sources and that remote MCPs, by making this task easier, can actually compound those costs. So, careful consideration is required as to where it makes sense: MCP\\u0026#x27;s advantages emerge in scenarios requiring deep contextual integration: multi-repository debugging sessions, legacy system analysis requiring historical c\\n\\nLearn what\\u0027s next in AI and software, from teams already doing it. Early Bird ends March 10. InfoQ Homepage News Claude Code Gains Support for Remote MCP Servers over Streamable HTTP ... Feed your curiosity. Help 550k\\u002B global senior developers each month stay ahead.Get in touch ... Anthropic has recently introduced support for connecting to remote MCP servers in Claude Code, allowing developers to integrate external tools and resources without manual local server setup. The new capability enables developers to easily extract context from their existing tools, including security services, project management systems, and knowledge bases. For example, a developer can use the Sentry MCP server to get a list of errors and issues in their project, check whether fixes are available, and apply them using Claude, all within a unified workflow. Additional integration examples include pulling data from APIs, accessing remote documentation, working with cloud services, collaborating on shared team\\n\\nOthers, however, emphasized the importance of Claude Code gaining support for streamable HTTP as an alternative to stdio for connecting to MCP servers. According to Robert Matsukoa, former head of product engineering at Tripadvisor and currently CTO at Fractional, this is not just a convenient upgrade, but one that \\u0022alters the economics of AI tool integration\\u0022: Remote servers eliminate infrastructure costs previously required for local MCP deployments. Teams no longer need to provision servers, manage updates, or handle scaling for MCP services. However, Matsukoa notes that using MCP servers typically increases costs by 25-30% due to the larger contexts pulled from external sources and that remote MCPs, by making this task easier, can actually compound those costs. So, careful consideration is required as to where it makes sense: MCP\\u0027s advantages emerge in scenarios requiring deep contextual integration: multi-repository debugging sessions, legacy system analysis requiring historical c\\n\\nBefore Claude Code natively supported a remote MCP server, developers had to set up a local MCP server to integrate it with their existing toolchain. Remote MCP servers offer a lower maintenance alternative to local servers: just add the vendor\\u2019s URL to Claude Code\\u2014no manual setup required. Vendors handle updates, scaling, and availability, so you can focus on building instead of managing server infrastructure. For authentication, Claude Code supports OAuth 2.0 over HTTP or SSE, allowing developers to authenticate directly through the terminal without needing to provide an API key. For example, here\\u0027s how you can connect Claude Code to GitHub MCP: $ claude mcp add --transport sse github-server https://api.github.com/mcp \\u003E/mcp \\u00B7 The /mcp command, executed within Claude Code, opens an interactive menu that provides the option to authenticate using OAuth.\\n\\nQCon San Francisco (Nov 16-20): What\\u0027s next in AI? What\\u0027s next in software? Learn from the teams already doing it. Register Now ... Unlock the full InfoQ experience by logging in! Stay updated with your favorite authors and topics, engage with content, and download exclusive resources. Log In ... Stay updated on topics and peers that matter to youReceive instant alerts on the latest insights and trends. Quickly access free resources for continuous learningMinibooks, videos with transcripts, and training materials. Save articles and read at anytimeBookmark articles to read whenever youre ready. ... Join Luca Mezzalira for this 5-week online cohort. Master socio-technical architecture leadership. Register Interest. ... Learn what works in AI, architecture, data, security \\u0026 FinTech. Early Bird ends March 10. ... Learn how leading engineering teams run AI in production\\u2014reliably, securely, and at scale.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://www.infoq.com/news/2025/06/anthropic-claude-remote-mcp/\",\"search_provider\":\"anthropic\",\"age\":\"June 22, 2025\"}},{\"type\":\"knowledge\",\"title\":\"Get started with custom connectors using remote MCP | Claude Help Center\",\"url\":\"https://support.claude.com/en/articles/11175166-get-started-with-custom-connectors-using-remote-mcp\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"claude.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=claude.com\",\"site_name\":\"Claude\"},\"is_missing\":false,\"text\":\"Add your connector\\u0026#x27;s remote MCP server URL. Optionally, click \\u201CAdvanced settings\\u201D to specify an OAuth Client ID and OAuth Client Secret for your server. Finish configuring your connector by clicking \\u0026quot;Add.\\u0026quot;\\n\\nThe Model Context Protocol (MCP) is an open standard, created by Anthropic, for AI applications to connect to tools and data. Previously, MCP servers only ran locally (i.e. on a user\\u0027s laptop). Now, developers can build and host remote MCP servers that communicate with AI apps over the internet. Remote MCP servers give models access to internet-hosted tools and data, transforming Claude into an informed teammate that can independently handle complex, multi-step projects tailored to your needs. Note: While anyone can build and host connectors using remote MCP, only Owners can add them to Team and Enterprise plans. Once a connector has been added to a Team or Enterprise organization, users individually connect to and enable that connector. This ensures that Claude can only access tools and data that the individual user has access to. ... Before members of Team and Enterprise plans can configure custom connectors, an Owner or Primary Owner needs to follow these initial steps to add a cust\\n\\nCustom connectors using remote MCP are available on Claude and Claude Desktop for users on free, Pro, Max, Team, and Enterprise plans. Free users are limited to one custom connector. This feature is currently in beta. Custom connectors let you connect Claude directly to the tools and data sources that matter most to your workflows. This enables Claude to operate within your favorite software and draw insights from the complete context of your external tools. ... Connect Claude to existing remote MCP servers. Build your own remote MCP servers to connect with any tool. \\u26A0\\uFE0F Security and Privacy with Custom Connectors (beta) Be aware that custom connectors allow you to connect Claude to services that have not been verified by Anthropic, and allow Claude to access and take action in these services. For more guidance, review the Security and privacy considerations section below.\\n\\nAdd your connector\\u0027s remote MCP server URL. Optionally, click \\u201CAdvanced settings\\u201D to specify an OAuth Client ID and OAuth Client Secret for your server. Finish configuring your connector by clicking \\u0022Add.\\u0022 ... Navigate to Settings \\u003E Connectors. Locate the \\u0022Connectors\\u0022 section. Find the custom connector your Owner added in the list (it will have a \\u0022Custom\\u0022 label). Click \\u0022Connect\\u0022 to authenticate and start using the connector with Claude. If you are using an individual Pro or Max plan, follow these steps to add a custom connector: Navigate to Settings \\u003E Connectors. Locate the \\u0022Connectors\\u0022 section. Click \\u0022Add custom connector\\u0022 at the bottom of the section. Add your connector\\u0027s remote MCP server URL. Optionally, click \\u201CAdvanced settings\\u201D to specify an OAuth Client ID and OAuth Client Secret for your server. Finish configuring your connector by clicking \\u0022Add.\\u0022\\n\\nTo learn about building connectors to use with Claude, see Building custom connectors via remote MCP servers. Custom connectors allow you to connect Claude to arbitrary services that have not been verified by Anthropic. When you connect Claude to external services, you\\u0027re granting it the ability to access and potentially modify data within those services based on your permissions. It\\u2019s important to make sure you\\u2019re only connecting to remote MCP servers that you trust and that you\\u2019re aware of Claude\\u2019s interactions with web connectors. When you add a custom connector to Claude, you\\u0027ll typically go through an OAuth authentication process to securely sign in to the application and grant specific permissions. This allows Claude to interact with the application on your behalf, without Claude ever seeing your actual password. You can revoke these permissions at any time by disconnecting the connector in Claude\\u0027s settings or the third-party service\\u0027s security settings.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://support.claude.com/en/articles/11175166-get-started-with-custom-connectors-using-remote-mcp\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Enable MCP in Claude Desktop: Step-by-Step Guide | Natoma\",\"url\":\"https://natoma.ai/blog/how-to-enabling-mcp-in-claude-desktop\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"natoma.ai\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=natoma.ai\",\"site_name\":\"Natoma\"},\"is_missing\":false,\"text\":\"Note that you won\\u2019t have central control or visibility into interactions between Claude and the integrated service. Navigate to Settings \\u0026gt; Integrations. For Enterprise or Team plans, go to the Organization integrations tab.\\n\\nIntegrating Claude Desktop with an MCP server\\u2014whether local, remote, or SaaS-hosted\\u2014takes just a few steps, but can have varying degrees of complexity. Using tools like Natoma can help streamline the process and ensure that security controls are covered. The result is a significantly enhanced contextual experience, making your interactions with Claude more powerful and personalized. Claude more powerful and personalized. Discovering MCP Servers with Natoma \\u002B CrowdStrike: Securing the Next Layer of AI Integration \\u00B7 Natoma\\u2019s platform is now integrated with the AI-powered CrowdStrike Falcon\\u00AE platform to bring MCP server discovery and security insights into one unified view. ... See how MCP enables enterprises to configure connections in 15-30 minutes, allowing them to launch 50\\u002B AI tools in 90 days. ... Scaling AI across your enterprise requires organizational transformation, not just technology deployment.\\n\\nNatoma\\u2019s platform is now integrated with the AI-powered CrowdStrike Falcon\\u00AE platform to bring MCP server discovery and security insights into one unified view. ... See how MCP enables enterprises to configure connections in 15-30 minutes, allowing them to launch 50\\u002B AI tools in 90 days. ... Natoma is enterprise-ready, battle-tested, and ready to help you skip the heavy lifting when implementing AI into your organization. ... Natoma is enterprise-ready, battle-tested, and ready to help you skip the heavy lifting when implementing AI into your organization. ... Natoma is enterprise-ready, battle-tested, and ready to help you skip the heavy lifting when implementing AI into your organization. ... Copyright 2026 Natoma Labs, Inc. ... Copyright 2026 Natoma Labs, Inc.\\n\\nClaude Desktop is a powerful LLM client by Anthopic, designed for both personal and professional use. By integrating it with a Model Context Protocol (MCP) server, you can dynamically inject real-time, relevant context into your Claude sessions from documents, workspaces, tools, apps, and data sources. You can also enable Claude to go beyond text or image generation, taking direct action in business systems like Slack, Salesforce, Jira, and more. This step-by-step guide will walk you through three methods for integrating Claude Desktop with an MCP server using the examples of GitHub, Asana, and Datadog. Claude Desktop supports the following types of MCP servers: Local Stdio: Runs on your machine and streams responses via standard input/output (stdio). Streamable HTTP: The server operates as an independent process that can handle multiple client connections \\u00B7\\n\\nThe easiest option\\u2014no setup required. Note that you won\\u2019t have central control or visibility into interactions between Claude and the integrated service. Navigate to Settings \\u003E Integrations. For Enterprise or Team plans, go to the Organization integrations tab. Click Add integration. ... Click Add, then Connect to authenticate. Install Node and npm. Install the \\u0060mcp-remote\\u0060 package. { \\u0022mcpServers\\u0022: { \\u0022asana\\u0022: { \\u0022command\\u0022: \\u0022npx\\u0022, \\u0022args\\u0022: [\\u0022mcp-remote\\u0022, \\u0022https://mcp.asana.com/sse\\u0022] } } } ... Recommended for teams and production use. This setup offers: ... You can deploy your MCP server using a platform like Natoma. Connect apps from the registry, and retrieve the configuration \\u00B7 or Streamable HTTP endpoint, and paste it into Claude Desktop. ... Ask Claude a question that requires context from recent activity. Claude will send a background request to the MCP server, which returns structured context.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://natoma.ai/blog/how-to-enabling-mcp-in-claude-desktop\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Claude Desktop App with HTTP-with-SSE-transport? \\u00B7 modelcontextprotocol \\u00B7 Discussion #16\",\"url\":\"https://github.com/orgs/modelcontextprotocol/discussions/16\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"github.com\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=github.com\",\"site_name\":\"GitHub\"},\"is_missing\":false,\"text\":\"Jun 26, 2025 \\u00B7 Remote MCP support in Claude is now documented here: https://support.anthropic.com/en/articles/11175166-about-custom-integrations-using-remote-mcp \\u00B7 View full answer \\u00B7 Comment options \\u00B7 There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. Quote reply \\u00B7 - This is not supported at the moment. Beta Was this translation helpful? Give feedback. 1 \\u00B7 You must be logged in to vote \\u00B7 All reactions \\u00B7 6 replies \\u00B7 Comment options \\u00B7 There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. Quote reply \\u00B7 - Here is a great workaround while we wait for official support: https://developers.cloudflare.com/agents/guides/remote-mcp-server/#connect-your-remote-mcp-server-to-claude-and-other-mcp-clients-via-a-local-proxy \\u00B7\\n\\nConfiguring the MCP servers into Claude Desktop App currently only show how to add the stdio protocol versions. ==\\u003E How do I add MCP server using HTTP with SSE transport? Or is it not yet supported?\\n\\nJun 26, 2025 \\u00B7 Remote MCP support in Claude is now documented here: https://support.anthropic.com/en/articles/11175166-about-custom-integrations-using-remote-mcp \\u00B7 View full answer \\u00B7 Comment options \\u00B7 There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. Quote reply \\u00B7 - This is not supported at the moment. Beta Was this translation helpful? Give feedback. 1 \\u00B7 You must be logged in to vote \\u00B7 All reactions \\u00B7 6 replies \\u00B7 Comment options \\u00B7 There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. Quote reply \\u00B7 - Here is a great workaround while we wait for official support: https://developers.cloudflare.com/agents/guides/remote-mcp-server/#connect-your-remote-mcp-server-to-claude-and-other-mcp-clients-via-a-local-proxy \\u00B7\\n\\nI just wrote a stdio to http sse gateway with example MCP server and client as well. The server exposes DuckDB database and allows Claude to run queries on it. https://github.com/boilingdata/mcp-server-and-gw \\u00B7 Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. ... It works for me. Thanks! Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. ... Is there any update on this? I am able to use this on LibreChat and Cursor now but it doesn\\u0027t work on Claude Desktop app \\u00B7 Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page.\\n\\nUpdated the README in the example stdio to HTTP SSE bridge: https://github.com/boilingdata/mcp-server-and-gw \\u00B7 Shouldn\\u0027t be too hard to convert to python if you prefer that. Naturally, you can run your server in Python if you like. Beta Was this translation helpful? Give feedback. ... There was an error while loading. Please reload this page. Something went wrong. There was an error while loading. Please reload this page. ... There was an error while loading. Please reload this page. ... Something went wrong. There was an error while loading. Please reload this page. ... I am working on a somewhat complex MCP server and currently, it only supports HTTP SSE due to some OS-level permission issues. If it was an Open Source project, I\\u0027d love to contribute as well :) Beta Was this translation helpful? Give feedback. ... There was an error while loading.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://github.com/orgs/modelcontextprotocol/discussions/16\",\"search_provider\":\"anthropic\"}},{\"type\":\"knowledge\",\"title\":\"Integrating MCP Servers for Web Search with Claude Code | IntuitionLabs\",\"url\":\"https://intuitionlabs.ai/articles/mcp-servers-claude-code-internet-search\",\"metadata\":{\"type\":\"webpage_metadata\",\"site_domain\":\"intuitionlabs.ai\",\"favicon_url\":\"https://www.google.com/s2/favicons?sz=64\\u0026domain=intuitionlabs.ai\",\"site_name\":\"IntuitionLabs\"},\"is_missing\":false,\"text\":\"When Claude Code is connected to such a server, you could ask: \\u201CPlease analyze @github:issue://123 and suggest a fix,\\u201D and Claude will fetch the issue content via MCP. Claude Code\\u0026#x27;s use of MCP: Claude Code simplifies integrating these servers.\\n\\nOverview: The Model Context Protocol (MCP) is an open standard that connects AI assistants with external tools and data sources in a uniform way. In essence, MCP acts like a \\u0022USB-C port\\u0022 for AI applications, allowing models like Anthropic\\u0027s Claude to plug into various services (databases, file systems, web APIs, etc.) through MCP servers. Claude Code \\u2013 Anthropic\\u0027s agentic coding assistant that runs in your terminal \\u2013 can function as an MCP client, connecting to multiple MCP servers to extend its capabilities beyond code generation. By configuring MCP servers in Claude Code, you enable Claude to perform actions such as searching the internet, browsing files, querying databases, and more, all via a standardized interface. Claude Code supports HTTP transport (the recommended method for remote servers), streaming Server-Sent Events (SSE, now deprecated in favor of HTTP), and local process (stdio) MCP connections for real-time data flow, and includes user safeguards (e.g.\\n\\nAn MCP server wraps an external service or data source behind a common protocol (with defined actions, or \\u201Ctools\\u201D), while an MCP client (like Claude Code or other AI agent frameworks) connects to the server to invoke those tools. In practice, MCP servers expose resources (which Claude can reference via an @server:resource syntax in prompts) and tools (operations Claude can call, often via special \\u201Cslash\\u201D commands). For example, a GitHub MCP server might expose repository files as resources and provide tools like list_prs or open_issue. When Claude Code is connected to such a server, you could ask: \\u201CPlease analyze @github:issue://123 and suggest a fix,\\u201D and Claude will fetch the issue content via MCP. Claude Code\\u0027s use of MCP: Claude Code simplifies integrating these servers. You can add servers via the CLI (claude mcp add \\u2026) or config files, with support for three transport types: HTTP (recommended for remote servers), SSE (deprecated), and stdio (for local processes).\\n\\nFor most users experimenting with Claude Code, Brave Search MCP offers a sweet spot of reliability and zero-cost operation, essentially giving Claude a safe browsing capability \\u2013 now with additional features like local search, image/video/news search, and AI-powered summarization. Free open-source tools like Open-WebSearch MCP are fantastic and cost-free, but require a bit more hands-on maintenance and have inherent limitations (due to scraping). In professional settings where up-to-the-minute information is crucial, Perplexity\\u0027s Sonar API through the official MCP server can dramatically improve Claude\\u0027s usefulness by delivering verified, cited answers with transparent, competitive pricing. And for heavy-duty data gathering tasks or enterprise agents, Bright Data\\u0027s MCP stands out as the comprehensive solution built to scale with your needs \\u2013 achieving the highest success rate (76.8%) in 2026 benchmarks and now offering a free tier to get started. With 2026\\u0027s updates \\u2013 including MCP Too\\n\\nAI-Powered Search Engines: A new category of search, exemplified by Perplexity\\u2019s Sonar API, blends large language models with live web data. The Perplexity Ask MCP server (developed by the Perplexity team and open-sourced) allows Claude to delegate a question to Perplexity\\u2019s backend. Perplexity\\u2019s model will perform its own multi-step search on the internet and return a synthesized answer with cited sources. Essentially, Claude can leverage Perplexity as an agent to do research on its behalf. The upside is that the returned information is already summarized and contextualized \\u2013 often saving tokens and time. For example, if you ask Claude (with the Perplexity MCP enabled) a question like \\u201CWhat were the latest findings of the James Webb Telescope?\\u201D, Claude could call the Perplexity tool, which might return a two-paragraph answer citing a NASA press release and a news article from last week.\",\"is_citable\":true,\"prompt_context_metadata\":{\"url\":\"https://intuitionlabs.ai/articles/mcp-servers-claude-code-internet-search\",\"search_provider\":\"anthropic\",\"age\":\"August 4, 2025\"}}],\"is_error\":false,\"structured_content\":null,\"meta\":null,\"message\":null,\"integration_name\":null,\"integration_icon_url\":null,\"icon_name\":\"globe\",\"display_content\":null}"

