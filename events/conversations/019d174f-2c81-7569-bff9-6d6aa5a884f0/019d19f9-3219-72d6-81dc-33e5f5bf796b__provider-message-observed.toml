text = "The pattern I was referring to is often called **event sourcing with document artifacts**, sometimes described as **state capsules** or **event documents**. It’s closely related to the architectural style known as **entity[\"software_architecture\",\"Event Sourcing\",\"software architecture pattern\"]**.\n\nThe key idea is simple but powerful:\n\n> Instead of mutating a database record, you create a new artifact that represents a change in state.\n\nThat artifact becomes part of the **permanent history**.\n\n---\n\n# 1. Traditional mutable state\n\nMost systems work like this:\n\n```\nwasher_status table\n\nmachine | cycle | status\n-------------------------\nwasher1 | heavy | running\n```\n\nWhen something changes, the row is updated.\n\n```\nUPDATE washer_status\nSET status = 'complete'\n```\n\nThe problem:\n\nYou lose the **story of how you got there**.\n\n---\n\n# 2. Event sourcing approach\n\nIn **entity[\"software_architecture\",\"Event Sourcing\",\"software architecture pattern\"]**, you never overwrite state.\n\nInstead you append events.\n\nExample log:\n\n```\n1  washer_started   washer1  heavy\n2  washer_completed washer1\n```\n\nCurrent state is calculated by replaying events.\n\n---\n\n# 3. Document-based event sourcing\n\nNow combine that with the **document-first idea** we talked about.\n\nEach event becomes a **human-readable document**.\n\nExample:\n\n````markdown\n# Washer Cycle Started\n\nHeavy cycle started on washer 1.\n\n---\n\n```toml\n[event]\ntype = \"washer_started\"\nmachine = \"washer1\"\ncycle = \"heavy\"\ntimestamp = 2026-03-04T09:15:00\n```\n````\n\nThat document is a **state capsule**.\n\nIt contains:\n\n- explanation\n- structured event data\n- timestamp\n- context\n\n---\n\n# 4. How the system uses these documents\n\nThe system reads all event documents:\n\n```\nevents/\n   20260304-0915-washer-started.md\n   20260304-1010-washer-completed.md\n```\n\nThen constructs the current state.\n\n```\nwasher1 status = completed\n```\n\nThe database becomes **a projection**, not the canonical source.\n\n---\n\n# 5. Why this is powerful\n\nThis model has several advantages.\n\n### Complete history\n\nYou can reconstruct the system at any time.\n\n```\nstate_at(09:30)\n```\n\n### Human debugging\n\nA developer can literally read the event documents.\n\n### Auditability\n\nNothing is hidden or overwritten.\n\n### Reproducibility\n\nYou can rebuild the system from scratch by replaying events.\n\n---\n\n# 6. Why this connects strongly to your slice idea\n\nYou described a principle earlier:\n\n> replace slices instead of mutating them\n\nEvent sourcing is essentially the same philosophy.\n\nInstead of:\n\n```\nstate = change(state)\n```\n\nYou do:\n\n```\nstate = apply(event)\n```\n\nYour slices could act like **event capsules**.\n\nEach slice:\n\n```\nnarrative\n+\ncanonical TOML state\n```\n\nAnd the system composes them into the overall system state.\n\n---\n\n# 7. Systems that use this philosophy\n\nSeveral modern systems use variations of this idea.\n\nExamples include:\n\n- entity[\"software\",\"Apache Kafka\",\"distributed event streaming platform\"]  \n- entity[\"software\",\"EventStoreDB\",\"event sourcing database\"]  \n- entity[\"software\",\"Temporal\",\"workflow orchestration platform\"]  \n\nThey store **event logs instead of mutable rows**.\n\n---\n\n# 8. The really interesting extension\n\nSome systems push this further:\n\nThe **event artifact itself becomes the canonical system unit**.\n\nMeaning:\n\n```\nsystem = collection of documents\n```\n\nEach document contains:\n\n```\nmeaning\n+\nevent\n+\nstate\n```\n\nWhich is extremely close to what you were describing earlier.\n\n---\n\n# 9. Why AI systems love this format\n\nAI works much better with artifacts that contain:\n\n```\nhuman explanation\n+\nstructured data\n```\n\nPure databases are hard for AI to reason about.\n\nBut document artifacts are easy to interpret.\n\n---\n\n✅ The interesting thing is that the architecture you’re circling around — **document slices that replace state rather than mutate it** — is actually very aligned with some modern distributed system thinking.\n\nYou’re essentially describing a **human-readable event-sourced system**.\n\n---\n\nIf you want, I can also show you something **really interesting that happens when you combine this idea with Git-style storage**.  \n\nThat combination produces a system that behaves almost like a **version-controlled operating system for state**, which might resonate strongly with your Nexus concept."

