text = "The system I was referring to is closest to **notebook-style documents**, especially things like **entity[\"software\",\"Jupyter Notebook\",\"interactive computing environment\"]** and the newer document system **entity[\"software\",\"Quarto\",\"scientific and technical publishing system\"]**.\n\nThese combine **narrative text + structured code + data results** in a single document.\n\nThey’re widely used in the data and research world because they make documents **both human-readable and machine-executable**.\n\n---\n\n# The core idea: executable documents\n\nA notebook document contains multiple types of blocks:\n\n1. **Narrative text** (usually Markdown)\n2. **Code blocks**\n3. **Output blocks**\n\nExample structure:\n\n````markdown\n# Washer Usage Analysis\n\nWe want to record when a washer cycle begins.\n\n```sql\nSELECT machine_id, cycle, timestamp\nFROM washer_events\nWHERE cycle = 'heavy';\n```\n\nOutput:\n\nwasher-1 | heavy | 2026-03-04 09:15\n````\n\nHumans read the explanation.\n\nMachines execute the code.\n\n---\n\n# How Jupyter documents are structured\n\nInternally, a **entity[\"software\",\"Jupyter Notebook\",\"interactive computing environment\"]** file is actually stored as **entity[\"data_format\",\"JSON\",\"data interchange format\"]**, but the user never has to look at it directly.\n\nThe notebook interface shows it as:\n\n- Markdown cells\n- Code cells\n- Results\n\nSo the **human view is clean**, while the machine representation stays structured.\n\n---\n\n# Why Quarto is interesting\n\n**entity[\"software\",\"Quarto\",\"scientific and technical publishing system\"]** improves on notebooks by making them **plain text files**.\n\nExample Quarto document:\n\n````markdown\n---\ntitle: Washer Events\nformat: html\n---\n\n# Washer Cycle Start\n\nHeavy cycle started on washer 1.\n\n```sql\nSELECT * FROM washer_events\nWHERE machine = 'washer-1'\n```\n````\n\nQuarto can run the SQL or Python and generate:\n\n- reports\n- dashboards\n- documentation\n- websites\n\n---\n\n# Why this model became popular\n\nIt solves a big problem:\n\nTraditional systems separate:\n\n| Documentation | Code | Data |\n|---|---|---|\nWiki | scripts | database |\n\nNotebook systems combine them:\n\n| Narrative | Execution | Data |\n|---|---|---|\nMarkdown | code | results |\n\nEverything lives together.\n\n---\n\n# Why this might be interesting for your Nexus concept\n\nYou’ve been describing something like:\n\n**human-readable slices + canonical machine state**\n\nNotebook-style documents hint at a similar architecture.\n\nImagine a slice file like:\n\n````markdown\n# Washer Cycle Started\n\nThe washer started a heavy cycle.\n\n```toml\n[event]\ntype = \"wash_started\"\nmachine = \"washer-1\"\ncycle = \"heavy\"\ntimestamp = 2026-03-04T09:15:00\n```\n\n```sql\nINSERT INTO washer_events VALUES (...)\n```\n````\n\nOne document contains:\n\n- explanation\n- canonical state\n- system action\n\n---\n\n# Why this approach is powerful\n\nThis style produces artifacts that are:\n\n- readable by humans\n- executable by machines\n- version-control friendly\n- auditable\n- AI-friendly\n\nThat last one is becoming increasingly important.\n\nAI systems actually perform **much better with mixed narrative + structured data** than with pure data formats.\n\n---\n\n# A deeper architectural connection\n\nYour **“replace slices instead of mutating state”** idea fits extremely well with **document-based state**.\n\nEach slice document could represent:\n\n```\nstate snapshot\n+\nevent\n+\nexplanation\n```\n\nWhich makes debugging and reasoning much easier than opaque database mutations.\n\n---\n\nIf you're interested, there’s actually **one more format that might be even closer to what you're intuitively designing**.\n\nIt’s basically **Markdown that compiles into structured data schemas** and is used in some advanced documentation-driven systems.  \nAnd it has a concept that might align almost perfectly with your **canonical substrate idea**."

