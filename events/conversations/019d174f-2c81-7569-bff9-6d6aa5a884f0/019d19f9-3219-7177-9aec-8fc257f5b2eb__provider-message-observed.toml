text = "The format I was referring to is **entity[\"file_format\",\"Org mode\",\"plain text document format\"]**, commonly used inside **entity[\"software\",\"GNU Emacs\",\"text editor\"]**.\n\nIt’s one of the closest real-world examples of **human-first documents that also contain structured machine-readable data**.\n\nAnd interestingly, it predates many modern “Markdown + data” ideas.\n\n---\n\n# What Org Mode is\n\nOrg Mode is a **plain text document system** that combines:\n\n- documentation\n- structured data\n- task management\n- executable code blocks\n- metadata\n\nAll in **one readable file**.\n\nExample:\n\n```\n* Laundry Event\n\nHeavy cycle started on washer 1.\n\n** Machine\n:machine-id: washer-1\n:cycle: heavy\n\n** Timestamp\n:timestamp: 2026-03-04T09:15:00\n```\n\nHumans read it easily.\n\nMachines can parse the structured fields.\n\n---\n\n# Why it's interesting architecturally\n\nOrg files have **clear hierarchical structure**.\n\nExample:\n\n```\n* Washer System\n** Washer 1\n*** Event\n```\n\nMachines can interpret that hierarchy.\n\nThat makes it more structured than **entity[\"file_format\",\"Markdown\",\"lightweight markup language\"]**, which is intentionally loose.\n\n---\n\n# Org Mode also supports structured blocks\n\nExample:\n\n```\n* Event\n\nHeavy cycle started.\n\n#+begin_src toml\nmachine = \"washer-1\"\ncycle = \"heavy\"\n#+end_src\n```\n\nThis is similar to the **Markdown + TOML block idea you described**.\n\n---\n\n# Even more interesting: tables that behave like spreadsheets\n\nOrg tables are very structured.\n\nExample:\n\n```\n| Machine  | Status  | Cycle |\n|----------|---------|-------|\n| washer-1 | running | heavy |\n| washer-2 | idle    | none  |\n```\n\nMachines can read these tables directly.\n\nThey can even run formulas.\n\n---\n\n# Why Org Mode never became universal\n\nDespite being extremely powerful:\n\n- it is strongly tied to **entity[\"software\",\"GNU Emacs\",\"text editor\"]**\n- many developers prefer simpler tools\n- **Markdown became the web standard**\n\nBut conceptually, Org Mode is **very advanced**.\n\n---\n\n# How this relates to your idea\n\nYour instinct seems to be something like:\n\n**Human-first document**\n\n```\nNarrative\nExplanation\nContext\n```\n\n**Machine specification**\n\n```\nStructured block (TOML)\n```\n\nThat pattern is actually extremely similar to how Org Mode works.\n\n---\n\n# Another modern approach close to your thinking\n\nSome systems use **Markdown + embedded structured data blocks**, like this:\n\n````markdown\n# Washer Event\n\nHeavy cycle started.\n\n```toml\n[event]\ntype = \"wash_started\"\nmachine = \"washer-1\"\ncycle = \"heavy\"\ntimestamp = 2026-03-04T09:15:00\n```\n````\n\nThat design has some nice properties:\n\n- human readable\n- machine extractable\n- version-control friendly\n- AI-friendly\n\n---\n\n# One more interesting architectural idea\n\nIf your **Nexus slices** are documents like this, each slice could be:\n\n```\nNarrative explanation\n+\nCanonical TOML state\n```\n\nMachines read the TOML.\n\nHumans read the document.\n\nAnd because your architecture uses **slice replacement instead of mutation**, each document could represent a **complete state unit**.\n\nThat is actually a very elegant model.\n\n---\n\nIf you're interested, there's also a **very modern system used in the data world that combines Markdown, SQL, metadata, and execution in one document**.  \n\nIt’s conceptually similar but designed for **data pipelines**, and it might spark ideas for how to structure **event slices** in Nexus."

