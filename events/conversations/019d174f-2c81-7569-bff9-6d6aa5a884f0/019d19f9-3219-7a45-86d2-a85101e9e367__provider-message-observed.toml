text = "Good questions — these sit at the intersection of **configuration formats vs documentation formats**, which matters when designing systems.\n\nI'll break it into two parts:\n\n1. **INI vs TOML**\n2. **Markdown as machine-readable data**\n\n---\n\n# 1. INI vs TOML\n\nentity[\"file_format\",\"INI file\",\"configuration file format\"] is one of the **oldest configuration formats**. It dates back to Windows configuration files.\n\nExample INI:\n\n```\n[database]\nhost=localhost\nport=5432\nuser=admin\n```\n\n---\n\n## What INI supports\n\nBasic structure:\n\n- sections\n- key/value pairs\n\n```\n[section]\nkey=value\n```\n\nThat's basically it.\n\n---\n\n## Limitations of INI\n\nThe problem is that **there is no universal standard**.\n\nDifferent parsers interpret things differently.\n\nExample:\n\n```\nenabled=true\n```\n\nCould become:\n\n- string `\"true\"`\n- boolean `true`\n\ndepending on the parser.\n\nINI also lacks:\n\n- arrays\n- nested objects\n- clear typing\n\nExample problem:\n\n```\nservers=web1,web2,web3\n```\n\nIs that:\n\n- one string?\n- an array?\n\nThe parser has to guess.\n\n---\n\n## TOML was designed to fix INI\n\nentity[\"file_format\",\"TOML\",\"configuration language\"] is basically **INI evolved into a formal specification**.\n\nExample TOML:\n\n```\n[database]\nhost = \"localhost\"\nport = 5432\nenabled = true\n\nservers = [\"web1\", \"web2\", \"web3\"]\n```\n\nTOML adds:\n\n- explicit types\n- arrays\n- nested tables\n- consistent parsing rules\n\n---\n\n## Side-by-side comparison\n\n| Feature | INI | TOML |\n|---|---|---|\nSpecification | Loose | Strict spec |\nData types | Mostly strings | Typed |\nArrays | Not standard | Built-in |\nNested structures | Hacky | Native |\nComments | Yes | Yes |\nAmbiguity | High | Low |\n\n---\n\n## A useful mental model\n\nYou can think of TOML as:\n\n**INI + JSON structure + predictable typing**\n\nThis is why projects like:\n\n- entity[\"software\",\"Cargo\",\"Rust package manager\"]\n- entity[\"software\",\"Poetry\",\"Python dependency manager\"]\n\nuse TOML instead of INI.\n\n---\n\n# 2. How machine-readable is Markdown?\n\nentity[\"file_format\",\"Markdown\",\"lightweight markup language\"] is fundamentally **not a data format**.\n\nIt is a **document format**.\n\nExample:\n\n```\n# User\n\nName: Alice  \nAge: 30\n```\n\nA machine can read this, but it has **no formal structure**.\n\nA parser cannot reliably extract data without guessing.\n\n---\n\n## Why Markdown is hard for machines\n\nMarkdown has:\n\n- no schema\n- no strict structure\n- many dialects\n\nFor example:\n\n```\n## Users\n\n- Alice\n- Bob\n```\n\nIs that:\n\n- a list?\n- data?\n- documentation?\n\nMachines can't know.\n\n---\n\n# Markdown *can* contain structured data\n\nMany systems embed data inside Markdown.\n\n### Tables\n\n```\n| Name | Age |\n|-----|-----|\n| Alice | 30 |\n| Bob | 25 |\n```\n\nMachine-readable, but still fragile.\n\n---\n\n### YAML front matter\n\nVery common in static sites.\n\nExample:\n\n```\n---\ntitle: My Post\nauthor: Alice\ndate: 2026-03-04\n---\n\n# Article\n```\n\nThis uses **entity[\"file_format\",\"YAML\",\"data serialization language\"] inside Markdown.\n\nUsed by tools like:\n\n- entity[\"software\",\"Hugo\",\"static site generator\"]\n- entity[\"software\",\"Jekyll\",\"static site generator\"]\n\n---\n\n### Code blocks with JSON/TOML\n\nExample:\n\n````markdown\n```json\n{\n  \"name\": \"Alice\"\n}\n```\n````\n\nThe Markdown itself isn't structured — the **embedded format is**.\n\n---\n\n# Machine-readability spectrum\n\nThink of formats like this:\n\n| Format | Machine readability |\n|---|---|\nCSV | High |\nJSON | Very high |\nTOML | High |\nYAML | High but ambiguous |\nINI | Medium |\nMarkdown | Low |\n\nMarkdown is meant for:\n\n- humans\n- documentation\n- publishing\n\nNot data storage.\n\n---\n\n# Why Markdown still gets used in systems\n\nDevelopers like it because it combines:\n\n- **human readability**\n- **version control friendliness**\n- **documentation**\n\nFor example systems like:\n\n- entity[\"software\",\"Obsidian\",\"knowledge management app\"]\n- entity[\"software\",\"Notion\",\"productivity software\"]\n- entity[\"software\",\"GitHub\",\"developer platform\"]\n\nstore information as Markdown.\n\nBut internally they still convert it into **structured data models**.\n\n---\n\n# A design insight relevant to your Nexus thinking\n\nMany systems eventually separate:\n\n### Human layer\nMarkdown / docs / specs\n\n### Configuration layer\nTOML / YAML\n\n### System layer\nJSON / binary / events\n\nEach layer optimizes for a different purpose.\n\n---\n\nIf you'd like, there's also a **very interesting hybrid format** that sits between Markdown and JSON that some knowledge systems use.  \n\nIt actually maps surprisingly well to **event logs and canonical state systems**, which is very close to what you're building with Nexus."

