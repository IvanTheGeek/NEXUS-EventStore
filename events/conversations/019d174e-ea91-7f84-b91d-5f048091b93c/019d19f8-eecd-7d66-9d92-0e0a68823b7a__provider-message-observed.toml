[[body.segments]]
kind = "reasoning"
text = "The user is asking about what the TOML files for `ui.visual` and `ui.interaction` subgraphs might look like. These are subgraph-level definitions, distinct from the per-slice GWT blocks we just looked at. Let me think about what these would contain.\n\nThe subgraph files would define the primitives/vocabulary that the slices reference — component library, design tokens, interaction patterns, etc.\n\nActually, I need to think about this more carefully. The question is about what the subgraph *definition* files look like vs the slice files. Or are they asking about standalone TOML files for the subgraphs themselves?\n\nIn NEXUS, the hierarchy is Domain > System > Model > Context > Construct, with filesystem structure carrying that hierarchy. \n\nSo the subgraphs are concern-based layers within slices, but there could also be subgraph-level definition files that establish the shared vocabulary and primitives used across all slices in that subgraph — things like design tokens, component registries for ui.visual, or gesture and signal libraries for ui.interaction. These would be distinct from the per-slice GWT blocks that reference them.\n\nThe user is specifically asking what dedicated TOML files for ui.visual and ui.interaction would look like, so I should sketch out what those might contain — design tokens and component definitions for ui.visual, gesture definitions and state machine patterns for ui.interaction — but present this as a proposal since Ivan is still developing the system, and I should probably ask a clarifying question about whether subgraphs actually have their own definition files or if the structure just emerges from the facet fields in slice blocks."

[[body.segments]]
kind = "plain_text"
text = "Good question — and honestly this is territory NEXUS hasn't fully specified yet. Let me separate what's clear from what needs a decision.\n\n---\n\n### What's Already Clear\n\nThe per-slice GWT blocks with `facet = \"ui.visual\"` are defined. Those reference vocabulary — component names, signal names — but that vocabulary has to be *defined somewhere*.\n\nThe open question is: **do subgraphs have their own definition files, or does the vocabulary emerge purely from slice aggregation?**\n\n---\n\n### Two Options\n\n**Option A: Emergent only**\nNo dedicated subgraph files. The graph builder reads all slices, collects all `ui.visual` GWT facts, and the component/signal vocabulary emerges from that aggregation. No separate file needed.\n\n**Option B: Subgraph definition files**\nDedicated TOML files define shared vocabulary that slices reference. Acts like a schema or registry.\n\n---\n\n### What Option B Might Look Like\n\n**`ui.visual.toml`**\n```toml\n[subgraph]\nname = \"ui.visual\"\ntier = \"presentation\"\n\n[[component]]\nname = \"ExpenseCard\"\nvariants = [\"default\", \"highlighted\"]\nstates = [\"loaded\", \"empty\"]\n\n[[component]]\nname = \"EmptyState\"\nvariants = [\"default\"]\n\n[[token]]\nname = \"color.primary\"\nvalue = \"#2D6A4F\"\n\n[[token]]\nname = \"spacing.base\"\nvalue = \"8px\"\n```\n\n**`ui.interaction.toml`**\n```toml\n[subgraph]\nname = \"ui.interaction\"\ntier = \"presentation\"\n\n[[signal]]\nname = \"OpenLogExpense\"\ngesture = \"tap\"\norigin = \"ui.visual\"\nbecomes = \"Intent\"\n\n[[signal]]\nname = \"ViewExpenseDetail\"\ngesture = \"tap\"\norigin = \"ui.visual\"\nbecomes = \"Intent\"\n\n[[pattern]]\nname = \"BottomSheetOpen\"\ntrigger = \"Signal(OpenLogExpense)\"\ntransition = \"slide-up\"\n```\n\n---\n\n### My Lean\n\nOption B is more useful because:\n\n- ATLAS needs a component registry to render the Penpot lens\n- FORGE needs the signal→Intent mapping to compile event handlers\n- The vocabulary needs a home that isn't buried in individual slices\n\nBut the definition files should be **thin** — vocabulary and tokens only. No behavior. Behavior stays in slice GWT blocks.\n\n---\n\n### The Open Decision\n\nDoes this match your intuition, or do you see the subgraph files serving a different purpose?"

