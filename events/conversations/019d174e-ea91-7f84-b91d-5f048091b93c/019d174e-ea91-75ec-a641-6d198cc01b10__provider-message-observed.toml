kind = "plain_text"
text = "Two distinct pipelines — let me separate them cleanly.\n\n---\n\n### Pipeline 1: Penpot → HTML/CSS/JS\n\n```\nPenpot (designer works here)\n    ↓ LOGOS ingests changes → ui.visual Facts updated\nNEXUS graph (SoT)\n    ↓ FORGE compiles ui.visual → running artifacts\nHTML / CSS / JS / Bolero\n```\n\nThe \"match\" between Penpot and the running output is **guaranteed by derivation** — both come from the same Facts. You're not matching Penpot to HTML directly, you're ensuring both are faithful projections of the same model. The functional transformation pipeline is FORGE, yes.\n\n---\n\n### Pipeline 2: AI-Assisted Design → Model → Penpot\n\n```\nAI proposes ui.visual Facts (components, layout, states)\n    ↓ LOGOS reviews/approves → Facts written to model\nNEXUS graph (SoT updated)\n    ↓ ATLAS renders ui.visual with Penpot lens\nPenpot (updated to reflect new Facts)\n```\n\nThis is **ATLAS**, not FORGE. ATLAS is the rendering/lens layer. FORGE only goes one direction: model → running artifacts. ATLAS goes model → any view — including Penpot.\n\n---\n\n### The Clean Separation\n\n| Direction | Who does it |\n|---|---|\n| Model → Penpot | ATLAS (Penpot lens) |\n| Penpot changes → Model | LOGOS (ingestion) |\n| Model → HTML/CSS/JS | FORGE (compiler) |\n| AI design assist | ATLAS + LOGOS together |\n\n---\n\n### What Makes This Work\n\nThe Penpot lens in ATLAS needs to know how to translate ui.visual Facts into Penpot's component/frame structure. That's where the functional pipeline lives — and it's a candidate for a defined transformation rule set, same as FORGE's rules but targeting Penpot's format instead of HTML.\n\nSo you'd have:\n\n- **FORGE rules**: `ViewSlice → Bolero component`\n- **ATLAS Penpot rules**: `ui.visual Facts → Penpot component/frame`\n\nBoth refineable over time. Both deterministic. Different targets, same principle."

