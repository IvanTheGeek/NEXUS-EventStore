[[body.segments]]
kind = "reasoning"
text = "Ivan is asking where the ui.visual GWT facts live. Looking at the TOML slice example I showed earlier, the `[[projector.gwt]]` blocks with `facet = \"ui.visual\"` are inside the ViewSlice TOML file. So the ui.visual GWT facts live in the slice files themselves - not in a separate ui.visual.toml.\n\nThe question is essentially pointing out: the ui.visual GWT blocks are already in the slice TOML files. So Option B's separate subgraph definition file would only contain vocabulary/tokens/components - not GWT facts. The GWT facts are already in the slices.\n\nThis is a sharp observation - he's checking my reasoning."

[[body.segments]]
kind = "plain_text"
text = "They're in the **slice TOML files** — the `[[projector.gwt]]` blocks with `facet = \"ui.visual\"` that we defined earlier.\n\n```toml\n[[projector.gwt]]\nfacet = \"ui.visual\"\ngiven = [\"RecentExpensesSummary\"]\nwhen = [\"map expenses to ExpenseCard components\", \"show EmptyState if none\"]\nthen = \"RecentExpensesScreen\"\n```\n\nThat's the ui.visual GWT fact for the `RecentExpenses` slice. It lives in the slice, not in a subgraph file.\n\n---\n\n### What This Means for Option B\n\nThe subgraph definition file wouldn't contain GWT facts — those are already owned by slices. So Option B's `ui.visual.toml` would only hold:\n\n- Component registry (vocabulary the GWT blocks reference)\n- Design tokens\n- Nothing behavioral\n\nWhich raises the question: is that thin registry file worth having as a separate artifact, or does the graph builder just collect component names by scanning all `facet = \"ui.visual\"` GWT blocks across all slices and inferring the registry?\n\n---\n\n### The Tension\n\n**Separate file** → explicit registry, ATLAS/FORGE have a clear lookup table, but you're maintaining it manually in sync with slice vocabulary.\n\n**Emergent** → graph builder derives the registry from slices, single SoT, but ATLAS and Penpot have no component definitions until the graph is built.\n\nDesign tokens probably need an explicit home regardless. Component registry could go either way."

