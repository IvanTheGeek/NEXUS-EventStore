kind = "plain_text"
text = "Yes — and that's not coincidental. It's pointing at something real.\n\n---\n\n### The Isomorphism\n\nF# pattern matching is:\n- Structural decomposition of a value\n- Exhaustive by default\n- Guards for additional constraints\n- Each arm produces a result\n\nYour rule `match` is exactly that — decompose a graph node/subgraph, guard on properties, emit a result.\n\n---\n\n### The Natural Implication\n\nFORGE rules *are* F# match arms — the TOML is just a **human-readable notation** for what compiles directly to:\n\n```fsharp\nmatch fact with\n| Component { Type = \"EmptyState\" } ->\n    BoleroConditional { binding = \"isEmpty\"; children = ... }\n| Component { Type = \"ExpenseCard\"; Variants = vs } ->\n    BoleroComponent { name = \"ExpenseCard\"; variants = vs }\n| _ ->\n    Unknown\n```\n\nThe TOML rule is the authored artifact. The F# match expression is the compiled artifact. Same semantics, different notation.\n\n---\n\n### What This Means for FORGE\n\nFORGE's compiler is itself just a **pattern matcher over Facts**. Which means:\n\n- Rules are match arms\n- The rule registry is a match expression\n- Adding a rule = adding an arm\n- Exhaustiveness checking = FORGE knows when a Fact has no rule\n\nThat last one is valuable — FORGE can detect unmatched Facts and surface them as gaps, same as F# warns on incomplete matches.\n\n---\n\n### The Elegant Closure\n\n```\nNEXUS Facts (graph)\n    ↓ described in TOML\nRule Facts (match arms in TOML notation)\n    ↓ FORGE compiles rules to F#\nF# match expression\n    ↓ applied to Facts\nRunning artifacts\n```\n\nThe rules aren't a separate system bolted on — they're Facts that happen to describe transformations, compiled to the language FORGE already speaks."

