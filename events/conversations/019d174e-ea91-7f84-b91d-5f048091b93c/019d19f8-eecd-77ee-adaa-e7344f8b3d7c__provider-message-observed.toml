text = "The memory is the same - I need to update it to reflect that CORTEX is applicable to all areas, not just LOGOS. Let me rephrase the memory properly."

[[body.segments]]
kind = "plain_text"
text = "The memory is already correct on that point. The real correction is conceptual:\n\n---\n\n### CORTEX Across the Full Cycle\n\n```\nLOGOS  — CORTEX mines, surfaces insights, identifies candidate Facts\nATLAS  — CORTEX proposes models, suggests slice patterns, identifies gaps\nFORGE  — CORTEX discovers transformation rules, detects unmatched Facts\nPAXUS  — CORTEX observes runtime behavior, surfaces anomalies, feeds signals back\n```\n\nCORTEX isn't a LOGOS feature. It's the **intelligence that runs through the entire cycle** — a participant at every stage, not a preprocessor at the intake stage.\n\n---\n\n### The Distinction\n\nLOGOS is a *source*. CORTEX is a *capability*. They're orthogonal:\n\n| | Without CORTEX | With CORTEX |\n|---|---|---|\n| LOGOS | Facts accumulate | Facts are mined, surfaced, connected |\n| ATLAS | Human models manually | CORTEX proposes, human approves |\n| FORGE | Human discovers rules | CORTEX suggests rules, human approves |\n| PAXUS | Logs and metrics | CORTEX interprets patterns, flags issues |\n\nThe Prime Directive holds everywhere — CORTEX assists at each stage but the approval gate is always human. The cycle doesn't change shape, CORTEX just makes every stage smarter."

