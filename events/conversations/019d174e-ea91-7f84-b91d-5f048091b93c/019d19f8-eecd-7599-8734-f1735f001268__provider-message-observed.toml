[[body.segments]]
kind = "reasoning"
text = "Good question. GWT is designed for behavior — given a state, when something happens, then a result. Transformation rules are different — they're pattern matching and structural transformation. Let me think about what format would suit them.\n\nGWT could work for simple cases but might be awkward for structural transformation rules. Let me think about what a transformation rule actually needs:\n\n1. A pattern to match against (subgraph pattern)\n2. A transformation to apply\n3. An output shape\n\nThis is more like a **rewrite rule** — pattern → transform → output. Could model as GWT but the semantics are different:\n- `given` = input pattern to match\n- `when` = transformation steps\n\n\n- `then` = output shape\n\nThat actually maps reasonably well, though a more specialized format might feel more natural. For FORGE rules specifically, I'm dealing with structural transformation — matching graph patterns and emitting code or markup. This is closer to term rewriting systems or compiler rewrite rules than behavior testing. A dedicated format could capture the intent more clearly with explicit sections for matching patterns, transformation steps, and the final output shape.\n\nBut thinking about it more, GWT still works if I frame it as: `given` = the pattern in the model, `when` = the transformation pipeline, `then` = the emitted artifact. The main difference is these are structural transformations rather than event-driven state changes. GWT keeps things consistent across the codebase, though a dedicated `match/transform/emit` block might be cleaner and more explicit for this use case. I should probably get Ivan's take on which direction feels right."

[[body.segments]]
kind = "plain_text"
text = "Good question — GWT *could* work but the semantics are slightly different. Worth examining both.\n\n---\n\n### Where GWT Fits\n\nGWT is designed for **behavioral slices** — event-driven state changes. The pipeline semantics map well to transformation too:\n\n```toml\n[[rule.gwt]]\ngiven = [\"ViewSlice with EmptyState component\"]\nwhen = [\"wrap in conditional\", \"bind to isEmpty predicate\"]\nthen = \"BoleroConditionalComponent\"\n```\n\nConsistent with everything else. Same tooling reads it.\n\n---\n\n### Where It Strains\n\nTransformation rules are **structural pattern matching**, not behavior. The `given` isn't an event stream — it's a graph pattern. That's a different kind of input, and GWT's behavioral framing might obscure that.\n\n---\n\n### A Dedicated Rule Format\n\n```toml\n[[rule]]\nname = \"EmptyState.Bolero\"\ntarget = \"forge.bolero\"\nmatch = \"ui.visual component where type == EmptyState\"\ntransform = [\"wrap in conditional\", \"bind isEmpty\", \"render children\"]\nemit = \"BoleroConditionalComponent\"\n```\n\n`match` replaces `given` — explicitly a structural pattern, not an event. `emit` replaces `then` — explicitly an artifact shape, not a state.\n\n---\n\n### My Lean\n\n**Dedicated format.** Because:\n\n- `match/transform/emit` signals \"this is a compiler rule\" vs \"this is behavior\"\n- FORGE can distinguish rule Facts from slice Facts by block type\n- The vocabulary is more honest about what's happening\n\nBut the `when` pipeline semantics — ordered transform steps — are worth keeping. That part of GWT generalizes well.\n\nDoes that distinction feel right to you?"

