[[body.segments]]
kind = "reasoning"
text = "Ivan is asking what the NEXUS model might look like for a screen. This is about how a UI screen would be represented in the NEXUS graph/TOML slice schema. Let me think through this carefully.\n\nA screen in NEXUS terms would be a ViewSlice - it's a projection. The screen renders what the user sees given current facts. Let me think about what the TOML would look like, and what the graph primitives are.\n\nFor LaundryLog, let's take the `CurrentLocation` screen as a concrete example, or maybe the `RecentExpenses` screen.\n\nA screen is a ViewSlice. The TOML schema for ViewSlice is:\n\n\n`origins → projector → view → [[projector.gwt]]`\n\nThe screen has visual components that get rendered, interaction points that signal across boundaries, and state that reads from facts. I'm thinking about how this spans multiple subgraphs - the event stream that folds raw events into current state, the business domain interpretation, the UI visual layer with components and layout, and the interaction layer defining what's possible. Each of these would have their own GWT block as a facet within the screen model.\n\nNow I'm sketching out what this looks like concretely for `RecentExpenses` - setting up the TOML structure with origins, projector, and view sections, then defining the facets that handle the mechanical event folding, domain logic...\n\nDefining the facets...\n\nActually, let me reconsider how the screen should work here.\n\nThe whole screen is really a ViewSlice, but I'm realizing that component definitions might be their own Facts within the ui.visual facet rather than being embedded in the screen definition itself. A screen slice would then reference those component Facts and describe how the data maps to a visual layout. For interactions, the ui.interaction subgraph defines what signals can fire from the screen and what Commands they trigger.\n\nSo when thinking about the full model for a screen, I need to consider the ViewSlice TOML as the core, how it spans across different faceted subgraphs, what Facts flow in and what Signals flow out, and how all these pieces connect together.\n\nNow let me walk through RecentExpenses as a concrete example since it's the most complex screen in LaundryLog."

[[body.segments]]
kind = "plain_text"
text = "Good concrete question. Let me work through it with `RecentExpenses` as the example.\n\n---\n\n### A Screen Is a ViewSlice Spanning Multiple Subgraphs\n\nThe TOML is one file, but the GWT blocks are per-facet — each subgraph describes a different concern of the same screen.\n\n```toml\n[origins]\nnone = \"NoScreen\"\n\n[projector]\nid = \"01J...\"\nname = \"RecentExpenses\"\nactor = \"Human\"\n\n[view]\nname = \"RecentExpensesView\"\n\n# ── event.stream ─────────────────────────────\n[[projector.gwt]]\nfacet = \"event.stream\"\ngiven = [\"LaundryExpenseLogged\"]\nwhen = [\"fold into expense list\", \"sort by timestamp desc\"]\nthen = \"ExpenseList\"\n\n# ── business.emd ─────────────────────────────\n[[projector.gwt]]\nfacet = \"business.emd\"\ngiven = [\"ExpenseList\"]\nwhen = [\"filter within last 3 hours\", \"compute running total\"]\nthen = \"RecentExpensesSummary\"\n\n# ── ui.visual ────────────────────────────────\n[[projector.gwt]]\nfacet = \"ui.visual\"\ngiven = [\"RecentExpensesSummary\"]\nwhen = [\"map expenses to ExpenseCard components\", \"show EmptyState if none\"]\nthen = \"RecentExpensesScreen\"\n\n# ── ui.interaction ───────────────────────────\n[[projector.gwt]]\nfacet = \"ui.interaction\"\ngiven = [\"RecentExpensesScreen\"]\nwhen = [\"tap card → Signal(ViewExpenseDetail)\", \"tap add → Signal(OpenLogExpense)\"]\nthen = \"InteractiveRecentExpensesScreen\"\n```\n\n---\n\n### What the Graph Edges Look Like\n\n```\nLaundryExpenseLogged (Fact)\n        │ event.stream reads\n        ▼\n   ExpenseList (Fact)\n        │ business.emd interprets\n        ▼\nRecentExpensesSummary (Fact)\n        │ ui.visual shapes\n        ▼\nRecentExpensesScreen (Fact)\n        │ ui.interaction adds signals\n        ▼\n   Signal(OpenLogExpense) ──→ crosses boundary ──→ Intent: LogExpense\n```\n\nEach layer feeds the next. Toggle off `ui.visual` and you still have the business summary. Toggle off `business.emd` and you have the raw list. The facts underneath don't change.\n\n---\n\n### What Penpot Sees\n\nATLAS renders `ui.visual` with the Penpot lens — it sees `ExpenseCard`, `EmptyState`, `RecentExpensesScreen` as named components with states. The visual facts are already there in the model; Penpot just renders them into design tool form.\n\n---\n\n### What FORGE Sees\n\nFORGE reads the full slice and compiles:\n- `event.stream` GWT → F# projection fold\n- `business.emd` GWT → filtering/aggregation logic  \n- `ui.visual` GWT → Bolero component tree\n- `ui.interaction` GWT → event handlers and command dispatch\n\nOne slice, four transformation rules, one running screen.\n\n---\n\n### The Key Insight\n\nThe screen isn't a single thing — it's a **stack of concerns over the same Facts**, each independently toggleable and each compilable by a different part of FORGE. The TOML is just the notation for that stack."

