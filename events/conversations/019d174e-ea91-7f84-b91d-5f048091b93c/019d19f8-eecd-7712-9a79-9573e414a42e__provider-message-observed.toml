text = "Added memory #16: NEXUS Prime Directive: Human is ultimate authority. AI (CORTEX) is a powerful collaborator — assists, surfaces, suggests, compiles — but every approval gate, every Fact promotion, every rule acceptance requires human decision. AI accelerates; human governs."

[[body.segments]]
kind = "plain_text"
text = "---\n\n### CORTEX as an Analytical Engine\n\nThe mining/analysis role gives CORTEX a specific function in the cycle — it's not just reactive (answer a question) but **proactive**:\n\n```\nLOGOS grows continuously\n    ↓ CORTEX mines periodically or on trigger\nSurfaces:\n  ├── Emerging topic clusters (gravity wells forming)\n  ├── Unresolved decision threads across sources\n  ├── Knowledge gaps (Facts referenced but undefined)\n  ├── Contradictions (two sources asserting conflicting Facts)\n  └── Summaries (\"here's what's been established about X\")\n```\n\nThis turns LOGOS from an archive into a **living knowledge surface**. Facts don't just sit there — CORTEX makes them findable and actionable.\n\n---\n\n### The Prime Directive in the Model\n\nThis isn't just philosophy — it has structural expression in NEXUS:\n\n- Every FORGE rule requires human approval before becoming a compiler function\n- Every LOGOS Fact requires human review before entering the graph\n- Approval gates in PATHs (`ApproveScript → ScriptApproved`) are human CommandSlices, not automated\n- CORTEX can *propose* but never *commit*\n\nCORTEX's boundary is precisely the Agent definition — it operates within Ivan's boundary, on Ivan's behalf, but Ivan is the parentId. The authority relationship is in the type system, not just the documentation."

