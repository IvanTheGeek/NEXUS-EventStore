text = "How would translate to the idea that nexus could be applied in other domains. Say video production: ingest OneMarcFiftys videos, transcripts, discord channels, blog posts, also openwrt wiki and other sources. Eventually map the openwrt code base in to software model. Discussions happening the talkyard forum + discord + YouTube comments identity subjects and hot issue areas, eventually a video about x is decided to be made. Script and screenplay are iterated over which include public feedback and insights. When happy with it, Marc approves production, a digital bot Marc is overlaid on the scenes, audio generated and out comes a video ready for YouTube upload."

