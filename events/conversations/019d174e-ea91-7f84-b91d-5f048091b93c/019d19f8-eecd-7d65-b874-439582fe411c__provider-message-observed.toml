[[body.segments]]
kind = "reasoning"
text = "Ivan is asking two related questions:\n1. How are HTML/CSS/JS modeled within NEXUS (if they're not subgraphs of the NEXUS graph)?\n2. How can the NEXUS model read from and export to Penpot?\n\nLet me think through this carefully based on what I know about NEXUS architecture.\n\nHTML/CSS/JS are **artifacts** — they're outputs of FORGE, not model primitives. But NEXUS needs to *describe* what gets compiled into those artifacts. That description lives in the `ui.visual` and `ui.interaction` subgraphs.\n\nSo the modeling question is: what do those subgraphs actually contain?\n\n\nThe `ui.visual` subgraph captures visual intent through layout, components, and states — essentially what Penpot designs represent — while `ui.interaction` models the interaction patterns and signal flows. Penpot becomes the authoring tool for the visual subgraph, and the integration works bidirectionally: Penpot designs feed into NEXUS to populate visual facts, and NEXUS specs can be exported back to Penpot as frames and components.\n\nNow I'm mapping the five NEXUS primitives onto the ui.visual subgraph: Facts are the visual states and design tokens, Interpretations handle how events map to visual changes, Signals represent what crosses the UI boundary, Intents are the commands triggered by interactions, and Actors include both the User and UI components themselves. Penpot files essentially become design artifacts that encode these visual Facts, and the integration involves extracting and syncing between the two representations."

[[body.segments]]
kind = "plain_text"
text = "Good question — these are two distinct things to untangle.\n\n---\n\n### How HTML/CSS/JS Are Modeled in NEXUS\n\nThey aren't modeled directly. They're **artifacts** — outputs of FORGE, not primitives. What *is* modeled is the **intent** that FORGE compiles into those artifacts.\n\nThat intent lives in two subgraphs:\n\n**`ui.visual`** — What should exist visually\n- Facts = component definitions, layout constraints, design tokens, visual states\n- Interpretations = how Projections map to visual state (what the user sees given current facts)\n- Signals = projection updates crossing the boundary into the display layer\n\n**`ui.interaction`** — How the user drives the system\n- Signals = DOM events crossing inward (click, submit, input)\n- Intents = Commands those signals become\n- Actors = Human interacting through the UI surface\n\nFORGE reads those two subgraphs and compiles them into Bolero/HTML/CSS/JS. The browser consumes the compiled artifact. The browser's DOM is a runtime shadow of your ui.visual Facts — same shape, different layer.\n\n---\n\n### How Penpot Fits\n\nPenpot is the **authoring surface for ui.visual**. You established it as dual source of truth — meaning Penpot designs and the NEXUS model should stay synchronized, with Penpot being where visual facts are *authored*.\n\n```\nPenpot (authoring)\n       ↕  ← sync boundary\nui.visual subgraph (NEXUS model)\n       ↓\nFORGE (compiler)\n       ↓\nBolero / HTML / CSS\n```\n\n**Reading from Penpot → NEXUS:**\n- Penpot's MCP or export API surfaces component structure, naming, layout, tokens\n- LOGOS ingests that as raw facts into ui.visual\n- Component names (`Type.Name.Variant` convention you established) become Fact identifiers\n- Screens (`Path{N}.{Step}-{StateName}`) map directly to ViewSlice projections\n\n**Exporting NEXUS → Penpot:**\n- ATLAS renders the ui.visual subgraph with a Penpot lens\n- That lens produces Penpot-compatible component/frame structure\n- FORGE compiles it to Penpot's format (or ATLAS drives Penpot's API/MCP directly)\n\n---\n\n### The Clean Separation\n\n| Layer | What lives here |\n|---|---|\n| Penpot | Visual authoring, design tokens, component library |\n| ui.visual (NEXUS) | Modeled intent — what components mean, what states exist |\n| FORGE output | Running HTML/CSS/Bolero — browser consumes this |\n| Browser | Runtime execution — External, outside model boundary |\n\nThe model never contains HTML. It contains *what HTML should express*. FORGE is the translation function between those two things."

