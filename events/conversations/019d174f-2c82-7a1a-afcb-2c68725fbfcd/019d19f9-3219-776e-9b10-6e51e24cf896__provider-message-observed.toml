text = "Yeah, so the state is the part that is throwing me off because state in this system is based on the events, which is the history. So, I think there is a misunderstanding on what a slice is. We start from the stream, which is the result of the projection making it, which is the state at that point. Then there is an action or intent or whatever we're gonna call it. The user clicks a button, for example, with a value changed in a text field or something. That goes to the command that processes that intent, and if the rules allow, well, it'll produce an event, the happy path event, for example, would be that it creates the event in the event section, and that slice is done. So it's like a unit of work. It made the state of the business system change because the event was written."

