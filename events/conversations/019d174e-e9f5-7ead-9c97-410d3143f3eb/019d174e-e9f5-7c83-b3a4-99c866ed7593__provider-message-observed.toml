kind = "plain_text"
text = "**Ryzen 9 9955HX vs 9950X - Critical differences:**\n\n**9955HX (Mobile/Laptop chip):**\n- 16 cores/32 threads (same count)\n- **55W base TDP / 120W boost** (thermally constrained)\n- BGA soldered (can't upgrade)\n- Mobile motherboard required\n- Designed for laptops/compact systems\n- **Throttles under sustained load**\n- Lower clocks when all cores active\n\n**9950X (Desktop chip):**\n- 16 cores/32 threads\n- **170W TDP** (sustained performance)\n- AM5 socket (upgradeable)\n- Standard ATX/mATX motherboards\n- Designed for workstations/servers\n- **Full performance 24/7**\n- Higher all-core clocks\n\n---\n\n**Performance comparison (your workloads):**\n\n| Workload | 9955HX | 9950X |\n|----------|--------|-------|\n| Short bursts | ~90% | 100% |\n| **Sustained multi-thread** | **60-70%** | **100%** |\n| ZFS scrubs (hours long) | Throttles hard | Full speed |\n| Multiple containers | Thermal limit | No problem |\n| F# compilation (single) | ~85% | 100% |\n| 24/7 operation | Struggles | Designed for it |\n\n**The HX chip thermal throttles after 30-60 seconds of heavy load.**\n\n---\n\n**Why 9955HX exists:**\n\nIt's for **gaming laptops and compact systems** where:\n- You need battery power\n- Space is constrained\n- Short burst performance matters\n- You can't cool 170W\n\n---\n\n**For your dedicated server, 9955HX is WRONG:**\n\n**Problems:**\n1. **Throttles during ZFS scrubs** - Takes 2x longer\n2. **Can't sustain multi-container load** - Performance degrades\n3. **Mobile motherboard** - Expensive, limited SATA ports, no standard ATX\n4. **Bottlenecks your 3090** - Can't feed it data fast enough\n5. **Not upgradeable** - BGA soldered to board\n6. **Worse value** - Similar price, 30-40% less performance\n\n**Where are you seeing 9955HX?**\n\nIf you're looking at:\n- **Pre-built mini PCs** - They use mobile chips, bad for servers\n- **Compact workstations** - Same issue\n- **DIY build** - You can't buy mobile chips separately\n\n---\n\n**Recommendation: Stick with 9950X (or 7950X)**\n\nFor a dedicated server with:\n- 24/7 operation\n- ZFS workloads\n- Multiple containers\n- RTX 3090\n- Standard components\n\n**Desktop chip is the only option.**\n\n**Why are you considering the HX chip?** Did you find a pre-built system, or are you looking at mini PC form factors?"

