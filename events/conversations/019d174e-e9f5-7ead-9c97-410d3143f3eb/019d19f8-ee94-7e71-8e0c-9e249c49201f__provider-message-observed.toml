[[body.segments]]
kind = "reasoning"
text = "Ah, so Ivan is looking at mini PCs with Thunderbolt or OCuLink for external GPU (eGPU). This is a very specific use case that changes the CPU recommendations significantly.\n\nKey considerations:\n1. eGPU bandwidth limitations (Thunderbolt 3/4 = PCIe x4, OCuLink = PCIe x4)\n2. The 3090 will be bandwidth-limited vs native PCIe x16\n3. CPU needs to not bottleneck the already-limited GPU\n4. NPU still useless for his workload\n5. Price/performance vs just building small ITX system\n\nI should:\n- Explain the eGPU bandwidth penalty\n- Recommend CPU specs for his workload\n- Point out the practical issues with eGPU + 3090\n- Suggest whether this makes sense vs alternatives"

[[body.segments]]
kind = "plain_text"
text = "**Critical eGPU limitation:**\n\nExternal GPU via Thunderbolt/OCuLink gives you **~25-40% performance loss** vs native PCIe:\n\n- **Thunderbolt 3/4**: PCIe x4 bandwidth (~32 Gbps)\n- **OCuLink**: PCIe x4 bandwidth (~32 Gbps)  \n- **Native PCIe x16**: 4x more bandwidth (~128 Gbps)\n\n**For a 3090**, this means:\n- Large batch inference: 60-75% of native performance\n- LLM inference: Less impacted (memory-bound, not bandwidth-bound)\n- Multi-model switching: Slower model loading\n\n**For Nexus workflows**, the impact depends on:\n- Phi-4 generation: Probably fine (text generation is less bandwidth-sensitive)\n- Batch embedding 21MB conversation export: Noticeably slower\n- RAG indexing large documents: More painful\n\n**Recommended mini PC CPU specs for Nexus:**\n\n**Minimum:**\n- 8 cores / 16 threads\n- 32GB RAM (64GB better for large event stores)\n- OCuLink or Thunderbolt 4 (not Thunderbolt 3)\n\n**Sweet spot CPUs in these brands:**\n- **AMD**: Ryzen 9 7940HS, 8945HS (8-core, no useless NPU)\n- **Intel**: Core Ultra 7 155H, 9 185H (16-core, includes NPU you won't use)\n\n**Reality check questions:**\n\n1. **Power budget**: eGPU enclosure needs dedicated PSU for 3090 (350W+)\n2. **Cable length**: Thunderbolt = 2m max, OCuLink = 1m max\n3. **Cost**: Mini PC ($600-1000) + eGPU enclosure ($300-500) = $900-1500\n\n**Alternative to consider:**\n\nSmall form factor ITX build with native PCIe x16:\n- Case: Lian Li A4-H2O, SSUPD Meshlicious (fits 3090)\n- Mobo: Mini-ITX with PCIe x16\n- CPU: Ryzen 7 7700 or i7-14700\n- **Same footprint as mini PC + eGPU dock**\n- **Full GPU performance**\n- **$800-1000 total**\n\nWhich matters more - absolute smallest size (mini PC) or maximum performance from your 3090?"

