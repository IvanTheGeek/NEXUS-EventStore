text = "**RAM needs for Nexus - realistic breakdown:**\n\n**What actually consumes RAM on your local machine:**\n\n| Component | RAM Usage |\n|-----------|-----------|\n| OS (Windows/Linux) | 4-8GB |\n| Rider/VS Code | 3-6GB |\n| F# compilation + FSI | 2-4GB |\n| Nexus event store (in-memory) | 4-12GB |\n| Browser (docs, Claude) | 4-8GB |\n| Background services | 2-4GB |\n| **Headroom for experiments** | ? |\n\n**Key question: Where does Qdrant run?**\n\nYou already have Qdrant on VPS, so:\n- Vector indexes: **Not on local machine** (saves 4-16GB)\n- Embedding API: **On VPS** (saves 2-4GB)\n\n**This changes the math:**\n\n**32GB reality:**\n- Works for single-tasking\n- Tight when: Rider + browser + event processing + large F# build\n- You'll see swap usage under heavy multitasking\n- $90 cheaper\n\n**64GB reality:**\n- Comfortable for everything\n- Run multiple F# projects simultaneously\n- Heavy browser use + Rider + debugging doesn't pressure memory\n- Future-proof for 2-3 years\n- **Recommended**\n\n**128GB reality:**\n- Only useful if you:\n  - Move Qdrant local with huge corpus (100K+ documents)\n  - Run multiple fine-tuning experiments simultaneously\n  - Keep massive datasets in RAM\n- Probably overkill: **$360 vs $180 for 64GB**\n\n**Real scenarios:**\n\n*You're working on Nexus, with:*\n- Rider open (4GB)\n- 20 browser tabs for docs (6GB)\n- F# build running (3GB)\n- Nexus event store processing your 21MB export (6GB)\n- VS Code for script editing (2GB)\n- OS overhead (6GB)\n\n**= 27GB used with 32GB → tight**  \n**= 27GB used with 64GB → comfortable 37GB free**\n\n**Recommendation: 64GB DDR5**\n- Sweet spot for price/performance\n- Handles current + near-future workloads\n- Upgrade path: Add another 64GB later if you move Qdrant local\n\n**Updated $1,100-1,200 build:**\n\n- **CPU: Ryzen 9 7900X - $400** (12-core, better parallel work)\n- **RAM: 64GB DDR5-5600 - $180** (2x32GB)\n- **Mobo: B650 - $150**\n- **NVMe: 1TB Gen4 - $75**\n- **PSU: 850W Gold - $120**\n- **Case: ATX Mid - $80**\n- **Cooler: Tower - $40**\n\n**Total: ~$1,045**\n\nGo with 64GB?"

