[[body.segments]]
kind = "reasoning"
text = "User wants:\n- Standard size PC (easier, better cooling)\n- ~$1000 budget\n- AMD CPU (established from previous question)\n- Already has RTX 3090\n- For dedicated Nexus work with 1Gbit fiber\n- Needs to handle: F# compilation, event sourcing, Qdrant vector ops, Phi-4 inference\n\nBudget breakdown needs to account for:\n- CPU\n- Motherboard\n- RAM (64GB ideally, 32GB minimum)\n- Storage (NVMe for speed)\n- PSU (850W for 3090)\n- Case\n- CPU cooler\n\nHe already has the 3090, so that's not in the budget.\n\nAt $1000, need to make smart tradeoffs. Let me spec this out realistically.\n\n7900X ($400) vs 7700X ($280) - $120 difference\nWith $1000 budget and needing all other components, the 7700X might be more practical to afford 64GB RAM.\n\nLet me build two options: one at $1000 with compromises, one at ~$1200 that's ideal."

[[body.segments]]
kind = "plain_text"
text = "**$1000 Nexus Build (AMD + your 3090):**\n\n**CPU: Ryzen 7 7700X - $280**\n- 8 cores/16 threads - adequate for Nexus\n- Strong single-thread for F# compilation\n\n**Motherboard: B650 ATX - $150**\n- Example: ASRock B650 Pro RS\n- PCIe 4.0 x16 for 3090\n- 4x RAM slots for future upgrade\n\n**RAM: 32GB DDR5-5600 - $90**\n- 2x16GB kit\n- Minimum for Nexus, upgrade to 64GB later ($90 more)\n\n**Storage: 1TB NVMe Gen4 - $75**\n- Example: Samsung 980 Pro or WD Black SN850X\n- Fast for model loading, event stores\n\n**PSU: 850W 80+ Gold - $120**\n- Example: EVGA SuperNOVA or Corsair RM850x\n- Headroom for 3090 (350W)\n\n**Case: Mid-tower ATX - $80**\n- Example: Fractal Design Meshify C, Corsair 4000D\n- Good airflow for 3090 heat\n\n**CPU Cooler: Tower cooler - $40**\n- Example: Thermalright Peerless Assassin, DeepCool AK620\n- 7700X runs warm under load\n\n**Total: ~$835**\n\n**Remaining $165 for:**\n- Windows license if needed\n- Extra case fans\n- OR upgrade to 64GB RAM now (total $925)\n\n**Better build at $1,100:**\n\nSwap 7700X → **7900X ($400)** and 32GB → **64GB RAM ($180)**\n- More comfortable for long-term Nexus work\n- Better parallel task handling\n- Event stores won't pressure memory\n\n**Recommendations:**\n1. Start with $835 build, 32GB RAM\n2. Monitor memory usage with your 21MB conversation processing\n3. Add second 32GB kit if you hit limits (~$90 later)\n\nDoes $1,000 hard limit, or willing to stretch to $1,100-1,200 for 7900X + 64GB?"

