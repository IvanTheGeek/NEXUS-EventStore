text = "\"I'd approach it so the base Talkyard model is yours and the LOGOS-specific extensions are mine.\" is not sitting with me. it is more that the talkyard model could the referenced as the current state and then LOGOS would be replacing or adding to that model. I guess it depends on him if I am using it as reference or a base to add on to or if not documenting talkyard as it is is worth it and just use as reference for LOGOS software itself. It just seems like there could end up being a huge amount of overlap in all types of work that really would not be needed."

