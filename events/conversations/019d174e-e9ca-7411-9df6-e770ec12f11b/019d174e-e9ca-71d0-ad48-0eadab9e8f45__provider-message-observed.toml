text = "the line \"I'd be happy to attempt a reverse-engineering pass on Talkyard using Event Modeling\" is actually incorrect. I WILL actually be doing so, it will take a while because it depends on getting more of the NEXUS pieces working and such, it is more that if he has interest in it for his own use and would be helpful to him, I could do so in way that preserves the talkyard models that he could use himself, and then my logos additions and changes would be mine. I am also thinking that it might be that instead of having to create a LOGOS software myself, are closer relationship be that Talkyard is extended to accommodate what I want LOGOS to be. In my head, if I made my own LOGOS, there is no reason it could not be used as a persons forum for what they are generally used for currently. It would just have a bunch more features and aspects that would not be lit up, but could be later if needed or desired."

