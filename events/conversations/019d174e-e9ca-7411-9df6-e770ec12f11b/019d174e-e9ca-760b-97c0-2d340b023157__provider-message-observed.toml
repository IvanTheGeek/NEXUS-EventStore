text = "i bit of a fine point here:  \"existing codebase\" I am not particularly interested in his code. I am interested in how talkyard is used as a human, the screens it produces, the behavior of ux and those aspects. Also, whether I make my own or rely on talkyard (him) would be in the control of design decisions kinda. meaning, if i have ultimate authority and make a LOGOS software, I control priorities, feature sets, design decisions, etc. The event model, the specs, the features. I am open to any and all suggestions and contributions, especially if someone where to create all the needed parts like ideas, event model, specs, tests, etc, I just have to approve and then the Rendering can happen. That is a big thing actually, the Rendering. The hard work is the design and spec, once that is good, the actual making of the codebase and making executable artifacts is kinda a nothing."

