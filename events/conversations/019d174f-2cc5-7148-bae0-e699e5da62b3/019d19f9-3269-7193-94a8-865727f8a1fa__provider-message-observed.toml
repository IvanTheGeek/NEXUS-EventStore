text = "Exactly — you’re describing **a focused, state-aware transformer workflow** that’s central to event-sourced systems. Let’s unpack the full sequence carefully and precisely:  \n\n---\n\n# 1. Command Handling in Context\n\n**Command Handler / Transformer**:  \n\n- **Input**:  \n  1. A **command node** representing user intent (e.g., `SubmitTransaction`).  \n  2. The **current state**, derived from prior events relevant to that command.  \n\n- **How current state is determined**:  \n  - You **don’t need all historical events**, only those **affecting the entity or transformation in question** (e.g., the transaction, user account, or related nodes).  \n  - Graphically, this is like **traversing the subgraph** that matters for this command.\n\n- **Process**:  \n  1. Gather relevant nodes and edges (state).  \n  2. Apply business rules / validation.  \n  3. Produce new event node(s) (immutable facts).  \n  4. Attach edges from prior state nodes to new event nodes (provenance / causal links).  \n\n---\n\n# 2. Example Flow\n\n```text id=\"graph-flow\"\nStep 1: UI Click → SubmitTransaction Command Node\n\nStep 2: Transformer (Command Handler)\n  ├─ Reads current state (only relevant events/nodes)\n  ├─ Validates business rules\n  ├─ Produces Event Node(s): TransactionSubmitted\n\nStep 3: Event Node(s) added to graph\n  ├─ Edge: previous transaction state → new event (provenance)\n  ├─ Edge: triggers → projection transformers\n\nStep 4: Projection Transformers\n  ├─ Update UI / derived projections\n  └─ Possibly produce signals to other systems\n```\n\n---\n\n# 3. Key Principles in This Flow\n\n1. **Lazy / selective state loading**:  \n   - Only load prior events that **relate to the entity or transformation**.  \n   - Reduces memory usage and speeds up command handling.\n\n2. **Transformer = pure function**:  \n   - Same input state + same command → same events.  \n   - Makes system deterministic and auditable.\n\n3. **Graph-based provenance**:  \n   - Each new event node is connected to the **nodes it depended on**.  \n   - Edges act as **triggers for downstream transformations** (like projections).\n\n4. **Incremental growth**:  \n   - Graph grows with each command and resulting event.  \n   - Prior state is used **on-demand**, not fully loaded unless needed.\n\n---\n\n# 4. Optional Extensions\n\n- **Multi-entity transformations**: Command may touch multiple nodes; transformer reads all relevant event histories.  \n- **Snapshot optimization**: For long histories, you can store snapshots of aggregated state to avoid reading all events from the beginning.  \n- **Conflict resolution**: If events from parallel branches exist (offline changes, multiple users), the transformer can include logic to reconcile only relevant events.\n\n---\n\n# ✅ Summary\n\n- **Command → Transformer → Event**: central functional mapping.  \n- **Current state** = derived from **relevant prior events only**, not necessarily the entire graph.  \n- **Graph edges** track provenance and triggers.  \n- **Transformer symmetry**: projection transformers work similarly but start from event nodes instead of command nodes.  \n- This approach supports **lazy graph growth**, **determinism**, and **traceable state evolution**.\n\n---\n\nIf you want, I can **draw a diagram showing the full flow from command through transformer to event, selectively loading relevant prior events, and updating projections**, so you can see the incremental, graph-based process visually.  \n\nDo you want me to do that?"

