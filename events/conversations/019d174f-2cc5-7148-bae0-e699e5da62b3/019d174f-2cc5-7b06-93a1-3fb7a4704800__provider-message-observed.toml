text = "So there could be additional steps added in there. So the spec to the functional compiler generates a code base that can then be human reviewed and say that they look at a file and like, no, I don't like the way that this is coming out. If the spec is right, they want a different transformation or a different way that, you know, computational expression or, yeah, computational expressions versus pipeline chaining. Forge could have its own typed model, typed graph, and those changes can be updated, have AI create the new compiler, pipe the spec through the compiler, inspect the source code again, and the system automatically is able to learn what is expected and those can feed back into the AI as well. And that also ensures that there's a code review, basically, that the thing is doing what we want before we generate the artifact."

