kind = "plain_text"
text = "Yes! That's actually one of Phi-3's headline features - it's specifically designed to run on mobile devices.\n\n## What Microsoft demonstrated:\n\n**iPhone**: Phi-3-mini runs directly on iPhone 14 and newer (A16 Bionic chip and later) using the ONNX Runtime with CoreML acceleration. They showed it generating text locally at reasonable speeds.\n\n**Android**: Works on flagship phones with sufficient RAM (8GB+) and NPU/GPU acceleration.\n\n## Real-world practicality:\n\n**It works, but...**\n- Inference is slow compared to server GPUs (2-5 tokens/second vs 200+ on RTX 4090)\n- Drains battery quickly during sustained use\n- Limited to the 4K context version due to memory constraints\n- Requires quantized models (INT4) to fit in mobile RAM\n\n**Best for:**\n- Offline/privacy-sensitive use cases where cloud isn't an option\n- Simple queries that don't need instant response\n- Demos showing \"AI running locally\"\n\n**Not practical for:**\n- Your Nexus production deployment (you'd go crazy waiting for responses)\n- High-throughput applications\n- Long context tasks (the 128K version doesn't fit)\n\n## Why this matters:\n\nThe phone capability proves Phi-3's efficiency - if it can run on a phone's 8GB RAM and NPU, it'll **scream** on your RTX 4090 with 24GB VRAM and proper CUDA acceleration. The same optimizations that enable mobile deployment make it extremely fast on real hardware.\n\nFor Nexus, stick with your RTX GPUs - you'll get 100x better throughput than attempting mobile deployment."

