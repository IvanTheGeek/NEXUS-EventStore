[[body.segments]]
kind = "plain_text"
text = "Phi-3 is Microsoft's family of small language models (SLMs) released in April 2024. Here's what makes it notable:\n\n## Key Specs\n\n**Phi-3-mini**: 3.8 billion parameters with two context window variants\n- 4K context version (standard)\n- 128K context version (long-context, what I've been recommending for your Nexus use case)\n\n**Performance**: Punches well above its weight class - performs comparably to models 10x larger on reasoning benchmarks. Microsoft claims it rivals GPT-3.5 and Mixtral 8x7B on many tasks despite being much smaller.\n\n**What makes it different**: \n- Trained on \"textbook quality\" synthetic data rather than raw web scraping\n- Optimized to run locally on consumer hardware (phones, laptops, RTX GPUs)\n- Open weights - you can download and run it anywhere\n- Specifically designed for efficiency without sacrificing too much capability\n\n## Why I kept recommending it for you:\n\n1. **Runs great on RTX 4090s** - the 128K context version fits comfortably in 24GB VRAM when quantized\n2. **Already knows F# and coding** - trained on GitHub data\n3. **Long context window** - 128K tokens means you can feed it substantial Nexus event history\n4. **Fast inference** - 200-400ms on your hardware vs 1500-3000ms for Claude API calls\n5. **Free to run** - only costs electricity once you have the hardware\n\nThe trade-off is it's not as capable as Claude Sonnet 4.5 at complex reasoning, creative writing, or nuanced tasks - which is why the hybrid architecture makes sense for your situation.\n\nIs there a specific aspect of Phi-3's capabilities or architecture you want to dig into?"

