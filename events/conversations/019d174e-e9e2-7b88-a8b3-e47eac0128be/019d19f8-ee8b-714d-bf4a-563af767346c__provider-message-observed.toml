kind = "plain_text"
text = "Perfect - let me build this up from the foundation so LoRA makes complete sense.\n\n## Understanding Model Weights\n\nThink of a neural network like a giant spreadsheet with billions of cells. Each cell contains a number (a \"weight\" or \"parameter\"). When text goes in, it flows through all these numbers in a specific pattern, and text comes out the other end.\n\n**What makes GPT-4 different from Phi-3?**\n- Different numbers in those billions of cells\n- Those numbers were learned by showing the model trillions of words during training\n\n**Training = adjusting all those numbers** so the model gets better at predicting the next word.\n\n**Example**: If you show the model \"The capital of France is ___\", training adjusts billions of numbers so \"Paris\" becomes the most likely output.\n\n## The Fine-Tuning Problem\n\nLet's say you want to teach Phi-3 (3.8 billion parameters) to be better at your Nexus F# code patterns.\n\n**Traditional fine-tuning:**\n- Update ALL 3.8 billion numbers\n- Requires massive GPU memory (all numbers must fit in VRAM)\n- Takes hours/days\n- Expensive ($500-5000)\n- Risk of \"catastrophic forgetting\" - model loses general knowledge while learning specific task\n\n**The challenge**: You just want to teach it *your patterns*, but you're forced to touch *every single number in the entire model*.\n\nThat's like rewriting an entire encyclopedia just to add a new chapter.\n\n## LoRA's Clever Trick\n\n**LoRA (Low-Rank Adaptation) asks**: What if we DON'T touch the original 3.8 billion numbers at all?\n\nInstead, we add tiny \"adapter\" layers - small matrices of new numbers that sit alongside the frozen original weights.\n\n**Here's the insight:**\n\nOriginal model: `Output = BigMatrix × Input` (3.8B numbers)\n\nLoRA: `Output = (BigMatrix + SmallAdapterA × SmallAdapterB) × Input`\n\nWhere:\n- `BigMatrix` = frozen, never changes (the base Phi-3)\n- `SmallAdapterA` and `SmallAdapterB` = tiny matrices you train (maybe 10-50 million parameters total)\n\n**Key insight**: Most of the learning can be captured in these small adapter matrices without touching the base model.\n\nBefore I continue - does this core idea make sense? That instead of changing billions of numbers, you're adding a small set of adjustments on top?"

