ine-tuning exists but is locked into AWS infrastructure. For your self-learning Nexus architecture with full control, stick with open models like Phi-3 where you can actually implement the LoRA fine-tuning loop we discussed.\n\nDoes this clarify the landscape? The irony is that the model explaining LoRA to you can't actually be LoRA'd by you!"

