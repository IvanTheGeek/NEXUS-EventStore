text = "**LLM CPU requirements are surprisingly light** when you're doing GPU inference. The GPU does all the heavy lifting (matrix multiplications, attention mechanisms, etc.). The CPU is mostly just:\n- Tokenizing input text (trivial)\n- Copying data to/from GPU (memory bandwidth, not compute)\n- Managing the inference queue\n- Serving API responses\n\nFor a single Phi-4 instance on one GPU, even a modest CPU is fine. The bottleneck is entirely the GPU.\n\n**Your mining boards - the tricky parts:**\n\n**PCIe bandwidth:**\nMining boards typically have PCIe x1 or x4 slots to maximize slot count. This works fine for mining because mining needs almost zero PCIe bandwidth once the mining kernel is loaded. For LLMs:\n- **Model loading**: Slow on x1 (1GB/s on PCIe 3.0), but you load once at startup\n- **During inference**: Minimal bandwidth needed - just prompt in, tokens out\n- **Verdict**: x4 is fine, x1 is slower but workable\n\n**8GB RAM problem:**\nThis is your real constraint. Consider:\n- OS (Linux): ~1-2GB\n- LLM serving framework (Ollama/vLLM): ~1-2GB\n- Model management overhead: ~1-2GB\n- Any caching or batching: more RAM helps\n\nWith 8GB total, you'd be running pretty tight. One GPU might be okay, but multiple GPUs means multiple inference sessions potentially competing for that small RAM pool.\n\n**Celeron CPU:**\nDepends on which Celeron. Modern ones (even low-end) can handle basic LLM serving. The question is: can it handle multiple concurrent requests if you're serving APIs? Probably struggles with high concurrency.\n\n**Practical use cases for mining boards:**\n\n**Option 1: Single-GPU inference boxes**\n- One 3090 per board\n- Dedicated to one model/task\n- Would work, but seems wasteful of the extra PCIe slots\n- RAM is tight but manageable for one instance\n\n**Option 2: Multi-GPU batched inference**\n- Put multiple GPUs in one board\n- Use something like vLLM that can spread across GPUs\n- **Problem**: 8GB RAM becomes painful for managing 3+ GPUs\n- Celeron might struggle with orchestration\n\n**Option 3: Specialized inference tasks**\n- Use for embedding generation (less RAM intensive)\n- Or smaller models (Phi-3-mini, older 7B models)\n- Single-task, always-on inference endpoints\n\n**My take:**\n\nThose mining boards probably aren't ideal for serious LLM work **unless you can upgrade the RAM**. If you can pop in 32GB or 64GB RAM, then they become viable multi-GPU inference servers despite the weak CPU. The PCIe lanes being limited isn't a dealbreaker for inference.\n\nBut with 8GB RAM and a Celeron, you're better off using your **mini PC with 64GB RAM** as your LLM server (even if it only has one GPU via Oculink). When that moves to the truck, build a proper server with better specs for multi-GPU work.\n\n**Alternative use:** Those mining boards could be crypto miners again (their original purpose) running as low-priority containers on your network, eating spare electricity and generating a bit of income to offset your homelab power costs. At least they're purpose-built for that.\n\nWhat specific mining boards do you have? If they're upgradeable to 32GB+ RAM, the equation changes."

