kind = "plain_text"
text = "i like to keep my laptopbase OS clean. Currently I use virtualbox to have virtual machines compartmentalized, like for example, All Nexus work is being done in a VM. I use to use windows for the laptop and LMDE6 for the virtual machines (with a couple windows exceptions). I have switched laptops to a Framework 16 AMD model and been running Linux Mint (Ubuntu) and been quite pleased. The latest virtualbox is giving me some issues and I managed to kinda mess some things up trying to get local LLM going. \nI have my old laptop that I plan to pull all the data off of and install linux mint on and it has an Nvidia GPU. I was going to do the LLM on that machine I think. I am fine with docker, as most llm/ai stuff seems to be available with that. But instead of VirtualBox, should I use containers of some sort? would that give them better access to the full abilities of the computer and gpu? i know there is QEMU and KVM, and Incus but I am not sure exactly how they all relate and what the best way to get max performance might be. I have a new little server to setup as well, and was planning for ProxMox, but I am wondering if I should use something different."

