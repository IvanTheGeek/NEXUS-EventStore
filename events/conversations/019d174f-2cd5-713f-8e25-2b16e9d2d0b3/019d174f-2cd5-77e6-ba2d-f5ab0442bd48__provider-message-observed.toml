text = "Excellent. If **B is the focus**, then the job is to make the **relation vocabulary small, durable, and cross-domain**.\n\nThe test for a good edge set is:\n\n- it can express **structure**\n- it can express **behavior**\n- it can express **time/order**\n- it can express **projection/lens**\n- it can express **boundary crossing**\n- it does not bake in one domain too early\n\nSo here is my proposed **minimal universal edge set** for NEXUS.\n\n---\n\n# Proposed Minimal Universal Edge Set\n\nI would start with **8 core edges**:\n\n1. **contains**\n2. **references**\n3. **flows_to**\n4. **causes**\n5. **transforms_to**\n6. **projects_to**\n7. **informs**\n8. **bridges_to**\n\nThese are intentionally broad. More specific domain terms like `produces`, `triggers`, or `updates` can either:\n- be aliases of these\n- or be higher-level derived relations\n\n---\n\n# Why these 8\n\n## 1. `contains`\nA parent or boundary includes a member.\n\nUse for:\n- context contains node\n- slice contains command/event/view\n- document contains section\n- screen contains component\n\nThis gives you **composition**.\n\nExample:\n- `CheckoutFlow contains SubmitOrder`\n- `OrderSlice contains OrderPlaced`\n\n---\n\n## 2. `references`\nOne node points to another without implying time or causality.\n\nUse for:\n- a note references a concept\n- a UI field references a domain fact\n- a document references a requirement\n- an event references an aggregate/entity\n\nThis gives you **association**.\n\nExample:\n- `OrderPlaced references Order`\n- `ForumPost references CashLogIdea`\n\n---\n\n## 3. `flows_to`\nOne thing leads to the next in an ordered path.\n\nUse for:\n- timeline order\n- UI path\n- slice order\n- business workflow order\n\nThis gives you **sequence**.\n\nExample:\n- `BrowseProducts flows_to SubmitOrder`\n- `SliceA flows_to SliceB`\n\n---\n\n## 4. `causes`\nOne thing gives rise to another.\n\nUse for:\n- actor causes command\n- command causes event\n- trigger causes process\n- condition causes state transition\n\nThis gives you **causality**.\n\nExample:\n- `CustomerClick causes SubmitOrder`\n- `SubmitOrder causes OrderPlaced`\n\nYou could later alias:\n- `triggers` → `causes`\n- `produces` → `causes`\n\n---\n\n## 5. `transforms_to`\nOne representation or state is transformed into another.\n\nUse for:\n- command transforms intent into event\n- parser transforms source into model\n- import transforms CSV into graph facts\n- transpiler transforms graph into Penpot/HTML\n\nThis gives you **conversion**.\n\nExample:\n- `RawStatementCsv transforms_to TransactionFacts`\n- `TruthGraph transforms_to EventModelDiagram`\n\n---\n\n## 6. `projects_to`\nA source is projected into a view or lens-specific shape.\n\nUse for:\n- event projects to read model\n- graph projects to diagram\n- model projects to UI\n- knowledge projects to report\n\nThis gives you **read-side/view semantics**.\n\nExample:\n- `OrderPlaced projects_to OrderSummaryView`\n- `TruthGraph projects_to AtlasCanvas`\n\n---\n\n## 7. `informs`\nA thing provides information to an observer, actor, or downstream interpretation.\n\nUse for:\n- view informs actor\n- report informs decision\n- alert informs operator\n- dashboard informs manager\n\nThis gives you **perception/use**.\n\nExample:\n- `OrderSummaryView informs Customer`\n- `RevenueDashboard informs Owner`\n\n---\n\n## 8. `bridges_to`\nA controlled crossing between contexts, systems, or boundaries.\n\nUse for:\n- UI bridges to backend\n- domain bridges to external service\n- Logos bridges to Atlas\n- bounded context bridges to bounded context\n\nThis gives you **integration/boundary semantics**.\n\nExample:\n- `CheckoutUi bridges_to OrderingApi`\n- `PenpotModel bridges_to TruthGraph`\n\n---\n\n# What this edge set gives you\n\nThis can express your core loop:\n\n```md\nActor causes Command\nCommand causes Event\nEvent projects_to View\nView informs Actor\nSliceA flows_to SliceB\nContext contains SliceA\nUI bridges_to Backend\nRawInput transforms_to GraphFact\n```\n\nThat is already enough to model a large portion of:\n- Event Modeling\n- UI/UX flows\n- ingest pipelines\n- design tooling\n- cross-context integrations\n\n---\n\n# Suggested rule\n\nI would treat these as **canonical base relations**.\n\nThen allow **derived aliases** for readability.\n\nExample alias layer:\n\n```md\ntriggers   := causes\nproduces   := causes\nupdates    := projects_to\nrenders    := projects_to\nleads_to   := flows_to\nbelongs_to := contains\nimports_to := transforms_to\nsyncs_to   := bridges_to\n```\n\nSo the graph stays normalized, but lenses can show friendlier vocabulary.\n\n---\n\n# Examples in Markdown\n\n## Example 1: Basic Event Modeling loop\n\n```md\nCustomer causes SubmitOrder\nSubmitOrder causes OrderPlaced\nOrderPlaced projects_to OrderSummaryView\nOrderSummaryView informs Customer\n```\n\n## Example 2: Slice ordering\n\n```md\nBrowseProducts flows_to ReviewCart\nReviewCart flows_to SubmitOrder\nSubmitOrder flows_to OrderConfirmation\n```\n\n## Example 3: Context membership\n\n```md\nOrderingContext contains SubmitOrder\nOrderingContext contains OrderPlaced\nOrderingContext contains OrderSummaryView\n```\n\n## Example 4: Tooling / transpiler\n\n```md\nTruthGraph projects_to EventModelDiagram\nTruthGraph projects_to HtmlUi\nTruthGraph projects_to PenpotLayout\nPenpotLayout bridges_to TruthGraph\n```\n\n## Example 5: LOGOS-style knowledge ingestion\n\n```md\nForumPost references CashLog\nForumPost informs ProductIdea\nRawForumText transforms_to KnowledgeNode\nKnowledgeNode projects_to ResearchSummary\n```\n\n---\n\n# F# Types\n\nHere is a clean starting point.\n\n```fsharp\ntype NodeId = NodeId of string\n\ntype EdgeKind =\n    | Contains\n    | References\n    | FlowsTo\n    | Causes\n    | TransformsTo\n    | ProjectsTo\n    | Informs\n    | BridgesTo\n\ntype Edge =\n    { Source : NodeId\n      Kind : EdgeKind\n      Target : NodeId }\n\ntype NodeKind =\n    | Actor\n    | Trigger\n    | Command\n    | Event\n    | View\n    | Context\n    | Slice\n    | Document\n    | Concept\n    | System\n    | Artifact\n    | Custom of string\n\ntype Node =\n    { Id : NodeId\n      Kind : NodeKind\n      Label : string }\n\ntype FactValue =\n    | String of string\n    | Int of int\n    | Decimal of decimal\n    | Bool of bool\n\ntype Fact =\n    { Owner : NodeId\n      Name : string\n      Value : FactValue }\n\ntype Graph =\n    { Nodes : Node list\n      Edges : Edge list\n      Facts : Fact list }\n```\n\nThat is the minimal typed base.\n\n---\n\n# F# with derived aliases\n\nIf you want normalized storage but friendly authoring:\n\n```fsharp\ntype EdgeAlias =\n    | Triggers\n    | Produces\n    | Updates\n    | Renders\n    | LeadsTo\n    | BelongsTo\n    | ImportsTo\n    | SyncsTo\n\nlet normalizeEdgeAlias = function\n    | Triggers  -> Causes\n    | Produces  -> Causes\n    | Updates   -> ProjectsTo\n    | Renders   -> ProjectsTo\n    | LeadsTo   -> FlowsTo\n    | BelongsTo -> Contains\n    | ImportsTo -> TransformsTo\n    | SyncsTo   -> BridgesTo\n```\n\nThat keeps your core graph small.\n\n---\n\n# F# example graph\n\n```fsharp\nlet customer =\n    { Id = NodeId \"customer\"\n      Kind = Actor\n      Label = \"Customer\" }\n\nlet submitOrder =\n    { Id = NodeId \"submit-order\"\n      Kind = Command\n      Label = \"SubmitOrder\" }\n\nlet orderPlaced =\n    { Id = NodeId \"order-placed\"\n      Kind = Event\n      Label = \"OrderPlaced\" }\n\nlet orderSummaryView =\n    { Id = NodeId \"order-summary-view\"\n      Kind = View\n      Label = \"OrderSummaryView\" }\n\nlet orderingContext =\n    { Id = NodeId \"ordering-context\"\n      Kind = Context\n      Label = \"OrderingContext\" }\n\nlet graph =\n    { Nodes =\n        [ customer\n          submitOrder\n          orderPlaced\n          orderSummaryView\n          orderingContext ]\n\n      Edges =\n        [ { Source = NodeId \"customer\"; Kind = Causes; Target = NodeId \"submit-order\" }\n          { Source = NodeId \"submit-order\"; Kind = Causes; Target = NodeId \"order-placed\" }\n          { Source = NodeId \"order-placed\"; Kind = ProjectsTo; Target = NodeId \"order-summary-view\" }\n          { Source = NodeId \"order-summary-view\"; Kind = Informs; Target = NodeId \"customer\" }\n          { Source = NodeId \"ordering-context\"; Kind = Contains; Target = NodeId \"submit-order\" }\n          { Source = NodeId \"ordering-context\"; Kind = Contains; Target = NodeId \"order-placed\" }\n          { Source = NodeId \"ordering-context\"; Kind = Contains; Target = NodeId \"order-summary-view\" } ]\n\n      Facts = [] }\n```\n\n---\n\n# TOML Representation\n\nTOML works well for persisted graph data.\n\n## Option 1: explicit nodes and edges\n\n```toml\n[[nodes]]\nid = \"customer\"\nkind = \"Actor\"\nlabel = \"Customer\"\n\n[[nodes]]\nid = \"submit-order\"\nkind = \"Command\"\nlabel = \"SubmitOrder\"\n\n[[nodes]]\nid = \"order-placed\"\nkind = \"Event\"\nlabel = \"OrderPlaced\"\n\n[[nodes]]\nid = \"order-summary-view\"\nkind = \"View\"\nlabel = \"OrderSummaryView\"\n\n[[nodes]]\nid = \"ordering-context\"\nkind = \"Context\"\nlabel = \"OrderingContext\"\n\n[[edges]]\nsource = \"customer\"\nkind = \"causes\"\ntarget = \"submit-order\"\n\n[[edges]]\nsource = \"submit-order\"\nkind = \"causes\"\ntarget = \"order-placed\"\n\n[[edges]]\nsource = \"order-placed\"\nkind = \"projects_to\"\ntarget = \"order-summary-view\"\n\n[[edges]]\nsource = \"order-summary-view\"\nkind = \"informs\"\ntarget = \"customer\"\n\n[[edges]]\nsource = \"ordering-context\"\nkind = \"contains\"\ntarget = \"submit-order\"\n\n[[edges]]\nsource = \"ordering-context\"\nkind = \"contains\"\ntarget = \"order-placed\"\n\n[[edges]]\nsource = \"ordering-context\"\nkind = \"contains\"\ntarget = \"order-summary-view\"\n```\n\nThis is the most universal shape.\n\n---\n\n## Option 2: TOML with facts\n\n```toml\n[[facts]]\nowner = \"order-placed\"\nname = \"description\"\nvalue = \"Order successfully placed\"\n\n[[facts]]\nowner = \"order-summary-view\"\nname = \"ui-screen\"\nvalue = \"Order Confirmation\"\n```\n\nBecause TOML is not strongly typed the way F# is, I would keep fact values simple unless you introduce typed fields later.\n\n---\n\n# TOML with aliases\n\nYou could allow authored aliases:\n\n```toml\n[[edges]]\nsource = \"customer\"\nkind = \"triggers\"\ntarget = \"submit-order\"\n```\n\nThen normalize on load:\n\n- `triggers` → `causes`\n- `produces` → `causes`\n- `updates` → `projects_to`\n\nThat gives humans readable input and machines a stable core.\n\n---\n\n# Recommended semantics for each edge\n\nHere is the part that matters most.\n\n## `contains`\nUse when the target is structurally inside the source boundary.\n\n```md\nOrderingContext contains OrderPlaced\nCheckoutScreen contains SubmitButton\n```\n\n## `references`\nUse when there is linkage but no claim of order, projection, or causality.\n\n```md\nOrderPlaced references Order\nResearchNote references EventModeling\n```\n\n## `flows_to`\nUse for sequence or next-step order.\n\n```md\nLogin flows_to Dashboard\nSlice1 flows_to Slice2\n```\n\n## `causes`\nUse for actual causal production or initiation.\n\n```md\nSubmitOrder causes OrderPlaced\nButtonClick causes SubmitOrder\n```\n\n## `transforms_to`\nUse for conversion from one representation into another.\n\n```md\nCsvImport transforms_to TransactionGraph\nMarkdownSpec transforms_to ScreenDraft\n```\n\n## `projects_to`\nUse for read/view/lens shaping.\n\n```md\nOrderPlaced projects_to OrderHistoryView\nTruthGraph projects_to WhiteboardDiagram\n```\n\n## `informs`\nUse when an actor/system/view consumes meaning.\n\n```md\nOrderHistoryView informs Customer\nAlertBanner informs Operator\n```\n\n## `bridges_to`\nUse for boundary crossing or controlled connection.\n\n```md\nMobileUi bridges_to OrdersApi\nAtlas bridges_to Penpot\n```\n\n---\n\n# What not to do\n\nI would avoid putting these into the canonical base set yet:\n\n- `owns`\n- `depends_on`\n- `uses`\n- `calls`\n- `reads`\n- `writes`\n- `updates`\n- `triggers`\n- `produces`\n\nNot because they are bad, but because they tend to either:\n- duplicate broader base relations\n- or lock you into software/infrastructure language too early\n\nThey can exist as aliases or lens-level labels.\n\n---\n\n# My strongest recommendation\n\nUse this two-layer model:\n\n## Canonical layer\n```md\ncontains\nreferences\nflows_to\ncauses\ntransforms_to\nprojects_to\ninforms\nbridges_to\n```\n\n## Lens / alias layer\n```md\ntriggers\nproduces\nrenders\nupdates\nimports\nsyncs\nbelongs_to\nleads_to\n```\n\nThat gives you:\n- stable graph semantics underneath\n- domain-friendly language on top\n\n---\n\n# Compressed summary\n\n```md\ncontains      = structural membership\nreferences    = non-causal linkage\nflows_to      = ordered sequence\ncauses        = causal initiation or production\ntransforms_to = representation conversion\nprojects_to   = view/read-model projection\ninforms       = meaning delivered to observer\nbridges_to    = controlled boundary crossing\n```\n\nThis is small enough to hold in your head, but broad enough to build NEXUS on.\n\nThe next strongest move is to test this edge set against three real cases: one Event Modeling flow, one UI flow, and one LOGOS knowledge-ingestion flow."

