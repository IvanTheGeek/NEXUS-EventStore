text = "That friction is real, and I think it means `flows_to` is doing too much.\n\nYour objection is strong:\n\n> when an event is produced, I do not control where it may be used  \n> there might be 10 projections that use that event\n\nThat means:\n\n- **causal production** is one thing\n- **possible downstream use** is a different thing\n- **narrative ordering on a whiteboard** is yet another thing\n\nThose should not be collapsed into one edge.\n\n## The key separation\n\nYou are dealing with at least three different relations:\n\n### 1. Causal relation\nSomething directly gives rise to something else.\n\n```md\nSubmitOrder causes OrderPlaced\n```\n\nThis is part of system behavior.\n\n---\n\n### 2. Projection/use relation\nSomething can be used by one or many downstream things.\n\n```md\nOrderPlaced projects_to OrderSummaryView\nOrderPlaced projects_to OrderHistoryView\nOrderPlaced projects_to RevenueReport\n```\n\nThis is many-to-many and open-ended.\n\n---\n\n### 3. Narrative or scenario order\nOn the whiteboard, or in a path, one slice is shown after another.\n\n```md\nBrowseProducts precedes ReviewCart\nReviewCart precedes SubmitOrderSlice\nSubmitOrderSlice precedes ConfirmationSlice\n```\n\nThis is not “the event flows into all future uses.”  \nIt is “in this modeled path, this comes next.”\n\n---\n\n# So I would replace `flows_to`\n\nI think `flows_to` is too vague because it can sound like:\n\n- temporal sequence\n- data pipeline\n- event routing\n- control flow\n- business progression\n\nThat is why it is causing friction.\n\n## Better replacement: `precedes`\n\nUse `precedes` strictly for **modeled order**.\n\nThat means:\n\n- slice A precedes slice B\n- step A precedes step B\n- state/view A precedes state/view B in a path\n\nBut not:\n\n- event A precedes all projections that might ever use it\n\nBecause that is not really what is happening.\n\n---\n\n# Important distinction about events\n\nWhen an event occurs:\n\n- the producer controls that it **occurred**\n- the producer does **not** control all consumers\n- downstream projections are **independent readers**\n\nThat means an event is better understood as:\n\n> a published fact in the graph\n\nThen any number of projections can relate to it.\n\nSo this is good:\n\n```md\nSubmitOrder causes OrderPlaced\nOrderPlaced projects_to OrderSummaryView\nOrderPlaced projects_to OrderLedgerView\nOrderPlaced projects_to CustomerNotificationView\n```\n\nAnd none of those projection edges imply ordering between those views.\n\n---\n\n# What Adam’s timeline is really doing\n\nThis is the subtle part.\n\nIn Adam’s Event Modeling, the timeline is not saying:\n\n> this event only goes to this next thing\n\nIt is saying:\n\n> in this scenario, here is the next meaningful point in the story\n\nSo the horizontal arrangement is really closer to:\n\n- `precedes`\n- `next_in_scenario`\n- `next_in_path`\n\nnot a universal runtime “flow” edge.\n\nThat matches your concern exactly.\n\n---\n\n# Revised minimal canonical edge set\n\nI would now propose this instead:\n\n1. `contains`\n2. `references`\n3. `precedes`\n4. `causes`\n5. `transforms_to`\n6. `projects_to`\n7. `informs`\n8. `bridges_to`\n\nThat is the same set, except:\n\n```md\nflows_to -> precedes\n```\n\n---\n\n# Semantics of `precedes`\n\n## Use `precedes` for\n- slice ordering\n- scenario ordering\n- path ordering\n- UI journey ordering\n- narrative sequence\n\n## Do not use `precedes` for\n- event subscriptions\n- all possible downstream readers\n- generic data movement\n- causality by itself\n\n---\n\n# Example: one event, many projections\n\n## Markdown\n\n```md\nSubmitOrder causes OrderPlaced\n\nOrderPlaced projects_to OrderSummaryView\nOrderPlaced projects_to OrderHistoryView\nOrderPlaced projects_to RevenueProjection\nOrderPlaced projects_to ShippingQueueView\n```\n\nThat says:\n- one command caused one event\n- many projections may use that same event\n\nNo `precedes` needed there.\n\n---\n\n# Example: Event Modeling scenario\n\n```md\nBrowseProductsSlice precedes ReviewCartSlice\nReviewCartSlice precedes SubmitOrderSlice\nSubmitOrderSlice precedes OrderConfirmationSlice\n```\n\nAnd inside one slice:\n\n```md\nCustomer causes SubmitOrder\nSubmitOrder causes OrderPlaced\nOrderPlaced projects_to OrderConfirmationView\nOrderConfirmationView informs Customer\n```\n\nThat separation is much cleaner.\n\n---\n\n# Code-side meaning\n\nOn the code side, `precedes` is usually **not** the same kind of runtime relation as `causes`.\n\n## `causes`\nThis can correspond to actual behavior:\n\n- handler emits event\n- actor triggers command\n- command results in event\n\n## `projects_to`\nThis can correspond to actual read-side usage:\n\n- projector consumes event\n- UI model updates from event stream\n- report derives values from events\n\n## `precedes`\nThis is often **model-level structure**, not necessarily runtime code.\n\nIt might be used for:\n- generating diagrams\n- building guided paths\n- defining scenario walkthroughs\n- sequencing documentation or prototypes\n\nThat may be why it felt slippery: it is less about runtime mechanics and more about modeled order.\n\n---\n\n# F# revised types\n\n```fsharp\ntype NodeId = NodeId of string\n\ntype EdgeKind =\n    | Contains\n    | References\n    | Precedes\n    | Causes\n    | TransformsTo\n    | ProjectsTo\n    | Informs\n    | BridgesTo\n\ntype Edge =\n    { Source : NodeId\n      Kind : EdgeKind\n      Target : NodeId }\n\ntype EdgeAlias =\n    | BelongsTo\n    | Next\n    | Triggers\n    | Produces\n    | Renders\n    | Updates\n    | ImportsTo\n    | SyncsTo\n\nlet normalizeEdgeAlias = function\n    | BelongsTo -> Contains\n    | Next      -> Precedes\n    | Triggers  -> Causes\n    | Produces  -> Causes\n    | Renders   -> ProjectsTo\n    | Updates   -> ProjectsTo\n    | ImportsTo -> TransformsTo\n    | SyncsTo   -> BridgesTo\n```\n\n---\n\n# F# example with many projections\n\n```fsharp\nlet edges =\n    [ { Source = NodeId \"submit-order\"; Kind = Causes; Target = NodeId \"order-placed\" }\n\n      { Source = NodeId \"order-placed\"; Kind = ProjectsTo; Target = NodeId \"order-summary-view\" }\n      { Source = NodeId \"order-placed\"; Kind = ProjectsTo; Target = NodeId \"order-history-view\" }\n      { Source = NodeId \"order-placed\"; Kind = ProjectsTo; Target = NodeId \"revenue-view\" }\n      { Source = NodeId \"order-placed\"; Kind = ProjectsTo; Target = NodeId \"shipping-queue-view\" } ]\n```\n\nThat matches your concern much better than any “flow” idea.\n\n---\n\n# TOML revised\n\n```toml\n[[edges]]\nsource = \"submit-order\"\nkind = \"causes\"\ntarget = \"order-placed\"\n\n[[edges]]\nsource = \"order-placed\"\nkind = \"projects_to\"\ntarget = \"order-summary-view\"\n\n[[edges]]\nsource = \"order-placed\"\nkind = \"projects_to\"\ntarget = \"order-history-view\"\n\n[[edges]]\nsource = \"order-placed\"\nkind = \"projects_to\"\ntarget = \"revenue-view\"\n\n[[edges]]\nsource = \"order-placed\"\nkind = \"projects_to\"\ntarget = \"shipping-queue-view\"\n```\n\nAnd scenario order separately:\n\n```toml\n[[edges]]\nsource = \"browse-products-slice\"\nkind = \"precedes\"\ntarget = \"review-cart-slice\"\n\n[[edges]]\nsource = \"review-cart-slice\"\nkind = \"precedes\"\ntarget = \"submit-order-slice\"\n\n[[edges]]\nsource = \"submit-order-slice\"\nkind = \"precedes\"\ntarget = \"confirmation-slice\"\n```\n\n---\n\n# The stronger conceptual model\n\nI think this is the right sentence:\n\n> **An event does not flow to its consumers. It exists as truth, and any number of projections may relate to it.**\n\nThat is very aligned with your graph-first thinking.\n\nSo:\n\n- `causes` = how truth comes into being\n- `projects_to` = how truth is read\n- `precedes` = how a scenario is arranged for understanding\n\nThose are three different ideas and should stay separate.\n\n---\n\n# My recommendation\n\nDrop `flows_to` from the canonical set and replace it with `precedes`.\n\nThe revised canonical set becomes:\n\n```md\ncontains\nreferences\nprecedes\ncauses\ntransforms_to\nprojects_to\ninforms\nbridges_to\n```\n\nThat feels much more stable.\n\nThe next strongest move would be to test `precedes` against your exact Event Modeling slice/timeline language and see whether you want `precedes` at all, or whether ordering should live outside the general edge vocabulary as a dedicated timeline structure."

