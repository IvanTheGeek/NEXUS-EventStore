text = "Agreed. **`precedes` is better there.**\n\n`next` feels too:\n- UI-like\n- linear/stepper-like\n- informal\n- easy to confuse with runtime control flow\n\nWhereas **`precedes`** says exactly what you want:\n\n> this slice is arranged before that slice in an authored pattern\n\nIt does **not** imply:\n- they are one slice\n- hard causality\n- exclusive downstream use\n- a single possible consumer path\n\nSo this remains clean:\n\n```md\nCommandSlice precedes ViewSlice\n```\n\nAnd more generally:\n\n```md\nPattern contains CommandSlice_A\nPattern contains ViewSlice_B\n\nCommandSlice_A precedes ViewSlice_B\n```\n\n## Why `precedes` still works\n\nBecause at the pattern level you are expressing **modeled order**, not edge semantics inside the slice.\n\nInside slices, the Event Modeling lens should absolutely use aliases:\n\n### CommandSlice\n```md\nActor triggers Command\nCommand produces Event\n```\n\n### ViewSlice\n```md\nEvent updates View\nView informs Actor\n```\n\n### Between slices in a pattern\n```md\nCommandSlice precedes ViewSlice\n```\n\nThat gives a very clean separation of levels:\n\n- **inside CommandSlice** → `triggers`, `produces`\n- **inside ViewSlice** → `updates`, `informs`\n- **between slices** → `precedes`\n\n## Updated Event Modeling overlay\n\n### Canonical underneath\n```md\nActor causes Command\nCommand causes Event\nEvent projects_to View\nView informs Actor\nCommandSlice precedes ViewSlice\n```\n\n### Event Modeling lens presentation\n```md\nActor triggers Command\nCommand produces Event\nEvent updates View\nView informs Actor\nCommandSlice precedes ViewSlice\n```\n\nSo in this lens:\n- `causes` aliases to `triggers` or `produces` depending on shape\n- `projects_to` aliases to `updates`\n- `informs` stays `informs`\n- `precedes` stays `precedes`\n\nThat is actually a good sign: not every canonical edge needs an alias in every lens.\n\n## Refined rule\n\n> **Alias when the lens has a stronger, domain-specific term.**\n>  \n> **Keep the canonical word when it is already the best fit.**\n\nSo for Event Modeling:\n\n| Canonical | Event Modeling alias |\n|---|---|\n| causes | triggers |\n| causes | produces |\n| projects_to | updates |\n| informs | informs |\n| precedes | precedes |\n| contains | contains |\n\nThat looks stable.\n\nThe bigger insight is that **`precedes` belongs to pattern composition, not to slice internals**, which is why it feels right there and wrong as a replacement for other relations."

