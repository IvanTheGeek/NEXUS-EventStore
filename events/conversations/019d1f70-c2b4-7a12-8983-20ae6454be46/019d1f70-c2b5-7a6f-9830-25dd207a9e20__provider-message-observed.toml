text = "Yes — that is a **sound model**, with one important correction:\n\nA customer would usually **buy document-signing certificates from a publicly trusted CA or trust service provider**; they would almost never “become a public certificate authority” themselves. Becoming a root CA that software trusts broadly is a much bigger, heavily governed thing. Mozilla’s root program has formal policies and an application process, which shows how high that bar is. citeturn194739search0turn194739search15\n\nSo the clean architecture is:\n\n**Mode A: customer-owned trust**\n- Business or individual runs the open-source Cheddar software.\n- They obtain their **own document-signing certificate(s)** from a provider.\n- They control their own keys, storage, policies, and evidence packages.\n- Verification can ride on the provider’s trust chain, not on Cheddar’s continued existence. Adobe’s trust model is built around trusted roots and trust lists such as AATL, and document-signing certs are meant to bind identity and document integrity. citeturn194739search1turn194739search4turn194739search2\n\n**Mode B: Cheddar-hosted trust**\n- Cheddar operates a signing service and uses **Cheddar-held signing certs/keys**.\n- Customers use Cheddar as the trust anchor and convenience layer.\n- This is simpler for customers, but it creates dependency on Cheddar’s key management, policies, and business continuity.\n\nThat means your intuition is right: **offer both**.\n\nThe part I would tighten is this:\n\n> “Cheddar might hold the certificate people could go against, just with the understanding that it may not always exist.”\n\nThat is okay **only if** the signed artifacts are self-contained enough that later verification does not require Cheddar’s servers. Acrobat/Reader trust certificate-based signatures through trusted roots and downloaded trust lists, and timestamp services are part of that broader trust model. citeturn194739search13turn194739search4\n\nSo the safer framing is:\n\n**Cheddar can be the operational service, but not the only source of truth.**\n\nFor that, each signed package should contain at least:\n- the signed document\n- the signature object\n- the signer certificate or certificate chain\n- audit trail / evidence log\n- timestamp evidence when used\n- verification metadata or instructions\n\nThat way, if Cheddar disappears, the package can still be checked against the certificate chain and evidence. Document-signing certificates are specifically intended to prove origin, authenticity, and integrity, and timestamping is used to strengthen long-term validation. citeturn194739search5turn194739search8\n\nThe strongest product shape is probably a **three-tier trust model**:\n\n1. **Self-managed**\n   - Customer uses self-signed or privately trusted certs.\n   - Lowest cost, highest autonomy.\n   - Best for internal/private ecosystems.\n\n2. **Bring your own certificate**\n   - Customer buys certs from DigiCert or another provider and plugs them into Cheddar.\n   - Best balance of autonomy and public trust.\n   - Best default for serious business use.\n\n3. **Cheddar-managed trust**\n   - Cheddar holds signing infrastructure for customers who want turnkey onboarding.\n   - Best UX, but highest responsibility and liability for Cheddar.\n\nMy recommendation: make **BYOC the center of the architecture**, and make Cheddar-managed trust an optional convenience layer. That keeps the open-source story strong and avoids making your platform the permanent dependency.\n\nA crisp rule for the product would be:\n\n> **Cheddar may facilitate signing, but the customer should always be able to leave with independently verifiable evidence.**\n\nThat gives you:\n- open-source portability\n- vendor independence\n- a hosted business model\n- survivability if Cheddar shuts down\n\nAnd one more nuance: if you want signatures to “just show as trusted” in Adobe ecosystems, you are generally in the world of certificates issued under trusted programs like AATL/EUTL rather than a purely self-signed model. citeturn194739search4turn194739search10turn194739search7\n\nA good product split would be:\n\n- **Cheddar OSS**: signing engine, evidence packaging, verification tooling, BYOC support\n- **Cheddar Cloud**: hosted workflows, storage, retention, managed keys/certs, convenience UI\n\nThat separation fits your thinking well because the **trust artifact survives**, while the **service layer is optional**.\n\nI can sketch the exact trust architecture next — including **self-managed vs BYOC vs Cheddar-managed** flows and what keys/certificates each mode should own."

