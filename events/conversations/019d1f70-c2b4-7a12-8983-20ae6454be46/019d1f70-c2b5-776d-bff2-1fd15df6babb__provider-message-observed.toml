text = "Great‚ÄĒthis is the exact layer where your system either feels ‚Äúreal‚ÄĚ to users or not.\n\nLet‚Äôs break **AATL and EUTL** down cleanly, because they‚Äôre central to how tools like Adobe automatically trust signatures.\n\n---\n\n# ūüß† What problem these solve\n\nWhen someone opens a signed PDF in ÓąÄentityÓąā[\"software\",\"Adobe Acrobat\",\"PDF reader software\"]ÓąĀ, the app has to decide:\n\n> ‚ÄúDo I trust this signature?‚ÄĚ\n\nInstead of asking users to manually trust keys, Adobe relies on **pre-approved trust lists**.\n\n---\n\n# ūüü© AATL ‚ÄĒ Adobe Approved Trust List\n\n## What it is\nÓąÄentityÓąā[\"security_standard\",\"Adobe Approved Trust List\",\"Adobe certificate trust program\"]ÓąĀ\n\nūüĎČ A list of **certificate authorities (CAs)** that Adobe trusts by default\n\n---\n\n## What that means in practice\n\nIf a document is signed using a certificate from an AATL provider:\n\n- ‚úÖ Adobe automatically trusts it  \n- ‚úÖ Signature shows as **valid / trusted**\n- ‚ĚĆ No scary warnings for the user\n\n---\n\n## Who‚Äôs on AATL?\n\nBig players like:\n- ÓąÄentityÓąā[\"company\",\"DigiCert\",\"certificate authority\"]ÓąĀ  \n- ÓąÄentityÓąā[\"company\",\"GlobalSign\",\"certificate authority\"]ÓąĀ  \n- ÓąÄentityÓąā[\"company\",\"Sectigo\",\"certificate authority\"]ÓąĀ  \n\nūüĎČ These companies:\n- verify identity\n- issue certificates\n- are vetted by Adobe\n\n---\n\n## Why it matters for you\n\nIf Cheddar uses:\n- AATL-issued certs\n\nūüĎČ Your users get:\n- instant trust in Adobe\n- no friction\n- no manual steps\n\n---\n\n# ūüü¶ EUTL ‚ÄĒ European Union Trusted List\n\n## What it is\nÓąÄentityÓąā[\"regulation\",\"EU Trusted List\",\"eIDAS trust service providers list\"]ÓąĀ\n\nūüĎČ A list of **qualified trust service providers (QTSPs)** under EU law\n\n---\n\n## Backed by:\nÓąÄentityÓąā[\"law\",\"eIDAS Regulation\",\"EU electronic identification regulation\"]ÓąĀ\n\n---\n\n## What it enables\n\nSignatures can be:\n\n- Advanced Electronic Signature (AdES)\n- Qualified Electronic Signature (QES) ‚Üź highest level\n\nūüĎČ QES has **legal equivalence to handwritten signatures in the EU**\n\n---\n\n## In Adobe\n\nAdobe integrates EUTL, so:\n\n- Certificates from EUTL providers\n- Are automatically trusted (like AATL)\n\n---\n\n# ūüß† AATL vs EUTL (simple view)\n\n| Feature | AATL | EUTL |\n|--------|------|------|\n| Managed by | Adobe | EU governments |\n| Scope | Global | European Union |\n| Trust level | High | Very high (legal framework) |\n| Legal backing | Indirect | Direct (eIDAS law) |\n| Use case | General business | Regulated EU signatures |\n\n---\n\n# ūüß† How this fits your Cheddar idea\n\nYou now have **three trust paths**:\n\n---\n\n## ūüü• 1. Self-signed (no list)\n- Not trusted by Adobe automatically\n- User sees warning\n- Still legally valid if evidence is strong\n\n---\n\n## ūüü® 2. BYOC (AATL/EUTL cert)\n- Customer brings certificate from DigiCert, etc.\n- Adobe trusts it instantly\n\nūüĎČ This is your **sweet spot**\n\n---\n\n## ūüü© 3. Cheddar-managed (AATL-backed)\n- You obtain certs\n- You sign on behalf of users\n\nūüĎČ This gives:\n- best UX\n- but highest responsibility\n\n---\n\n# ‚ö†ÔłŹ Important nuance\n\nAATL/EUTL do NOT verify the document itself.\n\nThey verify:\n\n> ‚ÄúThis public key belongs to a verified entity‚ÄĚ\n\nThe rest still depends on:\n- your audit trail\n- your signing flow\n- your evidence package\n\n---\n\n# ūüß† Key insight (this is the unlock)\n\n> AATL/EUTL solve **trust of identity**\n> Your system must solve **trust of the process**\n\n---\n\n# ūüß† NEXUS framing\n\n### External trust layer\n```text\nCertificate Authority ‚Üí asserts identity\n```\n\n### Internal truth layer\n```text\nActor ‚Üí Command ‚Üí Event ‚Üí Evidence Package\n```\n\nūüĎČ Both are required for a strong system\n\n---\n\n# ūüí° Practical takeaway\n\nIf you want Cheddar to ‚Äúfeel like DocuSign‚ÄĚ:\n\nūüĎČ Support:\n- BYOC with AATL providers\n- Optional Cheddar-managed certs\n\nūüĎČ But ALWAYS:\n- produce self-contained evidence packages\n\n---\n\n# ūüöÄ If you want next step\n\nI can:\n\n- Map exact **certificate + evidence flow**\n- Show how Adobe validates signatures step-by-step\n- Design **Cheddar‚Äôs trust modes (self / BYOC / managed)** in F# + TOML\n\nThis is the layer where your system becomes *real-world credible*."

