text = "Here’s the **real-world pricing picture for RFC 3161 Timestamp Authorities (TSA)** — and it’s actually better (cheaper) than most people expect.\n\n---\n\n# 💰 1. “Included for free” (very common)\n\nMany major providers like:\n- entity[\"company\",\"GlobalSign\",\"certificate authority\"]  \n- entity[\"company\",\"DigiCert\",\"certificate authority\"]  \n\n👉 **include timestamping at no extra cost** when you buy a signing certificate.\n\nExample:\n- GlobalSign explicitly includes trusted timestamping with document-signing certs citeturn0search2  \n\n---\n\n## 💡 What that means\n\nIf you already pay for:\n- document signing cert (~$600/year)\n\n👉 TSA usage is effectively:\n```text\n$0 per timestamp\n```\n\n---\n\n# 💰 2. Enterprise TSA services (API / SaaS)\n\nProviders like GlobalSign offer standalone TSA services:\n\n👉 Pricing is usually:\n- **Custom / volume-based**\n- Designed for:\n  - high-volume systems\n  - enterprise workflows\n\nThey advertise:\n- “low cost”  \n- “high throughput” citeturn0search0  \n\n---\n\n## Real-world estimate (industry typical)\n\nEven though pricing isn’t always public, typical ranges are:\n\n| Volume | Cost per timestamp |\n|--------|------------------|\n| Small scale | free – $0.001 |\n| Medium | ~$0.0001 – $0.001 |\n| Enterprise | fractions of a cent |\n\n👉 Extremely cheap compared to everything else\n\n---\n\n# 💰 3. Free public TSA servers\n\nThere are publicly available endpoints like:\n- freetsa.org  \n- Sectigo TSA  \n- others listed in community sources citeturn0search12  \n\n---\n\n## Cost:\n```text\n$0\n```\n\n## But:\n- ❌ No guarantees\n- ❌ No SLA\n- ❌ Not ideal for production legal systems\n\n---\n\n# 💰 4. “Bundled inside platforms”\n\nIf you use:\n- DocuSign\n- Adobe-based workflows\n\n👉 TSA cost is:\n```text\nhidden / bundled\n```\n\n---\n\n# 🧠 The important insight (this is the key)\n\nCompared to everything else:\n\n| Component | Cost |\n|----------|------|\n| TSA | 🟢 near-zero |\n| Certificate (CA) | 🟡 hundreds/year |\n| Infrastructure | 🟡 moderate |\n| Legal/compliance | 🔴 expensive |\n\n👉 TSA is basically **not your cost problem**\n\n---\n\n# 🧠 Practical Cheddar cost model\n\n## MVP\n- Use free TSA → $0\n\n## Production\n- Use CA-backed TSA (via cert provider) → included\n\n## Scale\n- Direct TSA API → fractions of a cent per doc\n\n---\n\n# 🧠 Cost comparison vs blockchain\n\n| Method | Cost per doc |\n|--------|-------------|\n| TSA | ~$0 – $0.001 |\n| Solana | ~$0.0002 |\n| Ethereum | $0.10+ |\n\n👉 TSA is already **cheap enough to not optimize further**\n\n---\n\n# ⚠️ Important strategic takeaway\n\n> ❗ TSA is not where you save money  \n> ❗ TSA is where you gain **legal strength**\n\n---\n\n# 🧠 My recommendation for your system\n\n## Always include TSA\n- It’s cheap\n- It’s standard\n- It’s court-friendly\n\n## Then optionally add blockchain\n- for redundancy / decentralization\n\n---\n\n# 💡 Bottom line\n\n- ✅ Many TSA services = effectively free  \n- ✅ Paid TSA = fractions of a cent  \n- ❌ Not worth trying to “optimize away”  \n\n👉 You can afford to timestamp **every document** without thinking about cost\n\n---\n\n# 🚀 If you want next step\n\nI can:\n- Show **actual TSA API call (curl / F#)**\n- Recommend specific providers for Cheddar\n- Design a **TSA + blockchain hybrid proof model**\n\nThis is one of the cheapest but highest-value pieces of your system 👍"

