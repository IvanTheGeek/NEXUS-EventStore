text = "Good context from recent chats — I know the LOGOS/Talkyard setup and your checklist approach well.\n\nBefore fleshing this out, here's an overview of what I need to understand. I'll ask one at a time:\n\n**Overview of questions:**\n1. Where in LOGOS does this live? (new category, existing project area, etc.)\n2. What's the nature of the offer to ES — volunteer/goodwill, paid consulting, equity/partnership, or something else?\n3. What do you envision as the actual deliverable — software system, process redesign, documentation, or all of the above?\n4. What's your leverage/pitch angle with Jeff — cost savings to ES, competitive advantage, or just \"I want to fix a pain point I experienced\"?\n5. Do you have a sense of the scope of the onboarding pain — is it paperwork, communication, systems, all of it?\n\n---\n\n**First question:**\n\nWhere should this live in LOGOS?"

