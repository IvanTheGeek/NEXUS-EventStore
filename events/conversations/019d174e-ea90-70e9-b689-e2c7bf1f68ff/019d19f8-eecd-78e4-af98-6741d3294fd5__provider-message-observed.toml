text = "Ivan is asking about git concepts: mirroring/cloning a repo to keep a personal copy, and rebasing personal changes on top of upstream updates."

[[body.segments]]
kind = "plain_text"
text = "Two separate scenarios, both clear-cut:\n\n**Scenario 1: Personal backup copy, track upstream**\n\nThis is a **mirror clone**. Not a fork — a fork implies intent to diverge. A mirror is just your safety net.\n\n```bash\ngit clone --mirror https://github.com/original/repo.git\n```\n\nTo keep it updated, you just `git remote update` periodically (or automate it). If the original disappears, you have everything — all branches, tags, history.\n\nIf you want a working copy (not just bare backup), clone normally and add the original as `upstream`:\n\n```bash\ngit clone https://github.com/original/repo.git\ngit remote rename origin upstream\n# optionally add your own remote as origin\ngit remote add origin https://your-host/your-copy.git\n```\n\nThen `git fetch upstream` to pull in their changes.\n\n---\n\n**Scenario 2: Your changes on top of latest original**\n\nYes — **rebase**. Not \"debase\" (that's not a term), just rebase. The workflow:\n\n```bash\ngit fetch upstream\ngit rebase upstream/main\n```\n\nThis replays your commits on top of their latest. Your changes stay as a clean layer above theirs. Conflicts are resolved commit-by-commit during the rebase.\n\nThe mental model: your branch is like a patch set that gets re-applied after every upstream update. This is exactly how Linux kernel contributors maintain out-of-tree patches.\n\n---\n\n**Which to use?**\n\n| Goal | Approach |\n|---|---|\n| Pure backup, no changes | `--mirror` clone + periodic fetch |\n| Track upstream + your own changes | fork + `upstream` remote + rebase |\n| Both | Fork on your host, mirror periodically, rebase your branch |\n\nHosting this on your own Forgejo instance would be the natural fit given your setup."

