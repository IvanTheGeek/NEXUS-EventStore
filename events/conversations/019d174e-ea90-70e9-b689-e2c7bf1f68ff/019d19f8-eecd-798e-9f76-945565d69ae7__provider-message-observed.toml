text = "Ivan is saying that using Forgejo LFS is trying to force Forgejo to do too much - it's not the right tool for binary/attachment storage. He's right - Forgejo/git is for text/structured data, and a proper object store (like MinIO) is the better fit for attachments. Let me confirm his instinct and keep it simple."

