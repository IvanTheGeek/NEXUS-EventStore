kind = "plain_text"
text = "Classic open-core trap. MinIO progressively stripped features — pulled the console GUI, entered maintenance mode, then fully archived in February 2026, steering everyone toward their paid AIStor product.\n\nThe good news: MinIO was AGPL, and AGPL is irrevocable — the company can archive the repo but can't take back the license the community already has.\n\n**The main alternatives the community has landed on:**\n\n- **Garage** — stable and reliable, S3-compatible, nonprofit-backed, and released under **AGPLv3** — the obvious fit for your values\n- **SeaweedFS** — mature, great performance, stores few large files rather than thousands of small ones, which makes NFS/backup easier — Apache 2.0\n- **RustFS** — focuses on raw performance for data lakes and AI workloads — still under heavy development\n\nFor your homelab use case (attachments for event records, not high-throughput data lake), **Garage** is the match — AGPL, nonprofit governance, designed for exactly this kind of self-hosted geo-distributed setup, and won't pull a MinIO on you."

