text = "The user is asking about doing this specifically in GitHub's UI/ecosystem."

[[body.segments]]
kind = "plain_text"
text = "GitHub has built-in features for both scenarios:\n\n**Scenario 1: Backup copy**\n\nGitHub doesn't have a true \"mirror\" button in the UI, but you can:\n- **Fork** the repo — one click, you get a full copy under your account\n- Enable **\"Sync fork\"** — GitHub added a button that lets you pull upstream changes with one click\n\nThe downside: GitHub forks are publicly linked to the original. If you want a truly independent copy (unlinked), you have to do the `--mirror` clone via command line and push to a new blank repo.\n\n**Scenario 2: Your changes on top of upstream**\n\nThis is the standard **fork + PR workflow**, but for *keeping* your changes rather than contributing back:\n\n1. Fork the repo\n2. Create a branch for your changes\n3. When upstream updates, use the **\"Sync fork\"** button (or `git fetch upstream && git rebase upstream/main` locally)\n4. Resolve any conflicts, push your branch\n\nGitHub doesn't automate the rebase for you — syncing the fork updates your `main`, then you manually rebase your custom branch on top of that.\n\n---\n\n**The honest take:** GitHub forks work fine for this, but they're designed around contributing back, not permanent personal divergence. If the original repo disappears, your fork *might* be affected depending on GitHub's policies — orphaned forks sometimes get detached, sometimes deleted.\n\nFor real insurance, a local clone or self-hosted Forgejo mirror is more reliable than depending on GitHub's fork relationship."

