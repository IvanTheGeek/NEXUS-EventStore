[[body.segments]]
kind = "reasoning"
text = "The user is referencing their NEXUS architecture where they have model repos and event repos. They're making a point that separating attachment storage from the git repo keeps the event git repo manageable (not bloated with binary files). This connects to their existing decisions about separate repos for model vs events.\n\nThis is a short conversational point, not a question. I should just affirm and maybe add a brief useful note."

[[body.segments]]
kind = "plain_text"
text = "Exactly — binary attachments in git are a well-known footgun. Every version of every file is stored forever in history, so a repo that accumulates attachments balloons fast and slows everything down (clone times, fetch, garbage collection).\n\nThe standard pattern is **git for structure/text, object storage for blobs**:\n\n- Git repo stays lean — just your TOML slices, event metadata, schema\n- Attachments live in S3/MinIO/Forgejo LFS, referenced by hash or URL in the event record\n\n**Git LFS** is the middle-ground if you want to keep the illusion of everything in one repo — it stores a pointer in git and the actual blob on an LFS server. Forgejo supports it natively.\n\nFor your event repo specifically, the natural split is:\n- Event instance files (UUIDv7 `.toml` or `.json`) → git\n- Any binary payload (screenshots, uploads, attachments) → MinIO or Forgejo LFS pointer\n\nKeeps the event repo append-friendly and fast, which matters since you said events are archive-independent from the model repo anyway."

