text = "<chat url='https://claude.ai/chat/5d11f42c-1371-4906-9dee-9a388252ac94' updated_at=2026-03-14T19:14:57.373473+00:00>Conceptual frameworks and their relationships\n- *Gap it fills:* System has a boundary; Interface defines what crosses that boundary and how. Boundary says \"here's the edge.\" Interface says \"here's the door, here's how it opens.\"\n\n---\n\n## Suggested Priority\n\nIf you're adding selectively, the highest-leverage ones are:\n\n1. **Model** — fills the construct→system gap; you reference this constantly already\n2. **Assumption** — makes invisible things visible; critical for consulting and AI collaboration\n3. **Vocabulary** — names the act of committing to constructs; essential for NEXUS/LOGOS\n4. **Intent** — separates *why* from *what*; important when designing for human Actors\n5. **Interface** — names the crossing point; you're already implicitly using this everywhere\n\n**Layer** and **Constraint** are useful but slightly more domain-specific to software architecture, so lower priority unless this framework is primarily for technical communication.\n\n---\n\n## Current Full Map\n\n```\nABSTRACTION STACK\n─────────────────────────────────────────\nParadigm       unconscious foundational worldview\n  Domain       territory of knowledge and practice\n    System     bounded, designed arrangement of components\n      Model    composed representation built from constructs\n        Layer  level of abstraction within a system\n          Context   active situational instance\n            Construct  named unit you reason with\n\nAGENCY DIMENSION\n─────────────────────────────────────────\nRole       defined function within a system\nActor      entity exercising agency\n  Agent    autonomous Actor with goals and a principal\nIntent     the why driving an Actor's action\n\nANALYTICAL TOOLS\n─────────────────────────────────────────\nLens         deliberate analytical filter (picked up, applied, set down)\nAssumption   unstated belief underlying any of the above\nConstraint   rule limiting valid states or behaviors\nVocabulary   committed set of constructs for a domain/system\nInterface    defined crossing point between systems/layers/actors\n\nCOMMUNICATION CHAIN\n─────────────────────────────────────────\nPerspective  how you see from where you stand\nFraming      how you package what you see\nAudience     who receives it\n```\n\nHuman: so is action and trigger and invariant applicable? vocabulary = so i guess I am trying to establish a vocabulary, I can see each of those being helpful so lets add them until i start applying them and refining. Can domains have layers?\n\nAssistant:  \n## Action, Trigger, Invariant\n\n**Yes, all three are applicable** — and they slot in precisely.\n\n---\n\n**Action** — the discrete unit of doing. The concrete thing that happens between Intent and recorded outcome. Not the motivation, not the result — the act itself.\n\n- *Examples:* Tapping \"Record Expense,\" submitting a command, a system writing to the event store\n- *Key distinction:* Intent is *why*, Action is *what*, Event is *what was recorded*. These three are often collapsed into one word and shouldn't be. An action can fail and produce no event.</chat>\n\n<chat url='https://claude.ai/chat/5d11f42c-1371-4906-9dee-9a388252ac94' updated_at=2026-03-14T19:14:57.373473+00:00>Conceptual frameworks and their relationships\n|\n\n---\n\n## Communication Chain\n\n```\nPerspective → Framing → Audience\n```\n\n| Term | Definition |\n|---|---|\n| **Perspective** | How you see from where you stand. Shaped by Role and Paradigm. Can be unconscious. |\n| **Framing** | The deliberate act of structuring how something is presented to shape how it's received. The bridge between Perspective and Audience. Framing doesn't change the underlying construct — it changes what gets foregrounded. |\n| **Audience** | The specific people who will receive, use, or be affected by the output. Shapes form and language, not underlying content. |\n\n---\n\n## Quick Reference: Adjacent Term Distinctions\n\n| If you're reaching for... | Make sure it isn't... | Distinction |\n|---|---|---|\n| Paradigm | Perspective | Paradigm is unconscious worldview; Perspective is a positional viewpoint you can name |\n| Perspective | Lens | Perspective is where you stand; Lens is what you deliberately pick up to analyze with |\n| Domain | System | Domain is territory; System is a designed structure operating within it |\n| System | Model | System runs; Model represents |\n| Context | Session | Context is where/what; Session is when/how long |\n| Construct | Vocabulary | Construct is one named concept; Vocabulary is the committed collection |\n| Constraint | Invariant | Constraint gates entry; Invariant defines perpetual integrity |\n| Role | Actor | Role is structural function; Actor is the entity exercising that function |\n| Actor | Agent | Actor initiates; Agent initiates *autonomously toward goals* |\n| Motivation | Intent | Motivation persists; Intent is situational and fleeting |\n| Goal | Intent | Goal spans Sessions and completes; Intent lives for one action |\n| Trigger | Intent | Trigger is mechanical cause; Intent is purposeful human cause |\n| Framing | Perspective | Perspective is how you see; Framing is how you package it for an audience |\n| Interface | Boundary | Boundary defines the edge; Interface defines what crosses it and how |\n\n---\n\n*This vocabulary is itself an instance of what it describes —\na committed set of constructs for precise communication across design, architecture, and consulting work.*\n</parameter>\n</tool>\n<tool name=\"present_files\">\n<parameter name=\"filepaths\">['/mnt/user-data/outputs/vocabulary-map.md']</parameter>\n</tool>\nThe file includes everything — full map, both chains, the side-by-side chain comparison, and the adjacent term distinctions table at the end. That last table is probably the most practically useful part when you're mid-conversation and reaching for the right word.\n\nWorth noting: this document is itself a living artifact. As you apply these terms and find edges that don't quite fit, the distinctions table is where refinements will show up first.\n\nHuman: add methodology, framework\n\nAssistant:  \n**Methodology** — a structured, principled approach to doing work within a domain or paradigm. The *how we work* — organized methods, practices, and heuristics committed to as a way of operating.</chat>\n\n<chat url='https://claude.ai/chat/5d11f42c-1371-4906-9dee-9a388252ac94' updated_at=2026-03-14T19:14:57.373473+00:00>Conceptual frameworks and their relationships\nGates entry — a pre-condition. | You violate a constraint by *attempting* a forbidden action. |\n| **Invariant** | A condition that must always hold regardless of what actions occur. Perpetual integrity. | An invariant violation means the system is in a *broken state* — not just that something was attempted. |\n\n---\n\n## Analytical Tools\n\n| Term | Definition |\n|---|---|\n| **Lens** | A deliberately chosen analytical filter applied to examine something. Composable, switchable, conscious. You can apply multiple lenses to the same thing sequentially. |\n| **Assumption** | An unstated or stated belief underlying reasoning, design, or communication. Invisible when right; breaks things when wrong. Lives underneath every other term. |\n\n> **The triad:** Paradigm → Perspective → Lens\n> — from *unconscious worldview* to *positional viewpoint* to *deliberate analytical tool*.\n\n---\n\n## Language\n\n| Term | Definition |\n|---|---|\n| **Vocabulary** | The committed set of constructs for a domain or system, with agreed-upon meanings. Not just a dictionary — the act of committing to consistent use. |\n| **Interface** | The defined crossing point between two systems, components, actors, or layers. Specifies what can be exchanged and how, without exposing internals. Boundary says \"here's the edge\"; Interface says \"here's the door.\" |\n\n---\n\n## Communication Chain\n\n```\nPerspective → Framing → Audience\n```\n\n| Term | Definition |\n|---|---|\n| **Perspective** | How you see from where you stand. Shaped by Role and Paradigm. Can be unconscious. |\n| **Framing** | The deliberate act of structuring how something is presented to shape how it's received. The bridge between Perspective and Audience. Framing doesn't change the underlying construct — it changes what gets foregrounded. |\n| **Audience** | The specific people who will receive, use, or be affected by the output. Shapes form and language, not underlying content.</chat>\n\n<chat url='https://claude.ai/chat/5d11f42c-1371-4906-9dee-9a388252ac94' updated_at=2026-03-14T19:14:57.373473+00:00>Conceptual frameworks and their relationships\nAudience | Framing is now the explicit bridge — you see from a perspective, you frame for an audience |\n| Domain vs. Context | System sits between them — Domain is territory, System is designed structure within it, Context is live instance |\n| Actor confusion | Actor/Agent split: Actor = initiates action; Agent = initiates action *autonomously* toward goals on behalf of a principal |\n\n---\n\n## Extended LaundryLog Example\n\n| Term | Instance |\n|---|---|\n| Paradigm | Event sourcing — all state is derived from events |\n| Domain | Trucking / IRS expense documentation |\n| System | LaundryLog — bounded app with event model, UI, projections |\n| Context | Driver at a TA Travel Center, mid-laundry run, recording expenses |\n| Construct | `LaundrySession`, `MachineUsed`, `ExpenseRecorded` |\n| Actor | The driver (issues `RecordExpense` command) |\n| Agent | A future automation that detects a stopped truck near a laundry and prompts a new session |\n| Role | Expense Recorder (driver-facing function in the system) |\n| Perspective | Driver: \"I spent money.\" IRS: \"Prove it was business-related.\" |\n| Framing | Marketing frame: \"Never lose a deduction again.\" Technical frame: \"Append-only expense event stream.\" |\n| Audience | Non-technical OTR truck drivers who distrust complexity |\n\n---\n\nThe sharpest distinction in this expanded set: **Role → Actor → Agent** is a progression from *definition* to *action* to *autonomous action*. And **Perspective → Framing → Audience** is the communication chain from *how you see* to *how you shape* to *who receives*.\n\nHuman: add lens and suggest any other terms that might help. This list is working up nicely. There are so many things thrown around, I am trying to define a way to reference the correct term when working.\n\nAssistant:  \n## Lens\n\nA lens is a deliberately chosen analytical filter you apply to examine something. It's a *tool* you pick up, not a position you occupy.\n\n- *Examples:* Applying an \"event sourcing lens\" to evaluate a new technology. A \"driver experience lens\" vs. a \"compliance lens\" on the same UI decision. An economic lens, a security lens, a domain lens.\n- *Scope:* Analytical — operates on any level from construct up to paradigm\n- *Key trait:* You can apply multiple lenses sequentially to the same thing. You can't hold two paradigms simultaneously. Lenses are composable and switchable on demand. They're conscious and deliberate where paradigm is largely not.\n- *Relation to existing terms:* Paradigm is the water you swim in. Perspective is where you stand. A lens is something you pick up and look *through*. A perspective shapes what you *notice*; a lens determines what you *analyze for*.\n\n**The triad:** Paradigm → Perspective → Lens is a progression from *unconscious worldview* to *positional viewpoint* to *deliberate analytical tool*.</chat>\n\n<chat url='https://claude.ai/chat/5d11f42c-1371-4906-9dee-9a388252ac94' updated_at=2026-03-14T19:14:57.373473+00:00>Conceptual frameworks and their relationships\nA framework provides structure for building.\n\n---\n\n## Where They Sit\n\n```\nParadigm      ← worldview\n  Methodology ← principled approach to working within that worldview\n    Framework ← concrete reusable scaffold embodying methodology decisions\n      System  ← specific thing built within a framework\n        Model ← representation of that system for reasoning\n```\n\nThe chain reads cleanly: Event sourcing is a **Paradigm**. Event Modeling is a **Methodology** within that paradigm. EventLanes is a **Framework** that implements Event Modeling tooling. LaundryLog is a **System** built using it. The LaundryLog event model is a **Model** of that system.\n\n---\n\n## Updated Full Map\n\n```\nABSTRACTION STACK\n─────────────────────────────────────────\nParadigm       unconscious foundational worldview\n  Domain       territory of knowledge and practice\n    Layer      stacked level of concern (in domain or system)\n  Methodology  principled approach to working within a paradigm\n    Framework  reusable scaffold embodying methodology decisions\n      System   bounded, designed arrangement of components\n        Model  composed representation built from constructs\n          Context   situational circumstances (where/what)\n            Session   temporal container (when/how long)\n              Construct  named unit you reason with\n\nAGENCY DIMENSION\n─────────────────────────────────────────\nRole         defined function within a system\nActor        entity exercising agency\n  Agent      autonomous Actor with goals and a principal\n\nHUMAN CAUSAL CHAIN\n─────────────────────────────────────────\nMotivation   persistent underlying force\n  Goal       defined outcome spanning multiple sessions\n    Intent   specific goal driving a particular action\n      Action     discrete unit of doing\n        Event    recorded proof an action completed\n\nMECHANICAL CAUSAL CHAIN\n─────────────────────────────────────────\nTrigger    condition or signal that initiates\n  Action   discrete unit of doing\n    Event  recorded proof an action completed\n\nSTRUCTURAL RULES\n─────────────────────────────────────────\nConstraint   limits valid states or actions (pre-condition)\nInvariant    condition that must always hold (perpetual integrity)\n\nANALYTICAL TOOLS\n─────────────────────────────────────────\nLens         deliberate analytical filter\nAssumption   unstated belief underlying any of the above\n\nLANGUAGE\n─────────────────────────────────────────\nVocabulary   committed set of constructs for a domain/system\nInterface    defined crossing point between systems/layers/actors\n\nCOMMUNICATION CHAIN\n─────────────────────────────────────────\nPerspective  how you see from where you stand\nFraming      how you package what you see\nAudience     who receives it\n```\n\nShould I update the markdown file with these additions including the distinctions table entries for Methodology vs Framework, Framework vs System, and Methodology vs Paradigm?</chat_conversation></chat>"

