[[body.segments]]
kind = "reasoning"
text = "Ivan is asking about \"ResolvesTo\" as a candidate term for the edge between Action → Fact (Command → Event in EM terms), and wants evaluation plus alternatives.\n\nLet me think about this carefully.\n\n**ResolvesTo** evaluation:\n- It's directional — Action ResolvesTo Fact — reads naturally\n- \"Resolves\" carries the decision/outcome semantics — a conflict or question gets resolved\n- Legal/mediation connotation — a dispute resolves to a verdict\n- In type systems, \"resolves to\" means an expression evaluates to a value\n- Downside: \"resolves\" implies there was ambiguity or conflict that needed resolution — not every Action is contested\n\n\n- As a verb phrase it feels more like an edge label than a primitive concept, and the camelCase styling leans too implementation-heavy\n\nNow I'm weighing some alternatives: **Produces** is straightforward and causal but perhaps too generic, while **Yields** adds a touch more intentionality. **Commits** or **Commitment** have already come up in discussion. **Settles** has legal weight and captures finality — an action settles into a fact. **Manifests** suggests something emerging or becoming visible, though that thought trails off.\n\nThe real question is whether I'm naming an edge type or a primitive in the graph itself. If it's an edge label, the verb forms work fine. But if it's a primitive node like Action or Fact, I need a noun — and **Resolution** feels cleaner and more aligned with the NEXUS vocabulary style. Placing it as a bridge between Action and Fact makes structural sense too."

[[body.segments]]
kind = "plain_text"
text = "**Evaluating ResolvesTo:**\n\nStrengths:\n- Directional and readable — `Action ResolvesTo Fact` parses naturally\n- Carries decision semantics — something was *settled*\n- Has precedent in type systems (expression resolves to a value)\n\nWeaknesses:\n- Verb phrase — awkward as a standalone vocabulary primitive; everything else in NEXUS is a noun\n- Implies prior ambiguity or conflict — not every Action is contested, it just *happened*\n- Feels implementation-flavored (camelCase, method-like)\n\nThe noun form **Resolution** fixes most of that. It sits cleanly alongside Action, Fact, Intent, Constraint.\n\n---\n\n**Additional candidates:**\n\n| Term | Angle |\n|---|---|\n| **Resolution** | Noun form of ResolvesTo. The point where an Action is settled as Fact or rejected. Legal/mediation weight — a resolution is binding. |\n| **Verdict** | The ruling applied to an Action. Strong decisional semantics. Might be too judicial. |\n| **Settlement** | Final, binding, no going back. Echoes event sourcing immutability well. |\n| **Attestation** | The edge asserts the Fact is true. Provenance-flavored. |\n| **Ratification** | The Action is ratified into Fact. Formal approval connotation. |\n\n---\n\n**My read:** `Resolution` is the strongest — it's the noun form of what you already liked, fits the vocabulary style, and captures *both* outcomes (resolved to Fact, or resolved to rejection). `Commitment` and `Settlement` are close seconds with stronger immutability connotation.\n\nDoes **Resolution** work as the primitive name?"

