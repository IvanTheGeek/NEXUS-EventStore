text = "{\"start_timestamp\":\"2026-03-18T19:09:20.645975Z\",\"stop_timestamp\":\"2026-03-18T19:09:21.032948Z\",\"flags\":null,\"type\":\"tool_use\",\"id\":\"toolu_016HFdDAy2hVj2poCFf4yLdv\",\"name\":\"conversation_search\",\"input\":{\"query\":\"vocabulary map paradigm domain context construct lens interface boundary invariant\"},\"message\":\"Looking for relevant chats...\",\"integration_name\":\"Search Past Conversations\",\"integration_icon_url\":\"https://claude.ai/images/icons/conversation_search.png\",\"icon_name\":\"memory\",\"context\":null,\"display_content\":null,\"approval_options\":null,\"approval_key\":null,\"is_mcp_app\":null}"

