text = "Here's the full current vocabulary map recovered from that conversation:\n\n---\n\n**ABSTRACTION STACK**\n`Paradigm` → `Domain` → `Layer` / `Methodology` → `Framework` → `System` → `Model` → `Context` → `Session` → `Construct`\n\n**AGENCY DIMENSION**\n`Role` → `Actor` → `Agent`\n\n**HUMAN CAUSAL CHAIN**\n`Motivation` → `Goal` → `Intent` → `Action` → `Event`\n\n**MECHANICAL CAUSAL CHAIN**\n`Trigger` → `Action` → `Event`\n\n**STRUCTURAL RULES**\n`Constraint` (gates entry) / `Invariant` (perpetual integrity)\n\n**ANALYTICAL TOOLS**\n`Lens` / `Assumption`\n\n**LANGUAGE**\n`Vocabulary` / `Interface`\n\n**COMMUNICATION CHAIN**\n`Perspective` → `Framing` → `Audience`\n\n---\n\nNotable adjacency distinctions from the artifact: Role vs Actor, Actor vs Agent, Constraint vs Invariant, Motivation vs Intent, Goal vs Intent, Trigger vs Intent, Perspective vs Lens, Interface vs Boundary.\n\nSo back to your original question — **edge** doesn't appear in this vocabulary at all yet. What were you thinking of naming? The relationship between Action and Fact in the graph, or something more structural?"

