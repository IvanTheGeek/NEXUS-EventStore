[[body.segments]]
kind = "reasoning"
text = "The user is asking about overlaying Adam Dymetrik's Event Modeling terminology onto the NEXUS vocabulary, specifically:\n- Command maps to which NEXUS term?\n- Event = Fact (confirmed)\n\nIn Event Modeling:\n- Command = the intent/instruction to do something\n- Event = something that happened (recorded fact)\n- Read Model/View = projection of events\n\nIn NEXUS vocabulary:\n- Action = discrete unit of doing\n- Event = recorded proof an action completed\n- Fact = central/immutable (from Truth Graph primitives)\n\nSo:\n- Command → Action (or Intent? Command is closer to Action - the discrete unit of doing)\n\n\n- Event → Fact (user is confirming this)\n\nLooking more carefully at the mapping: Command in Event Modeling is the imperative instruction that triggers something, while Action in NEXUS is the discrete unit of doing itself. Command also carries some Intent within it, but it's fundamentally about the instruction to act rather than the why behind it. So Command maps most closely to Action in NEXUS, though there's some conceptual overlap with Intent depending on how you frame it."

[[body.segments]]
kind = "plain_text"
text = "In Event Modeling:\n- **Command** → the imperative instruction sent to cause something\n- **Event** → the recorded proof it happened\n\nOverlaid on NEXUS causal chain:\n\n```\nMotivation → Goal → Intent → Action → Event\n                              ↑          ↑\n                           Command      Fact\n```\n\n**Event = Fact** — you confirmed that.\n\n**Command = Action** — the discrete unit of doing. Command is the imperative form; Action is the NEXUS abstraction of the same slot.\n\nThe interesting nuance: in Event Modeling, Command carries the *intent* implicitly (you name it imperatively — `LogExpense`, `SetLocation`). In NEXUS, Intent and Action are split — Intent is *why*, Action is *what*. So a Command in EM is really `Intent + Action` collapsed into one artifact.\n\nWhich raises a question: in your TOML schema you already use `command` as a slice type name. Are you planning to keep `command` as the **modeling/EM artifact name** while `Action` stays as the **vocabulary concept** — or do you want to reconcile them more tightly?"

