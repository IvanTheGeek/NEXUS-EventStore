[[body.segments]]
kind = "plain_text"
text = "For a directed edge between two nodes, the most universal terms cluster around a few conceptual axes:\n\n**Structural/Graph Theory**\n- *edge*, *arc*, *link*, *connection*, *arrow*\n- *directed edge*, *directed arc*\n\n**Relational (what the edge *means*)**\n- *relationship*, *association*, *dependency*\n- *binding*, *coupling*\n\n**Causal/Temporal (fits Action → Fact well)**\n- *produces*, *yields*, *results in*, *causes*\n- *transition*, *transformation*\n- *derivation* (the Fact is derived from the Action)\n\n**Provenance-specific**\n- *trace* (the Fact traces back to the Action)\n- *origin*, *source edge*\n- *lineage*\n\n**Type-labeling the edge itself**\n- *predicate* (logic/semantic web — subject → predicate → object)\n- *relation type*, *edge type*, *edge label*\n- *role* (the edge plays a role between the two nodes)\n\n---\n\n**Most transferable single term** across graph theory, knowledge graphs, and your domain: probably **`edge`** for the structural slot, and **`produces`** or **`yields`** for the semantic label on it.\n\nWhat's prompting the question — are you naming the field in a TOML schema, a graph primitive in code, or something in the NEXUS vocabulary?"

