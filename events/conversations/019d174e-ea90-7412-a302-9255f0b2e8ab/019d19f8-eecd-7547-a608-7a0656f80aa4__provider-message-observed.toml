[[body.segments]]
kind = "reasoning"
text = "Ivan is asking what to call the edge/relationship between Action → Fact (Event) as a NEXUS primitive. In software terms, the thing that sits between a Command and an Event being produced is the **command handler** - but that's an implementation detail. Let me think about what that edge *represents* conceptually.\n\nThe edge Action → Fact represents:\n- The execution/processing of the action\n- The causal link - action *produces* / *causes* / *yields* the fact\n- In Event Modeling it's hidden inside the command handler\n- In CQRS it's the handler/aggregate logic\n- In domain terms it's the \"decision\" - the system deciding to record something as true\n\n\n- I'm considering various semantic labels: produces, yields, causes, transition, execution, resolution, dispatch, commitment, recording - but Ivan needs a NEXUS primitive, a standalone noun that becomes part of the vocabulary, not just a verb on an edge. What he's really looking for is the process itself - the thing that transforms an action into a fact.\n\nNow I'm thinking about what that mechanism actually does: it takes an action, applies business rules and logic, and produces a fact or rejects it. In software terms, it's like a command handler or aggregate; functionally it's an action-to-result function. I'm exploring names for this transformation concept: Transform, Evaluation, Decision, Derivation, Translation, Rule, Gate, Resolution, Commitment - each capturing a different angle on how an action becomes a fact.\n\nBut stepping back, the real insight is that in Event Modeling, the command handler is where invariants and business rules get checked, and the event either gets produced or doesn't. The edge between action and fact isn't just a simple produces relationship - there's validation and causation happening. Looking at Ivan's NEXUS vocabulary, constraints and invariants govern what's valid, and the edge is where they're enforced. So the most honest primitive might be Decision, since it captures both the validation moment and the commitment to produce the fact."

[[body.segments]]
kind = "plain_text"
text = "The thing that edge *represents* in software is the command handler — but as a NEXUS primitive it needs to describe what that edge **is**, not how it's implemented.\n\nWhat the edge actually does:\n- receives the Action\n- applies business rules (Constraints/Invariants)\n- either produces a Fact or rejects\n- it's the **decision point** — did this Action get committed as truth?\n\nCandidate NEXUS primitives:\n\n| Term | What it captures |\n|---|---|\n| **Decision** | The point where rules are applied and an Action is either committed as Fact or rejected. Honest to the business meaning. |\n| **Rule** | The governing logic *on* the edge. But Rule already lives inside Constraint/Invariant. |\n| **Evaluation** | The Action is evaluated against conditions to produce a Fact. Neutral, functional. |\n| **Commitment** | The act of committing an Action as an immutable Fact. Aligns with event sourcing semantics — a Fact *is* a commitment. |\n| **Derivation** | Fact is derived from Action. But Derivation feels more like Projection territory (View ← Events). |\n\n**Commitment** feels most honest to your paradigm — it's the moment something transitions from *attempted* to *recorded as true*. And it maps cleanly: Event Modeling hides the commitment; NEXUS names it.\n\nDoes **Commitment** land, or does something else resonate?"

