kind = "plain_text"
text = "**Evaluating ResolvesTo:**\n\nStrengths:\n- Directional and readable — `Action ResolvesTo Fact` parses naturally\n- Carries decision semantics — something was *settled*\n- Has precedent in type systems (expression resolves to a value)\n\nWeaknesses:\n- Verb phrase — awkward as a standalone vocabulary primitive; everything else in NEXUS is a noun\n- Implies prior ambiguity or conflict — not every Action is contested, it just *happened*\n- Feels implementation-flavored (camelCase, method-like)\n\nThe noun form **Resolution** fixes most of that. It sits cleanly alongside Action, Fact, Intent, Constraint.\n\n---\n\n**Additional candidates:**\n\n| Term | Angle |\n|---|---|\n| **Resolution** | Noun form of ResolvesTo. The point where an Action is settled as Fact or rejected. Legal/mediation weight — a resolution is binding. |\n| **Verdict** | The ruling applied to an Action. Strong decisional semantics. Might be too judicial. |\n| **Settlement** | Final, binding, no going back. Echoes event sourcing immutability well. |\n| **Attestation** | The edge asserts the Fact is true. Provenance-flavored. |\n| **Ratification** | The Action is ratified into Fact. Formal approval connotation. |\n\n---\n\n**My read:** `Resolution` is the strongest — it's the noun form of what you already liked, fits the vocabulary style, and captures *both* outcomes (resolved to Fact, or resolved to rejection). `Commitment` and `Settlement` are close seconds with stronger immutability connotation.\n\nDoes **Resolution** work as the primitive name?"

