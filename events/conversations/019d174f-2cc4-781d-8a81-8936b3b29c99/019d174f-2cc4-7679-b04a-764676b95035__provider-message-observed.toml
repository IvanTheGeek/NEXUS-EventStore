text = "Git does **not store the entire file again** when you commit. It stores **content objects and references**, and it **deduplicates identical content automatically**. The behavior you’re seeing is about **Git detecting a change**, not about **how Git stores the data internally**.\n\nLet's break it down.\n\n---\n\n# 1. What happens when Git thinks a file changed\n\nIf you:\n\n1. Open a file\n2. Save it\n3. Git shows it as modified\n\nIt usually means **something actually changed**, even if you didn't notice.\n\nCommon invisible changes:\n\n### Line endings\nWindows editors often convert:\n\n- `LF` → `CRLF`\n\nExample:\n\n```\nLF:    hello\\n\nCRLF:  hello\\r\\n\n```\n\nGit sees that as a different file.\n\nRelated setting:\n\n```\ncore.autocrlf\n```\n\n---\n\n### Trailing whitespace\n\nExample change:\n\n```\nhello\n```\n\nvs\n\n```\nhello␠\n```\n\n---\n\n### Encoding changes\n\nExample:\n\n- UTF-8\n- UTF-8 with BOM\n\nSome editors rewrite the file with a **byte-order mark**.\n\n---\n\n### Final newline added\n\nMany editors add:\n\n```\nnewline at end of file\n```\n\nGit sees this as a change.\n\n---\n\n# 2. How Git actually stores files\n\nGit stores **snapshots**, but the internal storage is **content-addressed and deduplicated**.\n\nInside `.git/objects`.\n\nGit objects:\n\n| Type | Purpose |\n|---|---|\n| blob | file contents |\n| tree | directory structure |\n| commit | snapshot metadata |\n\n---\n\n### Blob example\n\nIf a file contains:\n\n```\nhello world\n```\n\nGit creates a blob object whose ID is a hash:\n\n```\nSHA-1 or SHA-256\n```\n\nExample:\n\n```\n3b18e13...\n```\n\nIf the **content is identical**, Git reuses the same blob.\n\n---\n\n# 3. What happens when you commit again\n\nCase A — file truly identical\n\nGit reuses the **same blob object**.\n\nNo duplicate storage.\n\n---\n\nCase B — file changed\n\nGit creates a **new blob object**.\n\nBut internally Git **compresses objects** and later packs them using **delta compression**.\n\n---\n\n# 4. Packfile delta compression\n\nWhen Git runs:\n\n```\ngit gc\n```\n\nor automatically during maintenance.\n\nGit converts objects into **packfiles** and stores them as **binary deltas**.\n\nExample:\n\n```\nfile_v1\nfile_v2\n```\n\nGit stores:\n\n```\nfile_v1\ndelta(file_v2 - file_v1)\n```\n\nSo storage becomes very efficient.\n\n---\n\n# 5. Important: Git diffs are NOT how it stores data\n\nThis is a very common misconception.\n\nGit **diffs only for display**, like:\n\n```\ngit diff\n```\n\nStorage model is:\n\n```\ncontent blobs\n+ tree snapshots\n```\n\nLater optimized with packfile deltas.\n\n---\n\n# 6. Why Git thinks your file changed\n\nRun:\n\n```\ngit diff\n```\n\nor\n\n```\ngit diff --word-diff\n```\n\nor the best one:\n\n```\ngit diff --ignore-space-at-eol\n```\n\nSometimes the change will appear as:\n\n```\nNo newline at end of file\n```\n\n---\n\n# 7. A useful Git command for this exact situation\n\n```\ngit diff --ignore-all-space\n```\n\nor\n\n```\ngit diff --ignore-cr-at-eol\n```\n\nThese reveal if the change is **only whitespace or line endings**.\n\n---\n\n# 8. Key concept (very important)\n\nGit is a **content-addressable object store**.\n\nThe rule is:\n\n```\nhash(content) = object id\n```\n\nSo if content changes **even one byte**, the hash changes and Git treats it as a new object.\n\n---\n\n# 9. Why this matters for your earlier question about WASM + Git\n\nIf you build a **Git-based system in a browser or WASM**, you don't need to store diffs either.\n\nYou can store:\n\n```\nhash → blob\n```\n\nThen commits reference trees.\n\nThis is exactly how tools like:\n\n- entity[\"software\",\"Git\",\"version control system\"]\n- entity[\"software\",\"GitHub\",\"software hosting service\"]\n- entity[\"software\",\"GitLab\",\"DevOps platform\"]\n\nwork internally.\n\n---\n\n✅ **Short answer**\n\nGit:\n\n- detects changes via **file content hash**\n- stores **new blobs if content changes**\n- later compresses them using **delta packing**\n- does **not store diffs as the primary storage model**\n\n---\n\nIf you'd like, I can also show you something **really relevant to your Nexus/event-model work**:\n\n**How Git’s object model (blob → tree → commit) is almost identical to event sourcing.**\n\nIt's actually a fascinating parallel that could influence how your **Nexus graph persistence** works."

