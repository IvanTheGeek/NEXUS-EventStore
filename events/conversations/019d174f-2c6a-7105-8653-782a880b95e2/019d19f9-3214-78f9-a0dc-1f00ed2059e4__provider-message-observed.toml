text = "Here are some **trendy, quick weeknight dinner ideas** that feel fresh, flavorful, and very “right now” — most ready in 30 minutes or less:\n\n---\n\n### 🌮 1. Smash Burger Tacos (Viral Favorite)\nA mashup inspired by TikTok’s smashburger craze.  \n- Press seasoned ground beef directly onto small tortillas  \n- Cook patty-side down until crispy  \n- Flip, melt cheese, and top with pickles + burger sauce  \n- Serve with fries or a simple salad  \n\n**Why it’s trending:** Hybrid comfort food + crispy textures.\n\n---\n\n### 🥗 2. Mediterranean Chickpea Bowls\nBright, protein-packed, and meal-prep friendly.  \n- Roasted chickpeas (paprika + cumin)  \n- Cucumber-tomato salad  \n- Hummus, feta, olives  \n- Drizzle with lemon-tahini dressing  \n\nAdd grilled chicken or salmon if you want extra protein.\n\n---\n\n### 🍜 3. Spicy Gochujang Noodles\nSweet, spicy, and deeply savory thanks to entity[\"food\",\"gochujang\",\"korean chili paste\"].  \n- Stir-fry garlic + veggies  \n- Add noodles and a sauce of gochujang, soy sauce, honey, rice vinegar  \n- Finish with a jammy egg and sesame seeds  \n\n**Trend factor:** Korean-inspired flavors are everywhere right now.\n\n---\n\n### 🌮 4. Birria-Style Quesadillas\nInspired by the Mexican classic entity[\"food\",\"Birria\",\"mexican stewed meat dish\"].  \n- Use leftover shredded beef or rotisserie chicken  \n- Dip tortilla in broth (or seasoned stock)  \n- Fill with meat + Oaxaca or mozzarella  \n- Pan-fry until crispy  \n\nServe with a quick lime-cilantro dipping sauce.\n\n---\n\n### 🥙 5. Grinder Salad Sandwich\nBased on the viral Italian “grinder” sandwich trend.  \n- Toasted hoagie roll  \n- Deli turkey or salami  \n- Provolone  \n- Toss shredded lettuce with mayo, red wine vinegar, oregano, pepper flakes  \n- Stuff generously  \n\nMessy, crunchy, addictive.\n\n---\n\n### 🍣 6. Baked Salmon Sushi Bowls\nAll the sushi vibes — no rolling required.  \n- Roast salmon with soy + sriracha  \n- Flake over rice  \n- Top with avocado, cucumber, edamame, spicy mayo  \n\nOptional: crispy onions or seaweed snacks for scooping.\n\n---\n\n### 🌱 7. Creamy Boursin Pasta\nUltra-easy and ultra-creamy thanks to entity[\"brand\",\"Boursin\",\"french cheese brand\"] cheese.  \n- Roast cherry tomatoes with olive oil  \n- Stir in Boursin until saucy  \n- Toss with pasta and fresh basil  \n\nFeels fancy but takes almost no effort.\n\n---\n\n### 🍗 8. Hot Honey Chicken Cutlets\nSweet heat is a major flavor trend.  \n- Bread thin chicken cutlets  \n- Pan-fry until golden  \n- Drizzle with hot honey  \n- Serve with arugula + shaved parm  \n\n---\n\nIf you’d like, tell me:\n- Any dietary preferences (vegetarian, high-protein, low-carb, etc.)  \n- Ingredients you already have  \n- Cuisine vibe (Asian-inspired, Mediterranean, comfort food, etc.)  \n\nI can tailor a 5-day trendy dinner plan just for you."

